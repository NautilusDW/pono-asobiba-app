<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ポノの おべんとう | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="../common/points.js"></script>
<script src="../common/achievements.js"></script>
<script src="../common/menu.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8F0;
  --primary: #F2915A;
  --primary-light: #FDDCBF;
  --text: #5D4E37;
  --text-light: #A89880;
  --shadow: rgba(93,78,55,0.12);
  --radius: 16px;
}

html, body {
  height: 100dvh;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background: linear-gradient(135deg, #FFF8F0 0%, #FFEEDD 100%);
  color: var(--text);
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

/* ===== タイトル ===== */
.game-title {
  position: fixed;
  top: 6px; left: 50%; transform: translateX(-50%);
  font-size: 1.3rem; font-weight: 900;
  color: var(--primary);
  text-shadow: 2px 2px 0 var(--primary-light);
  z-index: 5;
  pointer-events: none;
  white-space: nowrap;
}

/* ===== 横向きメインレイアウト ===== */
#app {
  display: flex;
  height: 100dvh;
  padding: 56px 6px 12px;
  gap: 6px;
}

/* ── 左: お弁当箱（できるだけ大きく） ── */
.left-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  padding: 0 4px;
}

.pono-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.pono-img {
  width: 54px; height: 54px;
  object-fit: contain;
  transition: transform 0.3s;
}
.pono-img.happy { transform: scale(1.2) rotate(-5deg); }
.speech-bubble {
  background: #fff;
  border-radius: 14px;
  padding: 6px 14px;
  font-size: 1rem;
  font-weight: 900;
  color: var(--text);
  box-shadow: 0 1px 6px var(--shadow);
  position: relative;
  line-height: 1.3;
}
.speech-bubble::before {
  content: '';
  position: absolute;
  left: -8px; top: 50%;
  transform: translateY(-50%);
  border: 8px solid transparent;
  border-right-color: #fff;
}

/* お弁当箱 */
.bento-box {
  flex: 1;
  background: #8B4513;
  border-radius: 14px;
  border: 5px solid #6B3410;
  padding: 6px;
  box-shadow: 0 4px 20px rgba(93,78,55,0.25);
  display: flex;
  min-height: 0;
}
@media (hover: hover) and (pointer: fine) {
  html, body { overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; }
  #app {
    width: 800px; height: 440px;
    flex-shrink: 0;
    transform-origin: center center;
  }
  .game-title { position: absolute; }
}
.bento-inner {
  background:
    repeating-conic-gradient(#FFF8E7 0% 25%, #FFF1D4 0% 50%) 0 0 / 12px 12px;
  border-radius: 10px;
  display: flex;
  flex-direction: row;
  gap: 0;
  padding: 6px;
  flex: 1;
  min-height: 0;
}

/* ── Plastic bento dividers (色はJSでapplyBentoColorから設定) ── */
.bento-divider-v {
  width: 6px;
  background: var(--div-bg, linear-gradient(180deg, #D4A76A, #B8843E));
  border-radius: 3px;
  box-shadow:
    1px 0 1px rgba(255,255,255,0.45) inset,
    -1px 0 1px rgba(0,0,0,0.15) inset,
    2px 0 4px rgba(0,0,0,0.12);
  flex-shrink: 0;
}
.bento-divider-h {
  height: 6px;
  background: var(--div-bg, linear-gradient(90deg, #D4A76A, #B8843E));
  border-radius: 3px;
  box-shadow:
    0 1px 1px rgba(255,255,255,0.45) inset,
    0 -1px 1px rgba(0,0,0,0.15) inset,
    0 2px 4px rgba(0,0,0,0.12);
  grid-column: 1 / -1;
}

/* ご飯エリア（左1/3・縦いっぱい） */
.bento-rice {
  width: 33%;
  height: 100%;
  border-radius: 8px;
  background: rgba(139,69,19,0.05);
  border: 2px dashed rgba(139,69,19,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: all 0.3s;
  flex-shrink: 0;
}
.bento-rice.filled {
  border-color: transparent;
  background: transparent;
}
.bento-rice img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 6px;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

/* おかずエリア（右2/3・2列×2行 with plastic dividers） */
.bento-okazu {
  display: grid;
  grid-template-columns: 1fr 6px 1fr;
  grid-template-rows: 1fr 6px 1fr;
  gap: 0;
  flex: 1;
  min-height: 0;
}
/* Okazu grid dividers (injected via JS) */
.bento-okazu .okazu-div-v {
  grid-column: 2; grid-row: 1 / -1;
  background: var(--div-bg, linear-gradient(180deg, #D4A76A, #B8843E));
  border-radius: 3px;
  box-shadow:
    1px 0 1px rgba(255,255,255,0.45) inset,
    -1px 0 1px rgba(0,0,0,0.15) inset,
    2px 0 4px rgba(0,0,0,0.12);
}
.bento-okazu .okazu-div-h {
  grid-column: 1 / -1; grid-row: 2;
  background: var(--div-bg, linear-gradient(90deg, #D4A76A, #B8843E));
  border-radius: 3px;
  box-shadow:
    0 1px 1px rgba(255,255,255,0.45) inset,
    0 -1px 1px rgba(0,0,0,0.15) inset,
    0 2px 4px rgba(0,0,0,0.12);
}
.bento-slot {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  background: rgba(139,69,19,0.04);
  transition: all 0.3s;
  overflow: hidden;
}
.bento-slot.filled {
  background: rgba(255,255,255,0.3);
}
.bento-slot img, .bento-slot span {
  width: 95%; height: 95%;
  object-fit: contain;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

/* ── 右: 食材選択パネル ── */
.right-panel {
  width: 40%;
  max-width: 240px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-height: 0;
}

/* question removed — ポノの吹き出しで指示 */

/* 食材グリッド */
.food-tray {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  flex: 1;
  align-content: center;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.food-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 6px 3px;
  background: #fff;
  border-radius: 12px;
  border: 2.5px solid #FDE68A;
  box-shadow: 0 2px 8px var(--shadow);
  cursor: pointer;
  transition: transform 0.15s, opacity 0.3s;
  min-height: 72px;
}
.food-item:active { transform: scale(0.9); }
.food-item .food-img {
  width: 64px; height: 64px;
  object-fit: contain;
  pointer-events: none;
}
.food-item .food-name {
  font-size: 0.55rem; font-weight: 700; color: var(--text-light);
  pointer-events: none; white-space: nowrap;
}
.food-item.correct {
  border-color: #34D399; background: #D1FAE5;
  animation: correctPop 0.5s;
}
.food-item.wrong { animation: shake 0.35s; }
.food-item.used {
  opacity: 0.2; pointer-events: none; transform: scale(0.85);
}

@keyframes correctPop {
  0%  { transform: scale(1); }
  30% { transform: scale(1.15); }
  100%{ transform: scale(0.85); opacity: 0.2; }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-5px); }
  75%     { transform: translateX(5px); }
}

/* ===== 三色ドット ===== */
.food-item { position: relative; }
.sk-dot {
  position: absolute;
  top: 3px; right: 3px;
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.8);
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
}
.sk-dot.sk-r { background: #EF4444; }
.sk-dot.sk-y { background: #EAB308; }
.sk-dot.sk-g { background: #22C55E; }

/* ===== 三色バランス表示 ===== */
.balance-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 4px 0;
}
.balance-item {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 0.7rem;
  font-weight: 700;
}
.balance-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.1);
}
.balance-dot.b-r { background: #EF4444; }
.balance-dot.b-y { background: #EAB308; }
.balance-dot.b-g { background: #22C55E; }
.balance-dot.empty { background: #E5E5E5; }
.balance-msg {
  font-size: 0.75rem;
  font-weight: 900;
  text-align: center;
  color: var(--primary);
}

/* ===== Flying food ===== */
.food-flying {
  position: fixed; z-index: 50; pointer-events: none;
  width: 40px; height: 40px;
  object-fit: contain;
  transition: all 0.45s cubic-bezier(0.34,1.56,0.64,1);
}

/* ===== Complete overlay ===== */
.complete-overlay {
  position: fixed; inset: 0; z-index: 60;
  background: rgba(93,78,55,0.7);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.3s;
}
.complete-overlay.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.complete-card {
  background: #fff; border-radius: var(--radius);
  padding: 8px 12px; text-align: center;
  max-width: 380px; width: 85%;
  max-height: 88vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(93,78,55,0.3);
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
/* 完成お弁当のクローン */
.complete-bento {
  width: 80%;
  max-width: 85vw;
  background: #8B4513;
  border-radius: 10px;
  border: 3px solid #6B3410;
  padding: 4px;
  box-shadow: 0 3px 12px rgba(93,78,55,0.2);
}
.complete-bento .cb-inner {
  background: repeating-conic-gradient(#FFF8E7 0% 25%, #FFF1D4 0% 50%) 0 0 / 10px 10px;
  border-radius: 8px;
  display: flex;
  flex-direction: row;
  align-items: stretch;
  gap: 0;
  padding: 5px;
}
.complete-bento .cb-rice {
  width: 33%;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  flex-shrink: 0;
}
.complete-bento .cb-rice img {
  max-width: 100%; max-height: 100%;
  object-fit: contain; border-radius: 6px;
}
.complete-bento .cb-okazu {
  display: grid;
  grid-template-columns: 1fr 6px 1fr;
  grid-template-rows: 1fr 6px 1fr;
  gap: 0;
  flex: 1;
}
.complete-bento .cb-okazu > div {
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.complete-bento .cb-okazu .okazu-div-v {
  grid-column: 2; grid-row: 1 / -1;
  background: var(--div-bg, linear-gradient(180deg, #D4A76A 0%, #C4944F 40%, #B8843E 60%, #D4A76A 100%));
  border-radius: 2px;
  box-shadow:
    1px 0 1px rgba(255,255,255,0.45) inset,
    -1px 0 1px rgba(0,0,0,0.15) inset,
    2px 0 4px rgba(139,69,19,0.18);
}
.complete-bento .cb-okazu .okazu-div-h {
  grid-column: 1 / -1; grid-row: 2;
  background: var(--div-bg, linear-gradient(90deg, #D4A76A 0%, #C4944F 40%, #B8843E 60%, #D4A76A 100%));
  border-radius: 2px;
  box-shadow:
    0 1px 1px rgba(255,255,255,0.45) inset,
    0 -1px 1px rgba(0,0,0,0.15) inset,
    0 2px 4px rgba(139,69,19,0.18);
}
.complete-bento .cb-okazu img,
.complete-bento .cb-okazu span {
  width: 95%; height: 95%; object-fit: contain;
}
.complete-title { font-size: 0.95rem; font-weight: 900; color: var(--primary); }
.complete-pono {
  display: flex; align-items: center; gap: 6px;
}
.complete-pono img { width: 32px; height: 32px; object-fit: contain; }
.complete-pono-msg { font-size: 0.72rem; font-weight: 900; color: var(--text); }
.complete-card { position: relative; }
.complete-close {
  position: absolute;
  top: 6px; right: 6px;
  width: 32px; height: 32px;
  border: none; border-radius: 50%;
  background: rgba(93,78,55,0.12);
  color: var(--text);
  font-size: 1.2rem; font-weight: 900;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.complete-close:active { transform: scale(0.9); background: rgba(93,78,55,0.2); }

/* ===== Wrong toast ===== */
.wrong-toast {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.95); border-radius: 50px;
  padding: 6px 14px; font-size: 0.75rem; font-weight: 900;
  color: var(--text); box-shadow: 0 4px 16px var(--shadow);
  z-index: 40; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.wrong-toast.show { opacity: 1; }

/* ===== Confetti ===== */
#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 55; overflow: hidden; }
.conf {
  position: absolute; width: 10px; height: 10px; border-radius: 3px;
  top: -15px; animation: confFall 3s ease-in forwards;
}
@keyframes confFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}

/* ===== Portrait notice ===== */
#portrait-notice {
  display: none;
  position: fixed; inset: 0; z-index: 9980;
  background: #1a3a4a;
  flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  color: white; text-align: center; padding: 40px;
  font-family: 'Zen Maru Gothic', sans-serif;
  pointer-events: none;
}
#portrait-notice .rotate-icon { font-size: 64px; animation: rotateHint 2s ease-in-out infinite; }
@keyframes rotateHint {
  0%, 100% { transform: rotate(0deg); }
  50%      { transform: rotate(90deg); }
}
#portrait-notice p { font-size: 18px; line-height: 1.6; }

/* ===== 三色食品群 説明オーバーレイ ===== */
#sk-intro {
  position: fixed; inset: 0; z-index: 9970;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  padding: 12px;
}
#sk-intro.hidden { display: none; }
.sk-intro-card {
  background: #fff; border-radius: 24px;
  padding: 14px 16px 14px; max-width: 520px; width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  text-align: center;
}
.sk-intro-title {
  font-size: 1.2rem; font-weight: 900;
  color: var(--primary); margin-bottom: 12px;
}
.sk-intro-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
}
.sk-intro-col {
  border-radius: 16px; padding: 8px 6px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.sk-intro-col.sk-r-bg { background: #FEE2E2; }
.sk-intro-col.sk-y-bg { background: #FEF9C3; }
.sk-intro-col.sk-g-bg { background: #DCFCE7; }
.sk-intro-dot {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
}
.sk-intro-dot.sk-r { background: #EF4444; }
.sk-intro-dot.sk-y { background: #EAB308; }
.sk-intro-dot.sk-g { background: #22C55E; }
.sk-intro-label {
  font-size: 0.82rem; font-weight: 900; color: var(--text); line-height: 1.3;
}
.sk-intro-sublabel {
  font-size: 0.65rem; font-weight: 700; color: var(--text-light); line-height: 1.3;
}
.sk-intro-imgs {
  display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: 2px;
}
.sk-intro-imgs img {
  width: 44px; height: 44px; object-fit: contain;
}
.sk-intro-btn {
  margin-top: 14px; padding: 12px 32px; border: none; border-radius: 50px;
  background: linear-gradient(180deg, #FFD84D, #F5A800);
  color: #5C3A00; font-family: inherit; font-size: 1.1rem; font-weight: 900;
  cursor: pointer; box-shadow: 0 4px 0 #B87200;
}
.sk-intro-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #B87200; }

/* ===== 完成画面 三色凡例 ===== */
.sk-legend {
  display: flex; justify-content: center; gap: 12px;
  margin-top: 6px; flex-wrap: wrap;
}
.sk-legend-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 0.6rem; font-weight: 700; color: var(--text-light);
}
.sk-legend-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* ===== Tutorial ===== */
.tut-dim { position:fixed;inset:0;z-index:9995;background:rgba(93,78,55,0.6);pointer-events:auto; }
.tut-dim.hidden { display:none; }
.tut-bubble { position:fixed;z-index:9997;background:#fff;border-radius:16px;padding:12px 12px;max-width:85vw;box-shadow:0 4px 20px rgba(93,78,55,0.3);font-size:0.82rem;font-weight:700;color:#5D4E37;line-height:1.6;text-align:center;animation:tutPopIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.tut-bubble.hidden { display:none; }
@keyframes tutPopIn { from{opacity:0} to{opacity:1} }
.tut-next-btn { display:inline-block;margin-top:10px;padding:8px 24px;border:none;border-radius:50px;background:linear-gradient(135deg,#60A5FA,#818CF8);color:#fff;font-family:inherit;font-size:0.85rem;font-weight:900;cursor:pointer; }
.tut-highlight { position:relative;z-index:9996;box-shadow:0 0 0 4000px rgba(93,78,55,0.6);border-radius:16px; }
</style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="89d02cb9-6bec-4f30-a21a-65321374dbdc"></script>
</head>
<body>

<div id="portrait-notice">
  <div class="rotate-icon">📱</div>
  <p>スマホを<br><strong>よこむき</strong>にしてね！</p>
</div>

<!-- 三色食品群 説明オーバーレイ（初回のみ） -->
<div id="sk-intro" class="hidden">
  <div class="sk-intro-card">
    <div class="sk-intro-title">🍱 しょくざいの いろ</div>
    <div class="sk-intro-grid">
      <!-- 赤 -->
      <div class="sk-intro-col sk-r-bg">
        <div class="sk-intro-dot sk-r"></div>
        <div class="sk-intro-label">あか</div>
        <div class="sk-intro-sublabel">からだを つくる</div>
        <div class="sk-intro-imgs">
          <img src="../assets/images/Bento_parts/hamburg2.png" alt="ハンバーグ">
          <img src="../assets/images/Bento_parts/karaage2.png" alt="からあげ">
          <img src="../assets/images/Bento_parts/ebi_fry2.png" alt="エビフライ">
        </div>
      </div>
      <!-- 黄 -->
      <div class="sk-intro-col sk-y-bg">
        <div class="sk-intro-dot sk-y"></div>
        <div class="sk-intro-label">きいろ</div>
        <div class="sk-intro-sublabel">ちからに なる</div>
        <div class="sk-intro-imgs">
          <img src="../assets/images/Bento_parts/rice_umeboshi.png" alt="ごはん" style="transform:rotate(90deg)">
          <img src="../assets/images/Bento_parts/korokke2.png" alt="コロッケ">
          <img src="../assets/images/Bento_parts/fries2.png" alt="フライドポテト">
        </div>
      </div>
      <!-- 緑 -->
      <div class="sk-intro-col sk-g-bg">
        <div class="sk-intro-dot sk-g"></div>
        <div class="sk-intro-label">みどり</div>
        <div class="sk-intro-sublabel">ちょうしを ととのえる</div>
        <div class="sk-intro-imgs">
          <img src="../assets/images/Bento_parts/broccoli2.png" alt="ブロッコリー">
          <img src="../assets/images/Bento_parts/mini_tomato2.png" alt="ミニトマト">
          <img src="../assets/images/Bento_parts/ichigo2.png" alt="いちご">
        </div>
      </div>
    </div>
    <button class="sk-intro-btn" id="sk-intro-btn">わかった！</button>
  </div>
</div>

<div class="tut-dim hidden" id="tut-dim"></div>
<div class="tut-bubble hidden" id="tut-bubble"></div>

<div class="game-title">🍱 おべんとうづくり</div>

<div id="app">
  <!-- 左: お弁当箱 -->
  <div class="left-panel">

function shuffle(a) {
  const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b;

function foodNode(f) {

// ===== Audio =====
let _ac = null;
function getAC() { if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)(); if (_ac.state === 'suspended') _ac.resume(); return _ac; }
document.addEventListener('touchstart', () => getAC().resume(), { once: true, passive: true });
document.addEventListener('pointerdown', () => getAC().resume(), { once: true, passive: true });
function playPop() { const ac=getAC(),t=ac.currentTime,o=ac.createOscillator(),g=ac.createGain(); o.connect(g);g.connect(ac.destination); o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(900,t+0.08); g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12); o.start(t);o.stop(t+0.12); }
function playCorrect() { const ac=getAC(),t=ac.currentTime; [523,659,784].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;const s=t+i*0.1;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(0.18,s+0.02);g.gain.exponentialRampToValueAtTime(0.001,s+0.25);o.start(s);o.stop(s+0.25);}); }
function playWrong() { const ac=getAC(),t=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='triangle';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(120,t+0.18);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);o.start(t);o.stop(t+0.18); }
function playFanfare() { const ac=getAC(),t=ac.currentTime; [523,659,784,1047].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;const s=t+i*0.12;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(0.2,s+0.02);g.gain.exponentialRampToValueAtTime(0.001,s+0.45);o.start(s);o.stop(s+0.45);}); }

function loadStage() {

  const s1 = document.createElement('div'); s1.className = 'bento-slot'; s1.style.cssText='grid-column:3;grid-row:1'; okazu.appendChild(s1); okazuSlots.push(s1);
  const s2 = document.createElement('div'); s2.className = 'bento-slot'; s2.style.cssText='grid-column:1;grid-row:3'; okazu.appendChild(s2); okazuSlots.push(s2);
  const s3 = document.createElement('div'); s3.className = 'bento-slot'; s3.style.cssText='grid-column:3;grid-row:3'; okazu.appendChild(s3); okazuSlots.push(s3);

function loadStep() {
  if (stepIdx === 0) {
    // ステップ1: ごはん選択
    setSpeech('まずは ごはん！');
    const tray = document.getElementById('food-tray');
    tray.innerHTML = '';
    shuffle([...RICE]).slice(0, 6).forEach(r => {
      const item = mkItem(r);
      item.addEventListener('pointerdown', e => { e.preventDefault(); onRiceTap(item, r); });
      tray.appendChild(item);
    });
  } else if (stepIdx === 1) {
    // ステップ2: おかず4個を自由選択
    const stage = STAGES[stageIdx];
    setSpeech(stage ? stage.speech : 'すきなもの いれてね！');
    loadFreeOkazu();
  } else {
    stageComplete();
  }
}

function loadFreeOkazu() {
  const tray = document.getElementById('food-tray');
  tray.innerHTML = '';
  const all = shuffle([...OKAZU_MEAT, ...OKAZU_VEG, ...FRUITS].filter(f => !usedIds.has(fid(f)))).slice(0, 6);
  all.forEach(f => {
    const item = mkItem(f);
    item.addEventListener('pointerdown', e => { e.preventDefault(); onFreeOkazuTap(item, f); });
    tray.appendChild(item);
  });
}

let okazuPicked = 0;

function onFreeOkazuTap(el, food) {
  if (el.classList.contains('used')) return;
  playPop();
  el.classList.add('correct'); usedIds.add(fid(food)); if (food.sk) bentoSkColors.push(food.sk);
  okazuPicked++;
  const slotIdx = okazuPicked - 1;
  const slot = okazuSlots[slotIdx] || okazuSlots[okazuSlots.length - 1];
  flyFood(el, slot, food.img || food.emoji, () => {
    if (slotIdx < okazuSlots.length) {
      const n = foodNode(food); okazuSlots[slotIdx].innerHTML = '';
      okazuSlots[slotIdx].appendChild(n); okazuSlots[slotIdx].classList.add('filled');
      okazuFillCount = Math.max(okazuFillCount, slotIdx + 1);
    }
  });
  setTimeout(() => {
    el.classList.add('used'); playCorrect(); setPono(true);
    setSpeech(['やったー！','いいね！','おいしそう！','すごい！'][Math.floor(Math.random()*4)]);
    if (okazuPicked >= 4) {
      stepIdx = 2;
      setTimeout(loadStep, 500);
    } else {
      setTimeout(loadFreeOkazu, 400);
    }
  }, 400);
}

function mkItem(f) {
  const d = document.createElement('div');
  d.className = 'food-item';
  const skDot = f.sk ? `<span class="sk-dot sk-${f.sk}"></span>` : '';
  d.innerHTML = `${skDot}${foodVis(f)}<span class="food-name">${f.name}</span>`;
  return d;
}

function onRiceTap(el, rice) {
  if (el.classList.contains('used')) return;
  playPop(); el.classList.add('correct');
  flyFood(el, document.getElementById('bento-rice'), rice.img, () => {
    const r = document.getElementById('bento-rice');
    const img = document.createElement('img'); img.src = rice.img;
    r.innerHTML = ''; r.appendChild(img); r.classList.add('filled');
  });
  setTimeout(() => { el.classList.add('used'); playCorrect(); setPono(true); setSpeech('おいしそう！'); stepIdx++; setTimeout(loadStep, 500); }, 400);
}

// onOkazuTap removed — replaced by onFreeOkazuTap above

function flyFood(from, to, src, cb) {
  const fr = from.getBoundingClientRect(), tr = to.getBoundingClientRect();
  let fly;
  if (src && src.endsWith && src.endsWith('.png')) {
    fly = document.createElement('img'); fly.className = 'food-flying'; fly.src = src;
  } else {
    fly = document.createElement('span'); fly.className = 'food-flying';
    fly.style.fontSize = '2rem'; fly.style.lineHeight = '1'; fly.textContent = src;
  }
  fly.style.left = (fr.left + fr.width/2 - 20) + 'px';
  fly.style.top = (fr.top + fr.height/2 - 20) + 'px';
  document.body.appendChild(fly);
  requestAnimationFrame(() => {
    fly.style.left = (tr.left + tr.width/2 - 20) + 'px';
    fly.style.top = (tr.top + tr.height/2 - 20) + 'px';
    fly.style.opacity = '0.5'; fly.style.transform = 'scale(0.4)';
  });
  setTimeout(() => { fly.remove(); if (cb) cb(); }, 500);
}

    ? 'おだい クリア！すごい！'
    : (last ? 'つぎは おだいモードだよ！' : 'おいしそう！ありがとう！');

    const img = document.createElement('img');

    riceClone.appendChild(img);
  }
  inner.appendChild(riceClone);
  // Vertical divider between rice and okazu
  const cbVDiv = document.createElement('div');
  cbVDiv.className = 'bento-divider-v';
  inner.appendChild(cbVDiv);

  // おかず (with dividers matching game bento)
  const okazuClone = document.createElement('div');

  // slot 0 (row1 col1)
  function makeSlotClone(slot) {
    const d = document.createElement('div');

      const img = document.createElement('img');
      img.src = slot.querySelector('img').src;
      d.appendChild(img);

    return d;
  }
  const cs0 = makeSlotClone(okazuSlots[0]); cs0.style.cssText='grid-column:1;grid-row:1'; okazuClone.appendChild(cs0);
  const cs1 = makeSlotClone(okazuSlots[1]); cs1.style.cssText='grid-column:3;grid-row:1'; okazuClone.appendChild(cs1);
  const cs2 = makeSlotClone(okazuSlots[2]); cs2.style.cssText='grid-column:1;grid-row:3'; okazuClone.appendChild(cs2);
  const cs3 = makeSlotClone(okazuSlots[3]); cs3.style.cssText='grid-column:3;grid-row:3'; okazuClone.appendChild(cs3);
  const cdv = document.createElement('div'); cdv.className = 'okazu-div-v'; okazuClone.appendChild(cdv);
  const cdh = document.createElement('div'); cdh.className = 'okazu-div-h'; okazuClone.appendChild(cdh);
  inner.appendChild(okazuClone);
  cb.appendChild(inner);
  // Apply profile-based color to complete bento too
  applyBentoColor();

  // 三色バランス表示
  const rCount = bentoSkColors.filter(c => c === 'r').length;
  const yCount = bentoSkColors.filter(c => c === 'y').length;
  const gCount = bentoSkColors.filter(c => c === 'g').length;
  const balRow = document.getElementById('balance-row');
  const balMsg = document.getElementById('balance-msg');
  const dot = (cls, n) => Array(Math.min(n, 3)).fill(`<span class="balance-dot ${cls}"></span>`).join('');
  const emptyDot = (n) => Array(Math.max(0, n)).fill('<span class="balance-dot empty"></span>').join('');
  balRow.innerHTML =
    `<div class="balance-item">${dot('b-r', rCount)}${emptyDot(1 - Math.min(rCount, 1))} あか</div>` +
    `<div class="balance-item">${dot('b-y', yCount)}${emptyDot(1 - Math.min(yCount, 1))} きいろ</div>` +
    `<div class="balance-item">${dot('b-g', gCount)}${emptyDot(1 - Math.min(gCount, 1))} みどり</div>`;
  // 三色凡例（前回分を削除してから追加）
  const oldLegend = document.getElementById('sk-legend');
  if (oldLegend) oldLegend.remove();
  balRow.insertAdjacentHTML('afterend',
    '<div class="sk-legend" id="sk-legend">' +
    '<div class="sk-legend-item"><span class="sk-legend-dot" style="background:#EF4444"></span>からだを つくる</div>' +
    '<div class="sk-legend-item"><span class="sk-legend-dot" style="background:#EAB308"></span>ちからに なる</div>' +
    '<div class="sk-legend-item"><span class="sk-legend-dot" style="background:#22C55E"></span>ちょうしを ととのえる</div>' +
    '</div>');

  if (rCount > 0 && yCount > 0 && gCount > 0) {
    balMsg.textContent = '🌟 バランス ばっちり！';
  } else {
    const missing = [];
    if (rCount === 0) missing.push('あか');
    if (yCount === 0) missing.push('きいろ');
    if (gCount === 0) missing.push('みどり');
    balMsg.textContent = missing.join('と') + 'も いれると もっと いいね！';
  }

  document.getElementById('complete-btn').onclick = () => {
    document.getElementById('complete-overlay').classList.add('hidden');
    if (inChallengeMode) {
      loadChallengeStage();
    } else if (last) {
      inChallengeMode = true;
      loadChallengeStage();
    } else {
      stageIdx++;
      loadStage();
    }
  };
  document.getElementById('complete-overlay').classList.remove('hidden');
}

function launchConfetti() {
  const c = document.getElementById('confetti');
  const cols = ['#FF6B9D','#F97316','#EAB308','#22C55E','#3B82F6','#8B5CF6','#F43F5E','#06B6D4'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const p = document.createElement('div'); p.className = 'conf';
      p.style.left = Math.random()*100+'vw'; p.style.background = cols[Math.floor(Math.random()*cols.length)];
      p.style.animationDelay = Math.random()*0.4+'s'; p.style.animationDuration = (2+Math.random()*1.2)+'s';
      c.appendChild(p); setTimeout(() => p.remove(), 3600);
    }, i * 25);
  }
}

// ===== Profile & Bento Color =====
function getPlayerName() {
  try {
    const p = JSON.parse(localStorage.getItem('pono_profile') || '{}');
    return p.name || '';
  } catch { return ''; }
}
function applyBentoColor() {
  try {
    const p = JSON.parse(localStorage.getItem('pono_profile') || '{}');
    const box = document.querySelector('.bento-box');
    const cbox = document.querySelector('.complete-bento');
    let bg, border, div1, div2;
    if (p.gender === 'girl') {
      bg = '#F9A8D4'; border = '#E879A8'; div1 = '#F472B6'; div2 = '#EC4899';
    } else if (p.gender === 'boy') {
      bg = '#93C5FD'; border = '#6A9FDB'; div1 = '#60A5FA'; div2 = '#3B82F6';
    } else {
      return;
    }
    if (box) { box.style.background = bg; box.style.borderColor = border; }
    if (cbox) { cbox.style.background = bg; cbox.style.borderColor = border; }
    // 仕切りの色も統一（CSS変数で一括制御）
    document.documentElement.style.setProperty('--div-bg', `linear-gradient(180deg, ${div1}, ${div2})`);
  } catch {}
}

// ===== Challenge mode =====
function loadChallengeStage() {
  if (challengePool.length === 0) challengePool = shuffle([...CHALLENGES]);
  currentChallenge = challengePool.pop();
  challengeCorrect = 0;
  okazuFillCount = 0; okazuPicked = 0;
  usedIds.clear(); bentoSkColors = ['y'];
  stepIdx = 0;

  // Build bento
  const bentoInner = document.getElementById('bento-inner');
  bentoInner.innerHTML = '';
  const riceEl = document.createElement('div');
  riceEl.className = 'bento-rice'; riceEl.id = 'bento-rice';
  bentoInner.appendChild(riceEl);
  const vDiv = document.createElement('div');
  vDiv.className = 'bento-divider-v';
  bentoInner.appendChild(vDiv);
  const okazuGrid = document.createElement('div');
  okazuGrid.className = 'bento-okazu'; okazuGrid.id = 'bento-okazu';
  okazuSlots = [];
  const s0 = document.createElement('div'); s0.className='bento-slot'; s0.style.cssText='grid-column:1;grid-row:1'; okazuGrid.appendChild(s0); okazuSlots.push(s0);
  const s1 = document.createElement('div'); s1.className='bento-slot'; s1.style.cssText='grid-column:3;grid-row:1'; okazuGrid.appendChild(s1); okazuSlots.push(s1);
  const s2 = document.createElement('div'); s2.className='bento-slot'; s2.style.cssText='grid-column:1;grid-row:3'; okazuGrid.appendChild(s2); okazuSlots.push(s2);
  const s3 = document.createElement('div'); s3.className='bento-slot'; s3.style.cssText='grid-column:3;grid-row:3'; okazuGrid.appendChild(s3); okazuSlots.push(s3);
  const odv = document.createElement('div'); odv.className='okazu-div-v'; okazuGrid.appendChild(odv);
  const odh = document.createElement('div'); odh.className='okazu-div-h'; okazuGrid.appendChild(odh);
  bentoInner.appendChild(okazuGrid);

  applyBentoColor();
  setSpeech(currentChallenge.speech);

  // Step 1: rice
  loadChallengeRice();
}

function loadChallengeRice() {
  setSpeech('まずは ごはん！');
  const tray = document.getElementById('food-tray');
  tray.innerHTML = '';
  shuffle([...RICE, ...RICE_SMALL]).slice(0, 6).forEach(r => {
    const item = mkItem(r);
    item.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (item.classList.contains('used')) return;
      playPop(); item.classList.add('correct');
      flyFood(item, document.getElementById('bento-rice'), r.img, () => {
        const re = document.getElementById('bento-rice');
        const img = document.createElement('img'); img.src = r.img;
        re.innerHTML = ''; re.appendChild(img); re.classList.add('filled');
      });
      setTimeout(() => {
        item.classList.add('used'); playCorrect(); setPono(true);
        setSpeech(currentChallenge.speech);
        loadChallengeOkazu();
      }, 400);
    });
    tray.appendChild(item);
  });
}

function loadChallengeOkazu() {
  const tray = document.getElementById('food-tray');
  tray.innerHTML = '';
  // Mix correct and incorrect foods
  const allFoods = [...OKAZU_MEAT, ...OKAZU_VEG, ...FRUITS];
  const correct = shuffle(allFoods.filter(f => currentChallenge.filter(f) && !usedIds.has(fid(f))));
  const wrong = shuffle(allFoods.filter(f => !currentChallenge.filter(f) && !usedIds.has(fid(f))));
  const display = shuffle([...correct.slice(0, 4), ...wrong.slice(0, 2)]).slice(0, 6);

  display.forEach(f => {
    const item = mkItem(f);
    item.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (item.classList.contains('used')) return;
      playPop();
      if (currentChallenge.filter(f)) {
        item.classList.add('correct'); usedIds.add(fid(f)); if (f.sk) bentoSkColors.push(f.sk);
        const slot = okazuSlots[okazuFillCount] || okazuSlots[okazuSlots.length - 1];
        flyFood(item, slot, f.img || f.emoji, () => {
          if (okazuFillCount < okazuSlots.length) {
            const n = foodNode(f); okazuSlots[okazuFillCount].innerHTML = '';
            okazuSlots[okazuFillCount].appendChild(n); okazuSlots[okazuFillCount].classList.add('filled'); okazuFillCount++;
          }
        });
        setTimeout(() => {
          item.classList.add('used'); playCorrect(); setPono(true);
          setSpeech(['やったー！','いいね！','おいしそう！','すごい！'][Math.floor(Math.random()*4)]);
          challengeCorrect++;
          const balOk = currentChallenge.balanced
            ? (bentoSkColors.includes('r') && bentoSkColors.includes('y') && bentoSkColors.includes('g'))
            : true;
          if (challengeCorrect >= currentChallenge.need && balOk) {
            setTimeout(stageComplete, 500);
          } else {
            // Refresh tray with new items
            setTimeout(loadChallengeOkazu, 400);
          }
        }, 400);
      } else {
        item.classList.add('wrong'); playWrong();
        showToast('おだいに あうものを えらんでね！');
        setTimeout(() => item.classList.remove('wrong'), 400);
      }
    });
    tray.appendChild(item);
  });
}

// ===== Tutorial =====
function showTutorial() {
  var dim = document.getElementById('tut-dim');
  var bubble = document.getElementById('tut-bubble');
  if (!dim || !bubble) return;

  // Step 0: 導入メッセージ
  dim.classList.remove('hidden');
  bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
  bubble.innerHTML = '🍱 えいようバランスを<br>かんがえながら おべんとうを<br>つくろう！<br><button class="tut-next-btn" id="tut-next">つぎ →</button>';
  bubble.classList.remove('hidden');
  document.getElementById('tut-next').addEventListener('pointerdown', function(e) {
    e.preventDefault(); e.stopPropagation();
    // Step 0を閉じて三色モーダルを表示
    dim.classList.add('hidden');
    bubble.classList.add('hidden');
    var skIntro = document.getElementById('sk-intro');
    skIntro.classList.remove('hidden');
  });
}

// ===== Init =====
applyBentoColor();
loadStage();

initMenu({ tutorial: showTutorial });

// Portrait notice (横向き専用)
function updateNotice() {
  const n = document.getElementById('portrait-notice');
  if (!n) return;
  const portrait = window.innerHeight > window.innerWidth;
  const touch = matchMedia('(pointer:coarse)').matches;
  n.style.display = (portrait && touch) ? 'flex' : 'none';
  n.style.pointerEvents = (portrait && touch) ? 'auto' : 'none';
}
updateNotice();
window.addEventListener('orientationchange', () => { setTimeout(updateNotice, 100); setTimeout(updateNotice, 500); });
window.addEventListener('resize', updateNotice);
</script>
