<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ポノの おべんとう | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="../common/points.js"></script>
<script src="../common/achievements.js"></script>
<script src="../common/menu.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8F0;
  --primary: #F2915A;
  --primary-light: #FDDCBF;
  --text: #5D4E37;
  --text-light: #A89880;
  --shadow: rgba(93,78,55,0.12);
  --radius: 16px;
}

html, body {
  height: 100dvh;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background: linear-gradient(135deg, #FFF8F0 0%, #FFEEDD 100%);
  color: var(--text);
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

/* ===== タイトル ===== */
.game-title {
  position: fixed;
  top: 6px; left: 50%; transform: translateX(-50%);
  font-size: 1.3rem; font-weight: 900;
  color: var(--primary);
  text-shadow: 2px 2px 0 var(--primary-light);
  z-index: 5;
  pointer-events: none;
  white-space: nowrap;
}

/* ===== 横向きメインレイアウト ===== */
#app {
  display: flex;
  height: 100dvh;
  padding: 48px 6px 6px;
  gap: 6px;
}

/* ── 左: お弁当箱（できるだけ大きく） ── */
.left-panel {
  flex: 1.2;
  display: flex;
  flex-direction: column;
  min-width: 0;
  padding: 0 4px;
}

.pono-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.pono-img {
  width: 36px; height: 36px;
  object-fit: contain;
  transition: transform 0.3s;
}
.pono-img.happy { transform: scale(1.2) rotate(-5deg); }
.speech-bubble {
  background: #fff;
  border-radius: 12px;
  padding: 4px 10px;
  font-size: 0.75rem;
  font-weight: 900;
  color: var(--text);
  box-shadow: 0 1px 6px var(--shadow);
  position: relative;
  line-height: 1.3;
}
.speech-bubble::before {
  content: '';
  position: absolute;
  left: -6px; top: 50%;
  transform: translateY(-50%);
  border: 6px solid transparent;
  border-right-color: #fff;
}

/* お弁当箱 */
.bento-box {
  flex: 1;
  background: #8B4513;
  border-radius: 14px;
  border: 5px solid #6B3410;
  padding: 6px;
  box-shadow: 0 4px 20px rgba(93,78,55,0.25);
  display: flex;
  min-height: 0;
}
.bento-inner {
  background:
    repeating-conic-gradient(#FFF8E7 0% 25%, #FFF1D4 0% 50%) 0 0 / 12px 12px;
  border-radius: 10px;
  display: flex;
  flex-direction: row;
  gap: 5px;
  padding: 6px;
  flex: 1;
  min-height: 0;
}

/* ご飯エリア（左1/3・縦いっぱい） */
.bento-rice {
  width: 33%;
  height: 100%;
  border-radius: 8px;
  background: rgba(139,69,19,0.05);
  border: 2px dashed rgba(139,69,19,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: all 0.3s;
  flex-shrink: 0;
}
.bento-rice.filled {
  border-color: transparent;
  background: transparent;
}
.bento-rice img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 6px;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

/* おかずエリア（右2/3・2列×2行） */
.bento-okazu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 2px;
  flex: 1;
  min-height: 0;
}
.bento-slot {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  background: rgba(139,69,19,0.04);
  border: 1.5px dashed rgba(139,69,19,0.1);
  transition: all 0.3s;
  overflow: hidden;
}
.bento-slot.filled {
  border-color: transparent;
  background: transparent;
}
.bento-slot img, .bento-slot span {
  width: 100%; height: 100%;
  object-fit: cover;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

/* ── 右: 食材選択パネル ── */
.right-panel {
  width: 40%;
  max-width: 240px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-height: 0;
}

/* question removed — ポノの吹き出しで指示 */

/* 食材グリッド */
.food-tray {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  flex: 1;
  align-content: center;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.food-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 6px 3px;
  background: #fff;
  border-radius: 12px;
  border: 2.5px solid #FDE68A;
  box-shadow: 0 2px 8px var(--shadow);
  cursor: pointer;
  transition: transform 0.15s, opacity 0.3s;
  min-height: 64px;
}
.food-item:active { transform: scale(0.9); }
.food-item .food-img {
  width: 44px; height: 44px;
  object-fit: contain;
  pointer-events: none;
}
.food-item .food-name {
  font-size: 0.55rem; font-weight: 700; color: var(--text-light);
  pointer-events: none; white-space: nowrap;
}
.food-item.correct {
  border-color: #34D399; background: #D1FAE5;
  animation: correctPop 0.5s;
}
.food-item.wrong { animation: shake 0.35s; }
.food-item.used {
  opacity: 0.2; pointer-events: none; transform: scale(0.85);
}

@keyframes correctPop {
  0%  { transform: scale(1); }
  30% { transform: scale(1.15); }
  100%{ transform: scale(0.85); opacity: 0.2; }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-5px); }
  75%     { transform: translateX(5px); }
}

/* ===== Flying food ===== */
.food-flying {
  position: fixed; z-index: 50; pointer-events: none;
  width: 40px; height: 40px;
  object-fit: contain;
  transition: all 0.45s cubic-bezier(0.34,1.56,0.64,1);
}

/* ===== Complete overlay ===== */
.complete-overlay {
  position: fixed; inset: 0; z-index: 60;
  background: rgba(93,78,55,0.7);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.3s;
}
.complete-overlay.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.complete-card {
  background: #fff; border-radius: var(--radius);
  padding: 16px 16px 14px; text-align: center;
  max-width: 420px; width: 90%;
  box-shadow: 0 8px 40px rgba(93,78,55,0.3);
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
/* 完成お弁当のクローン */
.complete-bento {
  width: 90%;
  max-width: 360px;
  background: #8B4513;
  border-radius: 12px;
  border: 4px solid #6B3410;
  padding: 5px;
  box-shadow: 0 4px 16px rgba(93,78,55,0.2);
}
.complete-bento .cb-inner {
  background: repeating-conic-gradient(#FFF8E7 0% 25%, #FFF1D4 0% 50%) 0 0 / 10px 10px;
  border-radius: 8px;
  display: flex;
  flex-direction: row;
  align-items: stretch;
  gap: 4px;
  padding: 5px;
}
.complete-bento .cb-rice {
  width: 33%;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  flex-shrink: 0;
}
.complete-bento .cb-rice img {
  max-width: 100%; max-height: 100%;
  object-fit: contain; border-radius: 6px;
}
.complete-bento .cb-okazu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 4px;
  flex: 1;
}
.complete-bento .cb-okazu > div {
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.complete-bento .cb-okazu img,
.complete-bento .cb-okazu span {
  width: 100%; height: 100%; object-fit: cover;
}
.complete-title { font-size: 1.1rem; font-weight: 900; color: var(--primary); }
.complete-pono {
  display: flex; align-items: center; gap: 8px;
}
.complete-pono img { width: 40px; height: 40px; object-fit: contain; }
.complete-pono-msg { font-size: 0.8rem; font-weight: 900; color: var(--text); }
.complete-btn {
  padding: 10px 28px; border: none; border-radius: 50px;
  background: linear-gradient(135deg, #60A5FA, #818CF8);
  color: #fff; font-family: inherit; font-size: 0.9rem; font-weight: 900;
  cursor: pointer; box-shadow: 0 4px 14px rgba(96,165,250,0.4);
  margin-top: 2px;
}
.complete-btn:active { transform: scale(0.95); }

/* ===== Wrong toast ===== */
.wrong-toast {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.95); border-radius: 50px;
  padding: 6px 14px; font-size: 0.75rem; font-weight: 900;
  color: var(--text); box-shadow: 0 4px 16px var(--shadow);
  z-index: 40; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.wrong-toast.show { opacity: 1; }

/* ===== Confetti ===== */
#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 55; overflow: hidden; }
.conf {
  position: absolute; width: 10px; height: 10px; border-radius: 3px;
  top: -15px; animation: confFall 3s ease-in forwards;
}
@keyframes confFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}

/* ===== Portrait notice ===== */
#portrait-notice {
  display: none;
  position: fixed; inset: 0; z-index: 9980;
  background: #1a3a4a;
  flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  color: white; text-align: center; padding: 40px;
  font-family: 'Zen Maru Gothic', sans-serif;
  pointer-events: none;
}
#portrait-notice .rotate-icon { font-size: 64px; animation: rotateHint 2s ease-in-out infinite; }
@keyframes rotateHint {
  0%, 100% { transform: rotate(0deg); }
  50%      { transform: rotate(90deg); }
}
#portrait-notice p { font-size: 18px; line-height: 1.6; }
</style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="89d02cb9-6bec-4f30-a21a-65321374dbdc"></script>
</head>
<body>

<div id="portrait-notice">
  <div class="rotate-icon">📱</div>
  <p>スマホを<br><strong>よこむき</strong>にしてね！</p>
</div>

<div class="game-title">🍱 おべんとうづくり</div>

<div id="app">
  <!-- 左: お弁当箱 -->
  <div class="left-panel">
    <div class="bento-box">
      <div class="bento-inner" id="bento-inner">
        <div class="bento-rice" id="bento-rice"></div>
        <div class="bento-okazu" id="bento-okazu"></div>
      </div>
    </div>
  </div>

  <!-- 右: ポノ + 食材選択 -->
  <div class="right-panel">
    <div class="pono-row">
      <img src="../assets/images/characters/pono/pono_face_circle.png" class="pono-img" id="pono-img" alt="ポノ">
      <div class="speech-bubble" id="speech">おなか すいたなー</div>
    </div>
    <div class="food-tray" id="food-tray"></div>
  </div>
</div>

<div class="complete-overlay hidden" id="complete-overlay">
  <div class="complete-card">
    <div class="complete-title" id="complete-title">🎉 おべんとう かんせい！</div>
    <div class="complete-bento" id="complete-bento"></div>
    <div class="complete-pono">
      <img src="../assets/images/characters/pono/pono_face_circle.png" alt="ポノ">
      <div class="complete-pono-msg" id="complete-msg">おいしそう！ありがとう！</div>
    </div>
    <button class="complete-btn" id="complete-btn">つぎへ →</button>
  </div>
</div>

<div class="wrong-toast" id="wrong-toast"></div>
<div id="confetti"></div>

<script>
const P = '../assets/images/Bento_parts/';

// ===== Food data =====
const RICE = [
  { img: P+'rice_umeboshi.png',  name: 'うめぼしごはん' },
  { img: P+'rice_goma.png',      name: 'ごまごはん' },
  { img: P+'rice_furikake.png',  name: 'ふりかけごはん' },
];
const RICE_SMALL = [
  { img: P+'gohan_shiro.png',    name: 'しろごはん' },
  { img: P+'gohan_furikake.png', name: 'ふりかけごはん' },
  { img: P+'onigiri_ume.png',    name: 'うめおにぎり' },
  { img: P+'onigiri.png',        name: 'おにぎり' },
];

const OKAZU_MEAT = [
  { img: P+'bento_009.png', name: 'タコウインナー', cat: 'meat' },
  { img: P+'bento_005.png', name: 'ハンバーグ',     cat: 'meat' },
  { img: P+'bento_008.png', name: 'からあげ',       cat: 'meat' },
  { img: P+'bento_004.png', name: 'エビフライ',     cat: 'meat' },
  { img: P+'bento_014.png', name: 'フライドポテト', cat: 'meat' },
  { img: P+'bento_007.png', name: 'たまごやき',     cat: 'meat' },
  { img: P+'bento_011.png', name: 'ミートボール',   cat: 'meat' },
  { img: P+'bento_018.png', name: 'コロッケ',       cat: 'meat' },
  { img: P+'bento_025.png', name: 'ナポリタン',     cat: 'meat' },
  { img: P+'bento_003.png', name: 'やきざけ',       cat: 'meat' },
];

const OKAZU_VEG = [
  { img: P+'bento_016.png', name: 'ブロッコリー',       cat: 'veg' },
  { img: P+'bento_028.png', name: 'ミニトマト',         cat: 'veg' },
  { img: P+'bento_012.png', name: 'コーンほうれんそう', cat: 'veg' },
  { img: P+'bento_026.png', name: 'きんぴらごぼう',     cat: 'veg' },
  { img: P+'bento_021.png', name: 'えだまめ',           cat: 'veg' },
  { img: P+'bento_017.png', name: 'ポテトサラダ',       cat: 'veg' },
  { img: P+'bento_006.png', name: 'にんじんいんげん',   cat: 'veg' },
  { img: P+'bento_013.png', name: 'ブロッコリーコーン', cat: 'veg' },
];

const FRUITS = [
  { img: P+'bento_023.png', name: 'いちご',   cat: 'fruit' },
  { img: P+'bento_027.png', name: 'みかん',   cat: 'fruit' },
  { img: P+'bento_020.png', name: 'ぶどう',   cat: 'fruit' },
  { img: P+'bento_022.png', name: 'りんご',   cat: 'fruit' },
  { img: P+'bento_029.png', name: 'バナナ',   cat: 'fruit' },
  { img: P+'bento_024.png', name: 'ゼリー',   cat: 'fruit' },
  { img: P+'bento_030.png', name: 'プリン',   cat: 'fruit' },
  { img: P+'bento_019.png', name: 'メロン',   cat: 'fruit' },
];

// ===== Stages =====
const STAGES = [
  {
    steps: [
      { type: 'rice', label: 'ごはん', css: 'rice', speech: 'まずは ごはん！' },
      { type: 'pick', pool: 'meat', count: 2, label: 'おかず', css: 'meat', speech: 'おかずを いれよう！' },
      { type: 'pick', pool: 'veg',  count: 1, label: 'やさい', css: 'veg', speech: 'やさいも いれてね！' },
      { type: 'pick', pool: 'fruit',count: 1, label: 'フルーツ', css: 'fruit', speech: 'デザート！' },
    ]
  },
  {
    steps: [
      { type: 'rice', label: 'ごはん', css: 'rice', speech: 'ごはんを えらんでね！' },
      { type: 'free', count: 3, label: 'すきなもの', css: 'free', speech: 'すきなものを いれてね！' },
    ]
  },
  {
    steps: [
      { type: 'rice', label: 'ごはん', css: 'rice', speech: 'きょうの ごはんは？' },
      { type: 'pick', pool: 'meat', count: 2, label: 'おかず', css: 'meat', speech: 'もりもり おかず！' },
      { type: 'pick', pool: 'veg',  count: 1, label: 'やさい', css: 'veg', speech: 'やさいも だいじ！' },
      { type: 'pick', pool: 'fruit',count: 1, label: 'フルーツ', css: 'fruit', speech: 'さいごに フルーツ！' },
    ]
  },
];

// ===== State =====
let stageIdx = 0, stepIdx = 0, okazuSlots = [], okazuFillCount = 0, pickedInStep = 0;
let usedIds = new Set();

// ===== Helpers =====
function shuffle(a) {
  const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b;
}
function fid(f) { return f.img || f.emoji; }
function foodVis(f) {
  return f.img
    ? `<img class="food-img" src="${f.img}" alt="${f.name}">`
    : `<span class="food-img" style="font-size:2rem;line-height:1;display:flex;align-items:center;justify-content:center">${f.emoji}</span>`;
}
function foodNode(f) {
  if (f.img) { const i = document.createElement('img'); i.src = f.img; return i; }
  const s = document.createElement('span'); s.style.cssText = 'font-size:1.6rem;line-height:1'; s.textContent = f.emoji; return s;
}

// ===== Audio =====
let _ac = null;
function getAC() { if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)(); if (_ac.state === 'suspended') _ac.resume(); return _ac; }
document.addEventListener('touchstart', () => getAC().resume(), { once: true, passive: true });
document.addEventListener('pointerdown', () => getAC().resume(), { once: true, passive: true });
function playPop() { const ac=getAC(),t=ac.currentTime,o=ac.createOscillator(),g=ac.createGain(); o.connect(g);g.connect(ac.destination); o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(900,t+0.08); g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12); o.start(t);o.stop(t+0.12); }
function playCorrect() { const ac=getAC(),t=ac.currentTime; [523,659,784].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;const s=t+i*0.1;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(0.18,s+0.02);g.gain.exponentialRampToValueAtTime(0.001,s+0.25);o.start(s);o.stop(s+0.25);}); }
function playWrong() { const ac=getAC(),t=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='triangle';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(120,t+0.18);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);o.start(t);o.stop(t+0.18); }
function playFanfare() { const ac=getAC(),t=ac.currentTime; [523,659,784,1047].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;const s=t+i*0.12;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(0.2,s+0.02);g.gain.exponentialRampToValueAtTime(0.001,s+0.45);o.start(s);o.stop(s+0.45);}); }

// ===== UI =====
function setSpeech(t) { document.getElementById('speech').textContent = t; }
function setPono(h) { const i=document.getElementById('pono-img'); if(h){i.classList.add('happy');setTimeout(()=>i.classList.remove('happy'),600);} }

// ===== Game =====
function loadStage() {
  stepIdx = 0; pickedInStep = 0; okazuFillCount = 0; usedIds.clear();
  const rice = document.getElementById('bento-rice');
  rice.innerHTML = ''; rice.classList.remove('filled');
  const okazu = document.getElementById('bento-okazu');
  okazu.innerHTML = ''; okazuSlots = [];
  for (let i = 0; i < 4; i++) { const s = document.createElement('div'); s.className = 'bento-slot'; okazu.appendChild(s); okazuSlots.push(s); }
  setSpeech('おべんとう つくろう！');
  setTimeout(loadStep, 400);
}

function loadStep() {
  const stage = STAGES[stageIdx];
  if (stepIdx >= stage.steps.length) { stageComplete(); return; }
  const step = stage.steps[stepIdx];
  pickedInStep = 0;
  setSpeech(step.speech);
  setSpeech(step.speech);

  const tray = document.getElementById('food-tray');
  tray.innerHTML = '';

  if (step.type === 'rice') {
    shuffle([...RICE, ...RICE_SMALL]).slice(0, 6).forEach(r => {
      const item = mkItem(r);
      item.addEventListener('pointerdown', e => { e.preventDefault(); onRiceTap(item, r); });
      tray.appendChild(item);
    });
  } else if (step.type === 'free') {
    shuffle([...OKAZU_MEAT, ...OKAZU_VEG, ...FRUITS].filter(f => !usedIds.has(fid(f)))).slice(0, 6).forEach(f => {
      const item = mkItem(f);
      item.addEventListener('pointerdown', e => { e.preventDefault(); onOkazuTap(item, f, step); });
      tray.appendChild(item);
    });
  } else {
    const pools = { meat: OKAZU_MEAT, veg: OKAZU_VEG, fruit: FRUITS };
    const correct = shuffle(pools[step.pool].filter(f => !usedIds.has(fid(f))));
    const others = shuffle([...OKAZU_MEAT,...OKAZU_VEG,...FRUITS].filter(f => f.cat !== step.pool && !usedIds.has(fid(f))));
    shuffle([...correct.slice(0, 3), ...others.slice(0, 3)]).slice(0, 6).forEach(f => {
      const item = mkItem(f);
      item.addEventListener('pointerdown', e => { e.preventDefault(); onOkazuTap(item, f, step); });
      tray.appendChild(item);
    });
  }
}

function mkItem(f) {
  const d = document.createElement('div');
  d.className = 'food-item';
  d.innerHTML = `${foodVis(f)}<span class="food-name">${f.name}</span>`;
  return d;
}

function onRiceTap(el, rice) {
  if (el.classList.contains('used')) return;
  playPop(); el.classList.add('correct');
  flyFood(el, document.getElementById('bento-rice'), rice.img, () => {
    const r = document.getElementById('bento-rice');
    const img = document.createElement('img'); img.src = rice.img;
    r.innerHTML = ''; r.appendChild(img); r.classList.add('filled');
  });
  setTimeout(() => { el.classList.add('used'); playCorrect(); setPono(true); setSpeech('おいしそう！'); stepIdx++; setTimeout(loadStep, 500); }, 400);
}

function onOkazuTap(el, food, step) {
  if (el.classList.contains('used')) return;
  playPop();
  if (step.type === 'free' || food.cat === step.pool) {
    el.classList.add('correct'); usedIds.add(fid(food));
    const slot = okazuSlots[okazuFillCount] || okazuSlots[okazuSlots.length - 1];
    flyFood(el, slot, food.img || food.emoji, () => {
      if (okazuFillCount < okazuSlots.length) {
        const n = foodNode(food); okazuSlots[okazuFillCount].innerHTML = '';
        okazuSlots[okazuFillCount].appendChild(n); okazuSlots[okazuFillCount].classList.add('filled'); okazuFillCount++;
      }
    });
    setTimeout(() => {
      el.classList.add('used'); playCorrect(); setPono(true);
      setSpeech(['やったー！','いいね！','おいしそう！','すごい！'][Math.floor(Math.random()*4)]);
      pickedInStep++;
      if (pickedInStep >= (step.count || 1)) { stepIdx++; setTimeout(loadStep, 500); }
    }, 400);
  } else {
    el.classList.add('wrong'); playWrong();
    const cn = { meat:'おかず', veg:'やさい', fruit:'フルーツ' };
    showToast('これは ' + (cn[step.pool]||'') + ' じゃないよ〜');
    setTimeout(() => el.classList.remove('wrong'), 400);
  }
}

function flyFood(from, to, src, cb) {
  const fr = from.getBoundingClientRect(), tr = to.getBoundingClientRect();
  let fly;
  if (src && src.endsWith && src.endsWith('.png')) {
    fly = document.createElement('img'); fly.className = 'food-flying'; fly.src = src;
  } else {
    fly = document.createElement('span'); fly.className = 'food-flying';
    fly.style.fontSize = '2rem'; fly.style.lineHeight = '1'; fly.textContent = src;
  }
  fly.style.left = (fr.left + fr.width/2 - 20) + 'px';
  fly.style.top = (fr.top + fr.height/2 - 20) + 'px';
  document.body.appendChild(fly);
  requestAnimationFrame(() => {
    fly.style.left = (tr.left + tr.width/2 - 20) + 'px';
    fly.style.top = (tr.top + tr.height/2 - 20) + 'px';
    fly.style.opacity = '0.5'; fly.style.transform = 'scale(0.4)';
  });
  setTimeout(() => { fly.remove(); if (cb) cb(); }, 500);
}

function showToast(m) { const t = document.getElementById('wrong-toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1200); }

function stageComplete() {
  playFanfare(); launchConfetti(); awardPoints(5);
  setSpeech('ありがとう！'); setPono(true);
  const last = stageIdx >= STAGES.length - 1;
  document.getElementById('complete-title').textContent = '🎉 おべんとう かんせい！';
  document.getElementById('complete-msg').textContent = last ? 'ぜんぶ つくれたね！すごい！' : 'おいしそう！ありがとう！';
  document.getElementById('complete-btn').textContent = last ? 'もういっかい 🍱' : 'つぎへ →';

  // お弁当箱の中身をクローンして完成表示
  const cb = document.getElementById('complete-bento');
  cb.innerHTML = '';
  const inner = document.createElement('div');
  inner.className = 'cb-inner';
  // ご飯
  const riceEl = document.getElementById('bento-rice');
  const riceClone = document.createElement('div');
  riceClone.className = 'cb-rice';
  if (riceEl.querySelector('img')) {
    const img = document.createElement('img');
    img.src = riceEl.querySelector('img').src;
    riceClone.appendChild(img);
  }
  inner.appendChild(riceClone);
  // おかず
  const okazuClone = document.createElement('div');
  okazuClone.className = 'cb-okazu';
  okazuSlots.forEach(slot => {
    const d = document.createElement('div');
    if (slot.querySelector('img')) {
      const img = document.createElement('img');
      img.src = slot.querySelector('img').src;
      d.appendChild(img);
    } else if (slot.querySelector('span')) {
      const s = document.createElement('span');
      s.textContent = slot.querySelector('span').textContent;
      s.style.cssText = 'font-size:1.4rem;line-height:1';
      d.appendChild(s);
    }
    okazuClone.appendChild(d);
  });
  inner.appendChild(okazuClone);
  cb.appendChild(inner);
  document.getElementById('complete-btn').onclick = () => {
    document.getElementById('complete-overlay').classList.add('hidden');
    if (last) stageIdx = 0; else stageIdx++;
    loadStage();
  };
  document.getElementById('complete-overlay').classList.remove('hidden');
}

function launchConfetti() {
  const c = document.getElementById('confetti');
  const cols = ['#FF6B9D','#F97316','#EAB308','#22C55E','#3B82F6','#8B5CF6','#F43F5E','#06B6D4'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const p = document.createElement('div'); p.className = 'conf';
      p.style.left = Math.random()*100+'vw'; p.style.background = cols[Math.floor(Math.random()*cols.length)];
      p.style.animationDelay = Math.random()*0.4+'s'; p.style.animationDuration = (2+Math.random()*1.2)+'s';
      c.appendChild(p); setTimeout(() => p.remove(), 3600);
    }, i * 25);
  }
}

// ===== Init =====
loadStage();
initMenu();

// Portrait notice (横向き専用)
function updateNotice() {
  const n = document.getElementById('portrait-notice');
  if (!n) return;
  const portrait = window.innerHeight > window.innerWidth;
  const touch = matchMedia('(pointer:coarse)').matches;
  n.style.display = (portrait && touch) ? 'flex' : 'none';
  n.style.pointerEvents = (portrait && touch) ? 'auto' : 'none';
}
updateNotice();
window.addEventListener('orientationchange', () => { setTimeout(updateNotice, 100); setTimeout(updateNotice, 500); });
window.addEventListener('resize', updateNotice);
</script>
