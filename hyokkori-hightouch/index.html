<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ひょっこりハイタッチ | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<!-- FOUC guard: init 完了まで stage を非表示にしてチラ見えを防ぐ (pakupaku-catch/index.html 踏襲) -->
<style>html,body{background:#274b3d}#stage{visibility:hidden}body.pono-game-ready #stage{visibility:visible}</style>
<script>document.addEventListener('DOMContentLoaded',function(){requestAnimationFrame(function(){requestAnimationFrame(function(){document.body.classList.add('pono-game-ready')})})});</script>

<script src="../common/preload-helper.js"></script>
<!-- NOTE: common/preload-helper.js の GAME_WARM_ASSETS に 'hyokkori-hightouch' エントリが
     未登録の間は warmGameAssets() は no-op で安全に何もしない (list未登録→false)。
     統合担当が GAME_WARM_ASSETS に追加した時点でこの呼び出しがそのまま効き始める。 -->
<script>window.addEventListener('DOMContentLoaded',function(){if(window.PonoPreload)window.PonoPreload.warmGameAssets('hyokkori-hightouch');});</script>
<script src="../common/haptics.js"></script>
<script src="../common/achievements.js"></script>
<script src="../common/menu.js"></script>
<script src="../common/highscore.js"></script>

<link rel="preload" as="image" href="../assets/images/hyokkori-hightouch/friend_hikari_momonga_bonus_awake.png">
<link rel="stylesheet" href="styles.css?v=20260723-1428">
</head>
<body>

<div id="landscape-notice" role="dialog" aria-modal="true" aria-label="よこむきの おねがい" aria-hidden="true">
  <div class="rotate-icon">📱</div>
  <p>スマホを<br><strong>よこむき</strong>にしてね！</p>
  <a class="landscape-back" href="../play.html">ホームにもどる</a>
</div>

<div class="tut-dim hidden" id="tut-dim"></div>
<div class="tut-bubble hidden" id="tut-bubble"></div>

<div id="stage">

  <div id="hud">
    <div class="hud-pill hud-timer" id="hud-timer">⏱ 30</div>
    <div class="hh-sr-only" id="combo-status-sr" role="status" aria-live="polite" aria-atomic="true"></div>
    <div class="hud-pill hud-score" id="hud-score">🖐️ 0</div>
  </div>

  <div id="combo-hud" data-tier="0" aria-hidden="true">
    <div class="combo-core">
      <span id="combo-count">0</span>
      <span class="combo-label">コンボ</span>
    </div>
  </div>

  <div id="start-screen">
    <img class="start-pono icon" src="../assets/images/hyokkori-hightouch/pono_title_highfive.png" alt="ポノが ハイタッチを しているよ" draggable="false">
    <div class="start-copy">
      <div class="title" id="start-title">ひょっこりハイタッチ</div>
      <div class="desc">30びょうで ハイタッチ！<br>コンボを どこまで つなげるかな？</div>
      <button class="tap-btn" id="start-btn">タップで はじめる</button>
    </div>
  </div>

  <div id="countdown-screen">
    <div class="cd-text" id="cd-text">よーい…</div>
  </div>

  <!-- .hh-hole は6個 (3列x2行) とも同一マークアップ (data-hole の番号だけ違う) なので
       テンプレート1個 + js/game.js の buildHoles() で複製生成する (重複マークアップ排除)。 -->
  <template id="hh-hole-tpl">
    <div class="hh-hole">
      <img class="hh-hideout hh-hideout-base hh-mound" src="../assets/images/hyokkori-hightouch/hideout_leaf_bush.png" alt="" draggable="false" aria-hidden="true">
      <div class="hh-window">
        <div class="hh-char-wrap">
          <img class="hh-char" alt="" draggable="false">
          <span class="hh-sparkle" aria-hidden="true"></span>
          <img class="hh-sleep-fx" src="../assets/images/hyokkori-hightouch/fx_sleep_moon_cloud.png" alt="" draggable="false" aria-hidden="true">
          <img class="hh-hit-fx" src="../assets/images/hyokkori-hightouch/fx_highfive_burst.png" alt="" draggable="false" aria-hidden="true">
          <span class="hh-bonus-badge" aria-hidden="true">30てん</span>
          <span class="hh-score-pop" aria-hidden="true"></span>
          <div class="hh-shh-bubble" aria-hidden="true">しーっ</div>
        </div>
      </div>
      <img class="hh-hideout hh-hideout-foreground" src="../assets/images/hyokkori-hightouch/hideout_leaf_bush.png" alt="" draggable="false" aria-hidden="true">
      <img class="hh-dust" src="../assets/images/hyokkori-hightouch/fx_leaf_puff.png" alt="" draggable="false" aria-hidden="true">
    </div>
  </template>
  <div id="board" data-last-successful-hole=""></div>

  <div id="overheat-banner" aria-hidden="true">
    <img class="overheat-fx" src="../assets/images/hyokkori-hightouch/fx_overheat_swirl.png" alt="" draggable="false">
    <span>ゆっくり つなごう！</span>
  </div>

  <canvas id="fx-canvas" aria-hidden="true"></canvas>

  <div id="result-overlay" role="dialog" aria-modal="true" aria-labelledby="result-title">
    <div id="result-card">
      <img class="result-pono" src="../assets/images/hyokkori-hightouch/pono_result_bloom.png" alt="おはなを もって ハイタッチする ポノ" draggable="false">
      <div class="result-copy">
        <div class="result-banner" id="result-title">おしまい！</div>
        <div class="result-score" id="result-score">0 てん</div>
        <div id="result-combo">さいだい 0コンボ</div>
        <div id="result-best-combo">きろく 0コンボ</div>
        <div class="result-combo-new hidden" id="result-combo-new">コンボ しんきろく！</div>
        <div class="result-new hidden" id="result-new">スコア しんきろく！</div>
        <button class="result-btn" id="retry-btn">もういちど</button>
      </div>
    </div>
  </div>
</div>

<script src="js/logic.js?v=20260723-1428"></script>
<script src="js/game.js?v=20260723-1428"></script>
</body>
</html>
