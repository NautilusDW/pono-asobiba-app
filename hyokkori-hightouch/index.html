<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ひょっこりハイタッチ | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<!-- FOUC guard: init 完了まで stage を非表示にしてチラ見えを防ぐ (pakupaku-catch/index.html 踏襲) -->
<style>
html,body{background:#274b3d}
#stage{visibility:hidden}
body.pono-game-ready #stage{visibility:visible}
#loadErrorScreen{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;background:rgba(39,75,61,.96);color:#fff;font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif;text-align:center}
#loadErrorScreen[hidden]{display:none}
#loadErrorScreen .load-error-message{font-size:1.05rem;font-weight:900;line-height:1.6}
#loadErrorScreen button{min-height:48px;padding:12px 32px;border:0;border-radius:999px;background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;font-family:inherit;font-size:1rem;font-weight:900;cursor:pointer}
</style>
<script>
window.__showHyokkoriLoadError=function(){
  var overlay=document.getElementById('loadErrorScreen');
  if(!overlay)return;
  overlay.hidden=false;
  document.body.classList.add('pono-game-ready');
  document.body.classList.remove('pono-game-loading');
  var button=document.getElementById('load-error-retry');
  if(button&&!button.dataset.bound){
    button.dataset.bound='1';
    button.addEventListener('click',function(){location.reload()});
  }
};
</script>

<script src="../common/preload-helper.js"></script>
<!-- NOTE: common/preload-helper.js の GAME_WARM_ASSETS に 'hyokkori-hightouch' エントリが
     未登録の間は warmGameAssets() は no-op で安全に何もしない (list未登録→false)。
     統合担当が GAME_WARM_ASSETS に追加した時点でこの呼び出しがそのまま効き始める。 -->
<script>window.addEventListener('DOMContentLoaded',function(){if(window.PonoPreload)window.PonoPreload.warmGameAssets('hyokkori-hightouch');});</script>
<script src="../common/haptics.js"></script>
<script src="../common/achievements.js"></script>
<script src="../common/menu.js"></script>
<script src="../common/highscore.js"></script>

<link rel="stylesheet" href="styles.css?v=20260723-1442">
</head>
<body>

<div id="loadErrorScreen" role="alert" hidden>
  <div class="load-error-message">よみこみが うまくいかなかったよ<br>もういちど ためしてね</div>
  <button id="load-error-retry" type="button">🔄 もういちど よみこむ</button>
</div>

<div id="landscape-notice" role="dialog" aria-modal="true" aria-label="よこむきの おねがい" aria-hidden="true">
  <div class="rotate-icon">📱</div>
  <p>スマホを<br><strong>よこむき</strong>にしてね！</p>
  <a class="landscape-back" href="../play.html">ホームにもどる</a>
</div>

<div class="tut-dim hidden" id="tut-dim"></div>
<div class="tut-bubble hidden" id="tut-bubble"></div>

<div id="stage">

  <div id="hud">
    <div class="hud-pill hud-timer" id="hud-timer">⏱ 30</div>
    <div class="hh-sr-only" id="combo-status-sr" role="status" aria-live="polite" aria-atomic="true"></div>
    <div class="hud-pill hud-score" id="hud-score">🖐️ 0</div>
  </div>

  <div id="combo-hud" data-tier="0" aria-hidden="true">
    <div class="combo-core">
      <span id="combo-count">0</span>
      <span class="combo-label">コンボ</span>
    </div>
  </div>

  <div id="start-screen">
    <img class="start-pono icon" src="../assets/images/hyokkori-hightouch/pono_title_highfive.png" alt="ポノが ハイタッチを しているよ" draggable="false">
    <div class="start-copy">
      <div class="title" id="start-title">ひょっこりハイタッチ</div>
      <div class="start-location" id="start-location">こもれびの ひろば</div>
      <div class="desc">おきている どうぶつと<br>ハイタッチしよう！</div>
      <button class="tap-btn" id="start-btn" type="button">ここで あそぶ</button>
    </div>
  </div>

  <div id="countdown-screen">
    <div class="cd-text" id="cd-text">よーい…</div>
  </div>

  <!-- 場所定義の slots 数だけ、js/game.js の buildHoles() が複製する。
       各スロットは実buttonとし、座標と遠近はCSS変数で受け取る。 -->
  <template id="hh-hole-tpl">
    <button class="hh-hole" type="button">
      <img class="hh-hideout hh-hideout-base hh-mound" src="../assets/images/hyokkori-hightouch/hideout_leaf_bush.png" alt="" draggable="false" aria-hidden="true">
      <!-- 動物本体だけを窓でマスクする。月・光・加点表示は同じwrap内の
           マスク外レイヤーに置き、右上や上端が途中で切れないようにする。 -->
      <span class="hh-char-wrap">
        <span class="hh-window">
          <span class="hh-char-rise">
            <img class="hh-char" alt="" draggable="false">
          </span>
        </span>
        <span class="hh-sparkle" aria-hidden="true"></span>
        <img class="hh-sleep-fx" src="../assets/images/hyokkori-hightouch/fx_sleep_moon_cloud.png" alt="" draggable="false" aria-hidden="true">
        <img class="hh-hit-fx" src="../assets/images/hyokkori-hightouch/fx_highfive_burst.png" alt="" draggable="false" aria-hidden="true">
        <span class="hh-bonus-badge" aria-hidden="true">30てん</span>
        <span class="hh-score-pop" aria-hidden="true"></span>
        <span class="hh-shh-bubble" aria-hidden="true">しーっ</span>
      </span>
      <img class="hh-hideout hh-hideout-foreground" src="../assets/images/hyokkori-hightouch/hideout_leaf_bush.png" alt="" draggable="false" aria-hidden="true">
      <img class="hh-dust" src="../assets/images/hyokkori-hightouch/fx_leaf_puff.png" alt="" draggable="false" aria-hidden="true">
    </button>
  </template>
  <div id="board" data-last-successful-hole=""></div>

  <div id="overheat-banner" aria-hidden="true">
    <img class="overheat-fx" src="../assets/images/hyokkori-hightouch/fx_overheat_swirl.png" alt="" draggable="false">
    <span>ゆっくり つなごう！</span>
  </div>

  <canvas id="fx-canvas" aria-hidden="true"></canvas>

  <div id="result-overlay" role="dialog" aria-modal="true" aria-labelledby="result-title">
    <div id="result-card">
      <img class="result-pono" src="../assets/images/hyokkori-hightouch/pono_result_bloom.png" alt="おはなを もって ハイタッチする ポノ" loading="lazy" decoding="async" draggable="false">
      <div class="result-copy">
        <div class="result-banner" id="result-title">おしまい！</div>
        <div class="result-score" id="result-score">0 てん</div>
        <div class="result-combo-line">
          <span id="result-combo">さいだい 0コンボ</span>
          <span class="result-combo-separator" aria-hidden="true">・</span>
          <span id="result-best-combo">きろく 0コンボ</span>
        </div>
        <div class="result-records" aria-live="polite">
          <div class="result-combo-new hidden" id="result-combo-new">コンボ しんきろく！</div>
          <div class="result-new hidden" id="result-new">スコア しんきろく！</div>
        </div>
        <div class="walk-next">
          <div id="walk-progress" aria-label="もりの さんぽみち">
            <span class="walk-dot" data-walk-index="0" aria-hidden="true"></span>
            <span class="walk-dot" data-walk-index="1" aria-hidden="true"></span>
            <span class="walk-dot" data-walk-index="2" aria-hidden="true"></span>
          </div>
          <div id="result-next-location">つぎは どんぐりの こみち</div>
        </div>
        <button class="result-btn" id="retry-btn" type="button">さんぽを つづける</button>
      </div>
    </div>
  </div>
</div>

<script src="js/locations.js?v=20260723-1442"></script>
<script src="js/logic.js?v=20260723-1442"></script>
<script src="js/game.js?v=20260723-1442" onerror="window.__showHyokkoriLoadError()"></script>
<script>
window.setTimeout(function(){
  if(!document.body.classList.contains('pono-game-ready'))window.__showHyokkoriLoadError();
},14000);
</script>
</body>
</html>
