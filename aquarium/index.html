<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>うみのせかい｜ポノのあそびば</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a1a3a;
      font-family: 'Zen Maru Gothic', sans-serif;
    }
    #pixi-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a1a3a; /* fallback before PixiJS renders */
    }
    /* UI overlay */
    #ui {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      pointer-events: none;
      z-index: 10;
    }
    #ui button {
      pointer-events: all;
      border: none;
      border-radius: 50px;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.1s;
    }
    #ui button:active { transform: scale(0.92); }
    #btnBack {
      background: rgba(255,255,255,0.85);
      color: #1a3a6e;
    }
    #btnBgm {
      background: rgba(255,255,255,0.85);
      color: #1a3a6e;
      font-size: 1.3rem;
      padding: 8px 14px;
    }
    /* Title label */
    #title-label {
      position: fixed;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 1rem;
      font-weight: 900;
      padding: 4px 18px;
      border-radius: 50px;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <canvas id="pixi-canvas"></canvas>
  <div id="title-label">🐠 うみのせかい</div>
  <div id="ui">
    <button id="btnBack">← もどる</button>
    <button id="btnBgm">🔊</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
  <script>
  (function() {
    'use strict';

    // ─── BGM ───────────────────────────────────────────────
    let bgmEnabled = true, bgmStarted = false;
    const bgm = new Audio('../assets/audio/Bubble Hop Playground.mp3');
    bgm.loop = true;
    bgm.volume = 0.45;
    const btnBgm = document.getElementById('btnBgm');
    function tryStartBgm() {
      if (!bgmStarted && bgmEnabled) {
        bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
      }
    }
    btnBgm.addEventListener('click', () => {
      bgmEnabled = !bgmEnabled;
      btnBgm.textContent = bgmEnabled ? '🔊' : '🔇';
      if (bgmEnabled) { tryStartBgm(); bgm.play().catch(() => {}); }
      else bgm.pause();
    });
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) bgm.pause();
      else if (bgmEnabled) bgm.play().catch(() => {});
    });
    window.addEventListener('blur',  () => bgm.pause());
    window.addEventListener('focus', () => { if (bgmEnabled) bgm.play().catch(() => {}); });
    document.addEventListener('pointerdown', tryStartBgm, { once: true });

    // ─── Back button ───────────────────────────────────────
    document.getElementById('btnBack').addEventListener('click', () => {
      if (history.length > 1) history.back();
      else location.href = '../index.html';
    });

    // ─── PixiJS setup ──────────────────────────────────────
    const canvas = document.getElementById('pixi-canvas');
    const app = new PIXI.Application({
      view: canvas,
      resizeTo: window,
      backgroundColor: 0x0a1a3a,
      antialias: true,
      resolution: window.devicePixelRatio || 1,
      autoDensity: true,
    });

    const W = () => app.screen.width;
    const H = () => app.screen.height;

    // ─── Containers (layered) ──────────────────────────────
    const layerBg      = new PIXI.Container(); // gradient + light rays
    const layerMid     = new PIXI.Container(); // creatures
    const layerFg      = new PIXI.Container(); // seaweed, sand, bubbles
    app.stage.addChild(layerBg, layerMid, layerFg);

    // ─── Background gradient ───────────────────────────────
    function makeBackground() {
      layerBg.removeChildren();
      const g = new PIXI.Graphics();
      // Draw gradient via multiple horizontal strips
      const steps = 40;
      for (let i = 0; i < steps; i++) {
        const t = i / steps;
        const r = Math.round(10 + (26 - 10) * t);
        const gv = Math.round(26 + (74 - 26) * t);
        const b = Math.round(58 + (110 - 58) * t);
        g.beginFill((r << 16) | (gv << 8) | b);
        g.drawRect(0, (H() / steps) * i, W(), H() / steps + 1);
        g.endFill();
      }
      layerBg.addChild(g);

      // Light rays
      for (let i = 0; i < 5; i++) {
        const ray = new PIXI.Graphics();
        ray.beginFill(0xaaddff, 0.06);
        const x = W() * (0.1 + i * 0.2);
        const w = 60 + Math.random() * 80;
        ray.drawPolygon([
          x - w/2, 0,
          x + w/2, 0,
          x + w * 1.5, H() * 0.7,
          x - w * 1.5, H() * 0.7,
        ]);
        ray.endFill();
        ray._baseX = x;
        ray._idx   = i;
        layerBg.addChild(ray);
      }
    }
    // makeBackground() is called inside ticker.addOnce to ensure PixiJS is fully ready

    // ─── Sand & Seaweed ────────────────────────────────────
    const sandGfx = new PIXI.Graphics();
    layerFg.addChild(sandGfx);

    // Seaweed: array of {x, gfx, phase, height}
    const seaweeds = [];
    function makeSeaweeds() {
      seaweeds.forEach(s => layerFg.removeChild(s.gfx));
      seaweeds.length = 0;
      const count = 4 + Math.floor(W() / 200);
      for (let i = 0; i < count; i++) {
        const g = new PIXI.Graphics();
        layerFg.addChild(g);
        seaweeds.push({
          gfx: g,
          x: W() * (0.05 + (i / count) * 0.9) + (Math.random() - 0.5) * 40,
          phase: Math.random() * Math.PI * 2,
          h: 60 + Math.random() * 80,
          col: [0x22c55e, 0x16a34a, 0x4ade80][Math.floor(Math.random() * 3)],
        });
      }
    }

    function drawSand() {
      sandGfx.clear();
      const sandY = H() * 0.88;
      sandGfx.beginFill(0xd4a84b, 0.85);
      sandGfx.drawEllipse(W() / 2, H() * 0.96, W() * 0.7, H() * 0.1);
      sandGfx.endFill();
      // sand ripples
      sandGfx.lineStyle(1.5, 0xc49a30, 0.4);
      for (let i = 0; i < 4; i++) {
        const ry = sandY + 6 + i * 9;
        sandGfx.moveTo(W() * 0.2, ry);
        sandGfx.bezierCurveTo(W() * 0.35, ry - 4, W() * 0.65, ry + 4, W() * 0.8, ry);
      }
    }

    // ─── Bubbles ───────────────────────────────────────────
    const bubbles = [];
    const bubbleGfx = new PIXI.Graphics();
    layerFg.addChild(bubbleGfx);

    function spawnBubble() {
      bubbles.push({
        x: W() * (0.1 + Math.random() * 0.8),
        y: H() * 0.9,
        r: 2 + Math.random() * 5,
        vy: 0.5 + Math.random() * 1.2,
        vx: (Math.random() - 0.5) * 0.5,
        alpha: 0.3 + Math.random() * 0.4,
      });
    }

    // ─── Creature system ───────────────────────────────────
    const creatures = [];

    // Default emoji textures if no drawings
    const DEFAULT_EMOJIS = ['🐠', '🐙', '🦀', '🐟', '🦑', '🐡'];

    function emojiToDataUrl(emoji, size) {
      const cv = document.createElement('canvas');
      cv.width = size; cv.height = size;
      const ctx = cv.getContext('2d');
      ctx.font = `${size * 0.75}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(emoji, size / 2, size / 2);
      return cv.toDataURL();
    }

    // Load drawings from localStorage
    function getDrawingDataUrls() {
      try {
        const raw = JSON.parse(localStorage.getItem('pono_drawings') || '[]');
        if (Array.isArray(raw) && raw.length > 0) {
          return raw.map(d => d.dataUrl || d).filter(Boolean);
        }
      } catch (e) {}
      return null;
    }

    // ─── Remove white background from JPEG drawings ────────
    function removeWhiteBg(dataUrl) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const cv = document.createElement('canvas');
          cv.width  = img.width;
          cv.height = img.height;
          const ctx = cv.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const id = ctx.getImageData(0, 0, cv.width, cv.height);
          const d  = id.data;
          for (let i = 0; i < d.length; i += 4) {
            const r = d[i], g = d[i+1], b = d[i+2];
            // Make near-white and near-black (JPEG artifact) → transparent
            if (r > 220 && g > 220 && b > 220) {
              d[i+3] = 0;
            }
          }
          ctx.putImageData(id, 0, 0);
          resolve(cv.toDataURL('image/png'));
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }

    // Movement patterns
    const PATTERNS = ['swim', 'float', 'wander', 'sway'];

    function createCreature(dataUrl, idx, total) {
      const tex = PIXI.Texture.from(dataUrl);
      const pattern = PATTERNS[idx % PATTERNS.length];

      // Base size: ~80-120px, keeping aspect ratio
      const baseSize = 90 + Math.random() * 40;

      let obj;

      if (pattern === 'swim') {
        // SimplePlane for body warp
        const plane = new PIXI.SimplePlane(tex, 8, 1);
        plane.width  = baseSize;
        plane.height = baseSize * 0.65;
        plane.anchor && (plane.anchor.set(0.5));
        obj = plane;
      } else {
        obj = new PIXI.Sprite(tex);
        obj.anchor.set(0.5);
        const scale = baseSize / Math.max(tex.width || 256, tex.height || 256);
        obj.scale.set(scale);
      }

      // Safe zone: avoid bottom sand area
      const safeBottom = H() * 0.80;
      const margin = baseSize * 0.6;
      const startX = margin + Math.random() * (W() - margin * 2);
      const startY = margin + Math.random() * (safeBottom - margin * 2);

      obj.x = startX;
      obj.y = startY;

      const speed = 0.4 + Math.random() * 0.6;
      const state = {
        obj,
        pattern,
        t: Math.random() * Math.PI * 2,
        baseX: startX,
        baseY: startY,
        vx: (Math.random() < 0.5 ? 1 : -1) * speed,
        vy: (Math.random() - 0.5) * speed * 0.3,
        speed,
        panicTimer: 0,
        panicVx: 0,
        panicVy: 0,
        baseSize,
        // For swim: store original vertex X positions
        origVertX: null,
        facingRight: true,
      };

      // Init swim vertex origins
      if (pattern === 'swim') {
        // Wait until geometry is ready
        state._initSwim = true;
      }

      layerMid.addChild(obj);
      creatures.push(state);
    }

    async function initAllCreatures() {
      // Clear existing
      creatures.forEach(c => layerMid.removeChild(c.obj));
      creatures.length = 0;

      const rawUrls = getDrawingDataUrls();
      if (rawUrls && rawUrls.length > 0) {
        // Strip white background from JPEG drawings
        const dataUrls = await Promise.all(rawUrls.map(u => removeWhiteBg(u)));
        const shuffled = [...PATTERNS].sort(() => Math.random() - 0.5);
        dataUrls.forEach((url, i) => {
          const patIdx = i % PATTERNS.length;
          createCreatureWithPattern(url, shuffled[patIdx] || PATTERNS[patIdx]);
        });
      } else {
        // Use default emojis (no white bg removal needed)
        DEFAULT_EMOJIS.forEach((emoji, i) => {
          const url = emojiToDataUrl(emoji, 128);
          createCreatureWithPattern(url, PATTERNS[i % PATTERNS.length]);
        });
      }
    }

    function createCreatureWithPattern(dataUrl, pattern) {
      const tex = PIXI.Texture.from(dataUrl);
      const baseSize = 130 + Math.random() * 60;

      // Always use Sprite (no SimplePlane — avoids black-rectangle artifacts)
      const obj = new PIXI.Sprite(tex);
      obj.anchor.set(0.5);

      const safeBottom = H() * 0.78;
      const margin = baseSize * 0.6;
      const startX = margin + Math.random() * Math.max(W() - margin * 2, 1);
      const startY = margin + Math.random() * Math.max(safeBottom - margin * 2, 1);

      obj.x = startX;
      obj.y = startY;

      // Set scale
      const setScale = () => {
        const s = baseSize / Math.max(tex.width, tex.height, 1);
        obj.scale.set(s);
      };
      if (tex.width > 0) setScale();
      else tex.once('update', setScale);

      const speed = 0.35 + Math.random() * 0.55;
      const c = {
        obj,
        pattern,
        t: Math.random() * Math.PI * 2,
        baseX: startX,
        baseY: startY,
        vx: (Math.random() < 0.5 ? 1 : -1) * speed,
        vy: (Math.random() - 0.5) * speed * 0.2,
        speed,
        panicTimer: 0,
        panicVx: 0,
        panicVy: 0,
        baseSize,
        facingRight: true,
        tex,
      };

      layerMid.addChild(obj);
      creatures.push(c);
    }

    // ─── Tick: update logic ────────────────────────────────
    let totalT = 0;
    let bubbleSpawnTimer = 0;

    app.ticker.add((delta) => {
      totalT += delta * 0.016; // approx seconds
      bubbleSpawnTimer += delta;

      // Animate light rays
      layerBg.children.forEach(child => {
        if (child._baseX !== undefined) {
          child.x = Math.sin(totalT * 0.3 + child._idx) * 12;
          child.alpha = 0.5 + Math.sin(totalT * 0.5 + child._idx * 1.2) * 0.3;
        }
      });

      // Seaweed
      seaweeds.forEach(sw => {
        const sway = Math.sin(totalT * 1.2 + sw.phase) * 8;
        const g = sw.gfx;
        g.clear();
        g.lineStyle(4, sw.col, 0.85);
        const bx = sw.x, by = H() * 0.89;
        // Draw wavy stem using bezier
        const midX = bx + sway;
        const midY = by - sw.h * 0.5;
        const topX = bx + sway * 1.5;
        const topY = by - sw.h;
        g.moveTo(bx, by);
        g.bezierCurveTo(bx + sway * 0.5, midY + 10, midX, midY, topX, topY);
        // Leaf
        g.lineStyle(0);
        g.beginFill(sw.col, 0.7);
        g.drawEllipse(topX, topY, 10, 5);
        g.endFill();
      });

      // Bubbles
      if (bubbleSpawnTimer > 30 + Math.random() * 40) {
        bubbleSpawnTimer = 0;
        if (bubbles.length < 20) spawnBubble();
      }
      bubbleGfx.clear();
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        b.y -= b.vy * delta;
        b.x += b.vx * delta;
        b.x += Math.sin(totalT * 1.5 + i) * 0.3;
        if (b.y < -10) { bubbles.splice(i, 1); continue; }
        bubbleGfx.lineStyle(1, 0xaaddff, b.alpha);
        bubbleGfx.beginFill(0xffffff, b.alpha * 0.15);
        bubbleGfx.drawCircle(b.x, b.y, b.r);
        bubbleGfx.endFill();
      }

      // Creatures
      const sw2 = W(), sh2 = H() * 0.80;
      creatures.forEach(c => {
        c.t += delta * 0.016;

        // Panic overrides normal movement
        if (c.panicTimer > 0) {
          c.panicTimer -= delta;
          c.obj.x += c.panicVx * delta * 3;
          c.obj.y += c.panicVy * delta * 3;
          // Bounce off edges
          if (c.obj.x < 20 || c.obj.x > W() - 20) c.panicVx *= -1;
          if (c.obj.y < 20 || c.obj.y > sh2) c.panicVy *= -1;
          c.obj.x = Math.max(20, Math.min(W() - 20, c.obj.x));
          c.obj.y = Math.max(20, Math.min(sh2, c.obj.y));
          return;
        }

        switch (c.pattern) {
          case 'swim': {
            // Move horizontally, sine wave vertical drift, slight tilt
            c.obj.x += c.vx * delta;
            c.obj.y = c.baseY + Math.sin(c.t * 0.7) * 30;
            c.obj.rotation = Math.sin(c.t * 0.7) * 0.18; // tilt with wave

            // Flip sprite to face direction of travel
            const absScale = Math.abs(c.obj.scale.x);
            if (c.vx < 0 && c.facingRight) {
              c.facingRight = false;
              c.obj.scale.x = -absScale;
            } else if (c.vx > 0 && !c.facingRight) {
              c.facingRight = true;
              c.obj.scale.x = absScale;
            }

            // Wrap around screen
            if (c.obj.x > W() + 80) { c.obj.x = -80; c.baseY = 40 + Math.random() * sh2 * 0.8; }
            if (c.obj.x < -80)       { c.obj.x = W() + 80; c.baseY = 40 + Math.random() * sh2 * 0.8; }
            break;
          }

          case 'float': {
            // Drift slowly + bob up/down + scale pulse
            c.obj.x += c.vx * delta * 0.4;
            c.obj.y = c.baseY + Math.sin(c.t * 0.8) * 18;
            const pulse = 1 + Math.sin(c.t * 1.3) * 0.04;
            const base = c.obj._baseScale || (c.obj._baseScale = c.obj.scale.x);
            c.obj.scale.set(base * pulse);

            // Gentle random drift direction
            if (Math.random() < 0.003) {
              c.vx = (Math.random() - 0.5) * c.speed * 0.6;
            }
            // Soft bounce
            if (c.obj.x < 30 || c.obj.x > W() - 30) {
              c.vx *= -1;
              c.baseX = c.obj.x;
            }
            c.baseX += c.vx * delta * 0.4;
            break;
          }

          case 'wander': {
            // Random direction changes, gentle wobble (no continuous spin)
            if (Math.random() < 0.008) {
              const angle = Math.random() * Math.PI * 2;
              c.vx = Math.cos(angle) * c.speed * 0.8;
              c.vy = Math.sin(angle) * c.speed * 0.8;
            }
            c.obj.x += c.vx * delta;
            c.obj.y += c.vy * delta;
            c.obj.rotation = Math.sin(c.t * 1.0) * 0.15; // gentle wobble, not spin

            // Bounce off walls
            if (c.obj.x < 30 || c.obj.x > W() - 30) { c.vx *= -1; c.obj.x = Math.max(30, Math.min(W()-30, c.obj.x)); }
            if (c.obj.y < 30 || c.obj.y > sh2 - 10)  { c.vy *= -1; c.obj.y = Math.max(30, Math.min(sh2-10, c.obj.y)); }
            break;
          }

          case 'sway': {
            // Mostly stationary, gently swaying
            c.obj.rotation = Math.sin(c.t * 1.5 + c.baseX) * 0.22;
            // Very slow drift
            c.obj.x = c.baseX + Math.sin(c.t * 0.4) * 15;
            c.obj.y = c.baseY + Math.cos(c.t * 0.3) * 10;
            break;
          }
        }
      });
    });

    // ─── Tap/click → panic nearby creatures ────────────────
    app.stage.interactive = true;
    app.stage.hitArea = new PIXI.Rectangle(0, 0, 9999, 9999);
    app.stage.on('pointerdown', (e) => {
      tryStartBgm();
      const px = e.global.x, py = e.global.y;
      creatures.forEach(c => {
        const dx = c.obj.x - px;
        const dy = c.obj.y - py;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          const angle = Math.atan2(dy, dx);
          c.panicTimer = 60 + Math.random() * 40;
          c.panicVx = Math.cos(angle) * (2 + Math.random() * 2);
          c.panicVy = Math.sin(angle) * (2 + Math.random() * 2);
        }
      });
    });

    // ─── Resize handling ───────────────────────────────────
    window.addEventListener('resize', () => {
      makeBackground();
      drawSand();
      makeSeaweeds();
      // Update safe zone for sway/float creatures
      creatures.forEach(c => {
        if (c.obj.y > H() * 0.80) {
          c.obj.y = H() * 0.70;
          c.baseY = c.obj.y;
        }
      });
    });

    // ─── Init ──────────────────────────────────────────────
    app.ticker.addOnce(() => {
      makeBackground(); // Draw background after PixiJS is fully sized
      drawSand();
      makeSeaweeds();
      initAllCreatures();
    });

  })();
  </script>
</body>
</html>
