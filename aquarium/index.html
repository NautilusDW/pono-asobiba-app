<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>うみのせかい｜ポノのあそびば</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100dvh;
      overflow: hidden;
      background: #0a1a3a;
      font-family: 'Zen Maru Gothic', sans-serif;
    }
    #pixi-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    /* UI overlay */
    #ui {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      pointer-events: none;
      z-index: 10;
    }
    #ui button {
      pointer-events: all;
      border: none;
      border-radius: 50px;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.1s;
    }
    #ui button:active { transform: scale(0.92); }
    #btnBack {
      background: rgba(255,255,255,0.85);
      color: #1a3a6e;
    }
    #btnBgm {
      background: rgba(255,255,255,0.85);
      color: #1a3a6e;
      font-size: 1.3rem;
      padding: 8px 14px;
    }
    /* ===== Selection screen ===== */
    #selection-screen {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(160deg, #0d2240 0%, #0a4a6e 100%);
      display: flex; flex-direction: column;
      align-items: center; padding: 16px;
      overflow-y: auto;
      font-family: 'Zen Maru Gothic', sans-serif;
    }
    #selection-screen.hidden { display: none; }
    .sel-title {
      font-size: 1.3rem; font-weight: 900; color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      margin: 8px 0 2px;
    }
    .sel-subtitle {
      font-size: 0.78rem; color: rgba(255,255,255,0.75);
      margin-bottom: 14px;
    }
    .sel-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%; max-width: 480px;
    }
    .sel-card {
      background: rgba(255,255,255,0.12);
      border-radius: 14px;
      overflow: hidden;
      border: 2.5px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: border-color 0.15s, opacity 0.15s;
      display: flex; flex-direction: column;
    }
    .sel-card.sel-unselected { opacity: 0.4; border-color: transparent; }
    .sel-card.sel-selected   { border-color: #38bdf8; }
    .sel-thumb {
      width: 100%; aspect-ratio: 1;
      object-fit: contain;
      background: #fff;
      display: block;
    }
    .sel-pat-btn {
      border: none; width: 100%;
      padding: 5px 4px;
      background: rgba(56,189,248,0.25);
      color: #fff; font-family: inherit;
      font-size: 0.72rem; font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sel-pat-btn:active { background: rgba(56,189,248,0.5); }
    .sel-start-btn {
      margin-top: 18px;
      padding: 12px 36px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff; font-family: inherit;
      font-size: 1.1rem; font-weight: 900;
      border: none; border-radius: 50px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.1s;
    }
    .sel-start-btn:active { transform: scale(0.94); }
    .sel-back-btn {
      position: absolute; top: 14px; left: 14px;
      background: rgba(255,255,255,0.15);
      color: #fff; border: none; border-radius: 50px;
      padding: 6px 14px; font-family: inherit;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
    }
    /* Landscape: hide UI overlay, show on bottom tap */
    @media (orientation: landscape) {
      #ui {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      #ui.ui-visible {
        opacity: 1;
        pointer-events: auto;
      }
    }
    /* Title label */
    #title-label {
      position: fixed;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 1rem;
      font-weight: 900;
      padding: 4px 18px;
      border-radius: 50px;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <canvas id="pixi-canvas"></canvas>
  <div id="title-label">🐠 うみのせかい</div>
  <div id="ui">
    <button id="btnBack">← もどる</button>
    <button id="btnBgm">🔊</button>
  </div>

  <!-- Selection screen -->
  <div id="selection-screen">
    <button class="sel-back-btn" id="btnSelBack">← もどる</button>
    <div class="sel-title">🌊 うみのせかい</div>
    <div class="sel-subtitle">えをえらんで、うごきをきめよう！</div>
    <div id="selGrid" class="sel-grid"></div>
    <button id="btnStart" class="sel-start-btn">はじめる！🐠</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
  <script>
  (function() {
    'use strict';

    // ─── BGM ───────────────────────────────────────────────
    let bgmEnabled = true, bgmStarted = false;
    const bgm = new Audio('../assets/audio/Bubble Hop Playground.mp3');
    bgm.loop = true;
    bgm.volume = 0.45;
    const btnBgm = document.getElementById('btnBgm');
    function tryStartBgm() {
      if (!bgmStarted && bgmEnabled) {
        bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
      }
    }
    btnBgm.addEventListener('click', () => {
      bgmEnabled = !bgmEnabled;
      btnBgm.textContent = bgmEnabled ? '🔊' : '🔇';
      if (bgmEnabled) { tryStartBgm(); bgm.play().catch(() => {}); }
      else bgm.pause();
    });
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) bgm.pause();
      else if (bgmEnabled) bgm.play().catch(() => {});
    });
    window.addEventListener('blur',  () => bgm.pause());
    window.addEventListener('focus', () => { if (bgmEnabled) bgm.play().catch(() => {}); });
    document.addEventListener('pointerdown', tryStartBgm, { once: true });

    // ─── Fullscreen (hides browser chrome on Android) ──────
    document.addEventListener('pointerdown', () => {
      const el = document.documentElement;
      if (el.requestFullscreen && !document.fullscreenElement) {
        el.requestFullscreen().catch(() => {});
      }
    }, { once: true });

    // ─── Pattern persistence ────────────────────────────────
    const PATTERN_STORE_KEY = 'pono_umi_patterns';
    function loadSavedPatterns() {
      try { return JSON.parse(localStorage.getItem(PATTERN_STORE_KEY) || '{}'); } catch(e) { return {}; }
    }
    function savePatterns() {
      const map = {};
      selectionData.forEach(item => {
        map[item.dataUrl.slice(0, 120)] = item.pattern;
      });
      localStorage.setItem(PATTERN_STORE_KEY, JSON.stringify(map));
    }

    // ─── Back button ───────────────────────────────────────
    document.getElementById('btnBack').addEventListener('click', () => {
      if (history.length > 1) history.back();
      else location.href = '../index.html';
    });

    // ─── PixiJS setup ──────────────────────────────────────
    const canvas = document.getElementById('pixi-canvas');
    const app = new PIXI.Application({
      view: canvas,
      resizeTo: window,
      backgroundColor: 0x0a1a3a,
      antialias: true,
      resolution: window.devicePixelRatio || 1,
      autoDensity: true,
    });

    const W = () => app.screen.width;
    const H = () => app.screen.height;

    const SWIM_COLS = 10; // columns for SimplePlane body-wave distortion

    // ─── Containers (layered) ──────────────────────────────
    const layerBg      = new PIXI.Container(); // gradient + light rays
    const layerMid     = new PIXI.Container(); // creatures
    const layerFg      = new PIXI.Container(); // seaweed, sand, bubbles
    const layerTop     = new PIXI.Container(); // steer arrow UI
    app.stage.addChild(layerBg, layerMid, layerFg, layerTop);
    const steerGfx = new PIXI.Graphics();
    layerTop.addChild(steerGfx);

    // ─── Background gradient ───────────────────────────────
    function makeBackground() {
      layerBg.removeChildren();
      const g = new PIXI.Graphics();
      // Draw gradient via multiple horizontal strips
      const steps = 40;
      for (let i = 0; i < steps; i++) {
        const t = i / steps;
        const r = Math.round(10 + (26 - 10) * t);
        const gv = Math.round(26 + (74 - 26) * t);
        const b = Math.round(58 + (110 - 58) * t);
        g.beginFill((r << 16) | (gv << 8) | b);
        g.drawRect(0, (H() / steps) * i, W(), H() / steps + 1);
        g.endFill();
      }
      layerBg.addChild(g);

      // Light rays
      for (let i = 0; i < 5; i++) {
        const ray = new PIXI.Graphics();
        ray.beginFill(0xaaddff, 0.06);
        const x = W() * (0.1 + i * 0.2);
        const w = 60 + Math.random() * 80;
        ray.drawPolygon([
          x - w/2, 0,
          x + w/2, 0,
          x + w * 1.5, H() * 0.7,
          x - w * 1.5, H() * 0.7,
        ]);
        ray.endFill();
        ray._baseX = x;
        ray._idx   = i;
        layerBg.addChild(ray);
      }
    }
    makeBackground();

    // ─── Sand & Seaweed ────────────────────────────────────
    let sandTopY = 0; // top of sand ellipse — shared with crawl pattern
    const sandGfx = new PIXI.Graphics();
    layerFg.addChild(sandGfx);

    // Seaweed: array of {x, gfx, phase, height}
    const seaweeds = [];
    function makeSeaweeds() {
      seaweeds.forEach(s => layerFg.removeChild(s.gfx));
      seaweeds.length = 0;
      const count = 4 + Math.floor(W() / 200);
      for (let i = 0; i < count; i++) {
        const g = new PIXI.Graphics();
        layerFg.addChild(g);
        seaweeds.push({
          gfx: g,
          x: W() * (0.05 + (i / count) * 0.9) + (Math.random() - 0.5) * 40,
          phase: Math.random() * Math.PI * 2,
          h: 60 + Math.random() * 80,
          col: [0x22c55e, 0x16a34a, 0x4ade80][Math.floor(Math.random() * 3)],
        });
      }
    }

    function drawSand() {
      sandGfx.clear();
      const sandY = H() * 0.88;
      // Sand ellipse center at H()*0.96, radius H()*0.1 → top at H()*0.86
      sandTopY = H() * 0.96 - H() * 0.1;
      sandGfx.beginFill(0xd4a84b, 0.85);
      sandGfx.drawEllipse(W() / 2, H() * 0.96, W() * 0.7, H() * 0.1);
      sandGfx.endFill();
      // sand ripples
      sandGfx.lineStyle(1.5, 0xc49a30, 0.4);
      for (let i = 0; i < 4; i++) {
        const ry = sandY + 6 + i * 9;
        sandGfx.moveTo(W() * 0.2, ry);
        sandGfx.bezierCurveTo(W() * 0.35, ry - 4, W() * 0.65, ry + 4, W() * 0.8, ry);
      }
    }

    // ─── Bubbles ───────────────────────────────────────────
    const bubbles = [];
    const bubbleGfx = new PIXI.Graphics();
    layerFg.addChild(bubbleGfx);

    function spawnBubble() {
      bubbles.push({
        x: W() * (0.1 + Math.random() * 0.8),
        y: H() * 0.9,
        r: 2 + Math.random() * 5,
        vy: 0.5 + Math.random() * 1.2,
        vx: (Math.random() - 0.5) * 0.5,
        alpha: 0.3 + Math.random() * 0.4,
      });
    }

    // ─── Creature system ───────────────────────────────────
    const creatures = [];

    // Default emoji textures if no drawings
    const DEFAULT_EMOJIS = ['🐠', '🐙', '🦀', '🐟', '🦑', '🐡'];

    // Returns an HTMLCanvasElement (not a data URL) so PixiJS can read dimensions immediately
    function emojiToCanvas(emoji, size) {
      const cv = document.createElement('canvas');
      cv.width = size; cv.height = size;
      const ctx = cv.getContext('2d');
      ctx.font = `${size * 0.75}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(emoji, size / 2, size / 2);
      return cv;
    }

    // Load drawings from localStorage
    function getDrawingDataUrls() {
      try {
        const raw = JSON.parse(localStorage.getItem('pono_drawings') || '[]');
        if (Array.isArray(raw) && raw.length > 0) {
          return raw.map(d => d.dataUrl || d).filter(Boolean);
        }
      } catch (e) {}
      return null;
    }

    // ─── Remove background via edge flood-fill ─────────────
    // Removes white background AND black JPEG artifacts (from transparent canvas areas)
    // by flood-filling from image edges. Interior drawn elements are preserved.
    function removeWhiteBg(dataUrl) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const cv = document.createElement('canvas');
          cv.width = img.width; cv.height = img.height;
          const ctx = cv.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const id = ctx.getImageData(0, 0, cv.width, cv.height);
          const d = id.data;
          const w = cv.width, h = cv.height;

          // A pixel is "background" if it is near-white OR near-black (JPEG artifact)
          const isBg = (pi) => {
            const r = d[pi], g = d[pi+1], b = d[pi+2];
            return (r > 210 && g > 210 && b > 210) || // near-white
                   (r < 30  && g < 30  && b < 30);    // near-black artifact
          };

          // Stack-based DFS flood fill from all 4 edges
          const visited = new Uint8Array(w * h);
          const stack = [];
          const push = (x, y) => {
            if (x < 0 || x >= w || y < 0 || y >= h) return;
            const i = y * w + x;
            if (!visited[i] && isBg(i * 4)) { visited[i] = 1; stack.push(i); }
          };
          for (let x = 0; x < w; x++) { push(x, 0); push(x, h - 1); }
          for (let y = 1; y < h - 1; y++) { push(0, y); push(w - 1, y); }

          while (stack.length > 0) {
            const i = stack.pop();
            d[i * 4 + 3] = 0; // transparent
            const x = i % w, y = (i / w) | 0;
            push(x + 1, y); push(x - 1, y); push(x, y + 1); push(x, y - 1);
          }

          ctx.putImageData(id, 0, 0);
          resolve(cv); // resolve with canvas element (dimensions immediately available)
        };
        img.onerror = () => {
          // Fallback: return original as canvas
          const cv2 = document.createElement('canvas');
          cv2.width = img.width || 256; cv2.height = img.height || 256;
          cv2.getContext('2d').drawImage(img, 0, 0);
          resolve(cv2);
        };
        img.src = dataUrl;
      });
    }

    // ─── Pattern definitions ────────────────────────────────
    const PATTERNS = ['swim', 'float', 'crawl', 'sway'];
    const PATTERN_LABELS = {
      swim:  '🏊 およぐ',
      float: '🪼 ただよう',
      crawl: '🦀 あるく',
      sway:  '🌿 ゆれる',
    };

    // ─── Selection screen ───────────────────────────────────
    let selectionData = []; // [{dataUrl, pattern, selected}]

    function showSelectionScreen() {
      let raw = [];
      try { raw = JSON.parse(localStorage.getItem('pono_drawings') || '[]'); } catch(e) {}

      if (raw.length === 0) {
        // No drawings → go straight with emoji defaults
        document.getElementById('selection-screen').classList.add('hidden');
        DEFAULT_EMOJIS.forEach((emoji, i) => {
          createCreatureWithPattern(emojiToCanvas(emoji, 128), PATTERNS[i % PATTERNS.length]);
        });
        return;
      }

      const savedPats = loadSavedPatterns();
      selectionData = raw.map((d, i) => {
        const dataUrl = d.dataUrl || d;
        return {
          dataUrl,
          pattern: savedPats[dataUrl.slice(0, 120)] || PATTERNS[i % PATTERNS.length],
          selected: true,
        };
      });

      const grid = document.getElementById('selGrid');
      grid.innerHTML = '';
      selectionData.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'sel-card sel-selected';

        const img = document.createElement('img');
        img.className = 'sel-thumb';
        img.src = item.dataUrl;

        const patBtn = document.createElement('button');
        patBtn.className = 'sel-pat-btn';
        patBtn.textContent = PATTERN_LABELS[item.pattern];
        patBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = PATTERNS.indexOf(item.pattern);
          item.pattern = PATTERNS[(idx + 1) % PATTERNS.length];
          patBtn.textContent = PATTERN_LABELS[item.pattern];
          savePatterns(); // persist immediately
        });

        card.addEventListener('click', () => {
          item.selected = !item.selected;
          card.classList.toggle('sel-selected', item.selected);
          card.classList.toggle('sel-unselected', !item.selected);
        });

        card.appendChild(img);
        card.appendChild(patBtn);
        grid.appendChild(card);
      });
    }

    document.getElementById('btnSelBack').addEventListener('click', () => {
      if (history.length > 1) history.back();
      else location.href = '../index.html';
    });

    document.getElementById('btnStart').addEventListener('click', async () => {
      document.getElementById('selection-screen').classList.add('hidden');
      savePatterns();
      tryStartBgm();
      const chosen = selectionData.filter(d => d.selected);
      if (chosen.length === 0) {
        DEFAULT_EMOJIS.forEach((emoji, i) => {
          createCreatureWithPattern(emojiToCanvas(emoji, 128), PATTERNS[i % PATTERNS.length]);
        });
        return;
      }
      const canvases = await Promise.all(chosen.map(d => removeWhiteBg(d.dataUrl)));
      canvases.forEach((cv, i) => createCreatureWithPattern(cv, chosen[i].pattern));
    });

    function createCreature(dataUrl, idx, total) {
      const tex = PIXI.Texture.from(dataUrl);
      const pattern = PATTERNS[idx % PATTERNS.length];

      // Base size: ~80-120px, keeping aspect ratio
      const baseSize = 90 + Math.random() * 40;

      let obj;

      if (pattern === 'swim') {
        // SimplePlane for body warp
        const plane = new PIXI.SimplePlane(tex, 8, 1);
        plane.width  = baseSize;
        plane.height = baseSize * 0.65;
        plane.anchor && (plane.anchor.set(0.5));
        obj = plane;
      } else {
        obj = new PIXI.Sprite(tex);
        obj.anchor.set(0.5);
        const scale = baseSize / Math.max(tex.width || 256, tex.height || 256);
        obj.scale.set(scale);
      }

      // Safe zone: avoid bottom sand area
      const safeBottom = H() * 0.80;
      const margin = baseSize * 0.6;
      const startX = margin + Math.random() * (W() - margin * 2);
      const startY = margin + Math.random() * (safeBottom - margin * 2);

      obj.x = startX;
      obj.y = startY;

      const speed = 0.4 + Math.random() * 0.6;
      const state = {
        obj,
        pattern,
        t: Math.random() * Math.PI * 2,
        baseX: startX,
        baseY: startY,
        vx: (Math.random() < 0.5 ? 1 : -1) * speed,
        vy: (Math.random() - 0.5) * speed * 0.3,
        speed,
        panicTimer: 0,
        panicVx: 0,
        panicVy: 0,
        baseSize,
        // For swim: store original vertex X positions
        origVertX: null,
        facingRight: true,
      };

      // Init swim vertex origins
      if (pattern === 'swim') {
        // Wait until geometry is ready
        state._initSwim = true;
      }

      layerMid.addChild(obj);
      creatures.push(state);
    }

    async function initAllCreatures() {
      // Clear existing
      creatures.forEach(c => layerMid.removeChild(c.obj));
      creatures.length = 0;

      const rawUrls = getDrawingDataUrls();
      if (rawUrls && rawUrls.length > 0) {
        // Process drawings: remove white/black background → resolve as canvas
        const canvases = await Promise.all(rawUrls.map(u => removeWhiteBg(u)));
        const shuffled = [...PATTERNS].sort(() => Math.random() - 0.5);
        canvases.forEach((cv, i) => {
          const patIdx = i % PATTERNS.length;
          createCreatureWithPattern(cv, shuffled[patIdx] || PATTERNS[patIdx]);
        });
      } else {
        // Default emoji canvases — dimensions known immediately
        DEFAULT_EMOJIS.forEach((emoji, i) => {
          createCreatureWithPattern(emojiToCanvas(emoji, 128), PATTERNS[i % PATTERNS.length]);
        });
      }
    }

    // canvas: HTMLCanvasElement (dimensions always available synchronously)
    function createCreatureWithPattern(canvas, pattern) {
      const tex = PIXI.Texture.from(canvas);
      const baseSize = 130 + Math.random() * 60;
      const s = baseSize / Math.max(canvas.width, canvas.height, 1);
      const halfH = (canvas.height * s) * 0.5;

      // swim: SimplePlane inside a Container for body-wave distortion
      // other: plain Sprite
      let obj, swimPlane = null, planeLocalW = 0, planeLocalH = 0;
      if (pattern === 'swim') {
        const plane = new PIXI.SimplePlane(tex, SWIM_COLS, 1);
        planeLocalW = canvas.width;
        planeLocalH = canvas.height;
        const cont = new PIXI.Container();
        plane.x = -planeLocalW / 2;
        plane.y = -planeLocalH / 2;
        cont.addChild(plane);
        cont.scale.set(s);
        obj = cont;
        swimPlane = plane;
      } else {
        obj = new PIXI.Sprite(tex);
        obj.anchor.set(0.5);
        obj.scale.set(s);
      }

      const safeBottom = H() * 0.78;
      const margin = baseSize * 0.6;
      const startX = margin + Math.random() * Math.max(W() - margin * 2, 1);
      const startY = margin + Math.random() * Math.max(safeBottom - margin * 2, 1);

      obj.x = startX;
      obj.y = pattern === 'crawl' ? sandTopY - halfH : startY;

      const speed = 0.055 + Math.random() * 0.035;
      const c = {
        obj,
        pattern,
        t: Math.random() * Math.PI * 2,
        baseX: startX,
        baseY: pattern === 'crawl' ? sandTopY - halfH : startY,
        vx: (Math.random() < 0.5 ? 1 : -1) * speed,
        vy: (Math.random() - 0.5) * speed * 0.15,
        speed,
        panicTimer: 0,
        panicVx: 0,
        panicVy: 0,
        baseSize,
        halfH,
        facingRight: true,
        tex,
        swimPlane,
        planeLocalW,
        planeLocalH,
        wasInPanic: false,
      };

      layerMid.addChild(obj);
      creatures.push(c);
    }

    // ─── Tick: update logic ────────────────────────────────
    let totalT = 0;
    let bubbleSpawnTimer = 0;

    app.ticker.add((delta) => {
      totalT += delta * 0.016; // approx seconds
      bubbleSpawnTimer += delta;

      // Animate light rays
      layerBg.children.forEach(child => {
        if (child._baseX !== undefined) {
          child.x = Math.sin(totalT * 0.3 + child._idx) * 12;
          child.alpha = 0.5 + Math.sin(totalT * 0.5 + child._idx * 1.2) * 0.3;
        }
      });

      // Seaweed
      seaweeds.forEach(sw => {
        const sway = Math.sin(totalT * 1.2 + sw.phase) * 8;
        const g = sw.gfx;
        g.clear();
        g.lineStyle(4, sw.col, 0.85);
        const bx = sw.x, by = H() * 0.89;
        // Draw wavy stem using bezier
        const midX = bx + sway;
        const midY = by - sw.h * 0.5;
        const topX = bx + sway * 1.5;
        const topY = by - sw.h;
        g.moveTo(bx, by);
        g.bezierCurveTo(bx + sway * 0.5, midY + 10, midX, midY, topX, topY);
        // Leaf
        g.lineStyle(0);
        g.beginFill(sw.col, 0.7);
        g.drawEllipse(topX, topY, 10, 5);
        g.endFill();
      });

      // Bubbles
      if (bubbleSpawnTimer > 30 + Math.random() * 40) {
        bubbleSpawnTimer = 0;
        if (bubbles.length < 20) spawnBubble();
      }
      bubbleGfx.clear();
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        b.y -= b.vy * delta;
        b.x += b.vx * delta;
        b.x += Math.sin(totalT * 1.5 + i) * 0.3;
        if (b.y < -10) { bubbles.splice(i, 1); continue; }
        bubbleGfx.lineStyle(1, 0xaaddff, b.alpha);
        bubbleGfx.beginFill(0xffffff, b.alpha * 0.15);
        bubbleGfx.drawCircle(b.x, b.y, b.r);
        bubbleGfx.endFill();
      }

      // Creatures — water physics (screen-relative velocity)
      const sw = W(), sh = H() * 0.80;
      const DT = delta / 60; // seconds per frame (frame-rate independent)

      creatures.forEach(c => {
        c.t += DT;

        // ── Panic: burst then rapid water-resistance deceleration ──
        if (c.panicTimer > 0) {
          c.wasInPanic = true;
          c.panicTimer -= delta;
          const drag = Math.pow(0.86, delta);
          c.panicVx *= drag;
          c.panicVy *= drag;
          c.obj.x += c.panicVx * sw * DT;
          c.obj.y += c.panicVy * sh * DT;
          if (c.obj.x < 30)      { c.panicVx =  Math.abs(c.panicVx) * 0.6; c.obj.x = 30; }
          if (c.obj.x > sw - 30) { c.panicVx = -Math.abs(c.panicVx) * 0.6; c.obj.x = sw - 30; }
          if (c.obj.y < 30)      { c.panicVy =  Math.abs(c.panicVy) * 0.6; c.obj.y = 30; }
          if (c.obj.y > sh - 10) { c.panicVy = -Math.abs(c.panicVy) * 0.6; c.obj.y = sh - 10; }
          return;
        }
        // ── Panic recovery: update baseY to current pos so no warp ──
        if (c.wasInPanic) {
          c.wasInPanic = false;
          const waveAmp = sh * 0.06;
          if (c.pattern === 'swim')  c.baseY = Math.max(50, Math.min(c.obj.y - Math.sin(c.t * 0.55) * waveAmp, sh * 0.72));
          if (c.pattern === 'float') c.baseY = Math.max(50, Math.min(c.obj.y - Math.sin(c.t * 0.6) * sh * 0.04, sh * 0.72));
          if (c.pattern === 'wander') { c.baseX = c.obj.x; c.baseY = c.obj.y; }
        }

        switch (c.pattern) {
          case 'swim': {
            c.obj.x += c.vx * sw * DT;
            const waveAmp = sh * 0.06;
            // Lerp toward target Y — no sudden jump
            const targetY = c.baseY + Math.sin(c.t * 0.55) * waveAmp;
            c.obj.y += (targetY - c.obj.y) * Math.min(0.04 * delta, 1);
            c.obj.rotation = Math.sin(c.t * 0.55) * 0.12;

            // Body-wave distortion via SimplePlane vertex manipulation
            if (c.swimPlane) {
              const buf = c.swimPlane.geometry.buffers[0];
              const d = buf.data;
              const lh = c.planeLocalH;
              for (let i = 0; i <= SWIM_COLS; i++) {
                // Reverse column index when facing left so tail always wags more
                const col = c.facingRight ? i : (SWIM_COLS - i);
                const tail = Math.pow(col / SWIM_COLS, 0.8);
                const wy = Math.sin(c.t * 4 + col * 0.55) * lh * 0.22 * tail;
                // Each column: top vertex y = i*4+1, bottom vertex y = i*4+3
                d[i * 4 + 1] = wy;
                d[i * 4 + 3] = lh + wy;
              }
              buf.update();
            }

            // Flip to face direction of travel
            const absScale = Math.abs(c.obj.scale.x);
            if (c.vx < 0 && c.facingRight)  { c.facingRight = false; c.obj.scale.x = -absScale; }
            if (c.vx > 0 && !c.facingRight) { c.facingRight = true;  c.obj.scale.x =  absScale; }

            const margin = c.baseSize * 0.6;
            if (c.obj.x > sw + margin) { c.obj.x = -margin; c.baseY = 50 + Math.random() * (sh - 100); }
            if (c.obj.x < -margin)     { c.obj.x = sw + margin; c.baseY = 50 + Math.random() * (sh - 100); }
            break;
          }

          case 'float': {
            // Jellyfish-like: slow drift, gentle bob, scale pulse
            // Very slow horizontal drift with smooth water resistance
            c.vx += (Math.random() - 0.5) * 0.0008 * delta; // tiny random nudge
            c.vx *= Math.pow(0.985, delta); // water drag keeps drift slow
            c.obj.x += c.vx * sw * DT;
            const bobAmp = sh * 0.04;
            c.obj.y = c.baseY + Math.sin(c.t * 0.6) * bobAmp;
            // Scale breathing
            const baseS = c.obj._baseScale || (c.obj._baseScale = c.obj.scale.x);
            c.obj.scale.set(baseS * (1 + Math.sin(c.t * 0.9) * 0.04));
            // Soft edge bounce
            if (c.obj.x < 40)      { c.vx =  Math.abs(c.vx); }
            if (c.obj.x > sw - 40) { c.vx = -Math.abs(c.vx); }
            break;
          }

          case 'crawl': {
            // Bottom-dweller: walks on the sand surface
            c.obj.x += c.vx * sw * DT;
            // Target Y: top of sand minus half the creature height, with tiny bob
            const crawlY = sandTopY - c.halfH + Math.sin(c.t * 2.2) * 3;
            c.obj.y += (crawlY - c.obj.y) * Math.min(0.12 * delta, 1);
            c.obj.rotation = Math.sin(c.t * 2.2) * 0.05;
            const absS2 = Math.abs(c.obj.scale.x);
            if (c.vx < 0 && c.facingRight)  { c.facingRight = false; c.obj.scale.x = -absS2; }
            if (c.vx > 0 && !c.facingRight) { c.facingRight = true;  c.obj.scale.x =  absS2; }
            if (c.obj.x < 30)      { c.vx =  Math.abs(c.vx); c.obj.x = 30; }
            if (c.obj.x > sw - 30) { c.vx = -Math.abs(c.vx); c.obj.x = sw - 30; }
            break;
          }

          case 'wander': {
            // Deliberate local exploration — gentle constant pull back to territory center
            const territoryR = sw * 0.18;
            const dxB = c.baseX - c.obj.x, dyB = c.baseY - c.obj.y;
            const distB = Math.sqrt(dxB * dxB + dyB * dyB);
            if (distB > territoryR) {
              // Gentle constant pull (no warp — just a light nudge)
              c.vx += (dxB / distB) * 0.0015;
              c.vy += (dyB / distB) * 0.0015;
            } else if (Math.random() < 0.004 * delta) {
              const angle = Math.atan2(dyB, dxB) + (Math.random() - 0.5) * Math.PI * 1.4;
              c.vx = Math.cos(angle) * c.speed * 0.55;
              c.vy = Math.sin(angle) * c.speed * 0.28;
            }
            // Stronger drag → slow, purposeful movement
            c.vx *= Math.pow(0.962, delta);
            c.vy *= Math.pow(0.962, delta);
            c.obj.x += c.vx * sw * DT;
            c.obj.y += c.vy * sh * DT;
            c.obj.rotation = Math.sin(c.t * 0.9) * 0.12;
            if (c.obj.x < 30)      { c.vx =  Math.abs(c.vx) * 0.5; c.obj.x = 30; }
            if (c.obj.x > sw - 30) { c.vx = -Math.abs(c.vx) * 0.5; c.obj.x = sw - 30; }
            if (c.obj.y < 30)      { c.vy =  Math.abs(c.vy) * 0.5; c.obj.y = 30; }
            if (c.obj.y > sh - 10) { c.vy = -Math.abs(c.vy) * 0.5; c.obj.y = sh - 10; }
            break;
          }

          case 'sway': {
            // Anchored swaying — like coral or sea plant with a creature on it
            c.obj.rotation = Math.sin(c.t * 1.2 + c.baseX * 0.01) * 0.2;
            c.obj.x = c.baseX + Math.sin(c.t * 0.35) * sw * 0.015;
            c.obj.y = c.baseY + Math.cos(c.t * 0.28) * sh * 0.012;
            break;
          }
        }
      });
    });

    // ─── Landscape UI toggle ───────────────────────────────
    const uiEl = document.getElementById('ui');
    let uiHideTimer = null;
    function showUiTemporarily() {
      uiEl.classList.add('ui-visible');
      clearTimeout(uiHideTimer);
      uiHideTimer = setTimeout(() => uiEl.classList.remove('ui-visible'), 3000);
    }

    // ─── Pointer: tap = panic, hold 400ms = steer direction ─
    let holdTimerId = null, holdCreature = null, steeringMode = false;
    const tapRadius = () => Math.min(W(), H()) * 0.35;

    function findNearest(px, py) {
      let best = null, bestDist = Infinity;
      const r = tapRadius();
      creatures.forEach(c => {
        const dx = c.obj.x - px, dy = c.obj.y - py;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < r && d < bestDist) { best = c; bestDist = d; }
      });
      return best;
    }

    app.stage.interactive = true;
    app.stage.hitArea = new PIXI.Rectangle(0, 0, 9999, 9999);

    app.stage.on('pointerdown', (e) => {
      tryStartBgm();
      const px = e.global.x, py = e.global.y;
      // Landscape bottom tap → show UI
      if (window.innerWidth > window.innerHeight && py > H() * 0.65) showUiTemporarily();
      holdCreature = findNearest(px, py);
      steeringMode = false;
      clearTimeout(holdTimerId);
      if (holdCreature) {
        holdTimerId = setTimeout(() => { steeringMode = true; }, 400);
      }
    });

    app.stage.on('pointermove', (e) => {
      if (!steeringMode || !holdCreature) return;
      const px = e.global.x, py = e.global.y;
      const cx = holdCreature.obj.x, cy = holdCreature.obj.y;
      const dx = px - cx, dy = py - cy;
      const angle = Math.atan2(dy, dx);
      const arrowLen = Math.min(Math.sqrt(dx*dx + dy*dy), W() * 0.22);
      const ex = cx + Math.cos(angle) * arrowLen;
      const ey = cy + Math.sin(angle) * arrowLen;
      steerGfx.clear();
      steerGfx.lineStyle(2.5, 0x38bdf8, 0.7);
      steerGfx.drawCircle(cx, cy, holdCreature.baseSize * 0.55);
      steerGfx.lineStyle(3.5, 0x38bdf8, 0.9);
      steerGfx.moveTo(cx, cy);
      steerGfx.lineTo(ex, ey);
      const hs = 16;
      steerGfx.moveTo(ex, ey);
      steerGfx.lineTo(ex - Math.cos(angle - 0.42) * hs, ey - Math.sin(angle - 0.42) * hs);
      steerGfx.moveTo(ex, ey);
      steerGfx.lineTo(ex - Math.cos(angle + 0.42) * hs, ey - Math.sin(angle + 0.42) * hs);
    });

    app.stage.on('pointerup', (e) => {
      clearTimeout(holdTimerId);
      steerGfx.clear();
      const px = e.global.x, py = e.global.y;
      if (steeringMode && holdCreature) {
        // Apply steering direction
        const dx = px - holdCreature.obj.x, dy = py - holdCreature.obj.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 25) {
          holdCreature.vx = (dx / dist) * holdCreature.speed;
          holdCreature.vy = (dy / dist) * holdCreature.speed * 0.4;
          holdCreature.baseY = holdCreature.obj.y;
          holdCreature.baseX = holdCreature.obj.x;
          holdCreature.panicTimer = 0; // cancel any panic
        }
      } else {
        // Quick tap → panic all within radius
        const r = tapRadius();
        creatures.forEach(c => {
          const dx = c.obj.x - px, dy = c.obj.y - py;
          if (Math.sqrt(dx*dx + dy*dy) < r) {
            const angle = Math.atan2(dy, dx);
            const spd = 0.70 + Math.random() * 0.20;
            c.panicTimer = 70 + Math.random() * 20;
            c.panicVx = Math.cos(angle) * spd;
            c.panicVy = Math.sin(angle) * spd * 0.6;
          }
        });
      }
      steeringMode = false;
      holdCreature = null;
    });

    // ─── Resize handling ───────────────────────────────────
    // Use rAF to wait for PixiJS to finish its own resize before we query W()/H()
    let resizeRaf = null;
    window.addEventListener('resize', () => {
      cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(() => {
        makeBackground();
        drawSand(); // updates sandTopY
        makeSeaweeds();
        const safeH = H() * 0.80;
        creatures.forEach(c => {
          if (c.pattern === 'crawl') {
            const newY = sandTopY - c.halfH;
            c.obj.y = newY;
            c.baseY = newY;
          } else {
            // Clamp all creatures inside new safe area
            if (c.obj.x < 30) { c.obj.x = 30; c.baseX = 30; }
            if (c.obj.x > W() - 30) { c.obj.x = W() - 30; c.baseX = W() - 30; }
            if (c.obj.y < 30) { c.obj.y = 30; c.baseY = 30; }
            if (c.obj.y > safeH) { c.obj.y = safeH * 0.85; c.baseY = c.obj.y; }
          }
        });
      });
    });

    // ─── Init ──────────────────────────────────────────────
    app.ticker.addOnce(() => {
      makeBackground();
      drawSand();
      makeSeaweeds();
      showSelectionScreen();
    });

  })();
  </script>
</body>
