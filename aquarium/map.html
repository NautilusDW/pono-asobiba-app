<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>すいぞくかん マップ｜ポノのあそびば</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100dvh;
      overflow: hidden;
      background: #061428;
      font-family: 'Zen Maru Gothic', sans-serif;
      touch-action: manipulation;
    }

    /* ── Header ── */
    #mapHeader {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      padding-top: env(safe-area-inset-top, 0);
      gap: 10px;
      background: rgba(6, 20, 40, 0.95);
      border-bottom: 1px solid rgba(56,189,248,0.2);
    }
    .hdr-btn {
      background: rgba(255,255,255,0.1);
      border: none; border-radius: 20px;
      color: #fff; font-family: inherit;
      font-size: 0.85rem; font-weight: 700;
      padding: 6px 14px; cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .hdr-btn:active { background: rgba(255,255,255,0.25); }
    #mapTitle {
      flex: 1; text-align: center;
      font-size: 1.1rem; font-weight: 900;
      color: #7DD3FC; letter-spacing: 0.05em;
    }

    /* ── Map area ── */
    #map-area {
      position: fixed;
      top: 52px; left: 0; right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #061428;
      padding-top: env(safe-area-inset-top, 0);
    }

    /* wrapper はイメージのアスペクト比を維持 */
    #map-wrapper {
      position: relative;
      /* 2752×1536 → 1.792:1 */
      width: min(100%, calc((100dvh - 52px) * 2752 / 1536));
      height: min(calc(100dvw * 1536 / 2752), calc(100dvh - 52px));
      flex-shrink: 0;
    }
    #map-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: fill;
      display: block;
      border-radius: 4px;
    }

    /* ── Zone buttons ── */
    #zone-buttons {
      position: absolute;
      inset: 0;
      pointer-events: none; /* 子だけ受け取る */
    }
    .zone-btn {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: all;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 12px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-radius: 16px;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s, box-shadow 0.12s;
      min-width: 72px;
      text-align: center;
    }
    .zone-btn.open {
      background: rgba(13,59,102,0.82);
      box-shadow: 0 3px 16px rgba(0,0,0,0.5), 0 0 0 1px rgba(56,189,248,0.2);
      border-color: rgba(56,189,248,0.5);
    }
    .zone-btn.open:active { transform: translate(-50%,-50%) scale(0.92); }
    .zone-btn.locked {
      background: rgba(10,20,40,0.7);
      border-color: rgba(255,255,255,0.15);
      cursor: default;
    }
    .zone-icon  { font-size: 1.5rem; line-height: 1; }
    .zone-name  {
      font-size: 0.65rem; font-weight: 900;
      color: #fff; line-height: 1.2;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    }
    .zone-btn.locked .zone-name { color: rgba(255,255,255,0.35); }
    .zone-lock { font-size: 0.75rem; }

    /* ── Shop button ── */
    #shopBtn {
      position: absolute;
      pointer-events: all;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 12px;
      border: 2.5px solid rgba(255,200,60,0.5);
      border-radius: 16px;
      background: rgba(60,40,10,0.75);
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s;
      min-width: 72px;
    }
    #shopBtn:active { transform: translate(-50%,-50%) scale(0.92); }
    #shopBtn .zone-name { color: #FCD34D; }

    /* ── Toast ── */
    #mapToast {
      position: fixed;
      bottom: 36px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(0,20,60,0.92);
      color: #7DD3FC; font-family: inherit;
      font-size: 0.95rem; font-weight: 700;
      padding: 10px 22px; border-radius: 24px;
      border: 1px solid rgba(56,189,248,0.3);
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 300; white-space: nowrap;
    }
    #mapToast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Portrait overlay ── */
    #portrait-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: #061428;
      flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; text-align: center; gap: 16px;
    }
    #portrait-overlay .rot-icon {
      font-size: 4rem;
      animation: rotpulse 1.5s ease-in-out infinite;
    }
    @keyframes rotpulse {
      0%,100% { transform: rotate(0deg); }
      40%      { transform: rotate(90deg); }
      60%      { transform: rotate(90deg); }
    }
    #portrait-overlay p { font-size: 1.1rem; font-weight: 900; }
    @media (pointer: coarse) and (orientation: portrait) {
      #portrait-overlay { display: flex; }
    }
  </style>
</head>
<body>
  <div id="portrait-overlay">
    <div class="rot-icon">📱</div>
    <p>スマホを よこむきに<br>してね！</p>
  </div>

  <div id="mapHeader">
    <button class="hdr-btn" id="btnMapBack">← もどる</button>
    <div id="mapTitle">🐠 すいぞくかん</div>
    <button class="hdr-btn" id="btnZukan">📖 図鑑</button>
  </div>

  <div id="map-area">
    <div id="map-wrapper">
      <img id="map-img" src="../assets/images/aquarium/AquariumMap.png" alt="すいぞくかん マップ" draggable="false">
      <div id="zone-buttons"></div>
      <!-- お土産売り場 ボタン (right 88%, top 82%) -->
      <button id="shopBtn" style="left:88%;top:82%;">
        <span class="zone-icon">🎁</span>
        <span class="zone-name">おみやげ</span>
      </button>
    </div>
  </div>

  <div id="mapToast"></div>

  <script src="../common/achievements.js"></script>
  <script src="../common/museum-data.js"></script>
  <script src="../common/encyclopedia.js"></script>
  <script src="map.js"></script>
  <script>
    document.getElementById('btnMapBack').addEventListener('click', function () {
      if (history.length > 1) history.back();
      else location.href = '../index.html';
    });
    document.getElementById('btnZukan').addEventListener('click', function () {
      Encyclopedia.open('..');
    });
    document.getElementById('shopBtn').addEventListener('click', function () {
      showMapToast('おみやげやさんは もうすぐ オープンだよ！');
    });
  </script>
</body>
</html>
