<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>すいぞくかん マップ｜ポノのあそびば</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100dvh;
      overflow: hidden;
      background: #061428;
      font-family: 'Zen Maru Gothic', sans-serif;
      touch-action: manipulation;
    }

    /* Header */
    #mapHeader {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      background: rgba(6, 20, 40, 0.92);
      border-bottom: 1px solid rgba(56,189,248,0.2);
      padding-top: env(safe-area-inset-top, 0);
    }
    #btnMapBack {
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 20px;
      color: #fff;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 6px 16px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #btnMapBack:active { background: rgba(255,255,255,0.25); }
    #mapTitle {
      flex: 1;
      text-align: center;
      font-size: 1.3rem;
      font-weight: 900;
      color: #7DD3FC;
      letter-spacing: 0.05em;
    }
    /* placeholder to balance flex */
    #mapHeaderSpacer { width: 72px; }

    /* PIXI canvas */
    #map-canvas {
      position: fixed;
      top: 56px; left: 0; right: 0; bottom: 0;
      width: 100%;
      height: calc(100dvh - 56px);
    }

    /* Toast */
    #mapToast {
      position: fixed;
      bottom: 40px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,20,60,0.9);
      color: #7DD3FC;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 24px;
      border: 1px solid rgba(56,189,248,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 300;
      white-space: nowrap;
    }
    #mapToast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div id="mapHeader">
    <button id="btnMapBack">← もどる</button>
    <div id="mapTitle">🐠 すいぞくかん</div>
    <div id="mapHeaderSpacer"></div>
  </div>
  <canvas id="map-canvas"></canvas>
  <div id="mapToast">もうすぐ あそべるよ！</div>

  <script src="../common/museum-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
  <script src="map.js"></script>
  <script>
    document.getElementById('btnMapBack').addEventListener('click', () => {
      if (history.length > 1) history.back();
      else location.href = '../index.html';
    });
  </script>
</body>
</html>
