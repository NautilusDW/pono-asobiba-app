<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔬 クリーンエッジスタジオ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #111827; color: #e0e0e0;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  font-size: 13px;
}

/* ── Header ── */
.header {
  background: #1f2937; padding: 9px 16px;
  display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid #374151; flex-shrink: 0;
}
.header h1 { font-size: 0.95rem; font-weight: 700; color: #f87171; white-space: nowrap; }
.header nav { display: flex; gap: 8px; }
.header nav a {
  color: #9ca3af; text-decoration: none; font-size: 0.75rem; font-weight: 600;
  padding: 4px 10px; border-radius: 6px; background: rgba(255,255,255,0.05);
  transition: background 0.15s;
}
.header nav a:hover { background: rgba(255,255,255,0.1); color: #e0e0e0; }
.header-spacer { flex: 1; }

/* ── Main Layout ── */
.main { flex: 1; display: flex; overflow: hidden; }

/* ── Left Panel ── */
.left-panel {
  width: 248px; flex-shrink: 0; background: #1f2937;
  border-right: 1px solid #374151; overflow-y: auto;
  padding: 10px 10px 60px; display: flex; flex-direction: column; gap: 8px;
}
.section {
  background: #111827; border-radius: 8px; padding: 10px;
  border: 1px solid #374151;
}
.section-title {
  font-size: 0.66rem; font-weight: 700; color: #6b7280;
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
}
.form-row { margin-bottom: 6px; }
.form-row label { display: flex; justify-content: space-between; font-size: 0.7rem; color: #9ca3af; margin-bottom: 3px; }
.form-row .val { color: #f87171; font-weight: 700; }
.form-row input[type="range"] { width: 100%; accent-color: #f87171; cursor: pointer; }
.form-row input[type="number"],
.form-row select,
.form-row input[type="text"],
.form-row input[type="password"] {
  width: 100%; padding: 5px 8px;
  background: #1f2937; border: 1px solid #374151;
  border-radius: 6px; color: #e0e0e0; font-size: 0.75rem; font-family: inherit;
}
.form-row input:focus, .form-row select:focus {
  outline: none; border-color: #f87171;
}
.form-row-2col { display: flex; gap: 6px; }
.form-row-2col .form-row { flex: 1; }

.btn {
  width: 100%; padding: 7px; border: none; border-radius: 7px;
  font-size: 0.78rem; font-weight: 700; cursor: pointer;
  transition: all 0.15s; font-family: inherit; margin-top: 4px;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary   { background: #f87171; color: #fff; }
.btn-primary:hover:not(:disabled)   { background: #ef4444; }
.btn-secondary { background: #1f2937; color: #9ca3af; border: 1px solid #374151; }
.btn-secondary:hover:not(:disabled) { background: #374151; color: #e0e0e0; }
.btn-green { background: #22c55e; color: #fff; }
.btn-green:hover:not(:disabled) { background: #16a34a; }

.drop-zone {
  border: 2px dashed #374151; border-radius: 8px;
  padding: 14px 8px; text-align: center; cursor: pointer;
  transition: all 0.2s;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: #f87171; background: rgba(248,113,113,0.05); }
.drop-zone.has-file { border-style: solid; border-color: #22c55e; background: rgba(34,197,94,0.05); }
.drop-icon { font-size: 1.6rem; }
.drop-text { font-size: 0.68rem; color: #6b7280; margin-top: 4px; }
.file-info { font-size: 0.65rem; color: #22c55e; text-align: center; margin-top: 4px; }

/* ── Right Panel ── */
.right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.tab-bar {
  display: flex; background: #1f2937;
  border-bottom: 1px solid #374151; flex-shrink: 0; padding: 0 4px;
}
.tab-btn {
  padding: 8px 14px; background: none; border: none;
  color: #6b7280; font-size: 0.78rem; font-weight: 700;
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.15s; font-family: inherit;
}
.tab-btn.active { color: #f87171; border-bottom-color: #f87171; }
.tab-btn:hover:not(.active) { color: #d1d5db; }

.tab-content { flex: 1; overflow-y: auto; display: none; }
.tab-content.active { display: block; }

/* ── Compare Tab ── */
#tab-compare { flex-direction: column; overflow: hidden; }
#tab-compare.active { display: flex; }
.compare-wrap {
  flex: 1; min-height: 0;
  display: flex; gap: 10px; padding: 12px; overflow: hidden;
}
.compare-side { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.compare-label { font-size: 0.68rem; color: #6b7280; margin-bottom: 4px; text-align: center; flex-shrink: 0; }
.compare-canvas-box {
  background: repeating-conic-gradient(#2d2d2d 0% 25%, #1a1a1a 0% 50%) 0 0 / 12px 12px;
  border-radius: 6px; overflow: auto; border: 1px solid #374151;
  flex: 1; min-height: 60px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
/* fit modeのときだけ中央寄せ; zoom時はcanvasが大きくなるのでflex解除 */
.compare-canvas-box.zoomed { display: block; }
.compare-canvas-box canvas { display: block; }
.compare-placeholder { font-size: 0.72rem; color: #4b5563; padding: 20px; text-align: center; }

/* ── Sprites Tab ── */
.sprites-bar {
  display: flex; gap: 6px; align-items: center; padding: 7px 12px;
  background: #1f2937; border-bottom: 1px solid #374151;
  flex-shrink: 0; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 10;
}
.sprites-count { font-size: 0.72rem; color: #6b7280; }
.tbtn {
  padding: 4px 10px; border: none; border-radius: 6px;
  font-size: 0.72rem; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.tbtn-ghost  { background: rgba(255,255,255,0.05); color: #9ca3af; }
.tbtn-ghost:hover  { background: rgba(255,255,255,0.1); color: #e0e0e0; }
.tbtn-blue   { background: #2563eb; color: #fff; }
.tbtn-blue:hover   { background: #1d4ed8; }
.tbtn-green  { background: #22c55e; color: #fff; }
.tbtn-green:hover  { background: #16a34a; }
.tbtn-purple { background: #7c3aed; color: #fff; }
.tbtn-purple:hover { background: #6d28d9; }

.sprites-grid {
  display: flex; flex-wrap: wrap; gap: 10px;
  padding: 12px; align-content: flex-start;
}
.empty-msg { padding: 20px; font-size: 0.78rem; color: #4b5563; }

/* ── Sprite Card ── */
.sprite-card {
  background: #1f2937; border: 2px solid #374151; border-radius: 10px;
  width: 210px; overflow: hidden; transition: border-color 0.15s;
}
.sprite-card.selected { border-color: #22c55e; }
.card-hdr {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 8px; background: #111827;
}
.card-hdr input[type="checkbox"] { accent-color: #22c55e; width: 13px; height: 13px; cursor: pointer; }
.card-num  { font-size: 0.7rem; font-weight: 700; color: #9ca3af; flex: 1; }
.card-dims { font-size: 0.65rem; color: #4b5563; }
.card-preview {
  background: repeating-conic-gradient(#2a2a2a 0% 25%, #1a1a1a 0% 50%) 0 0 / 10px 10px;
  height: 110px; display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.card-preview canvas { max-width: 100%; max-height: 110px; }
.card-body { padding: 6px 8px; display: flex; flex-direction: column; gap: 4px; }
.card-name {
  width: 100%; padding: 4px 6px;
  background: #111827; border: 1px solid #374151; border-radius: 5px;
  color: #e0e0e0; font-size: 0.72rem; font-family: inherit;
}
.card-name:focus { outline: none; border-color: #f87171; }
.card-id {
  width: 100%; padding: 4px 6px;
  background: #111827; border: 1px solid #374151; border-radius: 5px;
  color: #6b7280; font-size: 0.68rem; font-family: inherit;
}
.card-id:focus { outline: none; border-color: #60a5fa; }
.card-row { display: flex; gap: 4px; align-items: center; }
.card-expr {
  flex: 1; padding: 4px 6px;
  background: #111827; border: 1px solid #374151; border-radius: 5px;
  color: #e0e0e0; font-size: 0.7rem; font-family: inherit;
}
.card-expr:focus { outline: none; border-color: #f87171; }
.icon-btn {
  padding: 4px 6px; border: none; border-radius: 5px;
  font-size: 0.78rem; cursor: pointer; transition: background 0.15s; line-height: 1;
  font-family: inherit;
}
.icon-btn-ai  { background: #1d4ed8; color: #fff; }
.icon-btn-ai:hover  { background: #2563eb; }
.icon-btn-flip { background: rgba(255,255,255,0.06); color: #9ca3af; }
.icon-btn-flip:hover { background: rgba(255,255,255,0.12); color: #e0e0e0; }
.icon-btn-del  { background: rgba(239,68,68,0.15); color: #f87171; }
.icon-btn-del:hover  { background: rgba(239,68,68,0.25); }

/* ── Sprite card: creature settings (collapsible) ── */
.card-details { border-top: 1px solid #374151; }
.card-details summary {
  padding: 5px 8px; font-size: 0.68rem; color: #6b7280;
  cursor: pointer; user-select: none; list-style: none;
  display: flex; align-items: center; gap: 4px;
}
.card-details summary::-webkit-details-marker { display: none; }
.card-details[open] summary { color: #9ca3af; }
.card-details summary::before { content: '▶'; font-size: 0.55rem; transition: transform 0.15s; }
.card-details[open] summary::before { transform: rotate(90deg); }
.card-settings {
  padding: 0 8px 8px; display: flex; flex-direction: column; gap: 4px;
}
.cs-row { display: flex; gap: 4px; }
.cs-field { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.cs-field label { font-size: 0.62rem; color: #6b7280; }
.cs-field select, .cs-field input[type="number"] {
  width: 100%; padding: 3px 5px;
  background: #111827; border: 1px solid #374151; border-radius: 4px;
  color: #e0e0e0; font-size: 0.7rem; font-family: inherit;
}
.cs-field input[type="range"] { width: 100%; accent-color: #f87171; margin-top: 2px; }

/* ── Deploy Bar ── */
.deploy-bar {
  background: #1f2937; border-top: 1px solid #374151;
  padding: 8px 14px; display: none; gap: 8px;
  align-items: center; flex-wrap: wrap; flex-shrink: 0;
}
.deploy-bar.show { display: flex; }
.deploy-status { font-size: 0.72rem; color: #9ca3af; flex: 1; min-width: 160px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  padding: 9px 18px; border-radius: 8px; font-size: 0.8rem; font-weight: 700;
  z-index: 9999; opacity: 0; transition: opacity 0.25s; pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; }
.toast-ok  { background: #22c55e; color: #fff; }
.toast-err { background: #ef4444; color: #fff; }

/* ── Loading Overlay ── */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; z-index: 9998;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 34px; height: 34px;
  border: 4px solid rgba(255,255,255,0.15); border-top-color: #f87171;
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { font-size: 0.82rem; color: #e0e0e0; }

/* ── Zoom + BG Bar ── */
.zoom-bar {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 5px 10px; background: #1f2937;
  border-bottom: 1px solid #374151; flex-shrink: 0;
}
.zoom-bar .zb-label { font-size: 0.72rem; color: #9ca3af; white-space: nowrap; }
#zoom-level-display {
  min-width: 40px; text-align: center; font-size: 0.75rem;
  font-weight: 700; color: #f87171;
}
.zoom-bar select {
  padding: 3px 6px; background: #111827; border: 1px solid #374151;
  border-radius: 6px; color: #e0e0e0; font-size: 0.72rem; font-family: inherit;
}
.zoom-bar select:focus { outline: none; border-color: #f87171; }

/* val-input: スライダー横の数値（クリックで直接編集可） */
.val-input {
  background: none; border: none; border-bottom: 1px dashed transparent;
  color: #f87171; font-weight: 700; width: 3.2em;
  text-align: right; font-size: inherit; font-family: inherit;
  cursor: text; padding: 0 2px; border-radius: 3px;
  -moz-appearance: textfield;
}
.val-input::-webkit-inner-spin-button, .val-input::-webkit-outer-spin-button { opacity: 0.4; }
.val-input:hover { border-bottom-color: #f87171; }
.val-input:focus { outline: none; background: #1f2937; border: 1px solid #f87171; }

/* Grab cursor for panning */
.compare-canvas-box.zoomed { cursor: grab; }
.compare-canvas-box.zoomed.dragging { cursor: grabbing; }
/* Erase mode */
.compare-canvas-box.erase-mode { cursor: crosshair !important; }
.compare-canvas-box.erase-brush { cursor: none !important; }
.tbtn.active { background: #f87171 !important; color: #fff !important; }
.erase-cursor {
  position: fixed; pointer-events: none; z-index: 99999;
  border: 2px solid #f87171; border-radius: 50%;
  transform: translate(-50%, -50%); display: none;
}
.erase-brush .erase-cursor { display: block; }
</style>
</head>
<body>

<div class="header">
  <h1>🔬 クリーンエッジスタジオ</h1>
  <div class="header-spacer"></div>
  <nav>
    <a href="../admin/index.html">← 管理ダッシュボード</a>
    <a href="../aquarium/index.html" target="_blank">🐠 水族館を確認</a>
  </nav>
</div>

<div class="main">

  <!-- ════════ LEFT PANEL ════════ -->
  <div class="left-panel">

    <!-- 0. Presets -->
    <div class="section">
      <div class="section-title">0. プリセット</div>
      <div style="display:flex;gap:4px;margin-bottom:5px;align-items:center">
        <select id="preset-select" style="flex:1;padding:5px 8px;background:#1f2937;border:1px solid #374151;border-radius:6px;color:#e0e0e0;font-size:0.75rem;font-family:inherit">
          <option value="">— プリセット選択 —</option>
        </select>
        <button class="tbtn tbtn-ghost" id="btn-preset-load" style="white-space:nowrap;padding:5px 8px;font-size:0.7rem">読込</button>
      </div>
      <div style="display:flex;gap:4px;align-items:center">
        <input type="text" id="preset-name-input" placeholder="プリセット名" style="flex:1;padding:5px 8px;background:#1f2937;border:1px solid #374151;border-radius:6px;color:#e0e0e0;font-size:0.75rem;font-family:inherit">
        <button class="tbtn tbtn-blue" id="btn-preset-save" style="padding:5px 8px;font-size:0.72rem" title="保存">💾</button>
        <button class="tbtn tbtn-ghost" id="btn-preset-del" style="padding:5px 8px;font-size:0.72rem" title="削除">🗑</button>
      </div>
    </div>

    <!-- 1. Input -->
    <div class="section">
      <div class="section-title">1. 画像を開く</div>
      <div class="drop-zone" id="drop-zone">
        <div class="drop-icon">🖼️</div>
        <div class="drop-text">ここにドラッグ<br>またはクリック</div>
        <input type="file" id="file-input" accept="image/*" style="display:none">
      </div>
      <div class="file-info" id="file-info"></div>
    </div>

    <!-- 2. BG Removal -->
    <div class="section">
      <div class="section-title">2. 背景除去</div>
      <div class="form-row">
        <label>ゆるさ <input type="number" class="val-input" id="tol-val" value="35" min="0" max="140" step="1"></label>
        <input type="range" id="tolerance" min="0" max="140" value="35">
      </div>
      <div class="form-row">
        <label>フチなめらか <input type="number" class="val-input" id="feather-val" value="2" min="0" max="10" step="0.1"></label>
        <input type="range" id="feather" min="0" max="10" step="0.1" value="2">
      </div>
      <div class="form-row">
        <label>グレー許容値 <input type="number" class="val-input" id="graytol-val" value="18" min="0" max="80" step="1"></label>
        <input type="range" id="graytol" min="0" max="80" step="1" value="18">
      </div>
      <div class="form-row">
        <label>シュリンク <input type="number" class="val-input" id="shrink-val" value="0" min="0" max="8" step="1"></label>
        <input type="range" id="shrink" min="0" max="8" step="1" value="0">
      </div>
      <div class="form-row">
        <label>アルファぼかし <input type="number" class="val-input" id="ablur-val" value="0" min="0" max="5" step="0.1"></label>
        <input type="range" id="ablur" min="0" max="5" step="0.1" value="0">
      </div>
      <label style="display:flex;align-items:center;gap:5px;font-size:0.7rem;color:#9ca3af;margin-top:4px;cursor:pointer">
        <input type="checkbox" id="auto-reprocess" style="accent-color:#f87171"> 自動リアルタイム更新
      </label>
    </div>

    <!-- 3. Split -->
    <div class="section">
      <div class="section-title">3. スプライト分割</div>
      <div class="form-row">
        <label>最小サイズ (px)</label>
        <input type="number" id="min-size" value="20" min="1" max="300">
      </div>
      <div class="form-row">
        <label>余白 (px)</label>
        <input type="number" id="padding" value="4" min="0" max="60">
      </div>
      <div class="form-row">
        <label>アルファしきい値</label>
        <input type="number" id="alpha-thresh" value="10" min="0" max="255">
      </div>
    </div>

    <!-- 4. GitHub Token -->
    <div class="section">
      <div class="section-title">4. GitHub トークン</div>
      <div class="form-row">
        <input type="password" id="gh-token" placeholder="ghp_xxxx...">
      </div>
      <div id="gh-token-status" style="font-size:0.65rem;color:#6b7280;margin-top:2px;"></div>
    </div>

    <!-- Action buttons -->
    <button class="btn btn-primary"   id="btn-process" disabled>▶ 背景を消す</button>
    <button class="btn btn-secondary" id="btn-split"   disabled>✂️ スプライトを分割</button>

  </div><!-- /left-panel -->

  <!-- ════════ RIGHT PANEL ════════ -->
  <div class="right-panel">

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="compare">比較</button>
      <button class="tab-btn" data-tab="sprites" id="tab-sprites-btn">スプライト (0)</button>
    </div>

    <!-- Compare tab -->
    <div class="tab-content active" id="tab-compare">
      <!-- Zoom + BG bar -->
      <div class="zoom-bar">
        <span class="zb-label">ズーム:</span>
        <button class="tbtn tbtn-ghost" id="btn-zoom-out" style="padding:3px 9px;font-size:1rem" title="縮小">−</button>
        <span id="zoom-level-display">Fit</span>
        <button class="tbtn tbtn-ghost" id="btn-zoom-in"  style="padding:3px 9px;font-size:1rem" title="拡大">+</button>
        <button class="tbtn tbtn-ghost" id="btn-zoom-fit" style="padding:3px 8px;font-size:0.72rem" title="画面に合わせる">Fit</button>
        <button class="tbtn tbtn-ghost" id="btn-zoom-100" style="padding:3px 8px;font-size:0.72rem" title="等倍 (1:1)">1:1</button>
        <span style="border-left:1px solid #374151;height:18px;margin:0 4px"></span>
        <button class="tbtn tbtn-ghost" id="btn-erase-point" style="padding:3px 8px;font-size:0.72rem" title="ポイント消去 (色で塗りつぶし)">🎯 ポイント</button>
        <button class="tbtn tbtn-ghost" id="btn-erase-brush" style="padding:3px 8px;font-size:0.72rem" title="ブラシ消去 (ドラッグで消す)">🖌 ブラシ</button>
        <input type="range" id="brush-size" min="5" max="80" value="20" style="width:60px;display:none" title="ブラシサイズ">
        <span id="brush-size-label" style="font-size:0.68rem;color:#9ca3af;display:none">20px</span>
        <button class="tbtn tbtn-ghost" id="btn-erase-undo" style="padding:3px 8px;font-size:0.72rem" title="消去を戻す (Ctrl+Z)" disabled>↩ 戻す</button>
        <div style="flex:1"></div>
        <span class="zb-label">背景:</span>
        <select id="bg-mode-select">
          <option value="checker">チェッカー</option>
          <option value="black">黒</option>
          <option value="white">白</option>
          <option value="magenta">マゼンタ</option>
          <option value="green">緑</option>
          <option value="cyan">シアン</option>
          <option value="custom">カスタム...</option>
        </select>
        <input type="color" id="bg-custom-color" value="#808080"
               style="display:none;width:32px;height:26px;padding:2px;border:none;border-radius:4px;background:none;cursor:pointer">
      </div>
      <div class="compare-wrap">
        <div class="compare-side">
          <div class="compare-label">元画像</div>
          <div class="compare-canvas-box" id="box-orig">
            <div class="compare-placeholder">画像を開くと表示されます</div>
          </div>
        </div>
        <div class="compare-side">

<script>
'use strict';
// ════════════════════════════════════════════════════════════
// Config
// ════════════════════════════════════════════════════════════
const GH_OWNER  = 'NautilusDW';
const GH_REPO   = 'kids-writing-app';
const GH_BRANCH = 'develop';
const LS_TOKEN  = 'admin_gh_token';
const CREATURES_PATH = 'assets/data/creatures.json';
const HARDCODED_IDS  = ['octopus','jellyfish','turtle','fish','submarine','sunfish','shark'];

// ════════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════════
let originalCanvas  = null;
let processedCanvas = null;
let sprites = [];            // [{canvas, srcX, srcY, w, h, name, id, icon, expr}]
let creaturesData   = null;

// Compare view state
let compareZoom = 0;         // 0 = fit mode
let bgMode      = 'checker';
let customBgColor = '#808080';
let eraseMode = false;
let eraseTool = 'point';       // 'point' | 'brush'
let eraseUndoStack = [];
const ERASE_UNDO_MAX = 10;
let brushDragging = false;     // ブラシドラッグ中フラグ

// ════════════════════════════════════════════════════════════
// Utilities
// ════════════════════════════════════════════════════════════
const getToken = () => localStorage.getItem(LS_TOKEN) || '';
const setToken = v  => localStorage.setItem(LS_TOKEN, v);

function utf8ToBase64(str) { return btoa(unescape(encodeURIComponent(str))); }
function base64ToUtf8(b64) { return decodeURIComponent(escape(atob(b64))); }

function showToast(msg, ok) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (ok ? 'toast-ok' : 'toast-err');
  setTimeout(() => { el.className = 'toast'; }, 3200);
}

function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg || '処理中...';
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('show');
}

function ghHeaders() {
  const h = { 'Accept': 'application/vnd.github+json' };
  const t = getToken();
  if (t) h['Authorization'] = 'Bearer ' + t;
  return h;
}

function ghUploadPromise(filePath, base64Content, commitMsg) {
  return new Promise((resolve, reject) => {
    const apiUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${filePath}`;
    fetch(apiUrl + `?ref=${GH_BRANCH}&_cb=${Date.now()}`, { headers: ghHeaders(), cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(existing => {
        const body = { message: commitMsg, content: base64Content, branch: GH_BRANCH };
        if (existing && existing.sha) body.sha = existing.sha;
        return fetch(apiUrl, {
          method: 'PUT',
          headers: Object.assign({}, ghHeaders(), { 'Content-Type': 'application/json' }),
          body: JSON.stringify(body)
        });
      })
      .then(r => {
        if (r.ok) resolve();
        else r.json().then(j => reject(new Error(j.message || 'Upload error')));
      })
      .catch(reject);
  });
}

function canvasToBase64(canvas) {
  return canvas.toDataURL('image/png').split(',')[1];
}

// ════════════════════════════════════════════════════════════
// GitHub Token
// ════════════════════════════════════════════════════════════
const ghTokenInput = document.getElementById('gh-token');
ghTokenInput.value = getToken();
document.getElementById('gh-token-status').textContent = getToken() ? '✅ 設定済み（管理ダッシュボードと共有）' : '未設定';
ghTokenInput.addEventListener('input', () => {

// ════════════════════════════════════════════════════════════
// BG Removal: slider ↔ number input sync + auto-reprocess
// ════════════════════════════════════════════════════════════
let reprocessTimer = null;
function scheduleReprocess() {
  if (!document.getElementById('auto-reprocess').checked) return;
  clearTimeout(reprocessTimer);
  reprocessTimer = setTimeout(runProcess, 120);
}

// Bind slider + number-input pairs for BG removal params
[
  ['tolerance', 'tol-val',     parseInt],
  ['feather',   'feather-val', parseFloat],
  ['graytol',   'graytol-val', parseInt],
  ['shrink',    'shrink-val',  parseInt],
  ['ablur',     'ablur-val',   parseFloat],
].forEach(([sliderId, inputId, parse]) => {
  const slider = document.getElementById(sliderId);
  const numIn  = document.getElementById(inputId);
  slider.addEventListener('input', () => {
    numIn.value = slider.value;
    scheduleReprocess();
  });
  numIn.addEventListener('input', () => {
    const v = parse(numIn.value);
    if (!isNaN(v)) {
      slider.value = Math.max(+slider.min, Math.min(+slider.max, v));
      scheduleReprocess();
    }
  });
  numIn.addEventListener('keydown', e => {
    if (e.key === 'Enter') { numIn.blur(); runProcess(); }
  });
});


// ════════════════════════════════════════════════════════════
// Tab Switching
// ════════════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

// ════════════════════════════════════════════════════════════
// Compare View: zoom & BG helpers
// ════════════════════════════════════════════════════════════
const CHECKER_BG = 'repeating-conic-gradient(#2d2d2d 0% 25%, #1a1a1a 0% 50%) 0 0 / 12px 12px';
const BG_STYLES = {
  checker: CHECKER_BG,
  black:   '#000',
  white:   '#fff',
  magenta: '#ff00ff',
  green:   '#00ff00',
  cyan:    '#00ffff',
};

function getBgStyle() {
  if (bgMode === 'custom') return customBgColor;
  return BG_STYLES[bgMode] || CHECKER_BG;
}

function drawInBox(boxId, srcCanvas, applyBg) {
  const box = document.getElementById(boxId);
  if (!srcCanvas) {
    box.innerHTML = '<div class="compare-placeholder">「背景を消す」を実行すると表示されます</div>';
    box.style.background = CHECKER_BG;
    box.classList.remove('zoomed');
    return;
  }
  if (applyBg) box.style.background = getBgStyle();

  const cv = document.createElement('canvas');
  if (compareZoom <= 0) {
    // Fit mode: canvas at natural size, CSS max-width handles the fitting
    cv.width = srcCanvas.width; cv.height = srcCanvas.height;
    cv.getContext('2d').drawImage(srcCanvas, 0, 0);
    cv.style.maxWidth = '100%';
    cv.style.height = 'auto';
    box.classList.remove('zoomed');
  } else {
    // Zoom mode: canvas at explicit pixel size, box scrolls
    const w = Math.max(1, Math.round(srcCanvas.width * compareZoom));
    const h = Math.max(1, Math.round(srcCanvas.height * compareZoom));
    cv.width = w; cv.height = h;
    cv.getContext('2d').drawImage(srcCanvas, 0, 0, w, h);
    box.classList.add('zoomed');
  }
  box.innerHTML = '';
  box.appendChild(cv);
}

function redrawCompare() {
  drawInBox('box-orig', originalCanvas, false);
  if (processedCanvas) drawInBox('box-proc', processedCanvas, true);
  const lbl = document.getElementById('zoom-level-display');
  lbl.textContent = compareZoom <= 0 ? 'Fit' : Math.round(compareZoom * 100) + '%';
}

// ════════════════════════════════════════════════════════════
// Zoom + Pan
// ════════════════════════════════════════════════════════════

/** 現在の実効ズーム倍率を返す（fit mode は canvas の実寸から算出） */
function effectiveZoom() {
  if (compareZoom > 0) return compareZoom;
  const box = document.getElementById('box-orig');
  const cv  = box.querySelector('canvas');
  if (cv && originalCanvas && originalCanvas.width > 0) {
    return cv.clientWidth / originalCanvas.width;
  }
  return 1;
}

/**
 * ズームを変更し、anchorX/anchorY（ボックス内ピクセル座標）の点が
 * ズーム後も同じ位置に見えるようスクロール位置を調整する。
 */
function zoomAtAnchor(factor, anchorX, anchorY) {
  const oldZ = effectiveZoom();
  const newZ = Math.max(0.04, Math.min(oldZ * factor, 20));

  // anchorの下にある元画像の座標
  const box = document.getElementById('box-orig');
  const origX = (box.scrollLeft + anchorX) / oldZ;
  const origY = (box.scrollTop  + anchorY) / oldZ;

  compareZoom = newZ;
  redrawCompare();

  // スクロール位置を調整してアンカー点を固定
  const newSL = origX * newZ - anchorX;
  const newST = origY * newZ - anchorY;
  ['box-orig', 'box-proc'].forEach(id => {
    const b = document.getElementById(id);
    b.scrollLeft = newSL;
    b.scrollTop  = newST;
  });
}

/** ボタンズーム（画面中央基準） */
function zoomByButton(factor) {
  const box = document.getElementById('box-orig');
  zoomAtAnchor(factor, box.clientWidth / 2, box.clientHeight / 2);
}

document.getElementById('btn-zoom-in').addEventListener('click',  () => zoomByButton(1.5));
document.getElementById('btn-zoom-out').addEventListener('click', () => zoomByButton(1 / 1.5));
document.getElementById('btn-zoom-fit').addEventListener('click', () => { compareZoom = 0; redrawCompare(); });
document.getElementById('btn-zoom-100').addEventListener('click', () => {
  compareZoom = 1.0; redrawCompare();
});

// マウスホイール: ポインター中心ズーム
['box-orig', 'box-proc'].forEach(id => {
  document.getElementById(id).addEventListener('wheel', e => {
    e.preventDefault();
    const box  = document.getElementById(id);
    const rect = box.getBoundingClientRect();
    zoomAtAnchor(e.deltaY < 0 ? 1.15 : 1 / 1.15,
                 e.clientX - rect.left,
                 e.clientY - rect.top);
  }, { passive: false });
});

// ════════════════════════════════════════════════════════════
// 左ドラッグでパン（両ボックス連動）
// ════════════════════════════════════════════════════════════
let panState = null;  // { startX, startY, sl, st }

['box-orig', 'box-proc'].forEach(id => {
  document.getElementById(id).addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (eraseMode && id === 'box-proc') return;
    e.preventDefault();
    const box = document.getElementById('box-orig'); // always anchor to orig
    panState = { startX: e.clientX, startY: e.clientY, sl: box.scrollLeft, st: box.scrollTop };
    document.querySelectorAll('.compare-canvas-box').forEach(b => b.classList.add('dragging'));
  });
});

let panMoved = false;

document.addEventListener('mousemove', e => {
  if (!panState) return;
  const dx = e.clientX - panState.startX;
  const dy = e.clientY - panState.startY;
  if (Math.hypot(dx, dy) > 3) panMoved = true;
  ['box-orig', 'box-proc'].forEach(id => {
    const b = document.getElementById(id);
    b.scrollLeft = panState.sl - dx;
    b.scrollTop  = panState.st - dy;
  });
});

document.addEventListener('mouseup', () => {
  if (!panState) return;
  panState = null;
  document.querySelectorAll('.compare-canvas-box').forEach(b => b.classList.remove('dragging'));
  setTimeout(() => { panMoved = false; }, 0);
});

// ════════════════════════════════════════════════════════════
// Erase Mode（ポイント消去 + ブラシ消去）
// ════════════════════════════════════════════════════════════

// ブラシカーソル要素
const eraseCursorEl = document.createElement('div');
eraseCursorEl.className = 'erase-cursor';
document.body.appendChild(eraseCursorEl);

function setEraseMode(on, tool) {
  if (on && !processedCanvas) {
    showToast('先に「背景を消す」を実行してください', false);
    return;
  }
  eraseMode = on;
  if (tool) eraseTool = tool;
  const boxProc = document.getElementById('box-proc');
  document.getElementById('btn-erase-point').classList.toggle('active', on && eraseTool === 'point');
  document.getElementById('btn-erase-brush').classList.toggle('active', on && eraseTool === 'brush');
  boxProc.classList.toggle('erase-mode', on && eraseTool === 'point');
  boxProc.classList.toggle('erase-brush', on && eraseTool === 'brush');
  // ブラシサイズUI
  const show = on && eraseTool === 'brush';
  document.getElementById('brush-size').style.display = show ? '' : 'none';
  document.getElementById('brush-size-label').style.display = show ? '' : 'none';
  if (!show) eraseCursorEl.style.display = 'none';
  updateBrushCursorSize();
}

function updateBrushCursorSize() {
  const r = parseInt(document.getElementById('brush-size').value) || 20;
  const zoom = effectiveZoom();
  const cssSize = r * zoom;
  eraseCursorEl.style.width  = cssSize + 'px';
  eraseCursorEl.style.height = cssSize + 'px';
}

document.getElementById('brush-size').addEventListener('input', function() {
  document.getElementById('brush-size-label').textContent = this.value + 'px';
  updateBrushCursorSize();
});

function updateUndoButton() {
  const btn = document.getElementById('btn-erase-undo');
  const n = eraseUndoStack.length;
  btn.textContent = n > 0 ? `↩ 戻す (${n})` : '↩ 戻す';
  btn.disabled = n === 0;
}

function pushEraseUndo() {
  const ctx = processedCanvas.getContext('2d');
  eraseUndoStack.push(ctx.getImageData(0, 0, processedCanvas.width, processedCanvas.height));
  if (eraseUndoStack.length > ERASE_UNDO_MAX) eraseUndoStack.shift();
  updateUndoButton();
}

function popEraseUndo() {
  if (!eraseUndoStack.length) return;
  processedCanvas.getContext('2d').putImageData(eraseUndoStack.pop(), 0, 0);
  redrawCompare();
  updateUndoButton();
}

function clearEraseUndo() {
  eraseUndoStack = [];
  updateUndoButton();
}

/** マウス座標 → processedCanvas のピクセル座標 */
function clickToProcessedCoord(e) {
  const box = document.getElementById('box-proc');
  const cv = box.querySelector('canvas');
  if (!cv || !processedCanvas) return null;
  const rect = cv.getBoundingClientRect();
  const cssX = e.clientX - rect.left;
  const cssY = e.clientY - rect.top;
  if (cssX < 0 || cssY < 0 || cssX >= rect.width || cssY >= rect.height) return null;
  const px = Math.floor(cssX * processedCanvas.width  / rect.width);
  const py = Math.floor(cssY * processedCanvas.height / rect.height);
  if (px < 0 || px >= processedCanvas.width || py < 0 || py >= processedCanvas.height) return null;
  return { x: px, y: py };
}

/** ポイント消去: flood fill で連結した同色ピクセルを透明化 */
function pointEraseFill(startX, startY, tolerance) {
  const w = processedCanvas.width, h = processedCanvas.height;
  const ctx = processedCanvas.getContext('2d');
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;
  const idx0 = (startY * w + startX) * 4;
  if (d[idx0 + 3] < 10) return false;
  const seedR = d[idx0], seedG = d[idx0+1], seedB = d[idx0+2];
  const visited = new Uint8Array(w * h);
  const queue = new Int32Array(w * h);
  let head = 0, tail = 0;
  const si = startY * w + startX;
  visited[si] = 1; queue[tail++] = si;
  while (head < tail) {
    const pi = queue[head++];
    d[pi * 4 + 3] = 0;
    const px = pi % w, py = (pi - px) / w;
    const nb = [];
    if (px > 0)     nb.push(pi - 1);
    if (px < w - 1) nb.push(pi + 1);
    if (py > 0)     nb.push(pi - w);
    if (py < h - 1) nb.push(pi + w);
    for (const ni of nb) {
      if (visited[ni]) continue;
      visited[ni] = 1;
      const i4 = ni * 4;
      if (d[i4 + 3] < 10) continue;
      const dr = d[i4] - seedR, dg = d[i4+1] - seedG, db = d[i4+2] - seedB;
      if (Math.sqrt(dr*dr + dg*dg + db*db) <= tolerance) queue[tail++] = ni;
    }
  }
  ctx.putImageData(imgData, 0, 0);
  return true;
}

/** ブラシ消去: 円形範囲のピクセルを透明化 */
function brushErase(cx, cy, radius) {
  const w = processedCanvas.width, h = processedCanvas.height;
  const ctx = processedCanvas.getContext('2d');
  const r = Math.max(1, Math.round(radius / 2));
  const x0 = Math.max(0, cx - r), y0 = Math.max(0, cy - r);
  const x1 = Math.min(w - 1, cx + r), y1 = Math.min(h - 1, cy + r);
  if (x0 > x1 || y0 > y1) return;
  const rw = x1 - x0 + 1, rh = y1 - y0 + 1;
  const imgData = ctx.getImageData(x0, y0, rw, rh);
  const d = imgData.data;
  const r2 = r * r;
  for (let dy = 0; dy < rh; dy++) {
    for (let dx = 0; dx < rw; dx++) {
      const ddx = (x0 + dx) - cx, ddy = (y0 + dy) - cy;
      if (ddx * ddx + ddy * ddy <= r2) {
        d[(dy * rw + dx) * 4 + 3] = 0;
      }
    }
  }
  ctx.putImageData(imgData, x0, y0);
}

// ── ボタンハンドラ ──
document.getElementById('btn-erase-point').addEventListener('click', () => {
  if (eraseMode && eraseTool === 'point') setEraseMode(false);
  else setEraseMode(true, 'point');
});
document.getElementById('btn-erase-brush').addEventListener('click', () => {
  if (eraseMode && eraseTool === 'brush') setEraseMode(false);
  else setEraseMode(true, 'brush');
});
document.getElementById('btn-erase-undo').addEventListener('click', popEraseUndo);

// ── ポイント消去: クリック ──
document.getElementById('box-proc').addEventListener('click', e => {
  if (!eraseMode || eraseTool !== 'point' || !processedCanvas || panMoved) return;
  const coord = clickToProcessedCoord(e);
  if (!coord) return;
  const tolerance = parseFloat(document.getElementById('tolerance').value) || 35;
  pushEraseUndo();
  if (!pointEraseFill(coord.x, coord.y, tolerance)) {
    eraseUndoStack.pop();
    updateUndoButton();
    return;
  }
  redrawCompare();
});

// ── ブラシ消去: ドラッグ ──
document.getElementById('box-proc').addEventListener('pointerdown', e => {
  if (!eraseMode || eraseTool !== 'brush' || !processedCanvas || e.button !== 0) return;
  e.preventDefault();
  brushDragging = true;
  pushEraseUndo();
  const coord = clickToProcessedCoord(e);
  if (coord) {
    const r = parseInt(document.getElementById('brush-size').value) || 20;
    brushErase(coord.x, coord.y, r);
  }
});

document.addEventListener('pointermove', e => {
  // ブラシカーソル追従
  if (eraseMode && eraseTool === 'brush') {
    eraseCursorEl.style.left = e.clientX + 'px';
    eraseCursorEl.style.top  = e.clientY + 'px';
    const box = document.getElementById('box-proc');
    const rect = box.getBoundingClientRect();
    const inside = e.clientX >= rect.left && e.clientX <= rect.right &&
                   e.clientY >= rect.top  && e.clientY <= rect.bottom;
    eraseCursorEl.style.display = inside ? 'block' : 'none';
  }
  // ブラシドラッグ中
  if (!brushDragging) return;
  const coord = clickToProcessedCoord(e);
  if (coord) {
    const r = parseInt(document.getElementById('brush-size').value) || 20;
    brushErase(coord.x, coord.y, r);
    redrawCompare();
  }
});

document.addEventListener('pointerup', () => {
  if (!brushDragging) return;
  brushDragging = false;
  redrawCompare();
});

// ── Ctrl+Z ──
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    const ae = document.activeElement;
    if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'SELECT' || ae.tagName === 'TEXTAREA')) return;
    if (eraseUndoStack.length > 0) { e.preventDefault(); popEraseUndo(); }
  }
});

// ════════════════════════════════════════════════════════════
// BG color
// ════════════════════════════════════════════════════════════
const bgModeSelect = document.getElementById('bg-mode-select');
const bgCustomInput = document.getElementById('bg-custom-color');

bgModeSelect.addEventListener('change', () => {
  bgMode = bgModeSelect.value;
  if (bgMode === 'custom') {
    bgCustomInput.style.display = '';
    bgCustomInput.click();
  } else {
    bgCustomInput.style.display = 'none';
  }
  if (processedCanvas) drawInBox('box-proc', processedCanvas, true);
});

bgCustomInput.addEventListener('input', () => {
  customBgColor = bgCustomInput.value;
  if (processedCanvas) drawInBox('box-proc', processedCanvas, true);
});

// ════════════════════════════════════════════════════════════
// Presets (localStorage)
// ════════════════════════════════════════════════════════════
const PRESETS_KEY = 'ces_presets_v1';

function loadAllPresets() {
  try { return JSON.parse(localStorage.getItem(PRESETS_KEY) || '{}'); } catch { return {}; }
}
function saveAllPresets(data) {
  localStorage.setItem(PRESETS_KEY, JSON.stringify(data));
}
function getCurrentSettings() {
  return {
    tolerance:     document.getElementById('tolerance').value,
    feather:       document.getElementById('feather').value,
    grayTol:       document.getElementById('graytol').value,
    shrink:        document.getElementById('shrink').value,
    alphaBlur:     document.getElementById('ablur').value,
    autoReprocess: document.getElementById('auto-reprocess').checked,
    bgMode:        document.getElementById('bg-mode-select').value,

// ════════════════════════════════════════════════════════════
// Background Removal
// ════════════════════════════════════════════════════════════
function sampleBgColor(data, w, h) {
  const sz = Math.max(3, Math.min(10, Math.floor(Math.min(w, h) * 0.025)));
  const corners = [[0, 0], [w - sz, 0], [0, h - sz], [w - sz, h - sz]];
  let rS = 0, gS = 0, bS = 0, n = 0;
  for (const [cx, cy] of corners) {
    for (let dy = 0; dy < sz; dy++) {
      for (let dx = 0; dx < sz; dx++) {
        const px = Math.min(cx + dx, w - 1);
        const py = Math.min(cy + dy, h - 1);
        const i = (py * w + px) * 4;
        if (data[i + 3] > 10) { rS += data[i]; gS += data[i+1]; bS += data[i+2]; n++; }
      }
    }
  }
  return n > 0 ? [rS/n, gS/n, bS/n] : [255, 255, 255];
}

function removeBgFromCanvas(canvas, tolerance, featherRadius, grayTol, shrinkPx, alphaBlurRadius) {
  const w = canvas.width, h = canvas.height;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;

  // Box blur ユーティリティ（整数 r、スライディングウィンドウ O(w*h)）
  function boxBlur(s, r) {
    if (r <= 0) return s.slice();
    const tmp = new Float32Array(w * h);
    const out = new Float32Array(w * h);
    for (let y = 0; y < h; y++) {
      const base = y * w;
      let sum = 0, cnt = 0;
      for (let k = 0; k <= r && k < w; k++) { sum += s[base + k]; cnt++; }
      tmp[base] = sum / cnt;
      for (let x = 1; x < w; x++) {
        if (x + r < w)      { sum += s[base + x + r]; cnt++; }
        if (x - r - 1 >= 0) { sum -= s[base + x - r - 1]; cnt--; }
        tmp[base + x] = sum / cnt;
      }
    }
    for (let x = 0; x < w; x++) {
      let sum = 0, cnt = 0;
      for (let k = 0; k <= r && k < h; k++) { sum += tmp[k * w + x]; cnt++; }
      out[x] = sum / cnt;
      for (let y = 1; y < h; y++) {
        if (y + r < h)      { sum += tmp[(y + r) * w + x]; cnt++; }
        if (y - r - 1 >= 0) { sum -= tmp[(y - r - 1) * w + x]; cnt--; }
        out[y * w + x] = sum / cnt;
      }
    }
    return out;
  }

  function applyBlur(radius) {
    const r0 = Math.floor(radius), r1 = Math.ceil(radius);
    const frac = radius - r0;
    const src = new Float32Array(w * h);
    for (let i = 0; i < w * h; i++) src[i] = d[i * 4 + 3];
    let blurred;
    if (frac === 0 || r0 === r1) {
      blurred = boxBlur(src, r1 || r0);
    } else {
      const b0 = r0 > 0 ? boxBlur(src, r0) : src;
      const b1 = boxBlur(src, r1);
      blurred = new Float32Array(w * h);
      for (let i = 0; i < w * h; i++) blurred[i] = b0[i] * (1 - frac) + b1[i] * frac;
    }
    for (let i = 0; i < w * h; i++) d[i * 4 + 3] = Math.round(blurred[i]);
  }

  const [bgR, bgG, bgB] = sampleBgColor(d, w, h);
  const isBg = new Uint8Array(w * h);
  const queue = new Int32Array(w * h);
  let head = 0, tail = 0;

  function tryMark(idx) {
    if (idx < 0 || idx >= w * h || isBg[idx]) return;
    const i = idx * 4;
    if (d[i + 3] < 10) { isBg[idx] = 1; return; }
    const dr = d[i] - bgR, dg = d[i+1] - bgG, db = d[i+2] - bgB;
    if (Math.sqrt(dr*dr + dg*dg + db*db) <= tolerance) {
      isBg[idx] = 1;
      queue[tail++] = idx;
    }
  }

  for (let x = 0; x < w; x++) { tryMark(x); tryMark((h-1)*w + x); }
  for (let y = 1; y < h-1; y++) { tryMark(y*w); tryMark(y*w + w-1); }

  while (head < tail) {
    const idx = queue[head++];
    const x = idx % w;
    const y = (idx - x) / w;
    if (x > 0)   tryMark(idx - 1);
    if (x < w-1) tryMark(idx + 1);
    if (y > 0)   tryMark(idx - w);
    if (y < h-1) tryMark(idx + w);
  }

  for (let i = 0; i < w * h; i++) { if (isBg[i]) d[i*4+3] = 0; }

  // Gray tol: 彩度の低い（グレー/白系）ピクセルを背景として追加除去
  if (grayTol > 0) {
    const queue2 = new Int32Array(w * h);
    let head2 = 0, tail2 = 0;

    function tryGray(idx) {
      if (idx < 0 || idx >= w * h || isBg[idx]) return;
      const i = idx * 4;
      if (d[i + 3] < 10) { isBg[idx] = 1; return; }
      const r = d[i], g = d[i+1], b = d[i+2];
      if (Math.max(r,g,b) - Math.min(r,g,b) <= grayTol) {
        isBg[idx] = 1;
        queue2[tail2++] = idx;
      }
    }

    for (let i = 0; i < w * h; i++) {
      if (!isBg[i]) continue;
      const x = i % w, y = (i - x) / w;
      if (x > 0)   tryGray(i - 1);
      if (x < w-1) tryGray(i + 1);
      if (y > 0)   tryGray(i - w);
      if (y < h-1) tryGray(i + w);
    }

    while (head2 < tail2) {
      const idx = queue2[head2++];
      const x = idx % w, y = (idx - x) / w;
      if (x > 0)   tryGray(idx - 1);
      if (x < w-1) tryGray(idx + 1);
      if (y > 0)   tryGray(idx - w);
      if (y < h-1) tryGray(idx + w);
    }

    for (let i = 0; i < w * h; i++) { if (isBg[i]) d[i*4+3] = 0; }
  }

  // Alpha shrink: 整数ピクセルのMinFilterエロージョン（半透明にならない）
  if (shrinkPx > 0) {
    const n = Math.max(1, Math.round(shrinkPx));
    const alpha = new Uint8Array(w * h);
    const buf   = new Uint8Array(w * h);
    for (let i = 0; i < w * h; i++) alpha[i] = d[i * 4 + 3];
    for (let iter = 0; iter < n; iter++) {
      buf.set(alpha);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = y * w + x;
          let m = buf[i];
          if (x > 0)   m = Math.min(m, buf[i - 1]);
          if (x < w-1) m = Math.min(m, buf[i + 1]);
          if (y > 0)   m = Math.min(m, buf[i - w]);
          if (y < h-1) m = Math.min(m, buf[i + w]);
          alpha[i] = m;
        }
      }
    }
    for (let i = 0; i < w * h; i++) d[i * 4 + 3] = alpha[i];
  }

  // Feather: フチなめらか（エッジのブラー）
  if (featherRadius > 0) { applyBlur(featherRadius); }

  // Alpha blur: アルファぼかし（シュリンク後の仕上げブラー）
  if (alphaBlurRadius > 0) { applyBlur(alphaBlurRadius); }

  ctx.putImageData(imgData, 0, 0);
}

function runProcess(showUI) {
  if (!originalCanvas) return;
  if (showUI) { showLoading('背景を消しています...'); }

  const tolerance = parseFloat(document.getElementById('tolerance').value);
  const feather   = parseFloat(document.getElementById('feather').value);
  const grayTol   = parseInt(document.getElementById('graytol').value);
  const shrink    = parseFloat(document.getElementById('shrink').value);
  const alphaBlur = parseFloat(document.getElementById('ablur').value);

  setEraseMode(false);
  clearEraseUndo();
  processedCanvas = document.createElement('canvas');
  processedCanvas.width  = originalCanvas.width;
  processedCanvas.height = originalCanvas.height;
  processedCanvas.getContext('2d').drawImage(originalCanvas, 0, 0);
  removeBgFromCanvas(processedCanvas, tolerance, feather, grayTol, shrink, alphaBlur);
  redrawCompare();
  document.getElementById('btn-split').disabled = false;
  if (showUI) { hideLoading(); showToast('背景除去完了！', true); }
}

document.getElementById('btn-process').addEventListener('click', () => runProcess(true));

// ════════════════════════════════════════════════════════════
// Sprite Splitting (Union-Find Connected Components)
// ════════════════════════════════════════════════════════════
/**
 * スプライト個別に外周 flood fill で囲まれた背景を除去。
 * 全体画像では囲まれていた背景色が、個別矩形では外周に露出するため、
 * ここで改めて色ベースの flood fill を実行すれば自動除去できる。
 */
function _cleanSpriteEdges(canvas, tolerance, bgColor) {
  const w = canvas.width, h = canvas.height;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;

  // 背景色は元画像からサンプリング済みのものを使う
  const [bgR, bgG, bgB] = bgColor;

  const isBg = new Uint8Array(w * h);
  const queue = new Int32Array(w * h);
  let head = 0, tail = 0;

  function tryMark(idx) {
    if (idx < 0 || idx >= w * h || isBg[idx]) return;
    const i = idx * 4;
    // 既に透明ならBG扱い（伝播する）
    if (d[i + 3] < 10) { isBg[idx] = 1; queue[tail++] = idx; return; }
    // 色が背景色に近ければBG
    const dr = d[i] - bgR, dg = d[i+1] - bgG, db = d[i+2] - bgB;
    if (Math.sqrt(dr*dr + dg*dg + db*db) <= tolerance) {
      isBg[idx] = 1;
      queue[tail++] = idx;
    }
  }

  // 外周からシード
  for (let x = 0; x < w; x++) { tryMark(x); tryMark((h-1)*w + x); }
  for (let y = 1; y < h-1; y++) { tryMark(y*w); tryMark(y*w + w-1); }

  // BFS
  while (head < tail) {
    const idx = queue[head++];
    const x = idx % w, y = (idx - x) / w;
    if (x > 0)   tryMark(idx - 1);
    if (x < w-1) tryMark(idx + 1);
    if (y > 0)   tryMark(idx - w);
    if (y < h-1) tryMark(idx + w);
  }

  // 透明化
  let changed = false;
  for (let i = 0; i < w * h; i++) {
    if (isBg[i] && d[i * 4 + 3] > 0) {
      d[i * 4 + 3] = 0;
      changed = true;
    }
  }
  if (changed) ctx.putImageData(imgData, 0, 0);
}

function splitSpritesFromCanvas(canvas, minSize, pad, alphaThr, bgTolerance) {
  const w = canvas.width, h = canvas.height;
  const d = canvas.getContext('2d').getImageData(0, 0, w, h).data;

  // 元画像の背景色をサンプリング（スプライト個別cleanで使う）
  const origD = originalCanvas.getContext('2d').getImageData(0, 0, originalCanvas.width, originalCanvas.height).data;
  const bgColor = sampleBgColor(origD, originalCanvas.width, originalCanvas.height);

  const fg = new Uint8Array(w * h);
  for (let i = 0; i < w * h; i++) fg[i] = d[i*4+3] > alphaThr ? 1 : 0;

  // Union-Find with path compression
  const parent = new Int32Array(w * h).fill(-1);
  function find(i) {
    while (parent[i] !== i) { parent[i] = parent[parent[i]]; i = parent[i]; }
    return i;
  }
  function unite(a, b) {
    a = find(a); b = find(b);
    if (a !== b) { if (a < b) parent[b] = a; else parent[a] = b; }
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      if (!fg[i]) continue;
      parent[i] = i;
      if (y > 0 && fg[i - w]) unite(i, i - w);
      if (x > 0 && fg[i - 1]) unite(i, i - 1);
    }
  }

  // Collect bounding boxes
  const boxes = new Map();
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      if (!fg[i] || parent[i] < 0) continue;
      const root = find(i);
      if (!boxes.has(root)) boxes.set(root, { x1: x, y1: y, x2: x, y2: y });
      const b = boxes.get(root);
      if (x < b.x1) b.x1 = x; if (y < b.y1) b.y1 = y;
      if (x > b.x2) b.x2 = x; if (y > b.y2) b.y2 = y;
    }
  }

  const result = [];
  for (const [, b] of boxes) {
    const sw = b.x2 - b.x1 + 1, sh = b.y2 - b.y1 + 1;
    if (sw < minSize && sh < minSize) continue;

    const px = Math.min(pad, b.x1, w - b.x2 - 1);
    const py = Math.min(pad, b.y1, h - b.y2 - 1);
    const sx = Math.max(0, b.x1 - px),  sy = Math.max(0, b.y1 - py);
    const sw2 = Math.min(w, b.x2 + px + 1) - sx;
    const sh2 = Math.min(h, b.y2 + py + 1) - sy;

    const sc = document.createElement('canvas');
    sc.width = sw2; sc.height = sh2;
    sc.getContext('2d').drawImage(canvas, sx, sy, sw2, sh2, 0, 0, sw2, sh2);

    // 各スプライト個別に外周 flood fill で囲まれた背景を自動除去
    _cleanSpriteEdges(sc, bgTolerance, bgColor);

    result.push({ canvas: sc, srcX: sx, srcY: sy, w: sw2, h: sh2,
                  name: '', id: '', icon: '🐠', expr: 'normal',
                  facing: 'right', sizePx: 70, count: 3,
                  pattern: 'swim', reaction: 'jump',
                  speed: 1.0, duration: 1.0 });
  }

  // Sort: top-to-bottom, left-to-right
  result.sort((a, b) => {
    const ra = Math.floor(a.srcY / 80), rb = Math.floor(b.srcY / 80);
    return ra !== rb ? ra - rb : a.srcX - b.srcX;
  });
  return result;
}

document.getElementById('btn-split').addEventListener('click', async () => {

// Sprites Grid
// ════════════════════════════════════════════════════════════
function renderSpritesGrid() {
  const grid    = document.getElementById('sprites-grid');
  const toolbar = document.getElementById('sprites-bar');
  document.getElementById('tab-sprites-btn').textContent = `スプライト (${sprites.length})`;

  if (sprites.length === 0) {
    grid.innerHTML = '<div class="empty-msg">「スプライトを分割」を実行してください。</div>';
    toolbar.style.display = 'none';
    document.getElementById('deploy-bar').classList.remove('show');
    return;
  }

  toolbar.style.display = 'flex';
  document.getElementById('sprites-count').textContent = sprites.length + '体';
  document.getElementById('deploy-bar').classList.add('show');

  grid.innerHTML = '';
  sprites.forEach((sp, idx) => grid.appendChild(createSpriteCard(sp, idx)));
}

function createSpriteCard(sp, idx) {
  const card = document.createElement('div');
  card.className = 'sprite-card selected';
  card.dataset.idx = idx;

  const maxW = 198, maxH = 110;
  const scale = Math.min(1, maxW / sp.w, maxH / sp.h);
  const pv = document.createElement('canvas');
  pv.width  = Math.round(sp.w * scale);
  pv.height = Math.round(sp.h * scale);
  pv.getContext('2d').drawImage(sp.canvas, 0, 0, pv.width, pv.height);

  const sel = (val, opts) => opts.map(([v,t]) =>
    `<option value="${v}" ${sp[val]===v?'selected':''}>${t}</option>`).join('');

  card.innerHTML = `
    <div class="card-hdr">
      <input type="checkbox" class="sp-check" checked>
      <span class="card-num">#${idx + 1}</span>
      <span class="card-dims">${sp.w}×${sp.h}</span>
    </div>
    <div class="card-preview" id="cpv-${idx}"></div>
    <div class="card-body">
      <input type="text" class="card-name sp-name" placeholder="名前（同じ名前でグループ化）" value="${sp.name}">
      <input type="text" class="card-id sp-id"   placeholder="ID（英数）例: medaka" value="${sp.id}">
      <div class="card-row">
        <select class="card-expr sp-expr">
          <option value="normal"    ${sp.expr==='normal'    ?'selected':''}>🏊 コマ1</option>
          <option value="normal_2"  ${sp.expr==='normal_2'  ?'selected':''}>🏊 コマ2</option>
          <option value="normal_3"  ${sp.expr==='normal_3'  ?'selected':''}>🏊 コマ3</option>
          <option value="surprised" ${sp.expr==='surprised' ?'selected':''}>😲 おどろき</option>
          <option value="happy"     ${sp.expr==='happy'     ?'selected':''}>😄 わらう</option>
        </select>

function refreshCardPreview(card, idx) {
  const sp = sprites[idx];
  const maxW = 198, maxH = 110;
  const scale = Math.min(1, maxW / sp.w, maxH / sp.h);
  const pv = document.createElement('canvas');
  pv.width  = Math.round(sp.w * scale);
  pv.height = Math.round(sp.h * scale);
  pv.getContext('2d').drawImage(sp.canvas, 0, 0, pv.width, pv.height);
  const wrap = card.querySelector('.card-preview');
  wrap.innerHTML = '';
  wrap.appendChild(pv);
}

// Sprite Flip
// ════════════════════════════════════════════════════════════
function flipSprite(idx) {
  const sp = sprites[idx];
  const fc = document.createElement('canvas');
  fc.width = sp.canvas.width; fc.height = sp.canvas.height;
  const ctx = fc.getContext('2d');
  ctx.translate(fc.width, 0); ctx.scale(-1, 1);
  ctx.drawImage(sp.canvas, 0, 0);
  sp.canvas = fc;
}

// Sprite Grid Selection (drag / shift+click / ctrl+click)
// ════════════════════════════════════════════════════════════
let lastClickedCardIdx = -1;

function setCardChecked(card, selected) {
  card.classList.toggle('selected', selected);
  card.querySelector('.sp-check').checked = selected;
}

(function() {
  const grid = document.getElementById('sprites-grid');
  let moveHandler = null, upHandler = null;

  grid.addEventListener('pointerdown', e => {
    if (!e.target.closest('.card-hdr')) return;
    e.preventDefault();
    const startCard = e.target.closest('.sprite-card');
    if (!startCard) return;

    const startX = e.clientX, startY = e.clientY;
    const dragTarget = !startCard.classList.contains('selected');
    let dragMoved = false;
    const touched = new Set([startCard]);

    moveHandler = mv => {
      const dx = mv.clientX - startX, dy = mv.clientY - startY;
      if (!dragMoved && dx * dx + dy * dy < 36) return; // 6px 以内は無視
      if (!dragMoved) {
        dragMoved = true;
        setCardChecked(startCard, dragTarget);
        lastClickedCardIdx = parseInt(startCard.dataset.idx);
      }
      const el = document.elementFromPoint(mv.clientX, mv.clientY);
      const card = el && el.closest('.sprite-card');
      if (!card || touched.has(card)) return;
      touched.add(card);
      setCardChecked(card, dragTarget);
    };

    upHandler = up => {
      document.removeEventListener('pointermove', moveHandler);
      document.removeEventListener('pointerup',   upHandler);
      moveHandler = upHandler = null;

      if (!dragMoved) {
        // クリック確定
        const clickedIdx = parseInt(startCard.dataset.idx);
        if (up.shiftKey && lastClickedCardIdx >= 0) {
          // Shift: 範囲選択（既選択は維持）
          const from = Math.min(lastClickedCardIdx, clickedIdx);
          const to   = Math.max(lastClickedCardIdx, clickedIdx);
          grid.querySelectorAll('.sprite-card').forEach(c => {
            const i = parseInt(c.dataset.idx);
            if (i >= from && i <= to) setCardChecked(c, true);
          });
          // lastClickedCardIdx はそのまま（アンカー固定）
        } else if (up.ctrlKey || up.metaKey) {
          // Ctrl/Cmd: 個別トグル
          setCardChecked(startCard, !startCard.classList.contains('selected'));
          lastClickedCardIdx = clickedIdx;
        } else {
          // 普通クリック: トグル
          setCardChecked(startCard, !startCard.classList.contains('selected'));
          lastClickedCardIdx = clickedIdx;
        }
      }
    };

    document.addEventListener('pointermove', moveHandler);
    document.addEventListener('pointerup',   upHandler);
  });
})();

function getExistingIdSet() {
  const ids = new Set(HARDCODED_IDS);
  if (creaturesData && creaturesData.creatures) {
    creaturesData.creatures.forEach(c => ids.add(c.id));
  }
  sprites.forEach(sp => { if (sp.id) ids.add(sp.id); });
  return ids;
}

async function aiNameSprite(idx) {
  const sp = sprites[idx];
  const base64 = sp.canvas.toDataURL('image/png').split(',')[1];
  const existingIds = getExistingIdSet();

  const prompt = `添付の画像は子供向け水族館ゲームに登場する海の生き物のイラストです。
以下のJSON形式のみを返してください。余計な説明は不要です。

{
  "id": "英語スネークケースID（例: medaka, clownfish, sea_turtle）",
  "name": "日本語表示名・ひらがな/カタカナ中心（例: メダカ、クマノミ）",
  "icon": "最適な絵文字1文字"
}

使用禁止ID（既登録）: ${[...existingIds].join(', ')}
ルール: IDは半角英数とアンダースコアのみ。既存IDと重複禁止。`;

  const r = await fetch('/.netlify/functions/ai-name', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ image: base64, mimeType: 'image/png', prompt })
  });
  const ct = r.headers.get('content-type') || '';
  let data;
  if (ct.includes('application/json')) {
    data = await r.json();
  } else {
    const txt = await r.text();
    throw new Error('HTTP ' + r.status + ' (non-JSON): ' + txt.slice(0, 100));
  }
  if (!r.ok) throw new Error(data.error || 'API error');

  const m = (data.text || '').match(/\{[\s\S]*\}/);
  if (!m) throw new Error('JSONが見つかりません');
  const res = JSON.parse(m[0]);

  let newId = (res.id || '').toLowerCase()
    .replace(/[^a-z0-9_]/g, '_').replace(/^_+|_+$/g, '').replace(/_+/g, '_') || 'creature';
  let newName = (res.name || '').trim() || newId;
  let newIcon = (res.icon || '🐠').trim();

  // Dedup
  const origId = newId; let suf = 2;
  while (existingIds.has(newId)) { newId = origId + '_' + suf++; }

  sprites[idx].id   = newId;
  sprites[idx].name = newName;
  sprites[idx].icon = newIcon;
}

// ════════════════════════════════════════════════════════════
// グループ命名: Gemini に全スプライトをまとめて送り、種類ごとにグループ分け＆命名
// ════════════════════════════════════════════════════════════

/**
 * 全スプライトを1回のGemini呼び出しでグループ分けして命名する
 * @param {number[]} idxList  - スプライトインデックスの配列
 * @returns {Promise<{indices:number[], id:string, name:string, icon:string}[]>}
 *   indices はidxList上の位置（0始まり）ではなく実際のspriteインデックス
 */
async function aiGroupSprites(idxList) {
  const existingIds = getExistingIdSet();

  // 全スプライトをbase64に変換
  const images = idxList.map(i => ({
    data:     sprites[i].canvas.toDataURL('image/png').split(',')[1],
    mimeType: 'image/png'
  }));

  const prompt =
`以下の${idxList.length}枚の画像は子供向け水族館ゲームに登場する海の生き物のスプライトです。
同じ種類の生き物（表情違い・向き違いを含む）を同じグループにまとめ、各グループに名前をつけてください。
画像は0から${idxList.length - 1}まで番号が付いています（送信順）。

以下のJSON配列のみを返してください：
[
  {
    "indices": [同じ生き物の画像番号の配列（0始まり）],
    "id": "英語スネークケースID（例: clownfish, manta_ray, sea_turtle）",
    "name": "日本語名・ひらがな/カタカナ中心（例: クマノミ）",
    "icon": "最適な絵文字1文字"
  }
]

使用禁止ID（既登録）: ${[...existingIds].join(', ')}
ルール: 全画像番号を必ずどれかのグループに含める。IDは半角英数とアンダースコアのみ。重複IDは禁止。`;

  const r = await fetch('/.netlify/functions/ai-name', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ images, prompt })
  });
  const ct2 = r.headers.get('content-type') || '';
  let data;
  if (ct2.includes('application/json')) {
    data = await r.json();
  } else {
    const txt = await r.text();
    throw new Error('HTTP ' + r.status + ' (non-JSON): ' + txt.slice(0, 100));
  }
  if (!r.ok) throw new Error(data.error || 'API error');

  const m = (data.text || '').match(/\[[\s\S]*\]/);
  if (!m) throw new Error('Geminiの応答からJSONが見つかりません');
  const raw = JSON.parse(m[0]);

  // position index → actual sprite index に変換 + ID dedup
  const usedIds = new Set(existingIds);
  return raw.map(g => {
    let id = (g.id || '').toLowerCase()
      .replace(/[^a-z0-9_]/g, '_').replace(/^_+|_+$/g, '').replace(/_+/g, '_') || 'creature';
    const origId = id; let suf = 2;
    while (usedIds.has(id)) { id = origId + '_' + suf++; }
    usedIds.add(id);
    return {
      indices: (g.indices || []).map(pos => idxList[pos]),
      id,
      name: (g.name || id).trim(),
      icon: (g.icon || '🐠').trim()
    };
  });
}

document.getElementById('btn-ai-group').addEventListener('click', async () => {
  const cards = [...document.querySelectorAll('.sprite-card.selected')];
  if (!cards.length) { showToast('スプライトを選択してください', false); return; }

  const idxList = cards.map(c => parseInt(c.dataset.idx));
  showLoading(`Geminiでグループ分け中... (${idxList.length}体 → API 1回)`);

  try {
    const groups = await aiGroupSprites(idxList);

    groups.forEach(g => {
      g.indices.forEach(idx => {
        if (idx == null || idx === undefined) return;
        sprites[idx].name = g.name;
        sprites[idx].id   = g.id;
        sprites[idx].icon = g.icon;
        const card = document.querySelector(`.sprite-card[data-idx="${idx}"]`);
        if (card) {
          card.querySelector('.sp-name').value = g.name;
          card.querySelector('.sp-id').value   = g.id;
        }
      });
    });

    hideLoading();
    showToast(`グループ命名完了: ${groups.length}種類 / ${idxList.length}体 (API: 1回)`, true);
  } catch (e) {
    hideLoading();
    showToast('グループ命名失敗: ' + e.message, false);
  }
});

async function fetchCreaturesData() {
  try {
    const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${CREATURES_PATH}?ref=${GH_BRANCH}&_=${Date.now()}`;
    const r = await fetch(url, { headers: ghHeaders(), cache: 'no-store' });
    if (r.ok) {
      const d = await r.json();
      creaturesData = JSON.parse(base64ToUtf8(d.content.replace(/\n/g, '')));
    } else {
      const r2 = await fetch('../' + CREATURES_PATH);
      creaturesData = r2.ok ? await r2.json() : { version: 1, creatures: [] };
    }
  } catch (e) {
    creaturesData = { version: 1, creatures: [] };
  }
  if (!creaturesData.creatures) creaturesData.creatures = [];
}

document.getElementById('btn-deploy').addEventListener('click', async () => {
  if (!getToken()) { showToast('GitHubトークンを設定してください', false); return; }

  // Collect selected
  const selectedCards = [...document.querySelectorAll('.sprite-card.selected')];
  if (!selectedCards.length) { showToast('スプライトを選択してください', false); return; }

  // Validate names
  const unnamed = selectedCards.filter(c => !sprites[parseInt(c.dataset.idx)].name.trim());
  if (unnamed.length) { showToast('すべての選択スプライトに名前をつけてください', false); return; }

  // Group by creature name
  const groups = new Map();
  for (const card of selectedCards) {
    const sp = sprites[parseInt(card.dataset.idx)];
    const key = sp.name.trim();
    if (!groups.has(key)) {
      const rawId = sp.id || key.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/^_+|_+$/, '').replace(/_+/g, '_') || 'creature';
      groups.set(key, { id: rawId, name: key, icon: sp.icon || '🐠', frames: [null, null, null], surprised: null, happy: null });
    }
    const g = groups.get(key);
    if (sp.id) g.id = sp.id;
    if (sp.icon && sp.icon !== '🐠') g.icon = sp.icon;

    if      (sp.expr === 'normal'    ) g.frames[0] = sp;
    else if (sp.expr === 'normal_2'  ) g.frames[1] = sp;
    else if (sp.expr === 'normal_3'  ) g.frames[2] = sp;
    else if (sp.expr === 'surprised' && !g.surprised) g.surprised = sp;
    else if (sp.expr === 'happy'     && !g.happy)     g.happy = sp;
  }

  // frames[null,null,null] → 詰めた配列に変換
  for (const [, g] of groups) {
    g.normal = g.frames.filter(f => f !== null);
  }

  // Validate groups
  for (const [name, g] of groups) {
    if (!g.normal.length) { showToast(`「${name}」のコマ1画像がありません`, false); return; }
    if (!g.surprised)     { showToast(`「${name}」のおどろき画像がありません`, false); return; }
  }

  const setStatus = msg => {
    document.getElementById('deploy-status').textContent = msg;
    document.getElementById('loading-msg').textContent = msg;
  };

  showLoading('creatures.json を確認中...');
  await fetchCreaturesData();

  const existingIds = new Set([...HARDCODED_IDS, ...creaturesData.creatures.map(c => c.id)]);
  for (const [, g] of groups) {
    if (existingIds.has(g.id)) {
      hideLoading();
      showToast(`ID "${g.id}" は既に登録済みです。IDを変更してください。`, false);
      return;
    }
  }

  // Count total uploads
  let totalUploads = 0;
  for (const [, g] of groups) totalUploads += g.normal.length + 1 + (g.happy ? 1 : 0);
  let uploaded = 0;

  try {
    for (const [, g] of groups) {
      // 生き物設定はグループの代表スプライト（コマ1）から読む
      const rep = g.normal[0] || g.surprised;
      const facing   = rep.facing   || 'right';
      const sizePx   = rep.sizePx   || 70;
      const count    = rep.count    || 3;
      const pattern  = rep.pattern  || 'swim';
      const reaction = rep.reaction || 'jump';
      const speed    = rep.speed    || 1.0;
      const duration = rep.duration || 1.0;

      const folder  = g.id.charAt(0).toUpperCase() + g.id.slice(1);
      const normNames = g.normal.map((_, i) => `${folder}_normal_${i+1}.png`);
      const surprName = `${folder}_surprised.png`;
      const happyName = g.happy ? `${folder}_happy.png` : null;

      for (let i = 0; i < g.normal.length; i++) {
        const label = g.normal.length > 1 ? `コマ${i+1}` : 'ふつう';
        setStatus(`🔄 アップロード中 ${++uploaded}/${totalUploads} — ${g.name} (${label})`);
        await ghUploadPromise(
          `assets/images/ocean/${folder}/${normNames[i]}`,
          canvasToBase64(g.normal[i].canvas),
          `🐠 studio: ${g.id} / ${normNames[i]}`
        );
      }

      setStatus(`🔄 アップロード中 ${++uploaded}/${totalUploads} — ${g.name} (おどろき)`);
      await ghUploadPromise(
        `assets/images/ocean/${folder}/${surprName}`,
        canvasToBase64(g.surprised.canvas),
        `🐠 studio: ${g.id} / ${surprName}`
      );

      if (g.happy) {
        setStatus(`🔄 アップロード中 ${++uploaded}/${totalUploads} — ${g.name} (わらう)`);
        await ghUploadPromise(
          `assets/images/ocean/${folder}/${happyName}`,
          canvasToBase64(g.happy.canvas),
          `🐠 studio: ${g.id} / ${happyName}`
        );
      }

      const entry = {
        id: g.id, displayName: g.name, icon: g.icon, folder,
        expressions: {
          normal:    normNames.length === 1 ? normNames[0] : normNames,
          surprised: surprName
        },
        pattern, reactionType: reaction, facingDir: facing,
        baseSizePx: sizePx, baseSizeJitter: 30,
        imgWidthHint: g.normal[0].w,
        speedMin: 0.04, speedMax: 0.07,
        spawnCount: count, reactionSpeed: speed, reactionDuration: duration,
        rewardType: 'sea'
      };
      if (happyName) entry.expressions.happy = happyName;
      creaturesData.creatures.push(entry);
    }

    setStatus('🔄 creatures.json を更新中...');
    await ghUploadPromise(
      CREATURES_PATH,
      utf8ToBase64(JSON.stringify(creaturesData, null, 2)),
      `🐠 studio: register ${groups.size} creature(s)`
    );

    hideLoading();
    setStatus(`✅ ${groups.size}体を登録しました！水族館を確認してください。`);
    showToast(`🐠 ${groups.size}体の生き物を登録しました`, true);

  } catch (e) {
    hideLoading();
    setStatus('❌ エラー: ' + e.message);
    showToast('登録失敗: ' + e.message, false);
  }
});

// ════════════════════════════════════════════════════════════
// Init
// ════════════════════════════════════════════════════════════
fetchCreaturesData(); // preload for duplicate ID check
</script>
