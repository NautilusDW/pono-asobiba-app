function renderSpritesGrid() {
  const grid    = document.getElementById('sprites-grid');
  const toolbar = document.getElementById('sprites-bar');
  document.getElementById('tab-sprites-btn').textContent = `スプライト (${sprites.length})`;

  if (sprites.length === 0) {
    grid.innerHTML = '<div class="empty-msg">「スプライトを分割」を実行してください。</div>';
    toolbar.style.display = 'none';
    document.getElementById('deploy-bar').classList.remove('show');
    return;
  }

  toolbar.style.display = 'flex';
  document.getElementById('sprites-count').textContent = sprites.length + '体';
  document.getElementById('deploy-bar').classList.add('show');

  grid.innerHTML = '';
  sprites.forEach((sp, idx) => grid.appendChild(createSpriteCard(sp, idx)));
}

function createSpriteCard(sp, idx) {
  const card = document.createElement('div');
  card.className = 'sprite-card selected';
  card.dataset.idx = idx;

  const maxW = 198, maxH = 110;
  const scale = Math.min(1, maxW / sp.w, maxH / sp.h);
  const pv = document.createElement('canvas');
  pv.width  = Math.round(sp.w * scale);
  pv.height = Math.round(sp.h * scale);
  pv.getContext('2d').drawImage(sp.canvas, 0, 0, pv.width, pv.height);

  const sel = (val, opts) => opts.map(([v,t]) =>
    `<option value="${v}" ${sp[val]===v?'selected':''}>${t}</option>`).join('');

  card.innerHTML = `
    <div class="card-hdr">
      <input type="checkbox" class="sp-check" checked>
      <span class="card-num">#${idx + 1}</span>
      <span class="card-dims">${sp.w}×${sp.h}</span>
    </div>
    <div class="card-preview" id="cpv-${idx}"></div>
    <div class="card-body">
      <input type="text" class="card-name sp-name" placeholder="名前（同じ名前でグループ化）" value="${sp.name}">
      <div style="position:relative">
        <input type="text" class="card-id sp-id" placeholder="ID（英数）例: medaka" value="${sp.id}" autocomplete="off">
        <button class="sp-id-suggest-btn" title="既存IDから選ぶ" type="button">▼</button>
        <div class="sp-id-suggest-list"></div>
      </div>
      <div class="card-row">
        <select class="card-expr sp-expr">
          <option value="normal"    ${sp.expr==='normal'    ?'selected':''}>🏊 コマ1</option>
          <option value="normal_2"  ${sp.expr==='normal_2'  ?'selected':''}>🏊 コマ2</option>
          <option value="normal_3"  ${sp.expr==='normal_3'  ?'selected':''}>🏊 コマ3</option>
          <option value="surprised" ${sp.expr==='surprised' ?'selected':''}>😲 おどろき</option>
          <option value="happy"     ${sp.expr==='happy'     ?'selected':''}>😄 わらう</option>
        </select>
        <button class="icon-btn icon-btn-ai"   data-idx="${idx}" title="AIで命名">🤖</button>
        <button class="icon-btn icon-btn-flip" data-idx="${idx}" data-action="flip" title="左右反転">↔</button>
        <button class="icon-btn icon-btn-del"  data-idx="${idx}" data-action="del"  title="削除">✕</button>
      </div>
    </div>
    <details class="card-details">
      <summary>⚙ 生き物の設定</summary>
      <div class="card-settings">
        <div class="cs-row">
          <div class="cs-field">
            <label>むき</label>
            <select class="sp-facing">
              <option value="right" ${sp.facing==='right'?'selected':''}>→ みぎ</option>
              <option value="left"  ${sp.facing==='left' ?'selected':''}>← ひだり</option>
            </select>
          </div>
          <div class="cs-field">
            <label>パターン</label>
            <select class="sp-pattern">
              ${sel('pattern',[['swim','🏊 およぐ'],['float','🪼 ただよう'],['jellyfish','🪼 ぷかぷか'],['drift','🌊 ながれる'],['sway','🌿 ゆれる'],['crawl','🦀 あるく']])}
            </select>
          </div>
        </div>
        <div class="cs-row">
          <div class="cs-field">
            <label>サイズ (px)</label>
            <input type="number" class="sp-sizepx" value="${sp.sizePx}" min="20" max="300">
          </div>
          <div class="cs-field">
            <label>数</label>
            <input type="number" class="sp-count" value="${sp.count}" min="1" max="10">
          </div>
        </div>
        <div class="cs-field">
          <label>反応</label>
          <select class="sp-reaction">
            ${sel('reaction',[['jump','ジャンプ'],['ink','スミ吐き'],['shell','こうらに隠れる'],['glow','光る']])}
          </select>
        </div>
        <div class="cs-row">
          <div class="cs-field">
            <label>スピード <span class="sp-speed-val">${sp.speed.toFixed(1)}</span></label>
            <input type="range" class="sp-speed" min="0.1" max="2.0" step="0.1" value="${sp.speed}">
          </div>
          <div class="cs-field">
            <label>長さ <span class="sp-dur-val">${sp.duration.toFixed(1)}</span></label>
            <input type="range" class="sp-duration" min="0.1" max="2.0" step="0.1" value="${sp.duration}">
          </div>
        </div>
      </div>
    </details>`;

  card.querySelector('.card-preview').appendChild(pv);

  // チェックボックスのデフォルト動作を抑制（グリッドレベルで管理）
  card.querySelector('.sp-check').addEventListener('click', e => e.preventDefault());

  card.querySelector('.sp-name').addEventListener('input', function() {
    sprites[idx].name = this.value;
    const idEl = card.querySelector('.sp-id');
    if (!idEl.dataset.manual) autoTranslateId(this.value, idEl, idx);
  });
  card.querySelector('.sp-id').addEventListener('input', function() {
    this.dataset.manual = '1';
    sprites[idx].id = this.value;
    // 入力中にサジェストを絞り込み
    _filterSuggestList(card, this.value);
  });

  // ID サジェスト (既存IDから選択)
  const suggestBtn  = card.querySelector('.sp-id-suggest-btn');
  const suggestList = card.querySelector('.sp-id-suggest-list');
  const idInput     = card.querySelector('.sp-id');

  suggestBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (suggestList.classList.contains('open')) {
      suggestList.classList.remove('open');
      return;
    }
    _buildSuggestList(card, '');
    suggestList.classList.add('open');
  });

  // 外クリックで閉じる
  document.addEventListener('click', e => {
    if (!card.contains(e.target)) suggestList.classList.remove('open');
  });
  card.querySelector('.sp-expr').addEventListener('change', function() { sprites[idx].expr = this.value; });

  // Creature settings
  card.querySelector('.sp-facing').addEventListener('change',   function() { sprites[idx].facing   = this.value; });
  card.querySelector('.sp-pattern').addEventListener('change',  function() { sprites[idx].pattern  = this.value; });
  card.querySelector('.sp-reaction').addEventListener('change', function() { sprites[idx].reaction = this.value; });
  card.querySelector('.sp-sizepx').addEventListener('input',   function() { sprites[idx].sizePx   = parseInt(this.value) || 70; });
  card.querySelector('.sp-count').addEventListener('input',    function() { sprites[idx].count    = parseInt(this.value) || 3; });
  card.querySelector('.sp-speed').addEventListener('input', function() {
    sprites[idx].speed = parseFloat(this.value);
    card.querySelector('.sp-speed-val').textContent = sprites[idx].speed.toFixed(1);
  });
  card.querySelector('.sp-duration').addEventListener('input', function() {
    sprites[idx].duration = parseFloat(this.value);
    card.querySelector('.sp-dur-val').textContent = sprites[idx].duration.toFixed(1);
  });

  card.querySelector('[data-action="flip"]').addEventListener('click', () => {
    flipSprite(idx);
    refreshCardPreview(card, idx);
  });

  card.querySelector('[data-action="del"]').addEventListener('click', () => {
    sprites.splice(idx, 1);
    renderSpritesGrid();
  });

  card.querySelector('.icon-btn-ai').addEventListener('click', async () => {
    const btn = card.querySelector('.icon-btn-ai');
    btn.textContent = '⏳'; btn.disabled = true;
    try {
      await aiNameSprite(idx);
      card.querySelector('.sp-name').value = sprites[idx].name;
      card.querySelector('.sp-id').value   = sprites[idx].id;
      delete card.querySelector('.sp-id').dataset.manual;
    } catch (e) {
      showToast('AI命名失敗: ' + e.message, false);
    }
    btn.textContent = '🤖'; btn.disabled = false;
  });

  return card;
}

// ── 既存IDサジェストリスト ──
function _getExistingCreatures() {
  if (!creaturesData || !creaturesData.creatures) return [];
  return creaturesData.creatures.map(c => ({
    id: c.id,
    name: c.displayName || c.id
  })).sort((a, b) => a.name.localeCompare(b.name, 'ja'));
}

function _buildSuggestList(card, filter) {
  const list = card.querySelector('.sp-id-suggest-list');
  const idInput = card.querySelector('.sp-id');
  const idx = parseInt(card.dataset.idx);
  list.innerHTML = '';

  let items = _getExistingCreatures();
  if (filter) {
    const f = filter.toLowerCase();
    items = items.filter(c => c.id.toLowerCase().includes(f) || c.name.includes(f));
  }

  if (items.length === 0) {
    list.innerHTML = '<div style="padding:6px 8px;font-size:0.65rem;color:#6b7280;">該当なし</div>';
    return;
  }

  items.forEach(c => {
    const item = document.createElement('div');
    item.className = 'sp-id-suggest-item';
    item.innerHTML = `<span>${c.id}</span><span class="suggest-name">${c.name}</span>`;
    item.addEventListener('click', () => {
      idInput.value = c.id;
      idInput.dataset.manual = '1';
      sprites[idx].id = c.id;
      list.classList.remove('open');
    });
    list.appendChild(item);
  });
}

function _filterSuggestList(card, filter) {
  const list = card.querySelector('.sp-id-suggest-list');
  if (!list.classList.contains('open')) return;
  _buildSuggestList(card, filter);
}

function refreshCardPreview(card, idx) {
  const sp = sprites[idx];
  const maxW = 198, maxH = 110;
  const scale = Math.min(1, maxW / sp.w, maxH / sp.h);
  const pv = document.createElement('canvas');
  pv.width  = Math.round(sp.w * scale);
  pv.height = Math.round(sp.h * scale);
  pv.getContext('2d').drawImage(sp.canvas, 0, 0, pv.width, pv.height);
  const wrap = card.querySelector('.card-preview');
  wrap.innerHTML = '';
  wrap.appendChild(pv);
}

// Sprite Flip
// ════════════════════════════════════════════════════════════
function flipSprite(idx) {
  const sp = sprites[idx];
  const fc = document.createElement('canvas');
  fc.width = sp.canvas.width; fc.height = sp.canvas.height;
  const ctx = fc.getContext('2d');
  ctx.translate(fc.width, 0); ctx.scale(-1, 1);
  ctx.drawImage(sp.canvas, 0, 0);
  sp.canvas = fc;
}

// ════════════════════════════════════════════════════════════
// Sprite Grid Selection (drag / shift+click / ctrl+click)
// ════════════════════════════════════════════════════════════
let lastClickedCardIdx = -1;

function setCardChecked(card, selected) {
  card.classList.toggle('selected', selected);
  card.querySelector('.sp-check').checked = selected;
}

(function() {
  const grid = document.getElementById('sprites-grid');
  let moveHandler = null, upHandler = null;

  grid.addEventListener('pointerdown', e => {
    if (!e.target.closest('.card-hdr')) return;
    e.preventDefault();
    const startCard = e.target.closest('.sprite-card');
    if (!startCard) return;

    const startX = e.clientX, startY = e.clientY;
    const dragTarget = !startCard.classList.contains('selected');
    let dragMoved = false;
    const touched = new Set([startCard]);

    moveHandler = mv => {
      const dx = mv.clientX - startX, dy = mv.clientY - startY;
      if (!dragMoved && dx * dx + dy * dy < 36) return; // 6px 以内は無視
      if (!dragMoved) {
        dragMoved = true;
        setCardChecked(startCard, dragTarget);
        lastClickedCardIdx = parseInt(startCard.dataset.idx);
      }
      const el = document.elementFromPoint(mv.clientX, mv.clientY);
      const card = el && el.closest('.sprite-card');
      if (!card || touched.has(card)) return;
      touched.add(card);
      setCardChecked(card, dragTarget);
    };

    upHandler = up => {
      document.removeEventListener('pointermove', moveHandler);
      document.removeEventListener('pointerup',   upHandler);
      moveHandler = upHandler = null;

      if (!dragMoved) {
        // クリック確定
        const clickedIdx = parseInt(startCard.dataset.idx);
        if (up.shiftKey && lastClickedCardIdx >= 0) {
          // Shift: 範囲選択（既選択は維持）
          const from = Math.min(lastClickedCardIdx, clickedIdx);
          const to   = Math.max(lastClickedCardIdx, clickedIdx);
          grid.querySelectorAll('.sprite-card').forEach(c => {
            const i = parseInt(c.dataset.idx);
            if (i >= from && i <= to) setCardChecked(c, true);
          });
          // lastClickedCardIdx はそのまま（アンカー固定）
        } else if (up.ctrlKey || up.metaKey) {
          // Ctrl/Cmd: 個別トグル
          setCardChecked(startCard, !startCard.classList.contains('selected'));
          lastClickedCardIdx = clickedIdx;
        } else {
          // 普通クリック: トグル
          setCardChecked(startCard, !startCard.classList.contains('selected'));
          lastClickedCardIdx = clickedIdx;
        }
      }
    };

    document.addEventListener('pointermove', moveHandler);
    document.addEventListener('pointerup',   upHandler);
  });
})();

// AI Naming
// ════════════════════════════════════════════════════════════
function getExistingIdSet() {
  const ids = new Set(HARDCODED_IDS);
  if (creaturesData && creaturesData.creatures) {
    creaturesData.creatures.forEach(c => ids.add(c.id));
  }
  sprites.forEach(sp => { if (sp.id) ids.add(sp.id); });
  return ids;
}

// 日本語名→英語ID自動変換（ローカルで可能ならローカル、無理ならAPI）
let _translateTimer = null;
function autoTranslateId(name, idEl, idx) {
  clearTimeout(_translateTimer);
  const trimmed = name.trim();
  if (!trimmed) return;
  // ASCII のみなら即時ローカル変換
  if (/^[\x20-\x7E]+$/.test(trimmed)) {
    const id = trimmed.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/^_+|_+$/g, '').replace(/_+/g, '_');
    idEl.value = id; sprites[idx].id = id;
    return;
  }
  // 日本語含む場合: デバウンスしてGemini直接翻訳
  _translateTimer = setTimeout(async () => {
    if (idEl.dataset.manual) return;
    const apiKey = getGeminiKey();
    if (!apiKey) return;
    try {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `「${trimmed}」を英語のスネークケースID 1語で返してください。例: カブトムシ→beetle、しょうぼうしゃ→fire_engine。IDのみ出力、説明不要。` }] }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 64 }
        })
      });
      const data = await r.json();
      if (!r.ok || !data.candidates?.[0]?.content) return;
      let id = (data.candidates[0].content.parts[0].text || '').trim().toLowerCase()
        .replace(/[^a-z0-9_]/g, '_').replace(/^_+|_+$/g, '').replace(/_+/g, '_');
      if (id && !idEl.dataset.manual) { idEl.value = id; sprites[idx].id = id; }
    } catch {}
  }, 600);
}

async function aiNameSprite(idx) {
  const sp = sprites[idx];
  const scale = Math.min(1, 200 / Math.max(sp.canvas.width, sp.canvas.height));
  const tw = Math.round(sp.canvas.width * scale), th = Math.round(sp.canvas.height * scale);
  const tc = document.createElement('canvas');
  tc.width = tw; tc.height = th;
  tc.getContext('2d').drawImage(sp.canvas, 0, 0, tw, th);
  const base64 = tc.toDataURL('image/jpeg', 0.7).split(',')[1];
  const existingIds = getExistingIdSet();

  const prompt = `添付の画像は子供向けゲームに登場するイラストです（動物、恐竜、食べ物、乗り物など何でもあり得ます）。
以下のJSON形式のみを返してください。余計な説明は不要です。

{
  "id": "英語スネークケースID（例: apple, fire_truck, triceratops）",
  "name": "日本語表示名・ひらがな/カタカナ中心（例: りんご、しょうぼうしゃ）",
  "icon": "最適な絵文字1文字"
}

使用禁止ID（既登録）: ${[...existingIds].join(', ')}
ルール: IDは半角英数とアンダースコアのみ。既存IDと重複禁止。`;

  // 直接 Gemini API を叩く
  const apiKey = getGeminiKey();
  if (!apiKey) throw new Error('Gemini APIキーが設定されていません');

  const model = 'gemini-2.5-flash';
  const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

  const r = await fetch(apiUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [
        { inline_data: { mime_type: 'image/jpeg', data: base64 } },
        { text: prompt }
      ]}],
      generationConfig: { temperature: 0.2, responseMimeType: 'application/json', maxOutputTokens: 1024 }
    })
  });
  const data = await r.json();
  if (!r.ok) throw new Error('Gemini API error: ' + (data.error?.message || 'unknown'));
  if (!data.candidates?.[0]?.content) throw new Error('Gemini応答が空です');

  const text = data.candidates[0].content.parts[0].text;
  const m = (text || '').match(/\{[\s\S]*\}/);
  if (!m) throw new Error('JSONが見つかりません');
  const res = JSON.parse(m[0]);

  let newId = (res.id || '').toLowerCase()
    .replace(/[^a-z0-9_]/g, '_').replace(/^_+|_+$/g, '').replace(/_+/g, '_') || 'creature';
  let newName = (res.name || '').trim() || newId;
  let newIcon = (res.icon || '🐠').trim();

  // Dedup
  const origId = newId; let suf = 2;
  while (existingIds.has(newId)) { newId = origId + '_' + suf++; }

  sprites[idx].id   = newId;
  sprites[idx].name = newName;
  sprites[idx].icon = newIcon;
}



// ════════════════════════════════════════════════════════════
// グループ命名: Gemini に全スプライトをまとめて送り、種類ごとにグループ分け＆命名
// ════════════════════════════════════════════════════════════

/**
 * 全スプライトを1回のGemini呼び出しでグループ分けして命名する
 * @param {number[]} idxList  - スプライトインデックスの配列
 * @returns {Promise<{indices:number[], id:string, name:string, icon:string}[]>}
 *   indices はidxList上の位置（0始まり）ではなく実際のspriteインデックス
 */
async function aiGroupSprites(idxList) {
  const existingIds = getExistingIdSet();

  // 全スプライトを縮小してbase64に変換（ペイロード+処理時間の削減）
  const MAX_THUMB = 96;
  const images = idxList.map(i => {
    const src = sprites[i].canvas;
    const scale = Math.min(1, MAX_THUMB / Math.max(src.width, src.height));
    const tw = Math.round(src.width * scale), th = Math.round(src.height * scale);
    const tc = document.createElement('canvas');
    tc.width = tw; tc.height = th;
    tc.getContext('2d').drawImage(src, 0, 0, tw, th);
    return {
      data:     tc.toDataURL('image/jpeg', 0.6).split(',')[1],
      mimeType: 'image/jpeg'
    };
  });

  const prompt =
`以下の${idxList.length}枚の画像は子供向けゲームに登場するイラストです（動物、恐竜、食べ物、乗り物など何でもあり得ます）。
同じ種類のもの（表情違い・向き違いを含む）を同じグループにまとめ、各グループに名前をつけてください。
画像は0から${idxList.length - 1}まで番号が付いています（送信順）。

以下のJSON配列のみを返してください：
[
  {
    "indices": [同じ生き物の画像番号の配列（0始まり）],
    "id": "英語スネークケースID（例: clownfish, manta_ray, sea_turtle）",
    "name": "日本語名・ひらがな/カタカナ中心（例: クマノミ）",
    "icon": "最適な絵文字1文字"
  }
]

使用禁止ID（既登録）: ${[...existingIds].join(', ')}
ルール: 全画像番号を必ずどれかのグループに含める。IDは半角英数とアンダースコアのみ。重複IDは禁止。`;

  // 直接 Gemini API を叩く（Netlifyの10秒制限を回避）
  const apiKey = getGeminiKey();
  if (!apiKey) throw new Error('Gemini APIキーが設定されていません。左パネルの「APIキー」に入力してください。');

  const model = 'gemini-2.5-flash';
  const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

  const parts = images.map(img => ({ inline_data: { mime_type: img.mimeType, data: img.data } }));
  parts.push({ text: prompt });

  const r = await fetch(apiUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts }],
      generationConfig: { temperature: 0.2, responseMimeType: 'application/json', maxOutputTokens: 8192 }
    })
  });
  const data = await r.json();
  if (!r.ok) throw new Error('Gemini API error: ' + (data.error?.message || JSON.stringify(data.error || data)));
  if (!data.candidates?.[0]?.content) throw new Error('Gemini応答が空です');

  const text = data.candidates[0].content.parts[0].text;
  const m = (text || '').match(/\[[\s\S]*\]/);
  if (!m) throw new Error('JSONが見つかりません: ' + (text || '').slice(0, 100));
  const raw = JSON.parse(m[0]);

  // position index → actual sprite index に変換 + ID dedup
  const usedIds = new Set(existingIds);
  return raw.map(g => {
    let id = (g.id || '').toLowerCase()
      .replace(/[^a-z0-9_]/g, '_').replace(/^_+|_+$/g, '').replace(/_+/g, '_') || 'creature';
    const origId = id; let suf = 2;
    while (usedIds.has(id)) { id = origId + '_' + suf++; }
    usedIds.add(id);
    return {
      indices: (g.indices || []).map(pos => idxList[pos]),
      id,
      name: (g.name || id).trim(),
      icon: (g.icon || '🐠').trim()
    };
  });
}

document.getElementById('btn-ai-group').addEventListener('click', async () => {
  const cards = [...document.querySelectorAll('.sprite-card.selected')];
  if (!cards.length) { showToast('スプライトを選択してください', false); return; }

  const idxList = cards.map(c => parseInt(c.dataset.idx));

  showLoading(`AI命名中... (${idxList.length}体 → Gemini直接 1回)`);

  try {
    const allGroups = await aiGroupSprites(idxList);

    allGroups.forEach(g => {
      g.indices.forEach(idx => {
        if (idx == null || idx === undefined) return;
        sprites[idx].name = g.name;
        sprites[idx].id   = g.id;
        sprites[idx].icon = g.icon;
        const card = document.querySelector(`.sprite-card[data-idx="${idx}"]`);
        if (card) {
          card.querySelector('.sp-name').value = g.name;
          card.querySelector('.sp-id').value   = g.id;
        }
      });
    });

    hideLoading();
    showToast(`命名完了: ${allGroups.length}種類 / ${idxList.length}体 (API: 1回)`, true);
  } catch (e) {
    hideLoading();
    showToast('命名失敗: ' + e.message, false);
    console.error('[aiGroupSprites]', e);
  }
});

// Deploy to GitHub
// ════════════════════════════════════════════════════════════
async function fetchCreaturesData() {
  try {
    const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${CREATURES_PATH}?ref=${GH_BRANCH}&_=${Date.now()}`;
    const r = await fetch(url, { headers: ghHeaders(), cache: 'no-store' });
    if (r.ok) {
      const d = await r.json();
      creaturesData = JSON.parse(base64ToUtf8(d.content.replace(/\n/g, '')));
    } else {
      const r2 = await fetch('../' + CREATURES_PATH);
      creaturesData = r2.ok ? await r2.json() : { version: 1, creatures: [] };
    }
  } catch (e) {
    creaturesData = { version: 1, creatures: [] };
  }
  if (!creaturesData.creatures) creaturesData.creatures = [];
}

document.getElementById('btn-deploy').addEventListener('click', async () => {
  if (!getToken()) { showToast('GitHubトークンを設定してください', false); return; }

  // Collect selected
  const selectedCards = [...document.querySelectorAll('.sprite-card.selected')];
  if (!selectedCards.length) { showToast('スプライトを選択してください', false); return; }

  // Validate names
  const unnamed = selectedCards.filter(c => !sprites[parseInt(c.dataset.idx)].name.trim());
  if (unnamed.length) { showToast('すべての選択スプライトに名前をつけてください', false); return; }

  // Group by creature name
  const groups = new Map();
  for (const card of selectedCards) {
    const sp = sprites[parseInt(card.dataset.idx)];
    const key = sp.name.trim();
    if (!groups.has(key)) {
      const rawId = sp.id || key.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/^_+|_+$/, '').replace(/_+/g, '_') || 'creature';
      groups.set(key, { id: rawId, name: key, icon: sp.icon || '🐠', frames: [null, null, null], surprised: null, happy: null });
    }
    const g = groups.get(key);
    if (sp.id) g.id = sp.id;
    if (sp.icon && sp.icon !== '🐠') g.icon = sp.icon;

    if      (sp.expr === 'normal'    ) g.frames[0] = sp;
    else if (sp.expr === 'normal_2'  ) g.frames[1] = sp;
    else if (sp.expr === 'normal_3'  ) g.frames[2] = sp;
    else if (sp.expr === 'surprised' && !g.surprised) g.surprised = sp;
    else if (sp.expr === 'happy'     && !g.happy)     g.happy = sp;
  }

  // frames[null,null,null] → 詰めた配列に変換
  for (const [, g] of groups) {
    g.normal = g.frames.filter(f => f !== null);
  }

  // Validate groups
  for (const [name, g] of groups) {
    if (!g.normal.length) { showToast(`「${name}」のコマ1画像がありません`, false); return; }
    // おどろきがない場合はコマ1で代用（静止画1枚だけの登録を許可）
    if (!g.surprised) g.surprised = g.normal[0];
  }

  const setStatus = msg => {
    document.getElementById('deploy-status').textContent = msg;
    document.getElementById('loading-msg').textContent = msg;
  };

  showLoading('creatures.json を確認中...');
  await fetchCreaturesData();

  const existingIds = new Set([...HARDCODED_IDS, ...creaturesData.creatures.map(c => c.id)]);
  const existingNames = new Set(creaturesData.creatures.map(c => c.displayName));

  // 重複/新規を分類
  const newGroups = [], dupGroups = [];
  for (const [, g] of groups) {
    if (existingIds.has(g.id) || existingNames.has(g.name)) {
      dupGroups.push(g);
    } else {
      newGroups.push(g);
    }
  }

  if (dupGroups.length > 0) {
    const dupNames = dupGroups.map(g => `「${g.name}」(${g.id})`).join(', ');
    showToast(`📦 ${dupGroups.length}体が重複 → staging に保存します: ${dupNames}`, true);
  }

  // 全グループの画像をアップロード（新規は ocean/、重複は staging/）
  let totalUploads = 0;
  const allGroups = [...newGroups, ...dupGroups];
  for (const g of allGroups) {
    const hasSeparateSurprised = !g.normal.includes(g.surprised);
    totalUploads += g.normal.length + (hasSeparateSurprised ? 1 : 0) + (g.happy ? 1 : 0);
  }
  let uploaded = 0;

  // staging.json の取得
  const STAGING_PATH = 'assets/data/staging.json';
  let stagingData = [];
  try {
    const sr = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${STAGING_PATH}?ref=${GH_BRANCH}&_=${Date.now()}`, { headers: ghHeaders(), cache: 'no-store' });
    if (sr.ok) {
      const sd = await sr.json();
      if (sd.content) stagingData = JSON.parse(decodeURIComponent(escape(atob(sd.content.replace(/\n/g, '')))));
    }
  } catch {}
  if (!Array.isArray(stagingData)) stagingData = [];

  try {
    for (const g of allGroups) {
      const isDup = dupGroups.includes(g);
      const baseDir = isDup ? 'assets/images/staging' : 'assets/images/ocean';
      const rep = g.normal[0] || g.surprised;
      const facing   = rep.facing   || 'right';
      const sizePx   = rep.sizePx   || 70;
      const count    = rep.count    || 3;
      const pattern  = rep.pattern  || 'swim';
      const reaction = rep.reaction || 'jump';
      const speed    = rep.speed    || 1.0;
      const duration = rep.duration || 1.0;

      const folder  = g.id.charAt(0).toUpperCase() + g.id.slice(1);
      const normNames = g.normal.map((_, i) => `${folder}_normal_${i+1}.png`);
      const hasSeparateSurprised = !g.normal.includes(g.surprised);
      const surprName = hasSeparateSurprised ? `${folder}_surprised.png` : normNames[0];
      const happyName = g.happy ? `${folder}_happy.png` : null;

      for (let i = 0; i < g.normal.length; i++) {
        const label = g.normal.length > 1 ? `コマ${i+1}` : 'ふつう';
        setStatus(`🔄 アップロード中 ${++uploaded}/${totalUploads} — ${g.name} (${label})${isDup ? ' [staging]' : ''}`);
        await ghUploadPromise(
          `${baseDir}/${folder}/${normNames[i]}`,
          canvasToBase64(g.normal[i].canvas),
          `🐠 studio: ${g.id} / ${normNames[i]}${isDup ? ' (staging)' : ''}`
        );
      }

      if (hasSeparateSurprised) {
        setStatus(`🔄 アップロード中 ${++uploaded}/${totalUploads} — ${g.name} (おどろき)${isDup ? ' [staging]' : ''}`);
        await ghUploadPromise(
          `${baseDir}/${folder}/${surprName}`,
          canvasToBase64(g.surprised.canvas),
          `🐠 studio: ${g.id} / ${surprName}${isDup ? ' (staging)' : ''}`
        );
      }

      if (g.happy) {
        setStatus(`🔄 アップロード中 ${++uploaded}/${totalUploads} — ${g.name} (わらう)${isDup ? ' [staging]' : ''}`);
        await ghUploadPromise(
          `${baseDir}/${folder}/${happyName}`,
          canvasToBase64(g.happy.canvas),
          `🐠 studio: ${g.id} / ${happyName}${isDup ? ' (staging)' : ''}`
        );
      }

      const entry = {
        id: g.id, displayName: g.name, icon: g.icon, folder,
        expressions: {
          normal:    normNames.length === 1 ? normNames[0] : normNames,
          surprised: surprName
        },
        pattern, reactionType: reaction, facingDir: facing,
        baseSizePx: sizePx, baseSizeJitter: 30,
        imgWidthHint: g.normal[0].w,
        speedMin: 0.04, speedMax: 0.07,
        spawnCount: count, reactionSpeed: speed, reactionDuration: duration,
        rewardType: 'sea'
      };
      if (happyName) entry.expressions.happy = happyName;

      if (isDup) {
        entry._staging = true;
        entry._stagedAt = new Date().toISOString();
        entry._duplicateOf = g.id;
        stagingData.push(entry);
      } else {
        creaturesData.creatures.push(entry);
      }
    }

    // creatures.json 更新（新規のみ）
    if (newGroups.length > 0) {
      setStatus('🔄 creatures.json を更新中...');
      await ghUploadPromise(
        CREATURES_PATH,
        utf8ToBase64(JSON.stringify(creaturesData, null, 2)),
        `🐠 studio: register ${newGroups.length} creature(s)`
      );
    }

    // staging.json 更新（重複があれば）
    if (dupGroups.length > 0) {
      setStatus('🔄 staging.json を更新中...');
      await ghUploadPromise(
        STAGING_PATH,
        utf8ToBase64(JSON.stringify(stagingData, null, 2)),
        `📦 studio: stage ${dupGroups.length} duplicate(s)`
      );
    }

    hideLoading();
    let msg = '';
    if (newGroups.length > 0) msg += `✅ ${newGroups.length}体を登録`;
    if (dupGroups.length > 0) msg += `${msg ? ' / ' : ''}📦 ${dupGroups.length}体をstaging保存`;
    setStatus(msg);
    showToast(`🐠 ${groups.size}体の生き物を登録しました`, true);

  } catch (e) {
    hideLoading();
    setStatus('❌ エラー: ' + e.message);
    showToast('登録失敗: ' + e.message, false);
  }
});

fetchCreaturesData(); // preload for duplicate ID check
