<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">
<title>Quizland OP レイアウトエディタ</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1c1f26; color: #e5e7eb; overflow: hidden; }

  #app {
    display: grid;
    grid-template-columns: 240px 1fr 320px;
    grid-template-rows: 48px 1fr;
    grid-template-areas:
      "header header header"
      "left   center right";
    height: 100vh;
    width: 100vw;
  }

  header {
    grid-area: header;
    background: #14161c;
    border-bottom: 1px solid #2a2e3a;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 10;
  }
  header h1 { font-size: 14px; margin: 0; color: #f3f4f6; font-weight: 600; }
  header .vp-group {
    display: flex;
    gap: 4px;
    background: #20242e;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    padding: 2px;
  }
  header .vp-group label {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    color: #cbd5e1;
  }
  header .vp-group input { display: none; }
  header .vp-group input:checked + span {
    background: #2563eb;
    color: #fff;
    padding: 4px 10px;
    border-radius: 3px;
  }
  header .vp-group span { padding: 4px 10px; border-radius: 3px; }
  header button {
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  header button:hover { background: #1d4ed8; }
  header button.ghost { background: transparent; border: 1px solid #3a4050; color: #cbd5e1; }
  header button.ghost:hover { background: #20242e; }
  header .spacer { flex: 1; }

  .panel {
    background: #181b22;
    border-right: 1px solid #2a2e3a;
    overflow-y: auto;
    padding: 12px;
    font-size: 12px;
  }
  #left  { grid-area: left; }
  #right { grid-area: right; border-right: none; border-left: 1px solid #2a2e3a; padding: 0; }

  .section { margin-bottom: 18px; }
  .section h3 {
    margin: 0 0 8px 0;
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .preset-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .preset-thumb {
    background: #0f1218;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    cursor: pointer;
    overflow: hidden;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px;
    transition: border-color 0.15s;
  }
  .preset-thumb:hover { border-color: #3a4050; }
  .preset-thumb.selected { border-color: #10b981; box-shadow: 0 0 0 2px #10b98144; }
  .preset-thumb img {
    max-width: 100%;
    max-height: 70%;
    object-fit: contain;
  }
  .preset-thumb .pname {
    font-size: 9px;
    color: #94a3b8;
    margin-top: 4px;
    text-align: center;
    line-height: 1.1;
    word-break: break-all;
  }

  /* Center preview */
  #center {
    grid-area: center;
    background: #0a0c10;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #stage-wrap {
    position: relative;
    transform-origin: center center;
  }
  .stage {
    position: relative;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 0 1px #2a2e3a, 0 8px 24px rgba(0,0,0,0.6);
  }
  .stage[data-vc="B"] { width: 1024px; height: 768px; }
  .stage[data-vc="C"] { width: 1920px; height: 1080px; }
  .stage[data-vc="D"] { width: 2560px; height: 1080px; }

  .op-bg {
    position: absolute;
    inset: 0;
    background-image: url('../assets/images/quizland/OP/OP_BG02.webp');
    background-size: cover;
    background-position: center;
    filter: blur(5px) saturate(0.9) brightness(0.94);
    transform: scale(1.08);
  }
  .op-sides {
    position: absolute;
    inset: 0;
    display: flex;
  }
  .op-side {
    flex: 1;
    position: relative;
    transition: opacity 0.25s;
    opacity: 0.55;
  }
  .op-side.is-speaking { opacity: 1.0; }

  .op-char-slot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .op-char-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: bottom center;
    display: block;
  }

  .op-dialogue {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }
  .op-dialogue.mode-css {
    background-image: none;
  }
  .op-dialogue-text {
    color: #2a2424;
    font-size: 22px;
    line-height: 1.5;
    text-align: center;
    overflow: auto;
    max-width: 100%;
    max-height: 100%;
    word-break: break-word;
  }

  /* 16:9 safe-area overlay (editor-only, NOT exported in buildCSS) */
  /* D viewport (2560x1080, 21:9) only — shows where 16:9 (1920x1080) sits in the center.
     Left/right 320px shaded red = areas visible only on 21:9. Editor visual aid only. */
  .safe-area-16-9 {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    color: #fde047;
    background: linear-gradient(
      to right,
      rgba(220, 38, 38, 0.18) 0,
      rgba(220, 38, 38, 0.18) 320px,
      transparent 320px,
      transparent calc(100% - 320px),
      rgba(220, 38, 38, 0.18) calc(100% - 320px),
      rgba(220, 38, 38, 0.18) 100%
    );
  }
  .stage[data-vc="D"] .safe-area-16-9 { display: block; }
  .safe-area-16-9::before,
  .safe-area-16-9::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: repeating-linear-gradient(
      to bottom,
      currentColor 0 8px,
      transparent 8px 16px
    );
  }
  .safe-area-16-9::before { left: 320px; }
  .safe-area-16-9::after  { right: 320px; }
  .safe-area-label {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.65);
    color: #fde047;
    font-size: 18px;
    padding: 2px 8px;
    border-radius: 3px;
    white-space: nowrap;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* Right pane: tabs + scroll body */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid #2a2e3a;
    background: #14161c;
  }
  .tab-bar button {
    flex: 1;
    background: transparent;
    border: none;
    color: #94a3b8;
    padding: 10px 8px;
    cursor: pointer;
    font-size: 12px;
    border-bottom: 2px solid transparent;
  }
  .tab-bar button.active {
    color: #f3f4f6;
    border-bottom-color: #2563eb;
    background: #181b22;
  }
  .tab-body {
    overflow-y: auto;
    height: calc(100% - 41px);
    padding: 12px;
  }

  .prop-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
  .prop-row label { width: 80px; font-size: 11px; color: #94a3b8; flex-shrink: 0; }
  .prop-row input[type="range"] { flex: 1; min-width: 0; }
  .prop-row input[type="number"], .prop-row input[type="text"], .prop-row select {
    background: #20242e;
    border: 1px solid #2a2e3a;
    color: #e5e7eb;
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 11px;
    min-width: 0;
  }
  .prop-row input[type="number"] { width: 56px; flex-shrink: 0; }
  .prop-row select { flex: 1; }
  .prop-row input[type="color"] {
    width: 36px; height: 22px; padding: 0; border: 1px solid #2a2e3a; border-radius: 3px;
    background: #20242e; cursor: pointer;
  }
  .prop-row textarea {
    flex: 1; background: #20242e; border: 1px solid #2a2e3a; color: #e5e7eb;
    padding: 6px; border-radius: 3px; font-size: 11px; font-family: inherit;
    resize: vertical; min-height: 56px;
  }
  .radio-row { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
  .radio-row label {
    flex: 1; min-width: 0; text-align: center; background: #20242e; border: 1px solid #2a2e3a;
    border-radius: 3px; cursor: pointer; padding: 4px 6px; font-size: 11px; color: #cbd5e1;
    width: auto;
  }
  .radio-row input {
    position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px;
  }
  .radio-row label:focus-within { outline: 2px solid #2563eb; outline-offset: 2px; }
  .radio-row label.checked { background: #2563eb; color: #fff; border-color: #2563eb; }

  .speaker-row {
    background: #20242e;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 12px;
  }
  .speaker-row .label-text {
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .group {
    background: #14161c;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 12px;
  }
  .group h4 {
    margin: 0 0 8px 0;
    font-size: 11px;
    color: #cbd5e1;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Height guides (Photoshop-like horizontal rulers). Editor-only, NOT exported. */
  .height-guides {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }
  .height-guides.is-on { display: block; }
  .height-guides .hg-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 0;
    border-top: 1px dashed #fde047;
    pointer-events: none;
  }
  .height-guides .hg-line.hg-pono { border-top-color: #fde047; }
  .height-guides .hg-line.hg-pono.hg-bot { border-top-color: #fde04788; }
  .height-guides .hg-line.hg-hakase { border-top-color: #67e8f9; }
  .height-guides .hg-line.hg-hakase.hg-bot { border-top-color: #67e8f988; }
  .height-guides .hg-label {
    position: absolute;
    right: 6px;
    top: -12px;
    background: rgba(0, 0, 0, 0.65);
    color: inherit;
    font-size: 14px;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .height-guides .hg-line.hg-pono { color: #fde047; }
  .height-guides .hg-line.hg-hakase { color: #67e8f9; }

  /* Box guides (Box 上下端の可視化). Editor-only, NOT exported.
     Distinguished from height-guides by dotted line style + slightly thicker. */
  .box-guides {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }
  .box-guides.is-on { display: block; }
  .box-guides .bg-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 0;
    border-top: 2px dotted #fde047;
    pointer-events: none;
  }
  .box-guides .bg-line.bg-pono { border-top-color: #fde047; color: #fde047; }
  .box-guides .bg-line.bg-pono.bg-bot { border-top-color: #fde04788; }
  .box-guides .bg-line.bg-hakase { border-top-color: #67e8f9; color: #67e8f9; }
  .box-guides .bg-line.bg-hakase.bg-bot { border-top-color: #67e8f988; }
  .box-guides .bg-label {
    position: absolute;
    left: 6px;
    top: -12px;
    background: rgba(0, 0, 0, 0.65);
    color: inherit;
    font-size: 14px;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* Center vertical line (常時表示の中央指標). Editor-only, NOT exported.
     z-index: 40 — below safe-area-16-9 (50) and box/height guides (60). */
  .center-line {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 1px;
    background: rgba(255, 255, 255, 0.18);
    z-index: 40;
    pointer-events: none;
  }

  /* Single Box 1 個モード (機能 5).
     Editor-only DOM; default hidden. Activated by .stage[data-single-box="on"]. */
  .single-box-wrapper {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 30;
    pointer-events: none;
  }
  .stage[data-single-box="on"] .single-box-wrapper { display: block; }
  /* When Single Box mode is ON, hide per-side dialogues but keep characters visible. */
  .stage[data-single-box="on"] .op-sides .op-dialogue { display: none; }

  .op-dialogue-single {
    position: absolute;
    /* width / height / top set via inline style from applySingleBoxToDom */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: 100% 100%;
    background-repeat: no-repeat;
    pointer-events: auto;
  }
  .op-dialogue-single.mode-css {
    background-image: none;
  }
  .op-dialogue-single .op-dialogue-text {
    color: #2a2424;
    font-size: 22px;
    line-height: 1.5;
    text-align: center;
    overflow: auto;
    max-width: 100%;
    max-height: 100%;
    word-break: break-word;
  }

  /* Single-box guide line variant (dashdot, neutral white). */
  .box-guides .bg-line.bg-single {
    border-top: 2px dashed #e5e7eb;
    color: #e5e7eb;
  }
  .box-guides .bg-line.bg-single.bg-bot { border-top-color: #e5e7eb88; }

  /* Right pane: when single-box mode is ON, dim the per-side Box group. */
  .group.is-single-mode {
    opacity: 0.4;
    pointer-events: none;
  }

  /* Single Box dedicated section (visible only when single-box mode is ON). */
  .single-box-section {
    background: #14161c;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 12px;
  }
  .single-box-section h4 {
    margin: 0 0 8px 0;
    font-size: 11px;
    color: #d1fae5;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Disabled mirror row state */
  .mirror-row.is-disabled {
    opacity: 0.4;
    pointer-events: none;
    cursor: not-allowed;
  }

  /* Mirror toggle in tab area */
  .mirror-row {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #20242e;
    border: 1px solid #2a2e3a;
    border-radius: 3px;
    padding: 6px 8px;
    margin: 0 12px 8px 12px;
    cursor: pointer;
    user-select: none;
  }
  .mirror-row input[type="checkbox"] {
    margin: 0;
    cursor: pointer;
  }
  .mirror-row .mirror-text {
    font-size: 11px;
    color: #cbd5e1;
  }
  .mirror-row.is-on { border-color: #10b981; background: #14322a; }
  .mirror-row.is-on .mirror-text { color: #d1fae5; }

  /* Aspect-lock checkbox row */
  .lock-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    background: #20242e;
    border: 1px solid #2a2e3a;
    border-radius: 3px;
    padding: 6px 8px;
    cursor: pointer;
    user-select: none;
  }
  .lock-row input[type="checkbox"] {
    margin: 0;
    cursor: pointer;
  }
  .lock-row .lock-text {
    font-size: 11px;
    color: #cbd5e1;
  }
  .lock-row.is-on { border-color: #10b981; background: #14322a; }
  .lock-row.is-on .lock-text { color: #d1fae5; }

  header button.toggle-on {
    background: #10b981;
  }
  header button.toggle-on:hover { background: #059669; }

  /* Toast */
  #toast {
    position: fixed;
    top: 60px; left: 50%;
    transform: translateX(-50%);
    background: #1f2937;
    color: #f3f4f6;
    padding: 8px 16px;
    border-radius: 4px;
    border: 1px solid #2a2e3a;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    font-size: 12px;
  }
  #toast.show { opacity: 1; }
  #toast.ok { border-color: #10b981; }
  #toast.err { border-color: #ef4444; }

  .info { font-size: 10px; color: #6b7280; margin-top: 4px; }
</style>
</head>
<body>

<div id="app">
  <header>
    <h1>Quizland OP レイアウトエディタ</h1>
    <div class="vp-group" id="vp-group">
      <label><input type="radio" name="vp" value="B" checked><span>B (1024×768)</span></label>
      <label><input type="radio" name="vp" value="C"><span>C (1920×1080)</span></label>
      <label><input type="radio" name="vp" value="D"><span>D (2560×1080)</span></label>
    </div>
    <span id="scale-info" style="font-size:11px;color:#94a3b8;"></span>
    <span class="spacer"></span>
    <button id="btn-toggle-height-guides" class="ghost" type="button">📏 高さガイド</button>
    <button id="btn-toggle-box-guides" class="ghost" type="button">📐 Box ガイド</button>
    <button id="btn-toggle-single-box" class="ghost" type="button">📦 Box 1 個</button>
    <button id="btn-export">エクスポート（コピー）</button>
    <button id="btn-export-css" class="ghost">CSS DL</button>
    <button id="btn-export-json" class="ghost">JSON DL</button>
    <button id="btn-undo-reset" class="ghost" disabled>元に戻す</button>
    <button id="btn-reset" class="ghost">リセット</button>
  </header>

  <aside id="left" class="panel">
    <div class="section">
      <h3>Pono バリエーション</h3>
      <div id="pono-grid" class="preset-grid"></div>
    </div>

    <div class="section">
      <h3>フレーム</h3>
      <div id="frame-grid" class="preset-grid"></div>
      <div class="info">画像モード時に選択中の側に適用</div>
    </div>
  </aside>

  <main id="center">
    <div id="stage-wrap">
      <div class="stage" id="stage" data-vc="B">
        <div class="op-bg"></div>
        <div class="op-sides">
          <div class="op-side op-side-pono" id="side-pono">
            <div class="op-char-slot" id="slot-pono">
              <img id="img-pono" alt="">
            </div>
            <div class="op-dialogue op-dialogue-pono" id="box-pono">
              <div class="op-dialogue-text" id="text-pono"></div>
            </div>
          </div>
          <div class="op-side op-side-hakase is-speaking" id="side-hakase">
            <div class="op-char-slot" id="slot-hakase">
              <img id="img-hakase" src="../assets/images/quizland/owl_professor_guide.webp" alt="">
            </div>
            <div class="op-dialogue op-dialogue-hakase" id="box-hakase">
              <div class="op-dialogue-text" id="text-hakase"></div>
            </div>
          </div>
        </div>
        <div class="single-box-wrapper" id="single-box-wrapper">
          <div class="op-dialogue op-dialogue-single" id="box-single">
            <div class="op-dialogue-text" id="text-single"></div>
          </div>
        </div>
        <div class="safe-area-16-9" aria-hidden="true">
          <span class="safe-area-label">16:9 セーフエリア</span>
        </div>
        <div class="height-guides" id="height-guides" aria-hidden="true"></div>
        <div class="box-guides" id="box-guides" aria-hidden="true"></div>
        <div class="center-line" aria-hidden="true"></div>
      </div>
    </div>
  </main>

  <aside id="right">
    <div class="speaker-row">
      <div class="label-text">スピーカー</div>
      <div class="radio-row" id="speaker-row">
        <label data-val="hakase"><input type="radio" name="speaker" value="hakase" checked>はかせが話す</label>
        <label data-val="pono"><input type="radio" name="speaker" value="pono">ポノが話す</label>
      </div>
    </div>

    <label class="mirror-row" id="mirror-row">
      <input type="checkbox" id="mirror-checkbox">
      <span class="mirror-text">🪞 左右ミラー（編集を対称コピー）</span>
    </label>

    <div class="tab-bar" id="tab-bar">
      <button class="active" data-tab="pono">ポノ側</button>
      <button data-tab="hakase">はかせ側</button>
    </div>

    <div class="tab-body" id="tab-body"></div>
  </aside>
</div>

<div id="toast"></div>

<script>
'use strict';

const PONO_VARIANTS = [
  { name: 'dance_hi', path: '../assets/images/characters/pono/dance/dance_hi.webp' },
  { name: 'dance_hooray', path: '../assets/images/characters/pono/dance/dance_hooray.webp' },

// Frame natural aspect cache: id -> naturalW / naturalH (number) or undefined while loading.
const FRAME_NATURAL_ASPECT = {};
function preloadFrameAspects() {
  FRAME_IMAGES.forEach(f => {
    const im = new Image();
    im.onload = () => {
      if (im.naturalWidth > 0 && im.naturalHeight > 0) {
        FRAME_NATURAL_ASPECT[f.id] = im.naturalWidth / im.naturalHeight;
        // After load, refresh aspect-lock-driven dims for any side currently using this frame
        // with image-mode aspectLock = ON.
        try { onFrameAspectLoaded(f.id); } catch (e) {}
      }
    };
    im.src = f.path;
  });
}

function getEffectiveAspectRatio(s) {
  // Returns the ratio to apply for aspectLock. Image mode uses frame's natural;
  // CSS mode uses the snapshot stored at lock-on (aspectLockRatio).
  if (s.boxMode === 'image') {
    const a = FRAME_NATURAL_ASPECT[s.boxImage];
    if (a && Number.isFinite(a) && a > 0) return a;
    // fall back to stored ratio if available
    if (s.aspectLockRatio && s.aspectLockRatio > 0) return s.aspectLockRatio;
    return null;
  } else {
    if (s.aspectLockRatio && s.aspectLockRatio > 0) return s.aspectLockRatio;
    return null;
  }
}

// Keys that get mirror-copied (with sign reversal for X-axis offsets)
const MIRROR_COPY_KEYS = [
  'boxW', 'boxH', 'boxY', 'boxPadding', 'boxRadius',
  'boxImage', 'boxMode', 'boxColor',
  'aspectLock', 'aspectLockRatio',
  'slotW', 'slotH', 'slotOffsetY', 'slotAspect', 'objectPosition',
  'fontSize'
];
const MIRROR_FLIP_KEYS = ['boxX', 'slotOffsetX'];
// Keys that are NEVER mirrored:
//   variant (Pono image) — Hakase has no variant
//   sampleText            — each character has unique words
//   speaker               — global state, not per-side

function propagateMirror(sideKey, key) {
  if (!mirrorMode || _mirroring) return;
  if (key && key !== '__all__' && !MIRROR_COPY_KEYS.includes(key) && !MIRROR_FLIP_KEYS.includes(key)) {
    return;
  }
  const otherSide = sideKey === 'pono' ? 'hakase' : 'pono';
  const src = state[currentVC][sideKey];
  const dst = state[currentVC][otherSide];
  if (!src || !dst) return;
  _mirroring = true;
  try {
    if (key === '__all__' || !key) {
      // Bulk sync: copy every relevant key
      MIRROR_COPY_KEYS.forEach(k => { if (k in src) dst[k] = src[k]; });
      MIRROR_FLIP_KEYS.forEach(k => { if (typeof src[k] === 'number') dst[k] = -src[k]; });
    } else if (MIRROR_FLIP_KEYS.includes(key)) {
      if (typeof src[key] === 'number') dst[key] = -src[key];
    } else {
      dst[key] = src[key];
    }
    save(currentVC);
    applySideToDom(otherSide);
  } finally {
    _mirroring = false;
  }
}

function migrateFrameIds(parsed) {
  if (!parsed || typeof parsed !== 'object') return parsed;
  // Detect VC from data shape (used to pick correct fontSize default).
  // We can't know vc from `parsed` alone, so caller may be migrating any of B/C/D.
  // We default to C/D-ish 18 if both slot/box dims are large, else 16. As fallback, 16.
  ['pono', 'hakase'].forEach(sideKey => {
    const side = parsed[sideKey];
    if (!side || typeof side !== 'object') return;
    if (!FRAME_IDS.includes(side.boxImage)) {
      side.boxImage = DEFAULT_FRAME_ID;
    }
    if (typeof side.aspectLock !== 'boolean') side.aspectLock = false;
    if (typeof side.aspectLockRatio !== 'number' || !Number.isFinite(side.aspectLockRatio)) {
      side.aspectLockRatio = 0;
    }
    if (typeof side.fontSize !== 'number' || !Number.isFinite(side.fontSize) || side.fontSize <= 0) {
      // Heuristic: wider boxes (>= 480) get 18, smaller (B-class) get 16.
      side.fontSize = (Number(side.boxW) >= 480) ? 18 : 16;
    }
  });
  return parsed;
}

function load(vc) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + vc);

    const parsed = JSON.parse(raw);
    return migrateFrameIds(parsed);
  } catch (e) { return null; }
}
function save(vc) {

function aspectFromSlot(s) {
  if (s.slotAspect === 'free') return null;
  if (s.slotAspect === 'fixed_0.75') return 0.75;

  if (s.slotAspect === 'fixed_1.23') return 1.23;
  return null;
}

function ponoPathByName(name) {
  const v = PONO_VARIANTS.find(x => x.name === name);
  return v ? v.path : PONO_VARIANTS[0].path;
}
function framePathById(id) {
  const f = FRAME_IMAGES.find(x => x.id === id);
  return f ? f.path : FRAME_IMAGES[0].path;
}

function applySideToDom(sideKey) {
  const s = state[currentVC][sideKey];
  const slot = document.getElementById('slot-' + sideKey);
  const img = document.getElementById('img-' + sideKey);
  const box = document.getElementById('box-' + sideKey);
  const txt = document.getElementById('text-' + sideKey);

  slot.style.width = s.slotW + 'px';
  slot.style.height = s.slotH + 'px';
  const ar = aspectFromSlot(s);
  slot.style.aspectRatio = ar ? String(ar) : '';
  slot.style.transform = `translate(calc(-50% + ${s.slotOffsetX}px), calc(-50% + ${s.slotOffsetY}px))`;
  img.style.objectPosition = `${s.objectPosition === 'top' ? 'top' : s.objectPosition === 'center' ? 'center' : 'bottom'} center`;

  if (sideKey === 'pono') {
    img.src = ponoPathByName(s.variant);
  }

  box.style.width = s.boxW + 'px';
  box.style.height = s.boxH + 'px';
  box.style.transform = `translate(calc(-50% + ${s.boxX}px), calc(-50% + ${s.boxY}px))`;
  box.style.padding = s.boxPadding + 'px';
  if (s.boxMode === 'image') {
    box.classList.remove('mode-css');
    box.style.backgroundImage = `url('${framePathById(s.boxImage)}')`;
    box.style.backgroundColor = '';
    box.style.borderRadius = '';
  } else {
    box.classList.add('mode-css');
    box.style.backgroundImage = 'none';
    box.style.backgroundColor = s.boxColor;
    box.style.borderRadius = s.boxRadius + 'px';
  }
  txt.textContent = s.sampleText;
  if (typeof s.fontSize === 'number' && Number.isFinite(s.fontSize) && s.fontSize > 0) {
    txt.style.fontSize = s.fontSize + 'px';

    txt.style.fontSize = '';

}

function renderHeightGuides() {
  const guides = document.getElementById('height-guides');
  if (!guides) return;
  guides.classList.toggle('is-on', !!showHeightGuides);
  guides.textContent = '';
  if (!showHeightGuides) return;
  const stage = document.getElementById('stage');
  if (!stage) return;
  const stageRect = stage.getBoundingClientRect();
  // Note: rect dims are post-CSS-scale; convert by inverse of scale.
  const wrap = document.getElementById('stage-wrap');
  const m = wrap && wrap.style.transform ? /scale\(([0-9.]+)\)/.exec(wrap.style.transform) : null;
  const sc = m ? Number(m[1]) : 1;
  const inv = sc > 0 ? 1 / sc : 1;

  function buildLine(klass, topPx, labelText) {
    const line = document.createElement('div');
    line.className = 'hg-line ' + klass;
    line.style.top = topPx + 'px';
    const lbl = document.createElement('span');
    lbl.className = 'hg-label';
    lbl.textContent = labelText;
    line.appendChild(lbl);
    guides.appendChild(line);
  }

  ['pono', 'hakase'].forEach(sideKey => {
    const slot = document.getElementById('slot-' + sideKey);
    if (!slot) return;
    const r = slot.getBoundingClientRect();
    const topY = (r.top - stageRect.top) * inv;
    const botY = (r.bottom - stageRect.top) * inv;
    const tag = sideKey === 'pono' ? 'P' : 'H';
    const cls = sideKey === 'pono' ? 'hg-pono' : 'hg-hakase';
    buildLine(cls + ' hg-top', Math.round(topY), tag + ' 上 (y=' + Math.round(topY) + ')');
    buildLine(cls + ' hg-bot', Math.round(botY), tag + ' 下 (y=' + Math.round(botY) + ')');
  });
}

function rescaleStage() {
  const wrap = document.getElementById('stage-wrap');
  const center = document.getElementById('center');
  const [w, h] = VP_DIMS[currentVC];
  const padding = 40;
  const availW = Math.max(100, center.clientWidth - padding);
  const availH = Math.max(100, center.clientHeight - padding);
  const scale = Math.min(availW / w, availH / h, 1);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = w + 'px';
  wrap.style.height = h + 'px';
  const info = document.getElementById('scale-info');
  if (info) {
    info.textContent = (scale * 100).toFixed(0) + '% (実寸 ' + w + '×' + h + ')';
  }
}

// Per-control re-sync hooks so aspect-lock can update a sibling control's UI
// without rebuilding the whole pane. key is e.g. 'boxW' / 'boxH' / 'slotW' etc.
const _rangeSyncMap = { pono: {}, hakase: {} };
function syncRangeUi(sideKey, key) {
  const fn = _rangeSyncMap[sideKey] && _rangeSyncMap[sideKey][key];
  if (typeof fn === 'function') fn();
}

function makeRange(label, min, max, step, key, sideKey) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  const lab = document.createElement('label');
  lab.textContent = label;
  const range = document.createElement('input');
  range.type = 'range';
  range.min = min; range.max = max; range.step = step;
  const num = document.createElement('input');
  num.type = 'number';
  num.min = min; num.max = max; num.step = step;
  const cur = state[currentVC][sideKey][key];
  range.value = cur;
  num.value = cur;
  // Register UI-sync so external mutations (e.g. aspect-lock companion) can refresh display
  _rangeSyncMap[sideKey][key] = () => {
    const v = state[currentVC][sideKey][key];
    if (document.activeElement !== range) range.value = v;
    if (document.activeElement !== num) num.value = v;
  };
  const apply = (v) => {
    let n = Number(v);
    if (!Number.isFinite(n)) return;
    n = Math.min(Math.max(n, Number(min)), Number(max));
    state[currentVC][sideKey][key] = n;
    if (document.activeElement !== range) range.value = n;
    if (document.activeElement !== num) num.value = n;
    // Aspect-lock coupling for box dims
    if (key === 'boxW' || key === 'boxH') {
      maybeApplyAspectLockOnBoxChange(sideKey, key);
    }
    save(currentVC);
    applySideToDom(sideKey);
    // Mirror propagation (functions 3/4)
    propagateMirror(sideKey, key);
    if (showHeightGuides) renderHeightGuides();
    if (showBoxGuides) renderBoxGuides();
  };
  range.addEventListener('input', () => apply(range.value));
  num.addEventListener('input', () => apply(num.value));
  num.addEventListener('change', () => {
    let n = Number(num.value);
    if (!Number.isFinite(n)) n = state[currentVC][sideKey][key];
    n = Math.min(Math.max(n, Number(min)), Number(max));
    state[currentVC][sideKey][key] = n;
    num.value = n;
    range.value = n;
    if (key === 'boxW' || key === 'boxH') {
      maybeApplyAspectLockOnBoxChange(sideKey, key);
    }
    save(currentVC);
    applySideToDom(sideKey);
    propagateMirror(sideKey, key);
    if (showHeightGuides) renderHeightGuides();
    if (showBoxGuides) renderBoxGuides();
  });
  row.appendChild(lab);
  row.appendChild(range);
  row.appendChild(num);
  return row;
}

// boxW / boxH constants used for clipping companion updates (must mirror the makeRange args
// in buildRightPane below).
const BOX_W_MIN = 200, BOX_W_MAX = 2000;
const BOX_H_MIN = 80,  BOX_H_MAX = 800;

function maybeApplyAspectLockOnBoxChange(sideKey, changedKey) {
  const s = state[currentVC][sideKey];
  if (!s.aspectLock) return;
  const ratio = getEffectiveAspectRatio(s);
  if (!ratio || ratio <= 0) return;
  if (changedKey === 'boxW') {
    let h = Math.round(s.boxW / ratio);
    h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
    if (h !== s.boxH) {
      s.boxH = h;
      syncRangeUi(sideKey, 'boxH');
    }
  } else if (changedKey === 'boxH') {
    let w = Math.round(s.boxH * ratio);
    w = Math.min(Math.max(w, BOX_W_MIN), BOX_W_MAX);
    if (w !== s.boxW) {
      s.boxW = w;
      syncRangeUi(sideKey, 'boxW');
    }
  }
}

// When the frame image (image-mode) changes while aspectLock is ON, update lock ratio
// to the new image's natural aspect and re-derive boxH from current boxW.
function reapplyAspectLockAfterFrameChange(sideKey) {
  const s = state[currentVC][sideKey];
  if (!s.aspectLock) return;
  if (s.boxMode !== 'image') return;
  const ratio = FRAME_NATURAL_ASPECT[s.boxImage];
  if (!ratio || ratio <= 0) return; // will pick up later via onFrameAspectLoaded
  s.aspectLockRatio = ratio;
  let h = Math.round(s.boxW / ratio);
  h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
  s.boxH = h;
}

// Called from preloadFrameAspects when an image's natural aspect is finally known.
function onFrameAspectLoaded(frameId) {
  ['pono', 'hakase'].forEach(sideKey => {
    ['B', 'C', 'D'].forEach(vc => {
      const s = state[vc] && state[vc][sideKey];
      if (!s) return;
      if (!s.aspectLock) return;
      if (s.boxMode !== 'image') return;
      if (s.boxImage !== frameId) return;
      const ratio = FRAME_NATURAL_ASPECT[frameId];
      if (!ratio || ratio <= 0) return;
      s.aspectLockRatio = ratio;
      // recompute boxH from boxW
      let h = Math.round(s.boxW / ratio);
      h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
      s.boxH = h;
      save(vc);
      if (vc === currentVC) {
        syncRangeUi(sideKey, 'boxH');
        applySideToDom(sideKey);
      }
    });
  });
}

let _radioUid = 0;
function makeRadio(label, key, sideKey, options, opts) {
  const rebuild = !!(opts && opts.rebuild);
  const row = document.createElement('div');
  row.className = 'prop-row';
  const lab = document.createElement('label');
  lab.textContent = label;
  const rr = document.createElement('div');
  rr.className = 'radio-row';
  const groupName = sideKey + '-' + key + '-' + (++_radioUid);
  options.forEach(opt => {
    const lbl = document.createElement('label');
    lbl.dataset.val = opt.value;
    if (state[currentVC][sideKey][key] === opt.value) lbl.classList.add('checked');
    const inp = document.createElement('input');
    inp.type = 'radio';
    inp.name = groupName;
    inp.value = opt.value;
    const inputId = groupName + '-' + opt.value;
    inp.id = inputId;
    lbl.htmlFor = inputId;
    if (state[currentVC][sideKey][key] === opt.value) inp.checked = true;
    const txt = document.createTextNode(opt.text);
    lbl.appendChild(inp);
    lbl.appendChild(txt);
    inp.addEventListener('change', () => {
      if (!inp.checked) return;
      state[currentVC][sideKey][key] = opt.value;
      // Side-effect: when boxMode flips, refresh the aspect-lock ratio source.
      if (key === 'boxMode') {
        const ss = state[currentVC][sideKey];
        if (ss.aspectLock) {
          if (opt.value === 'image') {
            const a = FRAME_NATURAL_ASPECT[ss.boxImage];
            if (a && a > 0) {
              ss.aspectLockRatio = a;
              let h = Math.round(ss.boxW / a);
              h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
              ss.boxH = h;
            }
          } else {
            // switched to CSS: snapshot current ratio
            if (ss.boxH > 0) ss.aspectLockRatio = ss.boxW / ss.boxH;
          }
        }
      }
      save(currentVC);
      // Update checked styling among siblings without rebuilding
      rr.querySelectorAll('label').forEach(l => {
        l.classList.toggle('checked', l.dataset.val === opt.value);
      });
      if (rebuild) {
        buildRightPane();
      } else {
        applySideToDom(sideKey);
      }
      // Mirror propagation after applying / rebuilding.
      propagateMirror(sideKey, key);
      if (showBoxGuides) renderBoxGuides();
    });
    rr.appendChild(lbl);
  });
  row.appendChild(lab);
  row.appendChild(rr);
  return row;
}

function makeSelect(label, key, sideKey, options) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  const lab = document.createElement('label');
  lab.textContent = label;
  const sel = document.createElement('select');
  options.forEach(opt => {
    const o = document.createElement('option');
    o.value = opt.value;
    o.textContent = opt.text;
    if (state[currentVC][sideKey][key] === opt.value) o.selected = true;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => {
    state[currentVC][sideKey][key] = sel.value;
    save(currentVC);
    propagateMirror(sideKey, key);
    render();
  });
  row.appendChild(lab);
  row.appendChild(sel);
  return row;
}

function makeColor(label, key, sideKey) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  const lab = document.createElement('label');
  lab.textContent = label;
  const inp = document.createElement('input');
  inp.type = 'color';
  inp.value = state[currentVC][sideKey][key];
  inp.addEventListener('input', () => {
    state[currentVC][sideKey][key] = inp.value;
    save(currentVC);
    applySideToDom(sideKey);
    propagateMirror(sideKey, key);
  });
  row.appendChild(lab);
  row.appendChild(inp);
  return row;
}

function makeTextarea(label, key, sideKey) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  row.style.alignItems = 'flex-start';
  const lab = document.createElement('label');
  lab.textContent = label;
  const ta = document.createElement('textarea');
  ta.value = state[currentVC][sideKey][key];
  ta.rows = 3;
  ta.addEventListener('input', () => {
    state[currentVC][sideKey][key] = ta.value;
    saveDebounced(currentVC);
    applySideToDom(sideKey);
  });
  row.appendChild(lab);
  row.appendChild(ta);
  return row;
}

function makeFrameImageSelect(sideKey) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  const lab = document.createElement('label');
  lab.textContent = 'フレーム画像';
  const sel = document.createElement('select');
  FRAME_IMAGES.forEach(f => {
    const o = document.createElement('option');
    o.value = f.id;
    o.textContent = f.label;
    if (state[currentVC][sideKey].boxImage === f.id) o.selected = true;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => {
    const s = state[currentVC][sideKey];
    s.boxImage = sel.value;
    reapplyAspectLockAfterFrameChange(sideKey);
    save(currentVC);
    syncRangeUi(sideKey, 'boxH');
    propagateMirror(sideKey, 'boxImage');
    // boxH may have changed via aspect-lock recomputation
    propagateMirror(sideKey, 'boxH');
    render();
  });
  row.appendChild(lab);
  row.appendChild(sel);
  return row;
}

function makeAspectLockRow(sideKey) {
  const s = state[currentVC][sideKey];
  const wrap = document.createElement('label');
  wrap.className = 'lock-row';
  if (s.aspectLock) wrap.classList.add('is-on');
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = !!s.aspectLock;
  const txt = document.createElement('span');
  txt.className = 'lock-text';
  txt.textContent = '🔒 縦横比をロック (フレーム画像に合わせる)';
  cb.addEventListener('change', () => {
    const ss = state[currentVC][sideKey];
    ss.aspectLock = !!cb.checked;
    if (ss.aspectLock) {
      // Snapshot the lock ratio source.
      if (ss.boxMode === 'image') {
        const a = FRAME_NATURAL_ASPECT[ss.boxImage];
        if (a && a > 0) {
          ss.aspectLockRatio = a;
          // Re-derive boxH from current boxW so DOM matches lock immediately.
          let h = Math.round(ss.boxW / a);
          h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
          ss.boxH = h;
        } else {
          // image not loaded yet — keep current H for now; onFrameAspectLoaded will fix it.
          if (ss.boxH > 0) ss.aspectLockRatio = ss.boxW / ss.boxH;
        }
      } else {
        // CSS mode: snapshot current boxW/boxH ratio.
        if (ss.boxH > 0) ss.aspectLockRatio = ss.boxW / ss.boxH;
      }
      wrap.classList.add('is-on');
    } else {
      wrap.classList.remove('is-on');
    }
    save(currentVC);
    syncRangeUi(sideKey, 'boxH');
    syncRangeUi(sideKey, 'boxW');
    applySideToDom(sideKey);
    propagateMirror(sideKey, 'aspectLock');
    propagateMirror(sideKey, 'aspectLockRatio');
    propagateMirror(sideKey, 'boxH');
    propagateMirror(sideKey, 'boxW');
  });
  wrap.appendChild(cb);
  wrap.appendChild(txt);
  return wrap;
}

function buildRightPane() {
  const body = document.getElementById('tab-body');
  body.textContent = '';
  const sideKey = currentTab;
  const s = state[currentVC][sideKey];

  const slotGroup = document.createElement('div');
  slotGroup.className = 'group';
  const slotH = document.createElement('h4');
  slotH.textContent = 'Slot（キャラスロット）';
  slotGroup.appendChild(slotH);
  if (sideKey === 'pono') {
    slotGroup.appendChild(makeSelect('Pono画像', 'variant', sideKey,
      PONO_VARIANTS.map(v => ({ value: v.name, text: v.name }))));
  }
  slotGroup.appendChild(makeRange('幅 (px)', 100, 1600, 1, 'slotW', sideKey));
  slotGroup.appendChild(makeRange('高さ (px)', 100, 1200, 1, 'slotH', sideKey));
  slotGroup.appendChild(makeRadio('aspect', 'slotAspect', sideKey, [
    { value: 'free', text: '自由' },
    { value: 'fixed_0.75', text: '0.75' },
    { value: 'fixed_1.0', text: '1.0' },
    { value: 'fixed_1.23', text: '1.23' }
  ]));
  slotGroup.appendChild(makeRadio('object-pos', 'objectPosition', sideKey, [
    { value: 'top', text: '上' },
    { value: 'center', text: '中' },
    { value: 'bottom', text: '下' }
  ]));
  slotGroup.appendChild(makeRange('オフセットX', -500, 1000, 1, 'slotOffsetX', sideKey));
  slotGroup.appendChild(makeRange('オフセットY', -500, 1000, 1, 'slotOffsetY', sideKey));
  body.appendChild(slotGroup);

  const boxGroup = document.createElement('div');
  boxGroup.className = 'group';
  const boxH = document.createElement('h4');
  boxH.textContent = 'Box（ダイアログ）';
  boxGroup.appendChild(boxH);
  boxGroup.appendChild(makeRadio('モード', 'boxMode', sideKey, [
    { value: 'image', text: '画像' },
    { value: 'css', text: 'CSS' }
  ], { rebuild: true }));
  boxGroup.appendChild(makeAspectLockRow(sideKey));
  if (s.boxMode === 'image') {
    boxGroup.appendChild(makeFrameImageSelect(sideKey));
  }
  boxGroup.appendChild(makeRange('幅 (px)', 200, 2000, 1, 'boxW', sideKey));
  boxGroup.appendChild(makeRange('高さ (px)', 80, 800, 1, 'boxH', sideKey));
  boxGroup.appendChild(makeRange('X', -500, 1000, 1, 'boxX', sideKey));
  boxGroup.appendChild(makeRange('Y', -500, 1000, 1, 'boxY', sideKey));
  boxGroup.appendChild(makeRange('padding', 8, 200, 1, 'boxPadding', sideKey));
  if (s.boxMode === 'css') {
    boxGroup.appendChild(makeRange('角丸', 0, 80, 1, 'boxRadius', sideKey));
    boxGroup.appendChild(makeColor('背景色', 'boxColor', sideKey));
  }
  boxGroup.appendChild(makeRange('フォントサイズ', 12, 48, 1, 'fontSize', sideKey));
  boxGroup.appendChild(makeTextarea('サンプル文', 'sampleText', sideKey));
  body.appendChild(boxGroup);
}

function buildHeader() {
  document.querySelectorAll('#vp-group input').forEach(r => {
    r.addEventListener('change', () => {
      if (r.checked) {
        currentVC = r.value;
        render();
        buildRightPane();
      }
    });
  });

  document.getElementById('btn-export').addEventListener('click', exportCopy);
  document.getElementById('btn-export-css').addEventListener('click', () => download('css'));
  document.getElementById('btn-export-json').addEventListener('click', () => download('json'));
  document.getElementById('btn-reset').addEventListener('click', resetCurrent);
  document.getElementById('btn-undo-reset').addEventListener('click', undoReset);

  const hgBtn = document.getElementById('btn-toggle-height-guides');
  if (hgBtn) {
    const refresh = () => {
      hgBtn.classList.toggle('toggle-on', !!showHeightGuides);
      hgBtn.setAttribute('aria-pressed', showHeightGuides ? 'true' : 'false');
    };
    refresh();
    hgBtn.addEventListener('click', () => {
      showHeightGuides = !showHeightGuides;
      saveHeightGuidesPref();
      refresh();
      renderHeightGuides();
    });
  }

  const bgBtn = document.getElementById('btn-toggle-box-guides');
  if (bgBtn) {
    const refreshBg = () => {
      bgBtn.classList.toggle('toggle-on', !!showBoxGuides);
      bgBtn.setAttribute('aria-pressed', showBoxGuides ? 'true' : 'false');
    };
    refreshBg();
    bgBtn.addEventListener('click', () => {
      showBoxGuides = !showBoxGuides;
      saveBoxGuidesPref();
      refreshBg();
      renderBoxGuides();
    });
  }

  const mirrorRow = document.getElementById('mirror-row');
  const mirrorCb = document.getElementById('mirror-checkbox');
  if (mirrorRow && mirrorCb) {
    const refreshMirror = () => {
      mirrorRow.classList.toggle('is-on', !!mirrorMode);
      mirrorCb.checked = !!mirrorMode;
    };
    refreshMirror();
    mirrorCb.addEventListener('change', () => {
      mirrorMode = !!mirrorCb.checked;
      saveMirrorModePref();
      refreshMirror();
      // When turning ON, immediately sync from currentTab side to the other side
      // so they become symmetric.
      if (mirrorMode) {
        propagateMirror(currentTab, '__all__');
        // Refresh UI to reflect mirrored values on the other tab.
        render();
        buildRightPane();
      }
    });
  }

  document.querySelectorAll('#tab-bar button').forEach(b => {
    b.addEventListener('click', () => {
      currentTab = b.dataset.tab;
      buildRightPane();
      render();
    });
  });

  document.querySelectorAll('#speaker-row label').forEach(lb => {
    lb.addEventListener('click', (e) => {
      e.preventDefault();
      state[currentVC].speaker = lb.dataset.val;
      save(currentVC);
      render();
    });
  });
}

let _lastResetSnapshot = null;
function resetCurrent() {
  if (!confirm('現在のビューポート(' + currentVC + ')の設定をリセットします。よろしいですか？')) {
    return;
  }
  _lastResetSnapshot = { vc: currentVC, snap: JSON.parse(JSON.stringify(state[currentVC])) };
  state[currentVC] = defaultsFor(currentVC);
  save(currentVC);
  render();
  buildRightPane();
  const undoBtn = document.getElementById('btn-undo-reset');
  if (undoBtn) undoBtn.disabled = false;
  toast('現在のビューポートをリセットしました', 'ok');
}

function undoReset() {
  if (!_lastResetSnapshot) return;
  const { vc, snap } = _lastResetSnapshot;
  state[vc] = snap;
  save(vc);
  _lastResetSnapshot = null;
  const undoBtn = document.getElementById('btn-undo-reset');
  if (undoBtn) undoBtn.disabled = true;
  // If we are currently on the snapshot's vc, refresh; otherwise just save quietly
  if (currentVC === vc) {
    render();
    buildRightPane();
  }
  toast('元に戻しました', 'ok');
}

function cssEscapeUrl(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
}

function buildCSS() {
  const lines = [];
  lines.push('/* Quizland OP layout — generated ' + new Date().toISOString() + ' */');
  const mediaFor = {
    B: '@media (min-aspect-ratio: 85/100) and (max-aspect-ratio: 14/10)',
    C: '@media (min-aspect-ratio: 14/10) and (max-aspect-ratio: 19/10)',
    D: '@media (min-aspect-ratio: 19/10)'
  };
  ['B', 'C', 'D'].forEach(vc => {
    const s = state[vc];
    lines.push('');
    lines.push('/* viewport class ' + vc + ' (' + VP_DIMS[vc][0] + 'x' + VP_DIMS[vc][1] + ') */');
    lines.push(mediaFor[vc] + ' {');
    ['pono', 'hakase'].forEach(sideKey => {
      const ss = s[sideKey];
      const ar = aspectFromSlot(ss);
      lines.push('  .op-side-' + sideKey + ' .op-char-slot {');
      lines.push('    width: ' + ss.slotW + 'px;');
      lines.push('    height: ' + ss.slotH + 'px;');
      if (ar) lines.push('    aspect-ratio: ' + ar + ';');
      lines.push('    transform: translate(calc(-50% + ' + ss.slotOffsetX + 'px), calc(-50% + ' + ss.slotOffsetY + 'px));');
      lines.push('  }');
      lines.push('  .op-side-' + sideKey + ' .op-char-slot img {');
      lines.push('    object-position: ' + ss.objectPosition + ' center;');
      lines.push('  }');
      lines.push('  .op-side-' + sideKey + ' .op-dialogue {');
      lines.push('    width: ' + ss.boxW + 'px;');
      lines.push('    height: ' + ss.boxH + 'px;');
      lines.push('    transform: translate(calc(-50% + ' + ss.boxX + 'px), calc(-50% + ' + ss.boxY + 'px));');
      lines.push('    padding: ' + ss.boxPadding + 'px;');
      if (ss.boxMode === 'image') {
        lines.push('    background-image: url("' + cssEscapeUrl(framePathById(ss.boxImage)) + '");');
        lines.push('    background-size: 100% 100%;');
        lines.push('    background-repeat: no-repeat;');
        lines.push('    background-color: transparent;');
        lines.push('    border-radius: 0;');
      } else {
        lines.push('    background-image: none;');
        lines.push('    background-color: ' + ss.boxColor + ';');
        lines.push('    border-radius: ' + ss.boxRadius + 'px;');
      }
      lines.push('  }');
      // Font size on inner text — exported (per spec)
      if (typeof ss.fontSize === 'number' && Number.isFinite(ss.fontSize) && ss.fontSize > 0) {
        lines.push('  .op-side-' + sideKey + ' .op-dialogue-text {');
        lines.push('    font-size: ' + ss.fontSize + 'px;');
        lines.push('  }');
      }
    });
    lines.push('}');
  });
  return lines.join('\n');
}

function buildJSON() {
  // Strip editor-internal-only keys (aspectLock / aspectLockRatio) from export.
  const sanitize = (vc) => {
    const out = {};
    Object.keys(state[vc]).forEach(k => {
      const v = state[vc][k];
      if (v && typeof v === 'object' && !Array.isArray(v)) {
        const cleaned = {};
        Object.keys(v).forEach(kk => {
          if (kk === 'aspectLock' || kk === 'aspectLockRatio') return;
          cleaned[kk] = v[kk];
        });
        out[k] = cleaned;
      } else {
        out[k] = v;
      }
    });
    return out;
  };
  return JSON.stringify({ B: sanitize('B'), C: sanitize('C'), D: sanitize('D') }, null, 2);
}

function exportCopy() {
  const text = buildCSS() + '\n\n/* JSON */\n' + buildJSON();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => toast('CSS + JSON をコピーしました', 'ok'),
      () => toast('クリップボードコピーに失敗', 'err')
    );
  } else {
    toast('clipboard 利用不可', 'err');
  }
}

function download(kind) {
  const ts = new Date().toISOString().replace(/[:.]/g, '-').replace(/T/, '_').slice(0, 19);
  let blob, fname;
  if (kind === 'css') {
    blob = new Blob([buildCSS()], { type: 'text/css' });
    fname = 'op-layout-' + ts + '.css';
  } else {
    blob = new Blob([buildJSON()], { type: 'application/json' });
    fname = 'op-layout-' + ts + '.json';
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
  toast(fname + ' をダウンロード', 'ok');
}

function migrateLegacyStorage() {
  try {
    ['B', 'C', 'D'].forEach(vc => {
      const legacyKey = LEGACY_STORAGE_PREFIX + vc;
      const newKey = STORAGE_PREFIX + vc;
      const legacyVal = localStorage.getItem(legacyKey);
      const newVal = localStorage.getItem(newKey);
      if (legacyVal && !newVal) {
        try { localStorage.setItem(newKey, legacyVal); } catch (e) {}
        try { localStorage.removeItem(legacyKey); } catch (e) {}
      } else if (legacyVal && newVal) {
        // Best-effort cleanup if both exist
        try { localStorage.removeItem(legacyKey); } catch (e) {}
      }
    });
  } catch (e) {}
}

function init() {
  migrateLegacyStorage();
  loadHeightGuidesPref();
  loadBoxGuidesPref();
  loadMirrorModePref();
  // Re-load state in case migration produced new values (state was initialized at module load)
  state = {
    B: load('B') || defaultsFor('B'),
    C: load('C') || defaultsFor('C'),
    D: load('D') || defaultsFor('D')
  };
  preloadFrameAspects();
  buildPresetGrid();
  buildHeader();
  buildRightPane();
  render();

  if (window.ResizeObserver) {
    const ro = new ResizeObserver(() => { rescaleStage(); renderHeightGuides(); renderBoxGuides(); });
    ro.observe(document.getElementById('center'));
  }
  window.addEventListener('resize', () => { rescaleStage(); renderHeightGuides(); renderBoxGuides(); });
}

document.addEventListener('DOMContentLoaded', init);
</script>
