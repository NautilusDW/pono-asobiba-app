<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">
<title>Quizland OP レイアウトエディタ</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1c1f26; color: #e5e7eb; overflow: hidden; }

  #app {
    display: grid;
    grid-template-columns: 240px 1fr 320px;
    grid-template-rows: 48px 1fr;
    grid-template-areas:
      "header header header"
      "left   center right";
    height: 100vh;
    width: 100vw;
  }

  header {
    grid-area: header;
    background: #14161c;
    border-bottom: 1px solid #2a2e3a;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 10;
  }
  header h1 { font-size: 14px; margin: 0; color: #f3f4f6; font-weight: 600; }
  header .vp-group {
    display: flex;
    gap: 4px;
    background: #20242e;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    padding: 2px;
  }
  header .vp-group label {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    color: #cbd5e1;
  }
  header .vp-group input { display: none; }
  header .vp-group input:checked + span {
    background: #2563eb;
    color: #fff;
    padding: 4px 10px;
    border-radius: 3px;
  }
  header .vp-group span { padding: 4px 10px; border-radius: 3px; }
  header button {
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  header button:hover { background: #1d4ed8; }
  header button.ghost { background: transparent; border: 1px solid #3a4050; color: #cbd5e1; }
  header button.ghost:hover { background: #20242e; }
  header .spacer { flex: 1; }

  .panel {
    background: #181b22;
    border-right: 1px solid #2a2e3a;
    overflow-y: auto;
    padding: 12px;
    font-size: 12px;
  }
  #left  { grid-area: left; }
  #right { grid-area: right; border-right: none; border-left: 1px solid #2a2e3a; padding: 0; }

  .section { margin-bottom: 18px; }
  .section h3 {
    margin: 0 0 8px 0;
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .preset-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .preset-thumb {
    background: #0f1218;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    cursor: pointer;
    overflow: hidden;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px;
    transition: border-color 0.15s;
  }
  .preset-thumb:hover { border-color: #3a4050; }
  .preset-thumb.selected { border-color: #10b981; box-shadow: 0 0 0 2px #10b98144; }
  .preset-thumb img {
    max-width: 100%;
    max-height: 70%;
    object-fit: contain;
  }
  .preset-thumb .pname {
    font-size: 9px;
    color: #94a3b8;
    margin-top: 4px;
    text-align: center;
    line-height: 1.1;
    word-break: break-all;
  }

  /* Center preview */
  #center {
    grid-area: center;
    background: #0a0c10;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #stage-wrap {
    position: relative;
    transform-origin: center center;
  }
  .stage {
    position: relative;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 0 1px #2a2e3a, 0 8px 24px rgba(0,0,0,0.6);
  }
  .stage[data-vc="B"] { width: 1024px; height: 768px; }
  .stage[data-vc="C"] { width: 1920px; height: 1080px; }
  .stage[data-vc="D"] { width: 2560px; height: 1080px; }

  .op-bg {
    position: absolute;
    inset: 0;
    background-image: url('../assets/images/quizland/OP/OP_BG02.webp');
    background-size: cover;
    background-position: center;
    filter: blur(5px) saturate(0.9) brightness(0.94);
    transform: scale(1.08);
  }
  .op-sides {
    position: absolute;
    inset: 0;
    display: flex;
  }
  .op-side {
    flex: 1;
    position: relative;
    transition: opacity 0.25s;
    opacity: 0.55;
  }
  .op-side.is-speaking { opacity: 1.0; }

  .op-char-slot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .op-char-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: bottom center;
    display: block;
  }

  .op-dialogue {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }
  .op-dialogue.mode-css {
    background-image: none;
  }
  .op-dialogue-text {
    color: #2a2424;
    font-size: 22px;
    line-height: 1.5;
    text-align: center;
    overflow: auto;
    max-width: 100%;
    max-height: 100%;
    word-break: break-word;
  }

  /* Speaker label (話者名チップ). 絶対配置で box の四隅に anchor。
     position プロパティ (top/bottom/left/right) は applySideToDom /
     applySingleBoxToDom でインラインスタイルとして設定する。 */
  .op-dialogue-label {
    position: absolute;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    font-size: 12px;
    line-height: 1.2;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 2;
  }

  /* 16:9 safe-area overlay (editor-only, NOT exported in buildCSS) */
  /* D viewport (2560x1080, 21:9) only — shows where 16:9 (1920x1080) sits in the center.
     Left/right 320px shaded red = areas visible only on 21:9. Editor visual aid only. */
  .safe-area-16-9 {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    color: #fde047;
    background: linear-gradient(
      to right,
      rgba(220, 38, 38, 0.18) 0,
      rgba(220, 38, 38, 0.18) 320px,
      transparent 320px,
      transparent calc(100% - 320px),
      rgba(220, 38, 38, 0.18) calc(100% - 320px),
      rgba(220, 38, 38, 0.18) 100%
    );
  }
  .stage[data-vc="D"] .safe-area-16-9 { display: block; }
  .safe-area-16-9::before,
  .safe-area-16-9::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: repeating-linear-gradient(
      to bottom,
      currentColor 0 8px,
      transparent 8px 16px
    );
  }
  .safe-area-16-9::before { left: 320px; }
  .safe-area-16-9::after  { right: 320px; }
  .safe-area-label {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.65);
    color: #fde047;
    font-size: 18px;
    padding: 2px 8px;
    border-radius: 3px;
    white-space: nowrap;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* Right pane: tabs + scroll body */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid #2a2e3a;
    background: #14161c;
  }
  .tab-bar button {
    flex: 1;
    background: transparent;
    border: none;
    color: #94a3b8;
    padding: 10px 8px;
    cursor: pointer;
    font-size: 12px;
    border-bottom: 2px solid transparent;
  }
  .tab-bar button.active {
    color: #f3f4f6;
    border-bottom-color: #2563eb;
    background: #181b22;
  }
  .tab-body {
    overflow-y: auto;
    height: calc(100% - 41px);
    padding: 12px;
  }

  .prop-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
  .prop-row label { width: 80px; font-size: 11px; color: #94a3b8; flex-shrink: 0; }
  .prop-row input[type="range"] { flex: 1; min-width: 0; }
  .prop-row input[type="number"], .prop-row input[type="text"], .prop-row select {
    background: #20242e;
    border: 1px solid #2a2e3a;
    color: #e5e7eb;
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 11px;
    min-width: 0;
  }
  .prop-row input[type="number"] { width: 56px; flex-shrink: 0; }
  .prop-row select { flex: 1; }
  .prop-row input[type="color"] {
    width: 36px; height: 22px; padding: 0; border: 1px solid #2a2e3a; border-radius: 3px;
    background: #20242e; cursor: pointer;
  }
  .prop-row textarea {
    flex: 1; background: #20242e; border: 1px solid #2a2e3a; color: #e5e7eb;
    padding: 6px; border-radius: 3px; font-size: 11px; font-family: inherit;
    resize: vertical; min-height: 56px;
  }
  .radio-row { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
  .radio-row label {
    flex: 1; min-width: 0; text-align: center; background: #20242e; border: 1px solid #2a2e3a;
    border-radius: 3px; cursor: pointer; padding: 4px 6px; font-size: 11px; color: #cbd5e1;
    width: auto;
  }
  .radio-row input {
    position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px;
  }
  .radio-row label:focus-within { outline: 2px solid #2563eb; outline-offset: 2px; }
  .radio-row label.checked { background: #2563eb; color: #fff; border-color: #2563eb; }

  .speaker-row {
    background: #20242e;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 12px;
  }
  .speaker-row .label-text {
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .group {
    background: #14161c;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 12px;
  }
  .group h4 {
    margin: 0 0 8px 0;
    font-size: 11px;
    color: #cbd5e1;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Height guides (Photoshop-like horizontal rulers). Editor-only, NOT exported. */
  .height-guides {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }
  .height-guides.is-on { display: block; }
  .height-guides .hg-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 0;
    border-top: 1px dashed #fde047;
    pointer-events: none;
  }
  .height-guides .hg-line.hg-pono { border-top-color: #fde047; }
  .height-guides .hg-line.hg-pono.hg-bot { border-top-color: #fde04788; }
  .height-guides .hg-line.hg-hakase { border-top-color: #67e8f9; }
  .height-guides .hg-line.hg-hakase.hg-bot { border-top-color: #67e8f988; }
  .height-guides .hg-label {
    position: absolute;
    right: 6px;
    top: -12px;
    background: rgba(0, 0, 0, 0.65);
    color: inherit;
    font-size: 14px;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .height-guides .hg-line.hg-pono { color: #fde047; }
  .height-guides .hg-line.hg-hakase { color: #67e8f9; }

  /* Box guides (Box 上下端の可視化). Editor-only, NOT exported.
     Distinguished from height-guides by dotted line style + slightly thicker. */
  .box-guides {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }
  .box-guides.is-on { display: block; }
  .box-guides .bg-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 0;
    border-top: 2px dotted #fde047;
    pointer-events: none;
  }
  .box-guides .bg-line.bg-pono { border-top-color: #fde047; color: #fde047; }
  .box-guides .bg-line.bg-pono.bg-bot { border-top-color: #fde04788; }
  .box-guides .bg-line.bg-hakase { border-top-color: #67e8f9; color: #67e8f9; }
  .box-guides .bg-line.bg-hakase.bg-bot { border-top-color: #67e8f988; }
  .box-guides .bg-label {
    position: absolute;
    left: 6px;
    top: -12px;
    background: rgba(0, 0, 0, 0.65);
    color: inherit;
    font-size: 14px;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* Center vertical line (常時表示の中央指標). Editor-only, NOT exported.
     z-index: 40 — below safe-area-16-9 (50) and box/height guides (60). */
  .center-line {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 1px;
    background: rgba(255, 255, 255, 0.18);
    z-index: 40;
    pointer-events: none;
  }

  /* Single Box 1 個モード (機能 5).
     Editor-only DOM; default hidden. Activated by .stage[data-single-box="on"]. */
  .single-box-wrapper {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 30;
    pointer-events: none;
  }
  .stage[data-single-box="on"] .single-box-wrapper { display: block; }
  /* When Single Box mode is ON, hide per-side dialogues but keep characters visible. */
  .stage[data-single-box="on"] .op-sides .op-dialogue { display: none; }

  .op-dialogue-single {
    position: absolute;
    /* width / height / top set via inline style from applySingleBoxToDom */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: 100% 100%;
    background-repeat: no-repeat;
    pointer-events: auto;
  }
  .op-dialogue-single.mode-css {
    background-image: none;
  }
  .op-dialogue-single .op-dialogue-text {
    color: #2a2424;
    font-size: 22px;
    line-height: 1.5;
    text-align: center;
    overflow: auto;
    max-width: 100%;
    max-height: 100%;
    word-break: break-word;
  }

  /* Single-box guide line variant (dashdot, neutral white). */
  .box-guides .bg-line.bg-single {
    border-top: 2px dashed #e5e7eb;
    color: #e5e7eb;
  }
  .box-guides .bg-line.bg-single.bg-bot { border-top-color: #e5e7eb88; }

  /* Right pane: when single-box mode is ON, dim the per-side Box group. */
  .group.is-single-mode {
    opacity: 0.4;
    pointer-events: none;
  }

  /* Single Box dedicated section (visible only when single-box mode is ON). */
  .single-box-section {
    background: #14161c;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 12px;
  }
  .single-box-section h4 {
    margin: 0 0 8px 0;
    font-size: 11px;
    color: #d1fae5;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Disabled mirror row state */
  .mirror-row.is-disabled {
    opacity: 0.4;
    pointer-events: none;
    cursor: not-allowed;
  }

  /* Mirror toggle in tab area */
  .mirror-row {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #20242e;
    border: 1px solid #2a2e3a;
    border-radius: 3px;
    padding: 6px 8px;
    margin: 0 12px 8px 12px;
    cursor: pointer;
    user-select: none;
  }
  .mirror-row input[type="checkbox"] {
    margin: 0;
    cursor: pointer;
  }
  .mirror-row .mirror-text {
    font-size: 11px;
    color: #cbd5e1;
  }
  .mirror-row.is-on { border-color: #10b981; background: #14322a; }
  .mirror-row.is-on .mirror-text { color: #d1fae5; }

  /* Aspect-lock checkbox row */
  .lock-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    background: #20242e;
    border: 1px solid #2a2e3a;
    border-radius: 3px;
    padding: 6px 8px;
    cursor: pointer;
    user-select: none;
  }
  .lock-row input[type="checkbox"] {
    margin: 0;
    cursor: pointer;
  }
  .lock-row .lock-text {
    font-size: 11px;
    color: #cbd5e1;
  }
  .lock-row.is-on { border-color: #10b981; background: #14322a; }
  .lock-row.is-on .lock-text { color: #d1fae5; }

  header button.toggle-on {
    background: #10b981;
  }
  header button.toggle-on:hover { background: #059669; }

  /* Toast */
  #toast {
    position: fixed;
    top: 60px; left: 50%;
    transform: translateX(-50%);
    background: #1f2937;
    color: #f3f4f6;
    padding: 8px 16px;
    border-radius: 4px;
    border: 1px solid #2a2e3a;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    font-size: 12px;
  }
  #toast.show { opacity: 1; }
  #toast.ok { border-color: #10b981; }
  #toast.err { border-color: #ef4444; }

  .info { font-size: 10px; color: #6b7280; margin-top: 4px; }

  /* Drop zone — visual feedback for drag-and-drop image add. */
  .section.is-drop-target {
    position: relative;
  }
  .section.is-drop-target::after {
    content: '';
    position: absolute;
    inset: -4px;
    border: 2px dashed #2563eb;
    border-radius: 6px;
    background: rgba(37, 99, 235, 0.10);
    pointer-events: none;
    z-index: 5;
  }
  .section.is-drop-target .preset-grid::before {
    content: 'ここに画像をドロップ';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(37, 99, 235, 0.92);
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 12px;
    z-index: 6;
    pointer-events: none;
    white-space: nowrap;
  }
  .section .preset-grid { position: relative; }

  /* Per-thumb delete (×) button shown only on user-added thumbs. */
  .preset-thumb { position: relative; }
  .preset-thumb .thumb-del {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.65);
    color: #fff;
    border: 1px solid #ef4444;
    cursor: pointer;
    font-size: 11px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    z-index: 4;
  }
  .preset-thumb .thumb-del:hover { background: #ef4444; }
</style>
</head>
<body>

<div id="app">
  <header>
    <h1>Quizland OP レイアウトエディタ</h1>
    <div class="vp-group" id="vp-group">
      <label><input type="radio" name="vp" value="B" checked><span>B (1024×768)</span></label>
      <label><input type="radio" name="vp" value="C"><span>C (1920×1080)</span></label>
      <label><input type="radio" name="vp" value="D"><span>D (2560×1080)</span></label>
    </div>
    <span id="scale-info" style="font-size:11px;color:#94a3b8;"></span>
    <span class="spacer"></span>
    <button id="btn-toggle-height-guides" class="ghost" type="button">📏 高さガイド</button>
    <button id="btn-toggle-box-guides" class="ghost" type="button">📐 Box ガイド</button>
    <button id="btn-toggle-single-box" class="ghost" type="button">📦 Box 1 個</button>
    <button id="btn-export">エクスポート（コピー）</button>
    <button id="btn-export-css" class="ghost">CSS DL</button>
    <button id="btn-export-json" class="ghost">JSON DL</button>
    <button id="btn-undo-reset" class="ghost" disabled>元に戻す</button>
    <button id="btn-reset" class="ghost">リセット</button>
  </header>

  <aside id="left" class="panel">
    <div class="section" id="pono-section" data-drop="pono">
      <h3>Pono バリエーション</h3>
      <div id="pono-grid" class="preset-grid"></div>
      <div class="info">画像をここにドロップで追加（ストレージに保存・合計 ~4MB まで推奨）</div>
    </div>

    <div class="section" id="frame-section" data-drop="frame">
      <h3>フレーム</h3>
      <div id="frame-grid" class="preset-grid"></div>
      <div class="info">画像モード時に選択中の側に適用 ／ ドロップで追加（ストレージに保存・合計 ~4MB まで推奨）</div>
    </div>
  </aside>

  <main id="center">
    <div id="stage-wrap">
      <div class="stage" id="stage" data-vc="B">
        <div class="op-bg"></div>
        <div class="op-sides">
          <div class="op-side op-side-pono" id="side-pono">
            <div class="op-char-slot" id="slot-pono">
              <img id="img-pono" alt="">
            </div>
            <div class="op-dialogue op-dialogue-pono" id="box-pono">
              <div class="op-dialogue-label" id="label-pono">ポノ</div>

const PONO_VARIANTS = [

  { name: 'dance_hooray', path: '../assets/images/characters/pono/dance/dance_hooray.webp' },

const FRAME_IMAGES = [
  { id: 'frame_wide_a', label: '横長フレーム A', path: encodeURI('../assets/images/quizland/OP/レイヤー 0_20260507-173812_001.png') },
  { id: 'frame_wide_b', label: '横長フレーム B', path: encodeURI('../assets/images/quizland/OP/レイヤー 0_20260507-173858_001.png') },

  { id: 'frame_1_1',    label: '1:1 フレーム',    path: encodeURI('../assets/images/quizland/OP/frame_1_1.png') }

const FRAME_IDS = FRAME_IMAGES.map(f => f.id);
const DEFAULT_FRAME_ID = 'frame_wide_a';

const VP_DIMS = { B: [1024, 768], C: [1920, 1080], D: [2560, 1080] };
const STORAGE_PREFIX = 'pono.opLayoutEditor.v1.';
const LEGACY_STORAGE_PREFIX = 'opLayoutEditor.';
const HEIGHT_GUIDES_STORAGE_KEY = STORAGE_PREFIX + 'showHeightGuides';
const BOX_GUIDES_STORAGE_KEY = STORAGE_PREFIX + 'showBoxGuides';
const MIRROR_MODE_STORAGE_KEY = STORAGE_PREFIX + 'mirrorMode';
const SINGLE_BOX_MODE_STORAGE_KEY = STORAGE_PREFIX + 'singleBoxMode';
// Persistent storage for drag-and-dropped images (Pono variants and frames).
// Stored as { pono: [{name,path,label?}], frame: [{id,label,path,naturalAspect?}] }.
const DROPPED_ASSETS_STORAGE_KEY = STORAGE_PREFIX + 'droppedAssets';
// Soft warning threshold for combined dropped-asset storage size (bytes).
const DROPPED_ASSETS_WARN_BYTES = 4 * 1024 * 1024;

// Frame natural aspect cache: id -> naturalW / naturalH (number) or undefined while loading.
const FRAME_NATURAL_ASPECT = {};
function preloadFrameAspects() {
  FRAME_IMAGES.forEach(f => {
    const im = new Image();
    im.onload = () => {
      if (im.naturalWidth > 0 && im.naturalHeight > 0) {
        FRAME_NATURAL_ASPECT[f.id] = im.naturalWidth / im.naturalHeight;
        // After load, refresh aspect-lock-driven dims for any side currently using this frame
        // with image-mode aspectLock = ON.
        try { onFrameAspectLoaded(f.id); } catch (e) {}
      }
    };
    im.src = f.path;
  });
}

function getEffectiveAspectRatio(s) {
  // Returns the ratio to apply for aspectLock. Image mode uses frame's natural;
  // CSS mode uses the snapshot stored at lock-on (aspectLockRatio).
  if (s.boxMode === 'image') {
    const a = FRAME_NATURAL_ASPECT[s.boxImage];
    if (a && Number.isFinite(a) && a > 0) return a;
    // fall back to stored ratio if available
    if (s.aspectLockRatio && s.aspectLockRatio > 0) return s.aspectLockRatio;
    return null;
  } else {
    if (s.aspectLockRatio && s.aspectLockRatio > 0) return s.aspectLockRatio;
    return null;
  }
}

let showHeightGuides = false;
function loadHeightGuidesPref() {
  try {
    const v = localStorage.getItem(HEIGHT_GUIDES_STORAGE_KEY);
    showHeightGuides = v === 'true';
  } catch (e) { showHeightGuides = false; }
}
function saveHeightGuidesPref() {
  try { localStorage.setItem(HEIGHT_GUIDES_STORAGE_KEY, showHeightGuides ? 'true' : 'false'); } catch (e) {}
}

let showBoxGuides = false;
function loadBoxGuidesPref() {
  try {
    const v = localStorage.getItem(BOX_GUIDES_STORAGE_KEY);
    showBoxGuides = v === 'true';
  } catch (e) { showBoxGuides = false; }
}
function saveBoxGuidesPref() {
  try { localStorage.setItem(BOX_GUIDES_STORAGE_KEY, showBoxGuides ? 'true' : 'false'); } catch (e) {}
}

let mirrorMode = false;
// Re-entrancy guard so mirror propagation does not recurse.
let _mirroring = false;
function loadMirrorModePref() {
  try {
    const v = localStorage.getItem(MIRROR_MODE_STORAGE_KEY);
    mirrorMode = v === 'true';
  } catch (e) { mirrorMode = false; }

}

let singleBoxMode = false;
function loadSingleBoxModePref() {

function saveSingleBoxModePref() {
  try { localStorage.setItem(SINGLE_BOX_MODE_STORAGE_KEY, singleBoxMode ? 'true' : 'false'); } catch (e) {}
}

// === Dropped assets persistence =========================================
// Builds the JSON-serializable payload of currently dropped Pono / frame images
// from the in-memory PONO_VARIANTS / FRAME_IMAGES arrays.
function buildDroppedAssetsPayload() {
  const pono = PONO_VARIANTS.filter(v => v && v.userAdded).map(v => ({
    name: v.name,
    path: v.path,
    label: v.label || v.name
  }));
  const frame = FRAME_IMAGES.filter(f => f && f.userAdded).map(f => {
    const out = { id: f.id, label: f.label, path: f.path };
    const a = FRAME_NATURAL_ASPECT[f.id];
    if (a && Number.isFinite(a) && a > 0) out.naturalAspect = a;
    return out;
  });
  return { pono: pono, frame: frame };
}

// Returns true on success, false on QuotaExceededError, null when localStorage unavailable.
function writeDroppedAssetsToStorage(payload) {
  let json;
  try {
    json = JSON.stringify(payload);
  } catch (e) {
    return false;
  }
  // Soft warning when approaching capacity (does not block save).
  try {
    if (json.length >= DROPPED_ASSETS_WARN_BYTES) {
      toast('保存容量に近づいています', 'err');
    }
  } catch (_) {}
  try {
    localStorage.setItem(DROPPED_ASSETS_STORAGE_KEY, json);
    return true;
  } catch (e) {
    // Detect QuotaExceededError across browsers.
    const isQuota = e && (
      e.name === 'QuotaExceededError' ||
      e.name === 'NS_ERROR_DOM_QUOTA_REACHED' ||
      e.code === 22 || e.code === 1014
    );
    if (isQuota) return false;
    // Other errors (e.g., localStorage disabled) -> swallow, treat as no-op.
    return null;
  }
}

// Persist current dropped assets. Returns true on success, false on quota,
// null when storage is unavailable. Caller should rollback on false.
function saveDroppedAssets() {
  return writeDroppedAssetsToStorage(buildDroppedAssetsPayload());
}

// Load persisted dropped assets and merge into PONO_VARIANTS / FRAME_IMAGES.
// Must run before state load() so that migrateFrameIds() recognizes user-added
// frame ids as valid. Also restores FRAME_NATURAL_ASPECT from saved values to
// minimize FOUC; any missing entries are filled later by an Image() preload.
function loadDroppedAssets() {
  let raw = null;
  try {
    raw = localStorage.getItem(DROPPED_ASSETS_STORAGE_KEY);
  } catch (e) {
    return; // localStorage unavailable -> silently skip
  }
  if (!raw) return;
  let parsed;
  try {
    parsed = JSON.parse(raw);
  } catch (e) {
    try { toast('保存された追加画像の読込に失敗しました', 'err'); } catch (_) {}
    parsed = {};
  }
  if (!parsed || typeof parsed !== 'object') parsed = {};
  const ponoList = Array.isArray(parsed.pono) ? parsed.pono : [];
  const frameList = Array.isArray(parsed.frame) ? parsed.frame : [];

  ponoList.forEach(item => {
    if (!item || typeof item !== 'object') return;
    const name = String(item.name || '').trim();
    const path = String(item.path || '');
    if (!name || !path) return;
    // Reject paths that aren't data:image/ URIs. Prevents CSS-syntax-breaking
    // payloads from being injected via background-image: url(...) on restore.
    if (!path.startsWith('data:image/')) return;
    if (PONO_VARIANTS.some(v => v.name === name)) return; // dedupe vs originals
    PONO_VARIANTS.push({
      name: name,
      path: path,
      userAdded: true,
      label: item.label ? String(item.label) : name
    });
  });

  frameList.forEach(item => {
    if (!item || typeof item !== 'object') return;
    const id = String(item.id || '').trim();
    const path = String(item.path || '');
    const label = item.label ? String(item.label) : id;
    if (!id || !path) return;
    // Reject paths that aren't data:image/ URIs. Prevents CSS-syntax-breaking
    // payloads from being injected via background-image: url(...) on restore.
    if (!path.startsWith('data:image/')) return;
    if (FRAME_IMAGES.some(f => f.id === id)) return; // dedupe vs originals
    FRAME_IMAGES.push({ id: id, label: label, path: path, userAdded: true });
    if (FRAME_IDS.indexOf(id) < 0) FRAME_IDS.push(id);
    const a = Number(item.naturalAspect);
    if (Number.isFinite(a) && a > 0) {
      FRAME_NATURAL_ASPECT[id] = a;
    } else {
      // No cached aspect: compute lazily via Image preload.
      const im = new Image();
      im.onload = () => {
        if (im.naturalWidth > 0 && im.naturalHeight > 0) {
          FRAME_NATURAL_ASPECT[id] = im.naturalWidth / im.naturalHeight;
          try { onFrameAspectLoaded(id); } catch (_) {}
        }
      };
      im.src = path;
    }
  });
}
// === end Dropped assets persistence ====================================

// Keys that get mirror-copied (with sign reversal for X-axis offsets)
const MIRROR_COPY_KEYS = [
  'boxW', 'boxH', 'boxY', 'boxPadding', 'boxRadius',
  'boxImage', 'boxMode', 'boxColor',
  'aspectLock', 'aspectLockRatio',
  'slotW', 'slotH', 'slotOffsetY', 'slotAspect', 'objectPosition',
  'fontSize',
  // 機能 1/2: テキスト整列 + ラベル位置
  'textAlignH', 'textAlignV',
  'labelAnchor', 'labelInside', 'labelOffsetY'
];
// X-axis 系 (左右ミラー時に符号反転)
const MIRROR_FLIP_KEYS = ['boxX', 'slotOffsetX', 'labelOffsetX'];
// Keys that are NEVER mirrored:
//   variant (Pono image) — Hakase has no variant
//   sampleText            — each character has unique words
//   speaker               — global state, not per-side

function propagateMirror(sideKey, key) {
  if (!mirrorMode || _mirroring) return;
  if (key && key !== '__all__' && !MIRROR_COPY_KEYS.includes(key) && !MIRROR_FLIP_KEYS.includes(key)) {
    return;
  }
  const otherSide = sideKey === 'pono' ? 'hakase' : 'pono';
  const src = state[currentVC][sideKey];
  const dst = state[currentVC][otherSide];
  if (!src || !dst) return;
  _mirroring = true;
  try {
    if (key === '__all__' || !key) {
      // Bulk sync: copy every relevant key
      MIRROR_COPY_KEYS.forEach(k => { if (k in src) dst[k] = src[k]; });
      MIRROR_FLIP_KEYS.forEach(k => { if (typeof src[k] === 'number') dst[k] = -src[k]; });
    } else if (MIRROR_FLIP_KEYS.includes(key)) {
      if (typeof src[key] === 'number') dst[key] = -src[key];
    } else {
      dst[key] = src[key];
    }
    save(currentVC);
    applySideToDom(otherSide);
  } finally {
    _mirroring = false;
  }
}

function defaultsFor(vc) {
  const isB = vc === 'B';
  const isWide = vc === 'C' || vc === 'D';
  // Per-VC defaults for the Single Box (機能 5 — Box 1 個モード).
  // boxX is removed (always horizontally centered); other keys mirror per-side schema.
  const singleBoxDefaults = (() => {
    if (vc === 'B') {
      return { boxW: 800,  boxH: 180, boxY: 540 };
    } else if (vc === 'C') {
      return { boxW: 1200, boxH: 220, boxY: 820 };
    } else { // D
      return { boxW: 1400, boxH: 240, boxY: 820 };
    }
  })();
  return {
    pono: {
      variant: 'dance_hi',
      slotW: isWide ? 360 : 300,
      slotH: isWide ? 480 : 400,
      slotAspect: 'fixed_0.75',
      objectPosition: 'bottom',
      slotOffsetX: 0,
      slotOffsetY: isWide ? -80 : -60,
      boxMode: 'image',
      boxImage: DEFAULT_FRAME_ID,
      boxW: isWide ? 480 : 400,
      boxH: isWide ? 180 : 200,
      boxX: 0,
      boxY: isWide ? 240 : 200,
      boxPadding: 32,
      boxRadius: 16,
      boxColor: '#d8efcf',

    },
    hakase: {
      variant: 'hakase',
      slotW: isWide ? 440 : 360,
      slotH: isWide ? 480 : 400,
      slotAspect: 'fixed_1.23',
      objectPosition: 'bottom',
      slotOffsetX: 0,
      slotOffsetY: isWide ? -80 : -60,
      boxMode: 'image',
      boxImage: DEFAULT_FRAME_ID,
      boxW: isWide ? 520 : 420,
      boxH: isWide ? 180 : 200,
      boxX: 0,
      boxY: isWide ? 240 : 200,
      boxPadding: 32,
      boxRadius: 16,
      boxColor: '#fff3d6',
      fontSize: isB ? 16 : 18,
      aspectLock: false,
      aspectLockRatio: 0,
      textAlignH: 'center',
      textAlignV: 'center',
      labelAnchor: 'bl',
      labelInside: true,
      labelOffsetX: 0,
      labelOffsetY: 0,
      sampleText: 'ほっほっほ…ポノか。よくきたのう'
    },
    speaker: 'hakase',
    singleBox: {
      boxW: singleBoxDefaults.boxW,
      boxH: singleBoxDefaults.boxH,
      boxY: singleBoxDefaults.boxY,
      boxPadding: 32,
      boxRadius: 16,
      boxMode: 'image',
      boxImage: DEFAULT_FRAME_ID,
      boxColor: '#fef3c7',
      aspectLock: false,
      aspectLockRatio: 0,
      fontSize: isB ? 16 : 18,
      textAlignH: 'center',
      textAlignV: 'center',
      labelAnchor: 'bl',
      labelInside: true,
      labelOffsetX: 0,
      labelOffsetY: 0,
      speakerSrc: 'pono'
    }
  };
}

let currentVC = 'B';
let currentTab = 'pono';
// state is initialized in init() AFTER loadDroppedAssets(), so that
// migrateFrameIds() recognizes user-added frame ids as valid. Initializing here
// would call load() before dropped assets are merged, causing user-added frame
// ids to be replaced with DEFAULT_FRAME_ID.
let state = null;

function migrateFrameIds(parsed) {
  if (!parsed || typeof parsed !== 'object') return parsed;
  // Detect VC from data shape (used to pick correct fontSize default).
  // We can't know vc from `parsed` alone, so caller may be migrating any of B/C/D.
  // We default to C/D-ish 18 if both slot/box dims are large, else 16. As fallback, 16.
  ['pono', 'hakase'].forEach(sideKey => {
    const side = parsed[sideKey];
    if (!side || typeof side !== 'object') return;
    if (!FRAME_IDS.includes(side.boxImage)) {
      side.boxImage = DEFAULT_FRAME_ID;
    }
    if (typeof side.aspectLock !== 'boolean') side.aspectLock = false;
    if (typeof side.aspectLockRatio !== 'number' || !Number.isFinite(side.aspectLockRatio)) {
      side.aspectLockRatio = 0;
    }
    if (typeof side.fontSize !== 'number' || !Number.isFinite(side.fontSize) || side.fontSize <= 0) {
      // Heuristic: wider boxes (>= 480) get 18, smaller (B-class) get 16.
      side.fontSize = (Number(side.boxW) >= 480) ? 18 : 16;
    }
    // 機能 1/2: テキスト整列 + ラベル位置 既定値 (legacy state では欠如する)
    if (side.textAlignH !== 'left' && side.textAlignH !== 'center' && side.textAlignH !== 'right') {
      side.textAlignH = 'center';
    }
    if (side.textAlignV !== 'top' && side.textAlignV !== 'center' && side.textAlignV !== 'bottom') {
      side.textAlignV = 'center';
    }
    if (side.labelAnchor !== 'tl' && side.labelAnchor !== 'tr' && side.labelAnchor !== 'bl' && side.labelAnchor !== 'br') {
      side.labelAnchor = 'bl';
    }
    if (typeof side.labelInside !== 'boolean') side.labelInside = true;
    if (typeof side.labelOffsetX !== 'number' || !Number.isFinite(side.labelOffsetX)) side.labelOffsetX = 0;
    if (typeof side.labelOffsetY !== 'number' || !Number.isFinite(side.labelOffsetY)) side.labelOffsetY = 0;
  });
  // Backfill singleBox (機能 5) if missing on legacy state. Use heuristic based on
  // box width/height of the existing pono side to guess B/C/D. Then apply VC-style defaults.
  if (!parsed.singleBox || typeof parsed.singleBox !== 'object') {
    // Heuristic VC inference: pono.boxW >= 520 → wide (C/D), >= 1200 → D-ish.
    const pw = Number(parsed.pono && parsed.pono.boxW) || 0;
    let inferredVC = 'B';
    if (pw >= 1200) inferredVC = 'D';
    else if (pw >= 520) inferredVC = 'C';
    const sb = (() => {
      if (inferredVC === 'B') return { boxW: 800, boxH: 180, boxY: 540, fontSize: 16 };
      if (inferredVC === 'C') return { boxW: 1200, boxH: 220, boxY: 820, fontSize: 18 };
      return { boxW: 1400, boxH: 240, boxY: 820, fontSize: 18 };
    })();
    parsed.singleBox = {
      boxW: sb.boxW,
      boxH: sb.boxH,
      boxY: sb.boxY,
      boxPadding: 32,
      boxRadius: 16,
      boxMode: 'image',
      boxImage: DEFAULT_FRAME_ID,
      boxColor: '#fef3c7',
      aspectLock: false,
      aspectLockRatio: 0,
      fontSize: sb.fontSize,
      textAlignH: 'center',
      textAlignV: 'center',
      labelAnchor: 'bl',
      labelInside: true,
      labelOffsetX: 0,
      labelOffsetY: 0,
      speakerSrc: 'pono'
    };
  } else {
    const sb = parsed.singleBox;
    if (typeof sb.boxW !== 'number' || !Number.isFinite(sb.boxW) || sb.boxW <= 0) sb.boxW = 1200;
    if (typeof sb.boxH !== 'number' || !Number.isFinite(sb.boxH) || sb.boxH <= 0) sb.boxH = 220;
    if (typeof sb.boxY !== 'number' || !Number.isFinite(sb.boxY)) sb.boxY = 820;
    if (typeof sb.boxPadding !== 'number' || !Number.isFinite(sb.boxPadding)) sb.boxPadding = 32;
    if (typeof sb.boxRadius !== 'number' || !Number.isFinite(sb.boxRadius)) sb.boxRadius = 16;
    if (sb.boxMode !== 'image' && sb.boxMode !== 'css') sb.boxMode = 'image';
    if (!FRAME_IDS.includes(sb.boxImage)) sb.boxImage = DEFAULT_FRAME_ID;
    if (typeof sb.boxColor !== 'string') sb.boxColor = '#fef3c7';
    if (typeof sb.aspectLock !== 'boolean') sb.aspectLock = false;
    if (typeof sb.aspectLockRatio !== 'number' || !Number.isFinite(sb.aspectLockRatio)) {
      sb.aspectLockRatio = 0;
    }
    if (typeof sb.fontSize !== 'number' || !Number.isFinite(sb.fontSize) || sb.fontSize <= 0) {
      sb.fontSize = sb.boxW >= 1000 ? 18 : 16;
    }
    if (sb.speakerSrc !== 'pono' && sb.speakerSrc !== 'hakase') sb.speakerSrc = 'pono';
    // 機能 1/2: テキスト整列 + ラベル位置 既定値 (legacy state では欠如する)
    if (sb.textAlignH !== 'left' && sb.textAlignH !== 'center' && sb.textAlignH !== 'right') {
      sb.textAlignH = 'center';
    }
    if (sb.textAlignV !== 'top' && sb.textAlignV !== 'center' && sb.textAlignV !== 'bottom') {
      sb.textAlignV = 'center';
    }
    if (sb.labelAnchor !== 'tl' && sb.labelAnchor !== 'tr' && sb.labelAnchor !== 'bl' && sb.labelAnchor !== 'br') {
      sb.labelAnchor = 'bl';
    }
    if (typeof sb.labelInside !== 'boolean') sb.labelInside = true;
    if (typeof sb.labelOffsetX !== 'number' || !Number.isFinite(sb.labelOffsetX)) sb.labelOffsetX = 0;
    if (typeof sb.labelOffsetY !== 'number' || !Number.isFinite(sb.labelOffsetY)) sb.labelOffsetY = 0;
  }
  return parsed;
}

function load(vc) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + vc);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return migrateFrameIds(parsed);
  } catch (e) { return null; }
}
function save(vc) {
  try { localStorage.setItem(STORAGE_PREFIX + vc, JSON.stringify(state[vc])); } catch (e) {}
}
let _saveTimer = null;
function saveDebounced(vc) {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => save(vc), 200);
}

function toast(msg, kind) {

  el.className = 'show ' + (kind || 'ok');

}

  lbl.textContent = v.name;
  div.appendChild(img);

function makeFrameThumb(f) {

function buildPresetGrid() {

// === Drag & Drop: image add ============================================
const DROP_ACCEPT_TYPES = ['image/png', 'image/webp', 'image/jpeg', 'image/gif'];

function sanitizeIdBase(name) {
  // Strip extension, normalize to ASCII-safe slug. Empty -> 'image'.
  const base = String(name || '').replace(/\.[^./\\]+$/, '');
  let s = base
    .normalize('NFKD')
    .replace(/[^a-zA-Z0-9._-]+/g, '_')
    .replace(/^_+|_+$/g, '')
    .replace(/_+/g, '_');
  if (!s) s = 'image';
  // Avoid leading digits for safer use as variant key.
  if (/^\d/.test(s)) s = 'img_' + s;
  return s.slice(0, 64);
}

function uniquePonoName(seed) {
  const taken = new Set(PONO_VARIANTS.map(v => v.name));
  if (!taken.has(seed)) return seed;
  let i = 2;
  while (taken.has(seed + '_' + i)) i++;
  return seed + '_' + i;
}

function uniqueFrameId(seed) {
  const taken = new Set(FRAME_IMAGES.map(f => f.id));
  if (!taken.has(seed)) return seed;
  let i = 2;
  while (taken.has(seed + '_' + i)) i++;
  return seed + '_' + i;
}

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(String(fr.result || ''));
    fr.onerror = () => reject(fr.error || new Error('FileReader error'));
    fr.readAsDataURL(file);
  });
}

// Fix B-5: cap dropped image size to keep localStorage and DOM responsive.
const DROP_FILE_MAX_BYTES = 10 * 1024 * 1024;

function addDroppedPonoFile(file) {
  if (file && file.size > DROP_FILE_MAX_BYTES) {
    toast(`${file.name} は 10MB を超えるため受け付けられません`, 'err');
    return Promise.resolve(null);
  }
  return readFileAsDataURL(file).then(dataUrl => {
    const baseLabel = String(file.name || 'pono').replace(/\.[^./\\]+$/, '') || 'pono';
    const id = uniquePonoName(sanitizeIdBase(file.name));
    const variant = { name: id, path: dataUrl, userAdded: true, label: baseLabel };
    PONO_VARIANTS.push(variant);
    // Persist; on QuotaExceededError, rollback the push so the in-memory state
    // matches what is on disk.
    const ok = saveDroppedAssets();
    if (ok === false) {
      const idx = PONO_VARIANTS.lastIndexOf(variant);
      if (idx >= 0) PONO_VARIANTS.splice(idx, 1);
      toast('ストレージ容量を超えました。既存の追加画像を削除してください', 'err');
      return null;
    }
    const grid = document.getElementById('pono-grid');
    if (grid) grid.appendChild(makePonoThumb(variant));
    return variant;
  });
}

function addDroppedFrameFile(file) {
  if (file && file.size > DROP_FILE_MAX_BYTES) {
    toast(`${file.name} は 10MB を超えるため受け付けられません`, 'err');
    return Promise.resolve(null);
  }
  return readFileAsDataURL(file).then(dataUrl => {
    const baseLabel = String(file.name || 'frame').replace(/\.[^./\\]+$/, '') || 'frame';
    const id = uniqueFrameId(sanitizeIdBase(file.name));
    const frame = { id: id, label: baseLabel, path: dataUrl, userAdded: true };
    FRAME_IMAGES.push(frame);
    FRAME_IDS.push(id);
    // Persist; on QuotaExceededError, rollback the push.
    const ok = saveDroppedAssets();
    if (ok === false) {
      const fi = FRAME_IMAGES.lastIndexOf(frame);
      if (fi >= 0) FRAME_IMAGES.splice(fi, 1);
      const idi = FRAME_IDS.lastIndexOf(id);
      if (idi >= 0) FRAME_IDS.splice(idi, 1);
      toast('ストレージ容量を超えました。既存の追加画像を削除してください', 'err');
      return null;
    }
    // Compute natural aspect for aspect-lock support; persist again once known.
    const im = new Image();
    im.onload = () => {
      if (im.naturalWidth > 0 && im.naturalHeight > 0) {
        FRAME_NATURAL_ASPECT[id] = im.naturalWidth / im.naturalHeight;
        // Best-effort persist of the cached aspect; failure here is non-fatal.
        try { saveDroppedAssets(); } catch (_) {}
        try { onFrameAspectLoaded(id); } catch (e) {}
      }
    };
    im.src = dataUrl;
    const grid = document.getElementById('frame-grid');
    if (grid) grid.appendChild(makeFrameThumb(frame));
    return frame;
  });
}

function removeUserPonoVariant(name) {
  const idx = PONO_VARIANTS.findIndex(v => v.name === name);
  if (idx < 0) return;
  if (!PONO_VARIANTS[idx].userAdded) return; // safety: never delete originals
  PONO_VARIANTS.splice(idx, 1);
  // Persist removal (a remove can never trip Quota; ignore result).
  try { saveDroppedAssets(); } catch (_) {}
  // If any side currently uses this variant, fall back to the first available.
  const fallback = (PONO_VARIANTS[0] && PONO_VARIANTS[0].name) || 'dance_hi';
  ['B', 'C', 'D'].forEach(vc => {
    const p = state[vc] && state[vc].pono;
    if (p && p.variant === name) {
      p.variant = fallback;
      save(vc);
    }
  });
  // Rebuild the pono grid (simpler than removing a single element while
  // preserving selection styling).
  const grid = document.getElementById('pono-grid');
  if (grid) {
    grid.textContent = '';
    PONO_VARIANTS.forEach(v => grid.appendChild(makePonoThumb(v)));
  }
  render();
  buildRightPane();
  toast('Pono画像を削除しました', 'ok');
}

function removeUserFrameImage(id) {
  const idx = FRAME_IMAGES.findIndex(f => f.id === id);
  if (idx < 0) return;
  if (!FRAME_IMAGES[idx].userAdded) return; // safety
  FRAME_IMAGES.splice(idx, 1);
  const idIdx = FRAME_IDS.indexOf(id);
  if (idIdx >= 0) FRAME_IDS.splice(idIdx, 1);
  delete FRAME_NATURAL_ASPECT[id];
  // Persist removal (a remove can never trip Quota; ignore result).
  try { saveDroppedAssets(); } catch (_) {}
  const fallback = DEFAULT_FRAME_ID;
  ['B', 'C', 'D'].forEach(vc => {
    if (!state[vc]) return;
    ['pono', 'hakase'].forEach(sk => {
      const sd = state[vc][sk];
      if (sd && sd.boxImage === id) {
        sd.boxImage = fallback;
      }
    });
    if (state[vc].singleBox && state[vc].singleBox.boxImage === id) {
      state[vc].singleBox.boxImage = fallback;
    }
    save(vc);
  });
  const grid = document.getElementById('frame-grid');
  if (grid) {
    grid.textContent = '';
    FRAME_IMAGES.forEach(f => grid.appendChild(makeFrameThumb(f)));
  }
  render();
  buildRightPane();
  toast('フレーム画像を削除しました', 'ok');
}

function handleDroppedFiles(target, fileList) {
  const files = Array.from(fileList || []);
  if (files.length === 0) return;
  const accepted = files.filter(f => DOM_FILE_LOOKS_LIKE_IMAGE(f));
  const rejected = files.length - accepted.length;
  if (accepted.length === 0) {
    toast('対応していないファイル形式です (PNG/WebP/JPEG/GIF)', 'err');
    return;
  }
  const adder = target === 'pono' ? addDroppedPonoFile : addDroppedFrameFile;
  Promise.all(accepted.map(f => adder(f).catch(err => {
    console.warn('drop add failed', err);
    return null;
  }))).then(results => {
    const ok = results.filter(Boolean).length;
    if (ok > 0) {
      const label = target === 'pono' ? 'Pono画像' : 'フレーム画像';
      const suffix = rejected > 0 ? `（${rejected}件は形式不一致でスキップ）` : '';
      toast(`${label}を ${ok} 件追加しました${suffix}`, 'ok');
    } else if (rejected > 0) {
      toast('対応していないファイル形式です', 'err');
    }
  });
}

function DOM_FILE_LOOKS_LIKE_IMAGE(file) {
  if (!file) return false;
  if (file.type && DROP_ACCEPT_TYPES.includes(file.type)) return true;
  // Some browsers may not set type for certain drops; fall back to extension sniff.
  const name = String(file.name || '').toLowerCase();
  return /\.(png|webp|jpe?g|gif)$/.test(name);
}

function bindDropZones() {
  const zones = [
    { el: document.getElementById('pono-section'),  target: 'pono' },
    { el: document.getElementById('frame-section'), target: 'frame' }
  ];
  // Block default drop behavior on the document so files aren't navigated to.
  ['dragenter', 'dragover', 'drop'].forEach(evt => {
    document.addEventListener(evt, (e) => {
      // Only swallow if it's a file drag; allow normal text/dom drag elsewhere.
      const dt = e.dataTransfer;
      if (dt && Array.from(dt.types || []).includes('Files')) {
        e.preventDefault();
      }
    });
  });
  zones.forEach(({ el, target }) => {
    if (!el) return;
    let depth = 0;
    el.addEventListener('dragenter', (e) => {
      const dt = e.dataTransfer;
      if (!dt || !Array.from(dt.types || []).includes('Files')) return;
      e.preventDefault();
      depth++;
      el.classList.add('is-drop-target');
    });
    el.addEventListener('dragover', (e) => {
      const dt = e.dataTransfer;
      if (!dt || !Array.from(dt.types || []).includes('Files')) return;
      e.preventDefault();
      try { dt.dropEffect = 'copy'; } catch (_) {}
    });
    el.addEventListener('dragleave', (e) => {
      const dt = e.dataTransfer;
      if (!dt || !Array.from(dt.types || []).includes('Files')) return;
      depth = Math.max(0, depth - 1);
      if (depth === 0) el.classList.remove('is-drop-target');
    });
    el.addEventListener('drop', (e) => {
      const dt = e.dataTransfer;
      if (!dt) return;
      e.preventDefault();
      depth = 0;
      el.classList.remove('is-drop-target');
      handleDroppedFiles(target, dt.files);
    });
  });
}
// === end Drag & Drop ===================================================

function aspectFromSlot(s) {
  if (s.slotAspect === 'free') return null;
  if (s.slotAspect === 'fixed_0.75') return 0.75;
  if (s.slotAspect === 'fixed_1.0') return 1.0;
  if (s.slotAspect === 'fixed_1.23') return 1.23;
  return null;
}

function ponoPathByName(name) {
  const v = PONO_VARIANTS.find(x => x.name === name);
  return v ? v.path : PONO_VARIANTS[0].path;
}
function framePathById(id) {
  const f = FRAME_IMAGES.find(x => x.id === id);
  return f ? f.path : FRAME_IMAGES[0].path;
}

// 機能 1: テキスト整列マッピング
function mapTextAlignH(h) {
  if (h === 'left') return 'flex-start';
  if (h === 'right') return 'flex-end';
  return 'center';
}
function mapTextAlignV(v) {
  if (v === 'top') return 'flex-start';
  if (v === 'bottom') return 'flex-end';
  return 'center';
}

// 機能 2: ラベルの 4 隅 anchor + inside/outside + offset から
// position プロパティ (top/bottom/left/right) を計算する。
// 反対側のプロパティは '' でクリアして前回値の残留を防ぐ。
function labelPositionStyle(anchor, inside, offX, offY) {
  const insideMargin = 16;
  const outsideMargin = -22;
  const margin = inside ? insideMargin : outsideMargin;
  const ox = Number(offX) || 0;
  const oy = Number(offY) || 0;
  const out = { top: '', bottom: '', left: '', right: '' };
  if (anchor === 'tl') {
    out.top = (margin + oy) + 'px';
    out.left = (insideMargin + ox) + 'px';
  } else if (anchor === 'tr') {
    out.top = (margin + oy) + 'px';
    out.right = (insideMargin - ox) + 'px';
  } else if (anchor === 'bl') {
    out.bottom = (margin - oy) + 'px';
    out.left = (insideMargin + ox) + 'px';
  } else { // 'br'
    out.bottom = (margin - oy) + 'px';
    out.right = (insideMargin - ox) + 'px';
  }
  return out;
}

function applyLabelPosition(labelEl, anchor, inside, offX, offY) {
  if (!labelEl) return;
  const p = labelPositionStyle(anchor, inside, offX, offY);
  labelEl.style.top = p.top;
  labelEl.style.bottom = p.bottom;
  labelEl.style.left = p.left;
  labelEl.style.right = p.right;
}

function applySideToDom(sideKey) {
  const s = state[currentVC][sideKey];
  const slot = document.getElementById('slot-' + sideKey);
  const img = document.getElementById('img-' + sideKey);
  const box = document.getElementById('box-' + sideKey);
  const txt = document.getElementById('text-' + sideKey);
  const lbl = document.getElementById('label-' + sideKey);

  slot.style.width = s.slotW + 'px';
  slot.style.height = s.slotH + 'px';
  const ar = aspectFromSlot(s);
  slot.style.aspectRatio = ar ? String(ar) : '';
  slot.style.transform = `translate(calc(-50% + ${s.slotOffsetX}px), calc(-50% + ${s.slotOffsetY}px))`;
  img.style.objectPosition = `${s.objectPosition === 'top' ? 'top' : s.objectPosition === 'center' ? 'center' : 'bottom'} center`;

  if (sideKey === 'pono') {
    img.src = ponoPathByName(s.variant);
  }

  box.style.width = s.boxW + 'px';
  box.style.height = s.boxH + 'px';
  box.style.transform = `translate(calc(-50% + ${s.boxX}px), calc(-50% + ${s.boxY}px))`;
  box.style.padding = s.boxPadding + 'px';
  // 機能 1: テキスト整列 (flex)
  box.style.display = 'flex';
  box.style.alignItems = mapTextAlignV(s.textAlignV);
  box.style.justifyContent = mapTextAlignH(s.textAlignH);
  if (s.boxMode === 'image') {
    box.classList.remove('mode-css');
    box.style.backgroundImage = `url('${framePathById(s.boxImage)}')`;
    box.style.backgroundColor = '';
    box.style.borderRadius = '';
  } else {
    box.classList.add('mode-css');
    box.style.backgroundImage = 'none';
    box.style.backgroundColor = s.boxColor;
    box.style.borderRadius = s.boxRadius + 'px';
  }
  txt.textContent = s.sampleText;
  // 機能 1: 複数行時の各行整列
  txt.style.textAlign = s.textAlignH || 'center';
  if (typeof s.fontSize === 'number' && Number.isFinite(s.fontSize) && s.fontSize > 0) {
    txt.style.fontSize = s.fontSize + 'px';
  } else {
    txt.style.fontSize = '';
  }
  // 機能 2: ラベル位置 + 表示テキスト
  if (lbl) {
    lbl.textContent = sideKey === 'pono' ? 'ポノ' : 'はかせ';
    applyLabelPosition(lbl, s.labelAnchor, s.labelInside, s.labelOffsetX, s.labelOffsetY);
  }
}

function applySingleBoxToDom() {
  const sb = state[currentVC] && state[currentVC].singleBox;
  const box = document.getElementById('box-single');
  const txt = document.getElementById('text-single');
  const lbl = document.getElementById('label-single');
  if (!sb || !box || !txt) return;
  box.style.width = sb.boxW + 'px';
  box.style.height = sb.boxH + 'px';
  box.style.top = sb.boxY + 'px';
  box.style.padding = sb.boxPadding + 'px';
  // 機能 1: テキスト整列 (flex)
  box.style.display = 'flex';
  box.style.alignItems = mapTextAlignV(sb.textAlignV);
  box.style.justifyContent = mapTextAlignH(sb.textAlignH);
  if (sb.boxMode === 'image') {
    box.classList.remove('mode-css');
    box.style.backgroundImage = `url('${framePathById(sb.boxImage)}')`;
    box.style.backgroundColor = '';
    box.style.borderRadius = '';
  } else {
    box.classList.add('mode-css');
    box.style.backgroundImage = 'none';
    box.style.backgroundColor = sb.boxColor;
    box.style.borderRadius = sb.boxRadius + 'px';
  }
  // Pull sample text from the chosen speaker source.
  const srcSide = sb.speakerSrc === 'hakase' ? 'hakase' : 'pono';
  const srcText = (state[currentVC][srcSide] && state[currentVC][srcSide].sampleText) || '';
  txt.textContent = srcText;
  // 機能 1: 複数行時の各行整列
  txt.style.textAlign = sb.textAlignH || 'center';
  if (typeof sb.fontSize === 'number' && Number.isFinite(sb.fontSize) && sb.fontSize > 0) {
    txt.style.fontSize = sb.fontSize + 'px';
  } else {
    txt.style.fontSize = '';
  }
  // 機能 2: ラベル位置 + 表示テキスト (speakerSrc に応じて切替)
  if (lbl) {
    lbl.textContent = srcSide === 'hakase' ? 'はかせ' : 'ポノ';
    applyLabelPosition(lbl, sb.labelAnchor, sb.labelInside, sb.labelOffsetX, sb.labelOffsetY);
  }
}

function renderHeightGuides() {
  const guides = document.getElementById('height-guides');
  if (!guides) return;
  guides.classList.toggle('is-on', !!showHeightGuides);
  guides.textContent = '';
  if (!showHeightGuides) return;
  const stage = document.getElementById('stage');
  if (!stage) return;
  const stageRect = stage.getBoundingClientRect();
  // Note: rect dims are post-CSS-scale; convert by inverse of scale.
  const wrap = document.getElementById('stage-wrap');
  const m = wrap && wrap.style.transform ? /scale\(([0-9.]+)\)/.exec(wrap.style.transform) : null;
  const sc = m ? Number(m[1]) : 1;
  const inv = sc > 0 ? 1 / sc : 1;

  function buildLine(klass, topPx, labelText) {
    const line = document.createElement('div');
    line.className = 'hg-line ' + klass;
    line.style.top = topPx + 'px';
    const lbl = document.createElement('span');
    lbl.className = 'hg-label';
    lbl.textContent = labelText;
    line.appendChild(lbl);
    guides.appendChild(line);
  }

  ['pono', 'hakase'].forEach(sideKey => {
    const slot = document.getElementById('slot-' + sideKey);
    if (!slot) return;
    const r = slot.getBoundingClientRect();
    const topY = (r.top - stageRect.top) * inv;
    const botY = (r.bottom - stageRect.top) * inv;
    const tag = sideKey === 'pono' ? 'P' : 'H';
    const cls = sideKey === 'pono' ? 'hg-pono' : 'hg-hakase';
    buildLine(cls + ' hg-top', Math.round(topY), tag + ' 上 (y=' + Math.round(topY) + ')');
    buildLine(cls + ' hg-bot', Math.round(botY), tag + ' 下 (y=' + Math.round(botY) + ')');
  });
}

function renderBoxGuides() {
  const guides = document.getElementById('box-guides');
  if (!guides) return;
  guides.classList.toggle('is-on', !!showBoxGuides);
  guides.textContent = '';
  if (!showBoxGuides) return;
  const stage = document.getElementById('stage');
  if (!stage) return;
  const stageRect = stage.getBoundingClientRect();
  const wrap = document.getElementById('stage-wrap');
  const m = wrap && wrap.style.transform ? /scale\(([0-9.]+)\)/.exec(wrap.style.transform) : null;
  const sc = m ? Number(m[1]) : 1;
  const inv = sc > 0 ? 1 / sc : 1;

  function buildLine(klass, topPx, labelText) {
    const line = document.createElement('div');
    line.className = 'bg-line ' + klass;
    line.style.top = topPx + 'px';
    const lbl = document.createElement('span');
    lbl.className = 'bg-label';
    lbl.textContent = labelText;
    line.appendChild(lbl);
    guides.appendChild(line);
  }

  if (singleBoxMode) {
    // 機能 5: only the Single Box top/bottom, neutral white dashed.
    const box = document.getElementById('box-single');
    if (!box) return;
    const r = box.getBoundingClientRect();
    const topY = (r.top - stageRect.top) * inv;
    const botY = (r.bottom - stageRect.top) * inv;
    buildLine('bg-single bg-top', Math.round(topY), 'Single Box 上 (y=' + Math.round(topY) + ')');
    buildLine('bg-single bg-bot', Math.round(botY), 'Single Box 下 (y=' + Math.round(botY) + ')');
    return;
  }

  ['pono', 'hakase'].forEach(sideKey => {
    const box = document.getElementById('box-' + sideKey);
    if (!box) return;
    const r = box.getBoundingClientRect();
    const topY = (r.top - stageRect.top) * inv;
    const botY = (r.bottom - stageRect.top) * inv;
    const tag = sideKey === 'pono' ? 'P' : 'H';
    const cls = sideKey === 'pono' ? 'bg-pono' : 'bg-hakase';
    buildLine(cls + ' bg-top', Math.round(topY), tag + ' Box 上 (y=' + Math.round(topY) + ')');
    buildLine(cls + ' bg-bot', Math.round(botY), tag + ' Box 下 (y=' + Math.round(botY) + ')');
  });
}

function render() {
  const stage = document.getElementById('stage');
  stage.dataset.vc = currentVC;
  stage.dataset.singleBox = singleBoxMode ? 'on' : 'off';
  applySideToDom('pono');
  applySideToDom('hakase');
  applySingleBoxToDom();

  const sp = state[currentVC].speaker;
  document.getElementById('side-pono').classList.toggle('is-speaking', sp === 'pono');
  document.getElementById('side-hakase').classList.toggle('is-speaking', sp === 'hakase');

function rescaleStage() {
  const wrap = document.getElementById('stage-wrap');
  const center = document.getElementById('center');
  const [w, h] = VP_DIMS[currentVC];
  const padding = 40;
  const availW = Math.max(100, center.clientWidth - padding);
  const availH = Math.max(100, center.clientHeight - padding);
  const scale = Math.min(availW / w, availH / h, 1);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = w + 'px';
  wrap.style.height = h + 'px';
  const info = document.getElementById('scale-info');
  if (info) {
    info.textContent = (scale * 100).toFixed(0) + '% (実寸 ' + w + '×' + h + ')';
  }
}

// without rebuilding the whole pane. key is e.g. 'boxW' / 'boxH' / 'slotW' etc.

}

// Single-box analog (key: 'boxW' / 'boxH' / 'boxY' / 'boxPadding' / 'fontSize' / etc.).

function makeRange(label, min, max, step, key, sideKey) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  const lab = document.createElement('label');
  lab.textContent = label;
  const range = document.createElement('input');
  range.type = 'range';
  range.min = min; range.max = max; range.step = step;
  const num = document.createElement('input');
  num.type = 'number';
  num.min = min; num.max = max; num.step = step;
  const cur = state[currentVC][sideKey][key];
  range.value = cur;
  num.value = cur;
  // Register UI-sync so external mutations (e.g. aspect-lock companion) can refresh display
  _rangeSyncMap[sideKey][key] = () => {
    const v = state[currentVC][sideKey][key];
    if (document.activeElement !== range) range.value = v;
    if (document.activeElement !== num) num.value = v;
  };
  const apply = (v) => {
    let n = Number(v);
    if (!Number.isFinite(n)) return;
    n = Math.min(Math.max(n, Number(min)), Number(max));
    state[currentVC][sideKey][key] = n;
    if (document.activeElement !== range) range.value = n;
    if (document.activeElement !== num) num.value = n;
    // Aspect-lock coupling for box dims
    if (key === 'boxW' || key === 'boxH') {
      maybeApplyAspectLockOnBoxChange(sideKey, key);
    }
    save(currentVC);
    applySideToDom(sideKey);
    // Mirror propagation (functions 3/4)
    propagateMirror(sideKey, key);
    if (showHeightGuides) renderHeightGuides();
    if (showBoxGuides) renderBoxGuides();
  };
  range.addEventListener('input', () => apply(range.value));
  num.addEventListener('input', () => apply(num.value));
  num.addEventListener('change', () => {
    let n = Number(num.value);
    if (!Number.isFinite(n)) n = state[currentVC][sideKey][key];
    n = Math.min(Math.max(n, Number(min)), Number(max));
    state[currentVC][sideKey][key] = n;
    num.value = n;
    range.value = n;
    if (key === 'boxW' || key === 'boxH') {
      maybeApplyAspectLockOnBoxChange(sideKey, key);
    }
    save(currentVC);
    applySideToDom(sideKey);
    propagateMirror(sideKey, key);
    if (showHeightGuides) renderHeightGuides();
    if (showBoxGuides) renderBoxGuides();
  });
  row.appendChild(lab);
  row.appendChild(range);
  row.appendChild(num);
  return row;
}

// boxW / boxH constants used for clipping companion updates (must mirror the makeRange args
// in buildRightPane below).
const BOX_W_MIN = 200, BOX_W_MAX = 2000;
const BOX_H_MIN = 80,  BOX_H_MAX = 800;

// Single Box uses wider slider ranges (per-VC: boxW up to 2560, boxH up to 1200)
// so its aspect-lock companion clamp must NOT reuse the per-side BOX_*_MAX above.
// Fix HIGH A-5: clamping with the per-side max would clip e.g. boxW=2400 down to 2000.
const SB_BOX_W_MIN = 200, SB_BOX_W_MAX = 2560;
const SB_BOX_H_MIN = 80,  SB_BOX_H_MAX = 1200;

function maybeApplyAspectLockOnBoxChange(sideKey, changedKey) {
  const s = state[currentVC][sideKey];
  if (!s.aspectLock) return;
  let ratio = getEffectiveAspectRatio(s);
  // Bug-fix fallback: ratio may be 0 if the lock was just turned ON before the
  // frame's natural aspect finished loading (or before a fresh init). Recompute
  // a reasonable ratio so the *first* boxW/boxH change after lock-on links them.
  if (!ratio || ratio <= 0) {
    if (s.boxMode === 'image' && FRAME_NATURAL_ASPECT[s.boxImage] && FRAME_NATURAL_ASPECT[s.boxImage] > 0) {
      ratio = FRAME_NATURAL_ASPECT[s.boxImage];
    } else if (s.boxH > 0 && s.boxW > 0) {
      ratio = s.boxW / s.boxH;
    }
    if (ratio && ratio > 0) {
      s.aspectLockRatio = ratio;
    } else {
      return;
    }
  }
  if (changedKey === 'boxW') {
    let h = Math.round(s.boxW / ratio);
    h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
    if (h !== s.boxH) {
      s.boxH = h;
      syncRangeUi(sideKey, 'boxH');
    }
  } else if (changedKey === 'boxH') {
    let w = Math.round(s.boxH * ratio);
    w = Math.min(Math.max(w, BOX_W_MIN), BOX_W_MAX);
    if (w !== s.boxW) {
      s.boxW = w;
      syncRangeUi(sideKey, 'boxW');
    }
  }
}

// Single Box aspect-lock companion. Mirrors maybeApplyAspectLockOnBoxChange but
// targets state[currentVC].singleBox. Includes the same defensive ratio fallback
// so the very first change after lock-on links boxW/boxH.
function maybeApplySingleBoxAspectLockOnBoxChange(changedKey) {
  const sb = state[currentVC] && state[currentVC].singleBox;
  if (!sb || !sb.aspectLock) return;
  let ratio = (sb.boxMode === 'image')
    ? (FRAME_NATURAL_ASPECT[sb.boxImage] && FRAME_NATURAL_ASPECT[sb.boxImage] > 0
        ? FRAME_NATURAL_ASPECT[sb.boxImage]
        : (sb.aspectLockRatio && sb.aspectLockRatio > 0 ? sb.aspectLockRatio : 0))
    : (sb.aspectLockRatio && sb.aspectLockRatio > 0 ? sb.aspectLockRatio : 0);
  if (!ratio || ratio <= 0) {
    // Defensive fallback (mirrors per-side fix above): if lock was just ON-ed
    // and ratio is still 0, recompute from current dims.
    if (sb.boxH > 0 && sb.boxW > 0) {
      ratio = sb.boxW / sb.boxH;
      sb.aspectLockRatio = ratio;
    } else {
      return;
    }
  }
  if (changedKey === 'boxW') {
    let h = Math.round(sb.boxW / ratio);
    h = Math.min(Math.max(h, SB_BOX_H_MIN), SB_BOX_H_MAX);
    if (h !== sb.boxH) {
      sb.boxH = h;
      syncSingleBoxRangeUi('boxH');
    }
  } else if (changedKey === 'boxH') {
    let w = Math.round(sb.boxH * ratio);
    w = Math.min(Math.max(w, SB_BOX_W_MIN), SB_BOX_W_MAX);
    if (w !== sb.boxW) {
      sb.boxW = w;
      syncSingleBoxRangeUi('boxW');
    }
  }
}

// When the frame image (image-mode) changes while aspectLock is ON, update lock ratio
// to the new image's natural aspect and re-derive boxH from current boxW.
function reapplyAspectLockAfterFrameChange(sideKey) {
  const s = state[currentVC][sideKey];
  if (!s.aspectLock) return;
  if (s.boxMode !== 'image') return;
  const ratio = FRAME_NATURAL_ASPECT[s.boxImage];
  if (!ratio || ratio <= 0) return; // will pick up later via onFrameAspectLoaded
  s.aspectLockRatio = ratio;
  let h = Math.round(s.boxW / ratio);
  h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
  s.boxH = h;
}

// Called from preloadFrameAspects when an image's natural aspect is finally known.
function onFrameAspectLoaded(frameId) {
  ['pono', 'hakase'].forEach(sideKey => {
    ['B', 'C', 'D'].forEach(vc => {
      const s = state[vc] && state[vc][sideKey];
      if (!s) return;
      if (!s.aspectLock) return;
      if (s.boxMode !== 'image') return;
      if (s.boxImage !== frameId) return;
      const ratio = FRAME_NATURAL_ASPECT[frameId];
      if (!ratio || ratio <= 0) return;
      s.aspectLockRatio = ratio;
      // recompute boxH from boxW
      let h = Math.round(s.boxW / ratio);
      h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
      s.boxH = h;
      save(vc);
      if (vc === currentVC) {
        syncRangeUi(sideKey, 'boxH');
        applySideToDom(sideKey);
      }
    });
  });
  // Fix B-2: also reconcile Single Box (機能 5) aspect-lock once the natural
  // aspect of its boxImage finishes loading. Mirrors the per-side branch above.
  ['B', 'C', 'D'].forEach(vc => {
    const sb = state[vc] && state[vc].singleBox;
    if (!sb) return;
    if (!sb.aspectLock) return;
    if (sb.boxMode !== 'image') return;
    if (sb.boxImage !== frameId) return;
    const ratio = FRAME_NATURAL_ASPECT[frameId];
    if (!ratio || ratio <= 0) return;
    sb.aspectLockRatio = ratio;
    let h = Math.round(sb.boxW / ratio);
    h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
    sb.boxH = h;
    save(vc);
    if (vc === currentVC && singleBoxMode) {
      // Rebuild the right pane so the Single Box boxH range/number inputs
      // pick up the new value (no per-key sync map for singleBox today).
      buildRightPane();
      applySingleBoxToDom();
    }
  });
}

let _radioUid = 0;
function makeRadio(label, key, sideKey, options, opts) {
  const rebuild = !!(opts && opts.rebuild);

  options.forEach(opt => {
    // dataset values are coerced to string by the DOM; for non-string opt.value
    // (e.g. boolean for labelInside) we keep the JS value separate and compare
    // via String() in dataset-driven UI updates.
    const valStr = String(opt.value);
    const lbl = document.createElement('label');
    lbl.dataset.val = valStr;
    if (state[currentVC][sideKey][key] === opt.value) lbl.classList.add('checked');
    const inp = document.createElement('input');
    inp.type = 'radio';
    inp.name = groupName;
    inp.value = valStr;
    const inputId = groupName + '-' + valStr;
    inp.id = inputId;
    lbl.htmlFor = inputId;
    if (state[currentVC][sideKey][key] === opt.value) inp.checked = true;
    const txt = document.createTextNode(opt.text);
    lbl.appendChild(inp);
    lbl.appendChild(txt);
    inp.addEventListener('change', () => {
      if (!inp.checked) return;
      state[currentVC][sideKey][key] = opt.value;
      // Side-effect: when boxMode flips, refresh the aspect-lock ratio source.
      if (key === 'boxMode') {
        const ss = state[currentVC][sideKey];
        if (ss.aspectLock) {
          if (opt.value === 'image') {
            const a = FRAME_NATURAL_ASPECT[ss.boxImage];
            if (a && a > 0) {
              ss.aspectLockRatio = a;
              let h = Math.round(ss.boxW / a);
              h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
              ss.boxH = h;
            }
          } else {
            // switched to CSS: snapshot current ratio
            if (ss.boxH > 0) ss.aspectLockRatio = ss.boxW / ss.boxH;
          }
        }
      }
      save(currentVC);
      // Update checked styling among siblings without rebuilding
      rr.querySelectorAll('label').forEach(l => {
        l.classList.toggle('checked', l.dataset.val === valStr);

      if (rebuild) {
        buildRightPane();
      } else {
        applySideToDom(sideKey);
      }
      // Mirror propagation after applying / rebuilding.
      propagateMirror(sideKey, key);
      if (showBoxGuides) renderBoxGuides();
    });
    rr.appendChild(lbl);
  });
  row.appendChild(lab);
  row.appendChild(rr);
  return row;
}

          // image not loaded yet — keep current H for now; onFrameAspectLoaded will fix it.
          if (ss.boxH > 0) ss.aspectLockRatio = ss.boxW / ss.boxH;

        // CSS mode: snapshot current boxW/boxH ratio.
        if (ss.boxH > 0) ss.aspectLockRatio = ss.boxW / ss.boxH;

    propagateMirror(sideKey, 'aspectLock');
    propagateMirror(sideKey, 'aspectLockRatio');
    propagateMirror(sideKey, 'boxH');
    propagateMirror(sideKey, 'boxW');
  });
  wrap.appendChild(cb);

    const sb = state[currentVC].singleBox;
    sb.boxImage = sel.value;
    if (sb.aspectLock && sb.boxMode === 'image') {
      const a = FRAME_NATURAL_ASPECT[sb.boxImage];
      if (a && a > 0) {
        sb.aspectLockRatio = a;
        let h = Math.round(sb.boxW / a);
        h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
        sb.boxH = h;
      }
    }
    save(currentVC);
    applySingleBoxToDom();
    if (showBoxGuides) renderBoxGuides();
  });
  row.appendChild(lab);
  row.appendChild(sel);
  return row;
}

function makeSingleBoxAspectLockRow() {
  const sb = state[currentVC].singleBox;
  const wrap = document.createElement('label');
  wrap.className = 'lock-row';
  if (sb.aspectLock) wrap.classList.add('is-on');
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = !!sb.aspectLock;
  const txt = document.createElement('span');
  txt.className = 'lock-text';
  txt.textContent = '🔒 縦横比をロック';
  cb.addEventListener('change', () => {
    const ss = state[currentVC].singleBox;
    ss.aspectLock = !!cb.checked;
    if (ss.aspectLock) {
      if (ss.boxMode === 'image') {
        const a = FRAME_NATURAL_ASPECT[ss.boxImage];
        if (a && a > 0) {
          ss.aspectLockRatio = a;
          let h = Math.round(ss.boxW / a);
          h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
          ss.boxH = h;
        } else {
          if (ss.boxH > 0) ss.aspectLockRatio = ss.boxW / ss.boxH;
        }
      } else {
        if (ss.boxH > 0) ss.aspectLockRatio = ss.boxW / ss.boxH;
      }
      wrap.classList.add('is-on');
    } else {
      wrap.classList.remove('is-on');
    }
    save(currentVC);
    applySingleBoxToDom();
    // No clean ranger sync here — user can adjust manually. For simplicity, rebuild.
    buildRightPane();
  });
  wrap.appendChild(cb);
  wrap.appendChild(txt);
  return wrap;
}
