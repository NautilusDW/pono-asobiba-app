function makeRange(label, min, max, step, key, sideKey) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  const lab = document.createElement('label');
  lab.textContent = label;
  const range = document.createElement('input');
  range.type = 'range';
  range.min = min; range.max = max; range.step = step;
  const num = document.createElement('input');
  num.type = 'number';
  num.min = min; num.max = max; num.step = step;
  const cur = state[currentVC][sideKey][key];
  range.value = cur;
  num.value = cur;
  // Register UI-sync so external mutations (e.g. aspect-lock companion) can refresh display
  _rangeSyncMap[sideKey][key] = () => {
    const v = state[currentVC][sideKey][key];
    if (document.activeElement !== range) range.value = v;
    if (document.activeElement !== num) num.value = v;
  };
  const apply = (v) => {
    let n = Number(v);
    if (!Number.isFinite(n)) return;
    n = Math.min(Math.max(n, Number(min)), Number(max));
    // Undo: 同じ description で 500ms 以内なら debounce されるためスライダ
    // ドラッグ中に大量 push されない。
    pushUndoSnapshot('スライダ変更');
    state[currentVC][sideKey][key] = n;
    // Pono variant 別 slot 保持: flat 書き込み後 perVariant[currentVariant] にも反映。
    if (sideKey === 'pono') syncVariantFromFlat(state[currentVC].pono, key);
    if (document.activeElement !== range) range.value = n;
    if (document.activeElement !== num) num.value = n;
    // Aspect-lock coupling for box dims
    if (key === 'boxW' || key === 'boxH') {
      maybeApplyAspectLockOnBoxChange(sideKey, key);
    }
    save(currentVC);
    applySideToDom(sideKey);
    // Mirror propagation (functions 3/4)
    propagateMirror(sideKey, key);
    if (showHeightGuides) renderHeightGuides();
    if (showBoxGuides) renderBoxGuides();
  };
  range.addEventListener('input', () => apply(range.value));
  num.addEventListener('input', () => apply(num.value));
  num.addEventListener('change', () => {
    let n = Number(num.value);
    if (!Number.isFinite(n)) n = state[currentVC][sideKey][key];
    n = Math.min(Math.max(n, Number(min)), Number(max));
    pushUndoSnapshot('スライダ変更');
    state[currentVC][sideKey][key] = n;
    if (sideKey === 'pono') syncVariantFromFlat(state[currentVC].pono, key);
    num.value = n;
    range.value = n;
    if (key === 'boxW' || key === 'boxH') {
      maybeApplyAspectLockOnBoxChange(sideKey, key);
    }
    save(currentVC);
    applySideToDom(sideKey);
    propagateMirror(sideKey, key);
    if (showHeightGuides) renderHeightGuides();
    if (showBoxGuides) renderBoxGuides();
  });
  row.appendChild(lab);
  row.appendChild(range);
  row.appendChild(num);
  return row;
}

// boxW / boxH constants used for clipping companion updates (must mirror the makeRange args
// in buildRightPane below).
const BOX_W_MIN = 200, BOX_W_MAX = 2000;
const BOX_H_MIN = 80,  BOX_H_MAX = 800;

// Single Box uses wider slider ranges (per-VC: boxW up to 2560, boxH up to 1200)
// so its aspect-lock companion clamp must NOT reuse the per-side BOX_*_MAX above.
// Fix HIGH A-5: clamping with the per-side max would clip e.g. boxW=2400 down to 2000.
const SB_BOX_W_MIN = 200, SB_BOX_W_MAX = 2560;
const SB_BOX_H_MIN = 80,  SB_BOX_H_MAX = 1200;

function maybeApplyAspectLockOnBoxChange(sideKey, changedKey) {
  const s = state[currentVC][sideKey];
  if (!s.aspectLock) return;
  let ratio = getEffectiveAspectRatio(s);
  // Bug-fix fallback: ratio may be 0 if the lock was just turned ON before the
  // frame's natural aspect finished loading (or before a fresh init). Recompute
  // a reasonable ratio so the *first* boxW/boxH change after lock-on links them.
  if (!ratio || ratio <= 0) {
    if (s.boxMode === 'image' && FRAME_NATURAL_ASPECT[s.boxImage] && FRAME_NATURAL_ASPECT[s.boxImage] > 0) {
      ratio = FRAME_NATURAL_ASPECT[s.boxImage];
    } else if (s.boxH > 0 && s.boxW > 0) {
      ratio = s.boxW / s.boxH;
    }
    if (ratio && ratio > 0) {
      s.aspectLockRatio = ratio;
    } else {
      return;
    }
  }
  if (changedKey === 'boxW') {
    let h = Math.round(s.boxW / ratio);
    h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
    if (h !== s.boxH) {
      s.boxH = h;
      syncRangeUi(sideKey, 'boxH');
    }
  } else if (changedKey === 'boxH') {
    let w = Math.round(s.boxH * ratio);
    w = Math.min(Math.max(w, BOX_W_MIN), BOX_W_MAX);
    if (w !== s.boxW) {
      s.boxW = w;
      syncRangeUi(sideKey, 'boxW');
    }
  }
}

// Single Box aspect-lock companion. Mirrors maybeApplyAspectLockOnBoxChange but
// targets state[currentVC].singleBox. Includes the same defensive ratio fallback
// so the very first change after lock-on links boxW/boxH.
function maybeApplySingleBoxAspectLockOnBoxChange(changedKey) {
  const sb = state[currentVC] && state[currentVC].singleBox;
  if (!sb || !sb.aspectLock) return;
  let ratio = (sb.boxMode === 'image')
    ? (FRAME_NATURAL_ASPECT[sb.boxImage] && FRAME_NATURAL_ASPECT[sb.boxImage] > 0
        ? FRAME_NATURAL_ASPECT[sb.boxImage]
        : (sb.aspectLockRatio && sb.aspectLockRatio > 0 ? sb.aspectLockRatio : 0))
    : (sb.aspectLockRatio && sb.aspectLockRatio > 0 ? sb.aspectLockRatio : 0);
  if (!ratio || ratio <= 0) {
    // Defensive fallback (mirrors per-side fix above): if lock was just ON-ed
    // and ratio is still 0, recompute from current dims.
    if (sb.boxH > 0 && sb.boxW > 0) {
      ratio = sb.boxW / sb.boxH;
      sb.aspectLockRatio = ratio;
    } else {
      return;
    }
  }
  if (changedKey === 'boxW') {
    let h = Math.round(sb.boxW / ratio);
    h = Math.min(Math.max(h, SB_BOX_H_MIN), SB_BOX_H_MAX);
    if (h !== sb.boxH) {
      sb.boxH = h;
      syncSingleBoxRangeUi('boxH');
    }
  } else if (changedKey === 'boxH') {
    let w = Math.round(sb.boxH * ratio);
    w = Math.min(Math.max(w, SB_BOX_W_MIN), SB_BOX_W_MAX);
    if (w !== sb.boxW) {
      sb.boxW = w;
      syncSingleBoxRangeUi('boxW');
    }
  }
}

// Narration (Panel 1) aspect-lock companion. Only meaningful in image-mode:
// links state[currentVC].narration.width <-> .height to the chosen frame's
// natural aspect. heightAuto is force-cleared when aspect-lock is ON so the
// derived height value actually applies.
const NARR_W_MIN = 200, NARR_W_MAX = 2560;
const NARR_H_MIN = 40,  NARR_H_MAX = 800;
function maybeApplyNarrAspectLockOnSizeChange(changedKey) {
  const nr = state[currentVC] && state[currentVC].narration;
  if (!nr || !nr.aspectLock) return;
  // Only image-mode is meaningful for narration aspect-lock (CSS-mode height
  // is typically auto'd anyway). Bail otherwise.
  if (nr.bgMode !== 'image') return;
  let ratio = FRAME_NATURAL_ASPECT[nr.bgImage];
  if (!ratio || ratio <= 0) {
    if (nr.aspectLockRatio && nr.aspectLockRatio > 0) {
      ratio = nr.aspectLockRatio;
    } else if (nr.height > 0 && nr.width > 0) {
      ratio = nr.width / nr.height;
      nr.aspectLockRatio = ratio;
    } else {
      return;
    }
  }
  if (changedKey === 'width') {
    let h = Math.round(nr.width / ratio);
    h = Math.min(Math.max(h, NARR_H_MIN), NARR_H_MAX);
    if (h !== nr.height) {
      nr.height = h;
      syncNarrRangeUi('height');
    }
  } else if (changedKey === 'height') {
    let w = Math.round(nr.height * ratio);
    w = Math.min(Math.max(w, NARR_W_MIN), NARR_W_MAX);
    if (w !== nr.width) {
      nr.width = w;
      syncNarrRangeUi('width');
    }
  }
}

// When the frame image (image-mode) changes while aspectLock is ON, update lock ratio
// to the new image's natural aspect and re-derive boxH from current boxW.
function reapplyAspectLockAfterFrameChange(sideKey) {
  const s = state[currentVC][sideKey];
  if (!s.aspectLock) return;
  if (s.boxMode !== 'image') return;
  const ratio = FRAME_NATURAL_ASPECT[s.boxImage];
  if (!ratio || ratio <= 0) return; // will pick up later via onFrameAspectLoaded
  s.aspectLockRatio = ratio;
  let h = Math.round(s.boxW / ratio);
  h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
  s.boxH = h;
}

// Called from preloadFrameAspects when an image's natural aspect is finally known.
function onFrameAspectLoaded(frameId) {
  ['pono', 'hakase'].forEach(sideKey => {
    ['B', 'C', 'D'].forEach(vc => {
      const s = state[vc] && state[vc][sideKey];
      if (!s) return;
      if (!s.aspectLock) return;
      if (s.boxMode !== 'image') return;
      if (s.boxImage !== frameId) return;
      const ratio = FRAME_NATURAL_ASPECT[frameId];
      if (!ratio || ratio <= 0) return;
      s.aspectLockRatio = ratio;
      // recompute boxH from boxW
      let h = Math.round(s.boxW / ratio);
      h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
      s.boxH = h;
      save(vc);
      if (vc === currentVC) {
        syncRangeUi(sideKey, 'boxH');
        applySideToDom(sideKey);
      }
    });
  });
  // Fix B-2: also reconcile Single Box (機能 5) aspect-lock once the natural
  // aspect of its boxImage finishes loading. Mirrors the per-side branch above.
  ['B', 'C', 'D'].forEach(vc => {
    const sb = state[vc] && state[vc].singleBox;
    if (!sb) return;
    if (!sb.aspectLock) return;
    if (sb.boxMode !== 'image') return;
    if (sb.boxImage !== frameId) return;
    const ratio = FRAME_NATURAL_ASPECT[frameId];
    if (!ratio || ratio <= 0) return;
    sb.aspectLockRatio = ratio;
    let h = Math.round(sb.boxW / ratio);
    h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
    sb.boxH = h;
    save(vc);
    if (vc === currentVC && singleBoxMode) {
      // Rebuild the right pane so the Single Box boxH range/number inputs
      // pick up the new value (no per-key sync map for singleBox today).
      buildRightPane();
      applySingleBoxToDom();
    }
  });
  // Narration (Panel 1) aspect-lock reconciliation. Same shape as the
  // singleBox branch above: when the locked frame's natural aspect finally
  // loads, recompute narration.height from current width.
  ['B', 'C', 'D'].forEach(vc => {
    const nr = state[vc] && state[vc].narration;
    if (!nr) return;
    if (!nr.aspectLock) return;
    if (nr.bgMode !== 'image') return;
    if (nr.bgImage !== frameId) return;
    const ratio = FRAME_NATURAL_ASPECT[frameId];
    if (!ratio || ratio <= 0) return;
    nr.aspectLockRatio = ratio;
    let h = Math.round(nr.width / ratio);
    h = Math.min(Math.max(h, NARR_H_MIN), NARR_H_MAX);
    nr.height = h;
    nr.heightAuto = false;
    save(vc);
    if (vc === currentVC && panelMode === 'narration') {
      buildRightPane();
      applyNarrationToDom();
    }
  });
}

let _radioUid = 0;
function makeRadio(label, key, sideKey, options, opts) {
  const rebuild = !!(opts && opts.rebuild);
  const row = document.createElement('div');
  row.className = 'prop-row';
  const lab = document.createElement('label');
  lab.textContent = label;
  const rr = document.createElement('div');
  rr.className = 'radio-row';
  const groupName = sideKey + '-' + key + '-' + (++_radioUid);
  options.forEach(opt => {
    // dataset values are coerced to string by the DOM; for non-string opt.value
    // (e.g. boolean for labelInside) we keep the JS value separate and compare
    // via String() in dataset-driven UI updates.
    const valStr = String(opt.value);
    const lbl = document.createElement('label');
    lbl.dataset.val = valStr;
    if (state[currentVC][sideKey][key] === opt.value) lbl.classList.add('checked');
    const inp = document.createElement('input');
    inp.type = 'radio';
    inp.name = groupName;
    inp.value = valStr;
    const inputId = groupName + '-' + valStr;
    inp.id = inputId;
    lbl.htmlFor = inputId;
    if (state[currentVC][sideKey][key] === opt.value) inp.checked = true;
    const txt = document.createTextNode(opt.text);
    lbl.appendChild(inp);
    lbl.appendChild(txt);
    inp.addEventListener('change', () => {
      if (!inp.checked) return;
      pushUndoSnapshot('ラジオ変更');
      state[currentVC][sideKey][key] = opt.value;
      // Pono variant 別 slot: slotAspect / objectPosition を perVariant にも反映。
      if (sideKey === 'pono') syncVariantFromFlat(state[currentVC].pono, key);
      // Side-effect: when boxMode flips, refresh the aspect-lock ratio source.
      if (key === 'boxMode') {
        const ss = state[currentVC][sideKey];
        if (ss.aspectLock) {
          if (opt.value === 'image') {
            const a = FRAME_NATURAL_ASPECT[ss.boxImage];
            if (a && a > 0) {
              ss.aspectLockRatio = a;
              let h = Math.round(ss.boxW / a);
              h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
              ss.boxH = h;
            }
          } else {
            // switched to CSS: snapshot current ratio
            if (ss.boxH > 0) ss.aspectLockRatio = ss.boxW / ss.boxH;
          }
        }
      }
      save(currentVC);
      // Update checked styling among siblings without rebuilding
      rr.querySelectorAll('label').forEach(l => {
        l.classList.toggle('checked', l.dataset.val === valStr);
      });
      if (rebuild) {
        buildRightPane();
      } else {
        applySideToDom(sideKey);
      }
      // Mirror propagation after applying / rebuilding.
      propagateMirror(sideKey, key);
      if (showBoxGuides) renderBoxGuides();
    });
    rr.appendChild(lbl);
  });
  row.appendChild(lab);
  row.appendChild(rr);
  return row;
}

function makeAspectLockRow(sideKey) {
  const s = state[currentVC][sideKey];

  const cb = document.createElement('input');
  cb.type = 'checkbox';

  const txt = document.createElement('span');
  txt.className = 'lock-text';
  txt.textContent = '🔒 縦横比をロック (フレーム画像に合わせる)';
  cb.addEventListener('change', () => {
    pushUndoSnapshot('縦横比ロック切替');
    const ss = state[currentVC][sideKey];
    ss.aspectLock = !!cb.checked;
    if (ss.aspectLock) {
      // Snapshot the lock ratio source.
      if (ss.boxMode === 'image') {
        const a = FRAME_NATURAL_ASPECT[ss.boxImage];
        if (a && a > 0) {
          ss.aspectLockRatio = a;
          // Re-derive boxH from current boxW so DOM matches lock immediately.
          let h = Math.round(ss.boxW / a);
          h = Math.min(Math.max(h, BOX_H_MIN), BOX_H_MAX);
          ss.boxH = h;
        } else {
          // image not loaded yet — keep current H for now; onFrameAspectLoaded will fix it.
          if (ss.boxH > 0) ss.aspectLockRatio = ss.boxW / ss.boxH;
        }
      } else {
        // CSS mode: snapshot current boxW/boxH ratio.
        if (ss.boxH > 0) ss.aspectLockRatio = ss.boxW / ss.boxH;
      }
      wrap.classList.add('is-on');
    } else {
      wrap.classList.remove('is-on');
    }
    save(currentVC);
    syncRangeUi(sideKey, 'boxH');
    syncRangeUi(sideKey, 'boxW');
    applySideToDom(sideKey);
    propagateMirror(sideKey, 'aspectLock');
    propagateMirror(sideKey, 'aspectLockRatio');
    propagateMirror(sideKey, 'boxH');
    propagateMirror(sideKey, 'boxW');
  });
  wrap.appendChild(cb);
  wrap.appendChild(txt);
  return wrap;
}

function makeNarrRange(label, min, max, step, key) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  const lab = document.createElement('label');
  lab.textContent = label;
  const range = document.createElement('input');
  range.type = 'range';
  range.min = min; range.max = max; range.step = step;
  const num = document.createElement('input');
  num.type = 'number';
  num.min = min; num.max = max; num.step = step;
  const cur = state[currentVC].narration[key];
  range.value = cur;
  num.value = cur;
  // Register UI-sync so narration aspect-lock can refresh sibling control.
  _narrRangeSyncMap[key] = () => {
    const v = state[currentVC].narration[key];
    if (document.activeElement !== range) range.value = v;
    if (document.activeElement !== num) num.value = v;
  };
  const apply = (v) => {
    let n = Number(v);
    if (!Number.isFinite(n)) return;
    n = Math.min(Math.max(n, Number(min)), Number(max));
    pushUndoSnapshot('スライダ変更');
    state[currentVC].narration[key] = n;
    if (document.activeElement !== range) range.value = n;
    if (document.activeElement !== num) num.value = n;
    // Aspect-lock coupling for size dims (image mode only — gated inside helper).
    if (key === 'width' || key === 'height') {
      maybeApplyNarrAspectLockOnSizeChange(key);
    }
    save(currentVC);
    applyNarrationToDom();
  };
  range.addEventListener('input', () => apply(range.value));
  num.addEventListener('input', () => apply(num.value));
  num.addEventListener('change', () => apply(num.value));
  row.appendChild(lab);
  row.appendChild(range);
  row.appendChild(num);
  return row;
}

              nn.height = h;
              nn.heightAuto = false;

        l.classList.toggle('checked', l.dataset.val === valStr);

  txt.className = 'lock-text';

  cb.addEventListener('change', () => {
    pushUndoSnapshot('縦横比ロック切替');
    const nn = state[currentVC].narration;
    nn.aspectLock = !!cb.checked;
    if (nn.aspectLock) {
      // Aspect-lock only applies meaningfully in image-mode; snapshot ratio.
      if (nn.bgMode === 'image') {
        const a = FRAME_NATURAL_ASPECT[nn.bgImage];
        if (a && a > 0) {
          nn.aspectLockRatio = a;
          // Lock implies an explicit height — turn off heightAuto and re-derive.
          nn.heightAuto = false;
          let h = Math.round(nn.width / a);
          h = Math.min(Math.max(h, NARR_H_MIN), NARR_H_MAX);
          nn.height = h;
        } else {
          // image not loaded yet — onFrameAspectLoaded will fix it.
          nn.heightAuto = false;
          if (nn.height > 0) nn.aspectLockRatio = nn.width / nn.height;
        }
      } else {
        // CSS mode: snapshot current width/height ratio (best-effort).
        if (nn.height > 0) nn.aspectLockRatio = nn.width / nn.height;
      }
      wrap.classList.add('is-on');
    } else {
      wrap.classList.remove('is-on');

  const kind = document.createElement('span');
  kind.className = 'sp-kind';
  kind.textContent = panel.kind === 'narration' ? 'ナレーション' : '対話';
  head.appendChild(kind);
  const summary = document.createElement('span');
  summary.className = 'sp-summary';
  summary.textContent = scenarioPanelSummary(panel);
  head.appendChild(summary);
  head.addEventListener('click', () => {
    pushUndoSnapshot('シナリオ パネル選択');
    state.scenario.currentPanelIdx = pIdx;
    state.scenario.currentLineIdx = 0;
    state.scenario.currentSegmentIdx = 0;
    saveScenario();
    buildRightPane();
    render();
  });
  card.appendChild(head);

  // Body — only meaningful when this panel is selected (CSS shows when .is-selected).
  const body = document.createElement('div');
  body.className = 'scenario-panel-body';
  if (panel.kind === 'narration') {
    body.appendChild(buildScenarioNarrationBody(panel, pIdx));
  } else {
    body.appendChild(buildScenarioDialogueBody(panel, pIdx));
  }
  card.appendChild(body);
  return card;
}

function scenarioPanelSummary(panel) {
  if (panel.kind === 'narration') {
    let firstText = '';
    for (const seg of (panel.segments || [])) {
      if (Array.isArray(seg.lines)) {
        for (const ln of seg.lines) {
          if (ln && ln.text) { firstText = ln.text; break; }
        }
      }
      if (firstText) break;
    }
    return firstText || '(empty)';
  } else {
    const d = (panel.dialogues || [])[0];
    if (!d) return '(empty)';
    const sp = d.speaker === 'pono' ? 'ポノ' : 'はかせ';
    return sp + ': ' + (d.text || '');
  }
}

function buildScenarioNarrationBody(panel, pIdx) {
  const wrap = document.createElement('div');

  panel.segments.forEach((seg, segIdx) => {
    const segEl = document.createElement('div');
    segEl.className = 'scenario-segment';

    const segHead = document.createElement('div');
    segHead.className = 'scenario-segment-head';
    const segLab = document.createElement('span');
    segLab.textContent = 'Segment ' + (segIdx + 1);
    segHead.appendChild(segLab);
    const delSegBtn = document.createElement('button');
    delSegBtn.type = 'button';
    delSegBtn.className = 'ghost';
    delSegBtn.style.cssText = 'background:transparent;border:1px solid #3a4050;color:#cbd5e1;padding:2px 6px;border-radius:3px;cursor:pointer;font-size:10px;margin-left:auto;';
    delSegBtn.textContent = '× セグメント削除';
    delSegBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (panel.segments.length <= 1) {
        toast('最後のセグメントは削除できません', 'err');
        return;
      }
      pushUndoSnapshot('シナリオ セグメント削除');
      panel.segments.splice(segIdx, 1);
      saveScenario();
      buildRightPane();
      render();
    });
    segHead.appendChild(delSegBtn);
    segEl.appendChild(segHead);

    seg.lines.forEach((line, lIdx) => {
      segEl.appendChild(buildScenarioNarrationLineRow(panel, pIdx, segIdx, lIdx));
    });

    // Per-segment add line.
    const segActions = document.createElement('div');
    segActions.className = 'scenario-actions';
    const addLineBtn = document.createElement('button');
    addLineBtn.type = 'button';
    addLineBtn.className = 'ghost';
    addLineBtn.textContent = '+ 行追加';
    addLineBtn.addEventListener('click', () => {
      pushUndoSnapshot('シナリオ 行追加');
      seg.lines.push({ text: '', emphasis: false });
      saveScenario();
      buildRightPane();
      render();
    });
    segActions.appendChild(addLineBtn);
    segEl.appendChild(segActions);

    wrap.appendChild(segEl);
  });

  // Add segment button.
  const actions = document.createElement('div');
  actions.className = 'scenario-actions';
  const addSegBtn = document.createElement('button');
  addSegBtn.type = 'button';
  addSegBtn.textContent = '+ セグメント追加';
  addSegBtn.addEventListener('click', () => {
    pushUndoSnapshot('シナリオ セグメント追加');
    panel.segments.push({ lines: [{ text: '', emphasis: false }] });
    saveScenario();
    buildRightPane();
    render();
  });
  actions.appendChild(addSegBtn);
  wrap.appendChild(actions);

  return wrap;
}

function buildScenarioNarrationLineRow(panel, pIdx, segIdx, lIdx) {
  const line = panel.segments[segIdx].lines[lIdx];
  const row = document.createElement('div');
  row.className = 'scenario-line-row';
  if (state.scenario.currentPanelIdx === pIdx
      && state.scenario.currentSegmentIdx === segIdx
      && state.scenario.currentLineIdx === lIdx) {
    row.classList.add('is-selected');
  }
  row.addEventListener('click', () => {
    state.scenario.currentSegmentIdx = segIdx;
    state.scenario.currentLineIdx = lIdx;
    saveScenario();
    // Only refresh selection highlight + preview — no full rebuild
    document.querySelectorAll('.scenario-line-row').forEach(el => el.classList.remove('is-selected'));
    row.classList.add('is-selected');
    render();
  });

  const meta = document.createElement('div');
  meta.className = 'scenario-line-meta';
  const numLab = document.createElement('label');
  numLab.textContent = '行 ' + (lIdx + 1);
  meta.appendChild(numLab);
  const empWrap = document.createElement('label');
  empWrap.className = 'scenario-emphasis-chk';
  const empCb = document.createElement('input');
  empCb.type = 'checkbox';
  empCb.checked = !!line.emphasis;
  empCb.addEventListener('change', (e) => {
    e.stopPropagation();
    pushUndoSnapshot('シナリオ emphasis 変更');
    line.emphasis = !!empCb.checked;
    saveScenario();
  });
  empWrap.appendChild(empCb);
  empWrap.appendChild(document.createTextNode('emphasis'));
  meta.appendChild(empWrap);
  row.appendChild(meta);

  const ta = document.createElement('textarea');
  ta.value = line.text || '';
  ta.addEventListener('input', () => {
    pushUndoSnapshot('シナリオ テキスト変更');
    line.text = ta.value;
    saveScenario();
    // Update summary + preview if this is current line.
    if (state.scenario.currentPanelIdx === pIdx
        && state.scenario.currentSegmentIdx === segIdx
        && state.scenario.currentLineIdx === lIdx) {
      render();
    }
  });
  ta.addEventListener('click', (e) => e.stopPropagation());
  row.appendChild(ta);

  // Delete line.
  const actions = document.createElement('div');
  actions.className = 'scenario-actions';
  const delBtn = document.createElement('button');
  delBtn.type = 'button';
  delBtn.className = 'danger';
  delBtn.textContent = '- 行削除';
  delBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (panel.segments[segIdx].lines.length <= 1) {
      toast('最後の行は削除できません', 'err');
      return;
    }
    pushUndoSnapshot('シナリオ 行削除');
    panel.segments[segIdx].lines.splice(lIdx, 1);
    saveScenario();
    buildRightPane();
    render();
  });
  actions.appendChild(delBtn);
  row.appendChild(actions);

  return row;
}

function buildScenarioDialogueBody(panel, pIdx) {
  const wrap = document.createElement('div');

  // Panel-level pono image fallback (適用先: per-line ponoImg を持たない pono ライン)。
  const fbRow = document.createElement('div');
  fbRow.className = 'prop-row';
  const fbLab = document.createElement('label');
  fbLab.textContent = '既定 ponoImg';
  const fbSel = document.createElement('select');
  // Variants (originals + userAdded). variant 名 = ID。
  PONO_VARIANTS.forEach(v => {
    const o = document.createElement('option');
    o.value = v.name;
    o.textContent = v.name;
    if (panel.ponoImgFallback === v.name) o.selected = true;
    fbSel.appendChild(o);
  });
  fbSel.addEventListener('change', () => {
    pushUndoSnapshot('シナリオ ponoImgFallback 変更');
    panel.ponoImgFallback = fbSel.value;
    // 既存 pono ライン で ponoImg 未設定 (= fallback 適用) のものは fallback と同じ値で同期。
    // ※明示的に別 variant を選んでいるラインは触らない (= fbSel と異なる値はそのまま)。
    panel.dialogues.forEach(d => {
      if (d.speaker === 'pono' && !d.ponoImg) d.ponoImg = panel.ponoImgFallback;
    });
    saveScenario();
    buildRightPane();
    render();
  });
  fbRow.appendChild(fbLab);
  fbRow.appendChild(fbSel);
  wrap.appendChild(fbRow);

  panel.dialogues.forEach((line, lIdx) => {
    wrap.appendChild(buildScenarioDialogueLineRow(panel, pIdx, lIdx));
  });

  // Add line.
  const actions = document.createElement('div');
  actions.className = 'scenario-actions';
  const addBtn = document.createElement('button');
  addBtn.type = 'button';
  addBtn.textContent = '+ 行追加';
  addBtn.addEventListener('click', () => {
    pushUndoSnapshot('シナリオ 行追加');
    panel.dialogues.push({ speaker: 'hakase', text: '' });
    saveScenario();
    buildRightPane();
    render();
  });
  actions.appendChild(addBtn);
  wrap.appendChild(actions);

  return wrap;
}

function buildScenarioDialogueLineRow(panel, pIdx, lIdx) {
  const line = panel.dialogues[lIdx];
  const row = document.createElement('div');
  row.className = 'scenario-line-row';
  if (state.scenario.currentPanelIdx === pIdx
      && state.scenario.currentLineIdx === lIdx) {
    row.classList.add('is-selected');
  }
  row.addEventListener('click', () => {
    state.scenario.currentLineIdx = lIdx;
    saveScenario();
    document.querySelectorAll('.scenario-line-row').forEach(el => el.classList.remove('is-selected'));
    row.classList.add('is-selected');
    render();
  });

  const meta = document.createElement('div');
  meta.className = 'scenario-line-meta';
  const numLab = document.createElement('label');
  numLab.textContent = '行 ' + (lIdx + 1);
  meta.appendChild(numLab);

  // Speaker radio.

    const lbl = document.createElement('label');
    lbl.style.cssText = 'background:#20242e;border:1px solid #2a2e3a;border-radius:3px;padding:2px 6px;cursor:pointer;font-size:11px;color:#cbd5e1;';

    inp.style.cssText = 'position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;';
    inp.addEventListener('change', (e) => {
      e.stopPropagation();
      if (!inp.checked) return;
      pushUndoSnapshot('シナリオ speaker 変更');
      line.speaker = sp;
      // ponoImg は speaker に関係なく保持/初期化する。
      // (Pono は dialogue panel 全体で常時表示されているため、はかせ発話中も
      //  Pono の表情/ポーズを line 単位で切り替えたい。)
      if (!line.ponoImg) line.ponoImg = panel.ponoImgFallback || 'dance_hi';
      saveScenario();
      buildRightPane();
      render();
    });
    lbl.appendChild(inp);
    lbl.appendChild(document.createTextNode(sp === 'pono' ? 'ポノ' : 'はかせ'));
    lbl.addEventListener('click', (e) => e.stopPropagation());
    meta.appendChild(lbl);
  });

  // ponoImg select — speaker に関係なく全 dialogue line で表示する。
  // (Pono は dialogue panel 全体で常時表示されているため、はかせ発話中も
  //  Pono の表情/ポーズを line 単位で切り替えたい。)
  {
    const imgLab = document.createElement('label');
    imgLab.textContent = 'ポノの表情/ポーズ';
    meta.appendChild(imgLab);
    const sel = document.createElement('select');
    PONO_VARIANTS.forEach(v => {
      const o = document.createElement('option');
      o.value = v.name;
      o.textContent = v.name;
      if (line.ponoImg === v.name) o.selected = true;
      sel.appendChild(o);
    });
    sel.addEventListener('change', (e) => {
      e.stopPropagation();
      pushUndoSnapshot('シナリオ ponoImg 変更');
      line.ponoImg = sel.value;
      saveScenario();
      // Update preview if this is current line.
      if (state.scenario.currentPanelIdx === pIdx
          && state.scenario.currentLineIdx === lIdx) {
        render();
      }
    });
    sel.addEventListener('click', (e) => e.stopPropagation());
    meta.appendChild(sel);
  }
  row.appendChild(meta);

  const ta = document.createElement('textarea');
  ta.value = line.text || '';
  ta.addEventListener('input', () => {
    pushUndoSnapshot('シナリオ テキスト変更');
    line.text = ta.value;
    saveScenario();
    if (state.scenario.currentPanelIdx === pIdx
        && state.scenario.currentLineIdx === lIdx) {
      render();
    }
  });
  ta.addEventListener('click', (e) => e.stopPropagation());
  row.appendChild(ta);

  // Delete line.
  const actions = document.createElement('div');
  actions.className = 'scenario-actions';
  const delBtn = document.createElement('button');
  delBtn.type = 'button';
  delBtn.className = 'danger';
  delBtn.textContent = '- 行削除';
  delBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (panel.dialogues.length <= 1) {
      toast('最後の行は削除できません', 'err');
      return;
    }
    pushUndoSnapshot('シナリオ 行削除');
    panel.dialogues.splice(lIdx, 1);
    if (state.scenario.currentLineIdx >= panel.dialogues.length) {
      state.scenario.currentLineIdx = panel.dialogues.length - 1;
    }
    saveScenario();
    buildRightPane();
    render();
  });
  actions.appendChild(delBtn);
  row.appendChild(actions);

  return row;
}

// Apply the currently-selected scenario line/panel to the central preview.
// Does NOT mutate state[VC].* — only sets DOM directly so VC layout settings
// remain intact when leaving scenario mode. Called from render() when
// panelMode === 'scenario'.
function applyScenarioPreview() {
  const sc = state && state.scenario;
  if (!sc) return;
  const panel = sc.panels[sc.currentPanelIdx];
  if (!panel) return;
  const stage = document.getElementById('stage');

  if (panel.kind === 'narration') {
    // Narration プレビュー: 現在 segment の全 lines を改行連結して表示。
    if (stage) stage.dataset.panel = 'narration';
    const seg = panel.segments[sc.currentSegmentIdx] || panel.segments[0];
    const text = (seg && Array.isArray(seg.lines))
      ? seg.lines.map(l => l ? (l.text || '') : '').join('\n')
      : '';
    const el = document.getElementById('op-narration-preview');
    if (el) {
      // applyNarrationToDom() 実行後に textContent を上書き (NARRATION_SAMPLE_TEXT を置換)。
      el.textContent = text;
      el.style.display = 'flex';
    }
  } else {
    // Dialogue プレビュー: 現在 line を per-side / single-box に直接書き込む。
    if (stage) stage.dataset.panel = 'dialog';
    const line = panel.dialogues[sc.currentLineIdx];
    if (!line) return;
    const speakerSide = line.speaker === 'pono' ? 'pono' : 'hakase';
    // is-speaking の切替 (現在の話者だけ強調)。
    const sidePono = document.getElementById('side-pono');
    const sideHak  = document.getElementById('side-hakase');
    if (sidePono) sidePono.classList.toggle('is-speaking', speakerSide === 'pono');
    if (sideHak)  sideHak.classList.toggle('is-speaking', speakerSide === 'hakase');

    // Pono image swap (per-line ponoImg を speaker に関係なく優先、なければ panel-level fallback)。
    const ponoImgEl = document.getElementById('img-pono');
    if (ponoImgEl) {
      const variantName = line.ponoImg
        ? line.ponoImg
        : (panel.ponoImgFallback || 'dance_hi');
      ponoImgEl.src = ponoPathByName(variantName);
    }
    // Per-side dialogue text & label override.
    if (singleBoxMode) {
      const txt = document.getElementById('text-single');
      const lbl = document.getElementById('label-single');
      if (txt) txt.textContent = line.text || '';
      if (lbl) lbl.textContent = speakerSide === 'pono' ? 'ポノ' : 'はかせ';
    } else {
      // Speaking side 側のみ実テキスト、反対側は空でクリア。
      ['pono', 'hakase'].forEach(side => {
        const t = document.getElementById('text-' + side);
        if (!t) return;
        if (side === speakerSide) t.textContent = line.text || '';
        else t.textContent = '';
      });
    }
    // Narration プレビューは強制非表示 (dialog パネルでは出さない)。
    const nEl = document.getElementById('op-narration-preview');
    if (nEl) nEl.style.display = 'none';
  }
}

function buildRightPane() {
  const body = document.getElementById('tab-body');
  body.textContent = '';
  // Clear the single-box sync map so detached closures don't fire.
  // (Per-side _rangeSyncMap is intentionally left to be overwritten on re-create.)
  Object.keys(_singleBoxRangeSyncMap).forEach(k => delete _singleBoxRangeSyncMap[k]);
  // Same for narration sync map.
  Object.keys(_narrRangeSyncMap).forEach(k => delete _narrRangeSyncMap[k]);

  // Panel mode: ナレーション編集時は対話用 UI を一切出さず、Narration セクションだけ表示。
  if (panelMode === 'narration') {
    body.appendChild(buildNarrationSection());
    return;
  }
  // Panel mode: シナリオ編集時は OP_PANELS 編集 UI を表示。
  if (panelMode === 'scenario') {
    body.appendChild(buildScenarioSection());
    return;
  }

  const sideKey = currentTab;
  const s = state[currentVC][sideKey];

  // 機能 5: when single-box mode is ON, prepend the Single Box section.
  if (singleBoxMode) {
    body.appendChild(buildSingleBoxSection());
  }

  const slotGroup = document.createElement('div');
  slotGroup.className = 'group';
  const slotH = document.createElement('h4');
  slotH.textContent = 'Slot（キャラスロット）';
  slotGroup.appendChild(slotH);
  if (sideKey === 'pono') {
    slotGroup.appendChild(makeSelect('Pono画像', 'variant', sideKey,
      PONO_VARIANTS.map(v => ({ value: v.name, text: v.name }))));
    // 現在編集中の variant を明示。slot 値は variant ごとに独立保持される。
    const variantNote = document.createElement('div');
    variantNote.className = 'prop-row';
    variantNote.style.opacity = '0.85';

    variantNote.appendChild(noteLab);

  }
  slotGroup.appendChild(makeRange('幅 (px)', 100, 1600, 1, 'slotW', sideKey));
  slotGroup.appendChild(makeRange('高さ (px)', 100, 1200, 1, 'slotH', sideKey));
  slotGroup.appendChild(makeRadio('aspect', 'slotAspect', sideKey, [
    { value: 'free', text: '自由' },

    { value: 'fixed_1.0', text: '1.0' },
    { value: 'fixed_1.23', text: '1.23' }
  ]));
  slotGroup.appendChild(makeRadio('object-pos', 'objectPosition', sideKey, [
    { value: 'top', text: '上' },
    { value: 'center', text: '中' },
    { value: 'bottom', text: '下' }
  ]));
  slotGroup.appendChild(makeRange('オフセットX', -500, 1000, 1, 'slotOffsetX', sideKey));
  slotGroup.appendChild(makeRange('オフセットY', -500, 1000, 1, 'slotOffsetY', sideKey));
  body.appendChild(slotGroup);

  const boxGroup = document.createElement('div');
  boxGroup.className = 'group';
  // 機能 5: dim per-side box group when single-box mode is ON.
  if (singleBoxMode) boxGroup.classList.add('is-single-mode');
  const boxH = document.createElement('h4');
  boxH.textContent = 'Box（ダイアログ）';
  boxGroup.appendChild(boxH);
  boxGroup.appendChild(makeRadio('モード', 'boxMode', sideKey, [
    { value: 'image', text: '画像' },

  if (s.boxMode === 'image') {
    boxGroup.appendChild(makeFrameImageSelect(sideKey));

  boxGroup.appendChild(makeRange('幅 (px)', 200, 2000, 1, 'boxW', sideKey));

function buildHeader() {
  document.querySelectorAll('#vp-group input').forEach(r => {
    r.addEventListener('change', () => {
      if (r.checked) {
        currentVC = r.value;
        render();
        buildRightPane();
      }
    });
  });

  document.getElementById('btn-export').addEventListener('click', exportCopy);
  document.getElementById('btn-export-css').addEventListener('click', () => download('css'));
  document.getElementById('btn-export-json').addEventListener('click', () => download('json'));
  const btnScn = document.getElementById('btn-export-scenario');
  if (btnScn) btnScn.addEventListener('click', exportScenario);
  document.getElementById('btn-reset').addEventListener('click', resetCurrent);
  document.getElementById('btn-undo-reset').addEventListener('click', undoLastOp);

  // VC コピー: <select> change で発火し、即 placeholder に戻して再選択可能に。
  // Placeholder option は disabled selected hidden なので、selectedIndex=0 で
  // 視覚的にも選択不可状態に戻り、同一項目の連続選択でも change が再発火する。
  const selCopyVc = document.getElementById('sel-copy-vc');
  if (selCopyVc) {
    selCopyVc.addEventListener('change', () => {
      const v = selCopyVc.value;
      // Reset the dropdown to its placeholder so picking the same option again
      // re-fires "change" (otherwise consecutive same-target copies would no-op).
      // selectedIndex=0 で disabled placeholder に強制的に戻す (value='' より確実)。
      selCopyVc.selectedIndex = 0;
      if (v) copyCurrentToVc(v);
    });
  }

  const hgBtn = document.getElementById('btn-toggle-height-guides');
  if (hgBtn) {
    const refresh = () => {
      hgBtn.classList.toggle('toggle-on', !!showHeightGuides);
      hgBtn.setAttribute('aria-pressed', showHeightGuides ? 'true' : 'false');
    };
    refresh();
    hgBtn.addEventListener('click', () => {
      showHeightGuides = !showHeightGuides;
      saveHeightGuidesPref();
      refresh();
      renderHeightGuides();
    });
  }

  const bgBtn = document.getElementById('btn-toggle-box-guides');
  if (bgBtn) {
    const refreshBg = () => {
      bgBtn.classList.toggle('toggle-on', !!showBoxGuides);
      bgBtn.setAttribute('aria-pressed', showBoxGuides ? 'true' : 'false');
    };
    refreshBg();
    bgBtn.addEventListener('click', () => {
      showBoxGuides = !showBoxGuides;
      saveBoxGuidesPref();
      refreshBg();
      renderBoxGuides();
    });
  }

  const mirrorRow = document.getElementById('mirror-row');
  const mirrorCb = document.getElementById('mirror-checkbox');
  if (mirrorRow && mirrorCb) {
    const refreshMirror = () => {
      // 機能 5: when single-box mode is ON, disable the mirror toggle.
      const disabled = !!singleBoxMode;
      mirrorRow.classList.toggle('is-disabled', disabled);
      mirrorCb.disabled = disabled;
      mirrorRow.classList.toggle('is-on', !!mirrorMode && !disabled);
      mirrorCb.checked = !!mirrorMode && !disabled;
    };
    refreshMirror();
    // Expose for the single-box toggle handler to call after toggling.
    window.__refreshMirrorRow = refreshMirror;
    mirrorCb.addEventListener('change', () => {
      if (singleBoxMode) { mirrorCb.checked = false; return; }
      mirrorMode = !!mirrorCb.checked;
      saveMirrorModePref();
      refreshMirror();
      // When turning ON, immediately sync from currentTab side to the other side
      // so they become symmetric.
      if (mirrorMode) {
        propagateMirror(currentTab, '__all__');
        // Refresh UI to reflect mirrored values on the other tab.
        render();
        buildRightPane();
      }
    });
  }

  // Panel mode toggle (対話 / ナレーション / シナリオ)
  document.querySelectorAll('#panel-group input').forEach(r => {
    r.checked = (r.value === panelMode);
    r.addEventListener('change', () => {
      if (!r.checked) return;
      if (r.value === 'narration' || r.value === 'scenario' || r.value === 'dialog') {
        panelMode = r.value;
      } else {
        panelMode = 'dialog';
      }
      savePanelModePref();
      const right = document.getElementById('right');
      if (right) {
        right.classList.toggle('is-narration', panelMode === 'narration');
        right.classList.toggle('is-scenario',  panelMode === 'scenario');
      }
      render();
      buildRightPane();
    });
  });
  // Initial right pane class sync.
  {
    const right = document.getElementById('right');
    if (right) {
      right.classList.toggle('is-narration', panelMode === 'narration');
      right.classList.toggle('is-scenario',  panelMode === 'scenario');
    }
  }

  const sbBtn = document.getElementById('btn-toggle-single-box');
  if (sbBtn) {
    const refreshSb = () => {
      sbBtn.classList.toggle('toggle-on', !!singleBoxMode);
      sbBtn.setAttribute('aria-pressed', singleBoxMode ? 'true' : 'false');
    };
    refreshSb();
    sbBtn.addEventListener('click', () => {
      singleBoxMode = !singleBoxMode;
      saveSingleBoxModePref();
      refreshSb();
      if (typeof window.__refreshMirrorRow === 'function') window.__refreshMirrorRow();
      render();
      buildRightPane();
    });
  }

  document.querySelectorAll('#tab-bar button').forEach(b => {
    b.addEventListener('click', () => {
      currentTab = b.dataset.tab;
      buildRightPane();
      render();
    });
  });

  document.querySelectorAll('#speaker-row label').forEach(lb => {
    lb.addEventListener('click', (e) => {
      e.preventDefault();
      pushUndoSnapshot('スピーカー変更');
      state[currentVC].speaker = lb.dataset.val;
      save(currentVC);
      render();
    });
  });
}

// === 一般 Undo スタック =====================================================
// 任意の state 変更を巻き戻せる汎用 Undo。スライダ・ラジオ・ドロップダウン・
// テキスト・色・フレーム選択・アスペクトロック・ドロップ画像追加/削除・
// VC コピー・Reset などすべての変更前 state をスタックに push する。
//
// 各エントリ: { snapshot: deepClone(state全体), description: 'スライダ変更' 等 }
// 上限 50 件。同種の連続変更 (同じ description) が 500ms 以内なら新規 push を
// スキップして直前のスナップで代用 (連続スライダ・連続テキスト入力対策)。
const _UNDO_STACK_LIMIT = 50;
let _undoStack = [];
let _lastUndoPushTime = 0;

function pushUndoSnapshot(description) {
  // 直前 500ms 以内に同種の操作があれば新規 push をスキップ (連続入力 debounce)。
  const now = Date.now();
  if (_undoStack.length && _lastUndoPushTime && now - _lastUndoPushTime < 500
      && _undoStack[_undoStack.length - 1].description === description) {
    return; // 直近のスナップで十分
  }
  try {
    _undoStack.push({
      snapshot: JSON.parse(JSON.stringify(state)),
      description: description || '変更',
    });
  } catch (e) {
    // 万一 deep clone に失敗してもエディタ本体は止めない。
    return;
  }
  if (_undoStack.length > _UNDO_STACK_LIMIT) _undoStack.shift();
  _lastUndoPushTime = now;
  _refreshUndoBtn();
}

function _refreshUndoBtn() {
  const undoBtn = document.getElementById('btn-undo-reset');
  if (!undoBtn) return;
  undoBtn.disabled = _undoStack.length === 0;
}

// 既存 Reset: 現在 VC の設定をデフォルトに戻す。直前 state をスタックへ push
// しておけば一般 Undo で巻き戻せる。
function resetCurrent() {
  if (!confirm('現在のビューポート(' + currentVC + ')の設定をリセットします。よろしいですか？')) {
    return;
  }
  pushUndoSnapshot('リセット');
  state[currentVC] = defaultsFor(currentVC);
  save(currentVC);
  render();
  buildRightPane();
  toast('現在のビューポートをリセットしました', 'ok');
}

// === VC コピー (B/C/D 間の state 全体コピー) =================================
// state[currentVC] を deep clone で 1 つ以上の target VC にコピー。直前 state
// 全体をスタックへ push しているので一般 Undo で巻き戻せる。
function copyCurrentToVc(targetVc) {
  if (!targetVc) return;
  if (targetVc === currentVC) {
    toast('同じ VC は選べません', 'err');
    return;
  }
  const targets = (targetVc === 'all') ? ['B', 'C', 'D'] : [targetVc];
  const realTargets = targets.filter(t => t !== currentVC);
  if (realTargets.length === 0) {
    toast('コピー先がありません', 'err');
    return;
  }
  const promptMsg = '現在の VC (' + currentVC + ') の設定を ' + realTargets.join(', ') + ' にコピーします。各 VC の設定は上書きされます。よろしいですか？';
  if (!confirm(promptMsg)) return;

  pushUndoSnapshot('VC コピー');

  // Apply: deep-clone source for each target so they don't share refs.
  realTargets.forEach(t => {
    state[t] = JSON.parse(JSON.stringify(state[currentVC]));
    save(t);
  });

  render();
  buildRightPane();
  toast('現在の設定を ' + realTargets.join(', ') + ' にコピーしました', 'ok');
}

// 一般 Undo: スタック最上段のスナップショットを state に書き戻し、全 VC を
// localStorage に save、UI 全体をリビルド。説明文を toast で告知する。
function undoLastOp() {
  if (_undoStack.length === 0) return;
  const entry = _undoStack.pop();
  try {
    state = entry.snapshot;
  } catch (e) {
    _refreshUndoBtn();
    return;
  }
  // 全 VC を save (state 全体の置換なので個別 VC 検出より安全)。
  ['B', 'C', 'D'].forEach(vc => save(vc));
  // scenario は VC 非依存だが state 全体置換で巻き戻されるので別途 save。
  saveScenario();
  render();
  buildRightPane();
  // 連続 Undo 中の debounce が暴発しないようタイムスタンプを巻き戻す。
  _lastUndoPushTime = 0;
  _refreshUndoBtn();
  toast('元に戻しました: ' + (entry.description || '変更'), 'ok');
}

function cssEscapeUrl(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
}

// Track whether the most recent buildCSS() encountered a dropped (data:) frame.
// exportCopy / download read this to surface a warning toast.
let _exportContainedDroppedFrame = false;
// Same flag, but for buildJSON(): detect user-added frame ids in the JSON
// output so we can warn before they get pasted into production game code.
let _jsonExportContainedDroppedFrame = false;
function isFrameUserAdded(id) {
  const f = FRAME_IMAGES.find(x => x.id === id);
  return !!(f && f.userAdded);
}

function buildCSS() {
  const lines = [];
  _exportContainedDroppedFrame = false;
  lines.push('/* Quizland OP layout — generated ' + new Date().toISOString() + ' */');
  const mediaFor = {
    B: '@media (min-aspect-ratio: 85/100) and (max-aspect-ratio: 14/10)',
    C: '@media (min-aspect-ratio: 14/10) and (max-aspect-ratio: 19/10)',
    D: '@media (min-aspect-ratio: 19/10)'
  };
  // Helper: emit background-image lines for a frame id, OR a placeholder comment
  // when the frame is a user-dropped (data: URL) image which we intentionally
  // do NOT bake into exported CSS (would be huge / not portable).
  function emitFrameBackground(frameId) {
    if (isFrameUserAdded(frameId)) {
      _exportContainedDroppedFrame = true;
      lines.push('    /* NOTE: ドロップ画像 (' + frameId + ') は Export に含まれません。'
        + ' 本番資産に追加してから再 Export してください。 */');
      lines.push('    background-image: none;');
      lines.push('    background-size: 100% 100%;');
      lines.push('    background-repeat: no-repeat;');
      lines.push('    background-color: transparent;');
      lines.push('    border-radius: 0;');
      return;
    }
    lines.push('    background-image: url("' + cssEscapeUrl(framePathById(frameId)) + '");');
    lines.push('    background-size: 100% 100%;');
    lines.push('    background-repeat: no-repeat;');
    lines.push('    background-color: transparent;');
    lines.push('    border-radius: 0;');
  }
  // 機能 1: テキスト整列 (flex) を CSS 行として出力
  function emitTextAlignFlex(node) {
    lines.push('    display: flex;');
    lines.push('    align-items: ' + mapTextAlignV(node.textAlignV) + ';');
    lines.push('    justify-content: ' + mapTextAlignH(node.textAlignH) + ';');
  }
  // 機能 2: ラベル位置 (top/bottom/left/right) を CSS 行として出力
  function emitLabelPosition(node, indent) {
    const ind = indent || '    ';
    const p = labelPositionStyle(node.labelAnchor, node.labelInside, node.labelOffsetX, node.labelOffsetY);
    if (p.top)    lines.push(ind + 'top: ' + p.top + ';');     else lines.push(ind + 'top: auto;');
    if (p.bottom) lines.push(ind + 'bottom: ' + p.bottom + ';'); else lines.push(ind + 'bottom: auto;');
    if (p.left)   lines.push(ind + 'left: ' + p.left + ';');   else lines.push(ind + 'left: auto;');
    if (p.right)  lines.push(ind + 'right: ' + p.right + ';'); else lines.push(ind + 'right: auto;');
  }
  ['B', 'C', 'D'].forEach(vc => {
    const s = state[vc];
    lines.push('');
    lines.push('/* viewport class ' + vc + ' (' + VP_DIMS[vc][0] + 'x' + VP_DIMS[vc][1] + ') */');
    lines.push(mediaFor[vc] + ' {');
    ['pono', 'hakase'].forEach(sideKey => {
      const ss = s[sideKey];
      const ar = aspectFromSlot(ss);
      // Always emit slot (character) + object-position. These are independent of
      // single-box mode (機能 5).
      lines.push('  .op-side-' + sideKey + ' .op-char-slot {');
      lines.push('    width: ' + ss.slotW + 'px;');
      lines.push('    height: ' + ss.slotH + 'px;');
      if (ar) lines.push('    aspect-ratio: ' + ar + ';');
      lines.push('    transform: translate(calc(-50% + ' + ss.slotOffsetX + 'px), calc(-50% + ' + ss.slotOffsetY + 'px));');
      lines.push('  }');
      lines.push('  .op-side-' + sideKey + ' .op-char-slot img {');
      lines.push('    object-position: ' + ss.objectPosition + ' center;');
      lines.push('  }');
      // 機能 5: when singleBoxMode is ON, omit the per-side dialogue box CSS entirely.
      // NOTE (Fix A-1): Export reflects the editor's current UI mode (singleBoxMode).
      // ON => no per-side dialogue CSS is emitted; only .op-dialogue-single is emitted below.
      // If you ever need both modes' CSS in one export, parameterize this branch
      // (e.g. add a `mode` argument to buildCSS) instead of removing the gate.
      if (singleBoxMode) return;
      lines.push('  .op-side-' + sideKey + ' .op-dialogue {');
      lines.push('    width: ' + ss.boxW + 'px;');
      lines.push('    height: ' + ss.boxH + 'px;');
      lines.push('    transform: translate(calc(-50% + ' + ss.boxX + 'px), calc(-50% + ' + ss.boxY + 'px));');
      lines.push('    padding: ' + ss.boxPadding + 'px;');
      // 機能 1: テキスト整列 (flex)
      emitTextAlignFlex(ss);
      if (ss.boxMode === 'image') {
        emitFrameBackground(ss.boxImage);
      } else {
        lines.push('    background-image: none;');
        lines.push('    background-color: ' + ss.boxColor + ';');
        lines.push('    border-radius: ' + ss.boxRadius + 'px;');
      }
      lines.push('  }');
      // 機能 1: 複数行時の各行整列 + フォントサイズ
      // 機能 7 (2026-05-08): 行間 (line-height, unitless) + textarea \n をそのまま改行表示。
      lines.push('  .op-side-' + sideKey + ' .op-dialogue-text {');
      lines.push('    text-align: ' + (ss.textAlignH || 'center') + ';');
      if (typeof ss.fontSize === 'number' && Number.isFinite(ss.fontSize) && ss.fontSize > 0) {
        lines.push('    font-size: ' + ss.fontSize + 'px;');
      }
      if (typeof ss.lineHeight === 'number' && Number.isFinite(ss.lineHeight) && ss.lineHeight > 0) {
        lines.push('    line-height: ' + ss.lineHeight + ';');
      }
      lines.push('    white-space: pre-wrap;');
      lines.push('  }');
      // 機能 2: ラベル位置
      lines.push('  .op-side-' + sideKey + ' .op-dialogue-label {');
      emitLabelPosition(ss);
      // 機能 6: ラベル文字サイズ
      if (typeof ss.labelFontSize === 'number' && Number.isFinite(ss.labelFontSize) && ss.labelFontSize > 0) {
        lines.push('    font-size: ' + ss.labelFontSize + 'px;');
      }
      lines.push('  }');
    });
    // 機能 5: when singleBoxMode is ON, emit the .op-dialogue-single CSS block
    // (single shared dialog rendered at center, per VC).
    // NOTE (Fix A-1): Same caveat as above — the gate is the editor's runtime
    // singleBoxMode. Switch the editor mode and re-export to get the other shape.
    if (singleBoxMode && s.singleBox) {
      const sb = s.singleBox;
      lines.push('  .op-dialogue-single {');
      lines.push('    width: ' + sb.boxW + 'px;');
      lines.push('    height: ' + sb.boxH + 'px;');
      lines.push('    left: 50%;');
      lines.push('    top: ' + sb.boxY + 'px;');
      lines.push('    transform: translateX(-50%);');
      lines.push('    padding: ' + sb.boxPadding + 'px;');
      // 機能 1: テキスト整列 (flex)
      emitTextAlignFlex(sb);
      if (sb.boxMode === 'image') {
        emitFrameBackground(sb.boxImage);
      } else {
        lines.push('    background-image: none;');
        lines.push('    background-color: ' + sb.boxColor + ';');
        lines.push('    border-radius: ' + sb.boxRadius + 'px;');
      }
      lines.push('  }');
      // 機能 1: 複数行時の各行整列 + フォントサイズ
      // 機能 7 (2026-05-08): 行間 (line-height, unitless) + textarea \n をそのまま改行表示。
      lines.push('  .op-dialogue-single .op-dialogue-text {');
      lines.push('    text-align: ' + (sb.textAlignH || 'center') + ';');
      if (typeof sb.fontSize === 'number' && Number.isFinite(sb.fontSize) && sb.fontSize > 0) {
        lines.push('    font-size: ' + sb.fontSize + 'px;');
      }
      if (typeof sb.lineHeight === 'number' && Number.isFinite(sb.lineHeight) && sb.lineHeight > 0) {
        lines.push('    line-height: ' + sb.lineHeight + ';');
      }
      lines.push('    white-space: pre-wrap;');
      lines.push('  }');
      // 機能 2: ラベル位置
      lines.push('  .op-dialogue-single .op-dialogue-label {');
      emitLabelPosition(sb);
      // 機能 6: ラベル文字サイズ
      if (typeof sb.labelFontSize === 'number' && Number.isFinite(sb.labelFontSize) && sb.labelFontSize > 0) {
        lines.push('    font-size: ' + sb.labelFontSize + 'px;');
      }
      lines.push('  }');
    }
    // Panel 1 (.op-narration) per-VC export. Always emitted (independent of singleBoxMode).
    if (s.narration) {
      const nr = s.narration;
      lines.push('  .op-narration {');
      lines.push('    width: ' + (Number(nr.width) || 0) + 'px;');
      // 画像モードかつ aspectLock ON の時は heightAuto 設定に関わらず固定 height を出力。
      const emitHeight = (!nr.heightAuto && nr.height && nr.height > 0)
        || (nr.bgMode === 'image' && nr.aspectLock && nr.height && nr.height > 0);
      if (emitHeight) {
        lines.push('    height: ' + nr.height + 'px;');
      }
      if (nr.posMode === 'top') {
        lines.push('    top: ' + (Number(nr.top) || 0) + 'px;');
        lines.push('    bottom: auto;');
      } else if (nr.posMode === 'bottom') {
        lines.push('    bottom: ' + (Number(nr.bottom) || 0) + 'px;');
        lines.push('    top: auto;');
      } else { // free
        lines.push('    top: ' + (Number(nr.top) || 0) + 'px;');
        lines.push('    bottom: auto;');
      }
      lines.push('    padding: ' + (Number(nr.paddingY) || 0) + 'px ' + (Number(nr.paddingX) || 0) + 'px;');
      lines.push('    font-size: ' + (Number(nr.fontSize) || 36) + 'px;');
      // 機能 7 (2026-05-08): 行間 (line-height, unitless) + textarea \n をそのまま改行表示。
      if (typeof nr.lineHeight === 'number' && Number.isFinite(nr.lineHeight) && nr.lineHeight > 0) {
        lines.push('    line-height: ' + nr.lineHeight + ';');
      }
      lines.push('    white-space: pre-wrap;');
      lines.push('    text-align: ' + (nr.textAlignH || 'center') + ';');
      // 背景: bgMode によって 画像フレーム or CSS 単色 を出力。
      // ドロップ画像 (data: URL) は対話 box と同じく background-image: none + 警告コメント。
      if (nr.bgMode === 'image') {
        if (isFrameUserAdded(nr.bgImage)) {
          _exportContainedDroppedFrame = true;
          lines.push('    /* NOTE: ドロップ画像 (' + nr.bgImage + ') は Export に含まれません。'
            + ' 本番資産に追加してから再 Export してください。 */');
          lines.push('    background-image: none;');
          lines.push('    background-size: 100% 100%;');
          lines.push('    background-repeat: no-repeat;');
          lines.push('    background-color: transparent;');
        } else {
          lines.push('    background-image: url("' + cssEscapeUrl(framePathById(nr.bgImage)) + '");');
          lines.push('    background-size: 100% 100%;');
          lines.push('    background-repeat: no-repeat;');
          lines.push('    background-color: transparent;');
        }
        // 画像フレーム時は border-radius / box-shadow を打ち消す
        // (フレーム画像の枠デザインを優先し、二重枠を避ける)。
        lines.push('    border-radius: 0;');
        lines.push('    box-shadow: none;');
      } else {
        lines.push('    background-image: none;');
        lines.push('    background: ' + hexToRgba(nr.bgColor, nr.bgOpacity) + ';');
        lines.push('    border-radius: ' + (Number(nr.borderRadius) || 0) + 'px;');
        if (nr.showShadow) {
          lines.push('    box-shadow: 0 10px 24px rgba(0,0,0,0.35), 0 0 0 2px rgba(120,80,30,0.18) inset;');
        } else {
          lines.push('    box-shadow: none;');
        }
      }
      lines.push('  }');
    }
    lines.push('}');
  });
  return lines.join('\n');
}

function buildJSON() {
  _jsonExportContainedDroppedFrame = false;
  // Scan all VCs for user-added frame ids on pono/hakase/singleBox. If any
  // exist, the exported JSON will reference frame ids the production game
  // code does not know about — surface a warning toast in the caller.
  ['B', 'C', 'D'].forEach(vc => {
    const s = state[vc];
    if (!s) return;
    ['pono', 'hakase', 'singleBox'].forEach(slot => {
      const node = s[slot];
      if (!node || typeof node !== 'object') return;
      if (isFrameUserAdded(node.boxImage)) {
        _jsonExportContainedDroppedFrame = true;
      }
    });
    // narration uses bgImage instead of boxImage; mode must also be 'image'.
    if (s.narration && s.narration.bgMode === 'image' && isFrameUserAdded(s.narration.bgImage)) {
      _jsonExportContainedDroppedFrame = true;
    }
  });
  // Strip editor-internal-only keys (aspectLock / aspectLockRatio) from export.
  const sanitize = (vc) => {
    const out = {};
    Object.keys(state[vc]).forEach(k => {
      const v = state[vc][k];
      if (v && typeof v === 'object' && !Array.isArray(v)) {
        const cleaned = {};
        Object.keys(v).forEach(kk => {
          if (kk === 'aspectLock' || kk === 'aspectLockRatio') return;
          cleaned[kk] = v[kk];
        });
        out[k] = cleaned;
      } else {
        out[k] = v;
      }
    });
    return out;
  };
  return JSON.stringify({ B: sanitize('B'), C: sanitize('C'), D: sanitize('D') }, null, 2);
}

// Build OP_PANELS JS-literal source for scenario export.
// Output mirrors quizland/index.html の OP_PANELS 構造。ponoImg は variant 名から
// 本番フルパス (PONO_VARIANTS[name].path) に変換。userAdded variant が混じっている
// と本番で 404 になるので警告。bg / audio はパネル位置 (Panel 1 vs 2-6) で固定値。
function buildScenarioPanelsLiteral() {
  let warnUserAdded = false;
  const sc = state && state.scenario;
  if (!sc || !Array.isArray(sc.panels)) return '';

  const indent2 = '  ';
  const indent4 = '    ';
  const indent6 = '      ';
  const lines = [];
  lines.push('const OP_PANELS = [');

  function jsString(s) {
    // テキストは JSON.stringify でエスケープ済み JS string リテラルに。
    return JSON.stringify(String(s == null ? '' : s));
  }
  function ponoFullPath(variantName) {
    const v = PONO_VARIANTS.find(x => x.name === variantName);
    if (!v) return '../assets/images/characters/pono/dance/dance_hi.webp';
    if (v.userAdded) {
      warnUserAdded = true;
      // userAdded は data: URL なのでフォールバック。本番資産に追加した上で再 Export 推奨。
      return '../assets/images/characters/pono/dance/' + variantName + '.webp';
    }
    return v.path;
  }

  sc.panels.forEach((panel, i) => {
    const isLast = (i === sc.panels.length - 1);
    if (panel.kind === 'narration') {
      lines.push(indent2 + '// Panel ' + (i + 1) + ' — narration');
      lines.push(indent2 + '{');
      lines.push(indent4 + 'kind: ' + jsString('narration') + ',');
      lines.push(indent4 + 'bg: ' + jsString('../assets/images/quizland/OP/OP_BG.webp') + ',');
      lines.push(indent4 + 'audio: ' + jsString('../assets/images/quizland/OP/OP_NA.wav') + ',');
      lines.push(indent4 + 'segments: [');
      (panel.segments || []).forEach((seg, segIdx) => {
        const segLast = (segIdx === panel.segments.length - 1);
        lines.push(indent6 + '{');
        lines.push(indent6 + '  lines: [');
        (seg.lines || []).forEach((ln, lIdx) => {
          const lLast = (lIdx === seg.lines.length - 1);
          const t = jsString(ln.text || '');
          const e = ln.emphasis ? 'true' : 'false';
          lines.push(indent6 + '    { text: ' + t + ', emphasis: ' + e + ' }' + (lLast ? '' : ','));
        });
        lines.push(indent6 + '  ]');
        lines.push(indent6 + '}' + (segLast ? '' : ','));
      });
      lines.push(indent4 + ']');
      lines.push(indent2 + '}' + (isLast ? '' : ','));
    } else {
      // Dialogue.
      lines.push(indent2 + '// Panel ' + (i + 1) + ' — dialogue');
      // Panel-level ponoImg = ponoImgFallback の本番パス (per-line ponoImg は line 内で出す)。
      const fallbackPath = ponoFullPath(panel.ponoImgFallback || 'dance_hi');
      lines.push(indent2 + '{ kind: ' + jsString('dialogue')
        + ', bg: ' + jsString('../assets/images/quizland/OP/OP_BG02.webp') + ',');
      lines.push(indent4 + 'ponoImg: ' + jsString(fallbackPath) + ',');
      lines.push(indent4 + 'dialogues: [');
      (panel.dialogues || []).forEach((d, lIdx) => {
        const lLast = (lIdx === panel.dialogues.length - 1);
        const speaker = jsString(d.speaker === 'pono' ? 'pono' : 'hakase');
        const text = jsString(d.text || '');
        let row = indent6 + '{ speaker: ' + speaker + ', text: ' + text;
        // line.ponoImg をフルパスで出す (per-line override)。speaker に関係なく
        // (はかせ発話 line でも) line.ponoImg があればシリアライズする。
        if (d.ponoImg) {
          row += ', ponoImg: ' + jsString(ponoFullPath(d.ponoImg));
        }
        row += ' }' + (lLast ? '' : ',');
        lines.push(row);
      });
      lines.push(indent4 + ']');
      lines.push(indent2 + '}' + (isLast ? '' : ','));
    }
  });
  lines.push('];');

  // 末尾警告コメント (userAdded variant 検出時)。
  if (warnUserAdded) {
    lines.unshift('// WARN: userAdded ponoImg variant が混入しています。本番資産 (../assets/images/characters/pono/dance/) に追加してから再 Export してください。');
  }
  return lines.join('\n');
}

function exportScenario() {
  const text = buildScenarioPanelsLiteral();
  if (!text) {
    toast('シナリオが空です', 'err');
    return;
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => toast('OP_PANELS をコピーしました', 'ok'),
      () => toast('クリップボードコピーに失敗', 'err')
    );
  } else {
    toast('clipboard 利用不可', 'err');
  }
}

function exportCopy() {
  const css = buildCSS();
  const text = css + '\n\n/* JSON */\n' + buildJSON();
  // Note: buildJSON() must run before reading _jsonExportContainedDroppedFrame.
  const droppedWarn = _exportContainedDroppedFrame || _jsonExportContainedDroppedFrame;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => toast(droppedWarn
        ? '警告: ドロップ画像は Export に含まれません'
        : 'CSS + JSON をコピーしました', droppedWarn ? 'err' : 'ok'),
      () => toast('クリップボードコピーに失敗', 'err')
    );
  } else {
    toast('clipboard 利用不可', 'err');
  }
}

function download(kind) {
  const ts = new Date().toISOString().replace(/[:.]/g, '-').replace(/T/, '_').slice(0, 19);
  let blob, fname, droppedWarn;
  if (kind === 'css') {
    const css = buildCSS();
    blob = new Blob([css], { type: 'text/css' });
    fname = 'op-layout-' + ts + '.css';
    droppedWarn = _exportContainedDroppedFrame;
  } else {
    const json = buildJSON();
    blob = new Blob([json], { type: 'application/json' });
    fname = 'op-layout-' + ts + '.json';
    // JSON download: warn if user-added frame ids leak into the output.
    droppedWarn = _jsonExportContainedDroppedFrame;
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
  if (droppedWarn) {
    toast('警告: ドロップ画像は Export に含まれません', 'err');
  } else {
    toast(fname + ' をダウンロード', 'ok');
  }
}

function migrateLegacyStorage() {
  try {
    ['B', 'C', 'D'].forEach(vc => {
      const legacyKey = LEGACY_STORAGE_PREFIX + vc;
      const newKey = STORAGE_PREFIX + vc;
      const legacyVal = localStorage.getItem(legacyKey);
      const newVal = localStorage.getItem(newKey);
      if (legacyVal && !newVal) {
        try { localStorage.setItem(newKey, legacyVal); } catch (e) {}
        try { localStorage.removeItem(legacyKey); } catch (e) {}
      } else if (legacyVal && newVal) {
        // Best-effort cleanup if both exist
        try { localStorage.removeItem(legacyKey); } catch (e) {}
      }
    });
  } catch (e) {}
}

function init() {
  migrateLegacyStorage();
  loadHeightGuidesPref();
  loadBoxGuidesPref();
  loadMirrorModePref();
  loadSingleBoxModePref();
  loadPanelModePref();
  // Restore dropped images BEFORE state load so migrateFrameIds() recognizes
  // user-added frame ids as valid (otherwise they'd be reset to DEFAULT_FRAME_ID).
  loadDroppedAssets();
  // Initialize state ONLY after loadDroppedAssets() so user-added frame ids
  // survive migrateFrameIds() instead of being reset to DEFAULT_FRAME_ID.
  state = {
    B: load('B') || defaultsFor('B'),
    C: load('C') || defaultsFor('C'),
    D: load('D') || defaultsFor('D'),
    // シナリオ (OP_PANELS データ) は VC 非依存 (top-level)。
    scenario: loadScenario()
  };
  preloadFrameAspects();
  buildPresetGrid();
  bindDropZones();
  buildHeader();
  buildRightPane();
  render();

  if (window.ResizeObserver) {
    const ro = new ResizeObserver(() => { rescaleStage(); renderHeightGuides(); renderBoxGuides(); });
    ro.observe(document.getElementById('center'));
  }
  window.addEventListener('resize', () => { rescaleStage(); renderHeightGuides(); renderBoxGuides(); });
}

document.addEventListener('DOMContentLoaded', init);
</script>
