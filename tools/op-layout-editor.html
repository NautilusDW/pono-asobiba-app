<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">
<title>Quizland OP レイアウトエディタ</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1c1f26; color: #e5e7eb; overflow: hidden; }

  #app {
    display: grid;
    grid-template-columns: 240px 1fr 320px;
    grid-template-rows: 48px 1fr;
    grid-template-areas:
      "header header header"
      "left   center right";
    height: 100vh;
    width: 100vw;
  }

  header {
    grid-area: header;
    background: #14161c;
    border-bottom: 1px solid #2a2e3a;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 10;
  }
  header h1 { font-size: 14px; margin: 0; color: #f3f4f6; font-weight: 600; }
  header .vp-group {
    display: flex;
    gap: 4px;
    background: #20242e;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    padding: 2px;
  }
  header .vp-group label {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    color: #cbd5e1;
  }
  header .vp-group input { display: none; }
  header .vp-group input:checked + span {
    background: #2563eb;
    color: #fff;
    padding: 4px 10px;
    border-radius: 3px;
  }
  header .vp-group span { padding: 4px 10px; border-radius: 3px; }
  header button {
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  header button:hover { background: #1d4ed8; }
  header button.ghost { background: transparent; border: 1px solid #3a4050; color: #cbd5e1; }
  header button.ghost:hover { background: #20242e; }
  header .spacer { flex: 1; }

  .panel {
    background: #181b22;
    border-right: 1px solid #2a2e3a;
    overflow-y: auto;
    padding: 12px;
    font-size: 12px;
    /* grid item の overflow:auto を効かせるための min-height:0 トリック */
    min-height: 0;
    height: 100%;
  }
  #left  { grid-area: left; }
  #right {
    grid-area: right;
    border-right: none;
    border-left: 1px solid #2a2e3a;
    padding: 0;
    /* 右ペインは内部 (speaker-row / mirror-row / tab-bar / tab-body) を縦に並べ、
       tab-body のみが余剰スペースを取りつつ独立スクロールするレイアウトに統一する。 */
    display: flex;
    flex-direction: column;
    min-height: 0;
    height: 100%;
    overflow: hidden;
  }

  .section { margin-bottom: 18px; }
  .section h3 {
    margin: 0 0 8px 0;
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .preset-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .preset-thumb {
    background: #0f1218;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    cursor: pointer;
    overflow: hidden;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px;
    transition: border-color 0.15s;
  }
  .preset-thumb:hover { border-color: #3a4050; }
  .preset-thumb.selected { border-color: #10b981; box-shadow: 0 0 0 2px #10b98144; }
  .preset-thumb img {
    max-width: 100%;
    max-height: 70%;
    object-fit: contain;
  }
  .preset-thumb .pname {
    font-size: 9px;
    color: #94a3b8;
    margin-top: 4px;
    text-align: center;
    line-height: 1.1;
    word-break: break-all;
  }

  /* Center preview */
  #center {
    grid-area: center;
    background: #0a0c10;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #stage-wrap {
    position: relative;
    transform-origin: center center;
  }
  .stage {
    position: relative;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 0 1px #2a2e3a, 0 8px 24px rgba(0,0,0,0.6);
  }
  .stage[data-vc="B"] { width: 1024px; height: 768px; }
  .stage[data-vc="C"] { width: 1920px; height: 1080px; }
  .stage[data-vc="D"] { width: 2560px; height: 1080px; }

  .op-bg {
    position: absolute;
    inset: 0;
    background-image: url('../assets/images/quizland/OP/OP_BG02.webp');
    background-size: cover;
    background-position: center;
    filter: blur(5px) saturate(0.9) brightness(0.94);
    transform: scale(1.08);
  }
  .op-sides {
    position: absolute;
    inset: 0;
    display: flex;
  }
  .op-side {
    flex: 1;
    position: relative;
    transition: opacity 0.25s;
    opacity: 0.55;
  }
  .op-side.is-speaking { opacity: 1.0; }

  .op-char-slot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .op-char-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: bottom center;
    display: block;
  }

  .op-dialogue {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }
  .op-dialogue.mode-css {
    background-image: none;
  }
  .op-dialogue-text {
    color: #2a2424;
    font-size: 22px;
    line-height: 1.5;
    text-align: center;
    overflow: auto;
    max-width: 100%;
    max-height: 100%;
    word-break: break-word;
    /* Added (2026-05-08): textarea の \n をプレビューでそのまま改行として反映。
       本番側 (.op-dialogue-single .op-dialogue-text) と挙動を揃える。 */
    white-space: pre-wrap;
  }

  /* Speaker label (話者名チップ). 絶対配置で box の四隅に anchor。
     position プロパティ (top/bottom/left/right) は applySideToDom /
     applySingleBoxToDom でインラインスタイルとして設定する。 */
  .op-dialogue-label {
    position: absolute;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    font-size: 12px;
    line-height: 1.2;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 2;
  }

  /* 16:9 safe-area overlay (editor-only, NOT exported in buildCSS) */
  /* D viewport (2560x1080, 21:9) only — shows where 16:9 (1920x1080) sits in the center.
     Left/right 320px shaded red = areas visible only on 21:9. Editor visual aid only. */
  .safe-area-16-9 {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    color: #fde047;
    background: linear-gradient(
      to right,
      rgba(220, 38, 38, 0.18) 0,
      rgba(220, 38, 38, 0.18) 320px,
      transparent 320px,
      transparent calc(100% - 320px),
      rgba(220, 38, 38, 0.18) calc(100% - 320px),
      rgba(220, 38, 38, 0.18) 100%
    );
  }
  .stage[data-vc="D"] .safe-area-16-9 { display: block; }
  .safe-area-16-9::before,
  .safe-area-16-9::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: repeating-linear-gradient(
      to bottom,
      currentColor 0 8px,
      transparent 8px 16px
    );
  }
  .safe-area-16-9::before { left: 320px; }
  .safe-area-16-9::after  { right: 320px; }
  .safe-area-label {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.65);
    color: #fde047;
    font-size: 18px;
    padding: 2px 8px;
    border-radius: 3px;
    white-space: nowrap;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* Right pane: tabs + scroll body */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid #2a2e3a;
    background: #14161c;
  }
  .tab-bar button {
    flex: 1;
    background: transparent;
    border: none;
    color: #94a3b8;
    padding: 10px 8px;
    cursor: pointer;
    font-size: 12px;
    border-bottom: 2px solid transparent;
  }
  .tab-bar button.active {
    color: #f3f4f6;
    border-bottom-color: #2563eb;
    background: #181b22;
  }
  .tab-body {
    overflow-y: auto;
    /* #right を flex column 化したので、tab-body は残りの高さを取りつつ縦スクロール。
       min-height:0 を入れないと flex item は内容分まで伸びて scroll が効かなくなる。 */
    flex: 1 1 auto;
    min-height: 0;
    padding: 12px;
  }

  .prop-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
  .prop-row label { width: 80px; font-size: 11px; color: #94a3b8; flex-shrink: 0; }
  .prop-row input[type="range"] { flex: 1; min-width: 0; }
  .prop-row input[type="number"], .prop-row input[type="text"], .prop-row select {
    background: #20242e;
    border: 1px solid #2a2e3a;
    color: #e5e7eb;
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 11px;
    min-width: 0;
  }
  .prop-row input[type="number"] { width: 56px; flex-shrink: 0; }
  .prop-row select { flex: 1; }
  .prop-row input[type="color"] {
    width: 36px; height: 22px; padding: 0; border: 1px solid #2a2e3a; border-radius: 3px;
    background: #20242e; cursor: pointer;
  }
  .prop-row textarea {
    flex: 1; background: #20242e; border: 1px solid #2a2e3a; color: #e5e7eb;
    padding: 6px; border-radius: 3px; font-size: 11px; font-family: inherit;
    resize: vertical; min-height: 56px;
  }
  .radio-row { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
  .radio-row label {
    flex: 1; min-width: 0; text-align: center; background: #20242e; border: 1px solid #2a2e3a;
    border-radius: 3px; cursor: pointer; padding: 4px 6px; font-size: 11px; color: #cbd5e1;
    width: auto;
  }
  .radio-row input {
    position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px;
  }
  .radio-row label:focus-within { outline: 2px solid #2563eb; outline-offset: 2px; }
  .radio-row label.checked { background: #2563eb; color: #fff; border-color: #2563eb; }

  .speaker-row {
    background: #20242e;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 12px;
  }
  .speaker-row .label-text {
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .group {
    background: #14161c;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 12px;
  }
  .group h4 {
    margin: 0 0 8px 0;
    font-size: 11px;
    color: #cbd5e1;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Height guides (Photoshop-like horizontal rulers). Editor-only, NOT exported. */
  .height-guides {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }
  .height-guides.is-on { display: block; }
  .height-guides .hg-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 0;
    border-top: 1px dashed #fde047;
    pointer-events: none;
  }
  .height-guides .hg-line.hg-pono { border-top-color: #fde047; }
  .height-guides .hg-line.hg-pono.hg-bot { border-top-color: #fde04788; }
  .height-guides .hg-line.hg-hakase { border-top-color: #67e8f9; }
  .height-guides .hg-line.hg-hakase.hg-bot { border-top-color: #67e8f988; }
  .height-guides .hg-label {
    position: absolute;
    right: 6px;
    top: -12px;
    background: rgba(0, 0, 0, 0.65);
    color: inherit;
    font-size: 14px;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .height-guides .hg-line.hg-pono { color: #fde047; }
  .height-guides .hg-line.hg-hakase { color: #67e8f9; }

  /* Box guides (Box 上下端の可視化). Editor-only, NOT exported.
     Distinguished from height-guides by dotted line style + slightly thicker. */
  .box-guides {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }
  .box-guides.is-on { display: block; }
  .box-guides .bg-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 0;
    border-top: 2px dotted #fde047;
    pointer-events: none;
  }
  .box-guides .bg-line.bg-pono { border-top-color: #fde047; color: #fde047; }
  .box-guides .bg-line.bg-pono.bg-bot { border-top-color: #fde04788; }
  .box-guides .bg-line.bg-hakase { border-top-color: #67e8f9; color: #67e8f9; }
  .box-guides .bg-line.bg-hakase.bg-bot { border-top-color: #67e8f988; }
  .box-guides .bg-label {
    position: absolute;
    left: 6px;
    top: -12px;
    background: rgba(0, 0, 0, 0.65);
    color: inherit;
    font-size: 14px;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* Center vertical line (常時表示の中央指標). Editor-only, NOT exported.
     z-index: 40 — below safe-area-16-9 (50) and box/height guides (60). */
  .center-line {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 1px;
    background: rgba(255, 255, 255, 0.18);
    z-index: 40;
    pointer-events: none;
  }

  /* Single Box 1 個モード (機能 5).
     Editor-only DOM; default hidden. Activated by .stage[data-single-box="on"]. */
  .single-box-wrapper {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 30;
    pointer-events: none;
  }
  .stage[data-single-box="on"] .single-box-wrapper { display: block; }
  /* When Single Box mode is ON, hide per-side dialogues but keep characters visible. */
  .stage[data-single-box="on"] .op-sides .op-dialogue { display: none; }

  .op-dialogue-single {
    position: absolute;
    /* width / height / top set via inline style from applySingleBoxToDom */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: 100% 100%;
    background-repeat: no-repeat;
    pointer-events: auto;
  }
  .op-dialogue-single.mode-css {
    background-image: none;
  }
  .op-dialogue-single .op-dialogue-text {
    color: #2a2424;
    font-size: 22px;
    line-height: 1.5;
    text-align: center;
    overflow: auto;
    max-width: 100%;
    max-height: 100%;
    word-break: break-word;
    /* Added (2026-05-08): textarea \n を改行表示。本番と揃える。 */
    white-space: pre-wrap;
  }

  /* Single-box guide line variant (dashdot, neutral white). */
  .box-guides .bg-line.bg-single {
    border-top: 2px dashed #e5e7eb;
    color: #e5e7eb;
  }
  .box-guides .bg-line.bg-single.bg-bot { border-top-color: #e5e7eb88; }

  /* Narration preview (Panel 1, ナレーション). Editor-only DOM; hidden by default.
     Activated by .stage[data-panel="narration"]. Style values are set inline by
     applyNarrationToDom() using state[VC].narration. */
  .op-narration-preview {
    display: none;
    position: absolute;
    /* width / height / top / bottom / left / padding / font-size / background /
       border-radius / box-shadow set inline from state[VC].narration. */
    box-sizing: border-box;
    color: #3a2a14;
    line-height: 1.55;
    z-index: 35;
    pointer-events: auto;
    white-space: pre-wrap;
    word-break: break-word;
    transform: translateX(-50%);
  }
  .stage[data-panel="narration"] .op-narration-preview { display: block; }

  /* When panel mode is "narration": switch BG to OP_BG.webp (forest house) and
     hide all dialogue / character / single-box layers. */
  .stage[data-panel="narration"] .op-bg {
    background-image: url('../assets/images/quizland/OP/OP_BG.webp');
    /* Panel 1 は本番では blur 無し (シャープ表示)。 */
    filter: none;
    transform: none;
  }
  .stage[data-panel="narration"] .op-sides { display: none; }
  .stage[data-panel="narration"] .single-box-wrapper { display: none; }

  /* When right pane is in narration edit mode, hide dialog-only rows. */
  #right.is-narration .speaker-row,
  #right.is-narration .mirror-row,
  #right.is-narration .tab-bar { display: none; }

  /* When right pane is in scenario edit mode, hide dialog-only rows
     (シナリオモードではプレビューは選択中の行に追従、編集 UI は scenario セクション主体)。 */
  #right.is-scenario .speaker-row,
  #right.is-scenario .mirror-row,
  #right.is-scenario .tab-bar { display: none; }

  /* Scenario dedicated section (right pane). */
  .scenario-section {
    background: #14161c;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 12px;
  }
  .scenario-section h4 {
    margin: 0 0 8px 0;
    font-size: 11px;
    color: #fbbf24;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .scenario-panel-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }
  .scenario-panel-card {
    background: #1c2030;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    overflow: hidden;
  }
  .scenario-panel-card.is-selected {
    border-color: #fbbf24;
    box-shadow: 0 0 0 2px #fbbf2433;
  }
  .scenario-panel-head {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    background: #20242e;
    cursor: pointer;
    font-size: 11px;
    color: #e5e7eb;
    user-select: none;
  }
  .scenario-panel-head .sp-num {
    background: #fbbf24;
    color: #1c1f26;
    font-weight: 700;
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 10px;
  }
  .scenario-panel-head .sp-kind {
    color: #94a3b8;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .scenario-panel-head .sp-summary {
    flex: 1;
    color: #cbd5e1;
    font-size: 10px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .scenario-panel-body {
    padding: 8px;
    border-top: 1px solid #2a2e3a;
    display: none;
  }
  .scenario-panel-card.is-selected .scenario-panel-body { display: block; }

  .scenario-line-row {
    background: #0f1218;
    border: 1px solid #2a2e3a;
    border-radius: 3px;
    padding: 6px;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .scenario-line-row.is-selected {
    border-color: #10b981;
    box-shadow: 0 0 0 1px #10b98144;
  }
  .scenario-line-row textarea {
    width: 100%;
    background: #20242e;
    border: 1px solid #2a2e3a;
    color: #e5e7eb;
    padding: 4px 6px;
    border-radius: 3px;
    font-size: 11px;
    font-family: inherit;
    resize: vertical;
    min-height: 40px;
  }
  .scenario-line-row .scenario-line-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .scenario-line-row .scenario-line-meta label {
    font-size: 10px;
    color: #94a3b8;
    width: auto;
  }
  .scenario-line-row .scenario-line-meta select,
  .scenario-line-row .scenario-line-meta input[type="text"] {
    background: #20242e;
    border: 1px solid #2a2e3a;
    color: #e5e7eb;
    padding: 2px 4px;
    border-radius: 3px;
    font-size: 11px;
  }
  .scenario-actions {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .scenario-actions button {
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
  }
  .scenario-actions button.ghost {
    background: transparent;
    border: 1px solid #3a4050;
    color: #cbd5e1;
  }
  .scenario-actions button.danger {
    background: #ef4444;
    color: #fff;
  }
  .scenario-segment {
    background: #14161c;
    border: 1px dashed #3a4050;
    border-radius: 3px;
    padding: 6px;
    margin-bottom: 6px;
  }
  .scenario-segment-head {
    font-size: 10px;
    color: #94a3b8;
    text-transform: uppercase;

<script>
'use strict';

const PONO_VARIANTS = [
  { name: 'dance_hi', path: '../assets/images/characters/pono/dance/dance_hi.webp' },
  { name: 'dance_hooray', path: '../assets/images/characters/pono/dance/dance_hooray.webp' },
  { name: 'dance_smile', path: '../assets/images/characters/pono/dance/dance_smile.webp' },
  { name: 'think_arms_crossed_side', path: '../assets/images/characters/pono/dance/think_arms_crossed_side.webp' },
  { name: 'think_chin_clasp', path: '../assets/images/characters/pono/dance/think_chin_clasp.webp' }
];

const FRAME_IMAGES = [
  { id: 'frame_wide_a', label: '横長フレーム A', path: encodeURI('../assets/images/quizland/OP/レイヤー 0_20260507-173812_001.png') },
  { id: 'frame_wide_b', label: '横長フレーム B', path: encodeURI('../assets/images/quizland/OP/レイヤー 0_20260508-081922_001.png') },
  { id: 'frame_wide_c', label: '横長フレーム C', path: encodeURI('../assets/images/quizland/OP/レイヤー 0_20260507-173923_001.png') },
  { id: 'frame_4_3',    label: '4:3 フレーム',    path: encodeURI('../assets/images/quizland/OP/frame4_3.png') },
  { id: 'frame_1_1',    label: '1:1 フレーム',    path: encodeURI('../assets/images/quizland/OP/frame_1_1.png') }
];
const FRAME_IDS = FRAME_IMAGES.map(f => f.id);
const DEFAULT_FRAME_ID = 'frame_wide_a';

const VP_DIMS = { B: [1024, 768], C: [1920, 1080], D: [2560, 1080] };
const STORAGE_PREFIX = 'pono.opLayoutEditor.v1.';
const LEGACY_STORAGE_PREFIX = 'opLayoutEditor.';
const HEIGHT_GUIDES_STORAGE_KEY = STORAGE_PREFIX + 'showHeightGuides';
const BOX_GUIDES_STORAGE_KEY = STORAGE_PREFIX + 'showBoxGuides';
const MIRROR_MODE_STORAGE_KEY = STORAGE_PREFIX + 'mirrorMode';
const SINGLE_BOX_MODE_STORAGE_KEY = STORAGE_PREFIX + 'singleBoxMode';
const PANEL_MODE_STORAGE_KEY = STORAGE_PREFIX + 'panelMode';
// Persistent storage for drag-and-dropped images (Pono variants and frames).
// Stored as { pono: [{name,path,label?}], frame: [{id,label,path,naturalAspect?}] }.
const DROPPED_ASSETS_STORAGE_KEY = STORAGE_PREFIX + 'droppedAssets';
// Soft warning threshold for combined dropped-asset storage size (bytes).
const DROPPED_ASSETS_WARN_BYTES = 4 * 1024 * 1024;

// Frame natural aspect cache: id -> naturalW / naturalH (number) or undefined while loading.
const FRAME_NATURAL_ASPECT = {};
function preloadFrameAspects() {
  FRAME_IMAGES.forEach(f => {
    const im = new Image();
    im.onload = () => {
      if (im.naturalWidth > 0 && im.naturalHeight > 0) {
        FRAME_NATURAL_ASPECT[f.id] = im.naturalWidth / im.naturalHeight;
        // After load, refresh aspect-lock-driven dims for any side currently using this frame
        // with image-mode aspectLock = ON.
        try { onFrameAspectLoaded(f.id); } catch (e) {}
      }
    };
    im.src = f.path;
  });
}

function getEffectiveAspectRatio(s) {
  // Returns the ratio to apply for aspectLock. Image mode uses frame's natural;
  // CSS mode uses the snapshot stored at lock-on (aspectLockRatio).
  if (s.boxMode === 'image') {
    const a = FRAME_NATURAL_ASPECT[s.boxImage];
    if (a && Number.isFinite(a) && a > 0) return a;
    // fall back to stored ratio if available
    if (s.aspectLockRatio && s.aspectLockRatio > 0) return s.aspectLockRatio;
    return null;
  } else {
    if (s.aspectLockRatio && s.aspectLockRatio > 0) return s.aspectLockRatio;
    return null;
  }
}

let showHeightGuides = false;
function loadHeightGuidesPref() {
  try {
    const v = localStorage.getItem(HEIGHT_GUIDES_STORAGE_KEY);
    showHeightGuides = v === 'true';
  } catch (e) { showHeightGuides = false; }
}
function saveHeightGuidesPref() {
  try { localStorage.setItem(HEIGHT_GUIDES_STORAGE_KEY, showHeightGuides ? 'true' : 'false'); } catch (e) {}
}

let showBoxGuides = false;
function loadBoxGuidesPref() {
  try {
    const v = localStorage.getItem(BOX_GUIDES_STORAGE_KEY);
    showBoxGuides = v === 'true';
  } catch (e) { showBoxGuides = false; }
}
function saveBoxGuidesPref() {
  try { localStorage.setItem(BOX_GUIDES_STORAGE_KEY, showBoxGuides ? 'true' : 'false'); } catch (e) {}
}

let mirrorMode = false;
// Re-entrancy guard so mirror propagation does not recurse.
let _mirroring = false;
function loadMirrorModePref() {
  try {
    const v = localStorage.getItem(MIRROR_MODE_STORAGE_KEY);
    mirrorMode = v === 'true';
  } catch (e) { mirrorMode = false; }
}
function saveMirrorModePref() {
  try { localStorage.setItem(MIRROR_MODE_STORAGE_KEY, mirrorMode ? 'true' : 'false'); } catch (e) {}
}

let singleBoxMode = false;
function loadSingleBoxModePref() {
  try {
    const v = localStorage.getItem(SINGLE_BOX_MODE_STORAGE_KEY);
    singleBoxMode = v === 'true';
  } catch (e) { singleBoxMode = false; }
}
function saveSingleBoxModePref() {
  try { localStorage.setItem(SINGLE_BOX_MODE_STORAGE_KEY, singleBoxMode ? 'true' : 'false'); } catch (e) {}
}

// Panel mode: 'dialog' = Panel 2-6 編集 (既存挙動) / 'narration' = Panel 1 編集
//             / 'scenario' = OP_PANELS シナリオ編集 (テキスト・ponoImg・narration segments)
let panelMode = 'dialog';
function loadPanelModePref() {
  try {
    const v = localStorage.getItem(PANEL_MODE_STORAGE_KEY);
    if (v === 'narration' || v === 'scenario' || v === 'dialog') {
      panelMode = v;
    } else {
      panelMode = 'dialog';
    }
  } catch (e) { panelMode = 'dialog'; }
}
function savePanelModePref() {
  try { localStorage.setItem(PANEL_MODE_STORAGE_KEY, panelMode); } catch (e) {}
}

// === Scenario (OP_PANELS) editor model =================================
// state.scenario は VC 非依存 (top-level)。 panels 配列は本番 quizland/index.html
// の OP_PANELS と 1:1 対応:
//   - narration panel: { kind:'narration', segments: [{ lines: [{text, emphasis}, ...] }, ...] }
//   - dialogue panel:  { kind:'dialogue', ponoImgFallback: 'dance_hi',
//                        dialogues: [{ speaker:'hakase', text:'...' },
//                                    { speaker:'pono',   text:'...', ponoImg:'dance_hi' }] }
// currentPanelIdx / currentLineIdx / currentSegmentIdx は編集中ハイライト用。
// 本番からのコピーなので migration 時に欠けたフィールドは defaults に倒す。
const SCENARIO_STORAGE_KEY = STORAGE_PREFIX + 'scenario';

function defaultScenario() {
  return {
    panels: [
      // Panel 1 — narration
      {
        kind: 'narration',
        segments: [
          {
            lines: [
              { text: 'もりの おくに、ふしぎな いえがあります。', emphasis: false },
              { text: 'そこには、なんでも しっている', emphasis: false },
              { text: 'ふくろうの はかせが すんでいます。', emphasis: false }
            ]
          },
          {
            lines: [
              { text: 'ポノは、なかよしの はかせと、', emphasis: true },
              { text: 'いつもの なぞなぞで あそぶために やってきました。', emphasis: true }
            ]
          }
        ]
      },
      // Panel 2 — dialogue (dance_hi)
      {
        kind: 'dialogue',
        ponoImgFallback: 'dance_hi',
        dialogues: [
          { speaker: 'hakase', text: 'ほっほっほ…ポノか。よくきたのう' },
          { speaker: 'pono',   text: 'はかせ、あそびに きたよ！', ponoImg: 'dance_hi' }
        ]
      },
      // Panel 3 — dialogue (dance_hooray)
      {
        kind: 'dialogue',
        ponoImgFallback: 'dance_hooray',
        dialogues: [
          { speaker: 'hakase', text: 'きょうも なぞなぞを するかの？' },
          { speaker: 'pono',   text: 'うん！やりたい！', ponoImg: 'dance_hooray' }
        ]
      },
      // Panel 4 — dialogue (think_arms_crossed_side)
      {
        kind: 'dialogue',
        ponoImgFallback: 'think_arms_crossed_side',
        dialogues: [
          { speaker: 'hakase', text: 'ふむふむ… じしんは あるかな？' },
          { speaker: 'pono',   text: 'うーん…でも がんばる！', ponoImg: 'think_arms_crossed_side' }
        ]
      },
      // Panel 5 — dialogue (dance_smile)
      {
        kind: 'dialogue',
        ponoImgFallback: 'dance_smile',
        dialogues: [
          { speaker: 'hakase', text: 'ほっほっほ、それでよい。まちがえても よいのじゃ。かんがえることが たいせつじゃからの。' },
          { speaker: 'pono',   text: 'うん！', ponoImg: 'dance_smile' }
        ]
      },
      // Panel 6 — dialogue (think_chin_clasp)
      {
        kind: 'dialogue',
        ponoImgFallback: 'think_chin_clasp',
        dialogues: [
          { speaker: 'hakase', text: 'では、いくぞ…' },
          { speaker: 'pono',   text: 'うん！', ponoImg: 'think_chin_clasp' }
        ]
      }
    ],
    currentPanelIdx: 0,
    currentLineIdx: 0,
    currentSegmentIdx: 0
  };
}

function migrateScenario(parsed) {
  // 不正/欠落フィールドの backfill。スキーマは defaultScenario() に倣う。
  const def = defaultScenario();
  if (!parsed || typeof parsed !== 'object') return def;
  if (!Array.isArray(parsed.panels) || parsed.panels.length === 0) {
    parsed.panels = def.panels;
  } else {
    parsed.panels.forEach((p, i) => {
      if (!p || typeof p !== 'object') {
        parsed.panels[i] = def.panels[i] || def.panels[0];
        return;
      }
      if (p.kind !== 'narration' && p.kind !== 'dialogue') p.kind = 'dialogue';
      if (p.kind === 'narration') {
        if (!Array.isArray(p.segments)) p.segments = [{ lines: [] }];
        p.segments.forEach((seg, si) => {
          if (!seg || typeof seg !== 'object') p.segments[si] = { lines: [] };
          else if (!Array.isArray(seg.lines)) seg.lines = [];
          else {
            seg.lines.forEach((ln, li) => {
              if (!ln || typeof ln !== 'object') seg.lines[li] = { text: '', emphasis: false };
              else {
                if (typeof ln.text !== 'string') ln.text = '';
                if (typeof ln.emphasis !== 'boolean') ln.emphasis = false;
              }
            });
          }
        });
      } else { // dialogue
        if (typeof p.ponoImgFallback !== 'string' || !p.ponoImgFallback) {
          p.ponoImgFallback = 'dance_hi';
        }
        if (!Array.isArray(p.dialogues)) p.dialogues = [];
        p.dialogues.forEach((d, di) => {
          if (!d || typeof d !== 'object') p.dialogues[di] = { speaker: 'hakase', text: '' };
          else {
            if (d.speaker !== 'pono' && d.speaker !== 'hakase') d.speaker = 'hakase';
            if (typeof d.text !== 'string') d.text = '';
            // line.ponoImg は speaker に関係なく optional (Pono は dialogue panel 全体で常時表示
            // されているため、はかせ発話中も Pono の表情/ポーズを line 単位で切り替えたい)。
            // 未設定の line には panel.ponoImgFallback を初期値として割り当てる。
            if (typeof d.ponoImg !== 'string' || !d.ponoImg) d.ponoImg = p.ponoImgFallback;
          }
        });
      }
    });
  }
  if (typeof parsed.currentPanelIdx !== 'number' || parsed.currentPanelIdx < 0
      || parsed.currentPanelIdx >= parsed.panels.length) {

// === Dropped assets persistence =========================================
// Builds the JSON-serializable payload of currently dropped Pono / frame images
// from the in-memory PONO_VARIANTS / FRAME_IMAGES arrays.
function buildDroppedAssetsPayload() {
  const pono = PONO_VARIANTS.filter(v => v && v.userAdded).map(v => ({
    name: v.name,
    path: v.path,
    label: v.label || v.name
  }));
  const frame = FRAME_IMAGES.filter(f => f && f.userAdded).map(f => {
    const out = { id: f.id, label: f.label, path: f.path };
    const a = FRAME_NATURAL_ASPECT[f.id];
    if (a && Number.isFinite(a) && a > 0) out.naturalAspect = a;
    return out;
  });
  return { pono: pono, frame: frame };
}

// Returns true on success, false on QuotaExceededError, null when localStorage unavailable.
function writeDroppedAssetsToStorage(payload) {
  let json;
  try {
    json = JSON.stringify(payload);
  } catch (e) {
    return false;
  }
  // Soft warning when approaching capacity (does not block save).
  try {
    if (json.length >= DROPPED_ASSETS_WARN_BYTES) {
      toast('保存容量に近づいています', 'err');
    }
  } catch (_) {}
  try {
    localStorage.setItem(DROPPED_ASSETS_STORAGE_KEY, json);
    return true;
  } catch (e) {
    // Detect QuotaExceededError across browsers.
    const isQuota = e && (
      e.name === 'QuotaExceededError' ||
      e.name === 'NS_ERROR_DOM_QUOTA_REACHED' ||
      e.code === 22 || e.code === 1014
    );
    if (isQuota) return false;
    // Other errors (e.g., localStorage disabled) -> swallow, treat as no-op.
    return null;
  }
}

// Persist current dropped assets. Returns true on success, false on quota,
// null when storage is unavailable. Caller should rollback on false.
function saveDroppedAssets() {
  return writeDroppedAssetsToStorage(buildDroppedAssetsPayload());
}

// Load persisted dropped assets and merge into PONO_VARIANTS / FRAME_IMAGES.
// Must run before state load() so that migrateFrameIds() recognizes user-added
// frame ids as valid. Also restores FRAME_NATURAL_ASPECT from saved values to
// minimize FOUC; any missing entries are filled later by an Image() preload.
function loadDroppedAssets() {
  let raw = null;
  try {
    raw = localStorage.getItem(DROPPED_ASSETS_STORAGE_KEY);
  } catch (e) {
    return; // localStorage unavailable -> silently skip
  }
  if (!raw) return;
  let parsed;
  try {
    parsed = JSON.parse(raw);
  } catch (e) {
    try { toast('保存された追加画像の読込に失敗しました', 'err'); } catch (_) {}
    parsed = {};
  }
  if (!parsed || typeof parsed !== 'object') parsed = {};
  const ponoList = Array.isArray(parsed.pono) ? parsed.pono : [];
  const frameList = Array.isArray(parsed.frame) ? parsed.frame : [];

  ponoList.forEach(item => {
    if (!item || typeof item !== 'object') return;
    const name = String(item.name || '').trim();
    const path = String(item.path || '');
    if (!name || !path) return;
    // Reject paths that aren't data:image/ URIs. Prevents CSS-syntax-breaking
    // payloads from being injected via background-image: url(...) on restore.
    if (!path.startsWith('data:image/')) return;
    if (PONO_VARIANTS.some(v => v.name === name)) return; // dedupe vs originals
    PONO_VARIANTS.push({
      name: name,
      path: path,
      userAdded: true,
      label: item.label ? String(item.label) : name
    });
  });

  frameList.forEach(item => {
    if (!item || typeof item !== 'object') return;
    const id = String(item.id || '').trim();
    const path = String(item.path || '');
    const label = item.label ? String(item.label) : id;
    if (!id || !path) return;
    // Reject paths that aren't data:image/ URIs. Prevents CSS-syntax-breaking
    // payloads from being injected via background-image: url(...) on restore.
    if (!path.startsWith('data:image/')) return;
    if (FRAME_IMAGES.some(f => f.id === id)) return; // dedupe vs originals
    FRAME_IMAGES.push({ id: id, label: label, path: path, userAdded: true });
    if (FRAME_IDS.indexOf(id) < 0) FRAME_IDS.push(id);
    const a = Number(item.naturalAspect);
    if (Number.isFinite(a) && a > 0) {
      FRAME_NATURAL_ASPECT[id] = a;
    } else {
      // No cached aspect: compute lazily via Image preload.
      const im = new Image();
      im.onload = () => {
        if (im.naturalWidth > 0 && im.naturalHeight > 0) {
          FRAME_NATURAL_ASPECT[id] = im.naturalWidth / im.naturalHeight;
          try { onFrameAspectLoaded(id); } catch (_) {}
        }
      };
      im.src = path;
    }
  });
}

// Keys that get mirror-copied (with sign reversal for X-axis offsets)
const MIRROR_COPY_KEYS = [
  'boxW', 'boxH', 'boxY', 'boxPadding', 'boxRadius',
  'boxImage', 'boxMode', 'boxColor',
  'aspectLock', 'aspectLockRatio',
  'slotW', 'slotH', 'slotOffsetY', 'slotAspect', 'objectPosition',
  'fontSize',
  // 機能 1/2: テキスト整列 + ラベル位置
  'textAlignH', 'textAlignV',
  'labelAnchor', 'labelInside', 'labelOffsetY',
  // 機能 6: ラベル文字サイズ
  'labelFontSize'
];
// X-axis 系 (左右ミラー時に符号反転)
const MIRROR_FLIP_KEYS = ['boxX', 'slotOffsetX', 'labelOffsetX'];
// Keys that are NEVER mirrored:
//   variant (Pono image) — Hakase has no variant
//   sampleText            — each character has unique words
//   speaker               — global state, not per-side

function propagateMirror(sideKey, key) {
  if (!mirrorMode || _mirroring) return;
  if (key && key !== '__all__' && !MIRROR_COPY_KEYS.includes(key) && !MIRROR_FLIP_KEYS.includes(key)) {
    return;
  }
  const otherSide = sideKey === 'pono' ? 'hakase' : 'pono';
  const src = state[currentVC][sideKey];
  const dst = state[currentVC][otherSide];
  if (!src || !dst) return;
  _mirroring = true;
  try {
    if (key === '__all__' || !key) {
      // Bulk sync: copy every relevant key
      MIRROR_COPY_KEYS.forEach(k => { if (k in src) dst[k] = src[k]; });
      MIRROR_FLIP_KEYS.forEach(k => { if (typeof src[k] === 'number') dst[k] = -src[k]; });
    } else if (MIRROR_FLIP_KEYS.includes(key)) {
      if (typeof src[key] === 'number') dst[key] = -src[key];
    } else {
      dst[key] = src[key];
    }
    // Mirror が pono 側に書き込んだ slot 値は perVariant[currentVariant] にも反映。
    // (flat だけ更新されると variant 切替時に上書きされてしまう)
    if (otherSide === 'pono') {
      if (key === '__all__' || !key) {
        PONO_PER_VARIANT_KEYS.forEach(k => syncVariantFromFlat(dst, k));
      } else if (PONO_PER_VARIANT_KEYS.includes(key)) {
        syncVariantFromFlat(dst, key);
      }
    }
    save(currentVC);
    applySideToDom(otherSide);
  } finally {
    _mirroring = false;
  }
}

      boxH: sb.boxH,
      boxY: sb.boxY,
      boxPadding: 32,
      boxRadius: 16,
      boxMode: 'image',
      boxImage: DEFAULT_FRAME_ID,
      boxColor: '#fef3c7',
      aspectLock: false,
      aspectLockRatio: 0,
      fontSize: sb.fontSize,
      // 機能 7 (2026-05-08): 行間 既定。
      lineHeight: 1.5,
      textAlignH: 'center',
      textAlignV: 'center',
      labelAnchor: 'bl',
      labelInside: true,
      labelOffsetX: 0,
      labelOffsetY: 0,
      labelFontSize: 22,
      speakerSrc: 'pono'
    };
  } else {
    const sb = parsed.singleBox;
    if (typeof sb.boxW !== 'number' || !Number.isFinite(sb.boxW) || sb.boxW <= 0) sb.boxW = 1200;
    if (typeof sb.boxH !== 'number' || !Number.isFinite(sb.boxH) || sb.boxH <= 0) sb.boxH = 220;
    if (typeof sb.boxY !== 'number' || !Number.isFinite(sb.boxY)) sb.boxY = 820;
    if (typeof sb.boxPadding !== 'number' || !Number.isFinite(sb.boxPadding)) sb.boxPadding = 32;
    if (typeof sb.boxRadius !== 'number' || !Number.isFinite(sb.boxRadius)) sb.boxRadius = 16;
    if (sb.boxMode !== 'image' && sb.boxMode !== 'css') sb.boxMode = 'image';
    if (!FRAME_IDS.includes(sb.boxImage)) sb.boxImage = DEFAULT_FRAME_ID;
    if (typeof sb.boxColor !== 'string') sb.boxColor = '#fef3c7';
    if (typeof sb.aspectLock !== 'boolean') sb.aspectLock = false;
    if (typeof sb.aspectLockRatio !== 'number' || !Number.isFinite(sb.aspectLockRatio)) {
      sb.aspectLockRatio = 0;
    }
    if (typeof sb.fontSize !== 'number' || !Number.isFinite(sb.fontSize) || sb.fontSize <= 0) {
      sb.fontSize = sb.boxW >= 1000 ? 18 : 16;
    }
    // 機能 7 (2026-05-08): 行間 (line-height) — legacy state では欠如する。
    if (typeof sb.lineHeight !== 'number' || !Number.isFinite(sb.lineHeight) || sb.lineHeight <= 0) {
      sb.lineHeight = 1.5;
    } else if (sb.lineHeight < 1.0) {
      sb.lineHeight = 1.0;
    } else if (sb.lineHeight > 3.0) {
      sb.lineHeight = 3.0;
    }
    if (sb.speakerSrc !== 'pono' && sb.speakerSrc !== 'hakase') sb.speakerSrc = 'pono';
    // 機能 1/2: テキスト整列 + ラベル位置 既定値 (legacy state では欠如する)
    if (sb.textAlignH !== 'left' && sb.textAlignH !== 'center' && sb.textAlignH !== 'right') {
      sb.textAlignH = 'center';
    }
    if (sb.textAlignV !== 'top' && sb.textAlignV !== 'center' && sb.textAlignV !== 'bottom') {
      sb.textAlignV = 'center';
    }
    if (sb.labelAnchor !== 'tl' && sb.labelAnchor !== 'tr' && sb.labelAnchor !== 'bl' && sb.labelAnchor !== 'br') {
      sb.labelAnchor = 'bl';
    }
    if (typeof sb.labelInside !== 'boolean') sb.labelInside = true;
    if (typeof sb.labelOffsetX !== 'number' || !Number.isFinite(sb.labelOffsetX)) sb.labelOffsetX = 0;
    if (typeof sb.labelOffsetY !== 'number' || !Number.isFinite(sb.labelOffsetY)) sb.labelOffsetY = 0;
    // 機能 6: ラベル文字サイズ (legacy state では欠如する)
    if (typeof sb.labelFontSize !== 'number' || !Number.isFinite(sb.labelFontSize) || sb.labelFontSize <= 0) {
      sb.labelFontSize = 22;
    }
  }
  // Panel 1 (narration) — backfill defaults if absent on legacy state.
  // VC 推測ロジックは singleBox と同じく pono.boxW から行う。
  if (!parsed.narration || typeof parsed.narration !== 'object') {
    const pw = Number(parsed.pono && parsed.pono.boxW) || 0;
    let inferredVC = 'B';
    if (pw >= 1200) inferredVC = 'D';
    else if (pw >= 520) inferredVC = 'C';
    const nd = (() => {
      if (inferredVC === 'B') return { width: 880,  bottom: 60, fontSize: 30, paddingY: 22, paddingX: 28 };
      if (inferredVC === 'C') return { width: 1500, bottom: 90, fontSize: 44, paddingY: 28, paddingX: 36 };
      return { width: 2000, bottom: 90, fontSize: 52, paddingY: 32, paddingX: 40 };
    })();
    parsed.narration = {
      width: nd.width,
      height: 0,
      heightAuto: true,
      posMode: 'bottom',
      bottom: nd.bottom,
      top: 80,
      left: 0,
      paddingY: nd.paddingY,
      paddingX: nd.paddingX,
      fontSize: nd.fontSize,
      // 機能 7 (2026-05-08): 行間 既定 (本番 .op-narration の 1.55 と揃える)。
      lineHeight: 1.55,
      textAlignH: 'center',
      textAlignV: 'center',
      bgMode: 'css',
      bgImage: DEFAULT_FRAME_ID,
      bgColor: '#fffdf4',
      bgOpacity: 0.92,
      borderRadius: 24,
      showShadow: true,
      aspectLock: false,
      aspectLockRatio: 0
    };
  } else {
    const nr = parsed.narration;
    if (typeof nr.width !== 'number' || !Number.isFinite(nr.width) || nr.width <= 0) nr.width = 1200;
    if (typeof nr.height !== 'number' || !Number.isFinite(nr.height) || nr.height < 0) nr.height = 0;
    if (typeof nr.heightAuto !== 'boolean') nr.heightAuto = (nr.height <= 0);
    if (nr.posMode !== 'top' && nr.posMode !== 'bottom' && nr.posMode !== 'free') nr.posMode = 'bottom';
    if (typeof nr.bottom !== 'number' || !Number.isFinite(nr.bottom)) nr.bottom = 80;
    if (typeof nr.top !== 'number' || !Number.isFinite(nr.top)) nr.top = 80;
    if (typeof nr.left !== 'number' || !Number.isFinite(nr.left)) nr.left = 0;
    if (typeof nr.paddingY !== 'number' || !Number.isFinite(nr.paddingY) || nr.paddingY < 0) nr.paddingY = 24;
    if (typeof nr.paddingX !== 'number' || !Number.isFinite(nr.paddingX) || nr.paddingX < 0) nr.paddingX = 32;
    if (typeof nr.fontSize !== 'number' || !Number.isFinite(nr.fontSize) || nr.fontSize <= 0) nr.fontSize = 36;
    // 機能 7 (2026-05-08): 行間 (line-height) — legacy state では欠如する。
    if (typeof nr.lineHeight !== 'number' || !Number.isFinite(nr.lineHeight) || nr.lineHeight <= 0) {
      nr.lineHeight = 1.55;
    } else if (nr.lineHeight < 1.0) {
      nr.lineHeight = 1.0;
    } else if (nr.lineHeight > 3.0) {
      nr.lineHeight = 3.0;
    }
    if (nr.textAlignH !== 'left' && nr.textAlignH !== 'center' && nr.textAlignH !== 'right') nr.textAlignH = 'center';
    if (nr.textAlignV !== 'top' && nr.textAlignV !== 'center' && nr.textAlignV !== 'bottom') nr.textAlignV = 'center';
    if (typeof nr.bgColor !== 'string' || !/^#[0-9a-fA-F]{6}$/.test(nr.bgColor)) nr.bgColor = '#fffdf4';
    if (typeof nr.bgOpacity !== 'number' || !Number.isFinite(nr.bgOpacity)) nr.bgOpacity = 0.92;
    if (nr.bgOpacity < 0) nr.bgOpacity = 0;
    if (nr.bgOpacity > 1) nr.bgOpacity = 1;
    if (typeof nr.borderRadius !== 'number' || !Number.isFinite(nr.borderRadius) || nr.borderRadius < 0) nr.borderRadius = 24;
    if (typeof nr.showShadow !== 'boolean') nr.showShadow = true;
    // Image frame mode (画像フレーム機能) — backfill defaults if absent on legacy state.
    if (nr.bgMode !== 'css' && nr.bgMode !== 'image') nr.bgMode = 'css';
    if (typeof nr.bgImage !== 'string' || !FRAME_IDS.includes(nr.bgImage)) nr.bgImage = DEFAULT_FRAME_ID;
    if (typeof nr.aspectLock !== 'boolean') nr.aspectLock = false;
    if (typeof nr.aspectLockRatio !== 'number' || !Number.isFinite(nr.aspectLockRatio)) nr.aspectLockRatio = 0;
  }
  return parsed;
}

function load(vc) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + vc);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return migrateFrameIds(parsed);
  } catch (e) { return null; }
}
function save(vc) {
  try { localStorage.setItem(STORAGE_PREFIX + vc, JSON.stringify(state[vc])); } catch (e) {}
}
let _saveTimer = null;
function saveDebounced(vc) {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => save(vc), 200);
}

function toast(msg, kind) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (kind || 'ok');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { el.className = ''; }, 1800);
}

function makePonoThumb(v) {
  const div = document.createElement('div');
  div.className = 'preset-thumb';
  div.dataset.variant = v.name;
  const img = document.createElement('img');
  img.src = v.path;
  img.alt = v.name;
  const lbl = document.createElement('div');
  lbl.className = 'pname';
  lbl.textContent = v.name;
  div.appendChild(img);
  div.appendChild(lbl);
  div.addEventListener('click', () => {
    pushUndoSnapshot('Pono画像選択');
    const ponoState = state[currentVC].pono;
    ponoState.variant = v.name;
    // 新しい variant の perVariant 値を flat フィールドにキャッシュ
    // (entry が無ければ現 flat 値で lazy 作成)。
    syncFlatFromVariant(ponoState);
    save(currentVC);
    render();
    buildRightPane();
  });
  if (v.userAdded) {
    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'thumb-del';
    del.title = 'この画像を削除';
    del.textContent = '×';
    del.addEventListener('click', (e) => {
      e.stopPropagation();
      removeUserPonoVariant(v.name);
    });
    div.appendChild(del);
  }
  return div;
}

function makeFrameThumb(f) {
  const div = document.createElement('div');
  div.className = 'preset-thumb';
  div.dataset.frame = f.id;
  const img = document.createElement('img');
  img.src = f.path;
  img.alt = f.label;
  const lbl = document.createElement('div');
  lbl.className = 'pname';
  lbl.textContent = f.label;
  div.appendChild(img);
  div.appendChild(lbl);
  div.addEventListener('click', () => {
    const side = state[currentVC][currentTab];
    side.boxImage = f.id;
    if (side.boxMode !== 'image') side.boxMode = 'image';
    reapplyAspectLockAfterFrameChange(currentTab);
    save(currentVC);
    render();
    buildRightPane();
  });
  if (f.userAdded) {
    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'thumb-del';
    del.title = 'この画像を削除';
    del.textContent = '×';
    del.addEventListener('click', (e) => {
      e.stopPropagation();
      removeUserFrameImage(f.id);
    });
    div.appendChild(del);
  }
  return div;
}

function buildPresetGrid() {
  const ponoGrid = document.getElementById('pono-grid');
  PONO_VARIANTS.forEach(v => ponoGrid.appendChild(makePonoThumb(v)));
  const frameGrid = document.getElementById('frame-grid');
  FRAME_IMAGES.forEach(f => frameGrid.appendChild(makeFrameThumb(f)));
}

// === Drag & Drop: image add ============================================
const DROP_ACCEPT_TYPES = ['image/png', 'image/webp', 'image/jpeg', 'image/gif'];

function sanitizeIdBase(name) {
  // Strip extension, normalize to ASCII-safe slug. Empty -> 'image'.
  const base = String(name || '').replace(/\.[^./\\]+$/, '');
  let s = base
    .normalize('NFKD')
    .replace(/[^a-zA-Z0-9._-]+/g, '_')
    .replace(/^_+|_+$/g, '')
    .replace(/_+/g, '_');
  if (!s) s = 'image';
  // Avoid leading digits for safer use as variant key.
  if (/^\d/.test(s)) s = 'img_' + s;
  return s.slice(0, 64);
}

function uniquePonoName(seed) {
  const taken = new Set(PONO_VARIANTS.map(v => v.name));
  if (!taken.has(seed)) return seed;
  let i = 2;
  while (taken.has(seed + '_' + i)) i++;
  return seed + '_' + i;
}

function uniqueFrameId(seed) {
  const taken = new Set(FRAME_IMAGES.map(f => f.id));
  if (!taken.has(seed)) return seed;
  let i = 2;
  while (taken.has(seed + '_' + i)) i++;
  return seed + '_' + i;
}

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(String(fr.result || ''));
    fr.onerror = () => reject(fr.error || new Error('FileReader error'));
    fr.readAsDataURL(file);
  });
}

// Drop した画像を canvas でリサイズ + webp 変換してデータ URL に最適化する。
// - GIF はアニメ崩壊防止のためスキップして原寸のまま返す
// - 長辺 1200px キャップ (アップスケールはしない)
// - 透過は維持 (白塗り無し)
// - webp 非対応ブラウザでは PNG/原寸を返す
// - 劣化させても 80% 未満まで縮まなかった場合は原寸を採用
// - 1.5MB 以上の入力では開始時に短時間 toast を表示
// - 失敗時は常に原寸 dataURL にフォールバック
function optimizeDroppedImage(file) {
  const SIZE_TOAST_THRESHOLD = 1.5 * 1024 * 1024;
  const MAX_EDGE = 1200;
  const QUALITY = 0.85;
  const MIN_REDUCTION_RATIO = 0.8; // optimized が原寸の 80% 以上なら採用しない
  return readFileAsDataURL(file).then(originalUrl => {
    try {
      // GIF はスキップ (アニメーションを失わないため)
      if (file && file.type === 'image/gif') return originalUrl;
      if (file && file.size >= SIZE_TOAST_THRESHOLD) {
        try { toast('画像を最適化中…', 'ok'); } catch (_) {}
      }
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          try {
            const w = img.naturalWidth || 0;
            const h = img.naturalHeight || 0;
            if (w <= 0 || h <= 0) { resolve(originalUrl); return; }
            const MAX_PIXELS = 4000 * 4000; // 16MP cap to avoid decompression-bomb OOM
            if (w * h > MAX_PIXELS) { resolve(originalUrl); return; }
            const maxEdge = Math.max(w, h);
            const scale = maxEdge > MAX_EDGE ? (MAX_EDGE / maxEdge) : 1.0;
            const tw = Math.max(1, Math.round(w * scale));
            const th = Math.max(1, Math.round(h * scale));
            const canvas = document.createElement('canvas');
            canvas.width = tw;
            canvas.height = th;
            const ctx = canvas.getContext('2d');
            if (!ctx) { resolve(originalUrl); return; }
            // 透過維持 (白塗りせずそのまま描画)
            ctx.drawImage(img, 0, 0, tw, th);
            let optimized = '';
            try {
              optimized = canvas.toDataURL('image/webp', QUALITY);
            } catch (_) {
              optimized = '';
            }
            // webp が非対応のブラウザでは prefix が image/png 等にフォールバックする
            if (!optimized || optimized.indexOf('data:image/webp') !== 0) {
              resolve(originalUrl);
              return;
            }
            // 縮小効果が薄い (>=80%) 場合は原寸を採用
            if (optimized.length >= originalUrl.length * MIN_REDUCTION_RATIO) {
              resolve(originalUrl);
              return;
            }
            resolve(optimized);
          } catch (_) {
            resolve(originalUrl);
          }
        };
        img.onerror = () => resolve(originalUrl);
        img.src = originalUrl;
      });
    } catch (_) {
      return originalUrl;
    }
  });
}

// Fix B-5: cap dropped image size to keep localStorage and DOM responsive.
const DROP_FILE_MAX_BYTES = 10 * 1024 * 1024;

function addDroppedPonoFile(file) {
  if (file && file.size > DROP_FILE_MAX_BYTES) {
    toast(`${file.name} は 10MB を超えるため受け付けられません`, 'err');
    return Promise.resolve(null);
  }
  return optimizeDroppedImage(file).then(dataUrl => {
    const baseLabel = String(file.name || 'pono').replace(/\.[^./\\]+$/, '') || 'pono';
    const id = uniquePonoName(sanitizeIdBase(file.name));
    const variant = { name: id, path: dataUrl, userAdded: true, label: baseLabel };
    PONO_VARIANTS.push(variant);
    // Persist; on QuotaExceededError, rollback the push so the in-memory state
    // matches what is on disk.
    const ok = saveDroppedAssets();
    if (ok === false) {
      const idx = PONO_VARIANTS.lastIndexOf(variant);
      if (idx >= 0) PONO_VARIANTS.splice(idx, 1);
      toast('ストレージ容量を超えました。既存の追加画像を削除してください', 'err');
      return null;
    }
    const grid = document.getElementById('pono-grid');
    if (grid) grid.appendChild(makePonoThumb(variant));
    return variant;
  });
}

function addDroppedFrameFile(file) {
  if (file && file.size > DROP_FILE_MAX_BYTES) {
    toast(`${file.name} は 10MB を超えるため受け付けられません`, 'err');
    return Promise.resolve(null);
  }
  return optimizeDroppedImage(file).then(dataUrl => {
    const baseLabel = String(file.name || 'frame').replace(/\.[^./\\]+$/, '') || 'frame';
    const id = uniqueFrameId(sanitizeIdBase(file.name));
    const frame = { id: id, label: baseLabel, path: dataUrl, userAdded: true };
    FRAME_IMAGES.push(frame);
    FRAME_IDS.push(id);
    // Persist; on QuotaExceededError, rollback the push.
    const ok = saveDroppedAssets();
    if (ok === false) {
      const fi = FRAME_IMAGES.lastIndexOf(frame);
      if (fi >= 0) FRAME_IMAGES.splice(fi, 1);
      const idi = FRAME_IDS.lastIndexOf(id);
      if (idi >= 0) FRAME_IDS.splice(idi, 1);
      toast('ストレージ容量を超えました。既存の追加画像を削除してください', 'err');
      return null;
    }
    // Compute natural aspect for aspect-lock support; persist again once known.
    const im = new Image();
    im.onload = () => {
      if (im.naturalWidth > 0 && im.naturalHeight > 0) {
        FRAME_NATURAL_ASPECT[id] = im.naturalWidth / im.naturalHeight;
        // Best-effort persist of the cached aspect; failure here is non-fatal.
        try { saveDroppedAssets(); } catch (_) {}
        try { onFrameAspectLoaded(id); } catch (e) {}
      }
    };
    im.src = dataUrl;
    const grid = document.getElementById('frame-grid');
    if (grid) grid.appendChild(makeFrameThumb(frame));
    return frame;
  });
}

function removeUserPonoVariant(name) {
  const idx = PONO_VARIANTS.findIndex(v => v.name === name);
  if (idx < 0) return;
  if (!PONO_VARIANTS[idx].userAdded) return; // safety: never delete originals
  PONO_VARIANTS.splice(idx, 1);
  // Persist removal (a remove can never trip Quota; ignore result).
  try { saveDroppedAssets(); } catch (_) {}
  // If any side currently uses this variant, fall back to the first available.
  const fallback = (PONO_VARIANTS[0] && PONO_VARIANTS[0].name) || 'dance_hi';
  ['B', 'C', 'D'].forEach(vc => {
    const p = state[vc] && state[vc].pono;
    if (!p) return;
    if (p.variant === name) {
      p.variant = fallback;
      // 新 variant の perVariant 値を flat にキャッシュ
      try { syncFlatFromVariant(p); } catch (_) {}
    }
    // perVariant エントリを削除
    if (p.perVariant && p.perVariant[name]) {
      delete p.perVariant[name];
    }
    save(vc);
  });
  // Rebuild the pono grid (simpler than removing a single element while
  // preserving selection styling).
  const grid = document.getElementById('pono-grid');
  if (grid) {
    grid.textContent = '';
    PONO_VARIANTS.forEach(v => grid.appendChild(makePonoThumb(v)));
  }
  render();
  buildRightPane();
  toast('Pono画像を削除しました', 'ok');
}

function removeUserFrameImage(id) {
  const idx = FRAME_IMAGES.findIndex(f => f.id === id);
  if (idx < 0) return;
  if (!FRAME_IMAGES[idx].userAdded) return; // safety
  FRAME_IMAGES.splice(idx, 1);
  const idIdx = FRAME_IDS.indexOf(id);
  if (idIdx >= 0) FRAME_IDS.splice(idIdx, 1);
  delete FRAME_NATURAL_ASPECT[id];
  // Persist removal (a remove can never trip Quota; ignore result).
  try { saveDroppedAssets(); } catch (_) {}
  const fallback = DEFAULT_FRAME_ID;
  ['B', 'C', 'D'].forEach(vc => {
    if (!state[vc]) return;
    ['pono', 'hakase'].forEach(sk => {
      const sd = state[vc][sk];
      if (sd && sd.boxImage === id) {
        sd.boxImage = fallback;
      }
    });
    if (state[vc].singleBox && state[vc].singleBox.boxImage === id) {
      state[vc].singleBox.boxImage = fallback;
    }
    save(vc);
  });
  const grid = document.getElementById('frame-grid');
  if (grid) {
    grid.textContent = '';
    FRAME_IMAGES.forEach(f => grid.appendChild(makeFrameThumb(f)));
  }
  render();
  buildRightPane();
  toast('フレーム画像を削除しました', 'ok');
}

function handleDroppedFiles(target, fileList) {
  const files = Array.from(fileList || []);
  if (files.length === 0) return;
  const accepted = files.filter(f => DOM_FILE_LOOKS_LIKE_IMAGE(f));
  const rejected = files.length - accepted.length;
  if (accepted.length === 0) {
    toast('対応していないファイル形式です (PNG/WebP/JPEG/GIF)', 'err');
    return;
  }
  const adder = target === 'pono' ? addDroppedPonoFile : addDroppedFrameFile;
  Promise.all(accepted.map(f => adder(f).catch(err => {
    console.warn('drop add failed', err);
    return null;
  }))).then(results => {
    const ok = results.filter(Boolean).length;
    if (ok > 0) {
      const label = target === 'pono' ? 'Pono画像' : 'フレーム画像';
      const suffix = rejected > 0 ? `（${rejected}件は形式不一致でスキップ）` : '';
      toast(`${label}を ${ok} 件追加しました${suffix}（削除は × ボタンで）`, 'ok');
    } else if (rejected > 0) {
      toast('対応していないファイル形式です', 'err');
    }
  });
}

function DOM_FILE_LOOKS_LIKE_IMAGE(file) {
  if (!file) return false;
  if (file.type && DROP_ACCEPT_TYPES.includes(file.type)) return true;
  // Some browsers may not set type for certain drops; fall back to extension sniff.
  const name = String(file.name || '').toLowerCase();
  return /\.(png|webp|jpe?g|gif)$/.test(name);
}

function bindDropZones() {
  const zones = [
    { el: document.getElementById('pono-section'),  target: 'pono' },
    { el: document.getElementById('frame-section'), target: 'frame' }
  ];
  // Block default drop behavior on the document so files aren't navigated to.
  ['dragenter', 'dragover', 'drop'].forEach(evt => {
    document.addEventListener(evt, (e) => {
      // Only swallow if it's a file drag; allow normal text/dom drag elsewhere.
      const dt = e.dataTransfer;
      if (dt && Array.from(dt.types || []).includes('Files')) {
        e.preventDefault();
      }
    });
  });
  zones.forEach(({ el, target }) => {
    if (!el) return;
    let depth = 0;
    el.addEventListener('dragenter', (e) => {
      const dt = e.dataTransfer;
      if (!dt || !Array.from(dt.types || []).includes('Files')) return;
      e.preventDefault();
      depth++;
      el.classList.add('is-drop-target');
    });
    el.addEventListener('dragover', (e) => {
      const dt = e.dataTransfer;
      if (!dt || !Array.from(dt.types || []).includes('Files')) return;
      e.preventDefault();
      try { dt.dropEffect = 'copy'; } catch (_) {}
    });
    el.addEventListener('dragleave', (e) => {
      const dt = e.dataTransfer;
      if (!dt || !Array.from(dt.types || []).includes('Files')) return;
      depth = Math.max(0, depth - 1);
      if (depth === 0) el.classList.remove('is-drop-target');
    });
    el.addEventListener('drop', (e) => {
      const dt = e.dataTransfer;
      if (!dt) return;
      e.preventDefault();
      depth = 0;
      el.classList.remove('is-drop-target');
      handleDroppedFiles(target, dt.files);
    });
  });
}
// === end Drag & Drop ===================================================

function aspectFromSlot(s) {
  if (s.slotAspect === 'free') return null;
  if (s.slotAspect === 'fixed_0.75') return 0.75;
  if (s.slotAspect === 'fixed_1.0') return 1.0;
  if (s.slotAspect === 'fixed_1.23') return 1.23;
  return null;
}

// === Pono per-variant slot storage ====================================
// 表情/ポーズによって素材アスペクトが 0.55〜0.81 と違うので、同じ slot 寸法だと
// 見た目の体高が揃わない。variant ごとに専用 slot 値を保持し、variant 切替時に
// flat フィールド (pono.slotW etc.) を再同期する。flat フィールドは
// perVariant[currentVariant] の "キャッシュ" として機能 (applySideToDom や
// buildCSS など下流コードは flat 値しか読まない)。
const PONO_PER_VARIANT_KEYS = ['slotW', 'slotH', 'slotOffsetX', 'slotOffsetY', 'slotAspect', 'objectPosition'];

function ensurePerVariantBag(ponoState) {
  if (!ponoState) return null;
  if (!ponoState.perVariant || typeof ponoState.perVariant !== 'object') {
    ponoState.perVariant = {};
  }
  return ponoState.perVariant;
}

// Lazy-create the entry for `variantName` from current flat values, then return it.
function getOrCreateVariantSlot(ponoState, variantName) {
  const bag = ensurePerVariantBag(ponoState);
  if (!bag) return null;
  const v = variantName || ponoState.variant || 'dance_hi';
  let entry = bag[v];
  if (!entry || typeof entry !== 'object') {
    entry = {
      slotW: ponoState.slotW,
      slotH: ponoState.slotH,
      slotOffsetX: ponoState.slotOffsetX,
      slotOffsetY: ponoState.slotOffsetY,
      slotAspect: ponoState.slotAspect,
      objectPosition: ponoState.objectPosition
    };
    bag[v] = entry;
  }
  return entry;
}

// Copy flat slot fields <- perVariant[currentVariant]. Used after variant change
// or after migration to make sure flat values reflect the active variant.
function syncFlatFromVariant(ponoState) {
  if (!ponoState) return;
  const entry = getOrCreateVariantSlot(ponoState, ponoState.variant);
  if (!entry) return;
  PONO_PER_VARIANT_KEYS.forEach(k => {
    if (entry[k] !== undefined) ponoState[k] = entry[k];
  });
}

// Mirror a flat slot field write into perVariant[currentVariant].
// Called from any control that mutates pono slot fields.
function syncVariantFromFlat(ponoState, key) {
  if (!ponoState) return;
  if (!PONO_PER_VARIANT_KEYS.includes(key)) return;
  const entry = getOrCreateVariantSlot(ponoState, ponoState.variant);
  if (!entry) return;
  entry[key] = ponoState[key];
}
// === end Pono per-variant slot storage ================================

function ponoPathByName(name) {
  const v = PONO_VARIANTS.find(x => x.name === name);
  return v ? v.path : PONO_VARIANTS[0].path;
}
function framePathById(id) {
  const f = FRAME_IMAGES.find(x => x.id === id);
  return f ? f.path : FRAME_IMAGES[0].path;
}

// 機能 1: テキスト整列マッピング
function mapTextAlignH(h) {
  if (h === 'left') return 'flex-start';
  if (h === 'right') return 'flex-end';
  return 'center';
}
function mapTextAlignV(v) {
  if (v === 'top') return 'flex-start';
  if (v === 'bottom') return 'flex-end';
  return 'center';
}

// 機能 2: ラベルの 4 隅 anchor + inside/outside + offset から
// position プロパティ (top/bottom/left/right) を計算する。
// 反対側のプロパティは '' でクリアして前回値の残留を防ぐ。
function labelPositionStyle(anchor, inside, offX, offY) {
  const insideMargin = 16;
  const outsideMargin = -22;
  const margin = inside ? insideMargin : outsideMargin;
  const ox = Number(offX) || 0;
  const oy = Number(offY) || 0;
  const out = { top: '', bottom: '', left: '', right: '' };
  if (anchor === 'tl') {
    out.top = (margin + oy) + 'px';
    out.left = (insideMargin + ox) + 'px';
  } else if (anchor === 'tr') {
    out.top = (margin + oy) + 'px';
    out.right = (insideMargin - ox) + 'px';
  } else if (anchor === 'bl') {
    out.bottom = (margin - oy) + 'px';
    out.left = (insideMargin + ox) + 'px';
  } else { // 'br'
    out.bottom = (margin - oy) + 'px';
    out.right = (insideMargin - ox) + 'px';
  }
  return out;
}

function applyLabelPosition(labelEl, anchor, inside, offX, offY, fontSize) {
  if (!labelEl) return;
  const p = labelPositionStyle(anchor, inside, offX, offY);
  labelEl.style.top = p.top;
  labelEl.style.bottom = p.bottom;
  labelEl.style.left = p.left;
  labelEl.style.right = p.right;
  // 機能 6: ラベル文字サイズ (px). 不正値はクリアして CSS 既定にフォールバック。
  if (typeof fontSize === 'number' && Number.isFinite(fontSize) && fontSize > 0) {
    labelEl.style.fontSize = fontSize + 'px';
  } else {
    labelEl.style.fontSize = '';
  }
}

  slot.style.transform = `translate(calc(-50% + ${s.slotOffsetX}px), calc(-50% + ${s.slotOffsetY}px))`;
  img.style.objectPosition = `${s.objectPosition === 'top' ? 'top' : s.objectPosition === 'center' ? 'center' : 'bottom'} center`;

  // 機能 7 (2026-05-08): 行間 (line-height) + textarea \n をそのまま改行表示。

  if (typeof s.lineHeight === 'number' && Number.isFinite(s.lineHeight) && s.lineHeight > 0) {

  txt.style.whiteSpace = 'pre-wrap';

// Convert #rrggbb + alpha (0..1) to "rgba(r, g, b, a)" string.
// Falls back to the input hex when parsing fails (no alpha applied).
function hexToRgba(hex, alpha) {
  const s = String(hex || '').trim();
  const m = /^#([0-9a-fA-F]{6})$/.exec(s);
  if (!m) return s || 'rgba(255,253,244,0.92)';
  const n = parseInt(m[1], 16);
  const r = (n >> 16) & 0xff;
  const g = (n >> 8) & 0xff;
  const b = n & 0xff;
  let a = Number(alpha);
  if (!Number.isFinite(a)) a = 1;
  if (a < 0) a = 0;
  if (a > 1) a = 1;
  return `rgba(${r}, ${g}, ${b}, ${a})`;
}

function applyNarrationToDom() {
  const el = document.getElementById('op-narration-preview');
  if (!el) return;
  const nr = state[currentVC] && state[currentVC].narration;
  if (!nr) return;
  // Clear all positional props first to avoid leftover values when posMode flips.
  el.style.top = '';
  el.style.bottom = '';
  el.style.left = '50%';
  el.style.right = '';
  el.style.width = nr.width + 'px';
  el.style.maxWidth = 'calc(100% - 32px)';
  if (nr.heightAuto || !nr.height || nr.height <= 0) {
    el.style.height = '';
  } else {
    el.style.height = nr.height + 'px';
  }
  if (nr.posMode === 'top') {
    el.style.top = (Number(nr.top) || 0) + 'px';
  } else if (nr.posMode === 'bottom') {
    el.style.bottom = (Number(nr.bottom) || 0) + 'px';
  } else { // 'free' — use top from the same field but allow free pos
    el.style.top = (Number(nr.top) || 0) + 'px';
  }
  el.style.padding = (Number(nr.paddingY) || 0) + 'px ' + (Number(nr.paddingX) || 0) + 'px';
  el.style.fontSize = (Number(nr.fontSize) || 36) + 'px';
  // 機能 7 (2026-05-08): 行間 (line-height)。
  if (typeof nr.lineHeight === 'number' && Number.isFinite(nr.lineHeight) && nr.lineHeight > 0) {
    el.style.lineHeight = String(nr.lineHeight);
  } else {
    el.style.lineHeight = '';
  }
  // 保険: 既存ルールでベース pre-wrap が入っているが、インライン保証も入れる。
  el.style.whiteSpace = 'pre-wrap';
  el.style.textAlign = nr.textAlignH || 'center';
  el.style.display = (panelMode === 'narration') ? 'flex' : 'none';
  el.style.alignItems = mapTextAlignV(nr.textAlignV);
  el.style.justifyContent = mapTextAlignH(nr.textAlignH);
  el.style.flexDirection = 'column';
  // 背景: bgMode によって CSS 単色 or 画像フレームを切り替える。
  // 重要: el.style.background = '' を最後に書くと shorthand が全 longhand を
  //       リセットしてしまうため、各分岐の **先頭** で 1 回だけリセットする。
  el.style.background = '';
  if (nr.bgMode === 'image') {
    el.style.backgroundImage = 'url("' + framePathById(nr.bgImage) + '")';
    el.style.backgroundSize = '100% 100%';
    el.style.backgroundRepeat = 'no-repeat';
    el.style.backgroundColor = 'transparent';
    // 画像フレーム時は border-radius / box-shadow を打ち消す
    // (フレーム画像の枠デザインを優先し、二重枠を避ける)。
    el.style.borderRadius = '0';
    el.style.boxShadow = 'none';
  } else {
    // CSS モード (既存挙動): 単色 + opacity + 角丸 + shadow。
    el.style.backgroundImage = 'none';
    el.style.backgroundSize = '';
    el.style.backgroundRepeat = '';
    el.style.backgroundColor = hexToRgba(nr.bgColor, nr.bgOpacity);
    el.style.borderRadius = (Number(nr.borderRadius) || 0) + 'px';
    el.style.boxShadow = nr.showShadow
      ? '0 10px 24px rgba(0,0,0,0.35), 0 0 0 2px rgba(120,80,30,0.18) inset'
      : 'none';
  }
  // Sample text — textContent insertion only (no innerHTML), preserves \n via white-space:pre-wrap.
  el.textContent = NARRATION_SAMPLE_TEXT;
}

function renderHeightGuides() {
  const guides = document.getElementById('height-guides');
  if (!guides) return;
  guides.classList.toggle('is-on', !!showHeightGuides);
  guides.textContent = '';
  if (!showHeightGuides) return;
  const stage = document.getElementById('stage');
  if (!stage) return;
  const stageRect = stage.getBoundingClientRect();
  // Note: rect dims are post-CSS-scale; convert by inverse of scale.
  const wrap = document.getElementById('stage-wrap');
  const m = wrap && wrap.style.transform ? /scale\(([0-9.]+)\)/.exec(wrap.style.transform) : null;
  const sc = m ? Number(m[1]) : 1;
  const inv = sc > 0 ? 1 / sc : 1;

  function buildLine(klass, topPx, labelText) {
    const line = document.createElement('div');
    line.className = 'hg-line ' + klass;
    line.style.top = topPx + 'px';
    const lbl = document.createElement('span');
    lbl.className = 'hg-label';
    lbl.textContent = labelText;
    line.appendChild(lbl);
    guides.appendChild(line);
  }

  ['pono', 'hakase'].forEach(sideKey => {
    const slot = document.getElementById('slot-' + sideKey);
    if (!slot) return;
    const r = slot.getBoundingClientRect();
    const topY = (r.top - stageRect.top) * inv;
    const botY = (r.bottom - stageRect.top) * inv;
    const tag = sideKey === 'pono' ? 'P' : 'H';
    const cls = sideKey === 'pono' ? 'hg-pono' : 'hg-hakase';
    buildLine(cls + ' hg-top', Math.round(topY), tag + ' 上 (y=' + Math.round(topY) + ')');
    buildLine(cls + ' hg-bot', Math.round(botY), tag + ' 下 (y=' + Math.round(botY) + ')');
  });
}

function render() {
  const stage = document.getElementById('stage');
  stage.dataset.vc = currentVC;
  stage.dataset.singleBox = singleBoxMode ? 'on' : 'off';
  // dataset.panel: scenario モードでは選択中パネルの kind に追従する (applyScenarioPreview 内)。
  // narration/dialog モードはこれまで通り。
  if (panelMode === 'scenario') {
    // 一旦 dialog で初期化 → applyScenarioPreview() が選択 panel に応じて narration/dialog 書き換え。
    stage.dataset.panel = 'dialog';
  } else {
    stage.dataset.panel = (panelMode === 'narration') ? 'narration' : 'dialog';
  }
  applySideToDom('pono');
  applySideToDom('hakase');
  applySingleBoxToDom();
  applyNarrationToDom();
  // シナリオモードのときだけ、選択中の line/panel をプレビューに上書き反映。
  if (panelMode === 'scenario') {
    applyScenarioPreview();
  }

  const sp = state[currentVC].speaker;
  document.getElementById('side-pono').classList.toggle('is-speaking', sp === 'pono');
  document.getElementById('side-hakase').classList.toggle('is-speaking', sp === 'hakase');

  document.querySelectorAll('#pono-grid .preset-thumb').forEach(el => {
    el.classList.toggle('selected', el.dataset.variant === state[currentVC].pono.variant);
  });
  document.querySelectorAll('#frame-grid .preset-thumb').forEach(el => {
    const sideFrame = state[currentVC][currentTab].boxImage;
    el.classList.toggle('selected', el.dataset.frame === sideFrame);
  });

  document.querySelectorAll('#vp-group input').forEach(r => { r.checked = (r.value === currentVC); });
  document.querySelectorAll('#speaker-row label').forEach(lb => {
    lb.classList.toggle('checked', lb.dataset.val === sp);
    const inp = lb.querySelector('input');
    if (inp) inp.checked = (lb.dataset.val === sp);
  });
  document.querySelectorAll('#tab-bar button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === currentTab);
  });

  rescaleStage();
  renderHeightGuides();
  renderBoxGuides();
}

function rescaleStage() {
  const wrap = document.getElementById('stage-wrap');
  const center = document.getElementById('center');
  const [w, h] = VP_DIMS[currentVC];
  const padding = 40;
  const availW = Math.max(100, center.clientWidth - padding);
  const availH = Math.max(100, center.clientHeight - padding);
  const scale = Math.min(availW / w, availH / h, 1);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = w + 'px';
  wrap.style.height = h + 'px';
  const info = document.getElementById('scale-info');
  if (info) {
    info.textContent = (scale * 100).toFixed(0) + '% (実寸 ' + w + '×' + h + ')';
  }
}

// Per-control re-sync hooks so aspect-lock can update a sibling control's UI

// Single-box analog (key: 'boxW' / 'boxH' / 'boxY' / 'boxPadding' / 'fontSize' / etc.).

// Narration analog (key: 'width' / 'height' / 'paddingY' / etc.).
// Used by narration aspect-lock so width <-> height changes refresh sibling UI

const _narrRangeSyncMap = {};
function syncNarrRangeUi(key) {
  const fn = _narrRangeSyncMap[key];
  if (typeof fn === 'function') fn();
