    <div class="item-card-name">デフォルトの${label}</div>
    <div class="item-badge badge-owned">もどす</div>`;
  card.addEventListener('click', () => {
    delete cfg[cat];
    saveState();
    refreshArea(currentAreaId);
    renderShopGrid(cat);
    showToast(`🔄 デフォルトの${label}にもどしたよ！`);
  });
  grid.appendChild(card);
}

function renderShopGrid(cat) {
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  const cfg = state.config[currentAreaId] || {};

  // Phase 3: 絵本層は家具/かざりを 10種に絞る。サブスクは全種。
  // 壁/床 (wall/floor) は背景扱いで制限しない (tier.js 側で true を返す)。
  const _tierFilter = (item) => {
    if (!window.PonoTier || typeof window.PonoTier.isRoomItemUnlocked !== 'function') return true;
    return window.PonoTier.isRoomItemUnlocked(item.id, item.cat);
  };
  const _isBookTier = !!(window.PonoTier && window.PonoTier.isBook && window.PonoTier.isBook());

  if (shopMode === 'buy') {
    // 買うモード: 未購入アイテムのみ表示（所持済みはグレーアウト、defaultは除外）
    const items = ROOM_ITEMS.filter(item => item.cat === cat && !item.default && !item.hidden && _tierFilter(item));
    const unowned = items.filter(item => !isOwned(item.id));
    const owned   = items.filter(item =>  isOwned(item.id));

    if (unowned.length === 0 && owned.length > 0) {
      // 全部買い済み
      const msg = document.createElement('div');
      msg.className = 'inv-empty';
      msg.innerHTML = `<div class="inv-empty-icon">🎉</div>
        <div class="inv-empty-msg">このカテゴリは ぜんぶ もってるよ！<br>てもちからかざってみよう！</div>
        <button class="inv-empty-btn" onclick="setShopMode('bag')">🎒 てもちをみる</button>`;
      grid.appendChild(msg);
      return;
    }

    unowned.forEach(item => {
      const card = _makeShopCard(item, 'buy', cfg);
      grid.appendChild(card);
    });

    // 所持済みは小さく表示（区切り後）
    if (owned.length > 0) {
      const sep = document.createElement('div');
      sep.style.cssText = 'grid-column:1/-1;font-size:11px;color:#aaa;padding:6px 4px 0;border-top:1px dashed #eee;';
      sep.textContent = '── もってるもの ──';
      grid.appendChild(sep);
      owned.forEach(item => {
        const card = _makeShopCard(item, 'owned', cfg);
        grid.appendChild(card);
      });
    }

    // 壁・床: デフォルトに戻すカード（一番最後）
    _makeResetCard(cat, cfg, grid);

    // Phase 3: 絵本層で家具/かざりカテゴリなら "まいつき ふえるよ" ヒントを追加
    if (_isBookTier && (cat === 'furn' || cat === 'deco')) {
      _appendTierPromoHint(grid);
    }

  } else {
    // てもちモード: 所持済みアイテムのみ表示 (tier 制限も適用)
    const owned = ROOM_ITEMS.filter(item => item.cat === cat && !item.hidden && isOwned(item.id) && _tierFilter(item));

    if (owned.length === 0) {
      const msg = document.createElement('div');
      msg.className = 'inv-empty';
      msg.innerHTML = `<div class="inv-empty-icon">🛍️</div>
        <div class="inv-empty-msg">まだ なにも もってないよ。<br>ポイントで かってみよう！</div>
        <button class="inv-empty-btn" onclick="setShopMode('buy')">🛍️ かいにいく</button>`;
      grid.appendChild(msg);
      return;
    }

    owned.forEach(item => {
      const card = _makeShopCard(item, 'place', cfg);
      grid.appendChild(card);
    });

    // 壁・床: デフォルトに戻すカード（一番最後）
    _makeResetCard(cat, cfg, grid);
  }
}

function _isItemPlaced(item, cfg) {
  if (item.cat === 'wall' || item.cat === 'floor') return cfg[item.cat] === item.id;
  const placedList = cfg.placed || getPlacedItems(cfg);
  return placedList.some(p => p.id === item.id);
}

// Phase 3: 絵本層の shop 末尾に "サブスクでもっと" ヒントカードを挿入
function _appendTierPromoHint(grid) {
  if (grid.querySelector('.tier-promo-hint')) return;
  const hint = document.createElement('div');
  hint.className = 'tier-promo-hint';
  hint.style.cssText = 'grid-column:1/-1;margin-top:8px;padding:14px;border-radius:14px;'
    + 'background:linear-gradient(135deg,#E0F2FE,#DBEAFE);'
    + 'text-align:center;font-weight:700;color:#1E3A8A;cursor:pointer;'
    + 'box-shadow:0 2px 8px rgba(0,0,0,0.08);';
  hint.innerHTML = '<div style="font-size:1.4rem;margin-bottom:4px">✨</div>'
    + '<div style="font-size:0.9rem">かぐ も かざり も、サブスクで まいつき ふえていくよ！</div>';
  hint.addEventListener('click', function() {
    if (window.PonoTier && typeof window.PonoTier.showSubscribePromo === 'function') {
      window.PonoTier.showSubscribePromo({
        title: 'もっと たくさん あるよ！',
        body: 'サブスクで あたらしい かぐ や かざり が まいつき ふえていくよ！'
      });
    }
  });
  grid.appendChild(hint);
}

function _makeShopCard(item, mode, cfg) {
  const placed = _isItemPlaced(item, cfg);
  let cardClass = 'item-card';
  if (mode === 'owned')  cardClass += ' locked';
  if (mode === 'place' && placed) cardClass += ' placed';
  if (mode === 'place' && !placed) cardClass += ' owned';

  const card = document.createElement('div');
  card.className = cardClass;

  const prev = makeItemPreview(item);
  const name = Object.assign(document.createElement('div'), {className: 'item-card-name', textContent: item.name});

  const badge = document.createElement('div');
  if (mode === 'buy') {
    // スタンプ報酬に移行済み。未所持アイテムはロック表示のみ
    badge.className = 'item-badge badge-lock';
    badge.style.background = '#f5f5f5';
    badge.style.color = '#999';
    badge.textContent = '🔒 スタンプで';
  } else if (mode === 'owned') {
    badge.className = 'item-badge badge-owned';
    badge.textContent = 'もってる ✓';
  } else { // place
    badge.className = 'item-badge ' + (placed ? 'badge-placed' : 'badge-owned');
    badge.textContent = placed ? 'しまう 📦' : 'おく！';
  }

  card.appendChild(prev);
  card.appendChild(name);
  card.appendChild(badge);

  if (mode === 'place' && !placed) card.addEventListener('click', () => placeItem(item));
  if (mode === 'place' && placed)  card.addEventListener('click', () => unplaceItem(item));

  return card;
}

function placeItem(item) {
  if (!state.config[currentAreaId]) state.config[currentAreaId] = {};
  const cfg = state.config[currentAreaId];

  if (item.cat === 'wall' || item.cat === 'floor') {
    // 壁・床は直接上書き（従来通り）
    cfg[item.cat] = item.id;
  } else {
    // 家具・かざりは placed 配列で管理
    if (!cfg.placed) cfg.placed = getPlacedItems(cfg);
    // 同じアイテムがすでにあれば位置を維持、なければ空きセルに追加
    if (!cfg.placed.find(p => p.id === item.id)) {
      let row = item.gridRow ?? 3;
      let col = item.gridCol ?? 3;
      // 衝突している場合は空きセルを探す
      const pos = findNearestEmpty(currentAreaId, row, col, item.id, item, 'A');
      cfg.placed.push({ id: item.id, row: pos.row, col: pos.col, angle: 'A' });
    }
    // 旧キーを削除
    delete cfg.furn; delete cfg.deco;
  }
  saveState();
  refreshArea(currentAreaId);
  renderShopGrid(item.cat);
  document.getElementById('shop-ov').classList.add('hidden');
  _shiftRoom(false);
  showToast(`✨ ${item.name} をかざったよ！`);
  // 家具・かざりを飾った後は自動でもようがえモードON（すぐ位置調整できるように）
  if (item.cat === 'furn' || item.cat === 'deco') {
    if (typeof window._setEditMode === 'function') window._setEditMode(true);
  }
}

function unplaceItem(item) {
  const cfg = state.config[currentAreaId];
  if (!cfg) return;
  if (item.cat === 'wall' || item.cat === 'floor') {
    if (cfg[item.cat] === item.id) delete cfg[item.cat];
  } else {
    if (!cfg.placed) cfg.placed = getPlacedItems(cfg);
    cfg.placed = cfg.placed.filter(p => p.id !== item.id);
  }
  saveState();
  refreshArea(currentAreaId);
  renderShopGrid(item.cat);
  showToast(`📦 ${item.name} をしまったよ！`);
}

function isGardenUnlocked() {
  try {
    const raw = localStorage.getItem('pono_egg_state');
    if (!raw) return false;
    const egg = JSON.parse(raw);
    // Check if any slot reached STAGE_KID (growthPts >= 30)
    if (egg.slots) {
      for (const s of egg.slots) {
        if (s && s.growthPts >= 30) return true;
      }
    }
    return false;
  } catch (e) { return false; }
}

let _eggModalSlot = null;
let _timeBonus = 0; // multiplier for first action after long absence

function loadEggState() {
  try {
    const raw = localStorage.getItem('pono_egg_state');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function saveEggState(eggState) {
  localStorage.setItem('pono_egg_state', JSON.stringify(eggState));
}

function getActiveEggSlot(eggState) {
  if (!eggState || !eggState.slots) return null;
  return eggState.slots.find(s => s !== null) || null;
}

function getEggStage(growthPts) {
  if (growthPts >= EGG_THRESHOLDS[3]) return EGG_STAGE_ADULT;
  if (growthPts >= EGG_THRESHOLDS[2]) return EGG_STAGE_KID;
  if (growthPts >= EGG_THRESHOLDS[1]) return EGG_STAGE_BABY;
  return EGG_STAGE_EGG;
}

function openEggModal() {
  const eggState = loadEggState();
  if (!eggState) return;
  _eggModalSlot = getActiveEggSlot(eggState);
  if (!_eggModalSlot) return;

  // Check time-away bonus
  _timeBonus = 0;
  if (_eggModalSlot.lastCareAt) {
    const hours = (Date.now() - _eggModalSlot.lastCareAt) / 3600000;
    if (hours >= 24) _timeBonus = 3;
    else if (hours >= 6) _timeBonus = 2;
  }

  refreshEggModal();
  document.getElementById('egg-modal').classList.remove('hidden');

  // Show time-away greeting
  if (_timeBonus > 0) {
    const msg = _timeBonus >= 3 ? 'さみしかったよ…💧' : 'あいたかったよ！💕';
    setTimeout(() => showReactionBubble(msg), 400);
  }
}

function refreshEggModal() {
  const slot = _eggModalSlot;
  if (!slot) return;
  const creature = ROOM_CREATURES[slot.creatureType];
  if (!creature) return;

  const stage = getEggStage(slot.growthPts);
  slot.stage = stage;

  // Stage class for background
  const modal = document.getElementById('egg-modal');
  modal.classList.remove('stage-egg', 'stage-baby', 'stage-kid');
  if (stage === EGG_STAGE_EGG) modal.classList.add('stage-egg');
  else if (stage === EGG_STAGE_BABY) modal.classList.add('stage-baby');
  else modal.classList.add('stage-kid');

  // Creature emoji
  const creatureEl = document.getElementById('egg-creature');
  creatureEl.className = 'egg-modal-creature'; // reset animations
  if (stage === EGG_STAGE_EGG) {
    creatureEl.textContent = '🥚';
    creatureEl.classList.add('anim-wobble');
    // Crack overlay at 8pt+
    let crack = creatureEl.querySelector('.egg-crack-overlay');
    if (slot.growthPts >= 8 && !crack) {
      crack = document.createElement('span');
      crack.className = 'egg-crack-overlay';
      crack.textContent = '⚡';
      creatureEl.appendChild(crack);
    } else if (slot.growthPts < 8 && crack) {
      crack.remove();
    }
  } else if (stage === EGG_STAGE_BABY) {
    creatureEl.textContent = creature.babyEmoji;
    // Bigger at 20pt+
    if (slot.growthPts >= 20) creatureEl.style.fontSize = '120px';
    else creatureEl.style.fontSize = '100px';
  } else {
    creatureEl.textContent = creature.emoji;
    creatureEl.style.fontSize = '120px';
  }

  // Name & stage label
  document.getElementById('egg-name').textContent = creature.name;
  document.getElementById('egg-stage').textContent = EGG_STAGE_NAMES[stage];

  // Hearts progress bar
  const nextThreshold = stage < 3 ? EGG_THRESHOLDS[stage + 1] : EGG_THRESHOLDS[3];
  const prevThreshold = EGG_THRESHOLDS[stage];
  const progress = Math.min(1, (slot.growthPts - prevThreshold) / Math.max(1, nextThreshold - prevThreshold));
  const totalHearts = 10;
  const filledHearts = Math.round(progress * totalHearts);
  const heartsEl = document.getElementById('egg-hearts');
  heartsEl.innerHTML = '';
  for (let i = 0; i < totalHearts; i++) {
    const h = document.createElement('span');
    h.className = i < filledHearts ? 'heart-full' : 'heart-empty';
    h.textContent = '♥';
    heartsEl.appendChild(h);
  }

  // Points display
  document.getElementById('egg-pts').textContent = slot.growthPts + 'pt ／ ' + nextThreshold + 'pt';

  // Actions — dynamic per stage
  const actionsEl = document.getElementById('egg-actions');
  const gardenBtn = document.getElementById('egg-garden-btn');
  const msgEl = document.getElementById('egg-msg');

  if (stage >= EGG_STAGE_KID) {
    actionsEl.style.display = 'none';
    actionsEl.innerHTML = '';
    gardenBtn.classList.remove('hidden');
    msgEl.textContent = 'おにわで あそぼう！';
  } else {
    gardenBtn.classList.add('hidden');
    // Daily cap
    const today = new Date().toDateString();
    if (slot.dailyCareDate !== today) {
      slot.dailyCareToday = 0;
      slot.dailyCareDate = today;
    }
    actionsEl.style.display = 'flex';
    buildActionButtons(stage);
    if (slot.dailyCareToday >= EGG_DAILY_CAP) {
      msgEl.textContent = 'きょうは もう たくさん おせわ したね！🌙';
      // Grey out all buttons
      actionsEl.querySelectorAll('.egg-action-btn').forEach(b => b.classList.add('cooldown'));
    } else {
      msgEl.textContent = _timeBonus > 0 ? `さいしょの おせわは ${_timeBonus}ばい！` : '';
    }
  }
}

function buildActionButtons(stage) {
  const actionsEl = document.getElementById('egg-actions');
  const actions = EGG_CARE_ACTIONS[stage];
  if (!actions) { actionsEl.innerHTML = ''; return; }

  // Only rebuild if button set changed
  const currentIds = Array.from(actionsEl.children).map(b => b.dataset.actionId).join(',');
  const newIds = actions.map(a => a.id).join(',');
  if (currentIds === newIds) return; // already built

  actionsEl.innerHTML = '';
  actions.forEach(action => {
    const btn = document.createElement('button');
    btn.className = 'egg-action-btn';
    btn.dataset.actionId = action.id;
    btn.style.background = ACTION_COLORS[action.id] || '#888';
    btn.innerHTML = `${action.emoji}<span>${action.label}</span>`;
    btn.addEventListener('click', () => doEggCare(action));
    actionsEl.appendChild(btn);
  });
}

function doEggCare(action) {
  if (!_eggModalSlot) return;
  const slot = _eggModalSlot;

  // Daily cap
  const today = new Date().toDateString();
  if (slot.dailyCareDate !== today) {
    slot.dailyCareToday = 0;
    slot.dailyCareDate = today;
  }
  if (slot.dailyCareToday >= EGG_DAILY_CAP) return;

  // Calculate points (with time bonus on first action)
  let pts = action.pts;
  if (_timeBonus > 0) {
    pts *= _timeBonus;
    _timeBonus = 0; // consume bonus
  }

  const oldPts = slot.growthPts;
  slot.growthPts += pts;
  slot.dailyCareToday++;
  slot.lastCareAt = Date.now();

  // Save
  const eggState = loadEggState();
  if (eggState) {
    const idx = eggState.slots.findIndex(s => s && s.id === slot.id);
    if (idx >= 0) eggState.slots[idx] = slot;
    saveEggState(eggState);
  }

  // Animate creature
  playActionAnim(action.anim);

  // Spawn particles
  spawnFloatParticle(action.particle);

  // Random creature reaction
  const reactions = CREATURE_REACTIONS[slot.creatureType];
  if (reactions) {
    const stage = getEggStage(slot.growthPts);
    const pool = stage === EGG_STAGE_EGG ? reactions.egg : reactions.baby;
    if (pool && Math.random() < 0.6) {
      setTimeout(() => showReactionBubble(pool[Math.floor(Math.random() * pool.length)]), 300);
    }
  }

  // Check milestones
  checkMilestones(oldPts, slot.growthPts);

  // Check stage transitions
  const newStage = getEggStage(slot.growthPts);
  const oldStage = slot.stage;

  if (newStage > oldStage && newStage === EGG_STAGE_BABY) {
    doHatchAnimation(() => {
      slot.stage = newStage;
      if (eggState) {
        eggState.totalHatched = (eggState.totalHatched || 0) + 1;
        saveEggState(eggState);
      }
      refreshEggModal();
    });
  } else if (newStage > oldStage && newStage === EGG_STAGE_KID) {
    doGrowUpAnimation(() => {
      slot.stage = newStage;
      if (eggState) saveEggState(eggState);
      refreshEggModal();
    });
  } else {
    refreshEggModal();
  }

  // Cooldown on button
  const btn = document.querySelector(`.egg-action-btn[data-action-id="${action.id}"]`);
  if (btn) {
    btn.classList.add('cooldown');
    setTimeout(() => btn.classList.remove('cooldown'), action.cd);
  }
}

function playActionAnim(animClass) {
  const el = document.getElementById('egg-creature');
  // Remove all anim classes, apply new one briefly
  el.className = 'egg-modal-creature ' + animClass;
  // Reset animation if same class
  el.style.animation = 'none';
  el.offsetHeight; // force reflow
  el.style.animation = '';
}

function spawnFloatParticle(emoji) {
  const modal = document.getElementById('egg-modal');
  for (let i = 0; i < 3; i++) {
    const p = document.createElement('div');
    p.className = 'float-particle';
    p.textContent = emoji;
    p.style.left = (35 + Math.random() * 30) + '%';
    p.style.top = (30 + Math.random() * 15) + '%';
    p.style.animationDelay = (i * 0.15) + 's';
    modal.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

function showReactionBubble(text) {
  const creatureEl = document.getElementById('egg-creature');
  // Remove existing bubble
  const old = creatureEl.querySelector('.reaction-bubble');
  if (old) old.remove();
  const bubble = document.createElement('div');
  bubble.className = 'reaction-bubble';
  bubble.textContent = text;
  creatureEl.appendChild(bubble);
  setTimeout(() => bubble.remove(), 1800);
}

function checkMilestones(oldPts, newPts) {
  for (const m of EGG_MILESTONES) {
    if (oldPts < m.pts && newPts >= m.pts) {
      showMilestoneToast(m.emoji + ' ' + m.msg);
      break; // one at a time
    }
  }
}

function showMilestoneToast(text) {
  const toast = document.createElement('div');
  toast.className = 'milestone-toast';
  toast.textContent = text;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2800);
}

function doHatchAnimation(callback) {
  const creatureEl = document.getElementById('egg-creature');
  creatureEl.className = 'egg-modal-creature hatching';
  document.getElementById('egg-msg').textContent = 'おや…？ たまごが…！';

  setTimeout(() => {
    const flash = document.createElement('div');
    flash.className = 'hatch-flash';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 800);

    creatureEl.className = 'egg-modal-creature';
    showMilestoneToast('🎉 うまれたよ！');
    callback();
  }, 2000);
}

function doGrowUpAnimation(callback) {
  const creatureEl = document.getElementById('egg-creature');
  creatureEl.className = 'egg-modal-creature grow-up';
  document.getElementById('egg-msg').textContent = 'おおきくなったよ！';

  setTimeout(() => {
    showMilestoneToast('🌳🎉 おにわで あそべるよ！');
    callback();
  }, 1200);
}

function placeEggIncubator() {
  // Add egg incubator to living room if not already placed
  if (!state.config) state.config = {};
  if (!state.config.living) state.config.living = {};
  const cfg = state.config.living;
  if (!cfg.placed) cfg.placed = [];
  const hasIncubator = cfg.placed.some(p => p.id === 'furn_egg_incubator');
  if (!hasIncubator) {
    cfg.placed.push({ id: 'furn_egg_incubator', row: 4, col: 4, angle: 'A' });
    saveState();
  }
}

// モバイル・PC 共に window.innerWidth/Height を使用
// （ブラウザUI込みで可視領域に収める）
const _isMobile = window.matchMedia('(pointer: coarse)').matches;
let   _lastInnerW = 0;

function lockRoomSize() {
  // モバイル・PC 共に window.innerWidth/Height を使用
  // （screen.width/height はブラウザUIを無視するため使わない）
  const W = window.innerWidth;
  const H = window.innerHeight;
  _lastInnerW = W;
  const ratio = 16 / 9;
  let w, h;
  if (W / H >= ratio) { h = H; w = Math.round(H * ratio); }
  else                 { w = W; h = Math.round(W / ratio); }
  const wrap = document.getElementById('room-wrap');
  if (wrap) { wrap.style.width = w + 'px'; wrap.style.height = h + 'px'; }
}
lockRoomSize();
window.addEventListener('orientationchange', () => setTimeout(lockRoomSize, 300));
window.addEventListener('resize', lockRoomSize);

// ─── Portrait notice: 100% JS制御（CSS media queryは競合するため廃止） ───
function updatePortraitNotice() {
  const notice = document.getElementById('portrait-notice');
  const scene = document.getElementById('room-scene');
  if (!notice || !scene) return;
  const isPortrait = window.innerHeight > window.innerWidth;
  const isTouch = matchMedia('(pointer: coarse)').matches;
  if (isPortrait && isTouch) {
    notice.style.display = 'flex';
    notice.style.pointerEvents = 'auto';
    scene.style.display = 'none';
  } else {
    notice.style.display = 'none';
    notice.style.pointerEvents = 'none';
    scene.style.display = 'flex';
    scene.style.pointerEvents = '';
    // iOS Safari position:fixed ヒットテスト修正
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  }
}
updatePortraitNotice();
// Use matchMedia listener (fires reliably when orientation actually changes,
// unlike orientationchange which can fire before dimensions update)
const portraitMQL = matchMedia('(orientation: portrait)');
portraitMQL.addEventListener('change', () => {
  updatePortraitNotice();
  // Fire again after a delay as some browsers report stale dimensions initially
  setTimeout(updatePortraitNotice, 200);
  setTimeout(updatePortraitNotice, 600);
});
window.addEventListener('orientationchange', () => {
  setTimeout(updatePortraitNotice, 100);
  setTimeout(updatePortraitNotice, 500);
});
window.addEventListener('resize', updatePortraitNotice);

// ─── Room Tutorial ──────────────────────────────────────
function _waitForLandscape(cb) {
  // 既に横画面なら即実行
  if (window.innerWidth > window.innerHeight) { cb(); return; }
  // 横になるまで待つ
  function check() {
    if (window.innerWidth > window.innerHeight) {
      window.removeEventListener('resize', check);
      setTimeout(cb, 400); // レイアウト安定を待つ
    }
  }
  window.addEventListener('resize', check);
}

function showRoomTutorial() {
  _waitForLandscape(function() { _runRoomTutorial(); });
}

function _runRoomTutorial() {
  var dim = document.getElementById('tut-dim');
  var bubble = document.getElementById('tut-bubble');
  var step = 0;
  var _spotlight = null; // fixed position spotlight clone

  // プロフィールから名前と性別を取得
  // 男の子なら「〇〇くんのおへや」、女の子なら「〇〇ちゃんのおへや」、なければ「わたしのおへや」
  var _kidName = '';
  var _kidGender = 'boy';
  try {
    var _prof = JSON.parse(localStorage.getItem('pono_profile') || '{}');
    _kidName = (_prof.name || '').trim();
    _kidGender = _prof.gender === 'girl' ? 'girl' : 'boy';
  } catch(e) {}
  var _suffix = _kidGender === 'girl' ? 'ちゃん' : 'くん';
  var _ownerLabel = _kidName ? (_kidName + _suffix + 'の') : 'わたしの';

  var STEPS = [
    {
      text: 'ここは ' + _ownerLabel + ' おへやだよ！<br>すきに アレンジできるよ',
    },
    {
      text: 'これは 「おもちゃばこ」！<br>タップすると<br>もちものが みれるよ',
      target: function() { return document.querySelector('.toybox-item'); },
    },
    {
      text: '「もようがえ」ボタンで<br>かぐや かざりを<br>すきな ばしょに うごかせるよ',
      target: function() { return document.getElementById('ui-btn-edit'); },
    },
    {
      text: 'かべがみ、ゆか、かぐ、かざり…<br>あそんで あつめて<br>じぶんだけの おへやを つくろう！',
    },
  ];

  function clearSpotlight() {
    if (_spotlight) { _spotlight.remove(); _spotlight = null; }
  }

  function makeSpotlight(el) {
    // ターゲット位置にfixed配置のスポットライト枠を作る
    clearSpotlight();
    var r = el.getBoundingClientRect();
    var pad = 6;
    _spotlight = document.createElement('div');
    _spotlight.style.cssText =
      'position:fixed;z-index:9996;pointer-events:none;border-radius:12px;' +
      'box-shadow:0 0 0 4000px rgba(93,78,55,0.65);' +
      'top:' + (r.top - pad) + 'px;left:' + (r.left - pad) + 'px;' +
      'width:' + (r.width + pad * 2) + 'px;height:' + (r.height + pad * 2) + 'px;';
    document.body.appendChild(_spotlight);
    return r;
  }

  function showStep() {
    clearSpotlight();
    if (step >= STEPS.length) {
      dim.classList.add('hidden');
      bubble.classList.add('hidden');
      localStorage.setItem('room_tut_seen', '1');
      return;
    }
    var s = STEPS[step];
    bubble.classList.remove('hidden');
    bubble.innerHTML = s.text + '<br><button class="tut-btn" id="tut-next">' + (step < STEPS.length - 1 ? 'つぎへ ▶' : 'わかった！') + '</button>';

    if (s.target) {
      dim.classList.add('hidden');
      var el = s.target();
      if (el) {
        var r = makeSpotlight(el);
        // バブルをターゲットの上に配置
        bubble.style.cssText = 'position:fixed;z-index:9997;';
        bubble.style.bottom = (window.innerHeight - r.top + 14) + 'px';
        bubble.style.left = (r.left + r.width / 2) + 'px';
        bubble.style.transform = 'translateX(-50%)';
        // 画面外補正
        requestAnimationFrame(function() {
          var br = bubble.getBoundingClientRect();
          if (br.left < 8) { bubble.style.left = '8px'; bubble.style.transform = ''; }
          if (br.right > window.innerWidth - 8) {
            bubble.style.left = ''; bubble.style.right = '8px'; bubble.style.transform = '';
          }
          // 上に収まらないなら下に
          if (br.top < 8) {
            bubble.style.bottom = '';
            bubble.style.top = (r.bottom + 14) + 'px';
          }
        });
      }
    } else {
      dim.classList.remove('hidden');
      clearSpotlight();
      bubble.style.cssText = 'position:fixed;z-index:9997;top:40%;left:50%;transform:translate(-50%,-50%);';
    }

    document.getElementById('tut-next').addEventListener('click', function() {
      step++;
      showStep();
    });
  }

  dim.addEventListener('click', function(e) {
    if (e.target === dim) { step++; showStep(); }
  });

  step = 0;
  showStep();
}

// ─── 家具獲得チュートリアル ─────────────────────────────
// 家具IDの候補、チュートリアルフラグ、テキストを受け取り、初回のみ誘導する
function _showFurnitureTutorial(itemIds, flagKey, tutorialText, afterOkMsg) {
  if (localStorage.getItem(flagKey) === '1') return false;
  // インベントリーに対象アイテムがあるか確認
  var item = null;
  for (var i = 0; i < itemIds.length; i++) {
    if (state.inventory.indexOf(itemIds[i]) !== -1) {
      var found = ROOM_ITEMS.find(x => x.id === itemIds[i]);
      if (found) { item = found; break; }
    }
  }
  if (!item) return false;

  // リビングにすでに配置済みか確認
  if (!state.config.living) state.config.living = {};
  var cfg = state.config.living;
  if (!cfg.placed) cfg.placed = getPlacedItems(cfg);
  var alreadyPlaced = cfg.placed.some(p => p.id === item.id);

  // 未配置なら中央に強制配置
  if (!alreadyPlaced) {
    var row = item.gridRow ?? 3;
    var col = item.gridCol ?? 3;
    var pos = findNearestEmpty('living', row, col, item.id, item, 'A');
    cfg.placed.push({ id: item.id, row: pos.row, col: pos.col, angle: 'A' });
    delete cfg.furn; delete cfg.deco;
    saveState();
    refreshArea('living');
  }

  // 模様替えモードON（refreshArea後に設定。.edit-mode クラスが再付与される）
  if (typeof window._setEditMode === 'function') window._setEditMode(true);

  // チュートリアルモーダル表示
  _waitForLandscape(function() {
    _showTutorialModal(tutorialText, function() {
      localStorage.setItem(flagKey, '1');
      // afterOkMsg があれば2つ目のモーダル（現在は未使用）
      if (afterOkMsg) {
        setTimeout(function() {
          _showTutorialModal(afterOkMsg, function() {});
        }, 400);
      }
    });
  });
  return true;
}

// ─── ベッド獲得後の拡張チュートリアル ──────────────────
// 宝箱オープン演出 → 位置調整ガイド → 角度ガイド → OKガイド
function _showExtendedBedTutorial() {
  if (localStorage.getItem('pono_bed_tutorial_seen') === '1') return false;
  var bedIds = ['furn_bed_pink', 'furn_bed_blue_boy'];
  var item = null;
  for (var i = 0; i < bedIds.length; i++) {
    if (state.inventory.indexOf(bedIds[i]) !== -1) {
      var found = ROOM_ITEMS.find(x => x.id === bedIds[i]);
      if (found) { item = found; break; }
    }
  }
  if (!item) return false;

  // チュートリアル用に強制中央配置（未配置 or 既存どこにあってもリセット）
  if (!state.config.living) state.config.living = {};
  var cfg = state.config.living;
  if (!cfg.placed) cfg.placed = getPlacedItems(cfg);
  // 部屋の中央付近に固定（4x4 グリッド中央）
  var centerRow = 3;
  var centerCol = 3;
  var existing = cfg.placed.find(p => p.id === item.id);
  if (existing) {
    var pos = findNearestEmpty('living', centerRow, centerCol, item.id, item, 'A');
    existing.row = pos.row;
    existing.col = pos.col;
    existing.angle = 'A';
  } else {
    var pos2 = findNearestEmpty('living', centerRow, centerCol, item.id, item, 'A');
    cfg.placed.push({ id: item.id, row: pos2.row, col: pos2.col, angle: 'A' });
    delete cfg.furn; delete cfg.deco;
  }
  saveState();
  refreshArea('living');

  _waitForLandscape(function() {
    var bedId = item.id;
    var cfg = state.config.living;

    // ベッドを部屋の中央に強制配置
    // 視覚的に中央に来るよう、A角度のときは row=3, col=2 がベスト（pivotXが正で右に寄るため）
    function resetBedToCenter() {
      var p = cfg.placed.find(x => x.id === bedId);
      if (!p) return;
      // 他の placed アイテムを一時的に退避（衝突防止）
      var others = cfg.placed.filter(x => x.id !== bedId);
      // チュートリアル中は他アイテムが邪魔しないよう、ベッドを直接中央に
      p.row = 3;
      p.col = 2;
      p.angle = 'A';
      saveState();
      refreshArea('living');
      if (typeof window._setEditMode === 'function') window._setEditMode(true);
    }

    // 現在のベッド位置/角度スナップショット
    function bedSnapshot() {
      var p = cfg.placed.find(x => x.id === bedId);
      return p ? { row: p.row, col: p.col, angle: p.angle } : null;
    }

    // 位置が変わるまで待つ
    function waitForMove(onMoved) {
      var start = bedSnapshot();
      if (!start) { onMoved(); return; }
      var timer = setInterval(function() {
        var now = bedSnapshot();
        if (!now) return;
        if (now.row !== start.row || now.col !== start.col) {
          clearInterval(timer);
          onMoved();
        }
      }, 200);
    }

    // 角度が N 回変わるまで待つ（一周は2回: A→B→A）
    function waitForRotations(count, onDone) {
      var last = bedSnapshot();
      if (!last) { onDone(); return; }
      var rotations = 0;
      var timer = setInterval(function() {
        var now = bedSnapshot();
        if (!now) return;
        if (now.angle !== last.angle) {
          rotations++;
          last = now;
          if (rotations >= count) {
            clearInterval(timer);
            onDone();
          }
        }
      }, 200);
    }

    // 画面中央に小さな褒めトースト
    function showToast2(text, onDone) {
      var toast = document.createElement('div');
      toast.style.cssText =
        'position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:9997;' +
        'padding:14px 32px;border-radius:50px;' +
        'background:linear-gradient(135deg,#FFD84D,#F5A800);color:#5C3A00;' +
        'font-family:inherit;font-size:1.3rem;font-weight:900;' +
        'box-shadow:0 6px 20px rgba(245,168,0,0.5);' +
        'transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);';
      toast.textContent = text;
      document.body.appendChild(toast);
      requestAnimationFrame(function() {
        toast.style.transform = 'translate(-50%,-50%) scale(1)';
      });
      setTimeout(function() {
        toast.style.transition = 'transform 0.3s, opacity 0.3s';
        toast.style.opacity = '0';
        toast.style.transform = 'translate(-50%,-50%) scale(0.9)';
        setTimeout(function() { toast.remove(); if (onDone) onDone(); }, 320);
      }, 1400);
    }

    // ヒントトースト（間違ったボタンを押した時）
    var _hintBusy = false;
    function showHintToast(text) {
      if (_hintBusy) return;
      _hintBusy = true;
      var toast = document.createElement('div');
      toast.style.cssText =
        'position:fixed;top:55%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:9998;' +
        'padding:12px 24px;border-radius:50px;' +
        'background:#fff;color:#5D4E37;border:3px solid #F2915A;' +
        'font-family:inherit;font-size:1rem;font-weight:900;' +
        'box-shadow:0 6px 20px rgba(0,0,0,0.25);' +
        'transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);';
      toast.textContent = text;
      document.body.appendChild(toast);
      requestAnimationFrame(function() {
        toast.style.transform = 'translate(-50%,-50%) scale(1)';
      });
      setTimeout(function() {
        toast.style.transition = 'transform 0.25s, opacity 0.25s';
        toast.style.opacity = '0';
        toast.style.transform = 'translate(-50%,-50%) scale(0.9)';
        setTimeout(function() { toast.remove(); _hintBusy = false; }, 250);
      }, 1500);
    }

    // チュートリアルフェーズごとの操作ブロック
    // phase: 'move'   → 回転・しまうボタンをブロック（ドラッグはOK）
    //        'rotate' → ドラッグ・しまうボタンをブロック（回転ボタンはOK）
    //        null     → 全解除
    var _tutBlockers = [];
    function _detachBlockers() {
      _tutBlockers.forEach(function(b) {
        document.removeEventListener(b.evt, b.fn, true);
      });
      _tutBlockers = [];
    }
    function _attachBlocker(evt, fn) {
      document.addEventListener(evt, fn, true);
      _tutBlockers.push({ evt: evt, fn: fn });
    }
    function setTutPhase(phase) {
      _detachBlockers();
      if (!phase) return;

      // クリック系（回転・しまう用）のブロッカー
      var clickBlocker = function(e) {
        var t = e.target;
        var rotBtn = t.closest && t.closest('.btn-rotate');
        var stowBtn = t.closest && t.closest('.btn-stow');
        if (phase === 'move' && (rotBtn || stowBtn)) {
          e.stopPropagation();
          e.preventDefault();
          showHintToast('ベッドを タッチして うごかしてね！');
        } else if (phase === 'rotate' && stowBtn) {
          e.stopPropagation();
          e.preventDefault();
          showHintToast('いまは むきを かえる だけだよ！');
        }
      };
      _attachBlocker('click', clickBlocker);
      _attachBlocker('touchend', clickBlocker);

      // ドラッグ系（rotateフェーズ中だけ、item-placed への touchstart/touchmove/mousedown をブロック）
      // ただし rotate ボタンや stow ボタンへのクリックは妨げない
      if (phase === 'rotate') {
        var _hintShownThisGesture = false;
        var dragBlocker = function(e) {
          var t = e.target;
          if (t.closest && t.closest('.btn-rotate')) return;
          if (t.closest && t.closest('.btn-stow')) return;
          var item = t.closest && t.closest('.item-placed');
          if (item) {
            e.stopPropagation();
            e.preventDefault();
            if (!_hintShownThisGesture) {
              showHintToast('いまは \uD83D\uDD04 を おして むきを かえてね！');
              _hintShownThisGesture = true;
            }
          }
        };
        var clearGesture = function() { _hintShownThisGesture = false; };
        _attachBlocker('touchstart', dragBlocker);
        _attachBlocker('touchmove', dragBlocker);
        _attachBlocker('touchend', clearGesture);
        _attachBlocker('mousedown', dragBlocker);
        _attachBlocker('mousemove', dragBlocker);
        _attachBlocker('mouseup', clearGesture);
      }
    }

    // 子供の名前
    var _bedKidName = '';
    var _bedSuffix = '';
    try {
      var _bp = JSON.parse(localStorage.getItem('pono_profile') || '{}');
      _bedKidName = (_bp.name || '').trim();
      _bedSuffix = _bp.gender === 'girl' ? 'ちゃん' : 'くん';
    } catch(e) {}
    var _kidLabel = _bedKidName ? (_bedKidName + _bedSuffix) : 'ポノ';

    // ★ フェーズ1 モーダルを実際に表示する直前で seen='1' を付ける。
    //   （_waitForLandscape 待ちのままユーザーが離脱した場合は seen が立たず、
    //    次回入室時にちゃんと再試行される。逆にここまで来れば「見せた」と見なせる）
    localStorage.setItem('pono_bed_tutorial_seen', '1');
    localStorage.removeItem('pono_bed_tutorial_pending');

    // ── フェーズ1: ベッド取り出し演出 ──
    _showTutorialStepModal({
      emoji: '🎁✨🛏️',
      title: 'おもちゃばこから\nベッドを とりだしたよ！',
      body: _kidLabel + 'の おへやに\nかざって みよう！',
      btn: 'つぎへ ▶'
    }, function() {
      if (typeof window._setEditMode === 'function') window._setEditMode(true);
      // ── フェーズ2: 位置の動かし方 ──
      setTimeout(function() {
        _showTutorialStepModal({
          emoji: '👆',
          title: 'まずは うごかし方！',
          body: 'ベッドを ゆびで おさえて\nすきな ばしょまで\nドラッグしてみよう！',
          btn: 'やってみる！'
        }, function() {
          setTutPhase('move'); // 回転・しまうボタンをブロック
          waitForMove(function() {
            setTutPhase(null);
            showToast2('うごかせたね！ ✨', function() {
              // ベッドを中央に戻す
              resetBedToCenter();
              setTimeout(function() {
                // ── フェーズ3: 回転のやり方 ──
                _showTutorialStepModal({
                  emoji: '🔄',
                  title: 'つぎは まわし方！',
                  body: 'ベッドの したに ある\n\uD83D\uDD04 マークを おすと\nむきが かわるよ！\n\nいっしゅう まわしてみよう！',
                  btn: 'やってみる！'
                }, function() {
                  // 回転フェーズ開始時にも中央リセット
                  resetBedToCenter();
                  setTutPhase('rotate');
                  waitForRotations(2, function() {
                    setTutPhase(null);
                    showToast2('うまく まわせたね！ 🎉', function() {
                      // ── フェーズ4: 自由配置 ──
                      _showTutorialStepModal({
                        emoji: '🎨',
                        title: 'じゆうに かざろう！',
                        body: 'すきな ばしょに\nすきな むきで\nベッドを おいてみよう！\n\nできたら みぎうえの\n「✅ おわり」ボタンを おしてね',
                        btn: 'できた！'
                      }, function() {
                        // ── フェーズ5: もようがえボタンの案内 ──
                        setTimeout(function() {
                          _highlightEditButtonHint(function() {
                            // 完了フラグ（tutQueue の次ステップ進行用）
                            window._bedTutorialDone = true;
                          });
                        }, 300);
                      });
                    });
                  });
                });
              }, 300);
            });
          });
        });
      }, 280);
    });
  });
  return true;
}

// ステップ式チュートリアルモーダル（絵文字・タイトル・本文・ボタン付き）
// もようがえボタンをハイライトしながら案内
function _highlightEditButtonHint(onDone) {
  var btn = document.getElementById('ui-btn-edit');
  if (!btn) { if (onDone) onDone(); return; }
  var r = btn.getBoundingClientRect();
  var spot = document.createElement('div');
  spot.style.cssText =
    'position:fixed;z-index:9996;pointer-events:none;border-radius:14px;' +
    'box-shadow:0 0 0 4000px rgba(0,0,0,0.55);' +
    'top:' + (r.top - 6) + 'px;left:' + (r.left - 6) + 'px;' +
    'width:' + (r.width + 12) + 'px;height:' + (r.height + 12) + 'px;' +
    'transition:opacity 0.3s;';
  document.body.appendChild(spot);
  var bubble = document.createElement('div');
  // ★ scale(0) のままだと getBoundingClientRect が 0x0 を返して位置計算が狂うので、
  //    最初は transform なしで測定 → 位置確定後に scale(0) → scale(1) を再適用する
  bubble.style.cssText =
    'position:fixed;z-index:9997;background:#fff;border-radius:16px;padding:14px 18px;' +
    'max-width:280px;text-align:center;font-family:inherit;font-size:0.9rem;font-weight:900;' +
    'color:#5D4E37;line-height:1.6;box-shadow:0 6px 20px rgba(0,0,0,0.25);' +
    'visibility:hidden;top:0;left:0;';
  bubble.innerHTML = 'いつでも この「もようがえ」ボタンから<br>かぐの ばしょや むきを<br>かえられるよ！' +
    '<br><button id="_hint-ok" style="margin-top:10px;padding:8px 24px;border:none;border-radius:50px;background:linear-gradient(135deg,#60A5FA,#3B82F6);color:#fff;font-family:inherit;font-size:0.9rem;font-weight:900;cursor:pointer;">わかった！</button>';
  document.body.appendChild(bubble);
  // 位置調整: もようがえボタンの「上」に表示する（下に出ると読めない位置に行くため）
  // offsetWidth/Height は CSS transform の影響を受けないので scale(0) でも正しく返る
  var bw = bubble.offsetWidth;
  var bh = bubble.offsetHeight;
  var top = r.top - bh - 12;
  if (top < 10) {
    var belowTop = r.bottom + 12;
    top = (belowTop + bh <= window.innerHeight - 10) ? belowTop : 10;
  }
  var left = r.left + r.width / 2 - bw / 2;
  if (left < 8) left = 8;
  if (left + bw > window.innerWidth - 8) left = window.innerWidth - bw - 8;
  bubble.style.top = top + 'px';
  bubble.style.left = left + 'px';
  // アニメーション準備: scale(0) で可視化 → 次フレームで scale(1)
  bubble.style.transformOrigin = 'center center';
  bubble.style.transform = 'scale(0)';
  bubble.style.transition = 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1)';
  bubble.style.visibility = 'visible';
  requestAnimationFrame(function() { bubble.style.transform = 'scale(1)'; });
  document.getElementById('_hint-ok').addEventListener('click', function() {
    bubble.style.transition = 'transform 0.25s cubic-bezier(0.6,-0.28,0.74,0.05)';
    bubble.style.transform = 'scale(0)';
    spot.style.opacity = '0';
    setTimeout(function() {
      bubble.remove();
      spot.remove();
      if (onDone) onDone();
    }, 280);
  });
}

// ─── Init ─────────────────────────────────────────────
function init() {
  loadState();

  // テーマはloadStateでpono_profile.genderから自動設定済み → 直接おへやへ
  enterRoom();

  // チュートリアル開始前に残存する動的モーダルを念のため除去
  document.querySelectorAll('[data-tut-modal]').forEach(el => el.remove());

  // チュートリアルをキューで順次実行
  var tutQueue = [];

  // 1. お部屋チュートリアル（初回のみ）
  if (!localStorage.getItem('room_tut_seen')) {
    tutQueue.push(function(next) {
      showRoomTutorial();
      var _interval = setInterval(function() {
        if (localStorage.getItem('room_tut_seen') === '1') {
          clearInterval(_interval);
          setTimeout(next, 400);
        }
      }, 300);
    });
  }

  // 2. ベッド拡張チュートリアル（ベッド所持 + 未視聴）
  // bedPending フラグは参考情報。ベッドがインベントリにあって未視聴ならフラグ無しでも起動
  var bedInInv = ['furn_bed_pink', 'furn_bed_blue_boy'].some(id => state.inventory.indexOf(id) !== -1);
  if (bedInInv && localStorage.getItem('pono_bed_tutorial_seen') !== '1') {
    tutQueue.push(function(next) {
      window._bedTutorialDone = false;
      var started = _showExtendedBedTutorial();
      if (!started) {
        // 何らかの理由で起動しなかった（seen=1 既存 or bed見つからず）→ そのまま次へ
        // seen フラグは触らない（誤って '1' にしないため）
        setTimeout(next, 200);
        return;
      }
      // 完了検知（in-memory フラグ。seen はフェーズ1モーダル表示時点でセットされる）
      var _interval = setInterval(function() {
        if (window._bedTutorialDone) {
          clearInterval(_interval);
          setTimeout(next, 400);
        }
      }, 300);
    });
  } else if (!bedInInv) {
    // bed がインベントリに無ければ pending をクリア（ゴミ掃除）
    localStorage.removeItem('pono_bed_tutorial_pending');
  }

  // 3. 本棚チュートリアル（本棚所持 + 未視聴、ベッドチュートリアル後）
  if (localStorage.getItem('pono_bookshelf_tutorial_seen') !== '1') {
    var hasBookshelf = ['furn_bookshelf_w', 'furn_bookshelf2', 'furn_bookshelf_wood']
      .some(id => state.inventory.indexOf(id) !== -1);
    if (hasBookshelf) {
      tutQueue.push(function(next) {
        _showFurnitureTutorial(
          ['furn_bookshelf_w', 'furn_bookshelf2', 'furn_bookshelf_wood'],
          'pono_bookshelf_tutorial_seen',
          'ほんだなを ゲット！ \uD83D\uDCDA\n\nドラッグで うごかせて\n\uD83D\uDD04 マークで むきも かえられるよ\n\nおいた ほんだなを タップすると\nあつめた いきもの・かぐ・じっせきが\n「ずかん」で みられるよ！'
        );
        // 完了検知
        var _interval = setInterval(function() {
          if (localStorage.getItem('pono_bookshelf_tutorial_seen') === '1') {
            clearInterval(_interval);
            setTimeout(next, 400);
          }
        }, 300);
      });
    }
  }

  // キュー順次実行
  function runTutQueue() {
    if (tutQueue.length === 0) return;
    var fn = tutQueue.shift();
    fn(runTutQueue);
  }
  runTutQueue();

  // Entry overlay buttons
  document.getElementById('btn-entry-room').addEventListener('click', enterRoom);
  document.getElementById('btn-entry-garden').addEventListener('click', enterGarden);

  // Egg modal buttons
  document.getElementById('egg-modal-close').addEventListener('click', () => {
    document.getElementById('egg-modal').classList.add('hidden');
  });
  // Backdrop click closes modal
  document.getElementById('egg-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
      document.getElementById('egg-modal').classList.add('hidden');
    }
  });
  // (egg care buttons are now dynamically generated in buildActionButtons())
  document.getElementById('egg-garden-btn').addEventListener('click', () => {
    location.href = '../egg/index.html';
  });

  // Shop tab clicks
  document.getElementById('shop-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.cat-tab');
    if (!tab) return;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('on'));
    tab.classList.add('on');
    currentShopCat = tab.dataset.cat;
    renderShopGrid(tab.dataset.cat);
  });

  // おもちゃばこ tab clicks
  document.getElementById('takara-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.takara-tab');
    if (!tab) return;
    switchTakaraTab(tab.dataset.tab);
  });

  // おもちゃばこ open (single button replaces shop/ach/sticker)
  document.getElementById('ui-btn-takara').addEventListener('click', () => openTakarabako());
  document.getElementById('shop-close').addEventListener('click', () => {
    document.getElementById('shop-ov').classList.add('hidden');
    _shiftRoom(false);
  });
  document.getElementById('shop-ov').addEventListener('click', e => {
    if (e.target === document.getElementById('shop-ov')) {
      document.getElementById('shop-ov').classList.add('hidden');
      _shiftRoom(false);
    }
  });

  // Info open/close (overlay button)
  document.getElementById('ui-btn-info').addEventListener('click', () =>
    document.getElementById('info-ov').classList.remove('hidden'));
  document.getElementById('info-close').addEventListener('click', () =>
    document.getElementById('info-ov').classList.add('hidden'));
  document.getElementById('info-ov').addEventListener('click', e => {
    if (e.target === document.getElementById('info-ov'))
      document.getElementById('info-ov').classList.add('hidden');
  });

  // ── もようがえモード ──
  const editBtn = document.getElementById('ui-btn-edit');

  function setEditMode(on) {
    editMode = on;
    editBtn.classList.toggle('active', on);
    editBtn.innerHTML = on ? '✅ おわり' : '🏠 もようがえ';
    // 全room-areaにedit-modeクラスをトグル
    document.querySelectorAll('.room-area').forEach(area => {
      area.classList.toggle('edit-mode', on);
    });
    // グリッド表示/非表示
    document.querySelectorAll('.edit-grid-canvas').forEach(c => {
      c.style.display = on ? 'block' : 'none';
    });
  }
  // グローバルからも呼べるようにする
  window._setEditMode = setEditMode;

  editBtn.addEventListener('click', () => {
    setEditMode(!editMode);
  });

  // テーマ切り替えボタンは削除済み（pono_profile.genderから自動設定）

  // ── ズーム ──
  (function() {
    var zoom = 1.25;
    var scroll = document.getElementById('room-scroll');
    function applyZoom() {
      scroll.style.transform = 'scale(' + zoom + ') translateY(-' + ((zoom - 1) * 8) + '%)';
      scroll.style.transformOrigin = 'center center';
    }
    applyZoom(); // デフォルト1.25倍で表示
    document.getElementById('zoom-in').addEventListener('click', function() {
      zoom = Math.min(3, zoom + 0.25);
      applyZoom();
    });
    document.getElementById('zoom-out').addEventListener('click', function() {
      zoom = Math.max(1, zoom - 0.25);
      applyZoom();
    });
  })();

  // Premium banner → menu
  document.getElementById('premium-banner').addEventListener('click', () => {
    window.location.href = '../play.html';
  });

}

init();

// ─── pageshow: ゲームから戻ったときにポイントを再読み込み ─────────
window.addEventListener('pageshow', function(e) {
  // bfcache 復元時はチュートリアル中断状態が残る可能性があるため強制リロード
  if (e.persisted) { location.reload(); return; }
  loadState();
  renderShopGrid(currentShopCat);
});

// ─── デバッグパネル（2回タップで開く。ポイント機能は廃止済み）───
function _dbgToggle() {
  var panel = document.getElementById('debug-panel');
  panel.classList.toggle('hidden');
  if (!panel.classList.contains('hidden')) _dbgUpdate();
}

function _dbgUpdate() {
  var info = document.getElementById('dbg-info');
  if (info) info.textContent = 'ポイント制は廃止済み（スタンプ報酬に移行）';
  _dbgEggUpdate();
}

// ── 卵デバッグ ──
function _dbgEggUpdate() {
  var eggState = loadEggState();
  var info = document.getElementById('dbg-egg-info');
  if (!eggState) { info.textContent = '卵state なし'; return; }
  var slot = getActiveEggSlot(eggState);
  if (!slot) { info.textContent = 'アクティブ卵 なし'; return; }
  var stage = getEggStage(slot.growthPts);
  info.textContent = slot.creatureType + ' / ' + EGG_STAGE_NAMES[stage] + ' / ' + slot.growthPts + 'pt / 今日: ' + slot.dailyCareToday + '/' + EGG_DAILY_CAP;
}
function dbgEggAdd(n) {
  var eggState = loadEggState();
  if (!eggState) return;
  var slot = getActiveEggSlot(eggState);
  if (!slot) return;
  slot.growthPts += n;
  slot.stage = getEggStage(slot.growthPts);
  // dailyCareToday もリセット（デバッグ用に無制限）
  slot.dailyCareToday = 0;
  var idx = eggState.slots.findIndex(function(s) { return s && s.id === slot.id; });
  if (idx >= 0) eggState.slots[idx] = slot;
  saveEggState(eggState);
  _eggModalSlot = slot;
  _dbgEggUpdate();
  // モーダルが開いていれば更新
  if (!document.getElementById('egg-modal').classList.contains('hidden')) {
    refreshEggModal();
  }
}
function dbgEggSetStage(targetStage) {
  // Set pts to exact threshold for given stage
  var eggState = loadEggState();
  if (!eggState) return;
  var slot = getActiveEggSlot(eggState);
  if (!slot) return;
  slot.growthPts = EGG_THRESHOLDS[targetStage];
  slot.stage = targetStage;
  slot.dailyCareToday = 0;
  var idx = eggState.slots.findIndex(function(s) { return s && s.id === slot.id; });
  if (idx >= 0) eggState.slots[idx] = slot;
  saveEggState(eggState);
  _eggModalSlot = slot;
  _dbgEggUpdate();
  if (!document.getElementById('egg-modal').classList.contains('hidden')) {
    refreshEggModal();
  }
}
function dbgEggBackToSelect() {
  // Clear egg state and show egg story/selection
  localStorage.removeItem('pono_egg_state');
  _eggModalSlot = null;
  document.getElementById('egg-modal').classList.add('hidden');
  document.getElementById('debug-panel').classList.add('hidden');
  _dbgEggUpdate();
  showEggStory();
}
function dbgEggDailyReset() {
  var eggState = loadEggState();
  if (!eggState) return;
  var slot = getActiveEggSlot(eggState);
  if (!slot) return;
  slot.dailyCareToday = 0;
  slot.dailyCareDate = new Date().toDateString();
  var idx = eggState.slots.findIndex(function(s) { return s && s.id === slot.id; });
  if (idx >= 0) eggState.slots[idx] = slot;
  saveEggState(eggState);
  _eggModalSlot = slot;
  _dbgEggUpdate();
  if (!document.getElementById('egg-modal').classList.contains('hidden')) {
    refreshEggModal();
  }
}
function dbgEggReset() {
  localStorage.removeItem('pono_egg_state');
  _eggModalSlot = null;
  document.getElementById('egg-modal').classList.add('hidden');
  _dbgEggUpdate();
}

// 旧本棚チュートリアルは _showFurnitureTutorial（init内）に統合済みのため削除
</script>
