<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>家具ピボット＆配置範囲 調整ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1a1a2e;color:#eee;display:flex;height:100vh;overflow:hidden}

/* ─── Left: Room view ─── */
#room-panel{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:10px;overflow:hidden}
#room-wrapper{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;transform-origin:center center}
#room-container{position:relative;aspect-ratio:16/9;max-width:100%;max-height:100%;transform-origin:center center;transition:transform 0.1s ease-out}
#room-bg{width:100%;height:100%;display:block}
#grid-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#item-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.placed-item{position:absolute;pointer-events:auto;cursor:grab;image-rendering:auto}
.placed-item:active{cursor:grabbing}
.placed-item.selected{outline:2px solid #ff0;outline-offset:2px}

/* ─── Right: Controls ─── */
#controls{width:360px;overflow-y:auto;background:#16213e;padding:16px;display:flex;flex-direction:column;gap:12px}
#controls h2{font-size:16px;color:#ffd700;border-bottom:1px solid #333;padding-bottom:6px}
#item-list{max-height:200px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:4px}
.item-btn{width:56px;height:56px;border:2px solid #444;border-radius:8px;cursor:pointer;background:#222;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:2px}
.item-btn img{max-width:100%;max-height:100%;object-fit:contain}
.item-btn.active{border-color:#ffd700}
.item-btn.has-b{box-shadow:0 0 0 2px #4CAF50 inset}
.item-btn:hover{border-color:#888}

label{display:flex;align-items:center;gap:8px;font-size:13px}
label span{min-width:70px}
input[type=range]{flex:1}
input[type=number]{width:60px;background:#222;color:#eee;border:1px solid #555;border-radius:4px;padding:2px 4px;text-align:center}
.row{display:flex;gap:8px;align-items:center}
.section{background:#1a2744;padding:10px;border-radius:8px}
.section h3{font-size:13px;color:#aaa;margin-bottom:6px}

#export-btn{background:#ffd700;color:#1a1a2e;border:none;padding:10px;border-radius:8px;font-weight:bold;cursor:pointer;font-size:14px}
#export-btn:hover{background:#ffed4a}
#export-area{width:100%;height:120px;background:#111;color:#0f0;border:1px solid #444;border-radius:4px;font-family:monospace;font-size:11px;resize:vertical}
#info{font-size:12px;color:#888;line-height:1.4}
</style>
</head>
<body>

<div id="room-panel">
  <div id="room-wrapper">
    <div id="room-container">
      <img id="room-bg" src="../assets/images/Rooms/Room_Base_grid.png" alt="room">
      <canvas id="grid-canvas"></canvas>
      <div id="item-layer"></div>
    </div>
  </div>
  <div id="zoom-label" style="position:absolute;top:8px;left:8px;font-size:16px;color:#ffd700;pointer-events:none;z-index:999">×1.0</div>
  <div style="position:absolute;bottom:8px;left:8px;font-size:11px;color:#888;pointer-events:none">ホイールで拡大・縮小 / 中ボタン or 右ドラッグでパン</div>
</div>

<div id="controls">
  <h2>家具ピボット＆配置範囲 調整ツール</h2>

  <div id="info">
    アイテムを選択 → ドラッグで配置 → ピボット・範囲を調整<br>
    赤セル＝配置不可、緑セル＝配置可能
  </div>

  <details id="grid-adjuster" style="background:#1a2744;padding:8px;border-radius:8px">
    <summary style="cursor:pointer;font-size:13px;color:#ffd700">🔧 グリッド頂点調整</summary>
    <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
      <label><span>back X</span>
        <input type="range" id="sl-grid-backX" min="0.3" max="0.7" step="0.001">
        <input type="number" id="num-grid-backX" step="0.001" style="width:70px">
      </label>
      <label><span>back Y</span>
        <input type="range" id="sl-grid-backY" min="0.1" max="0.6" step="0.001">
        <input type="number" id="num-grid-backY" step="0.001" style="width:70px">
      </label>
      <label><span>right X</span>
        <input type="range" id="sl-grid-rightX" min="0.5" max="0.95" step="0.001">
        <input type="number" id="num-grid-rightX" step="0.001" style="width:70px">
      </label>
      <label><span>right Y</span>
        <input type="range" id="sl-grid-rightY" min="0.4" max="0.8" step="0.001">
        <input type="number" id="num-grid-rightY" step="0.001" style="width:70px">
      </label>
      <label><span>left X</span>
        <input type="range" id="sl-grid-leftX" min="0.05" max="0.5" step="0.001">
        <input type="number" id="num-grid-leftX" step="0.001" style="width:70px">
      </label>
      <label><span>left Y</span>
        <input type="range" id="sl-grid-leftY" min="0.4" max="0.8" step="0.001">
        <input type="number" id="num-grid-leftY" step="0.001" style="width:70px">
      </label>
      <label><span>front X</span>
        <input type="range" id="sl-grid-frontX" min="0.3" max="0.7" step="0.001">
        <input type="number" id="num-grid-frontX" step="0.001" style="width:70px">
      </label>
      <label><span>front Y</span>
        <input type="range" id="sl-grid-frontY" min="0.7" max="1.0" step="0.001">
        <input type="number" id="num-grid-frontY" step="0.001" style="width:70px">
      </label>
      <div style="display:flex;gap:4px;margin-top:4px">
        <button id="grid-undo-btn" style="flex:1;background:#666;color:#fff;border:none;padding:6px;border-radius:4px;cursor:pointer;font-size:12px" disabled>↩ もどす</button>
        <button id="grid-reset-btn" style="flex:1;background:#f44336;color:#fff;border:none;padding:6px;border-radius:4px;cursor:pointer;font-size:12px">初期値に戻す</button>
      </div>
      <button id="grid-export-btn" style="margin-top:4px;background:#ff9800;color:#1a1a2e;border:none;padding:6px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:bold">グリッド値をコピー</button>
      <div id="grid-export-result" style="font-size:11px;color:#4CAF50;min-height:16px"></div>
    </div>
  </details>

  <div id="item-list"></div>

  <div class="section" id="selected-info" style="display:none">
    <h3 id="sel-name">---</h3>

    <label><span>cellSize</span>
      <input type="range" id="sl-cellSize" min="0.3" max="3.0" step="0.1">
      <input type="number" id="num-cellSize" step="0.1">
    </label>

    <label><span>pivotX (%)</span>
      <input type="range" id="sl-pivotX" min="-100" max="100" step="0.5">
      <input type="number" id="num-pivotX" step="0.5">
    </label>

    <label><span>pivotY (%)</span>
      <input type="range" id="sl-pivotY" min="-100" max="100" step="0.1">
      <input type="number" id="num-pivotY" step="0.1">
    </label>

    <div id="ab-toggle" style="display:none;margin-top:6px">
      <button id="btn-angle-a" style="padding:6px 16px;border:2px solid #ffd700;border-radius:6px;background:#ffd700;color:#1a1a2e;cursor:pointer;font-weight:bold">A角度</button>
      <button id="btn-angle-b" style="padding:6px 16px;border:2px solid #555;border-radius:6px;background:#333;color:#eee;cursor:pointer">B角度</button>
    </div>

    <h3 style="margin-top:8px">配置範囲 (row / col)</h3>
    <div class="row">
      <label><span>minRow</span><input type="number" id="num-minRow" min="0" max="7" step="1"></label>
      <label><span>maxRow</span><input type="number" id="num-maxRow" min="0" max="7" step="1"></label>
    </div>
    <div class="row">
      <label><span>minCol</span><input type="number" id="num-minCol" min="0" max="7" step="1"></label>
      <label><span>maxCol</span><input type="number" id="num-maxCol" min="0" max="7" step="1"></label>
    </div>
    <div style="font-size:11px;color:#888;margin-top:4px">
      row↗右奥方向, col↖左奥方向
    </div>

    <div id="surface-section" style="display:none;margin-top:8px;border-top:1px solid #444;padding-top:8px">
      <h3 style="color:#ff9800">🧸 デコ乗せ位置 (surfaceY)</h3>
      <div style="font-size:11px;color:#888;margin-bottom:4px">デコを上に乗せた時のY方向オフセット（負=上へ）</div>
      <label><span>surfaceY</span>
        <input type="range" id="sl-surfaceY" min="-150" max="0" step="0.5">
        <input type="number" id="num-surfaceY" step="0.5">
      </label>
      <div id="surface-preview-toggle" style="margin-top:4px">
        <button id="btn-surface-preview" style="padding:4px 12px;border:1px solid #ff9800;border-radius:4px;background:#333;color:#ff9800;cursor:pointer;font-size:12px">🧸 プレビューON</button>
      </div>
    </div>
  </div>

  <div class="row" style="gap:6px">
    <button id="undo-btn" style="flex:1;background:#666;color:#fff;border:none;padding:8px;border-radius:6px;cursor:pointer;font-size:13px;display:none" disabled>↩ もどす</button>
    <button id="reset-item-btn" style="flex:1;background:#f44336;color:#fff;border:none;padding:8px;border-radius:6px;cursor:pointer;font-size:13px;display:none">🗑 リセット</button>
  </div>
  <div style="font-size:11px;color:#666;text-align:center;margin-top:2px">※ 変更は自動保存されます</div>

  <button id="export-btn">全アイテムの値をエクスポート</button>
  <textarea id="export-area" readonly></textarea>
</div>

<script>
// ─── ISO_GRID (from room/index.html) ───
const ISO_GRID = {
  cells: 8,
  back:  { x: 0.5, y: 0.407 },
  right: { x: 0.762, y: 0.675 },
  left:  { x: 0.239, y: 0.674 },
  front: { x: 0.5, y: 0.944 },
};

function isoGridPt(u, v) {
  const n = ISO_GRID.cells;
  const s = u / n, t = v / n;
  const B = ISO_GRID.back, R = ISO_GRID.right, L = ISO_GRID.left, F = ISO_GRID.front;
  return {
    x: (1-s)*(1-t)*B.x + s*(1-t)*R.x + (1-s)*t*L.x + s*t*F.x,
    y: (1-s)*(1-t)*B.y + s*(1-t)*R.y + (1-s)*t*L.y + s*t*F.y,
  };
}

function getGridCell(u, v) {
  const p = isoGridPt(u + 0.5, v + 0.5);
  return { leftPct: p.x * 100, bottomPct: (1 - p.y) * 100 };
}

// 高さベースでサイズ制御（16:9アスペクト比補正付き＝既存cellSize値と互換）
// GRID_CELL_PCT is dynamically recalculated when grid vertices change
var GRID_CELL_PCT = (ISO_GRID.right.x - ISO_GRID.left.x) / ISO_GRID.cells * 100 * (16 / 9);

// ─── Items (inline from items.js, furniture/deco only) ───
const ITEMS = [
  { id:'furn_bear_1', name:'くまぬいぐるみ', roomImg:'../assets/images/Rooms/furnitures_final/bear_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/bear_B.png', cellSize:0.7, pivotX:3.3, pivotY:1.3 },
  { id:'furn_bed_wood', name:'きのベッド', roomImg:'../assets/images/Rooms/furnitures_final/bed_A_01.png', roomImgB:'../assets/images/Rooms/furnitures_final/bed_B_01.png', cellSize:2.2, pivotX:14.3, pivotY:0.6 },
  { id:'furn_desk', name:'あおいつくえ', roomImg:'../assets/images/Rooms/furnitures_final/desk_A_01.png', roomImgB:'../assets/images/Rooms/furnitures_final/desk_B_01.png', cellSize:1.8, pivotX:15.7, pivotY:1.1 },
  { id:'furn_bookshelf_w', name:'しろいほんだな', roomImg:'../assets/images/Rooms/furnitures_final/BookShelf01_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/BookShelf01_B.png', cellSize:1.2, pivotX:17.5, pivotY:0.7 },
  { id:'furn_toyshelf', name:'おもちゃだな', roomImg:'../assets/images/Rooms/furnitures_final/Shelf01_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/Shelf01_B.png', cellSize:1.8, pivotX:-24.7, pivotY:0.8 },
  { id:'deco_dinosaur', name:'きょうりゅう', roomImg:'../assets/images/Rooms/furnitures_final/Dinasour01_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/Dinasour01_B.png', cellSize:0.8, pivotX:-8.1, pivotY:1.4 },
  { id:'furn_bookshelf2', name:'きのほんだな', roomImg:'../assets/images/Rooms/furnitures_final/BookShelf02_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/BookShelf02_B.png', cellSize:1.8, pivotX:0, pivotY:0 },
  { id:'furn_shelf2', name:'おおきなたな', roomImg:'../assets/images/Rooms/furnitures_final/Shelf02_B.png', roomImgB:'../assets/images/Rooms/furnitures_final/Shelf02_A.png', cellSize:1.8, pivotX:0, pivotY:0 },
  { id:'furn_toyshelf2', name:'おもちゃだな2', roomImg:'../assets/images/Rooms/furnitures_final/ToyShelf01_B.png', roomImgB:'../assets/images/Rooms/furnitures_final/ToyShelf01_A.png', cellSize:1.3, pivotX:0, pivotY:0 },
  { id:'furn_desk2', name:'きのつくえ', roomImg:'../assets/images/Rooms/furnitures_final/desk02_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/desk02_B.png', cellSize:1.8, pivotX:0, pivotY:0 },
  { id:'furn_bed_pink', name:'ピンクベッド', roomImg:'../assets/images/Rooms/furnitures_final/bed_pink_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/bed_pink_B.png', cellSize:2, pivotX:0, pivotY:0 },
  { id:'furn_desk_pink', name:'ピンクつくえ', roomImg:'../assets/images/Rooms/furnitures_final/desk_pink_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/desk_pink_B.png', cellSize:1.8, pivotX:0, pivotY:0 },
  { id:'furn_bookshelf_pink', name:'ピンクほんだな', roomImg:'../assets/images/Rooms/furnitures_final/bookshelf_pink_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/bookshelf_pink_B.png', cellSize:1.8, pivotX:0, pivotY:0 },
  { id:'furn_chest_pink', name:'ピンクチェスト', roomImg:'../assets/images/Rooms/furnitures_final/chest_pink_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/chest_pink_B.png', cellSize:1.2, pivotX:0, pivotY:0 },
  { id:'deco_bear_ribbon', name:'リボンくま', roomImg:'../assets/images/Rooms/furnitures_final/bear_ribbon_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/bear_ribbon_B.png', cellSize:0.7, pivotX:0, pivotY:0 },
  { id:'deco_bunny', name:'うさぎぬいぐるみ', roomImg:'../assets/images/Rooms/furnitures_final/bunny_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/bunny_B.png', cellSize:0.7, pivotX:0, pivotY:0 },
  { id:'deco_doll', name:'おにんぎょう', roomImg:'../assets/images/Rooms/furnitures_final/doll_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/doll_B.png', cellSize:0.7, pivotX:0, pivotY:0 },
  { id:'deco_carousel', name:'メリーゴーランド', roomImg:'../assets/images/Rooms/furnitures_final/carousel.png', cellSize:0.8, pivotX:0, pivotY:0 },
  { id:'deco_rug_pink', name:'ピンクラグ', roomImg:'../assets/images/Rooms/furnitures_final/rug_pink.png', cellSize:2.0, pivotX:0, pivotY:0 },
  { id:'deco_toybox_pink', name:'おもちゃばこ', roomImg:'../assets/images/Rooms/furnitures_final/toybox_pink.png', cellSize:0.8, pivotX:0, pivotY:0 },
  { id:'deco_stroller', name:'ベビーカー', roomImg:'../assets/images/Rooms/furnitures_final/stroller.png', cellSize:0.8, pivotX:0, pivotY:0 },
  { id:'deco_babycar', name:'にゅうぼしゃ', roomImg:'../assets/images/Rooms/furnitures_final/babycar_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/babycar_B.png', cellSize:0.9, pivotX:0, pivotY:0 },
  { id:'deco_box', name:'おかたづけばこ', roomImg:'../assets/images/Rooms/furnitures_final/box_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/box_B.png', cellSize:0.8, pivotX:0, pivotY:0 },
  { id:'furn_shelf_toy', name:'おもちゃだな3', roomImg:'../assets/images/Rooms/furnitures_final/shelf_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/shelf_B.png', cellSize:1.2, pivotX:0, pivotY:0 },
  { id:'deco_shelf_wall', name:'かべだな', roomImg:'../assets/images/Rooms/furnitures_final/shelf2_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/shelf2_B.png', cellSize:1.0, pivotX:0, pivotY:0 },
  { id:'deco_tea', name:'ティーセット', roomImg:'../assets/images/Rooms/furnitures_final/tea_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/tea_B.png', cellSize:0.8, pivotX:0, pivotY:0 },
  // にわ小物は room/yard_adjuster.html で管理
];

// サーフェス家具（デコを上に乗せられる）
const SURFACE_IDS = new Set([
  'furn_bed_wood', 'furn_desk', 'furn_toyshelf', 'furn_shelf2',
  'furn_toyshelf2', 'furn_desk2', 'furn_bed_pink', 'furn_desk_pink',
  'furn_chest_pink',
]);

// Per-item adjustments (editable state) — separate for A and B angles
const adjustments = {};
function adjKey(id, angle) { return id + '_' + (angle || currentAngle); }
function curAdj() { return selectedId ? adjustments[adjKey(selectedId)] : null; }

ITEMS.forEach(item => {
  const cs = item.cellSize || 1;
  const autoMargin = Math.max(0, Math.ceil(cs) - 1);
  const base = {
    cellSize: item.cellSize,
    pivotX: item.pivotX,
    pivotY: item.pivotY,
    minRow: autoMargin,
    maxRow: 7 - autoMargin,
    minCol: autoMargin,
    maxCol: 7 - autoMargin,
    row: 3, col: 3,
    surfaceY: item.surfaceY || 0,
  };
  adjustments[adjKey(item.id, 'A')] = Object.assign({}, base);
  if (item.roomImgB) {
    adjustments[adjKey(item.id, 'B')] = Object.assign({}, base);
  }
});

// ─── Save / Load from localStorage ───
const SAVE_KEY = 'furniture_adjuster_data';
function saveToStorage() {
  localStorage.setItem(SAVE_KEY, JSON.stringify(adjustments));
}
function loadFromStorage() {
  try {
    const data = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (!data) return false;
    Object.keys(data).forEach(key => {
      if (adjustments[key]) {
        // New format: key already has _A / _B suffix
        Object.assign(adjustments[key], data[key]);
      } else if (!key.endsWith('_A') && !key.endsWith('_B')) {
        // Old format migration: bare id → copy into both _A and _B
        if (adjustments[key + '_A']) Object.assign(adjustments[key + '_A'], data[key]);
        if (adjustments[key + '_B']) Object.assign(adjustments[key + '_B'], data[key]);
      }
    });
    // surfaceYが未設定のエントリにデフォルト値を補完
    Object.keys(adjustments).forEach(key => {
      if (adjustments[key].surfaceY == null) {
        adjustments[key].surfaceY = 0;
      }
    });
    return true;
  } catch(e) { return false; }
}
const hadSave = loadFromStorage();

let selectedId = null;

// ─── UI setup ───
const container = document.getElementById('room-container');
const canvas = document.getElementById('grid-canvas');
const ctx = canvas.getContext('2d');
const itemLayer = document.getElementById('item-layer');

// Build item list
const listEl = document.getElementById('item-list');
ITEMS.forEach(item => {
  const btn = document.createElement('div');
  btn.className = 'item-btn' + (item.roomImgB ? ' has-b' : '');
  btn.dataset.id = item.id;
  btn.title = item.name + (item.roomImgB ? ' (A/B)' : '');
  const img = document.createElement('img');
  img.src = item.roomImg;
  btn.appendChild(img);
  btn.onclick = () => selectItem(item.id);
  listEl.appendChild(btn);
});

// ─── A/B angle state ───
let currentAngle = 'A'; // 'A' or 'B'

// ─── Select item ───
function selectItem(id) {
  selectedId = id;
  currentAngle = 'A';
  document.querySelectorAll('.item-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  document.getElementById('selected-info').style.display = '';
  document.getElementById('reset-item-btn').style.display = '';
  document.getElementById('undo-btn').style.display = '';

  const item = ITEMS.find(x => x.id === id);

  // Switch background for farm items
  const bgEl = document.getElementById('room-bg');
  if (id.startsWith('farm_') || id.startsWith('yard_')) {
    bgEl.src = '../assets/images/yard/green_sm.png';
  } else if (!bgEl.src.includes('Room_Base_grid')) {
    bgEl.src = '../assets/images/Rooms/Room_Base_grid.png';
  }
  const adj = adjustments[adjKey(id)];
  document.getElementById('sel-name').textContent = item.name + ' (' + id + ') [' + currentAngle + ']';

  // Show/hide A/B toggle
  const abToggle = document.getElementById('ab-toggle');
  if (item.roomImgB) {
    abToggle.style.display = '';
    updateAngleButtons();
  } else {
    abToggle.style.display = 'none';
  }

  syncSlider('cellSize', adj.cellSize);
  syncSlider('pivotX', adj.pivotX);
  syncSlider('pivotY', adj.pivotY);
  document.getElementById('num-minRow').value = adj.minRow;
  document.getElementById('num-maxRow').value = adj.maxRow;
  document.getElementById('num-minCol').value = adj.minCol;
  document.getElementById('num-maxCol').value = adj.maxCol;

  // surfaceYセクション表示/非表示
  const surfSec = document.getElementById('surface-section');
  if (SURFACE_IDS.has(id)) {
    surfSec.style.display = '';
    syncSlider('surfaceY', adj.surfaceY || 0);
  } else {
    surfSec.style.display = 'none';
  }
  removeSurfacePreview();

  placeItem(id);
  drawGrid();
}

function updateAngleButtons() {
  const a = document.getElementById('btn-angle-a');
  const b = document.getElementById('btn-angle-b');
  a.style.background = currentAngle === 'A' ? '#ffd700' : '#333';
  a.style.color = currentAngle === 'A' ? '#1a1a2e' : '#eee';
  a.style.borderColor = currentAngle === 'A' ? '#ffd700' : '#555';
  b.style.background = currentAngle === 'B' ? '#ffd700' : '#333';
  b.style.color = currentAngle === 'B' ? '#1a1a2e' : '#eee';
  b.style.borderColor = currentAngle === 'B' ? '#ffd700' : '#555';
}

document.getElementById('btn-angle-a').onclick = () => { currentAngle = 'A'; updateAngleButtons(); if (selectedId) reloadSliders(selectedId); if (_surfacePreviewOn) updateSurfacePreview(); };
document.getElementById('btn-angle-b').onclick = () => { currentAngle = 'B'; updateAngleButtons(); if (selectedId) reloadSliders(selectedId); if (_surfacePreviewOn) updateSurfacePreview(); };

function reloadSliders(id) {
  const adj = adjustments[adjKey(id)];
  const item = ITEMS.find(x => x.id === id);
  document.getElementById('sel-name').textContent = item.name + ' (' + id + ') [' + currentAngle + ']';
  syncSlider('cellSize', adj.cellSize);
  syncSlider('pivotX', adj.pivotX);
  syncSlider('pivotY', adj.pivotY);
  document.getElementById('num-minRow').value = adj.minRow;
  document.getElementById('num-maxRow').value = adj.maxRow;
  document.getElementById('num-minCol').value = adj.minCol;
  document.getElementById('num-maxCol').value = adj.maxCol;
  // surfaceY
  const surfSec2 = document.getElementById('surface-section');
  if (SURFACE_IDS.has(id)) {
    surfSec2.style.display = '';
    syncSlider('surfaceY', adj.surfaceY || 0);
  } else {
    surfSec2.style.display = 'none';
  }
  placeItem(id);
  drawGrid();
  if (_surfacePreviewOn) updateSurfacePreview();
}

function syncSlider(name, val) {
  document.getElementById('sl-' + name).value = val;
  document.getElementById('num-' + name).value = val;
}

// ─── Undo stack ───
const undoStack = []; // { key, snapshot }
const UNDO_MAX = 30;
function pushUndo() {
  if (!selectedId) return;
  const key = adjKey(selectedId);
  undoStack.push({ key, snapshot: Object.assign({}, adjustments[key]) });
  if (undoStack.length > UNDO_MAX) undoStack.shift();
  document.getElementById('undo-btn').disabled = false;
}
document.getElementById('undo-btn').onclick = () => {
  if (undoStack.length === 0) return;
  const { key, snapshot } = undoStack.pop();
  adjustments[key] = snapshot;
  // IDと角度を復元してスライダー更新
  const parts = key.split('_');
  const angle = parts.pop();
  const id = parts.join('_');
  selectedId = id;
  currentAngle = angle;
  updateAngleButtons();
  reloadSliders(id);
  saveToStorage();
  document.getElementById('undo-btn').disabled = undoStack.length === 0;
};

// ─── Slider/number bindings ───
['cellSize', 'pivotX', 'pivotY'].forEach(name => {
  const sl = document.getElementById('sl-' + name);
  const num = document.getElementById('num-' + name);
  let pushed = false;
  function update(val, fromPointerDown) {
    if (!selectedId) return;
    if (!pushed) { pushUndo(); pushed = true; }
    adjustments[adjKey(selectedId)][name] = parseFloat(val);
    placeItem(selectedId);
    drawGrid();
  }
  sl.onpointerdown = () => { pushed = false; };
  sl.oninput = () => { num.value = sl.value; update(sl.value); };
  num.onfocus = () => { pushUndo(); };
  num.oninput = () => { sl.value = num.value; if (!selectedId) return; adjustments[adjKey(selectedId)][name] = parseFloat(num.value); placeItem(selectedId); drawGrid(); };
});

['minRow', 'maxRow', 'minCol', 'maxCol'].forEach(name => {
  document.getElementById('num-' + name).oninput = (e) => {
    if (!selectedId) return;
    pushUndo();
    adjustments[adjKey(selectedId)][name] = parseInt(e.target.value) || 0;
    const adj = adjustments[adjKey(selectedId)];
    adj.row = Math.max(adj.minRow, Math.min(adj.maxRow, adj.row));
    adj.col = Math.max(adj.minCol, Math.min(adj.maxCol, adj.col));
    placeItem(selectedId);
    drawGrid();
  };
});

// ─── surfaceY slider binding ───
{
  const sl = document.getElementById('sl-surfaceY');
  const num = document.getElementById('num-surfaceY');
  let pushed = false;
  function updateSurfaceY(val) {
    if (!selectedId) return;
    if (!pushed) { pushUndo(); pushed = true; }
    adjustments[adjKey(selectedId)].surfaceY = parseFloat(val);
    updateSurfacePreview();
    saveToStorage();
  }
  sl.onpointerdown = () => { pushed = false; };
  sl.oninput = () => { num.value = sl.value; updateSurfaceY(sl.value); };
  num.onfocus = () => { pushUndo(); };
  num.oninput = () => { sl.value = num.value; if (!selectedId) return; adjustments[adjKey(selectedId)].surfaceY = parseFloat(num.value); updateSurfacePreview(); saveToStorage(); };
}

// ─── Surface preview (deco on top of furniture) ───
let _surfacePreviewEl = null;
let _surfacePreviewOn = false;

function removeSurfacePreview() {
  if (_surfacePreviewEl) { _surfacePreviewEl.remove(); _surfacePreviewEl = null; }
  _surfacePreviewOn = false;
  const btn = document.getElementById('btn-surface-preview');
  btn.textContent = '🧸 プレビューON';
  btn.style.background = '#333';
}

function updateSurfacePreview() {
  if (!_surfacePreviewOn || !_surfacePreviewEl || !selectedId) return;
  const adj = adjustments[adjKey(selectedId)];
  const cell = getGridCell(adj.row, adj.col);
  const decoSize = 0.7 * GRID_CELL_PCT;
  const surfY = adj.surfaceY || 0;
  // A/Bに応じてくま画像を切り替え
  const bearImg = currentAngle === 'B'
    ? '../assets/images/Rooms/furnitures_final/bear_B.png'
    : '../assets/images/Rooms/furnitures_final/bear_A.png';
  if (!_surfacePreviewEl.src.endsWith(bearImg.replace('../', '/'))) {
    _surfacePreviewEl.src = bearImg;
  }
  _surfacePreviewEl.style.left = cell.leftPct + '%';
  _surfacePreviewEl.style.bottom = cell.bottomPct + '%';
  _surfacePreviewEl.style.height = decoSize.toFixed(2) + '%';
  _surfacePreviewEl.style.transform = `translate(-50%, ${surfY}%)`;
  _surfacePreviewEl.style.zIndex = 200;
}

document.getElementById('btn-surface-preview').onclick = () => {
  if (_surfacePreviewOn) {
    removeSurfacePreview();
    return;
  }
  _surfacePreviewOn = true;
  const btn = document.getElementById('btn-surface-preview');
  btn.textContent = '🧸 プレビューOFF';
  btn.style.background = '#ff9800';
  const bearImg = currentAngle === 'B'
    ? '../assets/images/Rooms/furnitures_final/bear_B.png'
    : '../assets/images/Rooms/furnitures_final/bear_A.png';
  const el = document.createElement('img');
  el.src = bearImg;
  el.style.position = 'absolute';
  el.style.width = 'auto';
  el.style.pointerEvents = 'none';
  el.style.opacity = '0.8';
  el.style.filter = 'drop-shadow(0 0 4px #ff9800)';
  el.style.transformOrigin = 'bottom center';
  document.getElementById('item-layer').appendChild(el);
  _surfacePreviewEl = el;
  updateSurfacePreview();
};

// ─── Place item on grid ───
let _placedEl = null;

function updateItemPos(id) {
  if (!_placedEl || !id) return;
  const adj = adjustments[adjKey(id)];
  const cell = getGridCell(adj.row, adj.col);
  const heightPct = adj.cellSize * GRID_CELL_PCT;
  _placedEl.style.left = cell.leftPct + '%';
  _placedEl.style.bottom = cell.bottomPct + '%';
  _placedEl.style.height = heightPct.toFixed(2) + '%';
  _placedEl.style.width = 'auto';
  _placedEl.style.transform = `translate(calc(-50% - ${adj.pivotX}%), ${adj.pivotY}%)`;
  if (_surfacePreviewOn) updateSurfacePreview();
}

function placeItem(id) {
  const item = ITEMS.find(x => x.id === id);
  const imgSrc = (currentAngle === 'B' && item && item.roomImgB) ? item.roomImgB : (item ? item.roomImg : '');
  const currentSrc = _placedEl ? _placedEl.src : '';
  const needsNew = !_placedEl || !item || !currentSrc.endsWith(imgSrc.replace('../', '/'));

  if (needsNew) {
    // プレビューを一時退避してからクリア
    if (_surfacePreviewEl && _surfacePreviewEl.parentNode === itemLayer) {
      itemLayer.removeChild(_surfacePreviewEl);
    }
    itemLayer.innerHTML = '';
    if (!id || !item) { _placedEl = null; return; }

    const el = document.createElement('img');
    el.className = 'placed-item selected';
    el.src = imgSrc;
    el.style.height = 'auto';
    el.style.transformOrigin = 'bottom center';
    el.style.zIndex = 100;
    el.draggable = false;
    itemLayer.appendChild(el);
    _placedEl = el;

    // Drag via pointer events on the container (not the image)
    let dragging = false;
    el.onpointerdown = (e) => { dragging = true; el.setPointerCapture(e.pointerId); e.preventDefault(); };
    el.onpointermove = (e) => {
      if (!dragging) return;
      const rect = container.getBoundingClientRect();
      const px = (e.clientX - rect.left) / rect.width;
      const py = (e.clientY - rect.top) / rect.height;
      let bestR = 0, bestC = 0, bestD = Infinity;
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const p = isoGridPt(r + 0.5, c + 0.5);
          const dx = px - p.x, dy = py - p.y;
          const d = dx*dx + dy*dy;
          if (d < bestD) { bestD = d; bestR = r; bestC = c; }
        }
      }
      const adj = adjustments[adjKey(selectedId)];
      adj.row = Math.max(adj.minRow, Math.min(adj.maxRow, bestR));
      adj.col = Math.max(adj.minCol, Math.min(adj.maxCol, bestC));
      updateItemPos(selectedId);
      drawGrid();
    };
    el.onpointerup = () => { dragging = false; };
  }

  updateItemPos(id);
  // プレビューが有効なら再追加
  if (_surfacePreviewOn && _surfacePreviewEl) {
    itemLayer.appendChild(_surfacePreviewEl);
    updateSurfacePreview();
  }
}

// ─── Draw grid ───
function drawGrid() {
  const w = container.offsetWidth;
  const h = container.offsetHeight;
  canvas.width = w * devicePixelRatio;
  canvas.height = h * devicePixelRatio;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.clearRect(0, 0, w, h);

  const n = ISO_GRID.cells;
  const adj = selectedId ? adjustments[adjKey(selectedId)] : null;

  // Fill floor area with opaque color to hide background grid
  const fBL = isoGridPt(0, n);  // left corner
  const fBR = isoGridPt(n, 0);  // right corner
  const fB  = isoGridPt(0, 0);  // back corner
  const fF  = isoGridPt(n, n);  // front corner
  ctx.beginPath();
  ctx.moveTo(fB.x*w, fB.y*h);
  ctx.lineTo(fBR.x*w, fBR.y*h);
  ctx.lineTo(fF.x*w, fF.y*h);
  ctx.lineTo(fBL.x*w, fBL.y*h);
  ctx.closePath();
  ctx.fillStyle = '#2a3a5e';
  ctx.fill();

  // Draw cell fills (red=forbidden, green=allowed)
  if (adj) {
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        const allowed = r >= adj.minRow && r <= adj.maxRow && c >= adj.minCol && c <= adj.maxCol;
        const p0 = isoGridPt(r, c);
        const p1 = isoGridPt(r+1, c);
        const p2 = isoGridPt(r+1, c+1);
        const p3 = isoGridPt(r, c+1);
        ctx.beginPath();
        ctx.moveTo(p0.x*w, p0.y*h);
        ctx.lineTo(p1.x*w, p1.y*h);
        ctx.lineTo(p2.x*w, p2.y*h);
        ctx.lineTo(p3.x*w, p3.y*h);
        ctx.closePath();
        ctx.fillStyle = allowed ? 'rgba(0,200,0,0.25)' : 'rgba(200,0,0,0.35)';
        ctx.fill();
      }
    }
  }

  // Draw grid lines
  ctx.strokeStyle = 'rgba(0,255,0,0.7)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= n; i++) {
    const a = isoGridPt(i, 0), b = isoGridPt(i, n);
    ctx.beginPath(); ctx.moveTo(a.x*w, a.y*h); ctx.lineTo(b.x*w, b.y*h); ctx.stroke();
    const c = isoGridPt(0, i), d = isoGridPt(n, i);
    ctx.beginPath(); ctx.moveTo(c.x*w, c.y*h); ctx.lineTo(d.x*w, d.y*h); ctx.stroke();
  }

  // Draw cell labels
  ctx.font = '10px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center';
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      const p = isoGridPt(r + 0.5, c + 0.5);
      ctx.fillText(`${r},${c}`, p.x*w, p.y*h + 4);
    }
  }

  // Current position marker
  if (adj) {
    const cp = isoGridPt(adj.row + 0.5, adj.col + 0.5);
    ctx.beginPath();
    ctx.arc(cp.x*w, cp.y*h, 6, 0, Math.PI*2);
    ctx.fillStyle = '#f00';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// ─── Export ───
document.getElementById('export-btn').onclick = () => {
  const lines = [];
  ITEMS.forEach(item => {
    const adjA = adjustments[adjKey(item.id, 'A')];
    const adjB = item.roomImgB ? adjustments[adjKey(item.id, 'B')] : null;

    function fmtAngle(adj, label) {
      const cs = adj.cellSize;
      const autoMargin = Math.max(0, Math.ceil(cs) - 1);
      const hasCustomBounds =
        adj.minRow !== autoMargin || adj.maxRow !== (7 - autoMargin) ||
        adj.minCol !== autoMargin || adj.maxCol !== (7 - autoMargin);
      let line = `  // ${item.name} [${label}]\n  { id:'${item.id}', angle:'${label}', cellSize:${adj.cellSize}, pivotX:${adj.pivotX}, pivotY:${adj.pivotY}`;
      if (hasCustomBounds) {
        line += `, minRow:${adj.minRow}, maxRow:${adj.maxRow}, minCol:${adj.minCol}, maxCol:${adj.maxCol}`;
      }
      if (SURFACE_IDS.has(item.id) && adj.surfaceY) {
        line += `, surfaceY:${adj.surfaceY}`;
      }
      line += ' },';
      return line;
    }

    lines.push(fmtAngle(adjA, 'A'));
    if (adjB) lines.push(fmtAngle(adjB, 'B'));
  });
  document.getElementById('export-area').value = lines.join('\n');
};

// ─── Per-item reset button ───
document.getElementById('reset-item-btn').onclick = () => {
  if (!selectedId) return;
  const item = ITEMS.find(x => x.id === selectedId);
  if (!item) return;
  if (!confirm(`「${item.name}」の${currentAngle}角度の調整値を初期値に戻しますか？`)) return;
  const cs = item.cellSize || 1;
  const autoMargin = Math.max(0, Math.ceil(cs) - 1);
  adjustments[adjKey(selectedId)] = {
    cellSize: item.cellSize, pivotX: item.pivotX, pivotY: item.pivotY,
    minRow: autoMargin, maxRow: 7 - autoMargin,
    minCol: autoMargin, maxCol: 7 - autoMargin,
    row: 3, col: 3, surfaceY: 0,
  };
  reloadSliders(selectedId);
  saveToStorage();
};

// Auto-save on every change
const _origPlaceItem = placeItem;
placeItem = function(id) { _origPlaceItem(id); saveToStorage(); };

// ─── Zoom & Pan ───
(function setupZoomPan() {
  var zoom = 1, px = 0, py = 0;
  var wrapper = document.getElementById('room-wrapper');
  var label = document.getElementById('zoom-label');

  function apply() {
    wrapper.style.transform = 'translate(' + px + 'px,' + py + 'px) scale(' + zoom + ')';
    label.textContent = '×' + zoom.toFixed(1);
  }

  // Wheel zoom
  window.onwheel = function(e) {
    var panel = document.getElementById('room-panel');
    if (!panel.contains(e.target)) return;
    e.preventDefault();
    zoom += (e.deltaY > 0 ? -0.2 : 0.2);
    if (zoom < 0.5) zoom = 0.5;
    if (zoom > 5) zoom = 5;
    apply();
  };

  // Middle/right-button drag to pan
  var dragging = false, sx = 0, sy = 0, bx = 0, by = 0;
  window.onmousedown = function(e) {
    var panel = document.getElementById('room-panel');
    if (!panel.contains(e.target)) return;
    if (e.button === 1 || e.button === 2) {
      dragging = true; sx = e.clientX; sy = e.clientY; bx = px; by = py;
      e.preventDefault();
    }
  };
  window.onmousemove = function(e) {
    if (!dragging) return;
    px = bx + (e.clientX - sx);
    py = by + (e.clientY - sy);
    apply();
  };
  window.onmouseup = function(e) {
    if (e.button === 1 || e.button === 2) dragging = false;
  };
  window.oncontextmenu = function(e) {
    if (document.getElementById('room-panel').contains(e.target)) e.preventDefault();
  };
})();

// ─── Grid vertex adjustment ───
const GRID_DEFAULT = {
  back:  { x: 0.5, y: 0.407 },
  right: { x: 0.762, y: 0.675 },
  left:  { x: 0.239, y: 0.674 },
  front: { x: 0.5, y: 0.944 },
};
const GRID_SAVE_KEY = 'furniture_adjuster_grid';
const gridHistory = []; // undo stack
function pushGridHistory() {
  gridHistory.push({ back:{...ISO_GRID.back}, right:{...ISO_GRID.right}, left:{...ISO_GRID.left}, front:{...ISO_GRID.front} });
  if (gridHistory.length > 50) gridHistory.shift();
  document.getElementById('grid-undo-btn').disabled = false;
}
const gridPoints = [
  { pt: 'back',  axis: 'X', key: 'x' },
  { pt: 'back',  axis: 'Y', key: 'y' },
  { pt: 'right', axis: 'X', key: 'x' },
  { pt: 'right', axis: 'Y', key: 'y' },
  { pt: 'left',  axis: 'X', key: 'x' },
  { pt: 'left',  axis: 'Y', key: 'y' },
  { pt: 'front', axis: 'X', key: 'x' },
  { pt: 'front', axis: 'Y', key: 'y' },
];

function recalcGridCellPct() {
  GRID_CELL_PCT = (ISO_GRID.right.x - ISO_GRID.left.x) / ISO_GRID.cells * 100 * (16 / 9);
}

// Load saved grid from localStorage
try {
  const saved = JSON.parse(localStorage.getItem(GRID_SAVE_KEY));
  if (saved) {
    ['back','right','left','front'].forEach(pt => {
      if (saved[pt]) { ISO_GRID[pt].x = saved[pt].x; ISO_GRID[pt].y = saved[pt].y; }
    });
    recalcGridCellPct();
  }
} catch(e) {}

function syncGridSliders() {
  gridPoints.forEach(({pt, axis, key}) => {
    const id = 'grid-' + pt + axis;
    document.getElementById('sl-' + id).value = ISO_GRID[pt][key];
    document.getElementById('num-' + id).value = ISO_GRID[pt][key];
  });
}

gridPoints.forEach(({pt, axis, key}) => {
  const id = 'grid-' + pt + axis;
  const sl = document.getElementById('sl-' + id);
  const num = document.getElementById('num-' + id);
  let _pushed = false;
  function update(val) {
    if (!_pushed) { pushGridHistory(); _pushed = true; }
    ISO_GRID[pt][key] = parseFloat(val);
    recalcGridCellPct();
    if (selectedId) placeItem(selectedId);
    drawGrid();
    localStorage.setItem(GRID_SAVE_KEY, JSON.stringify({
      back: ISO_GRID.back, right: ISO_GRID.right, left: ISO_GRID.left, front: ISO_GRID.front
    }));
  }
  sl.oninput = () => { num.value = sl.value; update(sl.value); };
  sl.onpointerdown = () => { _pushed = false; };
  num.oninput = () => { _pushed = false; num.value; pushGridHistory(); _pushed = true; sl.value = num.value; update(num.value); };
});

function applyGridState(state) {
  ['back','right','left','front'].forEach(pt => {
    ISO_GRID[pt].x = state[pt].x;
    ISO_GRID[pt].y = state[pt].y;
  });
  recalcGridCellPct();
  syncGridSliders();
  if (selectedId) placeItem(selectedId);
  drawGrid();
  localStorage.setItem(GRID_SAVE_KEY, JSON.stringify({
    back: ISO_GRID.back, right: ISO_GRID.right, left: ISO_GRID.left, front: ISO_GRID.front
  }));
}

document.getElementById('grid-undo-btn').onclick = () => {
  if (gridHistory.length === 0) return;
  applyGridState(gridHistory.pop());
  document.getElementById('grid-undo-btn').disabled = gridHistory.length === 0;
};

document.getElementById('grid-reset-btn').onclick = () => {
  pushGridHistory();
  applyGridState(GRID_DEFAULT);
};

document.getElementById('grid-export-btn').onclick = () => {
  const txt = `const ISO_GRID = {\n  cells: ${ISO_GRID.cells},\n  back:  { x: ${ISO_GRID.back.x}, y: ${ISO_GRID.back.y} },\n  right: { x: ${ISO_GRID.right.x}, y: ${ISO_GRID.right.y} },\n  left:  { x: ${ISO_GRID.left.x}, y: ${ISO_GRID.left.y} },\n  front: { x: ${ISO_GRID.front.x}, y: ${ISO_GRID.front.y} },\n};`;
  navigator.clipboard.writeText(txt).then(() => {
    const el = document.getElementById('grid-export-result');
    el.textContent = 'コピーしました！';
    setTimeout(() => el.textContent = '', 3000);
  });
};

syncGridSliders();

// ─── Init ───
window.addEventListener('resize', () => { if (selectedId) { placeItem(selectedId); drawGrid(); } else drawGrid(); });
drawGrid();
// Auto-select first item
if (ITEMS.length > 0) selectItem(ITEMS[0].id);
if (hadSave) {
  const st = document.getElementById('save-status');
  st.textContent = '前回の保存データを復元しました';
  setTimeout(() => st.textContent = '', 3000);
}
