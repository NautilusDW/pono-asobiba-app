<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>家具ピボット＆配置範囲 調整ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1a1a2e;color:#eee;display:flex;height:100vh;overflow:hidden}

/* ─── Left: Room view ─── */
#room-panel{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:10px;overflow:hidden}
#room-wrapper{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;transform-origin:center center}
#room-container{position:relative;aspect-ratio:16/9;max-width:100%;max-height:100%;transform-origin:center center;transition:transform 0.1s ease-out}
#room-bg{width:100%;height:100%;display:block}
#grid-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#item-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.placed-item{position:absolute;pointer-events:auto;cursor:grab;image-rendering:auto}
.placed-item:active{cursor:grabbing}
.placed-item.selected{outline:2px solid #ff0;outline-offset:2px}

/* ─── Right: Controls ─── */
#controls{width:360px;overflow-y:auto;background:#16213e;padding:16px;display:flex;flex-direction:column;gap:12px}
#controls h2{font-size:16px;color:#ffd700;border-bottom:1px solid #333;padding-bottom:6px}
#item-list{max-height:200px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:4px}
.item-btn{width:56px;height:56px;border:2px solid #444;border-radius:8px;cursor:pointer;background:#222;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:2px}
.item-btn img{max-width:100%;max-height:100%;object-fit:contain}
.item-btn.active{border-color:#ffd700}
.item-btn.has-b{box-shadow:0 0 0 2px #4CAF50 inset}
.item-btn:hover{border-color:#888}

label{display:flex;align-items:center;gap:8px;font-size:13px}
label span{min-width:70px}
input[type=range]{flex:1}
input[type=number]{width:60px;background:#222;color:#eee;border:1px solid #555;border-radius:4px;padding:2px 4px;text-align:center}
.row{display:flex;gap:8px;align-items:center}
.section{background:#1a2744;padding:10px;border-radius:8px}
.section h3{font-size:13px;color:#aaa;margin-bottom:6px}

#export-btn{background:#ffd700;color:#1a1a2e;border:none;padding:10px;border-radius:8px;font-weight:bold;cursor:pointer;font-size:14px}
#export-btn:hover{background:#ffed4a}
#export-area{width:100%;height:120px;background:#111;color:#0f0;border:1px solid #444;border-radius:4px;font-family:monospace;font-size:11px;resize:vertical}
#info{font-size:12px;color:#888;line-height:1.4}
</style>
</head>
<body>

<div id="room-panel">
  <div id="room-wrapper">
    <div id="room-container">
      <img id="room-bg" src="../assets/images/Rooms/base.jpg" alt="room">
      <canvas id="grid-canvas"></canvas>
      <div id="item-layer"></div>
    </div>
  </div>
  <div id="zoom-label" style="position:absolute;top:8px;left:8px;font-size:16px;color:#ffd700;pointer-events:none;z-index:999">×1.0</div>
  <div style="position:absolute;bottom:8px;left:8px;font-size:11px;color:#888;pointer-events:none">ホイールで拡大・縮小 / 中ボタン or 右ドラッグでパン</div>
</div>

<div id="controls">
  <h2>家具ピボット＆配置範囲 調整ツール</h2>

  <div id="info">
    アイテムを選択 → ドラッグで配置 → ピボット・範囲を調整<br>
    赤セル＝配置不可、緑セル＝配置可能
  </div>

  <div id="item-list"></div>

  <div class="section" id="selected-info" style="display:none">
    <h3 id="sel-name">---</h3>

    <label><span>cellSize</span>
      <input type="range" id="sl-cellSize" min="0.3" max="3.0" step="0.1">
      <input type="number" id="num-cellSize" step="0.1">
    </label>

    <label><span>pivotX (%)</span>
      <input type="range" id="sl-pivotX" min="-100" max="100" step="0.5">
      <input type="number" id="num-pivotX" step="0.5">
    </label>

    <label><span>pivotY (%)</span>
      <input type="range" id="sl-pivotY" min="-100" max="100" step="0.1">
      <input type="number" id="num-pivotY" step="0.1">
    </label>

    <div id="ab-toggle" style="display:none;margin-top:6px">
      <button id="btn-angle-a" style="padding:6px 16px;border:2px solid #ffd700;border-radius:6px;background:#ffd700;color:#1a1a2e;cursor:pointer;font-weight:bold">A角度</button>
      <button id="btn-angle-b" style="padding:6px 16px;border:2px solid #555;border-radius:6px;background:#333;color:#eee;cursor:pointer">B角度</button>
    </div>

    <h3 style="margin-top:8px">配置範囲 (row / col)</h3>
    <div class="row">
      <label><span>minRow</span><input type="number" id="num-minRow" min="0" max="7" step="1"></label>
      <label><span>maxRow</span><input type="number" id="num-maxRow" min="0" max="7" step="1"></label>
    </div>
    <div class="row">
      <label><span>minCol</span><input type="number" id="num-minCol" min="0" max="7" step="1"></label>
      <label><span>maxCol</span><input type="number" id="num-maxCol" min="0" max="7" step="1"></label>
    </div>
    <div style="font-size:11px;color:#888;margin-top:4px">
      row↗右奥方向, col↖左奥方向
    </div>
  </div>

  <div class="row" style="gap:6px">
    <button id="save-btn" style="flex:1;background:#4CAF50;color:#fff;border:none;padding:8px;border-radius:6px;cursor:pointer;font-size:13px">💾 途中保存</button>
    <button id="reset-btn" style="flex:1;background:#f44336;color:#fff;border:none;padding:8px;border-radius:6px;cursor:pointer;font-size:13px">🗑 リセット</button>
  </div>
  <div id="save-status" style="font-size:11px;color:#4CAF50;text-align:center;min-height:16px"></div>

  <button id="export-btn">全アイテムの値をエクスポート</button>
  <textarea id="export-area" readonly></textarea>
</div>

<script>
// ─── ISO_GRID (from room/index.html) ───
const ISO_GRID = {
  cells: 8,
  back:  { x: 0.501, y: 0.383 },
  right: { x: 0.764, y: 0.645 },
  left:  { x: 0.236, y: 0.645 },
  front: { x: 0.500, y: 0.917 },
};

function isoGridPt(u, v) {
  const n = ISO_GRID.cells;
  const s = u / n, t = v / n;
  const B = ISO_GRID.back, R = ISO_GRID.right, L = ISO_GRID.left, F = ISO_GRID.front;
  return {
    x: (1-s)*(1-t)*B.x + s*(1-t)*R.x + (1-s)*t*L.x + s*t*F.x,
    y: (1-s)*(1-t)*B.y + s*(1-t)*R.y + (1-s)*t*L.y + s*t*F.y,
  };
}

function getGridCell(u, v) {
  const p = isoGridPt(u + 0.5, v + 0.5);
  return { leftPct: p.x * 100, bottomPct: (1 - p.y) * 100 };
}

// 高さベースでサイズ制御（16:9アスペクト比補正付き＝既存cellSize値と互換）
const GRID_CELL_PCT = (ISO_GRID.right.x - ISO_GRID.left.x) / ISO_GRID.cells * 100 * (16 / 9);

// ─── Items (inline from items.js, furniture/deco only) ───
const ITEMS = [
  { id:'furn_bear_1', name:'くまぬいぐるみ', roomImg:'../assets/images/Rooms/furnitures_final/bear_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/bear_B.png', cellSize:0.7, pivotX:3.3, pivotY:1.3 },
  { id:'furn_bed_wood', name:'きのベッド', roomImg:'../assets/images/Rooms/furnitures_final/bed_A_01.png', roomImgB:'../assets/images/Rooms/furnitures_final/bed_B_01.png', cellSize:2.2, pivotX:14.3, pivotY:0.6 },
  { id:'furn_desk', name:'あおいつくえ', roomImg:'../assets/images/Rooms/furnitures_final/desk_A_01.png', roomImgB:'../assets/images/Rooms/furnitures_final/desk_B_01.png', cellSize:1.8, pivotX:15.7, pivotY:1.1 },
  { id:'furn_bookshelf_w', name:'しろいほんだな', roomImg:'../assets/images/Rooms/furnitures_final/BookShelf01_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/BookShelf01_B.png', cellSize:1.2, pivotX:17.5, pivotY:0.7 },
  { id:'furn_toyshelf', name:'おもちゃだな', roomImg:'../assets/images/Rooms/furnitures_final/Shelf01_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/Shelf01_B.png', cellSize:1.8, pivotX:-24.7, pivotY:0.8 },
  { id:'deco_dinosaur', name:'きょうりゅう', roomImg:'../assets/images/Rooms/furnitures_final/Dinasour01_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/Dinasour01_B.png', cellSize:0.8, pivotX:-8.1, pivotY:1.4 },
  { id:'furn_bookshelf2', name:'きのほんだな', roomImg:'../assets/images/Rooms/furnitures_final/BookShelf02_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/BookShelf02_B.png', cellSize:1.8, pivotX:0, pivotY:0 },
  { id:'furn_shelf2', name:'おおきなたな', roomImg:'../assets/images/Rooms/furnitures_final/Shelf02_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/Shelf02_B.png', cellSize:1.8, pivotX:0, pivotY:0 },
  { id:'furn_toyshelf2', name:'おもちゃだな2', roomImg:'../assets/images/Rooms/furnitures_final/ToyShelf01_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/ToyShelf01_B.png', cellSize:1.3, pivotX:0, pivotY:0 },
  { id:'furn_desk2', name:'きのつくえ', roomImg:'../assets/images/Rooms/furnitures_final/desk02_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/desk02_B.png', cellSize:1.8, pivotX:0, pivotY:0 },
  { id:'furn_bed_pink', name:'ピンクベッド', roomImg:'../assets/images/Rooms/furnitures_final/bed_pink_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/bed_pink_B.png', cellSize:2, pivotX:0, pivotY:0 },
  { id:'furn_desk_pink', name:'ピンクつくえ', roomImg:'../assets/images/Rooms/furnitures_final/desk_pink_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/desk_pink_B.png', cellSize:1.8, pivotX:0, pivotY:0 },
  { id:'furn_bookshelf_pink', name:'ピンクほんだな', roomImg:'../assets/images/Rooms/furnitures_final/bookshelf_pink_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/bookshelf_pink_B.png', cellSize:1.8, pivotX:0, pivotY:0 },
  { id:'furn_chest_pink', name:'ピンクチェスト', roomImg:'../assets/images/Rooms/furnitures_final/chest_pink_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/chest_pink_B.png', cellSize:1.2, pivotX:0, pivotY:0 },
  { id:'deco_bear_ribbon', name:'リボンくま', roomImg:'../assets/images/Rooms/furnitures_final/bear_ribbon_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/bear_ribbon_B.png', cellSize:0.7, pivotX:0, pivotY:0 },
  { id:'deco_bunny', name:'うさぎぬいぐるみ', roomImg:'../assets/images/Rooms/furnitures_final/bunny_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/bunny_B.png', cellSize:0.7, pivotX:0, pivotY:0 },
  { id:'deco_doll', name:'おにんぎょう', roomImg:'../assets/images/Rooms/furnitures_final/doll_A.png', roomImgB:'../assets/images/Rooms/furnitures_final/doll_B.png', cellSize:0.7, pivotX:0, pivotY:0 },
  { id:'deco_carousel', name:'メリーゴーランド', roomImg:'../assets/images/Rooms/furnitures_final/carousel.png', cellSize:0.8, pivotX:0, pivotY:0 },
  { id:'deco_rug_pink', name:'ピンクラグ', roomImg:'../assets/images/Rooms/furnitures_final/rug_pink.png', cellSize:2.0, pivotX:0, pivotY:0 },
  { id:'deco_toybox_pink', name:'おもちゃばこ', roomImg:'../assets/images/Rooms/furnitures_final/toybox_pink.png', cellSize:0.8, pivotX:0, pivotY:0 },
  { id:'deco_stroller', name:'ベビーカー', roomImg:'../assets/images/Rooms/furnitures_final/stroller.png', cellSize:0.8, pivotX:0, pivotY:0 },
];

// Per-item adjustments (editable state) — separate for A and B angles
const adjustments = {};
function adjKey(id, angle) { return id + '_' + (angle || currentAngle); }
function curAdj() { return selectedId ? adjustments[adjKey(selectedId)] : null; }

ITEMS.forEach(item => {
  const cs = item.cellSize || 1;
  const autoMargin = Math.max(0, Math.ceil(cs) - 1);
  const base = {
    cellSize: item.cellSize,
    pivotX: item.pivotX,
    pivotY: item.pivotY,
    minRow: autoMargin,
    maxRow: 7 - autoMargin,
    minCol: autoMargin,
    maxCol: 7 - autoMargin,
    row: 3, col: 3,
  };
  adjustments[adjKey(item.id, 'A')] = Object.assign({}, base);
  if (item.roomImgB) {
    adjustments[adjKey(item.id, 'B')] = Object.assign({}, base);
  }
});

// ─── Save / Load from localStorage ───
const SAVE_KEY = 'furniture_adjuster_data';
function saveToStorage() {
  localStorage.setItem(SAVE_KEY, JSON.stringify(adjustments));
}
function loadFromStorage() {
  try {
    const data = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (!data) return false;
    Object.keys(data).forEach(key => {
      if (adjustments[key]) {
        // New format: key already has _A / _B suffix
        Object.assign(adjustments[key], data[key]);
      } else if (!key.endsWith('_A') && !key.endsWith('_B')) {
        // Old format migration: bare id → copy into both _A and _B
        if (adjustments[key + '_A']) Object.assign(adjustments[key + '_A'], data[key]);
        if (adjustments[key + '_B']) Object.assign(adjustments[key + '_B'], data[key]);
      }
    });
    return true;
  } catch(e) { return false; }
}
const hadSave = loadFromStorage();

let selectedId = null;

// ─── UI setup ───
const container = document.getElementById('room-container');
const canvas = document.getElementById('grid-canvas');
const ctx = canvas.getContext('2d');
const itemLayer = document.getElementById('item-layer');

// Build item list
const listEl = document.getElementById('item-list');
ITEMS.forEach(item => {
  const btn = document.createElement('div');
  btn.className = 'item-btn' + (item.roomImgB ? ' has-b' : '');
  btn.dataset.id = item.id;
  btn.title = item.name + (item.roomImgB ? ' (A/B)' : '');
  const img = document.createElement('img');
  img.src = item.roomImg;
  btn.appendChild(img);
  btn.onclick = () => selectItem(item.id);
  listEl.appendChild(btn);
});

// ─── A/B angle state ───
let currentAngle = 'A'; // 'A' or 'B'

// ─── Select item ───
function selectItem(id) {
  selectedId = id;
  currentAngle = 'A';
  document.querySelectorAll('.item-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  document.getElementById('selected-info').style.display = '';

  const item = ITEMS.find(x => x.id === id);
  const adj = adjustments[adjKey(id)];
  document.getElementById('sel-name').textContent = item.name + ' (' + id + ') [' + currentAngle + ']';

  // Show/hide A/B toggle
  const abToggle = document.getElementById('ab-toggle');
  if (item.roomImgB) {
    abToggle.style.display = '';
    updateAngleButtons();
  } else {
    abToggle.style.display = 'none';
  }

  syncSlider('cellSize', adj.cellSize);
  syncSlider('pivotX', adj.pivotX);
  syncSlider('pivotY', adj.pivotY);
  document.getElementById('num-minRow').value = adj.minRow;
  document.getElementById('num-maxRow').value = adj.maxRow;
  document.getElementById('num-minCol').value = adj.minCol;
  document.getElementById('num-maxCol').value = adj.maxCol;

  placeItem(id);
  drawGrid();
}

function updateAngleButtons() {
  const a = document.getElementById('btn-angle-a');
  const b = document.getElementById('btn-angle-b');
  a.style.background = currentAngle === 'A' ? '#ffd700' : '#333';
  a.style.color = currentAngle === 'A' ? '#1a1a2e' : '#eee';
  a.style.borderColor = currentAngle === 'A' ? '#ffd700' : '#555';
  b.style.background = currentAngle === 'B' ? '#ffd700' : '#333';
  b.style.color = currentAngle === 'B' ? '#1a1a2e' : '#eee';
  b.style.borderColor = currentAngle === 'B' ? '#ffd700' : '#555';
}

document.getElementById('btn-angle-a').onclick = () => { currentAngle = 'A'; updateAngleButtons(); if (selectedId) reloadSliders(selectedId); };
document.getElementById('btn-angle-b').onclick = () => { currentAngle = 'B'; updateAngleButtons(); if (selectedId) reloadSliders(selectedId); };

function reloadSliders(id) {
  const adj = adjustments[adjKey(id)];
  const item = ITEMS.find(x => x.id === id);
  document.getElementById('sel-name').textContent = item.name + ' (' + id + ') [' + currentAngle + ']';
  syncSlider('cellSize', adj.cellSize);
  syncSlider('pivotX', adj.pivotX);
  syncSlider('pivotY', adj.pivotY);
  document.getElementById('num-minRow').value = adj.minRow;
  document.getElementById('num-maxRow').value = adj.maxRow;
  document.getElementById('num-minCol').value = adj.minCol;
  document.getElementById('num-maxCol').value = adj.maxCol;
  placeItem(id);
  drawGrid();
}

function syncSlider(name, val) {
  document.getElementById('sl-' + name).value = val;
  document.getElementById('num-' + name).value = val;
}

// ─── Slider/number bindings ───
['cellSize', 'pivotX', 'pivotY'].forEach(name => {
  const sl = document.getElementById('sl-' + name);
  const num = document.getElementById('num-' + name);
  function update(val) {
    if (!selectedId) return;
    adjustments[adjKey(selectedId)][name] = parseFloat(val);
    // cellSize変更時は配置範囲をリセットしない（手動設定を優先）
    placeItem(selectedId);
    drawGrid();
  }
  sl.oninput = () => { num.value = sl.value; update(sl.value); };
  num.oninput = () => { sl.value = num.value; update(num.value); };
});

['minRow', 'maxRow', 'minCol', 'maxCol'].forEach(name => {
  document.getElementById('num-' + name).oninput = (e) => {
    if (!selectedId) return;
    adjustments[adjKey(selectedId)][name] = parseInt(e.target.value) || 0;
    // Re-clamp current position
    const adj = adjustments[adjKey(selectedId)];
    adj.row = Math.max(adj.minRow, Math.min(adj.maxRow, adj.row));
    adj.col = Math.max(adj.minCol, Math.min(adj.maxCol, adj.col));
    placeItem(selectedId);
    drawGrid();
  };
});

// ─── Place item on grid ───
let _placedEl = null;

function updateItemPos(id) {
  if (!_placedEl || !id) return;
  const adj = adjustments[adjKey(id)];
  const cell = getGridCell(adj.row, adj.col);
  const heightPct = adj.cellSize * GRID_CELL_PCT;
  _placedEl.style.left = cell.leftPct + '%';
  _placedEl.style.bottom = cell.bottomPct + '%';
  _placedEl.style.height = heightPct.toFixed(2) + '%';
  _placedEl.style.width = 'auto';
  _placedEl.style.transform = `translate(calc(-50% - ${adj.pivotX}%), ${adj.pivotY}%)`;
}

function placeItem(id) {
  const item = ITEMS.find(x => x.id === id);
  const imgSrc = (currentAngle === 'B' && item && item.roomImgB) ? item.roomImgB : (item ? item.roomImg : '');
  const currentSrc = _placedEl ? _placedEl.src : '';
  const needsNew = !_placedEl || !item || !currentSrc.endsWith(imgSrc.replace('../', '/'));

  if (needsNew) {
    itemLayer.innerHTML = '';
    if (!id || !item) { _placedEl = null; return; }

    const el = document.createElement('img');
    el.className = 'placed-item selected';
    el.src = imgSrc;
    el.style.height = 'auto';
    el.style.transformOrigin = 'bottom center';
    el.style.zIndex = 100;
    el.draggable = false;
    itemLayer.appendChild(el);
    _placedEl = el;

    // Drag via pointer events on the container (not the image)
    let dragging = false;
    el.onpointerdown = (e) => { dragging = true; el.setPointerCapture(e.pointerId); e.preventDefault(); };
    el.onpointermove = (e) => {
      if (!dragging) return;
      const rect = container.getBoundingClientRect();
      const px = (e.clientX - rect.left) / rect.width;
      const py = (e.clientY - rect.top) / rect.height;
      let bestR = 0, bestC = 0, bestD = Infinity;
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const p = isoGridPt(r + 0.5, c + 0.5);
          const dx = px - p.x, dy = py - p.y;
          const d = dx*dx + dy*dy;
          if (d < bestD) { bestD = d; bestR = r; bestC = c; }
        }
      }
      const adj = adjustments[adjKey(selectedId)];
      adj.row = Math.max(adj.minRow, Math.min(adj.maxRow, bestR));
      adj.col = Math.max(adj.minCol, Math.min(adj.maxCol, bestC));
      updateItemPos(selectedId);
      drawGrid();
    };
    el.onpointerup = () => { dragging = false; };
  }

  updateItemPos(id);
}

// ─── Draw grid ───
function drawGrid() {
  const w = container.offsetWidth;
  const h = container.offsetHeight;
  canvas.width = w * devicePixelRatio;
  canvas.height = h * devicePixelRatio;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.clearRect(0, 0, w, h);

  const n = ISO_GRID.cells;
  const adj = selectedId ? adjustments[adjKey(selectedId)] : null;

  // Draw cell fills (red=forbidden, green=allowed)
  if (adj) {
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        const allowed = r >= adj.minRow && r <= adj.maxRow && c >= adj.minCol && c <= adj.maxCol;
        const p0 = isoGridPt(r, c);
        const p1 = isoGridPt(r+1, c);
        const p2 = isoGridPt(r+1, c+1);
        const p3 = isoGridPt(r, c+1);
        ctx.beginPath();
        ctx.moveTo(p0.x*w, p0.y*h);
        ctx.lineTo(p1.x*w, p1.y*h);
        ctx.lineTo(p2.x*w, p2.y*h);
        ctx.lineTo(p3.x*w, p3.y*h);
        ctx.closePath();
        ctx.fillStyle = allowed ? 'rgba(0,200,0,0.15)' : 'rgba(200,0,0,0.25)';
        ctx.fill();
      }
    }
  }

  // Draw grid lines
  ctx.strokeStyle = 'rgba(0,255,0,0.4)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= n; i++) {
    const a = isoGridPt(i, 0), b = isoGridPt(i, n);
    ctx.beginPath(); ctx.moveTo(a.x*w, a.y*h); ctx.lineTo(b.x*w, b.y*h); ctx.stroke();
    const c = isoGridPt(0, i), d = isoGridPt(n, i);
    ctx.beginPath(); ctx.moveTo(c.x*w, c.y*h); ctx.lineTo(d.x*w, d.y*h); ctx.stroke();
  }

  // Draw cell labels
  ctx.font = '10px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center';
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      const p = isoGridPt(r + 0.5, c + 0.5);
      ctx.fillText(`${r},${c}`, p.x*w, p.y*h + 4);
    }
  }

  // Current position marker
  if (adj) {
    const cp = isoGridPt(adj.row + 0.5, adj.col + 0.5);
    ctx.beginPath();
    ctx.arc(cp.x*w, cp.y*h, 6, 0, Math.PI*2);
    ctx.fillStyle = '#f00';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// ─── Export ───
document.getElementById('export-btn').onclick = () => {
  const lines = [];
  ITEMS.forEach(item => {
    const adjA = adjustments[adjKey(item.id, 'A')];
    const adjB = item.roomImgB ? adjustments[adjKey(item.id, 'B')] : null;

    function fmtAngle(adj, label) {
      const cs = adj.cellSize;
      const autoMargin = Math.max(0, Math.ceil(cs) - 1);
      const hasCustomBounds =
        adj.minRow !== autoMargin || adj.maxRow !== (7 - autoMargin) ||
        adj.minCol !== autoMargin || adj.maxCol !== (7 - autoMargin);
      let line = `  // ${item.name} [${label}]\n  { id:'${item.id}', angle:'${label}', cellSize:${adj.cellSize}, pivotX:${adj.pivotX}, pivotY:${adj.pivotY}`;
      if (hasCustomBounds) {
        line += `, minRow:${adj.minRow}, maxRow:${adj.maxRow}, minCol:${adj.minCol}, maxCol:${adj.maxCol}`;
      }
      line += ' },';
      return line;
    }

    lines.push(fmtAngle(adjA, 'A'));
    if (adjB) lines.push(fmtAngle(adjB, 'B'));
  });
  document.getElementById('export-area').value = lines.join('\n');
};

// ─── Save / Reset buttons ───
document.getElementById('save-btn').onclick = () => {
  saveToStorage();
  const st = document.getElementById('save-status');
  st.textContent = '保存しました (' + new Date().toLocaleTimeString() + ')';
  setTimeout(() => st.textContent = '', 3000);
};
document.getElementById('reset-btn').onclick = () => {
  if (!confirm('すべての調整値を初期値に戻しますか？')) return;
  localStorage.removeItem(SAVE_KEY);
  location.reload();
};

// Auto-save on every change
const _origPlaceItem = placeItem;
placeItem = function(id) { _origPlaceItem(id); saveToStorage(); };

// ─── Zoom & Pan ───
(function setupZoomPan() {
  var zoom = 1, px = 0, py = 0;
  var wrapper = document.getElementById('room-wrapper');
  var label = document.getElementById('zoom-label');

  function apply() {
    wrapper.style.transform = 'translate(' + px + 'px,' + py + 'px) scale(' + zoom + ')';
    label.textContent = '×' + zoom.toFixed(1);
  }

  // Wheel zoom
  window.onwheel = function(e) {
    var panel = document.getElementById('room-panel');
    if (!panel.contains(e.target)) return;
    e.preventDefault();
    zoom += (e.deltaY > 0 ? -0.2 : 0.2);
    if (zoom < 0.5) zoom = 0.5;
    if (zoom > 5) zoom = 5;
    apply();
  };

  // Middle/right-button drag to pan
  var dragging = false, sx = 0, sy = 0, bx = 0, by = 0;
  window.onmousedown = function(e) {
    var panel = document.getElementById('room-panel');
    if (!panel.contains(e.target)) return;
    if (e.button === 1 || e.button === 2) {
      dragging = true; sx = e.clientX; sy = e.clientY; bx = px; by = py;
      e.preventDefault();
    }
  };
  window.onmousemove = function(e) {
    if (!dragging) return;
    px = bx + (e.clientX - sx);
    py = by + (e.clientY - sy);
    apply();
  };
  window.onmouseup = function(e) {
    if (e.button === 1 || e.button === 2) dragging = false;
  };
  window.oncontextmenu = function(e) {
    if (document.getElementById('room-panel').contains(e.target)) e.preventDefault();
  };
})();

// ─── Init ───
window.addEventListener('resize', () => { if (selectedId) { placeItem(selectedId); drawGrid(); } else drawGrid(); });
drawGrid();
// Auto-select first item
if (ITEMS.length > 0) selectItem(ITEMS[0].id);
if (hadSave) {
  const st = document.getElementById('save-status');
  st.textContent = '前回の保存データを復元しました';
  setTimeout(() => st.textContent = '', 3000);
}
