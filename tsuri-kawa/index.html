<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ポノの かわづり | ポノのあそびば</title>
<!-- FOUC guard: 初回ペイント時の未スタイル表示を防ぐ (guragura-seesaw/index.html と同型) -->
<style>html,body{background:#1f5a86}#app{visibility:hidden}body.pono-game-ready #app{visibility:visible}</style>
<script>document.addEventListener('DOMContentLoaded',function(){requestAnimationFrame(function(){requestAnimationFrame(function(){if(!window.__PONO_TIER_LOCKED__)document.body.classList.add('pono-game-ready')})})});</script>
<!-- app (アプリばん) 専用 tier ガード。 tier.js 未読込/例外時は fail-open (従来通り表示)。 -->
<script src="../common/debug-mode.js"></script>
<script src="../common/tier.js"></script>
<script src="../common/achievements.js"></script>
<script>
(function(){
  'use strict';
  var locked = false;
  try {
    var pt = window.PonoTier;
    if (pt && typeof pt.getTier === 'function') locked = (pt.getTier() !== 'app');
  } catch (e) { locked = false; }
  if (!locked) return;
  window.__PONO_TIER_LOCKED__ = true;
  // FOUC 防止: head 内同期実行なので初回ペイント前にゲーム側 DOM を不可視化
  var st = document.createElement('style');
  st.textContent = 'html{background:#FFF7E6 !important}body>*:not(#ponoTierLockScreen){visibility:hidden !important}';
  (document.head || document.documentElement).appendChild(st);
  // キーボード入力がゲームへ届かないよう capture 段階で遮断 (ロック中のみ)。
  var KEY_EVTS = ['keydown', 'keyup', 'keypress'];
  for (var i = 0; i < KEY_EVTS.length; i++) {
    window.addEventListener(KEY_EVTS[i], function(e){
      if (window.__PONO_TIER_LOCKED__) e.stopImmediatePropagation();
    }, true);
  }
  function showLock(){
    if (!document.body || document.getElementById('ponoTierLockScreen')) return;
    var ov = document.createElement('div');
    ov.id = 'ponoTierLockScreen';
    ov.setAttribute('role', 'dialog');
    ov.style.cssText = 'position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(165deg,#FFF7E6 0%,#FFEDC2 45%,#D9EFD5 100%);font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif;text-align:center';
    var card = document.createElement('div');
    card.style.cssText = 'background:#fff;border-radius:26px;padding:28px 24px 26px;max-width:340px;width:100%;box-shadow:0 12px 40px rgba(93,78,55,0.22)';
    var emo = document.createElement('div');
    emo.setAttribute('aria-hidden', 'true');
    emo.style.cssText = 'font-size:2.6rem;line-height:1;margin-bottom:12px';
    emo.textContent = '🎣\u{1F41F}';
    card.appendChild(emo);
    var tag = document.createElement('div');
    tag.style.cssText = 'display:inline-block;font-size:0.74rem;font-weight:900;color:#fff;background:linear-gradient(135deg,#34D399,#10B981);padding:4px 14px;border-radius:50px;letter-spacing:0.06em;margin-bottom:12px';
    tag.textContent = 'アプリばん せんよう';
    card.appendChild(tag);
    var ttl = document.createElement('div');
    ttl.style.cssText = 'font-size:1.12rem;font-weight:900;color:#5D4E37;line-height:1.5;margin-bottom:10px';
    ttl.textContent = 'この ゲームは アプリばんで あそべるよ！';
    card.appendChild(ttl);
    var body = document.createElement('div');
    body.style.cssText = 'font-size:0.92rem;font-weight:700;color:#8B7B60;line-height:1.6;margin-bottom:18px';
    body.textContent = 'アプリばんに あたらしい あそびが まってるよ';
    card.appendChild(body);
    var btn = document.createElement('a');
    btn.href = '../play.html';
    btn.style.cssText = 'display:inline-block;padding:12px 34px;border-radius:50px;background:linear-gradient(135deg,#60A5FA,#3B82F6);color:#fff;font-size:0.98rem;font-weight:900;text-decoration:none;box-shadow:0 4px 14px rgba(59,130,246,0.4)';
    btn.textContent = 'メニューへ もどる';
    card.appendChild(btn);
    ov.appendChild(card);
    document.body.appendChild(ov);
  }
  if (document.body) { showLock(); }
  else { document.addEventListener('DOMContentLoaded', showLock); }
})();
</script>
<script src="../common/haptics.js"></script>
<script src="../common/menu.js"></script>
<link rel="stylesheet" href="styles.css?v=20260724-2">
</head>
<body>
<div id="landscape-notice" role="dialog" aria-modal="true" aria-label="よこむきの おねがい" aria-hidden="true">
  <div class="rotate-icon">📱</div>
  <p>スマホを<br><strong>よこむき</strong>にしてね！</p>
  <a class="landscape-back" href="../play.html">ホームにもどる</a>
</div>

<div id="app">
  <div id="stage">
    <!-- 真横カットアウェイ(断面)ビュー: 水面線(34%)より上=陸上、下=水中断面。 -->
    <div id="skyLayer">
      <div class="sky-cloud" id="cloud1"></div>
      <div class="sky-cloud" id="cloud2"></div>
    </div>
    <div id="waterLayer">
      <div class="fish-shadow ambient" id="shadowA" aria-hidden="true"></div>
      <div class="fish-shadow ambient" id="shadowB" aria-hidden="true"></div>
      <div class="fish-shadow target" id="shadowTarget" aria-hidden="true"></div>
    </div>
    <div id="waterLine" aria-hidden="true"></div>
    <div id="shoreDock" aria-hidden="true"></div>
    <div id="angler" aria-hidden="true">🎣</div>

    <svg id="lineSvg" viewBox="0 0 160 90" preserveAspectRatio="none" aria-hidden="true">
      <path id="lineAir"></path>
      <path id="lineWater"></path>
      <path id="hookMark" d="M -1.1,0 Q -1.1,2.2 0.6,2.1 Q 1.9,2 1.1,0.6"></path>
    </svg>

    <div id="hud">
      <div id="narrationBar" aria-live="polite">ポノの かわづり</div>
    </div>
    <div id="bucketBar" aria-label="つれた さかな">
      <span id="bucketIcon" aria-hidden="true">🪣</span>
      <span id="bucketList"></span>
      <span id="bucketCount">0</span>
    </div>
    <div id="phaseWord" aria-hidden="true"></div>

    <section id="titleScreen" class="screen show">
      <div class="title-card">
        <div class="title-icon">🎣</div>
        <h1 class="title-text">ポノの<br>かわづり</h1>
        <p class="title-desc">まって さかなを つろう！</p>
        <button class="tap-btn" id="startBtn" type="button">▶ タップで はじめる</button>
      </div>
    </section>

    <section id="playScreen" class="screen">
      <div id="castSpots" aria-hidden="true">
        <div class="cast-spot" data-spot="0" style="left:40%;top:34%;"><div class="spot-dot"></div></div>
        <div class="cast-spot" data-spot="1" style="left:60%;top:34%;"><div class="spot-dot"></div></div>
        <div class="cast-spot" data-spot="2" style="left:78%;top:34%;"><div class="spot-dot"></div></div>
      </div>

      <div id="splashRing" aria-hidden="true"></div>
      <div id="splashChurn" aria-hidden="true"><span class="churn-drop">💦</span></div>
      <div id="bobber" aria-hidden="true">
        <div class="bobber-tip"></div>
        <div class="bobber-body"></div>
      </div>

      <div id="biteMark" aria-hidden="true">
        <div class="bite-ring"></div>
        <span class="bite-ex">！</span>
      </div>

      <div id="rendaWrap" aria-hidden="true">
        <div id="rendaBigText">ひっぱれ！！</div>
        <div id="rendaCombo">れんだ ×<span id="rendaComboNum">0</span></div>
        <div id="rendaGaugeOuter">
          <div id="rendaGaugeFloorMark"></div>
          <div id="rendaGaugeFill"></div>
        </div>
      </div>

      <div id="fxLayer" aria-hidden="true"></div>

      <div id="catchOverlay" class="overlay-banner" aria-live="polite">
        <div class="catch-icon" id="catchIcon">🐟</div>
        <div class="catch-name" id="catchName"></div>
        <div class="catch-label" id="catchLabel">つれた！</div>
      </div>

      <div id="escapeOverlay" class="overlay-banner" aria-live="polite">およいで いっちゃった。でも また くるよ</div>
      <div id="helpOverlay" class="overlay-banner" aria-live="polite">ポノも てつだうよ！</div>
    </section>

    <div id="moodLayer" aria-hidden="true"></div>
  </div>
</div>

<script src="../common/acorns.js"></script>
<script src="../common/tsuri/fish-data.js?v=20260724-1"></script>
<script src="../common/tsuri/core.js?v=20260724-1"></script>
<script src="../common/tsuri/input.js?v=20260724-1"></script>
<script src="js/logic.js?v=20260724-1"></script>
<script src="js/game.js?v=20260724-3"></script>
</body>
</html>
