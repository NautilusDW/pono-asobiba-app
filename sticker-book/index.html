<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>シールちょう｜ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: #26180f;
  font-family: "Zen Maru Gothic", "Hiragino Maru Gothic ProN", "BIZ UDPGothic", sans-serif;
}
.book-app {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  background: #26180f;
}
#bookCanvas {
  width: min(100vw, calc(100vh * 16 / 9));
  height: min(100vh, calc(100vw * 9 / 16));
  display: block;
  image-rendering: auto;
  touch-action: none;
  user-select: none;
}
.sr-status {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
</style>
</head>
<body>
<div class="book-app">
  <canvas id="bookCanvas" width="1920" height="1080" aria-label="シールちょう"></canvas>
  <div class="sr-status" id="bookStatus" aria-live="polite">シールちょうを よみこみ中</div>
</div>

<script src="../js/game-stickers.js"></script>
<script>
(function() {
  'use strict';

  var W = 1920;
  var H = 1080;
  var LAYOUT_KEY = 'pono_game_sticker_layouts_v1';
  var canvas = document.getElementById('bookCanvas');
  var ctx = canvas.getContext('2d');
  var statusEl = document.getElementById('bookStatus');

  var view = {
    catalog: null,
    gameIds: [],
    gameIndex: 0,
    layouts: readLayouts(),
    imageCache: {},
    stickerEntries: [],
    placementHits: [],
    tabHits: [],
    buttonHits: [],
    selectedUid: '',
    dragging: null,
    flip: null,
    paste: null,
    ready: false,
    lastFrame: 0
  };

  var book = {
    left: { x: 286, y: 128, w: 650, h: 724 },
    right: { x: 984, y: 128, w: 650, h: 724 },
    spineX: 960,
    tray: { x: 284, y: 882, w: 1352, h: 138 },
    back: { x: 44, y: 42, w: 126, h: 58 },
    prev: { x: 198, y: 474, r: 48 },
    next: { x: 1674, y: 474, r: 48 }
  };

  function setStatus(text) {
    if (statusEl) statusEl.textContent = text;
  }

  function clamp(value, min, max) {
    value = Number(value);
    if (!isFinite(value)) value = min;
    return Math.max(min, Math.min(max, value));
  }

  function readJSON(key, fallback) {
    try {
      var raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch(e) {
      return fallback;
    }
  }

  function readLayouts() {
    var data = readJSON(LAYOUT_KEY, null);
    if (!data || typeof data !== 'object') data = {};
    if (!data.pages || typeof data.pages !== 'object') data.pages = {};
    return data;
  }

  function saveLayouts() {
    view.layouts.version = 1;
    view.layouts.updatedAt = Date.now();
    if (!view.layouts.pages) view.layouts.pages = {};
    try { localStorage.setItem(LAYOUT_KEY, JSON.stringify(view.layouts)); } catch(e) {}
  }

  function currentGameId() {
    return view.gameIds[view.gameIndex] || '';
  }

  function currentPage() {
    var id = currentGameId();
    return view.catalog && view.catalog.pages ? view.catalog.pages[id] : null;
  }

  function ownedFor(gameId) {
    var state = window.PonoGameStickers ? window.PonoGameStickers.getState() : {};
    return (((state.pages || {})[gameId] || {}).owned || {});
  }

  function placementsFor(gameId) {
    if (!view.layouts.pages) view.layouts.pages = {};
    if (!Array.isArray(view.layouts.pages[gameId])) view.layouts.pages[gameId] = [];
    view.layouts.pages[gameId] = view.layouts.pages[gameId].filter(function(item) {
      return item && item.stickerId;
    }).slice(0, 80);
    return view.layouts.pages[gameId];
  }

  function findSticker(page, stickerId) {
    var stickers = page && page.stickers ? page.stickers : [];
    for (var i = 0; i < stickers.length; i++) {
      if (stickers[i].id === stickerId) return stickers[i];
    }
    return null;
  }

  function resolveAsset(path) {
    if (!path) return '';
    if (window.PonoGameStickers && window.PonoGameStickers.resolveAsset) {
      return window.PonoGameStickers.resolveAsset(path);
    }
    if (/^(https?:|data:|\/|\.\.?\/)/.test(path)) return path;
    return '../' + path;
  }

  function loadImage(src) {
    if (!src) return null;
    if (view.imageCache[src]) return view.imageCache[src];
    var entry = { loaded: false, failed: false, img: new Image() };
    entry.img.onload = function() {
      entry.loaded = true;
      requestDraw();
    };
    entry.img.onerror = function() {
      entry.failed = true;
      requestDraw();
    };
    entry.img.src = src;
    view.imageCache[src] = entry;
    return entry;
  }

  function preloadPageImages(page) {
    (page && page.stickers ? page.stickers : []).forEach(function(sticker) {
      if (sticker.img) loadImage(resolveAsset(sticker.img));
    });
  }

  function pageProgress(page, owned) {
    var stickers = page && page.stickers ? page.stickers : [];
    var got = stickers.filter(function(sticker) { return !!owned[sticker.id]; }).length;
    return { got: got, total: stickers.length };
  }

  function fitText(text, x, y, maxWidth, size, color, weight, align) {
    text = String(text == null ? '' : text);
    ctx.save();
    ctx.textAlign = align || 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = color || '#4f321c';
    var fontSize = size;
    do {
      ctx.font = (weight || 900) + ' ' + fontSize + 'px "Zen Maru Gothic", sans-serif';
      if (ctx.measureText(text).width <= maxWidth || fontSize <= 18) break;
      fontSize -= 2;
    } while (true);
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  function roundRectPath(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function pagePath(rect, side, offset) {
    offset = offset || 0;
    var x = rect.x + offset;
    var y = rect.y + offset * 0.25;
    var w = rect.w - offset * 0.6;
    var h = rect.h - offset * 0.3;
    ctx.beginPath();
    if (side === 'left') {
      ctx.moveTo(x + 32, y + 5);
      ctx.bezierCurveTo(x + 190, y - 20, x + w - 90, y + 8, x + w, y + 42);
      ctx.lineTo(x + w - 12, y + h - 28);
      ctx.bezierCurveTo(x + w - 142, y + h + 10, x + 156, y + h + 20, x + 20, y + h - 8);
      ctx.bezierCurveTo(x - 8, y + 506, x - 16, y + 174, x + 32, y + 5);
    } else {
      ctx.moveTo(x, y + 42);
      ctx.bezierCurveTo(x + 98, y + 8, x + w - 192, y - 20, x + w - 32, y + 5);
      ctx.bezierCurveTo(x + w + 16, y + 174, x + w + 8, y + 506, x + w - 20, y + h - 8);
      ctx.bezierCurveTo(x + w - 156, y + h + 20, x + 142, y + h + 10, x + 12, y + h - 28);
      ctx.closePath();
    }
  }

  function drawBackground() {
    var g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#7c542e');
    g.addColorStop(0.48, '#5d3c21');
    g.addColorStop(1, '#352015');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    for (var i = 0; i < 34; i++) {
      var x = (i * 193) % W;
      var y = 60 + ((i * 89) % 940);
      var alpha = 0.035 + (i % 5) * 0.012;
      ctx.fillStyle = 'rgba(255,230,165,' + alpha + ')';
      ctx.beginPath();
      ctx.ellipse(x, y, 118 + (i % 3) * 40, 24 + (i % 4) * 8, (i % 9) * 0.15, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.save();
    ctx.globalAlpha = 0.22;
    for (var line = 0; line < 22; line++) {
      var yy = line * 55 + 12;
      ctx.strokeStyle = line % 2 ? '#2e1a0e' : '#9f6a36';
      ctx.lineWidth = line % 2 ? 2 : 1;
      ctx.beginPath();
      ctx.moveTo(0, yy);
      ctx.bezierCurveTo(520, yy + 16, 1040, yy - 20, W, yy + 8);
      ctx.stroke();
    }
    ctx.restore();

    var vignette = ctx.createRadialGradient(W / 2, H / 2, 280, W / 2, H / 2, 1080);
    vignette.addColorStop(0, 'rgba(255,234,174,0.18)');
    vignette.addColorStop(0.68, 'rgba(0,0,0,0.08)');
    vignette.addColorStop(1, 'rgba(0,0,0,0.46)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, W, H);
  }

  function drawBookBase() {
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.38)';
    ctx.shadowBlur = 44;
    ctx.shadowOffsetY = 26;
    ctx.fillStyle = 'rgba(37,22,12,0.46)';
    ctx.beginPath();
    ctx.ellipse(960, 530, 776, 412, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    drawPageStack(book.left, 'left');
    drawPageStack(book.right, 'right');
    drawSinglePage(book.left, 'left');
    drawSinglePage(book.right, 'right');
    drawSpine();
  }

  function drawPageStack(rect, side) {
    for (var i = 8; i >= 1; i--) {
      pagePath(rect, side, i * 4);
      ctx.fillStyle = i % 2 ? '#d1aa67' : '#e0bd78';
      ctx.fill();
    }
  }

  function drawSinglePage(rect, side) {
    pagePath(rect, side, 0);
    var g = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.w, rect.y + rect.h);
    g.addColorStop(0, '#fff8df');
    g.addColorStop(0.52, '#fff3c8');
    g.addColorStop(1, '#ead19a');
    ctx.fillStyle = g;
    ctx.fill();

    ctx.save();
    ctx.clip();
    ctx.globalAlpha = 0.16;
    for (var i = 0; i < 120; i++) {
      var x = rect.x + ((i * 73) % rect.w);
      var y = rect.y + ((i * 41) % rect.h);
      ctx.fillStyle = i % 3 ? '#b88645' : '#ffffff';
      ctx.beginPath();
      ctx.arc(x, y, 0.8 + (i % 4) * 0.45, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    pagePath(rect, side, 0);
    ctx.strokeStyle = 'rgba(139,92,39,0.42)';
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  function drawSpine() {
    var g = ctx.createLinearGradient(918, 0, 1002, 0);
    g.addColorStop(0, 'rgba(88,54,28,0.18)');
    g.addColorStop(0.45, 'rgba(71,39,17,0.48)');
    g.addColorStop(0.55, 'rgba(255,244,195,0.24)');
    g.addColorStop(1, 'rgba(88,54,28,0.18)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(920, 152);
    ctx.bezierCurveTo(948, 276, 948, 684, 922, 835);
    ctx.lineTo(1000, 835);
    ctx.bezierCurveTo(972, 684, 972, 276, 1000, 152);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = 'rgba(74,45,24,0.42)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(958, 150);
    ctx.bezierCurveTo(944, 296, 946, 680, 958, 838);
    ctx.stroke();
  }

  function drawPageContent(page, gameId, isFlipPreview) {
    var owned = ownedFor(gameId);
    var progress = pageProgress(page, owned);
    var accent = page.accent || '#f2915a';
    drawLeftPageContent(page, owned, progress, accent);
    drawRightPageContent(page, gameId, owned, accent, isFlipPreview);
  }

  function drawLeftPageContent(page, owned, progress, accent) {
    var r = book.left;
    fitText((page.icon || '📒') + ' ' + (page.title || ''), r.x + 82, r.y + 74, r.w - 180, 38, '#4b2e17', 900);
    fitText(page.subtitle || 'ゲームで あつめる シール', r.x + 84, r.y + 116, r.w - 170, 23, '#8c623a', 800);

    drawPill(r.x + r.w - 154, r.y + 62, 96, 40, progress.got + ' / ' + progress.total, accent, '#fff');

    var stickers = page.stickers || [];
    var startX = r.x + 88;
    var startY = r.y + 178;
    var cellW = 218;
    var cellH = 214;
    for (var i = 0; i < stickers.length; i++) {
      var col = i % 2;
      var row = Math.floor(i / 2);
      var x = startX + col * 256;
      var y = startY + row * 238;
      var sticker = stickers[i];
      var count = owned[sticker.id] && owned[sticker.id].count ? owned[sticker.id].count : 0;
      drawStickerSlot(x, y, cellW, cellH, sticker, count, accent);
    }
  }

  function drawStickerSlot(x, y, w, h, sticker, count, accent) {
    ctx.save();
    ctx.fillStyle = count ? 'rgba(255,255,255,0.68)' : 'rgba(126,99,67,0.08)';
    roundRectPath(x, y, w, h, 28);
    ctx.fill();
    ctx.strokeStyle = count ? accent : 'rgba(128,102,70,0.24)';
    ctx.lineWidth = count ? 4 : 3;
    ctx.setLineDash(count ? [] : [12, 10]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.translate(x + w / 2, y + 86);
    if (count) {
      drawStickerPiece(sticker, 0, 0, 1.05, ((x + y) % 5 - 2) * 2, true);
    } else {
      drawLockedSticker(sticker, 0, 0);
    }
    ctx.restore();

    fitText(count ? sticker.name || 'シール' : '？？？', x + w / 2, y + h - 42, w - 24, 24, count ? '#54351d' : '#a58d70', 900, 'center');
    if (count >= 2) {
      drawPill(x + w - 76, y + 14, 54, 30, 'x' + count, '#d97706', '#fff');
    }
  }

  function drawRightPageContent(page, gameId, owned, accent, isFlipPreview) {
    var r = book.right;
    fitText('はるページ', r.x + 72, r.y + 74, 300, 32, accent, 900);
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.font = '150px "Zen Maru Gothic", sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText(page.icon || '📒', r.x + r.w - 70, r.y + r.h - 66);
    ctx.restore();

    ctx.save();
    clipPage(r);
    var placements = placementsFor(gameId);
    view.placementHits = isFlipPreview ? view.placementHits : [];
    placements.forEach(function(item) {
      var sticker = findSticker(page, item.stickerId);
      if (!sticker || !owned[item.stickerId]) return;
      var pos = pageToCanvas(item.x, item.y);
      item.scale = clamp(item.scale == null ? 1 : item.scale, 0.5, 1.9);
      item.rot = clamp(item.rot == null ? 0 : item.rot, -180, 180);
      drawStickerPiece(sticker, pos.x, pos.y, item.scale, item.rot, true, item.uid === view.selectedUid);
      if (!isFlipPreview) {
        view.placementHits.push({
          uid: item.uid,
          stickerId: item.stickerId,
          x: pos.x,
          y: pos.y,
          r: 58 * item.scale,
          z: item.z || 1
        });
      }
    });
    ctx.restore();
  }

  function clipPage(r) {
    roundRectPath(r.x + 54, r.y + 120, r.w - 108, r.h - 170, 28);
    ctx.clip();
  }

  function pageToCanvas(x, y) {
    var r = book.right;
    var px = r.x + 54 + (r.w - 108) * (clamp(x, 0, 100) / 100);
    var py = r.y + 120 + (r.h - 170) * (clamp(y, 0, 100) / 100);
    return { x: px, y: py };
  }

  function canvasToPage(x, y) {
    var r = book.right;
    return {
      x: clamp(((x - (r.x + 54)) / (r.w - 108)) * 100, 3, 97),
      y: clamp(((y - (r.y + 120)) / (r.h - 170)) * 100, 3, 97)
    };
  }

  function drawStickerPiece(sticker, x, y, scale, rot, enabled, selected) {
    scale = scale == null ? 1 : scale;
    rot = rot || 0;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot * Math.PI / 180);
    ctx.scale(scale, scale);
    ctx.shadowColor = 'rgba(52,31,15,0.24)';
    ctx.shadowBlur = selected ? 20 : 14;
    ctx.shadowOffsetY = selected ? 9 : 7;
    ctx.fillStyle = '#fff';
    roundRectPath(-64, -64, 128, 128, 30);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.strokeStyle = selected ? '#ff7a1a' : 'rgba(183,137,74,0.22)';
    ctx.lineWidth = selected ? 7 : 3;
    roundRectPath(-64, -64, 128, 128, 30);
    ctx.stroke();

    var entry = sticker.img ? loadImage(resolveAsset(sticker.img)) : null;
    if (entry && entry.loaded) {
      drawContainedImage(entry.img, -48, -48, 96, 96);
    } else {
      ctx.font = '62px "Zen Maru Gothic", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#6b4b2e';
      ctx.fillText(sticker.emoji || '⭐', 0, 2);
    }

    if (!enabled) {
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = 'rgba(65,52,41,0.76)';
      ctx.fillRect(-64, -64, 128, 128);
    }
    ctx.restore();
  }

  function drawLockedSticker(sticker, x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.globalAlpha = 0.34;
    ctx.fillStyle = '#6f5d49';
    roundRectPath(-56, -56, 112, 112, 28);
    ctx.fill();
    ctx.globalAlpha = 0.28;
    var entry = sticker.img ? loadImage(resolveAsset(sticker.img)) : null;
    if (entry && entry.loaded) {
      ctx.filter = 'grayscale(1) brightness(0)';
      drawContainedImage(entry.img, -45, -45, 90, 90);
      ctx.filter = 'none';
    } else {
      ctx.font = '58px "Zen Maru Gothic", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#000';
      ctx.fillText(sticker.emoji || '？', 0, 0);
    }
    ctx.restore();
  }

  function drawContainedImage(img, x, y, w, h) {
    var ratio = Math.min(w / img.naturalWidth, h / img.naturalHeight);
    var dw = img.naturalWidth * ratio;
    var dh = img.naturalHeight * ratio;
    ctx.drawImage(img, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
  }

  function drawPill(x, y, w, h, text, fill, color) {
    ctx.save();
    ctx.fillStyle = fill;
    roundRectPath(x, y, w, h, h / 2);
    ctx.fill();
    ctx.fillStyle = color || '#fff';
    ctx.font = '900 ' + Math.round(h * 0.48) + 'px "Zen Maru Gothic", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x + w / 2, y + h / 2 + 1);
    ctx.restore();
  }

  function drawTray(page, gameId) {
    var r = book.tray;
    var owned = ownedFor(gameId);
    view.stickerEntries = [];
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.24)';
    ctx.shadowBlur = 22;
    ctx.shadowOffsetY = 10;
    ctx.fillStyle = '#c88442';
    roundRectPath(r.x, r.y, r.w, r.h, 34);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    var g = ctx.createLinearGradient(r.x, r.y, r.x, r.y + r.h);
    g.addColorStop(0, '#fff1bc');
    g.addColorStop(1, '#e8b15c');
    ctx.fillStyle = g;
    roundRectPath(r.x + 10, r.y + 10, r.w - 20, r.h - 20, 27);
    ctx.fill();
    ctx.strokeStyle = 'rgba(95,58,25,0.38)';
    ctx.lineWidth = 4;
    roundRectPath(r.x + 10, r.y + 10, r.w - 20, r.h - 20, 27);
    ctx.stroke();

    fitText('もっているシール', r.x + 34, r.y + 43, 240, 25, '#5a3518', 900);
    var stickers = (page.stickers || []).filter(function(sticker) { return !!owned[sticker.id]; });
    if (!stickers.length) {
      fitText('ゲームで あつめよう', r.x + 34, r.y + 88, 300, 24, '#7e5a35', 900);
    }
    stickers.forEach(function(sticker, i) {
      var x = r.x + 312 + i * 126;
      var y = r.y + 70;
      drawStickerPiece(sticker, x, y, 0.68, (i % 3 - 1) * 3, true);
      view.stickerEntries.push({ stickerId: sticker.id, x: x, y: y, r: 50 });
      fitText(sticker.name || 'シール', x, y + 56, 104, 18, '#5a3518', 900, 'center');
    });

    drawToolButtons(r);
    ctx.restore();
  }

  function drawToolButtons(r) {
    var labels = [
      { id: 'grow', text: '大' },
      { id: 'shrink', text: '小' },
      { id: 'rotate', text: 'まわす' },
      { id: 'remove', text: 'はずす' }
    ];
    var startX = r.x + r.w - 386;
    var y = r.y + 42;
    labels.forEach(function(btn, i) {
      var w = i < 2 ? 60 : 86;
      var x = startX + i * 92;
      var disabled = !view.selectedUid;
      ctx.fillStyle = disabled ? 'rgba(255,255,255,0.38)' : (btn.id === 'remove' ? '#ffe1d2' : '#fff9dc');
      roundRectPath(x, y, w, 52, 18);
      ctx.fill();
      ctx.strokeStyle = disabled ? 'rgba(113,79,42,0.16)' : 'rgba(113,79,42,0.42)';
      ctx.lineWidth = 3;
      ctx.stroke();
      fitText(btn.text, x + w / 2, y + 27, w - 8, btn.id === 'rotate' || btn.id === 'remove' ? 20 : 24, disabled ? '#aa987f' : '#6a3c18', 900, 'center');
      view.buttonHits.push({ action: btn.id, x: x, y: y, w: w, h: 52, disabled: disabled });
    });
  }

  function drawTabs() {
    view.tabHits = [];
    var x = book.right.x + book.right.w - 6;
    var y = 178;
    for (var i = 0; i < view.gameIds.length; i++) {
      var gameId = view.gameIds[i];
      var page = view.catalog.pages[gameId];
      var active = i === view.gameIndex;
      var h = 58;
      var tabY = y + i * 66;
      ctx.save();
      ctx.fillStyle = active ? (page.accent || '#f2915a') : '#f3c97c';
      ctx.shadowColor = 'rgba(0,0,0,0.18)';
      ctx.shadowBlur = active ? 12 : 6;
      ctx.shadowOffsetY = 3;
      roundRectPath(x, tabY, 82, h, 18);
      ctx.fill();
      ctx.shadowColor = 'transparent';
      ctx.font = '30px "Zen Maru Gothic", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = active ? '#fff' : '#65401d';
      ctx.fillText(page.icon || '📒', x + 41, tabY + h / 2 + 1);
      ctx.restore();
      view.tabHits.push({ index: i, x: x, y: tabY, w: 82, h: h });
    }
  }

  function drawTopButtons() {
    drawCanvasButton('back', book.back.x, book.back.y, book.back.w, book.back.h, 'もどる', '#fff0c9');
    drawRoundArrow('prev', book.prev.x, book.prev.y, book.prev.r, -1);
    drawRoundArrow('next', book.next.x, book.next.y, book.next.r, 1);
  }

  function drawCanvasButton(action, x, y, w, h, label, fill) {
    ctx.save();
    ctx.fillStyle = fill;
    ctx.shadowColor = 'rgba(0,0,0,0.26)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetY = 5;
    roundRectPath(x, y, w, h, 22);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.strokeStyle = 'rgba(117,76,34,0.45)';
    ctx.lineWidth = 3;
    ctx.stroke();
    fitText(label, x + w / 2, y + h / 2 + 1, w - 16, 24, '#573417', 900, 'center');
    ctx.restore();
    view.buttonHits.push({ action: action, x: x, y: y, w: w, h: h });
  }

  function drawRoundArrow(action, x, y, r, dir) {
    ctx.save();
    ctx.fillStyle = '#fff0c9';
    ctx.shadowColor = 'rgba(0,0,0,0.26)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetY = 5;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.strokeStyle = 'rgba(117,76,34,0.45)';
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.fillStyle = '#6a3c18';
    ctx.beginPath();
    if (dir > 0) {
      ctx.moveTo(x - 14, y - 22);
      ctx.lineTo(x + 18, y);
      ctx.lineTo(x - 14, y + 22);
    } else {
      ctx.moveTo(x + 14, y - 22);
      ctx.lineTo(x - 18, y);
      ctx.lineTo(x + 14, y + 22);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    view.buttonHits.push({ action: action, x: x - r, y: y - r, w: r * 2, h: r * 2 });
  }

  function drawFlipOverlay() {
    if (!view.flip) return;
    var now = performance.now();
    var p = clamp((now - view.flip.started) / view.flip.duration, 0, 1);
    var dir = view.flip.dir;
    var rect = dir > 0 ? book.right : book.left;
    var ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
    var fold = dir > 0 ? rect.x + rect.w * (1 - ease) : rect.x + rect.w * ease;
    var curve = Math.sin(p * Math.PI) * 84;

    ctx.save();
    ctx.globalAlpha = 0.96;
    ctx.beginPath();
    if (dir > 0) {
      ctx.moveTo(rect.x + rect.w, rect.y + 18);
      ctx.bezierCurveTo(fold + curve, rect.y + 62, fold - curve, rect.y + rect.h - 90, rect.x + rect.w, rect.y + rect.h - 22);
      ctx.lineTo(rect.x + rect.w, rect.y + 18);
    } else {
      ctx.moveTo(rect.x, rect.y + 18);
      ctx.bezierCurveTo(fold - curve, rect.y + 62, fold + curve, rect.y + rect.h - 90, rect.x, rect.y + rect.h - 22);
      ctx.lineTo(rect.x, rect.y + 18);
    }
    var g = ctx.createLinearGradient(dir > 0 ? fold : rect.x, rect.y, dir > 0 ? rect.x + rect.w : fold, rect.y);
    g.addColorStop(0, '#f0d79b');
    g.addColorStop(0.36, '#fff7d9');
    g.addColorStop(0.72, '#d5a85e');
    g.addColorStop(1, '#7a4d26');
    ctx.fillStyle = g;
    ctx.shadowColor = 'rgba(0,0,0,0.34)';
    ctx.shadowBlur = 24;
    ctx.shadowOffsetX = dir > 0 ? -10 : 10;
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.strokeStyle = 'rgba(111,73,35,0.32)';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.restore();

    if (p >= 1) {
      view.gameIndex = view.flip.to;
      view.flip = null;
      updateURL();
      preloadPageImages(currentPage());
      requestDraw();
    } else {
      requestAnimationFrame(draw);
    }
  }

  function drawPasteAnimation() {
    if (!view.paste) return;
    var now = performance.now();
    var p = clamp((now - view.paste.started) / 420, 0, 1);
    ctx.save();
    ctx.translate(view.paste.x, view.paste.y);
    ctx.globalAlpha = 1 - p;
    ctx.strokeStyle = '#ff8a1f';
    ctx.lineWidth = 8 * (1 - p);
    ctx.beginPath();
    ctx.arc(0, 0, 44 + p * 46, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,' + (0.7 * (1 - p)) + ')';
    ctx.beginPath();
    ctx.ellipse(-16, -36 + p * 16, 42, 18, -0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    if (p >= 1) view.paste = null;
  }

  function draw() {
    view.lastFrame = performance.now();
    drawBackground();
    drawBookBase();
    if (!view.ready || !currentPage()) {
      fitText('シールちょうを よみこみ中', W / 2, H / 2, 520, 38, '#fff5d8', 900, 'center');
      return;
    }

    var page = currentPage();
    var gameId = currentGameId();
    if (view.flip) {
      var previewIndex = performance.now() - view.flip.started > view.flip.duration * 0.5 ? view.flip.to : view.flip.from;
      var previewId = view.gameIds[previewIndex];
      drawPageContent(view.catalog.pages[previewId], previewId, true);
    } else {
      drawPageContent(page, gameId, false);
    }
    drawTabs();
    view.buttonHits = [];
    drawTray(page, gameId);
    drawTopButtons();
    drawPasteAnimation();
    drawFlipOverlay();
  }

  function requestDraw() {
    requestAnimationFrame(draw);
  }

  function updateURL() {
    try {
      var params = new URLSearchParams(location.search);
      params.set('game', currentGameId());
      history.replaceState(null, '', location.pathname + '?' + params.toString());
    } catch(e) {}
  }

  function startFlip(targetIndex) {
    if (view.flip || targetIndex === view.gameIndex || targetIndex < 0 || targetIndex >= view.gameIds.length) return;
    view.selectedUid = '';
    var dir = targetIndex > view.gameIndex ? 1 : -1;
    view.flip = {
      dir: dir,
      from: view.gameIndex,
      to: targetIndex,
      started: performance.now(),
      duration: 640
    };
    requestDraw();
  }

  function addSticker(stickerId, at) {
    var gameId = currentGameId();
    var page = currentPage();
    var owned = ownedFor(gameId);
    if (!owned[stickerId] || !findSticker(page, stickerId)) return;
    var list = placementsFor(gameId);
    var p = at || { x: 50, y: 50 };
    var uid = 'sticker-' + Date.now() + '-' + Math.floor(Math.random() * 100000);
    var item = {
      uid: uid,
      stickerId: stickerId,
      x: clamp(p.x, 6, 94),
      y: clamp(p.y, 8, 92),
      scale: 1,
      rot: ((list.length % 7) - 3) * 3,
      z: nextZ(list)
    };
    list.push(item);
    view.selectedUid = uid;
    saveLayouts();
    var pos = pageToCanvas(item.x, item.y);
    view.paste = { x: pos.x, y: pos.y, started: performance.now() };
    requestDraw();
  }

  function nextZ(list) {
    var z = 1;
    list.forEach(function(item) {
      z = Math.max(z, Number(item.z || 1) + 1);
    });
    return z;
  }

  function selectedPlacement() {
    var list = placementsFor(currentGameId());
    for (var i = 0; i < list.length; i++) {
      if (list[i].uid === view.selectedUid) return list[i];
    }
    return null;
  }

  function runTool(action) {
    var item = selectedPlacement();
    if (!item) return;
    var list = placementsFor(currentGameId());
    if (action === 'grow') item.scale = clamp((item.scale || 1) + 0.12, 0.5, 1.9);
    if (action === 'shrink') item.scale = clamp((item.scale || 1) - 0.12, 0.5, 1.9);
    if (action === 'rotate') item.rot = clamp((item.rot || 0) + 15, -180, 180);
    if (action === 'remove') {
      view.layouts.pages[currentGameId()] = list.filter(function(current) { return current.uid !== item.uid; });
      view.selectedUid = '';
    }
    saveLayouts();
    requestDraw();
  }

  function pointFromEvent(event) {
    var rect = canvas.getBoundingClientRect();
    return {
      x: ((event.clientX - rect.left) / rect.width) * W,
      y: ((event.clientY - rect.top) / rect.height) * H
    };
  }

  function hitRect(hit, p) {
    return p.x >= hit.x && p.x <= hit.x + hit.w && p.y >= hit.y && p.y <= hit.y + hit.h;
  }

  function handlePointerDown(event) {
    if (!view.ready || view.flip) return;
    var p = pointFromEvent(event);

    for (var b = view.buttonHits.length - 1; b >= 0; b--) {
      var btn = view.buttonHits[b];
      if (!btn.disabled && hitRect(btn, p)) {
        event.preventDefault();
        if (btn.action === 'back') location.href = '../play.html';
        else if (btn.action === 'prev') startFlip(Math.max(0, view.gameIndex - 1));
        else if (btn.action === 'next') startFlip(Math.min(view.gameIds.length - 1, view.gameIndex + 1));
        else runTool(btn.action);
        return;
      }
    }

    for (var t = 0; t < view.tabHits.length; t++) {
      if (hitRect(view.tabHits[t], p)) {
        event.preventDefault();
        startFlip(view.tabHits[t].index);
        return;
      }
    }

    for (var i = view.placementHits.length - 1; i >= 0; i--) {
      var hit = view.placementHits[i];
      var dx = p.x - hit.x;
      var dy = p.y - hit.y;
      if (Math.sqrt(dx * dx + dy * dy) <= hit.r + 16) {
        event.preventDefault();
        view.selectedUid = hit.uid;
        var item = selectedPlacement();
        var list = placementsFor(currentGameId());
        if (item) item.z = nextZ(list);
        view.dragging = { uid: hit.uid, pointerId: event.pointerId };
        try { canvas.setPointerCapture(event.pointerId); } catch(e) {}
        saveLayouts();
        requestDraw();
        return;
      }
    }

    for (var s = 0; s < view.stickerEntries.length; s++) {
      var entry = view.stickerEntries[s];
      var edx = p.x - entry.x;
      var edy = p.y - entry.y;
      if (Math.sqrt(edx * edx + edy * edy) <= entry.r) {
        event.preventDefault();
        addSticker(entry.stickerId, { x: 50 + (s % 4 - 1.5) * 6, y: 48 + Math.floor(s / 4) * 7 });
        return;
      }
    }

    view.selectedUid = '';
    requestDraw();
  }

  function handlePointerMove(event) {
    if (!view.dragging) return;
    event.preventDefault();
    var item = selectedPlacement();
    if (!item) return;
    var p = pointFromEvent(event);
    var pagePoint = canvasToPage(p.x, p.y);
    item.x = pagePoint.x;
    item.y = pagePoint.y;
    requestDraw();
  }

  function handlePointerUp(event) {
    if (!view.dragging) return;
    event.preventDefault();
    view.dragging = null;
    saveLayouts();
    requestDraw();
  }

  function initialize() {
    if (!window.PonoGameStickers) {
      setStatus('シールちょうを よみこめませんでした');
      requestDraw();
      return;
    }
    window.PonoGameStickers.loadCatalog()
      .then(function(catalog) {
        view.catalog = catalog;
        view.gameIds = Object.keys(catalog.pages || {});
        var requested = '';
        try {
          requested = new URLSearchParams(location.search).get('game') || '';
        } catch(e) {}
        view.gameIndex = Math.max(0, view.gameIds.indexOf(requested));
        view.ready = true;
        preloadPageImages(currentPage());
        setStatus('シールちょう');
        requestDraw();
      })
      .catch(function() {
        setStatus('シールちょうを よみこめませんでした');
        requestDraw();
      });
  }

  canvas.addEventListener('pointerdown', handlePointerDown);
  canvas.addEventListener('pointermove', handlePointerMove);
  canvas.addEventListener('pointerup', handlePointerUp);
  canvas.addEventListener('pointercancel', handlePointerUp);

  window.__stickerBookDebug = {
    addSticker: addSticker,
    currentGameId: currentGameId,
    placementsFor: placementsFor,
    startFlip: startFlip,
    state: view
  };

  initialize();
})();
</script>
</body>
</html>
