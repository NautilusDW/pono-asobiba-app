name = "pono-asobiba-app"
main = "src/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./"
binding = "ASSETS"
run_worker_first = [
  "/admin/*",
  "/tools/*",
  "/room/furniture_adjuster*",
  "/room/yard_adjuster*",
  "/.netlify/functions/*",
  "/api/*"
]

[observability]
enabled = true
