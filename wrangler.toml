name = "pono-asobiba-app"
main = "src/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# 本番 (production) = master branch からのデプロイ。
# pono.kodama-no-mori.com を自動で DNS + ルーティング接続する。
# custom_domain=true なので Cloudflare が該当 zone に DNS レコードを自動作成。
# kodama-no-mori.com は同アカウントで Cloudflare Registrar 取得済み (2026-04-23) なので追加作業なし。
# デフォルトの pono-asobiba-app.ndw.workers.dev も引き続き有効 (fallback)。
#
# ※ routes は top-level キー。[section] ヘッダー以降に書くとそのセクション配下と
#    みなされてしまう (TOML 仕様) ので必ず section 開始より前にまとめて書く。
routes = [
  # custom_domain=true のときは pattern にホスト名のみ指定 (ワイルドカードや /* path 不可)。
  # Cloudflare が zone に DNS レコードを自動作成し、全リクエストを Worker に流す。
  { pattern = "pono.kodama-no-mori.com", custom_domain = true }
]

[assets]
directory = "./"
binding = "ASSETS"
# 全リクエストを Worker 経由にする。
# 理由:
# - /admin/ などの Basic Auth 保護
# - HTML/sw.js 等への no-cache ヘッダー注入（applyCacheHeaders）
# - 画像/JS/CSS は Worker 内でそのまま ASSETS.fetch() にパススルーするので
#   エッジキャッシュは引き続き有効（レスポンスヘッダーに手を加えない）
run_worker_first = true

[observability]
enabled = true

[[kv_namespaces]]
binding = "BENTO_MASK_CONFIG"
id = "45b26dbf2d7a4f40907517e826e48ed8"

# Staging (確認用) = develop branch からのデプロイ。
# 独自ドメインは付けない。workers.dev サブドメインだけで十分。
# URL: https://pono-asobiba-staging.ndw.workers.dev/
# routes=[] で top-level routes の継承を明示的に打ち消す
# (staging が本番の custom domain を奪おうとしてデプロイが失敗するのを防ぐため)
[env.staging]
name = "pono-asobiba-staging"
routes = []

[[env.staging.kv_namespaces]]
binding = "BENTO_MASK_CONFIG"
id = "0c58144b7fe9479e9781ddb1d9b44dc9"

# Staging (アプリ版) = develop-app branch からのデプロイ用、別 worker。
# URL: https://pono-asobiba-app-staging.ndw.workers.dev/
# 既存 staging とは別 worker name で並走させ、APP_BUILD=1 により
# HTML レスポンスへ window.__APP_BUILD__=1 を注入してアプリ版ビルドを識別する。
# routes=[] で top-level routes の継承を明示的に打ち消す
# (custom_domain の取り合いで失敗するのを防ぐ。既存 staging と同じ理由)
[env.staging-app]
name = "pono-asobiba-app-staging"
routes = []  # custom_domain 継承を回避（既存 staging と同じ理由）

[env.staging-app.vars]
APP_BUILD = "1"

# Cloudflare の [env.XXX] では top-level [assets] が継承されないため、
# staging-app では明示的に再宣言する必要がある。
# 再宣言しないと CF エッジが静的ファイルを直接 HIT で返してしまい、
# worker が起動しない（= applyCacheHeaders の no-store も APP_BUILD 注入も効かない）。
# run_worker_first は boolean true（配列 [true] にすると CF cache HIT 残留バグの罠あり）。
[env.staging-app.assets]
directory = "./"
binding = "ASSETS"
run_worker_first = true

# KV は当面 staging と同一 namespace を共有する（後で分離可能）
# 必要になったら wrangler kv:namespace create BENTO_MASK_CONFIG --env staging-app で別 ID を取得して差し替え
# 注意: 同じ key (例: bento-mask-defaults-v1) を staging と staging-app の両方から同時に書き込むと
# 互いに上書きしあう。 admin 操作は片側に寄せるか、 早めに別 namespace へ分離すること。
[[env.staging-app.kv_namespaces]]
binding = "BENTO_MASK_CONFIG"
id = "0c58144b7fe9479e9781ddb1d9b44dc9"
