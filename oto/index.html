// rec-bar (録音 + 保存) の表示
// ════════════════════════════════════════════════════════════
// 録音 UI 撤去のため _renderRecBar / _renderSavedList は no-op
function _renderRecBar() { /* no-op (rec-bar UI removed) */ }
function _renderSavedList() { /* no-op (saved-list UI removed) */ }


function _showOverlay(num, msg) {
  var ov  = document.getElementById('rec-overlay');
  var nEl = document.getElementById('rec-overlay-num');
  var mEl = document.getElementById('rec-overlay-msg');
  if (!ov) return;
  ov.style.display = 'flex';
  nEl.textContent = num != null ? String(num) : '';
  mEl.textContent = msg || '';
  // restart animation
  nEl.style.animation = 'none'; void nEl.offsetWidth; nEl.style.animation = '';
}
function _hideOverlay() {
  var ov = document.getElementById('rec-overlay');
  if (ov) ov.style.display = 'none';
}

function _showProgress(label, recordingClass) {
  var bar = document.getElementById('rec-progress');
  var lab = document.getElementById('rec-progress-label');
  if (!bar) return;
  bar.style.display = 'block';
  bar.classList.toggle('recording', !!recordingClass);
  if (lab) lab.textContent = label;
}
function _hideProgress() {
  var bar = document.getElementById('rec-progress');
  if (bar) bar.style.display = 'none';
  if (_progressRaf) { cancelAnimationFrame(_progressRaf); _progressRaf = null; }
}
function _updateProgressFill(ratio) {
  var fill = document.getElementById('rec-progress-fill');
  if (fill) fill.style.width = Math.max(0, Math.min(1, ratio)) * 100 + '%';
}

// カウントダウン → 録音開始 → 8秒後にループ再生
function startRecording() {
  if (_recState !== 'idle') return;
  // 既存の再生は止める
  _stopAllPlayback();
  unlockAudio();
  _recState = 'countdown';
  _renderRecBar();
  _showOverlay(3, 'ろくおん するよ！');
  setTimeout(function() {
    if (_recState !== 'countdown') return;
    _showOverlay(2, 'ろくおん するよ！');
  }, 700);
  setTimeout(function() {
    if (_recState !== 'countdown') return;
    _showOverlay(1, 'ろくおん するよ！');
  }, 1400);
  setTimeout(function() {
    if (_recState !== 'countdown') return;
    _showOverlay('スタート!', '');
  }, 2100);
  setTimeout(function() {
    if (_recState !== 'countdown') return;
    _hideOverlay();
    _beginRecordingPhase();
  }, 2700);
}

function _beginRecordingPhase() {
  _recState = 'recording';
  _renderRecBar();
  _recEvents = [];
  // バンド (mp3 / 合成) が鳴っていれば全部リスタートして録音開始時刻と完全同期
  _recStartMs = performance.now();
  _restartActiveBands();
  var loopMs = currentLoopMs();
  _showProgress('🎤 ろくおん中 (' + Math.round(loopMs/1000) + '秒)', true);
  function tick() {
    if (_recState !== 'recording') return;
    var elapsed = performance.now() - _recStartMs;
    _updateProgressFill(elapsed / loopMs);
    if (elapsed >= loopMs) {
      _finishRecording();
      return;
    }
    _progressRaf = requestAnimationFrame(tick);
  }
  tick();
}

function _finishRecording() {
  if (_recState !== 'recording') return;
  if (_progressRaf) { cancelAnimationFrame(_progressRaf); _progressRaf = null; }
  var loopMs = currentLoopMs();
  _curRec = { events: _recEvents.slice(), loopMs: loopMs };
  _recEvents = [];
  _recState = 'idle';
  _hideOverlay();
  _hideProgress();
  _playCurRec();
}

function _playRecordedEvent(ev) {
  if (ev.kind === 'set') {
    playSetSoundFor(ev.args.set, ev.args.idx, !!ev.args.chord);
  } else if (ev.kind === 'kira') {
    var ac = getAC();
    if (ac) playKira(ac, ev.args.colorIdx);
  }
}

// タブが背景に行ったら全てのオーディオを停止
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    if (_recState !== 'idle') {
      _recState = 'idle';
      if (_progressRaf) { cancelAnimationFrame(_progressRaf); _progressRaf = null; }
      _hideOverlay();
      _hideProgress();
    }
    _stopAllPlayback();
    _stopAllBands();
    // 押しっぱなしのホールド音も全部止める
    Array.from(_heldNotes.keys()).forEach(function(b) { stopHeldNote(b); });
    _renderRecBar();
    _renderSavedList();
  }
});

// スピード選択: おそい / ふつう / はやい → ドラムだけ ON/OFF
// ════════════════════════════════════════════════════════════
var SPEED_TO_SONG_IDX = { slow: 1, normal: 2, fast: 3 };
function _renderSpeedBtns() {
  ['slow', 'normal', 'fast'].forEach(function(key) {
    var btn = document.querySelector('.speed-btn[data-speed="' + key + '"]');
    if (!btn) return;
    var on = (_curSongIdx === SPEED_TO_SONG_IDX[key]) && _activeStems.drums;
    btn.classList.toggle('on', on);
  });
}
function setSpeed(speedKey) {
  var idx = SPEED_TO_SONG_IDX[speedKey];
  if (idx == null) return;
  unlockAudio();
  var alreadyOn = (_curSongIdx === idx) && _activeStems.drums;
  _stopAllBands();
  if (!alreadyOn) {
    _curSongIdx = idx;
    _activeStems.drums = true;
    _startSongClock();
  }
  _renderSpeedBtns();
}
document.querySelectorAll('.speed-btn').forEach(function(b) {
  b.addEventListener('click', function(e) {
    e.preventDefault();
    setSpeed(b.dataset.speed);
  });
});

// (録音 UI は削除されたため、関連ハンドラ・モーダル・保存リストのレンダリングコードは全て撤去)

// ════════════════════════════════════════════════════════════
// 音色 折りたたみ (右上 popover) + ペンタトニック切替
// ════════════════════════════════════════════════════════════
(function() {
  var trigger = document.getElementById('set-trigger');
  var popover = document.getElementById('set-popover');
  if (!trigger || !popover) return;
  function close() { popover.classList.remove('open'); }
  function open()  { popover.classList.add('open'); }
  trigger.addEventListener('click', function(e) {
    e.stopPropagation();
    if (popover.classList.contains('open')) close(); else open();
  });
  // 外側クリックで閉じる
  document.addEventListener('click', function(e) {
    if (!popover.classList.contains('open')) return;
    if (popover.contains(e.target) || trigger.contains(e.target)) return;
    close();
  });
  // 音色選択は .sound-sets の .set-btn (常時表示) — popover 外から
  document.querySelectorAll('.sound-sets .set-btn').forEach(function(b) {
    b.addEventListener('click', function(e) {
      e.stopPropagation();
      // Phase 2 future-use: sound set tier lock. In MVP (PONO_TIER_GAME_LOCKS_ENABLED=false),
      // isOtoSoundSetUnlocked() always returns true so this branch is unreachable.
      if (window.PonoTier && !window.PonoTier.isOtoSoundSetUnlocked(b.dataset.set)) {
        window.PonoTier.showSubscribePromo({
          title: 'おとが ふえているよ！',
          body: 'アプリ で もっと たくさんの おとが あそべるよ'
        });
        return;
      }
      _selectSoundSet(b.dataset.set);
      unlockAudio();
      _ensureAnimalDecoded();
      playSetSound(0);
    });
  });
  // スケール toggle (ふつう / ペンタ)
  var sMajor = document.getElementById('scale-major');
  var sPenta = document.getElementById('scale-penta');
  function setScale(mode) {
    // Phase 2 future-use: scale tier lock. In MVP (PONO_TIER_GAME_LOCKS_ENABLED=false),
    // isOtoScaleUnlocked() always returns true so this branch is unreachable.
    if (window.PonoTier && !window.PonoTier.isOtoScaleUnlocked(mode)) {
      window.PonoTier.showSubscribePromo({
        title: 'スケール が ふえているよ！',
        body: 'ペンタトニック は アプリ で あそべるよ'
      });
      return;
    }
    SCALE_MODE = mode;
    try { localStorage.setItem('pono_oto_scale', mode); } catch(e) {}
    sMajor.classList.toggle('active', mode === 'major');
    sPenta.classList.toggle('active', mode === 'penta');
    // v719: ラベルと実音を一致させる (ファ→ソ など penta の発音名へ書き換え)
    _applyScaleLabels();
  }
  if (sMajor) sMajor.addEventListener('click', function(e) { e.stopPropagation(); setScale('major'); });
  if (sPenta) sPenta.addEventListener('click', function(e) { e.stopPropagation(); setScale('penta'); });
  try {
    var saved = localStorage.getItem('pono_oto_scale') || 'major';
    setScale(saved === 'penta' ? 'penta' : 'major');
  } catch(e) {}

  // コードモード toggle
  var cOff = document.getElementById('chord-off');
  var cOn  = document.getElementById('chord-on');
  function setChord(mode) {
    // Phase 2 future-use: chord mode tier lock. In MVP (PONO_TIER_GAME_LOCKS_ENABLED=false),
    // isOtoChordModeUnlocked() always returns true so this branch is unreachable.
    if (window.PonoTier && !window.PonoTier.isOtoChordModeUnlocked(mode)) {
      window.PonoTier.showSubscribePromo({
        title: 'コードモード が ふえているよ！',
        body: '和音 で えんそう できるよ。 アプリ で あそべるよ'
      });
      return;
    }
    CHORD_MODE = mode;
    try { localStorage.setItem('pono_oto_chord', mode); } catch(e) {}
    cOff.classList.toggle('active', mode === 'off');
    cOn.classList.toggle('active',  mode === 'on');
    if ((_rhythm.enabled || _rhythm.demoActive) && _rhythm.startAcTime) {
      _scheduleRhythmMelody(_rhythm.demoActive && !_rhythm.enabled ? 0.18 : 0.16);
    }
  }
  if (cOff) cOff.addEventListener('click', function(e) { e.stopPropagation(); setChord('off'); });
  if (cOn)  cOn.addEventListener('click',  function(e) { e.stopPropagation(); setChord('on');  });
  try {
    var savedC = localStorage.getItem('pono_oto_chord') || 'off';
    setChord(savedC === 'on' ? 'on' : 'off');
  } catch(e) {}
})();

// ════════════════════════════════════════════════════════════
// ティアロック UI グレーアウト (free/book ユーザー向け視覚化)
// タップ時の挙動 (showSubscribePromo) は各クリックハンドラ側で維持。
// ここでは見た目だけグレーアウトして「使えない」と分かるようにする。
// ════════════════════════════════════════════════════════════
function applyTierLockUI() {
  if (!window.PonoTier) return;
  // 音色 (ねいろ)
  document.querySelectorAll('.sound-sets .set-btn').forEach(function(b) {
    var locked = !window.PonoTier.isOtoSoundSetUnlocked(b.dataset.set);
    b.classList.toggle('tier-locked', locked);
  });
  // スケール (ふつう / ペンタ)
  var sMajor = document.getElementById('scale-major');
  var sPenta = document.getElementById('scale-penta');
  if (sMajor) sMajor.classList.toggle('tier-locked', !window.PonoTier.isOtoScaleUnlocked('major'));
  if (sPenta) sPenta.classList.toggle('tier-locked', !window.PonoTier.isOtoScaleUnlocked('penta'));
  // モード (じゆう / リズム)
  document.querySelectorAll('.mode-btn').forEach(function(b) {
    b.classList.toggle('tier-locked', !window.PonoTier.isOtoModeUnlocked(b.dataset.mode));
  });
  // コードモード (たんおん / コード)
  var cOff = document.getElementById('chord-off');
  var cOn  = document.getElementById('chord-on');
  if (cOff) cOff.classList.toggle('tier-locked', !window.PonoTier.isOtoChordModeUnlocked('off'));
  if (cOn)  cOn.classList.toggle('tier-locked', !window.PonoTier.isOtoChordModeUnlocked('on'));
}
// PonoTier が遅延ロードの可能性もあるため、即時 + DOMContentLoaded + 少し遅延の3段で実行
applyTierLockUI();
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', applyTierLockUI);
}
setTimeout(applyTierLockUI, 500);

// 初回レンダ + localStorage 復元
_loadSaved();
_renderSavedList();
_renderRecBar();
</script>
</body>
</html>
