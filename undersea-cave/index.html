<!-- app (アプリばん) 専用 tier ガード。 tier.js 未読込/例外時は fail-open (従来通り表示)。 -->
<script src="../common/tier.js"></script>
<script>
(function(){
  'use strict';
  var locked = false;
  try {
    var pt = window.PonoTier;
    if (pt && typeof pt.getTier === 'function') locked = (pt.getTier() !== 'app');
  } catch (e) { locked = false; }
  if (!locked) return;
  window.__PONO_TIER_LOCKED__ = true;
  // FOUC 防止: head 内同期実行なので初回ペイント前にゲーム側 DOM を不可視化
  var st = document.createElement('style');
  st.textContent = 'html{background:#FFF7E6 !important}body>*:not(#ponoTierLockScreen){visibility:hidden !important}';
  (document.head || document.documentElement).appendChild(st);
  // キーボード入力がゲームへ届かないよう capture 段階で遮断 (ロック中のみ)。
  // ゲーム側 listener はガードより後に登録されるため stopImmediatePropagation だけで全て遮断できる。
  // preventDefault はしない: Tab/Enter で「メニューへ もどる」リンクに到達する
  // キーボード操作と、 ブラウザ既定動作 (F5 リロード等) を塞がないため。
  var KEY_EVTS = ['keydown', 'keyup', 'keypress'];
  for (var i = 0; i < KEY_EVTS.length; i++) {
    window.addEventListener(KEY_EVTS[i], function(e){
      if (window.__PONO_TIER_LOCKED__) e.stopImmediatePropagation();
    }, true);
  }
  function showLock(){
    if (!document.body || document.getElementById('ponoTierLockScreen')) return;
    var ov = document.createElement('div');
    ov.id = 'ponoTierLockScreen';
    ov.setAttribute('role', 'dialog');
    ov.style.cssText = 'position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(165deg,#FFF7E6 0%,#FFEDC2 45%,#D9EFD5 100%);font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif;text-align:center';
    var card = document.createElement('div');
    card.style.cssText = 'background:#fff;border-radius:26px;padding:28px 24px 26px;max-width:340px;width:100%;box-shadow:0 12px 40px rgba(93,78,55,0.22)';
    var emo = document.createElement('div');
    emo.style.cssText = 'font-size:2.8rem;line-height:1;margin-bottom:12px';
    emo.textContent = '🦉✨';
    card.appendChild(emo);
    var tag = document.createElement('div');
    tag.style.cssText = 'display:inline-block;font-size:0.74rem;font-weight:900;color:#fff;background:linear-gradient(135deg,#34D399,#10B981);padding:4px 14px;border-radius:50px;letter-spacing:0.06em;margin-bottom:12px';
    tag.textContent = 'アプリばん せんよう';
    card.appendChild(tag);
    var ttl = document.createElement('div');
    ttl.style.cssText = 'font-size:1.12rem;font-weight:900;color:#5D4E37;line-height:1.5;margin-bottom:10px';
    ttl.textContent = 'この ゲームは アプリばんで あそべるよ！';
    card.appendChild(ttl);
    var body = document.createElement('div');
    body.style.cssText = 'font-size:0.92rem;font-weight:700;color:#8B7B60;line-height:1.6;margin-bottom:18px';
    body.textContent = 'アプリばんに あたらしい あそびが まってるよ';
    card.appendChild(body);
    var btn = document.createElement('a');
    btn.href = '../play.html';
    btn.style.cssText = 'display:inline-block;padding:12px 34px;border-radius:50px;background:linear-gradient(135deg,#60A5FA,#3B82F6);color:#fff;font-size:0.98rem;font-weight:900;text-decoration:none;box-shadow:0 4px 14px rgba(59,130,246,0.4)';
    btn.textContent = 'メニューへ もどる';
    card.appendChild(btn);
    ov.appendChild(card);
    document.body.appendChild(ov);
  }
  if (document.body) { showLock(); }
  else { document.addEventListener('DOMContentLoaded', showLock); }
})();
</script>

</style>

<script>
(() => {
  'use strict';
  // app 専用 tier ロック中はゲームを初期化しない (head 側ガードで判定済)
  if (window.__PONO_TIER_LOCKED__) return;

  const BASE_W = 1600;
  const BASE_H = 900;
  const WORLD_W = 5200;
  const TOTAL_LIGHT = 9;

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d', { alpha: false });
  const app = document.getElementById('app');
  const loading = document.getElementById('loading');
  const startOverlay = document.getElementById('startOverlay');
  const finishOverlay = document.getElementById('finishOverlay');
  const startBtn = document.getElementById('startBtn');
  const againBtn = document.getElementById('againBtn');
  const homeBtn = document.getElementById('homeBtn');
  const promptEl = document.getElementById('prompt');
  const cargoText = document.getElementById('cargoText');
  const friendText = document.getElementById('friendText');
  const scoreText = document.getElementById('scoreText');
  const finishText = document.getElementById('finishText');

  const ASSET_BASE = '../assets/images/undersea-cave/';
  const ASSETS = {
    bgCeiling: ASSET_BASE + 'bg_ceiling.png',
    bgWallNear: ASSET_BASE + 'bg_wall_near.png',
    bgFloor: ASSET_BASE + 'bg_floor_sand.png',
    bgWallFar: ASSET_BASE + 'bg_wall_far.png',
    submarine: '../assets/images/ocean/Submarine/Submarine_003.webp',
    whaleSleep: ASSET_BASE + 'friend_whale_sleep.png',
    whaleSurprise: ASSET_BASE + 'friend_whale_surprise.png',
    whaleOpen: ASSET_BASE + 'friend_whale_open.png',
    octopusSurprise: ASSET_BASE + 'friend_octopus_surprise.png',
    octopusHappy: ASSET_BASE + 'friend_octopus_happy.png',
    octopusSmile: ASSET_BASE + 'friend_octopus_smile.png',
    pearlShell: ASSET_BASE + 'item_pearl_shell.png',
    foodBubble: ASSET_BASE + 'item_food_bubble.png',
    bellBubble: ASSET_BASE + 'item_bell_bubble.png',
    seaweed: ASSET_BASE + 'item_seaweed.png',
    heartBubble: ASSET_BASE + 'item_heart_bubble.png',
    ponoGlow: ASSET_BASE + 'item_pono_glow.png',
    foodPellet: ASSET_BASE + 'item_food_pellet.png',
    plankton: ASSET_BASE + 'item_plankton_sparkles.png'
  };

  const img = {};
  let audio = null;
  let dpr = 1;
  let lastTime = 0;
  let ready = false;

  const state = {
    mode: 'ready',
    time: 0,
    camera: 0,
    score: 0,
    cargo: 0,
    delivered: 0,
    friendsDone: 0,
    boost: 0,
    pointerActive: false,
    promptTimer: 0,
    promptText: '',
    player: { x: 190, y: 454, tx: 260, ty: 454, vx: 0, vy: 0, tilt: 0 },
    keys: Object.create(null),
    collectables: [],
    friends: [],
    bubbles: [],
    sparks: [],
    decor: []
  };

  const friendTemplate = [
    {
      id: 'whaleA',
      x: 1320,
      y: 372,
      w: 420,
      normal: 'whaleSleep',
      active: 'whaleSurprise',
      happy: 'whaleOpen',
      need: 3,
      label: 'あと 3'
    },
    {
      id: 'octo',
      x: 2820,
      y: 545,
      w: 330,
      normal: 'octopusSurprise',
      active: 'octopusSmile',
      happy: 'octopusHappy',
      need: 3,
      label: 'あと 3'
    },
    {
      id: 'whaleB',
      x: 4300,
      y: 382,
      w: 390,
      normal: 'whaleSurprise',
      active: 'whaleOpen',
      happy: 'whaleSleep',
      need: 3,
      label: 'あと 3'
    }
  ];

  const foodSpots = [
    [460, 255], [650, 565], [910, 370],
    [1580, 240], [1820, 610], [2140, 390],
    [3050, 245], [3310, 620], [3680, 390],
    [4500, 580], [4700, 300], [4920, 480]
  ];

  const bonusSpots = [
    ['pearlShell', 720, 700, 78], ['bellBubble', 1200, 250, 74],
    ['heartBubble', 2020, 220, 74], ['plankton', 2460, 670, 76],
    ['pearlShell', 3480, 705, 78], ['bellBubble', 3950, 250, 74],
    ['heartBubble', 4720, 640, 74]
  ];

  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const image = new Image();
      image.onload = () => resolve(image);
      image.onerror = () => reject(new Error('image load failed: ' + src));
      image.src = src;
    });
  }

  function resize() {
    const rect = app.getBoundingClientRect();
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.max(1, Math.round(rect.width * dpr));
    canvas.height = Math.max(1, Math.round(rect.height * dpr));
    ctx.setTransform(canvas.width / BASE_W, 0, 0, canvas.height / BASE_H, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function dist(a, b, x, y) {
    const dx = a - x;
    const dy = b - y;
    return Math.hypot(dx, dy);
  }

  function centerDraw(image, x, y, w, alpha = 1, flip = false) {
    if (!image) return;
    const h = w * image.height / image.width;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    if (flip) ctx.scale(-1, 1);
    ctx.drawImage(image, -w / 2, -h / 2, w, h);
    ctx.restore();
  }

  function initAudio() {
    if (audio) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      audio = new AC();
    } catch (_) {
      audio = null;
    }
  }

  function tone(type) {
    if (!audio) return;
    const now = audio.currentTime;
    const gain = audio.createGain();
    const osc = audio.createOscillator();
    const freqs = {
      pick: [660, 880],
      feed: [520, 780],
      clear: [660, 990],
      finish: [520, 720]
    }[type] || [500, 680];
    osc.type = type === 'feed' ? 'triangle' : 'sine';
    osc.frequency.setValueAtTime(freqs[0], now);
    osc.frequency.exponentialRampToValueAtTime(freqs[1], now + 0.12);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(type === 'finish' ? 0.09 : 0.055, now + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
    osc.connect(gain).connect(audio.destination);
    osc.start(now);
    osc.stop(now + 0.18);
  }

  function setPrompt(text, soft = false, ttl = 2.6) {
    state.promptText = text;
    state.promptTimer = ttl;
    promptEl.textContent = text;
    promptEl.classList.toggle('is-soft', !!soft);
  }

  function resetWorld() {
    state.mode = 'ready';
    state.time = 0;
    state.camera = 0;
    state.score = 0;
    state.cargo = 0;
    state.delivered = 0;
    state.friendsDone = 0;
    state.boost = 0;
    state.pointerActive = false;
    state.promptTimer = 0;
    state.promptText = '';
    state.player = { x: 190, y: 454, tx: 260, ty: 454, vx: 0, vy: 0, tilt: 0 };
    state.collectables = [];
    state.friends = friendTemplate.map((f) => ({ ...f, fed: 0, done: false, focus: 0, feedClock: 0, pulse: 0 }));
    state.bubbles = [];
    state.sparks = [];
    state.decor = [];

    foodSpots.forEach((spot, i) => {
      state.collectables.push({
        kind: 'food',
        img: i % 2 ? 'foodPellet' : 'foodBubble',
        x: spot[0],
        y: spot[1],
        r: i % 2 ? 42 : 54,
        w: i % 2 ? 58 : 76,
        taken: false,
        phase: i * 0.7
      });
    });
    bonusSpots.forEach((spot, i) => {
      state.collectables.push({
        kind: spot[0] === 'bellBubble' ? 'bell' : 'bonus',
        img: spot[0],
        x: spot[1],
        y: spot[2],
        r: spot[3] * 0.56,
        w: spot[3],
        taken: false,
        phase: 1.3 + i * 0.8
      });
    });

    for (let i = 0; i < 26; i += 1) {
      state.decor.push({
        img: i % 4 === 0 ? 'seaweed' : (i % 3 === 0 ? 'pearlShell' : 'plankton'),
        x: 340 + i * 185 + (i % 5) * 30,
        y: i % 4 === 0 ? 706 : 720 + (i % 3) * 8,
        w: i % 4 === 0 ? 58 + (i % 3) * 18 : 46 + (i % 4) * 10,
        alpha: i % 4 === 0 ? 0.72 : 0.36
      });
    }
    updateHud();
    setPrompt('ひかりのエサを あつめよう', false, 2.8);
  }

  function startGame() {
    initAudio();
    if (audio && audio.state === 'suspended') audio.resume().catch(() => {});
    resetWorld();
    state.mode = 'playing';
    startOverlay.hidden = true;
    finishOverlay.hidden = true;
    setPrompt('ひかりのエサを あつめよう', false, 2.4);
  }

  function finishGame() {
    if (state.mode === 'finish') return;
    state.mode = 'finish';
    state.score += 300;
    updateHud();
    tone('finish');
    burst(state.player.x + 60, state.player.y, 'ponoGlow', 11);
    finishText.textContent = 'スコア ' + state.score + '。海底洞窟が きらきらに なったよ。';
    setTimeout(() => {
      finishOverlay.hidden = false;
    }, 650);
    try {
      const best = Math.max(Number(localStorage.getItem('undersea_cave_best_score') || 0), state.score);
      localStorage.setItem('undersea_cave_best_score', String(best));
      localStorage.setItem('undersea_cave_cleared', '1');
    } catch (_) {}
    if (window.PonoGameStickers) {
      window.PonoGameStickers.grant({ gameId: 'undersea-cave', event: 'clear' });
    }
    var _underseaGranted = 0;
    if (window.addAcornsDaily) {
      _underseaGranted = window.addAcornsDaily('undersea-cave', 5, 5, { reason: 'undersea_cave_clear', suppressRewardModal: true }) || 0;
    }
    // Phase 2: PonoAcornModal を autoHide:0 (tap/ESC/× のみで dismiss) で表示
    if (_underseaGranted > 0 && window.PonoAcornModal) {
      try {
        var _underseaDailyTotal = (typeof window.getDailyTotalAcorns === 'function') ? window.getDailyTotalAcorns() : null;
        var _underseaDailyCap = (typeof window.getDailyTotalCap === 'function') ? window.getDailyTotalCap() : 25;
        var _underseaIsCapped = (_underseaDailyTotal != null) && (_underseaDailyTotal >= _underseaDailyCap);
        new window.PonoAcornModal({
          gameId: 'undersea-cave',
          granted: _underseaGranted,
          dailyTotal: _underseaDailyTotal,
          dailyCap: _underseaDailyCap,
          state: _underseaIsCapped ? 'capped' : 'idle',
          autoHide: 0
        }).show();
      } catch (e) { try { console.warn('[undersea-cave] PonoAcornModal show failed', e); } catch (_) {} }
    }
  }

  function updateHud() {
    cargoText.textContent = state.delivered + ' / ' + TOTAL_LIGHT;
    friendText.textContent = state.friendsDone + ' / ' + state.friends.length;
    scoreText.textContent = String(state.score);
  }

  function canvasPoint(ev) {
    const rect = canvas.getBoundingClientRect();
    const x = (ev.clientX - rect.left) / rect.width * BASE_W;
    const y = (ev.clientY - rect.top) / rect.height * BASE_H;
    return { x, y };
  }

  function setTarget(ev) {
    if (state.mode !== 'playing') return;
    const p = canvasPoint(ev);
    state.player.tx = clamp(state.camera + p.x, 90, WORLD_W - 120);
    state.player.ty = clamp(p.y, 150, 712);
  }

  function spawnBubble(x, y, scale = 1) {
    state.bubbles.push({
      x,
      y,
      vx: -24 - Math.random() * 16,
      vy: -34 - Math.random() * 32,
      r: (6 + Math.random() * 12) * scale,
      life: 1.2 + Math.random() * 0.8,
      max: 1.8
    });
  }

  function burst(x, y, imgKey, count = 8) {
    for (let i = 0; i < count; i += 1) {
      const a = Math.PI * 2 * (i / count) + Math.random() * 0.3;
      const sp = 95 + Math.random() * 135;
      state.sparks.push({
        x,
        y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 35,
        img: imgKey,
        w: 34 + Math.random() * 26,
        life: 0.8 + Math.random() * 0.35,
        max: 1.1,
        rot: Math.random() * Math.PI,
        vr: -1.5 + Math.random() * 3
      });
    }
  }

  function update(dt) {
    state.time += dt;
    state.promptTimer = Math.max(0, state.promptTimer - dt);

    if (state.mode === 'playing') {
      updatePlayer(dt);
      updateCollectables(dt);
      updateFriends(dt);
    } else if (state.mode === 'ready') {
      state.player.y = 454 + Math.sin(state.time * 1.5) * 9;
      state.player.x = 210 + Math.sin(state.time * 0.5) * 22;
      state.camera += (0 - state.camera) * Math.min(1, dt * 1.8);
    }

    state.bubbles.forEach((b) => {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.life -= dt;
    });
    state.bubbles = state.bubbles.filter((b) => b.life > 0);

    state.sparks.forEach((s) => {
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 55 * dt;
      s.rot += s.vr * dt;
      s.life -= dt;
    });
    state.sparks = state.sparks.filter((s) => s.life > 0);

    if (state.mode === 'playing' && Math.random() < dt * 4.5) {
      spawnBubble(state.player.x - 115, state.player.y + 22, 0.72);
    }
  }

  function updatePlayer(dt) {
    const p = state.player;
    if (state.keys.ArrowRight || state.keys.KeyD) p.tx += 520 * dt;
    if (state.keys.ArrowLeft || state.keys.KeyA) p.tx -= 520 * dt;
    if (state.keys.ArrowUp || state.keys.KeyW) p.ty -= 420 * dt;
    if (state.keys.ArrowDown || state.keys.KeyS) p.ty += 420 * dt;
    p.tx = clamp(p.tx, 90, WORLD_W - 120);
    p.ty = clamp(p.ty, 150, 712);

    const speed = state.boost > 0 ? 600 : 410;
    state.boost = Math.max(0, state.boost - dt);
    const dx = p.tx - p.x;
    const dy = p.ty - p.y;
    const d = Math.hypot(dx, dy);
    if (d > 2) {
      const step = Math.min(d, speed * dt);
      p.x += dx / d * step;
      p.y += dy / d * step;
    }
    p.x = clamp(p.x, 90, WORLD_W - 120);
    p.y = clamp(p.y, 150, 712);
    p.vx = dx;
    p.vy = dy;
    p.tilt += ((dy / 380) - p.tilt) * Math.min(1, dt * 6);

    const desired = clamp(p.x - BASE_W * 0.36, 0, WORLD_W - BASE_W);
    state.camera += (desired - state.camera) * Math.min(1, dt * 3.2);
  }

  function updateCollectables(dt) {
    const p = state.player;
    for (const item of state.collectables) {
      if (item.taken) continue;
      if (dist(item.x, item.y, p.x, p.y) < item.r + 56) {
        item.taken = true;
        if (item.kind === 'food') {
          state.cargo = Math.min(6, state.cargo + 1);
          state.score += 40;
          tone('pick');
          burst(item.x, item.y, 'plankton', 7);
          setPrompt('エサを のせたよ', true, 1.2);
        } else if (item.kind === 'bell') {
          state.boost = 3.2;
          state.score += 60;
          tone('pick');
          burst(item.x, item.y, 'bellBubble', 8);
          setPrompt('すいすい はやくなったよ', true, 1.4);
        } else {
          state.score += 30;
          tone('pick');
          burst(item.x, item.y, item.img, 6);
        }
        updateHud();
      }
    }
  }

  function updateFriends(dt) {
    const p = state.player;
    for (const friend of state.friends) {
      const near = dist(friend.x - 20, friend.y, p.x, p.y) < 255;
      friend.focus += ((near && !friend.done ? 1 : 0) - friend.focus) * Math.min(1, dt * 5);
      friend.pulse = Math.max(0, friend.pulse - dt);
      if (!near || friend.done) continue;

      if (state.cargo <= 0 && friend.fed < friend.need) {
        if (state.promptTimer <= 0.02) setPrompt('ひかりのエサを さがそう', false, 1.2);
        continue;
      }

      friend.feedClock += dt;
      if (friend.feedClock >= 0.42 && friend.fed < friend.need && state.cargo > 0) {
        friend.feedClock = 0;
        friend.fed += 1;
        state.cargo -= 1;
        state.delivered += 1;
        state.score += 90;
        friend.pulse = 0.45;
        tone('feed');
        burst(friend.x - 70, friend.y - 22, 'heartBubble', 7);
        setPrompt('とどいたよ', true, 1.0);
        if (friend.fed >= friend.need) {
          friend.done = true;
          state.friendsDone += 1;
          state.score += 160;
          tone('clear');
          burst(friend.x, friend.y, 'ponoGlow', 14);
          setPrompt(state.friendsDone >= state.friends.length ? 'どうくつの おくが ひかったよ' : 'つぎの ともだちへ', true, 2.0);
          if (state.friendsDone >= state.friends.length) finishGame();
        }
        updateHud();
      }
    }
  }

  function draw() {
    ctx.save();
    ctx.setTransform(canvas.width / BASE_W, 0, 0, canvas.height / BASE_H, 0, 0);
    drawScene();
    ctx.restore();
  }

  function drawScene() {
    const t = state.time;
    const cam = state.camera;
    const seaShift = Math.sin(t * 0.28) * 18;
    const grad = ctx.createLinearGradient(0, 0, 0, BASE_H);
    grad.addColorStop(0, '#91ecf7');
    grad.addColorStop(0.42, '#1788b2');
    grad.addColorStop(1, '#052d49');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, BASE_W, BASE_H);

    drawRays(t);
    drawStrip(img.bgWallFar, cam * 0.32 + seaShift, 114, 230, 0.46);
    drawStrip(img.bgWallNear, cam * 0.58, 492, 238, 0.58);
    drawDecor(cam);
    drawStrip(img.bgFloor, cam * 0.92, 708, 218, 1);
    drawStrip(img.bgCeiling, cam * 0.95, -2, 246, 1);
    drawBubbles(cam);
    drawCollectables(cam, t);
    drawFriends(cam, t);
    drawPlayer(cam, t);
    drawSparks(cam);
    drawWaterOverlay(t);
  }

  function drawStrip(image, offset, y, h, alpha) {
    if (!image) return;
    const w = image.width * (h / image.height);
    let x = -((offset % w) + w) % w;
    ctx.save();
    ctx.globalAlpha = alpha;
    for (; x < BASE_W + w; x += w) {
      ctx.drawImage(image, x, y, w, h);
    }
    ctx.restore();
  }

  function drawRays(t) {
    ctx.save();
    ctx.globalAlpha = 0.24;
    for (let i = 0; i < 7; i += 1) {
      const x = 120 + i * 235 + Math.sin(t * 0.32 + i) * 28;
      const g = ctx.createLinearGradient(x, 0, x + 120, 600);
      g.addColorStop(0, 'rgba(255, 255, 230, 0.45)');
      g.addColorStop(1, 'rgba(255, 255, 230, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + 84, 0);
      ctx.lineTo(x + 270, BASE_H);
      ctx.lineTo(x - 80, BASE_H);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawDecor(cam) {
    for (const d of state.decor) {
      const sx = d.x - cam;
      if (sx < -120 || sx > BASE_W + 120) continue;
      centerDraw(img[d.img], sx, d.y, d.w, d.alpha);
    }
  }

  function drawBubbles(cam) {
    ctx.save();
    ctx.strokeStyle = 'rgba(224, 252, 255, 0.65)';
    ctx.lineWidth = 2;
    for (const b of state.bubbles) {
      const sx = b.x - cam;
      const alpha = clamp(b.life / b.max, 0, 1);
      ctx.globalAlpha = alpha * 0.75;
      ctx.beginPath();
      ctx.arc(sx, b.y, b.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = alpha * 0.28;
      ctx.fillStyle = '#ffffff';
      ctx.fill();
    }
    ctx.restore();
  }

  function drawCollectables(cam, t) {
    for (const item of state.collectables) {
      if (item.taken) continue;
      const sx = item.x - cam;
      if (sx < -150 || sx > BASE_W + 150) continue;
      const bob = Math.sin(t * 2.2 + item.phase) * 10;
      const glow = 0.68 + Math.sin(t * 4 + item.phase) * 0.14;
      ctx.save();
      ctx.translate(sx, item.y + bob);
      ctx.globalAlpha = 0.38 * glow;
      ctx.fillStyle = item.kind === 'food' ? '#fff8a8' : '#b7fff3';
      ctx.beginPath();
      ctx.arc(0, 0, item.w * 0.56, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.rotate(Math.sin(t + item.phase) * 0.08);
      ctx.drawImage(img[item.img], -item.w / 2, -item.w * img[item.img].height / img[item.img].width / 2, item.w, item.w * img[item.img].height / img[item.img].width);
      ctx.restore();
    }
  }

  function drawFriends(cam, t) {
    for (const friend of state.friends) {
      const sx = friend.x - cam;
      if (sx < -520 || sx > BASE_W + 520) continue;
      const key = friend.done ? friend.happy : (friend.focus > 0.35 ? friend.active : friend.normal);
      const wave = Math.sin(t * 1.1 + friend.x * 0.01) * 9;
      const pulse = friend.pulse > 0 ? 1 + Math.sin(friend.pulse * 24) * 0.035 : 1;
      ctx.save();
      ctx.translate(sx, friend.y + wave);
      ctx.scale(pulse, pulse);
      centerDraw(img[key], 0, 0, friend.w, 1);
      if (!friend.done) {
        const needLeft = friend.need - friend.fed;
        const ringAlpha = 0.35 + friend.focus * 0.45;
        ctx.globalAlpha = ringAlpha;
        ctx.strokeStyle = '#fff2a8';
        ctx.lineWidth = 5;
        ctx.setLineDash([12, 10]);
        ctx.beginPath();
        ctx.ellipse(-24, -8, friend.w * 0.45, friend.w * 0.25, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 0.92;
        ctx.fillStyle = 'rgba(255, 250, 217, 0.9)';
        ctx.strokeStyle = 'rgba(18, 76, 101, 0.18)';
        roundRect(-82, friend.w * 0.28, 164, 40, 8);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#0c5271';
        ctx.font = '900 24px Zen Maru Gothic, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('あと ' + needLeft, 0, friend.w * 0.28 + 21);
      } else {
        ctx.globalAlpha = 0.78;
        centerDraw(img.heartBubble, -friend.w * 0.24, -friend.w * 0.32, 72, 1);
      }
      ctx.restore();
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
  }

  function drawPlayer(cam, t) {
    const p = state.player;
    const sx = p.x - cam;
    const sy = p.y;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(clamp(p.tilt, -0.22, 0.22));
    const glow = state.boost > 0 ? 0.55 + Math.sin(t * 12) * 0.12 : 0.2;
    ctx.globalAlpha = glow;
    ctx.fillStyle = '#fff4a8';
    ctx.beginPath();
    ctx.ellipse(-10, 0, 118, 72, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.drawImage(img.submarine, -116, -78, 232, 156);
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = '#001a2b';
    ctx.beginPath();
    ctx.ellipse(sx - 10, 748, 120, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawSparks(cam) {
    for (const s of state.sparks) {
      const sx = s.x - cam;
      if (sx < -120 || sx > BASE_W + 120) continue;
      const a = clamp(s.life / s.max, 0, 1);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(sx, s.y);
      ctx.rotate(s.rot);
      const image = img[s.img];
      const h = s.w * image.height / image.width;
      ctx.drawImage(image, -s.w / 2, -h / 2, s.w, h);
      ctx.restore();
    }
  }

  function drawWaterOverlay(t) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 0.08;
    for (let y = 70; y < BASE_H; y += 58) {
      ctx.fillStyle = '#d8ffff';
      ctx.beginPath();
      for (let x = -40; x <= BASE_W + 40; x += 40) {
        const yy = y + Math.sin(x * 0.015 + t * 1.4 + y) * 5;
        if (x === -40) ctx.moveTo(x, yy);
        else ctx.lineTo(x, yy);
      }
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#d8ffff';
      ctx.stroke();
    }
    ctx.restore();
  }

  window.addEventListener('resize', resize);
  canvas.addEventListener('pointerdown', (ev) => {
    state.pointerActive = true;
    canvas.setPointerCapture(ev.pointerId);
    setTarget(ev);
  });
  canvas.addEventListener('pointermove', (ev) => {
    if (state.pointerActive) setTarget(ev);
  });
  canvas.addEventListener('pointerup', (ev) => {
    state.pointerActive = false;
    try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
  });
  canvas.addEventListener('pointercancel', () => {
    state.pointerActive = false;
  });
  window.addEventListener('keydown', (ev) => {
    state.keys[ev.code] = true;
  });
  window.addEventListener('keyup', (ev) => {
    state.keys[ev.code] = false;
  });

  startBtn.addEventListener('click', startGame);
  againBtn.addEventListener('click', startGame);
  homeBtn.addEventListener('click', () => {
    location.href = '../play.html';
  });

  function frame(now) {
    if (!lastTime) lastTime = now;
    const dt = Math.min(0.033, (now - lastTime) / 1000);
    lastTime = now;
    if (ready) {
      update(dt);
      draw();
    }
    requestAnimationFrame(frame);
  }

  Promise.all(Object.entries(ASSETS).map(([key, src]) => loadImage(src).then((image) => { img[key] = image; })))
    .then(() => {
      ready = true;
      loading.hidden = true;
      resize();
      resetWorld();
      window.__underseaCaveState = state;
      requestAnimationFrame(frame);
    })
    .catch((err) => {
      loading.textContent = 'よみこみで とまりました';
      console.error(err);
    });
})();
</script>
<script>
(function () {
  function regCapture() {
    if (!window.PonoCapture) return;
    window.PonoCapture.register({
      gameId: 'undersea-cave',
      build: function () {
        return document.getElementById('gameCanvas');
      }
    });
  }
  if (window.PonoCapture) regCapture();
  else window.addEventListener('DOMContentLoaded', regCapture, { once: true });
})();
</script>
