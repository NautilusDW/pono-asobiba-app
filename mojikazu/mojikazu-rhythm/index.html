<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>もじかず リズム</title>
<style>
:root{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;color:#fff}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{background:linear-gradient(150deg,#542b83,#166b86);font-weight:900}button,a{font:inherit}.shell{height:100dvh;display:grid;grid-template-rows:auto 1fr auto;gap:7px;padding:8px 12px}.top{display:grid;grid-template-columns:125px 1fr 125px;align-items:center;text-align:center}.top h1{margin:0;color:#ffe36b;text-shadow:0 3px #57265f;font-size:clamp(1.3rem,4vw,2.2rem)}.back,.mode{min-height:48px;border:3px solid #fff;border-radius:16px;background:#75e1c2;color:#193a5b;text-decoration:none;display:grid;place-items:center;box-shadow:0 5px #193d63;cursor:pointer}.mode{background:#fff0cf}.lane{position:relative;overflow:hidden;border:4px solid #fff;border-radius:24px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 60px,rgba(255,255,255,.09) 60px 62px)}.zone{position:absolute;z-index:2;left:50%;top:7%;bottom:7%;width:23%;transform:translateX(-50%);border:5px dashed #ffe36b;border-radius:28px;background:rgba(255,227,107,.13);display:grid;place-items:center;color:#ffe36b;font-size:clamp(1rem,3vw,1.5rem)}.note{position:absolute;z-index:3;left:-85px;top:50%;width:74px;height:74px;border:4px solid #fff;border-radius:50%;background:var(--c);color:#183855;font-size:2.2rem;font-weight:1000;box-shadow:0 7px #172f54;display:grid;place-items:center;animation:move 4s linear forwards}.note.hit{animation-play-state:paused;opacity:0;transform:scale(1.8);transition:.3s}.tap{justify-self:center;width:min(78vw,430px);min-height:64px;border:4px solid #fff;border-radius:24px;background:#ff8178;color:#fff;font-size:clamp(1.3rem,4vw,2rem);font-weight:1000;box-shadow:0 7px #8c3857;cursor:pointer}.status{position:absolute;z-index:6;left:50%;bottom:10px;transform:translateX(-50%);white-space:nowrap}@keyframes move{to{left:calc(100% + 10px)}}.portrait{display:none;position:fixed;inset:0;z-index:20;background:#31245d;place-content:center;text-align:center;font-size:1.5rem}@media(orientation:portrait) and (max-width:700px){.portrait{display:grid}}@media(max-height:430px){.top{grid-template-columns:100px 1fr 100px}.back,.mode{min-height:42px}.tap{min-height:52px}.note{width:62px;height:62px;font-size:1.8rem}}@media(prefers-reduced-motion:reduce){.note{animation-duration:7s}}button:focus-visible,a:focus-visible{outline:4px solid #fff;outline-offset:2px}
</style></head><body><main class="shell"><header class="top"><a class="back" href="../">‹ もどる</a><h1>もじかず リズム</h1><button class="mode" id="mode">いまは すうじ</button></header><section class="lane" id="lane"><div class="zone">ここで タッチ！</div><div class="status" id="status" aria-live="polite">ながれてきたら おしてね</div></section><button class="tap" id="tap">♪ タッチ ♪</button></main><aside class="portrait"><p>よこむきに してね ↻</p></aside>
<script>
"use strict";const lane=document.querySelector("#lane"),status=document.querySelector("#status"),modeBtn=document.querySelector("#mode");let letters=false,timer,current=null,index=0;const sets=[["1","2","3"],["あ","い","う"]];
function spawn(){if(current)current.remove();const n=document.createElement("div");n.className="note";n.textContent=sets[letters?1:0][index++%3];n.style.setProperty("--c",["#ff847b","#ffe06c","#78e0c4"][index%3]);lane.append(n);current=n;n.addEventListener("animationend",()=>{status.textContent="だいじょうぶ！ つぎが くるよ";setTimeout(spawn,350)})}
function tap(){if(!current)return;const lr=lane.getBoundingClientRect(),r=current.getBoundingClientRect(),center=r.left+r.width/2,p=(center-lr.left)/lr.width;current.classList.add("hit");status.textContent=p>.28&&p<.72?"いい リズム！":"おせたね！";setTimeout(spawn,350)}
document.querySelector("#tap").onclick=tap;modeBtn.onclick=()=>{letters=!letters;modeBtn.textContent=letters?"いまは もじ":"いまは すうじ";index=0;status.textContent="ながれてきたら おしてね";spawn()};document.addEventListener("keydown",e=>{if([" ","Enter"].includes(e.key)){e.preventDefault();tap()}if(e.key==="m")modeBtn.click()});spawn();
</script></body></html>
