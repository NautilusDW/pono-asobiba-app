<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>どれが かわった？</title><style>
*{box-sizing:border-box}[hidden]{display:none!important}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;background:linear-gradient(#91dcf0,#d7f2af);color:#49351f;user-select:none}button,a{font:inherit}button:focus-visible,a:focus-visible{outline:5px solid #ffe63d;outline-offset:3px}.game{height:100dvh}.top{height:64px;display:grid;grid-template-columns:130px 1fr 52px;align-items:center;padding:6px 14px;background:#fff9e9ee}.top h1{margin:0;text-align:center;font-size:clamp(20px,5vh,34px)}.back,.help{min-height:46px;border:0;border-radius:15px;color:#fff;background:#338dc1;font-weight:900;text-decoration:none;display:grid;place-items:center}.help{background:#e7862a;font-size:25px}.play{height:calc(100% - 64px);display:grid;grid-template-rows:auto 1fr auto;gap:10px;padding:2vh 6vw 4vh}.prompt{text-align:center;font-weight:900;font-size:clamp(21px,6vh,38px)}.cards{display:flex;align-items:center;justify-content:center;gap:2vw}.card{width:clamp(120px,18vw,230px);height:clamp(120px,34vh,230px);border:7px solid #fff;border-radius:30px;background:#fbf1b6;box-shadow:0 8px #ad8c46;font-size:clamp(65px,20vh,140px);font-weight:900;color:#5b467d}.card.changed{background:#f0a675}.start{justify-self:center;min-width:240px;min-height:60px;border:5px solid #fff;border-radius:22px;background:#e65f51;color:#fff;box-shadow:0 7px #a33d34;font-size:23px;font-weight:900}.curtain{position:absolute;inset:64px 0 0;background:#774a91;display:grid;place-items:center;color:#fff;font-size:clamp(35px,10vh,70px);font-weight:900;z-index:4}.curtain:before,.curtain:after{content:"";position:absolute;top:0;bottom:0;width:48%;background:repeating-linear-gradient(90deg,#8e56aa 0 35px,#75438f 35px 70px)}.curtain:before{left:0}.curtain:after{right:0}.curtain span{z-index:1}.portrait{display:none}@media(orientation:portrait) and (max-width:700px){.game{display:none}.portrait{height:100dvh;display:grid;place-items:center;text-align:center;background:#91dcf0;font-size:28px;font-weight:900}}@media(max-height:420px){.top{height:54px}.play{height:calc(100% - 54px);padding:1vh 6vw 2vh}.card{height:175px}.curtain{inset:54px 0 0}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style></head><body><div class="portrait">📱↻<br>よこに してね</div><main class="game"><header class="top"><a class="back" href="../">← もどる</a><h1>どれが かわった？</h1><span></span></header><section class="play"><div class="prompt" id="prompt">よく おぼえてね！</div><div class="cards" id="cards"></div><button class="start" id="start" type="button">おぼえた！</button></section><div class="curtain" id="curtain" hidden><span>どれが かわるかな？</span></div></main><script>
(()=>{'use strict';const sets=[['あ','い','う','え'],['1','2','3','4'],['🐱','🐰','🐻','🦊']];let round=0,changed=-1,answer='';const cards=document.querySelector('#cards'),prompt=document.querySelector('#prompt'),start=document.querySelector('#start'),curtain=document.querySelector('#curtain');function build(){const set=sets[round%sets.length];cards.replaceChildren();set.forEach((x,i)=>{const b=document.createElement('button');b.type='button';b.className='card';b.textContent=x;b.disabled=true;b.onclick=()=>pick(i,b);cards.append(b)});prompt.textContent='よく おぼえてね！';start.hidden=false;start.focus()}function begin(){start.hidden=true;curtain.hidden=false;setTimeout(()=>{const set=sets[round%sets.length];changed=Math.floor(Math.random()*set.length);answer=set[changed];const replacements=['お','7','🐼'];cards.children[changed].textContent=replacements[round%replacements.length];[...cards.children].forEach(b=>b.disabled=false);curtain.hidden=true;prompt.textContent='どれが かわった？';cards.children[0].focus()},900)}function pick(i,b){if(i!==changed){prompt.textContent='だいじょうぶ！ よく みてね';return}b.classList.add('changed');b.textContent=answer+' → '+b.textContent;prompt.textContent='みつけた！';[...cards.children].forEach(x=>x.disabled=true);setTimeout(()=>{round++;build()},1100)}start.onclick=begin;build()})();
</script></body></html>
