<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>すうじメテオ</title>
<style>
:root{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;color:#fff}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{background:radial-gradient(circle at 50% 110%,#563775,#111c48 60%,#07112e);font-weight:900}button,a{font:inherit}.shell{height:100dvh;display:grid;grid-template-rows:auto 1fr auto;gap:6px;padding:8px 12px}.top{display:grid;grid-template-columns:125px 1fr 125px;align-items:center;text-align:center}.top h1{margin:0;color:#ffe66d;text-shadow:0 3px #8a3c75;font-size:clamp(1.3rem,4vw,2.2rem)}.back,.again{min-height:48px;border:3px solid #fff;border-radius:16px;background:#77e3cb;color:#163254;text-decoration:none;display:grid;place-items:center;box-shadow:0 5px #143d61;cursor:pointer}.again{background:#fff1cf}.sky{position:relative;overflow:hidden;border:4px solid #8bc8ff;border-radius:24px;background:radial-gradient(circle at 15% 20%,#fff 0 2px,transparent 3px),radial-gradient(circle at 72% 38%,#fff 0 2px,transparent 3px),linear-gradient(#101b4d,#283a76);background-size:90px 90px,130px 130px,auto}.next{position:absolute;z-index:4;left:50%;top:8px;transform:translateX(-50%);padding:6px 18px;border:3px solid #fff;border-radius:18px;background:#ffe66d;color:#263761;font-size:clamp(1rem,3vw,1.5rem)}.meteor{position:absolute;top:55px;width:68px;height:68px;border:3px solid #fff;border-radius:50%;background:var(--c);box-shadow:0 0 18px var(--c);color:#1a2b53;font-size:2rem;font-weight:1000;cursor:pointer;animation:fall var(--speed) linear infinite;animation-delay:var(--delay);touch-action:manipulation}.meteor::before{content:"";position:absolute;right:48px;top:20px;width:55px;height:20px;border-radius:50%;background:linear-gradient(90deg,transparent,var(--c))}.meteor.star{animation:none;pointer-events:none;background:transparent;border:0;color:#ffe66d;box-shadow:none;font-size:3rem}.meteor.star::before{display:none}.status{text-align:center;min-height:24px}.portrait{display:none;position:fixed;inset:0;z-index:30;background:#111c48;place-content:center;text-align:center;font-size:1.5rem}@keyframes fall{to{transform:translateY(calc(100vh - 200px)) rotate(10deg)}}@media(orientation:portrait) and (max-width:700px){.portrait{display:grid}}@media(max-height:430px){.top{grid-template-columns:100px 1fr 100px}.back,.again{min-height:42px}.meteor{width:58px;height:58px;font-size:1.65rem}}@media(prefers-reduced-motion:reduce){.meteor{animation-duration:16s}.meteor::before{display:none}}button:focus-visible,a:focus-visible{outline:4px solid #fff;outline-offset:2px}
</style></head><body><main class="shell"><header class="top"><a class="back" href="../">‹ もどる</a><h1>すうじメテオ</h1><button class="again" id="again">もういちど</button></header><section class="sky" id="sky"><div class="next">つぎは <strong id="next">1</strong></div></section><div class="status" id="status" aria-live="polite">1から じゅんばんに タッチ！</div></main><aside class="portrait"><p>よこむきに してね ↻</p></aside>
<script>
"use strict";const sky=document.querySelector("#sky"),next=document.querySelector("#next"),status=document.querySelector("#status");let wanted=1;
function start(){wanted=1;next.textContent=wanted;status.textContent="1から じゅんばんに タッチ！";sky.querySelectorAll(".meteor").forEach(x=>x.remove());[...Array(10)].map((_,i)=>i+1).sort(()=>Math.random()-.5).forEach((n,i)=>{const b=document.createElement("button");b.type="button";b.className="meteor";b.textContent=n;b.dataset.n=n;b.setAttribute("aria-label",`すうじの ${n}`);b.style.left=`${5+(i%10)*9}%`;b.style.setProperty("--c",["#ff8a78","#ffe06a","#7be1c4","#8fc8ff"][i%4]);b.style.setProperty("--speed",`${8+i%3}s`);b.style.setProperty("--delay",`${-i*.7}s`);b.onclick=()=>hit(b,n);b.onanimationiteration=()=>{b.style.left=`${4+Math.random()*88}%`};sky.append(b)})}
function hit(b,n){if(n!==wanted){status.textContent=`${wanted}を さがしてね`;return}b.classList.add("star");b.textContent="★";b.setAttribute("aria-label","みつけた");wanted++;if(wanted>10){next.textContent="★";status.textContent="できた！ ほしが いっぱい！";setTimeout(start,1200)}else{next.textContent=wanted;status.textContent=`つぎは ${wanted}`}}
document.querySelector("#again").onclick=start;document.addEventListener("keydown",e=>{if(/^[0-9]$/.test(e.key)){const n=Number(e.key)||10,el=sky.querySelector(`[data-n="${n}"]:not(.star)`);if(el)hit(el,n)}if(e.key==="r")start()});start();
</script></body></html>
