<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#15345d">
  <title>じゅんばんタッチ</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="game-shell">
    <header class="topbar">
      <a class="back-button" href="../index.html" aria-label="もどる">‹ <span>もどる</span></a>
      <div class="title-wrap">
        <h1>じゅんばんタッチ</h1>
        <p id="instruction">1から じゅんばんに タッチ！</p>
      </div>
      <button class="new-button" id="newGameButton" type="button">もういちど</button>
    </header>

    <section class="difficulty" aria-label="むずかしさ">
      <span>どこまで？</span>
      <div class="difficulty-buttons">
        <button type="button" data-limit="5" aria-pressed="true">★ 5</button>
        <button type="button" data-limit="10" aria-pressed="false">🐟 10</button>
        <button type="button" data-limit="20" aria-pressed="false">ランダム 20</button>
      </div>
    </section>

    <section class="play-area" id="playArea" aria-label="すうじを じゅんばんに おす ばしょ">
      <svg class="trail" id="trail" aria-hidden="true"></svg>
      <div class="number-board" id="numberBoard"></div>
      <div class="goal-badge" id="goalBadge" aria-live="polite">
        <small>つぎは</small>
        <strong id="nextNumber">1</strong>
      </div>
      <div class="celebration" id="celebration" hidden>
        <div class="celebration-stars" aria-hidden="true">★　★　★</div>
        <p id="finishMessage">できた！</p>
        <button type="button" id="playAgainButton">もういちど</button>
      </div>
    </section>

    <p class="keyboard-help">キーボードでも すうじを おせるよ</p>
  </main>

  <aside class="portrait-guide" aria-label="よこむきの おねがい">
    <div class="phone-icon" aria-hidden="true">↻</div>
    <p>よこむきに してね</p>
  </aside>

  <script src="./game.js"></script>
</body>
</html>
