<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>もじの かたちあわせ</title><style>
*{box-sizing:border-box}[hidden]{display:none!important}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;background:linear-gradient(135deg,#c8f4ec,#ffe6a8);color:#49351f;user-select:none}button,a{font:inherit}button:focus-visible,a:focus-visible{outline:5px solid #ffdc39;outline-offset:3px}.game{height:100dvh}.top{height:64px;display:grid;grid-template-columns:130px 1fr 52px;align-items:center;padding:6px 14px;background:#fffdf0dd}.top h1{margin:0;text-align:center;font-size:clamp(20px,5vh,34px)}.back,.help{min-height:46px;border:0;border-radius:15px;color:#fff;background:#338dc1;font-weight:900;text-decoration:none;display:grid;place-items:center}.help{background:#e98927;font-size:25px}.play{height:calc(100% - 64px);display:grid;grid-template-columns:42% 1fr;align-items:center;gap:4vw;padding:3vh 5vw}.target{text-align:center}.target p,.choices-label{font-size:clamp(18px,4vh,28px);font-weight:900;margin:0 0 8px}.shadow{width:min(28vw,250px);height:min(28vw,250px);margin:auto;display:grid;place-items:center;border:8px dashed #8b72bb;border-radius:40px;background:#fff8;font-size:clamp(110px,30vh,220px);font-weight:900;color:transparent;-webkit-text-stroke:8px #9e8dbb}.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:2vw}.choice{min-height:clamp(120px,38vh,245px);border:7px solid #fff;border-radius:30px;background:#ef6c59;color:#fff;box-shadow:0 8px #a74639;font-size:clamp(70px,24vh,170px);font-weight:900}.choice:nth-child(2){background:#499dcb;box-shadow:0 8px #2c6d94}.choice:nth-child(3){background:#78af4e;box-shadow:0 8px #4c792f}.choice.wrong{animation:wiggle .35s}.choice.right{transform:scale(.9);background:#f1b435}.status{position:absolute;left:0;right:0;bottom:2vh;text-align:center;font-weight:900;font-size:clamp(18px,4vh,28px)}@keyframes wiggle{25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}.portrait{display:none}@media(orientation:portrait) and (max-width:700px){.game{display:none}.portrait{height:100dvh;display:grid;place-items:center;text-align:center;background:#c8f4ec;font-size:28px;font-weight:900}}@media(max-height:420px){.top{height:54px}.play{height:calc(100% - 54px);padding:2vh 5vw}.shadow{width:190px;height:190px}.choice{min-height:175px}.status{bottom:1px}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style></head><body><div class="portrait">📱↻<br>よこに してね</div><main class="game"><header class="top"><a class="back" href="../">← もどる</a><h1>もじの かたちあわせ</h1><span></span></header><section class="play"><div class="target"><p>この かたちは どれ？</p><div class="shadow" id="shadow">あ</div></div><div><p class="choices-label">おなじ もじを タッチ！</p><div class="choices" id="choices"></div></div><div class="status" id="status" aria-live="polite">よく みてね</div></section></main><script>
(()=>{'use strict';const rounds=[['あ','お','め'],['さ','き','ち'],['る','ろ','つ'],['ぬ','ね','れ']];let n=0;const shadow=document.querySelector('#shadow'),choices=document.querySelector('#choices'),status=document.querySelector('#status');function shuffle(a){return [...a].sort(()=>Math.random()-.5)}function build(){const r=rounds[n%rounds.length];shadow.textContent=r[0];choices.replaceChildren();shuffle(r).forEach(x=>{const b=document.createElement('button');b.className='choice';b.type='button';b.textContent=x;b.setAttribute('aria-label',`${x}`);b.onclick=()=>pick(b,x,r[0]);choices.append(b)});status.textContent='よく みてね';choices.querySelector('button').focus()}function pick(b,x,a){if(x!==a){b.classList.remove('wrong');void b.offsetWidth;b.classList.add('wrong');status.textContent='だいじょうぶ！ もういちど';return}b.classList.add('right');status.textContent=`${a}！ ぴったり！`;setTimeout(()=>{n++;build()},700)}build()})();
</script></body></html>
