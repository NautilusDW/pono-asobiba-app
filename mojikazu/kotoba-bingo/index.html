<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>ことば ビンゴ</title><style>
*{box-sizing:border-box}[hidden]{display:none!important}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;background:radial-gradient(circle at 20% 20%,#fff2a5,#f7a56e);color:#50331f;user-select:none}button,a{font:inherit}button:focus-visible,a:focus-visible{outline:5px solid #ffe52f;outline-offset:3px}.game{height:100dvh}.top{height:64px;display:grid;grid-template-columns:130px 1fr 52px;align-items:center;padding:6px 14px;background:#fff9e8e8}.top h1{margin:0;text-align:center;font-size:clamp(20px,5vh,34px)}.back,.help{min-height:46px;border:0;border-radius:15px;color:#fff;background:#338dc1;font-weight:900;text-decoration:none;display:grid;place-items:center}.help{background:#8a65bd;font-size:25px}.play{height:calc(100% - 64px);display:grid;grid-template-columns:35% 1fr;align-items:center;gap:4vw;padding:3vh 7vw}.call{text-align:center;font-weight:900}.call div{font-size:clamp(55px,17vh,120px)}.call p{margin:5px;font-size:clamp(22px,6vh,40px)}.board{display:grid;grid-template-columns:repeat(2,minmax(130px,260px));gap:14px;justify-content:center}.cell{min-height:clamp(110px,27vh,190px);border:7px solid #fff;border-radius:28px;background:#43a5cc;color:#fff;box-shadow:0 7px #276f92;font-weight:900}.cell .pic{display:block;font-size:clamp(48px,13vh,92px)}.cell .name{display:block;font-size:clamp(18px,4vh,28px)}.cell.open{background:#75bd53;box-shadow:0 7px #477f34}.cell.wrong{animation:wiggle .35s}.win{position:absolute;inset:64px 0 0;display:grid;place-items:center;text-align:center;background:#79d9ed}.win h2{font-size:clamp(45px,13vh,90px);margin:5px}.win button{min-height:60px;padding:8px 30px;border:5px solid #fff;border-radius:20px;background:#e75e50;color:#fff;font-size:24px;font-weight:900}@keyframes wiggle{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}.portrait{display:none}@media(orientation:portrait) and (max-width:700px){.game{display:none}.portrait{height:100dvh;display:grid;place-items:center;text-align:center;background:#fff2a5;font-size:28px;font-weight:900}}@media(max-height:420px){.top{height:54px}.play{height:calc(100% - 54px);padding:2vh 7vw}.cell{min-height:130px}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style></head><body><div class="portrait">📱↻<br>よこに してね</div><main class="game"><header class="top"><a class="back" href="../">← もどる</a><h1>ことば ビンゴ</h1><span></span></header><section class="play"><div class="call"><div>🎯</div><p id="call">「か」で<br>はじまる ことば</p></div><div class="board" id="board"></div></section><section class="win" id="win" hidden><div><div style="font-size:80px">🎉⭐🎉</div><h2>ビンゴ！</h2><button id="again" type="button">もういちど</button></div></section></main><script>
(()=>{'use strict';const items=[{pic:'🐢',name:'かめ',start:'か',len:2},{pic:'🍛',name:'カレー',start:'か',len:3},{pic:'🐱',name:'ねこ',start:'ね',len:2},{pic:'🚗',name:'くるま',start:'く',len:3}];const calls=[{text:'「か」で<br>はじまる ことば',ok:x=>x.start==='か'},{text:'3もじの<br>ことば',ok:x=>x.len===3},{text:'2もじの<br>ことば',ok:x=>x.len===2}];let turn=0,open=new Set();const board=document.querySelector('#board'),call=document.querySelector('#call'),win=document.querySelector('#win');function nextCall(){turn=calls.findIndex(c=>items.some((x,i)=>!open.has(i)&&c.ok(x)));call.innerHTML=calls[turn].text}function build(){board.replaceChildren();items.forEach((x,i)=>{const b=document.createElement('button');b.type='button';b.className='cell';b.innerHTML=`<span class="pic">${x.pic}</span><span class="name">${x.name}</span>`;b.onclick=()=>pick(b,x,i);board.append(b)});open.clear();nextCall();board.querySelector('button').focus()}function pick(b,x,i){if(open.has(i))return;if(!calls[turn].ok(x)){b.classList.remove('wrong');void b.offsetWidth;b.classList.add('wrong');call.innerHTML='だいじょうぶ！<br>'+calls[turn].text;return}open.add(i);b.classList.add('open');b.textContent='⭐';if(open.size===4){setTimeout(()=>{win.hidden=false;document.querySelector('#again').focus()},500);return}nextCall()}document.querySelector('#again').onclick=()=>{win.hidden=true;build()};build()})();
</script></body></html>
