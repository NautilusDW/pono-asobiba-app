<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>もじかず ダンジョン</title><style>
*{box-sizing:border-box}[hidden]{display:none!important}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;background:#243652;color:#fff;user-select:none}button,a{font:inherit}button:focus-visible,a:focus-visible{outline:5px solid #ffe23d;outline-offset:3px}.game{height:100dvh;background:radial-gradient(circle at 50% 60%,#556b75,#17263d 70%)}.top{height:64px;display:grid;grid-template-columns:130px 1fr 150px;align-items:center;padding:6px 14px;background:#111c30dd}.top h1{margin:0;text-align:center;font-size:clamp(20px,5vh,34px)}.back{min-height:46px;border-radius:15px;color:#fff;background:#338dc1;font-weight:900;text-decoration:none;display:grid;place-items:center}.steps{text-align:center;font-size:clamp(16px,3.5vh,23px);font-weight:900}.room{height:calc(100% - 64px);display:grid;grid-template-columns:38% 1fr;align-items:center;gap:4vw;padding:3vh 7vw}.door{width:min(29vw,260px);height:min(54vh,330px);margin:auto;display:grid;place-items:center;border:12px solid #80624a;border-radius:120px 120px 18px 18px;background:#463526;font-size:clamp(60px,19vh,130px);box-shadow:inset 0 0 0 7px #b99562}.challenge{text-align:center}.challenge h2{font-size:clamp(24px,7vh,45px);margin:0 0 2vh}.answers{display:flex;justify-content:center;gap:2vw}.answers button{min-width:clamp(100px,16vw,180px);min-height:clamp(90px,24vh,150px);border:7px solid #fff;border-radius:28px;background:#e16655;color:#fff;box-shadow:0 8px #923d35;font-size:clamp(35px,11vh,75px);font-weight:900}.answers button:nth-child(2){background:#399bc6;box-shadow:0 8px #246785}.answers button:nth-child(3){background:#72ae4e;box-shadow:0 8px #477530}.feedback{min-height:38px;margin-top:12px;font-size:clamp(18px,4vh,27px);font-weight:900}.treasure{position:absolute;inset:64px 0 0;display:grid;place-items:center;text-align:center;background:radial-gradient(#ffe88b,#e69b38)}.treasure h2{font-size:clamp(40px,12vh,82px);margin:0;color:#50331f}.treasure button{min-height:58px;padding:8px 30px;border:5px solid #fff;border-radius:20px;background:#7b60ba;color:#fff;font-size:22px;font-weight:900}.portrait{display:none}@media(orientation:portrait) and (max-width:700px){.game{display:none}.portrait{height:100dvh;display:grid;place-items:center;text-align:center;background:#243652;font-size:28px;font-weight:900}}@media(max-height:420px){.top{height:54px}.room{height:calc(100% - 54px);padding:2vh 7vw}.door{height:250px}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style></head><body><div class="portrait">📱↻<br>よこに してね</div><main class="game"><header class="top"><a class="back" href="../">← もどる</a><h1>もじかず ダンジョン</h1><div class="steps" id="steps">🚪○○</div></header><section class="room"><div class="door" id="door">🔒</div><div class="challenge"><h2 id="question"></h2><div class="answers" id="answers"></div><div class="feedback" id="feedback" aria-live="polite">こたえを タッチ！</div></div></section><section class="treasure" id="treasure" hidden><div><div style="font-size:100px">🎁✨</div><h2>たからばこ みつけた！</h2><button id="again" type="button">もういちど</button></div></section></main><script>
(()=>{'use strict';const rooms=[{q:'1、2、つぎは？',a:'3',c:['4','3','5']},{q:'ねこの はじめの もじは？',a:'ね',c:['こ','ぬ','ね']},{q:'🍎 🍎 🍎　いくつ？',a:'3',c:['2','4','3']}];let n=0;const q=document.querySelector('#question'),answers=document.querySelector('#answers'),feedback=document.querySelector('#feedback'),door=document.querySelector('#door'),steps=document.querySelector('#steps'),treasure=document.querySelector('#treasure');function build(){const r=rooms[n];q.textContent=r.q;answers.replaceChildren();r.c.forEach(x=>{const b=document.createElement('button');b.type='button';b.textContent=x;b.onclick=()=>pick(x);answers.append(b)});door.textContent='🔒';steps.textContent='🚪'.repeat(n)+'○'.repeat(3-n);feedback.textContent='こたえを タッチ！';answers.querySelector('button').focus()}function pick(x){if(x!==rooms[n].a){feedback.textContent='だいじょうぶ！ もういちど';return}door.textContent='🚪';feedback.textContent='ひらいた！';setTimeout(()=>{n++;if(n===rooms.length){treasure.hidden=false;document.querySelector('#again').focus()}else build()},650)}document.querySelector('#again').onclick=()=>{n=0;treasure.hidden=true;build()};build()})();
</script></body></html>
