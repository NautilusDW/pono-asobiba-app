<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>もじを はこぶ アリさん</title>
  <style>
    :root{color-scheme:light;--ink:#49351f}*{box-sizing:border-box}[hidden]{display:none!important}html,body{width:100%;height:100%;margin:0;overflow:hidden}body{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;color:var(--ink);background:linear-gradient(#8ddcf1 0 55%,#9bd36d 55%);user-select:none;touch-action:manipulation}button,a{font:inherit}button:focus-visible,a:focus-visible{outline:5px solid #fff45b;outline-offset:3px}.game{height:100dvh;min-height:320px}.top{height:64px;display:grid;grid-template-columns:130px 1fr 52px;align-items:center;padding:6px 14px;background:#fff8e9ee}.top h1{margin:0;text-align:center;font-size:clamp(20px,5vh,34px)}.back,.help{min-height:46px;border:0;border-radius:15px;color:#fff;font-weight:900;text-decoration:none;display:grid;place-items:center;background:#258dc2}.help{background:#ef8c28;font-size:25px}.play{height:calc(100% - 64px);display:grid;grid-template-rows:auto 1fr auto;gap:7px;padding:8px 4vw 14px}.prompt{text-align:center;font-weight:900;font-size:clamp(18px,4.6vh,30px)}.scene{position:relative;min-height:0;background:#efd393;border:5px solid #fff1b9;border-radius:30px;overflow:hidden}.path{position:absolute;left:8%;right:8%;top:48%;height:16px;background:#9b6b3d;border-radius:20px}.ant{position:absolute;left:8%;top:calc(48% - 60px);font-size:clamp(42px,11vh,74px);transition:transform 1.1s ease}.ant b{display:inline-grid;place-items:center;width:1.25em;height:1.25em;border-radius:18px;background:#fff;color:#ce4f44;font-size:.65em}.nest{position:absolute;right:4%;width:25%;min-height:38%;display:grid;place-items:center;border:5px solid #fff;border-radius:24px;background:#d08b47;color:#fff;font-weight:900;font-size:clamp(18px,4vh,28px)}.nest.good{top:4%}.nest.other{bottom:4%;background:#749a60}.nest span{display:block;text-align:center}.switches{display:flex;justify-content:center;gap:18px}.switches button,.again{min-width:clamp(150px,26vw,260px);min-height:62px;border:4px solid #fff;border-radius:20px;color:#fff;background:#ea6250;box-shadow:0 6px #a63e34;font-weight:900;font-size:clamp(19px,4.5vh,28px)}.switches button:last-child{background:#559d52;box-shadow:0 6px #357335}.slots{letter-spacing:8px;font-size:1.2em}.done{position:absolute;inset:64px 0 0;display:grid;place-items:center;text-align:center;background:#77d8ee;z-index:5}.done h2{font-size:clamp(38px,11vh,78px);margin:0}.again{background:#7a61be;box-shadow:0 6px #4f3b86}dialog{border:6px solid #ef9b35;border-radius:24px;text-align:center;font-weight:800}dialog button{min-height:50px;padding:8px 24px;border:0;border-radius:16px;background:#258dc2;color:#fff;font-weight:900}.portrait{display:none}@media(orientation:portrait) and (max-width:700px){.game{display:none}.portrait{height:100dvh;display:grid;place-items:center;text-align:center;background:#8ddcf1;font-size:28px;font-weight:900}}@media(max-height:420px){.top{height:54px}.play{height:calc(100% - 54px)}.nest{min-height:40%}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="portrait">📱↻<br>よこに してね</div>
  <main class="game">
    <header class="top"><a class="back" href="../">← もどる</a><h1>もじを はこぶ アリさん</h1><button class="help" id="help" type="button">？</button></header>
    <section class="play">
      <div class="prompt" id="prompt" aria-live="polite">「ねこ」を つくろう　つぎは「ね」</div>
      <div class="scene"><div class="path"></div><div class="ant" id="ant">🐜<b id="letter">ね</b></div><div class="nest good"><span>ことばの す<br><b class="slots" id="slots">○○</b></span></div><div class="nest other"><span>おやすみの す<br>🍂</span></div></div>
      <div class="switches"><button type="button" id="word">ことばの すへ</button><button type="button" id="other">おやすみの すへ</button></div>
    </section>
    <section class="done" id="done" hidden><div><div style="font-size:70px">🐜🐜　🐱</div><h2>ねこ！</h2><button class="again" id="again" type="button">もういちど</button></div></section>
  </main>
  <dialog id="guide"><h2>あそびかた</h2><p>ひつような もじは<br>「ことばの す」へ はこぼう！</p><button id="close" type="button">わかった！</button></dialog>
  <script>
    (()=>{'use strict';const letters=['ね','あ','こ','り'];let i=0,filled='';const ant=document.querySelector('#ant'),letter=document.querySelector('#letter'),slots=document.querySelector('#slots'),prompt=document.querySelector('#prompt'),done=document.querySelector('#done');function show(){letter.textContent=letters[i];const need=filled.length===0?'ね':'こ';prompt.textContent=`「ねこ」を つくろう　つぎは「${need}」`;slots.textContent=(filled+'○○').slice(0,2)}function send(toWord){const current=letters[i],need=filled.length===0?'ね':'こ';ant.style.transform=`translate(${toWord?'68vw':'68vw'},${toWord?'-9vh':'15vh'})`;setTimeout(()=>{if(toWord&&current===need){filled+=current;prompt.textContent=`${current}、とどいた！`}else{prompt.textContent='だいじょうぶ！ つぎを みよう'}i++;if(filled==='ねこ'){done.hidden=false;document.querySelector('#again').focus();return}if(i>=letters.length)i=0;ant.style.transform='';show();document.querySelector('#word').focus()},1100)}document.querySelector('#word').onclick=()=>send(true);document.querySelector('#other').onclick=()=>send(false);document.querySelector('#again').onclick=()=>{i=0;filled='';done.hidden=true;show()};const guide=document.querySelector('#guide');document.querySelector('#help').onclick=()=>guide.showModal();document.querySelector('#close').onclick=()=>guide.close();show()})();
  </script>
</body>
</html>
