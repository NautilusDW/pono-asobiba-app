<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>とけいを あわせよう</title>
<style>
:root{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;color:#21415d}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{background:linear-gradient(140deg,#8dddf1,#fff0a9);font-weight:900}button,a{font:inherit}.shell{height:100dvh;display:grid;grid-template-rows:auto 1fr auto;gap:7px;padding:8px 12px}.top{display:grid;grid-template-columns:125px 1fr 125px;align-items:center;text-align:center}.top h1{margin:0;color:#fff;text-shadow:0 3px #4585a0;font-size:clamp(1.25rem,4vw,2.1rem)}.back,.again,.turn{min-height:48px;border:3px solid #fff;border-radius:16px;background:#76dfbd;color:#173a58;text-decoration:none;display:grid;place-items:center;box-shadow:0 5px #397588;cursor:pointer}.again{background:#fff4d8}.stage{display:flex;align-items:center;justify-content:center;gap:clamp(25px,8vw,120px);overflow:hidden;border:4px solid #fff;border-radius:24px;background:rgba(255,255,255,.35)}.mission{text-align:center;font-size:clamp(1.1rem,3vw,1.7rem)}.mission strong{display:block;margin:8px;font-size:clamp(2.2rem,8vw,4.7rem);color:#ed704e}.clock{position:relative;width:min(43vh,300px);aspect-ratio:1;border:12px solid #497e9d;border-radius:50%;background:#fffdf0;box-shadow:0 8px #24516d;touch-action:none}.num{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(calc(var(--i)*30deg)) translateY(-41%) rotate(calc(var(--i)*-30deg));width:100%;height:100%;text-align:center;font-size:clamp(1rem,4vh,1.6rem)}.hand{position:absolute;z-index:2;left:calc(50% - 6px);bottom:50%;width:12px;height:31%;border-radius:10px;background:#ef7052;transform-origin:50% 100%;transform:rotate(var(--angle));box-shadow:0 2px #983f36}.minute{height:39%;width:7px;left:calc(50% - 3.5px);background:#3d7192;transform:rotate(0)}.pin{position:absolute;z-index:3;left:50%;top:50%;width:24px;height:24px;border:4px solid #fff;border-radius:50%;background:#ffc94e;transform:translate(-50%,-50%)}.controls{display:flex;gap:14px;justify-content:center}.turn{width:84px;background:#8fdcf2;font-size:1.7rem}.ok{background:#ffdf67;width:120px}.status{text-align:center;min-height:24px}.portrait{display:none;position:fixed;inset:0;z-index:20;background:#24516d;color:#fff;place-content:center;text-align:center;font-size:1.5rem}@media(orientation:portrait) and (max-width:700px){.portrait{display:grid}}@media(max-height:430px){.top{grid-template-columns:100px 1fr 100px}.back,.again{min-height:42px}.clock{width:min(45vh,190px);border-width:8px}.stage{gap:40px}.mission strong{font-size:2.6rem}.turn{min-height:43px}}@media(prefers-reduced-motion:reduce){*{transition:none!important}}button:focus-visible,a:focus-visible{outline:4px solid #fff;outline-offset:2px}
</style></head><body><main class="shell"><header class="top"><a class="back" href="../">‹ もどる</a><h1>とけいを あわせよう</h1><button class="again" id="again">つぎの もんだい</button></header><section class="stage"><div class="mission">なんじに する？<strong id="target">3じ</strong><div class="controls"><button class="turn" id="minus" aria-label="ひとつ もどす">−</button><button class="turn ok" id="ok">できた！</button><button class="turn" id="plus" aria-label="ひとつ すすめる">＋</button></div></div><div class="clock" id="clock" aria-label="とけいの みじかい はりを うごかす"><div id="nums"></div><div class="hand minute"></div><div class="hand" id="hour"></div><div class="pin"></div></div></section><div class="status" id="status" aria-live="polite">みじかい はりを うごかしてね</div></main><aside class="portrait"><p>よこむきに してね ↻</p></aside>
<script>
"use strict";const nums=document.querySelector("#nums"),hour=document.querySelector("#hour"),targetEl=document.querySelector("#target"),status=document.querySelector("#status"),clock=document.querySelector("#clock");let value=12,target=3;for(let i=1;i<=12;i++){const s=document.createElement("span");s.className="num";s.style.setProperty("--i",i);s.textContent=i;nums.append(s)}
function draw(){hour.style.setProperty("--angle",`${value%12*30}deg`)}function newRound(){target=1+Math.floor(Math.random()*12);value=12;targetEl.textContent=`${target}じ`;status.textContent="みじかい はりを うごかしてね";draw()}function change(d){value=((value-1+d+12)%12)+1;draw()}
function point(e){const r=clock.getBoundingClientRect(),x=e.clientX-r.left-r.width/2,y=e.clientY-r.top-r.height/2;value=(Math.round(Math.atan2(x,-y)*6/Math.PI)+12)%12||12;draw()}
clock.addEventListener("pointerdown",e=>{clock.setPointerCapture(e.pointerId);point(e)});clock.addEventListener("pointermove",e=>{if(clock.hasPointerCapture(e.pointerId))point(e)});document.querySelector("#minus").onclick=()=>change(-1);document.querySelector("#plus").onclick=()=>change(1);document.querySelector("#ok").onclick=()=>{if(value===target){status.textContent=`せいかい！ ${target}じ！`;setTimeout(newRound,900)}else status.textContent=`${target}じに あわせてみよう`};document.querySelector("#again").onclick=newRound;document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")change(-1);if(e.key==="ArrowRight")change(1);if(e.key==="Enter")document.querySelector("#ok").click()});newRound();
</script></body></html>
