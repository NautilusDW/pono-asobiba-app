<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>ことばの まほうこうぼう</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stage" id="stage">
    <header>
      <a class="back" href="../" aria-label="もどる">‹ もどる</a>
      <div class="title">ことばの まほうこうぼう</div>
      <div class="progress" id="progress">1 / 3</div>
    </header>

    <section class="world" id="world" aria-live="polite">
      <div class="cloud">☁️</div><div class="cloud cloud2">☁️</div>
      <div class="rain" id="rain">💧　💧　💧<br>　💧　💧</div>
      <div class="hero" id="hero">🐿️</div>
      <div class="result-object" id="resultObject" aria-hidden="true"></div>
      <div class="land land-left"></div><div class="land land-right"></div>
      <div class="chest" id="chest">🧰</div>
      <p class="story" id="story">あめで ぬれちゃう！<br>「かさ」を つくろう</p>
    </section>

    <section class="workbench">
      <div class="recipe">
        <span class="recipe-label">つくる ことば</span>
        <div class="slots" id="slots" aria-label="ことばの わく"></div>
      </div>
      <div class="forge" id="forge" aria-label="もじを ここへ いれる">
        <span class="flame">🔥</span>
        <span id="forgeText">もじを じゅんばんに いれよう</span>
      </div>
      <div class="belt" id="belt" aria-label="もじの ならび"></div>
      <button class="hint" id="hintBtn" type="button">💡 ヒント</button>
      <button class="next hidden" id="nextBtn" type="button">つぎへ ▶</button>
    </section>
    <div class="sparkles" id="sparkles" aria-hidden="true">✨　⭐　✨　⭐</div>
  </main>
  <script src="game.js"></script>
</body>
</html>
