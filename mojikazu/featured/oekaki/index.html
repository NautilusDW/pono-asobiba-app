<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#13203c">
  <title>すうじで おえかき</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="viewport">
    <section id="stage" aria-label="すうじで おえかき">
      <div class="sky" aria-hidden="true">
        <span class="cloud cloud-a"></span><span class="cloud cloud-b"></span>
        <span class="hill hill-a"></span><span class="hill hill-b"></span>
      </div>

      <header class="topbar">
        <a class="round-btn back" href="../" aria-label="もどる">‹</a>
        <div>
          <p class="eyebrow">すうじで おえかき</p>
          <h1 id="mission">えを えらんでね</h1>
        </div>
        <button id="hintBtn" class="round-btn hint" type="button" aria-label="ヒント">💡</button>
      </header>

      <div id="chooser" class="chooser" aria-label="えを えらぶ">
        <button class="picture-card" type="button" data-picture="butterfly">
          <span class="card-art">🦋</span><strong>ちょうちょ</strong><small>9この てん</small>
        </button>
        <button class="picture-card" type="button" data-picture="rocket">
          <span class="card-art">🚀</span><strong>ロケット</strong><small>13この てん</small>
        </button>
        <button class="picture-card" type="button" data-picture="dino">
          <span class="card-art">🦕</span><strong>きょうりゅう</strong><small>18この てん</small>
        </button>
      </div>

      <div id="playArea" class="play-area" hidden>
        <svg id="revealArt" class="reveal-art" viewBox="0 0 900 500" aria-hidden="true"></svg>
        <canvas id="lineCanvas" width="900" height="500" aria-hidden="true"></canvas>
        <div id="dots" class="dots" aria-label="すうじを じゅんばんに おしてね"></div>
        <div class="progress-wrap" aria-label="すすみぐあい">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </div>

      <div id="celebration" class="celebration" hidden>
        <p>できた！</p>
        <div class="finish-actions">
          <button id="againBtn" type="button">もういちど</button>
          <button id="chooseBtn" type="button">べつの え</button>
        </div>
      </div>

      <p id="message" class="message" aria-live="polite">どの えを かこうかな？</p>
      <div id="sparkles" aria-hidden="true"></div>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
