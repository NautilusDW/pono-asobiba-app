<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#10253d">
  <title>かずの からくりいせき</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="stage">
    <header class="hud">
      <a class="back" href="../">← もどる</a>
      <div>
        <h1>かずの からくりいせき</h1>
        <p id="mission">おもさを 5に しよう</p>
      </div>
      <div id="roomDots" aria-label="すすみぐあい">● ○ ○</div>
    </header>

    <section id="roomWeight" class="room active" aria-label="おもさの からくり">
      <div class="temple">
        <div class="sun">☀</div>
        <div class="stone-door" id="weightDoor"><span>🔒</span></div>
        <div class="gear gear-a">⚙</div>
        <div class="gear gear-b">⚙</div>
      </div>
      <div class="scale">
        <div class="beam"></div>
        <div class="pan" id="weightPan"><b id="weightTotal">0</b><small>/ 5</small></div>
        <div class="base"></div>
      </div>
      <div class="stones" aria-label="おもり">
        <button type="button" data-weight="1">1</button>
        <button type="button" data-weight="2">2</button>
        <button type="button" data-weight="3">3</button>
        <button type="button" data-weight="4">4</button>
      </div>
      <button class="reset" id="weightReset" type="button">おもりを もどす</button>
    </section>

    <section id="roomWater" class="room" hidden aria-label="みずの からくり">
      <div class="water-machine">
        <div class="tank"><span id="dropsLeft">💧💧💧💧💧💧</span></div>
        <div class="pipes">╲　╱</div>
        <div class="buckets">
          <button id="leftBucket" type="button" aria-label="ひだりへ みずを いれる"><span>0</span><b>ひだり</b></button>
          <button id="rightBucket" type="button" aria-label="みぎへ みずを いれる"><span>0</span><b>みぎ</b></button>
        </div>
      </div>
      <div class="chasm">
        <div class="bridge" id="waterBridge"></div>
        <span class="goal">🚪</span>
      </div>
      <button class="reset" id="waterReset" type="button">みずを もどす</button>
    </section>

    <section id="roomGear" class="room" hidden aria-label="はぐるまの からくり">
      <div class="tower">
        <div class="elevator" id="elevator">🧒</div>
        <div class="treasure">✨🏆✨</div>
      </div>
      <div class="gear-console">
        <p>2ずつ すすむ すうじを おそう</p>
        <div id="gearButtons">
          <button type="button" data-number="6">6</button>
          <button type="button" data-number="2">2</button>
          <button type="button" data-number="8">8</button>
          <button type="button" data-number="4">4</button>
        </div>
        <div class="gear-chain" id="gearChain">⚙　⚙　⚙　⚙</div>
      </div>
    </section>

    <div id="feedback" role="status" aria-live="polite"></div>
    <button id="hint" class="hint" type="button">💡 ヒント</button>

    <section id="finish" class="finish" hidden>
      <div class="finish-sun">☀</div>
      <h2>いせきが めを さました！</h2>
      <p>かずで 3つの からくりを うごかしたね</p>
      <button id="again" type="button">もういちど</button>
      <a href="../">5つの ゲームへ</a>
    </section>
  </main>
  <aside id="rotate"><span>↻</span><b>よこに してね</b></aside>
  <script src="game.js"></script>
</body>
</html>
