<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#173f66">
  <title>すうじパチンコ | ポノのあそびば</title>
  <link rel="stylesheet" href="styles.css">
  <script src="../../mojicrane/js/vendor/matter.min.js" defer></script>
  <script src="game.js" defer></script>
</head>
<body>
  <div id="rotateNote" role="dialog" aria-labelledby="rotateTitle">
    <div class="rotate-card">
      <div aria-hidden="true">📱 ↻</div>
      <h1 id="rotateTitle">よこにしてね</h1>
      <p>すうじボールを みつけよう</p>
      <a href="../index.html">もどる</a>
    </div>
  </div>

  <main id="game" aria-label="すうじパチンコ">
    <header class="hud">
      <a class="round-button home" href="../index.html" aria-label="もどる">‹</a>
      <div class="mission">
        <span id="roundLabel">1 / 5</span>
        <strong id="prompt">すうじを みつけよう</strong>
        <span id="progress" aria-label="すすみぐあい"></span>
      </div>
      <button id="hintButton" class="hint-button" type="button">ヒント</button>
    </header>

    <section id="board" aria-label="すうじボールの あそびば">
      <div class="peg peg-a" aria-hidden="true"></div>
      <div class="peg peg-b" aria-hidden="true"></div>
      <div class="peg peg-c" aria-hidden="true"></div>
      <div class="peg peg-d" aria-hidden="true"></div>
      <div class="peg peg-e" aria-hidden="true"></div>
      <div id="ballLayer"></div>
      <div id="sparkLayer" aria-hidden="true"></div>
    </section>

    <div id="message" class="message" aria-live="polite"></div>

    <section id="startScreen" class="overlay">
      <div class="panel">
        <div class="logo-ball" aria-hidden="true">7</div>
        <h1>すうじパチンコ</h1>
        <p>おだいの すうじボールを タッチ！</p>
        <div class="level-buttons">
          <button type="button" data-level="easy"><b>やさしい</b><small>ひとつ みつける</small></button>
          <button type="button" data-level="same"><b>ふつう</b><small>おなじ すうじを あつめる</small></button>
          <button type="button" data-level="rule"><b>チャレンジ</b><small>おおきい すうじを みつける</small></button>
        </div>
      </div>
    </section>

    <section id="resultScreen" class="overlay hidden" aria-labelledby="resultTitle">
      <div class="panel result-panel">
        <div class="result-stars" aria-hidden="true">★ ★ ★</div>
        <h2 id="resultTitle">ぜんぶ みつけたね！</h2>
        <p id="resultText">すうじボールが よろこんでるよ</p>
        <div class="result-actions">
          <button id="againButton" type="button">もういちど</button>
          <button id="levelButton" class="subtle" type="button">えらぶ</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
