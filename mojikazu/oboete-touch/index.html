<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>おぼえて タッチ</title>
<style>
:root{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;color:#25405b}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{background:linear-gradient(145deg,#f9d77c,#ff9f89);font-weight:900}button,a{font:inherit}.shell{height:100dvh;display:grid;grid-template-rows:auto auto 1fr auto;gap:7px;padding:8px 12px}.top{display:grid;grid-template-columns:125px 1fr 125px;align-items:center;text-align:center}.top h1{margin:0;color:#fff;text-shadow:0 3px #b96769;font-size:clamp(1.3rem,4vw,2.2rem)}.back,.start,.level{min-height:48px;border:3px solid #fff;border-radius:16px;background:#76dfc1;color:#1b435c;text-decoration:none;display:grid;place-items:center;box-shadow:0 5px #527987;cursor:pointer}.start{background:#fff1d0}.levels{display:flex;justify-content:center;align-items:center;gap:8px}.level{min-width:60px;background:#fff0d5}.level[aria-pressed=true]{background:#ffe061;transform:translateY(-2px)}.board{display:grid;grid-template-columns:repeat(3,minmax(65px,120px));place-content:center;gap:clamp(10px,3vw,24px);overflow:hidden;border:4px solid #fff;border-radius:24px;background:rgba(255,255,255,.3)}.tile{aspect-ratio:1;border:5px solid #fff;border-radius:24px;background:var(--c);box-shadow:0 8px color-mix(in srgb,var(--c) 55%,#553f5e);color:#25405b;font-size:clamp(2rem,7vh,3.5rem);font-weight:1000;cursor:pointer;transition:transform .16s,filter .16s;touch-action:manipulation}.tile.show{transform:scale(1.12);filter:brightness(1.35);outline:8px solid #fff48b}.tile.good{transform:scale(.88);filter:brightness(1.25)}.status{text-align:center;color:#fff;text-shadow:0 2px #9b5b68;min-height:25px}.portrait{display:none;position:fixed;inset:0;z-index:20;background:#764d70;color:#fff;place-content:center;text-align:center;font-size:1.5rem}@media(orientation:portrait) and (max-width:700px){.portrait{display:grid}}@media(max-height:430px){.top{grid-template-columns:100px 1fr 100px}.back,.start,.level{min-height:42px}.board{grid-template-columns:repeat(3,minmax(60px,88px));gap:10px}.tile{font-size:2rem}.shell{grid-template-rows:auto auto 1fr auto}}@media(prefers-reduced-motion:reduce){*{transition:none!important}}button:focus-visible,a:focus-visible{outline:4px solid #fff;outline-offset:2px}
</style></head><body><main class="shell"><header class="top"><a class="back" href="../">‹ もどる</a><h1>おぼえて タッチ</h1><button class="start" id="start">みて おぼえる</button></header><div class="levels"><span>いくつ？</span><button class="level" data-n="2" aria-pressed="true">2こ</button><button class="level" data-n="3" aria-pressed="false">3こ</button><button class="level" data-n="4" aria-pressed="false">4こ</button></div><section class="board" id="board" aria-label="ひかった じゅんに おす ばしょ"></section><div class="status" id="status" aria-live="polite">「みて おぼえる」を おしてね</div></main><aside class="portrait"><p>よこむきに してね ↻</p></aside>
<script>
"use strict";const board=document.querySelector("#board"),status=document.querySelector("#status"),startBtn=document.querySelector("#start");const values=["1","2","3","あ","い","う"],colors=["#ff8b7f","#ffe16b","#78dfbf","#8ac9f1","#d99bf2","#ffb66e"];let count=2,seq=[],pos=0,accept=false,run=0;
values.forEach((v,i)=>{const b=document.createElement("button");b.type="button";b.className="tile";b.textContent=v;b.dataset.i=i;b.style.setProperty("--c",colors[i]);b.setAttribute("aria-label",v);b.onclick=()=>press(i,b);board.append(b)});
const wait=ms=>new Promise(r=>setTimeout(r,ms));async function start(){const token=++run;accept=false;pos=0;seq=Array.from({length:count},()=>Math.floor(Math.random()*6));status.textContent="よく みてね";for(const i of seq){if(token!==run)return;const b=board.children[i];b.classList.add("show");await wait(520);b.classList.remove("show");await wait(180)}if(token!==run)return;accept=true;status.textContent="おなじ じゅんに タッチ！"}
function press(i,b){if(!accept)return;if(i===seq[pos]){b.classList.add("good");setTimeout(()=>b.classList.remove("good"),180);pos++;status.textContent=`${pos}こ め！`;if(pos===seq.length){accept=false;status.textContent="ぜんぶ おぼえた！";setTimeout(start,900)}}else{accept=false;status.textContent="もういちど みてみよう";setTimeout(start,700)}}
document.querySelectorAll(".level").forEach(b=>b.onclick=()=>{count=Number(b.dataset.n);document.querySelectorAll(".level").forEach(x=>x.setAttribute("aria-pressed",x===b));start()});startBtn.onclick=start;document.addEventListener("keydown",e=>{if(/^[1-6]$/.test(e.key))board.children[Number(e.key)-1].click();if(e.key==="r")start()});
</script></body></html>
