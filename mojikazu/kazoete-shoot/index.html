<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>かぞえてシュート</title>
<style>
:root{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;color:#173553}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{background:linear-gradient(#8fe0ff 0 62%,#64bf67 62%);font-weight:900}button,a{font:inherit}button:focus-visible,a:focus-visible{outline:4px solid #fff;outline-offset:2px}.shell{height:100dvh;display:grid;grid-template-rows:auto 1fr auto;gap:7px;padding:max(7px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(7px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left))}.top{display:grid;grid-template-columns:130px 1fr 130px;align-items:center;text-align:center}.top h1{margin:0;color:#fff;text-shadow:0 3px #286987;font-size:clamp(1.25rem,4vw,2.1rem)}.back,.again,.goal{min-height:50px;border:3px solid #fff;border-radius:16px;box-shadow:0 5px #235374;background:#ffe06a;color:#173553;text-decoration:none;display:grid;place-items:center;cursor:pointer}.again{background:#fff1d4}.field{position:relative;overflow:hidden;border:4px solid #fff;border-radius:24px;background:linear-gradient(#c8f3ff 0 68%,#79cd6e 68%);box-shadow:0 6px #246a65}.prompt{position:absolute;z-index:4;top:8px;left:50%;transform:translateX(-50%);margin:0;padding:6px 18px;border-radius:18px;background:#fff;color:#174e72;font-size:clamp(1rem,2.8vw,1.45rem);white-space:nowrap}.animals{position:absolute;inset:52px 10px 74px}.animal{position:absolute;width:64px;height:64px;border:0;background:transparent;font-size:44px;cursor:pointer;filter:drop-shadow(0 4px 0 rgba(0,0,0,.15));animation:drift var(--dur) ease-in-out infinite alternate;touch-action:manipulation}.animal.counted::after{content:"✓";position:absolute;right:-3px;top:-3px;width:28px;height:28px;border-radius:50%;background:#ffe15c;color:#276440;font-size:20px;display:grid;place-items:center;border:2px solid #fff}.goals{position:absolute;z-index:3;bottom:8px;left:50%;display:flex;gap:clamp(10px,4vw,36px);transform:translateX(-50%)}.goal{width:84px;background:#ff8c72;font-size:1.8rem}.goal:nth-child(2){background:#ffe06a}.goal:nth-child(3){background:#7ce2c4}.status{text-align:center;color:#fff;text-shadow:0 2px #28577b;min-height:24px}.ball{position:absolute;z-index:5;left:50%;bottom:88px;font-size:36px;transform:translateX(-50%);transition:transform .45s ease,opacity .45s}.portrait{display:none;position:fixed;inset:0;z-index:20;background:#173553;color:#fff;place-content:center;text-align:center;font-size:1.5rem}@keyframes drift{to{transform:translate(var(--dx),var(--dy))}}@media(orientation:portrait) and (max-width:700px){.portrait{display:grid}}@media(max-height:430px){.top{grid-template-columns:105px 1fr 105px}.back,.again{min-height:44px}.animals{inset:46px 6px 67px}.animal{width:54px;height:54px;font-size:38px}.goal{min-height:46px;width:72px}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body><main class="shell"><header class="top"><a class="back" href="../">‹ もどる</a><h1>かぞえてシュート</h1><button class="again" id="again">もういちど</button></header><section class="field" id="field"><p class="prompt">どうぶつは なんびき？</p><div class="animals" id="animals"></div><div class="ball" id="ball">⚽</div><div class="goals" id="goals"></div></section><div class="status" id="status" aria-live="polite">どうぶつを タッチして かぞえよう</div></main><aside class="portrait"><p>よこむきに してね ↻</p></aside>
<script>
"use strict";
const animals=document.querySelector("#animals"),goals=document.querySelector("#goals"),status=document.querySelector("#status"),ball=document.querySelector("#ball");
let answer=4;
function start(){answer=3+Math.floor(Math.random()*4);animals.replaceChildren();goals.replaceChildren();status.textContent="どうぶつを タッチして かぞえよう";ball.style.cssText="";
 const icons=["🐰","🐸","🐧","🦊","🐼","🐤"];for(let i=0;i<answer;i++){const b=document.createElement("button");b.className="animal";b.type="button";b.textContent=icons[i%icons.length];b.setAttribute("aria-label",`${i+1}ひきめ`);b.style.left=`${8+(i*83/Math.max(1,answer-1))}%`;b.style.top=`${12+(i%2)*42}%`;b.style.setProperty("--dx",`${i%2?12:-12}px`);b.style.setProperty("--dy",`${i%3?8:-8}px`);b.style.setProperty("--dur",`${1.7+i*.17}s`);b.onclick=()=>{b.classList.toggle("counted");const n=animals.querySelectorAll(".counted").length;status.textContent=`${n}ひき かぞえたよ`;};animals.append(b)}
 const opts=[answer-1,answer,answer+1].sort(()=>Math.random()-.5);opts.forEach(n=>{const b=document.createElement("button");b.className="goal";b.type="button";b.textContent=n;b.setAttribute("aria-label",`${n}の ゴール`);b.onclick=()=>shoot(b,n);goals.append(b)});}
function shoot(goal,n){const fr=document.querySelector("#field").getBoundingClientRect(),gr=goal.getBoundingClientRect();ball.style.transform=`translate(${gr.left-fr.left-fr.width/2+gr.width/2}px,${gr.top-fr.top-fr.height+130}px) scale(.65)`;if(n===answer){status.textContent=`せいかい！ ${answer}ひき！`;setTimeout(start,1000)}else{status.textContent="もういちど かぞえてみよう";setTimeout(()=>ball.style.cssText="",500)}}
document.querySelector("#again").onclick=start;document.addEventListener("keydown",e=>{if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){const a=[...document.querySelectorAll("button,a")],i=a.indexOf(document.activeElement);a[(i+1+a.length)%a.length].focus()}if(e.key==="r")start()});start();
</script></body></html>
