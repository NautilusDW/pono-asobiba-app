<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#193b63">
  <title>もじとかずランド | ポノのあそびば</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="hub">
    <header class="hub__header">
      <a class="round-button" href="../play.html" aria-label="ゲームをえらぶにもどる">←</a>
      <div>
        <h1>かずの ゲームランド</h1>
        <p>すきな ゲームを えらんでね！</p>
      </div>
      <div class="star" aria-hidden="true">★</div>
    </header>

    <section class="games" aria-label="かずのゲーム">
      <a class="game game--tap" href="junban-touch/">
        <span class="game__art" aria-hidden="true"><b>1</b><b>2</b><b>3</b></span>
        <span class="game__copy"><strong>じゅんばんタッチ</strong><small>1から じゅんばんに タッチ！</small></span>
        <span class="game__go" aria-hidden="true">▶</span>
      </a>
      <a class="game game--pachinko" href="suuji-pachinko/">
        <span class="game__art game__art--balls" aria-hidden="true"><b>7</b><b>4</b><b>9</b></span>
        <span class="game__copy"><strong>すうじパチンコ</strong><small>はずむ すうじを みつけよう！</small></span>
        <span class="game__go" aria-hidden="true">▶</span>
      </a>
      <a class="game game--train" href="suuji-train/">
        <span class="game__art game__art--train" aria-hidden="true"><b>🚂</b><b>1</b><b>2</b></span>
        <span class="game__copy"><strong>すうじのれっしゃ</strong><small>じゅんばんに つなげよう！</small></span>
        <span class="game__go" aria-hidden="true">▶</span>
      </a>
      <a class="game game--jump" href="kazu-jump/">
        <span class="game__art game__art--jump" aria-hidden="true"><b>🐿️</b><b>4</b><b>5</b></span>
        <span class="game__copy"><strong>かずだけジャンプ</strong><small>つぎの かずへ ジャンプ！</small></span>
        <span class="game__go" aria-hidden="true">▶</span>
      </a>
    </section>
  </main>
  <aside class="portrait" aria-live="polite"><span>↻</span><b>よこに してね</b></aside>
</body>
</html>
