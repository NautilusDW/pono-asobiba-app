<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宝箱テスト（全種類）</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #1a2a4a;
  color: #fff;
  padding: 20px;
}
h1 { text-align: center; font-size: 1.3rem; color: #FFD700; margin-bottom: 16px; }
h2 { font-size: 1rem; color: #aaa; margin: 16px 0 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
.btn-grid {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
}
.test-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 14px; border: 2px solid #555; border-radius: 14px;
  background: #2a3a5a; color: #fff; font-family: inherit;
  font-size: 0.75rem; font-weight: 700; cursor: pointer;
  min-width: 90px; transition: all 0.15s;
}
.test-btn:hover { border-color: #FFD700; background: #3a4a6a; }
.test-btn:active { transform: scale(0.95); }
.test-btn img {
  width: 56px; height: 56px; object-fit: contain; border-radius: 8px;
  background: #fff; border: 1px solid #ddd;
}
.test-btn .icon { font-size: 1.5rem; }
.test-btn .name { font-size: 0.65rem; color: #ccc; }
.back-link {
  display: block; text-align: center; margin-top: 20px;
  color: #FFD700; font-size: 0.85rem;
}
</style>
</head>
<body>

<h1>🎁 宝箱テスト（全種類）</h1>
<div id="rewards-list"></div>
<a href="index.html" class="back-link">← トップにもどる</a>

<script src="common/treasure.js"></script>
<script>
(function() {
  var container = document.getElementById('rewards-list');

  fetch('assets/data/rewards.json', { cache: 'no-store' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      // スロット報酬
      var h2slot = document.createElement('h2');
      h2slot.textContent = '📌 スロット報酬';
      container.appendChild(h2slot);
      var slotGrid = document.createElement('div');
      slotGrid.className = 'btn-grid';
      container.appendChild(slotGrid);

      var slots = data.slotRewards || {};
      Object.keys(slots).sort(function(a,b){ return parseInt(a)-parseInt(b); }).forEach(function(num) {
        var rw = slots[num];
        // gendered の場合は boy/girl 両方出す
        if (rw.gendered) {
          ['boy','girl'].forEach(function(g) {
            var sub = rw[g];
            if (!sub) return;
            addButton(slotGrid, {
              label: 'スロット' + num + (g === 'boy' ? '♂' : '♀'),
              icon: rw.icon,
              name: rw.name,
              img: sub.img || '',
              tag: 'スタンプ #' + num
            });
          });
        } else {
          addButton(slotGrid, {
            label: 'スロット' + num,
            icon: rw.icon,
            name: rw.name,
            img: rw.img || '',
            tag: 'スタンプ #' + num
          });
        }
      });

      // カード完成報酬
      var h2card = document.createElement('h2');
      h2card.textContent = '⭐ カード完成報酬';
      container.appendChild(h2card);
      var cardGrid = document.createElement('div');
      cardGrid.className = 'btn-grid';
      container.appendChild(cardGrid);

      var cards = data.cardCompleteRewards || [];
      cards.forEach(function(rw, i) {
        addButton(cardGrid, {
          label: 'カード' + (i+1) + '枚目',
          icon: rw.icon,
          name: rw.name,
          img: rw.img || '',
          tag: 'カードかんせい #' + (i+1)
        });
      });
    })
    .catch(function(e) {
      container.innerHTML = '<div style="color:#f44;text-align:center;padding:20px;">rewards.json 読み込み失敗: ' + e.message + '</div>';
    });

  function addButton(grid, opts) {
    var btn = document.createElement('button');
    btn.className = 'test-btn';
    var hasImg = opts.img && opts.img.indexOf('.png') !== -1;
    btn.innerHTML =
      (hasImg ? '<img src="' + opts.img + '" alt="">' : '<div class="icon">' + (opts.icon || '🎁') + '</div>') +
      '<div>' + opts.label + '</div>' +
      '<div class="name">' + opts.name + '</div>';
    btn.addEventListener('click', function() {
      window.showTreasure({
        name: opts.name,
        img: opts.img || '',
        label: opts.tag || 'テスト'
      });
    });
    grid.appendChild(btn);
  }
})();
</script>

</body>
</html>
