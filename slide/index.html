<html lang="ja">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8F0;
  --primary: #4CAF50;
  --primary-dark: #388E3C;
  --text: #5D4E37;
  --text-light: #A89880;
  --shadow: rgba(93,78,55,0.12);
  --radius: 20px;
  --slide-shell-width: min(100vw, calc(100dvh * 16 / 9));
  --slide-shell-height: min(100dvh, calc(100vw * 9 / 16));
  --slide-shell-left: calc((100vw - var(--slide-shell-width)) / 2);
  --slide-shell-top: calc((100dvh - var(--slide-shell-height)) / 2);
}

html, body {
  width: 100%; height: 100dvh; overflow: hidden;
  overscroll-behavior: none;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover; background-position: center; background-repeat: no-repeat;
  color: var(--text);
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body { display: grid; place-items: center; }

#app {
  position: relative;
  width: var(--slide-shell-width);
  height: var(--slide-shell-height);
  max-width: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  isolation: isolate;
  border-radius: clamp(12px, 2vmin, 24px);
  background: rgba(255,248,240,0.3);
  box-shadow: 0 12px 40px rgba(58,48,36,0.22);
}
/* common viewport safety CSS sets #app to 100% height on coarse pointers.
   This page intentionally owns a centered 16:9 shell, so keep that contract. */
body > #app {
  width: var(--slide-shell-width) !important;
  height: var(--slide-shell-height) !important;
  max-height: var(--slide-shell-height) !important;
  min-height: 0 !important;
}

/* ===== Compact journey HUD ===== */
.game-rail {
  position: absolute;
  z-index: 5;
  top: clamp(8px, 1.6%, 14px);
  left: clamp(122px, 16.5%, 188px);
  width: clamp(252px, 42%, 440px);
  min-height: clamp(44px, 7vmin, 52px);
  padding: 6px clamp(10px, 1.5vmin, 16px);
  border: 1.5px solid rgba(255,247,207,0.62);
  border-radius: 999px;
  background: linear-gradient(135deg, rgba(24,63,53,0.9), rgba(42,86,67,0.84));
  box-shadow: 0 6px 18px rgba(16,37,31,0.28), inset 0 1px 0 rgba(255,255,255,0.18);
  backdrop-filter: blur(10px) saturate(1.12);
  pointer-events: none;
  display: flex;
  align-items: center;
}
.header { display: none; }
.back-link {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  color: var(--primary); font-weight: 700; font-size: 0.85rem; text-decoration: none;
}
.header h1 { font-size: 0; }
.subtitle { display: none; }
.btn-bgm {
  position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  width: 34px; height: 34px; border-radius: 50%;
  background: #FFF3EE; border: 2px solid var(--primary);
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px var(--shadow); transition: transform 0.15s;
  pointer-events: auto;
}
.btn-bgm:active { transform: translateY(-50%) scale(0.9); }
.btn-bgm.bgm-off { opacity: 0.4; filter: grayscale(1); }
.btn-pause {
  position: absolute;
  left: clamp(68px, 10%, 88px);
  top: clamp(8px, 1.5%, 14px);
  width: clamp(44px, 7vmin, 52px);
  height: clamp(44px, 7vmin, 52px);
  border-radius: 50%;
  background: #FFF3EE; border: 2px solid var(--primary);
  font-size: clamp(1rem, 2.5vmin, 1.3rem); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px var(--shadow); z-index: 9988; transition: transform 0.15s;
}
.btn-pause:active { transform: scale(0.9); }
.btn-pause:disabled { opacity: 0.48; cursor: default; transform: none; }

/* common/menu.js injects these rules later; !important keeps the shared menu
   attached to this centered 16:9 shell instead of the browser corner. */
.pono-menu-toggle {
  top: calc(var(--slide-shell-top) + 8px) !important;
  left: calc(var(--slide-shell-left) + 10px) !important;
  width: clamp(44px, 7vmin, 56px) !important;
  height: clamp(44px, 7vmin, 56px) !important;
}
.pono-dropdown {
  top: calc(var(--slide-shell-top) + 54px) !important;
  left: calc(var(--slide-shell-left) + 10px) !important;
}

/* ===== HUD ===== */
.hud {
  width: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  gap: clamp(5px, 1vmin, 10px);
  align-items: center;
  margin: 0;
  padding: 0;
  border: 0;
  font-size: clamp(0.66rem, 1.45vmin, 0.82rem);
  font-weight: 800;
  text-align: left;
  color: #fffaf0;
  white-space: nowrap;
}
#hud-stage {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #FFF4B1;
  text-shadow: 0 1px 3px rgba(0,0,0,0.38);
}
#hud-moves {
  min-width: clamp(50px, 8vmin, 68px);
  padding: 4px 7px;
  border-radius: 999px;
  background: rgba(255,255,255,0.13);
  color: #fff;
  text-align: center;
}
#stage-num {
  padding: 4px 7px;
  border-radius: 999px;
  background: rgba(255,244,177,0.13);
  color: rgba(255,255,255,0.9);
  font-size: clamp(0.62rem, 1.35vmin, 0.76rem);
  font-weight: 900;
  letter-spacing: 0.08em;
}

/* ===== Game area ===== */
.game-wrap {
  position: absolute;
  inset: 0;
  z-index: 1;
  min-height: 0;
  border-radius: inherit;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
}
#gameCanvas { display: block; width: 100%; height: 100%; }

/* ===== Short, non-blocking picture-book captions ===== */
.journey-toast {
  position: absolute;
  z-index: 8;
  left: 50%;
  top: clamp(60px, 12%, 82px);
  max-width: min(72%, 620px);
  min-height: 36px;
  padding: 7px 18px;
  border: 1.5px solid rgba(255,255,255,0.82);
  border-radius: 999px;
  background: rgba(25,75,80,0.82);
  box-shadow: 0 5px 16px rgba(20,52,57,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
  color: #fffdf1;
  font-size: clamp(0.72rem, 1.7vmin, 0.95rem);
  font-weight: 900;
  line-height: 1.45;
  text-align: center;
  white-space: pre-line;
  pointer-events: none;
  opacity: 0;
  transform: translate(-50%, -8px);
  transition: opacity 180ms ease, transform 220ms ease;
}
.journey-toast.show {
  opacity: 1;
  transform: translate(-50%, 0);
}
.journey-toast.discovery {
  background: rgba(79,72,132,0.88);
  border-color: rgba(255,241,164,0.9);
  color: #fffbd7;
}

/* ===== Confetti ===== */
.confetti-container {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 10; overflow: hidden;
  overscroll-behavior: none;
}
.confetti-piece { position: absolute; animation: cfall 2.5s ease-out forwards; }
@keyframes cfall {
  0%   { transform: translateY(-10px) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* ===== Overlay ===== */
.overlay {
  position: absolute; inset: 0; z-index: 20;
  display: flex; align-items: center; justify-content: center;
  background: rgba(43,88,99,0.5);
  backdrop-filter: blur(4px);
  animation: fadeIn 0.25s ease;
}
.overlay.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.ov-card {
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  padding: 32px 32px 24px;
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  max-width: 320px;
  width: 85vw;
}
.ov-icon  { font-size: 3.5rem; line-height: 1; }
.ov-title {
  font-size: 1.2rem; font-weight: 900;
  background: linear-gradient(135deg, #4CAF50, #81C784);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  white-space: nowrap;
}
.ov-msg { font-size: 0.9rem; font-weight: 700; color: var(--text); white-space: pre-line; line-height: 1.6; }

/* Cutscene full-image mode */
.ov-card.cutscene-mode { max-width: 360px; padding: 16px 16px 20px; gap: 10px; }
.ov-card.cutscene-mode .ov-icon { width: 100%; font-size: unset; line-height: unset; }
.cutscene-img {
  width: 100%; border-radius: 16px;
  object-fit: cover; aspect-ratio: 16/9;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}
.cutscene-scene {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 16px;
  background-position: center;
  background-size: cover;
  box-shadow: 0 4px 16px rgba(51,76,82,0.16);
}
.cutscene-scene::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(111,195,218,0.08));
  pointer-events: none;
}
.cutscene-mom,
.cutscene-pono {
  position: absolute;
  z-index: 1;
  bottom: -9%;
  height: 94%;
  object-fit: contain;
  filter: drop-shadow(0 4px 5px rgba(58,68,57,0.17));
}
.cutscene-mom { right: 7%; }
.cutscene-pono { left: 12%; height: 64%; bottom: -6%; }
.cutscene-hearts {
  position: absolute;
  z-index: 2;
  left: 45%;
  top: 20%;
  color: #ff7186;
  font-size: clamp(1rem, 4vmin, 1.7rem);
  text-shadow: 0 2px 4px rgba(255,255,255,0.85);
}
.ov-card.cutscene-mode .ov-title {
  font-size: 1rem; white-space: pre-line; line-height: 1.6;
}
.ov-btn {
  margin-top: 4px; padding: 14px 36px;
  border: none; border-radius: 50px;
  font-family: inherit; font-size: 1.05rem; font-weight: 900;
  background: linear-gradient(135deg, #4CAF50, #81C784);
  color: #fff; cursor: pointer;
  box-shadow: 0 4px 16px rgba(76,175,80,0.4);
  transition: transform 0.15s;
}
.ov-btn:active { transform: scale(0.95); }
.ov-back {
  display: block; font-size: 0.85rem;
  color: #A89585; text-decoration: none; text-align: center; font-weight: 700;
}
.ov-back.hidden { display: none; }

#landscape-notice {
  display: none;
  position: fixed; inset: 0; z-index: 10050;
  background: #1a3a4a;
  flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  color: white; text-align: center; padding: 40px;
  font-family: 'Zen Maru Gothic', sans-serif;
}
#landscape-notice .rotate-icon { font-size: 64px; animation: rotateHintV 2s ease-in-out infinite; }
@keyframes rotateHintV {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(-90deg); }
}
#landscape-notice p { font-size: 18px; line-height: 1.6; }
.landscape-back {
  display: inline-flex;
  min-width: 168px;
  min-height: 48px;
  align-items: center;
  justify-content: center;
  padding: 10px 22px;
  border: 2px solid rgba(255,255,255,0.78);
  border-radius: 999px;
  color: #fff;
  background: rgba(255,255,255,0.12);
  font-size: 0.95rem;
  font-weight: 900;
  text-decoration: none;
}
.tut-dim { position:fixed;inset:0;z-index:9995;background:rgba(93,78,55,0.6);pointer-events:auto; }
.tut-dim.hidden { display:none; }
.tut-bubble { position:fixed;z-index:9997;background:#fff;border-radius:16px;padding:12px 12px;max-width:none;box-shadow:0 4px 20px rgba(93,78,55,0.3);font-size:0.95rem;font-weight:700;color:#5D4E37;line-height:1.6;text-align:center;white-space:nowrap;animation:tutPopIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.tut-bubble.hidden { display:none; }
@keyframes tutPopIn { from{transform:scale(0.8) translate(-50%,-50%);opacity:0.5} to{transform:scale(1) translate(-50%,-50%);opacity:1} }
@keyframes heartFloat {
  0% { opacity:0; transform:translateY(10px) scale(0.6); }
  30% { opacity:1; transform:translateY(-5px) scale(1); }
  70% { opacity:1; transform:translateY(-10px) scale(1.1); }
  100% { opacity:0; transform:translateY(-20px) scale(0.8); }
}
.tut-next-btn { display:inline-flex;min-height:48px;align-items:center;justify-content:center;margin-top:10px;padding:10px 24px;border:none;border-radius:50px;background:linear-gradient(135deg,#60A5FA,#818CF8);color:#fff;font-family:inherit;font-size:0.85rem;font-weight:900;cursor:pointer; }

@media (orientation: landscape) and (max-height: 480px),
       (orientation: landscape) and (max-width: 853px) {
  .game-rail {
    top: 8px;
    left: 122px;
    width: min(292px, calc(100% - 132px));
    min-height: 44px;
    padding: 5px 9px;
  }
  .hud { gap: 5px; font-size: 0.7rem; }
  #hud-moves { min-width: 50px; padding: 3px 5px; }
  #stage-num { padding: 3px 5px; font-size: 0.66rem; }

  .ov-card,
  .ov-card.cutscene-mode {
    display: grid;
    grid-template-columns: minmax(150px, 0.9fr) minmax(220px, 1.1fr);
    grid-template-areas:
      'icon title'
      'icon message'
      'icon button'
      'icon back';
    column-gap: 16px;
    row-gap: 5px;
    width: min(720px, calc(100% - 24px));
    max-width: min(720px, calc(100% - 24px));
    max-height: calc(100% - 16px);
    padding: 12px 16px;
  }
  .ov-icon { grid-area: icon; }
  .ov-title { grid-area: title; white-space: normal; font-size: 1.05rem; }
  .ov-msg { grid-area: message; font-size: 0.78rem; line-height: 1.4; }
  .ov-btn {
    grid-area: button;
    min-height: 48px;
    margin: 0;
    padding: 10px 24px;
    font-size: 0.95rem;
  }
  .ov-back { grid-area: back; }
  .ov-card:not(.cutscene-mode) .ov-icon img {
    width: clamp(84px, 24vh, 112px) !important;
    height: clamp(84px, 24vh, 112px) !important;
  }
  .cutscene-img {
    width: 100%;
    max-height: calc(100dvh - 40px);
    object-fit: contain;
  }
}

@media (prefers-reduced-motion: reduce) {
  #landscape-notice .rotate-icon { animation: none; transform: rotate(-90deg); }
  .overlay { animation: none; }
  .journey-toast { transition: none; transform: translate(-50%, 0); }
  .confetti-piece, .tut-bubble { animation: none !important; }
}

</style>

<script>
// ===== Premium Gate =====
// [[feedback_ponotier_propagation]]: raw localStorage.getItem('pono_premium') 直接参照は
// tier v3 (free/book/sub 集合方式) から取り残される bypass になるため、PonoTier 経由に統一。
// 旧仕様 (pono_premium==='1' で通過) と同義の「free tier のみブロック」を PonoTier.isFree() で再現。
var __appBuild = window.__APP_BUILD__ === 1 || window.__APP_BUILD__ === '1';
var __tierBlocksSlide = !window.PonoTier || typeof window.PonoTier.isFree !== 'function' || window.PonoTier.isFree();
if (!__appBuild && __tierBlocksSlide) {
  location.replace('../play.html');
}

// ===== roundRect polyfill =====
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    r = r.map(v => Math.min(v, w / 2, h / 2));
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
  };
}

// ===== Preload character face images =====
const imgPono = new Image();
imgPono.src = '../assets/images/characters/pono/pono_face_circle.png';
const imgPonoWorld = new Image();
imgPonoWorld.src = '../assets/images/characters/pono/pono_003.png';
const imgWalkSheet = new Image();
imgWalkSheet.src = '../assets/images/characters/pono/pono_walk_sheet.png';
const WALK_FRAMES = 25;
const WALK_FPS = 12;
// Side-walk sprite sheet (35 frames @12fps, facing right)
const imgWalkSideSheet = new Image();
imgWalkSideSheet.src = '../assets/images/characters/pono/pono_walk_side_sheet.png';
const SIDE_WALK_FRAMES = 35;
const SIDE_WALK_SCALE = 1232 / 1132; // compensate taller canvas vs front
const imgMomFull = new Image();
imgMomFull.src = '../assets/images/Slide/adventure/mom_soft_style.webp';
const imgClueSheet = new Image();
imgClueSheet.src = '../assets/images/Slide/adventure/clue_sheet_3x2.webp';
const imgMoonClue = new Image();
imgMoonClue.src = '../assets/images/Slide/adventure/moonlight_clue.webp';

// ===== Tile types =====
// edges: [top, right, bottom, left] — 1 = path exits this edge
const TILE_TYPES = {
  H:     { edges: [0,1,0,1] },
  V:     { edges: [1,0,1,0] },
  TR:    { edges: [1,1,0,0] },
  RB:    { edges: [0,1,1,0] },
  BL:    { edges: [0,0,1,1] },
  LT:    { edges: [1,0,0,1] },
  CROSS: { edges: [1,1,1,1] },
  BLANK: { edges: [0,0,0,0] },
};

// ===== Level data =====
// solved: row-major cols×rows, null = empty space
// ── Stage backgrounds ──
// stageIdx (0-7) で直接参照。LEVELS と1対1対応
const STAGE_BGS = [
  '../assets/images/Slide/adventure/stage1_home_clearing_16x9.webp',
  '../assets/images/Slide/adventure/stage2_forest_gate_16x9.webp',
  '../assets/images/Slide/adventure/stage3_deep_forest_16x9.webp',
  '../assets/images/Slide/adventure/stage4_cave_entrance_16x9.webp',
  '../assets/images/Slide/adventure/stage5_luminous_cave_16x9.webp',

// 旧盤面で右へ曲がる区間は新盤面では下向きになるため、正面歩行の
// ポノが後ろ向きに進んで見えず、左→右の主方向も保てる。
const TRANSPOSE_TILE = {
  H: 'V', V: 'H',
  TR: 'BL', RB: 'RB', BL: 'TR', LT: 'LT',
  CROSS: 'CROSS', BLANK: 'BLANK',
};

function transposeVerticalLevelToLeftRight(level) {
  const nextCols = level.rows;
  const nextRows = level.cols;
  const nextSolved = new Array(level.cols * level.rows);

  for (let row = 0; row < level.rows; row++) {
    for (let col = 0; col < level.cols; col++) {
      const nextRow = col;
      const nextCol = row;
      const tile = level.solved[row * level.cols + col];
      nextSolved[nextRow * nextCols + nextCol] = tile === null ? null : TRANSPOSE_TILE[tile];
    }
  }

  return {
    ...level,
    cols: nextCols,
    rows: nextRows,
    start: { row: level.start.col, side: 'left' },
    goal: { row: level.goal.col, side: 'right' },
    solved: nextSolved,
  };
}

function resize() {
  const rect = wrap.getBoundingClientRect();
  const oldCW = CW;
  const oldCH = CH;
  CW = canvas.width  = Math.floor(rect.width);
  CH = canvas.height = Math.floor(rect.height);
  calcLayout();
  if (journeyActor.active && oldCW > 0 && oldCH > 0) {
    const scaleX = CW / oldCW;
    const scaleY = CH / oldCH;
    journeyActor.x *= scaleX;
    journeyActor.y *= scaleY;
    journeyActor.path = journeyActor.path.map(function(point) {
      return { x: point.x * scaleX, y: point.y * scaleY };
    });
  }
}

function calcLayout() {
  const safe = Math.max(8, Math.min(20, CH * 0.025));
  const wrapRect = wrap.getBoundingClientRect();
  const hud = document.querySelector('.game-rail');
  const hudRect = hud ? hud.getBoundingClientRect() : null;
  const hudBottom = hudRect ? hudRect.bottom - wrapRect.top : 52;
  const contentTop = Math.max(safe + 48, hudBottom + safe);
  const markerReserve = Math.max(52, Math.min(118, CH * 0.17));
  const availW = Math.max(1, CW - (safe + markerReserve) * 2);
  const bottomSafe = safe;
  const availH = Math.max(1, CH - contentTop - bottomSafe);
  const maxByHeight = availH / (curRows + 0.2);
  const maxByTouch = CH * 0.215;
  cellSize = Math.floor(Math.min(availW / curCols, maxByHeight, maxByTouch));
  const gridW = cellSize * curCols;
  const gridH = cellSize * curRows;
  gridOX = Math.floor((CW - gridW) / 2);
  gridOY = Math.floor(contentTop + (availH - gridH) / 2);
}

  o.connect(g); g.connect(ac.destination);
  o.start(start); o.stop(start + dur);
}

// ===== Grid helpers =====
function getAdjacentIndices(idx) {
  const row = Math.floor(idx / curCols), col = idx % curCols;
  const result = [];
  if (row > 0) result.push(idx - curCols);
  if (row < curRows - 1) result.push(idx + curCols);
  if (col > 0) result.push(idx - 1);
  if (col < curCols - 1) result.push(idx + 1);
  return result;
}

function shuffleGrid(level) {
  curCols = level.cols;
  curRows = level.rows;
  grid = [...level.solved];
  emptyIdx = grid.indexOf(null);
  const n = level.shuffleMoves;
  let lastMoved = -1;
  for (let i = 0; i < n; i++) {
    const neighbors = getAdjacentIndices(emptyIdx);
    const candidates = neighbors.filter(idx => idx !== lastMoved);
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    lastMoved = emptyIdx;
    grid[emptyIdx] = grid[pick];
    grid[pick] = null;
    emptyIdx = pick;
  }
  // Ensure not already solved
  if (checkWin()) {
    shuffleGrid(level);
    return;
  }
  // The reverse of the last shuffle step is always a legal, reassuring first move.
  suggestedMoveIdx = lastMoved;
  hintDismissed = false;
}

// ===== Win detection (BFS) =====
function oppositeEdge(e) { return (e + 2) % 4; }

function getNeighborRC(row, col, edge) {
  const dr = [-1, 0, 1, 0];
  const dc = [0, 1, 0, -1];
  return [row + dr[edge], col + dc[edge]];
}

function checkWin() {
  const level = LEVELS[stageIdx];
  let startRow, startCol, startEdge;
  if (level.start.side === 'top')    { startRow = 0; startCol = level.start.col; startEdge = 0; }
  if (level.start.side === 'bottom') { startRow = curRows - 1; startCol = level.start.col; startEdge = 2; }
  if (level.start.side === 'left')   { startRow = level.start.row; startCol = 0; startEdge = 3; }
  if (level.start.side === 'right')  { startRow = level.start.row; startCol = curCols - 1; startEdge = 1; }

  let goalRow, goalCol, goalExitEdge;
  if (level.goal.side === 'top')    { goalRow = 0; goalCol = level.goal.col; goalExitEdge = 0; }
  if (level.goal.side === 'bottom') { goalRow = curRows - 1; goalCol = level.goal.col; goalExitEdge = 2; }
  if (level.goal.side === 'left')   { goalRow = level.goal.row; goalCol = 0; goalExitEdge = 3; }
  if (level.goal.side === 'right')  { goalRow = level.goal.row; goalCol = curCols - 1; goalExitEdge = 1; }

  const queue = [{ row: startRow, col: startCol, fromEdge: startEdge }];
  const visited = new Set();

  while (queue.length > 0) {
    const { row, col, fromEdge } = queue.shift();
    const key = `${row},${col}`;
    if (visited.has(key)) continue;
    visited.add(key);
    if (row < 0 || row >= curRows || col < 0 || col >= curCols) continue;

    const idx = row * curCols + col;
    const tileKey = grid[idx];
    if (!tileKey || tileKey === 'BLANK') continue;

    const edges = TILE_TYPES[tileKey].edges;
    if (!edges[fromEdge]) continue;

    for (let e = 0; e < 4; e++) {
      if (e === fromEdge || !edges[e]) continue;
      if (row === goalRow && col === goalCol && e === goalExitEdge) return true;
      const [nr, nc] = getNeighborRC(row, col, e);
      if (nr >= 0 && nr < curRows && nc >= 0 && nc < curCols) {
        queue.push({ row: nr, col: nc, fromEdge: oppositeEdge(e) });
      }
    }
  }
  return false;
}

// ===== Trace winning path (for celebration animation) =====
function traceWinPath() {
  const level = LEVELS[stageIdx];
  let startRow, startCol, startEdge;
  if (level.start.side === 'top')    { startRow = 0; startCol = level.start.col; startEdge = 0; }
  if (level.start.side === 'bottom') { startRow = curRows - 1; startCol = level.start.col; startEdge = 2; }
  if (level.start.side === 'left')   { startRow = level.start.row; startCol = 0; startEdge = 3; }
  if (level.start.side === 'right')  { startRow = level.start.row; startCol = curCols - 1; startEdge = 1; }

  let goalRow, goalCol, goalExitEdge;
  if (level.goal.side === 'top')    { goalRow = 0; goalCol = level.goal.col; goalExitEdge = 0; }
  if (level.goal.side === 'bottom') { goalRow = curRows - 1; goalCol = level.goal.col; goalExitEdge = 2; }
  if (level.goal.side === 'left')   { goalRow = level.goal.row; goalCol = 0; goalExitEdge = 3; }
  if (level.goal.side === 'right')  { goalRow = level.goal.row; goalCol = curCols - 1; goalExitEdge = 1; }

  const drDir = [-1, 0, 1, 0];
  const dcDir = [0, 1, 0, -1];

  // BFS to find correct path through tiles (handles CROSS tiles)
  // State: { row, col, fromEdge, path[] }
  const queue = [{ row: startRow, col: startCol, fromEdge: startEdge, trail: [] }];
  const visited = new Set();
  let foundTrail = null;
  let foundGoalEdge = -1;

  while (queue.length > 0) {
    const cur = queue.shift();
    const r = cur.row, c = cur.col, fe = cur.fromEdge;
    if (r < 0 || r >= curRows || c < 0 || c >= curCols) continue;
    const vKey = `${r},${c},${fe}`;
    if (visited.has(vKey)) continue;
    visited.add(vKey);

    const idx = r * curCols + c;
    const tileKey = grid[idx];
    if (!tileKey || tileKey === 'BLANK') continue;
    const edges = TILE_TYPES[tileKey].edges;
    if (!edges[fe]) continue;

    const trail = cur.trail.concat({ row: r, col: c });

    for (let e = 0; e < 4; e++) {
      if (e === fe || !edges[e]) continue;
      if (r === goalRow && c === goalCol && e === goalExitEdge) {
        foundTrail = trail;
        foundGoalEdge = e;
        break;
      }
      const [nr, nc] = getNeighborRC(r, c, e);
      queue.push({ row: nr, col: nc, fromEdge: oppositeEdge(e), trail: trail });
    }
    if (foundTrail) break;
  }

  // Build final path: entry → cells → exit
  const path = [];
  // Entry point (one cell outside grid on start side)
  path.push({ row: startRow - drDir[oppositeEdge(startEdge)],
              col: startCol - dcDir[oppositeEdge(startEdge)] });
  if (foundTrail) {
    foundTrail.forEach(p => path.push(p));
    // Exit point (one cell beyond goal)
    path.push({ row: goalRow + drDir[foundGoalEdge],
                col: goalCol + dcDir[foundGoalEdge] });
  }
  return path;
}

  let startRow, startCol, startEdge;
  if (level.start.side === 'top')    { startRow = 0; startCol = level.start.col; startEdge = 0; }
  if (level.start.side === 'bottom') { startRow = curRows - 1; startCol = level.start.col; startEdge = 2; }
  if (level.start.side === 'left')   { startRow = level.start.row; startCol = 0; startEdge = 3; }
  if (level.start.side === 'right')  { startRow = level.start.row; startCol = curCols - 1; startEdge = 1; }

  const connected = new Set();
  const visited = new Set();
  const queue = [{ row: startRow, col: startCol, fromEdge: startEdge }];

  while (queue.length > 0) {
    const cur = queue.shift();
    if (cur.row < 0 || cur.row >= curRows || cur.col < 0 || cur.col >= curCols) continue;
    const visitKey = `${cur.row},${cur.col},${cur.fromEdge}`;
    if (visited.has(visitKey)) continue;
    visited.add(visitKey);

    const idx = cur.row * curCols + cur.col;
    const tileKey = grid[idx];
    if (!tileKey || tileKey === 'BLANK') continue;
    const edges = TILE_TYPES[tileKey].edges;
    if (!edges[cur.fromEdge]) continue;
    connected.add(idx);

    for (let edge = 0; edge < 4; edge++) {
      if (edge === cur.fromEdge || !edges[edge]) continue;
      const next = getNeighborRC(cur.row, cur.col, edge);
      if (next[0] >= 0 && next[0] < curRows && next[1] >= 0 && next[1] < curCols) {
        queue.push({ row: next[0], col: next[1], fromEdge: oppositeEdge(edge) });
      }
    }
  }
  return connected;
}

function drawBoardAtmosphere(now) {
  const th = getTheme();
  const centerX = gridOX + curCols * cellSize / 2;
  const centerY = gridOY + curRows * cellSize / 2;
  const radius = Math.max(curCols * cellSize, curRows * cellSize) * 0.72;

  ctx.save();
  const clearing = ctx.createRadialGradient(centerX, centerY, radius * 0.05,
    centerX, centerY, radius);
  clearing.addColorStop(0, 'rgba(255,248,211,0.12)');
  clearing.addColorStop(0.58, 'rgba(255,248,211,0.03)');
  clearing.addColorStop(1, 'rgba(5,23,27,0.07)');
  ctx.fillStyle = clearing;
  ctx.fillRect(0, 0, CW, CH);

  const drift = reducedMotionQuery.matches ? 0 : now * 0.00018;
  ctx.fillStyle = th.mote;
  for (let i = 0; i < 12; i++) {
    const px = gridOX - cellSize * 0.42 + ((i * 67) % 113) / 112 * (curCols * cellSize + cellSize * 0.84);
    const baseY = gridOY - cellSize * 0.18 + ((i * 43) % 97) / 96 * (curRows * cellSize + cellSize * 0.36);
    const py = baseY + Math.sin(drift * (8 + i) + i * 1.7) * Math.min(5, cellSize * 0.04);
    ctx.globalAlpha = 0.14 + (i % 4) * 0.055;
    ctx.beginPath();
    ctx.arc(px, py, Math.max(1, cellSize * (0.009 + (i % 3) * 0.004)), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function traceTileRoad(x, y, size, edges) {
  const cx = x + size / 2;
  const cy = y + size / 2;
  const openEdges = [];
  for (let edge = 0; edge < 4; edge++) if (edges[edge]) openEdges.push(edge);

  ctx.beginPath();
  if (openEdges.length === 2) {
    const a = openEdges[0], b = openEdges[1];
    const pa = edgePoint(x, y, size, a);
    const pb = edgePoint(x, y, size, b);
    ctx.moveTo(pa.x, pa.y);
    if (Math.abs(a - b) === 2) ctx.lineTo(pb.x, pb.y);
    else ctx.quadraticCurveTo(cx, cy, pb.x, pb.y);
  } else {
    for (const edge of openEdges) {
      const p = edgePoint(x, y, size, edge);
      ctx.moveTo(cx, cy);
      ctx.lineTo(p.x, p.y);
    }
  }
}

function drawRoadMaterial(x, y, size, edges, th) {
  const cx = x + size / 2;
  const cy = y + size / 2;
  const openEdges = [];
  for (let edge = 0; edge < 4; edge++) if (edges[edge]) openEdges.push(edge);

  ctx.save();
  ctx.globalAlpha = 0.28;
  for (let i = 0; i < openEdges.length; i++) {
    const point = edgePoint(x, y, size, openEdges[i]);
    const mx = (cx + point.x) / 2;
    const my = (cy + point.y) / 2;
    const dx = point.x - cx;
    const dy = point.y - cy;
    const length = Math.hypot(dx, dy) || 1;
    const nx = -dy / length;
    const ny = dx / length;

    if (th.roadStyle === 'wood') {
      const half = size * 0.075;
      ctx.strokeStyle = th.pathBorder;
      ctx.lineWidth = Math.max(1, size * 0.018);
      ctx.beginPath();
      ctx.moveTo(mx - nx * half, my - ny * half);
      ctx.lineTo(mx + nx * half, my + ny * half);
      ctx.stroke();
    } else if (th.roadStyle === 'stone') {
      ctx.fillStyle = th.pathLight;
      ctx.beginPath();
      ctx.ellipse(mx + nx * size * 0.025, my + ny * size * 0.025,
        Math.max(1.5, size * 0.028), Math.max(1, size * 0.016), i * 0.8, 0, Math.PI * 2);
      ctx.fill();
    } else {
      const starR = Math.max(1.8, size * 0.027);
      ctx.strokeStyle = th.pathLight;
      ctx.lineWidth = Math.max(1, size * 0.014);
      ctx.beginPath();
      ctx.moveTo(mx - starR, my); ctx.lineTo(mx + starR, my);
      ctx.moveTo(mx, my - starR); ctx.lineTo(mx, my + starR);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawTile(x, y, size, tileKey, visualState) {
  const th = getTheme();
  const visual = visualState || {};
  const inset = Math.max(2, size * 0.038);
  const radius = size * 0.13;
  const pulse = reducedMotionQuery.matches ? 0 : Math.sin((visual.now || 0) * 0.005 + (visual.index || 0));
  const lift = visual.movable && !visual.animating ? Math.max(0, pulse) * Math.min(1.5, size * 0.018) : 0;
  y -= lift;

  ctx.save();
  const slab = ctx.createLinearGradient(x, y + inset, x, y + size - inset);
  const isBlank = tileKey === 'BLANK';
  slab.addColorStop(0, isBlank ? th.slabBlankTop : th.slabTop);
  slab.addColorStop(1, isBlank ? th.slabBlankBottom : th.slabBottom);

  ctx.shadowColor = visual.movable ? th.moveGlow : th.slabShadow;
  ctx.shadowBlur = visual.movable ? Math.max(9, size * 0.17) : Math.max(4, size * 0.08);
  ctx.shadowOffsetY = Math.max(2, size * 0.035);
  ctx.beginPath();
  ctx.roundRect(x + inset, y + inset, size - inset * 2, size - inset * 2, radius);
  ctx.fillStyle = slab;
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = visual.movable ? th.move : th.slabBorder;
  ctx.lineWidth = visual.movable ? Math.max(2, size * 0.034) : Math.max(1, size * 0.018);
  ctx.stroke();

  // Repeated bitmap texture is intentionally replaced with a few stable flecks.
  ctx.fillStyle = th.slabBorder;
  for (let i = 0; i < 4; i++) {
    const seed = (visual.index || 0) * 19 + i * 31;
    const fx = x + size * (0.18 + ((seed * 7) % 57) / 100);
    const fy = y + size * (0.18 + ((seed * 11) % 59) / 100);
    ctx.globalAlpha = 0.09 + (i % 2) * 0.04;
    ctx.beginPath();
    ctx.arc(fx, fy, Math.max(1, size * (0.012 + (i % 3) * 0.004)), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (isBlank) {
    ctx.restore();
    return;
  }

  const edges = TILE_TYPES[tileKey].edges;
  const pathW = size * 0.235;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (visual.connected) {
    ctx.save();
    ctx.shadowColor = th.connectedGlow;
    ctx.shadowBlur = Math.max(10, size * 0.18);
    ctx.strokeStyle = th.connectedGlow;
    ctx.lineWidth = pathW + Math.max(8, size * 0.11);
    traceTileRoad(x, y, size, edges);
    ctx.stroke();
    ctx.restore();
  }

  ctx.strokeStyle = th.pathBorder;
  ctx.lineWidth = pathW + Math.max(3, size * 0.052);
  traceTileRoad(x, y, size, edges);
  ctx.stroke();

  ctx.strokeStyle = th.path;
  ctx.lineWidth = pathW;
  traceTileRoad(x, y, size, edges);
  ctx.stroke();

  ctx.strokeStyle = th.pathLight;
  ctx.globalAlpha = 0.34;
  ctx.lineWidth = Math.max(1.5, size * 0.035);
  traceTileRoad(x, y, size, edges);
  ctx.stroke();
  ctx.globalAlpha = 1;
  drawRoadMaterial(x, y, size, edges, th);

  if (visual.connected) {
    ctx.strokeStyle = th.connected;
    ctx.lineWidth = Math.max(2, size * 0.035);
    ctx.setLineDash([Math.max(5, size * 0.09), Math.max(5, size * 0.09)]);
    ctx.lineDashOffset = reducedMotionQuery.matches ? 0 : -(visual.now || 0) * 0.018;
    traceTileRoad(x, y, size, edges);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();
}

function drawEmptySlot(now) {
  const th = getTheme();
  const row = Math.floor(emptyIdx / curCols), col = emptyIdx % curCols;
  const x = gridOX + col * cellSize, y = gridOY + row * cellSize;
  const rimInset = Math.max(2, cellSize * 0.035);
  const wellInset = Math.max(7, cellSize * 0.105);
  const rim = ctx.createLinearGradient(x, y, x, y + cellSize);
  rim.addColorStop(0, 'rgba(255,255,232,0.72)');
  rim.addColorStop(0.42, th.slabBorder);
  rim.addColorStop(1, th.slabBottom);
  const depthWell = ctx.createLinearGradient(x, y + wellInset, x, y + cellSize - wellInset);
  depthWell.addColorStop(0, th.emptyBottom);
  depthWell.addColorStop(0.36, th.emptyTop);
  depthWell.addColorStop(1, 'rgba(3,18,24,0.96)');

  ctx.save();
  // Raised lip: its drop shadow establishes the board surface above the hollow.
  ctx.shadowColor = 'rgba(5,24,26,0.42)';
  ctx.shadowBlur = Math.max(5, cellSize * 0.07);
  ctx.shadowOffsetY = Math.max(3, cellSize * 0.045);
  ctx.beginPath();
  ctx.roundRect(x + rimInset, y + rimInset,
    cellSize - rimInset * 2, cellSize - rimInset * 2, cellSize * 0.14);
  ctx.fillStyle = rim;
  ctx.fill();

  // Recessed inner well: a darker top edge and lower highlight make the hole physical.
  ctx.shadowColor = 'transparent';
  ctx.shadowOffsetY = 0;
  ctx.beginPath();
  ctx.roundRect(x + wellInset, y + wellInset,
    cellSize - wellInset * 2, cellSize - wellInset * 2, cellSize * 0.105);
  ctx.fillStyle = depthWell;
  ctx.fill();
  ctx.strokeStyle = 'rgba(3,17,22,0.76)';
  ctx.lineWidth = Math.max(3, cellSize * 0.052);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + wellInset * 1.35, y + cellSize - wellInset * 1.08);
  ctx.lineTo(x + cellSize - wellInset * 1.35, y + cellSize - wellInset * 1.08);
  ctx.strokeStyle = 'rgba(255,245,198,0.3)';
  ctx.lineWidth = Math.max(1.5, cellSize * 0.025);
  ctx.stroke();
  ctx.restore();
}

function drawMoveHint(index, now) {
  const th = getTheme();
  const row = Math.floor(index / curCols), col = index % curCols;
  const emptyRow = Math.floor(emptyIdx / curCols), emptyCol = emptyIdx % curCols;
  const dx = emptyCol - col, dy = emptyRow - row;
  const cx = gridOX + (col + 0.5) * cellSize + dx * cellSize * 0.26;
  const cy = gridOY + (row + 0.5) * cellSize + dy * cellSize * 0.26;
  const length = Math.max(9, cellSize * 0.14);
  const head = Math.max(4, cellSize * 0.065);
  const pulse = reducedMotionQuery.matches ? 1 : 0.82 + Math.sin(now * 0.006 + index) * 0.12;

  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.strokeStyle = th.move;
  ctx.fillStyle = th.move;
  ctx.shadowColor = th.moveGlow;
  ctx.shadowBlur = Math.max(6, cellSize * 0.09);
  ctx.lineWidth = Math.max(2.5, cellSize * 0.04);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - dx * length * 0.55, cy - dy * length * 0.55);
  ctx.lineTo(cx + dx * length * 0.45, cy + dy * length * 0.45);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + dx * length * 0.7, cy + dy * length * 0.7);
  ctx.lineTo(cx + dx * length * 0.25 - dy * head, cy + dy * length * 0.25 + dx * head);
  ctx.lineTo(cx + dx * length * 0.25 + dy * head, cy + dy * length * 0.25 - dx * head);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function edgePoint(x, y, size, edge) {
  const cx = x + size / 2, cy = y + size / 2;
  const gap = 3;
  if (edge === 0) return { x: cx, y: y + gap };      // top
  if (edge === 1) return { x: x + size - gap, y: cy }; // right
  if (edge === 2) return { x: cx, y: y + size - gap }; // bottom
  if (edge === 3) return { x: x + gap, y: cy };        // left
}

function drawGuideTrail(fromX, toX, y, active, now) {
  const th = getTheme();
  const direction = toX >= fromX ? 1 : -1;
  const head = Math.max(5, Math.min(11, cellSize * 0.075));
  ctx.save();
  ctx.strokeStyle = active ? th.connected : th.guide;
  ctx.fillStyle = active ? th.connected : th.guide;
  ctx.globalAlpha = active ? 0.96 : 0.7;
  ctx.shadowColor = active ? th.connectedGlow : 'transparent';
  ctx.shadowBlur = active ? Math.max(8, cellSize * 0.11) : 0;
  ctx.lineWidth = Math.max(2.5, cellSize * 0.032);
  ctx.lineCap = 'round';
  ctx.setLineDash([Math.max(5, cellSize * 0.08), Math.max(4, cellSize * 0.065)]);
  ctx.lineDashOffset = reducedMotionQuery.matches ? 0 : -now * 0.012;
  ctx.beginPath();
  ctx.moveTo(fromX, y);
  ctx.lineTo(toX - direction * head * 0.7, y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(toX, y);
  ctx.lineTo(toX - direction * head * 1.45, y - head * 0.82);
  ctx.lineTo(toX - direction * head * 1.45, y + head * 0.82);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawWorldLabel(label, x, y) {
  const fontSize = Math.max(9, Math.min(13, Math.floor(cellSize * 0.115)));
  ctx.save();
  ctx.font = `900 ${fontSize}px 'Zen Maru Gothic', sans-serif`;
  const width = ctx.measureText(label).width + fontSize * 1.15;
  const height = fontSize * 1.65;
  ctx.beginPath();
  ctx.roundRect(x - width / 2, y - height / 2, width, height, height / 2);
  ctx.fillStyle = 'rgba(20,48,42,0.78)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,245,190,0.64)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = '#FFF8D5';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y - 0.5);
  ctx.restore();
}

function getJourneyGeometry() {
  const level = LEVELS[stageIdx];
  const leftEdge = gridOX;
  const rightEdge = gridOX + curCols * cellSize;
  const startY = gridOY + level.start.row * cellSize + cellSize / 2;
  const goalY = gridOY + level.goal.row * cellSize + cellSize / 2;
  return {
    startX: leftEdge - cellSize * 0.58,
    startY: startY,
    entryX: leftEdge - cellSize * 1.25,
    goalX: rightEdge + cellSize * 0.56,
    goalY: goalY,
    discoverX: rightEdge + cellSize * 0.2,
    departX: rightEdge + cellSize * 1.35,
    leftEdge: leftEdge,
    rightEdge: rightEdge,
  };
}

function drawStartGoal(now, connectedSet) {
  const level = LEVELS[stageIdx];
  const geo = getJourneyGeometry();
  const startIdx = level.start.row * curCols;
  const startActive = connectedSet.has(startIdx);
  const ponoH = Math.max(52, Math.min(132, cellSize * 0.88));
  const ponoRatio = imgPonoWorld.naturalWidth > 0 && imgPonoWorld.naturalHeight > 0
    ? imgPonoWorld.naturalWidth / imgPonoWorld.naturalHeight : 0.7;
  const ponoW = ponoH * ponoRatio;

  if (!journeyActor.active && state === S.PLAYING) {
    ctx.save();
    ctx.fillStyle = 'rgba(10,30,28,0.2)';
    ctx.beginPath();
    ctx.ellipse(geo.startX, geo.startY + ponoH * 0.42,
      ponoW * 0.44, ponoH * 0.075, 0, 0, Math.PI * 2);
    ctx.fill();
    if (imgPonoWorld.complete && imgPonoWorld.naturalWidth > 0) {
      ctx.shadowColor = startActive ? getTheme().connectedGlow : 'rgba(5,20,18,0.22)';
      ctx.shadowBlur = startActive ? Math.max(10, cellSize * 0.14) : Math.max(4, cellSize * 0.05);
      ctx.drawImage(imgPonoWorld, geo.startX - ponoW / 2, geo.startY - ponoH / 2, ponoW, ponoH);
    } else {
      ctx.font = `${Math.floor(cellSize * 0.46)}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🐻', geo.startX, geo.startY);
    }
    ctx.restore();
    drawWorldLabel('ポノ', geo.startX,
      geo.startY + ponoH * 0.5 + Math.max(6, cellSize * 0.05));
  }

  drawGuideTrail(geo.startX + ponoW * 0.34,
    geo.leftEdge + Math.max(5, cellSize * 0.045), geo.startY, startActive, now);

  const goalIdx = level.goal.row * curCols + (curCols - 1);
  const goalTile = grid[goalIdx];
  const goalActive = connectedSet.has(goalIdx) && goalTile && goalTile !== 'BLANK' &&
    TILE_TYPES[goalTile].edges[1];
  const ringR = Math.max(21, Math.min(58, cellSize * 0.34));

  ctx.save();
  const goalGlow = ctx.createRadialGradient(
    geo.goalX, geo.goalY, ringR * 0.12, geo.goalX, geo.goalY, ringR);
  goalGlow.addColorStop(0, goalActive ? 'rgba(255,250,185,0.64)' : 'rgba(255,252,224,0.22)');
  goalGlow.addColorStop(0.72, goalActive ? getTheme().connectedGlow : 'rgba(225,243,236,0.12)');
  goalGlow.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = goalGlow;
  ctx.beginPath();
  ctx.arc(geo.goalX, geo.goalY, ringR, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  drawGuideTrail(geo.rightEdge - Math.max(5, cellSize * 0.04),
    geo.goalX - ringR * 0.42, geo.goalY, goalActive, now);

  // A solved board is only a road. The clue appears after Pono actually arrives.
  if (!clueDiscovered) {
    return;
  }

  if (level.goalIcon === 'mom') {
    if (imgMomFull.complete && imgMomFull.naturalWidth > 0) {
      const momH = Math.max(66, Math.min(160, cellSize * 1.15));
      const momW = momH * imgMomFull.naturalWidth / imgMomFull.naturalHeight;
      const momX = geo.goalX + cellSize * 0.12;
      ctx.drawImage(imgMomFull, momX - momW / 2, geo.goalY - momH / 2, momW, momH);
      drawWorldLabel('おかあさん', momX,
        geo.goalY + momH * 0.5 + Math.max(6, cellSize * 0.04));
    } else {
      ctx.font = `${Math.max(28, Math.floor(cellSize * 0.48))}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🐻', geo.goalX, geo.goalY);
    }
    return;
  }

  if (level.clueAsset === 'moonlight' && imgMoonClue.complete && imgMoonClue.naturalWidth > 0) {
    const moonSize = Math.max(48, Math.min(108, cellSize * 0.72));
    ctx.save();
    ctx.shadowColor = 'rgba(255,235,133,0.62)';
    ctx.shadowBlur = Math.max(10, cellSize * 0.16);
    ctx.drawImage(imgMoonClue,
      geo.goalX - moonSize / 2, geo.goalY - moonSize / 2, moonSize, moonSize);
    ctx.restore();
    return;
  }

  if (imgClueSheet.complete && imgClueSheet.naturalWidth > 0 && level.clueCell) {
    const sourceW = imgClueSheet.naturalWidth / 3;
    const sourceH = imgClueSheet.naturalHeight / 2;
    const clueSize = Math.max(48, Math.min(108, cellSize * 0.72));
    ctx.save();
    ctx.shadowColor = getTheme().connectedGlow;
    ctx.shadowBlur = Math.max(10, cellSize * 0.15);
    ctx.drawImage(imgClueSheet,
      level.clueCell[0] * sourceW, level.clueCell[1] * sourceH, sourceW, sourceH,
      geo.goalX - clueSize / 2, geo.goalY - clueSize / 2, clueSize, clueSize);
    ctx.restore();
  }
}

function drawJourneyActor(now) {
  if (!journeyActor.active) return;
  const fx = journeyActor.x;
  const fy = journeyActor.y;
  const walkH = Math.floor(cellSize * 0.58);
  const spriteElapsed = Math.max(0, now - journeyActor.t0);
  const isMoving = journeyActor.phase !== JOURNEY_PHASE.DISCOVERY;
  const frameClock = isMoving ? spriteElapsed : 0;
  const horizontal = Math.abs(journeyActor.dx || 1) >= Math.abs(journeyActor.dy || 0);

  ctx.save();
  ctx.fillStyle = 'rgba(10,30,28,0.2)';
  ctx.beginPath();
  ctx.ellipse(fx, fy + walkH * 0.42, walkH * 0.22, walkH * 0.055, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  if (horizontal && imgWalkSideSheet.complete && imgWalkSideSheet.naturalWidth > 0) {
    const sideH = Math.floor(walkH * SIDE_WALK_SCALE);
    const sourceW = imgWalkSideSheet.naturalWidth / SIDE_WALK_FRAMES;
    const sourceH = imgWalkSideSheet.naturalHeight;
    const sideW = Math.floor(sideH * sourceW / sourceH);
    const frameIdx = Math.floor(frameClock / (1000 / WALK_FPS)) % SIDE_WALK_FRAMES;
    const sourceX = frameIdx * sourceW;
    ctx.save();
    if ((journeyActor.dx || 1) < 0) {
      ctx.translate(fx, fy);
      ctx.scale(-1, 1);
      ctx.drawImage(imgWalkSideSheet, sourceX, 0, sourceW, sourceH,
        -sideW / 2, -sideH / 2, sideW, sideH);
    } else {
      ctx.drawImage(imgWalkSideSheet, sourceX, 0, sourceW, sourceH,
        fx - sideW / 2, fy - sideH / 2, sideW, sideH);
    }
    ctx.restore();
  } else if (imgWalkSheet.complete && imgWalkSheet.naturalWidth > 0) {
    const sourceW = imgWalkSheet.naturalWidth / WALK_FRAMES;
    const sourceH = imgWalkSheet.naturalHeight;
    const walkW = Math.floor(walkH * sourceW / sourceH);
    const frameIdx = Math.floor(frameClock / (1000 / WALK_FPS)) % WALK_FRAMES;
    ctx.drawImage(imgWalkSheet, frameIdx * sourceW, 0, sourceW, sourceH,
      fx - walkW / 2, fy - walkH / 2, walkW, walkH);
  } else {
    ctx.font = `${Math.floor(cellSize * 0.5)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🐻', fx, fy);
  }
}

function draw(now) {
  // Background image (stage-specific)
  var bgIdx = Math.min(stageIdx, stageBgImgs.length - 1);
  var bgImg = stageBgImgs[bgIdx];
  if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
    var iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
    var sc = Math.max(CW / iw, CH / ih);
    var dw = iw * sc, dh = ih * sc;
    ctx.drawImage(bgImg, (CW - dw) / 2, (CH - dh) / 2, dw, dh);
  } else {
    ctx.fillStyle = '#E8F5E9';
    ctx.fillRect(0, 0, CW, CH);
  }

  // The new plates already carry their own light. Keep only a very soft wash so
  // the board reads clearly without turning the illustration brown or gloomy.
  const wash = ctx.createLinearGradient(0, 0, 0, CH);
  wash.addColorStop(0, 'rgba(20,67,73,0.04)');
  wash.addColorStop(0.35, 'rgba(255,255,255,0)');
  wash.addColorStop(1, 'rgba(13,47,61,0.06)');
  ctx.fillStyle = wash;
  ctx.fillRect(0, 0, CW, CH);
  drawBoardAtmosphere(now);

  const total = curCols * curRows;
  const hasBoard = emptyIdx >= 0 && grid.length === total;
  const connectedSet = hasBoard ? getStartConnectedTileSet() : new Set();
  const hintVisible = hasBoard && state === S.PLAYING && moveCount === 0 &&
    !hintDismissed && !_slideTutActive && now >= hintReadyAt &&
    getAdjacentIndices(emptyIdx).includes(suggestedMoveIdx) && grid[suggestedMoveIdx] !== null;
  if (hasBoard) drawEmptySlot(now);

  // Draw tiles
  for (let i = 0; i < total; i++) {
    const tileKey = grid[i];
    if (!tileKey) continue;
    const row = Math.floor(i / curCols), col = i % curCols;
    let x = gridOX + col * cellSize;
    let y = gridOY + row * cellSize;

    if (animating && i === anim.idx) {
      x = anim.curX;
      y = anim.curY;
    } else if (hintVisible && i === suggestedMoveIdx && !reducedMotionQuery.matches) {
      const emptyRow = Math.floor(emptyIdx / curCols), emptyCol = emptyIdx % curCols;
      const nudge = (Math.sin(now * 0.006) + 1) * cellSize * 0.018;
      x += (emptyCol - col) * nudge;
      y += (emptyRow - row) * nudge;
    }

    drawTile(x, y, cellSize, tileKey, {
      index: i,
      now: now,
      connected: connectedSet.has(i),
      movable: hintVisible && i === suggestedMoveIdx && !animating,
      animating: animating && i === anim.idx,
    });
  }

  if (hintVisible && !animating) {
    drawMoveHint(suggestedMoveIdx, now);
  }

  // World markers and the single persistent actor are complementary layers.
  if (hasBoard) drawStartGoal(now, connectedSet);
  if (journeyActor.active) drawJourneyActor(now);

  // Pause overlay on canvas
  if (state === S.PAUSED) {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.font = `900 ${Math.floor(CW * 0.09)}px 'Zen Maru Gothic', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText('⏸ ポーズちゅう', CW / 2, CH / 2);
  }
}

// ===== Update animation =====
function updateAnim(now) {
  if (!animating) return;
  const t = Math.min((now - anim.t0) / SLIDE_DUR, 1);
  const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  anim.curX = anim.fromX + (anim.toX - anim.fromX) * ease;
  anim.curY = anim.fromY + (anim.toY - anim.fromY) * ease;

  if (t >= 1) {
    const oldEmpty = emptyIdx;
    grid[oldEmpty] = grid[anim.idx];
    grid[anim.idx] = null;
    emptyIdx = anim.idx;
    moveCount++;
    updateHUD();
    animating = false;

    if (!_slideTutActive && checkWin()) {
      onStageClear();
    }
  }
}

function showJourneyToast(message, discovery) {
  const toast = document.getElementById('journey-toast');
  if (!toast || !message) return;
  toast.textContent = message;
  toast.classList.toggle('discovery', Boolean(discovery));
  toast.classList.add('show');
  journeyToastHideAt = performance.now() + (discovery ? 2100 : 2400);
}

function updateJourneyToast(now) {
  if (!journeyToastHideAt || now < journeyToastHideAt) return;
  const toast = document.getElementById('journey-toast');
  if (toast) toast.classList.remove('show');
  journeyToastHideAt = 0;
}

function setJourneyPath(phase, points, duration, now) {
  journeyActor.active = true;
  journeyActor.phase = phase;
  journeyActor.path = points;
  journeyActor.progress = 0;
  journeyActor.t0 = now;
  journeyActor.duration = duration;
  journeyActor.x = points[0].x;
  journeyActor.y = points[0].y;
  journeyActor.dx = points.length > 1 ? points[1].x - points[0].x : 1;
  journeyActor.dy = points.length > 1 ? points[1].y - points[0].y : 0;
}

function updateJourneyPosition(now) {
  const points = journeyActor.path;
  if (!points || points.length === 0) return 1;
  const duration = Math.max(1, journeyActor.duration);
  const raw = Math.max(0, Math.min((now - journeyActor.t0) / duration, 1));
  const eased = raw < 0.5 ? 2 * raw * raw : 1 - Math.pow(-2 * raw + 2, 2) / 2;
  journeyActor.progress = eased;
  const exact = eased * (points.length - 1);
  const fromIndex = Math.min(Math.floor(exact), points.length - 1);
  const toIndex = Math.min(fromIndex + 1, points.length - 1);
  const mix = exact - fromIndex;
  const from = points[fromIndex];
  const to = points[toIndex];
  journeyActor.x = from.x + (to.x - from.x) * mix;
  journeyActor.y = from.y + (to.y - from.y) * mix;
  if (to.x !== from.x || to.y !== from.y) {
    journeyActor.dx = to.x - from.x;
    journeyActor.dy = to.y - from.y;
  }
  return raw;
}

function finishJourneyIntro(now) {
  if (journeyActor.phase !== JOURNEY_PHASE.INTRO) return;
  const geo = getJourneyGeometry();
  journeyActor.active = false;
  journeyActor.phase = JOURNEY_PHASE.PLAYING;
  journeyActor.x = geo.startX;
  journeyActor.y = geo.startY;
  state = S.PLAYING;
  prepauseState = S.PLAYING;
  hintReadyAt = now + 1500;
  setPauseAvailable(true);
}

function finishExitWithDiscovery(now) {
  if (journeyActor.phase !== JOURNEY_PHASE.EXIT) return;
  const geo = getJourneyGeometry();
  journeyActor.phase = JOURNEY_PHASE.DISCOVERY;
  journeyActor.active = true;
  journeyActor.path = [{ x: geo.discoverX, y: geo.goalY }];
  journeyActor.x = geo.discoverX;
  journeyActor.y = geo.goalY;
  journeyActor.t0 = now;
  journeyActor.duration = reducedMotionQuery.matches ? 700 : 1500;
  clueDiscovered = true;
  showJourneyToast(LEVELS[stageIdx].discoveryMsg, true);
}

function beginJourneyDeparture(now) {
  const geo = getJourneyGeometry();
  setJourneyPath(JOURNEY_PHASE.DEPARTING, [
    { x: journeyActor.x, y: journeyActor.y },
    { x: geo.departX, y: geo.goalY },
  ], reducedMotionQuery.matches ? 1 : 620, now);
}

function queueGameClearReward() {
  if (gameClearQueued) return;
  gameClearQueued = true;
  state = S.GAME_CLEAR;
  setPauseAvailable(false);
  if (window.triggerFirstClearReward) {
    window.triggerFirstClearReward('slide', {
      onClose: function() { showOverlay('gameclear'); }
    }).then(function(shown) {
      if (!shown) showOverlay('gameclear');
    }).catch(function() { showOverlay('gameclear'); });
  } else {
    showOverlay('gameclear');
  }
}

function finishJourneyDeparture() {
  if (journeyActor.phase !== JOURNEY_PHASE.DEPARTING) return;
  journeyActor.active = false;
  journeyActor.phase = JOURNEY_PHASE.DONE;
  if (journeyActor.tutorial) return;
  if (stageIdx >= LEVELS.length - 1) {
    queueGameClearReward();
  } else if (LEVELS[stageIdx].cutscene) {
    showCutscene();
  } else {
    nextStage();
  }
}

function updateJourney(now) {
  if (!journeyActor.active || state === S.PAUSED) return;

  if (journeyActor.phase === JOURNEY_PHASE.INTRO) {
    if (reducedMotionQuery.matches) {
      finishJourneyIntro(now);
      return;
    }
    if (updateJourneyPosition(now) >= 1) finishJourneyIntro(now);
    return;
  }

  if (journeyActor.phase === JOURNEY_PHASE.EXIT) {
    if (reducedMotionQuery.matches) {
      finishExitWithDiscovery(now);
      return;
    }
    if (updateJourneyPosition(now) >= 1) finishExitWithDiscovery(now);
    return;
  }

  if (journeyActor.phase === JOURNEY_PHASE.DISCOVERY) {
    if (now - journeyActor.t0 >= journeyActor.duration) beginJourneyDeparture(now);
    return;
  }

  if (journeyActor.phase === JOURNEY_PHASE.DEPARTING) {
    if (reducedMotionQuery.matches) {
      finishJourneyDeparture();
      return;
    }
    if (updateJourneyPosition(now) >= 1) finishJourneyDeparture();
  }
}

// ===== Game loop =====
function loop(ts) {
  requestAnimationFrame(loop);
  updateAnim(ts);
  updateJourney(ts);
  updateJourneyToast(ts);
  draw(ts);
}

// ===== Input =====
function handleTap(px, py) {
  if (state !== S.PLAYING || animating || journeyActor.active) return false;

  const col = Math.floor((px - gridOX) / cellSize);
  const row = Math.floor((py - gridOY) / cellSize);
  if (col < 0 || col >= curCols || row < 0 || row >= curRows) return false;

  const tappedIdx = row * curCols + col;
  if (grid[tappedIdx] === null) return false;

  const eRow = Math.floor(emptyIdx / curCols), eCol = emptyIdx % curCols;
  const dist = Math.abs(eRow - row) + Math.abs(eCol - col);
  if (dist !== 1) return false;

  // Start slide animation
  animating = true;
  anim.idx = tappedIdx;
  anim.fromX = gridOX + col * cellSize;
  anim.fromY = gridOY + row * cellSize;
  anim.toX   = gridOX + eCol * cellSize;
  anim.toY   = gridOY + eRow * cellSize;
  anim.curX  = anim.fromX;
  anim.curY  = anim.fromY;
  anim.t0    = performance.now();
  hintDismissed = true;
  playSlideSound();
  return true;
}

wrap.addEventListener('pointerdown', e => {
  if (state === S.PAUSED || _slideTutActive) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) * (CW / rect.width);
  const py = (e.clientY - rect.top) * (CH / rect.height);
  handleTap(px, py);
});

// ===== Stage clear =====
function onStageClear() {
  state = S.TRAVELLING;
  setPauseAvailable(false);
  playClearSound();
  if (window.incrementStat) window.incrementStat('slide_clears', 1);
  const route = traceWinPath();
  const geo = getJourneyGeometry();
  const points = route.map(function(point) {
    return {
      x: gridOX + (point.col + 0.5) * cellSize,
      y: gridOY + (point.row + 0.5) * cellSize,
    };
  });
  if (points.length === 0) points.push({ x: geo.startX, y: geo.startY });
  points[0] = { x: geo.startX, y: geo.startY };
  points[points.length - 1] = { x: geo.discoverX, y: geo.goalY };
  journeyActor.tutorial = false;
  setJourneyPath(JOURNEY_PHASE.EXIT, points,
    reducedMotionQuery.matches ? 1 : Math.max(900, (points.length - 1) * 260),
    performance.now());
}

// ===== Start / Next =====
function beginStage(index) {
  overlay.classList.add('hidden');
  stageIdx = index;
  moveCount = 0;
  clueDiscovered = false;
  hintDismissed = false;
  animating = false;
  shuffleGrid(LEVELS[stageIdx]);
  calcLayout();
  updateHUD();
  updatePauseButton(false);
  setPauseAvailable(false);
  const now = performance.now();
  const geo = getJourneyGeometry();
  journeyActor.tutorial = false;
  state = S.TRAVELLING;
  prepauseState = S.TRAVELLING;
  setJourneyPath(JOURNEY_PHASE.INTRO, [
    { x: geo.entryX, y: geo.startY },
    { x: geo.startX, y: geo.startY },
  ], reducedMotionQuery.matches ? 1 : 650, now);
  showJourneyToast(LEVELS[stageIdx].introMsg, false);
}

function startGame() {
  gameClearQueued = false;
  journeyActor.phase = JOURNEY_PHASE.INTRO;
  beginStage(0);
}

function nextStage() {
  journeyActor.phase = JOURNEY_PHASE.INTRO;
  beginStage(Math.min(stageIdx + 1, LEVELS.length - 1));
}

// ===== Cutscene =====
function showCutscene() {
  var level = LEVELS[stageIdx];
  if (!level || !level.cutscene) { nextStage(); return; }
  var card  = document.querySelector('.ov-card');
  var icon  = document.getElementById('ov-icon');
  var title = document.getElementById('ov-title');
  var msg   = document.getElementById('ov-msg');
  var btn   = document.getElementById('ov-btn');
  setPauseAvailable(false);
  overlay.classList.remove('hidden');
  card.classList.add('cutscene-mode');
  icon.innerHTML = '<div class="cutscene-scene" style="background-image:url(&quot;' + STAGE_BGS[stageIdx] + '&quot;)">' +
    '<img src="../assets/images/Slide/adventure/mom_soft_style.webp" class="cutscene-mom" alt="おかあさん">' +
    '</div>';

  title.style.whiteSpace = 'pre-line';
  msg.textContent = '';
  btn.textContent = 'つぎへ ▶';

}

// ===== Overlay button =====
(function() {
  const ovBtn = document.getElementById('ov-btn');
  function execAction() {
    const t = ovBtn.dataset.ovType;
    if (t === 'cutscene-next') {
      nextStage();
    } else if (t === 'tutorial-start') {
      overlay.classList.add('hidden');
      showTutorial();

  ovBtn.addEventListener('click', execAction);
})();

// ===== Pause =====
function updatePauseButton(isPaused) {
  const button = document.getElementById('btn-pause');
  button.textContent = isPaused ? '▶' : '⏸';
  button.setAttribute('aria-label', isPaused ? 'さいかい' : 'ポーズ');
}

function togglePause() {
  if (_slideTutActive) return;
  if (state === S.PAUSED) {
    state = prepauseState;
    updatePauseButton(false);
    if (bgmEnabled) bgm.play().catch(() => {});
  } else if (state === S.PLAYING && !animating && !journeyActor.active) {
    prepauseState = state;
    state = S.PAUSED;
    updatePauseButton(true);
    bgm.pause();
  }
}

const btnPause = document.getElementById('btn-pause');
function setPauseAvailable(available) {
  btnPause.disabled = !available;
  if (available) btnPause.removeAttribute('aria-disabled');
  else btnPause.setAttribute('aria-disabled', 'true');
}
btnPause.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); togglePause(); }, { passive: false });
btnPause.addEventListener('click', e => { e.stopPropagation(); togglePause(); });

const btnBgm = document.getElementById('btn-bgm');
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';
let bgmStarted = false;
bgm.volume = 0.25;

function updateBgmBtn() { btnBgm.classList.toggle('bgm-off', !bgmEnabled); }

  if (!bgmEnabled || bgmStarted) return;
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
}

  bgmEnabled = !bgmEnabled;

  updateBgmBtn();
});

var _slideTutActive = false;
function showTutorial() {
  if (_slideTutActive) return;
  var dim = document.getElementById('tut-dim');
  var bubble = document.getElementById('tut-bubble');
  if (!dim || !bubble) return;
  _slideTutActive = true;
  setPauseAvailable(false);

  // チュートリアル用: 左から右へ3手で完成する固定配置。
  var tutGrid = TUTORIAL_GRID.slice();
  var tutEmpty = TUTORIAL_EMPTY;
  var tutSteps = TUTORIAL_STEPS;
  var tutStepIdx = 0;

  // はじめての導線だけでなく、共有メニューの「あそびかた」から
  // 開き直した場合も、必ず同じ3手の練習盤面から始める。
  stageIdx = 0;
  moveCount = 0;
  curCols = 3;
  curRows = 3;
  grid = tutGrid.slice();
  emptyIdx = tutEmpty;
  animating = false;
  clueDiscovered = false;
  hintDismissed = true;
  journeyActor.active = false;
  journeyActor.phase = JOURNEY_PHASE.PLAYING;
  journeyActor.tutorial = true;
  state = S.PLAYING;
  prepauseState = S.PLAYING;
  updatePauseButton(false);
  if (bgmEnabled) bgm.play().catch(() => {});
  overlay.classList.add('hidden');
  calcLayout();
  document.getElementById('hud-stage').textContent = 'れんしゅう';
  document.getElementById('hud-moves').textContent = '';
  var stageNum = document.getElementById('stage-num');
  if (stageNum) stageNum.textContent = 'チュートリアル';

  // Step 0: 導入
  dim.classList.remove('hidden');
  bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
  bubble.innerHTML = '🌳 ひだりから みぎへ<br>みちを つなげよう！<br><button class="tut-next-btn" id="tut-next">やってみる！</button>';
  bubble.classList.remove('hidden');

  document.getElementById('tut-next').addEventListener('pointerdown', function(e) {
    e.preventDefault(); e.stopPropagation();
    dim.classList.add('hidden');
    bubble.classList.add('hidden');

    // 描画を1フレーム待ってからハイライト
    requestAnimationFrame(function() {
      showTutStep();
    });
  });

  function showTutStep() {
    if (tutStepIdx >= tutSteps.length) return;
    var s = tutSteps[tutStepIdx];
    highlightTile(s.row, s.col, s.msg);
  }

  var _tutOverlay = null;

  function highlightTile(row, col, msg) {
    // パネルのCanvas座標→画面座標に変換
    var rect = canvas.getBoundingClientRect();
    var scaleX = rect.width / CW;
    var scaleY = rect.height / CH;
    var tx = rect.left + (gridOX + col * cellSize) * scaleX;
    var ty = rect.top + (gridOY + row * cellSize) * scaleY;
    var tw = cellSize * scaleX;
    var th = cellSize * scaleY;

    // ハイライトオーバーレイ
    if (_tutOverlay) _tutOverlay.remove();
    _tutOverlay = document.createElement('div');
    _tutOverlay.style.cssText = 'position:fixed;z-index:9996;border:4px solid #FFD700;border-radius:12px;box-shadow:0 0 0 4000px rgba(0,0,0,0.5),0 0 20px rgba(255,215,0,0.6);pointer-events:none;' +
      'left:' + tx + 'px;top:' + ty + 'px;width:' + tw + 'px;height:' + th + 'px;';
    document.body.appendChild(_tutOverlay);

    // 吹き出し（パネルの上に）
    bubble.style.cssText = 'top:' + Math.max(10, ty - 60) + 'px;left:' + (tx + tw / 2) + 'px;transform:translateX(-50%);z-index:9997';
    bubble.innerHTML = '👆 ' + msg;
    bubble.classList.remove('hidden');

    // ユーザーがそのパネルをタップするのを待つ
    waitForTap(row, col);
  }

  function waitForTap(targetRow, targetCol) {
    var targetIdx = targetRow * curCols + targetCol;
    function onTap(ev) {
      var rect = canvas.getBoundingClientRect();
      var px = (ev.clientX - rect.left) * (CW / rect.width);
      var py = (ev.clientY - rect.top) * (CH / rect.height);
      var col = Math.floor((px - gridOX) / cellSize);
      var row = Math.floor((py - gridOY) / cellSize);
      if (col < 0 || col >= curCols || row < 0 || row >= curRows) return;
      var tappedIdx = row * curCols + col;
      if (tappedIdx !== targetIdx) return;

      ev.preventDefault();
      ev.stopPropagation();
      // 実際にパネルを動かす
      if (!handleTap(px, py)) return;

      // 正解タップ！ handleTap が安全に開始できてから案内を進める。
      document.removeEventListener('pointerdown', onTap, true);
      if (_tutOverlay) { _tutOverlay.remove(); _tutOverlay = null; }
      bubble.classList.add('hidden');

      // アニメーション完了後にフィードバック→次のステップ
      setTimeout(function() {
        tutStepIdx++;
        if (tutStepIdx < tutSteps.length) {
          // フィードバック表示
          var msgs = ['いいね！', 'すごい！', 'そのちょうし！'];
          bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
          bubble.innerHTML = '✨ ' + msgs[Math.min(tutStepIdx - 1, msgs.length - 1)] + '<br><button class="tut-next-btn" id="tut-next">つぎ！</button>';
          bubble.classList.remove('hidden');
          document.getElementById('tut-next').addEventListener('pointerdown', function(fe) {
            fe.preventDefault(); fe.stopPropagation();
            bubble.classList.add('hidden');
            requestAnimationFrame(function() { showTutStep(); });
          });
        } else {
          // チュートリアル完了！ポノをゴールまで歩かせる
          var path = traceWinPath();
          if (path && path.length > 0) {
            var geo = getJourneyGeometry();
            var points = path.map(function(point) {
              return {
                x: gridOX + (point.col + 0.5) * cellSize,
                y: gridOY + (point.row + 0.5) * cellSize,
              };
            });
            points[0] = { x: geo.startX, y: geo.startY };
            points[points.length - 1] = { x: geo.discoverX, y: geo.goalY };
            state = S.TRAVELLING;
            journeyActor.tutorial = true;
            setJourneyPath(JOURNEY_PHASE.EXIT, points,
              reducedMotionQuery.matches ? 1 : Math.max(800, (points.length - 1) * 240),
              performance.now());
            // たびの演出が終わってから「あそぼう！」へつなぐ。
            var waitWalk = setInterval(function() {
              if (!journeyActor.active) {
                clearInterval(waitWalk);
                dim.classList.remove('hidden');
                bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
                bubble.innerHTML = '🎉 できた！<br>みちが つながったよ！<br><button class="tut-next-btn" id="tut-next">あそぼう！</button>';
                bubble.classList.remove('hidden');
                document.getElementById('tut-next').addEventListener('pointerdown', function(ev2) {
                  ev2.preventDefault(); ev2.stopPropagation();
                  endTut();
                  // ステージ1を直接開始（ダイアログなし）
                  startGame();
                });
              }
            }, 100);
          } else {
            endTut();
            startGame();
          }
        }
      }, 200);
    }
    document.addEventListener('pointerdown', onTap, true);
  }

  function endTut() {
    _slideTutActive = false;
    setPauseAvailable(true);
    if (_tutOverlay) { _tutOverlay.remove(); _tutOverlay = null; }
    dim.classList.add('hidden');
    bubble.classList.add('hidden');
    localStorage.setItem('slide_tut_seen', '1');
  }
}

// ===== Init =====
initMenu({ bgmToggle: function() {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
  if (bgmEnabled) { bgmStarted = false; tryStartBgm(); } else { bgm.pause(); }
  updateBgmBtn();
  if (window._ponoMenuBgmBtn) window._ponoMenuBgmBtn.classList.toggle('bgm-off', !bgmEnabled);
}, tutorial: showTutorial});
curCols = LEVELS[0].cols;
curRows = LEVELS[0].rows;
resize();
updateHUD();
showOverlay('start');
requestAnimationFrame(loop);

function updateLandscapeNotice() {
  const notice = document.getElementById('landscape-notice');
  if (!notice) return;
  const isPortrait = window.innerHeight >= window.innerWidth;
  notice.style.display = isPortrait ? 'flex' : 'none';
  // 横向きへ戻した時に、中央の16:9シェルへキャンバス実寸を同期する。
  if (!isPortrait) resize();
}
updateLandscapeNotice();
window.addEventListener('orientationchange', () => {
  setTimeout(updateLandscapeNotice, 100);
  setTimeout(updateLandscapeNotice, 300);
  setTimeout(updateLandscapeNotice, 600);
  // 回転完了後にリサイズを確実に実行
  setTimeout(resize, 200);
  setTimeout(resize, 500);
  setTimeout(resize, 800);
});
window.addEventListener('resize', updateLandscapeNotice);
</script>
