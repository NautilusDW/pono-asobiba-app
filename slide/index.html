<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>おかあさん どこいったの？| ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="../common/preload-helper.js"></script>
<script>window.addEventListener('DOMContentLoaded',function(){if(window.PonoPreload)window.PonoPreload.warmGameAssets('slide');});</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8F0;
  --primary: #4CAF50;
  --primary-dark: #388E3C;
  --text: #5D4E37;
  --text-light: #A89880;
  --shadow: rgba(93,78,55,0.12);
  --radius: 20px;
  --slide-shell-width: min(100vw, calc(100dvh * 16 / 9));
  --slide-shell-height: min(100dvh, calc(100vw * 9 / 16));
  --slide-shell-left: calc((100vw - var(--slide-shell-width)) / 2);
  --slide-shell-top: calc((100dvh - var(--slide-shell-height)) / 2);
  --slide-control-top: clamp(80px, calc(var(--slide-shell-height) * 0.125), 96px);
}

html, body {
  width: 100%; height: 100dvh; overflow: hidden;
  overscroll-behavior: none;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover; background-position: center; background-repeat: no-repeat;
  color: var(--text);
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body { display: grid; place-items: center; }

#app {
  position: relative;
  width: var(--slide-shell-width);
  height: var(--slide-shell-height);
  max-width: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  isolation: isolate;
  border-radius: clamp(12px, 2vmin, 24px);
  background: rgba(255,248,240,0.3);
  box-shadow: 0 12px 40px rgba(58,48,36,0.22);
}
/* common viewport safety CSS sets #app to 100% height on coarse pointers.
   This page intentionally owns a centered 16:9 shell, so keep that contract. */
body > #app {
  width: var(--slide-shell-width) !important;
  height: var(--slide-shell-height) !important;
  max-height: var(--slide-shell-height) !important;
  min-height: 0 !important;
}

/* ===== Full-width realtime journey HUD ===== */
.game-rail {
  position: fixed;
  z-index: 22;
  top: calc(var(--slide-shell-top) + max(2px, env(safe-area-inset-top)));
  left: 0;
  right: 0;
  width: auto;
  min-height: clamp(56px, 8vmin, 62px);
  padding: 3px max(1px, env(safe-area-inset-left)) 3px max(1px, env(safe-area-inset-right));
  border: 1.5px solid rgba(255,247,207,0.62);
  border-radius: clamp(17px, 2.5vmin, 24px);
  background: linear-gradient(135deg, rgba(24,63,53,0.9), rgba(42,86,67,0.84));
  box-shadow: 0 6px 18px rgba(16,37,31,0.28), inset 0 1px 0 rgba(255,255,255,0.18);
  backdrop-filter: blur(10px) saturate(1.12);
  pointer-events: none;
  display: flex;
  align-items: center;
}
.header { display: none; }
.back-link {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  color: var(--primary); font-weight: 700; font-size: 0.85rem; text-decoration: none;
}
.header h1 { font-size: 0; }
.subtitle { display: none; }
.btn-bgm {
  position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  width: 34px; height: 34px; border-radius: 50%;
  background: #FFF3EE; border: 2px solid var(--primary);
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px var(--shadow); transition: transform 0.15s;
  pointer-events: auto;
}
.btn-bgm:active { transform: translateY(-50%) scale(0.9); }
.btn-bgm.bgm-off { opacity: 0.4; filter: grayscale(1); }
.btn-pause {
  position: absolute;
  left: clamp(68px, 10%, 88px);
  top: var(--slide-control-top);
  width: clamp(44px, 7vmin, 52px);
  height: clamp(44px, 7vmin, 52px);
  border-radius: 50%;
  background: #FFF3EE; border: 2px solid var(--primary);
  font-size: clamp(1rem, 2.5vmin, 1.3rem); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px var(--shadow); z-index: 9988; transition: transform 0.15s;
}
.btn-pause:active { transform: scale(0.9); }
.btn-pause:disabled { opacity: 0.48; cursor: default; transform: none; }

.magic-cross-btn {
  position: absolute;
  z-index: 9;
  top: var(--slide-control-top);
  right: clamp(10px, 1.8%, 18px);
  min-width: clamp(88px, 14vmin, 104px);
  min-height: clamp(50px, 8vmin, 58px);
  padding: 3px 8px 3px 5px;
  border: 2px solid rgba(255,253,226,0.96);
  border-radius: 999px;
  background: linear-gradient(135deg, rgba(255,111,122,0.96), rgba(255,184,87,0.96));
  box-shadow: 0 5px 16px rgba(81,45,23,0.3), inset 0 1px 0 rgba(255,255,255,0.45);
  color: #fff;
  font-family: inherit;
  font-size: clamp(0.72rem, 1.5vmin, 0.8rem);
  font-weight: 900;
  line-height: 1;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  transition: transform 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
}
.magic-cross-btn.hidden { display: none; }
.magic-cross-btn:disabled { opacity: 0.48; cursor: default; }
.magic-cross-btn:not(:disabled):active { transform: scale(0.94); }
.magic-cross-btn.is-selecting {
  transform: scale(1.06);
  box-shadow: 0 0 0 4px rgba(255,246,166,0.82), 0 7px 22px rgba(255,111,122,0.48);
}
.magic-cross-btn.needs-attention:not(:disabled) img { animation: magicCharmGlow 900ms ease-in-out infinite alternate; }
.magic-cross-btn img { width: clamp(36px, 6vmin, 44px); height: clamp(36px, 6vmin, 44px); object-fit: contain; }
.magic-cross-btn span { min-width: 3.8em; text-align: center; text-shadow: 0 1px 2px rgba(92,45,29,0.3); }
@keyframes magicCharmGlow {
  from { filter: drop-shadow(0 0 1px rgba(255,255,255,0.2)); }
  to { filter: drop-shadow(0 0 8px rgba(255,246,166,0.95)); }
}

/* common/menu.js injects these rules later; !important keeps the shared menu
   attached to this centered 16:9 shell instead of the browser corner. */
.pono-menu-toggle {
  top: calc(var(--slide-shell-top) + var(--slide-control-top)) !important;
  left: calc(var(--slide-shell-left) + 10px) !important;
  width: clamp(44px, 7vmin, 56px) !important;
  height: clamp(44px, 7vmin, 56px) !important;
}
.pono-dropdown {
  top: calc(var(--slide-shell-top) + var(--slide-control-top) + clamp(48px, 7vmin, 62px)) !important;
  left: calc(var(--slide-shell-left) + 10px) !important;
}

/* ===== HUD ===== */
.hud {
  width: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  grid-template-rows: 13px 34px;
  column-gap: clamp(6px, 1.1vmin, 12px);
  row-gap: 1px;
  align-items: center;
  margin: 0;
  padding: 0;
  border: 0;
  font-size: clamp(0.75rem, 1.45vmin, 0.82rem);
  font-weight: 800;
  line-height: 1;
  text-align: left;
  color: #fffaf0;
  white-space: nowrap;
}
#hud-stage {
  grid-column: 1;
  grid-row: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #FFF4B1;
  text-shadow: 0 1px 3px rgba(0,0,0,0.38);
}
#hud-moves {
  grid-column: 3;
  grid-row: 1;
  min-width: clamp(50px, 8vmin, 68px);
  padding: 0 6px;
  border-radius: 999px;
  background: rgba(255,255,255,0.13);
  color: #fff;
  text-align: center;
}
#hud-time {
  grid-column: 2;
  grid-row: 1;
  min-width: 5.8em;
  padding: 0 7px;
  border-radius: 999px;
  background: rgba(255,244,177,0.16);
  color: #fff8cf;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
#hud-time.is-urgent {
  background: rgba(255,151,93,0.34);
  color: #fff;
}
#stage-num {
  --pono-progress: 0;
  --mother-progress: 0;
  position: relative;
  grid-column: 1 / -1;
  grid-row: 2;
  width: 100%;
  height: 34px;
  padding: 0;
  border-radius: 0;
  background: transparent;
  color: rgba(255,255,255,0.96);
}
.journey-progress-track {
  position: relative;
  width: 100%;
  height: 34px;
}
.journey-progress-track::before {
  content: '';
  position: absolute;
  z-index: 0;
  left: 0;
  right: 0;
  top: 50%;
  height: 12px;
  border: 1px solid rgba(255,255,255,0.48);
  border-radius: 999px;
  background: rgba(8,36,34,0.56);
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.34), 0 1px 0 rgba(255,255,255,0.14);
  transform: translateY(-50%);
}
.journey-progress-fill {
  position: absolute;
  left: 14px;
  top: 50%;
  width: calc(100% - 28px);
  border-radius: 999px;
  transform-origin: left center;
  background-size: 26px 100%, 100% 100%;
  background-position: 0 0, 0 0;
}
.journey-progress-fill--mother {
  z-index: 1;
  height: 9px;
  background-image:
    repeating-linear-gradient(115deg, transparent 0 9px, rgba(255,255,255,0.42) 9px 13px),
    linear-gradient(90deg, #FF9C9C, #FF5967);
  box-shadow: 0 0 5px rgba(255,89,103,0.48);
  transform: translateY(-50%) scaleX(var(--mother-progress));
}
.journey-progress-fill--pono {
  z-index: 2;
  height: 5px;
  background-image:
    repeating-linear-gradient(115deg, transparent 0 9px, rgba(255,255,255,0.58) 9px 13px),
    linear-gradient(90deg, #9AF29B, #4ED36C);
  box-shadow: 0 0 4px rgba(78,211,108,0.82);
  transform: translateY(-50%) scaleX(var(--pono-progress));
}
.journey-progress-gap {
  position: absolute;
  z-index: 4;
  left: calc(14px + (100% - 28px) * var(--gap-start, 0));
  top: 50%;
  width: calc((100% - 28px) * var(--gap-size, 0));
  height: 3px;
  border-radius: 999px;
  background: repeating-linear-gradient(90deg,
    rgba(255,255,224,0.95) 0 4px,
    rgba(255,255,224,0.12) 4px 11px);
  box-shadow: 0 0 5px rgba(255,248,180,0.82);
  opacity: 0;
  transform: translateY(-50%);
  pointer-events: none;
}
.journey-progress.is-chasing .journey-progress-gap { opacity: 1; }
.journey-progress.is-moving .journey-progress-fill {
  animation: journeyFillFlow 720ms linear infinite;
}
.journey-progress.is-moving .journey-progress-gap {
  animation: journeyGapFlow 620ms linear infinite;
}
.journey-progress.is-moving .journey-progress-marker img {
  animation: journeyFaceStep 520ms ease-in-out infinite alternate;
}
@keyframes journeyFillFlow { to { background-position: 26px 0, 0 0; } }
@keyframes journeyGapFlow { to { background-position: 22px 0; } }
@keyframes journeyFaceStep {
  from { transform: translateY(1px) scale(0.97); }
  to { transform: translateY(-1px) scale(1.03); }
}
.journey-progress-checkpoint {
  position: absolute;
  z-index: 3;
  top: 8px;
  left: calc(14px + (100% - 28px) * var(--checkpoint));
  width: 2px;
  height: 16px;
  border-radius: 2px;
  background: rgba(255,250,220,0.78);
  box-shadow: 0 0 0 1px rgba(17,53,48,0.22);
  transform: translateX(-50%);
}
.journey-progress-marker {
  position: absolute;
  z-index: 5;
  width: clamp(22px, 3.5vmin, 28px);
  height: clamp(22px, 3.5vmin, 28px);
  border: 2px solid;
  border-radius: 50%;
  background: #fff8ec;
  box-shadow: 0 1px 4px rgba(0,0,0,0.42);
  overflow: hidden;
  transform: translate(-50%, -50%);
}
.journey-progress-marker img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.journey-progress-marker--mother {
  top: 25px;
  left: calc(14px + (100% - 28px) * var(--mother-progress));
  border-color: #FF5967;
}
.journey-progress-marker--pono {
  top: 9px;
  left: calc(14px + (100% - 28px) * var(--pono-progress));
  border-color: #4ED36C;
}
.journey-progress.is-together .journey-progress-marker--mother {
  transform: translate(-50%, -50%);
}
.journey-progress.is-together .journey-progress-marker--pono {
  transform: translate(-50%, -50%);
}
.journey-progress.is-instant .journey-progress-fill--mother,
.journey-progress.is-instant .journey-progress-marker--mother {
  transition: none;
}
.journey-progress-a11y {
  position: absolute !important;
  width: 1px !important;
  height: 1px !important;
  padding: 0 !important;
  margin: -1px !important;
  overflow: hidden !important;
  clip: rect(0 0 0 0) !important;
  white-space: nowrap !important;
  border: 0 !important;
}
.journey-progress-tutorial-label {
  display: none;
  height: 34px;
  align-items: center;
  justify-content: center;
  color: #fff4b1;
  font-size: 0.72rem;
  font-weight: 900;
}
.journey-progress.is-tutorial .journey-progress-track,
.journey-progress.is-tutorial .journey-progress-a11y { display: none; }
.journey-progress.is-tutorial .journey-progress-tutorial-label { display: flex; }

/* The paper-story cards are the checkpoints. Keep the one shared bar visible
   above the illustration, while the stage name and move count step aside. */
body.slide-cutscene-open .game-rail {
  z-index: 22;
  left: 0;
  right: 0;
  width: auto;
  min-height: 42px;
  padding: 5px max(1px, env(safe-area-inset-left)) 5px max(1px, env(safe-area-inset-right));
  border-radius: 999px;
}
body.slide-cutscene-open .hud {
  grid-template-columns: minmax(0, 1fr);
  grid-template-rows: 34px;
}
body.slide-cutscene-open #hud-stage,
body.slide-cutscene-open #hud-moves,
body.slide-cutscene-open #hud-time { display: none; }
body.slide-cutscene-open #stage-num {
  grid-row: 1;
  width: 100%;
  margin: 0 auto;
}

/* ===== Game area ===== */
.game-wrap {
  position: absolute;
  inset: 0;
  z-index: 1;
  min-height: 0;
  border-radius: inherit;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
}
#gameCanvas { display: block; width: 100%; height: 100%; }

/* ===== Short, non-blocking picture-book captions ===== */
.journey-toast {
  position: absolute;
  z-index: 8;
  left: 50%;
  top: clamp(76px, 13%, 98px);
  max-width: min(72%, 620px);
  min-height: 36px;
  padding: 7px 18px;
  border: 1.5px solid rgba(255,255,255,0.82);
  border-radius: 999px;
  background: rgba(25,75,80,0.82);
  box-shadow: 0 5px 16px rgba(20,52,57,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
  color: #fffdf1;
  font-size: clamp(0.72rem, 1.7vmin, 0.95rem);
  font-weight: 900;
  line-height: 1.45;
  text-align: center;
  white-space: pre-line;
  pointer-events: none;
  opacity: 0;
  transform: translate(-50%, -8px);
  transition: opacity 180ms ease, transform 220ms ease;
}
.journey-toast.show {
  opacity: 1;
  transform: translate(-50%, 0);
}
.journey-toast.discovery {
  background: rgba(79,72,132,0.88);
  border-color: rgba(255,241,164,0.9);
  color: #fffbd7;
}
.journey-toast.retry {
  background: rgba(130,82,36,0.92);
  border-color: rgba(255,238,176,0.96);
  color: #fff8d8;
}

/* ===== Confetti ===== */
.confetti-container {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 10; overflow: hidden;
  overscroll-behavior: none;
}
.confetti-piece { position: absolute; animation: cfall 2.5s ease-out forwards; }
@keyframes cfall {
  0%   { transform: translateY(-10px) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* ===== Overlay ===== */
.overlay {
  position: absolute; inset: 0; z-index: 20;
  display: flex; align-items: center; justify-content: center;
  background: rgba(43,88,99,0.5);
  backdrop-filter: blur(4px);
  animation: fadeIn 0.25s ease;
}
.overlay.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.ov-card {
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  padding: 32px 32px 24px;
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  max-width: 320px;
  width: 85vw;
}
.ov-icon  { font-size: 3.5rem; line-height: 1; }
.ov-title {
  font-size: 1.2rem; font-weight: 900;
  background: linear-gradient(135deg, #4CAF50, #81C784);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  white-space: nowrap;
}
.ov-msg { font-size: 0.9rem; font-weight: 700; color: var(--text); white-space: pre-line; line-height: 1.6; }

/* Cutscene full-image mode */
.ov-card.cutscene-mode { max-width: 360px; padding: 16px 16px 20px; gap: 10px; }
.ov-card.cutscene-mode .ov-icon { width: 100%; font-size: unset; line-height: unset; }
.cutscene-img {
  display: block; width: 100%; border-radius: 16px;
  object-fit: cover; aspect-ratio: 16/9;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}
.ov-card.cutscene-mode .ov-title {
  font-size: 1rem; white-space: pre-line; line-height: 1.6;
}
.ov-btn {
  margin-top: 4px; padding: 14px 36px;
  border: none; border-radius: 50px;
  font-family: inherit; font-size: 1.05rem; font-weight: 900;
  background: linear-gradient(135deg, #4CAF50, #81C784);
  color: #fff; cursor: pointer;
  box-shadow: 0 4px 16px rgba(76,175,80,0.4);
  transition: transform 0.15s;
}
.ov-btn:active { transform: scale(0.95); }
.ov-btn:focus-visible {
  outline: 3px solid #FFF2A8;
  outline-offset: -5px;
  box-shadow: 0 0 0 2px rgba(25,65,70,0.72), 0 4px 16px rgba(76,175,80,0.4);
}
.ov-back {
  display: block; font-size: 0.85rem;
  color: #A89585; text-decoration: none; text-align: center; font-weight: 700;
}
.ov-back.hidden { display: none; }

#landscape-notice {
  display: none;
  position: fixed; inset: 0; z-index: 10050;
  background: #1a3a4a;
  flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  color: white; text-align: center; padding: 40px;
  font-family: 'Zen Maru Gothic', sans-serif;
}
#landscape-notice .rotate-icon { font-size: 64px; animation: rotateHintV 2s ease-in-out infinite; }
@keyframes rotateHintV {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(-90deg); }
}
#landscape-notice p { font-size: 18px; line-height: 1.6; }
.landscape-back {
  display: inline-flex;
  min-width: 168px;
  min-height: 48px;
  align-items: center;
  justify-content: center;
  padding: 10px 22px;
  border: 2px solid rgba(255,255,255,0.78);
  border-radius: 999px;
  color: #fff;
  background: rgba(255,255,255,0.12);
  font-size: 0.95rem;
  font-weight: 900;
  text-decoration: none;
}
.tut-dim { position:fixed;inset:0;z-index:9995;background:rgba(93,78,55,0.6);pointer-events:auto; }
.tut-dim.hidden { display:none; }
.tut-bubble { position:fixed;z-index:9997;background:#fff;border-radius:16px;padding:12px 12px;max-width:none;box-shadow:0 4px 20px rgba(93,78,55,0.3);font-size:0.95rem;font-weight:700;color:#5D4E37;line-height:1.6;text-align:center;white-space:nowrap;animation:tutPopIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.tut-bubble.hidden { display:none; }
@keyframes tutPopIn { from{transform:scale(0.8) translate(-50%,-50%);opacity:0.5} to{transform:scale(1) translate(-50%,-50%);opacity:1} }
@keyframes heartFloat {
  0% { opacity:0; transform:translateY(10px) scale(0.6); }
  30% { opacity:1; transform:translateY(-5px) scale(1); }
  70% { opacity:1; transform:translateY(-10px) scale(1.1); }
  100% { opacity:0; transform:translateY(-20px) scale(0.8); }
}
.tut-next-btn { display:inline-flex;min-height:48px;align-items:center;justify-content:center;margin-top:10px;padding:10px 24px;border:none;border-radius:50px;background:linear-gradient(135deg,#60A5FA,#818CF8);color:#fff;font-family:inherit;font-size:0.85rem;font-weight:900;cursor:pointer; }

@media (orientation: landscape) and (max-height: 480px),
       (orientation: landscape) and (max-width: 853px) {
  .game-rail {
    top: calc(var(--slide-shell-top) + max(2px, env(safe-area-inset-top)));
    left: 0;
    right: 0;
    width: auto;
    min-height: 56px;
    padding: 3px max(1px, env(safe-area-inset-left)) 3px max(1px, env(safe-area-inset-right));

};

function transposeVerticalLevelToLeftRight(level) {
  const transposeEdge = [3, 2, 1, 0];
  const transposeCell = function(cell) { return { row: cell.col, col: cell.row }; };
  const nextCols = level.rows;
  const nextRows = level.cols;
  const nextSolved = new Array(level.cols * level.rows);

  for (let row = 0; row < level.rows; row++) {
    for (let col = 0; col < level.cols; col++) {
      const nextRow = col;
      const nextCol = row;
      const tile = level.solved[row * level.cols + col];
      nextSolved[nextRow * nextCols + nextCol] = tile === null ? null : TRANSPOSE_TILE[tile];
    }
  }

  return {
    ...level,
    cols: nextCols,
    rows: nextRows,
    start: { row: level.start.col, side: 'left' },
    goal: { row: level.goal.col, side: 'right' },
    pickup: level.pickup
      ? { row: level.pickup.col, col: level.pickup.row }
      : null,
    magicCross: level.magicCross
      ? {
          ...level.magicCross,
          target: {
            row: level.magicCross.target.col,
            col: level.magicCross.target.row,
          },
        }
      : null,
    checkpoint: level.checkpoint
      ? {
          cell: transposeCell(level.checkpoint.cell),
          entryEdge: transposeEdge[level.checkpoint.entryEdge],
          exitEdge: transposeEdge[level.checkpoint.exitEdge],
          secondShuffle: level.checkpoint.secondShuffle.map(transposeCell),
          lockedCells: level.checkpoint.lockedCells.map(transposeCell),
        }
      : null,
    solved: nextSolved,
  };
}

function calculateStageTimeBudgetSeconds(level) {
  const extraCells = Math.max(0, level.cols * level.rows - 9);
  const mechanicSeconds = (level.checkpoint ? 25 : (level.pickup ? 15 : 0)) +
    (level.magicCross ? 20 : 0);
  const rawSeconds = 30 + level.shuffleMoves * 8 + extraCells * 2 + mechanicSeconds;
  return Math.ceil(rawSeconds / 5) * 5;
}

function resize() {

  CH = canvas.height = Math.floor(rect.height);

  if (journeyActor.active && oldCW > 0 && oldCH > 0) {

function calcLayout() {
  const safe = Math.max(8, Math.min(20, CH * 0.025));
  const wrapRect = wrap.getBoundingClientRect();
  const hud = document.querySelector('.game-rail');
  const hudRect = hud ? hud.getBoundingClientRect() : null;
  const hudBottom = hudRect ? hudRect.bottom - wrapRect.top : 52;
  const hudGap = Math.max(4, Math.min(8, safe * 0.4));
  const contentTop = Math.max(safe + 48, hudBottom + hudGap);
  const markerReserve = Math.max(52, Math.min(118, CH * 0.17));
  const availW = Math.max(1, CW - (safe + markerReserve) * 2);
  const bottomSafe = safe;
  const availH = Math.max(1, CH - contentTop - bottomSafe);
  const maxByHeight = availH / (curRows + 0.2);
  const maxByTouch = CH * 0.215;
  cellSize = Math.floor(Math.min(availW / curCols, maxByHeight, maxByTouch));
  const gridW = cellSize * curCols;
  const gridH = cellSize * curRows;
  gridOX = Math.floor((CW - gridW) / 2);
  gridOY = Math.floor(contentTop + (availH - gridH) / 2);

  o.connect(g); g.connect(ac.destination);
  o.start(start); o.stop(start + dur);

// ===== Grid helpers =====
function getAdjacentIndices(idx) {
  const row = Math.floor(idx / curCols), col = idx % curCols;
  const result = [];
  if (row > 0) result.push(idx - curCols);
  if (row < curRows - 1) result.push(idx + curCols);
  if (col > 0) result.push(idx - 1);
  if (col < curCols - 1) result.push(idx + 1);
  return result;
}

function getLevelCellIndex(level, cell) {
  if (!level || !cell) return -1;
  return cell.row * level.cols + cell.col;
}

function getCheckpointCellIndex(level) {
  return getLevelCellIndex(level, level && level.checkpoint && level.checkpoint.cell);
}

function getCheckpointLockedIndices(level) {
  if (!level || !level.checkpoint) return [];
  return level.checkpoint.lockedCells.map(function(cell) {
    return getLevelCellIndex(level, cell);
  }).filter(function(index) { return index >= 0; });
}

function isCheckpointLockedCell(index) {
  return stageCheckpointReached && stageCheckpointLockedCells.has(index);
}

    : 'ひかりの よつぼしを つかう');

function resetStageMechanics(level) {
  resetMoveFeedback();
  anim.idx = -1;
  anim.targetIdx = -1;
  anim.suspendedAt = 0;

  stageCheckpointTrail = [];
  stageCheckpointLockedCells = new Set();
  if (level && level.magicCross) magicCharmOwned = true;
  syncMagicCrossButton();
}

function moveTrackedTile(fromIdx, toIdx) {
  // A checkpoint is a place in the forest, not cargo attached to a panel.
  // Ordinary pickups still travel with their panel on later stages.
  if (!LEVELS[stageIdx].checkpoint && pickupTileIdx === fromIdx) pickupTileIdx = toIdx;
  if (magicCrossTileIdx === fromIdx) magicCrossTileIdx = toIdx;
}

function getEffectiveTileKeyAt(idx, useMagic) {
  const tileKey = grid[idx];
  if (useMagic !== false && idx === magicCrossTileIdx && tileKey && tileKey !== 'BLANK') {
    return 'CROSS';
  }
  return tileKey;
}

function getTileEdgesAt(idx, useMagic) {
  const tileKey = getEffectiveTileKeyAt(idx, useMagic);
  return tileKey && TILE_TYPES[tileKey] ? TILE_TYPES[tileKey].edges : null;
}

function isMagicSelectableTile(idx) {
  const tileKey = grid[idx];
  return Boolean(tileKey && tileKey !== 'BLANK' && tileKey !== 'CROSS');
}

function applySlideMove(fromIdx) {
  const oldEmpty = emptyIdx;
  moveTrackedTile(fromIdx, oldEmpty);
  grid[oldEmpty] = grid[fromIdx];
  grid[fromIdx] = null;
  emptyIdx = fromIdx;
  return oldEmpty;
}

function setCheckpointFallbackBoard(level) {
  grid = level.solved.slice();
  emptyIdx = grid.indexOf(null);
  // This reversible sequence leaves the first checkpoint connection unfinished.
  [4, 1, 2, 5].forEach(function(index) { applySlideMove(index); });
  // The reverse move is a real road panel, not a blank patch of ground.
  suggestedMoveIdx = 2;
}

function findUnsolvedFallbackBoard(level) {
  const startBoard = level.solved.slice();
  const startEmpty = startBoard.indexOf(null);
  const queue = [{ board: startBoard, empty: startEmpty, depth: 0, suggested: -1 }];
  const visited = new Set([startBoard.map(String).join('|')]);
  while (queue.length > 0 && visited.size <= 12000) {
    const current = queue.shift();
    grid = current.board;
    emptyIdx = current.empty;
    if (current.depth > 0 && !hasBareGoalRoute()) return current;
    if (current.depth >= 12) continue;
    getAdjacentIndices(current.empty).forEach(function(fromIdx) {
      const nextBoard = current.board.slice();
      nextBoard[current.empty] = nextBoard[fromIdx];
      nextBoard[fromIdx] = null;
      const key = nextBoard.map(String).join('|');
      if (visited.has(key)) return;
      visited.add(key);
      queue.push({
        board: nextBoard,
        empty: fromIdx,
        depth: current.depth + 1,
        suggested: current.empty,
      });
    });
  }
  return null;
}

function shuffleGrid(level) {
  curCols = level.cols;
  curRows = level.rows;
  resetStageMechanics(level);
  let accepted = false;
  let lastMoved = -1;
  for (let attempt = 0; attempt < 64 && !accepted; attempt++) {
    grid = level.solved.slice();
    emptyIdx = grid.indexOf(null);
    lastMoved = -1;
    for (let i = 0; i < level.shuffleMoves; i++) {
      const neighbors = getAdjacentIndices(emptyIdx);
      const candidates = neighbors.filter(function(index) { return index !== lastMoved; });
      const pick = candidates[Math.floor(Math.random() * candidates.length)];
      lastMoved = applySlideMove(pick);
    }
    // A ready-made goal or checkpoint would skip the child's first decision.
    accepted = !hasBareGoalRoute() && (!level.checkpoint || !findCheckpointRoute()) &&
      lastMoved >= 0 && grid[lastMoved] && grid[lastMoved] !== 'BLANK';
  }
  if (!accepted && level.checkpoint) {
    setCheckpointFallbackBoard(level);
  } else if (!accepted) {
    // A deterministic breadth-first fallback keeps even CROSS-heavy late stages
    // unsolved instead of assuming that one displaced panel breaks every route.
    const fallback = findUnsolvedFallbackBoard(level);
    if (fallback) {
      grid = fallback.board.slice();
      emptyIdx = fallback.empty;
      suggestedMoveIdx = fallback.suggested;
    }
  }
  // The reverse of the last shuffle step is always a legal, reassuring first move.
  if (accepted) suggestedMoveIdx = lastMoved;
  hintDismissed = false;
}

// ===== Win detection (BFS) =====
function oppositeEdge(e) { return (e + 2) % 4; }

function getNeighborRC(row, col, edge) {
  const dr = [-1, 0, 1, 0];
  const dc = [0, 1, 0, -1];
  return [row + dr[edge], col + dc[edge]];
}

function getRouteEndpoints(level) {
  let startRow, startCol, startEdge;
  if (level.start.side === 'top')    { startRow = 0; startCol = level.start.col; startEdge = 0; }
  if (level.start.side === 'bottom') { startRow = curRows - 1; startCol = level.start.col; startEdge = 2; }
  if (level.start.side === 'left')   { startRow = level.start.row; startCol = 0; startEdge = 3; }
  if (level.start.side === 'right')  { startRow = level.start.row; startCol = curCols - 1; startEdge = 1; }

  let goalRow, goalCol, goalExitEdge;
  if (level.goal.side === 'top')    { goalRow = 0; goalCol = level.goal.col; goalExitEdge = 0; }
  if (level.goal.side === 'bottom') { goalRow = curRows - 1; goalCol = level.goal.col; goalExitEdge = 2; }
  if (level.goal.side === 'left')   { goalRow = level.goal.row; goalCol = 0; goalExitEdge = 3; }
  if (level.goal.side === 'right')  { goalRow = level.goal.row; goalCol = curCols - 1; goalExitEdge = 1; }

  return { startRow, startCol, startEdge, goalRow, goalCol, goalExitEdge };
}

function findCheckpointRoute() {
  const level = LEVELS[stageIdx];
  if (!level || !level.checkpoint) return null;
  const endpoints = getRouteEndpoints(level);
  const checkpoint = level.checkpoint;
  const checkpointIdx = getCheckpointCellIndex(level);
  const queue = [{
    row: endpoints.startRow,
    col: endpoints.startCol,
    fromEdge: endpoints.startEdge,
    trail: [],
  }];
  const visited = new Set();

  while (queue.length > 0) {
    const current = queue.shift();
    if (current.row < 0 || current.row >= curRows ||
        current.col < 0 || current.col >= curCols) continue;
    const idx = current.row * curCols + current.col;
    const tileKey = grid[idx];
    if (!tileKey || tileKey === 'BLANK') continue;
    const edges = getTileEdgesAt(idx, false);
    if (!edges || !edges[current.fromEdge]) continue;
    const visitKey = `${idx},${current.fromEdge}`;
    if (visited.has(visitKey)) continue;
    visited.add(visitKey);
    const trail = current.trail.concat({ row: current.row, col: current.col, index: idx });
    if (idx === checkpointIdx && current.fromEdge === checkpoint.entryEdge) {
      return { trail: trail, checkpointEdge: checkpoint.entryEdge };
    }
    for (let edge = 0; edge < 4; edge++) {
      if (edge === current.fromEdge || !edges[edge]) continue;
      const next = getNeighborRC(current.row, current.col, edge);
      if (next[0] >= 0 && next[0] < curRows && next[1] >= 0 && next[1] < curCols) {
        queue.push({
          row: next[0], col: next[1], fromEdge: oppositeEdge(edge), trail: trail,
        });
      }
    }
  }
  return null;
}

function findGoalRoute(options) {
  const opts = options || {};
  const level = LEVELS[stageIdx];
  const endpoints = getRouteEndpoints(level);
  const requirePickup = Object.prototype.hasOwnProperty.call(opts, 'requirePickup')
    ? Boolean(opts.requirePickup) : Boolean(level.pickup);
  const requireMagic = Object.prototype.hasOwnProperty.call(opts, 'requireMagic')
    ? Boolean(opts.requireMagic) : Boolean(level.magicCross);
  const useMagic = opts.useMagic !== false;

  if (requireMagic && magicCrossTileIdx < 0) return null;

  const checkpointStart = Boolean(level.checkpoint && stageCheckpointReached);
  const routeStart = checkpointStart ? level.checkpoint.cell : {
    row: endpoints.startRow,
    col: endpoints.startCol,
  };
  const queue = [{
    row: routeStart.row,
    col: routeStart.col,
    fromEdge: checkpointStart ? -1 : endpoints.startEdge,
    hasPickup: pickupCollected,
    trail: [],
  }];
  const visited = new Set();

  while (queue.length > 0) {
    const current = queue.shift();
    const row = current.row, col = current.col, fromEdge = current.fromEdge;
    if (row < 0 || row >= curRows || col < 0 || col >= curCols) continue;

    const idx = row * curCols + col;
    const tileKey = grid[idx];
    if (!tileKey || tileKey === 'BLANK') continue;

    const edges = getTileEdgesAt(idx, useMagic);
    if (fromEdge >= 0 && !edges[fromEdge]) continue;

    const hasPickup = current.hasPickup || idx === pickupTileIdx;
    const visitKey = `${row},${col},${fromEdge},${hasPickup ? 1 : 0}`;
    if (visited.has(visitKey)) continue;
    visited.add(visitKey);

    const trail = current.trail.concat({ row: row, col: col, index: idx });

    for (let e = 0; e < 4; e++) {
      if ((fromEdge >= 0 && e === fromEdge) || !edges[e]) continue;
      if (checkpointStart && fromEdge < 0 && e !== level.checkpoint.exitEdge) continue;
      if (row === endpoints.goalRow && col === endpoints.goalCol &&
          e === endpoints.goalExitEdge && (!requirePickup || hasPickup)) {
        return { trail: trail, goalEdge: e, hasPickup: hasPickup };
      }
      const [nr, nc] = getNeighborRC(row, col, e);
      if (nr >= 0 && nr < curRows && nc >= 0 && nc < curCols) {
        queue.push({
          row: nr,
          col: nc,
          fromEdge: oppositeEdge(e),
          hasPickup: hasPickup,
          trail: trail,
        });
      }
    }
  }
  return null;
}

function hasBareGoalRoute() {
  return Boolean(findGoalRoute({ requirePickup: false, requireMagic: false, useMagic: false }));
}

function checkWin() {
  if (LEVELS[stageIdx].checkpoint && !stageCheckpointReached) return false;
  return Boolean(findGoalRoute());
}

// ===== Trace winning path (for celebration animation) =====
function traceWinPath() {
  const level = LEVELS[stageIdx];
  const endpoints = getRouteEndpoints(level);
  const drDir = [-1, 0, 1, 0];
  const dcDir = [0, 1, 0, -1];
  const found = findGoalRoute();

  // Build final path: entry → cells → exit
  const path = [];
  // The second leg resumes at the checkpoint; other stages enter from outside.
  if (!(level.checkpoint && stageCheckpointReached)) {
    path.push({
      row: endpoints.startRow - drDir[oppositeEdge(endpoints.startEdge)],
      col: endpoints.startCol - dcDir[oppositeEdge(endpoints.startEdge)],
      index: -1,
    });
  }
  if (found) {
    found.trail.forEach(p => path.push(p));
    // Exit point (one cell beyond goal)
    path.push({
      row: endpoints.goalRow + drDir[found.goalEdge],
      col: endpoints.goalCol + dcDir[found.goalEdge],
      index: -1,
    });
  }
  return path;
}

    slabBorder: 'rgba(183,220,224,0.62)', slabShadow: 'rgba(5,20,28,0.52)',

    slabBorder: 'rgba(184,205,236,0.62)', slabShadow: 'rgba(7,13,33,0.58)',
    path: '#BCA987', pathBorder: '#504A43', pathLight: '#E8D9B5',

// The goal keeps one visual language across every world. Its coral flag and
// round badge sit outside the board, so they cannot be mistaken for the dark
// square empty well or for a movable road panel.
const GOAL_STYLE = Object.freeze({
  marker: '#FF6F7A',
  markerDark: '#8E3943',
  cream: '#FFFDF2',
  outline: '#FFFFFF',
  shadow: 'rgba(73,31,42,0.34)',
});

function getTheme() {
  // stageIdx 0-based → ユーザー表示は stageIdx+1
  // ステージ1-3 (stageIdx 0-2): forest
  // ステージ4-6 (stageIdx 3-5): cave
  // ステージ7-8 (stageIdx 6-7): night
  if (stageIdx >= 3 && stageIdx <= 5) return THEMES.cave;
  if (stageIdx >= 6) return THEMES.night;
  return THEMES.forest;
}

function getRoadPattern() {
  const th = getTheme();
  const checkpointMaterial = Boolean(LEVELS[stageIdx] && LEVELS[stageIdx].checkpoint);
  const image = checkpointMaterial ? imgCheckpointRoadTexture : roadTextureImgs[th.key];
  if (!image || !image.complete || image.naturalWidth <= 0) return null;
  const cacheKey = [checkpointMaterial ? 'checkpoint' : th.key,
    cellSize, gridOX, gridOY, curCols, curRows].join(':');
  if (roadPatternCache[cacheKey]) return roadPatternCache[cacheKey];

  const pattern = ctx.createPattern(image, 'repeat');
  if (!pattern) return null;
  if (typeof pattern.setTransform === 'function' && typeof DOMMatrix !== 'undefined') {
    // Keep one generated image larger than the whole board. It stays globally
    // anchored across every cell, so no texture repeat seam can enter the road.
    const boardSpan = Math.max(curCols * cellSize, curRows * cellSize) + cellSize * 2;
    const scale = boardSpan * 1.25 / image.naturalWidth;
    const originX = gridOX - cellSize * 0.65;
    const originY = gridOY - cellSize * 0.65;
    pattern.setTransform(new DOMMatrix([scale, 0, 0, scale, originX, originY]));
  }
  roadPatternCache[cacheKey] = pattern;
  return pattern;
}

function getTerrainPattern() {
  const level = LEVELS[stageIdx];
  if (!level || !level.checkpoint || !imgForestFloorTerrain.complete ||
      imgForestFloorTerrain.naturalWidth <= 0) return null;
  const cacheKey = [stageIdx, cellSize, gridOX, gridOY, curCols, curRows].join(':');
  if (terrainPatternCache[cacheKey]) return terrainPatternCache[cacheKey];
  const pattern = ctx.createPattern(imgForestFloorTerrain, 'repeat');
  if (!pattern) return null;
  if (typeof pattern.setTransform === 'function' && typeof DOMMatrix !== 'undefined') {
    const boardSpan = Math.max(curCols * cellSize, curRows * cellSize) + cellSize;
    const scale = boardSpan * 1.15 / imgForestFloorTerrain.naturalWidth;
    pattern.setTransform(new DOMMatrix([
      scale, 0, 0, scale, gridOX - cellSize * 0.4, gridOY - cellSize * 0.35,
    ]));
  }
  terrainPatternCache[cacheKey] = pattern;
  return pattern;
}

const reducedMotionQuery = window.matchMedia
  ? window.matchMedia('(prefers-reduced-motion: reduce)')
  : { matches: false };

function getStartConnectedTileSet() {
  const level = LEVELS[stageIdx];
  let startRow, startCol, startEdge;
  if (level.start.side === 'top')    { startRow = 0; startCol = level.start.col; startEdge = 0; }
  if (level.start.side === 'bottom') { startRow = curRows - 1; startCol = level.start.col; startEdge = 2; }
  if (level.start.side === 'left')   { startRow = level.start.row; startCol = 0; startEdge = 3; }
  if (level.start.side === 'right')  { startRow = level.start.row; startCol = curCols - 1; startEdge = 1; }

  const checkpointStart = Boolean(level.checkpoint && stageCheckpointReached);
  if (checkpointStart) {
    startRow = level.checkpoint.cell.row;
    startCol = level.checkpoint.cell.col;
    startEdge = -1;
  }

  const connected = new Set(stageCheckpointLockedCells);
  const visited = new Set();
  const queue = [{ row: startRow, col: startCol, fromEdge: startEdge }];

  while (queue.length > 0) {
    const cur = queue.shift();
    if (cur.row < 0 || cur.row >= curRows || cur.col < 0 || cur.col >= curCols) continue;
    const visitKey = `${cur.row},${cur.col},${cur.fromEdge}`;
    if (visited.has(visitKey)) continue;
    visited.add(visitKey);

    const idx = cur.row * curCols + cur.col;
    const tileKey = grid[idx];
    if (!tileKey || tileKey === 'BLANK') continue;
    const edges = getTileEdgesAt(idx);
    if (cur.fromEdge >= 0 && !edges[cur.fromEdge]) continue;
    connected.add(idx);

    for (let edge = 0; edge < 4; edge++) {
      if ((cur.fromEdge >= 0 && edge === cur.fromEdge) || !edges[edge]) continue;
      if (checkpointStart && cur.fromEdge < 0 && edge !== level.checkpoint.exitEdge) continue;
      const next = getNeighborRC(cur.row, cur.col, edge);
      if (next[0] >= 0 && next[0] < curRows && next[1] >= 0 && next[1] < curCols) {
        queue.push({ row: next[0], col: next[1], fromEdge: oppositeEdge(edge) });
      }
    }
  }
  return connected;
}

function drawBoardAtmosphere(now) {
  const th = getTheme();
  const centerX = gridOX + curCols * cellSize / 2;
  const centerY = gridOY + curRows * cellSize / 2;
  const radius = Math.max(curCols * cellSize, curRows * cellSize) * 0.72;

  ctx.save();
  const clearing = ctx.createRadialGradient(centerX, centerY, radius * 0.05,
    centerX, centerY, radius);
  clearing.addColorStop(0, 'rgba(255,248,211,0.12)');
  clearing.addColorStop(0.58, 'rgba(255,248,211,0.03)');
  clearing.addColorStop(1, 'rgba(5,23,27,0.07)');
  ctx.fillStyle = clearing;
  ctx.fillRect(0, 0, CW, CH);

  const drift = reducedMotionQuery.matches ? 0 : now * 0.00018;
  ctx.fillStyle = th.mote;
  for (let i = 0; i < 12; i++) {
    const px = gridOX - cellSize * 0.42 + ((i * 67) % 113) / 112 * (curCols * cellSize + cellSize * 0.84);
    const baseY = gridOY - cellSize * 0.18 + ((i * 43) % 97) / 96 * (curRows * cellSize + cellSize * 0.36);
    const py = baseY + Math.sin(drift * (8 + i) + i * 1.7) * Math.min(5, cellSize * 0.04);
    ctx.globalAlpha = 0.14 + (i % 4) * 0.055;
    ctx.beginPath();
    ctx.arc(px, py, Math.max(1, cellSize * (0.009 + (i % 3) * 0.004)), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function traceTileRoad(x, y, size, edges) {
  const cx = x + size / 2;
  const cy = y + size / 2;
  const openEdges = [];
  for (let edge = 0; edge < 4; edge++) if (edges[edge]) openEdges.push(edge);

  ctx.beginPath();
  if (openEdges.length === 2) {
    const a = openEdges[0], b = openEdges[1];
    const pa = edgePoint(x, y, size, a);
    const pb = edgePoint(x, y, size, b);
    ctx.moveTo(pa.x, pa.y);
    if (Math.abs(a - b) === 2) ctx.lineTo(pb.x, pb.y);
    else ctx.quadraticCurveTo(cx, cy, pb.x, pb.y);
  } else {
    for (const edge of openEdges) {
      const p = edgePoint(x, y, size, edge);
      ctx.moveTo(cx, cy);
      ctx.lineTo(p.x, p.y);
    }
  }
}

function drawTileBase(x, y, size, tileKey, visualState) {
  const th = getTheme();
  const visual = visualState || {};
  const isSuggested = Boolean(visual.suggested);
  const isMoving = Boolean(visual.animating);
  const isStrongCue = isSuggested || isMoving;
  const inset = visual.settled ? 0 : Math.max(0.65, size * 0.008);
  const radius = Math.min(4, size * 0.025);
  const isBlank = tileKey === 'BLANK';
  ctx.save();
  const slab = ctx.createLinearGradient(x, y + inset, x, y + size - inset);
  slab.addColorStop(0, isBlank ? th.slabBlankTop : th.slabTop);
  slab.addColorStop(1, isBlank ? th.slabBlankBottom : th.slabBottom);
  const terrainPattern = getTerrainPattern();

  ctx.shadowColor = isStrongCue ? th.moveGlow : 'transparent';
  ctx.shadowBlur = isMoving ? Math.max(12, size * 0.18)
    : (isSuggested ? Math.max(8, size * 0.13) : 0);
  ctx.shadowOffsetY = isMoving ? Math.max(4, size * 0.055)
    : (isSuggested ? Math.max(1, size * 0.018) : 0);
  ctx.beginPath();
  ctx.roundRect(x + inset, y + inset, size - inset * 2, size - inset * 2, radius);
  ctx.fillStyle = terrainPattern || slab;
  ctx.fill();
  if (terrainPattern && isBlank) {
    ctx.fillStyle = 'rgba(23,64,45,0.22)';
    ctx.fill();
  }
  ctx.shadowColor = 'transparent';
  if (!visual.settled) {
    ctx.strokeStyle = isStrongCue ? th.move : 'rgba(225,240,196,0.34)';
    ctx.lineWidth = isStrongCue ? Math.max(3, size * 0.035)
      : Math.max(1, size * 0.012);
    ctx.stroke();
  }
  if (!terrainPattern) {
    ctx.fillStyle = th.slabBorder;
    for (let i = 0; i < 3; i++) {
      const seed = (visual.index || 0) * 19 + i * 31;
      const fx = x + size * (0.2 + ((seed * 7) % 55) / 100);
      const fy = y + size * (0.2 + ((seed * 11) % 55) / 100);
      ctx.globalAlpha = 0.07 + (i % 2) * 0.035;
      ctx.beginPath();
      ctx.arc(fx, fy, Math.max(1, size * 0.014), 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawTileRoadUnderlay(x, y, size, tileKey, visualState) {
  if (tileKey === 'BLANK') return;
  const th = getTheme();
  const visual = visualState || {};
  const effectiveTileKey = visual.effectiveTileKey || tileKey;
  const edges = TILE_TYPES[effectiveTileKey].edges;
  const pathW = size * 0.29;
  ctx.save();
  ctx.lineCap = 'butt';
  ctx.lineJoin = 'round';
  if (visual.connected && !visual.settled) {
    ctx.shadowColor = th.connectedGlow;
    ctx.shadowBlur = Math.max(7, size * 0.11);
  }
  const checkpointTrail = Boolean(LEVELS[stageIdx] && LEVELS[stageIdx].checkpoint);
  ctx.strokeStyle = visual.settled
    ? 'rgba(71,76,48,0.42)'
    : (checkpointTrail ? 'rgba(89,101,57,0.62)' : th.pathBorder);
  ctx.lineWidth = pathW + Math.max(3, size * 0.055);
  traceTileRoad(x, y, size, edges);
  ctx.stroke();
  ctx.restore();
}

function drawTileRoadSurface(x, y, size, tileKey, visualState) {
  if (tileKey === 'BLANK') return;
  const th = getTheme();
  const visual = visualState || {};
  const effectiveTileKey = visual.effectiveTileKey || tileKey;
  const edges = TILE_TYPES[effectiveTileKey].edges;
  const pathW = size * 0.29;
  const roadPattern = getRoadPattern();
  ctx.save();
  ctx.lineCap = 'butt';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = roadPattern || th.path;
  ctx.lineWidth = pathW;
  traceTileRoad(x, y, size, edges);
  ctx.stroke();

  if (effectiveTileKey === 'CROSS') {
    ctx.beginPath();
    ctx.arc(x + size / 2, y + size / 2, pathW * 0.51, 0, Math.PI * 2);
    ctx.fillStyle = roadPattern || th.path;
    ctx.fill();
  }
  if (visual.connected && !visual.settled) {
    ctx.strokeStyle = th.connected;
    ctx.lineWidth = Math.max(1.5, size * 0.022);
    ctx.globalAlpha = 0.46;
    traceTileRoad(x, y, size, edges);
    ctx.stroke();
  }
  ctx.restore();
}

function drawSettledFootprints(x, y, size, index) {
  const offset = (index % 2) * size * 0.045;
  ctx.save();
  ctx.translate(x + size * 0.5 + offset, y + size * 0.5);
  ctx.rotate(-0.16);
  ctx.fillStyle = 'rgba(83,58,36,0.48)';
  [-1, 1].forEach(function(side) {
    ctx.save();
    ctx.translate(side * size * 0.11, side * size * 0.065);
    ctx.rotate(side * 0.25);
    ctx.beginPath();
    ctx.ellipse(0, 0, size * 0.038, size * 0.062, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  ctx.restore();
}

function drawCharmAt(centerX, centerY, size, now, applied) {
  const pulse = reducedMotionQuery.matches ? 0 : (Math.sin(now * 0.006) + 1) * 0.5;
  ctx.save();
  ctx.shadowColor = applied ? 'rgba(255,235,117,0.82)' : 'rgba(255,184,87,0.86)';
  ctx.shadowBlur = Math.max(8, size * (0.2 + pulse * 0.12));
  if (imgFourwayCharm.complete && imgFourwayCharm.naturalWidth > 0) {
    const scale = applied ? 0.94 : 1 + pulse * 0.06;
    const drawSize = size * scale;
    ctx.drawImage(imgFourwayCharm, centerX - drawSize / 2, centerY - drawSize / 2,
      drawSize, drawSize);
  } else {
    ctx.fillStyle = '#FFD65A';
    ctx.font = `900 ${Math.floor(size * 0.72)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('✦', centerX, centerY);
  }
  ctx.restore();
}

function drawMagicSelectableFrame(x, y, size, now) {
  const pulse = reducedMotionQuery.matches ? 0.9 : 0.72 + (Math.sin(now * 0.007) + 1) * 0.12;
  const inset = Math.max(5, size * 0.07);
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.strokeStyle = '#FFF2A8';
  ctx.shadowColor = 'rgba(255,181,87,0.72)';
  ctx.shadowBlur = Math.max(8, size * 0.12);
  ctx.lineWidth = Math.max(3, size * 0.04);
  ctx.setLineDash([Math.max(5, size * 0.08), Math.max(4, size * 0.06)]);
  ctx.beginPath();
  ctx.roundRect(x + inset, y + inset, size - inset * 2, size - inset * 2, size * 0.12);
  ctx.stroke();
  ctx.restore();
}

function drawEmptySlot(now, index, visualState) {
  const th = getTheme();
  const slotIdx = Number.isInteger(index) ? index : emptyIdx;
  if (slotIdx < 0 || slotIdx >= curCols * curRows) return;
  const visual = visualState || {};
  const row = Math.floor(slotIdx / curCols), col = slotIdx % curCols;
  const x = gridOX + col * cellSize, y = gridOY + row * cellSize;
  const rimInset = Math.max(1, cellSize * 0.012);
  const wellInset = Math.max(6, cellSize * 0.08);
  const radius = Math.min(5, cellSize * 0.035);
  const rim = ctx.createLinearGradient(x, y, x, y + cellSize);
  const checkpointTrail = Boolean(LEVELS[stageIdx] && LEVELS[stageIdx].checkpoint);
  rim.addColorStop(0, checkpointTrail ? 'rgba(181,198,111,0.72)' : 'rgba(255,255,232,0.72)');
  rim.addColorStop(0.42, checkpointTrail ? 'rgba(96,128,72,0.78)' : th.slabBorder);
  rim.addColorStop(1, checkpointTrail ? 'rgba(54,89,62,0.9)' : th.slabBottom);
  const depthWell = ctx.createLinearGradient(x, y + wellInset, x, y + cellSize - wellInset);
  depthWell.addColorStop(0, checkpointTrail ? 'rgba(34,64,46,0.96)' : th.emptyBottom);
  depthWell.addColorStop(0.36, checkpointTrail ? 'rgba(52,83,58,0.96)' : th.emptyTop);
  depthWell.addColorStop(1, checkpointTrail ? 'rgba(24,48,37,0.98)' : 'rgba(3,18,24,0.96)');

  ctx.save();
  // A nearly square recessed cell reads as missing ground, not another button.
  ctx.shadowColor = 'rgba(5,24,26,0.42)';
  ctx.shadowBlur = Math.max(4, cellSize * 0.055);
  ctx.shadowOffsetY = Math.max(2, cellSize * 0.025);
  ctx.beginPath();
  ctx.roundRect(x + rimInset, y + rimInset,
    cellSize - rimInset * 2, cellSize - rimInset * 2, radius);
  ctx.fillStyle = rim;
  ctx.fill();
  if (visual.target) {
    const targetAlpha = reducedMotionQuery.matches
      ? 0.92 : 0.76 + Math.sin(now * 0.007) * 0.12;
    ctx.globalAlpha = targetAlpha;
    ctx.strokeStyle = th.move;
    ctx.lineWidth = Math.max(3, cellSize * 0.04);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Recessed inner well: a darker top edge and lower highlight make the hole physical.
  ctx.shadowColor = 'transparent';
  ctx.shadowOffsetY = 0;
  ctx.beginPath();
  ctx.roundRect(x + wellInset, y + wellInset,
    cellSize - wellInset * 2, cellSize - wellInset * 2, radius);
  ctx.fillStyle = depthWell;
  ctx.fill();
  ctx.strokeStyle = checkpointTrail ? 'rgba(25,57,42,0.72)' : 'rgba(3,17,22,0.76)';
  ctx.lineWidth = Math.max(2, cellSize * 0.032);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + wellInset * 1.35, y + cellSize - wellInset * 1.08);
  ctx.lineTo(x + cellSize - wellInset * 1.35, y + cellSize - wellInset * 1.08);
  ctx.strokeStyle = 'rgba(255,245,198,0.3)';
  ctx.lineWidth = Math.max(1.5, cellSize * 0.025);
  ctx.stroke();
  ctx.restore();
}

function getHintPreviewAmount(now, index) {
  if (reducedMotionQuery.matches) return 0;
  const cycle = 1500;
  const movingPart = 0.62;
  const phase = ((now + index * 79) % cycle) / cycle;
  if (phase >= movingPart) return 0;
  return Math.sin((phase / movingPart) * Math.PI) * 0.12;
}

function drawMovableEdgeCue(visual) {
  if (!visual || !visual.movable) return;
  const row = Math.floor(visual.index / curCols), col = visual.index % curCols;
  const emptyRow = Math.floor(emptyIdx / curCols), emptyCol = emptyIdx % curCols;
  const dx = emptyCol - col, dy = emptyRow - row;
  if (Math.abs(dx) + Math.abs(dy) !== 1) return;
  const x = visual.x, y = visual.y, size = visual.size;
  const inset = Math.max(3, size * 0.035);
  const th = getTheme();

  ctx.save();
  ctx.strokeStyle = th.move;
  ctx.globalAlpha = visual.suggested ? 1 : 0.78;
  ctx.shadowColor = visual.suggested ? th.moveGlow : 'transparent';
  ctx.shadowBlur = visual.suggested ? Math.max(5, size * 0.07) : 0;
  ctx.lineWidth = Math.max(3, size * 0.035);
  ctx.lineCap = 'round';
  ctx.beginPath();
  if (dx !== 0) {
    const edgeX = dx > 0 ? x + size - inset : x + inset;
    ctx.moveTo(edgeX, y + size * 0.18);
    ctx.lineTo(edgeX, y + size * 0.32);
    ctx.moveTo(edgeX, y + size * 0.68);
    ctx.lineTo(edgeX, y + size * 0.82);
  } else {
    const edgeY = dy > 0 ? y + size - inset : y + inset;
    ctx.moveTo(x + size * 0.18, edgeY);
    ctx.lineTo(x + size * 0.32, edgeY);
    ctx.moveTo(x + size * 0.68, edgeY);
    ctx.lineTo(x + size * 0.82, edgeY);
  }
  ctx.stroke();
  ctx.restore();
}

function drawMoveFeedback(now) {
  if (moveFeedback.fromIdx < 0 || moveFeedback.toIdx < 0) return;
  const age = Math.max(0, now - moveFeedback.t0);
  if (age > MOVE_FEEDBACK_DUR) {
    resetMoveFeedback();
    return;
  }
  const th = getTheme();
  const progress = reducedMotionQuery.matches ? 0 : age / MOVE_FEEDBACK_DUR;
  const alpha = reducedMotionQuery.matches ? 0.9 : Math.max(0, 1 - progress);
  const expand = reducedMotionQuery.matches ? 0 : progress * cellSize * 0.075;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = th.move;
  ctx.shadowColor = th.moveGlow;
  ctx.shadowBlur = reducedMotionQuery.matches ? 0 : Math.max(6, cellSize * 0.09);
  ctx.lineWidth = Math.max(3, cellSize * 0.035);
  [moveFeedback.fromIdx, moveFeedback.toIdx].forEach(function(index, order) {
    const row = Math.floor(index / curCols), col = index % curCols;
    const x = gridOX + col * cellSize;
    const y = gridOY + row * cellSize;
    const extra = order === 0 ? expand : expand * 0.45;
    ctx.beginPath();
    ctx.roundRect(x - extra, y - extra, cellSize + extra * 2,
      cellSize + extra * 2, Math.max(5, cellSize * 0.055));
    ctx.stroke();
  });
  ctx.restore();
}

function edgePoint(x, y, size, edge) {
  const cx = x + size / 2, cy = y + size / 2;
  const seamOverlap = Math.max(2, size * 0.025);
  if (edge === 0) return { x: cx, y: y - seamOverlap };            // top
  if (edge === 1) return { x: x + size + seamOverlap, y: cy };     // right
  if (edge === 2) return { x: cx, y: y + size + seamOverlap };     // bottom
  if (edge === 3) return { x: x - seamOverlap, y: cy };            // left
}

function drawGuideTrail(fromX, toX, y, active, now) {
  const th = getTheme();
  const direction = toX >= fromX ? 1 : -1;
  const head = Math.max(5, Math.min(11, cellSize * 0.075));
  ctx.save();
  ctx.strokeStyle = active ? th.connected : th.guide;
  ctx.fillStyle = active ? th.connected : th.guide;
  ctx.globalAlpha = active ? 0.96 : 0.7;
  ctx.shadowColor = active ? th.connectedGlow : 'transparent';
  ctx.shadowBlur = active ? Math.max(8, cellSize * 0.11) : 0;
  ctx.lineWidth = Math.max(2.5, cellSize * 0.032);
  ctx.lineCap = 'round';
  ctx.setLineDash([Math.max(5, cellSize * 0.08), Math.max(4, cellSize * 0.065)]);
  ctx.lineDashOffset = reducedMotionQuery.matches ? 0 : -now * 0.012;
  ctx.beginPath();
  ctx.moveTo(fromX, y);
  ctx.lineTo(toX - direction * head * 0.7, y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(toX, y);
  ctx.lineTo(toX - direction * head * 1.45, y - head * 0.82);
  ctx.lineTo(toX - direction * head * 1.45, y + head * 0.82);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawWorldLabel(label, x, y) {
  const fontSize = Math.max(9, Math.min(13, Math.floor(cellSize * 0.115)));
  ctx.save();
  ctx.font = `900 ${fontSize}px 'Zen Maru Gothic', sans-serif`;
  const width = ctx.measureText(label).width + fontSize * 1.15;
  const height = fontSize * 1.65;
  ctx.beginPath();
  ctx.roundRect(x - width / 2, y - height / 2, width, height, height / 2);
  ctx.fillStyle = 'rgba(20,48,42,0.78)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,245,190,0.64)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = '#FFF8D5';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y - 0.5);
  ctx.restore();
}

function getJourneyGeometry() {
  const level = LEVELS[stageIdx];
  const leftEdge = gridOX;
  const rightEdge = gridOX + curCols * cellSize;
  const startY = gridOY + level.start.row * cellSize + cellSize / 2;
  const goalY = gridOY + level.goal.row * cellSize + cellSize / 2;
  return {
    startX: leftEdge - cellSize * 0.58,
    startY: startY,
    entryX: leftEdge - cellSize * 1.25,
    goalX: rightEdge + cellSize * 0.56,
    goalY: goalY,
    discoverX: rightEdge + cellSize * 0.2,
    departX: rightEdge + cellSize * 1.35,
    leftEdge: leftEdge,
    rightEdge: rightEdge,
  };
}

function getCellCenter(index) {
  return {
    x: gridOX + (index % curCols + 0.5) * cellSize,
    y: gridOY + (Math.floor(index / curCols) + 0.5) * cellSize,
  };
}

function getCheckpointCenter() {
  const index = getCheckpointCellIndex(LEVELS[stageIdx]);
  return index >= 0 ? getCellCenter(index) : getJourneyGeometry();
}

function drawCheckpointMarker(now) {
  const level = LEVELS[stageIdx];
  if (!level || !level.checkpoint) return;
  const center = getCheckpointCenter();
  if (!stageCheckpointReached && journeyActor.phase !== JOURNEY_PHASE.CHECKPOINT_DISCOVERY) {
    drawCharmAt(center.x, center.y, cellSize * 0.54, now, false);
    return;
  }
  ctx.save();
  ctx.beginPath();
  ctx.arc(center.x, center.y, cellSize * 0.22, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,246,189,0.18)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,126,104,0.78)';
  ctx.lineWidth = Math.max(2, cellSize * 0.026);
  ctx.setLineDash([Math.max(3, cellSize * 0.04), Math.max(3, cellSize * 0.035)]);
  ctx.stroke();
  ctx.restore();
}

function getGoalBeaconBounds(geo) {
  const size = Math.max(62, Math.min(124, cellSize * 0.92));
  const anchorY = 0.6;
  return {
    size: size,
    left: geo.goalX - size * 0.5,
    right: geo.goalX + size * 0.5,
    top: geo.goalY - size * anchorY,
    bottom: geo.goalY + size * (1 - anchorY),
    centerY: geo.goalY,
  };
}

function drawGoalBeacon(now, geo, active, discovered) {
  const th = getTheme();
  const bounds = getGoalBeaconBounds(geo);
  const size = bounds.size;
  const pulse = reducedMotionQuery.matches || discovered
    ? 0 : (Math.sin(now * 0.0045) + 1) * 0.5;

  ctx.save();
  ctx.globalAlpha = discovered ? 0.24 : 1;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // The generated marker supplies the whole destination illustration. A short
  // runtime socket only locks its wooden post to the exact goal row.
  const postX = bounds.left + size * 0.22;
  ctx.beginPath();
  ctx.moveTo(geo.rightEdge - Math.max(4, cellSize * 0.035), geo.goalY);
  ctx.lineTo(postX, geo.goalY);
  ctx.strokeStyle = GOAL_STYLE.outline;
  ctx.lineWidth = Math.max(7, cellSize * 0.09);
  ctx.shadowColor = GOAL_STYLE.shadow;
  ctx.shadowBlur = Math.max(5, size * 0.08);
  ctx.stroke();
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = active ? th.connected : GOAL_STYLE.marker;
  ctx.lineWidth = Math.max(3.5, cellSize * 0.045);
  ctx.stroke();

  if (imgGoalMarker.complete && imgGoalMarker.naturalWidth > 0) {
    ctx.shadowColor = active ? th.connectedGlow : GOAL_STYLE.shadow;
    ctx.shadowBlur = Math.max(8, size * (0.1 + pulse * 0.035));
    ctx.drawImage(imgGoalMarker, bounds.left, bounds.top, size, size);
  } else {
    ctx.beginPath();
    ctx.arc(geo.goalX, geo.goalY, size * 0.23, 0, Math.PI * 2);
    ctx.fillStyle = GOAL_STYLE.cream;
    ctx.fill();
    ctx.strokeStyle = GOAL_STYLE.marker;
    ctx.lineWidth = Math.max(3, size * 0.045);
    ctx.stroke();
  }
  ctx.restore();
  return bounds;
}

function drawStartGoal(now, connectedSet) {
  const level = LEVELS[stageIdx];
  const geo = getJourneyGeometry();
  const checkpointHome = Boolean(level.checkpoint && stageCheckpointReached);
  const checkpointIdx = getCheckpointCellIndex(level);
  const startIdx = checkpointHome ? checkpointIdx : level.start.row * curCols;
  const startActive = connectedSet.has(startIdx);
  const home = checkpointHome ? getCheckpointCenter() : { x: geo.startX, y: geo.startY };
  const ponoH = Math.max(52, Math.min(132, cellSize * 0.88));
  const ponoRatio = imgPonoWorld.naturalWidth > 0 && imgPonoWorld.naturalHeight > 0
    ? imgPonoWorld.naturalWidth / imgPonoWorld.naturalHeight : 0.7;
  const ponoW = ponoH * ponoRatio;

  if (!journeyActor.active && state === S.PLAYING) {
    ctx.save();
    ctx.fillStyle = 'rgba(10,30,28,0.2)';
    ctx.beginPath();
    ctx.ellipse(home.x, home.y + ponoH * 0.42,
      ponoW * 0.44, ponoH * 0.075, 0, 0, Math.PI * 2);
    ctx.fill();
    if (imgPonoWorld.complete && imgPonoWorld.naturalWidth > 0) {
      ctx.shadowColor = startActive ? getTheme().connectedGlow : 'rgba(5,20,18,0.22)';
      ctx.shadowBlur = startActive ? Math.max(10, cellSize * 0.14) : Math.max(4, cellSize * 0.05);
      ctx.drawImage(imgPonoWorld, home.x - ponoW / 2, home.y - ponoH / 2, ponoW, ponoH);
    } else {
      ctx.font = `${Math.floor(cellSize * 0.46)}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🐻', home.x, home.y);
    }
    ctx.restore();
    drawWorldLabel('ポノ', home.x,
      home.y + ponoH * 0.5 + Math.max(6, cellSize * 0.05));
  }

  if (!checkpointHome) {
    drawGuideTrail(geo.startX + ponoW * 0.34,
      geo.leftEdge + Math.max(5, cellSize * 0.045), geo.startY, startActive, now);
  }

  const goalIdx = level.goal.row * curCols + (curCols - 1);
  const goalTile = grid[goalIdx];
  const goalEdges = getTileEdgesAt(goalIdx);
  const routeComplete = (!level.checkpoint || stageCheckpointReached) && Boolean(findGoalRoute());
  const goalActive = connectedSet.has(goalIdx) && goalTile && goalTile !== 'BLANK' &&
    goalEdges && goalEdges[1] && routeComplete;
  drawGoalBeacon(now, geo, goalActive, clueDiscovered);

  // A solved board is only a road. The clue appears after Pono actually arrives.
  if (!clueDiscovered) {
    return;
  }

  if (level.goalIcon === 'mom') {
    if (imgMomFull.complete && imgMomFull.naturalWidth > 0) {
      const momH = Math.max(66, Math.min(160, cellSize * 1.15));
      const momW = momH * imgMomFull.naturalWidth / imgMomFull.naturalHeight;
      const momX = geo.goalX + cellSize * 0.12;
      ctx.drawImage(imgMomFull, momX - momW / 2, geo.goalY - momH / 2, momW, momH);
      drawWorldLabel('おかあさん', momX,
        geo.goalY + momH * 0.5 + Math.max(6, cellSize * 0.04));
    } else {
      ctx.font = `${Math.max(28, Math.floor(cellSize * 0.48))}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🐻', geo.goalX, geo.goalY);
    }
    return;
  }

  if (level.clueAsset === 'moonlight' && imgMoonClue.complete && imgMoonClue.naturalWidth > 0) {
    const moonSize = Math.max(48, Math.min(108, cellSize * 0.72));
    ctx.save();
    ctx.shadowColor = 'rgba(255,235,133,0.62)';
    ctx.shadowBlur = Math.max(10, cellSize * 0.16);
    ctx.drawImage(imgMoonClue,
      geo.goalX - moonSize / 2, geo.goalY - moonSize / 2, moonSize, moonSize);
    ctx.restore();
    return;
  }

  if (imgClueSheet.complete && imgClueSheet.naturalWidth > 0 && level.clueCell) {
    const sourceW = imgClueSheet.naturalWidth / 3;
    const sourceH = imgClueSheet.naturalHeight / 2;
    const clueSize = Math.max(48, Math.min(108, cellSize * 0.72));
    ctx.save();
    ctx.shadowColor = getTheme().connectedGlow;
    ctx.shadowBlur = Math.max(10, cellSize * 0.15);
    ctx.drawImage(imgClueSheet,
      level.clueCell[0] * sourceW, level.clueCell[1] * sourceH, sourceW, sourceH,
      geo.goalX - clueSize / 2, geo.goalY - clueSize / 2, clueSize, clueSize);
    ctx.restore();
  }
}

function drawJourneyActor(now) {
  if (!journeyActor.active) return;
  const fx = journeyActor.x;
  const fy = journeyActor.y;
  const walkH = Math.floor(cellSize * 0.58);
  const spriteElapsed = Math.max(0, now - journeyActor.t0);
  const isMoving = journeyActor.phase !== JOURNEY_PHASE.DISCOVERY &&
    journeyActor.phase !== JOURNEY_PHASE.CHECKPOINT_DISCOVERY;
  const frameClock = isMoving ? spriteElapsed : 0;
  const horizontal = Math.abs(journeyActor.dx || 1) >= Math.abs(journeyActor.dy || 0);

  ctx.save();
  ctx.fillStyle = 'rgba(10,30,28,0.2)';
  ctx.beginPath();
  ctx.ellipse(fx, fy + walkH * 0.42, walkH * 0.22, walkH * 0.055, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  if (horizontal && imgWalkSideSheet.complete && imgWalkSideSheet.naturalWidth > 0) {
    const sideH = Math.floor(walkH * SIDE_WALK_SCALE);
    const sourceW = imgWalkSideSheet.naturalWidth / SIDE_WALK_FRAMES;
    const sourceH = imgWalkSideSheet.naturalHeight;
    const sideW = Math.floor(sideH * sourceW / sourceH);
    const frameIdx = Math.floor(frameClock / (1000 / WALK_FPS)) % SIDE_WALK_FRAMES;
    const sourceX = frameIdx * sourceW;
    ctx.save();
    if ((journeyActor.dx || 1) < 0) {
      ctx.translate(fx, fy);
      ctx.scale(-1, 1);
      ctx.drawImage(imgWalkSideSheet, sourceX, 0, sourceW, sourceH,
        -sideW / 2, -sideH / 2, sideW, sideH);
    } else {
      ctx.drawImage(imgWalkSideSheet, sourceX, 0, sourceW, sourceH,
        fx - sideW / 2, fy - sideH / 2, sideW, sideH);
    }
    ctx.restore();
  } else if (imgWalkSheet.complete && imgWalkSheet.naturalWidth > 0) {
    const sourceW = imgWalkSheet.naturalWidth / WALK_FRAMES;
    const sourceH = imgWalkSheet.naturalHeight;
    const walkW = Math.floor(walkH * sourceW / sourceH);
    const frameIdx = Math.floor(frameClock / (1000 / WALK_FPS)) % WALK_FRAMES;
    ctx.drawImage(imgWalkSheet, frameIdx * sourceW, 0, sourceW, sourceH,
      fx - walkW / 2, fy - walkH / 2, walkW, walkH);
  } else {
    ctx.font = `${Math.floor(cellSize * 0.5)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🐻', fx, fy);
  }
}

function draw(now) {
  // Background image (stage-specific)
  var bgIdx = Math.min(stageIdx, stageBgImgs.length - 1);
  var bgImg = stageBgImgs[bgIdx];
  if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
    var iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
    var sc = Math.max(CW / iw, CH / ih);
    var dw = iw * sc, dh = ih * sc;
    ctx.drawImage(bgImg, (CW - dw) / 2, (CH - dh) / 2, dw, dh);
  } else {
    ctx.fillStyle = '#E8F5E9';
    ctx.fillRect(0, 0, CW, CH);
  }

  // The new plates already carry their own light. Keep only a very soft wash so
  // the board reads clearly without turning the illustration brown or gloomy.
  const wash = ctx.createLinearGradient(0, 0, 0, CH);
  wash.addColorStop(0, 'rgba(20,67,73,0.04)');
  wash.addColorStop(0.35, 'rgba(255,255,255,0)');
  wash.addColorStop(1, 'rgba(13,47,61,0.06)');
  ctx.fillStyle = wash;
  ctx.fillRect(0, 0, CW, CH);
  drawBoardAtmosphere(now);

  const total = curCols * curRows;
  const hasBoard = emptyIdx >= 0 && grid.length === total;
  const connectedSet = hasBoard ? getStartConnectedTileSet() : new Set();
  const hintMoveBase = stageCheckpointReached && stageAttemptSnapshot &&
    stageAttemptSnapshot.stageIdx === stageIdx
      ? stageAttemptSnapshot.moveCountBase : 0;
  const hintVisible = hasBoard && state === S.PLAYING && moveCount === hintMoveBase &&
    !hintDismissed && !_slideTutActive && !magicCrossSelectMode && now >= hintReadyAt &&
    getAdjacentIndices(emptyIdx).includes(suggestedMoveIdx) && grid[suggestedMoveIdx] !== null;
  const interactionReady = hasBoard && state === S.PLAYING && !animating &&
    !journeyActor.active && !_slideTutActive && !magicCrossSelectMode;
  const legalMovableSet = new Set(interactionReady
    ? getAdjacentIndices(emptyIdx).filter(function(index) {
      return grid[index] !== null && !isCheckpointLockedCell(index);
    }) : []);
  const hintPreviewAmount = hintVisible
    ? getHintPreviewAmount(now, suggestedMoveIdx) : 0;
  if (hasBoard) {
    const destinationIdx = animating && anim.targetIdx >= 0 ? anim.targetIdx : emptyIdx;
    drawEmptySlot(now, destinationIdx, { target: hintVisible || animating });
    // Paint the source hollow underneath the same panel that moves. At rest the
    // panel covers it; as the panel slides away, the new empty place is revealed.
    if (animating && anim.idx >= 0) drawEmptySlot(now, anim.idx, { source: true });
    else if (hintVisible && hintPreviewAmount > 0) {
      drawEmptySlot(now, suggestedMoveIdx, { preview: true });
    }
  }

  // Build one visual list, then paint ground and roads in separate passes. This
  // lets every road cross the hairline between cells before another base can
  // cover it, so the route reads as one forest trail instead of rounded buttons.
  const tileVisuals = [];
  for (let i = 0; i < total; i++) {
    const tileKey = grid[i];
    if (!tileKey) continue;
    const row = Math.floor(i / curCols), col = i % curCols;
    let x = gridOX + col * cellSize;
    let y = gridOY + row * cellSize;
    let drawSize = cellSize;

    if (animating && i === anim.idx) {
      x = anim.curX;
      y = anim.curY;
      if (!reducedMotionQuery.matches) {
        const motionT = Math.max(0, Math.min(1,
          (now - anim.t0) / Math.max(1, getSlideDuration())));
        const lift = Math.sin(Math.PI * motionT);
        drawSize = cellSize * (1 + lift * 0.055);
        x -= (drawSize - cellSize) / 2;
        y -= (drawSize - cellSize) / 2 + lift * cellSize * 0.035;
      }
    } else if (hintVisible && i === suggestedMoveIdx && hintPreviewAmount > 0) {
      const emptyRow = Math.floor(emptyIdx / curCols), emptyCol = emptyIdx % curCols;
      const nudge = hintPreviewAmount * cellSize;
      x += (emptyCol - col) * nudge;
      y += (emptyRow - row) * nudge;
    }
    const movable = legalMovableSet.has(i);
    const suggested = hintVisible && i === suggestedMoveIdx && !animating;
    tileVisuals.push({
      x: x,
      y: y,
      size: drawSize,
      tileKey: tileKey,
      index: i,
      now: now,
      effectiveTileKey: getEffectiveTileKeyAt(i),
      connected: !(animating && i === anim.idx) && connectedSet.has(i),
      movable: movable,
      suggested: suggested,
      animating: animating && i === anim.idx,
      settled: isCheckpointLockedCell(i),
    });
  }

  const restingTiles = tileVisuals.filter(function(visual) { return !visual.animating; });
  const movingTile = tileVisuals.find(function(visual) { return visual.animating; });
  restingTiles.forEach(function(visual) {
    drawTileBase(visual.x, visual.y, visual.size, visual.tileKey, visual);
  });
  restingTiles.forEach(function(visual) {
    drawTileRoadUnderlay(visual.x, visual.y, visual.size, visual.tileKey, visual);
  });
  restingTiles.forEach(function(visual) {
    drawTileRoadSurface(visual.x, visual.y, visual.size, visual.tileKey, visual);
  });
  if (movingTile) {
    drawTileBase(movingTile.x, movingTile.y, movingTile.size, movingTile.tileKey, movingTile);
    drawTileRoadUnderlay(movingTile.x, movingTile.y, movingTile.size, movingTile.tileKey, movingTile);
    drawTileRoadSurface(movingTile.x, movingTile.y, movingTile.size, movingTile.tileKey, movingTile);
  }

  tileVisuals.forEach(function(visual) {
    if (magicCrossSelectMode && isMagicSelectableTile(visual.index) && !animating) {
      drawMagicSelectableFrame(visual.x, visual.y, visual.size, now);
    }
    if (!LEVELS[stageIdx].checkpoint && !pickupCollected && visual.index === pickupTileIdx) {
      drawCharmAt(visual.x + visual.size / 2, visual.y + visual.size / 2,
        visual.size * 0.54, now, false);
    }
    if (visual.index === magicCrossTileIdx) {
      drawCharmAt(visual.x + visual.size / 2, visual.y + visual.size / 2,
        visual.size * 0.3, now, true);
    }
    if (visual.settled) drawSettledFootprints(visual.x, visual.y, visual.size, visual.index);
    drawMovableEdgeCue(visual);
  });
  drawMoveFeedback(now);

  // World markers and the single persistent actor are complementary layers.
  if (hasBoard) drawCheckpointMarker(now);
  if (hasBoard) drawStartGoal(now, connectedSet);
  if (journeyActor.active) drawJourneyActor(now);

  // Pause overlay on canvas
  if (state === S.PAUSED) {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.font = `900 ${Math.floor(CW * 0.09)}px 'Zen Maru Gothic', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText('⏸ ポーズちゅう', CW / 2, CH / 2);
  }
}

// ===== Update animation =====
function updateAnim(now) {
  if (!animating) return;
  if (anim.idx < 0 || anim.targetIdx < 0 || anim.targetIdx !== emptyIdx ||
      grid[anim.targetIdx] !== null || grid[anim.idx] === null) {
    animating = false;
    anim.idx = -1;
    anim.targetIdx = -1;
    anim.suspendedAt = 0;
    syncMagicCrossButton();
    return;
  }
  if (syncSlideAnimationSuspension(now)) return;
  const fromRow = Math.floor(anim.idx / curCols), fromCol = anim.idx % curCols;
  const targetRow = Math.floor(anim.targetIdx / curCols), targetCol = anim.targetIdx % curCols;
  // Re-derive geometry every frame so a resize cannot leave the panel between cells.
  anim.fromX = gridOX + fromCol * cellSize;
  anim.fromY = gridOY + fromRow * cellSize;
  anim.toX = gridOX + targetCol * cellSize;
  anim.toY = gridOY + targetRow * cellSize;
  const t = Math.min((now - anim.t0) / Math.max(1, getSlideDuration()), 1);
  const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  anim.curX = anim.fromX + (anim.toX - anim.fromX) * ease;
  anim.curY = anim.fromY + (anim.toY - anim.fromY) * ease;

  if (t >= 1) {
    const oldEmpty = anim.targetIdx;
    moveTrackedTile(anim.idx, oldEmpty);
    grid[oldEmpty] = grid[anim.idx];
    grid[anim.idx] = null;
    emptyIdx = anim.idx;
    moveFeedback.fromIdx = anim.idx;
    moveFeedback.toIdx = oldEmpty;
    moveFeedback.t0 = now;
    moveCount++;
    updateHUD();
    animating = false;
    anim.idx = -1;
    anim.targetIdx = -1;
    anim.suspendedAt = 0;
    syncMagicCrossButton();

    if (!_slideTutActive) handleRouteCompletion(performance.now());
  }
}

function waitForCurrentSlide(callback) {
  function check() {
    if (animating) {
      requestAnimationFrame(check);
      return;
    }
    callback();
  }
  requestAnimationFrame(check);
}

function hideJourneyToastOverlay() {
  const toast = document.getElementById('journey-toast');
  if (toast) toast.classList.remove('show', 'discovery', 'retry');
  journeyToastHideAt = 0;
  journeyHudPausesClock = false;
}

function showJourneyToast(message, discovery, retry, pauseClock) {
  const toast = document.getElementById('journey-toast');
  if (!toast || !message) return;
  const hudStatus = document.getElementById('journey-hud-status');
  if (state === S.PLAYING && !discovery && !retry && !_slideTutActive) {
    hideJourneyToastOverlay();
    const stageNode = document.getElementById('hud-stage');
    if (stageNode) {
      stageNode.textContent = String(message).replace(/\s*\n\s*/g, ' ');
      stageNode.classList.add('is-journey-message');
      journeyHudMessageHideAt = performance.now() + 2400;
    }
    journeyHudPausesClock = Boolean(pauseClock);
    if (hudStatus) hudStatus.textContent = String(message).replace(/\s*\n\s*/g, ' ');
    return;
  }
  journeyHudPausesClock = false;
  if (hudStatus) hudStatus.textContent = '';
  journeyHudMessageHideAt = 0;
  const stageNode = document.getElementById('hud-stage');
  if (stageNode && !_slideTutActive) {
    stageNode.textContent = LEVELS[stageIdx].name;
    stageNode.classList.remove('is-journey-message');
  }
  toast.textContent = message;
  toast.classList.toggle('discovery', Boolean(discovery));
  toast.classList.toggle('retry', Boolean(retry));
  toast.classList.add('show');
  journeyToastHideAt = performance.now() + (retry ? RETRY_MESSAGE_MS + 400 : (discovery ? 2100 : 2400));
}

function updateJourneyToast(now) {
  if (journeyHudMessageHideAt && now >= journeyHudMessageHideAt) {
    journeyHudMessageHideAt = 0;
    journeyHudPausesClock = false;
    const hudStatus = document.getElementById('journey-hud-status');
    if (hudStatus) hudStatus.textContent = '';
    const stageNode = document.getElementById('hud-stage');
    if (stageNode) {
      stageNode.textContent = _slideTutActive ? 'れんしゅう' : LEVELS[stageIdx].name;
      stageNode.classList.remove('is-journey-message');
    }
  }
  if (!journeyToastHideAt || now < journeyToastHideAt) return;
  const toast = document.getElementById('journey-toast');
  if (toast) toast.classList.remove('show');
  journeyToastHideAt = 0;
}

function renewPendingRetryBeat(now) {
  const beatNow = Number.isFinite(now) ? now : performance.now();
  stageClock.restartAt = beatNow + RETRY_MESSAGE_MS;
  journeyHudMessageHideAt = 0;
  journeyHudPausesClock = false;
  const hudStatus = document.getElementById('journey-hud-status');
  if (hudStatus) hudStatus.textContent = '';
  const toast = document.getElementById('journey-toast');
  if (!toast) return;
  if (!toast.classList.contains('show') || toast.textContent !== RETRY_MESSAGE_TEXT) {
    toast.textContent = RETRY_MESSAGE_TEXT;
  }
  toast.classList.remove('discovery');
  toast.classList.add('show', 'retry');
  journeyToastHideAt = stageClock.restartAt + 400;
}

function setJourneyPath(phase, points, duration, now) {
  journeyActor.active = true;
  journeyActor.phase = phase;
  journeyActor.path = points;
  journeyActor.progress = 0;
  journeyActor.t0 = now;
  journeyActor.duration = duration;
  journeyActor.suspendedAt = 0;
  journeyActor.x = points[0].x;
  journeyActor.y = points[0].y;
  journeyActor.dx = points.length > 1 ? points[1].x - points[0].x : 1;
  journeyActor.dy = points.length > 1 ? points[1].y - points[0].y : 0;
}

function updateJourneyPosition(now) {
  const points = journeyActor.path;
  if (!points || points.length === 0) return 1;
  const duration = Math.max(1, journeyActor.duration);
  const raw = Math.max(0, Math.min((now - journeyActor.t0) / duration, 1));
  const eased = raw < 0.5 ? 2 * raw * raw : 1 - Math.pow(-2 * raw + 2, 2) / 2;
  journeyActor.progress = eased;
  if (journeyActor.phase === JOURNEY_PHASE.INTRO && !journeyActor.tutorial) {
    syncJourneyProgress(
      stageClock.introPonoStart + (stageClock.attemptPonoStart - stageClock.introPonoStart) * eased,
      stageClock.introMotherStart + (stageClock.attemptMotherStart - stageClock.introMotherStart) * eased,
      { updateA11y: Math.floor(eased * 20) !== stageClock.lastAriaBucket }
    );
    stageClock.lastAriaBucket = Math.floor(eased * 20);
  }
  if (journeyActor.phase === JOURNEY_PHASE.EXIT && !journeyActor.tutorial) {
    const ponoTarget = getPonoStageEndProgress(stageIdx);
    const motherTarget = getMotherStageEndProgress(stageIdx);
    syncJourneyProgress(
      stageClock.exitPonoStart + (ponoTarget - stageClock.exitPonoStart) * eased,
      stageClock.exitMotherStart + (motherTarget - stageClock.exitMotherStart) * eased,
      { updateA11y: Math.floor(eased * 20) !== stageClock.lastAriaBucket }
    );
    stageClock.lastAriaBucket = Math.floor(eased * 20);
  }
  if (journeyActor.phase === JOURNEY_PHASE.CHECKPOINT && !journeyActor.tutorial) {
    const target = getCheckpointJourneyTargets();
    syncJourneyProgress(
      stageClock.checkpointPonoStart +
        (target.pono - stageClock.checkpointPonoStart) * eased,
      stageClock.checkpointMotherStart +
        (target.mother - stageClock.checkpointMotherStart) * eased,
      { updateA11y: Math.floor(eased * 20) !== stageClock.lastAriaBucket }
    );
    stageClock.lastAriaBucket = Math.floor(eased * 20);
  }
  const exact = eased * (points.length - 1);
  const fromIndex = Math.min(Math.floor(exact), points.length - 1);
  const toIndex = Math.min(fromIndex + 1, points.length - 1);
  const mix = exact - fromIndex;
  const from = points[fromIndex];
  const to = points[toIndex];
  journeyActor.x = from.x + (to.x - from.x) * mix;
  journeyActor.y = from.y + (to.y - from.y) * mix;
  if (to.x !== from.x || to.y !== from.y) {
    journeyActor.dx = to.x - from.x;
    journeyActor.dy = to.y - from.y;
  }
  if (journeyActor.phase === JOURNEY_PHASE.EXIT && !pickupCollected &&
      pickupJourneyProgress >= 0 && eased >= pickupJourneyProgress) {
    collectJourneyPickup();
  }
  return raw;
}

function finishJourneyIntro(now) {
  if (journeyActor.phase !== JOURNEY_PHASE.INTRO) return;
  const introToast = document.getElementById('journey-toast');
  const introMessage = introToast && introToast.classList.contains('show')
    ? introToast.textContent : '';
  hideJourneyToastOverlay();
  const geo = getJourneyGeometry();
  journeyActor.active = false;
  journeyActor.phase = JOURNEY_PHASE.PLAYING;
  journeyActor.x = geo.startX;
  journeyActor.y = geo.startY;
  syncJourneyProgress(stageClock.attemptPonoStart, stageClock.attemptMotherStart);
  state = S.PLAYING;
  prepauseState = S.PLAYING;
  hintReadyAt = now + 1500;
  setPauseAvailable(true);
  syncMagicCrossButton();
  startStageClock(now);
  if (!mechanicGuideShown && LEVELS[stageIdx].checkpoint) {
    mechanicGuideShown = true;
    showJourneyToast('おかあさんの しるしまで みちを つなごう！', false, false, true);
  } else if (!mechanicGuideShown && LEVELS[stageIdx].pickup) {
    mechanicGuideShown = true;
    showJourneyToast('ひかりを とおって ゴールへ！', false, false, true);
  } else if (!mechanicGuideShown && LEVELS[stageIdx].magicCross) {
    mechanicGuideShown = true;
    hintDismissed = true;
    showJourneyToast('ひかりの よつぼしを つかってみよう！', false, false, true);
  } else if (introMessage) {
    showJourneyToast(introMessage, false);
  }
}

function getCheckpointJourneyTargets() {
  return {
    pono: Math.max(stageClock.checkpointPonoStart, getPonoCheckpointProgress(stageIdx)),
    mother: Math.max(stageClock.checkpointMotherStart, getMotherCheckpointProgress(stageIdx)),
  };
}

function onCheckpointReached(route, now) {
  const level = LEVELS[stageIdx];
