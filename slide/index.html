  if (!level.checkpoint || stageCheckpointReached || journeyActor.active) return;
  const checkpointNow = Number.isFinite(now) ? now : performance.now();
  stopStageClock(checkpointNow);
  state = S.TRAVELLING;
  prepauseState = S.TRAVELLING;
  magicCrossSelectMode = false;
  setPauseAvailable(false);
  syncMagicCrossButton();
  stageCheckpointTrail = route.trail.slice();
  stageClock.checkpointPonoStart = stageClock.ponoProgress;
  stageClock.checkpointMotherStart = stageClock.motherProgress;
  stageClock.lastAriaBucket = -1;
  const geo = getJourneyGeometry();
  const points = [{ x: geo.startX, y: geo.startY }].concat(route.trail.map(function(point) {
    return getCellCenter(point.index);
  }));
  journeyActor.tutorial = false;
  setJourneyPath(JOURNEY_PHASE.CHECKPOINT, points,
    reducedMotionQuery.matches ? 1 : Math.max(620, (points.length - 1) * 260),
    checkpointNow);
}

function finishCheckpointArrival(now) {
  if (journeyActor.phase !== JOURNEY_PHASE.CHECKPOINT) return;
  const target = getCheckpointJourneyTargets();
  syncJourneyProgress(target.pono, target.mother);
  if (!pickupCollected) {
    pickupCollected = true;
    pickupJourneyProgress = -1;
    magicCharmOwned = true;
    playCharmSound();
  }
  const center = getCheckpointCenter();
  journeyActor.phase = JOURNEY_PHASE.CHECKPOINT_DISCOVERY;
  journeyActor.active = true;
  journeyActor.path = [{ x: center.x, y: center.y }];
  journeyActor.x = center.x;
  journeyActor.y = center.y;
  journeyActor.t0 = now;
  journeyActor.duration = reducedMotionQuery.matches ? 1 : 1100;
  state = S.PLAYING;
  prepauseState = S.PLAYING;
  setPauseAvailable(false);
  syncMagicCrossButton();
  showJourneyToast('おかあさんの しるしを みつけた！\nつぎの みちを つなごう！',
    false, false, true);
}

function setupCheckpointSecondLeg(now) {
  const level = LEVELS[stageIdx];
  const checkpoint = level.checkpoint;
  grid = level.solved.slice();
  emptyIdx = grid.indexOf(null);
  checkpoint.secondShuffle.forEach(function(cell) {
    applySlideMove(getLevelCellIndex(level, cell));
  });
  stageCheckpointReached = true;
  stageCheckpointLockedCells = new Set(getCheckpointLockedIndices(level));
  pickupTileIdx = getCheckpointCellIndex(level);
  pickupCollected = true;
  magicCharmOwned = true;
  magicCrossTileIdx = -1;
  magicCrossSelectMode = false;
  suggestedMoveIdx = getLevelCellIndex(level, checkpoint.secondShuffle[0]);
  hintDismissed = false;
  hintReadyAt = now + 650;
  mechanicGuideShown = true;
  animating = false;
  anim.idx = -1;
  anim.targetIdx = -1;
  resetMoveFeedback();
}

function finishCheckpointDiscovery(now) {
  if (journeyActor.phase !== JOURNEY_PHASE.CHECKPOINT_DISCOVERY) return;
  const preservedProgress = {
    pono: stageClock.ponoProgress,
    mother: stageClock.motherProgress,
  };
  setupCheckpointSecondLeg(now);
  const center = getCheckpointCenter();
  journeyActor.active = false;
  journeyActor.phase = JOURNEY_PHASE.PLAYING;
  journeyActor.x = center.x;
  journeyActor.y = center.y;
  resetStageClock(stageIdx, preservedProgress);
  state = S.PLAYING;
  prepauseState = S.PLAYING;
  updateHUD({ resetProgress: true, forceTime: true });
  setPauseAvailable(true);
  syncMagicCrossButton();
  captureStageAttemptSnapshot();
  startStageClock(now);
}

function handleRouteCompletion(now) {
  if (_slideTutActive || state !== S.PLAYING || journeyActor.active) return false;
  const level = LEVELS[stageIdx];
  if (level.checkpoint && !stageCheckpointReached) {
    const checkpointRoute = findCheckpointRoute();
    if (checkpointRoute) {
      onCheckpointReached(checkpointRoute, now);
      return true;
    }
    if (hasBareGoalRoute()) {
      showJourneyToast('まずは おかあさんの しるしまで！', false, false, true);
    }
    return false;
  }
  if (checkWin()) {
    onStageClear();
    return true;
  }
  if (level.pickup && hasBareGoalRoute()) {
    showJourneyToast('ひかりも とおろう！', false, false, true);
  }
  return false;
}

function collectJourneyPickup() {
  if (pickupCollected || pickupTileIdx < 0) return;
  pickupCollected = true;
  pickupJourneyProgress = -1;
  magicCharmOwned = true;
  playCharmSound();
  showJourneyToast('ひかりの よつぼしを みつけた！', true);
}

function finishExitWithDiscovery(now) {
  if (journeyActor.phase !== JOURNEY_PHASE.EXIT) return;
  if (!journeyActor.tutorial) {
    syncJourneyProgress(
      getPonoStageEndProgress(stageIdx),
      getMotherStageEndProgress(stageIdx)
    );
  }
  if (!pickupCollected && pickupTileIdx >= 0) collectJourneyPickup();
  const geo = getJourneyGeometry();
  journeyActor.phase = JOURNEY_PHASE.DISCOVERY;
  journeyActor.active = true;
  journeyActor.path = [{ x: geo.discoverX, y: geo.goalY }];
  journeyActor.x = geo.discoverX;
  journeyActor.y = geo.goalY;
  journeyActor.t0 = now;
  journeyActor.duration = reducedMotionQuery.matches ? 700 : 1500;
  clueDiscovered = true;
  showJourneyToast(LEVELS[stageIdx].discoveryMsg, true);
}

function beginJourneyDeparture(now) {
  const geo = getJourneyGeometry();
  setJourneyPath(JOURNEY_PHASE.DEPARTING, [
    { x: journeyActor.x, y: journeyActor.y },
    { x: geo.departX, y: geo.goalY },
  ], reducedMotionQuery.matches ? 1 : 620, now);
}

function queueGameClearReward() {
  if (gameClearQueued) return;
  gameClearQueued = true;
  state = S.GAME_CLEAR;
  setPauseAvailable(false);
  if (window.triggerFirstClearReward) {
    window.triggerFirstClearReward('slide', {
      onClose: function() { showOverlay('gameclear'); }
    }).then(function(shown) {
      if (!shown) showOverlay('gameclear');
    }).catch(function() { showOverlay('gameclear'); });
  } else {
    showOverlay('gameclear');
  }
}

function finishJourneyDeparture() {
  if (journeyActor.phase !== JOURNEY_PHASE.DEPARTING) return;
  journeyActor.active = false;
  journeyActor.phase = JOURNEY_PHASE.DONE;
  if (journeyActor.tutorial) return;
  if (stageIdx >= LEVELS.length - 1) {
    queueGameClearReward();
  } else if (LEVELS[stageIdx].cutscene) {
    showCutscene();
  } else {
    nextStage();
  }
}

function isJourneyEnvironmentSuspended() {
  const menuOpen = Boolean(document.querySelector('.pono-dropdown.show'));
  const confirmOpen = Boolean(document.querySelector('.pono-confirm-overlay.show'));
  const portrait = window.innerHeight >= window.innerWidth;
  return state === S.PAUSED || document.hidden || !slideWindowFocused ||
    menuOpen || confirmOpen || portrait || !overlay.classList.contains('hidden');
}

function syncSlideAnimationSuspension(now) {
  if (!animating) return false;
  const tick = Number.isFinite(now) ? now : performance.now();
  if (isJourneyEnvironmentSuspended()) {
    if (!anim.suspendedAt) anim.suspendedAt = tick;
    return true;
  }
  if (anim.suspendedAt) {
    anim.t0 += Math.max(0, tick - anim.suspendedAt);
    anim.suspendedAt = 0;
  }
  return false;
}

function syncJourneyTimelineSuspension(now) {
  if (!journeyActor.active) return false;
  const tick = Number.isFinite(now) ? now : performance.now();
  if (isJourneyEnvironmentSuspended()) {
    if (!journeyActor.suspendedAt) journeyActor.suspendedAt = tick;
    return true;
  }
  if (journeyActor.suspendedAt) {
    journeyActor.t0 += Math.max(0, tick - journeyActor.suspendedAt);
    journeyActor.suspendedAt = 0;
  }
  return false;
}

function updateJourney(now) {
  if (!journeyActor.active || syncJourneyTimelineSuspension(now)) return;

  if (journeyActor.phase === JOURNEY_PHASE.INTRO) {
    if (reducedMotionQuery.matches) {
      finishJourneyIntro(now);
      return;
    }
    if (updateJourneyPosition(now) >= 1) finishJourneyIntro(now);
    return;
  }

  if (journeyActor.phase === JOURNEY_PHASE.CHECKPOINT) {
    if (reducedMotionQuery.matches) {
      finishCheckpointArrival(now);
      return;
    }
    if (updateJourneyPosition(now) >= 1) finishCheckpointArrival(now);
    return;
  }

  if (journeyActor.phase === JOURNEY_PHASE.CHECKPOINT_DISCOVERY) {
    if (now - journeyActor.t0 >= journeyActor.duration) finishCheckpointDiscovery(now);
    return;
  }

  if (journeyActor.phase === JOURNEY_PHASE.EXIT) {
    if (reducedMotionQuery.matches) {
      finishExitWithDiscovery(now);
      return;
    }
    if (updateJourneyPosition(now) >= 1) finishExitWithDiscovery(now);
    return;
  }

  if (journeyActor.phase === JOURNEY_PHASE.DISCOVERY) {
    if (now - journeyActor.t0 >= journeyActor.duration) beginJourneyDeparture(now);
    return;
  }

  if (journeyActor.phase === JOURNEY_PHASE.DEPARTING) {
    if (reducedMotionQuery.matches) {
      finishJourneyDeparture();
      return;
    }
    if (updateJourneyPosition(now) >= 1) finishJourneyDeparture();
  }
}

// ===== Game loop =====
function updateJourneyMotionState() {
  const node = document.getElementById('stage-num');
  if (!node) return;
  const menuOpen = Boolean(document.querySelector('.pono-dropdown.show'));
  const confirmOpen = Boolean(document.querySelector('.pono-confirm-overlay.show'));
  const actorMoving = journeyActor.active &&
    (journeyActor.phase === JOURNEY_PHASE.INTRO ||
      journeyActor.phase === JOURNEY_PHASE.CHECKPOINT ||
      journeyActor.phase === JOURNEY_PHASE.EXIT);
  const puzzleMoving = stageClock.active && state === S.PLAYING;
  const motionAllowed = !reducedMotionQuery.matches && !_slideTutActive &&
    !document.hidden && slideWindowFocused && window.innerWidth > window.innerHeight &&
    !menuOpen && !confirmOpen && overlay.classList.contains('hidden');
  node.classList.toggle('is-moving', motionAllowed && (actorMoving || puzzleMoving));
}

function loop(ts) {
  requestAnimationFrame(loop);
  updateAnim(ts);
  updateJourney(ts);
  updateStageClock(ts);
  updateJourneyToast(ts);
  updateJourneyMotionState();
  draw(ts);
}

// ===== Input =====
function handleTap(px, py) {
  if (state !== S.PLAYING || animating || journeyActor.active) return false;

  const col = Math.floor((px - gridOX) / cellSize);
  const row = Math.floor((py - gridOY) / cellSize);
  if (col < 0 || col >= curCols || row < 0 || row >= curRows) return false;

  const tappedIdx = row * curCols + col;
  if (grid[tappedIdx] === null) return false;
  if (isCheckpointLockedCell(tappedIdx)) {
    showJourneyToast('ここは もう とおった みちだよ', false);
    return false;
  }

  if (magicCrossSelectMode) {
    if (!isMagicSelectableTile(tappedIdx)) {
      showJourneyToast('ほかの みちを えらんでね', false);
      return false;
    }
    magicCrossTileIdx = tappedIdx;
    magicCrossSelectMode = false;
    hintDismissed = true;
    playCharmSound();
    showJourneyToast('よつまたに なった！', false);
    syncMagicCrossButton();
    if (!_slideTutActive) handleRouteCompletion(performance.now());
    return true;
  }

  const eRow = Math.floor(emptyIdx / curCols), eCol = emptyIdx % curCols;
  const dist = Math.abs(eRow - row) + Math.abs(eCol - col);
  if (dist !== 1) return false;

  // Start slide animation
  resetMoveFeedback();
  animating = true;
  anim.idx = tappedIdx;
  anim.targetIdx = emptyIdx;
  anim.fromX = gridOX + col * cellSize;
  anim.fromY = gridOY + row * cellSize;
  anim.toX   = gridOX + eCol * cellSize;
  anim.toY   = gridOY + eRow * cellSize;
  anim.curX  = anim.fromX;
  anim.curY  = anim.fromY;
  anim.t0    = performance.now();
  anim.suspendedAt = 0;
  hintDismissed = true;
  syncMagicCrossButton();
  playSlideSound();
  return true;
}

magicCrossBtn.addEventListener('click', function(event) {
  event.preventDefault();
  event.stopPropagation();
  if (magicCrossBtn.disabled) return;
  magicCrossSelectMode = !magicCrossSelectMode;
  hintDismissed = true;
  syncMagicCrossButton();
  showJourneyToast(magicCrossSelectMode
    ? 'みちを ひとつ えらんでね'
    : 'もういちど タッチで つかえるよ', false);
});

wrap.addEventListener('pointerdown', e => {
  if (state === S.PAUSED || _slideTutActive) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) * (CW / rect.width);
  const py = (e.clientY - rect.top) * (CH / rect.height);
  handleTap(px, py);
});

// ===== Stage clear =====
function onStageClear() {
  if (state !== S.PLAYING || journeyActor.active) return false;
  const clearNow = performance.now();
  stopStageClock(clearNow);
  const timeNode = document.getElementById('hud-time');
  if (timeNode) {
    timeNode.textContent = 'つながった！';
    timeNode.setAttribute('aria-label', 'みちが つながった');
    timeNode.classList.remove('is-urgent');
  }
  stageClock.exitPonoStart = Math.min(getPonoStageEndProgress(stageIdx), stageClock.ponoProgress);
  stageClock.exitMotherStart = Math.min(getMotherStageEndProgress(stageIdx), stageClock.motherProgress);
  stageClock.lastAriaBucket = -1;
  state = S.TRAVELLING;
  magicCrossSelectMode = false;
  syncMagicCrossButton();
  setPauseAvailable(false);
  playClearSound();
  if (window.incrementStat) window.incrementStat('slide_clears', 1);
  const route = traceWinPath();
  const pickupPointIndex = route.findIndex(function(point) {
    return point.index === pickupTileIdx;
  });
  pickupJourneyProgress = pickupPointIndex >= 0
    ? pickupPointIndex / Math.max(1, route.length - 1)
    : -1;
  const geo = getJourneyGeometry();
  const points = route.map(function(point) {
    return {
      x: gridOX + (point.col + 0.5) * cellSize,
      y: gridOY + (point.row + 0.5) * cellSize,
    };
  });
  if (points.length === 0) points.push(
    LEVELS[stageIdx].checkpoint && stageCheckpointReached
      ? getCheckpointCenter()
      : { x: geo.startX, y: geo.startY }
  );
  if (!(LEVELS[stageIdx].checkpoint && stageCheckpointReached)) {
    points[0] = { x: geo.startX, y: geo.startY };
  }
  points[points.length - 1] = { x: geo.discoverX, y: geo.goalY };
  journeyActor.tutorial = false;
  setJourneyPath(JOURNEY_PHASE.EXIT, points,
    reducedMotionQuery.matches ? 1 : Math.max(900, (points.length - 1) * 260),
    clearNow);
}

// ===== Confetti =====
function launchConfetti() {
  const c = document.getElementById('confetti');
  c.innerHTML = '';
  const colors = ['#4CAF50','#81C784','#FFC107','#FF9800','#E91E63','#9C27B0'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const sz = 6 + Math.random() * 8;
    el.style.cssText = `
      left:${Math.random()*100}%;
      width:${sz}px; height:${sz}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      animation-delay:${Math.random() * 0.4}s;
      animation-duration:${2 + Math.random()}s;
    `;
    c.appendChild(el);
  }
  setTimeout(() => { c.innerHTML = ''; }, 3500);
}

// ===== Overlay =====
const overlay = document.getElementById('overlay');

function showOverlay(type) {
  const icon  = document.getElementById('ov-icon');
  const title = document.getElementById('ov-title');
  const msg   = document.getElementById('ov-msg');
  const journeyStatus = document.getElementById('cutscene-journey-status');
  const btn   = document.getElementById('ov-btn');
  const back  = document.getElementById('ov-back');
  setPauseAvailable(false);
  overlay.classList.remove('hidden');
  overlay.setAttribute('aria-hidden', 'false');
  document.body.classList.remove('slide-cutscene-open');
  back.classList.add('hidden');
  title.style.whiteSpace = '';
  document.querySelector('.ov-card').classList.remove('cutscene-mode', 'cutscene-fullscreen');

  var actionType = type;
  if (journeyStatus) journeyStatus.textContent = '';
  var ponoFaceTag = '<img src="../assets/images/characters/pono/pono_face_circle.png" style="width:72px;height:72px;object-fit:contain;" alt="ポノ">';

  if (type === 'start') {
    icon.innerHTML    = ponoFaceTag;
    if (!localStorage.getItem('slide_tut_seen') && INITIAL_STAGE_IDX === 0) {
      title.textContent = 'みちつなぎ';
      msg.textContent   = 'パネルを うごかして\nひだりから みぎへ つなげよう！\nまずは れんしゅうから！';
      btn.textContent   = 'やってみる ▶';
      actionType = 'tutorial-start';
    } else {
      title.textContent = 'おかあさん どこいったの？';
      msg.textContent   = LEVELS[stageIdx].storyMsg;
      btn.textContent   = 'さがしにいく ▶';
    }
  } else if (type === 'gameclear') {
    launchConfetti();
    playGameClearSound();
    var card = document.querySelector('.ov-card');
    card.classList.add('cutscene-mode');
    icon.innerHTML    = '<img src="../assets/images/Slide/cutscene_ending.png" class="cutscene-img" alt="">';
    title.textContent = 'おかあさんと さいかい！';
    msg.textContent   = `「ポノの だいすきな きのみと\nキノコを とりにきたの。\nおそくなって ごめんね！\nいっしょに かえろう！」\nてかず${moveCount} でクリア！`;
    btn.textContent   = 'もういっかい ▶';
    if (journeyStatus) journeyStatus.textContent = 'ポノが おかあさんに おいつきました';
  }

  btn.dataset.ovType = actionType;
  syncMagicCrossButton();
  requestAnimationFrame(function() { btn.focus({ preventScroll: true }); });
}

function getMotherJourneyProgress(index) {
  return Math.min(1, (Math.floor(index / 2) + 1) * 0.25);
}

function getPonoChapterWaypoint(chapter) {
  const lastChapter = LEVELS.length / 2;
  if (chapter <= 0) return 0;
  if (chapter >= lastChapter) return 1;
  return chapter * 0.25 - PONO_STORY_GAP;
}

function getPonoStageStartProgress(index) {
  const chapter = Math.floor(index / 2);
  const chapterStart = getPonoChapterWaypoint(chapter);
  const chapterEnd = getPonoChapterWaypoint(chapter + 1);
  return index % 2 === 0 ? chapterStart : (chapterStart + chapterEnd) / 2;
}

function getPonoStageEndProgress(index) {
  const chapter = Math.floor(index / 2);
  const chapterStart = getPonoChapterWaypoint(chapter);
  const chapterEnd = getPonoChapterWaypoint(chapter + 1);
  return index % 2 === 0 ? (chapterStart + chapterEnd) / 2 : chapterEnd;
}

function getPonoStagePlayEndProgress(index) {
  return index >= LEVELS.length - 1
    ? 1 - PONO_STORY_GAP
    : getPonoStageEndProgress(index);
}

function getPonoCheckpointProgress(index) {
  return getPonoStageStartProgress(index) +
    (getPonoStagePlayEndProgress(index) - getPonoStageStartProgress(index)) * 0.5;
}

function getActivePonoPlayTarget(index) {
  const level = LEVELS[index];
  return level && level.checkpoint && !stageCheckpointReached
    ? getPonoCheckpointProgress(index)
    : getPonoStagePlayEndProgress(index);
}

// 途中の紙芝居はおかあさん側の出来事で、ポノとの再会ではない。
// ポノは2・4・6面の紙芝居と8面のプレイ中も6%以上後ろに残り、
// 最後の道を実際に歩き終えた瞬間だけ同じ場所へ着く。
function getMotherStageStartProgress(index) {
  const chapterStart = Math.floor(index / 2) * 0.25;
  return index % 2 === 0
    ? Math.min(1, chapterStart + MOTHER_CHAPTER_LEAD)
    : Math.min(1, chapterStart + 0.25 * 0.65);
}

function getMotherStageEndProgress(index) {
  const chapterStart = Math.floor(index / 2) * 0.25;
  return index % 2 === 0
    ? Math.min(1, chapterStart + 0.25 * 0.65)
    : Math.min(1, chapterStart + 0.25);
}

function getMotherCheckpointProgress(index) {
  return getMotherStageStartProgress(index) +
    (getMotherStageEndProgress(index) - getMotherStageStartProgress(index)) * 0.5;
}

function getActiveMotherPlayTarget(index) {
  const level = LEVELS[index];
  return level && level.checkpoint && !stageCheckpointReached
    ? getMotherCheckpointProgress(index)
    : getMotherStageEndProgress(index);
}

function getMotherIntroStartProgress(index) {
  const chapterStart = Math.floor(index / 2) * 0.25;
  if (index === 0) return getMotherStageStartProgress(index);
  return index % 2 === 0 ? chapterStart : getMotherStageStartProgress(index);
}

function getJourneyPaceMs(budgetMs) {
  return Math.max(26000, Math.min(55000, budgetMs * 0.4));
}

// 制限時間は子どもが焦らない余裕を含む。見た目まで最大時間で割ると止まって見えるため、
// 予想プレイ時間で区間の95%まで進み、最後だけ実際のゴール歩行でつなぐ。
function getJourneyPacingRatio(elapsedMs, budgetMs) {
  const paceMs = getJourneyPaceMs(budgetMs);
  if (elapsedMs <= paceMs) return JOURNEY_PACE_TARGET * (elapsedMs / paceMs);
  const tail = 1 - Math.exp(-(elapsedMs - paceMs) / (paceMs * 0.75));
  return Math.min(JOURNEY_PLAY_MAX,
    JOURNEY_PACE_TARGET + (JOURNEY_PLAY_MAX - JOURNEY_PACE_TARGET) * tail);
}

function getStageBudgetMs(index, retryCount) {
  const retryAllowance = Math.min(1.75, 1 + retryCount * 0.25);
  return Math.round(STAGE_TIME_BUDGETS[index] * retryAllowance) * 1000;
}

function formatStageTime(milliseconds) {
  const totalSeconds = Math.max(0, Math.ceil(milliseconds / 1000));
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return minutes > 0
    ? 'あと ' + minutes + ':' + String(seconds).padStart(2, '0')
    : 'あと ' + totalSeconds + 'びょう';
}

function stageTimeAriaText(milliseconds) {
  const totalSeconds = Math.max(0, Math.ceil(milliseconds / 1000));
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  if (minutes > 0 && seconds > 0) return 'のこり ' + minutes + 'ぷん ' + seconds + 'びょう';
  if (minutes > 0) return 'のこり ' + minutes + 'ぷん';
  return 'のこり ' + seconds + 'びょう';
}

function updateStageTimeDisplay(force) {
  const node = document.getElementById('hud-time');
  if (!node) return;
  if (stageClock.unlimited) {
    node.textContent = 'ゆっくり';
    node.setAttribute('aria-label', 'じかん なしで ゆっくり');
    node.classList.remove('is-urgent');
    return;
  }
  const remaining = Math.max(0, stageClock.budgetMs - stageClock.elapsedMs);
  const shownSecond = Math.ceil(remaining / 1000);
  if (force || shownSecond !== stageClock.lastShownSecond) {
    stageClock.lastShownSecond = shownSecond;
    node.textContent = formatStageTime(remaining);
    node.setAttribute('aria-label', stageTimeAriaText(remaining));
  }
  node.classList.toggle('is-urgent', stageClock.active && remaining <= stageClock.budgetMs * 0.2);
}

function journeyPositionText(progress) {
  var scaled = Math.max(0, Math.min(LEVELS.length, progress * LEVELS.length));
  var nearest = Math.round(scaled);
  if (Math.abs(scaled - nearest) < 0.015) {
    if (nearest === 0) return 'しゅっぱつちてん';
    if (nearest === LEVELS.length) return 'さいごの ばしょ';
    return nearest + 'ばんめの ばしょ';
  }
  return (Math.floor(scaled) + 1) + 'ばんめへ すすんでいる';
}

function syncJourneyProgress(ponoProgress, motherProgress, options) {
  var stageNum = document.getElementById('stage-num');
  if (!stageNum) return;
  var pono = Math.max(0, Math.min(1, Number(ponoProgress) || 0));
  var mother = Math.max(0, Math.min(1, Number(motherProgress) || 0));
  var instant = Boolean(options && options.instant);
  if (instant) stageNum.classList.add('is-instant');
  if (!_slideTutActive || (options && options.force)) stageNum.classList.remove('is-tutorial');
  stageNum.style.setProperty('--pono-progress', String(pono));
  stageNum.style.setProperty('--mother-progress', String(mother));
  const gapStart = Math.min(pono, mother);
  const gapSize = Math.abs(mother - pono);
  const isTogether = gapSize === 0;
  stageNum.style.setProperty('--gap-start', String(gapStart));
  stageNum.style.setProperty('--gap-size', String(gapSize));
  stageNum.classList.toggle('is-chasing', !isTogether);
  stageNum.classList.toggle('is-together', isTogether);
  stageClock.ponoProgress = pono;
  stageClock.motherProgress = mother;

  var ponoNode = document.getElementById('journey-pono-progress');
  var motherNode = document.getElementById('journey-mother-progress');
  var ponoValue = pono * LEVELS.length;
  var motherValue = mother * LEVELS.length;
  var updateA11y = !options || options.updateA11y !== false;
  if (ponoNode && updateA11y) {
    ponoNode.removeAttribute('aria-hidden');
    ponoNode.setAttribute('aria-valuenow', ponoValue.toFixed(2));
    ponoNode.setAttribute('aria-valuetext', journeyPositionText(pono));
  }
  if (motherNode && updateA11y) {
    motherNode.removeAttribute('aria-hidden');
    motherNode.setAttribute('aria-valuenow', motherValue.toFixed(2));
    motherNode.setAttribute('aria-valuetext', journeyPositionText(mother));
  }

  if (updateA11y && isTogether) {
    stageNum.setAttribute('aria-label', 'ポノと おかあさんは おなじ ばしょ');
  } else if (updateA11y) {
    var remaining = mother > pono
      ? Math.max(1, Math.ceil((mother - pono) * LEVELS.length - 0.001))
      : 0;
    stageNum.setAttribute('aria-label',
      'ポノは ' + journeyPositionText(pono) + '。おかあさんは ' +
      journeyPositionText(mother) + '。あと ' + remaining + 'こ');
  }

  if (instant) {
    requestAnimationFrame(function() { stageNum.classList.remove('is-instant'); });
  }
}

function updateHUD(options) {
  if (_slideTutActive) {
    document.getElementById('hud-stage').textContent = 'れんしゅう';
    document.getElementById('hud-moves').textContent = '';
    const timeNode = document.getElementById('hud-time');
    if (timeNode) {
      timeNode.textContent = 'じかん なし';
      timeNode.setAttribute('aria-label', 'れんしゅうは じかん なし');
      timeNode.classList.remove('is-urgent');
    }
  } else {
    if (!journeyHudMessageHideAt) {
      document.getElementById('hud-stage').textContent = LEVELS[stageIdx].name;
    }
    document.getElementById('hud-moves').textContent = `てかず: ${moveCount}`;
    updateStageTimeDisplay(Boolean(options && options.forceTime));
  }
  if (options && options.resetProgress) {
    syncJourneyProgress(
      stageClock.attemptPonoStart,
      stageClock.attemptMotherStart,
      options
    );
  }
}

function resetStageClock(index, preservedProgress) {
  const ponoStart = getPonoStageStartProgress(index);
  const ponoEnd = getActivePonoPlayTarget(index);
  const motherStart = getMotherStageStartProgress(index);
  const motherEnd = getActiveMotherPlayTarget(index);
  const preserve = preservedProgress && Number.isFinite(preservedProgress.pono) &&
    Number.isFinite(preservedProgress.mother);
  const attemptPonoStart = preserve
    ? Math.max(ponoStart, Math.min(ponoEnd, preservedProgress.pono)) : ponoStart;
  const attemptMotherStart = preserve
    ? Math.max(motherStart, Math.min(motherEnd, preservedProgress.mother)) : motherStart;
  stageClock.active = false;
  stageClock.unlimited = stageRetryCount > 0;
  stageClock.elapsedMs = 0;
  stageClock.budgetMs = getStageBudgetMs(index, stageRetryCount);
  stageClock.lastTick = 0;
  stageClock.timeoutPending = false;
  stageClock.restartAt = 0;
  stageClock.attemptPonoStart = attemptPonoStart;
  stageClock.attemptMotherStart = attemptMotherStart;
  stageClock.introPonoStart = attemptPonoStart;
  stageClock.introMotherStart = preserve ? attemptMotherStart : getMotherIntroStartProgress(index);
  stageClock.ponoProgress = stageClock.introPonoStart;
  stageClock.motherProgress = stageClock.introMotherStart;
  stageClock.exitPonoStart = stageClock.ponoProgress;
  stageClock.exitMotherStart = stageClock.motherProgress;
  stageClock.checkpointPonoStart = stageClock.ponoProgress;
  stageClock.checkpointMotherStart = stageClock.motherProgress;
  stageClock.lastAriaBucket = -1;
  stageClock.lastShownSecond = -1;
  updateStageTimeDisplay(true);
}

function startStageClock(now) {
  if (_slideTutActive) return;
  stageClock.active = true;
  stageClock.lastTick = now;
  stageClock.lastAriaBucket = -1;
  updateStageTimeDisplay(true);
}

function stopStageClock(now) {
  stageClock.active = false;
  stageClock.lastTick = Number.isFinite(now) ? now : performance.now();
  updateStageTimeDisplay(true);
}

function resetStageClockTick(now) {
  stageClock.lastTick = Number.isFinite(now) ? now : performance.now();
  if (stageClock.timeoutPending) renewPendingRetryBeat(stageClock.lastTick);
}

function isStageClockEnvironmentSuspended(now) {
  const menuOpen = Boolean(document.querySelector('.pono-dropdown.show'));
  const confirmOpen = Boolean(document.querySelector('.pono-confirm-overlay.show'));
  const portrait = window.innerHeight >= window.innerWidth;
  const guideVisible = journeyHudPausesClock &&
    journeyHudMessageHideAt > (Number.isFinite(now) ? now : performance.now());
  return _slideTutActive || document.hidden || !slideWindowFocused ||
    menuOpen || confirmOpen || portrait || guideVisible || !overlay.classList.contains('hidden');
}

function isStageClockSuspended(now) {
  return state !== S.PLAYING || isStageClockEnvironmentSuspended(now);
}

function handleStageTimeout(now) {
  if (stageClock.timeoutPending || state !== S.PLAYING) return;
  stopStageClock(now);
  stageClock.timeoutPending = true;
  state = S.TRAVELLING;
  prepauseState = S.TRAVELLING;
  magicCrossSelectMode = false;
  setPauseAvailable(false);
  syncMagicCrossButton();
  renewPendingRetryBeat(now);
  const timeNode = document.getElementById('hud-time');
  if (timeNode) {
    timeNode.textContent = 'もういちど';
    timeNode.setAttribute('aria-label', 'おなじ みちを もういちど');
    timeNode.classList.remove('is-urgent');
  }
}

function updateStageClock(now) {
  if (stageClock.timeoutPending) {
    if (_slideTutActive) {
      stageClock.timeoutPending = false;
      stageClock.restartAt = 0;
      return;
    }
    if (isStageClockEnvironmentSuspended(now)) {
      resetStageClockTick(now);
      return;
    }
    if (now >= stageClock.restartAt) restartTimedOutStage(now);
    return;
  }
  if (!stageClock.active) return;
  if (isStageClockSuspended(now)) {
    resetStageClockTick(now);
    return;
  }
  if (!stageClock.lastTick || now < stageClock.lastTick) {
    resetStageClockTick(now);
    return;
  }

  stageClock.elapsedMs = Math.min(stageClock.budgetMs,
    stageClock.elapsedMs + Math.max(0, now - stageClock.lastTick));
  stageClock.lastTick = now;
  const ratio = Math.min(1, stageClock.elapsedMs / Math.max(1, stageClock.budgetMs));
  const pacingRatio = getJourneyPacingRatio(stageClock.elapsedMs, stageClock.budgetMs);
  const visualRatio = reducedMotionQuery.matches ? Math.floor(pacingRatio * 100) / 100 : pacingRatio;
  const ponoStart = stageClock.attemptPonoStart;
  const ponoEnd = getActivePonoPlayTarget(stageIdx);
  const motherStart = stageClock.attemptMotherStart;
  const motherEnd = getActiveMotherPlayTarget(stageIdx);
  const ponoProgress = ponoStart + (ponoEnd - ponoStart) * visualRatio;
  const motherProgress = motherStart + (motherEnd - motherStart) * visualRatio;
  const ariaBucket = Math.floor(ratio * 20);
  const updateA11y = ariaBucket !== stageClock.lastAriaBucket;
  if (updateA11y) stageClock.lastAriaBucket = ariaBucket;
  syncJourneyProgress(ponoProgress, motherProgress, { updateA11y: updateA11y });
  updateStageTimeDisplay(false);

  // 受け付けた最後の1手は完了まで待ち、その手でつながれば成功を優先する。
  if (!stageClock.unlimited && stageClock.elapsedMs >= stageClock.budgetMs && !animating) {
    handleStageTimeout(now);
  }
}


// ===== Start / Next =====
function captureStageAttemptSnapshot() {
  stageAttemptSnapshot = {
    stageIdx: stageIdx,
    cols: curCols,
    rows: curRows,
    grid: grid.slice(),
    emptyIdx: emptyIdx,
    pickupTileIdx: pickupTileIdx,
    pickupCollected: pickupCollected,
    magicCharmOwned: magicCharmOwned,
    magicCrossTileIdx: magicCrossTileIdx,
    suggestedMoveIdx: suggestedMoveIdx,
    moveCountBase: moveCount,
    stageCheckpointReached: stageCheckpointReached,
    stageCheckpointTrail: stageCheckpointTrail.map(function(point) { return { ...point }; }),
    checkpointLockedCells: Array.from(stageCheckpointLockedCells),
  };
}

function startCurrentStageIntro(now, instantProgress, preservedProgress) {
  journeyHudMessageHideAt = 0;
  journeyHudPausesClock = false;
  const stageNode = document.getElementById('hud-stage');
  if (stageNode) stageNode.classList.remove('is-journey-message');
  overlay.classList.add('hidden');
  overlay.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('slide-cutscene-open');
  calcLayout();
  resetStageClock(stageIdx, preservedProgress);
  updateHUD({ resetProgress: true, instant: Boolean(instantProgress), forceTime: true });
  syncJourneyProgress(stageClock.introPonoStart, stageClock.introMotherStart,
    { instant: Boolean(instantProgress) });
  updatePauseButton(false);
  setPauseAvailable(false);
  const geo = getJourneyGeometry();
  journeyActor.tutorial = false;
  state = S.TRAVELLING;
  prepauseState = S.TRAVELLING;
  syncMagicCrossButton();
  setJourneyPath(JOURNEY_PHASE.INTRO, [
    { x: geo.entryX, y: geo.startY },
    { x: geo.startX, y: geo.startY },
  ], reducedMotionQuery.matches ? 1 : 1200, now);
  showJourneyToast(LEVELS[stageIdx].introMsg, false);
}

function beginStage(index) {
  stageIdx = index;
  preloadStageReward(stageIdx);
  stageRetryCount = 0;
  moveCount = 0;
  clueDiscovered = false;
  hintDismissed = false;
  hintReadyAt = 0;
  animating = false;
  shuffleGrid(LEVELS[stageIdx]);
  captureStageAttemptSnapshot();
  startCurrentStageIntro(performance.now(), index === 0);
}

function resumeCheckpointLeg(now, preservedProgress) {
  journeyHudMessageHideAt = 0;
  journeyHudPausesClock = false;
  hideJourneyToastOverlay();
  overlay.classList.add('hidden');
  overlay.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('slide-cutscene-open');
  calcLayout();
  resetStageClock(stageIdx, preservedProgress);
  updateHUD({ resetProgress: true, instant: true, forceTime: true });
  updatePauseButton(false);
  const center = getCheckpointCenter();
  journeyActor.active = false;
  journeyActor.phase = JOURNEY_PHASE.PLAYING;
  journeyActor.tutorial = false;
  journeyActor.x = center.x;
  journeyActor.y = center.y;
  state = S.PLAYING;
  prepauseState = S.PLAYING;
  setPauseAvailable(true);
  syncMagicCrossButton();
  showJourneyToast('しるしの つづきから みちを つなごう！', false, false, true);
  startStageClock(now);
}

function restartTimedOutStage(now) {
  if (!stageAttemptSnapshot || stageAttemptSnapshot.stageIdx !== stageIdx) {
    beginStage(stageIdx);
    return;
  }
  const preservedProgress = {
    pono: stageClock.ponoProgress,
    mother: stageClock.motherProgress,
  };
  stageRetryCount += 1;
  stageIdx = stageAttemptSnapshot.stageIdx;
  moveCount = Number.isFinite(stageAttemptSnapshot.moveCountBase)
    ? stageAttemptSnapshot.moveCountBase : 0;
  curCols = stageAttemptSnapshot.cols;
  curRows = stageAttemptSnapshot.rows;
  grid = stageAttemptSnapshot.grid.slice();
  emptyIdx = stageAttemptSnapshot.emptyIdx;
  pickupTileIdx = stageAttemptSnapshot.pickupTileIdx;
  pickupCollected = stageAttemptSnapshot.pickupCollected;
  pickupJourneyProgress = -1;
  magicCharmOwned = stageAttemptSnapshot.magicCharmOwned;
  magicCrossTileIdx = stageAttemptSnapshot.magicCrossTileIdx;
  magicCrossSelectMode = false;
  suggestedMoveIdx = stageAttemptSnapshot.suggestedMoveIdx;
  stageCheckpointReached = Boolean(stageAttemptSnapshot.stageCheckpointReached);
  stageCheckpointTrail = (stageAttemptSnapshot.stageCheckpointTrail || []).map(function(point) {
    return { ...point };
  });
  stageCheckpointLockedCells = new Set(stageAttemptSnapshot.checkpointLockedCells || []);
  clueDiscovered = false;
  hintDismissed = false;
  hintReadyAt = 0;
  mechanicGuideShown = stageCheckpointReached;
  animating = false;
  anim.idx = -1;
  anim.targetIdx = -1;
  resetMoveFeedback();
  stageClock.timeoutPending = false;
  if (stageCheckpointReached) {
    resumeCheckpointLeg(now, preservedProgress);
  } else {
    startCurrentStageIntro(now, true, preservedProgress);
  }
}

function startGame() {
  gameClearQueued = false;
  magicCharmOwned = false;
  journeyActor.phase = JOURNEY_PHASE.INTRO;
  beginStage(INITIAL_STAGE_IDX);
}

function nextStage() {
  journeyActor.phase = JOURNEY_PHASE.INTRO;
  beginStage(Math.min(stageIdx + 1, LEVELS.length - 1));
}

// ===== Cutscene =====
function showCutscene() {
  var level = LEVELS[stageIdx];
  if (!level || !level.cutscene) { nextStage(); return; }
  var card  = document.querySelector('.ov-card');
  var icon  = document.getElementById('ov-icon');
  var title = document.getElementById('ov-title');
  var msg   = document.getElementById('ov-msg');
  var journeyStatus = document.getElementById('cutscene-journey-status');
  var btn   = document.getElementById('ov-btn');
  setPauseAvailable(false);
  overlay.classList.remove('hidden');
  overlay.setAttribute('aria-hidden', 'false');
  card.classList.add('cutscene-mode', 'cutscene-fullscreen');
  document.body.classList.add('slide-cutscene-open');
  syncJourneyProgress(
    getPonoStageEndProgress(stageIdx),
    getMotherJourneyProgress(stageIdx),
    { instant: true }
  );
  icon.innerHTML = '<img src="' + level.cutscene.img + '" class="cutscene-img" alt="">';
  title.textContent = level.cutscene.text;
  title.style.whiteSpace = 'pre-line';
  msg.textContent = '';
  if (journeyStatus) journeyStatus.textContent = 'おかあさんは ポノより すこし さきに います';
  btn.textContent = 'つぎへ ▶';
  btn.dataset.ovType = 'cutscene-next';
  syncMagicCrossButton();
  requestAnimationFrame(function() { btn.focus({ preventScroll: true }); });
}

// ===== Overlay button =====
(function() {
  const ovBtn = document.getElementById('ov-btn');
  function execAction() {
    const t = ovBtn.dataset.ovType;
    if (t === 'cutscene-next') {
      nextStage();
    } else if (t === 'tutorial-start') {
      overlay.classList.add('hidden');
      showTutorial();
    } else {
      startGame();
    }
  }
  ovBtn.addEventListener('touchstart', e => { e.preventDefault(); execAction(); }, { passive: false });
  ovBtn.addEventListener('click', execAction);
})();

// ===== Pause =====
function updatePauseButton(isPaused) {
  const button = document.getElementById('btn-pause');
  button.textContent = isPaused ? '▶' : '⏸';
  button.setAttribute('aria-label', isPaused ? 'さいかい' : 'ポーズ');
}

function togglePause() {
  if (_slideTutActive) return;
  if (state === S.PAUSED) {
    state = prepauseState;
    resetStageClockTick(performance.now());
    updatePauseButton(false);
    syncMagicCrossButton();
    if (bgmEnabled) bgm.play().catch(() => {});
  } else if (state === S.PLAYING && !animating && !journeyActor.active) {
    prepauseState = state;
    state = S.PAUSED;
    resetStageClockTick(performance.now());
    magicCrossSelectMode = false;
    updatePauseButton(true);
    syncMagicCrossButton();
    bgm.pause();
  }
}

const btnPause = document.getElementById('btn-pause');
function setPauseAvailable(available) {
  btnPause.disabled = !available;
  if (available) btnPause.removeAttribute('aria-disabled');
  else btnPause.setAttribute('aria-disabled', 'true');
}
btnPause.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); togglePause(); }, { passive: false });
btnPause.addEventListener('click', e => { e.stopPropagation(); togglePause(); });

// ===== BGM =====
const bgm    = document.getElementById('bgm');
const btnBgm = document.getElementById('btn-bgm');
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';
let bgmStarted = false;
bgm.volume = 0.25;

function updateBgmBtn() { btnBgm.classList.toggle('bgm-off', !bgmEnabled); }

function tryStartBgm() {
  if (!bgmEnabled || bgmStarted) return;
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
}

btnBgm.addEventListener('click', () => {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
  if (bgmEnabled) { bgmStarted = false; tryStartBgm(); } else { bgm.pause(); }
  updateBgmBtn();
});

if (bgmEnabled) {
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {
    document.addEventListener('touchstart', tryStartBgm, { once: true, passive: true });
    document.addEventListener('pointerdown', tryStartBgm, { once: true });
  });
}
updateBgmBtn();

document.addEventListener('visibilitychange', () => {
  syncSlideAnimationSuspension(performance.now());
  syncJourneyTimelineSuspension(performance.now());
  resetStageClockTick(performance.now());
  if (document.hidden) { bgm.pause(); }
  else if (bgmEnabled && state !== S.PAUSED) { bgm.play().catch(() => {}); }
});
window.addEventListener('blur',  () => {
  slideWindowFocused = false;
  syncSlideAnimationSuspension(performance.now());
  syncJourneyTimelineSuspension(performance.now());
  resetStageClockTick(performance.now());
  bgm.pause();
});
window.addEventListener('focus', () => {
  slideWindowFocused = true;
  syncSlideAnimationSuspension(performance.now());
  syncJourneyTimelineSuspension(performance.now());
  resetStageClockTick(performance.now());
  if (bgmEnabled && state !== S.PAUSED) bgm.play().catch(() => {});
});

var _slideTutActive = false;
function showTutorial() {
  if (_slideTutActive) return;
  var dim = document.getElementById('tut-dim');
  var bubble = document.getElementById('tut-bubble');
  if (!dim || !bubble) return;
  _slideTutActive = true;
  journeyHudMessageHideAt = 0;
  hideJourneyToastOverlay();
  stopStageClock(performance.now());
  stageClock.timeoutPending = false;
  stageClock.restartAt = 0;
  setPauseAvailable(false);

  // チュートリアル用: 左から右へ3手で完成する固定配置。
  var tutGrid = TUTORIAL_GRID.slice();
  var tutEmpty = TUTORIAL_EMPTY;
  var tutSteps = TUTORIAL_STEPS;
  var tutStepIdx = 0;

  // はじめての導線だけでなく、共有メニューの「あそびかた」から
  // 開き直した場合も、必ず同じ3手の練習盤面から始める。
  stageIdx = 0;
  moveCount = 0;
  curCols = 3;
  curRows = 3;
  grid = tutGrid.slice();
  emptyIdx = tutEmpty;
  magicCharmOwned = false;
  resetStageMechanics(LEVELS[0]);
  animating = false;
  clueDiscovered = false;
  hintDismissed = true;
  journeyActor.active = false;
  journeyActor.phase = JOURNEY_PHASE.PLAYING;
  journeyActor.tutorial = true;
  state = S.PLAYING;
  prepauseState = S.PLAYING;
  syncMagicCrossButton();
  updatePauseButton(false);
  if (bgmEnabled) bgm.play().catch(() => {});
  overlay.classList.add('hidden');
  calcLayout();
  document.getElementById('hud-stage').textContent = 'れんしゅう';
  document.getElementById('hud-moves').textContent = '';
  document.getElementById('hud-time').textContent = 'じかん なし';
  document.getElementById('hud-time').setAttribute('aria-label', 'れんしゅうは じかん なし');
  var stageNum = document.getElementById('stage-num');
  if (stageNum) {
    stageNum.classList.add('is-tutorial');
    stageNum.classList.remove('is-together');
    stageNum.setAttribute('aria-label', 'れんしゅう');
    var progressNodes = stageNum.querySelectorAll('[role="progressbar"]');
    progressNodes.forEach(function(node) { node.setAttribute('aria-hidden', 'true'); });
  }

  // Step 0: 導入
  dim.classList.remove('hidden');
  bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
  bubble.innerHTML = '🌳 ひだりから みぎへ<br>みちを つなげよう！<br><button class="tut-next-btn" id="tut-next">やってみる！</button>';
  bubble.classList.remove('hidden');

  document.getElementById('tut-next').addEventListener('pointerdown', function(e) {
    e.preventDefault(); e.stopPropagation();
    dim.classList.add('hidden');
    bubble.classList.add('hidden');

    // 描画を1フレーム待ってからハイライト
    requestAnimationFrame(function() {
      showTutStep();
    });
  });

  function showTutStep() {
    if (tutStepIdx >= tutSteps.length) return;
    var s = tutSteps[tutStepIdx];
    highlightTile(s.row, s.col, s.msg);
  }

  var _tutOverlay = null;

  function highlightTile(row, col, msg) {
    // パネルのCanvas座標→画面座標に変換
    var rect = canvas.getBoundingClientRect();
    var scaleX = rect.width / CW;
    var scaleY = rect.height / CH;
    var tx = rect.left + (gridOX + col * cellSize) * scaleX;
    var ty = rect.top + (gridOY + row * cellSize) * scaleY;
    var tw = cellSize * scaleX;
    var th = cellSize * scaleY;

    // ハイライトオーバーレイ
    if (_tutOverlay) _tutOverlay.remove();
    _tutOverlay = document.createElement('div');
    _tutOverlay.style.cssText = 'position:fixed;z-index:9996;border:4px solid #FFD700;border-radius:12px;box-shadow:0 0 0 4000px rgba(0,0,0,0.5),0 0 20px rgba(255,215,0,0.6);pointer-events:none;' +
      'left:' + tx + 'px;top:' + ty + 'px;width:' + tw + 'px;height:' + th + 'px;';
    document.body.appendChild(_tutOverlay);

    // 吹き出し（パネルの上に）
    bubble.style.cssText = 'top:' + Math.max(10, ty - 60) + 'px;left:' + (tx + tw / 2) + 'px;transform:translateX(-50%);z-index:9997';
    bubble.innerHTML = '👆 ' + msg;
    bubble.classList.remove('hidden');

    // ユーザーがそのパネルをタップするのを待つ
    waitForTap(row, col);
  }

  function waitForTap(targetRow, targetCol) {
    var targetIdx = targetRow * curCols + targetCol;
    function onTap(ev) {
      var rect = canvas.getBoundingClientRect();
      var px = (ev.clientX - rect.left) * (CW / rect.width);
      var py = (ev.clientY - rect.top) * (CH / rect.height);
      var col = Math.floor((px - gridOX) / cellSize);
      var row = Math.floor((py - gridOY) / cellSize);
      if (col < 0 || col >= curCols || row < 0 || row >= curRows) return;
      var tappedIdx = row * curCols + col;
      if (tappedIdx !== targetIdx) return;

      ev.preventDefault();
      ev.stopPropagation();
      // 実際にパネルを動かす
      if (!handleTap(px, py)) return;

      // 正解タップ！ handleTap が安全に開始できてから案内を進める。
      document.removeEventListener('pointerdown', onTap, true);
      if (_tutOverlay) { _tutOverlay.remove(); _tutOverlay = null; }
      bubble.classList.add('hidden');

      // 実際の着地完了を待ってからフィードバック→次のステップ。
      // durationを調整しても案内だけ先に進まない。
      waitForCurrentSlide(function() {
        tutStepIdx++;
        if (tutStepIdx < tutSteps.length) {
          // フィードバック表示
          var msgs = ['いいね！', 'すごい！', 'そのちょうし！'];
          bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
          bubble.innerHTML = '✨ ' + msgs[Math.min(tutStepIdx - 1, msgs.length - 1)] + '<br><button class="tut-next-btn" id="tut-next">つぎ！</button>';
          bubble.classList.remove('hidden');
          document.getElementById('tut-next').addEventListener('pointerdown', function(fe) {
            fe.preventDefault(); fe.stopPropagation();
            bubble.classList.add('hidden');
            requestAnimationFrame(function() { showTutStep(); });
          });
        } else {
          // チュートリアル完了！ポノをゴールまで歩かせる
          var path = traceWinPath();
          if (path && path.length > 0) {
            var geo = getJourneyGeometry();
            var points = path.map(function(point) {
              return {
                x: gridOX + (point.col + 0.5) * cellSize,
                y: gridOY + (point.row + 0.5) * cellSize,
              };
            });
            points[0] = { x: geo.startX, y: geo.startY };
            points[points.length - 1] = { x: geo.discoverX, y: geo.goalY };
            state = S.TRAVELLING;
            journeyActor.tutorial = true;
            setJourneyPath(JOURNEY_PHASE.EXIT, points,
              reducedMotionQuery.matches ? 1 : Math.max(800, (points.length - 1) * 240),
              performance.now());
            // たびの演出が終わってから「あそぼう！」へつなぐ。
            var waitWalk = setInterval(function() {
              if (!journeyActor.active) {
                clearInterval(waitWalk);
                dim.classList.remove('hidden');
                bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
                bubble.innerHTML = '🎉 できた！<br>みちが つながったよ！<br><button class="tut-next-btn" id="tut-next">あそぼう！</button>';
                bubble.classList.remove('hidden');
                document.getElementById('tut-next').addEventListener('pointerdown', function(ev2) {
                  ev2.preventDefault(); ev2.stopPropagation();
                  endTut();
                  // 通常は1面、Appの確認URLでは指定面を直接開始（ダイアログなし）。
                  startGame();
                });
              }
            }, 100);
          } else {
            endTut();
            startGame();
          }
        }
      });
    }
    document.addEventListener('pointerdown', onTap, true);
  }

  function endTut() {
    _slideTutActive = false;
    setPauseAvailable(true);
    if (_tutOverlay) { _tutOverlay.remove(); _tutOverlay = null; }
    dim.classList.add('hidden');
    bubble.classList.add('hidden');
    localStorage.setItem('slide_tut_seen', '1');
  }
}

// ===== Init =====
initMenu({ bgmToggle: function() {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
  if (bgmEnabled) { bgmStarted = false; tryStartBgm(); } else { bgm.pause(); }
  updateBgmBtn();
  if (window._ponoMenuBgmBtn) window._ponoMenuBgmBtn.classList.toggle('bgm-off', !bgmEnabled);
}, tutorial: showTutorial});
curCols = LEVELS[INITIAL_STAGE_IDX].cols;
curRows = LEVELS[INITIAL_STAGE_IDX].rows;
resize();
resetStageClock(INITIAL_STAGE_IDX);
updateHUD({ resetProgress: true, instant: true, forceTime: true });
syncJourneyProgress(stageClock.introPonoStart, stageClock.introMotherStart, { instant: true });
showOverlay('start');
requestAnimationFrame(loop);

function updateLandscapeNotice() {
  resetStageClockTick(performance.now());
  const notice = document.getElementById('landscape-notice');
  if (!notice) return;
  const isPortrait = window.innerHeight >= window.innerWidth;
  notice.style.display = isPortrait ? 'flex' : 'none';
  notice.setAttribute('aria-hidden', isPortrait ? 'false' : 'true');
  const app = document.getElementById('app');
  if (app) app.toggleAttribute('inert', isPortrait);
  const rail = document.querySelector('.game-rail');
  if (rail) {
    rail.toggleAttribute('inert', isPortrait);
    rail.setAttribute('aria-hidden', isPortrait ? 'true' : 'false');
  }
  syncSlideAnimationSuspension(performance.now());
  syncJourneyTimelineSuspension(performance.now());
  // 横向きへ戻した時に、中央の16:9シェルへキャンバス実寸を同期する。
  if (!isPortrait) {
    resize();
    if (!overlay.classList.contains('hidden')) {
      requestAnimationFrame(function() {
        document.getElementById('ov-btn').focus({ preventScroll: true });
      });
    }
  }
}
updateLandscapeNotice();
window.addEventListener('orientationchange', () => {
  setTimeout(updateLandscapeNotice, 100);
  setTimeout(updateLandscapeNotice, 300);
  setTimeout(updateLandscapeNotice, 600);
  // 回転完了後にリサイズを確実に実行
  setTimeout(resize, 200);
  setTimeout(resize, 500);
  setTimeout(resize, 800);
});
window.addEventListener('resize', updateLandscapeNotice);
</script>
