<html lang="ja">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8F0;
  --primary: #4CAF50;
  --primary-dark: #388E3C;
  --text: #5D4E37;
  --text-light: #A89880;
  --shadow: rgba(93,78,55,0.12);
  --radius: 20px;
}

html, body {
  height: 100dvh; overflow: hidden;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover; background-position: center; background-repeat: no-repeat;
  color: var(--text);
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

#app {
  display: flex; flex-direction: column;
  height: 100dvh;
  max-width: 540px; margin: 0 auto;
  padding: 4px 10px 10px;
}

/* ===== Header ===== */
.header { flex-shrink: 0; text-align: center; padding: 48px 0 4px; position: relative; }
.back-link {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);

}
.header h1 {
  font-size: 1.3rem; font-weight: 900;
  background: linear-gradient(135deg, #4CAF50, #81C784);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.subtitle { font-size: 0.76rem; color: #A89080; font-weight: 700; text-align: center; margin-top: 1px; }
.btn-bgm {
  position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  width: 34px; height: 34px; border-radius: 50%;
  background: #FFF3EE; border: 2px solid var(--primary);
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px var(--shadow); transition: transform 0.15s;
}
.btn-bgm:active { transform: translateY(-50%) scale(0.9); }
.btn-bgm.bgm-off { opacity: 0.4; filter: grayscale(1); }
.btn-pause {
  position: fixed; left: 62px; top: 12px;
  width: 34px; height: 34px; border-radius: 50%;
  background: #FFF3EE; border: 2px solid var(--primary);
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px var(--shadow); z-index: 9988; transition: transform 0.15s;

.btn-pause:active { transform: scale(0.9); }

/* ===== HUD ===== */
.hud {
  display: flex; justify-content: space-between; align-items: center;
  padding: 3px 8px; font-size: 0.85rem; font-weight: 700;

#hud-stage { color: var(--primary); }
#hud-moves { text-align: right; color: var(--text); }

/* ===== Game area ===== */
.game-wrap {
  flex: 1; min-height: 0;
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  touch-action: none;

#gameCanvas { display: block; width: 100%; height: 100%; }

.confetti-container {

}
.confetti-piece { position: absolute; animation: cfall 2.5s ease-out forwards; }

  100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* ===== Overlay ===== */
.overlay {
  position: fixed; inset: 0; z-index: 20;
  display: flex; align-items: center; justify-content: center;
  background: rgba(93,78,55,0.72);
  backdrop-filter: blur(4px);

}
.overlay.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

<script>
// ===== Premium Gate =====
if (localStorage.getItem('pono_premium') !== '1') {
  location.replace('../index.html');
}

// ===== roundRect polyfill =====
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    r = r.map(v => Math.min(v, w / 2, h / 2));
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
  };
}

// ===== Preload character face images =====
const imgPono = new Image();
imgPono.src = '../assets/images/characters/pono/pono_face_circle.png';
const imgWalkSheet = new Image();
imgWalkSheet.src = '../assets/images/characters/pono/pono_walk_sheet.png';
const WALK_FRAMES = 25;
const WALK_FRAME_W = 92;
const WALK_FRAME_H = 128;

// Side-walk sprite sheet (35 frames @12fps, 77x128 each, facing right)
const imgWalkSideSheet = new Image();
imgWalkSideSheet.src = '../assets/images/characters/pono/pono_walk_side_sheet.png';
const SIDE_WALK_FRAMES = 35;
const SIDE_WALK_FRAME_W = 77;
const SIDE_WALK_FRAME_H = 128;
const SIDE_WALK_SCALE = 1232 / 1132; // compensate taller canvas vs front
const imgMom = new Image();
imgMom.src = '../assets/images/characters/pono/mom_face_circle.png';
const imgMomFull = new Image();
imgMomFull.src = '../assets/images/Slide/pono_mom_only.png';

// ===== Tile types =====
// edges: [top, right, bottom, left] — 1 = path exits this edge
const TILE_TYPES = {
  H:     { edges: [0,1,0,1] },
  V:     { edges: [1,0,1,0] },
  TR:    { edges: [1,1,0,0] },
  RB:    { edges: [0,1,1,0] },
  BL:    { edges: [0,0,1,1] },
  LT:    { edges: [1,0,0,1] },
  CROSS: { edges: [1,1,1,1] },
  BLANK: { edges: [0,0,0,0] },
};

// ===== Level data =====
// solved: row-major cols×rows, null = empty space
// ── Stage backgrounds ──
const STAGE_BGS = [
  '../assets/images/Slide/stage1_forest_light.png',  // チュートリアル
  '../assets/images/Slide/stage1_forest_light.png',  // ステージ1
  '../assets/images/Slide/stage1_forest_light.png',  // ステージ2
  '../assets/images/Slide/stage2_forest_deep.png',   // ステージ3
  '../assets/images/Slide/stage3_cave_entrance.png', // ステージ4
  '../assets/images/Slide/stage4_cave_mushroom.png', // ステージ5
  '../assets/images/Slide/stage5_cave_deep.png',     // ステージ6
  '../assets/images/Slide/stage6_night_sky.png',     // ステージ7
  '../assets/images/Slide/stage6_night_sky.png',     // ステージ8
];
const stageBgImgs = STAGE_BGS.map(function(src) { var img = new Image(); img.src = src; return img; });

// start/goal: { col, side: 'top'|'bottom' } — 縦方向（上→下）
// CROSS(十字)タイルは4方向すべて接続 → 複数ルート可能で難易度が下がる
const LEVELS = [
  {
    name: 'おかあさん いないよ？',
    cols: 3, rows: 3,
    storyMsg: 'あそびから かえったら\nおかあさんが いない…\nどこに いったんだろう？',
    clearMsg: 'あ！おかあさんの あしあとだ！',
    goalIcon: '🐾',
    start: { col: 1, side: 'top' },
    goal: { col: 1, side: 'bottom' },
    solved: ['BLANK','V','BLANK', 'BLANK','V','BLANK', null,'V','BLANK'],
    shuffleMoves: 4,
  },
  {
    name: 'もりの いりぐち',
    cols: 3, rows: 3,
    storyMsg: 'あしあとが もりに つづいてる！\nおかあさーん！',
    clearMsg: 'あ、この おはな…\nどこかで みたことある…',
    goalIcon: '🌸',
    cutscene: { text: 'そのころ おかあさんは…\nポノの だいすきな きのみを\nさがしていました', img: '../assets/images/Slide/cutscene_1.png' },
    start: { col: 1, side: 'top' },
    goal: { col: 1, side: 'bottom' },
    solved: ['BLANK','V','BLANK', null,'V','BLANK', 'BLANK','V','BLANK'],
    shuffleMoves: 6,
  },
  {
    name: 'きいたことある おと',
    cols: 3, rows: 3,
    storyMsg: 'もりが ふかく なってきた…\nなんだか この みち\nしってる きがする…',
    clearMsg: 'この はなうた…\nきいたことある きがする！',
    goalIcon: '🎵',
    start: { col: 0, side: 'top' },
    goal: { col: 1, side: 'bottom' },
    // V→CROSS→CROSS→V (十字2個で確実に曲がれる)
    solved: ['V','BLANK','BLANK', 'CROSS','CROSS',null, 'BLANK','V','BLANK'],
    shuffleMoves: 4,
  },
  {
    name: 'ふしぎな どうくつ',
    cols: 3, rows: 4,
    storyMsg: 'どうくつだ！ なんだか\nここも みたことある きがする…\nおもいだせないけど…',
    clearMsg: 'ひかる キノコ！\nなつかしい かんじがする…',
    goalIcon: '🍄',
    cutscene: { text: 'おかあさんは おもいました\n「ポノ よろこんでくれるかな？」', img: '../assets/images/Slide/cutscene_2.png' },
    start: { col: 1, side: 'top' },
    goal: { col: 1, side: 'bottom' },
    solved: ['BLANK','V','BLANK', 'BLANK','CROSS',null, 'BLANK','CROSS','BLANK', 'BLANK','V','BLANK'],
    shuffleMoves: 6,
  },
  {
    name: 'ひかる キノコのみち',
    cols: 3, rows: 4,
    storyMsg: 'まっくらだけど がんばる！\nおかあさん どこにいるの…',

    goalIcon: '💎',
    start: { col: 1, side: 'top' },
    goal: { col: 1, side: 'bottom' },
    solved: ['BLANK','V',null, 'BLANK','CROSS','BLANK', 'BLANK','CROSS','BLANK', 'BLANK','V','BLANK'],
    shuffleMoves: 8,
  },
  {
    name: 'そとが みえた！',
    cols: 4, rows: 4,
    storyMsg: 'あかるく なってきた！\nあとすこし！',

    goalIcon: '🌙',
    cutscene: { text: 'やっと ぜんぶ みつけた！\nはやく ポノに\nとどけなきゃ！', img: '../assets/images/Slide/cutscene_3.png' },
    start: { col: 1, side: 'top' },
    goal: { col: 2, side: 'bottom' },
    solved: ['BLANK','V','BLANK','BLANK', 'BLANK','CROSS','CROSS','BLANK', 'BLANK',null,'V','BLANK', 'BLANK','BLANK','V','BLANK'],
    shuffleMoves: 10,
  },
  {
    name: 'おかあさんの こえ',
    cols: 4, rows: 4,
    storyMsg: 'あ！おかあさんの こえだ！\nもうすぐ あえる！',
    clearMsg: 'こえが すぐ ちかくから きこえる！',
    goalIcon: '🔔',
    start: { col: 1, side: 'top' },
    goal: { col: 2, side: 'bottom' },
    solved: ['BLANK','V','BLANK','BLANK', 'BLANK','CROSS','CROSS','BLANK', null,'BLANK','V','BLANK', 'BLANK','BLANK','V','BLANK'],
    shuffleMoves: 12,
  },
  {
    name: 'おかあさーん！',
    cols: 4, rows: 5,
    storyMsg: '「ポノーッ！」\nおかあさんの こえだ！',
    clearMsg: '「ポノ！ さがしにきてくれたの？」',
    goalIcon: 'mom',
    start: { col: 1, side: 'top' },
    goal: { col: 2, side: 'bottom' },
    solved: ['BLANK','CROSS','CROSS','BLANK', 'BLANK','BLANK','V','BLANK', 'BLANK',null,'CROSS','BLANK', 'BLANK','BLANK','V','BLANK', 'BLANK','BLANK','V','BLANK'],
    shuffleMoves: 16,
  },
];

// ===== State machine =====
const S = { IDLE: 0, PLAYING: 1, STAGE_CLEAR: 2, GAME_CLEAR: 3, PAUSED: 4 };
let state = S.IDLE;
let prepauseState = S.IDLE;
let stageIdx = 0;
let moveCount = 0;
let grid = [];
let emptyIdx = -1;
let curCols = 3, curRows = 3;

// ===== Animation =====
let animating = false;
const SLIDE_DUR = 150;
let anim = { idx: -1, fromX: 0, fromY: 0, toX: 0, toY: 0, curX: 0, curY: 0, t0: 0 };

// Win celebration animation
let winAnim = { active: false, t0: 0, path: [], progress: 0 };

// ===== Canvas =====
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('gameWrap');
let CW = 0, CH = 0;
let cellSize = 0, gridOX = 0, gridOY = 0;

function resize() {
  const rect = wrap.getBoundingClientRect();
  CW = canvas.width  = Math.floor(rect.width);
  CH = canvas.height = Math.floor(rect.height);
  calcLayout();
}

function calcLayout() {
  const pad = CW * 0.05;
  const charH = Math.max(46, CH * 0.07); // space for characters at top/bottom
  const availW = CW - pad * 2;
  const availH = CH - charH * 2 - pad * 2;
  cellSize = Math.floor(Math.min(availW / curCols, availH / curRows));
  const gridW = cellSize * curCols;
  const gridH = cellSize * curRows;
  gridOX = Math.floor((CW - gridW) / 2);
  gridOY = Math.floor(charH + pad + (availH - gridH) / 2);
}

window.addEventListener('resize', resize);

// ===== Audio =====
let audioCtx = null;
function withAudio(fn) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  fn(audioCtx);
}
function beep(ac, freq, start, dur, type, vol) {
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol || 0.2, start);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(start); o.stop(start + dur);
}
function playSlideSound() {
  withAudio(ac => beep(ac, 350 + Math.random() * 80, ac.currentTime, 0.06, 'sine', 0.15));
}
function playClearSound() {
  withAudio(ac => {
    const t = ac.currentTime;
    [523, 659, 784, 1047].forEach((f, i) => beep(ac, f, t + i * 0.12, 0.25, 'sine', 0.2));
  });
}
function playGameClearSound() {
  withAudio(ac => {
    const t = ac.currentTime;
    [523,659,784,1047,784,1047,1319].forEach((f,i) => beep(ac, f, t + i*0.15, 0.3, 'sine', 0.22));
  });
}

// ===== Grid helpers =====
function getAdjacentIndices(idx) {
  const row = Math.floor(idx / curCols), col = idx % curCols;
  const result = [];
  if (row > 0) result.push(idx - curCols);
  if (row < curRows - 1) result.push(idx + curCols);
  if (col > 0) result.push(idx - 1);
  if (col < curCols - 1) result.push(idx + 1);
  return result;
}

function shuffleGrid(level) {
  curCols = level.cols;
  curRows = level.rows;
  grid = [...level.solved];
  emptyIdx = grid.indexOf(null);
  const n = level.shuffleMoves;
  let lastMoved = -1;
  for (let i = 0; i < n; i++) {
    const neighbors = getAdjacentIndices(emptyIdx);
    const candidates = neighbors.filter(idx => idx !== lastMoved);
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    lastMoved = emptyIdx;
    grid[emptyIdx] = grid[pick];
    grid[pick] = null;
    emptyIdx = pick;
  }
  // Ensure not already solved
  if (checkWin()) shuffleGrid(level);
}

// ===== Win detection (BFS) =====
function oppositeEdge(e) { return (e + 2) % 4; }

function getNeighborRC(row, col, edge) {
  const dr = [-1, 0, 1, 0];
  const dc = [0, 1, 0, -1];
  return [row + dr[edge], col + dc[edge]];
}

function checkWin() {
  const level = LEVELS[stageIdx];
  let startRow, startCol, startEdge;
  if (level.start.side === 'top')    { startRow = 0; startCol = level.start.col; startEdge = 0; }
  if (level.start.side === 'bottom') { startRow = curRows - 1; startCol = level.start.col; startEdge = 2; }
  if (level.start.side === 'left')   { startRow = level.start.row; startCol = 0; startEdge = 3; }
  if (level.start.side === 'right')  { startRow = level.start.row; startCol = curCols - 1; startEdge = 1; }

  let goalRow, goalCol, goalExitEdge;
  if (level.goal.side === 'top')    { goalRow = 0; goalCol = level.goal.col; goalExitEdge = 0; }
  if (level.goal.side === 'bottom') { goalRow = curRows - 1; goalCol = level.goal.col; goalExitEdge = 2; }
  if (level.goal.side === 'left')   { goalRow = level.goal.row; goalCol = 0; goalExitEdge = 3; }
  if (level.goal.side === 'right')  { goalRow = level.goal.row; goalCol = curCols - 1; goalExitEdge = 1; }

  const queue = [{ row: startRow, col: startCol, fromEdge: startEdge }];
  const visited = new Set();

  while (queue.length > 0) {
    const { row, col, fromEdge } = queue.shift();
    const key = `${row},${col}`;
    if (visited.has(key)) continue;
    visited.add(key);
    if (row < 0 || row >= curRows || col < 0 || col >= curCols) continue;

    const idx = row * curCols + col;
    const tileKey = grid[idx];
    if (!tileKey || tileKey === 'BLANK') continue;

    const edges = TILE_TYPES[tileKey].edges;
    if (!edges[fromEdge]) continue;

    for (let e = 0; e < 4; e++) {
      if (e === fromEdge || !edges[e]) continue;
      if (row === goalRow && col === goalCol && e === goalExitEdge) return true;
      const [nr, nc] = getNeighborRC(row, col, e);
      if (nr >= 0 && nr < curRows && nc >= 0 && nc < curCols) {
        queue.push({ row: nr, col: nc, fromEdge: oppositeEdge(e) });
      }
    }
  }
  return false;
}

// ===== Trace winning path (for celebration animation) =====
function traceWinPath() {
  const level = LEVELS[stageIdx];
  let startRow, startCol, startEdge;
  if (level.start.side === 'top')    { startRow = 0; startCol = level.start.col; startEdge = 0; }
  if (level.start.side === 'bottom') { startRow = curRows - 1; startCol = level.start.col; startEdge = 2; }
  if (level.start.side === 'left')   { startRow = level.start.row; startCol = 0; startEdge = 3; }
  if (level.start.side === 'right')  { startRow = level.start.row; startCol = curCols - 1; startEdge = 1; }

  let goalRow, goalCol, goalExitEdge;
  if (level.goal.side === 'top')    { goalRow = 0; goalCol = level.goal.col; goalExitEdge = 0; }
  if (level.goal.side === 'bottom') { goalRow = curRows - 1; goalCol = level.goal.col; goalExitEdge = 2; }
  if (level.goal.side === 'left')   { goalRow = level.goal.row; goalCol = 0; goalExitEdge = 3; }
  if (level.goal.side === 'right')  { goalRow = level.goal.row; goalCol = curCols - 1; goalExitEdge = 1; }

  const drDir = [-1, 0, 1, 0];
  const dcDir = [0, 1, 0, -1];

  // BFS to find correct path through tiles (handles CROSS tiles)
  // State: { row, col, fromEdge, path[] }
  const queue = [{ row: startRow, col: startCol, fromEdge: startEdge, trail: [] }];
  const visited = new Set();
  let foundTrail = null;
  let foundGoalEdge = -1;

  while (queue.length > 0) {
    const cur = queue.shift();
    const r = cur.row, c = cur.col, fe = cur.fromEdge;
    if (r < 0 || r >= curRows || c < 0 || c >= curCols) continue;
    const vKey = `${r},${c},${fe}`;
    if (visited.has(vKey)) continue;
    visited.add(vKey);

    const idx = r * curCols + c;
    const tileKey = grid[idx];
    if (!tileKey || tileKey === 'BLANK') continue;
    const edges = TILE_TYPES[tileKey].edges;
    if (!edges[fe]) continue;

    const trail = cur.trail.concat({ row: r, col: c });

    for (let e = 0; e < 4; e++) {
      if (e === fe || !edges[e]) continue;
      if (r === goalRow && c === goalCol && e === goalExitEdge) {
        foundTrail = trail;
        foundGoalEdge = e;
        break;
      }
      const [nr, nc] = getNeighborRC(r, c, e);
      queue.push({ row: nr, col: nc, fromEdge: oppositeEdge(e), trail: trail });
    }
    if (foundTrail) break;
  }

  // Build final path: entry → cells → exit
  const path = [];
  // Entry point (one cell outside grid on start side)
  path.push({ row: startRow - drDir[oppositeEdge(startEdge)],
              col: startCol - dcDir[oppositeEdge(startEdge)] });
  if (foundTrail) {
    foundTrail.forEach(p => path.push(p));
    // Exit point (one cell beyond goal)
    path.push({ row: goalRow + drDir[foundGoalEdge],
                col: goalCol + dcDir[foundGoalEdge] });
  }
  return path;
}

// ===== Drawing =====
const GRASS_COLOR = '#7EC850';
const GRASS_DARK  = '#5DA83A';
const DIRT_COLOR  = '#C8956B';
const DIRT_BORDER = '#8B6B42';
const DIRT_LIGHT  = '#DEB887';
const EMPTY_COLOR = '#3D5A2E';

function drawTile(x, y, size, tileKey, isAnimating) {
  const r = size * 0.1;
  const gap = 3;

  // Tile background
  ctx.beginPath();
  ctx.roundRect(x + gap, y + gap, size - gap * 2, size - gap * 2, r);
  ctx.fillStyle = tileKey === 'BLANK' ? GRASS_COLOR : '#8AD460';
  ctx.fill();
  ctx.strokeStyle = GRASS_DARK;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  if (tileKey === 'BLANK') {
    // Draw small decorations on blank tiles
    const seed = (x * 7 + y * 13) | 0;
    const flowers = ['🌼', '🍀', '🌿', '🍄'];
    ctx.font = `${Math.floor(size * 0.2)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(flowers[((seed >> 3) & 3)], x + size / 2, y + size / 2);
    return;
  }

  // Draw path
  const edges = TILE_TYPES[tileKey].edges;
  const cx = x + size / 2;
  const cy = y + size / 2;
  const pathW = size * 0.30;

  // Draw border first, then fill
  for (let pass = 0; pass < 2; pass++) {
    ctx.strokeStyle = pass === 0 ? DIRT_BORDER : DIRT_COLOR;
    ctx.lineWidth = pass === 0 ? pathW + 4 : pathW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    const openEdges = [];
    for (let e = 0; e < 4; e++) if (edges[e]) openEdges.push(e);

    if (openEdges.length === 2) {
      // Straight or turn
      const [a, b] = openEdges;
      const pa = edgePoint(x, y, size, a);
      const pb = edgePoint(x, y, size, b);

      if (Math.abs(a - b) === 2) {
        // Straight line
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
      } else {
        // Curve
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.quadraticCurveTo(cx, cy, pb.x, pb.y);
        ctx.stroke();
      }
    } else {
      // T-junction or cross — draw lines from center to each open edge
      for (const e of openEdges) {
        const p = edgePoint(x, y, size, e);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }
    }
  }

  // Light highlight on path center
  ctx.fillStyle = DIRT_LIGHT;
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.arc(cx, cy, pathW * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function edgePoint(x, y, size, edge) {
  const cx = x + size / 2, cy = y + size / 2;
  const gap = 3;
  if (edge === 0) return { x: cx, y: y + gap };      // top
  if (edge === 1) return { x: x + size - gap, y: cy }; // right
  if (edge === 2) return { x: cx, y: y + size - gap }; // bottom
  if (edge === 3) return { x: x + gap, y: cy };        // left
}

function drawStartGoal() {
  const level = LEVELS[stageIdx];
  const fontSize = Math.floor(cellSize * 0.38);

  // ===== Start marker (ポノ) at top =====
  const sc = level.start.col;
  const sx = gridOX + sc * cellSize + cellSize / 2;
  const sy = gridOY - cellSize * 0.35;
  const imgSize = Math.floor(cellSize * 0.45);

  if (!winAnim.active && state === S.PLAYING) {
    if (imgPono.complete && imgPono.naturalWidth > 0) {
      ctx.drawImage(imgPono, sx - imgSize / 2, sy - imgSize / 2, imgSize, imgSize);
    } else {
      ctx.font = `${fontSize}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('🐻', sx, sy);
    }
    ctx.font = `900 ${Math.floor(cellSize * 0.12)}px 'Zen Maru Gothic', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#5D4E37';
    ctx.fillText('ポノ', sx, sy + imgSize / 2 + Math.floor(cellSize * 0.06));
  }

  // Arrow pointing down into grid
  ctx.strokeStyle = var_primary;
  ctx.lineWidth = 3;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(sx, gridOY - 10);
  ctx.lineTo(sx, gridOY + 4);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(sx - 5, gridOY);
  ctx.lineTo(sx, gridOY + 8);
  ctx.lineTo(sx + 5, gridOY);
  ctx.fillStyle = var_primary;
  ctx.fill();

  // ===== Goal marker at bottom =====
  const gc = level.goal.col;
  const gx = gridOX + gc * cellSize + cellSize / 2;
  const bottomEdge = gridOY + curRows * cellSize;
  const gy = bottomEdge + cellSize * 0.4;

  if (level.goalIcon === 'mom') {
    // 最終ステージ: お母さん全身画像
    if (imgMomFull.complete && imgMomFull.naturalWidth > 0) {
      ctx.drawImage(imgMomFull, gx - imgSize / 2, gy - imgSize / 2, imgSize, imgSize);
    } else if (imgMom.complete && imgMom.naturalWidth > 0) {
      ctx.drawImage(imgMom, gx - imgSize / 2, gy - imgSize / 2, imgSize, imgSize);
    }
    ctx.font = `900 ${Math.floor(cellSize * 0.12)}px 'Zen Maru Gothic', sans-serif`;
    ctx.fillStyle = '#5D4E37';
    ctx.fillText('おかあさん', gx, gy + imgSize / 2 + Math.floor(cellSize * 0.06));
  } else {
    // 手がかりアイコン（絵文字）
    ctx.font = `${Math.floor(cellSize * 0.4)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(level.goalIcon, gx, gy);
  }

  // Arrow at grid bottom edge
  ctx.strokeStyle = var_primary;
  ctx.lineWidth = 3;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(gx, bottomEdge - 4);
  ctx.lineTo(gx, bottomEdge + 10);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(gx - 5, bottomEdge + 6);
  ctx.lineTo(gx, bottomEdge + 14);
  ctx.lineTo(gx + 5, bottomEdge + 6);
  ctx.fillStyle = var_primary;
  ctx.fill();
}

const var_primary = '#4CAF50';

function draw(now) {
  // Background image (stage-specific)
  var bgIdx = Math.min(stageIdx, stageBgImgs.length - 1);
  var bgImg = stageBgImgs[bgIdx];
  if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
    var iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
    var sc = Math.max(CW / iw, CH / ih);
    var dw = iw * sc, dh = ih * sc;
    ctx.drawImage(bgImg, (CW - dw) / 2, (CH - dh) / 2, dw, dh);
  } else {
    ctx.fillStyle = '#E8F5E9';
    ctx.fillRect(0, 0, CW, CH);
  }

  // Grid background (wooden frame)
  const frameP = 6;
  ctx.fillStyle = '#6D4C2A';
  ctx.beginPath();
  ctx.roundRect(gridOX - frameP, gridOY - frameP,
    cellSize * curCols + frameP * 2, cellSize * curRows + frameP * 2, 12);
  ctx.fill();

  ctx.fillStyle = '#8B6B42';
  ctx.beginPath();
  ctx.roundRect(gridOX - frameP + 2, gridOY - frameP + 2,
    cellSize * curCols + frameP * 2 - 4, cellSize * curRows + frameP * 2 - 4, 10);
  ctx.fill();

  // Empty space
  const eRow = Math.floor(emptyIdx / curCols), eCol = emptyIdx % curCols;
  const ex = gridOX + eCol * cellSize, ey = gridOY + eRow * cellSize;
  ctx.fillStyle = EMPTY_COLOR;
  ctx.fillRect(ex + 2, ey + 2, cellSize - 4, cellSize - 4);

  // Draw tiles
  const total = curCols * curRows;
  for (let i = 0; i < total; i++) {
    if (grid[i] === null) continue;
    const row = Math.floor(i / curCols), col = i % curCols;
    let x = gridOX + col * cellSize;
    let y = gridOY + row * cellSize;

    if (animating && i === anim.idx) {
      x = anim.curX;
      y = anim.curY;
    }

    drawTile(x, y, cellSize, grid[i]);
  }

  // Start & Goal markers
  drawStartGoal();

  // Win celebration walk animation (direction-aware)
  if (winAnim.active && winAnim.path.length > 0) {
    const elapsed = now - winAnim.t0;
    const dur = winAnim.path.length * 867; // walk speed
    const t = Math.min(elapsed / dur, 1);
    const totalPts = winAnim.path.length;
    const exactIdx = t * (totalPts - 1);
    const idxA = Math.floor(exactIdx);
    const idxB = Math.min(idxA + 1, totalPts - 1);
    const frac = exactIdx - idxA;

    const pA = winAnim.path[idxA];
    const pB = winAnim.path[idxB];
    const fx = gridOX + (pA.col + (pB.col - pA.col) * frac) * cellSize + cellSize / 2;
    const fy = gridOY + (pA.row + (pB.row - pA.row) * frac) * cellSize + cellSize / 2;

    // Determine movement direction (look ahead; if same point, look at next segment)
    let dCol = 0, dRow = 0;
    if (idxA !== idxB) {
      dCol = pB.col - pA.col;
      dRow = pB.row - pA.row;
    } else if (idxA > 0) {
      // At last point or boundary — use previous segment direction
      dCol = pA.col - winAnim.path[idxA - 1].col;
      dRow = pA.row - winAnim.path[idxA - 1].row;
    }
    const isHorizontal = Math.abs(dCol) > Math.abs(dRow);

    const walkH = Math.floor(cellSize * 0.55);

    if (isHorizontal && imgWalkSideSheet.complete && imgWalkSideSheet.naturalWidth > 0) {
      // Side walk (scaled up to match front character size)
      const sideH = Math.floor(walkH * SIDE_WALK_SCALE);
      const sideW = Math.floor(sideH * SIDE_WALK_FRAME_W / SIDE_WALK_FRAME_H);
      const frameIdx = Math.floor(elapsed / (1000 / WALK_FPS)) % SIDE_WALK_FRAMES;
      const sx = frameIdx * SIDE_WALK_FRAME_W;
      ctx.save();
      if (dCol < 0) {
        // Moving left — flip horizontally
        ctx.translate(fx, fy);
        ctx.scale(-1, 1);
        ctx.drawImage(imgWalkSideSheet, sx, 0, SIDE_WALK_FRAME_W, SIDE_WALK_FRAME_H,
                       -sideW / 2, -sideH / 2, sideW, sideH);
      } else {
        ctx.drawImage(imgWalkSideSheet, sx, 0, SIDE_WALK_FRAME_W, SIDE_WALK_FRAME_H,
                       fx - sideW / 2, fy - sideH / 2, sideW, sideH);
      }
      ctx.restore();
    } else if (imgWalkSheet.complete && imgWalkSheet.naturalWidth > 0) {
      // Front walk (vertical movement or side sheet not loaded)
      const walkW = Math.floor(walkH * WALK_FRAME_W / WALK_FRAME_H);
      const frameIdx = Math.floor(elapsed / (1000 / WALK_FPS)) % WALK_FRAMES;
      const sx = frameIdx * WALK_FRAME_W;
      ctx.drawImage(imgWalkSheet, sx, 0, WALK_FRAME_W, WALK_FRAME_H,
                     fx - walkW / 2, fy - walkH / 2, walkW, walkH);
    } else {
      ctx.font = `${Math.floor(cellSize * 0.5)}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('🐻', fx, fy);
    }

    if (t >= 1) {
      winAnim.active = false;
      const isLast = stageIdx >= LEVELS.length - 1;
      setTimeout(() => showOverlay(isLast ? 'gameclear' : 'stageclear'), 300);
    }
  }

  // Pause overlay on canvas
  if (state === S.PAUSED) {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.font = `900 ${Math.floor(CW * 0.09)}px 'Zen Maru Gothic', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText('⏸ ポーズちゅう', CW / 2, CH / 2);
  }
}

// ===== Update animation =====
function updateAnim(now) {
  if (!animating) return;
  const t = Math.min((now - anim.t0) / SLIDE_DUR, 1);
  const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  anim.curX = anim.fromX + (anim.toX - anim.fromX) * ease;
  anim.curY = anim.fromY + (anim.toY - anim.fromY) * ease;

  if (t >= 1) {
    const oldEmpty = emptyIdx;
    grid[oldEmpty] = grid[anim.idx];
    grid[anim.idx] = null;
    emptyIdx = anim.idx;
    moveCount++;
    updateHUD();
    animating = false;

    if (!_slideTutActive && checkWin()) {
      onStageClear();
    }
  }
}

// ===== Game loop =====
function loop(ts) {
  requestAnimationFrame(loop);
  updateAnim(ts);
  draw(ts);
}

// ===== Input =====
function handleTap(px, py) {
  if (state !== S.PLAYING || animating || winAnim.active) return;

  const col = Math.floor((px - gridOX) / cellSize);
  const row = Math.floor((py - gridOY) / cellSize);
  if (col < 0 || col >= curCols || row < 0 || row >= curRows) return;

  const tappedIdx = row * curCols + col;
  if (grid[tappedIdx] === null) return;

  const eRow = Math.floor(emptyIdx / curCols), eCol = emptyIdx % curCols;
  const dist = Math.abs(eRow - row) + Math.abs(eCol - col);
  if (dist !== 1) return;

  // Start slide animation
  animating = true;
  anim.idx = tappedIdx;
  anim.fromX = gridOX + col * cellSize;
  anim.fromY = gridOY + row * cellSize;
  anim.toX   = gridOX + eCol * cellSize;
  anim.toY   = gridOY + eRow * cellSize;
  anim.curX  = anim.fromX;
  anim.curY  = anim.fromY;
  anim.t0    = performance.now();
  playSlideSound();
}

wrap.addEventListener('pointerdown', e => {
  if (state === S.PAUSED || _slideTutActive) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) * (CW / rect.width);
  const py = (e.clientY - rect.top) * (CH / rect.height);
  handleTap(px, py);
});

// ===== Stage clear =====
function onStageClear() {
  state = S.STAGE_CLEAR;
  playClearSound();
  if (window.incrementStat) window.incrementStat('slide_clears', 1);
  const path = traceWinPath();
  winAnim.active = true;
  winAnim.t0 = performance.now();
  winAnim.path = path;
}

// ===== Confetti =====
function launchConfetti() {
  const c = document.getElementById('confetti');
  c.innerHTML = '';
  const colors = ['#4CAF50','#81C784','#FFC107','#FF9800','#E91E63','#9C27B0'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const sz = 6 + Math.random() * 8;
    el.style.cssText = `
      left:${Math.random()*100}%;
      width:${sz}px; height:${sz}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      animation-delay:${Math.random() * 0.4}s;
      animation-duration:${2 + Math.random()}s;
    `;
    c.appendChild(el);
  }
  setTimeout(() => { c.innerHTML = ''; }, 3500);
}

// ===== Overlay =====
const overlay = document.getElementById('overlay');

function showOverlay(type) {
  const icon  = document.getElementById('ov-icon');
  const title = document.getElementById('ov-title');
  const msg   = document.getElementById('ov-msg');
  const btn   = document.getElementById('ov-btn');
  const back  = document.getElementById('ov-back');
  overlay.classList.remove('hidden');
  back.classList.add('hidden');
  title.style.whiteSpace = '';
  document.querySelector('.ov-card').classList.remove('cutscene-mode');

  var ponoFaceTag = '<img src="../assets/images/characters/pono/pono_face_circle.png" style="width:72px;height:72px;object-fit:contain;" alt="ポノ">';
  var reunionTag  = '<div style="display:flex;align-items:flex-end;justify-content:center;gap:4px;">' +
                    '<img src="../assets/images/characters/pono/pono_001.png" style="width:60px;height:60px;object-fit:contain;" alt="ポノ">' +
                    '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">' +
                    '<span style="font-size:1.2rem;animation:heartFloat 1.5s ease-in-out infinite;">❤️</span>' +
                    '<span style="font-size:1.8rem;animation:heartFloat 1.5s ease-in-out 0.5s infinite;">❤️</span>' +
                    '</div>' +
                    '<img src="../assets/images/Slide/pono_mom_only.png" style="width:100px;height:100px;object-fit:contain;" alt="おかあさん">' +
                    '</div>';

  if (type === 'start') {
    icon.innerHTML    = ponoFaceTag;
    if (!localStorage.getItem('slide_tut_seen')) {
      // 初回: ゲーム説明
      title.textContent = 'みちつなぎ';
      msg.textContent   = 'パネルを うごかして\nみちを つなげよう！\nまずは れんしゅうから！';
      btn.textContent   = 'やってみる ▶';
    } else {
      title.textContent = 'おかあさん どこいったの？';
      msg.textContent   = LEVELS[stageIdx].storyMsg;
      btn.textContent   = 'さがしにいく ▶';
    }
  } else if (type === 'stagestart') {
    icon.innerHTML    = ponoFaceTag;
    title.textContent = 'ステージ ' + (stageIdx + 1);
    msg.textContent   = LEVELS[stageIdx].storyMsg;
    btn.textContent   = 'すすむ ▶';
  } else if (type === 'stageclear') {
    launchConfetti();
    icon.innerHTML    = ponoFaceTag;
    title.textContent = `${LEVELS[stageIdx].name} クリア！`;
    msg.textContent   = LEVELS[stageIdx].clearMsg + `\n${moveCount}てかず`;
    btn.textContent   = 'つぎへ ▶';
    if (LEVELS[stageIdx].cutscene) {
      btn.dataset.ovType = 'cutscene';
      return;
    }
  } else if (type === 'gameclear') {
    launchConfetti();
    playGameClearSound();
    var card = document.querySelector('.ov-card');
    card.classList.add('cutscene-mode');
    icon.innerHTML    = '<img src="../assets/images/Slide/cutscene_ending.png" class="cutscene-img" alt="おかあさんと いっしょ">';
    title.textContent = 'おかあさんと さいかい！';
    msg.textContent   = `「ポノの だいすきな きのみと\nキノコを とりにきたの。\nおそくなって ごめんね！\nいっしょに かえろう！」\n${moveCount}てかず でクリア！`;
    btn.textContent   = 'もう一回 ▶';
  }

  btn.dataset.ovType = type;
}

function updateHUD() {
  document.getElementById('hud-stage').textContent = LEVELS[stageIdx].name;
  document.getElementById('hud-moves').textContent = `てかず: ${moveCount}`;
  var stageNum = document.getElementById('stage-num');
  if (stageNum) stageNum.textContent = 'ステージ ' + (stageIdx + 1) + ' / ' + LEVELS.length;
}


// ===== Start / Next =====
function startGame() {
  stageIdx = 0;
  moveCount = 0;
  shuffleGrid(LEVELS[stageIdx]);
  calcLayout();
  updateHUD();
  showOverlay('stagestart');
}

function nextStage() {
  overlay.classList.add('hidden');
  stageIdx++;
  moveCount = 0;
  shuffleGrid(LEVELS[stageIdx]);
  calcLayout();
  updateHUD();
  showOverlay('stagestart');
}

// ===== Cutscene =====
function showCutscene() {
  var level = LEVELS[stageIdx];
  if (!level || !level.cutscene) { nextStage(); return; }
  var card  = document.querySelector('.ov-card');
  var icon  = document.getElementById('ov-icon');
  var title = document.getElementById('ov-title');
  var msg   = document.getElementById('ov-msg');
  var btn   = document.getElementById('ov-btn');
  card.classList.add('cutscene-mode');
  if (level.cutscene.img) {
    icon.innerHTML = '<img src="' + level.cutscene.img + '" class="cutscene-img" alt="カットイン">';
  } else {
    icon.innerHTML = '<img src="../assets/images/Slide/pono_mom_only.png" style="width:100px;height:100px;object-fit:contain;" alt="おかあさん">';
  }
  title.textContent = level.cutscene.text;
  title.style.whiteSpace = 'pre-line';
  msg.textContent = '';
  btn.textContent = 'つぎへ ▶';
  btn.dataset.ovType = 'stageclear';
}

// ===== Overlay button =====
(function() {
  const ovBtn = document.getElementById('ov-btn');
  function execAction() {
    const t = ovBtn.dataset.ovType;
    if (t === 'cutscene') { showCutscene(); return; }
    if (t === 'stageclear') nextStage();
    else if (t === 'stagestart') {
      overlay.classList.add('hidden');
      state = S.PLAYING;
    } else {
      if (!localStorage.getItem('slide_tut_seen')) {
        // チュートリアルから開始（ステージダイアログなし）
        overlay.classList.add('hidden');
        stageIdx = 0;
        moveCount = 0;
        curCols = 3; curRows = 3;
        grid = ['BLANK',null,'BLANK', 'BLANK','V','BLANK', 'V','V','BLANK'];
        emptyIdx = 1;
        calcLayout();
        // HUDを「チュートリアル」表示
        document.getElementById('hud-stage').textContent = 'れんしゅう';
        document.getElementById('hud-moves').textContent = '';
        var stageNum = document.getElementById('stage-num');
        if (stageNum) stageNum.textContent = 'チュートリアル';
        state = S.PLAYING;
        setTimeout(showTutorial, 500);
      } else {
        startGame();
      }
    }
  }
  ovBtn.addEventListener('touchstart', e => { e.preventDefault(); execAction(); }, { passive: false });
  ovBtn.addEventListener('click', execAction);
})();

// ===== Pause =====
function togglePause() {
  if (state === S.PAUSED) {
    state = prepauseState;
    document.getElementById('btn-pause').textContent = '⏸';
    if (bgmEnabled) bgm.play().catch(() => {});
  } else if (state === S.PLAYING) {
    prepauseState = state;
    state = S.PAUSED;
    document.getElementById('btn-pause').textContent = '▶';
    bgm.pause();
  }
}

const btnPause = document.getElementById('btn-pause');
btnPause.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); togglePause(); }, { passive: false });
btnPause.addEventListener('click', e => { e.stopPropagation(); togglePause(); });

// ===== BGM =====
const bgm    = document.getElementById('bgm');
const btnBgm = document.getElementById('btn-bgm');
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';
let bgmStarted = false;
bgm.volume = 0.2;

function updateBgmBtn() { btnBgm.classList.toggle('bgm-off', !bgmEnabled); }

function tryStartBgm() {
  if (!bgmEnabled || bgmStarted) return;
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
}

btnBgm.addEventListener('click', () => {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
  if (bgmEnabled) { bgmStarted = false; tryStartBgm(); } else { bgm.pause(); }
  updateBgmBtn();
});

if (bgmEnabled) {
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {
    document.addEventListener('touchstart', tryStartBgm, { once: true, passive: true });
    document.addEventListener('pointerdown', tryStartBgm, { once: true });
  });
}
updateBgmBtn();

document.addEventListener('visibilitychange', () => {
  if (document.hidden) { bgm.pause(); }
  else if (bgmEnabled) { bgm.play().catch(() => {}); }
});
window.addEventListener('blur',  () => bgm.pause());
window.addEventListener('focus', () => { if (bgmEnabled) bgm.play().catch(() => {}); });

var _slideTutActive = false;
function showTutorial() {
  _slideTutActive = true;
  var dim = document.getElementById('tut-dim');
  var bubble = document.getElementById('tut-bubble');
  if (!dim || !bubble) return;

  // チュートリアル用: 3手で完成する固定配置
  // 解答: ['BLANK','V','BLANK', 'BLANK','V','BLANK', null,'V','BLANK']
  // 3手戻し:
  //   BLANK  null  BLANK    (row0) 空き=idx1
  //   BLANK  V     BLANK    (row1)
  //   V      V     BLANK    (row2) Vが左にずれ
  // 手順: (1,1)→上 → (2,1)→上 → (2,0)→右 = 3手で完成
  var tutGrid = ['BLANK',null,'BLANK', 'BLANK','V','BLANK', 'V','V','BLANK'];
  var tutEmpty = 1; // row0,col1
  var tutSteps = [
    { row: 1, col: 1, msg: 'この みちパネルを タッチ！' },
    { row: 2, col: 1, msg: 'つぎは ここ！' },
    { row: 2, col: 0, msg: 'さいごは ここ！' }
  ];
  var tutStepIdx = 0;

  // Step 0: 導入
  dim.classList.remove('hidden');
  bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
  bubble.innerHTML = '🌳 パネルを うごかして<br>みちを つなげよう！<br><button class="tut-next-btn" id="tut-next">やってみる！</button>';
  bubble.classList.remove('hidden');

  document.getElementById('tut-next').addEventListener('pointerdown', function(e) {
    e.preventDefault(); e.stopPropagation();
    dim.classList.add('hidden');
    bubble.classList.add('hidden');

    // 描画を1フレーム待ってからハイライト
    requestAnimationFrame(function() {
      showTutStep();
    });
  });

  function showTutStep() {
    if (tutStepIdx >= tutSteps.length) return;
    var s = tutSteps[tutStepIdx];
    highlightTile(s.row, s.col, s.msg);
  }

  var _tutOverlay = null;

  function highlightTile(row, col, msg) {
    // パネルのCanvas座標→画面座標に変換
    var rect = canvas.getBoundingClientRect();
    var scaleX = rect.width / CW;
    var scaleY = rect.height / CH;
    var tx = rect.left + (gridOX + col * cellSize) * scaleX;
    var ty = rect.top + (gridOY + row * cellSize) * scaleY;
    var tw = cellSize * scaleX;
    var th = cellSize * scaleY;

    // ハイライトオーバーレイ
    if (_tutOverlay) _tutOverlay.remove();
    _tutOverlay = document.createElement('div');
    _tutOverlay.style.cssText = 'position:fixed;z-index:9996;border:4px solid #FFD700;border-radius:12px;box-shadow:0 0 0 4000px rgba(0,0,0,0.5),0 0 20px rgba(255,215,0,0.6);pointer-events:none;' +
      'left:' + tx + 'px;top:' + ty + 'px;width:' + tw + 'px;height:' + th + 'px;';
    document.body.appendChild(_tutOverlay);

    // 吹き出し（パネルの上に）
    bubble.style.cssText = 'top:' + Math.max(10, ty - 60) + 'px;left:' + (tx + tw / 2) + 'px;transform:translateX(-50%);z-index:9997';
    bubble.innerHTML = '👆 ' + msg;
    bubble.classList.remove('hidden');

    // ユーザーがそのパネルをタップするのを待つ
    waitForTap(row, col);
  }

  function waitForTap(targetRow, targetCol) {
    var targetIdx = targetRow * curCols + targetCol;
    function onTap(ev) {
      var rect = canvas.getBoundingClientRect();
      var px = (ev.clientX - rect.left) * (CW / rect.width);
      var py = (ev.clientY - rect.top) * (CH / rect.height);
      var col = Math.floor((px - gridOX) / cellSize);
      var row = Math.floor((py - gridOY) / cellSize);
      if (col < 0 || col >= curCols || row < 0 || row >= curRows) return;
      var tappedIdx = row * curCols + col;
      if (tappedIdx !== targetIdx) return;

      ev.preventDefault();
      ev.stopPropagation();
      // 正解タップ！
      document.removeEventListener('pointerdown', onTap, true);
      if (_tutOverlay) { _tutOverlay.remove(); _tutOverlay = null; }
      bubble.classList.add('hidden');

      // 実際にパネルを動かす
      handleTap(px, py);
      // 次のステップまで操作をブロック（animatingフラグで）
      animating = true;

      // アニメーション完了後にフィードバック→次のステップ
      setTimeout(function() {
        tutStepIdx++;
        if (tutStepIdx < tutSteps.length) {
          // フィードバック表示
          var msgs = ['いいね！', 'すごい！', 'そのちょうし！'];
          bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
          bubble.innerHTML = '✨ ' + msgs[Math.min(tutStepIdx - 1, msgs.length - 1)] + '<br><button class="tut-next-btn" id="tut-next">つぎ！</button>';
          bubble.classList.remove('hidden');
          document.getElementById('tut-next').addEventListener('pointerdown', function(fe) {
            fe.preventDefault(); fe.stopPropagation();
            bubble.classList.add('hidden');
            requestAnimationFrame(function() { showTutStep(); });
          });
        } else {
          // チュートリアル完了！ポノをゴールまで歩かせる
          var path = traceWinPath();
          if (path && path.length > 0) {
            winAnim.active = true;
            winAnim.t0 = performance.now();
            winAnim.path = path;
            // winAnim完了を待ってからダイアログ
            var waitWalk = setInterval(function() {
              if (!winAnim.active) {
                clearInterval(waitWalk);
                dim.classList.remove('hidden');
                bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
                bubble.innerHTML = '🎉 できた！<br>みちが つながったよ！<br><button class="tut-next-btn" id="tut-next">あそぼう！</button>';
                bubble.classList.remove('hidden');
                document.getElementById('tut-next').addEventListener('pointerdown', function(ev2) {
                  ev2.preventDefault(); ev2.stopPropagation();
                  endTut();
                  // ステージ1を直接開始（ダイアログなし）
                  startGame();
                });
              }
            }, 100);
          } else {
            endTut();
            startGame();
          }
        }
      }, 200);
    }
    document.addEventListener('pointerdown', onTap, true);
  }

  function endTut() {
    _slideTutActive = false;
    if (_tutOverlay) { _tutOverlay.remove(); _tutOverlay = null; }
    dim.classList.add('hidden');
    bubble.classList.add('hidden');
    localStorage.setItem('slide_tut_seen', '1');
  }
}

// ===== Init =====
initMenu({ bgmToggle: function() {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
  if (bgmEnabled) { bgmStarted = false; tryStartBgm(); } else { bgm.pause(); }
  updateBgmBtn();
  if (window._ponoMenuBgmBtn) window._ponoMenuBgmBtn.classList.toggle('bgm-off', !bgmEnabled);
}, tutorial: showTutorial});
curCols = LEVELS[0].cols;
curRows = LEVELS[0].rows;
resize();
updateHUD();
showOverlay('start');
requestAnimationFrame(loop);

function updateLandscapeNotice() {
  const notice = document.getElementById('landscape-notice');
  if (!notice) return;
  const isLandscape = window.innerWidth > window.innerHeight;
  const isTouch = matchMedia('(pointer: coarse)').matches;
  notice.style.display = (isLandscape && isTouch) ? 'flex' : 'none';
  // 縦に戻した時にキャンバスをリサイズ
  if (!isLandscape || !isTouch) resize();
}
updateLandscapeNotice();
window.addEventListener('orientationchange', () => {
  setTimeout(updateLandscapeNotice, 100);
  setTimeout(updateLandscapeNotice, 300);
  setTimeout(updateLandscapeNotice, 600);
  // 回転完了後にリサイズを確実に実行
  setTimeout(resize, 200);
  setTimeout(resize, 500);
  setTimeout(resize, 800);
});
window.addEventListener('resize', updateLandscapeNotice);
</script>
