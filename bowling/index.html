<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>びっくりボウリング | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap"></noscript>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100dvh; overflow: hidden;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #1a5c3a;
  touch-action: none; user-select: none; -webkit-user-select: none;
}
canvas { display: block; width: 100%; height: 100%; }
#back-btn {
  position: fixed; top: 12px; left: 12px; z-index: 100;
  background: rgba(255,255,255,0.85); border: none; border-radius: 50%;
  width: 44px; height: 44px; font-size: 22px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
}
#score {
  position: fixed; top: 12px; right: 16px; z-index: 100;
  font-size: 28px; font-weight: 900; color: #FFD700;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}
#banner {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
  z-index: 200; font-size: 48px; font-weight: 900; color: #FFD700;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.5); pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s;
  opacity: 0;
}
#banner.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
</style>
</head>
<body>
<button id="back-btn" onclick="location.href='../'">🏠</button>
<div id="score">0</div>
<div id="banner"></div>
<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script>
'use strict';
const { Engine, World, Bodies, Body, Events } = Matter;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bannerEl = document.getElementById('banner');
let W, H, logW, logH;
function resize() {
  logW = window.innerWidth;
  logH = window.innerHeight;
  // Don't use devicePixelRatio for canvas size — keep it 1:1 for performance
  W = canvas.width = logW;
  H = canvas.height = logH;
}
resize();
window.addEventListener('resize', () => { resize(); resetRound(); });

// ── Audio (WAV generation + audio pool) ──
function makeWav(freq, dur, vol, decay) {
  const sr = 22050, n = sr * dur | 0;
  const buf = new ArrayBuffer(44 + n * 2);
  const v = new DataView(buf);
  function s(o, str) { for (let i = 0; i < str.length; i++) v.setUint8(o + i, str.charCodeAt(i)); }
  s(0,'RIFF'); v.setUint32(4, 36 + n * 2, true); s(8,'WAVE');
  s(12,'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
  v.setUint16(22, 1, true); v.setUint32(24, sr, true);
  v.setUint32(28, sr * 2, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  s(36,'data'); v.setUint32(40, n * 2, true);
  for (let i = 0; i < n; i++) {
    const t = i / sr;
    const val = Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * (decay || 20)) * vol;
    v.setInt16(44 + i * 2, Math.max(-32768, Math.min(32767, val * 32767 | 0)), true);
  }
  return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
}

const POOL_SIZE = 6;
const audioPool = [];
let poolIdx = 0;
for (let i = 0; i < POOL_SIZE; i++) audioPool.push(new Audio());

const bonkSounds = [];
for (let i = 0; i < 3; i++) bonkSounds.push(makeWav(300 + i * 150, 0.1, 0.5, 30));
const pocketSounds = [makeWav(500, 0.15, 0.5, 18), makeWav(700, 0.15, 0.5, 18)];
const strikeSound = makeWav(500, 0.25, 0.5, 10);
const launchSound = makeWav(400, 0.15, 0.5, 15);

const silentWav = makeWav(440, 0.01, 0, 50);
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  const a = audioPool[0];
  a.src = silentWav;
  a.volume = 0;
  a.play().catch(() => {});
}
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('pointerdown', unlockAudio, { once: true });

function playSound(url) {
  const a = audioPool[poolIdx];
  poolIdx = (poolIdx + 1) % POOL_SIZE;
  a.src = url;
  a.volume = 1.0;
  a.play().catch(() => {});
}
function playBonk() { playSound(bonkSounds[Math.floor(Math.random() * bonkSounds.length)]); }
function playPocket() { playSound(pocketSounds[Math.floor(Math.random() * pocketSounds.length)]); }
function playStrike() { playSound(strikeSound); }
function playLaunch() { playSound(launchSound); }

// ── Physics ──
const engine = Engine.create({
  gravity: { x: 0, y: 0 },
  positionIterations: 3,
  velocityIterations: 2,
});
const world = engine.world;

const POCKET_R = 40;
const PIN_R = 34;
const BALL_R = 32;
const MAX_PINS = 15;

// ── Load pin images ──
const PIN_COUNT = 13;
const pinImages = [];
let pinsLoaded = 0;

for (let i = 0; i < PIN_COUNT; i++) {
  const img = new Image();
  img.onload = () => { pinsLoaded++; };
  img.src = `pins/pin_${i}.png`;
  pinImages.push(img);
}

const CONFETTI_COLORS = [
  { r: 255, g: 143, b: 160 }, { r: 255, g: 179, b: 128 }, { r: 255, g: 224, b: 128 },
  { r: 160, g: 232, b: 160 }, { r: 128, g: 200, b: 255 }, { r: 192, g: 160, b: 255 },
];

let pins = [], ball = null, walls = [], pockets = [];
let ballLaunched = false, score = 0, round = 0;
let knockedCount = 0, totalPins = 0, pocketCount = 0;
let settleTimer = 0, launchElapsed = 0, roundResetting = false;
let dragging = false, dragStart = null, dragCur = null;

function getPocketPositions() {
  const m = 10;
  return [{ x: m, y: m }, { x: W - m, y: m }, { x: m, y: H - m }, { x: W - m, y: H - m }];
}

function createWalls() {
  walls.forEach(w => World.remove(world, w));
  const t = 40, g = POCKET_R * 2;
  walls = [
    Bodies.rectangle(W / 2, -t / 2, W - g * 2, t, { isStatic: true }),
    Bodies.rectangle(W / 2, H + t / 2, W - g * 2, t, { isStatic: true }),
    Bodies.rectangle(-t / 2, H / 2, t, H - g * 2, { isStatic: true }),
    Bodies.rectangle(W + t / 2, H / 2, t, H - g * 2, { isStatic: true }),
  ];
  walls.forEach(w => { w.restitution = 0.7; });
  World.add(world, walls);
  pockets = getPocketPositions();
}

function createPins() {
  pins.forEach(p => World.remove(world, p));
  pins = [];
  const areaW = W - 80, areaH = H * 0.4;
  let bestCols = 3, bestRows = 5;
  for (let c = 3; c <= 6; c++) {
    const r = Math.ceil(MAX_PINS / c);
    const spX = areaW / c, spY = areaH / r;
    if (Math.min(spX, spY) >= PIN_R * 2.1) { bestCols = c; bestRows = r; break; }
  }
  const cols = bestCols, rows = bestRows;
  const spacing = Math.min(areaW / cols, areaH / rows, PIN_R * 2.6);
  const startX = (W - (cols - 1) * spacing) / 2;
  const startY = H * 0.06 + 30;
  totalPins = MAX_PINS;
  knockedCount = 0;
  pocketCount = 0;
  let placed = 0;
  for (let r = 0; r < rows && placed < MAX_PINS; r++) {
    for (let c = 0; c < cols && placed < MAX_PINS; c++) {
      const x = startX + c * spacing + (Math.random() - 0.5) * 3;
      const y = startY + r * spacing + (Math.random() - 0.5) * 3;
      const pin = Bodies.circle(x, y, PIN_R, {
        restitution: 0.5, friction: 0.08, frictionAir: 0.06, density: 0.0003,
      });
      pin.isPin = true; pin.knocked = false;
      pin.initX = x; pin.initY = y;
      pin.imgIdx = Math.floor(Math.random() * PIN_COUNT);
      pin.pocketed = false;
      pins.push(pin);
      placed++;
    }
  }
  World.add(world, pins);
}

function createBall() {
  if (ball) World.remove(world, ball);
  ball = Bodies.circle(W / 2, H * 0.78, BALL_R, {
    restitution: 0.5, friction: 0.02, frictionAir: 0.012, density: 0.05,
  });
  ball.isBall = true;
  ballLaunched = false;
  World.add(world, ball);
}

// ── Slingshot input ──
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (ballLaunched || roundResetting) return;
  const dx = e.clientX - ball.position.x, dy = e.clientY - ball.position.y;
  if (dx * dx + dy * dy < (BALL_R * 4) ** 2) {
    dragging = true;
    dragStart = { x: ball.position.x, y: ball.position.y };
    dragCur = { x: e.clientX, y: e.clientY };
  }
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  dragCur = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('pointerup', e => {
  if (!dragging) return;
  dragging = false;
  const dx = dragStart.x - dragCur.x;
  const dy = dragStart.y - dragCur.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 15) return;
  const power = Math.min(dist / 8, 25);
  Body.setVelocity(ball, { x: (dx / dist) * power, y: (dy / dist) * power });
  ballLaunched = true;
  settleTimer = 0;
  launchElapsed = 0;
  playLaunch();
});

// ── Collision sounds ──
let soundThrottle = 0;
Events.on(engine, 'collisionStart', event => {
  const pairs = event.pairs;
  for (let p = 0; p < pairs.length; p++) {
    const pair = pairs[p];
    const dvx = pair.bodyA.velocity.x - pair.bodyB.velocity.x;
    const dvy = pair.bodyA.velocity.y - pair.bodyB.velocity.y;
    const spd = Math.sqrt(dvx * dvx + dvy * dvy);
    if (spd > 1.5 && soundThrottle <= 0) {
      playBonk();
      soundThrottle = 4; // longer throttle = fewer sounds = less audio overhead
    }
    const ba = pair.bodyA, bb = pair.bodyB;
    if (ba.isPin && !ba.knocked) {
      const dx = ba.position.x - ba.initX, dy = ba.position.y - ba.initY;
      if (dx * dx + dy * dy > PIN_R * PIN_R) {
        ba.knocked = true;
        knockedCount++; score++; scoreEl.textContent = score;
      }
    }
    if (bb.isPin && !bb.knocked) {
      const dx = bb.position.x - bb.initX, dy = bb.position.y - bb.initY;
      if (dx * dx + dy * dy > PIN_R * PIN_R) {
        bb.knocked = true;
        knockedCount++; score++; scoreEl.textContent = score;
      }
    }
  }
});

function checkPockets() {
  for (let i = 0; i < pins.length; i++) {
    const p = pins[i];
    if (p.pocketed) continue;
    for (let j = 0; j < pockets.length; j++) {
      const pk = pockets[j];
      const dx = p.position.x - pk.x, dy = p.position.y - pk.y;
      if (dx * dx + dy * dy < POCKET_R * POCKET_R) {
        p.pocketed = true;
        if (!p.knocked) { p.knocked = true; knockedCount++; }
        score += 3; pocketCount++;
        scoreEl.textContent = score;
        World.remove(world, p);
        playPocket();
        break;
      }
    }
  }
  if (ball) {
    for (let j = 0; j < pockets.length; j++) {
      const pk = pockets[j];
      const dx = ball.position.x - pk.x, dy = ball.position.y - pk.y;
      if (dx * dx + dy * dy < POCKET_R * POCKET_R) {
        Body.setPosition(ball, { x: W / 2, y: H * 0.78 });
        Body.setVelocity(ball, { x: 0, y: 0 });
      }
    }
  }
}

function showBanner(text, dur) {
  bannerEl.textContent = text;
  bannerEl.classList.add('show');
  setTimeout(() => bannerEl.classList.remove('show'), dur || 1500);
}

function resetRound() {
  roundResetting = true;
  createWalls();
  setTimeout(() => { round++; createPins(); createBall(); roundResetting = false; }, 500);
}

// ── Draw ──
const pinDrawSize = PIN_R * 2;
const halfPin = pinDrawSize / 2;

function drawTable() {
  ctx.fillStyle = '#1e6b40';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 8;
  ctx.strokeRect(4, 4, W - 8, H - 8);
  ctx.strokeStyle = '#5a9a3a';
  ctx.lineWidth = 3;
  ctx.strokeRect(12, 12, W - 24, H - 24);
  for (let i = 0; i < pockets.length; i++) {
    const pk = pockets[i];
    ctx.beginPath();
    ctx.arc(pk.x, pk.y, POCKET_R, 0, Math.PI * 2);
    ctx.fillStyle = '#0a2a15';
    ctx.fill();
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 3;
    ctx.stroke();
  }
}

function drawSlingshot() {
  if (!dragging || !dragStart || !dragCur) return;
  ctx.save();
  ctx.setLineDash([8, 6]);
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(ball.position.x, ball.position.y);
  ctx.lineTo(dragCur.x, dragCur.y);
  ctx.stroke();
  const dx = dragStart.x - dragCur.x;
  const dy = dragStart.y - dragCur.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 10) {
    const len = Math.min(dist * 0.8, 200);
    const nx = dx / dist, ny = dy / dist;
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(255,80,80,0.7)';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(ball.position.x, ball.position.y);
    const ax = ball.position.x + nx * len;
    const ay = ball.position.y + ny * len;
    ctx.lineTo(ax, ay);
    ctx.stroke();
    const angle = Math.atan2(dy, dx);
    ctx.fillStyle = 'rgba(255,80,80,0.7)';
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - 12 * Math.cos(angle - 0.4), ay - 12 * Math.sin(angle - 0.4));
    ctx.lineTo(ax - 12 * Math.cos(angle + 0.4), ay - 12 * Math.sin(angle + 0.4));
    ctx.fill();
  }
  ctx.restore();
}

// Pin drawing: NO save/translate/rotate/restore — marbles are round so rotation is invisible
function drawPin(pin) {
  if (pin.pocketed) return;
  const img = pinImages[pin.imgIdx];
  if (img && img.complete) {
    ctx.drawImage(img, pin.position.x - halfPin, pin.position.y - halfPin, pinDrawSize, pinDrawSize);
  } else {
    ctx.beginPath();
    ctx.arc(pin.position.x, pin.position.y, PIN_R, 0, Math.PI * 2);
    ctx.fillStyle = '#FFB380';
    ctx.fill();
  }
}

// Pre-render ball to offscreen canvas (avoid gradient/ellipse every frame)
const ballCanvas = document.createElement('canvas');
const ballSize = BALL_R * 2 + 8;
ballCanvas.width = ballCanvas.height = ballSize;
const bctx = ballCanvas.getContext('2d');
const bcx = ballSize / 2, bcy = ballSize / 2;
// Shadow
bctx.globalAlpha = 0.25;
bctx.beginPath();
bctx.ellipse(bcx + 3, bcy + 3, BALL_R, BALL_R * 0.9, 0, 0, Math.PI * 2);
bctx.fillStyle = '#000';
bctx.fill();
bctx.globalAlpha = 1;
// Ball body
bctx.beginPath();
bctx.arc(bcx, bcy, BALL_R, 0, Math.PI * 2);
bctx.fillStyle = '#EE3333';
bctx.fill();
bctx.strokeStyle = '#991111';
bctx.lineWidth = 2;
bctx.stroke();
// Shine
bctx.globalAlpha = 0.45;
bctx.beginPath();
bctx.ellipse(bcx - BALL_R * 0.3, bcy - BALL_R * 0.25, BALL_R * 0.3, BALL_R * 0.15, -0.5, 0, Math.PI * 2);
bctx.fillStyle = '#fff';
bctx.fill();

const halfBall = ballSize / 2;

function drawBall() {
  if (!ball) return;
  ctx.drawImage(ballCanvas, ball.position.x - halfBall, ball.position.y - halfBall);
  if (!ballLaunched && !dragging) {
    ctx.save();
    ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.004) * 0.2;
    ctx.fillStyle = '#fff';
    ctx.font = '15px "Zen Maru Gothic"';
    ctx.textAlign = 'center';
    ctx.fillText('ひっぱってはなす！', W / 2, H * 0.88);
    ctx.restore();
  }
}

// ── Confetti (reduced save/restore: batch by color) ──
const confettiList = [];
function spawnConfetti(cx, cy, n) {
  const count = Math.min(n, 60); // cap confetti on mobile
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 5;
    const c = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    confettiList.push({
      x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 3,
      cr: c.r, cg: c.g, cb: c.b,
      size: 5 + Math.random() * 7, life: 1,
    });
  }
}
function updateConfetti() {
  let len = confettiList.length;
  for (let i = len - 1; i >= 0; i--) {
    const c = confettiList[i];
    c.x += c.vx; c.y += c.vy; c.vy += 0.08;
    c.life -= 0.012; // faster decay = shorter confetti = less rendering
    if (c.life <= 0) {
      confettiList[i] = confettiList[--len];
      confettiList.length = len;
      continue;
    }
    // Simple rect without save/restore/rotate
    ctx.globalAlpha = c.life;
    ctx.fillStyle = `rgb(${c.cr},${c.cg},${c.cb})`;
    ctx.fillRect(c.x - c.size / 2, c.y - c.size / 4, c.size, c.size / 2);
  }
  if (len > 0) ctx.globalAlpha = 1;
}

// ── Settle ──
function checkSettle() {
  if (!ballLaunched || roundResetting) return;
  launchElapsed++;
  if (launchElapsed > 100) {
    for (let i = 0; i < pins.length; i++) {
      const b = pins[i];
      if (b.pocketed) continue;
      const spd = Math.sqrt(b.velocity.x * b.velocity.x + b.velocity.y * b.velocity.y);
      if (spd < 2 && spd > 0.01) Body.setVelocity(b, { x: b.velocity.x * 0.8, y: b.velocity.y * 0.8 });
    }
    if (ball) {
      const spd = Math.sqrt(ball.velocity.x * ball.velocity.x + ball.velocity.y * ball.velocity.y);
      if (spd < 2 && spd > 0.01) Body.setVelocity(ball, { x: ball.velocity.x * 0.8, y: ball.velocity.y * 0.8 });
    }
  }
  let maxSpd = 0;
  if (ball) {
    const s = ball.velocity.x * ball.velocity.x + ball.velocity.y * ball.velocity.y;
    if (s > maxSpd) maxSpd = s;
  }
  for (let i = 0; i < pins.length; i++) {
    if (pins[i].pocketed) continue;
    const b = pins[i];
    const s = b.velocity.x * b.velocity.x + b.velocity.y * b.velocity.y;
    if (s > maxSpd) maxSpd = s;
  }
  // Compare squared speed (avoid sqrt)
  if (maxSpd < 0.16) { // 0.4^2
    settleTimer++;
    if (settleTimer > 25) {
      if (knockedCount >= totalPins * 0.9) {
        showBanner('🎉 パーフェクト！', 2000);
        playStrike();
        spawnConfetti(W / 2, H / 2, 120);
      } else if (pocketCount >= 3) {
        showBanner('🏆 ナイス！', 1500);
      } else if (knockedCount >= totalPins * 0.5) {
        showBanner('すごい！', 1200);
      }
      setTimeout(resetRound, 1000);
      ballLaunched = false;
    }
  } else { settleTimer = 0; }
}

// ── Main (adaptive timestep) ──
let lastTime = 0;
function loop(time) {
  // Adaptive physics: use actual delta, capped at 33ms (30fps minimum)
  const dt = Math.min((time - lastTime) || 16.67, 33.33);
  lastTime = time;

  Engine.update(engine, dt);
  if (soundThrottle > 0) soundThrottle--;
  checkPockets();
  checkSettle();

  ctx.clearRect(0, 0, W, H);
  drawTable();
  for (let i = 0; i < pins.length; i++) drawPin(pins[i]);
  drawBall();
  drawSlingshot();
  updateConfetti();
  requestAnimationFrame(loop);
}

createWalls();
createPins();
createBall();
requestAnimationFrame(loop);
</script>
</body>
</html>
