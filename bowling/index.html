<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>びっくりボウリング | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100dvh; overflow: hidden;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #2a6848;
  touch-action: none; user-select: none; -webkit-user-select: none;
}
canvas { display: block; width: 100%; height: 100%; }
#back-btn {
  position: fixed; top: 12px; left: 12px; z-index: 100;
  background: rgba(255,255,255,0.85); border: none; border-radius: 50%;
  width: 44px; height: 44px; font-size: 22px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
}
#score {
  position: fixed; top: 12px; right: 16px; z-index: 100;
  font-size: 24px; font-weight: 900; color: #fff;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
}
#banner {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
  z-index: 200; font-size: 48px; font-weight: 900; color: #FFD700;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.5); pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s;
  opacity: 0;
}
#banner.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
</style>
</head>
<body>
<button id="back-btn" onclick="location.href='../'">🏠</button>
<div id="score">0</div>
<div id="banner"></div>
<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script>
'use strict';
const { Engine, World, Bodies, Body, Events, Query, Composite } = Matter;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bannerEl = document.getElementById('banner');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); resetRound(); });

// ── Audio ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playBonk(intensity) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = 200 + Math.random() * 500 + intensity * 300;
  gain.gain.setValueAtTime(Math.min(0.15, intensity * 0.1), audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.08);
}

function playStrike() {
  ensureAudio();
  [0, 100, 200, 300, 400].forEach((delay, i) => {
    setTimeout(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = i % 2 === 0 ? 'sine' : 'triangle';
      osc.frequency.value = 400 + i * 150;
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }, delay);
  });
}

// ── Physics ──
const engine = Engine.create({ gravity: { x: 0, y: 0 } }); // top-down: no gravity
const world = engine.world;

// ── Pin faces ──
const PIN_FACES = ['🐧', '🐥', '🐻', '🐱', '🐰', '🐸', '🦊', '🐼'];
let currentFaceSet = 0;
const PIN_COLORS = [
  '#FF8FA0', '#FFB380', '#FFE080', '#A0E8A0',
  '#80C8FF', '#C0A0FF', '#FFB0D0', '#A0E0E0'
];

// ── Game state ──
let pins = [];
let ball = null;
let ballLaunched = false;
let score = 0;
let round = 0;
let knockedCount = 0;
let totalPins = 0;
let settleTimer = 0;
let roundResetting = false;
let powerMode = false;
let powerTimer = 0;

// ── Walls ──
let walls = [];
function createWalls() {
  walls.forEach(w => World.remove(world, w));
  const t = 50;
  walls = [
    Bodies.rectangle(W / 2, -t / 2, W + t * 2, t, { isStatic: true }),
    Bodies.rectangle(W / 2, H + t / 2, W + t * 2, t, { isStatic: true }),
    Bodies.rectangle(-t / 2, H / 2, t, H + t * 2, { isStatic: true }),
    Bodies.rectangle(W + t / 2, H / 2, t, H + t * 2, { isStatic: true }),
  ];
  walls.forEach(w => { w.restitution = 0.8; w.isWall = true; });
  World.add(world, walls);
}

// ── Pin layout ──
const PIN_R = 28;
const MAX_PINS = 35;
function createPins() {
  pins.forEach(p => World.remove(world, p));
  pins = [];

  const spacing = PIN_R * 2.15;
  const cols = Math.min(6, Math.floor((W - 40) / spacing));
  const maxRows = Math.floor(MAX_PINS / cols);
  const rows = Math.min(maxRows, Math.floor((H * 0.45) / spacing));
  const startX = (W - (cols - 1) * spacing) / 2;
  const startY = 60;

  totalPins = cols * rows;
  knockedCount = 0;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = startX + c * spacing + (Math.random() - 0.5) * 2;
      const y = startY + r * spacing + (Math.random() - 0.5) * 2;
      const pin = Bodies.circle(x, y, PIN_R, {
        restitution: 0.35,
        friction: 0.1,
        frictionAir: 0.08,
        density: 0.0004,
      });
      pin.isPin = true;
      pin.knocked = false;
      pin.initX = x;
      pin.initY = y;
      pin.colorIdx = Math.floor(Math.random() * PIN_COLORS.length);
      pin.faceIdx = Math.floor(Math.random() * PIN_FACES.length);
      pin.flashTimer = 0;
      pin.spinAngle = 0;
      pins.push(pin);
    }
  }
  World.add(world, pins);
}

// ── Ball ──
const BALL_R = 32;
function createBall() {
  if (ball) World.remove(world, ball);
  const b = Bodies.circle(W / 2, H - 80, BALL_R, {
    restitution: 0.3,
    friction: 0.02,
    frictionAir: 0.015,
    density: 0.03,
  });
  b.isBall = true;
  ball = b;
  ballLaunched = false;
  powerMode = false;
  powerTimer = 0;
  World.add(world, ball);
}

// ── Flick handling ──
let touchHistory = [];
let dragging = false;
let dragStartY = 0;

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  ensureAudio();

  // Power mode tap while ball is in motion
  if (ballLaunched && !powerMode) {
    powerMode = true;
    powerTimer = 60; // frames
    Body.scale(ball, 2.5, 2.5);
    // flash effect
    ball._flash = 10;
    return;
  }

  if (ballLaunched) return;

  dragging = true;
  dragStartY = e.clientY;
  touchHistory = [{ x: e.clientX, y: e.clientY, t: Date.now() }];
  Body.setPosition(ball, { x: e.clientX, y: Math.max(H * 0.6, e.clientY) });
});

canvas.addEventListener('pointermove', e => {
  if (!dragging || ballLaunched) return;
  touchHistory.push({ x: e.clientX, y: e.clientY, t: Date.now() });
  if (touchHistory.length > 8) touchHistory.shift();
  Body.setPosition(ball, { x: e.clientX, y: Math.max(H * 0.5, e.clientY) });
});

canvas.addEventListener('pointerup', e => {
  if (!dragging || ballLaunched) return;
  dragging = false;

  if (touchHistory.length < 2) return;

  const last = touchHistory[touchHistory.length - 1];
  const first = touchHistory[0];
  const dt = (last.t - first.t) || 1;
  let vx = (last.x - first.x) / dt * 8;
  let vy = (last.y - first.y) / dt * 8;

  // Ensure minimum upward speed
  if (vy > -2) vy = -6;
  const speed = Math.sqrt(vx * vx + vy * vy);
  const maxSpeed = 18;
  if (speed > maxSpeed) { vx = vx / speed * maxSpeed; vy = vy / speed * maxSpeed; }
  const minSpeed = 5;
  if (speed < minSpeed) { vx = vx / speed * minSpeed; vy = vy / speed * minSpeed; }

  Body.setVelocity(ball, { x: vx, y: vy });
  ballLaunched = true;
  settleTimer = 0;
  launchElapsed = 0;
  touchHistory = [];
});

// ── Collision sounds ──
let soundThrottle = 0;
Events.on(engine, 'collisionStart', event => {
  event.pairs.forEach(pair => {
    if (soundThrottle > 0) return;
    const speed = Math.sqrt(
      Math.pow(pair.bodyA.velocity.x - pair.bodyB.velocity.x, 2) +
      Math.pow(pair.bodyA.velocity.y - pair.bodyB.velocity.y, 2)
    );
    if (speed > 1) {
      playBonk(Math.min(speed / 10, 1));
      soundThrottle = 3;
    }

    // Mark pins as knocked
    [pair.bodyA, pair.bodyB].forEach(b => {
      if (b.isPin && !b.knocked) {
        const dx = b.position.x - b.initX;
        const dy = b.position.y - b.initY;
        if (dx * dx + dy * dy > PIN_R * PIN_R) {
          b.knocked = true;
          b.flashTimer = 15;
          knockedCount++;
          score++;
          scoreEl.textContent = score;
        }
      }
    });
  });
});

// ── Banner ──
function showBanner(text, duration) {
  bannerEl.textContent = text;
  bannerEl.classList.add('show');
  setTimeout(() => bannerEl.classList.remove('show'), duration || 1500);
}

// ── Reset round ──
function resetRound() {
  roundResetting = true;
  createWalls();

  // Animate pins away, then create new
  setTimeout(() => {
    round++;
    if (round % 3 === 0) currentFaceSet = (currentFaceSet + 1) % 3;
    createPins();
    createBall();
    roundResetting = false;
  }, 400);
}

// ── Draw ──
function drawLane() {
  // Lane background
  ctx.fillStyle = '#2d7050';
  ctx.fillRect(0, 0, W, H);

  // Lane texture (subtle stripes)
  ctx.save();
  ctx.globalAlpha = 0.06;
  for (let x = 0; x < W; x += 30) {
    ctx.fillStyle = x % 60 === 0 ? '#fff' : '#000';
    ctx.fillRect(x, 0, 15, H);
  }
  ctx.restore();

  // Ball area indicator
  if (!ballLaunched) {
    ctx.save();
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, H * 0.6, W, H * 0.4);
    ctx.restore();

    // Arrow hint
    ctx.save();
    ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.003) * 0.15;
    ctx.fillStyle = '#fff';
    ctx.font = '36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⬆', W / 2, H * 0.65);
    ctx.font = '16px "Zen Maru Gothic"';
    ctx.fillText('ボールをうえにフリック！', W / 2, H * 0.72);
    ctx.restore();
  }
}

function drawPin(pin) {
  const { x, y } = pin.position;
  const r = PIN_R;

  // Flash effect
  if (pin.flashTimer > 0) {
    ctx.save();
    ctx.globalAlpha = pin.flashTimer / 15 * 0.5;
    ctx.beginPath();
    ctx.arc(x, y, r * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD700';
    ctx.fill();
    ctx.restore();
    pin.flashTimer--;
  }

  // Pin body
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(pin.angle);

  // Circle body
  const color = PIN_COLORS[pin.colorIdx];
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = pin.knocked ? shadeColor(color, -20) : color;
  ctx.fill();
  ctx.strokeStyle = shadeColor(color, -40);
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Face
  ctx.font = `${r * 1.2}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(PIN_FACES[pin.faceIdx], 0, 1);

  ctx.restore();
}

function drawBall() {
  if (!ball) return;
  const { x, y } = ball.position;
  const r = powerMode ? BALL_R * 2.5 : BALL_R;

  // Glow
  if (ball._flash > 0) {
    ctx.save();
    ctx.globalAlpha = ball._flash / 10 * 0.4;
    ctx.beginPath();
    ctx.arc(x, y, r * 2, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD700';
    ctx.fill();
    ctx.restore();
    ball._flash--;
  }

  // Ball shadow
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.beginPath();
  ctx.ellipse(x + 3, y + 3, r, r * 0.9, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();

  // Ball
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
  if (powerMode) {
    grad.addColorStop(0, '#FFF8A0');
    grad.addColorStop(0.5, '#FFD700');
    grad.addColorStop(1, '#FF8C00');
  } else {
    grad.addColorStop(0, '#FF6B6B');
    grad.addColorStop(0.5, '#EE4444');
    grad.addColorStop(1, '#CC2222');
  }
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = powerMode ? '#FF8C00' : '#AA1111';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Shine
  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.ellipse(x - r * 0.3, y - r * 0.25, r * 0.3, r * 0.15, -0.5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.restore();
}

function shadeColor(hex, amount) {
  let r = parseInt(hex.slice(1, 3), 16) + amount;
  let g = parseInt(hex.slice(3, 5), 16) + amount;
  let b = parseInt(hex.slice(5, 7), 16) + amount;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return `rgb(${r},${g},${b})`;
}

// ── Confetti for perfect ──
const confettiList = [];
function spawnConfetti(cx, cy, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    confettiList.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      color: PIN_COLORS[Math.floor(Math.random() * PIN_COLORS.length)],
      size: 4 + Math.random() * 6,
      rot: Math.random() * Math.PI * 2,
      rotSpd: (Math.random() - 0.5) * 0.2,
      life: 1,
    });
  }
}

function updateConfetti() {
  for (let i = confettiList.length - 1; i >= 0; i--) {
    const c = confettiList[i];
    c.x += c.vx;
    c.y += c.vy;
    c.vy += 0.08;
    c.rot += c.rotSpd;
    c.life -= 0.008;
    if (c.life <= 0) { confettiList.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = c.life;
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.size / 2, -c.size / 4, c.size, c.size / 2);
    ctx.restore();
  }
}

// ── Main loop ──
let launchElapsed = 0;
function checkSettle() {
  if (!ballLaunched || roundResetting) return;
  launchElapsed++;

  // Force-brake slow bodies after 3 seconds
  if (launchElapsed > 180) {
    [ball, ...pins].forEach(b => {
      if (!b) return;
      const spd = Math.sqrt(b.velocity.x ** 2 + b.velocity.y ** 2);
      if (spd < 1.5 && spd > 0.01) {
        Body.setVelocity(b, { x: b.velocity.x * 0.85, y: b.velocity.y * 0.85 });
      }
    });
  }

  // Check if all bodies are nearly still
  let maxSpeed = 0;
  const allBodies = [ball, ...pins];
  allBodies.forEach(b => {
    if (!b) return;
    const spd = Math.sqrt(b.velocity.x ** 2 + b.velocity.y ** 2);
    if (spd > maxSpeed) maxSpeed = spd;
  });

  if (maxSpeed < 0.5) {
    settleTimer++;
    if (settleTimer > 30) { // ~0.5 second of calm
      // Check for perfect
      if (knockedCount >= totalPins * 0.95) {
        showBanner('🎉 パーフェクト！', 2000);
        playStrike();
        spawnConfetti(W / 2, H / 2, 100);
      } else if (knockedCount >= totalPins * 0.5) {
        showBanner('すごい！', 1500);
      }
      setTimeout(resetRound, 1200);
      ballLaunched = false; // prevent re-trigger
    }
  } else {
    settleTimer = 0;
  }
}

function loop() {
  Engine.update(engine, 1000 / 60);

  if (soundThrottle > 0) soundThrottle--;

  // Power mode timer
  if (powerMode) {
    powerTimer--;
    if (powerTimer <= 0) {
      powerMode = false;
      if (ball) Body.scale(ball, 1 / 2.5, 1 / 2.5);
    }
  }

  // Mark knocked pins (by displacement)
  pins.forEach(p => {
    if (!p.knocked) {
      const dx = p.position.x - p.initX;
      const dy = p.position.y - p.initY;
      if (dx * dx + dy * dy > PIN_R * PIN_R * 2) {
        p.knocked = true;
        p.flashTimer = 15;
        knockedCount++;
        score++;
        scoreEl.textContent = score;
      }
    }
  });

  checkSettle();

  // Draw
  ctx.clearRect(0, 0, W, H);
  drawLane();
  pins.forEach(drawPin);
  drawBall();
  updateConfetti();

  requestAnimationFrame(loop);
}

// ── Init ──
createWalls();
createPins();
createBall();
requestAnimationFrame(loop);
</script>
</body>
</html>
