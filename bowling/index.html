<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>びっくりボウリング | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap"></noscript>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100vh; overflow: hidden;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #1a5c3a;
  touch-action: none; user-select: none; -webkit-user-select: none;
}
canvas { display: block; width: 100%; height: 100%; will-change: transform; }
#back-btn {
  position: fixed; top: 12px; left: 12px; z-index: 100;
  background: rgba(255,255,255,0.85); border: none; border-radius: 50%;
  width: 44px; height: 44px; font-size: 22px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
  will-change: transform;
}
#score {
  position: fixed; top: 12px; right: 16px; z-index: 100;
  font-size: 28px; font-weight: 900; color: #FFD700;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  will-change: transform;
}
#combo {
  position: fixed; top: 50px; right: 16px; z-index: 100;
  font-size: 20px; font-weight: 900; color: #FF6B6B;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  opacity: 0; transition: opacity 0.3s;
  will-change: transform;
}
#combo.show { opacity: 1; }
#start-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, #1a5c3a 0%, #2d8f5e 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer;
}
#start-screen .title { font-size: 42px; font-weight: 900; color: #FFD700; text-shadow: 3px 3px 6px rgba(0,0,0,0.4); }
#start-screen .tap { font-size: 22px; color: #fff; margin-top: 30px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.97)} }
</style>
</head>
<body>
<div id="start-screen"><div class="title">びっくりボウリング</div><div class="tap">タップしてスタート</div></div>
<button id="back-btn" onclick="location.href='../'">🏠</button>
<div id="score">0</div>
<div id="combo"></div>
<canvas id="c"></canvas>

<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── Audio (Web Audio API) ──
let audioCtx = null;
let audioReady = false;
let bonkBuf = null, popBuf = null, launchBuf = null, comboBuf = null;

function makeBuf(ctx, freq, dur, vol, decay) {
  const sr = ctx.sampleRate, n = sr * dur | 0;
  const ab = ctx.createBuffer(1, n, sr);
  const d = ab.getChannelData(0);
  for (let i = 0; i < n; i++) {
    const t = i / sr;
    d[i] = Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * (decay || 20)) * vol;
  }
  return ab;
}

function makeSweepBuf(ctx, freqStart, freqEnd, dur, vol) {
  const sr = ctx.sampleRate, n = sr * dur | 0;
  const ab = ctx.createBuffer(1, n, sr);
  const d = ab.getChannelData(0);
  for (let i = 0; i < n; i++) {
    const t = i / sr;
    const f = freqStart + (freqEnd - freqStart) * (t / dur);
    d[i] = Math.sin(2 * Math.PI * f * t) * Math.exp(-t * 8) * vol;
  }
  return ab;
}

function initAudio() {
  return new Promise(resolve => {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    audioCtx.resume().then(() => {
      const b = audioCtx.createBuffer(1, 1, 22050);
      const s = audioCtx.createBufferSource();
      s.buffer = b; s.connect(audioCtx.destination); s.start(0);
      bonkBuf = makeBuf(audioCtx, 400, 0.06, 0.4, 40);
      popBuf = makeBuf(audioCtx, 800, 0.05, 0.3, 50);
      launchBuf = makeBuf(audioCtx, 300, 0.1, 0.3, 20);
      comboBuf = makeSweepBuf(audioCtx, 400, 1200, 0.15, 0.4);
      audioReady = true;
      resolve();
    });
    setTimeout(() => {
      bonkBuf = bonkBuf || makeBuf(audioCtx, 400, 0.06, 0.4, 40);
      popBuf = popBuf || makeBuf(audioCtx, 800, 0.05, 0.3, 50);
      launchBuf = launchBuf || makeBuf(audioCtx, 300, 0.1, 0.3, 20);
      comboBuf = comboBuf || makeSweepBuf(audioCtx, 400, 1200, 0.15, 0.4);
      audioReady = true;
      resolve();
    }, 1000);
  });
}

document.getElementById('start-screen').addEventListener('pointerdown', async function handler(e) {
  e.preventDefault();
  this.removeEventListener('pointerdown', handler);
  await initAudio();
  this.style.display = 'none';
});

document.addEventListener('visibilitychange', () => {
  if (audioCtx && document.visibilityState === 'visible' && audioCtx.state !== 'running') audioCtx.resume();
});

function playBuf(buf, volume, rate) {
  if (!audioReady || !buf) return;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.playbackRate.value = rate || 1;
  if (volume !== undefined && volume < 1) {
    const gain = audioCtx.createGain();
    gain.gain.value = volume;
    src.connect(gain); gain.connect(audioCtx.destination);
  } else {
    src.connect(audioCtx.destination);
  }
  src.start(0);
}

// ── Constants ──
const PIN_R = 28;
const BALL_R = 26;
const RESTITUTION = 0.8;
const FRICTION_AIR = 0.997;
const WALL_RESTITUTION = 0.85;
const PIN_MASS = 0.8;
const BALL_MASS = 3;
const GRAVITY = 0.15;  // ピンが上からゆっくり落ちる
const MAX_BODIES = 80;  // パフォーマンス上限
const PIN_SPAWN_INTERVAL = 400; // ms間隔で新しいピンが湧く
const BALL_LIFETIME = 6000; // ボールは6秒で消える

// ── Pin images ──
const PIN_COUNT = 13;
const pinDrawSize = PIN_R * 2;
const halfPin = pinDrawSize / 2;
const pinCanvases = [];
for (let i = 0; i < PIN_COUNT; i++) {
  const img = new Image();
  img.src = 'pins/pin_' + i + '.png';
  const oc = document.createElement('canvas');
  oc.width = oc.height = pinDrawSize;
  pinCanvases.push(oc);
  img.onload = () => { oc.getContext('2d').drawImage(img, 0, 0, pinDrawSize, pinDrawSize); };
}

// ── Ball pre-render ──
const ballColors = ['#EE3333','#3388EE','#33BB55','#FF8800','#CC44CC','#FFDD00','#00CCCC','#FF5599'];
const ballCanvases = [];
for (let i = 0; i < ballColors.length; i++) {
  const oc = document.createElement('canvas');
  const sz = BALL_R * 2 + 8;
  oc.width = oc.height = sz;
  const bc = oc.getContext('2d');
  const cx = sz / 2, cy = sz / 2;
  bc.globalAlpha = 0.25;
  bc.beginPath(); bc.ellipse(cx + 2, cy + 2, BALL_R, BALL_R * 0.9, 0, 0, Math.PI * 2);
  bc.fillStyle = '#000'; bc.fill();
  bc.globalAlpha = 1;
  bc.beginPath(); bc.arc(cx, cy, BALL_R, 0, Math.PI * 2);
  bc.fillStyle = ballColors[i]; bc.fill();
  bc.strokeStyle = 'rgba(0,0,0,0.3)'; bc.lineWidth = 2; bc.stroke();
  bc.globalAlpha = 0.4;
  bc.beginPath(); bc.ellipse(cx - BALL_R * 0.3, cy - BALL_R * 0.25, BALL_R * 0.3, BALL_R * 0.15, -0.5, 0, Math.PI * 2);
  bc.fillStyle = '#fff'; bc.fill();
  ballCanvases.push(oc);
}
const halfBall = (BALL_R * 2 + 8) / 2;

// ── Bodies ──
// type: 'pin' | 'ball'
const bodies = [];

function addBody(x, y, r, mass, type) {
  const b = {
    x, y, vx: 0, vy: 0, r, mass, type,
    imgIdx: 0, colorIdx: 0,
    born: performance.now(),
    dead: false
  };
  bodies.push(b);
  return b;
}

function spawnPin() {
  if (bodies.length >= MAX_BODIES) return;
  const margin = PIN_R + 20;
  const x = margin + Math.random() * (W - margin * 2);
  const b = addBody(x, -PIN_R * 2, PIN_R, PIN_MASS, 'pin');
  b.vy = 0.5 + Math.random() * 1.0; // ゆっくり落下
  b.vx = (Math.random() - 0.5) * 0.5;
  b.imgIdx = Math.floor(Math.random() * PIN_COUNT);
}

function spawnBall(x, y) {
  if (bodies.length >= MAX_BODIES) return;
  const b = addBody(x, y, BALL_R, BALL_MASS, 'ball');
  // 上方向にランダムな角度で発射
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
  const speed = 12 + Math.random() * 6;
  b.vx = Math.cos(angle) * speed;
  b.vy = Math.sin(angle) * speed;
  b.colorIdx = Math.floor(Math.random() * ballColors.length);
  playBuf(launchBuf, 0.3, 0.8 + Math.random() * 0.4);
}

// ── Particles ──
const PARTICLE_COLORS = [
  '#FF6B6B','#FFE66D','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8',
  '#F7DC6F','#BB8FCE','#85C1E9','#F1948A'
];
const particles = [];
const MAX_PARTICLES = 200;

function spawnParticles(x, y, count, baseColor) {
  const n = Math.min(count, MAX_PARTICLES - particles.length);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 2 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 2,
      color: baseColor || PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)],
      size: 3 + Math.random() * 6,
      life: 1,
      decay: 0.015 + Math.random() * 0.01
    });
  }
}

// ── Score popups ──
const popups = [];
function spawnPopup(x, y, text, color) {
  popups.push({ x, y, text, color: color || '#FFD700', life: 1, vy: -2 });
}

// ── Collision ──
function resolveCollision(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const dist2 = dx * dx + dy * dy;
  const minDist = a.r + b.r;
  if (dist2 >= minDist * minDist || dist2 < 0.001) return 0;
  const dist = Math.sqrt(dist2);
  const nx = dx / dist, ny = dy / dist;
  const overlap = minDist - dist;
  const totalMass = a.mass + b.mass;
  a.x -= nx * overlap * (b.mass / totalMass);
  a.y -= ny * overlap * (b.mass / totalMass);
  b.x += nx * overlap * (a.mass / totalMass);
  b.y += ny * overlap * (a.mass / totalMass);
  const dvn = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
  if (dvn > 0) return 0;
  const invMassSum = 1 / a.mass + 1 / b.mass;
  const j = -(1 + RESTITUTION) * dvn / invMassSum;
  a.vx += (j / a.mass) * nx;
  a.vy += (j / a.mass) * ny;
  b.vx -= (j / b.mass) * nx;
  b.vy -= (j / b.mass) * ny;
  return Math.abs(dvn); // 衝突の強さを返す
}

// ── Wall bounce ──
function wallBounce(b) {
  if (b.x - b.r < 0) { b.x = b.r; b.vx = Math.abs(b.vx) * WALL_RESTITUTION; }
  if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx) * WALL_RESTITUTION; }
  if (b.y - b.r < 0) { b.y = b.r; b.vy = Math.abs(b.vy) * WALL_RESTITUTION; }
  // 下端: ピンは消す、ボールは跳ね返す
  if (b.y + b.r > H) {
    if (b.type === 'pin') {
      b.dead = true;
    } else {
      b.y = H - b.r;
      b.vy = -Math.abs(b.vy) * WALL_RESTITUTION;
    }
  }
}

// ── Game state ──
let score = 0;
let combo = 0;
let comboTimer = 0;
const COMBO_WINDOW = 60; // フレーム数（約1秒）
let lastPinSpawn = 0;
let shakeX = 0, shakeY = 0, shakeLife = 0;
let soundThrottle = 0;
let maxHitStrength = 0;

// ── Screen shake ──
function triggerShake(intensity) {
  shakeLife = Math.max(shakeLife, Math.min(intensity * 8, 6));
}

// ── Physics step ──
function physicsStep() {
  const n = bodies.length;
  for (let i = 0; i < n; i++) {
    const b = bodies[i];
    if (b.dead) continue;
    // ピンには重力
    if (b.type === 'pin') b.vy += GRAVITY;
    b.x += b.vx;
    b.y += b.vy;
    b.vx *= FRICTION_AIR;
    b.vy *= FRICTION_AIR;
    if (b.vx * b.vx + b.vy * b.vy < 0.0001) { b.vx = 0; b.vy = 0; }
    wallBounce(b);
  }
  // Collisions
  for (let i = 0; i < n; i++) {
    if (bodies[i].dead) continue;
    for (let j = i + 1; j < n; j++) {
      if (bodies[j].dead) continue;
      const a = bodies[i], b = bodies[j];
      // ピン同士の衝突は軽く処理、ボール-ピンは重要
      const preVx = a.vx - b.vx, preVy = a.vy - b.vy;
      const preSpd = Math.sqrt(preVx * preVx + preVy * preVy);
      const strength = resolveCollision(a, b);
      if (strength > 0) {
        // ボール→ピン衝突でスコア
        if ((a.type === 'ball' && b.type === 'pin') || (a.type === 'pin' && b.type === 'ball')) {
          const pin = a.type === 'pin' ? a : b;
          if (preSpd > 3) {
            // 強い衝突: ピンを破壊
            pin.dead = true;
            const pts = 10 + combo * 5;
            score += pts;
            combo++;
            comboTimer = COMBO_WINDOW;
            spawnParticles(pin.x, pin.y, 8 + combo * 2);
            spawnPopup(pin.x, pin.y - 20, '+' + pts);
            if (combo >= 3) {
              comboEl.textContent = combo + ' コンボ！';
              comboEl.classList.add('show');
              playBuf(comboBuf, Math.min(1, 0.3 + combo * 0.1), 1 + combo * 0.05);
            }
            if (strength > maxHitStrength) maxHitStrength = strength;
            triggerShake(strength / 10);
          }
        }
        // 衝突音
        if (preSpd > 3 && strength > maxHitStrength * 0.3) {
          if (soundThrottle <= 0) {
            const intensity = Math.min(1, strength / 15);
            const vol = 0.15 + intensity * 0.6;
            const rate = 0.7 + intensity * 0.5 + (Math.random() - 0.5) * 0.2;
            playBuf(bonkBuf, vol, rate);
            soundThrottle = 3;
          }
        }
      }
    }
  }
}

// ── Input ──
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  spawnBall(e.clientX, e.clientY);
});
canvas.addEventListener('pointermove', e => {
  // ドラッグ中もボールを連射（間引き付き）
  if (e.pressure > 0 || e.buttons > 0) {
    if (Math.random() < 0.3) spawnBall(e.clientX, e.clientY);
  }
});

// ── Draw ──
function drawBg() {
  ctx.fillStyle = '#1e6b40';
  ctx.fillRect(0, 0, W, H);
  // 枠線
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 6;
  ctx.strokeRect(3, 3, W - 6, H - 6);
  ctx.strokeStyle = '#5a9a3a';
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 10, W - 20, H - 20);
}

function drawBodies() {
  for (let i = 0; i < bodies.length; i++) {
    const b = bodies[i];
    if (b.dead) continue;
    if (b.type === 'ball') {
      ctx.drawImage(ballCanvases[b.colorIdx], b.x - halfBall, b.y - halfBall);
    } else {
      ctx.drawImage(pinCanvases[b.imgIdx], b.x - halfPin, b.y - halfPin);
    }
  }
}

function drawParticles() {
  let len = particles.length;
  for (let i = len - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) { particles[i] = particles[--len]; particles.length = len; continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  if (len > 0) ctx.globalAlpha = 1;
}

function drawPopups() {
  let len = popups.length;
  for (let i = len - 1; i >= 0; i--) {
    const p = popups[i];
    p.y += p.vy;
    p.life -= 0.02;
    if (p.life <= 0) { popups[i] = popups[--len]; popups.length = len; continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 24px "Zen Maru Gothic"';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  if (len > 0) ctx.globalAlpha = 1;
}

// ── Main loop ──
const PHYSICS_DT = 1000 / 60;
let accumulator = 0;
let prevFrameTime = performance.now();
let fpsFrames = 0, fpsLast = performance.now(), fpsDisplay = '--';

function loop(now) {
  let elapsed = now - prevFrameTime;
  prevFrameTime = now;
  if (elapsed > 100) elapsed = 100;

  // FPS
  fpsFrames++;
  if (now - fpsLast >= 500) {
    fpsDisplay = (fpsFrames / ((now - fpsLast) / 1000)).toFixed(0);
    fpsFrames = 0; fpsLast = now;
  }

  // ピン自動生成
  if (now - lastPinSpawn > PIN_SPAWN_INTERVAL) {
    // 画面上のピン数が少なければ湧かせる
    let pinCount = 0;
    for (let i = 0; i < bodies.length; i++) {
      if (!bodies[i].dead && bodies[i].type === 'pin') pinCount++;
    }
    if (pinCount < 25) {
      spawnPin();
      // たまに2個同時
      if (Math.random() < 0.3) spawnPin();
    }
    lastPinSpawn = now;
  }

  // Physics
  maxHitStrength = 0;
  accumulator += elapsed;
  while (accumulator >= PHYSICS_DT) {
    physicsStep();
    accumulator -= PHYSICS_DT;
  }
  if (soundThrottle > 0) soundThrottle--;

  // コンボタイマー
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) {
      combo = 0;
      comboEl.classList.remove('show');
    }
  }

  // Dead body cleanup + ball lifetime
  for (let i = bodies.length - 1; i >= 0; i--) {
    const b = bodies[i];
    if (b.dead || (b.type === 'ball' && now - b.born > BALL_LIFETIME)) {
      if (b.type === 'ball' && !b.dead) {
        // ボール消滅時の小パーティクル
        spawnParticles(b.x, b.y, 4, ballColors[b.colorIdx]);
      }
      bodies[i] = bodies[bodies.length - 1];
      bodies.pop();
    }
  }

  // Screen shake
  if (shakeLife > 0) {
    shakeX = (Math.random() - 0.5) * shakeLife * 2;
    shakeY = (Math.random() - 0.5) * shakeLife * 2;
    shakeLife -= 0.5;
  } else {
    shakeX = 0; shakeY = 0;
  }

  // Draw
  ctx.save();
  ctx.translate(shakeX, shakeY);
  drawBg();
  drawBodies();
  drawParticles();
  drawPopups();
  ctx.restore();

  // Score
  scoreEl.textContent = score;

  // FPS
  ctx.fillStyle = '#0f0';
  ctx.font = '12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(fpsDisplay + 'fps  bodies:' + bodies.length, 60, 22);

  // ヒント（最初だけ）
  if (score === 0 && bodies.length < 5) {
    ctx.globalAlpha = 0.4 + Math.sin(now * 0.004) * 0.2;
    ctx.fillStyle = '#fff';
    ctx.font = '18px "Zen Maru Gothic"';
    ctx.textAlign = 'center';
    ctx.fillText('タップしてボールを出そう！', W / 2, H * 0.85);
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(loop);
}

// 初期ピンを散布
for (let i = 0; i < 12; i++) {
  const margin = PIN_R + 20;
  const x = margin + Math.random() * (W - margin * 2);
  const y = H * 0.1 + Math.random() * (H * 0.5);
  const b = addBody(x, y, PIN_R, PIN_MASS, 'pin');
  b.vy = 0.3 + Math.random() * 0.5;
  b.imgIdx = Math.floor(Math.random() * PIN_COUNT);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
