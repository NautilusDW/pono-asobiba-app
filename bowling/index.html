<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>びっくりボウリング | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap"></noscript>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100dvh; overflow: hidden;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #1a5c3a;
  touch-action: none; user-select: none; -webkit-user-select: none;
}
canvas { display: block; width: 100%; height: 100%; }
#back-btn {
  position: fixed; top: 12px; left: 12px; z-index: 100;
  background: rgba(255,255,255,0.85); border: none; border-radius: 50%;
  width: 44px; height: 44px; font-size: 22px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
}
#score {
  position: fixed; top: 12px; right: 16px; z-index: 100;
  font-size: 28px; font-weight: 900; color: #FFD700;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}
#banner {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
  z-index: 200; font-size: 48px; font-weight: 900; color: #FFD700;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.5); pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s;
  opacity: 0;
}
#banner.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
</style>
</head>
<body>
<button id="back-btn" onclick="location.href='../'">🏠</button>
<div id="score">0</div>
<div id="banner"></div>
<canvas id="c"></canvas>

<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bannerEl = document.getElementById('banner');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); resetRound(); });

// ── Audio ──
function makeWav(freq, dur, vol, decay) {
  const sr = 22050, n = sr * dur | 0;
  const buf = new ArrayBuffer(44 + n * 2);
  const v = new DataView(buf);
  function s(o, str) { for (let i = 0; i < str.length; i++) v.setUint8(o + i, str.charCodeAt(i)); }
  s(0,'RIFF'); v.setUint32(4, 36 + n * 2, true); s(8,'WAVE');
  s(12,'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
  v.setUint16(22, 1, true); v.setUint32(24, sr, true);
  v.setUint32(28, sr * 2, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  s(36,'data'); v.setUint32(40, n * 2, true);
  for (let i = 0; i < n; i++) {
    const t = i / sr;
    const val = Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * (decay || 20)) * vol;
    v.setInt16(44 + i * 2, Math.max(-32768, Math.min(32767, val * 32767 | 0)), true);
  }
  return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
}
const POOL_SIZE = 6;
const audioPool = [];
let poolIdx = 0;
for (let i = 0; i < POOL_SIZE; i++) audioPool.push(new Audio());
const bonkSounds = [];
for (let i = 0; i < 3; i++) bonkSounds.push(makeWav(300 + i * 150, 0.1, 0.5, 30));
const pocketSounds = [makeWav(500, 0.15, 0.5, 18), makeWav(700, 0.15, 0.5, 18)];
const strikeSound = makeWav(500, 0.25, 0.5, 10);
const launchSound = makeWav(400, 0.15, 0.5, 15);
const silentWav = makeWav(440, 0.01, 0, 50);
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  audioPool[0].src = silentWav;
  audioPool[0].volume = 0;
  audioPool[0].play().catch(() => {});
}
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('pointerdown', unlockAudio, { once: true });
function playSound(url) {
  const a = audioPool[poolIdx];
  poolIdx = (poolIdx + 1) % POOL_SIZE;
  a.src = url;
  a.volume = 1.0;
  a.play().catch(() => {});
}
function playBonk() { playSound(bonkSounds[Math.floor(Math.random() * bonkSounds.length)]); }
function playPocket() { playSound(pocketSounds[Math.floor(Math.random() * pocketSounds.length)]); }
function playStrike() { playSound(strikeSound); }
function playLaunch() { playSound(launchSound); }

// ── Constants ──
const POCKET_R = 40;
const PIN_R = 34;
const BALL_R = 32;
const MAX_PINS = 15;
const RESTITUTION = 0.6;
const FRICTION_AIR = 0.985; // multiply velocity each step (1 = no friction)
const WALL_RESTITUTION = 0.7;

// ── Load pin images ──
const PIN_COUNT = 13;
const pinImages = [];
for (let i = 0; i < PIN_COUNT; i++) {
  const img = new Image();
  img.src = `pins/pin_${i}.png`;
  pinImages.push(img);
}

const CONFETTI_COLORS = [
  [255,143,160],[255,179,128],[255,224,128],[160,232,160],[128,200,255],[192,160,255],
];

// ── Simple circle physics ──
// Each body: { x, y, vx, vy, r, mass, imgIdx, knocked, initX, initY, pocketed, isStatic }
const bodies = [];
let ballIdx = -1;

function addCircle(x, y, r, mass, isStatic) {
  const idx = bodies.length;
  bodies.push({ x, y, vx: 0, vy: 0, r, mass, isStatic: !!isStatic, imgIdx: 0, knocked: false, initX: x, initY: y, pocketed: false });
  return idx;
}

// Wall boundaries (just numbers, not physics objects)
let wallLeft, wallRight, wallTop, wallBottom;
let pockets = [];

function setupWalls() {
  const g = POCKET_R * 1.5; // gap for pockets
  wallLeft = 4;
  wallRight = W - 4;
  wallTop = 4;
  wallBottom = H - 4;
  pockets = [
    { x: 10, y: 10 },
    { x: W - 10, y: 10 },
    { x: 10, y: H - 10 },
    { x: W - 10, y: H - 10 },
  ];
}

let ballLaunched = false, score = 0, round = 0;
let knockedCount = 0, totalPins = 0, pocketCount = 0;
let settleTimer = 0, launchElapsed = 0, roundResetting = false;
let dragging = false, dragStart = null, dragCur = null;
let soundThrottle = 0;

function createPins() {
  bodies.length = 0;
  ballIdx = -1;
  const areaW = W - 80, areaH = H * 0.4;
  let bestCols = 3, bestRows = 5;
  for (let c = 3; c <= 6; c++) {
    const r = Math.ceil(MAX_PINS / c);
    if (Math.min(areaW / c, areaH / r) >= PIN_R * 2.1) { bestCols = c; bestRows = r; break; }
  }
  const spacing = Math.min(areaW / bestCols, areaH / bestRows, PIN_R * 2.6);
  const startX = (W - (bestCols - 1) * spacing) / 2;
  const startY = H * 0.06 + 30;
  totalPins = MAX_PINS;
  knockedCount = 0;
  pocketCount = 0;
  let placed = 0;
  for (let r = 0; r < bestRows && placed < MAX_PINS; r++) {
    for (let c = 0; c < bestCols && placed < MAX_PINS; c++) {
      const x = startX + c * spacing + (Math.random() - 0.5) * 3;
      const y = startY + r * spacing + (Math.random() - 0.5) * 3;
      const idx = addCircle(x, y, PIN_R, 0.3);
      bodies[idx].imgIdx = Math.floor(Math.random() * PIN_COUNT);
      placed++;
    }
  }
}

function createBall() {
  ballIdx = addCircle(W / 2, H * 0.78, BALL_R, 5);
  ballLaunched = false;
}

// ── Circle-circle collision ──
function resolveCollision(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const dist2 = dx * dx + dy * dy;
  const minDist = a.r + b.r;
  if (dist2 >= minDist * minDist || dist2 < 0.001) return false;
  const dist = Math.sqrt(dist2);
  const nx = dx / dist, ny = dy / dist;
  // Separate overlapping
  const overlap = minDist - dist;
  const totalMass = a.mass + b.mass;
  const aShare = b.mass / totalMass;
  const bShare = a.mass / totalMass;
  a.x -= nx * overlap * aShare;
  a.y -= ny * overlap * aShare;
  b.x += nx * overlap * bShare;
  b.y += ny * overlap * bShare;
  // Relative velocity along normal
  const dvx = a.vx - b.vx;
  const dvy = a.vy - b.vy;
  const dvn = dvx * nx + dvy * ny;
  if (dvn > 0) return true; // already separating
  const j = -(1 + RESTITUTION) * dvn / totalMass;
  a.vx += j * b.mass * nx;
  a.vy += j * b.mass * ny;
  b.vx -= j * a.mass * nx;
  b.vy -= j * a.mass * ny;
  return true;
}

// ── Wall bounce ──
function wallBounce(b) {
  // Check if near a pocket corner — skip wall bounce there
  for (let i = 0; i < pockets.length; i++) {
    const pk = pockets[i];
    const dx = b.x - pk.x, dy = b.y - pk.y;
    if (dx * dx + dy * dy < (POCKET_R + b.r) * (POCKET_R + b.r)) return;
  }
  if (b.x - b.r < wallLeft) { b.x = wallLeft + b.r; b.vx = Math.abs(b.vx) * WALL_RESTITUTION; }
  if (b.x + b.r > wallRight) { b.x = wallRight - b.r; b.vx = -Math.abs(b.vx) * WALL_RESTITUTION; }
  if (b.y - b.r < wallTop) { b.y = wallTop + b.r; b.vy = Math.abs(b.vy) * WALL_RESTITUTION; }
  if (b.y + b.r > wallBottom) { b.y = wallBottom - b.r; b.vy = -Math.abs(b.vy) * WALL_RESTITUTION; }
}

// ── Physics step ──
function physicsStep() {
  const n = bodies.length;
  // Move
  for (let i = 0; i < n; i++) {
    const b = bodies[i];
    if (b.pocketed) continue;
    b.x += b.vx;
    b.y += b.vy;
    b.vx *= FRICTION_AIR;
    b.vy *= FRICTION_AIR;
    // Stop tiny velocities
    if (b.vx * b.vx + b.vy * b.vy < 0.0001) { b.vx = 0; b.vy = 0; }
    wallBounce(b);
  }
  // Collide (all pairs)
  soundThrottle--;
  for (let i = 0; i < n; i++) {
    if (bodies[i].pocketed) continue;
    for (let j = i + 1; j < n; j++) {
      if (bodies[j].pocketed) continue;
      if (resolveCollision(bodies[i], bodies[j])) {
        // Collision happened
        if (soundThrottle <= 0) {
          const dvx = bodies[i].vx - bodies[j].vx;
          const dvy = bodies[i].vy - bodies[j].vy;
          if (dvx * dvx + dvy * dvy > 2) {
            playBonk();
            soundThrottle = 6;
          }
        }
        // Check knocked
        for (const idx of [i, j]) {
          const b = bodies[idx];
          if (idx !== ballIdx && !b.knocked) {
            const dx = b.x - b.initX, dy = b.y - b.initY;
            if (dx * dx + dy * dy > PIN_R * PIN_R) {
              b.knocked = true;
              knockedCount++; score++; scoreEl.textContent = score;
            }
          }
        }
      }
    }
  }
}

// ── Pocket check ──
function checkPockets() {
  for (let i = 0; i < bodies.length; i++) {
    if (i === ballIdx || bodies[i].pocketed) continue;
    const b = bodies[i];
    for (let j = 0; j < pockets.length; j++) {
      const pk = pockets[j];
      const dx = b.x - pk.x, dy = b.y - pk.y;
      if (dx * dx + dy * dy < POCKET_R * POCKET_R) {
        b.pocketed = true;
        if (!b.knocked) { b.knocked = true; knockedCount++; }
        score += 3; pocketCount++;
        scoreEl.textContent = score;
        playPocket();
        break;
      }
    }
  }
  // Ball in pocket = reposition
  if (ballIdx >= 0) {
    const b = bodies[ballIdx];
    for (let j = 0; j < pockets.length; j++) {
      const pk = pockets[j];
      const dx = b.x - pk.x, dy = b.y - pk.y;
      if (dx * dx + dy * dy < POCKET_R * POCKET_R) {
        b.x = W / 2; b.y = H * 0.78; b.vx = 0; b.vy = 0;
      }
    }
  }
}

// ── Slingshot input ──
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (ballLaunched || roundResetting || ballIdx < 0) return;
  const b = bodies[ballIdx];
  const dx = e.clientX - b.x, dy = e.clientY - b.y;
  if (dx * dx + dy * dy < (BALL_R * 4) ** 2) {
    dragging = true;
    dragStart = { x: b.x, y: b.y };
    dragCur = { x: e.clientX, y: e.clientY };
  }
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  dragCur = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('pointerup', e => {
  if (!dragging) return;
  dragging = false;
  const dx = dragStart.x - dragCur.x;
  const dy = dragStart.y - dragCur.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 15) return;
  const power = Math.min(dist / 8, 25);
  const b = bodies[ballIdx];
  b.vx = (dx / dist) * power;
  b.vy = (dy / dist) * power;
  ballLaunched = true;
  settleTimer = 0;
  launchElapsed = 0;
  playLaunch();
});

function showBanner(text, dur) {
  bannerEl.textContent = text;
  bannerEl.classList.add('show');
  setTimeout(() => bannerEl.classList.remove('show'), dur || 1500);
}

function resetRound() {
  roundResetting = true;
  setupWalls();
  setTimeout(() => {
    round++;
    createPins();
    createBall();
    roundResetting = false;
  }, 500);
}

// ── Draw ──
const pinDrawSize = PIN_R * 2;
const halfPin = pinDrawSize / 2;

function drawTable() {
  ctx.fillStyle = '#1e6b40';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 8;
  ctx.strokeRect(4, 4, W - 8, H - 8);
  ctx.strokeStyle = '#5a9a3a';
  ctx.lineWidth = 3;
  ctx.strokeRect(12, 12, W - 24, H - 24);
  for (let i = 0; i < pockets.length; i++) {
    const pk = pockets[i];
    ctx.beginPath();
    ctx.arc(pk.x, pk.y, POCKET_R, 0, Math.PI * 2);
    ctx.fillStyle = '#0a2a15';
    ctx.fill();
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 3;
    ctx.stroke();
  }
}

function drawSlingshot() {
  if (!dragging || !dragStart || !dragCur || ballIdx < 0) return;
  const b = bodies[ballIdx];
  ctx.save();
  ctx.setLineDash([8, 6]);
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(b.x, b.y);
  ctx.lineTo(dragCur.x, dragCur.y);
  ctx.stroke();
  const dx = dragStart.x - dragCur.x;
  const dy = dragStart.y - dragCur.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 10) {
    const len = Math.min(dist * 0.8, 200);
    const nx = dx / dist, ny = dy / dist;
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(255,80,80,0.7)';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    const ax = b.x + nx * len, ay = b.y + ny * len;
    ctx.lineTo(ax, ay);
    ctx.stroke();
    const angle = Math.atan2(dy, dx);
    ctx.fillStyle = 'rgba(255,80,80,0.7)';
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - 12 * Math.cos(angle - 0.4), ay - 12 * Math.sin(angle - 0.4));
    ctx.lineTo(ax - 12 * Math.cos(angle + 0.4), ay - 12 * Math.sin(angle + 0.4));
    ctx.fill();
  }
  ctx.restore();
}

// Pre-render ball
const ballCanvas = document.createElement('canvas');
const ballSize = BALL_R * 2 + 8;
ballCanvas.width = ballCanvas.height = ballSize;
const bctx = ballCanvas.getContext('2d');
const bcx = ballSize / 2, bcy = ballSize / 2;
bctx.globalAlpha = 0.25;
bctx.beginPath();
bctx.ellipse(bcx + 3, bcy + 3, BALL_R, BALL_R * 0.9, 0, 0, Math.PI * 2);
bctx.fillStyle = '#000';
bctx.fill();
bctx.globalAlpha = 1;
bctx.beginPath();
bctx.arc(bcx, bcy, BALL_R, 0, Math.PI * 2);
bctx.fillStyle = '#EE3333';
bctx.fill();
bctx.strokeStyle = '#991111';
bctx.lineWidth = 2;
bctx.stroke();
bctx.globalAlpha = 0.45;
bctx.beginPath();
bctx.ellipse(bcx - BALL_R * 0.3, bcy - BALL_R * 0.25, BALL_R * 0.3, BALL_R * 0.15, -0.5, 0, Math.PI * 2);
bctx.fillStyle = '#fff';
bctx.fill();
const halfBall = ballSize / 2;

function drawBodies() {
  for (let i = 0; i < bodies.length; i++) {
    const b = bodies[i];
    if (b.pocketed) continue;
    if (i === ballIdx) {
      ctx.drawImage(ballCanvas, b.x - halfBall, b.y - halfBall);
    } else {
      const img = pinImages[b.imgIdx];
      if (img && img.complete) {
        ctx.drawImage(img, b.x - halfPin, b.y - halfPin, pinDrawSize, pinDrawSize);
      } else {
        ctx.beginPath();
        ctx.arc(b.x, b.y, PIN_R, 0, Math.PI * 2);
        ctx.fillStyle = '#FFB380';
        ctx.fill();
      }
    }
  }
  // Hint text
  if (!ballLaunched && !dragging && ballIdx >= 0) {
    ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.004) * 0.2;
    ctx.fillStyle = '#fff';
    ctx.font = '15px "Zen Maru Gothic"';
    ctx.textAlign = 'center';
    ctx.fillText('ひっぱってはなす！', W / 2, H * 0.88);
    ctx.globalAlpha = 1;
  }
}

// ── Confetti ──
const confettiList = [];
function spawnConfetti(cx, cy, n) {
  const count = Math.min(n, 50);
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 5;
    const c = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    confettiList.push({
      x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 3,
      cr: c[0], cg: c[1], cb: c[2],
      size: 5 + Math.random() * 7, life: 1,
    });
  }
}
function updateConfetti() {
  let len = confettiList.length;
  for (let i = len - 1; i >= 0; i--) {
    const c = confettiList[i];
    c.x += c.vx; c.y += c.vy; c.vy += 0.08;
    c.life -= 0.015;
    if (c.life <= 0) { confettiList[i] = confettiList[--len]; confettiList.length = len; continue; }
    ctx.globalAlpha = c.life;
    ctx.fillStyle = `rgb(${c.cr},${c.cg},${c.cb})`;
    ctx.fillRect(c.x - c.size / 2, c.y - c.size / 4, c.size, c.size / 2);
  }
  if (len > 0) ctx.globalAlpha = 1;
}

// ── Settle ──
function checkSettle() {
  if (!ballLaunched || roundResetting) return;
  launchElapsed++;
  // Brake slow bodies after ~1.7s
  if (launchElapsed > 100) {
    for (let i = 0; i < bodies.length; i++) {
      const b = bodies[i];
      if (b.pocketed) continue;
      const spd2 = b.vx * b.vx + b.vy * b.vy;
      if (spd2 < 4 && spd2 > 0.0001) { b.vx *= 0.8; b.vy *= 0.8; }
    }
  }
  let maxSpd2 = 0;
  for (let i = 0; i < bodies.length; i++) {
    if (bodies[i].pocketed) continue;
    const s = bodies[i].vx * bodies[i].vx + bodies[i].vy * bodies[i].vy;
    if (s > maxSpd2) maxSpd2 = s;
  }
  if (maxSpd2 < 0.16) {
    settleTimer++;
    if (settleTimer > 20) {
      if (knockedCount >= totalPins * 0.9) {
        showBanner('🎉 パーフェクト！', 2000);
        playStrike();
        spawnConfetti(W / 2, H / 2, 100);
      } else if (pocketCount >= 3) {
        showBanner('🏆 ナイス！', 1500);
      } else if (knockedCount >= totalPins * 0.5) {
        showBanner('すごい！', 1200);
      }
      setTimeout(resetRound, 1000);
      ballLaunched = false;
    }
  } else { settleTimer = 0; }
}

// ── Main ──
function loop() {
  physicsStep();
  checkPockets();
  checkSettle();

  ctx.clearRect(0, 0, W, H);
  drawTable();
  drawBodies();
  drawSlingshot();
  updateConfetti();
  requestAnimationFrame(loop);
}

setupWalls();
createPins();
createBall();
requestAnimationFrame(loop);
</script>
</body>
</html>
