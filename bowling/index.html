<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>びっくりボウリング | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100dvh; overflow: hidden;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #1a5c3a;
  touch-action: none; user-select: none; -webkit-user-select: none;
}
canvas { display: block; width: 100%; height: 100%; }
#back-btn {
  position: fixed; top: 12px; left: 12px; z-index: 100;
  background: rgba(255,255,255,0.85); border: none; border-radius: 50%;
  width: 44px; height: 44px; font-size: 22px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
}
#score {
  position: fixed; top: 12px; right: 16px; z-index: 100;
  font-size: 28px; font-weight: 900; color: #FFD700;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}
#banner {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
  z-index: 200; font-size: 48px; font-weight: 900; color: #FFD700;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.5); pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s;
  opacity: 0;
}
#banner.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
</style>
</head>
<body>
<button id="back-btn" onclick="location.href='../'">🏠</button>
<div id="score">0</div>
<div id="banner"></div>
<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script>
'use strict';
const { Engine, World, Bodies, Body, Events } = Matter;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bannerEl = document.getElementById('banner');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); resetRound(); });

// ── Audio (lazy init on first gesture) ──
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playBonk(intensity) {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = 200 + Math.random() * 400 + intensity * 400;
  gain.gain.setValueAtTime(Math.min(0.5, intensity * 0.35), ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.12);
}
function playPocket() {
  const ctx = getAudio();
  [0, 60, 120].forEach((d, i) => {
    setTimeout(() => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 500 + i * 200;
      gain.gain.setValueAtTime(0.45, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
      osc.connect(gain).connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.18);
    }, d);
  });
}
function playStrike() {
  const ctx = getAudio();
  [0, 80, 160, 240, 320].forEach((d, i) => {
    setTimeout(() => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = i % 2 === 0 ? 'sine' : 'triangle';
      osc.frequency.value = 400 + i * 150;
      gain.gain.setValueAtTime(0.45, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.connect(gain).connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    }, d);
  });
}
function playLaunch() {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(150, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.45, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.2);
}

// ── Physics ──
const engine = Engine.create({ gravity: { x: 0, y: 0 } });
const world = engine.world;

const PIN_FACES = ['🐧','🐥','🐻','🐱','🐰','🐸','🦊','🐼'];
const PIN_COLORS = ['#FF8FA0','#FFB380','#FFE080','#A0E8A0','#80C8FF','#C0A0FF','#FFB0D0','#A0E0E0'];
const POCKET_R = 35;
const PIN_R = 26;
const BALL_R = 30;
const MAX_PINS = 30;

let pins = [], ball = null, walls = [], pockets = [];
let ballLaunched = false, score = 0, round = 0;
let knockedCount = 0, totalPins = 0, pocketCount = 0;
let settleTimer = 0, launchElapsed = 0, roundResetting = false;
let dragging = false, dragStart = null, dragCur = null;

// ── Pockets (4 corners) ──
function getPocketPositions() {
  const m = 10;
  return [
    { x: m, y: m },
    { x: W - m, y: m },
    { x: m, y: H - m },
    { x: W - m, y: H - m },
  ];
}

// ── Walls (with gaps for pockets) ──
function createWalls() {
  walls.forEach(w => World.remove(world, w));
  const t = 40, g = POCKET_R * 2; // gap for pockets
  walls = [
    // Top wall (gap at corners)
    Bodies.rectangle(W / 2, -t / 2, W - g * 2, t, { isStatic: true }),
    // Bottom wall (gap at corners)
    Bodies.rectangle(W / 2, H + t / 2, W - g * 2, t, { isStatic: true }),
    // Left wall (gap at corners)
    Bodies.rectangle(-t / 2, H / 2, t, H - g * 2, { isStatic: true }),
    // Right wall (gap at corners)
    Bodies.rectangle(W + t / 2, H / 2, t, H - g * 2, { isStatic: true }),
  ];
  walls.forEach(w => { w.restitution = 0.9; });
  World.add(world, walls);
  pockets = getPocketPositions();
}

// ── Pins ──
function createPins() {
  pins.forEach(p => World.remove(world, p));
  pins = [];
  const spacing = PIN_R * 2.3;
  const cols = Math.min(6, Math.floor((W - 80) / spacing));
  const maxRows = Math.floor(MAX_PINS / cols);
  const rows = Math.min(maxRows, Math.floor((H * 0.4) / spacing));
  const startX = (W - (cols - 1) * spacing) / 2;
  const startY = H * 0.08 + 40;
  totalPins = cols * rows;
  knockedCount = 0;
  pocketCount = 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = startX + c * spacing + (Math.random() - 0.5) * 3;
      const y = startY + r * spacing + (Math.random() - 0.5) * 3;
      const pin = Bodies.circle(x, y, PIN_R, {
        restitution: 0.6,
        friction: 0.05,
        frictionAir: 0.04,
        density: 0.0003,
      });
      pin.isPin = true; pin.knocked = false;
      pin.initX = x; pin.initY = y;
      pin.colorIdx = Math.floor(Math.random() * PIN_COLORS.length);
      pin.faceIdx = Math.floor(Math.random() * PIN_FACES.length);
      pin.flashTimer = 0; pin.pocketed = false;
      pins.push(pin);
    }
  }
  World.add(world, pins);
}

function createBall() {
  if (ball) World.remove(world, ball);
  ball = Bodies.circle(W / 2, H * 0.78, BALL_R, {
    restitution: 0.5, friction: 0.01, frictionAir: 0.008, density: 0.05,
  });
  ball.isBall = true;
  ballLaunched = false;
  World.add(world, ball);
}

// ── Slingshot input ──
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  getAudio();
  if (ballLaunched || roundResetting) return;
  const dx = e.clientX - ball.position.x, dy = e.clientY - ball.position.y;
  if (dx * dx + dy * dy < (BALL_R * 4) ** 2) {
    dragging = true;
    dragStart = { x: ball.position.x, y: ball.position.y };
    dragCur = { x: e.clientX, y: e.clientY };
  }
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  dragCur = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('pointerup', e => {
  if (!dragging) return;
  dragging = false;
  const dx = dragStart.x - dragCur.x;
  const dy = dragStart.y - dragCur.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 15) return;
  const power = Math.min(dist / 8, 25);
  const vx = (dx / dist) * power;
  const vy = (dy / dist) * power;
  Body.setVelocity(ball, { x: vx, y: vy });
  ballLaunched = true;
  settleTimer = 0;
  launchElapsed = 0;
  playLaunch();
});

// ── Collision sounds ──
let soundThrottle = 0;
Events.on(engine, 'collisionStart', event => {
  event.pairs.forEach(pair => {
    const spd = Math.sqrt(
      (pair.bodyA.velocity.x - pair.bodyB.velocity.x) ** 2 +
      (pair.bodyA.velocity.y - pair.bodyB.velocity.y) ** 2
    );
    if (spd > 1.5 && soundThrottle <= 0) {
      playBonk(Math.min(spd / 8, 1));
      soundThrottle = 2;
    }
    [pair.bodyA, pair.bodyB].forEach(b => {
      if (b.isPin && !b.knocked) {
        const dx = b.position.x - b.initX, dy = b.position.y - b.initY;
        if (dx * dx + dy * dy > PIN_R * PIN_R) {
          b.knocked = true; b.flashTimer = 12;
          knockedCount++; score++; scoreEl.textContent = score;
        }
      }
    });
  });
});

// ── Pocket check ──
function checkPockets() {
  pins.forEach(p => {
    if (p.pocketed) return;
    for (const pk of pockets) {
      const dx = p.position.x - pk.x, dy = p.position.y - pk.y;
      if (dx * dx + dy * dy < POCKET_R * POCKET_R) {
        p.pocketed = true;
        if (!p.knocked) { p.knocked = true; knockedCount++; }
        score += 3; pocketCount++;
        scoreEl.textContent = score;
        World.remove(world, p);
        playPocket();
        return;
      }
    }
  });
  // Ball in pocket = just reposition
  if (ball) {
    for (const pk of pockets) {
      const dx = ball.position.x - pk.x, dy = ball.position.y - pk.y;
      if (dx * dx + dy * dy < POCKET_R * POCKET_R) {
        Body.setPosition(ball, { x: W / 2, y: H * 0.78 });
        Body.setVelocity(ball, { x: 0, y: 0 });
      }
    }
  }
}

// ── Banner ──
function showBanner(text, dur) {
  bannerEl.textContent = text;
  bannerEl.classList.add('show');
  setTimeout(() => bannerEl.classList.remove('show'), dur || 1500);
}

function resetRound() {
  roundResetting = true;
  createWalls();
  setTimeout(() => {
    round++;
    createPins();
    createBall();
    roundResetting = false;
  }, 500);
}

// ── Draw ──
function drawTable() {
  // Felt background
  ctx.fillStyle = '#1e6b40';
  ctx.fillRect(0, 0, W, H);
  // Border
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 8;
  ctx.strokeRect(4, 4, W - 8, H - 8);
  // Inner rail
  ctx.strokeStyle = '#5a9a3a';
  ctx.lineWidth = 3;
  ctx.strokeRect(12, 12, W - 24, H - 24);

  // Pockets
  pockets.forEach(pk => {
    ctx.save();
    ctx.beginPath();
    ctx.arc(pk.x, pk.y, POCKET_R, 0, Math.PI * 2);
    ctx.fillStyle = '#0a2a15';
    ctx.fill();
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.restore();
  });
}

function drawSlingshot() {
  if (!dragging || !dragStart || !dragCur) return;
  // Draw pull line
  ctx.save();
  ctx.setLineDash([8, 6]);
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(ball.position.x, ball.position.y);
  ctx.lineTo(dragCur.x, dragCur.y);
  ctx.stroke();
  // Draw predicted direction
  const dx = dragStart.x - dragCur.x;
  const dy = dragStart.y - dragCur.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 10) {
    const len = Math.min(dist * 0.8, 200);
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(255,80,80,0.7)';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(ball.position.x, ball.position.y);
    ctx.lineTo(ball.position.x + dx / dist * len, ball.position.y + dy / dist * len);
    ctx.stroke();
    // Arrow head
    const ax = ball.position.x + dx / dist * len;
    const ay = ball.position.y + dy / dist * len;
    const angle = Math.atan2(dy, dx);
    ctx.fillStyle = 'rgba(255,80,80,0.7)';
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - 12 * Math.cos(angle - 0.4), ay - 12 * Math.sin(angle - 0.4));
    ctx.lineTo(ax - 12 * Math.cos(angle + 0.4), ay - 12 * Math.sin(angle + 0.4));
    ctx.fill();
  }
  ctx.restore();
}

function drawPin(pin) {
  if (pin.pocketed) return;
  const { x, y } = pin.position;
  if (pin.flashTimer > 0) {
    ctx.save();
    ctx.globalAlpha = pin.flashTimer / 12 * 0.5;
    ctx.beginPath();
    ctx.arc(x, y, PIN_R * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD700';
    ctx.fill();
    ctx.restore();
    pin.flashTimer--;
  }
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(pin.angle);
  const color = PIN_COLORS[pin.colorIdx];
  ctx.beginPath();
  ctx.arc(0, 0, PIN_R, 0, Math.PI * 2);
  ctx.fillStyle = pin.knocked ? shadeColor(color, -20) : color;
  ctx.fill();
  ctx.strokeStyle = shadeColor(color, -40);
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.font = `${PIN_R * 1.3}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(PIN_FACES[pin.faceIdx], 0, 2);
  ctx.restore();
}

function drawBall() {
  if (!ball) return;
  const { x, y } = ball.position;
  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.beginPath();
  ctx.ellipse(x + 3, y + 3, BALL_R, BALL_R * 0.9, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();
  // Ball
  const grad = ctx.createRadialGradient(x - BALL_R * 0.3, y - BALL_R * 0.3, BALL_R * 0.1, x, y, BALL_R);
  grad.addColorStop(0, '#FF6B6B');
  grad.addColorStop(0.5, '#EE3333');
  grad.addColorStop(1, '#BB1111');
  ctx.beginPath();
  ctx.arc(x, y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#991111';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Shine
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.ellipse(x - BALL_R * 0.3, y - BALL_R * 0.25, BALL_R * 0.3, BALL_R * 0.15, -0.5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.restore();

  // Hint text
  if (!ballLaunched && !dragging) {
    ctx.save();
    ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.004) * 0.2;
    ctx.fillStyle = '#fff';
    ctx.font = '15px "Zen Maru Gothic"';
    ctx.textAlign = 'center';
    ctx.fillText('ひっぱってはなす！', W / 2, H * 0.88);
    ctx.restore();
  }
}

function shadeColor(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16) + amt;
  let g = parseInt(hex.slice(3, 5), 16) + amt;
  let b = parseInt(hex.slice(5, 7), 16) + amt;
  return `rgb(${Math.max(0, Math.min(255, r))},${Math.max(0, Math.min(255, g))},${Math.max(0, Math.min(255, b))})`;
}

// ── Confetti ──
const confettiList = [];
function spawnConfetti(cx, cy, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 5;
    confettiList.push({
      x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 3,
      color: PIN_COLORS[Math.floor(Math.random() * PIN_COLORS.length)],
      size: 5 + Math.random() * 7, rot: Math.random() * 6.28,
      rotSpd: (Math.random() - 0.5) * 0.2, life: 1,
    });
  }
}
function updateConfetti() {
  for (let i = confettiList.length - 1; i >= 0; i--) {
    const c = confettiList[i];
    c.x += c.vx; c.y += c.vy; c.vy += 0.08;
    c.rot += c.rotSpd; c.life -= 0.008;
    if (c.life <= 0) { confettiList.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = c.life;
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.size / 2, -c.size / 4, c.size, c.size / 2);
    ctx.restore();
  }
}

// ── Settle ──
function checkSettle() {
  if (!ballLaunched || roundResetting) return;
  launchElapsed++;
  // Force brake after 2.5s
  if (launchElapsed > 150) {
    [ball, ...pins].forEach(b => {
      if (!b || b.pocketed) return;
      const spd = Math.sqrt(b.velocity.x ** 2 + b.velocity.y ** 2);
      if (spd < 2 && spd > 0.01) Body.setVelocity(b, { x: b.velocity.x * 0.8, y: b.velocity.y * 0.8 });
    });
  }
  let maxSpd = 0;
  [ball, ...pins.filter(p => !p.pocketed)].forEach(b => {
    if (!b) return;
    const s = Math.sqrt(b.velocity.x ** 2 + b.velocity.y ** 2);
    if (s > maxSpd) maxSpd = s;
  });
  if (maxSpd < 0.4) {
    settleTimer++;
    if (settleTimer > 25) {
      const activePins = pins.filter(p => !p.pocketed);
      if (knockedCount >= totalPins * 0.9) {
        showBanner('🎉 パーフェクト！', 2000);
        playStrike();
        spawnConfetti(W / 2, H / 2, 120);
      } else if (pocketCount >= 3) {
        showBanner('🏆 ナイス！', 1500);
      } else if (knockedCount >= totalPins * 0.5) {
        showBanner('すごい！', 1200);
      }
      setTimeout(resetRound, 1000);
      ballLaunched = false;
    }
  } else { settleTimer = 0; }
}

// ── Main ──
function loop() {
  Engine.update(engine, 1000 / 60);
  if (soundThrottle > 0) soundThrottle--;
  checkPockets();
  checkSettle();

  ctx.clearRect(0, 0, W, H);
  drawTable();
  pins.forEach(drawPin);
  drawBall();
  drawSlingshot();
  updateConfetti();
  requestAnimationFrame(loop);
}

createWalls();
createPins();
createBall();
requestAnimationFrame(loop);
</script>
</body>
</html>
