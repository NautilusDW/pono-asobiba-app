<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>びっくりボウリング | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap"></noscript>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100vh; height: 100dvh; overflow: hidden;
  position: fixed; inset: 0;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #1a5c3a;
  touch-action: none; user-select: none; -webkit-user-select: none;
  overscroll-behavior: none; -webkit-overflow-scrolling: auto;
}
canvas { display: block; width: 100%; height: 100%; will-change: transform; }
#back-btn {
  position: fixed; top: 12px; left: 12px; z-index: 100;
  background: rgba(255,255,255,0.85); border: none; border-radius: 50%;
  width: 44px; height: 44px; font-size: 22px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
}
#score { display: none; }
#combo { display: none; }
#start-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, #1a5c3a 0%, #2d8f5e 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer;
}
#start-screen .title { font-size: 42px; font-weight: 900; color: #FFD700; text-shadow: 3px 3px 6px rgba(0,0,0,0.4); }
#start-screen .tap { font-size: 22px; color: #fff; margin-top: 30px; animation: pulse 1.5s infinite; }
#start-screen .mode-link { font-size: 18px; color: #4ECDC4; margin-top: 24px; text-decoration: underline; cursor: pointer; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.97)} }
</style>
<script src="../common/achievements.js"></script>
</head>
<body>
<div id="start-screen"><div class="title">びっくりボウリング</div><div class="tap">タップしてスタート</div><div class="mode-link" onclick="event.stopPropagation();location.href='puzzle.html'">パズルモードで遊ぶ</div></div>
<button id="back-btn" onclick="location.href='../'">🏠</button>
<div id="score">0</div>
<div id="combo"></div>
<canvas id="c"></canvas>

<script>
'use strict';
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('touchstart', e => { if (e.target === canvas) e.preventDefault(); }, { passive: false });
window.addEventListener('scroll', () => window.scrollTo(0, 0));

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── Audio ──
let audioCtx = null, audioReady = false;
let bonkBuf = null, popBuf = null, launchBuf = null, comboBuf = null, mergeBuf = null, explodeBuf = null, bonusFanfareBuf = null;

function makeBuf(ctx, freq, dur, vol, decay) {
  const sr = ctx.sampleRate, n = sr * dur | 0, ab = ctx.createBuffer(1, n, sr), d = ab.getChannelData(0);
  for (let i = 0; i < n; i++) { const t = i / sr; d[i] = Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * (decay || 20)) * vol; }
  return ab;
}
function makeSweepBuf(ctx, f0, f1, dur, vol) {
  const sr = ctx.sampleRate, n = sr * dur | 0, ab = ctx.createBuffer(1, n, sr), d = ab.getChannelData(0);
  for (let i = 0; i < n; i++) { const t = i / sr; d[i] = Math.sin(2 * Math.PI * (f0 + (f1 - f0) * t / dur) * t) * Math.exp(-t * 8) * vol; }
  return ab;
}
function makeExplosionBuf(ctx) {
  const sr = ctx.sampleRate, n = sr * 0.2 | 0, ab = ctx.createBuffer(1, n, sr), d = ab.getChannelData(0);
  for (let i = 0; i < n; i++) { const t = i / sr; d[i] = (Math.random() * 2 - 1) * Math.exp(-t * 12) * 0.35 + Math.sin(2 * Math.PI * 100 * t) * Math.exp(-t * 15) * 0.25; }
  return ab;
}

function initAudio() {
  return new Promise(resolve => {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    audioCtx.resume().then(() => {
      const b = audioCtx.createBuffer(1, 1, 22050), s = audioCtx.createBufferSource();
      s.buffer = b; s.connect(audioCtx.destination); s.start(0);
      bonkBuf = makeBuf(audioCtx, 400, 0.06, 0.4, 40);
      popBuf = makeBuf(audioCtx, 800, 0.05, 0.3, 50);
      launchBuf = makeBuf(audioCtx, 300, 0.1, 0.3, 20);
      comboBuf = makeSweepBuf(audioCtx, 400, 1200, 0.15, 0.4);
      mergeBuf = makeSweepBuf(audioCtx, 500, 1500, 0.12, 0.5);
      explodeBuf = makeExplosionBuf(audioCtx);
      bonusFanfareBuf = makeSweepBuf(audioCtx, 300, 900, 0.3, 0.5);
      audioReady = true; resolve();
    });
    setTimeout(() => {
      bonkBuf = bonkBuf || makeBuf(audioCtx, 400, 0.06, 0.4, 40);
      popBuf = popBuf || makeBuf(audioCtx, 800, 0.05, 0.3, 50);
      launchBuf = launchBuf || makeBuf(audioCtx, 300, 0.1, 0.3, 20);
      comboBuf = comboBuf || makeSweepBuf(audioCtx, 400, 1200, 0.15, 0.4);
      mergeBuf = mergeBuf || makeSweepBuf(audioCtx, 500, 1500, 0.12, 0.5);
      explodeBuf = explodeBuf || makeExplosionBuf(audioCtx);
      bonusFanfareBuf = bonusFanfareBuf || makeSweepBuf(audioCtx, 300, 900, 0.3, 0.5);
      audioReady = true; resolve();
    }, 1000);
  });
}

document.getElementById('start-screen').addEventListener('pointerdown', async function handler(e) {
  e.preventDefault(); this.removeEventListener('pointerdown', handler);
  await initAudio(); this.style.display = 'none';
});
document.addEventListener('visibilitychange', () => {
  if (audioCtx && document.visibilityState === 'visible' && audioCtx.state !== 'running') audioCtx.resume();
});

function playBuf(buf, volume, rate) {
  if (!audioReady || !buf) return;
  const src = audioCtx.createBufferSource(); src.buffer = buf; src.playbackRate.value = rate || 1;
  if (volume !== undefined && volume < 1) { const g = audioCtx.createGain(); g.gain.value = volume; src.connect(g); g.connect(audioCtx.destination); }
  else src.connect(audioCtx.destination);
  src.start(0);
}

// ── Tier System ──
const TIERS = [
  { img: 0,  r: 18, mass: 0.5, name: 'うさぎ' },
  { img: 5,  r: 24, mass: 0.8, name: 'アライグマ' },
  { img: 4,  r: 32, mass: 1.2, name: 'アヒル' },
  { img: 6,  r: 42, mass: 2.0, name: 'ハリネズミ' },
  { img: 10, r: 54, mass: 3.5, name: 'クマ' },
];
const MAX_TIER = TIERS.length - 1;

// ── Constants ──
const RESTITUTION = 0.95;
const WALL_RESTITUTION = 0.95;
const MAX_BODIES = 50;
const MIN_PINS = 12;         // refill tier0 to this minimum
const COMBO_WINDOW = 90;
const MAX_MERGES_PER_FRAME = 4;
const MAGNET_RANGE = 2.5;
const MAGNET_FORCE = 0.15;
const BALL_SPAWN_Y = 0.88;   // ratio
const MIN_DRAG = 10;
const MAX_SPEED = 22;
const MIN_SPEED = 8;
const BALL_LIFETIME = 6000;
const ARRANGE_TIME = 50;     // frames for arrange animation
const RESULT_TIME = 90;      // frames for result display
const HUD_HEIGHT = 80;       // top HUD area height in px

// ── Pin images ──
const tierCanvases = [];
for (let t = 0; t < TIERS.length; t++) {
  const tier = TIERS[t]; const drawSize = tier.r * 2;
  const img = new Image(); img.src = 'pins/pin_' + tier.img + '.png';
  const oc = document.createElement('canvas'); oc.width = oc.height = drawSize;
  tierCanvases.push(oc);
  img.onload = () => { oc.getContext('2d').drawImage(img, 0, 0, drawSize, drawSize); };
}

// ── Bodies ──
const bodies = [];

function addBody(x, y, r, mass, type) {
  const b = { x, y, vx: 0, vy: 0, r, mass, type, tier: 0, born: performance.now(), dead: false, merging: false, flashTimer: 0, targetX: 0, targetY: 0 };
  bodies.push(b); return b;
}

// ── Effects ──
const PARTICLE_COLORS = ['#FF6B6B','#FFE66D','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9','#F1948A'];
const particles = [], MAX_PARTICLES = 150;
function spawnParticles(x, y, count, baseColor) {
  const n = Math.min(count, MAX_PARTICLES - particles.length);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 6;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, color: baseColor || PARTICLE_COLORS[Math.floor(Math.random()*PARTICLE_COLORS.length)], size: 3+Math.random()*6, life: 1, decay: 0.015+Math.random()*0.01 });
  }
}
const popups = [];
function spawnPopup(x, y, text, color) { popups.push({ x, y, text, color: color || '#FFD700', life: 1, vy: -1.5 }); }
const rings = [];
function spawnRing(x, y, maxRadius, color) { rings.push({ x, y, radius: 5, maxRadius: maxRadius || 60, alpha: 0.7, color: color || '#fff' }); }

// ── Collision ──
function resolveCollision(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const dist2 = dx*dx + dy*dy, minDist = a.r + b.r;
  if (dist2 >= minDist*minDist || dist2 < 0.001) return 0;
  const dist = Math.sqrt(dist2), nx = dx/dist, ny = dy/dist;
  const overlap = minDist - dist, totalMass = a.mass + b.mass;
  a.x -= nx * overlap * (b.mass/totalMass);
  a.y -= ny * overlap * (b.mass/totalMass);
  b.x += nx * overlap * (a.mass/totalMass);
  b.y += ny * overlap * (a.mass/totalMass);
  const dvn = (a.vx-b.vx)*nx + (a.vy-b.vy)*ny;
  if (dvn > 0) return 0;
  const j = -(1 + RESTITUTION) * dvn / (1/a.mass + 1/b.mass);
  a.vx += (j/a.mass)*nx; a.vy += (j/a.mass)*ny;
  b.vx -= (j/b.mass)*nx; b.vy -= (j/b.mass)*ny;
  return Math.abs(dvn);
}

function wallBounce(b) {
  const wallPad = 8; // keep pins inside visible border
  if (b.x - b.r < wallPad) { b.x = wallPad + b.r; b.vx = Math.abs(b.vx) * WALL_RESTITUTION; }
  if (b.x + b.r > W - wallPad) { b.x = W - wallPad - b.r; b.vx = -Math.abs(b.vx) * WALL_RESTITUTION; }
  if (b.y - b.r < HUD_HEIGHT + 4) { b.y = HUD_HEIGHT + 4 + b.r; b.vy = Math.abs(b.vy) * WALL_RESTITUTION; }
  if (b.y + b.r > H - wallPad) { b.y = H - wallPad - b.r; b.vy = -Math.abs(b.vy) * WALL_RESTITUTION; }
}

// ── Game state ──
let score = 0, combo = 0, comboTimer = 0;
let shakeX = 0, shakeY = 0, shakeLife = 0;
let soundThrottle = 0, maxHitStrength = 0;
let mergePitch = 1.0, hitstopFrames = 0, bgFlash = 0;

// Phase management
let gamePhase = 'arrange'; // 'arrange' | 'aim' | 'action' | 'result' | 'bonus_intro' | 'bonus' | 'bonus_result'
let phaseTimer = 0;
let roundMerges = 0;
let ballTier = 0;           // current ball's tier
let shotNumber = 0;

// New game features
let bestScore = parseInt(localStorage.getItem('bowling_best') || '0');
let bestChain = parseInt(localStorage.getItem('bowling_best_chain') || '0');
let ballTrail = [];          // [{x,y,alpha}] ball position trail
const MAX_TRAIL = 40;
let roundBestMerges = 0;     // best merges in a single round

// Bonus stage
const BONUS_INTERVAL = 10;       // every N shots
const BONUS_DURATION = 10000;    // 10 seconds
const BONUS_ROW_INTERVAL = 1000; // new row every 1s
let bonusActive = false;
let bonusStartTime = 0;
let bonusLastRowTime = 0;
let bonusTotalScore = 0;
let bonusMerges = 0;
let bonusMaxChain = 0;          // best chain within this bonus
let bonusIntroTimer = 0;

function triggerShake(intensity) { shakeLife = Math.max(shakeLife, Math.min(intensity * 6, 6)); }

// ── Bonus stage ──
function shouldTriggerBonus() {
  return shotNumber > 0 && shotNumber % BONUS_INTERVAL === 0;
}

function startBonusIntro() {
  gamePhase = 'bonus_intro';
  bonusIntroTimer = 120; // 2 seconds intro
  // Clear all bodies for bonus
  bodies.length = 0;
  ballTrail = [];
  playBuf(bonusFanfareBuf, 0.6, 1.0);
  // Spawn fireworks
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      spawnParticles(W * (0.2 + Math.random() * 0.6), H * (0.2 + Math.random() * 0.4), 15);
      spawnRing(W * (0.2 + Math.random() * 0.6), H * (0.2 + Math.random() * 0.4), 80, '#FFD700');
    }, i * 200);
  }
}

function startBonusStage() {
  gamePhase = 'bonus';
  bonusActive = true;
  bonusStartTime = performance.now();
  bonusLastRowTime = bonusStartTime;
  bonusTotalScore = 0;
  bonusMerges = 0;
  bonusMaxChain = 0;
  combo = 0; comboTimer = 0; mergePitch = 1.0;
  ballTier = 0; // always rabbit in bonus
  bodies.length = 0;
  // Spawn initial rows
  spawnBonusRow();
  spawnBonusRow(HUD_HEIGHT + TIERS[0].r * 2 + 50);
}

function spawnBonusRow(yOverride) {
  const t0 = TIERS[0];
  const rowY = yOverride || HUD_HEIGHT + t0.r + 8;
  const count = Math.floor((W - 60) / (t0.r * 2 + 12));
  const totalW = count * (t0.r * 2 + 12) - 12;
  const startX = (W - totalW) / 2 + t0.r;
  for (let i = 0; i < count; i++) {
    const b = addBody(startX + i * (t0.r * 2 + 12), rowY, t0.r, t0.mass, 'pin');
    b.tier = 0;
    b.flashTimer = 4;
  }
  // Visual feedback for new row
  spawnRing(W / 2, rowY, W * 0.4, '#4ECDC4');
}

function endBonusStage() {
  bonusActive = false;
  gamePhase = 'bonus_result';
  phaseTimer = 180; // 3 seconds to show results
  ballTrail = [];

  // Calculate chain bonus (added on top of points already earned during bonus)
  let chainBonus = 0;
  if (bonusMaxChain >= 8) chainBonus = 2000;
  else if (bonusMaxChain >= 6) chainBonus = 1000;
  else if (bonusMaxChain >= 4) chainBonus = 500;
  else if (bonusMaxChain >= 2) chainBonus = 200;

  bonusTotalScore += chainBonus;
  score += chainBonus; // only add the chain bonus (merge scores already added during play)
  // Record best chain from bonus play too
  if (bonusMaxChain > bestChain) { bestChain = bonusMaxChain; localStorage.setItem('bowling_best_chain', String(bestChain)); }

  // Fireworks for good bonus
  if (bonusTotalScore > 500) {
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        spawnParticles(W * (0.15 + Math.random() * 0.7), H * (0.15 + Math.random() * 0.5), 20);
      }, i * 150);
    }
  }
  playBuf(bonusFanfareBuf, 0.5, 1.2);
}

// ── Pick random ball tier ──
function pickBallTier() {
  const r = Math.random();
  if (r < 0.50) return 0;
  if (r < 0.75) return 1;
  if (r < 0.90) return 2;
  if (r < 0.98) return 3;
  return 4;
}

// ── Arrange: sort pins by tier and lay out neatly ──
function startArrangePhase() {
  gamePhase = 'arrange';
  phaseTimer = ARRANGE_TIME;
  // Show any deferred achievement popups now (between stages)
  if (window.flushAchievementPopups) window.flushAchievementPopups();

  // Clean up dead and balls
  for (let i = bodies.length - 1; i >= 0; i--) {
    if (bodies[i].dead || bodies[i].type === 'ball') { bodies[i] = bodies[bodies.length-1]; bodies.pop(); }
  }

  // Convert any remaining balls to pins (ball that stopped = becomes a pin)
  for (let i = 0; i < bodies.length; i++) {
    if (bodies[i].type === 'ball') {
      bodies[i].type = 'pin';
      bodies[i].vx = 0; bodies[i].vy = 0;
    }
  }

  // Stop all movement
  for (let i = 0; i < bodies.length; i++) { bodies[i].vx = 0; bodies[i].vy = 0; bodies[i].merging = false; }

  // Refill tier0 to minimum
  while (bodies.length < MIN_PINS && bodies.length < MAX_BODIES) {
    const t0 = TIERS[0];
    const b = addBody(W/2, H * 0.3, t0.r, t0.mass, 'pin');
    b.tier = 0;
  }

  // Collect all pins and sort by tier (high first)
  const pins = bodies.filter(b => b.type === 'pin' && !b.dead);
  pins.sort((a, b) => b.tier - a.tier);

  // Ensure tier data is correct
  for (const p of pins) { const t = TIERS[p.tier]; p.r = t.r; p.mass = t.mass; }

  const GAP = 10; // extra px between pins beyond their radii

  // Pick a random formation pattern
  const patterns = ['triangle', 'diamond', 'circle', 'grid', 'v-shape', 'spiral', 'cross', 'rows'];
  const pattern = patterns[Math.floor(Math.random() * patterns.length)];
  const cxP = W / 2, areaTop = HUD_HEIGHT + 10, areaBot = H * 0.58;
  const areaCY = (areaTop + areaBot) / 2;
  const n = pins.length;

  // Step 1: Generate rough shape positions (unit spacing ~50px, will be fixed by relaxation)
  const pos = [];
  const S = 50; // base spacing unit

  if (pattern === 'triangle') {
    let placed = 0, row = 0;
    while (placed < n) { for (let c = 0; c <= row && placed < n; c++) { pos.push({ x: cxP + (c - row/2) * S, y: areaTop + 40 + row * S }); placed++; } row++; }
  } else if (pattern === 'diamond') {
    const half = Math.ceil(Math.sqrt(n));
    let placed = 0;
    for (let row = 0; placed < n; row++) { const w = Math.max(1, half - Math.abs(row - half + 1)); for (let c = 0; c < w && placed < n; c++) { pos.push({ x: cxP + (c - (w-1)/2) * S, y: areaTop + 40 + row * S * 0.85 }); placed++; } }
  } else if (pattern === 'circle') {
    pos.push({ x: cxP, y: areaCY });
    let placed = 1, ring = 1;
    while (placed < n) { const cnt = Math.min(n - placed, Math.max(5, ring * 6)); const r = ring * S * 1.2; for (let i = 0; i < cnt && placed < n; i++) { const a = (i/cnt)*Math.PI*2 - Math.PI/2; pos.push({ x: cxP + Math.cos(a)*r, y: areaCY + Math.sin(a)*r }); placed++; } ring++; }
  } else if (pattern === 'grid') {
    const cols = Math.ceil(Math.sqrt(n * 1.3));
    let placed = 0;
    for (let r = 0; placed < n; r++) { const rc = Math.min(cols, n - placed); for (let c = 0; c < rc; c++) { pos.push({ x: cxP + (c - (rc-1)/2) * S, y: areaTop + 40 + r * S }); placed++; } }
  } else if (pattern === 'v-shape') {
    const half = Math.ceil(n / 2);
    for (let i = 0; i < n; i++) { const side = i < half ? -1 : 1; const idx = i < half ? i : i - half; pos.push({ x: cxP + side * (30 + idx * S * 0.7), y: areaTop + 40 + idx * S * 0.7 }); }
  } else if (pattern === 'spiral') {
    for (let i = 0; i < n; i++) { const a = i * 0.9; const r = 10 + i * S * 0.45; pos.push({ x: cxP + Math.cos(a)*r, y: areaCY + Math.sin(a)*r }); }
  } else if (pattern === 'cross') {
    pos.push({ x: cxP, y: areaCY });
    const dirs = [[0,-1],[0,1],[-1,0],[1,0]]; let placed = 1;
    for (let arm = 0; arm < 4 && placed < n; arm++) { for (let i = 1; placed < n && i <= Math.ceil((n-1)/4); i++) { pos.push({ x: cxP + dirs[arm][0]*i*S, y: areaCY + dirs[arm][1]*i*S }); placed++; } }
  } else {
    // rows — tier grouped
    const groups = {};
    for (const p of pins) { if (!groups[p.tier]) groups[p.tier] = []; groups[p.tier].push(p); }
    const sortedTiers = Object.keys(groups).map(Number).sort((a, b) => b - a);
    let curY = areaTop + 40, placed = 0;
    for (const tier of sortedTiers) { const grp = groups[tier]; for (let i = 0; i < grp.length; i++) { pos.push({ x: cxP + (i - (grp.length-1)/2) * S, y: curY }); placed++; } curY += S; }
  }

  // Step 2: Relaxation — push apart any overlapping pairs (iterative)
  // This guarantees no overlaps regardless of pin sizes
  for (let iter = 0; iter < 20; iter++) {
    let anyOverlap = false;
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const dx = pos[j].x - pos[i].x, dy = pos[j].y - pos[i].y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 0.1;
        const minDist = pins[i].r + pins[j].r + GAP;
        if (dist < minDist) {
          anyOverlap = true;
          const push = (minDist - dist) / 2 + 1;
          const nx = dx / dist, ny = dy / dist;
          pos[i].x -= nx * push; pos[i].y -= ny * push;
          pos[j].x += nx * push; pos[j].y += ny * push;
        }
      }
    }
    // Clamp within field bounds (inside walls)
    for (let i = 0; i < n; i++) {
      const r = pins[i].r;
      pos[i].x = Math.max(r + 12, Math.min(W - r - 12, pos[i].x));
      pos[i].y = Math.max(HUD_HEIGHT + r + 8, Math.min(areaBot, pos[i].y));
    }
    if (!anyOverlap) break;
  }

  // Assign target positions
  for (let i = 0; i < n; i++) {
    pins[i].targetX = pos[i].x;
    pins[i].targetY = pos[i].y;
  }

  // Pick next ball tier
  ballTier = pickBallTier();
}

// ── Merge shockwave ──
function mergeShockwave(cx, cy, newTier) {
  const radius = 80 + newTier * 30;
  const force = 4 + newTier * 3;
  const attractRadius = 150;
  const attractForce = 2;
  for (let i = 0; i < bodies.length; i++) {
    const b = bodies[i];
    if (b.dead || b.type !== 'pin') continue;
    const dx = b.x - cx, dy = b.y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < radius && dist > 1) {
      const falloff = 1 - dist / radius;
      b.vx += (dx/dist) * force * falloff;
      b.vy += (dy/dist) * force * falloff;
    }
    if (b.tier === newTier && dist < attractRadius && dist > 1) {
      const pull = attractForce * (1 - dist / attractRadius);
      b.vx -= (dx/dist) * pull;
      b.vy -= (dy/dist) * pull;
    }
  }
}

// ── Explosion (bear + bear) ──
function triggerExplosion(cx, cy) {
  spawnParticles(cx, cy, 20);
  // Just push nearby pins gently — NO spawning new pins (prevents cascade)
  for (let i = 0; i < bodies.length; i++) {
    const b = bodies[i];
    if (b.dead) continue;
    const dx = b.x - cx, dy = b.y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 150 && dist > 1) {
      b.vx += (dx/dist) * (1 - dist/150) * 8;
      b.vy += (dy/dist) * (1 - dist/150) * 8;
    }
  }
  triggerShake(1.5); bgFlash = Math.min(bgFlash + 0.08, 0.2);
  score += 500;
  spawnPopup(cx, cy - 30, '+500', '#FF4444');
  spawnRing(cx, cy, 120, '#FFD700');
  playBuf(explodeBuf, 0.4, 0.5);
  hitstopFrames = Math.min(hitstopFrames + 2, 4);
}

// ── Ball-pin merge (ball same tier as pin) ──
function ballPinMerge(ball, pin) {
  ball.dead = true;
  const cx = (ball.x + pin.x) / 2, cy = (ball.y + pin.y) / 2;
  if (pin.tier < MAX_TIER) {
    const nt = pin.tier + 1, t = TIERS[nt];
    pin.tier = nt; pin.r = t.r; pin.mass = t.mass;
    pin.flashTimer = 8;
    pin.vx = (ball.vx + pin.vx) * 0.3;
    pin.vy = (ball.vy + pin.vy) * 0.3;
    mergeShockwave(cx, cy, nt);
    spawnPopup(cx, cy - 20, TIERS[nt].name + '!', '#FFD700');
  } else {
    pin.dead = true;
    triggerExplosion(cx, cy);
  }
  spawnParticles(cx, cy, 12 + pin.tier * 5);
  spawnRing(cx, cy, 50 + pin.tier * 20, '#fff');
  mergePitch = Math.min(mergePitch * 1.12, 2.5);
  playBuf(mergeBuf, 0.5 + pin.tier * 0.15, mergePitch);
  score += Math.round((pin.tier + 1) * 20 * (1 + combo * 0.5));
  combo++; comboTimer = COMBO_WINDOW;
  roundMerges++;
  triggerShake(0.5 + pin.tier * 0.3);
  if (pin.tier >= 3) hitstopFrames = Math.min(hitstopFrames + 1, 3);
  bgFlash = Math.min(bgFlash + 0.03, 0.15);
}

// ── Merge detection (cluster-based: 2+ same-tier touching = merge all) ──
const pendingClusters = [];
function detectMerges() {
  pendingClusters.length = 0;
  const n = bodies.length;
  // Build adjacency for same-tier touching pins (at least one moving)
  const visited = new Uint8Array(n);
  for (let i = 0; i < n; i++) {
    const a = bodies[i];
    if (a.dead || a.type !== 'pin' || a.merging || visited[i]) continue;
    // BFS to find cluster of same-tier touching pins
    const cluster = [i];
    visited[i] = 1;
    let hasMoving = false;
    let qi = 0;
    while (qi < cluster.length) {
      const ci = cluster[qi++];
      const ca = bodies[ci];
      if (ca.vx*ca.vx + ca.vy*ca.vy >= 0.5) hasMoving = true;
      for (let j = 0; j < n; j++) {
        if (visited[j]) continue;
        const cb = bodies[j];
        if (cb.dead || cb.type !== 'pin' || cb.merging) continue;
        if (cb.tier !== ca.tier) continue;
        const dx = cb.x - ca.x, dy = cb.y - ca.y;
        if (dx*dx + dy*dy < (ca.r + cb.r) * (ca.r + cb.r)) {
          visited[j] = 1;
          cluster.push(j);
        }
      }
    }
    if (cluster.length >= 2 && hasMoving) {
      const members = cluster.map(idx => bodies[idx]);
      let cx = 0, cy = 0, svx = 0, svy = 0;
      for (const m of members) { cx += m.x; cy += m.y; svx += m.vx; svy += m.vy; }
      cx /= members.length; cy /= members.length;
      pendingClusters.push({ members, tier: members[0].tier, x: cx, y: cy, vx: svx / members.length, vy: svy / members.length, count: members.length });
      for (const m of members) m.merging = true;
      if (pendingClusters.length >= MAX_MERGES_PER_FRAME) return;
    }
  }
}

function processMerges() {
  for (let i = 0; i < pendingClusters.length; i++) {
    const c = pendingClusters[i];
    const count = c.count;
    const multiBonus = count >= 3 ? count : 1; // 3+ simultaneous = multiplier

    // Kill all members
    for (const m of c.members) m.dead = true;

    if (c.tier < MAX_TIER) {
      // How many tiers to advance? 2→+1, 3→+2, 4+→+2 (capped at MAX_TIER)
      const tierJump = count >= 3 ? Math.min(2, MAX_TIER - c.tier) : 1;
      const nt = c.tier + tierJump;
      const t = TIERS[nt];
      const nb = addBody(c.x, c.y, t.r, t.mass, 'pin');
      nb.tier = nt; nb.flashTimer = 8;
      // 実績トラッキング: tier到達
      if (window.incrementStat) {
        if (nt >= 2) window.setStatMax('bowling_tier2', 1);
        if (nt >= 3) window.setStatMax('bowling_tier3', 1);
        if (nt >= 4) window.setStatMax('bowling_tier4', 1);
      }
      nb.vx = c.vx * 0.4; nb.vy = c.vy * 0.4;
      mergeShockwave(c.x, c.y, nt);
      if (count >= 3) {
        spawnPopup(c.x, c.y - 40, count + '体合体！x' + multiBonus, '#FF6B6B');
        spawnPopup(c.x, c.y - 20, TIERS[nt].name + '!', '#FFD700');
      } else {
        spawnPopup(c.x, c.y - 20, TIERS[nt].name + '!', '#FFD700');
      }
    } else {
      triggerExplosion(c.x, c.y);
      if (count >= 3) {
        spawnPopup(c.x, c.y - 40, count + '体合体！x' + multiBonus, '#FF6B6B');
      }
    }
    spawnParticles(c.x, c.y, 8 + c.tier * 5 + count * 3);
    spawnRing(c.x, c.y, 40 + c.tier * 20, '#fff');
    if (count >= 3) spawnRing(c.x, c.y, 60 + c.tier * 25, '#FFD700');
    mergePitch = Math.min(mergePitch * 1.12, 2.5);
    playBuf(mergeBuf, 0.4 + c.tier * 0.15, mergePitch);
    const baseScore = (c.tier + 1) * 10 * (1 + combo * 0.5);
    score += Math.round(baseScore * multiBonus);
    combo++; comboTimer = COMBO_WINDOW;
    roundMerges += count >= 3 ? count : 1;
    triggerShake(0.3 + c.tier * 0.3 + (count >= 3 ? 0.5 : 0));
    if (c.tier >= 3) hitstopFrames = Math.min(hitstopFrames + 1, 3);
    bgFlash = Math.min(bgFlash + 0.02 + (count >= 3 ? 0.03 : 0), 0.15);
  }
  if (pendingClusters.length > 0 && combo >= 3) {
    comboEl.textContent = combo + ' 連鎖！';
    comboEl.classList.add('show');
    playBuf(comboBuf, Math.min(1, 0.3 + combo * 0.1), 1 + combo * 0.05);
  }
}

// ── Physics step ──
function physicsStep() {
  const n = bodies.length;
  for (let i = 0; i < n; i++) {
    const b = bodies[i];
    if (b.dead) continue;
    b.x += b.vx; b.y += b.vy;
    const spd2 = b.vx*b.vx + b.vy*b.vy;
    const f = spd2 > 9 ? 0.996 : spd2 > 1 ? 0.98 : 0.92;
    b.vx *= f; b.vy *= f;
    if (spd2 < 0.04) { b.vx = 0; b.vy = 0; }
    wallBounce(b);
  }
  for (let i = 0; i < n; i++) {
    if (bodies[i].dead) continue;
    for (let j = i + 1; j < n; j++) {
      if (bodies[j].dead) continue;
      const a = bodies[i], b = bodies[j];
      // Same-tier pin-pin: skip resolve (merge handles it)
      if (a.type === 'pin' && b.type === 'pin' && a.tier === b.tier) continue;
      // Ball-pin same tier: merge instead of collide
      const isBallPin = (a.type==='ball' && b.type==='pin') || (a.type==='pin' && b.type==='ball');
      if (isBallPin) {
        const ball = a.type === 'ball' ? a : b;
        const pin = a.type === 'pin' ? a : b;
        const dx = b.x-a.x, dy = b.y-a.y;
        const dist2 = dx*dx+dy*dy, minD = ball.r+pin.r;
        if (dist2 < minD*minD && dist2 > 0.001) {
          if (ball.tier === pin.tier) {
            // Same tier: MERGE!
            ballPinMerge(ball, pin);
            continue;
          }
          // Different tier: normal collision with penetration
          const preVx = a.vx-b.vx, preVy = a.vy-b.vy;
          const preSpd = Math.sqrt(preVx*preVx + preVy*preVy);
          const ballVxPre = ball.vx, ballVyPre = ball.vy;
          const strength = resolveCollision(a, b);
          if (strength > 0) {
            const impactForce = preSpd * ball.mass / pin.mass;
            if (impactForce > 6) {
              ball.vx = ballVxPre * 0.7;
              ball.vy = ballVyPre * 0.7;
              spawnParticles(pin.x, pin.y, 4);
            }
            if (preSpd > 2) {
              triggerShake(strength / 12);
              if (strength > 4) spawnParticles(pin.x, pin.y, 3);
            }
            if (preSpd > 2 && soundThrottle <= 0) {
              const intensity = Math.min(1, strength / 12);
              playBuf(bonkBuf, 0.15 + intensity*0.6, 0.7 + intensity*0.5 + (Math.random()-0.5)*0.2);
              soundThrottle = 3;
            }
            if (strength > maxHitStrength) maxHitStrength = strength;
          }
          continue;
        }
      }
      // All other collisions (pin-pin different tier)
      const preVx2 = a.vx-b.vx, preVy2 = a.vy-b.vy;
      const preSpd2 = Math.sqrt(preVx2*preVx2 + preVy2*preVy2);
      const str = resolveCollision(a, b);
      if (str > 0 && preSpd2 > 2 && soundThrottle <= 0) {
        const intensity = Math.min(1, str / 12);
        playBuf(bonkBuf, 0.15 + intensity*0.6, 0.7 + intensity*0.5 + (Math.random()-0.5)*0.2);
        soundThrottle = 3;
      }
    }
  }
  // Same-tier magnetic attraction
  for (let i = 0; i < n; i++) {
    const a = bodies[i];
    if (a.dead || a.type !== 'pin') continue;
    for (let j = i + 1; j < n; j++) {
      const b = bodies[j];
      if (b.dead || b.type !== 'pin') continue;
      if (a.tier !== b.tier) continue;
      const aSpd2 = a.vx*a.vx + a.vy*a.vy;
      const bSpd2 = b.vx*b.vx + b.vy*b.vy;
      if (aSpd2 < 0.5 && bSpd2 < 0.5) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist2 = dx*dx + dy*dy;
      const magnetDist = MAGNET_RANGE * (a.r + b.r);
      if (dist2 < magnetDist*magnetDist && dist2 > 1) {
        const dist = Math.sqrt(dist2);
        const mf = MAGNET_FORCE * (1 - dist / magnetDist);
        a.vx += (dx/dist) * mf;
        a.vy += (dy/dist) * mf;
        b.vx -= (dx/dist) * mf;
        b.vy -= (dy/dist) * mf;
      }
    }
  }
}

// ── Settled detection ──
function isSettled() {
  for (let i = 0; i < bodies.length; i++) {
    const b = bodies[i];
    if (b.dead) continue;
    if (b.type === 'ball') return false; // ball still exists
    if (b.vx*b.vx + b.vy*b.vy > 0.01) return false;
  }
  return true;
}

// ── Input ──
let aiming = false, aimStartX = 0, aimStartY = 0, aimCurX = 0, aimCurY = 0;

canvas.addEventListener('pointerdown', e => {
  if (gamePhase !== 'aim' && gamePhase !== 'bonus') return;
  e.preventDefault();
  aiming = true;
  aimStartX = aimCurX = e.clientX;
  aimStartY = aimCurY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!aiming) return;
  e.preventDefault();
  aimCurX = e.clientX;
  aimCurY = e.clientY;
});
canvas.addEventListener('pointerup', e => {
  if (!aiming) return;
  e.preventDefault();
  aiming = false;
  const dx = aimStartX - aimCurX;
  const dy = aimStartY - aimCurY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < MIN_DRAG) return;
  const nx = dx / dist, ny = dy / dist;

  if (gamePhase === 'bonus') {
    // Bonus: always tier0, rapid fire allowed
    const t = TIERS[0];
    const ballX = W / 2, ballY = H * BALL_SPAWN_Y;
    const b = addBody(ballX, ballY, t.r, t.mass + 3, 'ball');
    b.tier = 0;
    const speed = MIN_SPEED + (MAX_SPEED - MIN_SPEED) * Math.min(1, dist / 100);
    b.vx = nx * speed;
    b.vy = ny * speed;
    playBuf(launchBuf, 0.4, 0.8 + Math.random() * 0.3);
    return;
  }

  const t = TIERS[ballTier];
  const ballX = W / 2, ballY = H * BALL_SPAWN_Y;
  const b = addBody(ballX, ballY, t.r, t.mass + 3, 'ball'); // ball is heavier than same-tier pin
  b.tier = ballTier;
  const speed = MIN_SPEED + (MAX_SPEED - MIN_SPEED) * Math.min(1, dist / 100);
  b.vx = nx * speed;
  b.vy = ny * speed;
  playBuf(launchBuf, 0.4, 0.8 + Math.random() * 0.3);
  gamePhase = 'action';
  window._achDeferPopups = true; // defer achievement popups during gameplay
  roundMerges = 0;
  combo = 0; mergePitch = 1.0;
  if (window.incrementStat) window.incrementStat('bowling_rounds', 1);
  shotNumber++;
  ballTrail = []; // reset trail
});
canvas.addEventListener('pointercancel', () => { aiming = false; });

// ── Draw ──
function drawBg() {
  // HUD area (dark strip at top)
  ctx.fillStyle = '#0d3320';
  ctx.fillRect(0, 0, W, HUD_HEIGHT);

  // Game field below HUD
  if (bgFlash > 0.01) {
    const r = Math.round(30 + 225*bgFlash), g = Math.round(107 + 148*bgFlash), bv = Math.round(64 + 191*bgFlash);
    ctx.fillStyle = 'rgb('+r+','+g+','+bv+')';
  } else ctx.fillStyle = '#1e6b40';
  ctx.fillRect(0, HUD_HEIGHT, W, H - HUD_HEIGHT);

  // Field border
  ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 6; ctx.strokeRect(2, HUD_HEIGHT, W-4, H - HUD_HEIGHT - 2);
  ctx.strokeStyle = '#6B3410'; ctx.lineWidth = 2; ctx.strokeRect(6, HUD_HEIGHT + 4, W-12, H - HUD_HEIGHT - 10);

  // Dashed line
  ctx.globalAlpha = 0.2; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
  ctx.setLineDash([8, 6]);
  ctx.beginPath(); ctx.moveTo(12, H * 0.75); ctx.lineTo(W - 12, H * 0.75); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha = 1;
}

function drawHUD() {
  // Score
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 28px "Zen Maru Gothic"'; ctx.textAlign = 'right';
  ctx.fillText(score, W - 16, 35);

  // Best score & chain
  ctx.globalAlpha = 0.5; ctx.font = '12px "Zen Maru Gothic"';
  if (bestScore > 0) ctx.fillText('BEST: ' + bestScore, W - 16, 55);
  if (bestChain > 0) ctx.fillText('最高連鎖: ' + bestChain, W - 16, 70);
  ctx.globalAlpha = 1;

  // Shot counter
  if (shotNumber > 0) {
    ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.6;
    ctx.font = '14px "Zen Maru Gothic"'; ctx.textAlign = 'left';
    ctx.fillText('Shot ' + shotNumber, 56, 35);
    ctx.globalAlpha = 1;
  }
}

function drawBody(b) {
  if (b.dead) return;
  const tier = TIERS[b.tier], drawSize = tier.r*2, half = drawSize/2;
  if (b.flashTimer > 0) {
    ctx.globalAlpha = b.flashTimer / 8;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r+6, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
    ctx.globalAlpha = 1; b.flashTimer--;
  }
  // Shadow
  ctx.globalAlpha = 0.15 + b.tier*0.03;
  ctx.beginPath(); ctx.ellipse(b.x+2, b.y+3, b.r*0.9, b.r*0.5, 0, 0, Math.PI*2); ctx.fillStyle = '#000'; ctx.fill();
  ctx.globalAlpha = 1;
  // Image
  ctx.drawImage(tierCanvases[b.tier], b.x - half, b.y - half);
  // Ball indicator: ring around ball
  if (b.type === 'ball') {
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3; ctx.globalAlpha = 0.7;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r + 4, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawBodies() {
  for (let i = 0; i < bodies.length; i++) drawBody(bodies[i]);
}

function drawEffects() {
  // Rings
  let len = rings.length;
  for (let i = len-1; i >= 0; i--) {
    const r = rings[i]; r.radius += 3; r.alpha *= 0.92;
    if (r.alpha < 0.02 || r.radius > r.maxRadius) { rings[i] = rings[--len]; rings.length = len; continue; }
    ctx.globalAlpha = r.alpha; ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2);
    ctx.strokeStyle = r.color; ctx.lineWidth = 3; ctx.stroke();
  }
  // Particles
  len = particles.length;
  for (let i = len-1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= p.decay;
    if (p.life <= 0) { particles[i] = particles[--len]; particles.length = len; continue; }
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
  }
  // Popups
  len = popups.length;
  for (let i = len-1; i >= 0; i--) {
    const p = popups[i]; p.y += p.vy; p.life -= 0.02;
    if (p.life <= 0) { popups[i] = popups[--len]; popups.length = len; continue; }
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.font = 'bold 24px "Zen Maru Gothic"'; ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

let chainDisplay = 0, chainDisplayTimer = 0;
function drawChainCounter() {
  if (chainDisplayTimer > 0) {
    chainDisplayTimer--;
    ctx.globalAlpha = Math.min(1, chainDisplayTimer / 30);
    ctx.fillStyle = '#FF6B6B';
    ctx.font = 'bold 18px "Zen Maru Gothic"';
    ctx.textAlign = 'center';
    ctx.fillText(chainDisplay + '連鎖', W/2, HUD_HEIGHT + (H - HUD_HEIGHT) * 0.25);
    ctx.globalAlpha = 1;
  }
}

function drawBallPreview(now) {
  const ballX = W / 2, ballY = H * BALL_SPAWN_Y;
  const t = TIERS[ballTier];
  const half = t.r;

  if (aiming) {
    const dx = aimStartX - aimCurX, dy = aimStartY - aimCurY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > MIN_DRAG) {
      const nx = dx / dist, ny = dy / dist;
      const power = Math.min(1, dist / 100);
      ctx.globalAlpha = 0.4;
      for (let d = 0; d < 8; d++) {
        const dd = 30 + d * 25;
        ctx.beginPath();
        ctx.arc(ballX + nx * dd, ballY + ny * dd, 2 + (1-d/8)*3, 0, Math.PI*2);
        ctx.fillStyle = '#fff'; ctx.fill();
      }
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#333'; ctx.fillRect(ballX - 30, ballY + half + 10, 60, 8);
      const barColor = power < 0.5 ? '#4CAF50' : power < 0.8 ? '#FF9800' : '#F44336';
      ctx.fillStyle = barColor; ctx.fillRect(ballX - 30, ballY + half + 10, 60 * power, 8);
      ctx.globalAlpha = 1;
    }
    // Ball at rest
    ctx.globalAlpha = 0.9;
    ctx.drawImage(tierCanvases[ballTier], ballX - half, ballY - half);
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(ballX, ballY, half + 4, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
  } else {
    // Pulsing ball
    const pulse = 0.6 + Math.sin(now*0.004)*0.2;
    ctx.globalAlpha = pulse;
    ctx.drawImage(tierCanvases[ballTier], ballX - half, ballY - half);
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(ballX, ballY, half + 4, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

}

function drawBallTrail() {
  // Remove faded points
  while (ballTrail.length > 0 && ballTrail[0].alpha < 0.03) ballTrail.shift();
  if (ballTrail.length < 2) return;
  for (let i = 1; i < ballTrail.length; i++) {
    const a = ballTrail[i-1], b = ballTrail[i];
    if (a.alpha < 0.03) continue;
    ctx.globalAlpha = b.alpha * 0.4;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 1.5 + b.alpha * 1.5;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawBestScore() {
  // Now handled by drawHUD — kept as no-op for compatibility
  ctx.globalAlpha = 1;
}

function drawBonusIntro(now) {
  const hue = (now * 0.2) % 360;
  ctx.fillStyle = `hsl(${hue}, 60%, 25%)`;
  ctx.fillRect(0, 0, W, H);

  const alpha = Math.min(1, (120 - bonusIntroTimer) / 30);
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';

  const fieldCY = HUD_HEIGHT + (H - HUD_HEIGHT) * 0.4;

  const scale = 1 + Math.sin(now * 0.008) * 0.1;
  ctx.save();
  ctx.translate(W / 2, fieldCY);
  ctx.scale(scale, scale);
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 48px "Zen Maru Gothic"';
  ctx.fillText('ボーナス！', 0, 0);
  ctx.restore();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px "Zen Maru Gothic"';
  ctx.fillText('10びょうで たくさん たおそう！', W / 2, fieldCY + 55);

  ctx.font = '36px "Zen Maru Gothic"';
  for (let i = 0; i < 6; i++) {
    const angle = (now * 0.001 + i * Math.PI * 2 / 6);
    const sx = W / 2 + Math.cos(angle) * 120;
    const sy = fieldCY + Math.sin(angle) * 80;
    ctx.globalAlpha = alpha * (0.5 + Math.sin(now * 0.005 + i) * 0.3);
    ctx.fillText('⭐', sx - 18, sy + 12);
  }
  ctx.globalAlpha = 1;
}

function drawBonusHUD(now) {
  const elapsed = now - bonusStartTime;
  const remaining = Math.max(0, BONUS_DURATION - elapsed) / 1000;

  // HUD background
  ctx.fillStyle = '#1a0a2e';
  ctx.fillRect(0, 0, W, HUD_HEIGHT);

  // Bonus label
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 18px "Zen Maru Gothic"'; ctx.textAlign = 'left';
  ctx.fillText('★ BONUS ★', 56, 25);

  // Timer text
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px "Zen Maru Gothic"'; ctx.textAlign = 'center';
  ctx.fillText(remaining.toFixed(1) + 's', W / 2, 25);

  // Bonus score
  ctx.fillStyle = '#4ECDC4'; ctx.font = 'bold 18px "Zen Maru Gothic"'; ctx.textAlign = 'right';
  ctx.fillText('+' + bonusTotalScore, W - 16, 25);

  // Timer bar
  const ratio = remaining / (BONUS_DURATION / 1000);
  const barW = W - 24;
  const barH = 12;
  const barX = 12, barY = 38;
  ctx.fillStyle = '#333'; ctx.fillRect(barX, barY, barW, barH);
  const barColor = ratio > 0.3 ? '#4ECDC4' : ratio > 0.1 ? '#FF9800' : '#F44336';
  ctx.fillStyle = barColor; ctx.fillRect(barX, barY, barW * ratio, barH);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, barH);

  // Chain counter in HUD (small, just the number ticking up)
  if (combo >= 2) {
    ctx.fillStyle = '#FF6B6B'; ctx.font = 'bold 16px "Zen Maru Gothic"'; ctx.textAlign = 'center';
    ctx.fillText(combo + '連鎖', W / 2, 68);
  } else if (bonusMaxChain >= 2) {
    ctx.fillStyle = '#aaa'; ctx.font = '13px "Zen Maru Gothic"'; ctx.textAlign = 'center';
    ctx.fillText('最高 ' + bonusMaxChain + '連鎖', W / 2, 68);
  }

  // HUD bottom border
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, HUD_HEIGHT); ctx.lineTo(W, HUD_HEIGHT); ctx.stroke();
}

function drawBonusResult() {
  const alpha = Math.min(1, phaseTimer / 30);
  const fTop = HUD_HEIGHT + (H - HUD_HEIGHT) * 0.15;
  ctx.globalAlpha = alpha * 0.7;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, fTop, W, (H - HUD_HEIGHT) * 0.55);
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';

  let y = fTop + 45;
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 36px "Zen Maru Gothic"';
  ctx.fillText('ボーナス終了！', W / 2, y); y += 40;

  ctx.fillStyle = '#4ECDC4';
  ctx.font = 'bold 24px "Zen Maru Gothic"';
  ctx.fillText(bonusMerges + '回 合体！', W / 2, y); y += 35;

  if (bonusMaxChain >= 2) {
    ctx.fillStyle = '#FF6B6B';
    ctx.font = 'bold 22px "Zen Maru Gothic"';
    ctx.fillText('最高 ' + bonusMaxChain + '連鎖！', W / 2, y); y += 35;
  }

  let chainBonus = 0;
  if (bonusMaxChain >= 8) chainBonus = 2000;
  else if (bonusMaxChain >= 6) chainBonus = 1000;
  else if (bonusMaxChain >= 4) chainBonus = 500;
  else if (bonusMaxChain >= 2) chainBonus = 200;
  if (chainBonus > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 20px "Zen Maru Gothic"';
    ctx.fillText('連鎖ボーナス +' + chainBonus, W / 2, y); y += 35;
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px "Zen Maru Gothic"';
  ctx.fillText('合計 +' + bonusTotalScore + '点！', W / 2, y);

  ctx.globalAlpha = 1;
}

function drawResultOverlay() {
  const alpha = Math.min(1, phaseTimer / 30);
  const fieldMid = HUD_HEIGHT + (H - HUD_HEIGHT) * 0.35;
  ctx.globalAlpha = alpha * 0.6;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, fieldMid - 40, W, 120);
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';

  if (roundMerges > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 32px "Zen Maru Gothic"';
    ctx.fillText(roundMerges + '回合体！', W/2, fieldMid);
    const rating = roundMerges >= 6 ? 'すごい！！' : roundMerges >= 4 ? 'いいね！' : roundMerges >= 2 ? 'まあまあ' : 'おしい';
    const rColor = roundMerges >= 6 ? '#FF6B6B' : roundMerges >= 4 ? '#4CAF50' : '#aaa';
    ctx.fillStyle = rColor;
    ctx.font = 'bold 22px "Zen Maru Gothic"';
    ctx.fillText(rating, W/2, fieldMid + 30);
  } else {
    ctx.fillStyle = '#aaa';
    ctx.font = 'bold 28px "Zen Maru Gothic"';
    ctx.fillText('合体なし...', W/2, fieldMid);
    ctx.font = '18px "Zen Maru Gothic"';
    ctx.fillText('つぎはがんばろう！', W/2, fieldMid + 30);
  }
  const pinCount = bodies.filter(b => b.type === 'pin' && !b.dead).length;
  ctx.globalAlpha = alpha * 0.6;
  ctx.fillStyle = '#fff';
  ctx.font = '16px "Zen Maru Gothic"';
  ctx.fillText('Shot ' + shotNumber + '　　ピン ' + pinCount + '体', W/2, fieldMid + 60);
  ctx.globalAlpha = 1;
}

// ── Main loop ──
const PHYSICS_DT = 1000 / 60;
let accumulator = 0, prevFrameTime = performance.now();
let settledFrames = 0;

function loop(now) {
  let elapsed = now - prevFrameTime; prevFrameTime = now;
  if (elapsed > 100) elapsed = 100;
  // ── Phase logic ──
  if (gamePhase === 'arrange') {
    // Animate pins toward target positions
    let allArrived = true;
    for (let i = 0; i < bodies.length; i++) {
      const b = bodies[i];
      if (b.dead || b.type !== 'pin') continue;
      const dx = b.targetX - b.x, dy = b.targetY - b.y;
      if (dx*dx + dy*dy > 1) {
        b.x += dx * 0.1;
        b.y += dy * 0.1;
        allArrived = false;
      } else {
        b.x = b.targetX; b.y = b.targetY;
      }
    }
    phaseTimer--;
    if (phaseTimer <= 0 || allArrived) {
      // Snap all to target
      for (let i = 0; i < bodies.length; i++) {
        const b = bodies[i];
        if (b.type === 'pin' && !b.dead) { b.x = b.targetX; b.y = b.targetY; }
      }
      gamePhase = 'aim';
    }
  }

  if (gamePhase === 'action') {
    // Ball lifetime
    for (let i = bodies.length - 1; i >= 0; i--) {
      const b = bodies[i];
      if (b.type === 'ball' && !b.dead && now - b.born > BALL_LIFETIME) {
        // Ball stops → becomes a pin of its tier
        b.type = 'pin'; b.vx = 0; b.vy = 0;
      }
    }

    // Physics
    maxHitStrength = 0;
    if (hitstopFrames > 0) { hitstopFrames--; }
    else { accumulator += elapsed; while (accumulator >= PHYSICS_DT) { physicsStep(); accumulator -= PHYSICS_DT; } }
    if (soundThrottle > 0) soundThrottle--;

    // Merges
    const prevCombo = combo;
    detectMerges(); processMerges();
    if (combo > prevCombo && combo >= 3) { chainDisplay = combo; chainDisplayTimer = 60; }

    // Ball trail
    for (let i = 0; i < bodies.length; i++) {
      const b = bodies[i];
      if (b.type === 'ball' && !b.dead) {
        ballTrail.push({ x: b.x, y: b.y, alpha: 1 });
        if (ballTrail.length > MAX_TRAIL) ballTrail.shift();
      }
    }
    // Fade trail
    for (let i = 0; i < ballTrail.length; i++) ballTrail[i].alpha *= 0.92;

    // Check settled
    if (isSettled()) {
      settledFrames++;
      if (settledFrames > 30) { // wait 0.5s of calm
        gamePhase = 'result';
        phaseTimer = RESULT_TIME;
        settledFrames = 0;
        ballTrail = [];
        comboEl.classList.remove('show');
      }
    } else {
      settledFrames = 0;
    }
  }

  if (gamePhase === 'result') {
    phaseTimer--;
    if (phaseTimer <= 0) {
      // Update best score & chain record
      if (score > bestScore) { bestScore = score; localStorage.setItem('bowling_best', String(bestScore)); }
      if (roundMerges > roundBestMerges) roundBestMerges = roundMerges;
      // Record best chain from normal play
      if (chainDisplay > bestChain) { bestChain = chainDisplay; localStorage.setItem('bowling_best_chain', String(bestChain)); }
      // Check bonus trigger
      if (shouldTriggerBonus()) {
        startBonusIntro();
      } else {
        startArrangePhase();
      }
    }
  }

  // Bonus intro
  if (gamePhase === 'bonus_intro') {
    bonusIntroTimer--;
    if (bonusIntroTimer <= 0) {
      startBonusStage();
    }
  }

  // Bonus stage
  if (gamePhase === 'bonus') {
    const bonusElapsed = now - bonusStartTime;

    // Spawn new rows periodically
    if (now - bonusLastRowTime >= BONUS_ROW_INTERVAL) {
      spawnBonusRow();
      bonusLastRowTime = now;
    }

    // Physics (always running in bonus)
    maxHitStrength = 0;
    if (hitstopFrames > 0) { hitstopFrames--; }
    else { accumulator += elapsed; while (accumulator >= PHYSICS_DT) { physicsStep(); accumulator -= PHYSICS_DT; } }
    if (soundThrottle > 0) soundThrottle--;

    // Merges
    const prevCombo = combo;
    const prevScore = score;
    detectMerges(); processMerges();
    // Track bonus-specific stats
    const scoreGained = score - prevScore;
    if (scoreGained > 0) bonusTotalScore += scoreGained;
    if (combo > prevCombo) {
      bonusMerges++;
      if (combo > bonusMaxChain) bonusMaxChain = combo;
    }
    if (combo > prevCombo && combo >= 3) { chainDisplay = combo; chainDisplayTimer = 60; }

    // No ball trail in bonus stage

    // Remove old balls (shorter lifetime in bonus)
    for (let i = bodies.length - 1; i >= 0; i--) {
      const b = bodies[i];
      if (b.type === 'ball' && !b.dead && now - b.born > 3000) {
        b.dead = true;
      }
    }

    // Time's up
    if (bonusElapsed >= BONUS_DURATION) {
      endBonusStage();
    }
  }

  // Bonus result
  if (gamePhase === 'bonus_result') {
    phaseTimer--;
    if (phaseTimer <= 0) {
      // Back to normal play
      bodies.length = 0;
      for (let i = 0; i < 15; i++) {
        const t0 = TIERS[0];
        const b = addBody(W/2 + (Math.random()-0.5)*100, H*0.3 + (Math.random()-0.5)*100, t0.r, t0.mass, 'pin');
        b.tier = 0;
      }
      startArrangePhase();
    }
  }

  // Combo timer (not in bonus_intro)
  if (gamePhase !== 'bonus_intro') {
    if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) { combo = 0; mergePitch = 1.0; comboEl.classList.remove('show'); } }
  }
  if (bgFlash > 0) bgFlash *= 0.85;

  // Cleanup dead
  for (let i = bodies.length - 1; i >= 0; i--) { if (bodies[i].dead) { bodies[i] = bodies[bodies.length-1]; bodies.pop(); } }

  // Screen shake
  if (shakeLife > 0) { shakeX = (Math.random()-0.5)*shakeLife*2; shakeY = (Math.random()-0.5)*shakeLife*2; shakeLife -= 0.5; }
  else { shakeX = 0; shakeY = 0; }

  // ── Draw ──
  if (gamePhase === 'bonus_intro') {
    ctx.save(); ctx.translate(shakeX, shakeY);
    drawBonusIntro(now);
    drawEffects();
    ctx.restore();
  } else if (gamePhase === 'bonus') {
    ctx.save(); ctx.translate(shakeX, shakeY);
    // Bonus field bg (below HUD)
    const hue = ((now * 0.05) % 30) + 140;
    ctx.fillStyle = `hsl(${hue}, 45%, 22%)`;
    ctx.fillRect(0, HUD_HEIGHT, W, H - HUD_HEIGHT);
    // Field border
    ctx.strokeStyle = '#6B3410'; ctx.lineWidth = 4; ctx.strokeRect(4, HUD_HEIGHT + 2, W-8, H - HUD_HEIGHT - 6);
    drawBodies(); drawEffects();
    ctx.restore();
    drawBonusHUD(now);
    drawBallPreview(now);
  } else if (gamePhase === 'bonus_result') {
    ctx.save(); ctx.translate(shakeX, shakeY);
    drawBg(); drawBodies(); drawEffects();
    ctx.restore();
    drawBonusResult();
    drawHUD();
  } else {
    ctx.save(); ctx.translate(shakeX, shakeY);
    drawBg(); drawBallTrail(); drawBodies(); drawEffects(); drawChainCounter();
    ctx.restore();
    drawHUD();

    // Bonus countdown in HUD area
    if (shotNumber > 0) {
      const shotsUntilBonus = BONUS_INTERVAL - (shotNumber % BONUS_INTERVAL);
      if (shotsUntilBonus <= 3 && shotsUntilBonus > 0) {
        ctx.fillStyle = '#FFD700'; ctx.globalAlpha = 0.6 + Math.sin(now * 0.005) * 0.3;
        ctx.font = '14px "Zen Maru Gothic"'; ctx.textAlign = 'center';
        ctx.fillText('ボーナスまで あと ' + shotsUntilBonus + '!', W / 2, 70);
        ctx.globalAlpha = 1;
      }
    }

    // Phase-specific UI
    if (gamePhase === 'aim') {
      drawBallPreview(now);
      if (shotNumber === 0) {
        ctx.globalAlpha = 0.4 + Math.sin(now*0.004)*0.2;
        ctx.fillStyle = '#fff'; ctx.font = '18px "Zen Maru Gothic"'; ctx.textAlign = 'center';
        ctx.fillText('引っ張ってボールを発射！', W/2, H * BALL_SPAWN_Y - 40);
        ctx.globalAlpha = 1;
      }
    }

    if (gamePhase === 'result') {
      drawResultOverlay();
    }
  }

  requestAnimationFrame(loop);
}

// ── Initial setup: place tier0 pins and start arrange ──
for (let i = 0; i < 15; i++) {
  const t0 = TIERS[0];
  const b = addBody(W/2 + (Math.random()-0.5)*100, H*0.3 + (Math.random()-0.5)*100, t0.r, t0.mass, 'pin');
  b.tier = 0;
}
startArrangePhase();

requestAnimationFrame(loop);
</script>
