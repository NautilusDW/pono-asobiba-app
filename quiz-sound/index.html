<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=../wordmatch/index.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>あつめよう！ポノのもりのずかん へ移動します</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
  html,
  body {
    height: 100%;
    margin: 0;
  }

  body {
    display: grid;
    place-items: center;
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "BIZ UDPGothic", sans-serif;
    background: #f7edd5 url("../assets/images/wordmatch/title_back.jpg") center / cover no-repeat;
    color: #5a3d25;
  }

  .redirect-card {
    width: min(92vw, 520px);
    padding: 28px 30px;
    border-radius: 28px;
    background: rgba(255, 249, 238, 0.9);
    box-shadow: 0 18px 42px rgba(90, 61, 37, 0.16);
    text-align: center;
  }

  .redirect-card h1 {
    margin: 0 0 14px;
    font-size: clamp(1.2rem, 2vw, 1.7rem);
  }

  .redirect-card p {
    margin: 0;
    line-height: 1.8;
    font-weight: 700;
  }

  .redirect-card a {
    display: inline-block;
    margin-top: 18px;
    padding: 12px 22px;
    border-radius: 999px;
    background: linear-gradient(180deg, #fff8ec, #f3dfb2);
    color: inherit;
    text-decoration: none;
    font-weight: 900;
  }
</style>
</head>
<body>
  <main class="redirect-card">
    <h1>あつめよう！ポノのもりのずかん に まとまりました</h1>
    <p>こえさがしは もりずかん の なかに ひとつになったよ。<br>うごかない ときは したの ボタンから ひらいてね。</p>
    <a href="../wordmatch/index.html">もりずかんを ひらく</a>
  </main>
  <script>
    location.replace("../wordmatch/index.html");
  </script>
</body>
</html>
