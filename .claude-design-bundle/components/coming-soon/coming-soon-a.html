<!-- @dsCard group="Sections" name="✅ アプリ版ティーザー帯" subtitle="アプリ版を主役にしたComing Soonバナー" viewport="960x760" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✅ アプリ版準備中 ✅ ティーザー帯</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF8F0;
    --primary:#F2915A;
    --primary-deep:#C96A2E;
    --primary-light:#FDDCBF;
    --text:#5D4E37;
    --text-light:#A89880;
    --yellow:#FDE68A;
    --green:#9CCB7A;
    --shadow:rgba(93,78,55,.12);
    --radius:24px;
    --ease-pyoko:cubic-bezier(.34,1.56,.64,1);
    --dur-breath:2.4s;
  }
  html,body{margin:0;padding:0;font-family:'Zen Maru Gothic','Hiragino Maru Gothic Pro',sans-serif;background:var(--bg);color:var(--text);}
  .preview{padding:24px;display:flex;justify-content:center;}
  .app{
    position:relative;
    max-width:760px;
    width:100%;
    margin:0 auto;
    padding:28px 24px 26px;
    background:linear-gradient(135deg,#FDDCBF 0%,#FFF1DC 60%,#FFF8F0 100%);
    border-radius:24px;
    border:2px dashed var(--primary-deep);
    box-shadow:0 14px 34px rgba(201,106,46,.20);
    overflow:hidden;
    isolation:isolate;
  }
  .app-inner{
    display:grid;
    grid-template-columns:1.05fr .95fr;
    gap:22px;
    align-items:center;
  }
  @media (max-width:680px){
    .app-inner{grid-template-columns:1fr;gap:18px;}
  }
  .app-head{text-align:left;}
  .app-badge{
    display:inline-flex;align-items:center;gap:8px;
    padding:6px 14px;background:#fff;color:var(--primary-deep);
    border:2px solid var(--primary-deep);
    border-radius:999px;font-size:12px;font-weight:900;letter-spacing:.06em;
    box-shadow:0 4px 0 rgba(0,0,0,.06);
    animation:cs-pulse var(--dur-breath) var(--ease-pyoko) infinite;
  }
  .app-badge .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--primary);box-shadow:0 0 0 4px rgba(242,145,90,.22);
  }
  .app-h{
    margin:14px 0 10px;
    font-size:clamp(22px,5.4vw,30px);
    font-weight:900;color:var(--text);line-height:1.4;letter-spacing:.01em;
  }
  .app-h .u{
    background:linear-gradient(transparent 55%, var(--yellow) 55%);
    padding:0 6px;display:inline-block;transform:rotate(-1deg);
  }
  .app-pitch{
    margin:8px 0 10px;font-size:clamp(15px,3.8vw,18px);
    font-weight:800;color:var(--text);line-height:1.6;
  }
  .app-pitch .hl{
    background:linear-gradient(transparent 60%, var(--green) 60%);
    padding:0 6px;display:inline-block;
  }
  .app-note{
    margin:10px 0 0;font-size:clamp(12px,3vw,14px);
    color:var(--text-light);line-height:1.7;font-weight:600;
  }
  .stage{
    position:relative;width:100%;aspect-ratio:1/1.05;max-width:340px;
    margin:0 auto;
  }
  .glow{
    position:absolute;inset:8% 8% 8% 8%;
    background:radial-gradient(closest-side,rgba(255,224,122,.55),rgba(255,224,122,0) 70%);
    filter:blur(2px);
    animation:cs-halo 3.6s ease-in-out infinite;
    z-index:0;
  }
  .chip{
    position:absolute;width:42px;height:42px;border-radius:13px;background:#fff;
    display:flex;align-items:center;justify-content:center;font-size:20px;
    box-shadow:0 8px 18px rgba(93,78,55,.18);z-index:3;
    animation:cs-chipfloat 5s ease-in-out infinite;
  }
  .chip.c1{top:8%;  left:calc(50% - 138px);background:#FFE0C2;animation-delay:0s;}
  .chip.c2{top:54%; left:calc(50% - 150px);background:#D9EFC6;animation-delay:1.4s;}
  .chip.c3{top:8%;  left:calc(50% + 98px); background:#F7D7DE;animation-delay:.4s;}
  .chip.c4{top:54%; left:calc(50% + 110px);background:#FDEBB0;animation-delay:1.8s;}
  .chip.c5,.chip.c6{display:none;}
  @media (min-width:760px){
    .chip{width:46px;height:46px;font-size:22px;}
    .chip.c1{top:6%;  left:calc(50% - 168px);}
    .chip.c2{top:30%; left:calc(50% - 196px);background:#CFE7F5;animation-delay:.7s;}
    .chip.c3{top:4%;  left:calc(50% + 122px);}
    .chip.c4{top:62%; left:calc(50% + 126px);}
    .chip.c5{display:flex;top:60%;left:calc(50% - 172px);background:#D9EFC6;animation-delay:1.4s;}
    .chip.c6{display:flex;top:32%;left:calc(50% + 150px);background:#E7D7F2;animation-delay:1.1s;}
  }
  .phone{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:62%;aspect-ratio:9/18;
    background:#2A241B;
    border-radius:30px;
    box-shadow:
      0 18px 40px rgba(93,78,55,.32),
      inset 0 0 0 3px #3B3326;
    padding:8px;
    z-index:2;
    animation:cs-floaty 4.4s ease-in-out infinite;
  }
  .notch{
    position:absolute;top:8px;left:50%;transform:translateX(-50%);
    width:38%;height:14px;background:#000;border-radius:0 0 12px 12px;
    z-index:3;
  }
  .pscreen{
    position:relative;width:100%;height:100%;
    background:linear-gradient(180deg,#FFF1DC,#FFF8F0);
    border-radius:22px;overflow:hidden;
    display:flex;flex-direction:column;
  }
  .ph-badge{
    position:absolute;top:10px;right:-8px;z-index:3;
    display:inline-flex;align-items:center;gap:4px;
    padding:5px 10px 5px 8px;
    background:var(--primary-deep);color:#fff;
    border-radius:8px;font-size:10px;font-weight:900;letter-spacing:.04em;
    transform:rotate(8deg);
    box-shadow:0 3px 8px rgba(201,106,46,.32);
  }
  .ph-badge .ic{font-size:11px;}
  .ph-top{
    padding:22px 12px 8px;text-align:center;
  }
  .ph-top .ttl{
    font-size:clamp(11px,2.5vw,13px);
    font-weight:900;color:var(--primary-deep);letter-spacing:.04em;
  }
  .ph-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:6px;
    padding:6px 10px 4px;
  }
  .gt{
    aspect-ratio:1/1;background:#fff;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    box-shadow:0 2px 6px rgba(93,78,55,.10);
  }
  .gt.more{
    font-size:10px;font-weight:900;color:var(--primary-deep);
    background:linear-gradient(135deg,#FFE9B8,#FFD17A);
    animation:cs-morepulse 1.8s ease-in-out infinite;
  }
  .ph-fade{
    position:absolute;left:0;right:0;bottom:0;height:30%;
    background:linear-gradient(180deg,rgba(255,248,240,0),rgba(255,248,240,.95));
    pointer-events:none;z-index:1;
  }
  .ph-pono{
    position:absolute;left:50%;bottom:-2%;
    transform:translateX(-50%);
    width:62%;height:auto;
    z-index:2;pointer-events:none;
  }
  .notify{
    margin-top:16px;text-align:center;
    padding:10px 14px;
    background:rgba(255,255,255,.55);
    border-radius:14px;
    border:1px dashed rgba(201,106,46,.45);
    grid-column:1/-1;
  }
  .notify p{
    margin:0;font-size:clamp(12px,3vw,14px);
    color:var(--text);font-weight:800;line-height:1.6;
  }
  .notify p span{
    display:block;font-size:11px;font-weight:600;color:var(--text-light);
    margin-top:2px;
  }
  @keyframes cs-pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.06);}
  }
  @keyframes cs-halo{
    0%,100%{transform:scale(1);opacity:.85;}
    50%{transform:scale(1.06);opacity:1;}
  }
  @keyframes cs-chipfloat{
    0%,100%{transform:translateY(0) rotate(0);}
    50%{transform:translateY(-6px) rotate(6deg);}
  }
  @keyframes cs-floaty{
    0%,100%{transform:translate(-50%,-50%);}
    50%{transform:translate(-50%,calc(-50% - 4px));}
  }
  @keyframes cs-morepulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
  }
  @media (prefers-reduced-motion:reduce){
    .app-badge,.glow,.chip,.phone,.gt.more{animation:none!important;}
  }
</style>
</head>
<body>
<div class="preview">
  <section class="app" aria-labelledby="app-h">
    <div class="app-inner">
      <div class="app-head">
        <span class="app-badge"><span class="dot"></span>いま つくっています</span>
        <h2 class="app-h" id="app-h">ポノの あそびばが<br><span class="u">アプリ</span> に なります！</h2>
        <p class="app-pitch">ゲームも コンテンツも、<br><span class="hl">うんと ボリュームアップ。</span></p>
        <p class="app-note">いまより ずっと たくさんの あそびが ぎゅっと つまった、 とくべつな あそびば。 わくわくする まいにちを、 いま ポノと いっしょに つくっています！</p>
      </div>
      <div class="stage">
        <div class="glow"></div>
        <span class="chip c1">🌱</span>
        <span class="chip c2">🎵</span>
        <span class="chip c3">🧩</span>
        <span class="chip c4">🎮</span>
        <span class="chip c5">🦊</span>
        <span class="chip c6">⭐</span>
        <div class="phone">
          <div class="notch"></div>
          <div class="ph-badge"><span class="ic">📱</span>じゅんびちゅう</div>
          <div class="pscreen">
            <div class="ph-top"><span class="ttl">ポノのあそびば</span></div>
            <div class="ph-grid">
              <div class="gt">🌱</div>
              <div class="gt">🎮</div>
              <div class="gt">🎵</div>
              <div class="gt">🧩</div>
              <div class="gt">🦊</div>
              <div class="gt more">+もっと</div>
            </div>
            <div class="ph-fade"></div>
            <img class="ph-pono"
                 src="https://pono-asobiba-staging.ndw.workers.dev/assets/images/characters/pono/dance/dance_hooray.png"
                 srcset="https://pono-asobiba-staging.ndw.workers.dev/assets/images/characters/pono/dance/dance_hooray.webp"
                 alt="よろこぶ いまのポノ">
          </div>
        </div>
      </div>
      <div class="notify">
        <p>わくわくしながら じゅんびちゅう！<span>かんせいしたら、 この あそびばで おしらせします。</span></p>
      </div>
    </div>
  </section>
</div>
</body>
</html>
