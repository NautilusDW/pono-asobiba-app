<!-- @dsCard group="Sections" name="✅ アプリ版ティーザー帯 (案B Sticker Banner)" subtitle="シール風バナー + タップで詳細モーダル" viewport="560x360" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✅ アプリ版準備中 ✅ 案B Sticker Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Mochiy+Pop+One&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF8F0;
    --primary:#F2915A;
    --primary-deep:#C96A2E;
    --primary-light:#FDDCBF;
    --text:#5D4E37;
    --text-light:#A89880;
    --yellow:#FFE07A;
  }
  html,body{margin:0;padding:0;font-family:'Zen Maru Gothic','Hiragino Maru Gothic Pro',sans-serif;background:var(--bg);color:var(--text);}
  .preview{padding:24px;display:flex;justify-content:center;}

  /* ========== Coming Soon (Stitch 案 B: Sticker Banner + 詳細モーダル / scope: .coming-soon) ========== */
  .coming-soon{
    --cs-bg:#FFF8F0; --cs-primary:#F2915A; --cs-primary-deep:#C96A2E; --cs-primary-light:#FDDCBF;
    --cs-text:#5D4E37; --cs-text-light:#A89880; --cs-yellow:#FFE07A;
    max-width:560px;margin:0 auto;font-family:'Zen Maru Gothic','Hiragino Maru Gothic Pro',sans-serif;
  }
  .cs-banner{
    position:relative;display:flex;align-items:center;gap:16px;width:100%;min-height:128px;
    padding:18px 20px;box-sizing:border-box;text-align:left;cursor:pointer;
    background:var(--cs-bg);
    background-image:repeating-linear-gradient(0deg, rgba(201,106,46,.07) 0 1px, transparent 1px 26px);
    border:2px dashed var(--cs-primary-light);border-radius:18px;
    box-shadow:0 2px 8px rgba(93,78,55,.08);font-family:inherit;color:var(--cs-text);
    transform:rotate(-1.5deg);transition:transform .2s ease,box-shadow .2s ease;margin:8px 0;
  }
  .cs-banner:hover{transform:rotate(-1.5deg) translateY(-2px);box-shadow:0 6px 16px rgba(93,78,55,.14);}
  .cs-banner:focus-visible{outline:2px solid var(--cs-primary);outline-offset:4px;}
  .cs-copy{flex:1;min-width:0;}
  .cs-copy .cs-eyebrow{display:inline-flex;align-items:center;gap:5px;font-weight:900;font-size:10px;
    letter-spacing:.16em;color:#fff;background:var(--cs-primary);padding:3px 10px;border-radius:999px;
    margin:0 0 7px;box-shadow:0 2px 5px rgba(201,106,46,.3);white-space:nowrap;align-self:flex-start;}
  .cs-copy .cs-eyebrow .dot{width:5px;height:5px;border-radius:50%;background:var(--cs-yellow);}
  .cs-copy .lead{display:flex;flex-direction:column;gap:3px;margin:0;text-wrap:balance;}
  .cs-copy .l1{font-weight:700;font-size:clamp(14px,3.3vw,17px);color:var(--cs-text);letter-spacing:.02em;}
  .cs-copy .l1 .brand{font-weight:900;color:var(--cs-primary);}
  .cs-copy .l2{font-family:'Mochiy Pop One','Zen Maru Gothic',sans-serif;font-weight:400;
    font-size:clamp(23px,6.2vw,31px);line-height:1.25;color:var(--cs-primary-deep);letter-spacing:.01em;}
  .cs-copy .l2 .mark{position:relative;white-space:nowrap;z-index:0;}
  .cs-copy .l2 .mark::after{content:"";position:absolute;left:-3%;right:-3%;bottom:.04em;height:.42em;
    background:var(--cs-yellow);opacity:.7;z-index:-1;border-radius:3px;transform:rotate(-.6deg);}
  .cs-copy .l3{font-weight:700;font-size:clamp(13px,3.2vw,16px);line-height:1.55;color:var(--cs-text);margin-top:4px;}
  .cs-copy .l3 > span{display:inline-block;white-space:nowrap;}
  .cs-copy .l3 .big{font-weight:900;color:var(--cs-primary-deep);}
  .cs-tap{position:absolute;right:16px;bottom:9px;font-weight:700;font-size:11.5px;color:var(--cs-text-light);}
  .cs-icon{flex:none;width:70px;height:70px;border-radius:16px;overflow:hidden;
    background:#FBEAD6;box-shadow:0 0 0 2px var(--cs-primary),0 3px 8px rgba(0,0,0,.16);
    transform:translateY(-8px) rotate(2.5deg);}
  .cs-icon img{width:100%;height:100%;object-fit:cover;object-position:center 40%;transform:scale(1.05);display:block;}
  .cs-modal{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
    padding:20px;background:rgba(93,78,55,.45);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
    opacity:0;visibility:hidden;transition:opacity .26s ease,visibility .26s ease;}
  .cs-modal.is-open{opacity:1;visibility:visible;}
  .cs-modal-box{width:min(480px,92vw);max-height:90vh;overflow-y:auto;background:var(--cs-bg);
    border-radius:24px;padding:28px 24px 24px;text-align:center;box-shadow:0 24px 60px rgba(44,36,24,.32);
    transform:translateY(12px) scale(.98);transition:transform .26s ease;position:relative;}
  .cs-modal.is-open .cs-modal-box{transform:none;}
  .cs-modal-close{position:absolute;top:10px;right:10px;width:44px;height:44px;border:none;background:transparent;
    color:var(--cs-text-light);font-size:24px;line-height:1;cursor:pointer;border-radius:50%;
    display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .cs-modal-close:hover{background:rgba(93,78,55,.08);}
  .cs-modal-close:focus-visible{outline:2px solid var(--cs-primary);outline-offset:2px;}
  .cs-modal-icon{width:130px;height:130px;border-radius:30px;overflow:hidden;margin:6px auto 0;
    background:#FBEAD6;box-shadow:0 0 0 3px var(--cs-primary),0 6px 16px rgba(0,0,0,.14);}
  .cs-modal-icon img{width:100%;height:100%;object-fit:cover;object-position:center 40%;transform:scale(1.05);display:block;}
  .cs-modal-title{font-weight:900;font-size:clamp(20px,4.5vw,26px);color:var(--cs-text);margin:16px 0 0;}
  .cs-modal-lead{font-weight:700;font-size:clamp(13px,3.2vw,15px);color:var(--cs-text);line-height:1.7;margin:10px auto 0;max-width:360px;}
  .cs-modal-list{list-style:none;margin:18px auto 0;padding:0;max-width:320px;display:flex;flex-direction:column;gap:9px;}
  .cs-modal-list li{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:13px;
    background:#FFF1E5;font-weight:900;font-size:.92rem;color:var(--cs-text);text-align:left;}
  .cs-modal-list li .b{flex:none;width:22px;height:22px;border-radius:50%;background:var(--cs-primary);
    color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;}
  .cs-modal-foot{font-weight:700;font-size:clamp(12px,3vw,14px);color:var(--cs-text-light);line-height:1.7;margin:18px 0 0;}
  @media (prefers-reduced-motion:reduce){
    .cs-banner{transform:rotate(-1deg);transition-duration:.01s;}
    .cs-banner:hover{transform:rotate(-1deg);}
    .cs-modal,.cs-modal-box{transition-duration:.01s;}
  }
  @media (max-width:420px){
    .cs-banner{transform:rotate(-1deg);}
    .cs-banner:hover{transform:rotate(-1deg) translateY(-2px);}
    .cs-icon{width:62px;height:62px;}
  }
</style>
</head>
<body>
<div class="preview">
  <section class="coming-soon">
    <button type="button" class="cs-banner" aria-haspopup="dialog" aria-controls="cs-modal"
            aria-label="ポノのあそびば アプリ化のおしらせを ひらく">
      <span class="cs-copy">
        <span class="cs-eyebrow" aria-hidden="true"><span class="dot"></span>COMING SOON</span>
        <span class="lead">
          <span class="l1"><span class="brand">ポノの あそびば</span>が</span>
          <span class="l2"><span class="mark">アプリに なります！</span></span>
          <span class="l3"><span class="np">ゲームも コンテンツも</span> <span class="big">うんと ボリュームアップ。</span></span>
        </span>
      </span>
      <span class="cs-icon"><img src="../../../assets/images/characters/pono/pono_face_circle.png" alt="ポノのアプリアイコン"></span>
      <span class="cs-tap" aria-hidden="true">タップで くわしく →</span>
    </button>

    <div class="cs-modal" id="cs-modal" role="dialog" aria-modal="true" aria-labelledby="cs-modal-title" hidden>
      <div class="cs-modal-box">
        <button type="button" class="cs-modal-close" aria-label="とじる">×</button>
        <h2 class="cs-modal-title" id="cs-modal-title">いま つくっています</h2>
        <div class="cs-modal-icon"><img src="../../../assets/images/characters/pono/pono_face_circle.png" alt="ポノのアプリアイコン"></div>
        <p class="cs-modal-lead">ポノの あそびばが、スマホ・タブレットの アプリに。 これから こんなことが できるように なります。</p>
        <ul class="cs-modal-list">
          <li><span class="b">✓</span>もっと たくさんの ゲーム</li>
          <li><span class="b">✓</span>あたらしい あそびば</li>
          <li><span class="b">✓</span>ポノからの とくべつな おしらせ</li>
          <li><span class="b">✓</span>ホーム画面に おける アプリアイコン</li>
        </ul>
        <p class="cs-modal-foot">じゅんびが できたら、 ここで おしらせするね。</p>
      </div>
    </div>
  </section>
</div>
<script>
  (function(){
    var section = document.querySelector('.coming-soon');
    if(!section) return;
    var banner = section.querySelector('.cs-banner');
    var modal = section.querySelector('#cs-modal');
    var closeBtn = modal.querySelector('.cs-modal-close');
    var lastFocus = null;
    function open(){
      lastFocus = document.activeElement;
      modal.hidden = false;
      requestAnimationFrame(function(){ modal.classList.add('is-open'); closeBtn.focus(); });
      document.addEventListener('keydown', onKey);
    }
    function close(){
      modal.classList.remove('is-open');
      document.removeEventListener('keydown', onKey);
      var done = function(){ modal.hidden = true; modal.removeEventListener('transitionend', done); };
      modal.addEventListener('transitionend', done);
      setTimeout(done, 320);
      if(lastFocus) lastFocus.focus();
    }
    function onKey(e){
      if(e.key === 'Escape'){ close(); return; }
      if(e.key === 'Tab'){ e.preventDefault(); closeBtn.focus(); }
    }
    banner.addEventListener('click', open);
    closeBtn.addEventListener('click', close);
    modal.addEventListener('click', function(e){ if(e.target === modal) close(); });
  })();
</script>
</body>
</html>
