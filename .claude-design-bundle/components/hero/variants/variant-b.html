<!-- @dsCard group="Hero" name="案B 体験予告優先" subtitle="中で何ができるかを先に見せる / Amazonは CTA直下にコンパクト" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案B — 体験予告優先 (Play-First)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF8F0; --primary:#F2915A; --primary-deep:#C96A2E; --primary-light:#FDDCBF;
    --text:#5D4E37; --text-light:#A89880; --shadow:rgba(93,78,55,.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;font-family:'Zen Maru Gothic','Hiragino Maru Gothic Pro',sans-serif;color:var(--text);
    background:var(--bg);
    background-image:
      radial-gradient(circle at 18% 8%, rgba(253,220,191,.55), transparent 46%),
      radial-gradient(circle at 84% 92%, rgba(253,230,138,.32), transparent 52%);
    -webkit-font-smoothing:antialiased;}

  .herob{max-width:1040px;margin:0 auto;padding:26px 18px 36px;text-align:center;}

  .herob-title{font-weight:900;font-size:clamp(26px,5.6vw,48px);line-height:1.2;letter-spacing:.02em;margin:0;color:var(--text);
    animation:herob-rise .6s ease both;}
  .herob-title .accent{color:var(--primary-deep);}
  .herob-lead{font-weight:700;font-size:clamp(13px,3.2vw,17px);color:var(--text-light);margin:10px auto 0;
    animation:herob-rise .6s .06s ease both;}

  /* --- あそびば プレビュー枠 --- */
  .herob-preview{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:560px;margin:22px auto 0;
    animation:herob-rise .6s .12s ease both;}
  .herob-thumb{position:relative;aspect-ratio:4/3;border-radius:18px;overflow:hidden;
    box-shadow:0 4px 14px var(--shadow);background:var(--primary-light);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    color:#9A6A3E;border:2px solid rgba(255,255,255,.6);}
  .herob-thumb .emoji{font-size:clamp(26px,7vw,40px);line-height:1;}
  .herob-thumb b{font-size:clamp(.82rem,2.6vw,1rem);font-weight:900;letter-spacing:.02em;}
  .herob-thumb::before{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(135deg,rgba(255,255,255,.28) 0 12px,transparent 12px 24px);opacity:.7;}
  .herob-thumb>*{position:relative;}
  .herob-thumb.t1{background:linear-gradient(135deg,#FDE3C9,#F9CEA6);}
  .herob-thumb.t2{background:linear-gradient(135deg,#FCE7B0,#F7D98A);}
  .herob-thumb.t3{background:linear-gradient(135deg,#FAD9C4,#F4BE9A);}
  .herob-thumb.t4{background:linear-gradient(135deg,#FBE5CB,#F6CFA0);}

  /* --- チップ群 --- */
  .herob-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:560px;margin:18px auto 0;
    animation:herob-rise .6s .18s ease both;}
  .herob-chip{background:var(--primary-light);color:var(--text);font-weight:900;font-size:clamp(12px,3vw,14px);
    padding:8px 16px;border-radius:999px;letter-spacing:.02em;}

  /* --- CTA --- */
  .herob-cta-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin:24px auto 0;
    animation:herob-rise .6s .24s ease both;}
  .herob-cta{display:inline-flex;align-items:center;justify-content:center;gap:.5em;min-height:56px;
    padding:14px 44px;background:var(--primary-deep);color:#fff;font-weight:900;
    font-size:clamp(18px,4.6vw,24px);letter-spacing:.06em;text-decoration:none;border-radius:26px;
    box-shadow:0 6px 20px rgba(201,106,46,.32);transition:transform .25s ease,box-shadow .25s ease;}
  .herob-cta:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(201,106,46,.4);}
  .herob-free{font-weight:700;font-size:clamp(12px,3vw,14px);color:var(--text-light);letter-spacing:.04em;margin:0;}

  /* --- Amazon (CTA直下にコンパクト) --- */
  .herob-book{max-width:560px;margin:28px auto 0;animation:herob-rise .6s .3s ease both;}
  .herob-book-h{font-weight:900;font-size:clamp(13px,3.2vw,15px);color:var(--text-light);margin:0 0 8px;letter-spacing:.04em;}
  .herob-amazon{display:block;width:100%;border-radius:14px;overflow:hidden;box-shadow:0 3px 12px var(--shadow);
    text-decoration:none;transition:transform .25s ease;}
  .herob-amazon:hover{transform:translateY(-2px);}
  .herob-amazon img{display:block;width:100%;height:auto;}
  .herob-amazon .fallback{display:none;background:linear-gradient(135deg,#FFB066,#FFD9A8);color:#5D3A14;
    text-align:center;padding:16px;font-weight:900;font-size:.92rem;line-height:1.45;}
  .herob-amazon .fallback small{display:block;font-size:.72rem;font-weight:700;margin-top:4px;opacity:.85;}

  @keyframes herob-rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.herob *{animation:none!important;}}

  /* ===== iPad 縦 768 ===== */
  @media (min-width:768px){
    .herob{padding:34px 32px 48px;}
    .herob-preview{grid-template-columns:repeat(4,1fr);max-width:760px;gap:14px;}
    .herob-chips,.herob-cta-wrap,.herob-book{max-width:680px;}
  }
  /* ===== PC 1200 ===== */
  @media (min-width:1200px){
    .herob{padding:48px 40px 56px;}
    .herob-preview{max-width:880px;}
  }
</style>
</head>
<body>

<section class="herob" aria-labelledby="herob-h">
  <h1 class="herob-title" id="herob-h">みて、さわって、<span class="accent">あそぼう</span></h1>
  <p class="herob-lead">ポノの あそびばで できること</p>

  <!-- あそびば プレビュー (既存ゲームのスクショ/スプライトを差し込む枠) -->
  <div class="herob-preview" aria-label="あそびばのプレビュー">
    <div class="herob-thumb t1"><span class="emoji">✏️</span><b>ひらがななぞり</b></div>
    <div class="herob-thumb t2"><span class="emoji">🎨</span><b>おえかき</b></div>
    <div class="herob-thumb t3"><span class="emoji">🧩</span><b>めいろ</b></div>
    <div class="herob-thumb t4"><span class="emoji">🍱</span><b>おべんとう</b></div>
  </div>

  <div class="herob-chips">
    <span class="herob-chip">2〜7さい</span>
    <span class="herob-chip">もじ</span>
    <span class="herob-chip">かず</span>
    <span class="herob-chip">おえかき</span>
    <span class="herob-chip">パズル</span>
  </div>

  <div class="herob-cta-wrap">
    <a href="play.html" class="herob-cta">すぐ あそぶ <span class="arrow">→</span></a>
    <p class="herob-free">きほんの あそびは むりょうだよ</p>
  </div>

  <!-- Amazon バナーは CTA 直下にコンパクト (削除しない) -->
  <div class="herob-book">
    <p class="herob-book-h">もとになった えほん</p>
    <a href="https://www.amazon.co.jp/dp/B0FFTBS9TM" class="herob-amazon" target="_blank" rel="noopener noreferrer" aria-label="Amazonで絵本を見る">
      <picture>
        <source media="(max-width:768px)" srcset="https://pono-asobiba-staging.ndw.workers.dev/assets/images/Amazon_mobile.webp" type="image/webp">
        <source srcset="https://pono-asobiba-staging.ndw.workers.dev/assets/images/Amazon_pc.webp" type="image/webp">
        <img src="https://pono-asobiba-staging.ndw.workers.dev/assets/images/Amazon%E3%83%AA%E3%83%B3%E3%82%AF.png" alt="Amazonで絵本『ありがとうって、うれしいね』発売中" loading="lazy"
             onerror="this.style.display='none';this.closest('.herob-amazon').querySelector('.fallback').style.display='block';">
      </picture>
      <div class="fallback">Amazonで絵本「ありがとうって、うれしいね」発売中<small>▶ Amazon.co.jp で見る</small></div>
    </a>
  </div>
</section>

</body>
</html>
