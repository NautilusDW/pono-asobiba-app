<!-- @dsCard group="Hero" name="案C ハイブリッド" subtitle="絵本と遊び場を横に並べて橋渡し / メインはあそびば、絵本はサブ強度" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案C — ハイブリッド (Bridge)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF8F0; --primary:#F2915A; --primary-deep:#C96A2E; --primary-light:#FDDCBF;
    --text:#5D4E37; --text-light:#A89880; --shadow:rgba(93,78,55,.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;font-family:'Zen Maru Gothic','Hiragino Maru Gothic Pro',sans-serif;color:var(--text);
    background:var(--bg);
    background-image:
      radial-gradient(circle at 18% 8%, rgba(253,220,191,.55), transparent 46%),
      radial-gradient(circle at 84% 92%, rgba(253,230,138,.32), transparent 52%);
    -webkit-font-smoothing:antialiased;}

  .heroc{max-width:1040px;margin:0 auto;padding:26px 18px 36px;}

  /* --- 2カード (モバイル縦積み: 書影 → あそびば) --- */
  .heroc-cards{display:flex;flex-direction:column;gap:16px;}
  .heroc-card{border-radius:24px;padding:20px;box-shadow:0 4px 16px var(--shadow);display:flex;flex-direction:column;
    align-items:center;text-align:center;gap:14px;animation:heroc-rise .6s ease both;}

  /* 絵本カード (サブ強度) */
  .heroc-book{background:#FFFDF8;border:1px solid #FDE68A;order:1;}
  .heroc-book-visual{width:128px;aspect-ratio:3/4;border-radius:12px;overflow:hidden;box-shadow:0 4px 14px var(--shadow);
    background:var(--primary-light);position:relative;}
  .heroc-book-visual img{display:block;width:100%;height:100%;object-fit:cover;}
  .heroc-book-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    background:repeating-linear-gradient(135deg,rgba(255,255,255,.35) 0 12px,transparent 12px 24px),linear-gradient(135deg,#FDDCBF,#F7C9A3);
    color:#9A6A3E;padding:8px;}
  .heroc-book-ph b{font-size:.8rem;font-weight:900;}
  .heroc-book-ph code{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:.62rem;}
  .heroc-card-label{font-weight:900;font-size:clamp(15px,3.6vw,18px);color:var(--text);margin:0;}
  .heroc-sub-cta{display:inline-flex;align-items:center;justify-content:center;gap:.4em;min-height:48px;
    padding:10px 26px;background:transparent;color:var(--primary-deep);border:2.5px solid var(--primary);
    font-weight:900;font-size:clamp(14px,3.6vw,16px);letter-spacing:.04em;text-decoration:none;border-radius:20px;
    transition:background .2s ease,transform .2s ease;}
  .heroc-sub-cta:hover{background:var(--primary-light);transform:translateY(-2px);}

  /* あそびばカード (メイン) */
  .heroc-play{background:linear-gradient(150deg,#FDE3C9,#FBD4B0);border:1px solid rgba(255,255,255,.7);order:2;
    animation-delay:.08s;}
  .heroc-play-visual{width:128px;height:128px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:64px;background:#FFF8F0;box-shadow:0 4px 14px var(--shadow);}
  .heroc-main-cta{display:inline-flex;align-items:center;justify-content:center;gap:.5em;min-height:56px;
    padding:14px 34px;background:var(--primary-deep);color:#fff;font-weight:900;
    font-size:clamp(17px,4.4vw,22px);letter-spacing:.06em;text-decoration:none;border-radius:24px;
    box-shadow:0 6px 20px rgba(201,106,46,.32);transition:transform .25s ease,box-shadow .25s ease;}
  .heroc-main-cta:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(201,106,46,.4);}

  /* --- ブリッジテキスト --- */
  .heroc-bridge{text-align:center;margin:24px auto 0;max-width:30em;animation:heroc-rise .6s .18s ease both;}
  .heroc-bridge-main{font-weight:900;font-size:clamp(16px,3.6vw,22px);line-height:1.6;color:var(--text);margin:0;}
  .heroc-bridge-main .accent{color:var(--primary-deep);}
  .heroc-bridge-sub{font-weight:700;font-size:clamp(12px,3vw,14px);color:var(--text-light);margin:10px 0 0;line-height:1.7;}

  @keyframes heroc-rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.heroc *{animation:none!important;}}

  /* ===== iPad 縦 768 / PC 1200 : 2カラム ===== */
  @media (min-width:768px){
    .heroc{padding:36px 32px 48px;}
    .heroc-cards{flex-direction:row;align-items:stretch;gap:20px;}
    .heroc-card{flex:1;justify-content:center;}
    .heroc-book{order:1;}      /* 左 = 絵本 */
    .heroc-play{order:2;}      /* 右 = あそびば */
    .heroc-bridge{margin-top:28px;}
  }
  @media (min-width:1200px){
    .heroc{padding:48px 40px 56px;}
    .heroc-cards{gap:28px;max-width:920px;margin:0 auto;}
    .heroc-card{padding:32px;}
    .heroc-book-visual{width:150px;}
    .heroc-play-visual{width:150px;height:150px;font-size:74px;}
  }
</style>
</head>
<body>

<section class="heroc" aria-labelledby="heroc-h">
  <div class="heroc-cards">

    <!-- 絵本カード (サブ強度・モバイルでは最初に視界へ) -->
    <div class="heroc-card heroc-book">
      <div class="heroc-book-visual">
        <img src="https://pono-asobiba-staging.ndw.workers.dev/assets/images/Amazon%E3%83%AA%E3%83%B3%E3%82%AF.png"
             alt="絵本『ありがとうって、うれしいね』の書影"
             loading="eager"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="heroc-book-ph"><b>書影</b><code>表紙アセット</code></div>
      </div>
      <p class="heroc-card-label">えほんを よむ</p>
      <a href="https://www.amazon.co.jp/dp/B0FFTBS9TM" class="heroc-sub-cta" target="_blank" rel="noopener noreferrer">Amazonで みる →</a>
    </div>

    <!-- あそびばカード (メイン) -->
    <div class="heroc-card heroc-play">
      <div class="heroc-play-visual" aria-hidden="true">🐻</div>
      <h1 class="heroc-card-label" id="heroc-h">ポノと あそぶ</h1>
      <a href="play.html" class="heroc-main-cta">あそびばの いりぐち <span class="arrow">→</span></a>
    </div>

  </div>

  <div class="heroc-bridge">
    <p class="heroc-bridge-main">おなじ <span class="accent">ポノ</span>が、<br class="heroc-smbr">えほんにも、あそびばにも。</p>
    <p class="heroc-bridge-sub">きほんの あそびは むりょう ／ えほんは Amazon で どうぞ 📖</p>
  </div>
</section>

</body>
</html>
