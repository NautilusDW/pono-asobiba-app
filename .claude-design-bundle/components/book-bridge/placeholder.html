<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">
<title>えほん × あそびば 並置セクション (生成予定)</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8F0;
    --primary: #F2915A;
    --primary-soft: #FFE4D1;
    --ink: #4A3829;
    --ink-soft: #8B7355;
    --muted: #C9B8A6;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 48px 24px;
  }

  .stage {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .eyebrow {
    font-size: 14px;
    font-weight: 500;
    color: var(--primary);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  .eyebrow::before,
  .eyebrow::after {
    content: "";
    width: 28px;
    height: 1px;
    background: var(--primary);
    opacity: 0.5;
  }

  .placeholder {
    width: 100%;
    min-height: 360px;
    background: #FFFDFA;
    border: 3px dashed var(--primary);
    border-radius: 24px;
    padding: 56px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 20px;
    position: relative;
    box-shadow: 0 8px 24px rgba(242, 145, 90, 0.08);
  }

  .placeholder::before {
    content: "";
    position: absolute;
    inset: 12px;
    border-radius: 16px;
    border: 1px dashed var(--primary-soft);
    pointer-events: none;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border-radius: 999px;
    background: var(--primary-soft);
    color: var(--primary);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  .badge .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--primary);
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  .title {
    font-size: 32px;
    font-weight: 900;
    color: var(--ink);
    line-height: 1.4;
    letter-spacing: 0.02em;
  }

  .title .accent {
    color: var(--primary);
  }

  .sub {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink-soft);
    line-height: 1.7;
    max-width: 520px;
  }

  .slots {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 18px;
    align-items: center;
    width: 100%;
    max-width: 560px;
    margin-top: 8px;
  }

  .slot {
    height: 96px;
    border-radius: 14px;
    background: repeating-linear-gradient(
      45deg,
      #FFF8F0,
      #FFF8F0 8px,
      #FFEFDF 8px,
      #FFEFDF 16px
    );
    border: 1.5px dashed var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
  }

  .cross {
    font-size: 24px;
    font-weight: 900;
    color: var(--primary);
  }

  .footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .brief-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    background: var(--primary);
    color: #FFF;
    text-decoration: none;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    box-shadow: 0 6px 16px rgba(242, 145, 90, 0.32);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .brief-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(242, 145, 90, 0.42);
  }

  .brief-link::after {
    content: "→";
    font-size: 17px;
  }

  .note {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
  <main class="stage">
    <span class="eyebrow">Placeholder / Not yet generated</span>

    <section class="placeholder" aria-label="えほん × あそびば 並置セクション 生成予定エリア">
      <span class="badge">
        <span class="dot"></span>
        SECTION PENDING
      </span>

      <h1 class="title">
        えほん <span class="accent">×</span> あそびば<br>
        並置セクション <span class="accent">(生成予定)</span>
      </h1>

      <p class="sub">
        ここに「えほん」と「あそびば」を並べて見せる新セクションが入ります。<br>
        現在はプレースホルダー表示です。下記の brief を参照して内容を生成してください。
      </p>

      <div class="slots" aria-hidden="true">
        <div class="slot">EHON SLOT</div>
        <div class="cross">×</div>
        <div class="slot">ASOBIBA SLOT</div>
      </div>
    </section>

    <footer class="footer">
      <a class="brief-link" href="./brief.md">brief.md を読む</a>
      <span class="note">— Pono Asobiba / Design System Preview —</span>
    </footer>
  </main>
</body>
</html>
