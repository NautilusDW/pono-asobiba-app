<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Isometric Grid Adjuster</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #222; font-family: sans-serif; color: #fff; overflow: hidden; }
  /* 実際の部屋と同じ: 16:9固定 + 引き伸ばし */
  #container {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    aspect-ratio: 16 / 9;
    max-width: 100vw; max-height: 100vh;
    width: auto; height: 100vh;
  }
  @media (max-aspect-ratio: 16/9) {
    #container { width: 100vw; height: auto; }
  }
  #room-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; }
  #grid-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }
  #controls {
    position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.85);
    padding: 15px; border-radius: 8px; font-size: 13px; z-index: 100;
    max-height: 95vh; overflow-y: auto;
  }
  #controls .corner-label { margin: 8px 0 2px; color: #aaa; font-weight: bold; }
  #controls .val { color: #ff9; font-family: monospace; font-size: 12px; }
  #output {
    position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.85);
    padding: 15px; border-radius: 8px; font-size: 12px; font-family: monospace;
    z-index: 100; white-space: pre; color: #0f0; max-width: 60vw;
  }
  button { margin-top: 8px; padding: 6px 12px; cursor: pointer; font-size: 14px; }
  .dot-label { font-size: 11px; }
</style>
</head>
<body>
<div id="container">
  <img id="room-img" src="../base.jpg">
  <canvas id="grid-canvas"></canvas>
</div>

<div id="controls">
  <h3>Grid Adjuster</h3>
  <p style="color:#888;font-size:11px">赤い点をドラッグして合わせる</p>

  <div class="corner-label">Back (奥) <span class="val" id="v-back"></span></div>
  <div class="corner-label">Left (左) <span class="val" id="v-left"></span></div>
  <div class="corner-label">Right (右) <span class="val" id="v-right"></span></div>
  <div class="corner-label">Front (手前) <span class="val" id="v-front"></span></div>

  <div class="corner-label" style="margin-top:12px">
    Grid cells: <span class="val" id="v-cells"></span>
  </div>
  <input type="range" id="cells" min="4" max="14" step="1" value="8" style="width:180px">

  <div class="corner-label" style="margin-top:8px">Line color</div>
  <select id="lineColor">
    <option value="rgba(255,0,0,0.6)">Red</option>
    <option value="rgba(0,255,0,0.6)" selected>Green</option>
    <option value="rgba(0,100,255,0.6)">Blue</option>
    <option value="rgba(255,255,0,0.6)">Yellow</option>
  </select>

  <br>
  <button onclick="copyOutput()">Copy JS Constants</button>
</div>

<div id="output"></div>

<script>
const canvas = document.getElementById('grid-canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('container');

// 4 corners (normalized 0-1)
const corners = {
  back:  { x: 0.500, y: 0.300 },
  left:  { x: 0.080, y: 0.560 },
  right: { x: 0.920, y: 0.560 },
  front: { x: 0.500, y: 0.880 },
};

let dragging = null; // which corner is being dragged
const DOT_RADIUS = 12; // hit area radius in pixels

function getContainerRect() {
  return container.getBoundingClientRect();
}

function draw() {
  const rect = getContainerRect();
  const W = rect.width, H = rect.height;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);

  const n = +document.getElementById('cells').value;
  const color = document.getElementById('lineColor').value;

  // 4 corners in pixels
  const B = { x: corners.back.x  * W, y: corners.back.y  * H };
  const R = { x: corners.right.x * W, y: corners.right.y * H };
  const L = { x: corners.left.x  * W, y: corners.left.y  * H };
  const F = { x: corners.front.x * W, y: corners.front.y * H };

  // Bilinear interpolation: point(s,t) = (1-s)(1-t)*B + s*(1-t)*R + (1-s)*t*L + s*t*F
  // s = u/n (back->right), t = v/n (back->left)
  function gridPt(u, v) {
    const s = u / n, t = v / n;
    return {
      x: (1-s)*(1-t)*B.x + s*(1-t)*R.x + (1-s)*t*L.x + s*t*F.x,
      y: (1-s)*(1-t)*B.y + s*(1-t)*R.y + (1-s)*t*L.y + s*t*F.y,
    };
  }

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  // Lines along u (from v=0 to v=n, for each u)
  for (let i = 0; i <= n; i++) {
    ctx.beginPath();
    ctx.moveTo(...Object.values(gridPt(i, 0)));
    for (let j = 1; j <= n; j++) ctx.lineTo(...Object.values(gridPt(i, j)));
    ctx.stroke();
  }
  // Lines along v (from u=0 to u=n, for each v)
  for (let i = 0; i <= n; i++) {
    ctx.beginPath();
    ctx.moveTo(...Object.values(gridPt(0, i)));
    for (let j = 1; j <= n; j++) ctx.lineTo(...Object.values(gridPt(j, i)));
    ctx.stroke();
  }

  // Diamond outline
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(B.x, B.y);
  ctx.lineTo(R.x, R.y);
  ctx.lineTo(F.x, F.y);
  ctx.lineTo(L.x, L.y);
  ctx.closePath();
  ctx.stroke();

  // Cell labels
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  for (let u = 0; u < n; u++) {
    for (let v = 0; v < n; v++) {
      const p = gridPt(u + 0.5, v + 0.5);
      ctx.fillText(u+','+v, p.x, p.y+3);
    }
  }

  // Corner dots (draggable)
  const dotData = [
    { key: 'back',  pt: B, label: 'Back',  color: '#f00' },
    { key: 'left',  pt: L, label: 'Left',  color: '#0af' },
    { key: 'right', pt: R, label: 'Right', color: '#fa0' },
    { key: 'front', pt: F, label: 'Front', color: '#f00' },
  ];
  dotData.forEach(d => {
    ctx.fillStyle = d.key === dragging ? '#fff' : d.color;
    ctx.beginPath();
    ctx.arc(d.pt.x, d.pt.y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText(d.label, d.pt.x, d.pt.y - 14);
  });

  // Update value displays
  document.getElementById('v-back').textContent  = `(${corners.back.x.toFixed(3)}, ${corners.back.y.toFixed(3)})`;
  document.getElementById('v-left').textContent  = `(${corners.left.x.toFixed(3)}, ${corners.left.y.toFixed(3)})`;
  document.getElementById('v-right').textContent = `(${corners.right.x.toFixed(3)}, ${corners.right.y.toFixed(3)})`;
  document.getElementById('v-front').textContent = `(${corners.front.x.toFixed(3)}, ${corners.front.y.toFixed(3)})`;
  document.getElementById('v-cells').textContent = n;

  // Output JS constants (bilinear: 4 corners)
  const output = `const ISO_GRID = {
  cells: ${n},
  // Diamond corners (normalized 0-1)
  back:  { x: ${corners.back.x.toFixed(3)}, y: ${corners.back.y.toFixed(3)} },
  right: { x: ${corners.right.x.toFixed(3)}, y: ${corners.right.y.toFixed(3)} },
  left:  { x: ${corners.left.x.toFixed(3)}, y: ${corners.left.y.toFixed(3)} },
  front: { x: ${corners.front.x.toFixed(3)}, y: ${corners.front.y.toFixed(3)} },
};`;
  document.getElementById('output').textContent = output;
}

// ── Drag handling ──
function getCornerAt(px, py) {
  const rect = getContainerRect();
  for (const key of ['back','left','right','front']) {
    const cx = corners[key].x * rect.width;
    const cy = corners[key].y * rect.height;
    const dx = px - cx, dy = py - cy;
    if (dx*dx + dy*dy < DOT_RADIUS * DOT_RADIUS * 4) return key;
  }
  return null;
}

canvas.addEventListener('pointerdown', e => {
  const rect = getContainerRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  const hit = getCornerAt(px, py);
  if (hit) {
    dragging = hit;
    canvas.setPointerCapture(e.pointerId);
    e.preventDefault();
  }
});

canvas.addEventListener('pointermove', e => {
  if (!dragging) {
    // cursor hint
    const rect = getContainerRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;
    canvas.style.cursor = getCornerAt(px, py) ? 'grab' : 'crosshair';
    return;
  }
  const rect = getContainerRect();
  const nx = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const ny = Math.max(0, Math.min(1, (e.clientY - rect.top)  / rect.height));
  corners[dragging].x = nx;
  corners[dragging].y = ny;
  draw();
});

canvas.addEventListener('pointerup', () => { dragging = null; draw(); });
canvas.addEventListener('pointercancel', () => { dragging = null; draw(); });

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  alert('Copied!');
}

document.getElementById('cells').addEventListener('input', draw);
document.getElementById('lineColor').addEventListener('input', draw);
window.addEventListener('resize', draw);
setTimeout(draw, 300);
</script>
</body>
</html>
