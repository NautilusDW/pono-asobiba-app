const exportWireframeBtn = document.getElementById('export-wireframe-png');
function exportWireframePng() {
  // 16:9 safe area サイズで出力 (1600×900)
  const cssRoot = getComputedStyle(document.documentElement);
  const safeW = parseFloat(cssRoot.getPropertyValue('--safe-w')) || 1600;
  const safeH = parseFloat(cssRoot.getPropertyValue('--safe-h')) || 900;

  const out = document.createElement('canvas');
  out.width = safeW;
  out.height = safeH;
  const ctx = out.getContext('2d');

  // 白背景 (Codex に渡す時の参照用に視認性を最大化)
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, safeW, safeH);

  // safe area の枠 (canvas 全体 = safe area なので 1px 内側に細く)
  // 中央クロスヘア (マゼンタ) は書き出しでは描かない (ユーザー指示)
  ctx.strokeStyle = 'rgba(0, 184, 224, 0.5)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 4]);
  ctx.strokeRect(1, 1, safeW - 2, safeH - 2);

  // userbox 群を outline + label + size で描画
  // 位置: safe-area の中で left/top が決まり、 transform: translate(tx, ty) で動く
  // canvas は safe-area サイズなので、 left + tx がそのまま canvas 座標になる
  ctx.setLineDash([]);
  document.querySelectorAll('.userbox').forEach(el => {
    const left = parseFloat(el.style.left) || 0;
    const top = parseFloat(el.style.top) || 0;
    const w = parseFloat(el.style.width) || el.offsetWidth;
    const h = parseFloat(el.style.height) || el.offsetHeight;
    const tx = el._tx || 0;
    const ty = el._ty || 0;
    const x = left + tx;
    const y = top + ty;

    // group メンバーは紫、 ソロは黒
    const isGroup = !!el.dataset.groupId;
    ctx.strokeStyle = isGroup ? '#6a3eb8' : '#1a1a1a';
    ctx.lineWidth = 3;
    ctx.strokeRect(x, y, w, h);

    // ラベル (背景バッジ + 白文字)
    const label = el.dataset.userboxLabel || '';
    if (label) {
      ctx.font = '700 18px system-ui, -apple-system, sans-serif';
      const padX = 8;
      const textW = ctx.measureText(label).width;
      const badgeH = 24;
      const badgeW = textW + padX * 2;
      // ラベルが上に出るスペースが無ければ枠の中の上端に置く
      const badgeY = (y - badgeH - 4 >= 0) ? (y - badgeH - 4) : (y + 4);
      ctx.fillStyle = isGroup ? 'rgba(106, 62, 184, 0.92)' : 'rgba(0, 0, 0, 0.88)';
      ctx.fillRect(x, badgeY, badgeW, badgeH);
      ctx.fillStyle = '#ffe8a8';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, x + padX, badgeY + badgeH / 2);
    }

    // 中央に W × H サイズ表示
    const sizeText = `${Math.round(w)} × ${Math.round(h)}`;
    ctx.font = '500 16px ui-monospace, Menlo, Consolas, monospace';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(sizeText, x + w / 2, y + h / 2);
    ctx.textAlign = 'start';
    ctx.textBaseline = 'alphabetic';
  });

  // 凡例 (右下に小さく)
  ctx.font = '500 12px ui-monospace, Menlo, Consolas, monospace';
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.textAlign = 'right';
  ctx.fillText(`safe area ${safeW}×${safeH} (16:9)  生成 ${new Date().toLocaleString('ja-JP')}`, safeW - 12, safeH - 12);
  ctx.textAlign = 'start';

  out.toBlob(blob => {
    if (!blob) { showLayoutToast('PNG 生成に失敗しました'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.download = `zukan-wireframe-${ts}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    showLayoutToast('ワイヤー PNG を保存しました');
  }, 'image/png');
}
exportWireframeBtn && exportWireframeBtn.addEventListener('click', exportWireframePng);

// グループ化 ID 採番 + ヘルパ
let userboxGroupCounter = 0;
function expandGroupSelection(set) {
  // set 内に group メンバーがいたら、 同 group の他メンバーも選択に加える
  const seenGroups = new Set();
  set.forEach(el => {
    const gid = el.dataset && el.dataset.groupId;
    if (gid) seenGroups.add(gid);
  });
  seenGroups.forEach(gid => {
    document.querySelectorAll(`.userbox[data-group-id="${gid}"]`).forEach(g => set.add(g));
  });
}

window.addEventListener('keydown', e => {
  if (!document.body.classList.contains('resize-mode')) return;
  if (isEditableTarget(e.target)) return;
  const isCopy  = (e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C');
  const isPaste = (e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V');
  const isDup   = (e.ctrlKey || e.metaKey) && (e.key === 'd' || e.key === 'D');
  const isGroup   = (e.ctrlKey || e.metaKey) && !e.shiftKey && (e.key === 'g' || e.key === 'G');
  const isUngroup = (e.ctrlKey || e.metaKey) && e.shiftKey  && (e.key === 'g' || e.key === 'G');
  if (isGroup) {
    e.preventDefault();
    const sel = [...selectedElements].filter(el => el.classList.contains('userbox'));
    if (sel.length < 2) {
      showLayoutToast('2 個以上選択してから Ctrl+G');
      return;
    }
    userboxGroupCounter += 1;
    const gid = 'g-' + Date.now() + '-' + userboxGroupCounter;
    sel.forEach(el => { el.dataset.groupId = gid; });
    saveResizeState();
    showLayoutToast(`${sel.length} 個をグループ化`);
    return;
  }
  if (isUngroup) {
    e.preventDefault();
    const sel = [...selectedElements].filter(el => el.classList.contains('userbox') && el.dataset.groupId);
    if (sel.length === 0) {
      showLayoutToast('グループ解除する枠が選択されていません');
      return;
    }
    sel.forEach(el => { delete el.dataset.groupId; });
    saveResizeState();
    showLayoutToast(`${sel.length} 個のグループを解除`);
    return;
  }
  if (isCopy || isDup) {
    const sel = [...selectedElements].filter(el => el.classList.contains('userbox'));
    if (sel.length === 0) {
      e.preventDefault();
      showLayoutToast('コピー対象の枠が選択されていません');
      return;
    }
    e.preventDefault();
    userboxClipboard = sel.map(el => ({
      label: el.dataset.userboxLabel,
      left: el.style.left,
      top: el.style.top,
      w: el.style.width,
      h: el.style.height,
      tx: el._tx || 0,
      ty: el._ty || 0,
    }));
    showLayoutToast(`${sel.length} 個コピー`);
    // Ctrl+D は即ペーストもする (ワンキー複製)
    if (isDup) doPaste();
  } else if (isPaste) {
    e.preventDefault();
    doPaste();
  }
});
function doPaste() {
  if (userboxClipboard.length === 0) {
    showLayoutToast('クリップボードが空です (Ctrl+C で先にコピー)');
    return;
  }
  selectedElements.clear();
  userboxClipboard.forEach(box => {
    const el = createUserbox({
      label: box.label,
      left: (parseFloat(box.left) + 20) + 'px',
      top:  (parseFloat(box.top)  + 20) + 'px',
      w: box.w,
      h: box.h,
      tx: box.tx,
      ty: box.ty,
    });
    selectedElements.add(el);
  });
  refreshSelectionUI();
  saveResizeState();
  showLayoutToast(`${userboxClipboard.length} 個ペースト`);
}

// ───── userbox: ユーザーがドラッグで作る矩形フレーム ─────
// 通常 (resize-mode ON): 空き領域 drag で新規作成。 既存枠の上は select/move/resize
// 強制 (draw-mode ON): 既存枠の上でも常に新規作成 (重なった枠の上で作りたい時用)

const drawBtn = document.getElementById('userbox-add');
let drawModeOn = false;
function setDrawMode(on) {
  drawModeOn = on;
  document.body.classList.toggle('draw-mode', on);
  if (drawBtn) {
    drawBtn.textContent = on ? '🆕 矩形追加 ON' : '🆕 矩形追加 OFF';
    drawBtn.classList.toggle('active', on);
  }
}
drawBtn && drawBtn.addEventListener('click', () => {
  if (!document.body.classList.contains('resize-mode')) enableResize();
  setDrawMode(!drawModeOn);
});
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && drawModeOn) setDrawMode(false);
});

let userboxCounter = 0;
function createUserbox(opts) {
  // opts: { id?, label?, left, top, w, h, tx?, ty?, groupId? }
  userboxCounter += 1;
  const id = opts.id || ('userbox-' + Date.now() + '-' + userboxCounter);
  const label = opts.label || ('枠' + userboxCounter);
  const div = document.createElement('div');
  div.className = 'userbox';
  div.dataset.userboxId = id;
  div.dataset.userboxLabel = label;
  if (opts.groupId) div.dataset.groupId = opts.groupId;
  div.style.left = opts.left;
  div.style.top = opts.top;
  if (opts.w) div.style.width = opts.w;
  if (opts.h) div.style.height = opts.h;
  // ラベルバッジ (contenteditable)
  const badge = document.createElement('div');
  badge.className = 'userbox-badge';
  badge.contentEditable = 'true';
  badge.textContent = label;
  badge.spellcheck = false;
  badge.addEventListener('mousedown', e => e.stopPropagation());
  badge.addEventListener('blur', () => {
    const newLabel = badge.textContent.trim() || ('枠' + userboxCounter);
    badge.textContent = newLabel;
    div.dataset.userboxLabel = newLabel;
    saveResizeState();
  });
  badge.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); badge.blur(); }
  });
  div.appendChild(badge);
  // × 削除ボタン
  const del = document.createElement('div');
  del.className = 'userbox-del';
  del.textContent = '×';
  del.title = '削除';
  del.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); });
  del.addEventListener('click', e => {
    e.stopPropagation();
    if (confirm(`「${div.dataset.userboxLabel}」 を削除しますか？`)) {
      selectedElements && selectedElements.delete(div);
      div.remove();
      saveResizeState();
      refreshSelectionUI && refreshSelectionUI();
    }
  });
  div.appendChild(del);
  // safe-area に追加
  const target = document.querySelector('.zukan-safe') || document.getElementById('safe-area');
  target.appendChild(div);
  // resize-mode が ON ならハンドル即装着
  if (document.body.classList.contains('resize-mode')) {
    attachHandle(div, 'wh');
  }
  // tx/ty を後から適用 (load 経路用)
  if (opts.tx || opts.ty) {
    div._tx = opts.tx || 0;
    div._ty = opts.ty || 0;
    div.style.transform = `translate(${div._tx}px, ${div._ty}px)`;
  }
  return div;
}

function collectUserboxes() {
  return [...document.querySelectorAll('.userbox')].map(el => ({
    id: el.dataset.userboxId,
    label: el.dataset.userboxLabel,
    left: el.style.left,
    top: el.style.top,
    w: el.style.width,
    h: el.style.height,
    tx: el._tx || 0,
    ty: el._ty || 0,
    groupId: el.dataset.groupId || '',
  }));
}
function restoreUserboxes(arr) {
  // 重複防止: 既存をクリアしてから再生成
  document.querySelectorAll('.userbox').forEach(el => el.remove());
  if (!Array.isArray(arr)) return;
  arr.forEach(box => createUserbox(box));
}

// ステージ mousedown でドラッグ開始
//   通常: resize-mode ON + 既存枠の外、 で新規作成
//   強制: draw-mode ON ならどこでも作成 (既存枠の上でも)
const stageEl = document.getElementById('stage');
stageEl.addEventListener('mousedown', e => {
  if (!document.body.classList.contains('resize-mode')) return;
  // ツールバーなど特殊エリアは draw-mode でもスキップ
  if (e.target.closest('.toolbar, .ruler, .guide, .numeric-panel')) return;
  // draw-mode OFF の時のみ、 既存枠/ハンドルの上では何もしない (= select/move 経路に任せる)
  if (!drawModeOn && e.target.closest('.resizable, .resize-handle, .userbox-badge, .userbox-del')) return;
  e.preventDefault();
  e.stopPropagation();
  const stageRect = stageEl.getBoundingClientRect();
  const stageW = parseFloat(getComputedStyle(stageEl).width);
  const scale = stageRect.width / stageW || 1;
  const safe = document.querySelector('.zukan-safe') || stageEl;
  const safeRect = safe.getBoundingClientRect();
  const sx = (e.clientX - safeRect.left) / scale;
  const sy = (e.clientY - safeRect.top) / scale;
  const preview = document.createElement('div');
  preview.className = 'userbox-preview';
  preview.style.left = sx + 'px';
  preview.style.top = sy + 'px';
  preview.style.width = '0px';
  preview.style.height = '0px';
  safe.appendChild(preview);

  const onMove = (e2) => {
    const x = (e2.clientX - safeRect.left) / scale;
    const y = (e2.clientY - safeRect.top) / scale;
    const x0 = Math.min(sx, x), y0 = Math.min(sy, y);
    const w = Math.abs(x - sx), h = Math.abs(y - sy);
    preview.style.left = x0 + 'px';
    preview.style.top = y0 + 'px';
    preview.style.width = w + 'px';
    preview.style.height = h + 'px';
  };
  const onUp = () => {
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
    const w = parseFloat(preview.style.width);
    const h = parseFloat(preview.style.height);
    const left = preview.style.left;
    const top = preview.style.top;
    preview.remove();
    if (w >= 20 && h >= 20) {
      createUserbox({ left, top, w: w + 'px', h: h + 'px' });
      saveResizeState();
    }
    // draw-mode は連続作成できるよう ON のまま
  };
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
});

// 起動時にサーバー (commit 済み) → ローカルストレージの順で復元
(async () => {
  const serverData = await loadSavedLayoutFromServer();
  if (serverData && Object.keys(serverData).length > 0) {
    // server snapshot を適用
    try { localStorage.setItem(RESIZE_KEY, JSON.stringify(serverData)); } catch(e) {}
    loadResizeState();
  } else {
    loadResizeState();
  }
  lastSavedLayoutJson = JSON.stringify(takeLayoutSnapshot());
})();

// ───── Preview mode (端末サイズで見る) ─────
const previewBtn = document.getElementById('preview-mode');
const previewExit = document.getElementById('preview-exit');
function fitStage() {
  const w = window.innerWidth, h = window.innerHeight;
  const stageW = parseFloat(getComputedStyle(stage).width);
  const stageH = parseFloat(getComputedStyle(stage).height);
  const scale = Math.min(w / stageW, h / stageH);
  const scaledW = stageW * scale;
  const scaledH = stageH * scale;
  const offsetX = (w - scaledW) / 2;
  const offsetY = (h - scaledH) / 2;
  // transform-origin 0 0 + 明示的な translate(px) で確実にレターボックス中央配置
  stage.style.transformOrigin = '0 0';
  stage.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}
function enterPreview() {
  document.body.classList.add('preview-mode');
  fitStage();
  window.addEventListener('resize', fitStage);
  // 縦横対応: 端末を回転したらリフィット
  window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));
}
function exitPreview() {
  document.body.classList.remove('preview-mode');
  stage.style.transform = '';
  window.removeEventListener('resize', fitStage);
}
previewBtn?.addEventListener('click', enterPreview);
previewExit?.addEventListener('click', exitPreview);
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.body.classList.contains('preview-mode')) {
    exitPreview();
  }
});

// URL ?preview=1 で直接プレビューモード
if (new URLSearchParams(location.search).get('preview') === '1') {
  setTimeout(enterPreview, 50);
}

// ── Reset button ──
if (annoReset) {
  annoReset.addEventListener('click', () => {
    if (!confirm('保存された注釈と設定を全て削除します (元に戻せません)。よろしいですか？')) return;
    clearAllSavedState();
  });
}

// ── Init: load saved state, otherwise default layout ──
const restored = loadState();
if (!restored) {
  buildLayout('row-3');
} else {
  buildLayout(document.getElementById('layout-select').value);
}

// ── Save before leaving ──
window.addEventListener('beforeunload', saveState);
window.addEventListener('visibilitychange', () => { if (document.hidden) saveState(); });
</script>
