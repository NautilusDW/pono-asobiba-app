function _renderStrengthPushGame() {
  const gs = _strengthGameState;
  if (!gs) return;
  const rockImg = document.getElementById('strengthRockImg');
  const durabilityBar = document.getElementById('strengthDurabilityBar');
  const hpText = document.getElementById('strengthHpText');
  const bar = document.getElementById('strengthTimeBar');
  const status = document.getElementById('strengthStatus');
  const stageIdx = _strengthRockStageIndex(gs.tapCount);
  if (rockImg) rockImg.src = MAZE_STRENGTH_ASSET_BASE + 'rock_break_' + stageIdx + '.png';
  const damageRatio = Math.max(0, Math.min(1, gs.tapCount / gs.required));
  const hpRatio = Math.max(0, 1 - damageRatio);
  if (durabilityBar) {
    durabilityBar.style.setProperty('--hp', hpRatio.toFixed(3));
    durabilityBar.style.transform = 'scaleX(' + hpRatio.toFixed(3) + ')';
    durabilityBar.classList.toggle('is-low', hpRatio > 0 && hpRatio <= 0.3);
  }
  if (hpText) {
    hpText.textContent = Math.ceil(hpRatio * 100) + '%';
  }
  const remain = Math.max(0, gs.deadline - performance.now());
  if (bar) bar.style.transform = 'scaleX(' + (remain / STRENGTH_TAP_MS).toFixed(3) + ')';
  if (status) {
    status.textContent = gs.status || 'いわを れんだして たいりょくを けずろう！';
  }
  if (!gs.locked && remain <= 0) _failStrengthPushGame();
}

function _spawnStrengthDebrisBurst(finalHit) {
  const layer = document.getElementById('strengthDebrisLayer');
  if (!layer) return;
  const count = finalHit ? 18 : 7;
  for (let i = 0; i < count; i++) {
    const img = document.createElement('img');
    img.className = 'strength-chip';
    img.src = MAZE_STRENGTH_CHIP_SRCS[Math.floor(Math.random() * MAZE_STRENGTH_CHIP_SRCS.length)];
    img.alt = '';
    const angle = (-Math.PI * 0.9) + Math.random() * (Math.PI * 1.8);
    const distance = (finalHit ? 118 : 58) + Math.random() * (finalHit ? 122 : 72);
    const lift = finalHit ? -26 : -16;
    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance + lift;
    const size = (finalHit ? 24 : 15) + Math.random() * (finalHit ? 34 : 22);
    const duration = (finalHit ? 620 : 420) + Math.random() * (finalHit ? 280 : 180);
    img.style.setProperty('--dx', dx.toFixed(1) + 'px');
    img.style.setProperty('--dy', dy.toFixed(1) + 'px');
    img.style.setProperty('--ox', ((Math.random() - 0.5) * 34).toFixed(1) + 'px');
    img.style.setProperty('--oy', ((Math.random() - 0.5) * 24).toFixed(1) + 'px');
    img.style.setProperty('--size', size.toFixed(1) + 'px');
    img.style.setProperty('--rot', ((Math.random() > 0.5 ? 1 : -1) * (160 + Math.random() * 420)).toFixed(1) + 'deg');
    img.style.setProperty('--dur', duration.toFixed(0) + 'ms');
    img.style.setProperty('--scale', (0.72 + Math.random() * 0.46).toFixed(2));
    layer.appendChild(img);
    setTimeout(function() { img.remove(); }, duration + 80);
  }
}

function _onStrengthRockTap() {
  const gs = _strengthGameState;
  if (!gs || gs.locked) return;
  gs.tapCount = Math.min(gs.required, gs.tapCount + 1);
  const punchHand = (gs.tapCount % 2 === 1) ? 'right' : 'left';
  gs.lastPunchHand = punchHand;
  const finalHit = gs.tapCount >= gs.required;
  const damageRatio = Math.max(0, Math.min(1, gs.tapCount / gs.required));
  gs.status = finalHit
    ? 'くだけた！'
    : (damageRatio >= 0.7 ? 'あと もうすこし！' : (damageRatio >= 0.4 ? 'ひびが はいってきた！' : 'れんだして くだこう！'));
  playRockHit(finalHit);
  _spawnStrengthDebrisBurst(finalHit);
  const btn = document.getElementById('strengthRockBtn');
  if (btn) {
    btn.classList.remove('is-hit', 'is-hit-left', 'is-hit-right');
    void btn.offsetWidth;
    const hitClass = punchHand === 'right' ? 'is-hit-right' : 'is-hit-left';
    btn.classList.add('is-hit', hitClass);
    setTimeout(function() {
      btn.classList.remove('is-hit', hitClass);
    }, 260);
  }
  _renderStrengthPushGame();
  if (gs.tapCount >= gs.required) _resolveStrengthPushGame();
}

function _failStrengthPushGame() {
  const gs = _strengthGameState;
  if (!gs || gs.locked) return;
  gs.locked = true;
  gs.status = 'もういちど やってみよう';
  playMzSe('wrong');
  _renderStrengthPushGame();
  _strengthGimmickSetTimeout(function() {
    if (!_strengthGameState) return;
    _strengthGameState.tapCount = 0;
    _strengthGameState.deadline = performance.now() + STRENGTH_TAP_MS;
    _strengthGameState.locked = false;
    _strengthGameState.status = 'いわを れんだして たいりょくを けずろう！';
    _renderStrengthPushGame();
  }, 900);
}

function _resolveStrengthPushGame() {
  const st = _strengthGimmickState;
  if (st) st.rockMoved = true;
  _updateFlagInventoryHud();
  _clearStrengthGimmickTimers();
  _strengthGameState = null;
  playMzSe('correct');
  encStageEl.innerHTML =
    '<div class="enc-result win strength-clear">' +
      '<img class="strength-clear__burst" src="' + MAZE_STRENGTH_ASSET_BASE + 'power_spark.png" alt="">' +
      '<img class="enc-result__icon" src="' + MAZE_STRENGTH_ASSET_BASE + 'rock_break_3.png" alt="くだけたいわ">' +
      '<div>いわが くだけた！</div>' +
      '<div class="strength-game__status">みちが ひらいたよ！</div>' +
    '</div>';
  _strengthGimmickSetTimeout(function() {
    if (_encounterActive) _closeEncounter(true);
  }, 1300);
}

// ── ほうき: クモの巣はらい ──
// Spider-web topology: 8 spokes drive geometry; each ring has 8 segments (one per spoke gap) so chords land exactly on spoke tips. Total = 24 threads.
// Playtest feedback v1043: halved thickness for silk-like delicacy.
// Per-blueprint thickRatio overrides removed below so this array is the single source of truth.
const WEB_SWEEP_LAYERS = [
  { layer: 0, count: 8, color: '#8a8a8a', thickRatio: 0.013,  threshold: 1.1, sparkleColor: '#bbb' },
  { layer: 1, count: 8, color: '#ffffff', thickRatio: 0.0085, threshold: 1.0, sparkleColor: '#e8e8ff' },
  { layer: 2, count: 8, color: '#fff6c8', thickRatio: 0.0050, threshold: 0.9, sparkleColor: '#ffe89a' },
];
const WEB_SWEEP_BUTTERFLY_SRC = '../assets/images/quizland/illust/choice/chocho.png';
const WEB_SWEEP_THREAD_BLUEPRINTS = (function() {
  const out = [];
  const cx = 0.5;
  const cy = 0.5;
  const rx = 0.42;        // elliptical perimeter half-width
  const ry = 0.36;        // elliptical perimeter half-height
  // NOTE: hubClear protects the GEOMETRIC hub at (cx=0.5, cy=0.5) where all 8 spokes
  // converge — NOT the spider sprite. The spider is drawn at (0.83, 0.23) as a
  // corner character (see _drawWebSpider) and reads to a child as "spider next to
  // its big web" rather than "spider sitting in the center". The center clearance
  // simply prevents the spokes from collapsing into a visual blob at the hub.
  const hubClear = 0.05;
  const SPOKES = 8;
  const OUTER_RING_R = 0.80; // outer sticky ring radius (fraction of perimeter)
  const INNER_RING_R = 0.46; // inner sticky ring radius
  const startAngle = -Math.PI / 2; // first spoke points up (12 o'clock)

  // Deterministic pseudo-jitter in roughly [-0.5, 0.5] — no Math.random.
  // Uses Math.sin with index + salt so the same web renders every frame.
  function jitter(i, salt) {
    const s = Math.sin(i * 12.9898 + salt * 78.233) * 43758.5453;
    return (s - Math.floor(s)) - 0.5;
  }

  // Point on elliptical orbit at given angle and radial fraction.
  function ept(angle, radiusFrac) {
    return [
      cx + Math.cos(angle) * rx * radiusFrac,
      cy + Math.sin(angle) * ry * radiusFrac,
    ];
  }

  // Pre-compute spoke angles (evenly spaced — topology stays clean for ring tie-in).
  const angles = [];
  for (let i = 0; i < SPOKES; i++) {
    angles.push(startAngle + (Math.PI * 2 * i) / SPOKES);
  }

  // ── Layer 0: 8 radial SPOKES (hub → perimeter), nearly straight with tiny wobble ──
  for (let i = 0; i < SPOKES; i++) {
    const ang = angles[i];
    const a = ept(ang, hubClear);
    const b = ept(ang, 1.0);
    const mx = (a[0] + b[0]) / 2;
    const my = (a[1] + b[1]) / 2;
    // perpendicular wobble — keeps line visually straight but hand-spun
    const perpX = -Math.sin(ang);
    const perpY =  Math.cos(ang);
    const wob = 0.005 * (jitter(i, 1.0) * 2); // ~±0.005
    out.push({
      a: a,
      b: b,
      c: [mx + perpX * wob, my + perpY * wob],
      layer: 0,
      color: '#8a8a8a',
      // thickRatio intentionally omitted — falls back to WEB_SWEEP_LAYERS[0].thickRatio (single source of truth, v1043).
      threshold: 1.1,
      phase: i * 0.71,
    });
  }

  // ── Layer 1: OUTER RING — 8 catenary segments between adjacent spokes at ~0.80 radius ──
  for (let i = 0; i < SPOKES; i++) {
    const i2 = (i + 1) % SPOKES;
    const ang1 = angles[i];
    const ang2 = angles[i2];
    // small per-spoke radius jitter so chords don't form a perfect circle
    const rA = OUTER_RING_R + jitter(i,  2.0) * 0.025;
    const rB = OUTER_RING_R + jitter(i2, 2.0) * 0.025;
    const A = ept(ang1, rA);
    const B = ept(ang2, rB);
    const midAng = ang1 + (Math.PI * 2 / SPOKES) / 2;
    // control point at angular midpoint, pulled inward 7–9% for catenary sag
    const sag = 0.07 + ((i % 3) * 0.01); // 0.07, 0.08, 0.09
    const sagR = ((rA + rB) / 2) * (1 - sag);
    const c = ept(midAng, sagR);
    out.push({
      a: A,
      b: B,
      c: c,
      layer: 1,
      color: '#ffffff',
      // thickRatio intentionally omitted — falls back to WEB_SWEEP_LAYERS[1].thickRatio (single source of truth, v1043).
      threshold: 1.0,
      phase: 10 + i * 0.57,
    });
  }

  // ── Layer 2: INNER RING — 8 finer catenary segments at ~0.46 radius, deeper sag ──
  for (let i = 0; i < SPOKES; i++) {
    const i2 = (i + 1) % SPOKES;
    const ang1 = angles[i];
    const ang2 = angles[i2];
    const rA = INNER_RING_R + jitter(i,  4.0) * 0.02;
    const rB = INNER_RING_R + jitter(i2, 4.0) * 0.02;
    const A = ept(ang1, rA);
    const B = ept(ang2, rB);
    const midAng = ang1 + (Math.PI * 2 / SPOKES) / 2;
    // inner silk droops slightly more (8–10%) — silk between close spokes sags visibly
    const sag = 0.08 + ((i % 3) * 0.01); // 0.08, 0.09, 0.10
    const sagR = ((rA + rB) / 2) * (1 - sag);
    const c = ept(midAng, sagR);
    out.push({
      a: A,
      b: B,
      c: c,
      layer: 2,
      color: '#fff6c8',
      // thickRatio intentionally omitted — falls back to WEB_SWEEP_LAYERS[2].thickRatio (single source of truth, v1043).
      threshold: 0.9,
      phase: 20 + i * 0.83,
    });
  }

  return out;
})();

function _webSweepReducedMotion() {
  try {
    return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  } catch (_) {
    return false;
  }
}

function _showWebSweepGame() {
  _setEncounterMode('web_sweep');
  _clearWebGimmickTimers();
  encStageEl.textContent = '';
  const wrap = document.createElement('div');
  wrap.className = 'web-game';
  wrap.innerHTML =
    '<div class="web-game__title">クモさんを たすけよう！</div>' +
    '<div class="web-game__stage" id="webSweepStage">' +
      '<canvas class="web-game__canvas" id="webSweepCanvas" aria-label="ほうきでくものすをはらうゲーム"></canvas>' +
      '<div class="web-game__stage-note">ほうきを ひだり みぎに うごかして いとを はらってね</div>' +
    '</div>' +
    '<div class="web-game__status" id="webStatus"></div>';
  encStageEl.appendChild(wrap);
  const stageEl = document.getElementById('webSweepStage');
  const canvasEl = document.getElementById('webSweepCanvas');
  const status = document.getElementById('webStatus');
  if (!stageEl || !canvasEl) return;
  const gs = {
    stageEl: stageEl,
    canvas: canvasEl,
    ctx: canvasEl.getContext('2d'),
    statusEl: status,
    w: 0,
    h: 0,
    dpr: 1,
    dragging: false,
    locked: false,
    pointerId: null,
    lastPointer: null,
    strokeDistance: 0,     // legacy, not used in layer logic
    strokeDetachCount: 0,  // legacy, not used in layer logic
    detachedCount: 0,      // legacy, not used in layer logic
    lastSfxAt: 0,          // legacy, still used only to throttle sticky SFX
    lastTs: performance.now(),
    rafId: null,
    status: 'クモさんの まわりを やさしく はらってね',
    currentLayer: 0,
    strokeCounter: [0, 0, 0],
    lastDirX: null,
    butterflies: [
      { asset: 'chocho.png', initX: -0.08, targetX: 0.25, scale: 0.9, sway: 0.0, visible: true },
      { asset: 'chocho.png', initX: 1.08, targetX: 0.55, scale: 1.0, sway: 1.2, visible: true },
      { asset: 'chocho.png', initX: -0.05, targetX: 0.78, scale: 0.85, sway: 2.4, visible: true },
    ],
    butterflyImg: null,
    spiderEmotion: 0,
    layerClearAt: [0, 0, 0],
    lastVibrateAt: 0,
    pointerTrail: [],
    finishStartedAt: 0,
    broom: { x: 0, y: 0, tx: 0, ty: 0, prevX: 0, prevY: 0, vx: 0, vy: 0, angle: -0.35 },
    activeGrabs: 0,
    _hasPath2D: (typeof Path2D !== 'undefined'),
    threads: WEB_SWEEP_THREAD_BLUEPRINTS.map(function(def, i) {
      return {
        index: i,
        def: def,
        layer: def.layer,
        color: def.color,
        thickness: 0,
        threshold: def.threshold,
        phase: def.phase || i,
        // Verlet rope state
        points: [],          // length 7, populated by _layoutWebSweepThreads
        constraints: [],     // length 6
        restTotal: 0,
        currentTotal: 0,
        stretchRatio: 1,
        tension: 0,
        grabbedIdx: -1,
        broken: 0,
        frozenLayout: 0,
        parentIndex: -1,
        flashAt: 0,
        flashX: 0,
        flashY: 0,
        // SFX/draw compat
        stick: 0,
        detached: false,
        detachAge: 0,
        opacity: 1,
        layerFadeStart: 0,
      };
    }),
    particles: [],
    ripples: [],
  };
  gs.butterflyImg = new Image();
  gs.butterflyImg.src = WEB_SWEEP_BUTTERFLY_SRC;
  gs.vibrate = function(ms) {
    if (_webSweepReducedMotion()) return;
    const now = performance.now();
    if (now - gs.lastVibrateAt < 100) return;
    gs.lastVibrateAt = now;
    try { if (navigator.vibrate) navigator.vibrate(ms); } catch (_) {}
  };
  _webGameState = gs;
  _resizeWebSweepCanvas(gs);
  _setWebSweepStatus(gs, gs.status);

  stageEl.addEventListener('pointerdown', function(e) {
    if (gs !== _webGameState || gs.locked) return;
    e.preventDefault();
    const p = _webSweepPointer(canvasEl, e);
    gs.dragging = true;
    gs.pointerId = e.pointerId;
    gs.strokeDistance = 0;
    gs.strokeDetachCount = 0;
    gs.lastDirX = null;
    gs.pointerTrail = [{ x: p.x, y: p.y, t: performance.now() }];
    gs.lastPointer = { x: p.x, y: p.y, t: performance.now() };
    gs.broom.x = gs.broom.tx = p.x;
    gs.broom.y = gs.broom.ty = p.y;
    gs.broom.prevX = gs.broom.x;
    gs.broom.prevY = gs.broom.y;
    stageEl.classList.add('is-dragging');
    try { stageEl.setPointerCapture(e.pointerId); } catch (_) {}
    _setWebSweepStatus(gs, 'クモさんの まわりを やさしく はらってね');
  });
  stageEl.addEventListener('pointermove', function(e) {
    if (gs !== _webGameState || !gs.dragging || gs.locked) return;
    if (gs.pointerId !== null && e.pointerId !== gs.pointerId) return;
    e.preventDefault();
    const now = performance.now();
    const p = _webSweepPointer(canvasEl, e);
    const prev = gs.lastPointer || { x: p.x, y: p.y, t: now };
    const dx = p.x - prev.x;
    const dy = p.y - prev.y;
    gs.strokeDistance += Math.hypot(dx, dy);
    gs.broom.tx = p.x;
    gs.broom.ty = p.y;
    if (!_webSweepReducedMotion()) {
      gs.pointerTrail.push({ x: p.x, y: p.y, t: now });
      if (gs.pointerTrail.length > 12) gs.pointerTrail.shift();
    }
    if (Math.hypot(dx, dy) > 1.2) {
      gs.broom.angle = Math.atan2(dy, dx) + 0.72;
    }
    if (_webSweepReducedMotion()) {
      // Reduced-motion: instant detach on proximity to any current-layer thread point
      const R = Math.max(36, Math.min(gs.w, gs.h) * 0.09);
      const R2 = R * R;
      gs.threads.forEach(function(t) {
        if (t.detached || t.broken) return;
        if (t.def.layer !== gs.currentLayer) return;
        for (let i = 0; i < t.points.length; i++) {
          const pp = t.points[i];
          const d2 = (pp.x - p.x) * (pp.x - p.x) + (pp.y - p.y) * (pp.y - p.y);
          if (d2 <= R2) {
            _detachWebThread(gs, t, pp.x, pp.y, dx, dy);
            break;
          }
        }
      });
      _checkWebSweepLayerClear(gs, gs.currentLayer);
    }
    gs.lastPointer = { x: p.x, y: p.y, t: now };
  });
  function endDrag(e) {
    if (gs !== _webGameState || !gs.dragging) return;
    if (e && gs.pointerId !== null && e.pointerId !== gs.pointerId) return;
    if (e) e.preventDefault();
    if (gs.strokeDistance < 18 && !gs.locked) {
      _setWebSweepStatus(gs, 'ちょんちょんじゃなくて、 すーっと はらってね');
      _playWebStickySfx('soft');
    } else if (!gs.locked) {
      _setWebSweepStatus(gs, 'もう いちど やさしく ふきとってあげて');
    }
    gs.dragging = false;
    gs.pointerId = null;
    gs.lastPointer = null;
    _releaseAllRopeGrabs(gs);
    stageEl.classList.remove('is-dragging');
  }
  stageEl.addEventListener('pointerup', endDrag);
  stageEl.addEventListener('pointercancel', endDrag);
  stageEl.addEventListener('lostpointercapture', endDrag);

  _startWebSweepLoop(gs);
}

function _webSweepPointer(canvasEl, e) {
  const rect = canvasEl.getBoundingClientRect();
  return {
    x: Math.max(0, Math.min(rect.width, e.clientX - rect.left)),
    y: Math.max(0, Math.min(rect.height, e.clientY - rect.top)),
  };
}

function _resizeWebSweepCanvas(gs) {
  const rect = gs.canvas.getBoundingClientRect();
  const w = Math.max(1, Math.round(rect.width));
  const h = Math.max(1, Math.round(rect.height));
  const dpr = window.devicePixelRatio || 1;
  if (gs.w === w && gs.h === h && gs.dpr === dpr) return;
  gs.w = w;
  gs.h = h;
  gs.dpr = dpr;
  gs.canvas.width = Math.max(1, Math.floor(w * dpr));
  gs.canvas.height = Math.max(1, Math.floor(h * dpr));
  gs.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  gs.broom.x = gs.broom.x || w * 0.22;
  gs.broom.y = gs.broom.y || h * 0.76;
  gs.broom.tx = gs.broom.tx || gs.broom.x;
  gs.broom.ty = gs.broom.ty || gs.broom.y;
  _layoutWebSweepThreads(gs);
}

// ── SilkChain constants (see designer spec) ──
const WEB_CHAIN_N = 7;
const WEB_CONSTRAINT_ITERS = 4;
const WEB_CONSTRAINT_ITERS_LOW_FPS = 5;
const WEB_LINEAR_DAMP = 0.985;
const WEB_MICRO_GRAVITY = 6;
// v1045: blend lowered 0.18 → 0.06. Catch-up time constant ~50 frames (~830ms).
// Grabbed point trails throughout an entire 1s sweep — visible silk stretched behind
// broom the whole way, not only for the first ~150ms. Reads as 粘り (viscosity).
const WEB_GRAB_BLEND_K = 0.06;
// v1044: raised to 0.70 (vs WEB_FREE_WEIGHT=0.85) so the grabbed point resists the
// constraint solver more — chain stays stretched in broom direction instead of snapping back.
const WEB_GRAB_WEIGHT = 0.70;
const WEB_FREE_WEIGHT = 0.85;
// v1045: weight for the two chain points immediately adjacent to grabbedIdx during
// constraint relaxation. Lower than WEB_FREE_WEIGHT=0.85 so neighbors yield LESS —
// they pull back on the grabbed point, producing chain-tension drag (糸が引っ張り返す).
const WEB_GRAB_NEIGHBOR_WEIGHT = 0.55;
// v1045: viscous coupling between broom velocity and grabbed-point velocity. After
// per-frame BLEND_K catch-up, applies extra trailing offset proportional to the
// differential vs broom velocity. Fast sweeps stretch the strand farther than slow
// sweeps — signature 'honey' behavior.
const WEB_GRAB_VISCOUS_DRAG = 0.22;
const WEB_GRAB_RADIUS_MIN_PX = 36;
// Larger capture (~0.13*minDim) + larger release hysteresis (~2.1) for toddler-sized
// imprecise sweeps; grabs hang on through hand wobble so condD path accumulator fires.
const WEB_GRAB_RADIUS_FACTOR = 0.13;
// v1045: hysteresis raised 2.1 → 3.5. Release radius ~245px on minDim=540. Silk holds
// through a child's full sweep gesture instead of detaching mid-motion.
const WEB_GRAB_RELEASE_HYSTERESIS = 3.5;
// v1045: time-based stickiness. After distance first exceeds RELEASE2, grab is NOT
// released until grace expires OR distance exceeds R * RELEASE_HARD. Gives the
// 'stretching to the breaking limit' feel before detach.
const WEB_GRAB_RELEASE_GRACE_MS = 220;
// v1045: absolute release radius (R*4.5 ≈ 315px). Even mid-grace, if broom drifts
// this far the grab dies immediately — safety against soft-locked grabs on
// pointerup-lost edge cases.
const WEB_GRAB_RELEASE_HARD = 4.5;
// v1044: halved to 2 to prevent cascade — paired with WEB_BREAK_COOLDOWN_MS the wipe
// band holds at most 2 chains, and serializes break events 1-per-~220ms.
const WEB_GRAB_MAX_CONCURRENT = 2;
// v1045: raised stretch threshold 1.32 → 1.45. Lower BLEND_K + lower neighbor weight
// inflate stretchRatio earlier; raise condA threshold so v1044's gentler-recoil /
// no-cascade win is preserved. condD remains the dominant break path.
const WEB_BREAK_STRETCH_RATIO = 1.45;
const WEB_BREAK_SUSTAIN_MS = 1100;
const WEB_BREAK_FAST_SPEED_FACTOR = 1.2;
const WEB_BREAK_FAST_STRETCH = 1.14;
// v1044 condD: cumulative broom-to-grabbed-point displacement / minDim. Raised from
// 0.22 → 0.38 so a deliberate ~1.0-1.2s sweep on the SAME thread is required (vs
// ~600ms before). Combined with cooldown, breaks become a rhythmic "pop, pop, pop".
const WEB_BREAK_GRAB_PATH_RATIO = 0.38;
// v1044 NEW: global per-gs break lockout. After ANY thread breaks, no other thread can
// break for 220ms. Single most impactful fix for the "one sweep = cascade" problem.
const WEB_BREAK_COOLDOWN_MS = 220;
// NEW: within this window a re-grab of the same point preserves grabStartAt and
// grabPathPx so micro-releases from hand wobble don't reset the accumulator.
const WEB_REGRAB_CONTINUITY_MS = 250;
// v1045: wake radius widened 0.16 → 0.22. Brush-past radius ~119px. Threads within
// ~1.4× grab radius now register a sticky-touch reaction — communicates that the
// broom is COVERED in sticky silk.
const WEB_WAKE_RADIUS_FACTOR = 0.22;
// v1045: wake magnitude reduced 1.6 → 1.1. With L6 changing the inner-zone push to
// TOWARD broom (sticky reach) instead of in motion direction (wind push), each px
// reads stronger; smaller value keeps the outer wake gentle.
const WEB_WAKE_PUSH_PX = 1.1;
const WEB_WAKE_SPEED_REF_FACTOR = 0.8;
// v1045: sticky-tag inner zone (within outer wake). Points crossing this radius
// briefly lerp TOWARD broom, get whitened on render, and emit one dewdrop.
const WEB_STICKY_TAG_RADIUS_FACTOR = 0.2;
const WEB_STICKY_TAG_MS = 250;
const WEB_STICKY_TAG_LERP_K = 0.04;
// v1045: sustained 'stretch' SFX throttle while a grab has lag > WEB_STRETCH_SFX_LAG_PX.
const WEB_STRETCH_SFX_INTERVAL_MS = 320;
const WEB_STRETCH_SFX_LAG_PX = 28;
// v1045: mochi-bounce impulse magnitude applied on hysteresis/pointerup release.
// Injects inward velocity toward chain-interpolated rest position so the freed point
// overshoots rest by ~20% and oscillates once with damping.
const WEB_RELEASE_MOCHI_IMPULSE_PX = 5;
// NEW: absolute upper clamp on per-thread thickness for consistent silk look on tablet/desktop.
const WEB_MAX_THICKNESS_PX = 7;
// NEW: detached silk (issue #5) — gently floats down over a longer window.
const WEB_DETACH_HOLD_MS = 1100;
const WEB_DETACH_FADE_MS = 2200;
// v1044: reduced from 140 → 95 so sub-chain drifts rather than ballistic-falls.
const WEB_DETACH_GRAVITY = 95;
// v1044: reduced from 16 → 7 (~420 px/s vs 960 px/s) — visible recoil, no fireworks.
const WEB_SNAPBACK_IMPULSE_PX = 7;
// v1044 NEW: per-break particle constants. Replaces hard-coded 6/85/70 in _evaluateBreak
// and _spawnWebGlob. Lower count + lower jitter = tighter, gentler puff.
const WEB_BREAK_GLOB_COUNT = 3;
const WEB_BREAK_GLOB_JITTER_X = 55;
const WEB_BREAK_GLOB_JITTER_Y = 45;
const WEB_FLASH_MS = 60;
const WEB_DT_CLAMP_MIN_MS = 8;
const WEB_DT_CLAMP_MAX_MS = 33;
const WEB_VIBRATE_SNAP_MS = 14;
const WEB_VIBRATE_SOFT_MS = 8;

function _layoutWebSweepThreads(gs) {
  // Resize/relayout invalidates per-point grab state. Without this, mid-drag
  // orientation/DPR changes silently clear t.grabbedIdx but leave gs.activeGrabs
  // bumped, eventually reaching WEB_GRAB_MAX_CONCURRENT and locking _captureRopeGrabs
  // out forever (broom goes inert). Reset the counter alongside the rebuild.
  _releaseAllRopeGrabs(gs);
  gs.threads.forEach(function(t) {
    const def = t.def;
    if (!Number.isFinite(def.layer)) {
      def.layer = t.index < 8 ? 0 : (t.index < 16 ? 1 : 2);
    }
    const layerDef = WEB_SWEEP_LAYERS[def.layer] || WEB_SWEEP_LAYERS[0];
    // v1043: clamp to WEB_MAX_THICKNESS_PX so tablet/desktop don't get rope-like silk.
    t.thickness = Math.max(1.1, Math.min(WEB_MAX_THICKNESS_PX, Math.min(gs.w, gs.h) * (def.thickRatio || layerDef.thickRatio)));
    t.threshold = def.threshold || layerDef.threshold;
    t.color = def.color || layerDef.color;
    t.layer = def.layer;

    // Sub-chains (created by break split) skip rest re-sampling.
    if (t.frozenLayout === 1) return;

    // Sample the existing quadratic bezier (def.a, def.c, def.b) at t=i/(N-1) for i=0..6.
    const ax = def.a[0] * gs.w, ay = def.a[1] * gs.h;
    const bx = def.b[0] * gs.w, by = def.b[1] * gs.h;
    const cx = (def.c ? def.c[0] : (def.a[0] + def.b[0]) / 2) * gs.w;
    const cy = (def.c ? def.c[1] : (def.a[1] + def.b[1]) / 2) * gs.h;
    const points = new Array(WEB_CHAIN_N);
    for (let i = 0; i < WEB_CHAIN_N; i++) {
      const q = i / (WEB_CHAIN_N - 1);
      const u = 1 - q;
      const px = u * u * ax + 2 * u * q * cx + q * q * bx;
      const py = u * u * ay + 2 * u * q * cy + q * q * by;
      points[i] = {
        x: px, y: py,
        prevX: px, prevY: py,
        restX: px, restY: py,
        pinned: (i === 0 || i === WEB_CHAIN_N - 1) ? 1 : 0,
        grabbed: 0,
        grabStartAt: 0,
        taper: 1,
      };
    }
    t.points = points;
    // Build 6 segments. End segments unbreakable so anchors never fly off.
    const constraints = new Array(WEB_CHAIN_N - 1);
    let restTotal = 0;
    for (let i = 0; i < WEB_CHAIN_N - 1; i++) {
      const a = points[i], b = points[i + 1];
      const r = Math.hypot(b.x - a.x, b.y - a.y);
      restTotal += r;
      constraints[i] = {
        i: i,
        j: i + 1,
        rest: r,
        unbreakable: (i === 0 || i === WEB_CHAIN_N - 2) ? 1 : 0,
        broken: 0,
      };
    }
    t.constraints = constraints;
    t.restTotal = restTotal;
    t.currentTotal = restTotal;
    t.stretchRatio = 1;
    t.tension = 0;
    t.grabbedIdx = -1;
    t.broken = 0;
    t.flashAt = 0;
    t.flashX = 0;
    t.flashY = 0;
  });
}

function _setWebSweepStatus(gs, text) {
  if (!gs) return;
  gs.status = text || '';
  if (gs.statusEl) gs.statusEl.textContent = gs.status;
}

function _startWebSweepLoop(gs) {
  function tick(ts) {
    if (gs !== _webGameState) return;
    _resizeWebSweepCanvas(gs);
    const dt = Math.min(50, Math.max(8, ts - gs.lastTs));
    gs.lastTs = ts;
    _updateWebSweepPhysics(gs, dt);
    _drawWebSweepGame(gs, ts);
    gs.rafId = requestAnimationFrame(tick);
    _webSweepRafId = gs.rafId;
  }
  gs.lastTs = performance.now();
  gs.rafId = requestAnimationFrame(tick);
  _webSweepRafId = gs.rafId;
}

function _updateWebSweepPhysics(gs, dt) {
  // Reduced-motion: skip Verlet entirely; points stay at rest.
  if (_webSweepReducedMotion()) {
    // Particles/ripples still tick so VFX spawned by reduced-motion detach can finish.
    const sec0 = dt / 1000;
    gs.particles.forEach(function(p) {
      p.age += dt;
      p.x += p.vx * sec0;
      p.y += p.vy * sec0;
      p.vx *= Math.pow(0.84, dt / 16);
      p.vy = p.vy * Math.pow(0.86, dt / 16) + 26 * sec0;
    });
    gs.particles = gs.particles.filter(function(p) { return p.age < p.life; });
    gs.ripples.forEach(function(r) { r.age += dt; });
    gs.ripples = gs.ripples.filter(function(r) { return r.age < r.life; });
    gs.threads.forEach(function(t) {
      if (t.detached) {
        t.detachAge += dt;
        t.opacity = _detachedOpacity(t.detachAge);
      }
      if (t.layerFadeStart) {
        t.opacity = Math.max(0, 1 - (performance.now() - t.layerFadeStart) / 300);
      }
      t.stick = Math.max(0, t.stick - sec0 * 1.8);
    });
    return;
  }

  const sec = Math.min(WEB_DT_CLAMP_MAX_MS / 1000, dt / 1000);

  // 1) Capture broom prev/spring lerp, derive vx/vy/speed.
  const bx0 = gs.broom.x, by0 = gs.broom.y;
  gs.broom.prevX = bx0;
  gs.broom.prevY = by0;
  const lerp = Math.min(1, dt / 62);
  gs.broom.x += (gs.broom.tx - gs.broom.x) * lerp;
  gs.broom.y += (gs.broom.ty - gs.broom.y) * lerp;
  gs.broom.vx = (gs.broom.x - bx0) / (sec || 0.0001);
  gs.broom.vy = (gs.broom.y - by0) / (sec || 0.0001);
  const broomSpeed = Math.hypot(gs.broom.vx, gs.broom.vy);
  gs.speed = broomSpeed / 1000;
  const minDim = Math.min(gs.w, gs.h);

  // 2) Acquire/release rope grabs every tick from the up-to-date broom position.
  _captureRopeGrabs(gs);

  // v1043: adjacent-wake — sway non-grabbed mid-points on ALL layers from broom motion.
  // Runs BEFORE the per-thread integration so the constraint relaxation later partially
  // restores rest (transient sway, not permanent drift). Skip when broom is idle.
  _applyAdjacentWake(gs, dt);

  for (const t of gs.threads) {
    if (t.detached || t.broken) {
      _updateDetachedThread(t, sec, dt, gs);
      continue;
    }
    if (t.layerFadeStart) {
      t.opacity = Math.max(0, 1 - (performance.now() - t.layerFadeStart) / 300);
    }

    const pts = t.points;
    if (!pts || pts.length !== WEB_CHAIN_N) continue;

    // 3) Verlet integrate free, non-grabbed points.
    for (let i = 1; i <= WEB_CHAIN_N - 2; i++) {
      const p = pts[i];
      if (p.pinned) {
        p.x = p.restX; p.y = p.restY;
        p.prevX = p.x; p.prevY = p.y;
        continue;
      }
      if (p.grabbed) {
        // v1045: viscous coupling on TOP of catch-up blend.
        // Step 1: exponential catch-up (much slower than v1044 — see WEB_GRAB_BLEND_K=0.06).
        const blend = 1 - Math.pow(1 - WEB_GRAB_BLEND_K, dt / 16);
        let nx = p.x + (gs.broom.x - p.x) * blend;
        let ny = p.y + (gs.broom.y - p.y) * blend;
        // Step 2: viscous drag — point trails MORE when broom moves fast. We
        // approximate the point's own velocity from the would-be displacement this
        // frame; the differential vs broom velocity is applied as an opposing offset.
        // Fast wipe = bigger stretch.
        const dtScale = dt / 16;
        if (dtScale > 0) {
          const pointVx = (nx - p.x) / dtScale;
          const pointVy = (ny - p.y) / dtScale;
          const broomVx = gs.broom.vx || 0;
          const broomVy = gs.broom.vy || 0;
          const dragX = (broomVx - pointVx) * WEB_GRAB_VISCOUS_DRAG * dtScale * (dt / 16);
          const dragY = (broomVy - pointVy) * WEB_GRAB_VISCOUS_DRAG * dtScale * (dt / 16);
          nx -= dragX;
          ny -= dragY;
        }
        p.prevX = p.x; p.prevY = p.y;
        p.x = nx; p.y = ny;
      } else {
        const vx = (p.x - p.prevX) * WEB_LINEAR_DAMP;
        const vy = (p.y - p.prevY) * WEB_LINEAR_DAMP;
        p.prevX = p.x; p.prevY = p.y;
        p.x += vx;
        p.y += vy + WEB_MICRO_GRAVITY * sec * sec;
      }
    }

    // v1043: accumulate grab-path BEFORE constraint relaxation so we measure the
    // raw broom-to-point displacement, not the constraint-corrected position.
    _accumulateGrabPath(gs, t, dt);

    // 4) Constraint relaxation.
    // v1045: lower weight for the two points ADJACENT to a grabbed point so they
    // resist the solver more — neighbors stay closer to rest, generating chain
    // tension that pulls back on the grabbed point. Applies only when a grab is
    // active on this thread; otherwise behaves identically to v1044.
    const iters = (dt > 26) ? WEB_CONSTRAINT_ITERS_LOW_FPS : WEB_CONSTRAINT_ITERS;
    const gIdx = t.grabbedIdx;
    for (let it = 0; it < iters; it++) {
      for (const c of t.constraints) {
        if (c.broken) continue;
        const pi = pts[c.i], pj = pts[c.j];
        const dx = pj.x - pi.x, dy = pj.y - pi.y;
        const d = Math.hypot(dx, dy) || 0.0001;
        const diff = (d - c.rest) / d;
        const iNeighbor = (gIdx >= 0) && (c.i === gIdx - 1 || c.i === gIdx + 1);
        const jNeighbor = (gIdx >= 0) && (c.j === gIdx - 1 || c.j === gIdx + 1);
        const wi = pi.pinned ? 0 : (pi.grabbed ? WEB_GRAB_WEIGHT : (iNeighbor ? WEB_GRAB_NEIGHBOR_WEIGHT : WEB_FREE_WEIGHT));
        const wj = pj.pinned ? 0 : (pj.grabbed ? WEB_GRAB_WEIGHT : (jNeighbor ? WEB_GRAB_NEIGHBOR_WEIGHT : WEB_FREE_WEIGHT));
        const wsum = wi + wj;
        if (wsum === 0) continue;
        pi.x += dx * diff * (wi / wsum);
        pi.y += dy * diff * (wi / wsum);
        pj.x -= dx * diff * (wj / wsum);
        pj.y -= dy * diff * (wj / wsum);
      }
    }

    // 5) Recompute totals + stretch.
    let total = 0;
    for (let i = 0; i < WEB_CHAIN_N - 1; i++) {
      const a = pts[i], b = pts[i + 1];
      total += Math.hypot(b.x - a.x, b.y - a.y);
    }
    t.currentTotal = total;
    t.stretchRatio = t.restTotal > 0 ? total / t.restTotal : 1;
    t.tension = Math.max(0, Math.min(1, t.stretchRatio - 1));

    // 6) Stick decay (SFX/draw compat).
    t.stick = Math.max(0, t.stick - sec * 1.8);

    // 7) Break evaluation.
    _evaluateBreak(gs, t, broomSpeed, minDim);
  }

  // v1045: sustained 'stretch' SFX while ANY grab has visible lag > threshold.
  // Throttled via WEB_STRETCH_SFX_INTERVAL_MS. Re-uses 'soft' kind at very low
  // volume (handled by _playWebStickySfx kind='soft' already — sufficient).
  const nowStretch = performance.now();
  if (gs.activeGrabs > 0 && (!gs._lastStretchSfxAt || (nowStretch - gs._lastStretchSfxAt) > WEB_STRETCH_SFX_INTERVAL_MS)) {
    let maxLag2 = 0;
    for (const tt of gs.threads) {
      if (tt.grabbedIdx < 0) continue;
      const gp = tt.points && tt.points[tt.grabbedIdx];
      if (!gp) continue;
      const lx = gp.x - gs.broom.x, ly = gp.y - gs.broom.y;
      const lag2 = lx * lx + ly * ly;
      if (lag2 > maxLag2) maxLag2 = lag2;
    }
    if (maxLag2 > WEB_STRETCH_SFX_LAG_PX * WEB_STRETCH_SFX_LAG_PX) {
      _playWebStickySfx('soft');
      gs._lastStretchSfxAt = nowStretch;
    }
  }

  gs.particles.forEach(function(p) {
    p.age += dt;
    p.x += p.vx * sec;
    p.y += p.vy * sec;
    p.vx *= Math.pow(0.84, dt / 16);
    p.vy = p.vy * Math.pow(0.86, dt / 16) + 26 * sec;
  });
  gs.particles = gs.particles.filter(function(p) { return p.age < p.life; });
  gs.ripples.forEach(function(r) { r.age += dt; });
  gs.ripples = gs.ripples.filter(function(r) { return r.age < r.life; });
}

function _updateDetachedThread(t, sec, dt, gs) {
  t.detachAge += dt;
  // v1043: gentler damp (0.985) preserves snap-back impulse so gravity has time to
  // pull the silk visibly downward. Stronger gravity (WEB_DETACH_GRAVITY=140) over
  // the extended fade window (2.2s) yields ~338px of fall — the "fuwatto yukkuri
  // shita ni ochiteiku" feel requested in playtest.
  if (t.points && t.points.length) {
    const yClamp = (gs && gs.h) ? (gs.h + 60) : Number.POSITIVE_INFINITY;
    for (let i = 0; i < t.points.length; i++) {
      const p = t.points[i];
      const vx = (p.x - p.prevX) * WEB_LINEAR_DAMP;
      const vy = (p.y - p.prevY) * WEB_LINEAR_DAMP;
      p.prevX = p.x; p.prevY = p.y;
      p.x += vx;
      p.y += vy + WEB_DETACH_GRAVITY * sec * sec;
      if (p.y > yClamp) { p.y = yClamp; p.prevY = yClamp; }
    }
  }
  t.opacity = _detachedOpacity(t.detachAge);
}

// v1043: two-phase opacity — silk stays fully visible for WEB_DETACH_HOLD_MS
// (the "falling" phase) then linearly fades over the remaining window.
function _detachedOpacity(detachAge) {
  if (detachAge < WEB_DETACH_HOLD_MS) return 1;
  const fadeWindow = WEB_DETACH_FADE_MS - WEB_DETACH_HOLD_MS;
  if (fadeWindow <= 0) return 0;
  return Math.max(0, 1 - (detachAge - WEB_DETACH_HOLD_MS) / fadeWindow);
}

// v1043: adjacent-wake (issue #3). Walks ALL non-detached/broken threads and
// nudges non-pinned, non-grabbed interior points within R toward the broom's
// MOTION direction. Writes p.x/p.y only (NOT prevX/prevY) so the constraint
// solver later partially restores rest — produces a transient sway, not a
// permanent displacement. Rings on non-current layers stay unbreakable (the
// layer gate in _captureRopeGrabs is preserved), they just visibly react now.

// v1045: mochi-bounce. Compute a rest-position target for the released point as
// the stored restX/restY, then inject Verlet prev so the next integration
// overshoots rest and oscillates once.
function _applyMochiReleaseImpulse(t, idx) {
  const pts = t && t.points;
  if (!pts || pts.length !== WEB_CHAIN_N) return;
  const p = pts[idx];
  if (!p) return;
  const tx = p.restX, ty = p.restY;
  if (!Number.isFinite(tx) || !Number.isFinite(ty)) return;
  const dx = tx - p.x, dy = ty - p.y;
  const dlen = Math.hypot(dx, dy);
  if (dlen < 0.5) return;
  const ux = dx / dlen, uy = dy / dlen;
  // In Verlet, velocity = (current - prev). To push +V toward rest, set
  // prev = current - V * unit_toward_rest.
  p.prevX = p.x - ux * WEB_RELEASE_MOCHI_IMPULSE_PX;
  p.prevY = p.y - uy * WEB_RELEASE_MOCHI_IMPULSE_PX;
}

// v1045: spawn a single small white globlet at the release point (release silk
// residue OR sticky-tag brush-by). Suppressed under reduced motion.
function _spawnReleaseDewdrop(gs, x, y, thickness) {
  if (!gs || !gs.particles) return;
  if (_webSweepReducedMotion()) return;
  // Deterministic micro-jitter via existing broom velocity so two simultaneous
  // dewdrops don't perfectly overlap. No Math.random.
  const bias = ((gs.broom && gs.broom.vx) || 0) * 0.02;
  gs.particles.push({
    x: x, y: y,
    vx: bias * 0.5,
    vy: -22,
    age: 0, life: 460,
    r: Math.max(1.5, (thickness || 4) * 0.55),
    kind: 'releaseDew',
  });
}

function _applyAdjacentWake(gs, dt) {
  if (!gs || !gs.broom) return;
  if (_webSweepReducedMotion()) return;
  const minDim = Math.min(gs.w, gs.h);
  if (minDim <= 0) return;
  const broomSpeed = Math.hypot(gs.broom.vx || 0, gs.broom.vy || 0);
  const speedRef = minDim * WEB_WAKE_SPEED_REF_FACTOR;
  const speedNorm = speedRef > 0 ? Math.min(1, broomSpeed / speedRef) : 0;
  // Early-exit when broom is nearly still — child holding finger to think shouldn't
  // wake adjacent rings, and this saves the per-point loop entirely.
  if (speedNorm < 0.05) return;
  const R = minDim * WEB_WAKE_RADIUS_FACTOR;
  if (R <= 0) return;
  const R2 = R * R;
  const invSpeed = broomSpeed > 0.0001 ? 1 / broomSpeed : 0;
  const ux = (gs.broom.vx || 0) * invSpeed;
  const uy = (gs.broom.vy || 0) * invSpeed;
  const bx = gs.broom.x, by = gs.broom.y;
  const baseMag = WEB_WAKE_PUSH_PX * speedNorm;
  const threads = gs.threads;
  for (let ti = 0; ti < threads.length; ti++) {
    const t = threads[ti];
    if (!t || t.detached || t.broken) continue;
    if (t.frozenLayout === 1) continue;
    const pts = t.points;
    if (!pts || pts.length < 3) continue;
    // v1045: split wake into outer-wake (motion-direction push, unchanged behaviour)
    // and inner sticky-tag zone (toward-broom pull + transient state + dewdrop).
    const stickyR = minDim * WEB_STICKY_TAG_RADIUS_FACTOR;
    const stickyR2 = stickyR * stickyR;
    const nowTag = performance.now();
    for (let i = 1; i < pts.length - 1; i++) {
      const p = pts[i];
      if (p.pinned || p.grabbed) continue;
      const dx = bx - p.x;
      if (dx > R || dx < -R) continue;
      const dy = by - p.y;
      if (dy > R || dy < -R) continue;
      const d2 = dx * dx + dy * dy;
      if (d2 > R2) continue;
      const d = Math.sqrt(d2);
      const falloff = 1 - d / R;
      if (d2 < stickyR2) {
        // Sticky-tag zone: pull TOWARD broom (anti-motion semantics), tag the point,
        // spawn a dewdrop ONCE per tag activation.
        const k = WEB_STICKY_TAG_LERP_K * falloff;
        p.x += dx * k;
        p.y += dy * k;
        if (!p._stickyTagStartAt || (nowTag - p._stickyTagStartAt) > WEB_STICKY_TAG_MS) {
          _spawnReleaseDewdrop(gs, p.x, p.y, t.thickness * 0.7);
          if (nowTag - (gs.lastTagSfxAt || 0) > 180) {
            _playWebStickySfx('soft');
            gs.lastTagSfxAt = nowTag;
          }
        }
        p._stickyTagStartAt = nowTag;
      } else {
        // Outer wake: original motion-direction push (gentler magnitude in v1045).
        const mag = baseMag * falloff;
        p.x += ux * mag;
        p.y += uy * mag;
      }
    }
  }
}

// v1043: accumulate per-tick |broom - grabbed point| distance into p.grabPathPx.
// This is the basis for condD in _evaluateBreak — a sweep distance threshold that
// IS reachable for small hands, unlike the original stretch/sustain/speed conditions.
function _accumulateGrabPath(gs, t, dt) {
  if (!gs || !t || t.grabbedIdx < 0) return;
  const p = t.points && t.points[t.grabbedIdx];
  if (!p) return;
  if (p._lastGrabBroomX === undefined) {
    p._lastGrabBroomX = gs.broom.x;
    p._lastGrabBroomY = gs.broom.y;
  }
  const dx = gs.broom.x - p._lastGrabBroomX;
  const dy = gs.broom.y - p._lastGrabBroomY;
  const step = Math.hypot(dx, dy);
  p.grabPathPx = (p.grabPathPx || 0) + step;
  p._lastGrabBroomX = gs.broom.x;
  p._lastGrabBroomY = gs.broom.y;
}

function _captureRopeGrabs(gs) {
  if (!gs.dragging || gs.locked) return;
  const R = Math.max(WEB_GRAB_RADIUS_MIN_PX, Math.min(gs.w, gs.h) * WEB_GRAB_RADIUS_FACTOR);
  const R2 = R * R;
  const RELEASE = R * WEB_GRAB_RELEASE_HYSTERESIS;
  const RELEASE2 = RELEASE * RELEASE;
  const bx = gs.broom.x, by = gs.broom.y;

  const nowRelease = performance.now();
  const RELEASE_HARD = R * WEB_GRAB_RELEASE_HARD;
  const RELEASE_HARD2 = RELEASE_HARD * RELEASE_HARD;
  // (a) Maintain existing grabs: release if broom drifts beyond hysteresis.
  // v1045: clinging release. Once distance exceeds RELEASE2 we START a grace
  // window (WEB_GRAB_RELEASE_GRACE_MS) during which the grab continues to hold.
  // This produces the 'stretching to its limit' feel — silk hangs on visibly.
  // The grab dies only if (a) grace expires OR (b) distance exceeds the hard cap.
  for (const t of gs.threads) {
    if (t.grabbedIdx < 0 || t.detached || t.broken) continue;
    const p = t.points[t.grabbedIdx];
    if (!p) { t.grabbedIdx = -1; continue; }
    const dxg = p.x - bx, dyg = p.y - by;
    const d2 = dxg * dxg + dyg * dyg;
    let shouldRelease = false;
    if (d2 > RELEASE_HARD2) {
      shouldRelease = true;
    } else if (d2 > RELEASE2) {
      if (!p._releaseGraceStartAt) p._releaseGraceStartAt = nowRelease;
      if (nowRelease - p._releaseGraceStartAt > WEB_GRAB_RELEASE_GRACE_MS) shouldRelease = true;
    } else {
      // Re-entered hysteresis envelope — reset grace.
      p._releaseGraceStartAt = 0;
    }
    if (shouldRelease) {
      // v1043: remember release timestamp + index so a quick re-grab within
      // WEB_REGRAB_CONTINUITY_MS preserves grabStartAt + grabPathPx — forgiveness
      // for the micro-releases produced by toddler hand wobble.
      t.lastGrabReleaseAt = nowRelease;
      t.lastGrabIdx = t.grabbedIdx;
      // v1045: mochi-bounce + 'tearing-off' VFX/SFX. Silk RELEASED, didn't vanish.
      _applyMochiReleaseImpulse(t, t.grabbedIdx);
      _spawnReleaseDewdrop(gs, p.x, p.y, t.thickness);
      if (nowRelease - (gs.lastSfxAt || 0) > 140) {
        _playWebStickySfx('soft');
        gs.lastSfxAt = nowRelease;
      }
      p.grabbed = 0;
      p._releaseGraceStartAt = 0;
      // Intentionally do NOT zero p.grabStartAt / p.grabPathPx / p._lastGrabBroomX
      // here — they're consulted by the continuity branch in section (b).
      t.grabbedIdx = -1;
      gs.activeGrabs = Math.max(0, gs.activeGrabs - 1);
    }
  }

  // (b) Acquire new grabs from current-layer chains, max 4 total, 1 per chain.
  if (gs.activeGrabs >= WEB_GRAB_MAX_CONCURRENT) return;
  const candidates = [];
  for (let ti = 0; ti < gs.threads.length; ti++) {
    const t = gs.threads[ti];
    if (t.detached || t.broken) continue;
    if (t.def.layer !== gs.currentLayer) continue;
    if (t.grabbedIdx >= 0) continue;
    if (!t.points || t.points.length !== WEB_CHAIN_N) continue;
    let bestI = -1, bestD2 = R2;
    for (let i = 1; i <= WEB_CHAIN_N - 2; i++) {
      const p = t.points[i];
      const d2 = (p.x - bx) * (p.x - bx) + (p.y - by) * (p.y - by);
      if (d2 < bestD2) { bestD2 = d2; bestI = i; }
    }
    if (bestI >= 0) candidates.push({ ti: ti, i: bestI, d2: bestD2 });
  }
  candidates.sort(function(a, b) { return a.d2 - b.d2; });
  const now = performance.now();
  for (const c of candidates) {
    if (gs.activeGrabs >= WEB_GRAB_MAX_CONCURRENT) break;
    const t = gs.threads[c.ti];
    t.grabbedIdx = c.i;
    const gp = t.points[c.i];
    gp.grabbed = 1;
    // v1043: regrab-continuity. If the SAME point was released < WEB_REGRAB_CONTINUITY_MS
    // ago, preserve grabStartAt and grabPathPx so condB/condD keep accumulating across
    // the wobble. Otherwise initialize fresh per-grab state (incl. broom-path cache).
    const continuous =
      t.lastGrabIdx === c.i &&
      t.lastGrabReleaseAt > 0 &&
      (now - t.lastGrabReleaseAt) <= WEB_REGRAB_CONTINUITY_MS;
    if (!continuous) {
      gp.grabStartAt = now;
      gp.grabPathPx = 0;
      gp._lastGrabBroomX = gs.broom.x;
      gp._lastGrabBroomY = gs.broom.y;
    }
    // Clear continuity bookkeeping either way so it isn't reused twice.
    t.lastGrabReleaseAt = 0;
    t.lastGrabIdx = -1;
    t.stick = 1;
    gs.activeGrabs++;
    if (now - (gs.lastSfxAt || 0) > 120) {
      _playWebStickySfx('soft');
      gs.lastSfxAt = now;
    }
    if (gs.vibrate) gs.vibrate(WEB_VIBRATE_SOFT_MS);
    if (gs.currentLayer === 0) _setWebSweepStatus(gs, 'クモさんの まわりを やさしく はらってね');
    else if (gs.currentLayer === 1) _setWebSweepStatus(gs, 'もう ちょっと! キラキラ のこってる');
    else _setWebSweepStatus(gs, 'そう、 そのちょうし! いとが ゆるんできた');
  }
}

function _releaseAllRopeGrabs(gs) {
  if (!gs) return;
  for (const t of gs.threads) {
    if (t.grabbedIdx >= 0) {
      const p = t.points && t.points[t.grabbedIdx];
      if (p) {
        // v1045: mochi-bounce on pointerup release too — without this, lifting the
        // finger makes the silk silently vanish from the broom. Every release feels alive.
        _applyMochiReleaseImpulse(t, t.grabbedIdx);
        _spawnReleaseDewdrop(gs, p.x, p.y, t.thickness);
        p.grabbed = 0;
        p.grabStartAt = 0;
        // v1043: clear path accumulator so a fresh drag after pointerup starts from 0.
        p.grabPathPx = 0;
        p._lastGrabBroomX = undefined;
        p._lastGrabBroomY = undefined;
        p._releaseGraceStartAt = 0;
      }
      t.grabbedIdx = -1;
    }
    // v1043: full release also clears regrab-continuity bookkeeping.
    t.lastGrabReleaseAt = 0;
    t.lastGrabIdx = -1;
  }
  gs.activeGrabs = 0;
}

function _evaluateBreak(gs, t, broomSpeed, minDim) {
  if (t.grabbedIdx < 0 || t.broken || t.detached) return;
  const now = performance.now();
  // v1044: global per-gs break cooldown. Prevents "one sweep = cascade of breaks"
  // by serializing break events. Other threads continue accumulating grabPathPx,
  // stretchRatio, etc. during the lockout, so a thread that's "ready to break"
  // will trip the instant the cooldown expires — no missed input.
  if (gs._lastBreakAt && (now - gs._lastBreakAt) < WEB_BREAK_COOLDOWN_MS) return;
  const p = t.points[t.grabbedIdx];
  if (!p) return;
  const condA = t.stretchRatio > WEB_BREAK_STRETCH_RATIO;
  const condB = p.grabStartAt > 0 && (now - p.grabStartAt) > WEB_BREAK_SUSTAIN_MS;
  const condC = broomSpeed > minDim * WEB_BREAK_FAST_SPEED_FACTOR && t.stretchRatio > WEB_BREAK_FAST_STRETCH;
  // v1043 condD: cumulative grab-path displacement. This is the dominant break
  // path for toddlers — a single lateral wipe of ~118px on a 540 minDim trips it,
  // unaffected by the constraint solver yanking the grabbed point back to rest.
  const condD = (p.grabPathPx || 0) > minDim * WEB_BREAK_GRAB_PATH_RATIO;
  if (!(condA || condB || condC || condD)) return;

  // Find weakest (most stretched) breakable segment.
  let breakIdx = -1, worstStretch = -Infinity;
  for (let k = 0; k < t.constraints.length; k++) {
    const c = t.constraints[k];
    if (c.unbreakable || c.broken) continue;
    const a = t.points[c.i], b = t.points[c.j];
    const len = Math.hypot(b.x - a.x, b.y - a.y);
    const s = len - c.rest;
    if (s > worstStretch) { worstStretch = s; breakIdx = k; }
  }
  if (breakIdx < 0) {
    // Fallback: pick segment adjacent to the grabbed point (interior side).
    breakIdx = Math.max(1, Math.min(t.constraints.length - 2, t.grabbedIdx - 1));
  }

  const cseg = t.constraints[breakIdx];
  const pa = t.points[cseg.i], pb = t.points[cseg.j];
  const bx = (pa.x + pb.x) / 2;
  const by = (pa.y + pb.y) / 2;

  // SPLIT in-place: parent becomes broken+detached; spawn two sub-chains.
  const subA = _makeSubChain(t, 0, cseg.i);              // points[0..cseg.i]
  const subB = _makeSubChain(t, cseg.j, WEB_CHAIN_N - 1); // points[cseg.j..6]

  // Snap-back impulse via Verlet prev injection (recoil away from the break point).
  const dx = pb.x - pa.x, dy = pb.y - pa.y;
  const dlen = Math.hypot(dx, dy) || 1;
  const ux = dx / dlen, uy = dy / dlen;
  if (subA && subA.points.length) {
    const endA = subA.points[subA.points.length - 1];
    endA.prevX = endA.x + ux * WEB_SNAPBACK_IMPULSE_PX;
    endA.prevY = endA.y + uy * WEB_SNAPBACK_IMPULSE_PX;
  }
  if (subB && subB.points.length) {
    const endB = subB.points[0];
    endB.prevX = endB.x - ux * WEB_SNAPBACK_IMPULSE_PX;
    endB.prevY = endB.y - uy * WEB_SNAPBACK_IMPULSE_PX;
  }
  if (subA) {
    subA.flashAt = now; subA.flashX = bx; subA.flashY = by;
    // Mark sub-chains detached so _updateDetachedThread integrates them and the
    // snap-back impulse (encoded into prev positions above) actually produces
    // visible recoil/falling silk VFX. The main physics loop skips them due
    // to the WEB_CHAIN_N length guard, so without this flag they freeze.
    subA.detached = true; subA.detachAge = 0;
  }
  if (subB) {
    subB.flashAt = now; subB.flashX = bx; subB.flashY = by;
    subB.detached = true; subB.detachAge = 0;
  }

  // Mark original broken + scheduled for removal via opacity fade.
  t.broken = 1;
  t.opacity = 0;
  t.detached = true;
  t.detachAge = 0;
  if (subA) gs.threads.push(subA);
  if (subB) gs.threads.push(subB);

  // Release the grab on the parent.
  if (t.grabbedIdx >= 0) {
    const gp = t.points[t.grabbedIdx];
    if (gp) {
      gp.grabbed = 0;
      gp.grabStartAt = 0;
      gp.grabPathPx = 0;
      gp._lastGrabBroomX = undefined;
      gp._lastGrabBroomY = undefined;
    }
    t.grabbedIdx = -1;
    // v1043: parent is broken, don't bridge continuity to a sub-chain.
    t.lastGrabReleaseAt = 0;
    t.lastGrabIdx = -1;
    gs.activeGrabs = Math.max(0, gs.activeGrabs - 1);
  }

  // VFX + SFX.
  const dxv = gs.broom.vx || 0;
  const dyv = gs.broom.vy || 0;
  for (let i = 0; i < WEB_BREAK_GLOB_COUNT; i++) _spawnWebGlob(gs, bx, by, dxv * 0.02, dyv * 0.02, 1.4);
  _spawnWebRipple(gs, bx, by);
  _playWebStickySfx('snap');
  if (gs.vibrate) gs.vibrate(WEB_VIBRATE_SNAP_MS);

  // v1044: stamp the cooldown clock so subsequent _evaluateBreak calls within
  // WEB_BREAK_COOLDOWN_MS bail at the gate above.
  gs._lastBreakAt = now;

  // Layer-clear check.
  _checkWebSweepLayerClear(gs, t.def.layer);
}

function _makeSubChain(parent, startIdx, endIdx) {
  if (!parent || !parent.points) return null;
  const n = endIdx - startIdx + 1;
  if (n < 2) return null;
  const points = new Array(n);
  let restTotal = 0;
  for (let k = 0; k < n; k++) {
    const src = parent.points[startIdx + k];
    points[k] = {
      x: src.x, y: src.y,
      prevX: src.prevX, prevY: src.prevY,
      restX: src.restX, restY: src.restY,
      pinned: 0,
      grabbed: 0,
      grabStartAt: 0,
      taper: 1,
    };
  }
  // The sub-chain keeps the original anchor end pinned (if it includes index 0
  // or WEB_CHAIN_N-1 of the parent). The break-side end stays free.
  if (startIdx === 0) points[0].pinned = 1;
  if (endIdx === WEB_CHAIN_N - 1) points[n - 1].pinned = 1;

  const constraints = new Array(n - 1);
  for (let k = 0; k < n - 1; k++) {
    const a = points[k], b = points[k + 1];
    const srcConstraint = parent.constraints[startIdx + k];
    const rest = srcConstraint ? srcConstraint.rest : Math.hypot(b.x - a.x, b.y - a.y);
    restTotal += rest;
    constraints[k] = {
      i: k, j: k + 1, rest: rest,
      unbreakable: 1, // sub-chains do not split further
      broken: 0,
    };
  }

  return {
    index: parent.index, // diagnostic
    def: parent.def,
    layer: parent.def.layer,
    color: parent.color,
    thickness: parent.thickness,
    threshold: parent.threshold,
    phase: parent.phase,
    points: points,
    constraints: constraints,
    restTotal: restTotal,
    currentTotal: restTotal,
    stretchRatio: 1,
    tension: 0,
    grabbedIdx: -1,
    broken: 0,
    frozenLayout: 1,
    parentIndex: parent.index,
    flashAt: 0,
    flashX: 0,
    flashY: 0,
    stick: 0,
    detached: false,
    detachAge: 0,
    opacity: 1,
    layerFadeStart: 0,
  };
}

function _checkWebSweepLayerClear(gs, layer) {
  if (!gs || gs.locked) return;
  if (gs.currentLayer !== layer) return;
  // Exclude frozen sub-chains (frozenLayout=1) — they are post-break visual remnants,
  // not original "to be cleared" chains. Counting them would softlock the layer.
  const remaining = gs.threads.filter(function(x) {
    return x.def.layer === layer && !x.broken && !x.detached && !x.frozenLayout && x.opacity > 0.02;
  });
  if (remaining.length === 0) _onWebSweepLayerCleared(gs);
}

function _detachWebThread(gs, t, x, y, dx, dy) {
  if (!gs || !t || t.detached) return;
  t.detached = true;
  t.detachAge = 0;
  t.opacity = 1;
  // Inject a Verlet velocity snapshot per point in the broom direction so
  // _updateDetachedThread carries the silk away naturally.
  if (t.points && t.points.length) {
    for (let i = 0; i < t.points.length; i++) {
      const p = t.points[i];
      const jx = Math.sin(t.phase + i * 0.91) * 18;
      const jy = Math.sin(t.phase * 1.3 + i * 1.27) * 14;
      p.prevX = p.x - (dx * 0.6 + jx);
      p.prevY = p.y - (dy * 0.6 + jy - 6);
      p.pinned = 0;
      p.grabbed = 0;
    }
  }
  gs.detachedCount++;
  gs.strokeDetachCount = (gs.strokeDetachCount || 0) + 1;
  _spawnWebRipple(gs, x, y);
  for (let i = 0; i < 7; i++) _spawnWebGlob(gs, x, y, dx, dy, 1.2);
  _playWebStickySfx('snap');
  if (gs.vibrate) gs.vibrate(WEB_VIBRATE_SOFT_MS);
}

function _applyWebBroomSweep(gs, x, y, dx, dy, dt) {
  // Now a thin coordinator. Physics loop handles grab capture/break via _captureRopeGrabs/_evaluateBreak.
  // Kept as a stable export point for legacy callers; current pointermove no longer calls it.
  if (!gs || gs.locked) return;
  _captureRopeGrabs(gs);
}

function _onWebSweepLayerCleared(gs) {
  if (!gs || gs.locked || gs.currentLayer >= WEB_SWEEP_LAYERS.length) return;
  const layer = gs.currentLayer;
  // Guard against re-entry while a fade is in progress for the same layer.
  if (gs.layerClearAt[layer]) return;
  const now = performance.now();
  gs.layerClearAt[layer] = now;
  gs.strokeCounter[layer] = 0;
  gs.lastDirX = null;
  gs.threads.forEach(function(t) {
    if (t.def.layer !== layer || t.detached || t.broken) return;
    t.layerFadeStart = now;
    // Deterministic recoil per-point via Verlet prev injection (no Math.random).
    if (t.points && t.points.length) {
      for (let i = 0; i < t.points.length; i++) {
        const p = t.points[i];
        const jx = Math.sin(t.phase + i * 0.71) * 9;
        const jy = -4 + Math.sin(t.phase * 1.3 + i * 0.91) * 6;
        p.prevX = p.x - jx;
        p.prevY = p.y - jy;
        p.pinned = 0;
      }
    }
  });
  _spawnLayerSparkle(gs, layer);
  gs.spiderEmotion = Math.min(2, gs.spiderEmotion + 1);
  _playMzSePitch('correct', 2 * layer);
  if (gs.vibrate) gs.vibrate(30);
  _releaseAllRopeGrabs(gs);
  _webGimmickSetTimeout(function() {
    if (gs !== _webGameState) return;
    gs.threads.forEach(function(t) {
      if (t.def.layer !== layer || t.detached) return;
      t.detached = true;
      t.detachAge = 0;
      t.opacity = 1;
    });
  }, 300);
  if (layer === 0) _setWebSweepStatus(gs, 'いいね！ ふとい いとが ほどけた');
  else if (layer === 1) _setWebSweepStatus(gs, 'あと すこし！ クモさん もう ちょっとだよ');
  else _setWebSweepStatus(gs, 'クモさん、 でられたよ！');
  gs.currentLayer++;
  if (gs.currentLayer >= WEB_SWEEP_LAYERS.length) {
    _finishWebSweepGame(gs);
  }
}

function _spawnWebGlob(gs, x, y, dx, dy, weight) {
  if (_webSweepReducedMotion()) return;
  // Deterministic jitter via Math.sin on a monotonic counter (per project rule: no Math.random).
  gs._globSeed = (gs._globSeed || 0) + 1;
  const s = gs._globSeed;
  const j1 = Math.sin(s * 12.9898) - Math.floor(Math.sin(s * 12.9898));
  const j2 = Math.sin(s * 78.233) - Math.floor(Math.sin(s * 78.233));
  const j3 = Math.sin(s * 43.5453) - Math.floor(Math.sin(s * 43.5453));
  const j4 = Math.sin(s * 31.7) - Math.floor(Math.sin(s * 31.7));
  gs.particles.push({
    x: x + (j1 - 0.5) * 12,
    y: y + (j2 - 0.5) * 12,
    vx: dx * (2.2 + j3 * 2.4) + (j1 - 0.5) * WEB_BREAK_GLOB_JITTER_X,
    vy: dy * (2.2 + j4 * 2.4) + (j2 - 0.5) * WEB_BREAK_GLOB_JITTER_Y,
    r: Math.max(2.2, 4.5 * (weight || 1) * (0.55 + j3)),
    age: 0,
    life: 620 + j4 * 360,
    color: 'rgba(240,255,246,0.82)',
  });
  if (gs.particles.length > 80) gs.particles.splice(0, gs.particles.length - 80);
}

function _webSweepColorToRgba(color, alpha) {
  const map = {
    '#bbb': '187,187,187',
    '#e8e8ff': '232,232,255',
    '#ffe89a': '255,232,154',
    '#ffffff': '255,255,255',
    '#fff6c8': '255,246,200',
    '#8a8a8a': '138,138,138',
  };
  return 'rgba(' + (map[color] || '240,255,246') + ',' + alpha + ')';
}

function _spawnLayerSparkle(gs, layerIdx) {
  if (!gs || _webSweepReducedMotion()) return;
  const layer = WEB_SWEEP_LAYERS[layerIdx] || WEB_SWEEP_LAYERS[0];
  const x = gs.w * 0.5;
  const y = gs.h * 0.5;
  for (let i = 0; i < 8; i++) {
    const a = i / 8 * Math.PI * 2;
    // Deterministic per-spoke radius variance via Math.sin (no Math.random).
    const jitter = (Math.sin(i * 12.9898 + (layerIdx + 1) * 7.7) + 1) * 0.5; // [0..1]
    gs.particles.push({
      x: x,
      y: y,
      vx: Math.cos(a) * 210,
      vy: Math.sin(a) * 210,
      r: 4 + jitter * 2.5,
      age: 0,
      life: 600,
      color: _webSweepColorToRgba(layer.sparkleColor, 0.85),
    });
  }
  if (gs.particles.length > 80) gs.particles.splice(0, gs.particles.length - 80);
}

function _spawnWebRipple(gs, x, y) {
  gs._rippleSeed = (gs._rippleSeed || 0) + 1;
  const j = (Math.sin(gs._rippleSeed * 12.9898) + 1) * 0.5; // [0..1]
  gs.ripples.push({ x: x, y: y, age: 0, life: 520, maxR: Math.min(gs.w, gs.h) * (0.16 + j * 0.08) });
}

function _drawWebSweepGame(gs, now) {
  const g = gs.ctx;
  const w = gs.w;
  const h = gs.h;
  g.clearRect(0, 0, w, h);
  g.save();
  g.globalCompositeOperation = 'screen';
  for (let i = 0; i < 7; i++) {
    const x = (0.12 + i * 0.13) * w + Math.sin(now / 900 + i) * 10;
    const y = (0.18 + ((i * 37) % 58) / 100) * h + Math.cos(now / 820 + i) * 7;
    g.fillStyle = 'rgba(255, 248, 151, ' + (0.16 + Math.sin(now / 400 + i) * 0.06) + ')';
    g.beginPath();
    g.arc(x, y, 2.2 + (i % 3), 0, Math.PI * 2);
    g.fill();
  }
  g.restore();

  gs.ripples.forEach(function(r) {
    const ratio = r.age / r.life;
    g.save();
    g.globalCompositeOperation = 'screen';
    g.strokeStyle = 'rgba(218, 246, 255, ' + (0.38 * (1 - ratio)).toFixed(3) + ')';
    g.lineWidth = 4 * (1 - ratio) + 1;
    g.beginPath();
    g.arc(r.x, r.y, r.maxR * ratio, 0, Math.PI * 2);
    g.stroke();
    g.restore();
  });

  if (!_webSweepReducedMotion() && gs.pointerTrail.length > 1) {
    g.save();
    g.lineCap = 'round';
    g.lineJoin = 'round';
    g.strokeStyle = 'rgba(255, 240, 180, 0.5)';
    g.lineWidth = 8;
    for (let i = 1; i < gs.pointerTrail.length; i++) {
      const a = gs.pointerTrail[i - 1];
      const b = gs.pointerTrail[i];
      g.globalAlpha = Math.min(0.4, i / 12 * 0.4);
      g.beginPath();
      g.moveTo(a.x, a.y);
      g.lineTo(b.x, b.y);
      g.stroke();
    }
    g.restore();
  }

  gs.threads.forEach(function(t) { _drawWebSweepThread(g, t, now, gs); });

  gs.particles.forEach(function(p) {
    // v1045: releaseDew — small white droplet for sticky-release / sticky-tag
    // events. Rendered early-return so it doesn't pick up the default ellipse
    // styling intended for break-glob particles.
    if (p.kind === 'releaseDew') {
      const t01 = p.age / p.life;
      const alpha = Math.max(0, (1 - t01) * 0.85);
      g.save();
      g.globalAlpha = alpha;
      g.fillStyle = 'rgba(255,255,255,0.9)';
      g.shadowColor = 'rgba(220,240,255,0.6)';
      g.shadowBlur = 5;
      g.beginPath();
      g.arc(p.x, p.y, p.r * (1 - t01 * 0.4), 0, Math.PI * 2);
      g.fill();
      g.restore();
      return;
    }
    const ratio = p.age / p.life;
    g.save();
    g.globalAlpha = Math.max(0, 1 - ratio);
    g.fillStyle = p.color || 'rgba(240, 255, 246, 0.82)';
    g.shadowColor = 'rgba(203, 248, 241, 0.62)';
    g.shadowBlur = 8;
    g.beginPath();
    g.ellipse(p.x, p.y, p.r * (1.15 - ratio * 0.4), p.r * 0.68, Math.sin(p.age / 90), 0, Math.PI * 2);
    g.fill();
    g.restore();
  });

  _drawWebButterflies(g, gs, now);
  const flight = gs.finishStartedAt && !_webSweepReducedMotion()
    ? Math.min(1, (now - gs.finishStartedAt) / 800)
    : 0;
  _drawWebSpider(g, w, h, now, gs.spiderEmotion, flight);
  _drawWebBroom(g, gs.broom.x, gs.broom.y, gs.broom.angle, Math.min(w, h));
}

// Build a Catmull-Rom (tension 0.5) curve through `pts` and stroke. If `offset` is given,
// translates the entire path by (offset.dx, offset.dy). Uses Path2D if available.
function _buildSilkPath(pts, hasPath2D, offset) {
  const ox = offset ? offset.dx : 0;
  const oy = offset ? offset.dy : 0;
  const path = hasPath2D ? new Path2D() : null;
  if (!path) return null; // caller falls back to ctx path
  const n = pts.length;
  if (n < 2) return path;
  path.moveTo(pts[0].x + ox, pts[0].y + oy);
  for (let i = 0; i < n - 1; i++) {
    const p0 = i === 0 ? pts[0] : pts[i - 1];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = (i + 2 < n) ? pts[i + 2] : pts[n - 1];
    // Catmull-Rom → cubic bezier (tension = 0.5 ⇒ standard formulation).
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;
    path.bezierCurveTo(cp1x + ox, cp1y + oy, cp2x + ox, cp2y + oy, p2.x + ox, p2.y + oy);
  }
  return path;
}

function _strokeSilkFallback(g, pts, offset) {
  const ox = offset ? offset.dx : 0;
  const oy = offset ? offset.dy : 0;
  const n = pts.length;
  if (n < 2) return;
  g.beginPath();
  g.moveTo(pts[0].x + ox, pts[0].y + oy);
  for (let i = 0; i < n - 1; i++) {
    const p0 = i === 0 ? pts[0] : pts[i - 1];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = (i + 2 < n) ? pts[i + 2] : pts[n - 1];
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;
    g.bezierCurveTo(cp1x + ox, cp1y + oy, cp2x + ox, cp2y + oy, p2.x + ox, p2.y + oy);
  }
  g.stroke();
}

function _drawWebSweepThread(g, t, now, gs) {
  if (t.opacity <= 0.02) return;
  if (t.broken) return; // parent shells render nothing after split
  const pts = t.points;
  if (!pts || pts.length < 2) return;
  const alpha = t.opacity;
  const tension = Math.max(0, Math.min(1, t.tension || 0));
  const thickness = t.thickness || 1.1;

  // Reduced-motion: single-pass polyline (no Catmull-Rom, no highlight, no dew).
  if (_webSweepReducedMotion()) {
    g.save();
    g.lineCap = 'round';
    g.lineJoin = 'round';
    g.globalAlpha = alpha;
    g.shadowColor = 'rgba(104, 136, 144, 0.28)';
    g.shadowBlur = 5;
    g.strokeStyle = t.def.layer === 0 ? 'rgba(72, 72, 80, 0.33)' : 'rgba(54, 80, 98, 0.2)';
    g.lineWidth = Math.max(1.7, thickness * 1.75);
    g.beginPath();
    g.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) g.lineTo(pts[i].x, pts[i].y);
    g.stroke();
    g.shadowBlur = 0;
    g.strokeStyle = t.color || 'rgba(250, 255, 248, 0.94)';
    g.lineWidth = Math.max(0.85, thickness * 0.9);
    g.beginPath();
    g.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) g.lineTo(pts[i].x, pts[i].y);
    g.stroke();
    g.restore();
    return;
  }

  const hasPath2D = gs ? gs._hasPath2D : (typeof Path2D !== 'undefined');
  const mainPath = hasPath2D ? _buildSilkPath(pts, true, null) : null;
  const offsetPath = hasPath2D ? _buildSilkPath(pts, true, { dx: 1, dy: -1 }) : null;

  g.save();
  g.lineCap = 'round';
  g.lineJoin = 'round';
  g.globalCompositeOperation = 'source-over';
  g.globalAlpha = alpha;

  // PASS 1: shadow halo (blur capped at 8px per perf budget — high tension still
  // pushes width via lineWidth below, so the visual punch is preserved without
  // the shadow blur radius blowing past the cap on low-end Android tablets).
  g.shadowColor = 'rgba(104, 136, 144, 0.28)';
  g.shadowBlur = Math.min(8, 5 + tension * 3);
  g.strokeStyle = t.def.layer === 0 ? 'rgba(72, 72, 80, 0.33)' : 'rgba(54, 80, 98, 0.20)';
  g.lineWidth = Math.max(1.7, thickness * 1.45 * (1 + tension * 0.4)); // v1043: 1.75→1.45 for thinner silk halo
  if (mainPath) g.stroke(mainPath); else _strokeSilkFallback(g, pts, null);

  // PASS 2: main silk (tension-driven width taper + pale-white blend at high tension)
  g.shadowBlur = 0;
  const baseColor = t.color || 'rgba(250,255,248,0.94)';
  let stroke = baseColor;
  if (tension > 0.5) {
    // Blend toward 'rgba(255,255,255,0.9)' — pale silk under tension.
    const k = Math.min(1, (tension - 0.5) * 2);
    const rgba = _webBlendColorToWhite(baseColor, k);
    if (rgba) stroke = rgba;
  }
  g.strokeStyle = stroke;
  g.lineWidth = Math.max(0.55, thickness * 0.9 * (1 - tension * 0.55));
  if (mainPath) g.stroke(mainPath); else _strokeSilkFallback(g, pts, null);

  // PASS 3: highlight (offset +1,-1)
  g.strokeStyle = 'rgba(159, 212, 226, 0.58)';
  g.lineWidth = Math.max(0.55, thickness * 0.26);
  if (offsetPath) g.stroke(offsetPath); else _strokeSilkFallback(g, pts, { dx: 1, dy: -1 });

  // Dewdrops at points[2] and points[4]; hidden when tense.
  if (!t.detached && pts.length === WEB_CHAIN_N && tension <= 0.4) {
    const dewIdxs = [2, 4];
    for (let k = 0; k < dewIdxs.length; k++) {
      const idx = dewIdxs[k];
      if (idx >= pts.length) continue;
      const pp = pts[idx];
      const wob = Math.sin(t.phase + idx) * 0.6 + Math.sin(t.phase * 1.7 + idx * 0.3) * 0.3;
      g.fillStyle = 'rgba(244, 255, 241, 0.74)';
      g.shadowColor = 'rgba(189, 241, 227, 0.42)';
      g.shadowBlur = 3;
      g.beginPath();
      g.ellipse(pp.x, pp.y + wob, thickness * 0.72, thickness * 0.42, Math.sin(t.phase + idx), 0, Math.PI * 2);
      g.fill();
      g.shadowBlur = 0;
    }
  }

  // v1045: sticky stretch strand. Replaces the v1044 fixed-sag quadratic with a
  // distance-sensitive strand that visibly communicates STRETCH:
  //   - width tapers thinner as separation grows (silk under tension thins)
  //   - color whitens with separation
  //   - perpendicular wobble via sin(now/120) — alive, not pinned
  //   - dewdrop 'glob' at the broom-end (sticky residue on broom)
  //   - short over-broom 'tail' in broom-motion direction (adhered, not pinned)
  if (!t.detached && t.grabbedIdx >= 0 && gs && gs.dragging) {
    const gp = pts[t.grabbedIdx];
    if (gp) {
      const dxg = gs.broom.x - gp.x;
      const dyg = gs.broom.y - gp.y;
      const dlen = Math.hypot(dxg, dyg) || 1;
      const minDim = Math.min(gs.w, gs.h);
      const stretchRef = Math.max(60, minDim * 0.35);
      const stretchN = Math.min(1, dlen / stretchRef);
      const perpX = -dyg / dlen;
      const perpY = dxg / dlen;
      const sag = thickness * 4 * (1 - stretchN * 0.7) * (1 + tension * 0.4);
      const wobble = Math.sin(now / 120 + (t.phase || 0)) * (1.5 + stretchN * 2.5);
      const midX = (gp.x + gs.broom.x) / 2 + perpX * (sag + wobble);
      const midY = (gp.y + gs.broom.y) / 2 + perpY * (sag + wobble) + sag * 0.4;
      const baseR = 250, baseG = 255, baseB = 248;
      const whiteAmt = stretchN * 0.5;
      const cr = Math.round(baseR + (255 - baseR) * whiteAmt);
      const cg = Math.round(baseG + (255 - baseG) * whiteAmt);
      const cb = Math.round(baseB + (255 - baseB) * whiteAmt);
      const alphaTop = 0.92 - stretchN * 0.18;
      const baseW = thickness * 0.55 * (1 + tension * 0.5);
      const tipW = thickness * 0.28 * (1 - stretchN * 0.35) * (1 + tension * 0.3);
      // Segment 1: gp -> mid (thicker)
      g.strokeStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + alphaTop.toFixed(3) + ')';
      g.lineWidth = Math.max(0.55, baseW);
      g.beginPath();
      g.moveTo(gp.x, gp.y);
      g.quadraticCurveTo(midX, midY, (midX + gs.broom.x) * 0.5, (midY + gs.broom.y) * 0.5);
      g.stroke();
      // Segment 2: mid -> broom (thinner) + short tail past broom
      g.lineWidth = Math.max(0.45, tipW);
      const broomVx = gs.broom.vx || 0;
      const broomVy = gs.broom.vy || 0;
      const bSpeed = Math.hypot(broomVx, broomVy);
      let tx = gs.broom.x, ty = gs.broom.y;
      if (bSpeed > 1) {
        const tailLen = Math.min(14, 4 + stretchN * 12);
        tx = gs.broom.x + (broomVx / bSpeed) * tailLen;
        ty = gs.broom.y + (broomVy / bSpeed) * tailLen;
      }
      g.beginPath();
      g.moveTo((midX + gs.broom.x) * 0.5, (midY + gs.broom.y) * 0.5);
      g.quadraticCurveTo(gs.broom.x, gs.broom.y, tx, ty);
      g.stroke();
      // Sticky glob at the broom end — small white droplet that scales with stretch.
      g.fillStyle = 'rgba(255,255,255,' + (0.65 + stretchN * 0.3).toFixed(3) + ')';
      g.shadowColor = 'rgba(220,240,255,0.6)';
      g.shadowBlur = Math.min(6, 3 + stretchN * 3);
      g.beginPath();
      g.arc(gs.broom.x, gs.broom.y, thickness * (0.45 + stretchN * 0.35), 0, Math.PI * 2);
      g.fill();
      g.shadowBlur = 0;
    }
  }

  // v1045: sticky-tag whitening — briefly mark sticky-tagged points by drawing a
  // tiny white dot overlay during WEB_STICKY_TAG_MS. Keeps the visual cost low.
  // Naturally gated by reduced-motion (function early-returned above).
  if (!t.detached && pts.length === WEB_CHAIN_N) {
    for (let i = 1; i < pts.length - 1; i++) {
      const pp = pts[i];
      if (!pp._stickyTagStartAt) continue;
      const age = now - pp._stickyTagStartAt;
      if (age < 0 || age > WEB_STICKY_TAG_MS) continue;
      const tagAlpha = (1 - age / WEB_STICKY_TAG_MS) * 0.55;
      g.fillStyle = 'rgba(255,255,255,' + tagAlpha.toFixed(3) + ')';
      g.beginPath();
      g.arc(pp.x, pp.y, Math.max(1.0, thickness * 0.55), 0, Math.PI * 2);
      g.fill();
    }
  }

  // Flash overlay on fresh break.
  if (t.flashAt && (now - t.flashAt) < WEB_FLASH_MS) {
    g.save();
    g.globalCompositeOperation = 'lighter';
    g.strokeStyle = 'rgba(255,255,255,0.85)';
    g.lineWidth = thickness * 1.2;
    if (mainPath) g.stroke(mainPath); else _strokeSilkFallback(g, pts, null);
    g.fillStyle = 'rgba(255,255,255,0.9)';
    g.beginPath();
    g.arc(t.flashX, t.flashY, 12, 0, Math.PI * 2);
    g.fill();
    g.restore();
  }

  g.restore();
}

// Cached named-color → rgb triple for stretch tension blend.
function _webBlendColorToWhite(color, k) {
  if (typeof color !== 'string') return null;
  const map = {
    '#bbb': [187,187,187],
    '#e8e8ff': [232,232,255],
    '#ffe89a': [255,232,154],
    '#ffffff': [255,255,255],
    '#fff6c8': [255,246,200],
    '#8a8a8a': [138,138,138],
  };
  let rgb = map[color];
  if (!rgb) {
    // crude rgba(r,g,b,a) parse fallback
    const m = color.match(/rgba?\(([^)]+)\)/);
    if (m) {
      const parts = m[1].split(',').map(function(x) { return parseFloat(x); });
      if (parts.length >= 3) rgb = [parts[0]|0, parts[1]|0, parts[2]|0];
    }
  }
  if (!rgb) return null;
  const r = Math.round(rgb[0] + (255 - rgb[0]) * k);
  const g = Math.round(rgb[1] + (255 - rgb[1]) * k);
  const b = Math.round(rgb[2] + (255 - rgb[2]) * k);
  return 'rgba(' + r + ',' + g + ',' + b + ',0.9)';
}

function _drawWebButterflies(g, gs, now) {
  if (!gs || _webSweepReducedMotion()) return;
  const w = gs.w;
  const h = gs.h;
  const img = gs.butterflyImg;
  const progress = gs.finishStartedAt
    ? Math.max(0, Math.min(1, (now - gs.finishStartedAt - 200) / 800))
    : 0;
  const ease = progress < 0.5
    ? 2 * progress * progress
    : 1 - Math.pow(-2 * progress + 2, 2) / 2;
  const targetYs = [0.2, 0.3, 0.18];
  gs.butterflies.forEach(function(b, i) {
    if (!b.visible) return;
    const xRatio = b.initX + (b.targetX - b.initX) * ease;
    const y = h * targetYs[i] + Math.sin(now * 0.006 + b.sway) * 4;
    const size = Math.max(28, Math.min(w, h) * 0.105) * b.scale;
    g.save();
    g.globalAlpha = 0.62 + ease * 0.28;
    g.translate(w * xRatio, y);
    g.rotate(Math.sin(now / 520 + b.sway) * 0.12);
    if (img && img.complete && img.naturalWidth) {
      g.drawImage(img, -size / 2, -size / 2, size, size);
    } else {
      g.fillStyle = 'rgba(255, 224, 118, 0.86)';
      g.beginPath();
      g.ellipse(-size * 0.16, 0, size * 0.22, size * 0.32, -0.35, 0, Math.PI * 2);
      g.ellipse(size * 0.16, 0, size * 0.22, size * 0.32, 0.35, 0, Math.PI * 2);
      g.fill();
      g.fillStyle = 'rgba(96, 75, 50, 0.9)';
      g.fillRect(-size * 0.035, -size * 0.24, size * 0.07, size * 0.48);
    }
    g.restore();
  });
}

function _drawWebSpider(g, w, h, now, emotion = 0, flight = 0) {
  const x = w * 0.83;
  const lift = flight ? (1 - Math.pow(1 - flight, 3)) : 0;
  const y = h * 0.23 + Math.sin(now / 520) * 5 - 120 * lift;
  const s = Math.max(22, Math.min(w, h) * 0.105);
  g.save();
  g.translate(x, y);
  g.scale(1 + lift * 0.4, 1 + lift * 0.4);
  g.rotate(Math.sin(now / 700) * 0.08);
  g.strokeStyle = 'rgba(56, 50, 74, 0.82)';
  g.lineWidth = Math.max(2, s * 0.08);
  g.lineCap = 'round';
  for (let i = 0; i < 6; i++) {
    const side = i < 3 ? -1 : 1;
    const row = i % 3;
    g.beginPath();
    g.moveTo(side * s * 0.12, -s * 0.04 + row * s * 0.12);
    g.quadraticCurveTo(side * s * (0.42 + row * 0.08), -s * (0.28 - row * 0.15), side * s * 0.68, -s * (0.18 - row * 0.18));
    g.stroke();
  }
  g.fillStyle = 'rgba(67, 58, 88, 0.92)';
  g.beginPath();
  g.ellipse(0, 0, s * 0.34, s * 0.42, 0, 0, Math.PI * 2);
  g.fill();
  g.fillStyle = 'rgba(39, 34, 52, 0.95)';
  g.beginPath();
  g.ellipse(0, -s * 0.34, s * 0.24, s * 0.22, 0, 0, Math.PI * 2);
  g.fill();
  g.fillStyle = '#F8F1D4';
  g.beginPath();
  g.arc(-s * 0.08, -s * 0.38, s * 0.035, 0, Math.PI * 2);
  g.arc(s * 0.08, -s * 0.38, s * 0.035, 0, Math.PI * 2);
  g.fill();
  g.strokeStyle = 'rgba(248, 241, 212, 0.88)';
  g.lineWidth = Math.max(1.3, s * 0.035);
  g.lineCap = 'round';
  if (emotion <= 0) {
    g.beginPath();
    g.moveTo(-s * 0.15, -s * 0.47);
    g.lineTo(-s * 0.04, -s * 0.43);
    g.moveTo(s * 0.15, -s * 0.47);
    g.lineTo(s * 0.04, -s * 0.43);
    g.stroke();
    g.beginPath();
    g.arc(0, -s * 0.25, s * 0.045, Math.PI * 1.1, Math.PI * 1.9);
    g.stroke();
    g.fillStyle = 'rgba(149, 211, 255, 0.86)';
    g.beginPath();
    g.ellipse(s * 0.13, -s * 0.3, s * 0.035, s * 0.06, 0.3, 0, Math.PI * 2);
    g.fill();
  } else if (emotion === 1) {
    g.beginPath();
    g.moveTo(-s * 0.15, -s * 0.46);
    g.lineTo(-s * 0.03, -s * 0.46);
    g.moveTo(s * 0.03, -s * 0.46);
    g.lineTo(s * 0.15, -s * 0.46);
    g.stroke();
    g.beginPath();
    g.arc(0, -s * 0.29, s * 0.07, 0.12 * Math.PI, 0.88 * Math.PI);
    g.stroke();
  } else {
    g.beginPath();
    g.moveTo(-s * 0.15, -s * 0.43);
    g.lineTo(-s * 0.03, -s * 0.48);
    g.moveTo(s * 0.03, -s * 0.48);
    g.lineTo(s * 0.15, -s * 0.43);
    g.stroke();
    g.fillStyle = 'rgba(255,180,200,0.4)';
    g.beginPath();
    g.arc(-s * 0.17, -s * 0.29, s * 0.055, 0, Math.PI * 2);
    g.arc(s * 0.17, -s * 0.29, s * 0.055, 0, Math.PI * 2);
    g.fill();
    g.strokeStyle = 'rgba(248, 241, 212, 0.92)';
    g.lineWidth = Math.max(1.5, s * 0.045);
    g.beginPath();
    g.arc(0, -s * 0.3, s * 0.085, 0.1 * Math.PI, 0.9 * Math.PI);
    g.stroke();
  }
  g.restore();
}

function _drawWebBroom(g, x, y, angle, minDim) {
  const s = Math.max(48, minDim * 0.22);
  g.save();
  g.translate(x, y);
  g.rotate(angle || -0.35);
  g.lineCap = 'round';
  g.shadowColor = 'rgba(73, 62, 38, 0.22)';
  g.shadowBlur = 8;
  g.strokeStyle = '#8F6338';
  g.lineWidth = Math.max(7, s * 0.1);
  g.beginPath();
  g.moveTo(-s * 0.55, -s * 0.18);
  g.lineTo(s * 0.3, s * 0.3);
  g.stroke();
  g.shadowBlur = 0;
  g.strokeStyle = 'rgba(255,255,255,0.38)';
  g.lineWidth = Math.max(2, s * 0.028);
  g.beginPath();
  g.moveTo(-s * 0.5, -s * 0.2);
  g.lineTo(s * 0.21, s * 0.22);
  g.stroke();
  g.fillStyle = '#E3B166';
  g.strokeStyle = '#8D6034';
  g.lineWidth = Math.max(2, s * 0.028);
  g.beginPath();
  g.moveTo(s * 0.18, s * 0.17);
  g.quadraticCurveTo(s * 0.58, s * 0.18, s * 0.56, s * 0.56);
  g.lineTo(s * 0.16, s * 0.54);
  g.quadraticCurveTo(s * 0.02, s * 0.34, s * 0.18, s * 0.17);
  g.closePath();
  g.fill();
  g.stroke();
  g.strokeStyle = 'rgba(127, 82, 42, 0.58)';
  g.lineWidth = Math.max(1.5, s * 0.018);
  for (let i = 0; i < 5; i++) {
    g.beginPath();
    g.moveTo(s * (0.2 + i * 0.06), s * 0.24);
    g.lineTo(s * (0.16 + i * 0.065), s * 0.52);
    g.stroke();
  }
  g.restore();
}

function _playWebStickySfx(kind) {
  const ac = _mzGetAC();
  if (!ac) return;
  const t = ac.currentTime;
  try {
    const o = ac.createOscillator();
    const g = ac.createGain();
    const f = ac.createBiquadFilter();
    const sp = Math.min(1, ((_webGameState && _webGameState.speed) || 0) / 1.5);
    o.type = kind === 'snap' ? 'triangle' : 'sine';
    f.type = 'lowpass';
    f.frequency.setValueAtTime(kind === 'snap' ? 1100 : 760, t);
    o.frequency.setValueAtTime(kind === 'snap' ? 220 + sp * 660 : 360, t);
    o.frequency.exponentialRampToValueAtTime(kind === 'snap' ? 520 + sp * 420 : 210, t + (kind === 'snap' ? 0.12 : 0.16));
    g.gain.setValueAtTime(kind === 'snap' ? 0.12 : 0.045, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + (kind === 'snap' ? 0.18 : 0.2));
    o.connect(f); f.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.22);
  } catch (_) {}
}

function _finishWebSweepGame(gs) {
  if (!gs || gs.locked) return;
  gs.locked = true;
  gs.dragging = false;
  gs.finishStartedAt = performance.now();
  gs.spiderEmotion = 2;
  if (gs.stageEl) gs.stageEl.classList.remove('is-dragging');
  _setWebSweepStatus(gs, 'クモさん、 でられたよ！');
  _releaseAllRopeGrabs(gs);
  gs.threads.forEach(function(t) {
    if (!t.detached) {
      t.layerFadeStart = t.layerFadeStart || performance.now();
      // Deterministic recoil per-point via Verlet prev injection.
      if (t.points && t.points.length) {
        for (let i = 0; i < t.points.length; i++) {
          const p = t.points[i];
          const jx = Math.sin(t.phase + i * 0.61) * 20;
          const jy = -10 + Math.sin(t.phase * 1.7 + i * 0.83) * 9;
          p.prevX = p.x - jx;
          p.prevY = p.y - jy;
          p.pinned = 0;
        }
      }
    }
  });
  _webGimmickSetTimeout(function() {
    if (gs === _webGameState) _playMzSePitch('correct', 2);
  }, 1100);
  _webGimmickSetTimeout(_resolveWebSweepGame, 2500);
}

function _resolveWebSweepGame() {

    st.webCleared = true;
