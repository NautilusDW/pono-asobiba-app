<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ハリネズミくんを たすけよう | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8F0;
  --primary: #6C8E3F;
  --primary-dark: #4F6B2A;
  --accent: #F5A623;
  --text: #5D4E37;
  --text-light: #A89880;
  --shadow: rgba(93,78,55,0.12);
  --radius: 20px;
}

html, body {
  height: 100dvh; overflow: hidden;
  overscroll-behavior: none;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background: linear-gradient(180deg, #E8F5D8 0%, #FFF8F0 100%);
  color: var(--text);
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

#app {
  display: flex; flex-direction: column;
  height: 100dvh;
  max-width: 540px; margin: 0 auto;
  padding: 4px 10px 10px;
}

.header { flex-shrink: 0; text-align: center; padding: 48px 0 4px; position: relative; }
.header h1 {
  font-size: 1.25rem; font-weight: 900;
  background: linear-gradient(135deg, #6C8E3F, #A4C76D);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.subtitle { font-size: 0.74rem; color: #A89080; font-weight: 700; margin-top: 1px; }

.hud {
  display: flex; justify-content: space-between; align-items: center;
  padding: 3px 8px; font-size: 0.85rem; font-weight: 700;
  flex-shrink: 0; gap: 8px;
}
#hud-stage { color: var(--primary); }
#hud-apples { color: var(--accent); }
#hud-moves { color: var(--text); }

.game-wrap {
  flex: 1; min-height: 0;
  border-radius: var(--radius);
  overflow: hidden;
  overscroll-behavior: none;
  position: relative;
  touch-action: none;
  background: #F4EFE3;
  box-shadow: 0 4px 16px var(--shadow);
}
#gameCanvas { display: block; width: 100%; height: 100%; }

/* Arrow buttons (HTML overlay) */
#arrowLayer { position: absolute; inset: 0; pointer-events: none; }
.maze-arrow {
  position: absolute;
  width: 42px; height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(108,142,63,0.72), rgba(164,199,109,0.72));
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  color: white;
  border: 3px solid rgba(255,255,255,0.85);
  font-size: 1.4rem; font-weight: 900;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.25);
  display: flex; align-items: center; justify-content: center;
  pointer-events: auto;
  font-family: inherit;
  animation: arrowPulse 1.2s ease-in-out infinite;
  transform: translate(-50%, -50%);
  padding: 0;
}
.maze-arrow:active { transform: translate(-50%, -50%) scale(0.9); }
@keyframes arrowPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50%      { transform: translate(-50%, -50%) scale(1.12); }
}
/* Breeze arrow: green tinted, glow */
.maze-arrow-breeze {
  background: linear-gradient(135deg, rgba(96,200,160,0.85), rgba(160,235,200,0.85));
  border-color: #fff;
  box-shadow: 0 0 14px rgba(96,200,160,0.85);
}

/* ── Charm bar (りんごで集めるおまもり) ── */
.charms {
  display: flex; justify-content: center; gap: 8px;
  padding: 4px 0 6px;
  flex-shrink: 0;
}
.charm {
  background: linear-gradient(135deg, #FFFAE6, #FFF3C4);
  border: 2px solid #F5C842;
  border-radius: 14px;
  padding: 4px 10px;
  font-size: 0.9rem;
  font-family: inherit;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  box-shadow: 0 2px 6px var(--shadow);
  transition: transform 0.15s, opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.charm:disabled {
  opacity: 0.3;
  filter: grayscale(0.6);
  cursor: not-allowed;
}
.charm:not(:disabled):active {
  transform: scale(0.92);
}
.charm.active {
  background: linear-gradient(135deg, #FFE066, #FFC93C);
  box-shadow: 0 0 14px rgba(255,201,60,0.8);
  animation: charmPulse 0.7s ease-in-out infinite;
}
@keyframes charmPulse {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.06); }
}
.charm-icon { font-size: 1.1rem; }
.charm-num { font-weight: 900; min-width: 8px; }

/* Charm gain popup */
.charm-popup {
  position: absolute;
  background: linear-gradient(135deg, #FFE066, #FFC93C);
  border: 2px solid #fff;
  border-radius: 16px;
  padding: 8px 16px;
  font-size: 0.95rem;
  font-weight: 900;
  color: #5D4E37;
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  pointer-events: none;
  z-index: 70;
  animation: charmGain 2.4s ease-out forwards;
  white-space: nowrap;
}
@keyframes charmGain {
  0%   { transform: translate(-50%, 20px) scale(0.5); opacity: 0; }
  15%  { transform: translate(-50%, -10px) scale(1.15); opacity: 1; }
  80%  { transform: translate(-50%, -20px) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50px) scale(0.95); opacity: 0; }
}

/* Charm tutorial overlay */
.charm-tut {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: none; align-items: center; justify-content: center;
  z-index: 9500;
}
.charm-tut.show { display: flex; }
.charm-tut-card {
  background: #FFF8F0; border-radius: 24px;
  padding: 26px 22px 20px;
  max-width: 300px; width: 88%;
  text-align: center;
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  animation: pop 0.3s ease-out;
}
.charm-tut-icon { font-size: 3.2rem; margin-bottom: 6px; }
.charm-tut-name {
  font-size: 1.1rem; font-weight: 900;
  color: var(--primary-dark); margin-bottom: 10px;
}
.charm-tut-body {
  font-size: 0.85rem; color: var(--text);
  line-height: 1.6; margin-bottom: 16px;
  white-space: pre-line;
}
.charm-tut-btn {
  background: linear-gradient(135deg, #FFD54F, #FFA000);
  color: #5D3A00; border: none;
  padding: 10px 28px; border-radius: 999px;
  font-size: 1rem; font-weight: 900;
  cursor: pointer; box-shadow: 0 4px 12px rgba(255,165,0,0.4);
  font-family: inherit;
}
.charm-tut-btn:active { transform: scale(0.95); }

/* Warp flash effect */
.warp-flash {
  position: absolute;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,200,0.95), rgba(255,200,80,0));
  pointer-events: none;
  z-index: 55;
  transform: translate(-50%, -50%);
  animation: warpBurst 0.8s ease-out forwards;
}
@keyframes warpBurst {
  0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
}

/* Hint message */
.hint {
  position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%);
  background: rgba(255,255,255,0.92);
  color: var(--text); font-size: 0.78rem; font-weight: 700;
  padding: 6px 14px; border-radius: 999px;
  box-shadow: 0 2px 8px var(--shadow);
  pointer-events: none;
  white-space: nowrap;
  opacity: 0.9;
  transition: opacity 0.3s;
}

/* Voice bubble */
.voice {
  position: absolute; right: 12px; top: 12px;
  background: #FFFAE6; color: var(--text);
  padding: 8px 14px; border-radius: 18px;
  font-size: 0.82rem; font-weight: 700;
  box-shadow: 0 2px 8px var(--shadow);
  border: 2px solid #F5C842;
  animation: voiceBob 1.6s ease-in-out infinite;
  z-index: 4;
}
.voice::after {
  content: ''; position: absolute;
  bottom: -8px; right: 22px;
  width: 0; height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 10px solid #F5C842;
}
@keyframes voiceBob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}

/* Apple pickup popup */
.pickup {
  position: absolute;
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--accent);
  pointer-events: none;
  animation: pickupRise 0.9s ease-out forwards;
  z-index: 6;
}
@keyframes pickupRise {
  0%   { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
  20%  { transform: translate(-50%, -10px) scale(1.3); opacity: 1; }
  100% { transform: translate(-50%, -50px) scale(1); opacity: 0; }
}

/* ===== Overlay ===== */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  display: none; align-items: center; justify-content: center;
  z-index: 9000;
}
.overlay.show { display: flex; }
.ov-card {
  background: #FFF8F0; border-radius: 24px;
  padding: 28px 24px 22px;
  max-width: 320px; width: 86%;
  text-align: center;
  box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  animation: pop 0.3s ease-out;
}
@keyframes pop {
  0%   { transform: scale(0.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.ov-icon { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
.ov-icon img { width: 72px; height: 72px; object-fit: contain; }
.ov-title {
  font-size: 1.15rem; font-weight: 900;
  color: var(--primary-dark); margin-bottom: 6px;
}
.ov-msg {
  font-size: 0.88rem; color: var(--text);
  margin-bottom: 16px; line-height: 1.5;
  white-space: pre-line;
}
.ov-btn {
  background: linear-gradient(135deg, var(--primary), #A4C76D);
  color: white; border: none;
  padding: 12px 28px; border-radius: 999px;
  font-size: 1rem; font-weight: 900;
  cursor: pointer; box-shadow: 0 4px 12px rgba(108,142,63,0.4);
  font-family: inherit;
}
.ov-btn:active { transform: scale(0.95); }

/* Encounter cutscene */
.encounter {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,248,220,0.92);
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.encounter.show { opacity: 1; pointer-events: auto; }
.encounter-inner {
  display: flex; align-items: flex-end; gap: 24px;
  animation: meetIn 0.6s ease-out;
  position: relative;
}
.encounter img { width: 100px; height: 130px; object-fit: contain; }
/* ハリネズミはクマ (ポノ) より小さく見せる (2026-04-21 ユーザー要望) */
.encounter #enc-hh { width: 72px; height: 94px; }
.encounter .heart {
  position: absolute; font-size: 2.2rem;
  left: 50%; top: -10px; transform: translateX(-50%);
  animation: heartFloat 1.6s ease-out infinite;
}
@keyframes heartFloat {
  0%   { transform: translate(-50%, 0) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50px) scale(1.4); opacity: 0; }
}
@keyframes meetIn {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* Confetti */
.confetti-container {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 60; overflow: hidden;
  overscroll-behavior: none;
}
.confetti-piece { position: absolute; animation: cfall 2.5s ease-out forwards; }
@keyframes cfall {
  0%   { transform: translateY(-10px) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* ── Image-stage mode: full viewport landscape takeover ──
   Default app is locked to 540px (portrait mobile) for the grid maze.
   When body has .image-stage-mode we override for full landscape. */
body.image-stage-mode #app {
  max-width: none;
  width: 100vw;
  height: 100dvh;
  padding: 0;
  margin: 0;
}
body.image-stage-mode .header,
body.image-stage-mode .hud,
body.image-stage-mode .charms,
body.image-stage-mode #voice,
body.image-stage-mode #encounter,
body.image-stage-mode #hint {
  display: none !important;
}
body.image-stage-mode .game-wrap {
  border-radius: 0;
  box-shadow: none;
  width: 100vw;
  height: 100dvh;
  background: #2a3a1f;
}

/* Landscape-required overlay (only shown for image-type stages on portrait) */
.landscape-req {
  position: fixed; inset: 0;
  background: rgba(93,78,55,0.92);
  color: #FFF8F0;
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999;
  text-align: center;
  font-family: inherit;
  padding: 24px;
}
.landscape-req.show { display: flex; }
.landscape-req .icon { font-size: 4rem; margin-bottom: 16px; animation: rotateHint 1.6s ease-in-out infinite; }
.landscape-req h2 { font-size: 1.4rem; font-weight: 900; margin-bottom: 12px; }
.landscape-req p { font-size: 1rem; opacity: 0.85; line-height: 1.6; }
@keyframes rotateHint {
  0%,100% { transform: rotate(0deg); }
  50%     { transform: rotate(90deg); }
}
</style>
</head>
<body>

<!-- BGM (loop) -->
<audio id="bgm" loop preload="auto" src="../assets/audio/maze_bgm.mp3"></audio>

<div id="app">
  <div class="header">

まいごに なっちゃった！

  <!-- Landscape required overlay (image stages only) -->
  <div class="landscape-req" id="landscapeReq" aria-hidden="true">
    <div class="icon">📱</div>
    <h2>よこむきに してね</h2>
    <p>このステージは よこがめんで あそぶよ。<br>たんまつを よこに むけてね。</p>

  <!-- Charm tutorial overlay (first-time unlock) -->
  <div class="charm-tut" id="charmTut">

      <div class="charm-tut-icon" id="charmTutIcon">🧚</div>
      <div class="charm-tut-name" id="charmTutName">ようせいの ヒント</div>
      <div class="charm-tut-body" id="charmTutBody">ゴールまでの みちを
ようせいが おしえてくれるよ！
したの ボタンを おしてね。</div>
      <button class="charm-tut-btn" id="charmTutBtn">やってみる！</button>
    </div>
  </div>
</div>

<script src="../common/menu.js"></script>
<script src="../common/achievements.js"></script>

<script>
'use strict';

// ====== Image preload ======
const HEDGEHOG_FRONT = '../assets/images/characters/headgehog/headgehog_front.png';
const HEDGEHOG_HAPPY = '../assets/images/characters/headgehog/headgehog_smilewavinghands.png';

const imgPono = new Image();
imgPono.src = '../assets/images/characters/pono/pono_face_circle.png';
const imgWalkSheet = new Image();
imgWalkSheet.src = '../assets/images/characters/pono/pono_walk_sheet.png';
const WALK_FRAMES = 25, WALK_FRAME_W = 92, WALK_FRAME_H = 128, WALK_FPS = 12;
const imgWalkSideSheet = new Image();
imgWalkSideSheet.src = '../assets/images/characters/pono/pono_walk_side_sheet.png';
const SIDE_WALK_FRAMES = 35, SIDE_WALK_FRAME_W = 77, SIDE_WALK_FRAME_H = 128;
const SIDE_WALK_SCALE = 1232 / 1132;
const imgHedgehog = new Image();
imgHedgehog.src = HEDGEHOG_FRONT;

// Obstacle / wall illustrations
const imgTree  = new Image(); imgTree.src  = '../assets/images/maze/tree.png';
const imgPond  = new Image(); imgPond.src  = '../assets/images/maze/pond.png';
const imgHole  = new Image(); imgHole.src  = '../assets/images/maze/hole.png';
const imgStump = new Image(); imgStump.src = '../assets/images/maze/stump.png';
const imgRock  = new Image(); imgRock.src  = '../assets/images/maze/rock.png';
const imgApple = new Image(); imgApple.src = '../assets/images/word/ringo.png';
// 障害物をセル位置から決定論的に選ぶ（同じ位置なら常に同じ絵）
const OBSTACLE_IMGS = [imgPond, imgHole, imgStump, imgRock];
function _pickObstacleImg(r, c) {
  // シンプルなハッシュで散らす
  var h = ((r * 73856093) ^ (c * 19349663)) >>> 0;
  return OBSTACLE_IMGS[h % OBSTACLE_IMGS.length];
}

// ====== Tile types ======
// '.'=path, '#'=wall, 'C'=cat, 'W'=water, 'A'=apple, 'T'=thorn, 'R'=stone, 'S'=start, 'G'=goal
// Walkable: '.', 'S', 'G', 'A'
const T = { PATH:0, WALL:1, CAT:2, WATER:3, APPLE:4, THORN:5, STONE:6, GOAL:9 };

function parseCell(ch) {
  switch (ch) {
    case '#': return T.WALL;
    case 'C': return T.CAT;
    case 'W': return T.WATER;
    case 'A': return T.APPLE;
    case 'T': return T.THORN;
    case 'R': return T.STONE;
    case 'G': return T.GOAL;
    default:  return T.PATH;
  }
}

// ====== Stage data ======
// All stages auto-generated by maze/_sim.js. Audits guarantee:
//  - solvable, no dead-state, no stranded path, no spam-solve
//  - obstacles are real blockers (removing any obstacle changes optimal solution)
//  - tall layout (rows >= cols) so cells stay big enough for arrow buttons
// 11 stages: tutorial + 1..10, progressive difficulty
// Note: `let` (was const) to allow `?image=<name>` URL param to override STAGES.
let STAGES = [
  {
    name: 'チュートリアル — やじるしを おしてみよう',
    grid: [
      '#######',
      '#S....#',
      '#.#.###',
      '#.#...#',
      '#.###.#',
      '#...WG#',
      '#######',
    ],
  },
  {
    name: 'ステージ 1 — どっちに いく？',
    grid: [
      '#######',
      '#S..#.#',
      '###.#.#',
      '#.#...#',
      '#.#.#.#',
      '#...#.#',
      '#.###T#',
      '#....G#',
      '#######',
    ],
  },
  {
    name: 'ステージ 2 — わかれみち',
    grid: [
      '#######',
      '#S#..A#',
      '#.#.###',
      '#.....#',
      '#.###.#',
      '#.....#',
      '#.#.#.#',
      '#.#...#',
      '#.###.#',
      '#...TG#',
      '#######',
    ],
  },
  {
    name: 'ステージ 3 — ふかいもり',
    grid: [
      '#########',
      '#S#.....#',
      '#.#.#.###',
      '#...#...#',
      '#.#.#.#.#',
      '#.W.#A#.#',
      '###.###.#',
      '#.#...#.#',
      '#.###.#.#',
      '#......G#',
      '#########',
    ],
  },
  {
    name: 'ステージ 4 — みっつの わかれみち',
    grid: [
      '#########',

function buildStage(stageDef) {
  const rows = stageDef.grid.length;
  const cols = stageDef.grid[0].length;
  const cells = [];
  let start = null, goal = null;
  let totalApples = 0;
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      const ch = stageDef.grid[r][c];
      const t = parseCell(ch);
      row.push(t);
      if (ch === 'S') start = { r, c };
      if (ch === 'G') goal  = { r, c };
      if (t === T.APPLE) totalApples++;
    }
    cells.push(row);
  }
  return { type: 'grid', rows, cols, cells, start, goal, name: stageDef.name, totalApples };
}

// ====== Image stage index (_index.json overrides) ======
// At init, fetch maze/imageStages/_index.json. If present, it maps stage slot
// numbers to image-stage names. Each named stage's JSON is fetched and STAGES[slot]
// is replaced (or appended if slot === STAGES.length). This is how the maze-editor
// "💾 本番に保存" button publishes new image stages into the normal progression.
// Stages from this path are flagged `_official: true` (eligible for clear rewards).
function _loadImageStageIndex() {
  return fetch('imageStages/_index.json', { credentials: 'omit' })
    .then(function(r) {
      if (!r.ok) return null;
      return r.json();
    })
    .then(function(idx) {
      if (!idx || !idx.overrides || typeof idx.overrides !== 'object') return null;
      const positions = Object.keys(idx.overrides)
        .map(Number)
        .filter(function(n) { return Number.isInteger(n) && n >= 0 && n < 100; })
        .sort(function(a, b) { return a - b; });
      const tasks = positions.map(function(pos) {
        const rawName = idx.overrides[String(pos)];
        const safe = String(rawName || '').replace(/[^a-zA-Z0-9_-]/g, '');
        if (!safe) return Promise.resolve();
        return fetch('imageStages/' + safe + '.json', { credentials: 'omit' })
          .then(function(rr) {
            if (!rr.ok) throw new Error(safe + ' HTTP ' + rr.status);
            return rr.json();
          })
          .then(function(def) {
            if (!def || def.type !== 'image') throw new Error(safe + ' invalid');
            def._official = true; // eligible for rewards
            if (pos < STAGES.length) {
              STAGES[pos] = def;
              console.log('[maze] index override:', pos, '→', safe);
            } else if (pos === STAGES.length) {
              STAGES.push(def);
              console.log('[maze] index append:', pos, '→', safe);
            } else {
              console.warn('[maze] index slot', pos, 'is out of range (STAGES len=' + STAGES.length + '), skipped');
            }
          })
          .catch(function(e) { console.warn('[maze] index entry failed:', e.message || e); });
      });
      return Promise.all(tasks);
    })
    .catch(function(e) { console.warn('[maze] index load failed:', e); return null; });
}

// ====== Image stage URL param loading ======
// Visit ?image=<name> to load maze/imageStages/<name>.json instead of normal stages.
// Special case: ?image=__draft__ reads the stage def from sessionStorage. This is
// used by tools/maze-editor.html for "test in maze" preview without commit/deploy.
// Filename sanitized to [A-Za-z0-9_-]+ to prevent path traversal.
function _loadImageStageFromURL() {
  try {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('image');
    if (!raw) return Promise.resolve(false);

    // ── Draft preview from sessionStorage (editor handoff) ──
    if (raw === '__draft__') {
      try {
        const draftJson = sessionStorage.getItem('pono_maze_draft_stage');
        if (!draftJson) {
          console.warn('[maze] no draft in sessionStorage; open from editor "▶ 迷路で試す" button');
          return Promise.resolve(false);
        }
        const def = JSON.parse(draftJson);
        if (!def || def.type !== 'image') {
          console.warn('[maze] invalid draft type'); return Promise.resolve(false);
        }
        // If the editor stashed an image dataURL, prefer it over the imageUrl path
        // (so previewing works even when the image isn't yet on the server)
        const draftImg = sessionStorage.getItem('pono_maze_draft_image');
        if (draftImg) def.imageUrl = draftImg;
        STAGES = [def];
        return Promise.resolve(true);
      } catch (e) {
        console.warn('[maze] draft load failed:', e);
        return Promise.resolve(false);
      }
    }

    // ── Normal: fetch from imageStages/<name>.json ──
    const safe = String(raw).replace(/[^a-zA-Z0-9_-]/g, '');
    if (!safe) return Promise.resolve(false);
    return fetch('imageStages/' + safe + '.json', { credentials: 'omit' })
      .then(function(r) {
        if (!r.ok) throw new Error('image stage HTTP ' + r.status);
        return r.json();
      })
      .then(function(def) {
        if (!def || def.type !== 'image') throw new Error('invalid image stage');
        STAGES = [def];
        return true;
      })
      .catch(function(e) { console.warn('[maze] image stage load failed:', e); return false; });
  } catch (e) {
    return Promise.resolve(false);
  }
}

// ====== Walkable / direction helpers ======
function isWalkable(r, c) {
  if (r < 0 || r >= stage.rows || c < 0 || c >= stage.cols) return false;
  const t = stage.cells[r][c];
  return t === T.PATH || t === T.APPLE || t === T.GOAL;
}

function getOpenDirs(r, c, excludeBack) {
  const dirs = [];
  for (const d of [[-1,0],[1,0],[0,-1],[0,1]]) {
    if (excludeBack && d[0] === -excludeBack[0] && d[1] === -excludeBack[1]) continue;
    if (isWalkable(r+d[0], c+d[1])) dirs.push(d);
  }
  return dirs;
}

// Compute auto-walk path: walks STRAIGHT only.
// Stops at: obstacle, dead-end, L-bend (any turn), junction, or goal.
// Player must explicitly tap a direction at every corner.
function computeAutoWalk(startR, startC, dr, dc) {
  const path = [];
  let r = startR, c = startC;
  while (true) {
    const nr = r + dr, nc = c + dc;
    if (!isWalkable(nr, nc)) break;
    r = nr; c = nc;
    path.push({ r, c, dr, dc });
    if (stage.cells[r][c] === T.GOAL) break;
    // Continue only if straight ahead is still walkable
    if (!isWalkable(r + dr, c + dc)) break;
    // And no side-options (otherwise it's a junction → stop)
    const sides = [];
    if (dr === 0) {
      if (isWalkable(r - 1, c)) sides.push(1);
      if (isWalkable(r + 1, c)) sides.push(1);
    } else {
      if (isWalkable(r, c - 1)) sides.push(1);
      if (isWalkable(r, c + 1)) sides.push(1);
    }
    if (sides.length > 0) break; // junction, stop
  }
  return path;
}

// ====== Walk animation ======
function startWalk(path) {
  if (path.length === 0) return;
  hideArrows();
  walkAnim = {
    path: path,
    fromR: pono.r,
    fromC: pono.c,
    t0: performance.now(),
    perCell: 220,
  };
}

function finishWalk() {
  if (!walkAnim) return;
  const path = walkAnim.path;
  if (!path || path.length === 0) { walkAnim = null; return; }
  const last = path[path.length - 1];
  if (!last || !Number.isFinite(last.r) || !Number.isFinite(last.c)) {
    walkAnim = null;
    return;
  }
  // Collect apples & add trail
  for (const p of path) {
    if (stage.cells[p.r][p.c] === T.APPLE) {
      stage.cells[p.r][p.c] = T.PATH;
      applesCollected++;
      playApple();
      // Persist & check for newly-unlocked charms
      const beforeCharms = getCharms();
      totalApples++;
      localStorage.setItem('pono_maze_total_apples', String(totalApples));
      const afterCharms = getCharms();
      spawnPickup(p.r, p.c);
      if (afterCharms.hint > beforeCharms.hint) {
        spawnCharmPopup('🧚 ようせいの ヒント ゲット！');
        queueCharmTutorial('hint');
      }
      if (afterCharms.breeze > beforeCharms.breeze) {
        spawnCharmPopup('🍃 そよかぜパス ゲット！');
        queueCharmTutorial('breeze');
      }
      if (afterCharms.warp > beforeCharms.warp) {
        spawnCharmPopup('🌟 ほしの ワープ ゲット！');
        queueCharmTutorial('warp');
      }
    }
    if (!trail.find(t => t.r === p.r && t.c === p.c)) {
      trail.push({ r: p.r, c: p.c });
    }
  }
  pono.r = last.r; pono.c = last.c;
  moves++;
  hudMoves.textContent = 'てかず: ' + moves;
  hudApples.textContent = '🍎 ' + applesCollected + '/' + stage.totalApples;
  walkAnim = null;
  updateCharmsUI();
  if (stage.cells[last.r][last.c] === T.GOAL) {
    onClear();
  } else {
    showArrows();
  }
}

// ====== Arrow UI ======
function isObstacleCell(r, c) {
  if (r < 0 || r >= stage.rows || c < 0 || c >= stage.cols) return false;
  const t = stage.cells[r][c];
  return t === T.CAT || t === T.WATER || t === T.THORN || t === T.STONE;
}

function showArrows() {
  if (stage && stage.type === 'image') { imgShowArrows(); return; }
  hideArrows();
  if (cleared || walkAnim) return;
  const fx = gridOX + pono.c * cellSize + cellSize / 2;
  const fy = gridOY + pono.r * cellSize + cellSize / 2;
  const offset = Math.max(56, cellSize * 0.95);

  // Collect direction set:
  //  - normal walkable neighbors
  //  - if breezeActive: also include adjacent obstacle directions
  const allDirs = [[-1,0],[1,0],[0,-1],[0,1]];
  const validDirs = [];
  for (const d of allDirs) {
    const nr = pono.r + d[0], nc = pono.c + d[1];
    if (isWalkable(nr, nc)) {
      validDirs.push({ d, breeze: false });
    } else if (breezeActive && isObstacleCell(nr, nc)) {
      validDirs.push({ d, breeze: true });
    }
  }
  if (validDirs.length === 0) return;

  for (const v of validDirs) {
    const dr = v.d[0], dc = v.d[1];
    const btn = document.createElement('button');
    btn.className = 'maze-arrow' + (v.breeze ? ' maze-arrow-breeze' : '');
    btn.textContent = dr === -1 ? '↑' : dr === 1 ? '↓' : dc === -1 ? '←' : '→';
    btn.style.left = (fx + dc * offset) + 'px';
    btn.style.top  = (fy + dr * offset) + 'px';
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (walkAnim || cleared || charmTutShowing) return;
      playTap();
      if (v.breeze) {
        // そよかぜパス: 隣接障害物を消費して通過
        const obsR = pono.r + dr, obsC = pono.c + dc;
        if (isObstacleCell(obsR, obsC)) {
          stage.cells[obsR][obsC] = T.PATH;
        }
        breezeActive = false;
        const path = computeAutoWalk(pono.r, pono.c, dr, dc);
        if (path.length > 0) startWalk(path);
        else { showArrows(); updateCharmsUI(); }
      } else {
        const path = computeAutoWalk(pono.r, pono.c, dr, dc);
        if (path.length === 0) return;
        startWalk(path);
      }
    });
    arrowLayer.appendChild(btn);
  }
}

function hideArrows() {
  while (arrowLayer.firstChild) arrowLayer.removeChild(arrowLayer.firstChild);
}

// ════════════════════════════════════════════════════════════
// ====== Image stage helpers (Phase 1) ========================
// Polyline-based walking + camera follow. Activated only when
// stage.type === 'image' (loaded via ?image=<name>).
// All grid-mode code paths skip when stage is image type.
// ════════════════════════════════════════════════════════════
let _imgLastFrameTs = 0;
const landscapeReqEl = document.getElementById('landscapeReq');

function imgLoadStage(def) {
  if (!window.MazeImage) {
    console.error('[maze] MazeImage runtime not loaded');
    return;
  }
  // Switch body to image-stage layout (full viewport landscape, hide grid UI)
  document.body.classList.add('image-stage-mode');
  stage = window.MazeImage.buildStage(def);
  pono = {
    type: 'image',
    x: stage.start.x, y: stage.start.y,
    nodeId: stage.start.id,
    faceTx: 1, faceTy: 0,
    r: 0, c: 0, // grid-compat fillers
  };
  trail = [];
  moves = 0;
  applesCollected = 0;
  cleared = false;
  walkAnim = null;
  breezeActive = false;
  hintActiveUntil = 0;
  hintCells.clear();
  _imgLastFrameTs = 0;
  hudStage.textContent = stage.name;
  hudMoves.textContent = 'てかず: 0';
  hudApples.textContent = ''; // PoC: no apples yet
  voice.style.display = '';
  encounter.classList.remove('show');
  // Hide charm bar in image mode (Phase 1: charms not supported)
  const charmsEl = document.getElementById('charms');
  if (charmsEl) charmsEl.style.display = 'none';
  resizeCanvas();
  imgShowArrows();
  imgUpdateLandscapeOverlay();
  showHint('やじるしを タップしてね', 2500);
}

function imgComputeLayout(w, h) {
  if (!stage || stage.type !== 'image') return;
  stage._scale = window.MazeImage.computeScale(stage, w, h);
  stage._viewW = w;
  stage._viewH = h;
}

function imgShowArrows() {
  hideArrows();
  if (!stage || stage.type !== 'image') return;
  if (cleared || walkAnim) return;
  const dirs = [
    { dx: 0,  dy: -1, char: '↑' },
    { dx: 0,  dy: 1,  char: '↓' },
    { dx: -1, dy: 0,  char: '←' },
    { dx: 1,  dy: 0,  char: '→' },
  ];
  for (let i = 0; i < dirs.length; i++) {
    const d = dirs[i];
    const plan = window.MazeImage.computeAutoWalk(stage, pono.nodeId, d);
    if (!plan) continue;
    const btn = document.createElement('button');
    btn.className = 'maze-arrow';
    btn.textContent = d.char;
    btn.dataset.dx = String(d.dx);
    btn.dataset.dy = String(d.dy);
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (walkAnim || cleared || charmTutShowing) return;
      playTap();
      imgStartWalk(plan);
    });
    arrowLayer.appendChild(btn);
  }
  imgRepositionArrows();
}

function imgRepositionArrows() {
  if (!stage || stage.type !== 'image' || !stage._scale) return;
  const w = stage._viewW, h = stage._viewH;
  const sp = window.MazeImage.worldToScreen(stage, pono.x, pono.y, w, h, stage._scale);
  const offset = 56;
  const kids = arrowLayer.children;
  for (let i = 0; i < kids.length; i++) {
    const btn = kids[i];
    const dx = parseFloat(btn.dataset.dx || '0');
    const dy = parseFloat(btn.dataset.dy || '0');
    btn.style.left = (sp.x + dx * offset) + 'px';
    btn.style.top  = (sp.y + dy * offset) + 'px';
  }
}

function imgStartWalk(plan) {
  hideArrows();
  // Speed: ~600 world-px per second. Min 800ms so even short edges feel deliberate.
  const duration = Math.max(800, plan.length * 1000 / 600);
  walkAnim = {
    type: 'image',
    plan: plan,
    fromX: pono.x, fromY: pono.y,
    t0: performance.now(),
    duration: duration,
  };
}

function imgFinishWalk() {
  if (!walkAnim || walkAnim.type !== 'image') return;
  const poly = walkAnim.plan.polyline;
  const last = poly[poly.length - 1];
  pono.x = last.x; pono.y = last.y;
  pono.nodeId = walkAnim.plan.otherId;
  if (poly.length >= 2) {
    const a = poly[poly.length - 2], b = poly[poly.length - 1];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    pono.faceTx = dx / len; pono.faceTy = dy / len;
  }
  moves++;
  hudMoves.textContent = 'てかず: ' + moves;
  walkAnim = null;
  if (pono.nodeId === stage.goal.id) {
    onClear();
  } else {
    imgShowArrows();
  }
}

function imgDraw(now) {
  if (!stage || stage.type !== 'image') return;
  if (!_imgLastFrameTs) _imgLastFrameTs = now;
  const dt = Math.min(0.1, (now - _imgLastFrameTs) / 1000);
  _imgLastFrameTs = now;

  // Determine current pono position (animated or static)
  let px = pono.x, py = pono.y, ftx = pono.faceTx, fty = pono.faceTy;
  let isWalking = false;
  if (walkAnim && walkAnim.type === 'image') {
    const elapsed = now - walkAnim.t0;
    const t = elapsed / walkAnim.duration;
    if (t >= 1) {
      const last = walkAnim.plan.polyline[walkAnim.plan.polyline.length - 1];
      px = last.x; py = last.y;
      imgFinishWalk();
    } else {
      const r = window.MazeImage.interpolate(walkAnim.plan.polyline, walkAnim.plan.cumLengths, t);
      px = r.x; py = r.y; ftx = r.tx; fty = r.ty;
      isWalking = true;
    }
  }

  // Update camera
  const w = stage._viewW || canvas.clientWidth;
  const h = stage._viewH || canvas.clientHeight;
  if (!stage._scale) imgComputeLayout(w, h);
  window.MazeImage.updateCamera(stage, px, py, w, h, dt, stage._scale);

  // Background fill (in case image hasn't loaded or letterbox visible)
  ctx.fillStyle = '#A4C76D';
  ctx.fillRect(0, 0, w, h);

  // Draw with camera transform
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.scale(stage._scale, stage._scale);
  ctx.translate(-stage.camera.x, -stage.camera.y);
  if (stage.image && stage.image.complete && stage.image.naturalWidth > 0) {
    ctx.drawImage(stage.image, 0, 0, stage.viewBox.w, stage.viewBox.h);
  }
  ctx.restore();

  // Lantern overlay (in screen space — applied AFTER image, BEFORE pono so
  // pono is fully bright in the lantern's center)
  if (stage.lantern) {
    const ponoScreenX = w / 2 + (px - stage.camera.x) * stage._scale;
    const ponoScreenY = h / 2 + (py - stage.camera.y) * stage._scale;
    imgDrawLantern(now, ponoScreenX, ponoScreenY, w, h, stage.lantern);
  }

  // Pono on top of the lantern overlay
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.scale(stage._scale, stage._scale);
  ctx.translate(-stage.camera.x, -stage.camera.y);
  imgDrawPono(now, px, py, ftx, fty, isWalking);
  ctx.restore();

  // Reposition arrows so they follow pono's screen position (camera lerp)
  if (arrowLayer.children.length > 0) imgRepositionArrows();

  // Safety: re-show arrows if missing while idle
  if (!walkAnim && !cleared && !overlay.classList.contains('show')
      && arrowLayer.children.length === 0) {
    imgShowArrows();
  }
}

// ── Lantern night overlay ──
// Centered on (cx, cy) screen pixels. Inside `inner` is fully bright (no darkening),
// between `inner` and `outer` fades to night, beyond `outer` is fully dark.
// Optionally adds a warm yellow glow at the lantern center.
// Pulses gently to suggest a flickering flame.
function imgDrawLantern(now, cx, cy, w, h, opts) {
  // Allow `lantern: true` (use defaults) or `lantern: { ... }` (custom).
  const cfg = (opts && typeof opts === 'object') ? opts : {};
  const minDim = Math.min(w, h);
  // Gentle 0.96..1.04 pulse over 2.5s
  const pulse = 1 + Math.sin(now / 400) * 0.04;
  const inner = (cfg.innerRadius || minDim * 0.16) * pulse;
  const outer = (cfg.outerRadius || minDim * 0.55) * pulse;
  const tintR = cfg.tintR != null ? cfg.tintR : 2;
  const tintG = cfg.tintG != null ? cfg.tintG : 8;
  const tintB = cfg.tintB != null ? cfg.tintB : 28;
  const tintA = cfg.tintA != null ? cfg.tintA : 0.94;
  const warmth = cfg.warmth !== false; // default on
  // 1) Night overlay: transparent at center, opaque outside outer
  ctx.save();
  const dark = ctx.createRadialGradient(cx, cy, 0, cx, cy, outer);
  const tintRGB = tintR + ',' + tintG + ',' + tintB;
  dark.addColorStop(0, 'rgba(' + tintRGB + ',0)');
  dark.addColorStop(Math.max(0.01, Math.min(0.95, inner / outer)), 'rgba(' + tintRGB + ',0)');
  dark.addColorStop(1, 'rgba(' + tintRGB + ',' + tintA + ')');
  ctx.fillStyle = dark;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
  // 2) Warm lantern glow (additive)
  if (warmth) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const warm = ctx.createRadialGradient(cx, cy, 0, cx, cy, inner * 1.3);
    warm.addColorStop(0, 'rgba(255, 220, 130, 0.32)');
    warm.addColorStop(0.5, 'rgba(255, 200, 100, 0.14)');
    warm.addColorStop(1, 'rgba(255, 200, 100, 0)');
    ctx.fillStyle = warm;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
  }
}

function imgDrawPono(now, x, y, tx, ty, isWalking) {
  // Sprite size in world pixels (so it scales with the rest of the image).
  // Tuned so pono is roughly 1/9 of viewBox height.
  const walkH = stage.viewBox.h / 9;
  const baseSize = walkH * 0.92;

  const face = window.MazeImage.tangentToFace(tx, ty);
  const dr = face.dr, dc = face.dc;

  const wantsWalkSide  = isWalking && dc !== 0 && imgWalkSideSheet.complete && imgWalkSideSheet.naturalWidth > 0;
  const wantsWalkFront = isWalking && dr === 1 && imgWalkSheet.complete && imgWalkSheet.naturalWidth > 0;

  const elapsed = walkAnim ? (now - walkAnim.t0) : now;

  if (wantsWalkSide) {
    const sideH = walkH * SIDE_WALK_SCALE;
    const sideW = sideH * SIDE_WALK_FRAME_W / SIDE_WALK_FRAME_H;
    const frameIdx = Math.floor(elapsed / (1000 / WALK_FPS)) % SIDE_WALK_FRAMES;
    const sx = frameIdx * SIDE_WALK_FRAME_W;
    ctx.save();
    if (dc < 0) {
      ctx.translate(x, y); ctx.scale(-1, 1);
      ctx.drawImage(imgWalkSideSheet, sx, 0, SIDE_WALK_FRAME_W, SIDE_WALK_FRAME_H,
                    -sideW / 2, -sideH / 2, sideW, sideH);
    } else {
      ctx.drawImage(imgWalkSideSheet, sx, 0, SIDE_WALK_FRAME_W, SIDE_WALK_FRAME_H,
                    x - sideW / 2, y - sideH / 2, sideW, sideH);
    }
    ctx.restore();
  } else if (wantsWalkFront) {
    const walkW = walkH * WALK_FRAME_W / WALK_FRAME_H;
    const frameIdx = Math.floor(elapsed / (1000 / WALK_FPS)) % WALK_FRAMES;
    const sx = frameIdx * WALK_FRAME_W;
    ctx.drawImage(imgWalkSheet, sx, 0, WALK_FRAME_W, WALK_FRAME_H,
                  x - walkW / 2, y - walkH / 2, walkW, walkH);
  } else if (imgPono.complete && imgPono.naturalWidth > 0) {
    ctx.drawImage(imgPono, x - baseSize / 2, y - baseSize / 2, baseSize, baseSize);
  } else {
    ctx.font = Math.floor(baseSize * 0.8) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🐻', x, y);
  }
}

function imgUpdateLandscapeOverlay() {
  if (!stage || stage.type !== 'image') {
    if (landscapeReqEl) landscapeReqEl.classList.remove('show');
    return;
  }
  if (window.MazeImage.isPortrait()) {
    landscapeReqEl.classList.add('show');
  } else {
    landscapeReqEl.classList.remove('show');
  }
}
window.addEventListener('orientationchange', imgUpdateLandscapeOverlay);
window.addEventListener('resize', imgUpdateLandscapeOverlay);

function imgKeyboardHandler(e) {
  if (overlay.classList.contains('show') || charmTutShowing) return;
  if (cleared || walkAnim) return;
  let dx = 0, dy = 0;
  if (e.key === 'ArrowUp')         dy = -1;
  else if (e.key === 'ArrowDown')  dy = 1;
  else if (e.key === 'ArrowLeft')  dx = -1;
  else if (e.key === 'ArrowRight') dx = 1;
  else return;
  e.preventDefault();
  const plan = window.MazeImage.computeAutoWalk(stage, pono.nodeId, { dx: dx, dy: dy });
  if (plan) imgStartWalk(plan);
}

function updateCharmsUI() {

  charmHintN.textContent   = c.hint;
  charmBreezeN.textContent = c.breeze;
  charmWarpN.textContent   = c.warp;
  const lock = cleared || !!walkAnim || overlay.classList.contains('show') || charmTutShowing;
  charmHintBtn.disabled   = c.hint   <= 0 || lock;
  charmBreezeBtn.disabled = c.breeze <= 0 || lock;
  charmWarpBtn.disabled   = c.warp   <= 0 || lock;
  charmBreezeBtn.classList.toggle('active', breezeActive);
}

// Solve cell-level path from current pono to G (returns array of {r,c} or null)
function solveCellPath() {
  if (!stage) return null;
  const goalR = stage.goal.r, goalC = stage.goal.c;
  const startKey = pono.r + ',' + pono.c;
  const seen = new Set([startKey]);
  const parent = new Map();
  const q = [{ r: pono.r, c: pono.c }];
  while (q.length) {
    const u = q.shift();
    if (u.r === goalR && u.c === goalC) break;
    const dirs = getOpenDirs(u.r, u.c, null);
    for (const d of dirs) {
      const path = computeAutoWalk(u.r, u.c, d[0], d[1]);
      if (path.length === 0) continue;
      const last = path[path.length - 1];
      const k = last.r + ',' + last.c;
      if (seen.has(k)) continue;
      seen.add(k);
      parent.set(k, { from: u.r + ',' + u.c, segment: path });
      q.push({ r: last.r, c: last.c });
    }
  }
  const goalKey = goalR + ',' + goalC;
  if (!parent.has(goalKey) && goalKey !== startKey) return null;
  // Trace back
  const segments = [];
  let cur = goalKey;
  while (parent.has(cur)) {
    const p = parent.get(cur);
    segments.unshift(p.segment);
    cur = p.from;
  }
  // Flatten cells
  const cells = [{ r: pono.r, c: pono.c }];
  for (const seg of segments) for (const cell of seg) cells.push({ r: cell.r, c: cell.c });
  return cells;
}

// 🧚 ヒント: 解の道を 3秒間 光らせる
function activateHint() {
  if (stage && stage.type === 'image') return; // not supported in image mode (Phase 1)
  if (cleared || walkAnim) return;
  const c = getCharms();
  if (c.hint <= 0) return;
  const path = solveCellPath();
  if (!path || path.length === 0) return;
  hintCells = new Set(path.map(p => p.r + ',' + p.c));
  hintActiveUntil = performance.now() + 3000;
  usedHint++;
  localStorage.setItem('pono_maze_used_hint', String(usedHint));
  updateCharmsUI();
  showHint('🧚 ようせいが せいかいの みちを おしえてくれたよ！', 3000);
}

// 🍃 そよかぜパス: 次の1回だけ障害物を通り抜けられる
function activateBreeze() {
  if (stage && stage.type === 'image') return; // not supported in image mode (Phase 1)
  if (cleared || walkAnim) return;
  const c = getCharms();
  if (c.breeze <= 0) return;
  if (breezeActive) return; // already active
  breezeActive = true;
  usedBreeze++;
  localStorage.setItem('pono_maze_used_breeze', String(usedBreeze));
  showHint('🍃 そよかぜパス！しょうがいぶつを とおりぬけられるよ', 3000);
  // Refresh arrows so obstacle directions become tappable
  showArrows();
  updateCharmsUI();
}

// 🌟 ほしのワープ: 解の中間地点へ瞬間移動
function activateWarp() {
  if (stage && stage.type === 'image') return; // not supported in image mode (Phase 1)
  if (cleared || walkAnim) return;
  const c = getCharms();
  if (c.warp <= 0) return;
  const path = solveCellPath();
  if (!path || path.length < 4) {
    showHint('もう ゴールが ちかいよ！', 1500);
    return;
  }
  const midIdx = Math.floor(path.length / 2);
  const mid = path[midIdx];
  spawnWarpFlash(pono.r, pono.c);
  setTimeout(function() {
    pono.r = mid.r;
    pono.c = mid.c;
    if (!trail.find(t => t.r === mid.r && t.c === mid.c)) {
      trail.push({ r: mid.r, c: mid.c });
    }
    spawnWarpFlash(mid.r, mid.c);
    showArrows();
  }, 300);
  usedWarp++;
  localStorage.setItem('pono_maze_used_warp', String(usedWarp));
  showHint('🌟 ほしのワープ！とおくへ とんだよ！', 2500);
  updateCharmsUI();
}

// Wire up buttons
charmHintBtn.addEventListener('click',   function() { activateHint();   });
charmBreezeBtn.addEventListener('click', function() { activateBreeze(); });
charmWarpBtn.addEventListener('click',   function() { activateWarp();   });

// ====== Hint ======
let hintTimer = null;
function showHint(msg, ms) {
  hint.textContent = msg;
  hint.style.opacity = '1';
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(function() { hint.style.opacity = '0.55'; }, ms || 2000);
}

// ====== Stage loading ======
function loadStage(idx) {
  stageIdx = idx;
  const def = STAGES[idx];
  if (def && def.type === 'image') {
    imgLoadStage(def);
    return;
  }
  // Grid stage: revert from image-stage mode if previously set
  document.body.classList.remove('image-stage-mode');
  const charmsEl = document.getElementById('charms');
  if (charmsEl) charmsEl.style.display = '';
  if (landscapeReqEl) landscapeReqEl.classList.remove('show');
  stage = buildStage(def);
  pono = { r: stage.start.r, c: stage.start.c };
  trail = [{ r: pono.r, c: pono.c }];
  moves = 0;
  applesCollected = 0;
  cleared = false;
  walkAnim = null;
  breezeActive = false;
  hintActiveUntil = 0;
  hintCells.clear();
  hudStage.textContent = stage.name;
  hudMoves.textContent = 'てかず: 0';
  hudApples.textContent = '🍎 0/' + stage.totalApples;
  voice.style.display = '';
  encounter.classList.remove('show');
  resizeCanvas();
  showArrows();
  updateCharmsUI();
  showHint('やじるしを タップしてね', 2500);
}

// ====== Clear ======
function onClear() {
  cleared = true;
  hideArrows();
  voice.style.display = 'none';
  updateCharmsUI();
  // Image stages only contribute to progression rewards when they are *official*
  // (loaded from _index.json overrides, NOT from one-off ?image=<name> previews).
  // Without this guard, a crafted ?image=... JSON could farm rewards.
  const isImageStage = stage && stage.type === 'image';
  const isOfficial   = stage && stage._official === true;
  if (!isImageStage || isOfficial) {
    if (window.incrementStat) window.incrementStat('maze_clears', 1);
    if (window.addAcornsDaily) window.addAcornsDaily('maze', 5, 5, { reason: 'maze_clear' });
  }
  playStageClearMz();
  setTimeout(function() {
    encounter.classList.add('show');
    spawnConfetti();
  }, 200);
  setTimeout(function() {
    encounter.classList.remove('show');
    showStageClearOverlay();
  }, 2200);
}

function showStageClearOverlay() {
  const isImageStage = stage && stage.type === 'image';
  const isOfficial   = stage && stage._official === true;
  const isLast = stageIdx >= STAGES.length - 1;
  if (isLast) {
    // 最終ステージ: 初回クリア報酬を試みる (グリッドステージ + 公式 image ステージのみ)。
    // ?image=<name> でアクセスした非公式 image ステージは報酬対象外。
    if (window.triggerFirstClearReward && (!isImageStage || isOfficial)) {
      window.triggerFirstClearReward('maze', {
        onClose: function() { _showMazeFinalOverlay(); }
      }).then(function(shown) {
        if (!shown) _showMazeFinalOverlay();
      }).catch(function() { _showMazeFinalOverlay(); });
    } else {
      _showMazeFinalOverlay();
    }
  } else {
    ovTitle.textContent = 'ステージ クリア！';
    ovMsg.textContent = 'やったね！\nつぎの もりへ いこう！' + _dailyAcornTail('maze');
    ovBtn.textContent = 'つぎへ ▶';
    ovBtn.onclick = function() { hideOverlay(); loadStage(stageIdx + 1); };
    showOverlay();
  }
}

// きょうの どんぐり: N/5 / 上限到達時は「おしまい」メッセージ
function _dailyAcornTail(gameId) {
  if (window.PONO_MVP_NO_REWARDS) return '';
  if (!window.getDailyAcorns) return '';
  var n = window.getDailyAcorns(gameId);
  return n >= 5
    ? '\n\n🌰 きょうの どんぐりは おしまい！\nまた あした！'
    : '\n\n🌰 きょうの どんぐり: ' + n + '/5';
}

function showOverlay() { overlay.classList.add('show'); updateCharmsUI(); }
function hideOverlay() { overlay.classList.remove('show'); updateCharmsUI(); }

// ====== Confetti ======
function spawnConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#F5A623','#6C8E3F','#F25C54','#4FC3F7','#FFCE5F'];
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = '-10px';
    piece.style.width = '8px'; piece.style.height = '12px';
    piece.style.background = colors[i % colors.length];
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    container.appendChild(piece);
    setTimeout(function() { piece.remove(); }, 3200);
  }
}

// ====== Drawing ======
function draw(now) {
  // CRITICAL: requestAnimationFrame must ALWAYS be called, even if drawing throws.
  // Otherwise the loop terminates and Pono "freezes/disappears".
  try {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (stage && stage.type === 'image') {
      imgDraw(now);
      requestAnimationFrame(draw);
      return;
    }
    if (stage) {
      // Cells
      for (let r = 0; r < stage.rows; r++) {
        for (let c = 0; c < stage.cols; c++) {
          const x = gridOX + c * cellSize;
          const y = gridOY + r * cellSize;
          drawCell(x, y, stage.cells[r][c], r, c, now);
        }
      }
      // Hint highlight (drawn over cells)
      if (now < hintActiveUntil && hintCells.size > 0) {
        const remaining = (hintActiveUntil - now) / 3000;
        const baseAlpha = Math.min(0.55, remaining * 0.65 + 0.15);
        const pulse = 0.15 * Math.sin(now / 180);
        ctx.save();
        ctx.fillStyle = 'rgba(255, 220, 80, ' + (baseAlpha + pulse).toFixed(3) + ')';
        for (const k of hintCells) {
          const [hr, hc] = k.split(',').map(Number);
          const hx = gridOX + hc * cellSize;
          const hy = gridOY + hr * cellSize;
          ctx.fillRect(hx + 2, hy + 2, cellSize - 4, cellSize - 4);
        }
        ctx.restore();
      } else if (hintActiveUntil !== 0 && now >= hintActiveUntil) {
        hintActiveUntil = 0;
        hintCells.clear();
      }
      // Trail
      for (const p of trail) {
        const x = gridOX + p.c * cellSize + cellSize / 2;
        const y = gridOY + p.r * cellSize + cellSize / 2;
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#6C8E3F';
        ctx.beginPath();
        ctx.arc(x - 4, y, 2.5, 0, Math.PI * 2);
        ctx.arc(x + 4, y, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      drawPono(now);
      // Safety net: if arrows missing while pono idle, reshow
      if (!walkAnim && !cleared && !overlay.classList.contains('show') && arrowLayer.children.length === 0) {
        showArrows();
      }
    }
  } catch (e) {
    console.error('[maze] draw error:', e);
  }
  requestAnimationFrame(draw);
}

function drawCell(x, y, tile, r, c, now) {
  if (tile === T.WALL) {
    // 周りの壁: 緑の下地 + 木のイラスト
    ctx.fillStyle = '#3E5A24';
    ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
    if (imgTree.complete && imgTree.naturalWidth > 0) {
      const sz = Math.floor(cellSize * 0.95);
      ctx.drawImage(imgTree, x + (cellSize - sz) / 2, y + (cellSize - sz) / 2, sz, sz);
    } else {
      ctx.font = Math.floor(cellSize * 0.7) + 'px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('🌳', x + cellSize / 2, y + cellSize / 2);
    }
    return;
  }

  // Walkable base
  ctx.fillStyle = (r + c) % 2 === 0 ? '#EFE7D2' : '#E8DFC4';
  ctx.fillRect(x, y, cellSize, cellSize);
  ctx.strokeStyle = 'rgba(108,142,63,0.18)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, cellSize - 1, cellSize - 1);

  if (tile === T.PATH) return;

  ctx.font = Math.floor(cellSize * 0.65) + 'px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (tile === T.GOAL) {
    if (imgHedgehog.complete && imgHedgehog.naturalWidth > 0) {
      const sz = Math.floor(cellSize * 0.85);
      const bob = Math.sin(now / 280) * 2;
      ctx.drawImage(imgHedgehog, x + (cellSize - sz) / 2, y + (cellSize - sz) / 2 + bob, sz, sz);
    } else {
      ctx.fillText('🦔', x + cellSize / 2, y + cellSize / 2);
    }
    return;
  }
  // 障害物 (CAT/WATER/THORN/STONE): 4種類のイラストを位置で散らして描画
  // CAT は「猫 = 悪役」の印象を避けるため、他の自然障害物と同じ絵でランダム表示
  if (tile === T.CAT || tile === T.WATER || tile === T.THORN || tile === T.STONE) {
    const img = _pickObstacleImg(r, c);
    if (img.complete && img.naturalWidth > 0) {
      const sz = Math.floor(cellSize * 0.88);
      ctx.drawImage(img, x + (cellSize - sz) / 2, y + (cellSize - sz) / 2, sz, sz);
    } else {
      // Fallback emoji (猫絵文字は使わない)
      let emoji = (tile === T.WATER) ? '💧' : (tile === T.THORN) ? '🌵' : '🪨';
      ctx.fillText(emoji, x + cellSize / 2, y + cellSize / 2);
    }
    return;
  }
  if (tile === T.APPLE) {
    const bob = Math.sin(now / 400 + r + c) * 2;
    if (imgApple.complete && imgApple.naturalWidth > 0) {
      const sz = Math.floor(cellSize * 0.78);
      ctx.drawImage(imgApple, x + (cellSize - sz) / 2, y + (cellSize - sz) / 2 + bob, sz, sz);
    } else {
      ctx.fillText('🍎', x + cellSize / 2, y + cellSize / 2 + bob);
    }
  }
}

function drawPono(now) {
  // Defensive: never bail out — always draw something at pono's position.
  if (!pono) pono = { r: 0, c: 0 };
  if (!Number.isFinite(pono.r)) pono.r = 0;
  if (!Number.isFinite(pono.c)) pono.c = 0;

  let pr, pc, dr = 0, dc = 0;
  if (walkAnim && walkAnim.path && walkAnim.path.length > 0) {
    const totalElapsed = now - walkAnim.t0;
    const segIdx = Math.floor(totalElapsed / walkAnim.perCell);
    if (segIdx >= walkAnim.path.length) {
      finishWalk();
      pr = pono.r; pc = pono.c;
    } else {
      const t = (totalElapsed - segIdx * walkAnim.perCell) / walkAnim.perCell;
      const seg = walkAnim.path[segIdx];
      const fromR = segIdx === 0 ? walkAnim.fromR : walkAnim.path[segIdx - 1].r;
      const fromC = segIdx === 0 ? walkAnim.fromC : walkAnim.path[segIdx - 1].c;
      pr = fromR + (seg.r - fromR) * t;
      pc = fromC + (seg.c - fromC) * t;
      dr = seg.dr; dc = seg.dc;
    }
  } else {
    pr = pono.r; pc = pono.c;
  }

  // Safety: if interpolation produced NaN, fall back to static pono position
  if (!Number.isFinite(pr) || !Number.isFinite(pc)) {
    pr = pono.r; pc = pono.c;
    dr = 0; dc = 0;
  }

  const fx = gridOX + pc * cellSize + cellSize / 2;
  const fy = gridOY + pr * cellSize + cellSize / 2;
  const walkH = Math.floor(cellSize * 0.85);
  const baseSize = Math.floor(cellSize * 0.78);

  // Decide which sprite to draw. Walk sprite has priority during walking;
  // static face is the fallback (and the only thing drawn when idle).
  const isHorizontal = walkAnim ? Math.abs(dc) > Math.abs(dr) : false;
  const sideAvailable = imgWalkSideSheet.complete && imgWalkSideSheet.naturalWidth > 0;
  const frontAvailable = imgWalkSheet.complete && imgWalkSheet.naturalWidth > 0;
  const wantsWalkSide  = !!walkAnim && isHorizontal && sideAvailable;
  const wantsWalkFront = !!walkAnim && !wantsWalkSide && frontAvailable;
  const drawingWalkSprite = wantsWalkSide || wantsWalkFront;

  if (drawingWalkSprite) {
    const elapsed = now - walkAnim.t0;
    if (wantsWalkSide) {
      const sideH = Math.floor(walkH * SIDE_WALK_SCALE);
      const sideW = Math.floor(sideH * SIDE_WALK_FRAME_W / SIDE_WALK_FRAME_H);
      const frameIdx = Math.floor(elapsed / (1000 / WALK_FPS)) % SIDE_WALK_FRAMES;
      const sx = frameIdx * SIDE_WALK_FRAME_W;
      ctx.save();
      if (dc < 0) {
        ctx.translate(fx, fy); ctx.scale(-1, 1);
        ctx.drawImage(imgWalkSideSheet, sx, 0, SIDE_WALK_FRAME_W, SIDE_WALK_FRAME_H,
                      -sideW / 2, -sideH / 2, sideW, sideH);
      } else {
        ctx.drawImage(imgWalkSideSheet, sx, 0, SIDE_WALK_FRAME_W, SIDE_WALK_FRAME_H,
                      fx - sideW / 2, fy - sideH / 2, sideW, sideH);
      }
      ctx.restore();
    } else {
      const walkW = Math.floor(walkH * WALK_FRAME_W / WALK_FRAME_H);
      const frameIdx = Math.floor(elapsed / (1000 / WALK_FPS)) % WALK_FRAMES;
      const sx = frameIdx * WALK_FRAME_W;
      ctx.drawImage(imgWalkSheet, sx, 0, WALK_FRAME_W, WALK_FRAME_H,
                    fx - walkW / 2, fy - walkH / 2, walkW, walkH);
    }
  } else if (imgPono.complete && imgPono.naturalWidth > 0) {
    // Idle (or walk sprite missing): draw static face
    ctx.drawImage(imgPono, fx - baseSize / 2, fy - baseSize / 2, baseSize, baseSize);
  } else {
    // Last-resort fallback
    ctx.font = Math.floor(cellSize * 0.6) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🐻', fx, fy);
  }
}

// ====== Keyboard input (also supported) ======
window.addEventListener('keydown', function(e) {
  if (stage && stage.type === 'image') { imgKeyboardHandler(e); return; }
  if (overlay.classList.contains('show') || charmTutShowing) return;
  if (cleared || walkAnim) return;
  let dr = 0, dc = 0;
  if (e.key === 'ArrowUp')    dr = -1;
  else if (e.key === 'ArrowDown')  dr = 1;
  else if (e.key === 'ArrowLeft')  dc = -1;
  else if (e.key === 'ArrowRight') dc = 1;
  else return;
  e.preventDefault();
  if (!isWalkable(pono.r + dr, pono.c + dc)) return;
  const path = computeAutoWalk(pono.r, pono.c, dr, dc);
  if (path.length > 0) startWalk(path);
});

// ====== Start ======
ovBtn.onclick = function() {
  hideOverlay();
  loadStage(0);
};

if (window.initMenu) {
  window.initMenu({
    bgmToggle: function() {
      bgmEnabled = !bgmEnabled;
      localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
      if (bgmEnabled) tryPlayBgm(); else stopBgm();
    },
    tutorial: function() {
      ovTitle.textContent = 'あそびかた';
      ovMsg.textContent =
        'やじるしを タップすると\nつぎの わかれみちまで\nじどうで すすむよ！\n\n' +
        '🍎りんごを あつめると\nおまもりが もらえるよ！\n\n' +
        '🧚 3こで「ようせいの ヒント」\n   せいかいの みちが ひかるよ\n\n' +
        '🍃 5こで「そよかぜパス」\n   1かいだけ いわや かべを\n   とおりぬけられるよ！\n   つかうと きえちゃうから\n   ここぞ！の とき つかってね\n\n' +
        '🌟 8こで「ほしの ワープ」\n   とおくへ とべるよ\n\n' +
        'りんごは ずっと たまるから\nたくさん あつめよう！';
      ovBtn.textContent = 'わかった ▶';
      ovBtn.onclick = function() { hideOverlay(); };
      showOverlay();
    }
  });
}

updateCharmsUI();
showOverlay();
// 1) Load _index.json (overrides STAGES with image stages at specified slots)
// 2) Then handle ?image=<name> (one-off preview, takes precedence)
// 3) Then loadStage(<initial>)  — defaults to 0 (tutorial), or ?stage=N to jump
function _getInitialStageIdx() {
  try {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('stage');
    if (raw == null) return 0;
    const n = parseInt(raw, 10);
    if (Number.isInteger(n) && n >= 0 && n < STAGES.length) return n;
    console.warn('[maze] ?stage=' + raw + ' out of range, defaulting to 0');
  } catch (e) { /* ignore */ }
  return 0;
}
_loadImageStageIndex()
  .then(function() { return _loadImageStageFromURL(); })
  .then(function() { loadStage(_getInitialStageIdx()); });
requestAnimationFrame(draw);
</script>
