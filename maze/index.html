<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ハリネズミくんを たすけよう | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8F0;
  --primary: #6C8E3F;
  --primary-dark: #4F6B2A;
  --accent: #F5A623;
  --text: #5D4E37;
  --text-light: #A89880;
  --shadow: rgba(93,78,55,0.12);
  --radius: 20px;
}

html, body {
  height: 100dvh; overflow: hidden;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background: linear-gradient(180deg, #E8F5D8 0%, #FFF8F0 100%);
  color: var(--text);
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

#app {
  display: flex; flex-direction: column;
  height: 100dvh;
  max-width: 540px; margin: 0 auto;
  padding: 4px 10px 10px;
}

.header { flex-shrink: 0; text-align: center; padding: 48px 0 4px; position: relative; }
.header h1 {
  font-size: 1.25rem; font-weight: 900;
  background: linear-gradient(135deg, #6C8E3F, #A4C76D);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.subtitle { font-size: 0.74rem; color: #A89080; font-weight: 700; margin-top: 1px; }

.hud {
  display: flex; justify-content: space-between; align-items: center;
  padding: 3px 8px; font-size: 0.85rem; font-weight: 700;
  flex-shrink: 0; gap: 8px;
}
#hud-stage { color: var(--primary); }
#hud-apples { color: var(--accent); }
#hud-moves { color: var(--text); }

.game-wrap {
  flex: 1; min-height: 0;
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  touch-action: none;
  background: #F4EFE3;
  box-shadow: 0 4px 16px var(--shadow);
}
#gameCanvas { display: block; width: 100%; height: 100%; }

/* Arrow buttons (HTML overlay) */
#arrowLayer { position: absolute; inset: 0; pointer-events: none; }
.maze-arrow {
  position: absolute;
  width: 42px; height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6C8E3F, #A4C76D);
  color: white;
  border: 3px solid white;
  font-size: 1.4rem; font-weight: 900;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
  pointer-events: auto;
  font-family: inherit;
  animation: arrowPulse 1.2s ease-in-out infinite;
  transform: translate(-50%, -50%);
  padding: 0;
}
.maze-arrow:active { transform: translate(-50%, -50%) scale(0.9); }
@keyframes arrowPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50%      { transform: translate(-50%, -50%) scale(1.12); }
}

/* Hint message */
.hint {
  position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%);
  background: rgba(255,255,255,0.92);
  color: var(--text); font-size: 0.78rem; font-weight: 700;
  padding: 6px 14px; border-radius: 999px;
  box-shadow: 0 2px 8px var(--shadow);
  pointer-events: none;
  white-space: nowrap;
  opacity: 0.9;
  transition: opacity 0.3s;
}

/* Voice bubble */
.voice {
  position: absolute; right: 12px; top: 12px;
  background: #FFFAE6; color: var(--text);
  padding: 8px 14px; border-radius: 18px;
  font-size: 0.82rem; font-weight: 700;
  box-shadow: 0 2px 8px var(--shadow);
  border: 2px solid #F5C842;
  animation: voiceBob 1.6s ease-in-out infinite;
  z-index: 4;
}
.voice::after {
  content: ''; position: absolute;
  bottom: -8px; right: 22px;
  width: 0; height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 10px solid #F5C842;
}
@keyframes voiceBob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}

/* Apple pickup popup */
.pickup {
  position: absolute;
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--accent);
  pointer-events: none;
  animation: pickupRise 0.9s ease-out forwards;
  z-index: 6;
}
@keyframes pickupRise {
  0%   { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
  20%  { transform: translate(-50%, -10px) scale(1.3); opacity: 1; }
  100% { transform: translate(-50%, -50px) scale(1); opacity: 0; }
}

/* ===== Overlay ===== */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  display: none; align-items: center; justify-content: center;
  z-index: 9000;
}
.overlay.show { display: flex; }
.ov-card {
  background: #FFF8F0; border-radius: 24px;
  padding: 28px 24px 22px;
  max-width: 320px; width: 86%;
  text-align: center;
  box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  animation: pop 0.3s ease-out;
}
@keyframes pop {
  0%   { transform: scale(0.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.ov-icon { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
.ov-icon img { width: 72px; height: 72px; object-fit: contain; }
.ov-title {
  font-size: 1.15rem; font-weight: 900;
  color: var(--primary-dark); margin-bottom: 6px;
}
.ov-msg {
  font-size: 0.88rem; color: var(--text);
  margin-bottom: 16px; line-height: 1.5;
  white-space: pre-line;
}
.ov-btn {
  background: linear-gradient(135deg, var(--primary), #A4C76D);
  color: white; border: none;
  padding: 12px 28px; border-radius: 999px;
  font-size: 1rem; font-weight: 900;
  cursor: pointer; box-shadow: 0 4px 12px rgba(108,142,63,0.4);
  font-family: inherit;
}
.ov-btn:active { transform: scale(0.95); }

/* Encounter cutscene */
.encounter {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,248,220,0.92);
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.encounter.show { opacity: 1; pointer-events: auto; }
.encounter-inner {
  display: flex; align-items: flex-end; gap: 24px;
  animation: meetIn 0.6s ease-out;
  position: relative;
}
.encounter img { width: 100px; height: 130px; object-fit: contain; }
.encounter .heart {
  position: absolute; font-size: 2.2rem;
  left: 50%; top: -10px; transform: translateX(-50%);
  animation: heartFloat 1.6s ease-out infinite;
}
@keyframes heartFloat {
  0%   { transform: translate(-50%, 0) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50px) scale(1.4); opacity: 0; }
}
@keyframes meetIn {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* Confetti */
.confetti-container {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 60; overflow: hidden;
}
.confetti-piece { position: absolute; animation: cfall 2.5s ease-out forwards; }
@keyframes cfall {
  0%   { transform: translateY(-10px) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}

// ====== Tile types ======
// '.'=path, '#'=wall, 'C'=cat, 'W'=water, 'A'=apple, 'T'=thorn, 'R'=stone, 'S'=start, 'G'=goal
// Walkable: '.', 'S', 'G', 'A'
const T = { PATH:0, WALL:1, CAT:2, WATER:3, APPLE:4, THORN:5, STONE:6, GOAL:9 };

function parseCell(ch) {
  switch (ch) {
    case '#': return T.WALL;
    case 'C': return T.CAT;
    case 'W': return T.WATER;
    case 'A': return T.APPLE;
    case 'T': return T.THORN;
    case 'R': return T.STONE;
    case 'G': return T.GOAL;
    default:  return T.PATH;

}

//  - tall layout (rows >= cols) so cells stay big enough for arrow buttons

function buildStage(stageDef) {
  const rows = stageDef.grid.length;
  const cols = stageDef.grid[0].length;
  const cells = [];
  let start = null, goal = null;
  let totalApples = 0;
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      const ch = stageDef.grid[r][c];
      const t = parseCell(ch);
      row.push(t);
      if (ch === 'S') start = { r, c };
      if (ch === 'G') goal  = { r, c };
      if (t === T.APPLE) totalApples++;
    }
    cells.push(row);
  }
  return { rows, cols, cells, start, goal, name: stageDef.name, totalApples };
}

// ====== Game state ======
let stageIdx = 0;
let stage = null;
let pono = { r: 0, c: 0 };
let trail = [];
let moves = 0;
let applesCollected = 0;
let walkAnim = null;
let cleared = false;
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ov-title');
const ovMsg = document.getElementById('ov-msg');
const ovBtn = document.getElementById('ov-btn');
const hudStage = document.getElementById('hud-stage');
const hudMoves = document.getElementById('hud-moves');
const hudApples = document.getElementById('hud-apples');
const hint = document.getElementById('hint');
const voice = document.getElementById('voice');
const encounter = document.getElementById('encounter');
const arrowLayer = document.getElementById('arrowLayer');
const gameWrap = document.getElementById('gameWrap');

let cellSize = 48, gridOX = 0, gridOY = 0;

function resizeCanvas() {
  const w = gameWrap.clientWidth, h = gameWrap.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (stage) {
    computeLayout(w, h);
    if (!walkAnim && !cleared) showArrows();
  }
}

function computeLayout(w, h) {
  const padX = 24, padY = 24;
  const availW = w - padX * 2;
  const availH = h - padY * 2;
  cellSize = Math.floor(Math.min(availW / stage.cols, availH / stage.rows));
  const gridW = cellSize * stage.cols;
  const gridH = cellSize * stage.rows;
  gridOX = Math.floor((w - gridW) / 2);
  gridOY = Math.floor((h - gridH) / 2);
}

window.addEventListener('resize', resizeCanvas);

// ====== Walkable / direction helpers ======
function isWalkable(r, c) {
  if (r < 0 || r >= stage.rows || c < 0 || c >= stage.cols) return false;
  const t = stage.cells[r][c];
  return t === T.PATH || t === T.APPLE || t === T.GOAL;
}

function getOpenDirs(r, c, excludeBack) {
  const dirs = [];
  for (const d of [[-1,0],[1,0],[0,-1],[0,1]]) {
    if (excludeBack && d[0] === -excludeBack[0] && d[1] === -excludeBack[1]) continue;
    if (isWalkable(r+d[0], c+d[1])) dirs.push(d);
  }
  return dirs;
}

// Compute auto-walk path: walks STRAIGHT only.
// Stops at: obstacle, dead-end, L-bend (any turn), junction, or goal.
// Player must explicitly tap a direction at every corner.
function computeAutoWalk(startR, startC, dr, dc) {
  const path = [];
  let r = startR, c = startC;
  while (true) {
    const nr = r + dr, nc = c + dc;
    if (!isWalkable(nr, nc)) break;
    r = nr; c = nc;
    path.push({ r, c, dr, dc });
    if (stage.cells[r][c] === T.GOAL) break;
    // Continue only if straight ahead is still walkable
    if (!isWalkable(r + dr, c + dc)) break;
    // And no side-options (otherwise it's a junction → stop)
    const sides = [];
    if (dr === 0) {
      if (isWalkable(r - 1, c)) sides.push(1);
      if (isWalkable(r + 1, c)) sides.push(1);
    } else {
      if (isWalkable(r, c - 1)) sides.push(1);
      if (isWalkable(r, c + 1)) sides.push(1);
    }
    if (sides.length > 0) break; // junction, stop
  }
  return path;
}

// ====== Walk animation ======
function startWalk(path) {
  if (path.length === 0) return;
  hideArrows();
  walkAnim = {
    path: path,
    fromR: pono.r,
    fromC: pono.c,
    t0: performance.now(),
    perCell: 220,
  };
}

function finishWalk() {
  if (!walkAnim) return;
  const path = walkAnim.path;
  if (!path || path.length === 0) { walkAnim = null; return; }
  const last = path[path.length - 1];
  if (!last || !Number.isFinite(last.r) || !Number.isFinite(last.c)) {
    walkAnim = null;
    return;
  }
  // Collect apples & add trail
  for (const p of path) {
    if (stage.cells[p.r][p.c] === T.APPLE) {
      stage.cells[p.r][p.c] = T.PATH;
      applesCollected++;
      spawnPickup(p.r, p.c);
    }
    if (!trail.find(t => t.r === p.r && t.c === p.c)) {
      trail.push({ r: p.r, c: p.c });
    }
  }
  pono.r = last.r; pono.c = last.c;
  moves++;
  hudMoves.textContent = 'てかず: ' + moves;
  hudApples.textContent = '🍎 ' + applesCollected + '/' + stage.totalApples;
  walkAnim = null;
  if (stage.cells[last.r][last.c] === T.GOAL) {
    onClear();
  } else {
    showArrows();
  }
}

// ====== Arrow UI ======
function showArrows() {
  hideArrows();
  if (cleared || walkAnim) return;
  const dirs = getOpenDirs(pono.r, pono.c, null);
  if (dirs.length === 0) return;
  const fx = gridOX + pono.c * cellSize + cellSize / 2;
  const fy = gridOY + pono.r * cellSize + cellSize / 2;
  // Arrow offset: minimum 56px so arrows stay finger-friendly even on dense mazes.
  // Scales up with cellSize for big mazes (chevrons reach the next cell center).
  const offset = Math.max(56, cellSize * 0.95);
  for (const d of dirs) {
    const dr = d[0], dc = d[1];
    const btn = document.createElement('button');
    btn.className = 'maze-arrow';
    btn.textContent = dr === -1 ? '↑' : dr === 1 ? '↓' : dc === -1 ? '←' : '→';
    btn.style.left = (fx + dc * offset) + 'px';
    btn.style.top  = (fy + dr * offset) + 'px';
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (walkAnim || cleared) return;
      const path = computeAutoWalk(pono.r, pono.c, dr, dc);
      if (path.length === 0) return;
      startWalk(path);
    });
    arrowLayer.appendChild(btn);
  }
}

function hideArrows() {
  while (arrowLayer.firstChild) arrowLayer.removeChild(arrowLayer.firstChild);
}

// ====== Apple pickup popup ======
function spawnPickup(r, c) {
  const fx = gridOX + c * cellSize + cellSize / 2;
  const fy = gridOY + r * cellSize + cellSize / 2;
  const el = document.createElement('div');
  el.className = 'pickup';
  el.textContent = '+🍎';
  el.style.left = fx + 'px';
  el.style.top  = fy + 'px';
  gameWrap.appendChild(el);
  setTimeout(function() { el.remove(); }, 1000);
}

// ====== Hint ======
let hintTimer = null;
function showHint(msg, ms) {
  hint.textContent = msg;
  hint.style.opacity = '1';
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(function() { hint.style.opacity = '0.55'; }, ms || 2000);
}

// ====== Stage loading ======
function loadStage(idx) {
  stageIdx = idx;
  stage = buildStage(STAGES[idx]);
  pono = { r: stage.start.r, c: stage.start.c };
  trail = [{ r: pono.r, c: pono.c }];
  moves = 0;
  applesCollected = 0;
  cleared = false;
  walkAnim = null;
  hudStage.textContent = stage.name;
  hudMoves.textContent = 'てかず: 0';
  hudApples.textContent = '🍎 0/' + stage.totalApples;
  voice.style.display = '';
  encounter.classList.remove('show');
  resizeCanvas();
  showArrows();
  showHint('やじるしを タップしてね', 2500);
}

// ====== Clear ======
function onClear() {
  cleared = true;
  hideArrows();
  voice.style.display = 'none';
  if (window.incrementStat) window.incrementStat('maze_clears', 1);
  setTimeout(function() {
    encounter.classList.add('show');
    spawnConfetti();
  }, 200);
  setTimeout(function() {
    encounter.classList.remove('show');
    showStageClearOverlay();
  }, 2200);
}

function showStageClearOverlay() {
  const isLast = stageIdx >= STAGES.length - 1;
  if (isLast) {
    // 最終ステージ: 初回クリア報酬を試みる。宝箱が出たら、閉じた後に
    // 通常の「ぜんぶクリア」オーバーレイを表示する（onClose でチェーン）。
    if (window.triggerFirstClearReward) {
      window.triggerFirstClearReward('maze', {
        onClose: function() { _showMazeFinalOverlay(); }
      }).then(function(shown) {
        // 既に付与済み・定義なし等で宝箱が出なかった場合は即オーバーレイ
        if (!shown) _showMazeFinalOverlay();
      }).catch(function() { _showMazeFinalOverlay(); });
    } else {
      _showMazeFinalOverlay();
    }
  } else {
    ovTitle.textContent = 'ステージ クリア！';
    ovMsg.textContent = 'やったね！\nつぎの もりへ いこう！';
    ovBtn.textContent = 'つぎへ ▶';
    ovBtn.onclick = function() { hideOverlay(); loadStage(stageIdx + 1); };
    showOverlay();
  }
}

function _showMazeFinalOverlay() {
  ovTitle.textContent = 'ぜんぶ クリア！';
  ovMsg.textContent = 'ハリネズミくんを\nぜんぶ たすけたよ！\nすごいね ポノ！';
  ovBtn.textContent = 'もういちど あそぶ';
  ovBtn.onclick = function() { hideOverlay(); loadStage(0); };
  showOverlay();
}

function showOverlay() { overlay.classList.add('show'); }
function hideOverlay() { overlay.classList.remove('show'); }

// ====== Confetti ======
function spawnConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#F5A623','#6C8E3F','#F25C54','#4FC3F7','#FFCE5F'];
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = '-10px';
    piece.style.width = '8px'; piece.style.height = '12px';
    piece.style.background = colors[i % colors.length];
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    container.appendChild(piece);
    setTimeout(function() { piece.remove(); }, 3200);
  }
}

// ====== Drawing ======
function draw(now) {
  // CRITICAL: requestAnimationFrame must ALWAYS be called, even if drawing throws.
  // Otherwise the loop terminates and Pono "freezes/disappears".
  try {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (stage) {
      // Cells
      for (let r = 0; r < stage.rows; r++) {
        for (let c = 0; c < stage.cols; c++) {
          const x = gridOX + c * cellSize;
          const y = gridOY + r * cellSize;
          drawCell(x, y, stage.cells[r][c], r, c, now);
        }
      }
      // Trail
      for (const p of trail) {
        const x = gridOX + p.c * cellSize + cellSize / 2;
        const y = gridOY + p.r * cellSize + cellSize / 2;
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#6C8E3F';
        ctx.beginPath();
        ctx.arc(x - 4, y, 2.5, 0, Math.PI * 2);
        ctx.arc(x + 4, y, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      drawPono(now);
      // Safety net: if arrows missing while pono idle, reshow
      if (!walkAnim && !cleared && !overlay.classList.contains('show') && arrowLayer.children.length === 0) {
        showArrows();
      }
    }
  } catch (e) {
    console.error('[maze] draw error:', e);
  }
  requestAnimationFrame(draw);
}

function drawCell(x, y, tile, r, c, now) {
  if (tile === T.WALL) {
    ctx.fillStyle = '#3E5A24';
    ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
    ctx.font = Math.floor(cellSize * 0.7) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🌳', x + cellSize / 2, y + cellSize / 2);
    return;
  }

  // Walkable base
  ctx.fillStyle = (r + c) % 2 === 0 ? '#EFE7D2' : '#E8DFC4';
  ctx.fillRect(x, y, cellSize, cellSize);
  ctx.strokeStyle = 'rgba(108,142,63,0.18)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, cellSize - 1, cellSize - 1);

  if (tile === T.PATH) return;

  ctx.font = Math.floor(cellSize * 0.65) + 'px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (tile === T.GOAL) {
    if (imgHedgehog.complete && imgHedgehog.naturalWidth > 0) {
      const sz = Math.floor(cellSize * 0.85);
      const bob = Math.sin(now / 280) * 2;
      ctx.drawImage(imgHedgehog, x + (cellSize - sz) / 2, y + (cellSize - sz) / 2 + bob, sz, sz);
    } else {
      ctx.fillText('🦔', x + cellSize / 2, y + cellSize / 2);
    }
    return;
  }
  let emoji = '';
  if (tile === T.CAT)   emoji = '😺';
  if (tile === T.WATER) emoji = '💧';
  if (tile === T.APPLE) emoji = '🍎';
  if (tile === T.THORN) emoji = '🌵';
  if (tile === T.STONE) emoji = '🪨';
  if (emoji) {
    const bob = (tile === T.CAT) ? Math.sin(now / 600 + r + c) * 1.5 :
                (tile === T.APPLE) ? Math.sin(now / 400 + r + c) * 2 : 0;
    ctx.fillText(emoji, x + cellSize / 2, y + cellSize / 2 + bob);
  }
}

function drawPono(now) {
  // Defensive: never bail out — always draw something at pono's position.
  if (!pono) pono = { r: 0, c: 0 };
  if (!Number.isFinite(pono.r)) pono.r = 0;
  if (!Number.isFinite(pono.c)) pono.c = 0;

  let pr, pc, dr = 0, dc = 0;
  if (walkAnim && walkAnim.path && walkAnim.path.length > 0) {
    const totalElapsed = now - walkAnim.t0;
    const segIdx = Math.floor(totalElapsed / walkAnim.perCell);
    if (segIdx >= walkAnim.path.length) {
      finishWalk();
      pr = pono.r; pc = pono.c;
    } else {
      const t = (totalElapsed - segIdx * walkAnim.perCell) / walkAnim.perCell;
      const seg = walkAnim.path[segIdx];
      const fromR = segIdx === 0 ? walkAnim.fromR : walkAnim.path[segIdx - 1].r;
      const fromC = segIdx === 0 ? walkAnim.fromC : walkAnim.path[segIdx - 1].c;
      pr = fromR + (seg.r - fromR) * t;
      pc = fromC + (seg.c - fromC) * t;
      dr = seg.dr; dc = seg.dc;
    }
  } else {
    pr = pono.r; pc = pono.c;
  }

  // Safety: if interpolation produced NaN, fall back to static pono position
  if (!Number.isFinite(pr) || !Number.isFinite(pc)) {
    pr = pono.r; pc = pono.c;
    dr = 0; dc = 0;
  }

  const fx = gridOX + pc * cellSize + cellSize / 2;
  const fy = gridOY + pr * cellSize + cellSize / 2;
  const walkH = Math.floor(cellSize * 0.85);
  const baseSize = Math.floor(cellSize * 0.78);

  // Decide which sprite to draw. Walk sprite has priority during walking;
  // static face is the fallback (and the only thing drawn when idle).
  const isHorizontal = walkAnim ? Math.abs(dc) > Math.abs(dr) : false;
  const sideAvailable = imgWalkSideSheet.complete && imgWalkSideSheet.naturalWidth > 0;
  const frontAvailable = imgWalkSheet.complete && imgWalkSheet.naturalWidth > 0;
  const wantsWalkSide  = !!walkAnim && isHorizontal && sideAvailable;
  const wantsWalkFront = !!walkAnim && !wantsWalkSide && frontAvailable;
  const drawingWalkSprite = wantsWalkSide || wantsWalkFront;

  if (drawingWalkSprite) {
    const elapsed = now - walkAnim.t0;
    if (wantsWalkSide) {
      const sideH = Math.floor(walkH * SIDE_WALK_SCALE);
      const sideW = Math.floor(sideH * SIDE_WALK_FRAME_W / SIDE_WALK_FRAME_H);
      const frameIdx = Math.floor(elapsed / (1000 / WALK_FPS)) % SIDE_WALK_FRAMES;
      const sx = frameIdx * SIDE_WALK_FRAME_W;
      ctx.save();
      if (dc < 0) {
        ctx.translate(fx, fy); ctx.scale(-1, 1);
        ctx.drawImage(imgWalkSideSheet, sx, 0, SIDE_WALK_FRAME_W, SIDE_WALK_FRAME_H,
                      -sideW / 2, -sideH / 2, sideW, sideH);
      } else {
        ctx.drawImage(imgWalkSideSheet, sx, 0, SIDE_WALK_FRAME_W, SIDE_WALK_FRAME_H,
                      fx - sideW / 2, fy - sideH / 2, sideW, sideH);
      }
      ctx.restore();
    } else {
      const walkW = Math.floor(walkH * WALK_FRAME_W / WALK_FRAME_H);
      const frameIdx = Math.floor(elapsed / (1000 / WALK_FPS)) % WALK_FRAMES;
      const sx = frameIdx * WALK_FRAME_W;
      ctx.drawImage(imgWalkSheet, sx, 0, WALK_FRAME_W, WALK_FRAME_H,
                    fx - walkW / 2, fy - walkH / 2, walkW, walkH);
    }
  } else if (imgPono.complete && imgPono.naturalWidth > 0) {
    // Idle (or walk sprite missing): draw static face
    ctx.drawImage(imgPono, fx - baseSize / 2, fy - baseSize / 2, baseSize, baseSize);
  } else {
    // Last-resort fallback
    ctx.font = Math.floor(cellSize * 0.6) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🐻', fx, fy);
  }
}

// ====== Keyboard input (also supported) ======
window.addEventListener('keydown', function(e) {
  if (overlay.classList.contains('show')) return;
  if (cleared || walkAnim) return;
  let dr = 0, dc = 0;
  if (e.key === 'ArrowUp')    dr = -1;
  else if (e.key === 'ArrowDown')  dr = 1;
  else if (e.key === 'ArrowLeft')  dc = -1;
  else if (e.key === 'ArrowRight') dc = 1;
  else return;
  e.preventDefault();
  if (!isWalkable(pono.r + dr, pono.c + dc)) return;
  const path = computeAutoWalk(pono.r, pono.c, dr, dc);
  if (path.length > 0) startWalk(path);
});

// ====== Start ======
ovBtn.onclick = function() {
  hideOverlay();
  loadStage(0);
};

if (window.initMenu) {
  window.initMenu({
    bgmToggle: function() {
      bgmEnabled = !bgmEnabled;
      localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
    },
    tutorial: function() {
      ovTitle.textContent = 'あそびかた';
      ovMsg.textContent = 'やじるしを タップすると\nつぎの わかれみちまで\nじどうで すすむよ！\n\n🍎りんごは あつめると\nボーナスだよ！\n\n😺ねこ・💧みず・🌵トゲは\nとおれないよ。';
      ovBtn.textContent = 'わかった ▶';
      ovBtn.onclick = function() { hideOverlay(); };
      showOverlay();
    }
  });
}

showOverlay();
loadStage(0);
requestAnimationFrame(draw);
</script>
