// ====== Walkable / direction helpers ======
function isWalkable(r, c) {
  if (r < 0 || r >= stage.rows || c < 0 || c >= stage.cols) return false;
  const t = stage.cells[r][c];
  return t === T.PATH || t === T.APPLE || t === T.GOAL;
}

function getOpenDirs(r, c, excludeBack) {
  const dirs = [];
  for (const d of [[-1,0],[1,0],[0,-1],[0,1]]) {
    if (excludeBack && d[0] === -excludeBack[0] && d[1] === -excludeBack[1]) continue;
    if (isWalkable(r+d[0], c+d[1])) dirs.push(d);
  }
  return dirs;
}

// Compute auto-walk path: walks STRAIGHT only.
// Stops at: obstacle, dead-end, L-bend (any turn), junction, or goal.
// Player must explicitly tap a direction at every corner.
function computeAutoWalk(startR, startC, dr, dc) {
  const path = [];
  let r = startR, c = startC;
  while (true) {
    const nr = r + dr, nc = c + dc;
    if (!isWalkable(nr, nc)) break;
    r = nr; c = nc;
    path.push({ r, c, dr, dc });
    if (stage.cells[r][c] === T.GOAL) break;
    // Continue only if straight ahead is still walkable
    if (!isWalkable(r + dr, c + dc)) break;
    // And no side-options (otherwise it's a junction → stop)
    const sides = [];
    if (dr === 0) {
      if (isWalkable(r - 1, c)) sides.push(1);
      if (isWalkable(r + 1, c)) sides.push(1);
    } else {
      if (isWalkable(r, c - 1)) sides.push(1);
      if (isWalkable(r, c + 1)) sides.push(1);
    }
    if (sides.length > 0) break; // junction, stop
  }
  return path;
}

// ====== Walk animation ======
function startWalk(path) {
  if (path.length === 0) return;
  hideArrows();
  walkAnim = {
    path: path,
    fromR: pono.r,
    fromC: pono.c,
    t0: performance.now(),
    perCell: 220,
  };
}

function finishWalk() {
  if (!walkAnim) return;
  const path = walkAnim.path;
  if (!path || path.length === 0) { walkAnim = null; return; }
  const last = path[path.length - 1];
  if (!last || !Number.isFinite(last.r) || !Number.isFinite(last.c)) {
    walkAnim = null;
    return;
  }
  // Collect apples & add trail
  for (const p of path) {
    if (stage.cells[p.r][p.c] === T.APPLE) {
      stage.cells[p.r][p.c] = T.PATH;
      applesCollected++;
      playApple();
      // Persist & check for newly-unlocked charms
      const beforeCharms = getCharms();
      totalApples++;
      localStorage.setItem('pono_maze_total_apples', String(totalApples));
      const afterCharms = getCharms();
      spawnPickup(p.r, p.c);
      if (afterCharms.hint > beforeCharms.hint) {
        spawnCharmPopup('🧚 ようせいの ヒント ゲット！');
        queueCharmTutorial('hint');
      }
      if (afterCharms.breeze > beforeCharms.breeze) {
        spawnCharmPopup('🍃 そよかぜパス ゲット！');
        queueCharmTutorial('breeze');
      }
      if (afterCharms.warp > beforeCharms.warp) {
        spawnCharmPopup('🌟 ほしの ワープ ゲット！');
        queueCharmTutorial('warp');
      }
    }
    if (!trail.find(t => t.r === p.r && t.c === p.c)) {
      trail.push({ r: p.r, c: p.c });
    }
  }
  pono.r = last.r; pono.c = last.c;
  moves++;
  hudMoves.textContent = 'てかず: ' + moves;
  hudApples.textContent = '🍎 ' + applesCollected + '/' + stage.totalApples;
  walkAnim = null;
  updateCharmsUI();
  if (stage.cells[last.r][last.c] === T.GOAL) {
    onClear();
  } else {
    showArrows();
  }
}

// ====== Arrow UI ======
function isObstacleCell(r, c) {
  if (r < 0 || r >= stage.rows || c < 0 || c >= stage.cols) return false;
  const t = stage.cells[r][c];
  return t === T.CAT || t === T.WATER || t === T.THORN || t === T.STONE;
}

function showArrows() {
  if (stage && stage.type === 'image') { imgShowArrows(); return; }
  hideArrows();
  if (cleared || walkAnim) return;
  const fx = gridOX + pono.c * cellSize + cellSize / 2;
  const fy = gridOY + pono.r * cellSize + cellSize / 2;
  const offset = Math.max(64, cellSize * 1.02);

  // Collect direction set:
  //  - normal walkable neighbors
  //  - if breezeActive: also include adjacent obstacle directions
  const allDirs = [[-1,0],[1,0],[0,-1],[0,1]];
  const validDirs = [];
  for (const d of allDirs) {
    const nr = pono.r + d[0], nc = pono.c + d[1];
    if (isWalkable(nr, nc)) {
      validDirs.push({ d, breeze: false });
    } else if (breezeActive && isObstacleCell(nr, nc)) {
      validDirs.push({ d, breeze: true });
    }
  }
  if (validDirs.length === 0) return;

  for (const v of validDirs) {
    const dr = v.d[0], dc = v.d[1];
    const btn = document.createElement('button');
    btn.className = 'maze-arrow' + (v.breeze ? ' maze-arrow-breeze' : '');
    btn.textContent = dr === -1 ? '↑' : dr === 1 ? '↓' : dc === -1 ? '←' : '→';
    btn.style.left = (fx + dc * offset) + 'px';
    btn.style.top  = (fy + dr * offset) + 'px';
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (walkAnim || cleared || charmTutShowing) return;
      playTap();
      if (v.breeze) {
        // そよかぜパス: 隣接障害物を消費して通過
        const obsR = pono.r + dr, obsC = pono.c + dc;
        if (isObstacleCell(obsR, obsC)) {
          stage.cells[obsR][obsC] = T.PATH;
        }
        breezeActive = false;
        const path = computeAutoWalk(pono.r, pono.c, dr, dc);
        if (path.length > 0) startWalk(path);
        else { showArrows(); updateCharmsUI(); }
      } else {
        const path = computeAutoWalk(pono.r, pono.c, dr, dc);
        if (path.length === 0) return;
        startWalk(path);
      }
    });
    arrowLayer.appendChild(btn);
  }
}

function hideArrows() {
  while (arrowLayer.firstChild) arrowLayer.removeChild(arrowLayer.firstChild);
}

// ════════════════════════════════════════════════════════════
// ====== Image stage helpers (Phase 1) ========================
// Polyline-based walking + camera follow. Activated only when
// stage.type === 'image' (loaded via ?image=<name>).
// All grid-mode code paths skip when stage is image type.
// ════════════════════════════════════════════════════════════
let _imgLastFrameTs = 0;
const landscapeReqEl = document.getElementById('landscapeReq');

function imgLoadStage(def) {
  if (!window.MazeImage) {
    console.error('[maze] MazeImage runtime not loaded');
    return;
  }
  // ステージリロード時、前回ステージの defeat-dialog timer が残っていたらキャンセル
  // (timer 内の if (_encounterActive) ガードはあるが、念のため確実に殺しておく)
  if (_creatureDefeatTimer) {
    clearTimeout(_creatureDefeatTimer);
    _creatureDefeatTimer = null;
  }
  // Switch body to image-stage layout (full viewport landscape, hide grid UI)
  document.body.classList.add('image-stage-mode');
  stage = window.MazeImage.buildStage(def);
  if (!stage.camera) stage.camera = {};
  if (!Number.isFinite(stage.camera.x)) stage.camera.x = stage.start.x;
  if (!Number.isFinite(stage.camera.y)) stage.camera.y = stage.start.y;
  _initFlagTunnelForStage(stage);
  _initWaterGimmickForStage(stage);
  _initStrengthGimmickForStage(stage);
  _initWebGimmickForStage(stage);
  pono = {
    type: 'image',
    x: stage.start.x, y: stage.start.y,
    nodeId: stage.start.id,
    faceTx: 1, faceTy: 0,
    r: 0, c: 0, // grid-compat fillers
  };
  trail = [];
  moves = 0;
  applesCollected = 0;
  cleared = false;
  walkAnim = null;
  _imgBubble = null;
  _imgPauseUntil = 0;
  breezeActive = false;
  hintActiveUntil = 0;
  hintCells.clear();
  _imgLastFrameTs = 0;
  _jankenGuaranteedWinKeys = Object.create(null);
  hudStage.textContent = stage.name;
  hudMoves.textContent = 'てかず: 0';
  hudApples.textContent = ''; // PoC: no apples yet
  // image-stage-mode 用の上部ラベル: 「ステージ N」のみ表示
  const labelEl = document.getElementById('imgStageLabel');
  if (labelEl) {
    labelEl.textContent = 'ステージ ' + stageIdx;
  }
  voice.style.display = '';
  encounter.classList.remove('show');
  // Hide charm bar in image mode (Phase 1: charms not supported)
  const charmsEl = document.getElementById('charms');
  if (charmsEl) charmsEl.style.display = 'none';
  // 動物アイコン (泣き顔・笑顔) を preload して stage に保持
  imgPreloadStoryAssets(stage);
  resizeCanvas();
  imgShowArrows();
  imgUpdateLandscapeOverlay();
  showHint('やじるしを タップしてね', 2500);
  // ストーリー紹介モーダル (animal が定義されてる + 初回のみ)
  imgMaybeShowStoryIntro(stage, stageIdx);
}

// 動物の泣き顔/救出後の絵を Image オブジェクトとしてプリロード
function imgPreloadStoryAssets(stage) {
  if (!stage || !stage.story) return;
  if (stage.story.cryingIconUrl) {
    const img = new Image();
    img.src = stage.story.cryingIconUrl;
    stage._cryingImg = img;
  }
  if (stage.story.reliefIconUrl) {
    const img = new Image();
    img.src = stage.story.reliefIconUrl;
    stage._reliefImg = img;
  }
}

// 各ステージ開始時に必ず表示する。 子ども向けに「誰を助けに行くのか」 を
// 毎回はっきりさせるため、 旧来の「初回のみ (localStorage seen)」 抑制は撤廃。
// (旧キー pono_maze_story_seen_* は無害な残骸として localStorage に残る場合があるが
// もう参照しないので削除してもしなくても挙動は同じ)。
function imgMaybeShowStoryIntro(stage, idx) {
  if (!stage || !stage.story || !stage.story.intro) return;
  const modalEl = document.getElementById('storyIntro');
  const imgEl = document.getElementById('storyAnimalImg');
  const txtEl = document.getElementById('storyText');
  const btnEl = document.getElementById('storyBtn');
  if (!modalEl || !imgEl || !txtEl || !btnEl) return;
  // 画像は crying 優先、無ければ relief
  imgEl.src = stage.story.cryingIconUrl || stage.story.reliefIconUrl || '';
  txtEl.textContent = stage.story.intro;
  hideArrows(); // モーダル表示中は矢印を出さない
  modalEl.classList.add('show');
  modalEl.setAttribute('aria-hidden', 'false');
  // ボタンを 1 回限りで再バインド (リスナーが重なるのを防ぐ)
  const newBtn = btnEl.cloneNode(true);
  btnEl.parentNode.replaceChild(newBtn, btnEl);
  newBtn.addEventListener('click', function() {
    modalEl.classList.remove('show');
    modalEl.setAttribute('aria-hidden', 'true');
    imgShowArrows();
  });
}

// ステージクリア時のモーダル: 救出シーン + クリア表示 + 「つぎへ▶」ボタンを 1 画面に統合。
// セリフは即時表示。ユーザーがボタンを押すまで開いたまま。
function imgShowRescueScene(stage, onDone) {
  if (!stage || !stage.story) { if (onDone) onDone(); return; }
  const sceneEl = document.getElementById('rescueScene');
  const imgEl = document.getElementById('rescueImg');
  const txtEl = document.getElementById('rescueText');
  const titleEl = document.getElementById('rescueTitle');
  const animalSpeechEl = document.getElementById('rescueAnimalSpeech');
  const ponoSpeechEl   = document.getElementById('rescuePonoSpeech');
  const acornEl = document.getElementById('rescueAcornText');
  const btnEl = document.getElementById('rescueBtn');
  if (!sceneEl || !imgEl || !txtEl || !btnEl) { if (onDone) onDone(); return; }

  imgEl.src = stage.story.reliefIconUrl || stage.story.cryingIconUrl || '';
  const label = stage.story.animalLabel || '';
  txtEl.textContent = label ? (label + 'を たすけたよ！') : 'たすけたよ！';
  if (titleEl) titleEl.textContent = 'ステージ クリア！';
  // セリフは最初から張り付き表示 (delay なし)
  if (animalSpeechEl) animalSpeechEl.textContent = stage.story.rescueStory || '';
  if (ponoSpeechEl) {
    const pc = stage.story.ponoComment;
    ponoSpeechEl.textContent = pc ? ('ポノ:「' + pc + '」') : '';
  }
  // 最終ステージ判定 + どんぐり / ボタン文言を切替
  const isLast = stageIdx >= STAGES.length - 1;
  if (acornEl) {
    acornEl.textContent = isLast
      ? ('やったね！\nまいごの どうぶつたちを ぜんぶ たすけたよ！' + _dailyAcornTail('maze'))
      : ('やったね！つぎの もりへ いこう！' + _dailyAcornTail('maze'));
  }
  btnEl.textContent = isLast ? 'もういちど あそぶ' : 'つぎへ ▶';
  btnEl.onclick = function() {
    sceneEl.classList.remove('show');
    sceneEl.setAttribute('aria-hidden', 'true');
    if (onDone) onDone();
  };
  sceneEl.classList.add('show');
  sceneEl.setAttribute('aria-hidden', 'false');
}

function imgComputeLayout(w, h) {
  if (!stage || stage.type !== 'image') return;
  stage._scale = window.MazeImage.computeScale(stage, w, h);
  stage._viewW = w;
  stage._viewH = h;
}

function _isFlagTunnelTravelling() {
  return !!(_flagTunnelState && _flagTunnelState.travelling);
}

function imgCameraZoom() {
  return stage && stage._flagZoom ? stage._flagZoom : 1;
}

function imgEffectiveScale() {
  return (stage && stage._scale ? stage._scale : 1) * imgCameraZoom();
}

function imgShowArrows() {
  hideArrows();
  if (!stage || stage.type !== 'image') return;
  if (cleared || walkAnim || _isFlagTunnelTravelling()) return;
  const dirs = [
    { dx: 0,  dy: -1, char: '↑' },
    { dx: 0,  dy: 1,  char: '↓' },
    { dx: -1, dy: 0,  char: '←' },
    { dx: 1,  dy: 0,  char: '→' },
  ];
  for (let i = 0; i < dirs.length; i++) {
    const d = dirs[i];
    const plan = window.MazeImage.computeAutoWalk(stage, pono.nodeId, d);
    if (!plan) continue;
    const btn = document.createElement('button');
    btn.className = 'maze-arrow';
    btn.textContent = d.char;
    btn.dataset.dx = String(d.dx);
    btn.dataset.dy = String(d.dy);
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (walkAnim || cleared || charmTutShowing) return;
      playTap();
      imgStartWalk(plan);
    });
    arrowLayer.appendChild(btn);
  }
  imgRepositionArrows();
}

function imgRepositionArrows() {
  if (!stage || stage.type !== 'image' || !stage._scale) return;
  const w = stage._viewW, h = stage._viewH;
  const sp = window.MazeImage.worldToScreen(stage, pono.x, pono.y, w, h, imgEffectiveScale());
  const offset = 64;
  const kids = arrowLayer.children;
  for (let i = 0; i < kids.length; i++) {
    const btn = kids[i];
    const dx = parseFloat(btn.dataset.dx || '0');
    const dy = parseFloat(btn.dataset.dy || '0');
    btn.style.left = (sp.x + dx * offset) + 'px';
    btn.style.top  = (sp.y + dy * offset) + 'px';
  }
}

function imgStartWalk(plan) {
  hideArrows();
  if (stage) stage._manualCam = false; // resume auto-follow on walk start
  // Speed: ~600 world-px per second. Min 800ms so even short edges feel deliberate.
  const duration = Math.max(800, plan.length * 1000 / 600);
  walkAnim = {
    type: 'image',
    plan: plan,
    fromX: pono.x, fromY: pono.y,
    startNodeId: pono.nodeId,    // remembered so we can bounce back on encounter loss / obstacle hit
    t0: performance.now(),
    duration: duration,
  };
}

// Manual camera pan (drag / wheel). Image stages only.
let _imgPanState = null;
canvas.addEventListener('pointerdown', function(e) {
  if (!stage || stage.type !== 'image') return;
  if (_encounterActive || cleared || _isFlagTunnelTravelling()) return;
  if (e.target !== canvas) return;
  // Hit-test the off-screen goal indicator: tap to auto-scroll to goal.
  if (stage._goalIndicator && stage.goal) {
    const rect = canvas.getBoundingClientRect();
    const lx = e.clientX - rect.left;
    const ly = e.clientY - rect.top;
    const dx = lx - stage._goalIndicator.x;
    const dy = ly - stage._goalIndicator.y;
    if (dx * dx + dy * dy < 40 * 40) {
      stage._camAnim = {
        fromX: stage.camera.x, fromY: stage.camera.y,
        toX: stage.goal.x, toY: stage.goal.y,
        t0: performance.now(),
        panDur: 700,
        holdDur: 1800,
      };
      stage._manualCam = false;
      _imgPanState = null;
      e.stopPropagation();
      return;
    }
  }
  _imgPanState = {
    startX: e.clientX, startY: e.clientY,
    camStartX: stage.camera.x, camStartY: stage.camera.y,
    pointerId: e.pointerId,
    moved: false,
  };
});
canvas.addEventListener('pointermove', function(e) {
  if (!_imgPanState || e.pointerId !== _imgPanState.pointerId) return;
  if (!stage || stage.type !== 'image') return;
  const dx = e.clientX - _imgPanState.startX;
  const dy = e.clientY - _imgPanState.startY;
  if (!_imgPanState.moved && Math.hypot(dx, dy) < 6) return;
  _imgPanState.moved = true;
  stage._camAnim = null; // user took over → cancel auto-scroll
  stage._manualCam = true;
  stage._manualSince = performance.now();
  const scale = stage._scale || 1;
  stage.camera.x = _imgPanState.camStartX - dx / scale;
  stage.camera.y = _imgPanState.camStartY - dy / scale;
});
function _imgEndPan(e) {
  if (!_imgPanState) return;
  if (!_imgPanState.moved && stage && stage.type === 'image') {
    // Plain tap → exit manual mode (auto-follow resumes)
    stage._manualCam = false;
  }
  _imgPanState = null;
}
canvas.addEventListener('pointerup', _imgEndPan);
canvas.addEventListener('pointercancel', _imgEndPan);
canvas.addEventListener('wheel', function(e) {
  if (!stage || stage.type !== 'image') return;
  if (_encounterActive || cleared || _isFlagTunnelTravelling()) return;
  e.preventDefault();
  stage._camAnim = null; // wheel-scroll overrides auto-scroll
  stage._manualCam = true;
  stage._manualSince = performance.now();
  const scale = stage._scale || 1;
  if (e.shiftKey) stage.camera.y += e.deltaY / scale;
  else            stage.camera.x += (e.deltaX || e.deltaY) / scale;
}, { passive: false });

function imgFinishWalk() {
  if (!walkAnim || walkAnim.type !== 'image') return;
  const fromNodeId = walkAnim.startNodeId;
  const poly = walkAnim.plan.polyline;
  const last = poly[poly.length - 1];
  pono.x = last.x; pono.y = last.y;
  pono.nodeId = walkAnim.plan.otherId;
  if (poly.length >= 2) {
    const a = poly[poly.length - 2], b = poly[poly.length - 1];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    pono.faceTx = dx / len; pono.faceTy = dy / len;
  }
  moves++;
  hudMoves.textContent = 'てかず: ' + moves;
  walkAnim = null;
  const pickedUpItem =
    _checkFlagLadderPickup(pono.x, pono.y) ||
    _checkWaterPlankPickup(pono.x, pono.y) ||
    _checkStrengthGlovePickup(pono.x, pono.y) ||
    _checkWebBroomPickup(pono.x, pono.y);
  if (pono.nodeId === stage.goal.id) {
    onClear();
  } else {
    if (!overlay.classList.contains('show')) imgShowArrows();
    // Dead-end: only one edge from this node and it leads back where we came from
    if (!pickedUpItem && performance.now() >= _suppressDeadEndBubbleUntil && pono.nodeId !== stage.start.id) {
      const adj = stage.adjacency[pono.nodeId] || [];
      if (adj.length === 1 && adj[0].otherId === fromNodeId) {
        imgShowBubble('あれ？ いきどまり…', 'pono', 1800);
      }
    }
  }
}

function imgDraw(now) {
  if (!stage || stage.type !== 'image') return;
  if (!_imgLastFrameTs) _imgLastFrameTs = now;
  const dt = Math.min(0.1, (now - _imgLastFrameTs) / 1000);
  _imgLastFrameTs = now;

  // Determine current pono position (animated or static)
  let px = pono.x, py = pono.y, ftx = pono.faceTx, fty = pono.faceTy;
  let isWalking = false;
  if (walkAnim && walkAnim.type === 'image' && !_encounterActive) {
    const elapsed = now - walkAnim.t0;
    const t = elapsed / walkAnim.duration;
    if (t >= 1) {
      const last = walkAnim.plan.polyline[walkAnim.plan.polyline.length - 1];
      px = last.x; py = last.y;
      imgFinishWalk();
    } else {
      const r = window.MazeImage.interpolate(walkAnim.plan.polyline, walkAnim.plan.cumLengths, t);
      px = r.x; py = r.y; ftx = r.tx; fty = r.ty;
      isWalking = true;
      _checkFlagLadderPickup(px, py);
      _checkWaterPlankPickup(px, py);
      _checkStrengthGlovePickup(px, py);
      _checkWebBroomPickup(px, py);
      // Obstacle hit → bounce back (no minigame). Creatures take priority via encounter.
      if (!_checkObstacleCollision(px, py)) {
        _checkCreatureCollision(px, py);
      }
    }
  }

  // Update camera
  const w = stage._viewW || canvas.clientWidth;
  const h = stage._viewH || canvas.clientHeight;
  if (!stage._scale) imgComputeLayout(w, h);
  // Flag tunnel camera takes priority, then generic camera animation
  // (e.g. "scroll to goal" on indicator tap), then manual / auto-follow.
  const _nowMs = now;
  if (_applyFlagTunnelCamera(now, w, h)) {
    // handled by the tunnel sequence
  } else if (stage._camAnim) {
    stage._flagZoom = 1;
    const a = stage._camAnim;
    const elapsed = _nowMs - a.t0;
    if (elapsed < a.panDur) {
      const tt = elapsed / a.panDur;
      const eased = 1 - Math.pow(1 - tt, 3);
      stage.camera.x = a.fromX + (a.toX - a.fromX) * eased;
      stage.camera.y = a.fromY + (a.toY - a.fromY) * eased;
    } else if (elapsed < a.panDur + a.holdDur) {
      stage.camera.x = a.toX;
      stage.camera.y = a.toY;
    } else {
      stage._camAnim = null;
      stage._manualCam = false; // resume auto-follow after animation
    }
    imgClampCameraToBounds(stage, w, h);
  } else {
    stage._flagZoom = 1;
    // Manual pan mode: skip lerp, just clamp. Auto-revert after timeout.
    if (stage._manualCam && _nowMs - (stage._manualSince || 0) > 4000) {
      stage._manualCam = false;
    }
    if (!stage._manualCam) {
      window.MazeImage.updateCamera(stage, px, py, w, h, dt, stage._scale);
    } else {
      imgClampCameraToBounds(stage, w, h);
    }
  }
  const drawScale = imgEffectiveScale();
  const hidePonoForTunnel = _shouldHideFlagTunnelPono(now);

  // Background fill (in case image hasn't loaded or letterbox visible)
  ctx.fillStyle = '#A4C76D';
  ctx.fillRect(0, 0, w, h);

  // Draw with camera transform
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.scale(drawScale, drawScale);
  ctx.translate(-stage.camera.x, -stage.camera.y);
  if (stage.images && stage.images.length) {
    // Multi-image stage (imageUrls): each image is viewBox.w/N wide, laid out left to right.
    const segW = stage.viewBox.w / stage.images.length;
    for (let si = 0; si < stage.images.length; si++) {
      const seg = stage.images[si];
      if (seg && seg.complete && seg.naturalWidth > 0) {
        ctx.drawImage(seg, si * segW, 0, segW, stage.viewBox.h);
      }
    }
  } else if (stage.image && stage.image.complete && stage.image.naturalWidth > 0) {
    ctx.drawImage(stage.image, 0, 0, stage.viewBox.w, stage.viewBox.h);
  }
  // Start / Goal markers (decorative, drawn under obstacles & creatures)
  imgDrawMarkers(stage);
  // Obstacles (decoration only — placed by editor on top of the maze image)
  if (stage.obstacles && stage.obstacles.length) imgDrawObstacles(stage);
  imgDrawWaterGimmick(stage, now);
  imgDrawStrengthGimmick(stage, now);
  imgDrawWebGimmick(stage, now);
  imgDrawFlagTunnelGimmick(stage, now);
  // Creatures (お邪魔虫 — block path until defeated via mini-game)
  if (stage.creatures && stage.creatures.length) imgDrawCreatures(stage, now);
  // Boss-teaser silhouette (stage6 only — guarded by presence of stage.teaser)
  if (stage.teaser) imgDrawBossTeaser(stage, now, px, py);
  ctx.restore();

  // Lantern overlay (in screen space — applied AFTER image, BEFORE pono so
  // pono is fully bright in the lantern's center)
  if (stage.lantern) {
    const ponoScreenX = hidePonoForTunnel ? w / 2 : w / 2 + (px - stage.camera.x) * drawScale;
    const ponoScreenY = hidePonoForTunnel ? h / 2 : h / 2 + (py - stage.camera.y) * drawScale;
    imgDrawLantern(now, ponoScreenX, ponoScreenY, w, h, stage.lantern);
  }
  imgDrawFlagTunnelScreenGlow(stage, now, w, h, drawScale);

  // Pono on top of the lantern overlay
  if (!hidePonoForTunnel) {
    ctx.save();
    ctx.translate(w / 2, h / 2);
    ctx.scale(drawScale, drawScale);
    ctx.translate(-stage.camera.x, -stage.camera.y);
    imgDrawPono(now, px, py, ftx, fty, isWalking);
    ctx.restore();
  }

  // Off-screen goal direction indicator (HUD, screen-space)
  if (stage.goal && !cleared && !_isFlagTunnelTravelling()) {
    imgDrawGoalIndicator(stage.goal, w, h, stage.camera, drawScale);
  } else {
    stage._goalIndicator = null;
  }

  // Speech bubble (one-liner) anchored to pono or a world point
  if (_imgBubble) {
    const _ponoSx = w / 2 + (px - stage.camera.x) * drawScale;
    const _ponoSy = h / 2 + (py - stage.camera.y) * drawScale;
    imgDrawBubble(now, _ponoSx, _ponoSy, w, h);
  }

  // Reposition arrows so they follow pono's screen position (camera lerp)
  if (arrowLayer.children.length > 0) imgRepositionArrows();

  // Safety: re-show arrows if missing while idle (suppress during bounce-back pause)
  if (!walkAnim && !cleared && !overlay.classList.contains('show')
      && arrowLayer.children.length === 0
      && performance.now() >= _imgPauseUntil) {
    imgShowArrows();
  }
}

function imgDrawGoalIndicator(goal, w, h, cam, scale) {
  const sx = w / 2 + (goal.x - cam.x) * scale;
  const sy = h / 2 + (goal.y - cam.y) * scale;
  // ゴールが viewport 内にあれば indicator は出さない (ユーザー要望: 見えてるのに出るのは混乱)
  if (sx >= 0 && sx <= w && sy >= 0 && sy <= h) {
    stage._goalIndicator = null;
    return;
  }
  // 画面端から margin だけ内側に置いて見切れないようにする (= clamp 用、判定とは別)
  const margin = 60;
  const cx = w / 2, cy = h / 2;
  const dx = sx - cx, dy = sy - cy;
  const ratio = Math.max(
    Math.abs(dx) / Math.max(1, w / 2 - margin),
    Math.abs(dy) / Math.max(1, h / 2 - margin),
    0.0001
  );
  const ix = cx + dx / ratio;
  const iy = cy + dy / ratio;
  const angle = Math.atan2(dy, dx);
  const cryImg = stage._cryingImg;
  const useCry = cryImg && cryImg.complete && cryImg.naturalWidth > 0;
  ctx.save();
  ctx.translate(ix, iy);
  // 赤い丸 (背景 + タップ判定の視認性) — サイズアップ
  ctx.fillStyle = 'rgba(220, 60, 60, 0.85)';
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(0, 0, 44, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // 動物の泣き顔があれば赤丸内に clip して描画
  if (useCry) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, 40, 0, Math.PI * 2);
    ctx.clip();
    const r2 = cryImg.naturalWidth / cryImg.naturalHeight;
    let dw, dh;
    if (r2 > 1) { dw = 80; dh = 80 / r2; }
    else        { dh = 80; dw = 80 * r2; }
    ctx.drawImage(cryImg, -dw/2, -dh/2, dw, dh);
    ctx.restore();
  }
  ctx.restore();
  // 方向を示す白い三角矢印 (赤丸の少し外側)
  ctx.save();
  ctx.translate(ix, iy);
  ctx.rotate(angle);
  ctx.fillStyle = '#FFFFFF';
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(58, 0);
  ctx.lineTo(34, -15);
  ctx.lineTo(34, 15);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
  // GOAL ラベル
  ctx.save();
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 3.5;
  ctx.strokeStyle = '#000000';
  ctx.fillStyle = '#FFFFFF';
  ctx.strokeText('GOAL', ix, iy + 72);
  ctx.fillText('GOAL', ix, iy + 72);
  ctx.restore();
  stage._goalIndicator = { x: ix, y: iy };
}

// One-liner speech bubble anchored to pono or a world coord. Auto-fades.
let _imgBubble = null;
function imgShowBubble(text, anchor, ms) {
  const dur = ms || 1500;
  if (anchor === 'pono' || !anchor) {
    _imgBubble = { text: text, until: performance.now() + dur, anchorKind: 'pono' };
  } else {
    _imgBubble = { text: text, until: performance.now() + dur,
                   anchorKind: 'world', anchorX: anchor.x, anchorY: anchor.y };
  }
}
function imgDrawBubble(now, ponoSx, ponoSy, w, h) {
  if (!_imgBubble) return;
  if (now > _imgBubble.until) { _imgBubble = null; return; }
  let sx, sy;
  if (_imgBubble.anchorKind === 'pono') {
    sx = ponoSx; sy = ponoSy;
  } else {
    const scale = imgEffectiveScale();
    sx = w / 2 + (_imgBubble.anchorX - stage.camera.x) * scale;
    sy = h / 2 + (_imgBubble.anchorY - stage.camera.y) * scale;
  }
  ctx.save();
  ctx.font = 'bold 22px sans-serif';
  const padX = 18, height = 40, radius = 14, tail = 12;
  const tw = ctx.measureText(_imgBubble.text).width;
  const bw = tw + padX * 2;
  // Above pono by ~80px; clamp to viewport
  let by = sy - 90 - height / 2;
  if (by < 8) by = 8;
  let bx = sx - bw / 2;
  if (bx < 8) bx = 8;
  if (bx + bw > w - 8) bx = w - 8 - bw;
  // Fade in/out (last 200ms)
  const remaining = _imgBubble.until - now;
  const alpha = remaining < 200 ? Math.max(0, remaining / 200) : 1;
  ctx.globalAlpha = alpha;
  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 2;
  // Rounded rect body
  ctx.fillStyle = '#FFFFFF';
  ctx.strokeStyle = '#333333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bx + radius, by);
  ctx.lineTo(bx + bw - radius, by);
  ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + radius);
  ctx.lineTo(bx + bw, by + height - radius);
  ctx.quadraticCurveTo(bx + bw, by + height, bx + bw - radius, by + height);
  ctx.lineTo(bx + radius, by + height);
  ctx.quadraticCurveTo(bx, by + height, bx, by + height - radius);
  ctx.lineTo(bx, by + radius);
  ctx.quadraticCurveTo(bx, by, bx + radius, by);
  ctx.closePath();
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.stroke();
  // Tail (triangle from bubble bottom toward anchor)
  const tailX = Math.max(bx + radius + 4, Math.min(bx + bw - radius - 4, sx));
  ctx.beginPath();
  ctx.moveTo(tailX - 8, by + height);
  ctx.lineTo(tailX + 8, by + height);
  ctx.lineTo(tailX, by + height + tail);
  ctx.closePath();
  ctx.fillStyle = '#FFFFFF';
  ctx.fill();
  ctx.stroke();
  // Text
  ctx.fillStyle = '#222';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(_imgBubble.text, bx + bw / 2, by + height / 2);
  ctx.restore();
}

function imgClampCameraToBounds(stage, viewportW, viewportH, scaleOverride) {
  const scale = scaleOverride || imgEffectiveScale();
  const halfW = (viewportW / scale) / 2;
  const halfH = (viewportH / scale) / 2;
  if (stage.viewBox.w * scale >= viewportW) {
    stage.camera.x = Math.max(halfW, Math.min(stage.viewBox.w - halfW, stage.camera.x));
  } else {
    stage.camera.x = stage.viewBox.w / 2;
  }
  if (stage.viewBox.h * scale >= viewportH) {
    stage.camera.y = Math.max(halfH, Math.min(stage.viewBox.h - halfH, stage.camera.y));
  } else {
    stage.camera.y = stage.viewBox.h / 2;
  }
}

function _flagEaseInOut(t) {
  t = Math.max(0, Math.min(1, t));
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}

function _flagLerp(a, b, t) {
  return a + (b - a) * t;
}

function _applyFlagTunnelCamera(now, viewportW, viewportH) {
  const st = _flagTunnelState;
  const anim = st && st.anim;
  const cam = anim && anim.camera;
  if (!cam || !stage) return false;
  const elapsed = Math.max(0, now - cam.t0);
  const enterDur = 850;
  const enterHold = 420;
  const panDur = 1900;
  const exitHold = 520;
  const settleDur = 560;
  const panStart = enterDur + enterHold;
  const exitStart = panStart + panDur;
  const settleStart = exitStart + exitHold;
  const total = settleStart + settleDur;
  let x, y, zoom;
  if (elapsed < enterDur) {
    const p = _flagEaseInOut(elapsed / enterDur);
    x = _flagLerp(cam.fromX, cam.entranceX, p);
    y = _flagLerp(cam.fromY, cam.entranceY, p);
    zoom = _flagLerp(cam.fromZoom || 1, 1.55, p);
  } else if (elapsed < panStart) {
    x = cam.entranceX;
    y = cam.entranceY;
    zoom = 1.55;
  } else if (elapsed < exitStart) {
    const p = (elapsed - panStart) / panDur;
    x = _flagLerp(cam.entranceX, cam.exitX, p);
    y = _flagLerp(cam.entranceY, cam.exitY, p);
    zoom = _flagLerp(1.62, 2.15, p);
  } else if (elapsed < settleStart) {
    x = cam.exitX;
    y = cam.exitY;
    zoom = 2.15;
  } else if (elapsed < total) {
    const p = _flagEaseInOut((elapsed - settleStart) / settleDur);
    x = _flagLerp(cam.exitX, cam.exitNodeX, p);
    y = _flagLerp(cam.exitY, cam.exitNodeY, p);
    zoom = _flagLerp(2.15, 1, p);
  } else {
    stage._flagZoom = 1;
    return false;
  }
  stage.camera.x = x;
  stage.camera.y = y;
  stage._flagZoom = zoom;
  // v1022: Skip camera clamp during flag tunnel animation so the exit halo
  // does not stall at the viewBox boundary when exitFocus.x is near the edge.
  // Normal camera updates resume after the animation ends and will re-clamp.
  return true;
}

function _shouldHideFlagTunnelPono(now) {

  const elapsed = now - anim.t0;

}

function _flagTunnelCfg() {
  return stage && stage.flagGimmick && _flagTunnelState ? stage.flagGimmick : null;
}

function _waterGimmickCfg() {
  return stage && stage.waterGimmick && _waterGimmickState ? stage.waterGimmick : null;
}

function _strengthGimmickCfg() {
  return stage && stage.strengthGimmick && _strengthGimmickState ? stage.strengthGimmick : null;
}

function _webGimmickCfg() {
  return stage && stage.webGimmick && _webGimmickState ? stage.webGimmick : null;
}

function _flagObstacleById(id) {
  if (!id || !stage || !Array.isArray(stage.obstacles)) return null;
  return stage.obstacles.find(function(o) { return o && o.id === id; }) || null;
}

function _flagEntranceObstacle() {
  const cfg = _flagTunnelCfg();
  return cfg ? _flagObstacleById(cfg.entranceObstacleId) : null;
}

function _flagExitObstacle() {
  const cfg = _flagTunnelCfg();
  return cfg ? _flagObstacleById(cfg.exitObstacleId) : null;
}

function _flagExitFocusPoint(exitObstacle) {
  const cfg = _flagTunnelCfg();
  const p = cfg && cfg.exitFocus;
  if (p && Number.isFinite(p.x) && Number.isFinite(p.y)) {
    return { x: Number(p.x), y: Number(p.y) };
  }
  return exitObstacle || null;
}

function _isFlagTunnelEntranceObstacle(o) {
  const cfg = _flagTunnelCfg();
  return !!(cfg && o && o.id && o.id === cfg.entranceObstacleId);
}

function _isFlagTunnelExitObstacle(o) {
  const cfg = _flagTunnelCfg();
  return !!(cfg && o && o.id && o.id === cfg.exitObstacleId);
}

function _waterObstacle() {
  const cfg = _waterGimmickCfg();

}

function _isWaterGimmickObstacle(o) {
  const cfg = _waterGimmickCfg();

function _drawWorldImage(img, x, y, h, alpha) {
  if (!img || !img.complete || img.naturalWidth <= 0) return false;
  const ratio = img.naturalWidth / img.naturalHeight;
  const w = h * ratio;
  ctx.save();
  if (alpha != null) ctx.globalAlpha = alpha;
  ctx.drawImage(img, x - w / 2, y - h / 2, w, h);
  ctx.restore();
  return true;
}

function _drawFlagHoleGlow(x, y, radius, pulse, alphaScale) {
  if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(radius) || radius <= 0) return;
  const warm = ctx.createRadialGradient(x, y, 0, x, y, radius);
  warm.addColorStop(0, 'rgba(255, 235, 136, 0.62)');
  warm.addColorStop(0.36, 'rgba(255, 218, 95, 0.34)');
  warm.addColorStop(0.72, 'rgba(180, 247, 255, 0.16)');
  warm.addColorStop(1, 'rgba(255, 242, 138, 0)');
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = (alphaScale || 1) * (0.64 + pulse * 0.24);
  ctx.fillStyle = warm;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = (alphaScale || 1) * (0.62 + pulse * 0.28);
  ctx.strokeStyle = 'rgba(255, 247, 165, 0.86)';
  ctx.lineWidth = Math.max(7, radius / 13);
  ctx.beginPath();
  ctx.arc(x, y, radius * 0.48, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function _drawFlagScreenGlow(sx, sy, radius, pulse, alphaScale) {
  if (!Number.isFinite(sx) || !Number.isFinite(sy) || !Number.isFinite(radius) || radius <= 0) return;
  const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, radius);
  glow.addColorStop(0, 'rgba(255, 244, 168, 0.78)');
  glow.addColorStop(0.28, 'rgba(255, 220, 94, 0.48)');
  glow.addColorStop(0.62, 'rgba(164, 239, 255, 0.22)');
  glow.addColorStop(1, 'rgba(255, 244, 168, 0)');
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = (alphaScale || 1) * (0.72 + pulse * 0.24);
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(sx, sy, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = (alphaScale || 1) * (0.44 + pulse * 0.22);
  ctx.strokeStyle = 'rgba(255, 249, 183, 0.92)';
  ctx.lineWidth = Math.max(5, radius / 11);
  ctx.beginPath();
  ctx.arc(sx, sy, radius * 0.38, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function imgDrawFlagTunnelScreenGlow(stageObj, now, viewportW, viewportH, scale) {
  const cfg = _flagTunnelCfg();
  const st = _flagTunnelState;
  if (!cfg || !st || !stageObj || !scale) return;
  const entrance = _flagEntranceObstacle();
  if (entrance && !st.unlocked) {
    const pulse = 0.5 + Math.sin(now / 240) * 0.5;
    const sx = viewportW / 2 + (entrance.x - stageObj.camera.x) * scale;
    const sy = viewportH / 2 + (entrance.y - stageObj.camera.y) * scale;
    const radius = (cfg.encounterRadius || stageObj.viewBox.h / 16) * scale * 1.8;
    _drawFlagScreenGlow(sx, sy, radius, pulse, 1);
  }
  if (st.anim) {
    const exit = _flagExitObstacle();
    const exitFocus = _flagExitFocusPoint(exit);
    const elapsed = now - st.anim.t0;
    if (exitFocus && elapsed > 2700) {
      const p = Math.min(1, (elapsed - 2700) / 720);
      const sx = viewportW / 2 + (exitFocus.x - stageObj.camera.x) * scale;
      const sy = viewportH / 2 + (exitFocus.y - stageObj.camera.y) * scale;
      _drawFlagScreenGlow(sx, sy, stageObj.viewBox.h * scale / 8.5, p, 0.9);
    }
  }
}

function imgDrawFlagTunnelGimmick(stageObj, now) {
  const cfg = _flagTunnelCfg();
  const st = _flagTunnelState;
  if (!cfg || !st) return;
  const entrance = _flagEntranceObstacle();
  if (entrance && !st.unlocked) {
    const pulse = 0.5 + Math.sin(now / 240) * 0.5;
    const r = (cfg.encounterRadius || stageObj.viewBox.h / 16) * (1.05 + pulse * 0.12);
    _drawFlagHoleGlow(entrance.x, entrance.y, r * 1.45, pulse, 1);
  }
  const ladder = cfg.ladder;
  if (ladder && !st.ladderCollected) {
    const bob = Math.sin(now / 360) * (stageObj.viewBox.h / 120);
    const glow = 0.5 + Math.sin(now / 300) * 0.5;
    ctx.save();
    ctx.globalAlpha = 0.22 + glow * 0.18;
    ctx.fillStyle = '#FFF8A8';
    ctx.beginPath();
    ctx.arc(ladder.x, ladder.y + bob, (ladder.radius || 86) * 0.75, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    _drawWorldImage(MAZE_FLAG_ASSETS.ropeLadder, ladder.x, ladder.y + bob, stageObj.viewBox.h / 9, 1);
  }
  if (st.anim) {
    const elapsed = now - st.anim.t0;
    const entranceAlpha = Math.max(0, 1 - Math.max(0, elapsed - 650) / 400);
    if (entrance && entranceAlpha > 0) {
      _drawWorldImage(MAZE_FLAG_ASSETS.ropeLadder, entrance.x, entrance.y - stageObj.viewBox.h / 30, stageObj.viewBox.h / 8.5, entranceAlpha);
    }
    const exit = _flagExitObstacle();
    if (exit && elapsed > 2700) {
      const p = Math.min(1, (elapsed - 2700) / 720);
      _drawFlagHoleGlow(exit.x, exit.y, (stageObj.viewBox.h / 15) * (0.9 + p * 0.28), p, 0.9);
      ctx.save();
      ctx.globalAlpha = 0.25 + p * 0.35;
      ctx.strokeStyle = '#B7F7FF';
      ctx.lineWidth = Math.max(5, stageObj.viewBox.h / 240);
      ctx.beginPath();
      ctx.arc(exit.x, exit.y, (stageObj.viewBox.h / 20) * (0.7 + p * 0.45), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }
}

function _drawBroomIcon(x, y, size, now, alpha) {
  if (!Number.isFinite(x) || !Number.isFinite(y)) return;
  const s = size || 92;
  const bob = Math.sin(now / 360) * (s * 0.06);
  ctx.save();
  ctx.translate(x, y + bob);
  ctx.rotate(-0.42 + Math.sin(now / 520) * 0.06);
  ctx.globalAlpha = alpha == null ? 1 : alpha;
  ctx.shadowColor = 'rgba(255, 244, 157, 0.58)';
  ctx.shadowBlur = s * 0.28;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#8A5B34';
  ctx.lineWidth = Math.max(8, s * 0.09);
  ctx.beginPath();
  ctx.moveTo(-s * 0.32, -s * 0.28);
  ctx.lineTo(s * 0.32, s * 0.28);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#E4B56E';
  ctx.strokeStyle = '#8A5B34';
  ctx.lineWidth = Math.max(2, s * 0.025);
  ctx.beginPath();
  ctx.moveTo(s * 0.18, s * 0.18);
  ctx.quadraticCurveTo(s * 0.56, s * 0.24, s * 0.5, s * 0.56);
  ctx.lineTo(s * 0.15, s * 0.52);
  ctx.quadraticCurveTo(s * 0.02, s * 0.32, s * 0.18, s * 0.18);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.strokeStyle = 'rgba(133, 82, 42, 0.55)';
  ctx.lineWidth = Math.max(1.4, s * 0.018);
  for (let i = 0; i < 4; i++) {
    const t = -0.12 + i * 0.08;
    ctx.beginPath();
    ctx.moveTo(s * (0.22 + t), s * 0.24);
    ctx.lineTo(s * (0.19 + t), s * 0.5);
    ctx.stroke();
  }
  ctx.restore();
}

function _drawAnimatedSpiderWeb(cx, cy, size, now, alphaScale) {
  const s = size || 150;
  const pulse = Math.sin(now / 430) * 0.5 + 0.5;
  const sway = Math.sin(now / 590) * (s * 0.018);
  const strands = [
    [-0.58, -0.36, 0.58, -0.22, -0.12, -0.55, 0.95],
    [-0.62, -0.12, 0.56, -0.02, -0.08, -0.31, 0.88],
    [-0.52, 0.14, 0.62, 0.22, 0.08, -0.08, 0.82],
    [-0.42, 0.42, 0.44, 0.5, -0.02, 0.28, 0.72],
    [-0.38, -0.52, 0.22, 0.56, -0.22, 0.04, 0.7],
    [0.34, -0.5, -0.22, 0.5, 0.23, 0.02, 0.68],
    [-0.62, 0.3, 0.58, -0.34, 0.1, -0.02, 0.62],
  ];
  ctx.save();
  ctx.translate(cx + sway, cy);
  ctx.globalAlpha = alphaScale == null ? 1 : alphaScale;
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.78);
  glow.addColorStop(0, 'rgba(255,255,229,0.24)');
  glow.addColorStop(0.46, 'rgba(178,226,209,0.14)');
  glow.addColorStop(1, 'rgba(178,226,209,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.ellipse(0, s * 0.04, s * (0.74 + pulse * 0.03), s * (0.56 + pulse * 0.02), 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.globalCompositeOperation = 'source-over';
  strands.forEach(function(p, i) {
    const wob = Math.sin(now / (470 + i * 23) + i * 1.7) * s * 0.035;
    const x1 = p[0] * s;
    const y1 = p[1] * s + Math.cos(now / 660 + i) * s * 0.012;
    const x2 = p[2] * s;
    const y2 = p[3] * s + Math.sin(now / 720 + i) * s * 0.014;
    const mx = p[4] * s + wob;
    const my = p[5] * s + Math.abs(wob) * 0.45 + Math.sin(now / 540 + i) * s * 0.018;
    const strength = p[6];
    ctx.shadowColor = 'rgba(210,255,245,0.72)';
    ctx.shadowBlur = s * 0.07;
    ctx.strokeStyle = 'rgba(42, 67, 92, 0.32)';
    ctx.lineWidth = Math.max(7, s * 0.08 * strength);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(mx, my, x2, y2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(248, 255, 244, 0.95)';
    ctx.lineWidth = Math.max(3.8, s * 0.04 * strength);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(mx, my, x2, y2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(146, 196, 214, 0.76)';
    ctx.lineWidth = Math.max(1.5, s * 0.014);
    ctx.beginPath();
    ctx.moveTo(x1 + s * 0.01, y1 - s * 0.006);
    ctx.quadraticCurveTo(mx + s * 0.015, my - s * 0.014, x2 + s * 0.01, y2 - s * 0.006);
    ctx.stroke();
    for (let j = 0; j < 2; j++) {
      const t = 0.28 + j * 0.38 + Math.sin(now / 900 + i + j) * 0.035;
      const qx = (1 - t) * (1 - t) * x1 + 2 * (1 - t) * t * mx + t * t * x2;
      const qy = (1 - t) * (1 - t) * y1 + 2 * (1 - t) * t * my + t * t * y2;
      ctx.fillStyle = 'rgba(242, 255, 241, 0.86)';
      ctx.shadowColor = 'rgba(207, 255, 239, 0.78)';
      ctx.shadowBlur = s * 0.028;
      ctx.beginPath();
      ctx.ellipse(qx, qy, s * (0.022 + j * 0.005), s * 0.015, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  });
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(54, 50, 74, 0.84)';
  ctx.beginPath();
  ctx.arc(s * 0.28, -s * 0.2 + Math.sin(now / 360) * s * 0.014, s * 0.11, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(54, 50, 74, 0.74)';
  ctx.lineWidth = Math.max(1.2, s * 0.014);
  for (let i = 0; i < 6; i++) {
    const side = i < 3 ? -1 : 1;
    const leg = i % 3;
    ctx.beginPath();
    ctx.moveTo(s * 0.28 + side * s * 0.06, -s * 0.2 + leg * s * 0.035);
    ctx.quadraticCurveTo(s * (0.28 + side * (0.17 + leg * 0.02)), -s * (0.3 - leg * 0.08), s * (0.28 + side * 0.26), -s * (0.24 - leg * 0.1));
    ctx.stroke();
  }
  ctx.restore();
}

  }
}

// Resolve a node's rendered marker height (world units) from optional `radius`.
// `radius` は描画高さ (px)。エディタ (tools/maze-editor.html) の slider 値と 1:1 対応。
// If unset/invalid, fall back to the legacy default `viewBox.h / 6`.
// Clamped to [5, 500] world px to avoid pathological values.
function imgNodeMarkerSize(stage, node) {
  const defaultSz = stage.viewBox.h / 6;
  if (!node) return defaultSz;
  const r = node.radius;
  if (typeof r !== 'number' || !Number.isFinite(r) || r <= 0) return defaultSz;
  const sz = r;   // radius はエディタ slider と同じ「描画全高 (px)」 として解釈
  if (sz < 5)   return 5;
  if (sz > 500) return 500;
  return sz;
}

function imgDrawMarkers(stage) {
  // Draw the start and goal asset markers at their node positions.
  // Default size is viewBox.h / 6 so they read clearly at any zoom but don't dominate.
  // Per-node `radius` (optional, world units) overrides the default: rendered height = radius (エディタ slider と 1:1)。
  if (stage.start && imgMarkerStart.complete && imgMarkerStart.naturalWidth > 0) {
    const sz = imgNodeMarkerSize(stage, stage.start);
    // Preserve aspect ratio
    const ratio = imgMarkerStart.naturalWidth / imgMarkerStart.naturalHeight;
    const sw = sz * ratio, sh = sz;
    ctx.drawImage(imgMarkerStart, stage.start.x - sw/2, stage.start.y - sh/2, sw, sh);
  }
  if (stage.goal) {
    const sz = imgNodeMarkerSize(stage, stage.goal);
    // 1) 旧アーチ marker_goal.png を従来通り描画 (= 「ゴール」のフレーム)
    if (imgMarkerGoal.complete && imgMarkerGoal.naturalWidth > 0) {
      const ratio = imgMarkerGoal.naturalWidth / imgMarkerGoal.naturalHeight;
      const sw = sz * ratio, sh = sz;
      ctx.drawImage(imgMarkerGoal, stage.goal.x - sw/2, stage.goal.y - sh/2, sw, sh);
    }
    // 2) 動物の泣き顔があればアーチの **下半分** に重ねて小さく描画
    const cryImg = stage._cryingImg;
    const useCry = cryImg && cryImg.complete && cryImg.naturalWidth > 0;
    if (useCry) {
      const cratio = cryImg.naturalWidth / cryImg.naturalHeight;
      // アーチ高さ sz の 0.55 倍 (= 小さめ)、アーチ下端寄りの位置に配置
      const ch = sz * 0.55;
      const cw = ch * cratio;
      const cy = stage.goal.y + sz * 0.10; // アーチ中心より少し下
      ctx.drawImage(cryImg, stage.goal.x - cw/2, cy - ch/2, cw, ch);
    }
  }
}

function imgDrawObstacles(stage) {
  // Default size relative to viewBox height
  const defaultSize = stage.viewBox.h / 12;
  for (const o of stage.obstacles) {
    if (_isStrengthRockObstacle(o) && _strengthGimmickState && _strengthGimmickState.rockMoved) continue;
    if (_isWebGimmickObstacle(o)) continue;
    const img = OBSTACLE_KIND_IMG[o.kind];
    const sz = (o.size && Number.isFinite(o.size)) ? o.size : defaultSize;
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, o.x - sz/2, o.y - sz/2, sz, sz);
    } else {
      // Fallback emoji if image not yet loaded
      const fallbackEmoji = { tree:'🌳', pond:'💧', hole:'🕳️', stump:'🪵', rock:'🪨', web:'🕸️' }[o.kind] || '🌳';
      ctx.font = (sz * 0.8) + 'px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(fallbackEmoji, o.x, o.y);
    }

// Soft silhouette teaser used to hint at "what awaits past this stage".
// World-space draw (called inside the camera transform). Shape is intentionally
// vague (blurred radial gradient ellipse) — no eyes, no creature outline.
// Pono dialog fires once on first approach within stage.teaser.approachRadius.
function imgDrawBossTeaser(stage, now, px, py) {
  const t = stage.teaser;
  if (!t) return;
  // Pulse (slow breathing). Deterministic — Math.sin only.
  const pulseSec = (typeof t.pulseSec === 'number' && t.pulseSec > 0) ? t.pulseSec : 2.6;
  const oMin = (typeof t.opacityMin === 'number') ? t.opacityMin : 0.35;
  const oMax = (typeof t.opacityMax === 'number') ? t.opacityMax : 0.45;
  const phase = Math.sin((now / 1000) * (Math.PI * 2 / pulseSec));
  const alpha = oMin + (oMax - oMin) * (0.5 + 0.5 * phase);
  const rx = (typeof t.rx === 'number') ? t.rx : 320;
  const ry = (typeof t.ry === 'number') ? t.ry : 240;
  const color = t.color || '#1a1230';
  ctx.save();
  // Soft radial gradient — center opaque, edge transparent (faux blur).
  const grad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, Math.max(rx, ry));
  // Parse color into rgba(...) for gradient stops
  let r=26,g=18,b=48;
  const m = /^#([0-9a-f]{6})$/i.exec(color);
  if (m) {
    const v = parseInt(m[1], 16);
    r = (v >> 16) & 0xff; g = (v >> 8) & 0xff; b = v & 0xff;
  }
  grad.addColorStop(0.0, 'rgba(' + r + ',' + g + ',' + b + ',' + alpha.toFixed(3) + ')');
  grad.addColorStop(0.55, 'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 0.55).toFixed(3) + ')');
  grad.addColorStop(1.0, 'rgba(' + r + ',' + g + ',' + b + ',0)');
  ctx.fillStyle = grad;
  // Ellipse via scaled arc (no blur filter dependency — works on all canvas)
  ctx.translate(t.x, t.y);
  ctx.scale(1, ry / rx);
  ctx.beginPath();
  ctx.arc(0, 0, rx, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  // One-shot approach dialog. Guarded by stage._teaserSpoken flag — only fires
  // once per stage load, and only when the speech bubble is idle so we don't
  // step on existing hints (e.g. obstacle bonk lines).
  if (!stage._teaserSpoken && t.dialog) {
    const ax = (t.approachAnchor && typeof t.approachAnchor.x === 'number') ? t.approachAnchor.x : t.x;
    const ay = (t.approachAnchor && typeof t.approachAnchor.y === 'number') ? t.approachAnchor.y : t.y;
    const ar = (typeof t.approachRadius === 'number') ? t.approachRadius : 700;
    const dx = px - ax, dy = py - ay;
    if (dx*dx + dy*dy < ar * ar && !_imgBubble && !_encounterActive) {
      imgShowBubble(t.dialog, 'pono', 2600);
      stage._teaserSpoken = true;
    }
  }
}

// Lazy image cache for お邪魔虫 sprites (kinds with imageUrl).
const _creatureImgCache = {};
function _creatureImg(url) {
  if (!url) return null;
  let img = _creatureImgCache[url];
  if (!img) {
    img = new Image();
    img.src = url;
    _creatureImgCache[url] = img;
  }
  return (img.complete && img.naturalWidth > 0) ? img : null;
}

function imgDrawCreatures(stage, now) {
  const size = stage.viewBox.h / 11;
  for (const c of stage.creatures) {
    if (_defeatedCreatures.has(c.id || (c.x + ',' + c.y))) continue;
    const data = _creatureData(c);
    const bob = Math.sin(now / 320 + (c.x + c.y) * 0.01) * (size * 0.06);
    const sprite = _creatureImg(data.imageUrl);
    ctx.save();
    if (sprite) {
      // Image sprite: keep aspect ratio, fit to circle's diameter (= size)
      const ratio = sprite.naturalWidth / sprite.naturalHeight;
      const sh = size;
      const sw = sh * ratio;
      ctx.drawImage(sprite, c.x - sw/2, (c.y + bob) - sh/2, sw, sh);
    } else {
      // Body (color-coded circle)
      ctx.fillStyle = data.color;
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.arc(c.x, c.y + bob, size / 2, 0, Math.PI * 2);
      ctx.fill();
      // Outline
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 4;
      ctx.stroke();
      // Emoji face
      ctx.font = (size * 0.65) + 'px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(data.emoji, c.x, c.y + bob);
    }
    ctx.restore();
  }
}

// Detect creature collision during a walk and trigger encounter.
// Returns true if walk should pause for an encounter.
function _checkCreatureCollision(px, py) {
  if (!stage || !stage.creatures || _encounterActive) return false;
  const TRIGGER_R2 = (stage.viewBox.h / 16) * (stage.viewBox.h / 16); // tuned with creature size
  for (const c of stage.creatures) {
    const id = c.id || (c.x + ',' + c.y);
    if (_defeatedCreatures.has(id)) continue;
    const dx = px - c.x, dy = py - c.y;
    if (dx*dx + dy*dy < TRIGGER_R2) {
      _triggerEncounter(c);
      return true;
    }

  return false;

// Detect obstacle collision during a walk. Obstacles are not negotiable —
// pono just bounces back to the node it left from.
let _imgPauseUntil = 0;
function _obstacleCollisionRadius(stage, obstacle) {
  const h = stage.viewBox.h;
  const kind = obstacle && obstacle.kind;
  const waterCfg = _waterGimmickCfg();
  if (waterCfg && obstacle && obstacle.id === waterCfg.obstacleId) {
    return waterCfg.encounterRadius || h / 20;
  }
  const strengthCfg = _strengthGimmickCfg();
  if (strengthCfg && obstacle && obstacle.id === strengthCfg.obstacleId) {
    return strengthCfg.encounterRadius || h / 22;
  }
  const webCfg = _webGimmickCfg();
  if (webCfg && obstacle && obstacle.id === webCfg.obstacleId) {
    return webCfg.encounterRadius || h / 22;
  }
  const fallback = h / 28;
  const byKind = {
    tree: h / 36,
    stump: h / 30,
    rock: h / 30,
    pond: h / 24,
    hole: h / 24,
    web: h / 22,
  };
  return Math.max(h / 56, byKind[kind] || fallback);
}

function _checkObstacleCollision(px, py) {
  if (!stage || !stage.obstacles || !walkAnim || _encounterActive) return false;

  const camFromX = Number.isFinite(stage.camera && stage.camera.x)
    ? stage.camera.x
    : (Number.isFinite(pono && pono.x) ? pono.x : entrance.x);
  const camFromY = Number.isFinite(stage.camera && stage.camera.y)
    ? stage.camera.y
    : (Number.isFinite(pono && pono.y) ? pono.y : entrance.y);
  const camFromZoom = Number.isFinite(imgCameraZoom()) ? imgCameraZoom() : 1;
  st.travelling = true;
  st.exitShown = false;
  st.anim = {
    t0: startTime,
    camera: {
      t0: startTime,
      fromX: camFromX,
      fromY: camFromY,
      fromZoom: camFromZoom,
      entranceX: entrance.x,
      entranceY: entrance.y,
      exitX: exitFocus.x,
      exitY: exitFocus.y,
      exitNodeX: exitNode.x,
      exitNodeY: exitNode.y,
    },
  };
  walkAnim = null;
  stage._manualCam = false;
  stage._camAnim = null;
  _imgPanState = null;
  hideArrows();
  _imgPauseUntil = startTime + 4700;
  pono.x = entrance.x;
  pono.y = entrance.y;
  imgShowBubble('なわばしごを かけたよ！', { x: entrance.x, y: entrance.y }, 1200);
  showHint('🪜 なわばしごで あなに おりるよ。', 2200);
  _flagTunnelSetTimeout(function() {
    if (_stageRef !== stage || !st.travelling) return;
    imgShowBubble('あなの なかを とおっているよ…', { x: entrance.x, y: entrance.y }, 1300);
  }, 950);
  _flagTunnelSetTimeout(function() {
    if (_stageRef !== stage || !st.travelling) return;
    pono.x = exitFocus.x;
    pono.y = exitFocus.y;
    pono.nodeId = exitNode.id;
    st.exitShown = true;
    imgShowBubble('でぐちが ひかった！', { x: exitFocus.x, y: exitFocus.y }, 900);
  }, 3420);
  _flagTunnelSetTimeout(function() {
    if (_stageRef !== stage || !st.travelling) return;
    st.travelling = false;
    st.anim = null;
    st.exitShown = false;
    stage._flagZoom = 1;
    pono.x = exitNode.x;
    pono.y = exitNode.y;
    pono.nodeId = exitNode.id;
    moves++;
    hudMoves.textContent = 'てかず: ' + moves;
    imgShowBubble('ちがう でぐちに でたよ！', 'pono', 1700);
    showHint('🪜 なわばしごで あなの トンネルを とおれた！', 2600);
    if (pono.nodeId === stage.goal.id) onClear();
    else imgShowArrows();
  }, 4380);
}

// どちらでもステージ JSON / creature.defaultGame に使えるよう、入口で正規化する。
function _normalizeGameToken(token) {
  if (token === 'donguri_bowl') return 'web_sweep';
  return token;
}

function _gameForCreature(c) {
  // c.minigame (作者指定) > 虫の種類ごとの固定ミニゲーム。
  if (c && c.minigame) {
    const t = _normalizeGameToken(c.minigame);
    if (_GAME_LABELS[t]) return t;
  }
  const data = _creatureData(c);
  if (data && data.defaultGame) {
    const t = _normalizeGameToken(data.defaultGame);
    if (_GAME_LABELS[t]) return t;
  }
  return 'janken';
}

function _showEncounterStart() {
  _setEncounterMode(null);
  const c = _currentCreature;
  const game = _currentGame || _gameForCreature(c);
  encStageEl.innerHTML = '<button class="enc-btn primary" id="encStartBtn2">' +
    _GAME_LABELS[game] + ' で あそぶ ▶</button>';
  document.getElementById('encStartBtn2').addEventListener('click', function() {

  });
}

function _jankenHandMarkup(side, hand, ready) {
  const safeSide = side === 'bug' ? 'bug' : 'pono';
  const safeHand = hand === 'paper' ? 'paper' : (hand === 'scissors' ? 'scissors' : 'rock');
  return '<span class="janken-hand janken-hand--' + safeSide +
    ' janken-hand--' + safeHand + (ready ? ' is-ready' : '') +
    '" role="img" aria-label="' + ({ rock: 'グー', scissors: 'チョキ', paper: 'パー' }[safeHand]) + '"></span>';
}

function _jankenEncounterKey(c) {
  if (!c) return '';
  return String(stageIdx) + ':' + (c.id || (c.x + ',' + c.y));
}

function _isStage2FirstJankenCreature(c) {
  return !!(stageIdx === 2 && c && (c.id === 'c1' || (!c.id && c.kind === 'mayoi')) && _gameForCreature(c) === 'janken');
}

function _chooseJankenCpuHand(playerHand) {
  const beats = { rock: 'scissors', paper: 'rock', scissors: 'paper' };
  const losesTo = { rock: 'paper', paper: 'scissors', scissors: 'rock' };
  const safePlayer = beats[playerHand] ? playerHand : 'rock';
  if (_jankenGuaranteedWinKeys[_jankenEncounterKey(_currentCreature)]) {
    return beats[safePlayer];
  }
  const winChance = Math.min(0.72, (1 / 3) + Math.max(0, _jankenLossStreak) * 0.1);
  const drawChance = (1 - winChance) / 2;
  const roll = Math.random();
  if (roll < winChance) return beats[safePlayer];
  if (roll < winChance + drawChance) return safePlayer;
  return losesTo[safePlayer];
}

function _resolveJanken(playerHand) {
  const callEl = document.getElementById('jankenCall');
  const resultEl = document.getElementById('jankenResult');
  const controlsEl = document.getElementById('jankenControls');
  const ponoSlot = document.getElementById('jankenPonoSlot');
  const bugSlot = document.getElementById('jankenBugSlot');
  if (!callEl || !resultEl || !controlsEl || !ponoSlot || !bugSlot) return;
  controlsEl.querySelectorAll('button').forEach(function(btn) {
    btn.disabled = true;
    btn.style.opacity = '0.55';
  });

  const cpuHand = _chooseJankenCpuHand(playerHand);
  // wins[a] beats b
  const beats = { rock: 'scissors', paper: 'rock', scissors: 'paper' };
  let outcome;
  if (playerHand === cpuHand) outcome = 'draw';
  else if (beats[playerHand] === cpuHand) outcome = 'win';
  else outcome = 'lose';

  function setHands(handPono, handBug, ready) {
    ponoSlot.innerHTML = _jankenHandMarkup('pono', handPono, ready);
    bugSlot.innerHTML = _jankenHandMarkup('bug', handBug, ready);
  }
  setHands('rock', 'rock', true);
  resultEl.textContent = '';
  callEl.textContent = 'ジャン';
  setTimeout(function() {
    if (!_encounterActive) return;
    callEl.textContent = 'ケン';
  }, 520);
  setTimeout(function() {
    if (!_encounterActive) return;
    callEl.textContent = 'ポン！';
    setHands(playerHand, cpuHand, false);
    ponoSlot.classList.toggle('is-win', outcome === 'win');
    ponoSlot.classList.toggle('is-lose', outcome === 'lose');
    bugSlot.classList.toggle('is-win', outcome === 'lose');
    bugSlot.classList.toggle('is-lose', outcome === 'win');
    resultEl.className = 'janken-result' + (outcome === 'win' ? ' win' : (outcome === 'lose' ? ' lose' : ''));
    resultEl.textContent = outcome === 'win' ? 'かった！' : outcome === 'lose' ? 'まけた…' : 'あいこ！';
    const encounterKey = _jankenEncounterKey(_currentCreature);
    if (outcome === 'win') {
      _jankenLossStreak = 0;
      if (encounterKey) delete _jankenGuaranteedWinKeys[encounterKey];
    } else if (outcome === 'lose') {
      _jankenLossStreak = Math.min(5, _jankenLossStreak + 1);
      if (_isStage2FirstJankenCreature(_currentCreature) && encounterKey) {
        _jankenGuaranteedWinKeys[encounterKey] = true;
      }
    }
    controlsEl.innerHTML = outcome === 'draw'
      ? '<button class="enc-btn primary" id="encRetry">もう一回</button>'
      : '<button class="enc-btn ' + (outcome === 'win' ? 'win' : 'lose') + '" id="encNext">' +
          (outcome === 'win' ? 'すすむ ▶' : 'もどる ▶') +
        '</button>';
    if (outcome === 'draw') {
      document.getElementById('encRetry').addEventListener('click', _showJankenChoices);
    } else {
      document.getElementById('encNext').addEventListener('click', function() {
        if (outcome === 'win') {
          _setEncounterMode(null);
          _showCreatureDefeatDialog();
          _creatureDefeatTimer = setTimeout(function() {
            _creatureDefeatTimer = null;
            if (_encounterActive) _closeEncounter(true);
          }, 1600);
        } else {
          _closeEncounter(false);
        }
      });
    }
  }, 1120);
}

// Simon-says: 4 色固定、レベル (=フラッシュ数)
const SIMON_COLORS = [
  { id: 'r', color: '#ee5a5a', freq: 440 }, // A4
  { id: 'b', color: '#5a8aee', freq: 523 }, // C5
  { id: 'g', color: '#5aee7a', freq: 659 }, // E5
  { id: 'y', color: '#eece5a', freq: 784 }, // G5
];
const SIMON_LENGTH = 3;

function _shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function _pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── ちらっとクイズ (peek quiz) ──
// 答えのイラストの一部だけが穴から見える。3 択でクリアな絵から選ぶ。
// 1 回間違えると別の場所に穴が増えてヒント追加。2 回間違えるとアウト。
let _peekState = null;
function _showPeekChoices() {
  _setEncounterMode(null);
  const ans = _pick(PEEK_QUIZ_POOL);
  // 別カテゴリにならないよう、PEEK_QUIZ_POOL から ans 以外を 2 つランダム抽出
  const others = _shuffleArray(PEEK_QUIZ_POOL.filter(function(p) { return p.id !== ans.id; })).slice(0, 2);
  const choices = _shuffleArray([ans].concat(others));
  _peekState = { ans: ans, wrongs: 0, holes: _peekRandomHoles(1) };

  // DOM を直接構築 (textContent 経由で XSS パターンを回避)
  encStageEl.textContent = '';
  const titleEl = document.createElement('div');
  titleEl.className = 'enc-result';
  titleEl.appendChild(document.createTextNode('ちらっと だけ みえてるよ〜'));
  titleEl.appendChild(document.createElement('br'));
  titleEl.appendChild(document.createTextNode('なんの え かな？'));
  encStageEl.appendChild(titleEl);
  const peekWrap = document.createElement('div');
  peekWrap.className = 'peek-wrap';
  const canvasEl = document.createElement('canvas');
  canvasEl.id = 'peekCanvas';
  canvasEl.width = 280; canvasEl.height = 280;
  canvasEl.style.cssText = 'border-radius:14px;background:#222;display:block;margin:0 auto;';
  peekWrap.appendChild(canvasEl);
  encStageEl.appendChild(peekWrap);
  const rowEl = document.createElement('div');
  rowEl.className = 'row';
  choices.forEach(function(c) {
    const btn = document.createElement('button');
    btn.className = 'enc-btn choice peek-choice';
    btn.dataset.id = c.id;
    btn.style.cssText = 'padding:6px;min-width:84px;';
    const imgT = document.createElement('img');
    imgT.src = c.src;
    imgT.alt = c.label;
    imgT.style.cssText = 'width:64px;height:64px;object-fit:contain;display:block;margin:0 auto;';
    btn.appendChild(imgT);
    const lab = document.createElement('div');
    lab.style.cssText = 'font-size:0.85rem;margin-top:2px;';
    lab.textContent = c.label; // textContent で XSS 防御
    btn.appendChild(lab);
    rowEl.appendChild(btn);
  });
  encStageEl.appendChild(rowEl);

  // 画像をロードしてから canvas を描画
  const canv = document.getElementById('peekCanvas');
  const img = new Image();
  img.onload = function() {
    _peekRender(canv, img, _peekState.holes);
  };
  img.onerror = function() {
    // ロード失敗時は画像なしで穴位置だけ描画 (フォールバック)
    _peekRender(canv, null, _peekState.holes);
  };
  img.src = ans.src;

  encStageEl.querySelectorAll('.peek-choice').forEach(function(b) {
    b.addEventListener('click', function() {
      if (b.disabled) return;
      const correct = b.dataset.id === ans.id;
      if (correct) {
        _peekState = null;
        _resolveQuiz(true);
        return;
      }
      // 不正解
      _peekState.wrongs++;
      if (_peekState.wrongs >= 2) {
        _peekState = null;
        _resolveQuiz(false);
        return;
      }
      // ヒント追加 (穴をもう 1 つ別の場所に)
      _peekState.holes = _peekState.holes.concat(_peekRandomHoles(1, _peekState.holes));
      _peekRender(canv, img, _peekState.holes);
      // 0.5s ちょっと止め
      const buttons = encStageEl.querySelectorAll('.peek-choice');
      buttons.forEach(function(bb) { bb.disabled = true; bb.style.opacity = '0.5'; });
      setTimeout(function() {
        // _peekState が null = 既に他経路で終了済 → DOM が変わっている可能性があるので no-op
        if (!_peekState) return;
        buttons.forEach(function(bb) {
          if (bb && bb.style) { bb.disabled = false; bb.style.opacity = '1'; }
        });
      }, 500);
    });
  });
}

// 穴の位置をランダムで N 個生成。avoid と被らないようなるべく離す。
function _peekRandomHoles(n, avoid) {
  avoid = avoid || [];
  // canvas 280x280 内、margin 50px、半径 38px
  const positions = [];
  let attempts = 0;
  while (positions.length < n && attempts < 30) {
    attempts++;
    const x = 50 + Math.random() * 180;
    const y = 50 + Math.random() * 180;
    let ok = true;
    for (const p of avoid.concat(positions)) {
      const dx = p.x - x, dy = p.y - y;
      if (dx * dx + dy * dy < 100 * 100) { ok = false; break; }
    }
    if (ok) positions.push({ x: x, y: y, r: 38 });
  }
  // 失敗時は固定位置を fallback
  if (positions.length < n) positions.push({ x: 140, y: 140, r: 38 });
  return positions;
}

// canvas に画像 + 黒覆い (穴の中だけ画像が見える) を描画。
// clip + evenodd で「全面の rect から穴の arc を除いた領域」だけを黒で塗る。
function _peekRender(canv, img, holes) {
  if (!canv) return;
  const ctx2 = canv.getContext('2d');
  ctx2.clearRect(0, 0, canv.width, canv.height);
  // まず canvas 全面に画像 (背景を一度埋める)
  ctx2.fillStyle = '#222';
  ctx2.fillRect(0, 0, canv.width, canv.height);
  if (img && img.complete && img.naturalWidth > 0) {
    const ratio = img.naturalWidth / img.naturalHeight;
    let dw, dh;
    if (ratio > 1) { dw = canv.width; dh = canv.width / ratio; }
    else           { dh = canv.height; dw = canv.height * ratio; }
    const dx = (canv.width - dw) / 2, dy = (canv.height - dh) / 2;
    ctx2.drawImage(img, dx, dy, dw, dh);
  }
  // 上から黒で覆うが、穴 (arc) の内側だけ塗らないように evenodd clip を使う
  ctx2.save();
  ctx2.beginPath();
  ctx2.rect(0, 0, canv.width, canv.height);
  for (const h of holes) {
    ctx2.moveTo(h.x + h.r, h.y);
    ctx2.arc(h.x, h.y, h.r, 0, Math.PI * 2);
  }
  ctx2.clip('evenodd');
  ctx2.fillStyle = '#222';
  ctx2.fillRect(0, 0, canv.width, canv.height);
  ctx2.restore();
  // 穴の周りに白い枠を 2px (見やすさのため)
  ctx2.lineWidth = 2;
  ctx2.strokeStyle = 'rgba(255,255,255,0.6)';
  for (const h of holes) {
    ctx2.beginPath();
    ctx2.arc(h.x, h.y, h.r, 0, Math.PI * 2);
    ctx2.stroke();
  }
}

// ── リズムまね (Simon) ──
let _simonSeq = [];
let _simonIdx = 0;
let _simonCancelled = false; // モーダル閉じ後の遅延 timer による DOM 汚染防止

function _simonPlayTone(freq, ms) {
  try {
    const ac = _mzGetAC();
    if (!ac) return;
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sine'; o.frequency.value = freq;
    const t = ac.currentTime;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + ms / 1000);
    o.start(t); o.stop(t + ms / 1000);
  } catch (e) { /* ignore */ }
}

function _showSimonGame() {
  _setEncounterMode(null);
  // Generate a random sequence
  _simonSeq = [];
  for (let i = 0; i < SIMON_LENGTH; i++) _simonSeq.push(_pick(SIMON_COLORS));
  _simonIdx = 0;
  _simonCancelled = false;
  encStageEl.innerHTML =
    '<div class="enc-result">よく みててね…</div>' +
    '<div class="row" id="simonGrid">' +
    SIMON_COLORS.map(function(c) {
      return '<button class="enc-btn choice simon-cell" data-id="' + c.id + '" ' +
        'style="background:#fff; opacity:0.4; pointer-events:none;">' +
        '<span class="simon-dot" style="background:' + c.color + '"></span></button>';
    }).join('') +
    '</div>';
  // Play sequence
  let step = 0;
  function flashNext() {
    if (_simonCancelled) return; // モーダル閉じ後 / 早期解決後は中断
    if (step >= _simonSeq.length) {
      // Now wait for player input
      encStageEl.querySelectorAll('.simon-cell').forEach(function(cell) {
        cell.style.opacity = '0.85';
        cell.style.pointerEvents = 'auto';
        cell.addEventListener('click', _onSimonTap);
      });
      const r = encStageEl.querySelector('.enc-result');
      if (r) r.textContent = 'おなじ じゅんに タップしてね！';
      return;
    }
    const c = _simonSeq[step];
    const cell = encStageEl.querySelector('.simon-cell[data-id="' + c.id + '"]');
    if (cell) {
      cell.style.opacity = '1';
      cell.classList.add('is-flashing');
      _simonPlayTone(c.freq, 400);
      setTimeout(function() {
        if (cell) {
          cell.style.opacity = '0.4';
          cell.classList.remove('is-flashing');
        }
        step++;
        setTimeout(flashNext, 200);
      }, 500);
    } else {
      step++;
      flashNext();
    }
  }
  setTimeout(flashNext, 600);
}

function _onSimonTap(e) {
  const id = e.currentTarget.dataset.id;
  const expected = _simonSeq[_simonIdx];
  if (id === expected.id) {
    _simonPlayTone(expected.freq, 200);
    _simonIdx++;
    if (_simonIdx >= _simonSeq.length) {
      _resolveQuiz(true);
    }
  } else {
    // Wrong
    _simonPlayTone(120, 300);
    _resolveQuiz(false);
  }
}

// ── 旗あげ ──
const FLAG_POSE_SRC = {
  down: MAZE_FLAG_ASSET_BASE + 'hatahata_both_down.png',
  red: MAZE_FLAG_ASSET_BASE + 'hatahata_red_up.png',
  white: MAZE_FLAG_ASSET_BASE + 'hatahata_white_up.png',
  both: MAZE_FLAG_ASSET_BASE + 'hatahata_both_up.png',
};
const FLAG_GAME_STEP_COUNT = 5;
const FLAG_ROUND_MS = 6500;

function _flagPoseHas(pose, flag) {
  return pose === 'both' || pose === flag;
}

function _flagPoseAfter(pose, flag, up) {
  const redUp = flag === 'red' ? up : _flagPoseHas(pose, 'red');
  const whiteUp = flag === 'white' ? up : _flagPoseHas(pose, 'white');
  if (redUp && whiteUp) return 'both';
  if (redUp) return 'red';
  if (whiteUp) return 'white';
  return 'down';
}

function _flagCommandText(pose, flag, up) {
  if (up) return flag === 'red' ? 'あか あげて！' : 'しろ あげて！';
  if (pose === 'both') {
    return flag === 'red'
      ? 'しろは そのまま、あか さげて！'
      : 'あかは そのまま、しろ さげて！';
  }
  return flag === 'red' ? 'あか さげて！' : 'しろ さげて！';
}

function _buildFlagGameSteps() {
  const steps = [];
  let pose = 'down';
  let lastKey = '';
  for (let i = 0; i < FLAG_GAME_STEP_COUNT; i++) {
    const options = [];
    ['red', 'white'].forEach(function(flag) {
      const isUp = _flagPoseHas(pose, flag);
      options.push({ flag: flag, up: !isUp });
      if (isUp) options.push({ flag: flag, up: false });
    });
    let filtered = options.filter(function(opt) {
      return opt.flag + ':' + opt.up !== lastKey;
    });
    if (!filtered.length) filtered = options;
    const chosen = filtered[Math.floor(Math.random() * filtered.length)];
    const next = _flagPoseAfter(pose, chosen.flag, chosen.up);
    steps.push({
      text: _flagCommandText(pose, chosen.flag, chosen.up),
      flag: chosen.flag,
      next: next,
    });
    pose = next;
    lastKey = chosen.flag + ':' + chosen.up;
  }
  return steps;
}

function _advanceWaterBug() {
  const gs = _waterGameState;
  if (!gs || gs.locked) return;
  gs.bugPathIndex = (gs.bugPathIndex + 1) % WATER_BUG_PATH.length;
  gs.bugSlot = WATER_BUG_PATH[gs.bugPathIndex];
  _renderWaterBridgeGame();
}

function _renderWaterBridgeGame() {
  const gs = _waterGameState;
  if (!gs) return;
  const slots = document.getElementById('waterSlots');
  const bug = document.getElementById('waterAmenbo');
  const status = document.getElementById('waterStatus');
  if (slots) {
    slots.textContent = '';
    for (let i = 0; i < WATER_BRIDGE_STEPS; i++) {
      const btn = document.createElement('button');
      btn.className = 'water-slot';
      btn.type = 'button';
      btn.dataset.index = String(i);
      if (gs.placed[i]) {
        btn.classList.add('is-placed');
        btn.innerHTML = '<img src="' + MAZE_WATER_ASSET_BASE + 'plank_item.png" alt="いた">';
      } else if (i === gs.step) {
        btn.classList.add('is-next');
        if (gs.bugSlot === i && !gs.locked) btn.classList.add('is-danger');
        btn.textContent = 'ここに おく';
      } else {
        btn.textContent = '';
      }
      btn.addEventListener('click', function() { _onWaterSlotTap(i); });
      slots.appendChild(btn);
    }
  }
  if (bug) {
    bug.style.left = WATER_BUG_LEFTS[gs.bugSlot] || '50%';
    bug.src = gs.splashing ? (MAZE_WATER_ASSET_BASE + 'amenbo_splash.png') : (MAZE_WATER_ASSET_BASE + 'amenbo_skate.png');
    bug.classList.toggle('is-splashing', !!gs.splashing);
  }
  if (status) status.textContent = gs.status || '';
}

function _onWaterSlotTap(index) {
  const gs = _waterGameState;
  if (!gs || gs.locked) return;
  if (index !== gs.step) {
    gs.status = 'ひかっている ところから ならべてね';
    _renderWaterBridgeGame();
    return;
  }
  if (gs.bugSlot === index) {
    gs.locked = true;
    gs.splashing = true;
    gs.status = 'アメンボが じゃました！ もういちど';
    playMzSe('wrong');
    _renderWaterBridgeGame();
    _waterGimmickSetTimeout(function() {
      if (!_waterGameState) return;
      _waterGameState.locked = false;
      _waterGameState.splashing = false;
      _waterGameState.status = 'アメンボが はなれたら タップ！';
      _renderWaterBridgeGame();
    }, 620);
    return;
  }
  gs.placed[index] = true;
  gs.step++;
  playMzSe('correct');
  if (gs.step >= WATER_BRIDGE_STEPS) {
    _resolveWaterBridgeGame();
    return;
  }
  gs.status = 'いいね！ つぎの いたを おこう';
  _renderWaterBridgeGame();
}

}

function _paintFlagTimer(remainingMs) {
  const bar = document.getElementById('flagTimerBar');
  const txt = document.getElementById('flagTimerText');
  const remain = Math.max(0, Math.min(FLAG_ROUND_MS, remainingMs));
  const ratio = remain / FLAG_ROUND_MS;
  if (bar) bar.style.transform = 'scaleX(' + ratio.toFixed(3) + ')';
  if (txt) txt.textContent = 'あと ' + Math.ceil(remain / 1000);
}

function _startFlagRoundTimer() {
  if (!_flagGameState) return;
  _clearFlagRoundTimer();
  const gs = _flagGameState;
  gs.deadline = performance.now() + FLAG_ROUND_MS;
  gs.timeoutId = setTimeout(function() {
    if (gs !== _flagGameState || gs.locked) return;
    _resolveFlagGame(false, 'time');
  }, FLAG_ROUND_MS);
  function tick() {
    if (gs !== _flagGameState || gs.locked) return;
    const remaining = gs.deadline - performance.now();
    _paintFlagTimer(remaining);
    if (remaining > 0) {
      gs.rafId = requestAnimationFrame(tick);
    }
  }
  tick();
}

  const red = document.createElement('button');
  red.className = 'enc-btn flag-red';
  red.dataset.flag = 'red';
  red.setAttribute('aria-label', '赤');
  const white = document.createElement('button');
  white.className = 'enc-btn flag-white';
  white.dataset.flag = 'white';
  white.setAttribute('aria-label', '白');
  controls.appendChild(red);
  controls.appendChild(white);
  wrap.appendChild(controls);
  encStageEl.appendChild(wrap);
  controls.querySelectorAll('button').forEach(function(btn) {
    const stopPress = function() { btn.classList.remove('is-pressing'); };
    btn.addEventListener('pointerdown', function() { btn.classList.add('is-pressing'); });
    btn.addEventListener('pointerup', stopPress);
    btn.addEventListener('pointercancel', stopPress);
    btn.addEventListener('pointerleave', stopPress);
    btn.addEventListener('blur', stopPress);
    btn.addEventListener('click', function() {
      btn.classList.remove('is-rippling');
      void btn.offsetWidth;
      btn.classList.add('is-rippling');
      setTimeout(function() { btn.classList.remove('is-rippling'); }, 460);
      _onFlagTap(btn.dataset.flag);
    });
  });
  _renderFlagStep(true);
}

function _renderFlagStep(startTimer) {
  if (!_flagGameState) return;
  const step = _flagGameState.steps[_flagGameState.step];
  const cmd = document.getElementById('flagCommand');
  const img = document.getElementById('flagBugPose');
  if (cmd) cmd.textContent = step ? step.text : '';
  if (img) img.src = FLAG_POSE_SRC[_flagGameState.pose] || FLAG_POSE_SRC.down;
  if (startTimer !== false && !_flagGameState.locked && step) {
    _startFlagRoundTimer();
  }
}

function _onFlagTap(flag) {
  if (!_flagGameState || _flagGameState.locked) return;
  const step = _flagGameState.steps[_flagGameState.step];
  if (!step) return;
  _clearFlagRoundTimer();
  if (flag !== step.flag) {
    _resolveFlagGame(false);
    return;
  }
  _flagGameState.locked = true;
  _flagGameState.pose = step.next;
  _renderFlagStep(false);
  _flagTunnelSetTimeout(function() {
    if (!_flagGameState) return;
    _flagGameState.step++;
    _flagGameState.locked = false;
    if (_flagGameState.step >= _flagGameState.steps.length) {
      _resolveFlagGame(true);
    } else {
      _renderFlagStep(true);
    }
  }, 420);
}

function _resolveFlagGame(won, reason) {
  _clearFlagRoundTimer();
  _flagGameState = null;
  playMzSe(won ? 'correct' : 'wrong');
  if (!won) {
    const text = reason === 'time' ? 'じかんぎれ…' : 'ちがった…';
    encStageEl.innerHTML =
      '<div class="enc-result lose">' + text + '</div>' +
      '<div class="row"><button class="enc-btn lose" id="flagBackBtn">もどる ▶</button></div>';
    const back = document.getElementById('flagBackBtn');
    if (back) back.addEventListener('click', function() { _closeEncounter(false); });
    return;
  }
  _showFlagRewardSequence();
}

function _showFlagRewardSequence() {
  const st = _flagTunnelState;
  if (st) {
    st.unlocked = true;
    _updateFlagInventoryHud();
  }
  encStageEl.innerHTML =
    '<div class="flag-reward">' +
      '<div class="flag-reward__title">かった！ はしごを かけるよ</div>' +
      '<div class="flag-ladder-stage is-open" id="flagLadderStage">' +
        '<img class="flag-ladder-img" id="flagLadderImg" src="' + MAZE_FLAG_ASSET_BASE + 'rope_ladder.png" alt="なわばしご">' +
      '</div>' +
      '<div class="enc-result win" id="flagRewardText">あなに おりてみよう</div>' +
    '</div>';
  _flagTunnelSetTimeout(function() {
    const rewardText = document.getElementById('flagRewardText');
    if (rewardText) rewardText.textContent = 'はしごを つかって ワープ！';
  }, 720);
  _flagTunnelSetTimeout(function() {
    if (!_encounterActive) return;

// ── 共通: クイズ系の正解判定後の結果表示 → 次へ進むボタン ──
function _resolveQuiz(correct) {
  _simonCancelled = true; // 進行中の simon タイマーがあれば停止
  playMzSe(correct ? 'correct' : 'wrong');
  encStageEl.innerHTML =
    '<div class="enc-result ' + (correct ? 'win' : 'lose') + '">' +
      (correct ? 'せいかい！' : 'ざんねん…') +
    '</div>' +
    '<div class="row">' +
      '<button class="enc-btn ' + (correct ? 'win' : 'lose') + '" id="encNextQ">' +
        (correct ? 'すすむ ▶' : 'もどる ▶') +
      '</button>' +
    '</div>';
  document.getElementById('encNextQ').addEventListener('click', function() {
    if (correct) {
      // 勝利時のみ: お邪魔虫が観念するセリフを encStageEl に表示してから、
      // 1.6秒で自動的に _closeEncounter(true) へ進む。
      // (ミニゲーム共通 / 虫の種類ごとに文言を切り替え)
      // timer id は _creatureDefeatTimer に保存し、新しいエンカウンター開始や
      // ステージリロード等で確実にキャンセルできるようにする。
      _showCreatureDefeatDialog();
      _creatureDefeatTimer = setTimeout(function() {
        _creatureDefeatTimer = null;
        // 同じエンカウンターが続いていて (誤クローズ防止)、
        // モーダルがまだ開いている場合のみ閉じる
        if (_encounterActive) _closeEncounter(true);
      }, 1600);
    } else {
      // 敗北時は従来通り即座にバウンスバック
      _closeEncounter(false);
    }
  });
}

// 勝利後のお邪魔虫のセリフ表示。
// encStageEl の中身をこのセリフだけに差し替える (ボタンなし、自動進行)。
// XSS 対策で textContent + <br> DOM 構築。
function _showCreatureDefeatDialog() {
  // idempotency: もし前回の defeat-dialog timer が残っていたらキャンセル
  if (_creatureDefeatTimer) {
    clearTimeout(_creatureDefeatTimer);
    _creatureDefeatTimer = null;
  }
  encStageEl.textContent = '';
  const wrap = document.createElement('div');
  wrap.className = 'enc-result win';
  const data = _creatureData(_currentCreature);
  const defeatText = ((_currentCreature && _currentCreature.defeatDialog) || data.defeatDialog || CREATURE_DEFEAT_DIALOG)
    .replace(/<br\s*\/?\s*>/gi, '\n');
  defeatText.split('\n').forEach(function(line, i) {
    if (i > 0) wrap.appendChild(document.createElement('br'));
    wrap.appendChild(document.createTextNode(line));
  });
  encStageEl.appendChild(wrap);
}

const STRENGTH_TAP_REQUIRED = 18;
const STRENGTH_TAP_MS = 10000;

function _strengthRockStageIndex(count) {
  if (count >= STRENGTH_TAP_REQUIRED) return 3;
  return Math.min(3, Math.floor((count / STRENGTH_TAP_REQUIRED) * 4));
}
