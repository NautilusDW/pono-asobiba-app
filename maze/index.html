// Solve cell-level path from current pono to G (returns array of {r,c} or null)
function solveCellPath() {
  if (!stage) return null;
  const goalR = stage.goal.r, goalC = stage.goal.c;
  const startKey = pono.r + ',' + pono.c;
  const seen = new Set([startKey]);
  const parent = new Map();
  const q = [{ r: pono.r, c: pono.c }];
  while (q.length) {
    const u = q.shift();
    if (u.r === goalR && u.c === goalC) break;
    const dirs = getOpenDirs(u.r, u.c, null);
    for (const d of dirs) {
      const path = computeAutoWalk(u.r, u.c, d[0], d[1]);
      if (path.length === 0) continue;
      const last = path[path.length - 1];
      const k = last.r + ',' + last.c;
      if (seen.has(k)) continue;
      seen.add(k);
      parent.set(k, { from: u.r + ',' + u.c, segment: path });
      q.push({ r: last.r, c: last.c });
    }
  }
  const goalKey = goalR + ',' + goalC;
  if (!parent.has(goalKey) && goalKey !== startKey) return null;
  // Trace back
  const segments = [];
  let cur = goalKey;
  while (parent.has(cur)) {
    const p = parent.get(cur);
    segments.unshift(p.segment);
    cur = p.from;
  }
  // Flatten cells
  const cells = [{ r: pono.r, c: pono.c }];
  for (const seg of segments) for (const cell of seg) cells.push({ r: cell.r, c: cell.c });
  return cells;
}

// 🧚 ヒント: 解の道を 3秒間 光らせる
function activateHint() {
  if (stage && stage.type === 'image') return; // not supported in image mode (Phase 1)
  if (cleared || walkAnim) return;
  const c = getCharms();
  if (c.hint <= 0) return;
  const path = solveCellPath();
  if (!path || path.length === 0) return;
  hintCells = new Set(path.map(p => p.r + ',' + p.c));
  hintActiveUntil = performance.now() + 3000;
  usedHint++;
  localStorage.setItem('pono_maze_used_hint', String(usedHint));
  updateCharmsUI();
  showHint('🧚 ようせいが せいかいの みちを おしえてくれたよ！', 3000);
}

// 🍃 そよかぜパス: 次の1回だけ障害物を通り抜けられる
function activateBreeze() {
  if (stage && stage.type === 'image') return; // not supported in image mode (Phase 1)
  if (cleared || walkAnim) return;
  const c = getCharms();
  if (c.breeze <= 0) return;
  if (breezeActive) return; // already active
  breezeActive = true;
  usedBreeze++;
  localStorage.setItem('pono_maze_used_breeze', String(usedBreeze));
  showHint('🍃 そよかぜパス！しょうがいぶつを とおりぬけられるよ', 3000);
  // Refresh arrows so obstacle directions become tappable
  showArrows();
  updateCharmsUI();
}

// 🌟 ほしのワープ: 解の中間地点へ瞬間移動
function activateWarp() {
  if (stage && stage.type === 'image') return; // not supported in image mode (Phase 1)
  if (cleared || walkAnim) return;
  const c = getCharms();
  if (c.warp <= 0) return;
  const path = solveCellPath();
  if (!path || path.length < 4) {
    showHint('もう ゴールが ちかいよ！', 1500);
    return;
  }
  const midIdx = Math.floor(path.length / 2);
  const mid = path[midIdx];
  spawnWarpFlash(pono.r, pono.c);
  setTimeout(function() {
    pono.r = mid.r;
    pono.c = mid.c;
    if (!trail.find(t => t.r === mid.r && t.c === mid.c)) {
      trail.push({ r: mid.r, c: mid.c });
    }
    spawnWarpFlash(mid.r, mid.c);
    showArrows();
  }, 300);
  usedWarp++;
  localStorage.setItem('pono_maze_used_warp', String(usedWarp));
  showHint('🌟 ほしのワープ！とおくへ とんだよ！', 2500);
  updateCharmsUI();
}

// ====== Stage loading ======
function loadStage(idx) {
  stageIdx = idx;
  let def = STAGES[idx];
  // null/undefined slot fallback: 最初の有効なステージを探して移動
  if (!def) {
    let fallbackIdx = -1;
    for (let i = 0; i < STAGES.length; i++) {
      if (STAGES[i] && STAGES[i].type === 'image') { fallbackIdx = i; break; }
    }
    if (fallbackIdx === -1) {
      console.warn('[maze] no playable stage found; STAGES is all null');
      // 最後の手段: タイトルだけ表示
      if (overlay && ovTitle && ovMsg && ovBtn) {
        ovTitle.textContent = 'ステージが まだ ありません';
        ovMsg.textContent = 'エディタでステージを作って\n本番に保存してね';
        ovBtn.textContent = 'OK';
        ovBtn.onclick = function() { hideOverlay(); };
        showOverlay();
      }
      return;
    }
    console.log('[maze] slot', idx, 'is empty → fallback to slot', fallbackIdx);
    stageIdx = fallbackIdx;
    def = STAGES[fallbackIdx];
  }
  if (def && def.type === 'image') {
    imgLoadStage(def);
    return;
  }
  // Grid stage: revert from image-stage mode if previously set
  document.body.classList.remove('image-stage-mode');
  const charmsEl = document.getElementById('charms');
  if (charmsEl) charmsEl.style.display = '';
  if (landscapeReqEl) landscapeReqEl.classList.remove('show');
  stage = buildStage(def);
  pono = { r: stage.start.r, c: stage.start.c };
  trail = [{ r: pono.r, c: pono.c }];
  moves = 0;
  applesCollected = 0;
  cleared = false;
  walkAnim = null;
  breezeActive = false;
  hintActiveUntil = 0;
  hintCells.clear();
  hudStage.textContent = stage.name;
  hudMoves.textContent = 'てかず: 0';
  hudApples.textContent = '🍎 0/' + stage.totalApples;
  voice.style.display = '';
  encounter.classList.remove('show');
  resizeCanvas();
  showArrows();
  updateCharmsUI();

}

// ====== Clear ======
function onClear() {
  cleared = true;
  hideArrows();
  voice.style.display = 'none';
  updateCharmsUI();
  // Image stages only contribute to progression rewards when they are *official*
  // (loaded from _index.json overrides, NOT from one-off ?image=<name> previews).
  // Without this guard, a crafted ?image=... JSON could farm rewards.
  const isImageStage = stage && stage.type === 'image';
  const isOfficial   = stage && stage._official === true;
  if (!isImageStage || isOfficial) {
    if (window.incrementStat) window.incrementStat('maze_clears', 1);
    if (window.addAcornsDaily) window.addAcornsDaily('maze', 5, 5, { reason: 'maze_clear' });
  }
  playStageClearMz();
  setTimeout(function() {
    encounter.classList.add('show');
    spawnConfetti();
  }, 200);
  setTimeout(function() {
    encounter.classList.remove('show');
    // story 定義ありなら統合モーダル (救出シーン + クリア + 次へ) で完結。
    // story がないステージは従来通り別 overlay へフォールバック。
    if (stage && stage.story) {
      imgShowRescueScene(stage, function() {
        // ボタンクリック後の進行: 最終ステージなら reward → 全クリ overlay、通常は次ステージへ
        const isLast = stageIdx >= STAGES.length - 1;
        const isImageStage = stage && stage.type === 'image';
        const isOfficial   = stage && stage._official === true;
        if (isLast) {
          if (window.triggerFirstClearReward && (!isImageStage || isOfficial)) {
            window.triggerFirstClearReward('maze', {
              onClose: function() { _showMazeFinalOverlay(); }
            }).then(function(shown) {
              if (!shown) _showMazeFinalOverlay();
            }).catch(function() { _showMazeFinalOverlay(); });
          } else {
            _showMazeFinalOverlay();
          }
        } else {
          loadStage(stageIdx + 1);
        }
      });
    } else {
      showStageClearOverlay();
    }
  }, 2200);
}

function showStageClearOverlay() {
  const isImageStage = stage && stage.type === 'image';
  const isOfficial   = stage && stage._official === true;
  const isLast = stageIdx >= STAGES.length - 1;
  if (isLast) {
    // 最終ステージ: 初回クリア報酬を試みる (グリッドステージ + 公式 image ステージのみ)。
    // ?image=<name> でアクセスした非公式 image ステージは報酬対象外。
    if (window.triggerFirstClearReward && (!isImageStage || isOfficial)) {
      window.triggerFirstClearReward('maze', {
        onClose: function() { _showMazeFinalOverlay(); }
      }).then(function(shown) {
        if (!shown) _showMazeFinalOverlay();
      }).catch(function() { _showMazeFinalOverlay(); });
    } else {
      _showMazeFinalOverlay();
    }
  } else {
    ovTitle.textContent = 'ステージ クリア！';
    ovMsg.textContent = 'やったね！\nつぎの もりへ いこう！' + _dailyAcornTail('maze');
    ovBtn.textContent = 'つぎへ ▶';

}

function spawnConfetti() {

// ====== Drawing ======
function draw(now) {
  // CRITICAL: requestAnimationFrame must ALWAYS be called, even if drawing throws.
  // Otherwise the loop terminates and Pono "freezes/disappears".
  try {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (stage && stage.type === 'image') {
      imgDraw(now);
      requestAnimationFrame(draw);
      return;
    }
    if (stage) {
      // Cells
      for (let r = 0; r < stage.rows; r++) {
        for (let c = 0; c < stage.cols; c++) {
          const x = gridOX + c * cellSize;
          const y = gridOY + r * cellSize;
          drawCell(x, y, stage.cells[r][c], r, c, now);
        }
      }
      // Hint highlight (drawn over cells)
      if (now < hintActiveUntil && hintCells.size > 0) {
        const remaining = (hintActiveUntil - now) / 3000;
        const baseAlpha = Math.min(0.55, remaining * 0.65 + 0.15);
        const pulse = 0.15 * Math.sin(now / 180);
        ctx.save();
        ctx.fillStyle = 'rgba(255, 220, 80, ' + (baseAlpha + pulse).toFixed(3) + ')';
        for (const k of hintCells) {
          const [hr, hc] = k.split(',').map(Number);
          const hx = gridOX + hc * cellSize;
          const hy = gridOY + hr * cellSize;
          ctx.fillRect(hx + 2, hy + 2, cellSize - 4, cellSize - 4);
        }
        ctx.restore();
      } else if (hintActiveUntil !== 0 && now >= hintActiveUntil) {
        hintActiveUntil = 0;
        hintCells.clear();
      }
      // Trail
      for (const p of trail) {
        const x = gridOX + p.c * cellSize + cellSize / 2;
        const y = gridOY + p.r * cellSize + cellSize / 2;
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#6C8E3F';
        ctx.beginPath();
        ctx.arc(x - 4, y, 2.5, 0, Math.PI * 2);
        ctx.arc(x + 4, y, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      drawPono(now);
      // Safety net: if arrows missing while pono idle, reshow
      if (!walkAnim && !cleared && !overlay.classList.contains('show') && arrowLayer.children.length === 0) {
        showArrows();
      }
    }
  } catch (e) {
    console.error('[maze] draw error:', e);
  }
  requestAnimationFrame(draw);
}

function drawCell(x, y, tile, r, c, now) {
  if (tile === T.WALL) {
    // 周りの壁: 緑の下地 + 木のイラスト
    ctx.fillStyle = '#3E5A24';
    ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
    if (imgTree.complete && imgTree.naturalWidth > 0) {
      const sz = Math.floor(cellSize * 0.95);
      ctx.drawImage(imgTree, x + (cellSize - sz) / 2, y + (cellSize - sz) / 2, sz, sz);
    } else {
      ctx.font = Math.floor(cellSize * 0.7) + 'px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('🌳', x + cellSize / 2, y + cellSize / 2);
    }
    return;
  }

  // Walkable base
  ctx.fillStyle = (r + c) % 2 === 0 ? '#EFE7D2' : '#E8DFC4';
  ctx.fillRect(x, y, cellSize, cellSize);
  ctx.strokeStyle = 'rgba(108,142,63,0.18)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, cellSize - 1, cellSize - 1);

  if (tile === T.PATH) return;

  ctx.font = Math.floor(cellSize * 0.65) + 'px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (tile === T.GOAL) {
    if (imgHedgehog.complete && imgHedgehog.naturalWidth > 0) {
      const sz = Math.floor(cellSize * 0.85);
      const bob = Math.sin(now / 280) * 2;
      ctx.drawImage(imgHedgehog, x + (cellSize - sz) / 2, y + (cellSize - sz) / 2 + bob, sz, sz);
    } else {
      ctx.fillText('🦔', x + cellSize / 2, y + cellSize / 2);
    }
    return;
  }
  // 障害物 (CAT/WATER/THORN/STONE): 4種類のイラストを位置で散らして描画
  // CAT は「猫 = 悪役」の印象を避けるため、他の自然障害物と同じ絵でランダム表示
  if (tile === T.CAT || tile === T.WATER || tile === T.THORN || tile === T.STONE) {
    const img = _pickObstacleImg(r, c);
    if (img.complete && img.naturalWidth > 0) {
      const sz = Math.floor(cellSize * 0.88);
      ctx.drawImage(img, x + (cellSize - sz) / 2, y + (cellSize - sz) / 2, sz, sz);
    } else {
      // Fallback emoji (猫絵文字は使わない)
      let emoji = (tile === T.WATER) ? '💧' : (tile === T.THORN) ? '🌵' : '🪨';
      ctx.fillText(emoji, x + cellSize / 2, y + cellSize / 2);
    }
    return;
  }
  if (tile === T.APPLE) {
    const bob = Math.sin(now / 400 + r + c) * 2;
    if (imgApple.complete && imgApple.naturalWidth > 0) {
      const sz = Math.floor(cellSize * 0.78);
      ctx.drawImage(imgApple, x + (cellSize - sz) / 2, y + (cellSize - sz) / 2 + bob, sz, sz);
    } else {
      ctx.fillText('🍎', x + cellSize / 2, y + cellSize / 2 + bob);
    }
  }
}

function drawPono(now) {
  // Defensive: never bail out — always draw something at pono's position.
  if (!pono) pono = { r: 0, c: 0 };
  if (!Number.isFinite(pono.r)) pono.r = 0;
  if (!Number.isFinite(pono.c)) pono.c = 0;

  let pr, pc, dr = 0, dc = 0;
  if (walkAnim && walkAnim.path && walkAnim.path.length > 0) {
    const totalElapsed = now - walkAnim.t0;
    const segIdx = Math.floor(totalElapsed / walkAnim.perCell);
    if (segIdx >= walkAnim.path.length) {
      finishWalk();
      pr = pono.r; pc = pono.c;
    } else {
      const t = (totalElapsed - segIdx * walkAnim.perCell) / walkAnim.perCell;
      const seg = walkAnim.path[segIdx];
      const fromR = segIdx === 0 ? walkAnim.fromR : walkAnim.path[segIdx - 1].r;
      const fromC = segIdx === 0 ? walkAnim.fromC : walkAnim.path[segIdx - 1].c;
      pr = fromR + (seg.r - fromR) * t;
      pc = fromC + (seg.c - fromC) * t;
      dr = seg.dr; dc = seg.dc;
    }
  } else {
    pr = pono.r; pc = pono.c;
  }

  // Safety: if interpolation produced NaN, fall back to static pono position
  if (!Number.isFinite(pr) || !Number.isFinite(pc)) {
    pr = pono.r; pc = pono.c;
    dr = 0; dc = 0;
  }

  const fx = gridOX + pc * cellSize + cellSize / 2;
  const fy = gridOY + pr * cellSize + cellSize / 2;
  const walkH = Math.floor(cellSize * 0.85);
  const baseSize = Math.floor(cellSize * 0.78);

  // Decide which sprite to draw. Walk sprite has priority during walking;
  // static face is the fallback (and the only thing drawn when idle).
  const isHorizontal = walkAnim ? Math.abs(dc) > Math.abs(dr) : false;
  const sideAvailable = imgWalkSideSheet.complete && imgWalkSideSheet.naturalWidth > 0;
  const frontAvailable = imgWalkSheet.complete && imgWalkSheet.naturalWidth > 0;
  const wantsWalkSide  = !!walkAnim && isHorizontal && sideAvailable;
  const wantsWalkFront = !!walkAnim && !wantsWalkSide && frontAvailable;
  const drawingWalkSprite = wantsWalkSide || wantsWalkFront;

  if (drawingWalkSprite) {
    const elapsed = now - walkAnim.t0;
    if (wantsWalkSide) {
      const sideH = Math.floor(walkH * SIDE_WALK_SCALE);
      const sideW = Math.floor(sideH * SIDE_WALK_FRAME_W / SIDE_WALK_FRAME_H);
      const frameIdx = Math.floor(elapsed / (1000 / WALK_FPS)) % SIDE_WALK_FRAMES;
      const sx = frameIdx * SIDE_WALK_FRAME_W;
      ctx.save();
      if (dc < 0) {
        ctx.translate(fx, fy); ctx.scale(-1, 1);
        ctx.drawImage(imgWalkSideSheet, sx, 0, SIDE_WALK_FRAME_W, SIDE_WALK_FRAME_H,
                      -sideW / 2, -sideH / 2, sideW, sideH);
      } else {
        ctx.drawImage(imgWalkSideSheet, sx, 0, SIDE_WALK_FRAME_W, SIDE_WALK_FRAME_H,
                      fx - sideW / 2, fy - sideH / 2, sideW, sideH);
      }
      ctx.restore();
    } else {
      const walkW = Math.floor(walkH * WALK_FRAME_W / WALK_FRAME_H);
      const frameIdx = Math.floor(elapsed / (1000 / WALK_FPS)) % WALK_FRAMES;
      const sx = frameIdx * WALK_FRAME_W;
      ctx.drawImage(imgWalkSheet, sx, 0, WALK_FRAME_W, WALK_FRAME_H,
                    fx - walkW / 2, fy - walkH / 2, walkW, walkH);
    }
  } else if (imgPono.complete && imgPono.naturalWidth > 0) {
    // Idle (or walk sprite missing): draw static face
    ctx.drawImage(imgPono, fx - baseSize / 2, fy - baseSize / 2, baseSize, baseSize);
  } else {
    // Last-resort fallback
    ctx.font = Math.floor(cellSize * 0.6) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🐻', fx, fy);
  }
}

window.addEventListener('keydown', function(e) {
  if (stage && stage.type === 'image') { imgKeyboardHandler(e); return; }
  if (overlay.classList.contains('show') || charmTutShowing) return;
  if (cleared || walkAnim) return;
  let dr = 0, dc = 0;
  if (e.key === 'ArrowUp')    dr = -1;
  else if (e.key === 'ArrowDown')  dr = 1;
  else if (e.key === 'ArrowLeft')  dc = -1;
  else if (e.key === 'ArrowRight') dc = 1;
  else return;
  e.preventDefault();
  if (!isWalkable(pono.r + dr, pono.c + dc)) return;
  const path = computeAutoWalk(pono.r, pono.c, dr, dc);
  if (path.length > 0) startWalk(path);
});

// 2) Then handle ?image=<name> (one-off preview, takes precedence)
// 3) Then loadStage(<initial>)  — defaults to 0 (tutorial), or ?stage=N to jump
function _getInitialStageIdx() {
  try {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('stage');
    if (raw == null) return 1; // ステージ 0 は使わない方針 → デフォルトは slot 1 から
    const n = parseInt(raw, 10);
    // n >= 1 に揃えて方針一致 (?stage=0 はそもそも slot 0 が null なので fallback されるが、一貫性のため拒否)
    if (Number.isInteger(n) && n >= 1 && n < STAGES.length) return n;
    console.warn('[maze] ?stage=' + raw + ' out of range or 0, defaulting to 1');
  } catch (e) { /* ignore */ }
  return 1;
}

// タイトル画面タップ後に OP を再生してから初回 loadStage を呼ぶことで、
// 起動時にいきなり storyIntro モーダルが被さる旧バグを根本回避する。
_loadImageStageIndex()

// ---- OP 再生 (op-layout.json 駆動) ---------------------------------------
// タイトル画面タップ後に overlay を動的生成して BG (op_scale.png) + frame +
// ビート毎テキスト + ナレーション再生を行う。終了時に onDone() を呼ぶ。
// fetch / 設定欠落時は overlay を出さずに onDone() を即時呼ぶ (safe fallback)。
function _mazeOpHexToRgba(hex, alpha) {
  let h = String(hex || '#000000').replace(/^#/, '');
  // 3-digit shorthand (#FFF / #abc) を 6-digit に展開しないと parseInt('F', 16)=15 で
  // rgba(15,15,15,…) という極端な黒寄りの色に化ける (frame.bg.color のショートハンド対応)
  if (/^[0-9a-fA-F]{3}$/.test(h)) {
    h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
  }
  if (!/^[0-9a-fA-F]{6}$/.test(h)) h = '000000';  // 不正値の安全な fallback
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + (Number(alpha) || 0) + ')';
}

async function playMazeOpening(onDone) {
  let cfg;
  try {
    const r = await fetch('op-layout.json?_=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error('op-layout HTTP ' + r.status);
    cfg = await r.json();
  } catch (e) {
    console.warn('[maze-op] config load failed, skipping OP:', e);
    if (typeof onDone === 'function') onDone();
    return;
  }

  const beats  = Array.isArray(cfg && cfg.beats) ? cfg.beats : [];
  const audios = Array.isArray(cfg && cfg.narrationAudio) ? cfg.narrationAudio : [];
  if (beats.length === 0) {
    if (typeof onDone === 'function') onDone();
    return;
  }

  // overlay を動的生成 (CSS は <style> で定義済)
  const tpl = ''
    + '<div id="maze-op-overlay">'
    +   '<div id="maze-op-stage">'
    +     '<div id="maze-op-frame-box">'
    +       '<div id="maze-op-text"></div>'
    +     '</div>'
    +     '<div id="maze-op-step">'
    +       '<button id="maze-op-skip" type="button">スキップ</button>'
    +       '<button id="maze-op-next" type="button">タップしてつづける ▶</button>'
    +     '</div>'
    +   '</div>'
    + '</div>';
  document.body.insertAdjacentHTML('beforeend', tpl);

  const overlay = document.getElementById('maze-op-overlay');
  const fbox    = document.getElementById('maze-op-frame-box');
  const textEl  = document.getElementById('maze-op-text');
  const nextBtn = document.getElementById('maze-op-next');
  const skipBtn = document.getElementById('maze-op-skip');

  // layout 設定を box / text / frame / bg に反映
  const L  = (cfg && cfg.layout) || {};
  const box = L.box   || { xPct: 50, yPct: 84, widthPct: 60, heightPct: 30 };
  const tx  = L.text  || {};
  const bg  = L.bg    || {};
  const fr  = L.frame || {};

  fbox.style.left  = (Number(box.xPct) || 50) + '%';
  fbox.style.top   = (Number(box.yPct) || 84) + '%';
  fbox.style.width = (Number(box.widthPct) || 60) + '%';

  if (fr.enabled && fr.src) {
    // frame.src は editor の `../assets/...` 形式を maze ランタイムでもそのまま使える
    const safe = String(fr.src).replace(/['"\\)]/g, '');
    fbox.style.backgroundImage = "url('" + safe + "')";
    fbox.style.backgroundColor = 'transparent';
    if (fr.lockAspect) {
      // frame 自然サイズで aspect-ratio を固定 (= 高さは width / aspect で自動決定)。
      // 旧実装は probe.onload を待たずに showBeat(0) を呼んでいたため、 beat 0 表示中に
      // heightPct fallback → aspect-ratio に瞬時切替が走り text 領域が一瞬ずれる現象が出ていた。
      // ここで probe 完了 (最大 1500ms) を await して aspect-ratio 確定後に先へ進める。
      const ratio = await Promise.race([
        new Promise(function(resolve) {
          const probe = new Image();
          probe.onload = function() {
            if (probe.naturalWidth > 0 && probe.naturalHeight > 0) {
              resolve(probe.naturalWidth + ' / ' + probe.naturalHeight);
            } else {
              resolve(null);
            }
          };
          probe.onerror = function() { resolve(null); };
          probe.src = safe;
        }),
        new Promise(function(resolve) { setTimeout(function(){ resolve(null); }, 1500); })
      ]);
      if (ratio) {
        fbox.style.aspectRatio = ratio;
        fbox.style.height = 'auto';
      } else {
        // probe 失敗 / timeout 時は heightPct fallback
        fbox.style.height = (Number(box.heightPct) || 30) + '%';
      }
    } else {
      fbox.style.height = (Number(box.heightPct) || 30) + '%';
    }
  } else {
    fbox.style.height = (Number(box.heightPct) || 30) + '%';
    fbox.style.backgroundColor = _mazeOpHexToRgba(bg.color || '#000', bg.alpha || 0);
    fbox.style.borderRadius    = (Number(bg.radius) || 0) + 'px';
  }
  fbox.style.padding = (Number(bg.padding) || 16) + 'px';

  textEl.style.fontSize      = (Number(tx.fontSize) || 20) + 'px';
  textEl.style.lineHeight    = (tx.lineHeight != null ? tx.lineHeight : 1.5);
  textEl.style.color         = tx.color || '#3a2818';
  textEl.style.textAlign     = tx.align || 'center';
  textEl.style.letterSpacing = (Number(tx.letterSpacing) || 0) + 'em';

  overlay.classList.add('is-active');

  // ビート進行制御
  let idx = 0;
  let currentAudio = null;
  let _finished = false;

  function stopAudio() {
    if (currentAudio) {
      try { currentAudio.pause(); currentAudio.currentTime = 0; } catch (_) {}
      currentAudio = null;
    }
  }

  // タブ切替/別アプリへ遷移時に OP audio を即停止 (global registry が closure-local Audio を
  // 管理できないため、 overlay scope で visibilitychange を購読する)。 復帰時は自動再生せず、
  // ユーザーが nextBtn をタップして次ビートへ進むまで無音 (子供向けに安全側の挙動)。
  const _onVisChange = function() {
    if (document.hidden) stopAudio();
  };
  document.addEventListener('visibilitychange', _onVisChange);

  function showBeat(i) {
    stopAudio();
    textEl.textContent = beats[i] || '';
    const audioPath = audios[i];
    if (audioPath) {
      try {
        currentAudio = new Audio(audioPath);
        currentAudio.volume = 0.85;
        // タイトルタップ起因の文脈なので autoplay 制限を通過できる
        const p = currentAudio.play();
        if (p && typeof p.catch === 'function') {
          p.catch(function(e) { console.warn('[maze-op] audio play failed:', e); });
        }
      } catch (e) {
        console.warn('[maze-op] audio init failed:', e);
      }
    }
    nextBtn.textContent = (i === beats.length - 1) ? 'はじめる ▶' : 'タップしてつづける ▶';
  }

  function finish() {
    // 子供の連打で nextBtn が複数回叩かれて onDone (= loadStage) が二重起動するのを防ぐ
    if (_finished) return;
    _finished = true;
    stopAudio();
    document.removeEventListener('visibilitychange', _onVisChange);
    overlay.classList.remove('is-active');
    if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
    if (typeof onDone === 'function') onDone();
  }

  nextBtn.addEventListener('click', function() {
    if (idx < beats.length - 1) {
      idx++;
      showBeat(idx);
    } else {
      finish();
    }
  });
  skipBtn.addEventListener('click', finish);

  // 初回ビート表示
  showBeat(0);
}

// タイトル画面タップ → (OP 再生 →) 初回 loadStage
// ?stage=N / ?image=<name> 直リンク時は OP をスキップして即 loadStage (デバッグ/直リンク用途)
(function() {
  var ts = document.getElementById('title-screen');
  if (!ts) return;
  ts.addEventListener('click', function() {
    ts.classList.add('hidden');
    var params;
    try { params = new URLSearchParams(window.location.search); } catch (_) { params = null; }
    var hasStageParam = params && params.has('stage');
    var hasImageParam = params && params.has('image');
    if (hasStageParam || hasImageParam) {
      // 直リンク (デバッグ含む) は OP スキップ
      loadStage(_getInitialStageIdx());
    } else {
      playMazeOpening(function() { loadStage(_getInitialStageIdx()); });
    }
  }, { once: true });
})();
</script>
</body>
</html>
