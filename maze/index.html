function _renderStrengthPushGame() {
  const gs = _strengthGameState;
  if (!gs) return;
  const rockImg = document.getElementById('strengthRockImg');
  const durabilityBar = document.getElementById('strengthDurabilityBar');
  const hpText = document.getElementById('strengthHpText');
  const bar = document.getElementById('strengthTimeBar');
  const status = document.getElementById('strengthStatus');
  const stageIdx = _strengthRockStageIndex(gs.tapCount);
  if (rockImg) rockImg.src = MAZE_STRENGTH_ASSET_BASE + 'rock_break_' + stageIdx + '.png';
  const damageRatio = Math.max(0, Math.min(1, gs.tapCount / gs.required));
  const hpRatio = Math.max(0, 1 - damageRatio);
  if (durabilityBar) {
    durabilityBar.style.setProperty('--hp', hpRatio.toFixed(3));
    durabilityBar.style.transform = 'scaleX(' + hpRatio.toFixed(3) + ')';
    durabilityBar.classList.toggle('is-low', hpRatio > 0 && hpRatio <= 0.3);
  }
  if (hpText) {
    hpText.textContent = Math.ceil(hpRatio * 100) + '%';
  }
  const remain = Math.max(0, gs.deadline - performance.now());
  if (bar) bar.style.transform = 'scaleX(' + (remain / STRENGTH_TAP_MS).toFixed(3) + ')';
  if (status) {
    status.textContent = gs.status || 'いわを れんだして たいりょくを けずろう！';
  }
  if (!gs.locked && remain <= 0) _failStrengthPushGame();
}

function _spawnStrengthDebrisBurst(finalHit) {
  const layer = document.getElementById('strengthDebrisLayer');
  if (!layer) return;
  const count = finalHit ? 18 : 7;
  for (let i = 0; i < count; i++) {
    const img = document.createElement('img');
    img.className = 'strength-chip';
    img.src = MAZE_STRENGTH_CHIP_SRCS[Math.floor(Math.random() * MAZE_STRENGTH_CHIP_SRCS.length)];
    img.alt = '';
    const angle = (-Math.PI * 0.9) + Math.random() * (Math.PI * 1.8);
    const distance = (finalHit ? 118 : 58) + Math.random() * (finalHit ? 122 : 72);
    const lift = finalHit ? -26 : -16;
    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance + lift;
    const size = (finalHit ? 24 : 15) + Math.random() * (finalHit ? 34 : 22);
    const duration = (finalHit ? 620 : 420) + Math.random() * (finalHit ? 280 : 180);
    img.style.setProperty('--dx', dx.toFixed(1) + 'px');
    img.style.setProperty('--dy', dy.toFixed(1) + 'px');
    img.style.setProperty('--ox', ((Math.random() - 0.5) * 34).toFixed(1) + 'px');
    img.style.setProperty('--oy', ((Math.random() - 0.5) * 24).toFixed(1) + 'px');
    img.style.setProperty('--size', size.toFixed(1) + 'px');
    img.style.setProperty('--rot', ((Math.random() > 0.5 ? 1 : -1) * (160 + Math.random() * 420)).toFixed(1) + 'deg');
    img.style.setProperty('--dur', duration.toFixed(0) + 'ms');
    img.style.setProperty('--scale', (0.72 + Math.random() * 0.46).toFixed(2));
    layer.appendChild(img);
    setTimeout(function() { img.remove(); }, duration + 80);
  }
}

function _onStrengthRockTap() {
  const gs = _strengthGameState;
  if (!gs || gs.locked) return;
  gs.tapCount = Math.min(gs.required, gs.tapCount + 1);
  const punchHand = (gs.tapCount % 2 === 1) ? 'right' : 'left';
  gs.lastPunchHand = punchHand;
  const finalHit = gs.tapCount >= gs.required;
  const damageRatio = Math.max(0, Math.min(1, gs.tapCount / gs.required));
  gs.status = finalHit
    ? 'くだけた！'
    : (damageRatio >= 0.7 ? 'あと もうすこし！' : (damageRatio >= 0.4 ? 'ひびが はいってきた！' : 'れんだして くだこう！'));
  playRockHit(finalHit);
  _spawnStrengthDebrisBurst(finalHit);
  const btn = document.getElementById('strengthRockBtn');
  if (btn) {
    btn.classList.remove('is-hit', 'is-hit-left', 'is-hit-right');
    void btn.offsetWidth;
    const hitClass = punchHand === 'right' ? 'is-hit-right' : 'is-hit-left';
    btn.classList.add('is-hit', hitClass);
    setTimeout(function() {
      btn.classList.remove('is-hit', hitClass);
    }, 260);
  }
  _renderStrengthPushGame();
  if (gs.tapCount >= gs.required) _resolveStrengthPushGame();
}

function _failStrengthPushGame() {
  const gs = _strengthGameState;
  if (!gs || gs.locked) return;
  gs.locked = true;
  gs.status = 'もういちど やってみよう';
  playMzSe('wrong');
  _renderStrengthPushGame();
  _strengthGimmickSetTimeout(function() {
    if (!_strengthGameState) return;
    _strengthGameState.tapCount = 0;
    _strengthGameState.deadline = performance.now() + STRENGTH_TAP_MS;
    _strengthGameState.locked = false;
    _strengthGameState.status = 'いわを れんだして たいりょくを けずろう！';
    _renderStrengthPushGame();
  }, 900);
}

function _resolveStrengthPushGame() {
  const st = _strengthGimmickState;
  if (st) st.rockMoved = true;
  _updateFlagInventoryHud();
  _clearStrengthGimmickTimers();
  _strengthGameState = null;
  playMzSe('correct');
  encStageEl.innerHTML =
    '<div class="enc-result win strength-clear">' +
      '<img class="strength-clear__burst" src="' + MAZE_STRENGTH_ASSET_BASE + 'power_spark.png" alt="">' +
      '<img class="enc-result__icon" src="' + MAZE_STRENGTH_ASSET_BASE + 'rock_break_3.png" alt="くだけたいわ">' +
      '<div>いわが くだけた！</div>' +
      '<div class="strength-game__status">みちが ひらいたよ！</div>' +
    '</div>';
  _strengthGimmickSetTimeout(function() {
    if (_encounterActive) _closeEncounter(true);
  }, 1300);
}

let _bowlEncounterCount = 0;

function _bowlReducedMotion() {
  try {
    return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  } catch (_) { return false; }
}

function _bowlClamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

function _bowlLaneTFromY(gs, y) {
  const top = gs.h * BOWL_HORIZON_REL;
  const bottom = gs.h * BOWL_LANE_BOTTOM_REL;
  return _bowlClamp((y - top) / Math.max(1, bottom - top), 0, 1);
}

function _bowlDepthScaleAt(gs, y) {
  const t = _bowlLaneTFromY(gs, y);
  return 0.56 + Math.pow(t, 0.72) * 0.62;
}

function _bowlLaneBoundsAt(gs, y) {
  const t = _bowlLaneTFromY(gs, y);
  const e = Math.pow(t, 0.86);
  const left = gs.w * (BOWL_LANE_TOP_LEFT_REL + (BOWL_LANE_BOTTOM_LEFT_REL - BOWL_LANE_TOP_LEFT_REL) * e);
  const right = gs.w * (BOWL_LANE_TOP_RIGHT_REL + (BOWL_LANE_BOTTOM_RIGHT_REL - BOWL_LANE_TOP_RIGHT_REL) * e);
  return { left: left, right: right, width: Math.max(1, right - left), t: t, ease: e };
}

function _bowlLanePoint(gs, laneX, y) {
  const b = _bowlLaneBoundsAt(gs, y);
  return b.left + _bowlClamp(laneX, 0, 1) * b.width;
}

function _bowlPinLayoutYRel(yRel) {
  const sourceMin = 0.14;
  const sourceMax = 0.54;
  const t = _bowlClamp((yRel - sourceMin) / Math.max(0.001, sourceMax - sourceMin), 0, 1);
  return BOWL_PIN_FIELD_TOP_REL + t * (BOWL_PIN_FIELD_BOTTOM_REL - BOWL_PIN_FIELD_TOP_REL);
}

function _bowlPinMetrics(gs, pin) {
  const minDim = Math.min(gs.w, gs.h);
  const depthT = _bowlLaneTFromY(gs, pin.y);
  const scale = 0.48 + Math.pow(depthT, 0.82) * 0.98;
  const r = BOWL_PIN_R_REL * minDim * scale;
  const img = _bowlBugImg(pin.kind);
  const naturalAspect = img && img.naturalWidth ? (img.naturalWidth / Math.max(1, img.naturalHeight)) : 0.9;
  const aspect = _bowlClamp(naturalAspect, 0.66, 1.28);
  const drawH = minDim * 0.18 * scale;
  const drawW = drawH * aspect;
  const minHit = BOWL_HIT_R_REL * minDim;
  return {
    scale: scale,
    r: r,
    drawH: drawH,
    drawW: drawW,
    hitX: pin.x,
    hitY: pin.y - drawH * 0.48,
    hitRx: Math.max(minHit, drawW * 0.34),
    hitRy: Math.max(minHit * 0.92, drawH * 0.38),
  };
}

function _bowlDonguriHitRadius(gs, d, y) {
  const depthScale = _bowlDepthScaleAt(gs, Number.isFinite(y) ? y : d.y);
  return Math.max(3, (d.r || 0) * depthScale * 0.62);
}

function _bowlPinMassForKind(kind) {
  if (kind === 'kabuto') return 1.24;
  if (kind === 'pyon') return 0.88;
  if (kind === 'hachi') return 0.93;
  if (kind === 'odoke') return 1.05;
  return 0.98;
}

function _bowlPinStability(kind, idx, yRatio) {
  const mass = _bowlPinMassForKind(kind);
  const backBrace = yRatio <= 0.30 ? 0.05 : 0;
  const deterministic = ((idx * 37) % 5) * 0.030;
  return 0.66 + mass * 0.18 + backBrace + deterministic;
}

function _bowlBugImg(kind) {
  const data = CREATURE_KIND_DATA[kind] || CREATURE_KIND_DATA.mayoi;
  if (!data || !data.imageUrl) return null;
  return _creatureImg(data.imageUrl);
}

function _preloadBowlBugPins(gs) {
  // _bowlBugImg() / _creatureImg() returns null while the Image is still loading
  // (it guards on complete && naturalWidth>0), so we cannot use its return value
  // to attach a 'load' listener. Reach into _creatureImgCache directly to get the
  // underlying Image regardless of completion state. v1055: previously the load
  // listener never attached, so reducedMotion users saw only fallback ellipses.
  BOWL_BUG_PIN_KINDS.forEach(function(kind) {
    const data = CREATURE_KIND_DATA[kind] || CREATURE_KIND_DATA.mayoi;
    const url = data && data.imageUrl;
    if (!url) return;
    // Ensure cache entry exists (kicks off the request if first time).
    _creatureImg(url);
    const img = _creatureImgCache[url];
    if (!img) return;
    if (img.complete && img.naturalWidth > 0) return; // already loaded
    img.addEventListener('load', function() {
      if (gs === _bowlGameState) _drawBowlScene(gs, performance.now());
    }, { once: true });
  });
  // Safety net for prefers-reduced-motion: there is no rAF repaint loop in
  // reducedMotion mode, so if a sprite finishes decoding after the modal opens
  // but the 'load' event fires before the listener above is attached (rare race
  // on warm caches) or the addEventListener path is otherwise missed, force a
  // single repaint shortly after open so cached sprites surface.
  if (gs && gs.reducedMotion) {
    setTimeout(function() {
      if (gs === _bowlGameState) _drawBowlScene(gs, performance.now());
    }, 400);
  }
}

function _updateBowlPinMotion(gs, now) {
  if (!gs || gs.reducedMotion) return;
  for (let i = 0; i < gs.pins.length; i++) {
    const p = gs.pins[i];
    if (!p || p.fallen || !p.swayAmpLane) continue;
    const phase = (now / (p.swaySpeed || BOWL_SWAY_SPEED_MS)) * Math.PI * 2 + (p.swayPhase || 0);
    p.laneX = _bowlClamp(p.baseLaneX + Math.sin(phase) * p.swayAmpLane, 0.08, 0.92);
    p.x = _bowlLanePoint(gs, p.laneX, p.y);
  }
}

// 他のミニゲーム (flag/water) と揃え、リスナー解除を明示的に行う。
// _resolveBowlGame と _closeEncounter の web_sweep/donguri_bowl 分岐から呼ばれる。
function _detachBowlListeners(gs) {
  if (!gs) return;
  try {
    if (gs._onPointerDown && gs.stageEl) {
      gs.stageEl.removeEventListener('pointerdown', gs._onPointerDown);
    }
  } catch (_) {}
  try {
    if (gs._onPointerMove && gs.stageEl) {
      gs.stageEl.removeEventListener('pointermove', gs._onPointerMove);
    }
  } catch (_) {}
  try {
    if (gs._onPointerUp && gs.stageEl) {
      gs.stageEl.removeEventListener('pointerup', gs._onPointerUp);
      gs.stageEl.removeEventListener('lostpointercapture', gs._onPointerUp);
    }
  } catch (_) {}
  try {
    if (gs._onPointerCancel && gs.stageEl) {
      gs.stageEl.removeEventListener('pointercancel', gs._onPointerCancel);
    }
  } catch (_) {}
  try {
    if (gs._onBossIntroStart && gs.bossIntroBtn) {
      gs.bossIntroBtn.removeEventListener('pointerdown', gs._onBossIntroStart);
      gs.bossIntroBtn.removeEventListener('click', gs._onBossIntroStart);
    }
  } catch (_) {}
  try {
    if (gs._onResize) window.removeEventListener('resize', gs._onResize);
  } catch (_) {}
  gs._onPointerDown = null;
  gs._onPointerMove = null;
  gs._onPointerUp = null;
  gs._onPointerCancel = null;
  gs._onBossIntroStart = null;
  gs._onResize = null;
  if (gs.rafId) { try { cancelAnimationFrame(gs.rafId); } catch (_) {} gs.rafId = null; }
}

// _clearBowlGimmickTimers は _clearWebGimmickTimers に統合済み (v1052)。

function _pickBowlLayoutId(creature) {
  // 決定論的: encounter 計数 + creature.id のハッシュを使う (Math.random 不使用)
  const ids = BOWL_PIN_LAYOUTS.map(function(l){ return l.id; });
  if (_bowlEncounterCount <= 1) return 'TRIANGLE';
  let seed = _bowlEncounterCount | 0;
  const key = (creature && creature.id) || '';
  for (let i = 0; i < key.length; i++) seed = (seed * 31 + key.charCodeAt(i)) | 0;
  if (seed < 0) seed = -seed;
  return ids[seed % ids.length];
}

function _bowlPointer(canvasEl, e) {
  const r = canvasEl.getBoundingClientRect();
  const x = (e.clientX - r.left);
  const y = (e.clientY - r.top);
  return {
    x: Math.max(0, Math.min(r.width, x)),
    y: Math.max(0, Math.min(r.height, y)),
  };
}

function _resizeBowlCanvas(gs) {
  const r = gs.stageEl.getBoundingClientRect();
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  gs.dpr = dpr;
  gs.w = r.width;
  gs.h = r.height;
  gs.canvas.width = Math.floor(r.width * dpr);
  gs.canvas.height = Math.floor(r.height * dpr);
  gs.canvas.style.width = r.width + 'px';
  gs.canvas.style.height = r.height + 'px';
  gs.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function _syncBowlCanvasSize(gs) {
  if (!gs || !gs.stageEl) return;
  const r = gs.stageEl.getBoundingClientRect();
  if (Math.abs(r.width - gs.w) <= 1 && Math.abs(r.height - gs.h) <= 1) return;
  _resizeBowlCanvas(gs);
  if (gs.layoutId && gs.phase === 'pins') {
    _layoutBowlPins(gs, gs.layoutId);
  } else if (gs.phase === 'boss') {
    _updateBowlBossMotion(gs, performance.now());
  }
}

function _layoutBowlPins(gs, layoutId) {
  const layout = BOWL_PIN_LAYOUTS.find(function(l){ return l.id === layoutId; }) || BOWL_PIN_LAYOUTS[0];
  gs.layoutId = layout.id;
  const layoutOffset = Math.max(0, BOWL_PIN_LAYOUTS.findIndex(function(l){ return l.id === layout.id; }));
  gs.pins = layout.pins.map(function(p, idx) {
    const baseLaneX = _bowlClamp(p.x, 0.06, 0.94);
    const baseYRel = _bowlPinLayoutYRel(p.y);
    const baseY = Math.max(gs.h * (BOWL_HORIZON_REL + 0.025), baseYRel * gs.h);
    const baseX = _bowlLanePoint(gs, baseLaneX, baseY);
    const isBackMover = p.y <= 0.36 && ((idx + layoutOffset) % 3 === 0 || layout.id === 'DOUBLE_ROW');
    const isMidMover = p.y <= 0.28 && ((idx + layoutOffset) % 4 === 1);
    const swayAmpLane = isBackMover ? 0.13 : (isMidMover ? 0.085 : 0);
    const kind = p.kind || BOWL_BUG_PIN_KINDS[(idx + layoutOffset) % BOWL_BUG_PIN_KINDS.length];
    const mass = _bowlPinMassForKind(kind);
    return {
      id: idx,
      x: baseX,
      y: baseY,
      baseX: baseX,
      baseY: baseY,
      laneX: baseLaneX,
      baseLaneX: baseLaneX,
      kind: kind,
      mass: mass,
      stability: _bowlPinStability(kind, idx + layoutOffset, p.y),
      impactEnergy: 0,
      tilt: 0,
      tiltVelocity: 0,
      tiltDirX: 0,
      joltX: 0,
      joltY: 0,
      joltVx: 0,
      joltVy: 0,
      squash: 0,
      shakePower: 0,
      shakePhase: idx * 1.37 + layoutOffset * 0.91,
      lastImpactEffective: 0,
      lastImpactAt: 0,
      wobbleUntil: 0,
      lastWobbleTextAt: 0,
      swayAmpLane: swayAmpLane,
      swayPhase: idx * 0.83 + layoutOffset * 0.57,
      swaySpeed: BOWL_SWAY_SPEED_MS + ((idx + layoutOffset) % 5) * 130,
      fallen: false,
      fallStart: 0,
      fallProgress: 0,
      fallRotDirX: 0,
      fallRotDirY: 0,
    };
  });
}

function _showBowlGame(c) {
  _setEncounterMode('web_sweep'); // 互換トークン: card レイアウトは既存を流用
  const reducedMotion = _bowlReducedMotion();
  _clearWebGimmickTimers();
  _bowlEncounterCount = (_bowlEncounterCount + 1) | 0;

  const wrap = document.createElement('div');
  wrap.className = 'bowl-game';
  wrap.innerHTML =
    '<div class="bowl-game__title">びっくり ボーリング</div>' +
    '<div class="bowl-game__stage" id="bowlStage">' +
      '<canvas class="bowl-game__canvas" id="bowlCanvas" aria-label="どんぐりを ころがして おじゃま虫を たおすゲーム"></canvas>' +
      '<div class="bowl-game__boss-intro" id="bowlBossIntro" hidden>' +
        '<div class="bowl-game__boss-intro-panel">' +
          '<p class="bowl-game__boss-intro-title">ボスが あらわれた！</p>' +
          '<p class="bowl-game__boss-intro-body">ボタンを なんども おして<br>どんぐりを いっぱい あてよう！</p>' +
          '<button class="bowl-game__boss-intro-btn" id="bowlBossIntroBtn" type="button">タップ スタート ▶</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="bowl-game__stage-note">下から上へ なぞって はなそう！</div>';
  encStageEl.innerHTML = '';
  encStageEl.appendChild(wrap);

  const stageEl  = wrap.querySelector('#bowlStage');
  const canvasEl = wrap.querySelector('#bowlCanvas');
  const ctx = canvasEl.getContext('2d');
  const gs = {
    stageEl: stageEl, canvas: canvasEl, ctx: ctx,
    noteEl: wrap.querySelector('.bowl-game__stage-note'),
    bossIntroEl: wrap.querySelector('#bowlBossIntro'),
    bossIntroBtn: wrap.querySelector('#bowlBossIntroBtn'),
    w: 0, h: 0, dpr: 1,
    layoutId: null, pins: [], donguris: [],
    particles: [], effects: [],
    phase: 'pins',
    boss: null,
    bossHits: 0,
    lastBossHitAt: 0,
    bossHitCombo: 0,
    lastThrowAt: 0, locked: false,
    rafId: null, lastTs: 0,
    bgSeed: (_bowlEncounterCount * 1013904223) | 0,
    reducedMotion: reducedMotion,
    aimDrag: null,
  };
  _bowlGameState = gs;

  _resizeBowlCanvas(gs);
  _preloadBowlBugPins(gs);
  if (imgBowlBoss && !(imgBowlBoss.complete && imgBowlBoss.naturalWidth > 0)) {
    imgBowlBoss.addEventListener('load', function() {
      if (gs === _bowlGameState) _drawBowlScene(gs, performance.now());
    }, { once: true });
  }
  if (imgBowlLaneBg && !(imgBowlLaneBg.complete && imgBowlLaneBg.naturalWidth > 0)) {
    imgBowlLaneBg.addEventListener('load', function() {
      if (gs === _bowlGameState) _drawBowlScene(gs, performance.now());
    }, { once: true });
  }
  _layoutBowlPins(gs, _pickBowlLayoutId(c));
  requestAnimationFrame(function() {
    if (gs !== _bowlGameState) return;
    _syncBowlCanvasSize(gs);
    _drawBowlScene(gs, performance.now());
  });

  const onPointerDown = function(e) {
    if (gs !== _bowlGameState || gs.locked) return;
    const now = performance.now();
    try { e.preventDefault(); } catch (_) {}
    const p = _bowlPointer(canvasEl, e);
    if (gs.phase === 'boss') {
      const cooldown = BOWL_BOSS_THROW_COOLDOWN_MS;
      if (now - gs.lastThrowAt < cooldown) return;
      if (gs.reducedMotion) {
        _registerBowlBossHit(gs, now, (gs.boss && gs.boss.x) || p.x, (gs.boss && gs.boss.y) || p.y);
        gs.lastThrowAt = now;
        _drawBowlScene(gs, now);
        if (gs.boss && now >= gs.boss.endsAt && !gs.locked) {
          gs.locked = true;
          _finishBowlGame(gs);
        }
      } else {
        _applyBowlBossShot(gs, p.x, p.y);
      }
    } else if (gs.phase === 'pins') {
      if (p.y < gs.h * BOWL_SWIPE_START_Y_REL) {
        if (gs.noteEl) gs.noteEl.textContent = '手前から なぞって はなそう！';
        return;
      }
      gs.aimDrag = {
        pointerId: e.pointerId,
        startX: p.x,
        startY: p.y,
        currentX: p.x,
        currentY: p.y,
        startedAt: now,
      };
      if (gs.noteEl) gs.noteEl.textContent = '上へ なぞって はなそう！';
      try { stageEl.setPointerCapture(e.pointerId); } catch (_) {}
    }
  };
  const onPointerMove = function(e) {
    if (gs !== _bowlGameState || !gs.aimDrag || gs.aimDrag.pointerId !== e.pointerId) return;
    try { e.preventDefault(); } catch (_) {}
    const p = _bowlPointer(canvasEl, e);
    gs.aimDrag.currentX = p.x;
    gs.aimDrag.currentY = p.y;
    if (gs.reducedMotion) _drawBowlScene(gs, performance.now());
  };
  const onPointerUp = function(e) {
    if (gs !== _bowlGameState || !gs.aimDrag || gs.aimDrag.pointerId !== e.pointerId) return;
    try { e.preventDefault(); } catch (_) {}
    const p = _bowlPointer(canvasEl, e);
    gs.aimDrag.currentX = p.x;
    gs.aimDrag.currentY = p.y;
    try { stageEl.releasePointerCapture(e.pointerId); } catch (_) {}
    _finishBowlSwipe(gs, false);
    if (gs.reducedMotion && gs.phase !== 'boss') _stepBowlReducedMotion(gs);
  };
  const onPointerCancel = function(e) {
    if (gs !== _bowlGameState || !gs.aimDrag || gs.aimDrag.pointerId !== e.pointerId) return;
    try { stageEl.releasePointerCapture(e.pointerId); } catch (_) {}
    _finishBowlSwipe(gs, true);
  };
  stageEl.addEventListener('pointerdown', onPointerDown);
  stageEl.addEventListener('pointermove', onPointerMove);
  stageEl.addEventListener('pointerup', onPointerUp);
  stageEl.addEventListener('pointercancel', onPointerCancel);
  stageEl.addEventListener('lostpointercapture', onPointerUp);
  gs._onPointerDown = onPointerDown;
  gs._onPointerMove = onPointerMove;
  gs._onPointerUp = onPointerUp;
  gs._onPointerCancel = onPointerCancel;

  const onBossIntroStart = function(e) {
    if (gs !== _bowlGameState || gs.phase !== 'boss_intro') return;
    try { e.preventDefault(); e.stopPropagation(); } catch (_) {}
    _startBowlBossPhase(gs, performance.now());
  };
  if (gs.bossIntroBtn) {
    gs.bossIntroBtn.addEventListener('pointerdown', onBossIntroStart);
    gs.bossIntroBtn.addEventListener('click', onBossIntroStart);
  }
  gs._onBossIntroStart = onBossIntroStart;

  const onResize = function() {
    if (gs !== _bowlGameState) { window.removeEventListener('resize', onResize); return; }
    _resizeBowlCanvas(gs);
    if (gs.phase === 'pins') {
      _layoutBowlPins(gs, gs.layoutId);
    } else {
      _updateBowlBossMotion(gs, performance.now());
    }
    if (gs.reducedMotion) _drawBowlScene(gs, performance.now());
  };
  window.addEventListener('resize', onResize);
  gs._onResize = onResize;

  if (gs.reducedMotion) {
    // 初期 1 フレームだけ描画。以後は onPointerDown でのみ再描画する。
    _drawBowlScene(gs, performance.now());
  } else {
    _startBowlLoop(gs);
  }
}

// prefers-reduced-motion 用: タップ毎に呼び出され、軌道上の最近接ピンを即解決し
// 1 パス描画する。rAF を回さない。
function _stepBowlReducedMotion(gs) {
  if (gs !== _bowlGameState) return;
  const now = performance.now();
  if (!gs.donguris.length) return;
  const d = gs.donguris[gs.donguris.length - 1];
  let nearest = null, bestD2 = Infinity;
  for (let i = 0; i < gs.pins.length; i++) {
    const p = gs.pins[i];
    if (p.fallen) continue;
    const dx = p.x - d.x, dy = p.y - d.y;
    const dd = dx * dx + dy * dy;
    if (dd < bestD2) { bestD2 = dd; nearest = p; }
  }
  if (nearest) {
    const len = Math.max(0.001, Math.sqrt(bestD2));
    _bowlApplyPinImpact(gs, nearest, nearest.stability * Math.max(1, nearest.mass || 1) * 1.12, (nearest.x - d.x) / len, (nearest.y - d.y) / len, 0, now);
    // pin tween を飛ばし、倒れた pin は fallProgress を即 1 に
    for (let i = 0; i < gs.pins.length; i++) {
      const p = gs.pins[i];
      if (p.fallen) p.fallProgress = 1;
    }
  }
  gs.donguris.length = 0;
  gs.particles.length = 0;
  _drawBowlScene(gs, now);
  if (!gs.locked && _checkBowlCleared(gs)) {
    _showBowlBossIntro(gs, now);
  }
}

function _finishBowlSwipe(gs, cancelled) {
  const drag = gs && gs.aimDrag;
  if (!drag) return;
  gs.aimDrag = null;
  if (cancelled || gs.phase !== 'pins') return;
  const dx = drag.currentX - drag.startX;
  const dy = drag.currentY - drag.startY;
  const minDim = Math.min(gs.w, gs.h);
  const dist = Math.sqrt(dx * dx + dy * dy);
  const minDist = Math.max(22, minDim * BOWL_SWIPE_MIN_REL);
  const upwardEnough = dy < -minDim * 0.055;
  if (dist < minDist || !upwardEnough) {
    if (gs.noteEl) gs.noteEl.textContent = '下から上へ なぞって はなそう！';
    _drawBowlScene(gs, performance.now());
    return;
  }
  const now = performance.now();
  if (now - gs.lastThrowAt < BOWL_THROW_COOLDOWN_MS) {
    if (gs.noteEl) gs.noteEl.textContent = 'すこし まってね';
    _drawBowlScene(gs, now);
    return;
  }
  _applyBowlSwipeThrow(gs, dx, dy, dist);
}

function _applyBowlSwipeThrow(gs, dragDx, dragDy, dragDist) {
  const ponoX = BOWL_PONO_X_REL * gs.w;
  const ponoY = BOWL_PONO_Y_REL * gs.h;
  const dx = dragDx;
  const dy = dragDy;
  const len = Math.max(0.001, Math.sqrt(dx * dx + dy * dy));
  let nx = dx / len;
  let ny = dy / len;
  // Swipe launch: keep shots in the upward lane even if the finger curves near release.
  if (ny > -0.05) ny = -0.05;
  const renorm = Math.max(0.001, Math.sqrt(nx * nx + ny * ny));
  nx /= renorm; ny /= renorm;
  const minDim = Math.min(gs.w, gs.h);
  const strength = _bowlClamp(dragDist / Math.max(1, minDim * BOWL_SWIPE_MAX_REL), 0.45, 1);
  const speed = BOWL_DONGURI_SPEED_REL * minDim * (0.82 + strength * 0.38);
  const now = performance.now();
  gs.donguris.push({
    x: ponoX,
    y: ponoY - BOWL_PONO_HEIGHT_REL * gs.h * 0.4, // launch from pono's hand
    vx: nx * speed,
    vy: ny * speed,
    r: BOWL_DONGURI_R_REL * minDim,
    bornAt: now,
    deadAt: now + BOWL_FLIGHT_MS,
    theta: 0,
    spin: ((gs.donguris.length + (gs.bgSeed | 0)) % 2 === 0) ? 1 : -1,
    hitPins: Object.create(null),
    hitCount: 0,
    bumpAt: 0,
    bumpPower: 0,
  });
  gs.lastThrowAt = now;
  if (gs.noteEl) gs.noteEl.textContent = 'はねかえりを ねらおう！';
  try { playTap(); } catch (_) {}
}

function _applyBowlBossShot(gs, tapX, tapY) {
  if (!gs || gs.phase !== 'boss' || !gs.boss) return;
  _updateBowlBossMotion(gs, performance.now());
  const boss = gs.boss;
  const ponoX = BOWL_PONO_X_REL * gs.w;
  const ponoY = BOWL_PONO_Y_REL * gs.h;
  const minDim = Math.min(gs.w, gs.h);
  const aimBias = _bowlClamp((tapX - gs.w * 0.5) / Math.max(1, gs.w), -0.16, 0.16) * boss.r * 0.55;
  const targetX = boss.x + aimBias;
  const targetY = boss.y + boss.r * 0.08;
  const dx = targetX - ponoX;
  const dy = targetY - (ponoY - BOWL_PONO_HEIGHT_REL * gs.h * 0.4);
  const len = Math.max(0.001, Math.sqrt(dx * dx + dy * dy));
  const speed = BOWL_BOSS_DONGURI_SPEED_REL * minDim;
  const now = performance.now();
  gs.donguris.push({
    x: ponoX,
    y: ponoY - BOWL_PONO_HEIGHT_REL * gs.h * 0.4,
    vx: dx / len * speed,
    vy: dy / len * speed,
    r: BOWL_DONGURI_R_REL * minDim * 0.74,
    bornAt: now,
    deadAt: now + 1050,
    theta: 0,
    spin: ((gs.donguris.length + (gs.bossHits | 0)) % 2 === 0) ? 1 : -1,
    isBossShot: true,
    hitPins: Object.create(null),
    hitCount: 0,
    bumpAt: 0,
    bumpPower: 0,
  });
  gs.lastThrowAt = now;
  try { playTap(); } catch (_) {}
}

function _showBowlBossIntro(gs, now) {
  if (!gs || gs.phase === 'boss' || gs.phase === 'boss_intro') return;
  gs.phase = 'boss_intro';
  gs.locked = true;
  gs.aimDrag = null;
  gs.donguris.length = 0;
  for (let i = 0; i < gs.pins.length; i++) {
    if (gs.pins[i].fallen) gs.pins[i].fallProgress = 1;
  }
  if (gs.noteEl) gs.noteEl.textContent = 'ボスが あらわれた！';
  if (gs.bossIntroEl) gs.bossIntroEl.hidden = false;
  if (gs.bossIntroBtn) {
    try { gs.bossIntroBtn.focus({ preventScroll: true }); } catch (_) {}
  }
  _bowlFloatText(gs, 'ボスだ！', gs.w * 0.5, gs.h * 0.28);
  try { _playMzSePitch('correct', 2); } catch (_) { try { playTap(); } catch (__) {} }
  _drawBowlScene(gs, now || performance.now());
}

function _startBowlBossPhase(gs, now) {
  if (!gs || gs.phase === 'boss') return;
  if (gs.bossIntroEl) gs.bossIntroEl.hidden = true;
  gs.phase = 'boss';
  gs.locked = false;
  gs.donguris.length = 0;
  gs.bossHits = 0;
  gs.lastBossHitAt = 0;
  gs.bossHitCombo = 0;
  const minDim = Math.min(gs.w, gs.h);
  gs.boss = {
    x: gs.w * 0.5,
    y: gs.h * 0.28,
    r: BOWL_BOSS_R_REL * minDim,
    startAt: now - BOWL_BOSS_INTRO_MS,
    endsAt: now + BOWL_BOSS_PHASE_MS,
    lastHitAt: 0,
    flashUntil: 0,
    wobbleSeed: ((gs.bgSeed >>> 3) & 255) / 37,
  };
  for (let i = 0; i < gs.pins.length; i++) {
    if (gs.pins[i].fallen) gs.pins[i].fallProgress = 1;
  }
  if (gs.noteEl) gs.noteEl.textContent = 'なんども おして ボスに あてよう！';
  _bowlFloatText(gs, 'ボスだ！', gs.w * 0.5, gs.h * 0.32);
  try { _playMzSePitch('correct', 3); } catch (_) { try { playTap(); } catch (__) {} }
  _updateBowlBossMotion(gs, now);
  _drawBowlScene(gs, now);
  if (!gs.reducedMotion && !gs.rafId) _startBowlLoop(gs);
}

function _updateBowlBossMotion(gs, now) {
  const boss = gs && gs.boss;
  if (!boss) return;
  const minDim = Math.min(gs.w, gs.h);
  const introT = _bowlClamp((now - boss.startAt) / BOWL_BOSS_INTRO_MS, 0, 1);
  const ease = 1 - Math.pow(1 - introT, 3);
  boss.r = BOWL_BOSS_R_REL * minDim;
  const sway = Math.sin(now / 780 + boss.wobbleSeed) * gs.w * 0.18;
  boss.y = gs.h * 0.31 - (1 - ease) * gs.h * 0.28 + Math.sin(now / 310 + boss.wobbleSeed) * minDim * 0.008;
  const lane = _bowlLaneBoundsAt(gs, boss.y + boss.r * 0.18);
  boss.x = _bowlClamp(gs.w * 0.5 + sway, lane.left + boss.r * 0.72, lane.right - boss.r * 0.72);
}

function _checkBowlBossHit(gs, d, now) {
  const boss = gs && gs.boss;
  if (!boss || !d) return false;
  const dx = d.x - boss.x;
  const dy = d.y - (boss.y + boss.r * 0.04);
  const hitR = Math.max(BOWL_BOSS_HIT_R_REL * Math.min(gs.w, gs.h), boss.r * 0.72) + d.r;
  if (dx * dx + dy * dy > hitR * hitR) return false;
  _registerBowlBossHit(gs, now, boss.x, boss.y);
  return true;
}

function _registerBowlBossHit(gs, now, x, y) {
  if (!gs || !gs.boss) return;
  const boss = gs.boss;
  const chained = gs.lastBossHitAt && (now - gs.lastBossHitAt < 520);
  gs.bossHitCombo = chained ? (gs.bossHitCombo + 1) : 1;
  gs.lastBossHitAt = now;
  gs.bossHits = (gs.bossHits || 0) + 1;
  boss.lastHitAt = now;
  boss.flashUntil = now + 130;
  _spawnBowlGlob(gs, x, y, false);
  _spawnBowlBossDamageEffect(gs, now, x, y);
  if (gs.bossHits % 10 === 0) {
    _bowlFloatText(gs, gs.bossHits + ' HIT!', x, y - boss.r * 0.35);
    try { _playMzSePitch('correct', 4); } catch (_) {}
  } else if (gs.bossHitCombo >= 4) {
    _bowlFloatText(gs, 'タップ！', x, y - boss.r * 0.28);
  } else {
    _bowlFloatText(gs, '+1', x, y - boss.r * 0.18);
  }
}

function _startBowlLoop(gs) {
  const tick = function(ts) {
    if (gs !== _bowlGameState) return;
    _syncBowlCanvasSize(gs);
    const last = gs.lastTs || ts;
    const dt = Math.min(0.05, Math.max(0.008, (ts - last) / 1000));
    gs.lastTs = ts;
    _updateBowlPhysics(gs, dt, ts);
    _drawBowlScene(gs, ts);
    if (!gs.locked) {
      gs.rafId = requestAnimationFrame(tick);
    } else {
      gs.rafId = null;
    }
  };
  gs.rafId = requestAnimationFrame(tick);
}

function _updateBowlPhysics(gs, dt, now) {
  _updateBowlPinMotion(gs, now);
  if (gs.phase === 'boss') _updateBowlBossMotion(gs, now);
  const horizonPad = gs.h * BOWL_HORIZON_REL;
  for (let i = gs.donguris.length - 1; i >= 0; i--) {
    const d = gs.donguris[i];
    const prevX = d.x;
    const prevY = d.y;
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    const speedNow = Math.sqrt(d.vx * d.vx + d.vy * d.vy);
    d.theta += (speedNow / Math.max(1, d.r)) * 0.55 * dt * (d.spin || 1);
    // 3D lane wall bounce: collide with the hedge line, not the canvas edge.
    const pad = d.r * _bowlDepthScaleAt(gs, d.y) * 0.88;
    const lane = _bowlLaneBoundsAt(gs, d.y);
    if (d.x < lane.left + pad) {
      d.x = lane.left + pad;
      d.vx = Math.abs(d.vx) * BOWL_HEDGE_RESTITUTION + Math.abs(d.vy) * 0.06;
      d.vy *= 0.96;
      d.spin = Math.abs(d.spin || 1);
      d.bumpAt = now;
      d.bumpPower = Math.min(d.r * 0.8, Math.min(gs.w, gs.h) * 0.03);
      if (!d.lastWallHitAt || now - d.lastWallHitAt > 130) {
        d.lastWallHitAt = now;
        _spawnBowlGlob(gs, d.x, d.y, true);
      }
    }
    if (d.x > lane.right - pad) {
      d.x = lane.right - pad;
      d.vx = -Math.abs(d.vx) * BOWL_HEDGE_RESTITUTION - Math.abs(d.vy) * 0.06;
      d.vy *= 0.96;
      d.spin = -Math.abs(d.spin || 1);
      d.bumpAt = now;
      d.bumpPower = Math.min(d.r * 0.8, Math.min(gs.w, gs.h) * 0.03);
      if (!d.lastWallHitAt || now - d.lastWallHitAt > 130) {
        d.lastWallHitAt = now;
        _spawnBowlGlob(gs, d.x, d.y, true);
      }
    }
    if (d.y < horizonPad + pad * 0.35) {
      d.y = horizonPad + pad * 0.35;
      d.vy = Math.abs(d.vy) * 0.74;
      d.vx *= 0.94;
      d.bumpAt = now;
      d.bumpPower = Math.min(d.r * 0.7, Math.min(gs.w, gs.h) * 0.026);
    }
    // bottom: remove donguri (off stage)
    if (d.y > gs.h + pad) { gs.donguris.splice(i, 1); continue; }
    // timeout
    if (now > d.deadAt) { gs.donguris.splice(i, 1); continue; }
    if (gs.phase === 'boss' && _checkBowlBossHit(gs, d, now)) {
      gs.donguris.splice(i, 1);
      continue;
    }
    // pin collision: reflect the donguri velocity so it ricochets instead of
    // continuing along the original straight line.
    if (gs.phase !== 'boss') {
      for (let pi = 0; pi < gs.pins.length; pi++) {
        const pin = gs.pins[pi];
        if (pin.fallen) continue;
        if (d.hitPins && d.hitPins[pin.id]) continue;
        const metrics = _bowlPinMetrics(gs, pin);
        let testX = d.x;
        let testY = d.y;
        const segX = d.x - prevX;
        const segY = d.y - prevY;
        const segLen2 = segX * segX + segY * segY;
        if (segLen2 > 1) {
          const segT = _bowlClamp(((metrics.hitX - prevX) * segX + (metrics.hitY - prevY) * segY) / segLen2, 0, 1);
          testX = prevX + segX * segT;
          testY = prevY + segY * segT;
        }
        const ballHitR = _bowlDonguriHitRadius(gs, d, testY);
        const fromPinX = testX - metrics.hitX;
        const fromPinY = testY - metrics.hitY;
        const ellX = fromPinX / Math.max(1, metrics.hitRx + ballHitR);
        const ellY = fromPinY / Math.max(1, metrics.hitRy + ballHitR * 0.82);
        if (ellX * ellX + ellY * ellY <= 1) {
          const speed = Math.max(1, Math.sqrt(d.vx * d.vx + d.vy * d.vy));
          let nx = 0;
          let ny = 1;
          const normalX = fromPinX / Math.max(1, metrics.hitRx);
          const normalY = fromPinY / Math.max(1, metrics.hitRy);
          const normalLen = Math.sqrt(normalX * normalX + normalY * normalY);
          if (normalLen > 0.001) {
            nx = normalX / normalLen;
            ny = normalY / normalLen;
          } else {
            nx = -d.vx / speed;
            ny = -d.vy / speed;
          }

          const knockX = d.vx / speed;
          const knockY = d.vy / speed;
          const approach = _bowlClamp(-(knockX * nx + knockY * ny), 0.18, 1);
          const speedRel = speed / Math.max(1, Math.min(gs.w, gs.h));
          const repeatLoss = Math.max(0.64, 1 - (d.hitCount || 0) * 0.09);
          const depthT = _bowlLaneTFromY(gs, metrics.hitY);
          const backBoost = 1 + (1 - depthT) * 0.18;
          const impulse = speedRel * (0.46 + approach * 0.86) * repeatLoss * backBoost;
          const fell = _bowlApplyPinImpact(gs, pin, impulse, knockX, knockY, 0, now);
          _bowlShockNearbyPins(gs, pin, knockX, knockY, impulse * (fell ? 1.18 : 1), now);
          if (d.hitPins) d.hitPins[pin.id] = true;
          d.hitCount = (d.hitCount || 0) + 1;

          // Move the ball outside the visual hit shape before applying the reflected
          // velocity, preventing repeated overlap from looking like a straight pass.
          const separateR = Math.max(metrics.hitRx, metrics.hitRy) + ballHitR * 0.72;
          d.x = metrics.hitX + nx * separateR;
          d.y = metrics.hitY + ny * separateR;

          const dot = d.vx * nx + d.vy * ny;
          let rvx = d.vx;
          let rvy = d.vy;
          if (dot < 0) {
            rvx = d.vx - 2 * dot * nx;
            rvy = d.vy - 2 * dot * ny;
          } else {
            rvx = nx * speed;
            rvy = ny * speed;
          }

          const tangentX = -ny;
          const tangentY = nx;
          const tangentKick = Math.min(130, speed * BOWL_BOUNCE_TANGENT_KICK) * (d.spin || 1);
          rvx += tangentX * tangentKick;
          rvy += tangentY * tangentKick;

          const reflectedSpeed = Math.max(90, speed * BOWL_BOUNCE_RESTITUTION);
          const reflectedLen = Math.max(0.001, Math.sqrt(rvx * rvx + rvy * rvy));
          d.vx = rvx / reflectedLen * reflectedSpeed;
          d.vy = rvy / reflectedLen * reflectedSpeed;
          d.bumpAt = now;
          d.bumpPower = Math.min(d.r * 0.95, Math.min(gs.w, gs.h) * 0.035);
          d.deadAt = Math.max(d.deadAt, now + 620);
          if (d.hitCount >= BOWL_BALL_MAX_HITS) d.deadAt = Math.min(d.deadAt, now + BOWL_BUMP_MS);
          break;
        }
      }
    }
  }
  // pin wobble/fall tween
  for (let i = 0; i < gs.pins.length; i++) {
    const pin = gs.pins[i];
    if (pin.fallen && pin.fallProgress < 1) {
      pin.fallProgress = Math.min(1, (now - pin.fallStart) / BOWL_PIN_FALL_MS);
    } else if (!pin.fallen) {
      const spring = -(pin.tilt || 0) * BOWL_PIN_TILT_SPRING;
      pin.tiltVelocity = ((pin.tiltVelocity || 0) + spring * dt) * Math.pow(BOWL_PIN_TILT_DAMPING, dt * 60);
      pin.tilt = _bowlClamp((pin.tilt || 0) + pin.tiltVelocity * dt, -BOWL_PIN_TILT_FALL_RAD * 1.34, BOWL_PIN_TILT_FALL_RAD * 1.34);
      pin.impactEnergy = (pin.impactEnergy || 0) * Math.pow(BOWL_PIN_ENERGY_DECAY, dt * 60);
      const joltAx = -(pin.joltX || 0) * BOWL_PIN_JOLT_SPRING;
      const joltAy = -(pin.joltY || 0) * BOWL_PIN_JOLT_SPRING;
      pin.joltVx = ((pin.joltVx || 0) + joltAx * dt) * Math.pow(BOWL_PIN_JOLT_DAMPING, dt * 60);
      pin.joltVy = ((pin.joltVy || 0) + joltAy * dt) * Math.pow(BOWL_PIN_JOLT_DAMPING, dt * 60);
      const joltLimit = Math.min(gs.w, gs.h) * 0.055;
      pin.joltX = _bowlClamp((pin.joltX || 0) + pin.joltVx * dt, -joltLimit, joltLimit);
      pin.joltY = _bowlClamp((pin.joltY || 0) + pin.joltVy * dt, -joltLimit * 0.52, joltLimit * 0.52);
      pin.squash = (pin.squash || 0) * Math.pow(0.82, dt * 60);
      pin.shakePower = (pin.shakePower || 0) * Math.pow(BOWL_PIN_SHAKE_DECAY, dt * 60);
      if (Math.abs(pin.tilt) >= BOWL_PIN_TILT_FALL_RAD) {
        const dir = pin.tilt >= 0 ? 1 : -1;
        _bowlFellPin(gs, pin, dir, Math.max(0.2, Math.abs(pin.tiltVelocity || 0)), 0, now);
      }
    }
  }
  // particle decay
  for (let i = gs.particles.length - 1; i >= 0; i--) {
    const p = gs.particles[i];
    p.age += dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= Math.pow(0.86, dt * 60);
    p.vy = p.vy * Math.pow(0.88, dt * 60) + 90 * dt;
    if (p.age >= p.life) gs.particles.splice(i, 1);
  }
  // transient boss damage/comic effects
  if (gs.effects) {
    for (let i = gs.effects.length - 1; i >= 0; i--) {
      if (now >= gs.effects[i].endsAt) gs.effects.splice(i, 1);
    }
  }
  // Clear check
  if (gs.phase === 'pins' && !gs.locked && _checkBowlCleared(gs)) {
    _showBowlBossIntro(gs, now);
  }
  if (gs.phase === 'boss' && gs.boss && now >= gs.boss.endsAt && !gs.locked) {
    _finishBowlGame(gs);
  }
}

function _bowlApplyPinImpact(gs, pin, impulse, knockDirX, knockDirY, depth, now, quiet) {
  if (!pin || pin.fallen) return false;
  now = now || performance.now();
  const mass = Math.max(0.5, pin.mass || 1);
  const stability = Math.max(0.45, pin.stability || 1);
  const dir = Math.abs(knockDirX || 0) > 0.08
    ? (knockDirX > 0 ? 1 : -1)
    : (Math.sin((pin.id + 1) * 2.17) >= 0 ? 1 : -1);
  const effective = Math.max(0, impulse) / mass;
  const strength = _bowlClamp(effective / Math.max(0.1, stability), 0, 1.65);
  const minDim = Math.min(gs.w, gs.h);
  const kx = Number.isFinite(knockDirX) ? knockDirX : dir;
  const ky = Number.isFinite(knockDirY) ? knockDirY : -0.2;
  pin.impactEnergy = Math.min(stability * 1.8, (pin.impactEnergy || 0) + effective);
  pin.lastImpactEffective = effective;
  pin.lastImpactAt = now;
  pin.tiltDirX = dir;
  pin.tiltVelocity = (pin.tiltVelocity || 0) + dir * effective * BOWL_PIN_IMPACT_TILT * (1 + depth * 0.10);
  pin.tilt = _bowlClamp((pin.tilt || 0) + dir * effective * 0.16, -BOWL_PIN_TILT_FALL_RAD * 1.25, BOWL_PIN_TILT_FALL_RAD * 1.25);
  const jolt = minDim * BOWL_PIN_JOLT_REL * (0.36 + strength * 0.92);
  pin.joltVx = (pin.joltVx || 0) + kx * jolt * (7.0 + strength * 3.2);
  pin.joltVy = (pin.joltVy || 0) + ky * jolt * (3.2 + strength * 1.4);
  pin.joltX = _bowlClamp((pin.joltX || 0) + kx * jolt * 0.16, -minDim * 0.06, minDim * 0.06);
  pin.joltY = _bowlClamp((pin.joltY || 0) + ky * jolt * 0.09, -minDim * 0.035, minDim * 0.035);
  pin.squash = Math.min(0.22, (pin.squash || 0) + 0.08 + strength * 0.09);
  pin.shakePower = Math.min(1.2, Math.max(pin.shakePower || 0, 0.26 + strength * 0.62));
  pin.shakePhase = (pin.shakePhase || 0) + 0.9 + depth * 0.37;
  pin.wobbleUntil = now + 680 + strength * 260;

  const fallThreshold = stability * (depth > 0 ? 0.76 : 0.82);
  const shouldFall = effective >= fallThreshold || pin.impactEnergy >= stability * 1.02 || Math.abs(pin.tilt) >= BOWL_PIN_TILT_FALL_RAD;
  if (shouldFall) {
    _bowlFellPin(gs, pin, knockDirX, knockDirY, depth, now);
    return true;
  }

  _spawnBowlGlob(gs, pin.x, pin.y, true);
  if (!quiet && (!pin.lastWobbleTextAt || now - pin.lastWobbleTextAt > 760)) {
    pin.lastWobbleTextAt = now;
    _bowlFloatText(gs, 'ぐらっ', pin.x, pin.y - Math.min(gs.w, gs.h) * 0.035);
  }
  if (!quiet) {
    try { _playMzSePitch('wrong', -2); } catch (_) {}
  }
  return false;
}

function _bowlShockNearbyPins(gs, sourcePin, knockDirX, knockDirY, sourceImpulse, now) {
  if (!gs || !sourcePin || !gs.pins) return;
  const minDim = Math.min(gs.w, gs.h);
  const shockR = BOWL_CHAIN_R_REL * minDim * 1.14;
  const shockR2 = shockR * shockR;
  for (let i = 0; i < gs.pins.length; i++) {
    const p2 = gs.pins[i];
    if (!p2 || p2 === sourcePin || p2.fallen) continue;
    const dx = p2.x - sourcePin.x;
    const dy = p2.y - sourcePin.y;
    const d2 = dx * dx + dy * dy;
    if (d2 <= 0 || d2 > shockR2) continue;
    const dist = Math.sqrt(d2);
    const ux = dx / dist;
    const uy = dy / dist;
    const dot = ux * knockDirX + uy * knockDirY;
    if (dot < -0.18) continue;
    const distanceLoss = 1 - _bowlClamp(dist / shockR, 0, 1);
    const dotBoost = 0.76 + _bowlClamp(dot, -0.18, 1) * 0.28;
    const impulse = Math.max(0.16, sourceImpulse * (0.42 + distanceLoss * 0.58) * dotBoost);
    _bowlApplyPinImpact(gs, p2, impulse, ux * 0.7 + knockDirX * 0.3, uy * 0.7 + knockDirY * 0.3, 1, now, true);
  }
}

// ピンを倒し、方向ベクトル沿いに半径 / dot ゲート内の他ピンへ弱い衝撃を伝播させる。
// depth は 0 から始まり BOWL_CHAIN_MAX_DEPTH で停止。
// jitter は決定論的 (sin(pin.id + depth)) — Math.random 不使用。
function _bowlFellPin(gs, pin, knockDirX, knockDirY, depth, now) {
  if (!pin || pin.fallen) return;
  pin.fallen = true;
  pin.fallRotDirX = knockDirX;
  pin.fallRotDirY = knockDirY;
  pin.fallStart = now;
  pin.fallProgress = 0;
  pin.tilt = _bowlClamp((pin.tilt || 0) + ((knockDirX || pin.tiltDirX || 1) >= 0 ? 1 : -1) * 0.24, -1.2, 1.2);
  pin.tiltVelocity = 0;
  pin.impactEnergy = 0;
  pin.shakePower = Math.max(pin.shakePower || 0, 0.55);
  pin.squash = Math.max(pin.squash || 0, 0.12);
  pin.joltVx = (pin.joltVx || 0) + (knockDirX || 0) * Math.min(gs.w, gs.h) * 0.38;
  pin.joltVy = (pin.joltVy || 0) + (knockDirY || 0) * Math.min(gs.w, gs.h) * 0.16;
  _spawnBowlGlob(gs, pin.x, pin.y, false);
  if (depth === 0) {
    try { _playMzSePitch('correct', 0); } catch (_) { try { playTap(); } catch (__) {} }
  } else {
    try { _playMzSePitch('correct', Math.min(4, depth)); } catch (_) {}
    if (depth >= 2) _bowlFloatText(gs, 'スゴイ！', pin.x, pin.y);
  }
  if (depth >= BOWL_CHAIN_MAX_DEPTH) return;

  const chainR = BOWL_CHAIN_R_REL * Math.min(gs.w, gs.h);
  const chainR2 = chainR * chainR;
  // 倒れた虫は周囲を押すだけ。衝撃は depth ごとに弱まり、安定した虫はぐらつくだけで戻る。
  _webGimmickSetTimeout(function() {
    if (gs !== _bowlGameState) return;
    const inner = performance.now();
    for (let i = 0; i < gs.pins.length; i++) {
      const p2 = gs.pins[i];
      if (p2.fallen || p2 === pin) continue;
      const dx = p2.x - pin.x, dy = p2.y - pin.y;
      const d2 = dx * dx + dy * dy;
      if (d2 === 0 || d2 > chainR2) continue;
      const dist = Math.sqrt(d2);
      const ux = dx / dist, uy = dy / dist;
      const dot = ux * knockDirX + uy * knockDirY;
      if (dot < BOWL_CHAIN_DOT_MIN) continue;
      // 決定論的 jitter (Math.random 禁止)
      const jit = Math.sin((p2.id + depth) * 1.7) * 0.15;
      let nkx = knockDirX * 0.4 + ux * 0.6 + jit;
      let nky = knockDirY * 0.4 + uy * 0.6;
      const nm = Math.max(0.001, Math.sqrt(nkx * nkx + nky * nky));
      nkx /= nm; nky /= nm;
      const distanceLoss = 1 - _bowlClamp(dist / chainR, 0, 1) * 0.34;
      const depthLoss = depth === 0 ? 1 : Math.pow(0.70, depth);
      const dotBoost = 0.94 + _bowlClamp(dot, 0, 1) * 0.22;
      const targetMass = Math.max(1, p2.mass || 1);
      const impulse = Math.max(0.24, (p2.stability || 1) * targetMass * 1.26 * depthLoss * distanceLoss * dotBoost);
      _bowlApplyPinImpact(gs, p2, impulse, nkx, nky, depth + 1, inner, true);
    }
  }, BOWL_CHAIN_DELAY_MS);
}

function _spawnBowlGlob(gs, x, y, isMiss) {
  if (_bowlReducedMotion()) return;
  const n = isMiss ? 3 : 6;
  for (let i = 0; i < n; i++) {
    // deterministic jitter via sin (no Math.random)
    const seed = (gs.particles.length + i + 1) * 13.37 + (gs.bgSeed & 0xff);
    const ang = (i / n) * Math.PI * 2 + Math.sin(seed) * 0.4;
    const sp  = 60 + Math.abs(Math.sin(seed * 1.7)) * 80;
    gs.particles.push({
      x: x, y: y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp - 40,
      r: 3 + (i % 3),
      age: 0, life: isMiss ? 0.36 : 0.62,
      color: isMiss ? 'rgba(220,200,160,0.85)' : 'rgba(255,220,90,0.95)',
    });
  }
}

function _spawnBowlBossDamageEffect(gs, now, x, y) {
  if (!gs || _bowlReducedMotion()) return;
  if (!gs.effects) gs.effects = [];
  const bossHits = gs.bossHits || 0;
  const minDim = Math.min(gs.w, gs.h);
  const seed = (bossHits * 37 + (gs.bgSeed & 255)) | 0;
  const dx = Math.sin(seed * 1.91) * minDim * 0.050;
  const dy = Math.cos(seed * 1.37) * minDim * 0.038;
  gs.effects.push({
    kind: ['burst', 'ring', 'slash', 'spark'][bossHits % 4],
    x: x + dx,
    y: y + dy - minDim * 0.015,
    r: Math.max(22, minDim * (0.055 + (bossHits % 3) * 0.010)),
    rot: Math.sin(seed) * 0.65,
    bornAt: now,
    endsAt: now + 1040,
    seed: seed,
  });
}

function _bowlFloatText(gs, text, x, y) {
  if (_bowlReducedMotion()) return;
  if (!gs.stageEl) return;
  const el = document.createElement('div');
  el.className = 'bowl-game__combo';
  el.textContent = text;
  el.style.left = (x / Math.max(1, gs.w) * 100) + '%';
  el.style.top  = (y / Math.max(1, gs.h) * 100) + '%';
  gs.stageEl.appendChild(el);
  _webGimmickSetTimeout(function() {
    try { if (el.parentNode) el.parentNode.removeChild(el); } catch (_) {}
  }, 820);
}

function _checkBowlCleared(gs) {
  if (!gs.pins.length) return false;
  for (let i = 0; i < gs.pins.length; i++) if (!gs.pins[i].fallen) return false;
  return true;
}

// ─── drawing (perspective lane + 3D-shaded acorn ball) ───
function _drawBowlScene(gs, now) {
  const ctx = gs.ctx;
  _drawBowl3dWorld(gs, now);

  // Pins (sort back-to-front by y for shadow stacking)
  const sorted = gs.pins.slice().sort(function(a, b){ return a.y - b.y; });
  for (let i = 0; i < sorted.length; i++) _drawBowlPin(gs, sorted[i], now);

  if (gs.phase === 'boss' || gs.phase === 'boss_defeat') _drawBowlBoss(gs, now);

  // Donguris in flight
  for (let i = 0; i < gs.donguris.length; i++) _drawBowlDonguri(gs, gs.donguris[i], now);

  _drawBowlAimGuide(gs);

  // Pono (bottom-center launcher)
  _drawBowlPono(gs, now);

  // Particles
  ctx.save();
  for (let i = 0; i < gs.particles.length; i++) {
    const p = gs.particles[i];
    const a = 1 - (p.age / p.life);
    if (a <= 0) continue;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();

  _drawBowlEffects(gs, now);

  if (gs.phase === 'boss') _drawBowlBossHud(gs, now);
  if (gs.phase === 'boss') _drawBowlBossTapBurst(gs, now);
}

function _drawBowlAimGuide(gs) {
  const drag = gs && gs.aimDrag;
  if (!drag || gs.phase === 'boss') return;
  const ctx = gs.ctx;
  const minDim = Math.min(gs.w, gs.h);
  const dx = drag.currentX - drag.startX;
  const dy = drag.currentY - drag.startY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 2) return;
  const minDist = Math.max(22, minDim * BOWL_SWIPE_MIN_REL);
  const valid = dist >= minDist && dy < -minDim * 0.055;
  const len = Math.max(0.001, dist);
  let nx = dx / len;
  let ny = dy / len;
  if (ny > -0.05) ny = -0.05;
  const renorm = Math.max(0.001, Math.sqrt(nx * nx + ny * ny));
  nx /= renorm;
  ny /= renorm;
  const startX = BOWL_PONO_X_REL * gs.w;
  const startY = BOWL_PONO_Y_REL * gs.h - BOWL_PONO_HEIGHT_REL * gs.h * 0.4;
  const arrowLen = _bowlClamp(dist * 0.78, minDim * 0.12, minDim * 0.36);
  const endX = startX + nx * arrowLen;
  const endY = startY + ny * arrowLen;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  ctx.globalAlpha = 0.36;
  ctx.strokeStyle = valid ? '#fff4a8' : '#ff9d75';
  ctx.lineWidth = Math.max(4, minDim * 0.018);
  ctx.beginPath();
  ctx.moveTo(drag.startX, drag.startY);
  ctx.lineTo(drag.currentX, drag.currentY);
  ctx.stroke();

  ctx.globalAlpha = 0.92;
  ctx.strokeStyle = valid ? '#ffd84d' : '#ff7a5c';
  ctx.lineWidth = Math.max(3, minDim * 0.012);
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  ctx.lineTo(endX, endY);
  ctx.stroke();

  const head = Math.max(8, minDim * 0.04);
  const ang = Math.atan2(ny, nx);
  ctx.fillStyle = valid ? '#ffd84d' : '#ff7a5c';
  ctx.beginPath();
  ctx.moveTo(endX, endY);
  ctx.lineTo(endX - Math.cos(ang - 0.55) * head, endY - Math.sin(ang - 0.55) * head);
  ctx.lineTo(endX - Math.cos(ang + 0.55) * head, endY - Math.sin(ang + 0.55) * head);
  ctx.closePath();
  ctx.fill();

  ctx.globalAlpha = 0.28;
  ctx.fillStyle = valid ? '#fff7b9' : '#ffc0a8';
  ctx.beginPath();
  ctx.arc(startX, startY, Math.max(12, minDim * 0.035), 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function _drawBowlGeneratedLaneBg(gs) {
  const ctx = gs.ctx, W = gs.w, H = gs.h;
  const img = imgBowlLaneBg;
  if (!(img && img.complete && img.naturalWidth > 0)) return false;
  ctx.save();
  ctx.drawImage(img, 0, 0, W, H);

  // Keep characters readable over the richer generated plate without redrawing
  // the lane/hedges themselves.
  const topShade = ctx.createLinearGradient(0, 0, 0, H);
  topShade.addColorStop(0, 'rgba(5, 35, 18, 0.20)');
  topShade.addColorStop(0.26, 'rgba(5, 35, 18, 0.00)');
  topShade.addColorStop(0.74, 'rgba(55, 31, 8, 0.00)');
  topShade.addColorStop(1, 'rgba(55, 31, 8, 0.12)');
  ctx.fillStyle = topShade;
  ctx.fillRect(0, 0, W, H);

  const sideShade = ctx.createLinearGradient(0, 0, W, 0);
  sideShade.addColorStop(0, 'rgba(0, 31, 15, 0.16)');
  sideShade.addColorStop(0.20, 'rgba(0, 31, 15, 0.00)');
  sideShade.addColorStop(0.80, 'rgba(0, 31, 15, 0.00)');
  sideShade.addColorStop(1, 'rgba(0, 31, 15, 0.16)');
  ctx.fillStyle = sideShade;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
  _drawBowlDirtPathGuideLines(gs);
  return true;
}

function _drawBowlDirtPathGuideLines(gs) {
  const ctx = gs.ctx, W = gs.w, H = gs.h;
  const minDim = Math.min(W, H);
  const horizonY = H * BOWL_HORIZON_REL;
  const bottomY = H * BOWL_LANE_BOTTOM_REL;
  const top = _bowlLaneBoundsAt(gs, horizonY);
  const bottom = _bowlLaneBoundsAt(gs, bottomY);

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Soft inner grooves: these are dirt-path guide marks, not plank/tile seams.
  const guideLines = [0.34, 0.50, 0.66];
  for (let i = 0; i < guideLines.length; i++) {
    const laneX = guideLines[i];
    const grad = ctx.createLinearGradient(0, horizonY, 0, bottomY);
    grad.addColorStop(0, 'rgba(91, 62, 30, 0.04)');
    grad.addColorStop(0.55, 'rgba(91, 62, 30, 0.11)');
    grad.addColorStop(1, 'rgba(91, 62, 30, 0.18)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = Math.max(1.1, minDim * (i === 1 ? 0.0032 : 0.0046));
    ctx.beginPath();
    ctx.moveTo(_bowlLanePoint(gs, laneX, horizonY + minDim * 0.022), horizonY + minDim * 0.022);
    for (let s = 1; s <= 7; s++) {
      const t = s / 7;
      const y = horizonY + Math.pow(t, 1.22) * (bottomY - horizonY);
      const drift = Math.sin(t * Math.PI * 2 + i * 1.7) * minDim * 0.0032;
      ctx.lineTo(_bowlLanePoint(gs, laneX, y) + drift, y);
    }
    ctx.stroke();
  }

  // A few shallow cross scuffs help the child read depth while staying like soil.
  for (let i = 1; i <= 4; i++) {
    const t = i / 5;
    const y = horizonY + Math.pow(t, 1.55) * (bottomY - horizonY);
    const b = _bowlLaneBoundsAt(gs, y);
    ctx.strokeStyle = 'rgba(97, 67, 34, ' + (0.05 + t * 0.07) + ')';
    ctx.lineWidth = Math.max(1, minDim * (0.0024 + t * 0.002));
    ctx.beginPath();
    ctx.moveTo(b.left + (b.right - b.left) * 0.09, y);
    ctx.quadraticCurveTo(W * 0.5, y + H * 0.010, b.right - (b.right - b.left) * 0.09, y);
    ctx.stroke();
  }

  // Subtle collision boundary highlight, aligned to the invisible hedge physics.
  ctx.strokeStyle = 'rgba(232, 196, 105, 0.18)';
  ctx.lineWidth = Math.max(1.2, minDim * 0.0042);
  ctx.beginPath();
  ctx.moveTo(bottom.left, bottomY);
  ctx.lineTo(top.left, horizonY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bottom.right, bottomY);
  ctx.lineTo(top.right, horizonY);
  ctx.stroke();
  ctx.restore();
}

function _drawBowl3dWorld(gs, now) {
  const ctx = gs.ctx, W = gs.w, H = gs.h;
  if (_drawBowlGeneratedLaneBg(gs)) return;
  const horizonY = H * BOWL_HORIZON_REL;
  const bottomY = H * BOWL_LANE_BOTTOM_REL;
  const top = _bowlLaneBoundsAt(gs, horizonY);
  const bottom = _bowlLaneBoundsAt(gs, bottomY);

  const sky = ctx.createLinearGradient(0, 0, 0, horizonY);
  sky.addColorStop(0, '#9fdaf0');
  sky.addColorStop(1, '#d8f3f0');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, horizonY);

  const grass = ctx.createLinearGradient(0, horizonY, 0, H);
  grass.addColorStop(0, '#7eb957');
  grass.addColorStop(0.58, '#4b813c');
  grass.addColorStop(1, '#2e532d');
  ctx.fillStyle = grass;
  ctx.fillRect(0, horizonY, W, H - horizonY);

  _drawBowlForestBorder(gs);

  const leftOuterTop = W * 0.26;
  const rightOuterTop = W * 0.74;
  const leftOuterBottom = -W * 0.02;
  const rightOuterBottom = W * 1.02;

  const hedgeFace = ctx.createLinearGradient(0, horizonY, 0, H);
  hedgeFace.addColorStop(0, '#6cab49');
  hedgeFace.addColorStop(0.48, '#3f7a34');
  hedgeFace.addColorStop(1, '#224f28');

  ctx.save();
  ctx.fillStyle = hedgeFace;
  ctx.beginPath();
  ctx.moveTo(leftOuterBottom, H);
  ctx.lineTo(bottom.left, bottomY);
  ctx.lineTo(top.left, horizonY);
  ctx.lineTo(leftOuterTop, horizonY);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(rightOuterBottom, H);
  ctx.lineTo(bottom.right, bottomY);
  ctx.lineTo(top.right, horizonY);
  ctx.lineTo(rightOuterTop, horizonY);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  const laneGrad = ctx.createLinearGradient(0, horizonY, 0, bottomY);
  laneGrad.addColorStop(0, '#dfcc8e');
  laneGrad.addColorStop(0.42, '#c59b5f');
  laneGrad.addColorStop(1, '#80552a');
  ctx.fillStyle = laneGrad;
  ctx.beginPath();
  ctx.moveTo(bottom.left, bottomY);
  ctx.lineTo(top.left, horizonY);
  ctx.lineTo(top.right, horizonY);
  ctx.lineTo(bottom.right, bottomY);
  ctx.closePath();
  ctx.fill();

  ctx.save();
  ctx.strokeStyle = 'rgba(255, 247, 195, 0.28)';
  ctx.lineWidth = Math.max(1, Math.min(W, H) * 0.006);
  for (let i = 1; i <= 5; i++) {
    const laneX = i / 6;
    ctx.beginPath();
    ctx.moveTo(_bowlLanePoint(gs, laneX, horizonY), horizonY);
    ctx.lineTo(_bowlLanePoint(gs, laneX, bottomY), bottomY);
    ctx.stroke();
  }
  ctx.restore();

  ctx.save();
  ctx.lineCap = 'round';
  for (let i = 0; i < 10; i++) {
    const t = i / 9;
    const y = horizonY + Math.pow(t, 1.64) * (bottomY - horizonY);
    const b = _bowlLaneBoundsAt(gs, y);
    ctx.strokeStyle = i % 2 ? 'rgba(71, 43, 20, 0.24)' : 'rgba(255, 243, 188, 0.18)';
    ctx.lineWidth = Math.max(1, Math.min(W, H) * (0.0035 + t * 0.002));
    ctx.beginPath();
    ctx.moveTo(b.left, y);
    ctx.quadraticCurveTo(W * 0.5, y + H * 0.012, b.right, y);
    ctx.stroke();
  }
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = 'rgba(38, 82, 29, 0.88)';
  ctx.lineWidth = Math.max(4, Math.min(W, H) * 0.018);
  ctx.beginPath();
  ctx.moveTo(bottom.left, bottomY);
  ctx.lineTo(top.left, horizonY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bottom.right, bottomY);
  ctx.lineTo(top.right, horizonY);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(202, 235, 126, 0.60)';
  ctx.lineWidth = Math.max(2, Math.min(W, H) * 0.006);
  ctx.beginPath();
  ctx.moveTo(bottom.left + W * 0.008, bottomY);
  ctx.lineTo(top.left + W * 0.003, horizonY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bottom.right - W * 0.008, bottomY);
  ctx.lineTo(top.right - W * 0.003, horizonY);
  ctx.stroke();
  ctx.restore();

  _drawBowlHedgeClumps(gs, 'left', now);
  _drawBowlHedgeClumps(gs, 'right', now);
}

function _drawBowlHedgeClumps(gs, side, now) {
  const ctx = gs.ctx, W = gs.w, H = gs.h;
  const seed = gs.bgSeed | 0;
  ctx.save();
  for (let i = 0; i < 16; i++) {
    const t = i / 15;
    const y = H * BOWL_HORIZON_REL + Math.pow(t, 1.7) * (H * BOWL_LANE_BOTTOM_REL - H * BOWL_HORIZON_REL);
    const b = _bowlLaneBoundsAt(gs, y);
    const s = Math.max(8, Math.min(W, H) * (0.026 + t * 0.052));
    const dir = side === 'left' ? -1 : 1;
    const x = (side === 'left' ? b.left : b.right) + dir * s * (0.66 + Math.sin(i * 1.41 + seed) * 0.08);
    const g = ctx.createRadialGradient(x - dir * s * 0.22, y - s * 0.24, s * 0.12, x, y, s * 1.04);
    g.addColorStop(0, '#b7e47c');
    g.addColorStop(0.55, '#5a9c3c');
    g.addColorStop(1, '#255b2c');
    ctx.fillStyle = g;
    ctx.globalAlpha = 0.94;
    ctx.beginPath();
    ctx.ellipse(x, y, s * 1.05, s * 0.55, dir * 0.13, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function _drawBowlForestBorder(gs) {
  const ctx = gs.ctx, W = gs.w, H = gs.h;
  const seed = gs.bgSeed | 0;
  ctx.save();
  ctx.fillStyle = '#0e3a1e';
  // Top forest band — circular tree-tops
  for (let i = 0; i < 12; i++) {
    const cx = (i + 0.5) * (W / 12);
    const cy = H * 0.06 + Math.sin((i + (seed & 0xff)) * 1.7) * 6;
    ctx.beginPath();
    ctx.arc(cx, cy, Math.max(W, H) * 0.05, 0, Math.PI * 2);
    ctx.fill();
  }
  // Left/right tree edges
  ctx.fillStyle = '#10421f';
  for (let i = 0; i < 8; i++) {
    const cy = H * 0.14 + (i / 8) * H * 0.78;
    const wobL = Math.sin((i + seed) * 1.3) * 4;
    const wobR = Math.cos((i + seed) * 1.1) * 4;
    ctx.beginPath();
    ctx.arc(W * 0.04 + wobL, cy, W * 0.05, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(W * 0.96 - wobR, cy, W * 0.05, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function _bowlRoundRectPath(ctx, x, y, w, h, r) {
  const rr = Math.max(0, Math.min(r, w / 2, h / 2));
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
}

function _drawBowlBoss(gs, now) {
  const boss = gs.boss;
  if (!boss) return;
  const ctx = gs.ctx;
  const defeatT = boss.defeatAt ? _bowlClamp((now - boss.defeatAt) / BOWL_BOSS_DEFEAT_MS, 0, 1) : 0;
  const flyEase = 1 - Math.pow(1 - defeatT, 3);
  const shrink = boss.defeatAt ? (1 - flyEase * 0.78) : 1;
  const r = boss.r * shrink;
  const hitT = boss.lastHitAt ? _bowlClamp(1 - (now - boss.lastHitAt) / 220, 0, 1) : 0;
  const flash = boss.flashUntil && now < boss.flashUntil;
  const shakeX = hitT > 0 ? Math.sin(now * 0.13) * r * 0.055 * hitT : 0;
  const shakeY = hitT > 0 ? Math.cos(now * 0.11) * r * 0.035 * hitT : 0;
  const fromX = Number.isFinite(boss.defeatFromX) ? boss.defeatFromX : boss.x;
  const fromY = Number.isFinite(boss.defeatFromY) ? boss.defeatFromY : boss.y;
  const farX = gs.w * 0.52 + Math.sin((boss.wobbleSeed || 0) * 2.4) * gs.w * 0.10;
  const farY = gs.h * 0.11;
  const arcLift = Math.sin(defeatT * Math.PI) * gs.h * 0.11;
  const x = (boss.defeatAt ? (fromX + (farX - fromX) * flyEase) : boss.x) + shakeX;
  const y = (boss.defeatAt ? (fromY + (farY - fromY) * flyEase - arcLift) : boss.y) + shakeY;
  const spin = boss.defeatAt ? (defeatT * Math.PI * 7.2) : 0;

  ctx.save();
  ctx.translate(x, y);
  if (spin) ctx.rotate(spin);
  if (boss.defeatAt) ctx.globalAlpha = 1 - Math.max(0, defeatT - 0.72) / 0.28;

  ctx.save();
  ctx.globalAlpha = 0.34;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, r * 1.10, r * 0.92, r * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const aura = ctx.createRadialGradient(0, 0, r * 0.22, 0, 0, r * 1.38);
  aura.addColorStop(0, 'rgba(255,234,92,0.52)');
  aura.addColorStop(0.56, 'rgba(255,196,49,0.18)');
  aura.addColorStop(1, 'rgba(255,196,49,0)');
  ctx.fillStyle = aura;
  ctx.beginPath();
  ctx.arc(0, 0, r * 1.38, 0, Math.PI * 2);
  ctx.fill();

  if (imgBowlBoss && imgBowlBoss.complete && imgBowlBoss.naturalWidth > 0) {
    const drawH = r * 2.86;
    const drawW = drawH * (imgBowlBoss.naturalWidth / Math.max(1, imgBowlBoss.naturalHeight));
    ctx.save();
    if (flash) {
      ctx.shadowColor = 'rgba(255, 238, 90, 0.85)';
      ctx.shadowBlur = r * 0.34;
    }
    ctx.drawImage(imgBowlBoss, -drawW / 2, -drawH * 0.56, drawW, drawH);
    ctx.restore();
  } else {
    const grad = ctx.createRadialGradient(-r * 0.28, -r * 0.28, r * 0.08, 0, 0, r);
    grad.addColorStop(0, '#f7cf78');
    grad.addColorStop(1, '#7b4618');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.78, r * 0.92, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2f1a08';
    ctx.beginPath(); ctx.arc(-r * 0.22, -r * 0.18, r * 0.07, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(r * 0.22, -r * 0.18, r * 0.07, 0, Math.PI * 2); ctx.fill();
  }

  if (flash) {
    ctx.globalAlpha = 0.45;
    ctx.strokeStyle = '#fff7a8';
    ctx.lineWidth = Math.max(2, r * 0.04);
    ctx.beginPath();
    ctx.arc(0, 0, r * (1.18 + hitT * 0.12), 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function _drawBowlBossHud(gs, now) {
  const boss = gs.boss;
  if (!boss) return;
  const ctx = gs.ctx;
  const W = gs.w;
  const H = gs.h;
  const remain = _bowlClamp((boss.endsAt - now) / BOWL_BOSS_PHASE_MS, 0, 1);
  const boxW = Math.min(W * 0.78, 420);
  const boxH = Math.max(30, H * 0.085);
  const x = (W - boxW) / 2;
  const y = Math.max(8, H * 0.035);

  ctx.save();
  ctx.fillStyle = 'rgba(255, 252, 232, 0.92)';
  ctx.strokeStyle = 'rgba(99, 142, 60, 0.86)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  _bowlRoundRectPath(ctx, x, y, boxW, boxH, boxH * 0.36);
  ctx.fill();
  ctx.stroke();

  const barX = x + boxH * 0.38;
  const barY = y + boxH * 0.58;
  const barW = boxW - boxH * 0.76;
  const barH = Math.max(5, boxH * 0.18);
  ctx.fillStyle = 'rgba(105, 88, 50, 0.16)';
  ctx.beginPath();
  _bowlRoundRectPath(ctx, barX, barY, barW, barH, barH / 2);
  ctx.fill();
  const fillW = Math.max(barH, barW * remain);
  const barGrad = ctx.createLinearGradient(barX, barY, barX + barW, barY);
  barGrad.addColorStop(0, '#ffcc45');
  barGrad.addColorStop(1, '#ef6b4d');
  ctx.fillStyle = barGrad;
  ctx.beginPath();
  _bowlRoundRectPath(ctx, barX, barY, fillW, barH, barH / 2);
  ctx.fill();

  ctx.fillStyle = '#55422d';
  ctx.font = '900 ' + Math.max(12, boxH * 0.34) + 'px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const sec = Math.max(0, Math.ceil((boss.endsAt - now) / 1000));
  ctx.fillText('ボスに ' + (gs.bossHits || 0) + ' HIT  /  あと ' + sec + 'びょう', W * 0.5, y + boxH * 0.31);
  ctx.restore();
}

function _drawBowlBossTapBurst(gs, now) {
  const ctx = gs.ctx;
  const W = gs.w;
  const H = gs.h;
  const minDim = Math.min(W, H);
  const blink = 0.5 + 0.5 * Math.sin((now / BOWL_BOSS_PROMPT_BLINK_MS) * Math.PI * 2);
  const scalePulse = 1 + blink * 0.055;
  const alpha = 0.84 + blink * 0.16;
  const r = Math.max(48, Math.min(minDim * 0.21, 92));
  const x = _bowlClamp(W * 0.75, r + 14, W - r - 14);
  const y = _bowlClamp(H * 0.39, r + 48, H - r - 36);
  const points = 22;

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scalePulse, scalePulse);
  ctx.globalAlpha = alpha;

  ctx.save();
  ctx.translate(4, 5);
  ctx.fillStyle = 'rgba(44, 31, 28, 0.28)';
  _bowlSpikeBurstPath(ctx, points, r * 1.04, r * 0.72);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(3, -2);
  ctx.strokeStyle = 'rgba(193, 71, 181, 0.86)';
  ctx.lineWidth = Math.max(3, r * 0.055);
  ctx.lineJoin = 'round';
  _bowlSpikeBurstPath(ctx, points, r * 1.02, r * 0.70);
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#FFD84D';
  ctx.strokeStyle = '#1F1A1A';
  ctx.lineWidth = Math.max(4, r * 0.062);
  ctx.lineJoin = 'round';
  _bowlSpikeBurstPath(ctx, points, r, r * 0.69);
  ctx.fill();
  ctx.stroke();

  ctx.save();
  ctx.globalAlpha = 0.20;
  ctx.fillStyle = '#FFF7B8';
  for (let i = 0; i < 26; i++) {
    const col = i % 7;
    const row = Math.floor(i / 7);
    const px = (col - 3) * r * 0.19 + (row % 2) * r * 0.08;
    const py = (row - 1.5) * r * 0.20;
    if (px * px + py * py > r * r * 0.46) continue;
    ctx.beginPath();
    ctx.arc(px, py, Math.max(2, r * 0.025), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  ctx.fillStyle = '#4C3313';
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.74)';
  ctx.lineWidth = Math.max(3, r * 0.045);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '900 ' + Math.max(18, r * 0.27) + 'px system-ui, sans-serif';
  ctx.strokeText('なんども', 0, -r * 0.13);
  ctx.fillText('なんども', 0, -r * 0.13);
  ctx.font = '900 ' + Math.max(20, r * 0.32) + 'px system-ui, sans-serif';
  ctx.strokeText('おして!', 0, r * 0.20);
  ctx.fillText('おして!', 0, r * 0.20);

  ctx.restore();
}

function _drawBowlEffects(gs, now) {
  if (!gs.effects || !gs.effects.length) return;
  for (let i = 0; i < gs.effects.length; i++) {
    const fx = gs.effects[i];
    const life = Math.max(1, fx.endsAt - fx.bornAt);
    const t = _bowlClamp((now - fx.bornAt) / life, 0, 1);
    const alpha = Math.sin((1 - t) * Math.PI * 0.5);
    const scale = 0.62 + t * 0.72;
    if (fx.kind === 'burst') {
      _drawBowlHitBurstMark(gs, fx.x, fx.y, fx.r * scale, fx.rot + t * 0.18, alpha, 'ドン!');
    } else if (fx.kind === 'ring') {
      _drawBowlHitRingMark(gs, fx.x, fx.y, fx.r * scale, fx.rot, alpha);
    } else if (fx.kind === 'slash') {
      _drawBowlHitSlashMark(gs, fx.x, fx.y, fx.r * scale, fx.rot, alpha);
    } else {
      _drawBowlHitSparkMark(gs, fx.x, fx.y, fx.r * scale, fx.rot, alpha);
    }
  }
}

function _drawBowlHitBurstMark(gs, x, y, r, rot, alpha, text) {
  const ctx = gs.ctx;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot || 0);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#FFE86A';
  ctx.strokeStyle = '#2B1D20';
  ctx.lineWidth = Math.max(3, r * 0.12);
  ctx.lineJoin = 'round';
  _bowlSpikeBurstPath(ctx, 13, r, r * 0.62);
  ctx.fill();
  ctx.stroke();
  ctx.strokeStyle = 'rgba(190, 62, 170, 0.82)';
  ctx.lineWidth = Math.max(2, r * 0.06);
  ctx.translate(r * 0.07, -r * 0.05);
  _bowlSpikeBurstPath(ctx, 13, r * 0.96, r * 0.58);
  ctx.stroke();
  if (text) {
    ctx.rotate(-(rot || 0));
    ctx.fillStyle = '#6E4214';
    ctx.strokeStyle = 'rgba(255,255,255,0.72)';
    ctx.lineWidth = Math.max(2, r * 0.07);
    ctx.font = '900 ' + Math.max(13, r * 0.38) + 'px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText(text, -r * 0.06, r * 0.02);
    ctx.fillText(text, -r * 0.06, r * 0.02);
  }
  ctx.restore();
}

function _drawBowlHitRingMark(gs, x, y, r, rot, alpha) {
  const ctx = gs.ctx;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot || 0);
  ctx.globalAlpha = alpha;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#FFF36D';
  ctx.lineWidth = Math.max(4, r * 0.15);
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.68, -0.18, Math.PI * 1.58);
  ctx.stroke();
  ctx.strokeStyle = '#2B1D20';
  ctx.lineWidth = Math.max(2, r * 0.052);
  for (let i = 0; i < 8; i++) {
    const a = i / 8 * Math.PI * 2;
    const x1 = Math.cos(a) * r * 0.82;
    const y1 = Math.sin(a) * r * 0.82;
    const x2 = Math.cos(a) * r * 1.12;
    const y2 = Math.sin(a) * r * 1.12;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
  ctx.restore();
}

function _drawBowlHitSlashMark(gs, x, y, r, rot, alpha) {
  const ctx = gs.ctx;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate((rot || 0) - 0.42);
  ctx.globalAlpha = alpha;
  ctx.lineCap = 'round';
  for (let i = -1; i <= 1; i++) {
    const off = i * r * 0.28;
    ctx.strokeStyle = '#2B1D20';
    ctx.lineWidth = Math.max(7, r * 0.17);
    ctx.beginPath();
    ctx.moveTo(-r * 0.90, off + r * 0.22);
    ctx.lineTo(r * 0.92, off - r * 0.18);
    ctx.stroke();
    ctx.strokeStyle = i === 0 ? '#FFE15A' : '#FF7EB3';
    ctx.lineWidth = Math.max(4, r * 0.095);
    ctx.beginPath();
    ctx.moveTo(-r * 0.86, off + r * 0.20);
    ctx.lineTo(r * 0.88, off - r * 0.16);
    ctx.stroke();
  }
  ctx.restore();
}

function _drawBowlHitSparkMark(gs, x, y, r, rot, alpha) {
  const ctx = gs.ctx;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot || 0);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#2B1D20';
  ctx.lineCap = 'round';
  for (let i = 0; i < 10; i++) {
    const a = i / 10 * Math.PI * 2 + Math.sin(i * 2.1) * 0.18;
    const inner = r * (0.20 + (i % 2) * 0.08);
    const outer = r * (0.74 + (i % 3) * 0.12);
    ctx.lineWidth = Math.max(4, r * 0.10);
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * inner, Math.sin(a) * inner);
    ctx.lineTo(Math.cos(a) * outer, Math.sin(a) * outer);
    ctx.stroke();
    ctx.strokeStyle = i % 2 ? '#FF7EB3' : '#FFE15A';
    ctx.lineWidth = Math.max(2, r * 0.055);
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * inner, Math.sin(a) * inner);
    ctx.lineTo(Math.cos(a) * outer, Math.sin(a) * outer);
    ctx.stroke();
    ctx.strokeStyle = '#2B1D20';
  }
  ctx.restore();
}

function _bowlSpikeBurstPath(ctx, points, outerR, innerR) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const isOuter = i % 2 === 0;
    const jitter = isOuter ? 1 + Math.sin(i * 1.91) * 0.08 : 1 + Math.cos(i * 2.17) * 0.06;
    const radius = (isOuter ? outerR : innerR) * jitter;
    const angle = -Math.PI / 2 + (i / (points * 2)) * Math.PI * 2;
    const px = Math.cos(angle) * radius;
    const py = Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function _drawBowlPin(gs, pin, now) {
  const ctx = gs.ctx;
  const metrics = _bowlPinMetrics(gs, pin);
  const r = metrics.r;
  const img = _bowlBugImg(pin.kind);
  const fp = pin.fallProgress;
  const shakePower = pin.fallen ? 0 : _bowlClamp(pin.shakePower || 0, 0, 1.2);
  const shakeWave = pin.fallen ? 0 : Math.sin(now * 0.045 + (pin.shakePhase || 0)) * shakePower;
  const standingTilt = pin.fallen ? 0 : _bowlClamp((pin.tilt || 0) + shakeWave * 0.16, -1.05, 1.05);
  const visualJoltX = pin.fallen ? 0 : (pin.joltX || 0) + shakeWave * r * 0.28;
  const visualJoltY = pin.fallen ? 0 : (pin.joltY || 0) + Math.abs(shakeWave) * r * 0.055;
  const squash = pin.fallen ? 0 : _bowlClamp(pin.squash || 0, 0, 0.24);
  const wobbling = !pin.fallen && (Math.abs(standingTilt) > 0.015 || shakePower > 0.035 || now < (pin.wobbleUntil || 0));
  ctx.save();
  ctx.translate(pin.x + visualJoltX, pin.y + visualJoltY);

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.34 * (1 - fp * 0.65);
  ctx.fillStyle = '#000';
  ctx.beginPath();
  const shadowLean = pin.fallen ? (pin.fallRotDirX || 0) * r * 0.26 * fp : standingTilt * r * 0.42;
  ctx.ellipse(2 + shadowLean, r * 0.42, r * (1.32 + Math.min(0.18, Math.abs(standingTilt) * 0.18)), r * 0.38, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  let fallShiftX = 0;
  let fallShiftY = 0;
  if (pin.fallen) {
    const fallScale = 1 - 0.42 * fp;
    const alpha = 1 - fp * 0.38;
    const dir = (pin.fallRotDirX || 0) >= 0 ? 1 : -1;
    fallShiftX = (pin.fallRotDirX || 0) * r * 0.55 * fp;
    fallShiftY = Math.abs(pin.fallRotDirY || 0) * r * 0.22 * fp;
    ctx.globalAlpha = Math.max(0.58, alpha);
    ctx.translate(fallShiftX, fallShiftY);
    ctx.rotate(dir * fp * 1.18);
    ctx.scale(fallScale, fallScale);
  } else if (Math.abs(standingTilt) > 0.001 || squash > 0.01) {
    ctx.translate(standingTilt * r * 0.18, Math.abs(standingTilt) * r * 0.06 + squash * r * 0.05);
    ctx.rotate(standingTilt);
    ctx.scale(1 + Math.abs(standingTilt) * 0.03 + squash * 0.16, 1 - Math.abs(standingTilt) * 0.018 - squash * 0.10);
  }

  if (img && img.complete && img.naturalWidth) {
    const drawH = metrics.drawH;
    const drawW = metrics.drawW;
    if (!pin.fallen) {
      ctx.save();
      ctx.globalAlpha = 0.24;
      ctx.filter = 'brightness(0.46) saturate(0.82)';
      ctx.translate(-(pin.tiltDirX || 1) * r * 0.12, r * 0.11);
      ctx.drawImage(img, -drawW / 2, -drawH, drawW, drawH);
      ctx.restore();
    }
    ctx.drawImage(img, -drawW / 2, -drawH, drawW, drawH);
    ctx.save();
    ctx.globalCompositeOperation = 'source-atop';
    const light = ctx.createLinearGradient(-drawW * 0.35, -drawH, drawW * 0.45, -drawH * 0.15);
    light.addColorStop(0, 'rgba(255,255,255,0.20)');
    light.addColorStop(0.52, 'rgba(255,255,255,0.04)');
    light.addColorStop(1, 'rgba(0,0,0,0.13)');
    ctx.fillStyle = light;
    ctx.fillRect(-drawW / 2, -drawH, drawW, drawH);
    ctx.restore();
  } else {
    if (!pin.fallen) {
      ctx.fillStyle = 'rgba(42, 71, 24, 0.28)';
      ctx.beginPath();
      ctx.ellipse(-(pin.tiltDirX || 1) * r * 0.12, -r * 0.82 + r * 0.10, r * 0.9, r * 1.05, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#7AB540';
    ctx.beginPath();
    ctx.ellipse(0, -r * 0.9, r * 0.9, r * 1.05, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f7fff2';
    ctx.beginPath(); ctx.arc(-r * 0.28, -r * 1.1, r * 0.14, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(r * 0.28, -r * 1.1, r * 0.14, 0, Math.PI * 2); ctx.fill();
  }

  if (wobbling) {
    ctx.strokeStyle = 'rgba(255, 199, 78, 0.66)';
    ctx.lineWidth = Math.max(1.4, r * 0.06);
    ctx.beginPath();
    ctx.ellipse(0, r * 0.10, r * (0.56 + Math.min(0.18, Math.abs(standingTilt) * 0.28)), r * 0.13, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  if (!pin.fallen && pin.swayAmpLane) {
    ctx.fillStyle = 'rgba(255,255,255,0.56)';
    ctx.beginPath();
    ctx.ellipse(0, r * 0.08, r * 0.54, r * 0.10, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function _drawBowlDonguri(gs, d, now) {
  const ctx = gs.ctx;
  const baseR = d.r;
  const r = baseR * _bowlDepthScaleAt(gs, d.y);
  const bumpElapsed = d.bumpAt ? (now - d.bumpAt) : (BOWL_BUMP_MS + 1);
  const bumpProgress = (bumpElapsed >= 0 && bumpElapsed < BOWL_BUMP_MS)
    ? _bowlClamp(bumpElapsed / BOWL_BUMP_MS, 0, 1)
    : 1;
  const lift = bumpElapsed < BOWL_BUMP_MS
    ? Math.sin(bumpProgress * Math.PI) * (d.bumpPower || baseR * 0.75)
    : 0;
  const drawY = d.y - lift;

  // Cast shadow stays on the lane while the ball pops upward on impact.
  ctx.save();
  ctx.globalAlpha = 0.34 * Math.max(0.32, 1 - lift / Math.max(1, r * 2.2));
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(d.x + r * 0.12, d.y + r * 0.42, r * (1.05 - bumpProgress * 0.06), r * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(d.x, drawY);
  ctx.rotate(d.theta || 0);

  // Spherical body: radial light, darker rim, and soft lower shadow.
  const grad = ctx.createRadialGradient(-r * 0.38, -r * 0.42, r * 0.08, r * 0.18, r * 0.12, r * 1.18);
  grad.addColorStop(0, '#f3c979');
  grad.addColorStop(0.38, '#c88439');
  grad.addColorStop(0.76, '#8a511f');
  grad.addColorStop(1, '#3f230b');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.98, 0, Math.PI * 2);
  ctx.clip();
  ctx.globalAlpha = 0.26;
  ctx.strokeStyle = '#4c2b0e';
  ctx.lineWidth = Math.max(1.2, r * 0.055);
  for (let k = -2; k <= 2; k++) {
    ctx.beginPath();
    ctx.ellipse(k * r * 0.20, r * 0.08, r * 0.55, r * (0.15 + Math.abs(k) * 0.035), 0.26, 0.12 * Math.PI, 0.88 * Math.PI);
    ctx.stroke();
  }
  ctx.restore();

  // Acorn cap as a curved patch on the sphere, rotating with the ball.
  ctx.save();
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.clip();
  const capGrad = ctx.createLinearGradient(0, -r * 0.92, 0, r * 0.10);
  capGrad.addColorStop(0, '#5b3511');
  capGrad.addColorStop(0.46, '#7a4616');
  capGrad.addColorStop(1, '#2f1a08');
  ctx.fillStyle = capGrad;
  ctx.beginPath();
  ctx.moveTo(-r * 0.88, -r * 0.30);
  ctx.bezierCurveTo(-r * 0.58, -r * 0.76, r * 0.58, -r * 0.76, r * 0.88, -r * 0.30);
  ctx.bezierCurveTo(r * 0.62, r * 0.02, -r * 0.62, r * 0.02, -r * 0.88, -r * 0.30);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = 'rgba(45,24,6,0.62)';
  ctx.lineWidth = Math.max(1.1, r * 0.045);
  for (let k = -3; k <= 3; k++) {
    ctx.beginPath();
    ctx.moveTo(k * r * 0.22, -r * 0.65);
    ctx.bezierCurveTo(k * r * 0.28, -r * 0.46, k * r * 0.22, -r * 0.18, k * r * 0.10, r * 0.02);
    ctx.stroke();
  }
  for (let k = 0; k < 3; k++) {
    ctx.beginPath();
    ctx.ellipse(0, -r * (0.48 - k * 0.16), r * (0.66 - k * 0.10), r * 0.10, 0, 0.04 * Math.PI, 0.96 * Math.PI);
    ctx.stroke();
  }
  ctx.restore();

  ctx.fillStyle = '#3a210b';
  ctx.beginPath();
  ctx.ellipse(0, -r * 0.88, r * 0.12, r * 0.28, -0.18, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = 'rgba(38,21,7,0.36)';
  ctx.lineWidth = Math.max(1, r * 0.06);
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.97, 0, Math.PI * 2);
  ctx.stroke();

  // Screen-space highlight keeps the ball reading as a lit 3D object while it rolls.
  ctx.save();
  ctx.rotate(-(d.theta || 0));
  ctx.fillStyle = 'rgba(255,255,255,0.42)';
  ctx.beginPath();
  ctx.ellipse(-r * 0.34, -r * 0.38, r * 0.18, r * 0.12, -0.55, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,243,190,0.22)';
  ctx.beginPath();
  ctx.arc(-r * 0.12, -r * 0.18, r * 0.38, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  if (lift > 1) {
    ctx.save();
    ctx.rotate(-(d.theta || 0));
    ctx.globalAlpha = Math.max(0, 0.28 * (1 - bumpProgress));
    ctx.strokeStyle = '#fff4ad';
    ctx.lineWidth = Math.max(2, r * 0.08);
    ctx.beginPath();
    ctx.arc(0, 0, r * 1.08, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

function _drawBowlPono(gs, now) {
  const ctx = gs.ctx;
  const cx = BOWL_PONO_X_REL * gs.w;
  const cy = BOWL_PONO_Y_REL * gs.h;
  const ph = BOWL_PONO_HEIGHT_REL * gs.h;
  const pw = ph;
  if (imgPono && imgPono.complete && imgPono.naturalWidth) {
    ctx.drawImage(imgPono, cx - pw / 2, cy - ph / 2, pw, ph);
  } else {
    ctx.save();
    ctx.font = (ph * 0.85) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🐻', cx, cy);
    ctx.restore();
  }
}

function _finishBowlGame(gs) {
  if (gs !== _bowlGameState) return;
  if (gs.phase === 'boss_defeat') return;
  const now = performance.now();
  gs.phase = 'boss_defeat';
  gs.locked = false;
  gs.aimDrag = null;
  gs.donguris.length = 0;
  gs.effects.length = 0;
  if (gs.boss) {
    _updateBowlBossMotion(gs, now);
    gs.boss.defeatAt = now;
    gs.boss.defeatFromX = gs.boss.x;
    gs.boss.defeatFromY = gs.boss.y;
    gs.boss.flashUntil = now + BOWL_BOSS_DEFEAT_MS * 0.45;
  }
  if (gs.noteEl) gs.noteEl.textContent = 'ボスが とんでいった！';
  _bowlFloatText(gs, 'やった！', gs.w * 0.5, gs.h * 0.28);
  try { _playMzSePitch('correct', 2); } catch (_) {}
  _drawBowlScene(gs, now);
  if (!gs.reducedMotion && !gs.rafId) _startBowlLoop(gs);
  _webGimmickSetTimeout(function() {
    if (gs !== _bowlGameState) return;
    _resolveBowlGame();
  }, gs.reducedMotion ? 360 : BOWL_BOSS_DEFEAT_MS);
}

function _resolveBowlGame() {
