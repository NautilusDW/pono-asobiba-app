<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8F0;
  --primary: #F2915A;
  --primary-light: #FDDCBF;
  --text: #5D4E37;
  --text-light: #A89880;
  --shadow: rgba(93,78,55,0.12);
  --radius: 20px;
}

html, body {
  min-height: 100dvh;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  overflow: hidden;
  overscroll-behavior: none;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 8px 16px 12px;
}

.header {
  text-align: center;
  position: relative;
  width: 100%;
  flex-shrink: 0;
}

.header h1 {
  font-size: 1.4rem; font-weight: 900; color: var(--primary);
  text-shadow: 2px 2px 0 var(--primary-light);
}
.subtitle {
  font-size: 0.78rem; color: var(--text-light); font-weight: 700;
}

.score-row {
  display: flex; gap: 28px; justify-content: center; align-items: center;
  flex-shrink: 0;
  position: relative; width: 100%;
}
.restart-btn {
  position: absolute; right: 0;
  padding: 6px 16px; border: none; border-radius: 50px;
  background: var(--primary-light); color: var(--primary);
  font-family: inherit; font-size: 0.8rem; font-weight: 900;
  cursor: pointer; box-shadow: 0 2px 8px var(--shadow);
  transition: transform 0.1s;
}
.restart-btn:active { transform: scale(0.92); }
.score-box { text-align: center; }
.score-label { font-size: 0.68rem; font-weight: 900; color: var(--text-light); letter-spacing: 0.03em; }
.score-val { font-size: 1.7rem; font-weight: 900; color: var(--primary); line-height: 1; }

#game-wrap {
  position: relative;
  border-radius: var(--radius);
  box-shadow: 0 4px 20px var(--shadow), inset 0 0 0 3px var(--primary-light);
  overflow: hidden;
  overscroll-behavior: none;
  cursor: pointer;
  flex-shrink: 0;
}
#game-wrap canvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
}

#flash {
  position: absolute; inset: 0; z-index: 2;
  pointer-events: none; border-radius: var(--radius);
  opacity: 0; transition: opacity 0.25s;
}
#flash.success { background: rgba(52,211,153,0.42); opacity: 1; }
#flash.miss    { background: rgba(239,68,68,0.42); opacity: 1; }

.overlay {
  position: fixed; inset: 0; z-index: 3;
  background: rgba(93,78,55,0.72);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0;
}
.overlay.hidden { display: none; }
.overlay-card {
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  max-width: 320px; width: 85vw;
  padding: 32px 28px 24px;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
}
.overlay-emoji { font-size: 2.6rem; }
.overlay-title {
  font-size: 1.4rem; font-weight: 900; color: #5D4E37;
  text-align: center; line-height: 1.35;
}
.overlay-score { font-size: 1.4rem; font-weight: 900; color: #F97316; }
.overlay-hi { font-size: 0.85rem; font-weight: 700; color: #A89585; }
.overlay-btn {
  margin-top: 4px; padding: 11px 32px;
  border: none; border-radius: 50px;
  background: linear-gradient(135deg, #FBBF24, #F97316);
  color: #fff; font-family: inherit; font-size: 1rem; font-weight: 900;
  cursor: pointer; transition: transform 0.15s;
  box-shadow: 0 3px 12px rgba(249,115,22,0.4);
}
.overlay-btn:active { transform: scale(0.95); }

.lives-row {
  font-size: 1.6rem; letter-spacing: 3px; flex-shrink: 0;
}
.tap-hint {
  font-size: 0.82rem; font-weight: 900; color: var(--text-light);
  animation: blink 1.2s ease-in-out infinite; flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* ─── Portrait notice (landscape block for touch devices) ─── */
#portrait-notice {
  display: none;
  position: fixed; inset: 0; z-index: 9980;
  background: #1a3a4a;
  flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  color: white; text-align: center; padding: 40px;
  font-family: 'Zen Maru Gothic', sans-serif;
}
#portrait-notice .rotate-icon { font-size: 64px; animation: rotateHintV 2s ease-in-out infinite; }
@keyframes rotateHintV {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(-90deg); }
}
#portrait-notice p { font-size: 18px; line-height: 1.6; }
@media screen and (orientation: landscape) and (pointer: coarse) {
  #portrait-notice { display: flex; }
}
@media screen and (orientation: portrait), (pointer: fine) {
  #portrait-notice { display: none; }
}
.tut-dim { position:fixed;inset:0;z-index:9995;background:rgba(93,78,55,0.6);pointer-events:auto; }
.tut-dim.hidden { display:none; }
.tut-bubble { position:fixed;z-index:9997;background:#fff;border-radius:16px;padding:12px 12px;max-width:none;box-shadow:0 4px 20px rgba(93,78,55,0.3);font-size:0.95rem;font-weight:700;color:#5D4E37;line-height:1.6;text-align:center;white-space:nowrap;animation:tutPopIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.tut-bubble.hidden { display:none; }
@keyframes tutPopIn { from{transform:scale(0.8) translate(-50%,-50%);opacity:0.5} to{transform:scale(1) translate(-50%,-50%);opacity:1} }
.tut-next-btn { display:inline-block;margin-top:10px;padding:8px 24px;border:none;border-radius:50px;background:linear-gradient(135deg,#60A5FA,#818CF8);color:#fff;font-family:inherit;font-size:0.85rem;font-weight:900;cursor:pointer; }
</style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="89d02cb9-6bec-4f30-a21a-65321374dbdc"></script>

<body>

<div id="portrait-notice">
  <div class="rotate-icon">📱</div>

<header class="header">

<div class="score-row">
  <div class="score-box">

  <div class="score-box">

<div id="game-wrap">
  <div id="flash"></div>
  <div id="bird-indicator" style="position:absolute;top:6px;right:8px;z-index:1;font-size:22px;pointer-events:none;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.35));">🐦</div>
  <div id="gameover-overlay" class="overlay hidden">
    <div class="overlay-card">
      <p class="overlay-emoji">🐦</p>

    <div class="overlay-card" style="border: 3px solid #4CAF50;">
      <p class="overlay-emoji">🐦🌳</p>
      <p class="overlay-title">コトリが<br>すに かえれた！</p>
      <p class="overlay-score" id="clear-score">たかさ: 0</p>
      <p class="overlay-hi" id="clear-hi"></p>
      <button class="overlay-btn" id="clear-btn">もういっかい！</button>
    </div>
  </div>
</div>

<div class="lives-row" id="lives-row">❤️❤️❤️</div>
<p class="tap-hint">タップ または クリック でブロックをおとそう！</p>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script>
// ===== Premium Gate =====
if (localStorage.getItem('pono_premium') !== '1') {
  location.replace('../index.html');
}

const { Engine, Render, World, Bodies, Body, Runner, Events } = Matter;
const _ponoFaceImg = new Image();
_ponoFaceImg.src = '../assets/images/characters/pono/pono_face_circle.png';

// ===== Sizing =====
const CW = Math.min(window.innerWidth - 32, 400);
const CH = Math.max(Math.min(window.innerHeight - 210, 480), 260);
const gameWrap = document.getElementById('game-wrap');
gameWrap.style.width  = CW + 'px';
gameWrap.style.height = CH + 'px';

// ===== Engine & Render =====
const engine = Engine.create({ gravity: { y: 1.0 } });
const render = Render.create({
  element: gameWrap,
  engine,
  options: { width: CW, height: CH, wireframes: false, background: 'rgba(255,248,240,0.92)',
             hasBounds: true }
});
render.bounds.min = { x: 0, y: 0 };
render.bounds.max = { x: CW, y: CH };
const runner = Runner.create();

// ===== Constants =====
const BW = Math.max(Math.floor(CW * 0.28), 65);
const BH = 28;

// Block shape variations: wide bar / square / tall column
const SHAPES = [
  { w: BW,                    h: BH,                   r: 7 }, // wide bar ~112×28
  { w: Math.round(BH * 2.0), h: Math.round(BH * 2.0), r: 8 }, // square ~56×56
  { w: Math.round(BW * 0.50), h: Math.round(BH * 2.6), r: 6 }, // tall column ~56×73
];
const SWING_Y = BH / 2 + 8;
const PLAT_W  = Math.floor(CW * 0.55);
const PLAT_H  = 22;
const PLAT_Y  = CH - 50;
const COLORS  = ['#FF6B9D','#F97316','#EAB308','#22C55E','#3B82F6','#8B5CF6','#F43F5E','#06B6D4'];
const HIT_BONUS = 8; // px added to each side of hit zone
const FREEZE_INTERVAL = 8; // 8ブロック置くごとにフリーズ
const FREEZE_GOAL     = 3; // 3回フリーズでクリア（コトリの巣に届く）
const GOAL_WORLD_Y    = PLAT_Y - 680; // 止まり木のワールドY座標（常時表示）
const KARASU_SCREEN_Y = SWING_Y + 55; // カラスの固定スクリーンY
const KARASU_W = 34;
const PONO_DUR = 1400; // ポノアニメーション時間 ms

function getNextShape() {
  if (score < 4) return SHAPES[0];                                     // 横長のみ
  if (score < 8) return SHAPES[Math.floor(Math.random() * 2)];         // 横長 or 正方形
  return SHAPES[Math.floor(Math.random() * SHAPES.length)];             // 全種
}

function triggerFreeze() {
  // 傾きが小さいブロックだけ固定（約15度以内）、それ以外は消す
  const TILT_LIMIT = 0.26; // ラジアン ≈ 15度
  engine.world.bodies.forEach(body => {
    if (!body.isStatic && body.label === 'block') {
      const angleMod = Math.abs(body.angle % Math.PI);
      const isFlat = angleMod < TILT_LIMIT || angleMod > Math.PI - TILT_LIMIT;
      if (isFlat) {
        Body.setAngle(body, 0); // 角度を水平に補正してから固定
        Body.setStatic(body, true);
        body.render.fillStyle = '#A89880';
        body.render.strokeStyle = '#8C7B68';
      } else {
        World.remove(engine.world, body); // 斜めのものは消す
      }
    }
  });

  freezeSegment++;
  if (freezeSegment >= 1) karasuActive = true; // 1回目フリーズ後にカラス登場

  // スクロール中だった場合はキャンセルし、カメラを直接最終位置に移動
  scrolling = false;
  const targetCamY = Math.min(0, stackTopY - Math.floor(CH * 0.40));
  cameraY = targetCamY;
  render.bounds.min.y = cameraY;
  render.bounds.max.y = cameraY + CH;

  // ポノ登場アニメーション（画面下→スタック頂上 or ゴールバー）
  ponoAnim.fromY = CH + 20;
  ponoAnim.toY   = freezeSegment >= FREEZE_GOAL
    ? Math.max(30, GOAL_WORLD_Y - cameraY)   // 最終: ゴールバーへ
    : Math.max(30, stackTopY - cameraY - 20); // 通常: スタック頂上へ
  ponoAnim.startTime = performance.now();
  ponoAnim.active = true;
  gameActive = false;
  Runner.stop(runner);
}

function stabilizeStack() {
  engine.world.bodies.forEach(body => {
    if (!body.isStatic && body.label === 'block') {
      Body.setAngularVelocity(body, 0);
      Body.setVelocity(body, { x: 0, y: Math.max(0, body.velocity.y) });
    }
  });
}

// ===== Static physics bodies (reused across restarts) =====
const ground = Bodies.rectangle(CW/2, CH + 40, CW * 3, 80, {
  isStatic: true, label: 'ground',
  render: { fillStyle: 'transparent' }
});
const plat = Bodies.rectangle(CW/2, PLAT_Y + PLAT_H/2, PLAT_W, PLAT_H, {
  isStatic: true, label: 'platform',
  render: { fillStyle: '#F2915A', strokeStyle: '#D97706', lineWidth: 2 }
});
const wallL = Bodies.rectangle(-25, CH/2, 50, CH * 3, {
  isStatic: true, render: { fillStyle: 'transparent' }
});
const wallR = Bodies.rectangle(CW + 25, CH/2, 50, CH * 3, {
  isStatic: true, render: { fillStyle: 'transparent' }
});

// ===== Game State =====
let swingPhase = 0, swingX = CW/2, lastTs = null;
let lives = 3, score = 0;
let hiScore = parseInt(localStorage.getItem('pono_stacking_hi') || '0');
let colorIdx = 0, fallingBody = null, gameActive = false;
let dropTimer = null, stackTopY = PLAT_Y;
let currentShape = SHAPES[0], fallingShape = SHAPES[0];
let freezeSegment = 0;
let karasuActive = false, karasuX = CW / 4, karasuDir = 1;
let ponoAnim = { active: false, fromY: 0, toY: 0, startTime: 0 };

// ===== Camera state =====
let cameraY        = 0;   // world y shown at screen top (negative = camera moved up)
let scrolling      = false;
let scrollStartY   = 0, scrollTargetY = 0, scrollStartTime = 0;
const SCROLL_DUR   = 550;                    // ms
const SCROLL_DIST  = Math.floor(CH * 0.40); // px per scroll
const SCROLL_TRIG      = SWING_Y + 65;           // scroll UP: stack screen-top too close to swing
const SCROLL_DOWN_TRIG = Math.floor(CH * 0.60);  // scroll DOWN: stack screen-top too low

// ===== UI refs =====
const scoreEl   = document.getElementById('score-val');
const hiEl      = document.getElementById('hi-val');
const livesEl   = document.getElementById('lives-row');
const flashEl   = document.getElementById('flash');
const gameOv    = document.getElementById('gameover-overlay');
const finalScEl = document.getElementById('final-score');
const hiMsgEl   = document.getElementById('hi-msg');
hiEl.textContent = hiScore;

// ===== Swing timing + scroll animation (beforeRender) =====
Events.on(render, 'beforeRender', () => {
  const now = performance.now();

  // ポノアニメーション中は何もしない（afterRenderで処理）
  if (ponoAnim.active) return;

  // Camera scroll animation
  if (scrolling) {
    const t = Math.min((now - scrollStartTime) / SCROLL_DUR, 1);
    const e = 1 - Math.pow(1 - t, 3); // ease-out cubic
    cameraY = scrollStartY + (scrollTargetY - scrollStartY) * e;
    render.bounds.min.y = cameraY;
    render.bounds.max.y = cameraY + CH;
    if (t >= 1) {
      cameraY = scrollTargetY;
      render.bounds.min.y = cameraY;
      render.bounds.max.y = cameraY + CH;
      scrolling  = false;
      gameActive = true;
      lastTs     = null;
      if (!ponoAnim.active) Runner.run(runner, engine); // resume physics after scroll (Pono anim will do it if active)
    }
    return;
  }

  if (!gameActive) return;

  // Continuously check if camera scroll is needed (handles collapse too)
  checkScroll();
  if (scrolling) return;

  if (fallingBody) return;
  if (!lastTs) { lastTs = now; return; }
  const dt = Math.min((now - lastTs) / 1000, 0.05);
  lastTs = now;
  const swingSpeed = Math.min(0.45 + score * 0.04, 1.1);
  swingPhase += swingSpeed * dt;
  swingX = CW/2 + Math.sin(swingPhase) * (CW * 0.36);

  // カラスを左右に移動
  if (karasuActive) {
    const karasuSpeed = 70 + freezeSegment * 20;
    karasuX += karasuDir * karasuSpeed * dt;
    if (karasuX > CW - 20) { karasuX = CW - 20; karasuDir = -1; }
    if (karasuX < 20)       { karasuX = 20;       karasuDir =  1; }
  }
});

// ===== Draw swing block on canvas (afterRender) =====
function drawRR(ctx, x, y, w, h, r) {
  ctx.beginPath();
  if (ctx.roundRect) {
    ctx.roundRect(x, y, w, h, r);
  } else {
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
    ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
    ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
    ctx.closePath();
  }
}

Events.on(render, 'afterRender', () => {
  const ctx = render.context;

  // カラスを描画（最終フリーズ中は非表示）
  if (karasuActive && freezeSegment < FREEZE_GOAL) {
    ctx.save();
    ctx.font = '26px serif';
    ctx.textAlign = 'center';
    ctx.fillText('🐦\u200D⬛', karasuX, KARASU_SCREEN_Y);
    ctx.restore();
  }

  // 止まり木（ゴール）をワールド空間で常時描画
  {
    const gsy = GOAL_WORLD_Y - cameraY; // ワールド→スクリーン変換
    if (gsy < CH + 20) { // 画面に入ってきたら描画（上にはみ出ても可）
      const barW = 80, barH = 12, barR = 6;
      ctx.save();
      ctx.fillStyle   = '#F2915A';
      ctx.strokeStyle = '#D97706';
      ctx.lineWidth   = 2;
      drawRR(ctx, CW / 2 - barW / 2, gsy - barH, barW, barH, barR);
      ctx.fill();
      ctx.stroke();
      ctx.font = '24px serif';
      ctx.textAlign = 'center';
      ctx.fillText('🐦', CW / 2, gsy - barH - 4);
      ctx.restore();
    }
  }

  // ポノ登場アニメーション
  if (ponoAnim.active) {
    const now2 = performance.now();
    const t = Math.min((now2 - ponoAnim.startTime) / PONO_DUR, 1);
    const ease = 1 - Math.pow(1 - t, 2); // ease-out quad
    const curY = ponoAnim.fromY + (ponoAnim.toY - ponoAnim.fromY) * ease;
    ctx.save();
    if (_ponoFaceImg.complete) {
      ctx.drawImage(_ponoFaceImg, CW / 2 - 14, curY - 14, 28, 28);
    } else {
      ctx.font = '28px serif';
      ctx.textAlign = 'center';
      ctx.fillText('🐻', CW / 2, curY);
    }
    ctx.restore();
    if (t >= 1) {
      ponoAnim.active = false;
      if (freezeSegment >= FREEZE_GOAL) {
        // ゴール！コトリの巣に届いた！
        setTimeout(doGameClear, 400);
      } else {
        gameActive = true;
        Runner.run(runner, engine);
        lastTs = null;
      }
    }
    return;
  }

  if (!gameActive || fallingBody) return;
  const color = COLORS[colorIdx % COLORS.length];

  // Dotted guide line (swing block → stack top)
  ctx.save();
  ctx.strokeStyle = 'rgba(91,74,63,0.18)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(swingX, SWING_Y + currentShape.h/2 + 3);
  ctx.lineTo(swingX, Math.min(stackTopY, PLAT_Y) - cameraY - 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Swinging block
  ctx.save();
  ctx.fillStyle = color;
  ctx.shadowColor = 'rgba(0,0,0,0.18)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 3;
  drawRR(ctx, swingX - currentShape.w/2, SWING_Y - currentShape.h/2, currentShape.w, currentShape.h, currentShape.r);
  ctx.fill();
  ctx.restore();
});

// ===== Drop =====
function dropBlock() {
  if (!gameActive || fallingBody) return;

  // カラスにぶつかった？
  if (karasuActive) {
    const bLeft  = swingX - currentShape.w / 2;
    const bRight = swingX + currentShape.w / 2;
    if (bRight > karasuX - KARASU_W / 2 && bLeft < karasuX + KARASU_W / 2) {
      lives--;
      updateLives();
      showFlash('miss');
      if (lives <= 0) setTimeout(doGameOver, 350);
      return; // ブロックを落とさない
    }
  }

  lastTs = null;
  const color = COLORS[colorIdx % COLORS.length];
  colorIdx++;

  // Hit/miss determined at the moment of drop — no physics ambiguity
  const platLeft  = CW/2 - PLAT_W/2;
  const platRight = CW/2 + PLAT_W/2;
  fallingShape = currentShape;
  const isHit = swingX + fallingShape.w/2 > platLeft - HIT_BONUS
             && swingX - fallingShape.w/2 < platRight + HIT_BONUS;

  const worldSwingY = SWING_Y + cameraY; // screen → world
  fallingBody = Bodies.rectangle(swingX, worldSwingY, fallingShape.w, fallingShape.h, {
    restitution: 0.02, friction: 1.4, frictionStatic: 2.5, frictionAir: 0.06, label: 'block',
    render: { fillStyle: color, strokeStyle: 'rgba(0,0,0,0.08)', lineWidth: 1 }
  });
  Body.setVelocity(fallingBody, { x: 0, y: 4 });
  World.add(engine.world, fallingBody);

  if (isHit) {
    // Block will land on platform/stack — wait for it to settle then score
    dropTimer = setTimeout(checkHit, 2600);
  } else {
    // Miss — show block falling briefly then remove it
    dropTimer = setTimeout(doMiss, 800);
  }
}

// ===== Scroll: pan camera up or down based on stack position =====
function checkScroll() {
  if (scrolling || fallingBody || !gameActive) return;

  // Find actual topmost block (world y) — includes frozen (static) blocks too
  let minY = PLAT_Y;
  engine.world.bodies.forEach(body => {
    if (body.label === 'block') minY = Math.min(minY, body.position.y);
  });
  stackTopY = minY;

  const screenTop = stackTopY - cameraY; // world → screen

  if (screenTop < SCROLL_TRIG) {
    // Stack too close to top → pan camera UP
    scrollStartY    = cameraY;
    scrollTargetY   = cameraY - SCROLL_DIST;
    scrollStartTime = performance.now();
    scrolling = true; gameActive = false;
    Runner.stop(runner); // freeze physics during scroll
  } else if (screenTop > SCROLL_DOWN_TRIG && cameraY < 0) {
    // Stack collapsed/lowered → pan camera DOWN to show stack
    scrollStartY    = cameraY;
    scrollTargetY   = Math.max(0, stackTopY - Math.floor(CH * 0.25));
    scrollStartTime = performance.now();
    scrolling = true; gameActive = false;
    Runner.stop(runner); // freeze physics during scroll
  }
}

// ===== Hit: block was on-target =====
function checkHit() {
  if (!fallingBody) return;
  const body = fallingBody;
  fallingBody = null;
  lastTs = null;
  score++;
  stackTopY = Math.min(stackTopY, body.position.y - fallingShape.h);
  stabilizeStack();
  currentShape = getNextShape();
  updateScore();
  showFlash('success');
  if (score % 10 === 0) awardPoints(5);
  if (window.setStatMax) window.setStatMax('stacking_height', score);

  // フリーズ判定（5ブロックごと）
  if (score > 0 && score % FREEZE_INTERVAL === 0) {
    setTimeout(triggerFreeze, 400);
  }
}

// ===== Miss: block was off-target (no life penalty — only カラス costs lives) =====
function doMiss() {
  if (fallingBody) { World.remove(engine.world, fallingBody); fallingBody = null; }
  lastTs = null;
  currentShape = getNextShape();
  showFlash('miss');
}

// Clean up blocks far below the viewport
Events.on(engine, 'afterUpdate', () => {
  const cleanY = cameraY + CH + BH * 4; // world y well below visible area
  engine.world.bodies.forEach(body => {
    if (!body.isStatic && body.label === 'block' && body.position.y > cleanY) {
      World.remove(engine.world, body);
    }
  });
});

// ===== Game Clear =====
function doGameClear() {
  gameActive = false;
  Render.stop(render);
  Runner.stop(runner);
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('pono_stacking_hi', String(hiScore));
    hiEl.textContent = hiScore;
    document.getElementById('clear-hi').textContent = '🎉 あたらしいきろく！';
    awardPoints(10);
  } else {
    document.getElementById('clear-hi').textContent = `さいこうきろく: ${hiScore}`;
  }
  document.getElementById('clear-score').textContent = `たかさ: ${score}`;
  document.getElementById('gameclear-overlay').classList.remove('hidden');
}

// ===== Game Over =====
function doGameOver() {
  gameActive = false;
  Render.stop(render);
  Runner.stop(runner);

  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('pono_stacking_hi', String(hiScore));
    hiEl.textContent = hiScore;
    hiMsgEl.textContent = '🎉 コトリのすに とどいた！';
    awardPoints(10);
  } else {
    hiMsgEl.textContent = `さいこう: ${hiScore}`;
  }
  finalScEl.textContent = `たかさ: ${score}`;
  gameOv.classList.remove('hidden');
}

// ===== Start / Restart =====
function startGame() {
  // Clear all dynamic bodies from previous game
  World.clear(engine.world);
  Engine.clear(engine);
  World.add(engine.world, [plat, wallL, wallR]);

  // Reset state
  lives = 3; score = 0;
  colorIdx   = Math.floor(Math.random() * COLORS.length);
  swingPhase = Math.random() * Math.PI * 2;
  swingX     = CW / 2;
  fallingBody = null;
  stackTopY  = PLAT_Y;
  lastTs     = null;
  currentShape = getNextShape();
  freezeSegment = 0;
  karasuActive  = false;
  karasuX = CW / 4;
  karasuDir = 1;
  ponoAnim.active = false;
  // Reset camera
  cameraY = 0;
  render.bounds.min.y = 0;
  render.bounds.max.y = CH;
  scrolling = false;

  updateScore();
  updateLives();
  gameOv.classList.add('hidden');
  document.getElementById('gameclear-overlay').classList.add('hidden');

  gameActive = true;
  Render.run(render);
  Runner.run(runner, engine);
}

// ===== UI Helpers =====
function updateScore() {
  scoreEl.textContent = score;
  if (score > hiScore) { hiScore = score; hiEl.textContent = hiScore; }
}

function updateLives() {
  livesEl.textContent = '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3 - lives));
}

let flashTimer = null;
function showFlash(type) {
  clearTimeout(flashTimer);
  flashEl.className = '';
  void flashEl.offsetWidth; // force reflow for re-trigger
  flashEl.className = type;
  flashTimer = setTimeout(() => { flashEl.className = ''; }, 300);
}

// ===== Input =====
gameWrap.addEventListener('click', dropBlock);
// iOS Safari: ボタンタップ時は preventDefault しない（click 合成を妨げないため）
gameWrap.addEventListener('touchend', e => {
  if (e.target.closest('button')) return;
  e.preventDefault();
  dropBlock();
}, { passive: false });

// ゲームオーバー後の「もういっかい」ボタン
const retryBtn = document.getElementById('retry-btn');
retryBtn.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); startGame(); }, { passive: false });
retryBtn.addEventListener('click', e => { e.stopPropagation(); startGame(); });

// クリア後の「もういっかい」ボタン
const clearBtn = document.getElementById('clear-btn');
clearBtn.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); startGame(); }, { passive: false });
clearBtn.addEventListener('click', e => { e.stopPropagation(); startGame(); });

// プレイ中の「やり直し」ボタン
const restartBtn2 = document.getElementById('restart-btn2');
restartBtn2.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); startGame(); }, { passive: false });
restartBtn2.addEventListener('click', e => { e.stopPropagation(); startGame(); });

function showTutorial() {
  var dim = document.getElementById('tut-dim');
  var bubble = document.getElementById('tut-bubble');
  if (!dim || !bubble) return;
  var step = 0;
  var steps = [
    function() {
      dim.classList.remove('hidden');
      bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
      bubble.innerHTML = 'タップすると ブロックが<br>おちるよ！<br><button class="tut-next-btn" id="tut-next">つぎ →</button>';
      bubble.classList.remove('hidden');
      document.getElementById('tut-next').addEventListener('pointerdown', function(e) { e.preventDefault(); e.stopPropagation(); nextStep(); });
    },
    function() {
      bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
      bubble.innerHTML = 'うまく つみかさねて<br>たかく つもう！<br><button class="tut-next-btn" id="tut-next">あそぼう！</button>';
      document.getElementById('tut-next').addEventListener('pointerdown', function(e) { e.preventDefault(); e.stopPropagation(); endTut(); });
    }
  ];
  function nextStep() { step++; step < steps.length ? steps[step]() : endTut(); }
  function endTut() {
    dim.removeEventListener('pointerdown', dimTap);
    dim.classList.add('hidden');
    bubble.classList.add('hidden');
    localStorage.setItem('stacking_tut_seen', '1');
  }
  function dimTap(e) { e.preventDefault(); e.stopPropagation(); nextStep(); }
  dim.addEventListener('pointerdown', dimTap);
  steps[0]();
}

// ページ読み込み完了後すぐにゲーム開始
startGame();
initMenu({ tutorial: showTutorial });
localStorage.removeItem('stacking_tut_seen'); // テスト用: 毎回表示
if (!localStorage.getItem('stacking_tut_seen')) {
  setTimeout(showTutorial, 500);
}

// ─── Portrait notice: JS で確実に制御（CSS media query の遅延対策） ───
function updatePortraitNotice() {
  const notice = document.getElementById('portrait-notice');
  if (!notice) return;
  const isPortrait = window.innerHeight > window.innerWidth;
  const isTouch = matchMedia('(pointer: coarse)').matches;
  if (!isPortrait && isTouch) {
    notice.style.display = 'flex';
  } else {
    notice.style.display = 'none';
  }
}
updatePortraitNotice();
window.addEventListener('orientationchange', () => {
  setTimeout(updatePortraitNotice, 100);
  setTimeout(updatePortraitNotice, 500);
});
window.addEventListener('resize', updatePortraitNotice);
</script>
