<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>フクロウ博士のなぞなぞ | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="../common/mvp-flags.js"></script>
<script src="../common/achievements.js"></script>
<script src="../common/acorns.js"></script>
<script src="../common/menu.js"></script>
<script src="../common/narration.js"></script>
<script src="./data/questions.js"></script>
<script src="./data/flowers.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8E7;
  --primary: #F59E0B;
  --primary-light: #FDE68A;
  --accent: #FBBF24;
  --text: #5D4E37;
  --text-light: #A89880;
  --success: #10B981;
  --danger: #EF4444;
  --shadow: rgba(93,78,55,0.12);
  --radius: 20px;
}

html, body {
  min-height: 100dvh;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  overscroll-behavior: none;
}

body {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 18px;
  padding: 28px clamp(16px, 2.4vw, 36px) 30px;
  margin: 0;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(255, 249, 236, 0.5), rgba(255, 245, 220, 0.72)),
    url('../assets/images/quizland/title_back.jpg') center / cover no-repeat;
  opacity: 0.94;
  z-index: -2;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.82), transparent 28%),
    radial-gradient(circle at 86% 14%, rgba(255, 224, 163, 0.55), transparent 24%),
    linear-gradient(180deg, rgba(255, 247, 230, 0.2), rgba(245, 158, 11, 0.08));
  pointer-events: none;
  z-index: -1;
}

.game-shell {
  width: min(100%, 1600px);
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* ===== Header ===== */
.header {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 16px;
  justify-content: flex-start;
  padding: 14px 18px;
  border-radius: 28px;
  background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,249,236,0.88));
  border: 1px solid rgba(214, 161, 74, 0.24);
  box-shadow: 0 12px 28px rgba(120, 83, 20, 0.12);
  backdrop-filter: blur(6px);
}
.pono-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: #fff;
  border: 4px solid #F6C66A;
  box-shadow: 0 6px 14px rgba(120, 83, 20, 0.16);
  overflow: hidden;
  flex-shrink: 0;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.pono-avatar img { width: 100%; height: 100%; object-fit: cover; }
.pono-avatar.jump { animation: ponojump 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes ponojump {
  0%, 100% { transform: translateY(0) scale(1); }
  40% { transform: translateY(-18px) scale(1.08); }
}

.header h1 {
  flex: 1;
  font-size: clamp(1.7rem, 2.2vw, 2.8rem);
  font-weight: 900;
  color: #A65A13;
  line-height: 1.15;
  letter-spacing: 0.02em;
  text-shadow: 0 3px 0 rgba(255, 242, 207, 0.92);
}

/* ===== HUD ===== */
.hud {
  width: 100%;
  display: grid;
  grid-template-columns: auto auto auto minmax(140px, 1fr);
  align-items: center;
  gap: 10px;
  background: rgba(255, 253, 247, 0.88);
  border-radius: 22px;
  padding: 10px 14px;
  border: 1px solid rgba(214, 161, 74, 0.18);
  box-shadow: 0 8px 22px rgba(120, 83, 20, 0.1);
  backdrop-filter: blur(6px);
  font-size: 0.92rem;
  font-weight: 700;
}
.hud > * {
  min-width: 0;
}
#hud-back-btn {
  border: none;
  border-radius: 999px;
  background: linear-gradient(180deg, #FFF9EC, #F5E2B5);
  color: #8B5A19;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 900;
  cursor: pointer;
  padding: 10px 14px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 4px 10px rgba(120, 83, 20, 0.12);
}
#hud-label,
#hud-seeds {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 42px;
  padding: 0 16px;
  border-radius: 999px;
  background: rgba(255, 247, 227, 0.96);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
}
#hud-label {
  color: #7A4D19;
}
#hud-seeds {
  color: #B87407;
  font-size: 1rem;
}
.hud-progress {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
}
.hud-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #E5E7EB;
  transition: background 0.3s, transform 0.3s;
}
.hud-dot.done    { background: var(--success); }
.hud-dot.current { background: var(--primary); transform: scale(1.28); }

/* ===== Stage area ===== */
.stage {
  width: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1.45fr) minmax(340px, 0.95fr);
  gap: clamp(18px, 2vw, 30px);
  align-items: stretch;
}
.question-panel,
.answer-panel {
  position: relative;
  border-radius: 34px;
  padding: clamp(20px, 2vw, 28px);
  border: 1px solid rgba(214, 161, 74, 0.24);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,249,236,0.88)),
    radial-gradient(circle at top, rgba(255,255,255,0.85), transparent 55%);
  box-shadow: 0 18px 36px rgba(120, 83, 20, 0.14);
  overflow: hidden;
}
.question-panel::before,
.answer-panel::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at top right, rgba(248, 193, 83, 0.14), transparent 28%),
    radial-gradient(circle at bottom left, rgba(183, 111, 32, 0.08), transparent 32%);
  pointer-events: none;
}
.question-panel {
  min-height: clamp(420px, 58vh, 720px);
  display: flex;
  flex-direction: column;
}
.answer-panel {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.panel-chip {
  align-self: flex-start;
  display: inline-flex;
  align-items: center;
  min-height: 42px;
  padding: 0 16px;
  border-radius: 999px;
  background: linear-gradient(180deg, #F8E6B7, #EABF6C);
  color: #7A4D19;
  font-size: 0.95rem;
  font-weight: 900;
  letter-spacing: 0.05em;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 6px 14px rgba(120, 83, 20, 0.12);
}
.panel-chip--leaf {
  background: linear-gradient(180deg, #DDEAA2, #BFD876);
  color: #5B6525;
}
.answer-guide {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 16px;
  border-radius: 26px;
  background: rgba(255, 252, 242, 0.92);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
}
.answer-guide__owl {
  width: clamp(84px, 9vw, 132px);
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 6px 10px rgba(120, 83, 20, 0.18));
}
.answer-guide__copy {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.answer-guide__copy p {
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.55;
  color: #876233;
}
.question-wrap {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 18px 0 18px;
  padding-right: 66px;
}
.question-board {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  border-radius: 30px;
  padding: clamp(18px, 2vw, 30px);
  background:
    linear-gradient(180deg, rgba(255, 253, 247, 0.98), rgba(248, 236, 206, 0.94)),
    radial-gradient(circle at top, rgba(255,255,255,0.82), transparent 50%);
  border: 3px solid rgba(226, 196, 132, 0.9);
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.86), inset 0 -8px 18px rgba(214, 161, 74, 0.12);
}

.question {
  font-size: clamp(1.45rem, 1.65vw, 2.15rem);
  font-weight: 900;
  color: #6A471D;
  text-align: center;
  line-height: 1.55;
  white-space: pre-line;
  text-wrap: balance;
}
#question-speaker {
  position: absolute;
  top: 50%;
  right: 0;
  transform: translateY(-50%);
  width: 54px;
  height: 54px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(180deg, #F7C453, #E99A21);
  color: #fffaf0;
  font-size: 1.4rem;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(196, 122, 14, 0.26);
  display: none;
}

#stage-area {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  gap: clamp(12px, 1.1vw, 18px);
  min-height: clamp(220px, 36vh, 360px);
}

/* ===== Item rows (for order/count) ===== */
.item-row {
  display: flex;
  gap: clamp(10px, 1vw, 18px);
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}
.color-chip {
  width: clamp(68px, 5vw, 96px);
  height: clamp(68px, 5vw, 96px);
  border-radius: 20px;
  border: 3px solid rgba(255,255,255,0.8);
  box-shadow: 0 8px 18px rgba(120, 83, 20, 0.16);
}
.count-item {
  width: clamp(70px, 5vw, 96px);
  height: clamp(70px, 5vw, 96px);
  object-fit: contain;
}

/* ===== Shapes ===== */
.shape-display {
  width: min(100%, 420px);
  height: clamp(220px, 38vh, 360px);
  display: flex;
  justify-content: center;
  align-items: center;
}
.shape-circle { width: clamp(160px, 18vw, 240px); height: clamp(160px, 18vw, 240px); border-radius: 50%; background: #FBBF24; box-shadow: 0 10px 24px rgba(0,0,0,0.15); }
.shape-square { width: clamp(160px, 18vw, 240px); height: clamp(160px, 18vw, 240px); border-radius: 24px; background: #60A5FA; box-shadow: 0 10px 24px rgba(0,0,0,0.15); }
.shape-triangle {
  width: 0; height: 0;
  border-left: clamp(88px, 8vw, 132px) solid transparent;
  border-right: clamp(88px, 8vw, 132px) solid transparent;
  border-bottom: clamp(154px, 15vw, 220px) solid #10B981;
  filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
}
.shape-star {
  font-size: clamp(150px, 18vw, 250px); line-height: 1;
  color: #F97316;
  filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
}
.shape-heart {
  font-size: clamp(150px, 18vw, 250px); line-height: 1;
  color: #EC4899;
  filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
}
.shape-rectangle { width: clamp(210px, 24vw, 330px); height: clamp(110px, 11vw, 160px); border-radius: 24px; background: #8B5CF6; box-shadow: 0 10px 24px rgba(0,0,0,0.15); }
.shape-diamond {
  width: clamp(128px, 12vw, 200px); height: clamp(128px, 12vw, 200px);
  background: #EF4444;
  transform: rotate(45deg);
  border-radius: 20px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.15);
}
.shape-oval { width: clamp(210px, 22vw, 320px); height: clamp(120px, 12vw, 180px); border-radius: 50%; background: #10B981; box-shadow: 0 10px 24px rgba(0,0,0,0.15); }

/* ===== Choices ===== */
.choices {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  align-content: stretch;
}
.choice-btn {
  position: relative;
  padding: 18px 16px;
  border: 3px solid #E7CB95;
  border-radius: 26px;
  background: linear-gradient(180deg, #FFFDF6, #F8E7C6);
  color: #714E24;
  font-family: inherit;
  font-size: clamp(1.15rem, 1.35vw, 1.6rem);
  font-weight: 900;
  cursor: pointer;
  transition: transform 0.12s, background 0.15s, border-color 0.15s, box-shadow 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  min-height: clamp(96px, 16vh, 138px);
  -webkit-tap-highlight-color: transparent;
  text-align: center;
  line-height: 1.35;
  box-shadow: 0 10px 20px rgba(120, 83, 20, 0.14), inset 0 1px 0 rgba(255,255,255,0.82);
}
@media (hover: hover) {
  .choice-btn:hover {
    background: linear-gradient(180deg, #FFF8E7, #F6E0B1);
    box-shadow: 0 14px 24px rgba(120, 83, 20, 0.16), inset 0 1px 0 rgba(255,255,255,0.86);
  }
}
.choice-btn:active { transform: scale(0.97); }
.choice-btn.correct {
  background: #D1FAE5 !important;
  border-color: var(--success) !important;
  color: #065F46;
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.choice-btn.wrong {
  background: #FEE2E2 !important;
  border-color: var(--danger) !important;
  animation: shake 0.4s;
}
.choice-btn--count {
  font-size: clamp(2rem, 3vw, 3rem);
}
.choice-color {
  width: clamp(42px, 3vw, 56px);
  height: clamp(42px, 3vw, 56px);
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.8);
  flex-shrink: 0;
}
@keyframes popIn {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

@media (max-width: 1180px) {
  .stage {
    grid-template-columns: 1fr;
  }
  .question-panel {
    min-height: 0;
  }
}

@media (max-width: 760px) {
  body {
    padding: 16px 12px 24px;
    gap: 14px;
  }
  .header {
    gap: 12px;
    padding: 12px 14px;
  }
  .pono-avatar {
    width: 56px;
    height: 56px;
  }
  .hud {
    grid-template-columns: 1fr 1fr;
  }
  .hud-progress {
    grid-column: 1 / -1;
    justify-content: center;
  }
  .question-wrap {
    padding-top: 58px;
    padding-right: 0;
  }
  #question-speaker {
    top: 0;
    right: 50%;
    transform: translateX(50%);
  }
  .answer-guide {
    flex-direction: column;
    text-align: center;
  }
  .answer-guide__copy {
    align-items: center;
  }
  .choices {
    grid-template-columns: 1fr;
  }
  .choice-btn {
    min-height: 78px;
  }
}

/* ===== Feedback bubble ===== */
.feedback {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: #fff;
  border: 4px solid var(--success);
  border-radius: 24px;
  padding: 20px 36px;
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--success);
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
}
.feedback.show { transform: translate(-50%, -50%) scale(1); }

/* ===== Confetti ===== */
.confetti {
  position: fixed;
  top: -20px;
  width: 10px; height: 14px;
  z-index: 90;
  pointer-events: none;
  animation: confFall 2.5s linear forwards;
}
@keyframes confFall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ===== Garden overlay ===== */
.garden-overlay {
  position: fixed; inset: 0; z-index: 9200;
  background: rgba(30, 18, 48, 0.88);
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.garden-overlay.visible { opacity: 1; pointer-events: all; }
.garden-header {
  display: flex; align-items: center; gap: 10px; padding: 14px 16px;
  background: rgba(255,255,255,0.08);
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
.garden-title { flex: 1; font-size: 1.15rem; font-weight: 900; color: #FFE88C; }
.garden-close {
  background: rgba(255,255,255,0.12); border: none; border-radius: 50%;
  width: 36px; height: 36px; color: #fff; font-size: 1.1rem;
  font-family: inherit; cursor: pointer;
}
.garden-body {
  flex: 1; overflow-y: auto; padding: 20px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 18px;
  max-width: 540px; width: 100%; margin: 0 auto;
}
.garden-hint {
  font-size: 0.88rem; font-weight: 700; color: rgba(255,255,255,0.85);
  text-align: center; line-height: 1.5;
}
.garden-grid {
  width: 100%;
  background: linear-gradient(180deg, #A0826D 0%, #8B6F47 100%);
  border-radius: 20px;
  padding: 18px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.3);
}
.garden-cell {
  aspect-ratio: 1;
  border-radius: 18px;
  background: rgba(0,0,0,0.22);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(2.2rem, 12vw, 4rem); line-height: 1;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
  cursor: pointer;
  position: relative;
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.garden-cell:active { transform: scale(0.96); }
.garden-cell.bloomed {
  background: radial-gradient(circle, var(--cell-bg, #FFE88C) 0%, rgba(255,255,255,0.4) 80%);
  box-shadow: inset 0 1px 2px rgba(255,255,255,0.5), 0 2px 6px rgba(0,0,0,0.2);
  animation: bloomPop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.garden-cell.watered {
  animation: waterShake 0.4s;
}
@keyframes bloomPop {
  0%   { transform: scale(0);   }
  60%  { transform: scale(1.35); }
  100% { transform: scale(1);   }
}
@keyframes waterShake {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
  60% { transform: translateY(2px); }
}
.garden-seeds-row {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 16px; padding: 10px 20px;
  font-weight: 900; font-size: 1rem; color: #fff;
}
.garden-seeds-row .seed-emoji { font-size: 1.4rem; }
.garden-toast {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(30, 18, 48, 0.92);
  color: #FFE88C;
  padding: 14px 24px; border-radius: 16px;
  font-size: 1rem; font-weight: 900;
  z-index: 9300; pointer-events: none;
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
  box-shadow: 0 6px 20px rgba(0,0,0,0.35);
}
.garden-toast.show { transform: translate(-50%, -50%) scale(1); }

/* ===== Season themes ===== */
body[data-season="spring"] { background: linear-gradient(170deg, #FFF0F5 0%, #FFE4E8 50%, #FFB6C1 100%); }
body[data-season="summer"] { background: linear-gradient(170deg, #E0F7FA 0%, #B3E5FC 50%, #81D4FA 100%); }
body[data-season="autumn"] { background: linear-gradient(170deg, #FFF3E0 0%, #FFE0B2 50%, #FFAB91 100%); }
body[data-season="winter"] { background: linear-gradient(170deg, #E3F2FD 0%, #BBDEFB 50%, #D1E9FF 100%); }

/* ===== Flower encyclopedia ===== */
.flower-enc {
  position: fixed; inset: 0; z-index: 9100;
  background: rgba(30, 18, 48, 0.92);
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.flower-enc.visible { opacity: 1; pointer-events: all; }
.flower-enc-header {
  display: flex; align-items: center; gap: 10px; padding: 14px 16px;
  background: rgba(255,255,255,0.08);
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
.flower-enc-title { flex: 1; font-size: 1.15rem; font-weight: 900; color: #FFD6E0; }
.flower-enc-progress {
  font-size: 0.78rem; font-weight: 700; color: #FCD34D;
  background: rgba(252,211,77,0.15); border-radius: 12px; padding: 3px 10px;
}
.flower-enc-close {

<script>
(function() {
'use strict';

// ═══════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════
const TOTAL_Q = 5;
let playlist = [];
let questionIdx = 0;
let correctCount = 0;
let currentQ = null;
let locked = false;

// ═══════════════════════════════════════════════════════════
// Flower garden
// ═══════════════════════════════════════════════════════════
const LS_FLOWERS_DISCOVERED = 'pono_flowers_discovered';

function getDiscoveredFlowers() {
  try {
    return JSON.parse(localStorage.getItem(LS_FLOWERS_DISCOVERED) || '[]');
  } catch (e) { return []; }
}

function recordDiscovery(flowerId) {
  const list = getDiscoveredFlowers();
  if (list.indexOf(flowerId) === -1) {
    list.push(flowerId);
    try { localStorage.setItem(LS_FLOWERS_DISCOVERED, JSON.stringify(list)); } catch (e) {}
  }
}

// ═══════════════════════════════════════════════════════════
// Seed stock + Garden (育てる系)
// ═══════════════════════════════════════════════════════════
const LS_SEEDS = 'pono_quizland_seeds';
const LS_GARDEN = 'pono_quizland_garden';
const LS_SESSION_NONCE = 'pono_quizland_session_nonce';
const GARDEN_CELLS = 4;
const SEED_MAX = 10;

function getSeeds() {
  try {
    const arr = JSON.parse(localStorage.getItem(LS_SEEDS) || '[]');
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function setSeeds(list) {
  try { localStorage.setItem(LS_SEEDS, JSON.stringify(list.slice(0, SEED_MAX))); } catch (e) {}
}
function addSeed(flowerId) {
  const list = getSeeds();
  if (list.length >= SEED_MAX) return false; // 上限で打ち切り
  list.push(flowerId);
  setSeeds(list);
  return true;
}

function emptyGarden() {
  const arr = [];
  for (let i = 0; i < GARDEN_CELLS; i++) {
    arr.push({ stage: null, flowerId: null, lastWaterNonce: 0 });
  }
  return arr;
}
function getGarden() {
  try {
    const arr = JSON.parse(localStorage.getItem(LS_GARDEN) || 'null');
    if (Array.isArray(arr) && arr.length === GARDEN_CELLS) return arr;
  } catch (e) {}
  return emptyGarden();
}
function setGarden(arr) {
  try { localStorage.setItem(LS_GARDEN, JSON.stringify(arr)); } catch (e) {}
}

function getSessionNonce() {
  const n = parseInt(localStorage.getItem(LS_SESSION_NONCE) || '0', 10);
  return isNaN(n) ? 0 : n;
}
function bumpSessionNonce() {
  const n = getSessionNonce() + 1;
  try { localStorage.setItem(LS_SESSION_NONCE, String(n)); } catch (e) {}
  return n;
}

function plantSeed(cellIdx) {
  const garden = getGarden();
  const cell = garden[cellIdx];
  if (!cell || cell.stage !== null) return false;
  const seeds = getSeeds();
  if (seeds.length === 0) return false;
  const flowerId = seeds.shift();
  setSeeds(seeds);
  garden[cellIdx] = { stage: 0, flowerId: flowerId, lastWaterNonce: 0 };
  setGarden(garden);
  return true;
}

function waterCell(cellIdx) {
  const garden = getGarden();
  const cell = garden[cellIdx];
  if (!cell || cell.stage === null || cell.stage >= 2) return false;
  const nonce = getSessionNonce();
  if (cell.lastWaterNonce === nonce) return false; // このセッション内既に水やり済
  cell.stage = Math.min(2, cell.stage + 1);
  cell.lastWaterNonce = nonce;
  setGarden(garden);
  return true;
}

function harvestCell(cellIdx) {
  const garden = getGarden();
  const cell = garden[cellIdx];
  if (!cell || cell.stage !== 2) return false;
  if (cell.flowerId) recordDiscovery(cell.flowerId);
  garden[cellIdx] = { stage: null, flowerId: null, lastWaterNonce: 0 };
  setGarden(garden);
  return true;
}

// ─── Garden overlay rendering ───
const STAGE_EMOJI = { 0: '🟤', 1: '🌱' }; // stage 2 は花 emoji を動的に差し込む

function renderGarden() {
  const grid = document.getElementById('garden-grid');
  if (!grid) return;
  grid.innerHTML = '';
  const garden = getGarden();
  garden.forEach(function(cell, idx) {
    const el = document.createElement('div');
    el.className = 'garden-cell';
    el.dataset.idx = idx;
    if (cell.stage === null) {
      el.textContent = '🕳️';
      el.style.fontSize = 'clamp(1.8rem, 10vw, 3.2rem)';
    } else if (cell.stage === 2) {
      const f = (typeof window.findFlower === 'function') ? window.findFlower(cell.flowerId) : null;
      el.textContent = f ? f.emoji : '🌸';
      if (f) el.style.setProperty('--cell-bg', f.bg || '#FFE88C');
      el.classList.add('bloomed');
    } else {
      el.textContent = STAGE_EMOJI[cell.stage] || '🟤';
    }
    el.addEventListener('click', function() { onGardenCellTap(idx); });
    grid.appendChild(el);
  });
  const cnt = document.getElementById('garden-seed-count');
  if (cnt) cnt.textContent = String(getSeeds().length);
}

function showGardenToast(text) {
  const el = document.getElementById('garden-toast');
  if (!el) return;
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.classList.remove('show'); }, 1200);
}

function onGardenCellTap(idx) {
  const garden = getGarden();
  const cell = garden[idx];
  if (!cell) return;
  if (cell.stage === null) {
    // 空マス: 種を植える
    const seeds = getSeeds();
    if (seeds.length === 0) {
      showGardenToast('🌱 たねが ないよ');
      return;
    }
    if (plantSeed(idx)) {
      playCorrect();
      renderGarden();
      updateSeedHUD();
      showGardenToast('🌱 たねを うえた！');
    }
    return;
  }
  if (cell.stage === 2) {
    // 開花: おかたづけ
    if (harvestCell(idx)) {
      playFanfare();
      renderGarden();
      showGardenToast('🌼 ずかんに のせたよ！');
    }
    return;
  }
  // stage 0 or 1: 水やり
  if (cell.lastWaterNonce === getSessionNonce()) {
    showGardenToast('💧 もう みずあげたよ');
    return;
  }
  if (waterCell(idx)) {
    playCorrect();
    renderGarden();
    const grid = document.getElementById('garden-grid');
    if (grid) {
      const cells = grid.querySelectorAll('.garden-cell');
      if (cells[idx]) {
        cells[idx].classList.remove('watered');
        void cells[idx].offsetWidth;
        cells[idx].classList.add('watered');
      }
    }
    const after = getGarden()[idx];
    if (after && after.stage === 2) {
      showGardenToast('🌸 さいた〜！');
      launchConfetti();
    } else {
      showGardenToast('💧 みずやり おわり');
    }
  }
}

// 選択中カテゴリー（デフォルト: 全部ON）
const ALL_CATS = Object.keys(QUIZLAND_CATEGORIES);
let selectedCategories = Object.fromEntries(ALL_CATS.map(k => [k, true]));
// 難易度
let selectedDifficulty = 'easy'; // 'easy'|'normal'|'hard'
const DIFF_MAX_LEVEL = { easy: 1, normal: 2, hard: 3 };
const DIFF_MIN_LEVEL = { easy: 1, normal: 1, hard: 3 };

// ═══════════════════════════════════════════════════════════
// Audio (wordmatch から流用)
// ═══════════════════════════════════════════════════════════
window._imgCacheBust = Date.now();
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

// ── BGM ──
let bgmAudio = null;
let bgmSource = null;
let bgmGain = null;
const BGM_VOLUME = 0.07;
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';

function initBGM() {
  if (bgmAudio) return;
  bgmAudio = new Audio('../assets/audio/quiz_bgm.mp3');
  bgmAudio.loop = true;
  bgmAudio.crossOrigin = 'anonymous';
  bgmAudio.preload = 'auto';
  if (audioCtx) {
    bgmSource = audioCtx.createMediaElementSource(bgmAudio);
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = BGM_VOLUME;
    bgmSource.connect(bgmGain).connect(audioCtx.destination);
  }
}

function startBGM() {
  if (!bgmEnabled) return;
  ensureAudio();
  if (!bgmAudio) initBGM();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  bgmAudio.play().catch(function() {});
}

function stopBGM() {
  if (bgmAudio) { bgmAudio.pause(); bgmAudio.currentTime = 0; }
}

function toggleBGM() {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
  if (bgmEnabled) startBGM();
  else stopBGM();
}
function playCorrect() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [523.25, 783.99].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = f;
    o.type = 'sine';
    g.gain.setValueAtTime(0.18, t + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.28);
    o.connect(g).connect(audioCtx.destination);
    o.start(t + i * 0.08);
    o.stop(t + i * 0.08 + 0.3);
  });
}
function playWrong() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(220, t);
  o.frequency.exponentialRampToValueAtTime(110, t + 0.2);
  g.gain.setValueAtTime(0.12, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  o.connect(g).connect(audioCtx.destination);
  o.start(t);
  o.stop(t + 0.22);
}
function playFanfare() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = f;
    g.gain.setValueAtTime(0.15, t + i * 0.15);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.4);
    o.connect(g).connect(audioCtx.destination);
    o.start(t + i * 0.15);
    o.stop(t + i * 0.15 + 0.4);
  });
}

// ═══════════════════════════════════════════════════════════
// Playlist building
// ═══════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildPlaylist() {
  const cats = ALL_CATS.filter(c => selectedCategories[c]);
  if (cats.length === 0) return [];
  const minLv = DIFF_MIN_LEVEL[selectedDifficulty];
  const maxLv = DIFF_MAX_LEVEL[selectedDifficulty];
  const perCat = Math.max(1, Math.ceil(TOTAL_Q / cats.length));
  const list = [];
  cats.forEach(cat => {
    const pool = (QUIZLAND_QUESTIONS[cat] || [])
      .map((q, idx) => Object.assign({ _cat: cat, _idx: idx }, q))
      .filter(q => q.level >= minLv && q.level <= maxLv);
    if (pool.length > 0) list.push(...shuffle(pool).slice(0, perCat));
  });
  return shuffle(list).slice(0, TOTAL_Q);
}

function renderChoices(q) {
  const tray = document.getElementById('choices');
  tray.innerHTML = '';
  q.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.dataset.idx = i;
    if (q.type === 'order_color') {
      // 色チップ + 色名
      const chip = document.createElement('div');
      chip.className = 'choice-color';
      chip.style.background = QUIZLAND_COLORS[choice].code;
      btn.appendChild(chip);
      const label = document.createElement('span');
      label.textContent = QUIZLAND_COLORS[choice].name;
      btn.appendChild(label);
    } else if (q.type === 'count_total') {
      btn.textContent = String(choice);
      btn.classList.add('choice-btn--count');
    } else {
      btn.textContent = choice;
    }
    btn.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      if (locked) return;
      onChoice(i, btn);
    });
    tray.appendChild(btn);
  });
}

function loadQuestion(q) {
  currentQ = q;
  locked = false;
  document.getElementById('question-text').textContent = q.q;
  const stage = document.getElementById('stage-area');
  stage.dataset.qtype = q.type;
  stage.innerHTML = '';
  switch (q.type) {
    case 'order_color': renderOrderColor(stage, q); break;
    case 'count_total': renderCountTotal(stage, q); break;
    case 'shape_name':  renderShapeName(stage, q); break;
    case 'emoji_name':  renderEmojiName(stage, q); break;
    case 'opposite':    renderOpposite(stage, q); break;
    case 'trivia':      renderTrivia(stage, q); break;
  }
  renderChoices(q);
  updateHUD();
  setupNarration(q);
}

// 音声ナレーション: 自動再生 or 🔊ボタンで問題文を読み上げ
function narrationKey(q, field) {
  if (!q || q._cat == null || q._idx == null) return null;
  return 'quizland:' + q._cat + ':' + q._idx + ':' + (field || 'q');
}
function setupNarration(q) {
  if (typeof Narration === 'undefined') return;
  const btn = document.getElementById('question-speaker');
  const key = narrationKey(q, 'q');
  if (!btn || !key) return;
  Narration.load().then(() => {
    const has = Narration.hasEntry(key);
    btn.style.display = (has && Narration.getMode() !== 'off') ? '' : 'none';
    btn.onclick = function(e) {
      e.preventDefault();
      Narration.play(key);
    };
    // 自動再生モードでは問題表示と同時に鳴らす
    if (has) Narration.playIfAuto(key);
    // 次の2問を先読み
    const prefetchKeys = [];
    for (let i = 1; i <= 2; i++) {
      const nq = playlist[questionIdx + i];
      if (nq) {
        const k = narrationKey(nq, 'q');
        if (k) prefetchKeys.push(k);
      }
    }
    if (prefetchKeys.length) Narration.prefetch(prefetchKeys);
  });
}

function updateHUD() {
  document.getElementById('q-num').textContent = (questionIdx + 1);
  document.getElementById('q-total').textContent = TOTAL_Q;
  const prog = document.getElementById('hud-progress');
  prog.innerHTML = '';
  for (let i = 0; i < TOTAL_Q; i++) {
    const dot = document.createElement('div');
    dot.className = 'hud-dot';
    if (i < questionIdx) dot.classList.add('done');
    if (i === questionIdx) dot.classList.add('current');
    prog.appendChild(dot);
  }
}

// ═══════════════════════════════════════════════════════════
// Answer handling
// ═══════════════════════════════════════════════════════════
function onChoice(idx, btn) {
  if (locked) return;
  locked = true;
  ensureAudio();
  const correct = (idx === currentQ.answer);
  if (correct) {
    btn.classList.add('correct');
    playCorrect();
    showFeedback('やったー！');
    ponoJump();
    launchConfetti();
    var flower = (typeof window.pickFlower === 'function') ? window.pickFlower() : null;
    if (flower) {
      if (addSeed(flower.id)) renderSeedToast(flower.id);
      else updateSeedHUD(); // 上限到達時もカウント表示を同期
    }
    correctCount++;
    if (window.incrementStat) window.incrementStat('quizland_correct', 1);
    // スタンプラリー: プレイ記録
    (function() {
      var k = 'pono_played_' + new Date().toDateString();
      var a = JSON.parse(localStorage.getItem(k) || '[]');
      if (a.indexOf('quizland') === -1) { a.push('quizland'); localStorage.setItem(k, JSON.stringify(a)); }
    })();
    var infoText = currentQ.detail || currentQ.hint || null;
    if (infoText) {
      setTimeout(() => {
        showDetail(infoText);
        if (typeof Narration !== 'undefined' && currentQ.detail) {
          var dKey = narrationKey(currentQ, 'detail');
          if (dKey && Narration.hasEntry(dKey)) Narration.play(dKey);
        }
      }, 600);
      setTimeout(nextQuestion, 2800);
    } else {
      setTimeout(nextQuestion, 1000);
    }
  } else {
    btn.classList.add('wrong');
    btn.disabled = true;
    playWrong();
    showFeedback('もういっかい！', true);
    // もう1回チャンス: 間違ったボタンだけ無効化、ロック解除して再選択可能
    locked = false;
  }
}

function showDetail(text) {
  let el = document.getElementById('detail-popup');
  if (!el) {
    el = document.createElement('div');
    el.id = 'detail-popup';
    el.style.cssText = 'position:fixed;bottom:20%;left:50%;transform:translateX(-50%);background:rgba(30,58,95,0.95);color:#FDE68A;padding:12px 20px;border-radius:16px;font-size:0.95rem;font-weight:700;max-width:80vw;text-align:center;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;line-height:1.5;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
    document.body.appendChild(el);
  }
  el.textContent = '💡 ' + text;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

function showFeedback(text, wrong) {
  const el = document.getElementById('feedback');
  el.textContent = text;
  el.style.color = wrong ? 'var(--danger)' : 'var(--success)';
  el.style.borderColor = wrong ? 'var(--danger)' : 'var(--success)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 700);
}

function ponoJump() {
  const av = document.getElementById('pono-avatar');
  av.classList.remove('jump');
  void av.offsetWidth; // reflow
  av.classList.add('jump');
}

function nextQuestion() {
  questionIdx++;
  if (questionIdx >= TOTAL_Q) {
    showResult();
    return;
  }
  loadQuestion(playlist[questionIdx]);
}

// ═══════════════════════════════════════════════════════════
// Result
// ═══════════════════════════════════════════════════════════
function showResult() {
  const cleared = correctCount >= Math.ceil(TOTAL_Q * 0.7); // 70% 以上で clear
  document.getElementById('result-icon').textContent = cleared ? '🎉' : '💪';
  document.getElementById('result-title').textContent = cleared ? 'クリア！' : 'もうちょっと！';
  document.getElementById('result-msg').textContent = cleared
    ? `${TOTAL_Q}もんちゅう ${correctCount}もん せいかい！`
    : `${TOTAL_Q}もんちゅう ${correctCount}もん せいかい。\nもういちど やってみよう！`;
  document.getElementById('result-overlay').classList.remove('hidden');
  if (cleared) {
    if (window.incrementStat) window.incrementStat('quizland_clears', 1);
    if (window.addAcornsDaily) window.addAcornsDaily('quizland', 5, 5, { reason: 'quizland_clear' });
    playFanfare();
    launchConfetti();
    setTimeout(launchConfetti, 400);
  }
  // 種が1個以上 or 花壇に育成中のマスがあれば にわ を自動で開く
  var hasSeeds = getSeeds().length > 0;
  var hasActiveCell = getGarden().some(function(c) { return c.stage !== null; });
  if (hasSeeds || hasActiveCell) {
    setTimeout(openGarden, 1000);
  }
}

// ═══════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════
function upgradeGameLayout() {
  const shell = document.querySelector('.game-shell');
  const header = document.querySelector('.header');
  const stage = document.querySelector('.stage');
  const questionWrap = stage && stage.querySelector('.question-wrap');
  const stageArea = document.getElementById('stage-area');
  const choices = document.getElementById('choices');
  if (!shell || !header || !stage || !questionWrap || !stageArea || !choices) return;
  if (stage.querySelector('.question-panel')) return;

  const title = header.querySelector('h1');
  if (title) title.textContent = 'フクロウ博士のなぞなぞ';

  const avatarImg = header.querySelector('.pono-avatar img');
  if (avatarImg) avatarImg.alt = 'ポノ';

  const backBtn = document.getElementById('hud-back-btn');
  if (backBtn) {
    backBtn.removeAttribute('style');
    backBtn.textContent = '◀ タイトルへ';
  }

  const seeds = document.getElementById('hud-seeds');
  if (seeds) {
    const count = document.getElementById('hud-seeds-count');
    const current = count ? count.textContent : '0';
    seeds.removeAttribute('style');
    seeds.setAttribute('aria-label', 'てもちのたね');
    seeds.innerHTML = '🌱 <span id="hud-seeds-count">' + current + '</span>';
  }

  questionWrap.removeAttribute('style');

  const speaker = document.getElementById('question-speaker');
  if (speaker) {
    speaker.removeAttribute('style');
    speaker.setAttribute('aria-label', 'もんだいを よむ');
    speaker.textContent = '🔊';
  }

  const questionText = document.getElementById('question-text');
  if (questionText) questionText.textContent = 'よういちゅう…';

  const questionPanel = document.createElement('section');
  questionPanel.className = 'question-panel';

  const questionChip = document.createElement('div');
  questionChip.className = 'panel-chip';
  questionChip.textContent = 'フクロウはかせからの もんだい';

  const questionBoard = document.createElement('div');
  questionBoard.className = 'question-board';
  questionBoard.appendChild(stageArea);

  questionPanel.appendChild(questionChip);
  questionPanel.appendChild(questionWrap);
  questionPanel.appendChild(questionBoard);

  const answerPanel = document.createElement('aside');
  answerPanel.className = 'answer-panel';

  const answerGuide = document.createElement('div');
  answerGuide.className = 'answer-guide';

  const owl = document.createElement('img');
  owl.className = 'answer-guide__owl';
  owl.src = '../assets/images/word/fukuro.png';
  owl.alt = '';

  const answerCopy = document.createElement('div');
  answerCopy.className = 'answer-guide__copy';

  const answerChip = document.createElement('div');
  answerChip.className = 'panel-chip panel-chip--leaf';
  answerChip.textContent = 'こたえを えらぼう';

  const answerText = document.createElement('p');
  answerText.innerHTML = '4つの なかから<br>ぴったりの こたえを えらんでね。';

  answerCopy.appendChild(answerChip);
  answerCopy.appendChild(answerText);
  answerGuide.appendChild(owl);
  answerGuide.appendChild(answerCopy);

  answerPanel.appendChild(answerGuide);
  answerPanel.appendChild(choices);

  stage.replaceChildren(questionPanel, answerPanel);
}

function initGame() {
  upgradeGameLayout();
  playlist = buildPlaylist();
  questionIdx = 0;
  correctCount = 0;
  applySeasonTheme();
  bumpSessionNonce();
  updateSeedHUD();
  document.getElementById('result-overlay').classList.add('hidden');
  loadQuestion(playlist[0]);
}

// ═══════════════════════════════════════════════════════════
// Category screen
// ═══════════════════════════════════════════════════════════
function buildCategoryScreen() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  const minLv = DIFF_MIN_LEVEL[selectedDifficulty];
  const maxLv = DIFF_MAX_LEVEL[selectedDifficulty];
  // モードに該当するカテゴリだけ表示する。
  const allowedCats = MODE_TO_CATEGORIES[selectedMode] || ALL_CATS;
  allowedCats.forEach(cat => {
    const meta = QUIZLAND_CATEGORIES[cat];
    const pool = (QUIZLAND_QUESTIONS[cat] || []).filter(q => q.level >= minLv && q.level <= maxLv);
    const available = pool.length > 0;
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (selectedCategories[cat] && available ? ' selected' : '');
    btn.dataset.cat = cat;
    if (available) {
      btn.innerHTML = `<span class="cat-emoji">${meta.emoji}</span><span class="cat-label">${meta.label}</span>`;
      btn.addEventListener('click', function() {
        selectedCategories[cat] = !selectedCategories[cat];
        btn.classList.toggle('selected', selectedCategories[cat]);
        updateCatStartBtn();
      });
    } else {
      btn.innerHTML = `<span class="cat-emoji" style="opacity:0.3">${meta.emoji}</span><span class="cat-label" style="opacity:0.4">${meta.label}</span><span style="font-size:0.55rem;color:#999;display:block;">ふつう いじょうから</span>`;
      btn.style.opacity = '0.5';
      btn.style.cursor = 'not-allowed';
      selectedCategories[cat] = false;
    }
    grid.appendChild(btn);
  });
  updateCatStartBtn();
}

function updateCatStartBtn() {
  const anySelected = ALL_CATS.some(c => selectedCategories[c]);
  document.getElementById('cat-start-btn').disabled = !anySelected;
}

// ── ひらめき / ものしり モード選択 ─────────────────
let selectedMode = 'inspire'; // 'inspire' | 'know'

// やさしい(inspire) = 文字読めない3-4歳でも遊べる: 色・数・形 (絵中心)
// ものしり(know)    = 5-6 歳〜: トリビア・天気・体・反対語 (文字読み必須)
const MODE_TO_CATEGORIES = {
  inspire: ['order_color', 'count_total', 'shape_name'],
  know:    ['trivia', 'weather', 'body', 'opposite']
};

// タイトル画面タップ → モード選択画面へ (BGM もここで起動)
upgradeGameLayout();

document.getElementById('start-screen').addEventListener('click', function() {
  ensureAudio();
  startBGM();
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('mode-screen').classList.remove('hidden');
});

// モードボタンタップ = 即ゲーム開始 (やさしい/ものしりに応じて出題カテゴリ切替)
document.querySelectorAll('.mode-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    selectedMode = btn.dataset.mode;
    ALL_CATS.forEach(function(c) {
      selectedCategories[c] = MODE_TO_CATEGORIES[selectedMode].indexOf(c) !== -1;
    });
    document.getElementById('mode-screen').classList.add('hidden');
    initGame();
    if (typeof initMenu === 'function') {
      initMenu({
        bgmToggle: function() { toggleBGM(); },
        tutorial: function() { alert('フクロウ博士の なぞなぞに こたえよう！'); }
      });
    }
  });
});

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    selectedDifficulty = btn.dataset.diff;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    buildCategoryScreen(); // 難易度に応じてカテゴリの有効/無効を更新
  });
});

// All toggle button (現在のモードのカテゴリだけ対象)
document.getElementById('cat-all-btn').addEventListener('click', function() {
  const cats = MODE_TO_CATEGORIES[selectedMode] || ALL_CATS;
  const allOn = cats.every(c => selectedCategories[c]);
  cats.forEach(c => { selectedCategories[c] = !allOn; });
  buildCategoryScreen();
});

// Category start button → begin game
document.getElementById('cat-start-btn').addEventListener('click', function() {
  document.getElementById('category-screen').classList.add('hidden');
  initGame();
});

// HUD back button → モード選択画面へ (タイトル画面まで戻らない)
document.getElementById('hud-back-btn').addEventListener('click', function() {
  document.getElementById('result-overlay').classList.add('hidden');
  document.getElementById('category-screen').classList.add('hidden');
  document.getElementById('mode-screen').classList.remove('hidden');
});

// Result retry button (same categories)
document.getElementById('result-btn').addEventListener('click', function() {
  initGame();
});

// Result "change mode" button → モード選択画面へ (タイトル画面まで戻らない)
document.getElementById('result-cat-btn').addEventListener('click', function() {
  document.getElementById('result-overlay').classList.add('hidden');
  document.getElementById('category-screen').classList.add('hidden');
  document.getElementById('mode-screen').classList.remove('hidden');
});

// Flower encyclopedia open/close
document.getElementById('result-enc-btn').addEventListener('click', openFlowerEnc);
document.getElementById('flower-enc-close').addEventListener('click', closeFlowerEnc);

// Garden overlay open/close
document.getElementById('result-garden-btn').addEventListener('click', openGarden);
document.getElementById('garden-close').addEventListener('click', closeGarden);

// Apply season theme on first load (before game starts)
applySeasonTheme();
updateSeedHUD();

})();
</script>
