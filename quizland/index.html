let _opCancelled = false;
let _opActiveAudio = null;
let _opTypingToken = 0;
let _opRunning = false;

// Fix 5e (2026-05-07): CSS の transform: scale(min(calc(100vw/W), calc(100vh/H)))
// は length を返すため scale() の number 期待と合わず無効化されていた。
// editor (tools/op-layout-editor.html の rescaleStage) と同じ計算を JS で実施し、
// .op-content の width/height/transform を動的に設定して全 VC で正しく fit させる。
function rescaleOpContent() {
  const opContent = document.getElementById('op-content');
  if (!opContent) return;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  if (!vw || !vh) return;
  const aspect = vw / vh;
  let stageW, stageH;
  if (aspect <= 1.4) {
    // viewport class B (4:3)
    stageW = 1024; stageH = 768;
  } else if (aspect <= 1.9) {
    // viewport class C (16:9)
    stageW = 1920; stageH = 1080;
  } else {
    // viewport class D (21:9)
    stageW = 2560; stageH = 1080;
  }
  const scale = Math.min(vw / stageW, vh / stageH);
  opContent.style.width = stageW + 'px';
  opContent.style.height = stageH + 'px';
  opContent.style.transform = 'scale(' + scale + ')';
}

function _opTypeInto(elId, text, presetName) {
  return new Promise(function(resolve) {
    const el = document.getElementById(elId);
    if (!el) { resolve(); return; }
    el.textContent = '';
    if (!text) { resolve(); return; }
    _opTypingToken++;
    const myToken = _opTypingToken;
    let i = 0;
    function tick() {
      if (_opCancelled) { resolve(); return; }
      if (myToken !== _opTypingToken) { resolve(); return; }
      if (i >= text.length) { resolve(); return; }
      const c = text.charAt(i++);
      el.textContent += c;
      // Auto-scroll the dialogue container to keep the latest character visible
      // (the box has max-height + overflow-y: auto, so long lines would otherwise truncate).
      try {
        const box = el.closest('.op-dialogue');
        if (box) box.scrollTop = box.scrollHeight;
      } catch (e) {}
      try {
        if (window.PonoBabble && typeof window.PonoBabble.playChar === 'function') {
          window.PonoBabble.playChar(c, presetName);
        }
      } catch (e) {}
      setTimeout(tick, 95);
    }
    tick();
  });
}

// ─── Tap-to-advance hint + waitForAdvance helpers (2026-05-08) ───────────────
// 子供 (3-6 歳) の読書速度に対応するため、auto-only の wait を「タップでも進められる」
// hybrid 方式に変える。 minHold (誤タップ防止) を必ず待った上で、その後は
// 「user tap」 or 「auto-advance タイマー (or 音声完了)」 の早い方を解決する。
//
// state 変数:
//   _opAdvanceResolve : 現在 arm 中の advance 用 resolver (null = 未 arm)
//   _opAdvanceArmedAt : arm された時刻 (Date.now()), minHold 計算用
//   _opAdvanceMinHold : 現在の arm に紐付く minHold ms
let _opAdvanceResolve = null;
let _opAdvanceArmedAt = 0;
let _opAdvanceMinHold = 0;
let _opHideTapHintTid = null;

// 親 (#op-cinematic) に張る full-screen タップリスナー。
// スキップボタン (#op-skip) と #op-tap-hint 自体は通すが、 advance 解決のトリガに
// なる。 minHold 経過前のタップは無視する (typing 完了直後に親指が残っていても
// 暴発しない)。
function _opOnRootTap(e) {
  // スキップボタンは通常通りの click で別ハンドラが処理する。
  // (event.target が #op-skip またはその子孫の場合は advance を発火させない)
  try {
    if (e && e.target && typeof e.target.closest === 'function') {
      if (e.target.closest('#op-skip')) return;
    }
  } catch (_) {}
  if (!_opAdvanceResolve) return;       // 未 arm = まだ advance を待っていない
  const elapsed = Date.now() - _opAdvanceArmedAt;
  if (elapsed < _opAdvanceMinHold) return; // 誤タップ抑止
  const r = _opAdvanceResolve;
  _opAdvanceResolve = null;
  try { r(); } catch (_) {}
}

// 2026-05-09: narration テキストボックスとの被り回避ロジック。
// レイアウトエディタで narration を任意位置に動かせるようになり、デフォルトの
// `bottom: 24-28px` 固定だと narration の内側に tap-hint が入り込むことがある。
// narration が可視の場合だけ inline style.top で narration 直下 (もしくは余白
// 不足時は narration 直上) に動的追従させ、 narration 不可視時は CSS デフォルト
// に戻す (style.top / style.bottom を空文字でクリア)。
function _opPositionTapHintRelativeToNarration(el) {
  if (!el) return;
  try {
    const opContent = document.getElementById('op-content');
    const narration = document.getElementById('op-narration');
    // narration が不在 / 非表示なら inline 解除 → CSS デフォルト (.op-tap-hint { bottom: ... })
    const narrHidden = !narration
      || narration.classList.contains('hidden')
      || narration.classList.contains('seg-hide')
      || (narration.offsetParent === null && getComputedStyle(narration).display === 'none');
    if (!opContent || narrHidden) {
      el.style.top = '';
      el.style.bottom = '';
      return;
    }
    // .op-content は relative / absolute どちらでも offsetParent ベースで計算可能。
    const contentH = opContent.clientHeight || opContent.offsetHeight || 0;
    // Fix HIGH (review 2026-05-09): cinematic 開始直後など op-content が未レイアウト
    // のタイミングで contentH===0 となり、直上フォールバック (4px) に張り付く。
    // 0 のときは inline style を解除して CSS デフォルト位置に戻して早期リターン。
    if (contentH === 0) {
      el.style.top = '';
      el.style.bottom = '';
      return;
    }
    const narrTop  = narration.offsetTop;
    const narrH    = narration.offsetHeight;
    // tap-hint 自体の高さを測るため一旦 hidden を外して可視にしておく
    // (.is-visible はまだだが display:none は剥がす)。
    const wasHidden = el.classList.contains('hidden');
    if (wasHidden) el.classList.remove('hidden');
    const hintH = el.offsetHeight || 44; // 推定 fallback
    if (wasHidden && !el.classList.contains('is-visible')) {
      // 元に戻すのは後段で is-visible を付けるためここでは hidden を付け直さない
    }
    const gap = 12;
    const belowSpace = contentH - (narrTop + narrH);
    if (belowSpace >= hintH + gap + 4) {
      // narration 直下に配置
      el.style.top    = (narrTop + narrH + gap) + 'px';
      el.style.bottom = 'auto';
    } else {
      // 余白不足 → narration 直上にフォールバック
      const topPos = Math.max(4, narrTop - hintH - gap);
      el.style.top    = topPos + 'px';
      el.style.bottom = 'auto';
    }
  } catch (e) {
    // 失敗時は inline をクリアして CSS デフォルトへ
    try { el.style.top = ''; el.style.bottom = ''; } catch (_) {}
  }
}

function _opShowTapHint() {
  const el = document.getElementById('op-tap-hint');
  if (!el) return;
  el.classList.remove('hidden');
  // narration の現在位置を反映 (inline style.top で追従)
  _opPositionTapHintRelativeToNarration(el);
  // 1 frame 確保してから .is-visible を付け、opacity 0 → 1 の transition を発火させる。
  void el.offsetWidth;
  el.classList.add('is-visible');
}

function _opHideTapHint() {
  const el = document.getElementById('op-tap-hint');
  if (!el) return;
  el.classList.remove('is-visible');
  // 0.4s フェードアウト後に hidden を付ける (display:none で完全に剥がす)。
  // 二重起動防止: 直前のタイマーが残っていればクリアしてから arm し直す。
  if (_opHideTapHintTid) { try { clearTimeout(_opHideTapHintTid); } catch (e) {} _opHideTapHintTid = null; }
  _opHideTapHintTid = setTimeout(function() {
    _opHideTapHintTid = null;
    if (!el.classList.contains('is-visible')) {
      el.classList.add('hidden');
      // inline 解除 → 次回表示で再計算 / CSS デフォルトに戻す
      try { el.style.top = ''; el.style.bottom = ''; } catch (_) {}
    }
  }, 420);
}

// waitForAdvance:
//   minHold ms は必ず待つ → その後ユーザータップ (or キャンセル) で resolve。
//   2026-05-07 仕様変更: auto-advance タイマーは廃止。 OP は明示タップ/スキップが
//   無い限り次セグメントへ進まない (子供が読み終わる前に勝手に進まない安全策)。
//   options:
//     - minHold (default 800): 誤タップ防止のため必ず待つ ms
//     - showHint (default true): minHold 経過後に「タップしてつづける ▶」を出す
//   旧 maxWait / textLen / hasAudio パラメータは互換のため受け取るが、
//   進行ロジックには使わない (タップ待ちのみ)。
// Cancellation:
//   _opCancelled が true になったら 100ms 粒度で abort する。
async function _opWaitForAdvance(options) {
  const opts = options || {};
  const minHold = (opts.minHold != null) ? opts.minHold : 800;
  const showHint = (opts.showHint !== false);

  // 1. minHold は必ず待つ (キャンセル可)
  const minStart = Date.now();
  while (Date.now() - minStart < minHold) {
    if (_opCancelled) return;
    await new Promise(function(r) { setTimeout(r, 50); });
  }
  if (_opCancelled) return;

  // 2. hint をフェードイン
  if (showHint) _opShowTapHint();

  // 3. tap (or cancel) を待つ — auto-advance timer は廃止
  await new Promise(function(resolve) {
    let resolved = false;
    function done() {
      if (resolved) return;
      resolved = true;
      _opAdvanceResolve = null;
      resolve();
    }
    _opAdvanceArmedAt = Date.now();
    _opAdvanceMinHold = 0; // ここではすでに minHold 経過済みなので 0
    _opAdvanceResolve = done;
    // cancellation poller (100ms 粒度) — _opCancelled で即時抜ける
    const pollId = setInterval(function() {
      if (_opCancelled) {
        clearInterval(pollId);
        done();
      } else if (resolved) {
        clearInterval(pollId);
      }
    }, 100);
  });

  // 4. hint を fade out
  if (showHint) _opHideTapHint();
}

// ---- Question-text typewriter (in-game, silent / no babble) ----
// 問題文を 1 文字ずつ流し込む。 OP cinematic の _opTypeInto と独立した
// token (_qTypingToken) を持つ。 タップでスキップすると即時最後まで埋める。
let _qTypingToken = 0;
function typeQuestionText(el, text) {
  return new Promise(function(resolve) {
    if (!el) { resolve(); return; }
    el.textContent = '';
    if (!text) { resolve(); return; }
    _qTypingToken++;
    const myToken = _qTypingToken;
    let i = 0;
    function tick() {
      // 別の問題に切り替わった / タップでスキップされた場合は中断
      if (myToken !== _qTypingToken) { resolve(); return; }
      if (i >= text.length) { resolve(); return; }
      el.textContent += text.charAt(i++);
      setTimeout(tick, 70);
    }
    tick();
  });
}

// 文字送り中に画面のどこかをタップしたら最後まで一気に埋める。
// 一度だけ wire すれば済むので idempotent guard を付ける。
// staged reveal (挿絵 / 4択) も同時に即時 revealed へ昇格させる。
let _qTypingSkipWired = false;
function _revealAllPendingStages() {
  document.querySelectorAll('.q-stage-pending').forEach(function(el) {
    el.classList.remove('q-stage-pending');
    el.classList.add('q-stage-revealed');
  });
}
function _wireQuestionTypingSkip() {
  if (_qTypingSkipWired) return;
  _qTypingSkipWired = true;
  document.addEventListener('click', function() {
    const el = document.getElementById('q-text');
    if (!el) return;
    const pending = el.dataset.pendingText;
    if (pending == null) return;          // 文字送り中ではない
    if (el.textContent !== pending) {
      _qTypingToken++;                    // 進行中の tick を無効化
      el.textContent = pending;           // 残り文字を即時補完
    }
    // 挿絵 / 4択 も同時に reveal (タップでスキップ → 全部見せる)
    _revealAllPendingStages();
  }, true); // capture: 他リスナより先に拾う
}

// Plate (Q1-5) 完了後に typewriter を起動する共通ヘルパ。
// initGame / _doNextQuestion / _qzDebugGoto から fire-and-forget で呼ぶ。
//
// staged reveal の流れ:
//   1. plate (Q1-5 のみ) → fade out
//   2. typewriter 開始 (70ms / 文字)
//   3. ~50% で 挿絵 (.emoji-display) を fade in
//   4. typewriter 完了
//   5. 4択 (#answer-panel) を fade in
// タップでスキップされた場合は _wireQuestionTypingSkip 内で全 stage を即時 reveal。
async function _runPlateAndType(qIdx) {
  _wireQuestionTypingSkip();
  try {
    await playQuestionNumberPlate(qIdx);   // Q1-5 のみ ~0.48s scale-in 待機 / Q6+ は即 return / hide は kurumi ended +0.3s で別経路
  } catch (e) {}
  // Q6+ で plate 無し時に問題 UI が描画完了する余裕を少しだけ作る
  if (qIdx >= 5) {
    await new Promise(function(r) { setTimeout(r, 200); });
  }
  const el = document.getElementById('q-text');
  if (!el) return;
  // v967: Q6+ は plate 無し = hideQuestionNumberPlate が走らないため、 typewriter
  //   開始時にここで #q-text を reveal する。 Q1-5 でも先に reveal してしまうと
  //   plate 表示中に問題文が見えてしまうので、 まだ pending のまま
  //   typewriter を回す (テキスト追加は文字単位だが opacity:0 で不可視)。
  //   Q1-5 では hideQuestionNumberPlate() が #q-text を含む全 pending を reveal する。
  if (qIdx >= 5 && el.classList.contains('q-stage-pending')) {
    el.classList.remove('q-stage-pending');
    el.classList.add('q-stage-revealed');
  }
  const text = el.dataset.pendingText;
  if (text == null) return;

  // 挿絵 / 4択 ハンドル (staged reveal 用)
  const _illustEls = Array.prototype.slice.call(
    document.querySelectorAll('#stage-area .emoji-display.q-stage-pending')
  );
  const _ansPanel = document.getElementById('answer-panel');

  // v967: Q1-5 (plate あり) では、 挿絵 / 4 択の reveal を typewriter ではなく
  //   hideQuestionNumberPlate() (kurumi ended +300ms) に一元化する (案 C)。
  //   plate 表示中に typewriter が完了しても、 ここで挿絵 / 4 択を露出させない。
  //   tap-to-skip 経路 (_revealAllPendingStages / plate onTap) のみ早期 reveal 可。
  const _qzPlateActive = (qIdx >= 0 && qIdx < 5);

  // typewriter ~50% のタイミングで挿絵を fade in (タップ skip 済みなら no-op)
  // Q1-5 では plate 同期 reveal なのでこのタイマは起動しない (上記 _qzPlateActive)。
  let _illustTimer = 0;
  if (!_qzPlateActive && _illustEls.length) {
    const halfwayMs = Math.max(0, Math.floor((text.length / 2) * 70));
    _illustTimer = setTimeout(function() {
      _illustEls.forEach(function(elIll) {
        if (elIll.classList.contains('q-stage-pending')) {
          elIll.classList.remove('q-stage-pending');
          elIll.classList.add('q-stage-revealed');
        }
      });
    }, halfwayMs);
  }

  try {
    // plate 中のタップで既に skip handler が pending を全部埋めていたら
    // 再度先頭から打ち直すのは見栄えが悪いので skip。
    if (el.textContent === text) return;
    await typeQuestionText(el, text);
  } finally {
    // 完了マーカーとして pending を消す (tap-skip 判定にも使う)
    delete el.dataset.pendingText;
    if (_illustTimer) clearTimeout(_illustTimer);
    // v967: Q1-5 (plate あり) では typewriter 完了時に挿絵 / 4 択を reveal しない。
    //   hideQuestionNumberPlate() が plate fade-out 同期で全 pending を reveal する。
    //   Q6+ (plate 無し) は従来通り typewriter 完了時に挿絵 / 4 択を reveal。
    if (!_qzPlateActive) {
      // 念のため: 挿絵がまだ pending なら reveal (短い問題文で halfway timer が
      // 既に発火済みのはずだが、 タップ skip 経路と整合させる)
      _illustEls.forEach(function(elIll) {
        if (elIll.classList.contains('q-stage-pending')) {
          elIll.classList.remove('q-stage-pending');
          elIll.classList.add('q-stage-revealed');
        }
      });
      // 4択 fade in (typewriter 完了後)
      if (_ansPanel && _ansPanel.classList.contains('q-stage-pending')) {
        _ansPanel.classList.remove('q-stage-pending');
        _ansPanel.classList.add('q-stage-revealed');
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────
// Narration runtime override (2026-05-09)
// tools/op-layout-editor.html writes a per-VC narration snapshot to
// localStorage under `pono.opNarration.runtime.{B|C|D}`. We honor it here by
// applying inline styles to `.op-narration` so editor changes (line-height /
// padding / font-size / width / height / position / bg) override the
// hardcoded per-VC `@media` CSS values without touching the stylesheet.
//
// VC 判定は本番 CSS と同じ aspect-ratio breakpoint (B: <14/10, C: 14/10〜19/10,
// D: ≥19/10) を matchMedia で評価。値が未保存 / 不正な時は inline style を
// 触らず CSS デフォルトのまま (= 既存挙動維持)。
// ─────────────────────────────────────────────────────────────────────────
const NARRATION_RUNTIME_PREFIX = 'pono.opNarration.runtime.';
function _opGetCurrentVC() {
  // Fix HIGH (review 2026-05-09): VC-B の CSS @media は
  // `(min-aspect-ratio: 85/100) and (max-aspect-ratio: 14/10)` が下限なので、
  // 縦長端末 (aspect < 85/100) では editor-B 値を適用すべきでない。null を返して
  // override 適用パスを skip させる (CSS デフォルトに任せる)。
  try {
    if (window.matchMedia('(min-aspect-ratio: 19/10)').matches) return 'D';
    if (window.matchMedia('(min-aspect-ratio: 14/10)').matches) return 'C';
    if (window.matchMedia('(min-aspect-ratio: 85/100)').matches) return 'B';
    return null;
  } catch (e) { return null; }
}
function _opLoadNarrationOverride(vc) {
  // Fix HIGH (review 2026-05-09): _opGetCurrentVC が null を返すケース
  // (縦長端末 / matchMedia 例外) では localStorage キーを引かずに早期 return。
  if (!vc) return null;
  // 2026-05-09 (multi-device): saved-layout.json (`__op_narration`) を最優先で参照する。
  // これは tools/op-layout-editor.html → 📡 GitHub 配信 で書き込まれ、 全端末・
  // 全ユーザに同じ値が配信される正規ソース。 LayoutSystem.init が defer ロード
  // 時点で window._currentLayoutData に展開するので、 OP cinematic 開始時には
  // 通常 fetch 完了済 (mode-btn タップまで数秒のラグがあるため race は実用上ない)。
  // ただし低速回線での初回ロードや、ユーザーが mode-btn を即タップした場合は
  // LayoutSystem fetch が間に合わず、まれに localStorage フォールバックや CSS
  // デフォルトに落ちることがある (= 許容範囲: 次回タップ以降は正規値で上書きされる)。
  // 未 fetch / __op_narration 未設定 / 当該 VC キー無し のいずれかなら、 dev override
  // 用の localStorage[NARRATION_RUNTIME_PREFIX+vc] にフォールバック。 両方無ければ null。
  try {
    const data = window._currentLayoutData;
    // 2026-05-10 (Q 案): __op_layout[vc].narration (新キー) を最優先で見る。
    // 無ければ __op_narration[vc] (旧キー) にフォールバック。
    if (data && data.__op_layout && typeof data.__op_layout === 'object') {
      const ent = data.__op_layout[vc];
      if (ent && typeof ent === 'object' && ent.narration && typeof ent.narration === 'object') {
        return ent.narration;
      }
    }
    if (data && data.__op_narration && typeof data.__op_narration === 'object') {
      const remote = data.__op_narration[vc];
      if (remote && typeof remote === 'object') return remote;
    }
  } catch (e) { /* fall through to localStorage */ }
  try {
    const raw = localStorage.getItem(NARRATION_RUNTIME_PREFIX + vc);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    return (obj && typeof obj === 'object') ? obj : null;
  } catch (e) { return null; }
}
function _opHexToRgba(hex, opacity) {
  // best-effort #rrggbb / #rgb → rgba(...)
  if (typeof hex !== 'string') return '';
  let h = hex.replace('#', '').trim();
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  if (h.length !== 6 || /[^0-9a-fA-F]/.test(h)) return '';
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  let a = (typeof opacity === 'number' && Number.isFinite(opacity)) ? opacity : 1;
  if (a < 0) a = 0; if (a > 1) a = 1;
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}
// 2026-05-10 (Q 案): saved-layout.json の `__op_layout[vc]` から立ち絵+対話+ナレ
// 全部の runtime 用 snapshot を読み込む。 LayoutSystem.init が defer ロード時点で
// window._currentLayoutData に展開済 (mode-btn タップまで通常数秒のラグがあるので
// race は実用上ない)。 未 fetch / __op_layout 未設定 / 当該 VC キー無し なら null。
function _opLoadLayoutOverride(vc) {
  if (!vc) return null;
  try {
    const data = window._currentLayoutData;
    if (data && data.__op_layout && typeof data.__op_layout === 'object') {
      const remote = data.__op_layout[vc];
      if (remote && typeof remote === 'object') return remote;
    }
  } catch (e) { /* fall through */ }
  return null;
}

// 2026-05-10 (perVariant 修正): OP cinematic 中の現在ポノ variant 名を導出する。
// 入力は panel.ponoImg / line.ponoImg のフルパス (例:
// "../assets/images/characters/pono/dance/dance_hi.webp") で、 出力は editor の
// perVariant キー (basename without extension、 例: "dance_hi")。 line 優先、
// 無ければ panel フォールバック、 どちらも無ければ null (= flat fallback で apply)。
// editor の OP_PANELS state では variant 名のみ ('dance_hi'), runtime export 時は
// fullPath ('../assets/.../dance_hi.webp') に変換される命名差異あり。
// basename + 拡張子除去で両対応 (variant 名のままの場合は no-op)。
// 命名統一は将来課題 (editor: ponoImgFallback / runtime: ponoImg).
function _opCurrentPonoVariant(panel, line) {
  try {
    let src = null;
    if (line && typeof line.ponoImg === 'string' && line.ponoImg) {
      src = line.ponoImg;
    } else if (panel && typeof panel.ponoImg === 'string' && panel.ponoImg) {
      src = panel.ponoImg;
    }
    if (!src) return null;
    // パスの最後のセグメントから拡張子を落として variant 名にする。
    const slash = src.lastIndexOf('/');
    const tail = (slash >= 0) ? src.slice(slash + 1) : src;
    const dot  = tail.lastIndexOf('.');
    const name = (dot > 0) ? tail.slice(0, dot) : tail;
    return name || null;
  } catch (_) {}
  return null;
}

// くるみちゃん用 variant 名解決 (2026-05-11)。 _opCurrentPonoVariant と同じ
// パス→basename 変換ロジック。 line.kurumiImg が無ければ panel.kurumiImg fallback、
// どちらも無ければ null (= flat fallback で apply)。
function _opCurrentKurumiVariant(panel, line) {
  try {
    let src = null;
    if (line && typeof line.kurumiImg === 'string' && line.kurumiImg) {
      src = line.kurumiImg;
    } else if (panel && typeof panel.kurumiImg === 'string' && panel.kurumiImg) {
      src = panel.kurumiImg;
    }
    if (!src) return null;
    const slash = src.lastIndexOf('/');
    const tail = (slash >= 0) ? src.slice(slash + 1) : src;
    const dot  = tail.lastIndexOf('.');
    const name = (dot > 0) ? tail.slice(0, dot) : tail;
    return name || null;
  } catch (_) {}
  return null;
}

// 2026-05-10 (Q 案): editor の per-VC snapshot から runtime DOM に inline style を
// 注入。 立ち絵 (.op-side-pono / .op-side-hakase の .op-char-slot) + 対話
// (.op-dialogue-single 本体 + .op-dialogue-text + .op-dialogue-label) + ナレ
// (.op-narration; 既存 _opApplyNarrationOverride に委譲) の 4 つ全部を扱う。
//
// __op_layout が無い VC は narration のみ既存パスにフォールバック (旧 __op_narration

// でも narration は正しく適用される (= 後方互換)。
//

    if (!slot) return;

    // 持たないと残留してしまい、 立ち絵が 0×0 や画面外に飛ぶ事故が起きる。
    // 新値を当てる前に必ず空文字でクリアして CSS @media デフォルトから当て直す。
    // 無効値 / 未定義値の場合は下の if ガードで何も書かないので、 結果として CSS デフォルトに任せる
    // (= 既存挙動の温存)。
    try {
      slot.style.width = '';
      slot.style.height = '';
      slot.style.aspectRatio = '';
      slot.style.transform = '';
    } catch (_) {}
    const __img0 = slot.querySelector('img');
    if (__img0) { try { __img0.style.objectPosition = ''; } catch (_) {} }
    // variant 値を優先、 無ければ flat (side そのもの) を使う。
    let src = side;
    if (variantName && side.perVariant && typeof side.perVariant === 'object') {
      const pv = side.perVariant[variantName];
      if (pv && typeof pv === 'object') src = pv;
    }
    if (isFiniteNum(src.slotW) && src.slotW > 0) slot.style.width  = src.slotW + 'px';
    if (isFiniteNum(src.slotH) && src.slotH > 0) slot.style.height = src.slotH + 'px';
    // slotAspect: 'fixed_0.75' → '0.75', 'fixed_1.23' → '1.23', 'fixed_1.0' → '1.0', 'free' → ''
    if (typeof src.slotAspect === 'string' && src.slotAspect.startsWith('fixed_')) {
      const ar = src.slotAspect.slice(6);
      if (ar) slot.style.aspectRatio = ar;
    } else if (src.slotAspect === 'free') {
      slot.style.aspectRatio = '';
    }
    // 'fixed_*' / 'free' 以外の sentinel 値 (例: 'auto' や undefined / null / 想定外文字列) は、
    // 上の冒頭リセット (slot.style.aspectRatio = '') によって inline 解除済みのまま残るので
    // CSS @media デフォルト (≈ 4:5) が当たる。 = 既存挙動と整合。
    const ox = isFiniteNum(src.slotOffsetX) ? src.slotOffsetX : 0;
    const oy = isFiniteNum(src.slotOffsetY) ? src.slotOffsetY : 0;
    slot.style.transform = 'translate(calc(-50% + ' + ox + 'px), calc(-50% + ' + oy + 'px))';
    // object-position は img に設定。
    const img = slot.querySelector('img');
    if (img && typeof src.objectPosition === 'string' && src.objectPosition) {
      img.style.objectPosition = src.objectPosition + ' center';
    }
  }
  const ponoVariant = _opCurrentPonoVariant(panel, line);
  applySide('pono',   layout.pono,   ponoVariant);
  applySide('hakase', layout.hakase, null);
  // くるみちゃん (2026-05-11): line/panel の kurumiImg から variant 名解決。
  // layout.kurumi が saved-layout.json に無い VC では no-op (CSS @media デフォルトに任せる)。
  const kurumiVariant = _opCurrentKurumiVariant(panel, line);
  applySide('kurumi', layout.kurumi, kurumiVariant);
  // 対話 (singleBox) 適用。 .op-dialogue-single 本体 + 内部 .op-dialogue-text +
  // .op-dialogue-label の 3 要素に inline style を書く。
  const sb = layout.singleBox;
  const dlg = document.getElementById('op-dialogue-single');
  if (sb && dlg) {
    if (isFiniteNum(sb.boxW) && sb.boxW > 0) dlg.style.width  = sb.boxW + 'px';
    if (isFiniteNum(sb.boxH) && sb.boxH > 0) dlg.style.height = sb.boxH + 'px';
    if (isFiniteNum(sb.boxY))                dlg.style.top    = sb.boxY + 'px';
    if (isFiniteNum(sb.boxPadding))          dlg.style.padding = sb.boxPadding + 'px';
    // 背景: image モード優先 (boxImagePath があれば)、 css モードなら boxColor + boxRadius。
    if (sb.boxMode === 'image' && typeof sb.boxImagePath === 'string' && sb.boxImagePath) {
      dlg.style.backgroundImage = "url('" + sb.boxImagePath + "')";
      dlg.style.backgroundSize = '100% 100%';
      dlg.style.backgroundRepeat = 'no-repeat';
      dlg.style.backgroundColor = 'transparent';
      dlg.style.borderRadius = '0';
    } else if (sb.boxMode === 'css') {
      dlg.style.backgroundImage = 'none';
      if (typeof sb.boxColor === 'string' && sb.boxColor) dlg.style.backgroundColor = sb.boxColor;
      if (isFiniteNum(sb.boxRadius)) dlg.style.borderRadius = sb.boxRadius + 'px';
    }
    // textAlign / 中央寄せ flex は既存 CSS で出ているが、 念のため text-align だけ
    // 上書き (line-height / font-size は内側 .op-dialogue-text へ)。
    const textEl  = document.getElementById('op-dialogue-text-single');
    const labelEl = document.getElementById('op-dialogue-label-single');
    if (textEl) {
      if (isFiniteNum(sb.fontSize)   && sb.fontSize   > 0) textEl.style.fontSize   = sb.fontSize + 'px';
      if (isFiniteNum(sb.lineHeight) && sb.lineHeight > 0) textEl.style.lineHeight = String(sb.lineHeight);
      if (typeof sb.textAlignH === 'string' && sb.textAlignH) textEl.style.textAlign = sb.textAlignH;
    }
    // ラベル: editor の labelPositionStyle と同じ計算で top/left を決める。
    // anchor='tl' inside=true: top = 16+oy, left = 16+ox
    // anchor='tr' inside=true: top = 16+oy, right = 16-ox
    // anchor='bl' inside=true: bottom = 16-oy, left = 16+ox
    // anchor='br' inside=true: bottom = 16-oy, right = 16-ox
    // outside (inside=false) は margin = -22。
    if (labelEl) {
      const insideMargin = 16, outsideMargin = -22;
      const margin = (sb.labelInside === false) ? outsideMargin : insideMargin;
      const ox = isFiniteNum(sb.labelOffsetX) ? sb.labelOffsetX : 0;
      const oy = isFiniteNum(sb.labelOffsetY) ? sb.labelOffsetY : 0;
      // 反対側プロパティを必ず auto にしてリセット (前回値の残留防止)。
      labelEl.style.top = labelEl.style.bottom = labelEl.style.left = labelEl.style.right = 'auto';
      const anchor = (sb.labelAnchor === 'tr' || sb.labelAnchor === 'tl' ||
                      sb.labelAnchor === 'br' || sb.labelAnchor === 'bl')
                       ? sb.labelAnchor : 'bl';
      if (anchor === 'tl')      { labelEl.style.top    = (margin + oy) + 'px'; labelEl.style.left  = (insideMargin + ox) + 'px'; }
      else if (anchor === 'tr') { labelEl.style.top    = (margin + oy) + 'px'; labelEl.style.right = (insideMargin - ox) + 'px'; }
      else if (anchor === 'bl') { labelEl.style.bottom = (margin - oy) + 'px'; labelEl.style.left  = (insideMargin + ox) + 'px'; }
      else                      { labelEl.style.bottom = (margin - oy) + 'px'; labelEl.style.right = (insideMargin - ox) + 'px'; }
      if (isFiniteNum(sb.labelFontSize) && sb.labelFontSize > 0) {
        labelEl.style.fontSize = sb.labelFontSize + 'px';
      }
    }
  }
  // 対話 boxImage が image モードのとき、 narration も同じ image を使う設計だが、
  // narration の bgImagePath は __op_layout[vc].narration.bgImagePath に
  // 分離されており、 適用は _opApplyNarrationOverride に統合済み (二重適用防止)。
  // ここでは singleBox しか触らない。
}

function _opApplyNarrationOverride(narrEl) {
  if (!narrEl) return;
  // Fix 1 (2026-05-10): inline color の残留 (前回 cinematic / 拡張機能 / theme スクリプト等)
  // で文字色が赤や別色になる事故を防ぐため、 必ず冒頭で空文字リセットする。
  // 空文字 = inline 解除 → CSS デフォルト (.op-narration の color: #3a2a14 = ダークブラウン) が当たる。
  // emphasis 行のみ <p class="emphasis"> で個別に上書きされるので、 親 narrEl の color を
  // クリアしても per-line 強調は壊れない。
  // Fix 2 (2026-05-10): white-space も同様に inline で 'pre-wrap' を確定して、 CSS race
  // (per-VC @media が当たる前のフレームで textContent の \n が無視される問題) を解消する。
  try { narrEl.style.color = ''; } catch (_) {}
  try { narrEl.style.whiteSpace = 'pre-wrap'; } catch (_) {}
  const vc = _opGetCurrentVC();
  const nr = _opLoadNarrationOverride(vc);
  if (!nr) return; // no override; CSS default 適用
  const isFiniteNum = (v) => typeof v === 'number' && Number.isFinite(v);
  // 位置 (top / bottom / posMode)。posMode に応じて片方をセットしもう片方を解除。
  if (nr.posMode === 'top') {
    if (isFiniteNum(nr.top))    { narrEl.style.top    = nr.top + 'px'; narrEl.style.bottom = 'auto'; }
  } else if (nr.posMode === 'bottom') {
    if (isFiniteNum(nr.bottom)) { narrEl.style.bottom = nr.bottom + 'px'; narrEl.style.top = 'auto'; }
  } else if (nr.posMode === 'free') {
    if (isFiniteNum(nr.top))    { narrEl.style.top    = nr.top + 'px'; narrEl.style.bottom = 'auto'; }
  }
  // サイズ
  if (isFiniteNum(nr.width) && nr.width > 0) narrEl.style.width = nr.width + 'px';
  if (nr.heightAuto === false && isFiniteNum(nr.height) && nr.height > 0) {
    narrEl.style.height = nr.height + 'px';
  } else if (nr.heightAuto === true) {
    narrEl.style.height = 'auto';
  }
  // padding (Y X) — CSS の asymmetric 3 値は editor が未対応 (= 対称化される)。
  // 既知の TODO (memory: feature_quizland_opening.md → エディタ asymmetric padding)。
  if (isFiniteNum(nr.paddingY) && isFiniteNum(nr.paddingX)) {
    narrEl.style.padding = nr.paddingY + 'px ' + nr.paddingX + 'px';
  }
  if (isFiniteNum(nr.fontSize) && nr.fontSize > 0) {
    narrEl.style.fontSize = nr.fontSize + 'px';
  }
  // line-height は unitless (本タスクの主目的)
  if (isFiniteNum(nr.lineHeight) && nr.lineHeight > 0) {
    narrEl.style.lineHeight = String(nr.lineHeight);
  }
  if (typeof nr.textAlignH === 'string' && nr.textAlignH) {
    narrEl.style.textAlign = nr.textAlignH;
  }
  // 背景: 'image' モードで bgImagePath があればフレーム画像を inline 注入。
  // 'css' モードのときのみ単色 + 角丸 + 影を更新。
  // (旧: image モードは runtime で触らず CSS デフォルトに任せていたが、
  //  __op_layout[vc].narration.bgImagePath を導入したため runtime 側で適用する。
  //  二重適用防止のため _opApplyLayoutOverride 末尾の narration 背景処理は撤去済み。)
  if (nr.bgMode === 'image' && typeof nr.bgImagePath === 'string' && nr.bgImagePath) {
    narrEl.style.backgroundImage  = "url('" + nr.bgImagePath + "')";
    narrEl.style.backgroundSize   = '100% 100%';
    narrEl.style.backgroundRepeat = 'no-repeat';
    narrEl.style.backgroundColor  = 'transparent';
    narrEl.style.borderRadius     = '0';
    narrEl.style.boxShadow        = 'none';
  } else if (nr.bgMode === 'css') {
    // Fix MEDIUM (review 2026-05-09): bgColor 不正値で bgc==='' のとき、CSS の frame
    // 画像 background が残ってしまい editor 上の「CSS 単色」設定と食い違う。
    // bgMode==='css' に入った時点で backgroundImage を消し、bgc が取れた場合のみ
    // backgroundColor を上書きする。
    narrEl.style.backgroundImage = 'none';
    const bgc = _opHexToRgba(nr.bgColor, isFiniteNum(nr.bgOpacity) ? nr.bgOpacity : 1);
    if (bgc) narrEl.style.backgroundColor = bgc;
    if (isFiniteNum(nr.borderRadius)) narrEl.style.borderRadius = nr.borderRadius + 'px';
    if (typeof nr.showShadow === 'boolean') {
      narrEl.style.boxShadow = nr.showShadow
        ? '0 10px 24px rgba(0,0,0,0.35), 0 0 0 2px rgba(120,80,30,0.18) inset'
        : 'none';
    }
  }
}

async function playOpeningCinematic() {
  const root = document.getElementById('op-cinematic');
  if (!root) return;
  if (_opRunning) return;          // re-entry guard
  _opRunning = true;

  _opCancelled = false;

  // Fix 4 (2026-05-10): ハードリロード直後に LayoutSystem.init の async fetch がまだ
  // 解決していないと、 OP cinematic 開始時点で window._currentLayoutData が null となり
  // _opLoadLayoutOverride / _opLoadNarrationOverride が saved-layout.json の値を見ずに
  // 「CSS デフォルト」 にフォールバックしてしまう (= リロードのたびに結果が揺れる race)。
  // ここで __op_layout の存在を確認し、 未ロードなら同期 fetch (cache: 'no-store' +
  // timestamp で CDN/browser cache を bust) してから panel ループに入る。
  // 失敗時は何もしない (= CSS デフォルト fallback で既存挙動を維持)。
  try {
    if (!window._currentLayoutData ||
        !window._currentLayoutData.__op_layout) {
      const r = await fetch('./saved-layout.json?_=' + Date.now(), { cache: 'no-store' });
      if (r && r.ok) {
        const j = await r.json();
        if (j && typeof j === 'object') window._currentLayoutData = j;
      }
    }
  } catch (e) {
    // Fix 4 minor (2026-05-10): catch にも debug 用の console.warn を仕込む。
    // 本番環境で saved-layout.json が CDN 障害等で取得失敗した際、 silent fallback
    // のままだと「なぜ CSS デフォルトに落ちたのか」が分からず原因切り分けに時間がかかる。
    // ここで warn を出しても fallback 動作 (= CSS デフォルト) は変わらない。
    try { console.warn('[OP cinematic] saved-layout.json fetch failed:', e); } catch (_) {}
  }

  // Fix 5e: CSS の transform: scale が無効化されるため、JS で動的に scale を計算・適用。
  // 起動時に 1 回 + cinematic 中の resize にも追従。終了時 (finally) で removeEventListener。
  rescaleOpContent();
  window.addEventListener('resize', rescaleOpContent);

  // Hoist BGM duck state so start, finish, and skip paths can reach it.
  let __opOrigBgm = null;
  let __opNarrSrc = null;
  let __opNarrGain = null;

  // Init babble audio context once (idempotent)
  try {
    if (window.PonoBabble && typeof window.PonoBabble.init === 'function'
        && typeof audioCtx !== 'undefined' && audioCtx) {
      window.PonoBabble.init(audioCtx);
    }
  } catch (e) {}

  // Show cinematic INSTANTLY at opacity 1 with black bg.
  // This is a HARD CUT from the mode-screen — no fade on the overlay itself.
  root.classList.remove('hidden');
  root.setAttribute('aria-hidden', 'false');

  // Now that the black overlay is on top of everything, hide the mode-screen.
  // Order matters: black covers first, then mode-screen disappears, so the
  // underlying game UI never has a chance to flash on screen.
  const __modeScreen = document.getElementById('mode-screen');
  if (__modeScreen) __modeScreen.classList.add('hidden');

  // Reset bg to invisible state, then force reflow so the opacity transition
  // fires the first time .is-revealed is added (in the panel loop below).
  const __bgInit = document.getElementById('op-bg');
  if (__bgInit) {
    __bgInit.classList.remove('is-revealed');
    void __bgInit.offsetWidth;
  }
  // フェードイン完了まで待機 (黒 → BG 画像のクロスフェード 700ms)
  await new Promise(function(r) { setTimeout(r, 700); });

  // Wire skip
  const skipBtn = document.getElementById('op-skip');
  function onSkip() {
    _opCancelled = true;
    _opTypingToken++;
    try { if (_opActiveAudio) { _opActiveAudio.pause(); _opActiveAudio.currentTime = 0; } } catch (e) {}
    try { if (window.PonoBabble && window.PonoBabble.cancelAll) window.PonoBabble.cancelAll(); } catch (e) {}
    // Restore BGM if it was ducked for narration.
    try {
      if (typeof bgmGain !== 'undefined' && bgmGain && bgmGain.gain && __opOrigBgm != null) {
        bgmGain.gain.setTargetAtTime(__opOrigBgm, audioCtx.currentTime, 0.2);
      }
    } catch (e) {}
  }
  if (skipBtn) skipBtn.addEventListener('click', onSkip);
  // Move keyboard focus to skip so kbd/switch users can bail out
  try { if (skipBtn) skipBtn.focus(); } catch (e) {}

  // Tap-to-advance: #op-cinematic 親に full-screen click を張り、
  // _opWaitForAdvance() の race を解決する。 #op-skip 上のタップは
  // _opOnRootTap 側で early-return するので干渉しない。
  // skip ボタンは別 click ハンドラ (onSkip) で全 OP skip を担当する役割分担。
  try { if (root) root.removeEventListener('click', _opOnRootTap, true); } catch (e) {}
  try { if (root) root.addEventListener('click', _opOnRootTap, true); } catch (e) {}

  // Reset advance state (前回 cinematic の残骸が万一あった場合に備える)
  _opAdvanceResolve = null;
  _opAdvanceArmedAt = 0;
  _opAdvanceMinHold = 0;
  // hint を hidden 初期状態に確実に戻しておく
  try {
    const __hintInit = document.getElementById('op-tap-hint');
    if (__hintInit) {
      __hintInit.classList.remove('is-visible');
      __hintInit.classList.add('hidden');
    }
  } catch (e) {}

  // Hoist DOM lookups out of the loop (Fix 2)
  // Fix 3: 旧 .op-characters / .op-dialogues 廃止。新 .op-sides がキャラ+ダイアログを内包
  const bg          = document.getElementById('op-bg');
  const sides       = document.getElementById('op-sides');
  const narration   = document.getElementById('op-narration');
  const dialogueBox = document.getElementById('op-dialogue-single');
  const dialogueLab = document.getElementById('op-dialogue-label-single');
  const dialogueEl  = document.getElementById('op-dialogue-text-single');
  const ponoImgEl   = document.getElementById('op-char-pono');
  const kurumiImgEl = document.getElementById('op-char-kurumi');
  const kurumiSide  = document.querySelector('.op-side-kurumi');

  // Fix 1: 背景はパネル毎に切り替える (panel 1 sharp / panel 2-6 blurred)。
  // ここでは旧来のアニメ系クラスだけクリアしておく。
  if (bg) {
    bg.classList.remove('dollying');
    bg.classList.remove('scenic-blur');
  }

  // Warm all per-panel and per-line pono images during the narration panel so
  // dialogue panels can swap src without a visible network fetch.
  // per-line ponoImg (line 単位) は新方式 / panel.ponoImg は fallback。両方プリロード。
  try {
    var __seen = {};
    function __warmImg(url) {
      if (!url || __seen[url]) return;
      __seen[url] = 1;
      var __im = new Image();
      __im.src = url;
    }
    for (var __i = 0; __i < OP_PANELS.length; __i++) {
      var __p = OP_PANELS[__i];
      if (!__p) continue;
      __warmImg(__p.ponoImg);
      __warmImg(__p.kurumiImg);
      if (__p.dialogues && __p.dialogues.length) {
        for (var __di = 0; __di < __p.dialogues.length; __di++) {
          var __d = __p.dialogues[__di];
          if (__d) {
            __warmImg(__d.ponoImg);
            __warmImg(__d.kurumiImg);
          }
        }
      }
    }
  } catch (e) {}

  try {
    if (!bg || !sides || !narration || !dialogueEl) {
      // Element missing — bail without entering the loop. Finally still runs.
      return;
    }
    // 2026-05-10 (Q 案): 立ち絵 (.op-side-pono / .op-side-hakase の slot) + 対話
    // (.op-dialogue-single) + ナレ (.op-narration) の inline style を一括適用。
    // panel ループ前に 1 回呼ぶことで、 panel kind の切替前に DOM が editor 設定で
    // 整っている状態を保証 (panel 1 narration → panel 2 dialogue で初回ダイアログが
    // 出る瞬間に CSS デフォルトで一瞬チラつくのを防ぐ)。
    // 初回 apply: panel/line がまだ確定していないので flat fallback で OK
    try { _opApplyLayoutOverride(null, null); } catch (_) {}
    for (let i = 0; i < OP_PANELS.length; i++) {
      if (_opCancelled) break;
      const panel = OP_PANELS[i];
      // Panel 2 入室演出 (2026-05-07): narration → 最初の dialogue panel は
      // 「部屋に入った瞬間」なので、 BG を sharp で 2s 表示してから blur をフェードインし、
      // それと同時にキャラ + Single Box ダイアログをフェードインさせる。
      // 2 回目以降の連続 dialogue panel (Panel 3-6) は通常通り即 blur のまま。
      const isFirstDialogue = (panel.kind === 'dialogue'
                                && i > 0
                                && OP_PANELS[i - 1].kind === 'narration');
      // Fix 1: パネル毎に背景画像とぼかしを切り替え。
      // Panel 1 (narration) は sharp、 dialogue パネルはぼかし。
      // ただし入室演出 (isFirstDialogue) のときは一旦 sharp のまま BG だけ切替え、
      // 後段で 2s 待機してから .is-static-blur を追加する。
      if (bg && panel.bg) {
        bg.style.backgroundImage = "url('" + panel.bg + "')";
        if (panel.kind === 'narration' || isFirstDialogue) {
          bg.classList.remove('is-static-blur');
        } else {
          bg.classList.add('is-static-blur');
        }
        // Force the filter into the same composite frame as the new bg image —
        // prevents a 1-frame sharp flash on slow Android renderers.
        void bg.offsetWidth;
        // Trigger the black → bg cross-fade. First call kicks the 0.7s opacity
        // transition; subsequent panels are no-ops (class already present),
        // so per-panel image swaps remain instant.
        bg.classList.add('is-revealed');
      }

      if (panel.kind === 'narration') {
        sides.classList.add('hidden');
        // Fix 2: フェードイン後、音声と本文を出すまでの 1500ms の沈黙
        for (var __t = 0; __t < 15 && !_opCancelled; __t++) {
          await new Promise(function(r) { setTimeout(r, 100); });
        }
        if (_opCancelled) break;

        // Fix 3: 2 セグメント順次表示。segments があれば優先、無ければ旧 lines にフォールバック
        const segs = (panel.segments && panel.segments.length)
          ? panel.segments
          : (panel.lines ? [{ lines: panel.lines }] : []);

        // 2026-05-09: per-seg audio に対応。 segments[i].audio があれば seg ごとに
        // 個別 Audio を生成・再生。 ユーザがタップで seg を進めた時に強制停止
        // (= 「最後まで言い切らない」設計)。 panel-level panel.audio は後方互換 fallback。
        // seg を作るたびに既存の Web Audio routing を破棄するヘルパ。
        function __opStartSegAudio(segIdx) {
          // 既存の seg audio / routing を片付け (リーク防止)
          try { if (_opActiveAudio) { _opActiveAudio.pause(); _opActiveAudio.currentTime = 0; } } catch (_) {}
          _opActiveAudio = null;

    const holdMs = 2200;
    const stepMs = 100;
    const steps = Math.ceil(holdMs / stepMs);
    for (let t = 0; t < steps; t++) {
      if (cancelled) break;
      await new Promise(r => setTimeout(r, stepMs));
    }
    // Fade out (0.35s matches the CSS transition)
    root.classList.remove('is-revealed');
    await new Promise(r => setTimeout(r, 360));
  } finally {
    root.classList.add('hidden');
    root.setAttribute('aria-hidden', 'true');
    root.removeEventListener('click', onTap);
    _qscRunning = false;
  }
}

// ---- Question Number Plate (Q1-Q5 startup) ----
// v960: スケールイン (~0.45s) で表示開始 → 自動消去せず維持。
// kurumi 音声 (kurumi_dai{N}mon) の ended +0.3s まで表示し続け、
// hideQuestionNumberPlate() でフェードアウト + DOM hide。
// fallback: kurumi audio 取得失敗時は loadQuestion 側の 6s タイマで強制 hide。
let _qnoRunning = false;
async function playQuestionNumberPlate(qIdx) {
  // qIdx is 0-indexed; show plate only for first 5 questions
  if (qIdx < 0 || qIdx >= 5) return;
  if (_qnoRunning) return;
  _qnoRunning = true;

  const root = document.getElementById('qno-plate-overlay');
  const img = document.getElementById('qno-plate-img');
  if (!root || !img) { _qnoRunning = false; return; }

  // Q1=index 0 → plate 1.png, etc.
  const plateNum = qIdx + 1;
  img.src = '../assets/images/quizland/qno_plate_' + plateNum + '.png';

  // タップで「即フェードアウト」させる (旧仕様: cancelled で即座に hide)
  function onTap() {
    root.removeEventListener('click', onTap);
    hideQuestionNumberPlate();
  }
  root.addEventListener('click', onTap, { once: true });

  // Show overlay
  root.classList.remove('hidden', 'is-fadeout');
  root.setAttribute('aria-hidden', 'false');
  void root.offsetWidth;     // reflow to commit initial state
  root.classList.add('is-impact', 'is-tap-skip');

  // Wait only for scale-in animation (~0.45s) so typewriter can start.
  // 表示維持は CSS animation forwards で確保、 hide は外部から呼ばれる。
  await new Promise(function (r) { setTimeout(r, 480); });
  // 注意: ここで _qnoRunning は false に戻さない (plate は visible 維持中)。
  // hideQuestionNumberPlate() で hidden + _qnoRunning=false にリセットする。
}

// v960: kurumi 音声 ended (+0.3s) で plate をフェードアウト + DOM hide。
// 重複呼び出し safe (既に hidden / running 中でない場合は no-op)。
// v967: plate fade-out のタイミングで問題文 / 挿絵 / 4 択を一括 reveal (案 C)。
//   loadQuestion 末尾で .q-stage-pending を付けて隠蔽 → ここで .q-stage-revealed
//   に切替えて opacity 0→1 transition (CSS 0.4s) で同期的にフェードイン。
//   tap-to-skip 経路 (_revealAllPendingStages) でも同じノードが reveal されるので
//   既存タップスキップとも整合。
function hideQuestionNumberPlate() {
  const root = document.getElementById('qno-plate-overlay');
  const img = document.getElementById('qno-plate-img');
  if (!root) return;
  if (root.classList.contains('hidden')) return;
  // v967: plate fade-out 開始と同時に staged reveal を発火
  //   (#q-text / .emoji-display / .emoji-main-img / #answer-panel が対象)
  try {
    document.querySelectorAll('.q-stage-pending').forEach(function (el) {
      el.classList.remove('q-stage-pending');
      el.classList.add('q-stage-revealed');
    });
  } catch (e) { /* noop */ }
  // フェードアウト用の transition を発火
  root.classList.add('is-fadeout');
  root.classList.remove('is-tap-skip');
  setTimeout(function () {
    root.classList.remove('is-impact', 'is-fadeout');
    root.classList.add('hidden');
    root.setAttribute('aria-hidden', 'true');
    if (img) img.src = '';
    _qnoRunning = false;
  }, 360); // CSS transition (0.35s) と一致
}

// HUD settings button → 共通メニューを開く
//   注意: 本ボタンの pointerdown を stopPropagation せずに dispatch すると、
//   元イベントが document の close-on-outside-tap リスナー (common/menu.js)
//   まで到達して、 開いたばかりのメニューを即閉じてしまう。 settings-btn は
//   menuToggle/dropdown の外にあるため target チェックで弾けない。 そのため
//   stopPropagation で元イベントの bubble を止める。 dispatch するイベントは
//   menuToggle 自身を target とする別物なので close-handler に弾かれない。
(function() {
  var settingsBtn = document.getElementById('hud-settings-btn');
  if (!settingsBtn) return;

  // ドロップダウンを #hud-settings-btn の直下に位置決めする。
  // 共通メニュー (common/menu.js) は .pono-menu-toggle を左上前提で書かれているため、
  // quizland では BoundingClientRect から右上座標を毎回計算し inline style で上書きする。
  // 開く直前 (= dispatch 前) と、開いた直後 (= 念のため) に走らせる。
  function _ponoRepositionDropdown() {
    var dd = document.querySelector('.pono-dropdown');
    if (!dd) return;
    var rect = settingsBtn.getBoundingClientRect();
    // ボタン直下 8px、 右辺をボタンの右辺に揃える
    var top = Math.round(rect.bottom + 8);
    var rightEdge = window.innerWidth - rect.right;
    // 画面端からのマージン (safe-area-inset-right の保険として 8px 確保)
    if (rightEdge < 8) rightEdge = 8;
    dd.style.top = top + 'px';
    dd.style.right = rightEdge + 'px';
    dd.style.left = 'auto';
  }

  settingsBtn.addEventListener('pointerdown', function(e) {
    if (_isEditMode()) { e.preventDefault(); e.stopPropagation(); return; }
    e.preventDefault();
    e.stopPropagation();
    // 表示前に位置を再計算 (画面リサイズ・回転対応)
    _ponoRepositionDropdown();
    var menuToggle = document.querySelector('.pono-menu-toggle');
    if (menuToggle) {
      var evt = typeof PointerEvent === 'function'
        ? new PointerEvent('pointerdown', { bubbles: true, cancelable: true, pointerType: 'touch' })
        : new Event('pointerdown', { bubbles: true, cancelable: true });
      menuToggle.dispatchEvent(evt);
    }
    // openMenu() 後の transform/translateY が走るので 1 frame 後にもう一度補正
    requestAnimationFrame(_ponoRepositionDropdown);
  });

  // リサイズ・回転時にも追従 (メニューが開いていれば即時補正)
  window.addEventListener('resize', _ponoRepositionDropdown);
  window.addEventListener('orientationchange', function() {
    setTimeout(_ponoRepositionDropdown, 200);
    setTimeout(_ponoRepositionDropdown, 600);
  });
})();

function _qzPtUtf8Btoa(s) { return btoa(unescape(encodeURIComponent(s))); }
function _qzPtAtouUtf8(b64) {
  try { return decodeURIComponent(escape(atob(b64))); } catch (_) { return ''; }
}
function _qzPtToast(msg, kind) {
  var el = document.getElementById('qz-pt-toast');
  if (!el) return;
  el.className = 'qz-pt-toast ' + (kind || 'info');
  el.textContent = msg;

    setTimeout(function () {
      if (el.textContent === msg) { el.className = 'qz-pt-toast'; el.textContent = ''; }
    }, 3500);

function _qzPtLoadHtml2canvas() {
  if (QZ_PT.html2canvasReady) return QZ_PT.html2canvasReady;
  if (typeof html2canvas !== 'undefined') {
    QZ_PT.html2canvasReady = Promise.resolve();
    return QZ_PT.html2canvasReady;
  }
  QZ_PT.html2canvasReady = new Promise(function (resolve, reject) {
    var s = document.createElement('script');
    s.src = '../assets/lib/html2canvas.min.js';
    s.onload = function () { resolve(); };
    s.onerror = function () { reject(new Error('html2canvas load failed')); };
    document.head.appendChild(s);
  });
  return QZ_PT.html2canvasReady;
}

// 任意の canvas/blob を JPEG に再エンコード + 長辺リサイズ
function _qzPtCanvasToCompressedJpeg(canvas) {
  var w = canvas.width, h = canvas.height;
  var max = QZ_PT.MAX_LONG_EDGE;
  var scale = Math.min(1, max / Math.max(w, h));
  var tw = Math.max(1, Math.round(w * scale));
  var th = Math.max(1, Math.round(h * scale));
  var out = document.createElement('canvas');
  out.width = tw; out.height = th;
  var ctx = out.getContext('2d');
  // JPEG は透明をサポートしないので白背景を敷く
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, tw, th);
  ctx.drawImage(canvas, 0, 0, tw, th);
  return new Promise(function (resolve) {
    out.toBlob(function (blob) {
      var fr = new FileReader();
      fr.onload = function () {
        var dataUrl = fr.result;
        var b64 = String(dataUrl).split(',')[1] || '';
        resolve({ blob: blob, dataUrl: dataUrl, b64: b64, size: blob.size });
      };
      fr.readAsDataURL(blob);
    }, 'image/jpeg', QZ_PT.JPEG_QUALITY);
  });
}

function _qzPtImageFileToCompressedJpeg(file) {
  return new Promise(function (resolve, reject) {
    var fr = new FileReader();
    fr.onload = function () {
      var img = new Image();
      img.onload = function () {
        var c = document.createElement('canvas');
        c.width = img.naturalWidth || img.width;
        c.height = img.naturalHeight || img.height;
        c.getContext('2d').drawImage(img, 0, 0);
        _qzPtCanvasToCompressedJpeg(c).then(resolve, reject);
      };
      img.onerror = function () { reject(new Error('image decode failed')); };
      img.src = fr.result;
    };
    fr.onerror = function () { reject(new Error('file read failed')); };
    fr.readAsDataURL(file);
  });
}

function _qzPtTotalBytes() {
  return QZ_PT.shots.reduce(function (a, s) { return a + (s.size || 0); }, 0);
}

function _qzPtAddShot(meta, source) {
  if (meta.size > QZ_PT.MAX_PER_FILE) {
    _qzPtToast('スクショ ' + Math.round(meta.size / 1024) + 'KB は1枚上限(500KB)を超えています', 'err');
    return false;
  }
  if (_qzPtTotalBytes() + meta.size > QZ_PT.MAX_TOTAL) {
    _qzPtToast('合計サイズ上限(2MB)を超えるため追加できません', 'err');
    return false;
  }
  var ts = Date.now();
  var idx = (currentQ && currentQ._idx != null) ? currentQ._idx : 'x';
  var name = idx + '_' + ts + '_' + (QZ_PT.shots.length + 1) + '.jpg';
  QZ_PT.shots.push({
    name: name, blob: meta.blob, dataUrl: meta.dataUrl, b64: meta.b64, size: meta.size, source: source || 'capture',
  });
  _qzPtRenderThumbs();
  return true;
}

function _qzPtRenderThumbs() {
  var wrap = document.getElementById('qz-pt-thumbs');
  var count = document.getElementById('qz-pt-count');
  if (!wrap) return;
  wrap.innerHTML = '';
  QZ_PT.shots.forEach(function (s, i) {
    var t = document.createElement('div');
    t.className = 'qz-pt-thumb';
    var img = document.createElement('img');
    img.src = s.dataUrl;
    img.alt = s.name;
    var rm = document.createElement('button');
    rm.type = 'button';
    rm.className = 'qz-pt-rm';
    rm.textContent = '×';
    rm.title = '削除';
    rm.addEventListener('click', function (e) {
      e.preventDefault(); e.stopPropagation();
      QZ_PT.shots.splice(i, 1);
      _qzPtRenderThumbs();
    });
    t.appendChild(img);
    t.appendChild(rm);
    wrap.appendChild(t);
  });
  if (count) {
    var bytes = _qzPtTotalBytes();
    count.textContent = '添付: ' + QZ_PT.shots.length +
      (QZ_PT.shots.length ? ' (' + Math.round(bytes / 1024) + 'KB)' : '');
  }
}

function _qzPtCaptureStage() {
  _qzPtToast('キャプチャ中…', 'info');
  return _qzPtLoadHtml2canvas().then(function () {
    var target = document.querySelector('.stage-wrap') || document.querySelector('.stage') || document.body;
    return html2canvas(target, {
      backgroundColor: '#ffffff',
      useCORS: true,
      allowTaint: false,
      logging: false,
      scale: Math.min(2, window.devicePixelRatio || 1),
    });
  }).then(function (canvas) {
    return _qzPtCanvasToCompressedJpeg(canvas);
  }).then(function (meta) {
    if (_qzPtAddShot(meta, 'auto')) {
      _qzPtToast('キャプチャ追加: ' + Math.round(meta.size / 1024) + 'KB', 'ok');
    }
  }).catch(function (err) {
    console.warn('[playtest] capture failed', err);
    _qzPtToast('キャプチャ失敗: ' + (err && err.message || err), 'err');
  });
}

function _qzPtAttachFiles(fileList) {
  var files = Array.prototype.slice.call(fileList || []);
  files = files.filter(function (f) { return /^image\//.test(f.type); });
  if (!files.length) return;
  Promise.all(files.map(function (f) {
    return _qzPtImageFileToCompressedJpeg(f).then(function (meta) {
      return _qzPtAddShot(meta, 'attach');
    }).catch(function (err) {
      console.warn('[playtest] file decode failed', err);
      _qzPtToast('画像読み込み失敗: ' + (err && err.message || err), 'err');
    });
  })).then(function () {
    _qzPtToast('添付しました', 'ok');
  });
}

// ── GitHub PUT helpers ─────────────────────────────────────
function _qzPtGhGet(path) {
  var url = '/api/gh/repos/' + QZ_PT.GH_OWNER + '/' + QZ_PT.GH_REPO +
            '/contents/' + encodeURI(path) + '?ref=' + QZ_PT.GH_BRANCH;
  return fetch(url, {
    method: 'GET',
    credentials: 'include',
    headers: { 'Accept': 'application/vnd.github+json' },
    cache: 'no-store',
  }).then(function (r) {
    if (r.status === 404) return null;
    if (!r.ok) throw new Error('GH GET ' + path + ' → ' + r.status);
    return r.json();
  });
}
function _qzPtGhPut(path, contentB64, message, sha) {
  var url = '/api/gh/repos/' + QZ_PT.GH_OWNER + '/' + QZ_PT.GH_REPO +
            '/contents/' + encodeURI(path);
  var body = { message: message, content: contentB64, branch: QZ_PT.GH_BRANCH };
  if (sha) body.sha = sha;
  return fetch(url, {
    method: 'PUT',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
    body: JSON.stringify(body),
  }).then(function (r) {
    if (!r.ok) {
      return r.text().then(function (txt) {
        var err = new Error('GH PUT ' + path + ' → ' + r.status + ' ' + txt.slice(0, 200));
        err.status = r.status;
        throw err;
      });
    }
    return r.json();
  });
}

// ── localStorage backup ─────────────────────────────────────
function _qzPtBackupAppend(noteEntry) {
  try {
    var raw = localStorage.getItem(QZ_PT.LS_BACKUP_KEY);
    var arr = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(arr)) arr = [];
    // Strip Blobs (cannot serialize) — keep b64 only for shots
    var lite = {
      idx: noteEntry.idx, category: noteEntry.category, level: noteEntry.level,
      type: noteEntry.type, q: noteEntry.q, comment: noteEntry.comment,
      cropMiss: noteEntry.cropMiss,
      noted_at: noteEntry.noted_at,
      screenshot_b64: (noteEntry._shotsMeta || []).map(function (s) {
        return { name: s.name, b64: s.b64.slice(0, 200000) };
      }),
    };
    arr.push(lite);
    localStorage.setItem(QZ_PT.LS_BACKUP_KEY, JSON.stringify(arr));
  } catch (e) { console.warn('[playtest] backup failed', e); }
}

// ── Save flow: 「次へ」押下時に呼ばれる ───────────────────
// 戻り値: Promise<bool>  (進行可なら resolve(true); ユーザー警告中なら false)
function _qzPtSaveCurrentNote() {
  // editor 内 playtest mode (QZ_PLAYTEST_IN_EDITOR) からも GitHub へ保存できるようにする
  if (!QZ_DEBUG_ALL && !isPlaytestInEditor()) return Promise.resolve(true);
  if (QZ_PT.saving) return Promise.resolve(false);
  var ta = document.getElementById('qz-pt-comment');
  var comment = (ta && ta.value || '').trim();
  var hasShots = QZ_PT.shots.length > 0;
  var cropMissEl = document.getElementById('qz-pt-cropmiss');
  var cropMiss = !!(cropMissEl && cropMissEl.checked);
  if (!comment && !hasShots && !cropMiss) return Promise.resolve(true);

  if (!QZ_PT.sessionStarted) QZ_PT.sessionStarted = new Date().toISOString();
  QZ_PT.saving = true;
  _qzPtToast('保存中…', 'info');

  var noteEntry = {
    idx: currentQ && currentQ._idx != null ? currentQ._idx : null,
    category: currentQ && (currentQ.category || currentQ._cat) || null,
    level: currentQ && currentQ.level != null ? currentQ.level : null,
    type: currentQ && currentQ.type || null,
    q: currentQ && currentQ.q || null,
    comment: comment,
    cropMiss: cropMiss,
    screenshots: [],
    noted_at: new Date().toISOString(),
    _shotsMeta: QZ_PT.shots.slice(), // backup helper only
  };

  // 1. screenshot を個別 PUT。 失敗したら b64 fallback
  var shotsToUpload = QZ_PT.shots.slice();
  var uploadedPaths = [];
  var uploadChain = Promise.resolve();
  shotsToUpload.forEach(function (s) {
    uploadChain = uploadChain.then(function () {
      var path = QZ_PT.SHOTS_DIR + '/' + s.name;
      return _qzPtGhPut(path, s.b64, 'chore(playtest): screenshot ' + s.name)
        .then(function () { uploadedPaths.push(path); })
        .catch(function (err) {
          console.warn('[playtest] screenshot PUT failed → b64 fallback', err);
          QZ_PT.binaryFallback = true;
          uploadedPaths.push({ fallback_b64: s.b64, name: s.name, size: s.size });
        });
    });
  });

  return uploadChain.then(function () {
    noteEntry.screenshots = uploadedPaths;
    delete noteEntry._shotsMeta;

    // 2. notes JSON を読んで append → PUT
    return _qzPtGhGet(QZ_PT.NOTES_PATH).then(function (existing) {
      var doc = { session_started: QZ_PT.sessionStarted, notes: [] };
      var sha = null;
      if (existing) {
        sha = existing.sha;
        try {
          var parsed = JSON.parse(_qzPtAtouUtf8(existing.content.replace(/\s/g, '')));
          if (parsed && Array.isArray(parsed.notes)) doc = parsed;
          if (!doc.session_started) doc.session_started = QZ_PT.sessionStarted;
        } catch (_) { /* corrupt JSON → start fresh */ }
      }
      doc.notes.push({
        idx: noteEntry.idx,
        category: noteEntry.category,
        level: noteEntry.level,
        type: noteEntry.type,
        q: noteEntry.q,
        comment: noteEntry.comment,
        cropMiss: noteEntry.cropMiss,
        screenshots: noteEntry.screenshots,
        noted_at: noteEntry.noted_at,
      });
      var pretty = JSON.stringify(doc, null, 2);
      return _qzPtGhPut(QZ_PT.NOTES_PATH, _qzPtUtf8Btoa(pretty),
        'chore(playtest): note for #' + (noteEntry.idx != null ? noteEntry.idx : '?'), sha);
    });
  }).then(function () {
    _qzPtToast('保存しました ✓', 'ok');
    if (ta) ta.value = '';
    if (cropMissEl) cropMissEl.checked = false;
    QZ_PT.shots = [];
    _qzPtRenderThumbs();
    QZ_PT.saving = false;
    return true;
  }).catch(function (err) {
    console.warn('[playtest] save failed', err);
    _qzPtBackupAppend(noteEntry);
    _qzPtToast('保存失敗 (localStorageにバックアップ): ' + (err && err.message || err), 'err');
    QZ_PT.saving = false;
    // 失敗時もユーザーは進めるが、 UI はクリアしない (再試行余地)
    return true;
  });
}

function _qzPtBuildPanel() {
  var panel = document.createElement('div');
  panel.id = 'qz-playtest-panel';
  panel.innerHTML =
    '<div class="qz-pt-handle" id="qz-pt-handle">' +
      '<span class="qz-pt-handle-title">📝 Playtest</span>' +
      '<span class="qz-pt-handle-btns">' +
        '<button type="button" class="qz-pt-handle-btn" id="qz-pt-reset" title="位置リセット">⟲</button>' +
        '<button type="button" class="qz-pt-handle-btn" id="qz-pt-toggle" title="最小化/展開">−</button>' +
      '</span>' +
    '</div>' +
    '<div class="qz-pt-extra">' +
      '<div class="qz-pt-label">コメント (任意)</div>' +
      '<textarea id="qz-pt-comment" placeholder="このイチゴの絵が潰れて見える..." rows="2"></textarea>' +
      '<div class="qz-pt-row">' +
        '<button type="button" class="qz-pt-btn" id="qz-pt-capture">📸 自動キャプチャ</button>' +
        '<button type="button" class="qz-pt-btn" id="qz-pt-attach-btn">📎 添付</button>' +
        '<input type="file" id="qz-pt-attach-input" accept="image/*" multiple>' +
        '<span class="qz-pt-count" id="qz-pt-count">添付: 0</span>' +
        '<label class="qz-pt-cropmiss" id="qz-pt-cropmiss-label" title="この問題の絵にクロップミスがある">' +
          '<input type="checkbox" id="qz-pt-cropmiss">' +
          '<span>クロップミス</span>' +
        '</label>' +
      '</div>' +
      '<div class="qz-pt-thumbs" id="qz-pt-thumbs"></div>' +
      '<div class="qz-pt-toast" id="qz-pt-toast"></div>' +
    '</div>';
  document.body.appendChild(panel);

  // ─── drag / minimize / restore wiring ────────────────────────────────────
  var handleEl = document.getElementById('qz-pt-handle');
  var toggleBtn = document.getElementById('qz-pt-toggle');
  var resetBtn = document.getElementById('qz-pt-reset');

  // drag state
  (function initPanelDrag() {
    var dragging = false, offX = 0, offY = 0, moved = false;
    var clamp = function (v, lo, hi) { return Math.max(lo, Math.min(hi, v)); };
    var setPos = function (x, y) {
      var maxX = Math.max(0, window.innerWidth  - panel.offsetWidth);
      var maxY = Math.max(0, window.innerHeight - 40);
      x = clamp(x, 0, maxX);
      y = clamp(y, 0, maxY);
      panel.style.left = x + 'px';
      panel.style.top  = y + 'px';
      panel.style.right = 'auto';
      panel.style.bottom = 'auto';
    };
    var pointFrom = function (e) {
      if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    };
    var onDown = function (e) {
      // ボタンや input の上では drag しない
      if (e.target && e.target.closest && e.target.closest('button, input, select, textarea')) return;
      var p = pointFrom(e);
      var rect = panel.getBoundingClientRect();
      offX = p.x - rect.left;
      offY = p.y - rect.top;
      dragging = true;
      moved = false;
      panel.classList.add('is-dragging');
      if (e.cancelable) e.preventDefault();
    };
    var onMove = function (e) {
      if (!dragging) return;
      var p = pointFrom(e);
      moved = true;
      setPos(p.x - offX, p.y - offY);
      if (e.cancelable) e.preventDefault();
    };
    var onUp = function () {
      if (!dragging) return;
      dragging = false;
      panel.classList.remove('is-dragging');
      if (moved) {
        try {
          localStorage.setItem('qz_pt_panel_pos', JSON.stringify({
            x: panel.offsetLeft, y: panel.offsetTop
          }));
        } catch (_) {}
      }
    };
    handleEl.addEventListener('mousedown', onDown);
    handleEl.addEventListener('touchstart', onDown, { passive: false });
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchend', onUp);
    document.addEventListener('touchcancel', onUp);
  })();

  // minimize toggle
  toggleBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    e.preventDefault();
    var collapsed = panel.classList.toggle('is-minimized');
    toggleBtn.textContent = collapsed ? '▲' : '−';
    toggleBtn.title = collapsed ? '展開' : '最小化';
    try { localStorage.setItem('qz_pt_panel_collapsed', collapsed ? '1' : '0'); } catch (_) {}
  });

  // reset position (デフォルト: 画面右上)
  resetBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    e.preventDefault();
    panel.style.left = '';
    panel.style.top = '';
    panel.style.right = '';
    panel.style.bottom = '';
    try { localStorage.removeItem('qz_pt_panel_pos'); } catch (_) {}
  });

  // restore saved position / minimized state
  (function restorePanelState() {
    try {
      var raw = localStorage.getItem('qz_pt_panel_pos');
      if (raw) {
        var pos = JSON.parse(raw);
        if (pos && typeof pos.x === 'number' && typeof pos.y === 'number') {
          // viewport 外に保存されていた場合に救済
          var maxX = Math.max(0, window.innerWidth  - 80);
          var maxY = Math.max(0, window.innerHeight - 40);
          var x = Math.max(0, Math.min(maxX, pos.x));
          var y = Math.max(0, Math.min(maxY, pos.y));
          panel.style.left = x + 'px';
          panel.style.top  = y + 'px';
          panel.style.right = 'auto';
          panel.style.bottom = 'auto';
        }
      }
    } catch (_) {}
    try {
      if (localStorage.getItem('qz_pt_panel_collapsed') === '1') {
        panel.classList.add('is-minimized');
        toggleBtn.textContent = '▲';
        toggleBtn.title = '展開';
      }
    } catch (_) {}
  })();

  var ta = document.getElementById('qz-pt-comment');
  ta.addEventListener('paste', function (e) {
    var items = (e.clipboardData && e.clipboardData.items) || [];
    var found = false;
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      if (it.kind === 'file' && /^image\//.test(it.type)) {
        var f = it.getAsFile();
        if (f) {
          found = true;
          _qzPtImageFileToCompressedJpeg(f).then(function (meta) {
            if (_qzPtAddShot(meta, 'paste')) _qzPtToast('クリップボードから追加', 'ok');
          }).catch(function (err) {
            _qzPtToast('画像ペースト失敗: ' + (err && err.message || err), 'err');
          });
        }
      }
    }
    if (found) e.preventDefault();
  });

  document.getElementById('qz-pt-capture').addEventListener('click', function (e) {
    // editor mode 中でも playtest mode が ON なら通常通り動かす
    if (_isEditMode() && !isPlaytestInEditor()) { e.preventDefault(); e.stopPropagation(); return; }
    e.preventDefault();
    _qzPtCaptureStage();
  });
  var fileInput = document.getElementById('qz-pt-attach-input');
  document.getElementById('qz-pt-attach-btn').addEventListener('click', function (e) {
    if (_isEditMode() && !isPlaytestInEditor()) { e.preventDefault(); e.stopPropagation(); return; }
    e.preventDefault();
    fileInput.click();
  });
  fileInput.addEventListener('change', function () {
    _qzPtAttachFiles(fileInput.files);
    fileInput.value = '';
  });
}

// debug nav (前へ / メタ / ジャンプ select / 次へ) DOM を組み立てて handler を配線。
// QZ_DEBUG_ALL モードと editor 内 playtest mode の両方から呼ばれる共通関数。
// 二重構築を防ぐため、 既に存在していれば早期 return する。
function _qzBuildDebugNavDOM() {
  if (document.getElementById('qz-debug-nav')) return;
  var nav = document.createElement('div');
  nav.id = 'qz-debug-nav';
  nav.innerHTML =
    '<button type="button" id="qz-debug-prev" title="前の問題へ">← 前へ</button>' +
    '<span class="qz-dbg-meta" id="qz-debug-meta">(loading)</span>' +
    '<select id="qz-debug-jump" title="ジャンプ"></select>' +
    '<button type="button" id="qz-debug-next" title="次へ (コメント保存)">次へ →</button>';
  document.body.appendChild(nav);

  // ジャンプ select 項目: playlist が既に組まれているなら入れる、 まだなら空のまま。
  // editor 内 playtest mode で playtest UI を ON にしたタイミングではまだ playlist が
  // 空のことがあるため、 select は updateDebugNav 経由で必要に応じて再構築する。
  _qzRefreshDebugJumpSelect();

  document.getElementById('qz-debug-prev').addEventListener('click', function (e) {
    if (_isEditMode() && !isPlaytestInEditor()) { e.preventDefault(); e.stopPropagation(); return; }
    // Phase 2 / impl-B: 未保存 per-Q レイアウト変更があれば確認 (impl-A 公開 API)
    try {
      if (window.LayoutEditor && typeof window.LayoutEditor.confirmDiscardIfDirty === 'function'
          && !window.LayoutEditor.confirmDiscardIfDirty()) return;
    } catch (_) { /* ignore */ }
    _qzPtSaveCurrentNote().then(function () {
      _qzDebugGoto(questionIdx - 1);
    });
  });
  document.getElementById('qz-debug-next').addEventListener('click', function (e) {
    if (_isEditMode() && !isPlaytestInEditor()) { e.preventDefault(); e.stopPropagation(); return; }
    // Phase 2 / impl-B: 未保存 per-Q レイアウト変更があれば確認 (impl-A 公開 API)
    try {
      if (window.LayoutEditor && typeof window.LayoutEditor.confirmDiscardIfDirty === 'function'
          && !window.LayoutEditor.confirmDiscardIfDirty()) return;
    } catch (_) { /* ignore */ }
    _qzPtSaveCurrentNote().then(function () {
      _qzDebugGoto(questionIdx + 1);
    });
  });
}

function _qzRefreshDebugJumpSelect() {
  var sel = document.getElementById('qz-debug-jump');
  if (!sel || !playlist) return;
  // 既に options が入っていて項目数が一致していれば再構築不要
  if (sel.options && sel.options.length === playlist.length) return;
  // 一旦クリアして詰め直し
  while (sel.firstChild) sel.removeChild(sel.firstChild);
  var frag = document.createDocumentFragment();
  playlist.forEach(function (q, i) {
    var opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent =
      (i + 1) + '/' + playlist.length + ' ' + _qzCatLabel(q._cat) +
      ' Lv' + (q.level || '?') + ' #' + (q._idx != null ? q._idx : '?');
    frag.appendChild(opt);
  });
  sel.appendChild(frag);
  // change handler は重複登録を避けるためフラグで 1 回のみ
  if (!sel._qzWired) {
    sel._qzWired = true;
    sel.addEventListener('change', function () {
      if (_isEditMode() && !isPlaytestInEditor()) return;
      // Phase 2 / impl-B: 未保存 per-Q レイアウト変更があれば確認 (impl-A 公開 API)
      try {
        if (window.LayoutEditor && typeof window.LayoutEditor.confirmDiscardIfDirty === 'function'
            && !window.LayoutEditor.confirmDiscardIfDirty()) {
          // ユーザーが「留まる」を選んだ場合、 select は元の位置に戻す
          sel.value = String(questionIdx);
          return;
        }
      } catch (_) { /* ignore */ }
      _qzPtSaveCurrentNote().then(function () {
        _qzDebugGoto(parseInt(sel.value, 10) || 0);
      });
    });
  }
}

// editor toolbar の toggle ハンドラから呼べるよう window 公開
try {
  window._qzPtBuildPanel = _qzPtBuildPanel;
  window._qzBuildDebugNavDOM = _qzBuildDebugNavDOM;
  window._qzRefreshDebugJumpSelect = _qzRefreshDebugJumpSelect;
  window.updateDebugNav = updateDebugNav;
} catch (_) {}

// editor 内 🧪 Playtest ON のときに、 全 169 問の playlist を構築し直す。
// ?debug=all で起動したときと同等の playlist 状態にするための共通関数。
// 現在表示中の問題と同じ問題が新 playlist に含まれていれば、 questionIdx を
// その index に更新するだけで再 loadQuestion せず滑らかに切替える (画面のチラつき防止)。
// 含まれていなければ idx=0 にリセットして先頭問題を loadQuestion する。
function _qzInitFullPlaylist() {
  // 全カテゴリを ON
  ALL_CATS.forEach(function (c) { selectedCategories[c] = true; });
  // 現在の問題の jump key (cat + level + idx) を控えておく
  var prevKey = null;
  if (currentQ) {
    prevKey = (currentQ._cat || '') + '|' + (currentQ.level || '?') + '|' +
              (currentQ._idx != null ? currentQ._idx : '?');
  }
  // 全問固定順 playlist を構築
  playlist = buildDebugPlaylist();
  totalQuestions = playlist.length;
  correctCount = 0;
  // 現在問題の new index を探す
  var newIdx = -1;
  if (prevKey) {
    for (var i = 0; i < playlist.length; i++) {
      var q = playlist[i];
      var key = (q._cat || '') + '|' + (q.level || '?') + '|' +
                (q._idx != null ? q._idx : '?');
      if (key === prevKey) { newIdx = i; break; }
    }
  }
  if (newIdx >= 0) {
    // 滑らか切替: 同じ問題なので loadQuestion せず index だけ更新
    questionIdx = newIdx;
  } else {
    // 一致なし: 先頭にリセットして loadQuestion
    questionIdx = 0;
    if (playlist.length > 0) {
      try { loadQuestion(playlist[0]); } catch (_) {}
      try { _runPlateAndType(0); } catch (_) {}
    }
  }
}
try { window._qzInitFullPlaylist = _qzInitFullPlaylist; } catch (_) {}

(function _qzDebugInit() {
  if (!QZ_DEBUG_ALL) return;
  // body にクラス付与 → CSS でナビ表示
  document.body.classList.add('debug-mode');

  // タイトル / モード選択をスキップしてゲーム開始状態へ
  var startScr = document.getElementById('start-screen');
  var modeScr  = document.getElementById('mode-screen');
  if (startScr) startScr.classList.add('hidden');
  if (modeScr)  modeScr.classList.add('hidden');

  // 全カテゴリを ON にしておく (debug playlist は ALL_CATS から組むので念のため)
  ALL_CATS.forEach(function (c) { selectedCategories[c] = true; });

  // デバッグナビ + playtest panel DOM
  _qzBuildDebugNavDOM();
  _qzPtBuildPanel();

  // ゲーム初期化 → playlist が組まれる
  initGame();
  if (typeof initMenu === 'function') {
    try {
      initMenu({
        bgmToggle: function () { toggleBGM(); },
        tutorial: function () { alert('DEBUG: 全問プレイモード'); }
      });
    } catch (_) {}
  }

  // 初期化後に playlist が出揃ったので select を埋める
  _qzRefreshDebugJumpSelect();

  // メタ情報を初期同期
  updateDebugNav();

  // BGM は通常導線では start-screen クリック時に走るが、
  // debug 起動はそれをスキップするので、 ユーザー操作なしでは音は出ない (autoplay 制約)。
  // ステージタップで ensureAudio + startBGM を 1 回だけ起動するブートストラップを仕込む。
  var stageEl = document.getElementById('stage');
  if (stageEl) {
    var _qzBgmKick = function () {
      try { ensureAudio(); startBGM(); } catch (_) {}
      stageEl.removeEventListener('pointerdown', _qzBgmKick, true);
    };
    stageEl.addEventListener('pointerdown', _qzBgmKick, true);
  }
})();

// 安全策: 起動時に dot を 5 個レンダリング (loadQuestion でも更新される)
updateHUD();

})();
</script>
