// バルーンランダム選択 (連続で同じ画像を出さない)
let _lastBalloonIdx = -1;
function pickBalloonSrc() {
  let idx;
  do {
    idx = 1 + Math.floor(Math.random() * 6);  // 1-6
  } while (idx === _lastBalloonIdx);
  _lastBalloonIdx = idx;
  return '../assets/images/quizland/balloons/ballon_' + String(idx).padStart(2, '0') + '.png';
}
// ポノのポーズ (旧 ThinkingPono.mp4 動画から直接フレーム抽出 + chroma key で alpha化)
// ハッシュ比較でユニークな5ポーズだけ抽出 (各2秒ホールド) → 同じものを繋いで綺麗化
// 元動画と全く同じ動きを再現する flip-book アニメーション
const TRIVIA_POSES = [
  // think_v_02 / _03 は色味 (セピア寄り) が他と違うため除外
  'think_video/think_v_01.png',
  'think_video/think_v_04.png',
  'think_video/think_v_05.png',
];
const TRIVIA_POSE_INTERVAL_MS = 2000; // 2秒/枚 (元動画と同じ pacing)
let _triviaPoseInterval = null;
let _triviaPoseIdx = 0;

function startTriviaPoseAnimation(imgEl) {
  // ランダムな開始位置 → そこから順番にループ (flip-book)
  _triviaPoseIdx = Math.floor(Math.random() * TRIVIA_POSES.length);
  imgEl.src = '../assets/images/characters/pono/dance/' + TRIVIA_POSES[_triviaPoseIdx];

  if (_triviaPoseInterval) clearInterval(_triviaPoseInterval);
  _triviaPoseInterval = setInterval(function() {
    _triviaPoseIdx = (_triviaPoseIdx + 1) % TRIVIA_POSES.length;
    imgEl.src = '../assets/images/characters/pono/dance/' + TRIVIA_POSES[_triviaPoseIdx];
  }, TRIVIA_POSE_INTERVAL_MS);
}

function stopTriviaPoseAnimation() {
  if (_triviaPoseInterval) {
    clearInterval(_triviaPoseInterval);
    _triviaPoseInterval = null;
  }
}

// ═══════════════════════════════════════════════════════════
// Stage Pono (左下常駐): TRIVIA_POSES を流用した flip-book +
//   ランダム間隔の短いセリフ吹き出しサイクル。
//   loadQuestion で trivia 出題時は body.has-trivia-pono を付けて
//   CSS で自動非表示 (中央ポノとの重複回避)。
// ═══════════════════════════════════════════════════════════
// 吹き出しは PNG 焼き込み (ballon_01〜06) を pickBalloonSrc() で選ぶ。
// テキストは PNG に既に焼かれているので JS 側で文字列を持たない。
const STAGE_PONO_POSE_INTERVAL_MS = 3000; // 3秒/枚 (やや穏やか)
const STAGE_PONO_BUBBLE_SHOW_MS = 4000;   // 4秒表示
const STAGE_PONO_BUBBLE_MIN_GAP_MS = 10000; // 次の吹き出しまで 10〜25 秒
const STAGE_PONO_BUBBLE_MAX_GAP_MS = 25000;

let _stagePonoPoseInterval = null;
let _stagePonoPoseIdx = 0;
let _stagePonoBubbleTimer = null;
let _stagePonoBubbleHideTimer = null;
let _stagePonoStarted = false;

function _stagePonoScheduleBubble() {
  clearTimeout(_stagePonoBubbleTimer);
  const gap = STAGE_PONO_BUBBLE_MIN_GAP_MS
    + Math.random() * (STAGE_PONO_BUBBLE_MAX_GAP_MS - STAGE_PONO_BUBBLE_MIN_GAP_MS);
  _stagePonoBubbleTimer = setTimeout(function() {
    const bubble = document.getElementById('stage-pono-bubble');
    const bubbleImg = document.getElementById('stage-pono-bubble-img');
    if (!bubble) return;
    if (bubbleImg) bubbleImg.src = pickBalloonSrc();
    bubble.classList.add('show');
    clearTimeout(_stagePonoBubbleHideTimer);
    _stagePonoBubbleHideTimer = setTimeout(function() {
      bubble.classList.remove('show');
      _stagePonoScheduleBubble();
    }, STAGE_PONO_BUBBLE_SHOW_MS);
  }, gap);
}

function startStagePono() {
  if (_stagePonoStarted) return;
  const imgEl = document.getElementById('stage-pono-img');
  if (!imgEl) return;
  _stagePonoStarted = true;
  // flip-book: TRIVIA_POSES を流用
  _stagePonoPoseIdx = Math.floor(Math.random() * TRIVIA_POSES.length);
  imgEl.src = '../assets/images/characters/pono/dance/' + TRIVIA_POSES[_stagePonoPoseIdx];
  if (_stagePonoPoseInterval) clearInterval(_stagePonoPoseInterval);
  _stagePonoPoseInterval = setInterval(function() {
    _stagePonoPoseIdx = (_stagePonoPoseIdx + 1) % TRIVIA_POSES.length;
    imgEl.src = '../assets/images/characters/pono/dance/' + TRIVIA_POSES[_stagePonoPoseIdx];
  }, STAGE_PONO_POSE_INTERVAL_MS);
  _stagePonoScheduleBubble();
}

function stopStagePono() {
  _stagePonoStarted = false;
  if (_stagePonoPoseInterval) { clearInterval(_stagePonoPoseInterval); _stagePonoPoseInterval = null; }
  clearTimeout(_stagePonoBubbleTimer); _stagePonoBubbleTimer = null;
  clearTimeout(_stagePonoBubbleHideTimer); _stagePonoBubbleHideTimer = null;
  const bubble = document.getElementById('stage-pono-bubble');
  if (bubble) { bubble.classList.remove('show'); }
  const bubbleImg = document.getElementById('stage-pono-bubble-img');
  if (bubbleImg) { bubbleImg.removeAttribute('src'); }
}

function renderTrivia(stage, q) {
  const wrap = document.createElement('div');
  wrap.className = 'emoji-display trivia-display';

  // 質問時の画像。 img_word があればそれを優先 (正解後に img_answer にリビールするため
  // revealAnswer から #trivia-stage-img の src を差し替える)。 なければ既存の q.img。
  const initialImg = q.img_word || q.img;
  if (initialImg) {
    const imgEl = document.createElement('img');
    imgEl.id = 'trivia-stage-img';
    imgEl.className = 'emoji-main-img';
    imgEl.alt = '';
    const v = (window._imgCacheBust || '');
    const stagePath = '../assets/images/quizland/illust/stage/' + initialImg + (v ? '?v=' + v : '');
    const choicePath = '../assets/images/quizland/illust/choice/' + initialImg + (v ? '?v=' + v : '');
    imgEl.src = stagePath;
    imgEl.dataset.fallback = choicePath;
    imgEl.addEventListener('error', function once() {
      if (imgEl.dataset.fallback && imgEl.src !== imgEl.dataset.fallback) {
        const fb = imgEl.dataset.fallback;
        imgEl.dataset.fallback = '';
        imgEl.src = fb;
      }
    });
    wrap.appendChild(imgEl);
    stage.appendChild(wrap);

  }

  // フォールバック: img 未指定の trivia は従来どおりポノ + バルーン

  const pono = document.createElement('img');

// ═══════════════════════════════════════════════════════════
// Choices: preview/full の chip スタイル (4個固定 grid 2x2)
//   - order_color → chip[data-color] + circle + ラベル
//   - count_total → chip-count (大きい数字)
//   - その他       → chip + テキスト
// ═══════════════════════════════════════════════════════════
// 半角 ASCII 印字可能文字 (! 〜 ~) を全角 (FF01〜FF5E) に変換する render-time ヘルパー。
// data layer (questions.js) は半角のまま保持し、 表示時のみ全角化することで
// 「みぎから 2ばんめは…」の数字が日本語フォントの全角グリフで描画され、
// 周囲の かな/漢字 と字幅・字形が揃う。 半角 SPACE (0x20) は触らない
// (全角空白に変えるとレイアウト崩れの恐れがあるため)。
function toFullWidth(s) {
  if (typeof s !== 'string') return s;
  return s.replace(/[!-~]/g, function(ch) {
    return String.fromCharCode(ch.charCodeAt(0) + 0xFEE0);
  });
}
function chipSizeClass(text) {
  if (!text) return '';
  const len = String(text).length;
  if (len <= 5) return '';            // default (大きめ)
  if (len <= 10) return 'txt-medium'; // 中
  return 'txt-long';                  // 長文用に小さく
}
function renderChoices(q) {
  const tray = document.getElementById('answer-panel');
  tray.innerHTML = '';
  q.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.idx = i;
    btn.type = 'button';
    // chip 内の各要素 (circle / illust / label / count-num) はそれぞれ
    // 独立 resizable に登録 (QZ_RESIZABLE_SELECTORS) → editor で個別に
    // 位置・サイズ調整できる。 chip 外枠は別レイヤー。
    // 種別 class (chip-type-with-image / chip-type-text-only) は LayoutApplier の
    // __chip_presets 解決で使う (preset → 個別 chip|N の順で適用)。
    const hasImage = (q.type === 'order_color') ||
                     (choice && typeof choice === 'object' && choice.image);
    btn.classList.add(hasImage ? 'chip-type-with-image' : 'chip-type-text-only');
    if (q.type === 'order_color') {
      btn.dataset.color = choice;
      btn.classList.add('has-image'); // 丸 + ラベル のレイアウト
      // CSS gradient circle → watercolor PNG に切替 (あれば)
      // wrap (.circle) には base CSS で per-color gradient が当たっているので、
      // PNG が読めなければそのまま gradient が見える (= 自動 fallback)
      const wrap = document.createElement('div');
      wrap.className = 'circle';
      const img = document.createElement('img');
      img.src = '../assets/images/quizland/illust/choice/color_dot_' + choice + '.png';
      img.alt = '';
      img.draggable = false;
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.objectFit = 'contain';
      img.style.borderRadius = '50%';
      img.style.display = 'block';
      // PNG 不存在 (404) 時は img を消して、 wrap の CSS gradient を露出させる
      img.onerror = function() { img.remove(); };
      wrap.appendChild(img);
      btn.appendChild(wrap);
      const label = document.createElement('span');
      label.className = 'chip-label';
      label.textContent = toFullWidth(QUIZLAND_COLORS[choice].name);
      btn.appendChild(label);
    } else if (q.type === 'count_total') {
      btn.classList.add('chip-count');
      const num = document.createElement('span');
      num.className = 'chip-count-num';
      num.textContent = toFullWidth(String(choice));
      btn.appendChild(num);
    } else if (choice && typeof choice === 'object' && choice.image) {
      // 画像入り選択肢: { text: '...', image: '...png' }
      // 既存の choices: string[] と backward-compatible (object 形式のみ画像扱い)
      btn.classList.add('chip-with-image');
      const img = document.createElement('img');
      img.className = 'chip-illust';
      img.src = '../assets/images/quizland/illust/choice/' + choice.image;
      img.alt = '';
      img.draggable = false;
      btn.appendChild(img);
      if (choice.text) {
        const label = document.createElement('span');
        label.className = 'chip-illust-label chip-label';
        label.textContent = toFullWidth(choice.text);
        btn.appendChild(label);
        const sizeCls = chipSizeClass(choice.text);
        if (sizeCls) btn.classList.add(sizeCls);
      }
    } else {
      const text = (choice && typeof choice === 'object') ? choice.text : choice;
      const label = document.createElement('span');
      label.className = 'chip-label';
      label.textContent = toFullWidth(text);
      btn.appendChild(label);
      const sizeCls = chipSizeClass(text);
      if (sizeCls) btn.classList.add(sizeCls);
    }
    btn.addEventListener('pointerdown', function(e) {
      // layout-editor (?edit=1) 中は chip クリックで quiz を進行させない
      // (チップを掴んで動かしたいのに「答えた」と判定されて困る対策)。
      // v816: Playtest ON 時もエディタ選択を最優先にするため抑止に戻した。
      // editor + Playtest ON は「全問巡回 + コメント残し」が目的で、 答え判定は
      // 通常プレイ (?edit=1 を外して) で確認する運用に揃える。 問題遷移は
      // toolbar の ⏭ 次へ / debug nav (前へ・次へ・ジャンプ) で行う。
      if (document.body.classList.contains('layout-editor-on')) return;
      e.preventDefault();
      if (locked) return;
      onChoice(i, btn);
    });
    tray.appendChild(btn);
  });
  // 保存済みレイアウト (.chip|0..3, .chip .circle|0..3) を動的に再適用。
  // fetch がまだなら window._currentLayoutData が null で何も起きず、
  // LayoutSystem 初回 fetch 完了 → MutationObserver 経由で自動再適用される。
  if (window.LayoutApplier && window._currentLayoutData) {
    window.LayoutApplier.apply(
      window._currentLayoutData,
      document.getElementById('answer-panel'),
      { selectors: QZ_RESIZABLE_SELECTORS }
    );
  }
}

function loadQuestion(q) {
  currentQ = q;
  locked = false;
  document.getElementById('q-text').textContent = toFullWidth(q.q);
  const stage = document.getElementById('stage-area');
  stage.dataset.qtype = q.type;
  stage.innerHTML = '';
  switch (q.type) {
    case 'order_color': renderOrderColor(stage, q); break;
    case 'count_total': renderCountTotal(stage, q); break;
    case 'shape_name':  renderShapeName(stage, q); break;
    case 'emoji_name':  renderEmojiName(stage, q); break;
    case 'opposite':    renderOpposite(stage, q); break;
    case 'trivia':      renderTrivia(stage, q); break;
  }
  // trivia 中央ポノが居る間は左下ポノを CSS で隠す。 それ以外は左下ポノを起動。
  if (q.type === 'trivia') {
    document.body.classList.add('has-trivia-pono');
  } else {
    document.body.classList.remove('has-trivia-pono');
    startStagePono();
  }
  renderChoices(q);
  updateHUD();
  setupNarration(q);
  showProblemDialogue(q);
}

// ── Narration: 自動再生 or 🔊ボタンで問題文を読み上げ
function narrationKey(q, field) {
  if (!q || q._cat == null || q._idx == null) return null;
  return 'quizland:' + q._cat + ':' + q._idx + ':' + (field || 'q');
}
function setupNarration(q) {
  if (typeof Narration === 'undefined') return;
  const btn = document.getElementById('question-speaker');
  const key = narrationKey(q, 'q');
  if (!btn || !key) return;
  Narration.load().then(() => {
    const has = Narration.hasEntry(key);
    btn.style.display = (has && Narration.getMode() !== 'off') ? '' : 'none';
    btn.onclick = function(e) {
      if (document.body.classList.contains('layout-editor-on')) { e.preventDefault(); e.stopPropagation(); return; }
      e.preventDefault();
      Narration.play(key);
    };
    if (has) Narration.playIfAuto(key);
    const prefetchKeys = [];
    for (let i = 1; i <= 2; i++) {
      const nq = playlist[questionIdx + i];
      if (nq) {
        const k = narrationKey(nq, 'q');
        if (k) prefetchKeys.push(k);
      }
    }
    if (prefetchKeys.length) Narration.prefetch(prefetchKeys);
  });
}

function updateHUD() {
  document.getElementById('q-num').textContent = (questionIdx + 1);
  document.getElementById('q-total').textContent = totalQuestions;
  const prog = document.getElementById('hud-progress');
  prog.innerHTML = '';
  // デバッグ全問モードは 169 個ドットを並べると HUD が破綻するので、
  // 5 個に圧縮した擬似プログレスを表示する (現在位置を 0..4 にマッピング)。
  const dotCount = QZ_DEBUG_ALL ? DEFAULT_TOTAL_Q : totalQuestions;
  const currentDotIdx = QZ_DEBUG_ALL && totalQuestions > 0
    ? Math.min(dotCount - 1, Math.floor(questionIdx * dotCount / totalQuestions))
    : questionIdx;
  for (let i = 0; i < dotCount; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot';
    if (i < currentDotIdx) dot.classList.add('done');
    if (i === currentDotIdx) dot.classList.add('current');
    prog.appendChild(dot);
  }
  // デバッグナビ更新 (DOM があれば)
  if (typeof updateDebugNav === 'function') updateDebugNav();
}

// ═══════════════════════════════════════════════════════════
// Answer handling
// ═══════════════════════════════════════════════════════════
function onChoice(idx, btn) {
  // 自動ヒント (showProblemDialogue で 5 秒後にセット) が回答後に発火して
  // セリフを上書きしないように、最初に必ずキャンセルする
  clearTimeout(_autoHintTimer);
  if (locked) return;
  locked = true;
  // モバイルでも :active が反応しづらい場合に備え、明示的に押下表示を出す
  if (btn) {
    btn.classList.add('pressed');
    setTimeout(() => { btn.classList.remove('pressed'); }, 150);
  }
  ensureAudio();
  const correct = (idx === currentQ.answer);
  if (correct) {
    btn.classList.add('correct');
    playCorrect();
    // 「やったー！」の feedback は seikai スタンプで代替するので削除済 (2026-05-06)
    showCorrectDialogue();
    showSeikaiStamp();
    ponoJump();
    launchConfetti();
    correctCount++;
    if (window.incrementStat) window.incrementStat('quizland_correct', 1);
    // スタンプラリー: プレイ記録
    (function() {
      var k = 'pono_played_' + new Date().toDateString();
      var a = JSON.parse(localStorage.getItem(k) || '[]');
      if (a.indexOf('quizland') === -1) { a.push('quizland'); localStorage.setItem(k, JSON.stringify(a)); }
    })();
    // img_answer のとき: 正解絵リビール + 「つぎへ」ボタン (自動遷移しない)。
    // opposite は word テキストも反対語に切替。 trivia は detail があれば一緒に表示。
    if (currentQ.img_answer) {
      setTimeout(() => { revealAnswer(currentQ); }, 900);
      if (currentQ.detail) {
        setTimeout(() => {
          showDetailDialogue(currentQ.detail);
          if (typeof Narration !== 'undefined') {
            var dKey = narrationKey(currentQ, 'detail');
            if (dKey && Narration.hasEntry(dKey)) Narration.play(dKey);
          }
        }, 1500);
      }
      // 「つぎへ」は reveal + detail 表示完了後に出す
      setTimeout(() => { showNextButton(nextQuestion); }, currentQ.detail ? 2200 : 1500);
    } else if (currentQ.detail) {
      setTimeout(() => {
        showDetailDialogue(currentQ.detail);
        if (typeof Narration !== 'undefined') {
          var dKey = narrationKey(currentQ, 'detail');
          if (dKey && Narration.hasEntry(dKey)) Narration.play(dKey);
        }
      }, 1500);
      setTimeout(nextQuestion, 4500);
    } else {
      setTimeout(nextQuestion, 2000);
    }
  } else {
    btn.classList.add('wrong');
    btn.disabled = true;
    playWrong();
    showFeedback('もういっかい！', true);
    showWrongDialogue();
    // もう1回チャンス: 間違ったボタンだけ無効化、ロック解除して再選択可能
    locked = false;
  }
}

// 正解時の「せいかい！」スタンプを画面中央に一瞬出す。
//   onChoice の correct 分岐から呼ぶ。 1.5 秒後に自動で消える。
//   再表示 (連続正解) では reflow でアニメーションをリスタート。
function showSeikaiStamp() {
  const el = document.getElementById('seikai-stamp');
  if (!el) return;
  el.classList.remove('show');
  void el.offsetWidth; // force reflow to restart CSS transition
  el.classList.add('show');
  clearTimeout(showSeikaiStamp._timer);
  showSeikaiStamp._timer = setTimeout(() => el.classList.remove('show'), 1500);
}

function showFeedback(text, wrong) {
  const el = document.getElementById('feedback');
  el.textContent = text;
  el.style.color = wrong ? 'var(--danger)' : 'var(--success)';
  el.style.borderColor = wrong ? 'var(--danger)' : 'var(--success)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 700);
}

function ponoJump() {
  const av = document.getElementById('pono-avatar');
  if (!av) return;
  av.classList.remove('jump');
  void av.offsetWidth; // reflow
  av.classList.add('jump');
}

// editor の「次の問題へ」ボタン (common/layout/layout-editor.js) から呼べるよう window 公開
window.nextQuestion = nextQuestion;
function nextQuestion() {
  // debug mode: 未保存のコメント/スクショがあれば先に保存してから次へ進む。
  // _qzPtSaveCurrentNote は QZ_DEBUG_ALL=false / コメント空 + 添付なし / saving 中なら
  // 即 resolve するので、 通常モードでは透過 (オーバーヘッドほぼゼロ)。
  // 失敗時は localStorage に backup される & resolve するので遷移は止まらない。
  if (typeof _qzPtSaveCurrentNote === 'function' &&
      (QZ_DEBUG_ALL || isPlaytestInEditor())) {
    try {
      var p = _qzPtSaveCurrentNote();
      if (p && typeof p.then === 'function') {
        p.then(_doNextQuestion, _doNextQuestion);
        return;
      }
    } catch (_) { /* fall through to immediate transition */ }
  }
  _doNextQuestion();
}

function _doNextQuestion() {
  clearTimeout(_autoHintTimer);
  stopTriviaPoseAnimation(); // 前の質問のポーズ循環を必ず止める (interval リーク防止)
  questionIdx++;
  if (questionIdx >= totalQuestions) {
    // editor mode (?edit=1): リザルトモーダルは閉じる手段が無く編集を阻害するので
    // 表示せず先頭へループバックする (既存の editor ガード方針 chip pointerdown /
    // 吹き出しクリック / HUD ボタン等と同じパターン)。
    if (document.body.classList.contains('layout-editor-on')) {
      questionIdx = 0;
      loadQuestion(playlist[0]);
      try { console.log('[quizland editor] 全問完走 — 先頭に戻ります'); } catch (_) {}
      return;
    }
    showResult();
    return;
  }
  loadQuestion(playlist[questionIdx]);
}

function showResult() {
  clearTimeout(_autoHintTimer);
  stopTriviaPoseAnimation(); // 結果画面ではアニメーションを止める
  stopStagePono();           // 左下ポノも結果画面では停止
  showClearDialogue(correctCount, totalQuestions);
  const cleared = correctCount >= Math.ceil(totalQuestions * 0.7); // 70% 以上で clear
  // セッション完走 (5 問サイクル完了) を祝福する「ぜんぶ できたね！」スタンプ。
  // 正解率に関わらず常に表示 (= 完走の証)。 cleared/not の差は title テキストで表現。
  document.getElementById('result-icon').innerHTML =
    '<img src="../assets/images/quizland/stamps/zenbu_dekita.png" alt="" class="result-stamp-img">';
  document.getElementById('result-title').textContent = cleared ? 'クリア！' : 'もうちょっと！';
  document.getElementById('result-msg').textContent = cleared
    ? toFullWidth(String(totalQuestions)) + 'もんちゅう ' + toFullWidth(String(correctCount)) + 'もん せいかい！'
    : toFullWidth(String(totalQuestions)) + 'もんちゅう ' + toFullWidth(String(correctCount)) + 'もん せいかい。\nもういちど やってみよう！';
  document.getElementById('result-overlay').classList.remove('hidden');
  if (cleared) {
    if (window.incrementStat) window.incrementStat('quizland_clears', 1);
    playFanfare();
    launchConfetti();
    setTimeout(launchConfetti, 400);
    // First-clear 報酬 (PONO_MVP_NO_REWARDS=true 中は no-op)
    if (typeof window.triggerFirstClearReward === 'function') {
      try { window.triggerFirstClearReward('quizland'); } catch (e) {}
    }
  }
}

// HUD settings button → 共通メニューを開く
//   注意: 本ボタンの pointerdown を stopPropagation せずに dispatch すると、
//   元イベントが document の close-on-outside-tap リスナー (common/menu.js)
//   まで到達して、 開いたばかりのメニューを即閉じてしまう。 settings-btn は
//   menuToggle/dropdown の外にあるため target チェックで弾けない。 そのため
//   stopPropagation で元イベントの bubble を止める。 dispatch するイベントは
//   menuToggle 自身を target とする別物なので close-handler に弾かれない。
(function() {
  var settingsBtn = document.getElementById('hud-settings-btn');
  if (!settingsBtn) return;
  settingsBtn.addEventListener('pointerdown', function(e) {
    if (_isEditMode()) { e.preventDefault(); e.stopPropagation(); return; }
    e.preventDefault();
    e.stopPropagation();
    var menuToggle = document.querySelector('.pono-menu-toggle');
    if (menuToggle) {
      var evt = typeof PointerEvent === 'function'
        ? new PointerEvent('pointerdown', { bubbles: true, cancelable: true, pointerType: 'touch' })
        : new Event('pointerdown', { bubbles: true, cancelable: true });
      menuToggle.dispatchEvent(evt);
    }
  });
})();

function _qzDebugGoto(targetIdx) {

  // editor mode のとき、 旧仕様では `_isEditMode()` で全停止していたが
  // playtest mode 中は editor mode でも正常に動かしたいので、 editor mode + playtest OFF
  // のときだけ抑止する。
  if (!QZ_DEBUG_ALL && !isPlaytestInEditor()) return;
  if (_isEditMode() && !isPlaytestInEditor()) return;
  if (!playlist || playlist.length === 0) return;

  if (typeof stopTriviaPoseAnimation === 'function') stopTriviaPoseAnimation();
  questionIdx = idx;
  locked = false;
  loadQuestion(playlist[questionIdx]);

// Playtest note system (?debug=all 専用)
// 各問題に対してコメント+スクショを残し、 GitHub commit する。
// 通常ユーザーには露出しない (CSS は body.debug-mode のみ表示)。
// ═══════════════════════════════════════════════════════════
var QZ_PT = {
  GH_OWNER: 'NautilusDW',
  GH_REPO:  'pono-asobiba-app',
  GH_BRANCH: 'develop',
  NOTES_PATH: 'quizland/data/_review/playtest_notes.json',
  SHOTS_DIR:  'quizland/data/_review/playtest_screenshots',
  LS_BACKUP_KEY: 'pono_quizland_playtest_backup',
  MAX_PER_FILE: 500 * 1024,    // 500KB
  MAX_TOTAL:    2 * 1024 * 1024, // 2MB
  MAX_LONG_EDGE: 1200,
  JPEG_QUALITY: 0.7,
  shots: [],            // [{name, blob, dataUrl, b64, size, source}]
  saving: false,
  sessionStarted: null, // ISO timestamp
  html2canvasReady: null,
  binaryFallback: false, // true if a binary PUT failed → b64 in JSON
};

function _qzPtUtf8Btoa(s) { return btoa(unescape(encodeURIComponent(s))); }
function _qzPtAtouUtf8(b64) {
  try { return decodeURIComponent(escape(atob(b64))); } catch (_) { return ''; }
}
function _qzPtToast(msg, kind) {
  var el = document.getElementById('qz-pt-toast');
  if (!el) return;
  el.className = 'qz-pt-toast ' + (kind || 'info');
  el.textContent = msg;
  if (kind !== 'err') {
    setTimeout(function () {
      if (el.textContent === msg) { el.className = 'qz-pt-toast'; el.textContent = ''; }
    }, 3500);
  }
}

function _qzPtLoadHtml2canvas() {
  if (QZ_PT.html2canvasReady) return QZ_PT.html2canvasReady;
  if (typeof html2canvas !== 'undefined') {
    QZ_PT.html2canvasReady = Promise.resolve();
    return QZ_PT.html2canvasReady;
  }
  QZ_PT.html2canvasReady = new Promise(function (resolve, reject) {
    var s = document.createElement('script');
    s.src = '../assets/lib/html2canvas.min.js';
    s.onload = function () { resolve(); };
    s.onerror = function () { reject(new Error('html2canvas load failed')); };
    document.head.appendChild(s);
  });
  return QZ_PT.html2canvasReady;
}

// 任意の canvas/blob を JPEG に再エンコード + 長辺リサイズ
function _qzPtCanvasToCompressedJpeg(canvas) {
  var w = canvas.width, h = canvas.height;
  var max = QZ_PT.MAX_LONG_EDGE;
  var scale = Math.min(1, max / Math.max(w, h));
  var tw = Math.max(1, Math.round(w * scale));
  var th = Math.max(1, Math.round(h * scale));
  var out = document.createElement('canvas');
  out.width = tw; out.height = th;
  var ctx = out.getContext('2d');
  // JPEG は透明をサポートしないので白背景を敷く
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, tw, th);
  ctx.drawImage(canvas, 0, 0, tw, th);
  return new Promise(function (resolve) {
    out.toBlob(function (blob) {
      var fr = new FileReader();
      fr.onload = function () {
        var dataUrl = fr.result;
        var b64 = String(dataUrl).split(',')[1] || '';
        resolve({ blob: blob, dataUrl: dataUrl, b64: b64, size: blob.size });
      };
      fr.readAsDataURL(blob);
    }, 'image/jpeg', QZ_PT.JPEG_QUALITY);
  });
}

function _qzPtImageFileToCompressedJpeg(file) {
  return new Promise(function (resolve, reject) {
    var fr = new FileReader();
    fr.onload = function () {
      var img = new Image();
      img.onload = function () {
        var c = document.createElement('canvas');
        c.width = img.naturalWidth || img.width;
        c.height = img.naturalHeight || img.height;
        c.getContext('2d').drawImage(img, 0, 0);
        _qzPtCanvasToCompressedJpeg(c).then(resolve, reject);
      };
      img.onerror = function () { reject(new Error('image decode failed')); };
      img.src = fr.result;
    };
    fr.onerror = function () { reject(new Error('file read failed')); };
    fr.readAsDataURL(file);
  });
}

function _qzPtTotalBytes() {
  return QZ_PT.shots.reduce(function (a, s) { return a + (s.size || 0); }, 0);
}

function _qzPtAddShot(meta, source) {
  if (meta.size > QZ_PT.MAX_PER_FILE) {
    _qzPtToast('スクショ ' + Math.round(meta.size / 1024) + 'KB は1枚上限(500KB)を超えています', 'err');
    return false;
  }
  if (_qzPtTotalBytes() + meta.size > QZ_PT.MAX_TOTAL) {
    _qzPtToast('合計サイズ上限(2MB)を超えるため追加できません', 'err');
    return false;
  }
  var ts = Date.now();
  var idx = (currentQ && currentQ._idx != null) ? currentQ._idx : 'x';
  var name = idx + '_' + ts + '_' + (QZ_PT.shots.length + 1) + '.jpg';
  QZ_PT.shots.push({
    name: name, blob: meta.blob, dataUrl: meta.dataUrl, b64: meta.b64, size: meta.size, source: source || 'capture',
  });
  _qzPtRenderThumbs();
  return true;
}

function _qzPtRenderThumbs() {
  var wrap = document.getElementById('qz-pt-thumbs');
  var count = document.getElementById('qz-pt-count');
  if (!wrap) return;
  wrap.innerHTML = '';
  QZ_PT.shots.forEach(function (s, i) {
    var t = document.createElement('div');
    t.className = 'qz-pt-thumb';
    var img = document.createElement('img');
    img.src = s.dataUrl;
    img.alt = s.name;
    var rm = document.createElement('button');
    rm.type = 'button';
    rm.className = 'qz-pt-rm';
    rm.textContent = '×';
    rm.title = '削除';
    rm.addEventListener('click', function (e) {
      e.preventDefault(); e.stopPropagation();
      QZ_PT.shots.splice(i, 1);
      _qzPtRenderThumbs();
    });
    t.appendChild(img);
    t.appendChild(rm);
    wrap.appendChild(t);
  });
  if (count) {
    var bytes = _qzPtTotalBytes();
    count.textContent = '添付: ' + QZ_PT.shots.length +
      (QZ_PT.shots.length ? ' (' + Math.round(bytes / 1024) + 'KB)' : '');
  }
}

function _qzPtCaptureStage() {
  _qzPtToast('キャプチャ中…', 'info');
  return _qzPtLoadHtml2canvas().then(function () {
    var target = document.querySelector('.stage-wrap') || document.querySelector('.stage') || document.body;
    return html2canvas(target, {
      backgroundColor: '#ffffff',
      useCORS: true,
      allowTaint: false,
      logging: false,
      scale: Math.min(2, window.devicePixelRatio || 1),
    });
  }).then(function (canvas) {
    return _qzPtCanvasToCompressedJpeg(canvas);
  }).then(function (meta) {
    if (_qzPtAddShot(meta, 'auto')) {
      _qzPtToast('キャプチャ追加: ' + Math.round(meta.size / 1024) + 'KB', 'ok');
    }
  }).catch(function (err) {
    console.warn('[playtest] capture failed', err);
    _qzPtToast('キャプチャ失敗: ' + (err && err.message || err), 'err');
  });
}

function _qzPtAttachFiles(fileList) {
  var files = Array.prototype.slice.call(fileList || []);
  files = files.filter(function (f) { return /^image\//.test(f.type); });
  if (!files.length) return;
  Promise.all(files.map(function (f) {
    return _qzPtImageFileToCompressedJpeg(f).then(function (meta) {
      return _qzPtAddShot(meta, 'attach');
    }).catch(function (err) {
      console.warn('[playtest] file decode failed', err);
      _qzPtToast('画像読み込み失敗: ' + (err && err.message || err), 'err');
    });
  })).then(function () {
    _qzPtToast('添付しました', 'ok');
  });
}

// ── GitHub PUT helpers ─────────────────────────────────────
function _qzPtGhGet(path) {
  var url = '/api/gh/repos/' + QZ_PT.GH_OWNER + '/' + QZ_PT.GH_REPO +
            '/contents/' + encodeURI(path) + '?ref=' + QZ_PT.GH_BRANCH;
  return fetch(url, {
    method: 'GET',
    credentials: 'include',
    headers: { 'Accept': 'application/vnd.github+json' },
    cache: 'no-store',
  }).then(function (r) {
    if (r.status === 404) return null;
    if (!r.ok) throw new Error('GH GET ' + path + ' → ' + r.status);
    return r.json();
  });
}
function _qzPtGhPut(path, contentB64, message, sha) {
  var url = '/api/gh/repos/' + QZ_PT.GH_OWNER + '/' + QZ_PT.GH_REPO +
            '/contents/' + encodeURI(path);
  var body = { message: message, content: contentB64, branch: QZ_PT.GH_BRANCH };
  if (sha) body.sha = sha;
  return fetch(url, {
    method: 'PUT',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
    body: JSON.stringify(body),
  }).then(function (r) {
    if (!r.ok) {
      return r.text().then(function (txt) {
        var err = new Error('GH PUT ' + path + ' → ' + r.status + ' ' + txt.slice(0, 200));
        err.status = r.status;
        throw err;
      });
    }
    return r.json();
  });
}

// ── localStorage backup ─────────────────────────────────────
function _qzPtBackupAppend(noteEntry) {
  try {
    var raw = localStorage.getItem(QZ_PT.LS_BACKUP_KEY);
    var arr = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(arr)) arr = [];
    // Strip Blobs (cannot serialize) — keep b64 only for shots
    var lite = {
      idx: noteEntry.idx, category: noteEntry.category, level: noteEntry.level,
      type: noteEntry.type, q: noteEntry.q, comment: noteEntry.comment,
      noted_at: noteEntry.noted_at,
      screenshot_b64: (noteEntry._shotsMeta || []).map(function (s) {
        return { name: s.name, b64: s.b64.slice(0, 200000) };
      }),
    };
    arr.push(lite);
    localStorage.setItem(QZ_PT.LS_BACKUP_KEY, JSON.stringify(arr));
  } catch (e) { console.warn('[playtest] backup failed', e); }
}

// ── Save flow: 「次へ」押下時に呼ばれる ───────────────────
// 戻り値: Promise<bool>  (進行可なら resolve(true); ユーザー警告中なら false)
function _qzPtSaveCurrentNote() {
  // editor 内 playtest mode (QZ_PLAYTEST_IN_EDITOR) からも GitHub へ保存できるようにする
  if (!QZ_DEBUG_ALL && !isPlaytestInEditor()) return Promise.resolve(true);
  if (QZ_PT.saving) return Promise.resolve(false);
  var ta = document.getElementById('qz-pt-comment');
  var comment = (ta && ta.value || '').trim();
  var hasShots = QZ_PT.shots.length > 0;
  if (!comment && !hasShots) return Promise.resolve(true);

  if (!QZ_PT.sessionStarted) QZ_PT.sessionStarted = new Date().toISOString();
  QZ_PT.saving = true;
  _qzPtToast('保存中…', 'info');

  var noteEntry = {
    idx: currentQ && currentQ._idx != null ? currentQ._idx : null,
    category: currentQ && (currentQ.category || currentQ._cat) || null,
    level: currentQ && currentQ.level != null ? currentQ.level : null,
    type: currentQ && currentQ.type || null,
    q: currentQ && currentQ.q || null,
    comment: comment,
    screenshots: [],
    noted_at: new Date().toISOString(),
    _shotsMeta: QZ_PT.shots.slice(), // backup helper only
  };

  // 1. screenshot を個別 PUT。 失敗したら b64 fallback
  var shotsToUpload = QZ_PT.shots.slice();
  var uploadedPaths = [];
  var uploadChain = Promise.resolve();
  shotsToUpload.forEach(function (s) {
    uploadChain = uploadChain.then(function () {
      var path = QZ_PT.SHOTS_DIR + '/' + s.name;
      return _qzPtGhPut(path, s.b64, 'chore(playtest): screenshot ' + s.name)
        .then(function () { uploadedPaths.push(path); })
        .catch(function (err) {
          console.warn('[playtest] screenshot PUT failed → b64 fallback', err);
          QZ_PT.binaryFallback = true;
          uploadedPaths.push({ fallback_b64: s.b64, name: s.name, size: s.size });
        });
    });
  });

  return uploadChain.then(function () {
    noteEntry.screenshots = uploadedPaths;
    delete noteEntry._shotsMeta;

    // 2. notes JSON を読んで append → PUT
    return _qzPtGhGet(QZ_PT.NOTES_PATH).then(function (existing) {
      var doc = { session_started: QZ_PT.sessionStarted, notes: [] };
      var sha = null;
      if (existing) {
        sha = existing.sha;
        try {
          var parsed = JSON.parse(_qzPtAtouUtf8(existing.content.replace(/\s/g, '')));
          if (parsed && Array.isArray(parsed.notes)) doc = parsed;
          if (!doc.session_started) doc.session_started = QZ_PT.sessionStarted;
        } catch (_) { /* corrupt JSON → start fresh */ }
      }
      doc.notes.push({
        idx: noteEntry.idx,
        category: noteEntry.category,
        level: noteEntry.level,
        type: noteEntry.type,
        q: noteEntry.q,
        comment: noteEntry.comment,
        screenshots: noteEntry.screenshots,
        noted_at: noteEntry.noted_at,
      });
      var pretty = JSON.stringify(doc, null, 2);
      return _qzPtGhPut(QZ_PT.NOTES_PATH, _qzPtUtf8Btoa(pretty),
        'chore(playtest): note for #' + (noteEntry.idx != null ? noteEntry.idx : '?'), sha);
    });
  }).then(function () {
    _qzPtToast('保存しました ✓', 'ok');
    if (ta) ta.value = '';
    QZ_PT.shots = [];
    _qzPtRenderThumbs();
    QZ_PT.saving = false;
    return true;
  }).catch(function (err) {
    console.warn('[playtest] save failed', err);
    _qzPtBackupAppend(noteEntry);
    _qzPtToast('保存失敗 (localStorageにバックアップ): ' + (err && err.message || err), 'err');
    QZ_PT.saving = false;
    // 失敗時もユーザーは進めるが、 UI はクリアしない (再試行余地)
    return true;
  });
}

function _qzPtBuildPanel() {
  var panel = document.createElement('div');
  panel.id = 'qz-playtest-panel';
  panel.innerHTML =
    '<div class="qz-pt-label">コメント (任意)</div>' +
    '<textarea id="qz-pt-comment" placeholder="このイチゴの絵が潰れて見える..." rows="2"></textarea>' +
    '<div class="qz-pt-row">' +
      '<button type="button" class="qz-pt-btn" id="qz-pt-capture">📸 自動キャプチャ</button>' +
      '<button type="button" class="qz-pt-btn" id="qz-pt-attach-btn">📎 添付</button>' +
      '<input type="file" id="qz-pt-attach-input" accept="image/*" multiple>' +
      '<span class="qz-pt-count" id="qz-pt-count">添付: 0</span>' +
    '</div>' +
    '<div class="qz-pt-thumbs" id="qz-pt-thumbs"></div>' +
    '<div class="qz-pt-toast" id="qz-pt-toast"></div>';
  document.body.appendChild(panel);

  var ta = document.getElementById('qz-pt-comment');
  ta.addEventListener('paste', function (e) {
    var items = (e.clipboardData && e.clipboardData.items) || [];
    var found = false;
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      if (it.kind === 'file' && /^image\//.test(it.type)) {
        var f = it.getAsFile();
        if (f) {
          found = true;
          _qzPtImageFileToCompressedJpeg(f).then(function (meta) {
            if (_qzPtAddShot(meta, 'paste')) _qzPtToast('クリップボードから追加', 'ok');
          }).catch(function (err) {
            _qzPtToast('画像ペースト失敗: ' + (err && err.message || err), 'err');
          });
        }
      }
    }
    if (found) e.preventDefault();
  });

  document.getElementById('qz-pt-capture').addEventListener('click', function (e) {
    // editor mode 中でも playtest mode が ON なら通常通り動かす
    if (_isEditMode() && !isPlaytestInEditor()) { e.preventDefault(); e.stopPropagation(); return; }
    e.preventDefault();
    _qzPtCaptureStage();
  });
  var fileInput = document.getElementById('qz-pt-attach-input');
  document.getElementById('qz-pt-attach-btn').addEventListener('click', function (e) {
    if (_isEditMode() && !isPlaytestInEditor()) { e.preventDefault(); e.stopPropagation(); return; }
    e.preventDefault();
    fileInput.click();
  });
  fileInput.addEventListener('change', function () {
    _qzPtAttachFiles(fileInput.files);
    fileInput.value = '';
  });
}

// debug nav (前へ / メタ / ジャンプ select / 次へ) DOM を組み立てて handler を配線。
// QZ_DEBUG_ALL モードと editor 内 playtest mode の両方から呼ばれる共通関数。
// 二重構築を防ぐため、 既に存在していれば早期 return する。
function _qzBuildDebugNavDOM() {
  if (document.getElementById('qz-debug-nav')) return;
  var nav = document.createElement('div');
  nav.id = 'qz-debug-nav';
  nav.innerHTML =
    '<button type="button" id="qz-debug-prev" title="前の問題へ">← 前へ</button>' +
    '<span class="qz-dbg-meta" id="qz-debug-meta">(loading)</span>' +
    '<select id="qz-debug-jump" title="ジャンプ"></select>' +
    '<button type="button" id="qz-debug-next" title="次へ (コメント保存)">次へ →</button>';
  document.body.appendChild(nav);

  // ジャンプ select 項目: playlist が既に組まれているなら入れる、 まだなら空のまま。
  // editor 内 playtest mode で playtest UI を ON にしたタイミングではまだ playlist が
  // 空のことがあるため、 select は updateDebugNav 経由で必要に応じて再構築する。
  _qzRefreshDebugJumpSelect();

  document.getElementById('qz-debug-prev').addEventListener('click', function (e) {
    if (_isEditMode() && !isPlaytestInEditor()) { e.preventDefault(); e.stopPropagation(); return; }
    _qzPtSaveCurrentNote().then(function () {
      _qzDebugGoto(questionIdx - 1);
    });
  });
  document.getElementById('qz-debug-next').addEventListener('click', function (e) {
    if (_isEditMode() && !isPlaytestInEditor()) { e.preventDefault(); e.stopPropagation(); return; }
    _qzPtSaveCurrentNote().then(function () {
      _qzDebugGoto(questionIdx + 1);
    });
  });
}

function _qzRefreshDebugJumpSelect() {
  var sel = document.getElementById('qz-debug-jump');
  if (!sel || !playlist) return;
  // 既に options が入っていて項目数が一致していれば再構築不要
  if (sel.options && sel.options.length === playlist.length) return;
  // 一旦クリアして詰め直し
  while (sel.firstChild) sel.removeChild(sel.firstChild);
  var frag = document.createDocumentFragment();
  playlist.forEach(function (q, i) {
    var opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent =
      (i + 1) + '/' + playlist.length + ' ' + _qzCatLabel(q._cat) +
      ' Lv' + (q.level || '?') + ' #' + (q._idx != null ? q._idx : '?');
    frag.appendChild(opt);
  });
  sel.appendChild(frag);
  // change handler は重複登録を避けるためフラグで 1 回のみ
  if (!sel._qzWired) {
    sel._qzWired = true;
    sel.addEventListener('change', function () {
      if (_isEditMode() && !isPlaytestInEditor()) return;
      _qzPtSaveCurrentNote().then(function () {
        _qzDebugGoto(parseInt(sel.value, 10) || 0);
      });
    });
  }
}

// editor toolbar の toggle ハンドラから呼べるよう window 公開
try {
  window._qzPtBuildPanel = _qzPtBuildPanel;
  window._qzBuildDebugNavDOM = _qzBuildDebugNavDOM;
  window._qzRefreshDebugJumpSelect = _qzRefreshDebugJumpSelect;
  window.updateDebugNav = updateDebugNav;
} catch (_) {}

// editor 内 🧪 Playtest ON のときに、 全 169 問の playlist を構築し直す。
// ?debug=all で起動したときと同等の playlist 状態にするための共通関数。
// 現在表示中の問題と同じ問題が新 playlist に含まれていれば、 questionIdx を
// その index に更新するだけで再 loadQuestion せず滑らかに切替える (画面のチラつき防止)。
// 含まれていなければ idx=0 にリセットして先頭問題を loadQuestion する。
function _qzInitFullPlaylist() {
  // 全カテゴリを ON
  ALL_CATS.forEach(function (c) { selectedCategories[c] = true; });
  // 現在の問題の jump key (cat + level + idx) を控えておく
  var prevKey = null;
  if (currentQ) {
    prevKey = (currentQ._cat || '') + '|' + (currentQ.level || '?') + '|' +
              (currentQ._idx != null ? currentQ._idx : '?');
  }
  // 全問固定順 playlist を構築
  playlist = buildDebugPlaylist();
  totalQuestions = playlist.length;
  correctCount = 0;
  // 現在問題の new index を探す
  var newIdx = -1;
  if (prevKey) {
    for (var i = 0; i < playlist.length; i++) {
      var q = playlist[i];
      var key = (q._cat || '') + '|' + (q.level || '?') + '|' +
                (q._idx != null ? q._idx : '?');
      if (key === prevKey) { newIdx = i; break; }
    }
  }
  if (newIdx >= 0) {
    // 滑らか切替: 同じ問題なので loadQuestion せず index だけ更新
    questionIdx = newIdx;
  } else {
    // 一致なし: 先頭にリセットして loadQuestion
    questionIdx = 0;
    if (playlist.length > 0) {
      try { loadQuestion(playlist[0]); } catch (_) {}
    }
  }
}
try { window._qzInitFullPlaylist = _qzInitFullPlaylist; } catch (_) {}

(function _qzDebugInit() {
  if (!QZ_DEBUG_ALL) return;
  // body にクラス付与 → CSS でナビ表示
  document.body.classList.add('debug-mode');

  // タイトル / モード選択をスキップしてゲーム開始状態へ
  var startScr = document.getElementById('start-screen');
  var modeScr  = document.getElementById('mode-screen');
  if (startScr) startScr.classList.add('hidden');
  if (modeScr)  modeScr.classList.add('hidden');

  // 全カテゴリを ON にしておく (debug playlist は ALL_CATS から組むので念のため)
  ALL_CATS.forEach(function (c) { selectedCategories[c] = true; });

  // デバッグナビ + playtest panel DOM
  _qzBuildDebugNavDOM();
  _qzPtBuildPanel();

  // ゲーム初期化 → playlist が組まれる
  initGame();
  if (typeof initMenu === 'function') {
    try {
      initMenu({
        bgmToggle: function () { toggleBGM(); },
        tutorial: function () { alert('DEBUG: 全問プレイモード'); }
      });
    } catch (_) {}
  }

  // 初期化後に playlist が出揃ったので select を埋める
  _qzRefreshDebugJumpSelect();

  // メタ情報を初期同期
  updateDebugNav();

  // BGM は通常導線では start-screen クリック時に走るが、
  // debug 起動はそれをスキップするので、 ユーザー操作なしでは音は出ない (autoplay 制約)。
  // ステージタップで ensureAudio + startBGM を 1 回だけ起動するブートストラップを仕込む。
  var stageEl = document.getElementById('stage');
  if (stageEl) {
    var _qzBgmKick = function () {
      try { ensureAudio(); startBGM(); } catch (_) {}
      stageEl.removeEventListener('pointerdown', _qzBgmKick, true);
    };
    stageEl.addEventListener('pointerdown', _qzBgmKick, true);
  }
})();

// 安全策: 起動時に dot を 5 個レンダリング (loadQuestion でも更新される)
updateHUD();

})();
</script>
