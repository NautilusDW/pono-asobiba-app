/* ===== Opening Cinematic (op-*) ===== */
.op-cinematic {
  position: fixed; inset: 0; z-index: 300;
  background: #000;
  overflow: hidden;
  /* Fix 5d (rev 2026-05-07, character/dialogue 完全消失バグ修正):
     `.op-content` を `position: absolute + top/left:50% + translate(-50%,-50%) + scale(...)`
     で中央寄せしようとした旧実装は、複雑な複合 transform の解釈が一部環境
     (特にモバイル DevTools の狭ビューポート) で破綻し、キャラ slot とダイアログ
     box が viewport 外にレンダリングされて完全消失していた。
     エディタ (`tools/op-layout-editor.html`) は `#stage-wrap` を flex 中央寄せ
     コンテナにし、`.stage` を flex item として `transform: scale(...)` のみで
     縮小している (line 1736-1744 `rescaleStage()` 同等の構造)。
     本番もこの構造に揃え、`.op-cinematic` を flex centering コンテナにし、
     `.op-content` は `position:relative; flex:none; transform: scale(...)` のみで
     中央配置 + 縮小を行うシンプルな経路に切り替える。
     `.op-bg` / `.op-skip` は `position:absolute` で flex フローから独立しており、
     flex の中央寄せには干渉しない。 */
  display: flex;
  align-items: center;
  justify-content: center;
  /* Hard cut from mode-screen: overlay is always fully opaque black.
     Only the inner .op-bg fades in (see below). */
  opacity: 1;
}
.op-cinematic.hidden { display: none; }
.op-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  transform: scale(1.0);
  transform-origin: center;
  will-change: transform;
  /* Cross-fade from black: bg starts invisible, fades in once .is-revealed is added. */
  opacity: 0;
  /* Panel 2 入室演出 (2026-05-07): 部屋に入った最初のカットは sharp 表示 → 2s 後に
     blur をフェードイン。 .is-static-blur 追加時に filter / transform が滑らかに
     遷移するよう、base 側で filter / transform にも transition を効かせる。
     opacity の 0.7s は既存の cross-fade 用 (is-revealed) のまま維持。 */
  transition: opacity 0.7s ease-out, filter 0.6s ease-out, transform 0.6s ease-out;
}
.op-bg.is-revealed {
  opacity: 1;
}
@keyframes opDolly {
  from { transform: scale(1.0); }
  to   { transform: scale(1.12); }
}
.op-bg.dollying {
  animation: opDolly 12s linear forwards;
}
.op-bg.scenic-blur {
  animation: none;                       /* override the dolly keyframes */
  transform: scale(1.18);                /* telephoto crop-in */
  filter: blur(6px) saturate(0.92);      /* soft DoF, slightly muted */
  transition: transform 0.6s ease-out, filter 0.6s ease-out;
}
/* Fix 4: シネマティック全体で固定のぼかしを 1 枚だけ適用する (10px → 5px に緩和) */
.op-bg.is-static-blur {
  animation: none;
  transform: scale(1.08);
  filter: blur(5px) saturate(0.9) brightness(0.94);
}
/* Fix 5c (rev 2026-05-07, mobile DevTools 修正):
   エディタ (`tools/op-layout-editor.html`) は `.stage` を VC ごとに固定実寸
   (B 1024×768 / C 1920×1080 / D 2560×1080) にし、`#stage-wrap` に
   `transform: scale(min(availW/w, availH/h, 1))` を JS で設定して
   ビューポートにフィットさせている (line 1736-1744 `rescaleStage()`)。
   旧本番実装は `width: min(100vw, …)` + `aspect-ratio` でレターボックスは
   していたが、内部の絶対 px 値 (slot 1481px / box 1719px 等) はそのまま
   実 px で描画されるため、モバイル DevTools (例: 844×390) のような狭い
   ビューポートではキャラ・吹き出しが viewport を遥かに超えて巨大化していた。
   修正後は editor と完全に同じ「固定実寸 + transform: scale」方式に統一し、
   JS を使わず純 CSS (top/left:50% + translate(-50%,-50%) + scale(min(…))) で
   ビューポートに収める。各 VC ごとの実寸 / scale 計算は下方の @media ブロックで
   定義する (B/C/D)。 */
.op-content {
  /* Fix 5d: `.op-cinematic` を flex centering コンテナにしたので、
     `.op-content` は flex item として配置されるだけで自動的に中央に来る。
     position は relative、flex: none で flex 軸の伸縮を抑止し、
     transform は scale (縮小フィット) のみ。translate は使わない。
     Fix 5e (2026-05-07, transform: scale 構文無効化バグ修正):
     `transform: scale(min(calc(100vw/W), calc(100vh/H)))` は
     `min(<length>, <length>)` が length を返すため scale() の number 期待と
     一致せず、CSS パーサが transform 全体を invalid と判定して scale=1 が
     適用されていた。4:3 では .op-content の固定実寸 (1024×768) が viewport
     と偶然一致するので scale 不要で動いていたが、16:9 / 21:9 では .op-content
     (1920×1080 / 2560×1080) が viewport を超えて中央切り抜きしか見えなかった。
     対策: CSS から transform: scale の calc を撤去し、JS (rescaleOpContent)
     で width/height/transform を動的計算・適用する。CSS の @media にあった
     .op-content の width/height/transform 行も削除して、すべて JS 一本化。
     ここではフォールバック値のみ scale(1) で残す (JS が無効でも要素は出る)。 */
  position: relative;
  flex: none;
  transform-origin: center center;
  transform: scale(1);
  pointer-events: none;     /* スキップボタンの裏側は素通しにし、子要素だけ受ける */
}
.op-content > * {
  pointer-events: auto;
}
/* Single Box モード採用 (2026-05-07): per-side Box (.op-dialogue-pono / -hakase) は
   廃止し、画面下部に単一の `.op-dialogue-single` を置く。
   左右の `.op-side` は editor と同じ flex 1:1 で 50% ずつ占有させ、
   `.op-char-slot` の `top:50%/left:50%` がそれぞれの side 中央を起点になるようにする。 */
.op-sides {
  position: absolute;
  inset: 0;
  /* editor (tools/op-layout-editor.html) と同じ display: flex を採用。
     これにより .op-side-pono / .op-side-hakase が左右 50% ずつに分かれ、
     .op-char-slot の中央基点 (top:50%/left:50%) が「side の中央」=
     「stage 左 25% / 右 75%」 になる。block では両 side が stage 全面に
     重なり、両キャラとも stage 中央に重なってしまう。 */
  display: flex;
  pointer-events: none;
}
.op-sides.hidden { display: none; }
.op-sides > .op-side {
  /* editor 側と同じ flex: 1 + position: relative。inset:0 全画面にすると
     editor の絶対 px 座標が片側ぶんではなく全画面起点になり破綻する。 */
  flex: 1;
  position: relative;
  pointer-events: none;
}
/* slot は Single Box モードで使用するキャラ配置の基本 box。editor 出力の
   transform (translate(calc(-50% + Xpx), calc(-50% + Ypx))) で上から覆う。
   editor の `.op-char-slot` には display:flex / overflow:hidden は無く、
   img 側の object-fit: contain だけで内側にハマる設計なので production も合わせる。 */
.op-char-slot {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.op-char-slot img.op-char {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: bottom center;
  display: block;
  pointer-events: none;
}
.op-side-hakase .op-char-slot img.op-char {
  filter: drop-shadow(0 10px 22px rgba(0,0,0,0.45));
}
/* くるみちゃん (2026-05-11): pono/hakase 2 サイド分割を壊さないよう
   absolute オーバーレイで右側に重ねる。 既定で .hidden、JS が is-visible で表示。
   slot 中央基点 (top:50%/left:50%) は per-VC @media で個別調整。
   2026-05-11 (Reviewer A MEDIUM-1): `.op-sides > .op-side { flex: 1 }` (specificity 0,2,0)
   に確実に勝つよう、 `.op-sides > .op-side.op-side-overlay` セレクタで宣言する
   (specificity 0,3,0)。 */
.op-sides > .op-side.op-side-overlay {
  position: absolute;
  inset: 0;
  flex: none;
  pointer-events: none;
}
.op-side-kurumi.hidden { display: none; }
.op-side-kurumi { opacity: 0; transition: opacity 0.25s ease-out; }
.op-side-kurumi.is-visible { opacity: 1; }
.op-side-kurumi .op-char-slot img.op-char {
  filter: drop-shadow(0 8px 18px rgba(0,0,0,0.40));
}
/* Single Box モード時は per-side Box は DOM 上削除済みだが、念のため非表示。 */
.op-side > .op-dialogue.op-dialogue-pono,
.op-side > .op-dialogue.op-dialogue-hakase {
  display: none;
}
/* Single Box: 画面中央寄せ + 背景画像枠。エディタが書き出す width/height/top/font-size を
   各 @media ブロックで上書きする。 */
.single-box-wrapper {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.op-dialogue-single {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  /* Fix 5c-2 (mobile 中央配置欠落): エディタ (op-layout-editor.html line 449-460) の
     `.op-dialogue-single` は flex centering で中身 (op-dialogue-text) を縦横中央に
     置いている。本番にこの 3 行が欠けていたため、テキストが左上 (HTML 自然フロー)
     に張り付いていた。エディタと 1:1 で揃える。 */
  display: flex;
  align-items: center;
  justify-content: center;
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-color: transparent;
  color: #3a2a14;
  box-sizing: border-box;
  overflow-y: auto;
  pointer-events: auto;
}
.op-dialogue-single .op-dialogue-label {
  /* Restored (2026-05-08): ユーザー判断「ラベルは色が違った方がわかりやすい」を反映。
     直前のコミット (editor 準拠の半透明黒 chip) ではなく、その前のキャラ別 chip
     (緑=ポノ / オレンジ=博士) に戻す。位置 (top/bottom/left/right) と font-size は
     per-VC @media が上書きするので、ここはフォールバックのみ。
     speaker 切替時には JS が `.is-pono` / `.is-hakase` を toggle して背景を上書きする。 */
  position: absolute;
  bottom: 16px;
  left: 24px;
  z-index: 2;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  padding: 8px 20px;
  border-radius: 999px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.30);
  letter-spacing: 0.04em;
  background: #5fa05a; /* default: pono — JS で speaker 切替時に上書き */
}
.op-dialogue-single.is-hakase .op-dialogue-label { background: #e08a3c; }
.op-dialogue-single.is-pono   .op-dialogue-label { background: #5fa05a; }
.op-dialogue-single.is-kurumi .op-dialogue-label { background: #c46a4a; } /* リスのくるみ: 茶色寄りオレンジ */
.op-dialogue-single .op-dialogue-text {
  font-size: 22px;
  line-height: 1.5;
  min-height: 1.6em;
  word-break: break-word;
  /* Fix 5c-2: エディタ側 (line 464-473) と同じく複数行テキストも中央寄せ。 */
  text-align: center;
  /* Added (2026-05-08): シナリオ textarea で入力した \n をそのまま改行として
     反映。 _opTypeInto の `el.textContent += c` で \n が入った時点で
     `pre-wrap` が改行 + 折り返しを両立してくれる。 */
  white-space: pre-wrap;
  /* Added (2026-05-08): ユーザー要望「会話文。そっちも太字にしてほしい」に対応。
     ナレーション (.op-narration) と同じく bold で表示する。 */
  font-weight: bold;
}
.op-narration {
  /* Fix (2026-05-07, narration not visible on non-4:3): font-size を `vw` ベース
     にしていたせいで、`.op-content` が `transform: scale(...)` で縮小される非 4:3
     ビューポート (例: 915×412 / aspect 2.22 → D block で scale ≒ 0.36) では、
     viewport 基準の vw 値が再度 0.36 倍されて実効 9〜10px まで縮み、テキストが
     読めない / 見えない状態だった。
     `.op-content` 自身が VC ごとの実寸 (B 1024×768 / C 1920×1080 / D 2560×1080)
     に固定されており scale でフィットさせるため、内側の font-size / width も
     vw ではなく「論理 px」(pre-scale px) で書く必要がある。
     ここではフォールバック値のみ置き、各 @media VC ブロックで上書きする。 */
  position: absolute;
  left: 50%;
  bottom: 80px;
  transform: translateX(-50%);
  width: 1200px;
  max-width: calc(100% - 64px);
  margin: 0 auto;
  background: #fff8e7;
  border-radius: 18px;
  padding: 24px 32px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.35), 0 0 0 2px rgba(120,80,30,0.18) inset;
  color: #3a2a14;
  font-size: 36px;
  font-weight: bold;
  line-height: 1.55;
  text-align: center;
  opacity: 1;
  transition: opacity 0.5s ease-out;
  box-sizing: border-box;
}
.op-narration.hidden { display: none; }
.op-narration p { margin: 0.25em 0; }
.op-narration p.emphasis { color: #c0392b; font-weight: 700; }
/* Added (2026-05-08): ナレーションも textarea \n をそのまま改行として反映。 */
.op-narration { white-space: pre-wrap; }
.op-narration.seg-show { opacity: 1; }
.op-narration.seg-hide { opacity: 0; }
/* per-side Box の旧ルールは Single Box モード採用に伴い廃止 (DOM からも削除済み)。
   .op-dialogue-single の本体は上の Single Box ブロック + 各 @media のエディタ出力で定義。 */
.op-skip {
  position: absolute;
  top: 16px; right: 20px;
  min-width: 64px;
  min-height: 44px;
  padding: 10px 16px;
  border: 1px solid rgba(255,255,255,0.55);
  border-radius: 10px;
  background: rgba(0,0,0,0.18);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
}
.op-skip:hover, .op-skip:focus {
  background: rgba(0,0,0,0.55);
  outline: none;
}
/* layout-editor (?edit=1) 中も OP スキップボタンを必ずタップできるようにする。
   `.le-toolbar` (z-index: 1000) や `.le-list-panel` 等が右上に居座って
   `.op-skip` (`.op-cinematic` z-index: 300 配下) を覆うため、
   editor mode のときだけ z-index を toolbar 群より上に引き上げ、
   pointer-events と表示も強制 visible に固定する。
   位置は `top` を少し下げて toolbar (高さ ~36-40px) との被りを避ける。 */
body.layout-editor-on .op-skip {
  z-index: 9999 !important;
  pointer-events: auto !important;
  display: block !important;
  visibility: visible !important;
  top: 56px !important;       /* toolbar 高 + 余白で確実に下に逃がす */
  right: 20px !important;
  background: rgba(220, 60, 60, 0.85) !important;
  border-color: rgba(255, 200, 200, 0.85) !important;
}

/* ===== Tap-to-advance hint (2026-05-08) =====
   typing 完了後に「タップしてつづける ▶」を画面下中央付近にフェードイン。
   - 全パネル共通の単一要素 (#op-tap-hint) として運用する。
   - .op-content の transform: scale で縮小される論理 px 系に乗せる
     (narration / dialogue 系と同じく pre-scale 値で書く)。
   - 矢印 (▶) を控えめに点滅させて視認性を上げる (1.5s 周期)。
   - pointer-events は auto にして、タップを直接拾えるようにする
     (実際の進行ロジックは #op-cinematic の親リスナで処理)。 */
.op-tap-hint {
  position: absolute;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%);
  z-index: 5;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: #fff8e7;
  text-shadow: 0 2px 8px rgba(0,0,0,0.65), 0 0 12px rgba(0,0,0,0.45);
  letter-spacing: 0.08em;
  padding: 10px 22px;
  background: rgba(0,0,0,0.32);
  border-radius: 999px;
  pointer-events: auto;
  opacity: 0;
  transition: opacity 0.4s ease-out;
  white-space: nowrap;
  user-select: none;
}
.op-tap-hint.is-visible { opacity: 1; }
.op-tap-hint.hidden { display: none; }
.op-tap-hint .op-tap-hint-arrow {
  display: inline-block;
  margin-left: 0.25em;
  animation: opTapHintBlink 1.5s ease-in-out infinite;
}
@keyframes opTapHintBlink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.5; }
}
/* per-VC font-size 微調整 (画面幅に応じて読みやすく) */
@media (min-aspect-ratio: 85/100) and (max-aspect-ratio: 14/10) {
  .op-tap-hint { font-size: 26px; bottom: 20px; }
}
@media (min-aspect-ratio: 14/10) and (max-aspect-ratio: 19/10) {
  .op-tap-hint { font-size: 36px; bottom: 28px; }
}
@media (min-aspect-ratio: 19/10) {
  .op-tap-hint { font-size: 38px; bottom: 28px; }
}

const RARE_PRAISE_CHANCE = 0.1;
const CONSECUTIVE_MISS_THRESHOLD = 2;
const HINT_AUTO_DELAY_MS = 5000;

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// セリフ管理状態
let _consecutiveMisses = 0;
let _hintLevel = 0;  // 0 = 問題表示時, 1 = ヒント1, 2 = ヒント2
let _autoHintTimer = null;

// ゲーム中のフクロウ博士のセリフ (問題文 / ヒント / 正解・不正解の感想等) は
// 即時表示する。タイプライタ + babble ボイスはオープニング・シネマティック専用
// (_opTypeInto / _opTypingToken 経由) として残す。ここで cancelAll を呼ぶのは、
// 直前のシネマティックから残ったままの babble があれば確実に止めるため。
function setHakaseDialogue(text) {
  const el = document.getElementById('char-hint-text');
  if (!el) return;
  try { if (window.PonoBabble && typeof window.PonoBabble.cancelAll === 'function') window.PonoBabble.cancelAll(); } catch (e) {}
  el.textContent = (text == null) ? '' : String(text);
}

function showProblemDialogue(question) {
  _hintLevel = 0;
  const cat = (question && (question.category || question._cat || question.type)) || null;
  // 50% でカテゴリ別、50% で general (バリエーション増加)
  const text = (cat && Math.random() < 0.5 && HAKASE_DIALOGUE.problem.byCategory[cat])
    ? HAKASE_DIALOGUE.problem.byCategory[cat]
    : pickRandom(HAKASE_DIALOGUE.problem.general);
  setHakaseDialogue(text);
  // 自動ヒントは廃止 (汎用文がカテゴリと噛み合わず混乱を招くため)。
  // ユーザーが吹き出しをタップしたらカテゴリ別ヒント2へ進む。
  clearTimeout(_autoHintTimer);
  _autoHintTimer = null;
}

function showHint1() {
  _hintLevel = 1;
  setHakaseDialogue(pickRandom(HAKASE_DIALOGUE.hint1));
  playHintSe();
}

function showHint2(question) {
  _hintLevel = 2;
  playHintSe();
  if (question && question.hint) {
    setHakaseDialogue(question.hint);
    return;
  }
  // カテゴリ別フォールバック
  const cat = question && (question.category || question._cat || question.type);
  const pool = (cat && HAKASE_DIALOGUE.hint2FallbackByCategory[cat])
            || HAKASE_DIALOGUE.hint2FallbackGeneric;
  setHakaseDialogue(pickRandom(pool));
}

function showCorrectDialogue() {
  _consecutiveMisses = 0;
  const useRare = Math.random() < RARE_PRAISE_CHANCE;
  const text = useRare
    ? pickRandom(HAKASE_DIALOGUE.rarePraise)
    : pickRandom(HAKASE_DIALOGUE.correct);
  setHakaseDialogue(text);
}

function showDetailDialogue(detail) {
  if (!detail) return;
  const intro = pickRandom(HAKASE_DETAIL_INTROS);
  setHakaseDialogue(intro + detail);
}

function showWrongDialogue() {
  _consecutiveMisses++;
  const text = _consecutiveMisses >= CONSECUTIVE_MISS_THRESHOLD
    ? pickRandom(HAKASE_DIALOGUE.consecutiveMiss)
    : pickRandom(HAKASE_DIALOGUE.wrong);
  setHakaseDialogue(text);
}

function showClearDialogue(correctCnt, totalCnt) {
  const ratio = totalCnt > 0 ? (correctCnt / totalCnt) : 0;
  let pool;
  if (ratio === 1)        pool = HAKASE_DIALOGUE.clear.perfect;
  else if (ratio >= 0.8)  pool = HAKASE_DIALOGUE.clear.good;
  else if (ratio >= 0.6)  pool = HAKASE_DIALOGUE.clear.okay;
  else                    pool = HAKASE_DIALOGUE.clear.tryAgain;
  setHakaseDialogue(pickRandom(pool));
}

// ═══════════════════════════════════════════════════════════
// Stage auto-fit (cover-fit / play.html と同じ Math.max ロジック)
// --------------------------------------------------------------
// 旧実装は Math.min (contain) だったため iPad 4:3 / iPhone 19.5:9 で
// 大きなレターボックス黒帯が発生していた。 Math.max (cover-fit) に
// 切り替えて viewport を完全に埋め、 上下/左右にあふれる canvas 端
// (sheet-on の装飾領域) のみクリップされるようにする。
// 16:9 より縦長の viewport では safe-area が画面外にこぼれないよう、
// CSS 側の max-aspect-ratio メディアクエリで --safe-w を visible slice
// 内に詰めてある (お知らせ/せってい/回答チップ/キャラはすべて safe-area
// 内に収まる)。
// ═══════════════════════════════════════════════════════════
const stageEl = document.getElementById('stage');

// fit-mode 判定 (URL ?fit=contain または localStorage.pono_fit_mode === 'contain' で
// contain (Math.min, 黒帯あり) に切替。 デフォルトは cover (Math.max, 現状維持)。
// 判定はマウント時 1 回のみ確定する (resize で揺れないように)。
const _qzUrlParams = (function () {
  try { return new URLSearchParams(window.location.search); } catch (_) { return null; }
})();
const _qzFitFromUrl = _qzUrlParams && _qzUrlParams.get('fit');
const _qzFitFromLS = (function () {
  try { return localStorage.getItem('pono_fit_mode'); } catch (_) { return null; }
})();
const QZ_FIT_MODE = (_qzFitFromUrl === 'contain' || _qzFitFromLS === 'contain') ? 'contain' : 'cover';

function fitStage() {
  const w = window.innerWidth, h = window.innerHeight;
  const stageW = parseFloat(getComputedStyle(stageEl).width);
  const stageH = parseFloat(getComputedStyle(stageEl).height);
  if (!stageW || !stageH) return;
  // aspect class toggle: viewport 比率に応じて body にクラスを付け、
  // Team-1/2 のメディアクエリより細かい上書きを将来できる保険ルートを提供。
  // 1.55 を境に narrow (< 1.55, 4:3～5:4 寄り) / wide (>= 1.55, 16:9 寄り) を分ける。
  const aspect = h > 0 ? (w / h) : 0;
  const _body = document.body;
  if (_body) {
    if (aspect > 0 && aspect < 1.55) {
      _body.classList.add('aspect-narrow');
      _body.classList.remove('aspect-wide');
    } else {
      _body.classList.add('aspect-wide');
      _body.classList.remove('aspect-narrow');
    }
  }
  // fit-mode: cover (Math.max, デフォルト) は片軸ぴったりでもう片方を clip。
  //           contain (Math.min) は両軸が viewport 内に収まり、余白に黒帯が出る。
  const scale = (QZ_FIT_MODE === 'contain')
    ? Math.min(w / stageW, h / stageH)
    : Math.max(w / stageW, h / stageH);
  const scaledW = stageW * scale;
  const scaledH = stageH * scale;
  const offsetX = (w - scaledW) / 2;  // 横はみ出しは中央寄せで両側均等にクリップ
  const offsetY = (h - scaledH) / 2;  // 縦も同様 (普通は 0 か正、片方軸はぴったり)
  stageEl.style.transformOrigin = '0 0';
  stageEl.style.transform = 'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + scale + ')';
  // diag ハーネス用ラベル更新 (?diag=1 のときのみ DOM が存在する)。
  if (typeof _qzUpdateDiagLabel === 'function') _qzUpdateDiagLabel(w, h, aspect);
}
window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', function () { setTimeout(fitStage, 100); });
document.addEventListener('visibilitychange', function () {
  if (!document.hidden) fitStage();
});

// ══════════════════════════════════════════════════════════
// 検証ハーネス (?diag=1)
// --------------------------------------------------------------
// URL に ?diag=1 が付いているときのみ、 visible slice (赤 outline) と
// safe-area (青 outline) を可視化し、左上に viewport / aspect / safe-w を表示。
// パラメータが無い本番ロードでは <style> も DOM も一切 inject されない。
// ══════════════════════════════════════════════════════════
let _qzUpdateDiagLabel = null;
(function _qzInitDiag() {
  const diagOn = !!(_qzUrlParams && _qzUrlParams.get('diag') === '1');
  if (!diagOn) return; // production noise ゼロ
  document.body.classList.add('diag-on');
  // 動的 <style> 注入: visible slice と safe-area の outline。
  const style = document.createElement('style');
  style.setAttribute('data-qz-diag', '1');
  style.textContent = [
    'body.diag-on .stage { position: relative; }',
    'body.diag-on .stage::before {',
    '  content: ""; position: absolute; inset: 0; pointer-events: none;',
    '  outline: 1px solid rgba(255,32,32,0.9); outline-offset: -1px; z-index: 99998;',
    '}',
    'body.diag-on .safe-area { position: relative; }',
    'body.diag-on .safe-area::before {',
    '  content: ""; position: absolute; inset: 0; pointer-events: none;',
    '  outline: 1px solid rgba(32,128,255,0.9); outline-offset: -1px; z-index: 99998;',
    '}',
    'body.diag-on .qz-diag-label {',
    '  position: fixed; top: 6px; left: 6px; z-index: 99999;',
    '  font: 12px/1.4 ui-monospace, Menlo, Consolas, monospace;',
    '  color: #fff; background: rgba(0,0,0,0.72); padding: 4px 8px;',
    '  border-radius: 4px; pointer-events: none; white-space: pre;',
    '}'
  ].join('\n');
  document.head.appendChild(style);
  // 左上の固定ラベル
  const label = document.createElement('div');
  label.className = 'qz-diag-label';
  label.setAttribute('aria-hidden', 'true');
  document.body.appendChild(label);
  _qzUpdateDiagLabel = function (w, h, aspect) {
    let safeW = '?';
    try {
      const safeEl = document.getElementById('safe-area');
      if (safeEl) safeW = Math.round(parseFloat(getComputedStyle(safeEl).width)) + '';
    } catch (_) { /* noop */ }
    label.textContent =
      'viewport: ' + w + '×' + h + '\n' +
      'aspect:   ' + (aspect ? aspect.toFixed(3) : '?') + '\n' +
      'safe-w:   ' + safeW + '\n' +
      'fit-mode: ' + QZ_FIT_MODE;
  };
})();

fitStage();

/* per-Q layout (Phase 2 / impl-B) ─────────────────────────────────────
   問題ごとにステージ絵 (.emoji-display / .emoji-main-img) のレイアウトを
   独立保存するためのキー生成。 saved-layout.json の per-Q キー命名は
   `${sel}|${i}@${qid}` (例 `.emoji-display|0@body_lv1_002`)。
   qid 形式は `${cat}_lv${level}_${pad3(idx)}`。
   q._cat / q._idx / q.level のいずれかが欠損していれば null を返す
   (= per-Q キー lookup を skip し base key のみ参照)。 */
function formatQuizQid(q) {
  if (!q) return null;
  var cat = q._cat;
  var lv  = q.level;
  var idx = q._idx;
  if (cat == null || lv == null || idx == null) return null;
  var n = parseInt(idx, 10);
  if (isNaN(n) || n < 0) return null;
  var padded = ('00' + n).slice(-3);
  return cat + '_lv' + lv + '_' + padded;
}
// LayoutSystem / LayoutApplier から毎回呼ばれる qid getter。
// MutationObserver 内でも常にこの関数経由で qid を再評価することで、
// 問題切替後 (loadQuestion / _qzDebugGoto / nextQuestion / prevQuestion)
// にも追従する (クロージャでキャプチャしない)。
window.QUIZLAND_GET_CURRENT_QID = function () { return formatQuizQid(currentQ); };

/* 4 択 chip テキストの per-question override 用キー (Phase 2: __chip_text_overrides)。
   debug nav と揃えた `${_cat}|${level}|${_idx}` 形式。 buildPlaylist /
   buildDebugPlaylist が両方 _cat / _idx を Object.assign で付与するので、
   どちらの経路でも欠損しない前提。 万一欠けたら null を返して override を諦める。 */
function formatQuizQKey(q) {
  if (!q) return null;
  if (q._cat == null || q.level == null || q._idx == null) return null;
  return q._cat + '|' + q.level + '|' + q._idx;
}
window.QUIZLAND_GET_CURRENT_QKEY = function () { return formatQuizQKey(currentQ); };
// chip エディタ (layout-editor.js) から「いま開いてる問題の currentQ」を読むための公開窓。
window.QUIZLAND_GET_CURRENT_Q = function () { return currentQ; };

/* HTML エスケープ (chip-label の innerHTML 化に伴う XSS 対策)。
   override テキストを <br> 改行付きで描画するために innerHTML を使うので、
   それ以外の `<` `>` `&` `"` は必ずエスケープする。 改行 (\n) のみ <br> に置換。 */
function _qzEscapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
/* chip テキスト override 解決: __chip_text_overrides[qKey][slot] が存在し
   非空文字列なら override を返す。 それ以外は元テキストを返す。 */
function _qzGetChipTextWithOverride(originalText, qKey, slot) {
  if (!qKey) return originalText;
  var data = window._currentLayoutData;
  if (!data || !data.__chip_text_overrides) return originalText;
  var byQ = data.__chip_text_overrides[qKey];
  if (!byQ) return originalText;
  var ov = byQ[String(slot)];
  return (typeof ov === 'string' && ov.length > 0) ? ov : originalText;
}
/* chip ラベル要素に override 適用済みテキストを innerHTML で書き込む。
   - originalText を toFullWidth に通してから escape → \n を <br> に変換。
   - override 適用時のみ data-chip-text-override="1" を付け、 editor が
     視覚マーク (.chip-text-override-mark) で枠を変えるためのフックにする。 */
function _qzApplyChipText(el, originalText, qKey, slot) {
  var resolved = _qzGetChipTextWithOverride(originalText, qKey, slot);
  var hasOverride = (resolved !== originalText);
  // MEDIUM 3: resolved が null / undefined の場合に "null" / "undefined" を描画してしまうのを防ぐ。
  var safeText = (resolved == null) ? '' : String(resolved);
  var fullWidthText = (typeof toFullWidth === 'function') ? toFullWidth(safeText) : safeText;
  el.innerHTML = _qzEscapeHtml(fullWidthText).replace(/\n/g, '<br>');
  if (hasOverride) {
    el.setAttribute('data-chip-text-override', '1');
  } else {
    el.removeAttribute('data-chip-text-override');
  }
}

window._imgCacheBust = Date.now();
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

let bgmAudio = null;
let bgmSource = null;
let bgmGain = null;
const BGM_VOLUME = 0.25;
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';

function initBGM() {
  if (bgmAudio) return;
  bgmAudio = new Audio('../assets/audio/quiz_bgm.mp3');
  bgmAudio.loop = true;
  bgmAudio.crossOrigin = 'anonymous';
  bgmAudio.preload = 'auto';
  if (audioCtx) {
    try {
      bgmSource = audioCtx.createMediaElementSource(bgmAudio);
      bgmGain = audioCtx.createGain();
      bgmGain.gain.value = BGM_VOLUME;
      bgmSource.connect(bgmGain).connect(audioCtx.destination);
    } catch (e) {
      // createMediaElementSource は同じ要素で 2 回呼べないのでガード
    }
  }
}
function startBGM() {
  if (!bgmEnabled) return;
  ensureAudio();
  if (!bgmAudio) initBGM();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (bgmAudio) bgmAudio.play().catch(function() {});
}
function stopBGM() {
  if (bgmAudio) { bgmAudio.pause(); bgmAudio.currentTime = 0; }
}
function toggleBGM() {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
  if (bgmEnabled) startBGM();
  else stopBGM();
}

document.addEventListener('visibilitychange', function () {
  if (document.hidden) {
    if (bgmAudio) bgmAudio.pause();
  } else if (bgmEnabled && bgmAudio) {
    bgmAudio.play().catch(function () {});
  }
});
window.addEventListener('pagehide', function () {
  if (bgmAudio) bgmAudio.pause();
});

// Playlist building
// ═══════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildPlaylist() {
  const cats = ALL_CATS.filter(c => selectedCategories[c]);
  if (cats.length === 0) return [];
  const minLv = DIFF_MIN_LEVEL[selectedDifficulty];
  const maxLv = DIFF_MAX_LEVEL[selectedDifficulty];
  const perCat = Math.max(1, Math.ceil(DEFAULT_TOTAL_Q / cats.length));
  const list = [];
  cats.forEach(cat => {
    const pool = (QUIZLAND_QUESTIONS[cat] || [])
      .map((q, idx) => Object.assign({ _cat: cat, _idx: idx }, q))
      .filter(q => q.level >= minLv && q.level <= maxLv);
    if (pool.length > 0) list.push(...shuffle(pool).slice(0, perCat));
  });
  return shuffle(list).slice(0, DEFAULT_TOTAL_Q);
}

// ─── デバッグ全問プレイ用: 全カテゴリを固定順で 1 度ずつ並べる ──────
//   カテゴリ順は QUIZLAND_QUESTIONS の宣言順 (= ALL_CATS と同じ順)。
//   各カテゴリ内は level 昇順 → 元配列の idx 昇順。 シャッフル無し。
//   合計 169 問 (order_color 24 + count_total 24 + shape_name 24 + weather 24
//                + opposite 24 + trivia 25 + body 24)。
function buildDebugPlaylist() {
  const list = [];
  ALL_CATS.forEach(cat => {
    const pool = (QUIZLAND_QUESTIONS[cat] || [])
      .map((q, idx) => Object.assign({ _cat: cat, _idx: idx }, q));
    pool.sort((a, b) => {
      const lvDiff = (a.level || 0) - (b.level || 0);
      if (lvDiff !== 0) return lvDiff;
      return a._idx - b._idx;
    });
    list.push(...pool);
  });
  return list;
}

// ═══════════════════════════════════════════════════════════
// Render functions — preview/full の見た目に合わせて
//   ・color-chip / count-item は board 内の dotted-slot 風
//   ・shape は board 中央に大きく
//   ・emoji は紙ボードの上に画像/絵文字
//   ・opposite/trivia は preview/full にはないが board 内に収める
// ═══════════════════════════════════════════════════════════
function renderOrderColor(stage, q) {
  const row = document.createElement('div');
  row.className = 'item-row';
  q.items.forEach(colorKey => {
    const img = document.createElement('img');
    img.className = 'color-chip';
    img.src = '../assets/images/quizland/illust/color/color_' + colorKey + '.png';
    img.alt = (QUIZLAND_COLORS[colorKey] && QUIZLAND_COLORS[colorKey].name) || '';
    // 失敗時は CSS color にフォールバック (既存資産が壊れた場合の保険)
    img.onerror = function() {
      const fallback = document.createElement('div');
      fallback.className = 'color-chip';
      if (QUIZLAND_COLORS[colorKey]) {
        fallback.style.background = QUIZLAND_COLORS[colorKey].code;
      }
      img.replaceWith(fallback);
    };
    row.appendChild(img);
  });
  stage.appendChild(row);
}
function renderCountTotal(stage, q) {
  // 順番系の問題 (order_color) は最大 5 個まで横 1 列必須 (左から N 番目を判別する都合)。
  // count_total は順番関係なし、 6 個以上なら 2 段に折り返して見やすく。
  // 2026-05-06 設計: count<=5 → 1 段、 count>=6 → 2 段 (上段に ceil(count/2) 個、 下段に残り)。
  const totalRows = q.count >= 6 ? 2 : 1;
  const itemsPerRow = Math.ceil(q.count / totalRows);
  const container = document.createElement('div');
  container.className = 'count-stack';
  for (let r = 0; r < totalRows; r++) {
    const row = document.createElement('div');
    row.className = 'item-row';
    const start = r * itemsPerRow;
    const end = Math.min(start + itemsPerRow, q.count);
    for (let i = start; i < end; i++) {
      const img = document.createElement('img');
      img.className = 'count-item';
      img.src = QUIZLAND_WORD_IMG + q.item + '.png';
      img.alt = '';
      row.appendChild(img);
    }
    container.appendChild(row);
  }
  stage.appendChild(container);
}
function renderShapeName(stage, q) {
  const wrap = document.createElement('div');
  wrap.className = 'shape-display';
  // PNG (sharp-cornered) を表示。 旧 CSS 描画 (.shape-square 等は border-radius:24px の角丸)
  // と「角はいくつ?」の問題が矛盾していたため、 sharp-cornered PNG に切替。
  // q.img が指定されている問題 (例: notebook / soccerball / leaf) は、 抽象 shape ではなく
  // 実物の絵を見せたい意図なので stage/ 配下の q.img を優先して読み込む。
  const img = document.createElement('img');
  img.className = 'shape-img';
  if (q.framed) img.classList.add('is-framed');
  if (q.img) {
    img.src = '../assets/images/quizland/illust/stage/' + q.img + '?v=' + (window._imgCacheBust || '');
  } else {
    img.src = '../assets/images/quizland/illust/shape/shape_' + q.shape + '.png';
  }
  img.alt = '';
  // 素材欠損時は CSS 描画にフォールバック (保険)。 ★/♥ は文字を入れる。
  img.onerror = function() {
    const fallback = document.createElement('div');
    fallback.className = 'shape-' + q.shape;
    if (q.shape === 'star')  fallback.textContent = '★';
    if (q.shape === 'heart') fallback.textContent = '♥';
    img.replaceWith(fallback);

  stage.appendChild(wrap);
}
function renderNumberSequence(stage, q) {
  // 「○の つぎ」「○の まえ」「○と ○の あいだ」用。 大きな数字 + 矢印 + ◯ (答え位置) を中央に表示 (sw v974+)。
  // q.stageDisplay (例: "1 → ◯", "◯ → 5", "2 → ◯ → 4") を優先参照。 旧データ (= 単一数字 q.num/q.nums) には fallback。
  const wrap = document.createElement('div');
  wrap.className = 'number-display';
  if (typeof q.stageDisplay === 'string' && q.stageDisplay.length > 0) {
    // 矢印モード判定: stageDisplay に `→` (U+2192) が含まれていれば arrow span 描画あり (つぎ/まえ系)、
    // 含まれていなければ arrow なし (あいだ系の 「2 ◯ 4」 等、 sw v975+)。
    // token 分割は arrow セパレータ または 1 文字以上の空白で行う (どちらも正規化)。
    const hasArrow = q.stageDisplay.indexOf('→') !== -1;
    const tokens = q.stageDisplay.split(/\s*→\s*|\s+/).filter(t => t.length > 0);
    tokens.forEach((tok, i) => {
      if (i > 0 && hasArrow) {
        const arrow = document.createElement('span');
        arrow.className = 'number-display-arrow';
        arrow.textContent = '→';
        wrap.appendChild(arrow);
      }
      const span = document.createElement('span');
      if (tok === '◯' || tok === '○') {
        span.className = 'number-display-blank';
        span.textContent = '◯';
      } else {
        span.className = 'number-display-num';
        span.textContent = tok;
      }
      wrap.appendChild(span);
    });
  } else if (Array.isArray(q.nums)) {
    // 旧データ fallback: 「○と ○の あいだ」問題
    const a = document.createElement('span');
    a.className = 'number-display-num';
    a.textContent = String(q.nums[0]);
    const sep = document.createElement('span');
    sep.className = 'number-display-sep';
    sep.textContent = 'と';
    const b = document.createElement('span');
    b.className = 'number-display-num';
    b.textContent = String(q.nums[1]);
    wrap.appendChild(a);
    wrap.appendChild(sep);
    wrap.appendChild(b);
  } else {
    // 旧データ fallback: 「○の つぎ」「○の まえ」問題
    const n = document.createElement('span');
    n.className = 'number-display-num';
    n.textContent = String(q.num);
    wrap.appendChild(n);
  }
  stage.appendChild(wrap);
}

function renderOpposite(stage, q) {
  // q.img_word があれば絵だけを表示 (word テキストは冗長なので省略)。
  // 正解後は onChoice → revealAnswer で img.src を img_answer に差し替えてリビール。
  // word テキスト要素が存在しないので revealAnswer の txt 書き換えは自動 skip される。
  // img_word なし (=従来の opposite) はテキストのみで表示 (現行どおり)。
  const container = document.createElement('div');
  // phase-question: 問題出題中の状態クラス。 revealAnswer で phase-answer に切替。
  container.className = 'emoji-display opposite-with-img phase-question';
  if (q.img_word) {
    const imgEl = document.createElement('img');
    imgEl.id = 'opposite-stage-img';
    imgEl.className = 'emoji-main-img';
    if (q.framed) imgEl.classList.add('is-framed');
    imgEl.alt = '';
    const v = (window._imgCacheBust || '');
    const stagePath = '../assets/images/quizland/illust/stage/' + q.img_word + (v ? '?v=' + v : '');
    const choicePath = '../assets/images/quizland/illust/choice/' + q.img_word + (v ? '?v=' + v : '');
    imgEl.src = stagePath;
    imgEl.dataset.fallback = choicePath;
    imgEl.addEventListener('error', function once() {
      if (imgEl.dataset.fallback && imgEl.src !== imgEl.dataset.fallback) {
        const fb = imgEl.dataset.fallback;
        imgEl.dataset.fallback = '';
        imgEl.src = fb;
      }
    });

  } else {
    const wrap = document.createElement('div');
    wrap.id = 'opposite-word-text';
    wrap.className = 'opposite-display';

// 正解時の画像リビール (opposite + trivia 共通)。
// renderOpposite / renderTrivia で付与した ID を辿って img.src を差し替える。
// opposite の場合は word テキストも正解語に書き換える (trivia は word なし)。
function revealAnswer(q) {
  const imgEl = document.getElementById('opposite-stage-img')
             || document.getElementById('trivia-stage-img');
  if (imgEl && q.img_answer) {
    const v = (window._imgCacheBust || '');
    const stagePath = '../assets/images/quizland/illust/stage/' + q.img_answer + (v ? '?v=' + v : '');
    const choicePath = '../assets/images/quizland/illust/choice/' + q.img_answer + (v ? '?v=' + v : '');
    imgEl.dataset.fallback = choicePath;
    // alpha-removed reveal animation: 一瞬フェード
    imgEl.style.transition = 'opacity 0.3s';
    imgEl.style.opacity = '0';
    setTimeout(() => {
      imgEl.src = stagePath;
      // リビール後の画像も枠付きなら drop-shadow を消す (questions.js の framed_answer)。
      if (q.framed_answer) imgEl.classList.add('is-framed');
      else if (!q.framed) imgEl.classList.remove('is-framed');
      imgEl.style.opacity = '1';
    }, 60);
  }
  // opposite のみ: word テキストを正解語に書き換え
  const txtEl = document.getElementById('opposite-word-text');
  if (txtEl && q.type === 'opposite') {
    const ansText = (typeof q.choices[q.answer] === 'object')
      ? q.choices[q.answer].text
      : q.choices[q.answer];
    txtEl.textContent = toFullWidth(ansText);
  }
  // phase-answer 切替: `.emoji-display` の状態クラスを phase-question → phase-answer に
  // 切り替え、 答えフェーズ専用のレイアウト (位置・スケール) を適用する。
  // 何も保存されていなければ applier の fallback で問題フェーズの値が使われる (= 連動)。
  setPhase('answer');
}

// `.emoji-display` の phase クラス (`phase-question` / `phase-answer`) を切替し、
// LayoutApplier に再 apply を促すヘルパー。 `.emoji-display` ステージを持たない
// q.type (order_color / count_total / shape_name) では .emoji-display が存在しない
// ので no-op に近いが、 安全のため毎回呼んでよい (applier 側の selector 不一致で skip)。
function setPhase(phase) {
  const stageWrap = document.querySelector('#stage-area .emoji-display');
  if (stageWrap) {
    stageWrap.classList.remove('phase-question', 'phase-answer');
    stageWrap.classList.add(phase === 'answer' ? 'phase-answer' : 'phase-question');
  }
  // LayoutApplier 再 apply: phase 切替で別 key の値を読みに行かせる。
  // _currentLayoutData が無い (= ?edit=1 でもない・layout JSON 未配信) なら no-op。
  if (window.LayoutApplier && window._currentLayoutData) {
    var _qid = (typeof window.QUIZLAND_GET_CURRENT_QID === 'function')
      ? window.QUIZLAND_GET_CURRENT_QID() : null;
    try {
      window.LayoutApplier.apply(
        window._currentLayoutData,
        document.getElementById('stage-area') || null,
        {
          selectors: QZ_RESIZABLE_SELECTORS,
          perQuestionSelectors: ['.emoji-display', '.emoji-display.phase-question', '.emoji-display.phase-answer', '.emoji-main-img'],
          qid: _qid,
        }
      );
    } catch (e) { /* noop */ }
  }
}

// reveal/正解後の「つぎへ」ボタン。 stage 中央下の #next-btn-area に
// 大きいボタンを置く (進行ピル progress-num.png 背景)。 既存のチップは
// answer-panel に残したままなので、 ボタンが浮かぶオーバーレイになる。
// nextQuestion が loadQuestion → hideNextButton を呼んで掃除する。
function showNextButton(onClick) {
  // 静的コンテナを優先。 万一 (古い HTML 等) 無ければ safe-area 末尾に作る。
  let area = document.getElementById('next-btn-area');
  if (!area) {
    const safe = document.getElementById('safe-area') || document.getElementById('stage');
    if (!safe) return;
    area = document.createElement('div');
    area.id = 'next-btn-area';
    area.className = 'next-btn-area';
    safe.appendChild(area);
  }
  // 念のため既存ボタンを撤去 (重複防止)
  area.innerHTML = '';
  const btn = document.createElement('button');
  btn.id = 'next-q-btn';
  btn.className = 'next-q-btn';
  btn.type = 'button';
  btn.setAttribute('aria-label', 'つぎの もんだいへ');
  btn.textContent = 'つぎへ';
  btn.addEventListener('click', function once() {
    btn.disabled = true;
    onClick();
  });
  area.appendChild(btn);
  // フェードイン
  requestAnimationFrame(() => btn.classList.add('show'));
}

function hideNextButton() {
  const area = document.getElementById('next-btn-area');
  if (area) area.innerHTML = '';
  // フォールバック: 過去に answer-panel 内に挿入されていた場合の掃除
  const stray = document.getElementById('next-q-btn');
  if (stray) stray.remove();
}

// バルーンランダム選択 (連続で同じ画像を出さない)
let _lastBalloonIdx = -1;
function pickBalloonSrc() {
  let idx;
  do {
    idx = 1 + Math.floor(Math.random() * 6);  // 1-6
  } while (idx === _lastBalloonIdx);
  _lastBalloonIdx = idx;
  return '../assets/images/quizland/balloons/ballon_' + String(idx).padStart(2, '0') + '.png';
}
// ポノのポーズ (旧 ThinkingPono.mp4 動画から直接フレーム抽出 + chroma key で alpha化)
// ハッシュ比較でユニークな5ポーズだけ抽出 (各2秒ホールド) → 同じものを繋いで綺麗化
// 元動画と全く同じ動きを再現する flip-book アニメーション
const TRIVIA_POSES = [
  // think_v_02 / _03 は色味 (セピア寄り) が他と違うため除外
  'think_video/think_v_01.png',
  'think_video/think_v_04.png',
  'think_video/think_v_05.png',
];
const TRIVIA_POSE_INTERVAL_MS = 2000; // 2秒/枚 (元動画と同じ pacing)
let _triviaPoseInterval = null;
let _triviaPoseIdx = 0;

function startTriviaPoseAnimation(imgEl) {
  // ランダムな開始位置 → そこから順番にループ (flip-book)
  _triviaPoseIdx = Math.floor(Math.random() * TRIVIA_POSES.length);
  imgEl.src = '../assets/images/characters/pono/dance/' + TRIVIA_POSES[_triviaPoseIdx];

  if (_triviaPoseInterval) clearInterval(_triviaPoseInterval);
  _triviaPoseInterval = setInterval(function() {
    _triviaPoseIdx = (_triviaPoseIdx + 1) % TRIVIA_POSES.length;
    imgEl.src = '../assets/images/characters/pono/dance/' + TRIVIA_POSES[_triviaPoseIdx];
  }, TRIVIA_POSE_INTERVAL_MS);
}

function stopTriviaPoseAnimation() {
  if (_triviaPoseInterval) {
    clearInterval(_triviaPoseInterval);
    _triviaPoseInterval = null;
  }
}

// ═══════════════════════════════════════════════════════════
// Stage Pono (左下常駐): TRIVIA_POSES を流用した flip-book +
//   ランダム間隔の短いセリフ吹き出しサイクル。
//   loadQuestion で trivia 出題時は body.has-trivia-pono を付けて
//   CSS で自動非表示 (中央ポノとの重複回避)。
// ═══════════════════════════════════════════════════════════
// 吹き出しは PNG 焼き込み (ballon_01〜06) を pickBalloonSrc() で選ぶ。
// テキストは PNG に既に焼かれているので JS 側で文字列を持たない。
const STAGE_PONO_POSE_INTERVAL_MS = 3000; // 3秒/枚 (やや穏やか)
const STAGE_PONO_BUBBLE_SHOW_MS = 4000;   // 4秒表示
const STAGE_PONO_BUBBLE_MIN_GAP_MS = 10000; // 次の吹き出しまで 10〜25 秒
const STAGE_PONO_BUBBLE_MAX_GAP_MS = 25000;

let _stagePonoPoseInterval = null;
let _stagePonoPoseIdx = 0;
let _stagePonoBubbleTimer = null;
let _stagePonoBubbleHideTimer = null;
let _stagePonoStarted = false;

function _stagePonoScheduleBubble() {
  clearTimeout(_stagePonoBubbleTimer);
  const gap = STAGE_PONO_BUBBLE_MIN_GAP_MS
    + Math.random() * (STAGE_PONO_BUBBLE_MAX_GAP_MS - STAGE_PONO_BUBBLE_MIN_GAP_MS);
  _stagePonoBubbleTimer = setTimeout(function() {
    const bubble = document.getElementById('stage-pono-bubble');
    const bubbleImg = document.getElementById('stage-pono-bubble-img');
    if (!bubble) return;
    if (bubbleImg) bubbleImg.src = pickBalloonSrc();
    bubble.classList.add('show');
    clearTimeout(_stagePonoBubbleHideTimer);
    _stagePonoBubbleHideTimer = setTimeout(function() {
      bubble.classList.remove('show');
      _stagePonoScheduleBubble();
    }, STAGE_PONO_BUBBLE_SHOW_MS);
  }, gap);
}

function startStagePono() {
  if (_stagePonoStarted) return;
  const imgEl = document.getElementById('stage-pono-img');
  if (!imgEl) return;
  _stagePonoStarted = true;
  // flip-book: TRIVIA_POSES を流用
  _stagePonoPoseIdx = Math.floor(Math.random() * TRIVIA_POSES.length);
  imgEl.src = '../assets/images/characters/pono/dance/' + TRIVIA_POSES[_stagePonoPoseIdx];
  if (_stagePonoPoseInterval) clearInterval(_stagePonoPoseInterval);
  _stagePonoPoseInterval = setInterval(function() {
    _stagePonoPoseIdx = (_stagePonoPoseIdx + 1) % TRIVIA_POSES.length;
    imgEl.src = '../assets/images/characters/pono/dance/' + TRIVIA_POSES[_stagePonoPoseIdx];
  }, STAGE_PONO_POSE_INTERVAL_MS);
  _stagePonoScheduleBubble();
}

function stopStagePono() {
  _stagePonoStarted = false;
  if (_stagePonoPoseInterval) { clearInterval(_stagePonoPoseInterval); _stagePonoPoseInterval = null; }
  clearTimeout(_stagePonoBubbleTimer); _stagePonoBubbleTimer = null;
  clearTimeout(_stagePonoBubbleHideTimer); _stagePonoBubbleHideTimer = null;
  const bubble = document.getElementById('stage-pono-bubble');
  if (bubble) { bubble.classList.remove('show'); }
  const bubbleImg = document.getElementById('stage-pono-bubble-img');
  if (bubbleImg) { bubbleImg.removeAttribute('src'); }
}

function renderTrivia(stage, q) {
  const wrap = document.createElement('div');
  // phase-question: 問題出題中の状態クラス。 revealAnswer で phase-answer に切替。
  wrap.className = 'emoji-display trivia-display phase-question';

  // 質問時の画像。 img_word があればそれを優先 (正解後に img_answer にリビールするため
  // revealAnswer から #trivia-stage-img の src を差し替える)。 なければ既存の q.img。
  const initialImg = q.img_word || q.img;
  if (initialImg) {
    const imgEl = document.createElement('img');
    imgEl.id = 'trivia-stage-img';
    imgEl.className = 'emoji-main-img';
    if (q.framed) imgEl.classList.add('is-framed');
    imgEl.alt = '';
    const v = (window._imgCacheBust || '');
    const stagePath = '../assets/images/quizland/illust/stage/' + initialImg + (v ? '?v=' + v : '');
    const choicePath = '../assets/images/quizland/illust/choice/' + initialImg + (v ? '?v=' + v : '');
    imgEl.src = stagePath;
    imgEl.dataset.fallback = choicePath;
    imgEl.addEventListener('error', function once() {
      if (imgEl.dataset.fallback && imgEl.src !== imgEl.dataset.fallback) {
        const fb = imgEl.dataset.fallback;
        imgEl.dataset.fallback = '';
        imgEl.src = fb;
      }
    });
    wrap.appendChild(imgEl);
    stage.appendChild(wrap);
    return;
  }

  // フォールバック: img 未指定の trivia は従来どおりポノ + バルーン
  const ponoWrap = document.createElement('div');
  ponoWrap.className = 'trivia-pono-wrap';
  const pono = document.createElement('img');
  pono.alt = '';
  pono.className = 'trivia-pono';
  ponoWrap.appendChild(pono);
  wrap.appendChild(ponoWrap);

  const balloon = document.createElement('img');
  balloon.src = pickBalloonSrc();
  balloon.alt = '';
  balloon.className = 'trivia-balloon';
  wrap.appendChild(balloon);

  stage.appendChild(wrap);

  // flip-book アニメーション開始 (質問が出ている間ずっとループ)
  startTriviaPoseAnimation(pono);
}

// ═══════════════════════════════════════════════════════════
// Choices: preview/full の chip スタイル (4個固定 grid 2x2)
//   - order_color → chip[data-color] + circle + ラベル
//   - count_total → chip-count (大きい数字)
//   - その他       → chip + テキスト
// ═══════════════════════════════════════════════════════════
// 半角 ASCII 印字可能文字 (! 〜 ~) を全角 (FF01〜FF5E) に変換する render-time ヘルパー。
// data layer (questions.js) は半角のまま保持し、 表示時のみ全角化することで
// 「みぎから 2ばんめは…」の数字が日本語フォントの全角グリフで描画され、
// 周囲の かな/漢字 と字幅・字形が揃う。 半角 SPACE (0x20) は触らない
// (全角空白に変えるとレイアウト崩れの恐れがあるため)。
function toFullWidth(s) {
  if (typeof s !== 'string') return s;
  return s.replace(/[!-~]/g, function(ch) {
    return String.fromCharCode(ch.charCodeAt(0) + 0xFEE0);
  });
}
function chipSizeClass(text) {
  if (!text) return '';
  const len = String(text).length;
  if (len <= 5) return '';            // default (大きめ)
  if (len <= 10) return 'txt-medium'; // 中
  return 'txt-long';                  // 長文用に小さく
}
function renderChoices(q) {
  const tray = document.getElementById('answer-panel');
  tray.innerHTML = '';
  // editor で chip-label / chip-illust-label / chip-count-num を直接編集
  // (dblclick → contenteditable) → __chip_text_overrides[qKey][slot] に保存。
  // qKey は debug nav と同じ pipe 区切り。 currentQ に _cat / _idx が無ければ null。
  const qKey = formatQuizQKey(q);
  q.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.idx = i;
    btn.type = 'button';
    // chip 内の各要素 (circle / illust / label / count-num) はそれぞれ
    // 独立 resizable に登録 (QZ_RESIZABLE_SELECTORS) → editor で個別に
    // 位置・サイズ調整できる。 chip 外枠は別レイヤー。
    // 種別 class (chip-type-with-image / chip-type-text-only) は LayoutApplier の
    // __chip_presets 解決で使う (preset → 個別 chip|N の順で適用)。
    const hasImage = (q.type === 'order_color') ||
                     (choice && typeof choice === 'object' && choice.image);
    btn.classList.add(hasImage ? 'chip-type-with-image' : 'chip-type-text-only');
    if (q.type === 'order_color') {
      btn.dataset.color = choice;
      btn.classList.add('has-image'); // 丸 + ラベル のレイアウト
      // CSS gradient circle → watercolor PNG に切替 (あれば)
      // wrap (.circle) には base CSS で per-color gradient が当たっているので、
      // PNG が読めなければそのまま gradient が見える (= 自動 fallback)
      const wrap = document.createElement('div');
      wrap.className = 'circle';
      const img = document.createElement('img');
      img.src = '../assets/images/quizland/illust/choice/color_dot_' + choice + '.png';
      img.alt = '';
      img.draggable = false;
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.objectFit = 'contain';
      img.style.borderRadius = '50%';
      img.style.display = 'block';
      // PNG 不存在 (404) 時は img を消して、 wrap の CSS gradient を露出させる
      img.onerror = function() { img.remove(); };
      wrap.appendChild(img);
      btn.appendChild(wrap);
      const label = document.createElement('span');
      label.className = 'chip-label';
      _qzApplyChipText(label, QUIZLAND_COLORS[choice].name, qKey, i);
      btn.appendChild(label);
    } else if (q.type === 'count_total') {
      btn.classList.add('chip-count');
      const num = document.createElement('span');
      num.className = 'chip-count-num';
      _qzApplyChipText(num, String(choice), qKey, i);
      btn.appendChild(num);
    } else if (choice && typeof choice === 'object' && choice.image) {
      // 画像入り選択肢: { text: '...', image: '...png' }
      // 既存の choices: string[] と backward-compatible (object 形式のみ画像扱い)
      btn.classList.add('chip-with-image');
      // 2026-05-12 (v971): img を wrapper div でラップ。 <img> は HTML replaced
      // element で resize-handle 子 DOM を描画できないため、 layout-editor で
      // 個別 resize 可能にするには非-replaced な親 (.chip-illust-wrap) を挟む
      // 必要がある。 wrapper には元の sizing (110×110) を移植し、 内側 <img>
      // は width/height 100% で充填する。 saved-layout のキーは新セレクタ
      // `.chip .chip-illust-wrap` で書き込む (旧 `.chip .chip-illust|N` は
      // layout-applier 側で wrap セレクタへ alias される)。
      const wrap = document.createElement('div');
      wrap.className = 'chip-illust-wrap';
      const img = document.createElement('img');
      img.className = 'chip-illust';
      img.src = '../assets/images/quizland/illust/choice/' + choice.image;
      img.alt = '';
      img.draggable = false;
      wrap.appendChild(img);
      btn.appendChild(wrap);
      if (choice.text) {
        const label = document.createElement('span');
        label.className = 'chip-illust-label chip-label';
        _qzApplyChipText(label, choice.text, qKey, i);
        btn.appendChild(label);
        const sizeCls = chipSizeClass(choice.text);
        if (sizeCls) btn.classList.add(sizeCls);
      }
    } else {
      const text = (choice && typeof choice === 'object') ? choice.text : choice;
      const label = document.createElement('span');
      label.className = 'chip-label';
      _qzApplyChipText(label, text, qKey, i);
      btn.appendChild(label);
      const sizeCls = chipSizeClass(text);
      if (sizeCls) btn.classList.add(sizeCls);
    }
    btn.addEventListener('pointerdown', function(e) {
      // layout-editor (?edit=1) 中は chip クリックで quiz を進行させない
      // (チップを掴んで動かしたいのに「答えた」と判定されて困る対策)。
      // v816: Playtest ON 時もエディタ選択を最優先にするため抑止に戻した。
      // editor + Playtest ON は「全問巡回 + コメント残し」が目的で、 答え判定は
      // 通常プレイ (?edit=1 を外して) で確認する運用に揃える。 問題遷移は
      // toolbar の ⏭ 次へ / debug nav (前へ・次へ・ジャンプ) で行う。
      if (document.body.classList.contains('layout-editor-on')) return;
      e.preventDefault();
      if (locked) return;
      onChoice(i, btn);
    });
    tray.appendChild(btn);
  });
  // 保存済みレイアウト (.chip|0..3, .chip .circle|0..3) を動的に再適用。
  // fetch がまだなら window._currentLayoutData が null で何も起きず、
  // LayoutSystem 初回 fetch 完了 → MutationObserver 経由で自動再適用される。
  // 2026-05-08 fix: 問題切替時に直前 save の値が GitHub fetch (stale) で
  //   上書きされている可能性があるので、localStorage の最新値で
  //   _currentLayoutData を refresh してから apply する。
  //   (enable() 経路を通らない playtest mode 等で「次へ/前へ」した際に、
  //    古い fetched JSON のままだとユーザー直前 save が巻き戻る症状の対策)
  try {
    if (window.LayoutEditor && typeof window.LayoutEditor.refreshCurrentFromLocal === 'function') {
      window.LayoutEditor.refreshCurrentFromLocal();
    }
  } catch (e) { /* noop */ }
  // chip text override (`__chip_text_overrides`) を再適用。
  // ループ内 _qzApplyChipText の時点では _currentLayoutData が null/未取得で
  // override が読めないケースがあるので、 refreshCurrentFromLocal の後に
  // 確定した _currentLayoutData を見て改めて当てる。
  // 同時に visual mark (data-chip-text-override) も最新化する。
  try {
    var _ovKey = formatQuizQKey(q);
    if (_ovKey) {
      var _chips = tray.querySelectorAll('.chip');
      _chips.forEach(function (chip, i) {
        var labels = chip.querySelectorAll('.chip-label, .chip-illust-label, .chip-count-num');
        if (!labels.length) return;
        // 元テキスト (override 適用前) は q.choices から再取得。
        // chip-with-image / count_total / order_color の各形態を吸収。
        var choice = q.choices[i];
        var orig;
        if (q.type === 'order_color') {
          orig = (QUIZLAND_COLORS && QUIZLAND_COLORS[choice] && QUIZLAND_COLORS[choice].name) || String(choice);
        } else if (q.type === 'count_total') {
          orig = String(choice);
        } else if (choice && typeof choice === 'object' && choice.image) {
          orig = (choice.text != null) ? choice.text : '';
        } else {
          orig = (choice && typeof choice === 'object') ? choice.text : choice;
        }
        // 1 chip 内に複数のテキスト要素があっても全て同じ override を当てる。
        // count_total なら chip-count-num のみ、 通常 chip なら chip-label のみのため重複には
        // ならない。 chip-with-image は chip-illust-label = chip-label を兼ねる span 1 個。
        labels.forEach(function (lbl) {
          _qzApplyChipText(lbl, orig, _ovKey, i);
        });
      });
    }
    // editor on のとき visual mark をリフレッシュ
    if (document.body.classList.contains('layout-editor-on') &&
        window.LayoutEditor && typeof window.LayoutEditor._refreshChipTextOverrideMarks === 'function') {
      window.LayoutEditor._refreshChipTextOverrideMarks();
    }
  } catch (e) { /* noop */ }
  if (window.LayoutApplier && window._currentLayoutData) {
    // Phase 2 / impl-B: per-Q キー対応。 qid と whitelist (perQuestionSelectors)
    // を毎回渡し、 .emoji-display / .emoji-main-img だけ問題別位置で復元させる。
    // qid は呼び出し時点で formatQuizQid(currentQ) を解決 (クロージャ避け)。
    var _qid = (typeof window.QUIZLAND_GET_CURRENT_QID === 'function')
      ? window.QUIZLAND_GET_CURRENT_QID() : null;
    window.LayoutApplier.apply(
      window._currentLayoutData,
      document.getElementById('answer-panel'),
      {
        selectors: QZ_RESIZABLE_SELECTORS,
        perQuestionSelectors: ['.emoji-display.phase-question', '.emoji-display.phase-answer', '.emoji-display', '.emoji-main-img'],
        qid: _qid,
      }
    );
  }
}

function loadQuestion(q) {
  currentQ = q;
  locked = false;
  // 前問題から残っている staged-reveal クラスを掃除する (illust / 答えパネル)。
  // 直後に renderChoices / stage 描画が新規ノードを作るので revealed は付け直し。
  document.querySelectorAll('.q-stage-revealed, .q-stage-pending').forEach(function(el) {
    el.classList.remove('q-stage-revealed');
    el.classList.remove('q-stage-pending');
  });
  // 問題文は typewriter (typeQuestionText) で後から流し込む。
  // ここでは pending として stash しておき、 まずは空文字で描画する。
  // 呼び出し側 (initGame / _doNextQuestion / _qzDebugGoto) が plate 後に
  // typeQuestionText を呼ぶ。 何らかの理由で typewriter が走らなかった場合の
  // 救済として、 数フレーム後に pending が残っていれば即時表示する。
  const _qTextEl = document.getElementById('q-text');
  if (_qTextEl) {
    const _fullText = toFullWidth(q.q || '');
    _qTextEl.dataset.pendingText = _fullText;
    _qTextEl.textContent = '';
  }
  const stage = document.getElementById('stage-area');
  stage.dataset.qtype = q.type;
  stage.innerHTML = '';
  switch (q.type) {
    case 'order_color': renderOrderColor(stage, q); break;
    case 'count_total': renderCountTotal(stage, q); break;
    case 'shape_name':  renderShapeName(stage, q); break;
    case 'number_sequence': renderNumberSequence(stage, q); break;
    case 'emoji_name':  renderEmojiName(stage, q); break;
    case 'opposite':    renderOpposite(stage, q); break;
    case 'trivia':      renderTrivia(stage, q); break;
  }
  // trivia 中央ポノが居る間は左下ポノを CSS で隠す。 それ以外は左下ポノを起動。
  if (q.type === 'trivia') {
    document.body.classList.add('has-trivia-pono');
  } else {
    document.body.classList.remove('has-trivia-pono');
    startStagePono();
  }
  renderChoices(q);
  // Staged reveal: 挿絵 (.emoji-display) と 4択 (#answer-panel) を pending に
  // 落としておき、 _runPlateAndType が typewriter の進行に合わせて revealed
  // へ切替える。 typewriter が走らないケースの救済として、 短い fallback で
  // pending が残っていれば自動 reveal する (下の setTimeout)。
  document.querySelectorAll('#stage-area .emoji-display').forEach(function(el) {
    el.classList.add('q-stage-pending');
  });
  const _ansPanel = document.getElementById('answer-panel');
  if (_ansPanel) _ansPanel.classList.add('q-stage-pending');
  // v967: 「第N問」 プレート表示中は問題文も隠す (案 C)。
  //   Q1-5: hideQuestionNumberPlate() で reveal される (kurumi ended +300ms = plate fade-out 同期)
  //   Q6+:  _runPlateAndType() で typewriter 開始時に reveal される (plate 無いため即時)
  if (_qTextEl) _qTextEl.classList.add('q-stage-pending');
  updateHUD();
  setupNarration(q);
  showProblemDialogue(q);
  // 「第 N 問目」SE: 問題ロード時 (= mode-btn タップ後 = user gesture 後) のみ鳴らす
  // updateHUD() は起動時 IIFE 末尾でも呼ばれるため、SE 発火は loadQuestion 末尾に限定する
  // v966: ユーザー手動編集 mp3 (kurumi_dai{1-5}mon.mp3) は冒頭に don 音が結合済の
  //       「don + ナレーション」一体ファイルに更新されたため、 アプリ側で
  //       playSe('nextQuestion') を別途再生する経路 (旧 v962-v965 の don ended /
  //       timeupdate チェーン) を完全削除。 mp3 単独再生で「don 1 回 + 第N問」 が
  //       1 ファイルで完結する。 nextQuestion / preload IIFE / playQuestionNumberPlate
  //       は将来用に維持 (削除すると preload 整合性が崩れる)。
  // (旧 v959: 別 DOM の #kurumi-q-banner CSS バナーを表示していたが誤実装、 削除)
  const _monNum = questionIdx + 1; // 1 始まり
  if (_monNum >= 1 && _monNum <= 5) {
    const _kAudio = playSe('kurumi_dai' + _monNum);
    if (_kAudio && typeof _kAudio.addEventListener === 'function') {
      var _onKurumiEnded = function () {
        _kAudio.removeEventListener('ended', _onKurumiEnded);
        setTimeout(hideQuestionNumberPlate, 300);
      };
      _kAudio.addEventListener('ended', _onKurumiEnded, { once: true });
      // fallback: ended が発火しなくても 6 秒で強制 hide
      setTimeout(function () {
        try { _kAudio.removeEventListener('ended', _onKurumiEnded); } catch (e) {}
        hideQuestionNumberPlate();
      }, 6000);
    } else {
      // mp3 取得失敗時の fallback
      setTimeout(hideQuestionNumberPlate, 1500);
    }
  } else {
    // Q6+ (kurumi 音声無し): plate も無いので何もしない
  }
}

// ── Narration: 自動再生 or 🔊ボタンで問題文を読み上げ
function narrationKey(q, field) {
  if (!q || q._cat == null || q._idx == null) return null;
  return 'quizland:' + q._cat + ':' + q._idx + ':' + (field || 'q');
}
function setupNarration(q) {
  if (typeof Narration === 'undefined') return;
  const btn = document.getElementById('question-speaker');
  const key = narrationKey(q, 'q');
  if (!btn || !key) return;
  Narration.load().then(() => {
    const has = Narration.hasEntry(key);
    btn.style.display = (has && Narration.getMode() !== 'off') ? '' : 'none';
    btn.onclick = function(e) {
      if (document.body.classList.contains('layout-editor-on')) { e.preventDefault(); e.stopPropagation(); return; }
      e.preventDefault();
      Narration.play(key);
    };
    if (has) Narration.playIfAuto(key);
    const prefetchKeys = [];
    for (let i = 1; i <= 2; i++) {
      const nq = playlist[questionIdx + i];
      if (nq) {
        const k = narrationKey(nq, 'q');
        if (k) prefetchKeys.push(k);
      }
    }
    if (prefetchKeys.length) Narration.prefetch(prefetchKeys);
  });
}

function updateHUD() {
  document.getElementById('q-num').textContent = (questionIdx + 1);
  document.getElementById('q-total').textContent = totalQuestions;
  const prog = document.getElementById('hud-progress');
  prog.innerHTML = '';
  // デバッグ全問モードは 169 個ドットを並べると HUD が破綻するので、
  // 5 個に圧縮した擬似プログレスを表示する (現在位置を 0..4 にマッピング)。
  const dotCount = QZ_DEBUG_ALL ? DEFAULT_TOTAL_Q : totalQuestions;
  const currentDotIdx = QZ_DEBUG_ALL && totalQuestions > 0
    ? Math.min(dotCount - 1, Math.floor(questionIdx * dotCount / totalQuestions))
    : questionIdx;
  for (let i = 0; i < dotCount; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot';
    if (i < currentDotIdx) dot.classList.add('done');
    if (i === currentDotIdx) dot.classList.add('current');
    prog.appendChild(dot);
  }
  // デバッグナビ更新 (DOM があれば)
  if (typeof updateDebugNav === 'function') updateDebugNav();
}

// ═══════════════════════════════════════════════════════════
// Answer handling
// ═══════════════════════════════════════════════════════════
function onChoice(idx, btn) {
  // 自動ヒント (showProblemDialogue で 5 秒後にセット) が回答後に発火して
  // セリフを上書きしないように、最初に必ずキャンセルする
  clearTimeout(_autoHintTimer);
  if (locked) return;
  locked = true;
  // モバイルでも :active が反応しづらい場合に備え、明示的に押下表示を出す
  if (btn) {
    btn.classList.add('pressed');
    setTimeout(() => { btn.classList.remove('pressed'); }, 150);
  }
  ensureAudio();
  const correct = (idx === currentQ.answer);
  if (correct) {
    btn.classList.add('correct');
    playCorrect();
    // 「やったー！」の feedback は seikai スタンプで代替するので削除済 (2026-05-06)
    showCorrectDialogue();
    showSeikaiStamp();
    ponoJump();
    launchConfetti();
    correctCount++;
    if (window.incrementStat) window.incrementStat('quizland_correct', 1);
    // スタンプラリー: プレイ記録
    (function() {
      var k = 'pono_played_' + new Date().toDateString();
      var a = JSON.parse(localStorage.getItem(k) || '[]');
      if (a.indexOf('quizland') === -1) { a.push('quizland'); localStorage.setItem(k, JSON.stringify(a)); }
    })();
    // img_answer のとき: 正解絵リビール + 「つぎへ」ボタン (自動遷移しない)。
    // opposite は word テキストも反対語に切替。 trivia は detail があれば一緒に表示。
    if (currentQ.img_answer) {
      setTimeout(() => { revealAnswer(currentQ); }, 900);
      if (currentQ.detail) {
        setTimeout(() => {
          showDetailDialogue(currentQ.detail);
          if (typeof Narration !== 'undefined') {
            var dKey = narrationKey(currentQ, 'detail');
            if (dKey && Narration.hasEntry(dKey)) Narration.play(dKey);
          }
        }, 1500);
      }
      // 「つぎへ」は reveal + detail 表示完了後に出す
      setTimeout(() => { showNextButton(nextQuestion); }, currentQ.detail ? 2200 : 1500);
    } else if (currentQ.detail) {
      setTimeout(() => {
        showDetailDialogue(currentQ.detail);
        if (typeof Narration !== 'undefined') {
          var dKey = narrationKey(currentQ, 'detail');
          if (dKey && Narration.hasEntry(dKey)) Narration.play(dKey);
        }
      }, 1500);
      // detail 表示後に「つぎへ」を表示 (自動遷移しない)
      setTimeout(() => { showNextButton(nextQuestion); }, 2500);
    } else {
      // 正解フィードバック / ジングル後に「つぎへ」を表示 (自動遷移しない)
      setTimeout(() => { showNextButton(nextQuestion); }, 1200);
    }
  } else {
    btn.classList.add('wrong');
    btn.disabled = true;
    playWrong();
    showFeedback('もういっかい！', true);
    showWrongDialogue();
    // もう1回チャンス: 間違ったボタンだけ無効化、ロック解除して再選択可能
    locked = false;
  }
}

// 正解時の「せいかい！」スタンプを画面中央に一瞬出す。
//   onChoice の correct 分岐から呼ぶ。 1.5 秒後に自動で消える。
//   再表示 (連続正解) では reflow でアニメーションをリスタート。
function showSeikaiStamp() {
  const el = document.getElementById('seikai-stamp');
  if (!el) return;
  el.classList.remove('show');
  void el.offsetWidth; // force reflow to restart CSS transition
  el.classList.add('show');
  clearTimeout(showSeikaiStamp._timer);
  showSeikaiStamp._timer = setTimeout(() => el.classList.remove('show'), 1500);
}

function showFeedback(text, wrong) {
  const el = document.getElementById('feedback');
  el.textContent = text;
  el.style.color = wrong ? 'var(--danger)' : 'var(--success)';
  el.style.borderColor = wrong ? 'var(--danger)' : 'var(--success)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 700);
}

function ponoJump() {
  const av = document.getElementById('pono-avatar');
  if (!av) return;
  av.classList.remove('jump');
  void av.offsetWidth; // reflow
  av.classList.add('jump');
}

// editor の「次の問題へ」ボタン (common/layout/layout-editor.js) から呼べるよう window 公開
window.nextQuestion = nextQuestion;
function nextQuestion() {
  // Phase 2 / impl-B hook: editor mode で per-Q レイアウト編集中の dirty 確認。
  // impl-A が LayoutEditor.confirmDiscardIfDirty() を公開する想定で呼び出す。
  // 未公開でも null guard で素通り (= 通常プレイは影響なし)。
  // false 返却で「破棄せず留まる」= 遷移キャンセル。
  try {
    if (window.LayoutEditor && typeof window.LayoutEditor.confirmDiscardIfDirty === 'function'
        && !window.LayoutEditor.confirmDiscardIfDirty()) return;
  } catch (_) { /* ignore — never block navigation on hook failure */ }
  // debug mode: 未保存のコメント/スクショがあれば先に保存してから次へ進む。
  // _qzPtSaveCurrentNote は QZ_DEBUG_ALL=false / コメント空 + 添付なし / saving 中なら
  // 即 resolve するので、 通常モードでは透過 (オーバーヘッドほぼゼロ)。
  // 失敗時は localStorage に backup される & resolve するので遷移は止まらない。
  if (typeof _qzPtSaveCurrentNote === 'function' &&
      (QZ_DEBUG_ALL || isPlaytestInEditor())) {
    try {
      var p = _qzPtSaveCurrentNote();
      if (p && typeof p.then === 'function') {
        p.then(_doNextQuestion, _doNextQuestion);
        return;
      }
    } catch (_) { /* fall through to immediate transition */ }
  }
  _doNextQuestion();
}

function _doNextQuestion() {
  clearTimeout(_autoHintTimer);
  stopTriviaPoseAnimation(); // 前の質問のポーズ循環を必ず止める (interval リーク防止)
  hideNextButton();           // 「つぎへ」を必ず片付ける (オーバーレイで残らないように)
  questionIdx++;
  if (questionIdx >= totalQuestions) {
    // editor mode (?edit=1): リザルトモーダルは閉じる手段が無く編集を阻害するので
    // 表示せず先頭へループバックする (既存の editor ガード方針 chip pointerdown /
    // 吹き出しクリック / HUD ボタン等と同じパターン)。
    if (document.body.classList.contains('layout-editor-on')) {
      questionIdx = 0;
      loadQuestion(playlist[0]);
      try { _runPlateAndType(0); } catch (e) {}
      try { console.log('[quizland editor] 全問完走 — 先頭に戻ります'); } catch (_) {}
      return;
    }
    showResult();
    return;
  }
  loadQuestion(playlist[questionIdx]);
  try { _runPlateAndType(questionIdx); } catch (e) {}
}

// ═══════════════════════════════════════════════════════════
// Result
// ═══════════════════════════════════════════════════════════
function showResult() {
  clearTimeout(_autoHintTimer);
  stopTriviaPoseAnimation(); // 結果画面ではアニメーションを止める
  stopStagePono();           // 左下ポノも結果画面では停止
  showClearDialogue(correctCount, totalQuestions);
  const cleared = correctCount >= Math.ceil(totalQuestions * 0.7); // 70% 以上で clear
  // セッション完走 (5 問サイクル完了) を祝福する「ぜんぶ できたね！」スタンプ。
  // 正解率に関わらず常に表示 (= 完走の証)。 cleared/not の差は title テキストで表現。
  document.getElementById('result-icon').innerHTML =
    '<img src="../assets/images/quizland/stamps/zenbu_dekita.png" alt="" class="result-stamp-img">';
  document.getElementById('result-title').textContent = cleared ? 'クリア！' : 'もうちょっと！';
  document.getElementById('result-msg').textContent = cleared
    ? toFullWidth(String(totalQuestions)) + 'もんちゅう ' + toFullWidth(String(correctCount)) + 'もん せいかい！'
    : toFullWidth(String(totalQuestions)) + 'もんちゅう ' + toFullWidth(String(correctCount)) + 'もん せいかい。\nもういちど やってみよう！';
  document.getElementById('result-overlay').classList.remove('hidden');
  if (cleared) {
    if (window.incrementStat) window.incrementStat('quizland_clears', 1);
    playFanfare();
    launchConfetti();
    setTimeout(launchConfetti, 400);
    // First-clear 報酬 (PONO_MVP_NO_REWARDS=true 中は no-op)
    if (typeof window.triggerFirstClearReward === 'function') {
      try { window.triggerFirstClearReward('quizland'); } catch (e) {}
    }
  }
}
