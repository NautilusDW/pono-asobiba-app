<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>フクロウ博士のなぞなぞ | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="../common/mvp-flags.js"></script>
<script src="../common/achievements.js"></script>
<script src="../common/first-clear.js"></script>
<script src="../common/menu.js"></script>
<script src="../common/narration.js"></script>
<script src="./data/questions.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

/* ============================================================
   Quizland v2 (Strategy: Replace)
   --------------------------------------------------------------
   このファイルは quizland/preview/full/index.html を視覚的土台と
   して採用する。 stage は 2100×900 (21:9) の固定キャンバスで、
   内側に 16:9 の safe-area (1600×900) を持つ。 端末サイズに合わせて
   transform: scale で常時 fit させる (preview/full の preview-mode を
   標準動作にしたもの)。

   既存のゲームロジック (slim 版: questions/categories/render/audio/
   achievements 連携) はそのまま温存し、 IDs を preview/full の DOM に
   合わせて再配線している。
   ============================================================ */

:root {
  /* preview/full から取り込んだトーン (木枠/紙質/フクロウ) */
  --bg: #0c0c0c;
  --paper: #f5e9c4;
  --paper-2: #e8d293;
  --paper-shadow: rgba(80, 50, 10, 0.3);
  --wood-dark: #6e4520;
  --wood-mid: #8a5a2a;
  --wood-light: #b07a3a;
  --hint-bg: #fff3c4;
  --text: #4a2d0a;
  --text-light: #f0f0f0;
  --owl-bg: #b08acf;

  /* 21:9 outer / 16:9 safe area inner (preview/full と同じ) */
  --canvas-w: 2100px;
  --canvas-h: 900px;
  --safe-w: 1600px;
  --safe-h: 900px;
  --header-h: 150px;

  /* Slot (board 内) */
  --slot-size: 130px;
  --slot-color: #E0E0E0;
  --slot-radius: 16px;
  --gap: 16px;

  /* 既存ゲームロジックが参照している色 (correct/wrong/seasons 等) */
  --primary: #F59E0B;
  --primary-light: #FDE68A;
  --accent: #FBBF24;
  --success: #10B981;
  --danger: #EF4444;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100dvh;
  overflow: hidden;
  background: #0c0c0c;
  color: var(--text-light);
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  overscroll-behavior: none;
}

/* ===== Stage container (auto-fit on viewport) ===== */
.stage-wrap {
  position: fixed; inset: 0;
  overflow: hidden;
  background: #000;
}
.stage {
  position: absolute;
  top: 0; left: 0;
  width: var(--canvas-w);
  height: var(--canvas-h);
  background: url('../assets/preview-placeholders/stage-bg.png') center / cover no-repeat;
  overflow: hidden;
  transform-origin: 0 0;  /* JS が translate + scale を当てる */
}

/* ===== シート画像オーバーレイ (preview/full のシート手描き 1 枚絵) ===== */
body.sheet-on .stage::after {
  content: '';
  position: absolute;
  inset: 0;
  background: url('../assets/preview-placeholders/quizland-sheet-v1.png') center / 100% 100% no-repeat;
  pointer-events: none;
  z-index: 5;
}
body.sheet-on .hdr-pill,
body.sheet-on .q-text-card,
body.sheet-on .board,
body.sheet-on .answer-tray,
body.sheet-on .chip,
body.sheet-on .slot {
  background-image: none !important;
  background-color: transparent !important;
  border-color: transparent !important;
  box-shadow: none !important;
}
body.sheet-on .hdr-left .progress-num {
  background-color: transparent !important;
  border-color: transparent !important;
  box-shadow: none !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  text-align: center;
  color: #4a2d0a !important;
  font-weight: 900;
  font-size: 22px;
  position: relative;
  z-index: 7;
}
body.sheet-on .slot {
  border: 1.5px dashed rgba(120, 80, 20, 0.35) !important;
  border-radius: 12px;
}
body.sheet-on .hdr-left .dot {
  background-color: transparent !important;
  border: none !important;
}
body.sheet-on .safe-area > .hdr,
body.sheet-on .safe-area > .body { position: relative; z-index: 6; }

/* ===== Safe area (16:9 inner, preview/full と同じ) ===== */
.safe-area {
  position: absolute;
  top: 0;
  left: calc((var(--canvas-w) - var(--safe-w)) / 2);
  width: var(--safe-w);
  height: var(--safe-h);
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-columns: 1fr;
  gap: 14px;
  padding: 14px;
}

/* ===== Header (top, hdr-pill 左 + ctrl-btn 群 右) ===== */
.hdr {
  display: grid;
  grid-template-columns: 1fr 700px;
  gap: 16px;
  align-items: center;
  height: var(--header-h);
}
.hdr-pill {
  display: inline-flex; align-items: center; gap: 12px;
  background:
    linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 4px solid var(--wood-dark);
  border-radius: 50px;
  padding: 6px 18px;
  height: calc(100% - 14px);
  box-shadow: 0 4px 0 var(--wood-dark), 0 6px 12px var(--paper-shadow);
}
.hdr-left {
  gap: 16px;
  padding: 6px 18px 6px 8px;
  width: 100%;
  justify-content: flex-start;
}
.hdr-left .owl-icon {
  width: 64px; height: 64px;
  background: linear-gradient(180deg, #f4e4c4, #d8b78a);
  border: 3px solid var(--wood-dark);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex: 0 0 auto;
  overflow: hidden;
}
.hdr-left .owl-icon img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: 50% 18%;
  transform: scale(1.6);
  transform-origin: 50% 18%;
}
.hdr-left .title-card {
  background: linear-gradient(180deg, #c97a3e, #8a4f1f);
  border: 3px solid var(--wood-dark);
  border-radius: 12px;
  padding: 4px 14px;
  color: #fff7d0;
  font-weight: 800;
  font-size: 18px;
  text-shadow: 0 2px 0 rgba(0,0,0,0.4);
  text-align: center;
  line-height: 1.1;
  flex: 0 0 auto;
}
.hdr-left .title-card small { font-size: 11px; display: block; }
.hdr-left .progress-num {
  background: linear-gradient(180deg, #fff8e0, #f0dfa6);
  border: 2px solid var(--wood-dark);
  border-radius: 16px;
  padding: 4px 18px;
  font-weight: 900;
  font-size: 22px;
  color: var(--text);
  flex: 0 0 auto;
  margin-left: auto;
}
.hdr-left .dots {
  display: flex;
  gap: 10px;
  flex: 0 0 auto;
  height: 14px;
  align-items: center;
  justify-content: space-between;
}
.hdr-left .dot {
  height: 100%;
  aspect-ratio: 1;
  width: auto;
  flex: 0 0 auto;
  background: #d6b56a;
  border: 2px solid var(--wood-mid);
  border-radius: 50%;
}
.hdr-left .dot.done { background-color: #f3a330; }
.hdr-left .dot.current { background-color: #F7A718; transform: scale(1.18); }

.hdr-right {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  justify-self: end;
}
.hdr-right .ctrl-btn {
  display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
  width: 120px;
  height: 120px;
  padding: 8px;
  font-weight: 800;
  font-size: 16px;
  gap: 6px;
  background:
    linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 4px solid var(--wood-dark);
  border-radius: 18px;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 4px 0 var(--wood-dark), 0 6px 12px var(--paper-shadow);
  -webkit-tap-highlight-color: transparent;
}
.hdr-right .ctrl-btn .icon { font-size: 40px; line-height: 1; }
.hdr-right .ctrl-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--wood-dark), 0 4px 8px var(--paper-shadow); }

/* ===== Body (左 q-col / 右 a-col) ===== */
.body {
  display: grid;
  grid-template-columns: 1fr 700px;
  gap: 16px;
  height: 100%;
  align-items: stretch;
}
.q-col, .a-col { min-width: 0; }
.q-col {
  display: flex;
  flex-direction: column;
  gap: 12px;
  height: 100%;
  justify-content: center;
}
.q-text-card {
  background: linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 5px solid var(--wood-dark);
  border-radius: 18px;
  padding: 22px 80px 22px 32px;
  display: flex; align-items: center; justify-content: center; gap: 16px;
  color: var(--text);
  font-weight: 800;
  font-size: 32px;
  min-height: 170px;
  line-height: 1.4;
  position: relative;
  box-shadow: 0 6px 0 var(--wood-dark), 0 8px 16px var(--paper-shadow);
}
#q-text {
  display: inline-block;
  padding: 4px 8px;
  text-align: center;
}
.q-text-card .audio {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: linear-gradient(180deg, var(--wood-light), var(--wood-mid));
  border: 3px solid var(--wood-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  color: #fff;
  flex: 0 0 auto;
  font-family: inherit;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
}

/* ===== Board (問題コンテンツの紙ボード) ===== */
.board {
  background: linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 5px solid var(--wood-dark);
  border-radius: 18px;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: inset 0 -4px 0 rgba(120, 80, 20, 0.15), 0 4px 12px var(--paper-shadow);
  height: 500px;
  overflow: hidden;
}
#stage-area {
  width: 100%; height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  gap: 24px;
  min-height: 0;
}

/* item-row (color/count) — preview/full の slot 配列に近い見た目 */
.item-row {
  display: flex;
  gap: 24px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

/* color-chip: dotted-slot 風の枠 + 色面 */
.color-chip {
  width: var(--slot-size);
  height: var(--slot-size);
  border-radius: var(--slot-radius);
  border: 4px solid rgba(255,255,255,0.85);
  box-shadow: 0 8px 18px rgba(120, 83, 20, 0.16),
              inset 0 0 0 2px rgba(0,0,0,0.06);
}

/* count-item: scratchy paper-card 風 */
.count-item {
  width: var(--slot-size);
  height: var(--slot-size);
  object-fit: contain;
  filter: drop-shadow(0 4px 8px rgba(120, 83, 20, 0.18));
}

/* ===== Shapes ===== */
.shape-display {
  width: 100%; height: 100%;
  display: flex; justify-content: center; align-items: center;
}
.shape-circle    { width: 230px; height: 230px; border-radius: 50%; background: #FBBF24; box-shadow: 0 10px 24px rgba(0,0,0,0.15); }
.shape-square    { width: 230px; height: 230px; border-radius: 24px; background: #60A5FA; box-shadow: 0 10px 24px rgba(0,0,0,0.15); }
.shape-triangle  { width: 0; height: 0; border-left: 120px solid transparent; border-right: 120px solid transparent; border-bottom: 210px solid #10B981; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15)); }
.shape-star      { font-size: 280px; line-height: 1; color: #F97316; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15)); }
.shape-heart     { font-size: 280px; line-height: 1; color: #EC4899; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15)); }
.shape-rectangle { width: 320px; height: 170px; border-radius: 24px; background: #8B5CF6; box-shadow: 0 10px 24px rgba(0,0,0,0.15); }
.shape-diamond   { width: 220px; height: 220px; background: #EF4444; transform: rotate(45deg); border-radius: 20px; box-shadow: 0 10px 24px rgba(0,0,0,0.15); }
.shape-oval      { width: 320px; height: 170px; border-radius: 50%; background: #10B981; box-shadow: 0 10px 24px rgba(0,0,0,0.15); }

/* ===== Emoji / Trivia / Opposite ===== */
.emoji-display {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  max-width: 100%;
  text-align: center;
}
.emoji-main {
  font-size: 220px;
  line-height: 1;
  filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
}
.emoji-main-img {
  max-width: 360px;
  max-height: 360px;
  object-fit: contain;
}
.emoji-hint {
  font-size: 18px;
  font-weight: 700;
  color: #8A6A42;
  text-align: center;
  background: rgba(255,255,255,0.85);
  border-radius: 999px;
  padding: 8px 18px;
  box-shadow: 0 2px 6px rgba(120, 83, 20, 0.12);
}
.opposite-display {
  font-size: 84px;
  font-weight: 900;
  color: #D36B12;
  text-shadow: 0 4px 0 rgba(255, 246, 221, 0.95);
  padding: 24px 48px;
  background: linear-gradient(180deg, #FFF7E5, #F8DE9F);
  border-radius: 26px;
  border: 3px solid rgba(231, 203, 149, 0.92);
  box-shadow: 0 10px 22px rgba(120, 83, 20, 0.12);
}
.trivia-display { position: relative; }
.trivia-pono {
  width: 280px; height: 280px;
  object-fit: contain;
  border-radius: 24px;
  filter: drop-shadow(0 10px 16px rgba(120, 83, 20, 0.18));
}
.trivia-bubble {
  position: absolute;
  top: -8px; right: -16px;
  font-size: 36px;
  font-weight: 900;
  color: #FF6B9D;
  background: #fff;
  border-radius: 50%;
  width: 60px; height: 60px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 12px rgba(255,107,157,0.3);
  animation: quizBubbleBlink 2.5s ease-in-out infinite;
}
@keyframes quizBubbleBlink {
  0%, 70%, 100% { opacity: 1; transform: scale(1); }
  80% { opacity: 0.3; transform: scale(0.85); }
  90% { opacity: 1; transform: scale(1.1); }
}

/* ===== Answer column (right) ===== */
.a-col {
  display: flex; flex-direction: column;
  gap: 18px;
  height: 100%;
  justify-content: center;
}
.answer-tray {
  background: #b07a3a;
  border: 5px solid var(--wood-dark);
  border-radius: 18px;
  padding: 18px;
  flex: 0 0 auto;
}
.answer-panel {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 16px;
  width: 100%;
}
.bottom-right {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 14px;
  margin-top: 8px;
}
.bottom-right .character {
  flex: 0 0 auto;
}
.chip {
  background: linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 5px solid var(--wood-dark);
  border-radius: 18px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  color: var(--text);
  font-weight: 800;
  font-size: 28px;
  box-shadow: 0 4px 0 var(--wood-dark), 0 6px 12px var(--paper-shadow);
  position: relative;
  height: 220px;
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  text-align: center;
  line-height: 1.2;
}
.chip:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--wood-dark), 0 4px 8px var(--paper-shadow); }
.chip.correct {
  background: linear-gradient(180deg, #BDF5C2, #6FD480) !important;
  border-color: var(--success) !important;
  color: #065F46;
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.chip.wrong {
  background: linear-gradient(180deg, #FED7D7, #F19999) !important;
  border-color: var(--danger) !important;
  animation: shake 0.4s;
}
.chip.chip-count { font-size: 56px; }
@keyframes popIn {
  0% { transform: scale(1); }
  50% { transform: scale(1.12); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

/* チップ内の手描きスクリブル円 (色問題用) */
.chip .circle {
  width: 110px; height: 110px;
  border-radius: 50%;
  background:
    repeating-linear-gradient(135deg,
      rgba(255,255,255,0.04) 0 4px,
      rgba(0,0,0,0.06) 4px 8px),
    var(--slot-color);
  border: 3px solid rgba(0,0,0,0.1);
}
.chip[data-color="red"]    .circle { background: repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #d23f3f; }
.chip[data-color="blue"]   .circle { background: repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #3d6dc7; }
.chip[data-color="yellow"] .circle { background: repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #e8c43a; }
.chip[data-color="green"]  .circle { background: repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #4ea84e; }
.chip[data-color="pink"]   .circle { background: repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #EC4899; }
.chip[data-color="orange"] .circle { background: repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #F97316; }
.chip[data-color="purple"] .circle { background: repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #8B5CF6; }
.chip[data-color="cyan"]   .circle { background: repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #06B6D4; }

/* ===== char-hint (吹き出し) + character (フクロウ博士) ===== */
.char-hint {
  flex: 0 0 auto;
  position: relative;
  width: 235px;
  height: 63px;
  background-image: url('../assets/preview-placeholders/hint-60.png');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: #4a3a1a;
  text-shadow: 0 1px 0 rgba(255,255,255,0.6);
  white-space: nowrap;
}
.character {
  width: 200px; height: 220px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  margin-bottom: -8px;
}
.character img {
  width: 100%; height: 100%;
  object-fit: contain;
  pointer-events: none;
}
.character.jump {
  animation: ponoJump 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes ponoJump {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-30px); }
  100% { transform: translateY(0); }
}

/* ===== 縦持ち警告 ===== */
.landscape-notice { display: none; }
@media (orientation: portrait) {
  .landscape-notice {
    display: flex;
    flex-direction: column;
    position: fixed; inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.92);
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #FFE8B0;
    font-family: 'DotGothic16', 'Zen Maru Gothic', sans-serif;
    gap: 18px;
  }
  .landscape-notice .rotate-icon {
    font-size: 4rem;
    animation: rotateHint 1.6s ease-in-out infinite;
  }
  .landscape-notice p {
    font-size: 1.5rem;
    line-height: 1.4;
    letter-spacing: 0.06em;
  }
  @keyframes rotateHint {
    0%, 100% { transform: rotate(0deg); }
    50%      { transform: rotate(90deg); }
  }
}

/* ===== Start Screen ===== */
.start-screen {
  position: fixed; inset: 0; z-index: 50;
  background: #C4D9A2 url('../assets/images/quizland/title_back.png') center / cover no-repeat;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}
.start-screen.hidden { display: none; }
.start-content {
  position: absolute;
  top: 4%; left: 5%;
  width: min(54%, 580px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  z-index: 2;
  pointer-events: none;
}
.start-logo {
  width: 100%;
  max-height: 38vh;
  object-fit: contain;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.25));
}
.start-tap-cta {

<script>
(function() {
'use strict';

// ═══════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════
const TOTAL_Q = 5;
let playlist = [];
let questionIdx = 0;
let correctCount = 0;
let currentQ = null;
let locked = false;

// 選択中カテゴリー（デフォルト: 全部ON）
const ALL_CATS = Object.keys(QUIZLAND_CATEGORIES);
let selectedCategories = Object.fromEntries(ALL_CATS.map(k => [k, true]));
// 難易度
let selectedDifficulty = 'easy'; // 'easy'|'normal'|'hard'
const DIFF_MAX_LEVEL = { easy: 1, normal: 2, hard: 3 };
const DIFF_MIN_LEVEL = { easy: 1, normal: 1, hard: 3 };
// やさしい(inspire) = 文字読めない3-4歳でも遊べる: 色・数・形 (絵中心)
// ものしり(know)    = 5-6 歳〜: トリビア・天気・体・反対語 (文字読み必須)
const MODE_TO_CATEGORIES = {
  inspire: ['order_color', 'count_total', 'shape_name'],
  know:    ['trivia', 'weather', 'body', 'opposite']
};
let selectedMode = 'inspire';

// ═══════════════════════════════════════════════════════════
// Stage auto-fit (preview/full の preview-mode と同じ計算)
// ═══════════════════════════════════════════════════════════
const stageEl = document.getElementById('stage');
function fitStage() {
  const w = window.innerWidth, h = window.innerHeight;
  const stageW = parseFloat(getComputedStyle(stageEl).width);
  const stageH = parseFloat(getComputedStyle(stageEl).height);
  if (!stageW || !stageH) return;
  const scale = Math.min(w / stageW, h / stageH);
  const scaledW = stageW * scale;
  const scaledH = stageH * scale;
  const offsetX = (w - scaledW) / 2;
  const offsetY = (h - scaledH) / 2;
  stageEl.style.transformOrigin = '0 0';
  stageEl.style.transform = 'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + scale + ')';
}
window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', function () { setTimeout(fitStage, 100); });
fitStage();

// ═══════════════════════════════════════════════════════════
// Audio (BGM + 効果音)
// ═══════════════════════════════════════════════════════════
window._imgCacheBust = Date.now();
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

let bgmAudio = null;
let bgmSource = null;
let bgmGain = null;
const BGM_VOLUME = 0.07;
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';

function initBGM() {
  if (bgmAudio) return;
  bgmAudio = new Audio('../assets/audio/quiz_bgm.mp3');
  bgmAudio.loop = true;
  bgmAudio.crossOrigin = 'anonymous';
  bgmAudio.preload = 'auto';
  if (audioCtx) {
    try {
      bgmSource = audioCtx.createMediaElementSource(bgmAudio);
      bgmGain = audioCtx.createGain();
      bgmGain.gain.value = BGM_VOLUME;
      bgmSource.connect(bgmGain).connect(audioCtx.destination);
    } catch (e) {
      // createMediaElementSource は同じ要素で 2 回呼べないのでガード
    }
  }
}
function startBGM() {
  if (!bgmEnabled) return;
  ensureAudio();
  if (!bgmAudio) initBGM();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (bgmAudio) bgmAudio.play().catch(function() {});
}
function stopBGM() {
  if (bgmAudio) { bgmAudio.pause(); bgmAudio.currentTime = 0; }
}
function toggleBGM() {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
  if (bgmEnabled) startBGM();
  else stopBGM();
}

document.addEventListener('visibilitychange', function () {
  if (document.hidden) {
    if (bgmAudio) bgmAudio.pause();
  } else if (bgmEnabled && bgmAudio) {
    bgmAudio.play().catch(function () {});
  }
});
window.addEventListener('pagehide', function () {
  if (bgmAudio) bgmAudio.pause();
});

function playCorrect() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [523.25, 783.99].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = f;
    o.type = 'sine';
    g.gain.setValueAtTime(0.18, t + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.28);
    o.connect(g).connect(audioCtx.destination);
    o.start(t + i * 0.08);
    o.stop(t + i * 0.08 + 0.3);
  });
}
function playWrong() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(220, t);
  o.frequency.exponentialRampToValueAtTime(110, t + 0.2);
  g.gain.setValueAtTime(0.12, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  o.connect(g).connect(audioCtx.destination);
  o.start(t);
  o.stop(t + 0.22);
}
function playFanfare() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = f;
    g.gain.setValueAtTime(0.15, t + i * 0.15);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.4);
    o.connect(g).connect(audioCtx.destination);
    o.start(t + i * 0.15);
    o.stop(t + i * 0.15 + 0.4);
  });
}

// ═══════════════════════════════════════════════════════════
// Confetti
// ═══════════════════════════════════════════════════════════
function launchConfetti() {
  const colors = ['#FBBF24', '#F59E0B', '#10B981', '#3B82F6', '#EC4899', '#8B5CF6'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = (Math.random() * 0.6) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3200);
  }
}

// ═══════════════════════════════════════════════════════════
// Playlist building
// ═══════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildPlaylist() {
  const cats = ALL_CATS.filter(c => selectedCategories[c]);
  if (cats.length === 0) return [];
  const minLv = DIFF_MIN_LEVEL[selectedDifficulty];
  const maxLv = DIFF_MAX_LEVEL[selectedDifficulty];
  const perCat = Math.max(1, Math.ceil(TOTAL_Q / cats.length));
  const list = [];
  cats.forEach(cat => {
    const pool = (QUIZLAND_QUESTIONS[cat] || [])
      .map((q, idx) => Object.assign({ _cat: cat, _idx: idx }, q))
      .filter(q => q.level >= minLv && q.level <= maxLv);
    if (pool.length > 0) list.push(...shuffle(pool).slice(0, perCat));
  });
  return shuffle(list).slice(0, TOTAL_Q);
}

// ═══════════════════════════════════════════════════════════
// Render functions — preview/full の見た目に合わせて
//   ・color-chip / count-item は board 内の dotted-slot 風
//   ・shape は board 中央に大きく
//   ・emoji は紙ボードの上に画像/絵文字
//   ・opposite/trivia は preview/full にはないが board 内に収める
// ═══════════════════════════════════════════════════════════
function renderOrderColor(stage, q) {
  const row = document.createElement('div');
  row.className = 'item-row';
  q.items.forEach(colorKey => {
    const chip = document.createElement('div');
    chip.className = 'color-chip';
    chip.style.background = QUIZLAND_COLORS[colorKey].code;
    row.appendChild(chip);
  });
  stage.appendChild(row);
}
function renderCountTotal(stage, q) {
  const row = document.createElement('div');
  row.className = 'item-row';
  for (let i = 0; i < q.count; i++) {
    const img = document.createElement('img');
    img.className = 'count-item';
    img.src = QUIZLAND_WORD_IMG + q.item + '.png';
    img.alt = '';
    row.appendChild(img);
  }
  stage.appendChild(row);
}
function renderShapeName(stage, q) {
  const wrap = document.createElement('div');
  wrap.className = 'shape-display';
  if (q.shape === 'circle')    wrap.innerHTML = '<div class="shape-circle"></div>';
  if (q.shape === 'square')    wrap.innerHTML = '<div class="shape-square"></div>';
  if (q.shape === 'triangle')  wrap.innerHTML = '<div class="shape-triangle"></div>';
  if (q.shape === 'star')      wrap.innerHTML = '<div class="shape-star">★</div>';
  if (q.shape === 'heart')     wrap.innerHTML = '<div class="shape-heart">♥</div>';
  if (q.shape === 'rectangle') wrap.innerHTML = '<div class="shape-rectangle"></div>';
  if (q.shape === 'diamond')   wrap.innerHTML = '<div class="shape-diamond"></div>';
  if (q.shape === 'oval')      wrap.innerHTML = '<div class="shape-oval"></div>';
  stage.appendChild(wrap);
}
function renderEmojiName(stage, q) {
  const wrap = document.createElement('div');
  wrap.className = 'emoji-display';
  if (q.img) {
    const imgEl = document.createElement('img');
    imgEl.className = 'emoji-main-img';
    imgEl.src = '../assets/images/ocean/' + q.img + '?v=' + (window._imgCacheBust || '');
    imgEl.alt = '';
    wrap.appendChild(imgEl);
  } else {
    const emojiEl = document.createElement('div');
    emojiEl.className = 'emoji-main';
    emojiEl.textContent = q.emoji;
    wrap.appendChild(emojiEl);
  }
  if (q.hint && q.img) {
    const hint = document.createElement('div');
    hint.className = 'emoji-hint';
    hint.textContent = '💡 ' + q.hint;
    hint.style.opacity = '0';
    hint.style.transition = 'opacity 0.5s';
    wrap.appendChild(hint);
    setTimeout(() => { hint.style.opacity = '1'; }, 3000);
  }
  stage.appendChild(wrap);
}
function renderOpposite(stage, q) {
  const wrap = document.createElement('div');
  wrap.className = 'opposite-display';
  wrap.textContent = q.word;
  stage.appendChild(wrap);
}
function renderTrivia(stage, q) {
  const wrap = document.createElement('div');
  wrap.className = 'emoji-display trivia-display';

  const video = document.createElement('video');
  video.src = '../assets/videos/ThinkingPono.mp4';
  video.autoplay = true;
  video.loop = true;
  video.muted = true;
  video.playsInline = true;
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');
  video.className = 'trivia-pono';
  video.play().catch(function() {});
  wrap.appendChild(video);

  const bubble = document.createElement('div');
  bubble.className = 'trivia-bubble';
  bubble.textContent = '?';
  wrap.appendChild(bubble);

  stage.appendChild(wrap);
}

// ═══════════════════════════════════════════════════════════
// Choices: preview/full の chip スタイル (4個固定 grid 2x2)
//   - order_color → chip[data-color] + circle + ラベル
//   - count_total → chip-count (大きい数字)
//   - その他       → chip + テキスト
// ═══════════════════════════════════════════════════════════
function renderChoices(q) {
  const tray = document.getElementById('answer-panel');
  tray.innerHTML = '';
  q.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.idx = i;
    btn.type = 'button';
    if (q.type === 'order_color') {
      btn.dataset.color = choice;
      const c = document.createElement('div');
      c.className = 'circle';
      btn.appendChild(c);
      const label = document.createElement('span');
      label.textContent = QUIZLAND_COLORS[choice].name;
      btn.appendChild(label);
    } else if (q.type === 'count_total') {
      btn.classList.add('chip-count');
      btn.textContent = String(choice);
    } else {
      const label = document.createElement('span');
      label.textContent = choice;
      btn.appendChild(label);
    }
    btn.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      if (locked) return;
      onChoice(i, btn);
    });
    tray.appendChild(btn);
  });
}

function loadQuestion(q) {
  currentQ = q;
  locked = false;
  document.getElementById('q-text').textContent = q.q;
  const stage = document.getElementById('stage-area');
  stage.dataset.qtype = q.type;
  stage.innerHTML = '';
  switch (q.type) {
    case 'order_color': renderOrderColor(stage, q); break;
    case 'count_total': renderCountTotal(stage, q); break;
    case 'shape_name':  renderShapeName(stage, q); break;
    case 'emoji_name':  renderEmojiName(stage, q); break;
    case 'opposite':    renderOpposite(stage, q); break;
    case 'trivia':      renderTrivia(stage, q); break;
  }
  renderChoices(q);
  updateHUD();
  setupNarration(q);
}

// ── Narration: 自動再生 or 🔊ボタンで問題文を読み上げ
function narrationKey(q, field) {
  if (!q || q._cat == null || q._idx == null) return null;
  return 'quizland:' + q._cat + ':' + q._idx + ':' + (field || 'q');
}
function setupNarration(q) {
  if (typeof Narration === 'undefined') return;
  const btn = document.getElementById('question-speaker');
  const key = narrationKey(q, 'q');
  if (!btn || !key) return;
  Narration.load().then(() => {
    const has = Narration.hasEntry(key);
    btn.style.display = (has && Narration.getMode() !== 'off') ? '' : 'none';
    btn.onclick = function(e) {
      e.preventDefault();
      Narration.play(key);
    };
    if (has) Narration.playIfAuto(key);
    const prefetchKeys = [];
    for (let i = 1; i <= 2; i++) {
      const nq = playlist[questionIdx + i];
      if (nq) {
        const k = narrationKey(nq, 'q');
        if (k) prefetchKeys.push(k);
      }
    }
    if (prefetchKeys.length) Narration.prefetch(prefetchKeys);
  });
}

function updateHUD() {
  document.getElementById('q-num').textContent = (questionIdx + 1);
  document.getElementById('q-total').textContent = TOTAL_Q;
  const prog = document.getElementById('hud-progress');
  prog.innerHTML = '';
  for (let i = 0; i < TOTAL_Q; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot';
    if (i < questionIdx) dot.classList.add('done');
    if (i === questionIdx) dot.classList.add('current');
    prog.appendChild(dot);
  }
}

// ═══════════════════════════════════════════════════════════
// Answer handling
// ═══════════════════════════════════════════════════════════
function onChoice(idx, btn) {
  if (locked) return;
  locked = true;
  ensureAudio();
  const correct = (idx === currentQ.answer);
  if (correct) {
    btn.classList.add('correct');
    playCorrect();
    showFeedback('やったー！');
    ponoJump();
    launchConfetti();
    correctCount++;
    if (window.incrementStat) window.incrementStat('quizland_correct', 1);
    // スタンプラリー: プレイ記録
    (function() {
      var k = 'pono_played_' + new Date().toDateString();
      var a = JSON.parse(localStorage.getItem(k) || '[]');
      if (a.indexOf('quizland') === -1) { a.push('quizland'); localStorage.setItem(k, JSON.stringify(a)); }
    })();
    var infoText = currentQ.detail || currentQ.hint || null;
    if (infoText) {
      setTimeout(() => {
        showDetail(infoText);
        if (typeof Narration !== 'undefined' && currentQ.detail) {
          var dKey = narrationKey(currentQ, 'detail');
          if (dKey && Narration.hasEntry(dKey)) Narration.play(dKey);
        }
      }, 600);
      setTimeout(nextQuestion, 2800);
    } else {
      setTimeout(nextQuestion, 1000);
    }
  } else {
    btn.classList.add('wrong');
    btn.disabled = true;
    playWrong();
    showFeedback('もういっかい！', true);
    // もう1回チャンス: 間違ったボタンだけ無効化、ロック解除して再選択可能
    locked = false;
  }
}

function showDetail(text) {
  let el = document.getElementById('detail-popup');
  if (!el) {
    el = document.createElement('div');
    el.id = 'detail-popup';
    document.body.appendChild(el);
  }
  el.textContent = '💡 ' + text;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

function showFeedback(text, wrong) {
  const el = document.getElementById('feedback');
  el.textContent = text;
  el.style.color = wrong ? 'var(--danger)' : 'var(--success)';
  el.style.borderColor = wrong ? 'var(--danger)' : 'var(--success)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 700);
}

function ponoJump() {
  const av = document.getElementById('pono-avatar');
  if (!av) return;
  av.classList.remove('jump');
  void av.offsetWidth; // reflow
  av.classList.add('jump');
}

function nextQuestion() {
  questionIdx++;
  if (questionIdx >= TOTAL_Q) {
    showResult();
    return;
  }
  loadQuestion(playlist[questionIdx]);
}

// ═══════════════════════════════════════════════════════════
// Result
// ═══════════════════════════════════════════════════════════
function showResult() {
  const cleared = correctCount >= Math.ceil(TOTAL_Q * 0.7); // 70% 以上で clear
  document.getElementById('result-icon').textContent = cleared ? '🎉' : '💪';
  document.getElementById('result-title').textContent = cleared ? 'クリア！' : 'もうちょっと！';
  document.getElementById('result-msg').textContent = cleared
    ? TOTAL_Q + 'もんちゅう ' + correctCount + 'もん せいかい！'
    : TOTAL_Q + 'もんちゅう ' + correctCount + 'もん せいかい。\nもういちど やってみよう！';
  document.getElementById('result-overlay').classList.remove('hidden');
  if (cleared) {
    if (window.incrementStat) window.incrementStat('quizland_clears', 1);
    playFanfare();
    launchConfetti();
    setTimeout(launchConfetti, 400);
    // First-clear 報酬 (PONO_MVP_NO_REWARDS=true 中は no-op)
    if (typeof window.triggerFirstClearReward === 'function') {
      try { window.triggerFirstClearReward('quizland'); } catch (e) {}
    }
  }
}

// ═══════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════
function initGame() {
  playlist = buildPlaylist();
  questionIdx = 0;
  correctCount = 0;
  document.getElementById('result-overlay').classList.add('hidden');
  if (playlist.length === 0) {
    // 何らかの理由で問題が組めなかった場合 (基本的に来ない) はモード選択へ
    document.getElementById('mode-screen').classList.remove('hidden');
    return;
  }
  loadQuestion(playlist[0]);
}

// ═══════════════════════════════════════════════════════════
// Wiring
// ═══════════════════════════════════════════════════════════
// タイトル画面タップ → モード選択画面へ (BGM もここで起動)
document.getElementById('start-screen').addEventListener('click', function() {
  ensureAudio();
  startBGM();
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('mode-screen').classList.remove('hidden');
});

// モードボタンタップ = 即ゲーム開始 (やさしい/ものしりに応じて出題カテゴリ切替)
document.querySelectorAll('.mode-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    selectedMode = btn.dataset.mode;
    ALL_CATS.forEach(function(c) {
      selectedCategories[c] = MODE_TO_CATEGORIES[selectedMode].indexOf(c) !== -1;
    });
    document.getElementById('mode-screen').classList.add('hidden');
    initGame();
    if (typeof initMenu === 'function') {
      initMenu({
        bgmToggle: function() { toggleBGM(); },
        tutorial: function() { alert('フクロウ博士の なぞなぞに こたえよう！'); }
      });
    }
  });
});

// HUD 左ボタン (おしらせ → モード選択画面へ戻る)
document.getElementById('hud-back-btn').addEventListener('click', function() {
  document.getElementById('result-overlay').classList.add('hidden');
  document.getElementById('mode-screen').classList.remove('hidden');
});

// Result retry (same categories)
document.getElementById('result-btn').addEventListener('click', function() {
  initGame();
});

// Result "change mode" → モード選択画面へ
document.getElementById('result-cat-btn').addEventListener('click', function() {
  document.getElementById('result-overlay').classList.add('hidden');
  document.getElementById('mode-screen').classList.remove('hidden');
});

// HUD settings button → 共通メニューを開く
(function() {
  var settingsBtn = document.getElementById('hud-settings-btn');
  if (!settingsBtn) return;
  settingsBtn.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    var menuToggle = document.querySelector('.pono-menu-toggle');
    if (menuToggle) {
      var evt = typeof PointerEvent === 'function'
        ? new PointerEvent('pointerdown', { bubbles: true, cancelable: true, pointerType: 'touch' })
        : new Event('pointerdown', { bubbles: true, cancelable: true });
      menuToggle.dispatchEvent(evt);
    }
  });
})();

// 安全策: 起動時に dot を 5 個レンダリング (loadQuestion でも更新される)
updateHUD();

})();
</script>
</body>
</html>
