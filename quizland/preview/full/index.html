<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Quizland 全体プレビュー (21:9 + 16:9 セーフエリア)</title>
<style>
:root {
  /* チューナブル */
  --slot-size: 130px;
  --slot-color: #E0E0E0;
  --slot-radius: 16px;
  --gap: 16px;
  --padding: 16px;

  /* キャンバス比率: 21:9 outer / 16:9 safe area inner */
  --canvas-w: 2100px;
  --canvas-h: 900px;
  --safe-w: 1600px;
  --safe-h: 900px;
  /* side margins = (canvas-w - safe-w) / 2 = 250 */

  --header-h: 150px;  /* 100 → 150 で 1.5x */
  --bbox-bg: #d4be8a;
  --bbox-border: rgba(110, 70, 32, 0.55);
  --bbox-label: rgba(80, 50, 20, 0.65);

  --bg: #1a1a1a;
  --paper: #f5e9c4;
  --paper-2: #e8d293;
  --paper-shadow: rgba(80, 50, 10, 0.3);
  --wood-dark: #6e4520;
  --wood-mid: #8a5a2a;
  --wood-light: #b07a3a;
  --frame-border: rgba(138, 56, 245, 0.6);
  --safe-border: rgba(0, 212, 255, 0.4);
  --owl-bg: #b08acf;
  --hint-bg: #fff3c4;
  --text: #4a2d0a;
  --text-light: #f0f0f0;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #0c0c0c;
  color: var(--text-light);
  font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
  font-size: 14px;
  overflow-x: hidden;
}

/* ───── Toolbar ───── */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(20,20,20,0.95);
  border-bottom: 1px solid #333;
  padding: 10px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  font-size: 12px;
}
.toolbar > div { display: inline-flex; gap: 6px; align-items: center; }
.toolbar label { color: #aaa; }
.toolbar select, .toolbar input[type="text"], .toolbar input[type="number"], .toolbar button {
  background: #2a2a2a;
  color: #fff;
  border: 1px solid #444;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 12px;
}
.toolbar button { cursor: pointer; }
.toolbar button:hover { background: #3a3a3a; }
.toolbar button.active { background: #6a4ed4; border-color: #8a5ef0; }
.toolbar input[type="file"] { color: #aaa; font-size: 11px; }

/* ───── Stage (21:9 outer) ───── */
.stage-wrap {
  padding: 20px;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}
.stage {
  width: var(--canvas-w);
  height: var(--canvas-h);
  margin: 0 auto;
  position: relative;
  /* 森の背景 */
  background:
    radial-gradient(ellipse at 50% 25%, rgba(180, 145, 90, 0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 12% 80%, rgba(80, 50, 22, 0.4) 0%, transparent 45%),
    radial-gradient(ellipse at 88% 80%, rgba(70, 100, 50, 0.35) 0%, transparent 45%),
    linear-gradient(180deg, #5e7b3a 0%, #3e5a25 55%, #2c411a 100%);
  border: 1px dashed #555;
  overflow: hidden;
}

/* Forest decoration on the 21:9 sides (outside safe area) */
.forest-side {
  position: absolute;
  top: 0; bottom: 0;
  width: 250px;
  pointer-events: none;
  background:
    radial-gradient(circle at 30% 30%, rgba(50, 90, 40, 0.6) 0%, transparent 35%),
    radial-gradient(circle at 70% 60%, rgba(60, 100, 50, 0.7) 0%, transparent 35%),
    radial-gradient(circle at 20% 80%, rgba(40, 70, 30, 0.5) 0%, transparent 35%);
}
.forest-side.left { left: 0; }
.forest-side.right { right: 0; transform: scaleX(-1); }
.forest-side::before {
  content: "🌿"; font-size: 80px; opacity: 0.4;
  position: absolute; top: 8%; left: 30px;
}
.forest-side::after {
  content: "🌿"; font-size: 60px; opacity: 0.3;
  position: absolute; bottom: 12%; left: 50px;
}

.lantern {
  position: absolute;
  left: 30px; top: 220px;
  font-size: 60px; opacity: 0.85;
  pointer-events: none;
}

/* ───── Safe Area (16:9) ───── */
.safe-area {
  position: absolute;
  top: 0;
  left: calc((var(--canvas-w) - var(--safe-w)) / 2);
  width: var(--safe-w);
  height: var(--safe-h);
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-columns: 1fr;
  gap: 14px;
  padding: 14px;
}

/* セーフエリアの境界線 (オン/オフ可) */
body.show-safe .safe-area::before {
  content: "";
  position: absolute;
  inset: 0;
  border: 2px dashed var(--safe-border);
  pointer-events: none;
  z-index: 2;
}
body.show-safe .safe-area::after {
  content: "16:9 safe area";
  position: absolute;
  top: 4px; left: 8px;
  font-size: 11px;
  color: var(--safe-border);
  pointer-events: none;
  z-index: 2;
  background: rgba(0,0,0,0.4);
  padding: 2px 6px;
  border-radius: 3px;
}

/* ───── Header (top) — body と同じグリッド (1fr 700px) で左ピルを問題欄幅に揃える ───── */
.hdr {
  display: grid;
  grid-template-columns: 1fr 700px;
  gap: 16px;
  align-items: center;
  height: var(--header-h);
}
.hdr-pill {
  display: inline-flex; align-items: center; gap: 12px;
  background:
    linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 4px solid var(--wood-dark);
  border-radius: 50px;
  padding: 6px 18px;
  height: calc(100% - 14px);
  box-shadow: 0 4px 0 var(--wood-dark), 0 6px 12px var(--paper-shadow);
}
.hdr-left {
  gap: 16px;
  padding: 6px 18px 6px 8px;
  width: 100%;
  justify-content: flex-start;
}
.hdr-left .owl-icon {
  width: 64px; height: 64px;
  background: linear-gradient(180deg, #f4e4c4, #d8b78a);
  border: 3px solid var(--wood-dark);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  flex: 0 0 auto;
}
.hdr-left .title-card {
  background: linear-gradient(180deg, #c97a3e, #8a4f1f);
  border: 3px solid var(--wood-dark);
  border-radius: 12px;
  padding: 4px 14px;
  color: #fff7d0;
  font-weight: 800;
  font-size: 18px;
  text-shadow: 0 2px 0 rgba(0,0,0,0.4);
  text-align: center;
  line-height: 1.1;
  flex: 0 0 auto;
}
.hdr-left .title-card small { font-size: 11px; display: block; }
.hdr-left .progress-num {
  background: linear-gradient(180deg, #fff8e0, #f0dfa6);
  border: 2px solid var(--wood-dark);
  border-radius: 16px;
  padding: 4px 18px;
  font-weight: 900;
  font-size: 22px;
  color: var(--text);
  flex: 0 0 auto;
}
.hdr-left .progress-num { margin-left: auto; }  /* B 位置に移動 */
.hdr-left .dots {
  display: inline-flex; gap: 10px; flex: 0 0 auto;
}
.hdr-left .dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: #d6b56a; border: 2px solid var(--wood-mid);
}
.hdr-left .dot.done { background: #f3a330; }

.hdr-center {
  justify-self: center;
  display: inline-flex; align-items: center; gap: 16px;
  color: var(--text);
}
.hdr-center .progress-num {
  background: linear-gradient(180deg, #fff8e0, #f0dfa6);
  border: 2px solid var(--wood-dark);
  border-radius: 16px;
  padding: 4px 18px;
  font-weight: 900;
  font-size: 22px;
}
.hdr-center .dots {
  display: inline-flex; gap: 10px;
}
.hdr-center .dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: #d6b56a;
  border: 2px solid var(--wood-mid);
}
.hdr-center .dot.done { background: #f3a330; }

.hdr-right {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  justify-self: end;
}
.hdr-right .ctrl-btn {
  /* ヘッダー 150px に合わせて 120×120 正方形 */
  display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
  width: 120px;
  height: 120px;
  padding: 8px;
  font-weight: 800;
  font-size: 16px;
  gap: 6px;
}
.hdr-right .ctrl-btn .icon { font-size: 40px; line-height: 1; }

/* ───── Body ───── */
.body {
  display: grid;
  grid-template-columns: 1fr 700px;
  gap: 16px;
  height: 100%;
  align-items: stretch;
}

/* Question column (left) — 上下空間を均等に */
.q-col {
  display: flex;
  flex-direction: column;
  gap: 12px;
  height: 100%;
  justify-content: center;
}
.q-text-card {
  /* 想定サイズ: 1000×170 (アスペクト比 ≈ 6:1) */
  background: linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 5px solid var(--wood-dark);
  border-radius: 18px;
  padding: 22px 80px 22px 32px;  /* 右は audio ボタン分の余白 */
  display: flex; align-items: center; justify-content: center; gap: 16px;
  color: var(--text);
  font-weight: 800;
  font-size: 32px;
  min-height: 170px;  /* 最長 29 文字 (2 行折返) + 余裕 */
  line-height: 1.4;
  position: relative;
  box-shadow: 0 6px 0 var(--wood-dark), 0 8px 16px var(--paper-shadow);
}
.q-text-card .feather {
  position: absolute; top: -10px; left: 16px;
  font-size: 28px;
  transform: rotate(-12deg);
}
.q-text-card .audio {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  width: 48px; height: 48px;
  border-radius: 50%;
  background: linear-gradient(180deg, var(--wood-light), var(--wood-mid));
  border: 3px solid var(--wood-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  color: #fff;
}

.board {
  /* 想定アスペクト比: ~1000×500 (約 2:1)、 画像差替時もこの比を保つこと */
  background: linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 5px solid var(--wood-dark);
  border-radius: 18px;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: inset 0 -4px 0 rgba(120, 80, 20, 0.15), 0 4px 12px var(--paper-shadow);
  height: 500px;
  /* 中身がどれだけ大きくなっても外枠は伸びない */
  overflow: hidden;
}
/* 列の伸び対策: q-col は親の grid 1fr 内に固定 */
.q-col, .a-col { min-width: 0; }
.board::before {
  content: "";
  position: absolute;
  inset: 6px;
  border: 1px dashed var(--frame-border);
  border-radius: 12px;
  pointer-events: none;
  opacity: 0.0; /* デフォルト非表示、 デバッグ用 */
}
body.show-board-frame .board::before { opacity: 1; }

.slot {
  width: var(--slot-size);
  height: var(--slot-size);
  background: var(--slot-color);
  border-radius: var(--slot-radius);
  display: flex; align-items: center; justify-content: center;
  color: #888;
  font-size: 14px;
  flex: 0 0 auto;
  background-position: center;
  background-size: contain;
  background-repeat: no-repeat;
  position: relative;
}
.slot.has-img { background-color: transparent; color: transparent; }
.row { display: flex; gap: var(--gap); align-items: center; justify-content: center; }
.grid {
  display: flex; flex-direction: column;
  gap: var(--gap);
  align-items: center; justify-content: center;
}
.grid .row { gap: var(--gap); }

/* Answer column (right) — 4 chips + bottom-right (hint+owl) を縦に。
   q-col と同じ縦中央寄せ → bottom-right の下辺が board の下辺と揃う */
.a-col {
  display: flex; flex-direction: column;
  gap: 18px;
  height: 100%;
  justify-content: center;
}
/* 答えチップ 4 個を囲うトレイ (土台)
   想定アスペクト比: ~700×500 (約 7:5)、 画像差替時はそのまま 1 枚絵で置換 */
.answer-tray {
  background: #b07a3a;
  border: 5px solid var(--wood-dark);
  border-radius: 18px;
  padding: 18px;
  flex: 0 0 auto;
}
.answer-panel {
  /* 想定: 各 chip ~322×220 (1.46:1) */
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 16px;
}
.bottom-right {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-top: 8px;  /* 答えトレイの直下に置く、 余分な空間を作らない */
}
.bottom-right .hint {
  flex: 1 1 auto;
  margin: 0;
  align-self: center;
}
.bottom-right .character {
  flex: 0 0 auto;
}
.chip {
  /* 想定アスペクト比: ~341×220 (≈1.55:1)、 画像差替時 background-size: contain で */
  background: linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 5px solid var(--wood-dark);
  border-radius: 18px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  color: var(--text);
  font-weight: 800;
  font-size: 28px;
  box-shadow: 0 4px 0 var(--wood-dark), 0 6px 12px var(--paper-shadow);
  position: relative;
  height: 220px;
}
.chip .circle {
  width: 110px; height: 110px;
  border-radius: 50%;
  background:
    repeating-linear-gradient(135deg,
      rgba(255,255,255,0.04) 0 4px,
      rgba(0,0,0,0.06) 4px 8px),
    var(--slot-color);
  border: 3px solid rgba(0,0,0,0.1);
}
.chip[data-color="red"]    .circle { background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #d23f3f; }
.chip[data-color="blue"]   .circle { background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #3d6dc7; }
.chip[data-color="yellow"] .circle { background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #e8c43a; }
.chip[data-color="green"]  .circle { background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #4ea84e; }

/* (旧 footer-row は a-col 内へ移動、 ここはレガシー残し) */
.footer-row { display: none; }
.hint {
  /* 想定アスペクト比: ~600×120 (5:1) */
  background: linear-gradient(180deg, #fff8d4, var(--hint-bg));
  border: 4px solid #b89a3a;
  border-radius: 16px;
  padding: 28px 32px;
  color: var(--text);
  font-size: 24px;
  font-weight: 700;
  max-width: 700px;
  min-height: 120px;
  display: flex;
  align-items: center;
  box-shadow: 0 4px 0 #b89a3a, 0 6px 12px var(--paper-shadow);
}
.character {
  width: 200px; height: 220px;
  background:
    radial-gradient(ellipse at 50% 30%, var(--owl-bg) 0%, #5a3a8a 100%);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  display: flex; align-items: center; justify-content: center;
  font-size: 96px;
  border: 4px solid #5a3a8a;
  position: relative;
  margin-bottom: -8px;
}

/* ───── Annotation overlay ───── */
#anno-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 50;
}
#anno-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.anno-mode #anno-layer { pointer-events: auto; cursor: crosshair; }
.anno-marker {
  position: absolute;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: #ff3b6b;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800;
  font-size: 16px;
  transform: translate(-50%, -50%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  cursor: move;
  user-select: none;
}
.anno-text {
  position: absolute;
  background: rgba(255, 240, 100, 0.95);
  color: #222;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  transform: translate(-50%, -50%);
  cursor: move;
  user-select: none;
  border: 2px solid #b89a3a;
  max-width: 240px;
}
.anno-arrow-line {
  stroke: #ff3b6b;
  stroke-width: var(--arrow-stroke, 4);
  fill: none;
  cursor: move;
  pointer-events: stroke;
  stroke-linecap: round;
}
.anno-arrow-line.with-head { marker-end: url(#anno-arrow-head); }
.anno-rect {
  fill: rgba(255, 59, 107, 0.05);
  stroke: #ff3b6b;
  stroke-width: 4;
  stroke-dasharray: 8 4;
  cursor: move;
  pointer-events: all;
}
.anno-marker, .anno-text { cursor: move; }
.anno-selected { outline: 3px solid #00d4ff; outline-offset: 2px; }
line.anno-arrow-line.anno-selected, rect.anno-rect.anno-selected {
  stroke: #00d4ff !important; outline: none !important;
}
.anno-handle {
  fill: #00d4ff; stroke: #fff; stroke-width: 2;
  cursor: nwse-resize; pointer-events: all;
}
.anno-handle.endpoint { cursor: grab; }
.anno-handle-hit {
  fill: rgba(0, 212, 255, 0.001);
  stroke: none;
  pointer-events: all;
  cursor: grab;
}
.anno-tip {
  position: fixed;
  bottom: 16px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 12px;
  z-index: 200;
  pointer-events: none;
}
body.eraser-mode #anno-layer { cursor: crosshair; }
.tool-btn { font-size: 12px; }
#anno-tools { display: none; gap: 6px; }
body.anno-mode #anno-tools { display: inline-flex !important; }

/* ───── Preview mode (端末サイズで見る) ───── */
#preview-exit {
  display: none;
  position: fixed;
  top: 12px; right: 12px;
  z-index: 1000;
  background: rgba(0, 0, 0, 0.75);
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.3);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
}
body.preview-mode #preview-exit { display: block; }
body.preview-mode .toolbar { display: none; }
body.preview-mode .anno-tip { display: none !important; }
body.preview-mode .stage-wrap {
  position: fixed;
  inset: 0;
  padding: 0;
  margin: 0;
  overflow: hidden;
  background: #000;
}
body.preview-mode .stage {
  position: absolute;
  top: 0;
  left: 0;
  margin: 0;
  /* transform set by JS で translate + scale */
}

/* ───── Wireframe mode (全要素を単純なバウンディングボックスに) ───── */
.hdr-pill,
.hdr-left .title-card,
.hdr-left .progress-num,
.hdr-right .ctrl-btn,
.q-text-card,
.board,
.chip,
.answer-tray,
.hint,
.character {
  background: var(--bbox-bg) !important;
  border: 1px dashed var(--bbox-border) !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  text-shadow: none !important;
  color: var(--bbox-label) !important;
}
/* 内側パーツも矩形に — 丸を消して画像生成時に丸が焼き込まれないように */
.hdr-left .owl-icon,
.chip .circle,
.q-text-card .audio {
  background: var(--bbox-bg) !important;
  border: 1px dashed var(--bbox-border) !important;
  border-radius: 0 !important;
}
/* ドットも丸じゃなく小さい矩形に */
.hdr-left .dot {
  border-radius: 0 !important;
  background: var(--bbox-bg) !important;
  border: 1px dashed var(--bbox-border) !important;
}
.hdr-left .dot.done { background: #c89a4a !important; }
/* キャラクター: 卵形をやめて単純な四角バウンディングボックス */
.character {
  border-radius: 0 !important;
  width: 200px !important;
  height: 168px !important;  /* a-col 合計 = q-col 合計に揃える */
  font-size: 56px;
}

/* ───── Resize mode (ドラッグで各バウンディングボックスを伸縮 + 移動 + ルーラー/ガイド) ───── */
body.resize-mode .resizable {
  position: relative;
  outline: 2px dashed rgba(0, 212, 255, 0.6);
  outline-offset: 2px;
  cursor: move;  /* body ドラッグで移動 */
}
.resize-handle {
  position: absolute;
  background: #00d4ff;
  border: 2px solid #fff;
  z-index: 60;
  pointer-events: auto;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
/* 辺ハンドル: 細長い四角 */
.resize-handle.edge-n,
.resize-handle.edge-s {
  left: 50%; transform: translateX(-50%);
  width: 28px; height: 14px;
  cursor: ns-resize;
}
.resize-handle.edge-e,
.resize-handle.edge-w {
  top: 50%; transform: translateY(-50%);
  width: 14px; height: 28px;
  cursor: ew-resize;
}
.resize-handle.edge-n { top: -8px; }
.resize-handle.edge-s { bottom: -8px; }
.resize-handle.edge-e { right: -8px; }
.resize-handle.edge-w { left: -8px; }
/* 角ハンドル: 正方形 */
.resize-handle.corner-nw,
.resize-handle.corner-ne,
.resize-handle.corner-sw,
.resize-handle.corner-se {
  width: 16px; height: 16px;
}
.resize-handle.corner-nw { top: -9px; left: -9px; cursor: nwse-resize; }
.resize-handle.corner-ne { top: -9px; right: -9px; cursor: nesw-resize; }

.resize-size-label {
  position: absolute;
  bottom: 6px; right: 6px;

  font-size: 11px;

  border-radius: 3px;
  z-index: 59;

}
body:not(.resize-mode) .resize-handle,
body:not(.resize-mode) .resize-size-label { display: none; }

/* ─── ルーラー + ガイドライン ─── */
.ruler {
  position: absolute;
  background:
    linear-gradient(180deg, #2a2a2a, #1a1a1a);
  z-index: 70;
  pointer-events: auto;
  display: none;

body.resize-mode .ruler { display: block; }
.ruler {

}
.ruler.horizontal {
  top: var(--toolbar-h, 0); left: 24px; right: 0;
  height: 24px;
  background-image:
    repeating-linear-gradient(90deg,
      transparent 0 49px,
      rgba(255,255,255,0.4) 49px 50px,
      transparent 50px 99px,
      rgba(255,255,255,0.7) 99px 100px);
  cursor: ns-resize;
}
.ruler.vertical {
  top: calc(var(--toolbar-h, 0) + 24px); left: 0; bottom: 0;
  width: 24px;
  background-image:
    repeating-linear-gradient(180deg,
      transparent 0 49px,
      rgba(255,255,255,0.4) 49px 50px,

      rgba(255,255,255,0.7) 99px 100px);

.guide {

.guide:hover { background: #00d4ff; }
.guide-label {

/* Debug bbox */

<script>
// ───── Per-variant slot sizes (個数ごとに最適なサイズを記憶) ─────
const SLOT_SIZE_DEFAULTS = {
  'row-3':  { slot: 220, gap: 16 },
  'row-4':  { slot: 180, gap: 16 },
  'row-5':  { slot: 140, gap: 16 },
  'grid-1': { slot: 300, gap: 16 },
  'grid-2': { slot: 240, gap: 16 },
  'grid-3': { slot: 220, gap: 16 },
  'grid-4': { slot: 200, gap: 16 },
  'grid-5': { slot: 170, gap: 16 },
  'grid-6': { slot: 160, gap: 16 },
  'grid-7': { slot: 140, gap: 16 },
  'grid-8': { slot: 130, gap: 16 },
  'grid-9': { slot: 130, gap: 16 },
};
const PER_VARIANT_KEY = 'quizland_preview_per_variant_v1';
function getPerVariantSizes() {
  try { return JSON.parse(localStorage.getItem(PER_VARIANT_KEY)) || {}; }
  catch(e) { return {}; }
}
function savePerVariantSize(variant, slot, gap) {
  const data = getPerVariantSizes();
  data[variant] = { slot, gap };
  try { localStorage.setItem(PER_VARIANT_KEY, JSON.stringify(data)); } catch(e) {}
}
function applyVariantSize(variant) {
  const data = getPerVariantSizes();
  const s = data[variant] || SLOT_SIZE_DEFAULTS[variant] || { slot: 130, gap: 16 };
  document.documentElement.style.setProperty('--slot-size', s.slot + 'px');
  document.documentElement.style.setProperty('--gap', s.gap + 'px');
  const slotInput = document.getElementById('slot-size');
  const gapInput = document.getElementById('gap');
  if (slotInput) slotInput.value = s.slot;
  if (gapInput) gapInput.value = s.gap;
}

// ───── Layout rendering ─────
function buildLayout(value) {
  const [type, n] = value.split('-');
  const count = parseInt(n, 10);
  const board = document.getElementById('board');
  board.innerHTML = '';

  function slot() {
    const d = document.createElement('div');
    d.className = 'slot';
    d.textContent = 'slot';
    if (currentImg) {
      d.style.backgroundImage = `url(${currentImg})`;
      d.classList.add('has-img');
    }
    return d;
  }
  function row(slotsCount) {
    const r = document.createElement('div');
    r.className = 'row';
    for (let i = 0; i < slotsCount; i++) r.appendChild(slot());
    return r;
  }
  function grid(rows) {
    const g = document.createElement('div');
    g.className = 'grid';
    for (const n of rows) g.appendChild(row(n));
    return g;
  }

  if (type === 'row') {
    board.appendChild(row(count));
  } else if (type === 'grid') {
    const layouts = {
      1: [1], 2: [2], 3: [3],
      4: [2, 2], 5: [3, 2], 6: [3, 3],
      7: [4, 3], 8: [4, 4], 9: [3, 3, 3]
    };
    board.appendChild(grid(layouts[count]));
  }
  // 個数ごとに保存されたサイズ (またはデフォルト) を反映
  applyVariantSize(value);
  updateBboxLabels();
}

let currentImg = null;
function setSlotImage(url) {
  currentImg = url;
  document.querySelectorAll('.slot').forEach(s => {
    if (url) {
      s.style.backgroundImage = `url(${url})`;
      s.classList.add('has-img');
    } else {
      s.style.backgroundImage = '';
      s.classList.remove('has-img');
    }
  });
}

function updateBboxLabels() {
  document.querySelectorAll('.slot').forEach(s => {
    const r = s.getBoundingClientRect();
    s.dataset.bbox = `${Math.round(r.width)}×${Math.round(r.height)}`;
  });
}

document.getElementById('layout-select').addEventListener('change', e => { buildLayout(e.target.value); scheduleSave(); });
document.getElementById('img-file').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => setSlotImage(reader.result);
  reader.readAsDataURL(f);
});
document.getElementById('img-clear').addEventListener('click', () => {
  setSlotImage(null);
  document.getElementById('img-file').value = '';
});
document.getElementById('slot-size').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  document.documentElement.style.setProperty('--slot-size', v + 'px');
  // 現在の variant に紐付けて保存
  const variant = document.getElementById('layout-select').value;
  const gap = parseInt(document.getElementById('gap').value);
  savePerVariantSize(variant, v, gap);
  updateBboxLabels();
  scheduleSave();
});
document.getElementById('gap').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  document.documentElement.style.setProperty('--gap', v + 'px');
  const variant = document.getElementById('layout-select').value;
  const slot = parseInt(document.getElementById('slot-size').value);
  savePerVariantSize(variant, slot, v);
  updateBboxLabels();
  scheduleSave();
});
document.getElementById('arrow-stroke').addEventListener('input', e => {
  document.documentElement.style.setProperty('--arrow-stroke', e.target.value);
  scheduleSave();
});
document.getElementById('show-bbox').addEventListener('change', e => {
  document.body.classList.toggle('show-bbox', e.target.checked);
  if (e.target.checked) updateBboxLabels();
  scheduleSave();
});
document.getElementById('show-safe').addEventListener('change', e => {
  document.body.classList.toggle('show-safe', e.target.checked);
  scheduleSave();
});

// ───── Annotation system ─────
const stage = document.getElementById('stage');
const annoLayer = document.getElementById('anno-layer');
const annoSvg = document.getElementById('anno-svg');
const annoToggle = document.getElementById('anno-toggle');
const annoClear = document.getElementById('anno-clear');
const annoReset = document.getElementById('anno-reset');
const annoTip = document.getElementById('anno-tip');
const annoTipText = document.getElementById('anno-tip-text');

let annoMode = false;
let currentTool = 'select';
const labelChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
let labelIdx = 0;
let selectedEl = null;

// ── localStorage 自動保存 ──
const STORAGE_KEY = 'quizland_preview_state_v1';
let saveTimer = null;
function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 300);
}
function collectState() {
  return {
    markers: [...annoLayer.querySelectorAll('.anno-marker')].map(m => ({
      x: parseFloat(m.style.left), y: parseFloat(m.style.top), label: m.textContent
    })),
    texts: [...annoLayer.querySelectorAll('.anno-text')].map(t => ({
      x: parseFloat(t.style.left), y: parseFloat(t.style.top), content: t.textContent
    })),
    rects: [...annoSvg.querySelectorAll('rect.anno-rect')].map(r => ({
      x: +r.getAttribute('x'), y: +r.getAttribute('y'),
      w: +r.getAttribute('width'), h: +r.getAttribute('height')
    })),
    arrows: [...annoSvg.querySelectorAll('line.anno-arrow-line')].map(l => ({
      x1: +l.getAttribute('x1'), y1: +l.getAttribute('y1'),
      x2: +l.getAttribute('x2'), y2: +l.getAttribute('y2'),
      head: l.classList.contains('with-head')
    })),
    labelIdx,
    settings: {
      layout: document.getElementById('layout-select').value,
      slotSize: document.getElementById('slot-size').value,
      gap: document.getElementById('gap').value,
      arrowStroke: document.getElementById('arrow-stroke').value,
      showBbox: document.getElementById('show-bbox').checked,
      showSafe: document.getElementById('show-safe').checked,
    }
  };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(collectState())); } catch(e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);

    // 設定を先に適用
    const s = data.settings || {};
    if (s.layout) {
      document.getElementById('layout-select').value = s.layout;
    }
    if (s.slotSize) {
      document.getElementById('slot-size').value = s.slotSize;
      document.documentElement.style.setProperty('--slot-size', s.slotSize + 'px');
    }
    if (s.gap) {
      document.getElementById('gap').value = s.gap;
      document.documentElement.style.setProperty('--gap', s.gap + 'px');
    }
    if (s.arrowStroke) {
      document.getElementById('arrow-stroke').value = s.arrowStroke;
      document.documentElement.style.setProperty('--arrow-stroke', s.arrowStroke);
    }
    if (typeof s.showBbox === 'boolean') {
      document.getElementById('show-bbox').checked = s.showBbox;
      document.body.classList.toggle('show-bbox', s.showBbox);
    }
    if (typeof s.showSafe === 'boolean') {
      document.getElementById('show-safe').checked = s.showSafe;
      document.body.classList.toggle('show-safe', s.showSafe);
    }

    // 注釈を復元 (履歴には登録しない)
    (data.markers || []).forEach(m => restoreMarker(m.x, m.y, m.label));
    (data.texts || []).forEach(t => restoreText(t.x, t.y, t.content));
    (data.rects || []).forEach(r => restoreRect(r.x, r.y, r.w, r.h));
    (data.arrows || []).forEach(a => restoreArrow(a.x1, a.y1, a.x2, a.y2, a.head !== false));

    if (typeof data.labelIdx === 'number') labelIdx = data.labelIdx;
    return true;
  } catch(e) { return false; }
}
function restoreMarker(x, y, label) {
  const m = document.createElement('div');
  m.className = 'anno-marker';
  m.style.left = x + 'px'; m.style.top = y + 'px';
  m.textContent = label;
  annoLayer.appendChild(m);
  attachDeleteHandlers(m);
  m.addEventListener('dblclick', ev => {
    ev.stopPropagation();
    const t = prompt('ラベル', m.textContent);
    if (t !== null) { m.textContent = t; scheduleSave(); }
  });
}
function restoreText(x, y, content) {
  const t = document.createElement('div');
  t.className = 'anno-text';
  t.style.left = x + 'px'; t.style.top = y + 'px';
  t.textContent = content;
  annoLayer.appendChild(t);
  attachDeleteHandlers(t);
  t.addEventListener('dblclick', ev => {
    ev.stopPropagation();
    const v = prompt('編集 (空で削除)', t.textContent);
    if (v === null) return;
    if (v === '') removeElWithHistory(t);
    else { t.textContent = v; scheduleSave(); }
  });
}
function restoreRect(x, y, w, h) {
  const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  r.setAttribute('class', 'anno-rect'); r.setAttribute('rx', 6);
  r.setAttribute('x', x); r.setAttribute('y', y);
  r.setAttribute('width', w); r.setAttribute('height', h);
  annoSvg.appendChild(r);
  attachDeleteHandlers(r);
}
function restoreArrow(x1, y1, x2, y2, hasHead) {
  const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  l.setAttribute('class', hasHead ? 'anno-arrow-line with-head' : 'anno-arrow-line');
  l.setAttribute('x1', x1); l.setAttribute('y1', y1);
  l.setAttribute('x2', x2); l.setAttribute('y2', y2);
  annoSvg.appendChild(l);
  attachDeleteHandlers(l);
}
function clearAllSavedState() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  document.querySelectorAll('.anno-marker, .anno-text').forEach(el => el.remove());
  annoSvg.querySelectorAll('.anno-arrow-line, .anno-rect, .anno-handle, .anno-handle-hit').forEach(el => el.remove());
  selectedEl = null;
  labelIdx = 0;
  undoStack.length = 0;
  redoStack.length = 0;
}

const undoStack = [];
const redoStack = [];
function pushHistory(op) {
  undoStack.push(op);
  if (undoStack.length > 100) undoStack.shift();
  redoStack.length = 0;
  scheduleSave();
}
function applyOp(op) {
  if (op.type === 'add') op.parent.insertBefore(op.el, op.next || null);
  else if (op.type === 'remove') op.el.remove();
  else if (op.type === 'transform') { setGeometry(op.el, op.after); if (op.el === selectedEl) updateHandles(); }
  else if (op.type === 'resize') { setResize(op.el, op.after); }
  else if (op.type === 'guide-move') { setGuidePos(op.el, op.after); }
  scheduleSave();
}
function applyInverse(op) {
  if (op.type === 'add') { op.el.remove(); if (op.el === selectedEl) selectEl(null); }
  else if (op.type === 'remove') op.parent.insertBefore(op.el, op.next || null);
  else if (op.type === 'transform') { setGeometry(op.el, op.before); if (op.el === selectedEl) updateHandles(); }
  else if (op.type === 'resize') { setResize(op.el, op.before); }
  else if (op.type === 'guide-move') { setGuidePos(op.el, op.before); }
  scheduleSave();
}
// リサイズ要素の状態適用
function setResize(el, st) {
  el.style.width = st.w || '';
  el.style.height = st.h || '';
  el._tx = st.tx || 0;
  el._ty = st.ty || 0;
  if (el._tx || el._ty) {
    el.style.transform = `translate(${el._tx}px, ${el._ty}px)`;
  } else {
    el.style.transform = '';
  }
  if (el.matches('.hdr-left') && st.h) {
    document.documentElement.style.setProperty('--header-h', st.h);
  }
  el._resizeUpdateLabel && el._resizeUpdateLabel();
  saveResizeState();
}
function setGuidePos(el, pos) {
  if (el.classList.contains('h')) el.style.top = pos + 'px';
  else el.style.left = pos + 'px';
  const lbl = el.querySelector('.guide-label');
  if (lbl) lbl.textContent = (el.classList.contains('h') ? 'y: ' : 'x: ') + Math.round(pos) + 'px';
  saveResizeState();
}
function undo() {
  if (!undoStack.length) return;
  const op = undoStack.pop(); applyInverse(op); redoStack.push(op);
}
function redo() {
  if (!redoStack.length) return;
  const op = redoStack.pop(); applyOp(op); undoStack.push(op);
}

function getGeometry(el) {
  if (el.classList.contains('anno-marker') || el.classList.contains('anno-text')) {
    return { kind: 'pos', left: parseFloat(el.style.left), top: parseFloat(el.style.top) };
  }
  if (el.tagName === 'line') {
    return { kind: 'line',
      x1: +el.getAttribute('x1'), y1: +el.getAttribute('y1'),
      x2: +el.getAttribute('x2'), y2: +el.getAttribute('y2') };
  }
  if (el.tagName === 'rect') {
    return { kind: 'rect',
      x: +el.getAttribute('x'), y: +el.getAttribute('y'),
      w: +el.getAttribute('width'), h: +el.getAttribute('height') };
  }
}
function setGeometry(el, g) {
  if (g.kind === 'pos') { el.style.left = g.left + 'px'; el.style.top = g.top + 'px'; }
  else if (g.kind === 'line') { el.setAttribute('x1', g.x1); el.setAttribute('y1', g.y1); el.setAttribute('x2', g.x2); el.setAttribute('y2', g.y2); }
  else if (g.kind === 'rect') { el.setAttribute('x', g.x); el.setAttribute('y', g.y); el.setAttribute('width', g.w); el.setAttribute('height', g.h); }
}

const TIP_TEXTS = {

function nextLabelChar() { const c = labelChars[labelIdx % labelChars.length]; labelIdx++; return c; }
function setAnnoMode(on) {

}
function setTool(tool) {

annoClear.addEventListener('click', () => {

function selectEl(el) {
  if (selectedEl) selectedEl.classList.remove('anno-selected');
  clearHandles();
  selectedEl = el;
  if (el) { el.classList.add('anno-selected'); updateHandles(); }
}
function clearHandles() {
  annoSvg.querySelectorAll('.anno-handle, .anno-handle-hit').forEach(h => h.remove());
}
function updateHandles() {
  clearHandles();
  if (!selectedEl) return;
  const g = getGeometry(selectedEl);
  if (g.kind === 'line') { addHandle(g.x1, g.y1, 'p1'); addHandle(g.x2, g.y2, 'p2'); }
  else if (g.kind === 'rect') {
    addHandle(g.x, g.y, 'tl'); addHandle(g.x + g.w, g.y, 'tr');
    addHandle(g.x, g.y + g.h, 'bl'); addHandle(g.x + g.w, g.y + g.h, 'br');
  }
}
function addHandle(x, y, role) {
  const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  hit.setAttribute('class', 'anno-handle anno-handle-hit');
  hit.setAttribute('cx', x); hit.setAttribute('cy', y); hit.setAttribute('r', 18);
  hit.dataset.role = role;
  annoSvg.appendChild(hit);

  const h = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  h.setAttribute('class', 'anno-handle endpoint');
  h.setAttribute('cx', x); h.setAttribute('cy', y); h.setAttribute('r', 9);
  h.dataset.role = role;
  annoSvg.appendChild(h);

  const handler = (ev) => {
    ev.stopPropagation();
    ev.preventDefault();
    const before = getGeometry(selectedEl);
    const target = selectedEl;
    const onMove = (e2) => {
      const p = getStageCoords(e2);
      const g = getGeometry(target);
      if (g.kind === 'line') {
        if (role === 'p1') { g.x1 = p.x; g.y1 = p.y; } else { g.x2 = p.x; g.y2 = p.y; }
      } else if (g.kind === 'rect') {
        let x1 = g.x, y1 = g.y, x2 = g.x + g.w, y2 = g.y + g.h;
        if (role === 'tl') { x1 = p.x; y1 = p.y; }
        else if (role === 'tr') { x2 = p.x; y1 = p.y; }
        else if (role === 'bl') { x1 = p.x; y2 = p.y; }
        else if (role === 'br') { x2 = p.x; y2 = p.y; }
        g.x = Math.min(x1, x2); g.y = Math.min(y1, y2);
        g.w = Math.abs(x2 - x1); g.h = Math.abs(y2 - y1);
      }
      setGeometry(target, g); updateHandles();
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      const after = getGeometry(target);
      if (JSON.stringify(after) !== JSON.stringify(before)) {
        pushHistory({ type: 'transform', el: target, before, after });
      }
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };
  hit.addEventListener('mousedown', handler);
  h.addEventListener('mousedown', handler);
  const stop = (ev) => ev.stopPropagation();
  hit.addEventListener('click', stop);
  h.addEventListener('click', stop);
}

function getStageCoords(e) {
  const r = stage.getBoundingClientRect();
  // scale 対応 (preview mode で stage が transform: scale されている場合に正しい内部座標にする)
  const internalW = parseFloat(getComputedStyle(stage).width) || r.width;
  const internalH = parseFloat(getComputedStyle(stage).height) || r.height;
  const sx = r.width / internalW;
  const sy = r.height / internalH;
  return {
    x: (e.clientX - r.left) / (sx || 1),
    y: (e.clientY - r.top) / (sy || 1)
  };
}

function removeElWithHistory(el) {
  pushHistory({ type: 'remove', el, parent: el.parentNode, next: el.nextSibling });
  el.remove();
  if (el === selectedEl) selectEl(null);
}
function attachDeleteHandlers(el) {
  el.addEventListener('contextmenu', ev => {
    ev.preventDefault();
    if (confirm('この注釈を削除しますか？')) removeElWithHistory(el);
  });
  el.addEventListener('click', ev => {
    if (!annoMode) return;
    if (currentTool === 'eraser') { ev.stopPropagation(); removeElWithHistory(el); }
    // 他のツール (作成系) ではバブルさせる → annoLayer の click でマーカー/テキストが追加される
  });
  el.addEventListener('mousedown', ev => {
    if (!annoMode) return;
    // 選択ツールでのみ移動可能。 他のツール (マーカー/テキスト/矩形/矢印) はバブリングして新規作成
    if (currentTool !== 'select') return;
    if (ev.target.classList && (ev.target.classList.contains('anno-handle') || ev.target.classList.contains('anno-handle-hit'))) return;
    ev.stopPropagation();
    selectEl(el);
    const startPt = getStageCoords(ev);
    const beforeGeo = getGeometry(el);
    let moved = false;
    const onMove = (e2) => {
      const p = getStageCoords(e2);
      const dx = p.x - startPt.x, dy = p.y - startPt.y;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) moved = true;
      if (!moved) return;
      const g = JSON.parse(JSON.stringify(beforeGeo));
      if (g.kind === 'pos') { g.left += dx; g.top += dy; }
      else if (g.kind === 'line') { g.x1 += dx; g.y1 += dy; g.x2 += dx; g.y2 += dy; }
      else if (g.kind === 'rect') { g.x += dx; g.y += dy; }
      setGeometry(el, g); updateHandles();
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      if (moved) {
        const afterGeo = getGeometry(el);
        pushHistory({ type: 'transform', el, before: beforeGeo, after: afterGeo });
      }
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
}

let dragStart = null;
let tempShape = null;
annoLayer.addEventListener('mousedown', e => {
  if (!annoMode) return;
  // ハンドルだけは早期 return (それ自身のドラッグハンドラに任せる)
  if (e.target.classList && (e.target.classList.contains('anno-handle') ||
                              e.target.classList.contains('anno-handle-hit'))) return;

  // 選択ツール: 背景を押したら選択解除
  if (currentTool === 'select') {
    if (!e.target.closest('.anno-marker, .anno-text') &&
        !(e.target.classList && (e.target.classList.contains('anno-arrow-line') || e.target.classList.contains('anno-rect')))) {
      selectEl(null);
    }
    return;
  }

  if (currentTool === 'rect' || currentTool === 'arrow' || currentTool === 'line') {
    e.preventDefault();
    dragStart = getStageCoords(e);
    if (currentTool === 'rect') {
      tempShape = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      tempShape.setAttribute('class', 'anno-rect'); tempShape.setAttribute('rx', 6);
    } else {
      tempShape = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      // arrow ツールには .with-head クラスを付けて先端を出す。 line はクラス無しで素線
      tempShape.setAttribute('class', currentTool === 'arrow' ? 'anno-arrow-line with-head' : 'anno-arrow-line');
    }
    annoSvg.appendChild(tempShape);
    const onMove = (e2) => {
      const p = getStageCoords(e2);
      if (currentTool === 'rect') {
        const x = Math.min(dragStart.x, p.x), y = Math.min(dragStart.y, p.y);
        const w = Math.abs(p.x - dragStart.x), h = Math.abs(p.y - dragStart.y);
        tempShape.setAttribute('x', x); tempShape.setAttribute('y', y);
        tempShape.setAttribute('width', w); tempShape.setAttribute('height', h);
      } else {
        tempShape.setAttribute('x1', dragStart.x); tempShape.setAttribute('y1', dragStart.y);
        tempShape.setAttribute('x2', p.x); tempShape.setAttribute('y2', p.y);
      }
    };
    const onUp = (e2) => {
      const p = getStageCoords(e2);
      const dx = p.x - dragStart.x, dy = p.y - dragStart.y;
      if (Math.abs(dx) < 4 && Math.abs(dy) < 4) { tempShape && tempShape.remove(); }
      else { attachDeleteHandlers(tempShape); pushHistory({ type: 'add', el: tempShape, parent: annoSvg, next: null }); }
      tempShape = null; dragStart = null;
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }
});

window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if ((e.key === 'Delete' || e.key === 'Backspace') && annoMode && selectedEl) {
    e.preventDefault(); removeElWithHistory(selectedEl); return;
  }
  // Ctrl+Z / Cmd+Z: 注釈・リサイズ・移動・ガイド全部に効く
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && (e.key === 'z' || e.key === 'Z')) { e.preventDefault(); undo(); return; }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && (e.key === 'z' || e.key === 'Z')))) { e.preventDefault(); redo(); return; }
  if (e.key === 'Escape') selectEl(null);
});

// ───── Resize mode (各バウンディングボックスを辺別ハンドルで伸縮 + 移動 + ルーラー/ガイド) ─────
const RESIZABLE_SPEC = [
  // selector, axes (w,h,wh), label - 全要素 wh で 4 辺 + 4 角ハンドル
  ['.hdr-left',                'wh', 'ヘッダーピル'],
  ['.hdr-left .owl-icon',      'wh', '博士アイコン'],
  ['.hdr-left .title-card',    'wh', 'タイトル札'],
  ['.hdr-left .progress-num',  'wh', '1/5'],
  ['.hdr-right .ctrl-btn',     'wh', '右ボタン'],
  ['.q-text-card',             'wh', '問題文'],
  ['.board',                   'wh', '問題ボード'],
  ['.answer-tray',             'wh', 'トレイ'],
  ['.chip',                    'wh', '選択肢'],
  ['.hint',                    'wh', 'ヒント'],
  ['.character',               'wh', 'キャラ'],
];
const RESIZE_KEY = 'quizland_preview_sizes_v1';

function saveResizeState() {
  const data = {};
  RESIZABLE_SPEC.forEach(([sel]) => {
    document.querySelectorAll(sel).forEach((el, i) => {
      data[`${sel}|${i}`] = {
        w: el.style.width || '',
        h: el.style.height || '',
        tx: el._tx || 0,
        ty: el._ty || 0,
      };
    });
  });
  data.__guides = collectGuides();
  data.__headerH = document.documentElement.style.getPropertyValue('--header-h') || '';
  try { localStorage.setItem(RESIZE_KEY, JSON.stringify(data)); } catch(e) {}
}
function loadResizeState() {
  try {
    const raw = localStorage.getItem(RESIZE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    RESIZABLE_SPEC.forEach(([sel]) => {
      document.querySelectorAll(sel).forEach((el, i) => {
        const s = data[`${sel}|${i}`];
        if (!s) return;
        if (s.w) el.style.width = s.w;
        if (s.h) el.style.height = s.h;
        if (s.tx || s.ty) {
          el._tx = s.tx || 0;
          el._ty = s.ty || 0;
          el.style.transform = `translate(${el._tx}px, ${el._ty}px)`;
        }
      });
    });
    if (data.__headerH) document.documentElement.style.setProperty('--header-h', data.__headerH);
    if (data.__guides) restoreGuides(data.__guides);
  } catch(e) {}
}
function resetResizeState() {
  if (!confirm('リサイズ・移動・ガイドを全てリセットしますか？')) return;
  try { localStorage.removeItem(RESIZE_KEY); } catch(e) {}
  RESIZABLE_SPEC.forEach(([sel]) => {
    document.querySelectorAll(sel).forEach(el => {
      el.style.width = '';
      el.style.height = '';
      el.style.transform = '';
      el._tx = 0;
      el._ty = 0;
    });
  });
  document.documentElement.style.removeProperty('--header-h');
  document.querySelectorAll('.guide').forEach(g => g.remove());
  if (document.body.classList.contains('resize-mode')) {
    disableResize();
    enableResize();
  }
}

function attachHandle(el, axes) {
  el.classList.add('resizable');
  // 辺ハンドル: axes に応じて
  const positions = [];
  if (axes.includes('h')) positions.push('edge-n', 'edge-s');
  if (axes.includes('w')) positions.push('edge-e', 'edge-w');
  if (axes.includes('w') && axes.includes('h')) {
    positions.push('corner-nw', 'corner-ne', 'corner-sw', 'corner-se');
  }
  positions.forEach(pos => makeHandle(el, pos, axes));
  // body ドラッグで移動 (ハンドル以外をドラッグ)
  attachMoveDrag(el);
  // サイズ表示
  const lbl = document.createElement('div');
  lbl.className = 'resize-size-label';
  el.appendChild(lbl);
  el._resizeUpdateLabel = () => {
    const r = el.getBoundingClientRect();
    const sr = stage.getBoundingClientRect();
    const stageW = parseFloat(getComputedStyle(stage).width);
    const scale = sr.width / stageW || 1;
    lbl.textContent = `${Math.round(r.width / scale)}×${Math.round(r.height / scale)}`;
  };
  el._resizeUpdateLabel();
}

function getResizeState(el) {
  return {
    w: el.style.width || '',
    h: el.style.height || '',
    tx: el._tx || 0,
    ty: el._ty || 0,
  };
}

function makeHandle(el, pos, axes) {
  const h = document.createElement('div');
  h.className = 'resize-handle ' + pos;
  el.appendChild(h);
  h.addEventListener('mousedown', e => {
    e.stopPropagation();
    e.preventDefault();
    const beforeState = getResizeState(el);
    const startX = e.clientX, startY = e.clientY;
    const stageRect = stage.getBoundingClientRect();
    const stageW = parseFloat(getComputedStyle(stage).width);
    const scale = stageRect.width / stageW || 1;
    const startW = el.offsetWidth;
    const startH = el.offsetHeight;
    const startTx = el._tx || 0;
    const startTy = el._ty || 0;
    const onMove = (e2) => {
      const dx = (e2.clientX - startX) / scale;
      const dy = (e2.clientY - startY) / scale;
      const sym = e2.altKey;  // Alt を押しながら → 左右/上下対称にスケール
      let newW = startW, newH = startH;
      let newTx = startTx, newTy = startTy;
      if (sym) {
        // 中心点を保ったまま 2 倍率でサイズ変更
        if (pos.includes('e')) { newW = Math.max(20, startW + 2*dx); newTx = startTx - dx; }
        if (pos.includes('w')) { newW = Math.max(20, startW - 2*dx); newTx = startTx + dx; }
        if (pos.includes('s')) { newH = Math.max(20, startH + 2*dy); newTy = startTy - dy; }
        if (pos.includes('n')) { newH = Math.max(20, startH - 2*dy); newTy = startTy + dy; }
      } else {
        // 北/西を引っ張る場合は幅/高さが減って translate も変わる (片側固定)
        if (pos.includes('e')) newW = Math.max(20, startW + dx);
        if (pos.includes('w')) { newW = Math.max(20, startW - dx); newTx = startTx + dx; }
        if (pos.includes('s')) newH = Math.max(20, startH + dy);
        if (pos.includes('n')) { newH = Math.max(20, startH - dy); newTy = startTy + dy; }
      }
      // axes 制約: w が許可されてなければ幅は触らない
      if (axes.includes('w') && (pos.includes('e') || pos.includes('w'))) {
        el.style.width = newW + 'px';
        el._tx = newTx;
      }
      if (axes.includes('h') && (pos.includes('s') || pos.includes('n'))) {
        el.style.height = newH + 'px';
        el._ty = newTy;
        // hdr-left の縦リサイズは --header-h にも連動 (グリッドの行が伸びる)
        if (el.matches('.hdr-left')) {
          document.documentElement.style.setProperty('--header-h', newH + 'px');
        }
      }
      if (newTx !== startTx || newTy !== startTy) {
        el.style.transform = `translate(${el._tx || 0}px, ${el._ty || 0}px)`;
      }
      el._resizeUpdateLabel && el._resizeUpdateLabel();
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      const after = getResizeState(el);
      if (JSON.stringify(after) !== JSON.stringify(beforeState)) {
        pushHistory({ type: 'resize', el, before: beforeState, after });
      }
      saveResizeState();
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
  return h;
}

function attachMoveDrag(el) {
  const handler = (e) => {
    if (!document.body.classList.contains('resize-mode')) return;
    if (e.target.classList.contains('resize-handle')) return;
    if (e.target !== el && !el.contains(e.target)) return;
    // body をクリックされた時のみ (ハンドル以外)
    if (e.target.classList.contains('resize-handle') ||
        e.target.classList.contains('resize-size-label')) return;
    e.stopPropagation();
    e.preventDefault();
    const beforeState = getResizeState(el);
    const startX = e.clientX, startY = e.clientY;
    const stageRect = stage.getBoundingClientRect();
    const stageW = parseFloat(getComputedStyle(stage).width);
    const scale = stageRect.width / stageW || 1;
    const startTx = el._tx || 0, startTy = el._ty || 0;
    const onMove = (e2) => {
      const dx = (e2.clientX - startX) / scale;
      const dy = (e2.clientY - startY) / scale;
      el._tx = startTx + dx;
      el._ty = startTy + dy;
      el.style.transform = `translate(${el._tx}px, ${el._ty}px)`;
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      const after = getResizeState(el);
      if (JSON.stringify(after) !== JSON.stringify(beforeState)) {
        pushHistory({ type: 'resize', el, before: beforeState, after });
      }
      saveResizeState();
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };
  el.addEventListener('mousedown', handler);
}

// ─── ルーラー + ガイド ───
function adjustRulerPos() {
  const tb = document.querySelector('.toolbar');
  const toolbarH = (tb && getComputedStyle(tb).display !== 'none') ? tb.offsetHeight : 0;
  document.documentElement.style.setProperty('--toolbar-h', toolbarH + 'px');
}
function setupRulers() {
  if (document.querySelector('.ruler.horizontal')) {
    adjustRulerPos();
    return;
  }
  const rh = document.createElement('div'); rh.className = 'ruler horizontal';
  const rv = document.createElement('div'); rv.className = 'ruler vertical';
  document.body.appendChild(rh);
  document.body.appendChild(rv);
  rh.addEventListener('mousedown', e => createGuide(e, 'h'));
  rv.addEventListener('mousedown', e => createGuide(e, 'v'));
  adjustRulerPos();
  window.addEventListener('resize', adjustRulerPos);
}
function createGuide(e, axis) {
  e.preventDefault();
  const g = document.createElement('div');
  g.className = 'guide ' + axis;
  const lbl = document.createElement('div');
  lbl.className = 'guide-label';
  g.appendChild(lbl);
  document.body.appendChild(g);
  attachGuideDrag(g, lbl, axis);
  pushHistory({ type: 'add', el: g, parent: document.body, next: null });
  // 即座にドラッグ開始
  const evt = new MouseEvent('mousedown', { clientX: e.clientX, clientY: e.clientY, bubbles: true });
  g.dispatchEvent(evt);
}
function attachGuideDrag(g, lbl, axis) {
  const getCurPos = () => axis === 'h' ? parseFloat(g.style.top) || 0 : parseFloat(g.style.left) || 0;
  const updatePos = (clientX, clientY) => {
    if (axis === 'h') {
      g.style.top = clientY + 'px';
      lbl.textContent = `y: ${Math.round(clientY)}px`;
    } else {
      g.style.left = clientX + 'px';
      lbl.textContent = `x: ${Math.round(clientX)}px`;
    }
  };
  g.addEventListener('mousedown', e => {
    e.stopPropagation();
    e.preventDefault();
    const before = getCurPos();
    const onMove = (e2) => updatePos(e2.clientX, e2.clientY);
    const onUp = (e2) => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      // ルーラーに戻したら削除
      if (axis === 'h' && e2.clientY < 24) {
        pushHistory({ type: 'remove', el: g, parent: document.body, next: g.nextSibling });
        g.remove();
      } else if (axis === 'v' && e2.clientX < 24) {
        pushHistory({ type: 'remove', el: g, parent: document.body, next: g.nextSibling });
        g.remove();
      } else {
        const after = getCurPos();
        if (after !== before) pushHistory({ type: 'guide-move', el: g, before, after });
      }
      saveResizeState();
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    updatePos(e.clientX, e.clientY);
  });
  // 右クリックで削除
  g.addEventListener('contextmenu', e => {
    e.preventDefault();
    pushHistory({ type: 'remove', el: g, parent: document.body, next: g.nextSibling });
    g.remove();
    saveResizeState();
  });
}
function collectGuides() {
  return [...document.querySelectorAll('.guide')].map(g => ({
    axis: g.classList.contains('h') ? 'h' : 'v',
    pos: g.classList.contains('h') ? parseFloat(g.style.top) : parseFloat(g.style.left),
  }));
}
function restoreGuides(arr) {
  document.querySelectorAll('.guide').forEach(g => g.remove());
  arr.forEach(({axis, pos}) => {
    const g = document.createElement('div');
    g.className = 'guide ' + axis;
    if (axis === 'h') g.style.top = pos + 'px';
    else g.style.left = pos + 'px';
    const lbl = document.createElement('div');
    lbl.className = 'guide-label';
    lbl.textContent = (axis === 'h' ? 'y: ' : 'x: ') + Math.round(pos) + 'px';
    g.appendChild(lbl);
    document.body.appendChild(g);
    attachGuideDrag(g, lbl, axis);
  });
}

function enableResize() {
  document.body.classList.add('resize-mode');
  document.getElementById('resize-toggle').textContent = '📐 サイズ調整 ON';
  document.getElementById('resize-toggle').classList.add('active');
  RESIZABLE_SPEC.forEach(([sel, axes]) => {
    document.querySelectorAll(sel).forEach(el => attachHandle(el, axes));
  });
  setupRulers();
}
function disableResize() {
  document.body.classList.remove('resize-mode');
  document.getElementById('resize-toggle').textContent = '📐 サイズ調整 OFF';
  document.getElementById('resize-toggle').classList.remove('active');
  document.querySelectorAll('.resize-handle, .resize-size-label').forEach(el => el.remove());
  document.querySelectorAll('.resizable').forEach(el => { el.classList.remove('resizable'); delete el._resizeUpdateLabel; });
}
document.getElementById('resize-toggle').addEventListener('click', () => {
  if (document.body.classList.contains('resize-mode')) disableResize();
  else enableResize();
});
document.getElementById('resize-reset').addEventListener('click', resetResizeState);

// 起動時に保存値を復元
loadResizeState();

// ───── Preview mode (端末サイズで見る) ─────
const previewBtn = document.getElementById('preview-mode');
const previewExit = document.getElementById('preview-exit');
function fitStage() {
  const w = window.innerWidth, h = window.innerHeight;
  const stageW = parseFloat(getComputedStyle(stage).width);
  const stageH = parseFloat(getComputedStyle(stage).height);
  const scale = Math.min(w / stageW, h / stageH);
  const scaledW = stageW * scale;
  const scaledH = stageH * scale;
  const offsetX = (w - scaledW) / 2;
  const offsetY = (h - scaledH) / 2;
  // transform-origin 0 0 + 明示的な translate(px) で確実にレターボックス中央配置
  stage.style.transformOrigin = '0 0';
  stage.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}
function enterPreview() {
  document.body.classList.add('preview-mode');
  fitStage();
  window.addEventListener('resize', fitStage);
  // 縦横対応: 端末を回転したらリフィット
  window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));
}
function exitPreview() {
  document.body.classList.remove('preview-mode');
  stage.style.transform = '';
  window.removeEventListener('resize', fitStage);
}
previewBtn?.addEventListener('click', enterPreview);
previewExit?.addEventListener('click', exitPreview);
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.body.classList.contains('preview-mode')) {
    exitPreview();
  }
});

// URL ?preview=1 で直接プレビューモード
if (new URLSearchParams(location.search).get('preview') === '1') {
  setTimeout(enterPreview, 50);
}

// ── Reset button ──
if (annoReset) {
  annoReset.addEventListener('click', () => {
    if (!confirm('保存された注釈と設定を全て削除します (元に戻せません)。よろしいですか？')) return;
    clearAllSavedState();
  });
}

// ── Init: load saved state, otherwise default layout ──
const restored = loadState();
if (!restored) {
  buildLayout('row-3');
} else {
  buildLayout(document.getElementById('layout-select').value);
}

// ── Save before leaving ──
window.addEventListener('beforeunload', saveState);
window.addEventListener('visibilitychange', () => { if (document.hidden) saveState(); });
</script>
