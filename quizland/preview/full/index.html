<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Quizland 全体プレビュー (21:9 + 16:9 セーフエリア)</title>
<style>
:root {
  /* チューナブル */
  --slot-size: 130px;
  --slot-color: #E0E0E0;
  --slot-radius: 16px;
  --gap: 16px;
  --padding: 16px;

  /* キャンバス比率: 21:9 outer / 16:9 safe area inner */
  --canvas-w: 2100px;
  --canvas-h: 900px;
  --safe-w: 1600px;
  --safe-h: 900px;
  /* side margins = (canvas-w - safe-w) / 2 = 250 */

  --header-h: 100px;

  --bg: #1a1a1a;
  --paper: #f5e9c4;
  --paper-2: #e8d293;
  --paper-shadow: rgba(80, 50, 10, 0.3);
  --wood-dark: #6e4520;
  --wood-mid: #8a5a2a;
  --wood-light: #b07a3a;
  --frame-border: rgba(138, 56, 245, 0.6);
  --safe-border: rgba(0, 212, 255, 0.4);
  --owl-bg: #b08acf;
  --hint-bg: #fff3c4;
  --text: #4a2d0a;
  --text-light: #f0f0f0;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #0c0c0c;
  color: var(--text-light);
  font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
  font-size: 14px;
  overflow-x: hidden;
}

/* ───── Toolbar ───── */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(20,20,20,0.95);
  border-bottom: 1px solid #333;
  padding: 10px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  font-size: 12px;
}
.toolbar > div { display: inline-flex; gap: 6px; align-items: center; }
.toolbar label { color: #aaa; }
.toolbar select, .toolbar input[type="text"], .toolbar input[type="number"], .toolbar button {
  background: #2a2a2a;
  color: #fff;
  border: 1px solid #444;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 12px;
}
.toolbar button { cursor: pointer; }
.toolbar button:hover { background: #3a3a3a; }
.toolbar button.active { background: #6a4ed4; border-color: #8a5ef0; }
.toolbar input[type="file"] { color: #aaa; font-size: 11px; }

/* ───── Stage (21:9 outer) ───── */
.stage-wrap {
  padding: 20px;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}
.stage {
  width: var(--canvas-w);
  height: var(--canvas-h);
  margin: 0 auto;
  position: relative;
  /* 森の背景 */
  background:
    radial-gradient(ellipse at 50% 25%, rgba(180, 145, 90, 0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 12% 80%, rgba(80, 50, 22, 0.4) 0%, transparent 45%),
    radial-gradient(ellipse at 88% 80%, rgba(70, 100, 50, 0.35) 0%, transparent 45%),
    linear-gradient(180deg, #5e7b3a 0%, #3e5a25 55%, #2c411a 100%);
  border: 1px dashed #555;
  overflow: hidden;
}

/* Forest decoration on the 21:9 sides (outside safe area) */
.forest-side {
  position: absolute;
  top: 0; bottom: 0;
  width: 250px;
  pointer-events: none;
  background:
    radial-gradient(circle at 30% 30%, rgba(50, 90, 40, 0.6) 0%, transparent 35%),
    radial-gradient(circle at 70% 60%, rgba(60, 100, 50, 0.7) 0%, transparent 35%),
    radial-gradient(circle at 20% 80%, rgba(40, 70, 30, 0.5) 0%, transparent 35%);
}
.forest-side.left { left: 0; }
.forest-side.right { right: 0; transform: scaleX(-1); }
.forest-side::before {
  content: "🌿"; font-size: 80px; opacity: 0.4;
  position: absolute; top: 8%; left: 30px;
}
.forest-side::after {
  content: "🌿"; font-size: 60px; opacity: 0.3;
  position: absolute; bottom: 12%; left: 50px;
}

.lantern {
  position: absolute;
  left: 30px; top: 220px;
  font-size: 60px; opacity: 0.85;
  pointer-events: none;
}

/* ───── Safe Area (16:9) ───── */
.safe-area {
  position: absolute;
  top: 0;
  left: calc((var(--canvas-w) - var(--safe-w)) / 2);
  width: var(--safe-w);
  height: var(--safe-h);
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-columns: 1fr;
  gap: 14px;
  padding: 14px;
}

/* セーフエリアの境界線 (オン/オフ可) */
body.show-safe .safe-area::before {
  content: "";
  position: absolute;
  inset: 0;
  border: 2px dashed var(--safe-border);
  pointer-events: none;
  z-index: 2;
}
body.show-safe .safe-area::after {
  content: "16:9 safe area";
  position: absolute;
  top: 4px; left: 8px;
  font-size: 11px;
  color: var(--safe-border);
  pointer-events: none;
  z-index: 2;
  background: rgba(0,0,0,0.4);
  padding: 2px 6px;
  border-radius: 3px;
}

/* ───── Header (top) — body と同じグリッド (1fr 700px) で左ピルを問題欄幅に揃える ───── */
.hdr {
  display: grid;
  grid-template-columns: 1fr 700px;
  gap: 16px;
  align-items: center;
  height: var(--header-h);
}
.hdr-pill {
  display: inline-flex; align-items: center; gap: 12px;
  background:
    linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 4px solid var(--wood-dark);
  border-radius: 50px;
  padding: 6px 18px;
  height: calc(100% - 14px);
  box-shadow: 0 4px 0 var(--wood-dark), 0 6px 12px var(--paper-shadow);
}
.hdr-left {
  gap: 16px;
  padding: 6px 18px 6px 8px;
  width: 100%;
  justify-content: flex-start;
}
.hdr-left .owl-icon {
  width: 64px; height: 64px;
  background: linear-gradient(180deg, #f4e4c4, #d8b78a);
  border: 3px solid var(--wood-dark);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  flex: 0 0 auto;
}
.hdr-left .title-card {
  background: linear-gradient(180deg, #c97a3e, #8a4f1f);
  border: 3px solid var(--wood-dark);
  border-radius: 12px;
  padding: 4px 14px;
  color: #fff7d0;
  font-weight: 800;
  font-size: 18px;
  text-shadow: 0 2px 0 rgba(0,0,0,0.4);
  text-align: center;
  line-height: 1.1;
  flex: 0 0 auto;
}
.hdr-left .title-card small { font-size: 11px; display: block; }
.hdr-left .progress-num {
  background: linear-gradient(180deg, #fff8e0, #f0dfa6);
  border: 2px solid var(--wood-dark);
  border-radius: 16px;
  padding: 4px 18px;
  font-weight: 900;
  font-size: 22px;
  color: var(--text);
  flex: 0 0 auto;
}
.hdr-left .dots {
  display: inline-flex; gap: 10px; flex: 0 0 auto;
}
.hdr-left .dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: #d6b56a; border: 2px solid var(--wood-mid);
}
.hdr-left .dot.done { background: #f3a330; }

.hdr-center {
  justify-self: center;
  display: inline-flex; align-items: center; gap: 16px;
  color: var(--text);
}
.hdr-center .progress-num {
  background: linear-gradient(180deg, #fff8e0, #f0dfa6);
  border: 2px solid var(--wood-dark);
  border-radius: 16px;
  padding: 4px 18px;
  font-weight: 900;
  font-size: 22px;
}
.hdr-center .dots {
  display: inline-flex; gap: 10px;
}
.hdr-center .dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: #d6b56a;
  border: 2px solid var(--wood-mid);
}
.hdr-center .dot.done { background: #f3a330; }

.hdr-right {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  justify-self: end;
}
.hdr-right .ctrl-btn {
  display: inline-flex; flex-direction: column; align-items: center;
  background: linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 3px solid var(--wood-dark);
  border-radius: 12px;
  padding: 4px 12px;
  color: var(--text);
  font-weight: 700;
  font-size: 12px;
  min-width: 60px;
}
.hdr-right .ctrl-btn .icon { font-size: 20px; }

/* ───── Body ───── */
.body {
  display: grid;
  grid-template-columns: 1fr 700px;
  gap: 16px;
  height: 100%;
  align-items: start;
}

/* Question column (left) — 上半分くらいで内包、 下に余白 */
.q-col {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-self: start;
}
.q-text-card {
  /* 想定サイズ: 1000×200 (画像差替時もこのアスペクト比 5:1 を維持して contain でフィット) */
  background: linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 5px solid var(--wood-dark);
  border-radius: 18px;
  padding: 36px 80px 36px 32px;  /* 右側は audio ボタン分の余白 */
  display: flex; align-items: center; justify-content: center; gap: 16px;
  color: var(--text);
  font-weight: 800;
  font-size: 34px;
  min-height: 200px;  /* 最長 29 文字 = 2 行ぶん + 余裕 */
  line-height: 1.4;
  position: relative;
  box-shadow: 0 6px 0 var(--wood-dark), 0 8px 16px var(--paper-shadow);
}
.q-text-card .feather {
  position: absolute; top: -10px; left: 16px;
  font-size: 28px;
  transform: rotate(-12deg);
}
.q-text-card .audio {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  width: 48px; height: 48px;
  border-radius: 50%;
  background: linear-gradient(180deg, var(--wood-light), var(--wood-mid));
  border: 3px solid var(--wood-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  color: #fff;
}

.board {
  /* 想定アスペクト比: ~1000×600 (≈5:3)、 画像差替時もこの比を保つこと */
  background: linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 5px solid var(--wood-dark);
  border-radius: 18px;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: inset 0 -4px 0 rgba(120, 80, 20, 0.15), 0 4px 12px var(--paper-shadow);
  height: 600px;
}
.board::before {
  content: "";
  position: absolute;
  inset: 6px;
  border: 1px dashed var(--frame-border);
  border-radius: 12px;
  pointer-events: none;
  opacity: 0.0; /* デフォルト非表示、 デバッグ用 */
}
body.show-board-frame .board::before { opacity: 1; }

.slot {
  width: var(--slot-size);
  height: var(--slot-size);
  background: var(--slot-color);
  border-radius: var(--slot-radius);
  display: flex; align-items: center; justify-content: center;
  color: #888;
  font-size: 14px;
  flex: 0 0 auto;
  background-position: center;
  background-size: contain;
  background-repeat: no-repeat;
  position: relative;
}
.slot.has-img { background-color: transparent; color: transparent; }
.row { display: flex; gap: var(--gap); align-items: center; justify-content: center; }
.grid {
  display: flex; flex-direction: column;
  gap: var(--gap);
  align-items: center; justify-content: center;
}
.grid .row { gap: var(--gap); }

/* Answer column (right) — 4 chips + bottom-right (hint+owl) を縦に */
.a-col {
  display: flex; flex-direction: column;
  gap: 18px;
  height: 100%;
}
.answer-panel {
  /* 想定: 各 chip ~341×220 (1.55:1)、 panel 全体 700×460 (1.52:1) */
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 18px;
  flex: 0 0 auto;
}
/* 答えチップを乗せる木の棚 */
.answer-base {
  /* 想定アスペクト比: ~700×60 (≈12:1)、 画像差替時 contain でフィット */
  position: relative;
  width: calc(100% + 24px);
  margin: -10px -12px 0;
  height: 60px;
  background:
    linear-gradient(180deg, #c2884d 0%, #9a6635 35%, #6e4520 70%, #503010 100%);
  border: 4px solid #4a2d10;
  border-radius: 14px 14px 8px 8px;
  box-shadow:
    0 10px 18px rgba(0, 0, 0, 0.45),
    inset 0 4px 0 rgba(255, 220, 170, 0.35),
    inset 0 -4px 0 rgba(0, 0, 0, 0.35);
  flex: 0 0 auto;
  z-index: 0;
}
/* 木目の縞模様 */
.answer-base-grain {
  position: absolute; inset: 4px;
  border-radius: 8px;
  background:
    repeating-linear-gradient(90deg,
      rgba(110, 70, 32, 0) 0 60px,
      rgba(110, 70, 32, 0.35) 60px 62px,
      rgba(110, 70, 32, 0) 62px 120px,
      rgba(110, 70, 32, 0.2) 120px 122px,
      rgba(110, 70, 32, 0) 122px 200px);
  pointer-events: none;
}
.bottom-right {
  flex: 1 1 auto;
  display: flex;
  align-items: end;
  justify-content: flex-end;
  gap: 14px;
}
.bottom-right .hint {
  flex: 1 1 auto;
  align-self: end;
  margin-bottom: 12px;
}
.bottom-right .character {
  flex: 0 0 auto;
}
.chip {
  /* 想定アスペクト比: ~341×220 (≈1.55:1)、 画像差替時 background-size: contain で */
  background: linear-gradient(180deg, var(--paper), var(--paper-2));
  border: 5px solid var(--wood-dark);
  border-radius: 18px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  color: var(--text);
  font-weight: 800;
  font-size: 28px;
  box-shadow: 0 4px 0 var(--wood-dark), 0 6px 12px var(--paper-shadow);
  position: relative;
  height: 220px;
}
.chip .circle {
  width: 110px; height: 110px;
  border-radius: 50%;
  background:
    repeating-linear-gradient(135deg,
      rgba(255,255,255,0.04) 0 4px,
      rgba(0,0,0,0.06) 4px 8px),
    var(--slot-color);
  border: 3px solid rgba(0,0,0,0.1);
}
.chip[data-color="red"]    .circle { background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #d23f3f; }
.chip[data-color="blue"]   .circle { background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #3d6dc7; }
.chip[data-color="yellow"] .circle { background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #e8c43a; }
.chip[data-color="green"]  .circle { background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.12) 0 5px, rgba(0,0,0,0.1) 5px 10px), #4ea84e; }

/* (旧 footer-row は a-col 内へ移動、 ここはレガシー残し) */
.footer-row { display: none; }
.hint {
  background: linear-gradient(180deg, #fff8d4, var(--hint-bg));
  border: 4px solid #b89a3a;
  border-radius: 16px;
  padding: 12px 22px;
  color: var(--text);
  font-size: 20px;
  font-weight: 700;
  max-width: 700px;
  box-shadow: 0 4px 0 #b89a3a, 0 6px 12px var(--paper-shadow);
}
.character {
  width: 200px; height: 220px;
  background:
    radial-gradient(ellipse at 50% 30%, var(--owl-bg) 0%, #5a3a8a 100%);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  display: flex; align-items: center; justify-content: center;
  font-size: 96px;
  border: 4px solid #5a3a8a;
  position: relative;
  margin-bottom: -8px;
}

/* ───── Annotation overlay ───── */
#anno-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 50;
}
#anno-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.anno-mode #anno-layer { pointer-events: auto; cursor: crosshair; }
.anno-marker {
  position: absolute;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: #ff3b6b;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800;
  font-size: 16px;
  transform: translate(-50%, -50%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  cursor: move;
  user-select: none;
}
.anno-text {
  position: absolute;
  background: rgba(255, 240, 100, 0.95);
  color: #222;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  transform: translate(-50%, -50%);
  cursor: move;
  user-select: none;
  border: 2px solid #b89a3a;
  max-width: 240px;
}
.anno-arrow-line {
  stroke: #ff3b6b;
  stroke-width: var(--arrow-stroke, 4);
  fill: none;
  marker-end: url(#anno-arrow-head);
  cursor: move;
  pointer-events: stroke;
}
/* 矢印の hit を確保するため、 stroke が細いときも 16px は当たるようにする */
.anno-arrow-line { stroke-linecap: round; }
.anno-rect {
  fill: rgba(255, 59, 107, 0.05);
  stroke: #ff3b6b;
  stroke-width: 4;
  stroke-dasharray: 8 4;
  cursor: move;
  pointer-events: all;
}
.anno-marker, .anno-text { cursor: move; }
.anno-selected { outline: 3px solid #00d4ff; outline-offset: 2px; }
line.anno-arrow-line.anno-selected, rect.anno-rect.anno-selected {
  stroke: #00d4ff !important; outline: none !important;
}
.anno-handle {
  fill: #00d4ff; stroke: #fff; stroke-width: 2;
  cursor: nwse-resize; pointer-events: all;
}
.anno-handle.endpoint { cursor: grab; }
.anno-handle-hit {
  fill: rgba(0, 212, 255, 0.001);
  stroke: none;
  pointer-events: all;
  cursor: grab;
}
.anno-tip {
  position: fixed;
  bottom: 16px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 12px;
  z-index: 200;
  pointer-events: none;
}
body.eraser-mode #anno-layer { cursor: crosshair; }
.tool-btn { font-size: 12px; }
#anno-tools { display: none; gap: 6px; }
body.anno-mode #anno-tools { display: inline-flex !important; }

/* Debug bbox */
.show-bbox .slot::after {
  content: attr(data-bbox);
  position: absolute;
  bottom: 2px; right: 2px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 10px;
  padding: 1px 4px;
  border-radius: 2px;
  pointer-events: none;
}
</style>
</head>
<body class="show-safe">

<div class="toolbar">
  <div>
    <label>レイアウト</label>
    <select id="layout-select">
      <optgroup label="横並び (order_color)">
        <option value="row-3" selected>row count=3</option>
        <option value="row-4">row count=4</option>
        <option value="row-5">row count=5</option>
      </optgroup>
      <optgroup label="グリッド (count_total)">
        <option value="grid-1">grid count=1</option>
        <option value="grid-2">grid count=2</option>
        <option value="grid-3">grid count=3</option>
        <option value="grid-4">grid count=4 (2×2)</option>
        <option value="grid-5">grid count=5 (3+2)</option>
        <option value="grid-6">grid count=6 (3×2)</option>
        <option value="grid-7">grid count=7 (4+3)</option>
        <option value="grid-8">grid count=8 (4×2)</option>
        <option value="grid-9">grid count=9 (3×3)</option>
      </optgroup>
    </select>
  </div>

  <div>
    <label>スロット差替画像</label>
    <input type="file" id="img-file" accept="image/png,image/jpeg,image/webp">
    <button id="img-clear">クリア</button>
  </div>

  <div>
    <label>スロット</label>
    <input type="number" id="slot-size" value="130" min="40" max="300" step="2">px
    <label>gap</label>
    <input type="number" id="gap" value="16" min="0" max="48" step="2">px
    <label>矢印太さ</label>
    <input type="number" id="arrow-stroke" value="4" min="2" max="16" step="1">px
  </div>

  <div>
    <label><input type="checkbox" id="show-bbox"> サイズ表示</label>
    <label><input type="checkbox" id="show-safe" checked> 16:9 セーフエリア表示</label>
  </div>

  <div>
    <button id="anno-toggle">📝 注釈モード OFF</button>
  </div>

  <div id="anno-tools">
    <button class="tool-btn" data-tool="select">👆 選択/移動</button>
    <button class="tool-btn" data-tool="marker">📍 マーカー</button>
    <button class="tool-btn" data-tool="text">📝 テキスト</button>
    <button class="tool-btn" data-tool="rect">▭ 矩形</button>
    <button class="tool-btn" data-tool="arrow">↗ 矢印</button>
    <button class="tool-btn" data-tool="eraser">🧹 消しゴム</button>
    <button id="anno-clear">🗑 全消去</button>
    <button id="anno-reset" title="保存も含めて全部消す">♻ リセット</button>
  </div>

  <div style="margin-left:auto;color:#666;">
    <a href="../" style="color:#aaa;">← パーツ一覧</a>
  </div>
</div>

<div class="anno-tip" id="anno-tip" style="display:none;">
  <span id="anno-tip-text">注釈モード ON</span>
</div>

<div class="stage-wrap">
  <div class="stage" id="stage">
    <!-- 21:9 outer decoration -->
    <div class="forest-side left"></div>
    <div class="forest-side right"></div>
    <div class="lantern">🏮</div>

    <!-- 16:9 safe area inner -->
    <div class="safe-area" id="safe-area">
      <!-- Header: 左ピルが q-col と同じ幅 (1fr) -->
      <div class="hdr">
        <div class="hdr-left hdr-pill">
          <div class="owl-icon">🦉</div>
          <div class="title-card">
            <small>フクロウはかせの</small>
            <span>なぞなぞ</span>
          </div>
          <div class="progress-num">1 / 5</div>
          <div class="dots">
            <span class="dot done"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>

        <div class="hdr-right">
          <div class="ctrl-btn"><span class="icon">🔔</span><span>おしらせ</span></div>
          <div class="ctrl-btn"><span class="icon">⚙️</span><span>せってい</span></div>
        </div>
      </div>

      <!-- Body grid -->
      <div class="body">
        <div class="q-col">
          <div class="q-text-card">
            <span class="feather">🪶</span>
            <span id="q-text">まんなかは なにいろ？</span>
            <span class="audio">🔊</span>
          </div>
          <div class="board" id="board"></div>
        </div>

        <div class="a-col">
          <div class="answer-panel">
            <div class="chip" data-color="red"><div class="circle"></div><span>あか</span></div>
            <div class="chip" data-color="blue"><div class="circle"></div><span>あお</span></div>
            <div class="chip" data-color="yellow"><div class="circle"></div><span>きいろ</span></div>
            <div class="chip" data-color="green"><div class="circle"></div><span>みどり</span></div>
          </div>
          <!-- 木の土台: 答えチップの下に乗せる棚的な板 (生成画像差替前提でアスペクト比 12:1 想定) -->
          <div class="answer-base">
            <div class="answer-base-grain"></div>
          </div>
          <div class="bottom-right">
            <div class="hint">💡 よく見て かんがえてみよう！</div>
            <div class="character">🦉</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Annotation overlay -->
    <div id="anno-layer">
      <svg id="anno-svg" preserveAspectRatio="none">
        <defs>
          <marker id="anno-arrow-head" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
            <polygon points="0,0 10,5 0,10" fill="#ff3b6b"></polygon>
          </marker>
        </defs>
      </svg>
    </div>
  </div>
</div>

<script>
// ───── Layout rendering ─────
function buildLayout(value) {
  const [type, n] = value.split('-');
  const count = parseInt(n, 10);
  const board = document.getElementById('board');
  board.innerHTML = '';

  function slot() {
    const d = document.createElement('div');
    d.className = 'slot';
    d.textContent = 'slot';
    if (currentImg) {
      d.style.backgroundImage = `url(${currentImg})`;
      d.classList.add('has-img');
    }
    return d;
  }
  function row(slotsCount) {
    const r = document.createElement('div');
    r.className = 'row';
    for (let i = 0; i < slotsCount; i++) r.appendChild(slot());
    return r;
  }
  function grid(rows) {
    const g = document.createElement('div');
    g.className = 'grid';
    for (const n of rows) g.appendChild(row(n));
    return g;
  }

  if (type === 'row') {
    board.appendChild(row(count));
  } else if (type === 'grid') {
    const layouts = {
      1: [1], 2: [2], 3: [3],
      4: [2, 2], 5: [3, 2], 6: [3, 3],
      7: [4, 3], 8: [4, 4], 9: [3, 3, 3]
    };
    board.appendChild(grid(layouts[count]));
  }
  updateBboxLabels();
}

let currentImg = null;
function setSlotImage(url) {
  currentImg = url;
  document.querySelectorAll('.slot').forEach(s => {
    if (url) {
      s.style.backgroundImage = `url(${url})`;
      s.classList.add('has-img');
    } else {
      s.style.backgroundImage = '';
      s.classList.remove('has-img');
    }
  });
}

function updateBboxLabels() {
  document.querySelectorAll('.slot').forEach(s => {
    const r = s.getBoundingClientRect();
    s.dataset.bbox = `${Math.round(r.width)}×${Math.round(r.height)}`;
  });
}

document.getElementById('layout-select').addEventListener('change', e => { buildLayout(e.target.value); scheduleSave(); });
document.getElementById('img-file').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => setSlotImage(reader.result);
  reader.readAsDataURL(f);
});
document.getElementById('img-clear').addEventListener('click', () => {
  setSlotImage(null);
  document.getElementById('img-file').value = '';
});
document.getElementById('slot-size').addEventListener('input', e => {
  document.documentElement.style.setProperty('--slot-size', e.target.value + 'px');
  updateBboxLabels();
  scheduleSave();
});
document.getElementById('gap').addEventListener('input', e => {
  document.documentElement.style.setProperty('--gap', e.target.value + 'px');
  updateBboxLabels();
  scheduleSave();
});
document.getElementById('arrow-stroke').addEventListener('input', e => {
  document.documentElement.style.setProperty('--arrow-stroke', e.target.value);
  scheduleSave();
});
document.getElementById('show-bbox').addEventListener('change', e => {
  document.body.classList.toggle('show-bbox', e.target.checked);
  if (e.target.checked) updateBboxLabels();
  scheduleSave();
});
document.getElementById('show-safe').addEventListener('change', e => {
  document.body.classList.toggle('show-safe', e.target.checked);
  scheduleSave();
});

// ───── Annotation system ─────
const stage = document.getElementById('stage');
const annoLayer = document.getElementById('anno-layer');
const annoSvg = document.getElementById('anno-svg');
const annoToggle = document.getElementById('anno-toggle');
const annoClear = document.getElementById('anno-clear');
const annoReset = document.getElementById('anno-reset');
const annoTip = document.getElementById('anno-tip');
const annoTipText = document.getElementById('anno-tip-text');

let annoMode = false;
let currentTool = 'select';
const labelChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
let labelIdx = 0;
let selectedEl = null;

// ── localStorage 自動保存 ──
const STORAGE_KEY = 'quizland_preview_state_v1';
let saveTimer = null;
function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 300);
}
function collectState() {
  return {
    markers: [...annoLayer.querySelectorAll('.anno-marker')].map(m => ({
      x: parseFloat(m.style.left), y: parseFloat(m.style.top), label: m.textContent
    })),
    texts: [...annoLayer.querySelectorAll('.anno-text')].map(t => ({
      x: parseFloat(t.style.left), y: parseFloat(t.style.top), content: t.textContent
    })),
    rects: [...annoSvg.querySelectorAll('rect.anno-rect')].map(r => ({
      x: +r.getAttribute('x'), y: +r.getAttribute('y'),
      w: +r.getAttribute('width'), h: +r.getAttribute('height')
    })),
    arrows: [...annoSvg.querySelectorAll('line.anno-arrow-line')].map(l => ({
      x1: +l.getAttribute('x1'), y1: +l.getAttribute('y1'),
      x2: +l.getAttribute('x2'), y2: +l.getAttribute('y2')
    })),
    labelIdx,
    settings: {
      layout: document.getElementById('layout-select').value,
      slotSize: document.getElementById('slot-size').value,
      gap: document.getElementById('gap').value,
      arrowStroke: document.getElementById('arrow-stroke').value,
      showBbox: document.getElementById('show-bbox').checked,
      showSafe: document.getElementById('show-safe').checked,
    }
  };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(collectState())); } catch(e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);

    // 設定を先に適用
    const s = data.settings || {};
    if (s.layout) {
      document.getElementById('layout-select').value = s.layout;
    }
    if (s.slotSize) {
      document.getElementById('slot-size').value = s.slotSize;
      document.documentElement.style.setProperty('--slot-size', s.slotSize + 'px');
    }
    if (s.gap) {
      document.getElementById('gap').value = s.gap;
      document.documentElement.style.setProperty('--gap', s.gap + 'px');
    }
    if (s.arrowStroke) {
      document.getElementById('arrow-stroke').value = s.arrowStroke;
      document.documentElement.style.setProperty('--arrow-stroke', s.arrowStroke);
    }
    if (typeof s.showBbox === 'boolean') {
      document.getElementById('show-bbox').checked = s.showBbox;
      document.body.classList.toggle('show-bbox', s.showBbox);
    }
    if (typeof s.showSafe === 'boolean') {
      document.getElementById('show-safe').checked = s.showSafe;
      document.body.classList.toggle('show-safe', s.showSafe);
    }

    // 注釈を復元 (履歴には登録しない)
    (data.markers || []).forEach(m => restoreMarker(m.x, m.y, m.label));
    (data.texts || []).forEach(t => restoreText(t.x, t.y, t.content));
    (data.rects || []).forEach(r => restoreRect(r.x, r.y, r.w, r.h));
    (data.arrows || []).forEach(a => restoreArrow(a.x1, a.y1, a.x2, a.y2));

    if (typeof data.labelIdx === 'number') labelIdx = data.labelIdx;
    return true;
  } catch(e) { return false; }
}
function restoreMarker(x, y, label) {
  const m = document.createElement('div');
  m.className = 'anno-marker';
  m.style.left = x + 'px'; m.style.top = y + 'px';
  m.textContent = label;
  annoLayer.appendChild(m);
  attachDeleteHandlers(m);
  m.addEventListener('dblclick', ev => {
    ev.stopPropagation();
    const t = prompt('ラベル', m.textContent);
    if (t !== null) { m.textContent = t; scheduleSave(); }
  });
}
function restoreText(x, y, content) {
  const t = document.createElement('div');
  t.className = 'anno-text';
  t.style.left = x + 'px'; t.style.top = y + 'px';
  t.textContent = content;
  annoLayer.appendChild(t);
  attachDeleteHandlers(t);
  t.addEventListener('dblclick', ev => {
    ev.stopPropagation();
    const v = prompt('編集 (空で削除)', t.textContent);
    if (v === null) return;
    if (v === '') removeElWithHistory(t);
    else { t.textContent = v; scheduleSave(); }
  });
}
function restoreRect(x, y, w, h) {
  const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  r.setAttribute('class', 'anno-rect'); r.setAttribute('rx', 6);
  r.setAttribute('x', x); r.setAttribute('y', y);
  r.setAttribute('width', w); r.setAttribute('height', h);
  annoSvg.appendChild(r);
  attachDeleteHandlers(r);
}
function restoreArrow(x1, y1, x2, y2) {
  const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  l.setAttribute('class', 'anno-arrow-line');
  l.setAttribute('x1', x1); l.setAttribute('y1', y1);
  l.setAttribute('x2', x2); l.setAttribute('y2', y2);
  annoSvg.appendChild(l);
  attachDeleteHandlers(l);
}
function clearAllSavedState() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  document.querySelectorAll('.anno-marker, .anno-text').forEach(el => el.remove());
  annoSvg.querySelectorAll('.anno-arrow-line, .anno-rect, .anno-handle, .anno-handle-hit').forEach(el => el.remove());
  selectedEl = null;
  labelIdx = 0;
  undoStack.length = 0;
  redoStack.length = 0;
}

const undoStack = [];
const redoStack = [];
function pushHistory(op) {
  undoStack.push(op);
  if (undoStack.length > 100) undoStack.shift();
  redoStack.length = 0;
  scheduleSave();
}
function applyOp(op) {
  if (op.type === 'add') op.parent.insertBefore(op.el, op.next || null);
  else if (op.type === 'remove') op.el.remove();
  else if (op.type === 'transform') { setGeometry(op.el, op.after); if (op.el === selectedEl) updateHandles(); }
  scheduleSave();
}
function applyInverse(op) {
  if (op.type === 'add') { op.el.remove(); if (op.el === selectedEl) selectEl(null); }
  else if (op.type === 'remove') op.parent.insertBefore(op.el, op.next || null);
  else if (op.type === 'transform') { setGeometry(op.el, op.before); if (op.el === selectedEl) updateHandles(); }
  scheduleSave();
}
function undo() {
  if (!undoStack.length) return;
  const op = undoStack.pop(); applyInverse(op); redoStack.push(op);
}
function redo() {
  if (!redoStack.length) return;
  const op = redoStack.pop(); applyOp(op); undoStack.push(op);
}

function getGeometry(el) {
  if (el.classList.contains('anno-marker') || el.classList.contains('anno-text')) {
    return { kind: 'pos', left: parseFloat(el.style.left), top: parseFloat(el.style.top) };
  }
  if (el.tagName === 'line') {
    return { kind: 'line',
      x1: +el.getAttribute('x1'), y1: +el.getAttribute('y1'),
      x2: +el.getAttribute('x2'), y2: +el.getAttribute('y2') };
  }
  if (el.tagName === 'rect') {
    return { kind: 'rect',
      x: +el.getAttribute('x'), y: +el.getAttribute('y'),
      w: +el.getAttribute('width'), h: +el.getAttribute('height') };
  }
}
function setGeometry(el, g) {
  if (g.kind === 'pos') { el.style.left = g.left + 'px'; el.style.top = g.top + 'px'; }
  else if (g.kind === 'line') { el.setAttribute('x1', g.x1); el.setAttribute('y1', g.y1); el.setAttribute('x2', g.x2); el.setAttribute('y2', g.y2); }
  else if (g.kind === 'rect') { el.setAttribute('x', g.x); el.setAttribute('y', g.y); el.setAttribute('width', g.w); el.setAttribute('height', g.h); }
}

const TIP_TEXTS = {
  select:  '選択/移動: 注釈をクリック→選択 / ドラッグ→移動 / ハンドルで伸縮 / Delete で削除',
  marker:  'マーカー: クリックで A,B,C… 配置 (既存の上にも重ねられる) / 移動は選択ツールで',
  text:    'テキスト: クリックで黄色付箋 (既存の上にも重ねられる) / 移動は選択ツールで',
  rect:    '矩形: ドラッグで囲い枠 / 移動・伸縮は選択ツールで',
  arrow:   '矢印: ドラッグで自由な矢印 / 移動・エンドポイント伸ばしは選択ツールで',
  eraser:  '消しゴム: 注釈をクリックして個別削除',
};

function nextLabelChar() { const c = labelChars[labelIdx % labelChars.length]; labelIdx++; return c; }
function setAnnoMode(on) {
  annoMode = on;
  document.body.classList.toggle('anno-mode', on);
  annoToggle.classList.toggle('active', on);
  annoToggle.textContent = on ? '📝 注釈モード ON' : '📝 注釈モード OFF';
  annoTip.style.display = on ? 'block' : 'none';
  if (on) setTool(currentTool);
  else selectEl(null);
}
function setTool(tool) {
  currentTool = tool;
  document.body.classList.toggle('eraser-mode', tool === 'eraser');
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
  annoTipText.textContent = TIP_TEXTS[tool] || '';
}
annoToggle.addEventListener('click', () => setAnnoMode(!annoMode));
document.querySelectorAll('.tool-btn').forEach(b => b.addEventListener('click', () => setTool(b.dataset.tool)));
annoClear.addEventListener('click', () => {
  if (!confirm('全注釈を削除しますか？')) return;
  const all = [...document.querySelectorAll('.anno-marker, .anno-text'),
               ...annoSvg.querySelectorAll('.anno-arrow-line, .anno-rect')];
  all.forEach(el => { pushHistory({ type: 'remove', el, parent: el.parentNode, next: el.nextSibling }); el.remove(); });
  selectEl(null);
});

function selectEl(el) {
  if (selectedEl) selectedEl.classList.remove('anno-selected');
  clearHandles();
  selectedEl = el;
  if (el) { el.classList.add('anno-selected'); updateHandles(); }
}
function clearHandles() {
  annoSvg.querySelectorAll('.anno-handle, .anno-handle-hit').forEach(h => h.remove());
}
function updateHandles() {
  clearHandles();
  if (!selectedEl) return;
  const g = getGeometry(selectedEl);
  if (g.kind === 'line') { addHandle(g.x1, g.y1, 'p1'); addHandle(g.x2, g.y2, 'p2'); }
  else if (g.kind === 'rect') {
    addHandle(g.x, g.y, 'tl'); addHandle(g.x + g.w, g.y, 'tr');
    addHandle(g.x, g.y + g.h, 'bl'); addHandle(g.x + g.w, g.y + g.h, 'br');
  }
}
function addHandle(x, y, role) {
  const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  hit.setAttribute('class', 'anno-handle anno-handle-hit');
  hit.setAttribute('cx', x); hit.setAttribute('cy', y); hit.setAttribute('r', 18);
  hit.dataset.role = role;
  annoSvg.appendChild(hit);

  const h = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  h.setAttribute('class', 'anno-handle endpoint');
  h.setAttribute('cx', x); h.setAttribute('cy', y); h.setAttribute('r', 9);
  h.dataset.role = role;
  annoSvg.appendChild(h);

  const handler = (ev) => {
    ev.stopPropagation();
    ev.preventDefault();
    const before = getGeometry(selectedEl);
    const target = selectedEl;
    const onMove = (e2) => {
      const p = getStageCoords(e2);
      const g = getGeometry(target);
      if (g.kind === 'line') {
        if (role === 'p1') { g.x1 = p.x; g.y1 = p.y; } else { g.x2 = p.x; g.y2 = p.y; }
      } else if (g.kind === 'rect') {
        let x1 = g.x, y1 = g.y, x2 = g.x + g.w, y2 = g.y + g.h;
        if (role === 'tl') { x1 = p.x; y1 = p.y; }
        else if (role === 'tr') { x2 = p.x; y1 = p.y; }
        else if (role === 'bl') { x1 = p.x; y2 = p.y; }
        else if (role === 'br') { x2 = p.x; y2 = p.y; }
        g.x = Math.min(x1, x2); g.y = Math.min(y1, y2);
        g.w = Math.abs(x2 - x1); g.h = Math.abs(y2 - y1);
      }
      setGeometry(target, g); updateHandles();
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      const after = getGeometry(target);
      if (JSON.stringify(after) !== JSON.stringify(before)) {
        pushHistory({ type: 'transform', el: target, before, after });
      }
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };
  hit.addEventListener('mousedown', handler);
  h.addEventListener('mousedown', handler);
  const stop = (ev) => ev.stopPropagation();
  hit.addEventListener('click', stop);
  h.addEventListener('click', stop);
}

function getStageCoords(e) {
  const r = stage.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function removeElWithHistory(el) {
  pushHistory({ type: 'remove', el, parent: el.parentNode, next: el.nextSibling });
  el.remove();
  if (el === selectedEl) selectEl(null);
}
function attachDeleteHandlers(el) {
  el.addEventListener('contextmenu', ev => {
    ev.preventDefault();
    if (confirm('この注釈を削除しますか？')) removeElWithHistory(el);
  });
  el.addEventListener('click', ev => {
    if (!annoMode) return;
    if (currentTool === 'eraser') { ev.stopPropagation(); removeElWithHistory(el); }
    // 他のツール (作成系) ではバブルさせる → annoLayer の click でマーカー/テキストが追加される
  });
  el.addEventListener('mousedown', ev => {
    if (!annoMode) return;
    // 選択ツールでのみ移動可能。 他のツール (マーカー/テキスト/矩形/矢印) はバブリングして新規作成
    if (currentTool !== 'select') return;
    if (ev.target.classList && (ev.target.classList.contains('anno-handle') || ev.target.classList.contains('anno-handle-hit'))) return;
    ev.stopPropagation();
    selectEl(el);
    const startPt = getStageCoords(ev);
    const beforeGeo = getGeometry(el);
    let moved = false;
    const onMove = (e2) => {
      const p = getStageCoords(e2);
      const dx = p.x - startPt.x, dy = p.y - startPt.y;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) moved = true;
      if (!moved) return;
      const g = JSON.parse(JSON.stringify(beforeGeo));
      if (g.kind === 'pos') { g.left += dx; g.top += dy; }
      else if (g.kind === 'line') { g.x1 += dx; g.y1 += dy; g.x2 += dx; g.y2 += dy; }
      else if (g.kind === 'rect') { g.x += dx; g.y += dy; }
      setGeometry(el, g); updateHandles();
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      if (moved) {
        const afterGeo = getGeometry(el);
        pushHistory({ type: 'transform', el, before: beforeGeo, after: afterGeo });
      }
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
}

function addMarker(x, y, label) {
  const m = document.createElement('div');
  m.className = 'anno-marker';
  m.style.left = x + 'px'; m.style.top = y + 'px';
  m.textContent = label || nextLabelChar();
  annoLayer.appendChild(m);
  attachDeleteHandlers(m);
  m.addEventListener('dblclick', ev => {
    ev.stopPropagation();
    const t = prompt('ラベル', m.textContent);
    if (t !== null) m.textContent = t;
  });
  pushHistory({ type: 'add', el: m, parent: annoLayer, next: null });
  return m;
}
function addText(x, y) {
  const text = prompt('テキスト', 'ここを修正');
  if (!text) return null;
  const t = document.createElement('div');
  t.className = 'anno-text';
  t.style.left = x + 'px'; t.style.top = y + 'px';
  t.textContent = text;
  annoLayer.appendChild(t);
  attachDeleteHandlers(t);
  t.addEventListener('dblclick', ev => {
    ev.stopPropagation();
    const v = prompt('編集 (空で削除)', t.textContent);
    if (v === null) return;
    if (v === '') removeElWithHistory(t); else t.textContent = v;
  });
  pushHistory({ type: 'add', el: t, parent: annoLayer, next: null });
  return t;
}

let dragStart = null;
let tempShape = null;
annoLayer.addEventListener('mousedown', e => {
  if (!annoMode) return;
  // ハンドルだけは早期 return (それ自身のドラッグハンドラに任せる)
  if (e.target.classList && (e.target.classList.contains('anno-handle') ||
                              e.target.classList.contains('anno-handle-hit'))) return;

  // 選択ツール: 背景を押したら選択解除
  if (currentTool === 'select') {
    if (!e.target.closest('.anno-marker, .anno-text') &&
        !(e.target.classList && (e.target.classList.contains('anno-arrow-line') || e.target.classList.contains('anno-rect')))) {
      selectEl(null);
    }
    return;
  }

  if (currentTool === 'rect' || currentTool === 'arrow') {
    e.preventDefault();
    dragStart = getStageCoords(e);
    if (currentTool === 'rect') {
      tempShape = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      tempShape.setAttribute('class', 'anno-rect'); tempShape.setAttribute('rx', 6);
    } else {
      tempShape = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      tempShape.setAttribute('class', 'anno-arrow-line');
    }
    annoSvg.appendChild(tempShape);
    const onMove = (e2) => {
      const p = getStageCoords(e2);
      if (currentTool === 'rect') {
        const x = Math.min(dragStart.x, p.x), y = Math.min(dragStart.y, p.y);
        const w = Math.abs(p.x - dragStart.x), h = Math.abs(p.y - dragStart.y);
        tempShape.setAttribute('x', x); tempShape.setAttribute('y', y);
        tempShape.setAttribute('width', w); tempShape.setAttribute('height', h);
      } else {
        tempShape.setAttribute('x1', dragStart.x); tempShape.setAttribute('y1', dragStart.y);
        tempShape.setAttribute('x2', p.x); tempShape.setAttribute('y2', p.y);
      }
    };
    const onUp = (e2) => {
      const p = getStageCoords(e2);
      const dx = p.x - dragStart.x, dy = p.y - dragStart.y;
      if (Math.abs(dx) < 4 && Math.abs(dy) < 4) { tempShape && tempShape.remove(); }
      else { attachDeleteHandlers(tempShape); pushHistory({ type: 'add', el: tempShape, parent: annoSvg, next: null }); }
      tempShape = null; dragStart = null;
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }
});
annoLayer.addEventListener('click', e => {
  if (!annoMode) return;
  // ハンドルだけは無視
  if (e.target.classList && (e.target.classList.contains('anno-handle') ||
                              e.target.classList.contains('anno-handle-hit'))) return;
  if (currentTool === 'eraser') return;
  if (currentTool === 'select') return;
  if (currentTool === 'rect' || currentTool === 'arrow') return; // ドラッグ専用
  const p = getStageCoords(e);
  if (currentTool === 'marker') addMarker(p.x, p.y);
  else if (currentTool === 'text') addText(p.x, p.y);
});
annoSvg.addEventListener('click', e => {
  if (!annoMode) return;
  const t = e.target;
  if (!t.classList) return;
  if (t.classList.contains('anno-arrow-line') || t.classList.contains('anno-rect')) {
    if (currentTool === 'eraser') { e.stopPropagation(); removeElWithHistory(t); }
    else if (currentTool === 'select') { selectEl(t); }
    // 作成系ツール: バブルさせる (annoLayer の click で新規作成される)
  }
});
annoSvg.addEventListener('mousedown', e => {
  if (!annoMode) return;
  const t = e.target;
  if (!t.classList) return;
  if (!(t.classList.contains('anno-arrow-line') || t.classList.contains('anno-rect'))) return;
  if (currentTool === 'eraser') return;
  if (currentTool !== 'select') return;  // 移動は選択ツール限定
  e.stopPropagation(); e.preventDefault();
  selectEl(t);
  const startPt = getStageCoords(e);
  const beforeGeo = getGeometry(t);
  let moved = false;
  const onMove = (e2) => {
    const p = getStageCoords(e2);
    const dx = p.x - startPt.x, dy = p.y - startPt.y;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) moved = true;
    if (!moved) return;
    const g = JSON.parse(JSON.stringify(beforeGeo));
    if (g.kind === 'line') { g.x1 += dx; g.y1 += dy; g.x2 += dx; g.y2 += dy; }
    else if (g.kind === 'rect') { g.x += dx; g.y += dy; }
    setGeometry(t, g); updateHandles();
  };
  const onUp = () => {
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
    if (moved) {
      const afterGeo = getGeometry(t);
      pushHistory({ type: 'transform', el: t, before: beforeGeo, after: afterGeo });
    }
  };
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
});

window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if ((e.key === 'Delete' || e.key === 'Backspace') && annoMode && selectedEl) {
    e.preventDefault(); removeElWithHistory(selectedEl); return;
  }
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && (e.key === 'z' || e.key === 'Z')) { e.preventDefault(); undo(); return; }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && (e.key === 'z' || e.key === 'Z')))) { e.preventDefault(); redo(); return; }
  if (e.key === 'Escape') selectEl(null);
});

function resizeSvg() {
  const sr = stage.getBoundingClientRect();
  annoSvg.setAttribute('viewBox', `0 0 ${sr.width} ${sr.height}`);
  annoSvg.setAttribute('width', sr.width);
  annoSvg.setAttribute('height', sr.height);
}
window.addEventListener('resize', resizeSvg);
window.addEventListener('load', resizeSvg);
window.addEventListener('resize', updateBboxLabels);

// ── Reset button ──
if (annoReset) {
  annoReset.addEventListener('click', () => {
    if (!confirm('保存された注釈と設定を全て削除します (元に戻せません)。よろしいですか？')) return;
    clearAllSavedState();
  });
}

// ── Init: load saved state, otherwise default layout ──
const restored = loadState();
if (!restored) {
  buildLayout('row-3');
} else {
  buildLayout(document.getElementById('layout-select').value);
}

// ── Save before leaving ──
window.addEventListener('beforeunload', saveState);
window.addEventListener('visibilitychange', () => { if (document.hidden) saveState(); });
</script>
</body>
