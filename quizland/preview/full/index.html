// ───── Edge linking (adjacent frames share an edge) ─────
function sidesFromHandlePos(pos) {
  // Returns clean side array, avoiding the substring trap
  if (pos === 'edge-e') return ['e'];
  if (pos === 'edge-w') return ['w'];
  if (pos === 'edge-n') return ['n'];
  if (pos === 'edge-s') return ['s'];
  if (pos === 'corner-ne') return ['n','e'];
  if (pos === 'corner-nw') return ['n','w'];
  if (pos === 'corner-se') return ['s','e'];
  if (pos === 'corner-sw') return ['s','w'];
  return [];
}
function oppositeSide(s) { return ({n:'s',s:'n',e:'w',w:'e'})[s]; }

function getStageRectInfo() {
  const stageRect = stage.getBoundingClientRect();
  const stageW = parseFloat(getComputedStyle(stage).width);
  const scale = stageRect.width / stageW || 1;
  return { stageRect, scale };
}
function bcrInStage(el, stageRect, scale) {
  const r = el.getBoundingClientRect();
  return {
    left: (r.left - stageRect.left) / scale,
    top: (r.top - stageRect.top) / scale,
    right: (r.right - stageRect.left) / scale,
    bottom: (r.bottom - stageRect.top) / scale,
  };
}

function findLinkedTargets(primaryEl, draggedSides) {
  // Returns array of { el, sides: [...] } for each other resizable that has
  // an edge touching one of the primary's dragged sides.
  const EPS = 8;
  const VERT_OVERLAP_MIN = 8;
  const { stageRect, scale } = getStageRectInfo();
  const primR = bcrInStage(primaryEl, stageRect, scale);
  const all = [...document.querySelectorAll('.resizable')].filter(x => x !== primaryEl);
  const linked = [];
  for (const otherEl of all) {
    const r = bcrInStage(otherEl, stageRect, scale);
    const sides = [];
    if (draggedSides.includes('e') && Math.abs(r.left - primR.right) < EPS &&
        Math.min(primR.bottom, r.bottom) - Math.max(primR.top, r.top) > VERT_OVERLAP_MIN) {
      sides.push('w');
    }
    if (draggedSides.includes('w') && Math.abs(r.right - primR.left) < EPS &&
        Math.min(primR.bottom, r.bottom) - Math.max(primR.top, r.top) > VERT_OVERLAP_MIN) {
      sides.push('e');
    }
    if (draggedSides.includes('s') && Math.abs(r.top - primR.bottom) < EPS &&
        Math.min(primR.right, r.right) - Math.max(primR.left, r.left) > VERT_OVERLAP_MIN) {
      sides.push('n');
    }
    if (draggedSides.includes('n') && Math.abs(r.bottom - primR.top) < EPS &&
        Math.min(primR.right, r.right) - Math.max(primR.left, r.left) > VERT_OVERLAP_MIN) {
      sides.push('s');
    }
    if (sides.length) linked.push({ el: otherEl, sides });
  }
  return linked;
}

// Apply a one-axis-per-side resize to a target, using BCR-fixup so the opposite
// side stays anchored. Used for the primary AND each linked element.
function performResize(target, sides, dx, dy, sym, axes, stageRect, scale) {
  const { el, startRect, startW, startH, startTx, startTy } = target;
  const factor = sym ? 2 : 1;
  let newW = startW, newH = startH;
  if (sides.includes('e')) newW = Math.max(20, startW + factor * dx);
  if (sides.includes('w') && !sides.includes('e')) newW = Math.max(20, startW - factor * dx);
  if (sides.includes('s')) newH = Math.max(20, startH + factor * dy);
  if (sides.includes('n') && !sides.includes('s')) newH = Math.max(20, startH - factor * dy);
  if (axes.includes('w') && (sides.includes('e') || sides.includes('w'))) {
    el.style.width = newW + 'px';
  }
  if (axes.includes('h') && (sides.includes('s') || sides.includes('n'))) {
    el.style.height = newH + 'px';
    if (el.matches('.hdr-left')) {
      document.documentElement.style.setProperty('--header-h', newH + 'px');
    }
  }
  el._tx = startTx;
  el._ty = startTy;
  el.style.transform = `translate(${startTx}px, ${startTy}px)`;
  const cur = bcrInStage(el, stageRect, scale);
  let needTx = 0, needTy = 0;
  if (sym) {
    const cur_cx = (cur.left + cur.right) / 2;
    const cur_cy = (cur.top + cur.bottom) / 2;
    const start_cx = (startRect.left + startRect.right) / 2;
    const start_cy = (startRect.top + startRect.bottom) / 2;
    needTx = start_cx - cur_cx;
    needTy = start_cy - cur_cy;
  } else {
    if (sides.includes('e') && !sides.includes('w')) needTx = startRect.left - cur.left;
    if (sides.includes('w') && !sides.includes('e')) needTx = startRect.right - cur.right;
    if (sides.includes('s') && !sides.includes('n')) needTy = startRect.top - cur.top;
    if (sides.includes('n') && !sides.includes('s')) needTy = startRect.bottom - cur.bottom;
  }
  el._tx = startTx + needTx;
  el._ty = startTy + needTy;
  el.style.transform = `translate(${el._tx}px, ${el._ty}px)`;
  el._resizeUpdateLabel && el._resizeUpdateLabel();
}

function attachHandle(el, axes) {
  el.classList.add('resizable');
  // 辺ハンドル: axes に応じて
  const positions = [];
  if (axes.includes('h')) positions.push('edge-n', 'edge-s');
  if (axes.includes('w')) positions.push('edge-e', 'edge-w');
  if (axes.includes('w') && axes.includes('h')) {
    positions.push('corner-nw', 'corner-ne', 'corner-sw', 'corner-se');
  }
  positions.forEach(pos => makeHandle(el, pos, axes));
  // body ドラッグで移動 (ハンドル以外をドラッグ)
  attachMoveDrag(el);
  // サイズ表示
  const lbl = document.createElement('div');
  lbl.className = 'resize-size-label';
  el.appendChild(lbl);
  el._resizeUpdateLabel = () => {
    const r = el.getBoundingClientRect();
    const sr = stage.getBoundingClientRect();
    const stageW = parseFloat(getComputedStyle(stage).width);
    const scale = sr.width / stageW || 1;
    lbl.textContent = `${Math.round(r.width / scale)}×${Math.round(r.height / scale)}`;
  };
  el._resizeUpdateLabel();
}

function getResizeState(el) {
  return {
    w: el.style.width || '',
    h: el.style.height || '',
    tx: el._tx || 0,
    ty: el._ty || 0,
  };
}

function makeHandle(el, pos, axes) {
  const h = document.createElement('div');
  h.className = 'resize-handle ' + pos;
  el.appendChild(h);
  h.addEventListener('mousedown', e => {
    e.stopPropagation();
    e.preventDefault();
    const primarySides = sidesFromHandlePos(pos);
    const { stageRect, scale } = getStageRectInfo();
    const startX = e.clientX, startY = e.clientY;
    // Capture start state for primary
    const captureTarget = (target) => {
      target.startW = target.el.offsetWidth;
      target.startH = target.el.offsetHeight;
      target.startTx = target.el._tx || 0;
      target.startTy = target.el._ty || 0;
      target.aspect = target.startW / Math.max(1, target.startH);
      target.startRect = bcrInStage(target.el, stageRect, scale);
      target.before = getResizeState(target.el);
    };
    const primaryTarget = { el, sides: primarySides };
    captureTarget(primaryTarget);

    // ── グループ corner-drag 拡縮 (zukan からポート) ──
    const isGroupCornerScale = primarySides.length === 2
      && typeof selectedElements !== 'undefined'
      && selectedElements.has(el)
      && selectedElements.size >= 2;
    let groupScale = null;
    if (isGroupCornerScale) {
      const sel = [...selectedElements];
      const rects = sel.map(s => bcrInStage(s, stageRect, scale));
      const minLeft = Math.min(...rects.map(r => r.left));
      const maxRight = Math.max(...rects.map(r => r.right));
      const minTop = Math.min(...rects.map(r => r.top));
      const maxBottom = Math.max(...rects.map(r => r.bottom));
      const gcx = (minLeft + maxRight) / 2;
      const gcy = (minTop + maxBottom) / 2;
      groupScale = {
        gcx, gcy,
        primaryOrigW: primaryTarget.startW,
        primaryOrigH: primaryTarget.startH,
        targets: sel.map((s, i) => ({
          el: s,
          origW: parseFloat(s.style.width) || s.offsetWidth,
          origH: parseFloat(s.style.height) || s.offsetHeight,
          origTx: s._tx || 0,
          origTy: s._ty || 0,
          origCx: (rects[i].left + rects[i].right) / 2,
          origCy: (rects[i].top + rects[i].bottom) / 2,
          before: getResizeState(s),
        })),
      };
    }

    const linkingDisabled = e.ctrlKey || e.metaKey;
    const linkedTargets = (isGroupCornerScale || linkingDisabled) ? [] : findLinkedTargets(el, primarySides);
    linkedTargets.forEach(t => captureTarget(t));
    linkedTargets.forEach(t => t.el.classList.add('edge-linked'));

    const onMove = (e2) => {
      const dx = (e2.clientX - startX) / scale;
      const dy = (e2.clientY - startY) / scale;
      const sym = e2.altKey;

      if (groupScale) {
        let newW = groupScale.primaryOrigW, newH = groupScale.primaryOrigH;
        if (primarySides.includes('e')) newW = Math.max(20, groupScale.primaryOrigW + dx);
        if (primarySides.includes('w') && !primarySides.includes('e')) newW = Math.max(20, groupScale.primaryOrigW - dx);
        if (primarySides.includes('s')) newH = Math.max(20, groupScale.primaryOrigH + dy);
        if (primarySides.includes('n') && !primarySides.includes('s')) newH = Math.max(20, groupScale.primaryOrigH - dy);
        const factor = (newW / groupScale.primaryOrigW + newH / groupScale.primaryOrigH) / 2;
        groupScale.targets.forEach(t => {
          t.el.style.width  = Math.round(t.origW * factor) + 'px';
          t.el.style.height = Math.round(t.origH * factor) + 'px';
          const newCx = groupScale.gcx + (t.origCx - groupScale.gcx) * factor;
          const newCy = groupScale.gcy + (t.origCy - groupScale.gcy) * factor;
          const sizeShiftX = (t.origW * factor - t.origW) / 2;
          const sizeShiftY = (t.origH * factor - t.origH) / 2;
          t.el._tx = t.origTx + (newCx - t.origCx) - sizeShiftX;
          t.el._ty = t.origTy + (newCy - t.origCy) - sizeShiftY;
          t.el.style.transform = `translate(${t.el._tx}px, ${t.el._ty}px)`;
          t.el._resizeUpdateLabel && t.el._resizeUpdateLabel();
        });
        return;
      }

      performResize(primaryTarget, primarySides, dx, dy, sym, axes, stageRect, scale);
      linkedTargets.forEach(t => {
        performResize(t, t.sides, dx, dy, false, 'wh', stageRect, scale);
      });
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      linkedTargets.forEach(t => t.el.classList.remove('edge-linked'));
      const allTargets = groupScale ? groupScale.targets : [primaryTarget, ...linkedTargets];
      allTargets.forEach(t => {
        const after = getResizeState(t.el);
        if (JSON.stringify(after) !== JSON.stringify(t.before)) {
          pushHistory({ type: 'resize', el: t.el, before: t.before, after });
        }
      });
      saveResizeState();
      updateNumericPanel();
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
  return h;
}

function attachMoveDrag(el) {
  const handler = (e) => {
    if (!document.body.classList.contains('resize-mode')) return;
    if (e.target.classList.contains('resize-handle')) return;
    if (e.target !== el && !el.contains(e.target)) return;
    if (e.target.classList.contains('resize-handle') ||
        e.target.classList.contains('resize-size-label')) return;
    e.stopPropagation();
    e.preventDefault();

    // Selection logic:
    //   Shift+click → toggle membership (no drag this gesture)
    //   plain click on un-selected element → select-only
    //   click on already-selected element → keep selection, prepare group drag
    if (e.shiftKey) {
      toggleSelect(el);
      return;
    }
    if (!selectedElements.has(el)) {
      selectOnly(el);
    }

    // Drag targets = all selected (always includes el at this point)
    const targets = [...selectedElements];
    if (targets.length === 0) targets.push(el);

    const startX = e.clientX, startY = e.clientY;
    const { scale } = getStageRectInfo();
    const startStates = targets.map(t => ({
      el: t,
      tx: t._tx || 0,
      ty: t._ty || 0,
      before: getResizeState(t),
    }));

    const onMove = (e2) => {
      let dx = (e2.clientX - startX) / scale;
      let dy = (e2.clientY - startY) / scale;
      if (e2.shiftKey) {
        if (Math.abs(dx) >= Math.abs(dy)) dy = 0;
        else dx = 0;
      }
      startStates.forEach(s => {
        s.el._tx = s.tx + dx;
        s.el._ty = s.ty + dy;
        s.el.style.transform = `translate(${s.el._tx}px, ${s.el._ty}px)`;
      });
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      startStates.forEach(s => {
        const after = getResizeState(s.el);
        if (JSON.stringify(after) !== JSON.stringify(s.before)) {
          pushHistory({ type: 'resize', el: s.el, before: s.before, after });
        }
      });
      saveResizeState();
      updateNumericPanel();
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };
  el.addEventListener('mousedown', handler);
}

// ─── ルーラー + ガイド ───
function adjustRulerPos() {
  const tb = document.querySelector('.toolbar');
  const toolbarH = (tb && getComputedStyle(tb).display !== 'none') ? tb.offsetHeight : 0;
  document.documentElement.style.setProperty('--toolbar-h', toolbarH + 'px');
}
function setupRulers() {
  if (document.querySelector('.ruler.horizontal')) {
    adjustRulerPos();
    return;
  }
  const rh = document.createElement('div'); rh.className = 'ruler horizontal';
  const rv = document.createElement('div'); rv.className = 'ruler vertical';
  document.body.appendChild(rh);
  document.body.appendChild(rv);
  rh.addEventListener('mousedown', e => createGuide(e, 'h'));
  rv.addEventListener('mousedown', e => createGuide(e, 'v'));
  adjustRulerPos();
  window.addEventListener('resize', adjustRulerPos);
}
function createGuide(e, axis) {
  e.preventDefault();
  const g = document.createElement('div');
  g.className = 'guide ' + axis;
  const lbl = document.createElement('div');
  lbl.className = 'guide-label';
  g.appendChild(lbl);
  document.body.appendChild(g);
  attachGuideDrag(g, lbl, axis);
  pushHistory({ type: 'add', el: g, parent: document.body, next: null });
  // 即座にドラッグ開始
  const evt = new MouseEvent('mousedown', { clientX: e.clientX, clientY: e.clientY, bubbles: true });
  g.dispatchEvent(evt);
}
function attachGuideDrag(g, lbl, axis) {
  const getCurPos = () => axis === 'h' ? parseFloat(g.style.top) || 0 : parseFloat(g.style.left) || 0;
  const updatePos = (clientX, clientY) => {
    if (axis === 'h') {
      g.style.top = clientY + 'px';
      lbl.textContent = `y: ${Math.round(clientY)}px`;
    } else {
      g.style.left = clientX + 'px';
      lbl.textContent = `x: ${Math.round(clientX)}px`;
    }
  };
  g.addEventListener('mousedown', e => {
    e.stopPropagation();
    e.preventDefault();
    const before = getCurPos();
    const onMove = (e2) => updatePos(e2.clientX, e2.clientY);
    const onUp = (e2) => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      // ルーラーに戻したら削除
      if (axis === 'h' && e2.clientY < 24) {
        pushHistory({ type: 'remove', el: g, parent: document.body, next: g.nextSibling });
        g.remove();
      } else if (axis === 'v' && e2.clientX < 24) {
        pushHistory({ type: 'remove', el: g, parent: document.body, next: g.nextSibling });
        g.remove();
      } else {
        const after = getCurPos();
        if (after !== before) pushHistory({ type: 'guide-move', el: g, before, after });
      }
      saveResizeState();
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    updatePos(e.clientX, e.clientY);
  });
  // 右クリックで削除
  g.addEventListener('contextmenu', e => {
    e.preventDefault();
    pushHistory({ type: 'remove', el: g, parent: document.body, next: g.nextSibling });
    g.remove();
    saveResizeState();
  });
}
function collectGuides() {
  return [...document.querySelectorAll('.guide')].map(g => ({
    axis: g.classList.contains('h') ? 'h' : 'v',
    pos: g.classList.contains('h') ? parseFloat(g.style.top) : parseFloat(g.style.left),
  }));
}
function restoreGuides(arr) {
  document.querySelectorAll('.guide').forEach(g => g.remove());
  arr.forEach(({axis, pos}) => {
    const g = document.createElement('div');
    g.className = 'guide ' + axis;
    if (axis === 'h') g.style.top = pos + 'px';
    else g.style.left = pos + 'px';
    const lbl = document.createElement('div');
    lbl.className = 'guide-label';
    lbl.textContent = (axis === 'h' ? 'y: ' : 'x: ') + Math.round(pos) + 'px';
    g.appendChild(lbl);
    document.body.appendChild(g);
    attachGuideDrag(g, lbl, axis);
  });
}

function enableResize() {
  document.body.classList.add('resize-mode');
  document.getElementById('resize-toggle').textContent = '📐 サイズ調整 ON';
  document.getElementById('resize-toggle').classList.add('active');
  RESIZABLE_SPEC.forEach(([sel, axes]) => {
    document.querySelectorAll(sel).forEach(el => attachHandle(el, axes));
  });
  setupRulers();
}
function disableResize() {
  document.body.classList.remove('resize-mode');
  document.getElementById('resize-toggle').textContent = '📐 サイズ調整 OFF';
  document.getElementById('resize-toggle').classList.remove('active');
  document.querySelectorAll('.resize-handle, .resize-size-label').forEach(el => el.remove());
  document.querySelectorAll('.resizable').forEach(el => { el.classList.remove('resizable'); el.classList.remove('selected'); el.classList.remove('edge-linked'); delete el._resizeUpdateLabel; });
  clearSelection();
  if (typeof setDrawMode === 'function' && drawModeOn) setDrawMode(false);
}
document.getElementById('resize-toggle').addEventListener('click', () => {
  if (document.body.classList.contains('resize-mode')) disableResize();
  else enableResize();
});
document.getElementById('resize-reset').addEventListener('click', resetResizeState);
document.getElementById('save-layout').addEventListener('click', explicitSaveLayout);
document.getElementById('revert-layout').addEventListener('click', revertLayout);

// グリッド比較トグル: 旧 grid placeholder (色付き正方形) と本物画像を切替
const gridBtn = document.getElementById('grid-mode-toggle');
function applyGridMode(on) {
  document.body.classList.toggle('grid-mode', on);
  gridBtn.textContent = on ? '🔁 グリッド比較 ON' : '🔁 グリッド比較 OFF';
  gridBtn.classList.toggle('active', on);
  try { localStorage.setItem('quizland_preview_grid_mode', on ? '1' : '0'); } catch(_) {}
}
gridBtn.addEventListener('click', () => applyGridMode(!document.body.classList.contains('grid-mode')));
try { if (localStorage.getItem('quizland_preview_grid_mode') === '1') applyGridMode(true); } catch(_) {}

// ───── 1 枚シート画像オーバーレイ ─────
const sheetBtn = document.getElementById('sheet-toggle');
function setSheetMode(on) {
  document.body.classList.toggle('sheet-on', on);
  if (sheetBtn) {
    sheetBtn.textContent = on ? '🪟 シート画像 ON' : '🪟 シート画像 OFF';
    sheetBtn.classList.toggle('active', on);
  }
  try { localStorage.setItem('quizland_sheet_mode', on ? '1' : '0'); } catch(_) {}
}
sheetBtn && sheetBtn.addEventListener('click', () => setSheetMode(!document.body.classList.contains('sheet-on')));
// sheet-on は body class でデフォルト ON (本番モード)。 localStorage で明示的に
// '0' (= ユーザーが一度 OFF にした) の時だけ OFF にして placeholder モードに戻す。
// localStorage に何もない場合 (新規ユーザー / リセット後) は ON のまま。
try {
  const saved = localStorage.getItem('quizland_sheet_mode');
  if (saved === '0') setSheetMode(false);
  else setSheetMode(true);  // ON でボタンラベル / classList を整える
} catch(_) {}

// ───── userbox 機能 (zukan からポート) ─────
const drawBtn = document.getElementById('userbox-add');
let drawModeOn = false;
function setDrawMode(on) {
  drawModeOn = on;
  document.body.classList.toggle('draw-mode', on);
  if (drawBtn) {
    drawBtn.textContent = on ? '🆕 矩形追加 ON' : '🆕 矩形追加 OFF';
    drawBtn.classList.toggle('active', on);
  }
}
drawBtn && drawBtn.addEventListener('click', () => {
  if (!document.body.classList.contains('resize-mode')) enableResize();
  setDrawMode(!drawModeOn);
  if (typeof showLayoutToast === 'function') {
    showLayoutToast(drawModeOn ? '矩形追加 ON: 空き領域をドラッグして矩形を作成' : '矩形追加 OFF');
  }
});
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && drawModeOn) setDrawMode(false);
  // Delete / Backspace で選択中の要素を隠す (input/contenteditable にフォーカス中は除外)
  if ((e.key === 'Delete' || e.key === 'Backspace') &&
      !e.target.matches('input, textarea, [contenteditable="true"]') &&
      document.body.classList.contains('resize-mode') &&
      typeof selectedElements !== 'undefined' && selectedElements.size > 0) {
    e.preventDefault();
    if (typeof hideSelectedElements === 'function') hideSelectedElements();
  }
});

let userboxCounter = 0;
function createUserbox(opts) {
  // opts: { id?, label?, left, top, w, h, tx?, ty?, bgImage? }
  userboxCounter += 1;
  const id = opts.id || ('userbox-' + Date.now() + '-' + userboxCounter);
  const label = opts.label || ('枠' + userboxCounter);
  const div = document.createElement('div');
  div.className = 'userbox';
  div.dataset.userboxId = id;
  div.dataset.userboxLabel = label;
  if (opts.bgImage) {
    div.dataset.bgImage = opts.bgImage;
    div.style.backgroundImage = `url("${opts.bgImage}")`;
    div.style.backgroundSize = 'contain';
    div.style.backgroundRepeat = 'no-repeat';
    div.style.backgroundPosition = 'center';
    div.style.backgroundColor = 'transparent';
  }
  div.style.left = opts.left;
  div.style.top = opts.top;
  if (opts.w) div.style.width = opts.w;
  if (opts.h) div.style.height = opts.h;
  const badge = document.createElement('div');
  badge.className = 'userbox-badge';
  badge.contentEditable = 'true';
  badge.textContent = label;
  badge.spellcheck = false;
  badge.addEventListener('mousedown', e => e.stopPropagation());
  badge.addEventListener('blur', () => {
    const newLabel = badge.textContent.trim() || ('枠' + userboxCounter);
    badge.textContent = newLabel;
    div.dataset.userboxLabel = newLabel;
    saveResizeState();
  });
  badge.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); badge.blur(); }
  });
  div.appendChild(badge);
  const del = document.createElement('div');
  del.className = 'userbox-del';
  del.textContent = '×';
  del.title = '削除';
  del.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); });
  del.addEventListener('click', e => {
    e.stopPropagation();
    if (confirm(`「${div.dataset.userboxLabel}」 を削除しますか？`)) {
      selectedElements && selectedElements.delete(div);
      div.remove();
      saveResizeState();
      refreshSelectionUI && refreshSelectionUI();
    }
  });
  div.appendChild(del);
  const target = document.getElementById('safe-area') || stage;
  target.appendChild(div);
  if (document.body.classList.contains('resize-mode')) {
    attachHandle(div, 'wh');
  }
  if (opts.tx || opts.ty) {
    div._tx = opts.tx || 0;
    div._ty = opts.ty || 0;
    div.style.transform = `translate(${div._tx}px, ${div._ty}px)`;
  }
  return div;
}

function collectUserboxes() {
  return [...document.querySelectorAll('.userbox')].map(el => ({
    id: el.dataset.userboxId,
    label: el.dataset.userboxLabel,
    left: el.style.left,
    top: el.style.top,
    w: el.style.width,
    h: el.style.height,
    tx: el._tx || 0,
    ty: el._ty || 0,
    bgImage: el.dataset.bgImage || '',
  }));
}
function restoreUserboxes(arr) {
  document.querySelectorAll('.userbox').forEach(el => el.remove());
  if (!Array.isArray(arr)) return;
  arr.forEach(box => createUserbox(box));
}

// ステージ mousedown でドラッグ → 新規 userbox 作成
const _stageEl = document.getElementById('stage');
_stageEl && _stageEl.addEventListener('mousedown', e => {
  if (!document.body.classList.contains('resize-mode')) return;
  if (e.target.closest('.toolbar, .ruler, .guide, .numeric-panel')) return;
  if (!drawModeOn && e.target.closest('.resizable, .resize-handle, .userbox-badge, .userbox-del')) return;
  e.preventDefault();
  e.stopPropagation();
  const stageRect = _stageEl.getBoundingClientRect();
  const stageW = parseFloat(getComputedStyle(_stageEl).width);
  const scale = stageRect.width / stageW || 1;
  const safe = document.getElementById('safe-area') || _stageEl;
  const safeRect = safe.getBoundingClientRect();
  const sx = (e.clientX - safeRect.left) / scale;
  const sy = (e.clientY - safeRect.top) / scale;
  const preview = document.createElement('div');
  preview.className = 'userbox-preview';
  preview.style.left = sx + 'px';
  preview.style.top = sy + 'px';
  preview.style.width = '0px';
  preview.style.height = '0px';
  safe.appendChild(preview);
  const onMove = (e2) => {
    const x = (e2.clientX - safeRect.left) / scale;
    const y = (e2.clientY - safeRect.top) / scale;
    const x0 = Math.min(sx, x), y0 = Math.min(sy, y);
    const w = Math.abs(x - sx), h = Math.abs(y - sy);
    preview.style.left = x0 + 'px';
    preview.style.top = y0 + 'px';
    preview.style.width = w + 'px';
    preview.style.height = h + 'px';
  };
  const onUp = () => {
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
    const w = parseFloat(preview.style.width);
    const h = parseFloat(preview.style.height);
    const left = preview.style.left;
    const top = preview.style.top;
    preview.remove();
    if (w >= 20 && h >= 20) {
      createUserbox({ left, top, w: w + 'px', h: h + 'px' });
      saveResizeState();
    }
  };
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
});

async function snapshotCurrentView(prefix) {
  if (typeof html2canvas !== 'function') {
    alert('html2canvas が読み込めていません。 リロードして再試行してください');
    return;
  }
  const safe = document.getElementById('safe-area');
  if (!safe) return;
  showLayoutToast && showLayoutToast('スナップショット生成中...');
  try {
    const canvas = await html2canvas(safe, {
      width: 1600,
      height: 900,
      scale: 1,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      logging: false,
    });
    canvas.toBlob(blob => {
      if (!blob) { showLayoutToast && showLayoutToast('PNG 生成失敗'); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      a.download = `${prefix}-snapshot-${ts}.png`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      showLayoutToast && showLayoutToast('現状 PNG を保存しました');
    }, 'image/png');
  } catch (err) {
    console.error(err);
    showLayoutToast && showLayoutToast('スナップショット失敗: ' + err.message);
  }
}
function quizlandExportWireframePng() {
  // 16:9 safe area サイズで出力 (21:9 outer のレターボックス部分は不要)
  const cssRoot = getComputedStyle(document.documentElement);
  const safeW = parseFloat(cssRoot.getPropertyValue('--safe-w')) || 1600;
  const safeH = parseFloat(cssRoot.getPropertyValue('--safe-h')) || 900;
  const canvasW = parseFloat(cssRoot.getPropertyValue('--canvas-w')) || 2100;
  // safe-area の stage 座標オフセット (canvas 内座標から safe-area 内座標へ変換)
  const safeOffsetX = (canvasW - safeW) / 2;

  // RESIZABLE_SPEC からセレクタ→ラベルマップを作る
  const labelMap = new Map();
  RESIZABLE_SPEC.forEach(([sel, , label]) => labelMap.set(sel, label || ''));

  const out = document.createElement('canvas');
  out.width = safeW;
  out.height = safeH;
  const ctx = out.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, safeW, safeH);

  // safe area の枠 (canvas 全体 = safe area なので 1px 内側に細く)
  // 中央クロスヘア (マゼンタ) は書き出しでは描かない (ユーザー指示)
  ctx.strokeStyle = 'rgba(0, 184, 224, 0.5)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 4]);
  ctx.strokeRect(1, 1, safeW - 2, safeH - 2);

  // quizland は CSS-flow + tx/ty で配置されているので getBoundingClientRect で実位置を取る
  const stageEl = document.getElementById('stage');
  const stageRect = stageEl.getBoundingClientRect();
  const stageW = parseFloat(getComputedStyle(stageEl).width);
  const scale = stageRect.width / stageW || 1;

  // 各 resizable を outline + label + size で描画
  // BCR は stage 座標、 これを safe-area 座標に変換 (- safeOffsetX)
  ctx.setLineDash([]);
  RESIZABLE_SPEC.forEach(([sel]) => {
    document.querySelectorAll(sel).forEach((el, idx) => {
      const r = el.getBoundingClientRect();
      const stageX = (r.left - stageRect.left) / scale;
      const stageY = (r.top  - stageRect.top)  / scale;
      const x = stageX - safeOffsetX;
      const y = stageY;
      const w = r.width  / scale;
      const h = r.height / scale;
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 3;
      ctx.strokeRect(x, y, w, h);

      // ラベル
      const label = (labelMap.get(sel) || sel) + (document.querySelectorAll(sel).length > 1 ? ` ${idx + 1}` : '');
      ctx.font = '700 18px system-ui, -apple-system, sans-serif';
      const padX = 8;
      const textW = ctx.measureText(label).width;
      const badgeH = 24;
      const badgeW = textW + padX * 2;
      const badgeY = (y - badgeH - 4 >= 0) ? (y - badgeH - 4) : (y + 4);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.88)';
      ctx.fillRect(x, badgeY, badgeW, badgeH);
      ctx.fillStyle = '#ffe8a8';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, x + padX, badgeY + badgeH / 2);

      // 中央に W × H
      const sizeText = `${Math.round(w)} × ${Math.round(h)}`;
      ctx.font = '500 16px ui-monospace, Menlo, Consolas, monospace';
      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(sizeText, x + w / 2, y + h / 2);
      ctx.textAlign = 'start';
      ctx.textBaseline = 'alphabetic';
    });
  });

  // 凡例
  ctx.font = '500 12px ui-monospace, Menlo, Consolas, monospace';
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.textAlign = 'right';
  ctx.fillText(`safe area ${safeW}×${safeH} (16:9)  生成 ${new Date().toLocaleString('ja-JP')}`, safeW - 12, safeH - 12);
  ctx.textAlign = 'start';

  out.toBlob(blob => {
    if (!blob) { showLayoutToast && showLayoutToast('PNG 生成に失敗しました'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.download = `quizland-wireframe-${ts}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    showLayoutToast && showLayoutToast('ワイヤー PNG を保存しました');
  }, 'image/png');
}
/* 旧 #export-wireframe-png 直リスナーは split-button に統合済み */
// Ctrl/Cmd+S で保存
window.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
    e.preventDefault();
    explicitSaveLayout();
  }
});

// 起動時にサーバー (commit 済み) → ローカルストレージの順で復元
(async () => {
  const serverData = await loadSavedLayoutFromServer();
  if (serverData && Object.keys(serverData).length > 0) {
    // server snapshot を適用
    try { localStorage.setItem(RESIZE_KEY, JSON.stringify(serverData)); } catch(e) {}
    loadResizeState();
  } else {
    loadResizeState();
  }
  lastSavedLayoutJson = JSON.stringify(takeLayoutSnapshot());
})();

// ───── Preview mode (端末サイズで見る) ─────
const previewBtn = document.getElementById('preview-mode');
const previewExit = document.getElementById('preview-exit');
function fitStage() {
  const w = window.innerWidth, h = window.innerHeight;
  const stageW = parseFloat(getComputedStyle(stage).width);
  const stageH = parseFloat(getComputedStyle(stage).height);
  const scale = Math.min(w / stageW, h / stageH);
  const scaledW = stageW * scale;
  const scaledH = stageH * scale;
  const offsetX = (w - scaledW) / 2;
  const offsetY = (h - scaledH) / 2;
  // transform-origin 0 0 + 明示的な translate(px) で確実にレターボックス中央配置
  stage.style.transformOrigin = '0 0';
  stage.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}
function enterPreview() {
  document.body.classList.add('preview-mode');
  fitStage();
  window.addEventListener('resize', fitStage);
  // 縦横対応: 端末を回転したらリフィット
  window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));
}
function exitPreview() {
  document.body.classList.remove('preview-mode');
  stage.style.transform = '';
  window.removeEventListener('resize', fitStage);
}
previewBtn?.addEventListener('click', enterPreview);
previewExit?.addEventListener('click', exitPreview);
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.body.classList.contains('preview-mode')) {
    exitPreview();
  }
});

// URL ?preview=1 で直接プレビューモード
if (new URLSearchParams(location.search).get('preview') === '1') {
  setTimeout(enterPreview, 50);
}

// ── Reset button ──
if (annoReset) {
  annoReset.addEventListener('click', () => {
    if (!confirm('保存された注釈と設定を全て削除します (元に戻せません)。よろしいですか？')) return;
    clearAllSavedState();
  });
}

// ── Init: load saved state, otherwise default layout ──
const restored = loadState();
if (!restored) {
  buildLayout('row-3');
} else {
  buildLayout(document.getElementById('layout-select').value);
}

// ── Save before leaving ──
window.addEventListener('beforeunload', saveState);
window.addEventListener('visibilitychange', () => { if (document.hidden) saveState(); });
