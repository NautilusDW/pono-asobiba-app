<!DOCTYPE html>

<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@500;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #4f3825;
  --ink-soft: #806047;
  --wood-dark: #6e4b2d;
  --wood-mid: #a36b3c;
  --wood-light: #d99a5e;
  --paper: #fff8e8;
  --paper-deep: #f1ddb7;
  --mint: #86d7ac;
  --mint-dark: #3c986f;
  --coral: #ee7b6b;
  --sky: #8ed2ec;
  --blue: #6eb8df;
  --gold: #f5be4f;
  --shadow: rgba(70, 42, 18, 0.25);
  --pixel-font: 'DotGothic16', 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --round-font: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --care-yard-bg: url('../assets/images/mojikko/care/yard_background.png');
  --care-yard-bg-wide: url('../assets/images/mojikko/care/yard_background_wide_v2.png');
  --care-house: url('../assets/images/mojikko/care/house_front.png');
  --care-rug: url('../assets/images/mojikko/care/pink_rug.png');
  --care-doghouse: url('../assets/images/mojikko/care/doghouse_and_jar.png');
  --care-cushion: url('../assets/images/mojikko/care/star_cushion.png');
  --care-planter: url('../assets/images/mojikko/care/flower_planter.png');
  --care-fence: url('../assets/images/mojikko/care/fence_piece.png');
  --care-basket: url('../assets/images/mojikko/care/star_basket.png');
  --care-bush: url('../assets/images/mojikko/care/flower_bush.png');
  --care-watering: url('../assets/images/mojikko/care/watering_can.png');
  --care-flowers-a: url('../assets/images/mojikko/care/flowers_yellow_pink.png');
  --care-flowers-b: url('../assets/images/mojikko/care/flowers_pink_blue.png');
  --care-flowers-c: url('../assets/images/mojikko/care/flowers_white.png');
  --care-fx-heart: url('../assets/images/mojikko/care/fx_heart_cluster.png');
  --care-fx-heart-small: url('../assets/images/mojikko/care/fx_heart_small.png');
  --care-fx-sparkle: url('../assets/images/mojikko/care/fx_sparkle_cluster.png');
  --care-milmaru-normal: url('../assets/images/mojikko/writing/milmaru_idle.png');
  --care-milmaru-happy: url('../assets/images/mojikko/writing/milmaru_cheer.png');
  --care-milmaru-eating: url('../assets/images/mojikko/writing/milmaru_cookie.png');
  --care-milmaru-relaxed: url('../assets/images/mojikko/writing/milmaru_relaxed.png');
  --care-egg-idle: url('../assets/images/mojikko/care/milmaru_egg_idle.png');
  --care-egg-cracked: url('../assets/images/mojikko/care/milmaru_egg_cracked.png');
  --care-egg-peek: url('../assets/images/mojikko/care/milmaru_egg_peek.png');
  --care-shell-baby-happy: url('../assets/images/mojikko/care/milmaru_shell_baby_idle_pose.png');
  --care-shell-baby-arms-up: url('../assets/images/mojikko/care/milmaru_shell_baby_arms_up.png');
  --care-shell-baby-wiggle: url('../assets/images/mojikko/care/milmaru_shell_baby_wiggle.png');
  --care-shell-baby-wave: url('../assets/images/mojikko/care/milmaru_shell_baby_wave.png');
  --care-shell-baby-milk: url('../assets/images/mojikko/care/milmaru_shell_baby_milk_pose.png');
  --care-shell-baby-sleep: url('../assets/images/mojikko/care/milmaru_shell_baby_sleep.png');
  --care-shell-baby-left: url('../assets/images/mojikko/care/milmaru_shell_baby_left.png');
  --care-shell-baby-right: url('../assets/images/mojikko/care/milmaru_shell_baby_right.png');
  --care-shell-baby-cry: url('../assets/images/mojikko/care/milmaru_shell_baby_cry_pose.png');
  --care-shell-baby-bigcry: url('../assets/images/mojikko/care/milmaru_shell_baby_cry_pose.png');
  --care-shell-baby-angry: url('../assets/images/mojikko/care/milmaru_shell_baby_angry_pose.png');
  --care-shell-baby-disappointed: url('../assets/images/mojikko/care/milmaru_shell_baby_disappointed.png');
  --care-shell-baby-worried: url('../assets/images/mojikko/care/milmaru_shell_baby_worried_pose.png');
  --care-headshell-baby-happy: url('../assets/images/mojikko/care/milmaru_headshell_baby_happy.png');
  --care-headshell-baby-cry: url('../assets/images/mojikko/care/milmaru_headshell_baby_cry.png');
  --care-headshell-baby-bigcry: url('../assets/images/mojikko/care/milmaru_headshell_baby_bigcry.png');
  --care-headshell-baby-angry: url('../assets/images/mojikko/care/milmaru_headshell_baby_angry.png');
  --care-headshell-baby-disappointed: url('../assets/images/mojikko/care/milmaru_headshell_baby_disappointed.png');
  --care-headshell-baby-worried: url('../assets/images/mojikko/care/milmaru_headshell_baby_worried.png');
  --care-icon-cookie: url('../assets/images/mojikko/writing/icon_cookie.png');
  --care-icon-heart: url('../assets/images/mojikko/writing/icon_heart.png');
  --care-icon-pencil: url('../assets/images/mojikko/writing/icon_pencil.png');
  --care-icon-warm: url('../assets/images/mojikko/care/icon_warm_large.png');
  --care-icon-star: url('../assets/images/mojikko/writing/icon_star.png');
  --care-star-counter: url('../assets/images/mojikko/writing/star_counter.png');
  --care-settings: url('../assets/images/mojikko/writing/settings_button.png');
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  color: var(--ink);
  background: #243b33;
  font-family: var(--round-font);
  position: fixed;
  inset: 0;
}

#stage-wrap {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: linear-gradient(180deg, #233f53 0%, #12222b 100%);
}

#stage-wrap::before {
  content: '';
  position: fixed;
  inset: -72vmax;
  z-index: 0;
  opacity: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.84) 0 12%, rgba(255,255,255,0.26) 27%, rgba(255,255,255,0) 58%),
    radial-gradient(circle at center, rgba(255,152,185,0) 0 44%, rgba(181,75,111,0.16) 100%),
    repeating-conic-gradient(
      from 0deg,
      #fff1f6 0deg 9deg,
      #ffc4d6 9deg 18deg,
      #ff9fbd 18deg 27deg,
      #ffdce8 27deg 36deg
    );
  transform-origin: center;
  transition: opacity 0.18s ease;
}

#stage-wrap.hatch-active::before {
  opacity: 0;
  animation: hatchRaySpin 5.2s linear infinite;
}

#stage {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  width: 1600px;
  height: 900px;
  transform-origin: 0 0;
  overflow: hidden;
  background: var(--care-yard-bg-wide) right center / cover no-repeat;
  image-rendering: pixelated;
}

#stage.hatch-active {
  overflow: visible;
}

#stage.hatch-active::before {
  display: none;
}

#stage::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px),
    linear-gradient(180deg, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 8px 8px, 8px 8px;
  mix-blend-mode: soft-light;
  pointer-events: none;
}

.pixel-panel,
.wood-panel,
.paper-panel {
  border: 5px solid var(--wood-dark);
  box-shadow: 0 6px 0 #4b321f, 0 10px 18px var(--shadow);
  color: var(--ink);
}

.wood-panel {
  background:
    repeating-linear-gradient(90deg, rgba(87, 56, 31, 0.12) 0 10px, rgba(255,255,255,0.06) 10px 18px),
    linear-gradient(180deg, #f7d79b, #d99a5e);
}

.paper-panel {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.42), transparent 30%),
    linear-gradient(180deg, var(--paper), var(--paper-deep));
}

.pixel-button {
  border: 4px solid #875b3b;
  border-radius: 8px;
  background: linear-gradient(180deg, #fff0bd 0%, #f2bd6d 100%);
  box-shadow: 0 5px 0 #6f462c, inset 0 3px rgba(255,255,255,0.55);
  color: var(--ink);
  font-family: var(--pixel-font);
  font-size: 25px;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  image-rendering: pixelated;
}

.pixel-button:active {
  transform: translateY(4px);
  box-shadow: 0 1px 0 #6f462c, inset 0 2px rgba(255,255,255,0.35);
}

.icon-btn {
  width: 74px;
  height: 66px;
  border-radius: 10px;
  font-size: 32px;
}

#settingsBtn {
  border: 0;
  border-radius: 0;
  background: var(--care-settings) center / contain no-repeat;
  box-shadow: none;
  color: transparent;
  text-shadow: none;
}

.care-header {
  position: absolute;
  left: 28px;
  right: 28px;
  top: 20px;
  height: 84px;
  display: grid;
  grid-template-columns: 220px 1fr 280px 78px;
  align-items: center;
  gap: 24px;
  z-index: 5;
}

.back-btn {
  height: 62px;
  text-align: left;
  padding-left: 28px;
}

.title-board {
  height: 74px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-family: var(--pixel-font);
  font-size: 44px;
  letter-spacing: 0;
}

.star-box {
  width: 198px;
  min-width: 198px;
  aspect-ratio: 291 / 91;
  height: auto;
  justify-self: end;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding-left: 46px;
  border: 0;
  border-radius: 0;
  font-family: var(--pixel-font);
  font-size: 30px;
  background: var(--care-star-counter) center / contain no-repeat;
  box-shadow: none;
  image-rendering: pixelated;
}

.star-icon {
  display: none;
}

.gauges {
  position: absolute;
  top: 118px;
  left: 322px;
  right: 322px;
  height: 112px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  z-index: 4;
}

.gauge-card {
  padding: 16px 22px;
  border-radius: 10px;
}

.gauge-title {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--pixel-font);
  font-size: 24px;
}

.gauge-icon {
  width: 38px;
  height: 34px;
  display: inline-block;
}

.gauge-icon.heart {
  background: var(--coral);
  clip-path: polygon(50% 18%, 58% 6%, 72% 2%, 87% 8%, 96% 22%, 96% 38%, 88% 55%, 50% 96%, 12% 55%, 4% 38%, 4% 22%, 13% 8%, 28% 2%, 42% 6%);
}

.gauge-icon.leaf {
  background: var(--mint-dark);
  border-radius: 70% 10% 70% 10%;
  transform: rotate(-28deg);
}

.gauge-line {
  margin-top: 10px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
  font-family: var(--pixel-font);
  font-size: 23px;
}

.gauge-track {
  height: 28px;
  border: 4px solid #9f7655;
  border-radius: 7px;
  background: #f4dfbd;
  overflow: hidden;
}

.gauge-fill {
  width: 0%;
  height: 100%;
  border-right: 4px solid rgba(255,255,255,0.45);
  transition: width 0.35s ease;
}

.gauge-fill.nakayoshi {
  background: repeating-linear-gradient(90deg, #ff9aa5 0 22px, #f7798b 22px 42px);
}

.gauge-fill.sukusuku {
  background: repeating-linear-gradient(90deg, #75d3a7 0 22px, #42b883 22px 42px);
}

.side-panel {
  position: absolute;
  top: 146px;
  bottom: 70px;
  width: 270px;
  border-radius: 10px;
  z-index: 3;
  display: grid;
  grid-template-rows: 58px 1fr;
  overflow: hidden;
}

.side-panel.left { left: 28px; }
.side-panel.right { right: 28px; }

.panel-heading {
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #77d1b0, #56b98f);
  color: #fffdf0;
  font-family: var(--pixel-font);
  font-size: 28px;
  text-shadow: 2px 2px rgba(89, 61, 40, 0.35);
}

.panel-body {
  padding: 18px;
  display: grid;
  gap: 16px;
  align-content: start;
}

.item-card {
  min-height: 86px;
  padding: 12px;
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 12px;
  align-items: center;
  border: 3px solid rgba(139, 96, 66, 0.38);
  border-radius: 10px;
  background: rgba(255,255,255,0.48);
}

.cookie-icon,
.milk-icon,
.power-icon {
  position: relative;
  width: 50px;
  height: 50px;
  border: 0;
  border-radius: 0;
  box-shadow: none;
  image-rendering: pixelated;
}

.cookie-icon {
  background: var(--care-icon-cookie) center / contain no-repeat;
}

.milk-icon {
  width: 42px;
  height: 56px;
  justify-self: center;
  border: 4px solid #9f7655;
  border-radius: 8px 8px 12px 12px;
  background: linear-gradient(180deg, #fffdf5 0 22%, #dff8f3 22% 42%, #fffdf5 42% 100%);
  box-shadow: inset 0 4px rgba(255,255,255,0.75), 0 3px 0 rgba(111,70,44,0.25);
}

.milk-icon::before {
  content: '';
  position: absolute;
  left: 8px;
  right: 8px;
  top: -10px;
  height: 12px;
  border: 4px solid #9f7655;
  border-bottom: 0;
  border-radius: 5px 5px 0 0;
  background: #d7f1ed;
}

.power-icon {
  display: grid;
  place-items: center;
  border: 4px solid #d89140;
  border-radius: 12px;
  background: linear-gradient(180deg, #fff6b5, #f2b65d);
}

.power-icon::before {
  content: '✦';
  color: #fff8db;
  font-family: var(--pixel-font);
  font-size: 31px;
  line-height: 1;
  text-shadow: 2px 2px #b96d34;
}

.item-name {
  font-family: var(--round-font);
  font-size: 18px;
  font-weight: 900;
  line-height: 1.25;
}

.item-count {
  margin-top: 6px;
  font-family: var(--pixel-font);
  font-size: 20px;
}

.locked-slot {
  height: 96px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 3px dashed rgba(139, 96, 66, 0.28);
  border-radius: 10px;
  color: rgba(94, 71, 52, 0.36);
  font-size: 34px;
}

.center-yard {
  position: absolute;
  left: 326px;
  right: 326px;
  top: 248px;
  bottom: 144px;
  z-index: 2;
}

.yard-bg {
  position: absolute;
  inset: 0;
  border-radius: 18px;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
    var(--care-yard-bg) center / cover no-repeat;
  box-shadow:
    inset 0 0 0 4px rgba(255, 255, 255, 0.16),
    inset 0 -20px 30px rgba(74, 118, 57, 0.1);
  image-rendering: pixelated;
}

.yard-bg,
.yard-prop {
  display: none;
}

.yard-bg::before {
  display: none;
}

.yard-bg::after {
  display: none;
}

.yard-prop {
  position: absolute;
  background-position: center;
  background-repeat: no-repeat;
  background-size: contain;
  image-rendering: pixelated;
  pointer-events: none;
}

.yard-prop.house {
  right: 62px;
  top: 54px;
  width: 300px;
  height: 224px;
  background-image: var(--care-house);
  z-index: 1;
}

.yard-prop.fence {
  left: 70px;
  right: 76px;
  top: 174px;
  height: 74px;
  background-image: var(--care-fence);
  background-size: 100% 100%;
  opacity: 0.86;
  z-index: 0;
}

.yard-prop.rug {
  left: 50%;
  bottom: 52px;
  width: 380px;
  height: 152px;
  transform: translateX(-50%);
  background-image: var(--care-rug);
  z-index: 2;
}

.yard-prop.doghouse {
  left: 72px;
  top: 128px;
  width: 128px;
  height: 188px;
  background-image: var(--care-doghouse);
  z-index: 2;
}

.yard-prop.cushion {
  right: 114px;
  bottom: 72px;
  width: 144px;
  height: 92px;
  background-image: var(--care-cushion);
  z-index: 3;
}

.yard-prop.basket {
  left: 82px;
  bottom: 74px;
  width: 132px;
  height: 132px;
  background-image: var(--care-basket);
  z-index: 3;
}

.yard-prop.planter {
  right: 232px;
  top: 205px;
  width: 136px;
  height: 80px;
  background-image: var(--care-planter);
  z-index: 2;
}

.yard-prop.watering {
  right: 42px;
  bottom: 124px;
  width: 92px;
  height: 68px;
  background-image: var(--care-watering);
  z-index: 3;
}

.yard-prop.bush {
  left: 24px;
  bottom: 38px;
  width: 116px;
  height: 96px;
  background-image: var(--care-bush);
  z-index: 2;
}

.yard-prop.flowers-a {
  left: 242px;
  bottom: 34px;
  width: 82px;
  height: 80px;
  background-image: var(--care-flowers-a);
  z-index: 3;
}

.yard-prop.flowers-b {
  right: 306px;
  bottom: 30px;
  width: 90px;
  height: 82px;
  background-image: var(--care-flowers-b);
  z-index: 3;
}

.yard-prop.flowers-c {
  right: 20px;
  bottom: 36px;
  width: 76px;
  height: 76px;
  background-image: var(--care-flowers-c);
  z-index: 3;
}

.speech-bubble {
  position: absolute;
  left: 50%;
  top: 20px;
  min-width: 320px;
  max-width: 560px;
  min-height: 82px;
  padding: 20px 26px;
  transform: translateX(-42%);
  border-radius: 18px;
  border: 5px solid #8b6042;
  background: #fff8e8;
  box-shadow: 0 5px 0 #6f462c;
  font-family: var(--pixel-font);
  font-size: 26px;
  text-align: center;
  z-index: 5;
}

.speech-bubble::after {
  content: '';
  position: absolute;
  left: 44%;
  bottom: -24px;
  width: 38px;
  height: 38px;
  background: #fff8e8;
  border-right: 5px solid #8b6042;
  border-bottom: 5px solid #8b6042;
  transform: rotate(45deg);
}

.milmaru-wrap {
  position: absolute;
  left: 50%;
  bottom: 42px;
  width: 330px;
  height: 328px;
  transform: translateX(-50%);
  z-index: 5;
}

.milmaru {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 300px;
  height: 320px;
  transform: translateX(-50%);
  transform-origin: center bottom;
  background: var(--care-milmaru-normal) center bottom / contain no-repeat;
  image-rendering: pixelated;
  transition: transform 0.2s ease;
}

.milmaru::before,
.milmaru::after {
  display: none;
}

.milmaru-body {
  display: none;
}

.milmaru-body::before {
  display: none;
}

.milmaru-body::after {
  display: none;
}

.milmaru-arm,
.milmaru-foot {
  display: none;
}

.milmaru-tail {
  display: none;
}

.milmaru.happy { animation: happyBounce 0.72s ease; }
.milmaru.eating { animation: eatingWiggle 0.8s ease; }
.milmaru.relaxed { animation: relaxedSway 1s ease; }
.milmaru.play { animation: playHop 0.8s ease; }

.milmaru.egg {
  bottom: 74px;
  width: 180px;
  height: 232px;
  background-image: var(--care-egg-idle);
}

.milmaru.egg-cracked {
  background-image: var(--care-egg-cracked);
}

.milmaru.egg-peek {
  background-image: var(--care-egg-peek);
}

.milmaru.baby {
  width: 318px;
  height: 322px;
  background-image: var(--care-shell-baby-happy);
}

.milmaru.baby.normal {
  background-image: var(--care-shell-baby-happy);
}

.milmaru.baby.happy {
  background-image: var(--care-shell-baby-arms-up);
  animation: babyHappyFrames 0.82s step-end 2, happyBounce 0.72s ease;
}

.milmaru.baby.eating {
  background-image: var(--care-shell-baby-milk);
  animation: babyMilkFrames 0.9s step-end 2, eatingWiggle 0.8s ease;
}

.milmaru.baby.play {
  background-image: var(--care-shell-baby-wiggle);
  animation: babyPlayFrames 0.76s step-end 2, playHop 0.8s ease;
}

.milmaru.baby.birth {
  background-image: var(--care-shell-baby-arms-up);
}

.milmaru.baby.relaxed {
  background-image: var(--care-shell-baby-sleep);
}

.milmaru.baby.cry {
  background-image: var(--care-shell-baby-cry);
}

.milmaru.baby.bigcry {
  background-image: var(--care-shell-baby-bigcry);
}

.milmaru.baby.angry {
  background-image: var(--care-shell-baby-angry);
}

.milmaru.baby.disappointed {
  background-image: var(--care-shell-baby-disappointed);
}

.milmaru.baby.worried {
  background-image: var(--care-shell-baby-worried);
}

.milmaru.egg.warm {
  animation: eggWarm 0.9s ease;
}

.milmaru.egg.relaxed {
  animation: eggPetWiggle 0.75s ease;
}

.milmaru.birth {
  animation: birthPop 1.05s ease;
}

@keyframes happyBounce {
  0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
  30% { transform: translateX(-50%) translateY(-34px) scale(1.05); }
  60% { transform: translateX(-50%) translateY(0) scale(0.98); }
}
@keyframes eatingWiggle {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  25% { transform: translateX(-50%) rotate(-4deg) scale(1.03); }
  55% { transform: translateX(-50%) rotate(4deg) scale(1.02); }
}
@keyframes relaxedSway {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  50% { transform: translateX(-50%) rotate(3deg); }
}
@keyframes playHop {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  22% { transform: translateX(-70%) translateY(-18px); }
  52% { transform: translateX(-30%) translateY(-28px); }
}
@keyframes babyHappyFrames {
  0%, 100% { background-image: var(--care-shell-baby-arms-up); }
  45% { background-image: var(--care-shell-baby-wave); }
}
@keyframes babyMilkFrames {
  0%, 100% { background-image: var(--care-shell-baby-milk); }
  48% { background-image: var(--care-shell-baby-wave); }
}
@keyframes babyPlayFrames {
  0%, 100% { background-image: var(--care-shell-baby-wiggle); }
  45% { background-image: var(--care-shell-baby-arms-up); }
}
@keyframes eggWarm {
  0%, 100% { transform: translateX(-50%) scale(1); filter: brightness(1); }
  38% { transform: translateX(-50%) scale(1.05); filter: brightness(1.12) drop-shadow(0 0 14px rgba(255, 218, 118, 0.7)); }
  68% { transform: translateX(-50%) scale(0.98); }
}
@keyframes eggPetWiggle {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  22% { transform: translateX(-50%) rotate(-5deg); }
  48% { transform: translateX(-50%) rotate(5deg); }
  72% { transform: translateX(-50%) rotate(-3deg); }
}
@keyframes birthPop {
  0% { transform: translateX(-50%) translateY(0) scale(0.88); filter: brightness(1); }
  42% { transform: translateX(-50%) translateY(-36px) scale(1.08); filter: brightness(1.18) drop-shadow(0 0 18px rgba(134, 215, 172, 0.8)); }
  100% { transform: translateX(-50%) translateY(0) scale(1); filter: brightness(1); }
}

.fx-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 8;
}

.hatch-scene {
  position: absolute;
  inset: 0;
  z-index: 90;
  display: grid;
  grid-template-rows: 170px 1fr 132px;
  justify-items: center;
  align-items: center;
  overflow: hidden;
  pointer-events: none;
  opacity: 0;
  visibility: hidden;
  background: transparent;
  transition: opacity 0.18s ease, visibility 0.18s ease;
}

.hatch-scene.show {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
  overflow: visible;
}

.hatch-scene::before {
  content: '';
  position: absolute;
  inset: -72%;
  background:
    repeating-conic-gradient(
      from 0deg,
      #fff1f6 0deg 9deg,
      #ffc4d6 9deg 18deg,
      #ff9fbd 18deg 27deg,
      #ffdce8 27deg 36deg
    );
  transform-origin: center;
  animation: hatchRaySpin 5.2s linear infinite;
}

.hatch-scene::after {
  content: '';
  position: absolute;
  inset: -72%;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.84) 0 12%, rgba(255,255,255,0.26) 27%, rgba(255,255,255,0) 58%),
    radial-gradient(circle at center, rgba(255,152,185,0) 0 44%, rgba(181,75,111,0.16) 100%);
}

.hatch-copy,
.hatch-subcopy {
  position: relative;
  z-index: 4;
  min-width: 560px;
  padding: 18px 34px;
  border: 5px solid #8b6042;
  border-radius: 16px;
  background: rgba(255, 248, 232, 0.94);
  box-shadow: 0 6px 0 #6f462c;
  color: #5a3d28;
  font-family: var(--pixel-font);
  text-align: center;
}

.hatch-copy {
  align-self: end;
  font-size: 38px;
}

.hatch-subcopy {
  align-self: start;
  font-size: 24px;
}

.hatch-sprite {
  position: relative;
  z-index: 3;
  width: 370px;
  height: 470px;
  background: var(--care-egg-cracked) center / contain no-repeat;
  image-rendering: pixelated;
  filter: drop-shadow(0 22px 0 rgba(95, 61, 38, 0.18));
  transform-origin: center bottom;
}

.hatch-scene.phase-notice .hatch-sprite {
  width: 340px;
  height: 430px;
  animation: hatchSlowPulse 1.15s ease-in-out infinite;
}

.hatch-scene.phase-ready .hatch-sprite {
  width: 370px;
  height: 470px;
  animation: hatchEggShake 0.42s ease-in-out infinite;
}

.hatch-scene.phase-peek .hatch-sprite {
  width: 430px;
  height: 450px;
  background-image: var(--care-egg-peek);
  animation: hatchPopOpen 0.78s cubic-bezier(.2,1.5,.3,1) both;
}

.hatch-scene.phase-born .hatch-sprite {
  width: 430px;
  height: 430px;
  background-image: var(--care-shell-baby-arms-up);
  animation: hatchBabyBounce 0.9s cubic-bezier(.2,1.5,.3,1) both;
}

@keyframes hatchRaySpin {
  0% { transform: rotate(0deg) scale(1.08); }
  100% { transform: rotate(360deg) scale(1.08); }
}

@keyframes hatchSlowPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

@keyframes hatchEggShake {
  0%, 100% { transform: translateX(0) rotate(0deg) scale(1.03); }
  20% { transform: translateX(-14px) rotate(-5deg) scale(1.04); }
  45% { transform: translateX(11px) rotate(5deg) scale(1.05); }
  70% { transform: translateX(-7px) rotate(-3deg) scale(1.04); }
}

@keyframes hatchPopOpen {
  0% { transform: translateY(24px) scale(0.86); filter: brightness(1.1) drop-shadow(0 22px 0 rgba(95,61,38,0.18)); }
  32% { transform: translateY(-28px) scale(1.16); filter: brightness(1.28) drop-shadow(0 28px 0 rgba(95,61,38,0.16)); }
  100% { transform: translateY(0) scale(1); filter: brightness(1.05) drop-shadow(0 22px 0 rgba(95,61,38,0.18)); }
}

@keyframes hatchBabyBounce {
  0% { transform: translateY(58px) scale(0.78); opacity: 0; }
  45% { transform: translateY(-34px) scale(1.12); opacity: 1; }
  72% { transform: translateY(10px) scale(0.96); }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}

.fx-piece {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: 20px;
  height: 20px;
  opacity: 0;
  animation: fxRise 1s ease-out forwards;
}

.fx-piece.heart {
  width: 42px;
  height: 42px;
  background: var(--care-fx-heart) center / contain no-repeat;
}

.fx-piece.sparkle {
  width: 32px;
  height: 32px;
  background: var(--care-fx-sparkle) center / contain no-repeat;
}

@keyframes fxRise {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  18% { opacity: 1; }
  100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-100px + var(--dy))) scale(1.35); }
}

.info-block {
  display: grid;
  gap: 12px;
  font-family: var(--pixel-font);
  font-size: 20px;
  line-height: 1.35;
}

.milmaru-name {
  font-size: 28px;

  font-weight: 900;
}

.growth-card {

  border: 3px solid rgba(139, 96, 66, 0.35);
  border-radius: 10px;
  background: rgba(255,255,255,0.42);
}

.growth-icons {
  margin: 14px 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 7px;
  align-items: center;
}

.growth-icon {

  align-items: center;
  justify-content: center;
  border: 3px solid rgba(139, 96, 66, 0.25);

}
.growth-icon.active {
  border-color: #d58b45;
  background: #fff1c4;
  opacity: 1;
  box-shadow: 0 0 0 4px rgba(255, 200, 86, 0.32);
}

.mini-gauge {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
}
.mini-track {
  height: 22px;
  border: 3px solid #9f7655;
  border-radius: 6px;
  background: #f4dfbd;
  overflow: hidden;
}
.mini-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #7bd5b3, #43b985);
  transition: width 0.35s ease;
}

.growth-hint {
  margin-top: 8px;
  font-family: var(--pixel-font);
  font-size: 17px;
  color: var(--ink-soft);
}

.memo-box {
  margin-top: 12px;
  padding-top: 14px;
  border-top: 3px dashed rgba(139, 96, 66, 0.22);
  font-size: 18px;

}

.album-btn {
  align-self: end;
  height: 58px;
  font-size: 22px;
}

.care-actions {
  position: absolute;
  left: 300px;
  right: 300px;
  bottom: 72px;
  height: 142px;
  display: grid;
  grid-template-rows: 66px 62px;
  gap: 12px;
  z-index: 6;
}

.sub-action-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.action-btn {
  position: relative;
  display: grid;
  grid-template-columns: 50px 1fr;
  grid-template-rows: 1fr auto;
  align-items: center;
  column-gap: 10px;
  padding: 7px 14px;
  text-align: left;
  font-size: 24px;
}

.write-main-btn {
  display: grid;
  grid-template-columns: 70px 1fr;
  grid-template-rows: 1fr auto;
  align-items: center;
  column-gap: 16px;
  padding: 7px 28px;
  text-align: left;
  font-size: 32px;
  background: linear-gradient(180deg, #e4f7c9, #8ed067);
  border-color: #6c8f3c;
}

.action-icon {
  grid-row: 1 / 3;
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  background: rgba(255,255,255,0.38) center / 72% 72% no-repeat;
  font-size: 30px;
  color: transparent;
  image-rendering: pixelated;
}

.write-main-btn .action-icon {
  width: 62px;
  height: 52px;
  font-size: 34px;
  background-image: var(--care-icon-pencil);
}

.write-main-btn.warm-main {
  background: linear-gradient(180deg, #fff0bd, #f3b86d);
  border-color: #ad7040;
}

.write-main-btn.warm-main .action-icon {

  background: rgba(255,255,255,0.45) var(--care-icon-warm) center / contain no-repeat;

}

.write-main-btn.needs-power {

.action-help {

  font-size: 16px;
  font-weight: 900;
  color: var(--ink-soft);
}

.write-main-btn .action-help {
  display: none;
}

.action-btn.feed { background: linear-gradient(180deg, #fff0bd, #f0c16f); }
.action-btn.pet { background: linear-gradient(180deg, #ffe0df, #f4a9a5); }
.action-btn.play { background: linear-gradient(180deg, #cdeefe, #75c4e5); }
.action-btn.write { background: linear-gradient(180deg, #e0f4c9, #9ed572); }

.action-btn.power-empty {
  filter: saturate(0.72) brightness(0.92);
}

.action-btn.feed.has-cookie {
  background: linear-gradient(180deg, #ffe6a2, #f2a64f);
  box-shadow: 0 5px 0 #6f462c, inset 0 3px rgba(255,255,255,0.55), 0 0 0 5px rgba(255, 219, 92, 0.45);
}

.action-btn.feed.has-cookie::after {
  content: '!';
  position: absolute;
  left: 46px;
  top: -18px;
  width: 32px;
  height: 32px;
  display: grid;
  place-items: center;
  border: 3px solid #b35d48;
  border-radius: 999px;
  background: #ff8f94;
  color: #fff7de;
  font-family: var(--pixel-font);
  font-size: 22px;
  box-shadow: 0 3px 0 #8d4b3a;
}

.care-actions.egg-mode {
  left: 480px;
  right: 480px;
  bottom: 86px;
  height: 138px;
  grid-template-rows: 66px 58px;
}

.care-actions.egg-mode .sub-action-row {
  grid-template-columns: 1fr;
}

.care-actions.egg-mode .action-btn.feed,
.care-actions.egg-mode .action-btn.play {
  display: none;
}

.action-btn.feed .action-icon { background-image: var(--care-icon-cookie); }
.action-btn.pet .action-icon { background-image: var(--care-icon-heart); }
.action-btn.play .action-icon { background-image: var(--care-icon-star); }
.action-btn.feed.milk .action-icon {
  color: #4f3825;
  background-image: none;
}

.bottom-message {
  position: absolute;
  left: 232px;
  right: 232px;
  bottom: 6px;
  height: 42px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  border: 4px solid #8b6042;
  border-radius: 10px;
  background: #fff8e8;
  font-family: var(--pixel-font);
  font-size: 20px;
  z-index: 7;
}

.debug-panel {
  position: absolute;
  left: 318px;
  top: 236px;
  z-index: 82;
  width: 300px;
  display: none;
  gap: 8px;
  padding: 12px;
  border: 4px solid #6e4b2d;
  border-radius: 8px;
  background: rgba(255, 248, 232, 0.94);

}

#stage.debug-mode .debug-panel {
  display: grid;
}

.debug-title {
  font-size: 18px;
  font-weight: 700;
  text-align: center;
}

.debug-row {
  display: grid;
  grid-template-columns: 1fr 94px;
  gap: 8px;
  align-items: center;

}

.debug-row input {
  min-width: 0;
  height: 30px;
  padding: 2px 6px;
  border: 2px solid #9f7655;
  border-radius: 4px;
  background: #fffdf5;
  color: #4f3825;
  font: inherit;
}

.debug-row.checkbox {
  grid-template-columns: 1fr auto;
}

.debug-row.checkbox input {
  width: 26px;
}

.debug-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.debug-actions button {
  min-height: 31px;
  border: 2px solid #875b3b;
  border-radius: 5px;
  background: #ffd78c;
  color: #4f3825;
  font: inherit;
  font-size: 14px;
  cursor: pointer;
}
</style>
</head>

      <label class="debug-row">なかよし<input id="debugNakayoshi" type="number" min="0" max="100" step="1"></label>
      <label class="debug-row">すくすく<input id="debugSukusuku" type="number" min="0" max="100" step="1"></label>
      <label class="debug-row">ぽかぽか<input id="debugEggWarmth" type="number" min="0" max="100" step="1"></label>
      <label class="debug-row">パワー<input id="debugMojiPower" type="number" min="0" max="99" step="1"></label>
      <label class="debug-row">ミルク<input id="debugMilkCount" type="number" min="0" max="99" step="1"></label>
      <label class="debug-row">クッキー<input id="debugCookieCount" type="number" min="0" max="99" step="1"></label>
      <label class="debug-row">スター<input id="debugStars" type="number" min="0" max="99999" step="25"></label>
      <label class="debug-row checkbox">うまれた<input id="debugHatched" type="checkbox"></label>
      <div class="debug-actions">
        <button type="button" id="debugApplyBtn">反映</button>
        <button type="button" id="debugEgg75Btn">タマゴ75</button>
        <button type="button" id="debugPreHatchBtn">孵化直前</button>
        <button type="button" id="debugBabyBtn">ベビー</button>
        <button type="button" id="debugResetBtn">初期化</button>
        <button type="button" id="debugCloseBtn">隠す</button>
      </div>
    </section>
    <div class="hatch-scene" id="hatchScene" aria-hidden="true">
      <div class="hatch-copy" id="hatchCopy">おや...？</div>
      <div class="hatch-sprite" id="hatchSprite" aria-hidden="true"></div>
      <div class="hatch-subcopy" id="hatchSubcopy">タマゴの ようすが...</div>
    </div>
  </main>
</div>

<script>
'use strict';

const CARE_STATE_KEY = 'mojikkoFarmCareStateV1';
const PENDING_REWARD_KEY = 'mojikkoFarmPendingWritingReward';
const DEBUG_MODE_KEY = 'mojikkoFarmCareDebugMode';

const defaultState = {
  nakayoshi: 32,
  sukusuku: 0,
  eggWarmth: 0,
  hatched: false,
  stars: 1250,
  inventory: {
    moji_milk: { id: 'moji_milk', name: 'もじミルク', count: 0, type: 'food' },
    moji_cookie: { id: 'moji_cookie', name: 'もじクッキー', count: 0, type: 'food' },
    moji_power: { id: 'moji_power', name: 'もじパワー', count: 0, type: 'energy' }
  },
  reaction: 'normal',
  speech: 'まだ タマゴだよ',
  lastPetAt: 0,
  lastWarmAt: 0
};

const growthStages = [
  { id: 'egg', name: 'タマゴ', icon: '🥚', min: 0, next: 10 },
  { id: 'baby', name: 'ベビー', icon: '🐣', min: 10, next: 25 },
  { id: 'yochiyochi', name: 'よちよち期', icon: '🐹', min: 25, next: 50 },
  { id: 'kids', name: 'キッズ', icon: '⭐', min: 50, next: 80 },
  { id: 'pre_evolution', name: 'しんかまえ', icon: '✨', min: 80, next: 100 }
];

const careFoods = {
  moji_milk: { id: 'moji_milk', name: 'もじミルク', gainNakayoshi: 4, gainSukusuku: 4 },
  moji_cookie: { id: 'moji_cookie', name: 'もじクッキー', gainNakayoshi: 5, gainSukusuku: 2 }
};

const actionPowerCost = {
  warm: 1,
  pet: 1,
  play: 2
};

let state = loadState();

const stageEl = document.getElementById('stage');
const speechBubble = document.getElementById('speechBubble');
const bottomMessage = document.getElementById('bottomMessage');
const milmaru = document.getElementById('milmaru');
const fxLayer = document.getElementById('fxLayer');
const careActions = document.querySelector('.care-actions');
const writeBtn = document.getElementById('writeBtn');
const feedBtn = document.getElementById('feedBtn');
const mainActionIcon = document.getElementById('mainActionIcon');
const mainActionText = document.getElementById('mainActionText');
const mainActionHelp = document.getElementById('mainActionHelp');
const hatchScene = document.getElementById('hatchScene');
const hatchCopy = document.getElementById('hatchCopy');
const hatchSubcopy = document.getElementById('hatchSubcopy');
const debugPanel = document.getElementById('debugPanel');
const stageWrap = document.getElementById('stage-wrap');

let hatchingNow = false;
let hatchTimers = [];
let debugMode = false;

function fitStage() {
  const scale = Math.min(window.innerWidth / 1600, window.innerHeight / 900);
  const ox = (window.innerWidth - 1600 * scale) / 2;
  const oy = (window.innerHeight - 900 * scale) / 2;
  stageEl.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
}

window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));
document.addEventListener('visibilitychange', () => { if (!document.hidden) fitStage(); });
fitStage();

let audioCtx = null;

function getAudioContext() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return null;
  if (!audioCtx) audioCtx = new AudioContextClass();
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  return audioCtx;
}

function playTone(frequency, duration = 0.06, type = 'square', volume = 0.035, delay = 0) {
  const ctx = getAudioContext();
  if (!ctx) return;
  const start = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(volume, start + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.02);
}

function playSfx(kind) {
  try {
    if (kind === 'warm') {
      playTone(430, 0.055, 'triangle', 0.03);
      playTone(540, 0.055, 'triangle', 0.024, 0.05);
      return;
    }
    if (kind === 'pet') {
      playTone(590, 0.04, 'sine', 0.026);
      playTone(740, 0.05, 'sine', 0.022, 0.045);
      return;
    }
    if (kind === 'feed') {
      playTone(520, 0.045, 'square', 0.03);
      playTone(780, 0.065, 'square', 0.028, 0.055);
      return;
    }
    if (kind === 'play') {
      [620, 760, 620].forEach((freq, i) => playTone(freq, 0.05, 'square', 0.026, i * 0.05));
      return;
    }
    if (kind === 'hatch') {
      [580, 760, 960, 1180].forEach((freq, i) => playTone(freq, 0.09, 'square', 0.032, i * 0.075));
      return;
    }
    if (kind === 'mistake') {
      playTone(210, 0.07, 'triangle', 0.024);
      return;
    }
    if (kind === 'select') {
      playTone(560, 0.045, 'square', 0.026);
      playTone(720, 0.05, 'square', 0.022, 0.04);
      return;
    }
    playTone(500, 0.045, 'square', 0.026);
  } catch (_) {}
}

function cloneDefaultState() {
  return JSON.parse(JSON.stringify(defaultState));
}

function loadState() {
  try {
    const saved = localStorage.getItem(CARE_STATE_KEY);
    if (!saved) return cloneDefaultState();
    const parsed = JSON.parse(saved);
    const merged = cloneDefaultState();
    merged.nakayoshi = Number.isFinite(parsed.nakayoshi) ? parsed.nakayoshi : merged.nakayoshi;
    merged.sukusuku = Number.isFinite(parsed.sukusuku) ? parsed.sukusuku : merged.sukusuku;
    merged.eggWarmth = Number.isFinite(parsed.eggWarmth) ? clamp(parsed.eggWarmth, 0, 100) : merged.eggWarmth;
    merged.hatched = parsed.hatched === true;
    merged.stars = Number.isFinite(parsed.stars) ? parsed.stars : merged.stars;
    merged.speech = merged.hatched ? (parsed.speech || 'うまれたての あかちゃんだよ') : 'まだ タマゴだよ';
    merged.reaction = parsed.reaction || merged.reaction;
    merged.lastPetAt = Number.isFinite(parsed.lastPetAt) ? parsed.lastPetAt : 0;
    merged.lastWarmAt = Number.isFinite(parsed.lastWarmAt) ? parsed.lastWarmAt : 0;
    if (parsed.inventory) {
      Object.keys(merged.inventory).forEach((id) => {
        if (parsed.inventory[id]) {
          merged.inventory[id].count = Math.max(0, Number(parsed.inventory[id].count) || 0);
        }
      });
    }
    return merged;
  } catch (error) {
    console.warn('Could not load care state:', error);
    return cloneDefaultState();
  }
}

function saveState() {
  try {
    localStorage.setItem(CARE_STATE_KEY, JSON.stringify(state));
  } catch (error) {
    console.warn('Could not save care state:', error);
  }
}

function configureDebugModeFromQuery() {
  const params = new URLSearchParams(window.location.search);
  const value = params.get('debug');
  if (value === '1') {
    localStorage.setItem(DEBUG_MODE_KEY, '1');
  } else if (value === '0') {
    localStorage.removeItem(DEBUG_MODE_KEY);
  }
  debugMode = value === '1' || (value !== '0' && localStorage.getItem(DEBUG_MODE_KEY) === '1');
  stageEl.classList.toggle('debug-mode', debugMode);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function getGrowthStage(sukusuku) {
  if (sukusuku < 10) return growthStages[0];
  if (sukusuku < 25) return growthStages[1];
  if (sukusuku < 50) return growthStages[2];
  if (sukusuku < 80) return growthStages[3];
  return growthStages[4];
}

function getCareStage() {
  if (!state.hatched) return growthStages[0];
  return getGrowthStage(Math.max(10, state.sukusuku));
}

function getInventoryCount(id) {
  const item = state.inventory[id];
  return item ? Math.max(0, Number(item.count) || 0) : 0;
}

function changeInventory(id, delta) {
  if (!state.inventory[id]) return 0;
  state.inventory[id].count = clamp(getInventoryCount(id) + delta, 0, 99);
  return state.inventory[id].count;
}

function getPreferredFood() {
  if (!state.hatched) return careFoods.moji_milk;
  const stage = getCareStage();
  return stage.id === 'baby' ? careFoods.moji_milk : careFoods.moji_cookie;
}

function hasMojiPower(cost = 1) {
  return getInventoryCount('moji_power') >= cost;
}

function showNeedWritingMessage(cost = 1) {
  playSfx('mistake');
  const shortage = Math.max(1, cost - getInventoryCount('moji_power'));
  setSpeech('もじパワーが たりないよ', `あと ${shortage}かい もじをかくと、おせわが できるよ。`);
  setReaction(state.hatched ? 'worried' : 'relaxed', 1200);
  spawnFx('sparkle');
  saveState();
  render();
}

function spendMojiPower(cost, reason) {
  if (!hasMojiPower(cost)) {
    showNeedWritingMessage(cost);
    return false;
  }
  changeInventory('moji_power', -cost);
  return true;
}

function getNextGrowthProgress(sukusuku) {
  const stage = getGrowthStage(sukusuku);
  const max = stage.next;
  return {
    current: clamp(sukusuku, 0, max),
    max,
    percent: clamp((sukusuku / max) * 100, 0, 100)
  };
}

function getEggVisualClass() {
  if (state.eggWarmth >= 35) return 'egg-cracked';
  return 'egg-idle';
}

function renderActionMode() {
  const power = getInventoryCount('moji_power');
  const preferredFood = getPreferredFood();
  const preferredFoodCount = getInventoryCount(preferredFood.id);
  careActions.classList.toggle('egg-mode', !state.hatched);
  writeBtn.classList.toggle('warm-main', !state.hatched && power > 0);
  writeBtn.classList.toggle('needs-power', !state.hatched && power <= 0);
  if (state.hatched) {
    mainActionIcon.textContent = '';
    mainActionText.textContent = 'もじを かく！';
    mainActionHelp.textContent = 'もじを かいて おせわの もとを もらおう！';
  } else {
    mainActionIcon.textContent = power > 0 ? '' : '✏';
    mainActionText.textContent = power > 0 ? 'あたためる！' : 'もじを かく！';
    mainActionHelp.textContent = power > 0 ? 'もじパワーを 1つ つかう' : 'かくと あたためられるよ';
  }
  feedBtn.classList.toggle('milk', state.hatched && preferredFood.id === 'moji_milk');
  feedBtn.classList.toggle('has-cookie', state.hatched && preferredFoodCount > 0);
  feedBtn.querySelector('.action-icon').textContent = state.hatched && preferredFood.id === 'moji_milk' ? '🍼' : '';
  feedBtn.querySelector('.action-help').textContent = state.hatched
    ? `${preferredFood.name}を あげる`
    : 'うまれてから あげよう';
  const petButton = document.getElementById('petBtn');
  const playButton = document.getElementById('playBtn');
  petButton.classList.toggle('power-empty', !hasMojiPower(actionPowerCost.pet));
  playButton.classList.toggle('power-empty', !hasMojiPower(actionPowerCost.play));
  petButton.querySelector('.action-help').textContent = 'もじパワー1で なでる';
  playButton.querySelector('.action-help').textContent = 'もじパワー2で あそぶ';
}

function applyMilmaruClass(reaction) {
  const currentReaction = reaction || state.reaction || 'normal';
  const classes = ['milmaru'];
  if (state.hatched) {
    classes.push('baby', currentReaction);
  } else {
    classes.push('egg', getEggVisualClass(), currentReaction);
  }
  milmaru.className = classes.join(' ');
}

function setSpeech(text, message) {
  state.speech = text;
  speechBubble.textContent = text;
  if (message) bottomMessage.textContent = message;
}

function setReaction(reaction, duration = 950) {
  state.reaction = reaction;
  applyMilmaruClass(reaction);
  clearTimeout(setReaction._timer);
  setReaction._timer = setTimeout(() => {
    state.reaction = 'normal';
    applyMilmaruClass('normal');
  }, duration);
}

function spawnFx(type) {
  const count = type === 'sparkle' ? 18 : 14;
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = `fx-piece ${i % 3 === 0 ? 'sparkle' : 'heart'}`;
    piece.style.setProperty('--x', (45 + Math.random() * 18) + '%');
    piece.style.setProperty('--y', (46 + Math.random() * 20) + '%');
    piece.style.setProperty('--dx', ((Math.random() - 0.5) * 180) + 'px');
    piece.style.setProperty('--dy', ((Math.random() - 0.5) * 40) + 'px');
    piece.style.animationDelay = (Math.random() * 0.15) + 's';
    fxLayer.appendChild(piece);
    setTimeout(() => piece.remove(), 1200);
  }
}

function queueHatchStep(delay, fn) {
  const timer = setTimeout(fn, delay);
  hatchTimers.push(timer);
}

function clearHatchSceneTimers() {
  hatchTimers.forEach((timer) => clearTimeout(timer));
  hatchTimers = [];
}

function setHatchScenePhase(phase, copy, subcopy) {
  stageWrap.classList.add('hatch-active');
  stageEl.classList.add('hatch-active');
  hatchScene.className = `hatch-scene show phase-${phase}`;
  hatchScene.setAttribute('aria-hidden', 'false');
  hatchCopy.textContent = copy;
  hatchSubcopy.textContent = subcopy;
}

function hideHatchScene() {
  stageWrap.classList.remove('hatch-active');
  stageEl.classList.remove('hatch-active');
  hatchScene.className = 'hatch-scene';
  hatchScene.setAttribute('aria-hidden', 'true');
}

function startHatchScene() {
  clearHatchSceneTimers();
  setHatchScenePhase('notice', 'おや...？', 'タマゴの ようすが...');
  playSfx('warm');

  queueHatchStep(900, () => {
    setHatchScenePhase('ready', 'タマゴが かえりそうだぞ！', 'からが ぐらぐら ゆれているよ');
    playSfx('warm');
  });

  queueHatchStep(1900, () => {
    setHatchScenePhase('peek', 'パカッ！', 'ミルマルが でてきたよ！');
    playSfx('hatch');
    spawnFx('sparkle');
  });

  queueHatchStep(2800, () => {
    state.hatched = true;
    state.sukusuku = Math.max(10, state.sukusuku);
    state.reaction = 'birth';
    setSpeech('うまれたよ！', 'ベビーの ミルマルが こんにちは！もじミルクを あげてみよう。');
    setHatchScenePhase('born', 'ミルマルが うまれたよ！', 'こんにちは！もじミルクが だいすきだよ');
    spawnFx('sparkle');
    saveState();
    render();
  });

  queueHatchStep(4300, () => {
    hideHatchScene();
    hatchingNow = false;
    setReaction('birth', 1300);
  });

  queueHatchStep(5900, () => {
    if (state.reaction === 'normal') {
      setSpeech('いっしょに もじを かこう！', 'もじを かくと、もじミルクと もじパワーが もらえるよ。');
      saveState();
      render();
    }
  });
}

function maybeHatchEgg() {
  if (state.hatched || state.eggWarmth < 100) return false;
  if (hatchingNow) return true;
  playSfx('warm');
  hatchingNow = true;
  state.reaction = 'warm';
  setSpeech('おや...？', 'タマゴの ようすが...');
  spawnFx('sparkle');
  saveState();
  render();
  clearHatchSceneTimers();
  queueHatchStep(850, startHatchScene);
  return true;
}

function warmEgg() {
  const now = Date.now();
  if (now - state.lastWarmAt < 650) return;
  if (!spendMojiPower(actionPowerCost.warm, 'warm')) return;
  playSfx('warm');
  state.lastWarmAt = now;
  state.eggWarmth = clamp(state.eggWarmth + 25, 0, 100);
  state.nakayoshi = clamp(state.nakayoshi + 1, 0, 100);
  if (state.eggWarmth >= 100) {
    maybeHatchEgg();
    return;
  }
  if (state.eggWarmth >= 70) {
    setSpeech('もうすぐ うまれそう！', 'タマゴの なかで ミルマルが うれしそうに うごいたよ。');
  } else if (state.eggWarmth >= 35) {
    setSpeech('ぽかぽか してきたよ', 'タマゴに ちいさな ひびが はいったみたい。');
  } else {
    setSpeech('あったかいね', 'やさしく あたためてあげよう。');
  }
  setReaction('warm', 900);
  spawnFx('sparkle');
  saveState();
  render();
}

function renderGrowthIcons(currentStage) {
  const icons = document.getElementById('growthIcons');
  icons.innerHTML = growthStages.map((stage) => {
    const active = stage.id === currentStage.id ? ' active' : '';
    return `<div class="growth-icon${active}" title="${stage.name}">${stage.icon}</div>`;
  }).join('');
}

function render() {
  state.nakayoshi = clamp(state.nakayoshi, 0, 100);
  state.sukusuku = clamp(state.sukusuku, 0, 100);
  state.eggWarmth = clamp(state.eggWarmth || 0, 0, 100);
  const stage = getCareStage();
  const progress = state.hatched
    ? getNextGrowthProgress(Math.max(10, state.sukusuku))
    : { current: state.eggWarmth, max: 100, percent: state.eggWarmth };
  const remaining = Math.max(0, progress.max - state.sukusuku);
  const writingCount = Math.max(0, Math.ceil(remaining / 3));
  const warmCount = Math.max(0, Math.ceil((100 - state.eggWarmth) / 25));

  document.getElementById('starCount').textContent = String(state.stars);
  document.getElementById('nakayoshiText').textContent = `${state.nakayoshi} / 100`;
  document.getElementById('sukusukuLabel').textContent = state.hatched ? 'すくすく' : 'ぽかぽか';
  document.getElementById('sukusukuText').textContent = state.hatched ? `${state.sukusuku} / 100` : `${state.eggWarmth} / 100`;
  document.getElementById('nakayoshiFill').style.width = `${state.nakayoshi}%`;
  document.getElementById('sukusukuFill').style.width = `${state.hatched ? state.sukusuku : state.eggWarmth}%`;
  document.getElementById('milkCount').textContent = String(getInventoryCount('moji_milk'));
  document.getElementById('cookieCount').textContent = String(getInventoryCount('moji_cookie'));
  document.getElementById('mojiPowerCount').textContent = String(getInventoryCount('moji_power'));
  feedBtn.classList.toggle('has-cookie', state.hatched && getInventoryCount(getPreferredFood().id) > 0);
  document.getElementById('growthStageName').textContent = stage.name;
  document.getElementById('stageLabel').textContent = stage.name;
  document.getElementById('growthFill').style.width = `${progress.percent}%`;
  document.getElementById('growthText').textContent = state.hatched
    ? `すくすく ${progress.current} / ${progress.max}`
    : `ぽかぽか ${progress.current} / ${progress.max}`;
  document.getElementById('growthHint').textContent = state.hatched
    ? (writingCount > 0 ? `あと ${writingCount}かいで せいちょう！` : 'もうすぐ せいちょう！')
    : (getInventoryCount('moji_power') <= 0 ? 'もじを かくと あたためられるよ！' : (warmCount > 0 ? `あと ${warmCount}かい あたためよう！` : 'もうすぐ うまれるよ！'));
  document.getElementById('milmaruLevel').textContent = String(state.hatched ? Math.max(1, Math.floor(state.sukusuku / 20) + 1) : 1);
  document.getElementById('memoLine1').textContent = state.hatched ? 'やさしくて、がんばりやさん。' : 'タマゴの なかで すやすや。';
  document.getElementById('memoLine2').textContent = state.hatched ? 'ミルクのにおいが だいすき！' : 'ぽかぽかが だいすき！';
  speechBubble.textContent = state.speech;
  renderGrowthIcons(stage);
  renderActionMode();
  applyMilmaruClass(state.reaction);
  renderDebugPanel();
}

function renderDebugPanel() {
  if (!debugMode || !debugPanel) return;
  document.getElementById('debugNakayoshi').value = String(state.nakayoshi);
  document.getElementById('debugSukusuku').value = String(state.sukusuku);
  document.getElementById('debugEggWarmth').value = String(state.eggWarmth);
  document.getElementById('debugMojiPower').value = String(getInventoryCount('moji_power'));
  document.getElementById('debugMilkCount').value = String(getInventoryCount('moji_milk'));
  document.getElementById('debugCookieCount').value = String(getInventoryCount('moji_cookie'));
  document.getElementById('debugStars').value = String(state.stars);
  document.getElementById('debugHatched').checked = state.hatched;
}

function readDebugNumber(id, min, max) {
  const input = document.getElementById(id);
  const value = Number(input.value);
  if (!Number.isFinite(value)) return min;
  return clamp(Math.round(value), min, max);
}

function stopHatchingCutscene() {
  hatchingNow = false;
  clearHatchSceneTimers();
  hideHatchScene();
}

function applyDebugState(next = {}) {
  stopHatchingCutscene();
  state.nakayoshi = next.nakayoshi ?? readDebugNumber('debugNakayoshi', 0, 100);
  state.sukusuku = next.sukusuku ?? readDebugNumber('debugSukusuku', 0, 100);
  state.eggWarmth = next.eggWarmth ?? readDebugNumber('debugEggWarmth', 0, 100);
  state.inventory.moji_power.count = next.mojiPower ?? readDebugNumber('debugMojiPower', 0, 99);
  state.inventory.moji_milk.count = next.milk ?? readDebugNumber('debugMilkCount', 0, 99);
  state.inventory.moji_cookie.count = next.cookies ?? readDebugNumber('debugCookieCount', 0, 99);
  state.stars = next.stars ?? readDebugNumber('debugStars', 0, 99999);
  state.hatched = next.hatched ?? document.getElementById('debugHatched').checked;
  state.reaction = 'normal';
  state.lastWarmAt = 0;
  state.lastPetAt = 0;
  state.speech = next.speech || (state.hatched ? 'いっしょに もじを かこう！' : 'まだ タマゴだよ');
  bottomMessage.textContent = next.message || 'デバッグ値を 反映したよ。';
  saveState();
  render();
}

function resetDebugState() {
  stopHatchingCutscene();
  state = cloneDefaultState();
  saveState();
  bottomMessage.textContent = 'デバッグ値を 初期化したよ。';
  render();
}

function consumePendingWritingReward() {
  let pending = null;
  try {
    const raw = localStorage.getItem(PENDING_REWARD_KEY);
    if (raw) pending = JSON.parse(raw);
    localStorage.removeItem(PENDING_REWARD_KEY);
  } catch (error) {
    console.warn('Could not consume writing reward:', error);
  }
  if (!pending || !pending.result || !pending.result.success) return false;
  const reward = pending.result.reward || getPreferredFood();
  if (state.inventory[reward.id]) {
    changeInventory(reward.id, 1);
  }
  changeInventory('moji_power', 1);
  state.stars += 25;
  if (state.hatched) {
    setSpeech(`${reward.name || 'おやつ'}を もらったよ！`, 'もじパワーも たまったよ。ミルマルに おせわを してみよう！');
    setReaction('happy');
  } else {
    setSpeech('もじパワーが たまったよ！', 'タマゴを あたためられるよ。ミルクは うまれてから あげよう。');
    setReaction('warm');
  }
  spawnFx('sparkle');
  saveState();
  return true;
}

function applyEntrySpeech() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('from') !== 'writing') return;
  if (!state.hatched) {
    if (getInventoryCount('moji_power') > 0) {
      setSpeech('タマゴを あたためよう！', 'もじパワーを つかって、ぽかぽか してあげよう。');
    } else {
      setSpeech('もじを かきにいこう！', 'もじを かくと、タマゴを あたためる パワーが たまるよ。');
    }
    saveState();
    return;
  }
  const food = getPreferredFood();
  if (getInventoryCount(food.id) > 0) {
    setSpeech(`${food.name} ほしいな〜`, `${food.name}を あげたら、ミルマルが よろこぶよ。`);
  } else {
    setSpeech('いっしょに もじを かこう！', `もじを かくと、${food.name}と もじパワーが もらえるよ。`);
  }
  saveState();
}

function feedCookie() {
  if (!state.hatched) {
    playSfx('mistake');
    setSpeech('まだ タマゴだよ', 'いまは もじパワーで あたためてあげよう。ミルクは うまれてからね。');
    setReaction('relaxed');
    spawnFx('sparkle');
    return;
  }
  const food = getPreferredFood();
  if (getInventoryCount(food.id) <= 0) {
    playSfx('mistake');
    setSpeech(`${food.name}が ないみたい。`, `もじを かくと ${food.name}が もらえるよ。`);
    setReaction('cry', 1200);
    return;
  }
  changeInventory(food.id, -1);
  playSfx('feed');
  state.nakayoshi = clamp(state.nakayoshi + food.gainNakayoshi, 0, 100);
  state.sukusuku = clamp(state.sukusuku + food.gainSukusuku, 0, 100);
  setSpeech(food.id === 'moji_milk' ? 'ごくごく おいしい！' : 'おいしい！ ありがとう！', `${food.name}を あげたよ。なかよしと すくすくが ふえた！`);
  setReaction('eating');
  spawnFx('sparkle');
  saveState();
  render();
}

function petMilmaru() {
  const now = Date.now();
  if (now - state.lastPetAt < 700) return;
  if (!spendMojiPower(actionPowerCost.pet, 'pet')) return;
  playSfx('pet');
  state.lastPetAt = now;
  state.nakayoshi = clamp(state.nakayoshi + 2, 0, 100);
  if (!state.hatched) {
    state.eggWarmth = clamp(state.eggWarmth + 8, 0, 100);
    setSpeech('ゆらゆら うごいたよ', 'タマゴを やさしく なでたら、すこし あったかく なったよ。');
    setReaction('relaxed');
    spawnFx('sparkle');
    saveState();
    render();
    maybeHatchEgg();
    return;
  }
  setSpeech('なでてくれて うれしい！', 'ミルマルが ほっとしているよ。');
  setReaction('relaxed');
  spawnFx('heart');
  saveState();
  render();
}

function playWithMilmaru() {
  if (!state.hatched) {
    playSfx('mistake');
    setSpeech('まだ タマゴだよ', 'いまは もじパワーで あたためるのが いちばん だいじ。');
    setReaction('warm');
    spawnFx('sparkle');
    return;
  }
  if (!spendMojiPower(actionPowerCost.play, 'play')) return;
  playSfx('play');
  state.nakayoshi = clamp(state.nakayoshi + 3, 0, 100);
  state.sukusuku = clamp(state.sukusuku + 1, 0, 100);
  setSpeech('いっしょに あそぶの たのしい！', 'ミルマルが ぴょんぴょん はねたよ。');
  setReaction('play');
  spawnFx('sparkle');
  saveState();
  render();
}

function goWrite() {
  if (!state.hatched) {
    if (hasMojiPower(actionPowerCost.warm)) {
      warmEgg();
      return;
    }
    playSfx('select');
    setSpeech('もじを かきにいこう！', 'もじを かくと、タマゴを あたためる パワーが たまるよ。');
    saveState();
    setTimeout(() => {
      window.location.href = 'index.html?from=care';
    }, 180);
    return;
  }
  playSfx('select');
  setSpeech('もじを かきにいこう！', 'かけたら もじクッキーが もらえるよ。');
  setReaction('happy');
  saveState();
  setTimeout(() => {
    window.location.href = 'index.html?from=care';
  }, 180);
}

function setupDebugControls() {
  configureDebugModeFromQuery();
  if (!debugPanel) return;
  document.getElementById('debugApplyBtn').addEventListener('click', () => applyDebugState());
  document.getElementById('debugEgg75Btn').addEventListener('click', () => applyDebugState({
    hatched: false,
    eggWarmth: 75,
    sukusuku: 0,
    mojiPower: 1,
    speech: 'まだ タマゴだよ',
    message: 'あと 1かい あたためると 孵化演出を確認できるよ。'
  }));
  document.getElementById('debugPreHatchBtn').addEventListener('click', () => applyDebugState({
    hatched: false,
    eggWarmth: 99,
    sukusuku: 0,
    mojiPower: 1,
    speech: 'まだ タマゴだよ',
    message: 'あたためると すぐ孵化演出に入るよ。'
  }));
  document.getElementById('debugBabyBtn').addEventListener('click', () => applyDebugState({
    hatched: true,
    eggWarmth: 100,
    sukusuku: Math.max(10, state.sukusuku),
    milk: Math.max(1, getInventoryCount('moji_milk')),
    mojiPower: Math.max(1, getInventoryCount('moji_power')),
    speech: 'いっしょに もじを かこう！',
    message: 'ベビー状態にしたよ。'
  }));
  document.getElementById('debugResetBtn').addEventListener('click', resetDebugState);
  document.getElementById('debugCloseBtn').addEventListener('click', () => {
    localStorage.removeItem(DEBUG_MODE_KEY);
    debugMode = false;
    stageEl.classList.remove('debug-mode');
  });
}

document.addEventListener('pointerdown', (event) => {
  const button = event.target.closest('button');
  if (!button || !stageEl.contains(button)) return;
  playSfx('button');
}, true);

document.getElementById('backBtn').addEventListener('click', () => {
  saveState();
  window.location.href = 'index.html?from=care';
});
document.getElementById('settingsBtn').addEventListener('click', () => {
  setSpeech('せっていは じゅんびちゅうだよ', 'また あとで つかえるようにするね。');
});
document.getElementById('inventoryBtn').addEventListener('click', () => {
  setSpeech('もちものは ここで みられるよ', 'もじを かくと、ミルク・クッキー・もじパワーが ふえるよ。');
});
document.getElementById('albumBtn').addEventListener('click', () => {
  setSpeech('アルバムは じゅんびちゅう！', 'かいた もじを あとで ならべよう。');
});
document.getElementById('feedBtn').addEventListener('click', feedCookie);
document.getElementById('petBtn').addEventListener('click', petMilmaru);
document.getElementById('playBtn').addEventListener('click', playWithMilmaru);
document.getElementById('writeBtn').addEventListener('click', goWrite);

setupDebugControls();
const consumedPendingReward = consumePendingWritingReward();
if (!consumedPendingReward) applyEntrySpeech();
render();

window.MojikkoCareGame = {
  getState: () => JSON.parse(JSON.stringify(state)),
  feedCookie,
  petMilmaru,
  playWithMilmaru,
  goWrite,
  warmEgg,
  applyDebugState,
  consumePendingWritingReward
};
</script>
</body>
</html>
