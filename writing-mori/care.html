<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>もじっこファーム | ミルマルのおへや</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="manifest" href="../manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@500;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #4f3825;
  --ink-soft: #806047;
  --wood-dark: #6e4b2d;
  --wood-mid: #a36b3c;
  --wood-light: #d99a5e;
  --paper: #fff8e8;
  --paper-deep: #f1ddb7;
  --mint: #86d7ac;
  --mint-dark: #3c986f;
  --coral: #ee7b6b;
  --sky: #8ed2ec;
  --blue: #6eb8df;
  --gold: #f5be4f;
  --shadow: rgba(70, 42, 18, 0.25);
  --pixel-font: 'DotGothic16', 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --round-font: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --care-yard-bg: url('../assets/images/mojikko/care/yard_background.png');
  --care-yard-bg-wide: url('../assets/images/mojikko/care/yard_background_wide_v2.png');
  --care-house: url('../assets/images/mojikko/care/house_front.png');
  --care-rug: url('../assets/images/mojikko/care/pink_rug.png');
  --care-doghouse: url('../assets/images/mojikko/care/doghouse_and_jar.png');
  --care-cushion: url('../assets/images/mojikko/care/star_cushion.png');
  --care-planter: url('../assets/images/mojikko/care/flower_planter.png');
  --care-fence: url('../assets/images/mojikko/care/fence_piece.png');
  --care-basket: url('../assets/images/mojikko/care/star_basket.png');
  --care-bush: url('../assets/images/mojikko/care/flower_bush.png');
  --care-watering: url('../assets/images/mojikko/care/watering_can.png');
  --care-flowers-a: url('../assets/images/mojikko/care/flowers_yellow_pink.png');
  --care-flowers-b: url('../assets/images/mojikko/care/flowers_pink_blue.png');
  --care-flowers-c: url('../assets/images/mojikko/care/flowers_white.png');
  --care-fx-heart: url('../assets/images/mojikko/care/fx_heart_cluster.png');
  --care-fx-heart-small: url('../assets/images/mojikko/care/fx_heart_small.png');
  --care-fx-sparkle: url('../assets/images/mojikko/care/fx_sparkle_cluster.png');
  --care-milmaru-normal: url('../assets/images/mojikko/writing/milmaru_idle.png');
  --care-milmaru-happy: url('../assets/images/mojikko/writing/milmaru_cheer.png');
  --care-milmaru-eating: url('../assets/images/mojikko/writing/milmaru_cookie.png');
  --care-milmaru-relaxed: url('../assets/images/mojikko/writing/milmaru_relaxed.png');
  --care-egg-idle: url('../assets/images/mojikko/care/milmaru_egg_idle.png');
  --care-egg-cracked: url('../assets/images/mojikko/care/milmaru_egg_cracked.png');
  --care-egg-peek: url('../assets/images/mojikko/care/milmaru_egg_peek.png');
  --care-shell-baby-happy: url('../assets/images/mojikko/care/milmaru_shell_baby_happy.png');
  --care-shell-baby-sleep: url('../assets/images/mojikko/care/milmaru_shell_baby_sleep.png');
  --care-shell-baby-left: url('../assets/images/mojikko/care/milmaru_shell_baby_left.png');
  --care-shell-baby-right: url('../assets/images/mojikko/care/milmaru_shell_baby_right.png');
  --care-shell-baby-cry: url('../assets/images/mojikko/care/milmaru_shell_baby_cry.png');
  --care-shell-baby-bigcry: url('../assets/images/mojikko/care/milmaru_shell_baby_bigcry.png');
  --care-shell-baby-angry: url('../assets/images/mojikko/care/milmaru_shell_baby_angry.png');
  --care-shell-baby-disappointed: url('../assets/images/mojikko/care/milmaru_shell_baby_disappointed.png');
  --care-shell-baby-worried: url('../assets/images/mojikko/care/milmaru_shell_baby_worried.png');
  --care-icon-cookie: url('../assets/images/mojikko/writing/icon_cookie.png');
  --care-icon-heart: url('../assets/images/mojikko/writing/icon_heart.png');
  --care-icon-pencil: url('../assets/images/mojikko/writing/icon_pencil.png');
  --care-icon-star: url('../assets/images/mojikko/writing/icon_star.png');
  --care-star-counter: url('../assets/images/mojikko/writing/star_counter.png');
  --care-settings: url('../assets/images/mojikko/writing/settings_button.png');
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  color: var(--ink);
  background: #243b33;
  font-family: var(--round-font);
  position: fixed;
  inset: 0;
}

#stage-wrap {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: linear-gradient(180deg, #233f53 0%, #12222b 100%);
}

#stage {
  position: absolute;
  top: 0;
  left: 0;
  width: 1600px;
  height: 900px;
  transform-origin: 0 0;
  overflow: hidden;
  background: var(--care-yard-bg-wide) right center / cover no-repeat;
  image-rendering: pixelated;
}

#stage::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px),
    linear-gradient(180deg, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 8px 8px, 8px 8px;
  mix-blend-mode: soft-light;
  pointer-events: none;
}

.pixel-panel,
.wood-panel,
.paper-panel {
  border: 5px solid var(--wood-dark);
  box-shadow: 0 6px 0 #4b321f, 0 10px 18px var(--shadow);
  color: var(--ink);
}

.wood-panel {
  background:
    repeating-linear-gradient(90deg, rgba(87, 56, 31, 0.12) 0 10px, rgba(255,255,255,0.06) 10px 18px),
    linear-gradient(180deg, #f7d79b, #d99a5e);
}

.paper-panel {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.42), transparent 30%),
    linear-gradient(180deg, var(--paper), var(--paper-deep));
}

.pixel-button {
  border: 4px solid #875b3b;
  border-radius: 8px;
  background: linear-gradient(180deg, #fff0bd 0%, #f2bd6d 100%);
  box-shadow: 0 5px 0 #6f462c, inset 0 3px rgba(255,255,255,0.55);
  color: var(--ink);
  font-family: var(--pixel-font);
  font-size: 25px;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  image-rendering: pixelated;
}

.pixel-button:active {
  transform: translateY(4px);
  box-shadow: 0 1px 0 #6f462c, inset 0 2px rgba(255,255,255,0.35);
}

.icon-btn {
  width: 74px;
  height: 66px;
  border-radius: 10px;
  font-size: 32px;
}

#settingsBtn {
  border: 0;
  border-radius: 0;
  background: var(--care-settings) center / contain no-repeat;
  box-shadow: none;
  color: transparent;
  text-shadow: none;
}

.care-header {
  position: absolute;
  left: 28px;
  right: 28px;
  top: 20px;
  height: 84px;
  display: grid;
  grid-template-columns: 220px 1fr 280px 78px;
  align-items: center;
  gap: 24px;
  z-index: 5;
}

.back-btn {
  height: 62px;
  text-align: left;
  padding-left: 28px;
}

.title-board {
  height: 74px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-family: var(--pixel-font);
  font-size: 44px;
  letter-spacing: 0;
}

.star-box {
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding-left: 46px;
  border: 0;
  border-radius: 0;
  font-family: var(--pixel-font);
  font-size: 30px;
  background: var(--care-star-counter) center / 100% 100% no-repeat;
  box-shadow: none;
  image-rendering: pixelated;
}

.star-icon {
  display: none;
}

.gauges {
  position: absolute;
  top: 118px;
  left: 322px;
  right: 322px;
  height: 112px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  z-index: 4;
}

.gauge-card {
  padding: 16px 22px;
  border-radius: 10px;
}

.gauge-title {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--pixel-font);
  font-size: 24px;
}

.gauge-icon {
  width: 38px;
  height: 34px;
  display: inline-block;
}

.gauge-icon.heart {
  background: var(--coral);
  clip-path: polygon(50% 18%, 58% 6%, 72% 2%, 87% 8%, 96% 22%, 96% 38%, 88% 55%, 50% 96%, 12% 55%, 4% 38%, 4% 22%, 13% 8%, 28% 2%, 42% 6%);
}

.gauge-icon.leaf {
  background: var(--mint-dark);
  border-radius: 70% 10% 70% 10%;
  transform: rotate(-28deg);
}

.gauge-line {
  margin-top: 10px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
  font-family: var(--pixel-font);
  font-size: 23px;
}

.gauge-track {
  height: 28px;
  border: 4px solid #9f7655;
  border-radius: 7px;
  background: #f4dfbd;
  overflow: hidden;
}

.gauge-fill {
  width: 0%;
  height: 100%;
  border-right: 4px solid rgba(255,255,255,0.45);
  transition: width 0.35s ease;
}

.gauge-fill.nakayoshi {
  background: repeating-linear-gradient(90deg, #ff9aa5 0 22px, #f7798b 22px 42px);
}

.gauge-fill.sukusuku {
  background: repeating-linear-gradient(90deg, #75d3a7 0 22px, #42b883 22px 42px);
}

.side-panel {
  position: absolute;
  top: 146px;
  bottom: 70px;
  width: 270px;
  border-radius: 10px;
  z-index: 3;
  display: grid;
  grid-template-rows: 58px 1fr;
  overflow: hidden;
}

.side-panel.left { left: 28px; }
.side-panel.right { right: 28px; }

.panel-heading {
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #77d1b0, #56b98f);
  color: #fffdf0;
  font-family: var(--pixel-font);
  font-size: 28px;
  text-shadow: 2px 2px rgba(89, 61, 40, 0.35);
}

.panel-body {
  padding: 18px;
  display: grid;
  gap: 16px;
  align-content: start;
}

.item-card {
  min-height: 104px;
  padding: 14px;
  display: grid;
  grid-template-columns: 58px 1fr;
  gap: 14px;
  align-items: center;
  border: 3px solid rgba(139, 96, 66, 0.38);
  border-radius: 10px;
  background: rgba(255,255,255,0.48);
}

.cookie-icon {
  width: 56px;
  height: 56px;
  border: 0;
  border-radius: 0;
  background: var(--care-icon-cookie) center / contain no-repeat;
  box-shadow: none;
  image-rendering: pixelated;
}

.item-name {
  font-family: var(--round-font);
  font-size: 20px;
  font-weight: 900;
  line-height: 1.25;
}

.item-count {
  margin-top: 8px;
  font-family: var(--pixel-font);
  font-size: 22px;
}

.locked-slot {
  height: 96px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 3px dashed rgba(139, 96, 66, 0.28);
  border-radius: 10px;
  color: rgba(94, 71, 52, 0.36);
  font-size: 34px;
}

.center-yard {
  position: absolute;
  left: 326px;
  right: 326px;
  top: 248px;
  bottom: 144px;
  z-index: 2;
}

.yard-bg {
  position: absolute;
  inset: 0;
  border-radius: 18px;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
    var(--care-yard-bg) center / cover no-repeat;
  box-shadow:
    inset 0 0 0 4px rgba(255, 255, 255, 0.16),
    inset 0 -20px 30px rgba(74, 118, 57, 0.1);
  image-rendering: pixelated;
}

.yard-bg,
.yard-prop {
  display: none;
}

.yard-bg::before {
  display: none;
}

.yard-bg::after {
  display: none;
}

.yard-prop {
  position: absolute;
  background-position: center;
  background-repeat: no-repeat;
  background-size: contain;
  image-rendering: pixelated;
  pointer-events: none;
}

.yard-prop.house {
  right: 62px;
  top: 54px;
  width: 300px;
  height: 224px;
  background-image: var(--care-house);
  z-index: 1;
}

.yard-prop.fence {
  left: 70px;
  right: 76px;
  top: 174px;
  height: 74px;
  background-image: var(--care-fence);
  background-size: 100% 100%;
  opacity: 0.86;
  z-index: 0;
}

.yard-prop.rug {
  left: 50%;
  bottom: 52px;
  width: 380px;
  height: 152px;
  transform: translateX(-50%);
  background-image: var(--care-rug);
  z-index: 2;
}

.yard-prop.doghouse {
  left: 72px;
  top: 128px;
  width: 128px;
  height: 188px;
  background-image: var(--care-doghouse);
  z-index: 2;
}

.yard-prop.cushion {
  right: 114px;
  bottom: 72px;
  width: 144px;
  height: 92px;
  background-image: var(--care-cushion);
  z-index: 3;
}

.yard-prop.basket {
  left: 82px;
  bottom: 74px;
  width: 132px;
  height: 132px;
  background-image: var(--care-basket);
  z-index: 3;
}

.yard-prop.planter {
  right: 232px;
  top: 205px;
  width: 136px;
  height: 80px;
  background-image: var(--care-planter);
  z-index: 2;
}

.yard-prop.watering {
  right: 42px;
  bottom: 124px;
  width: 92px;
  height: 68px;
  background-image: var(--care-watering);
  z-index: 3;
}

.yard-prop.bush {
  left: 24px;
  bottom: 38px;
  width: 116px;
  height: 96px;
  background-image: var(--care-bush);
  z-index: 2;
}

.yard-prop.flowers-a {
  left: 242px;
  bottom: 34px;
  width: 82px;
  height: 80px;
  background-image: var(--care-flowers-a);
  z-index: 3;
}

.yard-prop.flowers-b {
  right: 306px;
  bottom: 30px;
  width: 90px;
  height: 82px;
  background-image: var(--care-flowers-b);
  z-index: 3;
}

.yard-prop.flowers-c {
  right: 20px;
  bottom: 36px;
  width: 76px;
  height: 76px;
  background-image: var(--care-flowers-c);
  z-index: 3;
}

.speech-bubble {
  position: absolute;
  left: 50%;
  top: 20px;
  min-width: 320px;
  max-width: 560px;
  min-height: 82px;
  padding: 20px 26px;
  transform: translateX(-42%);
  border-radius: 18px;
  border: 5px solid #8b6042;
  background: #fff8e8;
  box-shadow: 0 5px 0 #6f462c;
  font-family: var(--pixel-font);
  font-size: 26px;
  text-align: center;
  z-index: 5;
}

.speech-bubble::after {
  content: '';
  position: absolute;
  left: 44%;
  bottom: -24px;
  width: 38px;
  height: 38px;
  background: #fff8e8;
  border-right: 5px solid #8b6042;
  border-bottom: 5px solid #8b6042;
  transform: rotate(45deg);
}

.milmaru-wrap {
  position: absolute;
  left: 50%;
  bottom: 42px;
  width: 330px;
  height: 328px;
  transform: translateX(-50%);
  z-index: 5;
}

.milmaru {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 300px;
  height: 320px;
  transform: translateX(-50%);
  transform-origin: center bottom;
  background: var(--care-milmaru-normal) center bottom / contain no-repeat;
  image-rendering: pixelated;
  transition: transform 0.2s ease;
}

.milmaru::before,
.milmaru::after {
  display: none;
}

.milmaru-body {
  display: none;
}

.milmaru-body::before {
  display: none;
}

.milmaru-body::after {
  display: none;
}

.milmaru-arm,
.milmaru-foot {
  display: none;
}

.milmaru-tail {
  display: none;
}

.milmaru.happy { animation: happyBounce 0.72s ease; }
.milmaru.eating { animation: eatingWiggle 0.8s ease; }
.milmaru.relaxed { animation: relaxedSway 1s ease; }
.milmaru.play { animation: playHop 0.8s ease; }

.milmaru.egg {
  bottom: 74px;
  width: 180px;
  height: 232px;
  background-image: var(--care-egg-idle);
}

.milmaru.egg-cracked {
  background-image: var(--care-egg-cracked);
}

.milmaru.egg-peek {
  background-image: var(--care-egg-peek);
}

.milmaru.baby {
  width: 318px;
  height: 322px;
  background-image: var(--care-shell-baby-happy);
}

.milmaru.baby.normal {
  background-image: var(--care-shell-baby-left);
}

.milmaru.baby.happy,
.milmaru.baby.eating,
.milmaru.baby.play,
.milmaru.baby.birth {
  background-image: var(--care-shell-baby-happy);
}

.milmaru.baby.relaxed {
  background-image: var(--care-shell-baby-sleep);
}

.milmaru.baby.cry {
  background-image: var(--care-shell-baby-cry);
}

.milmaru.baby.bigcry {
  background-image: var(--care-shell-baby-bigcry);
}

.milmaru.baby.angry {
  background-image: var(--care-shell-baby-angry);
}

.milmaru.baby.disappointed {
  background-image: var(--care-shell-baby-disappointed);
}

.milmaru.baby.worried {
  background-image: var(--care-shell-baby-worried);
}

.milmaru.egg.warm {
  animation: eggWarm 0.9s ease;
}

.milmaru.egg.relaxed {
  animation: eggPetWiggle 0.75s ease;
}

.milmaru.birth {
  animation: birthPop 1.05s ease;
}

@keyframes happyBounce {
  0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
  30% { transform: translateX(-50%) translateY(-34px) scale(1.05); }
  60% { transform: translateX(-50%) translateY(0) scale(0.98); }
}
@keyframes eatingWiggle {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  25% { transform: translateX(-50%) rotate(-4deg) scale(1.03); }
  55% { transform: translateX(-50%) rotate(4deg) scale(1.02); }
}
@keyframes relaxedSway {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  50% { transform: translateX(-50%) rotate(3deg); }
}
@keyframes playHop {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  22% { transform: translateX(-70%) translateY(-18px); }
  52% { transform: translateX(-30%) translateY(-28px); }
}
@keyframes eggWarm {
  0%, 100% { transform: translateX(-50%) scale(1); filter: brightness(1); }
  38% { transform: translateX(-50%) scale(1.05); filter: brightness(1.12) drop-shadow(0 0 14px rgba(255, 218, 118, 0.7)); }
  68% { transform: translateX(-50%) scale(0.98); }
}
@keyframes eggPetWiggle {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  22% { transform: translateX(-50%) rotate(-5deg); }
  48% { transform: translateX(-50%) rotate(5deg); }
  72% { transform: translateX(-50%) rotate(-3deg); }
}
@keyframes birthPop {
  0% { transform: translateX(-50%) translateY(0) scale(0.88); filter: brightness(1); }
  42% { transform: translateX(-50%) translateY(-36px) scale(1.08); filter: brightness(1.18) drop-shadow(0 0 18px rgba(134, 215, 172, 0.8)); }
  100% { transform: translateX(-50%) translateY(0) scale(1); filter: brightness(1); }
}

.fx-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 8;
}

.fx-piece {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: 20px;
  height: 20px;
  opacity: 0;
  animation: fxRise 1s ease-out forwards;
}

.fx-piece.heart {
  width: 42px;
  height: 42px;
  background: var(--care-fx-heart) center / contain no-repeat;
}

.fx-piece.sparkle {
  width: 32px;
  height: 32px;
  background: var(--care-fx-sparkle) center / contain no-repeat;
}

@keyframes fxRise {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  18% { opacity: 1; }
  100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-100px + var(--dy))) scale(1.35); }
}

.info-block {
  display: grid;
  gap: 12px;
  font-family: var(--pixel-font);
  font-size: 20px;
  line-height: 1.35;
}

.milmaru-name {
  font-size: 28px;
  font-family: var(--round-font);
  font-weight: 900;
}

.growth-card {
  padding: 12px;
  border: 3px solid rgba(139, 96, 66, 0.35);
  border-radius: 10px;
  background: rgba(255,255,255,0.42);
}

.growth-icons {
  margin: 14px 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 7px;
  align-items: center;
}

.growth-icon {
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 3px solid rgba(139, 96, 66, 0.25);
  border-radius: 8px;
  background: rgba(255,255,255,0.44);
  font-size: 23px;
  opacity: 0.55;
}
.growth-icon.active {
  border-color: #d58b45;
  background: #fff1c4;
  opacity: 1;
  box-shadow: 0 0 0 4px rgba(255, 200, 86, 0.32);
}

.mini-gauge {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
}
.mini-track {
  height: 22px;
  border: 3px solid #9f7655;

}
.mini-fill {
  height: 100%;
  width: 0%;

.growth-hint {

.memo-box {

.album-btn {
  align-self: end;
  height: 58px;

.care-actions {

  left: 300px;

.sub-action-row {

}

.action-btn {
  position: relative;
  display: grid;
  grid-template-columns: 50px 1fr;
  grid-template-rows: 1fr auto;
  align-items: center;

  text-align: left;
  font-size: 24px;

.write-main-btn {
  display: grid;
  grid-template-columns: 70px 1fr;
  grid-template-rows: 1fr auto;
  align-items: center;
  column-gap: 16px;
  padding: 7px 28px;

  font-size: 32px;
  background: linear-gradient(180deg, #e4f7c9, #8ed067);

}

.action-icon {
  grid-row: 1 / 3;
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  background: rgba(255,255,255,0.38) center / 72% 72% no-repeat;
  font-size: 30px;

.write-main-btn .action-icon {

  height: 52px;
  font-size: 34px;
  background-image: var(--care-icon-pencil);
}

.write-main-btn.warm-main {

  border-color: #ad7040;
}

.write-main-btn.warm-main .action-icon {
  color: #b85f31;
  background:
    radial-gradient(circle, #fff8cf 0 32%, #ffbf5f 33% 58%, transparent 60%),
    rgba(255,255,255,0.45);

}

.action-help {
  font-family: var(--round-font);

}

.write-main-btn .action-help {
  display: none;
}

.action-btn.feed { background: linear-gradient(180deg, #fff0bd, #f0c16f); }
.action-btn.pet { background: linear-gradient(180deg, #ffe0df, #f4a9a5); }
.action-btn.play { background: linear-gradient(180deg, #cdeefe, #75c4e5); }
.action-btn.write { background: linear-gradient(180deg, #e0f4c9, #9ed572); }

.action-btn.feed.has-cookie {

  box-shadow: 0 5px 0 #6f462c, inset 0 3px rgba(255,255,255,0.55), 0 0 0 5px rgba(255, 219, 92, 0.45);
}

.action-btn.feed.has-cookie::after {
  content: '!';
  position: absolute;
  left: 46px;

  width: 32px;

  display: grid;
  place-items: center;
  border: 3px solid #b35d48;
  border-radius: 999px;
  background: #ff8f94;
  color: #fff7de;

  font-size: 22px;
  box-shadow: 0 3px 0 #8d4b3a;
}

.action-btn.play {
  display: none;
}

.care-actions.egg-mode {
  left: 480px;
  right: 480px;
  bottom: 86px;
  height: 138px;
  grid-template-rows: 66px 58px;
}

.care-actions.egg-mode .sub-action-row {
  grid-template-columns: 1fr;
}

.care-actions.egg-mode .action-btn.feed,
.care-actions.egg-mode .action-btn.play {

}

.action-btn.feed .action-icon { background-image: var(--care-icon-cookie); }
.action-btn.pet .action-icon { background-image: var(--care-icon-heart); }
.action-btn.play .action-icon { background-image: var(--care-icon-star); }

.bottom-message {
  position: absolute;
  left: 232px;
  right: 232px;
  bottom: 6px;
  height: 42px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  border: 4px solid #8b6042;
  border-radius: 10px;
  background: #fff8e8;
  font-family: var(--pixel-font);
  font-size: 20px;
  z-index: 7;
}
</style>
</head>
<body>
<div id="stage-wrap">
  <main id="stage" aria-label="もじっこファーム お世話画面">
    <header class="care-header">
      <button class="pixel-button back-btn" id="backBtn">← もじへ</button>
      <div class="wood-panel title-board">ミルマルのおへや</div>
      <div class="pixel-panel star-box"><span class="star-icon" aria-hidden="true"></span><span id="starCount">1275</span></div>
      <button class="pixel-button icon-btn" id="settingsBtn" aria-label="設定">⚙</button>
    </header>

    <section class="gauges" aria-label="ステータス">
      <div class="paper-panel gauge-card">
        <div class="gauge-title"><span class="gauge-icon heart"></span><span>なかよし</span></div>
        <div class="gauge-line">
          <div class="gauge-track"><div class="gauge-fill nakayoshi" id="nakayoshiFill"></div></div>
          <span id="nakayoshiText">32 / 100</span>
        </div>
      </div>
      <div class="paper-panel gauge-card">
        <div class="gauge-title"><span class="gauge-icon leaf"></span><span id="sukusukuLabel">すくすく</span></div>
        <div class="gauge-line">
          <div class="gauge-track"><div class="gauge-fill sukusuku" id="sukusukuFill"></div></div>
          <span id="sukusukuText">18 / 100</span>
        </div>
      </div>

    <aside class="paper-panel side-panel left" aria-label="もちもの">

        <div class="item-card">
          <div class="cookie-icon" aria-hidden="true"></div>
          <div>
            <div class="item-name">もじクッキー</div>
            <div class="item-count">× <span id="cookieCount">1</span></div>
          </div>
        </div>
        <div class="locked-slot">🔒</div>
        <div class="locked-slot">🔒</div>
        <button class="pixel-button album-btn" id="inventoryBtn">もちものをみる</button>
      </div>
    </aside>

    <section class="center-yard" aria-label="ミルマル表示エリア">
      <div class="yard-bg"></div>
      <div class="yard-prop fence" aria-hidden="true"></div>
      <div class="yard-prop house" aria-hidden="true"></div>
      <div class="yard-prop doghouse" aria-hidden="true"></div>
      <div class="yard-prop planter" aria-hidden="true"></div>
      <div class="yard-prop basket" aria-hidden="true"></div>
      <div class="yard-prop cushion" aria-hidden="true"></div>
      <div class="yard-prop watering" aria-hidden="true"></div>
      <div class="yard-prop bush" aria-hidden="true"></div>
      <div class="yard-prop flowers-a" aria-hidden="true"></div>
      <div class="yard-prop flowers-b" aria-hidden="true"></div>
      <div class="yard-prop flowers-c" aria-hidden="true"></div>
      <div class="yard-prop rug" aria-hidden="true"></div>
      <div class="speech-bubble" id="speechBubble">いっしょに もじを かこう！</div>
      <div class="fx-layer" id="fxLayer"></div>
      <div class="milmaru-wrap">
        <div class="milmaru normal" id="milmaru">
          <div class="milmaru-tail"></div>
          <div class="milmaru-body"></div>

    <aside class="paper-panel side-panel right" aria-label="ミルマル情報">
      <div class="panel-heading">ミルマル</div>
      <div class="panel-body">
        <div class="info-block">
          <div class="milmaru-name">ミルマル</div>
          <div>Lv. <span id="milmaruLevel">1</span></div>
          <div><span id="growthStageName">ベビー</span></div>
        </div>
        <div class="growth-card">
          <div class="info-block">
            <div>もじで すくすく</div>
            <div class="mini-gauge">
              <div class="mini-track"><div class="mini-fill" id="growthFill"></div></div>
              <span id="growthText">すくすく 18 / 25</span>
            </div>
            <div class="growth-hint" id="growthHint">あと 3かいで せいちょう！</div>

          <div class="growth-icons" id="growthIcons"></div>

        <div class="memo-box">
          <div>メモ</div>

    <nav class="care-actions" aria-label="お世話アクション">

        <span class="action-icon" id="mainActionIcon">✏</span><span id="mainActionText">もじを かく！</span><span class="action-help" id="mainActionHelp">メインの もじかきへ もどる</span>
      </button>
      <div class="sub-action-row">
        <button class="pixel-button action-btn feed" id="feedBtn">
          <span class="action-icon">🍪</span><span>あげる</span><span class="action-help">おやつを あげる</span>
        </button>
        <button class="pixel-button action-btn pet" id="petBtn">
          <span class="action-icon">✋</span><span>なでる</span><span class="action-help">なでてあげよう</span>
        </button>
        <button class="pixel-button action-btn play" id="playBtn">
          <span class="action-icon">⚽</span><span>あそぶ</span><span class="action-help">いっしょにあそぶ</span>
        </button>

    <div class="bottom-message" id="bottomMessage">いっしょに もじをかいて、すこしずつ げんきに そだてよう！</div>
  </main>
</div>

<script>
'use strict';

const CARE_STATE_KEY = 'mojikkoFarmCareStateV1';
const PENDING_REWARD_KEY = 'mojikkoFarmPendingWritingReward';

const defaultState = {
  nakayoshi: 32,
  sukusuku: 0,
  eggWarmth: 0,
  hatched: false,
  stars: 1250,
  inventory: {
    moji_cookie: { id: 'moji_cookie', name: 'もじクッキー', count: 0, type: 'food' }
  },
  reaction: 'normal',
  speech: 'まだ タマゴだよ',
  lastPetAt: 0,
  lastWarmAt: 0
};

const growthStages = [
  { id: 'egg', name: 'タマゴ', icon: '🥚', min: 0, next: 10 },
  { id: 'baby', name: 'ベビー', icon: '🐣', min: 10, next: 25 },
  { id: 'yochiyochi', name: 'よちよち期', icon: '🐹', min: 25, next: 50 },
  { id: 'kids', name: 'キッズ', icon: '⭐', min: 50, next: 80 },
  { id: 'pre_evolution', name: 'しんかまえ', icon: '✨', min: 80, next: 100 }
];

let state = loadState();

const stageEl = document.getElementById('stage');
const speechBubble = document.getElementById('speechBubble');
const bottomMessage = document.getElementById('bottomMessage');
const milmaru = document.getElementById('milmaru');
const fxLayer = document.getElementById('fxLayer');
const careActions = document.querySelector('.care-actions');
const writeBtn = document.getElementById('writeBtn');
const feedBtn = document.getElementById('feedBtn');
const mainActionIcon = document.getElementById('mainActionIcon');
const mainActionText = document.getElementById('mainActionText');
const mainActionHelp = document.getElementById('mainActionHelp');

function fitStage() {
  const scale = Math.min(window.innerWidth / 1600, window.innerHeight / 900);
  const ox = (window.innerWidth - 1600 * scale) / 2;
  const oy = (window.innerHeight - 900 * scale) / 2;
  stageEl.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
}

window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));
document.addEventListener('visibilitychange', () => { if (!document.hidden) fitStage(); });
fitStage();

function cloneDefaultState() {
  return JSON.parse(JSON.stringify(defaultState));
}

function loadState() {
  try {
    const saved = localStorage.getItem(CARE_STATE_KEY);
    if (!saved) return cloneDefaultState();
    const parsed = JSON.parse(saved);
    const merged = cloneDefaultState();
    merged.nakayoshi = Number.isFinite(parsed.nakayoshi) ? parsed.nakayoshi : merged.nakayoshi;
    merged.sukusuku = Number.isFinite(parsed.sukusuku) ? parsed.sukusuku : merged.sukusuku;
    merged.eggWarmth = Number.isFinite(parsed.eggWarmth) ? clamp(parsed.eggWarmth, 0, 100) : merged.eggWarmth;
    merged.hatched = parsed.hatched === true;
    merged.stars = Number.isFinite(parsed.stars) ? parsed.stars : merged.stars;
    merged.speech = merged.hatched ? (parsed.speech || 'うまれたての あかちゃんだよ') : 'まだ タマゴだよ';
    merged.reaction = parsed.reaction || merged.reaction;
    merged.lastPetAt = Number.isFinite(parsed.lastPetAt) ? parsed.lastPetAt : 0;
    merged.lastWarmAt = Number.isFinite(parsed.lastWarmAt) ? parsed.lastWarmAt : 0;
    if (parsed.inventory && parsed.inventory.moji_cookie) {
      merged.inventory.moji_cookie.count = Math.max(0, Number(parsed.inventory.moji_cookie.count) || 0);
    }
    return merged;
  } catch (error) {
    console.warn('Could not load care state:', error);
    return cloneDefaultState();
  }
}

function saveState() {
  try {
    localStorage.setItem(CARE_STATE_KEY, JSON.stringify(state));
  } catch (error) {
    console.warn('Could not save care state:', error);
  }
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function getGrowthStage(sukusuku) {
  if (sukusuku < 10) return growthStages[0];
  if (sukusuku < 25) return growthStages[1];
  if (sukusuku < 50) return growthStages[2];
  if (sukusuku < 80) return growthStages[3];
  return growthStages[4];
}

function getCareStage() {
  if (!state.hatched) return growthStages[0];
  return getGrowthStage(Math.max(10, state.sukusuku));
}

function getNextGrowthProgress(sukusuku) {
  const stage = getGrowthStage(sukusuku);
  const max = stage.next;
  return {
    current: clamp(sukusuku, 0, max),
    max,
    percent: clamp((sukusuku / max) * 100, 0, 100)
  };
}

function getEggVisualClass() {
  if (state.eggWarmth >= 70) return 'egg-peek';
  if (state.eggWarmth >= 35) return 'egg-cracked';
  return 'egg-idle';
}

function renderActionMode() {
  careActions.classList.toggle('egg-mode', !state.hatched);
  writeBtn.classList.toggle('warm-main', !state.hatched);
  if (state.hatched) {
    mainActionIcon.textContent = '';
    mainActionText.textContent = 'もじを かく！';
    mainActionHelp.textContent = 'もじを かいて おやつを もらおう！';
  } else {
    mainActionIcon.textContent = '☀';
    mainActionText.textContent = 'あたためる！';
    mainActionHelp.textContent = 'やさしく ぽかぽか してあげよう';
  }
}

function applyMilmaruClass(reaction) {
  const currentReaction = reaction || state.reaction || 'normal';
  const classes = ['milmaru'];
  if (state.hatched) {
    classes.push('baby', currentReaction);
  } else {
    classes.push('egg', getEggVisualClass(), currentReaction);
  }
  milmaru.className = classes.join(' ');
}

function setSpeech(text, message) {
  state.speech = text;
  speechBubble.textContent = text;
  if (message) bottomMessage.textContent = message;
}

function setReaction(reaction, duration = 950) {
  state.reaction = reaction;
  applyMilmaruClass(reaction);
  clearTimeout(setReaction._timer);
  setReaction._timer = setTimeout(() => {
    state.reaction = 'normal';
    applyMilmaruClass('normal');
  }, duration);
}

function spawnFx(type) {
  const count = type === 'sparkle' ? 18 : 14;
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = `fx-piece ${i % 3 === 0 ? 'sparkle' : 'heart'}`;
    piece.style.setProperty('--x', (45 + Math.random() * 18) + '%');
    piece.style.setProperty('--y', (46 + Math.random() * 20) + '%');
    piece.style.setProperty('--dx', ((Math.random() - 0.5) * 180) + 'px');
    piece.style.setProperty('--dy', ((Math.random() - 0.5) * 40) + 'px');
    piece.style.animationDelay = (Math.random() * 0.15) + 's';
    fxLayer.appendChild(piece);
    setTimeout(() => piece.remove(), 1200);
  }
}

function maybeHatchEgg() {
  if (state.hatched || state.eggWarmth < 100) return false;
  state.hatched = true;
  state.sukusuku = Math.max(10, state.sukusuku);
  state.reaction = 'birth';
  setSpeech('うまれたよ！', 'ベビーの ミルマルが こんにちは！つぎは もじを かいて おやつを もらおう。');
  spawnFx('sparkle');
  saveState();
  render();
  setReaction('birth', 1300);
  setTimeout(() => {
    if (state.reaction === 'normal') {
      setSpeech('いっしょに もじを かこう！', 'もじを かくと、ミルマルに あげる おやつが もらえるよ。');
      saveState();
      render();
    }
  }, 1450);
  return true;
}

function warmEgg() {
  const now = Date.now();
  if (now - state.lastWarmAt < 650) return;
  state.lastWarmAt = now;
  state.eggWarmth = clamp(state.eggWarmth + 25, 0, 100);
  state.nakayoshi = clamp(state.nakayoshi + 1, 0, 100);
  if (state.eggWarmth >= 100) {
    maybeHatchEgg();
    return;
  }
  if (state.eggWarmth >= 70) {
    setSpeech('もうすぐ うまれそう！', 'タマゴの なかで ミルマルが うれしそうに うごいたよ。');
  } else if (state.eggWarmth >= 35) {
    setSpeech('ぽかぽか してきたよ', 'タマゴに ちいさな ひびが はいったみたい。');
  } else {
    setSpeech('あったかいね', 'やさしく あたためてあげよう。');
  }
  setReaction('warm', 900);
  spawnFx('sparkle');
  saveState();
  render();
}

function renderGrowthIcons(currentStage) {
  const icons = document.getElementById('growthIcons');
  icons.innerHTML = growthStages.map((stage) => {
    const active = stage.id === currentStage.id ? ' active' : '';
    return `<div class="growth-icon${active}" title="${stage.name}">${stage.icon}</div>`;
  }).join('');
}

function render() {
  state.nakayoshi = clamp(state.nakayoshi, 0, 100);
  state.sukusuku = clamp(state.sukusuku, 0, 100);
  state.eggWarmth = clamp(state.eggWarmth || 0, 0, 100);
  const cookie = state.inventory.moji_cookie;
  const stage = getCareStage();
  const progress = state.hatched
    ? getNextGrowthProgress(Math.max(10, state.sukusuku))
    : { current: state.eggWarmth, max: 100, percent: state.eggWarmth };
  const remaining = Math.max(0, progress.max - state.sukusuku);
  const writingCount = Math.max(0, Math.ceil(remaining / 3));
  const warmCount = Math.max(0, Math.ceil((100 - state.eggWarmth) / 25));

  document.getElementById('starCount').textContent = String(state.stars);
  document.getElementById('nakayoshiText').textContent = `${state.nakayoshi} / 100`;
  document.getElementById('sukusukuLabel').textContent = state.hatched ? 'すくすく' : 'ぽかぽか';
  document.getElementById('sukusukuText').textContent = state.hatched ? `${state.sukusuku} / 100` : `${state.eggWarmth} / 100`;
  document.getElementById('nakayoshiFill').style.width = `${state.nakayoshi}%`;
  document.getElementById('sukusukuFill').style.width = `${state.hatched ? state.sukusuku : state.eggWarmth}%`;
  document.getElementById('cookieCount').textContent = String(cookie.count);
  feedBtn.classList.toggle('has-cookie', state.hatched && cookie.count > 0);
  document.getElementById('growthStageName').textContent = stage.name;
  document.getElementById('stageLabel').textContent = stage.name;
  document.getElementById('growthFill').style.width = `${progress.percent}%`;
  document.getElementById('growthText').textContent = state.hatched
    ? `すくすく ${progress.current} / ${progress.max}`
    : `ぽかぽか ${progress.current} / ${progress.max}`;
  document.getElementById('growthHint').textContent = state.hatched
    ? (writingCount > 0 ? `あと ${writingCount}かいで せいちょう！` : 'もうすぐ せいちょう！')
    : (warmCount > 0 ? `あと ${warmCount}かい あたためよう！` : 'もうすぐ うまれるよ！');
  document.getElementById('milmaruLevel').textContent = String(state.hatched ? Math.max(1, Math.floor(state.sukusuku / 20) + 1) : 1);
  document.getElementById('memoLine1').textContent = state.hatched ? 'やさしくて、がんばりやさん。' : 'タマゴの なかで すやすや。';
  document.getElementById('memoLine2').textContent = state.hatched ? 'ミルクのにおいが だいすき！' : 'ぽかぽかが だいすき！';
  speechBubble.textContent = state.speech;
  renderGrowthIcons(stage);
  renderActionMode();
  applyMilmaruClass(state.reaction);
}

function consumePendingWritingReward() {
  let pending = null;
  try {
    const raw = localStorage.getItem(PENDING_REWARD_KEY);
    if (raw) pending = JSON.parse(raw);
    localStorage.removeItem(PENDING_REWARD_KEY);
  } catch (error) {
    console.warn('Could not consume writing reward:', error);
  }
  if (!pending || !pending.result || !pending.result.success) return false;
  const reward = pending.result.reward || { type: 'food', id: 'moji_cookie', name: 'もじクッキー' };
  if (reward.id === 'moji_cookie') {
    state.inventory.moji_cookie.count += 1;
  }
  state.sukusuku = clamp(state.sukusuku + 3, 0, 100);
  state.stars += 25;
  if (state.hatched) {
    setSpeech(`${reward.name || 'もじクッキー'}を もらったよ！`, 'かいた もじが おやつに なったよ。ミルマルに あげてみよう！');
    setReaction('happy');
  } else {
    setSpeech(`${reward.name || 'もじクッキー'}を もらったよ！`, 'タマゴを あたためたら、うまれた ミルマルに あげよう。');
    setReaction('warm');
  }
  spawnFx('sparkle');
  saveState();
  return true;
}

function applyEntrySpeech() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('from') !== 'writing') return;
  if (!state.hatched) {
    setSpeech('タマゴを あたためよう！', 'ぽかぽか すると、ミルマルが うまれてくるよ。');
    saveState();
    return;
  }
  if (state.inventory.moji_cookie.count > 0) {
    setSpeech('おやつ ほしいな〜', 'もじクッキーを あげたら、ミルマルが よろこぶよ。');
  } else {
    setSpeech('いっしょに もじを かこう！', 'おやつが ないときは、もじを かいて もらいにいこう！');
  }
  saveState();
}

function feedCookie() {
  if (!state.hatched) {
    setSpeech('まだ タマゴだよ', '先に あたためて、ミルマルを うまれさせよう。');
    setReaction('warm');
    spawnFx('sparkle');
    return;
  }
  const cookie = state.inventory.moji_cookie;
  if (cookie.count <= 0) {
    setSpeech('おやつが ないみたい。', 'もじを かいて もじクッキーを もらいにいこう！');
    setReaction('normal');
    return;
  }
  cookie.count -= 1;
  state.nakayoshi = clamp(state.nakayoshi + 5, 0, 100);
  state.sukusuku = clamp(state.sukusuku + 2, 0, 100);
  setSpeech('おいしい！ ありがとう！', 'もじクッキーを あげたよ。なかよしと すくすくが ふえた！');
  setReaction('eating');
  spawnFx('sparkle');
  saveState();
  render();
}

function petMilmaru() {
  const now = Date.now();
  if (now - state.lastPetAt < 700) return;
  state.lastPetAt = now;
  state.nakayoshi = clamp(state.nakayoshi + 2, 0, 100);
  if (!state.hatched) {
    state.eggWarmth = clamp(state.eggWarmth + 8, 0, 100);
    setSpeech('ゆらゆら うごいたよ', 'タマゴを やさしく なでたら、すこし あったかく なったよ。');
    setReaction('relaxed');
    spawnFx('sparkle');
    saveState();
    render();
    maybeHatchEgg();
    return;
  }
  setSpeech('なでてくれて うれしい！', 'ミルマルが ほっとしているよ。');
  setReaction('relaxed');
  spawnFx('heart');
  saveState();
  render();
}

function playWithMilmaru() {
  if (!state.hatched) {
    setSpeech('まだ タマゴだよ', 'いまは あたためるのが いちばん だいじ。');
    setReaction('warm');
    spawnFx('sparkle');
    return;
  }
  state.nakayoshi = clamp(state.nakayoshi + 3, 0, 100);
  setSpeech('いっしょに あそぶの たのしい！', 'ミルマルが ぴょんぴょん はねたよ。');
  setReaction('play');
  spawnFx('sparkle');
  saveState();
  render();
}

function goWrite() {
  if (!state.hatched) {
    warmEgg();
    return;
  }
  setSpeech('もじを かきにいこう！', 'かけたら もじクッキーが もらえるよ。');
  setReaction('happy');
  saveState();
  setTimeout(() => {
    window.location.href = 'index.html?from=care';
  }, 180);
}

document.getElementById('backBtn').addEventListener('click', () => {
  saveState();
  window.location.href = 'index.html?from=care';
});
document.getElementById('settingsBtn').addEventListener('click', () => {
  setSpeech('せっていは じゅんびちゅうだよ', 'また あとで つかえるようにするね。');
});
document.getElementById('inventoryBtn').addEventListener('click', () => {
  setSpeech('もちものは ここで みられるよ', 'いまは もじクッキーだけ もっているよ。');
});
document.getElementById('albumBtn').addEventListener('click', () => {
  setSpeech('アルバムは じゅんびちゅう！', 'かいた もじを あとで ならべよう。');
});
document.getElementById('feedBtn').addEventListener('click', feedCookie);
document.getElementById('petBtn').addEventListener('click', petMilmaru);
document.getElementById('playBtn').addEventListener('click', playWithMilmaru);
document.getElementById('writeBtn').addEventListener('click', goWrite);

const consumedPendingReward = consumePendingWritingReward();
if (!consumedPendingReward) applyEntrySpeech();
render();

window.MojikkoCareGame = {
  getState: () => JSON.parse(JSON.stringify(state)),
  feedCookie,
  petMilmaru,
  playWithMilmaru,
  goWrite,
  warmEgg,
  consumePendingWritingReward
};
</script>
</body>
</html>
