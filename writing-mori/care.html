<!-- app (アプリばん) 専用 tier ガード。 tier.js 未読込/例外時は fail-open (従来通り表示)。 -->
<script src="../common/debug-mode.js"></script>
<script src="../common/tier.js"></script>
<script>
(function(){
  'use strict';
  var locked = false;
  try {
    var pt = window.PonoTier;
    // ローンチ時はここを変更: book 開放時は locked = !['app','book'].includes(pt.getTier());
    if (pt && typeof pt.getTier === 'function') locked = (pt.getTier() !== 'app');
  } catch (e) { locked = false; }
  if (!locked) return;
  window.__PONO_TIER_LOCKED__ = true;
  // FOUC 防止: head 内同期実行なので初回ペイント前にゲーム側 DOM を不可視化
  var st = document.createElement('style');
  st.textContent = 'html{background:#FFF7E6 !important}body>*:not(#ponoTierLockScreen){visibility:hidden !important}';
  (document.head || document.documentElement).appendChild(st);
  // キーボード入力がゲームへ届かないよう capture 段階で遮断 (ロック中のみ)。
  // ゲーム側 listener はガードより後に登録されるため stopImmediatePropagation だけで全て遮断できる。
  // preventDefault はしない: Tab/Enter で「メニューへ もどる」リンクに到達する
  // キーボード操作と、 ブラウザ既定動作 (F5 リロード等) を塞がないため。
  var KEY_EVTS = ['keydown', 'keyup', 'keypress'];
  for (var i = 0; i < KEY_EVTS.length; i++) {
    window.addEventListener(KEY_EVTS[i], function(e){
      if (window.__PONO_TIER_LOCKED__) e.stopImmediatePropagation();
    }, true);
  }
  function showLock(){
    if (!document.body || document.getElementById('ponoTierLockScreen')) return;
    var ov = document.createElement('div');
    ov.id = 'ponoTierLockScreen';
    ov.setAttribute('role', 'dialog');
    ov.style.cssText = 'position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(165deg,#FFF7E6 0%,#FFEDC2 45%,#D9EFD5 100%);font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif;text-align:center';
    var card = document.createElement('div');
    card.style.cssText = 'background:#fff;border-radius:26px;padding:28px 24px 26px;max-width:340px;width:100%;box-shadow:0 12px 40px rgba(93,78,55,0.22)';
    var emo = document.createElement('div');
    emo.style.cssText = 'font-size:2.8rem;line-height:1;margin-bottom:12px';
    emo.textContent = '🦉✨';
    card.appendChild(emo);
    var tag = document.createElement('div');
    tag.style.cssText = 'display:inline-block;font-size:0.74rem;font-weight:900;color:#fff;background:linear-gradient(135deg,#34D399,#10B981);padding:4px 14px;border-radius:50px;letter-spacing:0.06em;margin-bottom:12px';
    tag.textContent = 'アプリばん せんよう';
    card.appendChild(tag);
    var ttl = document.createElement('div');
    ttl.style.cssText = 'font-size:1.12rem;font-weight:900;color:#5D4E37;line-height:1.5;margin-bottom:10px';
    ttl.textContent = 'この ゲームは アプリばんで あそべるよ！';
    card.appendChild(ttl);
    var body = document.createElement('div');
    body.style.cssText = 'font-size:0.92rem;font-weight:700;color:#8B7B60;line-height:1.6;margin-bottom:18px';
    body.textContent = 'アプリばんに あたらしい あそびが まってるよ';
    card.appendChild(body);
    var btn = document.createElement('a');
    btn.href = '../play.html';
    btn.style.cssText = 'display:inline-block;padding:12px 34px;border-radius:50px;background:linear-gradient(135deg,#60A5FA,#3B82F6);color:#fff;font-size:0.98rem;font-weight:900;text-decoration:none;box-shadow:0 4px 14px rgba(59,130,246,0.4)';
    btn.textContent = 'メニューへ もどる';
    card.appendChild(btn);
    ov.appendChild(card);
    document.body.appendChild(ov);
  }
  if (document.body) { showLock(); }
  else { document.addEventListener('DOMContentLoaded', showLock); }
})();
</script>

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  color: var(--ink);
  background: #243b33;
  font-family: var(--round-font);
  position: fixed;
  inset: 0;
}

#stage-wrap {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: linear-gradient(180deg, #233f53 0%, #12222b 100%);
}

#stage-wrap::before {
  content: '';
  position: fixed;
  inset: -72vmax;
  z-index: 0;
  opacity: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.84) 0 12%, rgba(255,255,255,0.26) 27%, rgba(255,255,255,0) 58%),
    radial-gradient(circle at center, rgba(255,152,185,0) 0 44%, rgba(181,75,111,0.16) 100%),
    repeating-conic-gradient(
      from 0deg,
      #fff1f6 0deg 9deg,
      #ffc4d6 9deg 18deg,
      #ff9fbd 18deg 27deg,
      #ffdce8 27deg 36deg
    );
  transform-origin: center;
  transition: opacity 0.18s ease;
}

#stage-wrap.hatch-active::before {
  opacity: 0;
  animation: hatchRaySpin 5.2s linear infinite;
}

#stage {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  width: 1600px;
  height: 900px;
  transform-origin: 0 0;
  overflow: hidden;
  background: var(--care-yard-bg-wide) right center / cover no-repeat;
  image-rendering: pixelated;
}

#stage.hatch-active {
  overflow: visible;
}

#stage.hatch-active::before {
  display: none;
}

#stage::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px),
    linear-gradient(180deg, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 8px 8px, 8px 8px;
  mix-blend-mode: soft-light;
  pointer-events: none;
}

.wood-panel,
.paper-panel {
  border: 5px solid var(--wood-dark);
  box-shadow: 0 6px 0 #4b321f, 0 10px 18px var(--shadow);

}

.wood-panel {

.paper-panel {

  background: var(--care-icon-cookie) center / contain no-repeat;
}

.milk-icon {
  width: 42px;
  height: 62px;

.gohan-icon {
  width: 58px;

  font-size: 31px;

.item-name {
  font-family: var(--round-font);
  font-size: 18px;
  font-weight: 900;
  line-height: 1.25;
}

.item-count {
  margin-top: 6px;
  font-family: var(--pixel-font);
  font-size: 20px;
}

.locked-slot {
  height: 96px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 3px dashed rgba(139, 96, 66, 0.28);
  border-radius: 10px;
  color: rgba(94, 71, 52, 0.36);
  font-size: 34px;
}

.center-yard {
  position: absolute;
  left: 326px;
  right: 326px;
  top: 248px;
  bottom: 144px;
  z-index: 2;
}

.yard-bg {
  position: absolute;
  inset: 0;
  border-radius: 18px;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
    var(--care-yard-bg) center / cover no-repeat;
  box-shadow:
    inset 0 0 0 4px rgba(255, 255, 255, 0.16),
    inset 0 -20px 30px rgba(74, 118, 57, 0.1);
  image-rendering: pixelated;
}

.yard-bg,
.yard-prop {
  display: none;
}

.yard-bg::before {
  display: none;
}

.yard-bg::after {
  display: none;
}

.yard-prop {
  position: absolute;
  background-position: center;
  background-repeat: no-repeat;
  background-size: contain;
  image-rendering: pixelated;
  pointer-events: none;
}

.yard-prop.house {
  right: 62px;
  top: 54px;
  width: 300px;
  height: 224px;
  background-image: var(--care-house);
  z-index: 1;
}

.yard-prop.fence {
  left: 70px;
  right: 76px;
  top: 174px;
  height: 74px;
  background-image: var(--care-fence);
  background-size: 100% 100%;
  opacity: 0.86;
  z-index: 0;
}

.yard-prop.rug {
  left: 50%;
  bottom: 52px;
  width: 380px;
  height: 152px;
  transform: translateX(-50%);
  background-image: var(--care-rug);
  z-index: 2;
}

.yard-prop.doghouse {
  left: 72px;
  top: 128px;
  width: 128px;
  height: 188px;
  background-image: var(--care-doghouse);
  z-index: 2;
}

.yard-prop.cushion {
  right: 114px;
  bottom: 72px;
  width: 144px;
  height: 92px;
  background-image: var(--care-cushion);
  z-index: 3;
}

.yard-prop.basket {
  left: 82px;
  bottom: 74px;
  width: 132px;
  height: 132px;
  background-image: var(--care-basket);
  z-index: 3;
}

.yard-prop.planter {
  right: 232px;
  top: 205px;
  width: 136px;
  height: 80px;
  background-image: var(--care-planter);
  z-index: 2;
}

.yard-prop.watering {
  right: 42px;
  bottom: 124px;
  width: 92px;
  height: 68px;
  background-image: var(--care-watering);
  z-index: 3;
}

.yard-prop.bush {
  left: 24px;
  bottom: 38px;
  width: 116px;
  height: 96px;
  background-image: var(--care-bush);
  z-index: 2;
}

.yard-prop.flowers-a {
  left: 242px;
  bottom: 34px;
  width: 82px;
  height: 80px;
  background-image: var(--care-flowers-a);
  z-index: 3;
}

.yard-prop.flowers-b {
  right: 306px;
  bottom: 30px;
  width: 90px;
  height: 82px;
  background-image: var(--care-flowers-b);
  z-index: 3;
}

.yard-prop.flowers-c {
  right: 20px;
  bottom: 36px;
  width: 76px;
  height: 76px;
  background-image: var(--care-flowers-c);
  z-index: 3;
}

.speech-bubble {
  position: absolute;
  left: var(--speech-x, 50%);
  top: 20px;
  min-width: 320px;
  max-width: 560px;
  min-height: 82px;
  padding: 20px 26px;
  transform: translateX(-42%);
  border-radius: 18px;
  border: 5px solid #8b6042;
  background: #fff8e8;
  box-shadow: 0 5px 0 #6f462c;
  font-family: var(--pixel-font);
  font-size: 26px;
  text-align: center;
  z-index: 5;
  transition: left var(--roam-duration, 4.8s) ease-in-out;
}

.speech-bubble::after {
  content: '';
  position: absolute;
  left: 44%;
  bottom: -24px;
  width: 38px;
  height: 38px;
  background: #fff8e8;
  border-right: 5px solid #8b6042;
  border-bottom: 5px solid #8b6042;
  transform: rotate(45deg);
}

.milmaru-wrap {
  position: absolute;
  left: var(--roam-x, 50%);
  bottom: var(--roam-y, 42px);
  width: 330px;
  height: 328px;
  transform: translateX(-50%) scaleX(var(--roam-dir, 1));
  transform-origin: center bottom;
  z-index: 5;
  transition:
    left var(--roam-duration, 4.8s) var(--roam-easing, ease-in-out),
    bottom var(--roam-duration, 4.8s) var(--roam-easing, ease-in-out);
  will-change: left, bottom, transform;
  touch-action: none;
}

.milmaru-wrap.petting-ready {
  cursor: grab;
}

.milmaru-wrap.petting-ready .milmaru {
  cursor: grab;
  filter: drop-shadow(0 0 12px rgba(255, 183, 198, 0.8));
}

.milmaru-wrap.petting-ready .milmaru:active {
  cursor: grabbing;
}

.milmaru {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 300px;
  height: 320px;
  transform: translateX(-50%);
  transform-origin: center bottom;
  background: var(--care-milmaru-normal) center bottom / contain no-repeat;
  image-rendering: pixelated;
  transition: transform 0.2s ease;
  backface-visibility: hidden;
}

.milmaru::before,
.milmaru::after {
  display: none;
}

.milmaru-body {
  display: none;
}

.milmaru-body::before {
  display: none;
}

.milmaru-body::after {
  display: none;
}

.milmaru-arm,
.milmaru-foot {
  display: none;
}

.milmaru-tail {
  display: none;
}

.milmaru.happy { animation: happyBounce 0.72s ease; }
.milmaru.eating { animation: eatingWiggle 0.8s ease; }
.milmaru.relaxed { animation: relaxedSway 1s ease; }
.milmaru.play { animation: playHop 0.8s ease; }
.milmaru.sleep { animation: relaxedSway 1.4s ease-in-out infinite; }

.milmaru.egg {
  bottom: 74px;
  width: 180px;
  height: 232px;
  background-image: var(--care-egg-idle);
}

.milmaru.egg-cracked {
  background-image: var(--care-egg-cracked);
}

.milmaru.egg-peek {
  background-image: var(--care-egg-peek);
}

.milmaru.baby {
  width: 318px;
  height: 322px;
  background-image: var(--care-shell-baby-happy);
}

.milmaru.baby.normal {
  background-image: var(--care-shell-baby-happy);
}

.milmaru.baby.happy {
  background-image: var(--care-shell-baby-arms-up);
  animation: babyHappyFrames 0.82s step-end 2, happyBounce 0.72s ease;
}

.milmaru.baby.eating {
  background-image: var(--care-shell-baby-milk);
  animation: babyMilkFrames 0.9s step-end 2, eatingWiggle 0.8s ease;
}

.milmaru.baby.play {
  background-image: var(--care-shell-baby-wiggle);
  animation: babyPlayFrames 0.76s step-end 2, playHop 0.8s ease;
}

.milmaru.baby.birth {
  background-image: var(--care-shell-baby-arms-up);
}

.milmaru.baby.relaxed {
  background-image: var(--care-shell-baby-sleep);
}

.milmaru.baby.sleep {
  background-image: var(--care-shell-baby-sleep);
}

.milmaru.baby.cry {
  background-image: var(--care-shell-baby-cry);
}

.milmaru.baby.bigcry {
  background-image: var(--care-shell-baby-bigcry);
}

.milmaru.baby.angry {
  background-image: var(--care-shell-baby-angry);
}

.milmaru.baby.disappointed {
  background-image: var(--care-shell-baby-disappointed);
}

.milmaru.baby.worried {
  background-image: var(--care-shell-baby-worried);
}

.milmaru.yochiyochi {
  bottom: 58px;
  width: 360px;
  height: 300px;
  background-size: auto 218px;
  background-image: var(--care-yochiyochi-normal);
}

.milmaru.yochiyochi.normal {
  background-image: var(--care-yochiyochi-normal);
}

.milmaru.yochiyochi.happy {
  background-image: var(--care-yochiyochi-happy);
  animation: happyBounce 0.72s ease;
}

.milmaru.yochiyochi.eating {
  background-image: var(--care-yochiyochi-eating);
  animation: eatingWiggle 0.8s ease;
}

.milmaru.yochiyochi.play {
  background-image: var(--care-yochiyochi-play-a);
  animation: yochiyochiPlayFrames 0.82s step-end 2, playHop 0.8s ease;
}

.milmaru.yochiyochi.birth {
  background-image: var(--care-yochiyochi-happy);
}

.milmaru.yochiyochi.relaxed,
.milmaru.yochiyochi.sleep {
  background-image: var(--care-yochiyochi-sleep);
}

.milmaru.yochiyochi.cry,
.milmaru.yochiyochi.bigcry {
  background-image: var(--care-yochiyochi-cry);
}

.milmaru.yochiyochi.angry {
  background-image: var(--care-yochiyochi-angry);
}

.milmaru.yochiyochi.disappointed {
  background-image: var(--care-yochiyochi-disappointed);
}

.milmaru.yochiyochi.worried {
  background-image: var(--care-yochiyochi-worried);
}

.milmaru-wrap.roaming .milmaru.yochiyochi.normal.roaming-crawl {
  background-size: auto 260px;
  animation: yochiyochiCrawlFrames var(--roam-frame-duration, 1.9s) step-end infinite;
}

.milmaru-wrap.roaming .milmaru.yochiyochi.normal.roaming-walk {
  background-size: auto 270px;
  animation: yochiyochiWalkFrames var(--roam-frame-duration, 1.35s) step-end infinite;
}

.milmaru.egg.warm {
  animation: eggWarm 0.9s ease;
}

.milmaru.egg.relaxed {
  animation: eggPetWiggle 0.75s ease;
}

.milmaru.birth {
  animation: birthPop 1.05s ease;
}

@keyframes happyBounce {
  0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
  30% { transform: translateX(-50%) translateY(-34px) scale(1.05); }
  60% { transform: translateX(-50%) translateY(0) scale(0.98); }
}
@keyframes eatingWiggle {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  25% { transform: translateX(-50%) rotate(-4deg) scale(1.03); }
  55% { transform: translateX(-50%) rotate(4deg) scale(1.02); }
}
@keyframes relaxedSway {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  50% { transform: translateX(-50%) rotate(3deg); }
}
@keyframes playHop {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  22% { transform: translateX(-70%) translateY(-18px); }
  52% { transform: translateX(-30%) translateY(-28px); }
}
@keyframes babyHappyFrames {
  0%, 100% { background-image: var(--care-shell-baby-arms-up); }
  45% { background-image: var(--care-shell-baby-wave); }
}
@keyframes babyMilkFrames {
  0%, 100% { background-image: var(--care-shell-baby-milk); }
  48% { background-image: var(--care-shell-baby-wave); }
}
@keyframes babyPlayFrames {
  0%, 100% { background-image: var(--care-shell-baby-wiggle); }
  45% { background-image: var(--care-shell-baby-arms-up); }
}
@keyframes yochiyochiPlayFrames {
  0%, 100% { background-image: var(--care-yochiyochi-play-a); }
  35% { background-image: var(--care-yochiyochi-play-b); }
  70% { background-image: var(--care-yochiyochi-play-c); }
}
@keyframes yochiyochiRoamFrames {
  0%, 100% { background-image: var(--care-yochiyochi-play-a); }
  50% { background-image: var(--care-yochiyochi-play-b); }
}
@keyframes yochiyochiCrawlFrames {
  0%, 100% { background-image: var(--care-yochiyochi-crawl-1); }
  16% { background-image: var(--care-yochiyochi-crawl-2); }
  33% { background-image: var(--care-yochiyochi-crawl-3); }
  50% { background-image: var(--care-yochiyochi-crawl-4); }
  66% { background-image: var(--care-yochiyochi-crawl-5); }
  83% { background-image: var(--care-yochiyochi-crawl-6); }
}
@keyframes yochiyochiWalkFrames {
  0%, 100% { background-image: var(--care-yochiyochi-walk-1); }
  25% { background-image: var(--care-yochiyochi-walk-2); }
  50% { background-image: var(--care-yochiyochi-walk-3); }
  75% { background-image: var(--care-yochiyochi-walk-4); }
}
@keyframes eggWarm {
  0%, 100% { transform: translateX(-50%) scale(1); filter: brightness(1); }
  38% { transform: translateX(-50%) scale(1.05); filter: brightness(1.12) drop-shadow(0 0 14px rgba(255, 218, 118, 0.7)); }
  68% { transform: translateX(-50%) scale(0.98); }
}
@keyframes eggPetWiggle {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  22% { transform: translateX(-50%) rotate(-5deg); }
  48% { transform: translateX(-50%) rotate(5deg); }
  72% { transform: translateX(-50%) rotate(-3deg); }
}
@keyframes birthPop {
  0% { transform: translateX(-50%) translateY(0) scale(0.88); filter: brightness(1); }
  42% { transform: translateX(-50%) translateY(-36px) scale(1.08); filter: brightness(1.18) drop-shadow(0 0 18px rgba(134, 215, 172, 0.8)); }
  100% { transform: translateX(-50%) translateY(0) scale(1); filter: brightness(1); }
}

.fx-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 8;
}

.stage-notice {
  position: absolute;
  left: 50%;
  top: 50%;
  width: min(720px, 62vw);
  min-height: 190px;
  z-index: 36;
  display: grid;
  grid-template-columns: 92px 1fr;
  gap: 20px;
  align-items: center;
  padding: 28px 34px 28px 28px;
  border: 6px solid #7d5133;
  border-radius: 16px;
  background: linear-gradient(180deg, #fffaf0 0%, #ffeec9 100%);
  box-shadow:
    0 8px 0 #57331e,
    inset 0 0 0 4px rgba(255, 255, 255, 0.68);
  color: #4d3124;
  font-family: var(--pixel-font);
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0.9);
}

.stage-notice.show {
  animation: stageNoticePop 2.45s ease both;
}

.stage-notice-icon {
  width: 78px;
  height: 78px;
  border-radius: 18px;
  border: 4px solid #b9874d;
  background:
    var(--care-fx-sparkle) center / 54px 54px no-repeat,
    linear-gradient(180deg, #fff6b7, #ffd980);
  box-shadow: 0 5px 0 #805230;
  image-rendering: pixelated;
}

.stage-notice-title {
  margin-bottom: 10px;
  color: #2f9d76;
  font-size: 34px;
  line-height: 1.2;
  text-shadow: 0 2px 0 rgba(255, 255, 255, 0.8);
}

.stage-notice-text {
  font-size: 24px;
  line-height: 1.45;
}

@keyframes stageNoticePop {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.82); }
  12% { opacity: 1; transform: translate(-50%, -50%) scale(1.03); }
  18%, 78% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
}

.hatch-scene {
  position: absolute;
  inset: 0;
  z-index: 90;
  display: grid;
  grid-template-rows: 170px 1fr 132px;
  justify-items: center;
  align-items: center;
  overflow: hidden;
  pointer-events: none;
  opacity: 0;
  visibility: hidden;
  background: transparent;
  transition: opacity 0.18s ease, visibility 0.18s ease;
}

.hatch-scene.show {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
  overflow: visible;
}

.hatch-scene::before {
  content: '';
  position: absolute;
  inset: -72%;
  background:
    repeating-conic-gradient(
      from 0deg,
      #fff1f6 0deg 9deg,
      #ffc4d6 9deg 18deg,
      #ff9fbd 18deg 27deg,
      #ffdce8 27deg 36deg
    );
  transform-origin: center;
  animation: hatchRaySpin 5.2s linear infinite;
}

.hatch-scene::after {
  content: '';
  position: absolute;
  inset: -72%;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.84) 0 12%, rgba(255,255,255,0.26) 27%, rgba(255,255,255,0) 58%),
    radial-gradient(circle at center, rgba(255,152,185,0) 0 44%, rgba(181,75,111,0.16) 100%);
}

.hatch-copy,
.hatch-subcopy {
  position: relative;
  z-index: 4;
  min-width: 560px;
  padding: 18px 34px;
  border: 5px solid #8b6042;
  border-radius: 16px;
  background: rgba(255, 248, 232, 0.94);
  box-shadow: 0 6px 0 #6f462c;
  color: #5a3d28;
  font-family: var(--pixel-font);
  text-align: center;
}

.hatch-copy {
  align-self: end;
  font-size: 38px;
}

.hatch-subcopy {
  align-self: start;
  font-size: 24px;
}

.hatch-sprite {
  position: relative;
  z-index: 3;
  width: 370px;
  height: 470px;
  background: var(--care-egg-cracked) center / contain no-repeat;
  image-rendering: pixelated;
  filter: drop-shadow(0 22px 0 rgba(95, 61, 38, 0.18));
  transform-origin: center bottom;
}

.hatch-scene.phase-notice .hatch-sprite {
  width: 340px;
  height: 430px;
  animation: hatchSlowPulse 1.15s ease-in-out infinite;
}

.hatch-scene.phase-ready .hatch-sprite {
  width: 370px;
  height: 470px;
  animation: hatchEggShake 0.42s ease-in-out infinite;
}

.hatch-scene.phase-peek .hatch-sprite {
  width: 430px;
  height: 450px;
  background-image: var(--care-egg-peek);
  animation: hatchPopOpen 0.78s cubic-bezier(.2,1.5,.3,1) both;
}

.hatch-scene.phase-born .hatch-sprite {
  width: 430px;
  height: 430px;
  background-image: var(--care-shell-baby-arms-up);
  animation: hatchBabyBounce 0.9s cubic-bezier(.2,1.5,.3,1) both;
}

@keyframes hatchRaySpin {
  0% { transform: rotate(0deg) scale(1.08); }
  100% { transform: rotate(360deg) scale(1.08); }
}

@keyframes hatchSlowPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

@keyframes hatchEggShake {
  0%, 100% { transform: translateX(0) rotate(0deg) scale(1.03); }
  20% { transform: translateX(-14px) rotate(-5deg) scale(1.04); }
  45% { transform: translateX(11px) rotate(5deg) scale(1.05); }
  70% { transform: translateX(-7px) rotate(-3deg) scale(1.04); }
}

@keyframes hatchPopOpen {
  0% { transform: translateY(24px) scale(0.86); filter: brightness(1.1) drop-shadow(0 22px 0 rgba(95,61,38,0.18)); }
  32% { transform: translateY(-28px) scale(1.16); filter: brightness(1.28) drop-shadow(0 28px 0 rgba(95,61,38,0.16)); }
  100% { transform: translateY(0) scale(1); filter: brightness(1.05) drop-shadow(0 22px 0 rgba(95,61,38,0.18)); }
}

@keyframes hatchBabyBounce {
  0% { transform: translateY(58px) scale(0.78); opacity: 0; }
  45% { transform: translateY(-34px) scale(1.12); opacity: 1; }
  72% { transform: translateY(10px) scale(0.96); }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}

.fx-piece {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: 20px;
  height: 20px;
  opacity: 0;
  animation: fxRise 1s ease-out forwards;
}

.fx-piece.heart {
  width: 42px;
  height: 42px;
  background: var(--care-fx-heart) center / contain no-repeat;
}

.fx-piece.sparkle {
  width: 32px;
  height: 32px;
  background: var(--care-fx-sparkle) center / contain no-repeat;
}

.food-fx {
  position: absolute;
  left: var(--mouth-x);
  top: var(--mouth-y);
  z-index: 10;
  width: 60px;
  height: 60px;
  pointer-events: none;
  background-position: center;
  background-size: contain;
  background-repeat: no-repeat;
  image-rendering: pixelated;
  transform: translate(-50%, -50%);
  animation: foodOfferArc 0.94s cubic-bezier(.24,.86,.36,1) forwards;
}

.food-fx.cookie {
  background-image: var(--care-icon-cookie);
}

.food-fx.gohan {
  width: 70px;
  height: 70px;
  background-image: var(--care-icon-gohan);
}

.food-fx.milk {
  width: 46px;
  height: 76px;
  background-image: var(--care-icon-milk);
  animation-name: milkOfferNear;
}

.food-fx.milk::before {
  display: none;
}

@keyframes foodOfferArc {
  0% {
    opacity: 0;
    transform: translate(calc(-50% - 132px), calc(-50% + 20px)) scale(0.86) rotate(-10deg);
  }
  16% {
    opacity: 1;
    transform: translate(calc(-50% - 108px), calc(-50% + 4px)) scale(0.96) rotate(-6deg);
  }
  54% {
    opacity: 1;
    transform: translate(calc(-50% - 50px), calc(-50% - 74px)) scale(1.08) rotate(8deg);
  }
  82% {
    opacity: 1;
    transform: translate(calc(-50% - 8px), calc(-50% - 12px)) scale(0.95) rotate(2deg);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.72) rotate(0deg);
  }
}

@keyframes milkOfferNear {
  0% {
    opacity: 0;
    transform: translate(calc(-50% - 138px), calc(-50% + 28px)) scale(0.86) rotate(-7deg);
  }
  18% {
    opacity: 1;
    transform: translate(calc(-50% - 112px), calc(-50% + 10px)) scale(0.96) rotate(-4deg);

  58% {
    opacity: 1;
    transform: translate(calc(-50% - 62px), calc(-50% - 64px)) scale(1.04) rotate(5deg);
  }
  86% {
    opacity: 1;
    transform: translate(calc(-50% - 36px), calc(-50% + 8px)) scale(0.98) rotate(0deg);
  }
  100% {
    opacity: 0;
    transform: translate(calc(-50% - 30px), calc(-50% + 8px)) scale(0.9) rotate(0deg);
  }
}

  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
