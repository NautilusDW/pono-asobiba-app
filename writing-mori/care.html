function fitStage() {
  const scale = Math.min(window.innerWidth / 1600, window.innerHeight / 900);
  const ox = (window.innerWidth - 1600 * scale) / 2;
  const oy = (window.innerHeight - 900 * scale) / 2;
  stageEl.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
}

window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));
document.addEventListener('visibilitychange', () => {
  if (document.hidden) return;
  fitStage();
  syncCareStateFromStorage(true);
});
window.addEventListener('storage', (event) => {
  if (event.key === CARE_STATE_KEY) syncCareStateFromStorage(false);
});
fitStage();

let audioCtx = null;

function getAudioContext() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return null;
  if (!audioCtx) audioCtx = new AudioContextClass();
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  return audioCtx;
}

function playTone(frequency, duration = 0.06, type = 'square', volume = 0.035, delay = 0) {
  const ctx = getAudioContext();
  if (!ctx) return;
  const start = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(volume, start + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.02);
}

function playSfx(kind) {
  try {
    if (kind === 'warm') {
      playTone(430, 0.055, 'triangle', 0.03);
      playTone(540, 0.055, 'triangle', 0.024, 0.05);
      return;
    }
    if (kind === 'pet') {
      playTone(590, 0.04, 'sine', 0.026);
      playTone(740, 0.05, 'sine', 0.022, 0.045);
      return;
    }
    if (kind === 'feed') {
      playTone(520, 0.045, 'square', 0.03);
      playTone(780, 0.065, 'square', 0.028, 0.055);
      return;
    }
    if (kind === 'play') {
      [620, 760, 620].forEach((freq, i) => playTone(freq, 0.05, 'square', 0.026, i * 0.05));
      return;
    }
    if (kind === 'hatch') {
      [580, 760, 960, 1180].forEach((freq, i) => playTone(freq, 0.09, 'square', 0.032, i * 0.075));
      return;
    }
    if (kind === 'mistake') {
      playTone(210, 0.07, 'triangle', 0.024);
      return;
    }
    if (kind === 'select') {
      playTone(560, 0.045, 'square', 0.026);
      playTone(720, 0.05, 'square', 0.022, 0.04);
      return;
    }
    playTone(500, 0.045, 'square', 0.026);
  } catch (_) {}
}

function cloneDefaultState() {
  return JSON.parse(JSON.stringify(defaultState));
}

function getLocalDateKey(value = Date.now()) {
  const date = value instanceof Date ? value : new Date(value);
  const year = String(date.getFullYear());
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function makeFeedingDay(now = Date.now(), lastSeenAt = now) {
  return {
    localDateKey: getLocalDateKey(now),
    claimed: {},
    lastSeenAt: Number.isFinite(lastSeenAt) ? lastSeenAt : now
  };
}

function sanitizeMealClaims(value, now = Date.now()) {
  const claimed = {};
  if (!value || typeof value !== 'object') return claimed;
  MEAL_SLOT_ORDER.forEach((slotId) => {
    const claim = value[slotId];
    const activeLock = claim
      && typeof claim === 'object'
      && typeof claim.token === 'string'
      && Number.isFinite(claim.at)
      && now - claim.at < 15000;
    if (claim === true || activeLock) {
      claimed[slotId] = claim;
    }
  });
  return claimed;
}

function ensureFeedingDayState(target, now = Date.now()) {
  if (!target || typeof target !== 'object') return false;
  const todayKey = getLocalDateKey(now);
  const current = target.feedingDay;
  const fallbackSeenAt = Number.isFinite(target.lastCareAt) ? target.lastCareAt : now;
  if (!current || typeof current !== 'object' || current.localDateKey !== todayKey) {
    const lastSeenAt = Number.isFinite(current?.lastSeenAt) ? current.lastSeenAt : fallbackSeenAt;
    target.feedingDay = makeFeedingDay(now, lastSeenAt);
    return true;
  }
  target.feedingDay = {
    localDateKey: todayKey,
    claimed: sanitizeMealClaims(current.claimed, now),
    lastSeenAt: Number.isFinite(current.lastSeenAt) ? current.lastSeenAt : fallbackSeenAt
  };
  return false;
}

function sanitizeMilmaruName(value) {
  const text = String(value || '').trim().replace(/\s+/g, '');
  return text ? text.slice(0, 8) : 'ミルマル';
}

function getMilmaruName() {
  return sanitizeMilmaruName(state.name || 'ミルマル');
}

function loadState() {
  try {
    const saved = localStorage.getItem(CARE_STATE_KEY);
    if (!saved) {
      const fresh = cloneDefaultState();
      ensureFeedingDayState(fresh);
      return fresh;
    }
    const parsed = JSON.parse(saved);
    const merged = cloneDefaultState();
    merged.name = sanitizeMilmaruName(parsed.name || merged.name);
    merged.named = parsed.named === true || (parsed.hatched === true && parsed.named !== false && !Object.prototype.hasOwnProperty.call(parsed, 'named'));
    merged.nakayoshi = Number.isFinite(parsed.nakayoshi) ? parsed.nakayoshi : merged.nakayoshi;
    merged.gokigen = Number.isFinite(parsed.gokigen) ? parsed.gokigen : merged.gokigen;
    merged.sukusuku = Number.isFinite(parsed.sukusuku) ? parsed.sukusuku : merged.sukusuku;
    merged.eggWarmth = Number.isFinite(parsed.eggWarmth) ? clamp(parsed.eggWarmth, 0, 100) : merged.eggWarmth;
    merged.hatched = parsed.hatched === true;
    merged.stars = Number.isFinite(parsed.stars) ? parsed.stars : merged.stars;
    const previousFoodSystemVersion = Number(parsed.foodSystemVersion) || 0;
    merged.foodSystemVersion = FOOD_SYSTEM_VERSION;
    if (!merged.hatched && merged.eggWarmth === 0 && merged.stars >= 1000) {
      merged.stars = 0;
    }
    merged.speech = merged.hatched ? (parsed.speech || 'うまれたての あかちゃんだよ') : 'まだ タマゴだよ';
    merged.reaction = parsed.reaction || merged.reaction;
    merged.lastStageId = parsed.lastStageId || (merged.hatched ? getGrowthStage(Math.max(10, merged.sukusuku)).id : 'egg');
    merged.lastCareAt = Number.isFinite(parsed.lastCareAt) ? parsed.lastCareAt : Date.now();
    merged.lastPetAt = Number.isFinite(parsed.lastPetAt) ? parsed.lastPetAt : 0;
    merged.lastWarmAt = Number.isFinite(parsed.lastWarmAt) ? parsed.lastWarmAt : 0;
    merged.lastMoodAt = Number.isFinite(parsed.lastMoodAt) ? parsed.lastMoodAt : merged.lastCareAt;
    if (parsed.feedingDay && typeof parsed.feedingDay === 'object') {
      merged.feedingDay = {
        localDateKey: String(parsed.feedingDay.localDateKey || ''),
        claimed: sanitizeMealClaims(parsed.feedingDay.claimed),
        lastSeenAt: Number.isFinite(parsed.feedingDay.lastSeenAt) ? parsed.feedingDay.lastSeenAt : merged.lastCareAt
      };
    } else {
      merged.feedingDay = makeFeedingDay(Date.now(), merged.lastCareAt);
    }
    if (parsed.inventory) {
      Object.keys(merged.inventory).forEach((id) => {
        if (parsed.inventory[id]) {
          merged.inventory[id].count = Math.max(0, Number(parsed.inventory[id].count) || 0);
        }
      });
    }
    if (previousFoodSystemVersion < FOOD_SYSTEM_VERSION && merged.hatched && merged.sukusuku >= 38) {
      merged.inventory.moji_gohan.count = clamp(merged.inventory.moji_gohan.count + 3, 0, 99);
    }
    ensureFeedingDayState(merged);
    return merged;
  } catch (error) {
    console.warn('Could not load care state:', error);
    const fresh = cloneDefaultState();
    ensureFeedingDayState(fresh);
    return fresh;
  }
}

function saveState({ touchSeen = true } = {}) {
  try {
    state.foodSystemVersion = FOOD_SYSTEM_VERSION;
    ensureFeedingDayState(state);
    if (touchSeen) state.feedingDay.lastSeenAt = Date.now();
    localStorage.setItem(CARE_STATE_KEY, JSON.stringify(state));
  } catch (error) {
    console.warn('Could not save care state:', error);
  }
}

function syncCareStateFromStorage(touchSeen = false) {
  if (feedBusy) return;
  state = loadState();
  ensureFeedingDayState(state);
  if (touchSeen) saveState();
  render();
}

function configureDebugModeFromQuery() {
  const params = new URLSearchParams(window.location.search);
  const value = params.get('debug');
  if (value === '1') {
    localStorage.setItem(DEBUG_MODE_KEY, '1');
  } else if (value === '0') {
    localStorage.removeItem(DEBUG_MODE_KEY);
  }
  debugMode = value === '1' || (value !== '0' && localStorage.getItem(DEBUG_MODE_KEY) === '1');
  stageEl.classList.toggle('debug-mode', debugMode);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function lerp(start, end, amount) {
  return start + (end - start) * amount;
}

function getGrowthStage(sukusuku) {
  if (sukusuku < 10) return growthStages[0];
  if (sukusuku < 25) return growthStages[1];
  if (sukusuku < 50) return growthStages[2];
  if (sukusuku < 80) return growthStages[3];
  return growthStages[4];
}

function getCareStage() {
  if (!state.hatched) return growthStages[0];
  return getGrowthStage(Math.max(10, state.sukusuku));
}

function getInventoryCount(id) {
  const item = state.inventory[id];
  return item ? Math.max(0, Number(item.count) || 0) : 0;
}

function changeInventory(id, delta) {
  if (!state.inventory[id]) return 0;
  state.inventory[id].count = clamp(getInventoryCount(id) + delta, 0, 99);
  return state.inventory[id].count;
}

function getMealPeriod(now = Date.now()) {
  const hour = new Date(now).getHours();
  const slot = MEAL_SLOT_ORDER.find((slotId) => {
    const range = MEAL_SLOTS[slotId];
    return hour >= range.start && hour < range.end;
  });
  return slot ? { type: 'meal', slotId: slot } : { type: 'sleep', slotId: null };
}

function getFoodForMeal(slotId, targetState = state) {
  if (!targetState.hatched) return null;
  if (Number(targetState.sukusuku) < 38) return careFoods.moji_milk;
  return slotId === 'afternoon' ? careFoods.moji_cookie : careFoods.moji_gohan;
}

function getPreferredFood(now = Date.now()) {
  if (!state.hatched) return null;
  if (Number(state.sukusuku) < 38) return careFoods.moji_milk;
  const period = getMealPeriod(now);
  return getFoodForMeal(period.slotId || 'morning');
}

function isMealClaimed(slotId, targetState = state) {
  return Boolean(targetState.feedingDay?.claimed?.[slotId]);
}

function getMealSlotState(slotId, now = Date.now()) {
  ensureFeedingDayState(state, now);
  if (isMealClaimed(slotId)) return 'used';
  const period = getMealPeriod(now);
  if (period.type === 'sleep') return 'sleep';
  if (period.slotId === slotId) return 'current';
  const currentIndex = MEAL_SLOT_ORDER.indexOf(period.slotId);
  return MEAL_SLOT_ORDER.indexOf(slotId) < currentIndex ? 'past' : 'future';
}

function getMealStatusLabel(status) {
  if (status === 'current') return 'いま';
  if (status === 'used') return 'すみ';
  if (status === 'past') return 'おわり';
  if (status === 'sleep') return 'すやすや';
  return 'あとで';
}

function getMealFoodLabel(food, slotId) {
  if (!food) return '';
  if (food.id === 'moji_milk' && slotId === 'afternoon') return 'ごごの ミルク';
  if (food.id === 'moji_cookie' && slotId === 'afternoon') return 'おやつ';
  return food.name;
}

function markCareInteraction() {
  state.lastCareAt = Date.now();
}

function applyGokigenDecay(now = Date.now()) {
  const currentGokigen = Number(state.gokigen);
  state.gokigen = Number.isFinite(currentGokigen) ? clamp(currentGokigen, 0, 100) : 78;
  if (!state.hatched) {
    state.gokigen = clamp(state.gokigen, 72, 100);
    state.lastMoodAt = now;
    return false;
  }
  // アプリを ひらかなかった時間や、食事をのがしたことでは下げない。
  state.lastMoodAt = Number.isFinite(state.lastMoodAt) ? state.lastMoodAt : now;
  return false;
}

function boostGokigen(amount) {
  applyGokigenDecay();
  state.gokigen = clamp(state.gokigen + amount, 0, 100);
  state.lastMoodAt = Date.now();
}

function getWelcomeBackHours() {
  return Math.max(0, (entryOpenedAt - entryLastSeenAt) / 3600000);
}

function getGokigenStatus() {
  if (!state.hatched) return { id: 'sleepy', label: 'すやすや', reaction: 'normal' };
  applyGokigenDecay();
  if (getWelcomeBackHours() >= 24) return { id: 'welcome', label: 'おかえり', reaction: 'happy' };
  if (state.gokigen >= 88) return { id: 'sparkly', label: 'きらきら', reaction: 'happy' };
  if (state.gokigen >= 68) return { id: 'happy', label: 'にこにこ', reaction: 'happy' };
  if (state.gokigen >= 46) return { id: 'normal', label: 'まったり', reaction: 'normal' };
  if (state.gokigen >= 28) return { id: 'lonely', label: 'さみしい', reaction: 'worried' };
  return { id: 'sulky', label: 'むぅ...', reaction: 'angry' };
}

function getFriendshipTier() {
  const value = clamp(Number(state.nakayoshi) || 0, 0, 100);
  if (value >= 85) return { level: 4, label: 'だいすき' };
  if (value >= 65) return { level: 3, label: 'なかよし' };
  if (value >= 40) return { level: 2, label: 'なれてきた' };
  if (value >= 20) return { level: 1, label: 'すこしずつ' };
  return { level: 0, label: 'これから なかよし' };
}

function getFriendshipBonus() {
  if (!state.hatched) return null;
  const tier = getFriendshipTier();
  const mood = getGokigenStatus();
  if (mood.id === 'lonely' || mood.id === 'sulky') return null;
  if (tier.level >= 4) return { stars: 20, message: `${getMilmaruName()}の おうえん！スターを たくさん もらったよ。` };
  if (tier.level >= 3) return { stars: 10, message: `${getMilmaruName()}が おうえんしてくれたよ。スターが すこし ふえた！` };
  return null;
}

function getIdleMood(now = Date.now()) {
  if (!state.hatched) return null;
  const name = getMilmaruName();
  const welcomeHours = getWelcomeBackHours(now);
  if (welcomeHours >= 24) {
    return {
      reaction: 'happy',
      speech: 'おかえり！',
      message: welcomeHours >= 48
        ? `${name}が まってたよ。きょうも ゆっくり あそぼう。`
        : `${name}が うれしそうに おむかえしているよ。`
    };
  }
  const mood = getGokigenStatus();
  if (mood.id === 'sulky') {
    return {
      reaction: 'angry',
      speech: 'むぅ〜...',
      message: `${name}は ちょっと すねているみたい。もじを かいて、おせわしてあげよう。`
    };
  }
  if (mood.id === 'lonely') {
    return {
      reaction: 'worried',
      speech: 'くぅん...',
      message: `${name}は すこし さみしかったみたい。なでると すぐ げんきになるよ。`
    };
  }
  const hour = new Date(now).getHours();
  if (hour >= 21 || hour < 6) {
    return {
      reaction: 'sleep',
      speech: 'すぅ...すぅ...',
      message: `${name}は ねむっているよ。あした また おせわしよう。`
    };
  }
  return null;
}

function getDisplayReaction(reaction) {
  const currentReaction = reaction || state.reaction || 'normal';
  if (currentReaction !== 'normal') return currentReaction;
  const idleMood = getIdleMood();
  return idleMood ? idleMood.reaction : currentReaction;
}

function getBabySpeech(text) {
  const raw = String(text || '');
  if (/ない|たりない|まだ/.test(raw)) return 'ふぇ...？';
  if (/ねむ|すや|すぅ/.test(raw)) return 'すぅ...すぅ...';
  if (/怒|ぷん|まって|さみ|むぅ/.test(raw)) return 'むぅ〜...';
  if (/おいしい|ごくごく|ミルク|ごはん|クッキー|おやつ|ほしい|もらった/.test(raw)) return 'みゅみゅ！';
  if (/なで|うれしい|ありがとう|ぽかぽか/.test(raw)) return 'ふにゃ〜♪';
  if (/あそ|たのしい|ぴょん/.test(raw)) return 'きゃっきゃ！';
  if (/もじ|かこう|かき/.test(raw)) return 'あう〜？';
  return 'ふにゃ？';
}

function getYochiyochiSpeech(text) {
  const raw = String(text || '');
  if (/ない|たりない/.test(raw)) return 'なぁい...？';
  if (/ねむ|すや|すぅ/.test(raw)) return 'ねむねむ...';
  if (/怒|ぷん|まって|さみ|むぅ/.test(raw)) return 'むーむー！';
  if (/おいしい|ごくごく|ミルク|ごはん|クッキー|おやつ|ほしい|もらった/.test(raw)) return 'まんま、んま！';
  if (/なで|うれしい|ありがとう|しっぽ|ふりふり/.test(raw)) return 'なで...すき';
  if (/あそ|たのしい|ぴょん|おいかけ|たんけん/.test(raw)) return 'あしょぼ！';
  if (/はいはい/.test(raw)) return 'はいはい...いく！';
  if (/あんよ|歩|よちよち|せのび|たちあが/.test(raw)) return 'あんよ...できた！';
  if (/もじ|かこう|かき/.test(raw)) return 'もじ...かく？';
  return raw.length > 8 ? 'うにゃ？' : raw;
}

function getYochiyochiPhase() {
  if (!state.hatched || getCareStage().id !== 'yochiyochi') return null;
  if (state.sukusuku < 38) return 'crawl';
  if (state.sukusuku < 45) return 'first_steps';
  return 'almost_kids';
}

function getYochiyochiActionMessage(action) {
  const phase = getYochiyochiPhase();
  if (!phase) return '';
  const name = getMilmaruName();
  const messages = {
    feed: {
      crawl: `${name}が もぐもぐして、はいはいで ちょっと近づいてきたよ。`,
      first_steps: `${name}が もぐもぐして、あんよを ふみふみしたよ。`,
      almost_kids: `${name}が 背のびして、少し たくましく見えるよ。`
    },
    pet: {
      crawl: `${name}が しっぽを ふりふりしているよ。`,
      first_steps: `${name}が うれしくて、ちいさく たちあがったよ。`,
      almost_kids: `${name}が えへへって じまんげだよ。`
    },
    play: {
      crawl: `${name}と はいはいで おいかけっこしたよ。`,
      first_steps: `${name}が よちよち歩きで ついてきたよ。`,
      almost_kids: `${name}が ころばずに ぴょんと はねたよ。`
    },
    writing: {
      crawl: `${name}が はいはいで そばにきて、おうえんしてるよ。`,
      first_steps: `${name}が よちよち歩きで みにきたよ。`,
      almost_kids: `${name}が 背のびして、もじを みているよ。`
    }
  };
  return messages[action]?.[phase] || '';
}

function getStageUpCopy(stage) {
  const name = getMilmaruName();
  if (stage.id === 'yochiyochi') {
    return {
      title: 'はいはい できるようになったよ',
      message: `${name}が はいはいで すすむように なったよ。おにわを たんけんできるね。`
    };
  }
  if (stage.id === 'kids') {
    return {
      title: 'しっかり たてるようになったよ',
      message: `${name}が しっかり たてるように なったよ。これから もっと いっしょに あそべそう。`
    };
  }
  if (stage.id === 'pre_evolution') {
    return {
      title: 'からだが きらきらしているよ',
      message: `${name}の からだが ほんのり ひかっているよ。`
    };
  }
  return null;
}

function showCareNotice(title, message, duration = 2450) {
  if (!stageNotice) return;
  stageNoticeTitle.textContent = title || 'おしらせ';
  stageNoticeText.textContent = message || '';
  stageNotice.classList.remove('show');
  stageNotice.setAttribute('aria-hidden', 'false');
  void stageNotice.offsetWidth;
  stageNotice.classList.add('show');
  clearTimeout(showCareNotice._timer);
  showCareNotice._timer = setTimeout(() => {
    stageNotice.classList.remove('show');
    stageNotice.setAttribute('aria-hidden', 'true');
  }, duration);
}

function showStageNotice(copy) {
  if (!copy) return;
  showCareNotice(copy.title || 'すこし せいちょう！', copy.message || '', 2450);
}

function syncGrowthStageChange() {
  if (!state.hatched) {
    state.lastStageId = 'egg';
    return false;
  }
  const stage = getCareStage();
  const previousStageId = state.lastStageId || stage.id;
  if (previousStageId === stage.id) return false;
  state.lastStageId = stage.id;
  const copy = getStageUpCopy(stage);
  if (!copy) return false;
  playSfx('hatch');
  bottomMessage.textContent = copy.message;
  showStageNotice(copy);
  setReaction('happy', 2600);
  spawnFx('sparkle');
  return true;
}

function getStageSpeech(text) {
  if (!state.hatched) return text;
  const stage = getCareStage();
  if (stage.id === 'baby') return getBabySpeech(text);
  if (stage.id === 'yochiyochi') return getYochiyochiSpeech(text);
  return text;
}

function getDisplaySpeech(text) {
  const idleMood = (state.reaction || 'normal') === 'normal' ? getIdleMood() : null;
  return getStageSpeech(idleMood ? idleMood.speech : text);
}

function getMilmaruVisualStage() {
  if (!state.hatched) return 'egg';
  return getCareStage().id === 'baby' ? 'baby' : 'yochiyochi';
}

function getYochiyochiMotionClass() {
  return state.sukusuku < 38 ? 'roaming-crawl' : 'roaming-walk';
}

function getRoamMaturity() {
  return clamp((Math.max(25, state.sukusuku) - 25) / 25, 0, 1);
}

function getRoamProfile(distance = 0) {
  const maturity = getRoamMaturity();
  const isCrawling = state.sukusuku < 38;
  const jitter = 0.82 + Math.random() * 0.62;
  const duration = clamp(
    (lerp(6.8, 3.5, maturity) + distance * lerp(0.32, 0.15, maturity)) * jitter,
    lerp(8.4, 4.4, maturity),
    lerp(13.8, 7.2, maturity)
  );
  return {
    minX: lerp(43, 36, maturity),
    maxX: lerp(57, 64, maturity),
    minY: 60,
    maxY: lerp(100, 136, maturity),
    duration,
    frameDuration: (isCrawling ? lerp(2.35, 1.45, maturity) : lerp(1.72, 1.08, maturity)) * (0.92 + Math.random() * 0.18),
    pause: lerp(2600, 1000, maturity) + Math.random() * lerp(2800, 1700, maturity)
  };
}

function shouldRoam() {
  return state.hatched
    && getMilmaruVisualStage() === 'yochiyochi'
    && getDisplayReaction(state.reaction) === 'normal'
    && !pettingMode
    && !hatchingNow;
}

function applyRoamStyles(resetCenter = false) {
  const x = resetCenter ? 50 : roamState.x;
  const y = resetCenter ? 42 : roamState.y;
  milmaruWrap.style.setProperty('--roam-x', `${x}%`);
  milmaruWrap.style.setProperty('--roam-y', `${y}px`);
  milmaruWrap.style.setProperty('--roam-dir', String(resetCenter ? 1 : roamState.dir));
  milmaruWrap.style.setProperty('--roam-duration', `${roamState.duration || 5.2}s`);
  milmaruWrap.style.setProperty('--roam-frame-duration', `${roamState.frameDuration || 1.9}s`);
  milmaruWrap.style.setProperty('--roam-easing', resetCenter ? 'ease-out' : 'cubic-bezier(.38, 0, .22, 1)');
  speechBubble.style.setProperty('--speech-x', `${x}%`);
}

function freezeRoamPosition() {
  if (!state.hatched || getMilmaruVisualStage() !== 'yochiyochi') return;
  const yardRect = document.querySelector('.center-yard').getBoundingClientRect();
  const wrapRect = milmaruWrap.getBoundingClientRect();
  if (!yardRect.width || !yardRect.height || !wrapRect.width) return;
  const currentX = clamp(((wrapRect.left + wrapRect.width / 2 - yardRect.left) / yardRect.width) * 100, 32, 68);
  const currentY = clamp(yardRect.bottom - wrapRect.bottom, 42, 152);
  roamState.x = currentX;
  roamState.y = currentY;
  roamState.duration = 0.01;
  roamState.frameDuration = 1.8;
  roamState.moving = false;
  clearTimeout(roamState.timer);
  clearTimeout(roamState.motionTimer);
  roamState.timer = null;
  roamState.motionTimer = null;
  applyRoamStyles();
}

function scheduleRoam(delay = 1500) {
  clearTimeout(roamState.timer);
  roamState.timer = setTimeout(moveRoamTarget, delay);
}

function moveRoamTarget() {
  if (!shouldRoam()) {
    syncRoaming();
    return;
  }
  const range = getRoamProfile();
  const nextX = range.minX + Math.random() * (range.maxX - range.minX);
  const nextY = range.minY + Math.random() * (range.maxY - range.minY);
  const distance = Math.hypot(nextX - roamState.x, (nextY - roamState.y) / 4);
  const profile = getRoamProfile(distance);
  roamState.dir = nextX < roamState.x ? -1 : 1;
  roamState.x = nextX;
  roamState.y = nextY;
  roamState.duration = profile.duration;
  roamState.frameDuration = profile.frameDuration;
  roamState.moving = true;
  applyRoamStyles();
  applyMilmaruClass(state.reaction);
  clearTimeout(roamState.motionTimer);
  roamState.motionTimer = setTimeout(() => {
    roamState.moving = false;
    applyMilmaruClass(state.reaction);
  }, roamState.duration * 1000);
  scheduleRoam((roamState.duration * 1000) + profile.pause);
}

function syncRoaming() {
  const canRoam = shouldRoam();
  milmaruWrap.classList.toggle('roaming', canRoam);
  if (!canRoam) {
    if (getMilmaruVisualStage() === 'yochiyochi' && roamState.moving) {
      freezeRoamPosition();
    }
    clearTimeout(roamState.timer);
    clearTimeout(roamState.motionTimer);
    roamState.timer = null;
    roamState.motionTimer = null;
    roamState.moving = false;
    applyRoamStyles(getMilmaruVisualStage() !== 'yochiyochi');
    return;
  }
  applyRoamStyles();
  if (!roamState.timer) scheduleRoam(1600 + Math.random() * 1600);
}

function hasStars(cost = 1) {
  return (Number(state.stars) || 0) >= cost;
}

function showNeedWritingMessage(cost = 1) {
  playSfx('mistake');
  finishPettingMode();
  const shortage = Math.max(1, cost - (Number(state.stars) || 0));
  const message = `あと ${shortage}スター たりないよ。もじを かいて スターを あつめよう。`;
  setSpeech('スターが たりないよ', message);
  showCareNotice('もじを かこう！', message, 2600);
  setReaction(state.hatched ? 'worried' : 'relaxed', 1200);
  spawnFx('sparkle');
  saveState();
  render();
}

function spendStars(cost) {
  if (!hasStars(cost)) {
    showNeedWritingMessage(cost);
    return false;
  }
  state.stars = clamp((Number(state.stars) || 0) - cost, 0, 99999);
  return true;
}

function getNextGrowthProgress(sukusuku) {
  const stage = getGrowthStage(sukusuku);
  const max = stage.next;
  return {
    current: clamp(sukusuku, 0, max),
    max,
    percent: clamp((sukusuku / max) * 100, 0, 100)
  };
}

function getHiddenGrowthHint() {
  if (!state.hatched) {
    if (state.eggWarmth >= 95) return 'タマゴが そわそわしているよ。もうすぐ うまれそう。';
    if (state.eggWarmth >= 70) return 'タマゴの なかで、ちいさく コトコト うごいているよ。';
    return '';
  }
  const yochiyochiPhase = getYochiyochiPhase();
  if (yochiyochiPhase === 'almost_kids') {
    return `${getMilmaruName()}が 背のびして、いつもより たくましく見えるよ。`;
  }
  const progress = getNextGrowthProgress(Math.max(10, state.sukusuku));
  const remaining = progress.max - Math.max(10, state.sukusuku);
  if (remaining <= 0) return `${getMilmaruName()}が なんだか そわそわしているよ。`;
  if (remaining <= 6) return `${getMilmaruName()}が すこし 背のびしてるみたい。`;
  return '';
}

function getMemoLines(stage, mood, friendship) {
  if (!state.hatched) return ['タマゴの なかで すやすや。', 'ぽかぽかが だいすき！'];
  if (mood.id === 'welcome') return ['おかえり！ きょうも いっしょ。', 'ゆっくり あそぼうね。'];
  if (mood.id === 'sulky') return ['ちょっと すねているみたい。', 'もじをかいて おせわすると、すぐ げんきになるよ。'];
  if (mood.id === 'lonely') return ['すこし さみしかったみたい。', 'なでると ほっとするよ。'];
  if (friendship.level >= 4) return ['あなたの こえが だいすき！', 'もじをかくと、そばで おうえんするよ。'];
  if (friendship.level >= 3) return ['いっしょにいると にこにこ。', 'もじれんしゅうを みるのが すき。'];
  if (stage.id === 'baby') return ['ミルクのにおいが だいすき！', 'やさしくされると すぐ にこにこ。'];
  if (stage.id === 'yochiyochi') {
    const phase = getYochiyochiPhase();
    if (phase === 'crawl') return ['はいはいで にわを たんけん中。', '呼ぶと、こっちを ちらっと見るよ。'];
    if (phase === 'first_steps') return ['よちよち歩きが たのしいみたい。', 'ころばないように そっと見守ろう。'];
    return ['背のびが じょうずに なってきた。', '新しいことが できそうな 予感。'];
  }
  return ['やさしくて、がんばりやさん。', 'いろんなものに きょうみしんしん。'];
}

function getEggVisualClass() {
  if (state.eggWarmth >= 35) return 'egg-cracked';
  return 'egg-idle';
}

function renderMealSchedule(now = Date.now()) {
  mealSchedule.hidden = !state.hatched;
  if (!state.hatched) return;
  ensureFeedingDayState(state, now);
  mealSchedule.querySelectorAll('.meal-slot').forEach((slotEl) => {
    const status = getMealSlotState(slotEl.dataset.slot, now);
    slotEl.dataset.state = status;
    slotEl.querySelector('.meal-slot-status').textContent = getMealStatusLabel(status);
  });
}

function renderActionMode(now = Date.now()) {
  const stars = Number(state.stars) || 0;
  const period = getMealPeriod(now);
  const currentFood = period.slotId ? getFoodForMeal(period.slotId) : getPreferredFood(now);
  const currentFoodCount = currentFood ? getInventoryCount(currentFood.id) : 0;
  const mealUsed = period.slotId ? isMealClaimed(period.slotId) : false;
  careActions.classList.toggle('egg-mode', !state.hatched);
  writeBtn.classList.toggle('warm-main', !state.hatched && stars >= actionStarCost.warm);
  writeBtn.classList.toggle('needs-power', !state.hatched && stars < actionStarCost.warm);
  if (state.hatched) {
    mainActionIcon.textContent = '';
    mainActionText.textContent = 'もじを かく！';
    mainActionHelp.textContent = 'もじを かいて スターと たべものを もらおう！';
  } else {
    mainActionIcon.textContent = stars >= actionStarCost.warm ? '' : '✏';
    mainActionText.textContent = stars >= actionStarCost.warm ? 'あたためる！' : 'もじを かく！';
    mainActionHelp.textContent = stars >= actionStarCost.warm ? `スター${actionStarCost.warm}で あたためる` : 'かくと スターが もらえるよ';
  }
  feedBtn.classList.toggle('milk', state.hatched && period.type === 'meal' && currentFood?.id === 'moji_milk');
  feedBtn.classList.toggle('gohan', state.hatched && period.type === 'meal' && currentFood?.id === 'moji_gohan');
  feedBtn.classList.toggle('cookie', state.hatched && period.type === 'meal' && currentFood?.id === 'moji_cookie');
  feedBtn.classList.toggle('meal-closed', state.hatched && (period.type === 'sleep' || mealUsed));
  feedBtn.classList.toggle('has-cookie', state.hatched && period.type === 'meal' && !mealUsed && currentFoodCount > 0);
  feedBtn.dataset.mealState = period.type === 'sleep' ? 'sleep' : (mealUsed ? 'used' : 'current');
  feedBtn.setAttribute('aria-disabled', state.hatched && (period.type === 'sleep' || mealUsed) ? 'true' : 'false');
  feedBtn.querySelector('.action-icon').textContent = period.type === 'sleep' ? '☾' : (mealUsed ? '✓' : '');
  if (!state.hatched) {
    feedActionText.textContent = 'あげる';
    feedActionHelp.textContent = 'うまれてから あげよう';
  } else if (period.type === 'sleep') {
    feedActionText.textContent = 'すやすや';
    feedActionHelp.textContent = 'あさ 6じから';
  } else if (mealUsed) {
    feedActionText.textContent = 'ごちそうさま';
    feedActionHelp.textContent = `${MEAL_SLOTS[period.slotId].label}は たべたよ`;
  } else {
    const foodLabel = getMealFoodLabel(currentFood, period.slotId);
    feedActionText.textContent = `${foodLabel}を あげる`;
    feedActionHelp.textContent = `${MEAL_SLOTS[period.slotId].label}の じかん`;
  }
  const playButton = document.getElementById('playBtn');
  playButton.classList.toggle('power-empty', state.hatched && !hasStars(actionStarCost.play));
  playButton.querySelector('.action-help').textContent = state.hatched && hasStars(actionStarCost.play)
    ? `スター${actionStarCost.play}で あそぶ`
    : 'あそびばへ いく';
  renderMealSchedule(now);
}

function applyMilmaruClass(reaction) {
  const currentReaction = getDisplayReaction(reaction);
  const classes = ['milmaru'];
  if (state.hatched) {
    classes.push(getMilmaruVisualStage(), currentReaction);
    if (getMilmaruVisualStage() === 'yochiyochi' && currentReaction === 'normal' && roamState.moving) {
      classes.push(getYochiyochiMotionClass());
    }
  } else {
    classes.push('egg', getEggVisualClass(), currentReaction);
  }
  milmaru.className = classes.join(' ');
}

function setSpeech(text, message) {
  state.speech = text;
  speechBubble.textContent = getDisplaySpeech(text);
  if (message) bottomMessage.textContent = message;
}

function setReaction(reaction, duration = 950) {
  state.reaction = reaction;
  if (reaction !== 'normal') freezeRoamPosition();
  applyMilmaruClass(reaction);
  syncRoaming();
  clearTimeout(setReaction._timer);
  setReaction._timer = setTimeout(() => {
    state.reaction = 'normal';
    applyMilmaruClass('normal');
    speechBubble.textContent = getDisplaySpeech(state.speech);
    syncRoaming();
    saveState();
  }, duration);
}

function spawnFx(type) {
  const count = type === 'sparkle' ? 18 : 14;
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = `fx-piece ${i % 3 === 0 ? 'sparkle' : 'heart'}`;
    piece.style.setProperty('--x', (45 + Math.random() * 18) + '%');
    piece.style.setProperty('--y', (46 + Math.random() * 20) + '%');
    piece.style.setProperty('--dx', ((Math.random() - 0.5) * 180) + 'px');
    piece.style.setProperty('--dy', ((Math.random() - 0.5) * 40) + 'px');
    piece.style.animationDelay = (Math.random() * 0.15) + 's';
    fxLayer.appendChild(piece);
    setTimeout(() => piece.remove(), 1200);
  }
}

function getFoodOfferPoint(foodId) {
  const yardRect = document.querySelector('.center-yard').getBoundingClientRect();
  const wrapRect = milmaruWrap.getBoundingClientRect();
  if (!yardRect.width || !yardRect.height || !wrapRect.width) {
    return { x: 50, y: state.hatched ? 55 : 50 };
  }
  const visualStage = getMilmaruVisualStage();
  const mouthOffsetY = visualStage === 'baby' ? 0.48 : 0.38;
  const mouthOffsetX = visualStage === 'yochiyochi' ? 0.52 : 0.5;
  const point = {
    x: clamp(((wrapRect.left + wrapRect.width * mouthOffsetX - yardRect.left) / yardRect.width) * 100, 20, 80),
    y: clamp(((wrapRect.top + wrapRect.height * mouthOffsetY - yardRect.top) / yardRect.height) * 100, 18, 82)
  };
  if (foodId === 'moji_milk') {
    return {
      x: clamp(point.x - 6, 20, 80),
      y: clamp(point.y + 10, 18, 82)
    };
  }
  return point;
}

function spawnFoodFx(foodId) {
  const piece = document.createElement('div');
  const foodClass = foodId === 'moji_cookie' ? 'cookie' : (foodId === 'moji_gohan' ? 'gohan' : 'milk');
  piece.className = `food-fx ${foodClass}`;
  const target = getFoodOfferPoint(foodId);
  piece.style.setProperty('--mouth-x', `${target.x}%`);
  piece.style.setProperty('--mouth-y', `${target.y}%`);
  fxLayer.appendChild(piece);
  setTimeout(() => piece.remove(), 1050);
}

function queueHatchStep(delay, fn) {
  const timer = setTimeout(fn, delay);
  hatchTimers.push(timer);
}

function clearHatchSceneTimers() {
  hatchTimers.forEach((timer) => clearTimeout(timer));
  hatchTimers = [];
}

function setHatchScenePhase(phase, copy, subcopy) {
  stageWrap.classList.add('hatch-active');
  stageEl.classList.add('hatch-active');
  hatchScene.className = `hatch-scene show phase-${phase}`;
  hatchScene.setAttribute('aria-hidden', 'false');
  hatchCopy.textContent = copy;
  hatchSubcopy.textContent = subcopy;
}

function hideHatchScene() {
  stageWrap.classList.remove('hatch-active');
  stageEl.classList.remove('hatch-active');
  hatchScene.className = 'hatch-scene';
  hatchScene.setAttribute('aria-hidden', 'true');
}

function renderNameModal() {
  if (!nameModal) return;
  const shouldShow = state.hatched && !state.named && !hatchingNow;
  const wasShown = nameModal.classList.contains('show');
  nameModal.classList.toggle('show', shouldShow);
  nameModal.setAttribute('aria-hidden', shouldShow ? 'false' : 'true');
  if (shouldShow && !wasShown) {
    nameInput.value = getMilmaruName();
    setTimeout(() => {
      nameInput.focus();
      nameInput.select();
    }, 80);
  }
}

function saveMilmaruName() {
  const nextName = sanitizeMilmaruName(nameInput.value);
  state.name = nextName;
  state.named = true;
  boostGokigen(10);
  state.speech = 'ふにゃ〜♪';
  bottomMessage.textContent = `${nextName}、よろしくね。もじミルクを あげてみよう。`;
  playSfx('select');
  saveState();
  render();
}

function startHatchScene() {
  clearHatchSceneTimers();
  setHatchScenePhase('notice', 'おや...？', 'タマゴの ようすが...');
  playSfx('warm');

  queueHatchStep(900, () => {
    setHatchScenePhase('ready', 'タマゴが かえりそうだぞ！', 'からが ぐらぐら ゆれているよ');
    playSfx('warm');
  });

  queueHatchStep(1900, () => {
    setHatchScenePhase('peek', 'パカッ！', 'ミルマルが でてきたよ！');
    playSfx('hatch');
    spawnFx('sparkle');
  });

  queueHatchStep(2800, () => {
    state.hatched = true;
    state.named = false;
    state.name = sanitizeMilmaruName(state.name);
    state.nakayoshi = 0;
    state.gokigen = 86;
    state.lastMoodAt = Date.now();
    state.sukusuku = Math.max(10, state.sukusuku);
    state.lastStageId = 'baby';
    state.reaction = 'birth';
    markCareInteraction();
    setSpeech('うまれたよ！', 'なまえを つけてあげよう。');
    setHatchScenePhase('born', 'ミルマルが うまれたよ！', 'なまえを つけてあげよう');
    spawnFx('sparkle');
    saveState();
    render();
  });

  queueHatchStep(4300, () => {
    hideHatchScene();
    hatchingNow = false;
    setReaction('birth', 1300);
    render();
  });

  queueHatchStep(5900, () => {
    if (state.reaction === 'normal' && state.named) {
      setSpeech('いっしょに もじを かこう！', 'もじを かくと、もじミルクと スターが もらえるよ。');
      saveState();
      render();
    }
  });
}

function maybeHatchEgg() {
  if (state.hatched || state.eggWarmth < 100) return false;
  if (hatchingNow) return true;
  playSfx('warm');
  hatchingNow = true;
  state.reaction = 'warm';
  setSpeech('おや...？', 'タマゴの ようすが...');
  spawnFx('sparkle');
  saveState();
  render();
  clearHatchSceneTimers();
  queueHatchStep(850, startHatchScene);
  return true;
}

function warmEgg() {
  const now = Date.now();
  if (now - state.lastWarmAt < 650) return;
  if (!spendStars(actionStarCost.warm)) return;
  playSfx('warm');
  state.lastWarmAt = now;
  markCareInteraction();
  state.eggWarmth = clamp(state.eggWarmth + 25, 0, 100);
  state.nakayoshi = 0;
  if (state.eggWarmth >= 100) {
    maybeHatchEgg();
    return;
  }
  if (state.eggWarmth >= 70) {
    setSpeech('もうすぐ うまれそう！', 'タマゴの なかで ミルマルが うれしそうに うごいたよ。');
  } else if (state.eggWarmth >= 35) {
    setSpeech('ぽかぽか してきたよ', 'タマゴに ちいさな ひびが はいったみたい。');
  } else {
    setSpeech('あったかいね', 'やさしく あたためてあげよう。');
  }
  setReaction('warm', 900);
  spawnFx('sparkle');
  saveState();
  render();
}

function render() {
  state.nakayoshi = clamp(state.nakayoshi, 0, 100);
  if (!state.hatched) state.nakayoshi = 0;
  applyGokigenDecay();
  state.gokigen = clamp(state.gokigen, 0, 100);
  state.sukusuku = clamp(state.sukusuku, 0, 100);
  state.eggWarmth = clamp(state.eggWarmth || 0, 0, 100);
  state.name = sanitizeMilmaruName(state.name);
  const displayName = getMilmaruName();
  const stage = getCareStage();
  const mood = getGokigenStatus();
  const friendship = getFriendshipTier();
  const memoLines = getMemoLines(stage, mood, friendship);

  document.title = `もじっこファーム | ${displayName}`;
  document.getElementById('titleName').textContent = displayName;
  document.getElementById('sideNameHeading').textContent = displayName;
  document.getElementById('milmaruNameDisplay').textContent = displayName;
  document.getElementById('milmaruLevel').textContent = String(state.hatched ? Math.max(1, Math.floor(state.sukusuku / 20) + 1) : 1);
  document.getElementById('growthStageName').textContent = stage.name;
  document.getElementById('moodChip').dataset.mood = mood.id;
  document.getElementById('moodLabel').textContent = mood.label;
  document.getElementById('memoLine1').textContent = memoLines[0];
  document.getElementById('memoLine2').textContent = memoLines[1];
  document.getElementById('starCount').textContent = String(state.stars);
  document.getElementById('nakayoshiText').textContent = `${state.nakayoshi} / 100`;
  document.getElementById('nakayoshiFill').style.width = `${state.nakayoshi}%`;
  document.getElementById('milkCount').textContent = String(getInventoryCount('moji_milk'));
  document.getElementById('gohanCount').textContent = String(getInventoryCount('moji_gohan'));
  document.getElementById('cookieCount').textContent = String(getInventoryCount('moji_cookie'));
  speechBubble.textContent = getDisplaySpeech(state.speech);
  const idleMood = (state.reaction || 'normal') === 'normal' ? getIdleMood() : null;
  if (idleMood) {
    bottomMessage.textContent = idleMood.message;
  } else {
    const hiddenGrowthHint = getHiddenGrowthHint();
    if (hiddenGrowthHint) bottomMessage.textContent = hiddenGrowthHint;
  }
  renderActionMode();
  applyMilmaruClass(state.reaction);
  syncRoaming();
  renderNameModal();
  renderDebugPanel();
}

function renderDebugPanel() {
  if (!debugMode || !debugPanel) return;
  document.getElementById('debugNakayoshi').value = String(state.nakayoshi);
  document.getElementById('debugGokigen').value = String(state.gokigen);
  document.getElementById('debugSukusuku').value = String(state.sukusuku);
  document.getElementById('debugEggWarmth').value = String(state.eggWarmth);
  document.getElementById('debugMilkCount').value = String(getInventoryCount('moji_milk'));
  document.getElementById('debugGohanCount').value = String(getInventoryCount('moji_gohan'));
  document.getElementById('debugCookieCount').value = String(getInventoryCount('moji_cookie'));
  document.getElementById('debugStars').value = String(state.stars);
  document.getElementById('debugHatched').checked = state.hatched;
}

function readDebugNumber(id, min, max) {
  const input = document.getElementById(id);
  const value = Number(input.value);
  if (!Number.isFinite(value)) return min;
  return clamp(Math.round(value), min, max);
}

function stopHatchingCutscene() {
  hatchingNow = false;
  clearHatchSceneTimers();
  hideHatchScene();
}

function applyDebugState(next = {}) {
  stopHatchingCutscene();
  if (Object.prototype.hasOwnProperty.call(next, 'name')) {
    state.name = sanitizeMilmaruName(next.name);
  }
  state.nakayoshi = next.nakayoshi ?? readDebugNumber('debugNakayoshi', 0, 100);
  state.gokigen = next.gokigen ?? readDebugNumber('debugGokigen', 0, 100);
  state.sukusuku = next.sukusuku ?? readDebugNumber('debugSukusuku', 0, 100);
  state.eggWarmth = next.eggWarmth ?? readDebugNumber('debugEggWarmth', 0, 100);
  state.inventory.moji_milk.count = next.milk ?? readDebugNumber('debugMilkCount', 0, 99);
  state.inventory.moji_gohan.count = next.gohan ?? readDebugNumber('debugGohanCount', 0, 99);
  state.inventory.moji_cookie.count = next.cookies ?? readDebugNumber('debugCookieCount', 0, 99);
  state.stars = next.stars ?? readDebugNumber('debugStars', 0, 99999);
  state.hatched = next.hatched ?? document.getElementById('debugHatched').checked;
  state.lastStageId = next.lastStageId || (state.hatched ? getCareStage().id : 'egg');
  if (Object.prototype.hasOwnProperty.call(next, 'named')) {
    state.named = next.named;
  } else if (!state.hatched) {
    state.named = false;
  }
  state.reaction = 'normal';
  state.lastCareAt = Date.now();
  state.lastMoodAt = Date.now();
  state.lastWarmAt = 0;
  state.lastPetAt = 0;
  state.foodSystemVersion = FOOD_SYSTEM_VERSION;
  state.feedingDay = makeFeedingDay();
  state.speech = next.speech || (state.hatched ? 'いっしょに もじを かこう！' : 'まだ タマゴだよ');
  bottomMessage.textContent = next.message || 'デバッグ値を 反映したよ。';
  saveState();
  render();
}

function resetDebugState() {
  stopHatchingCutscene();
  state = cloneDefaultState();
  saveState();
  bottomMessage.textContent = 'デバッグ値を 初期化したよ。';
  render();
}

function consumePendingWritingReward() {
  let pending = null;
  try {
    const raw = localStorage.getItem(PENDING_REWARD_KEY);
    if (raw) pending = JSON.parse(raw);
    localStorage.removeItem(PENDING_REWARD_KEY);
  } catch (error) {
    console.warn('Could not consume writing reward:', error);
  }
  if (!pending || !pending.result || !pending.result.success) return false;
  const pendingReward = pending.result.reward;
  const fallbackReward = getPreferredFood();
  const reward = state.hatched
    ? (pendingReward && state.inventory[pendingReward.id] ? pendingReward : fallbackReward)
    : null;
  if (reward && state.inventory[reward.id]) {
    changeInventory(reward.id, 1);
  }
  state.stars = clamp((Number(state.stars) || 0) + 10, 0, 99999);
  markCareInteraction();
  if (state.hatched) {
    boostGokigen(8);
    const bonus = getFriendshipBonus();
    if (bonus) {
      state.stars = clamp((Number(state.stars) || 0) + bonus.stars, 0, 99999);
    }
    const stageMessage = getYochiyochiActionMessage('writing');
    const rewardName = reward?.name || careFoods[reward?.id]?.name || 'たべもの';
    setSpeech(`${rewardName}を もらったよ！`, bonus ? bonus.message : (stageMessage || `スターも ふえたよ。${getMilmaruName()}に おせわを してみよう！`));
    setReaction('happy');
  } else {
    setSpeech('スターが ふえたよ！', 'スターで タマゴを あたためられるよ。ミルクは うまれてから あげよう。');
    setReaction('warm');
  }
  spawnFx('sparkle');
  saveState();
  return true;
}

function applyEntrySpeech() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('from') === 'play') {
    if (params.get('result') === 'success') {
      setSpeech('あそぶの たのしい！', `${getMilmaruName()}と ころころボールで あそんだよ。なかよしが ふえた！`);
      setReaction('happy', 1500);
      spawnFx('sparkle');
    } else if (state.hatched) {
      setSpeech('また あそぼうね', 'もじを かいて スターを ためると、また おもちゃで あそべるよ。');
    }
    saveState();
    return;
  }
  if (params.get('from') !== 'writing') return;
  if (!state.hatched) {
    if (hasStars(actionStarCost.warm)) {
      setSpeech('タマゴを あたためよう！', 'スターを つかって、ぽかぽか してあげよう。');
    } else {
      setSpeech('もじを かきにいこう！', 'もじを かくと、タマゴを あたためる スターが ふえるよ。');
    }
    saveState();
    return;
  }
  const period = getMealPeriod();
  if (period.type === 'sleep') {
    setSpeech('すやすや...', 'いまは ねる じかん。あさ 6じから ごはんを あげられるよ。');
    saveState();
    return;
  }
  const food = getFoodForMeal(period.slotId);
  if (isMealClaimed(period.slotId)) {
    setSpeech('ごちそうさま！', `${MEAL_SLOTS[period.slotId].label}は もう たべたよ。`);
    saveState();
    return;
  }
  if (getInventoryCount(food.id) > 0) {
    setSpeech(`${getMealFoodLabel(food, period.slotId)}の じかん！`, `${food.name}を あげたら、${getMilmaruName()}が よろこぶよ。`);
  } else {
    setSpeech('いっしょに もじを かこう！', getYochiyochiActionMessage('writing') || `もじを かくと、${food.name}と スターが もらえるよ。`);
  }
  saveState();
}

function announceMealHintOnce(key, speech, message) {
  if (lastMealHintKey === key) return;
  lastMealHintKey = key;
  state.speech = speech;
  speechBubble.textContent = getStageSpeech(speech);
  bottomMessage.textContent = message;
}

async function feedCookie() {
  if (feedBusy) return;
  feedBusy = true;
  try {
    state = loadState();
    const now = Date.now();
    ensureFeedingDayState(state, now);
    if (!state.hatched) {
      render();
      announceMealHintOnce('egg', 'まだ タマゴだよ', 'いまは スターで あたためてあげよう。');
      return;
    }
    const period = getMealPeriod(now);
    if (period.type === 'sleep') {
      render();
      announceMealHintOnce('sleep', 'すやすや...', 'いまは ねる じかん。あさ 6じから ごはんを あげられるよ。');
      return;
    }
    const slotId = period.slotId;
    const slot = MEAL_SLOTS[slotId];
    if (isMealClaimed(slotId)) {
      render();
      announceMealHintOnce(`used-${slotId}`, 'ごちそうさま！', `${slot.label}は もう たべたよ。つぎの じかんを まってね。`);
      return;
    }
    const food = getFoodForMeal(slotId);
    if (getInventoryCount(food.id) <= 0) {
      render();
      announceMealHintOnce(`empty-${slotId}-${food.id}`, `${food.name}が ないみたい。`, `もじを かくと ${food.name}が もらえるよ。`);
      return;
    }

    const lockToken = `${now}-${Math.random().toString(36).slice(2)}`;
    state.feedingDay.claimed[slotId] = { token: lockToken, at: now };
    saveState();
    await new Promise((resolve) => setTimeout(resolve, 48));

    const confirmedState = loadState();
    const confirmedClaim = confirmedState.feedingDay?.claimed?.[slotId];
    if (!confirmedClaim || confirmedClaim.token !== lockToken) {
      state = confirmedState;
      render();
      announceMealHintOnce(`used-${slotId}`, 'ごちそうさま！', `${slot.label}は もう たべたよ。つぎの じかんを まってね。`);
      return;
    }

    state = confirmedState;
    if (getInventoryCount(food.id) <= 0) {
      delete state.feedingDay.claimed[slotId];
      saveState();
      render();
      announceMealHintOnce(`empty-${slotId}-${food.id}`, `${food.name}が ないみたい。`, `もじを かくと ${food.name}が もらえるよ。`);
      return;
    }

    state.feedingDay.claimed[slotId] = true;
    changeInventory(food.id, -1);
    markCareInteraction();
    boostGokigen(food.gainGokigen);
    state.nakayoshi = clamp(state.nakayoshi + food.gainNakayoshi, 0, 100);
    state.sukusuku = clamp(state.sukusuku + food.gainSukusuku, 0, 100);
    const didStageUp = syncGrowthStageChange();
    if (!didStageUp) {
      const growthHint = getHiddenGrowthHint();
      const stageMessage = getYochiyochiActionMessage('feed');
      const eatingSpeech = food.id === 'moji_milk'
        ? 'ごくごく おいしい！'
        : (food.id === 'moji_gohan' ? 'もぐもぐ おいしい！' : 'おやつ おいしい！');
      setSpeech(eatingSpeech, growthHint || stageMessage || `${food.name}を たべたよ。なかよしが ふえた！`);
      setReaction('eating');
    }
    saveState();
    lastMealHintKey = '';
    playSfx('feed');
    spawnFoodFx(food.id);
    spawnFx('sparkle');
    render();
  } finally {
    feedBusy = false;
  }
}

function finishPettingMode() {
  pettingMode = false;
  petStrokeActive = false;
  petStrokeDistance = 0;
  petLastPoint = null;
  activePetPointerId = null;
  petHintShown = false;
  clearTimeout(beginPetMilmaru._timer);
  milmaruWrap.classList.remove('petting-ready');
  syncRoaming();
}

function beginPetMilmaru(showGuide = true) {
  const now = Date.now();
  if (now - state.lastPetAt < 700) return false;
  pettingMode = true;
  petStrokeActive = false;
  petStrokeDistance = 0;
  petLastPoint = null;
  activePetPointerId = null;
  petHintShown = false;
  freezeRoamPosition();
  milmaruWrap.classList.add('petting-ready');
  state.reaction = 'normal';
  applyMilmaruClass('normal');
  syncRoaming();
  setSpeech('なでてね', state.hatched ? `${getMilmaruName()}の あたまを やさしく なでてあげよう。` : 'タマゴを やさしく なでてあげよう。');
  if (showGuide) {
    showCareNotice(
      state.hatched ? 'なでなでしてね' : 'タマゴを なでてね',
      state.hatched
        ? `${getMilmaruName()}の あたまを、やさしく なでてあげよう。`
        : 'タマゴの まんなかを、やさしく なでてあげよう。',
      3000
    );
  }
  clearTimeout(beginPetMilmaru._timer);
  beginPetMilmaru._timer = setTimeout(() => {
    if (!pettingMode) return;
    finishPettingMode();
    setSpeech(
      'まってるよ',
      state.hatched
        ? `${getMilmaruName()}を さわると、いつでも なでられるよ。`
        : 'タマゴを さわると、いつでも なでられるよ。'
    );
    render();
  }, 9000);
  return true;
}

function getPetPointerPoint(event) {
  const rect = stageEl.getBoundingClientRect();
  const scale = Math.max(0.01, rect.width / 1600);
  return {
    x: (event.clientX - rect.left) / scale,
    y: (event.clientY - rect.top) / scale
  };
}

function isPetPointOnHead(event) {
  const rect = milmaruWrap.getBoundingClientRect();
  if (!rect.width || !rect.height) return false;
  const x = (event.clientX - rect.left) / rect.width;
  const y = (event.clientY - rect.top) / rect.height;
  if (!state.hatched) return x >= 0.16 && x <= 0.84 && y >= 0.08 && y <= 0.82;
  return x >= 0.18 && x <= 0.82 && y >= 0.06 && y <= 0.58;
}

function spawnPetTrace(event) {
  const yardRect = document.querySelector('.center-yard').getBoundingClientRect();
  const piece = document.createElement('div');
  piece.className = 'fx-piece heart';
  piece.style.setProperty('--x', `${clamp(((event.clientX - yardRect.left) / yardRect.width) * 100, 0, 100)}%`);
  piece.style.setProperty('--y', `${clamp(((event.clientY - yardRect.top) / yardRect.height) * 100, 0, 100)}%`);
  piece.style.setProperty('--dx', `${(Math.random() - 0.5) * 70}px`);
  piece.style.setProperty('--dy', `${-20 - Math.random() * 40}px`);
  fxLayer.appendChild(piece);
  setTimeout(() => piece.remove(), 1000);
}

function startPetStroke(event) {
  if (event.pointerType === 'mouse' && event.button !== 0) return;
  if (event.isPrimary === false || (petStrokeActive && event.pointerId !== activePetPointerId)) {
    event.preventDefault();
    event.stopImmediatePropagation?.();
    return;
  }
  if (petStrokeActive) return;
  if (!pettingMode && !beginPetMilmaru(false)) return;
  if (!isPetPointOnHead(event)) {
    if (!petHintShown) {
      petHintShown = true;
      setSpeech(
        state.hatched ? 'あたまを なでてね' : 'タマゴを なでてね',
        state.hatched
          ? `${getMilmaruName()}の あたまのあたりを、やさしく なでてあげよう。`
          : 'タマゴの まんなかを、やさしく なでてあげよう。'
      );
    }
    return;
  }
  event.preventDefault();
  petStrokeActive = true;
  activePetPointerId = event.pointerId;
  petLastPoint = getPetPointerPoint(event);
  milmaruWrap.setPointerCapture?.(event.pointerId);
  spawnPetTrace(event);
}

function addPetStrokePoint(event) {
  if (!petStrokeActive || !petLastPoint) return false;
  const point = getPetPointerPoint(event);
  const distance = Math.hypot(point.x - petLastPoint.x, point.y - petLastPoint.y);
  petStrokeDistance += distance;
  petLastPoint = point;
  if (
    petStrokeDistance > PET_TRACE_DISTANCE_STEP
    && Math.floor(petStrokeDistance / PET_TRACE_DISTANCE_STEP) !== Math.floor((petStrokeDistance - distance) / PET_TRACE_DISTANCE_STEP)
  ) {
    spawnPetTrace(event);
  }
  if (petStrokeDistance >= PET_STROKE_REQUIRED_DISTANCE) {
    completePetMilmaru();
    return true;
  }
  return false;
}

function movePetStroke(event) {
  if (!pettingMode || !petStrokeActive || event.pointerId !== activePetPointerId) return;
  event.preventDefault();
  addPetStrokePoint(event);
}

function endPetStroke(event) {
  if (!petStrokeActive || event.pointerId !== activePetPointerId) return;
  event.preventDefault();
  if (addPetStrokePoint(event)) return;
  petStrokeActive = false;
  petLastPoint = null;
  activePetPointerId = null;
  milmaruWrap.releasePointerCapture?.(event.pointerId);
  if (pettingMode && petStrokeDistance < PET_STROKE_REQUIRED_DISTANCE && !petHintShown) {
    petHintShown = true;
    setSpeech(
      'そのまま なでてね',
      state.hatched
        ? `${getMilmaruName()}の あたまを、やさしく なでてあげよう。`
        : 'タマゴの まんなかを、やさしく なでてあげよう。'
    );
  }
}

function cancelPetStroke(event) {
  if (!petStrokeActive || event.pointerId !== activePetPointerId) return;
  petStrokeActive = false;
  petLastPoint = null;
  activePetPointerId = null;
}

function completePetMilmaru() {
  const now = Date.now();
  if (now - state.lastPetAt < 700) return;
  playSfx('pet');
  finishPettingMode();
  state.lastPetAt = now;
  markCareInteraction();
  if (!state.hatched) {
    state.nakayoshi = 0;
    setSpeech('ゆらゆら うごいたよ', 'タマゴを やさしく なでたよ。もじを かくと、スターで ぽかぽか できるよ。');
    setReaction('relaxed');
    spawnFx('sparkle');
    saveState();
    render();
    return;
  }
  boostGokigen(8);
  state.nakayoshi = clamp(state.nakayoshi + 1, 0, 100);
  setSpeech('なでてくれて うれしい！', getYochiyochiActionMessage('pet') || `${getMilmaruName()}が ほっとしているよ。`);
  setReaction('relaxed');
  spawnFx('heart');
  saveState();
  render();
}

function playWithMilmaru() {
  if (!state.hatched) {
    playSfx('mistake');
    setSpeech('まだ タマゴだよ', 'いまは スターで あたためるのが いちばん だいじ。');
    setReaction('warm');
    spawnFx('sparkle');
    return;
  }
  playSfx('select');
  freezeRoamPosition();
  setSpeech('あそびばに いこう！', hasStars(actionStarCost.play)
    ? 'ころころボールの あそび画面へ いくよ。'
    : 'スターが たりないときは、あそびばから もじを かきにいけるよ。');
  saveState();
  setTimeout(() => {
    window.location.href = 'play.html?toy=ball&from=care';
  }, 180);
}

function goWrite() {
  if (!state.hatched) {
    if (hasStars(actionStarCost.warm)) {
      warmEgg();
      return;
    }
    playSfx('select');
    setSpeech('もじを かきにいこう！', 'もじを かくと、タマゴを あたためる スターが ふえるよ。');
    saveState();
    setTimeout(() => {
      window.location.href = 'index.html?from=care';
    }, 180);
    return;
  }
  playSfx('select');
  const period = getMealPeriod();
  const food = period.slotId ? getFoodForMeal(period.slotId) : getPreferredFood();
  setSpeech('もじを かきにいこう！', `かけたら ${food.name}が もらえるよ。`);
  setReaction('happy');
  saveState();
  setTimeout(() => {
    window.location.href = 'index.html?from=care';
  }, 180);
}

function setupDebugControls() {
  configureDebugModeFromQuery();
  if (!debugPanel) return;
  document.getElementById('debugApplyBtn').addEventListener('click', () => applyDebugState());
  document.getElementById('debugEgg75Btn').addEventListener('click', () => applyDebugState({
    hatched: false,
    gokigen: 80,
    eggWarmth: 75,
    sukusuku: 0,
    stars: Math.max(actionStarCost.warm, Number(state.stars) || 0),
    speech: 'まだ タマゴだよ',
    message: 'あと 1かい あたためると 孵化演出を確認できるよ。'
  }));
  document.getElementById('debugPreHatchBtn').addEventListener('click', () => applyDebugState({
    hatched: false,
    gokigen: 80,
    eggWarmth: 99,
    sukusuku: 0,
    stars: Math.max(actionStarCost.warm, Number(state.stars) || 0),
    speech: 'まだ タマゴだよ',
    message: 'あたためると すぐ孵化演出に入るよ。'
  }));
  document.getElementById('debugBabyBtn').addEventListener('click', () => applyDebugState({
    hatched: true,
    named: true,
    gokigen: Math.max(82, state.gokigen),
    eggWarmth: 100,
    sukusuku: Math.max(10, state.sukusuku),
    milk: Math.max(1, getInventoryCount('moji_milk')),
    stars: Math.max(actionStarCost.play, Number(state.stars) || 0),
    speech: 'いっしょに もじを かこう！',
    message: 'ベビー状態にしたよ。'
  }));
  document.getElementById('debugYochiyochiBtn').addEventListener('click', () => applyDebugState({
    hatched: true,
    named: true,
    gokigen: Math.max(82, state.gokigen),
    eggWarmth: 100,
    sukusuku: 30,
    milk: Math.max(1, getInventoryCount('moji_milk')),
    stars: Math.max(actionStarCost.play, Number(state.stars) || 0),
    speech: 'いっしょに もじを かこう！',
    message: 'よちよち期の はいはい状態にしたよ。'
  }));
  document.getElementById('debugAlmostKidsBtn').addEventListener('click', () => applyDebugState({
    hatched: true,
    named: true,
    gokigen: Math.max(86, state.gokigen),
    eggWarmth: 100,
    sukusuku: 46,
    gohan: Math.max(3, getInventoryCount('moji_gohan')),
    cookies: Math.max(1, getInventoryCount('moji_cookie')),
    stars: Math.max(actionStarCost.play, Number(state.stars) || 0),
    speech: 'いっしょに もじを かこう！',
    message: '成長前の よちよち状態にしたよ。'
  }));
  document.getElementById('debugResetBtn').addEventListener('click', resetDebugState);
  document.getElementById('debugCloseBtn').addEventListener('click', () => {
    localStorage.removeItem(DEBUG_MODE_KEY);
    debugMode = false;
    stageEl.classList.remove('debug-mode');
  });
}

document.addEventListener('pointerdown', (event) => {
  const button = event.target.closest('button');
  if (!button || !stageEl.contains(button)) return;
  playSfx('button');
}, true);

document.getElementById('backBtn').addEventListener('click', () => {
  saveState();
  window.location.href = 'index.html?from=care';
});
document.getElementById('settingsBtn').addEventListener('click', () => {
  setSpeech('せっていは じゅんびちゅうだよ', 'また あとで つかえるようにするね。');
});
document.getElementById('inventoryBtn').addEventListener('click', () => {
  setSpeech('もちものは ここで みられるよ', 'もじを かくと、ミルク・ごはん・クッキー・スターが ふえるよ。');
});
document.getElementById('albumBtn').addEventListener('click', () => {
  setSpeech('アルバムは じゅんびちゅう！', 'かいた もじを あとで ならべよう。');
});
nameSaveBtn.addEventListener('click', saveMilmaruName);
nameInput.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') saveMilmaruName();
});
document.getElementById('feedBtn').addEventListener('click', feedCookie);
document.getElementById('playBtn').addEventListener('click', playWithMilmaru);
document.getElementById('writeBtn').addEventListener('click', goWrite);
milmaruWrap.addEventListener('pointerdown', startPetStroke);
milmaruWrap.addEventListener('pointermove', movePetStroke);
milmaruWrap.addEventListener('pointerup', endPetStroke);
milmaruWrap.addEventListener('pointercancel', cancelPetStroke);

setupDebugControls();
if (state.hatched && getWelcomeBackHours() >= 24) {
  state.gokigen = Math.max(68, Number(state.gokigen) || 0);
  state.lastMoodAt = Date.now();
}
const consumedPendingReward = consumePendingWritingReward();
if (!consumedPendingReward) applyEntrySpeech();
saveState();
render();

setInterval(() => {
  if (document.hidden || feedBusy) return;
  const startedNewDay = ensureFeedingDayState(state);
  if (startedNewDay) saveState();
  renderActionMode();
}, 30000);

window.MojikkoCareGame = {
  getState: () => JSON.parse(JSON.stringify(state)),
  feedCookie,
  beginPetMilmaru,
  completePetMilmaru,
  playWithMilmaru,
  goWrite,
  warmEgg,
  applyDebugState,
  consumePendingWritingReward
};
</script>
</body>
</html>
