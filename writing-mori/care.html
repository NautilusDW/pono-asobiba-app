html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  color: var(--ink);
  background: #243b33;
  font-family: var(--round-font);
  position: fixed;
  inset: 0;
}

#stage-wrap {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: linear-gradient(180deg, #233f53 0%, #12222b 100%);
}

#stage-wrap::before {
  content: '';
  position: fixed;
  inset: -72vmax;
  z-index: 0;
  opacity: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.84) 0 12%, rgba(255,255,255,0.26) 27%, rgba(255,255,255,0) 58%),
    radial-gradient(circle at center, rgba(255,152,185,0) 0 44%, rgba(181,75,111,0.16) 100%),
    repeating-conic-gradient(
      from 0deg,
      #fff1f6 0deg 9deg,
      #ffc4d6 9deg 18deg,
      #ff9fbd 18deg 27deg,
      #ffdce8 27deg 36deg
    );
  transform-origin: center;
  transition: opacity 0.18s ease;
}

#stage-wrap.hatch-active::before {
  opacity: 0;
  animation: hatchRaySpin 5.2s linear infinite;
}

#stage {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  width: 1600px;
  height: 900px;
  transform-origin: 0 0;
  overflow: hidden;
  background: var(--care-yard-bg-wide) right center / cover no-repeat;
  image-rendering: pixelated;
}

#stage.hatch-active {
  overflow: visible;
}

#stage.hatch-active::before {
  display: none;
}

#stage::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px),
    linear-gradient(180deg, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 8px 8px, 8px 8px;
  mix-blend-mode: soft-light;
  pointer-events: none;
}

.pixel-panel,
.wood-panel,
.paper-panel {
  border: 5px solid var(--wood-dark);
  box-shadow: 0 6px 0 #4b321f, 0 10px 18px var(--shadow);
  color: var(--ink);
}

.wood-panel {
  background:
    repeating-linear-gradient(90deg, rgba(87, 56, 31, 0.12) 0 10px, rgba(255,255,255,0.06) 10px 18px),
    linear-gradient(180deg, #f7d79b, #d99a5e);
}

.paper-panel {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.42), transparent 30%),
    linear-gradient(180deg, var(--paper), var(--paper-deep));
}

.pixel-button {
  border: 4px solid #875b3b;
  border-radius: 8px;
  background: linear-gradient(180deg, #fff0bd 0%, #f2bd6d 100%);
  box-shadow: 0 5px 0 #6f462c, inset 0 3px rgba(255,255,255,0.55);
  color: var(--ink);
  font-family: var(--pixel-font);
  font-size: 25px;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  image-rendering: pixelated;
}

.pixel-button:active {
  transform: translateY(4px);
  box-shadow: 0 1px 0 #6f462c, inset 0 2px rgba(255,255,255,0.35);
}

.icon-btn {
  width: 74px;
  height: 66px;
  border-radius: 10px;
  font-size: 32px;
}

#settingsBtn {
  border: 0;
  border-radius: 0;
  background: var(--care-settings) center / contain no-repeat;
  box-shadow: none;
  color: transparent;
  text-shadow: none;
}

.care-header {
  position: absolute;
  left: 28px;
  right: 28px;
  top: 20px;
  height: 84px;
  display: grid;
  grid-template-columns: 220px 1fr 280px 78px;
  align-items: center;
  gap: 24px;
  z-index: 5;
}

.back-btn {
  height: 62px;
  text-align: left;
  padding-left: 28px;
}

.title-board {
  width: 570px;
  aspect-ratio: 857 / 127;
  justify-self: center;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 0;
  border-radius: 0;
  background: var(--care-title-plaque) center / contain no-repeat;
  box-shadow: none;
  font-family: var(--pixel-font);
  font-size: 40px;
  letter-spacing: 0;
  padding-bottom: 4px;
  image-rendering: pixelated;
}

.star-box {
  width: 198px;
  min-width: 198px;
  aspect-ratio: 291 / 91;
  height: auto;
  justify-self: end;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding-left: 46px;
  border: 0;
  border-radius: 0;
  font-family: var(--pixel-font);
  font-size: 30px;
  background: var(--care-star-counter) center / contain no-repeat;
  box-shadow: none;
  image-rendering: pixelated;
}

.star-icon {

}

.gauges {
  position: absolute;
  top: 118px;
  left: 480px;
  right: 480px;
  height: 112px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 28px;
  z-index: 4;
}

.gauge-card {
  padding: 16px 22px;
  border-radius: 10px;
}

.gauge-title {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--pixel-font);
  font-size: 24px;
}

.gauge-icon {
  width: 38px;
  height: 34px;
  display: inline-block;
}

.gauge-icon.heart {
  background: var(--coral);
  clip-path: polygon(50% 18%, 58% 6%, 72% 2%, 87% 8%, 96% 22%, 96% 38%, 88% 55%, 50% 96%, 12% 55%, 4% 38%, 4% 22%, 13% 8%, 28% 2%, 42% 6%);
}

.gauge-icon.leaf {
  background: var(--mint-dark);
  border-radius: 70% 10% 70% 10%;
  transform: rotate(-28deg);
}

.gauge-line {
  margin-top: 10px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
  font-family: var(--pixel-font);
  font-size: 23px;
}

.gauge-track {
  height: 28px;
  border: 4px solid #9f7655;
  border-radius: 7px;
  background: #f4dfbd;
  overflow: hidden;
}

.gauge-fill {
  width: 0%;
  height: 100%;
  border-right: 4px solid rgba(255,255,255,0.45);
  transition: width 0.35s ease;
}

.gauge-fill.nakayoshi {
  background: repeating-linear-gradient(90deg, #ff9aa5 0 22px, #f7798b 22px 42px);
}

.gauge-fill.sukusuku {
  background: repeating-linear-gradient(90deg, #75d3a7 0 22px, #42b883 22px 42px);
}

.side-panel {
  position: absolute;
  top: 146px;
  bottom: 70px;
  width: 270px;
  border-radius: 10px;
  z-index: 3;
  display: grid;
  grid-template-rows: 58px 1fr;
  overflow: hidden;
}

.side-panel.left { left: 28px; }
.side-panel.right { right: 28px; }

.panel-heading {
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #77d1b0, #56b98f);
  color: #fffdf0;
  font-family: var(--pixel-font);
  font-size: 28px;
  text-shadow: 2px 2px rgba(89, 61, 40, 0.35);
}

.panel-body {
  padding: 18px;
  display: grid;
  gap: 16px;
  align-content: start;
}

.item-card {
  min-height: 86px;
  padding: 12px;
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 12px;
  align-items: center;
  border: 3px solid rgba(139, 96, 66, 0.38);
  border-radius: 10px;
  background: rgba(255,255,255,0.48);
}

.cookie-icon,
.milk-icon,
.power-icon {
  position: relative;
  width: 50px;
  height: 50px;
  border: 0;
  border-radius: 0;
  box-shadow: none;
  image-rendering: pixelated;
}

.cookie-icon {
  background: var(--care-icon-cookie) center / contain no-repeat;
}

.milk-icon {
  width: 42px;
  height: 62px;
  justify-self: center;
  background: var(--care-icon-milk) center / contain no-repeat;
}

.milk-icon::before {
  display: none;
}

.power-icon {
  display: grid;
  place-items: center;
  border: 4px solid #d89140;
  border-radius: 12px;
  background: linear-gradient(180deg, #fff6b5, #f2b65d);
}

.power-icon::before {
  content: '✦';
  color: #fff8db;
  font-family: var(--pixel-font);
  font-size: 31px;
  line-height: 1;
  text-shadow: 2px 2px #b96d34;
}

.item-name {
  font-family: var(--round-font);

.item-count {

.locked-slot {

@keyframes happyBounce {
  0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
  30% { transform: translateX(-50%) translateY(-34px) scale(1.05); }
  60% { transform: translateX(-50%) translateY(0) scale(0.98); }
}
@keyframes eatingWiggle {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  25% { transform: translateX(-50%) rotate(-4deg) scale(1.03); }
  55% { transform: translateX(-50%) rotate(4deg) scale(1.02); }
}
@keyframes relaxedSway {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  50% { transform: translateX(-50%) rotate(3deg); }
}
@keyframes playHop {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  22% { transform: translateX(-70%) translateY(-18px); }
  52% { transform: translateX(-30%) translateY(-28px); }
}
@keyframes babyHappyFrames {
  0%, 100% { background-image: var(--care-shell-baby-arms-up); }
  45% { background-image: var(--care-shell-baby-wave); }
}
@keyframes babyMilkFrames {
  0%, 100% { background-image: var(--care-shell-baby-milk); }
  48% { background-image: var(--care-shell-baby-wave); }
}
@keyframes babyPlayFrames {
  0%, 100% { background-image: var(--care-shell-baby-wiggle); }
  45% { background-image: var(--care-shell-baby-arms-up); }
}
@keyframes yochiyochiPlayFrames {
  0%, 100% { background-image: var(--care-yochiyochi-play-a); }
  35% { background-image: var(--care-yochiyochi-play-b); }
  70% { background-image: var(--care-yochiyochi-play-c); }
}
@keyframes yochiyochiRoamFrames {
  0%, 100% { background-image: var(--care-yochiyochi-play-a); }
  50% { background-image: var(--care-yochiyochi-play-b); }
}
@keyframes yochiyochiCrawlFrames {
  0%, 100% { background-image: var(--care-yochiyochi-crawl-1); }
  16% { background-image: var(--care-yochiyochi-crawl-2); }
  33% { background-image: var(--care-yochiyochi-crawl-3); }
  50% { background-image: var(--care-yochiyochi-crawl-4); }
  66% { background-image: var(--care-yochiyochi-crawl-5); }
  83% { background-image: var(--care-yochiyochi-crawl-6); }
}
@keyframes yochiyochiWalkFrames {
  0%, 100% { background-image: var(--care-yochiyochi-walk-1); }
  25% { background-image: var(--care-yochiyochi-walk-2); }
  50% { background-image: var(--care-yochiyochi-walk-3); }
  75% { background-image: var(--care-yochiyochi-walk-4); }
}
@keyframes eggWarm {
  0%, 100% { transform: translateX(-50%) scale(1); filter: brightness(1); }
  38% { transform: translateX(-50%) scale(1.05); filter: brightness(1.12) drop-shadow(0 0 14px rgba(255, 218, 118, 0.7)); }
  68% { transform: translateX(-50%) scale(0.98); }
}
@keyframes eggPetWiggle {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  22% { transform: translateX(-50%) rotate(-5deg); }
  48% { transform: translateX(-50%) rotate(5deg); }
  72% { transform: translateX(-50%) rotate(-3deg); }
}
@keyframes birthPop {
  0% { transform: translateX(-50%) translateY(0) scale(0.88); filter: brightness(1); }
  42% { transform: translateX(-50%) translateY(-36px) scale(1.08); filter: brightness(1.18) drop-shadow(0 0 18px rgba(134, 215, 172, 0.8)); }
  100% { transform: translateX(-50%) translateY(0) scale(1); filter: brightness(1); }
}

  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }

.hatch-scene {
  position: absolute;
  inset: 0;
  z-index: 90;
  display: grid;
  grid-template-rows: 170px 1fr 132px;
  justify-items: center;
  align-items: center;
  overflow: hidden;
  pointer-events: none;
  opacity: 0;
  visibility: hidden;
  background: transparent;
  transition: opacity 0.18s ease, visibility 0.18s ease;
}

.hatch-scene.show {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
  overflow: visible;
}

.hatch-scene::before {
  content: '';
  position: absolute;
  inset: -72%;
  background:
    repeating-conic-gradient(
      from 0deg,
      #fff1f6 0deg 9deg,
      #ffc4d6 9deg 18deg,
      #ff9fbd 18deg 27deg,
      #ffdce8 27deg 36deg
    );
  transform-origin: center;
  animation: hatchRaySpin 5.2s linear infinite;
}

.hatch-scene::after {
  content: '';
  position: absolute;
  inset: -72%;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.84) 0 12%, rgba(255,255,255,0.26) 27%, rgba(255,255,255,0) 58%),
    radial-gradient(circle at center, rgba(255,152,185,0) 0 44%, rgba(181,75,111,0.16) 100%);
}

.hatch-copy,
.hatch-subcopy {
  position: relative;
  z-index: 4;

  padding: 18px 34px;

  border-radius: 16px;
  background: rgba(255, 248, 232, 0.94);
  box-shadow: 0 6px 0 #6f462c;
  color: #5a3d28;
  font-family: var(--pixel-font);
  text-align: center;
}

.hatch-copy {
  align-self: end;
  font-size: 38px;
}

.hatch-subcopy {
  align-self: start;
  font-size: 24px;
}

.hatch-sprite {
  position: relative;
  z-index: 3;
  width: 370px;
  height: 470px;
  background: var(--care-egg-cracked) center / contain no-repeat;
  image-rendering: pixelated;
  filter: drop-shadow(0 22px 0 rgba(95, 61, 38, 0.18));
  transform-origin: center bottom;
}

.hatch-scene.phase-notice .hatch-sprite {
  width: 340px;
  height: 430px;
  animation: hatchSlowPulse 1.15s ease-in-out infinite;
}

.hatch-scene.phase-ready .hatch-sprite {
  width: 370px;
  height: 470px;
  animation: hatchEggShake 0.42s ease-in-out infinite;
}

.hatch-scene.phase-peek .hatch-sprite {
  width: 430px;
  height: 450px;
  background-image: var(--care-egg-peek);
  animation: hatchPopOpen 0.78s cubic-bezier(.2,1.5,.3,1) both;
}

.hatch-scene.phase-born .hatch-sprite {
  width: 430px;
  height: 430px;
  background-image: var(--care-shell-baby-arms-up);
  animation: hatchBabyBounce 0.9s cubic-bezier(.2,1.5,.3,1) both;
}

@keyframes hatchRaySpin {
  0% { transform: rotate(0deg) scale(1.08); }
  100% { transform: rotate(360deg) scale(1.08); }
}

@keyframes hatchSlowPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

@keyframes hatchEggShake {
  0%, 100% { transform: translateX(0) rotate(0deg) scale(1.03); }
  20% { transform: translateX(-14px) rotate(-5deg) scale(1.04); }
  45% { transform: translateX(11px) rotate(5deg) scale(1.05); }
  70% { transform: translateX(-7px) rotate(-3deg) scale(1.04); }
}

@keyframes hatchPopOpen {
  0% { transform: translateY(24px) scale(0.86); filter: brightness(1.1) drop-shadow(0 22px 0 rgba(95,61,38,0.18)); }
  32% { transform: translateY(-28px) scale(1.16); filter: brightness(1.28) drop-shadow(0 28px 0 rgba(95,61,38,0.16)); }
  100% { transform: translateY(0) scale(1); filter: brightness(1.05) drop-shadow(0 22px 0 rgba(95,61,38,0.18)); }
}

@keyframes hatchBabyBounce {
  0% { transform: translateY(58px) scale(0.78); opacity: 0; }
  45% { transform: translateY(-34px) scale(1.12); opacity: 1; }
  72% { transform: translateY(10px) scale(0.96); }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}

.fx-piece {

@keyframes foodOfferArc {
  0% {
    opacity: 0;
    transform: translate(calc(-50% - 132px), calc(-50% + 20px)) scale(0.86) rotate(-10deg);
  }
  16% {
    opacity: 1;
    transform: translate(calc(-50% - 108px), calc(-50% + 4px)) scale(0.96) rotate(-6deg);
  }
  54% {
    opacity: 1;
    transform: translate(calc(-50% - 50px), calc(-50% - 74px)) scale(1.08) rotate(8deg);
  }
  82% {
    opacity: 1;
    transform: translate(calc(-50% - 8px), calc(-50% - 12px)) scale(0.95) rotate(2deg);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.72) rotate(0deg);
  }
}

@keyframes fxRise {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  18% { opacity: 1; }
  100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-100px + var(--dy))) scale(1.35); }
}

<script>
'use strict';

const CARE_STATE_KEY = 'mojikkoFarmCareStateV1';
const PENDING_REWARD_KEY = 'mojikkoFarmPendingWritingReward';
const DEBUG_MODE_KEY = 'mojikkoFarmCareDebugMode';

const defaultState = {
  name: 'ミルマル',
  named: false,
  nakayoshi: 32,
  gokigen: 78,
  sukusuku: 0,
  eggWarmth: 0,
  hatched: false,
  stars: 1250,
  inventory: {
    moji_milk: { id: 'moji_milk', name: 'もじミルク', count: 0, type: 'food' },
    moji_cookie: { id: 'moji_cookie', name: 'もじクッキー', count: 0, type: 'food' },
    moji_power: { id: 'moji_power', name: 'もじパワー', count: 0, type: 'energy' }
  },
  reaction: 'normal',
  speech: 'まだ タマゴだよ',
  lastStageId: 'egg',
  lastPetAt: 0,
  lastWarmAt: 0,
  lastMoodAt: Date.now(),
  lastCareAt: Date.now()
};

const growthStages = [
  { id: 'egg', name: 'タマゴ', icon: '🥚', min: 0, next: 10 },
  { id: 'baby', name: 'ベビー', icon: '🐣', min: 10, next: 25 },
  { id: 'yochiyochi', name: 'よちよち期', icon: '🐹', min: 25, next: 50 },
  { id: 'kids', name: 'キッズ', icon: '⭐', min: 50, next: 80 },
  { id: 'pre_evolution', name: 'しんかまえ', icon: '✨', min: 80, next: 100 }
];

const careFoods = {
  moji_milk: { id: 'moji_milk', name: 'もじミルク', gainNakayoshi: 4, gainSukusuku: 4 },
  moji_cookie: { id: 'moji_cookie', name: 'もじクッキー', gainNakayoshi: 5, gainSukusuku: 2 }
};

const actionPowerCost = {
  warm: 1,
  pet: 1,
  play: 2
};

let state = loadState();

const stageEl = document.getElementById('stage');
const speechBubble = document.getElementById('speechBubble');
const bottomMessage = document.getElementById('bottomMessage');
const milmaruWrap = document.querySelector('.milmaru-wrap');
const milmaru = document.getElementById('milmaru');
const fxLayer = document.getElementById('fxLayer');
const stageNotice = document.getElementById('stageNotice');
const stageNoticeTitle = document.getElementById('stageNoticeTitle');
const stageNoticeText = document.getElementById('stageNoticeText');
const careActions = document.querySelector('.care-actions');
const writeBtn = document.getElementById('writeBtn');
const feedBtn = document.getElementById('feedBtn');
const mainActionIcon = document.getElementById('mainActionIcon');
const mainActionText = document.getElementById('mainActionText');
const mainActionHelp = document.getElementById('mainActionHelp');
const hatchScene = document.getElementById('hatchScene');
const hatchCopy = document.getElementById('hatchCopy');
const hatchSubcopy = document.getElementById('hatchSubcopy');
const nameModal = document.getElementById('nameModal');
const nameInput = document.getElementById('nameInput');
const nameSaveBtn = document.getElementById('nameSaveBtn');
const debugPanel = document.getElementById('debugPanel');
const stageWrap = document.getElementById('stage-wrap');

let hatchingNow = false;
let hatchTimers = [];
let debugMode = false;
const roamState = {
  x: 50,
  y: 72,
  dir: 1,
  moving: false,
  timer: null,
  motionTimer: null,
  duration: 5.2,
  frameDuration: 1.9
};

const carePreloadImages = [
  '../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_01.png',
  '../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_02.png',
  '../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_03.png',
  '../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_04.png',
  '../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_05.png',
  '../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_06.png',
  '../assets/images/mojikko/care/milmaru_yochiyochi_walk_loop_01.png',
  '../assets/images/mojikko/care/milmaru_yochiyochi_walk_loop_02.png',
  '../assets/images/mojikko/care/milmaru_yochiyochi_walk_loop_03.png',
  '../assets/images/mojikko/care/milmaru_yochiyochi_walk_loop_04.png'
];

carePreloadImages.forEach((src) => {
  const img = new Image();
  img.decoding = 'async';
  img.src = src;
});

function fitStage() {
  const scale = Math.min(window.innerWidth / 1600, window.innerHeight / 900);
  const ox = (window.innerWidth - 1600 * scale) / 2;
  const oy = (window.innerHeight - 900 * scale) / 2;
  stageEl.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
}

window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));
document.addEventListener('visibilitychange', () => { if (!document.hidden) fitStage(); });
fitStage();

let audioCtx = null;

function getAudioContext() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return null;
  if (!audioCtx) audioCtx = new AudioContextClass();
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  return audioCtx;
}

function playTone(frequency, duration = 0.06, type = 'square', volume = 0.035, delay = 0) {
  const ctx = getAudioContext();
  if (!ctx) return;
  const start = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(volume, start + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.02);
}

function playSfx(kind) {
  try {
    if (kind === 'warm') {
      playTone(430, 0.055, 'triangle', 0.03);
      playTone(540, 0.055, 'triangle', 0.024, 0.05);
      return;
    }
    if (kind === 'pet') {
      playTone(590, 0.04, 'sine', 0.026);
      playTone(740, 0.05, 'sine', 0.022, 0.045);
      return;
    }
    if (kind === 'feed') {
      playTone(520, 0.045, 'square', 0.03);
      playTone(780, 0.065, 'square', 0.028, 0.055);
      return;
    }
    if (kind === 'play') {
      [620, 760, 620].forEach((freq, i) => playTone(freq, 0.05, 'square', 0.026, i * 0.05));
      return;
    }
    if (kind === 'hatch') {
      [580, 760, 960, 1180].forEach((freq, i) => playTone(freq, 0.09, 'square', 0.032, i * 0.075));
      return;
    }
    if (kind === 'mistake') {
      playTone(210, 0.07, 'triangle', 0.024);
      return;
    }
    if (kind === 'select') {
      playTone(560, 0.045, 'square', 0.026);
      playTone(720, 0.05, 'square', 0.022, 0.04);
      return;
    }
    playTone(500, 0.045, 'square', 0.026);
  } catch (_) {}
}

function cloneDefaultState() {
  return JSON.parse(JSON.stringify(defaultState));
}

function sanitizeMilmaruName(value) {
  const text = String(value || '').trim().replace(/\s+/g, '');
  return text ? text.slice(0, 8) : 'ミルマル';
}

function getMilmaruName() {
  return sanitizeMilmaruName(state.name || 'ミルマル');
}

function loadState() {
  try {
    const saved = localStorage.getItem(CARE_STATE_KEY);
    if (!saved) return cloneDefaultState();
    const parsed = JSON.parse(saved);
    const merged = cloneDefaultState();
    merged.name = sanitizeMilmaruName(parsed.name || merged.name);
    merged.named = parsed.named === true || (parsed.hatched === true && parsed.named !== false && !Object.prototype.hasOwnProperty.call(parsed, 'named'));
    merged.nakayoshi = Number.isFinite(parsed.nakayoshi) ? parsed.nakayoshi : merged.nakayoshi;
    merged.gokigen = Number.isFinite(parsed.gokigen) ? parsed.gokigen : merged.gokigen;
    merged.sukusuku = Number.isFinite(parsed.sukusuku) ? parsed.sukusuku : merged.sukusuku;
    merged.eggWarmth = Number.isFinite(parsed.eggWarmth) ? clamp(parsed.eggWarmth, 0, 100) : merged.eggWarmth;
    merged.hatched = parsed.hatched === true;
    merged.stars = Number.isFinite(parsed.stars) ? parsed.stars : merged.stars;
    merged.speech = merged.hatched ? (parsed.speech || 'うまれたての あかちゃんだよ') : 'まだ タマゴだよ';
    merged.reaction = parsed.reaction || merged.reaction;
    merged.lastStageId = parsed.lastStageId || (merged.hatched ? getGrowthStage(Math.max(10, merged.sukusuku)).id : 'egg');
    merged.lastCareAt = Number.isFinite(parsed.lastCareAt) ? parsed.lastCareAt : Date.now();
    merged.lastPetAt = Number.isFinite(parsed.lastPetAt) ? parsed.lastPetAt : 0;
    merged.lastWarmAt = Number.isFinite(parsed.lastWarmAt) ? parsed.lastWarmAt : 0;
    merged.lastMoodAt = Number.isFinite(parsed.lastMoodAt) ? parsed.lastMoodAt : merged.lastCareAt;
    if (parsed.inventory) {
      Object.keys(merged.inventory).forEach((id) => {
        if (parsed.inventory[id]) {
          merged.inventory[id].count = Math.max(0, Number(parsed.inventory[id].count) || 0);
        }
      });
    }
    return merged;
  } catch (error) {
    console.warn('Could not load care state:', error);
    return cloneDefaultState();
  }
}

function saveState() {
  try {
    localStorage.setItem(CARE_STATE_KEY, JSON.stringify(state));
  } catch (error) {
    console.warn('Could not save care state:', error);
  }
}

function configureDebugModeFromQuery() {
  const params = new URLSearchParams(window.location.search);
  const value = params.get('debug');
  if (value === '1') {
    localStorage.setItem(DEBUG_MODE_KEY, '1');
  } else if (value === '0') {
    localStorage.removeItem(DEBUG_MODE_KEY);
  }
  debugMode = value === '1' || (value !== '0' && localStorage.getItem(DEBUG_MODE_KEY) === '1');
  stageEl.classList.toggle('debug-mode', debugMode);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function lerp(start, end, amount) {
  return start + (end - start) * amount;
}

function getGrowthStage(sukusuku) {
  if (sukusuku < 10) return growthStages[0];
  if (sukusuku < 25) return growthStages[1];
  if (sukusuku < 50) return growthStages[2];
  if (sukusuku < 80) return growthStages[3];
  return growthStages[4];
}

function getCareStage() {
  if (!state.hatched) return growthStages[0];
  return getGrowthStage(Math.max(10, state.sukusuku));
}

function getInventoryCount(id) {
  const item = state.inventory[id];
  return item ? Math.max(0, Number(item.count) || 0) : 0;
}

function changeInventory(id, delta) {
  if (!state.inventory[id]) return 0;
  state.inventory[id].count = clamp(getInventoryCount(id) + delta, 0, 99);
  return state.inventory[id].count;
}

function getPreferredFood() {
  if (!state.hatched) return careFoods.moji_milk;
  const stage = getCareStage();
  return stage.id === 'baby' ? careFoods.moji_milk : careFoods.moji_cookie;
}

function markCareInteraction() {
  state.lastCareAt = Date.now();
}

function applyGokigenDecay(now = Date.now()) {
  const currentGokigen = Number(state.gokigen);
  state.gokigen = Number.isFinite(currentGokigen) ? clamp(currentGokigen, 0, 100) : 78;
  if (!state.hatched) {
    state.gokigen = clamp(state.gokigen, 72, 100);
    state.lastMoodAt = now;
    return false;
  }
  const lastMoodAt = Number.isFinite(state.lastMoodAt) ? state.lastMoodAt : (Number.isFinite(state.lastCareAt) ? state.lastCareAt : now);
  const elapsedHours = Math.max(0, (now - lastMoodAt) / 3600000);
  const decaySteps = Math.floor(Math.max(0, elapsedHours - 6) / 6);
  if (decaySteps <= 0) return false;
  state.gokigen = clamp(state.gokigen - decaySteps * 5, 18, 100);
  state.lastMoodAt = lastMoodAt + decaySteps * 6 * 3600000;
  return true;
}

function boostGokigen(amount) {
  applyGokigenDecay();
  state.gokigen = clamp(state.gokigen + amount, 0, 100);
  state.lastMoodAt = Date.now();
}

function getGokigenStatus() {
  if (!state.hatched) return { id: 'sleepy', label: 'すやすや', reaction: 'normal' };
  applyGokigenDecay();
  if (state.gokigen >= 88) return { id: 'sparkly', label: 'きらきら', reaction: 'happy' };
  if (state.gokigen >= 68) return { id: 'happy', label: 'にこにこ', reaction: 'happy' };
  if (state.gokigen >= 46) return { id: 'normal', label: 'まったり', reaction: 'normal' };
  if (state.gokigen >= 28) return { id: 'lonely', label: 'さみしい', reaction: 'worried' };
  return { id: 'sulky', label: 'むぅ...', reaction: 'angry' };
}

function getFriendshipTier() {
  const value = clamp(Number(state.nakayoshi) || 0, 0, 100);
  if (value >= 85) return { level: 4, label: 'だいすき' };
  if (value >= 65) return { level: 3, label: 'なかよし' };
  if (value >= 40) return { level: 2, label: 'なれてきた' };
  if (value >= 20) return { level: 1, label: 'すこしずつ' };
  return { level: 0, label: 'はじめまして' };
}

function getFriendshipBonus() {
  if (!state.hatched) return null;
  const tier = getFriendshipTier();
  const mood = getGokigenStatus();
  if (mood.id === 'lonely' || mood.id === 'sulky') return null;
  if (tier.level >= 4) return { stars: 20, power: 1, message: `${getMilmaruName()}の おうえん！もじパワーを もう1こ もらったよ。` };
  if (tier.level >= 3) return { stars: 10, power: 0, message: `${getMilmaruName()}が おうえんしてくれたよ。スターが すこし ふえた！` };
  return null;
}

function getIdleMood(now = Date.now()) {
  if (!state.hatched) return null;
  const name = getMilmaruName();
  const lastCareAt = Number.isFinite(state.lastCareAt) ? state.lastCareAt : now;
  const hours = (now - lastCareAt) / 3600000;
  const mood = getGokigenStatus();
  if (mood.id === 'sulky' || hours >= 48) {
    return {
      reaction: mood.id === 'sulky' ? 'angry' : 'worried',
      speech: 'むぅ〜...',
      message: `${name}は ちょっと すねているみたい。もじを かいて、おせわしてあげよう。`
    };
  }
  if (mood.id === 'lonely' || hours >= 24) {
    return {
      reaction: 'worried',
      speech: 'くぅん...',
      message: `${name}は すこし さみしかったみたい。なでると すぐ げんきになるよ。`
    };
  }
  const hour = new Date(now).getHours();
  if (hour >= 21 || hour < 6) {
    return {
      reaction: 'sleep',
      speech: 'すぅ...すぅ...',
      message: `${name}は ねむっているよ。あした また おせわしよう。`
    };
  }
  return null;
}

function getDisplayReaction(reaction) {
  const currentReaction = reaction || state.reaction || 'normal';
  if (currentReaction !== 'normal') return currentReaction;
  const idleMood = getIdleMood();
  return idleMood ? idleMood.reaction : currentReaction;
}

function getBabySpeech(text) {
  const raw = String(text || '');
  if (/ない|たりない|まだ/.test(raw)) return 'ふぇ...？';
  if (/ねむ|すや|すぅ/.test(raw)) return 'すぅ...すぅ...';
  if (/怒|ぷん|まって|さみ|むぅ/.test(raw)) return 'むぅ〜...';
  if (/おいしい|ごくごく|ミルク|クッキー|おやつ|ほしい|もらった/.test(raw)) return 'みゅみゅ！';
  if (/なで|うれしい|ありがとう|ぽかぽか/.test(raw)) return 'ふにゃ〜♪';
  if (/あそ|たのしい|ぴょん/.test(raw)) return 'きゃっきゃ！';
  if (/もじ|かこう|かき/.test(raw)) return 'あう〜？';
  return 'ふにゃ？';
}

function getYochiyochiSpeech(text) {
  const raw = String(text || '');
  if (/ない|たりない/.test(raw)) return 'なぁい...？';
  if (/ねむ|すや|すぅ/.test(raw)) return 'ねむねむ...';
  if (/怒|ぷん|まって|さみ|むぅ/.test(raw)) return 'むーむー！';
  if (/おいしい|ごくごく|ミルク|クッキー|おやつ|ほしい|もらった/.test(raw)) return 'まんま、んま！';
  if (/なで|うれしい|ありがとう|しっぽ|ふりふり/.test(raw)) return 'なで...すき';
  if (/あそ|たのしい|ぴょん|おいかけ|たんけん/.test(raw)) return 'あしょぼ！';
  if (/はいはい/.test(raw)) return 'はいはい...いく！';
  if (/あんよ|歩|よちよち|せのび|たちあが/.test(raw)) return 'あんよ...できた！';
  if (/もじ|かこう|かき/.test(raw)) return 'もじ...かく？';
  return raw.length > 8 ? 'うにゃ？' : raw;
}

function getYochiyochiPhase() {
  if (!state.hatched || getCareStage().id !== 'yochiyochi') return null;
  if (state.sukusuku < 38) return 'crawl';
  if (state.sukusuku < 45) return 'first_steps';
  return 'almost_kids';
}

function getYochiyochiActionMessage(action) {
  const phase = getYochiyochiPhase();
  if (!phase) return '';
  const name = getMilmaruName();
  const messages = {
    feed: {
      crawl: `${name}が もぐもぐして、はいはいで ちょっと近づいてきたよ。`,
      first_steps: `${name}が もぐもぐして、あんよを ふみふみしたよ。`,
      almost_kids: `${name}が 背のびして、少し たくましく見えるよ。`
    },
    pet: {
      crawl: `${name}が しっぽを ふりふりしているよ。`,
      first_steps: `${name}が うれしくて、ちいさく たちあがったよ。`,
      almost_kids: `${name}が えへへって じまんげだよ。`
    },
    play: {
      crawl: `${name}と はいはいで おいかけっこしたよ。`,
      first_steps: `${name}が よちよち歩きで ついてきたよ。`,
      almost_kids: `${name}が ころばずに ぴょんと はねたよ。`
    },
    writing: {
      crawl: `${name}が はいはいで そばにきて、おうえんしてるよ。`,
      first_steps: `${name}が よちよち歩きで みにきたよ。`,
      almost_kids: `${name}が 背のびして、もじを みているよ。`
    }
  };
  return messages[action]?.[phase] || '';
}

function getStageUpCopy(stage) {
  const name = getMilmaruName();
  if (stage.id === 'yochiyochi') {
    return {
      title: 'はいはい できるようになったよ',
      message: `${name}が はいはいで すすむように なったよ。おにわを たんけんできるね。`
    };
  }
  if (stage.id === 'kids') {
    return {
      title: 'しっかり たてるようになったよ',
      message: `${name}が しっかり たてるように なったよ。これから もっと いっしょに あそべそう。`
    };
  }
  if (stage.id === 'pre_evolution') {
    return {
      title: 'からだが きらきらしているよ',
      message: `${name}の からだが ほんのり ひかっているよ。`
    };
  }
  return null;
}

function showStageNotice(copy) {
  if (!stageNotice || !copy) return;
  stageNoticeTitle.textContent = copy.title || 'すこし せいちょう！';
  stageNoticeText.textContent = copy.message || '';
  stageNotice.classList.remove('show');
  stageNotice.setAttribute('aria-hidden', 'false');
  void stageNotice.offsetWidth;
  stageNotice.classList.add('show');
  clearTimeout(showStageNotice._timer);
  showStageNotice._timer = setTimeout(() => {
    stageNotice.classList.remove('show');
    stageNotice.setAttribute('aria-hidden', 'true');
  }, 2450);
}

function syncGrowthStageChange() {
  if (!state.hatched) {
    state.lastStageId = 'egg';
    return false;
  }
  const stage = getCareStage();
  const previousStageId = state.lastStageId || stage.id;
  if (previousStageId === stage.id) return false;
  state.lastStageId = stage.id;
  const copy = getStageUpCopy(stage);
  if (!copy) return false;
  playSfx('hatch');
  bottomMessage.textContent = copy.message;
  showStageNotice(copy);
  setReaction('happy', 2600);
  spawnFx('sparkle');
  return true;
}

function getStageSpeech(text) {
  if (!state.hatched) return text;
  const stage = getCareStage();
  if (stage.id === 'baby') return getBabySpeech(text);
  if (stage.id === 'yochiyochi') return getYochiyochiSpeech(text);
  return text;
}

function getDisplaySpeech(text) {
  const idleMood = (state.reaction || 'normal') === 'normal' ? getIdleMood() : null;
  return getStageSpeech(idleMood ? idleMood.speech : text);
}

function getMilmaruVisualStage() {
  if (!state.hatched) return 'egg';
  return getCareStage().id === 'baby' ? 'baby' : 'yochiyochi';
}

function getYochiyochiMotionClass() {
  return state.sukusuku < 38 ? 'roaming-crawl' : 'roaming-walk';
}

function getRoamMaturity() {
  return clamp((Math.max(25, state.sukusuku) - 25) / 25, 0, 1);
}

function getRoamProfile(distance = 0) {
  const maturity = getRoamMaturity();
  const isCrawling = state.sukusuku < 38;
  const jitter = 0.82 + Math.random() * 0.62;
  const duration = clamp(
    (lerp(6.8, 3.5, maturity) + distance * lerp(0.32, 0.15, maturity)) * jitter,
    lerp(8.4, 4.4, maturity),
    lerp(13.8, 7.2, maturity)
  );
  return {
    minX: lerp(43, 36, maturity),
    maxX: lerp(57, 64, maturity),
    minY: 60,
    maxY: lerp(100, 136, maturity),
    duration,
    frameDuration: (isCrawling ? lerp(2.35, 1.45, maturity) : lerp(1.72, 1.08, maturity)) * (0.92 + Math.random() * 0.18),
    pause: lerp(2600, 1000, maturity) + Math.random() * lerp(2800, 1700, maturity)
  };
}

function shouldRoam() {
  return state.hatched
    && getMilmaruVisualStage() === 'yochiyochi'
    && getDisplayReaction(state.reaction) === 'normal'
    && !hatchingNow;
}

function applyRoamStyles(resetCenter = false) {
  const x = resetCenter ? 50 : roamState.x;
  const y = resetCenter ? 42 : roamState.y;
  milmaruWrap.style.setProperty('--roam-x', `${x}%`);
  milmaruWrap.style.setProperty('--roam-y', `${y}px`);
  milmaruWrap.style.setProperty('--roam-dir', String(resetCenter ? 1 : roamState.dir));
  milmaruWrap.style.setProperty('--roam-duration', `${roamState.duration || 5.2}s`);
  milmaruWrap.style.setProperty('--roam-frame-duration', `${roamState.frameDuration || 1.9}s`);
  milmaruWrap.style.setProperty('--roam-easing', resetCenter ? 'ease-out' : 'cubic-bezier(.38, 0, .22, 1)');
  speechBubble.style.setProperty('--speech-x', `${x}%`);
}

function freezeRoamPosition() {
  if (!state.hatched || getMilmaruVisualStage() !== 'yochiyochi') return;
  const yardRect = document.querySelector('.center-yard').getBoundingClientRect();
  const wrapRect = milmaruWrap.getBoundingClientRect();
  if (!yardRect.width || !yardRect.height || !wrapRect.width) return;
  const currentX = clamp(((wrapRect.left + wrapRect.width / 2 - yardRect.left) / yardRect.width) * 100, 32, 68);
  const currentY = clamp(yardRect.bottom - wrapRect.bottom, 42, 152);
  roamState.x = currentX;
  roamState.y = currentY;
  roamState.duration = 0.01;
  roamState.frameDuration = 1.8;
  roamState.moving = false;
  clearTimeout(roamState.timer);
  clearTimeout(roamState.motionTimer);
  roamState.timer = null;
  roamState.motionTimer = null;
  applyRoamStyles();
}

function scheduleRoam(delay = 1500) {
  clearTimeout(roamState.timer);
  roamState.timer = setTimeout(moveRoamTarget, delay);
}

function moveRoamTarget() {
  if (!shouldRoam()) {
    syncRoaming();
    return;
  }
  const range = getRoamProfile();
  const nextX = range.minX + Math.random() * (range.maxX - range.minX);
  const nextY = range.minY + Math.random() * (range.maxY - range.minY);
  const distance = Math.hypot(nextX - roamState.x, (nextY - roamState.y) / 4);
  const profile = getRoamProfile(distance);
  roamState.dir = nextX < roamState.x ? -1 : 1;
  roamState.x = nextX;
  roamState.y = nextY;
  roamState.duration = profile.duration;
  roamState.frameDuration = profile.frameDuration;
  roamState.moving = true;
  applyRoamStyles();
  applyMilmaruClass(state.reaction);
  clearTimeout(roamState.motionTimer);
  roamState.motionTimer = setTimeout(() => {
    roamState.moving = false;
    applyMilmaruClass(state.reaction);
  }, roamState.duration * 1000);
  scheduleRoam((roamState.duration * 1000) + profile.pause);
}

function syncRoaming() {
  const canRoam = shouldRoam();
  milmaruWrap.classList.toggle('roaming', canRoam);
  if (!canRoam) {
    if (getMilmaruVisualStage() === 'yochiyochi' && roamState.moving) {
      freezeRoamPosition();
    }
    clearTimeout(roamState.timer);
    clearTimeout(roamState.motionTimer);
    roamState.timer = null;
    roamState.motionTimer = null;
    roamState.moving = false;
    applyRoamStyles(getMilmaruVisualStage() !== 'yochiyochi');
    return;
  }
  applyRoamStyles();
  if (!roamState.timer) scheduleRoam(1600 + Math.random() * 1600);
}

function hasMojiPower(cost = 1) {
  return getInventoryCount('moji_power') >= cost;
}

function showNeedWritingMessage(cost = 1) {
  playSfx('mistake');
  const shortage = Math.max(1, cost - getInventoryCount('moji_power'));
  setSpeech('もじパワーが たりないよ', `あと ${shortage}かい もじをかくと、おせわが できるよ。`);
  setReaction(state.hatched ? 'worried' : 'relaxed', 1200);
  spawnFx('sparkle');
  saveState();
  render();
}

function spendMojiPower(cost, reason) {
  if (!hasMojiPower(cost)) {
    showNeedWritingMessage(cost);
    return false;
  }
  changeInventory('moji_power', -cost);
  return true;
}

function getNextGrowthProgress(sukusuku) {
  const stage = getGrowthStage(sukusuku);
  const max = stage.next;
  return {
    current: clamp(sukusuku, 0, max),
    max,
    percent: clamp((sukusuku / max) * 100, 0, 100)
  };
}

function getHiddenGrowthHint() {
  if (!state.hatched) {
    if (state.eggWarmth >= 95) return 'タマゴが そわそわしているよ。もうすぐ うまれそう。';
    if (state.eggWarmth >= 70) return 'タマゴの なかで、ちいさく コトコト うごいているよ。';
    return '';
  }
  const yochiyochiPhase = getYochiyochiPhase();
  if (yochiyochiPhase === 'almost_kids') {
    return `${getMilmaruName()}が 背のびして、いつもより たくましく見えるよ。`;
  }
  const progress = getNextGrowthProgress(Math.max(10, state.sukusuku));
  const remaining = progress.max - Math.max(10, state.sukusuku);
  if (remaining <= 0) return `${getMilmaruName()}が なんだか そわそわしているよ。`;
  if (remaining <= 6) return `${getMilmaruName()}が すこし 背のびしてるみたい。`;
  return '';
}

function getMemoLines(stage, mood, friendship) {
  if (!state.hatched) return ['タマゴの なかで すやすや。', 'ぽかぽかが だいすき！'];
  if (mood.id === 'sulky') return ['ちょっと すねているみたい。', 'もじをかいて おせわすると、すぐ げんきになるよ。'];
  if (mood.id === 'lonely') return ['すこし さみしかったみたい。', 'なでると ほっとするよ。'];
  if (friendship.level >= 4) return ['あなたの こえが だいすき！', 'もじをかくと、そばで おうえんするよ。'];
  if (friendship.level >= 3) return ['いっしょにいると にこにこ。', 'もじれんしゅうを みるのが すき。'];
  if (stage.id === 'baby') return ['ミルクのにおいが だいすき！', 'やさしくされると すぐ にこにこ。'];
  if (stage.id === 'yochiyochi') {
    const phase = getYochiyochiPhase();
    if (phase === 'crawl') return ['はいはいで にわを たんけん中。', '呼ぶと、こっちを ちらっと見るよ。'];
    if (phase === 'first_steps') return ['よちよち歩きが たのしいみたい。', 'ころばないように そっと見守ろう。'];
    return ['背のびが じょうずに なってきた。', '新しいことが できそうな 予感。'];
  }
  return ['やさしくて、がんばりやさん。', 'いろんなものに きょうみしんしん。'];
}

function getEggVisualClass() {
  if (state.eggWarmth >= 35) return 'egg-cracked';
  return 'egg-idle';
}

function renderActionMode() {
  const power = getInventoryCount('moji_power');
  const preferredFood = getPreferredFood();
  const preferredFoodCount = getInventoryCount(preferredFood.id);
  careActions.classList.toggle('egg-mode', !state.hatched);
  writeBtn.classList.toggle('warm-main', !state.hatched && power > 0);
  writeBtn.classList.toggle('needs-power', !state.hatched && power <= 0);
  if (state.hatched) {
    mainActionIcon.textContent = '';
    mainActionText.textContent = 'もじを かく！';
    mainActionHelp.textContent = 'もじを かいて おせわの もとを もらおう！';
  } else {
    mainActionIcon.textContent = power > 0 ? '' : '✏';
    mainActionText.textContent = power > 0 ? 'あたためる！' : 'もじを かく！';
    mainActionHelp.textContent = power > 0 ? 'もじパワーを 1つ つかう' : 'かくと あたためられるよ';
  }
  feedBtn.classList.toggle('milk', state.hatched && preferredFood.id === 'moji_milk');
  feedBtn.classList.toggle('has-cookie', state.hatched && preferredFoodCount > 0);
  feedBtn.querySelector('.action-icon').textContent = '';
  feedBtn.querySelector('.action-help').textContent = state.hatched
    ? `${preferredFood.name}を あげる`
    : 'うまれてから あげよう';
  const petButton = document.getElementById('petBtn');
  const playButton = document.getElementById('playBtn');
  petButton.classList.toggle('power-empty', !hasMojiPower(actionPowerCost.pet));
  playButton.classList.toggle('power-empty', !hasMojiPower(actionPowerCost.play));
  petButton.querySelector('.action-help').textContent = 'もじパワー1で なでる';
  playButton.querySelector('.action-help').textContent = 'もじパワー2で あそぶ';
}

function applyMilmaruClass(reaction) {
  const currentReaction = getDisplayReaction(reaction);
  const classes = ['milmaru'];
  if (state.hatched) {
    classes.push(getMilmaruVisualStage(), currentReaction);
    if (getMilmaruVisualStage() === 'yochiyochi' && currentReaction === 'normal' && roamState.moving) {
      classes.push(getYochiyochiMotionClass());
    }
  } else {
    classes.push('egg', getEggVisualClass(), currentReaction);
  }
  milmaru.className = classes.join(' ');
}

function setSpeech(text, message) {
  state.speech = text;
  speechBubble.textContent = getDisplaySpeech(text);
  if (message) bottomMessage.textContent = message;
}

function setReaction(reaction, duration = 950) {
  state.reaction = reaction;
  if (reaction !== 'normal') freezeRoamPosition();
  applyMilmaruClass(reaction);
  syncRoaming();
  clearTimeout(setReaction._timer);
  setReaction._timer = setTimeout(() => {
    state.reaction = 'normal';
    applyMilmaruClass('normal');
    speechBubble.textContent = getDisplaySpeech(state.speech);
    syncRoaming();
    saveState();
  }, duration);
}

function spawnFx(type) {
  const count = type === 'sparkle' ? 18 : 14;
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = `fx-piece ${i % 3 === 0 ? 'sparkle' : 'heart'}`;
    piece.style.setProperty('--x', (45 + Math.random() * 18) + '%');
    piece.style.setProperty('--y', (46 + Math.random() * 20) + '%');
    piece.style.setProperty('--dx', ((Math.random() - 0.5) * 180) + 'px');
    piece.style.setProperty('--dy', ((Math.random() - 0.5) * 40) + 'px');
    piece.style.animationDelay = (Math.random() * 0.15) + 's';
    fxLayer.appendChild(piece);
    setTimeout(() => piece.remove(), 1200);
  }
}

function getFoodMouthPoint() {
  const yardRect = document.querySelector('.center-yard').getBoundingClientRect();
  const wrapRect = milmaruWrap.getBoundingClientRect();
  if (!yardRect.width || !yardRect.height || !wrapRect.width) {
    return { x: 50, y: state.hatched ? 55 : 50 };
  }
  const visualStage = getMilmaruVisualStage();
  const mouthOffsetY = visualStage === 'baby' ? 0.48 : 0.38;
  const mouthOffsetX = visualStage === 'yochiyochi' ? 0.52 : 0.5;
  return {
    x: clamp(((wrapRect.left + wrapRect.width * mouthOffsetX - yardRect.left) / yardRect.width) * 100, 20, 80),
    y: clamp(((wrapRect.top + wrapRect.height * mouthOffsetY - yardRect.top) / yardRect.height) * 100, 18, 82)
  };
}

function spawnFoodFx(foodId) {
  const piece = document.createElement('div');
  piece.className = `food-fx ${foodId === 'moji_cookie' ? 'cookie' : 'milk'}`;
  const mouth = getFoodMouthPoint();
  piece.style.setProperty('--mouth-x', `${mouth.x}%`);
  piece.style.setProperty('--mouth-y', `${mouth.y}%`);
  fxLayer.appendChild(piece);
  setTimeout(() => piece.remove(), 1050);
}

function queueHatchStep(delay, fn) {
  const timer = setTimeout(fn, delay);
  hatchTimers.push(timer);
}

function clearHatchSceneTimers() {
  hatchTimers.forEach((timer) => clearTimeout(timer));
  hatchTimers = [];
}

function setHatchScenePhase(phase, copy, subcopy) {
  stageWrap.classList.add('hatch-active');
  stageEl.classList.add('hatch-active');
  hatchScene.className = `hatch-scene show phase-${phase}`;
  hatchScene.setAttribute('aria-hidden', 'false');
  hatchCopy.textContent = copy;
  hatchSubcopy.textContent = subcopy;
}

function hideHatchScene() {
  stageWrap.classList.remove('hatch-active');
  stageEl.classList.remove('hatch-active');
  hatchScene.className = 'hatch-scene';
  hatchScene.setAttribute('aria-hidden', 'true');
}

function renderNameModal() {
  if (!nameModal) return;
  const shouldShow = state.hatched && !state.named && !hatchingNow;
  const wasShown = nameModal.classList.contains('show');
  nameModal.classList.toggle('show', shouldShow);
  nameModal.setAttribute('aria-hidden', shouldShow ? 'false' : 'true');
  if (shouldShow && !wasShown) {
    nameInput.value = getMilmaruName();
    setTimeout(() => {
      nameInput.focus();
      nameInput.select();
    }, 80);
  }
}

function saveMilmaruName() {
  const nextName = sanitizeMilmaruName(nameInput.value);
  state.name = nextName;
  state.named = true;
  boostGokigen(10);
  state.speech = 'ふにゃ〜♪';
  bottomMessage.textContent = `${nextName}、よろしくね。もじミルクを あげてみよう。`;
  playSfx('select');
  saveState();
  render();
}

function startHatchScene() {
  clearHatchSceneTimers();
  setHatchScenePhase('notice', 'おや...？', 'タマゴの ようすが...');
  playSfx('warm');

  queueHatchStep(900, () => {
    setHatchScenePhase('ready', 'タマゴが かえりそうだぞ！', 'からが ぐらぐら ゆれているよ');
    playSfx('warm');
  });

  queueHatchStep(1900, () => {
    setHatchScenePhase('peek', 'パカッ！', 'ミルマルが でてきたよ！');
    playSfx('hatch');
    spawnFx('sparkle');
  });

  queueHatchStep(2800, () => {
    state.hatched = true;
    state.named = false;
    state.name = sanitizeMilmaruName(state.name);
    state.gokigen = 86;
    state.lastMoodAt = Date.now();
    state.sukusuku = Math.max(10, state.sukusuku);
    state.lastStageId = 'baby';
    state.reaction = 'birth';
    markCareInteraction();
    setSpeech('うまれたよ！', 'なまえを つけてあげよう。');
    setHatchScenePhase('born', 'ミルマルが うまれたよ！', 'なまえを つけてあげよう');
    spawnFx('sparkle');
    saveState();
    render();
  });

  queueHatchStep(4300, () => {
    hideHatchScene();
    hatchingNow = false;
    setReaction('birth', 1300);
    render();
  });

  queueHatchStep(5900, () => {
    if (state.reaction === 'normal' && state.named) {
      setSpeech('いっしょに もじを かこう！', 'もじを かくと、もじミルクと もじパワーが もらえるよ。');
      saveState();
      render();
    }
  });
}

function maybeHatchEgg() {
  if (state.hatched || state.eggWarmth < 100) return false;
  if (hatchingNow) return true;
  playSfx('warm');
  hatchingNow = true;
  state.reaction = 'warm';
  setSpeech('おや...？', 'タマゴの ようすが...');
  spawnFx('sparkle');
  saveState();
  render();
  clearHatchSceneTimers();
  queueHatchStep(850, startHatchScene);
  return true;
}

function warmEgg() {
  const now = Date.now();
  if (now - state.lastWarmAt < 650) return;
  if (!spendMojiPower(actionPowerCost.warm, 'warm')) return;
  playSfx('warm');
  state.lastWarmAt = now;
  markCareInteraction();
  state.eggWarmth = clamp(state.eggWarmth + 25, 0, 100);
  state.nakayoshi = clamp(state.nakayoshi + 1, 0, 100);
  if (state.eggWarmth >= 100) {
    maybeHatchEgg();
    return;
  }
  if (state.eggWarmth >= 70) {
    setSpeech('もうすぐ うまれそう！', 'タマゴの なかで ミルマルが うれしそうに うごいたよ。');
  } else if (state.eggWarmth >= 35) {
    setSpeech('ぽかぽか してきたよ', 'タマゴに ちいさな ひびが はいったみたい。');
  } else {
    setSpeech('あったかいね', 'やさしく あたためてあげよう。');
  }
  setReaction('warm', 900);
  spawnFx('sparkle');
  saveState();
  render();
}

function render() {
  state.nakayoshi = clamp(state.nakayoshi, 0, 100);
  applyGokigenDecay();
  state.gokigen = clamp(state.gokigen, 0, 100);
  state.sukusuku = clamp(state.sukusuku, 0, 100);
  state.eggWarmth = clamp(state.eggWarmth || 0, 0, 100);
  state.name = sanitizeMilmaruName(state.name);
  const displayName = getMilmaruName();
  const stage = getCareStage();
  const mood = getGokigenStatus();
  const friendship = getFriendshipTier();
  const memoLines = getMemoLines(stage, mood, friendship);

  document.title = `もじっこファーム | ${displayName}`;
  document.getElementById('titleName').textContent = displayName;
  document.getElementById('sideNameHeading').textContent = displayName;
  document.getElementById('milmaruNameDisplay').textContent = displayName;
  document.getElementById('milmaruLevel').textContent = String(state.hatched ? Math.max(1, Math.floor(state.sukusuku / 20) + 1) : 1);
  document.getElementById('growthStageName').textContent = stage.name;
  document.getElementById('moodChip').dataset.mood = mood.id;
  document.getElementById('moodLabel').textContent = mood.label;
  document.getElementById('memoLine1').textContent = memoLines[0];
  document.getElementById('memoLine2').textContent = memoLines[1];
  document.getElementById('starCount').textContent = String(state.stars);
  document.getElementById('nakayoshiText').textContent = `${state.nakayoshi} / 100`;
  document.getElementById('nakayoshiFill').style.width = `${state.nakayoshi}%`;
  document.getElementById('milkCount').textContent = String(getInventoryCount('moji_milk'));
  document.getElementById('cookieCount').textContent = String(getInventoryCount('moji_cookie'));
  document.getElementById('mojiPowerCount').textContent = String(getInventoryCount('moji_power'));
  feedBtn.classList.toggle('has-cookie', state.hatched && getInventoryCount(getPreferredFood().id) > 0);
  speechBubble.textContent = getDisplaySpeech(state.speech);
  const idleMood = (state.reaction || 'normal') === 'normal' ? getIdleMood() : null;
  if (idleMood) {
    bottomMessage.textContent = idleMood.message;
  } else {
    const hiddenGrowthHint = getHiddenGrowthHint();
    if (hiddenGrowthHint) bottomMessage.textContent = hiddenGrowthHint;
  }
  renderActionMode();
  applyMilmaruClass(state.reaction);
  syncRoaming();
  renderNameModal();
  renderDebugPanel();
}

function renderDebugPanel() {
  if (!debugMode || !debugPanel) return;
  document.getElementById('debugNakayoshi').value = String(state.nakayoshi);
  document.getElementById('debugGokigen').value = String(state.gokigen);
  document.getElementById('debugSukusuku').value = String(state.sukusuku);
  document.getElementById('debugEggWarmth').value = String(state.eggWarmth);
  document.getElementById('debugMojiPower').value = String(getInventoryCount('moji_power'));
  document.getElementById('debugMilkCount').value = String(getInventoryCount('moji_milk'));
  document.getElementById('debugCookieCount').value = String(getInventoryCount('moji_cookie'));
  document.getElementById('debugStars').value = String(state.stars);
  document.getElementById('debugHatched').checked = state.hatched;
}

function readDebugNumber(id, min, max) {
  const input = document.getElementById(id);
  const value = Number(input.value);
  if (!Number.isFinite(value)) return min;
  return clamp(Math.round(value), min, max);
}

function stopHatchingCutscene() {
  hatchingNow = false;
  clearHatchSceneTimers();
  hideHatchScene();
}

function applyDebugState(next = {}) {
  stopHatchingCutscene();
  if (Object.prototype.hasOwnProperty.call(next, 'name')) {
    state.name = sanitizeMilmaruName(next.name);
  }
  state.nakayoshi = next.nakayoshi ?? readDebugNumber('debugNakayoshi', 0, 100);
  state.gokigen = next.gokigen ?? readDebugNumber('debugGokigen', 0, 100);
  state.sukusuku = next.sukusuku ?? readDebugNumber('debugSukusuku', 0, 100);
  state.eggWarmth = next.eggWarmth ?? readDebugNumber('debugEggWarmth', 0, 100);
  state.inventory.moji_power.count = next.mojiPower ?? readDebugNumber('debugMojiPower', 0, 99);
  state.inventory.moji_milk.count = next.milk ?? readDebugNumber('debugMilkCount', 0, 99);
  state.inventory.moji_cookie.count = next.cookies ?? readDebugNumber('debugCookieCount', 0, 99);
  state.stars = next.stars ?? readDebugNumber('debugStars', 0, 99999);
  state.hatched = next.hatched ?? document.getElementById('debugHatched').checked;
  state.lastStageId = next.lastStageId || (state.hatched ? getCareStage().id : 'egg');
  if (Object.prototype.hasOwnProperty.call(next, 'named')) {
    state.named = next.named;
  } else if (!state.hatched) {
    state.named = false;
  }
  state.reaction = 'normal';
  state.lastCareAt = Date.now();
  state.lastMoodAt = Date.now();
  state.lastWarmAt = 0;
  state.lastPetAt = 0;
  state.speech = next.speech || (state.hatched ? 'いっしょに もじを かこう！' : 'まだ タマゴだよ');
  bottomMessage.textContent = next.message || 'デバッグ値を 反映したよ。';
  saveState();
  render();
}

function resetDebugState() {
  stopHatchingCutscene();
  state = cloneDefaultState();
  saveState();
  bottomMessage.textContent = 'デバッグ値を 初期化したよ。';
  render();
}

function consumePendingWritingReward() {
  let pending = null;
  try {
    const raw = localStorage.getItem(PENDING_REWARD_KEY);
    if (raw) pending = JSON.parse(raw);
    localStorage.removeItem(PENDING_REWARD_KEY);
  } catch (error) {
    console.warn('Could not consume writing reward:', error);
  }
  if (!pending || !pending.result || !pending.result.success) return false;
  const reward = pending.result.reward || getPreferredFood();
  if (state.inventory[reward.id]) {
    changeInventory(reward.id, 1);
  }
  changeInventory('moji_power', 1);
  state.stars += 25;
  markCareInteraction();
  if (state.hatched) {
    boostGokigen(8);
    const bonus = getFriendshipBonus();
    if (bonus) {
      state.stars += bonus.stars;
      if (bonus.power > 0) changeInventory('moji_power', bonus.power);
    }
    const stageMessage = getYochiyochiActionMessage('writing');
    setSpeech(`${reward.name || 'おやつ'}を もらったよ！`, bonus ? bonus.message : (stageMessage || `もじパワーも たまったよ。${getMilmaruName()}に おせわを してみよう！`));
    setReaction('happy');
  } else {
    setSpeech('もじパワーが たまったよ！', 'タマゴを あたためられるよ。ミルクは うまれてから あげよう。');
    setReaction('warm');
  }
  spawnFx('sparkle');
  saveState();
  return true;
}

function applyEntrySpeech() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('from') !== 'writing') return;
  if (!state.hatched) {
    if (getInventoryCount('moji_power') > 0) {
      setSpeech('タマゴを あたためよう！', 'もじパワーを つかって、ぽかぽか してあげよう。');
    } else {
      setSpeech('もじを かきにいこう！', 'もじを かくと、タマゴを あたためる パワーが たまるよ。');
    }
    saveState();
    return;
  }
  const food = getPreferredFood();
  if (getInventoryCount(food.id) > 0) {
    setSpeech(`${food.name} ほしいな〜`, `${food.name}を あげたら、${getMilmaruName()}が よろこぶよ。`);
  } else {
    setSpeech('いっしょに もじを かこう！', getYochiyochiActionMessage('writing') || `もじを かくと、${food.name}と もじパワーが もらえるよ。`);
  }
  saveState();
}

function feedCookie() {
  if (!state.hatched) {
    playSfx('mistake');
    setSpeech('まだ タマゴだよ', 'いまは もじパワーで あたためてあげよう。ミルクは うまれてからね。');
    setReaction('relaxed');
    spawnFx('sparkle');
    return;
  }
  const food = getPreferredFood();
  if (getInventoryCount(food.id) <= 0) {
    playSfx('mistake');
    setSpeech(`${food.name}が ないみたい。`, `もじを かくと ${food.name}が もらえるよ。`);
    setReaction('worried', 1200);
    return;
  }
  changeInventory(food.id, -1);
  playSfx('feed');
  markCareInteraction();
  boostGokigen(food.id === 'moji_milk' ? 24 : 20);
  state.nakayoshi = clamp(state.nakayoshi + food.gainNakayoshi, 0, 100);
  state.sukusuku = clamp(state.sukusuku + food.gainSukusuku, 0, 100);
  const didStageUp = syncGrowthStageChange();
  if (!didStageUp) {
    const growthHint = getHiddenGrowthHint();
    const stageMessage = getYochiyochiActionMessage('feed');
    setSpeech(food.id === 'moji_milk' ? 'ごくごく おいしい！' : 'おいしい！ ありがとう！', growthHint || stageMessage || `${food.name}を あげたよ。なかよしが ふえた！`);
    setReaction('eating');
  }
  spawnFoodFx(food.id);
  spawnFx('sparkle');
  saveState();
  render();
}

function petMilmaru() {
  const now = Date.now();
  if (now - state.lastPetAt < 700) return;
  if (!spendMojiPower(actionPowerCost.pet, 'pet')) return;
  playSfx('pet');
  state.lastPetAt = now;
  markCareInteraction();
  if (state.hatched) boostGokigen(12);
  state.nakayoshi = clamp(state.nakayoshi + 2, 0, 100);
  if (!state.hatched) {
    state.eggWarmth = clamp(state.eggWarmth + 8, 0, 100);
    setSpeech('ゆらゆら うごいたよ', 'タマゴを やさしく なでたら、すこし あったかく なったよ。');
    setReaction('relaxed');
    spawnFx('sparkle');
    saveState();
    render();
    maybeHatchEgg();
    return;
  }
  setSpeech('なでてくれて うれしい！', getYochiyochiActionMessage('pet') || `${getMilmaruName()}が ほっとしているよ。`);
  setReaction('relaxed');
  spawnFx('heart');
  saveState();
  render();
}

function playWithMilmaru() {
  if (!state.hatched) {
    playSfx('mistake');
    setSpeech('まだ タマゴだよ', 'いまは もじパワーで あたためるのが いちばん だいじ。');
    setReaction('warm');
    spawnFx('sparkle');
    return;
  }
  if (!spendMojiPower(actionPowerCost.play, 'play')) return;
  playSfx('play');
  markCareInteraction();
  boostGokigen(16);
  state.nakayoshi = clamp(state.nakayoshi + 3, 0, 100);
  state.sukusuku = clamp(state.sukusuku + 1, 0, 100);
  const didStageUp = syncGrowthStageChange();
  if (!didStageUp) {
    setSpeech('いっしょに あそぶの たのしい！', getYochiyochiActionMessage('play') || `${getMilmaruName()}が ぴょんぴょん はねたよ。`);
    setReaction('play');
  }
  spawnFx('sparkle');
  saveState();
  render();
}

function goWrite() {
  if (!state.hatched) {
    if (hasMojiPower(actionPowerCost.warm)) {
      warmEgg();
      return;
    }
    playSfx('select');
    setSpeech('もじを かきにいこう！', 'もじを かくと、タマゴを あたためる パワーが たまるよ。');
    saveState();
    setTimeout(() => {
      window.location.href = 'index.html?from=care';
    }, 180);
    return;
  }
  playSfx('select');
  setSpeech('もじを かきにいこう！', 'かけたら もじクッキーが もらえるよ。');
  setReaction('happy');
  saveState();
  setTimeout(() => {
    window.location.href = 'index.html?from=care';
  }, 180);
}

function setupDebugControls() {
  configureDebugModeFromQuery();
  if (!debugPanel) return;
  document.getElementById('debugApplyBtn').addEventListener('click', () => applyDebugState());
  document.getElementById('debugEgg75Btn').addEventListener('click', () => applyDebugState({
    hatched: false,
    gokigen: 80,
    eggWarmth: 75,
    sukusuku: 0,
    mojiPower: 1,
    speech: 'まだ タマゴだよ',
    message: 'あと 1かい あたためると 孵化演出を確認できるよ。'
  }));
  document.getElementById('debugPreHatchBtn').addEventListener('click', () => applyDebugState({
    hatched: false,
    gokigen: 80,
    eggWarmth: 99,
    sukusuku: 0,
    mojiPower: 1,
    speech: 'まだ タマゴだよ',
    message: 'あたためると すぐ孵化演出に入るよ。'
  }));
  document.getElementById('debugBabyBtn').addEventListener('click', () => applyDebugState({
    hatched: true,
    named: true,
    gokigen: Math.max(82, state.gokigen),
    eggWarmth: 100,
    sukusuku: Math.max(10, state.sukusuku),
    milk: Math.max(1, getInventoryCount('moji_milk')),
    mojiPower: Math.max(1, getInventoryCount('moji_power')),
    speech: 'いっしょに もじを かこう！',
    message: 'ベビー状態にしたよ。'
  }));
  document.getElementById('debugYochiyochiBtn').addEventListener('click', () => applyDebugState({
    hatched: true,
    named: true,
    gokigen: Math.max(82, state.gokigen),
    eggWarmth: 100,
    sukusuku: 30,
    cookies: Math.max(1, getInventoryCount('moji_cookie')),
    mojiPower: Math.max(3, getInventoryCount('moji_power')),
    speech: 'いっしょに もじを かこう！',
    message: 'よちよち期の はいはい状態にしたよ。'
  }));
  document.getElementById('debugAlmostKidsBtn').addEventListener('click', () => applyDebugState({
    hatched: true,
    named: true,
    gokigen: Math.max(86, state.gokigen),
    eggWarmth: 100,
    sukusuku: 46,
    cookies: Math.max(1, getInventoryCount('moji_cookie')),
    mojiPower: Math.max(3, getInventoryCount('moji_power')),
    speech: 'いっしょに もじを かこう！',
    message: '成長前の よちよち状態にしたよ。'
  }));
  document.getElementById('debugResetBtn').addEventListener('click', resetDebugState);
  document.getElementById('debugCloseBtn').addEventListener('click', () => {
    localStorage.removeItem(DEBUG_MODE_KEY);
    debugMode = false;
    stageEl.classList.remove('debug-mode');
  });
}

document.addEventListener('pointerdown', (event) => {
  const button = event.target.closest('button');
  if (!button || !stageEl.contains(button)) return;
  playSfx('button');
}, true);

document.getElementById('backBtn').addEventListener('click', () => {
  saveState();
  window.location.href = 'index.html?from=care';
});
document.getElementById('settingsBtn').addEventListener('click', () => {
  setSpeech('せっていは じゅんびちゅうだよ', 'また あとで つかえるようにするね。');
});
document.getElementById('inventoryBtn').addEventListener('click', () => {
  setSpeech('もちものは ここで みられるよ', 'もじを かくと、ミルク・クッキー・もじパワーが ふえるよ。');
});
document.getElementById('albumBtn').addEventListener('click', () => {
  setSpeech('アルバムは じゅんびちゅう！', 'かいた もじを あとで ならべよう。');
});
nameSaveBtn.addEventListener('click', saveMilmaruName);
nameInput.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') saveMilmaruName();
});
document.getElementById('feedBtn').addEventListener('click', feedCookie);
document.getElementById('petBtn').addEventListener('click', petMilmaru);
document.getElementById('playBtn').addEventListener('click', playWithMilmaru);
document.getElementById('writeBtn').addEventListener('click', goWrite);

setupDebugControls();
const consumedPendingReward = consumePendingWritingReward();
if (!consumedPendingReward) applyEntrySpeech();
render();

window.MojikkoCareGame = {
  getState: () => JSON.parse(JSON.stringify(state)),
  feedCookie,
  petMilmaru,
  playWithMilmaru,
  goWrite,
  warmEgg,
  applyDebugState,
  consumePendingWritingReward
};
</script>
