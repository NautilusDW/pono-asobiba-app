<!-- app (アプリばん) 専用 tier ガード。 tier.js 未読込/例外時は fail-open (従来通り表示)。 -->
<script src="../common/debug-mode.js"></script>
<script src="../common/tier.js"></script>
<script>
(function(){
  'use strict';
  var locked = false;
  try {
    var pt = window.PonoTier;
    // ローンチ時はここを変更: book 開放時は locked = !['app','book'].includes(pt.getTier());
    if (pt && typeof pt.getTier === 'function') locked = (pt.getTier() !== 'app');
  } catch (e) { locked = false; }
  if (!locked) return;
  window.__PONO_TIER_LOCKED__ = true;
  // FOUC 防止: head 内同期実行なので初回ペイント前にゲーム側 DOM を不可視化
  var st = document.createElement('style');
  st.textContent = 'html{background:#FFF7E6 !important}body>*:not(#ponoTierLockScreen){visibility:hidden !important}';
  (document.head || document.documentElement).appendChild(st);
  // キーボード入力がゲームへ届かないよう capture 段階で遮断 (ロック中のみ)。
  // ゲーム側 listener はガードより後に登録されるため stopImmediatePropagation だけで全て遮断できる。
  // preventDefault はしない: Tab/Enter で「メニューへ もどる」リンクに到達する
  // キーボード操作と、 ブラウザ既定動作 (F5 リロード等) を塞がないため。
  var KEY_EVTS = ['keydown', 'keyup', 'keypress'];
  for (var i = 0; i < KEY_EVTS.length; i++) {
    window.addEventListener(KEY_EVTS[i], function(e){
      if (window.__PONO_TIER_LOCKED__) e.stopImmediatePropagation();
    }, true);
  }
  function showLock(){
    if (!document.body || document.getElementById('ponoTierLockScreen')) return;
    var ov = document.createElement('div');
    ov.id = 'ponoTierLockScreen';
    ov.setAttribute('role', 'dialog');
    ov.style.cssText = 'position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(165deg,#FFF7E6 0%,#FFEDC2 45%,#D9EFD5 100%);font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif;text-align:center';
    var card = document.createElement('div');
    card.style.cssText = 'background:#fff;border-radius:26px;padding:28px 24px 26px;max-width:340px;width:100%;box-shadow:0 12px 40px rgba(93,78,55,0.22)';
    var emo = document.createElement('div');
    emo.style.cssText = 'font-size:2.8rem;line-height:1;margin-bottom:12px';
    emo.textContent = '🦉✨';
    card.appendChild(emo);
    var tag = document.createElement('div');
    tag.style.cssText = 'display:inline-block;font-size:0.74rem;font-weight:900;color:#fff;background:linear-gradient(135deg,#34D399,#10B981);padding:4px 14px;border-radius:50px;letter-spacing:0.06em;margin-bottom:12px';
    tag.textContent = 'アプリばん せんよう';
    card.appendChild(tag);
    var ttl = document.createElement('div');
    ttl.style.cssText = 'font-size:1.12rem;font-weight:900;color:#5D4E37;line-height:1.5;margin-bottom:10px';
    ttl.textContent = 'この ゲームは アプリばんで あそべるよ！';
    card.appendChild(ttl);
    var body = document.createElement('div');
    body.style.cssText = 'font-size:0.92rem;font-weight:700;color:#8B7B60;line-height:1.6;margin-bottom:18px';
    body.textContent = 'アプリばんに あたらしい あそびが まってるよ';
    card.appendChild(body);
    var btn = document.createElement('a');
    btn.href = '../play.html';
    btn.style.cssText = 'display:inline-block;padding:12px 34px;border-radius:50px;background:linear-gradient(135deg,#60A5FA,#3B82F6);color:#fff;font-size:0.98rem;font-weight:900;text-decoration:none;box-shadow:0 4px 14px rgba(59,130,246,0.4)';
    btn.textContent = 'メニューへ もどる';
    card.appendChild(btn);
    ov.appendChild(card);
    document.body.appendChild(ov);
  }
  if (document.body) { showLock(); }
  else { document.addEventListener('DOMContentLoaded', showLock); }
})();
</script>

.char-spacer {

.char-button.active {

.char-button.active .cursor {

}

.char-button.done .done-mark {

}

.char-button.done {

}

.char-button.done.active {

}

.companion-card {

.companion-card:focus-visible {

@keyframes careCardGlow {

.companion-alert {

.companion-cookie {

.companion-cookie.star {

}

.companion-cookie.milk {

.companion-name {

}

.companion-level {
  position: absolute;

  color: var(--ink-soft);

}

.pixel-creature {

.pixel-creature .body,
.pixel-creature .face,

.companion-card.egg-state .pixel-creature,

.companion-card.hatched-state .pixel-creature {
  background-image: var(--moji-milmaru-baby);
}

.companion-card.yochiyochi-state .pixel-creature {

  height: 154px;
  background-image: var(--moji-milmaru-yochiyochi);
}

.companion-card.celebrate .pixel-creature {
  background-image: var(--moji-milmaru-cheer);

}

  background-image: var(--moji-milmaru-yochiyochi);
}

.companion-card.egg-state.celebrate .pixel-creature {
  background-image: var(--moji-milmaru-egg);
}

@keyframes creatureIdle {

  50% { transform: translateX(-50%) translateY(-6px); }
}

@keyframes creatureCheer {
  0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
  35% { transform: translateX(-50%) translateY(-18px) rotate(-5deg); }
  70% { transform: translateX(-50%) translateY(-10px) rotate(5deg); }
}

.companion-speech {
  position: absolute;
  left: 14px;
  right: 14px;
  top: 50px;
  bottom: auto;
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 7px 10px 6px;
  border: 3px solid rgba(139, 96, 66, 0.42);
  border-radius: 8px;
  background: rgba(255, 253, 245, 0.82);
  box-shadow: inset 0 0 0 3px rgba(255,255,255,0.35);
  font-family: var(--pixel-font);
  font-size: 15px;
  line-height: 1.28;
  text-align: center;
  white-space: pre-line;
}

.companion-speech::after {
  content: '';
  position: absolute;
  left: 50%;
  bottom: -13px;
  width: 20px;
  height: 20px;
  border-right: 3px solid rgba(139, 96, 66, 0.42);
  border-bottom: 3px solid rgba(139, 96, 66, 0.42);
  background: rgba(255, 253, 245, 0.92);
  transform: translateX(-50%) rotate(45deg);
}

.center-stage {
  position: relative;
  display: grid;
  grid-template-rows: 84px 1fr 76px;
  gap: 8px;
  min-width: 0;
}

.prompt-bar {
  position: relative;
  justify-self: center;
  width: min(820px, 100%);
  height: 84px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border: 0;
  border-radius: 0;
  background: var(--moji-prompt-sign) center / 100% 100% no-repeat;
  box-shadow: none;
  font-family: var(--pixel-font);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: #4f3825;
  text-shadow:
    2px 2px 0 rgba(255, 255, 255, 0.78),
    0 2px 0 rgba(89, 131, 82, 0.18);
  image-rendering: pixelated;
}

.prompt-bar::before,
.prompt-bar::after {
  display: none;
}

.prompt-bar::before {
  left: 10px;
  clip-path: polygon(0 0, 100% 0, 74% 100%, 0 72%);
}

.prompt-bar::after {
  right: 10px;
  clip-path: polygon(0 0, 100% 0, 100% 72%, 26% 100%);
}

.writing-board-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 0;
}

.writing-board {
  position: relative;
  width: min(640px, 100%);
  aspect-ratio: 551 / 494;
  background: var(--moji-writing-board) center / 100% 100% no-repeat;
  border: 0;
  border-radius: 0;
  box-shadow: none;
  overflow: visible;
  image-rendering: pixelated;
}

.writing-board::before,
.writing-board::after {
  display: none;
}

.writing-board::before {
  inset: 18px;
  z-index: 1;
  background:
    linear-gradient(90deg, transparent calc(50% - 2px), rgba(130, 207, 226, 0.72) calc(50% - 2px) calc(50% + 2px), transparent calc(50% + 2px)),
    linear-gradient(0deg, transparent calc(50% - 2px), rgba(130, 207, 226, 0.72) calc(50% - 2px) calc(50% + 2px), transparent calc(50% + 2px)),
    repeating-linear-gradient(180deg, rgba(192, 158, 98, 0.12) 0 3px, transparent 3px 21px),
    linear-gradient(180deg, #fffdf3 0%, #fff4d7 100%);
  box-shadow:
    inset 0 0 0 4px #ffe1a6,
    inset 0 0 18px rgba(121, 78, 36, 0.12);
}

.writing-board::after {
  inset: 10px;
  z-index: 2;
  background:
    linear-gradient(135deg, transparent 0 37%, #efe5c8 38% 62%, transparent 63%) left top / 72px 72px no-repeat,
    linear-gradient(45deg, transparent 0 37%, #efe5c8 38% 62%, transparent 63%) right top / 72px 72px no-repeat,
    linear-gradient(45deg, transparent 0 37%, #efe5c8 38% 62%, transparent 63%) left bottom / 72px 72px no-repeat,
    linear-gradient(135deg, transparent 0 37%, #efe5c8 38% 62%, transparent 63%) right bottom / 72px 72px no-repeat;
  opacity: 0.9;
}

.writing-board.success {
  animation: boardPulse 0.7s ease 2;
}

@keyframes boardPulse {
  0%, 100% { filter: brightness(1); }
  45% { filter: brightness(1.12) drop-shadow(0 0 18px rgba(255, 221, 106, 0.95)); }
}

#writerTarget,
#pixelTrailCanvas {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 78.5%;
  height: auto;
  aspect-ratio: 1 / 1;
  translate: -50% -50%;
}

#writerTarget {
  z-index: 3;
}

#writerTarget svg {
  display: block;
  width: 100%;
  height: 100%;
  overflow: visible;
  opacity: 0.001;
}

#writerTarget svg path,
#writerTarget svg line {
  filter: none;
}

#pixelTrailCanvas {
  z-index: 4;
  pointer-events: none;
  image-rendering: pixelated;
}

.stroke-number-overlay {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 78.5%;
  height: auto;
  aspect-ratio: 1 / 1;
  translate: -50% -50%;

  pointer-events: none;
}

.guide-stroke-number {
  position: absolute;
  width: 42px;
  height: 42px;

  align-items: center;
  justify-content: center;
  transform: translate(-50%, -50%);
  border: 4px solid #875b3b;
  border-radius: 8px;
  background:
    linear-gradient(180deg, #fff8df 0%, #f3cf8d 100%);
  box-shadow:
    0 4px 0 #6f462c,
    inset 0 3px rgba(255, 255, 255, 0.58);
  color: #5b3b29;
  font-family: var(--pixel-font);
  font-size: 23px;
  font-weight: 700;
  line-height: 1;
  text-shadow: 1px 1px rgba(255, 255, 255, 0.7);
}

.guide-stroke-number.current {
  border-color: #d56844;
  background: linear-gradient(180deg, #fff3bd 0%, #ffad67 100%);
  box-shadow:
    0 4px 0 #8d4d31,
    0 0 0 5px rgba(255, 207, 102, 0.45),
    inset 0 3px rgba(255, 255, 255, 0.58);
}

.guide-stroke-number.done {
  border-color: #398863;
  background: linear-gradient(180deg, #eafff2 0%, #9fddb9 100%);
  box-shadow:
    0 4px 0 #2e6a4e,
    inset 0 3px rgba(255, 255, 255, 0.58);
  opacity: 0.82;
}

.board-particle {
  position: absolute;
  z-index: 8;
  width: 12px;
  height: 12px;

  background: #ffe26a;
  clip-path: polygon(50% 0, 63% 34%, 100% 36%, 71% 58%, 82% 96%, 50% 74%, 18% 96%, 29% 58%, 0 36%, 37% 34%);
  animation: particleRise 0.9s ease-out forwards;
}

@keyframes particleRise {

  100% { opacity: 0; transform: translate(-50%, -80px) scale(1.4); }
}

.message-box {

}

.stroke-list {

.stroke-label {

function getAudioContext() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return null;
  if (!audioCtx) audioCtx = new AudioContextClass();
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  return audioCtx;
}

function playTone(frequency, duration = 0.06, type = 'square', volume = 0.035, delay = 0) {
  const ctx = getAudioContext();
  if (!ctx) return;
  const start = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(volume, start + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.02);
}

function playNoise(duration = 0.045, volume = 0.018) {
  const ctx = getAudioContext();
  if (!ctx) return;
  const sampleCount = Math.max(1, Math.floor(ctx.sampleRate * duration));
  const buffer = ctx.createBuffer(1, sampleCount, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < sampleCount; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / sampleCount);
  }
  const source = ctx.createBufferSource();
  const gain = ctx.createGain();
  gain.gain.value = volume;
  source.buffer = buffer;
  source.connect(gain);
  gain.connect(ctx.destination);
  source.start();
}

function playSfx(kind) {
  try {
    if (kind === 'writeMove') {
      playNoise(0.028, 0.010);
      return;
    }
    if (kind === 'writeStart') {
      playTone(430, 0.045, 'triangle', 0.026);
      return;
    }
    if (kind === 'strokeOk') {
      playTone(720, 0.055, 'square', 0.036);
      playTone(960, 0.07, 'square', 0.032, 0.055);
      return;
    }
    if (kind === 'complete') {
      [660, 820, 1040].forEach((freq, i) => playTone(freq, 0.08, 'square', 0.034, i * 0.075));
      return;
    }
    if (kind === 'mistake') {
      playTone(220, 0.07, 'triangle', 0.026);
      playTone(170, 0.08, 'triangle', 0.021, 0.055);
      return;
    }
    if (kind === 'select') {
      playTone(560, 0.04, 'square', 0.028);
      playTone(720, 0.05, 'square', 0.024, 0.04);
      return;
    }
    playTone(510, 0.045, 'square', 0.026);
  } catch (_) {}
}

function getLocalDateKey(timestamp = Date.now()) {
  const date = new Date(timestamp);
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function createFeedingDay(timestamp = Date.now(), lastSeenAt = timestamp) {
  return {
    localDateKey: getLocalDateKey(timestamp),
    claimed: {},
    lastSeenAt: Number.isFinite(lastSeenAt) ? lastSeenAt : timestamp
  };
}

function normalizeFeedingDay(value, timestamp = Date.now()) {
  const todayKey = getLocalDateKey(timestamp);
  const existingLastSeenAt = Number.isFinite(value && value.lastSeenAt) ? value.lastSeenAt : timestamp;
  if (!value || value.localDateKey !== todayKey) return createFeedingDay(timestamp, existingLastSeenAt);
  const rawClaims = value.claimed || {};
  const claimed = {};
  DAILY_FEEDING_SLOTS.forEach((slot) => {
    const claim = rawClaims[slot.id];
    if (claim === true) {
      claimed[slot.id] = true;
    } else if (claim && typeof claim === 'object') {
      claimed[slot.id] = JSON.parse(JSON.stringify(claim));
    }
  });
  return {
    localDateKey: todayKey,
    claimed,
    lastSeenAt: existingLastSeenAt
  };
}

function migrateFoodSystemV2(merged, parsed) {
  const previousVersion = Number(parsed && parsed.foodSystemVersion) || 0;
  if (previousVersion < FOOD_SYSTEM_VERSION && merged.hatched && merged.sukusuku >= 38) {
    merged.inventory.moji_gohan.count = Math.min(99, merged.inventory.moji_gohan.count + 3);
  }
  merged.foodSystemVersion = FOOD_SYSTEM_VERSION;
  merged.feedingDay = normalizeFeedingDay(parsed && parsed.feedingDay);
}

function loadCareState() {
  try {
    const saved = localStorage.getItem(CARE_STATE_KEY);
    if (!saved) return cloneDefaultCareState();
    const parsed = JSON.parse(saved);
    const merged = cloneDefaultCareState();
    merged.name = parsed.name || merged.name;
    merged.named = parsed.named === true;
    merged.nakayoshi = Number.isFinite(parsed.nakayoshi) ? parsed.nakayoshi : merged.nakayoshi;
    merged.gokigen = Number.isFinite(parsed.gokigen) ? parsed.gokigen : merged.gokigen;
    merged.sukusuku = Number.isFinite(parsed.sukusuku) ? parsed.sukusuku : merged.sukusuku;
    merged.eggWarmth = Number.isFinite(parsed.eggWarmth) ? Math.max(0, Math.min(100, parsed.eggWarmth)) : merged.eggWarmth;
    merged.hatched = parsed.hatched === true;
    merged.stars = Number.isFinite(parsed.stars) ? parsed.stars : merged.stars;
    if (!merged.hatched && merged.eggWarmth === 0 && merged.stars >= 1000) {
      merged.stars = 0;
    }
    merged.speech = parsed.speech || (merged.hatched ? 'いっしょに もじを かこう！' : 'まだ タマゴだよ');
    merged.reaction = parsed.reaction || merged.reaction;
    merged.lastPetAt = Number.isFinite(parsed.lastPetAt) ? parsed.lastPetAt : merged.lastPetAt;
    merged.lastWarmAt = Number.isFinite(parsed.lastWarmAt) ? parsed.lastWarmAt : merged.lastWarmAt;
    merged.lastMoodAt = Number.isFinite(parsed.lastMoodAt) ? parsed.lastMoodAt : merged.lastMoodAt;
    merged.lastCareAt = Number.isFinite(parsed.lastCareAt) ? parsed.lastCareAt : Date.now();
    merged.lastStageId = parsed.lastStageId || (merged.hatched ? getCurrentCareStageIdFromSukusuku(merged.sukusuku) : 'egg');
    if (parsed.inventory) {
      Object.keys(merged.inventory).forEach((id) => {
        if (parsed.inventory[id]) {
          merged.inventory[id].count = Math.max(0, Number(parsed.inventory[id].count) || 0);
        }
      });
    }
    migrateFoodSystemV2(merged, parsed);
    return merged;
  } catch (error) {
    console.warn('Could not load care state:', error);
    return cloneDefaultCareState();
  }
}

function getNextScheduledFoodReward() {
  careState.feedingDay = normalizeFeedingDay(careState.feedingDay);
  const available = {
    moji_gohan: getInventoryCount('moji_gohan'),
    moji_cookie: getInventoryCount('moji_cookie')
  };
  const pendingFoodId = getPendingRewardFoodId();
  if (Object.prototype.hasOwnProperty.call(available, pendingFoodId)) {
    available[pendingFoodId] += 1;
  }

  const claimed = careState.feedingDay && careState.feedingDay.claimed || {};
  const openToday = DAILY_FEEDING_SLOTS.filter((slot) => !claimed[slot.id]);
  const inventorySteps = available.moji_gohan + available.moji_cookie;
  const stepsToCheck = openToday.length + inventorySteps + DAILY_FEEDING_SLOTS.length + 1;

  for (let index = 0; index < stepsToCheck; index += 1) {
    const slot = index < openToday.length
      ? openToday[index]
      : DAILY_FEEDING_SLOTS[(index - openToday.length) % DAILY_FEEDING_SLOTS.length];
    if (available[slot.foodId] > 0) {
      available[slot.foodId] -= 1;
      continue;
    }
    return careFoodRewards[slot.foodId];
  }
  return careFoodRewards.moji_gohan;
}

function normalizeWritingCompletedIds(value) {
  if (!Array.isArray(value)) return [];
  const requestedIds = new Set(value.filter((id) => typeof id === 'string'));
  return writingCharacters
    .filter((item) => requestedIds.has(item.id))
    .map((item) => item.id);
}

function getWritingCharacterIndex(characterId) {
  return writingCharacters.findIndex((item) => item.id === characterId);
}

function findFirstIncompleteWritingIndex(startIndex, completedIds) {
  if (!writingCharacters.length) return 0;
  const completedIdSet = new Set(normalizeWritingCompletedIds(completedIds));
  if (completedIdSet.size >= writingCharacters.length) return 0;
  const numericStart = Number.isInteger(startIndex) ? startIndex : 0;
  const normalizedStart = ((numericStart % writingCharacters.length) + writingCharacters.length)
    % writingCharacters.length;
  for (let offset = 0; offset < writingCharacters.length; offset += 1) {
    const index = (normalizedStart + offset) % writingCharacters.length;
    if (!completedIdSet.has(writingCharacters[index].id)) return index;
  }
  return 0;
}

function getNormalizedWritingCursorIndex(cursorId, completedIds) {
  const storedIndex = getWritingCharacterIndex(cursorId);
  return findFirstIncompleteWritingIndex(storedIndex >= 0 ? storedIndex : 0, completedIds);
}

function writeWritingCompletedMarker(characterId) {
  if (getWritingCharacterIndex(characterId) < 0) return;
  try {
    localStorage.setItem(`${WRITING_COMPLETED_MARKER_PREFIX}${characterId}`, '1');
  } catch (error) {
    console.warn('Could not save writing completion marker:', error);
  }
}

function readWritingCompletedMarkers() {
  const markerIds = [];
  try {
    if (typeof localStorage.key !== 'function') return markerIds;
    for (let index = 0; index < localStorage.length; index += 1) {
      const key = localStorage.key(index);
      if (typeof key !== 'string' || !key.startsWith(WRITING_COMPLETED_MARKER_PREFIX)) continue;
      const characterId = key.slice(WRITING_COMPLETED_MARKER_PREFIX.length);
      if (getWritingCharacterIndex(characterId) < 0 || localStorage.getItem(key) !== '1') continue;
      markerIds.push(characterId);
    }
  } catch (error) {
    console.warn('Could not load writing completion markers:', error);
  }
  return normalizeWritingCompletedIds(markerIds);
}

function readWritingProgressV2() {
  try {
    const raw = localStorage.getItem(WRITING_PROGRESS_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed) || parsed.version !== 2) return null;
    const cursorId = typeof parsed.cursorId === 'string'
      && writingCharacters.some((item) => item.id === parsed.cursorId)
      ? parsed.cursorId
      : '';
    return {
      version: 2,
      cursorId,
      completedIds: normalizeWritingCompletedIds(parsed.completedIds)
    };
  } catch (error) {
    console.warn('Could not load writing progress:', error);
    return null;
  }
}

function readLegacyWritingCursor() {
  try {
    const raw = localStorage.getItem(WRITING_CURSOR_KEY);
    if (!raw) return '';
    let parsed = raw;
    try {
      parsed = JSON.parse(raw);
    } catch (_) {
      // Some early builds stored the stable ID without JSON encoding.
    }
    const cursorId = typeof parsed === 'string'
      ? parsed
      : parsed && typeof parsed.characterId === 'string' ? parsed.characterId : '';
    return writingCharacters.some((item) => item.id === cursorId) ? cursorId : '';
  } catch (error) {
    console.warn('Could not load legacy writing cursor:', error);
    return '';
  }
}

function getMergedWritingCompletedIds(storedProgress) {
  const mergedCompletedIds = new Set(storedProgress ? storedProgress.completedIds : []);
  readWritingCompletedMarkers().forEach((id) => mergedCompletedIds.add(id));
  completedCharacters.forEach((id) => mergedCompletedIds.add(id));
  return normalizeWritingCompletedIds(Array.from(mergedCompletedIds));
}

function getStoredWritingCursorId(storedProgress) {
  if (storedProgress && storedProgress.cursorId) return storedProgress.cursorId;
  return readLegacyWritingCursor() || (writingCharacters[0] ? writingCharacters[0].id : '');
}

function writeWritingProgress(cursorIndex, completedIds) {
  const item = writingCharacters[cursorIndex] || writingCharacters[0];
  if (!item) return 0;
  const normalizedCompletedIds = normalizeWritingCompletedIds(completedIds);
  try {
    localStorage.setItem(WRITING_PROGRESS_KEY, JSON.stringify({
      version: 2,
      cursorId: item.id,
      completedIds: normalizedCompletedIds
    }));
  } catch (error) {
    console.warn('Could not save writing progress:', error);
  }
  // Keep the old cursor readable by builds that have not learned the V2 schema yet.
  // This is deliberately independent from the V2 write so a quota/privacy failure
  // on either key cannot prevent the other fallback from being attempted.
  try {
    localStorage.setItem(WRITING_CURSOR_KEY, JSON.stringify({ characterId: item.id }));
  } catch (error) {
    console.warn('Could not save legacy writing cursor:', error);
  }
  return getWritingCharacterIndex(item.id);
}

function saveWritingCursor(completedCharacterId) {
  if (getWritingCharacterIndex(completedCharacterId) >= 0) {
    completedCharacters.add(completedCharacterId);
    // Per-character keys are idempotent and cannot overwrite another tab's success.
    // V2 remains a compact cache rebuilt from these durable facts on every load.
    writeWritingCompletedMarker(completedCharacterId);
  }
  const storedProgress = readWritingProgressV2();
  const completedIds = getMergedWritingCompletedIds(storedProgress);
  completedIds.forEach((id) => completedCharacters.add(id));
  const cursorIndex = getNormalizedWritingCursorIndex(
    getStoredWritingCursorId(storedProgress),
    completedIds
  );
  writeWritingProgress(cursorIndex, completedIds);
  return cursorIndex;
}

function loadWritingProgress() {
  const storedProgress = readWritingProgressV2();
  const completedIds = getMergedWritingCompletedIds(storedProgress);
  const cursorIndex = getNormalizedWritingCursorIndex(
    getStoredWritingCursorId(storedProgress),
    completedIds
  );
  return {
    version: 2,
    cursorId: writingCharacters[cursorIndex] ? writingCharacters[cursorIndex].id : '',
    completedIds
  };
}

function getInitialWritingIndex(progress = loadWritingProgress()) {
  const index = writingCharacters.findIndex((item) => item.id === progress.cursorId);
  return index >= 0 ? index : 0;
}

function writingProgressMatches(storedProgress, cursorId, completedIds) {
  if (!storedProgress || storedProgress.cursorId !== cursorId) return false;
  if (storedProgress.completedIds.length !== completedIds.length) return false;
  return storedProgress.completedIds.every((id, index) => id === completedIds[index]);
}

function reconcileWritingProgressFromStorage() {
  const storedProgress = readWritingProgressV2();
  const completedIds = getMergedWritingCompletedIds(storedProgress);
  completedIds.forEach((id) => completedCharacters.add(id));
  const cursorIndex = getNormalizedWritingCursorIndex(
    getStoredWritingCursorId(storedProgress),
    completedIds
  );
  const cursorId = writingCharacters[cursorIndex] ? writingCharacters[cursorIndex].id : '';
  if (!writingProgressMatches(storedProgress, cursorId, completedIds)) {
    writeWritingProgress(cursorIndex, completedIds);
  }
  if (typeof updateCharacterButtons === 'function') updateCharacterButtons();
  if (complete && Number.isInteger(pendingNextWritingIndex)) {
    pendingNextWritingIndex = cursorIndex;
    if (modalRetryBtn && writingCharacters[cursorIndex]) {
      modalRetryBtn.textContent = `つぎは「${writingCharacters[cursorIndex].char}」`;
    }
  }
  return { version: 2, cursorId, completedIds };
}

function handleWritingProgressStorageEvent(event) {
  if (event.storageArea && event.storageArea !== localStorage) return;
  if (event.key === WRITING_PROGRESS_KEY) {
    reconcileWritingProgressFromStorage();
    return;
  }
  if (typeof event.key === 'string' && event.key.startsWith(WRITING_COMPLETED_MARKER_PREFIX)) {
    const characterId = event.key.slice(WRITING_COMPLETED_MARKER_PREFIX.length);
    if (event.newValue === '1' && getWritingCharacterIndex(characterId) >= 0) {
      reconcileWritingProgressFromStorage();
    }
    return;
  }
  handleWritingModeStorageEvent(event);
}

window.addEventListener('storage', handleWritingProgressStorageEvent);

function hashWritingModeSeed(value) {
  let hash = 0x811c9dc5;
  const text = String(value || '');
  for (let index = 0; index < text.length; index += 1) {
    hash ^= text.charCodeAt(index);
    hash = Math.imul(hash, 0x01000193);
  }
  return hash >>> 0;
}

function createWritingModeRandom(seed) {
  let state = seed >>> 0;
  return function nextRandom() {
    state = (state + 0x6d2b79f5) | 0;
    let value = state;
    value = Math.imul(value ^ (value >>> 15), value | 1);
    value ^= value + Math.imul(value ^ (value >>> 7), value | 61);
    return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
  };
}

function seededWritingModeShuffle(values, seedText) {
  const shuffled = Array.isArray(values) ? values.slice() : [];
  const random = createWritingModeRandom(hashWritingModeSeed(seedText));
  for (let index = shuffled.length - 1; index > 0; index -= 1) {
    const swapIndex = Math.floor(random() * (index + 1));
    const temp = shuffled[index];
    shuffled[index] = shuffled[swapIndex];
    shuffled[swapIndex] = temp;
  }
  return shuffled;
}

function getCharacterIdForWritingChar(char) {
  const item = writingCharacters.find((candidate) => candidate.char === char);
  return item ? item.id : '';
}

function buildValidatedWordHoleCatalog(wordData) {
  if (!wordData || typeof wordData !== 'object' || Array.isArray(wordData)) return [];
  const sourceByWord = new Map();
  ['easy', 'normal', 'challenge'].forEach((level) => {
    const entries = Array.isArray(wordData[level]) ? wordData[level] : [];
    entries.forEach((entry) => {
      if (!entry || typeof entry.word !== 'string' || typeof entry.emoji !== 'string') return;
      const emoji = entry.emoji.trim();
      if (!emoji) return;
      if (!sourceByWord.has(entry.word)) sourceByWord.set(entry.word, { ...entry, emoji });
    });
  });

  const answerIds = new Set();
  const catalog = [];
  for (const blueprint of WORD_HOLE_BLUEPRINTS) {
    const source = sourceByWord.get(blueprint.word);
    const wordChars = Array.from(String(blueprint.word || '').normalize('NFC'));
    if (!source || wordChars.length < 2 || wordChars.length > 4) return [];
    if (!Number.isInteger(blueprint.blankIndex) || blueprint.blankIndex < 0 || blueprint.blankIndex >= wordChars.length) return [];
    const answer = wordChars[blueprint.blankIndex];
    const characterId = getCharacterIdForWritingChar(answer);
    if (!characterId || !WORD_HOLE_CLEAR_KANA.has(answer) || answerIds.has(characterId)) return [];
    answerIds.add(characterId);
    catalog.push({
      id: `word:${blueprint.word}:${blueprint.blankIndex}`,
      word: blueprint.word,
      emoji: source.emoji,
      blankIndex: blueprint.blankIndex,
      answer,
      characterId
    });
  }
  return catalog.length === WORD_HOLE_BLUEPRINTS.length ? catalog : [];
}

function createWordHoleSession(ordinal, catalog = wordHoleCatalog) {
  if (!Array.isArray(catalog) || catalog.length < WORD_HOLE_SESSION_SIZE) return null;
  const normalizedOrdinal = Number.isSafeInteger(ordinal) && ordinal >= 0 && ordinal <= WORD_HOLE_MAX_ORDINAL
    ? ordinal
    : 0;
  const tasks = seededWritingModeShuffle(catalog, `mojikko-word-hole:${normalizedOrdinal}`)
    .slice(0, WORD_HOLE_SESSION_SIZE)
    .map((task) => task.id);
  const nonce = createWordHoleSessionNonce();
  const sessionId = createWordHoleSessionId(normalizedOrdinal, tasks, nonce);
  return {
    version: 1,
    nonce,
    sessionId,
    planId: sessionId,
    ordinal: normalizedOrdinal,
    tasks,
    completedTaskIds: []
  };
}

function createWordHoleSessionNonce() {
  try {
    if (typeof crypto !== 'undefined' && crypto && typeof crypto.randomUUID === 'function') {
      return crypto.randomUUID();
    }
  } catch (_) {}
  return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}-${Math.random().toString(36).slice(2)}`;
}

function createLegacyWordHoleSessionNonce(ordinal, tasks) {
  return `legacy-${hashWritingModeSeed(`${ordinal}:${(Array.isArray(tasks) ? tasks : []).join('|')}`).toString(36)}`;
}

function createWordHoleSessionId(ordinal, tasks, nonce) {
  return `word-hole-${ordinal}:${nonce}:${(Array.isArray(tasks) ? tasks : []).join('|')}`;
}

function normalizeWordHoleState(value, catalog = wordHoleCatalog) {
  if (!value || typeof value !== 'object' || Array.isArray(value) || value.version !== 1) return null;
  if (!Number.isSafeInteger(value.ordinal) || value.ordinal < 0 || value.ordinal > WORD_HOLE_MAX_ORDINAL) return null;
  const catalogIds = new Set((Array.isArray(catalog) ? catalog : []).map((task) => task.id));
  if (!Array.isArray(value.tasks) || value.tasks.length !== WORD_HOLE_SESSION_SIZE) return null;
  if (new Set(value.tasks).size !== WORD_HOLE_SESSION_SIZE || value.tasks.some((id) => !catalogIds.has(id))) return null;
  const legacySessionId = `word-hole-${value.ordinal}`;
  const legacySnapshotId = `word-hole-${value.ordinal}:${value.tasks.join('|')}`;
  const hasNonce = typeof value.nonce === 'string' && /^[A-Za-z0-9_-]{8,128}$/.test(value.nonce);
  if (value.nonce !== undefined && !hasNonce) return null;
  const nonce = hasNonce ? value.nonce : createLegacyWordHoleSessionNonce(value.ordinal, value.tasks);
  const sessionId = createWordHoleSessionId(value.ordinal, value.tasks, nonce);
  if (hasNonce) {
    if (typeof value.sessionId === 'string' && value.sessionId !== sessionId) return null;
    if (typeof value.planId === 'string' && value.planId !== sessionId) return null;
  } else {
    if (typeof value.sessionId === 'string' && value.sessionId !== legacySessionId && value.sessionId !== legacySnapshotId) return null;
    if (typeof value.planId === 'string' && value.planId !== legacySessionId && value.planId !== legacySnapshotId) return null;
  }
  const requestedCompleted = new Set(Array.isArray(value.completedTaskIds) ? value.completedTaskIds : []);
  return {
    version: 1,
    nonce,
    sessionId,
    planId: sessionId,
    ordinal: value.ordinal,
    tasks: value.tasks.slice(),
    completedTaskIds: value.tasks.filter((id) => requestedCompleted.has(id))
  };
}

function isWritingModeRuntimeBlocked() {
  if (window.__PONO_TIER_LOCKED__) return true;
  let portraitMedia = false;
  try {
    if (typeof window.matchMedia === 'function') {
      portraitMedia = window.matchMedia('(orientation: portrait)').matches;
    }
  } catch (_) {}
  return portraitMedia || (Number.isFinite(window.innerWidth)
    && Number.isFinite(window.innerHeight)
    && window.innerHeight > window.innerWidth);
}

function parseWritingModeStorageSnapshot(rawValue, normalizer) {
  if (typeof rawValue !== 'string' || !rawValue) return null;
  try {
    return normalizer(JSON.parse(rawValue));
  } catch (_) {
    return null;
  }
}

function readWordHoleState() {
  if (isWritingModeRuntimeBlocked() && !allowBlockedModeTaskSettlement) return null;
  try {
    const raw = localStorage.getItem(WORD_HOLE_STATE_KEY);
    return parseWritingModeStorageSnapshot(raw, normalizeWordHoleState);
  } catch (error) {
    console.warn('Could not load word-hole state:', error);
    return null;
  }
}

function mergeCanonicalWordHoleStates(...states) {
  const normalized = states.map((state) => normalizeWordHoleState(state)).filter(Boolean);
  if (!normalized.length) return null;
  const hasCompletedCap = normalized.some((state) => (
    state.ordinal === WORD_HOLE_MAX_ORDINAL
      && !getFirstIncompleteTaskId(state.tasks, state.completedTaskIds)
  ));
  const wrapped = hasCompletedCap
    ? normalized.filter((state) => state.ordinal >= 1 && state.ordinal < WORD_HOLE_MAX_ORDINAL)
    : [];
  const candidates = wrapped.length ? wrapped : normalized;
  const highestOrdinal = Math.max(...candidates.map((state) => state.ordinal));
  const sameOrdinal = candidates.filter((state) => state.ordinal === highestOrdinal);
  const canonicalPlanId = sameOrdinal.map((state) => state.planId).sort()[0];
  const canonicalStates = sameOrdinal.filter((state) => state.planId === canonicalPlanId);
  const canonical = canonicalStates[0];
  const completed = new Set(canonicalStates.flatMap((state) => state.completedTaskIds));
  return {
    ...canonical,
    completedTaskIds: canonical.tasks.filter((id) => completed.has(id))
  };
}

function writeWordHoleState(state, ...additionalStates) {
  const normalized = normalizeWordHoleState(state);
  if (!normalized || (isWritingModeRuntimeBlocked() && !allowBlockedModeTaskSettlement)) return normalized;
  const stored = readWordHoleState();
  const canonical = mergeCanonicalWordHoleStates(normalized, ...additionalStates, stored);
  if (!canonical) return null;
  try {
    localStorage.setItem(WORD_HOLE_STATE_KEY, JSON.stringify(canonical));
  } catch (error) {
    console.warn('Could not save word-hole state:', error);
  }
  return canonical;
}

function getWordHoleTask(taskId) {
  return wordHoleCatalog.find((task) => task.id === taskId) || null;
}

function getFirstIncompleteTaskId(taskIds, completedIds) {
  const completed = new Set(Array.isArray(completedIds) ? completedIds : []);
  return (Array.isArray(taskIds) ? taskIds : []).find((id) => !completed.has(id)) || '';
}

function createWordHoleActiveTaskId(state, taskId) {
  return state && taskId ? `${state.planId}::${taskId}` : '';
}

function markWordHoleTaskCompleted(taskToken) {
  const stored = readWordHoleState();
  const canonical = mergeCanonicalWordHoleStates(wordHoleState, stored);
  if (!canonical) return { state: wordHoleState, taskId: '', isNewCompletion: false };
  const taskId = canonical.tasks.find((id) => taskToken === id || taskToken === createWordHoleActiveTaskId(canonical, id)) || '';
  const isNewCompletion = !!taskId && !canonical.completedTaskIds.includes(taskId);
  const completed = new Set(canonical.completedTaskIds);
  if (isNewCompletion) completed.add(taskId);
  const candidate = {
    ...canonical,
    completedTaskIds: canonical.tasks.filter((id) => completed.has(id))
  };
  wordHoleState = writeWordHoleState(candidate, wordHoleState, stored) || candidate;
  return { state: wordHoleState, taskId, isNewCompletion };
}

function createDailyThreePlanId(dateKey, taskIds) {
  return `daily-three-${dateKey}:${(Array.isArray(taskIds) ? taskIds : []).join('|')}`;
}

function createDailyThreeState(dateKey, progress = loadWritingProgress()) {
  if (typeof dateKey !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(dateKey)) return null;
  const completedIds = normalizeWritingCompletedIds(progress && progress.completedIds);
  const completed = new Set(completedIds);
  const storedIndex = getWritingCharacterIndex(progress && progress.cursorId);
  const startIndex = storedIndex >= 0 ? storedIndex : 0;
  const incomplete = [];
  for (let offset = 0; offset < writingCharacters.length; offset += 1) {
    const item = writingCharacters[(startIndex + offset) % writingCharacters.length];
    if (item && !completed.has(item.id)) incomplete.push(item.id);
  }
  const review = seededWritingModeShuffle(
    writingCharacters.filter((item) => completed.has(item.id)).map((item) => item.id),
    `mojikko-daily-three:${dateKey}`
  );
  const selected = [];
  incomplete.slice(0, 2).forEach((id) => selected.push(id));
  if (review.length) selected.push(review[0]);
  for (const id of incomplete.slice(2)) {
    if (selected.length >= DAILY_THREE_SIZE) break;
    if (!selected.includes(id)) selected.push(id);
  }
  for (const id of review.slice(1)) {
    if (selected.length >= DAILY_THREE_SIZE) break;
    if (!selected.includes(id)) selected.push(id);
  }
  if (selected.length < DAILY_THREE_SIZE) return null;
  const taskIds = selected.slice(0, DAILY_THREE_SIZE);
  return {
    version: 1,
    dateKey,
    planId: createDailyThreePlanId(dateKey, taskIds),
    taskIds,
    completedIds: []
  };
}

function normalizeDailyThreeState(value) {
  if (!value || typeof value !== 'object' || Array.isArray(value) || value.version !== 1) return null;
  if (typeof value.dateKey !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(value.dateKey)) return null;
  if (!Array.isArray(value.taskIds) || value.taskIds.length !== DAILY_THREE_SIZE) return null;
  if (new Set(value.taskIds).size !== DAILY_THREE_SIZE) return null;
  if (value.taskIds.some((id) => getWritingCharacterIndex(id) < 0)) return null;
  const planId = createDailyThreePlanId(value.dateKey, value.taskIds);
  if (typeof value.planId === 'string' && value.planId !== planId) return null;
  const completed = new Set(Array.isArray(value.completedIds) ? value.completedIds : []);
  return {
    version: 1,
    dateKey: value.dateKey,
    planId,
    taskIds: value.taskIds.slice(),
    completedIds: value.taskIds.filter((id) => completed.has(id))
  };
}

function readDailyThreeState() {
  if (isWritingModeRuntimeBlocked() && !allowBlockedModeTaskSettlement) return null;
  try {
    const raw = localStorage.getItem(DAILY_THREE_STATE_KEY);
    return parseWritingModeStorageSnapshot(raw, normalizeDailyThreeState);
  } catch (error) {
    console.warn('Could not load daily-three state:', error);
    return null;
  }
}

function mergeCanonicalDailyThreeStates(...states) {
  const todayKey = getLocalDateKey();
  const normalized = states
    .map((state) => normalizeDailyThreeState(state))
    .filter((state) => state && state.dateKey === todayKey);
  if (!normalized.length) return null;
  const canonicalPlanId = normalized.map((state) => state.planId).sort()[0];
  const canonicalStates = normalized.filter((state) => state.planId === canonicalPlanId);
  const canonical = canonicalStates[0];
  const completed = new Set(canonicalStates.flatMap((state) => state.completedIds));
  return {
    ...canonical,
    completedIds: canonical.taskIds.filter((id) => completed.has(id))
  };
}

function writeDailyThreeState(state, ...additionalStates) {
  const normalized = normalizeDailyThreeState(state);
  if (!normalized || normalized.dateKey !== getLocalDateKey()
    || (isWritingModeRuntimeBlocked() && !allowBlockedModeTaskSettlement)) return null;
  const stored = readDailyThreeState();
  const canonical = mergeCanonicalDailyThreeStates(normalized, ...additionalStates, stored);
  if (!canonical) return null;
  try {
    localStorage.setItem(DAILY_THREE_STATE_KEY, JSON.stringify(canonical));
  } catch (error) {
    console.warn('Could not save daily-three state:', error);
  }
  return canonical;
}

function createDailyThreeActiveTaskId(state, characterId) {
  if (!state || !characterId) return '';
  const slotIndex = state.taskIds.indexOf(characterId);
  return slotIndex >= 0 ? `${state.planId}::${slotIndex}:${characterId}` : '';
}

function markDailyThreeTaskCompleted(taskToken) {
  const stored = readDailyThreeState();
  const canonical = mergeCanonicalDailyThreeStates(dailyThreeState, stored);
  if (!canonical) return { state: dailyThreeState, characterId: '', isNewCompletion: false };
  const characterId = canonical.taskIds.find((id) => taskToken === id || taskToken === createDailyThreeActiveTaskId(canonical, id)) || '';
  const isNewCompletion = !!characterId && !canonical.completedIds.includes(characterId);
  const completed = new Set(canonical.completedIds);
  if (isNewCompletion) completed.add(characterId);
  const candidate = {
    ...canonical,
    completedIds: canonical.taskIds.filter((id) => completed.has(id))
  };
  dailyThreeState = writeDailyThreeState(candidate, dailyThreeState, stored) || candidate;
  return { state: dailyThreeState, characterId, isNewCompletion };
}

function createModeTaskReceiptId(mode, planId, taskId) {
  if ((mode !== WRITING_MODES.wordHole && mode !== WRITING_MODES.dailyThree)
    || typeof planId !== 'string' || !planId
    || typeof taskId !== 'string' || !taskId) return '';
  return `${mode}::${planId}::${taskId}`;
}

function getActiveModeTaskClaimCandidate(item, taskToken = activeModeTaskId) {
  if (!item || isWritingModeRuntimeBlocked()) return { eligible: false, receiptId: '' };
  if (activeMode === WRITING_MODES.wordHole) {
    const stored = readWordHoleState();
    const canonical = mergeCanonicalWordHoleStates(wordHoleState, stored);
    if (canonical) wordHoleState = writeWordHoleState(canonical, wordHoleState, stored) || canonical;
    const taskId = canonical
      ? canonical.tasks.find((id) => taskToken === createWordHoleActiveTaskId(canonical, id)) || ''
      : '';
    const task = getWordHoleTask(taskId);
    const eligible = !!task
      && task.characterId === item.id
      && !canonical.completedTaskIds.includes(taskId);
    return {
      eligible,
      receiptId: eligible
        ? createModeTaskReceiptId(WRITING_MODES.wordHole, canonical.planId, taskId)
        : ''
    };
  }
  if (activeMode === WRITING_MODES.dailyThree) {
    const stored = readDailyThreeState();
    const canonical = mergeCanonicalDailyThreeStates(dailyThreeState, stored);
    if (canonical) dailyThreeState = writeDailyThreeState(canonical, dailyThreeState, stored) || canonical;
    const characterId = canonical
      ? canonical.taskIds.find((id) => taskToken === createDailyThreeActiveTaskId(canonical, id)) || ''
      : '';
    const eligible = !!characterId
      && characterId === item.id
      && !canonical.completedIds.includes(characterId);
    return {
      eligible,
      receiptId: eligible
        ? createModeTaskReceiptId(WRITING_MODES.dailyThree, canonical.planId, characterId)
        : ''
    };
  }
  return { eligible: false, receiptId: '' };
}

function claimModeTaskCompletionFallback(receiptId) {
  if (!receiptId || isWritingModeRuntimeBlocked()) return false;
  const key = `${MODE_TASK_RECEIPT_FALLBACK_PREFIX}${receiptId}`;
  const claimant = `${Date.now()}:${Math.random().toString(36).slice(2)}`;
  try {
    if (localStorage.getItem(key) !== null) return false;
    localStorage.setItem(key, claimant);
    return localStorage.getItem(key) === claimant;
  } catch (error) {
    console.warn('Could not claim mode task fallback receipt:', error);
    return false;
  }
}

function rememberModeTaskReceiptFallback(receiptId) {
  if (!receiptId) return;
  const key = `${MODE_TASK_RECEIPT_FALLBACK_PREFIX}${receiptId}`;
  try {
    if (localStorage.getItem(key) === null) localStorage.setItem(key, 'idb');
  } catch (_) {}
}

function hasModeTaskReceiptFallback(receiptId) {
  if (!receiptId) return false;
  try {
    return localStorage.getItem(`${MODE_TASK_RECEIPT_FALLBACK_PREFIX}${receiptId}`) !== null;
  } catch (_) {
    // An unreadable fallback ledger is an unknown claim state. Suppress the
    // reward instead of risking a second grant through a recovered IDB path.
    return true;
  }
}

function claimModeTaskCompletionFallbackWithLock(receiptId) {
  try {
    if (typeof navigator !== 'undefined' && navigator.locks && typeof navigator.locks.request === 'function') {
      return navigator.locks.request(
        `${MODE_TASK_RECEIPT_FALLBACK_PREFIX}${receiptId}`,
        { mode: 'exclusive' },
        () => claimModeTaskCompletionFallback(receiptId)
      ).catch(() => false);
    }
  } catch (_) {}
  return Promise.resolve(claimModeTaskCompletionFallback(receiptId));
}

function claimModeTaskCompletion(receiptId) {
  if (!receiptId || isWritingModeRuntimeBlocked()) return Promise.resolve(false);
  if (hasModeTaskReceiptFallback(receiptId)) return Promise.resolve(false);
  if (typeof indexedDB === 'undefined' || !indexedDB || typeof indexedDB.open !== 'function') {
    return claimModeTaskCompletionFallbackWithLock(receiptId);
  }
  return new Promise((resolve) => {
    let settled = false;
    let database = null;
    const settle = (claimed) => {
      if (settled) return;
      settled = true;
      if (database) {
        try { database.close(); } catch (_) {}
      }
      resolve(!!claimed);
    };
    const fallback = () => {
      claimModeTaskCompletionFallbackWithLock(receiptId).then(settle, () => settle(false));
    };
    let openRequest;
    try {
      openRequest = indexedDB.open(MODE_TASK_RECEIPT_DB_NAME, 1);
    } catch (_) {
      fallback();
      return;
    }
    openRequest.onupgradeneeded = () => {
      const upgradeDb = openRequest.result;
      if (!upgradeDb.objectStoreNames.contains(MODE_TASK_RECEIPT_STORE_NAME)) {
        upgradeDb.createObjectStore(MODE_TASK_RECEIPT_STORE_NAME);
      }
    };
    openRequest.onerror = fallback;
    openRequest.onblocked = fallback;
    openRequest.onsuccess = () => {
      if (settled) {
        try { openRequest.result.close(); } catch (_) {}
        return;
      }
      database = openRequest.result;
      if (hasModeTaskReceiptFallback(receiptId)) {
        settle(false);
        return;
      }
      let transaction;
      try {
        transaction = database.transaction(MODE_TASK_RECEIPT_STORE_NAME, 'readwrite');
      } catch (_) {
        fallback();
        return;
      }
      let added = false;
      let duplicate = false;
      let addRequest;
      try {
        addRequest = transaction.objectStore(MODE_TASK_RECEIPT_STORE_NAME).add({
          receiptId,
          claimedAt: Date.now()
        }, receiptId);
      } catch (_) {
        try { transaction.abort(); } catch (_) {}
        fallback();
        return;
      }
      addRequest.onsuccess = () => { added = true; };
      addRequest.onerror = (event) => {
        if (addRequest.error && addRequest.error.name === 'ConstraintError') {
          duplicate = true;
          event.preventDefault();
          event.stopPropagation();
        }
      };
      transaction.oncomplete = () => {
        rememberModeTaskReceiptFallback(receiptId);
        settle(added && !duplicate);
      };
      transaction.onabort = () => {
        if (duplicate || (transaction.error && transaction.error.name === 'ConstraintError')) {
          rememberModeTaskReceiptFallback(receiptId);
          settle(false);
        } else fallback();
      };
      transaction.onerror = (event) => {
        if (duplicate || (transaction.error && transaction.error.name === 'ConstraintError')) {
          event.preventDefault();
        }
      };
    };
  });
}

function normalizeWritingModePreference(value) {
  if (!value || typeof value !== 'object' || Array.isArray(value) || value.version !== 1) return WRITING_MODES.sequence;
  return Object.values(WRITING_MODES).includes(value.activeMode) ? value.activeMode : WRITING_MODES.sequence;
}

function readWritingModePreference() {
  if (isWritingModeRuntimeBlocked()) return WRITING_MODES.sequence;
  try {
    const raw = localStorage.getItem(WRITING_MODE_STATE_KEY);
    return raw ? normalizeWritingModePreference(JSON.parse(raw)) : WRITING_MODES.sequence;
  } catch (error) {
    console.warn('Could not load writing mode:', error);
    return WRITING_MODES.sequence;
  }
}

function writeWritingModePreference(mode) {
  const normalizedMode = Object.values(WRITING_MODES).includes(mode) ? mode : WRITING_MODES.sequence;
  if (isWritingModeRuntimeBlocked()) return normalizedMode;
  try {
    localStorage.setItem(WRITING_MODE_STATE_KEY, JSON.stringify({ version: 1, activeMode: normalizedMode }));
  } catch (error) {
    console.warn('Could not save writing mode:', error);
  }
  return normalizedMode;
}

function handleWritingModeStorageEvent(event) {
  if (!event || isWritingModeRuntimeBlocked() || !writingModesInitialized
    || (event.storageArea && event.storageArea !== localStorage)) return;
  if (event.key === WORD_HOLE_STATE_KEY) {
    const incoming = parseWritingModeStorageSnapshot(event.newValue, normalizeWordHoleState);
    const stored = readWordHoleState();
    const merged = mergeCanonicalWordHoleStates(wordHoleState, incoming, stored);
    if (merged) wordHoleState = writeWordHoleState(merged, wordHoleState, incoming, stored) || merged;
    return;
  }
  if (event.key === DAILY_THREE_STATE_KEY) {
    const incoming = parseWritingModeStorageSnapshot(event.newValue, normalizeDailyThreeState);
    const stored = readDailyThreeState();
    const merged = mergeCanonicalDailyThreeStates(dailyThreeState, incoming, stored);
    if (merged) dailyThreeState = writeDailyThreeState(merged, dailyThreeState, incoming, stored) || merged;
  }
}

function fitStage() {
  const aspect = window.innerWidth / Math.max(1, window.innerHeight);
  const compact = aspect < 1.55;
  stageEl.classList.toggle('compact', compact);
  const scale = compact
    ? window.innerHeight / 900
    : Math.min(window.innerWidth / 1600, window.innerHeight / 900);
  const ox = (window.innerWidth - 1600 * scale) / 2;
  const oy = (window.innerHeight - 900 * scale) / 2;
  stageEl.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
}

function refreshWritingLayoutAndModeRuntime() {
  fitStage();
  if (isWritingModeRuntimeBlocked()) {
    if (pendingAutoCompleteTimer !== null || complete || completionQueued || writingCompletionInFlight) {
      clearPendingWritingCompletionTimers();
      complete = false;
      completionQueued = false;
      writingNeedsResetAfterRuntimeBlock = true;
    }
    return;
  }
  if (writingNeedsResetAfterRuntimeBlock) {
    writingNeedsResetAfterRuntimeBlock = false;
    if (pendingNextAction) nextCharacter();
    else resetWriting({ skipModeBoundary: true });
    return;
  }
  if (!writingModesInitialized) initializeWritingModesIfAllowed();
}

window.addEventListener('resize', () => setTimeout(refreshWritingLayoutAndModeRuntime, 100));
window.addEventListener('orientationchange', () => setTimeout(refreshWritingLayoutAndModeRuntime, 100));
document.addEventListener('visibilitychange', () => { if (!document.hidden) fitStage(); });
fitStage();

function getCurrentCharacter() {
  return writingCharacters[currentIndex];
}

function getCurrentGroupMeta() {
  return KANA_GROUPS.find((group) => group.id === currentGroup) || KANA_GROUPS[0];
}

function syncCurrentGroupFromCharacter() {
  const item = getCurrentCharacter();
  currentGroup = item && item.group ? item.group : KANA_GROUPS[0].id;
}

function setCurrentGroup(groupId) {
  if (activeMode !== WRITING_MODES.sequence) return;
  const firstIndex = writingCharacters.findIndex((item) => item.group === groupId);
  if (firstIndex < 0) return;
  currentGroup = groupId;
  currentIndex = firstIndex;
  resetWriting();
}

function isWordHoleStateComplete(state = wordHoleState) {
  return !!state && !getFirstIncompleteTaskId(state.tasks, state.completedTaskIds);
}

function isDailyThreeStateComplete(state = dailyThreeState) {
  return !!state && !getFirstIncompleteTaskId(state.taskIds, state.completedIds);
}

function resolveWordHoleModeTarget(options = {}) {
  if (isWritingModeRuntimeBlocked()) return { ok: false, reason: 'blocked' };
  if (wordHoleCatalog.length !== WORD_HOLE_BLUEPRINTS.length) {
    return { ok: false, reason: 'unavailable' };
  }
  const stored = readWordHoleState();
  wordHoleState = mergeCanonicalWordHoleStates(wordHoleState, stored);
  if (wordHoleState) wordHoleState = writeWordHoleState(wordHoleState, stored) || wordHoleState;
  if (!wordHoleState) {
    if (options.initial) return { ok: false, reason: 'broken' };
    wordHoleState = writeWordHoleState(createWordHoleSession(0)) || createWordHoleSession(0);
  } else if (isWordHoleStateComplete(wordHoleState)) {
    if (!options.explicit) return { ok: false, reason: 'complete' };
    const nextOrdinal = wordHoleState.ordinal >= WORD_HOLE_MAX_ORDINAL ? 1 : wordHoleState.ordinal + 1;
    const nextSession = createWordHoleSession(nextOrdinal);
    wordHoleState = writeWordHoleState(nextSession) || nextSession;
  }
  const taskId = getFirstIncompleteTaskId(wordHoleState.tasks, wordHoleState.completedTaskIds);
  const task = getWordHoleTask(taskId);
  const targetIndex = task ? getWritingCharacterIndex(task.characterId) : -1;
  return targetIndex >= 0
    ? {
      ok: true,
      mode: WRITING_MODES.wordHole,
      targetIndex,
      taskId,
      activeModeTaskId: createWordHoleActiveTaskId(wordHoleState, taskId)
    }
    : { ok: false, reason: 'broken' };
}

function resolveDailyThreeModeTarget(options = {}) {
  if (isWritingModeRuntimeBlocked()) return { ok: false, reason: 'blocked' };
  const todayKey = getLocalDateKey();
  const stored = readDailyThreeState();
  dailyThreeState = mergeCanonicalDailyThreeStates(dailyThreeState, stored);
  if (dailyThreeState) dailyThreeState = writeDailyThreeState(dailyThreeState, stored) || dailyThreeState;
  if (!dailyThreeState) {
    if (options.initial) return { ok: false, reason: 'broken' };
    const created = createDailyThreeState(todayKey);
    dailyThreeState = writeDailyThreeState(created) || created;
  } else if (dailyThreeState.dateKey !== todayKey) {
    const created = createDailyThreeState(todayKey);
    dailyThreeState = writeDailyThreeState(created) || created;
  }
  if (!dailyThreeState) return { ok: false, reason: 'broken' };
  if (isDailyThreeStateComplete(dailyThreeState)) return { ok: false, reason: 'complete' };
  const characterId = getFirstIncompleteTaskId(dailyThreeState.taskIds, dailyThreeState.completedIds);
  const targetIndex = getWritingCharacterIndex(characterId);
  return targetIndex >= 0
    ? {
      ok: true,
      mode: WRITING_MODES.dailyThree,
      targetIndex,
      characterId,
      activeModeTaskId: createDailyThreeActiveTaskId(dailyThreeState, characterId)
    }
    : { ok: false, reason: 'broken' };
}

function resolveWritingModeTarget(mode, options = {}) {
  if (mode === WRITING_MODES.wordHole) return resolveWordHoleModeTarget(options);
  if (mode === WRITING_MODES.dailyThree) return resolveDailyThreeModeTarget(options);
  return {
    ok: true,
    mode: WRITING_MODES.sequence,
    targetIndex: getInitialWritingIndex(),
    activeModeTaskId: null
  };
}

function clearPendingModeAdvance() {
  if (pendingModeAdvanceTimer !== null) {
    clearTimeout(pendingModeAdvanceTimer);
    pendingModeAdvanceTimer = null;
  }
}

function clearPendingWritingCompletionTimers() {
  clearPendingModeAdvance();
  if (pendingResultOverlayTimer !== null) {
    clearTimeout(pendingResultOverlayTimer);
    pendingResultOverlayTimer = null;
  }
  if (pendingAutoCompleteTimer !== null) {
    clearTimeout(pendingAutoCompleteTimer);
    pendingAutoCompleteTimer = null;
    completionQueued = false;
  }
  writingCompletionToken += 1;
}

function synchronizeActiveModeTaskAtBoundary() {
  if (!writingModesInitialized || isWritingModeRuntimeBlocked() || activeMode === WRITING_MODES.sequence) return true;
  const resolved = resolveWritingModeTarget(activeMode, { explicit: false, boundary: true });
  if (!resolved.ok) {
    activeMode = WRITING_MODES.sequence;
    activeModeTaskId = null;
    currentIndex = getInitialWritingIndex();
    writeWritingModePreference(activeMode);
    return false;
  }
  currentIndex = resolved.targetIndex;
  activeModeTaskId = resolved.activeModeTaskId;
  return true;
}

function activateWritingMode(mode, options = {}) {
  if ((!writingModesInitialized && !initializeWritingModesIfAllowed()) || isWritingModeRuntimeBlocked()) return false;
  const resolved = resolveWritingModeTarget(mode, options);
  if (!resolved.ok) {
    if (resolved.reason === 'complete' && mode === WRITING_MODES.dailyThree) {
      modeChoiceMessage.textContent = 'きょうは できた！ また あした あそぼう';
    } else if (mode === WRITING_MODES.wordHole && resolved.reason === 'unavailable') {
      modeChoiceMessage.textContent = 'ことばを よみこめなかったよ';
    } else {
      modeChoiceMessage.textContent = 'じゅんばんから はじめよう';
    }
    return false;
  }
  clearPendingWritingCompletionTimers();
  activeMode = resolved.mode;
  activeModeTaskId = resolved.activeModeTaskId || null;
  currentIndex = resolved.targetIndex;
  if (options.persist !== false) writeWritingModePreference(activeMode);
  closeModeChoice();
  syncCurrentGroupFromCharacter();
  resetWriting();
  return true;
}

function restorePreferredWritingMode() {
  const preferredMode = readWritingModePreference();
  const resolved = resolveWritingModeTarget(preferredMode, { initial: true, explicit: false });
  if (resolved.ok) {
    activeMode = resolved.mode;
    activeModeTaskId = resolved.activeModeTaskId || null;
    currentIndex = resolved.targetIndex;
    return;
  }
  activeMode = WRITING_MODES.sequence;
  activeModeTaskId = null;
  currentIndex = getInitialWritingIndex();
  if (preferredMode !== WRITING_MODES.sequence && resolved.reason !== 'unavailable') {
    writeWritingModePreference(WRITING_MODES.sequence);
  }
}

function initializeWritingModesIfAllowed() {
  if (writingModesInitialized) return true;
  if (isWritingModeRuntimeBlocked()) return false;
  wordHoleCatalog = buildValidatedWordHoleCatalog(window.PonoMojicraneWords);
  wordHoleModeBtn.disabled = wordHoleCatalog.length !== WORD_HOLE_BLUEPRINTS.length;
  writingModesInitialized = true;
  restorePreferredWritingMode();
  syncCurrentGroupFromCharacter();
  resetWriting({ skipModeBoundary: true });
  return true;
}

function openModeChoice() {
  if (!writingModesInitialized || isWritingModeRuntimeBlocked()) return;
  if (writingCompletionInFlight && !pendingNextAction) {
    pendingModeChoiceOpen = true;
    return;
  }
  if (complete && pendingNextAction) nextCharacter();
  else if (complete || writingCompletionInFlight) return;
  clearPendingWritingCompletionTimers();
  modeChoiceReturnFocus = document.activeElement instanceof HTMLElement ? document.activeElement : modeSwitchBtn;
  modeChoiceMessage.textContent = '';
  wordHoleModeBtn.disabled = wordHoleCatalog.length !== WORD_HOLE_BLUEPRINTS.length;
  wordHoleModeBtn.setAttribute('aria-disabled', wordHoleModeBtn.disabled ? 'true' : 'false');
  modeChoiceOverlay.querySelectorAll('[data-writing-mode]').forEach((button) => {
    button.classList.toggle('active', button.dataset.writingMode === activeMode);
  });
  modeChoiceOverlay.inert = false;
  modeChoiceOverlay.classList.add('show');
  modeChoiceOverlay.setAttribute('aria-hidden', 'false');
  const activeButton = modeChoiceOverlay.querySelector('[data-writing-mode].active:not(:disabled)')
    || modeChoiceOverlay.querySelector('[data-writing-mode]:not(:disabled)');
  if (activeButton) activeButton.focus();
}

function closeModeChoice() {
  modeChoiceOverlay.classList.remove('show');
  modeChoiceOverlay.setAttribute('aria-hidden', 'true');
  if (document.activeElement && modeChoiceOverlay.contains(document.activeElement)) {
    const returnTarget = modeChoiceReturnFocus && typeof modeChoiceReturnFocus.focus === 'function'
      ? modeChoiceReturnFocus
      : modeSwitchBtn;
    returnTarget.focus();
  }
  modeChoiceOverlay.inert = true;
  modeChoiceReturnFocus = null;
}

function createWordClueCell(char, className) {
  const cell = document.createElement('span');
  cell.className = `word-clue-cell${className ? ` ${className}` : ''}`;
  cell.textContent = char;
  return cell;
}

function renderWordHolePanel(revealTaskId) {
  if (!wordHoleState) return;
  const currentTaskId = revealTaskId || getFirstIncompleteTaskId(wordHoleState.tasks, wordHoleState.completedTaskIds);
  const currentTask = getWordHoleTask(currentTaskId);
  if (!currentTask) return;
  const taskIndex = wordHoleState.tasks.indexOf(currentTaskId);
  modeProgressCount.textContent = `${taskIndex + 1} / ${WORD_HOLE_SESSION_SIZE}`;
  modeClue.innerHTML = '';
  const emoji = document.createElement('div');
  emoji.className = 'word-clue-emoji';
  emoji.textContent = currentTask.emoji;
  emoji.setAttribute('aria-hidden', 'true');
  const row = document.createElement('div');
  row.className = 'word-clue-row';
  Array.from(currentTask.word).forEach((char, index) => {
    const isBlank = index === currentTask.blankIndex && revealTaskId !== currentTaskId;
    row.appendChild(createWordClueCell(isBlank ? '□' : char, isBlank ? 'blank' : ''));
  });
  modeClue.append(emoji, row);
  modeClue.setAttribute('aria-label', revealTaskId ? currentTask.word : `${currentTask.word}の あいている もじ`);
  renderModeProgressDots(wordHoleState.tasks, wordHoleState.completedTaskIds, currentTaskId);
}

function renderDailyThreePanel(revealCharacterId) {
  if (!dailyThreeState) return;
  const currentId = revealCharacterId || getFirstIncompleteTaskId(dailyThreeState.taskIds, dailyThreeState.completedIds);
  const currentPosition = Math.max(0, dailyThreeState.taskIds.indexOf(currentId));
  modeProgressCount.textContent = `${currentPosition + 1} / ${DAILY_THREE_SIZE}`;
  modeClue.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'daily-clue-row';
  const completed = new Set(dailyThreeState.completedIds);
  dailyThreeState.taskIds.forEach((characterId) => {
    const item = writingCharacters[getWritingCharacterIndex(characterId)];
    const cell = document.createElement('span');
    cell.className = 'daily-clue-cell';
    if (completed.has(characterId)) cell.classList.add('done');
    if (!revealCharacterId && characterId === currentId) cell.classList.add('current');
    cell.textContent = item ? item.char : '';
    row.appendChild(cell);
  });
  modeClue.appendChild(row);
  renderModeProgressDots(dailyThreeState.taskIds, dailyThreeState.completedIds, currentId);
}

function renderModeProgressDots(taskIds, completedIds, currentId) {
  modeProgressItems.innerHTML = '';
  const completed = new Set(completedIds);
  taskIds.forEach((taskId, index) => {
    const dot = document.createElement('span');
    dot.className = 'mode-progress-dot';
    if (completed.has(taskId)) dot.classList.add('done');
    if (!completed.has(taskId) && taskId === currentId) dot.classList.add('current');
    dot.textContent = completed.has(taskId) ? '✓' : String(index + 1);
    modeProgressItems.appendChild(dot);
  });
}

function renderModePanel(revealTaskId) {
  const isSequence = activeMode === WRITING_MODES.sequence;
  characterPanel.classList.toggle('mode-task-panel', !isSequence);
  kanaTabsEl.hidden = !isSequence;
  charListEl.hidden = !isSequence;
  modeProgress.hidden = isSequence;
  characterPanelTitle.textContent = isSequence ? 'もじリスト' : WRITING_MODE_LABELS[activeMode];
  characterPanel.setAttribute('aria-label', isSequence ? 'もじリスト' : WRITING_MODE_LABELS[activeMode]);
  currentModeNameEl.textContent = WRITING_MODE_LABELS[activeMode];
  modeChoiceOverlay.querySelectorAll('[data-writing-mode]').forEach((button) => {
    button.classList.toggle('active', button.dataset.writingMode === activeMode);
  });
  if (isSequence) return;
  if (activeMode === WRITING_MODES.wordHole) renderWordHolePanel(revealTaskId);
  if (activeMode === WRITING_MODES.dailyThree) renderDailyThreePanel(revealTaskId);
}

function renderWritingModePrompt(item) {
  if (activeMode === WRITING_MODES.wordHole) {
    promptText.textContent = '□の もじを かこう！';
    return;
  }
  if (activeMode === WRITING_MODES.dailyThree && dailyThreeState) {
    const taskIndex = dailyThreeState.taskIds.indexOf(item.id);
    promptText.textContent = `${Math.max(0, taskIndex) + 1}こめ「${item.char}」を かこう！`;
    return;
  }
  promptText.textContent = `「${item.char}」を かいてみよう！`;
}

function completeActiveModeTask(item, taskToken = activeModeTaskId, mode = activeMode) {
  if (mode === WRITING_MODES.wordHole && wordHoleState) {
    const pinnedTaskId = wordHoleState.tasks.find((id) => taskToken === createWordHoleActiveTaskId(wordHoleState, id)) || '';
    const pinnedTask = getWordHoleTask(pinnedTaskId);
    const completion = markWordHoleTaskCompleted(
      pinnedTask && pinnedTask.characterId === item.id ? taskToken : '__invalid-word-task__'
    );
    const nextTaskId = completion.state
      ? getFirstIncompleteTaskId(completion.state.tasks, completion.state.completedTaskIds)
      : '';
    const nextTask = getWordHoleTask(nextTaskId);
    if (completion.state && (!pinnedTask || pinnedTask.characterId === item.id || !completion.isNewCompletion)) {
      const action = nextTask
        ? {
          type: 'mode-task',
          mode: WRITING_MODES.wordHole,
          characterId: nextTask.characterId,
          activeModeTaskId: createWordHoleActiveTaskId(completion.state, nextTaskId),
          completedTaskId: pinnedTaskId,
          completedWord: pinnedTask ? pinnedTask.word : '',
          showOverlay: false
        }
        : {
        type: 'mode-finished',
        mode: WRITING_MODES.wordHole,
        completedTaskId: pinnedTaskId,
        completedWord: pinnedTask ? pinnedTask.word : '',
        showOverlay: true
      };
      return { action, isNewCompletion: completion.isNewCompletion };
    }
  }
  if (mode === WRITING_MODES.dailyThree && dailyThreeState) {
    const pinnedCharacterId = dailyThreeState.taskIds.find((id) => taskToken === createDailyThreeActiveTaskId(dailyThreeState, id)) || '';
    const completion = markDailyThreeTaskCompleted(
      pinnedCharacterId === item.id ? taskToken : '__invalid-daily-task__'
    );
    if (completion.state && (pinnedCharacterId === item.id || !completion.isNewCompletion)) {
      if (completion.state.dateKey !== getLocalDateKey()) {
        const created = createDailyThreeState(getLocalDateKey());
        dailyThreeState = writeDailyThreeState(created) || created;
      }
      const nextCharacterId = dailyThreeState
        ? getFirstIncompleteTaskId(dailyThreeState.taskIds, dailyThreeState.completedIds)
        : '';
      const action = nextCharacterId
        ? {
          type: 'mode-task',
          mode: WRITING_MODES.dailyThree,
          characterId: nextCharacterId,
          activeModeTaskId: createDailyThreeActiveTaskId(dailyThreeState, nextCharacterId),
          completedTaskId: pinnedCharacterId,
          showOverlay: false
        }
        : {
        type: 'mode-finished',
        mode: WRITING_MODES.dailyThree,
        completedTaskId: pinnedCharacterId,
        showOverlay: true
      };
      return { action, isNewCompletion: completion.isNewCompletion };
    }
  }
  return {
    action: {
      type: 'sequence',
      mode: WRITING_MODES.sequence,
      targetIndex: pendingNextWritingIndex,
      showOverlay: true
    },
    isNewCompletion: true
  };
}

function configureModeCompletion(action, item, reward, isNewCompletion) {
  resultTitleEl.textContent = 'すごい！';
  resultCopyEl.textContent = 'じょうずに かけたね！';
  const rewardFeedback = reward
    ? `スター +${WRITING_STAR_REWARD}！ ${reward.name}`
    : `スター +${WRITING_STAR_REWARD}！`;
  if (action.mode === WRITING_MODES.wordHole) {
    renderModePanel(action.completedTaskId);
    if (action.type === 'mode-finished') {
      promptText.textContent = action.completedWord ? `「${action.completedWord}」が できた！` : 'ぜんぶ できた！';
      resultCopyEl.textContent = isNewCompletion
        ? 'ことばが 5こ できた！ ごほうびも ふえたよ！'
        : 'ことばが 5こ できた！';
      modalRetryBtn.textContent = 'じゅんばんへ';
    } else {
      const completedCopy = action.completedWord ? `「${action.completedWord}」が できた！` : 'ことばが できた！';
      promptText.textContent = isNewCompletion
        ? `${completedCopy} ${rewardFeedback}`
        : `${completedCopy} クリアずみだよ`;
      modalRetryBtn.textContent = 'つぎの ことば';
      setMessage(isNewCompletion ? rewardFeedback : 'この ことばは できていたよ', 'つぎへ すすむよ');
    }
    return;
  }
  if (action.mode === WRITING_MODES.dailyThree) {
    renderModePanel(action.completedTaskId);
    if (action.type === 'mode-finished') {
      promptText.textContent = `「${item.char}」が かけた！`;
      resultCopyEl.textContent = isNewCompletion
        ? 'きょうの 3もじ できた！ ごほうびも ふえたよ！'
        : 'きょうの 3もじ できた！';
      modalRetryBtn.textContent = 'じゅんばんへ';
    } else {
      const completedCopy = `「${item.char}」が かけた！`;
      promptText.textContent = isNewCompletion
        ? `${completedCopy} ${rewardFeedback}`
        : `${completedCopy} クリアずみだよ`;
      modalRetryBtn.textContent = 'つぎの もじ';
      setMessage(isNewCompletion ? rewardFeedback : 'この もじは できていたよ', 'つぎへ すすむよ');
    }
    return;
  }
  const pendingNextCharacter = writingCharacters[pendingNextWritingIndex] || writingCharacters[0];
  modalRetryBtn.textContent = `つぎは「${pendingNextCharacter.char}」`;
}
