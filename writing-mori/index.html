<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>もじっこファーム | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="manifest" href="../manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@500;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #4f3825;
  --ink-soft: #82624a;
  --wood-dark: #6e4b2d;
  --wood-mid: #a36b3c;
  --wood-light: #d99a5e;
  --paper: #fff8e8;
  --paper-deep: #f1ddb7;
  --cream: #fff3cf;
  --mint: #86d7ac;
  --mint-dark: #3c986f;
  --sky: #8ed2ec;
  --sky-soft: #caeff8;
  --orange: #f3a65f;
  --coral: #ee7b6b;
  --blue: #64abd2;
  --green: #75b96f;
  --shadow: rgba(70, 42, 18, 0.25);
  --pixel-font: 'DotGothic16', 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --round-font: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  color: var(--ink);
  background: #243b33;
  font-family: var(--round-font);
  position: fixed;
  inset: 0;
}

#stage-wrap {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background:
    linear-gradient(180deg, #233f53 0%, #12222b 100%);
}

#stage {
  position: absolute;
  top: 0;
  left: 0;
  width: 1600px;
  height: 900px;
  transform-origin: 0 0;
  overflow: hidden;
  background:
    linear-gradient(180deg, var(--sky) 0 42%, #b7e6d4 42% 66%, #7abf6c 66% 100%);
  image-rendering: pixelated;
}

#stage::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(transparent 0 93%, rgba(91, 65, 38, 0.32) 93% 100%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0 2px, transparent 2px 8px),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 8px);
  mix-blend-mode: soft-light;
  pointer-events: none;
}

@media (orientation: portrait) {
  body::before {
    content: 'よこむきに してね';
    position: fixed;
    inset: 0;
    z-index: 100000;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1f2e2b;
    color: #ffe59d;
    font-family: var(--pixel-font);
    font-size: clamp(1.2rem, 6vw, 2.2rem);
    letter-spacing: 0.16em;
    text-align: center;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

.bg-cloud {
  position: absolute;
  width: var(--w);
  height: calc(var(--w) * 0.28);
  left: var(--x);
  top: var(--y);
  opacity: 0.9;
  background:
    radial-gradient(ellipse at 20% 55%, #fff 0 28%, transparent 29%),
    radial-gradient(ellipse at 44% 38%, #fff 0 34%, transparent 35%),
    radial-gradient(ellipse at 70% 58%, #fff 0 30%, transparent 31%),
    linear-gradient(#fff 0 0) 15% 55% / 72% 42% no-repeat;
  filter: drop-shadow(0 4px 0 rgba(99, 150, 164, 0.2));
  animation: cloudBob 7s ease-in-out infinite;
}

.bg-cloud.c2 { animation-duration: 9s; animation-delay: -2s; }
.bg-cloud.c3 { animation-duration: 8s; animation-delay: -4s; }

@keyframes cloudBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.hill {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: var(--w);
  height: var(--h);
  border-radius: 50% 50% 0 0 / 70% 70% 0 0;
  background: linear-gradient(180deg, var(--top), var(--bottom));
  box-shadow: inset 0 8px rgba(255,255,255,0.18);
}

.tree {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: 92px;
  height: 160px;
  pointer-events: none;
}

.tree::before {
  content: '';
  position: absolute;
  left: 38px;
  bottom: 0;
  width: 18px;
  height: 74px;
  background: #8a5a32;
  box-shadow: inset -4px 0 #674426;
}

.tree::after {
  content: '';
  position: absolute;
  left: 2px;
  top: 0;
  width: 88px;
  height: 96px;
  background:
    linear-gradient(90deg, transparent 0 15%, #5e9e55 15% 85%, transparent 85% 100%),
    linear-gradient(#76bc69, #4e8c48);
  border: 4px solid #3d7039;
  box-shadow:
    0 20px 0 -4px #6faf61,
    0 20px 0 0 #3d7039,
    inset 0 10px rgba(255,255,255,0.18);
}

.ground-strip {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 72px;
  background:
    repeating-linear-gradient(90deg, #5d3d25 0 24px, #6c472a 24px 48px),
    linear-gradient(180deg, #88c46a 0 18px, #5e9b4f 18px 24px, #644025 24px 100%);
  border-top: 6px solid #3f7b3b;
  box-shadow: inset 0 8px #97d475;
}

.pixel-panel,
.pixel-button,
.wood-panel {
  border: 4px solid var(--wood-dark);
  border-radius: 8px;
  box-shadow:
    0 6px 0 #4f321e,
    0 12px 22px rgba(65, 38, 17, 0.22),
    inset 0 0 0 4px rgba(255,255,255,0.24);
}

.pixel-panel {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0) 28%),
    var(--paper);
}

.wood-panel {
  background:
    repeating-linear-gradient(90deg, rgba(102, 63, 31, 0.2) 0 8px, rgba(255,255,255,0.08) 8px 16px),
    linear-gradient(180deg, #e4aa68 0%, #b77940 100%);
}

.pixel-button {
  min-height: 48px;
  padding: 8px 18px 10px;
  border-width: 3px;
  font-family: var(--pixel-font);
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
  background:
    linear-gradient(180deg, #fff6d7 0%, #f3cd8a 100%);
  cursor: pointer;
  transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.15s ease;
}

.pixel-button:active {
  transform: translateY(4px);
  box-shadow:
    0 2px 0 #4f321e,
    0 6px 14px rgba(65, 38, 17, 0.18),
    inset 0 0 0 4px rgba(255,255,255,0.2);
}

.pixel-button.primary {
  color: #fffdf5;
  background:
    linear-gradient(180deg, #ffbd75 0%, #ea7e4d 100%);
  border-color: #8f4b2c;
}

.pixel-button.mint {
  color: #fff;
  background:
    linear-gradient(180deg, #8ee1bd 0%, #3ca575 100%);
  border-color: #287853;
}

.pixel-button.ghost {
  background:
    linear-gradient(180deg, #efffff 0%, #b8dfef 100%);
  border-color: #4983a0;
}

.stage-header {
  position: absolute;
  left: 36px;
  right: 36px;
  top: 24px;
  height: 84px;
  display: grid;
  grid-template-columns: 210px 1fr 300px;
  gap: 18px;
  align-items: center;
  z-index: 20;
}

.back-btn,
.settings-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 58px;
}

.title-plaque {
  height: 66px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--pixel-font);
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.header-right {
  display: flex;
  justify-content: flex-end;
  gap: 14px;
}

.star-box {
  min-width: 158px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-family: var(--pixel-font);
  font-size: 27px;
  color: #6a4528;
}

.star-icon {
  width: 28px;
  height: 28px;
  clip-path: polygon(50% 0, 63% 34%, 100% 36%, 71% 58%, 82% 96%, 50% 74%, 18% 96%, 29% 58%, 0 36%, 37% 34%);
  background: #ffd65a;
  border: 2px solid #9b6a1d;
  filter: drop-shadow(0 2px 0 rgba(95, 54, 12, 0.35));
}

.settings-btn {
  width: 62px;
  padding: 0;
  font-size: 30px;
}

.layout {
  position: absolute;
  left: 54px;
  right: 54px;
  top: 126px;
  bottom: 18px;
  display: grid;
  grid-template-columns: 230px 1fr 258px;
  gap: 26px;
  z-index: 10;
}

.side-stack {
  display: grid;
  grid-template-rows: 398px 1fr;
  gap: 22px;
  min-height: 0;
}

.panel-title {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 4px solid rgba(111, 73, 44, 0.32);
  font-family: var(--pixel-font);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.06em;
  background: rgba(157, 205, 159, 0.42);
}

.character-panel,
.companion-card,
.stroke-panel {
  overflow: hidden;
}

.char-list {
  padding: 18px 22px;
  display: grid;
  gap: 12px;
}

.char-button {
  position: relative;
  height: 52px;
  display: grid;
  grid-template-columns: 26px 1fr 24px;
  align-items: center;
  padding: 0 12px;
  border: 3px solid #a6794f;
  border-radius: 8px;
  background: linear-gradient(180deg, #fff8e7, #ecd2a6);
  color: var(--ink);
  font-family: var(--round-font);
  font-size: 30px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 4px 0 #8a5d39;
}

.char-button .cursor {
  width: 0;
  height: 0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-left: 15px solid transparent;
}

.char-button.active {
  background: linear-gradient(180deg, #fff0ae, #f8c76d);
  border-color: #8d5c2e;
  box-shadow:
    0 4px 0 #704523,
    0 0 0 4px rgba(255, 224, 101, 0.42);
}

.char-button.active .cursor {
  border-left-color: #e2844a;
  filter: drop-shadow(2px 0 0 #8d5c2e);
}

.char-button.done .done-mark {
  width: 16px;
  height: 16px;
  background: var(--mint-dark);
  clip-path: polygon(12% 52%, 32% 34%, 45% 50%, 82% 12%, 100% 30%, 46% 88%);
}

.companion-card {
  position: relative;
  min-height: 218px;
  padding: 14px;
}

.companion-name {
  font-family: var(--pixel-font);
  font-size: 23px;
  font-weight: 700;
  line-height: 1.25;
}

.companion-level {
  margin-top: 4px;
  font-family: var(--pixel-font);
  font-size: 18px;
  color: var(--ink-soft);
}

.pixel-creature {
  position: absolute;
  left: 50px;
  bottom: 46px;
  width: 128px;
  height: 118px;
  animation: creatureIdle 1.9s ease-in-out infinite;
}

.pixel-creature::before,
.pixel-creature::after {
  content: '';
  position: absolute;
}

.pixel-creature .body {
  position: absolute;
  left: 18px;
  top: 24px;
  width: 92px;
  height: 82px;
  border: 4px solid #7d5b43;
  border-radius: 8px;
  background:
    radial-gradient(circle at 34% 26%, #fff 0 6px, transparent 7px),
    radial-gradient(circle at 66% 26%, #fff 0 6px, transparent 7px),
    linear-gradient(180deg, #fff8e9 0%, #f7dfbd 100%);
  box-shadow:
    -18px 12px 0 -5px #fff4df,
    18px 12px 0 -5px #fff4df,
    inset 0 -8px rgba(196, 147, 91, 0.16);
}

.pixel-creature .body::before {
  content: '';
  position: absolute;
  left: 14px;
  top: -24px;
  width: 22px;
  height: 22px;
  border: 4px solid #7d5b43;
  border-radius: 6px;
  background: #fff7e8;
  box-shadow: 36px 0 0 -4px #fff7e8, 36px 0 0 0 #7d5b43;
}

.pixel-creature .face {
  position: absolute;
  left: 42px;
  top: 52px;
  width: 44px;
  height: 30px;
}

.pixel-creature .face::before {
  content: '';
  position: absolute;
  left: 2px;
  top: 0;
  width: 9px;
  height: 12px;
  background: #5b3b27;
  box-shadow: 31px 0 #5b3b27;
  border-radius: 4px;
}

.pixel-creature .face::after {
  content: '';
  position: absolute;
  left: 15px;
  top: 17px;
  width: 15px;
  height: 8px;
  border-left: 4px solid #a75446;
  border-right: 4px solid #a75446;
  border-bottom: 4px solid #a75446;
  border-radius: 0 0 10px 10px;
}

.pixel-creature .badge {
  position: absolute;
  left: 50px;
  top: 86px;
  width: 28px;
  height: 28px;
  background: var(--mint);
  clip-path: polygon(50% 0, 96% 50%, 50% 100%, 4% 50%);
  box-shadow: 0 0 0 3px #5aa47d;
}

.companion-card.celebrate .pixel-creature {
  animation: creatureCheer 0.55s ease-in-out 5;
}

@keyframes creatureIdle {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

@keyframes creatureCheer {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  35% { transform: translateY(-18px) rotate(-5deg); }
  70% { transform: translateY(-10px) rotate(5deg); }
}

.companion-speech {
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 12px;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 10px;
  border: 3px solid #9f714c;
  border-radius: 8px;
  background: rgba(255, 255, 244, 0.92);
  font-family: var(--pixel-font);
  font-size: 17px;
  line-height: 1.35;
  text-align: center;
}

.center-stage {
  position: relative;
  display: grid;
  grid-template-rows: 58px 610px 64px;
  gap: 12px;
  min-width: 0;
}

.prompt-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--pixel-font);
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 0.06em;
}

.writing-board-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 0;
}

.writing-board {
  position: relative;
  width: min(610px, 100%);
  aspect-ratio: 1 / 1;
  background:
    linear-gradient(to right, transparent calc(50% - 2px), rgba(113, 188, 210, 0.5) calc(50% - 2px) calc(50% + 2px), transparent calc(50% + 2px)),
    linear-gradient(to bottom, transparent calc(50% - 2px), rgba(113, 188, 210, 0.5) calc(50% - 2px) calc(50% + 2px), transparent calc(50% + 2px)),
    repeating-linear-gradient(0deg, rgba(201, 173, 125, 0.1) 0 4px, transparent 4px 20px),
    var(--paper);
  border: 8px solid var(--wood-dark);
  border-radius: 8px;
  box-shadow:
    0 8px 0 #4f321e,
    0 18px 32px rgba(70, 42, 18, 0.27),
    inset 0 0 0 8px #e5b46e,
    inset 0 0 0 13px #fff6df;
  overflow: hidden;
}

.writing-board::before,
.writing-board::after {
  content: '';
  position: absolute;
  width: 36px;
  height: 36px;
  border: 6px solid #d5d9cf;
  z-index: 7;
}

.writing-board::before {
  left: 13px;
  top: 13px;
  border-right: none;
  border-bottom: none;
  transform: rotate(-12deg);
}

.writing-board::after {
  right: 13px;
  bottom: 13px;
  border-left: none;
  border-top: none;
  transform: rotate(-12deg);
}

.writing-board.success {
  animation: boardPulse 0.7s ease 2;
}

@keyframes boardPulse {
  0%, 100% { filter: brightness(1); }
  45% { filter: brightness(1.12) drop-shadow(0 0 18px rgba(255, 221, 106, 0.95)); }
}

.guide-letter {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-bottom: 42px;
  font-family: var(--round-font);
  font-size: 470px;
  font-weight: 900;
  color: rgba(81, 68, 55, 0.16);
  line-height: 1;
  text-shadow:
    4px 0 rgba(255,255,255,0.55),
    0 4px rgba(255,255,255,0.55),
    6px 6px rgba(130, 98, 74, 0.08);
  pointer-events: none;
  z-index: 1;
}

#guideSvg,
#drawCanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

#guideSvg {
  z-index: 2;
  pointer-events: none;
}

#drawCanvas {
  z-index: 4;
  touch-action: none;
  cursor: crosshair;
}

.guide-stroke {
  fill: none;
  stroke: rgba(114, 100, 82, 0.22);
  stroke-width: 44;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 14 18;
}

.guide-stroke.done {
  stroke: rgba(242, 149, 92, 0.45);
  stroke-dasharray: none;
}

.guide-stroke.current {
  stroke: rgba(48, 168, 129, 0.48);
  stroke-width: 46;
  stroke-dasharray: 22 18;
  animation: guideMarch 1.2s linear infinite;
  filter: drop-shadow(0 0 7px rgba(76, 190, 145, 0.45));
}

@keyframes guideMarch {
  to { stroke-dashoffset: -80; }
}

.board-particle {
  position: absolute;
  z-index: 8;
  width: 12px;
  height: 12px;
  pointer-events: none;
  background: #ffe26a;
  clip-path: polygon(50% 0, 63% 34%, 100% 36%, 71% 58%, 82% 96%, 50% 74%, 18% 96%, 29% 58%, 0 36%, 37% 34%);
  animation: particleRise 0.9s ease-out forwards;
}

@keyframes particleRise {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(0.7); }
  100% { opacity: 0; transform: translate(-50%, -80px) scale(1.4); }
}

.feedback-row {
  display: grid;
  grid-template-columns: 1fr 170px 170px;
  gap: 14px;
  align-items: center;
}

.feedback-row .pixel-button {
  padding-left: 10px;
  padding-right: 10px;
  font-size: 22px;
  white-space: nowrap;
}

.message-box {
  min-height: 56px;
  display: flex;
  align-items: center;
  padding: 10px 20px;
  font-family: var(--pixel-font);
  font-size: 24px;
  line-height: 1.35;
}

.stroke-panel {
  display: grid;
  grid-template-rows: 50px 1fr 162px;
  min-height: 0;
}

.stroke-list {
  padding: 18px;
  display: grid;
  gap: 14px;
  align-content: start;
  overflow: hidden;
}

.stroke-card {
  height: 116px;
  display: grid;
  grid-template-columns: 46px 1fr;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border: 3px solid #a8794f;
  border-radius: 8px;
  background: linear-gradient(180deg, #fff8e8, #edd5ad);
  box-shadow: 0 4px 0 #865a37;
}

.stroke-card.done {
  border-color: #3d986d;
  background: linear-gradient(180deg, #edfff4, #bde8cf);
}

.stroke-card.current {
  border-color: #dc7a4e;
  box-shadow: 0 4px 0 #8e4e31, 0 0 0 4px rgba(255, 178, 105, 0.38);
}

.stroke-num {
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 3px solid #8b6042;
  border-radius: 50%;
  background: #fff4d8;
  font-family: var(--pixel-font);
  font-size: 21px;
  font-weight: 700;
}

.stroke-mini {
  position: relative;
  min-width: 0;
}

.stroke-mini svg {
  width: 100%;
  height: 70px;
  display: block;
  background: rgba(255, 255, 255, 0.52);
  border: 2px solid rgba(143, 101, 67, 0.35);
  border-radius: 6px;
}

.stroke-mini text {
  font-family: var(--round-font);
  font-weight: 900;
  fill: rgba(79, 56, 37, 0.2);
}

.stroke-mini path {
  fill: none;
  stroke: #bfb7a9;
  stroke-width: 60;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.stroke-card.current .stroke-mini path { stroke: var(--coral); }
.stroke-card.done .stroke-mini path { stroke: var(--mint-dark); }

.stroke-label {
  margin-top: 4px;
  font-family: var(--pixel-font);
  font-size: 16px;
  color: var(--ink-soft);
}

.reward-box {
  margin: 0 18px 18px;
  padding: 12px;
  display: grid;
  gap: 10px;
  align-content: center;
  background: rgba(255, 246, 218, 0.9);
  border: 3px solid rgba(139, 96, 66, 0.48);
  border-radius: 8px;
}

.reward-title {
  font-family: var(--pixel-font);
  font-size: 18px;
  color: var(--ink-soft);
}

.reward-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--round-font);
  font-size: 21px;
  font-weight: 900;
}

.food-pixel {
  width: 42px;
  height: 42px;
  border: 4px solid #8a5a32;
  border-radius: 8px;
  background:
    radial-gradient(circle at 28% 28%, #fff8e2 0 5px, transparent 6px),
    radial-gradient(circle at 64% 62%, #d58a57 0 5px, transparent 6px),
    linear-gradient(135deg, #f7cd83, #e89b55);
  box-shadow: inset 0 -5px rgba(127, 73, 35, 0.18);
}

.result-overlay {
  position: absolute;
  inset: 0;
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(53, 76, 65, 0.45);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease;
}

.result-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.result-card {
  width: 620px;
  min-height: 360px;
  padding: 26px 30px;
  display: grid;
  justify-items: center;
  gap: 16px;
  text-align: center;
  transform: scale(0.88);
  transition: transform 0.24s cubic-bezier(.34,1.56,.64,1);
}

.result-overlay.show .result-card { transform: scale(1); }

.result-title {
  font-family: var(--pixel-font);
  font-size: 46px;
  color: #b85f31;
  letter-spacing: 0.12em;
}

.result-copy {
  font-family: var(--round-font);
  font-size: 28px;
  font-weight: 900;
  line-height: 1.4;
}

.reward-large {
  min-width: 360px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 12px 18px;
  border: 3px solid #a8794f;
  border-radius: 8px;
  background: #fff8e8;
  font-family: var(--pixel-font);
  font-size: 23px;
}

.result-actions {
  display: flex;
  gap: 14px;
}

.result-burst {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.burst-piece {
  position: absolute;
  width: 16px;
  height: 16px;
  background: var(--c);
  left: 50%;
  top: 50%;
  clip-path: polygon(50% 0, 63% 34%, 100% 36%, 71% 58%, 82% 96%, 50% 74%, 18% 96%, 29% 58%, 0 36%, 37% 34%);
  animation: burstFly 1.1s ease-out forwards;
}

@keyframes burstFly {
  0% { opacity: 1; transform: translate(-50%, -50%) rotate(0deg) scale(0.6); }
  100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) rotate(220deg) scale(1.25); }
}
</style>
</head>
<body>
<div id="stage-wrap">
  <main id="stage" aria-label="もじっこファーム 文字書き画面">
    <div class="bg-cloud c1" style="--x:130px;--y:120px;--w:210px"></div>
    <div class="bg-cloud c2" style="--x:1160px;--y:92px;--w:178px"></div>
    <div class="bg-cloud c3" style="--x:1010px;--y:245px;--w:260px"></div>
    <div class="hill" style="--x:-170px;--y:490px;--w:760px;--h:230px;--top:#a5d099;--bottom:#6fac68"></div>
    <div class="hill" style="--x:840px;--y:450px;--w:880px;--h:270px;--top:#b2d9a3;--bottom:#6aaa60"></div>
    <div class="tree" style="--x:185px;--y:548px"></div>
    <div class="tree" style="--x:1346px;--y:535px"></div>
    <div class="ground-strip"></div>

    <header class="stage-header">
      <button class="pixel-button back-btn" id="backBtn" type="button" aria-label="もどる">← もどる</button>
      <div class="wood-panel title-plaque">ひらがなを かいてみよう！</div>
      <div class="header-right">
        <div class="pixel-panel star-box" aria-label="スター">
          <span class="star-icon" aria-hidden="true"></span>
          <span id="starCount">1250</span>
        </div>
        <button class="pixel-button settings-btn" type="button" aria-label="せってい">⚙</button>
      </div>
    </header>

    <section class="layout">
      <div class="side-stack">
        <aside class="pixel-panel character-panel" aria-label="もじリスト">
          <div class="panel-title">もじリスト</div>
          <div class="char-list" id="charList"></div>
        </aside>

        <aside class="pixel-panel companion-card" id="companionCard" aria-label="仮のミルマル">
          <div class="companion-name">ミルマル</div>
          <div class="companion-level">Lv. 12</div>
          <div class="pixel-creature" aria-hidden="true">
            <div class="body"></div>
            <div class="face"></div>
            <div class="badge"></div>
          </div>
          <div class="companion-speech" id="companionSpeech">ゆっくりで だいじょうぶ</div>
        </aside>
      </div>

      <section class="center-stage" aria-label="文字なぞりエリア">
        <div class="wood-panel prompt-bar" id="promptText">「あ」を かいてみよう！</div>
        <div class="writing-board-wrap">
          <div class="writing-board" id="writingBoard">
            <div class="guide-letter" id="guideLetter">あ</div>
            <svg id="guideSvg" viewBox="0 0 1000 1000" aria-hidden="true"></svg>
            <canvas id="drawCanvas" width="1000" height="1000" aria-label="文字を書くキャンバス"></canvas>
          </div>
        </div>
        <div class="feedback-row">
          <div class="pixel-panel message-box" id="messageBox">うすい もじを なぞってね</div>
          <button class="pixel-button ghost" id="resetBtn" type="button">もういっかい</button>
          <button class="pixel-button primary" id="doneBtn" type="button">できた！</button>
        </div>
      </section>

      <aside class="pixel-panel stroke-panel" aria-label="かきじゅん">
        <div class="panel-title">かきじゅん</div>
        <div class="stroke-list" id="strokeList"></div>
        <div class="reward-box">
          <div class="reward-title">ごほうび</div>
          <div class="reward-item">
            <span class="food-pixel" aria-hidden="true"></span>
            <span id="rewardName">もじクッキー</span>
          </div>
        </div>
      </aside>
    </section>

    <div class="result-overlay" id="resultOverlay" role="dialog" aria-modal="true" aria-label="かんせい">
      <div class="result-burst" id="resultBurst"></div>
      <div class="pixel-panel result-card">
        <div class="result-title">すごい！</div>
        <div class="result-copy">じょうずに かけたね！</div>
        <div class="reward-large">
          <span class="food-pixel" aria-hidden="true"></span>
          <span id="resultReward">もじクッキーを ゲット！</span>
        </div>
        <div class="result-actions">
          <button class="pixel-button ghost" id="modalRetryBtn" type="button">もういっかい</button>
          <button class="pixel-button mint" id="modalNextBtn" type="button">つぎのもじ</button>
          <button class="pixel-button" id="careBtn" type="button">おせわへ</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
'use strict';

const writingCharacters = [
  {
    id: 'a',
    char: 'あ',
    label: 'あ',
    strokes: 3,
    minDistance: 820,
    rewardFood: 'もじクッキー',
    reward: { type: 'food', id: 'moji_cookie', name: 'もじクッキー' },
    guidePaths: [
      'M 315 255 C 425 225 565 220 705 246',
      'M 510 168 C 490 315 492 508 527 690',
      'M 660 388 C 560 346 420 382 350 492 C 276 610 335 750 468 735 C 612 720 742 596 713 472 C 695 405 648 372 586 366'
    ]
  },
  {
    id: 'i',
    char: 'い',
    label: 'い',
    strokes: 2,
    minDistance: 560,
    rewardFood: 'ふわパン',
    reward: { type: 'food', id: 'fuwa_pan', name: 'ふわパン' },
    guidePaths: [
      'M 355 238 C 326 420 352 606 445 702',
      'M 635 276 C 725 422 752 560 724 690'
    ]
  },
  {
    id: 'u',
    char: 'う',
    label: 'う',
    strokes: 2,
    minDistance: 650,
    rewardFood: 'そらまめ',
    reward: { type: 'food', id: 'sora_mame', name: 'そらまめ' },
    guidePaths: [
      'M 398 254 C 505 210 626 220 704 282',
      'M 328 456 C 500 350 742 410 662 616 C 616 728 496 765 386 726'
    ]
  },
  {
    id: 'e',
    char: 'え',
    label: 'え',
    strokes: 2,
    minDistance: 720,
    rewardFood: 'おひさまゼリー',
    reward: { type: 'food', id: 'sun_jelly', name: 'おひさまゼリー' },
    guidePaths: [
      'M 392 226 C 512 188 628 194 712 248',
      'M 376 414 C 486 370 606 360 698 398 C 600 472 498 574 358 700 C 474 622 560 598 642 662 C 696 704 760 710 824 678'
    ]
  },
  {
    id: 'o',
    char: 'お',
    label: 'お',
    strokes: 3,
    minDistance: 850,
    rewardFood: 'にじキャンディ',
    reward: { type: 'food', id: 'rainbow_candy', name: 'にじキャンディ' },
    guidePaths: [
      'M 320 280 C 444 260 560 258 690 278',
      'M 484 160 C 472 330 472 540 490 720',
      'M 332 500 C 252 612 304 724 436 706 C 560 688 636 574 612 482 C 690 392 814 420 824 572'
    ]
  }
];

const stageEl = document.getElementById('stage');
const charListEl = document.getElementById('charList');
const guideLetterEl = document.getElementById('guideLetter');
const guideSvgEl = document.getElementById('guideSvg');
const drawCanvas = document.getElementById('drawCanvas');
const writingBoard = document.getElementById('writingBoard');
const promptText = document.getElementById('promptText');
const messageBox = document.getElementById('messageBox');
const strokeListEl = document.getElementById('strokeList');
const rewardNameEl = document.getElementById('rewardName');
const resultOverlay = document.getElementById('resultOverlay');
const resultReward = document.getElementById('resultReward');
const resultBurst = document.getElementById('resultBurst');
const companionCard = document.getElementById('companionCard');
const companionSpeech = document.getElementById('companionSpeech');
const starCountEl = document.getElementById('starCount');

const ctx = drawCanvas.getContext('2d');
let currentIndex = 0;
let isDrawing = false;
let lastPoint = null;
let currentStrokeDistance = 0;
let drawnDistance = 0;
let strokesCompleted = 0;
let complete = false;
let stars = 1250;
let sparkleBudget = 0;

function fitStage() {
  const scale = Math.min(window.innerWidth / 1600, window.innerHeight / 900);
  const ox = (window.innerWidth - 1600 * scale) / 2;
  const oy = (window.innerHeight - 900 * scale) / 2;
  stageEl.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
}

window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));
document.addEventListener('visibilitychange', () => { if (!document.hidden) fitStage(); });
fitStage();

function getCurrentCharacter() {
  return writingCharacters[currentIndex];
}

function escapeAttr(value) {
  return String(value).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function buildCharacterList() {
  charListEl.innerHTML = '';
  writingCharacters.forEach((item, index) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'char-button';
    btn.dataset.index = String(index);
    btn.innerHTML = `<span class="cursor" aria-hidden="true"></span><span>${item.label}</span><span class="done-mark" aria-hidden="true"></span>`;
    btn.addEventListener('click', () => selectCharacter(index));
    charListEl.appendChild(btn);
  });
}

function renderGuide() {
  const item = getCurrentCharacter();
  guideLetterEl.textContent = item.char;
  const currentStroke = Math.min(strokesCompleted, item.strokes - 1);
  guideSvgEl.innerHTML = item.guidePaths.map((d, index) => {
    const cls = index < strokesCompleted ? 'done' : (index === currentStroke ? 'current' : '');
    return `<path class="guide-stroke ${cls}" d="${escapeAttr(d)}"></path>`;
  }).join('');
}

function renderStrokeOrder() {
  const item = getCurrentCharacter();
  strokeListEl.innerHTML = '';
  for (let index = 0; index < item.strokes; index++) {
    const card = document.createElement('div');
    const cls = index < strokesCompleted ? 'done' : (index === Math.min(strokesCompleted, item.strokes - 1) ? 'current' : '');
    card.className = `stroke-card ${cls}`;
    card.innerHTML = `
      <div class="stroke-num">${index + 1}</div>
      <div class="stroke-mini">
        <svg viewBox="0 0 1000 1000" aria-hidden="true">
          <text x="500" y="650" text-anchor="middle" font-size="680">${item.char}</text>
          <path d="${escapeAttr(item.guidePaths[index])}"></path>
        </svg>
        <div class="stroke-label">${index + 1}かくめ</div>
      </div>
    `;
    strokeListEl.appendChild(card);
  }
}

function updateCharacterButtons() {
  const buttons = charListEl.querySelectorAll('.char-button');
  buttons.forEach((btn, index) => {
    btn.classList.toggle('active', index === currentIndex);
  });
}

function clearCanvas() {
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

function setMessage(text, speech) {
  messageBox.textContent = text;
  if (speech) companionSpeech.textContent = speech;
}

function resetWriting() {
  isDrawing = false;
  lastPoint = null;
  currentStrokeDistance = 0;
  drawnDistance = 0;
  strokesCompleted = 0;
  complete = false;
  sparkleBudget = 0;
  clearCanvas();
  writingBoard.classList.remove('success');
  resultOverlay.classList.remove('show');
  companionCard.classList.remove('celebrate');
  const item = getCurrentCharacter();
  promptText.textContent = `「${item.char}」を かいてみよう！`;
  rewardNameEl.textContent = item.reward.name;
  setMessage('うすい もじを なぞってね', 'ゆっくりで だいじょうぶ');
  renderGuide();
  renderStrokeOrder();
  updateCharacterButtons();
}

function selectCharacter(index) {
  currentIndex = index;
  resetWriting();
}

function boardPointFromEvent(event) {
  const rect = drawCanvas.getBoundingClientRect();
  return {
    x: Math.max(0, Math.min(1000, ((event.clientX - rect.left) / rect.width) * 1000)),
    y: Math.max(0, Math.min(1000, ((event.clientY - rect.top) / rect.height) * 1000)),
    clientX: event.clientX,
    clientY: event.clientY
  };
}

function distance(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function drawPixelSquare(x, y, size, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  const px = Math.round(x / 8) * 8;
  const py = Math.round(y / 8) * 8;
  ctx.fillRect(px - size / 2, py - size / 2, size, size);
  ctx.restore();
}

function drawTrail(from, to) {
  const d = distance(from, to);
  if (!Number.isFinite(d) || d <= 0) return 0;
  const steps = Math.max(1, Math.ceil(d / 9));
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const x = from.x + (to.x - from.x) * t;
    const y = from.y + (to.y - from.y) * t;
    drawPixelSquare(x, y, 18, '#f27c5b', 0.78);
    drawPixelSquare(x + 3, y - 3, 8, '#ffe38a', 0.42);
  }
  return d;
}

function spawnSpark(clientX, clientY) {
  const rect = writingBoard.getBoundingClientRect();
  const particle = document.createElement('div');
  particle.className = 'board-particle';
  particle.style.left = (clientX - rect.left) + 'px';
  particle.style.top = (clientY - rect.top) + 'px';
  writingBoard.appendChild(particle);
  setTimeout(() => particle.remove(), 900);
}

function onPointerDown(event) {
  if (complete) return;
  if (event.pointerType === 'mouse' && event.button !== 0) return;
  isDrawing = true;
  lastPoint = boardPointFromEvent(event);
  currentStrokeDistance = 0;
  drawPixelSquare(lastPoint.x, lastPoint.y, 20, '#f27c5b', 0.9);
  try { drawCanvas.setPointerCapture(event.pointerId); } catch (_) {}
  setMessage(Math.random() > 0.5 ? 'そのまま そーっと' : 'いいかんじ！', 'いいかんじ！');
  event.preventDefault();
}

function onPointerMove(event) {
  if (!isDrawing || complete) return;
  const next = boardPointFromEvent(event);
  const d = drawTrail(lastPoint, next);
  drawnDistance += d;
  currentStrokeDistance += d;
  sparkleBudget += d;
  if (sparkleBudget > 130) {
    sparkleBudget = 0;
    spawnSpark(event.clientX, event.clientY);
  }
  lastPoint = next;
  event.preventDefault();
}

function onPointerUp(event) {
  if (!isDrawing) return;
  isDrawing = false;
  try { drawCanvas.releasePointerCapture(event.pointerId); } catch (_) {}
  if (currentStrokeDistance > 44) {
    const item = getCurrentCharacter();
    strokesCompleted = Math.min(item.strokes, strokesCompleted + 1);
    setMessage(strokesCompleted >= item.strokes ? 'さいごまで かけたね！' : 'いいかんじ！ つぎの せんも いこう', 'もうすこし！');
    renderGuide();
    renderStrokeOrder();
    checkAutoComplete();
  } else {
    setMessage('もういちど やってみよう', 'だいじょうぶ');
  }
  currentStrokeDistance = 0;
}

function checkAutoComplete() {
  const item = getCurrentCharacter();
  if (complete) return;
  const enoughDistance = drawnDistance >= item.minDistance * 0.55;
  if (strokesCompleted >= item.strokes && enoughDistance) {
    setTimeout(() => completeWriting(false), 360);
  }
}

function calculateAccuracy(item) {
  const distanceScore = Math.min(1, drawnDistance / item.minDistance);
  const strokeScore = Math.min(1, strokesCompleted / item.strokes);
  const score = 0.68 + distanceScore * 0.2 + strokeScore * 0.09;
  return Math.max(0.72, Math.min(0.97, Math.round(score * 100) / 100));
}

function completeWriting(manual) {
  const item = getCurrentCharacter();
  if (complete) return;
  if (manual && drawnDistance < item.minDistance * 0.22 && strokesCompleted === 0) {
    setMessage('うすい もじを すこし なぞってみよう', 'いっしょに かこう');
    return;
  }

  complete = true;
  strokesCompleted = Math.max(strokesCompleted, Math.min(item.strokes, strokesCompleted));
  renderGuide();
  renderStrokeOrder();
  writingBoard.classList.add('success');
  companionCard.classList.add('celebrate');
  setMessage('すごい！ じょうずに かけたね！', 'やったね！');
  resultReward.textContent = `${item.reward.name}を ゲット！`;
  stars += 25;
  starCountEl.textContent = String(stars);
  launchBurst();

  const result = {
    characterId: item.id,
    char: item.char,
    success: true,
    accuracy: calculateAccuracy(item),
    strokesCompleted: item.strokes,
    reward: item.reward
  };
  onWritingComplete(result);

  setTimeout(() => {
    resultOverlay.classList.add('show');
  }, 520);
}

function onWritingComplete(result) {
  console.log('writing complete', result);
}

function launchBurst() {
  resultBurst.innerHTML = '';
  const colors = ['#ffe26a', '#f39a5d', '#86d7ac', '#79c3e7', '#fff8e8'];
  for (let i = 0; i < 34; i++) {
    const piece = document.createElement('div');
    piece.className = 'burst-piece';
    const angle = (Math.PI * 2 * i) / 34;
    const distancePx = 180 + Math.random() * 280;
    piece.style.setProperty('--tx', Math.cos(angle) * distancePx + 'px');
    piece.style.setProperty('--ty', Math.sin(angle) * distancePx + 'px');
    piece.style.setProperty('--c', colors[i % colors.length]);
    piece.style.animationDelay = (Math.random() * 0.12) + 's';
    resultBurst.appendChild(piece);
  }
  setTimeout(() => { resultBurst.innerHTML = ''; }, 1300);
}

function nextCharacter() {
  currentIndex = (currentIndex + 1) % writingCharacters.length;
  resetWriting();
}

document.getElementById('backBtn').addEventListener('click', () => {
  window.location.href = '../play.html';
});

document.querySelector('.settings-btn').addEventListener('click', () => {
  setMessage('せっていは じゅんびちゅうだよ', 'あとでね');
});

document.getElementById('resetBtn').addEventListener('click', resetWriting);
document.getElementById('doneBtn').addEventListener('click', () => completeWriting(true));
document.getElementById('modalRetryBtn').addEventListener('click', resetWriting);
document.getElementById('modalNextBtn').addEventListener('click', nextCharacter);
document.getElementById('careBtn').addEventListener('click', () => {
  resultOverlay.classList.remove('show');
  setMessage('おせわは つぎの おたのしみ！', 'また あとで');
});

drawCanvas.addEventListener('pointerdown', onPointerDown);
drawCanvas.addEventListener('pointermove', onPointerMove);
drawCanvas.addEventListener('pointerup', onPointerUp);
drawCanvas.addEventListener('pointercancel', onPointerUp);
drawCanvas.addEventListener('pointerleave', onPointerUp);

window.MojikkoWritingGame = {
  writingCharacters,
  selectCharacter,
  resetWriting,
  completeWriting: () => completeWriting(true),
  getCurrentCharacter
};

buildCharacterList();
resetWriting();
</script>
</body>
</html>
