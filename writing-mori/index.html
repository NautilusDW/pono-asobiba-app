<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>もじっこファーム | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="manifest" href="../manifest.json">
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@500;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #4f3825;
  --ink-soft: #82624a;
  --wood-dark: #6e4b2d;
  --wood-mid: #a36b3c;
  --wood-light: #d99a5e;
  --paper: #fff8e8;
  --paper-deep: #f1ddb7;
  --cream: #fff3cf;
  --mint: #86d7ac;
  --mint-dark: #3c986f;
  --sky: #8ed2ec;
  --sky-soft: #caeff8;
  --orange: #f3a65f;
  --coral: #ee7b6b;
  --blue: #64abd2;
  --green: #75b96f;
  --shadow: rgba(70, 42, 18, 0.25);
  --pixel-font: 'DotGothic16', 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --round-font: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --moji-writing-board: url('../assets/images/mojikko/writing/board_frame.png');
  --moji-panel-plain: url('../assets/images/mojikko/writing/panel_plain.png');
  --moji-panel-leaf: url('../assets/images/mojikko/writing/panel_leaf.png');
  --moji-prompt-sign: url('../assets/images/mojikko/writing/prompt_sign_wide.png');
  --moji-star-counter: url('../assets/images/mojikko/writing/star_counter.png');
  --moji-settings-button: url('../assets/images/mojikko/writing/settings_button.png');
  --moji-companion-normal: url('../assets/images/mojikko/writing/companion_card_normal.png');
  --moji-companion-reward: url('../assets/images/mojikko/writing/companion_card_reward.png');
  --moji-milmaru-wave: url('../assets/images/mojikko/writing/milmaru_wave.png');
  --moji-milmaru-cookie: url('../assets/images/mojikko/writing/milmaru_cookie.png');
  --moji-milmaru-cheer: url('../assets/images/mojikko/writing/milmaru_cheer.png');
  --moji-milmaru-egg: url('../assets/images/mojikko/care/milmaru_egg_idle.png');
  --moji-milmaru-baby: url('../assets/images/mojikko/care/milmaru_shell_baby_happy.png');
  --moji-reward-box: url('../assets/images/mojikko/writing/reward_box.png');
  --moji-button-success: url('../assets/images/mojikko/writing/button_success_normal.png');
  --moji-button-success-pressed: url('../assets/images/mojikko/writing/button_success_pressed.png');
  --moji-button-retry: url('../assets/images/mojikko/writing/button_retry_wide_normal.png');
  --moji-button-retry-pressed: url('../assets/images/mojikko/writing/button_retry_wide_pressed.png');
  --moji-button-care: url('../assets/images/mojikko/writing/button_care_normal.png');
  --moji-button-care-pressed: url('../assets/images/mojikko/writing/button_care_pressed.png');
  --moji-button-small-success: url('../assets/images/mojikko/writing/button_small_success_normal.png');
  --moji-button-small-success-pressed: url('../assets/images/mojikko/writing/button_small_success_pressed.png');
  --moji-button-small-retry: url('../assets/images/mojikko/writing/button_small_retry_normal.png');
  --moji-button-small-retry-pressed: url('../assets/images/mojikko/writing/button_small_retry_pressed.png');
  --moji-button-modal-care: url('../assets/images/mojikko/writing/button_modal_care_clean_normal.png');
  --moji-button-modal-care-pressed: url('../assets/images/mojikko/writing/button_modal_care_clean_pressed.png');
  --moji-button-modal-next: url('../assets/images/mojikko/writing/button_modal_next_clean_normal.png');
  --moji-button-modal-next-pressed: url('../assets/images/mojikko/writing/button_modal_next_clean_pressed.png');
  --moji-icon-cookie: url('../assets/images/mojikko/writing/icon_cookie.png');
  --moji-icon-cookie-glow: url('../assets/images/mojikko/writing/icon_cookie_glow.png');
  --moji-icon-alert: url('../assets/images/mojikko/writing/icon_alert.png');
  --moji-icon-star: url('../assets/images/mojikko/writing/icon_star.png');
  --moji-icon-pencil: url('../assets/images/mojikko/writing/icon_pencil.png');
  --moji-bg-garden: url('../assets/images/mojikko/care/yard_background_wide_v2.png');
  --moji-kana-tab-normal: url('../assets/images/mojikko/writing/kana_tab_normal.png');
  --moji-kana-tab-active: url('../assets/images/mojikko/writing/kana_tab_active.png');
  --moji-char-button-normal: url('../assets/images/mojikko/writing/char_button_normal.png');
  --moji-char-button-active: url('../assets/images/mojikko/writing/char_button_active.png');
  --moji-char-button-done: url('../assets/images/mojikko/writing/char_button_done.png');
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  color: var(--ink);
  background: #243b33;
  font-family: var(--round-font);
  position: fixed;
  inset: 0;
}

#stage-wrap {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background:
    linear-gradient(180deg, #233f53 0%, #12222b 100%);
}

#stage {
  position: absolute;
  top: 0;
  left: 0;
  width: 1600px;
  height: 900px;
  transform-origin: 0 0;
  overflow: hidden;
  background: var(--moji-bg-garden) right center / cover no-repeat;
  image-rendering: pixelated;
}

#stage::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,0.035) 0 2px, transparent 2px 8px),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 8px);
  mix-blend-mode: soft-light;
  pointer-events: none;
}

.bg-cloud,
.hill,
.tree,
.ground-strip {
  display: none;
}

@media (orientation: portrait) {
  body::before {
    content: 'よこむきに してね';
    position: fixed;
    inset: 0;
    z-index: 100000;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1f2e2b;
    color: #ffe59d;
    font-family: var(--pixel-font);
    font-size: clamp(1.2rem, 6vw, 2.2rem);
    letter-spacing: 0.16em;
    text-align: center;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

.bg-cloud {
  position: absolute;
  width: var(--w);
  height: calc(var(--w) * 0.28);
  left: var(--x);
  top: var(--y);
  opacity: 0.9;
  background:
    radial-gradient(ellipse at 20% 55%, #fff 0 28%, transparent 29%),
    radial-gradient(ellipse at 44% 38%, #fff 0 34%, transparent 35%),
    radial-gradient(ellipse at 70% 58%, #fff 0 30%, transparent 31%),
    linear-gradient(#fff 0 0) 15% 55% / 72% 42% no-repeat;
  filter: drop-shadow(0 4px 0 rgba(99, 150, 164, 0.2));
  animation: cloudBob 7s ease-in-out infinite;
}

.bg-cloud.c2 { animation-duration: 9s; animation-delay: -2s; }
.bg-cloud.c3 { animation-duration: 8s; animation-delay: -4s; }

@keyframes cloudBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.hill {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: var(--w);
  height: var(--h);
  border-radius: 50% 50% 0 0 / 70% 70% 0 0;
  background: linear-gradient(180deg, var(--top), var(--bottom));
  box-shadow: inset 0 8px rgba(255,255,255,0.18);
}

.tree {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: 92px;
  height: 160px;
  pointer-events: none;
}

.tree::before {
  content: '';
  position: absolute;
  left: 38px;
  bottom: 0;
  width: 18px;
  height: 74px;
  background: #8a5a32;
  box-shadow: inset -4px 0 #674426;
}

.tree::after {
  content: '';
  position: absolute;
  left: 2px;
  top: 0;
  width: 88px;
  height: 96px;
  background:
    linear-gradient(90deg, transparent 0 15%, #5e9e55 15% 85%, transparent 85% 100%),
    linear-gradient(#76bc69, #4e8c48);
  border: 4px solid #3d7039;
  box-shadow:
    0 20px 0 -4px #6faf61,
    0 20px 0 0 #3d7039,
    inset 0 10px rgba(255,255,255,0.18);
}

.ground-strip {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 72px;
  background:
    repeating-linear-gradient(90deg, #5d3d25 0 24px, #6c472a 24px 48px),
    linear-gradient(180deg, #88c46a 0 18px, #5e9b4f 18px 24px, #644025 24px 100%);
  border-top: 6px solid #3f7b3b;
  box-shadow: inset 0 8px #97d475;
}

.pixel-panel,
.pixel-button,
.wood-panel {
  border: 4px solid var(--wood-dark);
  border-radius: 8px;
  box-shadow:
    0 6px 0 #4f321e,
    0 12px 22px rgba(65, 38, 17, 0.22),
    inset 0 0 0 4px rgba(255,255,255,0.24);
}

.pixel-panel {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0) 28%),
    var(--paper);
}

.wood-panel {
  background:
    repeating-linear-gradient(90deg, rgba(102, 63, 31, 0.2) 0 8px, rgba(255,255,255,0.08) 8px 16px),
    linear-gradient(180deg, #e4aa68 0%, #b77940 100%);
}

.pixel-button {
  min-height: 48px;
  padding: 8px 18px 10px;
  border-width: 3px;
  font-family: var(--pixel-font);
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
  background:
    linear-gradient(180deg, #fff6d7 0%, #f3cd8a 100%);
  cursor: pointer;
  transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.15s ease;
  image-rendering: pixelated;
}

.pixel-button:active {
  transform: translateY(4px);
  box-shadow:
    0 2px 0 #4f321e,
    0 6px 14px rgba(65, 38, 17, 0.18),
    inset 0 0 0 4px rgba(255,255,255,0.2);
}

.pixel-button.primary {
  color: #fffdf5;
  background:
    linear-gradient(180deg, #ffbd75 0%, #ea7e4d 100%);
  border-color: #8f4b2c;
}

.pixel-button.mint {
  color: #fff;
  background:
    linear-gradient(180deg, #8ee1bd 0%, #3ca575 100%);
  border-color: #287853;
}

.pixel-button.ghost {
  background:
    linear-gradient(180deg, #efffff 0%, #b8dfef 100%);
  border-color: #4983a0;
}

.stage-header {
  position: absolute;
  left: 36px;
  right: 36px;
  top: 24px;
  height: 84px;
  display: grid;
  grid-template-columns: 210px 1fr 300px;
  gap: 18px;
  align-items: center;
  z-index: 20;
}

.back-btn,
.settings-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 58px;
}

.title-plaque {
  display: none;
  height: 66px;
  align-items: center;
  justify-content: center;
  font-family: var(--pixel-font);
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.header-right {
  grid-column: 3;
  display: flex;
  justify-content: flex-end;
  gap: 14px;
}

.star-box {
  width: 186px;
  min-width: 186px;
  aspect-ratio: 291 / 91;
  height: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding-left: 52px;
  font-family: var(--pixel-font);
  font-size: 27px;
  color: #6a4528;
  border: 0;
  border-radius: 0;
  background: var(--moji-star-counter) center / contain no-repeat;
  box-shadow: none;
  image-rendering: pixelated;
}

.star-icon {
  display: none;
}

.settings-btn {
  width: 62px;
  height: 58px;
  padding: 0;
  font-size: 30px;
  border: 0;
  border-radius: 0;
  background: var(--moji-settings-button) center / contain no-repeat;
  box-shadow: none;
  color: transparent;
  text-shadow: none;
  image-rendering: pixelated;
}

.layout {
  position: absolute;
  left: 54px;
  right: 54px;
  top: 126px;
  bottom: 18px;
  display: grid;
  grid-template-columns: 292px 1fr 258px;
  gap: 26px;
  z-index: 10;
}

#stage.compact .stage-header {
  left: 210px;
  right: 210px;
  top: 18px;
}

#stage.compact .layout {
  left: 210px;
  right: 210px;
  top: 104px;
  bottom: 12px;
  grid-template-columns: 292px minmax(0, 1fr) 258px;
  gap: 18px;
}

.side-stack {
  display: grid;
  grid-template-rows: 430px minmax(0, 1fr);
  gap: 22px;
  min-height: 0;
}

.panel-title {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 4px solid rgba(83, 112, 66, 0.28);
  font-family: var(--pixel-font);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: #fffaf0;
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,0.1) 0 9px, transparent 9px 18px),
    linear-gradient(180deg, #86d7ac, #3fa774);
  text-shadow: 2px 2px 0 rgba(54, 86, 50, 0.5);
}

.character-panel,
.companion-card,
.stroke-panel {
  overflow: hidden;
}

.character-panel,
.stroke-panel {
  border: 5px solid var(--wood-dark);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0) 18%),
    linear-gradient(180deg, #fff9ea 0%, #f4dfbd 100%);
  box-shadow:
    0 6px 0 #4f321e,
    inset 0 0 0 4px rgba(255, 255, 255, 0.28);
  image-rendering: pixelated;
}

.character-panel {
  display: grid;
  grid-template-rows: 50px 50px minmax(0, 1fr);
  min-height: 0;
}

.kana-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  padding: 10px 16px 4px;
}

.kana-tab {
  height: 36px;
  border: 0;
  border-radius: 0;
  background: var(--moji-kana-tab-normal) center / 100% 100% no-repeat;
  color: #4f3825;
  font-family: var(--pixel-font);
  font-size: 15px;
  font-weight: 700;
  box-shadow: none;
  cursor: pointer;
  image-rendering: pixelated;
}

.kana-tab.active {
  background-image: var(--moji-kana-tab-active);
  filter: drop-shadow(0 0 4px rgba(255, 223, 96, 0.42));
}

.char-list {
  min-height: 0;
  padding: 9px 14px 14px;
  display: grid;
  gap: 8px;
  align-content: start;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #a8794f rgba(255, 255, 255, 0.2);
}

.char-row {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 7px;
}

.char-button {
  position: relative;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  border: 0;
  border-radius: 0;
  background: var(--moji-char-button-normal) center / 100% 100% no-repeat;
  color: var(--ink);
  font-family: var(--round-font);
  font-size: 23px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: none;
  image-rendering: pixelated;
}

.char-button .cursor {
  position: absolute;
  left: 4px;
  top: 50%;
  width: 0;
  height: 0;
  transform: translateY(-50%);
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-left: 8px solid transparent;
}

.char-spacer {
  min-height: 44px;
}

.char-button.active {
  background-image: var(--moji-char-button-active);
  filter: drop-shadow(0 0 4px rgba(255, 224, 101, 0.48));
}

.char-button.active .cursor {
  border-left-color: #e2844a;
  filter: drop-shadow(2px 0 0 #8d5c2e);
}

.char-button.done .done-mark {
  display: none;
}

.char-button.done {
  background-image: var(--moji-char-button-done);
}

.char-button.done.active {
  background-image: var(--moji-char-button-active);
}

.companion-card {
  position: relative;
  align-self: end;
  aspect-ratio: 248 / 295;
  min-height: 0;
  padding: 14px;
  appearance: none;
  width: 100%;
  height: 100%;
  aspect-ratio: auto;
  text-align: left;
  font: inherit;
  color: inherit;
  cursor: pointer;
  border: 5px solid var(--wood-dark);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0) 22%),
    linear-gradient(180deg, #fffaf0 0%, #fff1dc 100%);
  box-shadow:
    0 6px 0 #4f321e,
    inset 0 0 0 4px rgba(255, 255, 255, 0.28);
  image-rendering: pixelated;
  transition: transform 0.12s ease, filter 0.18s ease, box-shadow 0.18s ease;
}

.companion-card:hover {
  filter: brightness(1.04);
}

.companion-card:focus-visible {
  outline: 5px solid rgba(255, 214, 90, 0.8);
  outline-offset: 3px;
}

.companion-card.reward-ready {
  animation: careCardGlow 1.4s ease-in-out infinite;
}

@keyframes careCardGlow {
  0%, 100% {
    filter: brightness(1);
  }
  50% {
    filter: brightness(1.08) drop-shadow(0 0 12px rgba(255, 218, 91, 0.68));
  }
}

.companion-alert {
  position: absolute;
  right: 14px;
  top: 12px;
  width: 34px;
  height: 34px;
  display: none;
  align-items: center;
  justify-content: center;
  border: 0;
  border-radius: 0;
  background: var(--moji-icon-alert) center / contain no-repeat;
  color: transparent;
  font-family: var(--pixel-font);
  font-size: 24px;
  box-shadow: none;
  text-shadow: none;
}

.companion-card.reward-ready .companion-alert {
  display: none;
}

.companion-cookie {
  position: absolute;
  left: 160px;
  top: 15px;
  width: 24px;
  height: 24px;
  display: block;
  border: 0;
  border-radius: 0;
  background: var(--moji-icon-cookie-glow) center / contain no-repeat;
  box-shadow: none;
}

.companion-card.reward-ready .companion-cookie {
  display: block;
}

.companion-name {
  position: absolute;
  left: 16px;
  right: auto;
  top: 17px;
  font-family: var(--pixel-font);
  font-size: 19px;
  font-weight: 700;
  line-height: 1;
  text-align: left;
  white-space: nowrap;
}

.companion-level {
  position: absolute;
  left: 188px;
  right: 14px;
  top: 18px;
  margin-top: 0;
  font-family: var(--pixel-font);
  font-size: 15px;
  color: var(--ink-soft);
  text-align: left;
  white-space: nowrap;
}

.pixel-creature {
  position: absolute;
  left: 50%;
  top: 122px;
  bottom: auto;
  width: 152px;
  height: 142px;
  transform: translateX(-50%);
  background: var(--moji-milmaru-wave) center bottom / contain no-repeat;
  animation: creatureIdle 1.9s ease-in-out infinite;
  image-rendering: pixelated;
}

.pixel-creature .body,
.pixel-creature .face,
.pixel-creature .badge {
  display: none;
}

.companion-card.reward-ready .pixel-creature {
  background-image: var(--moji-milmaru-cookie);
}

.companion-card.egg-state .pixel-creature,
.companion-card.egg-state.reward-ready .pixel-creature {
  top: 126px;
  width: 124px;
  height: 154px;
  background-image: var(--moji-milmaru-egg);
}

.companion-card.hatched-state .pixel-creature {
  background-image: var(--moji-milmaru-baby);
}

.companion-card.celebrate .pixel-creature {
  background-image: var(--moji-milmaru-cheer);
  animation: creatureCheer 0.55s ease-in-out 5;
}

.companion-card.egg-state.celebrate .pixel-creature {
  background-image: var(--moji-milmaru-egg);
}

@keyframes creatureIdle {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-6px); }
}

@keyframes creatureCheer {
  0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
  35% { transform: translateX(-50%) translateY(-18px) rotate(-5deg); }
  70% { transform: translateX(-50%) translateY(-10px) rotate(5deg); }
}

.companion-speech {
  position: absolute;
  left: 14px;
  right: 14px;
  top: 50px;
  bottom: auto;
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 7px 10px 6px;
  border: 3px solid rgba(139, 96, 66, 0.42);
  border-radius: 8px;
  background: rgba(255, 253, 245, 0.82);
  box-shadow: inset 0 0 0 3px rgba(255,255,255,0.35);

    linear-gradient(0deg, transparent calc(50% - 2px), rgba(130, 207, 226, 0.72) calc(50% - 2px) calc(50% + 2px), transparent calc(50% + 2px)),

.food-pixel.milk::before {

.result-overlay {

.result-overlay.show {

.result-card {

#careBtn {

.result-burst {

@keyframes burstFly {

<body>
<div id="stage-wrap">
  <main id="stage" aria-label="もじっこファーム 文字書き画面">
    <div class="bg-cloud c1" style="--x:130px;--y:120px;--w:210px"></div>
    <div class="bg-cloud c2" style="--x:1160px;--y:92px;--w:178px"></div>

もじを かこう！</div>

const KANA_GROUPS = [

function getAudioContext() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return null;
  if (!audioCtx) audioCtx = new AudioContextClass();
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  return audioCtx;
}

function playTone(frequency, duration = 0.06, type = 'square', volume = 0.035, delay = 0) {
  const ctx = getAudioContext();
  if (!ctx) return;
  const start = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(volume, start + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.02);
}

function playNoise(duration = 0.045, volume = 0.018) {
  const ctx = getAudioContext();
  if (!ctx) return;
  const sampleCount = Math.max(1, Math.floor(ctx.sampleRate * duration));
  const buffer = ctx.createBuffer(1, sampleCount, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < sampleCount; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / sampleCount);
  }
  const source = ctx.createBufferSource();
  const gain = ctx.createGain();
  gain.gain.value = volume;
  source.buffer = buffer;
  source.connect(gain);
  gain.connect(ctx.destination);
  source.start();
}

function playSfx(kind) {
  try {
    if (kind === 'writeMove') {
      playNoise(0.028, 0.010);
      return;
    }
    if (kind === 'writeStart') {
      playTone(430, 0.045, 'triangle', 0.026);
      return;
    }
    if (kind === 'strokeOk') {
      playTone(720, 0.055, 'square', 0.036);
      playTone(960, 0.07, 'square', 0.032, 0.055);
      return;
    }
    if (kind === 'complete') {
      [660, 820, 1040].forEach((freq, i) => playTone(freq, 0.08, 'square', 0.034, i * 0.075));
      return;
    }
    if (kind === 'mistake') {
      playTone(220, 0.07, 'triangle', 0.026);
      playTone(170, 0.08, 'triangle', 0.021, 0.055);
      return;
    }
    if (kind === 'select') {
      playTone(560, 0.04, 'square', 0.028);
      playTone(720, 0.05, 'square', 0.024, 0.04);
      return;
    }
    playTone(510, 0.045, 'square', 0.026);
  } catch (_) {}
}

function makeStrokeMask(pathData, gridSize, pixelPadding, offsetX, offsetY) {
  const maskCanvas = document.createElement('canvas');
  maskCanvas.width = gridSize;
  maskCanvas.height = gridSize;
  const maskCtx = maskCanvas.getContext('2d');
  const gridPadding = (pixelPadding / 1000) * gridSize;
  const scale = (gridSize - gridPadding * 2) / 1024;
  const dx = offsetX || 0;
  const dy = offsetY || 0;
  maskCtx.clearRect(0, 0, gridSize, gridSize);
  maskCtx.fillStyle = '#000';
  maskCtx.setTransform(scale, 0, 0, -scale, gridPadding + dx, gridSize - gridPadding + dy);
  maskCtx.fill(new Path2D(pathData));
  maskCtx.setTransform(1, 0, 0, 1, 0, 0);

  const pixels = maskCtx.getImageData(0, 0, gridSize, gridSize).data;
  const mask = new Uint8Array(gridSize * gridSize);
  for (let i = 0; i < mask.length; i++) {
    mask[i] = pixels[i * 4 + 3] > 16 ? 1 : 0;
  }
  return mask;
}

function countMaskCells(mask) {
  let total = 0;
  for (let i = 0; i < mask.length; i++) {
    if (mask[i]) total += 1;
  }
  return total;
}

function getSvgViewBox(svgEl) {
  const raw = svgEl.getAttribute('viewBox');
  if (raw) {
    const parts = raw.trim().split(/[\s,]+/).map(Number);
    if (parts.length === 4 && parts.every(Number.isFinite) && parts[2] > 0 && parts[3] > 0) {
      return { x: parts[0], y: parts[1], width: parts[2], height: parts[3] };
    }
  }
  const width = Number(svgEl.getAttribute('width')) || 1024;
  const height = Number(svgEl.getAttribute('height')) || 1024;
  return { x: 0, y: 0, width, height };
}

function makeSvgGuideMask(svgText, gridSize) {
  const svgDoc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
  if (svgDoc.querySelector('parsererror')) {
    throw new Error('SVG parse error');
  }

  const svgEl = svgDoc.documentElement;
  const viewBox = getSvgViewBox(svgEl);
  const pathEls = Array.from(svgDoc.querySelectorAll('path[d]'));
  if (pathEls.length === 0) {
    throw new Error('SVG path not found');
  }

  const maskCanvas = document.createElement('canvas');
  maskCanvas.width = gridSize;
  maskCanvas.height = gridSize;
  const maskCtx = maskCanvas.getContext('2d');
  const sx = gridSize / viewBox.width;
  const sy = gridSize / viewBox.height;
  maskCtx.clearRect(0, 0, gridSize, gridSize);
  maskCtx.fillStyle = '#000';
  maskCtx.setTransform(sx, 0, 0, sy, -viewBox.x * sx, -viewBox.y * sy);

  pathEls.forEach((pathEl) => {
    const path = new Path2D(pathEl.getAttribute('d'));
    const fillRule = pathEl.getAttribute('fill-rule') === 'evenodd' ? 'evenodd' : 'nonzero';
    try {
      maskCtx.fill(path, fillRule);
    } catch (_) {
      maskCtx.fill(path);
    }
  });
  maskCtx.setTransform(1, 0, 0, 1, 0, 0);

  const pixels = maskCtx.getImageData(0, 0, gridSize, gridSize).data;
  const mask = new Uint8Array(gridSize * gridSize);
  for (let i = 0; i < mask.length; i++) {
    mask[i] = pixels[i * 4 + 3] > 16 ? 1 : 0;
  }

  const totalMaskCells = countMaskCells(mask);
  if (!totalMaskCells) {
    throw new Error('SVG mask is empty');
  }
  return { mask, totalMaskCells };
}

async function loadGuideSvgMask(item, gridSize) {
  if (!item || !item.guideSvg) return null;
  const cacheKey = `${item.guideSvg}:${gridSize}`;
  if (guideSvgMaskCache.has(cacheKey)) {
    return guideSvgMaskCache.get(cacheKey);
  }

  const response = await fetch(GUIDE_SVG_BASE_PATH + item.guideSvg);
  if (!response.ok) {
    throw new Error(`guide SVG not found: ${item.guideSvg}`);
  }
  const svgText = await response.text();
  const guideMask = makeSvgGuideMask(svgText, gridSize);
  guideSvgMaskCache.set(cacheKey, guideMask);
  return guideMask;
}

function rawMedianPointToGrid(point, gridSize) {
  const x = Number(point && point[0]);
  const y = Number(point && point[1]);
  if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
  return {
    x: (x / 1024) * gridSize,
    y: ((1024 - y) / 1024) * gridSize
  };
}

function guideGridPointToRawMedian(point, gridSize, pixelPadding) {
  if (!point || !Number.isFinite(point.x) || !Number.isFinite(point.y)) return null;
  const gridPadding = (pixelPadding / 1000) * gridSize;
  const scale = (gridSize - gridPadding * 2) / 1024;
  if (!Number.isFinite(scale) || scale <= 0) return null;
  return [
    Math.max(0, Math.min(1024, (point.x - gridPadding) / scale)),
    Math.max(0, Math.min(1024, (gridSize - gridPadding - point.y) / scale))
  ];
}

async function prepareWriterCharData(data, item, gridSize, pixelPadding) {
  if (!data || !item || !item.guideSvg || !Array.isArray(data.medians)) return data;
  try {
    const customGuide = await loadGuideSvgMask(item, gridSize);
    const guideBounds = customGuide && getMaskBounds(customGuide.mask, gridSize);
    if (!guideBounds) return data;

    const mapMedianPoint = createMedianToGuideMapper(data.medians, guideBounds, gridSize);
    const medians = data.medians.map((median) => {
      if (!Array.isArray(median)) return median;
      return median.map((point) => {
        const guidePoint = mapMedianPoint(point);
        return guideGridPointToRawMedian(guidePoint, gridSize, pixelPadding) || point;
      });
    });

    return {
      ...data,
      medians,
      _mojikkoGuideAdjusted: true
    };
  } catch (error) {
    console.warn('Could not align writer medians to custom guide:', item.guideSvg, error);
    return data;
  }
}

function getMedianBounds(medians, gridSize) {
  let minX = Infinity;
  let minY = Infinity;
  let maxX = -Infinity;
  let maxY = -Infinity;
  if (!Array.isArray(medians)) return null;

  medians.forEach((median) => {
    if (!Array.isArray(median)) return;
    median.forEach((point) => {
      const gridPoint = rawMedianPointToGrid(point, gridSize);
      if (!gridPoint) return;
      minX = Math.min(minX, gridPoint.x);
      minY = Math.min(minY, gridPoint.y);
      maxX = Math.max(maxX, gridPoint.x);
      maxY = Math.max(maxY, gridPoint.y);
    });
  });

  if (!Number.isFinite(minX) || maxX <= minX || maxY <= minY) return null;
  return { minX, minY, maxX, maxY };
}

function createMedianToGuideMapper(medians, guideBounds, gridSize) {
  const medianBounds = getMedianBounds(medians, gridSize);
  if (!medianBounds || !guideBounds) {
    return (point) => rawMedianPointToGrid(point, gridSize);
  }

  const guideWidth = guideBounds.maxX - guideBounds.minX + 1;
  const guideHeight = guideBounds.maxY - guideBounds.minY + 1;
  const medianWidth = medianBounds.maxX - medianBounds.minX;
  const medianHeight = medianBounds.maxY - medianBounds.minY;
  const scale = Math.min(guideWidth / medianWidth, guideHeight / medianHeight);
  const guideCenterX = (guideBounds.minX + guideBounds.maxX + 1) / 2;
  const guideCenterY = (guideBounds.minY + guideBounds.maxY + 1) / 2;
  const medianCenterX = (medianBounds.minX + medianBounds.maxX) / 2;
  const medianCenterY = (medianBounds.minY + medianBounds.maxY) / 2;

  return (point) => {
    const gridPoint = rawMedianPointToGrid(point, gridSize);
    if (!gridPoint) return null;
    return {
      x: guideCenterX + (gridPoint.x - medianCenterX) * scale,
      y: guideCenterY + (gridPoint.y - medianCenterY) * scale
    };
  };
}

function makeMedianPolyline(median, mapMedianPoint) {
  const points = [];
  if (!Array.isArray(median)) return points;
  median.forEach((point) => {
    const gridPoint = mapMedianPoint(point);
    if (gridPoint && Number.isFinite(gridPoint.x) && Number.isFinite(gridPoint.y)) {
      points.push(gridPoint);
    }
  });
  return points;
}

function distanceSqToSegment(px, py, ax, ay, bx, by) {
  const dx = bx - ax;
  const dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq <= 0.0001) {
    const ox = px - ax;
    const oy = py - ay;
    return ox * ox + oy * oy;
  }

  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
  const x = ax + dx * t;
  const y = ay + dy * t;
  const ox = px - x;
  const oy = py - y;
  return ox * ox + oy * oy;
}

function distanceSqToPolyline(px, py, points) {
  if (!points || points.length === 0) return Infinity;
  if (points.length === 1) {
    const dx = px - points[0].x;
    const dy = py - points[0].y;
    return dx * dx + dy * dy;
  }

  let best = Infinity;
  for (let i = 0; i < points.length - 1; i++) {
    best = Math.min(best, distanceSqToSegment(px, py, points[i].x, points[i].y, points[i + 1].x, points[i + 1].y));
  }
  return best;
}

function splitGuideMaskByNearestMedian(guideMask, medians, gridSize) {
  if (!guideMask || !Array.isArray(medians) || medians.length === 0) return null;
  const guideBounds = getMaskBounds(guideMask, gridSize);
  if (!guideBounds) return null;

  const mapMedianPoint = createMedianToGuideMapper(medians, guideBounds, gridSize);
  const polylines = medians.map((median) => makeMedianPolyline(median, mapMedianPoint));
  if (!polylines.some((points) => points.length > 0)) return null;

  const strokeMasks = medians.map(() => new Uint8Array(gridSize * gridSize));
  for (let y = guideBounds.minY; y <= guideBounds.maxY; y++) {
    for (let x = guideBounds.minX; x <= guideBounds.maxX; x++) {
      const index = y * gridSize + x;
      if (!guideMask[index]) continue;

      const px = x + 0.5;
      const py = y + 0.5;
      let bestStroke = 0;
      let bestDistance = Infinity;
      for (let strokeIndex = 0; strokeIndex < polylines.length; strokeIndex++) {
        const d = distanceSqToPolyline(px, py, polylines[strokeIndex]);
        if (d < bestDistance) {
          bestDistance = d;
          bestStroke = strokeIndex;
        }
      }
      strokeMasks[bestStroke][index] = 1;
    }
  }

  return { strokeMasks, mapMedianPoint };
}

function mergeStrokeMasks(strokeMasks, gridSize) {
  const mask = new Uint8Array(gridSize * gridSize);
  let totalMaskCells = 0;
  strokeMasks.forEach((strokeMask) => {
    for (let i = 0; i < mask.length; i++) {
      if (strokeMask[i] && !mask[i]) {
        mask[i] = 1;
        totalMaskCells += 1;
      }
    }
  });
  return { mask, totalMaskCells };
}

function getMaskBounds(mask, gridSize) {
  let minX = gridSize;
  let minY = gridSize;
  let maxX = -1;
  let maxY = -1;
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      if (!mask[y * gridSize + x]) continue;
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
    }
  }
  if (maxX < 0) return null;
  return { minX, minY, maxX, maxY };
}

function clampOffsetToBoard(offsetX, offsetY, bounds, gridSize) {
  const inset = 2;
  return {
    x: Math.max(inset - bounds.minX, Math.min(gridSize - 1 - inset - bounds.maxX, offsetX)),
    y: Math.max(inset - bounds.minY, Math.min(gridSize - 1 - inset - bounds.maxY, offsetY))
  };
}

function updateWriterDisplayOffset(offsetX, offsetY, gridSize) {
  const targetRect = writerTarget.getBoundingClientRect();
  const size = currentWriterSize || targetRect.width || writingBoard.offsetWidth || 610;
  const px = (offsetX / gridSize) * size;
  const py = (offsetY / gridSize) * size;
  writerTarget.style.transform = `translate(${px}px, ${py}px)`;
}

function medianToBoardPercent(median) {
  if (!pixelLetter || !median || !median.length) return null;
  const [mx, my] = median[0];
  if (!Number.isFinite(mx) || !Number.isFinite(my)) return null;
  const gridSize = pixelLetter.gridSize;
  if (typeof pixelLetter.mapMedianPoint === 'function') {
    const point = pixelLetter.mapMedianPoint(median[0]);
    if (point && Number.isFinite(point.x) && Number.isFinite(point.y)) {
      return {
        x: Math.max(5, Math.min(95, (point.x / gridSize) * 100)),
        y: Math.max(5, Math.min(95, (point.y / gridSize) * 100))
      };
    }
  }
  const gridPadding = (getPixelLetterPadding() / 1000) * gridSize;
  const scale = (gridSize - gridPadding * 2) / 1024;
  const x = gridPadding + (pixelLetter.offsetX || 0) + mx * scale;
  const y = gridSize - gridPadding + (pixelLetter.offsetY || 0) - my * scale;
  return {
    x: Math.max(5, Math.min(95, (x / gridSize) * 100)),
    y: Math.max(5, Math.min(95, (y / gridSize) * 100))
  };
}

function clampBoardPercent(value, min = 8, max = 92) {
  return Math.max(min, Math.min(max, value));
}

function getMarkerMaskOverlap(pos) {
  if (!pixelLetter || !pixelLetter.mask) return 0;
  const gridSize = pixelLetter.gridSize;
  const gx = Math.round((pos.x / 100) * (gridSize - 1));
  const gy = Math.round((pos.y / 100) * (gridSize - 1));
  const radius = Math.ceil(gridSize * 0.052);
  let overlap = 0;
  for (let y = gy - radius; y <= gy + radius; y++) {
    if (y < 0 || y >= gridSize) continue;
    for (let x = gx - radius; x <= gx + radius; x++) {
      if (x < 0 || x >= gridSize) continue;
      const dx = x - gx;
      const dy = y - gy;
      if (dx * dx + dy * dy > radius * radius) continue;
      if (pixelLetter.mask[y * gridSize + x]) overlap += 1;
    }
  }
  return overlap;
}

function scoreStrokeNumberPosition(candidate, anchor, placedPositions) {
  const dx = candidate.x - anchor.x;
  const dy = candidate.y - anchor.y;
  const distanceFromAnchor = Math.sqrt(dx * dx + dy * dy);
  let score = getMarkerMaskOverlap(candidate) * 1200 + distanceFromAnchor * 18;
  const edge = Math.min(candidate.x, candidate.y, 100 - candidate.x, 100 - candidate.y);
  if (edge < 8) score += (8 - edge) * 500;
  placedPositions.forEach((placed) => {
    const px = candidate.x - placed.x;
    const py = candidate.y - placed.y;
    const d = Math.sqrt(px * px + py * py);
    if (d < 10) score += (10 - d) * 900;
  });
  return score;
}

function offsetStrokeNumberPosition(pos, index, total, placedPositions) {
  if (!pos) return null;
  const dx = pos.x - 50;
  const dy = pos.y - 50;
  const distanceFromCenter = Math.sqrt(dx * dx + dy * dy);
  const preferredAngle = distanceFromCenter >= 8
    ? Math.atan2(dy, dx)
    : -Math.PI / 2 + (index / Math.max(3, total)) * Math.PI * 2;
  const radii = [6.5, 8, 9.5, 11, 12.5];
  const angleSteps = [0, -0.45, 0.45, -0.9, 0.9, -1.35, 1.35, Math.PI, -Math.PI * 0.75, Math.PI * 0.75, -Math.PI / 2, Math.PI / 2];
  let best = null;
  let bestScore = Infinity;
  for (const radius of radii) {
    for (const angleStep of angleSteps) {
      const angle = preferredAngle + angleStep;
      const candidate = {
        x: clampBoardPercent(pos.x + Math.cos(angle) * radius),
        y: clampBoardPercent(pos.y + Math.sin(angle) * radius)
      };
      const score = scoreStrokeNumberPosition(candidate, pos, placedPositions || []);
      if (score < bestScore) {
        bestScore = score;
        best = candidate;
      }
    }
  }
  return best;
}

function renderCanvasStrokeNumbers() {
  clearStrokeNumbers();
  if (!pixelLetter || !currentCharData || !Array.isArray(currentCharData.medians)) return;
  const placedPositions = [];
  currentCharData.medians.forEach((median, index) => {
    const pos = medianToBoardPercent(median);
    if (!pos) return;
    const markerPos = offsetStrokeNumberPosition(pos, index, currentCharData.medians.length, placedPositions) || pos;
    placedPositions.push(markerPos);
    const num = document.createElement('div');
    const stateClass = index < strokesCompleted ? 'done' : (index === Math.min(currentStrokeIndex, currentCharData.medians.length - 1) ? 'current' : '');
    num.className = `guide-stroke-number ${stateClass}`;
    num.textContent = String(index + 1);
    num.style.left = `${markerPos.x}%`;
    num.style.top = `${markerPos.y}%`;
    strokeNumberOverlay.appendChild(num);
  });
}

async function buildPixelLetterMask(data, item, token) {
  pixelLetter = null;
  clearPixelTrail();
  clearStrokeNumbers();
  if (!data || !Array.isArray(data.strokes) || typeof Path2D === 'undefined') return false;

  const gridSize = PIXEL_GRID_SIZE;
  const pixelPadding = getPixelLetterPadding();
  try {
    let strokeMasks = data.strokes.map((path) => makeStrokeMask(path, gridSize, pixelPadding, 0, 0));
    let merged = mergeStrokeMasks(strokeMasks, gridSize);
    const bounds = getMaskBounds(merged.mask, gridSize);
    let offsetX = 0;
    let offsetY = 0;
    if (bounds) {
      const centerX = (bounds.minX + bounds.maxX + 1) / 2;
      const centerY = (bounds.minY + bounds.maxY + 1) / 2;
      const clamped = clampOffsetToBoard(Math.round(gridSize / 2 - centerX), Math.round(gridSize / 2 - centerY), bounds, gridSize);
      offsetX = clamped.x;
      offsetY = clamped.y;
      if (offsetX || offsetY) {
        strokeMasks = data.strokes.map((path) => makeStrokeMask(path, gridSize, pixelPadding, offsetX, offsetY));
        merged = mergeStrokeMasks(strokeMasks, gridSize);
      }
    }
    let guideMask = merged.mask;
    let totalMaskCells = merged.totalMaskCells;
    let mapMedianPoint = null;
    let writerOffsetX = offsetX;
    let writerOffsetY = offsetY;
    if (item && item.guideSvg) {
      try {
        const customGuide = await loadGuideSvgMask(item, gridSize);
        if (customGuide && customGuide.totalMaskCells) {
          guideMask = customGuide.mask;
          totalMaskCells = customGuide.totalMaskCells;
          const split = splitGuideMaskByNearestMedian(customGuide.mask, data.medians, gridSize);
          if (split && split.strokeMasks) {
            strokeMasks = split.strokeMasks;
            mapMedianPoint = split.mapMedianPoint;
            if (data._mojikkoGuideAdjusted) {
              writerOffsetX = 0;
              writerOffsetY = 0;
            }
          }
        }
      } catch (error) {
        console.warn('Could not load custom guide SVG:', item.guideSvg, error);
      }
    }

    if (token !== undefined && token !== writerLoadToken) return false;
    updateWriterDisplayOffset(writerOffsetX, writerOffsetY, gridSize);

    pixelLetter = {
      gridSize,
      mask: guideMask,
      strokeMasks,
      fill: new Uint8Array(gridSize * gridSize),
      totalMaskCells,
      offsetX,
      offsetY,
      writerOffsetX,
      writerOffsetY,
      mapMedianPoint
    };
    renderPixelLetter();
    renderCanvasStrokeNumbers();
    return true;
  } catch (error) {
    console.warn('Could not build pixel guide letter:', error);
    return false;
  }
}

function renderPixelLetter() {
  clearPixelTrail();
  if (!pixelLetter) return;

  const { gridSize, mask, fill, strokeMasks } = pixelLetter;
  const cell = 1000 / gridSize;
  const activeStroke = strokeMasks[Math.min(currentStrokeIndex, strokeMasks.length - 1)];
  trailCtx.save();
  trailCtx.imageSmoothingEnabled = false;
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      const index = y * gridSize + x;
      if (!mask[index]) continue;

      const isFilled = fill[index];
      const isActive = activeStroke && activeStroke[index];
      const hash = (x * 17 + y * 31) % 7;
      if (isFilled) {
        trailCtx.fillStyle = hash === 0 ? '#ffb36f' : (hash < 3 ? '#ff8a5d' : '#f27152');
      } else if (isActive) {
        trailCtx.fillStyle = hash < 2 ? 'rgba(130, 113, 92, 0.34)' : 'rgba(108, 94, 78, 0.28)';
      } else {
        trailCtx.fillStyle = hash < 2 ? 'rgba(117, 104, 88, 0.21)' : 'rgba(105, 93, 79, 0.16)';
      }
      trailCtx.fillRect(Math.floor(x * cell), Math.floor(y * cell), Math.ceil(cell) + 0.5, Math.ceil(cell) + 0.5);

      if (isFilled && hash === 0) {
        trailCtx.fillStyle = 'rgba(255, 232, 142, 0.55)';
        trailCtx.fillRect(Math.floor(x * cell + cell * 0.58), Math.floor(y * cell + cell * 0.1), Math.max(1, cell * 0.33), Math.max(1, cell * 0.33));
      }
    }
  }
  trailCtx.restore();
}

function maskToPreviewRects(mask, gridSize, className) {
  if (!mask) return '';
  const rects = [];
  for (let y = 0; y < gridSize; y++) {
    let x = 0;
    while (x < gridSize) {
      while (x < gridSize && !mask[y * gridSize + x]) x++;
      if (x >= gridSize) break;
      const startX = x;
      while (x < gridSize && mask[y * gridSize + x]) x++;
      rects.push(`<rect class="${className}" x="${startX}" y="${y}" width="${x - startX}" height="1"></rect>`);
    }
  }
  return rects.join('');
}

function renderPixelStrokePreview(strokeIndex, strokeCount) {
  if (!pixelLetter || !Array.isArray(pixelLetter.strokeMasks) || pixelLetter.strokeMasks.length === 0) return '';
  const gridSize = pixelLetter.gridSize || PIXEL_GRID_SIZE;
  const shapes = pixelLetter.strokeMasks.slice(0, strokeCount).map((mask, index) => {
    const className = index < strokesCompleted ? 'preview-done' : (index === strokeIndex ? 'preview-current' : 'preview-guide');
    return maskToPreviewRects(mask, gridSize, className);
  }).join('');
  if (!shapes) return '';
  return `<svg class="stroke-mask-preview" viewBox="0 0 ${gridSize} ${gridSize}" preserveAspectRatio="xMidYMid meet" aria-hidden="true">${shapes}</svg>`;
}

function renderStrokeOrder() {
  const item = getCurrentCharacter();
  const count = Math.max(1, item.strokes || 1);
  const strokePaths = currentCharData && Array.isArray(currentCharData.strokes) ? currentCharData.strokes : null;
  const previewViewBox = getStrokePreviewViewBox();
  strokeListEl.innerHTML = '';
  for (let index = 0; index < count; index++) {
    const card = document.createElement('div');
    const cls = index < strokesCompleted ? 'done' : (index === Math.min(currentStrokeIndex, count - 1) ? 'current' : '');
    const pixelPreview = renderPixelStrokePreview(index, count);
    const preview = pixelPreview || (strokePaths
      ? `<svg viewBox="${previewViewBox}" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <g transform="translate(0, 1024) scale(1, -1)">
            ${strokePaths.map((path, pathIndex) => {
              const pathClass = pathIndex < strokesCompleted ? 'preview-done' : (pathIndex === index ? 'preview-current' : '');
              return `<path class="${pathClass}" d="${escapeAttr(path)}"></path>`;
            }).join('')}
          </g>
        </svg>`
      : `<div class="stroke-preview" aria-hidden="true">${item.char}</div>`);
    card.className = `stroke-card ${cls}`;
    card.innerHTML = `
      <div class="stroke-num">${index + 1}</div>
      <div class="stroke-mini">
        ${preview}
        <div class="stroke-label">${index + 1}かくめ</div>
      </div>
    `;
    strokeListEl.appendChild(card);
  }
}

function getStrokePreviewViewBox() {
  const medians = currentCharData && Array.isArray(currentCharData.medians) ? currentCharData.medians : null;
  if (!medians || medians.length === 0) return '0 0 1024 1024';
  let minX = Infinity;
  let minY = Infinity;
  let maxX = -Infinity;
  let maxY = -Infinity;
  medians.forEach((stroke) => {
    if (!Array.isArray(stroke)) return;
    stroke.forEach((point) => {
      if (!Array.isArray(point) || point.length < 2) return;
      const x = Number(point[0]);
      const y = Number(point[1]);
      if (!Number.isFinite(x) || !Number.isFinite(y)) return;
      minX = Math.min(minX, x);
      minY = Math.min(minY, 1024 - y);
      maxX = Math.max(maxX, x);
      maxY = Math.max(maxY, 1024 - y);
    });
  });
  if (!Number.isFinite(minX) || !Number.isFinite(minY)) return '0 0 1024 1024';
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const span = Math.max(maxX - minX, maxY - minY, 360);
  const viewH = Math.min(980, span + 300);
  const viewW = viewH * 1.85;
  return `${Math.round(cx - viewW / 2)} ${Math.round(cy - viewH / 2)} ${Math.round(viewW)} ${Math.round(viewH)}`;
}

function updateStrokeCountFromData(item, data) {
  const nextCount = data && Array.isArray(data.strokes)
    ? data.strokes.length
    : (data && Array.isArray(data.medians) ? data.medians.length : item.strokes);
  if (Number.isFinite(nextCount) && nextCount > 0) item.strokes = nextCount;
}

function loadKanaData(char) {
  const urls = [
    `https://cdn.jsdelivr.net/gh/ailectra/kana-json@v0.0.1/data/${char}.json`,
    `https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${char}.json`
  ];
  let index = 0;
  function tryNext() {
    const url = urls[index++];
    return fetch(url)
      .then((response) => {
        if (!response.ok) throw new Error('not found');
        return response.json();
      })
      .catch((error) => {
        if (index >= urls.length) throw error;
        return tryNext();
      });
  }
  return tryNext();
}

function createWriter() {
  const item = getCurrentCharacter();
  writerLoadToken += 1;
  const token = writerLoadToken;
  currentCharData = null;
  if (writer && typeof writer.cancelQuiz === 'function') {
    try { writer.cancelQuiz(); } catch (_) {}
  }
  pixelLetter = null;
  clearPixelTrail();
  clearStrokeNumbers();
  updateWriterDisplayOffset(0, 0, PIXEL_GRID_SIZE);
  writerTarget.innerHTML = '';
  if (typeof HanziWriter === 'undefined') {
    setMessage('よみこみが まだみたい。 もういちど ひらいてね', 'まっててね');
    return;
  }

  const rect = writerTarget.getBoundingClientRect();
  const size = Math.max(360, Math.round(rect.width));
  currentWriterSize = size;
  writer = HanziWriter.create(writerTarget, item.char, {
    width: size,
    height: size,
    padding: 48,
    showOutline: true,
    showCharacter: false,
    strokeColor: 'rgba(92, 74, 58, 0.44)',
    outlineColor: 'rgba(78, 62, 49, 0.18)',
    drawingColor: 'rgba(242, 124, 91, 0.08)',
    highlightColor: 'rgba(61, 168, 126, 0.72)',
    radicalColor: 'rgba(92, 74, 58, 0.44)',
    drawingWidth: 28,
    leniency: QUIZ_LENIENCY,
    strokeAnimationSpeed: 0.75,
    delayBetweenStrokes: 500,
    charDataLoader: function(char, onComplete) {
      loadKanaData(char)
        .then((data) => prepareWriterCharData(data, item, PIXEL_GRID_SIZE, getPixelLetterPadding()))
        .then((data) => {
          if (token !== writerLoadToken) return;
          currentCharData = data;
          updateStrokeCountFromData(item, data);
          return buildPixelLetterMask(data, item, token)
            .then((ready) => {
              if (!ready || token !== writerLoadToken) return;
              renderStrokeOrder();
              onComplete(data);
            });
        })
        .catch((error) => {
          console.warn('No kana data for character:', char, error);
          if (token === writerLoadToken) {
            setMessage('もじデータを よみこめなかったよ', 'あとで もういちど');
          }
        });
    }
  });

  startWriterQuiz(0);
}

function getWriterQuizOptions(startStrokeNum) {
  const options = {
    onCorrectStroke: onCorrectStroke,
    onMistake: onMistake,
    onComplete: onWriterComplete,
    leniency: QUIZ_LENIENCY,
    showHintAfterMisses: 3,
    highlightOnComplete: true,
    highlightCompleteColor: 'rgba(255, 214, 90, 0.95)'
  };
  if (Number.isFinite(startStrokeNum) && startStrokeNum > 0) {
    options.quizStartStrokeNum = Math.max(0, startStrokeNum);
  }
  return options;
}

function startWriterQuiz(startStrokeNum) {
  if (!writer || typeof writer.quiz !== 'function') return;
  if (typeof writer.cancelQuiz === 'function') {
    try { writer.cancelQuiz(); } catch (_) {}
  }
  writer.quiz(getWriterQuizOptions(startStrokeNum));
}

function resetWriting() {
  syncCurrentGroupFromCharacter();
  trailDrawing = false;
  lastTrailPoint = null;
  trailDistance = 0;
  trailAttemptId += 1;
  activeAttemptStroke = -1;
  activeAttemptCompletedBefore = 0;
  activeAttemptPainted = false;
  activeAttemptHadMistake = false;
  activeAttemptMaxProgress = 0;
  pendingCorrectStroke = null;
  sparkleBudget = 0;
  strokesCompleted = 0;
  currentStrokeIndex = 0;
  mistakeCount = 0;
  complete = false;
  completionQueued = false;
  currentCharData = null;
  pixelLetter = null;
  resizePixelTrailCanvas();
  clearPixelTrail();
  clearStrokeNumbers();
  writingBoard.classList.remove('success');
  resultOverlay.classList.remove('show');
  companionCard.classList.remove('celebrate');
  const item = getCurrentCharacter();
  const reward = getCurrentWritingReward();
  promptText.textContent = `「${item.char}」を かいてみよう！`;
  rewardNameEl.textContent = reward.name;
  setFoodIconClass(rewardIconEl, reward);
  setMessage('ドットの もじを なぞってね', 'ゆっくりで だいじょうぶ');
  renderStrokeOrder();
  buildCharacterList();
  updateCharacterButtons();
  createWriter();
}

function selectCharacter(index) {
  currentIndex = index;
  syncCurrentGroupFromCharacter();
  resetWriting();
}

function boardPointFromEvent(event) {
  const rect = pixelTrailCanvas.getBoundingClientRect();
  return {
    x: Math.max(0, Math.min(1000, ((event.clientX - rect.left) / rect.width) * 1000)),
    y: Math.max(0, Math.min(1000, ((event.clientY - rect.top) / rect.height) * 1000)),
    clientX: event.clientX,
    clientY: event.clientY
  };
}

function distance(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function getAllowedStrokeLimit() {
  const item = getCurrentCharacter();
  if (!pixelLetter || !item || !Array.isArray(pixelLetter.strokeMasks)) return -1;
  return Math.max(0, Math.min(item.strokes - 1, currentStrokeIndex));
}

function isAllowedStrokePixel(index, limit) {
  if (!pixelLetter || limit < 0) return false;
  for (let strokeIndex = 0; strokeIndex <= limit; strokeIndex++) {
    if (pixelLetter.strokeMasks[strokeIndex] && pixelLetter.strokeMasks[strokeIndex][index]) return true;
  }
  return false;
}

function fillLetterPixelsAt(point, radius) {
  if (!pixelLetter) return { changed: 0, touched: 0 };
  const { gridSize, mask, fill } = pixelLetter;
  const allowedStrokeLimit = getAllowedStrokeLimit();
  const gx = Math.floor((point.x / 1000) * gridSize);
  const gy = Math.floor((point.y / 1000) * gridSize);
  let changed = 0;
  let touched = 0;
  let activeTouched = 0;
  let blocked = 0;
  for (let y = gy - radius; y <= gy + radius; y++) {
    if (y < 0 || y >= gridSize) continue;
    for (let x = gx - radius; x <= gx + radius; x++) {
      if (x < 0 || x >= gridSize) continue;
      const dx = x - gx;
      const dy = y - gy;
      if (dx * dx + dy * dy > radius * radius) continue;
      const index = y * gridSize + x;
      if (!mask[index]) continue;
      touched += 1;
      if (!isAllowedStrokePixel(index, allowedStrokeLimit)) {
        blocked += 1;
        continue;
      }
      activeTouched += 1;
      if (!fill[index]) {
        fill[index] = 1;
        changed += 1;
      }
    }
  }
  return { changed, touched, activeTouched, blocked };
}

function paintTrailSegment(from, to) {
  const d = distance(from, to);
  if (!Number.isFinite(d) || d <= 0) return 0;
  const steps = Math.max(1, Math.ceil(d / 10));
  let changed = 0;
  let touched = 0;
  let activeTouched = 0;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const x = from.x + (to.x - from.x) * t;
    const y = from.y + (to.y - from.y) * t;
    const result = fillLetterPixelsAt({ x, y }, LETTER_BRUSH_RADIUS);
    changed += result.changed;
    touched += result.touched;
    if (result.activeTouched) activeTouched += result.activeTouched;
  }
  if (changed > 0) renderPixelLetter();
  return activeTouched > 0 ? d : 0;
}

function medianPointToLetterGrid(point) {
  if (!pixelLetter) return null;
  const x = Number(point && point[0]);
  const y = Number(point && point[1]);
  if (!Number.isFinite(x) || !Number.isFinite(y)) return null;

  if (typeof pixelLetter.mapMedianPoint === 'function') {
    const mapped = pixelLetter.mapMedianPoint(point);
    if (mapped && Number.isFinite(mapped.x) && Number.isFinite(mapped.y)) return mapped;
  }

  const gridSize = pixelLetter.gridSize || PIXEL_GRID_SIZE;
  const gridPadding = (getPixelLetterPadding() / 1000) * gridSize;
  const scale = (gridSize - gridPadding * 2) / 1024;
  return {
    x: gridPadding + (pixelLetter.offsetX || 0) + x * scale,
    y: gridSize - gridPadding + (pixelLetter.offsetY || 0) - y * scale
  };
}

function getStrokeProgressAtBoardPoint(strokeIndex, boardPoint) {
  if (!pixelLetter || !currentCharData || !Array.isArray(currentCharData.medians)) return 1;
  const median = currentCharData.medians[strokeIndex];
  if (!Array.isArray(median) || median.length < 2) return 1;

  const gridSize = pixelLetter.gridSize || PIXEL_GRID_SIZE;
  const px = (boardPoint.x / 1000) * gridSize;
  const py = (boardPoint.y / 1000) * gridSize;
  const points = median
    .map(medianPointToLetterGrid)
    .filter((point) => point && Number.isFinite(point.x) && Number.isFinite(point.y));
  if (points.length < 2) return 1;

  const segments = [];
  let totalLength = 0;
  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i];
    const b = points[i + 1];
    const length = Math.hypot(b.x - a.x, b.y - a.y);
    if (!Number.isFinite(length) || length <= 0.001) continue;
    segments.push({ a, b, length, start: totalLength });
    totalLength += length;
  }
  if (totalLength <= 0) return 1;

  let bestDistanceSq = Infinity;
  let bestProgress = 0;
  segments.forEach((segment) => {
    const dx = segment.b.x - segment.a.x;
    const dy = segment.b.y - segment.a.y;
    const lenSq = dx * dx + dy * dy;
    const t = lenSq > 0
      ? Math.max(0, Math.min(1, ((px - segment.a.x) * dx + (py - segment.a.y) * dy) / lenSq))
      : 0;
    const x = segment.a.x + dx * t;
    const y = segment.a.y + dy * t;
    const ox = px - x;
    const oy = py - y;
    const distanceSq = ox * ox + oy * oy;
    if (distanceSq < bestDistanceSq) {
      bestDistanceSq = distanceSq;
      bestProgress = (segment.start + segment.length * t) / totalLength;
    }
  });

  const maxDistanceSq = STROKE_END_DISTANCE_TOLERANCE * STROKE_END_DISTANCE_TOLERANCE;
  return bestDistanceSq <= maxDistanceSq ? Math.max(0, Math.min(1, bestProgress)) : 0;
}

function hasAttemptReachedStrokeEnd(strokeIndex) {
  if (!currentCharData || !Array.isArray(currentCharData.medians)) return true;
  if (strokeIndex < 0 || strokeIndex < strokesCompleted) return true;
  return activeAttemptMaxProgress >= STROKE_END_PROGRESS_REQUIRED;
}

function updateAttemptProgressForPoint(point) {
  if (complete || !point || activeAttemptStroke < 0) return;
  const item = getCurrentCharacter();
  const strokeIndex = Math.min(activeAttemptStroke, item.strokes - 1);
  if (strokeIndex < 0 || strokeIndex < strokesCompleted) return;
  activeAttemptMaxProgress = Math.max(
    activeAttemptMaxProgress,
    getStrokeProgressAtBoardPoint(strokeIndex, point)
  );

  if (
    pendingCorrectStroke &&
    pendingCorrectStroke.strokeNum === strokeIndex &&
    hasAttemptReachedStrokeEnd(strokeIndex)
  ) {
    acceptCorrectStroke(pendingCorrectStroke.data);
  }
}

function fillStrokePixels(strokeIndex) {
  if (!pixelLetter || !pixelLetter.strokeMasks[strokeIndex]) return 0;
  const strokeMask = pixelLetter.strokeMasks[strokeIndex];
  let changed = 0;
  for (let i = 0; i < strokeMask.length; i++) {
    if (strokeMask[i] && !pixelLetter.fill[i]) {
      pixelLetter.fill[i] = 1;
      changed += 1;
    }
  }
  return changed;
}

function clearStrokePixels(strokeIndex) {
  if (!pixelLetter || !pixelLetter.strokeMasks[strokeIndex]) return 0;
  const strokeMask = pixelLetter.strokeMasks[strokeIndex];
  let changed = 0;
  for (let i = 0; i < strokeMask.length; i++) {
    if (strokeMask[i] && pixelLetter.fill[i]) {
      pixelLetter.fill[i] = 0;
      changed += 1;
    }
  }
  return changed;
}

function getStrokeFilledRatio(strokeIndex) {
  if (!pixelLetter || !pixelLetter.strokeMasks[strokeIndex]) return 0;
  const strokeMask = pixelLetter.strokeMasks[strokeIndex];
  let total = 0;
  let filled = 0;
  for (let i = 0; i < strokeMask.length; i++) {
    if (!strokeMask[i]) continue;
    total += 1;
    if (pixelLetter.fill[i]) filled += 1;
  }
  return total ? filled / total : 0;
}

function maybeUpdateProgressAfterFill() {
  if (complete || !pixelLetter) return;
  const item = getCurrentCharacter();
  if (!item) return;
  if (strokesCompleted >= item.strokes) {
    maybeFinishWritingAfterProgress();
    return;
  }

  const strokeIndex = Math.min(currentStrokeIndex, item.strokes - 1);
  if (strokeIndex < 0 || strokeIndex < strokesCompleted) return;
  const fillRatio = getStrokeFilledRatio(strokeIndex);
  if (fillRatio >= STROKE_FILL_COMPLETE_RATIO) {
    setMessage(`${strokeIndex + 1}かくめ、いいかんじ！`, 'じゅんばんに かこう');
  }
}

function fillAllLetterPixels() {
  if (!pixelLetter) return 0;
  let changed = 0;
  for (let i = 0; i < pixelLetter.mask.length; i++) {
    if (pixelLetter.mask[i] && !pixelLetter.fill[i]) {
      pixelLetter.fill[i] = 1;
      changed += 1;
    }
  }
  return changed;
}

function getFilledLetterRatio() {
  if (!pixelLetter || !pixelLetter.totalMaskCells) return 0;
  let filled = 0;
  for (let i = 0; i < pixelLetter.mask.length; i++) {
    if (pixelLetter.mask[i] && pixelLetter.fill[i]) filled += 1;
  }
  return filled / pixelLetter.totalMaskCells;
}

function getWritingReadiness(item) {
  const requiredStrokes = Math.max(1, item && item.strokes || 1);
  if (strokesCompleted < requiredStrokes) {
    return {
      ready: false,
      message: 'まだ かけていない せんが あるよ',
      subMessage: 'すうじの じゅんに なぞろう'
    };
  }

  return { ready: true, message: '', subMessage: '' };
}

function maybeFinishWritingAfterProgress(summary) {
  if (complete || completionQueued) return;
  const item = getCurrentCharacter();
  const readiness = getWritingReadiness(item);
  if (!readiness.ready) {
    if (strokesCompleted >= Math.max(1, item.strokes || 1)) {
      setMessage(readiness.message, readiness.subMessage);
    }
    return;
  }
  completionQueued = true;
  setMessage('さいごまで かけたね！', 'できた！');
  setTimeout(() => {
    completionQueued = false;
    completeWriting(false, summary);
  }, 260);
}

function spawnSpark(clientX, clientY) {
  const rect = writingBoard.getBoundingClientRect();
  const particle = document.createElement('div');
  particle.className = 'board-particle';
  particle.style.left = (clientX - rect.left) + 'px';
  particle.style.top = (clientY - rect.top) + 'px';
  writingBoard.appendChild(particle);
  setTimeout(() => particle.remove(), 900);
}

function onTrailPointerDown(event) {
  if (complete || event.pointerType === 'mouse' && event.button !== 0) return;
  playSfx('writeStart');
  trailDrawing = true;
  trailDistance = 0;
  sparkleBudget = 0;
  trailAttemptId += 1;
  const item = getCurrentCharacter();
  const strokeIndex = Math.min(currentStrokeIndex, item.strokes - 1);
  if (pendingCorrectStroke) {
    pendingCorrectStroke = null;
    startWriterQuiz(strokesCompleted);
  }
  activeAttemptStroke = strokeIndex;
  activeAttemptCompletedBefore = strokesCompleted;
  activeAttemptPainted = false;
  activeAttemptHadMistake = false;
  activeAttemptMaxProgress = 0;
  if (strokeIndex >= strokesCompleted) {
    const erased = clearStrokePixels(strokeIndex);
    if (erased > 0) renderPixelLetter();
  }
  lastTrailPoint = boardPointFromEvent(event);
  updateAttemptProgressForPoint(lastTrailPoint);
  const result = fillLetterPixelsAt(lastTrailPoint, LETTER_BRUSH_RADIUS);
  if (result.activeTouched > 0) activeAttemptPainted = true;
  if (result.changed > 0) renderPixelLetter();
  const nextStroke = Math.min(currentStrokeIndex + 1, getCurrentCharacter().strokes);
  setMessage(
    result.activeTouched > 0
      ? 'そのまま そーっと'
      : (result.touched > 0 ? `いまは ${nextStroke}かくめを なぞってね` : 'もじの うえを なぞってね'),
    'いいかんじ！'
  );
  maybeUpdateProgressAfterFill();
}

function onTrailPointerMove(event) {
  if (!trailDrawing || complete || !lastTrailPoint) return;
  const next = boardPointFromEvent(event);
  const d = paintTrailSegment(lastTrailPoint, next);
  trailDistance += d;
  if (d > 0) activeAttemptPainted = true;
  const now = performance.now();
  if (d > 0 && now - lastWriteSfxAt > 90) {
    lastWriteSfxAt = now;
    playSfx('writeMove');
  }
  sparkleBudget += d;
  if (sparkleBudget > 130) {
    sparkleBudget = 0;
    spawnSpark(event.clientX, event.clientY);
  }
  lastTrailPoint = next;
  updateAttemptProgressForPoint(next);
  maybeUpdateProgressAfterFill();
}

function stopTrail() {
  trailDrawing = false;
  lastTrailPoint = null;
}

function finishTrailAttempt() {
  const attemptId = trailAttemptId;
  const strokeIndex = activeAttemptStroke;
  const completedBefore = activeAttemptCompletedBefore;
  stopTrail();
  if (strokeIndex < 0) return;

  setTimeout(() => {
    if (complete || trailAttemptId !== attemptId || activeAttemptStroke !== strokeIndex) return;
    const pendingStroke = pendingCorrectStroke && pendingCorrectStroke.strokeNum === strokeIndex
      ? pendingCorrectStroke
      : null;
    if (pendingStroke && hasAttemptReachedStrokeEnd(strokeIndex)) {
      acceptCorrectStroke(pendingStroke.data);
      return;
    }
    activeAttemptStroke = -1;
    activeAttemptCompletedBefore = strokesCompleted;
    const shouldClear = !!pendingStroke || activeAttemptPainted || activeAttemptHadMistake;
    activeAttemptPainted = false;
    activeAttemptHadMistake = false;
    activeAttemptMaxProgress = 0;
    if (!shouldClear || strokesCompleted > completedBefore || strokeIndex < strokesCompleted) return;

    if (pendingStroke) {
      pendingCorrectStroke = null;
      startWriterQuiz(strokeIndex);
    }
    const erased = clearStrokePixels(strokeIndex);
    if (erased > 0) {
      renderPixelLetter();
    }
    trailDistance = 0;
    setMessage(`${strokeIndex + 1}かくめを もういちど なぞってね`, 'ゆっくりね');
  }, ATTEMPT_CLEAR_DELAY_MS);
}

function onCorrectStroke(data) {
  const strokeNum = data && Number.isFinite(data.strokeNum) ? data.strokeNum : strokesCompleted;
  if (strokeNum >= strokesCompleted && !hasAttemptReachedStrokeEnd(strokeNum)) {
    pendingCorrectStroke = { strokeNum, data };
    setMessage(`${strokeNum + 1}かくめ、さいごの ところまで なぞってね`, 'あとすこし');
    return;
  }
  acceptCorrectStroke(data);
}

function acceptCorrectStroke(data) {
  const item = getCurrentCharacter();
  const strokeNum = data && Number.isFinite(data.strokeNum) ? data.strokeNum : strokesCompleted;
  playSfx('strokeOk');
  pendingCorrectStroke = null;
  fillStrokePixels(strokeNum);
  const nextCompleted = strokeNum < strokesCompleted
    ? strokesCompleted
    : Math.max(strokesCompleted + 1, strokeNum + 1);
  strokesCompleted = Math.min(item.strokes, nextCompleted);
  currentStrokeIndex = Math.min(item.strokes - 1, strokesCompleted);
  stopTrail();
  trailDistance = 0;
  activeAttemptStroke = -1;
  activeAttemptCompletedBefore = strokesCompleted;
  activeAttemptPainted = false;
  activeAttemptHadMistake = false;
  activeAttemptMaxProgress = 0;
  renderPixelLetter();
  renderCanvasStrokeNumbers();
  setMessage(
    strokesCompleted >= item.strokes
      ? 'さいごの せんも OK！'
      : `${strokeNum + 1}かくめ OK！ つぎの せんへ`,
    'いいかんじ！'
  );
  renderStrokeOrder();
  maybeFinishWritingAfterProgress();
}

function onMistake(data) {
  const item = getCurrentCharacter();
  const rawStrokeNum = data && Number.isFinite(data.strokeNum) ? data.strokeNum : currentStrokeIndex;
  if (rawStrokeNum < strokesCompleted) return;
  playSfx('mistake');
  const strokeNum = Math.min(strokesCompleted, item.strokes - 1);
  if (pendingCorrectStroke) {
    activeAttemptHadMistake = true;
    setMessage(`${pendingCorrectStroke.strokeNum + 1}かくめ、さいごまで なぞってね`, 'あとすこし');
    return;
  }
  mistakeCount += 1;
  activeAttemptHadMistake = true;
  if (trailDrawing) {
    setMessage(`${strokeNum + 1}かくめを ゆっくり なぞってね`, 'まだ かけるよ');
    return;
  }
  activeAttemptStroke = -1;
  activeAttemptCompletedBefore = strokesCompleted;
  activeAttemptPainted = false;
  activeAttemptHadMistake = false;
  activeAttemptMaxProgress = 0;
  const erased = clearStrokePixels(strokeNum);
  if (erased > 0) {
    renderPixelLetter();
  }
  stopTrail();
  trailDistance = 0;
  setMessage(`${strokeNum + 1}かくめを もういちど なぞってね`, 'ゆっくりね');
}

function onWriterComplete(summary) {
  const item = getCurrentCharacter();
  if (pendingCorrectStroke || strokesCompleted < item.strokes) {
    const strokeNum = pendingCorrectStroke
      ? pendingCorrectStroke.strokeNum
      : Math.min(strokesCompleted, item.strokes - 1);
    setMessage(`${strokeNum + 1}かくめ、さいごまで なぞってね`, 'あとすこし');
    return;
  }
  fillAllLetterPixels();
  strokesCompleted = item.strokes;
  currentStrokeIndex = item.strokes - 1;
  renderPixelLetter();
  renderCanvasStrokeNumbers();
  renderStrokeOrder();
  maybeFinishWritingAfterProgress(summary);
}

function calculateAccuracy(item) {
  const strokeScore = Math.min(1, strokesCompleted / Math.max(1, item.strokes));
  const trailScore = Math.max(Math.min(1, trailDistance / 900), getFilledLetterRatio());
  const mistakePenalty = Math.min(0.2, mistakeCount * 0.035);
  const score = 0.7 + strokeScore * 0.2 + trailScore * 0.08 - mistakePenalty;
  return Math.max(0.72, Math.min(0.98, Math.round(score * 100) / 100));
}

function completeWriting(manual, summary) {
  const item = getCurrentCharacter();
  if (complete) return;
  const readiness = getWritingReadiness(item);
  if (!readiness.ready) {
    completionQueued = false;
    setMessage(readiness.message, readiness.subMessage);
    return;
  }
  complete = true;
  playSfx('complete');
  completionQueued = false;
  stopTrail();
  if (writer && typeof writer.cancelQuiz === 'function') {
    try { writer.cancelQuiz(); } catch (_) {}
  }
  strokesCompleted = item.strokes;
  currentStrokeIndex = item.strokes - 1;
  fillAllLetterPixels();
  renderPixelLetter();
  renderCanvasStrokeNumbers();
  completedCharacters.add(item.id);
  renderStrokeOrder();
  updateCharacterButtons();
  writingBoard.classList.add('success');
  companionCard.classList.toggle('celebrate', careState.hatched === true);
  setMessage('すごい！ じょうずに かけたね！', 'やったね！');
  const reward = getCurrentWritingReward();
  resultReward.textContent = `${reward.name}と もじパワーを ゲット！`;
  setFoodIconClass(resultRewardIcon, reward);
  modalRetryBtn.textContent = `つぎは「${writingCharacters[(currentIndex + 1) % writingCharacters.length].char}」`;
  stars += 25;
  starCountEl.textContent = String(stars);
  launchBurst();

  const result = {
    characterId: item.id,
    char: item.char,
    success: true,
    accuracy: calculateAccuracy(item),
    strokesCompleted: Math.min(item.strokes, Math.max(strokesCompleted, summary && summary.totalStrokes || 0)),
    reward
  };
  onWritingComplete(result);

  setTimeout(() => {
    resultOverlay.classList.add('show');
  }, 520);
}

function onWritingComplete(result) {
  console.log('writing complete', result);
  careState = loadCareState();
  const reward = result.reward || getCurrentWritingReward();
  if (careState.inventory[reward.id]) {
    changeInventory(reward.id, 1);
  }
  changeInventory('moji_power', 1);
  careState.stars = stars;
  careState.speech = careState.hatched ? `${reward.name} ほしいな〜` : 'タマゴを あたためよう！';
  try {
    localStorage.removeItem(PENDING_REWARD_KEY);
  } catch (error) {
    console.warn('Could not clear old pending writing reward:', error);
  }
  saveCareState();
  updateCompanionCard();
}

function launchBurst() {
  resultBurst.innerHTML = '';
  const colors = ['#ffe26a', '#f39a5d', '#86d7ac', '#79c3e7', '#fff8e8'];
  for (let i = 0; i < 34; i++) {
    const piece = document.createElement('div');
    piece.className = 'burst-piece';
    const angle = (Math.PI * 2 * i) / 34;
    const distancePx = 180 + Math.random() * 280;
    piece.style.setProperty('--tx', Math.cos(angle) * distancePx + 'px');
    piece.style.setProperty('--ty', Math.sin(angle) * distancePx + 'px');
    piece.style.setProperty('--c', colors[i % colors.length]);
    piece.style.animationDelay = (Math.random() * 0.12) + 's';
    resultBurst.appendChild(piece);
  }
  setTimeout(() => { resultBurst.innerHTML = ''; }, 1300);
}

function nextCharacter() {
  currentIndex = (currentIndex + 1) % writingCharacters.length;
  syncCurrentGroupFromCharacter();
  resetWriting();
}

document.addEventListener('pointerdown', (event) => {
  const button = event.target.closest('button');
  if (!button || !stageEl.contains(button)) return;
  playSfx(button.classList.contains('char-button') || button.classList.contains('kana-tab') ? 'select' : 'button');
}, true);

document.getElementById('backBtn').addEventListener('click', () => {
  saveCareState();
  window.location.href = '../play.html';
});

document.querySelector('.settings-btn').addEventListener('click', () => {
  setMessage('せっていは じゅんびちゅうだよ', 'あとでね');
});

document.getElementById('resetBtn').addEventListener('click', resetWriting);
document.getElementById('doneBtn').addEventListener('click', () => completeWriting(true));
modalRetryBtn.addEventListener('click', nextCharacter);
document.getElementById('careBtn').addEventListener('click', navigateToCareScreen);
companionCard.addEventListener('click', navigateToCareScreen);

writingBoard.addEventListener('pointerdown', onTrailPointerDown, true);
writingBoard.addEventListener('pointermove', onTrailPointerMove, true);
window.addEventListener('pointerup', finishTrailAttempt, true);
window.addEventListener('pointercancel', finishTrailAttempt, true);

window.MojikkoWritingGame = {
  writingCharacters,
  selectCharacter,
  resetWriting,
  completeWriting: () => completeWriting(true),
  getCurrentCharacter,
  getCareState: () => JSON.parse(JSON.stringify(careState))
};

starCountEl.textContent = String(stars);
resetWriting();
</script>
</body>
