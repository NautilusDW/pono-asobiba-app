function resizePixelTrailCanvas() {
  pixelTrailCanvas.width = 1000;
  pixelTrailCanvas.height = 1000;
  trailCtx.imageSmoothingEnabled = false;
}

function clearPixelTrail() {
  trailCtx.clearRect(0, 0, pixelTrailCanvas.width, pixelTrailCanvas.height);
}

function clearStrokeNumbers() {
  strokeNumberOverlay.innerHTML = '';
}

function getPixelLetterPadding() {
  const size = Math.max(1, currentWriterSize || writingBoard.getBoundingClientRect().width || 610);
  return (WRITER_PADDING / size) * 1000;
}

function getHanziGridTransform(gridSize, pixelPadding) {
  const padding = (pixelPadding / 1000) * gridSize;
  // HanziWriter's character bounds include the descender below y=0. Reusing
  // its positioner is what keeps the painted dots and the judged median equal.
  if (typeof HanziWriter !== 'undefined' && typeof HanziWriter.getScalingTransform === 'function') {
    return HanziWriter.getScalingTransform(gridSize, gridSize, padding);
  }
  const scale = (gridSize - padding * 2) / 1024;
  return {
    x: padding,
    y: padding + 124 * scale,
    scale
  };
}

function makeStrokeMask(pathData, gridSize, pixelPadding, offsetX, offsetY) {
  const maskCanvas = document.createElement('canvas');
  maskCanvas.width = gridSize;
  maskCanvas.height = gridSize;
  const maskCtx = maskCanvas.getContext('2d');
  const transform = getHanziGridTransform(gridSize, pixelPadding);
  const dx = offsetX || 0;
  const dy = offsetY || 0;
  maskCtx.clearRect(0, 0, gridSize, gridSize);
  maskCtx.fillStyle = '#000';
  maskCtx.setTransform(
    transform.scale,
    0,
    0,
    -transform.scale,
    transform.x + dx,
    gridSize - transform.y + dy
  );
  maskCtx.fill(new Path2D(pathData));
  maskCtx.setTransform(1, 0, 0, 1, 0, 0);

  const pixels = maskCtx.getImageData(0, 0, gridSize, gridSize).data;
  const mask = new Uint8Array(gridSize * gridSize);
  for (let i = 0; i < mask.length; i++) {
    mask[i] = pixels[i * 4 + 3] > 16 ? 1 : 0;
  }
  return mask;
}

function countMaskCells(mask) {
  let total = 0;
  for (let i = 0; i < mask.length; i++) {
    if (mask[i]) total += 1;
  }
  return total;
}

function getSvgViewBox(svgEl) {
  const raw = svgEl.getAttribute('viewBox');
  if (raw) {
    const parts = raw.trim().split(/[\s,]+/).map(Number);
    if (parts.length === 4 && parts.every(Number.isFinite) && parts[2] > 0 && parts[3] > 0) {
      return { x: parts[0], y: parts[1], width: parts[2], height: parts[3] };
    }
  }
  const width = Number(svgEl.getAttribute('width')) || 1024;
  const height = Number(svgEl.getAttribute('height')) || 1024;
  return { x: 0, y: 0, width, height };
}

function makeSvgGuideMask(svgText, gridSize) {
  const svgDoc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
  if (svgDoc.querySelector('parsererror')) {
    throw new Error('SVG parse error');
  }

  const svgEl = svgDoc.documentElement;
  const viewBox = getSvgViewBox(svgEl);
  const pathEls = Array.from(svgDoc.querySelectorAll('path[d]'));
  if (pathEls.length === 0) {
    throw new Error('SVG path not found');
  }

  const maskCanvas = document.createElement('canvas');
  maskCanvas.width = gridSize;
  maskCanvas.height = gridSize;
  const maskCtx = maskCanvas.getContext('2d');
  const sx = gridSize / viewBox.width;
  const sy = gridSize / viewBox.height;
  maskCtx.clearRect(0, 0, gridSize, gridSize);
  maskCtx.fillStyle = '#000';
  maskCtx.setTransform(sx, 0, 0, sy, -viewBox.x * sx, -viewBox.y * sy);

  pathEls.forEach((pathEl) => {
    const path = new Path2D(pathEl.getAttribute('d'));
    const fillRule = pathEl.getAttribute('fill-rule') === 'evenodd' ? 'evenodd' : 'nonzero';
    try {
      maskCtx.fill(path, fillRule);
    } catch (_) {
      maskCtx.fill(path);
    }
  });
  maskCtx.setTransform(1, 0, 0, 1, 0, 0);

  const pixels = maskCtx.getImageData(0, 0, gridSize, gridSize).data;
  const mask = new Uint8Array(gridSize * gridSize);
  for (let i = 0; i < mask.length; i++) {
    mask[i] = pixels[i * 4 + 3] > 16 ? 1 : 0;
  }

  const totalMaskCells = countMaskCells(mask);
  if (!totalMaskCells) {
    throw new Error('SVG mask is empty');
  }
  return { mask, totalMaskCells };
}

async function loadGuideSvgMask(item, gridSize) {
  if (!item || !item.guideSvg) return null;
  const cacheKey = `${item.guideSvg}:${gridSize}`;
  if (guideSvgMaskCache.has(cacheKey)) {
    return guideSvgMaskCache.get(cacheKey);
  }

  const response = await fetch(GUIDE_SVG_BASE_PATH + item.guideSvg);
  if (!response.ok) {
    throw new Error(`guide SVG not found: ${item.guideSvg}`);
  }
  const svgText = await response.text();
  const guideMask = makeSvgGuideMask(svgText, gridSize);
  guideSvgMaskCache.set(cacheKey, guideMask);
  return guideMask;
}

function rawMedianPointToGrid(point, gridSize, pixelPadding = getPixelLetterPadding()) {
  const x = Number(point && point[0]);
  const y = Number(point && point[1]);
  if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
  const transform = getHanziGridTransform(gridSize, pixelPadding);
  return {
    x: transform.x + x * transform.scale,
    y: gridSize - transform.y - y * transform.scale
  };
}

function guideGridPointToRawMedian(point, gridSize, pixelPadding) {
  if (!point || !Number.isFinite(point.x) || !Number.isFinite(point.y)) return null;
  const transform = getHanziGridTransform(gridSize, pixelPadding);
  if (!Number.isFinite(transform.scale) || transform.scale <= 0) return null;
  return [
    Math.max(0, Math.min(1024, (point.x - transform.x) / transform.scale)),
    Math.max(0, Math.min(1024, (gridSize - transform.y - point.y) / transform.scale))
  ];
}

async function prepareWriterCharData(data, item, gridSize, pixelPadding) {
  if (!data || !item || !item.guideSvg || !Array.isArray(data.medians)) return data;
  try {
    const customGuide = await loadGuideSvgMask(item, gridSize);
    const guideBounds = customGuide && getMaskBounds(customGuide.mask, gridSize);
    if (!guideBounds) return data;

    const mapMedianPoint = createMedianToGuideMapper(data.medians, guideBounds, gridSize);
    const medians = data.medians.map((median) => {
      if (!Array.isArray(median)) return median;
      return median.map((point) => {
        const guidePoint = mapMedianPoint(point);
        return guideGridPointToRawMedian(guidePoint, gridSize, pixelPadding) || point;
      });
    });

    return {
      ...data,
      medians,
      _mojikkoGuideAdjusted: true
    };
  } catch (error) {
    console.warn('Could not align writer medians to custom guide:', item.guideSvg, error);
    return data;
  }
}

function getMedianBounds(medians, gridSize) {
  let minX = Infinity;
  let minY = Infinity;
  let maxX = -Infinity;
  let maxY = -Infinity;
  if (!Array.isArray(medians)) return null;

  medians.forEach((median) => {
    if (!Array.isArray(median)) return;
    median.forEach((point) => {
      const gridPoint = rawMedianPointToGrid(point, gridSize);
      if (!gridPoint) return;
      minX = Math.min(minX, gridPoint.x);
      minY = Math.min(minY, gridPoint.y);
      maxX = Math.max(maxX, gridPoint.x);
      maxY = Math.max(maxY, gridPoint.y);
    });
  });

  if (!Number.isFinite(minX) || maxX <= minX || maxY <= minY) return null;
  return { minX, minY, maxX, maxY };
}

function createMedianToGuideMapper(medians, guideBounds, gridSize) {
  const medianBounds = getMedianBounds(medians, gridSize);
  if (!medianBounds || !guideBounds) {
    return (point) => rawMedianPointToGrid(point, gridSize);
  }

  const guideWidth = guideBounds.maxX - guideBounds.minX + 1;
  const guideHeight = guideBounds.maxY - guideBounds.minY + 1;
  const medianWidth = medianBounds.maxX - medianBounds.minX;
  const medianHeight = medianBounds.maxY - medianBounds.minY;
  const scale = Math.min(guideWidth / medianWidth, guideHeight / medianHeight);
  const guideCenterX = (guideBounds.minX + guideBounds.maxX + 1) / 2;
  const guideCenterY = (guideBounds.minY + guideBounds.maxY + 1) / 2;
  const medianCenterX = (medianBounds.minX + medianBounds.maxX) / 2;
  const medianCenterY = (medianBounds.minY + medianBounds.maxY) / 2;

  return (point) => {
    const gridPoint = rawMedianPointToGrid(point, gridSize);
    if (!gridPoint) return null;
    return {
      x: guideCenterX + (gridPoint.x - medianCenterX) * scale,
      y: guideCenterY + (gridPoint.y - medianCenterY) * scale
    };
  };
}

function makeMedianPolyline(median, mapMedianPoint) {
  const points = [];
  if (!Array.isArray(median)) return points;
  median.forEach((point) => {
    const gridPoint = mapMedianPoint(point);
    if (gridPoint && Number.isFinite(gridPoint.x) && Number.isFinite(gridPoint.y)) {
      points.push(gridPoint);
    }
  });
  return points;
}

function distanceSqToSegment(px, py, ax, ay, bx, by) {
  const dx = bx - ax;
  const dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq <= 0.0001) {
    const ox = px - ax;
    const oy = py - ay;
    return ox * ox + oy * oy;
  }

  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
  const x = ax + dx * t;
  const y = ay + dy * t;
  const ox = px - x;
  const oy = py - y;
  return ox * ox + oy * oy;
}

function distanceSqToPolyline(px, py, points) {
  if (!points || points.length === 0) return Infinity;
  if (points.length === 1) {
    const dx = px - points[0].x;
    const dy = py - points[0].y;
    return dx * dx + dy * dy;
  }

  let best = Infinity;
  for (let i = 0; i < points.length - 1; i++) {
    best = Math.min(best, distanceSqToSegment(px, py, points[i].x, points[i].y, points[i + 1].x, points[i + 1].y));
  }
  return best;
}

function splitGuideMaskByNearestMedian(guideMask, medians, gridSize, providedMapMedianPoint) {
  if (!guideMask || !Array.isArray(medians) || medians.length === 0) return null;
  const guideBounds = getMaskBounds(guideMask, gridSize);
  if (!guideBounds) return null;

  const mapMedianPoint = providedMapMedianPoint || createMedianToGuideMapper(medians, guideBounds, gridSize);
  const polylines = medians.map((median) => makeMedianPolyline(median, mapMedianPoint));
  if (!polylines.some((points) => points.length > 0)) return null;

  const strokeMasks = medians.map(() => new Uint8Array(gridSize * gridSize));
  for (let y = guideBounds.minY; y <= guideBounds.maxY; y++) {
    for (let x = guideBounds.minX; x <= guideBounds.maxX; x++) {
      const index = y * gridSize + x;
      if (!guideMask[index]) continue;

      const px = x + 0.5;
      const py = y + 0.5;
      let bestStroke = 0;
      let bestDistance = Infinity;
      for (let strokeIndex = 0; strokeIndex < polylines.length; strokeIndex++) {
        const d = distanceSqToPolyline(px, py, polylines[strokeIndex]);
        if (d < bestDistance) {
          bestDistance = d;
          bestStroke = strokeIndex;
        }
      }
      strokeMasks[bestStroke][index] = 1;
    }
  }

  return { strokeMasks, mapMedianPoint };
}

function mergeStrokeMasks(strokeMasks, gridSize) {
  const mask = new Uint8Array(gridSize * gridSize);
  let totalMaskCells = 0;
  strokeMasks.forEach((strokeMask) => {
    for (let i = 0; i < mask.length; i++) {
      if (strokeMask[i] && !mask[i]) {
        mask[i] = 1;
        totalMaskCells += 1;
      }
    }
  });
  return { mask, totalMaskCells };
}

function getMaskBounds(mask, gridSize) {
  let minX = gridSize;
  let minY = gridSize;
  let maxX = -1;
  let maxY = -1;
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      if (!mask[y * gridSize + x]) continue;
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
    }
  }
  if (maxX < 0) return null;
  return { minX, minY, maxX, maxY };
}

function clampOffsetToBoard(offsetX, offsetY, bounds, gridSize) {
  const inset = 2;
  return {
    x: Math.max(inset - bounds.minX, Math.min(gridSize - 1 - inset - bounds.maxX, offsetX)),
    y: Math.max(inset - bounds.minY, Math.min(gridSize - 1 - inset - bounds.maxY, offsetY))
  };
}

function updateWriterDisplayOffset(offsetX, offsetY, gridSize) {
  const targetRect = writerTarget.getBoundingClientRect();
  const size = currentWriterSize || targetRect.width || writingBoard.offsetWidth || 610;
  const px = (offsetX / gridSize) * size;
  const py = (offsetY / gridSize) * size;
  writerTarget.style.transform = `translate(${px}px, ${py}px)`;
}

function medianToBoardPercent(median) {
  if (!pixelLetter || !median || !median.length) return null;
  const [mx, my] = median[0];
  if (!Number.isFinite(mx) || !Number.isFinite(my)) return null;
  const gridSize = pixelLetter.gridSize;
  if (typeof pixelLetter.mapMedianPoint === 'function') {
    const point = pixelLetter.mapMedianPoint(median[0]);
    if (point && Number.isFinite(point.x) && Number.isFinite(point.y)) {
      return {
        x: Math.max(5, Math.min(95, (point.x / gridSize) * 100)),
        y: Math.max(5, Math.min(95, (point.y / gridSize) * 100))
      };
    }
  }
  const gridPadding = (getPixelLetterPadding() / 1000) * gridSize;
  const scale = (gridSize - gridPadding * 2) / 1024;
  const x = gridPadding + (pixelLetter.offsetX || 0) + mx * scale;
  const y = gridSize - gridPadding + (pixelLetter.offsetY || 0) - my * scale;
  return {
    x: Math.max(5, Math.min(95, (x / gridSize) * 100)),
    y: Math.max(5, Math.min(95, (y / gridSize) * 100))
  };
}

function clampBoardPercent(value, min = 8, max = 92) {
  return Math.max(min, Math.min(max, value));
}

function getMarkerMaskOverlap(pos) {
  if (!pixelLetter || !pixelLetter.mask) return 0;
  const gridSize = pixelLetter.gridSize;
  const gx = Math.round((pos.x / 100) * (gridSize - 1));
  const gy = Math.round((pos.y / 100) * (gridSize - 1));
  const radius = Math.ceil(gridSize * 0.052);
  let overlap = 0;
  for (let y = gy - radius; y <= gy + radius; y++) {
    if (y < 0 || y >= gridSize) continue;
    for (let x = gx - radius; x <= gx + radius; x++) {
      if (x < 0 || x >= gridSize) continue;
      const dx = x - gx;
      const dy = y - gy;
      if (dx * dx + dy * dy > radius * radius) continue;
      if (pixelLetter.mask[y * gridSize + x]) overlap += 1;
    }
  }
  return overlap;
}

function scoreStrokeNumberPosition(candidate, anchor, placedPositions) {
  const dx = candidate.x - anchor.x;
  const dy = candidate.y - anchor.y;
  const distanceFromAnchor = Math.sqrt(dx * dx + dy * dy);
  let score = getMarkerMaskOverlap(candidate) * 1200 + distanceFromAnchor * 18;
  const edge = Math.min(candidate.x, candidate.y, 100 - candidate.x, 100 - candidate.y);
  if (edge < 8) score += (8 - edge) * 500;
  placedPositions.forEach((placed) => {
    const px = candidate.x - placed.x;
    const py = candidate.y - placed.y;
    const d = Math.sqrt(px * px + py * py);
    if (d < 10) score += (10 - d) * 900;
  });
  return score;
}

function offsetStrokeNumberPosition(pos, index, total, placedPositions) {
  if (!pos) return null;
  const dx = pos.x - 50;
  const dy = pos.y - 50;
  const distanceFromCenter = Math.sqrt(dx * dx + dy * dy);
  const preferredAngle = distanceFromCenter >= 8
    ? Math.atan2(dy, dx)
    : -Math.PI / 2 + (index / Math.max(3, total)) * Math.PI * 2;
  const radii = [6.5, 8, 9.5, 11, 12.5];
  const angleSteps = [0, -0.45, 0.45, -0.9, 0.9, -1.35, 1.35, Math.PI, -Math.PI * 0.75, Math.PI * 0.75, -Math.PI / 2, Math.PI / 2];
  let best = null;
  let bestScore = Infinity;
  for (const radius of radii) {
    for (const angleStep of angleSteps) {
      const angle = preferredAngle + angleStep;
      const candidate = {
        x: clampBoardPercent(pos.x + Math.cos(angle) * radius),
        y: clampBoardPercent(pos.y + Math.sin(angle) * radius)
      };
      const score = scoreStrokeNumberPosition(candidate, pos, placedPositions || []);
      if (score < bestScore) {
        bestScore = score;
        best = candidate;
      }
    }
  }
  return best;
}

function renderCanvasStrokeNumbers() {
  clearStrokeNumbers();
  if (!pixelLetter || !currentCharData || !Array.isArray(currentCharData.medians)) return;
  const placedPositions = [];
  currentCharData.medians.forEach((median, index) => {
    const pos = medianToBoardPercent(median);
    if (!pos) return;
    const markerPos = offsetStrokeNumberPosition(pos, index, currentCharData.medians.length, placedPositions) || pos;
    placedPositions.push(markerPos);
    const num = document.createElement('div');
    const stateClass = index < strokesCompleted ? 'done' : (index === Math.min(currentStrokeIndex, currentCharData.medians.length - 1) ? 'current' : '');
    num.className = `guide-stroke-number ${stateClass}`;
    num.textContent = String(index + 1);
    num.style.left = `${markerPos.x}%`;
    num.style.top = `${markerPos.y}%`;
    strokeNumberOverlay.appendChild(num);
  });
}

async function buildPixelLetterMask(data, item, token) {
  pixelLetter = null;
  clearPixelTrail();
  clearStrokeNumbers();
  if (!data || !Array.isArray(data.strokes) || typeof Path2D === 'undefined') return false;

  const gridSize = PIXEL_GRID_SIZE;
  const pixelPadding = getPixelLetterPadding();
  try {
    let strokeMasks = data.strokes.map((path) => makeStrokeMask(path, gridSize, pixelPadding, 0, 0));
    const merged = mergeStrokeMasks(strokeMasks, gridSize);
    const offsetX = 0;
    const offsetY = 0;
    let guideMask = merged.mask;
    let totalMaskCells = merged.totalMaskCells;
    let mapMedianPoint = (point) => rawMedianPointToGrid(point, gridSize, pixelPadding);
    let writerOffsetX = offsetX;
    let writerOffsetY = offsetY;
    const baseSplit = splitGuideMaskByNearestMedian(guideMask, data.medians, gridSize, mapMedianPoint);
    if (baseSplit && baseSplit.strokeMasks) {
      strokeMasks = baseSplit.strokeMasks;
      mapMedianPoint = baseSplit.mapMedianPoint;
    }
    if (item && item.guideSvg) {
      try {
        const customGuide = await loadGuideSvgMask(item, gridSize);
        if (customGuide && customGuide.totalMaskCells) {
          guideMask = customGuide.mask;
          totalMaskCells = customGuide.totalMaskCells;
          const split = splitGuideMaskByNearestMedian(customGuide.mask, data.medians, gridSize);
          if (split && split.strokeMasks) {
            strokeMasks = split.strokeMasks;
            mapMedianPoint = split.mapMedianPoint;
            if (data._mojikkoGuideAdjusted) {
              writerOffsetX = 0;
              writerOffsetY = 0;
            }
          }
        }
      } catch (error) {
        console.warn('Could not load custom guide SVG:', item.guideSvg, error);
      }
    }

    if (token !== undefined && token !== writerLoadToken) return false;
    updateWriterDisplayOffset(writerOffsetX, writerOffsetY, gridSize);

    pixelLetter = {
      gridSize,
      mask: guideMask,
      strokeMasks,
      fill: new Uint8Array(gridSize * gridSize),
      totalMaskCells,
      offsetX,
      offsetY,
      writerOffsetX,
      writerOffsetY,
      mapMedianPoint
    };
    renderPixelLetter();
    renderCanvasStrokeNumbers();
    return true;
  } catch (error) {
    console.warn('Could not build pixel guide letter:', error);
    return false;
  }
}

function renderPixelLetter() {
  clearPixelTrail();
  if (!pixelLetter) return;

  const { gridSize, mask, fill, strokeMasks } = pixelLetter;
  const cell = 1000 / gridSize;
  const activeStroke = strokeMasks[Math.min(currentStrokeIndex, strokeMasks.length - 1)];
  trailCtx.save();
  trailCtx.imageSmoothingEnabled = false;
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      const index = y * gridSize + x;
      if (!mask[index]) continue;

      const isFilled = fill[index];
      const isActive = activeStroke && activeStroke[index];
      const hash = (x * 17 + y * 31) % 7;
      if (isFilled) {
        trailCtx.fillStyle = hash === 0 ? '#ffb36f' : (hash < 3 ? '#ff8a5d' : '#f27152');
      } else if (isActive) {
        trailCtx.fillStyle = hash < 2 ? 'rgba(130, 113, 92, 0.34)' : 'rgba(108, 94, 78, 0.28)';
      } else {
        trailCtx.fillStyle = hash < 2 ? 'rgba(117, 104, 88, 0.21)' : 'rgba(105, 93, 79, 0.16)';
      }
      trailCtx.fillRect(Math.floor(x * cell), Math.floor(y * cell), Math.ceil(cell) + 0.5, Math.ceil(cell) + 0.5);
    }
  }
  trailCtx.restore();
}

function maskToPreviewRects(mask, gridSize, className) {
  if (!mask) return '';
  const rects = [];
  for (let y = 0; y < gridSize; y++) {
    let x = 0;
    while (x < gridSize) {
      while (x < gridSize && !mask[y * gridSize + x]) x++;
      if (x >= gridSize) break;
      const startX = x;
      while (x < gridSize && mask[y * gridSize + x]) x++;
      rects.push(`<rect class="${className}" x="${startX}" y="${y}" width="${x - startX}" height="1"></rect>`);
    }
  }
  return rects.join('');
}

function renderPixelStrokePreview(strokeIndex, strokeCount) {
  if (!pixelLetter || !Array.isArray(pixelLetter.strokeMasks) || pixelLetter.strokeMasks.length === 0) return '';
  const gridSize = pixelLetter.gridSize || PIXEL_GRID_SIZE;
  const shapes = pixelLetter.strokeMasks.slice(0, strokeCount).map((mask, index) => {
    const className = index < strokesCompleted ? 'preview-done' : (index === strokeIndex ? 'preview-current' : 'preview-guide');
    return maskToPreviewRects(mask, gridSize, className);
  }).join('');
  if (!shapes) return '';
  return `<svg class="stroke-mask-preview" viewBox="0 0 ${gridSize} ${gridSize}" preserveAspectRatio="xMidYMid meet" aria-hidden="true">${shapes}</svg>`;
}

function renderStrokeOrder() {
  const item = getCurrentCharacter();
  const count = Math.max(1, item.strokes || 1);
  const strokePaths = currentCharData && Array.isArray(currentCharData.strokes) ? currentCharData.strokes : null;
  const previewViewBox = getStrokePreviewViewBox();
  strokeListEl.innerHTML = '';
  for (let index = 0; index < count; index++) {
    const card = document.createElement('div');
    const cls = index < strokesCompleted ? 'done' : (index === Math.min(currentStrokeIndex, count - 1) ? 'current' : '');
    const pixelPreview = renderPixelStrokePreview(index, count);
    const preview = pixelPreview || (strokePaths
      ? `<svg viewBox="${previewViewBox}" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <g transform="translate(0, 1024) scale(1, -1)">
            ${strokePaths.map((path, pathIndex) => {
              const pathClass = pathIndex < strokesCompleted ? 'preview-done' : (pathIndex === index ? 'preview-current' : '');
              return `<path class="${pathClass}" d="${escapeAttr(path)}"></path>`;
            }).join('')}
          </g>
        </svg>`
      : `<div class="stroke-preview" aria-hidden="true">${item.char}</div>`);
    card.className = `stroke-card ${cls}`;
    card.innerHTML = `
      <div class="stroke-num">${index + 1}</div>
      <div class="stroke-mini">
        ${preview}
        <div class="stroke-label">${index + 1}かくめ</div>
      </div>
    `;
    strokeListEl.appendChild(card);
  }
}

function getStrokePreviewViewBox() {
  const medians = currentCharData && Array.isArray(currentCharData.medians) ? currentCharData.medians : null;
  if (!medians || medians.length === 0) return '0 0 1024 1024';
  let minX = Infinity;
  let minY = Infinity;
  let maxX = -Infinity;
  let maxY = -Infinity;
  medians.forEach((stroke) => {
    if (!Array.isArray(stroke)) return;
    stroke.forEach((point) => {
      if (!Array.isArray(point) || point.length < 2) return;
      const x = Number(point[0]);
      const y = Number(point[1]);
      if (!Number.isFinite(x) || !Number.isFinite(y)) return;
      minX = Math.min(minX, x);
      minY = Math.min(minY, 1024 - y);
      maxX = Math.max(maxX, x);
      maxY = Math.max(maxY, 1024 - y);
    });
  });
  if (!Number.isFinite(minX) || !Number.isFinite(minY)) return '0 0 1024 1024';
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const span = Math.max(maxX - minX, maxY - minY, 360);
  const viewH = Math.min(980, span + 300);
  const viewW = viewH * 1.85;
  return `${Math.round(cx - viewW / 2)} ${Math.round(cy - viewH / 2)} ${Math.round(viewW)} ${Math.round(viewH)}`;
}

function updateStrokeCountFromData(item, data) {
  const nextCount = data && Array.isArray(data.strokes)
    ? data.strokes.length
    : (data && Array.isArray(data.medians) ? data.medians.length : item.strokes);
  if (Number.isFinite(nextCount) && nextCount > 0) item.strokes = nextCount;
}

function loadKanaData(char) {
  const urls = [
    `https://cdn.jsdelivr.net/gh/ailectra/kana-json@v0.0.1/data/${char}.json`,
    `https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${char}.json`
  ];
  let index = 0;
  function tryNext() {
    const url = urls[index++];
    return fetch(url)
      .then((response) => {
        if (!response.ok) throw new Error('not found');
        return response.json();
      })
      .catch((error) => {
        if (index >= urls.length) throw error;
        return tryNext();
      });
  }
  return tryNext();
}

function createWriter() {
  const item = getCurrentCharacter();
  writerLoadToken += 1;
  const token = writerLoadToken;
  currentCharData = null;
  if (writer && typeof writer.cancelQuiz === 'function') {
    try { writer.cancelQuiz(); } catch (_) {}
  }
  pixelLetter = null;
  clearPixelTrail();
  clearStrokeNumbers();
  updateWriterDisplayOffset(0, 0, PIXEL_GRID_SIZE);
  writerTarget.innerHTML = '';
  if (typeof HanziWriter === 'undefined') {
    setMessage('よみこみが まだみたい。 もういちど ひらいてね', 'まっててね');
    return;
  }

  const rect = writerTarget.getBoundingClientRect();
  const size = Math.max(360, Math.round(rect.width));
  currentWriterSize = size;
  writer = HanziWriter.create(writerTarget, item.char, {
    width: size,
    height: size,
    padding: 48,
    showOutline: true,
    showCharacter: false,
    strokeColor: 'rgba(92, 74, 58, 0.44)',
    outlineColor: 'rgba(78, 62, 49, 0.18)',
    drawingColor: 'rgba(242, 124, 91, 0.08)',
    highlightColor: 'rgba(61, 168, 126, 0.72)',
    radicalColor: 'rgba(92, 74, 58, 0.44)',
    drawingWidth: 28,
    leniency: QUIZ_LENIENCY,
    strokeAnimationSpeed: 0.75,
    delayBetweenStrokes: 500,
    charDataLoader: function(char, onComplete) {
      loadKanaData(char)
        .then((data) => prepareWriterCharData(data, item, PIXEL_GRID_SIZE, getPixelLetterPadding()))
        .then((data) => {
          if (token !== writerLoadToken) return;
          currentCharData = data;
          updateStrokeCountFromData(item, data);
          return buildPixelLetterMask(data, item, token)
            .then((ready) => {
              if (!ready || token !== writerLoadToken) return;
              renderStrokeOrder();
              onComplete(data);
            });
        })
        .catch((error) => {
          console.warn('No kana data for character:', char, error);
          if (token === writerLoadToken) {
            setMessage('もじデータを よみこめなかったよ', 'あとで もういちど');
          }
        });
    }
  });

  startWriterQuiz(0);
}

function getWriterQuizOptions(startStrokeNum) {
  const options = {
    onCorrectStroke: onCorrectStroke,
    onMistake: onMistake,
    onComplete: onWriterComplete,
    leniency: QUIZ_LENIENCY,
    showHintAfterMisses: 2,
    highlightOnComplete: true,
    highlightCompleteColor: 'rgba(255, 214, 90, 0.95)'
  };
  if (Number.isFinite(startStrokeNum) && startStrokeNum > 0) {
    options.quizStartStrokeNum = Math.max(0, startStrokeNum);
  }
  return options;
}

function startWriterQuiz(startStrokeNum) {
  if (!writer || typeof writer.quiz !== 'function') return;
  if (typeof writer.cancelQuiz === 'function') {
    try { writer.cancelQuiz(); } catch (_) {}
  }
  writer.quiz(getWriterQuizOptions(startStrokeNum));
}

function resetWriting(options = {}) {
  clearPendingWritingCompletionTimers();
  pendingNextWritingIndex = null;
  pendingNextAction = null;
  if (!options.skipModeBoundary) synchronizeActiveModeTaskAtBoundary();
  syncCurrentGroupFromCharacter();
  trailDrawing = false;
  lastTrailPoint = null;
  activeTrailPointerId = null;
  activeTrailTouchId = null;
  trailDistance = 0;
  trailAttemptId += 1;
  activeAttemptStroke = -1;
  activeAttemptCompletedBefore = 0;
  activeAttemptPainted = false;
  activeAttemptHadMistake = false;
  activeAttemptMaxProgress = 0;
  activeAttemptStartProgress = null;
  activeAttemptLastProgress = 0;
  activeAttemptPreviousRawProgress = null;
  activeAttemptClosedStroke = false;
  sparkleBudget = 0;
  strokesCompleted = 0;
  currentStrokeIndex = 0;
  mistakeCount = 0;
  complete = false;
  completionQueued = false;
  currentCharData = null;
  pixelLetter = null;
  resizePixelTrailCanvas();
  clearPixelTrail();
  clearStrokeNumbers();
  writingBoard.classList.remove('success');
  closeResultOverlay();
  companionCard.classList.remove('celebrate');
  const item = getCurrentCharacter();
  const reward = getCurrentWritingReward();
  resultTitleEl.textContent = 'すごい！';
  resultCopyEl.textContent = 'じょうずに かけたね！';
  resultRewardWrap.hidden = false;
  renderWritingModePrompt(item);
  renderRewardPreview(reward);
  setMessage('', 'ゆっくりで だいじょうぶ');
  renderStrokeOrder();
  if (activeMode === WRITING_MODES.sequence) buildCharacterList();
  renderModePanel();
  updateCharacterButtons();
  createWriter();
}

function selectCharacter(index) {
  if (activeMode !== WRITING_MODES.sequence) return;
  currentIndex = index;
  syncCurrentGroupFromCharacter();
  resetWriting();
}

function boardPointFromEvent(event) {
  const rect = pixelTrailCanvas.getBoundingClientRect();
  return {
    x: Math.max(0, Math.min(1000, ((event.clientX - rect.left) / rect.width) * 1000)),
    y: Math.max(0, Math.min(1000, ((event.clientY - rect.top) / rect.height) * 1000)),
    clientX: event.clientX,
    clientY: event.clientY
  };
}

function distance(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function getActivePaintStrokeIndex() {
  const item = getCurrentCharacter();
  if (!pixelLetter || !item || !Array.isArray(pixelLetter.strokeMasks)) return -1;
  const strokeIndex = activeAttemptStroke >= 0 ? activeAttemptStroke : currentStrokeIndex;
  return Math.max(0, Math.min(item.strokes - 1, strokeIndex));
}

function isAllowedStrokePixel(index, strokeIndex) {
  if (!pixelLetter || strokeIndex < 0) return false;
  const strokeMask = pixelLetter.strokeMasks[strokeIndex];
  return !!(strokeMask && strokeMask[index]);
}

function fillLetterPixelsAt(point, radius) {
  if (!pixelLetter) return { changed: 0, touched: 0 };
  const { gridSize, mask, fill } = pixelLetter;
  const activePaintStroke = getActivePaintStrokeIndex();
  const gx = Math.floor((point.x / 1000) * gridSize);
  const gy = Math.floor((point.y / 1000) * gridSize);
  let changed = 0;
  let touched = 0;
  let activeTouched = 0;
  let blocked = 0;
  for (let y = gy - radius; y <= gy + radius; y++) {
    if (y < 0 || y >= gridSize) continue;
    for (let x = gx - radius; x <= gx + radius; x++) {
      if (x < 0 || x >= gridSize) continue;
      const dx = x - gx;
      const dy = y - gy;
      if (dx * dx + dy * dy > radius * radius) continue;
      const index = y * gridSize + x;
      if (!mask[index]) continue;
      touched += 1;
      if (!isAllowedStrokePixel(index, activePaintStroke)) {
        blocked += 1;
        continue;
      }
      activeTouched += 1;
      if (!fill[index]) {
        fill[index] = 1;
        changed += 1;
      }
    }
  }
  return { changed, touched, activeTouched, blocked };
}

function paintTrailSegment(from, to) {
  const d = distance(from, to);
  if (!Number.isFinite(d) || d <= 0) return 0;
  const steps = Math.max(1, Math.ceil(d / 10));
  let changed = 0;
  let touched = 0;
  let activeTouched = 0;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const x = from.x + (to.x - from.x) * t;
    const y = from.y + (to.y - from.y) * t;
    const result = fillLetterPixelsAt({ x, y }, LETTER_BRUSH_RADIUS);
    changed += result.changed;
    touched += result.touched;
    if (result.activeTouched) activeTouched += result.activeTouched;
  }
  if (changed > 0) renderPixelLetter();
  return activeTouched > 0 ? d : 0;
}

function medianPointToLetterGrid(point) {
  if (!pixelLetter) return null;
  const x = Number(point && point[0]);
  const y = Number(point && point[1]);
  if (!Number.isFinite(x) || !Number.isFinite(y)) return null;

  if (typeof pixelLetter.mapMedianPoint === 'function') {
    const mapped = pixelLetter.mapMedianPoint(point);
    if (mapped && Number.isFinite(mapped.x) && Number.isFinite(mapped.y)) return mapped;
  }

  return rawMedianPointToGrid(point, pixelLetter.gridSize || PIXEL_GRID_SIZE);
}

function getStrokeProgressAtBoardPoint(strokeIndex, boardPoint) {
  if (!pixelLetter || !currentCharData || !Array.isArray(currentCharData.medians)) return 1;
  const median = currentCharData.medians[strokeIndex];
  if (!Array.isArray(median) || median.length < 2) return 1;

  const gridSize = pixelLetter.gridSize || PIXEL_GRID_SIZE;
  const px = (boardPoint.x / 1000) * gridSize;
  const py = (boardPoint.y / 1000) * gridSize;
  const points = median
    .map(medianPointToLetterGrid)
    .filter((point) => point && Number.isFinite(point.x) && Number.isFinite(point.y));
  if (points.length < 2) return 1;

  const segments = [];
  let totalLength = 0;
  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i];
    const b = points[i + 1];
    const length = Math.hypot(b.x - a.x, b.y - a.y);
    if (!Number.isFinite(length) || length <= 0.001) continue;
    segments.push({ a, b, length, start: totalLength });
    totalLength += length;
  }
  if (totalLength <= 0) return 1;

  let bestDistanceSq = Infinity;
  let bestProgress = 0;
  segments.forEach((segment) => {
    const dx = segment.b.x - segment.a.x;
    const dy = segment.b.y - segment.a.y;
    const lenSq = dx * dx + dy * dy;
    const t = lenSq > 0
      ? Math.max(0, Math.min(1, ((px - segment.a.x) * dx + (py - segment.a.y) * dy) / lenSq))
      : 0;
    const x = segment.a.x + dx * t;
    const y = segment.a.y + dy * t;
    const ox = px - x;
    const oy = py - y;
    const distanceSq = ox * ox + oy * oy;
    if (distanceSq < bestDistanceSq) {
      bestDistanceSq = distanceSq;
      bestProgress = (segment.start + segment.length * t) / totalLength;
    }
  });

  const maxDistanceSq = VISIBLE_GUIDE_DISTANCE_TOLERANCE * VISIBLE_GUIDE_DISTANCE_TOLERANCE;
  return bestDistanceSq <= maxDistanceSq ? Math.max(0, Math.min(1, bestProgress)) : null;
}

function isClosedStrokeMedian(strokeIndex) {
  if (!currentCharData || !Array.isArray(currentCharData.medians)) return false;
  const median = currentCharData.medians[strokeIndex];
  if (!Array.isArray(median) || median.length < 3) return false;
  const first = median[0];
  const last = median[median.length - 1];
  if (!Array.isArray(first) || !Array.isArray(last)) return false;
  const dx = Number(first[0]) - Number(last[0]);
  const dy = Number(first[1]) - Number(last[1]);
  return Number.isFinite(dx) && Number.isFinite(dy) &&
    Math.hypot(dx, dy) <= VISIBLE_GUIDE_CLOSED_ENDPOINT_TOLERANCE;
}

function canAcceptVisibleGuideStroke(strokeIndex) {
  const progressSpan = activeAttemptMaxProgress - activeAttemptStartProgress;
  const startedNearBeginning = activeAttemptClosedStroke
    ? Math.abs(activeAttemptStartProgress) <= VISIBLE_GUIDE_MAX_START_PROGRESS
    : activeAttemptStartProgress <= VISIBLE_GUIDE_MAX_START_PROGRESS;
  const reachedEnoughOfGuide = activeAttemptClosedStroke
    ? progressSpan >= VISIBLE_GUIDE_MIN_END_PROGRESS
    : activeAttemptMaxProgress >= VISIBLE_GUIDE_MIN_END_PROGRESS;
  return !!(
    activeAttemptStroke === strokeIndex &&
    activeAttemptPainted &&
    getStrokeFilledRatio(strokeIndex) >= VISIBLE_GUIDE_MIN_FILL_RATIO &&
    Number.isFinite(activeAttemptStartProgress) &&
    startedNearBeginning &&
    reachedEnoughOfGuide &&
    progressSpan >= VISIBLE_GUIDE_MIN_PROGRESS_SPAN &&
    activeAttemptMaxProgress - activeAttemptLastProgress <= VISIBLE_GUIDE_MAX_BACKTRACK
  );
}

function updateAttemptProgressForPoint(point) {
  if (complete || !point || activeAttemptStroke < 0) return;
  const item = getCurrentCharacter();
  const strokeIndex = Math.min(activeAttemptStroke, item.strokes - 1);
  if (strokeIndex < 0 || strokeIndex < strokesCompleted) return;
  const rawProgress = getStrokeProgressAtBoardPoint(strokeIndex, point);
  if (!Number.isFinite(rawProgress)) return;

  if (activeAttemptPreviousRawProgress === null) {
    // A closed median has the same point at progress 0 and 1. Represent its
    // first sample on the side nearest the seam so forward motion can unwrap.
    const initialProgress = activeAttemptClosedStroke && rawProgress > 0.5
      ? rawProgress - 1
      : rawProgress;
    activeAttemptStartProgress = initialProgress;
    activeAttemptLastProgress = initialProgress;
    activeAttemptMaxProgress = initialProgress;
    activeAttemptPreviousRawProgress = rawProgress;
    return;
  }

  if (activeAttemptClosedStroke) {
    let delta = rawProgress - activeAttemptPreviousRawProgress;
    if (delta < -0.5) delta += 1;
    if (delta > 0.5) delta -= 1;
    activeAttemptLastProgress += delta;
  } else {
    activeAttemptLastProgress = rawProgress;
  }
  activeAttemptPreviousRawProgress = rawProgress;
  activeAttemptMaxProgress = Math.max(activeAttemptMaxProgress, activeAttemptLastProgress);
}

function fillStrokePixels(strokeIndex) {
  if (!pixelLetter || !pixelLetter.strokeMasks[strokeIndex]) return 0;
  const strokeMask = pixelLetter.strokeMasks[strokeIndex];
  let changed = 0;
  for (let i = 0; i < strokeMask.length; i++) {
    if (strokeMask[i] && !pixelLetter.fill[i]) {
      pixelLetter.fill[i] = 1;
      changed += 1;
    }
  }
  return changed;
}

function clearStrokePixels(strokeIndex) {
  if (!pixelLetter || !pixelLetter.strokeMasks[strokeIndex]) return 0;
  const strokeMask = pixelLetter.strokeMasks[strokeIndex];
  let changed = 0;
  for (let i = 0; i < strokeMask.length; i++) {
    if (strokeMask[i] && pixelLetter.fill[i]) {
      pixelLetter.fill[i] = 0;
      changed += 1;
    }
  }
  return changed;
}

function getStrokeFilledRatio(strokeIndex) {
  if (!pixelLetter || !pixelLetter.strokeMasks[strokeIndex]) return 0;
  const strokeMask = pixelLetter.strokeMasks[strokeIndex];
  let total = 0;
  let filled = 0;
  for (let i = 0; i < strokeMask.length; i++) {
    if (!strokeMask[i]) continue;
    total += 1;
    if (pixelLetter.fill[i]) filled += 1;
  }
  return total ? filled / total : 0;
}

function maybeUpdateProgressAfterFill() {
  if (complete || !pixelLetter) return;
  const item = getCurrentCharacter();
  if (!item) return;
  if (strokesCompleted >= item.strokes) {
    maybeFinishWritingAfterProgress();
    return;
  }

  const strokeIndex = Math.min(currentStrokeIndex, item.strokes - 1);
  if (strokeIndex < 0 || strokeIndex < strokesCompleted) return;
  const fillRatio = getStrokeFilledRatio(strokeIndex);
  if (fillRatio >= STROKE_FILL_COMPLETE_RATIO) {
    setMessage(`${strokeIndex + 1}かくめ、いいかんじ！`, 'じゅんばんに かこう');
  }
}

function fillAllLetterPixels() {
  if (!pixelLetter) return 0;
  let changed = 0;
  for (let i = 0; i < pixelLetter.mask.length; i++) {
    if (pixelLetter.mask[i] && !pixelLetter.fill[i]) {
      pixelLetter.fill[i] = 1;
      changed += 1;
    }
  }
  return changed;
}

function getFilledLetterRatio() {
  if (!pixelLetter || !pixelLetter.totalMaskCells) return 0;
  let filled = 0;
  for (let i = 0; i < pixelLetter.mask.length; i++) {
    if (pixelLetter.mask[i] && pixelLetter.fill[i]) filled += 1;
  }
  return filled / pixelLetter.totalMaskCells;
}

function getWritingReadiness(item) {
  const requiredStrokes = Math.max(1, item && item.strokes || 1);
  if (strokesCompleted < requiredStrokes) {
    return {
      ready: false,
      message: 'まだ かけていない せんが あるよ',
      subMessage: 'すうじの じゅんに なぞろう'
    };
  }

  return { ready: true, message: '', subMessage: '' };
}

function maybeFinishWritingAfterProgress(summary) {
  if (complete || completionQueued) return;
  const item = getCurrentCharacter();
  const readiness = getWritingReadiness(item);
  if (!readiness.ready) {
    if (strokesCompleted >= Math.max(1, item.strokes || 1)) {
      setMessage(readiness.message, readiness.subMessage);
    }
    return;
  }
  completionQueued = true;
  setMessage('さいごまで かけたね！', 'できた！');
  const completionToken = writingCompletionToken;
  pendingAutoCompleteTimer = setTimeout(() => {
    pendingAutoCompleteTimer = null;
    if (completionToken !== writingCompletionToken || isWritingModeRuntimeBlocked()) {
      completionQueued = false;
      if (isWritingModeRuntimeBlocked()) writingNeedsResetAfterRuntimeBlock = true;
      return;
    }
    completionQueued = false;
    completeWriting(false, summary);
  }, 260);
}

function spawnSpark(clientX, clientY) {
  const rect = writingBoard.getBoundingClientRect();
  const particle = document.createElement('div');
  particle.className = 'board-particle';
  particle.style.left = (clientX - rect.left) + 'px';
  particle.style.top = (clientY - rect.top) + 'px';
  writingBoard.appendChild(particle);
  setTimeout(() => particle.remove(), 900);
}

function getChangedTouchIds(event) {
  return Array.from(event && event.changedTouches || [], (touch) => touch.identifier);
}

function blockTouchEvent(event) {
  if (event.cancelable) event.preventDefault();
  event.stopImmediatePropagation();
}

function guardWritingTouchStart(event) {
  const changedIds = getChangedTouchIds(event);
  if (activeTrailTouchId === null) {
    if (changedIds.length > 0) activeTrailTouchId = changedIds[0];
    return;
  }
  if (changedIds.some((id) => id !== activeTrailTouchId)) blockTouchEvent(event);
}

function guardWritingTouchMove(event) {
  if (activeTrailTouchId === null) return;
  const changedIds = getChangedTouchIds(event);
  if (changedIds.length > 0 && !changedIds.includes(activeTrailTouchId)) blockTouchEvent(event);
}

function guardWritingTouchEnd(event) {
  if (activeTrailTouchId === null) return;
  const changedIds = getChangedTouchIds(event);
  if (changedIds.includes(activeTrailTouchId)) {
    activeTrailTouchId = null;
    return;
  }
  if (trailDrawing) blockTouchEvent(event);
}

function onTrailPointerDown(event) {
  if (complete || event.pointerType === 'mouse' && event.button !== 0) return;
  if (trailDrawing) {
    event.preventDefault();
    event.stopImmediatePropagation();
    return;
  }
  playSfx('writeStart');
  trailDrawing = true;
  activeTrailPointerId = event.pointerId;
  trailDistance = 0;
  sparkleBudget = 0;
  trailAttemptId += 1;
  const item = getCurrentCharacter();
  const strokeIndex = Math.min(currentStrokeIndex, item.strokes - 1);
  activeAttemptStroke = strokeIndex;
  activeAttemptCompletedBefore = strokesCompleted;
  activeAttemptPainted = false;
  activeAttemptHadMistake = false;
  activeAttemptStartProgress = null;
  activeAttemptLastProgress = 0;
  activeAttemptMaxProgress = 0;
  activeAttemptPreviousRawProgress = null;
  activeAttemptClosedStroke = isClosedStrokeMedian(strokeIndex);
  if (strokeIndex >= strokesCompleted) {
    const erased = clearStrokePixels(strokeIndex);
    if (erased > 0) renderPixelLetter();
  }
  lastTrailPoint = boardPointFromEvent(event);
  updateAttemptProgressForPoint(lastTrailPoint);
  const result = fillLetterPixelsAt(lastTrailPoint, LETTER_BRUSH_RADIUS);
  if (result.activeTouched > 0) activeAttemptPainted = true;
  if (result.changed > 0) renderPixelLetter();
  const nextStroke = Math.min(currentStrokeIndex + 1, getCurrentCharacter().strokes);
  setMessage(
    result.activeTouched > 0
      ? 'そのまま そーっと'
      : (result.touched > 0 ? `いまは ${nextStroke}かくめを なぞってね` : 'もじの うえを なぞってね'),
    'いいかんじ！'
  );
  maybeUpdateProgressAfterFill();
}

function onTrailPointerMove(event) {
  if (
    !trailDrawing || complete || !lastTrailPoint ||
    activeTrailPointerId !== null && event.pointerId !== activeTrailPointerId
  ) return;
  const next = boardPointFromEvent(event);
  const d = paintTrailSegment(lastTrailPoint, next);
  trailDistance += d;
  if (d > 0) activeAttemptPainted = true;
  const now = performance.now();
  if (d > 0 && now - lastWriteSfxAt > 90) {
    lastWriteSfxAt = now;
    playSfx('writeMove');
  }
  sparkleBudget += d;
  if (sparkleBudget > 130) {
    sparkleBudget = 0;
    spawnSpark(event.clientX, event.clientY);
  }
  lastTrailPoint = next;
  updateAttemptProgressForPoint(next);
  maybeUpdateProgressAfterFill();
}

function stopTrail() {
  trailDrawing = false;
  lastTrailPoint = null;
  activeTrailPointerId = null;
  activeTrailTouchId = null;
}

function appendFinalTrailPoint(event) {
  if (!trailDrawing || !lastTrailPoint || !event || event.type !== 'pointerup') return;
  const rect = writingBoard.getBoundingClientRect();
  if (
    event.clientX < rect.left || event.clientX > rect.right ||
    event.clientY < rect.top || event.clientY > rect.bottom
  ) return;
  const finalPoint = boardPointFromEvent(event);
  const d = paintTrailSegment(lastTrailPoint, finalPoint);
  trailDistance += d;
  if (d > 0) activeAttemptPainted = true;
  lastTrailPoint = finalPoint;
  updateAttemptProgressForPoint(finalPoint);
  maybeUpdateProgressAfterFill();
}

function finishTrailAttempt(event) {
  if (
    activeTrailPointerId !== null &&
    (!event || event.pointerId !== activeTrailPointerId)
  ) return;
  appendFinalTrailPoint(event);
  const attemptId = trailAttemptId;
  const strokeIndex = activeAttemptStroke;
  const completedBefore = activeAttemptCompletedBefore;
  const visibleGuideAccepted = !!(
    event && event.type === 'pointerup' && canAcceptVisibleGuideStroke(strokeIndex)
  );
  stopTrail();
  if (strokeIndex < 0) return;
  if (visibleGuideAccepted) {
    acceptCorrectStroke({ strokeNum: strokeIndex, source: 'visible-guide' }, true);
    return;
  }
  if (event && event.type === 'pointercancel') {
    startWriterQuiz(strokesCompleted);
  }

  setTimeout(() => {
    if (complete || trailAttemptId !== attemptId || activeAttemptStroke !== strokeIndex) return;
    activeAttemptStroke = -1;
    activeAttemptCompletedBefore = strokesCompleted;
    const shouldClear = activeAttemptPainted || activeAttemptHadMistake;
    activeAttemptPainted = false;
    activeAttemptHadMistake = false;
    if (strokesCompleted > completedBefore || strokeIndex < strokesCompleted) return;

    activeAttemptMaxProgress = 0;
    activeAttemptStartProgress = null;
    activeAttemptLastProgress = 0;
    activeAttemptPreviousRawProgress = null;
    activeAttemptClosedStroke = false;
    if (!shouldClear) return;
    const erased = clearStrokePixels(strokeIndex);
    if (erased > 0) {
      renderPixelLetter();
    }
    trailDistance = 0;
    setMessage(`${strokeIndex + 1}かくめを もういちど なぞってね`, 'ゆっくりね');
  }, ATTEMPT_CLEAR_DELAY_MS);
}

function onCorrectStroke(data) {
  const item = getCurrentCharacter();
  const expectedStroke = Math.min(strokesCompleted, Math.max(0, (item && item.strokes || 1) - 1));
  const strokeNum = data && Number.isFinite(data.strokeNum) ? data.strokeNum : strokesCompleted;
  if (strokeNum !== expectedStroke) {
    if (strokeNum > expectedStroke) {
      activeAttemptHadMistake = true;
      clearStrokePixels(strokeNum);
      renderPixelLetter();
      startWriterQuiz(expectedStroke);
      setMessage(`${expectedStroke + 1}かくめを なぞってね`, 'じゅんばんに かこう');
    }
    return;
  }
  // HanziWriter OK is authoritative. The visible-guide check is only an OR
  // fallback for kana whose supplied outline and median disagree slightly.
  acceptCorrectStroke(data);
}

function acceptCorrectStroke(data, resyncWriter) {
  const item = getCurrentCharacter();
  const expectedStroke = Math.min(strokesCompleted, Math.max(0, (item && item.strokes || 1) - 1));
  const rawStrokeNum = data && Number.isFinite(data.strokeNum) ? data.strokeNum : expectedStroke;
  const strokeNum = rawStrokeNum === expectedStroke ? rawStrokeNum : expectedStroke;
  playSfx('strokeOk');
  fillStrokePixels(strokeNum);
  const nextCompleted = strokeNum < strokesCompleted
    ? strokesCompleted
    : Math.max(strokesCompleted + 1, strokeNum + 1);
  strokesCompleted = Math.min(item.strokes, nextCompleted);
  currentStrokeIndex = Math.min(item.strokes - 1, strokesCompleted);
  stopTrail();
  trailDistance = 0;
  activeAttemptStroke = -1;
  activeAttemptCompletedBefore = strokesCompleted;
  activeAttemptPainted = false;
  activeAttemptHadMistake = false;
  activeAttemptMaxProgress = 0;
  activeAttemptStartProgress = null;
  activeAttemptLastProgress = 0;
  activeAttemptPreviousRawProgress = null;
  activeAttemptClosedStroke = false;
  renderPixelLetter();
  renderCanvasStrokeNumbers();
  setMessage(
    strokesCompleted >= item.strokes
      ? 'さいごの せんも OK！'
      : `${strokeNum + 1}かくめ OK！ つぎの せんへ`,
    'いいかんじ！'
  );
  renderStrokeOrder();
  if (resyncWriter) {
    if (strokesCompleted < item.strokes) {
      startWriterQuiz(strokesCompleted);
    } else if (writer && typeof writer.cancelQuiz === 'function') {
      try { writer.cancelQuiz(); } catch (_) {}
    }
  }
  maybeFinishWritingAfterProgress();
}

function onMistake(data) {
  const item = getCurrentCharacter();
  const rawStrokeNum = data && Number.isFinite(data.strokeNum) ? data.strokeNum : currentStrokeIndex;
  if (rawStrokeNum < strokesCompleted) return;
  playSfx('mistake');
  const strokeNum = Math.min(strokesCompleted, item.strokes - 1);
  mistakeCount += 1;
  activeAttemptHadMistake = true;
  if (activeAttemptStroke >= 0) {
    setMessage(`${strokeNum + 1}かくめを ゆっくり なぞってね`, 'まだ かけるよ');
    return;
  }
  activeAttemptStroke = -1;
  activeAttemptCompletedBefore = strokesCompleted;
  activeAttemptPainted = false;
  activeAttemptHadMistake = false;
  activeAttemptMaxProgress = 0;
  activeAttemptStartProgress = null;
  activeAttemptLastProgress = 0;
  activeAttemptPreviousRawProgress = null;
  activeAttemptClosedStroke = false;
  const erased = clearStrokePixels(strokeNum);
  if (erased > 0) {
    renderPixelLetter();
  }
  stopTrail();
  trailDistance = 0;
  setMessage(`${strokeNum + 1}かくめを もういちど なぞってね`, 'ゆっくりね');
}

function onWriterComplete(summary) {
  const item = getCurrentCharacter();
  if (strokesCompleted < item.strokes) {
    const strokeNum = Math.min(strokesCompleted, item.strokes - 1);
    setMessage(`${strokeNum + 1}かくめ、さいごまで なぞってね`, 'あとすこし');
    return;
  }
  fillAllLetterPixels();
  strokesCompleted = item.strokes;
  currentStrokeIndex = item.strokes - 1;
  renderPixelLetter();
  renderCanvasStrokeNumbers();
  renderStrokeOrder();
  maybeFinishWritingAfterProgress(summary);
}

function calculateAccuracy(item) {
  const strokeScore = Math.min(1, strokesCompleted / Math.max(1, item.strokes));
  const trailScore = Math.max(Math.min(1, trailDistance / 900), getFilledLetterRatio());
  const mistakePenalty = Math.min(0.2, mistakeCount * 0.035);
  const score = 0.7 + strokeScore * 0.2 + trailScore * 0.08 - mistakePenalty;
  return Math.max(0.72, Math.min(0.98, Math.round(score * 100) / 100));
}

async function completeWriting(manual, summary) {
  if (isWritingModeRuntimeBlocked()) {
    completionQueued = false;
    return;
  }
  const item = getCurrentCharacter();
  if (complete || writingCompletionInFlight) return;
  const readiness = getWritingReadiness(item);
  if (!readiness.ready) {
    completionQueued = false;
    setMessage(readiness.message, readiness.subMessage);
    return;
  }
  complete = true;
  writingCompletionInFlight = true;
  const completionToken = writingCompletionToken;
  const completingMode = activeMode;
  const completingTaskToken = activeModeTaskId;
  playSfx('complete');
  completionQueued = false;
  stopTrail();
  if (writer && typeof writer.cancelQuiz === 'function') {
    try { writer.cancelQuiz(); } catch (_) {}
  }
  strokesCompleted = item.strokes;
  currentStrokeIndex = item.strokes - 1;
  fillAllLetterPixels();
  renderPixelLetter();
  renderCanvasStrokeNumbers();
  let durableClaimGranted = completingMode === WRITING_MODES.sequence;
  let claimCandidate = { eligible: completingMode === WRITING_MODES.sequence, receiptId: '' };
  if (completingMode !== WRITING_MODES.sequence) {
    claimCandidate = getActiveModeTaskClaimCandidate(item, completingTaskToken);
    durableClaimGranted = claimCandidate.eligible
      ? await claimModeTaskCompletion(claimCandidate.receiptId)
      : false;
  }
  const uiAttemptStillCurrent = completionToken === writingCompletionToken
    && !isWritingModeRuntimeBlocked()
    && activeMode === completingMode
    && activeModeTaskId === completingTaskToken;
  allowBlockedModeTaskSettlement = true;
  let modeCompletion;
  try {
    modeCompletion = completeActiveModeTask(item, completingTaskToken, completingMode);
  } finally {
    allowBlockedModeTaskSettlement = false;
  }
  const isNewCompletion = completingMode === WRITING_MODES.sequence
    || (claimCandidate.eligible
      && durableClaimGranted
      && modeCompletion.action.mode === completingMode);
  pendingNextWritingIndex = saveWritingCursor(item.id);
  const reward = isNewCompletion ? getCurrentWritingReward() : null;
  if (isNewCompletion) {
    stars += WRITING_STAR_REWARD;
    starCountEl.textContent = String(stars);
    const result = {
      characterId: item.id,
      char: item.char,
      group: item.group,
      success: true,
      accuracy: calculateAccuracy(item),
      strokesCompleted: Math.min(item.strokes, Math.max(strokesCompleted, summary && summary.totalStrokes || 0)),
      reward,
      mode: modeCompletion.action.mode
    };
    onWritingComplete(result, { silent: !uiAttemptStillCurrent });
  }
  writingCompletionInFlight = false;
  if (!uiAttemptStillCurrent) {
    if (activeMode === completingMode) {
      pendingNextAction = modeCompletion.action;
      complete = false;
      completionQueued = false;
      if (isWritingModeRuntimeBlocked()) writingNeedsResetAfterRuntimeBlock = true;
      else nextCharacter();
    }
    if (pendingModeChoiceOpen && !isWritingModeRuntimeBlocked()) {
      pendingModeChoiceOpen = false;
      openModeChoice();
    }
    return;
  }
  pendingNextAction = modeCompletion.action;
  renderStrokeOrder();
  updateCharacterButtons();
  writingBoard.classList.add('success');
  companionCard.classList.toggle('celebrate', isNewCompletion && careState.hatched === true);
  setMessage('すごい！ じょうずに かけたね！', 'やったね！');
  resultRewardWrap.hidden = !isNewCompletion;
  if (isNewCompletion) {
    if (typeof renderResultReward === 'function') {
      renderResultReward(reward);
    } else {
      resultReward.textContent = reward
        ? `${reward.name}と スター +${WRITING_STAR_REWARD}を ゲット！`
        : `スター +${WRITING_STAR_REWARD}を ゲット！`;
      setFoodIconClass(resultRewardIcon, reward);
    }
  }
  configureModeCompletion(pendingNextAction, item, reward, isNewCompletion);
  if (isNewCompletion) {
    launchBurst();
  }

  if (pendingNextAction.showOverlay) {
    const overlayToken = writingCompletionToken;
    pendingResultOverlayTimer = setTimeout(() => {
      pendingResultOverlayTimer = null;
      if (overlayToken !== writingCompletionToken || !complete || isWritingModeRuntimeBlocked()) {
        if (isWritingModeRuntimeBlocked()) writingNeedsResetAfterRuntimeBlock = true;
        return;
      }
      openResultOverlay();
    }, 520);
  } else {
    const advanceToken = writingCompletionToken;
    pendingModeAdvanceTimer = setTimeout(() => {
      pendingModeAdvanceTimer = null;
      if (advanceToken !== writingCompletionToken || !complete || isWritingModeRuntimeBlocked()) {
        if (isWritingModeRuntimeBlocked()) writingNeedsResetAfterRuntimeBlock = true;
        return;
      }
      nextCharacter();
    }, 900);
  }
  if (pendingModeChoiceOpen) {
    pendingModeChoiceOpen = false;
    openModeChoice();
  }
}

function onWritingComplete(result, options = {}) {
  console.log('writing complete', result);
  careState = loadCareState();
  const reward = Object.prototype.hasOwnProperty.call(result, 'reward') ? result.reward : getCurrentWritingReward();
  if (reward && careState.inventory[reward.id]) {
    changeInventory(reward.id, 1);
  }
  careState.stars = stars;
  careState.lastCareAt = Date.now();
  careState.speech = careState.hatched && reward ? `${reward.name} ほしいな〜` : 'タマゴを あたためよう！';
  try {
    localStorage.removeItem(PENDING_REWARD_KEY);
  } catch (error) {
    console.warn('Could not clear old pending writing reward:', error);
  }
  saveCareState();
  if (!options.silent) updateCompanionCard();
  // ─── ポノのおへや 実績アンロック (writing 系) ────────────────────────
  // 「はじめてのもじかき」「もじもじ がんばった」「ひらがなマスター」「カタカナマスター」
  try {
    if (typeof window.incrementStat === 'function') {
      window.incrementStat('writing_chars', 1);
      const group = (result && result.group) || (typeof getCurrentCharacter === 'function' ? (getCurrentCharacter() || {}).group : '');
      if (group === 'hiragana') {
        window.incrementStat('writing_hiragana', 1);
      } else if (group === 'katakana') {
        window.incrementStat('writing_katakana', 1);
      }
    }
  } catch (error) {
    console.warn('incrementStat failed for writing achievement:', error);
  }
  try {
    if (typeof window.incrementStat === 'function'
      && result && result.mode === WRITING_MODES.dailyThree
      && isDailyThreeStateComplete(dailyThreeState)) {
      const todayKey = getLocalDateKey();
      const statDateKey = 'mojikkoFarmDailyThreeStatDoneV1';
      let lastStatDate = '';
      try { lastStatDate = localStorage.getItem(statDateKey) || ''; } catch (error) { lastStatDate = ''; }
      if (lastStatDate !== todayKey) {
        window.incrementStat('writing_mori_daily_three', 1);
        if (window.PonoGameStickers) window.PonoGameStickers.grant({ gameId: 'writing-mori', event: 'clear' });
        try { localStorage.setItem(statDateKey, todayKey); } catch (error) { /* noop */ }
      }
    }
  } catch (error) {
    console.warn('incrementStat failed for writing_mori_daily_three:', error);
  }
  (function () {
    const k = 'pono_played_' + new Date().toDateString();
    const a = JSON.parse(localStorage.getItem(k) || '[]');
    if (a.indexOf('writing-mori') === -1) { a.push('writing-mori'); localStorage.setItem(k, JSON.stringify(a)); }
  })();
}

function launchBurst() {
  resultBurst.innerHTML = '';
  const colors = ['#ffe26a', '#f39a5d', '#86d7ac', '#79c3e7', '#fff8e8'];
  for (let i = 0; i < 34; i++) {
    const piece = document.createElement('div');
    piece.className = 'burst-piece';
    const angle = (Math.PI * 2 * i) / 34;
    const distancePx = 180 + Math.random() * 280;
    piece.style.setProperty('--tx', Math.cos(angle) * distancePx + 'px');
    piece.style.setProperty('--ty', Math.sin(angle) * distancePx + 'px');
    piece.style.setProperty('--c', colors[i % colors.length]);
    piece.style.animationDelay = (Math.random() * 0.12) + 's';
    resultBurst.appendChild(piece);
  }
  setTimeout(() => { resultBurst.innerHTML = ''; }, 1300);
}

function nextCharacter() {
  if (pendingNextAction && pendingNextAction.type === 'mode-task') {
    const modeTargetIndex = getWritingCharacterIndex(pendingNextAction.characterId);
    if (modeTargetIndex >= 0) {
      activeMode = pendingNextAction.mode;
      activeModeTaskId = pendingNextAction.activeModeTaskId || null;
      currentIndex = modeTargetIndex;
      syncCurrentGroupFromCharacter();
      resetWriting();
      return;
    }
  }
  if (pendingNextAction && pendingNextAction.type === 'mode-finished') {
    activeMode = WRITING_MODES.sequence;
    activeModeTaskId = null;
    writeWritingModePreference(activeMode);
    currentIndex = getInitialWritingIndex();
    syncCurrentGroupFromCharacter();
    resetWriting();
    return;
  }
  currentIndex = Number.isInteger(pendingNextWritingIndex)
    && writingCharacters[pendingNextWritingIndex]
    ? pendingNextWritingIndex
    : getInitialWritingIndex();
  syncCurrentGroupFromCharacter();
  resetWriting();
}

document.addEventListener('pointerdown', (event) => {
  const button = event.target.closest('button');
  if (!button || !stageEl.contains(button)) return;
  playSfx(button.classList.contains('char-button') || button.classList.contains('kana-tab') ? 'select' : 'button');
}, true);

setSettingsMenuOpen(false);

settingsBtn.addEventListener('click', (event) => {
  event.stopPropagation();
  const opening = !isSettingsMenuOpen();
  setSettingsMenuOpen(opening, {
    focusFirst: opening && event.detail === 0,
    restoreFocus: !opening
  });
});

settingsBtn.addEventListener('keydown', (event) => {
  if (event.key === 'Escape' && isSettingsMenuOpen()) {
    event.preventDefault();
    event.stopPropagation();
    closeSettingsMenu({ restoreFocus: true });
    return;
  }
  if (event.key === 'ArrowDown' || event.key === 'ArrowUp') {
    event.preventDefault();
    event.stopPropagation();
    if (!isSettingsMenuOpen()) setSettingsMenuOpen(true);
    const items = getSettingsMenuItems();
    focusElementWithoutScroll(event.key === 'ArrowUp' ? items[items.length - 1] : items[0]);
    return;
  }
  if (event.key === 'Enter' || event.key === ' ') event.stopPropagation();
});

settingsPopover.addEventListener('keydown', (event) => {
  event.stopPropagation();
  if (event.key === 'Escape') {
    event.preventDefault();
    closeSettingsMenu({ restoreFocus: true });
    return;
  }
  const items = getSettingsMenuItems();
  if (!items.length) return;
  const current = Math.max(0, items.indexOf(document.activeElement));
  let next = -1;
  if (event.key === 'ArrowDown') next = (current + 1) % items.length;
  else if (event.key === 'ArrowUp') next = (current - 1 + items.length) % items.length;
  else if (event.key === 'Home') next = 0;
  else if (event.key === 'End') next = items.length - 1;
  if (next >= 0) {
    event.preventDefault();
    focusElementWithoutScroll(items[next]);
  }
});

writingSettings.addEventListener('focusout', () => {
  setTimeout(() => {
    if (isSettingsMenuOpen() && !writingSettings.contains(document.activeElement)) {
      closeSettingsMenu({ restoreFocus: false });
    }
  }, 0);
});

document.addEventListener('pointerdown', (event) => {
  if (!isSettingsMenuOpen() || writingSettings.contains(event.target)) return;
  settingsOutsideClickUntil = Date.now() + 500;
  settingsOutsideClickTarget = event.target;
  event.preventDefault();
  event.stopImmediatePropagation();
  closeSettingsMenu({ restoreFocus: true });
}, true);

document.addEventListener('click', (event) => {
  if (event.detail === 0
    || Date.now() > settingsOutsideClickUntil
    || event.target !== settingsOutsideClickTarget) return;
  settingsOutsideClickTarget = null;
  event.preventDefault();
  event.stopImmediatePropagation();
}, true);

settingsBackBtn.addEventListener('click', (event) => {
  event.preventDefault();
  event.stopPropagation();
  closeSettingsMenu({ restoreFocus: false });
  clearPendingWritingCompletionTimers();
  saveCareState();
  window.location.href = '../play.html';
});

modeSwitchBtn.addEventListener('click', openModeChoice);
modeChoiceCloseBtn.addEventListener('click', closeModeChoice);
modeChoiceOverlay.addEventListener('pointerdown', (event) => {
  if (event.target === modeChoiceOverlay) closeModeChoice();
});
modeChoiceOverlay.querySelectorAll('[data-writing-mode]').forEach((button) => {
  button.addEventListener('click', () => {
    activateWritingMode(button.dataset.writingMode, { explicit: true });
  });
});
window.addEventListener('keydown', (event) => {
  if (event.key === 'Escape' && isSettingsMenuOpen()) {
    event.preventDefault();
    closeSettingsMenu({ restoreFocus: true });
    return;
  }
  if (isResultOverlayOpen()) {
    if (event.key === 'Tab') trapFocusWithin(event, resultOverlay);
    if (event.key === 'Escape') event.preventDefault();
    return;
  }
  if (event.key === 'Tab' && modeChoiceOverlay.classList.contains('show')) {
    trapFocusWithin(event, modeChoiceOverlay);
  }
  if (event.key === 'Escape' && modeChoiceOverlay.classList.contains('show')) {
    event.preventDefault();
    closeModeChoice();
  }
});

document.getElementById('resetBtn').addEventListener('click', resetWriting);
document.getElementById('doneBtn').addEventListener('click', () => completeWriting(true));
modalRetryBtn.addEventListener('click', nextCharacter);
document.getElementById('careBtn').addEventListener('click', navigateToCareScreen);
companionCard.addEventListener('click', navigateToCareScreen);

writingBoard.addEventListener('touchstart', guardWritingTouchStart, { capture: true, passive: false });
writingBoard.addEventListener('touchmove', guardWritingTouchMove, { capture: true, passive: false });
window.addEventListener('touchend', guardWritingTouchEnd, { capture: true, passive: false });
window.addEventListener('touchcancel', guardWritingTouchEnd, { capture: true, passive: false });
writingBoard.addEventListener('pointerdown', onTrailPointerDown, true);
writingBoard.addEventListener('pointermove', onTrailPointerMove, true);
window.addEventListener('pointerup', finishTrailAttempt, true);
window.addEventListener('pointercancel', finishTrailAttempt, true);
window.addEventListener('pagehide', clearPendingWritingCompletionTimers);

window.MojikkoWritingGame = {
  writingCharacters,
  selectCharacter,
  resetWriting,
  completeWriting: () => completeWriting(true),
  getCurrentCharacter,
  getCareState: () => JSON.parse(JSON.stringify(careState)),
  getMode: () => activeMode,
  getModeState: () => ({
    mode: activeMode,
    activeModeTaskId,
    initialized: writingModesInitialized,
    wordHole: wordHoleState ? JSON.parse(JSON.stringify(wordHoleState)) : null,
    dailyThree: dailyThreeState ? JSON.parse(JSON.stringify(dailyThreeState)) : null
  }),
  selectMode: (mode) => activateWritingMode(mode, { explicit: true })
};

starCountEl.textContent = String(stars);
const initialWritingProgress = loadWritingProgress();
initialWritingProgress.completedIds.forEach((id) => completedCharacters.add(id));
if (!initializeWritingModesIfAllowed()) {
  activeMode = WRITING_MODES.sequence;
  activeModeTaskId = null;
  currentIndex = getInitialWritingIndex(initialWritingProgress);
  syncCurrentGroupFromCharacter();
  resetWriting({ skipModeBoundary: true });
}
</script>
</body>
</html>
