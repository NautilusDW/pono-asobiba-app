<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>もじっこファーム | おもちゃひろば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="manifest" href="../manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@500;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #4f3825;
  --ink-soft: #7a5b41;
  --wood-dark: #6e4b2d;
  --wood-mid: #a66e3f;
  --paper: #fff8e8;
  --paper-deep: #f1ddb7;
  --mint: #7fcea5;
  --mint-dark: #3c986f;
  --coral: #ee7b6b;
  --gold: #f5bd4e;
  --blue: #70bde4;
  --shadow: rgba(70, 42, 18, 0.26);
  --pixel-font: 'DotGothic16', 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --round-font: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --title-plaque: url('../assets/images/mojikko/writing/wood_title_plaque.png');
  --star-counter: url('../assets/images/mojikko/writing/star_counter.png');
  --settings-button: url('../assets/images/mojikko/writing/settings_button.png');
  --button-success: url('../assets/images/mojikko/writing/button_success_normal.png');
  --button-success-pressed: url('../assets/images/mojikko/writing/button_success_pressed.png');
  --button-retry: url('../assets/images/mojikko/writing/button_retry_wide_normal.png');
  --button-retry-pressed: url('../assets/images/mojikko/writing/button_retry_wide_pressed.png');
  --button-next: url('../assets/images/mojikko/writing/button_next_normal.png');
  --button-next-pressed: url('../assets/images/mojikko/writing/button_next_pressed.png');
  --milmaru-baby: url('../assets/images/mojikko/care/milmaru_shell_baby_idle_pose.png');
  --milmaru-baby-happy: url('../assets/images/mojikko/care/milmaru_shell_baby_arms_up.png');
  --milmaru-yochi: url('../assets/images/mojikko/care/milmaru_yochiyochi_front_happy.png');
  --milmaru-yochi-catch: url('../assets/images/mojikko/care/milmaru_yochiyochi_arms_up.png');
  --milmaru-yochi-worried: url('../assets/images/mojikko/care/milmaru_yochiyochi_worried.png');
  --milmaru-crawl-1: url('../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_01.png');
  --milmaru-crawl-2: url('../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_02.png');
  --milmaru-crawl-3: url('../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_03.png');
  --milmaru-crawl-4: url('../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_04.png');
  --milmaru-crawl-5: url('../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_05.png');
  --milmaru-crawl-6: url('../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_06.png');
  --icon-star: url('../assets/images/mojikko/writing/icon_star.png');
  --fx-sparkle: url('../assets/images/mojikko/care/fx_sparkle_cluster.png');
  --rolling-bg: url('../assets/images/mojikko/play/rolling_ball_ground_background.png');
  --rolling-ball: url('../assets/images/mojikko/play/rolling_ball_orange_sprite_raw.png');
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  color: var(--ink);
  background: #20394b;
  font-family: var(--round-font);
  position: fixed;
  inset: 0;
}

button {
  font: inherit;
  color: inherit;
}

#stage-wrap {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: #20394b;
}

#stage {
  position: absolute;
  width: 1600px;
  height: 900px;
  transform-origin: 0 0;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.12) 0 1px, transparent 1px 8px),
    linear-gradient(90deg, rgba(255,255,255,0.10) 0 1px, transparent 1px 8px),
    var(--rolling-bg) center / cover no-repeat,
    linear-gradient(180deg, #a6dc7a, #bf8c52);
  image-rendering: pixelated;
}

.pixel-button {
  border: 0;
  cursor: pointer;
  image-rendering: pixelated;
  filter: drop-shadow(0 7px 0 rgba(61, 39, 24, 0.34));
}

.pixel-button:active {
  transform: translateY(4px);
  filter: drop-shadow(0 3px 0 rgba(61, 39, 24, 0.34));
}

.top-bar {
  position: absolute;
  left: 34px;
  right: 34px;
  top: 30px;
  height: 92px;
  display: grid;
  grid-template-columns: 220px 1fr 290px 78px;
  gap: 22px;
  align-items: center;
  z-index: 10;
}

.back-btn {
  width: 220px;
  height: 72px;
  border: 5px solid var(--wood-dark);
  border-radius: 8px;
  background: linear-gradient(#fff1c9, #f2be64);
  box-shadow: inset 0 0 0 6px rgba(255,255,255,0.28), 0 7px 0 #4b2f1e;
  font-family: var(--pixel-font);
  font-size: 30px;
  font-weight: 900;
}

.title-board {
  height: 90px;
  min-width: 640px;
  display: grid;
  place-items: center;
  background: var(--title-plaque) center / contain no-repeat;
  font-family: var(--pixel-font);
  font-size: 42px;
  font-weight: 900;
  letter-spacing: 0;
  text-shadow: 0 2px 0 rgba(255,255,255,0.35);
}

.resource-box,
.star-box {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  border: 5px solid var(--wood-dark);
  border-radius: 8px;
  background: linear-gradient(#fff9e8, #f2dcaa);
  box-shadow: inset 0 0 0 5px rgba(255,255,255,0.38), 0 6px 0 #4b2f1e;
  font-family: var(--pixel-font);
  font-size: 28px;
  font-weight: 900;
}

.star-box {
  width: 290px;
  background: var(--star-counter) center / contain no-repeat;
  border: 0;
  box-shadow: none;
  filter: drop-shadow(0 5px 0 rgba(61,39,24,0.3));
}

.star-icon {
  width: 42px;
  height: 42px;
  background: var(--icon-star) center / contain no-repeat;
}

.icon-btn {
  width: 74px;
  height: 74px;
  background: var(--settings-button) center / contain no-repeat;
  overflow: hidden;
  color: transparent;
  white-space: nowrap;
  text-indent: 120%;
}

.sub-sign {
  position: absolute;
  top: 120px;
  left: 50%;
  transform: translateX(-50%);
  width: 470px;
  height: 58px;
  display: grid;
  place-items: center;
  border: 5px solid #4f8f67;
  border-radius: 8px;
  background: linear-gradient(#8ad6a8, #56b87b);
  box-shadow: inset 0 0 0 5px rgba(255,255,255,0.22), 0 5px 0 #3b6849;
  color: #fff;
  font-family: var(--pixel-font);
  font-size: 27px;
  font-weight: 900;
  text-shadow: 0 2px 0 rgba(57,85,55,0.45);
  z-index: 9;
}

.panel {
  position: absolute;
  border: 5px solid var(--wood-dark);
  border-radius: 9px;
  background: linear-gradient(#fffaf0, #f5e5c2);
  box-shadow: inset 0 0 0 5px rgba(255,255,255,0.4), 0 8px 0 #4b2f1e, 0 16px 22px var(--shadow);
  overflow: hidden;
}

.panel-heading {
  min-height: 58px;
  display: grid;
  place-items: center;
  background: linear-gradient(#62c594, #45a773);
  color: #fff;
  border-bottom: 4px solid rgba(92, 61, 37, 0.3);
  font-family: var(--pixel-font);
  font-size: 31px;
  font-weight: 900;
  text-shadow: 0 2px 0 rgba(57,85,55,0.5);
}

.toy-panel {
  left: 42px;
  top: 168px;
  width: 280px;
  height: 538px;
}

.toy-grid {
  padding: 20px 18px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.toy-card {
  position: relative;
  height: 126px;
  border: 4px solid #a0704c;
  border-radius: 8px;
  background: linear-gradient(#fff8e8, #efd6a7);
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.38), 0 5px 0 #7b5736;
  display: grid;
  place-items: center;
  gap: 4px;
  font-family: var(--pixel-font);
  font-size: 22px;
  font-weight: 900;
  cursor: pointer;
}

.toy-card.selected {
  background: linear-gradient(#ffe69a, #f4b944);
  border-color: #c3742f;
}

.toy-card.locked {
  opacity: 0.56;
  filter: saturate(0.55);
}

.toy-icon {
  width: 54px;
  height: 54px;
  display: grid;
  place-items: center;
  border: 3px solid rgba(107,73,44,0.3);
  border-radius: 8px;
  background: rgba(255,255,255,0.38);
  font-size: 35px;
}

.how-panel {
  right: 42px;
  top: 168px;
  width: 306px;
  height: 538px;
}

.steps {
  padding: 18px 16px 12px;
  display: grid;
  gap: 13px;
}

.step-card {
  height: 82px;
  display: grid;
  grid-template-columns: 56px 1fr;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border: 4px solid #b48961;
  border-radius: 8px;
  background: rgba(255,252,241,0.75);
  box-shadow: inset 0 0 0 3px rgba(255,255,255,0.36), 0 4px 0 rgba(103,72,45,0.35);
  font-family: var(--pixel-font);
  font-size: 23px;
  font-weight: 900;
}

.step-num {
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  border: 4px solid #946747;
  border-radius: 50%;
  background: #fff2cc;
}

.reward-hint {
  margin: 8px 18px 0;
  padding: 16px 14px;
  border: 4px dashed #d5b27e;
  border-radius: 8px;
  background: rgba(255,250,235,0.72);
  font-family: var(--pixel-font);
  font-size: 22px;
  font-weight: 900;
  line-height: 1.45;
}

.playfield {
  position: absolute;
  left: 350px;
  top: 190px;
  width: 900px;
  height: 540px;
  border: 7px solid var(--wood-dark);
  border-radius: 10px;
  background: var(--rolling-bg) center / cover no-repeat;
  box-shadow: inset 0 0 0 7px rgba(255,255,255,0.38), 0 10px 0 #4b2f1e, 0 18px 28px var(--shadow);
  overflow: hidden;
}

.playfield::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.18;
  background:
    linear-gradient(180deg, #fff 0 1px, transparent 1px 8px),
    linear-gradient(90deg, #fff 0 1px, transparent 1px 8px);
  pointer-events: none;
}

.playfield[data-toy]:not([data-toy="ball"]) .field-stars,
.playfield[data-toy]:not([data-toy="ball"]) .launch-pad,
.playfield[data-toy]:not([data-toy="ball"]) .target-ring,
.playfield[data-toy]:not([data-toy="ball"]) .prediction-svg,
.playfield[data-toy]:not([data-toy="ball"]) .landing-preview,
.playfield[data-toy]:not([data-toy="ball"]) .aim-line {
  display: none !important;
}

.playfield[data-toy]:not([data-toy="ball"]) .toy-ball {
  display: none;
}

.playfield[data-toy="rattle"] .power-meter {
  display: none;
}

.playfield[data-toy="book"] .toy-ball {
  width: 110px;
  height: 82px;
}

.cloud {
  position: absolute;
  display: none;
  border-radius: 999px;
  background: rgba(255,255,255,0.88);
}

.cloud.one { width: 150px; height: 34px; left: 110px; top: 72px; }
.cloud.two { width: 205px; height: 42px; left: 568px; top: 92px; opacity: 0.74; }
.cloud::before,
.cloud::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  background: inherit;
}
.cloud::before { width: 70px; height: 70px; left: 28px; bottom: 6px; }
.cloud::after { width: 92px; height: 62px; left: 78px; bottom: 3px; }

.ground-stripe {
  position: absolute;
  display: none;
  left: 0;
  right: 0;
  bottom: 0;
  height: 108px;
  background:
    linear-gradient(90deg, rgba(86, 54, 31, 0.13) 0 22px, transparent 22px 46px),
    linear-gradient(#d8b46e, #a86d36);
  border-top: 6px solid rgba(101,67,39,0.45);
}

.lane {
  position: absolute;
  display: none;
  left: 80px;
  right: 80px;
  bottom: 100px;
  height: 20px;
  border: 4px solid rgba(120, 88, 52, 0.45);
  border-radius: 999px;
  background: repeating-linear-gradient(90deg, #fff7d5 0 25px, #ead09b 25px 42px);
}

.path-arc {
  position: absolute;
  display: none;
  left: 116px;
  top: 321px;
  width: 660px;
  height: 16px;
  border: 0;
  border-radius: 999px;
  background: repeating-linear-gradient(90deg, rgba(77, 175, 117, 0.78) 0 20px, transparent 20px 36px);
  opacity: 0.74;
  pointer-events: none;
  z-index: 2;
  transform: rotate(-2deg);
  transform-origin: left center;
}

.launch-pad {
  position: absolute;
  left: 46px;
  top: 196px;
  width: 156px;
  height: 72px;
  border: 5px solid #89603f;
  border-radius: 10px;
  background: rgba(255,248,225,0.75);
  box-shadow: inset 0 0 0 5px rgba(255,255,255,0.35), 0 6px 0 rgba(80,54,33,0.34);
  display: grid;
  place-items: center;
  font-family: var(--pixel-font);
  font-size: 19px;
  font-weight: 900;
  text-align: center;
  line-height: 1.25;
}

.target-ring {
  position: absolute;
  left: var(--target-x, 716px);
  top: var(--target-y, 332px);
  display: none;
  width: var(--target-w, 84px);
  height: var(--target-h, 84px);
  border: 6px dashed rgba(82, 184, 121, 0.92);
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transform: translate(-50%, -50%);
  animation: targetPulse 1.2s ease-in-out infinite;
  z-index: 4;
}

.target-ring::after {
  content: 'ねらい';
  position: absolute;
  left: -18px;
  top: -42px;
  padding: 4px 12px;
  border: 3px solid #8b6040;
  border-radius: 6px;
  background: #fff4cf;
  font-family: var(--pixel-font);
  font-size: 18px;
  font-weight: 900;
}

.target-ring.show {
  display: block;
}

@keyframes targetPulse {
  50% { transform: translate(-50%, -50%) scale(1.07); opacity: 0.72; }
}

.target-ring.tight {
  border-color: rgba(238, 123, 107, 0.92);
}

.target-ring.goal-hit {
  border-color: #58b97a;
  background: rgba(210, 255, 202, 0.38);
  animation: targetHit 760ms steps(2) both;
}

@keyframes targetHit {
  0% { transform: translate(-50%, -50%) scale(1); }
  45% { transform: translate(-50%, -50%) scale(1.18); filter: brightness(1.15); }
  100% { transform: translate(-50%, -50%) scale(1.03); }
}

.round-counter {
  position: absolute;
  left: 32px;
  top: 24px;
  min-width: 116px;
  height: 46px;
  display: grid;
  place-items: center;
  border: 4px solid #8b6040;
  border-radius: 8px;
  background: #fff4cf;
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.35), 0 4px 0 rgba(80,54,33,0.3);
  font-family: var(--pixel-font);
  font-size: 22px;
  font-weight: 900;
  z-index: 5;
}

.shot-pips {
  position: absolute;
  left: 168px;
  top: 25px;
  display: flex;
  gap: 11px;
  z-index: 5;
}

.shot-pip {
  width: 32px;
  height: 32px;
  border: 4px solid #8b6040;
  border-radius: 50%;
  background: #fff4cf;
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.35), 0 4px 0 rgba(80,54,33,0.28);
}

.shot-pip.used {
  background: #ead0a0;
}

.shot-pip.hit {
  background: #85dca7;
}

.field-stars {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}

.field-star {
  position: absolute;
  left: var(--star-x, 0px);
  top: var(--star-y, 0px);
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  color: #ffd558;
  font-family: var(--pixel-font);
  font-size: 34px;
  font-weight: 900;
  text-shadow:
    0 3px 0 #8e5b2e,
    3px 0 0 #fff4b8,
    -3px 0 0 #fff4b8,
    0 -3px 0 #fff4b8;
  transform: translate(-50%, -50%);
  filter: drop-shadow(0 5px 0 rgba(83, 54, 30, 0.22));
  animation: starBob 1.6s ease-in-out infinite;
}

.field-star::before {
  content: '★';
}

.field-star.collected {
  animation: starCollect 520ms steps(3) forwards;
}

.field-star.highlight {
  transform: translate(-50%, -50%) scale(1.22);
  filter: drop-shadow(0 0 10px rgba(255, 227, 98, 0.95));
}

@keyframes starBob {
  50% { transform: translate(-50%, calc(-50% - 6px)); }
}

@keyframes starCollect {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  100% { opacity: 0; transform: translate(-50%, -92%) scale(0.3) rotate(25deg); }
}

.power-meter {
  position: absolute;
  left: 284px;
  bottom: 28px;
  width: 332px;
  height: 68px;
  display: grid;
  grid-template-columns: 82px 1fr;
  align-items: center;
  gap: 8px;
  padding: 5px 9px;
  border: 4px solid #8b6040;
  border-radius: 8px;
  background: rgba(255,248,225,0.86);
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.32), 0 4px 0 rgba(80,54,33,0.28);
  font-family: var(--pixel-font);
  font-size: 20px;
  font-weight: 900;
  z-index: 5;
}

.power-meter.active {
  background: rgba(255,251,231,0.96);
  box-shadow:
    inset 0 0 0 4px rgba(255,255,255,0.42),
    0 4px 0 rgba(80,54,33,0.28),
    0 0 0 5px rgba(255, 218, 99, 0.35);
}

.power-track {
  position: relative;
  height: 31px;
  border: 3px solid #9b704b;
  border-radius: 999px;
  background:
    linear-gradient(90deg, #b7d9f3 0 34%, #86d7ac 34% 61%, #ffd56e 61% 78%, #ee7b6b 78% 100%);
  overflow: hidden;
}

.power-fill {
  display: block;
  width: var(--power, 0%);
  height: 100%;
  background: linear-gradient(90deg, #86d7ac, #f5bd4e, #ee7b6b);
  transition: width 90ms linear;
}

.timing-marker {
  position: absolute;
  display: none;
  left: var(--timing, 50%);
  top: -10px;
  width: 14px;
  height: 45px;
  border: 3px solid #6f462c;
  border-radius: 5px;
  background: #fffaf0;
  box-shadow: 0 4px 0 rgba(74,48,30,0.28);
  transform: translateX(-50%);
}

.power-meter.active .timing-marker {
  display: block;
}

.milmaru-speech {
  position: absolute;
  left: var(--speech-x, 708px);
  top: var(--speech-y, 154px);
  min-width: 118px;
  max-width: 210px;
  padding: 10px 14px;
  border: 4px solid #845b3d;
  border-radius: 12px;
  background: #fffaf0;
  box-shadow: 0 6px 0 rgba(84,54,32,0.3);
  font-family: var(--pixel-font);
  font-size: 20px;
  font-weight: 900;
  text-align: center;
  z-index: 9;
  transform: translate(-50%, -100%);
  transition: opacity 140ms ease;
}

.milmaru-speech.hide {
  opacity: 0;
}

.milmaru-speech::after {
  content: '';
  position: absolute;
  left: calc(50% - 13px);
  bottom: -19px;
  width: 28px;
  height: 28px;
  border-right: 4px solid #845b3d;
  border-bottom: 4px solid #845b3d;
  background: #fffaf0;
  transform: rotate(45deg);
}

.milmaru {
  position: absolute;
  left: var(--milmaru-x, 652px);
  top: var(--milmaru-y, 232px);
  width: 92px;
  height: 92px;
  background: var(--milmaru-yochi) center bottom / contain no-repeat;
  image-rendering: pixelated;
  filter: drop-shadow(0 8px 0 rgba(92,60,35,0.18));
  z-index: 3;
  transform: scaleX(var(--milmaru-dir, 1));
  transition:
    left var(--milmaru-move-duration, 900ms) linear,
    top var(--milmaru-move-duration, 900ms) linear;
}

.milmaru.baby {
  width: 94px;
  height: 94px;
  background-image: var(--milmaru-baby);
}

.milmaru.catch {
  animation: milmaruCatch 900ms ease both;
  background-image: var(--milmaru-yochi-catch);
}

.milmaru.baby.catch {
  background-image: var(--milmaru-baby-happy);
}

.milmaru.worried {
  background-image: var(--milmaru-yochi-worried);
}

@keyframes milmaruCatch {
  0%, 100% { transform: translateY(0) scale(1); }
  35% { transform: translateY(-18px) scale(1.05); }
}

.milmaru.crawling {
  animation: crawlFrames 2.15s steps(1, end) infinite;
}

@keyframes crawlFrames {

function fitStage() {
  const scale = Math.min(window.innerWidth / 1600, window.innerHeight / 900);
  const ox = (window.innerWidth - 1600 * scale) / 2;
  const oy = (window.innerHeight - 900 * scale) / 2;
  stageEl.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
}

window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));
fitStage();

function cloneDefaultState() {
  return JSON.parse(JSON.stringify(defaultState));
}

function sanitizeMilmaruName(value) {
  const text = String(value || '').trim().replace(/\s+/g, '');
  return text ? text.slice(0, 8) : 'ミルマル';
}

function loadState() {
  try {
    const saved = localStorage.getItem(CARE_STATE_KEY);
    if (!saved) return cloneDefaultState();
    const parsed = JSON.parse(saved);
    const merged = cloneDefaultState();
    merged.name = sanitizeMilmaruName(parsed.name || merged.name);
    merged.named = parsed.named === true;
    merged.nakayoshi = Number.isFinite(parsed.nakayoshi) ? parsed.nakayoshi : merged.nakayoshi;
    merged.gokigen = Number.isFinite(parsed.gokigen) ? parsed.gokigen : merged.gokigen;
    merged.sukusuku = Number.isFinite(parsed.sukusuku) ? parsed.sukusuku : merged.sukusuku;
    merged.eggWarmth = Number.isFinite(parsed.eggWarmth) ? parsed.eggWarmth : merged.eggWarmth;
    merged.hatched = parsed.hatched === true;
    merged.stars = Number.isFinite(parsed.stars) ? parsed.stars : merged.stars;
    if (!merged.hatched && merged.eggWarmth === 0 && merged.stars >= 1000) {
      merged.stars = 0;
    }
    merged.speech = parsed.speech || merged.speech;
    merged.reaction = parsed.reaction || merged.reaction;
    merged.lastStageId = parsed.lastStageId || merged.lastStageId;
    merged.lastCareAt = Number.isFinite(parsed.lastCareAt) ? parsed.lastCareAt : Date.now();
    merged.lastMoodAt = Number.isFinite(parsed.lastMoodAt) ? parsed.lastMoodAt : merged.lastCareAt;
    if (parsed.inventory) {
      Object.keys(merged.inventory).forEach((id) => {
        if (parsed.inventory[id]) merged.inventory[id].count = Math.max(0, Number(parsed.inventory[id].count) || 0);
      });
    }
    return merged;
  } catch (error) {
    console.warn('Could not load care state:', error);
    return cloneDefaultState();
  }
}

function saveState() {
  try {
    localStorage.setItem(CARE_STATE_KEY, JSON.stringify(state));

    console.warn('Could not save care state:', error);

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function getInventoryCount(id) {
  return Math.max(0, Number(state.inventory[id]?.count) || 0);
}

function changeInventory(id, delta) {
  if (!state.inventory[id]) return 0;
  state.inventory[id].count = clamp(getInventoryCount(id) + delta, 0, 99);
  return state.inventory[id].count;
}

function hasStars(cost = 1) {
  return (Number(state.stars) || 0) >= cost;
}

function getCareStageId() {
  if (!state.hatched) return 'egg';
  if (state.sukusuku < 25) return 'baby';
  if (state.sukusuku < 50) return 'yochiyochi';
  if (state.sukusuku < 80) return 'kids';
  return 'pre_evolution';
}

function getBabySpeech(text) {
  const raw = String(text || '');
  if (/キャッチ|やった|たのし|あそ/.test(raw)) return 'きゃっきゃ！';
  if (/たりない|ない/.test(raw)) return 'ふぇ...？';
  return 'みゅっ♪';
}

function getYochiyochiSpeech(text) {
  const raw = String(text || '');
  if (/キャッチ|やった|たのし|あそ/.test(raw)) return 'あしょぼ！';
  if (/たりない|ない/.test(raw)) return 'なぁい...？';
  return 'みゅっ♪';
}

function getStageSpeech(text) {
  const stage = getCareStageId();
  if (stage === 'baby') return getBabySpeech(text);
  if (stage === 'yochiyochi') return getYochiyochiSpeech(text);
  return text;
}

function getAudioContext() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return null;
  if (!audioCtx) audioCtx = new AudioContextClass();
  if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  return audioCtx;
}

function playTone(frequency, duration = 0.06, type = 'square', volume = 0.035, delay = 0) {
  const ctx = getAudioContext();
  if (!ctx) return;
  const start = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(volume, start + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.03);
}

function playSfx(kind) {
  try {
    if (kind === 'roll') {
      [430, 470, 520].forEach((freq, i) => playTone(freq, 0.045, 'triangle', 0.024, i * 0.055));
      return;
    }
    if (kind === 'success') {
      [620, 780, 980].forEach((freq, i) => playTone(freq, 0.07, 'square', 0.03, i * 0.06));
      return;
    }
    if (kind === 'mistake') {
      playTone(220, 0.075, 'triangle', 0.024);
      return;
    }
    playTone(560, 0.045, 'square', 0.026);
  } catch (_) {}
}

function setMilmaruPosition(point, options = {}) {
  const x = clamp(point.x, MILMARU_FIELD.minX, MILMARU_FIELD.maxX);

  if (Number.isFinite(options.duration)) {
    milmaru.style.setProperty('--milmaru-move-duration', `${Math.max(80, options.duration)}ms`);
  }
  if (x !== milmaruPosition.x) {
    milmaru.style.setProperty('--milmaru-dir', x < milmaruPosition.x ? '-1' : '1');
  }
  milmaruPosition = { x, y };
  milmaru.style.setProperty('--milmaru-x', `${x}px`);
  milmaru.style.setProperty('--milmaru-y', `${y}px`);
  if (options.updateSpeech !== false) {
    positionSpeechToMilmaru();
  }
}

    if (star.collected) el.classList.add('collected');
    fieldStarsEl.appendChild(el);
  });
}

function resetFieldStars() {
  fieldStars = STAR_POINTS.map((star) => ({ ...star, collected: false }));

}

function getRemainingStars() {
  return fieldStars.filter((star) => !star.collected);
}

function getPlayfieldPoint(event) {
  const rect = playfield.getBoundingClientRect();
  const scale = rect.width / 900;
  return {
    x: clamp((event.clientX - rect.left) / scale, 28, 872),
    y: clamp((event.clientY - rect.top) / scale, 48, 496)
  };
}

function getAimDirection(point) {
  const dx = point.x - LAUNCH_CENTER.x;
  const dy = point.y - LAUNCH_CENTER.y;
  const distance = Math.hypot(dx, dy);
  if (distance < 18) return null;
  return {
    x: dx / distance,
    y: dy / distance,
    angle: Math.atan2(dy, dx)
  };
}

function getDirectionalEnd(direction, rollDistance) {
  return {
    x: clamp(LAUNCH_CENTER.x + direction.x * rollDistance, 36, 850),
    y: clamp(LAUNCH_CENTER.y + direction.y * rollDistance, 64, 470)
  };
}

function buildAimPlan(point) {
  const direction = getAimDirection(point);
  if (!direction) return null;
  const end = getDirectionalEnd(direction, MAX_ROLL);
  return {
    end,
    direction,
    power: 0,
    routeHits: [],
    angle: direction.angle,
    aimingOnly: true
  };
}

function buildPowerPlan(power = powerValue) {
  const direction = lockedAim?.direction || { x: 1, y: 0, angle: 0 };
  const rollDistance = MIN_ROLL + clamp(power, 0, 1) * (MAX_ROLL - MIN_ROLL);
  const end = {
    x: clamp(LAUNCH_CENTER.x + direction.x * rollDistance, 36, 850),
    y: clamp(LAUNCH_CENTER.y + direction.y * rollDistance, 64, 470)
  };
  const routeHits = getStarsOnRoute(getMilmaruCenter(), end);
  return {
    end,
    direction,
    power,
    routeHits,
    angle: direction.angle,
    aimingOnly: false
  };
}

function getSegmentProgress(point, start, end) {
  const dx = end.x - start.x;
  const dy = end.y - start.y;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return 0;
  return clamp(((point.x - start.x) * dx + (point.y - start.y) * dy) / len2, 0, 1);
}

function distanceToSegment(point, start, end) {
  const dx = end.x - start.x;
  const dy = end.y - start.y;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(point.x - start.x, point.y - start.y);
  const t = clamp(((point.x - start.x) * dx + (point.y - start.y) * dy) / len2, 0, 1);
  const px = start.x + dx * t;
  const py = start.y + dy * t;
  return Math.hypot(point.x - px, point.y - py);
}

function getStarsOnRoute(start, end) {
  return fieldStars
    .map((star, index) => ({ star, index, routeT: getSegmentProgress(star, start, end) }))
    .filter(({ star }) => !star.collected)
    .filter(({ star }) =>
      distanceToSegment(star, start, end) <= STAR_ROUTE_RADIUS ||
      Math.hypot(star.x - end.x, star.y - end.y) <= STAR_COLLECT_RADIUS
    )
    .sort((a, b) => a.routeT - b.routeT);
}

function hidePrediction() {
  predictionSvg.classList.remove('show', 'safe');

function showAim(plan) {
  currentAim = plan;
  const safe = plan.routeHits.length > 0;
  predictionSvg.classList.toggle('safe', safe);
  predictionSvg.classList.add('show');
  predictionPath.setAttribute('d', `M ${LAUNCH_CENTER.x} ${LAUNCH_CENTER.y} L ${plan.end.x} ${plan.end.y}`);
  aimLine.classList.remove('show');
  powerFill.style.setProperty('--power', `${Math.round(plan.power * 100)}%`);
  timingMarker.style.setProperty('--timing', `${Math.round(plan.power * 100)}%`);
  setLandingPreview(
    plan.end,
    plan.aimingOnly ? 'むき' : (safe ? '星へ' : 'ここ'),
    !plan.aimingOnly && safe ? 'safe' : ''
  );
  targetRing.style.setProperty('--target-x', `${plan.end.x}px`);
  targetRing.style.setProperty('--target-y', `${plan.end.y}px`);
  targetRing.classList.add('show');
  document.querySelectorAll('.field-star.highlight').forEach((el) => el.classList.remove('highlight'));
  plan.routeHits.forEach(({ index }) => {
    fieldStarsEl.querySelector(`[data-star-index="${index}"]`)?.classList.add('highlight');
  });
}

function stopPowerMeter() {
  cancelAnimationFrame(powerFrame);
  powerFrame = null;
  lastPowerFrameAt = 0;
  powerMeter?.classList.remove('active');
}

function startPowerMeter() {
  stopPowerMeter();
  controlPhase = 'power';
  powerValue = 0.42;
  powerDirection = 1;
  powerMeter.classList.add('active');
  mainPlayBtn.textContent = 'ここで おす！';
  guideText.textContent = 'ちからを きめよう';
  messageBar.textContent = 'ゲージを見て、ちょうどいいところで おしてね。';
  playSfx('button');

  const tick = (now) => {
    if (controlPhase !== 'power') {
      stopPowerMeter();
      return;
    }
    if (!lastPowerFrameAt) lastPowerFrameAt = now;
    const delta = Math.min(0.05, (now - lastPowerFrameAt) / 1000);
    lastPowerFrameAt = now;
    powerValue += powerDirection * delta * 0.78;
    if (powerValue >= 1) {
      powerValue = 1;
      powerDirection = -1;
    } else if (powerValue <= 0) {
      powerValue = 0;
      powerDirection = 1;
    }
    showAim(buildPowerPlan(powerValue));
    powerFrame = requestAnimationFrame(tick);
  };
  showAim(buildPowerPlan(powerValue));
  powerFrame = requestAnimationFrame(tick);
}

function confirmPower() {
  if (controlPhase !== 'power' || playedThisRound || gameComplete) return;
  const plan = buildPowerPlan(powerValue);
  stopPowerMeter();
  controlPhase = 'rolling';
  launchBall(plan);
}

    if (isMilmaruBusy || isAiming || controlPhase !== 'aim' || playedThisRound || gameComplete) {
      startMilmaruRoam();
      return;
    }
    const next = {
      x: MILMARU_FIELD.minX + Math.random() * (MILMARU_FIELD.maxX - MILMARU_FIELD.minX),
      y: MILMARU_FIELD.minY + Math.random() * (MILMARU_FIELD.maxY - MILMARU_FIELD.minY)
    };
    moveMilmaruTo(next, {
      speed: 20 + Math.random() * 16,
      maxDuration: 8200,
      after: startMilmaruRoam
    });
  }, delay);
}

function stopMilmaruRoam() {

  roamTimer = null;
}

function moveMilmaruTo(point, options = {}) {
  const target = {
    x: clamp(point.x - MILMARU_SIZE / 2, MILMARU_FIELD.minX, MILMARU_FIELD.maxX),
    y: clamp(point.y - MILMARU_SIZE / 2, MILMARU_FIELD.minY, MILMARU_FIELD.maxY)
  };
  const distance = Math.hypot(target.x - milmaruPosition.x, target.y - milmaruPosition.y);
  const duration = clamp((distance / (options.speed || 34)) * 1000, 1200, options.maxDuration || 7000);
  milmaru.classList.add('crawling');
  milmaruSpeech.classList.add('hide');
  setMilmaruPosition(target, { duration, updateSpeech: false });
  setTimeout(() => {
    milmaru.classList.remove('crawling');
    positionSpeechToMilmaru();
    milmaruSpeech.classList.remove('hide');
    options.after?.();
  }, duration + 80);
  return duration;
}

function getMiniResultText(result, index) {
  if (result === 'hit') return '○';
  if (result === 'miss') return '×';
  return index === currentRound - 1 ? getToyConfig().icon : '';
}

function renderMiniRoundMarks() {
  return Array.from({ length: TOTAL_ROUNDS }, (_, index) => {
    const result = shotResults[index];
    const className = [
      'rattle-note',
      result === 'hit' ? 'hit' : '',
      result === 'miss' ? 'miss' : '',
      !result && index === currentRound - 1 ? 'active' : ''
    ].filter(Boolean).join(' ');
    return `<span class="${className}">${getMiniResultText(result, index)}</span>`;
  }).join('');
}

function getStackShapeForRound(round) {
  if (round <= 2) return MINI_STACK.shapes[0];
  if (round <= 4) return MINI_STACK.shapes[(round - 1) % 2];
  return MINI_STACK.shapes[2];
}

function getStackHeight() {
  return stackBlocks.reduce((sum, block) => sum + block.h - 3, 0);
}

function getStackTarget() {
  if (!stackBlocks.length) {
    return {
      left: MINI_STACK.baseLeft,
      width: MINI_STACK.baseW,
      bottom: MINI_STACK.baseBottom,
      height: 0
    };
  }
  const top = stackBlocks[stackBlocks.length - 1];
  return {
    left: top.x,
    width: top.w,
    bottom: MINI_STACK.baseBottom + getStackHeight(),
    height: top.h
  };
}

function isStackDropSuccess() {
  if (getToyConfig().mode !== 'stack') return false;
  const target = getStackTarget();
  const shape = currentStackShape || MINI_STACK.shapes[0];
  const blockLeft = stackSwingX;
  const blockRight = stackSwingX + shape.w;
  const targetLeft = target.left - MINI_STACK.bonus;
  const targetRight = target.left + target.width + MINI_STACK.bonus;
  return blockRight > targetLeft && blockLeft < targetRight;
}

function getStackDropTop(shape, success) {
  const target = getStackTarget();
  const landingBottom = success ? target.bottom : MINI_STACK.baseBottom - 8;
  return clamp(MINI_STACK.stageH - landingBottom - shape.h, 52, MINI_STACK.stageH - shape.h - 6);
}

function renderToyBoard(feedback = lastToyFeedback) {
  if (!toyModeBoard) return;
  if (isBallGame()) {
    toyModeBoard.innerHTML = '';
    return;
  }
  const config = getToyConfig();
  const cardState = feedback === 'hit' ? ' is-hit' : feedback === 'miss' ? ' is-miss' : '';
  const roundText = `${Math.min(currentRound, TOTAL_ROUNDS)} / ${TOTAL_ROUNDS}`;
  const percent = Math.round(powerValue * 100);
  const isGood = powerValue >= config.goodMin && powerValue <= config.goodMax;

  if (config.mode === 'rhythm') {
    const isCountingDown = controlPhase === 'countdown' && rattleCountdownValue;
    const hitReady = Math.abs(rhythmProgress - (config.beatHitAt || 0.68)) <= (config.beatWindow || 0.18);
    const pulseScale = isCountingDown ? '1.68' : (2.2 - Math.min(rhythmProgress, 1) * 1.55).toFixed(2);
    const pulseOpacity = isCountingDown ? '0.30' : (0.14 + Math.max(0, 1 - Math.abs(rhythmProgress - (config.beatHitAt || 0.68)) * 2.6) * 0.46).toFixed(2);
    const tilt = isCountingDown ? 0 : Math.sin(rhythmProgress * Math.PI * 4) * 8;
    const spread = isCountingDown ? 112 : Math.round(94 + Math.abs(Math.sin(rhythmProgress * Math.PI * 2)) * 52);
    toyModeBoard.innerHTML = `
      <div class="toy-mode-card rattle-game${cardState}" style="--pulse-scale:${pulseScale}; --pulse-opacity:${pulseOpacity}; --rattle-tilt:${tilt.toFixed(1)}deg; --bead-spread:${spread}px;">
        <div class="toy-mode-title">タン！で ふろう</div>
        <div class="toy-round-label">${roundText}</div>
        <div class="rhythm-pulse ${hitReady ? 'active' : ''} ${isCountingDown ? 'wait' : ''}"></div>
        ${isCountingDown ? `<div class="rattle-countdown">${rattleCountdownValue}</div>` : `<div class="rattle-now ${hitReady ? 'active' : ''}">${hitReady ? 'いま！' : 'まって'}</div>`}
        <div class="rattle-bead left"></div>
        <div class="rattle-bead right"></div>
        <div class="rattle-stick"></div>
        <div class="rattle-face"></div>
        <div class="rattle-target">${renderMiniRoundMarks()}</div>
        <div class="rattle-tap-cue ${hitReady ? 'active' : ''}">ここで タップ</div>
        <div class="toy-mode-help">円が かさなったら</div>
      </div>
    `;
    return;
  }

  if (config.mode === 'stack') {
    const target = getStackTarget();
    let bottom = MINI_STACK.baseBottom;
    const placedBlocks = stackBlocks.map((block, index) => {
      const html = `<div class="stack-block hit" style="--block-x:${block.x}px; --block-w:${block.w}px; --block-h:${block.h}px; --block-bottom:${bottom}px; border-radius:${block.r}px;">${index + 1}</div>`;
      bottom += block.h - 3;
      return html;
    }).join('');
    const shape = currentStackShape || MINI_STACK.shapes[0];
    const ghostLeft = Math.round(stackSwingX);
    const successNow = isStackDropSuccess();
    const ghost = currentRound <= TOTAL_ROUNDS && !playedThisRound && !stackDroppingBlock
      ? `<div class="stack-block ghost ${successNow ? 'good' : ''}" style="--block-x:${ghostLeft}px; --block-w:${shape.w}px; --block-h:${shape.h}px; border-radius:${shape.r}px;">${currentRound}</div>`
      : '';
    const dropping = stackDroppingBlock
      ? `<div class="stack-block falling ${stackDroppingBlock.success ? 'hit' : 'miss'}" style="--block-x:${stackDroppingBlock.x}px; --block-w:${stackDroppingBlock.w}px; --block-h:${stackDroppingBlock.h}px; --drop-to:${stackDroppingBlock.dropTo}px; border-radius:${stackDroppingBlock.r}px;">${stackDroppingBlock.round}</div>`
      : '';
    toyModeBoard.innerHTML = `
      <div class="toy-mode-card block-game${cardState}">
        <div class="toy-mode-title">ゆれる つみきを おとそう</div>
        <div class="toy-round-label">${roundText}</div>
        <div class="block-stack">
          <div class="stack-swing-rail"></div>
          <div class="stack-target-window" style="--target-left:${target.left}px; --target-width:${target.width}px; --target-bottom:${target.bottom + target.height + 4}px;"></div>
          <div class="block-base-line"></div>
          ${placedBlocks}
          ${ghost}
          ${dropping}
        </div>
        <div class="toy-mode-help">タップで おとす</div>
      </div>
    `;
    return;
  }

  const pages = ['あ', 'い', 'う', 'え', 'お'];
  const page = pages[Math.min(currentRound - 1, pages.length - 1)];
  const nextPage = pages[Math.min(currentRound, pages.length - 1)] || '☆';
  const cornerState = feedback === 'hit' ? ' hit' : feedback === 'miss' ? ' miss' : ' active';
  toyModeBoard.innerHTML = `
    <div class="toy-mode-card book-game${cardState}">
      <div class="toy-mode-title">ページを めくろう</div>
      <div class="toy-round-label">${roundText}</div>
      <div class="book-pages">
        <div class="book-page done">${page}</div>
        <div class="book-page">${nextPage}</div>
        <div class="book-corner${cornerState}">↗</div>
      </div>
      <div class="toy-mode-help">ひかるときに タップ</div>
    </div>
  `;
}

function startToyMeter() {
  if (isBallGame() || gameComplete) return;
  stopPowerMeter();
  const config = getToyConfig();
  controlPhase = 'toy';
  rhythmProgress = 0;
  miniRoundStartedAt = performance.now();
  if (config.mode === 'rhythm') {
    if (!rattleCountdownDone && currentRound === 1) {
      startRattleCountdown();
      return;
    }
    startRhythmRound();
    return;
  }
  if (config.mode === 'stack') {
    startStackRound();
    return;
  }
  powerValue = 0.14;
  powerDirection = 1;
  lastPowerFrameAt = 0;
  lastToyFeedback = '';

  messageBar.textContent = config.rewardHint.replace(/<br>/g, '。');
  renderToyBoard();

  const tick = (now) => {
    if (controlPhase !== 'toy' || isBallGame() || gameComplete || playedThisRound) {
      stopPowerMeter();
      return;
    }
    if (!lastPowerFrameAt) lastPowerFrameAt = now;
    const delta = Math.min(0.05, (now - lastPowerFrameAt) / 1000);
    lastPowerFrameAt = now;
    powerValue += powerDirection * delta * (config.meterSpeed || 0.5);
    if (powerValue >= 1) {
      powerValue = 1;
      powerDirection = -1;
    } else if (powerValue <= 0) {
      powerValue = 0;
      powerDirection = 1;
    }
    powerFill.style.setProperty('--power', `${Math.round(powerValue * 100)}%`);
    timingMarker.style.setProperty('--timing', `${Math.round(powerValue * 100)}%`);
    renderToyBoard();
    powerFrame = requestAnimationFrame(tick);
  };
  powerFrame = requestAnimationFrame(tick);
}

    confirmPower();
    return;
  }
  if (playedThisRound || gameComplete || controlPhase !== 'aim') return;
  if (!state.hatched) {
    showNeedCareMessage('まだ タマゴだよ', 'おせわ画面で タマゴを あたためてあげよう。');
    return;
  }
  event?.preventDefault?.();
  isAiming = true;
  currentAim = null;
  stopMilmaruRoam();
  milmaruSpeech.classList.add('hide');
  ball.classList.add('dragging');
  playfield.setPointerCapture?.(event.pointerId);
  updateAim(event);
  guideText.textContent = 'むきを きめよう';
  messageBar.textContent = 'まだ強さは決まらないよ。はなしたあとに ちからをきめよう。';
}

function updateAim(event) {
  if (!isAiming || playedThisRound || gameComplete) return;
  const plan = buildAimPlan(getPlayfieldPoint(event));
  if (plan) showAim(plan);
}

function finishAim(event) {
  if (!isAiming) return;
  event?.preventDefault?.();
  if (event?.pointerId != null) {
    try { playfield.releasePointerCapture?.(event.pointerId); } catch (_) {}
  }
  isAiming = false;
  ball.classList.remove('dragging');
  if (!currentAim) {
    hidePrediction();
    resetPowerMeter();
    milmaruSpeech.classList.remove('hide');
    messageBar.textContent = '少しはなれたところへ ひっぱって、むきをきめよう。';
    startMilmaruRoam();
    return;
  }
  lockedAim = currentAim;
  startPowerMeter();
}

function launchBall(plan) {
  controlPhase = 'rolling';
  playedThisRound = true;
  isMilmaruBusy = true;
  stopMilmaruRoam();
  playSfx('roll');
  ball.classList.add('rolling');
  guideText.textContent = `${getToyConfig().label}が ${getToyConfig().movingText}`;
  messageBar.textContent = 'ミルマルが とりにいくよ。';
  const start = { ...LAUNCH_CENTER };
  const end = plan.end;
  const travel = Math.hypot(end.x - start.x, end.y - start.y);
  const started = performance.now();
  const duration = clamp(620 + travel * 1.15, 820, 1500);

  const tick = (now) => {
    const t = clamp((now - started) / duration, 0, 1);
    const ease = 1 - Math.pow(1 - t, 2.2);
    const x = start.x + (end.x - start.x) * ease;
    const y = start.y + (end.y - start.y) * ease;
    setBallCenter(x, y);
    const rotation = (travel * ease / BALL_RADIUS) * (180 / Math.PI);
    ball.style.setProperty('--ball-rotation', `${rotation.toFixed(1)}deg`);
    if (t < 1) {
      animationFrame = requestAnimationFrame(tick);
      return;
    }
    resolveShot(plan);
  };
  animationFrame = requestAnimationFrame(tick);
}

function collectStarHit({ index, star }) {
  if (fieldStars[index]?.collected) return false;
  fieldStars[index].collected = true;
  const el = fieldStarsEl.querySelector(`[data-star-index="${index}"]`);
  el?.classList.add('collected');
  spawnSparkles(star);
  playSfx('success');
  return true;
}

function collectStarsSequential(hits, interval = 220) {
  hits.forEach((hit, order) => {
    setTimeout(() => collectStarHit(hit), order * interval);
  });
  return Math.max(0, (hits.length - 1) * interval);
}

function resolveShot(plan) {
  ball.classList.remove('rolling');
  setBallCenter(plan.end.x, plan.end.y);
  hidePrediction();
  const hits = getStarsOnRoute(getMilmaruCenter(), plan.end);
  const collectedCount = hits.length;
  const duration = moveMilmaruTo(plan.end, {
    speed: 32,
    maxDuration: 7000,
    after: () => {
      if (collectedCount > 0) {
        const collectDuration = collectStarsSequential(hits);
        catches += collectedCount;
        shotResults.push('hit');
        milmaru.classList.add('catch');
        milmaruSpeech.textContent = getStageSpeech('きゃっきゃ！');
        guideText.textContent = `${collectedCount}こ ゲット！`;
        messageBar.textContent = '通り道の星をひろえたよ。';
        showGoalBurst(hits[hits.length - 1]?.star || plan.end, `★ ${collectedCount}`, true);
        setTimeout(() => milmaru.classList.remove('catch'), 700);
        setTimeout(() => {
          currentRound += 1;
          advanceAfterShot();
        }, collectDuration + 360);
        return;
      } else {
        shotResults.push('miss');
        playSfx('mistake');
        milmaru.classList.add('worried');
        milmaruSpeech.textContent = getStageSpeech('なぁい...？');
        guideText.textContent = '星のそばをねらおう';
        messageBar.textContent = 'ミルマルの通り道に星がくるようにしてみよう。';
        showGoalBurst(plan.end, 'おしい', false);
        setTimeout(() => milmaru.classList.remove('worried'), 700);
      }
      currentRound += 1;
      advanceAfterShot();
    }
  });
}

function advanceAfterShot() {
  if (currentRound > TOTAL_ROUNDS || getRemainingStars().length === 0) {
    completeGame();
    return;
  }
  playedThisRound = false;
  isMilmaruBusy = false;
  setBallCenter(LAUNCH_CENTER.x, LAUNCH_CENTER.y);
  ball.style.setProperty('--ball-rotation', '0deg');
  resetRound({ keepModal: true });
}

function isToyMiniSuccess() {
  const config = getToyConfig();
  if (config.mode === 'rhythm') {
    return Math.abs(rhythmProgress - (config.beatHitAt || 0.68)) <= (config.beatWindow || 0.18);
  }
  if (config.mode === 'stack') {
    return isStackDropSuccess();
  }
  return powerValue >= config.goodMin && powerValue <= config.goodMax;
}

function handleToyAction() {
  if (isBallGame()) return;
  if (gameComplete) {
    goCare('success');
    return;
  }
  if (!state.hatched) {
    showNeedCareMessage('まだ タマゴだよ', 'おせわ画面で タマゴを あたためてあげよう。');
    return;
  }
  if (playedThisRound || controlPhase !== 'toy') return;

  const success = isToyMiniSuccess();
  resolveToyRound(success);
}

function resolveToyRound(success) {
  if (playedThisRound || controlPhase !== 'toy' || gameComplete) return;
  const config = getToyConfig();
  playedThisRound = true;
  stopPowerMeter();
  lastToyFeedback = success ? 'hit' : 'miss';
  shotResults.push(success ? 'hit' : 'miss');
  if (success) catches += 1;

  if (config.mode === 'stack') {
    const shape = currentStackShape || getStackShapeForRound(currentRound);
    stackDroppingBlock = {
      x: Math.round(stackSwingX),
      w: shape.w,
      h: shape.h,
      r: shape.r,
      round: currentRound,
      success,
      dropTo: getStackDropTop(shape, success)
    };
  }

  renderToyBoard();
  updateRoundUi();

  if (success) {
    playSfx('success');
    milmaru.classList.add('catch');
    milmaruSpeech.textContent = getStageSpeech('きゃっきゃ！');
    guideText.textContent = config.hitBurst || 'いいね！';
    messageBar.textContent = `${config.label}で じょうずに あそべたよ。`;
    showGoalBurst({ x: 450, y: 250 }, config.hitBurst || 'いいね！', true);
    spawnSparkles({ x: 450, y: 246 });
  } else {
    playSfx('mistake');
    milmaru.classList.add('worried');
    milmaruSpeech.textContent = getStageSpeech('なぁい...？');
    guideText.textContent = 'もういちど やってみよう';
    messageBar.textContent = 'みどりのところを よく見て、おしてみよう。';
    showGoalBurst({ x: 450, y: 250 }, config.missBurst || 'おしい', false);
  }

  currentRound += 1;
  const nextDelay = config.mode === 'rhythm' ? 520 : config.mode === 'stack' ? 980 : 860;
  setTimeout(() => {
    milmaru.classList.remove('catch', 'worried');
    if (config.mode === 'stack' && stackDroppingBlock) {
      if (stackDroppingBlock.success) {
        stackBlocks.push({
          x: stackDroppingBlock.x,
          w: stackDroppingBlock.w,
          h: stackDroppingBlock.h,
          r: stackDroppingBlock.r
        });
        toyStackCount = stackBlocks.length;
      }
      stackDroppingBlock = null;
      renderToyBoard();
    }
    if (currentRound > TOTAL_ROUNDS) {
      completeGame();
      return;
    }
    playedThisRound = false;
    updateRoundUi();
    startToyMeter();
  }, nextDelay);
}

function getPlaySummaryText() {
  const config = getToyConfig();
  if (config.mode === 'roll') return `星を ${lastSetHits}こ ひろったよ。`;
  if (config.mode === 'rhythm') return `リズムよく ${lastSetHits}かい ならせたよ。`;
  if (config.mode === 'stack') return `つみきを ${lastSetHits}こ のせられたよ。`;
  return `ページを ${lastSetHits}まい めくれたよ。`;
}

function completeGame() {
  gameComplete = true;
  isMilmaruBusy = false;
  stopMilmaruRoam();
  stopPowerMeter();
  lastSetHits = catches;
  applyPlayReward();
  guideText.textContent = getToyConfig().completeGuide || `星を ${catches}こ ひろったよ！`;
  messageBar.textContent = 'ミルマルが うれしそう。おせわ画面で なでてあげてもいいね。';
  mainPlayBtn.textContent = 'おせわへ';
  setTimeout(showResult, 680);
}

function applyPlayReward() {
  if (resultApplied) return;
  resultApplied = true;
  const starGain = lastSetHits * 5;
  const friendGain = lastSetHits >= 3 ? 3 : lastSetHits >= 1 ? 2 : 1;
  const growthGain = lastSetHits >= 3 ? 1 : 0;
  state.stars = clamp((Number(state.stars) || 0) + starGain, 0, 99999);
  state.nakayoshi = clamp((Number(state.nakayoshi) || 0) + friendGain, 0, 100);
  state.sukusuku = clamp((Number(state.sukusuku) || 0) + growthGain, 0, 100);
  state.gokigen = clamp((Number(state.gokigen) || 0) + 16, 0, 100);
  state.lastCareAt = Date.now();
  state.lastMoodAt = Date.now();
  state.reaction = 'happy';
  state.speech = lastSetHits >= 3 ? 'きゃっきゃ！' : 'ふにゃ〜♪';
  saveState();
  renderCounts();
}

function spawnSparkles(center = { x: 450, y: 260 }) {
  for (let i = 0; i < 18; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark';
    spark.style.left = `${center.x - 90 + Math.random() * 180}px`;
    spark.style.top = `${center.y - 80 + Math.random() * 130}px`;
    spark.style.setProperty('--dx', `${(Math.random() - 0.5) * 160}px`);
    spark.style.setProperty('--dy', `${-40 - Math.random() * 80}px`);
    spark.style.animationDelay = `${Math.random() * 0.12}s`;
    sparkLayer.appendChild(spark);
    setTimeout(() => spark.remove(), 1050);
  }
}

function showResult() {
  const friendGain = lastSetHits >= 3 ? 3 : lastSetHits >= 1 ? 2 : 1;
  const growthText = lastSetHits >= 3 ? 'すくすく +1' : 'すくすくは そのまま';
  const starGain = lastSetHits * 5;
  resultTitle.textContent = getToyConfig().resultTitle;
  resultText.innerHTML = `${getPlaySummaryText()}<br>スター +${starGain}<br>なかよし +${friendGain}　${growthText}`;
  resultModal.classList.add('show');
  resultModal.setAttribute('aria-hidden', 'false');
}

function showNeedCareMessage(title, message) {
  playSfx('mistake');
  milmaru.classList.add('worried');
  milmaruSpeech.textContent = getStageSpeech(title);
  guideText.textContent = title;
  messageBar.textContent = message;
  setTimeout(() => milmaru.classList.remove('worried'), 900);
}

function goCare(result = '') {
  saveState();
  const suffix = result ? `?from=play&result=${encodeURIComponent(result)}` : '?from=play';
  window.location.href = `care.html${suffix}`;
}

function goWriting() {
  saveState();
  window.location.href = 'index.html?from=play';
}

function renderCounts() {
  document.getElementById('starCount').textContent = String(state.stars);
  updateToyUi();
  milmaru.classList.toggle('baby', getCareStageId() === 'baby');
  updateRoundUi();
}

function selectToy(toyId) {
  if (!TOY_CONFIGS[toyId]) return;
  selectedToyId = toyId;
  playSfx('button');
  resetGame();
}

document.addEventListener('pointerdown', (event) => {
  const button = event.target.closest('button');
  if (!button || !stageEl.contains(button)) return;
  playSfx('button');
}, true);

document.getElementById('backBtn').addEventListener('click', () => goCare());
document.getElementById('careBtn').addEventListener('click', () => goCare());
document.getElementById('modalCareBtn').addEventListener('click', () => goCare('success'));
document.getElementById('retryBtn').addEventListener('click', () => {
  resetGame();
});
document.getElementById('modalRetryBtn').addEventListener('click', () => {
  resetGame();
});
mainPlayBtn.addEventListener('click', () => {
  if (!isBallGame()) {
    handleToyAction();
    return;
  }
  if (controlPhase === 'power') {
    confirmPower();
    return;
  }
  if (gameComplete) {
    goCare('success');
    return;
  }
  if (!state.hatched) {
    goCare();
    return;
  }
  if (playedThisRound) {
    return;
  }
  messageBar.textContent = `${getToyConfig().label}をドラッグして、まずは むきをきめてね。`;
});
document.getElementById('settingsBtn').addEventListener('click', () => {
  messageBar.textContent = 'せっていは じゅんびちゅうだよ。';
});
document.querySelectorAll('.toy-card').forEach((button) => {
  button.addEventListener('click', () => {
    selectToy(button.dataset.toy);
  });
});

playfield.addEventListener('pointerdown', (event) => {
  if (!isBallGame()) {
    if (event.target.closest('.round-counter, .shot-pips, .power-meter')) return;
    event.preventDefault();
    handleToyAction();
    return;
  }
  if (controlPhase === 'power') {
    event.preventDefault();
    confirmPower();
    return;
  }
  if (event.target.closest('.round-counter, .shot-pips, .power-meter')) return;
  beginAim(event);
});
playfield.addEventListener('pointermove', updateAim);
playfield.addEventListener('pointerup', finishAim);
playfield.addEventListener('pointercancel', finishAim);

if (!state.hatched) {
  guideText.textContent = 'まだ あそべないよ';
  messageBar.textContent = 'おせわ画面で タマゴを あたためてあげよう。';
  milmaruSpeech.textContent = 'すぅ...';
} else {
  resetGame();
}
renderCounts();

window.MojikkoToyPlayGame = {
  getState: () => JSON.parse(JSON.stringify(state)),
  resetRound,
  resetGame,
  beginAim,
  confirmPower,
  selectToy,
  getPhase: () => controlPhase,
  applyPlayReward,
  goCare
};
</script>
