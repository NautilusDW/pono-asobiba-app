<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>もじっこファーム | おもちゃひろば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="manifest" href="../manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@500;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #4f3825;
  --ink-soft: #7a5b41;
  --wood-dark: #6e4b2d;
  --wood-mid: #a66e3f;
  --paper: #fff8e8;
  --paper-deep: #f1ddb7;
  --mint: #7fcea5;
  --mint-dark: #3c986f;
  --coral: #ee7b6b;
  --gold: #f5bd4e;
  --blue: #70bde4;
  --shadow: rgba(70, 42, 18, 0.26);
  --pixel-font: 'DotGothic16', 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --round-font: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --title-plaque: url('../assets/images/mojikko/writing/wood_title_plaque.png');
  --star-counter: url('../assets/images/mojikko/writing/star_counter.png');
  --settings-button: url('../assets/images/mojikko/writing/settings_button.png');
  --button-success: url('../assets/images/mojikko/writing/button_success_normal.png');
  --button-success-pressed: url('../assets/images/mojikko/writing/button_success_pressed.png');
  --button-retry: url('../assets/images/mojikko/writing/button_retry_wide_normal.png');
  --button-retry-pressed: url('../assets/images/mojikko/writing/button_retry_wide_pressed.png');
  --button-next: url('../assets/images/mojikko/writing/button_next_normal.png');
  --button-next-pressed: url('../assets/images/mojikko/writing/button_next_pressed.png');
  --milmaru-baby: url('../assets/images/mojikko/care/milmaru_shell_baby_idle_pose.png');
  --milmaru-baby-happy: url('../assets/images/mojikko/care/milmaru_shell_baby_arms_up.png');
  --milmaru-yochi: url('../assets/images/mojikko/care/milmaru_yochiyochi_front_happy.png');
  --milmaru-yochi-catch: url('../assets/images/mojikko/care/milmaru_yochiyochi_arms_up.png');
  --milmaru-yochi-worried: url('../assets/images/mojikko/care/milmaru_yochiyochi_worried.png');
  --icon-star: url('../assets/images/mojikko/writing/icon_star.png');
  --fx-sparkle: url('../assets/images/mojikko/care/fx_sparkle_cluster.png');
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  color: var(--ink);
  background: #20394b;
  font-family: var(--round-font);
  position: fixed;
  inset: 0;
}

button {
  font: inherit;
  color: inherit;
}

#stage-wrap {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: #20394b;
}

#stage {
  position: absolute;
  width: 1600px;
  height: 900px;
  transform-origin: 0 0;
  overflow: hidden;
  background:
    radial-gradient(circle at 15% 18%, rgba(255, 241, 145, 0.28) 0 7px, transparent 8px),
    radial-gradient(circle at 72% 30%, rgba(84, 142, 65, 0.18) 0 12px, transparent 13px),
    radial-gradient(circle at 42% 76%, rgba(116, 87, 50, 0.16) 0 10px, transparent 11px),
    linear-gradient(180deg, rgba(255,255,255,0.16) 0 1px, transparent 1px 8px),
    linear-gradient(90deg, rgba(76, 112, 55, 0.14) 0 1px, transparent 1px 8px),
    linear-gradient(135deg, #9bd37a 0%, #82c362 46%, #d5b66f 46%, #b8793d 100%);
  image-rendering: pixelated;
}

.pixel-button {
  border: 0;
  cursor: pointer;
  image-rendering: pixelated;
  filter: drop-shadow(0 7px 0 rgba(61, 39, 24, 0.34));
}

.pixel-button:active {
  transform: translateY(4px);
  filter: drop-shadow(0 3px 0 rgba(61, 39, 24, 0.34));
}

.top-bar {
  position: absolute;
  left: 34px;
  right: 34px;
  top: 30px;
  height: 92px;
  display: grid;
  grid-template-columns: 220px 1fr 290px 78px;
  gap: 22px;
  align-items: center;
  z-index: 10;
}

.back-btn {
  width: 220px;
  height: 72px;
  border: 5px solid var(--wood-dark);
  border-radius: 8px;
  background: linear-gradient(#fff1c9, #f2be64);
  box-shadow: inset 0 0 0 6px rgba(255,255,255,0.28), 0 7px 0 #4b2f1e;
  font-family: var(--pixel-font);
  font-size: 30px;
  font-weight: 900;
}

.title-board {
  height: 90px;
  min-width: 640px;
  display: grid;
  place-items: center;
  background: var(--title-plaque) center / contain no-repeat;
  font-family: var(--pixel-font);
  font-size: 42px;
  font-weight: 900;
  letter-spacing: 0;
  text-shadow: 0 2px 0 rgba(255,255,255,0.35);
}

.resource-box,
.star-box {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  border: 5px solid var(--wood-dark);
  border-radius: 8px;
  background: linear-gradient(#fff9e8, #f2dcaa);
  box-shadow: inset 0 0 0 5px rgba(255,255,255,0.38), 0 6px 0 #4b2f1e;
  font-family: var(--pixel-font);
  font-size: 28px;
  font-weight: 900;
}

.star-box {
  width: 290px;
  background: var(--star-counter) center / contain no-repeat;
  border: 0;
  box-shadow: none;
  filter: drop-shadow(0 5px 0 rgba(61,39,24,0.3));
}

.star-icon {
  width: 42px;
  height: 42px;
  background: var(--icon-star) center / contain no-repeat;
}

.icon-btn {
  width: 74px;
  height: 74px;
  background: var(--settings-button) center / contain no-repeat;
  overflow: hidden;
  color: transparent;
  white-space: nowrap;
  text-indent: 120%;
}

.sub-sign {
  position: absolute;
  top: 120px;
  left: 50%;
  transform: translateX(-50%);
  width: 470px;
  height: 58px;
  display: grid;
  place-items: center;
  border: 5px solid #4f8f67;
  border-radius: 8px;
  background: linear-gradient(#8ad6a8, #56b87b);
  box-shadow: inset 0 0 0 5px rgba(255,255,255,0.22), 0 5px 0 #3b6849;
  color: #fff;
  font-family: var(--pixel-font);
  font-size: 27px;
  font-weight: 900;
  text-shadow: 0 2px 0 rgba(57,85,55,0.45);
  z-index: 9;
}

.panel {
  position: absolute;
  border: 5px solid var(--wood-dark);
  border-radius: 9px;
  background: linear-gradient(#fffaf0, #f5e5c2);
  box-shadow: inset 0 0 0 5px rgba(255,255,255,0.4), 0 8px 0 #4b2f1e, 0 16px 22px var(--shadow);
  overflow: hidden;
}

.panel-heading {
  min-height: 58px;
  display: grid;
  place-items: center;
  background: linear-gradient(#62c594, #45a773);
  color: #fff;
  border-bottom: 4px solid rgba(92, 61, 37, 0.3);
  font-family: var(--pixel-font);
  font-size: 31px;
  font-weight: 900;
  text-shadow: 0 2px 0 rgba(57,85,55,0.5);
}

.toy-panel {
  left: 42px;
  top: 168px;
  width: 280px;
  height: 538px;
}

.toy-grid {
  padding: 20px 18px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.toy-card {
  position: relative;
  height: 126px;
  border: 4px solid #a0704c;
  border-radius: 8px;
  background: linear-gradient(#fff8e8, #efd6a7);
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.38), 0 5px 0 #7b5736;
  display: grid;
  place-items: center;
  gap: 4px;
  font-family: var(--pixel-font);
  font-size: 22px;
  font-weight: 900;
}

.toy-card.selected {
  background: linear-gradient(#ffe69a, #f4b944);
  border-color: #c3742f;
}

.toy-card.locked {
  opacity: 0.56;
  filter: saturate(0.55);
}

.toy-icon {
  width: 54px;
  height: 54px;
  display: grid;
  place-items: center;
  border: 3px solid rgba(107,73,44,0.3);
  border-radius: 8px;
  background: rgba(255,255,255,0.38);
  font-size: 35px;
}

.how-panel {
  right: 42px;
  top: 168px;
  width: 306px;
  height: 538px;
}

.steps {
  padding: 18px 16px 12px;
  display: grid;
  gap: 13px;
}

.step-card {
  height: 82px;
  display: grid;
  grid-template-columns: 56px 1fr;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border: 4px solid #b48961;
  border-radius: 8px;
  background: rgba(255,252,241,0.75);
  box-shadow: inset 0 0 0 3px rgba(255,255,255,0.36), 0 4px 0 rgba(103,72,45,0.35);
  font-family: var(--pixel-font);
  font-size: 23px;
  font-weight: 900;
}

.step-num {
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  border: 4px solid #946747;
  border-radius: 50%;
  background: #fff2cc;
}

.reward-hint {
  margin: 8px 18px 0;
  padding: 16px 14px;
  border: 4px dashed #d5b27e;
  border-radius: 8px;
  background: rgba(255,250,235,0.72);
  font-family: var(--pixel-font);
  font-size: 22px;
  font-weight: 900;
  line-height: 1.45;
}

.playfield {
  position: absolute;
  left: 350px;
  top: 190px;
  width: 900px;
  height: 540px;
  border: 7px solid var(--wood-dark);
  border-radius: 10px;
  background:
    radial-gradient(circle at 18% 22%, rgba(245, 228, 120, 0.42) 0 8px, transparent 9px),
    radial-gradient(circle at 70% 34%, rgba(93, 154, 72, 0.25) 0 14px, transparent 15px),
    radial-gradient(circle at 38% 76%, rgba(115, 82, 46, 0.18) 0 12px, transparent 13px),
    linear-gradient(180deg, rgba(255,255,255,0.18) 0 1px, transparent 1px 12px),
    linear-gradient(90deg, rgba(84, 122, 58, 0.16) 0 1px, transparent 1px 12px),
    linear-gradient(135deg, #94d36f 0%, #7cc45e 52%, #d7b66e 52%, #b8783c 100%);
  box-shadow: inset 0 0 0 7px rgba(255,255,255,0.38), 0 10px 0 #4b2f1e, 0 18px 28px var(--shadow);
  overflow: hidden;
}

.playfield::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.18;
  background:
    linear-gradient(180deg, #fff 0 1px, transparent 1px 8px),
    linear-gradient(90deg, #fff 0 1px, transparent 1px 8px);
  pointer-events: none;
}

.cloud {
  position: absolute;
  display: none;
  border-radius: 999px;
  background: rgba(255,255,255,0.88);
}

.cloud.one { width: 150px; height: 34px; left: 110px; top: 72px; }
.cloud.two { width: 205px; height: 42px; left: 568px; top: 92px; opacity: 0.74; }
.cloud::before,
.cloud::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  background: inherit;
}
.cloud::before { width: 70px; height: 70px; left: 28px; bottom: 6px; }
.cloud::after { width: 92px; height: 62px; left: 78px; bottom: 3px; }

.ground-stripe {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 126px;
  background:
    repeating-linear-gradient(90deg, rgba(86, 54, 31, 0.14) 0 20px, transparent 20px 44px),
    linear-gradient(#d7b66e, #ad7138);
  border-top: 6px solid rgba(101,67,39,0.36);
}

.lane {
  position: absolute;
  left: 80px;
  right: 80px;
  bottom: 100px;
  height: 20px;
  border: 4px solid rgba(120, 88, 52, 0.45);
  border-radius: 999px;
  background: repeating-linear-gradient(90deg, #fff7d5 0 25px, #ead09b 25px 42px);
}

.path-arc {
  position: absolute;
  left: 208px;
  top: 210px;
  width: 478px;
  height: 182px;
  border: 7px dotted rgba(255, 141, 88, 0.7);
  border-color: rgba(255, 141, 88, 0.7) transparent transparent transparent;
  border-radius: 50% 50% 0 0;
  transform: rotate(-5deg);
  opacity: 0.28;
  pointer-events: none;
}

.launch-pad {
  position: absolute;
  left: 92px;
  bottom: 142px;
  width: 176px;
  height: 122px;
  border: 5px solid #89603f;
  border-radius: 10px;
  background: rgba(255,248,225,0.75);
  box-shadow: inset 0 0 0 5px rgba(255,255,255,0.35), 0 6px 0 rgba(80,54,33,0.34);
  display: grid;
  place-items: center;
  font-family: var(--pixel-font);
  font-size: 20px;
  font-weight: 900;
  text-align: center;
  line-height: 1.25;
}

.target-ring {
  position: absolute;
  left: var(--target-x, 716px);
  top: var(--target-y, 332px);
  width: var(--target-w, 154px);
  height: var(--target-h, 122px);
  border: 8px dashed rgba(247, 190, 79, 0.95);
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transform: translate(-50%, -50%);
  animation: targetPulse 1.2s ease-in-out infinite;
  z-index: 4;
}

.target-ring::after {
  content: 'ここ！';
  position: absolute;
  left: -18px;
  top: -42px;
  padding: 4px 12px;
  border: 3px solid #8b6040;
  border-radius: 6px;
  background: #fff4cf;
  font-family: var(--pixel-font);
  font-size: 22px;
  font-weight: 900;
}

@keyframes targetPulse {
  50% { transform: translate(-50%, -50%) scale(1.07); opacity: 0.72; }
}

.target-ring.tight {
  border-color: rgba(238, 123, 107, 0.92);
}

.target-ring.goal-hit {
  border-color: #58b97a;
  background: rgba(210, 255, 202, 0.38);
  animation: targetHit 760ms steps(2) both;
}

@keyframes targetHit {
  0% { transform: translate(-50%, -50%) scale(1); }
  45% { transform: translate(-50%, -50%) scale(1.18); filter: brightness(1.15); }
  100% { transform: translate(-50%, -50%) scale(1.03); }
}

.round-counter {
  position: absolute;
  left: 32px;
  top: 24px;
  min-width: 116px;
  height: 46px;
  display: grid;
  place-items: center;
  border: 4px solid #8b6040;
  border-radius: 8px;
  background: #fff4cf;
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.35), 0 4px 0 rgba(80,54,33,0.3);
  font-family: var(--pixel-font);
  font-size: 22px;
  font-weight: 900;
  z-index: 5;
}

.power-meter {
  position: absolute;
  left: 98px;
  bottom: 276px;
  width: 182px;
  height: 40px;
  display: grid;
  grid-template-columns: 58px 1fr;
  align-items: center;
  gap: 8px;
  padding: 5px 9px;
  border: 4px solid #8b6040;
  border-radius: 8px;
  background: rgba(255,248,225,0.86);
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.32), 0 4px 0 rgba(80,54,33,0.28);
  font-family: var(--pixel-font);
  font-size: 18px;
  font-weight: 900;
  z-index: 5;
}

.power-track {
  height: 18px;
  border: 3px solid #9b704b;
  border-radius: 999px;
  background: #f5dfb5;
  overflow: hidden;
}

.power-fill {
  width: var(--power, 0%);
  height: 100%;
  background: linear-gradient(90deg, #86d7ac, #f5bd4e, #ee7b6b);
  transition: width 90ms linear;
}

.milmaru-speech {
  position: absolute;
  right: 86px;
  top: 88px;
  min-width: 170px;
  max-width: 250px;
  padding: 14px 20px;
  border: 5px solid #845b3d;
  border-radius: 12px;
  background: #fffaf0;
  box-shadow: 0 6px 0 rgba(84,54,32,0.3);
  font-family: var(--pixel-font);
  font-size: 25px;
  font-weight: 900;
  text-align: center;
  z-index: 9;
}

.milmaru-speech::after {
  content: '';
  position: absolute;
  left: 106px;
  bottom: -23px;
  width: 34px;
  height: 34px;
  border-right: 5px solid #845b3d;
  border-bottom: 5px solid #845b3d;
  background: #fffaf0;
  transform: rotate(45deg);
}

.milmaru {
  position: absolute;
  right: 98px;
  bottom: 128px;
  width: 238px;
  height: 238px;
  background: var(--milmaru-yochi) center bottom / contain no-repeat;
  image-rendering: pixelated;
  filter: drop-shadow(0 12px 0 rgba(92,60,35,0.18));
  z-index: 3;
}

.milmaru.baby {
  width: 236px;
  height: 236px;
  background-image: var(--milmaru-baby);
}

.milmaru.catch {
  animation: milmaruCatch 900ms ease both;
  background-image: var(--milmaru-yochi-catch);
}

.milmaru.baby.catch {
  background-image: var(--milmaru-baby-happy);
}

.milmaru.worried {
  background-image: var(--milmaru-yochi-worried);
}

@keyframes milmaruCatch {
  0%, 100% { transform: translateY(0) scale(1); }
  35% { transform: translateY(-18px) scale(1.05); }
}

.toy-ball {
  position: absolute;
  left: var(--ball-x, 160px);
  top: var(--ball-y, 354px);
  width: 76px;
  height: 76px;
  border: 5px solid #8e5930;
  border-radius: 50%;
  background:
    radial-gradient(circle at 32% 28%, #fff2ac 0 13px, transparent 14px),
    linear-gradient(135deg, #ffe17b 0 32%, #ffb94c 32% 50%, #f08a43 50% 68%, #ffd96f 68%);
  box-shadow: inset -8px -10px 0 rgba(150,83,35,0.2), 0 8px 0 rgba(85,54,32,0.22);
  cursor: grab;
  z-index: 6;
  image-rendering: pixelated;
  transition: left 120ms ease, top 120ms ease;
}

.toy-ball.dragging {
  cursor: grabbing;
  transform: scale(1.05);
  transition: none;
}

.toy-ball.flying {
  transition: none;
  animation: ballSpin 560ms steps(4) infinite;
}

@keyframes ballSpin {
  to { transform: rotate(360deg); }
}

.aim-line {
  position: absolute;
  left: 198px;
  top: 392px;
  height: 8px;
  width: var(--aim-length, 0px);
  transform-origin: left center;
  transform: rotate(var(--aim-angle, 0deg));
  border-radius: 999px;
  background: repeating-linear-gradient(90deg, #ff8d58 0 14px, transparent 14px 24px);
  opacity: 0;
  z-index: 2;
}

.aim-line.show {
  opacity: 0.92;
}

.prediction-svg {
  position: absolute;
  inset: 0;
  overflow: visible;
  opacity: 0;
  transition: opacity 100ms linear;
  pointer-events: none;
  z-index: 4;
}

.prediction-svg.show {
  opacity: 1;
}

.prediction-svg path {
  fill: none;
  stroke: #ff8d58;
  stroke-width: 8;
  stroke-linecap: round;
  stroke-dasharray: 16 13;
  filter: drop-shadow(0 3px 0 rgba(115, 74, 45, 0.22));
}

.prediction-svg.safe path {
  stroke: #58b97a;
}

.landing-preview {
  position: absolute;
  left: 0;
  top: 0;
  width: 74px;
  height: 58px;
  display: grid;
  place-items: center;
  border: 5px dashed #e97955;
  border-radius: 50%;
  background: rgba(255, 245, 210, 0.78);
  box-shadow: 0 5px 0 rgba(84,54,32,0.22);
  color: #8a5636;
  font-family: var(--pixel-font);
  font-size: 18px;
  font-weight: 900;
  transform: translate(-50%, -50%);
  opacity: 0;
  pointer-events: none;
  z-index: 5;
}

.landing-preview.show {
  opacity: 1;
}

.landing-preview.safe {
  border-color: #58b97a;
  background: rgba(214, 255, 202, 0.82);
  color: #2f7a54;
}

.landing-preview.miss {
  border-color: #ee7b6b;
  background: rgba(255, 236, 205, 0.9);
  color: #9b5f3f;
}

.goal-burst {
  position: absolute;
  left: var(--burst-x, 700px);
  top: var(--burst-y, 300px);
  min-width: 150px;
  padding: 10px 18px 12px;
  border: 5px solid #8b6040;
  border-radius: 10px;
  background: #fff4cf;
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.35), 0 6px 0 rgba(74,48,30,0.32);
  color: #2f7a54;
  font-family: var(--pixel-font);
  font-size: 30px;
  font-weight: 900;
  text-align: center;
  transform: translate(-50%, -50%) scale(0.72);
  opacity: 0;
  pointer-events: none;
  z-index: 10;
}

.goal-burst.show {
  animation: goalBurstPop 900ms ease-out both;
}

.goal-burst.miss {
  color: #a45b3f;
}

@keyframes goalBurstPop {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.55); }
  20% { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
  72% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -70%) scale(0.92); }
}

.spark-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 6;
}

.spark {
  position: absolute;
  width: 34px;
  height: 34px;
  background: var(--fx-sparkle) center / contain no-repeat;
  animation: sparkPop 900ms ease-out forwards;
}

@keyframes sparkPop {
  0% { opacity: 0; transform: translate(0, 12px) scale(0.4); }

<body>
<div id="stage-wrap">
  <main id="stage" aria-label="もじっこファーム おもちゃひろば">
    <header class="top-bar">
      <button class="pixel-button back-btn" id="backBtn">← おせわへ</button>

<script>
'use strict';

const CARE_STATE_KEY = 'mojikkoFarmCareStateV1';
const PLAY_STAR_COST = 20;
const TOTAL_ROUNDS = 3;
const MAX_PULL = 150;
const BALL_SIZE = 76;
const LAUNCH_CENTER = { x: 198, y: 392 };
const ROUND_TARGETS = [
  { x: 716, y: 336, radius: 126 },
  { x: 650, y: 292, radius: 112 },
  { x: 760, y: 292, radius: 104 }
];

const defaultState = {
  name: 'ミルマル',
  named: false,
  nakayoshi: 0,
  gokigen: 78,
  sukusuku: 0,
  eggWarmth: 0,
  hatched: false,
  stars: 0,
  inventory: {
    moji_milk: { id: 'moji_milk', name: 'もじミルク', count: 0, type: 'food' },
    moji_cookie: { id: 'moji_cookie', name: 'もじクッキー', count: 0, type: 'food' }
  },
  reaction: 'normal',
  speech: 'いっしょに もじを かこう！',
  lastStageId: 'egg',
  lastPetAt: 0,
  lastWarmAt: 0,
  lastMoodAt: Date.now(),
  lastCareAt: Date.now()
};

let state = loadState();
let audioCtx = null;
let dragging = false;
let startPoint = null;
let currentPoint = null;
let playedThisRound = false;
let praisePending = false;
let gameComplete = false;
let resultApplied = false;
let currentRound = 1;
let catches = 0;
let animationFrame = null;

const stageEl = document.getElementById('stage');
const ball = document.getElementById('ball');
const playfield = document.getElementById('playfield');
const aimLine = document.getElementById('aimLine');
const guideText = document.getElementById('guideText');
const messageBar = document.getElementById('messageBar');
const milmaru = document.getElementById('milmaru');
const milmaruSpeech = document.getElementById('milmaruSpeech');
const resultModal = document.getElementById('resultModal');
const resultTitle = document.getElementById('resultTitle');
const resultText = document.getElementById('resultText');
const sparkLayer = document.getElementById('sparkLayer');
const targetRing = document.getElementById('targetRing');
const roundCounter = document.getElementById('roundCounter');
const powerFill = document.getElementById('powerFill');
const mainPlayBtn = document.getElementById('playBtn');
const predictionSvg = document.getElementById('predictionSvg');
const predictionPath = document.getElementById('predictionPath');
const landingPreview = document.getElementById('landingPreview');
const landingPreviewText = landingPreview.querySelector('span');
const goalBurst = document.getElementById('goalBurst');

function fitStage() {
  const scale = Math.min(window.innerWidth / 1600, window.innerHeight / 900);
  const ox = (window.innerWidth - 1600 * scale) / 2;
  const oy = (window.innerHeight - 900 * scale) / 2;
  stageEl.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
}

window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));
fitStage();

function cloneDefaultState() {
  return JSON.parse(JSON.stringify(defaultState));
}

function sanitizeMilmaruName(value) {
  const text = String(value || '').trim().replace(/\s+/g, '');
  return text ? text.slice(0, 8) : 'ミルマル';
}

function loadState() {
  try {
    const saved = localStorage.getItem(CARE_STATE_KEY);
    if (!saved) return cloneDefaultState();
    const parsed = JSON.parse(saved);
    const merged = cloneDefaultState();
    merged.name = sanitizeMilmaruName(parsed.name || merged.name);
    merged.named = parsed.named === true;
    merged.nakayoshi = Number.isFinite(parsed.nakayoshi) ? parsed.nakayoshi : merged.nakayoshi;
    merged.gokigen = Number.isFinite(parsed.gokigen) ? parsed.gokigen : merged.gokigen;
    merged.sukusuku = Number.isFinite(parsed.sukusuku) ? parsed.sukusuku : merged.sukusuku;
    merged.eggWarmth = Number.isFinite(parsed.eggWarmth) ? parsed.eggWarmth : merged.eggWarmth;
    merged.hatched = parsed.hatched === true;
    merged.stars = Number.isFinite(parsed.stars) ? parsed.stars : merged.stars;
    if (!merged.hatched && merged.eggWarmth === 0 && merged.stars >= 1000) {
      merged.stars = 0;
    }
    merged.speech = parsed.speech || merged.speech;
    merged.reaction = parsed.reaction || merged.reaction;
    merged.lastStageId = parsed.lastStageId || merged.lastStageId;
    merged.lastCareAt = Number.isFinite(parsed.lastCareAt) ? parsed.lastCareAt : Date.now();
    merged.lastMoodAt = Number.isFinite(parsed.lastMoodAt) ? parsed.lastMoodAt : merged.lastCareAt;
    if (parsed.inventory) {
      Object.keys(merged.inventory).forEach((id) => {
        if (parsed.inventory[id]) merged.inventory[id].count = Math.max(0, Number(parsed.inventory[id].count) || 0);
      });
    }
    return merged;
  } catch (error) {
    console.warn('Could not load care state:', error);
    return cloneDefaultState();
  }
}

function saveState() {
  try {
    localStorage.setItem(CARE_STATE_KEY, JSON.stringify(state));
  } catch (error) {
    console.warn('Could not save care state:', error);
  }
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function getInventoryCount(id) {
  return Math.max(0, Number(state.inventory[id]?.count) || 0);
}

function changeInventory(id, delta) {
  if (!state.inventory[id]) return 0;
  state.inventory[id].count = clamp(getInventoryCount(id) + delta, 0, 99);
  return state.inventory[id].count;
}

function hasStars(cost = 1) {
  return (Number(state.stars) || 0) >= cost;
}

function getCareStageId() {
  if (!state.hatched) return 'egg';
  if (state.sukusuku < 25) return 'baby';
  if (state.sukusuku < 50) return 'yochiyochi';
  if (state.sukusuku < 80) return 'kids';
  return 'pre_evolution';
}

function getBabySpeech(text) {
  const raw = String(text || '');
  if (/キャッチ|やった|たのし|あそ/.test(raw)) return 'きゃっきゃ！';
  if (/たりない|ない/.test(raw)) return 'ふぇ...？';
  return 'みゅっ♪';
}

function getYochiyochiSpeech(text) {
  const raw = String(text || '');
  if (/キャッチ|やった|たのし|あそ/.test(raw)) return 'あしょぼ！';
  if (/たりない|ない/.test(raw)) return 'なぁい...？';
  return 'みゅっ♪';
}

function getStageSpeech(text) {
  const stage = getCareStageId();
  if (stage === 'baby') return getBabySpeech(text);
  if (stage === 'yochiyochi') return getYochiyochiSpeech(text);
  return text;
}

function getAudioContext() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return null;
  if (!audioCtx) audioCtx = new AudioContextClass();
  if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  return audioCtx;
}

function playTone(frequency, duration = 0.06, type = 'square', volume = 0.035, delay = 0) {
  const ctx = getAudioContext();
  if (!ctx) return;
  const start = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(volume, start + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.03);
}

function playSfx(kind) {
  try {
    if (kind === 'roll') {
      [430, 470, 520].forEach((freq, i) => playTone(freq, 0.045, 'triangle', 0.024, i * 0.055));
      return;
    }
    if (kind === 'success') {
      [620, 780, 980].forEach((freq, i) => playTone(freq, 0.07, 'square', 0.03, i * 0.06));
      return;
    }
    if (kind === 'mistake') {
      playTone(220, 0.075, 'triangle', 0.024);
      return;
    }
    playTone(560, 0.045, 'square', 0.026);
  } catch (_) {}
}

function setBallPosition(x, y) {
  ball.style.setProperty('--ball-x', `${x}px`);
  ball.style.setProperty('--ball-y', `${y}px`);
}

function setBallCenter(x, y) {
  setBallPosition(x - BALL_SIZE / 2, y - BALL_SIZE / 2);
}

function getCurrentTarget() {
  return ROUND_TARGETS[currentRound - 1] || ROUND_TARGETS[0];
}

function updateRoundUi() {
  const target = getCurrentTarget();
  roundCounter.textContent = `${currentRound} / ${TOTAL_ROUNDS}`;
  targetRing.style.setProperty('--target-x', `${target.x}px`);
  targetRing.style.setProperty('--target-y', `${target.y}px`);
  targetRing.style.setProperty('--target-w', `${target.radius * 1.7}px`);
  targetRing.style.setProperty('--target-h', `${target.radius * 1.35}px`);
  targetRing.classList.toggle('tight', currentRound >= 3);
}

function resetPowerMeter() {
  powerFill.style.setProperty('--power', '0%');
}

function hidePrediction() {
  predictionSvg.classList.remove('show', 'safe');
  predictionPath.setAttribute('d', '');
  landingPreview.classList.remove('show', 'safe', 'miss');
  goalBurst.classList.remove('show', 'miss');
  targetRing.classList.remove('goal-hit');
}

function setLandingPreview(point, label, mode = '') {
  landingPreview.style.left = `${point.x}px`;
  landingPreview.style.top = `${point.y}px`;
  landingPreviewText.textContent = label;
  landingPreview.classList.remove('safe', 'miss');
  if (mode) landingPreview.classList.add(mode);
  landingPreview.classList.add('show');
}

function showGoalBurst(point, label, isGood = true) {
  goalBurst.classList.remove('show', 'miss');
  goalBurst.textContent = label;
  goalBurst.style.setProperty('--burst-x', `${point.x}px`);
  goalBurst.style.setProperty('--burst-y', `${Math.max(72, point.y - 46)}px`);
  goalBurst.classList.toggle('miss', !isGood);
  void goalBurst.offsetWidth;
  goalBurst.classList.add('show');
}

function showPrediction(shot, sourcePoint) {
  if (!shot || shot.power < 42) {
    predictionSvg.classList.remove('show', 'safe');
    landingPreview.classList.remove('show', 'safe', 'miss');
    return;
  }
  const previewShot = { ...shot, power: clamp(shot.power, 60, MAX_PULL) };
  const landing = getLandingPoint(previewShot);
  const start = sourcePoint || LAUNCH_CENTER;
  const lift = clamp(previewShot.power * 0.78, 70, 132);
  const control = {
    x: start.x + (landing.x - start.x) * 0.48,
    y: Math.min(start.y, landing.y) - lift
  };
  predictionPath.setAttribute(
    'd',
    `M ${start.x.toFixed(1)} ${start.y.toFixed(1)} Q ${control.x.toFixed(1)} ${control.y.toFixed(1)} ${landing.x.toFixed(1)} ${landing.y.toFixed(1)}`
  );
  const caught = isLandingCaught(landing);
  predictionSvg.classList.add('show');
  predictionSvg.classList.toggle('safe', caught);
  setLandingPreview(landing, caught ? 'OK!' : 'ここ', caught ? 'safe' : '');
}

function resetRound(options = {}) {
  cancelAnimationFrame(animationFrame);
  playedThisRound = false;
  praisePending = false;
  dragging = false;
  startPoint = null;
  currentPoint = null;
  ball.classList.remove('dragging', 'flying');
  aimLine.classList.remove('show');
  hidePrediction();
  setBallCenter(LAUNCH_CENTER.x, LAUNCH_CENTER.y);
  resetPowerMeter();
  milmaru.classList.remove('catch', 'worried');
  if (!options.keepModal) {
    resultModal.classList.remove('show');
    resultModal.setAttribute('aria-hidden', 'true');
  }
  updateRoundUi();
  const readyToPlay = hasStars(PLAY_STAR_COST);
  mainPlayBtn.textContent = readyToPlay ? 'あそぶ！' : 'もじを かく！';
  guideText.textContent = readyToPlay ? `${currentRound}かいめ：リングを ねらおう` : 'スターが たりないよ';
  messageBar.textContent = readyToPlay
    ? 'ボールを ひっぱると、ちからと むきが かわるよ。'
    : `あと ${Math.max(1, PLAY_STAR_COST - (Number(state.stars) || 0))}スター。もじを かくと、あそぶための スターが もらえるよ。`;
  milmaruSpeech.textContent = getStageSpeech('みゅっ♪');
}

function resetGame() {
  currentRound = 1;
  catches = 0;
  gameComplete = false;
  resultApplied = false;
  resetRound();
}

function getLocalPoint(event) {
  const rect = playfield.getBoundingClientRect();
  const scaleX = playfield.offsetWidth / rect.width;
  const scaleY = playfield.offsetHeight / rect.height;
  return {
    x: (event.clientX - rect.left) * scaleX,
    y: (event.clientY - rect.top) * scaleY
  };
}

function clampPullPoint(point) {
  const dx = point.x - LAUNCH_CENTER.x;
  const dy = point.y - LAUNCH_CENTER.y;
  const distance = Math.hypot(dx, dy);
  if (distance <= MAX_PULL) return { x: point.x, y: point.y };
  const scale = MAX_PULL / distance;
  return {
    x: LAUNCH_CENTER.x + dx * scale,
    y: LAUNCH_CENTER.y + dy * scale
  };
}

function updateAim() {
  if (!startPoint || !currentPoint) return;
  const dx = startPoint.x - currentPoint.x;
  const dy = startPoint.y - currentPoint.y;
  const distance = clamp(Math.hypot(dx, dy), 0, MAX_PULL);
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;
  aimLine.style.setProperty('--aim-length', `${distance * 1.7}px`);
  aimLine.style.setProperty('--aim-angle', `${angle}deg`);
  aimLine.classList.toggle('show', distance > 12);
  powerFill.style.setProperty('--power', `${Math.round((distance / MAX_PULL) * 100)}%`);
  showPrediction({ dx, dy, power: distance }, currentPoint);
  if (distance < 55) {
    guideText.textContent = 'もうすこし ひっぱろう';
  } else if (distance > 132) {
    guideText.textContent = 'ちから つよめ！ねらって はなそう';
  } else {
    guideText.textContent = 'いい ちから！リングを ねらおう';
  }
}

function startDrag(event) {
  if (playedThisRound || praisePending || gameComplete) return;
  if (!state.hatched) {
    showNeedCareMessage('まだ タマゴだよ', 'おせわ画面で タマゴを あたためてあげよう。');
    return;
  }
  if (!hasStars(PLAY_STAR_COST)) {
    showNeedCareMessage('スターが たりないよ', `あと ${PLAY_STAR_COST - (Number(state.stars) || 0)}スター いるよ。もじを かこう！`);
    return;
  }
  event.preventDefault();
  playSfx('button');
  dragging = true;
  startPoint = { x: 198, y: 392 };
  currentPoint = clampPullPoint(getLocalPoint(event));
  setBallCenter(currentPoint.x, currentPoint.y);
  ball.classList.add('dragging');
  event.currentTarget.setPointerCapture?.(event.pointerId);
  updateAim();
}

function moveDrag(event) {
  if (!dragging) return;
  event.preventDefault();
  currentPoint = clampPullPoint(getLocalPoint(event));
  setBallCenter(currentPoint.x, currentPoint.y);
  updateAim();
}

function endDrag(event) {
  if (!dragging) return;
  event.preventDefault();
  dragging = false;
  event.currentTarget.releasePointerCapture?.(event.pointerId);
  ball.classList.remove('dragging');
  aimLine.classList.remove('show');
  const dx = startPoint.x - currentPoint.x;
  const dy = startPoint.y - currentPoint.y;
  const distance = Math.hypot(dx, dy);
  if (distance < 54) {
    playSfx('mistake');
    guideText.textContent = 'もうすこし ひっぱろう';
    messageBar.textContent = 'だいじょうぶ。ゆっくり もういっかい やってみよう。';
    milmaruSpeech.textContent = getStageSpeech('ふぇ...？');
    setBallCenter(LAUNCH_CENTER.x, LAUNCH_CENTER.y);
    hidePrediction();
    resetPowerMeter();
    return;
  }
  launchBall({ dx, dy, power: clamp(distance, 60, MAX_PULL) });
}

function getLandingPoint(shot) {
  const pullStrength = shot.power / MAX_PULL;
  return {
    x: clamp(LAUNCH_CENTER.x + shot.dx * 4.7, 58, 842),
    y: clamp(LAUNCH_CENTER.y + shot.dy * 1.7 + (pullStrength - 0.72) * 38, 92, 446)
  };
}

function isLandingCaught(point) {
  const target = getCurrentTarget();
  return Math.hypot(point.x - target.x, point.y - target.y) <= target.radius;
}

function launchBall(shot) {
  playedThisRound = true;
  playSfx('roll');
  ball.classList.add('flying');
  guideText.textContent = 'ボールが ころころ...';
  messageBar.textContent = 'リングの 近くに とどくかな？';
  resetPowerMeter();
  const start = currentPoint || LAUNCH_CENTER;
  const end = getLandingPoint(shot);
  const caught = isLandingCaught(end);
  const lift = clamp(shot.power * 0.92, 70, 142);
  const started = performance.now();
  const duration = 980;

  const tick = (now) => {
    const t = clamp((now - started) / duration, 0, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const x = start.x + (end.x - start.x) * ease;
    const y = start.y + (end.y - start.y) * ease - Math.sin(Math.PI * ease) * lift;
    setBallCenter(x, y);
    if (t < 1) {
      animationFrame = requestAnimationFrame(tick);
      return;
    }
    resolveShot(caught, end);
  };
  animationFrame = requestAnimationFrame(tick);
}

function resolveShot(caught, end) {
  ball.classList.remove('flying');
  setBallCenter(end.x, end.y);
  if (!caught) {
    playSfx('mistake');
    predictionSvg.classList.remove('safe');
    setLandingPreview(end, 'おしい', 'miss');
    showGoalBurst(end, 'おしい！', false);
    milmaru.classList.add('worried');
    milmaruSpeech.textContent = getStageSpeech('おしい！');
    guideText.textContent = 'おしい！もういっかい';
    messageBar.textContent = 'リングの 近くを ねらって、ちからを かえてみよう。';
    mainPlayBtn.textContent = 'もういっかい';
    setTimeout(() => {
      if (praisePending || gameComplete) return;
      playedThisRound = false;
      milmaru.classList.remove('worried');
      setBallCenter(LAUNCH_CENTER.x, LAUNCH_CENTER.y);
      hidePrediction();
    }, 850);
    return;
  }
  catches += 1;
  praisePending = true;
  playSfx('success');
  targetRing.classList.add('goal-hit');
  predictionSvg.classList.add('safe');
  setLandingPreview(end, 'はいった', 'safe');
  showGoalBurst(end, 'はいった！', true);
  milmaru.classList.add('catch');
  milmaruSpeech.textContent = getStageSpeech('キャッチできた！');
  guideText.textContent = 'はいった！ほめてあげよう';
  messageBar.textContent = 'リングに はいったよ。下の「ほめる！」を おしてね。';
  mainPlayBtn.textContent = 'ほめる！';
  spawnSparkles(end);
}

function praiseMilmaru() {
  if (!praisePending) return;
  praisePending = false;
  playedThisRound = false;
  playSfx('success');
  milmaruSpeech.textContent = getStageSpeech('えへへ♪');
  messageBar.textContent = `${catches}かい キャッチ！ミルマルが うれしそう。`;
  spawnSparkles();
  if (catches >= TOTAL_ROUNDS) {
    completeGame();
    return;
  }
  currentRound += 1;
  guideText.textContent = 'つぎの リングを ねらおう';
  setTimeout(() => resetRound(), 520);
}

function completeGame() {
  gameComplete = true;
  applyPlayReward();
  guideText.textContent = '3かい キャッチできた！';
  messageBar.textContent = 'たくさん ほめてもらって、ミルマルが よろこんでいるよ。';
  mainPlayBtn.textContent = 'おせわへ';
  setTimeout(showResult, 680);
}

function applyPlayReward() {
  if (resultApplied) return;
  resultApplied = true;
  state.stars = clamp((Number(state.stars) || 0) - PLAY_STAR_COST, 0, 99999);
  state.nakayoshi = clamp((Number(state.nakayoshi) || 0) + 3, 0, 100);
  state.sukusuku = clamp((Number(state.sukusuku) || 0) + 1, 0, 100);
  state.gokigen = clamp((Number(state.gokigen) || 0) + 16, 0, 100);
  state.lastCareAt = Date.now();
  state.lastMoodAt = Date.now();
  state.reaction = 'happy';
  state.speech = 'あそぶの たのしい！';
  saveState();
  renderCounts();
}

function spawnSparkles(center = getCurrentTarget()) {
  for (let i = 0; i < 18; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark';
    spark.style.left = `${center.x - 90 + Math.random() * 180}px`;
    spark.style.top = `${center.y - 80 + Math.random() * 130}px`;
    spark.style.setProperty('--dx', `${(Math.random() - 0.5) * 160}px`);
    spark.style.setProperty('--dy', `${-40 - Math.random() * 80}px`);
    spark.style.animationDelay = `${Math.random() * 0.12}s`;
    sparkLayer.appendChild(spark);
    setTimeout(() => spark.remove(), 1050);
  }
}

function showResult() {
  resultTitle.textContent = 'たくさん あそべたね！';
  resultText.innerHTML = '3かい キャッチして、<br>ミルマルを ほめられたよ。<br>なかよし +3　すくすく +1';
  resultModal.classList.add('show');
  resultModal.setAttribute('aria-hidden', 'false');
}

function showNeedCareMessage(title, message) {
  playSfx('mistake');
  milmaru.classList.add('worried');
  milmaruSpeech.textContent = getStageSpeech(title);
  guideText.textContent = title;
  messageBar.textContent = message;
  setTimeout(() => milmaru.classList.remove('worried'), 900);
}

function goCare(result = '') {
  saveState();
  const suffix = result ? `?from=play&result=${encodeURIComponent(result)}` : '?from=play';
  window.location.href = `care.html${suffix}`;
}

function goWriting() {
  saveState();
  window.location.href = 'index.html?from=play';
}

function renderCounts() {
  document.getElementById('starCount').textContent = String(state.stars);
  const sign = document.querySelector('.sub-sign');
  sign.textContent = `スター${PLAY_STAR_COST}で あそぶ`;
  milmaru.classList.toggle('baby', getCareStageId() === 'baby');
  updateRoundUi();
}

document.addEventListener('pointerdown', (event) => {
  const button = event.target.closest('button');
  if (!button || !stageEl.contains(button)) return;
  playSfx('button');
}, true);

document.getElementById('backBtn').addEventListener('click', () => goCare());
document.getElementById('careBtn').addEventListener('click', () => goCare());
document.getElementById('modalCareBtn').addEventListener('click', () => goCare('success'));
document.getElementById('retryBtn').addEventListener('click', () => {
  if (gameComplete) {
    resetGame();
    return;
  }
  resetRound();
});
document.getElementById('modalRetryBtn').addEventListener('click', () => {
  if (!hasStars(PLAY_STAR_COST)) {
    resultModal.classList.remove('show');
    showNeedCareMessage('スターが たりないよ', 'もじを かいて、また あそびにこよう。');
    return;
  }
  resetGame();
});
mainPlayBtn.addEventListener('click', () => {
  if (gameComplete) {
    goCare('success');
    return;
  }
  if (!state.hatched) {
    goCare();
    return;
  }
  if (!hasStars(PLAY_STAR_COST)) {
    goWriting();
    return;
  }
  if (praisePending) {
    praiseMilmaru();
    return;
  }
  if (playedThisRound) {
    resetRound();
    return;
  }
  guideText.textContent = 'ボールを ひっぱって はなそう';
  messageBar.textContent = 'ボールを 後ろに ひっぱると、むきと ちからが かわるよ。';
});
document.getElementById('settingsBtn').addEventListener('click', () => {
  messageBar.textContent = 'せっていは じゅんびちゅうだよ。';
});
document.querySelectorAll('.toy-card.locked').forEach((button) => {
  button.addEventListener('click', () => {
    messageBar.textContent = 'この おもちゃは これから つかえるようにするね。';
    playSfx('mistake');
  });
});

ball.addEventListener('pointerdown', startDrag);
ball.addEventListener('pointermove', moveDrag);
ball.addEventListener('pointerup', endDrag);
ball.addEventListener('pointercancel', endDrag);
document.getElementById('launchPad').addEventListener('pointerdown', startDrag);
document.getElementById('launchPad').addEventListener('pointermove', moveDrag);
document.getElementById('launchPad').addEventListener('pointerup', endDrag);
document.getElementById('launchPad').addEventListener('pointercancel', endDrag);
document.addEventListener('pointermove', moveDrag);
document.addEventListener('pointerup', endDrag);
document.addEventListener('pointercancel', endDrag);

if (!state.hatched) {
  guideText.textContent = 'まだ あそべないよ';
  messageBar.textContent = 'おせわ画面で タマゴを あたためてあげよう。';
  milmaruSpeech.textContent = 'すぅ...';
} else if (!hasStars(PLAY_STAR_COST)) {
  guideText.textContent = 'スターが たりないよ';
  messageBar.textContent = 'もじを かくと、あそぶための スターが もらえるよ。';
  milmaruSpeech.textContent = getStageSpeech('スターが たりないよ');
  mainPlayBtn.textContent = 'もじを かく！';
} else {
  resetGame();
}
renderCounts();

window.MojikkoToyPlayGame = {
  getState: () => JSON.parse(JSON.stringify(state)),
  resetRound,
  resetGame,
  applyPlayReward,
  goCare
};
</script>
