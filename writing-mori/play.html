<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>もじっこファーム | おもちゃひろば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="manifest" href="../manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@500;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #4f3825;
  --ink-soft: #7a5b41;
  --wood-dark: #6e4b2d;
  --wood-mid: #a66e3f;
  --paper: #fff8e8;
  --paper-deep: #f1ddb7;
  --mint: #7fcea5;
  --mint-dark: #3c986f;
  --coral: #ee7b6b;
  --gold: #f5bd4e;
  --blue: #70bde4;
  --shadow: rgba(70, 42, 18, 0.26);
  --pixel-font: 'DotGothic16', 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --round-font: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  --title-plaque: url('../assets/images/mojikko/writing/wood_title_plaque.png');
  --star-counter: url('../assets/images/mojikko/writing/star_counter.png');
  --settings-button: url('../assets/images/mojikko/writing/settings_button.png');
  --button-success: url('../assets/images/mojikko/writing/button_success_normal.png');
  --button-success-pressed: url('../assets/images/mojikko/writing/button_success_pressed.png');
  --button-retry: url('../assets/images/mojikko/writing/button_retry_wide_normal.png');
  --button-retry-pressed: url('../assets/images/mojikko/writing/button_retry_wide_pressed.png');
  --button-next: url('../assets/images/mojikko/writing/button_next_normal.png');
  --button-next-pressed: url('../assets/images/mojikko/writing/button_next_pressed.png');
  --milmaru-baby: url('../assets/images/mojikko/care/milmaru_shell_baby_idle_pose.png');
  --milmaru-baby-happy: url('../assets/images/mojikko/care/milmaru_shell_baby_arms_up.png');
  --milmaru-yochi: url('../assets/images/mojikko/care/milmaru_yochiyochi_front_happy.png');
  --milmaru-yochi-catch: url('../assets/images/mojikko/care/milmaru_yochiyochi_arms_up.png');
  --milmaru-yochi-worried: url('../assets/images/mojikko/care/milmaru_yochiyochi_worried.png');
  --milmaru-crawl-1: url('../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_01.png');
  --milmaru-crawl-2: url('../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_02.png');
  --milmaru-crawl-3: url('../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_03.png');
  --milmaru-crawl-4: url('../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_04.png');
  --milmaru-crawl-5: url('../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_05.png');
  --milmaru-crawl-6: url('../assets/images/mojikko/care/milmaru_yochiyochi_crawl_loop_06.png');
  --icon-star: url('../assets/images/mojikko/writing/icon_star.png');
  --fx-sparkle: url('../assets/images/mojikko/care/fx_sparkle_cluster.png');
  --rolling-bg: url('../assets/images/mojikko/play/rolling_ball_ground_background.png');
  --rolling-ball: url('../assets/images/mojikko/play/rolling_ball_orange_sprite_raw.png');
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  color: var(--ink);
  background: #20394b;
  font-family: var(--round-font);
  position: fixed;
  inset: 0;
}

button {
  font: inherit;
  color: inherit;
}

#stage-wrap {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: #20394b;
}

#stage {
  position: absolute;
  width: 1600px;
  height: 900px;
  transform-origin: 0 0;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.12) 0 1px, transparent 1px 8px),
    linear-gradient(90deg, rgba(255,255,255,0.10) 0 1px, transparent 1px 8px),
    var(--rolling-bg) center / cover no-repeat,
    linear-gradient(180deg, #a6dc7a, #bf8c52);
  image-rendering: pixelated;
}

.pixel-button {
  border: 0;
  cursor: pointer;
  image-rendering: pixelated;
  filter: drop-shadow(0 7px 0 rgba(61, 39, 24, 0.34));
}

.pixel-button:active {
  transform: translateY(4px);
  filter: drop-shadow(0 3px 0 rgba(61, 39, 24, 0.34));
}

.top-bar {
  position: absolute;
  left: 34px;
  right: 34px;
  top: 30px;
  height: 92px;
  display: grid;
  grid-template-columns: 220px 1fr 290px 78px;
  gap: 22px;
  align-items: center;
  z-index: 10;
}

.back-btn {
  width: 220px;
  height: 72px;
  border: 5px solid var(--wood-dark);
  border-radius: 8px;
  background: linear-gradient(#fff1c9, #f2be64);
  box-shadow: inset 0 0 0 6px rgba(255,255,255,0.28), 0 7px 0 #4b2f1e;
  font-family: var(--pixel-font);
  font-size: 30px;
  font-weight: 900;
}

.title-board {
  height: 90px;
  min-width: 640px;
  display: grid;
  place-items: center;
  background: var(--title-plaque) center / contain no-repeat;
  font-family: var(--pixel-font);
  font-size: 42px;
  font-weight: 900;
  letter-spacing: 0;
  text-shadow: 0 2px 0 rgba(255,255,255,0.35);
}

.resource-box,
.star-box {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  border: 5px solid var(--wood-dark);
  border-radius: 8px;
  background: linear-gradient(#fff9e8, #f2dcaa);
  box-shadow: inset 0 0 0 5px rgba(255,255,255,0.38), 0 6px 0 #4b2f1e;
  font-family: var(--pixel-font);
  font-size: 28px;
  font-weight: 900;
}

.star-box {
  width: 290px;
  background: var(--star-counter) center / contain no-repeat;
  border: 0;
  box-shadow: none;
  filter: drop-shadow(0 5px 0 rgba(61,39,24,0.3));
}

.star-icon {
  width: 42px;
  height: 42px;
  background: var(--icon-star) center / contain no-repeat;
}

.icon-btn {
  width: 74px;
  height: 74px;
  background: var(--settings-button) center / contain no-repeat;
  overflow: hidden;
  color: transparent;
  white-space: nowrap;
  text-indent: 120%;
}

.sub-sign {
  position: absolute;
  top: 120px;
  left: 50%;
  transform: translateX(-50%);
  width: 470px;
  height: 58px;
  display: grid;
  place-items: center;
  border: 5px solid #4f8f67;
  border-radius: 8px;
  background: linear-gradient(#8ad6a8, #56b87b);
  box-shadow: inset 0 0 0 5px rgba(255,255,255,0.22), 0 5px 0 #3b6849;
  color: #fff;
  font-family: var(--pixel-font);
  font-size: 27px;
  font-weight: 900;
  text-shadow: 0 2px 0 rgba(57,85,55,0.45);
  z-index: 9;
}

.panel {
  position: absolute;
  border: 5px solid var(--wood-dark);
  border-radius: 9px;
  background: linear-gradient(#fffaf0, #f5e5c2);
  box-shadow: inset 0 0 0 5px rgba(255,255,255,0.4), 0 8px 0 #4b2f1e, 0 16px 22px var(--shadow);
  overflow: hidden;
}

.panel-heading {
  min-height: 58px;
  display: grid;
  place-items: center;
  background: linear-gradient(#62c594, #45a773);
  color: #fff;
  border-bottom: 4px solid rgba(92, 61, 37, 0.3);
  font-family: var(--pixel-font);
  font-size: 31px;
  font-weight: 900;
  text-shadow: 0 2px 0 rgba(57,85,55,0.5);
}

.toy-panel {
  left: 42px;
  top: 168px;
  width: 280px;
  height: 538px;
}

.toy-grid {
  padding: 20px 18px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.toy-help {
  margin: 0 18px 18px;
  padding: 14px 13px;
  min-height: 142px;
  border: 4px dashed #d5b27e;
  border-radius: 8px;
  background: rgba(255,250,235,0.74);
  color: #5b3b28;
  font-family: var(--pixel-font);
  font-size: 17px;
  font-weight: 900;
  line-height: 1.34;
  white-space: pre-line;
}

.toy-card {
  position: relative;
  height: 126px;
  border: 4px solid #a0704c;
  border-radius: 8px;
  background: linear-gradient(#fff8e8, #efd6a7);
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.38), 0 5px 0 #7b5736;
  display: grid;
  place-items: center;
  gap: 4px;
  font-family: var(--pixel-font);
  font-size: 22px;
  font-weight: 900;
  cursor: pointer;
}

.toy-card.selected {
  background: linear-gradient(#ffe69a, #f4b944);
  border-color: #c3742f;
}

.toy-card.locked {
  opacity: 0.56;
  filter: saturate(0.55);
}

.toy-icon {
  width: 54px;
  height: 54px;
  display: grid;
  place-items: center;
  border: 3px solid rgba(107,73,44,0.3);
  border-radius: 8px;
  background: rgba(255,255,255,0.38);
  font-size: 35px;
}

.how-panel {
  right: 42px;
  top: 168px;
  width: 306px;
  height: 538px;
}

.steps {
  padding: 18px 16px 12px;
  display: grid;
  gap: 13px;
}

.step-card {
  height: 82px;
  display: grid;
  grid-template-columns: 56px 1fr;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border: 4px solid #b48961;
  border-radius: 8px;
  background: rgba(255,252,241,0.75);
  box-shadow: inset 0 0 0 3px rgba(255,255,255,0.36), 0 4px 0 rgba(103,72,45,0.35);
  font-family: var(--pixel-font);
  font-size: 23px;
  font-weight: 900;
}

.step-num {
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  border: 4px solid #946747;
  border-radius: 50%;
  background: #fff2cc;
}

.reward-hint {
  margin: 8px 18px 0;
  padding: 16px 14px;
  border: 4px dashed #d5b27e;
  border-radius: 8px;
  background: rgba(255,250,235,0.72);
  font-family: var(--pixel-font);
  font-size: 22px;
  font-weight: 900;
  line-height: 1.45;
}

.playfield {
  position: absolute;
  left: 350px;
  top: 190px;
  width: 900px;
  height: 540px;
  border: 7px solid var(--wood-dark);
  border-radius: 10px;
  background: var(--rolling-bg) center / cover no-repeat;
  box-shadow: inset 0 0 0 7px rgba(255,255,255,0.38), 0 10px 0 #4b2f1e, 0 18px 28px var(--shadow);
  overflow: hidden;
}

.playfield::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.18;
  background:
    linear-gradient(180deg, #fff 0 1px, transparent 1px 8px),
    linear-gradient(90deg, #fff 0 1px, transparent 1px 8px);
  pointer-events: none;
}

.playfield[data-toy]:not([data-toy="ball"]) .field-stars,
.playfield[data-toy]:not([data-toy="ball"]) .launch-pad,
.playfield[data-toy]:not([data-toy="ball"]) .target-ring,
.playfield[data-toy]:not([data-toy="ball"]) .prediction-svg,
.playfield[data-toy]:not([data-toy="ball"]) .landing-preview,
.playfield[data-toy]:not([data-toy="ball"]) .aim-line {
  display: none !important;
}

.playfield[data-toy]:not([data-toy="ball"]) .toy-ball {
  display: none;
}

.playfield[data-toy="rattle"] .power-meter {
  display: none;
}

.playfield[data-toy="rattle"] .toy-mode-board {
  left: 30px;
  top: 62px;
  width: 1148px;
  height: 420px;
  pointer-events: auto;
}

#stage[data-toy="rattle"] .how-panel {
  display: none;
}

#stage[data-toy="rattle"] .playfield {
  width: 1208px;
}

#stage[data-toy="rattle"] .status-strip {
  right: 42px;
}

#stage[data-toy="rattle"] .message-bar {
  right: 42px;
}

#stage[data-toy="rattle"] .bottom-actions {
  display: none;
}

#stage[data-toy="rattle"] .milmaru {
  left: 1032px;
  top: 382px;
  width: 70px;
  height: 70px;
  z-index: 2;
  opacity: 0.92;
}

#stage[data-toy="rattle"] .milmaru-speech {
  display: none;
}

.playfield[data-toy="blocks"] {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.55), transparent 34%),
    linear-gradient(180deg, #dff1ef 0 58%, #d6ad72 58% 100%);
}

.playfield[data-toy="blocks"]::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 42%;
  background:
    repeating-linear-gradient(90deg, rgba(122,78,44,0.12) 0 3px, transparent 3px 70px),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.15) 0 4px, transparent 4px 54px);
  pointer-events: none;
}

.playfield[data-toy="book"] .toy-ball {
  width: 110px;
  height: 82px;
}

.cloud {
  position: absolute;
  display: none;
  border-radius: 999px;
  background: rgba(255,255,255,0.88);
}

.cloud.one { width: 150px; height: 34px; left: 110px; top: 72px; }
.cloud.two { width: 205px; height: 42px; left: 568px; top: 92px; opacity: 0.74; }
.cloud::before,
.cloud::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  background: inherit;
}
.cloud::before { width: 70px; height: 70px; left: 28px; bottom: 6px; }
.cloud::after { width: 92px; height: 62px; left: 78px; bottom: 3px; }

.ground-stripe {
  position: absolute;
  display: none;
  left: 0;
  right: 0;
  bottom: 0;
  height: 108px;
  background:
    linear-gradient(90deg, rgba(86, 54, 31, 0.13) 0 22px, transparent 22px 46px),
    linear-gradient(#d8b46e, #a86d36);
  border-top: 6px solid rgba(101,67,39,0.45);
}

.lane {
  position: absolute;
  display: none;
  left: 80px;
  right: 80px;
  bottom: 100px;
  height: 20px;
  border: 4px solid rgba(120, 88, 52, 0.45);
  border-radius: 999px;
  background: repeating-linear-gradient(90deg, #fff7d5 0 25px, #ead09b 25px 42px);
}

.path-arc {
  position: absolute;
  display: none;
  left: 116px;
  top: 321px;
  width: 660px;
  height: 16px;
  border: 0;
  border-radius: 999px;
  background: repeating-linear-gradient(90deg, rgba(77, 175, 117, 0.78) 0 20px, transparent 20px 36px);
  opacity: 0.74;
  pointer-events: none;
  z-index: 2;
  transform: rotate(-2deg);
  transform-origin: left center;
}

.launch-pad {
  position: absolute;
  left: 46px;
  top: 196px;
  width: 156px;
  height: 72px;
  border: 5px solid #89603f;
  border-radius: 10px;
  background: rgba(255,248,225,0.75);
  box-shadow: inset 0 0 0 5px rgba(255,255,255,0.35), 0 6px 0 rgba(80,54,33,0.34);
  display: grid;
  place-items: center;
  font-family: var(--pixel-font);
  font-size: 19px;
  font-weight: 900;
  text-align: center;
  line-height: 1.25;
}

.target-ring {
  position: absolute;
  left: var(--target-x, 716px);
  top: var(--target-y, 332px);
  display: none;
  width: var(--target-w, 84px);
  height: var(--target-h, 84px);
  border: 6px dashed rgba(82, 184, 121, 0.92);
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transform: translate(-50%, -50%);
  animation: targetPulse 1.2s ease-in-out infinite;
  z-index: 4;
}

.target-ring::after {
  content: 'ねらい';
  position: absolute;
  left: -18px;
  top: -42px;
  padding: 4px 12px;
  border: 3px solid #8b6040;
  border-radius: 6px;
  background: #fff4cf;
  font-family: var(--pixel-font);
  font-size: 18px;
  font-weight: 900;
}

.target-ring.show {
  display: block;
}

@keyframes targetPulse {
  50% { transform: translate(-50%, -50%) scale(1.07); opacity: 0.72; }
}

.target-ring.tight {
  border-color: rgba(238, 123, 107, 0.92);
}

.target-ring.goal-hit {
  border-color: #58b97a;
  background: rgba(210, 255, 202, 0.38);
  animation: targetHit 760ms steps(2) both;
}

@keyframes targetHit {
  0% { transform: translate(-50%, -50%) scale(1); }
  45% { transform: translate(-50%, -50%) scale(1.18); filter: brightness(1.15); }
  100% { transform: translate(-50%, -50%) scale(1.03); }
}

.round-counter {
  position: absolute;
  left: 32px;
  top: 24px;
  min-width: 116px;
  height: 46px;
  display: grid;
  place-items: center;
  border: 4px solid #8b6040;
  border-radius: 8px;
  background: #fff4cf;
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.35), 0 4px 0 rgba(80,54,33,0.3);
  font-family: var(--pixel-font);
  font-size: 22px;
  font-weight: 900;
  z-index: 5;
}

.shot-pips {
  position: absolute;
  left: 168px;
  top: 25px;
  display: flex;
  gap: 11px;
  z-index: 5;
}

.shot-pip {
  width: 32px;
  height: 32px;
  border: 4px solid #8b6040;
  border-radius: 50%;
  background: #fff4cf;
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.35), 0 4px 0 rgba(80,54,33,0.28);
}

.shot-pip.used {
  background: #ead0a0;
}

.shot-pip.hit {
  background: #85dca7;
}

.field-stars {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}

.field-star {
  position: absolute;
  left: var(--star-x, 0px);
  top: var(--star-y, 0px);
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  color: #ffd558;
  font-family: var(--pixel-font);
  font-size: 34px;
  font-weight: 900;
  text-shadow:
    0 3px 0 #8e5b2e,
    3px 0 0 #fff4b8,
    -3px 0 0 #fff4b8,
    0 -3px 0 #fff4b8;
  transform: translate(-50%, -50%);
  filter: drop-shadow(0 5px 0 rgba(83, 54, 30, 0.22));
  animation: starBob 1.6s ease-in-out infinite;
}

.field-star::before {
  content: '★';
}

.field-star.collected {
  animation: starCollect 520ms steps(3) forwards;
}

.field-star.highlight {
  transform: translate(-50%, -50%) scale(1.22);
  filter: drop-shadow(0 0 10px rgba(255, 227, 98, 0.95));
}

@keyframes starBob {
  50% { transform: translate(-50%, calc(-50% - 6px)); }
}

@keyframes starCollect {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  100% { opacity: 0; transform: translate(-50%, -92%) scale(0.3) rotate(25deg); }
}

.power-meter {
  position: absolute;
  left: 284px;
  bottom: 28px;
  width: 332px;
  height: 68px;
  display: grid;
  grid-template-columns: 82px 1fr;
  align-items: center;
  gap: 8px;
  padding: 5px 9px;
  border: 4px solid #8b6040;
  border-radius: 8px;
  background: rgba(255,248,225,0.86);
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.32), 0 4px 0 rgba(80,54,33,0.28);
  font-family: var(--pixel-font);
  font-size: 20px;
  font-weight: 900;
  z-index: 5;
}

.power-meter.active {
  background: rgba(255,251,231,0.96);
  box-shadow:
    inset 0 0 0 4px rgba(255,255,255,0.42),
    0 4px 0 rgba(80,54,33,0.28),
    0 0 0 5px rgba(255, 218, 99, 0.35);
}

.power-track {
  position: relative;
  height: 31px;
  border: 3px solid #9b704b;
  border-radius: 999px;
  background:
    linear-gradient(90deg, #b7d9f3 0 34%, #86d7ac 34% 61%, #ffd56e 61% 78%, #ee7b6b 78% 100%);
  overflow: hidden;
}

.power-fill {
  display: block;
  width: var(--power, 0%);
  height: 100%;
  background: linear-gradient(90deg, #86d7ac, #f5bd4e, #ee7b6b);
  transition: width 90ms linear;
}

.timing-marker {
  position: absolute;
  display: none;
  left: var(--timing, 50%);
  top: -10px;
  width: 14px;
  height: 45px;
  border: 3px solid #6f462c;
  border-radius: 5px;
  background: #fffaf0;
  box-shadow: 0 4px 0 rgba(74,48,30,0.28);
  transform: translateX(-50%);
}

.power-meter.active .timing-marker {
  display: block;
}

.milmaru-speech {
  position: absolute;
  left: var(--speech-x, 708px);
  top: var(--speech-y, 154px);
  min-width: 118px;
  max-width: 210px;
  padding: 10px 14px;
  border: 4px solid #845b3d;
  border-radius: 12px;
  background: #fffaf0;
  box-shadow: 0 6px 0 rgba(84,54,32,0.3);

function fitStage() {
  const scale = Math.min(window.innerWidth / 1600, window.innerHeight / 900);
  const ox = (window.innerWidth - 1600 * scale) / 2;
  const oy = (window.innerHeight - 900 * scale) / 2;
  stageEl.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
}

function cloneDefaultState() {
  return JSON.parse(JSON.stringify(defaultState));
}

function sanitizeMilmaruName(value) {
  const text = String(value || '').trim().replace(/\s+/g, '');
  return text ? text.slice(0, 8) : 'ミルマル';
}

function loadState() {
  try {
    const saved = localStorage.getItem(CARE_STATE_KEY);
    if (!saved) return cloneDefaultState();
    const parsed = JSON.parse(saved);
    const merged = cloneDefaultState();
    merged.name = sanitizeMilmaruName(parsed.name || merged.name);
    merged.named = parsed.named === true;
    merged.nakayoshi = Number.isFinite(parsed.nakayoshi) ? parsed.nakayoshi : merged.nakayoshi;
    merged.gokigen = Number.isFinite(parsed.gokigen) ? parsed.gokigen : merged.gokigen;
    merged.sukusuku = Number.isFinite(parsed.sukusuku) ? parsed.sukusuku : merged.sukusuku;
    merged.eggWarmth = Number.isFinite(parsed.eggWarmth) ? parsed.eggWarmth : merged.eggWarmth;
    merged.hatched = parsed.hatched === true;
    merged.stars = Number.isFinite(parsed.stars) ? parsed.stars : merged.stars;
    if (!merged.hatched && merged.eggWarmth === 0 && merged.stars >= 1000) {
      merged.stars = 0;
    }
    merged.speech = parsed.speech || merged.speech;
    merged.reaction = parsed.reaction || merged.reaction;
    merged.lastStageId = parsed.lastStageId || merged.lastStageId;
    merged.lastCareAt = Number.isFinite(parsed.lastCareAt) ? parsed.lastCareAt : Date.now();
    merged.lastMoodAt = Number.isFinite(parsed.lastMoodAt) ? parsed.lastMoodAt : merged.lastCareAt;
    if (parsed.inventory) {
      Object.keys(merged.inventory).forEach((id) => {
        if (parsed.inventory[id]) merged.inventory[id].count = Math.max(0, Number(parsed.inventory[id].count) || 0);
      });
    }
    return merged;
  } catch (error) {
    console.warn('Could not load care state:', error);
    return cloneDefaultState();
  }
}

function getAudioContext() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return null;
  if (!audioCtx) audioCtx = new AudioContextClass();
  if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  return audioCtx;
}

function playTone(frequency, duration = 0.06, type = 'square', volume = 0.035, delay = 0) {
  const ctx = getAudioContext();
  if (!ctx) return;
  const start = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(volume, start + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.03);
}

function playSfx(kind) {
  try {
    if (kind === 'roll') {
      [430, 470, 520].forEach((freq, i) => playTone(freq, 0.045, 'triangle', 0.024, i * 0.055));
      return;
    }
    if (kind === 'success') {
      [620, 780, 980].forEach((freq, i) => playTone(freq, 0.07, 'square', 0.03, i * 0.06));
      return;
    }
    if (kind === 'drum') {
      playTone(118, 0.11, 'sine', 0.072);
      playTone(92, 0.13, 'sine', 0.06, 0.09);
      playTone(180, 0.045, 'triangle', 0.026);
      playTone(150, 0.045, 'triangle', 0.022, 0.09);
      return;
    }
    if (kind === 'drumCue') {
      playTone(128, 0.075, 'sine', 0.048);
      playTone(190, 0.035, 'triangle', 0.018);
      return;
    }
    if (kind === 'wood') {
      playTone(310, 0.045, 'triangle', 0.032);
      playTone(190, 0.06, 'triangle', 0.026, 0.045);
      return;
    }
    if (kind === 'fall') {
      [520, 430, 340].forEach((freq, i) => playTone(freq, 0.04, 'triangle', 0.022, i * 0.045));
      return;
    }
    if (kind === 'mistake') {
      playTone(220, 0.075, 'triangle', 0.024);
      return;
    }
    playTone(560, 0.045, 'square', 0.026);
  } catch (_) {}
}

function stopRhythmBgm() {
  clearTimeout(rhythmBgmTimer);
  rhythmBgmTimer = null;
}

function startRhythmBgm() {
  stopRhythmBgm();
  if (getToyConfig().mode !== 'rhythm' || controlPhase !== 'toy' || rhythmPaused) return;
  const tick = () => {
    if (getToyConfig().mode !== 'rhythm' || controlPhase !== 'toy' || rhythmPaused || playedThisRound || gameComplete) {
      stopRhythmBgm();
      return;
    }
    const elapsed = getRhythmElapsed(getToyConfig());
    const step = Math.floor(elapsed / 340);
    const root = step % 4 === 0;
    playTone(root ? 196 : 294, 0.055, 'triangle', root ? 0.018 : 0.012);
    if (step % 2 === 1) playTone(392, 0.035, 'square', 0.009, 0.05);
    rhythmBgmTimer = setTimeout(tick, 340);
  };
  rhythmBgmTimer = setTimeout(tick, 80);
}

function getStackSurfaceY() {
  return MINI_STACK.stageH - MINI_STACK.baseBottom;
}

function getStackFlatTilt(angle = 0) {
  const normalized = Math.atan2(Math.sin(angle), Math.cos(angle));
  const abs = Math.abs(normalized);
  return Math.min(abs, Math.abs(Math.PI - abs));
}

function stopStackPhysicsLoop() {
  cancelAnimationFrame(stackPhysicsFrame);
  stackPhysicsFrame = null;
  stackLastPhysicsAt = 0;
  stackSettleStartedAt = 0;
}

function createStackPhysicsWorld(resetBlocks = true) {
  stopStackPhysicsLoop();
  stackMatter = window.Matter || null;
  stackEngine = null;
  if (resetBlocks) stackBlocks = [];
  if (!stackMatter) return false;

  const { Engine, Bodies, World } = stackMatter;
  stackEngine = Engine.create({ gravity: { y: 1.05 } });
  const platformTop = getStackSurfaceY();
  const platform = Bodies.rectangle(
    MINI_STACK.baseLeft + MINI_STACK.baseW / 2,
    platformTop + 12,
    MINI_STACK.baseW,
    24,
    { isStatic: true, label: 'stack-platform', friction: 1.2, render: { visible: false } }
  );
  const ground = Bodies.rectangle(
    MINI_STACK.stageW / 2,
    MINI_STACK.stageH + 42,
    MINI_STACK.stageW * 2,
    84,
    { isStatic: true, label: 'stack-ground', render: { visible: false } }
  );
  const wallL = Bodies.rectangle(-34, MINI_STACK.stageH / 2, 68, MINI_STACK.stageH * 2, {
    isStatic: true,
    label: 'stack-wall',
    render: { visible: false }
  });
  const wallR = Bodies.rectangle(MINI_STACK.stageW + 34, MINI_STACK.stageH / 2, 68, MINI_STACK.stageH * 2, {
    isStatic: true,
    label: 'stack-wall',
    render: { visible: false }
  });
  World.add(stackEngine.world, [platform, ground, wallL, wallR]);
  return true;
}

function ensureStackPhysicsWorld() {
  if (stackEngine && stackMatter) return true;
  return createStackPhysicsWorld(false);
}

function createStackPhysicsBody(shape, centerX, centerY) {
  if (!ensureStackPhysicsWorld()) return null;
  const { Bodies } = stackMatter;
  return Bodies.rectangle(centerX, centerY, shape.w, shape.h, {
    restitution: 0.02,
    friction: 1.35,
    frictionStatic: 2.5,
    frictionAir: 0.055,
    slop: 0.015,
    label: 'mojikko-stack-block',
    render: { visible: false }
  });
}

function getStackBlockLeft(block) {
  return block.body ? block.body.position.x - block.w / 2 : block.x;
}

function getStackBlockTop(block) {
  return block.body ? block.body.position.y - block.h / 2 : MINI_STACK.stageH - (block.bottom || MINI_STACK.baseBottom) - block.h;
}

function takeStackSnapshot(block) {
  return {
    w: block.w,
    h: block.h,
    r: block.r,
    round: block.round,
    offset: block.offset || 0,
    x: getStackBlockLeft(block),
    y: getStackBlockTop(block),
    angle: block.body ? block.body.angle : 0
  };
}

function restoreStackSnapshot(snapshot) {
  createStackPhysicsWorld(true);
  if (!stackEngine || !stackMatter) {
    stackBlocks = snapshot.map((block) => ({ ...block, x: block.x, body: null }));
    return;
  }
  const { Body, World } = stackMatter;
  stackBlocks = snapshot.map((block) => {
    const body = createStackPhysicsBody(block, block.x + block.w / 2, block.y + block.h / 2);
    if (body) {
      Body.setAngle(body, block.angle || 0);
      Body.setVelocity(body, { x: 0, y: 0 });
      Body.setAngularVelocity(body, 0);
      World.add(stackEngine.world, body);
    }
    return { ...block, body, offset: block.offset || 0 };
  });
  toyStackCount = stackBlocks.length;
}

function stabilizeStackPhysicsBodies(includeDropping = false) {
  if (!stackMatter) return;
  const { Body } = stackMatter;
  const blocks = includeDropping && stackDroppingBlock
    ? [...stackBlocks, stackDroppingBlock]
    : stackBlocks;
  blocks.forEach((block) => {
    if (!block.body) return;
    Body.setVelocity(block.body, { x: 0, y: 0 });
    Body.setAngularVelocity(block.body, 0);
  });
}

function removeStackPhysicsBlock(block) {
  if (!stackMatter || !stackEngine || !block?.body) return;
  stackMatter.World.remove(stackEngine.world, block.body);
}

function isStackBodyOut(body) {
  return !body
    || body.position.y > MINI_STACK.stageH + 84
    || body.position.x < -90
    || body.position.x > MINI_STACK.stageW + 90;
}

function getStackPhysicsOutcome() {
  if (!stackDroppingBlock?.body) return getStackDropOutcome(true);
  const target = stackPreDropTarget || getStackTarget();
  const body = stackDroppingBlock.body;
  const shape = stackDroppingBlock;
  const targetCenter = target.left + target.width / 2;
  const offset = body.position.x - targetCenter;
  const allowed = getStackAllowedOffset(target, shape);
  const edgeRatio = Math.abs(offset) / Math.max(1, allowed);
  const droppedTilt = getStackFlatTilt(body.angle);
  const allBlocks = [...stackBlocks, stackDroppingBlock].filter((block) => block.body);
  const maxTilt = allBlocks.reduce((max, block) => Math.max(max, getStackFlatTilt(block.body.angle)), 0);
  const anyCollapsed = allBlocks.some((block) => isStackBodyOut(block.body) || getStackFlatTilt(block.body.angle) > 0.95);
  const landed = !isStackBodyOut(body) && body.position.y < MINI_STACK.stageH - 8;
  const collapse = anyCollapsed || droppedTilt > 0.62 || edgeRatio > 1.15;
  const success = landed && !collapse;
  return {
    physics: true,
    landed,
    success,
    collapse,
    wobble: success && (edgeRatio > 0.42 || droppedTilt > 0.12 || maxTilt > 0.15),
    offset,
    edgeRatio
  };
}

function startStackPhysicsSettlement() {
  if (!stackEngine || !stackMatter || !stackDroppingBlock?.body) {
    finishStackRound(getStackDropOutcome(true));
    return;
  }
  stopStackPhysicsLoop();
  const { Engine } = stackMatter;
  stackPhysicsStartedAt = performance.now();
  const tick = (now) => {
    if (controlPhase !== 'toy' || getToyConfig().mode !== 'stack' || gameComplete || !stackDroppingBlock) {
      stopStackPhysicsLoop();
      return;
    }
    const delta = stackLastPhysicsAt ? Math.min(now - stackLastPhysicsAt, 34) : 16.67;
    stackLastPhysicsAt = now;
    Engine.update(stackEngine, delta);
    renderToyBoard();

    const bodies = [...stackBlocks, stackDroppingBlock].map((block) => block.body).filter(Boolean);
    const maxMotion = bodies.reduce((max, body) => Math.max(max, body.speed + body.angularSpeed * 24), 0);
    const elapsed = now - stackPhysicsStartedAt;
    const droppedOut = isStackBodyOut(stackDroppingBlock.body);
    if (droppedOut && elapsed > 520) {
      finishStackRound(getStackPhysicsOutcome());
      return;
    }
    if (elapsed > 520 && maxMotion < 0.18) {
      if (!stackSettleStartedAt) stackSettleStartedAt = now;
      if (now - stackSettleStartedAt > 420) {
        finishStackRound(getStackPhysicsOutcome());
        return;
      }
    } else {
      stackSettleStartedAt = 0;
    }
    if (elapsed > 3100) {
      finishStackRound(getStackPhysicsOutcome());
      return;
    }
    stackPhysicsFrame = requestAnimationFrame(tick);
  };
  stackPhysicsFrame = requestAnimationFrame(tick);
}
