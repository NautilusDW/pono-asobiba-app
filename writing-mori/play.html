function getPlayfieldPoint(event) {
  const rect = playfield.getBoundingClientRect();
  const scale = rect.width / 900;
  return {
    x: clamp((event.clientX - rect.left) / scale, 28, 872),
    y: clamp((event.clientY - rect.top) / scale, 48, 496)
  };
}

function getAimDirection(point) {
  const dx = point.x - LAUNCH_CENTER.x;
  const dy = point.y - LAUNCH_CENTER.y;
  const distance = Math.hypot(dx, dy);
  if (distance < 18) return null;
  return {
    x: dx / distance,
    y: dy / distance,
    angle: Math.atan2(dy, dx)
  };
}

function getDirectionalEnd(direction, rollDistance) {
  return {
    x: clamp(LAUNCH_CENTER.x + direction.x * rollDistance, 36, 850),
    y: clamp(LAUNCH_CENTER.y + direction.y * rollDistance, 64, 470)
  };
}

function buildAimPlan(point) {
  const direction = getAimDirection(point);
  if (!direction) return null;
  const end = getDirectionalEnd(direction, MAX_ROLL);
  return {
    end,
    direction,
    power: 0,
    routeHits: [],
    angle: direction.angle,
    aimingOnly: true
  };
}

function buildPowerPlan(power = powerValue) {
  const direction = lockedAim?.direction || { x: 1, y: 0, angle: 0 };
  const rollDistance = MIN_ROLL + clamp(power, 0, 1) * (MAX_ROLL - MIN_ROLL);
  const end = {
    x: clamp(LAUNCH_CENTER.x + direction.x * rollDistance, 36, 850),
    y: clamp(LAUNCH_CENTER.y + direction.y * rollDistance, 64, 470)
  };
  const routeHits = getStarsOnRoute(getMilmaruCenter(), end);
  return {
    end,
    direction,
    power,
    routeHits,
    angle: direction.angle,
    aimingOnly: false
  };
}

function getSegmentProgress(point, start, end) {
  const dx = end.x - start.x;
  const dy = end.y - start.y;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return 0;
  return clamp(((point.x - start.x) * dx + (point.y - start.y) * dy) / len2, 0, 1);
}

function distanceToSegment(point, start, end) {
  const dx = end.x - start.x;
  const dy = end.y - start.y;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(point.x - start.x, point.y - start.y);
  const t = clamp(((point.x - start.x) * dx + (point.y - start.y) * dy) / len2, 0, 1);
  const px = start.x + dx * t;
  const py = start.y + dy * t;
  return Math.hypot(point.x - px, point.y - py);
}

function getStarsOnRoute(start, end) {
  return fieldStars
    .map((star, index) => ({ star, index, routeT: getSegmentProgress(star, start, end) }))
    .filter(({ star }) => !star.collected)
    .filter(({ star }) =>
      distanceToSegment(star, start, end) <= STAR_ROUTE_RADIUS ||
      Math.hypot(star.x - end.x, star.y - end.y) <= STAR_COLLECT_RADIUS
    )
    .sort((a, b) => a.routeT - b.routeT);
}

function hidePrediction() {
  predictionSvg.classList.remove('show', 'safe');
  predictionPath.setAttribute('d', '');
  landingPreview.classList.remove('show', 'safe', 'miss');
  goalBurst.classList.remove('show', 'miss');
  targetRing.classList.remove('show', 'goal-hit');
  document.querySelectorAll('.field-star.highlight').forEach((el) => el.classList.remove('highlight'));
}

function showAim(plan) {
  currentAim = plan;
  const safe = plan.routeHits.length > 0;
  predictionSvg.classList.toggle('safe', safe);
  predictionSvg.classList.add('show');
  predictionPath.setAttribute('d', `M ${LAUNCH_CENTER.x} ${LAUNCH_CENTER.y} L ${plan.end.x} ${plan.end.y}`);
  aimLine.classList.remove('show');
  powerFill.style.setProperty('--power', `${Math.round(plan.power * 100)}%`);
  timingMarker.style.setProperty('--timing', `${Math.round(plan.power * 100)}%`);
  setLandingPreview(
    plan.end,
    plan.aimingOnly ? 'むき' : (safe ? '星へ' : 'ここ'),
    !plan.aimingOnly && safe ? 'safe' : ''
  );
  targetRing.style.setProperty('--target-x', `${plan.end.x}px`);
  targetRing.style.setProperty('--target-y', `${plan.end.y}px`);
  targetRing.classList.add('show');
  document.querySelectorAll('.field-star.highlight').forEach((el) => el.classList.remove('highlight'));
  plan.routeHits.forEach(({ index }) => {
    fieldStarsEl.querySelector(`[data-star-index="${index}"]`)?.classList.add('highlight');
  });
}

function setLandingPreview(point, label, mode = '') {
  landingPreview.style.left = `${point.x}px`;
  landingPreview.style.top = `${point.y}px`;
  landingPreviewText.textContent = label;
  landingPreview.classList.remove('safe', 'miss');
  if (mode) landingPreview.classList.add(mode);
  landingPreview.classList.add('show');
}

function showGoalBurst(point, label, isGood = true) {
  goalBurst.classList.remove('show', 'miss');
  goalBurst.textContent = label;
  goalBurst.style.setProperty('--burst-x', `${clamp(point.x, 120, 780)}px`);
  goalBurst.style.setProperty('--burst-y', `${Math.max(72, point.y - 46)}px`);
  goalBurst.classList.toggle('miss', !isGood);
  void goalBurst.offsetWidth;
  goalBurst.classList.add('show');
}

function stopPowerMeter() {
  cancelAnimationFrame(powerFrame);
  powerFrame = null;
  lastPowerFrameAt = 0;
  powerMeter?.classList.remove('active');
}

function startPowerMeter() {
  stopPowerMeter();
  controlPhase = 'power';
  powerValue = 0.42;
  powerDirection = 1;
  powerMeter.classList.add('active');
  mainPlayBtn.textContent = 'ここで おす！';
  guideText.textContent = 'ちからを きめよう';
  messageBar.textContent = 'ゲージを見て、ちょうどいいところで おしてね。';
  playSfx('button');

  const tick = (now) => {
    if (controlPhase !== 'power') {
      stopPowerMeter();
      return;
    }
    if (!lastPowerFrameAt) lastPowerFrameAt = now;
    const delta = Math.min(0.05, (now - lastPowerFrameAt) / 1000);
    lastPowerFrameAt = now;
    powerValue += powerDirection * delta * 0.78;
    if (powerValue >= 1) {
      powerValue = 1;
      powerDirection = -1;
    } else if (powerValue <= 0) {
      powerValue = 0;
      powerDirection = 1;
    }
    showAim(buildPowerPlan(powerValue));
    powerFrame = requestAnimationFrame(tick);
  };
  showAim(buildPowerPlan(powerValue));
  powerFrame = requestAnimationFrame(tick);
}

function confirmPower() {
  if (controlPhase !== 'power' || playedThisRound || gameComplete) return;
  const plan = buildPowerPlan(powerValue);
  stopPowerMeter();
  controlPhase = 'rolling';
  launchBall(plan);
}

function startMilmaruRoam() {
  stopMilmaruRoam();
  if (!state.hatched || isMilmaruBusy || gameComplete) return;
  const delay = 1800 + Math.random() * 2600;
  roamTimer = setTimeout(() => {
    if (isMilmaruBusy || isAiming || controlPhase !== 'aim' || playedThisRound || gameComplete) {
      startMilmaruRoam();
      return;
    }
    const next = {
      x: MILMARU_FIELD.minX + Math.random() * (MILMARU_FIELD.maxX - MILMARU_FIELD.minX),
      y: MILMARU_FIELD.minY + Math.random() * (MILMARU_FIELD.maxY - MILMARU_FIELD.minY)
    };
    moveMilmaruTo(next, {
      speed: 20 + Math.random() * 16,
      maxDuration: 8200,
      after: startMilmaruRoam
    });
  }, delay);
}

function stopMilmaruRoam() {
  clearTimeout(roamTimer);
  roamTimer = null;
}

function moveMilmaruTo(point, options = {}) {
  const target = {
    x: clamp(point.x - MILMARU_SIZE / 2, MILMARU_FIELD.minX, MILMARU_FIELD.maxX),
    y: clamp(point.y - MILMARU_SIZE / 2, MILMARU_FIELD.minY, MILMARU_FIELD.maxY)
  };
  const distance = Math.hypot(target.x - milmaruPosition.x, target.y - milmaruPosition.y);
  const duration = clamp((distance / (options.speed || 34)) * 1000, 1200, options.maxDuration || 7000);
  milmaru.classList.add('crawling');
  milmaruSpeech.classList.add('hide');
  setMilmaruPosition(target, { duration, updateSpeech: false });
  setTimeout(() => {
    milmaru.classList.remove('crawling');
    positionSpeechToMilmaru();
    milmaruSpeech.classList.remove('hide');
    options.after?.();
  }, duration + 80);
  return duration;
}

function resetRound(options = {}) {
  if (!isBallGame()) {
    resetToyMiniGame(options);
    return;
  }
  cancelAnimationFrame(animationFrame);
  animationFrame = null;
  stopPowerMeter();
  isAiming = false;
  controlPhase = 'aim';
  currentAim = null;
  lockedAim = null;
  playedThisRound = false;
  isMilmaruBusy = false;
  ball.classList.remove('dragging', 'rolling');
  milmaru.classList.remove('catch', 'worried', 'crawling');
  milmaruSpeech.classList.remove('hide');
  aimLine.classList.remove('show');
  hidePrediction();
  setBallCenter(LAUNCH_CENTER.x, LAUNCH_CENTER.y);
  ball.style.setProperty('--ball-rotation', '0deg');
  resetPowerMeter();
  if (!options.keepModal) {
    resultModal.classList.remove('show');
    resultModal.setAttribute('aria-hidden', 'true');
  }
  updateToyUi();
  updateRoundUi();
  mainPlayBtn.textContent = 'あそびなおす';
  guideText.textContent = `${currentRound}こめ：むきを きめよう`;
  messageBar.textContent = `${getToyConfig().label}をひっぱって、まずは むきをきめよう。`;
  milmaruSpeech.textContent = getStageSpeech('みゅっ♪');
  startMilmaruRoam();
}

function getMiniResultText(result, index) {
  if (result === 'hit') return '○';
  if (result === 'miss') return '×';
  return index === currentRound - 1 ? getToyConfig().icon : '';
}

function renderMiniRoundMarks() {
  return Array.from({ length: TOTAL_ROUNDS }, (_, index) => {
    const result = shotResults[index];
    const className = [
      'rattle-note',
      result === 'hit' ? 'hit' : '',
      result === 'miss' ? 'miss' : '',
      !result && index === currentRound - 1 ? 'active' : ''
    ].filter(Boolean).join(' ');
    return `<span class="${className}">${getMiniResultText(result, index)}</span>`;
  }).join('');
}

function getStackShapeForRound(round) {
  if (round <= 2) return MINI_STACK.shapes[0];
  if (round <= 4) return MINI_STACK.shapes[(round - 1) % 2];
  return MINI_STACK.shapes[2];
}

function getStackHeight() {
  return stackBlocks
    .filter((block) => !block.body)
    .reduce((sum, block) => sum + block.h - 3, 0);
}

function getStackTarget() {
  if (!stackBlocks.length) {
    return {
      left: MINI_STACK.baseLeft,
      width: MINI_STACK.baseW,
      bottom: MINI_STACK.baseBottom,
      height: 0,
      surfaceBottom: MINI_STACK.baseBottom
    };
  }
  const physicsTop = stackBlocks
    .filter((block) => block.body && !isStackBodyOut(block.body))
    .sort((a, b) => a.body.bounds.min.y - b.body.bounds.min.y)[0];
  if (physicsTop) {
    return {
      left: physicsTop.body.position.x - physicsTop.w / 2,
      width: physicsTop.w,
      bottom: MINI_STACK.stageH - physicsTop.body.bounds.min.y,
      height: 0,
      surfaceBottom: MINI_STACK.stageH - physicsTop.body.bounds.min.y
    };
  }
  const top = stackBlocks[stackBlocks.length - 1];
  const surfaceBottom = MINI_STACK.baseBottom + getStackHeight();
  return {
    left: top.x,
    width: top.w,
    bottom: surfaceBottom - top.h,
    height: top.h,
    surfaceBottom
  };
}

function isStackDropSuccess() {
  if (getToyConfig().mode !== 'stack') return false;
  const target = getStackTarget();
  const shape = currentStackShape || MINI_STACK.shapes[0];
  const blockCenter = stackSwingX + shape.w / 2;
  const targetCenter = target.left + target.width / 2;
  return Math.abs(blockCenter - targetCenter) <= getStackAllowedOffset(target, shape);
}

function getStackAllowedOffset(target, shape) {
  const base = Math.min(target.width, shape.w) * 0.52;
  return Math.max(42, base + MINI_STACK.bonus);
}

function getStackDropOutcome(landed) {
  if (!landed) return { landed: false, success: false, collapse: false, wobble: false, offset: 0, edgeRatio: 0 };
  const target = getStackTarget();
  const shape = currentStackShape || MINI_STACK.shapes[0];
  const blockCenter = stackSwingX + shape.w / 2;
  const targetCenter = target.left + target.width / 2;
  const offset = blockCenter - targetCenter;
  const allowed = getStackAllowedOffset(target, shape);
  const edgeRatio = Math.abs(offset) / allowed;
  const previousLean = stackBlocks.reduce((sum, block) => sum + Math.abs(block.offset || 0) / Math.max(44, block.w * 0.5), 0);
  const collapse = stackBlocks.length >= 1 && (edgeRatio > 0.88 || (stackBlocks.length >= 2 && previousLean + edgeRatio > 2.05));
  return {
    landed: true,
    success: !collapse,
    collapse,
    wobble: edgeRatio > 0.52 || previousLean + edgeRatio > 1.18,
    offset,
    edgeRatio
  };
}

function getStackDropTop(shape, success) {
  const target = getStackTarget();
  const landingBottom = success ? target.bottom : MINI_STACK.baseBottom - 8;
  return clamp(MINI_STACK.stageH - landingBottom - shape.h, 52, MINI_STACK.stageH - shape.h - 6);
}

function getRhythmPattern(config = getToyConfig()) {
  const patterns = config.patterns || [[960, 1500, 2040]];
  return patterns[(Math.max(1, currentRound) - 1) % patterns.length];
}

function getRhythmElapsed(config = getToyConfig()) {
  return clamp(rhythmProgress, 0, 1.2) * (config.measureMs || 2720);
}

function getHittableRhythmNote() {
  const config = getToyConfig();
  const elapsed = getRhythmElapsed(config);
  const hitWindow = config.hitWindowMs || 190;
  let best = { index: -1, distance: Infinity };
  getRhythmPattern(config).forEach((hitMs, index) => {
    if (rhythmNoteResults[index]) return;
    const distance = Math.abs(elapsed - hitMs);
    if (distance <= hitWindow && distance < best.distance) {
      best = { index, distance };
    }
  });
  return best.index;
}

function renderRhythmBeatPips(pattern) {
  const nextIndex = pattern.findIndex((_, index) => !rhythmNoteResults[index]);
  return pattern.map((_, index) => {
    const result = rhythmNoteResults[index];
    const className = [
      'taiko-beat-pip',
      result === 'hit' ? 'hit' : '',
      result === 'miss' ? 'miss' : '',
      !result && index === nextIndex ? 'next' : ''
    ].filter(Boolean).join(' ');
    return `<span class="${className}">${result === 'hit' ? '○' : result === 'miss' ? '×' : index + 1}</span>`;
  }).join('');
}

function getTaikoMotion(config, isCountingDown) {
  const pattern = getRhythmPattern(config);
  const elapsed = controlPhase === 'toy' ? getRhythmElapsed(config) : 0;
  const hitWindow = config.hitWindowMs || 190;
  const previewOnly = controlPhase === 'ready' || isCountingDown;
  const notes = [];
  let hitWave = 0;

  if (previewOnly) {
    notes.push({ index: 0, x: RHYTHM_LANE.startX, state: 'preview', active: false });
  } else {
    pattern.forEach((hitMs, index) => {
      const result = rhythmNoteResults[index];
      const appearAt = hitMs - RHYTHM_LANE.leadMs;
      const leaveAt = hitMs + RHYTHM_LANE.exitMs;
      if (result === 'hit' || elapsed < appearAt || elapsed > leaveAt) return;
      const beforeHit = elapsed <= hitMs;
      const x = beforeHit
        ? RHYTHM_LANE.startX + (RHYTHM_LANE.hitX - RHYTHM_LANE.startX) * ((elapsed - appearAt) / RHYTHM_LANE.leadMs)
        : RHYTHM_LANE.hitX + (RHYTHM_LANE.endX - RHYTHM_LANE.hitX) * ((elapsed - hitMs) / RHYTHM_LANE.exitMs);
      const proximity = Math.max(0, 1 - Math.abs(elapsed - hitMs) / hitWindow);
      if (!result) hitWave = Math.max(hitWave, proximity);
      notes.push({
        index,
        x: clamp(x, RHYTHM_LANE.endX, RHYTHM_LANE.startX),
        state: result || '',
        active: proximity > 0.3 && !result
      });
    });
  }

  const hitReady = hitWave > 0.3;
  const down = hitWave;
  const idle = previewOnly ? 0 : Math.sin((elapsed / 1000) * Math.PI * 2) * 5;
  const bachiY = 44 + down * 44 + idle * (1 - down);
  return {
    hitReady,
    hitWave,
    notes,
    beatPips: renderRhythmBeatPips(pattern),
    bachiStyle: [
      `--bachi-y:${bachiY.toFixed(1)}px`,
      `--bachi-left-angle:${(-25 + down * 16).toFixed(1)}deg`,
      `--bachi-right-angle:${(25 - down * 16).toFixed(1)}deg`,
      `--taiko-scale:${(1 + hitWave * 0.04).toFixed(3)}`,
      `--hit-x:${RHYTHM_LANE.hitX}px`
    ].join(';')
  };
}

function renderStackBlockHtml(block, extraClasses = [], label = block.round || '') {
  const classes = ['stack-block', ...extraClasses];
  const style = [
    `--block-w:${block.w}px`,
    `--block-h:${block.h}px`,
    `border-radius:${block.r}px`
  ];
  if (block.body) {
    classes.push('physics');
    style.push(`--block-x:${(block.body.position.x - block.w / 2).toFixed(1)}px`);
    style.push(`--block-y:${(block.body.position.y - block.h / 2).toFixed(1)}px`);
    style.push(`--block-angle:${block.body.angle.toFixed(3)}rad`);
  } else {
    style.push(`--block-x:${Math.round(block.x)}px`);
    style.push(`--block-bottom:${Math.round(block.bottom || MINI_STACK.baseBottom)}px`);
  }
  if (block.offset < 0) {
    style.push('--collapse-dir:-1');
  } else {
    style.push('--collapse-dir:1');
  }
  return `<div class="${classes.join(' ')}" style="${style.join('; ')};">${label}</div>`;
}

function renderToyBoard(feedback = lastToyFeedback) {
  if (!toyModeBoard) return;
  if (isBallGame()) {
    toyModeBoard.innerHTML = '';
    return;
  }
  const config = getToyConfig();
  const cardState = feedback === 'hit' ? ' is-hit' : feedback === 'miss' ? ' is-miss' : '';
  const roundText = `${Math.min(currentRound, TOTAL_ROUNDS)} / ${TOTAL_ROUNDS}`;
  const percent = Math.round(powerValue * 100);
  const isGood = powerValue >= config.goodMin && powerValue <= config.goodMax;

  if (config.mode === 'rhythm') {
    const isCountingDown = controlPhase === 'countdown' && rattleCountdownValue;
    const motion = getTaikoMotion(config, isCountingDown);
    const hitReady = motion.hitReady;
    const isReady = controlPhase === 'ready';
    const readyButton = isReady ? '<button class="taiko-start-button" type="button" data-taiko-start="true">はじめる</button>' : '';
    const pauseButton = controlPhase === 'toy'
      ? `<button class="taiko-pause-button" type="button" data-taiko-pause="true">${rhythmPaused ? 'つづける' : 'ポーズ'}</button>`
      : '';
    const pauseCover = rhythmPaused ? '<div class="taiko-paused-cover"><div class="taiko-paused-card">おやすみ中</div></div>' : '';
    const noteHtml = motion.notes.map((note) =>
      `<div class="taiko-note ${note.active ? 'active' : ''} ${note.state === 'miss' ? 'miss' : ''}" style="--note-x:${note.x.toFixed(1)}px">ドン</div>`
    ).join('');
    toyModeBoard.innerHTML = `
      <div class="toy-mode-card rattle-game${cardState}" style="${motion.bachiStyle}">
        ${isCountingDown ? `<div class="rattle-countdown">${rattleCountdownValue}</div>` : `<div class="rattle-now ${hitReady ? 'active' : ''}">${hitReady ? 'いま！ドン！' : isReady ? 'じゅんびOK' : rhythmPaused ? 'ポーズ中' : '音符をみて'}</div>`}
        <div class="taiko-toy">
          <div class="taiko-stand"></div>
          <div class="taiko-bachi left ${hitReady ? 'active' : ''}"></div>
          <div class="taiko-bachi right ${hitReady ? 'active' : ''}"></div>
          <div class="taiko-drum ${hitReady ? 'active' : ''}"></div>
          <div class="taiko-hit-splash ${hitReady ? 'active' : ''}"></div>
          <div class="taiko-lane" aria-hidden="true">
            <div class="taiko-lane-track"></div>
            <div class="taiko-hit-line ${hitReady ? 'active' : ''}"></div>
            <div class="taiko-note-tail"></div>
            ${noteHtml}
          </div>
          <div class="taiko-beat-pips">${motion.beatPips}</div>
        </div>
        ${readyButton}
        ${pauseButton}
        ${pauseCover}
        <div class="rattle-target">${renderMiniRoundMarks()}</div>
        <div class="rattle-tap-cue ${hitReady ? 'active' : ''}">${hitReady ? 'ドン！' : isReady ? '音符が丸にきたら ドン！' : rhythmPaused ? 'つづけるを おそう' : 'まるに きたら ドン'}</div>
      </div>
    `;
    return;
  }

  if (config.mode === 'stack') {
    const target = getStackTarget();
    let bottom = MINI_STACK.baseBottom;
    const placedBlocks = stackBlocks.map((block, index) => {
      if (!block.body) {
        block.bottom = bottom;
        bottom += block.h - 3;
      }
      const classes = ['hit'];
      if (stackCollapseActive && !block.body) classes.push('collapse');
      return renderStackBlockHtml(block, classes, index + 1);
    }).join('');
    const shape = currentStackShape || MINI_STACK.shapes[0];
    const ghostLeft = Math.round(stackSwingX);
    const successNow = isStackDropSuccess();
    const ghost = currentRound <= TOTAL_ROUNDS && !playedThisRound && !stackDroppingBlock
      ? `<div class="stack-block ghost ${successNow ? 'good' : ''}" style="--block-x:${ghostLeft}px; --block-w:${shape.w}px; --block-h:${shape.h}px; border-radius:${shape.r}px;">${currentRound}</div>`
      : '';
    const dropping = stackDroppingBlock
      ? renderStackBlockHtml(
          stackDroppingBlock,
          [
            'falling',
            stackDroppingBlock.success === false ? 'miss' : 'hit',
            stackDroppingBlock.collapse ? 'collapse' : ''
          ].filter(Boolean),
          stackDroppingBlock.round
        )
      : '';
    toyModeBoard.innerHTML = `
      <div class="toy-mode-card block-game${cardState}">
        <div class="toy-mode-title">ゆれる つみきを おとそう</div>
        <div class="toy-round-label">${roundText}</div>
        <div class="block-stack ${stackWobbleActive ? 'wobble' : ''} ${stackCollapseActive ? 'collapse' : ''}">
          <div class="stack-swing-rail"></div>
          <div class="stack-target-window" style="--target-left:${target.left}px; --target-width:${target.width}px; --target-bottom:${(target.surfaceBottom || target.bottom + target.height) + 4}px;"></div>
          <div class="block-base-line"></div>
          ${placedBlocks}
          ${ghost}
          ${dropping}
        </div>
        <div class="toy-mode-help">タップで おとす</div>
      </div>
    `;
    return;
  }

  const pages = ['あ', 'い', 'う', 'え', 'お'];
  const page = pages[Math.min(currentRound - 1, pages.length - 1)];
  const nextPage = pages[Math.min(currentRound, pages.length - 1)] || '☆';
  const cornerState = feedback === 'hit' ? ' hit' : feedback === 'miss' ? ' miss' : ' active';
  toyModeBoard.innerHTML = `
    <div class="toy-mode-card book-game${cardState}">
      <div class="toy-mode-title">ページを めくろう</div>
      <div class="toy-round-label">${roundText}</div>
      <div class="book-pages">
        <div class="book-page done">${page}</div>
        <div class="book-page">${nextPage}</div>
        <div class="book-corner${cornerState}">↗</div>
      </div>
      <div class="toy-mode-help">ひかるときに タップ</div>
    </div>
  `;
}

function clearRattleCountdown() {
  rattleCountdownTimers.forEach((timer) => clearTimeout(timer));
  rattleCountdownTimers = [];
  rattleCountdownValue = '';
}

function startRattleCountdown() {
  const config = getToyConfig();
  clearRattleCountdown();
  controlPhase = 'countdown';
  rhythmProgress = 0;
  rhythmCuePlayed = false;
  rhythmCueMarks = [];
  rhythmNoteResults = [];
  rhythmLastHitIndex = -1;
  rhythmMeasureHits = 0;
  rhythmPaused = false;
  rhythmPauseStartedAt = 0;
  stopRhythmBgm();
  lastToyFeedback = '';
  rattleCountdownValue = '3';
  document.querySelector('.sub-sign').textContent = '3・2・1で はじめるよ！';
  mainPlayBtn.textContent = 'まってね';
  guideText.textContent = '3・2・1で はじめるよ';
  messageBar.textContent = 'カウントのあと、音符がみどりの丸にきたらドン！';
  powerMeter.classList.remove('active');
  renderToyBoard();

  ['2', '1', 'いくよ'].forEach((value, index) => {
    const timer = setTimeout(() => {
      rattleCountdownValue = value;
      playSfx(value === 'いくよ' ? 'success' : 'button');
      renderToyBoard();
    }, (index + 1) * 650);
    rattleCountdownTimers.push(timer);
  });

  const startTimer = setTimeout(() => {
    rattleCountdownDone = true;
    rattleCountdownValue = '';
    startRhythmRound();
  }, 2600);
  rattleCountdownTimers.push(startTimer);
}

function startToyMeter() {
  if (isBallGame() || gameComplete) return;
  stopPowerMeter();
  const config = getToyConfig();
  controlPhase = 'toy';
  rhythmProgress = 0;
  rhythmCuePlayed = false;
  miniRoundStartedAt = performance.now();
  if (config.mode === 'rhythm') {
    startRhythmRound();
    return;
  }
  if (config.mode === 'stack') {
    startStackRound();
    return;
  }
  powerValue = 0.14;
  powerDirection = 1;
  lastPowerFrameAt = 0;
  lastToyFeedback = '';
  powerMeter.classList.add('active');
  mainPlayBtn.textContent = config.actionText || 'おす！';
  guideText.textContent = `${currentRound}かいめ：${config.actionText || 'おす！'}`;
  messageBar.textContent = config.rewardHint.replace(/<br>/g, '。');
  renderToyBoard();

  const tick = (now) => {
    if (controlPhase !== 'toy' || isBallGame() || gameComplete || playedThisRound) {
      stopPowerMeter();
      return;
    }
    if (!lastPowerFrameAt) lastPowerFrameAt = now;
    const delta = Math.min(0.05, (now - lastPowerFrameAt) / 1000);
    lastPowerFrameAt = now;
    powerValue += powerDirection * delta * (config.meterSpeed || 0.5);
    if (powerValue >= 1) {
      powerValue = 1;
      powerDirection = -1;
    } else if (powerValue <= 0) {
      powerValue = 0;
      powerDirection = 1;
    }
    powerFill.style.setProperty('--power', `${Math.round(powerValue * 100)}%`);
    timingMarker.style.setProperty('--timing', `${Math.round(powerValue * 100)}%`);
    renderToyBoard();
    powerFrame = requestAnimationFrame(tick);
  };
  powerFrame = requestAnimationFrame(tick);
}

function startRhythmRound() {
  const config = getToyConfig();
  const pattern = getRhythmPattern(config);
  controlPhase = 'toy';
  powerValue = 0;
  rhythmProgress = 0;
  rhythmCuePlayed = false;
  rhythmCueMarks = Array(pattern.length).fill(false);
  rhythmNoteResults = Array(pattern.length).fill('');
  rhythmLastHitIndex = -1;
  rhythmMeasureHits = 0;
  rhythmPaused = false;
  rhythmPauseStartedAt = 0;
  miniRoundStartedAt = performance.now();
  lastPowerFrameAt = 0;
  lastToyFeedback = '';
  powerMeter.classList.remove('active');
  powerFill.style.setProperty('--power', '0%');
  timingMarker.style.setProperty('--timing', '0%');
  document.querySelector('.sub-sign').textContent = '音符が まるにきたら タップ！';
  mainPlayBtn.textContent = config.actionText || 'ふる！';
  guideText.textContent = `${currentRound}回目：まるにきたら ドン！`;
  messageBar.textContent = '音符がみどりの丸に重なるところで、ドン！と押そう。';
  renderToyBoard();
  startRhythmBgm();

  const tick = (now) => {
    if (controlPhase !== 'toy' || getToyConfig().mode !== 'rhythm' || gameComplete || playedThisRound) {
      stopRhythmBgm();
      stopPowerMeter();
      return;
    }
    if (rhythmPaused) {
      powerFrame = requestAnimationFrame(tick);
      return;
    }
    const elapsed = now - miniRoundStartedAt;
    const measureMs = config.measureMs || 2720;
    rhythmProgress = elapsed / measureMs;
    powerValue = clamp(rhythmProgress, 0, 1);
    pattern.forEach((hitMs, index) => {
      if (!rhythmCueMarks[index] && elapsed >= hitMs - 90) {
        rhythmCueMarks[index] = true;
        playSfx('drumCue');
      }
      if (!rhythmNoteResults[index] && elapsed > hitMs + (config.passWindowMs || 245)) {
        rhythmNoteResults[index] = 'miss';
        lastToyFeedback = 'miss';
      }
    });
    renderToyBoard();
    if (elapsed >= measureMs) {
      finishRhythmMeasure();
      return;
    }
    powerFrame = requestAnimationFrame(tick);
  };
  powerFrame = requestAnimationFrame(tick);
}

function handleRhythmAction() {
  const config = getToyConfig();
  if (controlPhase === 'ready') {
    startRattleCountdown();
    return;
  }
  if (controlPhase !== 'toy' || rhythmPaused || playedThisRound || gameComplete) return;
  const noteIndex = getHittableRhythmNote();
  if (noteIndex < 0) {
    playSfx('mistake');
    lastToyFeedback = 'miss';
    guideText.textContent = 'まるに きたら ドン！';
    messageBar.textContent = '音符がみどりの丸に重なるところをねらおう。';
    renderToyBoard('miss');
    setTimeout(() => {
      if (controlPhase === 'toy' && !playedThisRound) {
        lastToyFeedback = '';
        renderToyBoard();
      }
    }, 240);
    return;
  }
  rhythmNoteResults[noteIndex] = 'hit';
  rhythmLastHitIndex = noteIndex;
  rhythmMeasureHits += 1;
  lastToyFeedback = 'hit';
  playSfx('drum');
  guideText.textContent = 'ドンドン！';
  messageBar.textContent = `${currentRound}回目：いいリズム！`;
  renderToyBoard('hit');
  spawnSparkles({ x: 440, y: 266 });
}

function toggleRhythmPause() {
  if (getToyConfig().mode !== 'rhythm' || controlPhase !== 'toy' || playedThisRound || gameComplete) return;
  if (!rhythmPaused) {
    rhythmPaused = true;
    rhythmPauseStartedAt = performance.now();
    stopRhythmBgm();
    guideText.textContent = 'ポーズ中';
    messageBar.textContent = 'つづけるを押すと、またリズムが動くよ。';
    renderToyBoard();
    playSfx('button');
    return;
  }
  rhythmPaused = false;
  const pausedFor = performance.now() - rhythmPauseStartedAt;
  miniRoundStartedAt += pausedFor;
  rhythmPauseStartedAt = 0;
  guideText.textContent = `${currentRound}回目：まるにきたら ドン！`;
  messageBar.textContent = '音符がみどりの丸に重なるところで、ドン！と押そう。';
  renderToyBoard();
  startRhythmBgm();
  playSfx('success');
}

function finishRhythmMeasure() {
  if (playedThisRound || controlPhase !== 'toy' || gameComplete) return;
  const config = getToyConfig();
  const pattern = getRhythmPattern(config);
  stopRhythmBgm();
  stopPowerMeter();
  pattern.forEach((_, index) => {
    if (!rhythmNoteResults[index]) rhythmNoteResults[index] = 'miss';
  });
  const hits = rhythmNoteResults.filter((result) => result === 'hit').length;
  const success = hits / Math.max(1, pattern.length) >= (config.passRatio || 0.58);
  playedThisRound = true;
  lastToyFeedback = success ? 'hit' : 'miss';
  shotResults.push(success ? 'hit' : 'miss');
  if (success) catches += 1;
  renderToyBoard();
  updateRoundUi();

  if (success) {
    playSfx('success');
    milmaru.classList.add('catch');
    milmaruSpeech.textContent = getStageSpeech('きゃっきゃ！');
    guideText.textContent = `${hits}/${pattern.length} できた！`;
    messageBar.textContent = 'リズムよく たたけたよ。';
    showGoalBurst({ x: 610, y: 250 }, 'いいリズム！', true);
  } else {
    playSfx('mistake');
    milmaru.classList.add('worried');
    milmaruSpeech.textContent = getStageSpeech('なぁい...？');
    guideText.textContent = `${hits}/${pattern.length} もういちど`;
    messageBar.textContent = '音符がまるに重なるところを見て、次のリズムでやってみよう。';
    showGoalBurst({ x: 610, y: 250 }, config.missBurst || 'おしい', false);
  }

  currentRound += 1;
  setTimeout(() => {
    milmaru.classList.remove('catch', 'worried');
    if (currentRound > TOTAL_ROUNDS) {
      completeGame();
      return;
    }
    playedThisRound = false;
    lastToyFeedback = '';
    updateRoundUi();
    startToyMeter();
  }, 820);
}

function startStackRound() {
  const config = getToyConfig();
  ensureStackPhysicsWorld();
  controlPhase = 'toy';
  currentStackShape = getStackShapeForRound(currentRound);
  powerValue = 0.5;
  powerDirection = 1;
  lastPowerFrameAt = 0;
  lastToyFeedback = '';
  powerMeter.classList.add('active');
  mainPlayBtn.textContent = config.actionText || 'おとす！';
  guideText.textContent = `${currentRound}こめ：タップで おとす`;
  messageBar.textContent = '上でゆれているつみきを、土台の上におとそう。';
  renderToyBoard();

  const tick = (now) => {
    if (controlPhase !== 'toy' || getToyConfig().mode !== 'stack' || gameComplete || playedThisRound) {
      stopPowerMeter();
      return;
    }
    if (!lastPowerFrameAt) lastPowerFrameAt = now;
    const delta = Math.min(0.05, (now - lastPowerFrameAt) / 1000);
    lastPowerFrameAt = now;
    powerValue += powerDirection * delta * (config.meterSpeed || 0.62);
    if (powerValue >= 1) {
      powerValue = 1;
      powerDirection = -1;
    } else if (powerValue <= 0) {
      powerValue = 0;
      powerDirection = 1;
    }
    const shape = currentStackShape || MINI_STACK.shapes[0];
    stackSwingX = Math.round(MINI_STACK.minX + powerValue * (MINI_STACK.stageW - MINI_STACK.minX * 2 - shape.w));
    powerFill.style.setProperty('--power', `${Math.round(powerValue * 100)}%`);
    timingMarker.style.setProperty('--timing', `${Math.round(powerValue * 100)}%`);
    renderToyBoard();
    powerFrame = requestAnimationFrame(tick);
  };
  powerFrame = requestAnimationFrame(tick);
}

function resetToyMiniGame(options = {}) {
  cancelAnimationFrame(animationFrame);
  animationFrame = null;
  clearRattleCountdown();
  stopRhythmBgm();
  stopStackPhysicsLoop();
  stopMilmaruRoam();
  stopPowerMeter();
  isAiming = false;
  controlPhase = 'toy';
  currentAim = null;
  lockedAim = null;
  playedThisRound = false;
  isMilmaruBusy = false;
  lastToyFeedback = '';
  toyStackCount = 0;
  rhythmProgress = 0;
  rhythmCuePlayed = false;
  rhythmCueMarks = [];
  rhythmNoteResults = [];
  rhythmLastHitIndex = -1;
  rhythmMeasureHits = 0;
  rhythmPaused = false;
  rhythmPauseStartedAt = 0;
  rattleCountdownDone = false;
  stackDroppingBlock = null;
  stackWobbleActive = false;
  stackCollapseActive = false;
  stackPreDropTarget = null;
  stackPreDropSnapshot = [];
  if (getToyConfig().mode === 'stack') {
    createStackPhysicsWorld(true);
    stackBlocks = [];
    currentStackShape = getStackShapeForRound(1);
    stackSwingX = Math.round((MINI_STACK.stageW - currentStackShape.w) / 2);
  }
  fieldStars = [];
  renderFieldStars();
  ball.classList.remove('dragging', 'rolling');
  milmaru.classList.remove('catch', 'worried', 'crawling');
  milmaruSpeech.classList.remove('hide');
  aimLine.classList.remove('show');
  hidePrediction();
  ball.style.setProperty('--ball-rotation', '0deg');
  ball.style.setProperty('--toy-x', getToyConfig().mode === 'book' ? '394px' : '406px');
  ball.style.setProperty('--toy-y', getToyConfig().mode === 'book' ? '300px' : '284px');
  setMilmaruPosition({ x: 714, y: 314 }, { duration: 120 });
  if (!options.keepModal) {
    resultModal.classList.remove('show');
    resultModal.setAttribute('aria-hidden', 'true');
  }
  updateToyUi();
  updateRoundUi();
  milmaruSpeech.textContent = getStageSpeech('みゅっ♪');
  if (getToyConfig().mode === 'rhythm') {
    controlPhase = 'ready';
    document.querySelector('.sub-sign').textContent = 'たいこを たたこう！';
    mainPlayBtn.textContent = 'ドン！';
    guideText.textContent = 'はじめるを おしてね';
    messageBar.textContent = '大きい「はじめる」ボタンを押すと、3・2・1ではじまるよ。';
    renderToyBoard();
    return;
  }
  startToyMeter();
}

function resetGame() {
  currentRound = 1;
  catches = 0;
  lastSetHits = 0;
  shotResults = [];
  gameComplete = false;
  resultApplied = false;
  updateToyUi();
  if (isBallGame()) {
    resetFieldStars();
    setMilmaruPosition({ x: 640, y: 214 }, { duration: 120 });
    resetRound();
  } else {
    resetToyMiniGame();
  }
}

function beginAim(event) {
  if (controlPhase === 'power') {
    confirmPower();
    return;
  }
  if (playedThisRound || gameComplete || controlPhase !== 'aim') return;
  if (!state.hatched) {
    showNeedCareMessage('まだ タマゴだよ', 'おせわ画面で タマゴを あたためてあげよう。');
    return;
  }
  event?.preventDefault?.();
  isAiming = true;
  currentAim = null;
  stopMilmaruRoam();
  milmaruSpeech.classList.add('hide');
  ball.classList.add('dragging');
  playfield.setPointerCapture?.(event.pointerId);
  updateAim(event);
  guideText.textContent = 'むきを きめよう';
  messageBar.textContent = 'まだ強さは決まらないよ。はなしたあとに ちからをきめよう。';
}

function updateAim(event) {
  if (!isAiming || playedThisRound || gameComplete) return;
  const plan = buildAimPlan(getPlayfieldPoint(event));
  if (plan) showAim(plan);
}

function finishAim(event) {
  if (!isAiming) return;
  event?.preventDefault?.();
  if (event?.pointerId != null) {
    try { playfield.releasePointerCapture?.(event.pointerId); } catch (_) {}
  }
  isAiming = false;
  ball.classList.remove('dragging');
  if (!currentAim) {
    hidePrediction();
    resetPowerMeter();
    milmaruSpeech.classList.remove('hide');
    messageBar.textContent = '少しはなれたところへ ひっぱって、むきをきめよう。';
    startMilmaruRoam();
    return;
  }
  lockedAim = currentAim;
  startPowerMeter();
}

function launchBall(plan) {
  controlPhase = 'rolling';
  playedThisRound = true;
  isMilmaruBusy = true;
  stopMilmaruRoam();
  playSfx('roll');
  ball.classList.add('rolling');
  guideText.textContent = `${getToyConfig().label}が ${getToyConfig().movingText}`;
  messageBar.textContent = 'ミルマルが とりにいくよ。';
  const start = { ...LAUNCH_CENTER };
  const end = plan.end;
  const travel = Math.hypot(end.x - start.x, end.y - start.y);
  const started = performance.now();
  const duration = clamp(620 + travel * 1.15, 820, 1500);

  const tick = (now) => {
    const t = clamp((now - started) / duration, 0, 1);
    const ease = 1 - Math.pow(1 - t, 2.2);
    const x = start.x + (end.x - start.x) * ease;
    const y = start.y + (end.y - start.y) * ease;
    setBallCenter(x, y);
    const rotation = (travel * ease / BALL_RADIUS) * (180 / Math.PI);
    ball.style.setProperty('--ball-rotation', `${rotation.toFixed(1)}deg`);
    if (t < 1) {
      animationFrame = requestAnimationFrame(tick);
      return;
    }
    resolveShot(plan);
  };
  animationFrame = requestAnimationFrame(tick);
}

function collectStarHit({ index, star }) {
  if (fieldStars[index]?.collected) return false;
  fieldStars[index].collected = true;
  const el = fieldStarsEl.querySelector(`[data-star-index="${index}"]`);
  el?.classList.add('collected');
  spawnSparkles(star);
  playSfx('success');
  return true;
}

function collectStarsSequential(hits, interval = 220) {
  hits.forEach((hit, order) => {
    setTimeout(() => collectStarHit(hit), order * interval);
  });
  return Math.max(0, (hits.length - 1) * interval);
}

function resolveShot(plan) {
  ball.classList.remove('rolling');
  setBallCenter(plan.end.x, plan.end.y);
  hidePrediction();
  const hits = getStarsOnRoute(getMilmaruCenter(), plan.end);
  const collectedCount = hits.length;
  const duration = moveMilmaruTo(plan.end, {
    speed: 32,
    maxDuration: 7000,
    after: () => {
      if (collectedCount > 0) {
        const collectDuration = collectStarsSequential(hits);
        catches += collectedCount;
        shotResults.push('hit');
        milmaru.classList.add('catch');
        milmaruSpeech.textContent = getStageSpeech('きゃっきゃ！');
        guideText.textContent = `${collectedCount}こ ゲット！`;
        messageBar.textContent = '通り道の星をひろえたよ。';
        showGoalBurst(hits[hits.length - 1]?.star || plan.end, `★ ${collectedCount}`, true);
        setTimeout(() => milmaru.classList.remove('catch'), 700);
        setTimeout(() => {
          currentRound += 1;
          advanceAfterShot();
        }, collectDuration + 360);
        return;
      } else {
        shotResults.push('miss');
        playSfx('mistake');
        milmaru.classList.add('worried');
        milmaruSpeech.textContent = getStageSpeech('なぁい...？');
        guideText.textContent = '星のそばをねらおう';
        messageBar.textContent = 'ミルマルの通り道に星がくるようにしてみよう。';
        showGoalBurst(plan.end, 'おしい', false);
        setTimeout(() => milmaru.classList.remove('worried'), 700);
      }
      currentRound += 1;
      advanceAfterShot();
    }
  });
}

function advanceAfterShot() {
  if (currentRound > TOTAL_ROUNDS || getRemainingStars().length === 0) {
    completeGame();
    return;
  }
  playedThisRound = false;
  isMilmaruBusy = false;
  setBallCenter(LAUNCH_CENTER.x, LAUNCH_CENTER.y);
  ball.style.setProperty('--ball-rotation', '0deg');
  resetRound({ keepModal: true });
}

function isToyMiniSuccess() {
  const config = getToyConfig();
  if (config.mode === 'rhythm') {
    return getHittableRhythmNote() >= 0;
  }
  if (config.mode === 'stack') {
    return isStackDropSuccess();
  }
  return powerValue >= config.goodMin && powerValue <= config.goodMax;
}

function handleToyAction() {
  if (isBallGame()) return;
  if (gameComplete) {
    goCare('success');
    return;
  }
  if (!state.hatched) {
    showNeedCareMessage('まだ タマゴだよ', 'おせわ画面で タマゴを あたためてあげよう。');
    return;
  }
  if (getToyConfig().mode === 'rhythm') {
    handleRhythmAction();
    return;
  }
  if (playedThisRound || controlPhase !== 'toy') return;

  const success = isToyMiniSuccess();
  resolveToyRound(success);
}

function resolveStackRoundFallback(landed) {
  if (playedThisRound || controlPhase !== 'toy' || gameComplete) return;
  const shape = currentStackShape || getStackShapeForRound(currentRound);
  const stackOutcome = getStackDropOutcome(landed);
  playedThisRound = true;
  stopPowerMeter();
  stackDroppingBlock = {
    x: Math.round(stackSwingX),
    w: shape.w,
    h: shape.h,
    r: shape.r,
    round: currentRound,
    landed: stackOutcome.landed,
    success: stackOutcome.success,
    collapse: stackOutcome.collapse,
    wobble: stackOutcome.wobble,
    offset: stackOutcome.offset || 0,
    dropTo: getStackDropTop(shape, stackOutcome.landed)
  };
  stackWobbleActive = false;
  stackCollapseActive = false;
  playSfx('fall');
  guideText.textContent = `${currentRound}こめ：おちてるよ`;
  messageBar.textContent = 'つみきが落ちて、土台にのるまで見てみよう。';
  renderToyBoard();
  updateRoundUi();
  setTimeout(() => finishStackRound(stackOutcome), stackOutcome.landed ? 900 : 620);
}

function resolveStackRound(landed) {
  if (playedThisRound || controlPhase !== 'toy' || gameComplete) return;
  if (!ensureStackPhysicsWorld()) {
    resolveStackRoundFallback(landed);
    return;
  }

  const shape = currentStackShape || getStackShapeForRound(currentRound);
  playedThisRound = true;
  stopPowerMeter();
  stackWobbleActive = false;
  stackCollapseActive = false;
  stackPreDropTarget = getStackTarget();
  stackPreDropSnapshot = stackBlocks.map(takeStackSnapshot);

  const body = createStackPhysicsBody(shape, stackSwingX + shape.w / 2, 42 + shape.h / 2);
  if (!body) {
    resolveStackRoundFallback(landed);
    return;
  }
  stackMatter.Body.setVelocity(body, { x: 0, y: 5.2 });
  stackMatter.World.add(stackEngine.world, body);
  stackDroppingBlock = {
    body,
    w: shape.w,
    h: shape.h,
    r: shape.r,
    round: currentRound,
    offset: 0,
    physics: true,
    success: true,
    collapse: false
  };
  playSfx('fall');
  guideText.textContent = `${currentRound}こめ：おちてるよ`;
  messageBar.textContent = 'つみきが落ちて、乗ったあとにぐらぐらするよ。';
  renderToyBoard();
  updateRoundUi();
  startStackPhysicsSettlement();
}

function finishStackRound(stackOutcome) {
  const config = getToyConfig();
  if (config.mode !== 'stack' || !stackDroppingBlock) return;
  if (stackOutcome.physics) stopStackPhysicsLoop();
  const success = stackOutcome.success;
  stackDroppingBlock.offset = stackOutcome.offset || 0;
  stackDroppingBlock.success = success;
  stackDroppingBlock.collapse = stackOutcome.collapse;
  lastToyFeedback = success ? 'hit' : 'miss';
  shotResults.push(success ? 'hit' : 'miss');
  if (success) catches += 1;

  if (stackOutcome.landed) {
    if (success) {
      stackBlocks.push(stackDroppingBlock);
      stabilizeStackPhysicsBodies();
      stackDroppingBlock = null;
      toyStackCount = stackBlocks.length;
    }
  }

  const didCollapse = stackOutcome.collapse;
  stackWobbleActive = stackOutcome.wobble || didCollapse;
  stackCollapseActive = didCollapse;
  renderToyBoard();
  updateRoundUi();

  if (success) {
    playSfx('wood');
    milmaru.classList.add('catch');
    milmaruSpeech.textContent = getStageSpeech('きゃっきゃ！');
    guideText.textContent = stackOutcome.wobble ? 'ぐらぐら…のった！' : (config.hitBurst || 'いいね！');
    messageBar.textContent = stackOutcome.wobble
      ? '乗ってから少しゆれたよ。まんなかだともっと安定するよ。'
      : `${config.label}で じょうずに あそべたよ。`;
    showGoalBurst({ x: 450, y: 250 }, config.hitBurst || 'いいね！', true);
    spawnSparkles({ x: 450, y: 246 });
  } else {
    playSfx('mistake');
    milmaru.classList.add('worried');
    milmaruSpeech.textContent = getStageSpeech('なぁい...？');
    guideText.textContent = didCollapse ? 'ぐらぐら…くずれた！' : 'もういちど やってみよう';
    messageBar.textContent = didCollapse
      ? '乗ったけど、はしっこすぎてくずれちゃった。まんなかをねらおう。'
      : '土台に届かなかったよ。まんなかをよく見て、おとしてみよう。';
    showGoalBurst({ x: 450, y: 250 }, didCollapse ? 'くずれた' : (config.missBurst || 'おしい'), false);
  }

  currentRound += 1;
  setTimeout(() => {
    milmaru.classList.remove('catch', 'worried');
    if (stackDroppingBlock) {
      removeStackPhysicsBlock(stackDroppingBlock);
      stackDroppingBlock = null;
    }
    if (!success && stackPreDropSnapshot.length) {
      restoreStackSnapshot(stackPreDropSnapshot);
    } else if (didCollapse && stackBlocks.length && !stackBlocks[stackBlocks.length - 1].body) {
      stackBlocks.pop();
      toyStackCount = stackBlocks.length;
    }
    stackPreDropTarget = null;
    stackPreDropSnapshot = [];
    stackWobbleActive = false;
    stackCollapseActive = false;
    renderToyBoard();
    if (currentRound > TOTAL_ROUNDS) {
      completeGame();
      return;
    }
    playedThisRound = false;
    updateRoundUi();
    startToyMeter();
  }, didCollapse ? 980 : 720);
}

function resolveToyRound(success) {
  if (playedThisRound || controlPhase !== 'toy' || gameComplete) return;
  const config = getToyConfig();
  if (config.mode === 'stack') {
    resolveStackRound(success);
    return;
  }
  playedThisRound = true;
  stopPowerMeter();
  lastToyFeedback = success ? 'hit' : 'miss';
  shotResults.push(success ? 'hit' : 'miss');
  if (success) catches += 1;

  renderToyBoard();
  updateRoundUi();

  if (success) {
    playSfx(config.mode === 'rhythm' ? 'drum' : 'success');
    milmaru.classList.add('catch');
    milmaruSpeech.textContent = getStageSpeech('きゃっきゃ！');
    guideText.textContent = config.hitBurst || 'いいね！';
    messageBar.textContent = `${config.label}で じょうずに あそべたよ。`;
    showGoalBurst({ x: 450, y: 250 }, config.hitBurst || 'いいね！', true);
    spawnSparkles({ x: 450, y: 246 });
  } else {
    playSfx('mistake');
    milmaru.classList.add('worried');
    milmaruSpeech.textContent = getStageSpeech('なぁい...？');
    guideText.textContent = 'もういちど やってみよう';
    messageBar.textContent = 'みどりのところを よく見て、おしてみよう。';
    showGoalBurst({ x: 450, y: 250 }, config.missBurst || 'おしい', false);
  }

  currentRound += 1;
  const nextDelay = config.mode === 'rhythm' ? 520 : 860;
  setTimeout(() => {
    milmaru.classList.remove('catch', 'worried');
    if (currentRound > TOTAL_ROUNDS) {
      completeGame();
      return;
    }
    playedThisRound = false;
    updateRoundUi();
    startToyMeter();
  }, nextDelay);
}

function getPlaySummaryText() {
  const config = getToyConfig();
  if (config.mode === 'roll') return `星を ${lastSetHits}こ ひろったよ。`;
  if (config.mode === 'rhythm') return `リズムよく ${lastSetHits}回 たたけたよ。`;
  if (config.mode === 'stack') return `つみきを ${lastSetHits}こ のせられたよ。`;
  return `ページを ${lastSetHits}まい めくれたよ。`;
}

function completeGame() {
  gameComplete = true;
  controlPhase = 'complete';
  isMilmaruBusy = false;
  stopMilmaruRoam();
  stopPowerMeter();
  stopRhythmBgm();
  stopStackPhysicsLoop();
  lastSetHits = catches;
  applyPlayReward();
  renderToyBoard();
  guideText.textContent = getToyConfig().completeGuide || `星を ${catches}こ ひろったよ！`;
  messageBar.textContent = 'ミルマルが うれしそう。おせわ画面で なでてあげてもいいね。';
  mainPlayBtn.textContent = 'おせわへ';
  setTimeout(showResult, 680);
}

function applyPlayReward() {
  if (resultApplied) return;
  resultApplied = true;
  const starGain = lastSetHits * 5;
  const friendGain = lastSetHits >= 3 ? 3 : lastSetHits >= 1 ? 2 : 1;
  const growthGain = lastSetHits >= 3 ? 1 : 0;
  state.stars = clamp((Number(state.stars) || 0) + starGain, 0, 99999);
  state.nakayoshi = clamp((Number(state.nakayoshi) || 0) + friendGain, 0, 100);
  state.sukusuku = clamp((Number(state.sukusuku) || 0) + growthGain, 0, 100);
  state.gokigen = clamp((Number(state.gokigen) || 0) + 16, 0, 100);
  state.lastCareAt = Date.now();
  state.lastMoodAt = Date.now();
  state.reaction = 'happy';
  state.speech = lastSetHits >= 3 ? 'きゃっきゃ！' : 'ふにゃ〜♪';
  saveState();
  renderCounts();
}

function spawnSparkles(center = { x: 450, y: 260 }) {
  for (let i = 0; i < 18; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark';
    spark.style.left = `${center.x - 90 + Math.random() * 180}px`;
    spark.style.top = `${center.y - 80 + Math.random() * 130}px`;
    spark.style.setProperty('--dx', `${(Math.random() - 0.5) * 160}px`);
    spark.style.setProperty('--dy', `${-40 - Math.random() * 80}px`);
    spark.style.animationDelay = `${Math.random() * 0.12}s`;
    sparkLayer.appendChild(spark);
    setTimeout(() => spark.remove(), 1050);
  }
}

function showResult() {
  const friendGain = lastSetHits >= 3 ? 3 : lastSetHits >= 1 ? 2 : 1;
  const growthText = lastSetHits >= 3 ? 'すくすく +1' : 'すくすくは そのまま';
  const starGain = lastSetHits * 5;
  resultTitle.textContent = getToyConfig().resultTitle;
  resultText.innerHTML = `${getPlaySummaryText()}<br>スター +${starGain}<br>なかよし +${friendGain}　${growthText}`;
  resultModal.classList.add('show');
  resultModal.setAttribute('aria-hidden', 'false');
}

function showNeedCareMessage(title, message) {
  playSfx('mistake');
  milmaru.classList.add('worried');
  milmaruSpeech.textContent = getStageSpeech(title);
  guideText.textContent = title;
  messageBar.textContent = message;
  setTimeout(() => milmaru.classList.remove('worried'), 900);
}

function goCare(result = '') {
  saveState();
  const suffix = result ? `?from=play&result=${encodeURIComponent(result)}` : '?from=play';
  window.location.href = `care.html${suffix}`;
}

function goWriting() {
  saveState();
  window.location.href = 'index.html?from=play';
}

function renderCounts() {
  document.getElementById('starCount').textContent = String(state.stars);
  updateToyUi();
  milmaru.classList.toggle('baby', getCareStageId() === 'baby');
  updateRoundUi();
}

function selectToy(toyId) {
  if (!TOY_CONFIGS[toyId]) return;
  selectedToyId = toyId;
  playSfx('button');
  resetGame();
}

document.addEventListener('pointerdown', (event) => {
  const button = event.target.closest('button');
  if (!button || !stageEl.contains(button)) return;
  playSfx('button');
}, true);

document.getElementById('backBtn').addEventListener('click', () => goCare());
document.getElementById('careBtn').addEventListener('click', () => goCare());
document.getElementById('modalCareBtn').addEventListener('click', () => goCare('success'));
document.getElementById('retryBtn').addEventListener('click', () => {
  resetGame();
});
document.getElementById('modalRetryBtn').addEventListener('click', () => {
  resetGame();
});
mainPlayBtn.addEventListener('click', () => {
  if (!isBallGame()) {
    handleToyAction();
    return;
  }
  if (controlPhase === 'power') {
    confirmPower();
    return;
  }
  if (gameComplete) {
    goCare('success');
    return;
  }
  if (!state.hatched) {
    goCare();
    return;
  }
  if (playedThisRound) {
    return;
  }
  messageBar.textContent = `${getToyConfig().label}をドラッグして、まずは むきをきめてね。`;
});
document.getElementById('settingsBtn').addEventListener('click', () => {
  messageBar.textContent = 'せっていは じゅんびちゅうだよ。';
});
document.querySelectorAll('.toy-card').forEach((button) => {
  button.addEventListener('click', () => {
    selectToy(button.dataset.toy);
  });
});

document.addEventListener('pointerdown', (event) => {
  if (!stageEl.contains(event.target)) return;
  const startButton = event.target.closest('[data-taiko-start]');
  if (startButton) {
    event.preventDefault();
    event.stopPropagation();
    handleRhythmAction();
    return;
  }
  const pauseButton = event.target.closest('[data-taiko-pause]');
  if (pauseButton) {
    event.preventDefault();
    event.stopPropagation();
    toggleRhythmPause();
  }
}, true);

playfield.addEventListener('pointerdown', (event) => {
  if (!isBallGame()) {
    if (event.target.closest('button')) return;
    if (event.target.closest('.round-counter, .shot-pips, .power-meter')) return;
    if (controlPhase === 'ready') return;
    event.preventDefault();
    handleToyAction();
    return;
  }
  if (controlPhase === 'power') {
    event.preventDefault();
    confirmPower();
    return;
  }
  if (event.target.closest('.round-counter, .shot-pips, .power-meter')) return;
  beginAim(event);
});
playfield.addEventListener('pointermove', updateAim);
playfield.addEventListener('pointerup', finishAim);
playfield.addEventListener('pointercancel', finishAim);

if (!state.hatched) {
  guideText.textContent = 'まだ あそべないよ';
  messageBar.textContent = 'おせわ画面で タマゴを あたためてあげよう。';
  milmaruSpeech.textContent = 'すぅ...';
} else {
  resetGame();
}
renderCounts();

window.MojikkoToyPlayGame = {
  getState: () => JSON.parse(JSON.stringify(state)),
  resetRound,
  resetGame,
  beginAim,
  confirmPower,
  selectToy,
  getPhase: () => controlPhase,
  applyPlayReward,
  goCare
};
</script>
</body>
</html>
