<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ポノの海底アルバム | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<script src="../js/game-stickers.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #104057;
    --deep: #05324d;
    --sea: #0d8eb8;
    --foam: #e9fdff;
    --panel: rgba(246, 254, 255, 0.9);
    --line: rgba(255, 255, 255, 0.62);
    --gold: #ffd86e;
    --coral: #ff8b76;
    --leaf: #51aa76;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    min-height: 100dvh;
    overflow: hidden;
    background: #031827;
    color: var(--ink);
    font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }

  body { display: grid; place-items: center; }

  #app {
    position: relative;
    width: min(100vw, calc(100dvh * 16 / 9));
    height: min(100dvh, calc(100vw * 9 / 16));
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: linear-gradient(180deg, #83e5f3, #086f9e);
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
  }

  @media (min-width: 720px) {
    #app { border-radius: 8px; }
  }

  #gameCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }

  .hud {
    position: absolute;
    z-index: 20;
    top: max(8px, env(safe-area-inset-top));
    left: max(8px, env(safe-area-inset-left));
    right: max(8px, env(safe-area-inset-right));
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    pointer-events: none;
  }

  .hud-group {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .hud-chip,
  .hud-btn,
  .prompt,
  .toast {
    border: 1px solid var(--line);
    background: var(--panel);
    box-shadow: 0 8px 22px rgba(3, 36, 60, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.58);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .hud-btn {
    pointer-events: auto;
    min-width: 70px;
    height: 40px;
    border-radius: 8px;
    border-color: var(--line);
    color: #0a5674;
    font: 900 0.94rem/1 'Zen Maru Gothic', sans-serif;
    text-decoration: none;
    display: grid;
    place-items: center;
    cursor: pointer;
  }

  .hud-chip {
    min-width: 92px;
    height: 40px;
    border-radius: 8px;
    padding: 5px 10px;
    display: grid;
    align-content: center;
    gap: 1px;
  }

  .hud-chip span {
    display: block;
    color: rgba(18, 73, 96, 0.68);
    font-size: 0.56rem;
    line-height: 1;
    font-weight: 900;
  }

  .hud-chip strong {
    display: block;
    color: #093a54;
    font-size: 0.9rem;
    line-height: 1;
    font-weight: 900;
    white-space: nowrap;
  }

  .prompt {
    position: absolute;
    z-index: 18;
    left: 50%;
    bottom: max(12px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    width: min(620px, calc(100% - 26px));
    min-height: 44px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    padding: 8px 18px;
    color: #0d4964;
    font-size: clamp(0.88rem, 2vw, 1.08rem);
    font-weight: 900;
    line-height: 1.24;
    text-align: center;
    pointer-events: none;
  }

  .toast {
    position: absolute;
    z-index: 22;
    left: 50%;
    top: max(58px, calc(env(safe-area-inset-top) + 58px));
    transform: translateX(-50%) translateY(-10px);
    opacity: 0;
    min-width: 220px;
    border-radius: 8px;
    padding: 10px 16px;
    color: #0c5572;
    font-size: 1rem;
    font-weight: 900;
    text-align: center;
    transition: opacity 0.22s ease, transform 0.22s ease;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .jet-btn {
    position: absolute;
    z-index: 24;
    right: max(12px, env(safe-area-inset-right));
    bottom: max(14px, env(safe-area-inset-bottom));
    width: 78px;
    height: 78px;
    border: 1px solid rgba(255, 255, 255, 0.68);
    border-radius: 50%;
    background:
      radial-gradient(circle at 36% 26%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.12) 34%, transparent 35%),
      linear-gradient(180deg, #e8ffff, #62d7f0 54%, #1f91c3);
    box-shadow: 0 8px 0 rgba(13, 79, 116, 0.48), 0 16px 26px rgba(0, 38, 64, 0.24);
    color: #06364f;
    font: 900 0.78rem/1 'Zen Maru Gothic', sans-serif;
    display: grid;
    place-items: center;
    gap: 2px;
    cursor: pointer;
    pointer-events: auto;
  }

  .jet-btn span,
  .jet-btn strong {
    display: block;
    line-height: 1;
  }

  .jet-btn strong {
    font-size: 1.05rem;
  }

  .jet-btn[disabled] {
    cursor: default;
    filter: grayscale(0.35);
    opacity: 0.58;
    transform: translateY(4px);
    box-shadow: 0 4px 0 rgba(13, 79, 116, 0.42), 0 10px 18px rgba(0, 38, 64, 0.18);
  }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: grid;
    place-items: center;
    padding: 22px;
    background:
      radial-gradient(circle at 50% 42%, rgba(255, 248, 190, 0.2), transparent 30%),
      rgba(3, 30, 48, 0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .overlay[hidden] { display: none; }

  .panel {
    width: min(900px, calc(100vw - 34px));
    max-height: min(760px, calc(100dvh - 34px));
    overflow: auto;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.64);
    background: linear-gradient(180deg, rgba(249, 254, 255, 0.97), rgba(222, 249, 251, 0.95));
    box-shadow: 0 26px 72px rgba(0, 18, 38, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.75);
    padding: 18px;
  }

  .panel-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }

  h1,
  h2 {
    color: #0b4968;
    font-weight: 900;
    letter-spacing: 0;
    line-height: 1.08;
  }

  h1 { font-size: clamp(1.55rem, 4.7vw, 2.34rem); }
  h2 { font-size: clamp(1.28rem, 3.8vw, 1.86rem); }

  .panel-copy {
    margin-top: 8px;
    color: #2d6680;
    font-size: clamp(0.92rem, 2.1vw, 1.04rem);
    line-height: 1.48;
    font-weight: 700;
  }

  .panel-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .primary-btn,
  .secondary-btn,
  .close-btn {
    min-height: 44px;
    border: 0;
    border-radius: 8px;
    font: 900 1rem/1 'Zen Maru Gothic', sans-serif;
    cursor: pointer;
    color: #07364f;
    padding: 0 18px;
  }

  .primary-btn {
    min-width: 150px;
    background: linear-gradient(180deg, #fff2a8, #ffd66f);
    box-shadow: 0 6px 0 #d99f37, 0 12px 20px rgba(143, 94, 28, 0.22);
  }

  .secondary-btn,
  .close-btn {
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(33, 111, 139, 0.22);
    box-shadow: 0 4px 0 rgba(33, 111, 139, 0.18);
  }

  .primary-btn:active,
  .secondary-btn:active,
  .close-btn:active,
  .hud-btn:active {
    transform: translateY(2px);
  }

  .stage-grid,
  .album-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 8px;
    margin-top: 14px;
  }

  .stage-card,
  .album-card {
    min-width: 0;
    border-radius: 8px;
    border: 1px solid rgba(42, 125, 153, 0.24);
    background: rgba(255, 255, 255, 0.72);
    padding: 10px;
    display: grid;
    gap: 6px;
  }

  .stage-card strong,
  .album-card strong {
    color: #0c4e6e;
    font-size: 0.9rem;
    line-height: 1.14;
  }

  .stage-card span,
  .album-card span {
    color: #4b7384;
    font-size: 0.72rem;
    line-height: 1.25;
    font-weight: 700;
  }

  .stage-card.locked {
    opacity: 0.52;
    filter: saturate(0.65);
  }

  .album-card {
    min-height: 138px;
    cursor: pointer;
  }

  .album-icon {
    height: 52px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    color: #fff;
    font-size: 1.65rem;
    font-weight: 900;
    background: linear-gradient(135deg, #6fcbe3, #4eaa84);
  }

  .album-card.locked .album-icon {
    background: linear-gradient(135deg, #9fb6c0, #748b95);
  }

  .detail-body {
    display: grid;
    grid-template-columns: minmax(120px, 180px) minmax(0, 1fr);
    gap: 16px;
    align-items: start;
  }

  .detail-art {
    min-height: 150px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    color: #fff;
    font-size: 3rem;
    font-weight: 900;
    background: radial-gradient(circle at 38% 28%, #fff6a8, transparent 34%), linear-gradient(135deg, #75d6e8, #4889aa);
  }

  .fact-list {
    display: grid;
    gap: 8px;
  }

  .fact-row {
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(33, 111, 139, 0.16);
    padding: 10px 12px;
  }

  .fact-row b {
    display: block;
    color: #0c5572;
    font-size: 0.82rem;
    margin-bottom: 3px;
  }

  .fact-row span {
    color: #315e70;
    font-size: 0.94rem;
    line-height: 1.4;
    font-weight: 700;
  }

  #loading {
    position: absolute;
    z-index: 60;
    inset: 0;
    display: grid;
    place-items: center;
    color: #e7fdff;
    font-weight: 900;
    background: #05324d;
  }

  #loading[hidden] { display: none; }

  @media (max-width: 760px), (max-height: 460px) {
    .hud { gap: 5px; }
    .hud-group { gap: 5px; }
    .hud-btn,
    .hud-chip {
      min-width: 62px;
      height: 34px;
      border-radius: 8px;
    }
    .hud-btn { font-size: 0.78rem; padding: 0 8px; }
    .hud-chip { padding: 4px 7px; }
    .hud-chip span { font-size: 0.5rem; }
    .hud-chip strong { font-size: 0.76rem; }
    .prompt {
      left: max(8px, env(safe-area-inset-left));
      right: 76px;
      width: auto;
      min-height: 36px;
      transform: none;
      padding: 6px 10px;
      font-size: 0.82rem;
    }
    .jet-btn {
      width: 58px;
      height: 58px;
      right: max(8px, env(safe-area-inset-right));
      bottom: max(8px, env(safe-area-inset-bottom));
      font-size: 0.62rem;
      box-shadow: 0 5px 0 rgba(13, 79, 116, 0.48), 0 10px 18px rgba(0, 38, 64, 0.2);
    }
    .jet-btn strong { font-size: 0.82rem; }
    .panel {
      padding: 14px;
      max-height: calc(100dvh - 24px);
    }
    .stage-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }
    .album-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }
    .album-card {
      min-height: 116px;
      padding: 8px;
    }
    .album-icon { height: 42px; font-size: 1.35rem; }
    .detail-body { grid-template-columns: 1fr; }
    .detail-art { min-height: 96px; }
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="gameCanvas" aria-label="ポノの海底アルバム"></canvas>

  <div class="hud" aria-live="polite">
    <div class="hud-group">
      <a class="hud-btn" href="../play.html">もどる</a>
      <button class="hud-btn" id="stageBtn" type="button">ステージ</button>
      <div class="hud-chip"><span>POWER</span><strong id="powerText">1</strong></div>
    </div>
    <div class="hud-group">
      <div class="hud-chip"><span>アルバム</span><strong id="albumText">0 / 6</strong></div>
      <div class="hud-chip"><span>スコア</span><strong id="scoreText">0</strong></div>
      <div class="hud-chip"><span>コイン</span><strong id="coinText">0</strong></div>
      <button class="hud-btn" id="albumBtn" type="button">アルバム</button>
    </div>
  </div>

  <div class="prompt" id="prompt">長押しで えさ連射</div>
  <div class="toast" id="toast">アルバムに ついか！</div>
  <button class="jet-btn" id="jetBtn" type="button" disabled><span>JET</span><strong id="jetText">OK</strong></button>
  <div id="loading">よみこみ中...</div>

  <div class="overlay" id="startOverlay">
    <div class="panel">
      <div class="panel-head">
        <div>
          <h1>ポノの海底アルバム</h1>
          <p class="panel-copy">長押しでえさをあげて、海のなかまと仲良くなろう。</p>
        </div>
      </div>
      <div class="stage-grid" id="startStageGrid"></div>
      <div class="panel-actions">
        <button class="primary-btn" id="startBtn" type="button">Stage 1 を はじめる</button>
        <button class="secondary-btn" id="startAlbumBtn" type="button">アルバム</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="albumOverlay" hidden>
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>海底アルバム</h2>
          <p class="panel-copy">見つけた生き物の、すむところ・たべもの・ひみつを見られるよ。</p>
        </div>
        <button class="close-btn" data-close="albumOverlay" type="button">とじる</button>
      </div>
      <div class="album-grid" id="albumGrid"></div>
    </div>
  </div>

  <div class="overlay" id="detailOverlay" hidden>
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2 id="detailTitle">カード</h2>
          <p class="panel-copy" id="detailSub">Stage 1</p>
        </div>
        <button class="close-btn" data-close="detailOverlay" type="button">とじる</button>
      </div>
      <div class="detail-body">
        <div class="detail-art" id="detailArt">?</div>
        <div class="fact-list" id="detailFacts"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="stageOverlay" hidden>
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>ステージマップ</h2>
          <p class="panel-copy">まず Stage 1 で、アルバム・パワーアップ・ボスまでの基本を作っています。</p>
        </div>
        <button class="close-btn" data-close="stageOverlay" type="button">とじる</button>
      </div>
      <div class="stage-grid" id="stageGrid"></div>
    </div>
  </div>

  <div class="overlay" id="finishOverlay" hidden>
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>Stage 1 クリア</h2>
          <p class="panel-copy" id="finishCopy">浅瀬の生き物をアルバムに登録したよ。</p>
        </div>
      </div>
      <div class="panel-actions">
        <button class="primary-btn" id="againBtn" type="button">もういちど</button>
        <button class="secondary-btn" id="finishAlbumBtn" type="button">アルバムを見る</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {

  const ASSET = {

  function loadOptional(src) {
    return new Promise((resolve) => {
      const image = new Image();
      image.onload = () => resolve(image);
      image.onerror = () => resolve(null);
      image.src = src;
    });
  }

  function resize() {
    const rect = app.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.max(1, Math.round(rect.width * dpr));
    canvas.height = Math.max(1, Math.round(rect.height * dpr));
    ctx.setTransform(canvas.width / BASE_W, 0, 0, canvas.height / BASE_H, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function rand(min, max) {
    return min + Math.random() * (max - min);
  }

  function pick(list) {
    return list[Math.floor(Math.random() * list.length)];
  }

  function distance(a, b, x, y) {
    return Math.hypot(a - x, b - y);
  }

  function screenX(x) {
    return x - state.camera;
  }

  function enemyMood(enemy) {
    if (enemy.defeated) return 'happy';
    if (enemy.eatTimer > 0) return 'eating';
    return enemy.mood || 'normal';
  }

  function moodAssetKey(enemy) {
    const suffix = enemyMood(enemy);
    return enemy.key + suffix.charAt(0).toUpperCase() + suffix.slice(1);
  }

  function feedReaction(enemy) {
    if (enemy.defeated) return;
    enemy.feedHits = (enemy.feedHits || 0) + 1;
    if (enemy.boss) {
      enemy.mood = 'eating';
      enemy.eatTimer = 0.9;
      if (!enemy.speech || enemy.speech.ttl < 0.5) say(enemy, pick(FEED_REACTION_LINES.boss), 1.25);
      return;
    }
    if (enemy.feedHits <= 1) {
      enemy.mood = 'normal';
      enemy.eatTimer = 0;
      say(enemy, pick(FEED_REACTION_LINES.first), 1.35);
    } else {
      enemy.mood = 'eating';
      enemy.eatTimer = 1.35;
      say(enemy, pick(FEED_REACTION_LINES.second), 1.55);
    }
  }

  function say(enemy, text, ttl = 2.1) {
    enemy.speech = { text, ttl };
  }

  function setPrompt(text, ttl = 2.2) {
    state.promptTimer = ttl;
    promptEl.textContent = text;
  }

  function showToast(text) {
    state.toastTimer = 2.2;
    toastEl.textContent = text;
    toastEl.classList.add('show');
  }

  function saveAlbum() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...state.album]));
    } catch (_) {}
  }

  function loadAlbum() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      state.album = new Set(raw ? JSON.parse(raw) : []);
    } catch (_) {
      state.album = new Set();
    }
  }

  function saveCoins() {
    try {
      localStorage.setItem(COIN_STORAGE_KEY, String(state.coins));
    } catch (_) {}
  }

  function loadCoins() {
    try {
      state.coins = Math.max(0, parseInt(localStorage.getItem(COIN_STORAGE_KEY) || '0', 10) || 0);
    } catch (_) {
      state.coins = 0;
    }
  }

  function collectCoins(amount, x, y) {
    if (!amount) return;
    state.coins += amount;
    saveCoins();
    state.coinPops.push({ x, y: y - 24, amount, life: 1.25, max: 1.25 });
    updateHud();
  }

  function scatterCoins(amount, x, y) {
    if (!amount) return;
    const pieces = Math.max(1, Math.min(12, amount));
    let remaining = amount;
    for (let i = 0; i < pieces; i += 1) {
      const left = pieces - i;
      const value = Math.max(1, Math.floor(remaining / left));
      remaining -= value;
      const angle = -Math.PI * 0.9 + (Math.PI * 0.8) * (pieces === 1 ? 0.5 : i / (pieces - 1));
      const speed = rand(110, 230);
      state.coinsDropped.push({
        x: x + rand(-12, 12),
        y: y + rand(-16, 10),
        vx: Math.cos(angle) * speed + rand(-28, 28),
        vy: Math.sin(angle) * speed - rand(35, 90),
        value,
        r: value >= 4 ? 16 : 12,
        life: 8.5,
        max: 8.5,
        spin: rand(-4, 4),
        phase: rand(0, Math.PI * 2)
      });
    }
  }

  function unlockCard(id) {
    if (!state.album.has(id)) {
      state.album.add(id);
      saveAlbum();
      const card = CARDS.find((c) => c.id === id);
      showToast((card ? card.name : 'カード') + 'を アルバムに ついか！');
      const stickerIds = {
        shrimp: 'sea_album_shrimp',
        hermit: 'sea_album_hermit',
        goby: 'sea_album_goby',
        horseshoe: 'sea_album_horseshoe'
      };
      if (window.PonoGameStickers && stickerIds[id]) {
        window.PonoGameStickers.grant({
          gameId: 'sea-album',
          stickerId: stickerIds[id],
          event: 'card:' + id
        });
      }
    }
  }

    state.camera = 0;

    state.coinsDropped = [];

    state.powerups = [];

    state.mode = 'finish';

    setPrompt('Stage 1 クリア！', 4);

    }
    setTimeout(() => { finishOverlay.hidden = false; }, 800);

  function updateHud() {
    powerText.textContent = String(state.power);
    albumText.textContent = state.album.size + ' / ' + CARDS.length;
    scoreText.textContent = String(state.score);
    coinText.textContent = String(state.coins);

  function syncJetButton() {
    const cooldown = state.player.jetCooldown || 0;
    const ready = state.mode === 'playing' && cooldown <= 0;
    jetBtn.disabled = !ready;
    jetText.textContent = ready ? 'OK' : Math.max(1, Math.ceil(cooldown)).toString();
  }

  function spawnEnemy() {
    if (state.bossSpawned) return;
    const order = ['shrimp', 'hermit', 'goby', 'seaStar', 'anemone'];
    const key = order[Math.floor(Math.random() * order.length)];
    const type = ENEMY_TYPES[key];
    const y = rand(type.y[0], type.y[1]);
    const fromLeft = state.player.facing < 0 && state.camera > 260 && Math.random() < 0.75;
    const enemy = {
      key,
      x: fromLeft ? Math.max(90, state.camera - 120) : Math.min(WORLD_W - 130, state.camera + BASE_W + 100),
      y,
      baseY: y,
      dir: fromLeft ? 1 : -1,
      hp: type.hp,
      maxHp: type.hp,
      feedHits: 0,
      speed: type.speed,
      size: type.size,
      phase: Math.random() * Math.PI * 2,
      hit: 0,
      mood: 'normal',
      eatTimer: 0,
      defeated: false,
      vanishTimer: 0,
      boss: false
    };
    say(enemy, pick(ENEMY_TAUNTS[key]), 2.6);
    state.enemies.push(enemy);
  }

  function spawnBoss() {
    if (state.bossSpawned) return;
    state.bossSpawned = true;
    state.bossPhase = 'warning';
    state.bossTimer = 2.6;
    state.spawnTimer = 999;
    state.powerups = [];
    state.enemies = state.enemies.filter((enemy) => enemy.defeated);
    setPrompt('WARNING! カブトガニ接近', 2.5);

  function createBossEnemy() {
    if (state.enemies.some((enemy) => enemy.boss)) return;
    const boss = {
      key: 'horseshoe',
      x: BOSS_START_X,
      y: 615,

      speed: 24,
      size: ENEMY_TYPES.horseshoe.size,
      phase: 0,

  function fireShots() {
    const angles = state.power === 1 ? [0] : (state.power === 2 ? [-0.12, 0.12] : [-0.16, 0, 0.16]);
    const dir = state.player.facing || 1;
    angles.forEach((angle) => {
      state.shots.push({
        x: state.player.x + dir * 82,
        y: state.player.y - 4,
        vx: SHOT_SPEED_X * dir,
        vy: Math.sin(angle) * SHOT_SPREAD_SPEED,
        r: 18,
        damage: 1,
        life: 3.0
      });
    });
  }

  function fireBombs() {
    const count = state.power >= 3 ? 2 : 1;
    const dir = state.player.facing || 1;
    for (let i = 0; i < count; i += 1) {
      state.bombs.push({
        x: state.player.x + dir * 66,
        y: state.player.y + 42 + i * 10,
        vx: (BOMB_SPEED_X + i * 28) * dir,
        vy: 92 + i * 18,
        r: 23,
        blast: state.power >= 4 ? 96 : 74,
        damage: 2,
        life: 3.6
      });
    }
  }

  function shotInterval() {
    return state.power >= 4 ? 0.44 : 0.58;
  }

  function bombInterval() {
    return state.power >= 4 ? 1.16 : 1.45;
  }

  function tryFireShots() {
    if (state.mode !== 'playing' || state.shotTimer > 0) return false;
    fireShots();
    state.shotTimer = shotInterval();
    return true;
  }

  function tryFireBombs() {
    if (state.mode !== 'playing' || state.bombTimer > 0) return false;
    fireBombs();
    state.bombTimer = bombInterval();
    return true;
  }

  function tryFireBoth() {
    const shot = tryFireShots();
    const bomb = tryFireBombs();
    return shot || bomb;
  }

  function addImpact(x, y, radius, kind = 'gold') {
    state.impacts.push({ x, y, radius, life: 0.36, max: 0.36, kind });
  }

  function defeatEnemy(enemy) {
    if (enemy.defeated) return;
    enemy.defeated = true;
    enemy.mood = 'happy';
    enemy.eatTimer = 0;
    enemy.vanishTimer = enemy.boss ? 1.8 : 1.18;
    say(enemy, pick(HAPPY_LINES[enemy.key] || ['ありがとう！']), enemy.boss ? 2.4 : 2.0);
    const type = ENEMY_TYPES[enemy.key];
    state.score += type.score;
    state.observed += 1;
    scatterCoins(type.coins || 0, enemy.x, enemy.y);
    unlockCard(type.card);
    addImpact(enemy.x, enemy.y, enemy.size * 0.72, enemy.boss ? 'boss' : 'heart');
    if (!enemy.boss && state.observed % 3 === 0) {
      state.powerups.push({ x: enemy.x, y: enemy.y, r: 28, life: 8 });
    }
    if (enemy.boss) {
      state.bossDone = true;
      state.bossPhase = 'done';
      state.finishTimer = 1.55;
      setPrompt('カブトガニと なかよくなった！', 2.2);
    } else if (state.observed >= 10 && !state.bossSpawned) {
      spawnBoss();
    }
    updateHud();
  }

  function bossCameraTarget(player) {
    if (state.bossPhase === 'scroll' || state.bossPhase === 'intro' || state.bossPhase === 'fight' || state.bossPhase === 'done') {
      return BOSS_ARENA_CAMERA;
    }
    return clamp(player.x - CAMERA_LEAD_X, 0, WORLD_W - BASE_W);
  }

  function updateBossSequence(dt) {
    if (state.bossPhase === 'none') return;
    if (state.bossPhase === 'warning') {
      state.bossTimer -= dt;
      if (state.bossTimer <= 0) {
        state.bossPhase = 'scroll';
        state.bossTimer = 0;
        setPrompt('奥へ進むよ', 2.4);
      }
      return;
    }
    if (state.bossPhase === 'scroll') {
      state.player.tx = clamp(state.camera + 330, PLAYER_MIN_X, PLAYER_MAX_X);
      state.player.ty = clamp(state.player.ty, 260, 650);
      if (Math.abs(state.camera - BOSS_ARENA_CAMERA) < 12) {
        state.camera = BOSS_ARENA_CAMERA;
        createBossEnemy();
        state.bossPhase = 'intro';
        state.bossTimer = 2.7;
      }
      return;
    }
    if (state.bossPhase === 'intro') {
      state.bossTimer -= dt;
      const boss = state.enemies.find((enemy) => enemy.boss);
      if (boss) boss.x += (BOSS_TARGET_X - boss.x) * Math.min(1, dt * 1.9);
      if (state.bossTimer <= 0) {
        state.bossPhase = 'fight';
        if (boss) {
          boss.attackKind = 'normal';
          boss.attackPhase = 'idle';
          boss.attackCooldown = 0.7;
          say(boss, BOSS_LINES.normal, 1.8);
        }
      }
    }
  }

  function hitPlayer(kind) {
    const p = state.player;
    if (p.shield > 0 || state.mode !== 'playing' || state.bossDone) return;
    p.shield = 1.1;
    p.hit = 0.22;
    state.score = Math.max(0, state.score - 40);
    addImpact(p.x, p.y, 70, kind === 'charge' || kind === 'laser' ? 'danger' : 'gold');
    setPrompt(kind === 'laser' || kind === 'charge' ? 'JETでよけよう' : 'よけよう', 1.55);
    updateHud();
  }

  function activateJet(dx = 0, dy = 0) {
    const p = state.player;
    if (state.mode !== 'playing' || p.jetCooldown > 0) return false;
    const yDir = Math.abs(dy) > 0.2 ? Math.sign(dy) : (p.y > BASE_H * 0.52 ? -1 : 1);
    const xDir = Math.abs(dx) > 0.2 ? Math.sign(dx) : -(p.facing || 1) * 0.2;
    p.jetTimer = 0.34;
    p.jetCooldown = 2.1;
    p.shield = Math.max(p.shield, 0.42);
    p.jetVx = xDir * 340;
    p.jetVy = yDir * 640;
    for (let i = 0; i < 9; i += 1) {
      const trailDir = -(p.facing || 1);
      state.bubbles.push({ x: p.x + trailDir * 90 + rand(-12, 14), y: p.y + rand(-20, 24), r: rand(5, 14), vx: trailDir * rand(70, 150), vy: rand(-80, 70), life: rand(0.55, 1.0), max: 1.0 });
    }
    syncJetButton();
    return true;
  }

  function beginBossAttack(enemy) {
    const pattern = ['normal', 'charge', 'normal', 'laser'];
    enemy.attackKind = pattern[state.bossAttackIndex % pattern.length];
    state.bossAttackIndex += 1;
    enemy.attackPhase = 'telegraph';
    enemy.attackT = 0;
    enemy.attackPulse = 0;
    enemy.dashY = clamp(state.player.y, 240, 690);
    if (enemy.attackKind === 'charge') say(enemy, BOSS_LINES.charge, 1.55);
    else if (enemy.attackKind === 'laser') say(enemy, BOSS_LINES.laser, 1.65);
    else say(enemy, BOSS_LINES.normal, 1.45);
  }

  function endBossAttack(enemy, cooldown = 0.8) {
    enemy.attackPhase = 'idle';
    enemy.attackKind = 'idle';
    enemy.attackT = 0;
    enemy.attackPulse = 0;
    enemy.attackCooldown = cooldown;
  }

  function spawnBossNormalAttack(enemy) {
    const roll = Math.random();
    if (roll < 0.45) {
      state.enemyShots.push({
        kind: 'bubble',
        x: enemy.x - 138,
        y: enemy.y + rand(-74, 54),
        vx: rand(-190, -145),
        vy: rand(-28, 28),
        gravity: 0,
        r: rand(13, 22),
        life: 4.2
      });
    } else if (roll < 0.8) {
      state.enemyShots.push({
        kind: 'sand',
        x: enemy.x - 118,
        y: 720,
        vx: rand(-230, -175),
        vy: rand(-145, -82),
        gravity: 240,
        r: rand(8, 13),
        life: 3.2
      });
    } else {
      state.hazards.push({
        kind: 'whirlpool',
        x: state.camera + rand(390, 930),
        y: rand(330, 675),
        radius: rand(58, 78),
        spin: rand(-1, 1),
        life: 1.7,
        max: 1.7
      });
    }
  }

  function updateBossAI(enemy, dt) {
    if (state.bossPhase !== 'fight') {
      enemy.x += (BOSS_TARGET_X - enemy.x) * Math.min(1, dt * 1.05);
      enemy.y = enemy.baseY + Math.sin(state.time * 1.2) * 14;
      return;
    }

    if (enemy.attackKind !== 'charge' || (enemy.attackPhase !== 'active' && enemy.attackPhase !== 'recover')) {
      enemy.x += (BOSS_TARGET_X - enemy.x) * Math.min(1, dt * 0.78);
    }
    enemy.y = enemy.baseY + Math.sin(state.time * 1.2) * 16;

    if (!enemy.attackPhase || enemy.attackPhase === 'idle') {
      enemy.attackCooldown -= dt;
      if (enemy.attackCooldown <= 0) beginBossAttack(enemy);
      return;
    }

    enemy.attackT += dt;
    if (enemy.attackKind === 'normal') {
      if (enemy.attackPhase === 'telegraph' && enemy.attackT > 0.75) {
        enemy.attackPhase = 'active';
        enemy.attackT = 0;
        enemy.attackPulse = 0;
      } else if (enemy.attackPhase === 'active') {
        enemy.attackPulse -= dt;
        if (enemy.attackPulse <= 0) {
          spawnBossNormalAttack(enemy);
          enemy.attackPulse = 0.46;
        }
        if (enemy.attackT > 2.6) endBossAttack(enemy, 1.05);
      }
      return;
    }

    if (enemy.attackKind === 'charge') {
      if (enemy.attackPhase === 'telegraph') {
        enemy.dashY += (clamp(state.player.y, 240, 690) - enemy.dashY) * Math.min(1, dt * 2.6);
        enemy.y = enemy.dashY;
        if (enemy.attackT > 1.55) {
          enemy.attackPhase = 'active';
          enemy.attackT = 0;
          enemy.x = BOSS_ARENA_CAMERA + BASE_W + 210;
        }
      } else if (enemy.attackPhase === 'active') {
        enemy.y = enemy.dashY;
        enemy.x -= 820 * dt;
        if (distance(enemy.x - 40, enemy.y, state.player.x, state.player.y) < enemy.size * 0.38 + PLAYER_HIT_RADIUS) hitPlayer('charge');
        if (screenX(enemy.x) < -280) {
          enemy.attackPhase = 'recover';
          enemy.attackT = 0;
          enemy.x = BOSS_START_X;
        }
      } else if (enemy.attackPhase === 'recover') {
        enemy.x += (BOSS_TARGET_X - enemy.x) * Math.min(1, dt * 2.25);
        if (Math.abs(enemy.x - BOSS_TARGET_X) < 18) {
          enemy.x = BOSS_TARGET_X;
          endBossAttack(enemy, 1.15);
        } else if (enemy.attackT > 4.2) {
          enemy.x = BOSS_TARGET_X;
          endBossAttack(enemy, 1.35);
        }
      }
      return;
    }

    if (enemy.attackKind === 'laser') {
      if (enemy.attackPhase === 'telegraph' && enemy.attackT > 1.55) {
        enemy.attackPhase = 'active';
        enemy.attackT = 0;
      } else if (enemy.attackPhase === 'active') {
        const laserY = enemy.y + 12;
        if (state.player.x < enemy.x + 150 && Math.abs(state.player.y - laserY) < 48) hitPlayer('laser');
        if (enemy.attackT > 1.35) endBossAttack(enemy, 1.25);
      }
    }
  }

  function update(dt) {
    state.time += dt;
    if (state.promptTimer > 0) state.promptTimer -= dt;
    if (state.toastTimer > 0) {
      state.toastTimer -= dt;
      if (state.toastTimer <= 0) toastEl.classList.remove('show');
    }
    if (state.mode !== 'playing') {
      updateParticles(dt);
      return;
    }

    const p = state.player;
    p.shield = Math.max(0, (p.shield || 0) - dt);
    p.hit = Math.max(0, (p.hit || 0) - dt);
    p.jetCooldown = Math.max(0, (p.jetCooldown || 0) - dt);
    p.jetTimer = Math.max(0, (p.jetTimer || 0) - dt);
    if (state.keys.ArrowUp || state.keys.KeyW) p.ty -= PLAYER_MOVE_SPEED * dt;
    if (state.keys.ArrowDown || state.keys.KeyS) p.ty += PLAYER_MOVE_SPEED * dt;
    if (state.keys.ArrowLeft || state.keys.KeyA) {
      p.tx -= PLAYER_MOVE_SPEED * dt;
      p.facing = -1;
    }
    if (state.keys.ArrowRight || state.keys.KeyD) {
      p.tx += PLAYER_MOVE_SPEED * dt;
      p.facing = 1;
    }
    const arenaLocked = state.bossPhase === 'scroll' || state.bossPhase === 'intro' || state.bossPhase === 'fight' || state.bossPhase === 'done';
    const minPlayerX = arenaLocked ? state.camera + 120 : PLAYER_MIN_X;
    const maxPlayerX = arenaLocked ? state.camera + 780 : PLAYER_MAX_X;
    p.tx = clamp(p.tx, minPlayerX, maxPlayerX);
    p.ty = clamp(p.ty, 150, 735);
    p.x += (p.tx - p.x) * Math.min(1, dt * PLAYER_FOLLOW_RATE);
    p.y += (p.ty - p.y) * Math.min(1, dt * PLAYER_FOLLOW_RATE);
    if (p.jetTimer > 0) {
      p.x = clamp(p.x + p.jetVx * dt, minPlayerX, maxPlayerX);
      p.y = clamp(p.y + p.jetVy * dt, 150, 735);
      p.tx = p.x;
      p.ty = p.y;
    }
    updateBossSequence(dt);
    const desiredCamera = bossCameraTarget(p);
    const cameraRate = state.bossPhase === 'scroll' ? BOSS_SCROLL_RATE : (state.bossPhase === 'fight' || state.bossPhase === 'intro' ? BOSS_FIXED_CAMERA_RATE : CAMERA_FOLLOW_RATE);
    state.camera += (desiredCamera - state.camera) * Math.min(1, dt * cameraRate);

    state.shotTimer = Math.max(0, state.shotTimer - dt);
    state.bombTimer = Math.max(0, state.bombTimer - dt);
    if (state.fireHeld || state.keys.Space || state.keys.KeyZ || state.keys.Enter) tryFireBoth();
    if (state.bombHeld || state.keys.KeyX) tryFireBombs();

    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0 && !state.bossSpawned && state.bossPhase === 'none') {
      spawnEnemy();
      state.spawnTimer = rand(2.0, 3.2);
    }
    if (((state.time > 90 && state.camera > WORLD_W * 0.42) || state.observed >= 10) && !state.bossSpawned) spawnBoss();

    state.shots.forEach((s) => {
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.life -= dt;
    });
    state.shots = state.shots.filter((s) => s.life > 0 && s.x > state.camera - 90 && s.x < state.camera + BASE_W + 150 && s.y > -80 && s.y < BASE_H + 80);

    state.bombs.forEach((b) => {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.vy += BOMB_GRAVITY * dt;
      b.life -= dt;
      if (b.y > 742) {
        b.life = 0;
        addImpact(b.x, 742, b.blast);
      }
    });
    state.bombs = state.bombs.filter((b) => b.life > 0 && b.x > state.camera - 120 && b.x < state.camera + BASE_W + 170);

    state.enemyShots.forEach((s) => {
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += (s.gravity || 0) * dt;
      s.life -= dt;
      if (distance(s.x, s.y, p.x, p.y) < PLAYER_HIT_RADIUS + s.r) {
        s.life = 0;
        hitPlayer(s.kind === 'sand' ? 'sand' : 'bubble');
      }
    });
    state.enemyShots = state.enemyShots.filter((s) => s.life > 0 && s.x > state.camera - 140 && s.x < state.camera + BASE_W + 180 && s.y > -90 && s.y < BASE_H + 90);
    state.hazards.forEach((h) => {
      h.life -= dt;
      if (h.kind === 'whirlpool' && h.life > 0 && distance(h.x, h.y, p.x, p.y) < h.radius + PLAYER_HIT_RADIUS * 0.55) {
        const pull = Math.min(1, dt * 1.6);
        p.x += (h.x - p.x) * pull;
        p.y += (h.y - p.y) * pull;
        hitPlayer('whirlpool');
      }
    });
    state.hazards = state.hazards.filter((h) => h.life > 0);

    state.enemies.forEach((enemy) => {
      enemy.phase += dt;
      enemy.hit = Math.max(0, enemy.hit - dt);
      enemy.eatTimer = Math.max(0, enemy.eatTimer - dt);
      if (enemy.eatTimer <= 0 && enemy.mood === 'eating') enemy.mood = 'normal';
      if (enemy.speech) {
        enemy.speech.ttl -= dt;
        if (enemy.speech.ttl <= 0) enemy.speech = null;
      }
      if (enemy.defeated) {
        enemy.vanishTimer -= dt;
        enemy.y = enemy.baseY + Math.sin(state.time * 4 + enemy.phase) * 6;
        return;
      }
      if (enemy.boss) {
        updateBossAI(enemy, dt);
      } else {
        enemy.x += (enemy.dir || -1) * enemy.speed * dt;
        enemy.y = enemy.baseY + Math.sin(enemy.phase * 2.2) * (ENEMY_TYPES[enemy.key].bottom ? 5 : 26);
      }
    });

    checkCollisions();
    state.enemies = state.enemies.filter((e) => {
      if (e.defeated) return e.vanishTimer > 0;
      if (e.boss) return true;
      const sx = screenX(e.x);
      return sx > -240 && sx < BASE_W + 240;
    });

    state.powerups.forEach((u) => {
      u.x -= 48 * dt;
      u.y += Math.sin(state.time * 3 + u.x * 0.01) * 12 * dt;
      u.life -= dt;
      if (distance(u.x, u.y, p.x, p.y) < 70) {
        u.life = 0;
        state.power = Math.min(4, state.power + 1);
        state.score += 70;
        setPrompt(state.power >= 3 ? 'ボム +1' : 'えさ弾 +1', 2.1);
        updateHud();
      }
    });
    state.powerups = state.powerups.filter((u) => u.life > 0 && screenX(u.x) > -80);

    updateParticles(dt);
    if (state.finishTimer > 0) {
      state.finishTimer -= dt;
      if (state.finishTimer <= 0 && !state.finishStarted) {
        state.finishStarted = true;
        finishStage();
      }
    }
    syncJetButton();
    if (Math.random() < dt * 4.4) {
      const trailDir = -(p.facing || 1);
      state.bubbles.push({ x: p.x + trailDir * 86, y: p.y + 24, r: rand(5, 13), vx: trailDir * rand(8, 24), vy: rand(-62, -34), life: rand(1.0, 1.8), max: 1.8 });
    }
  }

  function updateParticles(dt) {
    state.impacts.forEach((i) => { i.life -= dt; });
    state.impacts = state.impacts.filter((i) => i.life > 0);
    updateDroppedCoins(dt);
    state.coinPops.forEach((c) => {
      c.y -= 34 * dt;
      c.life -= dt;
    });
    state.coinPops = state.coinPops.filter((c) => c.life > 0);
    state.bubbles.forEach((b) => {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.life -= dt;
    });
    state.bubbles = state.bubbles.filter((b) => b.life > 0);
  }

  function updateDroppedCoins(dt) {
    const p = state.player;
    state.coinsDropped.forEach((coin) => {
      coin.life -= dt;
      const d = distance(coin.x, coin.y, p.x, p.y);
      if (d < COIN_MAGNET_RADIUS) {
        const pull = (1 - d / COIN_MAGNET_RADIUS) * 7.5 + 2.8;
        coin.vx += (p.x - coin.x) * pull * dt;
        coin.vy += (p.y - coin.y) * pull * dt;
        coin.magnet = true;
      } else {
        coin.vy += 95 * dt;
      }
      coin.vx *= Math.pow(0.2, dt);
      coin.vy *= Math.pow(0.34, dt);
      coin.x += coin.vx * dt;
      coin.y += coin.vy * dt;
      coin.y = clamp(coin.y, 80, 760);
      if (d < COIN_COLLECT_RADIUS) {
        coin.life = 0;
        collectCoins(coin.value, coin.x, coin.y);
      }
    });
    state.coinsDropped = state.coinsDropped.filter((coin) => coin.life > 0);
  }

  function checkCollisions() {
    for (const enemy of state.enemies) {
      if (enemy.defeated) continue;
      const hitRadius = enemy.size * (enemy.boss ? 0.46 : 0.44);
      for (const s of state.shots) {
        if (s.life > 0 && distance(s.x, s.y, enemy.x, enemy.y) < hitRadius + s.r) {
          s.life = 0;
          enemy.hp -= s.damage || 1;
          enemy.hit = 0.1;
          feedReaction(enemy);
          addImpact(s.x, s.y, 28, 'gold');
          if (enemy.hp <= 0) defeatEnemy(enemy);
        }
      }
      for (const b of state.bombs) {
        if (b.life > 0 && distance(b.x, b.y, enemy.x, enemy.y) < hitRadius + b.r) {
          b.life = 0;
          enemy.hp -= b.damage || (enemy.boss ? 2 : 3);
          enemy.hit = 0.12;
          feedReaction(enemy);
          addImpact(b.x, b.y, b.blast, 'gold');
          if (enemy.hp <= 0) defeatEnemy(enemy);
        }
      }
    }
  }

  function draw() {
    ctx.save();
    ctx.setTransform(canvas.width / BASE_W, 0, 0, canvas.height / BASE_H, 0, 0);
    drawBackground();
    drawBubbles();
    drawBossEffects();
    state.hazards.forEach(drawHazard);
    state.powerups.forEach(drawPowerup);
    state.enemies.forEach(drawEnemy);
    state.shots.forEach(drawShot);
    state.bombs.forEach(drawBomb);
    state.enemyShots.forEach(drawEnemyShot);
    state.impacts.forEach(drawImpact);
    state.coinsDropped.forEach(drawDroppedCoin);
    state.coinPops.forEach(drawCoinPop);
    drawPlayer();
    drawWaterOverlay();
    drawBossOverlay();
    ctx.restore();
  }

  function drawBackground() {
    const bg = state.assets.scrollBg || state.assets.bg;
    if (bg) {
      const targetAspect = BASE_W / BASE_H;
      const wideEnough = bg.width / bg.height > targetAspect + 0.05;
      if (wideEnough) {
        const sw = Math.min(bg.width, bg.height * targetAspect);
        const maxSx = Math.max(0, bg.width - sw);
        const sx = maxSx * clamp(state.camera / Math.max(1, WORLD_W - BASE_W), 0, 1);
        ctx.drawImage(bg, sx, 0, sw, bg.height, 0, 0, BASE_W, BASE_H);
      } else {
        ctx.drawImage(bg, 0, 0, BASE_W, BASE_H);
      }
    } else {
      const g = ctx.createLinearGradient(0, 0, 0, BASE_H);
      g.addColorStop(0, '#8ee8f4');
      g.addColorStop(0.48, '#23a6c7');
      g.addColorStop(1, '#f0d38a');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, BASE_W, BASE_H);
    }
    ctx.save();
    ctx.globalAlpha = 0.16;
    ctx.fillStyle = '#fff7c8';
    for (let i = 0; i < 6; i += 1) {
      const x = 120 + i * 260 - (state.camera * 0.08 % 260) + Math.sin(state.time * 0.2 + i) * 30;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + 90, 0);
      ctx.lineTo(x + 290, BASE_H);
      ctx.lineTo(x - 120, BASE_H);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawPlayer() {
    const p = state.player;
    const image = state.assets.player;
    ctx.save();
    ctx.translate(screenX(p.x), p.y);
    if ((p.facing || 1) < 0) ctx.scale(-1, 1);
    const bob = Math.sin(state.time * 4) * 4;
    if (p.hit > 0) ctx.filter = 'brightness(1.8) saturate(1.35)';
    if (p.jetTimer > 0) {
      ctx.save();
      ctx.globalAlpha = 0.72;
      ctx.fillStyle = '#e9fdff';
      ctx.shadowColor = '#d8ffff';
      ctx.shadowBlur = 18;
      for (let i = 0; i < 4; i += 1) {
        ctx.beginPath();
        ctx.ellipse(-96 - i * 18, bob + Math.sin(state.time * 24 + i) * 12, 28 - i * 4, 10 - i, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    if (image) {
      drawCentered(image, 0, bob, 188);
    } else {
      ctx.translate(0, bob);
      ctx.fillStyle = '#f3c84c';
      ctx.strokeStyle = '#1f6689';
      ctx.lineWidth = 5;
      roundedEllipse(0, 0, 92, 46);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#58b9df';
      ctx.beginPath();
      ctx.ellipse(18, -4, 31, 26, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#8d5a2c';
      ctx.beginPath();
      ctx.arc(18, -4, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1f6689';
      ctx.beginPath();
      ctx.moveTo(-90, 0);
      ctx.lineTo(-130, -28);
      ctx.lineTo(-126, 28);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(78, -28);
      ctx.lineTo(126, 0);
      ctx.lineTo(78, 28);
      ctx.closePath();
      ctx.fill();
    }
    ctx.filter = 'none';
    if (p.shield > 0) {
      ctx.globalAlpha = clamp(p.shield, 0, 0.62);
      ctx.strokeStyle = '#e9fdff';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.ellipse(0, bob, 118, 66, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function roundedEllipse(x, y, rx, ry) {
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
  }

  function drawCentered(image, x, y, width, alpha = 1) {
    const h = width * image.height / image.width;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.drawImage(image, x - width / 2, y - h / 2, width, h);
    ctx.restore();
  }

  function drawFoodImage(x, y, r, bubble = false) {
    const food = bubble ? (state.assets.foodBubble || state.assets.foodPellet) : state.assets.foodPellet;
    if (food) drawCentered(food, x, y, r * 2.2);
    else drawFoodOrb(x, y, r);
  }

  function drawShot(s) {
    ctx.save();
    ctx.translate(screenX(s.x), s.y);
    const angle = Math.atan2(s.vy, s.vx);
    ctx.rotate(angle);
    const g = ctx.createLinearGradient(-56, 0, 10, 0);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(0.42, 'rgba(255, 247, 168, 0.74)');
    g.addColorStop(1, '#ffb13e');
    ctx.fillStyle = g;
    ctx.shadowColor = '#fff0a0';
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.ellipse(-22, 0, 46, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    drawFoodImage(18, 0, s.r);
    ctx.restore();
  }

  function drawBomb(b) {
    ctx.save();
    ctx.translate(screenX(b.x), b.y);
    ctx.rotate(Math.sin(state.time * 8 + b.x * 0.01) * 0.18);
    ctx.shadowColor = '#bff7ff';
    ctx.shadowBlur = 18;
    drawFoodImage(0, 0, b.r * 1.18, true);
    ctx.restore();
  }

  function drawEnemyShot(s) {
    ctx.save();
    ctx.translate(screenX(s.x), s.y);
    if (s.kind === 'sand') {
      ctx.fillStyle = '#d9bd76';
      ctx.strokeStyle = 'rgba(109, 78, 38, 0.62)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, s.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    } else {
      ctx.globalAlpha = 0.86;
      ctx.strokeStyle = '#eaffff';
      ctx.fillStyle = 'rgba(209, 250, 255, 0.24)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, s.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.72)';
      ctx.beginPath();
      ctx.arc(-s.r * 0.28, -s.r * 0.28, s.r * 0.22, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawHazard(h) {
    if (h.kind !== 'whirlpool') return;
    const pct = 1 - h.life / h.max;
    ctx.save();
    ctx.translate(screenX(h.x), h.y);
    ctx.rotate(state.time * 4 * (h.spin < 0 ? -1 : 1));
    ctx.globalAlpha = 0.72 * (1 - pct * 0.25);
    ctx.strokeStyle = '#e8ffff';
    ctx.lineWidth = 5;
    for (let i = 0; i < 3; i += 1) {
      ctx.beginPath();
      ctx.arc(0, 0, h.radius * (0.35 + i * 0.22 + pct * 0.12), i * 1.1, Math.PI * 1.45 + i * 1.1);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBossEffects() {
    const boss = state.enemies.find((enemy) => enemy.boss && !enemy.defeated);
    if (!boss || state.bossPhase !== 'fight') return;
    if (boss.attackKind === 'charge' && (boss.attackPhase === 'telegraph' || boss.attackPhase === 'active')) {
      const y = boss.dashY || boss.y;
      ctx.save();
      ctx.globalAlpha = boss.attackPhase === 'telegraph' ? 0.28 + Math.sin(state.time * 28) * 0.08 : 0.2;
      ctx.fillStyle = '#ff776d';
      ctx.fillRect(0, y - 56, BASE_W, 112);
      ctx.strokeStyle = '#fff4a8';
      ctx.lineWidth = 5;
      ctx.setLineDash([22, 14]);
      ctx.beginPath();
      ctx.moveTo(0, y - 58);
      ctx.lineTo(BASE_W, y - 58);
      ctx.moveTo(0, y + 58);
      ctx.lineTo(BASE_W, y + 58);
      ctx.stroke();
      ctx.restore();
    }
    if (boss.attackKind === 'laser' && (boss.attackPhase === 'telegraph' || boss.attackPhase === 'active')) {
      const y = boss.y + 12;
      const startX = screenX(boss.x + 105);
      ctx.save();
      if (boss.attackPhase === 'telegraph') {
        ctx.globalAlpha = 0.28 + Math.sin(state.time * 24) * 0.12;
        ctx.strokeStyle = '#fff1a6';
        ctx.lineWidth = 8;
        ctx.setLineDash([26, 16]);
        ctx.beginPath();
        ctx.moveTo(startX, y);
        ctx.lineTo(0, y);
        ctx.stroke();
      } else {
        const beam = ctx.createLinearGradient(startX, y, 0, y);
        beam.addColorStop(0, '#fff8b8');
        beam.addColorStop(0.4, '#ffe65a');
        beam.addColorStop(1, 'rgba(255, 167, 59, 0.2)');
        ctx.shadowColor = '#fff1a6';
        ctx.shadowBlur = 22;
        ctx.strokeStyle = beam;
        ctx.lineWidth = 38 + Math.sin(state.time * 38) * 6;
        ctx.beginPath();
        ctx.moveTo(startX, y);
        ctx.lineTo(0, y);
        ctx.stroke();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 9;
        ctx.beginPath();
        ctx.moveTo(startX, y);
        ctx.lineTo(0, y);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  function drawBossOverlay() {
    if (state.bossPhase === 'warning') {
      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.fillStyle = 'rgba(4, 28, 45, 0.54)';
      ctx.fillRect(0, 0, BASE_W, BASE_H);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff4a8';
      ctx.font = '900 104px Zen Maru Gothic, sans-serif';
      ctx.fillText(BOSS_LINES.warning, BASE_W / 2, BASE_H * 0.43);
      ctx.fillStyle = '#ffffff';
      ctx.font = '900 38px Zen Maru Gothic, sans-serif';
      ctx.fillText('カブトガニ 接近中', BASE_W / 2, BASE_H * 0.56);
      ctx.restore();
    } else if (state.bossPhase === 'scroll') {
      ctx.save();
      ctx.globalAlpha = 0.78;
      ctx.fillStyle = '#e9fdff';
      ctx.font = '900 30px Zen Maru Gothic, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('海底の奥へ 強制スクロール中', BASE_W / 2, 112);
      ctx.restore();
    }
  }

  function drawPowerup(u) {
    ctx.save();
    ctx.translate(screenX(u.x), u.y);
    ctx.rotate(state.time * 1.8);
    ctx.shadowColor = '#fff2a8';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#fff28a';
    starPath(0, 0, 24, 11, 5);
    ctx.fill();
    ctx.restore();
  }

  function starPath(x, y, r1, r2, n) {
    ctx.beginPath();
    for (let i = 0; i < n * 2; i += 1) {
      const r = i % 2 ? r2 : r1;
      const a = -Math.PI / 2 + i * Math.PI / n;
      const px = x + Math.cos(a) * r;
      const py = y + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
  }

  function drawEnemy(enemy) {
    const type = ENEMY_TYPES[enemy.key];
    const image = state.assets[moodAssetKey(enemy)] || state.assets[enemy.key + 'Normal'];
    const mood = enemyMood(enemy);
    ctx.save();
    ctx.translate(screenX(enemy.x), enemy.y);
    if (enemy.defeated) ctx.globalAlpha = clamp(enemy.vanishTimer / (enemy.boss ? 1.8 : 1.18), 0, 1);
    if (enemy.hit > 0) ctx.filter = 'brightness(1.8)';
    ctx.save();
    if (!enemy.boss && (enemy.dir || -1) > 0) ctx.scale(-1, 1);
    if (enemy.boss && enemy.attackKind === 'laser' && (enemy.attackPhase === 'telegraph' || enemy.attackPhase === 'active')) ctx.scale(-1, 1);
    if (enemy.boss && enemy.attackKind === 'charge' && enemy.attackPhase === 'telegraph') {
      const pulse = 1 + Math.sin(enemy.attackT * 28) * 0.035 + enemy.attackT * 0.025;
      ctx.scale(pulse, pulse);
    }
    if (image) {
      drawCentered(image, 0, 0, enemy.size * (ENEMY_SPRITE_SCALE[enemy.key] || 1.45));
    } else {
      if (enemy.key === 'hermit') drawHermit(enemy.size, mood);
      else if (enemy.key === 'shrimp') drawShrimp(enemy.size, mood);
      else if (enemy.key === 'seaStar') drawSeaStar(enemy.size, mood);
      else if (enemy.key === 'goby') drawGoby(enemy.size, mood);
      else if (enemy.key === 'anemone') drawAnemone(enemy.size, mood);
      else drawHorseshoe(enemy.size, mood);
    }
    ctx.restore();
    ctx.filter = 'none';
    if (!enemy.defeated) {
      if (enemy.boss) drawBossBar(enemy);
      else drawSmallHp(enemy, type);
    }
    if (enemy.speech) drawSpeechBubble(enemy.speech.text, enemy.boss ? -40 : 0, enemy.boss ? -230 : -enemy.size * 1.02, enemy.boss ? 360 : 230);
    ctx.restore();
  }

  function drawSmallHp(enemy) {
    const w = enemy.size;
    const pct = clamp(enemy.hp / enemy.maxHp, 0, 1);
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    roundRect(-w * 0.42, -w * 0.76, w * 0.84, 9, 5);
    ctx.fill();
    ctx.fillStyle = '#63bd78';
    roundRect(-w * 0.42, -w * 0.76, w * 0.84 * pct, 9, 5);
    ctx.fill();
  }

  function drawBossBar(enemy) {
    const pct = clamp(enemy.hp / enemy.maxHp, 0, 1);
    ctx.fillStyle = 'rgba(255,255,255,0.82)';
    roundRect(-170, -180, 340, 24, 8);
    ctx.fill();
    ctx.fillStyle = '#ff8b76';
    roundRect(-166, -176, 332 * pct, 16, 6);
    ctx.fill();
    ctx.fillStyle = '#0c5572';
    ctx.font = '900 22px Zen Maru Gothic, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('カブトガニ', 0, -196);
  }

  function drawSpeechBubble(text, x, y, w) {
    ctx.save();
    ctx.font = '900 20px Zen Maru Gothic, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const maxW = w;
    const lines = wrapText(text, maxW - 30, ctx.font);
    const h = 34 + lines.length * 24;
    const left = x - maxW / 2;
    const top = y - h / 2;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.92)';
    ctx.strokeStyle = 'rgba(41, 125, 152, 0.32)';
    ctx.lineWidth = 3;
    roundRect(left, top, maxW, h, 12);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 22, top + h - 2);
    ctx.lineTo(x + 6, top + h + 20);
    ctx.lineTo(x - 12, top + h - 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#0d4964';
    lines.forEach((line, index) => {
      ctx.fillText(line, x, top + 22 + index * 24);
    });
    ctx.restore();
  }

  function wrapText(text, maxWidth, font) {
    ctx.save();
    ctx.font = font;
    const lines = [];
    let line = '';
    for (const char of text) {
      const next = line + char;
      if (line && ctx.measureText(next).width > maxWidth) {
        lines.push(line);
        line = char;
      } else {
        line = next;
      }
    }
    if (line) lines.push(line);
    ctx.restore();
    return lines.slice(0, 3);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
  }

  function drawFoodOrb(x, y, r) {
    ctx.save();
    ctx.shadowColor = '#fff0a0';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#f5c44d';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    ctx.beginPath();
    ctx.arc(x - r * 0.28, y - r * 0.32, r * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawClosedEye(x, y, w = 13) {
    ctx.save();
    ctx.strokeStyle = '#18394a';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x - w * 0.5, y);
    ctx.quadraticCurveTo(x, y + 6, x + w * 0.5, y);
    ctx.stroke();
    ctx.restore();
  }

  function drawSmile(x, y, w = 24, h = 12) {
    ctx.save();
    ctx.strokeStyle = '#8c4725';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x - w * 0.5, y);
    ctx.quadraticCurveTo(x, y + h, x + w * 0.5, y);
    ctx.stroke();
    ctx.restore();
  }

  function drawOpenMouth(x, y, r = 7) {
    ctx.save();
    ctx.fillStyle = '#8b332d';
    ctx.beginPath();
    ctx.ellipse(x, y, r, r * 0.72, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawHermit(s, mood) {
    ctx.fillStyle = '#e66d37';
    ctx.strokeStyle = '#8c4725';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(8, 10, s * 0.35, s * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#e8c18a';
    ctx.beginPath();
    ctx.arc(-20, -10, s * 0.34, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    if (mood === 'happy') {
      drawClosedEye(18, -12, 13);
      drawClosedEye(36, -10, 13);
      drawSmile(28, 4, 22, 11);
    } else {
      ctx.fillStyle = '#1c3d4c';
      ctx.beginPath();
      ctx.arc(18, -12, 5, 0, Math.PI * 2);
      ctx.arc(36, -10, 5, 0, Math.PI * 2);
      ctx.fill();
      if (mood === 'eating') {
        drawOpenMouth(29, 2, 6);
        drawFoodOrb(45, 6, s * 0.12);
      } else {
        drawSmile(28, 3, 18, 8);
      }
    }
  }

  function drawShrimp(s, mood) {
    ctx.strokeStyle = '#d45f45';
    ctx.lineWidth = 4;
    ctx.fillStyle = '#ff9e82';
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.46, s * 0.22, 0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-28, -4);
    ctx.quadraticCurveTo(-58, -22, -78, -8);
    ctx.stroke();
    if (mood === 'happy') {
      drawClosedEye(25, -10, 13);
      drawSmile(29, 6, 20, 9);
    } else {
      ctx.fillStyle = '#18394a';
      ctx.beginPath();
      ctx.arc(25, -10, 5, 0, Math.PI * 2);
      ctx.fill();
      if (mood === 'eating') {
        drawOpenMouth(32, 3, 6);
        drawFoodOrb(48, 5, s * 0.12);
      }
    }
  }

  function drawSeaStar(s, mood) {
    ctx.fillStyle = '#f78a49';
    ctx.strokeStyle = '#bf6538';
    ctx.lineWidth = 4;
    starPath(0, 0, s * 0.45, s * 0.2, 5);
    ctx.fill();
    ctx.stroke();
    if (mood === 'happy') {
      drawClosedEye(-10, -4, 12);
      drawClosedEye(10, -4, 12);
      drawSmile(0, 11, 26, 12);
    } else {
      ctx.fillStyle = '#10384a';
      ctx.beginPath();
      ctx.arc(-9, -4, 4, 0, Math.PI * 2);
      ctx.arc(9, -4, 4, 0, Math.PI * 2);
      ctx.fill();
      if (mood === 'eating') {
        drawOpenMouth(0, 10, 7);
        drawFoodOrb(0, 24, s * 0.13);
      }
    }
  }

  function drawGoby(s, mood) {
    ctx.fillStyle = '#e2bd72';
    ctx.strokeStyle = '#8d6b3d';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.5, s * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-42, 0);
    ctx.lineTo(-70, -18);
    ctx.lineTo(-68, 18);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    if (mood === 'happy') {
      drawClosedEye(30, -8, 14);
      drawSmile(36, 8, 22, 9);
    } else {
      ctx.fillStyle = '#16394b';
      ctx.beginPath();
      ctx.arc(30, -8, 6, 0, Math.PI * 2);
      ctx.fill();
      if (mood === 'eating') {
        drawOpenMouth(43, 5, 6);
        drawFoodOrb(61, 6, s * 0.12);
      }
    }
  }

  function drawAnemone(s, mood) {
    ctx.fillStyle = '#ef6f80';
    ctx.strokeStyle = '#b94d62';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(0, 20, s * 0.38, s * 0.26, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    for (let i = 0; i < 10; i += 1) {
      const a = -Math.PI + i * Math.PI / 9;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * 12, 0);
      ctx.quadraticCurveTo(Math.cos(a) * s * 0.36, -s * 0.24, Math.cos(a) * s * 0.45, -s * 0.5 + Math.sin(i) * 8);
      ctx.stroke();
    }
    if (mood === 'happy') {
      drawClosedEye(-12, 18, 12);
      drawClosedEye(12, 18, 12);
      drawSmile(0, 31, 24, 12);
    } else if (mood === 'eating') {
      drawOpenMouth(0, 14, 8);
      drawFoodOrb(0, -6, s * 0.14);
    } else {
      ctx.fillStyle = '#7d3348';
      ctx.beginPath();
      ctx.arc(-10, 18, 4, 0, Math.PI * 2);
      ctx.arc(10, 18, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawHorseshoe(s, mood) {
    ctx.fillStyle = '#8c8051';
    ctx.strokeStyle = '#4d4328';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.ellipse(-8, 0, s * 0.5, s * 0.34, 0.02, Math.PI * 0.12, Math.PI * 1.88);
    ctx.lineTo(s * 0.76, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    if (mood === 'happy') {
      drawClosedEye(-54, -30, 16);
      drawClosedEye(-40, 18, 16);
      drawSmile(-25, 0, 40, 15);
    } else {
      ctx.fillStyle = '#4d4328';
      ctx.beginPath();
      ctx.arc(-54, -30, 7, 0, Math.PI * 2);
      ctx.arc(-40, 18, 7, 0, Math.PI * 2);
      ctx.fill();
      if (mood === 'eating') {
        drawOpenMouth(-12, 2, 10);
        drawFoodOrb(28, 10, s * 0.08);
      }
    }
    ctx.strokeStyle = '#d7c884';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-60, -50);
    ctx.quadraticCurveTo(-16, -18, 26, -10);
    ctx.moveTo(-62, 42);
    ctx.quadraticCurveTo(-12, 24, 38, 12);
    ctx.stroke();
  }

  function drawImpact(i) {
    const pct = 1 - i.life / i.max;
    ctx.save();
    ctx.globalAlpha = 1 - pct;
    ctx.strokeStyle = i.kind === 'danger' ? '#ff776d' : (i.kind === 'boss' ? '#ff8b76' : '#fff4a8');
    ctx.lineWidth = 8 * (1 - pct) + 2;
    ctx.beginPath();
    ctx.arc(screenX(i.x), i.y, i.radius * (0.4 + pct * 0.9), 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function drawDroppedCoin(c) {
    const alpha = clamp(c.life / Math.min(c.max, 1.2), 0, 1);
    ctx.save();
    ctx.translate(screenX(c.x), c.y);
    ctx.rotate(state.time * c.spin + c.phase);
    ctx.globalAlpha = alpha;
    ctx.shadowColor = c.magnet ? '#fff8b8' : '#ffd86e';
    ctx.shadowBlur = c.magnet ? 18 : 9;
    ctx.fillStyle = '#ffd86e';
    ctx.strokeStyle = '#a66d12';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(0, 0, c.r, c.r * 0.86, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#fff7c6';
    ctx.beginPath();
    ctx.ellipse(-c.r * 0.3, -c.r * 0.28, c.r * 0.28, c.r * 0.18, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#9b6b18';
    ctx.font = '900 ' + Math.round(c.r * 1.12) + 'px Zen Maru Gothic, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('C', 0, 1);
    ctx.restore();
  }

  function drawCoinPop(c) {
    const alpha = clamp(c.life / c.max, 0, 1);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(screenX(c.x), c.y);
    ctx.shadowColor = '#fff1a0';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffd86e';
    ctx.beginPath();
    ctx.arc(-28, -2, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#9b6b18';
    ctx.font = '900 17px Zen Maru Gothic, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('C', -28, -2);
    ctx.fillStyle = '#fff7c6';
    ctx.strokeStyle = 'rgba(36, 70, 76, 0.58)';
    ctx.lineWidth = 4;
    ctx.font = '900 28px Zen Maru Gothic, sans-serif';
    ctx.strokeText('+' + c.amount, 10, 0);
    ctx.fillText('+' + c.amount, 10, 0);
    ctx.restore();
  }

  function drawBubbles() {
    ctx.save();
    ctx.strokeStyle = 'rgba(235, 254, 255, 0.7)';
    ctx.lineWidth = 2;
    state.bubbles.forEach((b) => {
      ctx.globalAlpha = clamp(b.life / b.max, 0, 1);
      ctx.beginPath();
      ctx.arc(screenX(b.x), b.y, b.r, 0, Math.PI * 2);
      ctx.stroke();
    });
    ctx.restore();
  }

  function drawWaterOverlay() {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 0.09;
    ctx.strokeStyle = '#e6ffff';
    ctx.lineWidth = 2;
    const offset = -((state.camera * 0.16) % 36);
    for (let y = 140; y < BASE_H; y += 62) {
      ctx.beginPath();
      let first = true;
      for (let x = offset - 20; x <= BASE_W + 56; x += 36) {
        const yy = y + Math.sin(x * 0.02 + state.time * 1.2 + y) * 4;
        if (first) {
          ctx.moveTo(x, yy);
          first = false;
        }
        else ctx.lineTo(x, yy);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function pointerToGame(ev) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (ev.clientX - rect.left) / rect.width * BASE_W,
      y: (ev.clientY - rect.top) / rect.height * BASE_H
    };
  }

  function setTarget(ev) {
    if (state.mode !== 'playing') return;
    const p = pointerToGame(ev);
    const worldX = state.camera + p.x;
    const arenaLocked = state.bossPhase === 'scroll' || state.bossPhase === 'intro' || state.bossPhase === 'fight' || state.bossPhase === 'done';
    const minPlayerX = arenaLocked ? state.camera + 120 : PLAYER_MIN_X;
    const maxPlayerX = arenaLocked ? state.camera + 780 : PLAYER_MAX_X;
    if (worldX < state.player.x - 18) state.player.facing = -1;
    else if (worldX > state.player.x + 18) state.player.facing = 1;
    state.player.tx = clamp(worldX, minPlayerX, maxPlayerX);
    state.player.ty = clamp(p.y, 150, 735);
  }

  function releasePointerFire(ev) {
    if (ev.button === 2) state.bombHeld = false;
    else if (ev.button === 0 || ev.button === -1) state.fireHeld = false;
  }

  function renderStages(targetId) {
    const target = document.getElementById(targetId);
    target.innerHTML = STAGES.map((s, i) => {
      const locked = i > 0;
      return '<div class="stage-card ' + (locked ? 'locked' : '') + '"><strong>Stage ' + (i + 1) + '<br>' + s[0] + '</strong><span>' + (locked ? 'これから追加' : s[1]) + '</span></div>';
    }).join('');
  }

  function renderAlbum() {
    albumText.textContent = state.album.size + ' / ' + CARDS.length;
    const grid = document.getElementById('albumGrid');
    grid.innerHTML = CARDS.map((card) => {
      const open = state.album.has(card.id);
      return '<button class="album-card ' + (open ? '' : 'locked') + '" data-card="' + card.id + '" type="button"><div class="album-icon">' + (open ? card.icon : '?') + '</div><strong>' + (open ? card.name : '???') + '</strong><span>' + (open ? card.stage + ' で発見' : 'まだ見つけていない') + '</span></button>';
    }).join('');
    grid.querySelectorAll('.album-card').forEach((btn) => {
      btn.addEventListener('click', () => showDetail(btn.dataset.card));
    });
  }

  function showDetail(id) {
    const card = CARDS.find((c) => c.id === id);
    if (!card) return;
    const open = state.album.has(id);
    document.getElementById('detailTitle').textContent = open ? card.name : 'まだ ひみつ';
    document.getElementById('detailSub').textContent = open ? card.stage : 'ステージで見つけよう';
    document.getElementById('detailArt').textContent = open ? card.icon : '?';
    document.getElementById('detailFacts').innerHTML = open
      ? [
        ['すむところ', card.habitat],
        ['たべもの', card.food],
        ['からだのひみつ', card.secret]
      ].map(([k, v]) => '<div class="fact-row"><b>' + k + '</b><span>' + v + '</span></div>').join('')
      : '<div class="fact-row"><b>ヒント</b><span>Stage 1 で観察すると、カードがひらくよ。</span></div>';
    detailOverlay.hidden = false;
  }

  function frame(now) {
    if (!frame.last) frame.last = now;
    const dt = Math.min(0.033, (now - frame.last) / 1000);
    frame.last = now;
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  canvas.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    canvas.setPointerCapture(ev.pointerId);
    setTarget(ev);
    if (ev.button === 2) {
      state.bombHeld = true;
      tryFireBombs();
    } else {
      state.fireHeld = true;
      tryFireBoth();
    }
  });
  canvas.addEventListener('pointermove', (ev) => {
    ev.preventDefault();
    setTarget(ev);
  });
  canvas.addEventListener('pointerup', (ev) => {
    releasePointerFire(ev);
    try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
  });
  canvas.addEventListener('pointercancel', (ev) => {
    releasePointerFire(ev);
    try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
  });
  canvas.addEventListener('contextmenu', (ev) => ev.preventDefault());
  window.addEventListener('keydown', (ev) => {
    if (['Space', 'Enter', 'KeyZ', 'KeyX', 'ShiftLeft', 'ShiftRight'].includes(ev.code)) ev.preventDefault();
    state.keys[ev.code] = true;
    if (ev.code === 'Space' || ev.code === 'Enter' || ev.code === 'KeyZ') tryFireBoth();
    if (ev.code === 'KeyX') tryFireBombs();
    if (ev.code === 'ShiftLeft' || ev.code === 'ShiftRight') activateJet();
  });
  window.addEventListener('keyup', (ev) => { state.keys[ev.code] = false; });
  window.addEventListener('blur', () => {
    state.keys = Object.create(null);
    state.fireHeld = false;
    state.bombHeld = false;
  });
  window.addEventListener('resize', resize);
  jetBtn.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    activateJet();
  });
  jetBtn.addEventListener('click', (ev) => {
    ev.preventDefault();
    activateJet();
  });

  document.getElementById('startBtn').addEventListener('click', resetRun);
  document.getElementById('againBtn').addEventListener('click', resetRun);
  document.getElementById('albumBtn').addEventListener('click', () => { renderAlbum(); albumOverlay.hidden = false; });
  document.getElementById('startAlbumBtn').addEventListener('click', () => { renderAlbum(); albumOverlay.hidden = false; });
  document.getElementById('finishAlbumBtn').addEventListener('click', () => { renderAlbum(); albumOverlay.hidden = false; });
  document.getElementById('stageBtn').addEventListener('click', () => { renderStages('stageGrid'); stageOverlay.hidden = false; });
  document.querySelectorAll('[data-close]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const el = document.getElementById(btn.dataset.close);
      if (el) el.hidden = true;
    });
  });

  Promise.all(Object.entries(ASSET).map(([key, src]) => {
    if (key !== 'bg' && key !== 'scrollBg' && key !== 'player' && !USE_ALPHA_SPRITES) {
      state.assets[key] = null;
      return Promise.resolve();
    }
    return loadOptional(src).then((image) => { state.assets[key] = image; });
  }))
    .then(() => {
      loadAlbum();
      loadCoins();
      renderStages('startStageGrid');
      renderStages('stageGrid');
      renderAlbum();
      resize();
      loading.hidden = true;
      updateHud();
      window.__seaAlbumState = state;
      requestAnimationFrame(frame);
    });
})();
</script>
</body>
</html>
