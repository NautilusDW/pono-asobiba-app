<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ポノの海底アルバム | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<script src="../js/game-stickers.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #104057;
    --deep: #05324d;
    --sea: #0d8eb8;
    --foam: #e9fdff;
    --panel: rgba(246, 254, 255, 0.9);
    --line: rgba(255, 255, 255, 0.62);
    --gold: #ffd86e;
    --coral: #ff8b76;
    --leaf: #51aa76;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    min-height: 100dvh;
    overflow: hidden;
    background: #031827;
    color: var(--ink);
    font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }

  body { display: grid; place-items: center; }

  #app {
    position: relative;
    width: min(100vw, calc(100dvh * 16 / 9));
    height: min(100dvh, calc(100vw * 9 / 16));
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: linear-gradient(180deg, #83e5f3, #086f9e);
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
  }

  @media (min-width: 720px) {
    #app { border-radius: 8px; }
  }

  #gameCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }

  .hud {
    position: absolute;
    z-index: 20;
    top: max(8px, env(safe-area-inset-top));
    left: max(8px, env(safe-area-inset-left));
    right: max(8px, env(safe-area-inset-right));
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    pointer-events: none;
  }

  .hud-group {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .hud-chip,
  .hud-btn,
  .prompt,
  .toast {
    border: 1px solid var(--line);
    background: var(--panel);
    box-shadow: 0 8px 22px rgba(3, 36, 60, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.58);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .hud-btn {
    pointer-events: auto;
    min-width: 70px;
    height: 40px;
    border-radius: 8px;
    border-color: var(--line);
    color: #0a5674;
    font: 900 0.94rem/1 'Zen Maru Gothic', sans-serif;
    text-decoration: none;
    display: grid;
    place-items: center;
    cursor: pointer;
  }

  .hud-chip {
    min-width: 92px;
    height: 40px;
    border-radius: 8px;
    padding: 5px 10px;
    display: grid;
    align-content: center;
    gap: 1px;
  }

  .hud-chip span {
    display: block;
    color: rgba(18, 73, 96, 0.68);
    font-size: 0.56rem;
    line-height: 1;
    font-weight: 900;
  }

  .hud-chip strong {
    display: block;
    color: #093a54;
    font-size: 0.9rem;
    line-height: 1;
    font-weight: 900;
    white-space: nowrap;
  }

  .prompt {
    position: absolute;
    z-index: 18;
    left: 50%;
    bottom: max(12px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    width: min(620px, calc(100% - 26px));
    min-height: 44px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    padding: 8px 18px;
    color: #0d4964;
    font-size: clamp(0.88rem, 2vw, 1.08rem);
    font-weight: 900;
    line-height: 1.24;
    text-align: center;
    pointer-events: none;
  }

  .toast {
    position: absolute;
    z-index: 22;
    left: 50%;
    top: max(106px, calc(env(safe-area-inset-top) + 106px));
    transform: translateX(-50%) translateY(-10px);
    opacity: 0;
    min-width: 220px;
    border-radius: 8px;
    padding: 10px 16px;
    color: #0c5572;
    font-size: 1rem;
    font-weight: 900;
    text-align: center;
    transition: opacity 0.22s ease, transform 0.22s ease;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .guide-strip {
    position: absolute;
    z-index: 19;
    top: max(56px, calc(env(safe-area-inset-top) + 56px));
    left: 50%;
    transform: translateX(-50%);
    width: min(560px, calc(100% - 300px));
    min-height: 42px;
    border: 1px solid rgba(255, 255, 255, 0.68);
    border-radius: 8px;
    background: rgba(238, 253, 255, 0.88);
    box-shadow: 0 10px 24px rgba(3, 36, 60, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.62);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 7px 12px;
    color: #0d4964;
    font-weight: 900;
    pointer-events: none;
  }

  .guide-copy {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: clamp(0.78rem, 1.5vw, 0.98rem);
  }

  .guide-progress {
    flex: 0 0 auto;
    padding: 4px 9px;
    border-radius: 999px;
    background: rgba(255, 216, 110, 0.8);
    color: #7a4b0b;
    font-size: clamp(0.72rem, 1.3vw, 0.86rem);
    line-height: 1;
    white-space: nowrap;
  }

  .event-card {
    position: absolute;
    z-index: 24;
    left: 50%;
    top: 44%;
    transform: translate(-50%, -50%) scale(0.96);
    width: min(520px, calc(100% - 38px));
    min-height: 120px;
    border: 3px solid rgba(255, 255, 255, 0.88);
    border-radius: 8px;
    background: rgba(246, 254, 255, 0.96);
    box-shadow: 0 22px 54px rgba(4, 35, 57, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.78);
    display: grid;
    grid-template-columns: 82px 1fr;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.16s ease, transform 0.16s ease;
  }

  .event-card.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .event-card.blue { border-color: rgba(133, 220, 255, 0.92); }
  .event-card.pink { border-color: rgba(255, 154, 206, 0.92); }
  .event-card.gold { border-color: rgba(255, 216, 110, 0.96); }
  .event-card.green { border-color: rgba(127, 210, 143, 0.92); }

  .event-icon {
    width: 74px;
    height: 74px;
    border-radius: 999px;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at 35% 25%, #fff8bf 0 18%, #ffd86e 48%, #d48a1e 100%);
    box-shadow: inset 0 3px 0 rgba(255, 255, 255, 0.58), 0 8px 16px rgba(117, 74, 12, 0.22);
    color: #7a4b0b;
    font-size: 2rem;
    font-weight: 900;
  }

  .event-card.blue .event-icon { background: radial-gradient(circle at 35% 25%, #f5ffff 0 18%, #a8e9ff 50%, #2792bc 100%); color: #075472; }
  .event-card.pink .event-icon { background: radial-gradient(circle at 35% 25%, #fff4fb 0 18%, #ffacd6 50%, #d74a93 100%); color: #8c235d; }
  .event-card.green .event-icon { background: radial-gradient(circle at 35% 25%, #f7fff0 0 18%, #98e58f 50%, #43a964 100%); color: #125a34; }

  .event-title {
    color: #073a54;
    font-size: clamp(1.28rem, 3.1vw, 1.78rem);
    line-height: 1.05;
    font-weight: 900;
  }

  .event-body {
    margin-top: 7px;
    color: #0d4964;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    line-height: 1.28;
    font-weight: 900;
  }

  .jet-btn {
    position: absolute;
    z-index: 24;
    right: max(12px, env(safe-area-inset-right));
    bottom: max(14px, env(safe-area-inset-bottom));
    width: 78px;
    height: 78px;
    border: 1px solid rgba(255, 255, 255, 0.68);
    border-radius: 50%;
    background:
      radial-gradient(circle at 36% 26%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.12) 34%, transparent 35%),
      linear-gradient(180deg, #e8ffff, #62d7f0 54%, #1f91c3);
    box-shadow: 0 8px 0 rgba(13, 79, 116, 0.48), 0 16px 26px rgba(0, 38, 64, 0.24);
    color: #06364f;
    font: 900 0.78rem/1 'Zen Maru Gothic', sans-serif;
    display: grid;
    place-items: center;
    gap: 2px;
    cursor: pointer;
    pointer-events: auto;
  }

  .jet-btn span,
  .jet-btn strong {
    display: block;
    line-height: 1;
  }

  .jet-btn strong {
    font-size: 1.05rem;
  }

  .jet-btn[disabled] {
    cursor: default;
    filter: grayscale(0.35);
    opacity: 0.58;
    transform: translateY(4px);
    box-shadow: 0 4px 0 rgba(13, 79, 116, 0.42), 0 10px 18px rgba(0, 38, 64, 0.18);
  }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: grid;
    place-items: center;
    padding: 22px;
    background:
      radial-gradient(circle at 50% 42%, rgba(255, 248, 190, 0.2), transparent 30%),
      rgba(3, 30, 48, 0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .overlay[hidden] { display: none; }

  .panel {
    width: min(900px, calc(100vw - 34px));
    max-height: min(760px, calc(100dvh - 34px));
    overflow: auto;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.64);
    background: linear-gradient(180deg, rgba(249, 254, 255, 0.97), rgba(222, 249, 251, 0.95));
    box-shadow: 0 26px 72px rgba(0, 18, 38, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.75);
    padding: 18px;
  }

  .panel-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }

  h1,
  h2 {
    color: #0b4968;
    font-weight: 900;
    letter-spacing: 0;
    line-height: 1.08;
  }

  h1 { font-size: clamp(1.55rem, 4.7vw, 2.34rem); }
  h2 { font-size: clamp(1.28rem, 3.8vw, 1.86rem); }

  .panel-copy {
    margin-top: 8px;
    color: #2d6680;
    font-size: clamp(0.92rem, 2.1vw, 1.04rem);
    line-height: 1.48;
    font-weight: 700;
  }

  .panel-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .primary-btn,
  .secondary-btn,
  .close-btn {
    min-height: 44px;
    border: 0;
    border-radius: 8px;
    font: 900 1rem/1 'Zen Maru Gothic', sans-serif;
    cursor: pointer;
    color: #07364f;
    padding: 0 18px;
  }

  .primary-btn {
    min-width: 150px;
    background: linear-gradient(180deg, #fff2a8, #ffd66f);
    box-shadow: 0 6px 0 #d99f37, 0 12px 20px rgba(143, 94, 28, 0.22);
  }

  .secondary-btn,
  .close-btn {
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(33, 111, 139, 0.22);
    box-shadow: 0 4px 0 rgba(33, 111, 139, 0.18);
  }

  .primary-btn:active,
  .secondary-btn:active,
  .close-btn:active,
  .hud-btn:active {
    transform: translateY(2px);
  }

  .stage-grid,
  .album-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 8px;
    margin-top: 14px;
  }

  .stage-card,
  .album-card {
    min-width: 0;
    border-radius: 8px;
    border: 1px solid rgba(42, 125, 153, 0.24);
    background: rgba(255, 255, 255, 0.72);
    padding: 10px;
    display: grid;
    gap: 6px;
  }

  .stage-card strong,
  .album-card strong {
    color: #0c4e6e;
    font-size: 0.9rem;
    line-height: 1.14;
  }

  .stage-card span,
  .album-card span {
    color: #4b7384;
    font-size: 0.72rem;
    line-height: 1.25;
    font-weight: 700;
  }

  .stage-card.locked {
    opacity: 0.52;
    filter: saturate(0.65);
  }

  .album-card {
    min-height: 138px;
    cursor: pointer;
  }

  .album-icon {
    height: 52px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    color: #fff;
    font-size: 1.65rem;
    font-weight: 900;
    background: linear-gradient(135deg, #6fcbe3, #4eaa84);
  }

  .album-card.locked .album-icon {
    background: linear-gradient(135deg, #9fb6c0, #748b95);
  }

  .detail-body {
    display: grid;
    grid-template-columns: minmax(120px, 180px) minmax(0, 1fr);
    gap: 16px;
    align-items: start;
  }

  .detail-art {
    min-height: 150px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    color: #fff;
    font-size: 3rem;
    font-weight: 900;
    background: radial-gradient(circle at 38% 28%, #fff6a8, transparent 34%), linear-gradient(135deg, #75d6e8, #4889aa);
  }

  .fact-list {
    display: grid;
    gap: 8px;
  }

  .fact-row {
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(33, 111, 139, 0.16);
    padding: 10px 12px;
  }

  .fact-row b {
    display: block;
    color: #0c5572;
    font-size: 0.82rem;
    margin-bottom: 3px;
  }

  .fact-row span {
    color: #315e70;
    font-size: 0.94rem;
    line-height: 1.4;
    font-weight: 700;
  }

  #loading {
    position: absolute;
    z-index: 60;
    inset: 0;
    display: grid;
    place-items: center;
    color: #e7fdff;
    font-weight: 900;
    background: #05324d;
  }

  #loading[hidden] { display: none; }

  @media (max-width: 760px), (max-height: 460px) {
    .hud { gap: 5px; }
    .hud-group { gap: 5px; }
    .hud-btn,
    .hud-chip {
      min-width: 62px;
      height: 34px;
      border-radius: 8px;
    }
    .hud-btn { font-size: 0.78rem; padding: 0 8px; }
    .hud-chip { padding: 4px 7px; }
    .hud-chip span { font-size: 0.5rem; }
    .hud-chip strong { font-size: 0.76rem; }
    .prompt {
      left: max(8px, env(safe-area-inset-left));
      right: 76px;
      width: auto;
      min-height: 36px;
      transform: none;
      padding: 6px 10px;
      font-size: 0.82rem;
    }
    .guide-strip {
      top: max(46px, calc(env(safe-area-inset-top) + 46px));
      width: min(430px, calc(100% - 180px));
      min-height: 34px;
      gap: 7px;
      padding: 5px 8px;
    }
    .guide-copy { font-size: 0.72rem; }
    .guide-progress { font-size: 0.66rem; padding: 3px 7px; }
    .event-card {
      top: 43%;
      width: min(430px, calc(100% - 30px));
      min-height: 92px;
      grid-template-columns: 58px 1fr;
      gap: 10px;
      padding: 12px 14px;
    }
    .event-icon {
      width: 54px;
      height: 54px;
      font-size: 1.45rem;
    }
    .event-title { font-size: 1.08rem; }
    .event-body { margin-top: 4px; font-size: 0.82rem; }
    .jet-btn {
      width: 58px;
      height: 58px;
      right: max(8px, env(safe-area-inset-right));
      bottom: max(8px, env(safe-area-inset-bottom));
      font-size: 0.62rem;
      box-shadow: 0 5px 0 rgba(13, 79, 116, 0.48), 0 10px 18px rgba(0, 38, 64, 0.2);
    }
    .jet-btn strong { font-size: 0.82rem; }
    .panel {
      padding: 14px;
      max-height: calc(100dvh - 24px);
    }
    .stage-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }
    .album-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }
    .album-card {
      min-height: 116px;
      padding: 8px;
    }
    .album-icon { height: 42px; font-size: 1.35rem; }
    .detail-body { grid-template-columns: 1fr; }
    .detail-art { min-height: 96px; }
  }

  @media (max-width: 540px) {
    .guide-strip {
      top: max(88px, calc(env(safe-area-inset-top) + 88px));
      width: calc(100% - 18px);
    }
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="gameCanvas" aria-label="ポノの海底アルバム"></canvas>

  <div class="hud" aria-live="polite">
    <div class="hud-group">
      <a class="hud-btn" href="../play.html">もどる</a>
      <button class="hud-btn" id="stageBtn" type="button">ステージ</button>
      <div class="hud-chip"><span>POWER</span><strong id="powerText">1</strong></div>
    </div>
    <div class="hud-group">
      <div class="hud-chip"><span>アルバム</span><strong id="albumText">0 / 6</strong></div>
      <div class="hud-chip"><span>スコア</span><strong id="scoreText">0</strong></div>
      <div class="hud-chip"><span>コイン</span><strong id="coinText">0</strong></div>
      <button class="hud-btn" id="albumBtn" type="button">アルバム</button>
    </div>
  </div>

  <div class="prompt" id="prompt">長押しで えさ魚雷</div>
  <div class="toast" id="toast">アルバムに ついか！</div>
  <div class="guide-strip" id="guideStrip" aria-live="polite">
    <span class="guide-copy" id="guideObjective">まずは浅瀬を進んで観察しよう</span>
    <strong class="guide-progress" id="guideProgress">カギなし</strong>
  </div>
  <div class="event-card gold" id="eventCard" aria-live="polite" hidden>
    <div class="event-icon" id="eventIcon">!</div>
    <div>
      <div class="event-title" id="eventTitle">見つけた！</div>
      <div class="event-body" id="eventBody">次にすることを表示します。</div>
    </div>
  </div>
  <button class="jet-btn" id="jetBtn" type="button" disabled><span>JET</span><strong id="jetText">OK</strong></button>
  <div id="loading">よみこみ中...</div>

  <div class="overlay" id="startOverlay">
    <div class="panel">
      <div class="panel-head">
        <div>
          <h1>ポノの海底アルバム</h1>
          <p class="panel-copy">長押しでえさをあげて、海のなかまと仲良くなろう。</p>
        </div>
      </div>
      <div class="stage-grid" id="startStageGrid"></div>
      <div class="panel-actions">
        <button class="primary-btn" id="startBtn" type="button">Stage 1 を はじめる</button>
        <button class="secondary-btn" id="startAlbumBtn" type="button">アルバム</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="albumOverlay" hidden>
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>海底アルバム</h2>
          <p class="panel-copy">見つけた生き物の、すむところ・たべもの・ひみつを見られるよ。</p>
        </div>
        <button class="close-btn" data-close="albumOverlay" type="button">とじる</button>
      </div>
      <div class="album-grid" id="albumGrid"></div>
    </div>
  </div>

  <div class="overlay" id="detailOverlay" hidden>
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2 id="detailTitle">カード</h2>
          <p class="panel-copy" id="detailSub">Stage 1</p>
        </div>
        <button class="close-btn" data-close="detailOverlay" type="button">とじる</button>
      </div>
      <div class="detail-body">
        <div class="detail-art" id="detailArt">?</div>
        <div class="fact-list" id="detailFacts"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="stageOverlay" hidden>
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>ステージマップ</h2>
          <p class="panel-copy">まず Stage 1 で、アルバム・パワーアップ・ボスまでの基本を作っています。</p>
        </div>
        <button class="close-btn" data-close="stageOverlay" type="button">とじる</button>
      </div>
      <div class="stage-grid" id="stageGrid"></div>
    </div>
  </div>

  <div class="overlay" id="finishOverlay" hidden>
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>Stage 1 クリア</h2>
          <p class="panel-copy" id="finishCopy">浅瀬の生き物をアルバムに登録したよ。</p>
        </div>
      </div>
      <div class="panel-actions">
        <button class="primary-btn" id="againBtn" type="button">もういちど</button>
        <button class="secondary-btn" id="finishAlbumBtn" type="button">アルバムを見る</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {

  function loadOptional(src) {
    return new Promise((resolve) => {
      const image = new Image();
      image.onload = () => resolve(image);
      image.onerror = () => resolve(null);
      image.src = src;
    });
  }

  function resize() {
    const rect = app.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.max(1, Math.round(rect.width * dpr));
    canvas.height = Math.max(1, Math.round(rect.height * dpr));
    ctx.setTransform(canvas.width / BASE_W, 0, 0, canvas.height / BASE_H, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function rand(min, max) {
    return min + Math.random() * (max - min);
  }

  function pick(list) {
    return list[Math.floor(Math.random() * list.length)];
  }

  function distance(a, b, x, y) {
    return Math.hypot(a - x, b - y);
  }

  function screenX(x) {
    return x - state.camera;
  }

    return {
      friendship: 0,

  function stageMaxPlayerX() {

  function showGimmickHint(text, ttl = 1.45) {
    const g = state.gimmicks;
    if (!g || g.hintCooldown > 0) return;
    setPrompt(text, ttl);
    g.hintCooldown = ttl + 0.45;
  }

  function showBossGateHint(icon, title, body, prompt) {
    const g = state.gimmicks;
    if (!g || g.hintCooldown > 0) return;
    showEventCard(icon, title, body, 'blue', 3.2);
    setPrompt(prompt || body, 2.6);
    g.hintCooldown = 3.5;
  }

  function enemyMood(enemy) {
    if (enemy.defeated) return 'happy';
    if (enemy.eatTimer > 0) return 'eating';
    if (enemy.mood === 'curious') return 'normal';
    return enemy.mood || 'normal';
  }

  function moodAssetKey(enemy) {
    const suffix = enemyMood(enemy);
    return enemy.key + suffix.charAt(0).toUpperCase() + suffix.slice(1);
  }

  function feedReaction(enemy) {
    if (enemy.defeated) return;
    enemy.feedHits = (enemy.feedHits || 0) + 1;
    if (enemy.boss) {
      enemy.mood = 'eating';
      enemy.eatTimer = 0.9;
      if (!enemy.speech || enemy.speech.ttl < 0.5) say(enemy, pick(FEED_REACTION_LINES.boss), 1.25);
      return;
    }
    if (enemy.feedHits <= 1) {
      enemy.mood = 'angry';
      enemy.eatTimer = 0;
      say(enemy, pick(FEED_REACTION_LINES.first), 1.35);
    } else {
      enemy.mood = 'eating';
      enemy.eatTimer = 1.35;
      say(enemy, pick(FEED_REACTION_LINES.second), 1.55);
    }
  }

  function say(enemy, text, ttl = 2.1) {
    enemy.speech = { text, ttl };
  }

  function setPrompt(text, ttl = 2.2) {
    state.promptTimer = ttl;
    promptEl.textContent = text;
  }

  function showToast(text) {
    if (state.eventCardTimer > 0) return;
    state.toastTimer = 2.2;
    toastEl.textContent = text;
    toastEl.classList.add('show');
  }

  function showEventCard(icon, title, body, tone = 'gold', ttl = 3.1) {
    state.eventCardTimer = ttl;
    state.toastTimer = 0;
    toastEl.classList.remove('show');
    eventIconEl.textContent = icon;
    eventTitleEl.textContent = title;
    eventBodyEl.textContent = body;
    eventCardEl.hidden = false;
    eventCardEl.className = 'event-card show ' + tone;
    updateGuideHud();
  }

  function hideEventCard() {
    state.eventCardTimer = 0;
    eventCardEl.classList.remove('show');
    eventCardEl.hidden = true;
  }

  function currentObjectiveText() {
    const g = state.gimmicks;
    if (!g) return '長押しで えさ魚雷';
    if (state.bossDone) return 'Stage 1 クリア';
    if (state.bossSpawned) return 'カブトガニに えさを当てよう';
    if (!g.shellKey) return state.camera < KEY_HERMIT_CAMERA ? '生き物と仲良くして ヤドカリを探そう' : 'ヤドカリにえさをあげて カギをもらおう';
    if (!g.shellOpened) return '左の光る貝へ戻って すなだんごを探そう';
    if ((g.friendship || 0) < FRIENDSHIP_MAX) return 'なかよし度を100まで上げよう';
    if (!g.sandball) return 'すなだんごを探そう';
    return 'すなだんごを持って 右奥へ進もう';
  }

  function updateGuideHud() {
    if (!guideObjectiveEl || !guideProgressEl) return;
    guideObjectiveEl.textContent = currentObjectiveText();
    const g = state.gimmicks;
    if (!g) {
      guideProgressEl.textContent = 'なかよし 0/100';
      return;
    }
    const friend = Math.floor(g.friendship || 0);
    const item = g.sandball ? ' / すなだんご' : (g.shellOpened ? ' / 宝箱OPEN' : (g.shellKey ? ' / カギあり' : ' / カギなし'));
    guideProgressEl.textContent = 'なかよし ' + friend + '/100' + item;
  }

  function saveAlbum() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...state.album]));
    } catch (_) {}
  }

  function loadAlbum() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      state.album = new Set(raw ? JSON.parse(raw) : []);
    } catch (_) {
      state.album = new Set();
    }
  }

  function albumOpenCount() {
    return CARDS.reduce((count, card) => count + (state.album.has(card.id) ? 1 : 0), 0);
  }

  function saveCoins() {
    try {
      localStorage.setItem(COIN_STORAGE_KEY, String(state.coins));
    } catch (_) {}
  }

  function loadCoins() {
    try {
      state.coins = Math.max(0, parseInt(localStorage.getItem(COIN_STORAGE_KEY) || '0', 10) || 0);
    } catch (_) {
      state.coins = 0;
    }
  }

  function collectCoins(amount, x, y) {
    if (!amount) return;
    state.coins += amount;
    saveCoins();
    state.coinPops.push({ x, y: y - 24, amount, life: 1.25, max: 1.25 });
    updateHud();
  }

  function scatterCoins(amount, x, y) {
    if (!amount) return;
    const pieces = Math.max(1, Math.min(12, amount));
    let remaining = amount;
    for (let i = 0; i < pieces; i += 1) {
      const left = pieces - i;
      const value = Math.max(1, Math.floor(remaining / left));
      remaining -= value;
      const angle = -Math.PI * 0.9 + (Math.PI * 0.8) * (pieces === 1 ? 0.5 : i / (pieces - 1));
      const speed = rand(110, 230);
      state.coinsDropped.push({
        x: x + rand(-12, 12),
        y: y + rand(-16, 10),
        vx: Math.cos(angle) * speed + rand(-24, 24),
        vy: Math.sin(angle) * speed - rand(8, 42),
        value,
        r: value >= 4 ? 16 : 12,
        life: 10.5,
        max: 10.5,
        groundY: clamp(y + rand(105, 220), 545, 760),
        spinRate: rand(3.0, 5.2) * (Math.random() < 0.5 ? -1 : 1),
        phase: rand(0, Math.PI * 2)
      });
    }
  }

  function unlockCard(id) {
    if (!state.album.has(id)) {
      state.album.add(id);
      saveAlbum();
      const card = CARDS.find((c) => c.id === id);
      showToast((card ? card.name : 'カード') + 'を 撮ったよ');
      const stickerIds = {
        shrimp: 'sea_album_shrimp',
        hermit: 'sea_album_hermit',
        goby: 'sea_album_goby',
        horseshoe: 'sea_album_horseshoe'
      };
      if (window.PonoGameStickers && stickerIds[id]) {
        window.PonoGameStickers.grant({
          gameId: 'sea-album',
          stickerId: stickerIds[id],
          event: 'card:' + id,
          show: false
        });
      }
    }
  }

    state.mode = 'playing';
    state.time = 0;
    state.score = 0;
    state.power = 1;

    state.bossSpawned = false;
    state.bossDone = false;
    state.bossPhase = 'none';
    state.bossTimer = 0;
    state.bossAttackIndex = 0;
    state.finishTimer = 0;
    state.finishStarted = false;
    state.eventCardTimer = 0;
    state.camera = 0;
    state.player = { x: 220, y: 440, tx: 220, ty: 440, facing: 1, shield: 0, hit: 0, jetCooldown: 0, jetTimer: 0, jetVx: 0, jetVy: 0 };
    state.shots = [];
    state.bombs = [];
    state.enemyShots = [];
    state.hazards = [];
    state.impacts = [];
    state.coinsDropped = [];
    state.coinPops = [];
    state.enemies = [];
    state.powerups = [];
    state.bubbles = [];
    state.gimmicks = createStageGimmicks();

    state.bombHeld = false;
    state.spawnTimer = 1.2;
    state.shotTimer = 0;
    state.bombTimer = 0;

    finishOverlay.hidden = true;

    updateHud();
