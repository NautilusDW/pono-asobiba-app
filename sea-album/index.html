  function finishStage() {
    state.mode = 'finish';
    state.score += 400;
    setPrompt('Stage 1 クリア！', 4);
    updateHud();
    document.getElementById('finishCopy').textContent = 'スコア ' + state.score + ' / コイン ' + state.coins;
    if (window.PonoGameStickers) {
      window.PonoGameStickers.grant({ gameId: 'sea-album', event: 'clear' });
    }
    setTimeout(() => { finishOverlay.hidden = false; }, 800);
  }

  function updateHud() {
    powerText.textContent = String(state.power);
    albumText.textContent = albumOpenCount() + ' / ' + CARDS.length;
    scoreText.textContent = String(state.score);
    coinText.textContent = String(state.coins);
    syncJetButton();
    updateGuideHud();
  }

  function syncJetButton() {
    const cooldown = state.player.jetCooldown || 0;
    const ready = state.mode === 'playing' && cooldown <= 0;
    jetBtn.disabled = !ready;
    jetText.textContent = ready ? 'OK' : Math.max(1, Math.ceil(cooldown)).toString();
  }

  function hasActiveEnemy(key) {
    return state.enemies.some((enemy) => enemy.key === key && !enemy.defeated);
  }

  function chooseStageEnemy() {
    const g = state.gimmicks;
    const earlyOrder = ['shrimp', 'seaStar', 'anemone'];
    if (g && !g.shellKey) {
      if (state.camera >= KEY_HERMIT_CAMERA && !hasActiveEnemy('hermit')) return 'hermit';
      return earlyOrder[Math.floor(Math.random() * earlyOrder.length)];
    }
    const order = ['shrimp', 'hermit', 'seaStar', 'anemone'];
    return order[Math.floor(Math.random() * order.length)];
  }

  function spawnEnemy() {
    if (state.bossSpawned) return;
    const key = chooseStageEnemy();
    const type = ENEMY_TYPES[key];
    const y = rand(type.y[0], type.y[1]);
    const fromLeft = state.player.facing < 0 && state.camera > 260 && Math.random() < 0.75;
    const enemy = {
      key,
      x: fromLeft ? Math.max(90, state.camera - 120) : Math.min(WORLD_W - 130, state.camera + BASE_W + 100),
      y,
      baseY: y,
      dir: fromLeft ? 1 : -1,
      hp: type.hp,
      maxHp: type.hp,
      feedHits: 0,
      speed: type.speed,
      size: type.size,
      phase: Math.random() * Math.PI * 2,
      hit: 0,
      mood: 'angry',
      eatTimer: 0,
      defeated: false,
      vanishTimer: 0,
      boss: false
    };
    say(enemy, pick(ENEMY_TAUNTS[key]), 2.6);
    state.enemies.push(enemy);
  }

  function spawnBoss() {
    if (state.bossSpawned) return;
    state.bossSpawned = true;
    state.bossPhase = 'warning';
    state.bossTimer = 2.6;
    state.spawnTimer = 999;
    state.powerups = [];
    state.enemies = state.enemies.filter((enemy) => enemy.defeated);
    hideEventCard();
    state.toastTimer = 0;
    toastEl.classList.remove('show');
    const stickerToast = document.getElementById('game-sticker-toast');
    if (stickerToast) stickerToast.remove();
    setPrompt('WARNING! カブトガニ接近', 2.5);
  }

  function createBossEnemy() {
    if (state.enemies.some((enemy) => enemy.boss)) return;
    const boss = {
      key: 'horseshoe',
      x: BOSS_START_X,
      y: 615,
      baseY: 615,
      hp: ENEMY_TYPES.horseshoe.hp,
      maxHp: ENEMY_TYPES.horseshoe.hp,
      speed: 24,
      size: ENEMY_TYPES.horseshoe.size,
      phase: 0,
      hit: 0,
      mood: 'normal',
      eatTimer: 0,
      defeated: false,
      vanishTimer: 0,
      boss: true,
      attackKind: 'intro',
      attackPhase: 'intro',
      attackT: 0,
      attackCooldown: 1.15,
      attackPulse: 0,
      dashY: 615,
      feedHits: 0
    };
    say(boss, BOSS_LINES.intro, 2.6);
    state.enemies.push(boss);
    setPrompt('合図を見て JET', 3.2);
  }

  function fireShots() {
    const dir = state.player.facing || 1;
    const speed = TORPEDO_BASE_SPEED + Math.min(3, state.power - 1) * 18;
    const active = activeTorpedoCountOnScreen();
    const slots = torpedoSlotCount();
    const slotOffset = (active - (slots - 1) / 2) * 24;
    state.shots.push({
      x: state.player.x + dir * 86,
      y: state.player.y - 4 + slotOffset,
      vx: speed * dir,
      vy: 0,
      dir,
      r: 20,
      damage: 1,
      life: 5.8,
      homing: true,
      locked: false,
      wobble: Math.random() * Math.PI * 2
    });
  }

  function fireBombs(maxCount = Infinity) {
    const count = Math.min(state.power >= 3 ? 2 : 1, maxCount);
    const dir = state.player.facing || 1;
    for (let i = 0; i < count; i += 1) {
      state.bombs.push({
        x: state.player.x + dir * 66,
        y: state.player.y + 42 + i * 10,
        vx: (BOMB_SPEED_X + i * 28) * dir,
        vy: 92 + i * 18,
        r: 23,
        blast: state.power >= 4 ? 96 : 74,
        damage: 2,
        life: 3.6
      });
    }
  }

  function shotInterval() {
    if (state.power >= 4) return 1.18;
    if (state.power >= 3) return 1.26;
    return 1.34;
  }

  function bombInterval() {
    return state.power >= 4 ? 2.2 : 2.65;
  }

  function torpedoSlotCount() {
    if (state.power >= 4) return 3;
    if (state.power >= 3) return 2;
    return 1;
  }

  function activeTorpedoCountOnScreen() {
    return state.shots.filter((s) => {
      if (!s.homing || s.life <= 0) return false;
      const sx = screenX(s.x);
      return sx > -TORPEDO_EXIT_PAD && sx < BASE_W + TORPEDO_EXIT_PAD && s.y > -90 && s.y < BASE_H + 90;
    }).length;
  }

  function activeBombsOnScreen() {
    return state.bombs.filter((b) => {
      if (b.life <= 0) return false;
      const sx = screenX(b.x);
      return sx > -120 && sx < BASE_W + 170;
    }).length;
  }

  function findHomingTarget(shot) {
    let best = null;
    let bestScore = Infinity;
    const shotDir = Math.sign(shot.vx || shot.dir || 1);
    for (const enemy of state.enemies) {
      if (enemy.defeated || enemy.vanishTimer > 0) continue;
      const d = distance(shot.x, shot.y, enemy.x, enemy.y);
      if (d > TORPEDO_LOCK_RANGE && !enemy.boss) continue;
      const sx = screenX(enemy.x);
      const visible = sx > -220 && sx < BASE_W + 260;
      const ahead = shotDir === 0 || Math.sign(enemy.x - shot.x || shotDir) === shotDir;
      if (!ahead && !visible) continue;
      const verticalBias = Math.abs(enemy.y - shot.y) * 0.35;
      const bossBias = enemy.boss ? -240 : 0;
      const behindPenalty = ahead ? 0 : 420;
      const score = d + verticalBias + behindPenalty + bossBias;
      if (score < bestScore) {
        bestScore = score;
        best = enemy;
      }
    }
    return best;
  }

  function updateHomingShot(shot, dt) {
    const target = findHomingTarget(shot);
    const currentAngle = Math.atan2(shot.vy, shot.vx);
    const currentSpeed = clamp(Math.hypot(shot.vx, shot.vy) || TORPEDO_BASE_SPEED, TORPEDO_BASE_SPEED, TORPEDO_MAX_SPEED);
    if (target) {
      const desiredAngle = Math.atan2(target.y - shot.y, target.x - shot.x);
      const delta = Math.atan2(Math.sin(desiredAngle - currentAngle), Math.cos(desiredAngle - currentAngle));
      const turnBoost = state.power >= 2 ? 1.16 : 1;
      const nextAngle = currentAngle + clamp(delta, -TORPEDO_TURN_RATE * turnBoost * dt, TORPEDO_TURN_RATE * turnBoost * dt);
      const nextSpeed = clamp(currentSpeed + 22 * dt, TORPEDO_BASE_SPEED, TORPEDO_MAX_SPEED + Math.min(3, state.power - 1) * 14);
      shot.vx = Math.cos(nextAngle) * nextSpeed;
      shot.vy = Math.sin(nextAngle) * nextSpeed;
      shot.locked = true;
    } else {
      const dir = shot.dir || Math.sign(shot.vx) || 1;
      const drift = Math.min(1, dt * 1.6);
      shot.vx += (TORPEDO_BASE_SPEED * dir - shot.vx) * drift;
      shot.vy += (0 - shot.vy) * drift;
      shot.locked = false;
    }
    shot.wobble += dt * 8;
    shot.x += shot.vx * dt;
    shot.y += shot.vy * dt + Math.sin(shot.wobble) * 4 * dt;
    shot.y = clamp(shot.y, 72, 805);
    shot.life -= dt;
    if (Math.random() < dt * 17) {
      const angle = Math.atan2(shot.vy, shot.vx);
      state.bubbles.push({
        x: shot.x - Math.cos(angle) * 46,
        y: shot.y - Math.sin(angle) * 30 + rand(-8, 8),
        r: rand(4, 10),
        vx: -Math.cos(angle) * rand(28, 58),
        vy: -Math.sin(angle) * rand(18, 46) - rand(8, 24),
        life: rand(0.5, 0.95),
        max: 0.95
      });
    }
  }

  function tryFireShots() {
    if (state.mode !== 'playing' || state.shotTimer > 0) return false;
    if (activeTorpedoCountOnScreen() >= torpedoSlotCount()) return false;
    fireShots();
    state.shotTimer = shotInterval();
    return true;
  }

  function tryFireBombs() {
    if (state.mode !== 'playing' || state.bombTimer > 0) return false;
    const maxActive = state.power >= 3 ? 2 : 1;
    const room = maxActive - activeBombsOnScreen();
    if (room <= 0) return false;
    fireBombs(room);
    state.bombTimer = bombInterval();
    return true;
  }

  function tryFireBoth() {
    const shot = tryFireShots();
    const bomb = tryFireBombs();
    return shot || bomb;
  }

  function addImpact(x, y, radius, kind = 'gold') {
    state.impacts.push({ x, y, radius, life: 0.36, max: 0.36, kind });
  }

  function showFriendshipHint(mark) {
    const hint = FRIENDSHIP_HINTS.find((h) => h.at === mark);
    if (!hint) return;
    showEventCard(hint.icon, hint.title, hint.body, mark >= 80 ? 'gold' : 'blue', 3.6);
    setPrompt(hint.body, 3.0);
  }

  function addFriendship(amount, x, y) {
    const g = state.gimmicks;
    if (!g || amount <= 0 || state.bossSpawned) return;
    const prev = g.friendship || 0;
    const next = Math.min(FRIENDSHIP_MAX, prev + amount);
    if (next <= prev) return;
    g.friendship = next;

    for (const mark of POWERUP_FRIENDSHIP_MARKS) {
      if (prev < mark && next >= mark && !g.powerMarks[mark]) {
        g.powerMarks[mark] = true;
        state.powerups.push({ x: x || state.player.x + 110, y: y || state.player.y - 30, r: 28, life: 8 });
      }
    }

    for (const hint of FRIENDSHIP_HINTS) {
      if (prev < hint.at && next >= hint.at && !g.friendshipHints[hint.at]) {
        g.friendshipHints[hint.at] = true;
        showFriendshipHint(hint.at);
      }
    }
    updateHud();
  }

  function addCreatureFriendship(enemy) {
    const g = state.gimmicks;
    if (!g || enemy.boss) return;
    const first = !g.friendKinds[enemy.key];
    g.friendKinds[enemy.key] = true;
    addFriendship(first ? 18 : 4, enemy.x, enemy.y);
  }

  function updateFriendGimmick(enemy) {
    if (!state.gimmicks || enemy.boss) return;
    const g = state.gimmicks;
    if (enemy.key === 'hermit' && !g.shellKey) {
      g.shellKey = true;
      g.keyAwardedAt = state.time;
      say(enemy, 'このカギで ひらくよ！', 2.3);
      showEventCard('🔑', '貝のカギをもらった！', '左に戻って、光る貝の宝箱を開けよう。', 'gold', 3.4);
      setPrompt('左の貝へ もどろう', 2.8);
      addFriendship(8, enemy.x, enemy.y);
    }
  }

  function openShellChest() {
    const g = state.gimmicks;
    if (!g || g.shellOpened || !g.shellKey) return;
    g.shellOpened = true;
    g.shellOpenedAt = state.time;
    g.sandball = true;
    g.sandballAt = state.time;
    scatterCoins(9, SHELL_CHEST_X, SHELL_CHEST_Y - 40);
    addImpact(SHELL_CHEST_X, SHELL_CHEST_Y - 40, 86, 'gold');
    addFriendship(12, SHELL_CHEST_X, SHELL_CHEST_Y - 62);
    showEventCard('砂', 'すなだんごを見つけた！', 'カブトガニの突進を止められるよ。仲良し度を100にしよう。', 'gold', 3.8);
    setPrompt('すなだんごを手に入れた！', 2.8);
  }

  function defeatEnemy(enemy) {
    if (enemy.defeated) return;
    enemy.defeated = true;
    enemy.mood = 'happy';
    enemy.eatTimer = 0;
    enemy.vanishTimer = enemy.boss ? 1.8 : 1.18;
    enemy.happyVanishMax = enemy.vanishTimer;
    say(enemy, pick(HAPPY_LINES[enemy.key] || ['ありがとう！']), enemy.boss ? 2.4 : 2.0);
    const type = ENEMY_TYPES[enemy.key];
    state.score += type.score;
    state.observed += 1;
    scatterCoins(type.coins || 0, enemy.x, enemy.y);
    unlockCard(type.card);
    addImpact(enemy.x, enemy.y, enemy.size * 0.72, enemy.boss ? 'boss' : 'heart');
    addCreatureFriendship(enemy);
    updateFriendGimmick(enemy);
    if (enemy.boss) {
      state.bossDone = true;
      state.bossPhase = 'done';
      state.finishTimer = 1.55;
      setPrompt('カブトガニと なかよくなった！', 2.2);
    }
    updateHud();
  }

  function bossCameraTarget(player) {
    if (state.bossPhase === 'scroll' || state.bossPhase === 'intro' || state.bossPhase === 'fight' || state.bossPhase === 'done') {
      return BOSS_ARENA_CAMERA;
    }
    return clamp(player.x - CAMERA_LEAD_X, 0, WORLD_W - BASE_W);
  }

  function updateBossSequence(dt) {
    if (state.bossPhase === 'none') return;
    if (state.bossPhase === 'warning') {
      state.bossTimer -= dt;
      if (state.bossTimer <= 0) {
        state.bossPhase = 'scroll';
        state.bossTimer = 0;
        setPrompt('奥へ進むよ', 2.4);
      }
      return;
    }
    if (state.bossPhase === 'scroll') {
      state.player.tx = clamp(state.camera + 330, PLAYER_MIN_X, PLAYER_MAX_X);
      state.player.ty = clamp(state.player.ty, 260, 650);
      if (Math.abs(state.camera - BOSS_ARENA_CAMERA) < 12) {
        state.camera = BOSS_ARENA_CAMERA;
        createBossEnemy();
        state.bossPhase = 'intro';
        state.bossTimer = 2.7;
      }
      return;
    }
    if (state.bossPhase === 'intro') {
      state.bossTimer -= dt;
      const boss = state.enemies.find((enemy) => enemy.boss);
      if (boss) boss.x += (BOSS_TARGET_X - boss.x) * Math.min(1, dt * 1.9);
      if (state.bossTimer <= 0) {
        state.bossPhase = 'fight';
        if (boss) {
          boss.attackKind = 'normal';
          boss.attackPhase = 'idle';
          boss.attackCooldown = 0.7;
          say(boss, BOSS_LINES.normal, 1.8);
        }
      }
    }
  }

  function hitPlayer(kind) {
    const p = state.player;
    if (p.shield > 0 || state.mode !== 'playing' || state.bossDone) return;
    p.shield = 1.1;
    p.hit = 0.22;
    state.score = Math.max(0, state.score - 40);
    addImpact(p.x, p.y, 70, kind === 'charge' || kind === 'laser' ? 'danger' : 'gold');
    setPrompt(kind === 'laser' || kind === 'charge' ? 'JETでよけよう' : 'よけよう', 1.55);
    updateHud();
  }

  function activateJet(dx = 0, dy = 0) {
    const p = state.player;
    if (state.mode !== 'playing' || p.jetCooldown > 0) return false;
    const yDir = Math.abs(dy) > 0.2 ? Math.sign(dy) : (p.y > BASE_H * 0.52 ? -1 : 1);
    const xDir = Math.abs(dx) > 0.2 ? Math.sign(dx) : -(p.facing || 1) * 0.2;
    p.jetTimer = 0.34;
    p.jetCooldown = 2.1;
    p.shield = Math.max(p.shield, 0.42);
    p.jetVx = xDir * 340;
    p.jetVy = yDir * 640;
    for (let i = 0; i < 9; i += 1) {
      const trailDir = -(p.facing || 1);
      state.bubbles.push({ x: p.x + trailDir * 90 + rand(-12, 14), y: p.y + rand(-20, 24), r: rand(5, 14), vx: trailDir * rand(70, 150), vy: rand(-80, 70), life: rand(0.55, 1.0), max: 1.0 });
    }
    syncJetButton();
    return true;
  }

  function beginBossAttack(enemy) {
    const pattern = ['normal', 'charge', 'normal', 'laser'];
    enemy.attackKind = pattern[state.bossAttackIndex % pattern.length];
    state.bossAttackIndex += 1;
    enemy.attackPhase = 'telegraph';
    enemy.attackT = 0;
    enemy.attackPulse = 0;
    enemy.dashY = clamp(state.player.y, 240, 690);
    if (enemy.attackKind === 'charge') say(enemy, BOSS_LINES.charge, 1.55);
    else if (enemy.attackKind === 'laser') say(enemy, BOSS_LINES.laser, 1.65);
    else say(enemy, BOSS_LINES.normal, 1.45);
  }

  function endBossAttack(enemy, cooldown = 0.8) {
    enemy.attackPhase = 'idle';
    enemy.attackKind = 'idle';
    enemy.attackT = 0;
    enemy.attackPulse = 0;
    enemy.attackCooldown = cooldown;
  }

  function spawnBossNormalAttack(enemy) {
    const roll = Math.random();
    if (roll < 0.45) {
      state.enemyShots.push({
        kind: 'bubble',
        x: enemy.x - 138,
        y: enemy.y + rand(-74, 54),
        vx: rand(-190, -145),
        vy: rand(-28, 28),
        gravity: 0,
        r: rand(13, 22),
        life: 4.2
      });
    } else if (roll < 0.8) {
      state.enemyShots.push({
        kind: 'sand',
        x: enemy.x - 118,
        y: 720,
        vx: rand(-230, -175),
        vy: rand(-145, -82),
        gravity: 240,
        r: rand(8, 13),
        life: 3.2
      });
    } else {
      state.hazards.push({
        kind: 'whirlpool',
        x: state.camera + rand(390, 930),
        y: rand(330, 675),
        radius: rand(58, 78),
        spin: rand(-1, 1),
        life: 1.7,
        max: 1.7
      });
    }
  }

  function updateBossAI(enemy, dt) {
    if (state.bossPhase !== 'fight') {
      enemy.x += (BOSS_TARGET_X - enemy.x) * Math.min(1, dt * 1.05);
      enemy.y = enemy.baseY + Math.sin(state.time * 1.2) * 14;
      return;
    }

    if (enemy.attackKind !== 'charge' || (enemy.attackPhase !== 'active' && enemy.attackPhase !== 'recover')) {
      enemy.x += (BOSS_TARGET_X - enemy.x) * Math.min(1, dt * 0.78);
    }
    enemy.y = enemy.baseY + Math.sin(state.time * 1.2) * 16;

    if (!enemy.attackPhase || enemy.attackPhase === 'idle') {
      enemy.attackCooldown -= dt;
      if (enemy.attackCooldown <= 0) beginBossAttack(enemy);
      return;
    }

    enemy.attackT += dt;
    if (enemy.attackKind === 'normal') {
      if (enemy.attackPhase === 'telegraph' && enemy.attackT > 0.75) {
        enemy.attackPhase = 'active';
        enemy.attackT = 0;
        enemy.attackPulse = 0;
      } else if (enemy.attackPhase === 'active') {
        enemy.attackPulse -= dt;
        if (enemy.attackPulse <= 0) {
          spawnBossNormalAttack(enemy);
          enemy.attackPulse = 0.46;
        }
        if (enemy.attackT > 2.6) endBossAttack(enemy, 1.05);
      }
      return;
    }

    if (enemy.attackKind === 'charge') {
      if (enemy.attackPhase === 'telegraph') {
        enemy.dashY += (clamp(state.player.y, 240, 690) - enemy.dashY) * Math.min(1, dt * 2.6);
        enemy.y = enemy.dashY;
        if (enemy.attackT > 1.55) {
          enemy.attackPhase = 'active';
          enemy.attackT = 0;
          enemy.x = BOSS_ARENA_CAMERA + BASE_W + 210;
        }
      } else if (enemy.attackPhase === 'active') {
        enemy.y = enemy.dashY;
        enemy.x -= 820 * dt;
        if (distance(enemy.x - 40, enemy.y, state.player.x, state.player.y) < enemy.size * 0.38 + PLAYER_HIT_RADIUS) hitPlayer('charge');
        if (screenX(enemy.x) < -280) {
          enemy.attackPhase = 'recover';
          enemy.attackT = 0;
          enemy.x = BOSS_START_X;
        }
      } else if (enemy.attackPhase === 'recover') {
        enemy.x += (BOSS_TARGET_X - enemy.x) * Math.min(1, dt * 2.25);
        if (Math.abs(enemy.x - BOSS_TARGET_X) < 18) {
          enemy.x = BOSS_TARGET_X;
          if (state.gimmicks && state.gimmicks.sandball && !enemy.sandballStunned) {
            enemy.sandballStunned = true;
            enemy.attackPhase = 'stunned';
            enemy.attackT = 0;
            enemy.mood = 'eating';
            enemy.eatTimer = 1.25;
            say(enemy, 'すなだんご？', 1.45);
            setPrompt('止まった！ えさを当てよう', 1.6);
          } else {
            enemy.sandballStunned = false;
            endBossAttack(enemy, 1.15);
          }
        } else if (enemy.attackT > 4.2) {
          enemy.x = BOSS_TARGET_X;
          enemy.sandballStunned = false;
          endBossAttack(enemy, 1.35);
        }
      } else if (enemy.attackPhase === 'stunned') {
        enemy.x = BOSS_TARGET_X;
        enemy.y = enemy.baseY + Math.sin(state.time * 8) * 5;
        if (enemy.attackT > 1.25) {
          enemy.sandballStunned = false;
          endBossAttack(enemy, 1.3);
        }
      }
      return;
    }

    if (enemy.attackKind === 'laser') {
      if (enemy.attackPhase === 'telegraph' && enemy.attackT > 1.55) {
        enemy.attackPhase = 'active';
        enemy.attackT = 0;
      } else if (enemy.attackPhase === 'active') {
        const laserY = enemy.y + 12;
        if (state.player.x < enemy.x + 150 && Math.abs(state.player.y - laserY) < 48) hitPlayer('laser');
        if (enemy.attackT > 1.35) endBossAttack(enemy, 1.25);
      }
    }
  }

  function updateStageGimmicks(dt) {
    const g = state.gimmicks;
    if (!g) return;
    g.hintCooldown = Math.max(0, g.hintCooldown - dt);
    const p = state.player;

    if (!g.shellOpened) {
      const dShell = distance(p.x, p.y, SHELL_CHEST_X, SHELL_CHEST_Y - 52);
      if (g.shellKey && dShell < 150) openShellChest();
      else if (!g.shellKey && dShell < 180) showGimmickHint('まだ開かない。右でカギを探そう');
      else if (!g.shellKey && p.x > BOSS_TRIGGER_X - 420) showGimmickHint('先にカギを探そう');
      else if (g.shellKey && p.x > SHELL_CHEST_X + 520) showGimmickHint('左の光る貝へ もどろう');
    }

    if (!state.bossSpawned && p.x > BOSS_TRIGGER_X) {
      if (!g.shellKey) {
        showBossGateHint('鍵', 'カギが必要', '右側でヤドカリにえさをあげて、貝のカギをもらおう。', '先にカギを探そう');
      } else if (!g.shellOpened) {
        showBossGateHint('貝', '貝宝箱へ戻ろう', '左の光る貝を開けると、ボス対策の道具が見つかるよ。', '左の光る貝へ もどろう');
      } else if ((g.friendship || 0) < FRIENDSHIP_MAX) {
        showBossGateHint('友', 'まだ仲良し度が足りない', '生き物にえさをあげて、なかよし100まで上げよう。', 'もっと生き物と仲良くなろう');
      } else if (!g.sandball) {
        showBossGateHint('砂', 'すなだんごが必要', 'カブトガニの突進を止めるため、貝宝箱のすなだんごを探そう。', 'すなだんごを探そう');
      } else {
        spawnBoss();
      }
    }
  }

  function update(dt) {
    state.time += dt;
    if (state.promptTimer > 0) state.promptTimer -= dt;
    if (state.toastTimer > 0) {
      state.toastTimer -= dt;
      if (state.toastTimer <= 0) toastEl.classList.remove('show');
    }
    if (state.eventCardTimer > 0) {
      state.eventCardTimer -= dt;
      if (state.eventCardTimer <= 0) hideEventCard();
    }
    if (state.mode !== 'playing') {
      updateGuideHud();
      updateParticles(dt);
      return;
    }

    const p = state.player;
    p.shield = Math.max(0, (p.shield || 0) - dt);
    p.hit = Math.max(0, (p.hit || 0) - dt);
    p.jetCooldown = Math.max(0, (p.jetCooldown || 0) - dt);
    p.jetTimer = Math.max(0, (p.jetTimer || 0) - dt);
    if (state.keys.ArrowUp || state.keys.KeyW) p.ty -= PLAYER_MOVE_SPEED * dt;
    if (state.keys.ArrowDown || state.keys.KeyS) p.ty += PLAYER_MOVE_SPEED * dt;
    if (state.keys.ArrowLeft || state.keys.KeyA) {
      p.tx -= PLAYER_MOVE_SPEED * dt;
      p.facing = -1;
    }
    if (state.keys.ArrowRight || state.keys.KeyD) {
      p.tx += PLAYER_MOVE_SPEED * dt;
      p.facing = 1;
    }
    const arenaLocked = state.bossPhase === 'scroll' || state.bossPhase === 'intro' || state.bossPhase === 'fight' || state.bossPhase === 'done';
    const minPlayerX = arenaLocked ? state.camera + 120 : PLAYER_MIN_X;
    const maxPlayerX = arenaLocked ? state.camera + 780 : stageMaxPlayerX();
    p.tx = clamp(p.tx, minPlayerX, maxPlayerX);
    p.ty = clamp(p.ty, 150, 735);
    p.x += (p.tx - p.x) * Math.min(1, dt * PLAYER_FOLLOW_RATE);
    p.y += (p.ty - p.y) * Math.min(1, dt * PLAYER_FOLLOW_RATE);
    if (p.jetTimer > 0) {
      p.x = clamp(p.x + p.jetVx * dt, minPlayerX, maxPlayerX);
      p.y = clamp(p.y + p.jetVy * dt, 150, 735);
      p.tx = p.x;
      p.ty = p.y;
    }
    updateBossSequence(dt);
    const desiredCamera = bossCameraTarget(p);
    const cameraRate = state.bossPhase === 'scroll' ? BOSS_SCROLL_RATE : (state.bossPhase === 'fight' || state.bossPhase === 'intro' ? BOSS_FIXED_CAMERA_RATE : CAMERA_FOLLOW_RATE);
    state.camera += (desiredCamera - state.camera) * Math.min(1, dt * cameraRate);

    state.shotTimer = Math.max(0, state.shotTimer - dt);
    state.bombTimer = Math.max(0, state.bombTimer - dt);
    if (state.fireHeld || state.keys.Space || state.keys.KeyZ || state.keys.Enter) tryFireBoth();
    if (state.bombHeld || state.keys.KeyX) tryFireBombs();

    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0 && !state.bossSpawned && state.bossPhase === 'none') {
      spawnEnemy();
      state.spawnTimer = rand(2.0, 3.2);
    }
    state.shots.forEach((s) => {
      if (s.homing) updateHomingShot(s, dt);
      else {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        s.life -= dt;
      }
    });
    state.shots = state.shots.filter((s) => s.life > 0 && s.x > state.camera - 90 && s.x < state.camera + BASE_W + 150 && s.y > -80 && s.y < BASE_H + 80);

    state.bombs.forEach((b) => {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.vy += BOMB_GRAVITY * dt;
      b.life -= dt;
      if (b.y > 742) {
        b.life = 0;
        addImpact(b.x, 742, b.blast);
      }
    });
    state.bombs = state.bombs.filter((b) => b.life > 0 && b.x > state.camera - 120 && b.x < state.camera + BASE_W + 170);
    updateStageGimmicks(dt);
    updateGuideHud();

    state.enemyShots.forEach((s) => {
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += (s.gravity || 0) * dt;
      s.life -= dt;
      if (distance(s.x, s.y, p.x, p.y) < PLAYER_HIT_RADIUS + s.r) {
        s.life = 0;
        hitPlayer(s.kind === 'sand' ? 'sand' : 'bubble');
      }
    });
    state.enemyShots = state.enemyShots.filter((s) => s.life > 0 && s.x > state.camera - 140 && s.x < state.camera + BASE_W + 180 && s.y > -90 && s.y < BASE_H + 90);
    state.hazards.forEach((h) => {
      h.life -= dt;
      if (h.kind === 'whirlpool' && h.life > 0 && distance(h.x, h.y, p.x, p.y) < h.radius + PLAYER_HIT_RADIUS * 0.55) {
        const pull = Math.min(1, dt * 1.6);
        p.x += (h.x - p.x) * pull;
        p.y += (h.y - p.y) * pull;
        hitPlayer('whirlpool');
      }
    });
    state.hazards = state.hazards.filter((h) => h.life > 0);

    state.enemies.forEach((enemy) => {
      enemy.phase += dt;
      enemy.hit = Math.max(0, enemy.hit - dt);
      enemy.eatTimer = Math.max(0, enemy.eatTimer - dt);
      if (enemy.eatTimer <= 0 && enemy.mood === 'eating') enemy.mood = enemy.feedHits > 0 ? 'curious' : 'angry';
      if (enemy.speech) {
        enemy.speech.ttl -= dt;
        if (enemy.speech.ttl <= 0) enemy.speech = null;
      }
      if (enemy.defeated) {
        enemy.vanishTimer -= dt;
        enemy.y = enemy.baseY + Math.sin(state.time * 4 + enemy.phase) * 6;
        return;
      }
      if (enemy.boss) {
        updateBossAI(enemy, dt);
      } else {
        enemy.x += (enemy.dir || -1) * enemy.speed * dt;
        enemy.y = enemy.baseY + Math.sin(enemy.phase * 2.2) * (ENEMY_TYPES[enemy.key].bottom ? 5 : 26);
      }
    });

    checkCollisions();
    state.enemies = state.enemies.filter((e) => {
      if (e.defeated) return e.vanishTimer > 0;
      if (e.boss) return true;
      const sx = screenX(e.x);
      return sx > -240 && sx < BASE_W + 240;
    });

    state.powerups.forEach((u) => {
      u.x -= 48 * dt;
      u.y += Math.sin(state.time * 3 + u.x * 0.01) * 12 * dt;
      u.life -= dt;
      if (distance(u.x, u.y, p.x, p.y) < 70) {
        u.life = 0;
        const before = state.power;
        state.power = Math.min(4, state.power + 1);
        state.score += 70;
        const powerMsg = state.power <= before ? 'POWER MAX' : (state.power === 2 ? 'ホーミング UP' : (state.power === 3 ? 'えさ魚雷 2本' : 'えさ魚雷 3本'));
        setPrompt(powerMsg, 2.1);
        updateHud();
      }
    });
    state.powerups = state.powerups.filter((u) => u.life > 0 && screenX(u.x) > -80);

    updateParticles(dt);
    if (state.finishTimer > 0) {
      state.finishTimer -= dt;
      if (state.finishTimer <= 0 && !state.finishStarted) {
        state.finishStarted = true;
        finishStage();
      }
    }
    syncJetButton();
    if (Math.random() < dt * 4.4) {
      const trailDir = -(p.facing || 1);
      state.bubbles.push({ x: p.x + trailDir * 86, y: p.y + 24, r: rand(5, 13), vx: trailDir * rand(8, 24), vy: rand(-62, -34), life: rand(1.0, 1.8), max: 1.8 });
    }
  }

  function updateParticles(dt) {
    state.impacts.forEach((i) => { i.life -= dt; });
    state.impacts = state.impacts.filter((i) => i.life > 0);
    updateDroppedCoins(dt);
    state.coinPops.forEach((c) => {
      c.y -= 34 * dt;
      c.life -= dt;
    });
    state.coinPops = state.coinPops.filter((c) => c.life > 0);
    state.bubbles.forEach((b) => {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.life -= dt;
    });
    state.bubbles = state.bubbles.filter((b) => b.life > 0);
  }

  function updateDroppedCoins(dt) {
    const p = state.player;
    state.coinsDropped.forEach((coin) => {
      coin.life -= dt;
      const d = distance(coin.x, coin.y, p.x, p.y);
      if (d < COIN_MAGNET_RADIUS) {
        const pull = (1 - d / COIN_MAGNET_RADIUS) * 7.5 + 2.8;
        coin.vx += (p.x - coin.x) * pull * dt;
        coin.vy += (p.y - coin.y) * pull * dt;
        coin.magnet = true;
        coin.settled = false;
      } else {
        coin.magnet = false;
        coin.vy += (coin.settled ? 20 : 118) * dt;
      }
      coin.vx *= Math.pow(coin.settled && !coin.magnet ? 0.12 : 0.42, dt);
      coin.vy *= Math.pow(coin.magnet ? 0.34 : 0.78, dt);
      coin.x += coin.vx * dt;
      coin.y += coin.vy * dt;
      const groundY = coin.groundY || 760;
      if (!coin.magnet && coin.y >= groundY) {
        coin.y = groundY;
        if (Math.abs(coin.vy) > 36) {
          coin.vy *= -0.18;
          coin.vx *= 0.55;
        } else {
          coin.vy = 0;
          coin.settled = true;
        }
      }
      if (coin.settled && !coin.magnet) {
        coin.spinRate *= Math.pow(0.72, dt);
        if (Math.abs(coin.spinRate) < 1.2) coin.spinRate = 1.2 * Math.sign(coin.spinRate || 1);
      }
      coin.y = clamp(coin.y, 80, 760);
      if (d < COIN_COLLECT_RADIUS) {
        coin.life = 0;
        collectCoins(coin.value, coin.x, coin.y);
      }
    });
    state.coinsDropped = state.coinsDropped.filter((coin) => coin.life > 0);
  }

  function checkCollisions() {
    for (const enemy of state.enemies) {
      if (enemy.defeated) continue;
      const hitRadius = enemy.size * (enemy.boss ? 0.46 : 0.44);
      for (const s of state.shots) {
        if (s.life > 0 && distance(s.x, s.y, enemy.x, enemy.y) < hitRadius + s.r) {
          s.life = 0;
          enemy.hp -= s.damage || 1;
          enemy.hit = 0.1;
          feedReaction(enemy);
          addImpact(s.x, s.y, 28, 'gold');
          if (enemy.hp <= 0) defeatEnemy(enemy);
        }
      }
      for (const b of state.bombs) {
        if (b.life > 0 && distance(b.x, b.y, enemy.x, enemy.y) < hitRadius + b.r) {
          b.life = 0;
          enemy.hp -= b.damage || (enemy.boss ? 2 : 3);
          enemy.hit = 0.12;
          feedReaction(enemy);
          addImpact(b.x, b.y, b.blast, 'gold');
          if (enemy.hp <= 0) defeatEnemy(enemy);
        }
      }
    }
  }

  function draw() {
    ctx.save();
    ctx.setTransform(canvas.width / BASE_W, 0, 0, canvas.height / BASE_H, 0, 0);
    drawBackground();
    drawStageGimmicks();
    drawBubbles();
    drawBossEffects();
    state.hazards.forEach(drawHazard);
    state.powerups.forEach(drawPowerup);
    state.enemies.forEach(drawEnemy);
    state.shots.forEach(drawShot);
    state.bombs.forEach(drawBomb);
    state.enemyShots.forEach(drawEnemyShot);
    state.impacts.forEach(drawImpact);
    state.coinsDropped.forEach(drawDroppedCoin);
    drawPlayer();
    drawWaterOverlay();
    drawGuideMarkers();
    state.enemies.forEach(drawEnemySpeech);
    state.coinPops.forEach(drawCoinPop);
    drawBossOverlay();
    ctx.restore();
  }

  function drawBackground() {
    const bg = state.assets.scrollBg || state.assets.bg;
    if (bg) {
      const targetAspect = BASE_W / BASE_H;
      const wideEnough = bg.width / bg.height > targetAspect + 0.05;
      if (wideEnough) {
        const sw = Math.min(bg.width, bg.height * targetAspect);
        const maxSx = Math.max(0, bg.width - sw);
        const sx = maxSx * clamp(state.camera / Math.max(1, WORLD_W - BASE_W), 0, 1);
        ctx.drawImage(bg, sx, 0, sw, bg.height, 0, 0, BASE_W, BASE_H);
      } else {
        ctx.drawImage(bg, 0, 0, BASE_W, BASE_H);
      }
    } else {
      const g = ctx.createLinearGradient(0, 0, 0, BASE_H);
      g.addColorStop(0, '#8ee8f4');
      g.addColorStop(0.48, '#23a6c7');
      g.addColorStop(1, '#f0d38a');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, BASE_W, BASE_H);
    }
    ctx.save();
    ctx.globalAlpha = 0.16;
    ctx.fillStyle = '#fff7c8';
    for (let i = 0; i < 6; i += 1) {
      const x = 120 + i * 260 - (state.camera * 0.08 % 260) + Math.sin(state.time * 0.2 + i) * 30;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + 90, 0);
      ctx.lineTo(x + 290, BASE_H);
      ctx.lineTo(x - 120, BASE_H);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawStageGimmicks() {
    if (!state.gimmicks) return;
    drawShellChest();
  }

  function currentGuideTarget() {
    const g = state.gimmicks;
    if (!g || state.mode !== 'playing' || state.bossSpawned) return null;
    if (!g.shellKey) {
      const hermit = state.enemies.find((enemy) => enemy.key === 'hermit' && !enemy.defeated);
      if (!hermit && state.camera < KEY_HERMIT_CAMERA) return null;
      return {
        x: hermit ? hermit.x : Math.max(state.camera + 980, 820),
        y: hermit ? hermit.y : 530,
        title: 'ヤドカリ',
        sub: '貝のカギ',
        tone: '#ffd86e',
        suppressLabel: !!(hermit && hermit.speech && hermit.speech.ttl > 0)
      };
    }
    if (!g.shellOpened) {
      return { x: SHELL_CHEST_X, y: SHELL_CHEST_Y - 72, title: '光る貝', sub: 'カギで開く', tone: '#ffd86e' };
    }
    if ((g.friendship || 0) < FRIENDSHIP_MAX) return null;
    if (!g.sandball) {
      return { x: SHELL_CHEST_X, y: SHELL_CHEST_Y - 72, title: 'すなだんご', sub: '貝宝箱', tone: '#ffd86e' };
    }
    return {
      x: BOSS_TRIGGER_X + 180,
      y: 540,
      title: '右奥へ進む',
      sub: 'カブトガニの海',
      tone: '#98e58f',
      edgeOnly: true
    };
  }

  function drawGuideMarkers() {
    const target = currentGuideTarget();
    if (!target) return;
    const sx = screenX(target.x);
    const sy = clamp(target.y, 150, BASE_H - 120);
    const offLeft = sx < 72;
    const offRight = sx > BASE_W - 72;
    if (target.edgeOnly && !(offLeft || offRight)) return;
    const pulse = 1 + Math.sin(state.time * 5) * 0.08;
    ctx.save();
    if (offLeft || offRight) {
      const side = offLeft ? -1 : 1;
      const x = offLeft ? 76 : BASE_W - 76;
      const y = clamp(sy, 178, BASE_H - 170);
      ctx.globalAlpha = 0.94;
      ctx.fillStyle = target.tone;
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x + side * 34, y);
      ctx.lineTo(x - side * 12, y - 28);
      ctx.lineTo(x - side * 12, y + 28);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      if (!target.suppressLabel) drawMarkerLabel(x, y + 62, (offLeft ? '左へ ' : '右へ ') + target.title, target.sub, target.tone);
    } else {
      ctx.globalAlpha = 0.92;
      ctx.strokeStyle = target.tone;
      ctx.lineWidth = 5;
      ctx.shadowColor = target.tone;
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.ellipse(sx, sy, 54 * pulse, 36 * pulse, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
      if (!target.suppressLabel) drawMarkerLabel(sx, sy - 72, target.title, target.sub, target.tone);
    }
    ctx.restore();
  }

  function drawMarkerLabel(x, y, title, sub, tone) {
    const w = 178;
    const h = 58;
    const left = clamp(x - w / 2, 18, BASE_W - w - 18);
    const top = clamp(y - h / 2, 80, BASE_H - h - 90);
    ctx.save();
    ctx.fillStyle = 'rgba(246, 254, 255, 0.95)';
    ctx.strokeStyle = tone;
    ctx.lineWidth = 3;
    ctx.shadowColor = 'rgba(3, 36, 60, 0.22)';
    ctx.shadowBlur = 12;
    roundRect(left, top, w, h, 8);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#0c4e6e';
    ctx.font = '900 21px Zen Maru Gothic, sans-serif';
    ctx.fillText(title, left + w / 2, top + 24);
    ctx.fillStyle = '#567684';
    ctx.font = '900 15px Zen Maru Gothic, sans-serif';
    ctx.fillText(sub, left + w / 2, top + 45);
    ctx.restore();
  }

  function drawShellChest() {
    const g = state.gimmicks;
    const x = screenX(SHELL_CHEST_X);
    const y = SHELL_CHEST_Y;
    if (x < -180 || x > BASE_W + 180) return;
    const open = g.shellOpened;
    const glow = g.shellKey && !open;
    ctx.save();
    ctx.translate(x, y);
    if (glow || open) {
      ctx.globalAlpha = open ? 0.38 : 0.26 + Math.sin(state.time * 5) * 0.08;
      ctx.fillStyle = '#fff2a8';
      ctx.beginPath();
      ctx.ellipse(0, -22, 88, 46, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#8e6b43';
    const topLift = open ? -34 : 0;
    ctx.fillStyle = open ? '#ffe0a2' : '#f5c777';
    ctx.beginPath();
    ctx.ellipse(0, -18 + topLift, 70, 27, open ? -0.12 : 0, Math.PI, 0);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#f0ae55';
    ctx.beginPath();
    ctx.ellipse(0, 0, 78, 34, 0, 0, Math.PI);
    ctx.lineTo(-78, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    for (let i = -3; i <= 3; i += 1) {
      ctx.strokeStyle = 'rgba(133, 89, 43, 0.38)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(i * 18, -2);
      ctx.quadraticCurveTo(i * 11, -32, 0, -44 + topLift * 0.45);
      ctx.stroke();
    }
    if (open) {
      drawSandBallIcon(0, -31, 0.56 + Math.sin(state.time * 4) * 0.015);
    } else if (!g.shellKey) {
      drawShellKeyIcon(0, -18, 0.24, 0.42);
    }
    ctx.restore();
  }

  function drawShellKeyIcon(x, y, scale = 1, alpha = 1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.globalAlpha *= alpha;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = '#ffe48a';
    ctx.shadowBlur = 12;
    ctx.strokeStyle = '#9a6418';
    ctx.fillStyle = '#ffd767';
    ctx.lineWidth = 7;
    ctx.beginPath();
    ctx.arc(-30, -4, 27, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#f6b43f';
    ctx.beginPath();
    ctx.arc(-30, -4, 11, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-5, -4);
    ctx.lineTo(58, -4);
    ctx.lineTo(58, 18);
    ctx.lineTo(42, 18);
    ctx.lineTo(42, 6);
    ctx.lineTo(24, 6);
    ctx.lineTo(24, 18);
    ctx.lineTo(8, 18);
    ctx.lineTo(8, -4);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#ffc9b8';
    ctx.strokeStyle = '#9a6418';
    ctx.lineWidth = 4;
    for (let i = 0; i < 5; i += 1) {
      const a = -Math.PI * 0.9 + i * Math.PI * 0.45;
      ctx.beginPath();
      ctx.ellipse(-30 + Math.cos(a) * 10, -34 + Math.sin(a) * 6, 10, 24, a + Math.PI / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawSandBallIcon(x, y, scale = 1, alpha = 1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.globalAlpha *= alpha;
    ctx.shadowColor = '#fff1a6';
    ctx.shadowBlur = 16;
    const grad = ctx.createRadialGradient(-18, -18, 6, 0, 0, 54);
    grad.addColorStop(0, '#fff0bf');
    grad.addColorStop(0.48, '#dfbf70');
    grad.addColorStop(1, '#a87535');
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#8b6232';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, 48, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;
    const shells = [
      [-16, -10, '#fff2ca', 0.85],
      [19, 9, '#8edbd3', 0.68],
      [7, -27, '#ffa8a8', 0.55],
      [-2, 24, '#ffe8a8', 0.48]
    ];
    shells.forEach(([sx, sy, color, s]) => {
      ctx.save();
      ctx.translate(sx, sy);
      ctx.scale(s, s);
      ctx.fillStyle = color;
      ctx.strokeStyle = 'rgba(112, 82, 46, 0.45)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -16);
      ctx.quadraticCurveTo(19, -2, 0, 18);
      ctx.quadraticCurveTo(-19, -2, 0, -16);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    });
    ctx.fillStyle = 'rgba(116, 82, 45, 0.42)';
    for (let i = 0; i < 10; i += 1) {
      const a = i * 1.73;
      const r = 12 + (i % 4) * 8;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 2.1 + (i % 3) * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawPlayer() {
    const p = state.player;
    const image = state.assets.player;
    ctx.save();
    ctx.translate(screenX(p.x), p.y);
    if ((p.facing || 1) < 0) ctx.scale(-1, 1);
    const bob = Math.sin(state.time * 4) * 4;
    if (p.hit > 0) ctx.filter = 'brightness(1.8) saturate(1.35)';
    if (p.jetTimer > 0) {
      ctx.save();
      ctx.globalAlpha = 0.72;
      ctx.fillStyle = '#e9fdff';
      ctx.shadowColor = '#d8ffff';
      ctx.shadowBlur = 18;
      for (let i = 0; i < 4; i += 1) {
        ctx.beginPath();
        ctx.ellipse(-96 - i * 18, bob + Math.sin(state.time * 24 + i) * 12, 28 - i * 4, 10 - i, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    if (image) {
      drawCentered(image, 0, bob, 188);
    } else {
      ctx.translate(0, bob);
      ctx.fillStyle = '#f3c84c';
      ctx.strokeStyle = '#1f6689';
      ctx.lineWidth = 5;
      roundedEllipse(0, 0, 92, 46);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#58b9df';
      ctx.beginPath();
      ctx.ellipse(18, -4, 31, 26, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#8d5a2c';
      ctx.beginPath();
      ctx.arc(18, -4, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1f6689';
      ctx.beginPath();
      ctx.moveTo(-90, 0);
      ctx.lineTo(-130, -28);
      ctx.lineTo(-126, 28);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(78, -28);
      ctx.lineTo(126, 0);
      ctx.lineTo(78, 28);
      ctx.closePath();
      ctx.fill();
    }
    ctx.filter = 'none';
    if (p.shield > 0) {
      ctx.globalAlpha = clamp(p.shield, 0, 0.62);
      ctx.strokeStyle = '#e9fdff';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.ellipse(0, bob, 118, 66, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function roundedEllipse(x, y, rx, ry) {
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
  }

  function drawCentered(image, x, y, width, alpha = 1) {
    const h = width * image.height / image.width;
    ctx.save();
    ctx.globalAlpha *= alpha;
    ctx.drawImage(image, x - width / 2, y - h / 2, width, h);
    ctx.restore();
  }

  function drawFoodImage(x, y, r, bubble = false) {
    const food = bubble ? (state.assets.foodBubble || state.assets.foodPellet) : state.assets.foodPellet;
    if (food) drawCentered(food, x, y, r * 2.2);
    else drawFoodOrb(x, y, r);
  }

  function drawShot(s) {
    ctx.save();
    ctx.translate(screenX(s.x), s.y);
    const angle = Math.atan2(s.vy, s.vx);
    ctx.rotate(angle);
    if (s.homing) {
      const g = ctx.createLinearGradient(-92, 0, 20, 0);
      g.addColorStop(0, 'rgba(209, 250, 255, 0)');
      g.addColorStop(0.34, s.locked ? 'rgba(82, 220, 255, 0.34)' : 'rgba(255, 247, 168, 0.3)');
      g.addColorStop(0.74, 'rgba(255, 246, 166, 0.82)');
      g.addColorStop(1, '#ffb13e');
      ctx.fillStyle = g;
      ctx.shadowColor = s.locked ? '#7be8ff' : '#fff0a0';
      ctx.shadowBlur = s.locked ? 20 : 15;
      ctx.beginPath();
      ctx.ellipse(-34, 0, 70, 13, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.68;
      ctx.strokeStyle = s.locked ? '#d8fbff' : '#fff3ad';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(-4, 0, 35, 18, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      drawFoodImage(24, 0, s.r * 1.04);
    } else {
      const g = ctx.createLinearGradient(-56, 0, 10, 0);
      g.addColorStop(0, 'rgba(255,255,255,0)');
      g.addColorStop(0.42, 'rgba(255, 247, 168, 0.74)');
      g.addColorStop(1, '#ffb13e');
      ctx.fillStyle = g;
      ctx.shadowColor = '#fff0a0';
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.ellipse(-22, 0, 46, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      drawFoodImage(18, 0, s.r);
    }
    ctx.restore();
  }

  function drawBomb(b) {
    ctx.save();
    ctx.translate(screenX(b.x), b.y);
    ctx.rotate(Math.sin(state.time * 8 + b.x * 0.01) * 0.18);
    ctx.shadowColor = '#bff7ff';
    ctx.shadowBlur = 18;
    drawFoodImage(0, 0, b.r * 1.18, true);
    ctx.restore();
  }

  function drawEnemyShot(s) {
    ctx.save();
    ctx.translate(screenX(s.x), s.y);
    if (s.kind === 'sand') {
      ctx.fillStyle = '#d9bd76';
      ctx.strokeStyle = 'rgba(109, 78, 38, 0.62)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, s.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    } else {
      ctx.globalAlpha = 0.86;
      ctx.strokeStyle = '#eaffff';
      ctx.fillStyle = 'rgba(209, 250, 255, 0.24)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, s.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.72)';
      ctx.beginPath();
      ctx.arc(-s.r * 0.28, -s.r * 0.28, s.r * 0.22, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawHazard(h) {
    if (h.kind !== 'whirlpool') return;
    const pct = 1 - h.life / h.max;
    ctx.save();
    ctx.translate(screenX(h.x), h.y);
    ctx.rotate(state.time * 4 * (h.spin < 0 ? -1 : 1));
    ctx.globalAlpha = 0.72 * (1 - pct * 0.25);
    ctx.strokeStyle = '#e8ffff';
    ctx.lineWidth = 5;
    for (let i = 0; i < 3; i += 1) {
      ctx.beginPath();
      ctx.arc(0, 0, h.radius * (0.35 + i * 0.22 + pct * 0.12), i * 1.1, Math.PI * 1.45 + i * 1.1);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBossEffects() {
    const boss = state.enemies.find((enemy) => enemy.boss && !enemy.defeated);
    if (!boss || state.bossPhase !== 'fight') return;
    if (boss.attackKind === 'charge' && (boss.attackPhase === 'telegraph' || boss.attackPhase === 'active')) {
      const y = boss.dashY || boss.y;
      ctx.save();
      ctx.globalAlpha = boss.attackPhase === 'telegraph' ? 0.28 + Math.sin(state.time * 28) * 0.08 : 0.2;
      ctx.fillStyle = '#ff776d';
      ctx.fillRect(0, y - 56, BASE_W, 112);
      ctx.strokeStyle = '#fff4a8';
      ctx.lineWidth = 5;
      ctx.setLineDash([22, 14]);
      ctx.beginPath();
      ctx.moveTo(0, y - 58);
      ctx.lineTo(BASE_W, y - 58);
      ctx.moveTo(0, y + 58);
      ctx.lineTo(BASE_W, y + 58);
      ctx.stroke();
      ctx.restore();
    }
    if (boss.attackKind === 'laser' && (boss.attackPhase === 'telegraph' || boss.attackPhase === 'active')) {
      const y = boss.y + 12;
      const startX = screenX(boss.x + 105);
      ctx.save();
      if (boss.attackPhase === 'telegraph') {
        ctx.globalAlpha = 0.28 + Math.sin(state.time * 24) * 0.12;
        ctx.strokeStyle = '#fff1a6';
        ctx.lineWidth = 8;
        ctx.setLineDash([26, 16]);
        ctx.beginPath();
        ctx.moveTo(startX, y);
        ctx.lineTo(0, y);
        ctx.stroke();
      } else {
        const beam = ctx.createLinearGradient(startX, y, 0, y);
        beam.addColorStop(0, '#fff8b8');
        beam.addColorStop(0.4, '#ffe65a');
        beam.addColorStop(1, 'rgba(255, 167, 59, 0.2)');
        ctx.shadowColor = '#fff1a6';
        ctx.shadowBlur = 22;
        ctx.strokeStyle = beam;
        ctx.lineWidth = 38 + Math.sin(state.time * 38) * 6;
        ctx.beginPath();
        ctx.moveTo(startX, y);
        ctx.lineTo(0, y);
        ctx.stroke();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 9;
        ctx.beginPath();
        ctx.moveTo(startX, y);
        ctx.lineTo(0, y);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  function drawBossOverlay() {
    if (state.bossPhase === 'warning') {
      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.fillStyle = 'rgba(4, 28, 45, 0.54)';
      ctx.fillRect(0, 0, BASE_W, BASE_H);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff4a8';
      ctx.strokeStyle = 'rgba(4, 28, 45, 0.72)';
      ctx.lineWidth = 10;
      ctx.lineJoin = 'round';
      ctx.font = '900 104px Zen Maru Gothic, sans-serif';
      ctx.strokeText(BOSS_LINES.warning, BASE_W / 2, BASE_H * 0.34);
      ctx.fillText(BOSS_LINES.warning, BASE_W / 2, BASE_H * 0.34);
      ctx.fillStyle = '#ffffff';
      ctx.lineWidth = 7;
      ctx.font = '900 38px Zen Maru Gothic, sans-serif';
      ctx.strokeText('カブトガニ 接近中', BASE_W / 2, BASE_H * 0.48);
      ctx.fillText('カブトガニ 接近中', BASE_W / 2, BASE_H * 0.48);
      ctx.restore();
    } else if (state.bossPhase === 'scroll') {
      ctx.save();
      ctx.globalAlpha = 0.78;
      ctx.fillStyle = '#e9fdff';
      ctx.font = '900 30px Zen Maru Gothic, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('海底の奥へ 強制スクロール中', BASE_W / 2, 112);
      ctx.restore();
    }
  }

  function drawPowerup(u) {
    ctx.save();
    ctx.translate(screenX(u.x), u.y);
    ctx.rotate(state.time * 1.8);
    ctx.shadowColor = '#fff2a8';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#fff28a';
    starPath(0, 0, 24, 11, 5);
    ctx.fill();
    ctx.restore();
  }

  function starPath(x, y, r1, r2, n) {
    ctx.beginPath();
    for (let i = 0; i < n * 2; i += 1) {
      const r = i % 2 ? r2 : r1;
      const a = -Math.PI / 2 + i * Math.PI / n;
      const px = x + Math.cos(a) * r;
      const py = y + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
  }

  function drawEnemy(enemy) {
    const type = ENEMY_TYPES[enemy.key];
    const image = state.assets[moodAssetKey(enemy)] || state.assets[enemy.key + 'Normal'];
    const mood = enemyMood(enemy);
    const happyDone = enemy.defeated && enemy.mood === 'happy';
    ctx.save();
    ctx.translate(screenX(enemy.x), enemy.y);
    if (enemy.defeated) ctx.globalAlpha = clamp(enemy.vanishTimer / (enemy.happyVanishMax || (enemy.boss ? 1.8 : 1.18)), 0, 1);
    if (enemy.hit > 0) ctx.filter = 'brightness(1.8)';
    ctx.save();
    if (!enemy.boss && (enemy.dir || -1) > 0) ctx.scale(-1, 1);
    if (enemy.boss && enemy.attackKind === 'laser' && (enemy.attackPhase === 'telegraph' || enemy.attackPhase === 'active')) ctx.scale(-1, 1);
    if (enemy.boss && enemy.attackKind === 'charge' && enemy.attackPhase === 'telegraph') {
      const pulse = 1 + Math.sin(enemy.attackT * 28) * 0.035 + enemy.attackT * 0.025;
      ctx.scale(pulse, pulse);
    }
    if (image) {
      drawCentered(image, 0, 0, enemy.size * (ENEMY_SPRITE_SCALE[enemy.key] || 1.45));
    } else {
      if (enemy.key === 'hermit') drawHermit(enemy.size, mood);
      else if (enemy.key === 'shrimp') drawShrimp(enemy.size, mood);
      else if (enemy.key === 'seaStar') drawSeaStar(enemy.size, mood);
      else if (enemy.key === 'goby') drawGoby(enemy.size, mood);
      else if (enemy.key === 'anemone') drawAnemone(enemy.size, mood);
      else drawHorseshoe(enemy.size, mood);
    }
    if (enemy.mood === 'angry' && !enemy.defeated && enemy.eatTimer <= 0) drawAngryFaceLayer(enemy.size, enemy.boss);
    ctx.restore();
    ctx.filter = 'none';
    if (happyDone) drawHappyHearts(enemy);
    if (!enemy.defeated) {
      if (enemy.boss) drawBossBar(enemy);
      else drawSmallHp(enemy, type);
    }
    ctx.restore();
  }

  function drawEnemySpeech(enemy) {
    if (!enemy.speech) return;
    const happyDone = enemy.defeated && enemy.mood === 'happy';
    const important = enemy.boss || IMPORTANT_SPEECH_KEYS.has(enemy.key);
    const speechW = enemy.boss ? 360 : 250;
    const rawX = screenX(enemy.x) + (enemy.boss ? -40 : 0);
    const rawY = enemy.y + (enemy.boss ? -230 : -enemy.size * 1.02);
    const safeX = clamp(rawX, speechW / 2 + 24, BASE_W - speechW / 2 - 24);
    const safeY = clamp(rawY, 104, BASE_H - 126);
    if (important) drawSpeechBubble(enemy.speech.text, safeX, safeY, speechW, happyDone);
    else drawPlainEnemyText(enemy.speech.text, safeX, safeY + 8, happyDone);
  }

  function drawAngryFaceLayer(size, boss = false) {
    const s = boss ? size * 0.82 : size;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    ctx.strokeStyle = 'rgba(79, 36, 42, 0.92)';
    ctx.lineWidth = Math.max(3.5, s * 0.055);
    ctx.shadowColor = 'rgba(255,255,255,0.7)';
    ctx.shadowBlur = 3;
    ctx.beginPath();
    ctx.moveTo(-s * 0.23, -s * 0.2);
    ctx.lineTo(-s * 0.04, -s * 0.11);
    ctx.moveTo(s * 0.23, -s * 0.2);
    ctx.lineTo(s * 0.04, -s * 0.11);
    ctx.stroke();

    ctx.shadowColor = 'rgba(255, 90, 90, 0.36)';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = '#e44b52';
    ctx.lineWidth = Math.max(3, s * 0.045);
    const ox = s * 0.33;
    const oy = -s * 0.48;
    ctx.beginPath();
    ctx.moveTo(ox, oy - s * 0.14);
    ctx.lineTo(ox, oy + s * 0.14);
    ctx.moveTo(ox - s * 0.12, oy - s * 0.08);
    ctx.lineTo(ox + s * 0.12, oy + s * 0.08);
    ctx.moveTo(ox + s * 0.12, oy - s * 0.08);
    ctx.lineTo(ox - s * 0.12, oy + s * 0.08);
    ctx.stroke();

    ctx.restore();
  }

  function drawPlainEnemyText(text, x, y, happy = false) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '900 26px Zen Maru Gothic, sans-serif';
    ctx.lineWidth = 8;
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.94)';
    ctx.shadowColor = 'rgba(0, 35, 55, 0.26)';
    ctx.shadowBlur = 10;
    ctx.strokeText(text, x, y);
    ctx.shadowBlur = 0;
    ctx.fillStyle = happy ? '#a62d6f' : '#073d56';
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  function drawSmallHp(enemy) {
    const w = enemy.size;
    const pct = clamp(enemy.hp / enemy.maxHp, 0, 1);
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    roundRect(-w * 0.42, -w * 0.76, w * 0.84, 9, 5);
    ctx.fill();
    ctx.fillStyle = '#63bd78';
    roundRect(-w * 0.42, -w * 0.76, w * 0.84 * pct, 9, 5);
    ctx.fill();
  }

  function drawBossBar(enemy) {
    const pct = clamp(enemy.hp / enemy.maxHp, 0, 1);
    ctx.fillStyle = 'rgba(255,255,255,0.82)';
    roundRect(-170, -180, 340, 24, 8);
    ctx.fill();
    ctx.fillStyle = '#ff8b76';
    roundRect(-166, -176, 332 * pct, 16, 6);
    ctx.fill();
    ctx.fillStyle = '#0c5572';
    ctx.font = '900 22px Zen Maru Gothic, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('カブトガニ', 0, -196);
  }

  function drawHappyHearts(enemy) {
    const heart = state.assets.heartCluster;
    const t = (enemy.happyVanishMax || 1.18) - enemy.vanishTimer;
    const base = enemy.boss ? 1.08 : 0.72;
    const spots = [
      { x: enemy.size * 0.42, y: -enemy.size * 0.62, s: base, p: 0 },
      { x: -enemy.size * 0.34, y: -enemy.size * 0.44, s: base * 0.72, p: 1.4 },
      { x: enemy.size * 0.08, y: -enemy.size * 0.92, s: base * 0.58, p: 2.3 }
    ];
    ctx.save();
    spots.forEach((spot) => {
      const bob = Math.sin(state.time * 5.2 + spot.p + enemy.phase) * 5 - t * 18;
      const pulse = 1 + Math.sin(state.time * 6.8 + spot.p) * 0.06;
      ctx.save();
      ctx.translate(spot.x, spot.y + bob);
      ctx.rotate(Math.sin(state.time * 3 + spot.p) * 0.08);
      if (heart) {
        drawCentered(heart, 0, 0, 58 * spot.s * pulse, 0.96);
      } else {
        drawHeartShape(0, 0, 18 * spot.s * pulse);
      }
      ctx.restore();
    });
    ctx.restore();
  }

  function drawHeartShape(x, y, size) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(size / 24, size / 24);
    ctx.fillStyle = '#ff6ca7';
    ctx.strokeStyle = 'rgba(150, 22, 83, 0.22)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 8);
    ctx.bezierCurveTo(-18, -4, -8, -18, 0, -8);
    ctx.bezierCurveTo(8, -18, 18, -4, 0, 8);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawSpeechBubble(text, x, y, w, happy = false) {
    ctx.save();
    ctx.font = '900 20px Zen Maru Gothic, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const maxW = w;
    const lines = wrapText(text, maxW - 30, ctx.font);
    const h = 34 + lines.length * 24;
    const left = x - maxW / 2;
    const top = y - h / 2;
    ctx.fillStyle = happy ? 'rgba(255, 225, 241, 0.96)' : 'rgba(255, 255, 255, 0.92)';
    ctx.strokeStyle = happy ? 'rgba(255, 115, 170, 0.58)' : 'rgba(41, 125, 152, 0.32)';
    ctx.lineWidth = 3;
    if (happy) {
      ctx.shadowColor = 'rgba(255, 130, 190, 0.25)';
      ctx.shadowBlur = 18;
    }
    roundRect(left, top, maxW, h, 12);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 22, top + h - 2);
    ctx.lineTo(x + 6, top + h + 20);
    ctx.lineTo(x - 12, top + h - 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    if (happy) {
      ctx.shadowBlur = 0;
      drawHeartShape(left + 24, top + 20, 16);
      drawHeartShape(left + maxW - 24, top + h - 15, 13);
    }
    ctx.fillStyle = happy ? '#9f2865' : '#0d4964';
    lines.forEach((line, index) => {
      ctx.fillText(line, x, top + 22 + index * 24);
    });
    ctx.restore();
  }

  function wrapText(text, maxWidth, font) {
    ctx.save();
    ctx.font = font;
    const lines = [];
    let line = '';
    for (const char of text) {
      const next = line + char;
      if (line && ctx.measureText(next).width > maxWidth) {
        lines.push(line);
        line = char;
      } else {
        line = next;
      }
    }
    if (line) lines.push(line);
    ctx.restore();
    return lines.slice(0, 3);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
  }

  function drawFoodOrb(x, y, r) {
    ctx.save();
    ctx.shadowColor = '#fff0a0';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#f5c44d';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    ctx.beginPath();
    ctx.arc(x - r * 0.28, y - r * 0.32, r * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawClosedEye(x, y, w = 13) {
    ctx.save();
    ctx.strokeStyle = '#18394a';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x - w * 0.5, y);
    ctx.quadraticCurveTo(x, y + 6, x + w * 0.5, y);
    ctx.stroke();
    ctx.restore();
  }

  function drawSmile(x, y, w = 24, h = 12) {
    ctx.save();
    ctx.strokeStyle = '#8c4725';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x - w * 0.5, y);
    ctx.quadraticCurveTo(x, y + h, x + w * 0.5, y);
    ctx.stroke();
    ctx.restore();
  }

  function drawOpenMouth(x, y, r = 7) {
    ctx.save();
    ctx.fillStyle = '#8b332d';
    ctx.beginPath();
    ctx.ellipse(x, y, r, r * 0.72, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawHermit(s, mood) {
    ctx.fillStyle = '#e66d37';
    ctx.strokeStyle = '#8c4725';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(8, 10, s * 0.35, s * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#e8c18a';
    ctx.beginPath();
    ctx.arc(-20, -10, s * 0.34, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    if (mood === 'happy') {
      drawClosedEye(18, -12, 13);
      drawClosedEye(36, -10, 13);
      drawSmile(28, 4, 22, 11);
    } else {
      ctx.fillStyle = '#1c3d4c';
      ctx.beginPath();
      ctx.arc(18, -12, 5, 0, Math.PI * 2);
      ctx.arc(36, -10, 5, 0, Math.PI * 2);
      ctx.fill();
      if (mood === 'eating') {
        drawOpenMouth(29, 2, 6);
        drawFoodOrb(45, 6, s * 0.12);
      } else {
        drawSmile(28, 3, 18, 8);
      }
    }
  }

  function drawShrimp(s, mood) {
    ctx.strokeStyle = '#d45f45';
    ctx.lineWidth = 4;
    ctx.fillStyle = '#ff9e82';
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.46, s * 0.22, 0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-28, -4);
    ctx.quadraticCurveTo(-58, -22, -78, -8);
    ctx.stroke();
    if (mood === 'happy') {
      drawClosedEye(25, -10, 13);
      drawSmile(29, 6, 20, 9);
    } else {
      ctx.fillStyle = '#18394a';
      ctx.beginPath();
      ctx.arc(25, -10, 5, 0, Math.PI * 2);
      ctx.fill();
      if (mood === 'eating') {
        drawOpenMouth(32, 3, 6);
        drawFoodOrb(48, 5, s * 0.12);
      }
    }
  }

  function drawSeaStar(s, mood) {
    ctx.fillStyle = '#f78a49';
    ctx.strokeStyle = '#bf6538';
    ctx.lineWidth = 4;
    starPath(0, 0, s * 0.45, s * 0.2, 5);
    ctx.fill();
    ctx.stroke();
    if (mood === 'happy') {
      drawClosedEye(-10, -4, 12);
      drawClosedEye(10, -4, 12);
      drawSmile(0, 11, 26, 12);
    } else {
      ctx.fillStyle = '#10384a';
      ctx.beginPath();
      ctx.arc(-9, -4, 4, 0, Math.PI * 2);
      ctx.arc(9, -4, 4, 0, Math.PI * 2);
      ctx.fill();
      if (mood === 'eating') {
        drawOpenMouth(0, 10, 7);
        drawFoodOrb(0, 24, s * 0.13);
      }
    }
  }

  function drawGoby(s, mood) {
    ctx.fillStyle = '#e2bd72';
    ctx.strokeStyle = '#8d6b3d';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.5, s * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-42, 0);
    ctx.lineTo(-70, -18);
    ctx.lineTo(-68, 18);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    if (mood === 'happy') {
      drawClosedEye(30, -8, 14);
      drawSmile(36, 8, 22, 9);
    } else {
      ctx.fillStyle = '#16394b';
      ctx.beginPath();
      ctx.arc(30, -8, 6, 0, Math.PI * 2);
      ctx.fill();
      if (mood === 'eating') {
        drawOpenMouth(43, 5, 6);
        drawFoodOrb(61, 6, s * 0.12);
      }
    }
  }

  function drawAnemone(s, mood) {
    ctx.fillStyle = '#ef6f80';
    ctx.strokeStyle = '#b94d62';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(0, 20, s * 0.38, s * 0.26, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    for (let i = 0; i < 10; i += 1) {
      const a = -Math.PI + i * Math.PI / 9;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * 12, 0);
      ctx.quadraticCurveTo(Math.cos(a) * s * 0.36, -s * 0.24, Math.cos(a) * s * 0.45, -s * 0.5 + Math.sin(i) * 8);
      ctx.stroke();
    }
    if (mood === 'happy') {
      drawClosedEye(-12, 18, 12);
      drawClosedEye(12, 18, 12);
      drawSmile(0, 31, 24, 12);
    } else if (mood === 'eating') {
      drawOpenMouth(0, 14, 8);
      drawFoodOrb(0, -6, s * 0.14);
    } else {
      ctx.fillStyle = '#7d3348';
      ctx.beginPath();
      ctx.arc(-10, 18, 4, 0, Math.PI * 2);
      ctx.arc(10, 18, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawHorseshoe(s, mood) {
    ctx.fillStyle = '#8c8051';
    ctx.strokeStyle = '#4d4328';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.ellipse(-8, 0, s * 0.5, s * 0.34, 0.02, Math.PI * 0.12, Math.PI * 1.88);
    ctx.lineTo(s * 0.76, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    if (mood === 'happy') {
      drawClosedEye(-54, -30, 16);
      drawClosedEye(-40, 18, 16);
      drawSmile(-25, 0, 40, 15);
    } else {
      ctx.fillStyle = '#4d4328';
      ctx.beginPath();
      ctx.arc(-54, -30, 7, 0, Math.PI * 2);
      ctx.arc(-40, 18, 7, 0, Math.PI * 2);
      ctx.fill();
      if (mood === 'eating') {
        drawOpenMouth(-12, 2, 10);
        drawFoodOrb(28, 10, s * 0.08);
      }
    }
    ctx.strokeStyle = '#d7c884';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-60, -50);
    ctx.quadraticCurveTo(-16, -18, 26, -10);
    ctx.moveTo(-62, 42);
    ctx.quadraticCurveTo(-12, 24, 38, 12);
    ctx.stroke();
  }

  function drawImpact(i) {
    const pct = 1 - i.life / i.max;
    ctx.save();
    ctx.globalAlpha = 1 - pct;
    ctx.strokeStyle = i.kind === 'danger' ? '#ff776d' : (i.kind === 'boss' ? '#ff8b76' : '#fff4a8');
    ctx.lineWidth = 8 * (1 - pct) + 2;
    ctx.beginPath();
    ctx.arc(screenX(i.x), i.y, i.radius * (0.4 + pct * 0.9), 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function drawDroppedCoin(c) {
    const alpha = clamp(c.life / Math.min(c.max, 1.2), 0, 1);
    const spin = state.time * (c.spinRate || 3.8) + c.phase;
    const face = Math.abs(Math.cos(spin));
    const rx = Math.max(c.r * 0.16, c.r * (0.22 + face * 0.84));
    const ry = c.r * 0.92;
    const front = Math.cos(spin) >= 0;
    ctx.save();
    ctx.translate(screenX(c.x), c.y);
    ctx.globalAlpha = alpha;
    ctx.shadowColor = c.magnet ? '#fff8b8' : '#ffd86e';
    ctx.shadowBlur = c.magnet ? 18 : 10;

    ctx.save();
    ctx.globalAlpha *= c.settled ? 0.28 : 0.16;
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(61, 45, 23, 0.42)';
    ctx.beginPath();
    ctx.ellipse(0, c.r * 0.98, c.r * 0.88, c.r * 0.24, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    const side = ctx.createLinearGradient(-rx, 0, rx, 0);
    side.addColorStop(0, '#9b610d');
    side.addColorStop(0.18, '#f1b83b');
    side.addColorStop(0.52, '#ffdf75');
    side.addColorStop(0.82, '#c88417');
    side.addColorStop(1, '#7a4b0b');
    ctx.fillStyle = side;
    ctx.strokeStyle = '#8a5a12';
    ctx.lineWidth = 3.2;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx + c.r * 0.12, ry, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    const faceGrad = ctx.createRadialGradient(-rx * 0.42, -ry * 0.5, c.r * 0.08, 0, 0, Math.max(rx, ry));
    faceGrad.addColorStop(0, '#fff6ba');
    faceGrad.addColorStop(0.42, front ? '#ffd95a' : '#e5a42a');
    faceGrad.addColorStop(1, front ? '#c37a12' : '#9c6415');
    ctx.fillStyle = faceGrad;
    ctx.strokeStyle = '#fff0a2';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry * 0.86, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    if (face > 0.32) {
      ctx.strokeStyle = 'rgba(130, 79, 14, 0.62)';
      ctx.lineWidth = Math.max(1.2, c.r * 0.13);
      ctx.beginPath();
      ctx.ellipse(0, 0, rx * 0.64, ry * 0.56, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.save();
      ctx.scale(face, 1);
      drawCoinStar(0, 0, c.r * 0.34);
      ctx.restore();
    } else {
      ctx.strokeStyle = '#ffe082';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -ry * 0.64);
      ctx.lineTo(0, ry * 0.64);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawCoinStar(x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#fff2a4';
    ctx.strokeStyle = 'rgba(123, 79, 13, 0.5)';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    for (let i = 0; i < 10; i += 1) {
      const a = -Math.PI / 2 + i * Math.PI / 5;
      const rr = i % 2 === 0 ? r : r * 0.45;
      const px = Math.cos(a) * rr;
      const py = Math.sin(a) * rr;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawCoinPop(c) {
    const alpha = clamp(c.life / c.max, 0, 1);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(screenX(c.x), c.y);
    ctx.shadowColor = '#fff1a0';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffd86e';
    ctx.beginPath();
    ctx.arc(-28, -2, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#9b6b18';
    ctx.font = '900 17px Zen Maru Gothic, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('C', -28, -2);
    ctx.fillStyle = '#fff7c6';
    ctx.strokeStyle = 'rgba(36, 70, 76, 0.58)';
    ctx.lineWidth = 4;
    ctx.font = '900 28px Zen Maru Gothic, sans-serif';
    ctx.strokeText('+' + c.amount, 10, 0);
    ctx.fillText('+' + c.amount, 10, 0);
    ctx.restore();
  }

  function drawBubbles() {
    ctx.save();
    ctx.strokeStyle = 'rgba(235, 254, 255, 0.7)';
    ctx.lineWidth = 2;
    state.bubbles.forEach((b) => {
      ctx.globalAlpha = clamp(b.life / b.max, 0, 1);
      ctx.beginPath();
      ctx.arc(screenX(b.x), b.y, b.r, 0, Math.PI * 2);
      ctx.stroke();
    });
    ctx.restore();
  }

  function drawWaterOverlay() {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 0.09;
    ctx.strokeStyle = '#e6ffff';
    ctx.lineWidth = 2;
    const offset = -((state.camera * 0.16) % 36);
    for (let y = 140; y < BASE_H; y += 62) {
      ctx.beginPath();
      let first = true;
      for (let x = offset - 20; x <= BASE_W + 56; x += 36) {
        const yy = y + Math.sin(x * 0.02 + state.time * 1.2 + y) * 4;
        if (first) {
          ctx.moveTo(x, yy);
          first = false;
        }
        else ctx.lineTo(x, yy);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function pointerToGame(ev) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (ev.clientX - rect.left) / rect.width * BASE_W,
      y: (ev.clientY - rect.top) / rect.height * BASE_H
    };
  }

  function setTarget(ev) {
    if (state.mode !== 'playing') return;
    const p = pointerToGame(ev);
    const worldX = state.camera + p.x;
    const arenaLocked = state.bossPhase === 'scroll' || state.bossPhase === 'intro' || state.bossPhase === 'fight' || state.bossPhase === 'done';
    const minPlayerX = arenaLocked ? state.camera + 120 : PLAYER_MIN_X;
    const maxPlayerX = arenaLocked ? state.camera + 780 : PLAYER_MAX_X;
    if (worldX < state.player.x - 18) state.player.facing = -1;
    else if (worldX > state.player.x + 18) state.player.facing = 1;
    state.player.tx = clamp(worldX, minPlayerX, maxPlayerX);
    state.player.ty = clamp(p.y, 150, 735);
  }

  function releasePointerFire(ev) {
    if (ev.button === 2) state.bombHeld = false;
    else if (ev.button === 0 || ev.button === -1) state.fireHeld = false;
  }

  function renderStages(targetId) {
    const target = document.getElementById(targetId);
    target.innerHTML = STAGES.map((s, i) => {
      const locked = i > 0;
      return '<div class="stage-card ' + (locked ? 'locked' : '') + '"><strong>Stage ' + (i + 1) + '<br>' + s[0] + '</strong><span>' + (locked ? 'これから追加' : s[1]) + '</span></div>';
    }).join('');
  }

  function renderAlbum() {
    albumText.textContent = state.album.size + ' / ' + CARDS.length;
    const grid = document.getElementById('albumGrid');
    grid.innerHTML = CARDS.map((card) => {
      const open = state.album.has(card.id);
      return '<button class="album-card ' + (open ? '' : 'locked') + '" data-card="' + card.id + '" type="button"><div class="album-icon">' + (open ? card.icon : '?') + '</div><strong>' + (open ? card.name : '???') + '</strong><span>' + (open ? card.stage + ' で発見' : 'まだ見つけていない') + '</span></button>';
    }).join('');
    grid.querySelectorAll('.album-card').forEach((btn) => {
      btn.addEventListener('click', () => showDetail(btn.dataset.card));
    });
  }

  function showDetail(id) {
    const card = CARDS.find((c) => c.id === id);
    if (!card) return;
    const open = state.album.has(id);
    document.getElementById('detailTitle').textContent = open ? card.name : 'まだ ひみつ';
    document.getElementById('detailSub').textContent = open ? card.stage : 'ステージで見つけよう';
    document.getElementById('detailArt').textContent = open ? card.icon : '?';
    document.getElementById('detailFacts').innerHTML = open
      ? [
        ['すむところ', card.habitat],
        ['たべもの', card.food],
        ['からだのひみつ', card.secret]
      ].map(([k, v]) => '<div class="fact-row"><b>' + k + '</b><span>' + v + '</span></div>').join('')
      : '<div class="fact-row"><b>ヒント</b><span>Stage 1 で観察すると、カードがひらくよ。</span></div>';
    detailOverlay.hidden = false;
  }

  function frame(now) {
    if (!frame.last) frame.last = now;
    const dt = Math.min(0.033, (now - frame.last) / 1000);
    frame.last = now;
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  canvas.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    canvas.setPointerCapture(ev.pointerId);
    setTarget(ev);
    if (ev.button === 2) {
      state.bombHeld = true;
      tryFireBombs();
    } else {
      state.fireHeld = true;
      tryFireBoth();
    }
  });
  canvas.addEventListener('pointermove', (ev) => {
    ev.preventDefault();
    setTarget(ev);
  });
  canvas.addEventListener('pointerup', (ev) => {
    releasePointerFire(ev);
    try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
  });
  canvas.addEventListener('pointercancel', (ev) => {
    releasePointerFire(ev);
    try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
  });
  canvas.addEventListener('contextmenu', (ev) => ev.preventDefault());
  window.addEventListener('keydown', (ev) => {
    if (['Space', 'Enter', 'KeyZ', 'KeyX', 'ShiftLeft', 'ShiftRight'].includes(ev.code)) ev.preventDefault();
    state.keys[ev.code] = true;
    if (ev.code === 'Space' || ev.code === 'Enter' || ev.code === 'KeyZ') tryFireBoth();
    if (ev.code === 'KeyX') tryFireBombs();
    if (ev.code === 'ShiftLeft' || ev.code === 'ShiftRight') activateJet();
  });
  window.addEventListener('keyup', (ev) => { state.keys[ev.code] = false; });
  window.addEventListener('blur', () => {
    state.keys = Object.create(null);
    state.fireHeld = false;
    state.bombHeld = false;
  });
  window.addEventListener('resize', resize);
  jetBtn.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    activateJet();
  });
  jetBtn.addEventListener('click', (ev) => {
    ev.preventDefault();
    activateJet();
  });

  document.getElementById('startBtn').addEventListener('click', resetRun);
  document.getElementById('againBtn').addEventListener('click', resetRun);
  document.getElementById('albumBtn').addEventListener('click', () => { renderAlbum(); albumOverlay.hidden = false; });
  document.getElementById('startAlbumBtn').addEventListener('click', () => { renderAlbum(); albumOverlay.hidden = false; });
  document.getElementById('finishAlbumBtn').addEventListener('click', () => { renderAlbum(); albumOverlay.hidden = false; });
  document.getElementById('stageBtn').addEventListener('click', () => { renderStages('stageGrid'); stageOverlay.hidden = false; });
  document.querySelectorAll('[data-close]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const el = document.getElementById(btn.dataset.close);
      if (el) el.hidden = true;
    });
  });

  Promise.all(Object.entries(ASSET).map(([key, src]) => {
    if (key !== 'bg' && key !== 'scrollBg' && key !== 'player' && !USE_ALPHA_SPRITES) {
      state.assets[key] = null;
      return Promise.resolve();
    }
    return loadOptional(src).then((image) => { state.assets[key] = image; });
  }))
    .then(() => {
      loadAlbum();
      loadCoins();
      renderStages('startStageGrid');
      renderStages('stageGrid');
      renderAlbum();
      resize();
      loading.hidden = true;
      updateHud();
      window.__seaAlbumState = state;
      requestAnimationFrame(frame);
    });
})();
</script>
</body>
</html>
