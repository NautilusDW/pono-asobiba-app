<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

  <meta name="description" content="ポノと一緒にひらがな・パズル・ぬりえなどのミニゲームで楽しく学ぼう！">

  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://pono-asobiba-app.ndw.workers.dev/play.html">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://pono-asobiba-app.ndw.workers.dev/play.html">
  <meta property="og:site_name" content="ポノのあそびば">
  <meta property="og:title" content="ポノのあそびば">
  <meta property="og:description" content="ひらがな・パズル・ぬりえなどのミニゲームで楽しく学ぼう！">
  <meta property="og:image" content="https://pono-asobiba-app.ndw.workers.dev/assets/images/A+用ヘッダー.jpg">
  <meta property="og:locale" content="ja_JP">

  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ポノあそびば">
  <meta name="theme-color" content="#F2915A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Preload preview backgrounds (4 games) -->
  <link rel="preload" as="image" href="assets/images/quizland/title_back.jpg">
  <link rel="preload" as="image" href="assets/images/quiz-sound/title_back.jpg">
  <link rel="preload" as="image" href="assets/images/wordmatch/title_back.jpg">
  <link rel="preload" as="image" href="assets/images/maze/title_back.jpg">
  <!-- Preload card UI assets (wood panel + play button states) -->
  <link rel="preload" as="image" href="assets/ui/menu_card_base_01.png">
  <link rel="preload" as="image" href="assets/ui/menu_card_base_02.png">
  <link rel="preload" as="image" href="assets/ui/menu_card_base_03.png">
  <link rel="preload" as="image" href="assets/ui/menu_card_base_04.png">
  <link rel="preload" as="image" href="assets/ui/play_button_normal.png">
  <link rel="preload" as="image" href="assets/ui/play_button_selected.png">
  <link rel="preload" as="image" href="assets/ui/play_button_pressed.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF8F0;
      --primary: #F2915A;
      --primary-light: #FDDCBF;
      --accent-green: #6C8E3F;
      --accent-cream: #FFF8E1;
      --text: #5D4E37;
      --text-light: #A89880;
      --shadow: rgba(93, 78, 55, 0.18);
      --radius: 22px;
      --nav-h: 64px;
    }

    html, body {
      height: 100%;
      font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      background-image: url('assets/images/BG_03.webp');
      background-size: cover;
      background-position: center;
    }

    /* ===== Header ===== */
    .top-header {
      flex-shrink: 0;
      padding: 8px 16px;
      padding-top: max(8px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(to bottom, rgba(255,248,225,0.92), rgba(255,248,225,0.72));
      box-shadow: 0 2px 10px var(--shadow);
      position: relative;
      z-index: 30;
    }
    .brand-title {
      font-size: clamp(1.1rem, 3.4vw, 1.6rem);
      font-weight: 900;
      color: var(--primary);
      letter-spacing: 0.05em;
      text-shadow: 2px 2px 0 var(--primary-light);
    }
    .brand-subtitle {
      font-size: clamp(0.78rem, 2.2vw, 0.95rem);
      font-weight: 700;
      color: var(--text);
      background: rgba(255,255,255,0.8);
      border: 2px solid var(--primary-light);
      border-radius: 50px;
      padding: 4px 14px;
    }

    /* ===== Main: preview + cards ===== */
    .play-main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px 12px calc(var(--nav-h) + 8px + env(safe-area-inset-bottom));
    }

    /* ===== Preview Pane ===== */
    .preview-pane {
      position: relative;
      flex: 1 1 50%;
      min-height: 200px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 28px var(--shadow);
      isolation: isolate;
    }
    .preview-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 0.45s ease;
      z-index: 1;
    }
    .preview-bg.is-active { opacity: 1; }
    .preview-pane::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.05) 0%,
        rgba(0,0,0,0.0) 35%,
        rgba(0,0,0,0.45) 100%
      );
      pointer-events: none;
    }
    .preview-overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      padding: 16px 16px 18px;
      text-align: center;
      pointer-events: none;
    }
    .preview-title {
      font-size: clamp(1.05rem, 3.4vw, 1.6rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.04em;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.5), 0 0 12px rgba(0,0,0,0.3);
      line-height: 1.2;
      transition: opacity 0.35s ease;
    }
    .preview-desc {
      font-size: clamp(0.75rem, 2.2vw, 0.95rem);
      font-weight: 700;
      color: #FFF8E1;
      background: rgba(0,0,0,0.35);
      border-radius: 50px;
      padding: 4px 14px;
      letter-spacing: 0.03em;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
      transition: opacity 0.35s ease;
    }
    .preview-title.is-fading,
    .preview-desc.is-fading { opacity: 0; }

    .start-btn {
      pointer-events: auto;
      margin-top: 8px;
      padding: 14px 36px;
      font-family: inherit;
      font-size: clamp(1.1rem, 3.6vw, 1.4rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #5C3A00;
      background: linear-gradient(180deg, #FFE680, #F5A800);
      border: 3px solid #fff;
      border-radius: 50px;
      box-shadow: 0 5px 0 #B87200, 0 8px 18px rgba(0,0,0,0.35);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .start-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #B87200, 0 4px 10px rgba(0,0,0,0.3);
    }
    .start-icon { font-size: 0.9em; }
    @keyframes startBtnPulse {
      0%   { transform: scale(1);    box-shadow: 0 5px 0 #B87200, 0 8px 18px rgba(0,0,0,0.35); }
      40%  { transform: scale(1.08); box-shadow: 0 5px 0 #B87200, 0 12px 28px rgba(255,168,0,0.6); }
      100% { transform: scale(1);    box-shadow: 0 5px 0 #B87200, 0 8px 18px rgba(0,0,0,0.35); }
    }
    .start-btn.is-pulse { animation: startBtnPulse 0.45s ease; }

    /* ===== Card List (wood-card layout) ===== */
    .card-list {
      flex: 1 1 50%;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 6px 6px 10px;
      scrollbar-width: thin;
      /* CSS variables: 画像比率に合わせて微調整可能
         サムネ・ボタンは card 高さ基準 (h-pct)、左右パディング・テキスト枠は card 幅基準 (w-pct) */
      --gc-aspect: 5.5 / 1;
      --gc-radius: 22px;
      --gc-thumb-h-pct: 78%;
      --gc-play-h-pct: 72%;
      --gc-side-w-pct: 2%;
      --gc-text-left-w-pct: 17%;
      --gc-text-right-w-pct: 16%;
    }
    .card-list::-webkit-scrollbar { width: 6px; }
    .card-list::-webkit-scrollbar-thumb {
      background: rgba(120, 80, 40, 0.35);
      border-radius: 999px;
    }

    .game-card {
      position: relative;
      flex-shrink: 0;
      width: 100%;
      aspect-ratio: var(--gc-aspect);
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
      transform-origin: center;
      transition: transform 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .game-card:active { transform: scale(0.985); }
    .game-card.is-selected {
      transform: scale(1.025);
      filter: brightness(1.04) saturate(1.04);
    }
    .game-card.is-selected::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: var(--gc-radius);
      pointer-events: none;
      box-shadow:
        0 0 0 3px rgba(255, 225, 140, 0.7),
        0 0 22px rgba(255, 195, 80, 0.35);
    }

    /* 1. 木枠の背景画像 (絶対配置で全面) */
    .game-card__bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 2. 左の丸サムネイル (枠は CSS で作る) */
    .game-card__thumbWrap {
      position: absolute;
      left: var(--gc-side-w-pct);
      top: 50%;
      height: var(--gc-thumb-h-pct);
      aspect-ratio: 1 / 1;
      width: auto;
      transform: translateY(-50%);
      border-radius: 50%;
      padding: 4%;
      background: #f7edd0;
      border: 2px solid rgba(120, 78, 34, 0.85);
      box-shadow:
        0 3px 6px rgba(80, 50, 20, 0.22),
        inset 0 1px 2px rgba(255, 255, 255, 0.75);
      box-sizing: border-box;
      overflow: hidden;
      pointer-events: none;
    }
    .game-card__thumb {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 50%;
      object-fit: cover;
    }

    /* 3-5. 中央のテキスト (タイトル + 説明) */
    .game-card__text {
      position: absolute;
      left: var(--gc-text-left-w-pct);
      right: var(--gc-text-right-w-pct);
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      min-width: 0;
      pointer-events: none;
      text-align: left;
    }
    .game-card__title {
      font-size: clamp(0.95rem, 3.4vw, 1.6rem);
      line-height: 1.1;
      font-weight: 900;
      color: #3f6f2a;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow:
        1px 0 rgba(255, 248, 220, 0.85),
        -1px 0 rgba(255, 248, 220, 0.85),
        0 1px rgba(255, 248, 220, 0.85),
        0 -1px rgba(255, 248, 220, 0.85),
        0 2px 3px rgba(90, 60, 30, 0.18);
    }
    .game-card__desc {
      font-size: clamp(0.7rem, 2vw, 0.95rem);
      line-height: 1.2;
      font-weight: 700;
      color: #6a4a2b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.04em;
    }

    /* 6. 右の丸再生ボタン */
    .game-card__play {
      position: absolute;
      right: var(--gc-side-w-pct);
      top: 50%;
      height: var(--gc-play-h-pct);
      aspect-ratio: 1 / 1;
      width: auto;
      transform: translateY(-50%);
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .game-card__playImg {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      pointer-events: none;
      transition: transform 0.1s ease;
    }
    .game-card.is-selected .game-card__playImg {
      content: url('assets/ui/play_button_selected.png');
    }
    .game-card__play:active .game-card__playImg {
      content: url('assets/ui/play_button_pressed.png');
      transform: scale(0.95);
    }

    /* ===== Landscape (21:9 etc): side-by-side ===== */
    @media (orientation: landscape) and (min-aspect-ratio: 16/10) {
      .play-main {
        flex-direction: row;
        gap: 14px;
        padding: 12px 14px calc(var(--nav-h) + 8px + env(safe-area-inset-bottom));
      }
      .preview-pane {
        flex: 1 1 58%;
      }
      .card-list {
        flex: 1 1 42%;
      }
    }

    /* ===== Bottom Navigation ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 90;
      display: flex;
      justify-content: space-around;
      align-items: stretch;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 -2px 12px rgba(93,78,55,0.15);
      border-top: 2px solid #FDE68A;
      padding-bottom: env(safe-area-inset-bottom);
      height: calc(var(--nav-h) + env(safe-area-inset-bottom));
    }
    .bn-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 8px 4px 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
      transition: transform 0.1s;
    }
    .bn-item:active { transform: scale(0.9); }
    .bn-icon {
      font-size: 1.4rem;
      line-height: 1;
    }
    .bn-label {
      font-size: 0.68rem;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: 0.02em;
    }

    /* ===== Modal ===== */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      padding: 20px;
    }
    .modal[hidden] { display: none; }
    .modal-card {
      background: var(--accent-cream);
      border: 4px solid var(--primary-light);
      border-radius: var(--radius);
      padding: 22px 22px 18px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
      max-height: calc(100dvh - 40px);
      overflow-y: auto;
    }
    .modal-card h3 {
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--primary);
      text-align: center;
      margin-bottom: 14px;
    }
    .modal-card p {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.5;
      text-align: center;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 6px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .modal-divider {
      border: none;
      border-top: 2px dashed var(--primary-light);
      margin: 10px 0;
    }
    .dev-link {
      display: block;
      text-align: center;
      padding: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-light);
      text-decoration: none;
      border: 2px dashed var(--text-light);
      border-radius: 10px;
      margin: 8px 0;
    }
    .dev-link:active { background: rgba(0,0,0,0.05); }
    .modal-close {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(180deg, #FFD84D, #F5A800);
      color: #5C3A00;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 3px 0 #B87200;
    }
    .modal-close:active { transform: translateY(2px); box-shadow: 0 1px 0 #B87200; }

    /* ===== Toggle Switch ===== */
    .toggle {
      position: relative;
      width: 56px;
      height: 30px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #D0C8BE;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.3s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .toggle input:checked + .toggle-slider { background: var(--primary); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(26px); }

    /* MVP: hide acorn / thankyou / stamp UI if any module tries to show it */
    .acorn-badge-play, .thankyou-badge-play { display: none !important; }
  </style>
  <script src="common/mvp-flags.js"></script>
</head>
<body>

  <header class="top-header">
    <div class="brand">
      <span class="brand-title">ポノのあそびば</span>
    </div>
    <div class="brand-subtitle">きょうは なにして あそぶ？</div>
  </header>

  <main class="play-main">
    <section class="preview-pane" aria-label="えらんでいるゲームのプレビュー">
      <div class="preview-bg" id="previewBgA"></div>
      <div class="preview-bg" id="previewBgB"></div>
      <div class="preview-overlay" aria-live="polite">
        <h2 class="preview-title" id="previewTitle">えらんでね</h2>
        <p class="preview-desc" id="previewDesc">みぎから ゲームを えらぼう</p>
        <button class="start-btn" id="startBtn" type="button">
          <span class="start-icon">▶</span>
          <span class="start-label">はじめる</span>
        </button>
      </div>
    </section>

    <section class="card-list" id="cardList" aria-label="ゲーム一覧"></section>
  </main>

  <nav class="bottom-nav" id="bottomNav" aria-label="メニュー">
    <button class="bn-item" data-action="help" type="button">
      <span class="bn-icon">❓</span>
      <span class="bn-label">ヘルプ</span>
    </button>
    <button class="bn-item" data-action="top" type="button">
      <span class="bn-icon">🌳</span>
      <span class="bn-label">トップ</span>
    </button>
    <button class="bn-item" data-action="news" type="button">
      <span class="bn-icon">🔔</span>
      <span class="bn-label">おしらせ</span>
    </button>
    <button class="bn-item" data-action="settings" type="button">
      <span class="bn-icon">⚙️</span>
      <span class="bn-label">せってい</span>
    </button>
  </nav>

  <!-- ===== Settings Modal ===== -->
  <div class="modal" id="settingsModal" hidden role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal-card">
      <h3 id="settingsTitle">せってい</h3>
      <div class="setting-row">
        <span>おとを ながす</span>
        <label class="toggle">
          <input type="checkbox" id="soundToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <hr class="modal-divider">
      <a href="play-all.html" class="dev-link">📋 ぜんぶみる（開発用）</a>
      <button class="modal-close" type="button" data-close="settingsModal">とじる</button>
    </div>
  </div>

  <!-- ===== News Modal ===== -->
  <div class="modal" id="newsModal" hidden role="dialog" aria-modal="true" aria-labelledby="newsTitle">
    <div class="modal-card">
      <h3 id="newsTitle">おしらせ</h3>
      <p>あたらしい おしらせは ありません。</p>
      <button class="modal-close" type="button" data-close="newsModal">とじる</button>
    </div>
  </div>

  <script>
    'use strict';

    // ===== Game catalog (free MVP set) =====
    // panel: カード木枠の背景 (各ゲームで違う木目バリエーション)
    // thumb: カード左の丸サムネ (各ゲーム個別)
    const GAMES = [
      {
        id: 'quizland',
        title: 'フクロウばかせのなぞなぞ',
        subtitle: 'ひらめき・ものしりクイズ',
        icon: '🦉',
        bg: 'assets/images/quizland/title_back.jpg',
        href: 'quizland/index.html',
        panel: 'assets/ui/menu_card_base_01.png',
        thumb: 'assets/ui/thumb_quizland.png'
      },
      {
        id: 'quiz-sound',
        title: 'こだまのもりのこえさがし',
        subtitle: 'どうぶつのこえを きいて さがそう',
        icon: '🐦',
        bg: 'assets/images/quiz-sound/title_back.jpg',
        href: 'quiz-sound/index.html',
        panel: 'assets/ui/menu_card_base_02.png',
        thumb: 'assets/ui/thumb_quiz-sound.png'
      },
      {
        id: 'wordmatch',
        title: 'あつめよう！ポノのもりのずかん',
        subtitle: 'えと ことばを つなげよう',
        icon: '📖',
        bg: 'assets/images/wordmatch/title_back.jpg',
        href: 'wordmatch/index.html',
        panel: 'assets/ui/menu_card_base_03.png',
        thumb: 'assets/ui/thumb_wordmatch.png'
      },
      {
        id: 'maze',
        title: 'ポノとランタンのめいろ',
        subtitle: 'ランタンをもって まいごさがし',
        icon: '🏮',
        bg: 'assets/images/maze/title_back.jpg',
        href: 'maze/index.html',
        panel: 'assets/ui/menu_card_base_04.png',
        thumb: 'assets/ui/thumb_maze.png'
      }
    ];

    let currentIdx = 0;
    let activeBgEl = 'A';

    const $ = (id) => document.getElementById(id);
    const previewBgA = $('previewBgA');
    const previewBgB = $('previewBgB');
    const previewTitle = $('previewTitle');
    const previewDesc = $('previewDesc');
    const startBtn = $('startBtn');
    const cardList = $('cardList');

    // ===== HTML escape (defensive: GAMES may become external in future) =====
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ===== Render cards =====
    function renderCards() {
      const html = GAMES.map((g, i) => `
        <div class="game-card" data-idx="${i}" data-id="${esc(g.id)}" role="button" tabindex="0" aria-pressed="false" aria-label="${esc(g.title)}">
          <img class="game-card__bg" src="${esc(g.panel)}" alt="" draggable="false">
          <div class="game-card__thumbWrap">
            <img class="game-card__thumb" src="${esc(g.thumb)}" alt="" draggable="false">
          </div>
          <div class="game-card__text">
            <div class="game-card__title">${esc(g.title)}</div>
            <div class="game-card__desc">${esc(g.subtitle)}</div>
          </div>
          <button class="game-card__play" type="button" aria-label="はじめる" data-action="start">
            <img class="game-card__playImg" src="assets/ui/play_button_normal.png" alt="" draggable="false">
          </button>
        </div>
      `).join('');
      cardList.innerHTML = html;
      cardList.addEventListener('click', onCardClick);
    }

    function pulseStartBtn() {
      startBtn.classList.remove('is-pulse');
      // Force reflow so the animation can re-trigger
      void startBtn.offsetWidth;
      startBtn.classList.add('is-pulse');
    }

    function onCardClick(e) {
      const card = e.target.closest('.game-card');
      if (!card) return;
      const idx = Number(card.dataset.idx);
      if (Number.isNaN(idx)) return;
      const isPlayBtn = !!e.target.closest('[data-action="start"]');
      if (isPlayBtn) {
        // 右の再生ボタン: 未選択なら選択してから即開始、選択済みなら即開始
        if (idx !== currentIdx) selectGame(idx);
        startGame(idx);
        return;
      }
      if (idx === currentIdx) {
        // Same card re-tapped: nudge attention to はじめる button
        pulseStartBtn();
        return;
      }
      selectGame(idx);
    }

    function startGame(idx) {
      const game = GAMES[idx];
      if (!game) return;
      try { sessionStorage.setItem('pono_audio_primed_ts', String(Date.now())); } catch(_) {}
      location.href = game.href;
    }

    // ===== Select / preview crossfade =====
    function selectGame(idx) {
      const game = GAMES[idx];
      if (!game) return;
      currentIdx = idx;

      // Update card highlight + aria-pressed
      const cards = cardList.querySelectorAll('.game-card');
      cards.forEach((c, i) => {
        const sel = (i === idx);
        c.classList.toggle('is-selected', sel);
        c.setAttribute('aria-pressed', sel ? 'true' : 'false');
      });

      // Crossfade backgrounds — encode URI to keep CSS url() value safe
      const incoming = activeBgEl === 'A' ? previewBgB : previewBgA;
      const outgoing = activeBgEl === 'A' ? previewBgA : previewBgB;
      const safeBg = encodeURI(game.bg).replace(/'/g, '%27');
      incoming.style.backgroundImage = `url('${safeBg}')`;
      // Double rAF: first frame commits the bg-image, second frame triggers opacity transition reliably
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          incoming.classList.add('is-active');
          outgoing.classList.remove('is-active');
        });
      });
      activeBgEl = activeBgEl === 'A' ? 'B' : 'A';

      // Fade text labels
      previewTitle.classList.add('is-fading');
      previewDesc.classList.add('is-fading');
      setTimeout(() => {
        previewTitle.textContent = game.title;
        previewDesc.textContent = game.subtitle;
        previewTitle.classList.remove('is-fading');
        previewDesc.classList.remove('is-fading');
      }, 200);
    }

    // ===== Start button (left preview pane) =====
    startBtn.addEventListener('click', () => { startGame(currentIdx); });

    // ===== Bottom nav =====
    $('bottomNav').addEventListener('click', (e) => {
      const btn = e.target.closest('.bn-item');
      if (!btn) return;
      const action = btn.dataset.action;
      if (action === 'help') {
        location.href = 'help.html';
      } else if (action === 'top') {
        location.href = 'index.html';
      } else if (action === 'news') {
        openModal('newsModal');
      } else if (action === 'settings') {
        openModal('settingsModal');
      }
    });

    // ===== Modal helpers =====
    function openModal(id) {
      const m = $(id);
      if (m) m.hidden = false;
    }
    function closeModal(id) {
      const m = $(id);
      if (m) m.hidden = true;
    }
    document.addEventListener('click', (e) => {
      const closeBtn = e.target.closest('[data-close]');
      if (closeBtn) {
        closeModal(closeBtn.dataset.close);
        return;
      }
      // Click on backdrop closes
      if (e.target.classList && e.target.classList.contains('modal')) {
        e.target.hidden = true;
      }
    });

    // ===== Sound toggle (persisted) =====
    const SOUND_KEY = 'pono_sound_off';
    const soundToggle = $('soundToggle');
    function loadSoundPref() {
      let off = false;
      try { off = localStorage.getItem(SOUND_KEY) === '1'; } catch(_) {}
      soundToggle.checked = !off;
    }
    soundToggle.addEventListener('change', () => {
      const on = soundToggle.checked;
      try { localStorage.setItem(SOUND_KEY, on ? '0' : '1'); } catch(_) {}
    });
    loadSoundPref();

    // ===== Init =====
    renderCards();
    selectGame(0);

    // ===== Service worker =====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
