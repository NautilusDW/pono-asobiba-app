<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>おえかき | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8E7;
  --primary: #FF6B9D;
  --secondary: #C084FC;
  --accent: #4ADE80;
  --text: #5B4A3F;
  --shadow: 0 4px 20px rgba(91, 74, 63, 0.1);
  --radius: 20px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: var(--text);
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
  gap: 8px;
}

/* ===== Header ===== */
.header {
  text-align: center;
  padding: 6px 0;
  flex-shrink: 0;
  position: relative;
}
.back-link {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  color: var(--primary); font-weight: 700; font-size: 0.85rem;
  text-decoration: none; padding: 6px 2px;
}
.header h1 {
  font-size: 1.4rem; font-weight: 900;
  background: linear-gradient(135deg, #FF6B9D, #FB923C);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .subtitle { font-size: 0.78rem; color: #A89585; margin-top: 2px; }
.btn-bgm {
  position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  width: 34px; height: 34px; border-radius: 50%;
  background: #FFF0F5; border: 2px solid var(--primary);
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(93,78,55,0.15);
  transition: transform 0.15s;
}
.btn-bgm:active { transform: translateY(-50%) scale(0.9); }

/* ===== Canvas ===== */
.canvas-wrap {
  flex: 1;
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  position: relative;
  min-height: 0;
  cursor: crosshair;
}
#drawCanvas {
  display: block;
  width: 100%; height: 100%;
  touch-action: none;
}

/* ===== Color Palette ===== */
.color-palette {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
  justify-content: center;
  flex-wrap: wrap;
}
.color-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  flex-shrink: 0;
  padding: 0;
}
.color-btn.active {
  border-color: var(--text);
  transform: scale(1.25);
}
.color-btn:active { transform: scale(0.9); }

/* ===== Toolbar ===== */
.toolbar {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
}

/* Brush size buttons */
.size-btn {
  border: 2.5px solid #D0C8BE;
  border-radius: 50%;
  cursor: pointer;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  padding: 0;
  box-shadow: var(--shadow);
}
.size-btn.active {
  border-color: var(--primary);
  background: linear-gradient(135deg, var(--primary), var(--secondary));
}
.size-dot {
  border-radius: 50%;
  background: var(--text);
  transition: background 0.15s;
  pointer-events: none;
}
.size-btn.active .size-dot { background: #fff; }

/* Size-specific dimensions */
.size-btn[data-size="4"]  { width: 32px; height: 32px; }
.size-btn[data-size="14"] { width: 36px; height: 36px; }
.size-btn[data-size="28"] { width: 40px; height: 40px; }
.size-dot-s { width: 5px;  height: 5px; }
.size-dot-m { width: 12px; height: 12px; }
.size-dot-l { width: 20px; height: 20px; }

/* Tool buttons */
.tool-btn {
  padding: 8px 12px;
  border: none; border-radius: 20px;
  font-family: inherit; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  box-shadow: var(--shadow);
  white-space: nowrap;
  flex-shrink: 0;
}
.tool-btn:active { transform: scale(0.93); }
.btn-eraser        { background: #FEE2E2; color: #EF4444; }
.btn-eraser.active { background: #EF4444; color: #fff; }
.btn-undo          { background: #FEF3C7; color: #D97706; }
.btn-clear         { background: #FEE2E2; color: #EF4444; }
.btn-save          { background: linear-gradient(135deg, #4ADE80, #34D399); color: #fff; }

/* ===== Save Toast ===== */
.save-toast {
  position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, #4ADE80, #34D399);
  color: #fff; font-size: 1rem; font-weight: 900;
  padding: 10px 28px; border-radius: 30px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  z-index: 1000; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; white-space: nowrap;
}
.save-toast.show { opacity: 1; }

/* ===== Gallery ===== */
.btn-gallery { background: #EEF2FF; color: #6366F1; }

.gallery-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.gallery-overlay.hidden { display: none; }

.gallery-modal {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 16px;
  width: 100%; max-width: 380px;
  max-height: 82dvh;
  overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}
.gallery-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.gallery-header h2 { font-size: 1.1rem; font-weight: 900; color: var(--text); }
.gallery-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: #FEE2E2; color: #EF4444;
  border: none; font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow);
}
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.gallery-thumb-wrap {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  aspect-ratio: 4/3;
  background: #f0f0f0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  cursor: pointer;
}
.gallery-thumb-wrap img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.gallery-thumb-del {
  position: absolute; top: 3px; right: 3px;
  width: 22px; height: 22px;
  background: rgba(239,68,68,0.85); color: #fff;
  border: none; border-radius: 50%;
  font-size: 0.65rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.gallery-empty {
  text-align: center; color: #A89585;
  font-size: 0.9rem; padding: 24px 0;
}

/* ===== Responsive ===== */
@media (max-height: 600px) {
  .header h1 { font-size: 1.1rem; }
  .header .subtitle { display: none; }
  .color-btn { width: 28px; height: 28px; }
  .tool-btn { padding: 6px 10px; font-size: 0.75rem; }
}

/* ===== 2列目ツールバー ===== */
.toolbar-special {
  display: flex; gap: 6px;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ===== 特殊ブラシボタン ===== */
.btn-stamp          { background: #FDF4FF; color: #A855F7; }
.btn-stamp.active   { background: linear-gradient(135deg, #A855F7, #C084FC); color: #fff; }
.btn-rainbow        { background: #FFF7ED; color: #F97316; }
.btn-rainbow.active { background: linear-gradient(135deg, #F97316, #FACC15, #4ADE80, #3B82F6, #A855F7); color: #fff; }
.btn-sparkle        { background: #FEFCE8; color: #CA8A04; }
.btn-sparkle.active { background: linear-gradient(135deg, #FFD700, #FF69B4); color: #fff; }

/* ===== スタンプパネル ===== */
.stamp-panel {
  background: rgba(255,255,255,0.92);
  border-radius: 16px;
  box-shadow: var(--shadow);
  padding: 8px 10px;
  flex-shrink: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  max-height: 120px; opacity: 1;
  transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease;
}
.stamp-panel.hidden {
  max-height: 0; opacity: 0;
  padding-top: 0; padding-bottom: 0;
  overflow: hidden; pointer-events: none;
}
.stamp-grid {
  display: flex; gap: 6px;
  width: max-content; padding: 2px 0;
}
.stamp-item {
  width: 50px; height: 50px; flex-shrink: 0;
  border-radius: 12px; border: 2.5px solid transparent;
  background: #FFF8E7; font-size: 1.6rem;
  cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  transition: border-color 0.15s, transform 0.15s;
}
.stamp-item.active { border-color: var(--primary); transform: scale(1.12); background: #FFF0F8; }
.stamp-item:active { transform: scale(0.9); }
.stamp-img-btn { padding: 4px; }
.stamp-img-btn img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

@media (max-height: 600px) {
  .stamp-panel { max-height: 80px; }
  .stamp-item  { width: 40px; height: 40px; font-size: 1.3rem; }
}
</style>
</head>

      <button class="stamp-item" data-type="emoji" data-value="🌸">🌸</button>
      <button class="stamp-item" data-type="emoji" data-value="🎈">🎈</button>

<script>
// ===== Color palette =====
const COLORS = [
  '#EF4444', // red
  '#F97316', // orange
  '#EAB308', // yellow
  '#22C55E', // green
  '#3B82F6', // blue
  '#8B5CF6', // violet
  '#EC4899', // pink
  '#78716C', // brown
  '#1C1917', // black
  '#FFFFFF', // white
];

const palette = document.getElementById('colorPalette');
COLORS.forEach((color, i) => {
  const btn = document.createElement('button');
  btn.className = 'color-btn' + (i === 0 ? ' active' : '');
  btn.style.background = color;
  if (color === '#FFFFFF') btn.style.outline = '2px solid #D0C8BE';
  btn.dataset.color = color;
  btn.addEventListener('click', () => selectColor(color, btn));
  palette.appendChild(btn);
});

// ===== Canvas setup =====
const canvas = document.getElementById('drawCanvas');
const wrap   = document.getElementById('canvasWrap');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const rect = wrap.getBoundingClientRect();
  const w = Math.floor(rect.width);
  const h = Math.floor(rect.height);
  if (w === 0 || h === 0) return;
  let snapshot = null;
  if (canvas.width > 0 && canvas.height > 0) {
    snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }
  canvas.width  = w;
  canvas.height = h;
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, w, h);
  if (snapshot) ctx.putImageData(snapshot, 0, 0);
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ===== State =====
let isDrawing    = false;
let lastX = 0, lastY = 0;
let currentColor = '#EF4444';
let brushSize    = 14;
let erasing      = false;
let history      = [];
const MAX_HISTORY = 30;

// Stamp
let stamping   = false;
let stampType  = 'emoji';
let stampValue = '🌟';
let stampImage = null;
const STAMP_SIZES = { 4: 60, 14: 100, 28: 150 };

// Rainbow
let rainbow = false;
let hue     = 0;

// Sparkle
let sparkle = false;
const SPARKLE_COLORS = ['#FFD700','#FF69B4','#00E5FF','#FFFFFF','#E0B0FF'];

function saveHistory() {
  const snap = ctx.getImageData(0, 0, canvas.width, canvas.height);
  history.push(snap);
  if (history.length > MAX_HISTORY) history.shift();
}

function deactivateEraser()  { erasing=false;  document.getElementById('btnEraser').classList.remove('active'); }
function deactivateStamp()   { stamping=false; document.getElementById('btnStamp').classList.remove('active'); document.getElementById('stampPanel').classList.add('hidden'); }
function deactivateRainbow() { rainbow=false;  document.getElementById('btnRainbow').classList.remove('active'); }
function deactivateSparkle() { sparkle=false;  document.getElementById('btnSparkle').classList.remove('active'); }

function selectColor(color, btnEl) {
  currentColor = color;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  deactivateEraser();
  deactivateStamp();
}

function drawStamp(x, y) {
  const size = STAMP_SIZES[brushSize] ?? 100;
  ctx.save();
  if (stampType === 'emoji') {
    ctx.font = `${size * 0.8}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(stampValue, x, y);
  } else if (stampType === 'image' && stampImage?.complete) {
    ctx.drawImage(stampImage, x - size/2, y - size/2, size, size);
  }
  ctx.restore();
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * (canvas.width  / rect.width),
    y: (src.clientY - rect.top)  * (canvas.height / rect.height),
  };
}

function startDraw(e) {
  e.preventDefault();
  const { x, y } = getPos(e);

  // Stamp mode: place stamp and return (no drag drawing)
  if (stamping) {
    saveHistory();
    drawStamp(x, y);
    return;
  }

  saveHistory();
  isDrawing = true;
  lastX = x; lastY = y;
  // Draw a dot on tap
  let dotColor;
  if (erasing) dotColor = '#FFFFFF';
  else if (rainbow) { hue = (hue + 3) % 360; dotColor = `hsl(${hue},90%,55%)`; }
  else dotColor = currentColor;
  ctx.beginPath();
  ctx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = dotColor;
  ctx.fill();
}

function moveDraw(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const { x, y } = getPos(e);

  // Determine stroke color
  let strokeColor;
  if (erasing) strokeColor = '#FFFFFF';
  else if (rainbow) { hue = (hue + 3) % 360; strokeColor = `hsl(${hue},90%,55%)`; }
  else strokeColor = currentColor;

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth   = brushSize;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.stroke();

  // Sparkle scatter
  if (sparkle && !erasing) {
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.arc(x + (Math.random() - 0.5) * 36, y + (Math.random() - 0.5) * 36,
              1.5 + Math.random() * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = rainbow
        ? `hsl(${(hue + i * 30) % 360},90%,70%)`
        : SPARKLE_COLORS[Math.floor(Math.random() * 5)];
      ctx.fill();
    }
  }

  lastX = x; lastY = y;
}

function endDraw(e) {
  e.preventDefault();
  isDrawing = false;
}

canvas.addEventListener('pointerdown',   startDraw);
canvas.addEventListener('pointermove',   moveDraw);
canvas.addEventListener('pointerup',     endDraw);
canvas.addEventListener('pointercancel', endDraw);
canvas.addEventListener('pointerleave',  endDraw);

// ===== Brush size buttons =====
document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    brushSize = parseInt(btn.dataset.size);
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ===== Eraser =====
document.getElementById('btnEraser').addEventListener('click', () => {
  erasing = !erasing;
  document.getElementById('btnEraser').classList.toggle('active', erasing);
  if (erasing) { deactivateStamp(); deactivateRainbow(); deactivateSparkle(); }
});

// ===== Stamp =====
document.getElementById('btnStamp').addEventListener('click', () => {
  stamping = !stamping;
  document.getElementById('btnStamp').classList.toggle('active', stamping);
  if (stamping) {
    deactivateEraser(); deactivateRainbow(); deactivateSparkle();
    document.getElementById('stampPanel').classList.remove('hidden');
  } else {
    document.getElementById('stampPanel').classList.add('hidden');
  }
});

document.getElementById('stampGrid').addEventListener('click', e => {
  const item = e.target.closest('.stamp-item');
  if (!item) return;
  document.querySelectorAll('.stamp-item').forEach(b => b.classList.remove('active'));
  item.classList.add('active');
  stampType  = item.dataset.type;
  stampValue = item.dataset.value || item.dataset.src;
  if (stampType === 'image') {
    const img = new Image(); img.src = item.dataset.src; stampImage = img;
  } else {
    stampImage = null;
  }
});

// ===== Rainbow =====
document.getElementById('btnRainbow').addEventListener('click', () => {
  rainbow = !rainbow;
  document.getElementById('btnRainbow').classList.toggle('active', rainbow);
  if (rainbow) { deactivateEraser(); deactivateStamp(); }
});

// ===== Sparkle =====
document.getElementById('btnSparkle').addEventListener('click', () => {
  sparkle = !sparkle;
  document.getElementById('btnSparkle').classList.toggle('active', sparkle);
  if (sparkle) { deactivateEraser(); deactivateStamp(); }
});

// ===== Undo =====
document.getElementById('btnUndo').addEventListener('click', () => {
  if (history.length === 0) return;
  const snap = history.pop();
  ctx.putImageData(snap, 0, 0);
});

// ===== Clear =====
document.getElementById('btnClear').addEventListener('click', () => {
  saveHistory();
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
});

// ===== Save & Gallery =====
const DRAWINGS_KEY = 'pono_drawings';
const MAX_DRAWINGS = 6;

function loadDrawings() {
  try { return JSON.parse(localStorage.getItem(DRAWINGS_KEY)) || []; }
  catch { return []; }
}
function saveDrawingsList(arr) {
  try { localStorage.setItem(DRAWINGS_KEY, JSON.stringify(arr)); } catch(e) {}
}

document.getElementById('btnSave').addEventListener('click', () => {
  const drawings = loadDrawings();
  const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
  drawings.unshift({ dataUrl, ts: Date.now() });
  if (drawings.length > MAX_DRAWINGS) drawings.length = MAX_DRAWINGS;
  saveDrawingsList(drawings);
  // legacy key for puzzle compatibility
  try { localStorage.setItem('pono_drawing', dataUrl); } catch(e) {}
  const toast = document.getElementById('saveToast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
});

function renderGallery() {
  const drawings = loadDrawings();
  const grid  = document.getElementById('galleryGrid');
  const empty = document.getElementById('galleryEmpty');
  grid.innerHTML = '';
  if (drawings.length === 0) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  drawings.forEach((d, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'gallery-thumb-wrap';
    const img = document.createElement('img');
    img.src = d.dataUrl;
    const del = document.createElement('button');
    del.className = 'gallery-thumb-del';
    del.textContent = '✕';
    del.addEventListener('click', e => {
      e.stopPropagation();
      const updated = loadDrawings();
      updated.splice(i, 1);
      saveDrawingsList(updated);
      renderGallery();
    });
    wrap.appendChild(img);
    wrap.appendChild(del);
    grid.appendChild(wrap);
  });
}

document.getElementById('btnGallery').addEventListener('click', () => {
  renderGallery();
  document.getElementById('galleryOverlay').classList.remove('hidden');
});
document.getElementById('btnGalleryClose').addEventListener('click', () => {
  document.getElementById('galleryOverlay').classList.add('hidden');
});
document.getElementById('galleryOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget)
    document.getElementById('galleryOverlay').classList.add('hidden');
});

// Initial white fill
resizeCanvas();

// ===== BGM =====
const bgm    = document.getElementById('bgm');
const btnBgm = document.getElementById('btn-bgm');
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';
let bgmStarted = false;
bgm.volume = 0.2;

function updateBgmBtn() { btnBgm.textContent = bgmEnabled ? '🔊' : '🔇'; }

function tryStartBgm() {
  if (!bgmEnabled || bgmStarted) return;
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
}

btnBgm.addEventListener('click', () => {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
  if (bgmEnabled) { bgmStarted = false; tryStartBgm(); } else { bgm.pause(); }
  updateBgmBtn();
});

if (bgmEnabled) {
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {
    document.addEventListener('pointerdown', tryStartBgm, { once: true });
  });
}
updateBgmBtn();
</script>
</body>
</html>
