<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ポノのあそびば</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF8F0;
      --primary: #F2915A;
      --primary-light: #FDDCBF;
      --text: #5D4E37;
      --text-light: #A89880;
      --shadow: rgba(93, 78, 55, 0.12);
      --radius: 24px;
    }

    html, body {
      min-height: 100dvh;
      font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-user-select: none;
      user-select: none;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 32px;
      gap: 28px;
    }

    /* ===== Header ===== */
    .header { text-align: center; }

    .logo-wrap {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-light), #D4EDDA);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      box-shadow: 0 6px 24px var(--shadow);
      margin: 0 auto 14px;
    }

    .site-title {
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary);
      text-shadow: 3px 3px 0 var(--primary-light);
      letter-spacing: 0.05em;
    }

    .site-subtitle {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* ===== Menu ===== */
    .menu {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 360px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      border-radius: var(--radius);
      text-decoration: none;
      color: #fff;
      box-shadow: 0 6px 24px var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card:active { transform: scale(0.97); box-shadow: 0 2px 8px var(--shadow); }

    /* Shine overlay */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      background: rgba(255,255,255,0.18);
      border-radius: var(--radius) var(--radius) 60% 60% / var(--radius) var(--radius) 30% 30%;
      pointer-events: none;
    }

    .card-puzzle  { background: linear-gradient(135deg, #F2915A, #F7C948); }
    .card-writing { background: linear-gradient(135deg, #C084FC, #60A5FA); }

    .card-icon  { font-size: 2.8rem; flex-shrink: 0; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.12)); }
    .card-body  { flex: 1; }
    .card-title { font-size: 1.4rem; font-weight: 900; letter-spacing: 0.05em; text-shadow: 1px 1px 0 rgba(0,0,0,0.12); }
    .card-desc  { font-size: 0.82rem; font-weight: 700; opacity: 0.88; margin-top: 2px; }
    .card-arrow { font-size: 1.6rem; opacity: 0.65; flex-shrink: 0; }

    /* ===== Footer ===== */
    .footer { font-size: 0.75rem; color: var(--text-light); font-weight: 700; }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <div class="logo-wrap">🐻</div>
      <h1 class="site-title">ポノのあそびば</h1>
      <p class="site-subtitle">なにして あそぶ？</p>
    </header>

    <nav class="menu">
      <a href="puzzle/index.html" class="card card-puzzle">
        <span class="card-icon">🧩</span>
        <div class="card-body">
          <div class="card-title">パズル</div>
          <div class="card-desc">えを あわせて みよう！</div>
        </div>
        <span class="card-arrow">›</span>
      </a>

      <a href="writing/index.html" class="card card-writing">
        <span class="card-icon">✏️</span>
        <div class="card-body">
          <div class="card-title">もじかき</div>
          <div class="card-desc">ひらがな・カタカナを かこう！</div>
        </div>
        <span class="card-arrow">›</span>
      </a>
    </nav>

    <footer class="footer">くまのこ ポノ のあそびば</footer>

  </div>
</body>
</html>
