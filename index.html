<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ポノのあそびば</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF8F0;
      --primary: #F2915A;
      --primary-light: #FDDCBF;
      --text: #5D4E37;
      --text-light: #A89880;
      --shadow: rgba(93, 78, 55, 0.12);
      --radius: 24px;
    }

    html, body {
      min-height: 100dvh;
      font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
      background-color: var(--bg);
      background-image: url('assets/images/BG_03.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: local;
      color: var(--text);
      -webkit-user-select: none;
      user-select: none;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 16px 28px;
      gap: 16px;
    }

    /* ===== Header ===== */
    .header {
      width: 100vw;
      text-align: center;
    }

    .header-img {
      width: 100%;
      display: block;
    }

    .site-title {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary);
      text-shadow: 3px 3px 0 var(--primary-light);
      letter-spacing: 0.05em;
      margin-top: 10px;
    }

    .site-subtitle {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-light);
      margin-top: 3px;
    }

    /* ===== Menu ===== */
    .menu {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 400px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      border-radius: var(--radius);
      text-decoration: none;
      color: #fff;
      box-shadow: 0 6px 24px var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card:active { transform: scale(0.97); box-shadow: 0 2px 8px var(--shadow); }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      background: rgba(255,255,255,0.18);
      border-radius: var(--radius) var(--radius) 60% 60% / var(--radius) var(--radius) 30% 30%;
      pointer-events: none;
    }

    .card-puzzle  { background: linear-gradient(135deg, #F2915A, #F7C948); }
    .card-writing { background: linear-gradient(135deg, #C084FC, #60A5FA); }

    .card-icon  { font-size: 2.2rem; flex-shrink: 0; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.12)); }
    .card-body  { flex: 1; }
    .card-title { font-size: 1.2rem; font-weight: 900; letter-spacing: 0.05em; text-shadow: 1px 1px 0 rgba(0,0,0,0.12); }
    .card-desc  { font-size: 0.78rem; font-weight: 700; opacity: 0.88; margin-top: 2px; }
    .card-arrow { font-size: 1.4rem; opacity: 0.65; flex-shrink: 0; }

    /* ===== Music Toggle ===== */
    .music-row {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      width: 100%;
      max-width: 400px;
    }

    .music-label {
      font-size: 1rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    .toggle {
      position: relative;
      width: 58px;
      height: 30px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #D0C8BE;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.3s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .toggle input:checked + .toggle-slider {
      background: var(--primary);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(28px);
    }

    /* ===== Video Section ===== */
    .video-section {
      width: 100%;
      max-width: 400px;
    }

    .video-label {
      font-size: 0.85rem;
      font-weight: 900;
      color: var(--primary);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .video-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 6px 24px var(--shadow);
    }

    .video-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ===== Footer ===== */
    .footer { font-size: 0.75rem; color: var(--text-light); font-weight: 700; }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <img src="assets/images/A+用ヘッダー.png" alt="ポノのあそびば" class="header-img">
      <h1 class="site-title">ポノのあそびば</h1>
      <p class="site-subtitle">なにして あそぶ？</p>
    </header>

    <section class="video-section">
      <p class="video-label">🎵 ポノのうた みてね！</p>
      <div class="video-wrap">
        <iframe
          src="https://www.youtube-nocookie.com/embed/3h2JxQ364f0?rel=0&modestbranding=1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
          loading="lazy"
          title="ポノのうた">
        </iframe>
      </div>
    </section>

    <nav class="menu">
      <a href="puzzle/index.html" class="card card-puzzle">
        <span class="card-icon">🧩</span>
        <div class="card-body">
          <div class="card-title">パズル</div>
          <div class="card-desc">えを あわせて みよう！</div>
        </div>
        <span class="card-arrow">›</span>
      </a>

      <a href="writing/index.html" class="card card-writing">
        <span class="card-icon">✏️</span>
        <div class="card-body">
          <div class="card-title">もじかき</div>
          <div class="card-desc">ひらがな・カタカナを かこう！</div>
        </div>
        <span class="card-arrow">›</span>
      </a>
    </nav>

    <div class="music-row">
      <span class="music-label">おんがく</span>
      <label class="toggle">
        <input type="checkbox" id="music-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <footer class="footer">くまのこ ポノ のあそびば</footer>

  </div>

  <script>
    const toggle = document.getElementById('music-toggle');
    const enabled = localStorage.getItem('pono_bgm_enabled') !== 'off';
    toggle.checked = enabled;

    toggle.addEventListener('change', () => {
      localStorage.setItem('pono_bgm_enabled', toggle.checked ? 'on' : 'off');
    });
  </script>
</body>
</html>
