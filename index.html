<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ポノのあそびば</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF8F0;
      --primary: #F2915A;
      --primary-light: #FDDCBF;
      --text: #5D4E37;
      --text-light: #A89880;
      --shadow: rgba(93, 78, 55, 0.12);
      --radius: 24px;
    }

    html, body {
      min-height: 100dvh;
      font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
      background-color: var(--bg);
      background-image: url('assets/images/BG_03.webp');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: local;
      color: var(--text);
      -webkit-user-select: none;
      user-select: none;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 16px 40px;
      gap: 16px;
    }

    /* ===== Header ===== */
    .header {
      width: 100%;
      max-width: 540px;
      text-align: center;
    }

    .header-img {
      width: 100%;
      display: block;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .site-title {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary);
      text-shadow: 3px 3px 0 var(--primary-light);
      letter-spacing: 0.05em;
      margin-top: 10px;
    }

    .site-subtitle {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-light);
      margin-top: 3px;
    }

    /* ===== Menu ===== */
    .menu {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 400px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 14px 8px;
      aspect-ratio: 1;
      border-radius: var(--radius);
      text-decoration: none;
      color: #fff;
      box-shadow: 0 6px 24px var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card:active { transform: scale(0.95); box-shadow: 0 2px 8px var(--shadow); }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      background: rgba(255,255,255,0.18);
      border-radius: var(--radius) var(--radius) 60% 60% / var(--radius) var(--radius) 30% 30%;
      pointer-events: none;
    }

    .card-puzzle    { background: linear-gradient(135deg, #F2915A, #F7C948); }
    .card-writing   { background: linear-gradient(135deg, #C084FC, #60A5FA); }
    .card-drawing   { background: linear-gradient(135deg, #34D399, #60A5FA); }
    .card-breakout  { background: linear-gradient(135deg, #F97316, #EF4444); }
    .card-coloring  { background: linear-gradient(135deg, #FBBF24, #FB923C); }
    .card-stacking  { background: linear-gradient(135deg, #22C55E, #16A34A); }
    .card-wordmatch { background: linear-gradient(135deg, #8B5CF6, #EC4899); }
    .card-message   { background: linear-gradient(135deg, #22D3EE, #3B82F6); }
    .card-slide     { background: linear-gradient(135deg, #4CAF50, #81C784); }

    .card-icon  { font-size: 2.4rem; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.12)); }
    .card-body  { text-align: center; }
    .card-title { font-size: 0.88rem; font-weight: 900; letter-spacing: 0.03em; text-shadow: 1px 1px 0 rgba(0,0,0,0.12); }
    .card-desc  { font-size: 0.6rem; font-weight: 700; opacity: 0.88; margin-top: 2px; line-height: 1.3; }

    /* ===== Music Toggle ===== */
    .music-row {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      width: 100%;
      max-width: 400px;
    }

    .music-label {
      font-size: 1rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    .toggle {
      position: relative;
      width: 58px;
      height: 30px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #D0C8BE;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.3s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .toggle input:checked + .toggle-slider {
      background: var(--primary);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(28px);
    }

    /* ===== Video Section ===== */
    .video-section {
      width: 100%;
      max-width: 400px;
    }

    .video-label {
      font-size: 0.85rem;
      font-weight: 900;
      color: var(--primary);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .video-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 6px 24px var(--shadow);
    }

    .video-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ===== PC Layout ===== */
    @media (min-width: 640px) {
      .video-section { max-width: 580px; }
      .menu          { max-width: 580px; }
      .music-row     { max-width: 580px; }
      .card-icon     { font-size: 3rem; }
      .card-title    { font-size: 1rem; }
      .card-desc     { font-size: 0.7rem; }
    }

    /* ===== Book Banner ===== */
    .book-banner {
      width: 100%;
      max-width: 400px;
      text-decoration: none;
      display: block;
      background: linear-gradient(160deg, #FFF8EE, #FFE8C8);
      border: 2px solid #E8A04A;
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: 0 6px 24px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.8);
      transition: transform 0.15s, box-shadow 0.15s;
      text-align: center;
    }
    .book-banner:active { transform: translateY(2px); box-shadow: 0 2px 8px var(--shadow); }

    .book-kids {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: 0.05em;
      text-shadow: 1px 1px 0 var(--primary-light);
    }

    .book-divider {
      width: 40px;
      height: 2px;
      background: var(--primary-light);
      margin: 8px auto;
      border-radius: 2px;
    }

    .book-parents {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-light);
      line-height: 1.5;
    }

    .book-cta {
      display: inline-block;
      margin-top: 12px;
      background: linear-gradient(180deg, #FFD84D, #F5A800);
      color: #5C3A00;
      font-size: 0.95rem;
      font-weight: 900;
      padding: 8px 28px;
      border-radius: 50px;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 0 #B87200, 0 6px 12px rgba(200,120,0,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .book-banner:active .book-cta {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #B87200, 0 2px 6px rgba(200,120,0,0.2);
    }

    @media (min-width: 640px) {
      .book-banner { max-width: 580px; }
      .book-kids   { font-size: 1.3rem; }
    }

    /* ===== Footer ===== */
    .footer { font-size: 0.75rem; color: var(--text-light); font-weight: 700; }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <img src="assets/images/A+用ヘッダー.jpg" alt="ポノのあそびば" class="header-img">
      <h1 class="site-title">ポノのあそびば</h1>
      <p class="site-subtitle">なにして あそぶ？</p>
    </header>

    <a href="https://www.amazon.co.jp/dp/B0FFTBS9TM" class="book-banner" target="_blank" rel="noopener" id="amazon-link">
      <div class="book-kids">📖 ポノの おはなしを おうちで よもう！</div>
      <div class="book-divider"></div>
      <div class="book-parents">『ありがとう』がもっと好きになる、魔法の絵本はこちら</div>
      <span class="book-cta">Amazonで見る →</span>
    </a>

    <div class="music-row">
      <label class="toggle">
        <input type="checkbox" id="music-toggle">
        <span class="toggle-slider"></span>
      </label>
      <span class="music-label" id="music-label">おとがでるよ</span>
    </div>

    <section class="video-section">
      <p class="video-label">🎵 ポノのうた みてね！</p>
      <div class="video-wrap">
        <iframe
          src="https://www.youtube.com/embed/p3pgMOmzMiw?rel=0&playsinline=1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
          title="ポノのうた">
        </iframe>
      </div>
    </section>

    <nav class="menu">
      <a href="puzzle/index.html" class="card card-puzzle">
        <span class="card-icon">🧩</span>
        <div class="card-body">
          <div class="card-title">パズル</div>
          <div class="card-desc">えを あわせよう</div>
        </div>
      </a>

      <a href="writing/index.html" class="card card-writing">
        <span class="card-icon">✏️</span>
        <div class="card-body">
          <div class="card-title">もじかき</div>
          <div class="card-desc">ひらがな・カタカナ</div>
        </div>
      </a>

      <a href="drawing/index.html" class="card card-drawing">
        <span class="card-icon">🎨</span>
        <div class="card-body">
          <div class="card-title">おえかき</div>
          <div class="card-desc">じゆうにかこう</div>
        </div>
      </a>

      <a href="breakout/index.html" class="card card-breakout">
        <span class="card-icon">🧱</span>
        <div class="card-body">
          <div class="card-title">ブロックくずし</div>
          <div class="card-desc">くずしてみよう</div>
        </div>
      </a>

      <a href="coloring/index.html" class="card card-coloring">
        <span class="card-icon">🖍️</span>
        <div class="card-body">
          <div class="card-title">ぬりえ</div>
          <div class="card-desc">いろをぬろう</div>
        </div>
      </a>

      <a href="stacking/index.html" class="card card-stacking">
        <span class="card-icon">🧱</span>
        <div class="card-body">
          <div class="card-title">つみき</div>
          <div class="card-desc">たかくつもう</div>
        </div>
      </a>

      <a href="wordmatch/index.html" class="card card-wordmatch">
        <span class="card-icon">🔤</span>
        <div class="card-body">
          <div class="card-title">ことばあわせ</div>
          <div class="card-desc">えとことばをあわせよう</div>
        </div>
      </a>

      <a href="slide/index.html" class="card card-slide">
        <span class="card-icon">🦊</span>
        <div class="card-body">
          <div class="card-title">みちつなぎ</div>
          <div class="card-desc">おかあさんにあいにいこう</div>
        </div>
      </a>

      <a href="message/index.html" class="card card-message">
        <span class="card-icon">📖</span>
        <div class="card-body">
          <div class="card-title">作者より</div>
          <div class="card-desc">ネモ先生のひとりごと</div>
        </div>
      </a>
    </nav>

    <footer class="footer">くまのこ ポノ のあそびば</footer>

  </div>

  <script>
    const toggle = document.getElementById('music-toggle');
    const label  = document.getElementById('music-label');
    const enabled = localStorage.getItem('pono_bgm_enabled') !== 'off';
    toggle.checked = enabled;
    label.textContent = enabled ? 'おとがでるよ' : 'おとがでないよ';

    toggle.addEventListener('change', () => {
      localStorage.setItem('pono_bgm_enabled', toggle.checked ? 'on' : 'off');
      label.textContent = toggle.checked ? 'おとがでるよ' : 'おとがでないよ';
    });
  </script>
</body>
</html>
