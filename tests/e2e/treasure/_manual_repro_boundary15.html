<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>real integration repro: total=15 boundary (TEMP, reviewer-only, not committed)</title>
</head>
<body>
<div id="stampCardSection"></div>
<script>
  // Real end-to-end reproduction of the reported Critical bug, using the REAL
  // common/treasure.js and common/stamp-rally.js (unmodified, unstubbed) served
  // from the actual repo. Only grantReward is stubbed (to log calls) and
  // PonoTier.isApp() forced true (so treasure.js doesn't skip rendering).
  window.PonoTier = { isApp: function () { return true; } };
  window.grantLog = [];
  window.grantReward = function (rw) { window.grantLog.push({ type: rw.type, id: rw.id }); };
  // Deliberately do NOT set window.ponoProfile, so stamp-rally.js's IIFE does not
  // auto-fire _initStampRally() at load. We call checkSlotReward(15) ourselves.
</script>
<script src="../../../common/treasure.js"></script>
<script src="../../../common/stamp-rally.js"></script>
<script>
  window.__runBoundary15 = function () {
    // Match real gradual progression: slot1/slot8 already granted earlier
    // (at total=1 and total=8), so slot15 is the ONLY pending slot reward
    // by the time total=15 is reached, exactly as in real gameplay.
    localStorage.setItem('pono_stamp_rewards_given', JSON.stringify(['card1_slot1', 'card1_slot8']));
    localStorage.removeItem('pono_stamp_rewards_detail');
    window.grantLog = [];
    window.PonoStampRally.checkSlotReward(15);
  };
</script>
</body>
</html>
