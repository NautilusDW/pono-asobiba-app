<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ポノの もじもじクレーン | ポノのあそびば</title>
<meta name="description" content="クレーンでかなブロックをあつめて、ことばをつくる横画面スマホ向け知育ゲーム。">
<link rel="stylesheet" href="styles.css?v=20260702-1055">
<script src="data/words.js?v=20260702-1055" defer></script>
<script src="js/game.js?v=20260702-1055" defer></script>
</head>
<body>
<div id="app">
  <div id="rotateNote" aria-live="polite">
    <div class="rotate-card">
      <div class="rotate-icon">📱</div>
      <div class="rotate-title">よこにしてね</div>
      <div class="rotate-text">クレーンで あそぶよ</div>
      <a class="rotate-home" href="../play.html">もどる</a>
    </div>
  </div>

  <main id="gameShell" aria-label="もじもじクレーン">
    <canvas id="gameCanvas" width="960" height="540" aria-hidden="true"></canvas>

    <div id="topControls">
      <button id="homeBtn" class="icon-btn" type="button" aria-label="もどる">🏠</button>
      <button id="soundBtn" class="icon-btn" type="button" aria-label="おと">🔊</button>
      <button id="hintBtn" class="pill-btn" type="button">ヒント</button>
    </div>

    <button id="dropBtn" type="button" aria-label="おろす">
      <span>おろす</span>
      <b>▼</b>
    </button>

    <div id="titleOverlay" class="overlay">
      <section class="panel title-panel" aria-labelledby="gameTitle">
        <div class="mark">🏗️</div>
        <h1 id="gameTitle">もじもじクレーン</h1>
        <p>えを みて かなブロックを あつめよう</p>
        <div id="levelButtons" class="level-grid">
          <button class="level-btn easy" type="button" data-level="easy">
            <span>やさしい</span>
            <small>2もじ</small>
          </button>
          <button class="level-btn normal" type="button" data-level="normal">
            <span>ふつう</span>
            <small>3もじ</small>
          </button>
          <button class="level-btn challenge" type="button" data-level="challenge">
            <span>チャレンジ</span>
            <small>4もじ</small>
          </button>
        </div>
      </section>
    </div>

    <div id="confirmOverlay" class="overlay hidden">
      <section class="panel confirm-panel">
        <h2>やめる？</h2>
        <p>いまの ことばは そのまま しまうよ</p>
        <div class="panel-actions">
          <button id="continueBtn" class="soft-btn" type="button">つづける</button>
          <a id="quitBtn" class="soft-btn muted" href="../play.html">もどる</a>
        </div>
      </section>
    </div>

    <div id="resultOverlay" class="overlay hidden">
      <section class="panel result-panel" aria-labelledby="resultTitle">
        <h2 id="resultTitle">できたね</h2>
        <div id="resultStars" class="stars">★★★</div>
        <div id="wordCards" class="word-cards"></div>
        <div class="panel-actions">
          <button id="againBtn" class="soft-btn" type="button">もういちど</button>
          <button id="levelsBtn" class="soft-btn muted" type="button">えらぶ</button>
        </div>
      </section>
    </div>

    <div id="liveRegion" class="sr-only" aria-live="polite"></div>
  </main>
</div>
</body>
</html>
