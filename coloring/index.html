<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ぬりえ | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8E7;
  --primary: #FBBF24;
  --secondary: #FB923C;
  --text: #5B4A3F;
  --shadow: 0 4px 20px rgba(91,74,63,0.1);
  --radius: 20px;
}

html, body {
  min-height: 100dvh;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: var(--text);
  -webkit-user-select: none;
  user-select: none;
}

/* 選択画面はスクロール可能に */
#selection-screen {
  touch-action: auto;
  overflow-y: auto;
  height: 100dvh;
}

/* 塗り絵画面はスクロール禁止（描画のため）*/
#coloring-screen {
  touch-action: none;
}

/* ===== Selection Screen ===== */
#selection-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 16px 40px;
  gap: 16px;
  max-width: 500px;
  margin: 0 auto;
}

.header {
  text-align: center;
  padding: 6px 0;
  position: relative;
  width: 100%;
}
.back-link {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  color: var(--secondary); font-weight: 700; font-size: 0.85rem;
  text-decoration: none; padding: 6px 2px;
}
.header h1 {
  font-size: 1.5rem; font-weight: 900;
  background: linear-gradient(135deg, #FBBF24, #FB923C);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .subtitle { font-size: 0.8rem; color: #A89585; margin-top: 3px; }

.nurie-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
  width: 100%;
}

.nurie-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 3px solid #FDE68A;
}

.nurie-card img {
  width: 100%;
  display: block;
  border-bottom: 2px solid #FDE68A;
}

.nurie-label {
  text-align: center;
  font-size: 0.88rem;
  font-weight: 900;
  color: var(--text);
  padding: 10px 0 4px;
}

.nurie-actions {
  display: flex;
  gap: 10px;
  padding: 10px 16px 16px;
  justify-content: center;
}

.btn-color, .btn-dl, .btn-print {
  flex: 1;
  max-width: 140px;
  padding: 11px 6px;
  border-radius: 50px;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 900;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: transform 0.15s;
  box-shadow: 0 3px 10px rgba(91,74,63,0.12);
  border: none;
}
.btn-color:active, .btn-dl:active, .btn-print:active { transform: scale(0.93); }

.btn-color {
  background: linear-gradient(135deg, #FB923C, #EF4444);
  color: #fff;
}
.btn-dl {
  background: linear-gradient(135deg, #34D399, #059669);
  color: #fff;
}
.btn-print {
  background: linear-gradient(135deg, #60A5FA, #3B82F6);
  color: #fff;
}

/* ===== Coloring Screen ===== */
#coloring-screen {
  display: none;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

.coloring-header {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  background: rgba(255,248,231,0.95);
  backdrop-filter: blur(4px);
  border-bottom: 2px solid #FDE68A;
  gap: 8px;
  flex-shrink: 0;
}

.btn-back {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--secondary);
  cursor: pointer;
  padding: 4px 6px;
  white-space: nowrap;
}

.coloring-title {
  font-size: 1rem;
  font-weight: 900;
  background: linear-gradient(135deg, #FBBF24, #FB923C);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  flex: 1;
  text-align: center;
}

.btn-save, .btn-print-colored {
  background: none;
  border: 2px solid currentColor;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 20px;
}
.btn-save { color: #059669; }
.btn-print-colored { color: #3B82F6; }

/* Canvas area */
.canvas-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #f0f0f0;
  cursor: crosshair;
}

#color-canvas {
  position: absolute;
  top: 0; left: 0;
  background: #fff;
}

#nurie-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  mix-blend-mode: multiply;
  pointer-events: none;
  display: block;
}

/* Toolbar */
.toolbar {
  background: rgba(255,248,231,0.97);
  border-top: 2px solid #FDE68A;
  padding: 8px 10px 10px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Color palette */
.palette {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.swatch {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.1s;
  flex-shrink: 0;
}
.swatch:active { transform: scale(0.88); }
.swatch.selected {
  border-color: #5B4A3F;
  transform: scale(1.18);
}

/* Tool row */
.tool-row {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}

/* Brush size buttons */
.size-btn {
  border: 2.5px solid #D0C8BE;
  border-radius: 50%;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
.size-btn.active {
  border-color: var(--primary);
  background: linear-gradient(135deg, var(--primary), var(--secondary));
}
.size-dot {
  border-radius: 50%;
  background: var(--text);
  pointer-events: none;
}
.size-btn.active .size-dot { background: #fff; }
.size-btn[data-size="4"]  { width: 32px; height: 32px; }
.size-btn[data-size="14"] { width: 36px; height: 36px; }
.size-btn[data-size="28"] { width: 40px; height: 40px; }
.size-btn[data-size="50"] { width: 46px; height: 46px; }
.size-btn[data-size="80"] { width: 52px; height: 52px; }
.size-dot-s  { width: 5px;  height: 5px; }
.size-dot-m  { width: 12px; height: 12px; }
.size-dot-l  { width: 20px; height: 20px; }
.size-dot-xl { width: 28px; height: 28px; }
.size-dot-xxl{ width: 36px; height: 36px; }

.rainbow-swatch {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2.5px solid #D0C8BE;
  background: conic-gradient(red, orange, yellow, green, cyan, blue, violet, red);
  cursor: pointer;
  flex-shrink: 0;
  font-size: 18px;
  box-shadow: var(--shadow);
  transition: all 0.15s;
}
.rainbow-swatch.selected {
  border-color: #FF4444;
  box-shadow: 0 0 0 3px rgba(255,68,68,0.4);
  transform: scale(1.15);
}

/* ブラシカーソル */
#brush-cursor {
  position: fixed;
  border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.55);
  pointer-events: none;
  transform: translate(-50%, -50%);
  display: none;
  z-index: 9999;
}

.bucket-btn {
  padding: 6px 12px;
  border-radius: 20px;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  border: 2px solid #8855FF;
  color: #8855FF;
  background: #fff;
  transition: transform 0.1s;
}
.bucket-btn:active { transform: scale(0.92); }
.bucket-btn.selected {
  background: #EDE9FF;
  border-color: #6633CC;
  color: #6633CC;
}

.tool-divider {
  width: 2px;
  height: 28px;
  background: #E5D9C8;
  border-radius: 2px;
  flex-shrink: 0;
}

.eraser-btn, .undo-btn, .clear-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  border: 2px solid;
  transition: transform 0.1s;
  background: #fff;
}
.eraser-btn:active, .undo-btn:active, .clear-btn:active { transform: scale(0.92); }
.eraser-btn {
  border-color: #A89585;
  color: #5B4A3F;
}
.eraser-btn.selected {
  background: #F0E6D8;
  border-color: #8B6A55;
}
.undo-btn {
  border-color: #A89585;
  color: #5B4A3F;
}
.clear-btn {
  border-color: #EF4444;
  color: #EF4444;
}

.threshold-row {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
  padding: 2px 0;
}
.threshold-label { font-size: 0.78rem; color: #8B6A55; font-weight: 700; white-space: nowrap; }
.threshold-val { font-size: 0.78rem; color: #8B6A55; font-weight: 700; width: 28px; text-align: right; }
#threshold-slider { flex: 1; max-width: 160px; accent-color: #8855FF; }
</style>
</head>
<body>

<!-- ===== Selection Screen ===== -->
<div id="selection-screen">
  <div class="header">
    <a href="../index.html" class="back-link">← メニュー</a>
    <h1>ぬりえ</h1>

        <a href="../assets/images/nurie003.webp" download="ぬりえ3.webp" class="btn-dl">⬇ ダウンロード</a>

<div id="coloring-screen">
  <div class="coloring-header">

  </div>

  <div class="toolbar">
    <div class="palette" id="palette">
      <button class="rainbow-swatch" id="rainbow-btn" onclick="toggleRainbow()">🌈</button>
    </div>
    <div class="tool-row">
      <button class="size-btn active" data-size="4"><span class="size-dot size-dot-s"></span></button>
      <button class="size-btn" data-size="14"><span class="size-dot size-dot-m"></span></button>
      <button class="size-btn" data-size="28"><span class="size-dot size-dot-l"></span></button>
      <button class="size-btn" data-size="50"><span class="size-dot size-dot-xl"></span></button>

      <span class="threshold-val" id="threshold-val">180</span>

</div>

<script>
// ===== Color palette =====
const COLORS = [
  '#FF4444', '#FF8800', '#FFCC00', '#88DD00',
  '#00CC66', '#00BBDD', '#3388FF', '#8855FF',
  '#FF55AA', '#AA6633', '#FFFFFF', '#222222',
];

let currentColor = COLORS[0];
let brushSize = 4;
let isEraser = false;
let isBucket = false;
let isRainbow = false;
let rainbowHue = 0;

function buildPalette() {
  const palette = document.getElementById('palette');
  COLORS.forEach((col, i) => {
    const sw = document.createElement('button');
    sw.className = 'swatch' + (i === 0 ? ' selected' : '');
    sw.style.background = col;
    if (col === '#FFFFFF') sw.style.boxShadow = 'inset 0 0 0 1px #ccc';
    sw.onclick = () => selectColor(col, sw);
    palette.appendChild(sw);
  });
}

function selectColor(col, sw) {
  currentColor = col;
  isEraser = false;
  isRainbow = false;
  document.getElementById('eraser-btn').classList.remove('selected');
  document.getElementById('rainbow-btn').classList.remove('selected');
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  sw.classList.add('selected');
}

function toggleRainbow() {
  isRainbow = !isRainbow;
  isEraser = false;
  document.getElementById('rainbow-btn').classList.toggle('selected', isRainbow);
  document.getElementById('eraser-btn').classList.remove('selected');
  document.getElementById('bucket-btn').classList.remove('selected');
  if (!isRainbow) {
    const idx = COLORS.indexOf(currentColor);
    if (idx >= 0) document.querySelectorAll('.swatch')[idx].classList.add('selected');
  } else {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  }
}

// Size buttons (set up after DOM ready)
function initSizeBtns() {
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      brushSize = parseInt(btn.dataset.size);
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

function toggleEraser() {
  isEraser = !isEraser;
  isBucket = false;
  isRainbow = false;
  document.getElementById('eraser-btn').classList.toggle('selected', isEraser);
  document.getElementById('bucket-btn').classList.remove('selected');
  document.getElementById('rainbow-btn').classList.remove('selected');
  if (!isEraser) {
    const swatches = document.querySelectorAll('.swatch');
    const idx = COLORS.indexOf(currentColor);
    if (idx >= 0) swatches[idx].classList.add('selected');
  }
}

function toggleMask() {
  isBucket = !isBucket;
  isEraser = false;
  if (!isBucket) activeMask = null;
  document.getElementById('bucket-btn').classList.toggle('selected', isBucket);
  document.getElementById('eraser-btn').classList.remove('selected');
  document.getElementById('threshold-row').style.display = isBucket ? 'flex' : 'none';
}

function onThresholdChange(val) {
  lineThreshold = parseInt(val);
  document.getElementById('threshold-val').textContent = val;
}

// ===== Line mask (はみ出し防止) =====
let nuriePixelData = null;  // ぬりえ原寸ピクセルキャッシュ
let nurieNW = 0, nurieNH = 0; // ぬりえ画像の自然サイズ
let currentNurieSrc = '';
let lineThreshold = 180;

function loadNurieImg(src) {
  currentNurieSrc = src;
  nuriePixelData = null;
  const loader = new Image();
  loader.crossOrigin = 'anonymous';
  loader.onload = () => {
    if (src !== currentNurieSrc) return;
    nurieNW = loader.naturalWidth;
    nurieNH = loader.naturalHeight;
    const tmp = document.createElement('canvas');
    tmp.width = nurieNW; tmp.height = nurieNH;
    const tc = tmp.getContext('2d');
    try {
      tc.drawImage(loader, 0, 0);
      nuriePixelData = tc.getImageData(0, 0, nurieNW, nurieNH).data;
    } catch(e) { nuriePixelData = null; }
  };
  loader.onerror = () => { nuriePixelData = null; };
  loader.src = src;
}

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}


// ===== はみ出し防止（領域マスク方式）=====
// キャンバスピクセル → ぬりえネイティブ画像ピクセル の変換係数
function getNurieMapping() {
  const nw = nurieNW, nh = nurieNH;
  const canvasRect = canvas.getBoundingClientRect();
  const overlayRect = document.getElementById('nurie-overlay').getBoundingClientRect();
  const imgRatio = nw / nh;
  const elRatio = overlayRect.width / overlayRect.height;
  let imgW, imgH, imgLeft, imgTop;
  if (imgRatio > elRatio) {
    imgW = overlayRect.width; imgH = overlayRect.width / imgRatio;
    imgLeft = overlayRect.left; imgTop = overlayRect.top + (overlayRect.height - imgH) / 2;
  } else {
    imgH = overlayRect.height; imgW = overlayRect.height * imgRatio;
    imgLeft = overlayRect.left + (overlayRect.width - imgW) / 2; imgTop = overlayRect.top;
  }
  const cssPerPxX = canvasRect.width / canvas.width;
  const cssPerPxY = canvasRect.height / canvas.height;
  return {
    ax: cssPerPxX * nw / imgW, bx: (canvasRect.left - imgLeft) * nw / imgW,
    ay: cssPerPxY * nh / imgH, by: (canvasRect.top - imgTop) * nh / imgH,
    nw, nh
  };
}

// タッチ開始点からフラッドフィルで閉じた領域を activeMask として確定
let activeMask = null;

function createRegionMask(startX, startY) {
  activeMask = null;
  if (!nuriePixelData) return;
  const { ax, bx, ay, by, nw, nh } = getNurieMapping();
  const w = canvas.width, h = canvas.height;
  const sx = Math.round(startX), sy = Math.round(startY);
  if (sx < 0 || sx >= w || sy < 0 || sy >= h) return;

  // 開始点がライン上なら領域なし
  const snx = Math.round(ax * sx + bx), sny = Math.round(ay * sy + by);
  if (snx >= 0 && snx < nw && sny >= 0 && sny < nh) {
    const si = (sny * nw + snx) * 4;
    if ((nuriePixelData[si] + nuriePixelData[si+1] + nuriePixelData[si+2]) / 3 < lineThreshold) return;
  }

  const mask = new Uint8Array(w * h);
  const visited = new Uint8Array(w * h);
  const stack = [sy * w + sx];
  visited[sy * w + sx] = 1;

  while (stack.length) {
    const idx = stack.pop();
    const x = idx % w, y = (idx / w) | 0;
    const nx = Math.round(ax * x + bx), ny = Math.round(ay * y + by);
    if (nx >= 0 && nx < nw && ny >= 0 && ny < nh) {
      const ni = (ny * nw + nx) * 4;
      if ((nuriePixelData[ni] + nuriePixelData[ni+1] + nuriePixelData[ni+2]) / 3 < lineThreshold) continue;
    }
    mask[idx] = 1;
    if (x > 0   && !visited[idx-1]) { visited[idx-1] = 1; stack.push(idx-1); }
    if (x < w-1 && !visited[idx+1]) { visited[idx+1] = 1; stack.push(idx+1); }
    if (y > 0   && !visited[idx-w]) { visited[idx-w] = 1; stack.push(idx-w); }
    if (y < h-1 && !visited[idx+w]) { visited[idx+w] = 1; stack.push(idx+w); }
  }
  activeMask = mask;
}

// マスク外をストローク開始前の状態に戻す（白ではなく保存済みデータで復元）
let strokeSavedData = null;

function applyRegionMask(x0, y0, x1, y1) {
  if (!activeMask || !strokeSavedData) return;
  const w = canvas.width, h = canvas.height;
  const cx0 = Math.max(0, Math.round(x0)), cy0 = Math.max(0, Math.round(y0));
  const cx1 = Math.min(w-1, Math.round(x1)), cy1 = Math.min(h-1, Math.round(y1));
  const rw = cx1 - cx0 + 1, rh = cy1 - cy0 + 1;
  if (rw <= 0 || rh <= 0) return;
  const imgData = ctx.getImageData(cx0, cy0, rw, rh);
  const px = imgData.data;
  const saved = strokeSavedData.data;
  let changed = false;
  for (let ry = 0; ry < rh; ry++) {
    for (let rx = 0; rx < rw; rx++) {
      if (!activeMask[(cy0 + ry) * w + (cx0 + rx)]) {
        const pi = (ry * rw + rx) * 4;
        const si = ((cy0 + ry) * w + (cx0 + rx)) * 4;
        if (px[pi] !== saved[si] || px[pi+1] !== saved[si+1] || px[pi+2] !== saved[si+2]) {
          px[pi] = saved[si]; px[pi+1] = saved[si+1]; px[pi+2] = saved[si+2]; px[pi+3] = saved[si+3];
          changed = true;
        }
      }
    }
  }
  if (changed) ctx.putImageData(imgData, cx0, cy0);
}

// ===== Undo =====
const MAX_HISTORY = 12;
let history = [];

function saveHistory() {
  history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  if (history.length > MAX_HISTORY) history.shift();
}

function undo() {
  if (!history.length) return;
  ctx.putImageData(history.pop(), 0, 0);
}

// ===== Canvas drawing =====
const canvas = document.getElementById('color-canvas');
const ctx = canvas.getContext('2d');

let drawing = false;
let lastX = 0, lastY = 0;
// ストローク全体のダーティ矩形（endDrawでのクリーンアップ範囲）
let strokeX0 = 0, strokeY0 = 0, strokeX1 = 0, strokeY1 = 0;

function getPos(e, rect) {
  if (e.touches) {
    const t = e.touches[0];
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const pos = getPos(e, rect);
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = pos.x * scaleX, y = pos.y * scaleY;

  const snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  history.push(snapshot);
  if (history.length > MAX_HISTORY) history.shift();
  // はみ出し防止ONなら開始点で領域を確定し、ストローク前状態を保存
  if (isBucket && !isEraser) {
    strokeSavedData = snapshot;
    createRegionMask(x, y);
  }
  drawing = true;
  lastX = x; lastY = y;
  strokeX0 = x - brushSize; strokeY0 = y - brushSize;
  strokeX1 = x + brushSize; strokeY1 = y + brushSize;
  const dotColor = isEraser ? '#FFFFFF' : (isRainbow ? `hsl(${rainbowHue},90%,55%)` : currentColor);
  if (isRainbow) rainbowHue = (rainbowHue + 3) % 360;
  ctx.beginPath();
  ctx.arc(lastX, lastY, brushSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = dotColor;
  ctx.fill();
  if (isBucket && !isEraser) applyRegionMask(strokeX0, strokeY0, strokeX1, strokeY1);
}

function doDraw(e) {
  e.preventDefault();
  if (!drawing) return;
  const rect = canvas.getBoundingClientRect();
  const pos = getPos(e, rect);
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = pos.x * scaleX;
  const y = pos.y * scaleY;

  const strokeColor = isEraser ? '#FFFFFF' : (isRainbow ? `hsl(${rainbowHue},90%,55%)` : currentColor);
  if (isRainbow) rainbowHue = (rainbowHue + 3) % 360;
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  if (isBucket && !isEraser) {
    const x0 = Math.min(lastX, x) - brushSize;
    const y0 = Math.min(lastY, y) - brushSize;
    const x1 = Math.max(lastX, x) + brushSize;
    const y1 = Math.max(lastY, y) + brushSize;
    applyRegionMask(x0, y0, x1, y1);
    // ストローク全体のダーティ矩形を拡張
    strokeX0 = Math.min(strokeX0, x0); strokeY0 = Math.min(strokeY0, y0);
    strokeX1 = Math.max(strokeX1, x1); strokeY1 = Math.max(strokeY1, y1);
  }

  lastX = x;
  lastY = y;
}

function endDraw(e) {
  e.preventDefault();
  // 今回のストロークの範囲だけクリーンアップ（全画面はしない → 前に塗った領域を消さない）
  if (drawing && isBucket && !isEraser) applyRegionMask(strokeX0, strokeY0, strokeX1, strokeY1);
  drawing = false;
}

// ===== ブラシカーソル =====
const brushCursor = document.getElementById('brush-cursor');

function updateBrushCursor(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const cssBrush = brushSize * (rect.width / canvas.width);
  brushCursor.style.width  = cssBrush + 'px';
  brushCursor.style.height = cssBrush + 'px';
  brushCursor.style.left   = clientX + 'px';
  brushCursor.style.top    = clientY + 'px';
}

canvas.addEventListener('mouseenter', () => {
  canvas.style.cursor = 'none';
  brushCursor.style.display = 'block';
});
canvas.addEventListener('mouseleave', () => {
  canvas.style.cursor = '';
  brushCursor.style.display = 'none';
});
canvas.addEventListener('mousemove', (e) => { updateBrushCursor(e.clientX, e.clientY); });

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', doDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', doDraw, { passive: false });
canvas.addEventListener('touchend', endDraw, { passive: false });

function clearCanvas() {
  if (!confirm('ぜんぶけしますか？')) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function resizeCanvas(wrapper) {
  const w = wrapper.clientWidth;
  const h = wrapper.clientHeight;

  const img = document.getElementById('nurie-overlay');
  const imgRatio = img.naturalWidth / img.naturalHeight;
  const wrapRatio = w / h;

  let cw, ch;
  if (imgRatio > wrapRatio) {
    cw = w; ch = w / imgRatio;
  } else {
    ch = h; cw = h * imgRatio;
  }

  canvas.width = Math.round(cw);
  canvas.height = Math.round(ch);
  canvas.style.left = Math.round((w - cw) / 2) + 'px';
  canvas.style.top = Math.round((h - ch) / 2) + 'px';
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';

  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ===== Navigation =====
let currentNurieName = '';

function startColoring(src, name) {
  currentNurieName = name;
  document.getElementById('coloring-title').textContent = name;

  const selScreen = document.getElementById('selection-screen');
  const colScreen = document.getElementById('coloring-screen');
  selScreen.style.display = 'none';
  colScreen.style.display = 'flex';

  currentNurieSrc = src;
  loadNurieImg(src);
  const img = document.getElementById('nurie-overlay');
  img.onload = () => { resizeCanvas(document.getElementById('canvas-wrapper')); };
  if (img.getAttribute('src') === src) {
    resizeCanvas(document.getElementById('canvas-wrapper'));
  } else {
    img.src = src;
  }
}

function backToSelection() {
  activeMask = null;
  document.getElementById('selection-screen').style.display = 'flex';
  document.getElementById('coloring-screen').style.display = 'none';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ===== Save =====
function saveColored() {
  const offscreen = document.createElement('canvas');
  offscreen.width = canvas.width;
  offscreen.height = canvas.height;
  const octx = offscreen.getContext('2d');

  octx.drawImage(canvas, 0, 0);

  const overlay = document.getElementById('nurie-overlay');
  octx.globalCompositeOperation = 'multiply';
  octx.drawImage(overlay, 0, 0, offscreen.width, offscreen.height);
  octx.globalCompositeOperation = 'source-over';

  const link = document.createElement('a');
  link.download = currentNurieName + '_いろぬり.png';
  link.href = offscreen.toDataURL('image/png');
  link.click();
}

// ===== Print colored =====
function printColored() {
  const offscreen = document.createElement('canvas');
  offscreen.width = canvas.width;
  offscreen.height = canvas.height;
  const octx = offscreen.getContext('2d');

  octx.drawImage(canvas, 0, 0);

  const overlay = document.getElementById('nurie-overlay');
  octx.globalCompositeOperation = 'multiply';
  octx.drawImage(overlay, 0, 0, offscreen.width, offscreen.height);
  octx.globalCompositeOperation = 'source-over';

  const dataURL = offscreen.toDataURL('image/png');
  const win = window.open('', '_blank');
  if (!win) return;
  win.document.write(
    '<!DOCTYPE html><html><head><style>' +
    'body{margin:0;padding:0}img{width:100%;display:block}' +
    '@media print{body{margin:0}}' +
    '</style></head><body>' +
    '<img src="' + dataURL + '" onload="window.print()">' +
    '</body></html>'
  );
  win.document.close();
}

// ===== Print original =====
function printNurie(src) {
  const win = window.open('', '_blank');
  if (!win) return;
  win.document.write(
    '<!DOCTYPE html><html><head><style>' +
    'body{margin:0;padding:0}img{width:100%;display:block}' +
    '</style></head><body>' +
    '<img src="' + src + '" onload="window.print()">' +
    '</body></html>'
  );
  win.document.close();
}

// ===== Init =====
buildPalette();
initSizeBtns();

window.addEventListener('resize', () => {
  if (document.getElementById('coloring-screen').style.display !== 'none') {
    resizeCanvas(document.getElementById('canvas-wrapper'));
  }
});
</script>
