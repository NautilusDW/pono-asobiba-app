<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ぬりえ | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="../common/points.js"></script>
<script src="../common/achievements.js"></script>
<script src="../common/menu.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8E7;
  --primary: #FBBF24;
  --secondary: #FB923C;
  --text: #5B4A3F;
  --shadow: 0 4px 20px rgba(91,74,63,0.1);
  --radius: 20px;
}

html, body {
  min-height: 100dvh;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: var(--text);
  -webkit-user-select: none;
  user-select: none;
}

/* 選択画面はスクロール可能に */
#selection-screen {
  touch-action: auto;
  overflow-y: auto;
  height: 100dvh;
}

/* 塗り絵画面はスクロール禁止（描画のため）*/
#coloring-screen {
  touch-action: none;
}

/* ===== Selection Screen ===== */
#selection-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 16px 40px;
  gap: 16px;
  max-width: 500px;
  margin: 0 auto;
}

.header {
  text-align: center;
  padding: 6px 0;
  position: relative;
  width: 100%;
}
.header h1 {
  font-size: 1.5rem; font-weight: 900;
  background: linear-gradient(135deg, #FBBF24, #FB923C);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .subtitle { font-size: 0.8rem; color: #A89585; margin-top: 3px; }

.nurie-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
  width: 100%;
}

.nurie-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 3px solid #FDE68A;
}

.nurie-card img {
  width: 100%;
  display: block;
  border-bottom: 2px solid #FDE68A;
}

.nurie-label {
  text-align: center;
  font-size: 0.88rem;
  font-weight: 900;
  color: var(--text);
  padding: 10px 0 4px;
}

.nurie-actions {
  display: flex;
  gap: 10px;
  padding: 10px 16px 16px;
  justify-content: center;
}

.btn-color, .btn-dl, .btn-print {
  flex: 1;
  max-width: 140px;
  padding: 11px 6px;
  border-radius: 50px;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 900;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: transform 0.15s;
  box-shadow: 0 3px 10px rgba(91,74,63,0.12);
  border: none;
}
.btn-color:active, .btn-dl:active, .btn-print:active { transform: scale(0.93); }

.btn-color {
  background: linear-gradient(135deg, #FB923C, #EF4444);
  color: #fff;
}
.btn-dl {
  background: linear-gradient(135deg, #34D399, #059669);
  color: #fff;
}
.btn-print {
  background: linear-gradient(135deg, #60A5FA, #3B82F6);
  color: #fff;
}

/* ===== Coloring Screen ===== */
#coloring-screen {
  display: none;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  position: relative;
}

.coloring-header {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  background: rgba(255,248,231,0.95);
  backdrop-filter: blur(4px);
  border-bottom: 2px solid #FDE68A;
  gap: 8px;
  flex-shrink: 0;
}

.btn-back {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--secondary);
  cursor: pointer;
  padding: 4px 6px;
  white-space: nowrap;
}

.coloring-title {
  font-size: 1rem;
  font-weight: 900;
  background: linear-gradient(135deg, #FBBF24, #FB923C);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  flex: 1;
  text-align: center;
}

.btn-save, .btn-print-colored {
  background: none;
  border: 2px solid currentColor;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 20px;
}
.btn-save { color: #059669; }
.btn-print-colored { color: #3B82F6; }

/* Canvas area */
.canvas-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #f0f0f0;
  cursor: crosshair;
  touch-action: none;
}

#canvas-transform {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  transform-origin: 0 0;
  will-change: transform;
}

#color-canvas {
  position: absolute;
  top: 0; left: 0;
  background: #fff;
}

#nurie-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  mix-blend-mode: multiply;
  pointer-events: none;
  display: block;
}

/* Pan mode cursor */
.canvas-wrapper.pan-mode {
  cursor: grab;
}
.canvas-wrapper.pan-mode.panning {
  cursor: grabbing;
}

/* Zoom reset button (floating) */
#zoom-reset-btn {
  position: absolute;
  bottom: 8px;
  right: 8px;
  z-index: 50;
  background: rgba(255,248,231,0.92);
  border: 2px solid #FDE68A;
  border-radius: 20px;
  font-family: inherit;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text);
  padding: 4px 10px;
  cursor: pointer;
  display: none;
  box-shadow: var(--shadow);
}

/* Floating canvas buttons */
.canvas-float-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2.5px solid rgba(139,106,85,0.5);
  background: rgba(255,248,231,0.92);
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transition: transform 0.1s;
  padding: 0;
  z-index: 50;
}
.canvas-float-btn:active { transform: scale(0.88); }

.camera-float {
  position: absolute;
  bottom: 14px;
  left: 14px;
}
.camera-float.zoomed {
  background: #E8F4FD;
  border-color: #3388FF;
}

.canvas-float-group.top-left {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  flex-direction: row;
  gap: 8px;
  z-index: 50;
}

.float-icon {
  width: 28px;
  height: 28px;
  object-fit: contain;
  pointer-events: none;
}

.zoom-label {
  font-size: 1.1rem;
  font-weight: 800;
  color: #3388FF;
}

.canvas-float-btn.eraser-selected {
  background: #F0E6D8;
  border-color: #8B6A55;
}
.canvas-float-btn.clear-float {
  border-color: rgba(239,68,68,0.6);
}

/* Toolbar */
.toolbar {
  background: rgba(255,248,231,0.97);
  border-top: 2px solid #FDE68A;
  padding: 8px 10px 10px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Color palette */
.palette {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.1s;
  flex-shrink: 0;
}
.swatch:active { transform: scale(0.88); }
.swatch.selected {
  border-color: #5B4A3F;
  transform: scale(1.18);
}

/* Tool row */
.tool-row {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: flex-start;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tool-row::-webkit-scrollbar { display: none; }

/* Brush size buttons (角丸四角 + 太さ違いの横線) */
.size-btn {
  border: 2.5px solid #D0C8BE;
  border-radius: 10px;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow);
  flex-shrink: 0;
  padding: 0;
  width: 36px; height: 32px;
}
.size-btn.active {
  border-color: var(--primary);
  background: #FFF0F5;
}
.size-line {
  border-radius: 3px;
  background: var(--text);
  transition: background 0.15s;
  pointer-events: none;
  width: 20px;
}
.size-btn.active .size-line { background: var(--primary); }
.size-line-s  { height: 2px; }
.size-line-m  { height: 5px; }
.size-line-l  { height: 9px; }
.size-line-xl { height: 14px; }

.rainbow-swatch {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 2.5px solid #D0C8BE;
  background: conic-gradient(red, orange, yellow, green, cyan, blue, violet, red);
  cursor: pointer;
  flex-shrink: 0;
  font-size: 18px;
  box-shadow: var(--shadow);
  transition: all 0.15s;
}
.rainbow-swatch.selected {
  border-color: #FF4444;
  box-shadow: 0 0 0 3px rgba(255,68,68,0.4);
  transform: scale(1.15);
}

/* ブラシカーソル */
#brush-cursor {
  position: fixed;
  border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.55);
  pointer-events: none;
  transform: translate(-50%, -50%);
  display: none;
  z-index: 9999;
}

.bucket-btn {
  padding: 5px 10px;
  border-radius: 20px;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  border: 2px solid #8855FF;
  color: #8855FF;
  background: #fff;
  transition: transform 0.1s;
  white-space: nowrap;
  flex-shrink: 0;
}
.bucket-btn:active { transform: scale(0.92); }
.bucket-btn.selected {
  background: #EDE9FF;
  border-color: #6633CC;
  color: #6633CC;
}

.tool-divider {
  width: 2px;
  height: 28px;
  background: #E5D9C8;
  border-radius: 2px;
  flex-shrink: 0;
}


/* Save slot button */
.btn-slots {
  background: none;
  border: 2px solid #059669;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 20px;
  color: #059669;
  white-space: nowrap;
}

/* Save panel overlay */
.save-panel {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.save-panel-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
}
.save-panel-content {
  position: relative;
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  padding: 14px 14px 24px;
  width: 100%;
  max-width: 540px;
  z-index: 1;
  box-shadow: 0 -4px 24px rgba(91,74,63,0.15);
}
.save-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.save-panel-title {
  font-size: 1rem;
  font-weight: 900;
  color: var(--text);
}
.save-panel-close {
  background: none;
  border: none;
  font-size: 1.1rem;
  cursor: pointer;
  color: #A89585;
  padding: 2px 6px;
}
.save-slots {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.save-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: #fff;
  border-radius: 12px;
  border: 2px solid #E5D9C8;
  padding: 6px 4px 6px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.save-slot.filled {
  border-color: var(--primary);
}
.save-slot-num {
  font-size: 0.65rem;
  font-weight: 700;
  color: #A89585;
}
.save-slot-thumb {
  width: 100%;
  height: 52px;
  object-fit: contain;
  border-radius: 4px;
  background: #f5f5f5;
}
.save-slot-empty-icon {
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  color: #D0C8BE;
  width: 100%;
}
.save-slot-date {
  font-size: 0.58rem;
  color: #A89585;
  text-align: center;
  line-height: 1.3;
  min-height: 1.8em;
}
.save-slot-btns {
  display: flex;
  flex-direction: column;
  gap: 3px;
  width: 100%;
}
.save-slot-btns button {
  width: 100%;
  padding: 3px 2px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.58rem;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid;
  background: #fff;
  transition: transform 0.1s;
}
.save-slot-btns button:active { transform: scale(0.93); }
.btn-slot-save  { border-color: #059669 !important; color: #059669 !important; }
.btn-slot-load  { border-color: #3388FF !important; color: #3388FF !important; }
.btn-slot-del   { border-color: #EF4444 !important; color: #EF4444 !important; }

/* Fullscreen button */
.btn-fullscreen {
  background: none;
  border: 2px solid #A89585;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  padding: 3px 7px;
  border-radius: 8px;
  color: #5B4A3F;
  line-height: 1;
}

/* ===== Landscape layout ===== */
@media (orientation: landscape) {
  #coloring-screen {
    flex-direction: row;
  }

  /* Header floats over canvas top-right (サイドバー幅分ずらす) */
  .coloring-header {
    position: absolute;
    top: 0; right: 114px;
    left: auto;
    z-index: 20;
    border-bottom: none;
    border-radius: 0 0 12px 12px;
    background: rgba(255,248,231,0.88);
    padding: 5px 10px;
    gap: 6px;
    width: auto;
  }
  .coloring-title { display: none; }
  .btn-fullscreen { display: none; }

  /* 横画面: 左上ボタンを縦並び */
  .canvas-float-group.top-left {
    flex-direction: column;
  }

  /* Canvas takes left side */
  .canvas-wrapper {
    position: relative;
    flex: 1;
    height: 100%;
  }

  /* Toolbar becomes right sidebar */
  .toolbar {
    flex-direction: column;
    border-top: none;
    border-left: 2px solid #FDE68A;
    width: 110px;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    flex-shrink: 0;
    padding: 6px 5px;
    align-items: center;
    gap: 4px;
    scrollbar-width: none;
  }
  .toolbar::-webkit-scrollbar { display: none; }

  /* Palette wraps into grid (3 columns to fit sidebar) */
  .palette {
    display: grid;
    grid-template-columns: repeat(3, 32px);
    gap: 4px;
    justify-content: center;
    align-items: center;
  }
  .palette .swatch {
    width: 32px;
    height: 32px;
  }
  .palette .rainbow-swatch {
    grid-column: span 3;
    width: 34px;
    height: 34px;
    justify-self: center;
  }

  /* Tool row wraps in sidebar */
  .tool-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    align-items: center;
  }

  /* Size buttons in sidebar */
  .size-btn {
    width: 36px;
    height: 30px;
  }

  /* Divider horizontal */
  .tool-divider {
    width: 90px;
    height: 2px;
  }

  /* Action button fill sidebar */
  .bucket-btn {
    width: 96px;
    font-size: 0.62rem;
    padding: 4px 3px;
    text-align: center;
    white-space: normal;
    line-height: 1.2;
  }
}
</style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="89d02cb9-6bec-4f30-a21a-65321374dbdc"></script>
</head>

<!-- ===== Coloring Screen ===== -->

  <div class="coloring-header">
    <button class="btn-back" onclick="backToSelection()">← もどる</button>
    <div class="coloring-title" id="coloring-title">ぬりえ</div>
    <button class="btn-slots" onclick="openSavePanel()">💾 セーブ</button>

    <button class="btn-fullscreen" id="btn-fullscreen" onclick="toggleFullscreen()" title="全画面"><img src="../assets/images/icons/icons_008.png" style="width:20px;height:20px;object-fit:contain;pointer-events:none;vertical-align:middle;" alt="全画面"></button>

    <div class="save-panel-backdrop" onclick="closeSavePanel()"></div>
    <div class="save-panel-content">
      <div class="save-panel-header">
        <span class="save-panel-title">💾 セーブ / ロード</span>
        <button class="save-panel-close" onclick="closeSavePanel()">✕</button>
      </div>
      <div class="save-slots" id="save-slots"></div>
    </div>
  </div>

  <div class="canvas-wrapper" id="canvas-wrapper">
    <div id="canvas-transform">
      <canvas id="color-canvas"></canvas>
      <img id="nurie-overlay" alt="ぬりえ">
    </div>
    <button id="zoom-reset-btn" onclick="resetZoom()">1:1 もどす</button>

      <button class="canvas-float-btn" id="eraser-btn" onclick="toggleEraser()"><img src="../assets/images/icons/icons_004.png" class="float-icon" alt="消しゴム"></button>
      <button class="canvas-float-btn" onclick="undo()"><img src="../assets/images/icons/icons3_001.png" class="float-icon" alt="もどす"></button>
      <button class="canvas-float-btn clear-float" onclick="clearCanvas()"><img src="../assets/images/icons/icons_006.png" class="float-icon" alt="全消し"></button>
    </div>
  </div>
  <div id="brush-cursor"></div>

  <div class="toolbar">
    <div class="palette" id="palette">
      <button class="rainbow-swatch" id="rainbow-btn" onclick="toggleRainbow()"><img src="../assets/images/icons/icons_001.png" style="width:24px;height:24px;object-fit:contain;pointer-events:none;" alt="🌈"></button>
    </div>
    <div class="tool-row">
      <button class="size-btn active" data-size="14"><span class="size-line size-line-s"></span></button>
      <button class="size-btn" data-size="28"><span class="size-line size-line-m"></span></button>
      <button class="size-btn" data-size="50"><span class="size-line size-line-l"></span></button>
      <button class="size-btn" data-size="70"><span class="size-line size-line-xl"></span></button>
      <button class="bucket-btn" id="bucket-btn" onclick="toggleMask()">✏️ はみ出し防止</button>
    </div>
  </div>
</div>

<script>
// ===== Color palette =====
const COLORS = [
  '#FF4444', '#FF8800', '#FFCC00', '#88DD00',
  '#00CC66', '#00BBDD', '#3388FF', '#8855FF',
  '#FF55AA', '#AA6633', '#FFD9A8', '#FFB380',
  '#FFFFFF', '#222222',
];

let currentColor = COLORS[0];
let brushSize = 14;
let isEraser = false;
let isBucket = true;  // はみ出し防止デフォルトON
let isRainbow = false;
let rainbowHue = 0;

function buildPalette() {
  const palette = document.getElementById('palette');
  COLORS.forEach((col, i) => {
    const sw = document.createElement('button');
    sw.className = 'swatch' + (i === 0 ? ' selected' : '');
    sw.style.background = col;
    if (col === '#FFFFFF') sw.style.boxShadow = 'inset 0 0 0 1px #ccc';
    sw.onclick = () => selectColor(col, sw);
    palette.appendChild(sw);
  });
}

function selectColor(col, sw) {
  currentColor = col;
  isEraser = false;
  isRainbow = false;
  document.getElementById('eraser-btn').classList.remove('eraser-selected');
  document.getElementById('rainbow-btn').classList.remove('selected');
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  sw.classList.add('selected');
}

function toggleRainbow() {
  isRainbow = !isRainbow;
  isEraser = false;
  document.getElementById('rainbow-btn').classList.toggle('selected', isRainbow);
  document.getElementById('eraser-btn').classList.remove('eraser-selected');
  document.getElementById('bucket-btn').classList.remove('selected');
  if (!isRainbow) {
    const idx = COLORS.indexOf(currentColor);
    if (idx >= 0) document.querySelectorAll('.swatch')[idx].classList.add('selected');
  } else {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  }
}

// Size buttons (set up after DOM ready)
function initSizeBtns() {
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      brushSize = parseInt(btn.dataset.size);
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

function toggleEraser() {
  isEraser = !isEraser;
  isBucket = false;
  isRainbow = false;
  document.getElementById('eraser-btn').classList.toggle('eraser-selected', isEraser);
  document.getElementById('bucket-btn').classList.remove('selected');
  document.getElementById('rainbow-btn').classList.remove('selected');
  if (!isEraser) {
    const swatches = document.querySelectorAll('.swatch');
    const idx = COLORS.indexOf(currentColor);
    if (idx >= 0) swatches[idx].classList.add('selected');
  }
}

function toggleMask() {
  isBucket = !isBucket;
  isEraser = false;
  if (!isBucket) activeMask = null;
  document.getElementById('bucket-btn').classList.toggle('selected', isBucket);
  document.getElementById('eraser-btn').classList.remove('eraser-selected');
}

// ===== Line mask (はみ出し防止) =====
let nuriePixelData = null;  // ぬりえ原寸ピクセルキャッシュ
let nurieNW = 0, nurieNH = 0; // ぬりえ画像の自然サイズ
let currentNurieSrc = '';
let lineThreshold = 180;

function loadNurieImg(src) {
  currentNurieSrc = src;
  nuriePixelData = null;
  const loader = new Image();
  loader.crossOrigin = 'anonymous';
  loader.onload = () => {
    if (src !== currentNurieSrc) return;
    nurieNW = loader.naturalWidth;
    nurieNH = loader.naturalHeight;
    const tmp = document.createElement('canvas');
    tmp.width = nurieNW; tmp.height = nurieNH;
    const tc = tmp.getContext('2d');
    try {
      tc.drawImage(loader, 0, 0);
      nuriePixelData = tc.getImageData(0, 0, nurieNW, nurieNH).data;
    } catch(e) { nuriePixelData = null; }
  };
  loader.onerror = () => { nuriePixelData = null; };
  loader.src = src;
}

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}


// ===== はみ出し防止（領域マスク方式）=====
// canvas内部解像度 = ぬりえネイティブサイズなので、マッピングは 1:1
function getNurieMapping() {
  return { ax: 1, bx: 0, ay: 1, by: 0, nw: nurieNW, nh: nurieNH };
}

// タッチ開始点からフラッドフィルで閉じた領域を activeMask として確定
let activeMask = null;

// canvasピクセル(x,y)が対応するぬりえ画像の矩形領域に線があるかチェック
// ax>1（スマホ等でcanvasがぬりえ画像より低解像度）の場合、
// 隣接canvasピクセル間のぬりえピクセルをスキップしないよう全て検査する
function isLineAt(x, y, ax, bx, ay, by, nw, nh) {
  const nx0 = Math.floor(ax * x + bx);
  const nx1 = Math.floor(ax * (x + 1) + bx);
  const ny0 = Math.floor(ay * y + by);
  const ny1 = Math.floor(ay * (y + 1) + by);
  const x0 = Math.max(0, Math.min(nx0, nx1));
  const x1 = Math.min(nw - 1, Math.max(nx0, nx1));
  const y0 = Math.max(0, Math.min(ny0, ny1));
  const y1 = Math.min(nh - 1, Math.max(ny0, ny1));
  for (let py = y0; py <= y1; py++) {
    for (let px = x0; px <= x1; px++) {
      const ni = (py * nw + px) * 4;
      if ((nuriePixelData[ni] + nuriePixelData[ni+1] + nuriePixelData[ni+2]) / 3 < lineThreshold) return true;
    }
  }
  return false;
}

function createRegionMask(startX, startY) {
  activeMask = null;
  if (!nuriePixelData) return;
  const { ax, bx, ay, by, nw, nh } = getNurieMapping();
  const w = canvas.width, h = canvas.height;
  const sx = Math.round(startX), sy = Math.round(startY);
  if (sx < 0 || sx >= w || sy < 0 || sy >= h) return;

  // 開始点がライン上なら領域なし
  if (isLineAt(sx, sy, ax, bx, ay, by, nw, nh)) return;

  const mask = new Uint8Array(w * h);
  const visited = new Uint8Array(w * h);
  const stack = [sy * w + sx];
  visited[sy * w + sx] = 1;

  while (stack.length) {
    const idx = stack.pop();
    const x = idx % w, y = (idx / w) | 0;
    if (isLineAt(x, y, ax, bx, ay, by, nw, nh)) continue;
    mask[idx] = 1;
    if (x > 0   && !visited[idx-1]) { visited[idx-1] = 1; stack.push(idx-1); }
    if (x < w-1 && !visited[idx+1]) { visited[idx+1] = 1; stack.push(idx+1); }
    if (y > 0   && !visited[idx-w]) { visited[idx-w] = 1; stack.push(idx-w); }
    if (y < h-1 && !visited[idx+w]) { visited[idx+w] = 1; stack.push(idx+w); }
  }
  activeMask = mask;
}

// マスク外をストローク開始前の状態に戻す（白ではなく保存済みデータで復元）
let strokeSavedData = null;

function applyRegionMask(x0, y0, x1, y1) {
  if (!activeMask || !strokeSavedData) return;
  const w = canvas.width, h = canvas.height;
  const cx0 = Math.max(0, Math.round(x0)), cy0 = Math.max(0, Math.round(y0));
  const cx1 = Math.min(w-1, Math.round(x1)), cy1 = Math.min(h-1, Math.round(y1));
  const rw = cx1 - cx0 + 1, rh = cy1 - cy0 + 1;
  if (rw <= 0 || rh <= 0) return;
  const imgData = ctx.getImageData(cx0, cy0, rw, rh);
  const px = imgData.data;
  const saved = strokeSavedData.data;
  let changed = false;
  for (let ry = 0; ry < rh; ry++) {
    for (let rx = 0; rx < rw; rx++) {
      if (!activeMask[(cy0 + ry) * w + (cx0 + rx)]) {
        const pi = (ry * rw + rx) * 4;
        const si = ((cy0 + ry) * w + (cx0 + rx)) * 4;
        if (px[pi] !== saved[si] || px[pi+1] !== saved[si+1] || px[pi+2] !== saved[si+2]) {
          px[pi] = saved[si]; px[pi+1] = saved[si+1]; px[pi+2] = saved[si+2]; px[pi+3] = saved[si+3];
          changed = true;
        }
      }
    }
  }
  if (changed) ctx.putImageData(imgData, cx0, cy0);
}

// ===== Undo =====
const MAX_HISTORY = 12;
let history = [];

function saveHistory() {
  history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  if (history.length > MAX_HISTORY) history.shift();
}

function undo() {
  if (!history.length) return;
  ctx.putImageData(history.pop(), 0, 0);
}

// ===== Canvas drawing =====
const canvas = document.getElementById('color-canvas');
const ctx = canvas.getContext('2d');

let drawing = false;
let lastX = 0, lastY = 0;
// ストローク全体のダーティ矩形（endDrawでのクリーンアップ範囲）
let strokeX0 = 0, strokeY0 = 0, strokeX1 = 0, strokeY1 = 0;

function getClientXY(e) {
  if (e.touches) return { cx: e.touches[0].clientX, cy: e.touches[0].clientY };
  return { cx: e.clientX, cy: e.clientY };
}

// クライアント座標 → canvasピクセル座標（zoom/pan を逆算）
function clientToCanvas(cx, cy) {
  const wrapRect = document.getElementById('canvas-wrapper').getBoundingClientRect();
  // wrapper内ローカル座標
  const wx = cx - wrapRect.left;
  const wy = cy - wrapRect.top;
  // transform(translate + scale) を逆算
  const tx = (wx - panX) / zoomScale;
  const ty = (wy - panY) / zoomScale;
  // CSS配置上のcanvas位置を引く
  const cl = parseFloat(canvas.style.left) || 0;
  const ct = parseFloat(canvas.style.top) || 0;
  const cw = parseFloat(canvas.style.width) || canvas.width;
  const ch = parseFloat(canvas.style.height) || canvas.height;
  // canvasピクセルへ
  const x = (tx - cl) * canvas.width / cw;
  const y = (ty - ct) * canvas.height / ch;
  return { x, y };
}

function startDraw(e) {
  e.preventDefault();
  if (isPanMode) return;
  const { cx, cy } = getClientXY(e);
  const { x, y } = clientToCanvas(cx, cy);

  const snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  history.push(snapshot);
  if (history.length > MAX_HISTORY) history.shift();
  // はみ出し防止ONなら開始点で領域を確定し、ストローク前状態を保存
  if (isBucket && !isEraser) {
    strokeSavedData = snapshot;
    createRegionMask(x, y);
  }
  drawing = true;
  lastX = x; lastY = y;
  strokeX0 = x - brushSize; strokeY0 = y - brushSize;
  strokeX1 = x + brushSize; strokeY1 = y + brushSize;
  const dotColor = isEraser ? '#FFFFFF' : (isRainbow ? `hsl(${rainbowHue},90%,55%)` : currentColor);
  if (isRainbow) rainbowHue = (rainbowHue + 3) % 360;
  ctx.beginPath();
  ctx.arc(lastX, lastY, brushSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = dotColor;
  ctx.fill();
  if (isBucket && !isEraser) applyRegionMask(strokeX0, strokeY0, strokeX1, strokeY1);
}

function doDraw(e) {
  e.preventDefault();
  if (!drawing) return;
  const { cx, cy } = getClientXY(e);
  const { x, y } = clientToCanvas(cx, cy);

  const strokeColor = isEraser ? '#FFFFFF' : (isRainbow ? `hsl(${rainbowHue},90%,55%)` : currentColor);
  if (isRainbow) rainbowHue = (rainbowHue + 3) % 360;
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  if (isBucket && !isEraser) {
    const x0 = Math.min(lastX, x) - brushSize;
    const y0 = Math.min(lastY, y) - brushSize;
    const x1 = Math.max(lastX, x) + brushSize;
    const y1 = Math.max(lastY, y) + brushSize;
    applyRegionMask(x0, y0, x1, y1);
    // ストローク全体のダーティ矩形を拡張
    strokeX0 = Math.min(strokeX0, x0); strokeY0 = Math.min(strokeY0, y0);
    strokeX1 = Math.max(strokeX1, x1); strokeY1 = Math.max(strokeY1, y1);
  }

  lastX = x;
  lastY = y;
}

function endDrawInternal() {
  if (drawing && isBucket && !isEraser) applyRegionMask(strokeX0, strokeY0, strokeX1, strokeY1);
  drawing = false;
}

function endDraw(e) {
  e.preventDefault();
  endDrawInternal();
}

// ===== ブラシカーソル =====
const brushCursor = document.getElementById('brush-cursor');

function updateBrushCursor(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const cssBrush = brushSize * (rect.width / canvas.width);
  brushCursor.style.width  = cssBrush + 'px';
  brushCursor.style.height = cssBrush + 'px';
  brushCursor.style.left   = clientX + 'px';
  brushCursor.style.top    = clientY + 'px';
}

canvas.addEventListener('mouseenter', () => {
  canvas.style.cursor = 'none';
  brushCursor.style.display = 'block';
});
canvas.addEventListener('mouseleave', () => {
  canvas.style.cursor = '';
  brushCursor.style.display = 'none';
});
canvas.addEventListener('mousemove', (e) => { updateBrushCursor(e.clientX, e.clientY); });

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', doDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);

// ===== ズーム / パン =====
let zoomScale = 1;
let panX = 0, panY = 0;
let isPanMode = false;
const ZOOM_STEPS = [1, 2, 3];
let zoomStepIndex = 0;

function applyTransform() {
  document.getElementById('canvas-transform').style.transform =
    `translate(${panX}px, ${panY}px) scale(${zoomScale})`;
  document.getElementById('zoom-reset-btn').style.display = zoomScale > 1.01 ? 'block' : 'none';
  // カメラボタンの表示更新
  const camBtn = document.getElementById('camera-btn');
  const zoomed = zoomScale > 1.01;
  if (zoomed) {
    camBtn.innerHTML = '<span class="zoom-label">×' + Math.round(zoomScale) + '</span>';
    camBtn.classList.add('zoomed');
  } else {
    camBtn.innerHTML = '<img src="../assets/images/icons/icons_003.png" class="float-icon" alt="ズーム">';
    camBtn.classList.remove('zoomed');
  }
  // ズーム中もデフォルトは描画モード（2本指でパン）
  document.getElementById('canvas-wrapper').classList.toggle('pan-mode', isPanMode);
}

function clampPan() {
  const wrapper = document.getElementById('canvas-wrapper');
  const ww = wrapper.clientWidth, wh = wrapper.clientHeight;
  panX = Math.min(0, Math.max(ww * (1 - zoomScale), panX));
  panY = Math.min(0, Math.max(wh * (1 - zoomScale), panY));
}

function resetZoom() {
  zoomScale = 1; panX = 0; panY = 0;
  zoomStepIndex = 0;
  applyTransform();
  document.getElementById('canvas-wrapper').classList.remove('panning');
}

function cycleZoom() {
  zoomStepIndex = (zoomStepIndex + 1) % ZOOM_STEPS.length;
  const newScale = ZOOM_STEPS[zoomStepIndex];
  // ズーム時は中心を基準にする
  const wrapperEl = document.getElementById('canvas-wrapper');
  const ww = wrapperEl.clientWidth, wh = wrapperEl.clientHeight;
  const cx = ww / 2, cy = wh / 2;
  panX = cx - (cx - panX) * (newScale / zoomScale);
  panY = cy - (cy - panY) * (newScale / zoomScale);
  zoomScale = newScale;
  clampPan();
  applyTransform();
}


// ピンチ/ホイール後のステップ同期
function syncPanMode() {
  if (zoomScale <= 1.01) zoomStepIndex = 0;
  else if (zoomScale <= 2.5) zoomStepIndex = 1;
  else zoomStepIndex = 2;
}

// --- Touch handling ---
let pinchPrevDist = 0, pinchPrevMidX = 0, pinchPrevMidY = 0;
let panTouchStartX = 0, panTouchStartY = 0, panStartX = 0, panStartY = 0;
let isGesturing = false;
let lastTapTime = 0;

const wrapper = document.getElementById('canvas-wrapper');

wrapper.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length === 2) {
    isGesturing = true;
    endDrawInternal();
    const t0 = e.touches[0], t1 = e.touches[1];
    pinchPrevDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    pinchPrevMidX = (t0.clientX + t1.clientX) / 2;
    pinchPrevMidY = (t0.clientY + t1.clientY) / 2;
  } else if (e.touches.length === 1) {
    const now = Date.now();
    if (now - lastTapTime < 280) { resetZoom(); lastTapTime = 0; return; }
    lastTapTime = now;
    isGesturing = false;
    startDraw(e);
  }
}, { passive: false });

wrapper.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 2) {
    isGesturing = true;
    endDrawInternal();
    const t0 = e.touches[0], t1 = e.touches[1];
    const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    const midX = (t0.clientX + t1.clientX) / 2;
    const midY = (t0.clientY + t1.clientY) / 2;
    const wRect = wrapper.getBoundingClientRect();
    const localMidX = midX - wRect.left;
    const localMidY = midY - wRect.top;
    const newScale = Math.min(5, Math.max(1, zoomScale * (dist / pinchPrevDist)));
    // ピンチ中心を固定しながらスケール変更
    panX = localMidX - (localMidX - panX) * (newScale / zoomScale);
    panY = localMidY - (localMidY - panY) * (newScale / zoomScale);
    // 中点の移動分をパンに加算
    panX += midX - pinchPrevMidX;
    panY += midY - pinchPrevMidY;
    zoomScale = newScale;
    syncPanMode();
    clampPan();
    applyTransform();
    pinchPrevDist = dist; pinchPrevMidX = midX; pinchPrevMidY = midY;
  } else if (e.touches.length === 1 && !isGesturing) {
    doDraw(e);
  }
}, { passive: false });

wrapper.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (e.touches.length < 2) isGesturing = false;
  if (e.touches.length === 0) {
    wrapper.classList.remove('panning');
    endDrawInternal();
  }
}, { passive: false });

// マウスドラッグでパン (PC — 中ボタン or Space+ドラッグ)
let mousePanning = false;
wrapper.addEventListener('mousedown', (e) => {
  if (e.button === 1 || (e.button === 0 && isPanMode)) {
    mousePanning = true;
    panStartX = panX; panStartY = panY;
    panTouchStartX = e.clientX; panTouchStartY = e.clientY;
    wrapper.classList.add('panning');
    e.preventDefault();
  }
});
wrapper.addEventListener('mousemove', (e) => {
  if (mousePanning) {
    panX = panStartX + e.clientX - panTouchStartX;
    panY = panStartY + e.clientY - panTouchStartY;
    clampPan();
    applyTransform();
    e.preventDefault();
  }
});
wrapper.addEventListener('mouseup', () => {
  if (mousePanning) { mousePanning = false; wrapper.classList.remove('panning'); }
});
wrapper.addEventListener('mouseleave', () => {
  if (mousePanning) { mousePanning = false; wrapper.classList.remove('panning'); }
});

// マウスホイールでズーム (PC)
wrapper.addEventListener('wheel', (e) => {
  e.preventDefault();
  const wRect = wrapper.getBoundingClientRect();
  const lx = e.clientX - wRect.left, ly = e.clientY - wRect.top;
  const delta = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const newScale = Math.min(5, Math.max(1, zoomScale * delta));
  panX = lx - (lx - panX) * (newScale / zoomScale);
  panY = ly - (ly - panY) * (newScale / zoomScale);
  zoomScale = newScale;
  syncPanMode();
  clampPan();
  applyTransform();
}, { passive: false });

// フローティングボタンのタッチイベントがcanvas-wrapperに伝播しないようにする
document.querySelectorAll('.canvas-float-btn, .canvas-float-group').forEach(el => {
  el.addEventListener('touchstart', e => e.stopPropagation(), { passive: false });
  el.addEventListener('touchmove', e => e.stopPropagation(), { passive: false });
  el.addEventListener('touchend', e => e.stopPropagation(), { passive: false });
});

function clearCanvas() {
  if (!confirm('ぜんぶけしますか？')) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// canvas内部解像度はぬりえ画像のネイティブサイズに固定
let canvasInitialized = false;

function layoutCanvas(wrapper) {
  const w = wrapper.clientWidth;
  const h = wrapper.clientHeight;
  const img = document.getElementById('nurie-overlay');
  const imgRatio = img.naturalWidth / img.naturalHeight;
  const wrapRatio = w / h;
  let cw, ch;
  if (imgRatio > wrapRatio) {
    cw = w; ch = w / imgRatio;
  } else {
    ch = h; cw = h * imgRatio;
  }
  canvas.style.left = Math.round((w - cw) / 2) + 'px';
  canvas.style.top = Math.round((h - ch) / 2) + 'px';
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
}

function resizeCanvas(wrapper, preserveContent) {
  if (preserveContent && canvasInitialized) {
    // 回転時: CSS配置だけ更新、内部ピクセルは一切触らない
    layoutCanvas(wrapper);
    resetZoom();
    return;
  }

  // 初回 or 新しいぬりえロード: 内部解像度をぬりえ画像のネイティブサイズで確定
  const img = document.getElementById('nurie-overlay');
  const nw = img.naturalWidth || 800;
  const nh = img.naturalHeight || 800;
  canvas.width = nw;
  canvas.height = nh;
  canvasInitialized = true;

  layoutCanvas(wrapper);

  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  resetZoom();
}

// ===== セーブ / ロード =====
const MAX_SAVE_SLOTS = 5;
let currentNurieIdx = 0;

function getNurieIdx(src) {
  const m = src.match(/nurie(\d+)/);
  return m ? parseInt(m[1]) : 0;
}
function getSaveKey(idx, slot) {
  return `nurie_coloring_${idx}_${slot}`;
}

function openSavePanel() {
  updateSavePanel();
  document.getElementById('save-panel').style.display = 'flex';
}
function closeSavePanel() {
  document.getElementById('save-panel').style.display = 'none';
}

function updateSavePanel() {
  const container = document.getElementById('save-slots');
  container.innerHTML = '';
  for (let i = 0; i < MAX_SAVE_SLOTS; i++) {
    const raw = localStorage.getItem(getSaveKey(currentNurieIdx, i));
    const data = raw ? JSON.parse(raw) : null;
    const slot = document.createElement('div');
    slot.className = 'save-slot' + (data ? ' filled' : '');
    if (data) {
      const d = new Date(data.timestamp);
      const dateStr = `${d.getMonth()+1}/${d.getDate()}<br>${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      slot.innerHTML = `
        <div class="save-slot-num">${i+1}</div>
        <img class="save-slot-thumb" src="${data.canvas}" alt="slot${i+1}">
        <div class="save-slot-date">${dateStr}</div>
        <div class="save-slot-btns">
          <button class="btn-slot-load" onclick="loadFromSlot(${i})">読み込み</button>
          <button class="btn-slot-save" onclick="saveToSlot(${i})">上書き</button>
          <button class="btn-slot-del"  onclick="deleteSlot(${i})">削除</button>
        </div>`;
    } else {
      slot.innerHTML = `
        <div class="save-slot-num">${i+1}</div>
        <div class="save-slot-empty-icon">＋</div>
        <div class="save-slot-date">空き</div>
        <div class="save-slot-btns">
          <button class="btn-slot-save" onclick="saveToSlot(${i})">保存する</button>
        </div>`;
    }
    container.appendChild(slot);
  }
}

function saveToSlot(slot) {
  const dataURL = canvas.toDataURL('image/jpeg', 0.75);
  const data = { canvas: dataURL, timestamp: Date.now() };
  try {
    localStorage.setItem(getSaveKey(currentNurieIdx, slot), JSON.stringify(data));
  } catch(e) {
    alert('保存できませんでした（容量不足）');
    return;
  }
  updateSavePanel();
}

function loadFromSlot(slot) {
  const raw = localStorage.getItem(getSaveKey(currentNurieIdx, slot));
  if (!raw) return;
  const data = JSON.parse(raw);
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  };
  img.src = data.canvas;
  closeSavePanel();
}

function deleteSlot(slot) {
  if (!confirm(`スロット${slot+1}を削除しますか？`)) return;
  localStorage.removeItem(getSaveKey(currentNurieIdx, slot));
  updateSavePanel();
}

// ===== Navigation =====
let currentNurieName = '';

function startColoring(src, name) {
  canvasInitialized = false; // 新しいぬりえ: 内部解像度リセット
  currentNurieName = name;
  currentNurieIdx = getNurieIdx(src);
  document.getElementById('coloring-title').textContent = name;

  const selScreen = document.getElementById('selection-screen');
  const colScreen = document.getElementById('coloring-screen');
  selScreen.style.display = 'none';
  colScreen.style.display = 'flex';

  currentNurieSrc = src;
  loadNurieImg(src);
  const img = document.getElementById('nurie-overlay');
  img.onload = () => { resizeCanvas(document.getElementById('canvas-wrapper')); };
  if (img.getAttribute('src') === src) {
    resizeCanvas(document.getElementById('canvas-wrapper'));
  } else {
    img.src = src;
  }
}

function backToSelection() {
  activeMask = null;
  resetZoom();
  document.getElementById('selection-screen').style.display = 'flex';
  document.getElementById('coloring-screen').style.display = 'none';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ===== Save =====
function saveColored() {
  const offscreen = document.createElement('canvas');
  offscreen.width = canvas.width;
  offscreen.height = canvas.height;
  const octx = offscreen.getContext('2d');

  octx.drawImage(canvas, 0, 0);

  const overlay = document.getElementById('nurie-overlay');
  octx.globalCompositeOperation = 'multiply';
  octx.drawImage(overlay, 0, 0, offscreen.width, offscreen.height);
  octx.globalCompositeOperation = 'source-over';

  const link = document.createElement('a');
  link.download = currentNurieName + '_いろぬり.png';
  link.href = offscreen.toDataURL('image/png');
  link.click();
  awardPoints(5);
  if (window.incrementStat) window.incrementStat('coloring_complete', 1);
}

// ===== Print colored =====
function printColored() {
  const offscreen = document.createElement('canvas');
  offscreen.width = canvas.width;
  offscreen.height = canvas.height;
  const octx = offscreen.getContext('2d');

  octx.drawImage(canvas, 0, 0);

  const overlay = document.getElementById('nurie-overlay');
  octx.globalCompositeOperation = 'multiply';
  octx.drawImage(overlay, 0, 0, offscreen.width, offscreen.height);
  octx.globalCompositeOperation = 'source-over';

  const dataURL = offscreen.toDataURL('image/png');
  const win = window.open('', '_blank');
  if (!win) return;
  win.document.write(
    '<!DOCTYPE html><html><head><style>' +
    'body{margin:0;padding:0}img{width:100%;display:block}' +
    '@media print{body{margin:0}}' +
    '</style><script defer src="https://cloud.umami.is/script.js" data-website-id="89d02cb9-6bec-4f30-a21a-65321374dbdc"><\/script>' +
    '</head><body>' +
    '<img src="' + dataURL + '" onload="window.print()">' +
    '</body></html>'
  );
  win.document.close();
}

// ===== Print original =====
function printNurie(src) {
  const win = window.open('', '_blank');
  if (!win) return;
  win.document.write(
    '<!DOCTYPE html><html><head><style>' +
    'body{margin:0;padding:0}img{width:100%;display:block}' +
    '</style><script defer src="https://cloud.umami.is/script.js" data-website-id="89d02cb9-6bec-4f30-a21a-65321374dbdc"><\/script>' +
    '</head><body>' +
    '<img src="' + src + '" onload="window.print()">' +
    '</body></html>'
  );
  win.document.close();
}

// ===== Fullscreen =====
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}
document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('btn-fullscreen');
  if (btn) btn.textContent = document.fullscreenElement ? '⊠' : '⛶';
});

// ===== Init =====
buildPalette();
initSizeBtns();
// はみ出し防止デフォルトON: ボタン状態を反映
document.getElementById('bucket-btn').classList.add('selected');

// 回転・リサイズ時: iOSは寸法が遅延更新されるため複数回リレイアウト
let resizeTimer = null;
function deferredResize() {
  if (document.getElementById('coloring-screen').style.display === 'none') return;
  const w = document.getElementById('canvas-wrapper');
  resizeCanvas(w, true);
}
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  deferredResize();
  resizeTimer = setTimeout(deferredResize, 300);
  setTimeout(deferredResize, 600);
});
window.addEventListener('orientationchange', () => {
  setTimeout(deferredResize, 200);
  setTimeout(deferredResize, 500);
  setTimeout(deferredResize, 1000);
});

initMenu();
</script>
