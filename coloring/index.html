<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ぬりえ | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8E7;
  --primary: #FBBF24;
  --secondary: #FB923C;
  --text: #5B4A3F;
  --shadow: 0 4px 20px rgba(91,74,63,0.1);
  --radius: 20px;
}

html, body {
  min-height: 100dvh;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: var(--text);
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}

/* ===== Selection Screen ===== */
#selection-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 16px 40px;
  gap: 16px;
  max-width: 500px;
  margin: 0 auto;
}

.header {
  text-align: center;
  padding: 6px 0;
  position: relative;
  width: 100%;
}
.back-link {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  color: var(--secondary); font-weight: 700; font-size: 0.85rem;
  text-decoration: none; padding: 6px 2px;
}
.header h1 {
  font-size: 1.5rem; font-weight: 900;
  background: linear-gradient(135deg, #FBBF24, #FB923C);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .subtitle { font-size: 0.8rem; color: #A89585; margin-top: 3px; }

.nurie-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
  width: 100%;
}

.nurie-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 3px solid #FDE68A;
}

.nurie-card img {
  width: 100%;
  display: block;
  border-bottom: 2px solid #FDE68A;
}

.nurie-label {
  text-align: center;
  font-size: 0.88rem;
  font-weight: 900;
  color: var(--text);
  padding: 10px 0 4px;
}

.nurie-actions {
  display: flex;
  gap: 10px;
  padding: 10px 16px 16px;
  justify-content: center;
}

.btn-color, .btn-dl, .btn-print {
  flex: 1;
  max-width: 140px;
  padding: 11px 6px;
  border-radius: 50px;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 900;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: transform 0.15s;
  box-shadow: 0 3px 10px rgba(91,74,63,0.12);
  border: none;
}
.btn-color:active, .btn-dl:active, .btn-print:active { transform: scale(0.93); }

.btn-color {
  background: linear-gradient(135deg, #FB923C, #EF4444);
  color: #fff;
}
.btn-dl {
  background: linear-gradient(135deg, #34D399, #059669);
  color: #fff;
}
.btn-print {
  background: linear-gradient(135deg, #60A5FA, #3B82F6);
  color: #fff;
}

/* ===== Coloring Screen ===== */
#coloring-screen {
  display: none;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

.coloring-header {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  background: rgba(255,248,231,0.95);
  backdrop-filter: blur(4px);
  border-bottom: 2px solid #FDE68A;
  gap: 8px;
  flex-shrink: 0;
}

.btn-back {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--secondary);
  cursor: pointer;
  padding: 4px 6px;
  white-space: nowrap;
}

.coloring-title {
  font-size: 1rem;
  font-weight: 900;
  background: linear-gradient(135deg, #FBBF24, #FB923C);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  flex: 1;
  text-align: center;
}

.btn-save, .btn-print-colored {
  background: none;
  border: 2px solid currentColor;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 20px;
}
.btn-save { color: #059669; }
.btn-print-colored { color: #3B82F6; }

/* Canvas area */
.canvas-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #f0f0f0;
  cursor: crosshair;
}

#color-canvas {
  position: absolute;
  top: 0; left: 0;
  background: #fff;
}

#nurie-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  mix-blend-mode: multiply;
  pointer-events: none;
  display: block;
}

/* Toolbar */
.toolbar {
  background: rgba(255,248,231,0.97);
  border-top: 2px solid #FDE68A;
  padding: 8px 10px 10px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Color palette */
.palette {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.swatch {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.1s;
  flex-shrink: 0;
}
.swatch:active { transform: scale(0.88); }
.swatch.selected {
  border-color: #5B4A3F;
  transform: scale(1.18);
}

/* Tool row */
.tool-row {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}

/* Brush size buttons */
.size-btn {
  border: 2.5px solid #D0C8BE;
  border-radius: 50%;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
.size-btn.active {
  border-color: var(--primary);
  background: linear-gradient(135deg, var(--primary), var(--secondary));
}
.size-dot {
  border-radius: 50%;
  background: var(--text);
  pointer-events: none;
}
.size-btn.active .size-dot { background: #fff; }
.size-btn[data-size="4"]  { width: 32px; height: 32px; }
.size-btn[data-size="14"] { width: 36px; height: 36px; }
.size-btn[data-size="28"] { width: 40px; height: 40px; }
.size-dot-s { width: 5px;  height: 5px; }
.size-dot-m { width: 12px; height: 12px; }
.size-dot-l { width: 20px; height: 20px; }

.bucket-btn {
  padding: 6px 12px;
  border-radius: 20px;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  border: 2px solid #8855FF;
  color: #8855FF;
  background: #fff;
  transition: transform 0.1s;
}
.bucket-btn:active { transform: scale(0.92); }
.bucket-btn.selected {
  background: #EDE9FF;
  border-color: #6633CC;
  color: #6633CC;
}

.tool-divider {
  width: 2px;
  height: 28px;
  background: #E5D9C8;
  border-radius: 2px;
  flex-shrink: 0;
}

.eraser-btn, .clear-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  border: 2px solid;
  transition: transform 0.1s;
  background: #fff;
}
.eraser-btn:active, .clear-btn:active { transform: scale(0.92); }
.eraser-btn {
  border-color: #A89585;
  color: #5B4A3F;
}
.eraser-btn.selected {
  background: #F0E6D8;
  border-color: #8B6A55;
}
.clear-btn {
  border-color: #EF4444;
  color: #EF4444;
}
</style>
</head>
<body>

<!-- ===== Selection Screen ===== -->
<div id="selection-screen">
  <div class="header">
    <a href="../index.html" class="back-link">← メニュー</a>
    <h1>ぬりえ</h1>
    <div class="subtitle">いんさつ or アプリでぬってみよう！🖍️</div>
  </div>

  <div class="nurie-list">
    <div class="nurie-card">
      <img src="../assets/images/nurie001.webp" alt="ぬりえ 1">
      <p class="nurie-label">ぬりえ 1</p>
      <div class="nurie-actions">
        <button class="btn-color" onclick="startColoring('../assets/images/nurie001.webp', 'ぬりえ1')">🎨 アプリでぬる</button>
        <a href="../assets/images/nurie001.webp" download="ぬりえ1.webp" class="btn-dl">⬇ ダウンロード</a>
        <button class="btn-print" onclick="printNurie('../assets/images/nurie001.webp')">🖨 いんさつ</button>
      </div>
    </div>

    <div class="nurie-card">
      <img src="../assets/images/nurie002.webp" alt="ぬりえ 2">
      <p class="nurie-label">ぬりえ 2</p>
      <div class="nurie-actions">
        <button class="btn-color" onclick="startColoring('../assets/images/nurie002.webp', 'ぬりえ2')">🎨 アプリでぬる</button>
        <a href="../assets/images/nurie002.webp" download="ぬりえ2.webp" class="btn-dl">⬇ ダウンロード</a>
        <button class="btn-print" onclick="printNurie('../assets/images/nurie002.webp')">🖨 いんさつ</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== Coloring Screen ===== -->
<div id="coloring-screen">
  <div class="coloring-header">
    <button class="btn-back" onclick="backToSelection()">← もどる</button>
    <div class="coloring-title" id="coloring-title">ぬりえ</div>
    <button class="btn-save" onclick="saveColored()">⬇ ほぞん</button>
    <button class="btn-print-colored" onclick="printColored()">🖨 いんさつ</button>
  </div>

  <div class="canvas-wrapper" id="canvas-wrapper">
    <canvas id="color-canvas"></canvas>
    <img id="nurie-overlay" alt="ぬりえ">
  </div>

  <div class="toolbar">
    <div class="palette" id="palette"></div>
    <div class="tool-row">
      <button class="size-btn active" data-size="4"><span class="size-dot size-dot-s"></span></button>
      <button class="size-btn" data-size="14"><span class="size-dot size-dot-m"></span></button>
      <button class="size-btn" data-size="28"><span class="size-dot size-dot-l"></span></button>
      <div class="tool-divider"></div>
      <button class="bucket-btn" id="bucket-btn" onclick="toggleBucket()">🪣 はみ出し防止</button>
      <div class="tool-divider"></div>
      <button class="eraser-btn" id="eraser-btn" onclick="toggleEraser()">消しゴム</button>
      <button class="clear-btn" onclick="clearCanvas()">全消し</button>
    </div>
  </div>
</div>

<script>
// ===== Color palette =====
const COLORS = [
  '#FF4444', '#FF8800', '#FFCC00', '#88DD00',
  '#00CC66', '#00BBDD', '#3388FF', '#8855FF',
  '#FF55AA', '#AA6633', '#FFFFFF', '#222222',
];

let currentColor = COLORS[0];
let brushSize = 4;
let isEraser = false;
let isBucket = false;

function buildPalette() {
  const palette = document.getElementById('palette');
  COLORS.forEach((col, i) => {
    const sw = document.createElement('button');
    sw.className = 'swatch' + (i === 0 ? ' selected' : '');
    sw.style.background = col;
    if (col === '#FFFFFF') sw.style.boxShadow = 'inset 0 0 0 1px #ccc';
    sw.onclick = () => selectColor(col, sw);
    palette.appendChild(sw);
  });
}

function selectColor(col, sw) {
  currentColor = col;
  isEraser = false;
  document.getElementById('eraser-btn').classList.remove('selected');
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  sw.classList.add('selected');
}

// Size buttons (set up after DOM ready)
function initSizeBtns() {
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      brushSize = parseInt(btn.dataset.size);
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

function toggleEraser() {
  isEraser = !isEraser;
  isBucket = false;
  document.getElementById('eraser-btn').classList.toggle('selected', isEraser);
  document.getElementById('bucket-btn').classList.remove('selected');
  if (!isEraser) {
    const swatches = document.querySelectorAll('.swatch');
    const idx = COLORS.indexOf(currentColor);
    if (idx >= 0) swatches[idx].classList.add('selected');
  }
}

function toggleBucket() {
  isBucket = !isBucket;
  isEraser = false;
  document.getElementById('bucket-btn').classList.toggle('selected', isBucket);
  document.getElementById('eraser-btn').classList.remove('selected');
  document.getElementById('canvas-wrapper').style.cursor = isBucket ? 'cell' : 'crosshair';
}

// ===== Flood fill =====
let nuriePixels = null; // ImageData of nurie for boundary detection

function loadNuriePixels(img) {
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width;
  tmp.height = canvas.height;
  const tmpCtx = tmp.getContext('2d');
  tmpCtx.drawImage(img, 0, 0, canvas.width, canvas.height);
  nuriePixels = tmpCtx.getImageData(0, 0, canvas.width, canvas.height);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function floodFill(startX, startY) {
  if (!nuriePixels) return;
  const w = canvas.width, h = canvas.height;
  const imgData = ctx.getImageData(0, 0, w, h);
  const pixels = imgData.data;
  const nurie = nuriePixels.data;
  const [fr, fg, fb] = hexToRgb(currentColor);

  const sx = Math.round(startX), sy = Math.round(startY);
  if (sx < 0 || sx >= w || sy < 0 || sy >= h) return;

  // Target color = current canvas color at start point
  const si = (sy * w + sx) * 4;
  const tr = pixels[si], tg = pixels[si+1], tb = pixels[si+2];

  // Don't fill if already the same color
  if (tr === fr && tg === fg && tb === fb) return;

  const stack = [sy * w + sx];
  const visited = new Uint8Array(w * h);
  visited[sy * w + sx] = 1;

  while (stack.length) {
    const idx = stack.pop();
    const x = idx % w, y = (idx / w) | 0;
    const pi = idx * 4;

    // Check nurie boundary: dark pixel = line = stop
    const nr = nurie[pi], ng = nurie[pi+1], nb = nurie[pi+2];
    if ((nr + ng + nb) / 3 < 100) continue;

    // Check color match (fill connected same-color region)
    const cr = pixels[pi], cg = pixels[pi+1], cb = pixels[pi+2];
    if (Math.abs(cr-tr) > 30 || Math.abs(cg-tg) > 30 || Math.abs(cb-tb) > 30) continue;

    pixels[pi] = fr; pixels[pi+1] = fg; pixels[pi+2] = fb; pixels[pi+3] = 255;

    const neighbors = [];
    if (x > 0)   neighbors.push(idx - 1);
    if (x < w-1) neighbors.push(idx + 1);
    if (y > 0)   neighbors.push(idx - w);
    if (y < h-1) neighbors.push(idx + w);
    for (const n of neighbors) {
      if (!visited[n]) { visited[n] = 1; stack.push(n); }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

// ===== Canvas drawing =====
const canvas = document.getElementById('color-canvas');
const ctx = canvas.getContext('2d');

let drawing = false;
let lastX = 0, lastY = 0;

function getPos(e, rect) {
  if (e.touches) {
    const t = e.touches[0];
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const pos = getPos(e, rect);
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = pos.x * scaleX;
  const y = pos.y * scaleY;

  if (isBucket) {
    floodFill(x, y);
    return;
  }

  drawing = true;
  lastX = x; lastY = y;
  ctx.beginPath();
  ctx.arc(lastX, lastY, brushSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = isEraser ? '#FFFFFF' : currentColor;
  ctx.fill();
}

function doDraw(e) {
  e.preventDefault();
  if (!drawing) return;
  const rect = canvas.getBoundingClientRect();
  const pos = getPos(e, rect);
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = pos.x * scaleX;
  const y = pos.y * scaleY;

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = isEraser ? '#FFFFFF' : currentColor;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  lastX = x;
  lastY = y;
}

function endDraw(e) {
  e.preventDefault();
  drawing = false;
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', doDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', doDraw, { passive: false });
canvas.addEventListener('touchend', endDraw, { passive: false });

function clearCanvas() {
  if (!confirm('ぜんぶけしますか？')) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function resizeCanvas(wrapper) {
  const w = wrapper.clientWidth;
  const h = wrapper.clientHeight;

  const img = document.getElementById('nurie-overlay');
  const imgRatio = img.naturalWidth / img.naturalHeight;
  const wrapRatio = w / h;

  let cw, ch;
  if (imgRatio > wrapRatio) {
    cw = w; ch = w / imgRatio;
  } else {
    ch = h; cw = h * imgRatio;
  }

  canvas.width = Math.round(cw);
  canvas.height = Math.round(ch);
  canvas.style.left = Math.round((w - cw) / 2) + 'px';
  canvas.style.top = Math.round((h - ch) / 2) + 'px';
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';

  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Load nurie pixels for flood fill boundary detection
  const overlayImg = document.getElementById('nurie-overlay');
  if (overlayImg.complete && overlayImg.naturalWidth > 0) {
    loadNuriePixels(overlayImg);
  }
}

// ===== Navigation =====
let currentNurieName = '';

function startColoring(src, name) {
  currentNurieName = name;
  document.getElementById('coloring-title').textContent = name;

  const selScreen = document.getElementById('selection-screen');
  const colScreen = document.getElementById('coloring-screen');
  selScreen.style.display = 'none';
  colScreen.style.display = 'flex';

  const img = document.getElementById('nurie-overlay');
  img.onload = () => {
    resizeCanvas(document.getElementById('canvas-wrapper'));
    loadNuriePixels(img);
  };
  if (img.getAttribute('src') === src) {
    resizeCanvas(document.getElementById('canvas-wrapper'));
    loadNuriePixels(img);
  } else {
    img.src = src;
  }
}

function backToSelection() {
  document.getElementById('selection-screen').style.display = 'flex';
  document.getElementById('coloring-screen').style.display = 'none';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ===== Save =====
function saveColored() {
  const offscreen = document.createElement('canvas');
  offscreen.width = canvas.width;
  offscreen.height = canvas.height;
  const octx = offscreen.getContext('2d');

  octx.drawImage(canvas, 0, 0);

  const overlay = document.getElementById('nurie-overlay');
  octx.globalCompositeOperation = 'multiply';
  octx.drawImage(overlay, 0, 0, offscreen.width, offscreen.height);
  octx.globalCompositeOperation = 'source-over';

  const link = document.createElement('a');
  link.download = currentNurieName + '_いろぬり.png';
  link.href = offscreen.toDataURL('image/png');
  link.click();
}

// ===== Print colored =====
function printColored() {
  const offscreen = document.createElement('canvas');
  offscreen.width = canvas.width;
  offscreen.height = canvas.height;
  const octx = offscreen.getContext('2d');

  octx.drawImage(canvas, 0, 0);

  const overlay = document.getElementById('nurie-overlay');
  octx.globalCompositeOperation = 'multiply';
  octx.drawImage(overlay, 0, 0, offscreen.width, offscreen.height);
  octx.globalCompositeOperation = 'source-over';

  const dataURL = offscreen.toDataURL('image/png');
  const win = window.open('', '_blank');
  if (!win) return;
  win.document.write(
    '<!DOCTYPE html><html><head><style>' +
    'body{margin:0;padding:0}img{width:100%;display:block}' +
    '@media print{body{margin:0}}' +
    '</style></head><body>' +
    '<img src="' + dataURL + '" onload="window.print()">' +
    '</body></html>'
  );
  win.document.close();
}

// ===== Print original =====
function printNurie(src) {
  const win = window.open('', '_blank');
  if (!win) return;
  win.document.write(
    '<!DOCTYPE html><html><head><style>' +
    'body{margin:0;padding:0}img{width:100%;display:block}' +
    '</style></head><body>' +
    '<img src="' + src + '" onload="window.print()">' +
    '</body></html>'
  );
  win.document.close();
}

// ===== Init =====
buildPalette();
initSizeBtns();

window.addEventListener('resize', () => {
  if (document.getElementById('coloring-screen').style.display !== 'none') {
    resizeCanvas(document.getElementById('canvas-wrapper'));
  }
});
</script>
</body>
</html>
