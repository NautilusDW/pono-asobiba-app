<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ぬりえ | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8E7;
  --primary: #FBBF24;
  --secondary: #FB923C;
  --text: #5B4A3F;
  --shadow: 0 4px 20px rgba(91,74,63,0.1);
  --radius: 20px;
}

html, body {
  min-height: 100dvh;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: var(--text);
  -webkit-user-select: none;
  user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 16px 40px;
  gap: 16px;
  max-width: 500px;
  margin: 0 auto;
}

/* ===== Header ===== */
.header {
  text-align: center;
  padding: 6px 0;
  position: relative;
  width: 100%;
}
.back-link {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  color: var(--secondary); font-weight: 700; font-size: 0.85rem;
  text-decoration: none; padding: 6px 2px;
}
.header h1 {
  font-size: 1.5rem; font-weight: 900;
  background: linear-gradient(135deg, #FBBF24, #FB923C);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .subtitle { font-size: 0.8rem; color: #A89585; margin-top: 3px; }

/* ===== Nurie Cards ===== */
.nurie-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
  width: 100%;
}

.nurie-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 3px solid #FDE68A;
}

.nurie-card img {
  width: 100%;
  display: block;
  border-bottom: 2px solid #FDE68A;
}

.nurie-label {
  text-align: center;
  font-size: 0.88rem;
  font-weight: 900;
  color: var(--text);
  padding: 10px 0 4px;
}

.nurie-actions {
  display: flex;
  gap: 10px;
  padding: 10px 16px 16px;
  justify-content: center;
}

.btn-dl, .btn-print {
  flex: 1;
  max-width: 160px;
  padding: 11px 8px;
  border-radius: 50px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 900;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: transform 0.15s;
  box-shadow: 0 3px 10px rgba(91,74,63,0.12);
  border: none;
}
.btn-dl:active, .btn-print:active { transform: scale(0.93); }

.btn-dl {
  background: linear-gradient(135deg, #34D399, #059669);
  color: #fff;
}
.btn-print {
  background: linear-gradient(135deg, #60A5FA, #3B82F6);
  color: #fff;
  font-family: inherit;
}

</style>
</head>
<body>


<div id="app">
  <div class="header">
    <a href="../index.html" class="back-link">← メニュー</a>
    <h1>ぬりえ</h1>
    <div class="subtitle">いんさつしてぬってみよう！🖍️</div>
  </div>

  <div class="nurie-list">
    <div class="nurie-card">
      <img src="../assets/images/nurie01.webp" alt="ぬりえ 1">
      <p class="nurie-label">ぬりえ 1</p>
      <div class="nurie-actions">
        <a href="../assets/images/nurie01.webp" download="ぬりえ1.png" class="btn-dl">⬇ ダウンロード</a>
        <button class="btn-print" onclick="printNurie('../assets/images/nurie01.webp')">🖨 いんさつ</button>
      </div>
    </div>

    <div class="nurie-card">
      <img src="../assets/images/nurie02.webp" alt="ぬりえ 2">
      <p class="nurie-label">ぬりえ 2</p>
      <div class="nurie-actions">
        <a href="../assets/images/nurie02.webp" download="ぬりえ2.png" class="btn-dl">⬇ ダウンロード</a>
        <button class="btn-print" onclick="printNurie('../assets/images/nurie02.webp')">🖨 いんさつ</button>
      </div>
    </div>
  </div>
</div>

<script>
// ===== Premium Gate =====
if (localStorage.getItem('pono_premium') !== '1') {
  location.replace('../index.html');
}

// ===== Print =====
function printNurie(src) {
  const win = window.open('', '_blank');
  if (!win) return;
  win.document.write(
    '<!DOCTYPE html><html><head><style>' +
    'body{margin:0;padding:0}img{width:100%;display:block}' +
    '</style></head><body>' +
    '<img src="' + src + '" onload="window.print()">' +
    '</body></html>'
  );
  win.document.close();
}
</script>
</body>
</html>
