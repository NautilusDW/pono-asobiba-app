<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ぬりえ | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="../common/points.js"></script>
<script src="../common/achievements.js"></script>
<script src="../common/menu.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8E7;
  --primary: #FBBF24;
  --secondary: #FB923C;
  --text: #5B4A3F;
  --shadow: 0 4px 20px rgba(91,74,63,0.1);
  --radius: 20px;
}

html, body {
  min-height: 100dvh;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: var(--text);
  -webkit-user-select: none;
  user-select: none;
}

/* 選択画面はスクロール可能に */
#selection-screen {
  touch-action: auto;
  overflow-y: auto;
  height: 100dvh;
}

/* 塗り絵画面はスクロール禁止（描画のため）*/
#coloring-screen {
  touch-action: none;
}

/* ===== Selection Screen ===== */
#selection-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 16px 40px;
  gap: 16px;
  max-width: 500px;
  margin: 0 auto;
}

.header {
  text-align: center;
  padding: 6px 0;
  position: relative;
  width: 100%;
}
.header h1 {
  font-size: 1.5rem; font-weight: 900;
  background: linear-gradient(135deg, #FBBF24, #FB923C);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .subtitle { font-size: 0.8rem; color: #A89585; margin-top: 3px; }

.nurie-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
  width: 100%;
}

.nurie-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 3px solid #FDE68A;
}

.nurie-card img {
  width: 100%;
  display: block;
  border-bottom: 2px solid #FDE68A;
}

.nurie-label {
  text-align: center;
  font-size: 0.88rem;
  font-weight: 900;
  color: var(--text);
  padding: 10px 0 4px;
}

.nurie-actions {
  display: flex;
  gap: 10px;
  padding: 10px 16px 16px;
  justify-content: center;
}

.btn-color, .btn-dl, .btn-print {
  flex: 1;
  max-width: 140px;
  padding: 11px 6px;
  border-radius: 50px;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 900;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: transform 0.15s;
  box-shadow: 0 3px 10px rgba(91,74,63,0.12);
  border: none;
}
.btn-color:active, .btn-dl:active, .btn-print:active { transform: scale(0.93); }

.btn-color {
  background: linear-gradient(135deg, #FB923C, #EF4444);
  color: #fff;
}
.btn-dl {
  background: linear-gradient(135deg, #34D399, #059669);
  color: #fff;
}
.btn-print {
  background: linear-gradient(135deg, #60A5FA, #3B82F6);
  color: #fff;
}

/* ===== Coloring Screen ===== */
#coloring-screen {
  display: none;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  position: relative;
}

.coloring-header {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  background: rgba(255,248,231,0.95);
  backdrop-filter: blur(4px);
  border-bottom: 2px solid #FDE68A;
  gap: 8px;
  flex-shrink: 0;
}

.btn-back {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--secondary);
  cursor: pointer;
  padding: 4px 6px;
  white-space: nowrap;
}

.coloring-title {
  font-size: 1rem;
  font-weight: 900;
  background: linear-gradient(135deg, #FBBF24, #FB923C);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  flex: 1;
  text-align: center;
}

.btn-save, .btn-print-colored {
  background: none;
  border: 2px solid currentColor;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 20px;
}
.btn-save { color: #059669; }
.btn-print-colored { color: #3B82F6; }

/* Canvas area */
.canvas-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #f0f0f0;
  cursor: crosshair;
  touch-action: none;
}

#canvas-transform {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  transform-origin: 0 0;
  will-change: transform;
}

#color-canvas {
  position: absolute;
  top: 0; left: 0;
  background: #fff;
}

#nurie-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  mix-blend-mode: multiply;
  pointer-events: none;
  display: block;
}

/* Pan mode cursor */
.canvas-wrapper.pan-mode {
  cursor: grab;
}
.canvas-wrapper.pan-mode.panning {
  cursor: grabbing;
}

/* Zoom reset button (floating) */
#zoom-reset-btn {
  position: absolute;
  bottom: 8px;
  right: 8px;
  z-index: 50;
  background: rgba(255,248,231,0.92);
  border: 2px solid #FDE68A;
  border-radius: 20px;
  font-family: inherit;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text);
  padding: 4px 10px;
  cursor: pointer;
  display: none;
  box-shadow: var(--shadow);
}

/* Floating canvas buttons */
.canvas-float-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2.5px solid rgba(139,106,85,0.5);
  background: rgba(255,248,231,0.92);
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transition: transform 0.1s;
  padding: 0;
  z-index: 50;
}
.canvas-float-btn:active { transform: scale(0.88); }

.camera-float {
  position: absolute;
  bottom: 14px;
  left: 14px;
}
.camera-float.zoomed {
  background: #E8F4FD;
  border-color: #3388FF;
}

.canvas-float-group.top-left {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 50;
}

.canvas-float-btn.eraser-selected {
  background: #F0E6D8;
  border-color: #8B6A55;
}
.canvas-float-btn.clear-float {
  border-color: rgba(239,68,68,0.6);
}

/* Toolbar */
.toolbar {
  background: rgba(255,248,231,0.97);
  border-top: 2px solid #FDE68A;
  padding: 8px 10px 10px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Color palette */
.palette {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.1s;
  flex-shrink: 0;
}
.swatch:active { transform: scale(0.88); }
.swatch.selected {
  border-color: #5B4A3F;
  transform: scale(1.18);
}

/* Tool row */
.tool-row {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: flex-start;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tool-row::-webkit-scrollbar { display: none; }

/* Brush size buttons */
.size-btn {
  border: 2.5px solid #D0C8BE;
  border-radius: 50%;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
.size-btn.active {
  border-color: var(--primary);
  background: linear-gradient(135deg, var(--primary), var(--secondary));
}
.size-dot {
  border-radius: 50%;
  background: var(--text);
  pointer-events: none;
}
.size-btn.active .size-dot { background: #fff; }
.size-btn[data-size="4"]  { width: 28px; height: 28px; }
.size-btn[data-size="14"] { width: 32px; height: 32px; }
.size-btn[data-size="28"] { width: 36px; height: 36px; }
.size-btn[data-size="50"] { width: 42px; height: 42px; }
.size-btn[data-size="80"] { width: 48px; height: 48px; }
.size-dot-s  { width: 5px;  height: 5px; }
.size-dot-m  { width: 12px; height: 12px; }
.size-dot-l  { width: 20px; height: 20px; }
.size-dot-xl { width: 28px; height: 28px; }
.size-dot-xxl{ width: 36px; height: 36px; }

.rainbow-swatch {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 2.5px solid #D0C8BE;
  background: conic-gradient(red, orange, yellow, green, cyan, blue, violet, red);
  cursor: pointer;
  flex-shrink: 0;
  font-size: 18px;
  box-shadow: var(--shadow);
  transition: all 0.15s;
}
.rainbow-swatch.selected {
  border-color: #FF4444;
  box-shadow: 0 0 0 3px rgba(255,68,68,0.4);
  transform: scale(1.15);
}

/* ブラシカーソル */
#brush-cursor {
  position: fixed;
  border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.55);
  pointer-events: none;
  transform: translate(-50%, -50%);
  display: none;
  z-index: 9999;
}

.bucket-btn {
  padding: 5px 10px;
  border-radius: 20px;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  border: 2px solid #8855FF;
  color: #8855FF;
  background: #fff;
  transition: transform 0.1s;
  white-space: nowrap;
  flex-shrink: 0;
}
.bucket-btn:active { transform: scale(0.92); }
.bucket-btn.selected {
  background: #EDE9FF;
  border-color: #6633CC;
  color: #6633CC;
}

.tool-divider {
  width: 2px;
  height: 28px;
  background: #E5D9C8;
  border-radius: 2px;
  flex-shrink: 0;
}


/* Save slot button */
.btn-slots {
  background: none;
  border: 2px solid #059669;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 20px;
  color: #059669;
  white-space: nowrap;
}

/* Save panel overlay */
.save-panel {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.save-panel-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
}
.save-panel-content {
  position: relative;
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  padding: 14px 14px 24px;
  width: 100%;
  max-width: 540px;
  z-index: 1;
  box-shadow: 0 -4px 24px rgba(91,74,63,0.15);
}
.save-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.save-panel-title {
  font-size: 1rem;
  font-weight: 900;
  color: var(--text);
}
.save-panel-close {
  background: none;
  border: none;
  font-size: 1.1rem;
  cursor: pointer;
  color: #A89585;
  padding: 2px 6px;
}
.save-slots {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.save-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: #fff;
  border-radius: 12px;
  border: 2px solid #E5D9C8;
  padding: 6px 4px 6px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.save-slot.filled {
  border-color: var(--primary);
}
.save-slot-num {
  font-size: 0.65rem;
  font-weight: 700;
  color: #A89585;
}
.save-slot-thumb {
  width: 100%;
  height: 52px;
  object-fit: contain;
  border-radius: 4px;
  background: #f5f5f5;
}
.save-slot-empty-icon {
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  color: #D0C8BE;
  width: 100%;
}
.save-slot-date {
  font-size: 0.58rem;
  color: #A89585;
  text-align: center;
  line-height: 1.3;
  min-height: 1.8em;
}
.save-slot-btns {
  display: flex;
  flex-direction: column;
  gap: 3px;
  width: 100%;
}
.save-slot-btns button {
  width: 100%;
  padding: 3px 2px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.58rem;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid;
  background: #fff;
  transition: transform 0.1s;
}
.save-slot-btns button:active { transform: scale(0.93); }
.btn-slot-save  { border-color: #059669 !important; color: #059669 !important; }
.btn-slot-load  { border-color: #3388FF !important; color: #3388FF !important; }
.btn-slot-del   { border-color: #EF4444 !important; color: #EF4444 !important; }

/* Fullscreen button */
.btn-fullscreen {
  background: none;
  border: 2px solid #A89585;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  padding: 3px 7px;
  border-radius: 8px;
  color: #5B4A3F;
  line-height: 1;
}

/* ===== Landscape layout ===== */
@media (orientation: landscape) {
  #coloring-screen {
    flex-direction: row;
  }

  /* Header floats over canvas top-left */
  .coloring-header {
    position: absolute;
    top: 0; left: 0;
    z-index: 20;
    border-bottom: none;
    border-radius: 0 0 12px 0;
    background: rgba(255,248,231,0.88);
    padding: 5px 10px;
    gap: 6px;
    width: auto;
  }
  .coloring-title { display: none; }

  /* Canvas takes left side */
  .canvas-wrapper {
    position: relative; /* already is, but ensure for absolute header */
    flex: 1;
    height: 100%;
  }

  /* Toolbar becomes right sidebar */
  .toolbar {
    flex-direction: column;
    border-top: none;
    border-left: 2px solid #FDE68A;
    width: 80px;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    flex-shrink: 0;
    padding: 8px 5px;
    align-items: center;
    gap: 5px;
    scrollbar-width: none;
  }
  .toolbar::-webkit-scrollbar { display: none; }

  /* Palette stacks vertically */
  .palette {
    flex-direction: column;
    flex-wrap: nowrap;
    gap: 3px;
    align-items: center;
    justify-content: flex-start;
  }

  /* Tool row stacks vertically */
  .tool-row {
    flex-direction: column;
    overflow-x: visible;
    overflow-y: visible;
    justify-content: flex-start;
    align-items: center;
    gap: 3px;
  }

  /* Divider becomes horizontal line */
  .tool-divider {
    width: 60px;
    height: 2px;
  }

  /* Action buttons fill sidebar width */
  .bucket-btn {
    width: 68px;
    font-size: 0.68rem;
    padding: 5px 3px;
    text-align: center;
    white-space: normal;
    line-height: 1.2;
  }
}
</style>
</head>

      </div>

  </div>
</div>

<!-- ===== Coloring Screen ===== -->
<div id="coloring-screen">
  <div class="coloring-header">
    <div class="coloring-title" id="coloring-title">ぬりえ</div>
    <button class="btn-slots" onclick="openSavePanel()">💾 セーブ</button>
    <button class="btn-save" onclick="saveColored()">⬇ ほぞん</button>
    <button class="btn-fullscreen" id="btn-fullscreen" onclick="toggleFullscreen()" title="全画面">⛶</button>
  </div>

  <!-- Save Panel -->
  <div id="save-panel" class="save-panel" style="display:none;">
    <div class="save-panel-backdrop" onclick="closeSavePanel()"></div>
    <div class="save-panel-content">
      <div class="save-panel-header">
        <span class="save-panel-title">💾 セーブ / ロード</span>
        <button class="save-panel-close" onclick="closeSavePanel()">✕</button>
      </div>
      <div class="save-slots" id="save-slots"></div>
    </div>
  </div>

  <div class="canvas-wrapper" id="canvas-wrapper">
    <div id="canvas-transform">
      <canvas id="color-canvas"></canvas>
      <img id="nurie-overlay" alt="ぬりえ">
    </div>
    <button id="zoom-reset-btn" onclick="resetZoom()">1:1 もどす</button>
    <button class="canvas-float-btn camera-float" id="camera-btn" onclick="cycleZoom()">🔍</button>
    <div class="canvas-float-group top-left">
      <button class="canvas-float-btn" id="eraser-btn" onclick="toggleEraser()">🧹</button>
      <button class="canvas-float-btn" onclick="undo()">↩</button>
      <button class="canvas-float-btn clear-float" onclick="clearCanvas()">🗑</button>
    </div>
  </div>
  <div id="brush-cursor"></div>

  <div class="toolbar">
    <div class="palette" id="palette">
      <button class="rainbow-swatch" id="rainbow-btn" onclick="toggleRainbow()">🌈</button>
    </div>
    <div class="tool-row">
      <button class="size-btn active" data-size="4"><span class="size-dot size-dot-s"></span></button>
      <button class="size-btn" data-size="14"><span class="size-dot size-dot-m"></span></button>
      <button class="size-btn" data-size="28"><span class="size-dot size-dot-l"></span></button>
      <button class="size-btn" data-size="50"><span class="size-dot size-dot-xl"></span></button>

    <div class="tool-row">
      <button class="bucket-btn" id="bucket-btn" onclick="toggleMask()">✏️ はみ出し防止</button>
    </div>
  </div>
</div>

<script>
// ===== Color palette =====
const COLORS = [
  '#FF4444', '#FF8800', '#FFCC00', '#88DD00',
  '#00CC66', '#00BBDD', '#3388FF', '#8855FF',
  '#FF55AA', '#AA6633', '#FFD9A8', '#FFB380',
  '#FFFFFF', '#222222',
];

let currentColor = COLORS[0];
let brushSize = 4;
let isEraser = false;
let isBucket = true;  // はみ出し防止デフォルトON
let isRainbow = false;
let rainbowHue = 0;

function buildPalette() {
  const palette = document.getElementById('palette');
  COLORS.forEach((col, i) => {
    const sw = document.createElement('button');
    sw.className = 'swatch' + (i === 0 ? ' selected' : '');
    sw.style.background = col;
    if (col === '#FFFFFF') sw.style.boxShadow = 'inset 0 0 0 1px #ccc';
    sw.onclick = () => selectColor(col, sw);
    palette.appendChild(sw);
  });
}

function selectColor(col, sw) {
  currentColor = col;
  isEraser = false;
  isRainbow = false;
  document.getElementById('eraser-btn').classList.remove('eraser-selected');
  document.getElementById('rainbow-btn').classList.remove('selected');
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  sw.classList.add('selected');
}

function toggleRainbow() {
  isRainbow = !isRainbow;
  isEraser = false;
  document.getElementById('rainbow-btn').classList.toggle('selected', isRainbow);
  document.getElementById('eraser-btn').classList.remove('eraser-selected');
  document.getElementById('bucket-btn').classList.remove('selected');
  if (!isRainbow) {
    const idx = COLORS.indexOf(currentColor);
    if (idx >= 0) document.querySelectorAll('.swatch')[idx].classList.add('selected');
  } else {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  }
}

// Size buttons (set up after DOM ready)
function initSizeBtns() {
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      brushSize = parseInt(btn.dataset.size);
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

function toggleEraser() {
  isEraser = !isEraser;
  isBucket = false;
  isRainbow = false;
  document.getElementById('eraser-btn').classList.toggle('eraser-selected', isEraser);
  document.getElementById('bucket-btn').classList.remove('selected');
  document.getElementById('rainbow-btn').classList.remove('selected');
  if (!isEraser) {
    const swatches = document.querySelectorAll('.swatch');
    const idx = COLORS.indexOf(currentColor);
    if (idx >= 0) swatches[idx].classList.add('selected');
  }
}

function toggleMask() {
  isBucket = !isBucket;
  isEraser = false;
  if (!isBucket) activeMask = null;
  document.getElementById('bucket-btn').classList.toggle('selected', isBucket);
  document.getElementById('eraser-btn').classList.remove('eraser-selected');
}

// ===== Line mask (はみ出し防止) =====
let nuriePixelData = null;  // ぬりえ原寸ピクセルキャッシュ
let nurieNW = 0, nurieNH = 0; // ぬりえ画像の自然サイズ
let currentNurieSrc = '';
let lineThreshold = 180;

function loadNurieImg(src) {
  currentNurieSrc = src;
  nuriePixelData = null;
  const loader = new Image();
  loader.crossOrigin = 'anonymous';
  loader.onload = () => {
    if (src !== currentNurieSrc) return;
    nurieNW = loader.naturalWidth;
    nurieNH = loader.naturalHeight;
    const tmp = document.createElement('canvas');
    tmp.width = nurieNW; tmp.height = nurieNH;
    const tc = tmp.getContext('2d');
    try {
      tc.drawImage(loader, 0, 0);
      nuriePixelData = tc.getImageData(0, 0, nurieNW, nurieNH).data;
    } catch(e) { nuriePixelData = null; }
  };
  loader.onerror = () => { nuriePixelData = null; };
  loader.src = src;
}

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}


// ===== はみ出し防止（領域マスク方式）=====
// キャンバスピクセル → ぬりえネイティブ画像ピクセル の変換係数
function getNurieMapping() {
  const nw = nurieNW, nh = nurieNH;
  const canvasRect = canvas.getBoundingClientRect();
  const overlayRect = document.getElementById('nurie-overlay').getBoundingClientRect();
  const imgRatio = nw / nh;
  const elRatio = overlayRect.width / overlayRect.height;
  let imgW, imgH, imgLeft, imgTop;
  if (imgRatio > elRatio) {
    imgW = overlayRect.width; imgH = overlayRect.width / imgRatio;
    imgLeft = overlayRect.left; imgTop = overlayRect.top + (overlayRect.height - imgH) / 2;
  } else {
    imgH = overlayRect.height; imgW = overlayRect.height * imgRatio;
    imgLeft = overlayRect.left + (overlayRect.width - imgW) / 2; imgTop = overlayRect.top;
  }
  const cssPerPxX = canvasRect.width / canvas.width;
  const cssPerPxY = canvasRect.height / canvas.height;
  return {
    ax: cssPerPxX * nw / imgW, bx: (canvasRect.left - imgLeft) * nw / imgW,
    ay: cssPerPxY * nh / imgH, by: (canvasRect.top - imgTop) * nh / imgH,
    nw, nh
  };
}

// タッチ開始点からフラッドフィルで閉じた領域を activeMask として確定
let activeMask = null;

function createRegionMask(startX, startY) {
  activeMask = null;
  if (!nuriePixelData) return;
  const { ax, bx, ay, by, nw, nh } = getNurieMapping();
  const w = canvas.width, h = canvas.height;
  const sx = Math.round(startX), sy = Math.round(startY);
  if (sx < 0 || sx >= w || sy < 0 || sy >= h) return;

  // 開始点がライン上なら領域なし
  const snx = Math.round(ax * sx + bx), sny = Math.round(ay * sy + by);
  if (snx >= 0 && snx < nw && sny >= 0 && sny < nh) {
    const si = (sny * nw + snx) * 4;
    if ((nuriePixelData[si] + nuriePixelData[si+1] + nuriePixelData[si+2]) / 3 < lineThreshold) return;
  }

  const mask = new Uint8Array(w * h);
  const visited = new Uint8Array(w * h);
  const stack = [sy * w + sx];
  visited[sy * w + sx] = 1;

  while (stack.length) {
    const idx = stack.pop();
    const x = idx % w, y = (idx / w) | 0;
    const nx = Math.round(ax * x + bx), ny = Math.round(ay * y + by);
    if (nx >= 0 && nx < nw && ny >= 0 && ny < nh) {
      const ni = (ny * nw + nx) * 4;
      if ((nuriePixelData[ni] + nuriePixelData[ni+1] + nuriePixelData[ni+2]) / 3 < lineThreshold) continue;
    }
    mask[idx] = 1;
    if (x > 0   && !visited[idx-1]) { visited[idx-1] = 1; stack.push(idx-1); }
    if (x < w-1 && !visited[idx+1]) { visited[idx+1] = 1; stack.push(idx+1); }
    if (y > 0   && !visited[idx-w]) { visited[idx-w] = 1; stack.push(idx-w); }
    if (y < h-1 && !visited[idx+w]) { visited[idx+w] = 1; stack.push(idx+w); }
  }
  activeMask = mask;
}

// マスク外をストローク開始前の状態に戻す（白ではなく保存済みデータで復元）
let strokeSavedData = null;

function applyRegionMask(x0, y0, x1, y1) {
  if (!activeMask || !strokeSavedData) return;
  const w = canvas.width, h = canvas.height;
  const cx0 = Math.max(0, Math.round(x0)), cy0 = Math.max(0, Math.round(y0));
  const cx1 = Math.min(w-1, Math.round(x1)), cy1 = Math.min(h-1, Math.round(y1));
  const rw = cx1 - cx0 + 1, rh = cy1 - cy0 + 1;
  if (rw <= 0 || rh <= 0) return;
  const imgData = ctx.getImageData(cx0, cy0, rw, rh);
  const px = imgData.data;
  const saved = strokeSavedData.data;
  let changed = false;
  for (let ry = 0; ry < rh; ry++) {
    for (let rx = 0; rx < rw; rx++) {
      if (!activeMask[(cy0 + ry) * w + (cx0 + rx)]) {
        const pi = (ry * rw + rx) * 4;
        const si = ((cy0 + ry) * w + (cx0 + rx)) * 4;
        if (px[pi] !== saved[si] || px[pi+1] !== saved[si+1] || px[pi+2] !== saved[si+2]) {
          px[pi] = saved[si]; px[pi+1] = saved[si+1]; px[pi+2] = saved[si+2]; px[pi+3] = saved[si+3];
          changed = true;
        }
      }
    }
  }
  if (changed) ctx.putImageData(imgData, cx0, cy0);
}

// ===== Undo =====
const MAX_HISTORY = 12;
let history = [];

function saveHistory() {
  history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  if (history.length > MAX_HISTORY) history.shift();
}

function undo() {
  if (!history.length) return;
  ctx.putImageData(history.pop(), 0, 0);
}

// ===== Canvas drawing =====
const canvas = document.getElementById('color-canvas');
const ctx = canvas.getContext('2d');

let drawing = false;
let lastX = 0, lastY = 0;
// ストローク全体のダーティ矩形（endDrawでのクリーンアップ範囲）
let strokeX0 = 0, strokeY0 = 0, strokeX1 = 0, strokeY1 = 0;

function getPos(e, rect) {
  if (e.touches) {
    const t = e.touches[0];
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  if (isPanMode) return;
  const rect = canvas.getBoundingClientRect();
  const pos = getPos(e, rect);
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = pos.x * scaleX, y = pos.y * scaleY;

  const snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  history.push(snapshot);
  if (history.length > MAX_HISTORY) history.shift();
  // はみ出し防止ONなら開始点で領域を確定し、ストローク前状態を保存
  if (isBucket && !isEraser) {
    strokeSavedData = snapshot;
    createRegionMask(x, y);
  }
  drawing = true;
  lastX = x; lastY = y;
  strokeX0 = x - brushSize; strokeY0 = y - brushSize;
  strokeX1 = x + brushSize; strokeY1 = y + brushSize;
  const dotColor = isEraser ? '#FFFFFF' : (isRainbow ? `hsl(${rainbowHue},90%,55%)` : currentColor);
  if (isRainbow) rainbowHue = (rainbowHue + 3) % 360;
  ctx.beginPath();
  ctx.arc(lastX, lastY, brushSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = dotColor;
  ctx.fill();
  if (isBucket && !isEraser) applyRegionMask(strokeX0, strokeY0, strokeX1, strokeY1);
}

function doDraw(e) {
  e.preventDefault();
  if (!drawing) return;
  const rect = canvas.getBoundingClientRect();
  const pos = getPos(e, rect);
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = pos.x * scaleX;
  const y = pos.y * scaleY;

  const strokeColor = isEraser ? '#FFFFFF' : (isRainbow ? `hsl(${rainbowHue},90%,55%)` : currentColor);
  if (isRainbow) rainbowHue = (rainbowHue + 3) % 360;
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  if (isBucket && !isEraser) {
    const x0 = Math.min(lastX, x) - brushSize;
    const y0 = Math.min(lastY, y) - brushSize;
    const x1 = Math.max(lastX, x) + brushSize;
    const y1 = Math.max(lastY, y) + brushSize;
    applyRegionMask(x0, y0, x1, y1);
    // ストローク全体のダーティ矩形を拡張
    strokeX0 = Math.min(strokeX0, x0); strokeY0 = Math.min(strokeY0, y0);
    strokeX1 = Math.max(strokeX1, x1); strokeY1 = Math.max(strokeY1, y1);
  }

  lastX = x;
  lastY = y;
}

function endDrawInternal() {
  if (drawing && isBucket && !isEraser) applyRegionMask(strokeX0, strokeY0, strokeX1, strokeY1);
  drawing = false;
}

function endDraw(e) {
  e.preventDefault();
  endDrawInternal();
}

// ===== ブラシカーソル =====
const brushCursor = document.getElementById('brush-cursor');

function updateBrushCursor(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const cssBrush = brushSize * (rect.width / canvas.width);
  brushCursor.style.width  = cssBrush + 'px';
  brushCursor.style.height = cssBrush + 'px';
  brushCursor.style.left   = clientX + 'px';
  brushCursor.style.top    = clientY + 'px';
}

canvas.addEventListener('mouseenter', () => {
  canvas.style.cursor = 'none';
  brushCursor.style.display = 'block';
});
canvas.addEventListener('mouseleave', () => {
  canvas.style.cursor = '';
  brushCursor.style.display = 'none';
});
canvas.addEventListener('mousemove', (e) => { updateBrushCursor(e.clientX, e.clientY); });

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', doDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);

// ===== ズーム / パン =====
let zoomScale = 1;
let panX = 0, panY = 0;
let isPanMode = false;
const ZOOM_STEPS = [1, 2, 3];
let zoomStepIndex = 0;

function applyTransform() {
  document.getElementById('canvas-transform').style.transform =
    `translate(${panX}px, ${panY}px) scale(${zoomScale})`;
  document.getElementById('zoom-reset-btn').style.display = zoomScale > 1.01 ? 'block' : 'none';
  // カメラボタンの表示更新
  const camBtn = document.getElementById('camera-btn');
  const zoomed = zoomScale > 1.01;
  if (zoomed) {
    camBtn.textContent = '×' + Math.round(zoomScale);
    camBtn.classList.add('zoomed');
  } else {
    camBtn.textContent = '🔍';
    camBtn.classList.remove('zoomed');
  }
  // ズーム中はドラッグ=パン、×1はドラッグ=描画
  isPanMode = zoomed;
  document.getElementById('canvas-wrapper').classList.toggle('pan-mode', zoomed);
}

function clampPan() {
  const wrapper = document.getElementById('canvas-wrapper');
  const ww = wrapper.clientWidth, wh = wrapper.clientHeight;
  panX = Math.min(0, Math.max(ww * (1 - zoomScale), panX));
  panY = Math.min(0, Math.max(wh * (1 - zoomScale), panY));
}

function resetZoom() {
  zoomScale = 1; panX = 0; panY = 0;
  zoomStepIndex = 0;
  applyTransform();
  document.getElementById('canvas-wrapper').classList.remove('panning');
}

function cycleZoom() {
  zoomStepIndex = (zoomStepIndex + 1) % ZOOM_STEPS.length;
  const newScale = ZOOM_STEPS[zoomStepIndex];
  // ズーム時は中心を基準にする
  const wrapperEl = document.getElementById('canvas-wrapper');
  const ww = wrapperEl.clientWidth, wh = wrapperEl.clientHeight;
  const cx = ww / 2, cy = wh / 2;
  panX = cx - (cx - panX) * (newScale / zoomScale);
  panY = cy - (cy - panY) * (newScale / zoomScale);
  zoomScale = newScale;
  clampPan();
  applyTransform();
}


// ピンチ/ホイール後のステップ同期
function syncPanMode() {
  if (zoomScale <= 1.01) zoomStepIndex = 0;
  else if (zoomScale <= 2.5) zoomStepIndex = 1;
  else zoomStepIndex = 2;
}

// --- Touch handling ---
let pinchPrevDist = 0, pinchPrevMidX = 0, pinchPrevMidY = 0;
let panTouchStartX = 0, panTouchStartY = 0, panStartX = 0, panStartY = 0;
let isGesturing = false;
let lastTapTime = 0;

const wrapper = document.getElementById('canvas-wrapper');

wrapper.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length === 2) {
    isGesturing = true;
    endDrawInternal();
    const t0 = e.touches[0], t1 = e.touches[1];
    pinchPrevDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    pinchPrevMidX = (t0.clientX + t1.clientX) / 2;
    pinchPrevMidY = (t0.clientY + t1.clientY) / 2;
  } else if (e.touches.length === 1) {
    const now = Date.now();
    if (now - lastTapTime < 280) { resetZoom(); lastTapTime = 0; return; }
    lastTapTime = now;
    isGesturing = false;
    if (isPanMode) {
      panStartX = panX; panStartY = panY;
      panTouchStartX = e.touches[0].clientX;
      panTouchStartY = e.touches[0].clientY;
      wrapper.classList.add('panning');
    } else {
      startDraw(e);
    }
  }
}, { passive: false });

wrapper.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 2) {
    isGesturing = true;
    endDrawInternal();
    const t0 = e.touches[0], t1 = e.touches[1];
    const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    const midX = (t0.clientX + t1.clientX) / 2;
    const midY = (t0.clientY + t1.clientY) / 2;
    const wRect = wrapper.getBoundingClientRect();
    const localMidX = midX - wRect.left;
    const localMidY = midY - wRect.top;
    const newScale = Math.min(5, Math.max(1, zoomScale * (dist / pinchPrevDist)));
    // ピンチ中心を固定しながらスケール変更
    panX = localMidX - (localMidX - panX) * (newScale / zoomScale);
    panY = localMidY - (localMidY - panY) * (newScale / zoomScale);
    // 中点の移動分をパンに加算
    panX += midX - pinchPrevMidX;
    panY += midY - pinchPrevMidY;
    zoomScale = newScale;
    syncPanMode();
    clampPan();
    applyTransform();
    pinchPrevDist = dist; pinchPrevMidX = midX; pinchPrevMidY = midY;
  } else if (e.touches.length === 1 && !isGesturing) {
    if (isPanMode) {
      panX = panStartX + e.touches[0].clientX - panTouchStartX;
      panY = panStartY + e.touches[0].clientY - panTouchStartY;
      clampPan();
      applyTransform();
    } else {
      doDraw(e);
    }
  }
}, { passive: false });

wrapper.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (e.touches.length < 2) isGesturing = false;
  if (e.touches.length === 0) {
    wrapper.classList.remove('panning');
    if (!isPanMode) endDrawInternal();
  }
}, { passive: false });

// マウスドラッグでパン (PC — ズーム中のみ)
let mousePanning = false;
wrapper.addEventListener('mousedown', (e) => {
  if (isPanMode) {
    mousePanning = true;
    panStartX = panX; panStartY = panY;
    panTouchStartX = e.clientX; panTouchStartY = e.clientY;
    wrapper.classList.add('panning');
    e.preventDefault();
  }
});
wrapper.addEventListener('mousemove', (e) => {
  if (mousePanning) {
    panX = panStartX + e.clientX - panTouchStartX;
    panY = panStartY + e.clientY - panTouchStartY;
    clampPan();
    applyTransform();
    e.preventDefault();
  }
});
wrapper.addEventListener('mouseup', () => {
  if (mousePanning) { mousePanning = false; wrapper.classList.remove('panning'); }
});
wrapper.addEventListener('mouseleave', () => {
  if (mousePanning) { mousePanning = false; wrapper.classList.remove('panning'); }
});

// マウスホイールでズーム (PC)
wrapper.addEventListener('wheel', (e) => {
  e.preventDefault();
  const wRect = wrapper.getBoundingClientRect();
  const lx = e.clientX - wRect.left, ly = e.clientY - wRect.top;
  const delta = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const newScale = Math.min(5, Math.max(1, zoomScale * delta));
  panX = lx - (lx - panX) * (newScale / zoomScale);
  panY = ly - (ly - panY) * (newScale / zoomScale);
  zoomScale = newScale;
  syncPanMode();
  clampPan();
  applyTransform();
}, { passive: false });

function clearCanvas() {
  if (!confirm('ぜんぶけしますか？')) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function resizeCanvas(wrapper, preserveContent) {
  const w = wrapper.clientWidth;
  const h = wrapper.clientHeight;

  const img = document.getElementById('nurie-overlay');
  const imgRatio = img.naturalWidth / img.naturalHeight;
  const wrapRatio = w / h;

  let cw, ch;
  if (imgRatio > wrapRatio) {
    cw = w; ch = w / imgRatio;
  } else {
    ch = h; cw = h * imgRatio;
  }

  const newW = Math.round(cw);
  const newH = Math.round(ch);

  // リサイズ時に既存の描画内容を保持
  let saved = null;
  if (preserveContent && canvas.width > 0 && canvas.height > 0) {
    try { saved = canvas.toDataURL(); } catch(e) {}
  }

  canvas.width = newW;
  canvas.height = newH;
  canvas.style.left = Math.round((w - cw) / 2) + 'px';
  canvas.style.top = Math.round((h - ch) / 2) + 'px';
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';

  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (saved) {
    const restore = new Image();
    restore.onload = () => {
      ctx.drawImage(restore, 0, 0, newW, newH);
    };
    restore.src = saved;
  }

  resetZoom();
}

// ===== セーブ / ロード =====
const MAX_SAVE_SLOTS = 5;
let currentNurieIdx = 0;

function getNurieIdx(src) {
  const m = src.match(/nurie(\d+)/);
  return m ? parseInt(m[1]) : 0;
}
function getSaveKey(idx, slot) {
  return `nurie_coloring_${idx}_${slot}`;
}

function openSavePanel() {
  updateSavePanel();
  document.getElementById('save-panel').style.display = 'flex';
}
function closeSavePanel() {
  document.getElementById('save-panel').style.display = 'none';
}

function updateSavePanel() {
  const container = document.getElementById('save-slots');
  container.innerHTML = '';
  for (let i = 0; i < MAX_SAVE_SLOTS; i++) {
    const raw = localStorage.getItem(getSaveKey(currentNurieIdx, i));
    const data = raw ? JSON.parse(raw) : null;
    const slot = document.createElement('div');
    slot.className = 'save-slot' + (data ? ' filled' : '');
    if (data) {
      const d = new Date(data.timestamp);
      const dateStr = `${d.getMonth()+1}/${d.getDate()}<br>${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      slot.innerHTML = `
        <div class="save-slot-num">${i+1}</div>
        <img class="save-slot-thumb" src="${data.canvas}" alt="slot${i+1}">
        <div class="save-slot-date">${dateStr}</div>
        <div class="save-slot-btns">
          <button class="btn-slot-load" onclick="loadFromSlot(${i})">読み込み</button>
          <button class="btn-slot-save" onclick="saveToSlot(${i})">上書き</button>
          <button class="btn-slot-del"  onclick="deleteSlot(${i})">削除</button>
        </div>`;
    } else {
      slot.innerHTML = `
        <div class="save-slot-num">${i+1}</div>
        <div class="save-slot-empty-icon">＋</div>
        <div class="save-slot-date">空き</div>
        <div class="save-slot-btns">
          <button class="btn-slot-save" onclick="saveToSlot(${i})">保存する</button>
        </div>`;
    }
    container.appendChild(slot);
  }
}

function saveToSlot(slot) {
  const dataURL = canvas.toDataURL('image/jpeg', 0.75);
  const data = { canvas: dataURL, timestamp: Date.now() };
  try {
    localStorage.setItem(getSaveKey(currentNurieIdx, slot), JSON.stringify(data));
  } catch(e) {
    alert('保存できませんでした（容量不足）');
    return;
  }
  updateSavePanel();
}

function loadFromSlot(slot) {
  const raw = localStorage.getItem(getSaveKey(currentNurieIdx, slot));
  if (!raw) return;
  const data = JSON.parse(raw);
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  };
  img.src = data.canvas;
  closeSavePanel();
}

function deleteSlot(slot) {
  if (!confirm(`スロット${slot+1}を削除しますか？`)) return;
  localStorage.removeItem(getSaveKey(currentNurieIdx, slot));
  updateSavePanel();
}

// ===== Navigation =====
let currentNurieName = '';

function startColoring(src, name) {
  currentNurieName = name;
  currentNurieIdx = getNurieIdx(src);
  document.getElementById('coloring-title').textContent = name;

  const selScreen = document.getElementById('selection-screen');
  const colScreen = document.getElementById('coloring-screen');
  selScreen.style.display = 'none';
  colScreen.style.display = 'flex';

  currentNurieSrc = src;
  loadNurieImg(src);
  const img = document.getElementById('nurie-overlay');
  img.onload = () => { resizeCanvas(document.getElementById('canvas-wrapper')); };
  if (img.getAttribute('src') === src) {
    resizeCanvas(document.getElementById('canvas-wrapper'));
  } else {
    img.src = src;
  }
}

function backToSelection() {
  activeMask = null;
  resetZoom();
  document.getElementById('selection-screen').style.display = 'flex';
  document.getElementById('coloring-screen').style.display = 'none';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ===== Save =====
function saveColored() {
  const offscreen = document.createElement('canvas');
  offscreen.width = canvas.width;
  offscreen.height = canvas.height;
  const octx = offscreen.getContext('2d');

  octx.drawImage(canvas, 0, 0);

  const overlay = document.getElementById('nurie-overlay');
  octx.globalCompositeOperation = 'multiply';
  octx.drawImage(overlay, 0, 0, offscreen.width, offscreen.height);
  octx.globalCompositeOperation = 'source-over';

  const link = document.createElement('a');
  link.download = currentNurieName + '_いろぬり.png';
  link.href = offscreen.toDataURL('image/png');
  link.click();
  awardPoints(5);
  if (window.incrementStat) window.incrementStat('coloring_complete', 1);
}

// ===== Print colored =====
function printColored() {
  const offscreen = document.createElement('canvas');
  offscreen.width = canvas.width;
  offscreen.height = canvas.height;
  const octx = offscreen.getContext('2d');

  octx.drawImage(canvas, 0, 0);

  const overlay = document.getElementById('nurie-overlay');
  octx.globalCompositeOperation = 'multiply';
  octx.drawImage(overlay, 0, 0, offscreen.width, offscreen.height);
  octx.globalCompositeOperation = 'source-over';

  const dataURL = offscreen.toDataURL('image/png');
  const win = window.open('', '_blank');
  if (!win) return;
  win.document.write(
    '<!DOCTYPE html><html><head><style>' +
    'body{margin:0;padding:0}img{width:100%;display:block}' +
    '@media print{body{margin:0}}' +
    '</style></head><body>' +
    '<img src="' + dataURL + '" onload="window.print()">' +
    '</body></html>'
  );
  win.document.close();
}

// ===== Print original =====
function printNurie(src) {
  const win = window.open('', '_blank');
  if (!win) return;
  win.document.write(
    '<!DOCTYPE html><html><head><style>' +
    'body{margin:0;padding:0}img{width:100%;display:block}' +
    '</style></head><body>' +
    '<img src="' + src + '" onload="window.print()">' +
    '</body></html>'
  );
  win.document.close();
}

// ===== Fullscreen =====
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}
document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('btn-fullscreen');
  if (btn) btn.textContent = document.fullscreenElement ? '⊠' : '⛶';
});

// ===== Init =====
buildPalette();
initSizeBtns();
// はみ出し防止デフォルトON: ボタン状態を反映
document.getElementById('bucket-btn').classList.add('selected');

window.addEventListener('resize', () => {
  if (document.getElementById('coloring-screen').style.display !== 'none') {
    resizeCanvas(document.getElementById('canvas-wrapper'), true);
  }
});

initMenu();
</script>
