name: Production URL Monitor

# 本番 URL (custom domain + workers.dev サブドメイン) の到達性を定期監視する。
#
# 背景: 2026-07-10、Cloudflare ダッシュボード側で本番 worker
# `pono-asobiba-app` の workers.dev サブドメイン トグルが (原因調査中だが)
# 無効化され、`pono-asobiba-app.ndw.workers.dev` が全パス 404 (error code: 1042)
# になる事故が同日中に複数回発生した。deploy.yml (push トリガー) だけでは
# 「デプロイしていないのに壊れる」系の事故を検知できないため、
# 定期実行 (cron) で外形監視する。
#
# 注意:
# - このワークフローは読み取り専用の外形監視のみを行う。deploy.yml には一切手を加えない。
# - 失敗すると GitHub Actions の標準通知 (Settings > Notifications の設定に従う)
#   によりリポジトリ watcher へ失敗メールが自動送信される。
# - 一過性のネットワークゆらぎで誤報しないよう、各 URL は 1 回だけ 30 秒後にリトライする。

on:
  schedule:
    # 6時間ごと (UTC)。 cron は UTC 基準で解釈される。
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-production-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Check workers.dev subdomain (pono-asobiba-app.ndw.workers.dev)
        run: |
          url="https://pono-asobiba-app.ndw.workers.dev/"
          echo "Checking $url"
          if curl -sf -o /dev/null --max-time 15 "$url"; then
            echo "OK: $url"
          else
            echo "First attempt failed for $url, retrying in 30s..."
            sleep 30
            if curl -sf -o /dev/null --max-time 15 "$url"; then
              echo "OK on retry: $url"
            else
              echo "FAILED: $url is unreachable after retry (see error body below if any)"
              curl -sS -o /dev/null -w 'HTTP status: %{http_code}\n' --max-time 15 "$url" || true
              exit 1
            fi
          fi

      - name: Check custom domain (pono.kodama-no-mori.com)
        run: |
          url="https://pono.kodama-no-mori.com/"
          echo "Checking $url"
          if curl -sf -o /dev/null --max-time 15 "$url"; then
            echo "OK: $url"
          else
            echo "First attempt failed for $url, retrying in 30s..."
            sleep 30
            if curl -sf -o /dev/null --max-time 15 "$url"; then
              echo "OK on retry: $url"
            else
              echo "FAILED: $url is unreachable after retry (see error body below if any)"
              curl -sS -o /dev/null -w 'HTTP status: %{http_code}\n' --max-time 15 "$url" || true
              exit 1
            fi
          fi
