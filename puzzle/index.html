<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ポノのなかよしパズル | ポノのあそびば</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="partner-select.css">
  <script src="../common/mvp-flags.js"></script>
  <script src="../common/achievements.js"></script>
  <script src="../common/acorns.js"></script>
  <script src="../common/menu.js"></script>
  <script src="../common/treasure.js"></script>
  <script src="../common/first-clear.js"></script>
  <script src="../js/game-stickers.js"></script>
  <script src="../common/tier.js"></script>
<script defer src="https://cloud.umami.is/script.js" data-website-id="89d02cb9-6bec-4f30-a21a-65321374dbdc"></script>
</head>
<body>
  <div id="landscape-notice">
    <div class="rotate-icon">📱</div>
    <p>スマホを<br><strong>よこむき</strong>にしてね！</p>
  </div>
  <audio id="bgm" loop src="../assets/audio/Cheery Strike Loop2.mp3" preload="auto"></audio>
  <div id="title-screen" class="title-screen" role="button" aria-label="タップしてスタート">
    <div class="title-screen__veil"></div>
    <div class="title-screen__content">
      <img class="title-screen__logo" src="../assets/images/puzzle/title_logo.png" alt="ポノのなかよしパズル">
      <div class="title-screen__start">▶ タップしてスタート</div>
    </div>
  </div>
  <div id="title-guide-choice" class="title-guide-choice hidden" role="dialog" aria-modal="true" aria-labelledby="title-guide-choice-title" aria-hidden="true">
    <div class="title-guide-choice__panel">
      <h2 id="title-guide-choice-title" class="title-guide-choice__title">パズルの やりかたを</h2>
      <div class="title-guide-choice__actions">
        <button type="button" id="title-guide-show" class="title-guide-choice__btn title-guide-choice__btn--learn">みる</button>
        <button type="button" id="title-guide-start" class="title-guide-choice__btn title-guide-choice__btn--play">みない</button>
      </div>
      <label class="title-guide-choice__skip">
        <input type="checkbox" id="title-guide-skip">
        <span>つぎから とばす</span>
      </label>
    </div>
  </div>

  <!-- Opening cutscene overlay (owl-doctor style: wooden-frame narration + per-cut audio) -->
  <div id="puzzle-opening" class="puzzle-op hidden" aria-hidden="true">
    <div class="puzzle-op__stage">
      <img class="puzzle-op__img is-active" id="puzzle-op-img-a" src="../assets/images/puzzle/opening/cut01.jpg" alt="">
      <img class="puzzle-op__img" id="puzzle-op-img-b" src="" alt="">
    </div>
    <div class="puzzle-op__narration" id="puzzle-op-narration"></div>
    <button type="button" id="op-skip" class="puzzle-op__skip" aria-label="スキップ">スキップ ▶︎</button>
    <div class="puzzle-op__fade" id="puzzle-op-fade"></div>
    <audio id="op-narration" preload="auto"></audio>
  </div>

  <div class="tut-dim hidden" id="tut-dim"></div>
  <div class="tut-bubble hidden" id="tut-bubble"></div>
  <div class="page-wrapper">
    <header class="header">
      <h1 class="title">ポノのなかよしパズル</h1>
      <p id="stage-label" class="stage-label">ステージ 1 / 4</p>
    </header>

    <main class="main">
      <div class="puzzle-frame">
        <div id="puzzle-container"></div>
        <div id="loading" class="loading">
          <span class="loading-emoji">🧩</span>
          <p>よみこみちゅう...</p>
        </div>
      </div>

      <div class="sidebar">
        <div class="controls">
          <button id="btn-peek" class="btn btn-peek" aria-pressed="false">👁 みる</button>
          <button id="btn-hint" class="btn btn-hint">ヒント</button>
        </div>

        <div id="challenge-status" class="challenge-status hidden" aria-live="polite"></div>

        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
          <span class="progress-text" id="progress-text">0 / 4</span>
        </div>
      </div>
    </main>

  </div>

  <!-- Success Modal -->
  <div id="success-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-emoji">🎉</div>
      <h2 class="modal-title">できたね!</h2>
      <p id="modal-stage-info" class="modal-stage-info">ステージ 1 クリア！</p>
      <p id="modal-challenge-info" class="modal-challenge-info hidden"></p>
      <p id="modal-daily-acorn" class="modal-daily-acorn"></p>
      <button id="btn-next-stage" class="btn btn-next">つぎへ →</button>
    </div>
  </div>

  <!-- Confetti container -->
  <div id="confetti-container" class="confetti-container"></div>

  <script src="voice.js?v=1313"></script>
  <!-- なかよし MVP (Phase 1): partner / bond / assists / UI モジュール -->
  <!-- 順序: hooks-init(レジストリ) → データ(partners → bond) → assist 群 → UI(partner-select → bond-ui) → main.js -->
  <script src="assists/_hooks-init.js"></script>
  <script src="partners.js"></script>
  <script src="bond.js"></script>
  <script src="assists/kitsune.js"></script>
  <script src="assists/kojika.js"></script>
  <script src="assists/araiguma.js"></script>
  <script src="assists/usagi.js"></script>
  <script src="assists/fukurou.js"></script>
  <script src="partner-select.js"></script>
  <script src="bond-ui.js"></script>
  <script src="main.js?v=1313"></script>
  <script>
    function updateLandscapeNotice() {
      const notice = document.getElementById('landscape-notice');
      if (!notice) return;
      const isLandscape = window.innerWidth > window.innerHeight;
      const isTouch = matchMedia('(pointer: coarse)').matches;
      notice.style.display = (!isLandscape && isTouch) ? 'flex' : 'none';
    }
    updateLandscapeNotice();
    window.addEventListener('orientationchange', () => {
      setTimeout(updateLandscapeNotice, 100);
      setTimeout(updateLandscapeNotice, 500);
    });
    window.addEventListener('resize', updateLandscapeNotice);
  </script>
</body>
</html>
