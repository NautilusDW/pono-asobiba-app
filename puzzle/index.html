<body data-game-id="puzzle">

  <script>
    function updateLandscapeNotice() {
      const notice = document.getElementById('landscape-notice');
      if (!notice) return;
      const isLandscape = window.innerWidth > window.innerHeight;
      const isTouch = matchMedia('(pointer: coarse)').matches;
      notice.style.display = (!isLandscape && isTouch) ? 'flex' : 'none';
    }
    updateLandscapeNotice();
    window.addEventListener('orientationchange', () => {
      setTimeout(updateLandscapeNotice, 100);
      setTimeout(updateLandscapeNotice, 500);
    });
    window.addEventListener('resize', updateLandscapeNotice);
  </script>
  <script>
  (function() {
    function regCapture() {
      if (!window.PonoCapture) return;
      window.PonoCapture.register({
        gameId: "puzzle",
        build: async function(opts) {
          // v1353: .page-wrapper だけだと body 直下の overlay 群
          // (#title-screen / #title-guide-choice / #puzzle-opening /
          //  #tut-dim / #tut-bubble、 main.js が body.appendChild する
          //  coach / overlay / prompt 各種) が含まれず、 タイトル / オープニング /
          //  チュートリアル中のスクショが空白になる。 body 全体を撮影し、
          //  不要要素は ignoreElements ([data-capture-hide]) で除外する。
          var container = document.body;
          if (!container) return null;
          try {
            var mod = await import("https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/+esm");
            var html2canvas = (mod && (mod.default || mod)) || window.html2canvas;
            if (typeof html2canvas !== "function") {
              console.warn("[PonoCapture/puzzle] html2canvas not callable after import");
              return null;
            }
            var h2cOpts = (window.PonoCapture && typeof window.PonoCapture.html2canvasOptions === "function")
              ? window.PonoCapture.html2canvasOptions()
              : {
                  backgroundColor: null,
                  scale: 2,
                  useCORS: true,
                  allowTaint: false,
                  logging: false,
                  imageTimeout: 30000,
                  removeContainer: true,
                  ignoreElements: function(el) {
                    try {
                      if (!el) return false;
                      if (el.hasAttribute && el.hasAttribute("data-capture-hide")) return true;
                      if (el.classList && el.classList.contains && el.classList.contains("pono-capture-overlay")) return true;
                    } catch (e) {}
                    return false;
                  }
                };
            return await html2canvas(container, h2cOpts);
          } catch (e) {
            console.warn("[PonoCapture/puzzle] html2canvas import failed", e);
            return null;
          }
        }
      });
    }
    if (window.PonoCapture) regCapture();
    else window.addEventListener("DOMContentLoaded", regCapture, { once: true });
  })();
  </script>
