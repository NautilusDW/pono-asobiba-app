<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>しゃぼんだまパーティー | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100dvh; overflow: hidden;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: linear-gradient(180deg, #e0f4ff 0%, #a8e6ff 40%, #7dd6f5 100%);
  touch-action: none; user-select: none; -webkit-user-select: none;
}
canvas { display: block; width: 100%; height: 100%; }
#back-btn {
  position: fixed; top: 12px; left: 12px; z-index: 100;
  background: rgba(255,255,255,0.85); border: none; border-radius: 50%;
  width: 44px; height: 44px; font-size: 22px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
}
</style>
</head>
<body>
<button id="back-btn" onclick="location.href='../'">🏠</button>
<canvas id="c"></canvas>

<script>
'use strict';
// ── Canvas setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Audio (WebAudio API — no frame drops) ──
let audioCtx = null, audioReady = false;

function makeBuf(freq, dur, vol, decay) {
  if (!audioCtx) return null;
  const sr = audioCtx.sampleRate, n = sr * dur | 0;
  const ab = audioCtx.createBuffer(1, n, sr), d = ab.getChannelData(0);
  for (let i = 0; i < n; i++) {
    const t = i / sr;
    d[i] = Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * (decay || 20)) * vol;
  }
  return ab;
}

let popBufs = [], chainBuf = null, boomBufs = [];

function initAudio() {
  const AC = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AC();
  return audioCtx.resume().then(() => {
    // Silent buffer to unlock
    const sb = audioCtx.createBuffer(1, 1, 22050);
    const s = audioCtx.createBufferSource();
    s.buffer = sb; s.connect(audioCtx.destination); s.start(0);
    // Generate sound buffers
    popBufs = [];
    for (let i = 0; i < 6; i++) popBufs.push(makeBuf(600 + i * 80, 0.15, 0.6, 25));
    chainBuf = makeBuf(1100, 0.1, 0.4, 30);
    boomBufs = [];
    for (let i = 0; i < 5; i++) boomBufs.push(makeBuf(300 + i * 200, 0.4, 0.5, 8));
    audioReady = true;
  });
}

function playBuf(buf, volume, rate) {
  if (!audioReady || !buf) return;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.playbackRate.value = rate || 1;
  if (volume !== undefined && volume < 1) {
    const g = audioCtx.createGain(); g.gain.value = volume;
    src.connect(g); g.connect(audioCtx.destination);
  } else {
    src.connect(audioCtx.destination);
  }
  src.start(0);
}

// Unlock audio on first interaction
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  initAudio();
}
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('pointerdown', unlockAudio, { once: true });
document.addEventListener('visibilitychange', () => {
  if (audioCtx && document.visibilityState === 'visible' && audioCtx.state !== 'running') audioCtx.resume();
});

function playPop() {
  playBuf(popBufs[Math.floor(Math.random() * popBufs.length)], 0.6);
}
function playChainPop() {
  playBuf(chainBuf, 0.4);
}
function playGoldenBoom() {
  boomBufs.forEach((buf, i) => setTimeout(() => playBuf(buf, 0.5), i * 60));
}

// ── Bubble colors ──
const COLORS = [
  { r: 255, g: 130, b: 170 },
  { r: 130, g: 200, b: 255 },
  { r: 170, g: 255, b: 170 },
  { r: 255, g: 220, b: 130 },
  { r: 200, g: 160, b: 255 },
  { r: 255, g: 180, b: 130 },
];

// ── Pre-render bubble sprites (avoid createRadialGradient every frame) ──
const SPRITE_SIZES = [40, 60, 80, 100]; // discrete sizes for snapping
function makeBubbleSprite(size, color, golden) {
  const pad = golden ? Math.ceil(size * 0.35) : 2;
  const full = size * 2 + pad * 2;
  const oc = document.createElement('canvas');
  oc.width = oc.height = full;
  const c = oc.getContext('2d');
  const cx = full / 2, cy = full / 2, r = size;

  // Golden glow (rendered into the same sprite)
  if (golden) {
    c.globalAlpha = 0.3;
    c.beginPath();
    c.arc(cx, cy, r * 1.3, 0, Math.PI * 2);
    c.fillStyle = 'rgba(255,215,60,0.3)';
    c.fill();
    c.globalAlpha = 1;
  }

  // Main bubble gradient
  c.globalAlpha = 0.75;
  const grad = c.createRadialGradient(cx - r * 0.25, cy - r * 0.25, r * 0.1, cx, cy, r);
  if (golden) {
    grad.addColorStop(0, 'rgba(255,255,200,0.9)');
    grad.addColorStop(0.5, 'rgba(255,215,60,0.6)');
    grad.addColorStop(1, 'rgba(255,180,0,0.2)');
  } else {
    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad.addColorStop(0.4, `rgba(${color.r},${color.g},${color.b},0.45)`);
    grad.addColorStop(1, `rgba(${color.r},${color.g},${color.b},0.1)`);
  }
  c.beginPath();
  c.arc(cx, cy, r, 0, Math.PI * 2);
  c.fillStyle = grad;
  c.fill();

  // Shine highlight
  c.globalAlpha = 0.5;
  c.beginPath();
  c.ellipse(cx - r * 0.3, cy - r * 0.3, r * 0.25, r * 0.15, -0.5, 0, Math.PI * 2);
  c.fillStyle = '#fff';
  c.fill();

  // Outline
  c.globalAlpha = 0.3;
  c.beginPath();
  c.arc(cx, cy, r, 0, Math.PI * 2);
  c.strokeStyle = golden ? 'rgba(255,180,0,0.5)' : `rgba(${color.r},${color.g},${color.b},0.4)`;
  c.lineWidth = 1.5;
  c.stroke();

  return { canvas: oc, pad };
}

// Build sprite cache: [sizeIdx][colorIdx]
const bubbleSpriteCache = {};
function getBubbleSprite(r, colorIdx, golden) {
  // Snap to nearest discrete size
  let bestSize = SPRITE_SIZES[0];
  for (let i = 1; i < SPRITE_SIZES.length; i++) {
    if (Math.abs(SPRITE_SIZES[i] - r) < Math.abs(bestSize - r)) bestSize = SPRITE_SIZES[i];
  }
  const key = golden ? `g_${bestSize}` : `${bestSize}_${colorIdx}`;
  if (!bubbleSpriteCache[key]) {
    bubbleSpriteCache[key] = makeBubbleSprite(bestSize, golden ? { r: 255, g: 215, b: 60 } : COLORS[colorIdx], golden);
  }
  return { sprite: bubbleSpriteCache[key], snapSize: bestSize };
}

// ── Bubbles (flat arrays for performance) ──
const MAX_BUBBLES = 40;
const bx = new Float32Array(MAX_BUBBLES + 20); // extra room for tap-spawned
const by = new Float32Array(MAX_BUBBLES + 20);
const br = new Float32Array(MAX_BUBBLES + 20);
const bvx = new Float32Array(MAX_BUBBLES + 20);
const bvy = new Float32Array(MAX_BUBBLES + 20);
const bwobblePhase = new Float32Array(MAX_BUBBLES + 20);
const bwobbleSpeed = new Float32Array(MAX_BUBBLES + 20);
const bwobbleAmp = new Float32Array(MAX_BUBBLES + 20);
const bopacity = new Float32Array(MAX_BUBBLES + 20);
const bcolorIdx = new Uint8Array(MAX_BUBBLES + 20);
const bgolden = new Uint8Array(MAX_BUBBLES + 20);
const balive = new Uint8Array(MAX_BUBBLES + 20);
const bfadeIn = new Uint8Array(MAX_BUBBLES + 20);
let bcount = 0;

function addBubble(x, y, radius, golden, opacity) {
  if (bcount >= bx.length) return;
  const i = bcount++;
  const sz = Math.min(W, H) / 600;
  br[i] = radius || (35 + Math.random() * 45) * sz;
  bx[i] = x ?? (Math.random() * W);
  by[i] = y ?? (H + br[i] + Math.random() * 100);
  bgolden[i] = golden ? 1 : 0;
  bcolorIdx[i] = Math.floor(Math.random() * COLORS.length);
  bvx[i] = (Math.random() - 0.5) * 0.5;
  bvy[i] = -(0.5 + Math.random() * 1.0) * (golden ? 0.6 : 1);
  bwobblePhase[i] = Math.random() * Math.PI * 2;
  bwobbleSpeed[i] = 0.02 + Math.random() * 0.02;
  bwobbleAmp[i] = 0.5 + Math.random() * 0.5;
  bopacity[i] = opacity ?? 0;
  balive[i] = 1;
  bfadeIn[i] = (opacity != null && opacity >= 0.8) ? 0 : 1;
}

// ── Particles (flat arrays) ──
const MAX_PARTICLES = 200;
const px = new Float32Array(MAX_PARTICLES);
const py = new Float32Array(MAX_PARTICLES);
const pvx = new Float32Array(MAX_PARTICLES);
const pvy = new Float32Array(MAX_PARTICLES);
const psize = new Float32Array(MAX_PARTICLES);
const plife = new Float32Array(MAX_PARTICLES);
const pdecay = new Float32Array(MAX_PARTICLES);
const pcr = new Uint8Array(MAX_PARTICLES);
const pcg = new Uint8Array(MAX_PARTICLES);
const pcb = new Uint8Array(MAX_PARTICLES);
let pcount = 0;

function addParticle(x, y, color, size) {
  if (pcount >= MAX_PARTICLES) return;
  const i = pcount++;
  px[i] = x; py[i] = y;
  const angle = Math.random() * Math.PI * 2;
  const speed = 2 + Math.random() * 5;
  pvx[i] = Math.cos(angle) * speed;
  pvy[i] = Math.sin(angle) * speed;
  psize[i] = size || 3 + Math.random() * 4;
  plife[i] = 1;
  pdecay[i] = 0.02 + Math.random() * 0.02;
  pcr[i] = color.r; pcg[i] = color.g; pcb[i] = color.b;
}

// ── Confetti (flat arrays) ──
const MAX_CONFETTI = 200;
const cfx = new Float32Array(MAX_CONFETTI);
const cfy = new Float32Array(MAX_CONFETTI);
const cfvx = new Float32Array(MAX_CONFETTI);
const cfvy = new Float32Array(MAX_CONFETTI);
const cfrot = new Float32Array(MAX_CONFETTI);
const cfrotSpd = new Float32Array(MAX_CONFETTI);
const cflife = new Float32Array(MAX_CONFETTI);
const cfsize = new Float32Array(MAX_CONFETTI);
const cfcr = new Uint8Array(MAX_CONFETTI);
const cfcg = new Uint8Array(MAX_CONFETTI);
const cfcb = new Uint8Array(MAX_CONFETTI);
let cfcount = 0;

function addConfetti(x, y) {
  if (cfcount >= MAX_CONFETTI) return;
  const i = cfcount++;
  cfx[i] = x; cfy[i] = y;
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  cfcr[i] = color.r; cfcg[i] = color.g; cfcb[i] = color.b;
  cfsize[i] = 4 + Math.random() * 6;
  const angle = Math.random() * Math.PI * 2;
  const speed = 3 + Math.random() * 6;
  cfvx[i] = Math.cos(angle) * speed;
  cfvy[i] = Math.sin(angle) * speed - 4;
  cfrot[i] = Math.random() * Math.PI * 2;
  cfrotSpd[i] = (Math.random() - 0.5) * 0.3;
  cflife[i] = 1;
}

let goldenTimer = 0;
const GOLDEN_INTERVAL = 12000;

// ── Pop logic ──
function popBubble(idx, chainDepth) {
  if (!balive[idx]) return;
  balive[idx] = 0;
  const x0 = bx[idx], y0 = by[idx];
  const isGolden = bgolden[idx];
  const color = isGolden ? { r: 255, g: 215, b: 60 } : COLORS[bcolorIdx[idx]];

  const count = isGolden ? 15 : 6;
  for (let i = 0; i < count; i++) {
    addParticle(x0, y0, color, isGolden ? 5 + Math.random() * 5 : undefined);
  }

  if (isGolden) {
    playGoldenBoom();
    // Chain pop all non-golden bubbles
    let delay = 0;
    for (let i = 0; i < bcount; i++) {
      if (!balive[i] || bgolden[i]) continue;
      const ii = i;
      setTimeout(() => {
        if (!balive[ii]) return;
        balive[ii] = 0;
        const c = COLORS[bcolorIdx[ii]];
        for (let j = 0; j < 4; j++) addParticle(bx[ii], by[ii], c);
        playChainPop();
      }, delay);
      delay += 15 + Math.random() * 30 | 0;
    }
    // Confetti
    for (let i = 0; i < 60; i++) addConfetti(x0, y0);
  } else {
    playPop();
    // Chain reaction: pop nearby
    if (chainDepth < 3) {
      const chainR = br[idx] * 2.8;
      const chainR2 = chainR * chainR;
      for (let i = 0; i < bcount; i++) {
        if (i === idx || !balive[i] || bgolden[i]) continue;
        const dx = bx[i] - x0, dy = by[i] - y0;
        if (dx * dx + dy * dy < chainR2) {
          const ii = i;
          setTimeout(() => popBubble(ii, chainDepth + 1), 60 + Math.random() * 80 | 0);
        }
      }
    }
  }
}

// ── Spawn ──
function spawnBubble() {
  if (bcount < MAX_BUBBLES) addBubble();
}
function spawnGolden() {
  const sz = Math.min(W, H) / 600;
  const r = (60 + Math.random() * 30) * sz;
  addBubble(Math.random() * (W - r * 2) + r, H + r, r, true);
  // Set the vy for golden
  bvy[bcount - 1] = -(0.2 + Math.random() * 0.2);
}

// ── Input ──
function handlePop(x, y) {
  for (let i = bcount - 1; i >= 0; i--) {
    if (!balive[i]) continue;
    const dx = x - bx[i], dy = y - by[i];
    if (dx * dx + dy * dy < br[i] * br[i] * 1.3) {
      popBubble(i, 0);
      return;
    }
  }
  // Tap empty space: spawn mini bubbles
  const sz = Math.min(W, H) / 600;
  for (let i = 0; i < 3; i++) {
    const r = (20 + Math.random() * 25) * sz;
    addBubble(x + (Math.random() - 0.5) * 40, y + (Math.random() - 0.5) * 40, r, false, 0.8);
    bvy[bcount - 1] = -(0.6 + Math.random() * 0.8);
  }
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  handlePop(e.clientX, e.clientY);
});
canvas.addEventListener('pointermove', e => {
  if (e.buttons > 0 || e.pressure > 0) {
    handlePop(e.clientX, e.clientY);
  }
});

// ── Background bubbles ──
const bgBubbles = [];
for (let i = 0; i < 10; i++) {
  bgBubbles.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    r: 60 + Math.random() * 120,
    speed: 0.1 + Math.random() * 0.15,
    phase: Math.random() * Math.PI * 2,
  });
}
function drawBackground(dt) {
  ctx.globalAlpha = 0.07;
  ctx.fillStyle = '#fff';
  for (let i = 0; i < bgBubbles.length; i++) {
    const b = bgBubbles[i];
    b.phase += 0.005 * dt;
    b.y -= b.speed * dt * 0.05;
    if (b.y < -b.r) { b.y = H + b.r; b.x = Math.random() * W; }
    ctx.beginPath();
    ctx.arc(b.x + Math.sin(b.phase) * 20, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Main loop ──
let lastTime = 0;
let spawnTimer = 0;
goldenTimer = GOLDEN_INTERVAL * 0.7;

function loop(time) {
  const dt = Math.min(time - lastTime, 50) || 16;
  lastTime = time;

  ctx.clearRect(0, 0, W, H);
  drawBackground(dt);

  // Spawn
  spawnTimer += dt;
  if (spawnTimer > 300) { spawnBubble(); spawnTimer = 0; }
  goldenTimer += dt;
  if (goldenTimer > GOLDEN_INTERVAL) { spawnGolden(); goldenTimer = 0; }

  // Update bubbles
  for (let i = bcount - 1; i >= 0; i--) {
    if (!balive[i] || by[i] < -br[i] * 2) {
      // Swap-remove
      bcount--;
      if (i < bcount) {
        bx[i] = bx[bcount]; by[i] = by[bcount]; br[i] = br[bcount];
        bvx[i] = bvx[bcount]; bvy[i] = bvy[bcount];
        bwobblePhase[i] = bwobblePhase[bcount]; bwobbleSpeed[i] = bwobbleSpeed[bcount];
        bwobbleAmp[i] = bwobbleAmp[bcount]; bopacity[i] = bopacity[bcount];
        bcolorIdx[i] = bcolorIdx[bcount]; bgolden[i] = bgolden[bcount];
        balive[i] = balive[bcount]; bfadeIn[i] = bfadeIn[bcount];
      }
      continue;
    }
    if (bfadeIn[i]) {
      bopacity[i] = Math.min(1, bopacity[i] + dt * 0.008);
      if (bopacity[i] >= 1) bfadeIn[i] = 0;
    }
    bwobblePhase[i] += bwobbleSpeed[i] * dt;
    bx[i] += (bvx[i] + Math.sin(bwobblePhase[i]) * bwobbleAmp[i]) * dt * 0.15;
    by[i] += bvy[i] * dt * 0.15;
    if (bx[i] < -br[i]) bx[i] = W + br[i];
    if (bx[i] > W + br[i]) bx[i] = -br[i];
  }

  // Draw bubbles using sprites
  for (let i = 0; i < bcount; i++) {
    if (!balive[i]) continue;
    const { sprite, snapSize } = getBubbleSprite(br[i], bcolorIdx[i], bgolden[i]);
    const scale = br[i] / snapSize;
    const drawSize = (snapSize * 2 + sprite.pad * 2) * scale;
    ctx.globalAlpha = bopacity[i];
    ctx.drawImage(sprite.canvas, bx[i] - drawSize / 2, by[i] - drawSize / 2, drawSize, drawSize);
  }
  ctx.globalAlpha = 1;

  // Update & draw particles
  for (let i = pcount - 1; i >= 0; i--) {
    px[i] += pvx[i] * dt * 0.25;
    py[i] += pvy[i] * dt * 0.25;
    pvy[i] += 0.03 * dt * 0.25;
    plife[i] -= pdecay[i] * dt * 0.1;
    if (plife[i] <= 0) {
      pcount--;
      if (i < pcount) {
        px[i] = px[pcount]; py[i] = py[pcount]; pvx[i] = pvx[pcount]; pvy[i] = pvy[pcount];
        psize[i] = psize[pcount]; plife[i] = plife[pcount]; pdecay[i] = pdecay[pcount];
        pcr[i] = pcr[pcount]; pcg[i] = pcg[pcount]; pcb[i] = pcb[pcount];
      }
      continue;
    }
    ctx.globalAlpha = plife[i];
    ctx.beginPath();
    ctx.arc(px[i], py[i], psize[i] * plife[i], 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${pcr[i]},${pcg[i]},${pcb[i]})`;
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Update & draw confetti
  for (let i = cfcount - 1; i >= 0; i--) {
    cfx[i] += cfvx[i] * dt * 0.2;
    cfy[i] += cfvy[i] * dt * 0.2;
    cfvy[i] += 0.06 * dt * 0.2;
    cfvx[i] *= 0.995;
    cfrot[i] += cfrotSpd[i] * dt * 0.1;
    cflife[i] -= 0.006 * dt * 0.1;
    if (cflife[i] <= 0) {
      cfcount--;
      if (i < cfcount) {
        cfx[i] = cfx[cfcount]; cfy[i] = cfy[cfcount]; cfvx[i] = cfvx[cfcount]; cfvy[i] = cfvy[cfcount];
        cfrot[i] = cfrot[cfcount]; cfrotSpd[i] = cfrotSpd[cfcount]; cflife[i] = cflife[cfcount];
        cfsize[i] = cfsize[cfcount]; cfcr[i] = cfcr[cfcount]; cfcg[i] = cfcg[cfcount]; cfcb[i] = cfcb[cfcount];
      }
      continue;
    }
    ctx.save();
    ctx.globalAlpha = cflife[i];
    ctx.translate(cfx[i], cfy[i]);
    ctx.rotate(cfrot[i]);
    ctx.fillStyle = `rgb(${cfcr[i]},${cfcg[i]},${cfcb[i]})`;
    ctx.fillRect(-cfsize[i] / 2, -cfsize[i] / 4, cfsize[i], cfsize[i] / 2);
    ctx.restore();
  }

  requestAnimationFrame(loop);
}

// Initial bubbles
for (let i = 0; i < 25; i++) {
  addBubble(Math.random() * W, Math.random() * H);
  bopacity[i] = 1;
  bfadeIn[i] = 0;
}

requestAnimationFrame(loop);
</script>
</body>
</html>
