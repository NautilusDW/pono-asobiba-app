<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>しゃぼんだまパーティー | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100dvh; overflow: hidden;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #000;
  touch-action: none; user-select: none; -webkit-user-select: none;
}
canvas { display: block; width: 100%; height: 100%; }
#back-btn, #bgm-btn {
  position: fixed; z-index: 100;
  background: rgba(255,255,255,0.85); border: none; border-radius: 50%;
  width: 44px; height: 44px; font-size: 22px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
}
#back-btn { top: 12px; left: 12px; }
#bgm-btn { top: 12px; right: 12px; }
</style>
</head>
<body>
<button id="back-btn" onclick="location.href='../'">🏠</button>
<button id="bgm-btn" onclick="switchBGMTrack()">🎵</button>
<canvas id="c"></canvas>

<script>
'use strict';
// ── Canvas setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
// Offscreen buffer for refraction lens effect
const bgCanvas = document.createElement('canvas');
const bgCtx = bgCanvas.getContext('2d');
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  bgCanvas.width = W; bgCanvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// ── Audio (WebAudio API — no frame drops) ──
// Strategy: create AudioContext + buffers immediately on load.
// Context will be 'suspended' until first user gesture, but buffers are ready.
// On first tap: resume() + play → sound on very first tap.
let audioCtx = null, audioReady = false;

function makeBuf(freq, dur, vol, decay) {
  if (!audioCtx) return null;
  const sr = audioCtx.sampleRate, n = sr * dur | 0;
  const ab = audioCtx.createBuffer(1, n, sr), d = ab.getChannelData(0);
  for (let i = 0; i < n; i++) {
    const t = i / sr;
    d[i] = Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * (decay || 20)) * vol;
  }
  return ab;
}

let popBufs = [], chainBuf = null, boomBufs = [];
// Creature reveal sound (buffer-based)
let creatureRevealBuf = null;

// ── Rhythm Engine (real-time oscillator, inspired by GPT's PonoBubbleRhythmEngine) ──
// Pentatonic scale steps: ド レ ミ ソ ラ (C4-C5 range)
const PENTA_STEPS = [0, 2, 4, 7, 9];
const PENTA_OCTAVES = [0, 1]; // C4 and C5 range
const PENTA_BASE_HZ = 261.63; // C4
const RHYTHM_BPM = 106;
const RHYTHM_BEAT_INTERVAL = 60 / RHYTHM_BPM;
const RHYTHM_QUANTIZE_MS = 200;
const RHYTHM_CHORD_THRESHOLD_MS = 260;
let rhythmStartTime = 0;
let rhythmRecentTaps = []; // timestamps for layering detection
let rhythmLastFreqs = []; // avoid repeating same note
let masterGain = null;
let compressorNode = null;

// Build candidate frequencies from pentatonic scale
const PENTA_CANDIDATES = [];
for (const oct of PENTA_OCTAVES) {
  for (const step of PENTA_STEPS) {
    PENTA_CANDIDATES.push(PENTA_BASE_HZ * Math.pow(2, (step + oct * 12) / 12));
  }
}

function setupMasterChain() {
  if (!audioCtx || masterGain) return;
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.18;
  compressorNode = audioCtx.createDynamicsCompressor();
  compressorNode.threshold.value = -18;
  compressorNode.knee.value = 12;
  compressorNode.ratio.value = 3;
  compressorNode.attack.value = 0.003;
  compressorNode.release.value = 0.18;
  masterGain.connect(compressorNode);
  compressorNode.connect(audioCtx.destination);
  rhythmStartTime = audioCtx.currentTime;
}

// Quantize to nearest beat if within window
function quantizeTime(now) {
  const elapsed = now - rhythmStartTime;
  const beatIdx = Math.round(elapsed / RHYTHM_BEAT_INTERVAL);
  const nearest = rhythmStartTime + beatIdx * RHYTHM_BEAT_INTERVAL;
  return (Math.abs(nearest - now) * 1000 <= RHYTHM_QUANTIZE_MS) ? Math.max(now, nearest) : now;
}

// Choose a pentatonic frequency, avoiding recent repeats
// bubbleR: radius for size-based pitch shift (stays within scale)
function choosePentaFreq(bubbleR) {
  // Size determines octave range: big = low octave, small = high octave
  const sz = Math.min(W, H) / 600;
  const normalR = 50 * sz;
  let pool;
  if (bubbleR > normalR * 1.5) {
    // Big bubble: use lower octave only (C4 range)
    pool = PENTA_CANDIDATES.slice(0, 5);
  } else if (bubbleR < normalR * 0.7) {
    // Small bubble: use higher octave only (C5 range)
    pool = PENTA_CANDIDATES.slice(5);
  } else {
    pool = PENTA_CANDIDATES;
  }
  let freq = pool[Math.floor(Math.random() * pool.length)];
  // Avoid repeating last 2 notes
  let safety = 0;
  while (rhythmLastFreqs.includes(freq) && safety < 4) {
    freq = pool[Math.floor(Math.random() * pool.length)];
    safety++;
  }
  rhythmLastFreqs.push(freq);
  if (rhythmLastFreqs.length > 2) rhythmLastFreqs.shift();
  return freq;
}

// How many layers to play (1=single, 2=duo) based on rapid taps
// Max 2 layers to keep it clean — always uses pentatonic intervals
function getLayerCount() {
  const now = performance.now();
  const recent = rhythmRecentTaps.filter(t => now - t <= RHYTHM_CHORD_THRESHOLD_MS).length;
  if (recent >= 2) return 2;
  return 1;
}

// Play a real-time marimba note via oscillator + LPF
// Single sine oscillator — clean, always consonant
function playMarimbaNote(freq, time, velocity, panValue) {
  if (!audioCtx || !masterGain) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, time);

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2200, time);
    filter.Q.setValueAtTime(0.5, time);

    // Quick attack, natural decay — marimba-like envelope
    const attack = 0.004, decay = 0.18, release = 0.25;
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.linearRampToValueAtTime(velocity, time + attack);
    gain.gain.exponentialRampToValueAtTime(velocity * 0.3, time + attack + decay);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + attack + decay + release);

    osc.connect(filter);

    // Stereo panning if supported
    if (typeof audioCtx.createStereoPanner === 'function') {
      const panner = audioCtx.createStereoPanner();
      panner.pan.setValueAtTime(panValue, time);
      filter.connect(gain);
      gain.connect(panner);
      panner.connect(masterGain);
    } else {
      filter.connect(gain);
      gain.connect(masterGain);
    }

    const stopTime = time + attack + decay + release + 0.05;
    osc.start(time);
    osc.stop(stopTime);
  } catch (e) { /* ignore */ }
}

// Play musical bubble pop: real-time marimba with quantization, panning, layering
function playRhythmPop(bubbleX, bubbleR) {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  setupMasterChain();

  const now = audioCtx.currentTime;
  const scheduledTime = quantizeTime(now);
  const freq = choosePentaFreq(bubbleR);
  const panValue = Math.max(-0.6, Math.min(0.6, (bubbleX / W) * 2 - 1));
  const velocity = 0.55;
  const layers = getLayerCount();

  // Play layers: root + octave above (always consonant)
  playMarimbaNote(freq, scheduledTime, velocity, panValue);
  if (layers >= 2) {
    // Second layer: same note one octave up (always harmonious)
    playMarimbaNote(freq * 2, scheduledTime + 0.012, velocity * 0.45, panValue);
  }

  rhythmRecentTaps.push(performance.now());
  rhythmRecentTaps = rhythmRecentTaps.filter(t => performance.now() - t < 1200);
}

// ── BGM (external mp3, loop, low volume) ──
const BGM_TRACKS = [
  '../assets/audio/bubble/Tap Tickle Loop.mp3',
  '../assets/audio/bubble/Soft Steps, Small Feet.mp3',
];
let bgmCurrentTrack = 0; // which track is loaded
let bgmAudio = null;
const BGM_VOLUME = 0.02; // barely audible — bubble pops must be prominent

function initBGM() {
  if (bgmAudio) return;
  bgmAudio = new Audio(BGM_TRACKS[bgmCurrentTrack]);
  bgmAudio.loop = true;
  bgmAudio.volume = BGM_VOLUME;
  bgmAudio.preload = 'auto';
}

function startBGM() {
  if (!bgmAudio) initBGM();
  bgmAudio.play().catch(() => {}); // may need user gesture
}

function switchBGMTrack() {
  if (bgmAudio) {
    bgmAudio.pause();
    bgmAudio.currentTime = 0;
  }
  bgmCurrentTrack = (bgmCurrentTrack + 1) % BGM_TRACKS.length;
  bgmAudio = new Audio(BGM_TRACKS[bgmCurrentTrack]);
  bgmAudio.loop = true;
  bgmAudio.volume = BGM_VOLUME;
  bgmAudio.play().catch(() => {});
}

// Start BGM on first user interaction
function startBGMOnGesture() {
  initBGM();
  startBGM();
}
document.addEventListener('pointerdown', startBGMOnGesture, { once: true });
document.addEventListener('touchstart', startBGMOnGesture, { once: true });

// Creature reveal: play ascending arpeggio via oscillators
function playCreatureArpeggio() {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  setupMasterChain();
  const arpFreqs = [523.3, 659.3, 784.0, 1047];
  const now = audioCtx.currentTime;
  for (let i = 0; i < arpFreqs.length; i++) {
    playMarimbaNote(arpFreqs[i], now + i * 0.12, 0.5, 0);
  }
}

function generateBufs() {
  popBufs = [];
  for (let i = 0; i < 6; i++) popBufs.push(makeBuf(600 + i * 80, 0.15, 0.6, 25));
  chainBuf = makeBuf(1100, 0.1, 0.4, 30);
  boomBufs = [];
  for (let i = 0; i < 5; i++) boomBufs.push(makeBuf(300 + i * 200, 0.4, 0.5, 8));
  // Creature reveal fallback (buffer version, used if oscillator fails)
  creatureRevealBuf = makeArpBuf([523.3, 659.3, 784.0, 1047], 0.6, 0.4);
  audioReady = true;
}

function makeArpBuf(freqs, dur, vol) {
  if (!audioCtx) return null;
  const sr = audioCtx.sampleRate, n = sr * dur | 0;
  const ab = audioCtx.createBuffer(1, n, sr), d = ab.getChannelData(0);
  const noteLen = n / freqs.length;
  for (let i = 0; i < n; i++) {
    const noteIdx = Math.min(Math.floor(i / noteLen), freqs.length - 1);
    const t = (i - noteIdx * noteLen) / sr;
    const env = Math.exp(-t * 10) * (1 - Math.exp(-t * 300));
    d[i] = Math.sin(2 * Math.PI * freqs[noteIdx] * (i / sr)) * env * vol;
  }
  return ab;
}

// Create AudioContext + buffers immediately (suspended state is OK)
try {
  const AC = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AC();
  generateBufs(); // buffers are ready even while context is suspended
} catch (e) { /* will init on first interaction as fallback */ }

function playBuf(buf, volume, rate) {
  if (!audioReady || !buf) return;
  try {
    // Resume on every play call — no-op if already running, unlocks on first gesture
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.playbackRate.value = rate || 1;
    if (volume !== undefined && volume < 1) {
      const g = audioCtx.createGain(); g.gain.value = volume;
      src.connect(g); g.connect(audioCtx.destination);
    } else {
      src.connect(audioCtx.destination);
    }
    src.start(0);
  } catch (e) { /* ignore audio errors */ }
}

// Fallback: if AudioContext wasn't created at load time, init on first interaction
function ensureAudio() {
  if (audioCtx) { audioCtx.resume(); return; }
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    audioCtx.resume();
    generateBufs();
  } catch (e) {}
}
document.addEventListener('pointerdown', ensureAudio, { once: true });
document.addEventListener('touchstart', ensureAudio, { once: true });
document.addEventListener('visibilitychange', () => {
  if (audioCtx && document.visibilityState === 'visible' && audioCtx.state !== 'running') audioCtx.resume();
});

// ── Color → Note mapping & combo tracking ──
// Each COLORS index maps to a pentatonic note
let lastPopColorIdx = -1;
let comboCount = 0;
let comboTimer = 0;
const COMBO_WINDOW = 2000; // 2s to keep combo alive

function playMusicalPop(colorIdx, bubbleX, bubbleR) {
  const noteIdx = colorIdx % PENTA_CANDIDATES.length;
  // Track same-color combo
  if (colorIdx === lastPopColorIdx && comboTimer > 0) {
    comboCount++;
    if (comboCount >= 4) {
      // 5+ same color: rainbow burst!
      playRhythmPop(bubbleX, bubbleR);
      triggerRainbowBurst();
      comboCount = 0;
    } else {
      // 2+ same color: rhythm pop (layering will add richness)
      playRhythmPop(bubbleX, bubbleR);
    }
  } else {
    // Different color or combo expired: single note
    comboCount = 0;
    playRhythmPop(bubbleX, bubbleR);
  }
  lastPopColorIdx = colorIdx;
  comboTimer = COMBO_WINDOW;
  // Also spawn a visible music note particle
  spawnNoteParticle(noteIdx);
}

function playPop() {
  // disabled for testing — only pentatonic notes play
}
function playChainPop() {
  // disabled for testing
}
function playGoldenBoom() {
  // disabled for testing
}
function playCreatureReveal() {
  playCreatureArpeggio();
}

// ── Bubble colors ──
const COLORS = [
  { r: 255, g: 130, b: 170 },
  { r: 130, g: 200, b: 255 },
  { r: 170, g: 255, b: 170 },
  { r: 255, g: 220, b: 130 },
  { r: 200, g: 160, b: 255 },
  { r: 255, g: 180, b: 130 },
];

// ── Pre-render bubble sprites (avoid createRadialGradient every frame) ──
const SPRITE_SIZES = [40, 60, 80, 100, 150, 200]; // discrete sizes for snapping
function makeBubbleSprite(size, color, golden) {
  const pad = golden ? Math.ceil(size * 0.35) : 2;
  const full = size * 2 + pad * 2;
  const oc = document.createElement('canvas');
  oc.width = oc.height = full;
  const c = oc.getContext('2d');
  const cx = full / 2, cy = full / 2, r = size;

  // Golden glow (rendered into the same sprite)
  if (golden) {
    c.globalAlpha = 0.3;
    c.beginPath();
    c.arc(cx, cy, r * 1.3, 0, Math.PI * 2);
    c.fillStyle = 'rgba(255,215,60,0.3)';
    c.fill();
    c.globalAlpha = 1;
  }

  // Main bubble gradient
  c.globalAlpha = 0.75;
  const grad = c.createRadialGradient(cx - r * 0.25, cy - r * 0.25, r * 0.1, cx, cy, r);
  if (golden) {
    grad.addColorStop(0, 'rgba(255,255,200,0.9)');
    grad.addColorStop(0.5, 'rgba(255,215,60,0.6)');
    grad.addColorStop(1, 'rgba(255,180,0,0.2)');
  } else {
    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad.addColorStop(0.4, `rgba(${color.r},${color.g},${color.b},0.45)`);
    grad.addColorStop(1, `rgba(${color.r},${color.g},${color.b},0.1)`);
  }
  c.beginPath();
  c.arc(cx, cy, r, 0, Math.PI * 2);
  c.fillStyle = grad;
  c.fill();

  // Shine highlight
  c.globalAlpha = 0.5;
  c.beginPath();
  c.ellipse(cx - r * 0.3, cy - r * 0.3, r * 0.25, r * 0.15, -0.5, 0, Math.PI * 2);
  c.fillStyle = '#fff';
  c.fill();

  // Outline
  c.globalAlpha = 0.3;
  c.beginPath();
  c.arc(cx, cy, r, 0, Math.PI * 2);
  c.strokeStyle = golden ? 'rgba(255,180,0,0.5)' : `rgba(${color.r},${color.g},${color.b},0.4)`;
  c.lineWidth = 1.5;
  c.stroke();

  return { canvas: oc, pad };
}

// Build sprite cache: [sizeIdx][colorIdx]
const bubbleSpriteCache = {};
function getBubbleSprite(r, colorIdx, golden) {
  // Snap to nearest discrete size
  let bestSize = SPRITE_SIZES[0];
  for (let i = 1; i < SPRITE_SIZES.length; i++) {
    if (Math.abs(SPRITE_SIZES[i] - r) < Math.abs(bestSize - r)) bestSize = SPRITE_SIZES[i];
  }
  const key = golden ? `g_${bestSize}` : `${bestSize}_${colorIdx}`;
  if (!bubbleSpriteCache[key]) {
    bubbleSpriteCache[key] = makeBubbleSprite(bestSize, golden ? { r: 255, g: 215, b: 60 } : COLORS[colorIdx], golden);
  }
  return { sprite: bubbleSpriteCache[key], snapSize: bestSize };
}

// ── Bubbles (flat arrays for performance) ──
const MAX_BUBBLES = 70;
const bx = new Float32Array(MAX_BUBBLES + 20); // extra room for tap-spawned
const by = new Float32Array(MAX_BUBBLES + 20);
const br = new Float32Array(MAX_BUBBLES + 20);
const bvx = new Float32Array(MAX_BUBBLES + 20);
const bvy = new Float32Array(MAX_BUBBLES + 20);
const bwobblePhase = new Float32Array(MAX_BUBBLES + 20);
const bwobbleSpeed = new Float32Array(MAX_BUBBLES + 20);
const bwobbleAmp = new Float32Array(MAX_BUBBLES + 20);
const bopacity = new Float32Array(MAX_BUBBLES + 20);
const bcolorIdx = new Uint8Array(MAX_BUBBLES + 20);
const bgolden = new Uint8Array(MAX_BUBBLES + 20);
const balive = new Uint8Array(MAX_BUBBLES + 20);
const bfadeIn = new Uint8Array(MAX_BUBBLES + 20);
const bcreature = new Int8Array(MAX_BUBBLES + 20).fill(-1); // -1 = normal, 0+ = creature index
let bcount = 0;

function addBubble(x, y, radius, golden, opacity) {
  if (bcount >= bx.length) return;
  const i = bcount++;
  const sz = Math.min(W, H) / 600;
  // Occasionally spawn big bubbles (10% chance: 2-3x normal size)
  const bigChance = Math.random();
  const baseR = bigChance < 0.05 ? (120 + Math.random() * 80)
              : bigChance < 0.12 ? (80 + Math.random() * 50)
              : (35 + Math.random() * 45);
  br[i] = radius || baseR * sz;
  bx[i] = x ?? (Math.random() * W);
  by[i] = y ?? (H + br[i] + Math.random() * 100);
  bgolden[i] = golden ? 1 : 0;
  bcolorIdx[i] = Math.floor(Math.random() * COLORS.length);
  bvx[i] = (Math.random() - 0.5) * 0.5;
  const sizeSlowdown = br[i] > 80 * sz ? 0.5 : 1; // big bubbles float slower
  bvy[i] = -(0.5 + Math.random() * 1.0) * (golden ? 0.6 : sizeSlowdown);
  bwobblePhase[i] = Math.random() * Math.PI * 2;
  bwobbleSpeed[i] = 0.02 + Math.random() * 0.02;
  bwobbleAmp[i] = 0.5 + Math.random() * 0.5;
  bopacity[i] = opacity ?? 0;
  balive[i] = 1;
  bfadeIn[i] = (opacity != null && opacity >= 0.8) ? 0 : 1;
  bcreature[i] = -1; // normal bubble by default
}

// ── Particles (flat arrays) ──
const MAX_PARTICLES = 200;
const px = new Float32Array(MAX_PARTICLES);
const py = new Float32Array(MAX_PARTICLES);
const pvx = new Float32Array(MAX_PARTICLES);
const pvy = new Float32Array(MAX_PARTICLES);
const psize = new Float32Array(MAX_PARTICLES);
const plife = new Float32Array(MAX_PARTICLES);
const pdecay = new Float32Array(MAX_PARTICLES);
const pcr = new Uint8Array(MAX_PARTICLES);
const pcg = new Uint8Array(MAX_PARTICLES);
const pcb = new Uint8Array(MAX_PARTICLES);
let pcount = 0;

function addParticle(x, y, color, size) {
  if (pcount >= MAX_PARTICLES) return;
  const i = pcount++;
  px[i] = x; py[i] = y;
  const angle = Math.random() * Math.PI * 2;
  const speed = 2 + Math.random() * 5;
  pvx[i] = Math.cos(angle) * speed;
  pvy[i] = Math.sin(angle) * speed;
  psize[i] = size || 3 + Math.random() * 4;
  plife[i] = 1;
  pdecay[i] = 0.02 + Math.random() * 0.02;
  pcr[i] = color.r; pcg[i] = color.g; pcb[i] = color.b;
}

// ── Confetti (flat arrays) ──
const MAX_CONFETTI = 200;
const cfx = new Float32Array(MAX_CONFETTI);
const cfy = new Float32Array(MAX_CONFETTI);
const cfvx = new Float32Array(MAX_CONFETTI);
const cfvy = new Float32Array(MAX_CONFETTI);
const cfrot = new Float32Array(MAX_CONFETTI);
const cfrotSpd = new Float32Array(MAX_CONFETTI);
const cflife = new Float32Array(MAX_CONFETTI);
const cfsize = new Float32Array(MAX_CONFETTI);
const cfcr = new Uint8Array(MAX_CONFETTI);
const cfcg = new Uint8Array(MAX_CONFETTI);
const cfcb = new Uint8Array(MAX_CONFETTI);
let cfcount = 0;

function addConfetti(x, y) {
  if (cfcount >= MAX_CONFETTI) return;
  const i = cfcount++;
  cfx[i] = x; cfy[i] = y;
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  cfcr[i] = color.r; cfcg[i] = color.g; cfcb[i] = color.b;
  cfsize[i] = 4 + Math.random() * 6;
  const angle = Math.random() * Math.PI * 2;
  const speed = 3 + Math.random() * 6;
  cfvx[i] = Math.cos(angle) * speed;
  cfvy[i] = Math.sin(angle) * speed - 4;
  cfrot[i] = Math.random() * Math.PI * 2;
  cfrotSpd[i] = (Math.random() - 0.5) * 0.3;
  cflife[i] = 1;
}

let lastPopX = 0, lastPopY = 0;

// ── Music note particles (visual feedback for pentatonic taps) ──
const MAX_NOTES = 30;
const NOTE_SYMBOLS = ['♪', '♫', '♬', '♩', '✦'];
const noteX = new Float32Array(MAX_NOTES);
const noteY = new Float32Array(MAX_NOTES);
const noteVy = new Float32Array(MAX_NOTES);
const noteLife = new Float32Array(MAX_NOTES);
const noteSize = new Float32Array(MAX_NOTES);
const noteColorIdx = new Uint8Array(MAX_NOTES);
const noteSymIdx = new Uint8Array(MAX_NOTES);
const noteVx = new Float32Array(MAX_NOTES);
let noteCount = 0;

function spawnNoteParticle(noteIdx) {
  if (noteCount >= MAX_NOTES) return;
  // Use the last popped bubble position (stored in popBubble)
  const i = noteCount++;
  noteX[i] = lastPopX;
  noteY[i] = lastPopY;
  noteVx[i] = (Math.random() - 0.5) * 2;
  noteVy[i] = -(1.5 + Math.random() * 2);
  noteLife[i] = 1;
  noteSize[i] = 18 + Math.random() * 14;
  noteColorIdx[i] = noteIdx % COLORS.length;
  noteSymIdx[i] = Math.floor(Math.random() * NOTE_SYMBOLS.length);
}

// ── Rainbow burst effect ──
let rainbowBurst = null; // { x, y, time, maxTime }

function triggerRainbowBurst() {
  rainbowBurst = { x: lastPopX, y: lastPopY, time: 0, maxTime: 1200 };
  // Spawn ring of colorful particles
  for (let i = 0; i < 24; i++) {

      psize[j] = 5 + Math.random() * 4;
      plife[j] = 1;
      pdecay[j] = 0.012;
      pcr[j] = color.r; pcg[j] = color.g; pcb[j] = color.b;
    }
  }
  // Confetti for celebration
  for (let i = 0; i < 30; i++) addConfetti(lastPopX, lastPopY);
}

// ── Surprise creature bubbles ──
const CREATURES = ['🦋', '🐦', '⭐', '🌸', '🐟', '🌈'];
let creatureTimer = 0;
const CREATURE_MIN_INTERVAL = 15000;
const CREATURE_MAX_INTERVAL = 25000;
let nextCreatureTime = CREATURE_MIN_INTERVAL + Math.random() * (CREATURE_MAX_INTERVAL - CREATURE_MIN_INTERVAL);

// Flying creature animation after pop

const flyY = new Float32Array(MAX_FLYING);
const flyVx = new Float32Array(MAX_FLYING);
const flyVy = new Float32Array(MAX_FLYING);
const flyLife = new Float32Array(MAX_FLYING);
const flySize = new Float32Array(MAX_FLYING);
const flyCreature = new Uint8Array(MAX_FLYING);
const flyRot = new Float32Array(MAX_FLYING);

}

let goldenTimer = 0;
const GOLDEN_INTERVAL = 12000;

// ── Pop logic ──
function popBubble(idx, chainDepth) {
  if (!balive[idx]) return;
  balive[idx] = 0;
  const x0 = bx[idx], y0 = by[idx];
  lastPopX = x0; lastPopY = y0;
  const isGolden = bgolden[idx];
  const isCreature = bcreature[idx] >= 0;
  const color = isGolden ? { r: 255, g: 215, b: 60 } : COLORS[bcolorIdx[idx]];

  const count = isGolden ? 15 : isCreature ? 10 : 6;
  for (let i = 0; i < count; i++) {
    addParticle(x0, y0, color, isGolden ? 5 + Math.random() * 5 : undefined);
  }

  if (isCreature) {
    // Creature bubble popped! Fly out the creature
    spawnFlyingCreature(x0, y0, bcreature[idx]);
    playCreatureReveal();
    // Sparkle confetti
    for (let i = 0; i < 20; i++) addConfetti(x0, y0);
    bcreature[idx] = -1;
  } else if (isGolden) {
    playGoldenBoom();
    // Chain pop all non-golden bubbles
    let delay = 0;
    for (let i = 0; i < bcount; i++) {
      if (!balive[i] || bgolden[i]) continue;
      const ii = i;
      setTimeout(() => {
        if (!balive[ii]) return;
        lastPopX = bx[ii]; lastPopY = by[ii];
        balive[ii] = 0;
        const c = COLORS[bcolorIdx[ii]];
        for (let j = 0; j < 4; j++) addParticle(bx[ii], by[ii], c);
        playChainPop();
      }, delay);
      delay += 15 + Math.random() * 30 | 0;
    }
    // Confetti
    for (let i = 0; i < 60; i++) addConfetti(x0, y0);
  } else {
    // Normal bubble: play pentatonic note based on color
    if (chainDepth === 0) {
      playMusicalPop(bcolorIdx[idx], x0, br[idx]);
    } else {
      playChainPop();
    }
    // Chain reaction: pop nearby (reduced radius to prevent total wipeout)
    if (chainDepth < 3) {
      const chainR = br[idx] * 2.0;
      const chainR2 = chainR * chainR;
      for (let i = 0; i < bcount; i++) {
        if (i === idx || !balive[i] || bgolden[i]) continue;
        const dx = bx[i] - x0, dy = by[i] - y0;
        if (dx * dx + dy * dy < chainR2) {
          const ii = i;
          setTimeout(() => popBubble(ii, chainDepth + 1), 60 + Math.random() * 80 | 0);
        }
      }
    }
  }

  // ── Child bubbles: when a bubble pops, 1-2 new ones appear nearby ──
  // This ensures the screen is never empty after chain reactions
  const childCount = (chainDepth === 0) ? 2 : 1; // direct tap = 2 children, chain = 1
  const sz = Math.min(W, H) / 600;
  for (let c = 0; c < childCount; c++) {
    if (bcount >= MAX_BUBBLES) break;
    const childR = (20 + Math.random() * 30) * sz;
    const ox = (Math.random() - 0.5) * 80;
    const oy = (Math.random() - 0.5) * 60;
    const cx = Math.max(childR, Math.min(W - childR, x0 + ox));
    const cy = Math.max(childR, Math.min(H - childR, y0 + oy));
    addBubble(cx, cy, childR, false, 0.3);
    bvy[bcount - 1] = -(0.4 + Math.random() * 0.8);
    bvx[bcount - 1] = (Math.random() - 0.5) * 1.5;
  }
}

// ── Spawn ──
function spawnBubble() {
  if (bcount < MAX_BUBBLES) addBubble();
}
function spawnGolden() {
  const sz = Math.min(W, H) / 600;
  const r = (60 + Math.random() * 30) * sz;
  addBubble(Math.random() * (W - r * 2) + r, H + r, r, true);
  // Set the vy for golden
  bvy[bcount - 1] = -(0.2 + Math.random() * 0.2);
}

// ── Input ──
function handlePop(x, y) {
  for (let i = bcount - 1; i >= 0; i--) {
    if (!balive[i]) continue;
    const dx = x - bx[i], dy = y - by[i];
    if (dx * dx + dy * dy < br[i] * br[i] * 1.3) {
      popBubble(i, 0);
      return;
    }
  }
  // Tap empty space: spawn mini bubbles
  const sz = Math.min(W, H) / 600;
  for (let i = 0; i < 3; i++) {
    const r = (20 + Math.random() * 25) * sz;
    addBubble(x + (Math.random() - 0.5) * 40, y + (Math.random() - 0.5) * 40, r, false, 0.8);
    bvy[bcount - 1] = -(0.6 + Math.random() * 0.8);
  }
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  handlePop(e.clientX, e.clientY);
});
canvas.addEventListener('pointermove', e => {
  if (e.buttons > 0 || e.pressure > 0) {
    handlePop(e.clientX, e.clientY);
  }
});

// ── Parallax clouds (camera moving upward — clouds drift down) ──
// Pre-render soft cloud sprites on offscreen canvas for better quality
const CLOUD_LAYERS = 3;
const CLOUD_SPEED = [0.15, 0.35, 0.7];
const CLOUD_ALPHA = [0.08, 0.14, 0.22];
const CLOUD_SCALE = [0.6, 1.0, 1.6];
const CLOUD_COUNT = [7, 5, 3];

function makeCloudSprite(w, h) {
  const pad = Math.max(w, h) * 0.4; // room for shadowBlur
  const cw = w + pad * 2, ch = h + pad * 2;
  const oc = document.createElement('canvas');
  oc.width = cw; oc.height = ch;
  const c = oc.getContext('2d');
  const cx = cw / 2, cy = ch / 2;

  // Use shadowBlur for soft edges
  c.shadowColor = 'rgba(255,255,255,0.7)';
  c.shadowBlur = h * 0.6;
  c.shadowOffsetX = 0; c.shadowOffsetY = 0;

  // Build cloud shape from overlapping circles (more natural than ellipses)
  c.beginPath();
  // Main body — wide flat ellipse
  c.ellipse(cx, cy + h * 0.05, w * 0.42, h * 0.32, 0, 0, Math.PI * 2);
  // Top puffs
  const puffs = [
    { x: -0.18, y: -0.22, r: 0.28 },
    { x: 0.08, y: -0.32, r: 0.32 },
    { x: 0.30, y: -0.18, r: 0.22 },
    { x: -0.32, y: -0.10, r: 0.20 },
    { x: -0.05, y: -0.15, r: 0.30 },
  ];
  for (const p of puffs) {
    c.moveTo(cx + p.x * w + p.r * w, cy + p.y * h);
    c.arc(cx + p.x * w, cy + p.y * h, p.r * w * 0.5, 0, Math.PI * 2);
  }
  c.fillStyle = 'rgba(255,255,255,0.85)';
  c.fill();

  // Second pass without shadow for inner glow
  c.shadowBlur = 0;
  // Radial gradient for soft inner volume
  const grad = c.createRadialGradient(cx - w * 0.05, cy - h * 0.15, w * 0.05, cx, cy, w * 0.45);
  grad.addColorStop(0, 'rgba(255,255,255,0.6)');
  grad.addColorStop(0.4, 'rgba(255,255,255,0.3)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  c.globalCompositeOperation = 'source-atop';
  c.fillStyle = grad;
  c.fillRect(0, 0, cw, ch);

  return { canvas: oc, pad };
}

const clouds = [];
for (let layer = 0; layer < CLOUD_LAYERS; layer++) {
  for (let i = 0; i < CLOUD_COUNT[layer]; i++) {
    const w = (140 + Math.random() * 200) * CLOUD_SCALE[layer];
    const h = (50 + Math.random() * 40) * CLOUD_SCALE[layer];
    clouds.push({
      x: Math.random() * 2000 - 500,
      y: Math.random() * 2000 - 500,
      layer, w, h,
      sprite: makeCloudSprite(w, h),
    });
  }
}

function drawClouds(dt, cloudMul) {
  const mul = cloudMul ?? 1;
  for (let i = 0; i < clouds.length; i++) {
    const c = clouds[i];
    c.y += CLOUD_SPEED[c.layer] * dt * 0.06;
    c.x += Math.sin(c.y * 0.002 + i) * 0.02 * dt;
    if (c.y - c.h > H + 100) {
      c.y = -c.h - Math.random() * 200;
      c.x = Math.random() * (W + 400) - 200;
    }
    ctx.globalAlpha = CLOUD_ALPHA[c.layer] * mul;
    const sp = c.sprite;
    ctx.drawImage(sp.canvas, c.x - c.w / 2 - sp.pad, c.y - c.h / 2 - sp.pad);
  }
  ctx.globalAlpha = 1;
}

// ── Day/Night cycle ──
// 5 phases: morning → day → sunset-warm → sunset-dark → night
const SKY_PHASES = [
  { // 0: Morning (dawn) — cool lavender
    top:    [180, 160, 220],
    mid:    [200, 200, 245],
    bot:    [170, 220, 255],
    cloud:  1.0,
  },
  { // 1: Day — bright blue sky
    top:    [160, 215, 255],
    mid:    [168, 230, 255],
    bot:    [125, 214, 245],
    cloud:  1.0,
  },
  { // 2: Sunset warm — sky warms up, bottom glows orange
    top:    [180, 150, 160],
    mid:    [230, 160, 100],
    bot:    [255, 175, 85],
    cloud:  0.85,
  },
  { // 3: Sunset deep — everything darkens warmly (NO purple/navy)
    top:    [90, 55, 55],
    mid:    [130, 60, 40],
    bot:    [110, 50, 35],
    cloud:  0.45,
  },
  { // 4: Night — dark blue (purple only appears here)
    top:    [10, 10, 40],
    mid:    [20, 25, 70],
    bot:    [30, 40, 90],
    cloud:  0.25,
  },
];
const NUM_PHASES = SKY_PHASES.length;
const PHASE_DURATION = 20000; // 20s per phase → 100s full cycle
const TRANSITION_DURATION = 4000; // 4s blend between phases
let dayTime = PHASE_DURATION; // start at "day" phase

function lerpColor(a, b, t) {
  return [
    a[0] + (b[0] - a[0]) * t,
    a[1] + (b[1] - a[1]) * t,
    a[2] + (b[2] - a[2]) * t,
  ];
}

// Pre-generate stars (scroll down like clouds, 3 depth layers)
const STAR_COUNT = 100;
const STAR_SPEED = [0.008, 0.018, 0.035]; // parallax scroll speed (pixels per ms*0.06)
const stars = [];
for (let i = 0; i < STAR_COUNT; i++) {
  const layer = i < 50 ? 0 : i < 80 ? 1 : 2;
  stars.push({
    x: Math.random(),
    y: Math.random(), // full screen height
    layer,
    size: layer === 0 ? 0.5 + Math.random() * 1 : layer === 1 ? 1 + Math.random() * 1.5 : 1.5 + Math.random() * 2,
    phase: Math.random() * Math.PI * 2,
    speed: 0.001 + Math.random() * 0.002,
    bright: 0.3 + Math.random() * 0.7,
  });
}

function getSkyColors(time) {
  const cycle = time % (PHASE_DURATION * NUM_PHASES);
  const phaseIdx = Math.floor(cycle / PHASE_DURATION);
  const phaseProgress = (cycle % PHASE_DURATION) / PHASE_DURATION;

  const cur = SKY_PHASES[phaseIdx];
  const next = SKY_PHASES[(phaseIdx + 1) % NUM_PHASES];

  // Smooth transition in last portion of each phase
  const transStart = 1 - (TRANSITION_DURATION / PHASE_DURATION);
  let t = 0;
  if (phaseProgress > transStart) {
    t = (phaseProgress - transStart) / (1 - transStart);
    t = t * t * (3 - 2 * t); // smoothstep
  }

  return {
    top: lerpColor(cur.top, next.top, t),
    mid: lerpColor(cur.mid, next.mid, t),
    bot: lerpColor(cur.bot, next.bot, t),
    cloudAlpha: cur.cloud + (next.cloud - cur.cloud) * t,
    nightAmount: getNightAmount(cycle),
  };
}

function getNightAmount(cycle) {
  // Returns 0-1 how "night" it is (for stars)
  // Night is phase 4, sunset-dark is phase 3
  const phaseIdx = Math.floor(cycle / PHASE_DURATION);
  const progress = (cycle % PHASE_DURATION) / PHASE_DURATION;
  const transStart = 1 - (TRANSITION_DURATION / PHASE_DURATION);

  if (phaseIdx === 4) { // night phase
    if (progress > transStart) {
      // Transitioning to morning
      const t = (progress - transStart) / (1 - transStart);
      return 1 - t * t;
    }
    return 1;
  }
  if (phaseIdx === 3 && progress > transStart) {
    // Sunset-dark transitioning to night
    const t = (progress - transStart) / (1 - transStart);
    return t * t;
  }
  return 0;
}

function drawSky(dt) {
  dayTime += dt;
  const sky = getSkyColors(dayTime);

  // Draw sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  const rc = (c) => `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
  grad.addColorStop(0, rc(sky.top));
  grad.addColorStop(0.45, rc(sky.mid));
  grad.addColorStop(1, rc(sky.bot));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Update star positions always (so they scroll continuously)
  for (const s of stars) {
    s.y += STAR_SPEED[s.layer] * dt * 0.06 / H;
    if (s.y > 1.05) { s.y = -0.05; s.x = Math.random(); }
  }
  // Draw stars only during night
  if (sky.nightAmount > 0.05) {
    for (const s of stars) {
      const twinkle = 0.5 + 0.5 * Math.sin(dayTime * s.speed + s.phase);
      const alpha = sky.nightAmount * s.bright * twinkle;
      if (alpha < 0.02) continue;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Clouds with time-of-day alpha modulation
  drawClouds(dt, sky.cloudAlpha);
}

// ── Intro text overlay ──
let introTime = 0;
const INTRO_DURATION = 4000;  // 4s visible
const INTRO_FADE = 800;       // 0.8s fade out

function drawIntro(dt) {
  introTime += dt;
  if (introTime > INTRO_DURATION + INTRO_FADE) return;

  let alpha = 1;
  if (introTime > INTRO_DURATION) {
    alpha = 1 - (introTime - INTRO_DURATION) / INTRO_FADE;
  }

  // Semi-transparent overlay
  ctx.globalAlpha = alpha * 0.3;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Text — fit to screen width with padding
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Measure and fit main text
  const mainText = 'シャボン玉をタップしてあそぼう！';
  let fontSize = Math.min(W * 0.08, 40);
  ctx.font = `900 ${fontSize}px 'Zen Maru Gothic', sans-serif`;
  // Shrink if text overflows (with 20px padding each side)
  while (ctx.measureText(mainText).width > W - 40 && fontSize > 14) {
    fontSize -= 2;
    ctx.font = `900 ${fontSize}px 'Zen Maru Gothic', sans-serif`;
  }

  // Soft shadow
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 3;

  ctx.fillStyle = '#fff';
  ctx.fillText(mainText, W / 2, H * 0.45);

  // Sub text
  const subText = 'タップするとシャボン玉がわれるよ';
  let subSize = fontSize * 0.55;
  ctx.font = `700 ${subSize}px 'Zen Maru Gothic', sans-serif`;
  while (ctx.measureText(subText).width > W - 40 && subSize > 10) {
    subSize -= 2;
    ctx.font = `700 ${subSize}px 'Zen Maru Gothic', sans-serif`;
  }
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText(subText, W / 2, H * 0.55);

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  ctx.globalAlpha = 1;
}

// ── Main loop ──
let lastTime = 0;
let spawnTimer = 0;
goldenTimer = GOLDEN_INTERVAL * 0.7;

function loop(time) {
  const dt = Math.min(time - lastTime, 50) || 16;
  lastTime = time;

  drawSky(dt);

  // Spawn — faster base rate + emergency refill when low
  spawnTimer += dt;
  const spawnInterval = bcount < 20 ? 80 : bcount < 35 ? 150 : 250;
  if (spawnTimer > spawnInterval) { spawnBubble(); spawnTimer = 0; }
  // Emergency burst: if very few bubbles, spawn several at once
  if (bcount < 15) {
    for (let s = 0; s < 3 && bcount < MAX_BUBBLES; s++) spawnBubble();
  }
  goldenTimer += dt;
  if (goldenTimer > GOLDEN_INTERVAL) { spawnGolden(); goldenTimer = 0; }

  // Update bubbles
  for (let i = bcount - 1; i >= 0; i--) {
    if (!balive[i] || by[i] < -br[i] * 2) {
      // Swap-remove
      bcount--;
      if (i < bcount) {
        bx[i] = bx[bcount]; by[i] = by[bcount]; br[i] = br[bcount];
        bvx[i] = bvx[bcount]; bvy[i] = bvy[bcount];
        bwobblePhase[i] = bwobblePhase[bcount]; bwobbleSpeed[i] = bwobbleSpeed[bcount];
        bwobbleAmp[i] = bwobbleAmp[bcount]; bopacity[i] = bopacity[bcount];
        bcolorIdx[i] = bcolorIdx[bcount]; bgolden[i] = bgolden[bcount];
        balive[i] = balive[bcount]; bfadeIn[i] = bfadeIn[bcount];
        bcreature[i] = bcreature[bcount];
      }
      continue;
    }
    if (bfadeIn[i]) {
      bopacity[i] = Math.min(1, bopacity[i] + dt * 0.008);
      if (bopacity[i] >= 1) bfadeIn[i] = 0;
    }
    bwobblePhase[i] += bwobbleSpeed[i] * dt;
    bx[i] += (bvx[i] + Math.sin(bwobblePhase[i]) * bwobbleAmp[i]) * dt * 0.15;
    by[i] += bvy[i] * dt * 0.15;
    if (bx[i] < -br[i]) bx[i] = W + br[i];
    if (bx[i] > W + br[i]) bx[i] = -br[i];
  }

  // Snapshot background (sky+clouds) for refraction lens effect
  bgCtx.drawImage(canvas, 0, 0);

  // Draw bubbles: refraction lens + sprite overlay
  const LENS_ZOOM = 1.08; // magnification inside bubble
  const LENS_SHIFT = 0.04; // slight upward shift (light bends up)
  for (let i = 0; i < bcount; i++) {
    if (!balive[i]) continue;
    const r = br[i], x0 = bx[i], y0 = by[i];
    const opacity = bopacity[i];

    // ── Refraction lens: clip to bubble circle, draw magnified background ──
    if (opacity > 0.3 && r > 15) {
      ctx.save();
      ctx.globalAlpha = opacity * 0.35;
      ctx.beginPath();
      ctx.arc(x0, y0, r * 0.92, 0, Math.PI * 2);
      ctx.clip();
      // Draw background magnified from bubble center
      const srcR = r / LENS_ZOOM;
      const shiftY = r * LENS_SHIFT;
      ctx.drawImage(bgCanvas,
        x0 - srcR, y0 - srcR - shiftY, srcR * 2, srcR * 2, // source (smaller area)
        x0 - r, y0 - r, r * 2, r * 2                       // dest (full bubble area = magnified)
      );
      ctx.restore();
    }

    // ── Normal bubble sprite ──
    const { sprite, snapSize } = getBubbleSprite(r, bcolorIdx[i], bgolden[i]);
    const scale = r / snapSize;
    const drawSize = (snapSize * 2 + sprite.pad * 2) * scale;
    ctx.globalAlpha = opacity;
    ctx.drawImage(sprite.canvas, x0 - drawSize / 2, y0 - drawSize / 2, drawSize, drawSize);
  }
  ctx.globalAlpha = 1;

  // Update & draw particles
  for (let i = pcount - 1; i >= 0; i--) {
    px[i] += pvx[i] * dt * 0.25;
    py[i] += pvy[i] * dt * 0.25;
    pvy[i] += 0.03 * dt * 0.25;
    plife[i] -= pdecay[i] * dt * 0.1;
    if (plife[i] <= 0) {
      pcount--;
      if (i < pcount) {
        px[i] = px[pcount]; py[i] = py[pcount]; pvx[i] = pvx[pcount]; pvy[i] = pvy[pcount];
        psize[i] = psize[pcount]; plife[i] = plife[pcount]; pdecay[i] = pdecay[pcount];
        pcr[i] = pcr[pcount]; pcg[i] = pcg[pcount]; pcb[i] = pcb[pcount];
      }
      continue;
    }
    ctx.globalAlpha = plife[i];
    ctx.beginPath();
    ctx.arc(px[i], py[i], psize[i] * plife[i], 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${pcr[i]},${pcg[i]},${pcb[i]})`;
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Update & draw confetti
  for (let i = cfcount - 1; i >= 0; i--) {
    cfx[i] += cfvx[i] * dt * 0.2;
    cfy[i] += cfvy[i] * dt * 0.2;
    cfvy[i] += 0.06 * dt * 0.2;
    cfvx[i] *= 0.995;
    cfrot[i] += cfrotSpd[i] * dt * 0.1;
    cflife[i] -= 0.006 * dt * 0.1;
    if (cflife[i] <= 0) {
      cfcount--;
      if (i < cfcount) {
        cfx[i] = cfx[cfcount]; cfy[i] = cfy[cfcount]; cfvx[i] = cfvx[cfcount]; cfvy[i] = cfvy[cfcount];
        cfrot[i] = cfrot[cfcount]; cfrotSpd[i] = cfrotSpd[cfcount]; cflife[i] = cflife[cfcount];
        cfsize[i] = cfsize[cfcount]; cfcr[i] = cfcr[cfcount]; cfcg[i] = cfcg[cfcount]; cfcb[i] = cfcb[cfcount];
      }
      continue;
    }
    ctx.save();
    ctx.globalAlpha = cflife[i];
    ctx.translate(cfx[i], cfy[i]);
    ctx.rotate(cfrot[i]);
    ctx.fillStyle = `rgb(${cfcr[i]},${cfcg[i]},${cfcb[i]})`;
    ctx.fillRect(-cfsize[i] / 2, -cfsize[i] / 4, cfsize[i], cfsize[i] / 2);
    ctx.restore();
  }

  // Draw creature emoji on creature bubbles
  for (let i = 0; i < bcount; i++) {
    if (!balive[i] || bcreature[i] < 0) continue;
    const r = br[i], x0 = bx[i], y0 = by[i];
    const opacity = bopacity[i];
    if (opacity < 0.3) continue;
    ctx.globalAlpha = opacity * 0.9;
    ctx.font = `${r * 0.8}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(CREATURES[bcreature[i]], x0, y0);
    // Shimmer ring around creature bubble
    ctx.globalAlpha = opacity * 0.4 * (0.5 + 0.5 * Math.sin(lastTime * 0.005 + i));
    ctx.beginPath();
    ctx.arc(x0, y0, r * 1.05, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,200,0.6)`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Update & draw flying creatures (after pop)
  for (let i = flyCount - 1; i >= 0; i--) {
    flyX[i] += flyVx[i] * dt * 0.15;
    flyY[i] += flyVy[i] * dt * 0.15;
    flyVy[i] += 0.01 * dt * 0.15; // gentle gravity
    flyRot[i] += 0.003 * dt;
    flyLife[i] -= 0.0008 * dt;
    if (flyLife[i] <= 0) {
      flyCount--;
      if (i < flyCount) {
        flyX[i] = flyX[flyCount]; flyY[i] = flyY[flyCount];
        flyVx[i] = flyVx[flyCount]; flyVy[i] = flyVy[flyCount];
        flyLife[i] = flyLife[flyCount]; flySize[i] = flySize[flyCount];
        flyCreature[i] = flyCreature[flyCount]; flyRot[i] = flyRot[flyCount];
      }
      continue;
    }
    ctx.save();
    ctx.globalAlpha = flyLife[i];
    ctx.translate(flyX[i], flyY[i]);
    // Wobble left-right
    ctx.rotate(Math.sin(flyRot[i] * 3) * 0.2);
    const sz = flySize[i] * (1 + (1 - flyLife[i]) * 0.5); // grow slightly as it flies
    ctx.font = `${sz}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(CREATURES[flyCreature[i]], 0, 0);
    ctx.restore();
  }

  // Update & draw music note particles
  for (let i = noteCount - 1; i >= 0; i--) {
    noteX[i] += noteVx[i] * dt * 0.1;
    noteY[i] += noteVy[i] * dt * 0.15;
    noteLife[i] -= 0.0015 * dt;
    if (noteLife[i] <= 0) {
      noteCount--;
      if (i < noteCount) {
        noteX[i] = noteX[noteCount]; noteY[i] = noteY[noteCount];
        noteVx[i] = noteVx[noteCount]; noteVy[i] = noteVy[noteCount];
        noteLife[i] = noteLife[noteCount]; noteSize[i] = noteSize[noteCount];
        noteColorIdx[i] = noteColorIdx[noteCount]; noteSymIdx[i] = noteSymIdx[noteCount];
      }
      continue;
    }
    const c = COLORS[noteColorIdx[i]];
    ctx.globalAlpha = noteLife[i] * 0.8;
    ctx.font = `bold ${noteSize[i]}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
    ctx.fillText(NOTE_SYMBOLS[noteSymIdx[i]], noteX[i], noteY[i]);
  }
  ctx.globalAlpha = 1;

  // Draw rainbow burst ring
  if (rainbowBurst) {
    rainbowBurst.time += dt;
    if (rainbowBurst.time >= rainbowBurst.maxTime) {
      rainbowBurst = null;
    } else {
      const t = rainbowBurst.time / rainbowBurst.maxTime;
      const radius = t * Math.max(W, H) * 0.3;
      const alpha = (1 - t) * 0.6;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(rainbowBurst.x, rainbowBurst.y, radius, 0, Math.PI * 2);
      // Rainbow gradient stroke (conic if supported, fallback to solid)
      if (ctx.createConicGradient) {
        const grad = ctx.createConicGradient(0, rainbowBurst.x, rainbowBurst.y);
        grad.addColorStop(0, 'red');
        grad.addColorStop(0.17, 'orange');
        grad.addColorStop(0.33, 'yellow');
        grad.addColorStop(0.5, 'green');
        grad.addColorStop(0.67, 'blue');
        grad.addColorStop(0.83, 'purple');
        grad.addColorStop(1, 'red');
        ctx.strokeStyle = grad;
      } else {
        // Fallback: cycle through rainbow colors
        const hue = (t * 360) % 360;
        ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
      }
      ctx.lineWidth = 6 * (1 - t);
      ctx.stroke();
      ctx.restore();
    }
  }

  // Update combo timer
  if (comboTimer > 0) comboTimer -= dt;

  // Creature bubble spawning
  creatureTimer += dt;
  if (creatureTimer >= nextCreatureTime) {
    spawnCreatureBubble();
    creatureTimer = 0;
    nextCreatureTime = CREATURE_MIN_INTERVAL + Math.random() * (CREATURE_MAX_INTERVAL - CREATURE_MIN_INTERVAL);
  }

  // Intro overlay
  drawIntro(dt);

  requestAnimationFrame(loop);
}

// Initial bubbles (more to start with)
for (let i = 0; i < 40; i++) {
  addBubble(Math.random() * W, Math.random() * H);
  bopacity[i] = 1;
  bfadeIn[i] = 0;
}

requestAnimationFrame(loop);
</script>
