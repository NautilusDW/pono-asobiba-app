<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>しゃぼんだまパーティー | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100dvh; overflow: hidden;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: linear-gradient(180deg, #e0f4ff 0%, #a8e6ff 40%, #7dd6f5 100%);
  touch-action: none; user-select: none; -webkit-user-select: none;
}
canvas { display: block; width: 100%; height: 100%; }
#back-btn {
  position: fixed; top: 12px; left: 12px; z-index: 100;
  background: rgba(255,255,255,0.85); border: none; border-radius: 50%;
  width: 44px; height: 44px; font-size: 22px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
}
</style>
</head>
<body>
<button id="back-btn" onclick="location.href='../'">🏠</button>
<canvas id="c"></canvas>

<script>
'use strict';
// ── Canvas setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Audio (lazy init on first gesture) ──
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playPop(pitch) {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 600 + pitch * 400;
  gain.gain.setValueAtTime(0.5, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.15);
}
function playChainPop() {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = 900 + Math.random() * 600;
  gain.gain.setValueAtTime(0.35, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.1);
}
function playGoldenBoom() {
  const ctx = getAudio();
  for (let i = 0; i < 5; i++) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
    osc.frequency.value = 300 + i * 200;
    const t = ctx.currentTime + i * 0.06;
    gain.gain.setValueAtTime(0.4, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.4);
  }
}

// ── Bubble colors ──
const COLORS = [
  { r: 255, g: 130, b: 170 }, // pink
  { r: 130, g: 200, b: 255 }, // blue
  { r: 170, g: 255, b: 170 }, // green
  { r: 255, g: 220, b: 130 }, // yellow
  { r: 200, g: 160, b: 255 }, // purple
  { r: 255, g: 180, b: 130 }, // orange
];

// ── Bubbles ──
const bubbles = [];
const particles = [];
const confetti = [];
let goldenTimer = 0;
const GOLDEN_INTERVAL = 12000; // ms

class Bubble {
  constructor(x, y, r, golden) {
    this.r = r || (35 + Math.random() * 45) * (Math.min(W, H) / 600);
    this.x = x ?? (Math.random() * W);
    this.y = y ?? (H + this.r + Math.random() * 100);
    this.golden = golden || false;
    this.color = this.golden ? { r: 255, g: 215, b: 60 } : COLORS[Math.floor(Math.random() * COLORS.length)];
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = -(0.5 + Math.random() * 1.0) * (this.golden ? 0.6 : 1);
    this.wobblePhase = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.02 + Math.random() * 0.02;
    this.wobbleAmp = 0.5 + Math.random() * 0.5;
    this.alive = true;
    this.opacity = 0;
    this.fadeIn = true;
    this.shimmer = Math.random() * Math.PI * 2;
  }

  update(dt) {
    if (this.fadeIn) {
      this.opacity = Math.min(1, this.opacity + dt * 0.008);
      if (this.opacity >= 1) this.fadeIn = false;
    }
    this.wobblePhase += this.wobbleSpeed * dt;
    this.shimmer += 0.02 * dt;
    this.x += (this.vx + Math.sin(this.wobblePhase) * this.wobbleAmp) * dt * 0.15;
    this.y += this.vy * dt * 0.15;
    // wrap horizontally
    if (this.x < -this.r) this.x = W + this.r;
    if (this.x > W + this.r) this.x = -this.r;
    // remove if off top
    if (this.y < -this.r * 2) this.alive = false;
  }

  draw(ctx) {
    const { x, y, r, color, golden, opacity, shimmer } = this;
    ctx.save();
    ctx.globalAlpha = opacity * 0.75;

    // Main bubble
    const grad = ctx.createRadialGradient(x - r * 0.25, y - r * 0.25, r * 0.1, x, y, r);
    if (golden) {
      grad.addColorStop(0, `rgba(255,255,200,0.9)`);
      grad.addColorStop(0.5, `rgba(255,215,60,0.6)`);
      grad.addColorStop(1, `rgba(255,180,0,0.2)`);
    } else {
      grad.addColorStop(0, `rgba(255,255,255,0.9)`);
      grad.addColorStop(0.4, `rgba(${color.r},${color.g},${color.b},0.45)`);
      grad.addColorStop(1, `rgba(${color.r},${color.g},${color.b},0.1)`);
    }
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Shine highlight
    ctx.globalAlpha = opacity * (0.5 + Math.sin(shimmer) * 0.15);
    ctx.beginPath();
    ctx.ellipse(x - r * 0.3, y - r * 0.3, r * 0.25, r * 0.15, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // Golden glow
    if (golden) {
      ctx.globalAlpha = 0.25 + Math.sin(shimmer * 2) * 0.15;
      ctx.beginPath();
      ctx.arc(x, y, r * 1.3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,215,60,0.3)';
      ctx.fill();
    }

    // Outline
    ctx.globalAlpha = opacity * 0.3;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.strokeStyle = golden ? 'rgba(255,180,0,0.5)' : `rgba(${color.r},${color.g},${color.b},0.4)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.restore();
  }

  contains(px, py) {
    const dx = px - this.x, dy = py - this.y;
    return dx * dx + dy * dy < this.r * this.r * 1.3; // slightly generous
  }
}

// ── Pop particles ──
class Particle {
  constructor(x, y, color, size) {
    this.x = x; this.y = y;
    this.color = color;
    this.size = size || 3 + Math.random() * 4;
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = 0.02 + Math.random() * 0.02;
  }
  update(dt) {
    this.x += this.vx * dt * 0.25;
    this.y += this.vy * dt * 0.25;
    this.vy += 0.03 * dt * 0.25;
    this.life -= this.decay * dt * 0.1;
  }
  draw(ctx) {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${this.color.r},${this.color.g},${this.color.b})`;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ── Confetti ──
class Confetti {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.size = 4 + Math.random() * 6;
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 6;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - 4;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.3;
    this.life = 1;
  }
  update(dt) {
    this.x += this.vx * dt * 0.2;
    this.y += this.vy * dt * 0.2;
    this.vy += 0.06 * dt * 0.2;
    this.vx *= 0.995;
    this.rotation += this.rotSpeed * dt * 0.1;
    this.life -= 0.006 * dt * 0.1;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillStyle = `rgb(${this.color.r},${this.color.g},${this.color.b})`;
    ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
    ctx.restore();
  }
}

// ── Pop logic ──
function popBubble(b, chainDepth) {
  if (!b.alive) return;
  b.alive = false;

  // Spawn particles
  const count = b.golden ? 20 : 8;
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(b.x, b.y, b.color, b.golden ? 5 + Math.random() * 5 : undefined));
  }

  if (b.golden) {
    playGoldenBoom();
    // Pop ALL bubbles as chain
    const others = bubbles.filter(o => o.alive && !o.golden);
    others.forEach((o, i) => {
      setTimeout(() => {
        if (o.alive) {
          o.alive = false;
          for (let j = 0; j < 6; j++) particles.push(new Particle(o.x, o.y, o.color));
          playChainPop();
        }
      }, i * 15 + Math.random() * 30);
    });
    // Confetti explosion
    for (let i = 0; i < 80; i++) {
      confetti.push(new Confetti(b.x, b.y));
    }
  } else {
    playPop(Math.random());
    // Chain reaction: pop nearby bubbles
    if (chainDepth < 3) {
      const chainRange = b.r * 2.8;
      bubbles.forEach(o => {
        if (o === b || !o.alive || o.golden) return;
        const dx = o.x - b.x, dy = o.y - b.y;
        if (dx * dx + dy * dy < chainRange * chainRange) {
          const delay = 60 + Math.random() * 80;
          setTimeout(() => popBubble(o, chainDepth + 1), delay);
        }
      });
    }
  }
}

// ── Spawn ──
function spawnBubble() {
  if (bubbles.length < 55) {
    bubbles.push(new Bubble());
  }
}

function spawnGolden() {
  const r = (60 + Math.random() * 30) * (Math.min(W, H) / 600);
  const b = new Bubble(Math.random() * (W - r * 2) + r, H + r, r, true);
  b.vy = -(0.2 + Math.random() * 0.2);
  bubbles.push(b);
}

// ── Input ──
function handlePop(x, y) {
  // Check from front (top rendered) to back
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    if (b.alive && b.contains(x, y)) {
      popBubble(b, 0);
      return;
    }
  }
  // Tap empty space: spawn a small burst of mini bubbles
  for (let i = 0; i < 3; i++) {
    const r = (20 + Math.random() * 25) * (Math.min(W, H) / 600);
    const nb = new Bubble(x + (Math.random() - 0.5) * 40, y + (Math.random() - 0.5) * 40, r);
    nb.vy = -(0.6 + Math.random() * 0.8);
    nb.opacity = 0.8;
    bubbles.push(nb);
  }
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  handlePop(e.clientX, e.clientY);
});
canvas.addEventListener('pointermove', e => {
  if (e.buttons > 0 || e.pressure > 0) {
    handlePop(e.clientX, e.clientY);
  }
});

// ── Background ──
const bgBubbles = [];
for (let i = 0; i < 15; i++) {
  bgBubbles.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    r: 60 + Math.random() * 120,
    speed: 0.1 + Math.random() * 0.15,
    phase: Math.random() * Math.PI * 2,
  });
}
function drawBackground(dt) {
  // Gradient is in CSS, draw decorative bg bubbles
  ctx.save();
  bgBubbles.forEach(b => {
    b.phase += 0.005 * dt;
    b.y -= b.speed * dt * 0.05;
    if (b.y < -b.r) { b.y = H + b.r; b.x = Math.random() * W; }
    ctx.globalAlpha = 0.07;
    ctx.beginPath();
    ctx.arc(b.x + Math.sin(b.phase) * 20, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  });
  ctx.restore();
}

// ── Main loop ──
let lastTime = 0;
let spawnTimer = 0;
goldenTimer = GOLDEN_INTERVAL * 0.7; // first golden comes sooner

function loop(time) {
  const dt = Math.min(time - lastTime, 50) || 16;
  lastTime = time;

  ctx.clearRect(0, 0, W, H);
  drawBackground(dt);

  // Spawn
  spawnTimer += dt;
  if (spawnTimer > 250) { spawnBubble(); spawnTimer = 0; }
  goldenTimer += dt;
  if (goldenTimer > GOLDEN_INTERVAL) { spawnGolden(); goldenTimer = 0; }

  // Update & draw bubbles
  for (let i = bubbles.length - 1; i >= 0; i--) {
    bubbles[i].update(dt);
    if (!bubbles[i].alive || bubbles[i].y < -bubbles[i].r * 2) {
      bubbles.splice(i, 1);
    }
  }
  bubbles.forEach(b => b.draw(ctx));

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(dt);
    if (particles[i].life <= 0) { particles.splice(i, 1); continue; }
    particles[i].draw(ctx);
  }

  // Confetti
  for (let i = confetti.length - 1; i >= 0; i--) {
    confetti[i].update(dt);
    if (confetti[i].life <= 0) { confetti.splice(i, 1); continue; }
    confetti[i].draw(ctx);
  }

  requestAnimationFrame(loop);
}

// Initial bubbles
for (let i = 0; i < 30; i++) {
  const b = new Bubble();
  b.y = Math.random() * H;
  b.opacity = 1;
  b.fadeIn = false;
  bubbles.push(b);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
