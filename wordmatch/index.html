<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>あつめよう！ポノのもりのずかん | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="../common/mvp-flags.js"></script>
<script src="../common/achievements.js"></script>
<script src="../common/acorns.js"></script>
<script src="../common/treasure.js"></script>
<script src="../common/first-clear.js"></script>
<link rel="stylesheet" href="./forestdex.css">
</head>
<body>
  <div class="landscape-notice-overlay">
    <div class="rotate-icon">↻</div>
    <p>よこむきで あそんでね</p>
  </div>

  <section id="title-screen" class="screen screen--title">
    <div class="title-backdrop"></div>
    <div class="title-safe">
      <img class="title-logo" src="../assets/images/wordmatch/title_logo.png" alt="あつめよう！ポノのもりのずかん">
      <p class="title-copy">なまえ・こえ・すがたを あつめて<br>ポノの もりずかんを ふやしていこう</p>
      <div class="difficulty-picker" aria-label="むずかしさ">
        <button type="button" class="difficulty-pill is-active" data-difficulty="easy">かんたん</button>
        <button type="button" class="difficulty-pill" data-difficulty="normal">じっくり</button>
      </div>
      <div class="title-actions">
        <button type="button" id="start-button" class="primary-pill">▶ タップしてスタート</button>
        <button type="button" id="open-collection-button" class="secondary-pill">ずかんを ひらく</button>
      </div>
    </div>
  </section>

  <section id="game-screen" class="screen hidden">
    <div class="scene scene--gameplay">
      <div class="scene-art"></div>
      <div class="safe-area gameplay-safe">
        <button type="button" id="back-to-title-button" class="hud-button hud-button--top">◀ タイトルへ</button>

        <header class="game-title-plaque">
          <h1>あつめよう！ポノのもりのずかん</h1>
        </header>

        <div class="hud-row">
          <div class="hud-chip">
            <span>もんだい</span>
            <strong id="question-counter">1 / 5</strong>
          </div>
          <div class="hud-progress" id="progress-track" aria-label="しんこう"></div>
          <div class="hud-chip">
            <span>せいかい</span>
            <strong id="correct-counter">0</strong>
          </div>
          <div class="hud-badge" id="question-type-badge">なまえ</div>
        </div>

        <section class="page-panel" aria-label="ずかんページ">
          <div class="page-hero">
            <img id="page-hero-image" class="page-hero-image hidden" alt="">
            <div id="voice-stage" class="voice-stage hidden">
              <div class="voice-stage__icon">♪</div>
              <p class="voice-stage__lead">こえを きいてみよう</p>
              <button type="button" id="play-sound-button" class="sound-pill">▶ もういちど きく</button>
            </div>
          </div>

          <div class="page-rows">
            <div class="page-row" data-key="name">
              <span class="page-row__label">なまえ</span>
              <strong id="entry-name-value" class="page-row__value">???</strong>
            </div>
            <div class="page-row" data-key="voice">
              <span class="page-row__label">こえ</span>
              <strong id="entry-voice-value" class="page-row__value">まだ しらべちゅう</strong>
            </div>
            <div class="page-row" data-key="shape">
              <span class="page-row__label">すがた</span>
              <strong id="entry-shape-value" class="page-row__value">まだ しらべちゅう</strong>
            </div>
          </div>
        </section>

        <section class="question-panel" aria-label="もんだい">
          <div class="question-head">
            <span id="question-kicker" class="question-kicker">なまえを みつけよう</span>
            <p id="question-text" class="question-text">この なまえは どれかな？</p>
          </div>
          <div id="choices-grid" class="choices-grid"></div>
          <div class="question-foot">
            <p id="feedback-text" class="feedback-text">こたえを えらぼう</p>
            <button type="button" id="next-button" class="next-pill hidden">つぎへ</button>
          </div>
        </section>

        <aside class="memo-ribbon" aria-label="ポノのメモ">
          <span class="memo-ribbon__label">ポノのメモ</span>
          <p id="memo-text">よく みて、 きいて、 しらべてみよう！</p>
        </aside>
      </div>
    </div>
  </section>

  <section id="result-screen" class="screen hidden">
    <div class="scene scene--collection">
      <div class="scene-art"></div>
      <div class="safe-area collection-safe">
        <button type="button" id="result-back-button" class="hud-button hud-button--top">◀ タイトルへ</button>

        <header class="game-title-plaque game-title-plaque--result">
          <h2 id="result-title">ずかんに とうろくされたよ！</h2>
        </header>

        <div class="result-summary">
          <div class="summary-chip"><span id="result-correct-label">せいかい</span><strong id="result-correct">0 / 5</strong></div>
          <div class="summary-chip"><span id="result-entry-label">みつけた なかま</span><strong id="result-entry-name">-</strong></div>
        </div>

        <section class="collection-grid-panel" aria-label="あつめた なかま">
          <div id="collection-grid" class="collection-grid"></div>
        </section>

        <section class="detail-page-panel" aria-label="ページのしょうさい">
          <div class="detail-page-panel__hero">
            <img id="result-hero-image" alt="">
          </div>
          <div class="detail-page-panel__rows">
            <div class="detail-row">
              <span>なまえ</span>
              <strong id="result-name-value">-</strong>
            </div>
            <div class="detail-row">
              <span>こえ</span>
              <strong id="result-voice-value">-</strong>
            </div>
            <div class="detail-row">
              <span>すがた</span>
              <strong id="result-shape-value">-</strong>
            </div>
          </div>
          <div class="detail-note">
            <p id="result-note">ポノが もりで みつけた なかまの ページだよ。</p>
          </div>
        </section>

        <div class="result-actions">
          <button type="button" id="play-again-button" class="primary-pill">つぎを あつめる</button>
          <button type="button" id="title-return-button" class="secondary-pill">タイトルへ</button>
        </div>
      </div>
    </div>
  </section>

  <script src="./forestdex.js"></script>
</body>
</html>
