<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ことばあわせ | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="../common/points.js"></script>
<script src="../common/achievements.js"></script>
<script src="../common/menu.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8F0;
  --primary: #F2915A;
  --primary-light: #FDDCBF;
  --text: #5D4E37;
  --text-light: #A89880;
  --shadow: rgba(93,78,55,0.12);
  --radius: 20px;
}

html, body {
  min-height: 100dvh;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 8px 16px 32px;
}

/* ===== Header ===== */
.header {
  text-align: center;
  position: relative;
  width: 100%;
}

.header h1 {
  font-size: 1.4rem; font-weight: 900; color: var(--primary);
  text-shadow: 2px 2px 0 var(--primary-light);
}
.subtitle {
  font-size: 0.78rem; color: var(--text-light); font-weight: 700;
}

/* ===== Stage info ===== */
.stage-info {
  text-align: center;
}
.stage-name {
  font-size: 1.1rem; font-weight: 900; color: var(--text);
}
.stage-num {
  font-size: 0.75rem; font-weight: 900; color: var(--text-light);
  background: var(--primary-light);
  border-radius: 20px;
  padding: 2px 14px;
  display: inline-block;
  margin-top: 3px;
}

/* ===== Picture grid ===== */
.pic-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 360px;
}

.pic-slot {
  background: #fff;
  border-radius: 16px;
  border: 2.5px solid #FDE68A;
  box-shadow: 0 3px 12px var(--shadow);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 8px 10px;
  gap: 8px;
  transition: border-color 0.2s;
}

.pic-emoji {
  font-size: 3.4rem;
  line-height: 1;
  pointer-events: none;
}

.pic-label {
  min-height: 38px;
  width: 100%;
  border-radius: 50px;
  border: 2px dashed #C8C0B8;
  background: #FFFBF0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.05rem;
  font-weight: 900;
  color: var(--text);
  transition: border-color 0.15s, background 0.15s;
  pointer-events: auto;
}

.pic-label.hover {
  border-color: var(--primary);
  background: var(--primary-light);
  border-style: solid;
}

.pic-label.matched {
  border-style: solid;
  border-color: #34D399;
  background: #D1FAE5;
  color: #065F46;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn {
  from { transform: scale(0.8); opacity: 0.5; }
  to   { transform: scale(1);   opacity: 1; }
}

/* ===== Word tray wrapper ===== */
.word-tray-wrap {
  width: 100%;
  max-width: 360px;
  background: rgba(255,255,255,0.85);
  border: 2.5px solid #FDE68A;
  border-radius: 18px;
  padding: 10px 14px 14px;
  box-shadow: 0 3px 12px var(--shadow);
  margin-top: 6px;
}
.word-tray-title {
  text-align: center;
  font-size: 0.82rem;
  font-weight: 900;
  color: var(--text-light);
  margin-bottom: 10px;
}

/* ===== Game row (portrait: vertical stack) ===== */
.game-row {
  display: contents;
}

/* ===== Word tray ===== */
.word-tray {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  min-height: 56px;
}

.word-card {
  padding: 10px 8px;
  border-radius: 50px;
  background: linear-gradient(135deg, #FBBF24, #F97316);
  color: #fff;
  font-size: 1.05rem;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(249,115,22,0.28);
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
  letter-spacing: 0.05em;
  text-align: center;
}

.word-card.selected {
  transform: scale(1.12) translateY(-4px);
  box-shadow: 0 0 0 3px #fff, 0 8px 24px rgba(249,115,22,0.55);
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-8px); }
  75%      { transform: translateX(8px); }
}
.word-card.shake { animation: shake 0.35s; }

.word-card.hover {
  background: linear-gradient(135deg, #FDE68A, #FBBF24);
  box-shadow: 0 0 0 2px var(--primary), 0 3px 10px rgba(249,115,22,0.28);
}

.pic-slot.pic-selected .pic-label {
  border-color: var(--primary);
  border-style: solid;
  background: var(--primary-light);
  transform: scale(1.04);
}


/* ===== Success Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(93,78,55,0.72);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  /* backdrop-filter: iOS Safari で子要素タッチが届かない既知バグのため削除 */
  animation: fadeIn 0.3s;
}
.modal-overlay.hidden { display: none; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-content {
  background: #fff;
  border-radius: var(--radius);
  padding: 32px 28px;
  text-align: center;
  max-width: 380px;
  width: 100%;
  box-shadow: 0 8px 40px rgba(93,78,55,0.3);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.modal-emoji { font-size: 3.5rem; }
.modal-title {
  font-size: 1.8rem; font-weight: 900; color: var(--primary);
}
.modal-msg {
  font-size: 1rem; font-weight: 700; color: var(--text-light);
}
.modal-btn {
  margin-top: 4px;
  padding: 13px 36px;
  border: none; border-radius: 50px;
  background: linear-gradient(135deg, #60A5FA, #818CF8);
  color: #fff; font-family: inherit; font-size: 1.1rem; font-weight: 900;
  cursor: pointer; transition: transform 0.15s;
  box-shadow: 0 4px 14px rgba(96,165,250,0.4);
  width: 100%; max-width: 240px;
}
.modal-btn:active { transform: scale(0.95); }

/* ===== Confetti ===== */
#confetti-container {
  position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 11px; height: 11px;
  border-radius: 3px;
  top: -20px;
  animation: confFall 3s ease-in forwards;
}
@keyframes confFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}

/* ===== Landscape layout ===== */
@media (orientation: landscape) {
  html { height: 100dvh; overflow: hidden; margin: 0; padding: 0; }
  body {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100dvh;
    overflow: hidden;
    margin: 0;
    padding: 2px 16px 2px;
    gap: 2px;
  }
  .header { padding: 0; }
  .header h1 { font-size: 0.9rem; }
  .stage-info { margin: 0; }
  .stage-name { font-size: 0.75rem; }
  .stage-num { font-size: 0.6rem; padding: 1px 8px; margin-top: 1px; }
  /* 絵と言葉を左右に並べるラッパー */
  .game-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 700px;
    align-items: center;
    flex: 0 1 auto;
    min-height: 0;
  }
  .pic-grid {
    flex: 1;
    gap: 6px;
    align-content: stretch;
  }
  .pic-slot {
    padding: 4px 6px;
    min-height: 0;
  }
  .pic-emoji { font-size: 2rem; }
  .pic-label { min-height: 24px; font-size: 0.8rem; }
  .word-tray-wrap {
    flex: 1;
    margin-top: 0;
    padding: 12px 14px 14px;
  }
  .word-tray { gap: 8px; }
  .word-tray-title { font-size: 0.75rem; margin-bottom: 8px; }
  .word-card { font-size: 0.9rem; padding: 8px 6px; }
}
</style>

<body>

<header class="header">
  <h1>ことばあわせ</h1>
</header>

<div class="stage-info">
  <p class="stage-name" id="stage-name">どうぶつ 🐾</p>
  <p class="stage-num" id="stage-num">ステージ 1 / 8</p>
</div>

<div class="game-row">
  <div class="pic-grid" id="pic-grid"></div>
  <div class="word-tray-wrap">
    <p class="word-tray-title">えにあう ことばを タップ！</p>
    <div class="word-tray" id="word-tray"></div>
  </div>
</div>

<!-- Stage complete modal -->
<div id="success-modal" class="modal-overlay hidden">
  <div class="modal-content">
    <p class="modal-emoji" id="modal-emoji">🎉</p>
    <p class="modal-title" id="modal-title">ステージ 1 クリア！</p>
    <p class="modal-msg" id="modal-msg">すごい！ぜんぶあったよ！</p>
    <button class="modal-btn" id="modal-btn">つぎへ →</button>
  </div>
</div>

<div id="confetti-container"></div>

<script>
// ===== Stage data =====
// ステージ0-3: ひらがなのみ / ステージ4-7: カタカナ語を含む
const STAGES = [
  { name: 'しぜん 🌸', pairs: [
    { emoji: '🌸', word: 'はな' },
    { emoji: '🌈', word: 'にじ' },
    { emoji: '⭐', word: 'ほし' },
    { emoji: '🌙', word: 'つき' },
  ]},
  { name: 'いろ 🌈', pairs: [
    { emoji: '🔴', word: 'あか' },
    { emoji: '🔵', word: 'あお' },
    { emoji: '🟡', word: 'きいろ' },
    { emoji: '🟢', word: 'みどり' },
  ]},
  { name: 'のりもの 🚗', pairs: [
    { emoji: '🚗', word: 'くるま' },
    { emoji: '✈️', word: 'ひこうき' },
    { emoji: '🚢', word: 'ふね' },
    { emoji: '🚂', word: 'でんしゃ' },
  ]},
  { name: 'どうぶつ 🐾', pairs: [
    { emoji: '🐻', word: 'くま' },
    { emoji: '🐰', word: 'うさぎ' },
    { emoji: '🐘', word: 'ぞう' },
    { emoji: '🐬', word: 'いるか' },
  ]},
  { name: 'くだもの 🍎', pairs: [
    { emoji: '🍎', word: 'りんご' },
    { emoji: '🍌', word: 'バナナ' },
    { emoji: '🍓', word: 'いちご' },
    { emoji: '🍊', word: 'みかん' },
  ]},
  { name: 'やさい 🥕', pairs: [
    { emoji: '🥕', word: 'にんじん' },
    { emoji: '🍅', word: 'トマト' },
    { emoji: '🥒', word: 'きゅうり' },
    { emoji: '🍄', word: 'きのこ' },
  ]},
  { name: 'どうぶつ2 🦁', pairs: [
    { emoji: '🦒', word: 'キリン' },
    { emoji: '🐒', word: 'さる' },
    { emoji: '🦁', word: 'ライオン' },
    { emoji: '🐼', word: 'パンダ' },
  ]},
  { name: 'たべもの 🍚', pairs: [
    { emoji: '🍚', word: 'ごはん' },
    { emoji: '🍜', word: 'ラーメン' },
    { emoji: '🍞', word: 'パン' },
    { emoji: '🍰', word: 'ケーキ' },
  ]},
];

// ===== State =====
let currentStageNum = 0; // 0-indexed; stages 0-7 = category mode, 8+ = mixed mode
let shuffledOrder   = []; // shuffled [0..7] — filled at init
let matchedCount    = 0;
let selectedCard    = null;
let selectedPicIdx  = null;

// ===== Shuffle helper =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== Stage data helpers =====
function getStageData(num) {
  if (num < 8) return STAGES[shuffledOrder[num]];
  return generateMixedStage(num);
}

function generateMixedStage(num) {
  // num=8 → relative=1, num=12 → relative=5, num=16 → relative=9
  const relative   = num - 7;
  const crossCount = relative <= 4 ? 1 : relative <= 8 ? 2 : 4;
  const mainCount  = 4 - crossCount;

  const primaryCat = STAGES[Math.floor(Math.random() * STAGES.length)];
  const mainPairs  = shuffle([...primaryCat.pairs]).slice(0, mainCount);
  const crossPairs = shuffle(
    STAGES.filter(s => s !== primaryCat).flatMap(s => s.pairs)
  ).slice(0, crossCount);

  const label = crossCount >= 4
    ? 'まぜまぜ 🎲'
    : crossCount === 2 ? primaryCat.name + ' ＋ まぜ'
    : primaryCat.name;
  return { name: label, pairs: shuffle([...mainPairs, ...crossPairs]) };
}

// ===== Load stage =====
function loadStage(num) {
  currentStageNum = num;
  matchedCount    = 0;
  selectedCard    = null;
  selectedPicIdx  = null;
  const stage     = getStageData(num);

  document.getElementById('stage-name').textContent = stage.name;
  document.getElementById('stage-num').textContent  =
    num < 8 ? `ステージ ${num + 1} / 8` : `ステージ ${num + 1} 🎲`;

  // Build picture grid
  const grid = document.getElementById('pic-grid');
  grid.innerHTML = '';
  stage.pairs.forEach((pair, i) => {
    const slot = document.createElement('div');
    slot.className = 'pic-slot';
    slot.innerHTML = `
      <div class="pic-emoji">${pair.img ? `<img src="${pair.img}" alt="${pair.word}" style="width:1em;height:1em;vertical-align:middle">` : pair.emoji}</div>
      <div class="pic-label" data-idx="${i}"></div>
    `;
    grid.appendChild(slot);
  });

  // Build word tray (shuffled)
  const tray = document.getElementById('word-tray');
  tray.innerHTML = '';
  shuffle(stage.pairs.map((p, i) => ({ word: p.word, idx: i }))).forEach(({ word, idx }) => {
    const card = document.createElement('div');
    card.className   = 'word-card';
    card.dataset.idx = idx;
    card.textContent = word;
    tray.appendChild(card);
  });
}

// ===== Tap to select & place =====
function clearSelection() {
  if (selectedCard) {
    selectedCard.classList.remove('selected');
    selectedCard = null;
  }
  if (selectedPicIdx !== null) {
    document.querySelectorAll('.pic-slot').forEach(s => s.classList.remove('pic-selected'));
    selectedPicIdx = null;
  }
  document.querySelectorAll('.pic-label').forEach(l => l.classList.remove('hover'));
  document.querySelectorAll('.word-card').forEach(c => c.classList.remove('hover'));
}

function setSelectedCard(card) {
  clearSelection();
  if (card) {
    selectedCard = card;
    card.classList.add('selected');
    document.querySelectorAll('.pic-label:not(.matched)').forEach(l => l.classList.add('hover'));
  }
}

function setSelectedPic(slot, idx) {
  clearSelection();
  selectedPicIdx = idx;
  slot.classList.add('pic-selected');
  document.querySelectorAll('.word-card').forEach(c => c.classList.add('hover'));
}

function tryMatch(card, label) {
  clearSelection();
  if (parseInt(card.dataset.idx) === parseInt(label.dataset.idx)) {
    playCorrect();
    label.textContent = card.textContent;
    label.classList.add('matched');
    card.remove();
    matchedCount++;
    if (matchedCount === 4) setTimeout(showStageComplete, 500);
  } else {
    playWrong();
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
  }
}

document.addEventListener('click', e => {
  const card  = e.target.closest('.word-card');
  const label = e.target.closest('.pic-label:not(.matched)');
  const slot  = e.target.closest('.pic-slot');

  if (card) {
    if (selectedPicIdx !== null) {
      // 絵を先に選んでいた → マッチ試行
      const targetLabel = document.querySelector(`.pic-label[data-idx="${selectedPicIdx}"]:not(.matched)`);
      if (targetLabel) tryMatch(card, targetLabel);
      else clearSelection();
    } else {
      setSelectedCard(selectedCard === card ? null : card);
    }
    return;
  }

  if (label) {
    if (selectedCard) {
      // 文字を先に選んでいた → マッチ試行（従来通り）
      const c = selectedCard;
      tryMatch(c, label);
    } else {
      // 絵を先にタップ → 絵スロットを選択
      const picSlot = label.closest('.pic-slot');
      const idx = parseInt(label.dataset.idx);
      if (selectedPicIdx === idx) {
        clearSelection();
      } else {
        setSelectedPic(picSlot, idx);
      }
    }
    return;
  }

  // 他の場所をタップ → 選択解除
  clearSelection();
});

// ===== Stage complete =====
function showStageComplete() {
  playFanfare();
  launchConfetti();
  awardPoints(5);
  if (window.incrementStat) window.incrementStat('wordmatch_correct', 4); // 1ステージ=4問正解
  const num    = currentStageNum;
  const isAll8 = num === 7; // ステージ8（インデックス7）をクリアした瞬間

  if (isAll8) {
    // 8カテゴリ全クリア → まぜまぜステージへの特別メッセージ
    document.getElementById('modal-emoji').textContent = '🌟';
    document.getElementById('modal-title').textContent = '8ステージ コンプリート！';
    document.getElementById('modal-msg').textContent   = 'つぎから まぜまぜ ステージだよ！';
    document.getElementById('modal-btn').textContent   = 'まぜまぜへ →';
  } else {
    document.getElementById('modal-emoji').textContent = '🎉';
    document.getElementById('modal-title').textContent = `ステージ ${num + 1} クリア！`;
    document.getElementById('modal-msg').textContent   = num >= 8
      ? 'すごい！まぜまぜも できたね！'
      : 'すごい！ぜんぶあったよ！';
    document.getElementById('modal-btn').textContent   = 'つぎへ →';
  }

  document.getElementById('modal-btn').onclick = () => {
    document.getElementById('success-modal').classList.add('hidden');
    loadStage(num + 1);
  };
  document.getElementById('success-modal').classList.remove('hidden');
}

// ===== Confetti =====
function launchConfetti() {
  const container = document.getElementById('confetti-container');
  const colors    = ['#FF6B9D','#F97316','#EAB308','#22C55E','#3B82F6','#8B5CF6','#F43F5E','#06B6D4'];
  for (let i = 0; i < 55; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left             = Math.random() * 100 + 'vw';
      c.style.background       = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay    = Math.random() * 0.4 + 's';
      c.style.animationDuration = (2 + Math.random() * 1.2) + 's';
      container.appendChild(c);
      setTimeout(() => c.remove(), 3600);
    }, i * 25);
  }
}

// ===== Audio =====
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  return _ac;
}
function withAudio(fn) {
  const ac = getAC();
  if (ac.state === 'running') fn(ac);
  else ac.resume().then(() => fn(ac)).catch(() => {});
}
// iOS Safari: 最初のタッチで AudioContext をアンロック
document.addEventListener('touchstart', () => getAC().resume(), { once: true, passive: true });
document.addEventListener('pointerdown', () => getAC().resume(), { once: true, passive: true });

function playCorrect() {
  withAudio(ac => {
    [523.25, 783.99].forEach((freq, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = ac.currentTime + i * 0.13;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.22, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
      o.start(t); o.stop(t + 0.28);
    });
  });
}

function playWrong() {
  withAudio(ac => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(220, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(110, ac.currentTime + 0.22);
    g.gain.setValueAtTime(0.15, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.22);
    o.start(); o.stop(ac.currentTime + 0.22);
  });
}

function playFanfare() {
  withAudio(ac => {
    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = ac.currentTime + i * 0.1;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      o.start(t); o.stop(t + 0.45);
    });
  });
}
