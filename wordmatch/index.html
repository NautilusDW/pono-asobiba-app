<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ことばあわせ | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="../common/achievements.js"></script>
<script src="../common/menu.js"></script>
<script src="../common/treasure.js"></script>
<script src="../common/first-clear.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8F0;
  --primary: #F2915A;
  --primary-light: #FDDCBF;
  --text: #5D4E37;
  --text-light: #A89880;
  --shadow: rgba(93,78,55,0.12);
  --radius: 20px;
}

html, body {
  min-height: 100dvh;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 16px 16px 32px;
  padding-top: 48px;
}

.hidden { display: none !important; }

/* ===== Difficulty Select Screen ===== */
#difficulty-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 380px;
  padding-top: 20px;
}

.diff-title {
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--primary);
  text-shadow: 2px 2px 0 var(--primary-light);
  text-align: center;
}

.diff-cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
}

.diff-card {
  background: #fff;
  border-radius: 20px;
  border: 3px solid #FDE68A;
  box-shadow: 0 4px 16px var(--shadow);
  padding: 20px 24px;
  cursor: pointer;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.diff-card:active {
  transform: scale(0.96);
}

.diff-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.diff-card-stars {
  font-size: 1.4rem;
}

.diff-card-name {
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--text);
}

.diff-card-desc {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-light);
  margin-left: 2px;
}

.diff-card-progress {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--primary);
  margin-top: 4px;
}

/* ===== Stage Select Screen ===== */
#stage-select-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  width: 100%;
  max-width: 400px;
  padding-top: 10px;
}

.stage-select-title {
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--primary);
  text-shadow: 2px 2px 0 var(--primary-light);
}

.stage-select-back {
  padding: 8px 20px;
  border: none;
  border-radius: 50px;
  background: rgba(255,255,255,0.8);
  border: 2px solid #ddd;
  color: var(--text-light);
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
}

.stage-select-back:active { transform: scale(0.95); }

.stage-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
}

.stage-item {
  background: #fff;
  border-radius: 16px;
  border: 2.5px solid #FDE68A;
  box-shadow: 0 3px 12px var(--shadow);
  padding: 14px 18px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}

.stage-item:active { transform: scale(0.97); }

.stage-item.cleared {
  border-color: #34D399;
  background: #F0FFF4;
}

.stage-item.current {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(242,145,90,0.2), 0 3px 12px var(--shadow);
}

.stage-item-num {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--primary-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  font-weight: 900;
  color: var(--primary);
  flex-shrink: 0;
}

.stage-item.cleared .stage-item-num {
  background: #D1FAE5;
  color: #065F46;
}

.stage-item-name {
  font-size: 1rem;
  font-weight: 900;
  color: var(--text);
  flex: 1;
}

.stage-item-status {
  font-size: 1.2rem;
}

/* ===== Header ===== */
.header {
  text-align: center;
  position: relative;
  width: 100%;
}

.header h1 {
  font-size: 1.4rem; font-weight: 900; color: var(--primary);
  text-shadow: 2px 2px 0 var(--primary-light);
}
.subtitle {
  font-size: 0.78rem; color: var(--text-light); font-weight: 700;
}

/* ===== Stage info ===== */
.stage-info {
  text-align: center;
}
.stage-name {
  display: none;
}
.stage-num {
  font-size: 1.1rem; font-weight: 900; color: var(--text);
  background: var(--primary-light);
  border-radius: 20px;
  padding: 4px 18px;
  display: inline-block;
}

/* ===== Picture grid ===== */
.pic-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 360px;
}

.pic-slot {
  background: #fff;
  border-radius: 16px;
  border: 2.5px solid #FDE68A;
  box-shadow: 0 3px 12px var(--shadow);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 8px 10px;
  gap: 8px;
  transition: border-color 0.2s;
}

.pic-slot {
  cursor: pointer;
}

.pic-emoji {
  font-size: 3.4rem;
  line-height: 1;
  pointer-events: none;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.pic-img {
  width: 100%;
  max-height: 80px;
  object-fit: contain;
}

.pic-label {
  min-height: 38px;
  width: 100%;
  border-radius: 50px;
  border: 2px dashed #C8C0B8;
  background: #FFFBF0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.05rem;
  font-weight: 900;
  color: var(--text);
  transition: border-color 0.15s, background 0.15s;
  pointer-events: auto;
}

.pic-label.hover {
  border-color: var(--primary);
  background: var(--primary-light);
  border-style: solid;
}

.pic-label.matched {
  border-style: solid;
  border-color: #34D399;
  background: #D1FAE5;
  color: #065F46;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn {
  from { transform: scale(0.8); opacity: 0.5; }
  to   { transform: scale(1);   opacity: 1; }
}

/* ===== 正解フィードバック ===== */
.praise-toast {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  z-index: 9998;
  padding: 12px 28px;
  background: linear-gradient(135deg, #FFD84D, #F5A800);
  color: #5C3A00;
  font-family: inherit;
  font-size: 1.4rem;
  font-weight: 900;
  border-radius: 50px;
  box-shadow: 0 6px 20px rgba(245, 168, 0, 0.5);
  pointer-events: none;
  text-shadow: 0 1px 2px rgba(255,255,255,0.4);
}
.praise-toast.show {
  animation: praisePop 1.2s ease-out forwards;
}
@keyframes praisePop {
  0%   { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; }
  25%  { transform: translate(-50%, -50%) scale(1.15) rotate(5deg); opacity: 1; }
  40%  { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
  80%  { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0.9) rotate(0deg); opacity: 0; }
}

/* ===== Word tray wrapper ===== */
.word-tray-wrap {
  width: 100%;
  max-width: 360px;
  background: rgba(255,255,255,0.85);
  border: 2.5px solid #FDE68A;
  border-radius: 18px;
  padding: 10px 14px 14px;
  box-shadow: 0 3px 12px var(--shadow);
  margin-top: 6px;
}
.word-tray-title {
  text-align: center;
  font-size: 0.95rem;
  font-weight: 900;
  color: var(--text-light);
  margin-bottom: 10px;
}

/* ===== Game row (portrait: vertical stack) ===== */
.game-row {
  display: contents;
}

/* ===== Word tray ===== */
.word-tray {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  min-height: 56px;
  align-content: start;
}

.word-card {
  padding: 10px 8px;
  border-radius: 50px;
  background: linear-gradient(135deg, #FBBF24, #F97316);
  color: #fff;
  font-size: 1.05rem;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(249,115,22,0.28);
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
  letter-spacing: 0.05em;
  text-align: center;
}

.word-card.selected {
  transform: scale(1.12) translateY(-4px);
  box-shadow: 0 0 0 3px #fff, 0 8px 24px rgba(249,115,22,0.55);
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-8px); }
  75%      { transform: translateX(8px); }
}
.word-card.shake { animation: shake 0.35s; }

.word-card.hover {
  background: linear-gradient(135deg, #FDE68A, #FBBF24);
  box-shadow: 0 0 0 2px var(--primary), 0 3px 10px rgba(249,115,22,0.28);
}

.pic-slot.pic-selected .pic-label {
  border-color: var(--primary);
  border-style: solid;
  background: var(--primary-light);
  transform: scale(1.04);
}


/* ===== Success Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(93,78,55,0.72);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.3s;
}
.modal-overlay.hidden { display: none; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-content {
  background: #fff;
  border-radius: var(--radius);
  padding: 32px 28px;
  text-align: center;
  max-width: 380px;
  width: 100%;
  box-shadow: 0 8px 40px rgba(93,78,55,0.3);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.modal-emoji { font-size: 3.5rem; }
.modal-title {
  font-size: 1.8rem; font-weight: 900; color: var(--primary);
}
.modal-msg {
  font-size: 1rem; font-weight: 700; color: var(--text-light);
}
.modal-btn {
  margin-top: 4px;
  padding: 13px 36px;
  border: none; border-radius: 50px;
  background: linear-gradient(135deg, #60A5FA, #818CF8);
  color: #fff; font-family: inherit; font-size: 1.1rem; font-weight: 900;
  cursor: pointer; transition: transform 0.15s;
  box-shadow: 0 4px 14px rgba(96,165,250,0.4);
  width: 100%; max-width: 240px;
}
.modal-btn:active { transform: scale(0.95); }

.modal-btn-secondary {
  margin-top: 4px;
  padding: 10px 28px;
  border: 2px solid #ddd;
  border-radius: 50px;
  background: rgba(255,255,255,0.9);
  color: var(--text-light);
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s;
  width: 100%; max-width: 240px;
}
.modal-btn-secondary:active { transform: scale(0.95); }

/* ===== Confetti ===== */
#confetti-container {
  position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden;
  overscroll-behavior: none;
}
.confetti-piece {
  position: absolute;
  width: 11px; height: 11px;
  border-radius: 3px;
  top: -20px;
  animation: confFall 3s ease-in forwards;
}
@keyframes confFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}

/* ===== Crossword Mode ===== */
.cross-area {
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.cross-grid {
  display: grid;
  gap: 4px;
  justify-content: center;
}

.cross-cell {
  width: 52px; height: 52px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; font-weight: 900;
  color: var(--text);
}

.cross-cell.filled {
  background: #fff;
  border: 2.5px solid #FDE68A;
  box-shadow: 0 2px 8px var(--shadow);
}

.cross-cell.empty {
  background: transparent;
}

.cross-cell.target {
  background: var(--primary-light);
  border: 3px solid var(--primary);
  box-shadow: 0 0 0 3px rgba(242,145,90,0.2), 0 2px 8px var(--shadow);
  font-size: 2rem;
  animation: pulse 1.2s ease-in-out infinite;
}

.cross-cell.target.solved {
  background: #D1FAE5;
  border-color: #34D399;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  color: #065F46;
}

.cross-cell.v-cell {
  writing-mode: vertical-rl;
  text-orientation: upright;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.cross-hint {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-light);
  text-align: center;
}

.cross-word-hint {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  opacity: 0;
  transition: opacity 0.5s;
}
.cross-word-hint.visible { opacity: 1; }
.cross-word-hint-label {
  font-size: 0.75rem;
  font-weight: 900;
  color: var(--text-light);
}
.cross-word-hint-item {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: rgba(255,255,255,0.9);
  border: 2.5px solid #FDE68A;
  border-radius: 14px;
  padding: 10px 18px;
  box-shadow: 0 2px 8px var(--shadow);
}
.cross-word-hint-item .hint-emoji {
  font-size: 2.2rem;
}
.cross-word-hint-item .hint-img {
  width: 56px; height: 56px;
  object-fit: contain;
  vertical-align: middle;
  animation: hintBlink 1.5s ease-in-out infinite;
}
.cross-word-hint-item .hint-emoji {
  animation: hintBlink 1.5s ease-in-out infinite;
}
.cross-word-hint-item .hint-dir {
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--text-light);
}
@keyframes hintBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

.cross-choices {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  width: 100%;
  max-width: none;
}

.cross-choice {
  padding: 14px 8px;
  border-radius: 16px;
  background: linear-gradient(135deg, #818CF8, #6366F1);
  color: #fff;
  font-size: 1.6rem;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(99,102,241,0.3);
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
  text-align: center;
}

.cross-choice:active {
  transform: scale(0.92);
}

.cross-choice.correct {
  background: linear-gradient(135deg, #34D399, #10B981);
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.cross-choice.wrong {
  animation: shake 0.35s;
}

/* ===== Tutorial (step-by-step overlay) ===== */
.tut-dim {
  position: fixed; inset: 0; z-index: 80;
  background: rgba(93,78,55,0.6);
  pointer-events: auto;
}
.tut-dim.hidden { display: none; }
.tut-bubble {
  position: fixed; z-index: 82;
  background: #fff;
  border-radius: 16px;
  padding: 12px 12px;
  max-width: none;
  box-shadow: 0 4px 20px rgba(93,78,55,0.3);
  font-size: 0.95rem; font-weight: 700; color: var(--text);
  line-height: 1.6;
  text-align: center; white-space: nowrap;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.tut-bubble.hidden { display: none; }
.tut-bubble::after {
  content: ''; position: absolute;
  width: 16px; height: 16px; background: #fff;
  transform: rotate(45deg);
}
.tut-bubble.arrow-down::after { bottom: -8px; left: 50%; margin-left: -8px; }
.tut-bubble.arrow-up::after { top: -8px; left: 50%; margin-left: -8px; }
.tut-highlight {
  position: relative; z-index: 81;
  box-shadow: 0 0 0 4000px rgba(93,78,55,0.6);
  border-radius: 16px;
}
.tut-next-btn {
  display: inline-block; margin-top: 10px;
  padding: 8px 24px; border: none; border-radius: 50px;
  background: linear-gradient(135deg, #60A5FA, #818CF8);
  color: #fff; font-family: inherit; font-size: 0.85rem; font-weight: 900;
  cursor: pointer;
}
.tut-next-btn:active { transform: scale(0.95); }

/* ===== Game screen back button ===== */
.game-back-btn {
  position: fixed;
  top: 52px;
  right: 12px;
  z-index: 50;
  padding: 6px 14px;
  border: none;
  border-radius: 50px;
  background: rgba(255,255,255,0.8);
  border: 2px solid #ddd;
  color: var(--text-light);
  font-family: inherit;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
}
.game-back-btn:active { transform: scale(0.95); }

/* ===== All-clear screen ===== */
.allclear-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding-top: 30px;
  text-align: center;
}
.allclear-emoji { font-size: 4rem; }
.allclear-title {
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary);
  text-shadow: 2px 2px 0 var(--primary-light);
}
.allclear-msg {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-light);
}

/* ===== Landscape layout ===== */
@media (orientation: landscape) {
  html { height: 100dvh; overflow: hidden;
  overscroll-behavior: none; margin: 0; padding: 0; }
  body {
    width: 100%; height: 100dvh;
    overflow: hidden;
  overscroll-behavior: none;
    margin: 0;
    padding: 6px max(16px, env(safe-area-inset-right)) 4px max(16px, env(safe-area-inset-left));
    gap: 4px;
  }
  .header { padding: 2px 0; }
  .header h1 { font-size: 1.15rem; }
  .stage-info { margin: 0; }
  .stage-name { font-size: 0.95rem; }
  .stage-num { font-size: 0.7rem; padding: 2px 10px; margin-top: 2px; }
  .game-row {
    display: flex;
    gap: 14px;
    width: 100%;
    max-width: 700px;
    align-items: stretch;
    flex: 1;
    min-height: 0;
  }
  .pic-grid {
    flex: 1;
    gap: 8px;
  }
  .pic-slot {
    padding: 10px 8px 8px;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .pic-emoji { font-size: 2.6rem; height: 60px; }
  .pic-img { max-height: 60px; max-width: 100%; object-fit: contain; }
  .pic-label { min-height: 30px; font-size: 0.9rem; }
  .word-tray-wrap {
    flex: 1;
    margin-top: 0;
    padding: 14px 14px 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .word-tray { gap: 10px; }
  .word-tray-title { font-size: 0.95rem; margin-bottom: 10px; }
  .word-card { font-size: 1rem; padding: 10px 8px; }

  /* Crossword landscape */
  .cross-area {
    flex: 1;
    max-width: none;
    flex-direction: row;
    gap: 20px;
    justify-content: center;
    align-items: center;
  }
  .cross-cell { width: 46px; height: 46px; font-size: 1.3rem; }
  .cross-cell.target { font-size: 1.6rem; }
  .cross-choices {
    max-width: 200px;
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>

<body>

<audio id="bgm" loop src="../assets/audio/wordmatch_bgm.mp3" preload="auto"></audio>

<!-- ===== 難易度選択画面 ===== -->
<div id="difficulty-screen">
  <header class="header">
    <h1>ことばあわせ</h1>
  </header>
  <div class="diff-title">あそびかたを えらんでね！</div>
  <div class="diff-cards">
    <div class="diff-card" id="diff-easy">
      <div class="diff-card-header">
        <span class="diff-card-stars">⭐</span>

  { vWord: 'ケーキ', hWord: 'スキー',   shared: 'キ', vIdx: 2, hIdx: 1, distractors: ['カ', 'ク', 'コ'], vImg: W+'cake.png', hImg: W+'ski.png' },
  { vWord: 'バナナ', hWord: 'ナベ',     shared: 'ナ', vIdx: 1, hIdx: 0, distractors: ['ニ', 'ヌ', 'ノ'], vImg: W+'banana.png', hImg: W+'nabe.png' },
  { vWord: 'カメラ', hWord: 'メガネ',   shared: 'メ', vIdx: 1, hIdx: 0, distractors: ['モ', 'マ', 'ミ'], vImg: W+'camera.png', hImg: W+'megane.png' },
  { vWord: 'タイヤ', hWord: 'ライオン', shared: 'イ', vIdx: 1, hIdx: 1, distractors: ['ウ', 'エ', 'ア'], vImg: W+'taiya.png', hImg: W+'lion.png' },
];

// ===== Game State =====
let currentDifficulty = null; // 'easy' or 'normal'
let currentStageIdx   = 0;   // index within the difficulty's stages
let currentQuestionIdx = 0;  // question index within current stage
let matchedCount      = 0;
let selectedCard      = null;
let selectedPicIdx    = null;
let hintTimer         = null;
let currentCrossPuzzle = null;
let playRecorded      = false;

// ===== Progress helpers =====
function getProgressKey(diff) {
  return diff === 'easy' ? 'pono_wordmatch_easy' : 'pono_wordmatch_normal';
}
function getCleared(diff) {
  try { return JSON.parse(localStorage.getItem(getProgressKey(diff)) || '[]'); } catch { return []; }
}
function markCleared(diff, stageIdx) {
  const arr = getCleared(diff);
  if (!arr.includes(stageIdx)) { arr.push(stageIdx); localStorage.setItem(getProgressKey(diff), JSON.stringify(arr)); }
}
function getTotalStages(diff) {
  return diff === 'easy' ? 7 : 8;
}
function getFirstUncleared(diff) {
  const cleared = getCleared(diff);
  const total = getTotalStages(diff);
  for (let i = 0; i < total; i++) { if (!cleared.includes(i)) return i; }
  return 0; // all cleared, start from 0
}

// ===== Stage config builders =====
// かんたん: STAGES[0..6], match only, 4 questions each
// ふつう: STAGES[0..7], match 4 + cross 3 = 7 questions each
function getStageQuestions(diff, stageIdx) {
  const questions = [];
  if (diff === 'easy') {
    // 4 match questions
    const stage = STAGES[stageIdx];
    questions.push({ type: 'match', data: stage });
  } else {
    // Normal: 4 match + 3 cross
    const stage = STAGES[stageIdx];
    questions.push({ type: 'match', data: stage });
    // crossword: 3 per stage, sequential from CROSSWORDS
    const crossStart = stageIdx * 3;
    for (let i = 0; i < 3; i++) {
      const ci = crossStart + i;
      if (ci < CROSSWORDS.length) {
        questions.push({ type: 'cross', data: CROSSWORDS[ci] });
      }
    }
  }
  return questions;
}

function getStageName(diff, stageIdx) {
  if (diff === 'easy') return STAGES[stageIdx].name;
  return STAGES[stageIdx].name;
}

// ===== Shuffle helper =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== Screen navigation =====
function showScreen(id) {
  ['difficulty-screen', 'stage-select-screen', 'game-screen'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

// ===== Difficulty screen =====
function showDifficultyScreen() {
  updateDifficultyProgress();
  showScreen('difficulty-screen');
}

function updateDifficultyProgress() {
  const easyCl = getCleared('easy').length;
  const easyTotal = getTotalStages('easy');
  const ep = document.getElementById('diff-easy-progress');
  ep.textContent = easyCl > 0 ? `${easyCl} / ${easyTotal} クリア` : '';

  const normalCl = getCleared('normal').length;
  const normalTotal = getTotalStages('normal');
  const np = document.getElementById('diff-normal-progress');
  np.textContent = normalCl > 0 ? `${normalCl} / ${normalTotal} クリア` : '';
}

document.getElementById('diff-easy').addEventListener('click', () => {
  currentDifficulty = 'easy';
  showStageSelectScreen();
});
document.getElementById('diff-normal').addEventListener('click', () => {
  currentDifficulty = 'normal';
  showStageSelectScreen();
});

// ===== Stage select screen =====
function showStageSelectScreen() {
  const title = document.getElementById('stage-select-title');
  title.textContent = currentDifficulty === 'easy' ? '⭐ かんたん' : '⭐⭐ ふつう';

  const list = document.getElementById('stage-list');
  list.innerHTML = '';
  const cleared = getCleared(currentDifficulty);
  const total = getTotalStages(currentDifficulty);
  const firstUncleared = getFirstUncleared(currentDifficulty);

  for (let i = 0; i < total; i++) {
    const item = document.createElement('div');
    item.className = 'stage-item';
    const isCleared = cleared.includes(i);
    if (isCleared) item.classList.add('cleared');
    if (i === firstUncleared && !cleared.includes(firstUncleared)) item.classList.add('current');

    const catName = getStageName(currentDifficulty, i);
    item.innerHTML = `
      <div class="stage-item-num">${i + 1}</div>
      <div class="stage-item-name">${catName}</div>
      <div class="stage-item-status">${isCleared ? '✅' : ''}</div>
    `;
    item.addEventListener('click', () => startStage(i));
    list.appendChild(item);
  }

  showScreen('stage-select-screen');
}

document.getElementById('stage-select-back').addEventListener('click', () => {
  showDifficultyScreen();
});

// ===== Game screen =====
document.getElementById('game-back-btn').addEventListener('click', () => {
  showStageSelectScreen();
});

function startStage(stageIdx) {
  currentStageIdx = stageIdx;
  currentQuestionIdx = 0;
  playRecorded = false;
  showScreen('game-screen');
  loadCurrentQuestion();
}

function loadCurrentQuestion() {
  matchedCount   = 0;
  selectedCard   = null;
  selectedPicIdx = null;
  if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }

  const questions = getStageQuestions(currentDifficulty, currentStageIdx);

  if (currentDifficulty === 'easy') {
    // Easy: single match stage with 4 pairs, all at once
    const q = questions[0]; // type: 'match'
    document.getElementById('stage-name').textContent = q.data.name;
    document.getElementById('stage-num').textContent = `ステージ ${currentStageIdx + 1}  (${currentQuestionIdx + 1}/${1})`;
    loadMatchStage(q.data);
  } else {
    // Normal: questions[0] = match, questions[1..3] = cross
    if (currentQuestionIdx === 0) {
      // Match phase
      const q = questions[0];
      const totalQ = questions.length; // 4 (1 match + 3 cross)
      document.getElementById('stage-name').textContent = q.data.name;
      document.getElementById('stage-num').textContent = `ステージ ${currentStageIdx + 1}  (${currentQuestionIdx + 1}/${totalQ})`;
      loadMatchStage(q.data);
    } else {
      // Crossword phase
      const crossQ = questions[currentQuestionIdx]; // questions[1], [2], [3]
      if (crossQ) {
        const totalQ = questions.length;
        document.getElementById('stage-name').textContent = 'もじクロス ✏️';
        document.getElementById('stage-num').textContent = `ステージ ${currentStageIdx + 1}  (${currentQuestionIdx + 1}/${totalQ})`;
        loadCrosswordStage(crossQ.data);
      }
    }
  }

  // Tutorial on first ever match stage
  if (currentQuestionIdx === 0 && !localStorage.getItem('wordmatch_tut_v3')) {
    setTimeout(showTutorial, 500);
  }
}

// ===== Load MATCH stage =====
function loadMatchStage(stage) {
  const area = document.getElementById('game-area');
  area.innerHTML = '';

  const picGrid = document.createElement('div');
  picGrid.className = 'pic-grid';
  picGrid.id = 'pic-grid';

  stage.pairs.forEach((pair, i) => {
    const slot = document.createElement('div');
    slot.className = 'pic-slot';
    slot.innerHTML = `
      <div class="pic-emoji">${pair.img ? `<img src="${pair.img}" alt="${pair.word}" class="pic-img">` : pair.emoji}</div>
      <div class="pic-label" data-idx="${i}"></div>
    `;
    picGrid.appendChild(slot);
  });

  const trayWrap = document.createElement('div');
  trayWrap.className = 'word-tray-wrap';
  trayWrap.id = 'word-tray-wrap';
  trayWrap.innerHTML = '<p class="word-tray-title">えにあう ことばを タップ！</p>';

  const tray = document.createElement('div');
  tray.className = 'word-tray';
  tray.id = 'word-tray';

  shuffle(stage.pairs.map((p, i) => ({ word: p.word, idx: i }))).forEach(({ word, idx }) => {
    const card = document.createElement('div');
    card.className   = 'word-card';
    card.dataset.idx = idx;
    card.textContent = word;
    tray.appendChild(card);
  });

  trayWrap.appendChild(tray);

  const frag = document.createDocumentFragment();
  frag.appendChild(picGrid);
  frag.appendChild(trayWrap);
  area.innerHTML = '';
  area.appendChild(frag);

  area.dataset.mode = 'match';
  area._stagePairs = stage.pairs;
}

// ===== Load CROSSWORD stage =====
function loadCrosswordStage(puzzle) {
  currentCrossPuzzle = puzzle;

  const area = document.getElementById('game-area');
  area.dataset.mode = 'cross';

  const crossArea = document.createElement('div');
  crossArea.className = 'cross-area';

  const vWord = [...puzzle.vWord];
  const hWord = [...puzzle.hWord];
  const vLen = vWord.length;
  const hLen = hWord.length;
  const crossRow = puzzle.vIdx;
  const crossCol = puzzle.hIdx;

  const totalRows = vLen;
  const totalCols = hLen;

  const grid = document.createElement('div');
  grid.className = 'cross-grid';
  grid.style.gridTemplateColumns = `repeat(${totalCols}, 52px)`;
  grid.style.gridTemplateRows = `repeat(${totalRows}, 52px)`;

  for (let r = 0; r < totalRows; r++) {
    for (let c = 0; c < totalCols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cross-cell';

      const isVertical = (c === crossCol && r >= 0 && r < vLen);
      const isHorizontal = (r === crossRow && c >= 0 && c < hLen);
      const isIntersection = (r === crossRow && c === crossCol);

      if (isIntersection) {
        cell.classList.add('target');
        cell.textContent = '？';
        cell.dataset.answer = puzzle.shared;
      } else if (isVertical) {
        cell.classList.add('filled', 'v-cell');
        cell.textContent = vWord[r];
      } else if (isHorizontal) {
        cell.classList.add('filled');
        cell.textContent = hWord[c];
      } else {
        cell.classList.add('empty');
      }

      grid.appendChild(cell);
    }
  }

  crossArea.appendChild(grid);

  const hint = document.createElement('p');
  hint.className = 'cross-hint';
  hint.textContent = 'まんなかに はいる もじは？';
  crossArea.appendChild(hint);

  const choices = document.createElement('div');
  choices.className = 'cross-choices';

  const allChoices = shuffle([puzzle.shared, ...puzzle.distractors]);
  allChoices.forEach(ch => {
    const btn = document.createElement('div');
    btn.className = 'cross-choice';
    btn.textContent = ch;
    btn.dataset.char = ch;
    choices.appendChild(btn);
  });

  crossArea.appendChild(choices);

  const hintArea = document.createElement('div');
  hintArea.className = 'cross-word-hint';
  const pickV = Math.random() < 0.5;
  const hintSrc = pickV ? puzzle.vImg : puzzle.hImg;
  const hintDir = pickV ? '↕' : '↔';
  const hintEl = typeof hintSrc === 'string' && hintSrc.endsWith('.png')
    ? `<img src="${hintSrc}" class="hint-img">` : `<span class="hint-emoji">${hintSrc}</span>`;
  hintArea.innerHTML = `
    <div class="cross-word-hint-label">ヒント</div>
    <div class="cross-word-hint-item"><span class="hint-dir">${hintDir}</span> ${hintEl}</div>
  `;
  crossArea.appendChild(hintArea);

  area.innerHTML = '';
  area.appendChild(crossArea);

  hintTimer = setTimeout(() => {
    hintArea.classList.add('visible');
  }, 8000);
}

// ===== Tap handling =====
document.addEventListener('click', e => {
  const area = document.getElementById('game-area');
  if (!area || document.getElementById('game-screen').classList.contains('hidden')) return;

  if (area.dataset.mode === 'cross') {
    handleCrossClick(e);
    return;
  }

  // Match mode
  const card  = e.target.closest('.word-card');
  const slot  = e.target.closest('.pic-slot');
  const label = slot ? slot.querySelector('.pic-label:not(.matched)') : null;

  if (card) {
    if (selectedPicIdx !== null) {
      const targetLabel = document.querySelector(`.pic-label[data-idx="${selectedPicIdx}"]:not(.matched)`);
      if (targetLabel) tryMatch(card, targetLabel);
      else clearSelection();
    } else {
      setSelectedCard(selectedCard === card ? null : card);
    }
    return;
  }

  if (slot && label) {
    if (selectedCard) {
      tryMatch(selectedCard, label);
    } else {
      const idx = parseInt(label.dataset.idx);
      if (selectedPicIdx === idx) {
        clearSelection();
      } else {
        setSelectedPic(slot, idx);
      }
    }
    return;
  }

  clearSelection();
});

function handleCrossClick(e) {
  const choiceBtn = e.target.closest('.cross-choice');
  if (!choiceBtn) return;

  const targetCell = document.querySelector('.cross-cell.target');
  if (!targetCell || targetCell.classList.contains('solved')) return;

  if (choiceBtn.dataset.char === targetCell.dataset.answer) {
    playCorrect();
    showPraise();
    if (window.incrementStat) window.incrementStat('wordmatch_correct', 1);
    targetCell.textContent = targetCell.dataset.answer;
    targetCell.classList.add('solved');
    choiceBtn.classList.add('correct');
    document.querySelectorAll('.cross-choice').forEach(b => b.style.pointerEvents = 'none');
    setTimeout(() => onQuestionComplete(), 800);
  } else {
    playWrong();
    choiceBtn.classList.add('wrong');
    setTimeout(() => choiceBtn.classList.remove('wrong'), 400);
  }
}

// ===== Match mode helpers =====
function clearSelection() {
  if (selectedCard) {
    selectedCard.classList.remove('selected');
    selectedCard = null;
  }
  if (selectedPicIdx !== null) {
    document.querySelectorAll('.pic-slot').forEach(s => s.classList.remove('pic-selected'));
    selectedPicIdx = null;
  }
  document.querySelectorAll('.pic-label').forEach(l => l.classList.remove('hover'));
  document.querySelectorAll('.word-card').forEach(c => c.classList.remove('hover'));
}

function setSelectedCard(card) {
  clearSelection();
  if (card) {
    selectedCard = card;
    card.classList.add('selected');
    document.querySelectorAll('.pic-label:not(.matched)').forEach(l => l.classList.add('hover'));
  }
}

function setSelectedPic(slot, idx) {
  clearSelection();
  selectedPicIdx = idx;
  slot.classList.add('pic-selected');
  document.querySelectorAll('.word-card').forEach(c => c.classList.add('hover'));
}

// 正解フィードバックトースト
function showPraise() {
  const PRAISES = ['やったね！ ✨', 'せいかい！ 🎉', 'すごい！ 🌟', 'グッド！ 👍', 'じょうず！ 💫'];
  const text = PRAISES[Math.floor(Math.random() * PRAISES.length)];
  let toast = document.getElementById('praise-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'praise-toast';
    toast.className = 'praise-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = text;
  toast.classList.remove('show');
  // アニメ再発火
  void toast.offsetWidth;
  toast.classList.add('show');
}

function tryMatch(card, label) {
  clearSelection();
  if (parseInt(card.dataset.idx) === parseInt(label.dataset.idx)) {
    playCorrect();
    showPraise();
    if (window.incrementStat) window.incrementStat('wordmatch_correct', 1);
    label.textContent = card.textContent;
    label.classList.add('matched');
    card.remove();
    matchedCount++;
    if (matchedCount === 4) setTimeout(() => onQuestionComplete(), 500);
  } else {
    playWrong();
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
  }
}

// ===== Question complete → advance or stage clear =====
function onQuestionComplete() {
  const questions = getStageQuestions(currentDifficulty, currentStageIdx);
  const totalQ = currentDifficulty === 'easy' ? 1 : questions.length;

  if (currentQuestionIdx + 1 >= totalQ) {
    // Stage complete!
    showStageComplete();
  } else {
    // Next question in this stage (for normal mode: match→cross transitions)
    currentQuestionIdx++;
    loadCurrentQuestion();
  }
}

// ===== Stage complete =====
function showStageComplete() {
  playFanfare();
  launchConfetti();

  // スタンプラリー: プレイ記録 (最初のステージクリア時に1回だけ)
  if (!playRecorded) {
    playRecorded = true;
    (function() {
      var k = 'pono_played_' + new Date().toDateString();
      var a = JSON.parse(localStorage.getItem(k) || '[]');
      if (a.indexOf('wordmatch') === -1) { a.push('wordmatch'); localStorage.setItem(k, JSON.stringify(a)); }
    })();
  }

  // Save progress
  markCleared(currentDifficulty, currentStageIdx);

  const cleared = getCleared(currentDifficulty);
  const total = getTotalStages(currentDifficulty);
  const allCleared = cleared.length >= total;

  const emojiEl = document.getElementById('modal-emoji');
  const titleEl = document.getElementById('modal-title');
  const msgEl   = document.getElementById('modal-msg');
  const btnEl   = document.getElementById('modal-btn');
  const btn2El  = document.getElementById('modal-btn2');

  // Reset btn2
  btn2El.classList.add('hidden');

  if (allCleared) {
    // All stages cleared!
    emojiEl.textContent = '🎉';
    titleEl.textContent = 'ぜんぶ クリア！🎉';
    msgEl.textContent = currentDifficulty === 'easy' ? 'かんたんモード ぜんぶクリア！すごい！' : 'ふつうモード ぜんぶクリア！すごい！';
    btnEl.textContent = 'ステージせんたくへ';
    btnEl.onclick = () => {
      document.getElementById('success-modal').classList.add('hidden');
      showStageSelectScreen();
    };
  } else {
    // Check if last stage in sequence
    const nextStageIdx = currentStageIdx + 1;
    const isLastStage = nextStageIdx >= total;

    if (currentDifficulty === 'normal' && currentCrossPuzzle) {
      const p = currentCrossPuzzle;
      emojiEl.innerHTML = '';
      const makeEl = (src, delay) => {
        if (src.endsWith('.png')) {
          const img = new Image();
          img.src = src;
          img.style.cssText = 'height:48px;object-fit:contain;vertical-align:middle;opacity:0;transition:opacity 0.3s;transition-delay:'+delay+'s';
          img.onload = () => { img.style.opacity = '1'; };
          return img;
        }
        const span = document.createElement('span');
        span.style.cssText = 'font-size:2.5rem;opacity:0;transition:opacity 0.3s;transition-delay:'+delay+'s';
        span.textContent = src;
        requestAnimationFrame(() => { span.style.opacity = '1'; });
        return span;
      };
      const cross = document.createElement('span');
      cross.style.cssText = 'font-size:1rem;vertical-align:middle;margin:0 6px;color:var(--text-light);opacity:0;transition:opacity 0.3s;transition-delay:0.15s';
      cross.textContent = '✕';
      emojiEl.appendChild(makeEl(p.vImg, 0));
      emojiEl.appendChild(cross);
      emojiEl.appendChild(makeEl(p.hImg, 0.3));
      requestAnimationFrame(() => { cross.style.opacity = '1'; });
    } else {
      emojiEl.textContent = '🎉';
    }

    titleEl.textContent = `ステージ ${currentStageIdx + 1} クリア！`;
    msgEl.textContent = 'すごい！よくできたね！';

    if (isLastStage) {
      btnEl.textContent = 'ステージせんたくへ';
      btnEl.onclick = () => {
        document.getElementById('success-modal').classList.add('hidden');
        showStageSelectScreen();
      };
    } else {
      btnEl.textContent = 'つぎへ →';
      btnEl.onclick = () => {
        document.getElementById('success-modal').classList.add('hidden');
        startStage(nextStageIdx);
      };
      btn2El.textContent = 'ステージせんたくへ';
      btn2El.classList.remove('hidden');
      btn2El.onclick = () => {
        document.getElementById('success-modal').classList.add('hidden');
        showStageSelectScreen();
      };
    }
  }

  // ★ 全ステージクリアなら宝箱演出を先に表示、閉じたら成功モーダル
  var _showSuccessModal = function() {
    document.getElementById('success-modal').classList.remove('hidden');
  };
  if (allCleared && window.triggerFirstClearReward) {
    window.triggerFirstClearReward('wordmatch', {
      onClose: _showSuccessModal
    }).then(function(shown) {
      if (!shown) _showSuccessModal();
    }).catch(function() { _showSuccessModal(); });
  } else {
    _showSuccessModal();
  }
}

// ===== Confetti =====
function launchConfetti() {
  const container = document.getElementById('confetti-container');
  const colors    = ['#FF6B9D','#F97316','#EAB308','#22C55E','#3B82F6','#8B5CF6','#F43F5E','#06B6D4'];
  for (let i = 0; i < 55; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left             = Math.random() * 100 + 'vw';
      c.style.background       = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay    = Math.random() * 0.4 + 's';
      c.style.animationDuration = (2 + Math.random() * 1.2) + 's';
      container.appendChild(c);
      setTimeout(() => c.remove(), 3600);
    }, i * 25);
  }
}

// ===== BGM =====
const bgm = document.getElementById('bgm');
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';
let bgmStarted = false;
bgm.volume = 0.15;

function tryStartBgm() {
  if (!bgmEnabled || bgmStarted) return;
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
}

if (bgmEnabled) {
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {
    document.addEventListener('touchstart', tryStartBgm, { once: true, passive: true });
    document.addEventListener('pointerdown', tryStartBgm, { once: true });
  });
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) { bgm.pause(); }
  else if (bgmEnabled) { bgm.play().catch(() => {}); }
});
window.addEventListener('blur',  () => bgm.pause());
window.addEventListener('focus', () => { if (bgmEnabled) bgm.play().catch(() => {}); });

// ===== Audio =====
let sfxEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  return _ac;
}
function withAudio(fn) {
  if (!sfxEnabled) return;
  const ac = getAC();
  if (ac.state === 'running') fn(ac);
  else ac.resume().then(() => fn(ac)).catch(() => {});
}
document.addEventListener('touchstart', () => getAC().resume(), { once: true, passive: true });
document.addEventListener('pointerdown', () => getAC().resume(), { once: true, passive: true });

function playCorrect() {
  withAudio(ac => {
    [523.25, 783.99].forEach((freq, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = ac.currentTime + i * 0.13;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.22, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
      o.start(t); o.stop(t + 0.28);
    });
  });
}

function playWrong() {
  withAudio(ac => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(220, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(110, ac.currentTime + 0.22);
    g.gain.setValueAtTime(0.15, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.22);
    o.start(); o.stop(ac.currentTime + 0.22);
  });
}

function playFanfare() {
  withAudio(ac => {
    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = ac.currentTime + i * 0.1;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      o.start(t); o.stop(t + 0.45);
    });
  });
}

// ===== Tutorial =====
function showTutorial() {
  const dim = document.getElementById('tut-dim');
  const bubble = document.getElementById('tut-bubble');
  if (!dim || !bubble) return;

  let step = 0;
  function centerBubble() {
    bubble.className = 'tut-bubble';
    bubble.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9997;max-width:300px;text-align:center;';
  }
  const steps = [
    () => {
      dim.classList.remove('hidden');
      centerBubble();
      bubble.innerHTML = '🖼️ えを よく みてね！<br><br>えに あう ことばを<br>えらんで タップしよう！<br><button class="tut-next-btn" id="tut-next">つぎ →</button>';
      bubble.classList.remove('hidden');
      document.getElementById('tut-next').addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); nextStep(); });
    },
    () => {
      centerBubble();
      bubble.innerHTML = 'えと ことばを<br>あわせて みよう！🎉<br><button class="tut-next-btn" id="tut-next">はじめる！</button>';
      document.getElementById('tut-next').addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); endTut(); });
    }
  ];

  function nextStep() { step++; step < steps.length ? steps[step]() : endTut(); }
  function endTut() {
    document.querySelectorAll('.tut-highlight').forEach(el => el.classList.remove('tut-highlight'));
    dim.classList.add('hidden');
    bubble.classList.add('hidden');
    localStorage.setItem('wordmatch_tut_v3', '1');
  }

  steps[0]();
}

showDifficultyScreen();

initMenu({
  bgmToggle: function() {
    bgmEnabled = !bgmEnabled;
    sfxEnabled = bgmEnabled;
    localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
    if (bgmEnabled) { bgmStarted = false; tryStartBgm(); } else { bgm.pause(); }
  },
  tutorial: showTutorial
});

  setTimeout(() => { window.scrollTo(0, 0); }, 300);
});
window.scrollTo(0, 0);
