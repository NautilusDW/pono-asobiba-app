<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ことばあわせ | ポノのあそびば</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8F0;
  --primary: #F2915A;
  --primary-light: #FDDCBF;
  --text: #5D4E37;
  --text-light: #A89880;
  --shadow: rgba(93,78,55,0.12);
  --radius: 20px;
}

html, body {
  min-height: 100dvh;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 8px 16px 32px;
}

/* ===== Header ===== */
.header {
  text-align: center;
  position: relative;
  width: 100%;
}

.header h1 {
  font-size: 1.4rem; font-weight: 900; color: var(--primary);
  text-shadow: 2px 2px 0 var(--primary-light);
}
.subtitle {
  font-size: 0.78rem; color: var(--text-light); font-weight: 700;
}

/* ===== Stage info ===== */
.stage-info {
  text-align: center;
}
.stage-name {
  font-size: 1.1rem; font-weight: 900; color: var(--text);
}
.stage-num {
  font-size: 0.75rem; font-weight: 900; color: var(--text-light);
  background: var(--primary-light);
  border-radius: 20px;
  padding: 2px 14px;
  display: inline-block;
  margin-top: 3px;
}

/* ===== Picture grid ===== */
.pic-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 360px;
}

.pic-slot {
  background: #fff;
  border-radius: 16px;
  border: 2.5px solid #FDE68A;
  box-shadow: 0 3px 12px var(--shadow);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 8px 10px;
  gap: 8px;
  transition: border-color 0.2s;
}

.pic-slot {
  cursor: pointer;
}

.pic-emoji {
  font-size: 3.4rem;
  line-height: 1;
  pointer-events: none;
}

.pic-label {
  min-height: 38px;
  width: 100%;
  border-radius: 50px;
  border: 2px dashed #C8C0B8;
  background: #FFFBF0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.05rem;
  font-weight: 900;
  color: var(--text);
  transition: border-color 0.15s, background 0.15s;
  pointer-events: auto;
}

.pic-label.hover {
  border-color: var(--primary);
  background: var(--primary-light);
  border-style: solid;
}

.pic-label.matched {
  border-style: solid;
  border-color: #34D399;
  background: #D1FAE5;
  color: #065F46;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn {
  from { transform: scale(0.8); opacity: 0.5; }
  to   { transform: scale(1);   opacity: 1; }
}

/* ===== Word tray wrapper ===== */
.word-tray-wrap {
  width: 100%;
  max-width: 360px;
  background: rgba(255,255,255,0.85);
  border: 2.5px solid #FDE68A;
  border-radius: 18px;
  padding: 10px 14px 14px;
  box-shadow: 0 3px 12px var(--shadow);
  margin-top: 6px;
}
.word-tray-title {
  text-align: center;
  font-size: 0.82rem;
  font-weight: 900;
  color: var(--text-light);
  margin-bottom: 10px;
}

/* ===== Game row (portrait: vertical stack) ===== */
.game-row {
  display: contents;
}

/* ===== Word tray ===== */
.word-tray {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  min-height: 56px;
}

.word-card {
  padding: 10px 8px;
  border-radius: 50px;
  background: linear-gradient(135deg, #FBBF24, #F97316);
  color: #fff;
  font-size: 1.05rem;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(249,115,22,0.28);
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
  letter-spacing: 0.05em;
  text-align: center;
}

.word-card.selected {
  transform: scale(1.12) translateY(-4px);
  box-shadow: 0 0 0 3px #fff, 0 8px 24px rgba(249,115,22,0.55);
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-8px); }
  75%      { transform: translateX(8px); }
}
.word-card.shake { animation: shake 0.35s; }

.word-card.hover {
  background: linear-gradient(135deg, #FDE68A, #FBBF24);
  box-shadow: 0 0 0 2px var(--primary), 0 3px 10px rgba(249,115,22,0.28);
}

.pic-slot.pic-selected .pic-label {
  border-color: var(--primary);
  border-style: solid;
  background: var(--primary-light);
  transform: scale(1.04);
}


/* ===== Success Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(93,78,55,0.72);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.3s;
}
.modal-overlay.hidden { display: none; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-content {
  background: #fff;
  border-radius: var(--radius);
  padding: 32px 28px;
  text-align: center;
  max-width: 380px;
  width: 100%;
  box-shadow: 0 8px 40px rgba(93,78,55,0.3);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.modal-emoji { font-size: 3.5rem; }
.modal-title {
  font-size: 1.8rem; font-weight: 900; color: var(--primary);
}
.modal-msg {
  font-size: 1rem; font-weight: 700; color: var(--text-light);
}
.modal-btn {
  margin-top: 4px;
  padding: 13px 36px;
  border: none; border-radius: 50px;
  background: linear-gradient(135deg, #60A5FA, #818CF8);
  color: #fff; font-family: inherit; font-size: 1.1rem; font-weight: 900;
  cursor: pointer; transition: transform 0.15s;
  box-shadow: 0 4px 14px rgba(96,165,250,0.4);
  width: 100%; max-width: 240px;
}
.modal-btn:active { transform: scale(0.95); }

/* ===== Confetti ===== */
#confetti-container {
  position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 11px; height: 11px;
  border-radius: 3px;
  top: -20px;
  animation: confFall 3s ease-in forwards;
}
@keyframes confFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}

/* ===== Crossword Mode ===== */
.cross-area {
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.cross-grid {
  display: grid;
  gap: 4px;
  justify-content: center;
}

.cross-cell {
  width: 52px; height: 52px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; font-weight: 900;
  color: var(--text);
}

.cross-cell.filled {
  background: #fff;
  border: 2.5px solid #FDE68A;
  box-shadow: 0 2px 8px var(--shadow);
}

.cross-cell.empty {
  background: transparent;
}

.cross-cell.target {
  background: var(--primary-light);
  border: 3px solid var(--primary);
  box-shadow: 0 0 0 3px rgba(242,145,90,0.2), 0 2px 8px var(--shadow);
  font-size: 2rem;
  animation: pulse 1.2s ease-in-out infinite;
}

.cross-cell.target.solved {
  background: #D1FAE5;
  border-color: #34D399;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  color: #065F46;
}

.cross-cell.v-cell {
  writing-mode: vertical-rl;
  text-orientation: upright;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.cross-hint {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-light);
  text-align: center;
}

.cross-word-hint {
  display: flex;
  gap: 12px;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.5s;
}
.cross-word-hint.visible { opacity: 1; }
.cross-word-hint-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-light);
  background: rgba(255,255,255,0.85);
  border-radius: 12px;
  padding: 4px 10px;
}
.cross-word-hint-item .hint-emoji {
  font-size: 1.3rem;
}

.cross-choices {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  width: 100%;
  max-width: 280px;
}

.cross-choice {
  padding: 14px 8px;
  border-radius: 16px;
  background: linear-gradient(135deg, #818CF8, #6366F1);
  color: #fff;
  font-size: 1.6rem;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(99,102,241,0.3);
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
  text-align: center;
}

.cross-choice:active {
  transform: scale(0.92);
}

.cross-choice.correct {
  background: linear-gradient(135deg, #34D399, #10B981);
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.cross-choice.wrong {
  animation: shake 0.35s;
}

/* ===== Landscape layout ===== */
@media (orientation: landscape) {
  html { height: 100dvh; overflow: hidden; margin: 0; padding: 0; }
  body {
    width: 100%; height: 100dvh;
    overflow: hidden;
    margin: 0;
    padding: 6px 16px 4px;
    gap: 4px;
  }
  .header { padding: 2px 0; }
  .header h1 { font-size: 1.15rem; }
  .stage-info { margin: 0; }
  .stage-name { font-size: 0.95rem; }
  .stage-num { font-size: 0.7rem; padding: 2px 10px; margin-top: 2px; }
  .game-row {
    display: flex;
    gap: 14px;
    width: 100%;
    max-width: 700px;
    align-items: stretch;
    flex: 1;
    min-height: 0;
  }
  .pic-grid {
    flex: 1;
    gap: 8px;
  }
  .pic-slot {
    padding: 10px 8px 8px;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .pic-emoji { font-size: 2.6rem; }
  .pic-label { min-height: 30px; font-size: 0.9rem; }
  .word-tray-wrap {
    flex: 1;
    margin-top: 0;
    padding: 14px 14px 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .word-tray { gap: 10px; }
  .word-tray-title { font-size: 0.82rem; margin-bottom: 10px; }
  .word-card { font-size: 1rem; padding: 10px 8px; }

  /* Crossword landscape */
  .cross-area {
    flex: 1;
    max-width: none;
    flex-direction: row;
    gap: 20px;
    justify-content: center;
    align-items: center;
  }
  .cross-cell { width: 46px; height: 46px; font-size: 1.3rem; }
  .cross-cell.target { font-size: 1.6rem; }
  .cross-choices {
    max-width: 200px;
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>

<script>

    { emoji: '🍊', word: 'みかん' },
  ]},
  { name: 'やさい 🥕', pairs: [
    { emoji: '🥕', word: 'にんじん' },
    { emoji: '🍅', word: 'トマト' },
    { emoji: '🥒', word: 'きゅうり' },
    { emoji: '🍄', word: 'きのこ' },
  ]},
  { name: 'どうぶつ2 🦁', pairs: [
    { emoji: '🦒', word: 'キリン' },
    { emoji: '🐒', word: 'さる' },
    { emoji: '🦁', word: 'ライオン' },
    { emoji: '🐼', word: 'パンダ' },
  ]},
  { name: 'たべもの 🍚', pairs: [
    { emoji: '🍚', word: 'ごはん' },
    { emoji: '🍜', word: 'ラーメン' },
    { emoji: '🍞', word: 'パン' },
    { emoji: '🍰', word: 'ケーキ' },
  ]},
];

// ===== Crossword puzzles =====
// vEmoji/hEmoji: 5秒後にヒントとして表示する絵文字
// 選択肢チェック済み: どのdistractorも縦横両方で有効な単語にならないことを確認
const CROSSWORDS = [
  // --- かんたん: ひらがな2文字 ---
  { vWord: 'いぬ', hWord: 'いか', shared: 'い', vIdx: 0, hIdx: 0, distractors: ['う', 'お', 'え'], vEmoji: '🐕', hEmoji: '🦑' },
  { vWord: 'ねこ', hWord: 'こま', shared: 'こ', vIdx: 1, hIdx: 0, distractors: ['け', 'き', 'く'], vEmoji: '🐱', hEmoji: '🧸' },
  { vWord: 'はな', hWord: 'なつ', shared: 'な', vIdx: 1, hIdx: 0, distractors: ['に', 'ほ', 'の'], vEmoji: '🌸', hEmoji: '☀️' },
  { vWord: 'うみ', hWord: 'みち', shared: 'み', vIdx: 1, hIdx: 0, distractors: ['む', 'も', 'め'], vEmoji: '🌊', hEmoji: '🛤️' },
  { vWord: 'くも', hWord: 'もり', shared: 'も', vIdx: 1, hIdx: 0, distractors: ['む', 'み', 'め'], vEmoji: '☁️', hEmoji: '🌲' },
  { vWord: 'ほし', hWord: 'しか', shared: 'し', vIdx: 1, hIdx: 0, distractors: ['す', 'せ', 'ち'], vEmoji: '⭐', hEmoji: '🦌' },
  { vWord: 'つき', hWord: 'きて', shared: 'き', vIdx: 1, hIdx: 0, distractors: ['く', 'け', 'ぐ'], vEmoji: '🌙', hEmoji: '🌳' },
  { vWord: 'さる', hWord: 'くさ', shared: 'さ', vIdx: 0, hIdx: 1, distractors: ['す', 'せ', 'ぬ'], vEmoji: '🐒', hEmoji: '🌿' },
  // --- ふつう: ひらがな2-3文字 ---
  { vWord: 'さくら', hWord: 'くるま', shared: 'く', vIdx: 1, hIdx: 0, distractors: ['け', 'き', 'か'], vEmoji: '🌸', hEmoji: '🚗' },
  { vWord: 'たまご', hWord: 'やま',   shared: 'ま', vIdx: 1, hIdx: 1, distractors: ['む', 'め', 'も'], vEmoji: '🥚', hEmoji: '⛰️' },
  { vWord: 'すいか', hWord: 'いちご', shared: 'い', vIdx: 1, hIdx: 0, distractors: ['う', 'え', 'お'], vEmoji: '🍉', hEmoji: '🍓' },
  { vWord: 'くじら', hWord: 'にじ',   shared: 'じ', vIdx: 1, hIdx: 1, distractors: ['ず', 'ぜ', 'ざ'], vEmoji: '🐋', hEmoji: '🌈' },
  { vWord: 'おかし', hWord: 'かさ',   shared: 'か', vIdx: 1, hIdx: 0, distractors: ['き', 'け', 'が'], vEmoji: '🍬', hEmoji: '☂️' },
  { vWord: 'つくえ', hWord: 'ふくろ', shared: 'く', vIdx: 1, hIdx: 1, distractors: ['き', 'こ', 'か'], vEmoji: '🪑', hEmoji: '👜' },
  { vWord: 'とけい', hWord: 'けむり', shared: 'け', vIdx: 1, hIdx: 0, distractors: ['き', 'く', 'こ'], vEmoji: '⏰', hEmoji: '💨' },
  { vWord: 'りんご', hWord: 'みんな', shared: 'ん', vIdx: 1, hIdx: 1, distractors: ['の', 'そ', 'わ'], vEmoji: '🍎', hEmoji: '👫' },

  { vWord: 'キリン', hWord: 'リス',     shared: 'リ', vIdx: 1, hIdx: 0, distractors: ['ル', 'レ', 'ラ'], vEmoji: '🦒', hEmoji: '🐿️' },
  { vWord: 'ケーキ', hWord: 'スキー',   shared: 'キ', vIdx: 2, hIdx: 1, distractors: ['カ', 'ク', 'コ'], vEmoji: '🎂', hEmoji: '⛷️' },

  { vWord: 'カメラ', hWord: 'メガネ',   shared: 'メ', vIdx: 1, hIdx: 0, distractors: ['モ', 'マ', 'ミ'], vEmoji: '📷', hEmoji: '👓' },
  { vWord: 'タイヤ', hWord: 'タイコ',   shared: 'イ', vIdx: 1, hIdx: 1, distractors: ['ウ', 'エ', 'ア'], vEmoji: '🛞', hEmoji: '🥁' },
];

// ===== State =====
let currentStageNum = 0;
let shuffledOrder   = [];
let matchedCount    = 0;
let selectedCard    = null;
let selectedPicIdx  = null;

// Stage type schedule: 'match' or 'cross', 3 each alternating
let crossPool = [];
let crossIdx  = 0;
let hintTimer = null;

function getStageType(num) {
  // 0-2: match, 3-5: cross, 6-8: match, 9-11: cross, ...
  const block = Math.floor(num / 3);
  return (block % 2 === 0) ? 'match' : 'cross';
}

// ===== Shuffle helper =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== Match stage data helpers =====
let matchStageCounter = 0;

function getMatchStageData() {
  const idx = matchStageCounter % STAGES.length;
  matchStageCounter++;
  return STAGES[shuffledOrder[idx % shuffledOrder.length]];
}

function generateMixedStage() {
  const primaryCat = STAGES[Math.floor(Math.random() * STAGES.length)];
  const crossCount = 1;
  const mainCount  = 4 - crossCount;
  const mainPairs  = shuffle([...primaryCat.pairs]).slice(0, mainCount);
  const crossPairs = shuffle(
    STAGES.filter(s => s !== primaryCat).flatMap(s => s.pairs)
  ).slice(0, crossCount);
  return { name: primaryCat.name + ' ＋', pairs: shuffle([...mainPairs, ...crossPairs]) };
}

// ===== Crossword helpers =====
function getCrosswordData() {
  if (crossPool.length === 0) crossPool = shuffle([...Array(CROSSWORDS.length).keys()]);
  const puzzle = CROSSWORDS[crossPool[crossIdx % crossPool.length]];
  crossIdx++;
  return puzzle;
}

// ===== Load stage (dispatcher) =====
function loadStage(num) {
  currentStageNum = num;
  matchedCount    = 0;
  selectedCard    = null;
  selectedPicIdx  = null;
  if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }

  const type = getStageType(num);

  if (type === 'cross') {
    loadCrosswordStage(num);
  } else {
    loadMatchStage(num);
  }
}

// ===== Load MATCH stage =====
function loadMatchStage(num) {
  const stage = matchStageCounter < 8 ? getMatchStageData() : generateMixedStage();

  document.getElementById('stage-name').textContent = stage.name;
  document.getElementById('stage-num').textContent  = `ステージ ${num + 1}`;

  // Show match UI, hide cross if present
  const area = document.getElementById('game-area');
  area.innerHTML = '';

  const picGrid = document.createElement('div');
  picGrid.className = 'pic-grid';
  picGrid.id = 'pic-grid';

  stage.pairs.forEach((pair, i) => {
    const slot = document.createElement('div');
    slot.className = 'pic-slot';
    slot.innerHTML = `
      <div class="pic-emoji">${pair.img ? `<img src="${pair.img}" alt="${pair.word}" style="width:1em;height:1em;vertical-align:middle">` : pair.emoji}</div>
      <div class="pic-label" data-idx="${i}"></div>
    `;
    picGrid.appendChild(slot);
  });

  const trayWrap = document.createElement('div');
  trayWrap.className = 'word-tray-wrap';
  trayWrap.id = 'word-tray-wrap';
  trayWrap.innerHTML = '<p class="word-tray-title">えにあう ことばを タップ！</p>';

  const tray = document.createElement('div');
  tray.className = 'word-tray';
  tray.id = 'word-tray';

  shuffle(stage.pairs.map((p, i) => ({ word: p.word, idx: i }))).forEach(({ word, idx }) => {
    const card = document.createElement('div');
    card.className   = 'word-card';
    card.dataset.idx = idx;
    card.textContent = word;
    tray.appendChild(card);
  });

  trayWrap.appendChild(tray);
  area.appendChild(picGrid);
  area.appendChild(trayWrap);

  // Store current stage pairs for match logic
  area.dataset.mode = 'match';
  area._stagePairs = stage.pairs;
}

// ===== Load CROSSWORD stage =====
function loadCrosswordStage(num) {
  const puzzle = getCrosswordData();

  document.getElementById('stage-name').textContent = 'もじクロス ✏️';
  document.getElementById('stage-num').textContent  = `ステージ ${num + 1}`;

  const area = document.getElementById('game-area');
  area.innerHTML = '';
  area.dataset.mode = 'cross';

  const crossArea = document.createElement('div');
  crossArea.className = 'cross-area';

  // Build grid
  const vWord = [...puzzle.vWord];
  const hWord = [...puzzle.hWord];
  const vLen = vWord.length;
  const hLen = hWord.length;
  const crossRow = puzzle.vIdx; // row where horizontal word sits
  const crossCol = puzzle.hIdx; // col (in horizontal word) where vertical word sits

  // Grid dimensions
  const totalRows = vLen;
  const totalCols = hLen;

  const grid = document.createElement('div');
  grid.className = 'cross-grid';
  grid.style.gridTemplateColumns = `repeat(${totalCols}, 52px)`;
  grid.style.gridTemplateRows = `repeat(${totalRows}, 52px)`;

  for (let r = 0; r < totalRows; r++) {
    for (let c = 0; c < totalCols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cross-cell';

      const isVertical = (c === crossCol && r >= 0 && r < vLen);
      const isHorizontal = (r === crossRow && c >= 0 && c < hLen);
      const isIntersection = (r === crossRow && c === crossCol);

      if (isIntersection) {
        cell.classList.add('target');
        cell.textContent = '？';
        cell.dataset.answer = puzzle.shared;
      } else if (isVertical) {
        cell.classList.add('filled', 'v-cell');
        cell.textContent = vWord[r];
      } else if (isHorizontal) {
        cell.classList.add('filled');
        cell.textContent = hWord[c];
      } else {
        cell.classList.add('empty');
      }

      grid.appendChild(cell);
    }
  }

  crossArea.appendChild(grid);

  // Hint text
  const hint = document.createElement('p');
  hint.className = 'cross-hint';
  hint.textContent = 'まんなかに はいる もじは？';
  crossArea.appendChild(hint);

  // Choice buttons
  const choices = document.createElement('div');
  choices.className = 'cross-choices';

  const allChoices = shuffle([puzzle.shared, ...puzzle.distractors]);
  allChoices.forEach(ch => {
    const btn = document.createElement('div');
    btn.className = 'cross-choice';
    btn.textContent = ch;
    btn.dataset.char = ch;
    choices.appendChild(btn);
  });

  crossArea.appendChild(choices);

  // Hint area (hidden, shown after 5 seconds)
  const hintArea = document.createElement('div');
  hintArea.className = 'cross-word-hint';
  hintArea.innerHTML = `
    <div class="cross-word-hint-item">↕ <span class="hint-emoji">${puzzle.vEmoji}</span> ${puzzle.vWord}</div>
    <div class="cross-word-hint-item">↔ <span class="hint-emoji">${puzzle.hEmoji}</span> ${puzzle.hWord}</div>
  `;
  crossArea.appendChild(hintArea);

  area.appendChild(crossArea);

  // Show hint after 5 seconds
  hintTimer = setTimeout(() => {
    hintArea.classList.add('visible');
  }, 5000);
}

// ===== Tap handling =====
document.addEventListener('click', e => {
  const area = document.getElementById('game-area');
  if (!area) return;

  if (area.dataset.mode === 'cross') {
    handleCrossClick(e);
    return;
  }

  // Match mode
  const card  = e.target.closest('.word-card');
  const slot  = e.target.closest('.pic-slot');
  const label = slot ? slot.querySelector('.pic-label:not(.matched)') : null;

  if (card) {
    if (selectedPicIdx !== null) {
      const targetLabel = document.querySelector(`.pic-label[data-idx="${selectedPicIdx}"]:not(.matched)`);
      if (targetLabel) tryMatch(card, targetLabel);
      else clearSelection();
    } else {
      setSelectedCard(selectedCard === card ? null : card);
    }
    return;
  }

  if (slot && label) {
    if (selectedCard) {
      tryMatch(selectedCard, label);
    } else {
      const idx = parseInt(label.dataset.idx);
      if (selectedPicIdx === idx) {
        clearSelection();
      } else {
        setSelectedPic(slot, idx);
      }
    }
    return;
  }

  clearSelection();
});

function handleCrossClick(e) {
  const choiceBtn = e.target.closest('.cross-choice');
  if (!choiceBtn) return;

  const targetCell = document.querySelector('.cross-cell.target');
  if (!targetCell || targetCell.classList.contains('solved')) return;

  if (choiceBtn.dataset.char === targetCell.dataset.answer) {
    // Correct!
    playCorrect();
    targetCell.textContent = targetCell.dataset.answer;
    targetCell.classList.add('solved');
    choiceBtn.classList.add('correct');
    // Disable all choices
    document.querySelectorAll('.cross-choice').forEach(b => b.style.pointerEvents = 'none');
    setTimeout(() => showStageComplete(), 800);
  } else {
    // Wrong
    playWrong();
    choiceBtn.classList.add('wrong');
    setTimeout(() => choiceBtn.classList.remove('wrong'), 400);
  }
}

// ===== Match mode helpers =====
function clearSelection() {
  if (selectedCard) {
    selectedCard.classList.remove('selected');
    selectedCard = null;
  }
  if (selectedPicIdx !== null) {
    document.querySelectorAll('.pic-slot').forEach(s => s.classList.remove('pic-selected'));
    selectedPicIdx = null;
  }
  document.querySelectorAll('.pic-label').forEach(l => l.classList.remove('hover'));
  document.querySelectorAll('.word-card').forEach(c => c.classList.remove('hover'));
}

function setSelectedCard(card) {
  clearSelection();
  if (card) {
    selectedCard = card;
    card.classList.add('selected');
    document.querySelectorAll('.pic-label:not(.matched)').forEach(l => l.classList.add('hover'));
  }
}

function setSelectedPic(slot, idx) {
  clearSelection();
  selectedPicIdx = idx;
  slot.classList.add('pic-selected');
  document.querySelectorAll('.word-card').forEach(c => c.classList.add('hover'));
}

function tryMatch(card, label) {
  clearSelection();
  if (parseInt(card.dataset.idx) === parseInt(label.dataset.idx)) {
    playCorrect();
    label.textContent = card.textContent;
    label.classList.add('matched');
    card.remove();
    matchedCount++;
    if (matchedCount === 4) setTimeout(showStageComplete, 500);
  } else {
    playWrong();
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
  }
}

// ===== Stage complete =====
function showStageComplete() {
  playFanfare();
  launchConfetti();
  awardPoints(5);
  if (window.incrementStat) window.incrementStat('wordmatch_correct', 4);
  const num  = currentStageNum;
  const type = getStageType(num);

  document.getElementById('modal-emoji').textContent = '🎉';
  document.getElementById('modal-title').textContent = `ステージ ${num + 1} クリア！`;
  document.getElementById('modal-msg').textContent   = type === 'cross'
    ? 'もじクロス できたね！'
    : 'すごい！ぜんぶあったよ！';
  document.getElementById('modal-btn').textContent   = 'つぎへ →';

  document.getElementById('modal-btn').onclick = () => {
    document.getElementById('success-modal').classList.add('hidden');
    loadStage(num + 1);
  };
  document.getElementById('success-modal').classList.remove('hidden');
}

// ===== Confetti =====
function launchConfetti() {
  const container = document.getElementById('confetti-container');
  const colors    = ['#FF6B9D','#F97316','#EAB308','#22C55E','#3B82F6','#8B5CF6','#F43F5E','#06B6D4'];
  for (let i = 0; i < 55; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left             = Math.random() * 100 + 'vw';
      c.style.background       = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay    = Math.random() * 0.4 + 's';
      c.style.animationDuration = (2 + Math.random() * 1.2) + 's';
      container.appendChild(c);
      setTimeout(() => c.remove(), 3600);
    }, i * 25);
  }
}

// ===== Audio =====
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  return _ac;
}
function withAudio(fn) {
  const ac = getAC();
  if (ac.state === 'running') fn(ac);
  else ac.resume().then(() => fn(ac)).catch(() => {});
}
document.addEventListener('touchstart', () => getAC().resume(), { once: true, passive: true });
document.addEventListener('pointerdown', () => getAC().resume(), { once: true, passive: true });

function playCorrect() {
  withAudio(ac => {
    [523.25, 783.99].forEach((freq, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = ac.currentTime + i * 0.13;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.22, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
      o.start(t); o.stop(t + 0.28);
    });
  });
}

function playWrong() {
  withAudio(ac => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(220, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(110, ac.currentTime + 0.22);
    g.gain.setValueAtTime(0.15, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.22);
    o.start(); o.stop(ac.currentTime + 0.22);
  });
}

function playFanfare() {
  withAudio(ac => {
    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = ac.currentTime + i * 0.1;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      o.start(t); o.stop(t + 0.45);
    });
  });
}

shuffledOrder = [...shuffle([0, 1, 2, 3]), ...shuffle([4, 5, 6, 7])];
crossPool = shuffle([...Array(CROSSWORDS.length).keys()]);
loadStage(0);
initMenu();

  setTimeout(() => { window.scrollTo(0, 0); }, 300);
