[build]
  publish = "."
  functions = "netlify/functions"
  # セーフティネット: 万一 git push で auto-build が走っても、
  # ドキュメント等の更新だけならビルドをスキップする。
  # ignore スクリプトが非 0 で終了 = build 続行、0 = スキップ。
  # 下記パスのみ変更があれば build をスキップ。
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!README.md' ':!MEMORY.md' ':!CLAUDE.md' ':!.claude' ':!.git' ':!docs' ':!memory' ':!logs'"

# ──────────────────────────────────
# 注: 本プロジェクトは静的 HTML/CSS/JS のみ。
# build command は不要 (publish = "." で十分)。
# 本番反映は npm run deploy:prod で CLI から手動実行する運用。
# ──────────────────────────────────
