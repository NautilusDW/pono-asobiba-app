<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ポノのもじかき | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="../common/achievements.js"></script>
<script src="../common/acorns.js"></script>
<script src="../common/menu.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ドラクエ風ダークテーマ */
  --bg: #05070f;
  --bg-deep: #000000;
  --primary: #FFD36E;
  --secondary: #C084FC;
  --accent: #6EE7B7;
  --text: #F4E9D0;
  --text-dim: #8B96B8;
  --card-bg: #0a0e1f;
  --window-bg: #0a0e1f;
  --window-border: #F4E9D0;
  --canvas-bg: #05070f;
  --grid-line: rgba(255,255,255,0.10);
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
  --radius: 20px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  font-family: 'Zen Maru Gothic', 'Rounded Mplus 1c', 'Hiragino Maru Gothic Pro', sans-serif;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(60, 40, 110, 0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 85%, rgba(30, 70, 140, 0.30) 0%, transparent 60%),
    radial-gradient(circle at 15% 72%, rgba(255,255,255,0.9) 0.5px, transparent 1px),
    radial-gradient(circle at 73% 22%, rgba(255,255,255,0.8) 0.5px, transparent 1px),
    radial-gradient(circle at 42% 55%, rgba(255,255,255,0.7) 0.5px, transparent 1px),
    radial-gradient(circle at 88% 48%, rgba(255,255,255,0.7) 0.5px, transparent 1px),
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6) 0.5px, transparent 1px),
    linear-gradient(180deg, #020308 0%, #05070f 50%, #0b0b1a 100%);
  background-color: var(--bg-deep);
  color: var(--text);
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  position: fixed;
  width: 100%;
  top: 0;
  left: 0;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 600px;
  margin: 0 auto;
  padding: 2px 10px 10px;
  overflow: hidden;
  overscroll-behavior: none;
}

/* ===== Header ===== */
.header { text-align: center; padding: 0; flex-shrink: 0; position: relative; }
.header h1 {
  font-size: 1.4rem; font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .subtitle { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
.streak-badge {
  position: absolute; top: 4px; right: 4px; z-index: 200;
  display: inline-block;
  background: linear-gradient(135deg, #FCD34D, #F97316);
  color: #fff;
  font-size: 0.75rem; font-weight: 900;
  padding: 4px 10px; border-radius: 14px;
  animation: stampPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  box-shadow: 0 2px 8px rgba(249,115,22,0.3);
}
.streak-badge.hidden { display: none; }
@keyframes stampPop {
  from { transform: scale(0.6); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

/* ===== Acorn Badge (どんぐりポイント) ===== */
.acorn-badge {
  position: fixed; top: 10px; right: 10px; z-index: 1200;
  display: flex; align-items: center; gap: 4px;
  background: var(--window-bg);
  border: 2px solid var(--window-border);
  color: var(--text);
  font-size: 0.9rem; font-weight: 900;
  padding: 4px 12px 4px 8px;
  border-radius: 8px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 0 8px rgba(255,220,120,0.12);
  pointer-events: none;
  transition: transform 0.15s ease;
}
.acorn-badge .acorn-icon { font-size: 1.1rem; line-height: 1; }
.acorn-badge .acorn-count { min-width: 18px; text-align: center; }
.acorn-badge.pop { animation: acornBadgePop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes acornBadgePop {
  0%   { transform: scale(1);    }
  40%  { transform: scale(1.25); }
  100% { transform: scale(1);    }
}

/* 獲得時に画面上を飛ぶチップ */
.acorn-chip {
  position: fixed; z-index: 1199;
  background: var(--window-bg);
  border: 2px solid var(--window-border);
  color: var(--text);
  font-size: 0.85rem; font-weight: 900;
  padding: 4px 10px; border-radius: 8px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.55);
  pointer-events: none;
  transition: transform 0.7s cubic-bezier(0.34,1.0,0.64,1), opacity 0.7s ease;
}

/* ===== ようせい (閉じ込められた妖精) — キャンバス中央に封印、完了時に封印解除 ===== */
.monster-deco {
  position: absolute;
  inset: 0;
  margin: auto;
  width: 160px; height: 160px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  z-index: 1; /* 文字キャンバス(z:2) の下 → 文字の後ろに封印されている感 */
  opacity: 0.22;
  filter: blur(1.2px) grayscale(0.55) brightness(0.9);
  transition: opacity 0.3s ease, filter 0.3s ease, z-index 0s;
}
.monster-deco.emerge {
  opacity: 1;
  filter: none;
  z-index: 6;
}
.monster-deco .monster-emoji {
  font-size: 5rem;
  line-height: 1;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
  animation: monsterFloat 2s ease-in-out infinite;
}
.monster-deco .monster-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 3px 4px rgba(0,0,0,0.2));
  animation: monsterFloat 2s ease-in-out infinite;
}
@keyframes monsterFloat {
  0%, 100% { transform: translateY(0) scale(1);    }
  50%      { transform: translateY(-4px) scale(1.04); }
}
/* 入場: 封印された状態でふわっと現れる */
.monster-deco.enter .monster-img,
.monster-deco.enter .monster-emoji {
  animation: monsterSealedIn 0.4s ease-out, monsterFloat 2s ease-in-out 0.4s infinite;
}
@keyframes monsterSealedIn {
  0%   { transform: scale(0.7); opacity: 0; }
  100% { transform: scale(1);   opacity: 1; }
}
/* 封印解除: 中央からバウンドして登場 */
.monster-deco.emerge .monster-img,
.monster-deco.emerge .monster-emoji {
  animation: monsterEmerge 0.55s cubic-bezier(0.34,1.7,0.64,1) forwards;
}
@keyframes monsterEmerge {
  0%   { transform: scale(0.3) rotate(-18deg); opacity: 0; }
  55%  { transform: scale(1.3) rotate(10deg);  opacity: 1; }
  78%  { transform: scale(0.95) rotate(-3deg); }
  100% { transform: scale(1.05) rotate(0);     opacity: 1; }
}
/* 退場: 右上にスワッと小さく消える */
.monster-deco.leave .monster-emoji,
.monster-deco.leave .monster-img { animation: monsterLeave 0.55s ease-in forwards; }
@keyframes monsterLeave {
  0%   { transform: translate(0,0) scale(1.05) rotate(0); opacity: 1; }
  60%  { transform: translate(60px, -70px) scale(0.65) rotate(20deg); opacity: 0.6; }
  100% { transform: translate(160px, -200px) scale(0.15) rotate(45deg); opacity: 0; }
}

/* 妖精の吹き出し (封印解除後、中央の少し上に表示) */
.monster-bubble {
  position: absolute;
  left: 50%; top: 18%;
  max-width: 200px;
  background: var(--window-bg);
  border: 2.5px solid var(--window-border);
  border-radius: 10px;
  padding: 6px 12px;
  font-size: 0.88rem;
  font-weight: 900;
  color: var(--text);
  box-shadow: 0 3px 10px rgba(0,0,0,0.55);
  pointer-events: none;
  white-space: nowrap;
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.6);
  transform-origin: center bottom;
  transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 11;
}
.monster-bubble::after {
  content: '';
  position: absolute;
  left: 50%; bottom: -10px;
  transform: translateX(-50%);
  width: 0; height: 0;
  border: 8px solid transparent;
  border-top-color: var(--window-border);
  border-bottom: 0;
}
.monster-bubble::before {
  content: '';
  position: absolute;
  left: 50%; bottom: -6px;
  transform: translateX(-50%);
  width: 0; height: 0;
  border: 6px solid transparent;
  border-top-color: var(--window-bg);
  border-bottom: 0;
  z-index: 1;
}
.monster-bubble.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.monster-bubble.hide {
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.7);
}

/* 完了時の🌰ドロップ（妖精の足元にちょこん） */
.monster-acorn-drop {
  position: absolute;
  left: 50%; top: 72%;
  font-size: 2rem;
  opacity: 0;
  z-index: 7;
  pointer-events: none;
}
.monster-acorn-drop.show { animation: acornDrop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes acornDrop {
  0%   { opacity: 0; transform: translate(-50%, -120%) scale(0.6) rotate(-20deg); }
  70%  { opacity: 1; transform: translate(-50%, -40%)  scale(1.2) rotate(8deg); }
  100% { opacity: 1; transform: translate(-50%, -50%)  scale(1)   rotate(0); }
}

/* ===== 悪役モンスター (キャンバス上部に登場、閉じ込め/悔しがる) ===== */
.villain-deco {
  position: absolute;
  top: -58px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
  gap: 4px;
  z-index: 12;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.villain-deco.show { opacity: 1; }
.villain-deco .villain-emoji {
  font-size: 3rem; line-height: 1;
  filter: drop-shadow(0 4px 6px rgba(60,0,60,0.4))
          drop-shadow(0 0 10px rgba(180,80,220,0.5));
  animation: villainFloat 1.6s ease-in-out infinite;
}
.villain-deco.gloat .villain-emoji {
  animation: villainShake 0.32s ease-in-out 4;
}
@keyframes villainFloat {
  0%, 100% { transform: translateY(0) rotate(-4deg); }
  50%      { transform: translateY(-5px) rotate(4deg); }
}
@keyframes villainShake {
  0%, 100% { transform: translateX(0) rotate(0); }
  25%      { transform: translateX(-6px) rotate(-10deg); }
  75%      { transform: translateX(6px) rotate(10deg); }
}
.villain-bubble {
  position: relative;
  max-width: 220px;
  background: linear-gradient(135deg, #3B1E4A, #6B2B7A);
  border: 2.5px solid #F0C8FF;
  color: #FFF;
  border-radius: 14px;
  padding: 6px 12px;
  font-size: 0.85rem; font-weight: 900;
  box-shadow: 0 4px 12px rgba(40,0,60,0.35);
  text-align: center;
  white-space: nowrap;
  opacity: 0;
  transform: scale(0.6);
  transform-origin: bottom center;
  transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
.villain-deco.show .villain-bubble {
  opacity: 1; transform: scale(1);
}
.villain-bubble::after {
  content: ''; position: absolute;
  bottom: -9px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border: 7px solid transparent;
  border-top-color: #6B2B7A;
  border-bottom: 0;
}

/* ===== キャンバス割れ演出 ===== */
.canvas-container.shaking {
  animation: canvasShake 0.28s ease-in-out 2;
}
@keyframes canvasShake {
  0%, 100% { transform: translate(0,0) rotate(0); }
  20%      { transform: translate(-6px, 2px) rotate(-1deg); }
  40%      { transform: translate(5px, -3px) rotate(1.3deg); }
  60%      { transform: translate(-4px, 4px) rotate(-0.8deg); }
  80%      { transform: translate(5px, -2px) rotate(0.8deg); }
}
.canvas-container.breaking { overflow: visible; }

.canvas-flash {
  position: absolute; inset: 0;
  background: radial-gradient(circle at center, #fff 0%, #FFFAE0 55%, rgba(255,250,224,0) 100%);
  opacity: 0;
  z-index: 8;
  pointer-events: none;
}
.canvas-flash.active { animation: flashBurst 0.35s ease-out forwards; }
@keyframes flashBurst {
  0%   { opacity: 0; }
  30%  { opacity: 0.95; }
  100% { opacity: 0; }
}

.canvas-cracks {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 9;
  pointer-events: none;
  opacity: 0;
  transform: scale(0.3);
}
.canvas-cracks.active { animation: crackAppear 0.7s ease-out forwards; }
@keyframes crackAppear {
  0%   { opacity: 0; transform: scale(0.3) rotate(-10deg); }
  25%  { opacity: 1; transform: scale(1)   rotate(0);      }
  75%  { opacity: 1; transform: scale(1.1) rotate(4deg);   }
  100% { opacity: 0; transform: scale(1.3) rotate(6deg);   }
}

.canvas-shards {
  position: absolute; inset: 0;
  z-index: 10;
  pointer-events: none;
}
.canvas-shards .shard {
  position: absolute;
  width: 100%; height: 100%;
  top: 0; left: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.93), rgba(240,232,220,0.88));
  border: 1px solid rgba(255,255,255,0.85);
  box-shadow: 0 0 12px rgba(255,255,255,0.75), inset 0 0 12px rgba(139,111,71,0.18);
  opacity: 0;
  transform: translate(0,0) rotate(0) scale(1);
}
.canvas-shards .shard-1 { clip-path: polygon(50% 50%, 0% 0%, 50% 0%); }
.canvas-shards .shard-2 { clip-path: polygon(50% 50%, 50% 0%, 100% 0%); }
.canvas-shards .shard-3 { clip-path: polygon(50% 50%, 100% 0%, 100% 50%); }
.canvas-shards .shard-4 { clip-path: polygon(50% 50%, 100% 50%, 100% 100%); }
.canvas-shards .shard-5 { clip-path: polygon(50% 50%, 100% 100%, 50% 100%); }
.canvas-shards .shard-6 { clip-path: polygon(50% 50%, 50% 100%, 0% 100%); }
.canvas-shards .shard-7 { clip-path: polygon(50% 50%, 0% 100%, 0% 50%); }
.canvas-shards .shard-8 { clip-path: polygon(50% 50%, 0% 50%, 0% 0%); }
.canvas-shards.burst .shard { animation: shardFly 0.9s cubic-bezier(0.33,1,0.68,1) forwards; }
.canvas-shards.burst .shard-1 { --tx:-150px; --ty:-170px; --rot:-280deg; }
.canvas-shards.burst .shard-2 { --tx: 90px;  --ty:-190px; --rot: 230deg; }
.canvas-shards.burst .shard-3 { --tx: 200px; --ty:-90px;  --rot: 310deg; }
.canvas-shards.burst .shard-4 { --tx: 210px; --ty: 100px; --rot:-270deg; }
.canvas-shards.burst .shard-5 { --tx: 80px;  --ty: 210px; --rot: 220deg; }
.canvas-shards.burst .shard-6 { --tx:-110px; --ty: 200px; --rot:-240deg; }
.canvas-shards.burst .shard-7 { --tx:-210px; --ty: 70px;  --rot: 290deg; }
.canvas-shards.burst .shard-8 { --tx:-190px; --ty:-90px;  --rot:-310deg; }
@keyframes shardFly {
  0%   { opacity: 0; transform: translate(0,0) rotate(0) scale(1); }
  12%  { opacity: 1; }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.35); }
}

/* ===== 封印解除演出 (魔法陣 + ヒビ + 光バースト + キラキラ粒子) ===== */
/* 旧 SVG 魔法陣 (#canvasSeal) は launchMagicCircle() の mp4 動画に置き換えたため常時非表示。
   burst / sparkles は補助エフェクトとして残す。 */
#canvasSeal, #canvasBurst, #canvasSparkles { position: absolute; pointer-events: none; }
#canvasSeal { display: none !important; }
#canvasSeal_disabled { inset: 0; z-index: 18; opacity: 0; }
#canvasSeal.active { opacity: 1; }
#canvasSeal svg { width: 100%; height: 100%; filter: drop-shadow(0 0 8px rgba(255,215,0,0.8)); }
#canvasSeal .seal-ring { stroke: #C084FC; stroke-width: 2; fill: none; opacity: 0.7; transform-origin: 50% 50%; }
#canvasSeal.active .seal-ring-group { animation: sealSpin 1.2s ease-out forwards; transform-origin: 50% 50%; }
@keyframes sealSpin {
  0%   { transform: scale(0.6) rotate(0);     opacity: 0;   }
  30%  { transform: scale(1)   rotate(120deg); opacity: 0.9; }
  100% { transform: scale(1.1) rotate(240deg); opacity: 0;   }
}
#canvasSeal .seal-crack {
  stroke: #FFEC63; stroke-width: 2.5; stroke-linecap: round; fill: none;
  stroke-dasharray: 70; stroke-dashoffset: 70;
  filter: drop-shadow(0 0 4px #fff);
}
#canvasSeal.cracking .seal-crack { animation: crackOpen 0.55s ease-out forwards; }
@keyframes crackOpen { to { stroke-dashoffset: 0; } }
#canvasBurst {
  top: 50%; left: 50%; width: 22%; height: 22%;
  border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  opacity: 0; z-index: 19; mix-blend-mode: screen;
  background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,238,150,0.9) 30%, rgba(192,132,252,0.5) 60%, transparent 80%);
}
#canvasBurst.active { animation: burstOut 0.85s ease-out forwards; }
@keyframes burstOut {
  0%   { transform: translate(-50%,-50%) scale(0);   opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(4.5); opacity: 0; }
}
#canvasSparkles { top: 50%; left: 50%; width: 1px; height: 1px; z-index: 20; }
#canvasSparkles .spk {
  position: absolute; left: 0; top: 0;
  font-size: 22px;
  transform: translate(-50%, -50%) scale(0);
  opacity: 0;
  will-change: transform, opacity;
  text-shadow: 0 0 4px #fff, 0 0 8px #FFEC63;
}
#canvasSparkles.active .spk { animation: spkFly 1.3s cubic-bezier(0.2,0.6,0.3,1) forwards; }
@keyframes spkFly {
  0%   { transform: translate(-50%,-50%) scale(0) rotate(0);   opacity: 0; }
  15%  { transform: translate(-50%,-50%) scale(1) rotate(60deg); opacity: 1; }
  100% { transform: translate(calc(-50% + var(--dx,0)), calc(-50% + var(--dy,0))) scale(0.3) rotate(var(--rot,360deg)); opacity: 0; }
}
@media (prefers-reduced-motion: reduce) {
  #canvasSeal, #canvasBurst, #canvasSparkles { display: none !important; }
}

/* ポワン時に周りに広がる星 */
.monster-sparkle {
  position: absolute;
  font-size: 1rem;
  pointer-events: none;
  animation: sparkleOut 0.7s ease-out forwards;
}
@keyframes sparkleOut {
  0%   { transform: translate(0,0) scale(0.6); opacity: 0.9; }
  100% { transform: translate(var(--dx), var(--dy)) scale(1.4); opacity: 0; }
}

/* ===== Row Boss (行クリア時のかわいい行ボス) ===== */
.row-boss-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; margin: 6px 0 10px;
}
.row-boss-emoji {
  font-size: 3.4rem; line-height: 1;
  animation: rowBossPop 0.55s cubic-bezier(0.34,1.56,0.64,1),
             rowBossFloat 1.6s ease-in-out 0.55s infinite;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2));
}
.row-boss-speech {
  font-size: 0.85rem; font-weight: 700; color: var(--text);
  background: var(--window-bg); border: 2px solid var(--window-border);
  padding: 4px 10px; border-radius: 12px;
  box-shadow: 0 0 12px rgba(255,220,130,0.35);
}
@keyframes rowBossPop {
  0%   { transform: scale(0);   }
  100% { transform: scale(1);   }
}
@keyframes rowBossFloat {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

/* ===== Milestone Modal ===== */
.milestone-modal {
  position: fixed; inset: 0; z-index: 1100;
  display: flex; align-items: center; justify-content: center;
  background: rgba(93, 78, 55, 0.45);
  animation: fadeIn 0.25s ease;
}
.milestone-modal.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.milestone-card {
  background: var(--window-bg);
  border: 2.5px solid var(--window-border);
  border-radius: 28px;
  padding: 32px 28px 28px;
  text-align: center;
  width: min(88vw, 340px);
  box-shadow: 0 12px 48px rgba(0,0,0,0.6), 0 0 24px rgba(255,220,130,0.35);
  animation: milestoneIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
@keyframes milestoneIn {
  from { transform: scale(0.5) translateY(40px); opacity: 0; }
  to   { transform: scale(1)   translateY(0);    opacity: 1; }
}
.milestone-scene { font-size: 4.5rem; line-height: 1.1; }
.milestone-count {
  font-size: 1rem; font-weight: 900;
  background: linear-gradient(135deg, #FCD34D, #F97316);
  color: #fff; padding: 2px 14px; border-radius: 20px;
}
.milestone-title {
  font-size: 1.8rem; font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.milestone-msg { font-size: 0.95rem; font-weight: 700; color: var(--text-dim); }

/* ===== Category Tabs ===== */
.category-tabs {
  display: flex; gap: 6px; justify-content: center;
  margin: 4px 0; flex-shrink: 0; flex-wrap: wrap;
}
.category-tab {
  padding: 8px 16px; border: none; border-radius: 30px;
  font-family: inherit; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: all 0.3s;
  background: var(--card-bg); color: var(--text); box-shadow: var(--shadow);
}
.category-tab.active { color: #FFF; transform: scale(1.05); }
.category-tab[data-cat="hiragana"].active { background: var(--primary); }
.category-tab[data-cat="katakana"].active { background: var(--secondary); }


/* ===== Character Selector ===== */
/* ===== Row Selection Screen ===== */
#rowSelectScreen {
  display: flex; flex-direction: column; align-items: center;
  min-height: 100dvh; padding: 24px 16px 40px;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover; background-position: center;
}
#rowSelectScreen.hidden { display: none; }
.rs-header { text-align: center; margin-bottom: 8px; }
.rs-header h1 {
  font-size: 1.6rem; font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.rs-subtitle { font-size: 0.9rem; color: #A89585; margin-top: 2px; font-weight: 700; }
.rs-cat-tabs { display: flex; gap: 6px; margin: 10px 0 16px; }
.rs-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 12px; width: 100%; max-width: 380px;
}
.rs-row-btn {
  padding: 14px 10px; border: 3px solid #E8E0D8; border-radius: 20px;
  background: var(--card-bg); font-family: inherit;
  cursor: pointer; box-shadow: 0 3px 12px rgba(91,74,63,0.08);
  transition: all 0.2s; text-align: center;
}
.rs-row-btn:active { transform: scale(0.95); }
.rs-row-label { font-size: 1.2rem; font-weight: 900; color: var(--text); }
.rs-row-chars { font-size: 0.75rem; color: #A89585; margin-top: 4px; font-weight: 700; letter-spacing: 0.15em; }
.rs-row-btn.all-done {
  background: linear-gradient(135deg, #D1FAE5, #A7F3D0);
  border-color: #34D399;
}
.rs-row-done-mark { color: #059669; font-size: 0.7rem; font-weight: 900; margin-top: 2px; }
@media (orientation: landscape) {
  #rowSelectScreen { min-height: 100dvh; padding: 12px 24px 24px; justify-content: center; }
  .rs-grid { grid-template-columns: repeat(5, 1fr); max-width: 600px; gap: 8px; }
  .rs-row-btn { padding: 10px 8px; }
  .rs-row-label { font-size: 1rem; }
}

/* (Back button removed - using gear menu instead) */

/* ===== Word Context Grid (Phase 4) ===== */
.word-context-wrapper {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; width: 100%; height: 100%;
}
.word-context-emoji { font-size: 3.5rem; margin-bottom: 8px; }
.word-context-row {
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.word-context-cell {
  border-radius: 16px; background: var(--card-bg);
  box-shadow: 0 3px 12px rgba(91,74,63,0.1);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; border: 2.5px solid #E8E0D8;
}
.word-context-cell.writable {
  border-color: var(--primary);
  position: relative; touch-action: none;
}
.word-context-cell.text-only {
  font-size: 2.2rem; font-weight: 900; color: var(--text);
  padding: 8px 14px; min-width: 60px; min-height: 60px;
}

/* ===== Tracing Area ===== */
.trace-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; position: relative; min-height: 0;
}
.canvas-container {
  position: relative;
  width: min(90vw, 420px); height: min(90vw, 420px);
  max-width: 420px; max-height: 420px;
  background: var(--canvas-bg);
  border: 2px solid var(--window-border);
  border-radius: var(--radius);
  box-shadow: var(--shadow), inset 0 0 24px rgba(140,120,255,0.08);
  overflow: hidden;
  overscroll-behavior: none;
}
/* Grid lines (薄い白) */
.canvas-container::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background:
    linear-gradient(to right, transparent 49.5%, var(--grid-line) 49.5%, var(--grid-line) 50.5%, transparent 50.5%),
    linear-gradient(to bottom, transparent 49.5%, var(--grid-line) 49.5%, var(--grid-line) 50.5%, transparent 50.5%);
}
.canvas-container::after {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background:
    linear-gradient(45deg, transparent calc(50% - 0.5px), rgba(255,255,255,0.05) calc(50% - 0.5px), rgba(255,255,255,0.05) calc(50% + 0.5px), transparent calc(50% + 0.5px)),
    linear-gradient(-45deg, transparent calc(50% - 0.5px), rgba(255,255,255,0.05) calc(50% - 0.5px), rgba(255,255,255,0.05) calc(50% + 0.5px), transparent calc(50% + 0.5px));
}

/* 書き取り線を金グロウで発光させる (ドラクエの光る文字感) */
#writerTarget svg path,
#writerTarget svg line {
  filter: drop-shadow(0 0 2px rgba(255,235,180,0.85))
          drop-shadow(0 0 6px rgba(255,200,90,0.55))
          drop-shadow(0 0 14px rgba(255,170,60,0.35));
}

/* ===== なぞり時の金色パーティクル ===== */
#traceSparkleLayer {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.trace-sparkle {
  position: absolute;
  width: 10px; height: 10px;
  margin-left: -5px; margin-top: -5px;
  border-radius: 50%;
  background: radial-gradient(circle, #FFF8D9 0%, #FFD86A 35%, rgba(255,180,60,0.6) 65%, rgba(255,170,60,0) 100%);
  pointer-events: none;
  mix-blend-mode: screen;
  filter: drop-shadow(0 0 4px #FFD86A) drop-shadow(0 0 8px rgba(255,170,60,0.7));
  animation: traceSparkleFly 0.85s cubic-bezier(0.2,0.6,0.3,1) forwards;
  will-change: transform, opacity;
}
@keyframes traceSparkleFly {
  0%   { transform: translate(0,0) scale(0.2); opacity: 0; }
  15%  { transform: translate(calc(var(--tx) * 0.15), calc(var(--ty) * 0.15)) scale(1.15); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
}
@media (prefers-reduced-motion: reduce) {
  #traceSparkleLayer { display: none !important; }
}

/* Hanzi Writer target */
#writerTarget {
  position: absolute; inset: 0; z-index: 2;
}
#writerTarget svg { display: block; }


/* ===== Controls ===== */
.controls {
  display: flex; gap: 8px; justify-content: center; padding: 4px 0; flex-shrink: 0;
}
.next-row {
  display: flex; justify-content: center; padding: 6px 0; flex-shrink: 0;
}
.ctrl-btn {
  padding: 10px 20px;
  border: 2px solid var(--window-border);
  border-radius: 8px;
  font-family: inherit; font-size: 0.95rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 3px 10px rgba(0,0,0,0.5);
  color: var(--text);
  background: var(--window-bg);
}
.ctrl-btn:active { transform: scale(0.95); }
.btn-hint  { background: var(--window-bg); color: #7DD3FC; }
.btn-next  {
  background: linear-gradient(135deg, #10B981, #047857);
  color: #FFF;
  border-color: #6EE7B7;
  box-shadow: 0 3px 12px rgba(16,185,129,0.45);
}

/* ===== Confetti ===== */
.confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 1000; overflow: hidden;
  overscroll-behavior: none; }
.confetti-piece {
  position: absolute; width: 10px; height: 10px; border-radius: 2px;
  animation: confetti-fall 2.5s ease-out forwards;
}
@keyframes confetti-fall {
  0%   { transform: translateY(-10px) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* ===== Magic Circle ===== */
.magic-container {
  position: fixed; inset: 0; pointer-events: none; z-index: 998; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.magic-video {
  position: absolute;
  top: 50%; left: 50%;
  width: min(80vw, 80vh); aspect-ratio: 1;
  object-fit: cover;
  opacity: 0;
  filter: drop-shadow(0 0 24px rgba(255, 220, 120, 0.75))
          drop-shadow(0 0 48px rgba(180, 120, 255, 0.45));
  mix-blend-mode: screen;
  will-change: transform, opacity;
  transform: translate(-50%, -50%) scale(0.4);
  animation: magic-video-in 3200ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}
@keyframes magic-video-in {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
  15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
  85%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.25); }
}

.magic-particle {
  position: absolute; top: 50%; left: 50%;
  width: 10px; height: 10px; border-radius: 50%;
  background: radial-gradient(circle, #FFF 0%, #FFE27A 40%, rgba(255,180,80,0.0) 75%);
  box-shadow: 0 0 10px #FFE27A, 0 0 20px #FFB84D;
  will-change: transform, opacity;
  animation: magic-particle-fly 1800ms cubic-bezier(0.15, 0.7, 0.3, 1) forwards;
}
@keyframes magic-particle-fly {
  0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
  15%  { opacity: 1; }
  100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.1); opacity: 0; }
}

.magic-flash {
  position: absolute; top: 50%; left: 50%;
  width: 20vmin; height: 20vmin; border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,220,130,0.5) 40%, rgba(180,120,255,0) 75%);
  animation: magic-flash-burst 900ms ease-out forwards;
}
@keyframes magic-flash-burst {
  0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  30%  { opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(6); opacity: 0; }
}

/* ===== Magic Projectile (手前から奥へ飛ぶ魔法弾 + 着弾破裂) =====
   JS 側で start/target 座標を transform で設定し、transition で飛ばす。
   色は CSS カスタムプロパティ --core / --aura / --glow を属性別に差し替え。 */
.magic-projectile-container {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1500;
  overflow: hidden;
}
.magic-projectile {
  position: absolute;
  width: 140px; height: 140px;
  left: 0; top: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle at 38% 34%,
      rgba(255,255,255,0.98) 0%,
      var(--aura, #FFE27A) 22%,
      var(--core, #FF6B00) 58%,
      rgba(0,0,0,0) 85%);
  box-shadow:
    0 0 24px 6px var(--glow, rgba(255,160,0,0.85)),
    0 0 56px 18px var(--glow, rgba(255,160,0,0.55));
  mix-blend-mode: screen;
  opacity: 0;
  will-change: transform, opacity;
  /* transform は JS で直接書き換え、transition で補間。
     最初のフレームだけ 0 に、次フレームで目的地+縮小へ */
}
.magic-projectile.animate {
  opacity: 1;
  transition:
    transform 0.8s cubic-bezier(0.35, 0.15, 0.55, 1),
    opacity 0.18s ease-out;
}
.magic-projectile .magic-projectile-trail {
  position: absolute; inset: -12%;
  border-radius: 50%;
  background: radial-gradient(circle,
    var(--aura, #FFE27A) 0%,
    var(--core, #FF6B00) 45%,
    rgba(0,0,0,0) 75%);
  filter: blur(6px);
  opacity: 0.7;
  animation: projectilePulse 0.35s ease-in-out infinite alternate;
}
@keyframes projectilePulse {
  from { transform: scale(0.9); opacity: 0.5; }
  to   { transform: scale(1.15); opacity: 0.9; }
}
.magic-burst-flash {
  position: absolute;
  width: 260px; height: 260px;
  left: 0; top: 0;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(255,255,255,1) 0%,
    var(--aura, #FFE27A) 30%,
    var(--core, #FF6B00) 58%,
    rgba(0,0,0,0) 82%);
  mix-blend-mode: screen;
  pointer-events: none;
  animation: magicBurstFlash 0.65s ease-out forwards;
}
@keyframes magicBurstFlash {
  0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
  25%  { transform: translate(-50%, -50%) scale(1.4); opacity: 0.98; }
  100% { transform: translate(-50%, -50%) scale(2.4); opacity: 0; }
}
.magic-burst-particle {
  position: absolute;
  width: 16px; height: 16px;
  left: 0; top: 0;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(255,255,255,1) 0%,
    var(--aura, #FFE27A) 45%,
    var(--core, #FF6B00) 80%,
    rgba(0,0,0,0) 100%);
  box-shadow: 0 0 12px 4px var(--glow, rgba(255,160,0,0.7));
  mix-blend-mode: screen;
  pointer-events: none;
  animation: magicBurstParticle 0.7s cubic-bezier(0.2,0.7,0.3,1) forwards;
}
@keyframes magicBurstParticle {
  0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) translate(var(--dx, 0), var(--dy, 0)) scale(0.15); opacity: 0; }
}
.magic-burst-shockring {
  position: absolute;
  width: 80px; height: 80px;
  left: 0; top: 0;
  border-radius: 50%;
  border: 3px solid var(--aura, #FFE27A);
  box-shadow: 0 0 14px 2px var(--glow, rgba(255,160,0,0.7));
  mix-blend-mode: screen;
  pointer-events: none;
  animation: magicBurstShockring 0.6s cubic-bezier(0.1,0.7,0.3,1) forwards;
}
@keyframes magicBurstShockring {
  0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 1;   border-width: 6px; }
  100% { transform: translate(-50%, -50%) scale(3.6); opacity: 0;   border-width: 1px; }
}
@media (prefers-reduced-motion: reduce) {
  .magic-projectile,
  .magic-projectile .magic-projectile-trail,
  .magic-burst-flash,
  .magic-burst-particle,
  .magic-burst-shockring {
    animation: none !important;
    transition: none !important;
  }
}

/* ===== Completion Overlay ===== */
.completion-overlay {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.3s;
}
.completion-overlay.show { opacity: 1; pointer-events: auto; }
.completion-msg {
  font-size: 3rem; font-weight: 900;
  color: #FFF;
  -webkit-text-stroke: 4px #1a1a2e;
  paint-order: stroke fill;
  animation: bounce-in 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
  filter: drop-shadow(0 0 12px rgba(255,220,120,0.85))
          drop-shadow(0 0 24px rgba(192,132,252,0.7));
}
@keyframes bounce-in {
  0% { transform: scale(0); } 60% { transform: scale(1.3); } 100% { transform: scale(1); }
}

/* ===== Stroke order numbers ===== */
.stroke-number-overlay {
  position: absolute; inset: 0; pointer-events: none; z-index: 5;
}
.stroke-number {
  position: absolute;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: #FF6B9D;
  color: #FFF;
  font-size: 0.75rem; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  outline: 3px solid #FFF;
  transform: translate(-50%, -50%);
  font-family: 'Zen Maru Gothic', sans-serif;
}

/* ===== Star particles ===== */
.star-particle {
  position: absolute; pointer-events: none; z-index: 10; font-size: 1.2rem;
  animation: star-float 1s ease-out forwards;
}
@keyframes star-float {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-40px) scale(0.3); opacity: 0; }
}

/* ===== Character Extension Point (future AI characters) ===== */
.character-slot { position: fixed; bottom: 80px; right: 10px; width: 80px; height: 80px; z-index: 50; display: none; }

/* ===== Canvas wrapper for hedgehog peek effect ===== */
.canvas-wrap { position: relative; }
@keyframes hedgehog-peek {
  /* hidden */
  0%, 58%  { transform: translateY(95px); }
  /* slow creep up — takes ~2.5s to fully appear */
  73%      { transform: translateY(0); }
  /* small wave */
  77%      { transform: translateY(-6px); }
  80%      { transform: translateY(0); }
  82%      { transform: translateY(-6px); }
  /* stay peeked */
  85%, 90% { transform: translateY(0); }
  /* slow descent */
  100%     { transform: translateY(95px); }
}

.hedgehog-wrap {
  position: absolute;
  bottom: calc(100% - 30px);
  right: 10px;
  width: 86px;
  pointer-events: none;
  animation: hedgehog-peek 18s ease-in-out infinite;
  animation-delay: 3s;
  animation-fill-mode: backwards;
}

.hedgehog-deco {
  width: 100%;
  display: block;
  filter: drop-shadow(1px 2px 5px rgba(0,0,0,0.15));
}

/* ===== Hedgehog speech bubble ===== */
.hedgehog-bubble {
  position: absolute;
  bottom: 100%;
  right: -5px;
  background: var(--window-bg);
  border: 2px solid var(--window-border);
  border-radius: 16px;
  padding: 5px 12px;
  margin-bottom: 4px;
  font-size: 0.82rem;
  font-weight: 900;
  color: var(--text);
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.45), 0 0 10px rgba(255,220,130,0.3);
  opacity: 0;
  animation: bubble-pop 18s ease-in-out infinite;
  animation-delay: 3s;
  animation-fill-mode: backwards;
}
.hedgehog-bubble::after {
  content: '';
  position: absolute;
  bottom: -7px;
  right: 28px;
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
  border-top: 8px solid var(--window-border);
}
@keyframes bubble-pop {
  0%, 68%  { opacity: 0; transform: scale(0.5); }
  73%      { opacity: 1; transform: scale(1.15); }
  76%, 86% { opacity: 1; transform: scale(1); }
  91%      { opacity: 0; transform: scale(0.5); }
  100%     { opacity: 0; }
}

/* ===== Pono decoration (aligned to canvas left edge, bottom of trace-area) ===== */
.pono-deco {
  position: absolute;
  bottom: -45px;
  left: calc(50% - min(45vw, 210px));
  width: 72px;
  pointer-events: none;
  filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.15));
  z-index: 100;
}

/* ===== Word Card ===== */
@keyframes wordCardIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes wordCardOut {
  from { opacity: 1; transform: translateX(-50%) translateY(0); }
  to   { opacity: 0; transform: translateX(-50%) translateY(20px); }
}
.word-card {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--window-bg);
  border: 2.5px solid var(--window-border);
  border-radius: 10px;
  padding: 12px 28px;
  display: none;
  align-items: center;
  gap: 14px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.65);
  pointer-events: none;
  z-index: 1050;
  white-space: nowrap;
}
.word-card.show {
  display: flex;
  animation: wordCardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.word-card.hide {
  display: flex;
  animation: wordCardOut 0.35s ease forwards;
}
.word-card-emoji { font-size: 2.4rem; line-height: 1; }
.word-card-text  { font-size: 1.6rem; font-weight: 900; color: var(--text); }
.word-card-first { color: #FCD34D; text-shadow: 0 0 8px rgba(252,211,77,0.5); }
.word-card-note  { font-size: 1.1rem; font-weight: 700; color: var(--text-dim); }

/* ===== Portrait: wrapper divs are transparent ===== */
.left-col, .mid-col, .right-col {
  display: contents;
}
.pono-bubble { display: none; }
/* Progress hint */
.progress-hint {
  font-size: 0.7rem; font-weight: 700; color: var(--primary);
  text-align: center; padding: 2px 0; flex-shrink: 0;
}
.progress-hint:empty { display: none; }
/* Portrait ordering */
.header { order: 1; }
.controls { order: 4; }
.progress-hint { order: 4; }
.trace-area { order: 5; }
.next-row { order: 10; }

/* ===== Responsive ===== */
@media (max-height: 600px) {
  .header h1 { font-size: 1.1rem; }
  .header .subtitle { display: none; }
  .controls { padding: 6px 0; }
}

/* ===== Landscape layout ===== */
@media (orientation: landscape) {
  #app {
    flex-direction: row;
    max-width: 100%;
    padding: 4px 8px;
    gap: 0;
    align-items: stretch;
  }
  /* ── Left column: only header visible ── */
  .left-col {
    display: block;
    position: fixed; top: 8px; left: 64px; z-index: 9989;
    width: auto;
  }
  .header { padding: 0; }
  .header h1 { font-size: 1.1rem; }
  .header .subtitle { font-size: 0.7rem; }

  /* ── Middle column: controls ── */
  .mid-col {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; flex-shrink: 0;
    padding: 6px 4px;
    order: 2;
  }
  .controls {
    display: flex; flex-direction: column; gap: 4px;
    width: 100%; align-items: center;
    order: auto; padding: 0;
  }
  .ctrl-btn {
    padding: 10px 6px; font-size: 0.8rem;
    width: 100%; min-width: 70px;
  }

  /* ── Right column: canvas + つぎ at bottom-right ── */
  .right-col {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; min-width: 0;
    order: 3; position: relative;
  }
  .trace-area {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
    order: auto; position: relative;
    width: 100%;
  }
  .canvas-container {
    width: min(88vh, calc(100vw - 250px));
    height: min(88vh, calc(100vw - 250px));
    max-width: none; max-height: none;
  }
  .next-row {
    position: absolute; bottom: 12px; right: 12px;
    order: auto; padding: 0; width: auto;
    display: block; z-index: 100;
  }
  .next-row .ctrl-btn {
    width: auto; padding: 14px 28px; font-size: 1.05rem;
    box-shadow: 0 4px 16px rgba(74,222,128,0.4);
  }
  /* Pono deco: canvas bottom-left (bigger, shifted right & up) */
  .pono-deco {
    display: block;
    position: absolute;
    bottom: 8px; left: 12px;
    width: 68px; z-index: 100;
  }
  .hedgehog-wrap { display: none; }
  /* Pono speech bubble (landscape) */
  .pono-bubble {
    display: block;
    position: absolute;
    bottom: 145px; left: 10px;
    background: var(--window-bg);
    border: 2px solid var(--window-border);
    border-radius: 16px;
    padding: 5px 12px;
    font-size: 0.78rem;
    font-weight: 900;
    color: var(--text);
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.45), 0 0 10px rgba(255,220,130,0.3);
    z-index: 101;
    opacity: 0;
    animation: pono-bubble-pop 18s ease-in-out infinite;
    animation-delay: 3s;
    animation-fill-mode: backwards;
  }
  .pono-bubble::after {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 20px;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 8px solid var(--window-border);
  }
  @keyframes pono-bubble-pop {
    0%, 68%  { opacity: 0; transform: scale(0.5); }
    73%      { opacity: 1; transform: scale(1.15); }
    76%, 86% { opacity: 1; transform: scale(1); }
    91%      { opacity: 0; transform: scale(0.5); }
    100%     { opacity: 0; }
  }
  .progress-hint { display: none; }
  .streak-badge { right: 0; top: 2px; }
}

/* ===== Tutorial ===== */
.tut-dim { position:fixed;inset:0;z-index:9995;background:rgba(0,0,0,0.72);pointer-events:auto; }
.tut-dim.hidden { display:none; }
.tut-bubble { position:fixed;z-index:9997;background:var(--window-bg);border:2px solid var(--window-border);border-radius:16px;padding:12px 12px;max-width:none;box-shadow:0 4px 20px rgba(0,0,0,0.6),0 0 16px rgba(255,220,130,0.3);font-size:0.95rem;font-weight:700;color:var(--text);line-height:1.6;text-align:center;white-space:nowrap; }
.tut-bubble.hidden { display:none; }
.tut-next-btn { display:inline-block;margin-top:10px;padding:8px 24px;border:none;border-radius:50px;background:linear-gradient(135deg,#60A5FA,#818CF8);color:#fff;font-family:inherit;font-size:0.85rem;font-weight:900;cursor:pointer; }
#demoIndicator {
  position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
  font-size:1.2rem; font-weight:900; color:#fff;
  background:linear-gradient(135deg,#FF6B9D,#EC4899); padding:8px 20px; border-radius:24px;
  animation:demoBlink 0.8s ease-in-out infinite;
  display:none; z-index:200;
  box-shadow:0 4px 16px rgba(255,107,157,0.4);
  pointer-events:none; letter-spacing:0.1em;
}
@keyframes demoBlink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

/* 1 文字完成時の「シャキーン！」白フラッシュ。短く眩しすぎないように。 */
.shakeen-flash {
  position: fixed; inset: 0; z-index: 1400;
  pointer-events: none;
  background: radial-gradient(circle at 50% 50%,
    rgba(255,255,255,0.9) 0%,
    rgba(255,240,180,0.55) 35%,
    rgba(255,240,180,0) 70%);
  animation: shakeenFlash 360ms ease-out forwards;
  mix-blend-mode: screen;
}
@keyframes shakeenFlash {
  0%   { opacity: 0;   transform: scale(0.9); }
  18%  { opacity: 1;   transform: scale(1.0); }
  100% { opacity: 0;   transform: scale(1.12); }
}
@media (prefers-reduced-motion: reduce) {
  .shakeen-flash { animation: none; opacity: 0; }
}

/* ===== Battle Stage (RPG バトル、行練習中のみ表示) ===== */
/* 戦闘モードではポノとハリネズミを隠す (戦闘画面は敵と文字キャンバスだけに集中させる) */
body.battle-mode .pono-deco,
body.battle-mode .pono-bubble,
body.battle-mode .hedgehog-wrap,
body.battle-mode .hedgehog-deco,
body.battle-mode .hedgehog-bubble {
  display: none !important;
}
.battle-stage {
  position: relative;
  width: 100%;
  max-width: min(92vw, 420px);
  margin: 0 auto 4px;
  height: min(34vh, 220px);
  min-height: 140px;
  background:
    radial-gradient(ellipse at 50% 120%, rgba(120,70,200,0.18) 0%, transparent 70%),
    linear-gradient(180deg, #0b0f23 0%, #070812 100%);
  border: 2.5px solid var(--window-border);
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6), inset 0 0 18px rgba(255,220,130,0.12);
  overflow: hidden;
  order: 3;
  flex-shrink: 0;
  box-sizing: border-box;
}
.battle-stage .battle-bg {
  position: absolute; inset: 0;
  /* 森のピクセルアート背景: 横幅はオーバーフローを cover で自動クロップし、地面を画面下辺に揃える */
  background-image: url('../assets/images/battle/bg/forest_bg_01.png');
  background-position: center bottom;
  background-size: cover;
  background-repeat: no-repeat;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  pointer-events: none;
  z-index: 0;
}
/* 背景の上に薄暗いビネットを乗せて敵の視認性を上げる */
.battle-stage .battle-bg::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at center 80%, transparent 40%, rgba(0,0,0,0.25) 95%),
    linear-gradient(180deg, rgba(0,0,0,0.15) 0%, transparent 35%);
  pointer-events: none;
}
.battle-stage .battle-enemy-wrap {
  position: absolute;
  left: 50%; top: 58%;  /* 森BGの地面ラインに敵の足元が合うよう下げる */
  transform: translate(-50%, -50%);
  width: 72%;
  display: flex; justify-content: center; align-items: flex-end;
  pointer-events: none;
  z-index: 2;
}
.battle-enemy {
  position: relative;
  width: min(28vh, 150px); height: min(28vh, 150px);
  max-width: 150px; max-height: 150px;
  display: flex; justify-content: center; align-items: flex-end;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.6));
  animation: battleEnemyFloat 2.4s ease-in-out infinite;
  transform-origin: center bottom;
}
.battle-enemy .enemy-img {
  width: 100%; height: 100%;
  object-fit: contain;
  image-rendering: -webkit-optimize-contrast;
}
.battle-enemy .enemy-shadow {
  position: absolute;
  bottom: -6px; left: 10%;
  width: 80%; height: 10px;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 70%);
  animation: battleEnemyShadow 2.4s ease-in-out infinite;
}
@keyframes battleEnemyFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-6px) scale(1.02); }
}
@keyframes battleEnemyShadow {
  0%, 100% { transform: scaleX(1);   opacity: 0.75; }
  50%      { transform: scaleX(0.85); opacity: 0.55; }
}
/* ダメージ: 短い横シェイク + 白フラッシュ */
.battle-enemy.damaged {
  animation: battleEnemyHit 0.32s ease-in-out, battleEnemyFloat 2.4s ease-in-out 0.32s infinite;
}
.battle-enemy.damaged .enemy-img {
  animation: battleEnemyFlash 0.32s ease-out;
}
@keyframes battleEnemyHit {
  0%, 100% { transform: translateX(0); }
  20%      { transform: translateX(-8px) rotate(-3deg); }
  40%      { transform: translateX(7px)  rotate(3deg);  }
  60%      { transform: translateX(-5px) rotate(-2deg); }
  80%      { transform: translateX(4px)  rotate(1.5deg);}
}
@keyframes battleEnemyFlash {
  0%   { filter: brightness(1)  drop-shadow(0 0 0 #fff); }
  40%  { filter: brightness(2.4) drop-shadow(0 0 16px #fff) drop-shadow(0 0 28px #FFE27A); }
  100% { filter: brightness(1)  drop-shadow(0 0 0 #fff); }
}
/* 撃破: フリップ + 縮小 + 暗転 */
.battle-enemy.defeated {
  animation: battleEnemyDefeat 1.1s cubic-bezier(0.6,-0.1,0.7,1) forwards !important;
}
@keyframes battleEnemyDefeat {
  0%   { transform: translateY(0)     scale(1)   rotate(0);     opacity: 1; filter: brightness(1); }
  25%  { transform: translateY(-30px) scale(1.1) rotate(-10deg);opacity: 1; filter: brightness(0.6); }
  65%  { transform: translateY(40px)  scale(0.6) rotate(180deg);opacity: 0.7; filter: brightness(0.3) hue-rotate(-40deg); }
  100% { transform: translateY(80px)  scale(0.1) rotate(360deg);opacity: 0;   filter: brightness(0); }
}

/* 敵情報 (名前 / HP / 五芒星) */
.enemy-info {
  position: absolute;
  left: 8px; right: 8px; bottom: 6px;
  display: flex; flex-direction: column; gap: 3px;
  pointer-events: none;
}
.enemy-name {
  font-size: 0.78rem; font-weight: 900;
  color: var(--text);
  text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 2px #000;
  letter-spacing: 0.06em;
}
.hp-bar-wrap {
  background: rgba(0,0,0,0.6);
  border: 1.5px solid rgba(244,233,208,0.75);
  border-radius: 4px;
  padding: 2px;
  box-shadow: inset 0 0 4px rgba(0,0,0,0.8);
}
.hp-bar {
  display: flex; gap: 2px;
  height: 9px;
}
.hp-bar .hp-block {
  flex: 1;
  background: linear-gradient(180deg, #6EE7B7 0%, #10B981 55%, #047857 100%);
  border-radius: 1px;
  box-shadow: inset 0 0 3px rgba(255,255,255,0.35);
  transition: background 0.25s ease, opacity 0.25s ease, transform 0.25s ease;
}
.hp-bar .hp-block.low {
  background: linear-gradient(180deg, #FCD34D 0%, #F59E0B 55%, #B45309 100%);
}
.hp-bar .hp-block.critical {
  background: linear-gradient(180deg, #FCA5A5 0%, #EF4444 55%, #991B1B 100%);
}
.hp-bar .hp-block.lost {
  background: #1a1a1a;
  box-shadow: inset 0 0 3px rgba(0,0,0,0.8);
  opacity: 0.4;
}
.pentagram-charge {
  display: flex; justify-content: center; gap: 3px;
  font-size: 0.95rem;
  line-height: 1;
  margin-top: 1px;
  filter: drop-shadow(0 0 2px #000);
}
.pentagram-charge .star {
  color: rgba(170,170,180,0.4);
  transition: color 0.3s ease, text-shadow 0.3s ease, transform 0.3s ease;
}
.pentagram-charge .star.lit {
  color: #FFD86A;
  text-shadow: 0 0 6px #FFE27A, 0 0 12px rgba(255,170,60,0.9), 0 0 20px rgba(255,170,60,0.5);
  animation: starPop 0.35s cubic-bezier(0.34,1.7,0.64,1);
}
.pentagram-charge.charged .star.lit {
  animation: starCharged 1.2s ease-in-out infinite;
}
@keyframes starPop {
  0%   { transform: scale(0.5); }
  55%  { transform: scale(1.5); }
  100% { transform: scale(1);   }
}
@keyframes starCharged {
  0%, 100% { transform: scale(1);    filter: brightness(1); }
  50%      { transform: scale(1.15); filter: brightness(1.3); }
}

/* 敵のセリフ吹き出し */
.enemy-speech {
  position: absolute;
  left: 50%; top: 6px;
  transform: translateX(-50%) scale(0.6);
  background: var(--window-bg);
  border: 2px solid var(--window-border);
  border-radius: 10px;
  padding: 3px 10px;
  font-size: 0.78rem; font-weight: 900;
  color: var(--text);
  box-shadow: 0 2px 6px rgba(0,0,0,0.6), 0 0 10px rgba(255,220,130,0.25);
  opacity: 0;
  white-space: nowrap;
  transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
.enemy-speech.show { opacity: 1; transform: translateX(-50%) scale(1); }
.enemy-speech::after {
  content: '';
  position: absolute;
  bottom: -7px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 7px solid var(--window-border);
}

/* ダメージ数字ポップアップ */
.damage-pop-layer {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 30;
  overflow: visible;
}
.damage-pop {
  position: absolute;
  font-size: 1.6rem; font-weight: 900;
  color: #FFE27A;
  text-shadow: 0 0 6px #FFD86A, 0 0 12px rgba(255,170,60,0.85), 0 2px 3px #000;
  animation: damagePopAnim 0.75s cubic-bezier(0.2,0.8,0.3,1) forwards;
  transform: translate(-50%, -50%);
  letter-spacing: 0.04em;
  will-change: transform, opacity;
}
.damage-pop.finisher {
  font-size: 2.6rem;
  color: #FCA5A5;
  text-shadow: 0 0 8px #F87171, 0 0 18px rgba(239,68,68,0.85), 0 2px 4px #000;
}
@keyframes damagePopAnim {
  0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
  20%  { transform: translate(-50%, -70%) scale(1.25); opacity: 1; }
  100% { transform: translate(-50%,-180%) scale(0.9); opacity: 0; }
}

/* ===== 通常攻撃: 斜めスラッシュ ===== */
.battle-stage .slash-fx {
  position: absolute;
  top: 18%; left: 8%;
  width: 84%; height: 64%;
  pointer-events: none;
  background:
    linear-gradient(115deg,
      transparent 47%,
      rgba(255,255,255,0.9) 49%,
      rgba(255,245,200,1) 50%,
      rgba(255,255,255,0.9) 51%,
      transparent 53%);
  filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 14px rgba(255,220,100,0.8));
  mix-blend-mode: screen;
  opacity: 0;
  animation: slashSweep 0.42s ease-out forwards;
  z-index: 5;
}
@keyframes slashSweep {
  0%   { opacity: 0; transform: translateX(-22%) scaleX(0.5); }
  25%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(22%) scaleX(1.1); }
}

/* ===== 魔法攻撃 (炎、ミニ): 敵の位置でラジアルグロウ ===== */
.battle-stage .magic-fire-fx {
  position: absolute;
  top: 45%; left: 50%;
  width: 65%; aspect-ratio: 1;
  transform: translate(-50%, -50%);
  pointer-events: none;
  background: radial-gradient(circle,
    rgba(255,240,160,0.95) 0%,
    rgba(255,170,60,0.75) 22%,
    rgba(230,90,30,0.5)  45%,
    rgba(140,30,10,0.25) 68%,
    transparent 78%);
  mix-blend-mode: screen;
  opacity: 0;
  animation: magicFirePulse 0.7s ease-out forwards;
  z-index: 5;
}
@keyframes magicFirePulse {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.35); }
  30%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
}

/* ===== 衝撃パーティクル (敵中心から放射する emoji) ===== */
.battle-stage .enemy-impact-particle {
  position: absolute;
  pointer-events: none;
  font-size: 1.4rem;
  transform: translate(-50%, -50%);
  animation: enemyImpactOut 0.65s ease-out forwards;
  z-index: 6;
  filter: drop-shadow(0 0 4px rgba(255,255,255,0.7));
  --dx: 0px; --dy: 0px;
}
@keyframes enemyImpactOut {
  0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
  40%  { opacity: 1; transform: translate(calc(-50% + var(--dx) * 0.6), calc(-50% + var(--dy) * 0.6)) scale(1.25); }
  100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.75); }
}

/* ===== 敵撃破後の ドラクエ風ウィンドウ (キャンバス位置に重ねる) ===== */
.battle-defeated-window {
  position: fixed;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 1080;
  transition: opacity 0.35s ease;
}
.battle-defeated-window .dq-window {
  background: #020208;
  border: 3px solid #fff;
  border-radius: 8px;
  padding: clamp(16px, 4.5vw, 30px) clamp(20px, 5.5vw, 38px);
  box-shadow:
    0 0 26px rgba(255,220,100,0.45),
    inset 0 0 18px rgba(255,255,255,0.08);
  text-align: left;
  color: #fff;
  max-width: 92%;
  font-family: "Hiragino Kaku Gothic ProN", "ＭＳ Ｐゴシック", sans-serif;
  animation: dqWindowIn 0.4s cubic-bezier(0.3, 1.4, 0.6, 1);
}
.battle-defeated-window .dq-line {
  font-size: clamp(1rem, 4.2vw, 1.4rem);
  font-weight: 900;
  letter-spacing: 0.06em;
  line-height: 1.7;
  text-shadow: 0 0 6px rgba(255,220,100,0.45);
}
.battle-defeated-window .dq-line-emphasis {
  color: #FFD86A;
  font-size: clamp(1.5rem, 6.5vw, 2.1rem);
  text-shadow: 0 0 10px #FFD86A, 0 0 18px rgba(255,170,60,0.85);
  animation: dqEmphasisBlink 1s ease-in-out infinite;
  display: inline-block;
  margin-top: 4px;
}
@keyframes dqWindowIn {
  0%   { opacity: 0; transform: scale(0.82) translateY(6px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes dqEmphasisBlink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.72; }
}

/* ===== 敵の反撃: 画面シェイク ===== */
.screen-shake {
  animation: screenShake 0.55s cubic-bezier(0.36, 0, 0.66, 1);
}
@keyframes screenShake {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-4px, 2px); }
  20% { transform: translate(5px, -3px); }
  30% { transform: translate(-6px, -2px); }
  40% { transform: translate(5px, 3px); }
  50% { transform: translate(-4px, 2px); }
  60% { transform: translate(3px, -2px); }
  70% { transform: translate(-3px, 2px); }
  80% { transform: translate(2px, -1px); }
  90% { transform: translate(-1px, 1px); }
}

/* ===== プレイヤー被ダメージ表示 (画面下部 DQ ウィンドウ) ===== */
.player-damage-window {
  position: fixed;
  bottom: max(20px, env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%);
  z-index: 1090;
  pointer-events: none;
  max-width: 92vw;
  animation: playerDmgIn 0.3s ease-out;
  transition: opacity 0.3s ease;
}
.player-damage-window .dq-window {
  background: #020208;
  border: 3px solid #fff;
  border-radius: 8px;
  padding: clamp(12px, 3vw, 20px) clamp(16px, 4vw, 28px);
  box-shadow:
    0 0 20px rgba(255,80,80,0.4),
    inset 0 0 14px rgba(255,255,255,0.06);
  color: #fff;
  font-family: "Hiragino Kaku Gothic ProN", "ＭＳ Ｐゴシック", sans-serif;
  white-space: nowrap;
}
.player-damage-window .dq-line {
  font-size: clamp(0.95rem, 3.8vw, 1.25rem);
  font-weight: 900;
  letter-spacing: 0.04em;
  line-height: 1.45;
  text-shadow: 0 0 4px rgba(255,255,255,0.3);
}
.player-damage-window .dmg-num {
  color: #FF7777;
  font-size: 1.35em;
  text-shadow: 0 0 8px rgba(255,80,80,0.85);
  padding: 0 0.12em;
}
@keyframes playerDmgIn {
  0%   { opacity: 0; transform: translate(-50%, 14px); }
  100% { opacity: 1; transform: translate(-50%, 0); }
}

/* 「〇〇の こうげき！」告知 (敵の反撃直前) */
.enemy-attack-announce {
  position: fixed;
  top: 38%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1095;
  pointer-events: none;
  animation: enemyAttackAnnounceIn 0.28s ease-out;
  transition: opacity 0.32s ease;
}
.enemy-attack-announce .enemy-attack-window {
  background: #020208;
  border: 3px solid #FFD86A;
  border-radius: 10px;
  padding: clamp(10px, 3vw, 18px) clamp(18px, 5vw, 32px);
  box-shadow:
    0 0 22px rgba(255,120,80,0.45),
    inset 0 0 14px rgba(255,220,130,0.12);
  color: #fff;
  font-family: "Hiragino Kaku Gothic ProN", "ＭＳ Ｐゴシック", sans-serif;
  white-space: nowrap;
}
.enemy-attack-announce .dq-line {
  font-size: clamp(1.0rem, 4vw, 1.35rem);
  font-weight: 900;
  letter-spacing: 0.06em;
  line-height: 1.4;
}

/* ===== World Map Scene (バトル開始前の探索画面) =====
   map.png は 1536x1024 の横長フィールド。5〜6 画面分スクロールさせるため
   `.map-world` を viewport の 500% 幅に伸ばし、camera (translateX) で追尾する。
   pixelated レンダリングでピクセルアートのエッジを保つ。 */
#mapScene {
  position: fixed; inset: 0; z-index: 1400;
  background: #0a0a0a;
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
  font-family: inherit;
}
#mapScene.visible { display: flex; }
.map-viewport {
  position: relative;
  width: 100%;
  flex: 1 1 auto;
  overflow: hidden;
  background: #000;
}
.map-world {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  /* 5 画面分スクロール相当: 500% 幅に引き伸ばし */
  width: 500%;
  background-image: url('../assets/images/battle/bg/map.png');
  background-repeat: no-repeat;
  background-position: left center;
  background-size: 100% 100%;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  will-change: transform;
  transition: transform 0.28s cubic-bezier(0.3, 0.7, 0.4, 1);
}
.map-actor {
  position: absolute;
  bottom: 14%;
  width: 10%;
  max-width: 90px; min-width: 48px;
  height: auto;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  pointer-events: none;
  transform: translateX(-50%);
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.55));
}
.map-actor.map-hero {
  z-index: 3;
  animation: mapHeroBob 1.2s ease-in-out infinite;
}
.map-actor.map-monster {
  z-index: 2;
  width: 7%;
  max-width: 72px; min-width: 40px;
  animation: mapMonsterBob 1.8s ease-in-out infinite;
}
@keyframes mapHeroBob {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(-3px); }
}
@keyframes mapMonsterBob {
  0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
  50%      { transform: translateX(-50%) translateY(-2px) scale(1.04); }
}
/* 移動ボタン */
.map-controls {
  flex: 0 0 auto;
  width: 100%;
  padding: 14px 20px 22px;
  display: flex; justify-content: center; align-items: center;
  gap: 14px;
  background: linear-gradient(180deg, rgba(15,10,25,0.0) 0%, rgba(10,10,25,0.85) 40%, rgba(10,10,25,0.95) 100%);
}
.map-walk-btn {
  padding: 16px 42px;
  border: 3px solid #FFD86A;
  border-radius: 999px;
  background: linear-gradient(135deg, #F2915A, #EC4899);
  color: #fff;
  font-family: inherit; font-weight: 900; font-size: 1.2rem;
  letter-spacing: 0.12em;
  box-shadow: 0 6px 18px rgba(236,72,153,0.45), inset 0 0 10px rgba(255,216,106,0.35);
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
.map-walk-btn:active { transform: scale(0.94); }
.map-walk-btn:disabled { opacity: 0.55; cursor: default; transform: none; }
.map-hud {
  position: absolute; top: 10px; left: 10px; right: 10px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none; z-index: 5;
  font-size: 0.85rem; font-weight: 900; color: #fff;
  text-shadow: 0 0 4px #000, 0 0 8px rgba(0,0,0,0.9);
  letter-spacing: 0.08em;
}
.map-collide-flash {
  position: absolute; inset: 0; z-index: 10;
  background: radial-gradient(circle at center, rgba(255,255,255,0.95) 0%, rgba(255,216,106,0.7) 25%, rgba(0,0,0,0) 70%);
  opacity: 0; pointer-events: none;
  animation: mapCollideFlash 0.65s ease-out forwards;
}
@keyframes mapCollideFlash {
  0%   { opacity: 0; transform: scale(0.4); }
  40%  { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(1.6); }
}
@media (prefers-reduced-motion: reduce) {
  .map-actor.map-hero, .map-actor.map-monster { animation: none !important; }
  .map-world { transition: none !important; }
  .map-collide-flash { animation: none !important; }
}

// AudioContextをページロード時に即生成（suspendedだが存在はする）
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function getAudioCtx() { return audioCtx; }
function withAudio(fn) {
  const ctx = getAudioCtx();
  if (ctx.state === 'running') { fn(ctx); return; }
  ctx.resume().then(() => fn(ctx)).catch(() => {});
}
// iOS/Android: 最初のタッチでAudioContextを即座にアクティブにする
// resume()は非同期なので、無音オシレータを鳴らして強制的にrunning状態にする
function unlockAudio() {
  const ac = getAudioCtx();
  ac.resume().catch(() => {});
  if (ac.state !== 'running') {
    // 無音オシレータで即アクティブ化
    try {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      gain.gain.value = 0;
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.001);
    } catch(e) {}
  }
}
// capture: true で HanziWriter より先にイベントを受け取る

// 1 文字完成時の「シャキーン！」演出: 短いハイ→ロー bell + 画面全体を一瞬白フラッシュ。
// 差替フック: window.PONO_SHAKEEN_SFX に mp3 パスを入れれば最優先で使用。
function playShakeenFlash() {
  // SFX (外部 mp3 優先、無ければ Web Audio で合成)
  const url = (typeof window !== 'undefined' && window.PONO_SHAKEEN_SFX) || null;
  if (url) {
    try {
      const a = new Audio(url);
      a.volume = 0.7;
      a.play().catch(() => {});
    } catch (e) { /* fall through */ }
  } else {
    withAudio(ac => {
      const now = ac.currentTime;
      // 三角波のキラキラ: 2093Hz → 3000Hz → 1568Hz (C7→G7→G6) の極短アルペジオ
      const notes = [
        { f: 2093.00, t: 0.00, d: 0.09, g: 0.28 },
        { f: 3135.96, t: 0.04, d: 0.10, g: 0.30 },
        { f: 1567.98, t: 0.14, d: 0.20, g: 0.26 },
      ];
      notes.forEach(n => {
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(n.f, now + n.t);
        gain.gain.setValueAtTime(0, now + n.t);
        gain.gain.linearRampToValueAtTime(n.g, now + n.t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, now + n.t + n.d);
        osc.connect(gain); gain.connect(ac.destination);
        osc.start(now + n.t); osc.stop(now + n.t + n.d + 0.02);
      });
      // ノイズバースト (シャキーン の「シャ」成分)
      try {
        const bufSize = Math.floor(ac.sampleRate * 0.12);
        const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
        const src = ac.createBufferSource();
        src.buffer = buf;
        const bp = ac.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 5000; bp.Q.value = 2.5;
        const g = ac.createGain();
        g.gain.setValueAtTime(0.15, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        src.connect(bp); bp.connect(g); g.connect(ac.destination);
        src.start(now); src.stop(now + 0.13);
      } catch (e) { /* ignore */ }
    });
  }
  // 画面フラッシュ (短く、眩しすぎないように 180ms でフェード)
  const f = document.createElement('div');
  f.className = 'shakeen-flash';
  document.body.appendChild(f);
  setTimeout(() => { if (f.parentNode) f.remove(); }, 380);
}

// ===== Magic Projectile =====
// 「手前から奥(敵)へ飛ぶ光球 → 着弾で破裂」する魔法演出。
// mp4 を使わず純 CSS なので軽量 (1 回 ~50KB の DOM 作って捨てるだけ)。
// element: 'fire' | 'ice' | 'thunder' | 'light' | 'heal' | 'wind' | ...
// onImpact: 着弾時に呼ばれる (敵の被ダメ演出と同期したいとき用)
function launchMagicProjectile(element, opts) {
  opts = opts || {};
  const colors = MAGIC_COLORS[element] || MAGIC_COLORS.fire;
  const enemyEl = document.getElementById('battleEnemy');
  if (!enemyEl) {
    if (opts.onImpact) setTimeout(opts.onImpact, 0);
    return;
  }

  // 既存コンテナがあれば再利用、なければ作る
  let container = document.querySelector('.magic-projectile-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'magic-projectile-container';
    document.body.appendChild(container);
  }

  // 敵位置 (viewport 座標)
  const er = enemyEl.getBoundingClientRect();
  const tx = er.left + er.width / 2;
  const ty = er.top  + er.height * 0.55;

  // 起点: 画面中央下 (プレイヤー側 = 手前)
  const sx = window.innerWidth / 2;
  const sy = window.innerHeight * 0.86;

  // 弾本体
  const ball = document.createElement('div');
  ball.className = 'magic-projectile';
  ball.style.setProperty('--core', colors.core);
  ball.style.setProperty('--aura', colors.aura);
  ball.style.setProperty('--glow', colors.glow);
  // 初期: 起点に大きめ(=手前)
  ball.style.transform = 'translate(' + sx + 'px, ' + sy + 'px) translate(-50%, -50%) scale(1.15)';

  const trail = document.createElement('div');
  trail.className = 'magic-projectile-trail';
  ball.appendChild(trail);

  container.appendChild(ball);

  // 弾発射 SFX (短い whoosh)
  try { _playProjectileLaunchSound(element); } catch (e) {}

  // 2 フレーム後に目的地へ + 縮小(=奥へ)
  // transition は .animate クラスで有効化
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      ball.classList.add('animate');
      ball.style.transform =
        'translate(' + tx + 'px, ' + ty + 'px) ' +
        'translate(-50%, -50%) scale(0.28)';
    });
  });

  // 着弾
  const FLIGHT_MS = 780;
  setTimeout(() => {
    // 弾消去 + 破裂
    if (ball.parentNode) ball.remove();
    _spawnMagicBurst(tx, ty, colors, container);
    try { _playMagicBurstSound(element); } catch (e) {}
    if (opts.onImpact) {
      try { opts.onImpact(); } catch (e) {}
    }
    // 900ms 後にコンテナ掃除 (他の弾と衝突しないよう空要素なら削除)
    setTimeout(() => {
      if (container && container.parentNode && container.children.length === 0) {
        container.remove();
      }
    }, 900);
  }, FLIGHT_MS);
}

function _spawnMagicBurst(x, y, colors, container) {
  // 各 burst 要素は left/top で配置し、CSS keyframe の translate(-50%,-50%) で中心合わせ。
  // 中央フラッシュ
  const flash = document.createElement('div');
  flash.className = 'magic-burst-flash';
  flash.style.setProperty('--core', colors.core);
  flash.style.setProperty('--aura', colors.aura);
  flash.style.setProperty('--glow', colors.glow);
  flash.style.left = x + 'px';
  flash.style.top  = y + 'px';
  container.appendChild(flash);
  setTimeout(() => { if (flash.parentNode) flash.remove(); }, 700);

  // 衝撃波リング
  const ring = document.createElement('div');
  ring.className = 'magic-burst-shockring';
  ring.style.setProperty('--aura', colors.aura);
  ring.style.setProperty('--glow', colors.glow);
  ring.style.left = x + 'px';
  ring.style.top  = y + 'px';
  container.appendChild(ring);
  setTimeout(() => { if (ring.parentNode) ring.remove(); }, 650);

  // 放射パーティクル
  const N = 16;
  for (let i = 0; i < N; i++) {
    const p = document.createElement('div');
    p.className = 'magic-burst-particle';
    p.style.setProperty('--core', colors.core);
    p.style.setProperty('--aura', colors.aura);
    p.style.setProperty('--glow', colors.glow);
    const angle = (i / N) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    const dist = 90 + Math.random() * 90;
    p.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(1) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist).toFixed(1) + 'px');
    p.style.left = x + 'px';
    p.style.top  = y + 'px';
    p.style.animationDelay = (Math.random() * 0.08).toFixed(2) + 's';
    container.appendChild(p);
    setTimeout(() => { if (p.parentNode) p.remove(); }, 800);
  }
}

// 発射音: 属性で音色を変える (軽い whoosh + ピッチ上昇)
function _playProjectileLaunchSound(element) {
  if (typeof withAudio !== 'function') return;
  withAudio(ac => {
    const now = ac.currentTime;
    // ノイズベースの whoosh
    const bufLen = Math.floor(ac.sampleRate * 0.4);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      ch[i] = (Math.random() * 2 - 1) * (1 - t) * 0.5;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass';
    // 属性でピッチ帯を切替
    const startHz = element === 'ice' ? 1800 : element === 'thunder' ? 2400 : element === 'light' ? 2200 : 1400;
    bp.frequency.setValueAtTime(startHz * 0.5, now);
    bp.frequency.exponentialRampToValueAtTime(startHz * 1.6, now + 0.35);
    bp.Q.value = 6;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.25, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    src.connect(bp); bp.connect(g); g.connect(ac.destination);
    src.start(now); src.stop(now + 0.42);
  });
}
// 着弾音: 短い破裂 (低域パンチ + 高域キラキラ)
function _playMagicBurstSound(element) {
  // 差替フック: window.PONO_FIRE_MAGIC_SFX (後方互換) または属性別 mp3 があればそちらを優先。
  // 今は合成音のみ。mp3 を入れるときは new Audio(...).play() で差し替え可。
  const customUrl = (typeof window !== 'undefined' && window.PONO_FIRE_MAGIC_SFX);
  if (customUrl) {
    try {
      const a = new Audio(customUrl);
      a.volume = 0.55; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through */ }
  }
  if (typeof withAudio !== 'function') return;
  withAudio(ac => {
    const now = ac.currentTime;
    // 低域パンチ
    const o1 = ac.createOscillator(), g1 = ac.createGain();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(220, now);
    o1.frequency.exponentialRampToValueAtTime(60, now + 0.22);
    g1.gain.setValueAtTime(0.55, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
    o1.connect(g1); g1.connect(ac.destination);
    o1.start(now); o1.stop(now + 0.3);
    // 高域キラキラ (属性で音色差)
    const hz = element === 'ice' ? 2600 : element === 'fire' ? 1600 : element === 'thunder' ? 3200 : 2000;
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(hz, now + 0.02);
    o2.frequency.exponentialRampToValueAtTime(hz * 0.5, now + 0.35);
    g2.gain.setValueAtTime(0.18, now + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(now + 0.02); o2.stop(now + 0.42);
  });
}

function _getVoiceUrl(char) {
  if (currentCategory === 'hiragana') {
    const idx = CATEGORIES.hiragana.chars.indexOf(char);
    if (idx >= 0 && idx <= 44) return '../assets/voices/' + String(idx).padStart(2, '0') + '-aiueo.wav';
    if (idx === 45) return '../assets/voices/katakana/45-katakana.wav';
  }
  if (currentCategory === 'katakana') {
    const idx = CATEGORIES.katakana.chars.indexOf(char);
    if (idx >= 0 && idx <= 45) return '../assets/voices/katakana/' + String(idx).padStart(2, '0') + '-katakana.wav';
  }
  return null;
}
let _voicePlayId = 0; // キャンセル用ID
function _preloadWordAudio() {
  // 共有Audio要素にsrcをセットしてプリロード
  const char = CATEGORIES[currentCategory].chars[currentCharIndex];
  const url = _getVoiceUrl(char);
  if (url) {
    _sharedAudio.src = url;
    _sharedAudio.load();
  }
}
function speakWord(char, word) {
  if (window.speechSynthesis) speechSynthesis.cancel();
  const url = _getVoiceUrl(char);
  if (!url) { _speakFallback(char, word); return; }
  const myId = ++_voicePlayId;
  const targetTail = url.replace('../', '/');
  const curSrc = _sharedAudio.currentSrc || _sharedAudio.src || '';
  const srcMatches = curSrc.endsWith(targetTail);

  function doPlay() {
    if (_voicePlayId !== myId) return;
    try { _sharedAudio.currentTime = 0; } catch (e) {}
    const p = _sharedAudio.play();
    if (p && p.catch) p.catch(() => _speakFallback(char, word));
  }

  // 再生可能なら即再生
  if (srcMatches && _sharedAudio.readyState >= 2) {
    doPlay();
    return;
  }
  // まだ読み込み中 or src 差し替え: canplay を待ってから再生
  _sharedAudio.oncanplay = function() {
    _sharedAudio.oncanplay = null;
    _sharedAudio.oncanplaythrough = null;
    doPlay();
  };
  _sharedAudio.oncanplaythrough = _sharedAudio.oncanplay;
  if (!srcMatches) {
    _sharedAudio.src = url;
    _sharedAudio.load();
  }
}

function _speakFallback(char, word) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(`${char}！${word}！`);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  u.pitch = 1.2;
  speechSynthesis.speak(u);
}

// ===== キャンバス割れ演出 (妖精救出シーケンス) =====
function _playCanvasBreak() {
  var el = document.getElementById('monsterDeco');
  var cc = document.getElementById('canvasContainer');
  if (!el || !cc) return;
  // 前回の残り timer を全部クリア
  if (window._breakTimers && window._breakTimers.length) {
    window._breakTimers.forEach(function(t) { clearTimeout(t); });
  }
  window._breakTimers = [];
  function _bt(fn, ms) { window._breakTimers.push(setTimeout(fn, ms)); }
  // 悪役が出ていたら即消す（邪魔しない）
  _hideVillain();
  _hideMonsterBubble();
  // 既に進行中なら何もしない
  if (el.classList.contains('emerge') || el.classList.contains('leave')) return;

  // T=0: キャンバスをシェイク + overflow 解放 + 魔法陣を浮かび上がらせる
  cc.classList.add('shaking', 'breaking');
  var seal = document.getElementById('canvasSeal');
  if (seal) {
    seal.classList.remove('active', 'cracking');
    void seal.offsetWidth;
    seal.classList.add('active');
  }

  // T=120: 白フラッシュ (光の下地)
  _bt(function() {
    var flash = document.getElementById('canvasFlash');
    if (flash) {
      flash.classList.remove('active');
      void flash.offsetWidth;
      flash.classList.add('active');
    }
  }, 120);

  // T=260: 魔法陣に放射状のヒビが走る
  _bt(function() {
    var seal = document.getElementById('canvasSeal');
    if (seal) seal.classList.add('cracking');
  }, 260);

  // T=420: 中央から光バースト
  _bt(function() {
    var burst = document.getElementById('canvasBurst');
    if (burst) {
      burst.classList.remove('active');
      void burst.offsetWidth;
      burst.classList.add('active');
    }
  }, 420);

  // T=460: キラキラ粒子を放射
  _bt(function() {
    var wrap = document.getElementById('canvasSparkles');
    if (!wrap) return;
    wrap.innerHTML = '';
    var symbols = ['✨','⭐','💫','🌟','◆'];
    var count = 26;
    var baseDist = Math.min(cc.clientWidth, cc.clientHeight) * 0.55;
    for (var i = 0; i < count; i++) {
      var s = document.createElement('span');
      s.className = 'spk';
      s.textContent = symbols[i % symbols.length];
      var angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
      var dist = baseDist * (0.6 + Math.random() * 0.6);
      s.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(1) + 'px');
      s.style.setProperty('--dy', (Math.sin(angle) * dist).toFixed(1) + 'px');
      s.style.setProperty('--rot', (Math.random() * 720 - 360).toFixed(0) + 'deg');
      s.style.animationDelay = (Math.random() * 0.08).toFixed(2) + 's';
      wrap.appendChild(s);
    }
    wrap.classList.remove('active');
    void wrap.offsetWidth;
    wrap.classList.add('active');
    window._breakTimers.push(setTimeout(function() {
      wrap.classList.remove('active');
      wrap.innerHTML = '';
    }, 1600));
  }, 460);

  // バリンッ音
  try {
    var ac = (window._audioCtx = window._audioCtx || new (window.AudioContext || window.webkitAudioContext)());
    var now = ac.currentTime;
    // ノイズで割れた感
    var buf = ac.createBuffer(1, ac.sampleRate * 0.25, ac.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
    }
    var noise = ac.createBufferSource();
    noise.buffer = buf;
    var ng = ac.createGain();
    ng.gain.setValueAtTime(0.18, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    noise.connect(ng); ng.connect(ac.destination);
    noise.start(now);
    // キラン
    var osc = ac.createOscillator(), g = ac.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(880, now + 0.12);
    osc.frequency.exponentialRampToValueAtTime(1760, now + 0.32);
    g.gain.setValueAtTime(0.08, now + 0.12);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.connect(g); g.connect(ac.destination);
    osc.start(now + 0.12); osc.stop(now + 0.36);
  } catch (e) { /* audio not ready */ }

  // T=600: 妖精が封印解除されて中央に登場
  _bt(function() {
    el.classList.remove('enter');
    el.classList.add('emerge');
  }, 600);

  // T=950: 妖精の「ありがとう」吹き出し + 🌰ドロップ

    if (drop) {

      void drop.offsetWidth;
