  0%, 100% { transform: translate(-50%, -50%) scale(1) translateY(0); }
  50%      { transform: translate(-50%, -50%) scale(1) translateY(-4px); }
}
/* 妖精の名前ラベル (2026-04-22 v4 新設) — 下部に控えめに表示 */
.fairy-rescue-name {
  position: absolute;
  left: 50%; top: 78%;
  transform: translateX(-50%);
  color: #fff;
  font-size: clamp(1.05rem, 3.2vmin, 1.5rem);
  font-weight: 900;
  letter-spacing: 0.08em;
  text-shadow: 0 2px 6px rgba(0,0,0,0.85),
               0 0 14px var(--fairy-glow, rgba(255,255,255,0.6));
  padding: 6px 18px;
  border-radius: 18px;
  background: rgba(0,0,0,0.32);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  opacity: 0;
  white-space: nowrap;
  pointer-events: none;
  animation: fairyNameFade 0.6s ease 1.2s forwards;
}
@keyframes fairyNameFade {
  0%   { opacity: 0; transform: translateX(-50%) translateY(6px); }
  100% { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.fairy-rescue-sprite.leaving {
  animation: fairyFly 0.85s ease-in forwards;
}
@keyframes fairyFly {
  0%   { transform: translate(-50%, -50%) scale(1) rotate(0); opacity: 1; }
  100% { transform: translate(calc(-50% + 60vw), calc(-50% - 40vh)) scale(0.3) rotate(180deg); opacity: 0; }
}
/* 妖精の吹き出し */
.fairy-rescue-bubble {
  position: absolute;
  left: 50%; top: 78%;
  transform: translateX(-50%);
  background: linear-gradient(180deg, #FFFBEA, #FFE8B0);
  color: #4A2F0A;
  font-size: clamp(0.95rem, 2.8vmin, 1.3rem);
  font-weight: 900;
  padding: 10px 22px;
  border-radius: 22px;
  border: 3px solid var(--fairy-color, #FFD84D);
  box-shadow: 0 6px 18px rgba(0,0,0,0.65), 0 0 20px var(--fairy-glow, rgba(255,216,77,0.5));
  opacity: 0;
  animation: fairyBubblePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1.7s forwards;
  white-space: nowrap;
  z-index: 3;
}
.fairy-rescue-bubble::after {
  content: '';
  position: absolute;
  top: -12px; left: 50%;
  transform: translateX(-50%);
  border: 8px solid transparent;
  border-bottom-color: var(--fairy-color, #FFD84D);
}
@keyframes fairyBubblePop {
  0%   { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(0.7); }
  100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}
.fairy-rescue-tap-hint {
  position: absolute;
  bottom: 6%; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.65);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  animation: fairyHintPulse 1.8s ease-in-out 2.8s infinite;
  pointer-events: none;
}
@keyframes fairyHintPulse {
  0%, 100% { opacity: 0.4; } 50% { opacity: 0.85; }
}
/* 短縮版 (既に救出済の2周目再会) */
#fairyRescueOverlay.brief .fairy-rescue-seal,
#fairyRescueOverlay.brief .fairy-rescue-bubble,
#fairyRescueOverlay.brief .fairy-rescue-tap-hint { display: none; }
#fairyRescueOverlay.brief .fairy-rescue-sprite {
  animation: fairyAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0s forwards,
             fairyFloat 2.6s ease-in-out 0.5s infinite;
}
/* 次の妖精への匂わせ吹き出し。主吹き出しの後に下側から現れる */
.fairy-rescue-hint-bubble {
  top: auto; bottom: 4%;
  left: 50%;
  max-width: 86vw;
  white-space: normal;
  line-height: 1.45;
  text-align: center;
  font-size: clamp(0.85rem, 2.4vmin, 1.1rem);
  opacity: 0;
  animation: fairyBubblePop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 3.0s forwards;
  background: linear-gradient(180deg, #F4EBFF, #E4D3FF);
  border-color: rgba(180,140,240,0.9);
  color: #3A1E5C;
}
.fairy-rescue-hint-bubble::after { display: none; }

/* ===== 扉開く動画オーバーレイ ===== */
#shrineDoorVideoOverlay {
  position: fixed; inset: 0; z-index: 1680;
  display: flex; align-items: center; justify-content: center;
  background: #000;
  animation: fairyRescueFadeIn 0.3s ease forwards;
  cursor: pointer;
  overflow: hidden;
}
#shrineDoorVideoOverlay.closing {
  animation: fairyRescueFadeOut 0.35s ease forwards;
}
.shrine-door-video {
  width: 100%; height: 100%;
  object-fit: contain;
  background: #000;
}
.shrine-door-tap-hint {
  position: absolute;
  bottom: 5%; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.7);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-shadow: 0 2px 6px rgba(0,0,0,0.9);
  animation: fairyHintPulse 1.8s ease-in-out 1.5s infinite;
  pointer-events: none;
}

/* ===== 牢屋シーン (妖精救出) ===== */
#fairyCageOverlay {
  position: fixed; inset: 0; z-index: 1690;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, rgba(40,30,55,0.8) 0%, rgba(5,5,12,0.96) 80%);
  animation: fairyRescueFadeIn 0.4s ease forwards;
  cursor: pointer;
  overflow: hidden;
}
#fairyCageOverlay.closing {
  animation: fairyRescueFadeOut 0.4s ease forwards;
}
.fairy-cage-scene {
  position: relative;
  width: min(92vw, 480px);
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
}
.fairy-cage {
  position: relative;
  width: 68%; height: 68%;
  background: linear-gradient(180deg, #2a2036 0%, #14101c 100%);
  border: 4px solid #3a2a20;
  border-radius: 10px;
  box-shadow: inset 0 0 40px rgba(0,0,0,0.85), 0 8px 30px rgba(0,0,0,0.7);
  overflow: hidden;
}
.fairy-cage-bar {
  position: absolute;
  top: 0; bottom: 0;
  width: 8px;
  background: linear-gradient(90deg, #5a4838, #2a1f16, #5a4838);
  border-radius: 4px;
  box-shadow: 0 0 8px rgba(0,0,0,0.7);
  transform-origin: top center;
  transition: transform 0.4s ease, opacity 0.4s ease;
}
.fairy-cage-sprite {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  font-size: clamp(56px, 14vmin, 120px);
  filter: drop-shadow(0 0 14px var(--fairy-glow, #c8a8ff)) brightness(0.85);
  animation: fairyCagedShiver 1.6s ease-in-out infinite;
}
@keyframes fairyCagedShiver {
  0%, 100% { transform: translate(-50%, -50%) rotate(-2deg); }
  50%      { transform: translate(-50%, -52%) rotate(2deg); }
}
.fairy-cage-caption {
  position: absolute;
  top: 6%; left: 50%;
  transform: translateX(-50%);
  color: #FFD84D;
  font-size: clamp(1rem, 3vmin, 1.4rem);
  font-weight: 900;
  text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 14px rgba(255,216,77,0.4);
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.fairy-cage-tap-hint {
  position: absolute;
  bottom: 6%; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.75);
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-shadow: 0 2px 6px rgba(0,0,0,0.85);
  animation: fairyHintPulse 1.5s ease-in-out 0.6s infinite;
  pointer-events: none;
}
/* 解放演出: 鉄格子が傾いて外れ、妖精が脱出 */
#fairyCageOverlay.releasing .fairy-cage-bar {
  transform: rotate(26deg) translateY(12%);
  opacity: 0;
}
#fairyCageOverlay.releasing .fairy-cage-bar:nth-child(2) { transform: rotate(-22deg) translateY(16%); }
#fairyCageOverlay.releasing .fairy-cage-bar:nth-child(4) { transform: rotate(-18deg) translateY(14%); }
#fairyCageOverlay.releasing .fairy-cage-sprite {
  animation: fairyCageEscape 1.0s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  filter: drop-shadow(0 0 22px var(--fairy-glow, #c8a8ff)) brightness(1.3);
}
@keyframes fairyCageEscape {
  0%   { transform: translate(-50%, -50%) scale(1); }
  40%  { transform: translate(-50%, -70%) scale(1.25) rotate(8deg); }
  100% { transform: translate(-50%, -150%) scale(0.6) rotate(-12deg); opacity: 0; }
}
#fairyCageOverlay.releasing .fairy-cage-tap-hint { opacity: 0; }

/* ===== 妖精バッジ列 (行選択画面下部) ===== */
.rs-fairy-row {
  display: flex; align-items: center; justify-content: center; gap: 14px;
  margin-top: 18px;
  padding: 10px 16px;
  background: rgba(30,20,50,0.55);
  border: 2px solid rgba(200,170,240,0.25);
  border-radius: 18px;
  box-shadow: inset 0 0 12px rgba(120,80,180,0.2);
}
.rs-fairy-row-label {
  font-size: 0.75rem; font-weight: 900;
  color: #c8a8ff;
  letter-spacing: 0.12em;
  margin-right: 4px;
}
.rs-fairy-slot {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: rgba(10,5,20,0.7);
  border: 2px solid #3a2a4a;
  font-size: 26px;
  position: relative;
  transition: all 0.25s;
}
.rs-fairy-slot.freed {
  background: radial-gradient(circle, var(--fairy-glow, rgba(255,216,77,0.35)) 0%, rgba(10,5,20,0.8) 75%);
  border-color: var(--fairy-color, #FFD84D);
  box-shadow: 0 0 12px var(--fairy-glow, rgba(255,216,77,0.5));
  animation: fairySlotGlow 2.4s ease-in-out infinite;
}
.rs-fairy-slot.locked { color: transparent; filter: grayscale(1); opacity: 0.6; }
.rs-fairy-slot.locked::after {
  content: '?';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #6a5a8a;
  font-size: 24px; font-weight: 900;
}
@keyframes fairySlotGlow {
  0%, 100% { filter: brightness(1); }
  50%      { filter: brightness(1.25); }
}
#finalGateEntry {
  margin-top: 14px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #3a1050, #5a20a0);
  color: #FFD84D;
  font-size: 1rem; font-weight: 900;
  letter-spacing: 0.08em;
  border: 3px solid #FFD84D;
  border-radius: 22px;
  box-shadow: 0 0 18px rgba(255,216,77,0.6), inset 0 0 12px rgba(255,240,180,0.2);
  cursor: pointer;
  animation: finalGatePulse 2s ease-in-out infinite;
}
@keyframes finalGatePulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 18px rgba(255,216,77,0.6), inset 0 0 12px rgba(255,240,180,0.2); }
  50%      { transform: scale(1.04); box-shadow: 0 0 28px rgba(255,216,77,0.9), inset 0 0 16px rgba(255,240,180,0.3); }
}
@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-8px); }
  40%, 80% { transform: translateX(8px); }
}
/* ら行: ようがんのとびいし (lava_step)。文字をなぞる=呪文発動で stone_N が下から浮上。
   背景は lava_steps_0 (空の溶岩) 固定。浮上した石は消さず最終位置に残り続ける = シームレス。
   (2026-04-22: 以前は bg を step-N で差し替え + stone をフェード消去していたが、
    途中で画面が黒く抜ける・位置がワープする指摘があったため、bg swap を廃止し
    「完成絵の石位置」を目印に stone_N を個別配置 → そのまま定着させる方式に変更) */
.puzzle-bg-lava_step {
  background-image: url('../assets/images/puzzle/lava/lava_steps_0.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  image-rendering: pixelated;
}

/* 飛び石が画面下から浮上して定着。lava_steps_5.png の baked-in 石位置に合わせる。
   (2026-04-22 v2: top:50% は旧「黒バック bg swap」時代の残骸で完成絵と位置が不一致だった。
   完成絵を実測 → 石は縦中央より上 (約 33%) に横一列に並ぶ。また .landed で opacity が 0 に戻る
   事故があったため、.landed に明示的に opacity:1 と最終 transform を設定して消失を防ぐ。) */
.lava-rising-stone {
  position: absolute;
  top: 40%; /* 2026-04-22 v4: 38% は「もうちょっとだけ下」指摘 → 40% */
  width: clamp(40px, 8.5vw, 72px); /* 2026-04-22 v4: 石同士がくっついてた指摘 → 狭くして隙間を作る */
  aspect-ratio: 1;
  background-size: contain;
  background-position: center center;
  background-repeat: no-repeat;
  image-rendering: pixelated;
  opacity: 0;
  z-index: 3;
  pointer-events: none;
  filter: drop-shadow(0 6px 8px rgba(0,0,0,0.75));
  transform: translate(-50%, -50%); /* top を中心基準にする */
}
.lava-rising-stone.stone-1 { background-image: url('../assets/images/puzzle/lava/stone_1.png'); }
.lava-rising-stone.stone-2 { background-image: url('../assets/images/puzzle/lava/stone_2.png'); }
.lava-rising-stone.stone-3 { background-image: url('../assets/images/puzzle/lava/stone_3.png'); }
.lava-rising-stone.stone-4 { background-image: url('../assets/images/puzzle/lava/stone_4.png'); }
.lava-rising-stone.stone-5 { background-image: url('../assets/images/puzzle/lava/stone_5.png'); }
/* 浮上アニメ: 2.4s でじっくり画面下から最終位置へ (以前の 1.35s は速すぎた指摘あり) */
.lava-rising-stone.rising {
  animation: lavaStoneRise 2.4s cubic-bezier(0.22, 0.8, 0.35, 1) forwards;
}
/* 到着後: rising 解除直後に opacity:0/transform 初期値に戻る事故を防ぐため明示固定 */
.lava-rising-stone.landed {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1) rotate(0);
  animation: lavaStoneLandedFlash 0.55s ease-out;
}
@keyframes lavaStoneRise {
  0%   { transform: translate(-50%, 300%) scale(0.7) rotate(-12deg); opacity: 0; }
  15%  { opacity: 0.55; }
  40%  { opacity: 1; }
  70%  { transform: translate(-50%, -70%) scale(1.08) rotate(4deg); opacity: 1; }
  88%  { transform: translate(-50%, -40%) scale(0.98) rotate(-2deg); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1) rotate(0); opacity: 1; }
}
@keyframes lavaStoneLandedFlash {
  0%   { filter: drop-shadow(0 6px 8px rgba(0,0,0,0.75)) brightness(1); }
  40%  { filter: drop-shadow(0 0 22px rgba(255,230,140,1)) drop-shadow(0 0 10px rgba(255,180,60,0.9)) brightness(1.55); }
  100% { filter: drop-shadow(0 6px 8px rgba(0,0,0,0.75)) brightness(1); }
}

/* lava_step の puzzle-planks は何も置かないので非表示 (背景画像に任せる) */
.puzzle-bg-lava_step .puzzle-planks {
  display: none;
}

/* 勇者が左の崖から右の崖へ飛び石を渡るアニメ (5石完成後) */
.lava-walker {
  position: absolute;
  top: 28%; /* 2026-04-22 v4: 石(40%)の「上」に乗る位置。石の横を走ってた指摘 → 1キャラ分上へ */
  left: 6%;
  width: clamp(48px, 11vw, 78px);
  height: clamp(48px, 11vw, 78px);
  transform: translate(-50%, -50%);
  z-index: 5;
  pointer-events: none;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.7)) drop-shadow(0 0 10px rgba(255,200,100,0.5));
  opacity: 0;
}
.lava-walker.hero-sprite.move {
  animation:
    lavaWalkAcross 4.6s linear forwards,
    heroMoveAnim 0.4s steps(5, jump-none) infinite;
}
/* 左崖 → 石1 → 石2 → 石3 → 石4 → 石5 → 右崖 を跳ねながら駆け抜ける。
   石の X 位置は 26/38/50/62/74% (2026-04-22 v5: spacing 12% に微調整)。
   各セグメントで放物線を描くため apex で Y を -88% に持ち上げる。 */
@keyframes lavaWalkAcross {
  0%   { left: 6%;  opacity: 0; transform: translate(-50%, -50%) scale(1); }
  5%   { opacity: 1; }
  /* 石1 へ */
   8%  { left: 16%; transform: translate(-50%, -88%) scale(1.04); }
  14%  { left: 26%; transform: translate(-50%, -50%) scale(1); }
  /* 石2 へ */
  19%  { left: 32%; transform: translate(-50%, -88%) scale(1.04); }
  25%  { left: 38%; transform: translate(-50%, -50%) scale(1); }
  /* 石3 へ */
  30%  { left: 44%; transform: translate(-50%, -88%) scale(1.04); }
  36%  { left: 50%; transform: translate(-50%, -50%) scale(1); }
  /* 石4 へ */
  41%  { left: 56%; transform: translate(-50%, -88%) scale(1.04); }
  47%  { left: 62%; transform: translate(-50%, -50%) scale(1); }
  /* 石5 へ */
  52%  { left: 68%; transform: translate(-50%, -88%) scale(1.04); }
  58%  { left: 74%; transform: translate(-50%, -50%) scale(1); }
  /* 右崖へ最後のひと跳び */
  65%  { left: 84%; transform: translate(-50%, -90%) scale(1.05); }
  75%  { left: 93%; transform: translate(-50%, -50%) scale(1); }
  95%  { left: 94%; opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { left: 96%; opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
}

.lava-burst {
  position: absolute; top: 50%; left: 50%;
  width: 55%; aspect-ratio: 1;
  transform: translate(-50%, -50%) scale(0);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,200,80,0.95) 0%, rgba(255,120,40,0.5) 40%, rgba(200,40,10,0) 80%);
  pointer-events: none;
  animation: pedestalBurst 1.6s ease-out forwards;
  z-index: 4;
}
@keyframes plankGlow {
  0%   { box-shadow: 0 4px 10px rgba(0,0,0,0.4), 0 0 0 rgba(255,236,99,0); }
  50%  { box-shadow: 0 4px 10px rgba(0,0,0,0.4), 0 0 26px rgba(255,236,99,0.95); }
  100% { box-shadow: 0 4px 10px rgba(0,0,0,0.4), 0 0 0 rgba(255,236,99,0); }
}
.puzzle-hint {
  /* 2026-04-22 v4: 画像ウィンドウ内に文字を入れない方針でグローバル非表示。 */
  display: none;
  position: absolute; bottom: 8px; left: 0; right: 0;
  text-align: center; color: #FFF8DC; opacity: 0.92;
  font-size: clamp(11px, 2.6vw, 15px); font-weight: 700;
  text-shadow: 0 1px 3px rgba(0,0,0,0.7);
  z-index: 3;
}
.battle-stage .battle-bg {
  position: absolute; inset: 0;
  /* デフォルトは森のピクセルアート背景 (あ/か/さ 行)。
     ステージに応じて .stage-cave / .stage-volcano / .stage-castle が付くと
     背景画像が差し替わる (下の修飾ルール参照)。 */
  background-image: url('../assets/images/battle/bg/forest_bg_02.png');
  background-position: center bottom;
  background-size: cover;
  background-repeat: no-repeat;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  pointer-events: none;
  z-index: 0;
}
.battle-stage.stage-cave    .battle-bg { background-image: url('../assets/images/battle/bg/cave_bg_01.png'); }
.battle-stage.stage-volcano .battle-bg { background-image: url('../assets/images/battle/bg/volcano_bg_01.png'); }
.battle-stage.stage-castle  .battle-bg { background-image: url('../assets/images/battle/bg/castle_bg_01.png'); }
/* 背景の上に薄暗いビネットを乗せて敵の視認性を上げる */
.battle-stage .battle-bg::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at center 80%, transparent 40%, rgba(0,0,0,0.25) 95%),
    linear-gradient(180deg, rgba(0,0,0,0.15) 0%, transparent 35%);
  pointer-events: none;
}
/* ===== 勇者 HP/MP ゲージ (バトルステージ左上) ===== */
.hero-status {
  position: absolute;
  top: 8px;
  left: 8px;
  z-index: 4;
  background: rgba(2, 2, 8, 0.82);
  /* 2026-04-22: 全ボックスで border-width/radius を 2.5px / 14px に統一。 */
  border: 2.5px solid var(--window-border);
  border-radius: 14px;
  padding: 5px 8px;
  font-family: "Hiragino Kaku Gothic ProN", "ＭＳ Ｐゴシック", sans-serif;
  color: #fff;
  font-size: clamp(0.62rem, 2.2vw, 0.78rem);
  font-weight: 900;
  letter-spacing: 0.04em;
  display: flex; flex-direction: column;
  gap: 3px;
  min-width: clamp(115px, 32vw, 158px);
  box-shadow: 0 2px 6px rgba(0,0,0,0.55);
  pointer-events: none;
}
.hero-status-row {
  display: flex; align-items: center; gap: 4px;
}
.hero-status-label {
  font-size: 0.88em;
  min-width: 1.6em;
  text-align: left;
}
.hero-status-label:first-child { color: #8fff9f; }     /* HP = 緑 */
.hero-status-row:nth-child(2) .hero-status-label { color: #7ec8ff; }  /* MP = 青 */
.hero-status-bar-wrap {
  flex: 1;
  height: 8px;
  background: #1a1a28;
  border: 1px solid #555;
  border-radius: 2px;
  overflow: hidden;
}
.hero-status-bar {
  height: 100%;
  transition: width 0.35s ease;
}
.hero-status-bar.hp {
  background: linear-gradient(180deg, #7af285 0%, #2db74a 100%);
  box-shadow: inset 0 0 4px rgba(255,255,255,0.2);
}
.hero-status-bar.mp {
  background: linear-gradient(180deg, #86b6ff 0%, #2d6cc0 100%);
  box-shadow: inset 0 0 4px rgba(255,255,255,0.2);
}
.hero-status-num {
  font-size: 0.82em;
  min-width: 3em;
  text-align: right;
  color: #fff;
  text-shadow: 0 0 4px rgba(0,0,0,1);
}
/* ===== 三種の神器 そうび表示 ===== */
.hero-equip-row {
  margin-top: 2px;
  gap: 5px;
}
.hero-equip-row .equip-label {
  color: #ffd84d;
  font-size: 0.82em;
  min-width: 2.8em;
}
.hero-equip-strip {
  display: flex;
  gap: 3px;
  align-items: center;
  flex: 1;
}
.hero-equip-icon {
  width: clamp(16px, 4.4vw, 22px);
  height: clamp(16px, 4.4vw, 22px);
  object-fit: contain;
  image-rendering: pixelated;
  filter: drop-shadow(0 0 2px rgba(255, 240, 180, 0.85));
}
/* HP/MP を取られた瞬間の一瞬点滅 */
.hero-status.flash-hp .hero-status-bar.hp {
  animation: heroHpFlash 0.32s ease-out;
}
.hero-status.flash-mp .hero-status-bar.mp {
  animation: heroMpFlash 0.32s ease-out;
}
@keyframes heroHpFlash {
  0%   { filter: brightness(2.2) saturate(0.3); }
  100% { filter: brightness(1) saturate(1); }
}
@keyframes heroMpFlash {
  0%   { filter: brightness(1.9) saturate(0.3); }
  100% { filter: brightness(1) saturate(1); }
}
@media (prefers-reduced-motion: reduce) {
  .hero-status-bar { transition: none; }
  .hero-status.flash-hp .hero-status-bar.hp,
  .hero-status.flash-mp .hero-status-bar.mp { animation: none; }
}
/* バトル中でないときは非表示 (stage 自体が display:none なので保険) */
.battle-stage[aria-hidden="true"] .hero-status { display: none; }

.battle-stage .battle-enemy-wrap {
  position: absolute;
  right: 4%; left: auto; top: 58%;  /* 敵は右側に配置 (中央は勇者と重なりすぎるため) */
  transform: translateY(-50%);
  width: 42%;
  display: flex; justify-content: center; align-items: flex-end;
  pointer-events: none;
  z-index: 2;
}

/* ===== 勇者スプライト (SPUM idle 2048x2048, 8 frames 横 1 列) ===== */
/* bg-size 800% 800% で 1 タイル (256x256) をコンテナに一致させ、
   bg-position-x を 0% → 100% まで steps(8, jump-none) で 8 コマ等分割。 */
.hero-sprite {
  display: block;
  background-repeat: no-repeat;
  background-size: 800% 800%;
  background-position: 0% 0%;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  /* 2026-04-22: iPad (iOS Safari) で背景アニメが停止する対策。
     background-position-x 単独アニメは iOS で合成レイヤが作られず、特に
     transform: scaleX(-1) を持つ親配下で再描画がスキップされることがある。
     will-change で合成レイヤを強制 + translateZ(0) で GPU レイヤに逃がす。 */
  will-change: background-position;
  transform: translateZ(0);
}
.hero-sprite.idle {
  background-image: url('../assets/images/hero/spum/idle.png');
  animation: heroIdleAnim 1.1s steps(8, jump-none) infinite;
}
/* move: 5 frames 横。background-position-x は 0 → (4/7)*100% = 57.14%。 */
.hero-sprite.move {
  background-image: url('../assets/images/hero/spum/move.png');
  animation: heroMoveAnim 0.6s steps(5, jump-none) infinite;
}
/* attack_magic: 6 frames 横。one-shot で 0 → (5/7)*100% = 71.43%、forwards で最終フレーム保持。 */
.hero-sprite.attack-magic {
  background-image: url('../assets/images/hero/spum/attack_magic.png');
  animation: heroAttackMagicAnim 0.9s steps(6, jump-none) 1 forwards;
}
.hero-sprite.attack-normal {
  background-image: url('../assets/images/hero/spum/attack_normal.png');
  animation: heroAttackMagicAnim 0.55s steps(6, jump-none) 1 forwards;
}
.hero-sprite.concentrate {
  background-image: url('../assets/images/hero/spum/concentrate.png');
  animation: heroAttackMagicAnim 1.2s steps(6, jump-none) 1 forwards;
}
/* 被弾時の .damaged は「スプライト差し替え」ではなく「一時的な黒シルエット化」で表現する。
   (damaged.png は 5 コマしか無いので steps(6) でズレて透明になる → 消えて見える事故があった)
   idle のアニメはそのまま回しつつ、filter で真っ黒 + 赤いグロウを被せる。 */
.battle-stage .battle-hero.silhouette-flash {
  animation: battleHeroSilhouetteFlash 0.45s ease-out 1 forwards;
}
@keyframes battleHeroSilhouetteFlash {
  0%   { filter: brightness(1) drop-shadow(0 3px 5px rgba(0,0,0,0.55)); }
  15%  { filter: brightness(0) drop-shadow(0 0 10px #ff3b3b) drop-shadow(0 0 18px #ff6b6b); transform: scaleX(-1) translate(-4px, -50%); }
  35%  { filter: brightness(0) drop-shadow(0 0 12px #ff5252) drop-shadow(0 0 20px #ff8080); transform: scaleX(-1) translate(5px, -50%); }
  55%  { filter: brightness(0) drop-shadow(0 0 10px #ff3b3b) drop-shadow(0 0 18px #ff6b6b); transform: scaleX(-1) translate(-3px, -50%); }
  75%  { filter: brightness(0.2) drop-shadow(0 0 6px rgba(255,60,60,0.6)); transform: scaleX(-1) translate(2px, -50%); }
  100% { filter: brightness(1) drop-shadow(0 3px 5px rgba(0,0,0,0.55)); transform: scaleX(-1) translate(0, -50%); }
}
/* 2026-04-22: iOS Safari 対策で background-position (x, y 両指定) の省略形に書き換え。
   background-position-x 単独だと iPad で再描画が止まる事例あり。 */
@keyframes heroIdleAnim {
  from { background-position: 0% 0%; }
  to   { background-position: 100% 0%; }
}
@keyframes heroMoveAnim {
  from { background-position: 0% 0%; }
  to   { background-position: 57.14% 0%; }
}
@keyframes heroAttackMagicAnim {
  from { background-position: 0% 0%; }
  to   { background-position: 71.43% 0%; }
}
/* 戦闘ステージ左下に勇者を配置 (敵は中央、勇者は左手前)。
   scaleX(-1) で右を向かせる (元素材は左向き)。translateY(-50%) と併用。 */
.battle-stage .battle-hero {
  position: absolute;
  left: 8%;
  top: 54%;
  width: min(24vh, 128px);
  height: min(24vh, 128px);
  /* 2026-04-23: iPad で 2D transform の親があると子 (hero-sprite) の
     background-position アニメが止まる事例があるため、translateZ(0) を挟んで
     確実に GPU 合成レイヤに落とす。 */
  transform: scaleX(-1) translateY(-50%) translateZ(0);
  transform-origin: center;
  z-index: 2;
  pointer-events: none;
  filter: drop-shadow(0 3px 5px rgba(0,0,0,0.55));
  will-change: transform;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}
@media (prefers-reduced-motion: reduce) {
  .hero-sprite.idle,
  .hero-sprite.move,
  .hero-sprite.attack-magic,
  .hero-sprite.attack-normal,
  .hero-sprite.concentrate { animation: none; background-position-x: 0%; }
  .battle-stage .battle-hero.silhouette-flash { animation: none; filter: brightness(0.4); }
}
.battle-enemy {
  /* 2026-04-20 ユーザー要望: 敵が大きすぎる → 半分に (120px → 60px) */
  position: relative;
  width: min(11vh, 60px); height: min(11vh, 60px);
  max-width: 60px; max-height: 60px;
  display: flex; justify-content: center; align-items: flex-end;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.6));
  animation: battleEnemyFloat 2.4s ease-in-out infinite;
  transform-origin: center bottom;
  /* 2026-04-23: iPad (iOS Safari) で transform 系アニメが止まる対策。
     will-change + backface-visibility で合成レイヤを強制。 */
  will-change: transform;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}
/* 地に足がついたタイプの敵 (ゴーレム等): 浮遊アニメ+影を切り、2倍サイズにする。
   (飛行しない岩系ボスをふわふわさせない・接地感を出す) */
.battle-enemy.grounded {
  animation: none !important;
  filter: drop-shadow(0 10px 6px rgba(0,0,0,0.45));
  width: min(22vh, 120px); height: min(22vh, 120px);
  max-width: 120px; max-height: 120px;
}
/* compact: 雑魚クラスの grounded 敵 (キノコ等) はゴーレム級の 120px だと大きすぎるので
   勇者 (128px) よりやや小さめに落とす。接地感・反転は grounded 側で継承。
   ユーザー指定 2026-04-21: 「キノコは勇者と同じぐらいで OK」 */
.battle-enemy.grounded.compact {
  width: min(15vh, 86px); height: min(15vh, 86px);
  max-width: 86px; max-height: 86px;
}
/* こおりのまどうし: 非 grounded (浮遊ボス) で既定 60px は小さすぎるので 1.8倍に拡大。
   (2026-04-22 ユーザー指示「氷の魔導士が小さすぎる」) */
.battle-enemy[data-enemy-id="ice_wizard"] {
  width: min(19.8vh, 108px); height: min(19.8vh, 108px);
  max-width: 108px; max-height: 108px;
}
/* かざんのぬし (カゲロウ): 火山の主にふさわしい大きさへ。
   2026-04-25: ユーザー指示「主人公よりちっちゃいじゃん」「火山の主なのに」
   既存ボス (ゴーレム 120px) より一回り大きくして威圧感を出す。
   2026-04-25 b: 全スプライトが紫の炎マネ+尻尾を持つので body bbox は画像の 70〜80% しか
   占めない。container を 220px に広げた上で、enemy-img 側に scale(1.38) を掛けて
   「本体部分だけ」が他キャラと同等以上に見えるようにする。 */
.battle-enemy[data-enemy-id="volcano_lord"] {
  width: min(38vh, 220px); height: min(38vh, 220px);
  max-width: 220px; max-height: 220px;
}
/* 大型ボス (volcano_lord) は HP ゲージと干渉しないよう wrap を上に持ち上げる。
   2026-04-25: ユーザー指示「ちょっと下すぎてゲージに被ってる」→ 38% → 28% へ。
   v277e: 「上に行きすぎて頭切れる」→ 勇者 (top:54%) と同じ高さに揃え、足元アライン。
   scale(1.38) + transform-origin: 30% 70% で実体高 ≈ 220×1.38=303px。
   wrap の中心 54% で flex-end + translateY(-50%) なので、scale された body は wrap 中心
   付近に留まる。50% 前後が頭切れ無し + ゲージ干渉なし のスイートスポット。 */
.battle-stage.has-grounded .battle-enemy-wrap.volcano-lord-wrap {
  top: 50%;
}
/* v277e: ユーザー指示「ドロップシャドウみたいなのなくして」
   .battle-enemy.grounded がボス全般に強い drop-shadow を当てているが、
   カゲロウは画像自体に光彩・モヤがあるため二重光って見えてうるさい。
   volcano_lord に限り drop-shadow を解除。 */
.battle-enemy.grounded[data-enemy-id="volcano_lord"] {
  filter: none;
}
/* カゲロウのスプライトは 12 枚中 11 枚が「左向き (head が画像左)」で描かれているため、
   .grounded の auto-flip (scaleX(-1)) を打ち消す。kagerou_idle.png (炎ブレス発射) のみ
   逆向きで描かれているので、JS 側で .kagerou-firebreath クラスを付けてその時だけ flip。
   2026-04-25 b: 炎のマネ+尻尾が container を食うので scale(1.38) を追加 (body 補正)。
   ほとんどのスプライトは body が左寄り (head が画像左) なので transform-origin を
   30% 70% (左寄り+足元寄り) に置き、head と足元の切れを最小化する。 */
.battle-enemy.grounded[data-enemy-id="volcano_lord"] .enemy-img {
  transform: scale(1.38);
  transform-origin: 30% 70%;
}
/* 炎ブレスは画像が 1113x359 で body は左 31% に集中、残りはずっと右に伸びる炎。
   そのまま object-fit:contain させると body が container の 31% (~60px) になってしまうので、
   2.6倍スケールして body だけが他のスプライトと同等サイズに見えるようにする。
   transform-origin: 100% 50% で右端を anchor → body が container 右側に残り、炎は左へ
   ハミ出す (CSS scaleX(-1) と組み合わせて 結果として 体が右、炎が左へ向かって伸びる)。
   (body 補正 scale(1.38) は !important で上書き — 炎ブレスだけは専用スケールを優先) */
.battle-enemy[data-enemy-id="volcano_lord"].kagerou-firebreath .enemy-img {
  transform: scaleX(-1) scale(2.6) !important;
  transform-origin: 100% 50% !important;
}
.battle-enemy.grounded .enemy-shadow {
  /* 地面に足が付いているタイプ (岩系ボス等) は不自然な浮遊シャドウを隠す。
     画像自体の drop-shadow だけで接地感を表現する。 */
  display: none !important;
}
/* ゴーレム等は元画像が左向き (勇者と同じ方向を向いてしまう) なので水平反転して
   勇者と対峙させる。ヒーロー側は既に scaleX(-1) で右向きにしてあるため、敵も
   同じ手法で左向きに反転 → 画面左の勇者を正面に見据える構図になる。
   grounded と flipped はどちらも同じ反転を掛けたいので selector をまとめる。
   (非接地ザコで flipped:true を指定した場合もここでケアされる) */
.battle-enemy.grounded .enemy-img,
.battle-enemy.flipped  .enemy-img {
  transform: scaleX(-1);
}
/* 地に足付きタイプのラップを勇者と同じ高さ (top:54%) に持ち上げる。
   JS 側で battleStage に has-grounded クラスを付ける方式で :has() 非対応環境も保証。 */
.battle-stage.has-grounded .battle-enemy-wrap {
  top: 54%;
}
.battle-enemy .enemy-img {
  width: 100%; height: 100%;
  object-fit: contain;
  image-rendering: -webkit-optimize-contrast;
}
.battle-enemy .enemy-shadow {
  position: absolute;
  bottom: -6px; left: 10%;
  width: 80%; height: 10px;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 70%);
  animation: battleEnemyShadow 2.4s ease-in-out infinite;
}
@keyframes battleEnemyFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-6px) scale(1.02); }
}
@keyframes battleEnemyShadow {
  0%, 100% { transform: scaleX(1);   opacity: 0.75; }
  50%      { transform: scaleX(0.85); opacity: 0.55; }
}
/* ダメージ: 強めの左右ブルブル + 白フラッシュ
   (2026-04-20 ユーザー要望で振動を強化。float アニメを連鎖していたのを廃止し、
    JS 側で 0.55s 後に .damaged を剥がして base の float へ戻す方式に変更。
    !important で base の animation シャットアウト → 確実にシェイクが走る) */
.battle-enemy.damaged {
  animation: battleEnemyHit 0.55s cubic-bezier(.36,.07,.19,.97) !important;
}
.battle-enemy.damaged .enemy-img {
  animation: battleEnemyFlash 0.55s ease-out;
}
@keyframes battleEnemyHit {
  0%, 100% { transform: translateX(0); }
  8%       { transform: translateX(-14px) rotate(-4deg); }
  18%      { transform: translateX( 12px) rotate( 4deg); }
  28%      { transform: translateX(-12px) rotate(-3deg); }
  38%      { transform: translateX( 11px) rotate( 3deg); }
  48%      { transform: translateX( -9px) rotate(-2deg); }
  58%      { transform: translateX(  8px) rotate( 2deg); }
  68%      { transform: translateX( -6px) rotate(-1.5deg); }
  78%      { transform: translateX(  4px) rotate( 1deg); }
  88%      { transform: translateX( -2px) rotate(-0.5deg); }
}
@keyframes battleEnemyFlash {
  0%   { filter: brightness(1)  drop-shadow(0 0 0 #fff); }
  40%  { filter: brightness(2.4) drop-shadow(0 0 16px #fff) drop-shadow(0 0 28px #FFE27A); }
  100% { filter: brightness(1)  drop-shadow(0 0 0 #fff); }
}
/* 撃破: フリップ + 縮小 + 暗転 (v265 以降は purify/ascend 経路が既定。
   defeated クラスは非常用フォールバックとして残す。) */
.battle-enemy.defeated {
  animation: battleEnemyDefeat 1.1s cubic-bezier(0.6,-0.1,0.7,1) forwards !important;
}
@keyframes battleEnemyDefeat {
  0%   { transform: translateY(0)     scale(1)   rotate(0);     opacity: 1; filter: brightness(1); }
  25%  { transform: translateY(-30px) scale(1.1) rotate(-10deg);opacity: 1; filter: brightness(0.6); }
  65%  { transform: translateY(40px)  scale(0.6) rotate(180deg);opacity: 0.7; filter: brightness(0.3) hue-rotate(-40deg); }
  100% { transform: translateY(80px)  scale(0.1) rotate(360deg);opacity: 0;   filter: brightness(0); }
}
/* ===== 呪縛仮面・呪印・浄化演出 (v265: バトルピボット) =====
   全敵共通の白い顔なし仮面 (縦 2 分割のハーフで構成) + おでこの呪印 (ギザギザ星型)。
   HP 進行で data-sigil / data-cracks 属性を更新 → CSS で呪印の色・発光・ヒビが段階進化。
   5 発目で .shattering を mask に付けて縦 2 つ割り、敵スプライトを .cursed → .purified に切替。
   敵スプライトは変えず、filter saturate/brightness で呪縛/解放の色味だけ変える。 */
.curse-mask {
  position: absolute;
  top: 6%;
  left: 50%;
  transform: translateX(-50%);
  width: 58%;
  height: 62%;
  pointer-events: none;
  z-index: 3;
  opacity: 1;
  transition: opacity 0.3s ease-out;
}
/* 敵ごとに仮面の位置・サイズを微調整 (顔のある部分に合わせる) */
.battle-enemy[data-enemy-id="mushroom"] .curse-mask     { top: 18%; width: 52%; height: 50%; }
.battle-enemy[data-enemy-id="golem_forest"] .curse-mask { top: 10%; width: 44%; height: 46%; }
.battle-enemy[data-enemy-id="ice_bat"] .curse-mask      { top: 14%; width: 52%; height: 52%; }
.battle-enemy[data-enemy-id="ice_wizard"] .curse-mask   { top:  8%; width: 42%; height: 44%; }
.battle-enemy[data-enemy-id="lava_golem"] .curse-mask   { top: 10%; width: 44%; height: 48%; }
.battle-enemy[data-enemy-id="imp"] .curse-mask          { top: 10%; width: 52%; height: 52%; }
.battle-enemy[data-enemy-id="volcano_lord"] .curse-mask { top: 10%; width: 48%; height: 50%; }
.battle-enemy.cursed .enemy-img {
  filter: saturate(0.6) brightness(0.85) drop-shadow(0 0 6px rgba(74, 27, 122, 0.5));
  transition: filter 0.4s ease-out;
}
.battle-enemy.purified .enemy-img {
  filter: saturate(1.25) brightness(1.14) drop-shadow(0 0 10px rgba(255, 240, 160, 0.75));
  transition: filter 0.5s ease-out;
}
.curse-mask-half {
  position: absolute;
  top: 0;
  width: 50%;
  height: 100%;
  background: radial-gradient(ellipse at 50% 40%, #fdfdfd 55%, #d8d8d8 88%, #b8b8b8 100%);
  box-shadow:
    inset 0 0 6px rgba(0, 0, 0, 0.18),
    0 2px 5px rgba(0, 0, 0, 0.35);
  transform-origin: center center;
  transition: transform 0.5s ease-out, opacity 0.5s ease-out;
}
.curse-mask-half.curse-mask-left  { left: 0;  border-radius: 100% 0 0 100% / 50% 0 0 50%; }
.curse-mask-half.curse-mask-right { right: 0; border-radius: 0 100% 100% 0 / 0 50% 50% 0; }
.curse-cracks {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: visible;
}
.curse-cracks .curse-crack {
  stroke: #1a1a1a;
  stroke-width: 2.4;
  fill: none;
  stroke-linecap: round;
  opacity: 0;
  transition: opacity 0.25s ease-out;
  filter: drop-shadow(0 0 1px rgba(0,0,0,0.6));
}
/* HP 段階で出現するヒビ数: 1→crack-1、2→crack-1+2、3→全部 */
.battle-enemy[data-cracks="1"] .curse-crack.crack-1 { opacity: 0.85; }
.battle-enemy[data-cracks="2"] .curse-crack.crack-1,
.battle-enemy[data-cracks="2"] .curse-crack.crack-2 { opacity: 0.85; }
.battle-enemy[data-cracks="3"] .curse-crack.crack-1,
.battle-enemy[data-cracks="3"] .curse-crack.crack-2,
.battle-enemy[data-cracks="3"] .curse-crack.crack-3 { opacity: 0.88; }
.curse-sigil {
  position: absolute;
  top: 16%;
  left: 50%;
  width: 44%;
  height: 34%;
  transform: translateX(-50%);
  overflow: visible;
  --sigil-fill:   #3a1560;
  --sigil-stroke: #d4af37;
  --sigil-glow:   rgba(120, 40, 190, 0.85);
  filter: drop-shadow(0 0 4px var(--sigil-glow));
  transition: filter 0.3s ease-out;
}
.curse-sigil .sigil-star {
  fill: var(--sigil-fill);
  stroke: var(--sigil-stroke);
  stroke-width: 1.6;
  stroke-linejoin: round;
  transition: fill 0.35s ease-out, stroke 0.35s ease-out;
}
/* HP 段階別: 紫 → 金 (闇が光に押し返される方向) */
.battle-enemy[data-sigil="5"] .curse-sigil { --sigil-fill: #3a1560; --sigil-stroke: #d4af37; --sigil-glow: rgba(120, 40, 190, 0.85); }
.battle-enemy[data-sigil="4"] .curse-sigil { --sigil-fill: #552280; --sigil-stroke: #e4c447; --sigil-glow: rgba(150, 70, 210, 0.9); }
.battle-enemy[data-sigil="3"] .curse-sigil { --sigil-fill: #7a3098; --sigil-stroke: #ffd75a; --sigil-glow: rgba(255, 200, 80, 0.88); }
.battle-enemy[data-sigil="2"] .curse-sigil { --sigil-fill: #b8732c; --sigil-stroke: #ffe066; --sigil-glow: rgba(255, 220, 90, 0.9); }
.battle-enemy[data-sigil="1"] .curse-sigil { --sigil-fill: #ecc030; --sigil-stroke: #fff4a0; --sigil-glow: rgba(255, 240, 160, 0.95); animation: sigilShakeStrong 0.55s linear 2; }
.battle-enemy[data-sigil="0"] .curse-sigil { --sigil-fill: #fff0a0; --sigil-stroke: #ffffff; --sigil-glow: rgba(255, 255, 255, 1); animation: sigilBurst 0.5s ease-out 1 forwards; }
@keyframes sigilShakeStrong {
  0%, 100% { transform: translateX(-50%); }
  15% { transform: translate(-58%, -1px) rotate(-4deg); }
  30% { transform: translate(-42%,  1px) rotate( 4deg); }
  45% { transform: translate(-55%, -1px) rotate(-3deg); }
  60% { transform: translate(-45%,  1px) rotate( 3deg); }
  85% { transform: translate(-52%,  0)   rotate(-1deg); }
}
@keyframes sigilBurst {
  0%   { transform: translateX(-50%) scale(1);   filter: drop-shadow(0 0 8px var(--sigil-glow)) brightness(1.2); opacity: 1; }
  40%  { transform: translateX(-50%) scale(2.4); filter: drop-shadow(0 0 32px #fff8c8) brightness(2.4); opacity: 1; }
  100% { transform: translateX(-50%) scale(3.8); filter: drop-shadow(0 0 56px #ffffff) brightness(3.2); opacity: 0; }
}
/* 仮面が縦 2 つに割れて左右へ吹き飛ぶ */
.curse-mask.shattering .curse-mask-half.curse-mask-left  { animation: maskHalfFlyLeft  0.55s ease-out 0.05s forwards; }
.curse-mask.shattering .curse-mask-half.curse-mask-right { animation: maskHalfFlyRight 0.55s ease-out 0.05s forwards; }
.curse-mask.shattering .curse-cracks,
.curse-mask.shattering .curse-sigil { opacity: 0; transition: opacity 0.3s; }
@keyframes maskHalfFlyLeft {
  0%   { transform: translate(0, 0) rotate(0);            opacity: 1; }
  100% { transform: translate(-54px, 38px) rotate(-38deg); opacity: 0; }
}
@keyframes maskHalfFlyRight {
  0%   { transform: translate(0, 0) rotate(0);          opacity: 1; }
  100% { transform: translate(54px, 38px) rotate(38deg); opacity: 0; }
}
/* 浄化後: 精霊のおじぎ */
.battle-enemy.bowing .enemy-img {
  animation: spiritBow 0.65s ease-out 1;
}
@keyframes spiritBow {
  0%   { transform: translateY(0); }
  30%  { transform: translateY(5px) rotate(-3deg); }
  65%  { transform: translateY(-2px) rotate(2deg); }
  100% { transform: translateY(0); }
}
/* 浄化後: 精霊の上昇消失 */
.battle-enemy.ascending {
  animation: spiritAscend 0.9s ease-out 1 forwards !important;
}
@keyframes spiritAscend {
  0%   { transform: translateY(0);     opacity: 1; }
  100% { transform: translateY(-38px); opacity: 0; }
}
/* v271 クライマックス: カゲロウ一瞬覚醒 (仮面のヒビから金光) */
.battle-enemy.kagerou-awaken-pulse {
  animation: kagerouAwakenPulse 1.6s ease-in-out 1 !important;
}
@keyframes kagerouAwakenPulse {
  0%, 100% { filter: brightness(1) drop-shadow(0 0 0 rgba(255,220,100,0)); }
  40%      { filter: brightness(1.15) drop-shadow(0 0 24px rgba(255,220,100,0.85)); }
  70%      { filter: brightness(1.1)  drop-shadow(0 0 16px rgba(255,200,80,0.6)); }
}
/* v271 クライマックス: カゲロウ再呪縛 → 激昂 (仮面の暗い脈動 + スプライト激しい揺れ) */
.battle-enemy.kagerou-rage {
  animation: kagerouRage 0.45s ease-in-out 3 !important;
  filter: saturate(1.3) brightness(0.85) drop-shadow(0 0 18px rgba(170,40,210,0.85)) !important;
}
@keyframes kagerouRage {
  0%, 100% { transform: translateX(0) rotate(0); }
  20%      { transform: translateX(-14px) rotate(-3deg); }
  50%      { transform: translateX(12px)  rotate(3deg); }
  80%      { transform: translateX(-8px)  rotate(-2deg); }
}
/* v277d: セリナの氷が効かない演出 — 青いハイライトが一瞬当たって すぐ消える (ノーダメージ感)
   ライトな bounce + cyan filter を 0.7s で */
.battle-enemy.ice-noeffect {
  animation: iceNoEffect 0.7s ease-out 1 !important;
}
@keyframes iceNoEffect {
  0%   { filter: brightness(1) drop-shadow(0 0 0 transparent); transform: scale(1); }
  25%  { filter: brightness(1.3) drop-shadow(0 0 16px rgba(150,220,255,0.85)); transform: scale(0.98); }
  60%  { filter: brightness(1.1) drop-shadow(0 0 8px rgba(150,220,255,0.4)); transform: scale(1); }
  100% { filter: brightness(1) drop-shadow(0 0 0 transparent); transform: scale(1); }
}
/* v271 クライマックス: スクリーン激震 (ヒノカ被弾時) */
.battle-stage.screen-heavy-shake {
  animation: screenHeavyShake 0.12s linear 7 !important;
}
@keyframes screenHeavyShake {
  0%, 100% { transform: translate(0, 0); }
  20% { transform: translate(-6px, 3px); }
  40% { transform: translate(5px, -4px); }
  60% { transform: translate(-4px, -3px); }
  80% { transform: translate(4px, 3px); }
}
/* v271 クライマックス: ヒノカ被弾フラッシュ */
@keyframes hinokaHitFlash {
  0%   { opacity: 0; }
  25%  { opacity: 1; }
  100% { opacity: 0; }
}
/* v271 クライマックス: ヒノカ倒れる (出現 → 傾く → フェード) */
@keyframes hinokaFall {
  0%   { transform: translateY(-20px) rotate(0); opacity: 0; }
  15%  { transform: translateY(0)     rotate(0); opacity: 1; }
  60%  { transform: translateY(30px)  rotate(-35deg); opacity: 0.85; }
  100% { transform: translateY(60px)  rotate(-60deg); opacity: 0; }
}
/* v274 バトルステージ常駐ヒノカ: ふわふわ浮遊 */
@keyframes hinokaFloat {
  0%, 100% { transform: translateY(0)    rotate(0); }
  50%      { transform: translateY(-6px) rotate(-1.5deg); }
}
/* v271 クライマックス: 星の印フルスクリーン発動 (pulse) */
@keyframes starMarkPulse {
  0%, 100% { text-shadow: 0 0 40px #FFD84D, 0 0 80px #FFA800, 0 0 140px rgba(255,168,0,0.7); transform: scale(1); }
  50%      { text-shadow: 0 0 60px #FFE88A, 0 0 120px #FFC040, 0 0 200px rgba(255,200,80,0.9); transform: scale(1.06); }
}
/* お礼の吹き出し「…ありがとう」 */
.spirit-thanks-bubble {
  position: absolute;
  top: -28%;
  left: 50%;
  transform: translate(-50%, 8px);
  background: rgba(255, 255, 255, 0.96);
  color: #2a1245;
  padding: 4px 10px;
  border-radius: 14px;
  border: 2px solid #d4af37;
  font-size: 0.72rem;
  font-weight: 800;
  white-space: nowrap;
  box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
  opacity: 0;
  pointer-events: none;
  z-index: 5;
  animation: thanksFadeIn 0.5s ease-out 0.3s 1 forwards;
  letter-spacing: 0.02em;
}
.spirit-thanks-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 8px solid #d4af37;
}
@keyframes thanksFadeIn {
  0%   { opacity: 0; transform: translate(-50%, 8px); }
  100% { opacity: 1; transform: translate(-50%, 0); }
}
/* 闇オーラ排出パーティクル (仮面割れ時に呪印周辺から下方へ流れる紫霧) */
.curse-shadow-drain {
  position: absolute;
  top: 28%;
  left: 50%;
  width: 10px;
  height: 10px;
  background: radial-gradient(circle, rgba(150, 70, 210, 0.95) 0%, rgba(58, 20, 96, 0.55) 50%, transparent 80%);
  border-radius: 50%;
  pointer-events: none;
  filter: blur(1.5px);
  animation: shadowDrain 0.75s ease-in 1 forwards;
  z-index: 2;
}
@keyframes shadowDrain {
  0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.92; }
  100% { transform: translate(var(--dx, -50%), var(--dy, 64px)) scale(0.35); opacity: 0; }
}
@media (prefers-reduced-motion: reduce) {
  .battle-enemy[data-sigil="1"] .curse-sigil,
  .battle-enemy[data-sigil="0"] .curse-sigil { animation: none; }
  .curse-mask.shattering .curse-mask-half { animation: none; opacity: 0; }
  .battle-enemy.ascending,
  .battle-enemy.bowing .enemy-img { animation: none; }
}

/* 敵情報 (名前 / HP / 五芒星) */
.enemy-info {
  position: absolute;
  left: 8px; right: 8px; bottom: 6px;
  display: flex; flex-direction: column; gap: 3px;
  pointer-events: none;
}
.enemy-name {
  font-size: 0.78rem; font-weight: 900;
  color: var(--text);
  text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 2px #000;
  letter-spacing: 0.06em;
}
.hp-bar-wrap {
  background: rgba(0,0,0,0.6);
  border: 1.5px solid rgba(244,233,208,0.75);
  border-radius: 4px;
  padding: 2px;
  box-shadow: inset 0 0 4px rgba(0,0,0,0.8);
}
.hp-bar {
  display: flex; gap: 2px;
  height: 9px;
}
.hp-bar .hp-block {
  flex: 1;
  background: linear-gradient(180deg, #6EE7B7 0%, #10B981 55%, #047857 100%);
  border-radius: 1px;
  box-shadow: inset 0 0 3px rgba(255,255,255,0.35);
  transition: background 0.25s ease, opacity 0.25s ease, transform 0.25s ease;
}
.hp-bar .hp-block.low {
  background: linear-gradient(180deg, #FCD34D 0%, #F59E0B 55%, #B45309 100%);
}
.hp-bar .hp-block.critical {
  background: linear-gradient(180deg, #FCA5A5 0%, #EF4444 55%, #991B1B 100%);
}
.hp-bar .hp-block.lost {
  background: #1a1a1a;
  box-shadow: inset 0 0 3px rgba(0,0,0,0.8);
  opacity: 0.4;
}
.pentagram-charge {
  display: flex; justify-content: center; gap: 3px;
  font-size: 0.95rem;
  line-height: 1;
  margin-top: 1px;
  filter: drop-shadow(0 0 2px #000);
}
.pentagram-charge .star {
  color: rgba(170,170,180,0.4);
  transition: color 0.3s ease, text-shadow 0.3s ease, transform 0.3s ease;
}
.pentagram-charge .star.lit {
  color: #FFD86A;
  text-shadow: 0 0 6px #FFE27A, 0 0 12px rgba(255,170,60,0.9), 0 0 20px rgba(255,170,60,0.5);
  animation: starPop 0.35s cubic-bezier(0.34,1.7,0.64,1);
}
.pentagram-charge.charged .star.lit {
  animation: starCharged 1.2s ease-in-out infinite;
}
@keyframes starPop {
  0%   { transform: scale(0.5); }
  55%  { transform: scale(1.5); }
  100% { transform: scale(1);   }
}
@keyframes starCharged {
  0%, 100% { transform: scale(1);    filter: brightness(1); }
  50%      { transform: scale(1.15); filter: brightness(1.3); }
}

/* 敵のセリフ吹き出し */
.enemy-speech {
  position: absolute;
  left: 50%; top: 6px;
  transform: translateX(-50%) scale(0.6);
  background: var(--window-bg);
  border: 2px solid var(--window-border);
  border-radius: 10px;
  padding: 3px 10px;
  font-size: 0.78rem; font-weight: 900;
  color: var(--text);
  box-shadow: 0 2px 6px rgba(0,0,0,0.6), 0 0 10px rgba(255,220,130,0.25);
  opacity: 0;
  white-space: nowrap;
  transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
.enemy-speech.show { opacity: 1; transform: translateX(-50%) scale(1); }
.enemy-speech::after {
  content: '';
  position: absolute;
  bottom: -7px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 7px solid var(--window-border);
}

/* ダメージ数字ポップアップ */
.damage-pop-layer {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 30;
  overflow: visible;
}
.damage-pop {
  position: absolute;
  font-size: 1.6rem; font-weight: 900;
  color: #FFE27A;
  text-shadow: 0 0 6px #FFD86A, 0 0 12px rgba(255,170,60,0.85), 0 2px 3px #000;
  animation: damagePopAnim 0.75s cubic-bezier(0.2,0.8,0.3,1) forwards;
  transform: translate(-50%, -50%);
  letter-spacing: 0.04em;
  will-change: transform, opacity;
}
.damage-pop.finisher {
  font-size: 2.6rem;
  color: #FCA5A5;
  text-shadow: 0 0 8px #F87171, 0 0 18px rgba(239,68,68,0.85), 0 2px 4px #000;
}
@keyframes damagePopAnim {
  0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
  20%  { transform: translate(-50%, -70%) scale(1.25); opacity: 1; }
  100% { transform: translate(-50%,-180%) scale(0.9); opacity: 0; }
}

/* ===== 通常攻撃: 斜めスラッシュ ===== */
.battle-stage .slash-fx {
  position: absolute;
  top: 18%; left: 8%;
  width: 84%; height: 64%;
  pointer-events: none;
  background:
    linear-gradient(115deg,
      transparent 47%,
      rgba(255,255,255,0.9) 49%,
      rgba(255,245,200,1) 50%,
      rgba(255,255,255,0.9) 51%,
      transparent 53%);
  filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 14px rgba(255,220,100,0.8));
  mix-blend-mode: screen;
  opacity: 0;
  animation: slashSweep 0.42s ease-out forwards;
  z-index: 5;
}
@keyframes slashSweep {
  0%   { opacity: 0; transform: translateX(-22%) scaleX(0.5); }
  25%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(22%) scaleX(1.1); }
}

/* ===== 魔法攻撃 (炎、ミニ): 敵の位置でラジアルグロウ ===== */
.battle-stage .magic-fire-fx {
  position: absolute;
  top: 45%; left: 50%;
  width: 65%; aspect-ratio: 1;
  transform: translate(-50%, -50%);
  pointer-events: none;
  background: radial-gradient(circle,
    rgba(255,240,160,0.95) 0%,
    rgba(255,170,60,0.75) 22%,
    rgba(230,90,30,0.5)  45%,
    rgba(140,30,10,0.25) 68%,
    transparent 78%);
  mix-blend-mode: screen;
  opacity: 0;
  animation: magicFirePulse 0.7s ease-out forwards;
  z-index: 5;
}
@keyframes magicFirePulse {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.35); }
  30%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
}

/* ===== 衝撃パーティクル (敵中心から放射する emoji) ===== */
.battle-stage .enemy-impact-particle {
  position: absolute;
  pointer-events: none;
  font-size: 1.4rem;
  transform: translate(-50%, -50%);
  animation: enemyImpactOut 0.65s ease-out forwards;
  z-index: 6;
  filter: drop-shadow(0 0 4px rgba(255,255,255,0.7));
  --dx: 0px; --dy: 0px;
}
@keyframes enemyImpactOut {
  0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
  40%  { opacity: 1; transform: translate(calc(-50% + var(--dx) * 0.6), calc(-50% + var(--dy) * 0.6)) scale(1.25); }
  100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.75); }
}

/* ===== 敵撃破後の ドラクエ風ウィンドウ (キャンバス位置に重ねる) ===== */
.battle-defeated-window {
  position: fixed;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 1080;
  transition: opacity 0.35s ease;
}
.battle-defeated-window .dq-window {
  background: #020208;
  border: 3px solid #fff;
  border-radius: 8px;
  padding: clamp(16px, 4.5vw, 30px) clamp(20px, 5.5vw, 38px);
  box-shadow:
    0 0 26px rgba(255,220,100,0.45),
    inset 0 0 18px rgba(255,255,255,0.08);
  text-align: left;
  color: #fff;
  max-width: 92%;
  font-family: "Hiragino Kaku Gothic ProN", "ＭＳ Ｐゴシック", sans-serif;
  animation: dqWindowIn 0.4s cubic-bezier(0.3, 1.4, 0.6, 1);
}
.battle-defeated-window .dq-line {
  font-size: clamp(1rem, 4.2vw, 1.4rem);
  font-weight: 900;
  letter-spacing: 0.06em;
  line-height: 1.7;
  text-shadow: 0 0 6px rgba(255,220,100,0.45);
}
.battle-defeated-window .dq-line-emphasis {
  color: #FFD86A;
  font-size: clamp(1.5rem, 6.5vw, 2.1rem);
  text-shadow: 0 0 10px #FFD86A, 0 0 18px rgba(255,170,60,0.85);
  animation: dqEmphasisBlink 1s ease-in-out infinite;
  display: inline-block;
  margin-top: 4px;
}
@keyframes dqWindowIn {
  0%   { opacity: 0; transform: scale(0.82) translateY(6px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes dqEmphasisBlink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.72; }
}

/* ===== 敵の反撃: 画面シェイク ===== */
.screen-shake {
  animation: screenShake 0.55s cubic-bezier(0.36, 0, 0.66, 1);
}
@keyframes screenShake {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-4px, 2px); }
  20% { transform: translate(5px, -3px); }
  30% { transform: translate(-6px, -2px); }
  40% { transform: translate(5px, 3px); }
  50% { transform: translate(-4px, 2px); }
  60% { transform: translate(3px, -2px); }
  70% { transform: translate(-3px, 2px); }
  80% { transform: translate(2px, -1px); }
  90% { transform: translate(-1px, 1px); }
}

/* ===== プレイヤー被ダメージ表示 (画面下部 DQ ウィンドウ) ===== */
.player-damage-window {
  position: fixed;
  bottom: max(20px, env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%);
  z-index: 1090;
  pointer-events: none;
  max-width: 92vw;
  animation: playerDmgIn 0.3s ease-out;
  transition: opacity 0.3s ease;
}
.player-damage-window .dq-window {
  background: #020208;
  border: 3px solid #fff;
  border-radius: 8px;
  padding: clamp(12px, 3vw, 20px) clamp(16px, 4vw, 28px);
  box-shadow:
    0 0 20px rgba(255,80,80,0.4),
    inset 0 0 14px rgba(255,255,255,0.06);
  color: #fff;
  font-family: "Hiragino Kaku Gothic ProN", "ＭＳ Ｐゴシック", sans-serif;
  white-space: nowrap;
}
.player-damage-window .dq-line {
  font-size: clamp(0.95rem, 3.8vw, 1.25rem);
  font-weight: 900;
  letter-spacing: 0.04em;
  line-height: 1.45;
  text-shadow: 0 0 4px rgba(255,255,255,0.3);
}
.player-damage-window .dmg-num {
  color: #FF7777;
  font-size: 1.35em;
  text-shadow: 0 0 8px rgba(255,80,80,0.85);
  padding: 0 0.12em;
}
@keyframes playerDmgIn {
  0%   { opacity: 0; transform: translate(-50%, 14px); }
  100% { opacity: 1; transform: translate(-50%, 0); }
}

/* ドラクエ風 戦闘ログウィンドウ (バトル中のテキストを一箇所に集約)。
   バトルステージ (上) と文字キャンバス (下) の間に配置する。 */
.battle-log-window {
  order: 4; /* battle-stage(3) と trace-area(5) の間に挿入。
              (実配置は .right-col 内の HTML 順で制御しているが order で保険をかける) */
  width: 100%;
  max-width: min(92vw, 420px);
  margin: 0 auto 4px;
  flex-shrink: 0;
  box-sizing: border-box;
}
/* v275: ADV (アドベンチャー) ゲーム風 バストアップ会話。
   v275 b: 全画面 overlay → battle-stage 内 absolute 配置に変更
   (full-screen blur がダイアログ文字までボカしてしまう問題の修正)。
   背景ぼかしは battle-stage::before のみに掛かり、ダイアログ枠は影響を受けない。
   ヒノカ単独 = 右、カゲロウ + ヒノカ会話 = 左ヒノカ / 右カゲロウ。
   バストショット強制 = object-fit:cover + object-position:top で頭〜上半身だけクロップ。 */
.battle-stage.bustup-active::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(10, 6, 18, 0.5);
  backdrop-filter: blur(4px) saturate(0.85);
  -webkit-backdrop-filter: blur(4px) saturate(0.85);
  z-index: 50;          /* battle-enemy(2) の上、portrait(60) の下 */
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
  animation: bustupBgIn 0.5s ease forwards;
}
@keyframes bustupBgIn { to { opacity: 1; } }
.battle-stage .bustup-portrait {
  position: absolute;
  bottom: 0;
  /* 縦 100% 相当でステージ内に収める。バストショット (頭〜胸) のみ見せる。 */
  height: 96%;
  width: 46%;
  z-index: 60;
  pointer-events: none;
  object-fit: cover;
  object-position: top center;     /* 上半身を切り取り */
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.7));
  opacity: 0;
  transform: translateY(14px) scaleX(var(--flip, 1));
  transition: opacity 0.5s ease, transform 0.55s cubic-bezier(.2,1.18,.4,1);
  image-rendering: -webkit-optimize-contrast;
}
.battle-stage .bustup-portrait.visible {
  opacity: 1;
  transform: translateY(0) scaleX(var(--flip, 1));
}
.battle-stage .bustup-portrait.left  { left:  2%; }
.battle-stage .bustup-portrait.right { right: 2%; }
/* v277d (2026-04-25): カゲロウのバストショット (kagerou_atk_1.png) は landscape 構図で
   顔が画像の左側に集中している。default の object-position:top center だと顔が切れるので、
   alt 属性で識別して左寄せクロップに切替。 */
.battle-stage .bustup-portrait[alt="カゲロウ"] {
  object-position: top left;
}
@media (prefers-reduced-motion: reduce) {
  .battle-stage .bustup-portrait { transition: opacity 0.2s ease, transform 0s; }
}

/* ===== v277: Chant Ritual (儀式) — カゲロウ最終バトルの「真名/歌の呼びかけ」ステップ =====
   2 ヶ所で起動: (1) Beat 1 直後「かざん」 (2) Beat 5 直後「かげろう」
   テーマは awakening (温色 sepia) と starmark (黄金) の 2 種。 */
.chant-ritual-overlay {
  position: fixed; inset: 0;
  z-index: 1900;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 4vh 0 8vh;
  box-sizing: border-box;
  opacity: 0;
  transition: opacity 0.7s ease;
  /* タップは canvas に届かせるが overlay 自体ではキャプチャしない */
  pointer-events: auto;
  /* スキップ防止 — 物語ピーク演出のため誤タップで閉じない */
  cursor: default;
  user-select: none;
  -webkit-user-select: none;
}
.chant-ritual-overlay.theme-awakening {
  background: radial-gradient(ellipse at center, rgba(60,30,15,0.94) 0%, rgba(15,8,4,0.97) 100%);
}
.chant-ritual-overlay.theme-starmark {
  background:
    radial-gradient(ellipse at center, rgba(255,200,80,0.18) 0%, transparent 60%),
    radial-gradient(ellipse at center, rgba(40,20,80,0.85) 30%, rgba(10,6,20,0.97) 100%);
}
.chant-ritual-overlay.visible { opacity: 1; }

.chant-ritual-heading {
  font-family: "Hiragino Kaku Gothic ProN", "ＭＳ Ｐゴシック", sans-serif;
  font-size: clamp(1.3rem, 4.5vw, 1.9rem);
  font-weight: 900;
  letter-spacing: 0.12em;
  text-align: center;
  margin: 0 0 6px;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.chant-ritual-overlay.visible .chant-ritual-heading { opacity: 1; }
.theme-awakening .chant-ritual-heading {
  color: #FFD8A8;
  text-shadow: 0 0 14px rgba(255,180,90,0.7), 0 2px 6px #000;
}
.theme-starmark .chant-ritual-heading {
  color: #FFE27A;
  text-shadow: 0 0 16px rgba(255,210,90,0.85), 0 0 28px rgba(255,170,40,0.5), 0 2px 6px #000;
}

.chant-ritual-subtext {
  font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  font-size: clamp(0.85rem, 3vw, 1.05rem);
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.05em;
  line-height: 1.6;
  width: min(90vw, 520px);
  margin: 0 0 18px;
  opacity: 0;
  transition: opacity 0.7s ease 0.2s;
  white-space: pre-line;
}
.chant-ritual-overlay.visible .chant-ritual-subtext { opacity: 0.85; }
.theme-awakening .chant-ritual-subtext { color: #F4E4C8; text-shadow: 0 1px 4px #000; }
.theme-starmark  .chant-ritual-subtext { color: #FFEFC6; text-shadow: 0 1px 4px #000; }

.chant-ritual-canvas-wrap {
  position: relative;
  width: min(60vw, 280px);
  height: min(60vw, 280px);
  border-radius: 18px;
  border: 2.5px solid rgba(255,220,140,0.4);
  background: rgba(0,0,0,0.35);
  box-shadow:
    0 8px 28px rgba(0,0,0,0.6),
    inset 0 0 24px rgba(255,210,120,0.08);
  overflow: hidden;
  opacity: 0;
  transform: scale(0.92);
  transition: opacity 0.6s ease 0.3s, transform 0.6s cubic-bezier(.2,1.2,.4,1) 0.3s;
}
.chant-ritual-overlay.visible .chant-ritual-canvas-wrap { opacity: 1; transform: scale(1); }
.theme-starmark .chant-ritual-canvas-wrap {
  border-color: rgba(255,225,120,0.6);
  box-shadow:
    0 8px 28px rgba(0,0,0,0.6),
    inset 0 0 28px rgba(255,225,120,0.18),
    0 0 24px rgba(255,200,80,0.25);
}
.chant-ritual-canvas-wrap.glow {
  animation: chantCharGlow 0.55s ease-out;
}
@keyframes chantCharGlow {
  0%   { box-shadow: 0 0 0 rgba(255,220,140,0); }
  35%  { box-shadow: 0 0 36px 12px rgba(255,220,140,0.85), inset 0 0 28px rgba(255,210,120,0.4); }
  100% { box-shadow: 0 8px 28px rgba(0,0,0,0.6), inset 0 0 24px rgba(255,210,120,0.08); }
}
.chant-ritual-canvas-wrap > div {
  width: 100%; height: 100%;
}

.chant-ritual-progress {
  display: flex; gap: 14px;
  margin-top: 22px;
  opacity: 0;
  transition: opacity 0.6s ease 0.5s;
}
.chant-ritual-overlay.visible .chant-ritual-progress { opacity: 1; }
.chant-ritual-progress-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: "Zen Maru Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
  font-size: clamp(1.1rem, 3.4vw, 1.4rem);
  font-weight: 900;
  letter-spacing: 0.04em;
  color: rgba(255,235,200,0.35);
  transition: color 0.4s ease, transform 0.4s cubic-bezier(.2,1.4,.4,1);
}
.chant-ritual-progress-item .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(255,235,200,0.18);
  border: 1.5px solid rgba(255,235,200,0.4);
  transition: background 0.35s ease, box-shadow 0.35s ease, transform 0.35s ease;
}
.chant-ritual-progress-item.current {
  color: rgba(255,235,200,0.95);
  transform: scale(1.1);
}
.chant-ritual-progress-item.done {
  color: #FFD86A;
}
.theme-starmark .chant-ritual-progress-item.done { color: #FFE27A; }
.chant-ritual-progress-item.done .dot {
  background: #FFD86A;
  box-shadow: 0 0 10px rgba(255,216,106,0.85), 0 0 18px rgba(255,170,40,0.5);
}
.theme-starmark .chant-ritual-progress-item.done .dot {
  background: #FFE27A;
  box-shadow: 0 0 12px rgba(255,225,120,0.95), 0 0 22px rgba(255,200,80,0.6);
}

.chant-ritual-tap-hint {
  margin-top: 18px;
  font-size: clamp(0.85rem, 2.8vw, 1rem);
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #FFE27A;
  text-shadow: 0 0 8px rgba(0,0,0,0.85);
  opacity: 0;
  animation: chantHintBlink 1.6s ease-in-out 0.8s infinite;
}
.chant-ritual-overlay.visible .chant-ritual-tap-hint { opacity: 0.85; }
@keyframes chantHintBlink {
  0%, 100% { opacity: 0.45; }
  50%      { opacity: 0.95; }
}

/* 全文字完了時の最終フラッシュ (黄金) */
.chant-ritual-overlay.complete::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at center, rgba(255,225,120,0.85) 0%, rgba(255,200,80,0.4) 30%, transparent 70%);
  pointer-events: none;
  animation: chantCompleteFlash 0.85s ease-out forwards;
}
@keyframes chantCompleteFlash {
  0%   { opacity: 0; transform: scale(0.6); }
  35%  { opacity: 1; transform: scale(1.1); }
  100% { opacity: 0; transform: scale(1.4); }
}

/* Ritual 2 完了時の「カゲロウ！」ビッグテキスト */
.chant-ritual-shoutout {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(0.7);
  font-family: "Zen Maru Gothic", sans-serif;
  font-size: clamp(2.5rem, 11vw, 5rem);
  font-weight: 900;
  letter-spacing: 0.16em;
  color: #FFE27A;
  text-shadow:
    0 0 18px rgba(255,225,120,0.95),
    0 0 38px rgba(255,180,40,0.7),
    0 0 60px rgba(255,140,20,0.5),
    0 4px 12px #000;
  opacity: 0;
  z-index: 1910;
  pointer-events: none;
  white-space: nowrap;
}
.chant-ritual-shoutout.show {
  animation: chantShoutout 1.4s cubic-bezier(.2,1.3,.4,1) forwards;
}
@keyframes chantShoutout {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
  18%  { opacity: 1; transform: translate(-50%, -50%) scale(1.18); }
  35%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
  85%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.0); }
}

/* カゲロウ仮面ヒビ → 割れる演出 (battleEnemy に付与) */
.battle-enemy.kagerou-mask-crack {
  animation: kagerouMaskCrack 1.0s ease-out 1;
}
@keyframes kagerouMaskCrack {
  0%   { filter: brightness(1) drop-shadow(0 0 0 rgba(255,255,255,0)); transform: translateX(0); }
  18%  { filter: brightness(2.2) drop-shadow(0 0 24px rgba(255,255,255,1)); transform: translateX(-4px); }
  28%  { filter: brightness(1.4) drop-shadow(0 0 18px rgba(255,225,120,0.9)); transform: translateX(4px); }

/* ===== マップシーン (バトル前に表示される行ごとのロケーション) ===== */
.map-scene-overlay {
  position: fixed; inset: 0;
  z-index: 1500;  /* battle-log (1400) より上。マップ中は log を隠して全画面マップに集中させる */
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.4s ease;
  overflow: hidden;
}
.map-scene-overlay.show { opacity: 1; }
.map-scene-overlay.fade-out { opacity: 0; }
/* map_A.png は 2752x1536 (縦中央から 46〜54% の帯に「道」が走る)。
   viewport に CSS 変数 (--mx, --my, --map-zoom) を持たせ、bg と hero の双方が
   同じ変数を読んで位置を決める。画像は clamp で viewport を必ず覆うように
   クランプされ、勇者は「無理に画面中央」ではなく「マップ上の (mx, my) の
   実際の screen 座標」に立つ。これにより端の行 (xPct:6 や 94) でもマップが
   画面端まで伸び、黒帯が出なくなる。
   (2026-04-20 ユーザー要望「村のはずれで左側が切れる」対応) */
.map-scene-viewport {
  --mx: 6;
  --my: 48;
  --map-zoom: 1.6;
  --map-img-h: calc(100vh * var(--map-zoom));
  --map-img-w: calc(var(--map-img-h) * 2752 / 1536);
  --map-left-raw: calc(50vw - var(--map-img-w) * var(--mx) / 100);
  --map-top-raw:  calc(62vh - var(--map-img-h) * var(--my) / 100);
  --map-left: clamp(calc(100vw - var(--map-img-w)), var(--map-left-raw), 0px);
  --map-top:  clamp(calc(100vh - var(--map-img-h)), var(--map-top-raw), 0px);
  --road-x: calc(var(--map-left) + var(--map-img-w) * var(--mx) / 100);
  --road-y: calc(var(--map-top)  + var(--map-img-h) * var(--my) / 100);
  position: absolute; inset: 0;
  overflow: hidden;
  background: #000;
}
@media (orientation: landscape) {
  .map-scene-viewport { --map-zoom: 2.2; }
}
.map-scene-bg-img {
  position: absolute;
  height: var(--map-img-h);
  width: var(--map-img-w);
  max-width: none;
  pointer-events: none;
  image-rendering: auto;
  filter: brightness(0.95);
  left: var(--map-left);
  top:  var(--map-top);
}
.map-scene-hero {
  --hero-size: min(22vh, 140px);
  position: absolute;
  width: var(--hero-size);
  height: var(--hero-size);
  /* 勇者の足元 (下辺) がマップ上の (mx, my) 点に来るよう top を逆算。
     左右は translateX(-50%) で足元中心を road-x に揃える。*/
  left: var(--road-x);
  top:  calc(var(--road-y) - var(--hero-size));
  z-index: 3;
  filter: drop-shadow(0 3px 5px rgba(0,0,0,0.6));
}
/* map-scene-hero は scaleX(-1) で右向き。translateX(-50%) を scaleX に影響させないよう
   ラッパーで囲わず inline で両方同時に指定する。点滅 (pulse) は filter で drop-shadow を強めて実現。 */
.map-scene-hero.pulse {
  animation: mapHeroPulse 0.8s ease-in-out infinite;
}
@keyframes mapHeroPulse {
  0%, 100% { filter: drop-shadow(0 3px 5px rgba(0,0,0,0.6)) drop-shadow(0 0 6px rgba(255,220,130,0.4)); }
  50%      { filter: drop-shadow(0 3px 5px rgba(0,0,0,0.6)) drop-shadow(0 0 18px rgba(255,220,130,1)) drop-shadow(0 0 28px rgba(255,180,60,0.8)); }
}
.map-scene-title {
  position: absolute;
  top: 8%;
  left: 50%;
  transform: translateX(-50%);
  font-family: "Hiragino Kaku Gothic ProN", "ＭＳ Ｐゴシック", sans-serif;
  font-size: clamp(1.1rem, 4.8vw, 1.6rem);
  font-weight: 900;
  color: #FFD86A;
  letter-spacing: 0.12em;
  text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 20px rgba(255,200,80,0.55);
  background: rgba(2, 2, 8, 0.82);
  border: 2.5px solid #fff;
  border-radius: 10px;
  padding: 10px 22px;
  white-space: nowrap;
}
.map-scene-hint {
  position: absolute;
  bottom: 8%;
  left: 50%;
  transform: translateX(-50%);
  font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  font-size: clamp(0.85rem, 3.6vw, 1.05rem);
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 8px rgba(0,0,0,1), 0 0 14px rgba(0,0,0,0.9);
  opacity: 0.85;
  animation: mapHintBlink 1.4s ease-in-out infinite;
}
@keyframes mapHintBlink {
  0%, 100% { opacity: 0.55; }
  50%      { opacity: 1; }
}
@media (prefers-reduced-motion: reduce) {
  .map-scene-hero.pulse { animation: none; }
  .map-scene-hint { animation: none; }
}

/* バトルイントロの暗転カーテン + 敵ドン演出 */
.battle-intro-curtain {

/* エンカウント前の森背景: forest_bg_01.png を 180% スケールでゆっくり右→左スクロール
   (2026-04-20 ユーザー要望: 勇者が走ってる間の背景を森にして、少し拡大+緩やかに動かす) */
.battle-intro-forest {
  /* 2026-04-20: iPhone 縦向きで画面ど真ん中に森背景が来るよう center center に統一。
     (以前は 55% で少し下寄りだった → バトルログ領域と視覚的に分離できていなかった)
     2026-04-21: ステージに応じて背景画像を差し替えるため、curtain 側に
     .stage-cave / .stage-volcano / .stage-castle クラスを付ける。 */
  position: absolute;
  inset: 0;
  background-image: url('../assets/images/battle/bg/forest_bg_02.png');
  background-repeat: repeat-x;
  background-size: auto 55%;
  background-position: 0 50%;
  opacity: 0.9;
  animation: battleIntroForestScroll 14s linear infinite;
  filter: brightness(0.75) saturate(0.95);
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;

.battle-intro-curtain.stage-cave    .battle-intro-forest { background-image: url('../assets/images/battle/bg/cave_bg_02.png'); }
.battle-intro-curtain.stage-volcano .battle-intro-forest { background-image: url('../assets/images/battle/bg/volcano_bg_01.png'); }
.battle-intro-curtain.stage-castle  .battle-intro-forest { background-image: url('../assets/images/battle/bg/castle_bg_01.png'); }
@keyframes battleIntroForestScroll {
  0%   { background-position: 0 50%; }
  100% { background-position: -800px 50%; }
}
/* 森 → 黒の頂上ビネット (敵が見やすくなるよう画面下部を暗く) */
.battle-intro-forest::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.05) 45%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
}
.battle-intro-curtain.forest-out .battle-intro-forest {
  opacity: 0;
  transition: opacity 0.6s ease;
}
@media (prefers-reduced-motion: reduce) {

}
.battle-intro-enemy {
  /* 2026-04-20 ユーザー要望: 敵を半分に (320px → 160px) */
  width: min(30vw, 160px);
  max-height: 70vh;
  object-fit: contain;
  transform: scale(0.2);
  opacity: 0;
  filter: drop-shadow(0 0 24px rgba(255,80,60,0.6)) drop-shadow(0 0 48px rgba(255,120,40,0.3));
  animation: battleIntroEnemyDrop 0.55s cubic-bezier(0.25, 1.5, 0.4, 1) forwards;

@keyframes battleIntroEnemyDrop {

  55%  { transform: scale(1.15) translateY(0);    opacity: 1; }
  75%  { transform: scale(0.96) translateY(0);    opacity: 1; }
  100% { transform: scale(1.02) translateY(0);    opacity: 1; }

@media (prefers-reduced-motion: reduce) {

/* エンカウント前ナレーション中の歩き演出: move.png スプライトシートを使って
   左端から右端に向かって歩いてくる勇者を重ねる。
   .battle-intro-hero-wrap が translate で位置を運び、中の .hero-sprite.move が
   アニメシートを steps(5) で再生する (役割分担で animation 衝突を回避)。 */
.battle-intro-hero-wrap {
  /* 2026-04-20 「勇者が花と同じ大きさ」対応: 110 → 220px に拡大。
     森のスケールも 55% に縮めたので、勇者が相対的にドンと大きく見える。
     2026-04-20 再調整 v258: 「道から外れてる」指摘で更に 2 キャラ分 (~30%) 下げ、
     bottom を 42% → 12% に。森の道ラインに勇者の足元が着地する。 */
  position: fixed;
  bottom: 12%;
  left: 0;
  width: min(44vw, 220px);
  height: min(44vw, 220px);
  z-index: 1350;
  pointer-events: none;

.battle-intro-hero-wrap .hero-sprite.move {

@keyframes battleIntroHeroWalkAcross {
  0%   { transform: translateX(-20vw) scaleX(-1); }
  100% { transform: translateX(100vw) scaleX(-1); }

.battle-intro-hero-wrap.walk-off {
  animation: none;
  transition: transform 0.5s ease-out, opacity 0.5s ease-out;

  transform: translateX(100vw) scaleX(-1);
}
@media (prefers-reduced-motion: reduce) {
  .battle-intro-hero-wrap { animation: none; transform: translateX(50vw) scaleX(-1); }
  .battle-intro-hero-wrap .hero-sprite.move { animation: none; }
}

/* 「〇〇の こうげき！」告知 (敵の反撃直前) */
.enemy-attack-announce {
