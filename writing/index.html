function _renderHpBar(hp, maxHp) {
  const { hpBar } = _battleEls();
  if (!hpBar) return;
  hpBar.innerHTML = '';
  for (let i = 0; i < maxHp; i++) {
    const b = document.createElement('span');
    b.className = 'hp-block';
    if (i >= hp) b.classList.add('lost');
    else if (hp <= 1) b.classList.add('critical');
    else if (hp <= 2) b.classList.add('low');
    hpBar.appendChild(b);
  }
}

// 行ラベル (あ/カ...) → ステージ種別。森/洞窟/火山/城 に対応。
// ひらがな: あか=forest, さ=forest(中ボス), た/な/は=cave, ま/や/ら/わ=volcano
// カタカナ: 全て castle (Phase 2 で細分化する)
function _stageForRow(label) {
  const hira = { 'あ':'forest','か':'forest','さ':'forest',
                 'た':'cave','な':'cave','は':'cave',
                 'ま':'volcano','や':'volcano','ら':'volcano','わ':'volcano' };
  const kata = { 'ア':'castle','カ':'castle','サ':'castle','タ':'castle','ナ':'castle',
                 'ハ':'castle','マ':'castle','ヤ':'castle','ラ':'castle','ワ':'castle' };
  return hira[label] || kata[label] || 'forest';
}
// ステージ別ナレーション (勇者の歩行シーン)。
// 森のときだけ「あるいていた…」、洞窟/火山/城 は情景に合わせて差し替える。
function _stageIntroNarration(stage, heroName) {
  if (stage === 'cave') {
    return [
      { lines: [heroName + 'は どうくつに', 'ふみこんだ…'] },
      { lines: ['と そのとき！', ''], opts: { line1Class: 'dq-line-emphasis' } },
    ];
  }
  if (stage === 'volcano') {
    return [
      { lines: [heroName + 'は かざんを', 'のぼっていた…'] },
      { lines: ['と そのとき！', ''], opts: { line1Class: 'dq-line-emphasis' } },
    ];
  }
  if (stage === 'castle') {
    return [
      { lines: [heroName + 'は しろへ', 'たどりついた…'] },
      { lines: ['と そのとき！', ''], opts: { line1Class: 'dq-line-emphasis' } },
    ];
  }
  return [
    { lines: [heroName + 'は あるいていた…', ''] },
    { lines: ['と そのとき！', ''], opts: { line1Class: 'dq-line-emphasis' } },
  ];
}

function _showBattleStage(rowId) {
  const els = _battleEls();
  if (!els.stage) return;
  const enemy = _enemyForRow(rowId);
  _battle.active = true;
  _battle.enemy = enemy;
  _battle.maxHp = enemy.hp || 5;
  _battle.hp = _battle.maxHp;
  _battle.hitCount = 0;
  _battle.attackPlan = _pickAttackPlan(_battle.maxHp); // 5回の通常/魔法プラン
  // 敵の属性に合わせる (炎ボス=fire, 氷ボス=ice, …)。敵データに element が無ければ fire。
  _battle.element = enemy.element || 'fire';
  _battle.acornsBuffered = 0; // バトル開始時にリセット

  if (els.img) els.img.src = enemy.img;
  if (els.name) els.name.textContent = enemy.name;
  if (els.charge) els.charge.classList.remove('charged');
  els.stars.forEach(s => s.classList.remove('lit'));
  els.enemy.classList.remove('damaged', 'defeated', 'purified', 'bowing', 'ascending');
  // v275: 前回のバトル残留ヒノカ/倒れヒノカを掃除 (リトライ時など) + 残留 bustup を撤去
  try { els.stage.querySelectorAll('img[data-role="battle-hinoka"],img[data-role="hinoka-fallen"]').forEach(function(n){ n.remove(); }); } catch (e) {}
  try { _hideBustups(); } catch (e) {}
  // v265: 呪縛仮面を初期状態に戻す (敵に cursed クラス + 呪印紫5段階 + 割れ状態クリア)
  try { _resetCurseMask(); } catch (e) {}
  // v268: わ行 episode (ヒノカ cameo) 再生フラグをリセット
  _waRowEpisodePlayed = false;
  // 地に足が付くタイプ (ゴーレム等、grounded:true): 浮遊アニメを切り 2倍拡大、
  // ラップも勇者と同じ高さに持ち上げる (stage.has-grounded クラスで制御)。
  els.enemy.classList.toggle('grounded', !!enemy.grounded);
  els.stage.classList.toggle('has-grounded', !!enemy.grounded);
  // compact: 雑魚 grounded 敵のサイズを勇者並みに小さくする (キノコ等)。
  // grounded 無しの場合は .battle-enemy の通常サイズ (60px) が効くので意味を持たない。
  els.enemy.classList.toggle('compact', !!enemy.compact);
  // enemy id を data 属性に乗せて、敵固有のサイズ調整 (例: ice_wizard 1.8x) を CSS から掛けられるように。
  if (enemy.id) { els.enemy.dataset.enemyId = enemy.id; } else { delete els.enemy.dataset.enemyId; }
  // 元素材が右向きのザコ (flipped:true) は水平反転して勇者と対峙させる。
  // grounded と独立に指定できる (接地しない空中ザコでも反転だけ掛けたい場合があるため)。
  els.enemy.classList.toggle('flipped', !!enemy.flipped);
  // v275: ボス毎の wrap 高さ調整。volcano_lord は 200px サイズで grounded:true だと
  // 下半身が HP ゲージに被るので wrap を上に引き上げる。
  try {
    var wrap = els.stage.querySelector('.battle-enemy-wrap');
    if (wrap) wrap.classList.toggle('volcano-lord-wrap', enemy.id === 'volcano_lord');
  } catch (e) {}
  // ステージ別 BG: 行ラベルから stage を割り出して .stage-xxx を付け替え。
  try {
    els.stage.classList.remove('stage-forest', 'stage-cave', 'stage-volcano', 'stage-castle');
    els.stage.classList.add('stage-' + _stageForRow(rowId));
  } catch (e) {}
  _renderHpBar(_battle.hp, _battle.maxHp);

  // 2026-04-20: バトルステージは「マップシーン+エンカウント演出」が終わるまで
  // DOM 上は非表示のままにする。以前はここで display:'' にしていたため、
  // map-scene-overlay の opacity 0→1 フェードイン中や、map→curtain の切替
  // 瞬間にバトル画面が一瞬透けて見える問題があった。実際の表示は
  // _showBattleEncounterIntro のカーテンで覆った後に行う (_revealBattleStage)。
  els.stage.style.display = 'none';
  els.stage.setAttribute('aria-hidden', 'false');
  // ポノ / ハリネズミ / 封印された妖精を戦闘中は隠す (戦闘画面の集中度を上げる)
  document.body.classList.add('battle-mode');

  // 封印された妖精は隠す (同一キャンバス内の干渉を避ける)
  const md = document.getElementById('monsterDeco');
  if (md) md.style.display = 'none';

  // ログウィンドウをリセット (前回の「たおした！」残りを消す)
  _setBattleLog(['', '']);

  // 勇者を idle スタートにリセット (前バトルが attack で終わっていても待機に戻す)
  try {
    const heroEl = document.getElementById('battleHero');
    if (heroEl) {
      heroEl.classList.remove('move', 'attack-magic', 'attack-normal', 'concentrate', 'damaged');
      heroEl.classList.add('idle');
    }
  } catch (e) { /* ignore */ }

  // 勇者 HP/MP を全回復で表示 (行ごとに元気に始まる)
  try { _resetHeroGauges(); } catch (e) {}

  // 装備パネル描画 (持ってる神器だけ表示、0 個なら行ごと非表示)
  try { renderEquipRow(); } catch (e) {}

  // 登場セリフ / エンカウントジングルは _showBattleEncounterIntro 側で演出として扱う。
  // ここでは stage の配置のみを行う。
}

// ===== 戦闘ログウィンドウ (3行対応, 2026-04-21 v262) =====
// lines: [line1, line2, line3] (末尾省略可)。opts: { line1Class, line2Class, line3Class, animate }
// ===== タイプライター状態 (1 文字ずつ進行) =====
// 子供の目が文字にフォーカスするよう 45ms/文字で順次出す。
// 進行中にタップしたら _completeBattleLogTypewriter で即完了 → 次タップで queue 送り。
const _battleLogTW = {
  timers: [],
  typing: false,
  l1El: null, l2El: null, l3El: null,
  l1Full: '', l2Full: '', l3Full: '',
  l1UsesHtml: false, l2UsesHtml: false, l3UsesHtml: false,
};

function _cancelBattleLogTypewriter() {
  for (const t of _battleLogTW.timers) clearTimeout(t);
  _battleLogTW.timers = [];
}

function _completeBattleLogTypewriter() {
  if (!_battleLogTW.typing) return;
  _cancelBattleLogTypewriter();
  if (_battleLogTW.l1El) {
    if (_battleLogTW.l1UsesHtml) _battleLogTW.l1El.innerHTML = _battleLogTW.l1Full;
    else _battleLogTW.l1El.textContent = _battleLogTW.l1Full;
  }
  if (_battleLogTW.l2El) {
    if (_battleLogTW.l2UsesHtml) _battleLogTW.l2El.innerHTML = _battleLogTW.l2Full;
    else _battleLogTW.l2El.textContent = _battleLogTW.l2Full;
  }
  if (_battleLogTW.l3El) {
    if (_battleLogTW.l3UsesHtml) _battleLogTW.l3El.innerHTML = _battleLogTW.l3Full;
    else _battleLogTW.l3El.textContent = _battleLogTW.l3Full;
  }
  _battleLogTW.typing = false;
}

function _setBattleLog(lines, opts) {
  _cancelBattleLogTypewriter();
  _battleLogTW.typing = false;
  if (!Array.isArray(lines)) lines = [lines || ''];
  const l1 = document.getElementById('battleLogLine1');
  const l2 = document.getElementById('battleLogLine2');
  const l3 = document.getElementById('battleLogLine3');
  const o = opts || {};
  const animate = (o.animate !== false);
  const useTypewriter = (o.typewriter !== false) && animate;
  const t1 = lines[0] || '';
  const t2 = lines[1] || '';
  const t3 = lines[2] || '';
  const usesHtml1 = t1.indexOf('<') >= 0;
  const usesHtml2 = t2.indexOf('<') >= 0;
  const usesHtml3 = t3.indexOf('<') >= 0;

  // ラインのクラス付与 + フェードイン (enter) だけ先にやって中身は空にする
  const prep = (el, cls) => {
    if (!el) return;
    el.className = 'battle-log-line' + (cls ? ' ' + cls : '');
    el.textContent = '';
    if (animate) {
      el.classList.remove('enter');
      void el.offsetWidth;
      el.classList.add('enter');
    }
  };
  prep(l1, o.line1Class);
  prep(l2, o.line2Class);
  prep(l3, o.line3Class);

  // 即時表示モード (animate:false や reduced-motion 想定)
  if (!useTypewriter) {
    if (l1) l1.innerHTML = t1;
    if (l2) l2.innerHTML = t2;
    if (l3) l3.innerHTML = t3;
    return;
  }

  _battleLogTW.l1El = l1; _battleLogTW.l2El = l2; _battleLogTW.l3El = l3;
  _battleLogTW.l1Full = t1; _battleLogTW.l2Full = t2; _battleLogTW.l3Full = t3;
  _battleLogTW.l1UsesHtml = usesHtml1; _battleLogTW.l2UsesHtml = usesHtml2; _battleLogTW.l3UsesHtml = usesHtml3;
  _battleLogTW.typing = true;

  const CHAR_MS = 45;
  const LINE_GAP_MS = 180;

  const typeLine = (el, text, usesHtml, startDelay, onDone) => {
    if (!el || !text) {
      _battleLogTW.timers.push(setTimeout(() => { if (onDone) onDone(); }, startDelay));
      return;
    }
    if (usesHtml) {
      _battleLogTW.timers.push(setTimeout(() => {
        el.innerHTML = text;
        if (onDone) onDone();
      }, startDelay));
      return;
    }
    let i = 0;
    const step = () => {
      i++;
      el.textContent = text.slice(0, i);
      if (i < text.length) {
        _battleLogTW.timers.push(setTimeout(step, CHAR_MS));
      } else {
        if (onDone) onDone();
      }
    };
    _battleLogTW.timers.push(setTimeout(step, startDelay));
  };

  typeLine(l1, t1, usesHtml1, 40, () => {
    typeLine(l2, t2, usesHtml2, LINE_GAP_MS, () => {
      typeLine(l3, t3, usesHtml3, LINE_GAP_MS, () => {
        _battleLogTW.typing = false;
      });
    });
  });
}
function _clearBattleLog() { _setBattleLog(['', '', ''], { animate: false }); }

// ===== タップ進行ダイアログ (ドラクエ風、子供でも読めるペース) =====
// messages: [{ lines:[string,string,string], opts?:{line1Class,line2Class,line3Class,animate} }, ...]
// onDone: 全メッセージ消化後のコールバック。
// 動作: 1 メッセージ目を即表示 + ▼ 点滅 + inner クリックで次へ。最後の消化後 onDone。
const _battleDialog = {
  queue: [],
  onDone: null,
  active: false,
  handler: null,
  _minShowUntil: 0,  // このタイムスタンプまではタップを無視 (誤爆防止)
};

function _battleDialogBind() {
  if (_battleDialog.handler) return;
  _battleDialog.handler = function(ev) {
    if (!_battleDialog.active) return;
    // 誤爆防止: 0.22s は必ず待つ (連打対策 & アニメ終了まで)
    if (Date.now() < _battleDialog._minShowUntil) return;
    // preventDefault / stopPropagation はしない。
    // (他の pointerdown 処理 — audio unlock, HanziWriter 筆跡, 他のタップリスナー — を
    //  絶対に潰さないため。dialog が active の間だけ「進行」をトリガーする。
    //  dialog active = バトル導入中で quiz 書き取りはまだ始まっていないので競合は起きない。)
    _battleDialogAdvance();
  };
  // 画面のどこをタップしても進められるよう document レベルで bubble phase 拾い。
  // active フラグが false の間は即 return で何もしないので常時 listener は無害。
  document.addEventListener('pointerdown', _battleDialog.handler, false);
}

function _battleDialogAdvance() {
  // タイプライター進行中なら、まず全文即表示するだけ。次のタップで queue 送り。
  if (_battleLogTW.typing) {
    _completeBattleLogTypewriter();
    _battleDialog._minShowUntil = Date.now() + 220;
    return;
  }
  if (_battleDialog.queue.length === 0) {
    _battleDialogFinish();
    return;
  }
  const next = _battleDialog.queue.shift();
  _setBattleLog(next.lines || ['', '', ''], next.opts || {});
  // v265: メッセージ表示と同時に演出を走らせたい場合のフック (例: 精霊上昇を帰還セリフと同期)
  if (typeof next.onEnter === 'function') {
    try { next.onEnter(); } catch (e) { /* ignore */ }
  }
  // タイプライター分の時間 + 余裕を取って誤爆防止タイマーを設定
  _battleDialog._minShowUntil = Date.now() + 220;
  _battleDialogSetAwait(true);
}

function _battleDialogFinish() {
  _battleDialog.active = false;
  _battleDialogSetAwait(false);
  const cb = _battleDialog.onDone;
  _battleDialog.onDone = null;
  if (cb) cb();
}

function _battleDialogSetAwait(on) {
  const win = document.getElementById('battleLog');
  if (!win) return;
  if (on) win.classList.add('await-tap');
  else    win.classList.remove('await-tap');
}

function _showBattleDialog(messages, onDone) {
  if (!Array.isArray(messages) || messages.length === 0) {
    if (onDone) onDone();
    return;
  }
  _battleDialogBind();
  _battleDialog.queue = messages.slice();
  _battleDialog.onDone = onDone || null;
  _battleDialog.active = true;
  _battleDialogAdvance(); // 1 通目を即表示 + await-tap on
}

// 2026-04-21: 勇者の「ダメージをあたえた！」ログの後に
// 子供がログを読み終わるまで止めて、タップで次 (敵のカウンター) に進ませる。
// battleHitEnemy 側の typewriter が動いている途中から呼んでも、
// _battleDialogAdvance が「まず typewriter を即完了 → 次タップで onTap 発火」
// の二段階で動くので子供が読み急がされない。
function _awaitTapOnLog(onTap, minDelayMs) {
  _battleDialogBind();
  _battleDialog.queue = [];
  _battleDialog.onDone = onTap || null;
  _battleDialog.active = true;
  _battleDialog._minShowUntil = Date.now() + (minDelayMs != null ? minDelayMs : 300);
  _battleDialogSetAwait(true);
}

// ===== バトル登場演出: カーテン + 敵ドン表示 → 名前告知 → タップで挑発 → タップで前進 =====
// ユーザー要望 (2026-04-20): 子供が読めるペースで進められるように、
// 一方的なタイマー進行をやめて各ダイアログをタップで手動送りにする。
function _showBattleEncounterIntro(onDone) {
  const enemy = _battle.enemy;
  if (!enemy) { if (onDone) onDone(); return; }

  // 中ボス (boss:true) は「中ボス あらわる！」モーダルを先に挟んでから本編へ。
  if (enemy.boss) {
    _presentBattleModal({
      icon: '⚠️',
      title: '中ボス あらわる！',
      body: '<strong>' + enemy.name + '</strong><br>が たちはだかる！',
      button: 'たたかう！',
      next: function() { _showBattleEncounterIntroCore(onDone); }
    });
    return;
  }
  _showBattleEncounterIntroCore(onDone);
}

function _showBattleEncounterIntroCore(onDone) {
  const enemy = _battle.enemy;
  if (!enemy) { if (onDone) onDone(); return; }

  // エンカウントでバトル BGM へ切替 (マップ BGM からの遷移)
  try { setBgmFor('battle'); } catch (e) {}

  // バトルステージを「カーテンの裏」で表示可能な状態に戻す。
  // カーテン (z-index 1300, opaque 黒) が覆っているので、ここで display を
  // 戻してもユーザーには見えない。カーテンがフェードアウトした瞬間にバトル
  // 画面が自然に現れる。
  const _stageEls = _battleEls();
  if (_stageEls.stage) _stageEls.stage.style.display = '';

  // Phase A: カーテンだけ先に出す (まだ敵は登場しない)。
  // ユーザー要望 (2026-04-20): いきなりモンスターが出てこないから、
  // エンカウント前のナレーションを 2 ステップ見せてから敵を登場させる。
  // さらに「〇〇は あるいていた…」の間、move.png で歩く勇者を左から右へ流す。
  // 行ラベルからステージを取得 (森/洞窟/火山/城)
  const _rowLbl = (_rowPracticeRow && _rowPracticeRow.label) || 'あ';
  const _stage = _stageForRow(_rowLbl);

  const curtain = document.createElement('div');
  curtain.className = 'battle-intro-curtain stage-' + _stage;
  // ステージ別背景 (緩やかスクロール) を先に貼る。phase 2 (敵登場) でフェードアウトさせる。
  const forest = document.createElement('div');
  forest.className = 'battle-intro-forest';
  curtain.appendChild(forest);
  document.body.appendChild(curtain);

  // 歩行アニメ: カーテンの手前・ログの後ろに重ねる
  const walkWrap = document.createElement('div');
  walkWrap.className = 'battle-intro-hero-wrap';
  walkWrap.innerHTML = '<div class="hero-sprite move"></div>';
  document.body.appendChild(walkWrap);

  // Phase 1: エンカウント前ナレーション (ステージに合わせた情景でタップ送り)
  const heroName = _battleHeroName();
  const preMessages = _stageIntroNarration(_stage, heroName);

  _showBattleDialog(preMessages, function() {
    // 歩きを止めてフェードアウト + 森もフェードアウト → 敵登場へ
    try { walkWrap.classList.add('walk-off'); } catch (e) {}
    try { curtain.classList.add('forest-out'); } catch (e) {}
    setTimeout(function() { if (walkWrap.parentNode) walkWrap.remove(); }, 620);

    // Phase 2: 敵ドン登場 + エンカウントジングル
    const img = document.createElement('img');
    img.className = 'battle-intro-enemy';
    img.onerror = function() { this.onerror = null; this.src = '../assets/images/monsters/chars/monster_005.png'; };
    img.src = enemy.img;
    img.alt = enemy.name;
    curtain.appendChild(img);
    try { playEncounterJingle(); } catch (e) {}

    // Phase 3: 名前告知 → 挑発 (各タップで送る)
    const postMessages = [
      { lines: [enemy.name + 'が あらわれた！', ''], opts: { line1Class: 'dq-line-emphasis' } },
    ];
    // v265: taunts が phased 構造 (p1/p2/p3/bow/leave) に変わったので、登場時は p1 の先頭を使う
    let introTaunt = null;
    if (enemy.taunts) {
      if (Array.isArray(enemy.taunts) && enemy.taunts[0]) introTaunt = enemy.taunts[0];
      else if (enemy.taunts.p1 && enemy.taunts.p1[0]) introTaunt = enemy.taunts.p1[0];
    }
    if (introTaunt) {
      postMessages.push({ lines: [enemy.name, '「' + introTaunt + '」'] });
    }

    // 敵登場アニメが落ち着くまで少し待ってから次のダイアログ
    setTimeout(function() {
      _showBattleDialog(postMessages, function() {
        setTimeout(function() {
          curtain.classList.add('fade-out');
          // 画面がバトル画面に切り替わる瞬間にログ枠を DOM フロー位置 (なぞり書きの上) に戻す
          // (2026-04-20 ユーザー指示: 画面が切り替わったらすぐ変える)
          document.body.classList.remove('battle-intro-active');
        }, 150);
        setTimeout(function() {
          if (curtain.parentNode) curtain.remove();
          if (onDone) onDone();
        }, 750);
      });
    }, 600);
  });
}

// _showEnemySpeech: バトル中は上部吹き出しではなくログに集約する

function _hideBattleStage() {
  const els = _battleEls();
  if (!els.stage) return;
  _battle.active = false;
  // 遅延中の立ち絵差し替えタイマーを全部止める (バトル終了後に画像が入れ替わる事故を防止)
  try { _clearEnemyFrameTimers(); } catch (e) {}
  // バトルログの残留メッセージ (「よくがんばった」等) を空にする。
  // 次の行がパズル行の場合は _showPuzzleStage 側で案内文に上書きされる。
  try { _setBattleLog(['', '', ''], { animate: false }); } catch (e) {}
  els.stage.style.display = 'none';
  els.stage.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('battle-mode');
  const md = document.getElementById('monsterDeco');
  if (md) md.style.display = '';
  // 「たおした！」ウィンドウが残っていれば念のため消す
  try { _hideDefeatedWindow(); } catch (e) {}
}

// ===== 謎解き行 (か/な/ら) =====
// か行 = 「こわれた はし」橋板パズル。
// 1文字書き切るごとに板1枚を出現 (.placed)、5枚目で全板 .finisher グロー。
// バトルとは同じ canvas/writer 基盤を使い、完了後分岐だけ差し替える。
const PUZZLE_ROWS = {
  'か': { kind: 'bridge',    title: 'こわれた はし',        hint: 'もじを なぞって はしを なおそう！',     chars: ['か','き','く','け','こ'] },
  'カ': { kind: 'bridge',    title: 'こわれた はし',        hint: 'もじを なぞって はしを なおそう！',     chars: ['カ','キ','ク','ケ','コ'] },
  // な行: ほこらの番人 (石像) が妖精を封印している。文字をなぞると石板が五芒星スロットにはまり、
  // 5枚揃えると封印解除 → 扉が開く → 囚われた妖精を解放 → 妖精が仲間に。
  'な': { kind: 'riddle',    title: 'ふういんの ほこら',     hint: 'もじを なぞって ふういんを とこう！',  chars: ['な','に','ぬ','ね','の'] },
  'ナ': { kind: 'riddle',    title: 'フウインの ホコラ',     hint: 'もじを なぞって ふういんを とこう！',  chars: ['ナ','ニ','ヌ','ネ','ノ'] },
  // ら行: 火山の溶岩にかかる「とびいし」。文字をなぞる=呪文発動で飛び石が 1 つ浮上。
  // 5文字書くと 5石揃い道になる → 勇者が飛び石を渡る = ゴーレム退散。
  'ら': { kind: 'lava_step', title: 'ようがんの とびいし',   hint: 'じゅもんを かいて とびいしを よびだそう！', chars: ['ら','り','る','れ','ろ'] },
  'ラ': { kind: 'lava_step', title: 'ヨウガンの トビイシ',   hint: 'じゅもんを かいて とびいしを よびだそう！', chars: ['ラ','リ','ル','レ','ロ'] },
};
function _isPuzzleRow(label) { return !!PUZZLE_ROWS[label]; }

const _puzzle = { active: false, kind: null, step: 0, total: 5, chars: [] };

function _puzzleEls() {
  return {
    stage:  document.getElementById('puzzleStage'),
    title:  document.getElementById('puzzleTitle'),
    planks: document.getElementById('puzzlePlanks'),
    hint:   document.getElementById('puzzleHint'),
  };
}

function _showPuzzleStage(rowLabel) {
  const els = _puzzleEls();
  const def = PUZZLE_ROWS[rowLabel];
  if (!els.stage || !def) return;
  _puzzle.active = true;
  _puzzle.kind = def.kind;
  _puzzle.step = 0;
  _puzzle.total = def.chars.length;
  _puzzle.chars = def.chars.slice();
  _puzzle.fairyFreed = false;

  // 前の行のバトルログ (「よくがんばった！」等) が残らないよう、パズル行の案内に差し替え。
  const _puzzleIntro = {
    bridge:    ['もじを なぞって', 'はしを なおそう！'],
    tablet:    ['もじを なぞって', 'せきばんの ふういんを とこう！'],
    lava_step: ['もじを なぞって', 'ようがんを わたろう！'],
    riddle:    ['もじを なぞって', 'ほこらの ふういんを とこう！'],
  };
  try {
    const lines = _puzzleIntro[def.kind] || ['もじを なぞって', 'パズルを とこう！'];
    _setBattleLog(lines, { line2Class: 'dmg-line' });
  } catch (e) {}

  if (els.title) els.title.textContent = def.title;
  if (els.hint)  els.hint.textContent  = def.hint;

  // 背景・板スタイルを kind に応じて切り替え (bridge / tablet / lava_step)。
  // 既存の puzzle-bg-bridge に加え、puzzle-bg-tablet / puzzle-bg-lava_step を用意。
  if (els.stage) {
    els.stage.classList.remove('puzzle-bg-bridge', 'puzzle-bg-tablet', 'puzzle-bg-lava_step', 'puzzle-bg-riddle', 'fixed', 'pedestal-focused', 'complete');
    for (let i = 1; i <= 5; i++) els.stage.classList.remove('step-' + i);
    els.stage.classList.add('puzzle-bg-' + def.kind);
  }

  // 前回ぶんの lava_step 用残骸を掃除 (浮上済みの石・閃光・旧ゴーレム) + 前回 bridge の妖精
  if (els.stage) {
    els.stage.querySelectorAll('.lava-golem-bg, .lava-burst, .lava-rising-stone, .lava-walker, .lava-fairy, .lava-magic-burst, .bridge-fairy, .bridge-magic-burst').forEach(function(n) { n.remove(); });
  }

  // か行 bridge: 出会いイントロで妖精登場済み。パズル中は妖精スプライトがステージ右上に常駐し、
  // 各文字完成時に次の板へ飛んで魔法で変化させる (_puzzleRevealPlank 内で駆動)。
  if (def.kind === 'bridge' && els.stage) {
    var bf = document.createElement('div');
    bf.className = 'bridge-fairy';
    // 2026-04-22: emoji を pixies/pixy_forest.png 立ち絵に差し替え (森の妖精: 緑色)
    var bfImg = document.createElement('img');
    bfImg.src = '../assets/images/characters/pixies/pixy_forest.png';
    bfImg.alt = 'もりの ようせい';
    bfImg.style.cssText = 'width:100%;height:100%;object-fit:contain;image-rendering:pixelated;pointer-events:none;';
    bf.appendChild(bfImg);
    bf.dataset.placed = '0';
    els.stage.appendChild(bf);
  }

  // 板5枚を生成 (初期は非表示 .plank = opacity:0)
  if (els.planks) {
    els.planks.innerHTML = '';
    if (def.kind === 'lava_step') {
      // ら行: 背景 lava_steps_0.png (空の溶岩) を下敷きに、stone_N.png を下から浮上させて定着。
      // 石が浮上してもフェード消失させず、最終位置に残り続ける (シームレス化 2026-04-22)。
      // 敵キャラ (🗿 ようがんゴーレム) は出さない (「番人と戦わない」方針を lava にも適用)。
      if (els.stage) {
        for (let i = 1; i <= 5; i++) els.stage.classList.remove('step-' + i);
        // 残骸 (前回ランのstone-placed) をクリア
        els.stage.querySelectorAll('.lava-rising-stone').forEach(function(n) { n.remove(); });
      }
    } else {
      // riddle 行は SVG viewBox を使って画像ピクセル座標で石板を配置する。
      // 背景 (shrine_seal_vacant.png) は CSS background:cover で敷かれているが、SVG も
      // preserveAspectRatio="xMidYMid slice" で同じクロップ挙動になるため両者は必ず
      // ピクセル単位で一致する (端末アスペクトに依存しない)。(2026-04-22 SVG化)
      if (def.kind === 'riddle') {
        var SVG_NS = 'http://www.w3.org/2000/svg';
        // shrine_seal_vacant.png (1920x1080) 上の空スロット (88x88px 暗部) 中心をピクセル解析
        // 順番は PUZZLE_ROWS chars の [な,に,ぬ,ね,の] 順に対応。
        var SHRINE_SLOTS = [
          { cx: 968, cy: 320 }, // な: 上 (2026-04-22 微調整 +3px 右)
          { cx: 1172, cy: 484 }, // に: 右上
          { cx: 1092, cy: 716 }, // ぬ: 右下
          { cx: 843,  cy: 716 }, // ね: 左下
          { cx: 765,  cy: 483 }  // の: 左上
        ];
        var TILE_SZ = 88; // shrine_seal_vacant.png の空スロット実寸 (88x88)
        var svg = document.createElementNS(SVG_NS, 'svg');
        svg.setAttribute('class', 'shrine-svg');
        svg.setAttribute('viewBox', '0 0 1920 1080');
        svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
        els.planks.appendChild(svg);

        var _rmap = {
          'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
          'ナ':'na','ニ':'ni','ヌ':'nu','ネ':'ne','ノ':'no'
        };
        def.chars.forEach(function(ch, idx) {
          var rom = _rmap[ch] || 'na';
          var slot = SHRINE_SLOTS[idx] || SHRINE_SLOTS[0];
          var img = document.createElementNS(SVG_NS, 'image');
          img.setAttribute('class', 'plank-riddle tablet-slot-' + idx);
          // href (モダン) と xlink:href (Safari 古いバージョン) の両方を設定
          var src = '../assets/images/puzzle/tablet/shrine_tile_' + rom + '.png';
          img.setAttribute('href', src);
          img.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', src);
          img.setAttribute('x', String(slot.cx - TILE_SZ / 2));
          img.setAttribute('y', String(slot.cy - TILE_SZ / 2));
          img.setAttribute('width', String(TILE_SZ));
          img.setAttribute('height', String(TILE_SZ));
          svg.appendChild(img);
        });
      } else {
        def.chars.forEach(function(ch, idx) {
          const p = document.createElement('span');
          p.className = 'plank plank-' + def.kind;
          p.textContent = ch;
          els.planks.appendChild(p);
        });
      }
    }
  }

  els.stage.style.display = '';
  els.stage.setAttribute('aria-hidden', 'false');
  document.body.classList.add('battle-mode'); // ポノ/ハリネズミを隠す (集中のため)

  // 封印された妖精は隠す (同一キャンバス内の干渉を避ける)
  const md = document.getElementById('monsterDeco');
  if (md) md.style.display = 'none';

  // 保険: 前行の battle-stage が残っていて、上に半透明オーバーレイが被さった際に
  // 敵スプライトがゴーストとして透けて見える報告あり。明示的に display:none を再設定する。
  const _bs = document.getElementById('battleStage');
  if (_bs) { _bs.style.display = 'none'; _bs.setAttribute('aria-hidden', 'true'); }
}

function _hidePuzzleStage() {
  const els = _puzzleEls();
  _puzzle.active = false;
  _puzzle.kind = null;
  _puzzle.step = 0;
  _puzzle.chars = [];
  if (!els.stage) return;
  els.stage.style.display = 'none';
  els.stage.setAttribute('aria-hidden', 'true');
  els.stage.classList.remove('complete', 'pedestal-focused');
  // ら行の飛び石ステップクラスをリセット (次回 lava_step で再利用)
  for (let i = 1; i <= 5; i++) els.stage.classList.remove('step-' + i);
  els.stage.querySelectorAll('.pedestal-burst, .lava-burst, .lava-golem-bg, .lava-walker, .lava-rising-stone, .lava-fairy, .lava-magic-burst, .shrine-door, .shrine-walker, .shrine-door-banner, .bridge-fairy, .bridge-magic-burst').forEach(function(b) { b.remove(); });
  if (els.planks) { els.planks.style.opacity = ''; els.planks.style.transition = ''; }
  document.body.classList.remove('battle-mode');
  const md = document.getElementById('monsterDeco');
  if (md) md.style.display = '';
}

// 祠の扉演出: 5枚目の石板がハマった後に呼ぶ。
// 扉が奥から浮上 → ルーンが灯り → 左右に開く → 勇者が左から扉へ歩いて消える。
// 所要時間 約5秒。done コールバックで次の行へ進める。
function _buildShrineDoor(onDone) {
  const stage = _puzzleEls().stage;
  if (!stage) { if (onDone) onDone(); return; }
  // バナー (「どうくつの おくへ!」) は扉が完全に開いた頃に出す
  const banner = document.createElement('div');
  banner.className = 'shrine-door-banner';
  banner.textContent = 'どうくつの おくへ すすもう！';
  // 扉本体
  const door = document.createElement('div');
  door.className = 'shrine-door';
  const frame = document.createElement('div');
  frame.className = 'shrine-door-frame';
  const light = document.createElement('div');
  light.className = 'shrine-door-light';
  const halfL = document.createElement('div');
  halfL.className = 'shrine-door-half left';
  const halfR = document.createElement('div');
  halfR.className = 'shrine-door-half right';
  door.appendChild(frame);
  door.appendChild(light);
  door.appendChild(halfL);
  door.appendChild(halfR);
  stage.appendChild(door);
  stage.appendChild(banner);
  // ① 石板をフェードアウトして道を開ける
  const planksBox = _puzzleEls().planks;
  if (planksBox) {
    planksBox.style.transition = 'opacity 0.7s ease';
    planksBox.style.opacity = '0.15';
  }
  // ② 扉せり上がり
  requestAnimationFrame(function() {
    setTimeout(function() { door.classList.add('rising'); }, 40);
    // ③ 扉が開く
    setTimeout(function() { door.classList.add('open'); }, 1100);
    // ④ 勇者が歩いてくる (扉が開き始めた頃にスポーン)
    setTimeout(function() {
      const walker = document.createElement('div');
      walker.className = 'shrine-walker hero-sprite move';
      stage.appendChild(walker);
    }, 1600);
    // ⑤ 歩き終わった頃に次へ
    setTimeout(function() { if (onDone) onDone(); }, 4600);
  });
}

// ===== な行: ほこらのまもりがみの 3択なぞなぞ =====
// 各文字で 1問。正解で次の字へ、不正解はシェイク+再試行 (ゲームオーバー無し、子供のペース)。
// 絵文字データは CHAR_WORDS (L3397-) と同じ語を流用。
const RIDDLES = {
  'な': { question: '「な」で はじまるのは どれ？', correct: { emoji: '🍐', word: 'なし' },        wrong: [{ emoji: '🍎', word: 'りんご' }, { emoji: '🍌', word: 'ばなな' }] },
  'に': { question: '「に」で はじまるのは どれ？', correct: { emoji: '🐓', word: 'にわとり' },    wrong: [{ emoji: '🐶', word: 'いぬ' },   { emoji: '🐱', word: 'ねこ' }] },
  'ぬ': { question: '「ぬ」で はじまるのは どれ？', correct: { emoji: '🧸', word: 'ぬいぐるみ' },  wrong: [{ emoji: '⏰', word: 'とけい' }, { emoji: '📕', word: 'ほん' }] },
  'ね': { question: '「ね」で はじまるのは どれ？', correct: { emoji: '🐱', word: 'ねこ' },        wrong: [{ emoji: '🐰', word: 'うさぎ' }, { emoji: '🐸', word: 'かえる' }] },
  'の': { question: '「の」で はじまるのは どれ？', correct: { emoji: '🚗', word: 'のりもの' },    wrong: [{ emoji: '🍚', word: 'ごはん' }, { emoji: '🏠', word: 'いえ' }] },
  'ナ': { question: '「ナ」で はじまるのは どれ？', correct: { emoji: '🍆', word: 'ナス' },        wrong: [{ emoji: '🍎', word: 'リンゴ' }, { emoji: '🍌', word: 'バナナ' }] },
  'ニ': { question: '「ニ」で はじまるのは どれ？', correct: { emoji: '🥕', word: 'ニンジン' },    wrong: [{ emoji: '🍞', word: 'パン' },   { emoji: '🥛', word: 'ミルク' }] },
  'ヌ': { question: '「ヌ」で はじまるのは どれ？', correct: { emoji: '🍜', word: 'ヌードル' },    wrong: [{ emoji: '🍣', word: 'スシ' },   { emoji: '🍩', word: 'ドーナツ' }] },
  'ネ': { question: '「ネ」で はじまるのは どれ？', correct: { emoji: '👔', word: 'ネクタイ' },    wrong: [{ emoji: '🎩', word: 'ボウシ' }, { emoji: '👟', word: 'スニーカー' }] },
  'ノ': { question: '「ノ」で はじまるのは どれ？', correct: { emoji: '📓', word: 'ノート' },      wrong: [{ emoji: '📕', word: 'ホン' },   { emoji: '✏️', word: 'エンピツ' }] },
};

function _showRiddle(char, onCorrect) {
  const r = RIDDLES[char];
  if (!r) { if (onCorrect) onCorrect(); return; }
  const options = [r.correct].concat(r.wrong);
  // シャッフル (Fisher-Yates)
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = options[i]; options[i] = options[j]; options[j] = tmp;
  }
  const correctWord = r.correct.word;

  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;z-index:1680;background:radial-gradient(ellipse at 50% 30%,rgba(255,140,60,0.28) 0%,rgba(10,5,18,0.88) 72%);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 0.4s ease;padding:20px;';

  const guardian = document.createElement('div');
  guardian.textContent = '🗿';
  guardian.style.cssText = 'font-size:3.8rem;margin-bottom:12px;filter:drop-shadow(0 0 22px rgba(140,200,255,0.75));animation:guardianFloat 1.8s ease-in-out infinite;';
  ov.appendChild(guardian);

  const bubble = document.createElement('div');
  bubble.textContent = r.question;
  bubble.style.cssText = 'background:linear-gradient(180deg,rgba(255,245,210,0.98),rgba(255,220,160,0.96));color:#5a2f08;font-size:1.2rem;font-weight:900;padding:16px 24px;border-radius:22px;border:3px solid #8B4513;box-shadow:0 6px 22px rgba(0,0,0,0.6);margin-bottom:26px;max-width:90vw;text-align:center;line-height:1.5;';
  ov.appendChild(bubble);

  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:14px;justify-content:center;flex-wrap:wrap;max-width:95vw;';
  options.forEach(function(opt) {
    const btn = document.createElement('button');
    btn.style.cssText = 'background:linear-gradient(180deg,#fffdf2,#ffe8b8);border:4px solid #C68E3A;border-radius:22px;padding:14px 10px 10px;cursor:pointer;font-family:inherit;width:26vw;max-width:120px;min-width:90px;box-shadow:0 6px 14px rgba(0,0,0,0.45),inset 0 2px 6px rgba(255,255,255,0.7);display:flex;flex-direction:column;align-items:center;transition:transform 0.15s ease;';
    btn.innerHTML = '<div style="font-size:2.9rem;line-height:1;margin-bottom:6px;">' + opt.emoji + '</div>' +
                    '<div style="font-size:0.88rem;font-weight:900;color:#5a2f08;">' + opt.word + '</div>';
    btn.addEventListener('click', function() {
      if (opt.word === correctWord) {
        btn.style.background = 'linear-gradient(180deg,#fff9c4,#ffe066)';
        btn.style.transform = 'scale(1.14)';
        btn.style.boxShadow = '0 0 34px rgba(255,220,80,0.95),0 6px 14px rgba(0,0,0,0.45)';
        row.querySelectorAll('button').forEach(function(b) { if (b !== btn) { b.style.opacity = '0.25'; b.disabled = true; } });
        try { if (typeof window.playFanfare === 'function') window.playFanfare(); } catch (e) {}
        const praise = document.createElement('div');
        praise.textContent = 'せいかい！';
        praise.style.cssText = 'position:absolute;top:14%;left:50%;transform:translateX(-50%);font-size:2.2rem;font-weight:900;color:#FFEB50;text-shadow:0 0 16px rgba(255,200,80,0.95),0 3px 6px rgba(0,0,0,0.75);animation:praisePop 0.65s cubic-bezier(0.3,1.6,0.5,1);';
        ov.appendChild(praise);
        setTimeout(function() {
          ov.style.transition = 'opacity 0.4s ease';
          ov.style.opacity = '0';
          setTimeout(function() { ov.remove(); if (onCorrect) onCorrect(); }, 400);
        }, 1150);
      } else {
        btn.style.animation = 'wrongShake 0.45s ease';
        btn.style.background = 'linear-gradient(180deg,#ffd4d4,#f08080)';
        setTimeout(function() {
          btn.style.animation = '';
          btn.style.background = 'linear-gradient(180deg,#fffdf2,#ffe8b8)';
        }, 700);
      }
    });
    row.appendChild(btn);
  });
  ov.appendChild(row);
  document.body.appendChild(ov);
}

// ===== 封印された扉のワイドショット =====
// riddle 行に入る直前に 1枚: 「洞窟の奥に大きな石の扉、封印されて動かない」の状況説明。
// (2026-04-22 v3: 「画像ウィンドウに文字を入れない」方針でオーバーレイ上のナレーションを撤去。
//   ワイドショット画像は puzzleStage が表示される前に 1.8s 見せて自動フェードアウト。
//   状況説明セリフは _showPuzzleStage 後の _showPuzzleIntro が battleLog に流す。)
function _showSealedDoorScene(onDone) {
  var ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;z-index:1710;background:#000;animation:fadeIn 0.5s ease;cursor:pointer;overflow:hidden;';

  var bg = document.createElement('img');
  bg.src = '../assets/images/puzzle/tablet/shrine_seal_1st.png';
  bg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;image-rendering:pixelated;z-index:0;opacity:0;transition:opacity 0.8s ease;';
  ov.appendChild(bg);
  setTimeout(function() { bg.style.opacity = '1'; }, 20);

  var done = false;
  function close() {
    if (done) return;
    done = true;
    ov.style.transition = 'opacity 0.5s ease';
    ov.style.opacity = '0';
    setTimeout(function() { if (ov.parentNode) ov.remove(); if (onDone) onDone(); }, 520);
  }
  ov.addEventListener('click', close);
  document.body.appendChild(ov);
  // 1.8s 黙って見せて自動クローズ (タップでも即閉じる)
  setTimeout(close, 1800);
}

// ===== パズル行の導入 (な/ら) =====
// (2026-04-22 v3: 「画像ウィンドウに文字を入れない」指摘を受けて全画面テキストオーバーレイ廃止。
//   パズルステージを表に出したまま、封印の奥から とらわれた妖精の声 を
//   バトルメッセージ欄 (_showBattleDialog) で流す。視覚ヒントだけステージ上に足す。)
function _showPuzzleIntro(kind, onDone) {
  var intros = {
    riddle: {
      voiceOf: 'shrine',
      lines: [
        { lines: ['ほらあなの おくに すすむと', 'ひろい ばしょに でた。', ''] },
        { lines: ['おおきな いしの とびら。', '…こおりの ふういんが かかって いる！', ''] },
        { lines: ['…だれか いるの？', 'うごけない… たすけて…！', ''] },
        { lines: ['ザガンの ふういんで、', 'まほうが つかえないの。', ''] },
        { lines: ['もじの ちからで', 'ふういんを といて！', ''] }
      ]
    },
    // (2026-04-24) 炎の妖精が溶岩で捕まっている理由を「魔力の鎖」に変更。
    //              旧「炎の熱で弱らされている」は炎の妖精には不自然なため。
    lava_step: {
      voiceOf: 'fire',
      lines: [
        { lines: ['うごけない… たすけて…！', '', ''] },
        { lines: ['ザガンの まりょくの くさりが', 'わたしを しばって いるの。', ''] },
        { lines: ['もじの ちからで', 'くさりを たちきって！', ''] }
      ]
    }
  };
  var data = intros[kind];
  if (!data) { if (onDone) onDone(); return; }

  // ステージ上に控えめな封印オーブの視覚ヒント (文字ナシ、絵だけ)
  var stage = _puzzleEls().stage;
  var meta = (typeof FAIRY_META !== 'undefined' && FAIRY_META[data.voiceOf]) || { color: '#c8a8ff' };
  var orb = null;
  if (stage) {
    orb = document.createElement('div');
    orb.className = 'puzzle-seal-orb';
    orb.textContent = '🔒';
    orb.style.cssText = 'position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);font-size:clamp(36px,7vw,56px);filter:drop-shadow(0 0 18px ' + meta.color + ') drop-shadow(0 0 34px ' + meta.color + ');animation:sealPulse 2.2s ease-in-out infinite;z-index:6;pointer-events:none;opacity:0;transition:opacity 0.5s ease;';
    stage.appendChild(orb);
    requestAnimationFrame(function() { orb.style.opacity = '0.9'; });
  }

  _showBattleDialog(data.lines, function() {
    // セリフ終了 → オーブをふっと消す (封印が緩むイメージ)
    if (orb) {
      orb.style.transition = 'opacity 0.45s ease, transform 0.6s ease';
      orb.style.opacity = '0';
      orb.style.transform = 'translate(-50%,-50%) scale(1.4)';
      setTimeout(function() { if (orb.parentNode) orb.remove(); }, 700);
    }
    if (onDone) onDone();
  });
}

// か行 橋パズルの導入: 壊れた橋の前で勇者が立ち尽くすと、もりの妖精が登場して協力を申し出る。
// 「ただの折れた木 + 妖精の魔法 = 橋板」という物語上の理由付けをここで確立する。
// (2026-04-22 v2: フルスクリーンオーバーレイ廃止。既存パズルステージ(壊れた橋背景)上で
//   妖精スプライトを登場させ、セリフはバトルログウィンドウに流す。
//   メッセージ間は _showBattleDialog を 1 件ずつ呼ぶ方式で、妖精登場タイミングを制御する。)
function _showBridgeEncounterIntro(onDone) {
  var els = _puzzleEls();
  var fairy = els.stage ? els.stage.querySelector('.bridge-fairy') : null;
  // 妖精はステージに _showPuzzleStage で既に配置済み。イントロ中は中央にフェードイン → 終了後に右上常駐位置へ移動。
  if (fairy) {
    fairy.style.transition = 'none';
    fairy.style.left = '50%';
    fairy.style.top  = '42%';
    fairy.style.opacity = '0';
    // 2026-04-22: scaleX(-1) で左向き (勇者/橋に視線を向ける)。
    fairy.style.transform = 'translate(-50%,-50%) scaleX(-1) scale(0.55)';
  }

  var messages = [
    { lines: ['ゆうしゃ「あっ…', 'はしが おれて いる…」', ''] },
    { lines: ['ゆうしゃ「どうしよう…', 'これじゃ わたれない…」', ''] },
    { lines: ['リーファ「わたし は リーファ。', 'こまって いる の？」', ''] },
    { lines: ['リーファ「ザガン に さらわれた', 'おひめさま を さがして いる の ね。」', ''] },
    { lines: ['リーファ「わたしも ちから を かす わ！」', '', ''] },
    { lines: ['リーファ「もじ を なぞって。', 'おれた き を まほう で', 'はし の いた に かえて あげる！」'] }
  ];
  var fairyRevealAt = 2; // この index のメッセージ表示タイミングで妖精フェードイン

  function showNext(i) {
    if (i === fairyRevealAt && fairy) {
      fairy.style.transition = 'opacity 0.7s ease, transform 0.8s cubic-bezier(0.34,1.56,0.64,1)';
      fairy.style.opacity = '1';
      fairy.style.transform = 'translate(-50%,-50%) scaleX(-1) scale(1)';
      try { if (typeof playSE === 'function') playSE('sparkle'); } catch (e) {}
    }
    if (i >= messages.length) {
      if (fairy) {
        // イントロ終了 → 妖精が待機位置へ。位置は 72%/22% に変更 (旧 82%/18% は右端切れ)。
        fairy.style.transition = 'left 0.6s ease, top 0.6s ease, transform 0.6s ease';
        fairy.style.left = '72%';
        fairy.style.top  = '22%';
        fairy.dataset.placed = '0';
        // 移動完了後、inline transform を除去 → CSS animation (scaleX(-1) 込み) に制御を返す
        setTimeout(function() {
          if (fairy) { fairy.style.transform = ''; fairy.style.transition = ''; }
        }, 650);
      }
      setTimeout(function() { if (onDone) onDone(); }, 420);
      return;
    }
    _showBattleDialog([messages[i]], function() { showNext(i + 1); });
  }
  showNext(0);
}

function _puzzleRevealPlank(opts) {
  const els = _puzzleEls();
  if (!els.planks) return;
  const planks = els.planks.querySelectorAll('.plank, .plank-riddle');
  const idx = _puzzle.step;
  if (idx < 0 || idx >= planks.length) return;
  const plank = planks[idx];
  const isFinisher = !!(opts && opts.finisher);
  // か行 bridge: 各文字完成時に妖精が次の板まで飛んで魔法で変化させる演出。
  // finisher (5枚目) でも同じフローで飛ぶ (最終板をキラキラで変化 → その後橋完成演出へ)。
  if (_puzzle.kind === 'bridge' && els.stage) {
    _bridgeFairyDeliverPlank(plank, els.stage, function() {
      plank.classList.add('placed');
      _puzzleRevealPlankAfter(opts, plank, planks, els);
    });
    return;
  }
  plank.classList.add('placed');
  _puzzleRevealPlankAfter(opts, plank, planks, els);
}

// 妖精が指定 plank の位置まで飛び、到着時にスパークル爆発 → plank が魔法で板に変化 (onArrive コールバック)。
// (2026-04-22) 勇者の視界に妖精が「板を運んで修復する」流れを可視化するためのヘルパ。
function _bridgeFairyDeliverPlank(plank, stage, onArrive) {
  var fairy = stage.querySelector('.bridge-fairy');
  if (!fairy) { if (onArrive) onArrive(); return; }
  // 初回 (placed=0) は右上から飛び込んで来る → plank 位置へ
  var firstVisit = fairy.dataset.placed === '0';
  if (firstVisit) {
    fairy.style.transition = 'none';
    // 2026-04-22: 位置を 72%/22% に変更 (右端切れ対策)。transform は CSS animation に委ねる。
    fairy.style.left = '72%';
    fairy.style.top  = '22%';
    fairy.style.transform = '';
    fairy.style.opacity = '0';
    // 1フレーム後にフェードイン + 位置計算
    requestAnimationFrame(function() { fairy.style.opacity = '1'; });
  }
  fairy.dataset.placed = String(parseInt(fairy.dataset.placed, 10) + 1);

  // plank の中心座標を stage 相対に変換
  var sr = stage.getBoundingClientRect();
  var pr = plank.getBoundingClientRect();
  var cx = pr.left + pr.width / 2 - sr.left;
  var cy = pr.top  + pr.height / 2 - sr.top;
  // plank の少し上 (妖精が覆いかぶさる位置) = pr.height * 0.55 上
  var hoverY = cy - pr.height * 0.55;
  var leftPct = (cx / sr.width) * 100;
  var topPct  = (hoverY / sr.height) * 100;

  // 飛行開始 (初回はフェードイン遅延を加味して 50ms 遅らせる)
  setTimeout(function() {
    fairy.style.transition = 'left 0.7s cubic-bezier(0.4, 0, 0.2, 1), top 0.7s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease';
    fairy.style.left = leftPct.toFixed(2) + '%';
    fairy.style.top  = topPct.toFixed(2)  + '%';
  }, firstVisit ? 80 : 20);

  // 到着 (0.7s) → 魔法バースト + 板が出現
  setTimeout(function() {
    // スパークル爆発を plank の位置に重ねる
    var burst = document.createElement('div');
    burst.className = 'bridge-magic-burst';
    burst.style.left = ((cx / sr.width) * 100).toFixed(2) + '%';
    burst.style.top  = ((cy / sr.height) * 100).toFixed(2) + '%';
    stage.appendChild(burst);
    setTimeout(function() { if (burst.parentNode) burst.remove(); }, 900);
    try { if (typeof playSE === 'function') playSE('sparkle'); } catch (e) {}
    if (onArrive) onArrive();
  }, firstVisit ? 780 : 720);
}

function _puzzleRevealPlankAfter(opts, plank, planks, els) {
  if (opts && opts.finisher) {
    // 5枚目完成: 全板をふわっと光らせる演出 (橋完成のお祝い)
    try { playVictoryFanfare(); } catch (e) {}
    // 橋パズル演出シーケンス (2026-04-21 ユーザー要望):
    //   ① 5枚の板 (四角ブロック) ごと消す (opacity フェード ~350ms)
    //   ② 壊れた橋 ↔ 直った橋 を 200ms 間隔で交互点滅 (合計 800ms)
    //   ③ 直った状態でロック → 白い閃光
    //   ④ 勇者が左→右に歩いて渡る
    if (_puzzle.kind === 'bridge' && els.stage) {
      // ① まず 5枚目 (こ) をしっかり見せるためワンテンポ待機 (900ms)
      //    → その後に四角ブロックごとフェードアウト + 妖精を退避
      setTimeout(function() {
        planks.forEach(function(pl) {
          pl.style.transition = 'opacity 0.35s ease-out, transform 0.35s ease-out';
          pl.style.opacity = '0';
          pl.style.transform = 'translateY(10px) scale(0.85)';
        });
        var bf = els.stage.querySelector('.bridge-fairy');
        if (bf) {
          bf.style.transition = 'opacity 0.4s ease, top 0.5s ease';
          bf.style.opacity = '0';
          bf.style.top = '-8%';
        }
      }, 900);

      // ブロック消失完了 (900 + 400ms = 1300ms) を待ってから交互点滅開始
      setTimeout(function() {
        // ② 交互点滅: 200ms 毎に .fixed を toggle
        var _toggleCount = 0;
        var _maxToggles = 5; // broken→fixed→broken→fixed→broken→fixed (計 5 切替)
        var _flashTimer = setInterval(function() {
          _toggleCount++;
          if (_toggleCount >= _maxToggles) {
            clearInterval(_flashTimer);
            // ③ 最終状態は必ず fixed
            els.stage.classList.add('fixed');
            // 白い閃光 (1.1s)
            try {
              const shine = document.createElement('div');
              shine.className = 'bridge-shine';
              els.stage.appendChild(shine);
              setTimeout(function() { if (shine.parentNode) shine.remove(); }, 1300);
            } catch (e) {}
            // (2026-04-22) 勇者の渡りアニメはここでは動かさない。
            // セリフ (妖精の別れ) が全て終わった後に渡す方針へ変更 → _waterFairyFarewell 内で spawn。
          } else {
            els.stage.classList.toggle('fixed');
          }
        }, 200);
      }, 1300);
    } else {
      // 橋以外のパズル (tablet/lava_step): 従来どおり glow 演出
      planks.forEach(function(pl) { pl.classList.add('finisher'); });
    }
  } else {
    try { playCharCompleteSound(); } catch (e) {}
  }
}

function _showEnemySpeech(text, ms) {
  if (!text) return;
  // バトル中はログウィンドウに「〇〇「セリフ」」で表示
  if (_battle.active) {
    const enemyName = (_battle.enemy && _battle.enemy.name) || 'てき';
    _setBattleLog([enemyName, '「' + text + '」']);
    return;
  }
  // バトル外 (念のため互換残し): 旧吹き出し表示
  const { speech } = _battleEls();
  if (!speech) return;
  speech.textContent = text;
  speech.classList.add('show');
  clearTimeout(_showEnemySpeech._t);
  _showEnemySpeech._t = setTimeout(() => speech.classList.remove('show'), ms || 1800);
}

function _popDamage(amount, opts) {
  const { popLayer } = _battleEls();
  if (!popLayer) return;
  const d = document.createElement('div');
  d.className = 'damage-pop' + (opts && opts.finisher ? ' finisher' : '');
  d.textContent = amount;
  // 敵の中心少し上にばらけさせる
  const jitterX = (Math.random() - 0.5) * 40;
  d.style.left = (50 + jitterX / 2) + '%';
  d.style.top  = (opts && opts.finisher ? '45%' : '40%');
  popLayer.appendChild(d);
  setTimeout(() => d.remove(), 900);
}

// 敵立ち絵差し替え (ゴーレムのような多段フレーム敵用)。
// 現在表示中と同じ src の場合は何もしない (flicker 防止)。
function _swapEnemyImg(src) {
  if (!src) return;
  const els = _battleEls();
  if (!els.img) return;
  // 部分一致で判定 (絶対パス化される環境でも差し替えスキップが効くように)
  if (els.img.src && els.img.src.indexOf(src.replace(/^\.\.\//, '')) !== -1) return;
  els.img.src = src;
}

// 現在 HP に応じた立ち絵 src を返す。
// imgHp を hpAtMost の降順 (7→5→3→1) で評価し、_battle.hp <= row.hpAtMost を満たすものを順に上書き。
// 結果として最後に書き込まれる値 = 最も小さい hpAtMost を満たすエントリ = 最重傷状態の画像が選ばれる。
function _enemyImgForHp() {
  const e = _battle.enemy;
  if (!e) return null;
  const defaultImg = e.imgIdle || e.img;
  if (!e.imgHp || !e.imgHp.length) return defaultImg;
  let chosen = defaultImg;
  const sorted = e.imgHp.slice().sort(function(a, b) { return (b.hpAtMost || 0) - (a.hpAtMost || 0); });
  for (const row of sorted) {
    if (_battle.hp <= row.hpAtMost) chosen = row.src;
  }
  return chosen;
}

// 敵の攻撃アニメ用タイマー一括クリア。バトル終了や敵倒時に呼ぶ。
function _clearEnemyFrameTimers() {
  try { clearTimeout(_battle._frameSwapTimer); } catch (e) {}
  try { clearTimeout(_battle._frameRevertTimer); } catch (e) {}
  if (Array.isArray(_battle._windupTimers)) {
    _battle._windupTimers.forEach(function(tid) {
      try { clearTimeout(tid); } catch (e) {}
    });
  }
  _battle._windupTimers = [];
}

// 1 文字完成時に呼ばれる: HP 1 減らして星 1 点灯
// (2026-04-20 ユーザー要望: 剣を振り切る前に敵が揺れるのは早すぎ。攻撃モーションの「着弾」タイミングに
//  合わせて敵シェイク・被弾 SFX・ダメージ数字・敵セリフを遅延発火する。)
function battleHitEnemy(opts) {
  if (!_battle.active) return;
  const els = _battleEls();
  _battle.hitCount++;
  const isFinisher = !!(opts && opts.finisher);
  // 通常攻撃は 1 ダメージ、最終魔法 (5 文字目) は残り HP 全てを持っていって必ず 0 にする。
  // HP が高い中ボス (8/10/12) でも 5 文字で綺麗に倒せるようにするため。
  if (isFinisher) {
    _battle.hp = 0;
  } else {
    _battle.hp = Math.max(0, _battle.hp - 1);
  }

  // 攻撃タイプを決定 (finisher は必ず magic、それ以外は plan に従う)
  const planIdx = Math.min(_battle.hitCount - 1, (_battle.attackPlan.length || 0) - 1);
  const attackType = isFinisher ? 'magic' : ((_battle.attackPlan[planIdx]) || 'normal');

  // 攻撃 FX (finisher は battleVictory 側で全画面魔法陣を出すのでここではスキップ)
  // 着弾遅延: 通常=剣の振りが着弾する ~320ms、魔法=projectile 飛行時間 ~780ms
  let impactDelay = 0;
  if (!isFinisher) {
    try {
      if (attackType === 'magic') playMagicAttackFX(_battle.element || 'fire');
      else                         playNormalAttackFX();
    } catch (e) { /* ignore */ }
    impactDelay = (attackType === 'magic') ? 780 : 320;
    // 勇者を攻撃モーションへ切替 → アニメ終了後に idle 復帰
    try {
      const kind = (attackType === 'magic') ? 'attack-magic' : 'attack-normal';
      _setHeroAnim(kind);
      const back = (attackType === 'magic') ? 900 : 550;
      setTimeout(function() { if (_battle.active) _setHeroAnim('idle'); }, back);
    } catch (e) { /* ignore */ }
    // MP 消費: 通常攻撃=1, 魔法攻撃=3 (floor:0 でクランプ、尽きても攻撃は続行する)
    try { _applyHeroMpCost(attackType === 'magic' ? 3 : 1); } catch (e) {}
  } else {
    // finisher (最終魔法) は大きめに MP を消費。着弾タイミングは battleVictory 側に任せるので即時扱い
    try { _applyHeroMpCost(5); } catch (e) {}
    impactDelay = 0;
  }

  // 星 + HP は UI 即時反映 (これらは「攻撃が決まった」予告としてすぐ光らせる方が気持ち良い)
  const star = els.stars[_battle.hitCount - 1];
  if (star) star.classList.add('lit');
  _renderHpBar(_battle.hp, _battle.maxHp);
  // v265: 呪印の色とヒビを HP 連動で進化 (紫→金、ヒビ 0→3 本)。
  // finisher 時は _startPurificationSequence が着弾と同期して sigil=0 (金爆発) を
  // トリガするため、ここでは呼ばない (projectile 飛行中に先走って burst しないように)。
  try { if (!isFinisher) _updateCurseSigil(); } catch (e) {}

  // ドラクエ風ログ: 「ゆうしゃのこうげき！」告知 (finisher は battleVictory 側の「たおした！」に任せる)
  const _enemyNameForLog = (_battle.enemy && _battle.enemy.name) || 'てき';
  if (!isFinisher) {
    try {
      _setBattleLog(['ゆうしゃの こうげき！', ''], { line1Class: 'dmg-line' });
    } catch (e) { /* ignore */ }
  }

  // 着弾フェーズ: シェイク + 被弾音 + ダメージ数字 + 敵セリフ
  const doImpact = function() {
    if (!_battle.active) return;
    if (_battle.hp > 0) {
      els.enemy.classList.remove('damaged');
      void els.enemy.offsetWidth;
      els.enemy.classList.add('damaged');
      clearTimeout(_battle._damagedTimer);
      _battle._damagedTimer = setTimeout(function() {
        if (els.enemy) els.enemy.classList.remove('damaged');
      }, 600);
      try { _playEnemyHitSound(); } catch (e) {}
      // 多段フレーム敵 (ゴーレム等): 一瞬「よろめき」→ HP に応じたダメージ立ち絵に差し替え
      try {
        const e = _battle.enemy;
        if (e && (e.imgStagger || (e.imgHp && e.imgHp.length))) {
          // 既存のフレーム系タイマー (windup / revert) を止めてからよろめき表示
          _clearEnemyFrameTimers();
          if (e.imgStagger) _swapEnemyImg(e.imgStagger);
          _battle._frameSwapTimer = setTimeout(function() {
            if (!_battle.active) return;
            if (_battle.hp <= 0) return; // 倒した場合は defeat 演出側に任せる
            const next = _enemyImgForHp();
            if (next) _swapEnemyImg(next);
          }, 260);
        }
      } catch (err) { /* ignore */ }
    }
    const dmg = isFinisher ? 999 : (20 + Math.floor(Math.random() * 12));
    _popDamage(dmg, { finisher: isFinisher });
    if (!isFinisher) {
      try {
        _setBattleLog(
          ['ゆうしゃの こうげき！', _enemyNameForLog + 'に ダメージを あたえた！'],
          { line1Class: 'dmg-line', line2Class: 'dmg-line' }
        );
      } catch (e) { /* ignore */ }
    }
    if (!isFinisher) {
      // v265: HP 帯で 3 相 (怒り→揺らぎ→覚醒) から selection。旧配列形式にもフォールバック互換。
      const line = _pickPhasedTaunt();
      if (line && Math.random() < 0.5) _showEnemySpeech(line, 1400);
    }
  };
  if (impactDelay > 0) setTimeout(doImpact, impactDelay);
  else doImpact();
}

// ===== プレイヤー攻撃 FX (仮): 通常攻撃 =====
// 差替フック: window.PONO_NORMAL_ATTACK_SFX に mp3 パスを入れれば上書きできる
function playNormalAttackFX() {
  const els = _battleEls();
  if (els.stage) {
    const slash = document.createElement('div');
    slash.className = 'slash-fx';
    els.stage.appendChild(slash);
    setTimeout(() => { if (slash.parentNode) slash.remove(); }, 460);
  }
  _spawnEnemyImpactParticles('✨', 5);
  playNormalAttackSound();
}

function playNormalAttackSound() {
  if (typeof window !== 'undefined' && window.PONO_NORMAL_ATTACK_SFX) {
    try {
      const a = new Audio(window.PONO_NORMAL_ATTACK_SFX);
      a.volume = 0.55; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through to synth */ }
  }
  // 合成: 斬撃 (三角波ピッチダウン + 短いノイズ衝撃)
  withAudio(ac => {
    const now = ac.currentTime;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(1800, now);
    o.frequency.exponentialRampToValueAtTime(280, now + 0.14);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.32, now + 0.008);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now + 0.2);
    // ノイズバースト (衝撃音)
    const bufLen = Math.floor(ac.sampleRate * 0.1);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
    const src = ac.createBufferSource(), ng = ac.createGain();
    src.buffer = buf;
    ng.gain.setValueAtTime(0.28, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    src.connect(ng); ng.connect(ac.destination);
    src.start(now); src.stop(now + 0.12);
  });
}

// ===== 敵被弾 SFX =====
// 攻撃命中時の「ドガッ」「バシッ」。斬撃や魔法の発射音とは別に、敵が当たった瞬間に被せる。
// (2026-04-20 ユーザー要望: 敵がダメージを受けてるのが音で分かるようにしたい)
function _playEnemyHitSound() {
  if (typeof window !== 'undefined' && window.PONO_ENEMY_HIT_SFX) {
    try {
      const a = new Audio(window.PONO_ENEMY_HIT_SFX);
      a.volume = 0.6; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through to synth */ }
  }
  withAudio(ac => {
    const now = ac.currentTime;
    // 低音 thud: 240Hz → 70Hz で急降下する矩形波 (腹に響く)
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(260, now);
    o.frequency.exponentialRampToValueAtTime(70, now + 0.13);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.34, now + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now + 0.24);
    // 上に被せる短いノイズ衝撃 (バシッ成分)
    const bufLen = Math.floor(ac.sampleRate * 0.09);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
    const src = ac.createBufferSource(), ng = ac.createGain();
    src.buffer = buf;
    ng.gain.setValueAtTime(0.3, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    src.connect(ng); ng.connect(ac.destination);
    src.start(now); src.stop(now + 0.1);
  });
}

// ===== プレイヤー攻撃 FX: 魔法攻撃 =====
// 「手前から奥(敵)へ魔法弾が飛ぶ → 着弾で破裂」する launchMagicProjectile に置換。
// 色は _battle.element (fire/ice/thunder/light/...) に合わせて MAGIC_COLORS で切替。
// 全画面の AI 動画 (launchMagicCircle) は finisher (5 文字目) 専用で取っておく。
function playMagicAttackFX(kind) {
  const element = kind || (_battle && _battle.element) || 'fire';
  try {
    if (typeof launchMagicProjectile === 'function') {
      launchMagicProjectile(element, {
        onImpact: function() {
          // 着弾時に火花粒子を敵位置から少し追加 (属性絵文字で)
          const emoji = element === 'fire'    ? '🔥'
                      : element === 'ice'     ? '❄'
                      : element === 'thunder' ? '⚡'
                      : element === 'light'   ? '✨'
                      : element === 'heal'    ? '💚'
                      : element === 'wind'    ? '💨'
                      : '✨';
          _spawnEnemyImpactParticles(emoji, 6);
        }
      });
    }
  } catch (e) { /* ignore — SFX だけでも鳴らす */ }
  // SFX は launchMagicProjectile 内の発射音+着弾音に任せる。
  // 既存の playFireMagicSound (全属性 fire 音) は二重で重くなるので呼ばない。
}

function playFireMagicSound() {
  if (typeof window !== 'undefined' && window.PONO_FIRE_MAGIC_SFX) {
    try {
      const a = new Audio(window.PONO_FIRE_MAGIC_SFX);
      a.volume = 0.6; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through to synth */ }
  }
  // 合成: whoosh (フィルタースイープ + 低音の轟き)
  withAudio(ac => {
    const now = ac.currentTime;
    const bufLen = Math.floor(ac.sampleRate * 0.55);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      ch[i] = (Math.random() * 2 - 1) * (1 - t) * (0.3 + 0.7 * Math.sin(t * Math.PI));
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const flt = ac.createBiquadFilter();
    flt.type = 'bandpass';
    flt.frequency.setValueAtTime(320, now);
    flt.frequency.exponentialRampToValueAtTime(1400, now + 0.3);
    flt.Q.value = 1.2;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.36, now + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
    src.connect(flt); flt.connect(g); g.connect(ac.destination);
    src.start(now); src.stop(now + 0.58);
    // 低音サブ
    const o = ac.createOscillator(), og = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(85, now);
    o.frequency.exponentialRampToValueAtTime(40, now + 0.4);
    og.gain.setValueAtTime(0, now);
    og.gain.linearRampToValueAtTime(0.1, now + 0.05);
    og.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    o.connect(og); og.connect(ac.destination);
    o.start(now); o.stop(now + 0.45);
  });
}

// 敵の中心から emoji パーティクルを放射
function _spawnEnemyImpactParticles(emoji, n) {
  const els = _battleEls();
  if (!els.enemy || !els.stage) return;
  const enemyRect = els.enemy.getBoundingClientRect();
  const stageRect = els.stage.getBoundingClientRect();
  const cx = enemyRect.left + enemyRect.width / 2 - stageRect.left;
  const cy = enemyRect.top + enemyRect.height / 2 - stageRect.top;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'enemy-impact-particle';
    p.textContent = emoji;
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    const angle = (i / n) * Math.PI * 2 + Math.random() * 0.4;
    const dist = 38 + Math.random() * 30;
    p.style.setProperty('--dx', (Math.cos(angle) * dist) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist) + 'px');
    els.stage.appendChild(p);
    setTimeout(() => { if (p.parentNode) p.remove(); }, 700);
  }
}

// ===== 敵の反撃 (演出のみ、HPは減らさない) =====
// 差替フック: window.PONO_ENEMY_ATTACK_SFX, window.PONO_HERO_NAME
// デフォルトは 'ゆうしゃ'。アプリ起動時に名前設定していれば
// pono_hero_name (localStorage) から読み、それも無ければ window.PONO_HERO_NAME、
// 全て未設定なら 'ゆうしゃ' を使う。
const BATTLE_HERO_NAME_DEFAULT = 'ゆうしゃ';
function _battleHeroName() {
  try {
    var saved = localStorage.getItem('pono_hero_name');
    if (saved && saved.trim()) return saved.trim();
  } catch (e) {}
  return (typeof window !== 'undefined' && window.PONO_HERO_NAME) || BATTLE_HERO_NAME_DEFAULT;
}

function enemyCounterAttack() {
  if (!_battle.active) return;
  const damage = 2 + Math.floor(Math.random() * 4); // 2〜5
  const enemyName = (_battle.enemy && _battle.enemy.name) || 'てき';

  // 多段フレーム敵 (ゴーレム等): 告知中に windup 3枚を順送り、撃の瞬間に strike フレームへ
  const e = _battle.enemy;
  const windup = (e && Array.isArray(e.imgAttackWindup)) ? e.imgAttackWindup : null;
  const strikeImg = (e && e.imgAttackStrike) || null;
  if (windup && windup.length) {
    const step = 300; // 告知 1100ms の間に 3枚流す
    if (!Array.isArray(_battle._windupTimers)) _battle._windupTimers = [];
    windup.forEach(function(src, i) {
      const tid = setTimeout(function() {
        if (!_battle.active) return;
        if (_battle.hp <= 0) return;
        _swapEnemyImg(src);
      }, i * step);
      _battle._windupTimers.push(tid);
    });
  }

  // 「〇〇の こうげき！」告知を出してから一拍置いて攻撃
  _showEnemyAttackAnnounce(enemyName + 'の こうげき！', function() {
    if (!_battle.active) return;
    const isRanged = !!(e && e.rangedMagic);
    try { playEnemyAttackSound(); } catch (err) {}
    // 撃の瞬間: strike フレーム → しばらく後に HP 応じた通常フレームへ戻す
    // 遠距離魔法タイプは杖を掲げ続ける時間を長めにする
    try {
      if (strikeImg && _battle.hp > 0) {
        _swapEnemyImg(strikeImg);
        // v275: カゲロウの炎ブレスのみ画像が逆向きで描かれているので CSS で flip。
        //       他のスプライトに戻す時に外す。
        var enemyEl = document.getElementById('battleEnemy');
        if (enemyEl && e && e.id === 'volcano_lord') {
          enemyEl.classList.add('kagerou-firebreath');
        }
        clearTimeout(_battle._frameRevertTimer);
        _battle._frameRevertTimer = setTimeout(function() {
          if (!_battle.active) return;
          if (_battle.hp <= 0) return;
          if (enemyEl) enemyEl.classList.remove('kagerou-firebreath');
          const back = _enemyImgForHp();
          if (back) _swapEnemyImg(back);
        }, isRanged ? 700 : 340);
      }
    } catch (err) { /* ignore */ }

    // 着弾時に実行する: 画面シェイク + 勇者シルエット点滅 + HP 減算 + ダメージログ。
    // 近接敵は即時発火、遠距離魔導士タイプは弾が届いた瞬間に発火する。
    const applyImpact = function() {
      if (!_battle.active) return;
      _shakeScreen();
      try { _applyHeroHpDamage(damage); } catch (err) {}
      try {
        const heroEl = document.getElementById('battleHero');
        if (heroEl) {
          heroEl.classList.remove('silhouette-flash');
          void heroEl.offsetWidth;
          heroEl.classList.add('silhouette-flash');
          setTimeout(function() {
            if (heroEl) heroEl.classList.remove('silhouette-flash');
          }, 500);
        }
      } catch (err) {}
      _showPlayerDamageWindow(damage);
    };

    if (isRanged && typeof _launchEnemyMagicProjectile === 'function') {
      const elem = (e && e.element) || _battle.element || 'ice';
      _launchEnemyMagicProjectile(elem, { onImpact: applyImpact });
      // 氷属性ボス (こおりのまどうし) は氷ビームに加えて勇者の頭上につららの雨を降らせる。
      // 雑魚 (こおりコウモリ等) はビームのみでプレッシャーを抑える。
      if (elem === 'ice' && e && e.boss && typeof _spawnIcicleRain === 'function') {
        setTimeout(_spawnIcicleRain, 160);
      }
    } else {
      applyImpact();
    }
  });
}

// 敵の攻撃告知 (ドラクエ風、ログウィンドウに集約)
// 表示 ~1.1s → onAttack() で実際の攻撃演出に入る
function _showEnemyAttackAnnounce(text, onAttack) {

function _shakeScreen() {
  const app = document.getElementById('app') || document.body;
  if (!app) return;
  app.classList.remove('screen-shake');
  void app.offsetWidth; // reflow でアニメ再始動
  app.classList.add('screen-shake');
  setTimeout(() => app.classList.remove('screen-shake'), 600);
}

function _showPlayerDamageWindow(damage) {
  const name = _battleHeroName();

function playEnemyAttackSound() {
  if (typeof window !== 'undefined' && window.PONO_ENEMY_ATTACK_SFX) {
    try {
      const a = new Audio(window.PONO_ENEMY_ATTACK_SFX);
      a.volume = 0.55; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through to synth */ }
  }
  // 合成: 低めの "ドン" (サインのピッチダウン + ノイズ衝撃)
  withAudio(ac => {
    const now = ac.currentTime;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(220, now);
    o.frequency.exponentialRampToValueAtTime(55, now + 0.18);
    g.gain.setValueAtTime(0.46, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now + 0.3);
    // ノイズ衝撃
    const bufLen = Math.floor(ac.sampleRate * 0.14);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / bufLen) * 0.85;
    const src = ac.createBufferSource(), ng = ac.createGain();
    src.buffer = buf;
    ng.gain.setValueAtTime(0.32, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    src.connect(ng); ng.connect(ac.destination);
    src.start(now); src.stop(now + 0.15);
  });
}

// 5 文字目完成時に呼ばれる: フルチャージ→魔法発動→撃破演出→ファンファーレ
function battleVictory(spellKind, onDone) {
  if (!_battle.active) { if (onDone) onDone(); return; }
  const els = _battleEls();
  // 最終ダメージを入れる
  battleHitEnemy({ finisher: true });
  // 勇者: 魔法詠唱モーションで発動の「ため」を見せる
  try { _setHeroAnim('attack-magic'); } catch (e) {}
  // 五芒星全点灯グロウ
  els.stars.forEach(s => s.classList.add('lit'));
  if (els.charge) els.charge.classList.add('charged');

  const element = spellKind || 'fire';
  // 大魔法は mp4 の screen 合成が効かない問題があるため CSS + SE に置換 (2026-04-20)。
  // 通常弾より一回り大きく飛ばす finisher フラグで発射。
  // 着弾時は視覚エフェクトだけ (SE はここでは鳴らさない — 剣閃 SE とぶつかるため)。
  // v265: 着弾時は従来の .defeated (rotate/shrink/fade) ではなく _startPurificationSequence を発火
  //       (仮面 2 つ割り + 敵スプライトの呪縛→浄化色味切替 + おじぎ + ありがとう吹き出し)。
  setTimeout(() => {
    try { _playMagicFinisherSound(); } catch (e) {}
    try {
      if (typeof launchMagicProjectile === 'function') {
        launchMagicProjectile(element, {
          finisher: true,
          onImpact: function() {
            els.enemy.classList.remove('damaged');
            try { _startPurificationSequence(); } catch (e) {
              // フォールバック: 旧来の撃破演出に戻す
              els.enemy.classList.add('defeated');
            }
          }
        });
      } else {
        try { _startPurificationSequence(); } catch (e) {
          els.enemy.classList.add('defeated');
        }
      }
    } catch (e) { /* ignore */ }
  }, 400);

  // 撃破ウィンドウ (v265: 文言は「めざめさせた！」に変更)
  setTimeout(() => {
    try { _showDefeatedWindow(_battle.enemy && _battle.enemy.name); } catch (e) {}
  }, 1900);

  // 2026-04-20 ユーザー要望: ファンファーレは「キノコの戦士を倒した後、撃破ウィンドウが
  // 出た後」に鳴らす。以前は t=1600ms で撃破アニメ中に鳴っていた → t=2300ms
  // (撃破ウィンドウ 1900ms + 400ms 余裕) に移動。BGM もこのタイミングで 0 へ。
  setTimeout(() => {
    try { fadeBgm(0, 300); } catch (e) {}
    try {
      const url = '../assets/sounds/se/battle/victory_fanfare.mp3';
      const a = new Audio(url);
      a.volume = 0.9;
      a.play().catch(err => {
        console.warn('[fanfare] play failed:', err && err.message);
        try { _playVictoryFanfareSynth(); } catch (e2) {}
      });
    } catch (e) {
      try { _playVictoryFanfareSynth(); } catch (e2) {}
    }
    // ファンファーレ長さぶん (約 3.2s) 待って BGM を戻す
    setTimeout(() => { try { fadeBgm(0.28, 600); } catch (e) {} }, 3200);
  }, 2300);

  // 勝利後: バトル中に溜めたどんぐり + 行クリアボーナス(+5) をバトルログで一括表示。
  // ユーザー要望 (2026-04-20): モーダルではなく真ん中のバトルメッセージ欄で受け取る。
  // 各メッセージは ▼ タップで進められる (子供のペース)。
  setTimeout(() => {
    const enemyName = (_battle.enemy && _battle.enemy.name) || 'モンスター';
    const enemyData = _battle.enemy || {};
    const trueName = enemyData.trueName || '';
    // 日次キャップ: 1 ゲーム = 1 日 5 🌰。2 回目以降は 0 (「きょうはおしまい」表示)
    var granted = 0;
    try {
      if (typeof window.addAcornsDaily === 'function') {
        granted = window.addAcornsDaily('writing', 5, 5, { reason: 'writing_row_clear' });
      }
    } catch (e) { /* ignore */ }
    _battle.acornsBuffered = 0;

    // v266 ありがとうテーマ: 精霊から「ありがとう」を受け取る (+1、ボスは +2)
    var thankYouAdd = enemyData.boss ? 2 : 1;
    try {
      if (typeof window.addThankYou === 'function') {
        window.addThankYou(thankYouAdd, { reason: 'purify:' + (enemyData.id || 'enemy') });
      }
    } catch (e) { /* ignore */ }

    // v265: 仮面が割れた後の bow / leave セリフ。taunts が phased 構造を持つ場合のみ挿入。
    const phasedTaunts = (enemyData.taunts && !Array.isArray(enemyData.taunts)) ? enemyData.taunts : null;
    const bowLine = phasedTaunts && phasedTaunts.bow ? phasedTaunts.bow : '';
    const leaveLine = phasedTaunts && phasedTaunts.leave ? phasedTaunts.leave : '';
    const speakerLabel = trueName ? (trueName + '「') : '';
    const speakerClose = trueName ? '」' : '';

    const rewardLine = granted > 0
      ? { lines: ['ごほうび！', '<span class="dq-line-emphasis">🌰 +' + granted + '</span> ゲット！'], opts: { line2Class: 'dmg-line' } }
      : { lines: ['きょうのどんぐりは', '<span class="dq-line-emphasis">おしまい！</span> また あした！'], opts: { line2Class: 'dmg-line' } };
    // v266: せいれいから もらった ありがとう の表示
    const thankYouLine = { lines: ['せいれい から', '<span class="dq-line-emphasis">💝 ありがとう +' + thankYouAdd + '</span>'], opts: { line2Class: 'dmg-line' } };
    const messages = [
      { lines: [enemyName + 'を', '<span class="dq-line-emphasis">めざめさせた！</span>'], opts: { line2Class: 'dmg-line' } },
    ];
    if (bowLine) {
      messages.push({
        lines: [speakerLabel + bowLine + speakerClose, ''],
        opts: {}
      });
    }
    if (leaveLine) {
      messages.push({
        lines: [speakerLabel + leaveLine + speakerClose, ''],
        opts: {},
        onEnter: function() {
          // 帰還セリフに合わせて精霊がフワッと上昇して消える
          try {
            const enemyEl = document.getElementById('battleEnemy');
            if (enemyEl) enemyEl.classList.add('ascending');
          } catch (e) {}
        }
      });
    }
    messages.push(thankYouLine);
    messages.push(rewardLine);
    messages.push({ lines: ['よく がんばったね！', ''], opts: { line1Class: 'dq-line-emphasis' } });

    _showBattleDialog(messages, function() {
      try { _hideDefeatedWindow(); } catch (e) {}
      if (onDone) onDone();
    });
  }, 3200);
}

// ===== 勝利ファンファーレ (mp3 優先、未ロード時は Web Audio 合成にフォールバック) =====
// 返り値: HTMLAudioElement | undefined (mp3 の場合のみ — 呼び出し側で ended を購読できる)
function playVictoryFanfare() {
  const url = (typeof window !== 'undefined' && window.PONO_VICTORY_SFX)
    ? window.PONO_VICTORY_SFX
    : BATTLE_SFX.victory;
  if (url) {
    try {
      const a = new Audio(url);
      a.volume = 0.9;
      a.preload = 'auto';
      a.currentTime = 0;
      const p = a.play();
      if (p && typeof p.catch === 'function') {
        p.catch(function(err) {
          console.warn('[fanfare] play failed:', err && err.message);
          // 再生失敗時は Web Audio 合成にフォールバック
          _playVictoryFanfareSynth();
        });
      }
      return a;
    } catch (e) { /* fall through to synth */ }
  }
  _playVictoryFanfareSynth();
}

// mp3 が鳴らせないときの Web Audio 合成フォールバック
function _playVictoryFanfareSynth() {
  withAudio(function(ac) {
    const now = ac.currentTime;
    const notes = [
      {f: 523.25, t: 0.00, d: 0.16, g: 0.32},  // C5
      {f: 659.25, t: 0.15, d: 0.16, g: 0.32},  // E5
      {f: 783.99, t: 0.30, d: 0.16, g: 0.32},  // G5
      {f: 1046.5, t: 0.45, d: 0.32, g: 0.36},  // C6 long
      {f: 783.99, t: 0.82, d: 0.16, g: 0.30},  // G5
      {f: 1046.5, t: 0.98, d: 0.55, g: 0.40},  // C6 finale
    ];
    notes.forEach(function(n) {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.value = n.f;
      gain.gain.setValueAtTime(0, now + n.t);
      gain.gain.linearRampToValueAtTime(n.g, now + n.t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + n.t + n.d);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(now + n.t); osc.stop(now + n.t + n.d + 0.05);
    });
  });
}

// BGM ボリュームフェード (linearRamp 風)
function fadeBgm(to, durMs) {
  const el = document.getElementById('bgm');
  if (!el) return;
  const from = Number(el.volume) || 0;
  const start = performance.now();
  const dur = Math.max(50, durMs || 400);
  cancelAnimationFrame(fadeBgm._raf || 0);
  function step(now) {
    const t = Math.min(1, (now - start) / dur);
    el.volume = from + (to - from) * t;
    if (t < 1) fadeBgm._raf = requestAnimationFrame(step);
  }
  fadeBgm._raf = requestAnimationFrame(step);
}

  const rect = canvasContainer.getBoundingClientRect();

    strokeColor: currentScheme.stroke,
    outlineColor: currentScheme.outline,
    drawingColor: currentScheme.drawing,
    highlightColor: currentScheme.highlight,
    radicalColor: currentScheme.stroke,
    drawingWidth: 16,
    strokeAnimationSpeed: 0.5,
    delayBetweenStrokes: 800,
    showOutline: true,
    showCharacter: false,
    charDataLoader: function(char, onComplete) {

      const url = 'https://cdn.jsdelivr.net/gh/ailectra/kana-json@v0.0.1/data/' + char + '.json';

        .then(r => {
          if (!r.ok) throw new Error('Not found');
          return r.json();

        .then(data => {
          currentCharData = data;
          showStrokeNumbers(data, size);
          onComplete(data);
        })
        .catch(() => {
          // Fallback: try hanzi-writer-data
          const url2 = 'https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + char + '.json';
          fetch(url2)
            .then(r => {
              if (!r.ok) throw new Error('Not found');
              return r.json();
            })
            .then(data => {
              currentCharData = data;
              showStrokeNumbers(data, size);
              onComplete(data);
            })
            .catch(() => {
              console.warn('No data for character:', char);

  // まずお手本を1回流してからquizモードへ

      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.15);
      osc.frequency.setValueAtTime(784, now + 0.3);
      g.gain.setValueAtTime(0.12, now);
      g.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
      osc.connect(g); g.connect(ac.destination);
      osc.start(now); osc.stop(now + 0.45);
    });
    _hedgeBubble.textContent = 'このじゅんばんで かくよ！';
    _ponoBubble.textContent = 'このじゅんばんで かくよ！';
    ponoHint();                    // ← ポノが「このじゅんばんで」と指さし
    document.getElementById('demoIndicator').style.display = 'block';

// ===== Stroke Order Numbers =====
function showStrokeNumbers(charData, targetSize) {
  strokeNumbers.innerHTML = '';
  if (!charData || !charData.medians) return;

  // Wait for HanziWriter to render SVG, then use its internal transform
  setTimeout(() => {
    const svg = writerTarget.querySelector('svg');
    if (!svg) return;
    const containerRect = canvasContainer.getBoundingClientRect();

    // Find HanziWriter's top-level group (has the coordinate transform)
    const topGroup = svg.querySelector('g');
    if (!topGroup) return;

    charData.medians.forEach((median, i) => {
      if (!median || median.length === 0) return;
      const [mx, my] = median[0];

      // Use SVG's coordinate transform API for pixel-perfect positioning
      const pt = svg.createSVGPoint();
      pt.x = mx;
      pt.y = my;
      const ctm = topGroup.getScreenCTM();
      const screenPt = pt.matrixTransform(ctm);

      // Convert screen coords to container-relative percentage
      const relX = screenPt.x - containerRect.left;
      const relY = screenPt.y - containerRect.top;
      const pctX = (relX / containerRect.width) * 100;
      const pctY = (relY / containerRect.height) * 100;

      const num = document.createElement('div');
      num.className = 'stroke-number';
      num.textContent = i + 1;
      num.style.left = pctX + '%';
      num.style.top = pctY + '%';
      num.style.background = currentScheme.stroke;
      strokeNumbers.appendChild(num);
    });
  }, 200);
}

// ===== World Map Scene =====
// map.png の「一番左の森」だけを見せるため、.map-world を viewport 500% に拡大して
// 初期カメラは左端 (0%) に固定。ヒーローは森の入口、モンスターはその少し右。
// 「すすむ」ボタン連打で hero の world 内 X 座標を増やし、一定距離でモンスターと衝突 → 戦闘開始。
//
// 座標系:
//   hero / monster の left は world 内 % (0〜100 の相対値。ただし world 幅は viewport の 500%)
//   world の scroll(translateX) も viewport 幅に対する % で計算
const MAP_STATE = {
  active: false,
  hero: 6.0,       // world 内 % (森の入口=一番左寄り)
  monster: 12.0,   // 初期は勇者のすぐ右 (ぶつかるまで数歩)
  step: 2.6,       // 1 タップで進む距離 (% of world)
  collideMargin: 2.2,
  walking: false,
  walkFrame: 0,
  onCollision: null,
};
const MAP_HERO_GENDER_KEY = 'pono_hero_gender';
// 男女切替は将来 UI で追加想定。今はデフォルト男性、localStorage で上書き可能。
function _mapHeroGender() {
  try {
    var g = localStorage.getItem(MAP_HERO_GENDER_KEY);
    return (g === 'f') ? 'f' : 'm';
  } catch (e) { return 'm'; }
}
function _mapHeroFrame(kind) {
  // SPUM から書き出した勇者スプライトに差し替え (2026-04-20)。
  // 現状 1 キャラのみ。kind: 'stand' (idle) / 'walk1' / 'walk2' (歩きは同じ move を流用)。
  // 旧 hero_m/f_* ファイルは legacy 素材として残すが、実運用では参照しない。
  if (kind === 'walk1' || kind === 'walk2') {
    return '../assets/images/hero/spum/move.png';
  }
  return '../assets/images/hero/spum/idle.png';
}
function _mapMonsterSrc() {
  // 戦闘で使っているキノコ (monster_005) をそのまま縮小表示。
  return '../assets/images/monsters/chars/monster_005.png';
}
function _mapApplyTransforms() {
  var world = document.getElementById('mapWorld');
  var viewport = document.getElementById('mapViewport');
  var hero = document.getElementById('mapHero');
  var mon  = document.getElementById('mapMonster');
  if (!world || !viewport || !hero || !mon) return;
  // world 幅は viewport の 500% → 1% (world) = 0.05 * viewport width
  // カメラ: hero を viewport の 30% に置きたい
  var heroW = MAP_STATE.hero;             // world 内 %
  var monW  = MAP_STATE.monster;
  // hero の world 内 X を viewport 内 X に写像: viewportX% = heroW% * 5 - cameraShift
  // camera shift を「hero が viewport の 30% に来るように」決める
  // worldX_in_viewport_percent = heroW * 5 (world が 500% 幅なので)
  var heroViewPct = heroW * 5;
  // ただし左端クランプ: camera は世界の開始時は 0 固定 (左端は壁)
  var cameraShift = Math.max(0, heroViewPct - 30);
  // 右端クランプ: cameraShift は world 幅(500%) - viewport幅(100%) を超えない
  cameraShift = Math.min(cameraShift, 400);
  world.style.transform = 'translateX(-' + cameraShift.toFixed(2) + '%)';
  // hero / monster の world 内位置は world 要素基準 (world 内 % → 0〜100% で left)
  // world 内 0〜100% ではなく、ここでは world 幅 (=500%viewport) の何% か。
  // .map-world の width:500% 内で left:heroW% と書けば、viewport から見ると heroW*5%
  hero.style.left = heroW.toFixed(2) + '%';
  mon.style.left  = monW.toFixed(2)  + '%';
}
function openMapScene(opts) {
  opts = opts || {};
  MAP_STATE.active = true;
  MAP_STATE.hero = (opts.heroStart != null) ? opts.heroStart : 6.0;
  MAP_STATE.monster = (opts.monsterX != null) ? opts.monsterX : 12.0;
  MAP_STATE.onCollision = opts.onCollision || null;
  var hero = document.getElementById('mapHero');
  var mon  = document.getElementById('mapMonster');
  if (hero) hero.src = _mapHeroFrame('stand');
  if (mon)  mon.src  = _mapMonsterSrc();
  var scene = document.getElementById('mapScene');
  if (scene) { scene.classList.add('visible'); scene.setAttribute('aria-hidden', 'false'); }
  // マップ BGM に切替
  try { if (typeof setBgmFor === 'function') setBgmFor('map'); } catch (e) {}
  _mapApplyTransforms();
  // ボタンのハンドラは 1 回だけ登録
  var btn = document.getElementById('mapWalkBtn');
  if (btn && !btn._ponoBound) {
    btn._ponoBound = true;
    btn.addEventListener('click', mapWalkStep);
  }
  if (btn) btn.disabled = false;
}
function closeMapScene() {
  MAP_STATE.active = false;
  var scene = document.getElementById('mapScene');
  if (scene) { scene.classList.remove('visible'); scene.setAttribute('aria-hidden', 'true'); }
}
function mapWalkStep() {
  if (!MAP_STATE.active || MAP_STATE.walking) return;
  MAP_STATE.walking = true;
  var hero = document.getElementById('mapHero');
  MAP_STATE.walkFrame = (MAP_STATE.walkFrame + 1) % 2;
  if (hero) hero.src = _mapHeroFrame(MAP_STATE.walkFrame ? 'walk1' : 'walk2');
  MAP_STATE.hero += MAP_STATE.step;
  // クランプ: world は 100%、モンスターを越えないように (衝突で止める)
  if (MAP_STATE.hero >= MAP_STATE.monster - MAP_STATE.collideMargin) {
    MAP_STATE.hero = MAP_STATE.monster - MAP_STATE.collideMargin;
    _mapApplyTransforms();
    setTimeout(_mapCollide, 320);
    return;
  }
  _mapApplyTransforms();
  setTimeout(function() {
    if (hero) hero.src = _mapHeroFrame('stand');
    MAP_STATE.walking = false;
  }, 280);
}
function _mapCollide() {
  // フラッシュを出してから戦闘開始
  var viewport = document.getElementById('mapViewport');
  if (viewport) {
    var flash = document.createElement('div');
    flash.className = 'map-collide-flash';
    viewport.appendChild(flash);
    setTimeout(function() { if (flash.parentNode) flash.remove(); }, 700);
  }
  var btn = document.getElementById('mapWalkBtn');
  if (btn) btn.disabled = true;
  setTimeout(function() {
    closeMapScene();
    var cb = MAP_STATE.onCollision;
    MAP_STATE.onCollision = null;
    MAP_STATE.walking = false;
    if (typeof cb === 'function') { try { cb(); } catch (e) {} }
  }, 600);
}
window.openMapScene = openMapScene;

  try {

  try {

      function _startPuzzleFlow() {

          try { _showBridgeEncounterIntro(function() { _rowPracticeNextChar(); }); }

  try { _showBattleStage(_rowLabel); } catch (e) {}

  if (_battle.active) {

// 2026-04-20: background-image 方式では縦横のスケールがブラウザ依存で
// ずれて「勇者がマップの下に外れる」現象が発生した。明示的な <img> +
// 数値 translate に切り替え、hero 足元 (画面 50%, 62%) に scene の
// (xPct, yPct) 点を合わせる。ビューポートがどんなアスペクト比でも
// 勇者は常に道の上に立つ。
function _showMapScene(rowId, onDone) {
  try { setBgmFor('map'); } catch (e) {}
  const scene = MAP_ROW_SCENES[rowId] || MAP_ROW_SCENES['あ'];
  const overlay = document.createElement('div');
  overlay.className = 'map-scene-overlay';
  const viewport = document.createElement('div');
  viewport.className = 'map-scene-viewport';
  const bgImg = document.createElement('img');
  bgImg.className = 'map-scene-bg-img';
  bgImg.alt = '';
  bgImg.src = '../assets/images/maps/map_A.png';
  // viewport 側に (mx, my) を持たせる (bg と hero の両方が同じ変数を読む)
  viewport.style.setProperty('--mx', scene.xPct);
  viewport.style.setProperty('--my', scene.yPct != null ? scene.yPct : 50);
  const title = document.createElement('div');
  title.className = 'map-scene-title';
  title.textContent = scene.title;
  const hero = document.createElement('div');
  hero.className = 'map-scene-hero hero-sprite move pulse';
  // hero は画面の (50%, 62%) に立つ (CSS で left:50%, bottom:38%)。
  // translateX(-50%) で要素中心を left:50% に揃えつつ、scaleX(-1) で右向き反転。
  hero.style.transform = 'translateX(-50%) scaleX(-1)';
  const hint = document.createElement('div');
  hint.className = 'map-scene-hint';
  hint.textContent = '▼ タップで すすむ';
  viewport.appendChild(bgImg);
  viewport.appendChild(hero);
  overlay.appendChild(viewport);
  overlay.appendChild(title);
  overlay.appendChild(hint);
  document.body.appendChild(overlay);

  // 位置/サイズは全て CSS 側 (vh/vw + CSS 変数) で決まる。JS による測定は不要。
  requestAnimationFrame(function() { overlay.classList.add('show'); });

  const minShowUntil = Date.now() + 500;
  const handler = function(ev) {
    if (Date.now() < minShowUntil) return;
    ev.preventDefault(); ev.stopPropagation();
    overlay.removeEventListener('pointerdown', handler);
    overlay.classList.add('fade-out');
    overlay.classList.remove('show');
    setTimeout(function() {
      if (overlay.parentNode) overlay.remove();
      if (onDone) onDone();
    }, 420);
  };
  overlay.addEventListener('pointerdown', handler);
}

          //         通常フローはカーテン演出 (_showBattleEncounterIntro) で reveal するが、

    var probe = new Image();
