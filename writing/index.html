  // T=1900: 妖精退場 (leave)
  _bt(function() {
    el.classList.remove('emerge');
    el.classList.add('leave');
    _hideMonsterBubble();
  }, 1900);

  // T=2300: 妖精完全消し + 悪役再登場 (悔しがる)
  _bt(function() {
    el.style.visibility = 'hidden';
    el.classList.remove('leave', 'emerge', 'pop');
    var drop = document.getElementById('monsterAcornDrop');
    if (drop) { drop.classList.remove('show'); drop.style.opacity = '0'; }
    _showVillain('defeat', 1800);
  }, 2300);

  // T=2600: キャンバスの shaking/breaking クラスを解除（次文字ロードに備え）
  _bt(function() {
    cc.classList.remove('shaking', 'breaking');
    var seal = document.getElementById('canvasSeal');
    if (seal) seal.classList.remove('active', 'cracking');
    var burst = document.getElementById('canvasBurst');
    if (burst) burst.classList.remove('active');
    var sparkles = document.getElementById('canvasSparkles');
    if (sparkles) { sparkles.classList.remove('active'); sparkles.innerHTML = ''; }
  }, 2600);
}
// 既存呼出し経路との互換
function _playMonsterPop() { _playCanvasBreak(); }

// ===== RPG バトルシステム =====
// 行練習を「1体の敵を5文字で倒す」戦闘に見立てる。
// 既存 .monster-deco (封印された妖精) とは完全に別レイヤ (#battleStage / #battleEnemy)。
const BATTLE_ENEMIES = {
  a: {
    id: 'mush1', name: 'キノコのせんし',
    img: '../assets/images/monsters/chars/monster_005.png',
    taunts: ['くくく…', 'かかってこい！', 'まだまだ！', 'なんのこれしき！', 'やるな…'],
    hp: 5, element: 'light'
  },
  // 他の行は順次追加。未定義なら a 行の敵を流用 (見た目だけランダムな mush2/3 にする)
};
const MUSHROOM_IMGS = [
  '../assets/images/monsters/chars/monster_005.png',
  '../assets/images/monsters/chars/monster_006.png',
  '../assets/images/monsters/chars/monster_007.png',
];
function _enemyForRow(rowId) {
  const base = BATTLE_ENEMIES[rowId] || BATTLE_ENEMIES.a;
  // 未定義行は画像だけランダム化して飽きさせない
  const img = BATTLE_ENEMIES[rowId]
    ? base.img
    : MUSHROOM_IMGS[Math.floor(Math.random() * MUSHROOM_IMGS.length)];
  return Object.assign({}, base, { img });
}

const _battle = {
  active: false,
  enemy: null,
  hp: 5,
  maxHp: 5,
  hitCount: 0,
  // 5回の攻撃タイプを事前に決める ('normal' | 'magic')。finisher (末尾) は必ず magic
  attackPlan: [],
  // 行(label: あ/か/さ…)ごとの属性。'fire' | 'ice' | 'thunder' | 'light' | 'heal' | 'wind' | ...
  element: 'fire',
};

// 攻撃プラン生成: count=5 のとき 通常3 + 魔法2 (末尾は必ず magic)
function _pickAttackPlan(count) {
  const plan = new Array(count).fill('normal');
  if (count > 0) plan[count - 1] = 'magic';
  // 残り (count-1 箇所) からちょうど 1 個だけ magic に → 合計 magic=2, normal=3
  const extras = 1;
  const pool = [];
  for (let i = 0; i < count - 1; i++) pool.push(i);
  for (let k = 0; k < extras && pool.length > 0; k++) {
    const idx = Math.floor(Math.random() * pool.length);
    plan[pool.splice(idx, 1)[0]] = 'magic';
  }
  return plan;
}

function _battleEls() {
  return {
    stage:   document.getElementById('battleStage'),
    enemy:   document.getElementById('battleEnemy'),
    img:     document.getElementById('battleEnemyImg'),
    name:    document.getElementById('battleEnemyName'),
    hpBar:   document.getElementById('battleHpBar'),
    stars:   document.querySelectorAll('#pentagramCharge .star'),
    charge:  document.getElementById('pentagramCharge'),
    speech:  document.getElementById('battleEnemySpeech'),
    popLayer:document.getElementById('damagePopLayer'),
  };
}

function _renderHpBar(hp, maxHp) {
  const { hpBar } = _battleEls();
  if (!hpBar) return;
  hpBar.innerHTML = '';
  for (let i = 0; i < maxHp; i++) {
    const b = document.createElement('span');
    b.className = 'hp-block';
    if (i >= hp) b.classList.add('lost');
    else if (hp <= 1) b.classList.add('critical');
    else if (hp <= 2) b.classList.add('low');
    hpBar.appendChild(b);
  }
}

function _showBattleStage(rowId) {
  const els = _battleEls();
  if (!els.stage) return;
  const enemy = _enemyForRow(rowId);
  _battle.active = true;
  _battle.enemy = enemy;
  _battle.maxHp = enemy.hp || 5;
  _battle.hp = _battle.maxHp;
  _battle.hitCount = 0;
  _battle.attackPlan = _pickAttackPlan(_battle.maxHp); // 5回の通常/魔法プラン
  // 現在は最初のステージのみ実装中のため、属性は「炎」で固定。
  // 将来、行ごとに属性を変える段階で ROW_ELEMENT_BY_LABEL に戻す。
  _battle.element = 'fire';

  if (els.img) els.img.src = enemy.img;
  if (els.name) els.name.textContent = enemy.name;
  if (els.charge) els.charge.classList.remove('charged');
  els.stars.forEach(s => s.classList.remove('lit'));
  els.enemy.classList.remove('damaged', 'defeated');
  _renderHpBar(_battle.hp, _battle.maxHp);

  els.stage.style.display = '';
  els.stage.setAttribute('aria-hidden', 'false');
  // ポノ / ハリネズミ / 封印された妖精を戦闘中は隠す (戦闘画面の集中度を上げる)
  document.body.classList.add('battle-mode');

  // 封印された妖精は隠す (同一キャンバス内の干渉を避ける)
  const md = document.getElementById('monsterDeco');
  if (md) md.style.display = 'none';

  // 登場セリフ
  _showEnemySpeech(enemy.taunts[0]);

  // エンカウントジングル (BGM を一瞬下げて被らないように)
  try { playEncounterJingle(); } catch (e) {}
}

function _hideBattleStage() {
  const els = _battleEls();
  if (!els.stage) return;
  _battle.active = false;
  els.stage.style.display = 'none';
  els.stage.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('battle-mode');
  const md = document.getElementById('monsterDeco');
  if (md) md.style.display = '';
  // 「たおした！」ウィンドウが残っていれば念のため消す
  try { _hideDefeatedWindow(); } catch (e) {}
}

function _showEnemySpeech(text, ms) {
  const { speech } = _battleEls();
  if (!speech || !text) return;
  speech.textContent = text;
  speech.classList.add('show');
  clearTimeout(_showEnemySpeech._t);
  _showEnemySpeech._t = setTimeout(() => speech.classList.remove('show'), ms || 1800);
}

function _popDamage(amount, opts) {
  const { popLayer } = _battleEls();
  if (!popLayer) return;
  const d = document.createElement('div');
  d.className = 'damage-pop' + (opts && opts.finisher ? ' finisher' : '');
  d.textContent = amount;
  // 敵の中心少し上にばらけさせる
  const jitterX = (Math.random() - 0.5) * 40;
  d.style.left = (50 + jitterX / 2) + '%';
  d.style.top  = (opts && opts.finisher ? '45%' : '40%');
  popLayer.appendChild(d);
  setTimeout(() => d.remove(), 900);
}

// 1 文字完成時に呼ばれる: HP 1 減らして星 1 点灯
function battleHitEnemy(opts) {
  if (!_battle.active) return;
  const els = _battleEls();
  _battle.hitCount++;
  _battle.hp = Math.max(0, _battle.hp - 1);
  const isFinisher = !!(opts && opts.finisher);

  // 攻撃タイプを決定 (finisher は必ず magic、それ以外は plan に従う)
  const planIdx = Math.min(_battle.hitCount - 1, (_battle.attackPlan.length || 0) - 1);
  const attackType = isFinisher ? 'magic' : ((_battle.attackPlan[planIdx]) || 'normal');

  // 攻撃 FX (finisher は battleVictory 側で全画面魔法陣を出すのでここではスキップ)
  if (!isFinisher) {
    try {
      if (attackType === 'magic') playMagicAttackFX(_battle.element || 'fire');
      else                         playNormalAttackFX();
    } catch (e) { /* ignore */ }
  }

  // 星を 1 つ点灯
  const star = els.stars[_battle.hitCount - 1];
  if (star) star.classList.add('lit');

  // HP バー更新
  _renderHpBar(_battle.hp, _battle.maxHp);

  // 敵にダメージ演出
  els.enemy.classList.remove('damaged');
  void els.enemy.offsetWidth;  // reflow でアニメ再始動
  if (_battle.hp > 0) els.enemy.classList.add('damaged');

  // ダメージ数字
  const dmg = isFinisher ? 999 : (20 + Math.floor(Math.random() * 12));
  _popDamage(dmg, { finisher: isFinisher });

  // ランダムなセリフ (最終打は除く)
  if (!isFinisher && _battle.enemy && _battle.enemy.taunts) {
    const ts = _battle.enemy.taunts;
    if (Math.random() < 0.5) _showEnemySpeech(ts[Math.floor(Math.random() * ts.length)], 1400);
  }
}

// ===== プレイヤー攻撃 FX (仮): 通常攻撃 =====
// 差替フック: window.PONO_NORMAL_ATTACK_SFX に mp3 パスを入れれば上書きできる
function playNormalAttackFX() {
  const els = _battleEls();
  if (els.stage) {
    const slash = document.createElement('div');
    slash.className = 'slash-fx';
    els.stage.appendChild(slash);
    setTimeout(() => { if (slash.parentNode) slash.remove(); }, 460);
  }
  _spawnEnemyImpactParticles('✨', 5);
  playNormalAttackSound();
}

function playNormalAttackSound() {
  if (typeof window !== 'undefined' && window.PONO_NORMAL_ATTACK_SFX) {
    try {
      const a = new Audio(window.PONO_NORMAL_ATTACK_SFX);
      a.volume = 0.55; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through to synth */ }
  }
  // 合成: 斬撃 (三角波ピッチダウン + 短いノイズ衝撃)
  withAudio(ac => {
    const now = ac.currentTime;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(1800, now);
    o.frequency.exponentialRampToValueAtTime(280, now + 0.14);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.32, now + 0.008);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now + 0.2);
    // ノイズバースト (衝撃音)
    const bufLen = Math.floor(ac.sampleRate * 0.1);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
    const src = ac.createBufferSource(), ng = ac.createGain();
    src.buffer = buf;
    ng.gain.setValueAtTime(0.28, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    src.connect(ng); ng.connect(ac.destination);
    src.start(now); src.stop(now + 0.12);
  });
}

// ===== プレイヤー攻撃 FX: 魔法攻撃 =====
// 「手前から奥(敵)へ魔法弾が飛ぶ → 着弾で破裂」する launchMagicProjectile に置換。
// 色は _battle.element (fire/ice/thunder/light/...) に合わせて MAGIC_COLORS で切替。
// 全画面の AI 動画 (launchMagicCircle) は finisher (5 文字目) 専用で取っておく。
function playMagicAttackFX(kind) {
  const element = kind || (_battle && _battle.element) || 'fire';
  try {
    if (typeof launchMagicProjectile === 'function') {
      launchMagicProjectile(element, {
        onImpact: function() {
          // 着弾時に火花粒子を敵位置から少し追加 (属性絵文字で)
          const emoji = element === 'fire'    ? '🔥'
                      : element === 'ice'     ? '❄'
                      : element === 'thunder' ? '⚡'
                      : element === 'light'   ? '✨'
                      : element === 'heal'    ? '💚'
                      : element === 'wind'    ? '💨'
                      : '✨';
          _spawnEnemyImpactParticles(emoji, 6);
        }
      });
    }
  } catch (e) { /* ignore — SFX だけでも鳴らす */ }
  // SFX は launchMagicProjectile 内の発射音+着弾音に任せる。
  // 既存の playFireMagicSound (全属性 fire 音) は二重で重くなるので呼ばない。
}

function playFireMagicSound() {
  if (typeof window !== 'undefined' && window.PONO_FIRE_MAGIC_SFX) {
    try {
      const a = new Audio(window.PONO_FIRE_MAGIC_SFX);
      a.volume = 0.6; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through to synth */ }
  }
  // 合成: whoosh (フィルタースイープ + 低音の轟き)
  withAudio(ac => {
    const now = ac.currentTime;
    const bufLen = Math.floor(ac.sampleRate * 0.55);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      ch[i] = (Math.random() * 2 - 1) * (1 - t) * (0.3 + 0.7 * Math.sin(t * Math.PI));
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const flt = ac.createBiquadFilter();
    flt.type = 'bandpass';
    flt.frequency.setValueAtTime(320, now);
    flt.frequency.exponentialRampToValueAtTime(1400, now + 0.3);
    flt.Q.value = 1.2;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.36, now + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
    src.connect(flt); flt.connect(g); g.connect(ac.destination);
    src.start(now); src.stop(now + 0.58);
    // 低音サブ
    const o = ac.createOscillator(), og = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(85, now);
    o.frequency.exponentialRampToValueAtTime(40, now + 0.4);
    og.gain.setValueAtTime(0, now);
    og.gain.linearRampToValueAtTime(0.1, now + 0.05);
    og.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    o.connect(og); og.connect(ac.destination);
    o.start(now); o.stop(now + 0.45);
  });
}

// 敵の中心から emoji パーティクルを放射
function _spawnEnemyImpactParticles(emoji, n) {
  const els = _battleEls();
  if (!els.enemy || !els.stage) return;
  const enemyRect = els.enemy.getBoundingClientRect();
  const stageRect = els.stage.getBoundingClientRect();
  const cx = enemyRect.left + enemyRect.width / 2 - stageRect.left;
  const cy = enemyRect.top + enemyRect.height / 2 - stageRect.top;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'enemy-impact-particle';
    p.textContent = emoji;
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    const angle = (i / n) * Math.PI * 2 + Math.random() * 0.4;
    const dist = 38 + Math.random() * 30;
    p.style.setProperty('--dx', (Math.cos(angle) * dist) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist) + 'px');
    els.stage.appendChild(p);
    setTimeout(() => { if (p.parentNode) p.remove(); }, 700);
  }
}

// ===== 敵の反撃 (演出のみ、HPは減らさない) =====
// 差替フック: window.PONO_ENEMY_ATTACK_SFX, window.PONO_HERO_NAME
const BATTLE_HERO_NAME_DEFAULT = 'ポノ';
function _battleHeroName() {
  return (typeof window !== 'undefined' && window.PONO_HERO_NAME) || BATTLE_HERO_NAME_DEFAULT;
}

function enemyCounterAttack() {
  if (!_battle.active) return;
  const damage = 2 + Math.floor(Math.random() * 4); // 2〜5
  const enemyName = (_battle.enemy && _battle.enemy.name) || 'てき';
  // 「〇〇の こうげき！」告知を出してから一拍置いて攻撃
  _showEnemyAttackAnnounce(enemyName + 'の こうげき！', function() {
    if (!_battle.active) return;
    _shakeScreen();
    try { playEnemyAttackSound(); } catch (e) {}
    _showPlayerDamageWindow(damage);
  });
}

// 敵の攻撃告知ウィンドウ (ドラクエ風)
// 表示 ~0.85s → 閉じた後 onAttack() で実際の攻撃演出に入る
function _showEnemyAttackAnnounce(text, onAttack) {
  // 既に出ている告知は掃除
  const old = document.querySelector('.enemy-attack-announce');
  if (old) old.remove();
  const w = document.createElement('div');
  w.className = 'enemy-attack-announce';
  w.innerHTML =
    '<div class="dq-window enemy-attack-window">' +
      '<div class="dq-line"><span class="dq-line-emphasis">' + text + '</span></div>' +
    '</div>';
  document.body.appendChild(w);
  // 表示 → フェード → onAttack
  setTimeout(() => { w.style.opacity = '0'; }, 850);
  setTimeout(() => {
    if (w.parentNode) w.remove();
    if (onAttack) onAttack();
  }, 1200);
}

function _shakeScreen() {
  const app = document.getElementById('app') || document.body;
  if (!app) return;
  app.classList.remove('screen-shake');
  void app.offsetWidth; // reflow でアニメ再始動
  app.classList.add('screen-shake');
  setTimeout(() => app.classList.remove('screen-shake'), 600);
}

function _showPlayerDamageWindow(damage) {
  const old = document.querySelector('.player-damage-window');
  if (old) old.remove();
  const w = document.createElement('div');
  w.className = 'player-damage-window';
  const name = _battleHeroName();
  w.innerHTML =
    '<div class="dq-window">' +
      '<div class="dq-line">' + name + 'は <span class="dmg-num">' + damage + '</span> のダメージを うけた！</div>' +
    '</div>';
  document.body.appendChild(w);
  // 表示 2.4s + フェード 0.35s に延長 (元 1.4s では見える前に消えていた)
  setTimeout(() => {
    w.style.opacity = '0';
    setTimeout(() => { if (w.parentNode) w.remove(); }, 350);
  }, 2400);
}

function playEnemyAttackSound() {
  if (typeof window !== 'undefined' && window.PONO_ENEMY_ATTACK_SFX) {
    try {
      const a = new Audio(window.PONO_ENEMY_ATTACK_SFX);
      a.volume = 0.55; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through to synth */ }
  }
  // 合成: 低めの "ドン" (サインのピッチダウン + ノイズ衝撃)
  withAudio(ac => {
    const now = ac.currentTime;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(220, now);
    o.frequency.exponentialRampToValueAtTime(55, now + 0.18);
    g.gain.setValueAtTime(0.46, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now + 0.3);
    // ノイズ衝撃
    const bufLen = Math.floor(ac.sampleRate * 0.14);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / bufLen) * 0.85;
    const src = ac.createBufferSource(), ng = ac.createGain();
    src.buffer = buf;
    ng.gain.setValueAtTime(0.32, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    src.connect(ng); ng.connect(ac.destination);
    src.start(now); src.stop(now + 0.15);
  });
}

// 5 文字目完成時に呼ばれる: フルチャージ→魔法発動→撃破演出→ファンファーレ
function battleVictory(spellKind, onDone) {
  if (!_battle.active) { if (onDone) onDone(); return; }
  const els = _battleEls();
  // 最終ダメージを入れる
  battleHitEnemy({ finisher: true });
  // 五芒星全点灯グロウ
  els.stars.forEach(s => s.classList.add('lit'));
  if (els.charge) els.charge.classList.add('charged');

  // 既存の全画面魔法陣を再生 (0.4s 後)
  setTimeout(() => {
    try { if (typeof launchMagicCircle === 'function') launchMagicCircle(spellKind || 'light'); }
    catch (e) { /* ignore */ }
  }, 400);

  // 魔法動画中盤で敵を撃破 (魔法動画は約 2.5s)
  setTimeout(() => {
    els.enemy.classList.remove('damaged');
    els.enemy.classList.add('defeated');
    _showEnemySpeech('うわぁぁ〜！', 1400);
  }, 2400);

  // ファンファーレ + 撃破ウィンドウ + BGM フェード
  setTimeout(() => {
    try { fadeBgm(0, 300); } catch (e) {}
    // 「〇〇を たおした！」ウィンドウ (キャンバス位置に重ねる)
    try { _showDefeatedWindow(_battle.enemy && _battle.enemy.name); } catch (e) {}
    try {
      const a = playVictoryFanfare();
      let cleaned = false;
      const onEnd = () => {
        if (cleaned) return;
        cleaned = true;
        try { fadeBgm(0.28, 600); } catch (e) {}
        try { _hideDefeatedWindow(); } catch (e) {}
      };
      if (a && typeof a.addEventListener === 'function') {
        a.addEventListener('ended', onEnd);
        // 保険: 'ended' が iOS 等で発火しなくても 4s 後には必ず消す
        setTimeout(onEnd, 4000);
      } else {
        // 合成フォールバック (約 1.5s)
        setTimeout(onEnd, 1800);
      }
    } catch (e) {}
  }, 2800);

  // 行クリアダイアログへの遷移はファンファーレ中でも走らせる。
  // ダイアログが出る時点で「たおした！」ウィンドウは確実に消しておく。
  setTimeout(() => {

// ===== 勝利ファンファーレ (mp3 優先、未ロード時は Web Audio 合成にフォールバック) =====
// 返り値: HTMLAudioElement | undefined (mp3 の場合のみ — 呼び出し側で ended を購読できる)
function playVictoryFanfare() {
  const url = (typeof window !== 'undefined' && window.PONO_VICTORY_SFX)
    ? window.PONO_VICTORY_SFX
    : BATTLE_SFX.victory;
  if (url) {
    try {
      const a = new Audio(url);
      a.volume = 0.75;
      a.play().catch(() => {});
      return a;
    } catch (e) { /* fall through to synth */ }
  }
  withAudio(ac => {
    const now = ac.currentTime;
    // C-E-G-C-G-C 勝利モチーフ
    const notes = [
      {f: 523.25, t: 0.00, d: 0.16, g: 0.32},  // C5
      {f: 659.25, t: 0.15, d: 0.16, g: 0.32},  // E5
      {f: 783.99, t: 0.30, d: 0.16, g: 0.32},  // G5
      {f: 1046.5, t: 0.45, d: 0.32, g: 0.36},  // C6 long
      {f: 783.99, t: 0.82, d: 0.16, g: 0.30},  // G5
      {f: 1046.5, t: 0.98, d: 0.55, g: 0.40},  // C6 finale
    ];
    notes.forEach(n => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.value = n.f;
      gain.gain.setValueAtTime(0, now + n.t);
      gain.gain.linearRampToValueAtTime(n.g, now + n.t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + n.t + n.d);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(now + n.t); osc.stop(now + n.t + n.d + 0.05);
    });
  });
}

// BGM ボリュームフェード (linearRamp 風)
function fadeBgm(to, durMs) {
  const el = document.getElementById('bgm');
  if (!el) return;
  const from = Number(el.volume) || 0;
  const start = performance.now();
  const dur = Math.max(50, durMs || 400);
  cancelAnimationFrame(fadeBgm._raf || 0);
  function step(now) {
    const t = Math.min(1, (now - start) / dur);
    el.volume = from + (to - from) * t;
    if (t < 1) fadeBgm._raf = requestAnimationFrame(step);
  }
  fadeBgm._raf = requestAnimationFrame(step);
}

// ===== Hanzi Writer Mode =====
function createWriter(char) {
  // Destroy previous
  if (writer) {
    writerTarget.innerHTML = '';
    writer = null;
  }
  setQuizActive(false);

  const rect = canvasContainer.getBoundingClientRect();
  const size = Math.min(rect.width, rect.height);
  currentScheme = nextColorScheme();

  currentCharData = null;
  strokeNumbers.innerHTML = '';

  // 文字ごとのミス0フラグをリセット、もんすたーさんも差し替え
  _perfectCurrentChar = true;
  _setMonsterForChar(char);

  writer = HanziWriter.create(writerTarget, char, {
    width: size,
    height: size,
    padding: 25,
    strokeColor: currentScheme.stroke,
    outlineColor: currentScheme.outline,
    drawingColor: currentScheme.drawing,
    highlightColor: currentScheme.highlight,
    radicalColor: currentScheme.stroke,
    drawingWidth: 16,
    strokeAnimationSpeed: 0.5,
    delayBetweenStrokes: 800,
    showOutline: true,
    showCharacter: false,
    charDataLoader: function(char, onComplete) {
      // Try kana-json first (for hiragana/katakana)
      const url = 'https://cdn.jsdelivr.net/gh/ailectra/kana-json@v0.0.1/data/' + char + '.json';
      fetch(url)
        .then(r => {
          if (!r.ok) throw new Error('Not found');
          return r.json();
        })
        .then(data => {
          currentCharData = data;
          showStrokeNumbers(data, size);
          onComplete(data);
        })
        .catch(() => {
          // Fallback: try hanzi-writer-data
          const url2 = 'https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + char + '.json';
          fetch(url2)
            .then(r => {
              if (!r.ok) throw new Error('Not found');
              return r.json();
            })
            .then(data => {
              currentCharData = data;
              showStrokeNumbers(data, size);
              onComplete(data);
            })
            .catch(() => {
              console.warn('No data for character:', char);
            });
        });
    }
  });

  // まずお手本を1回流してからquizモードへ
  // チュートリアル表示中はスキップ（チュートリアル終了後に実行される）
  if (!_tutorialActive && !_rowPracticeActive) {
    // チュートリアルが非表示 かつ 行練習モードでもなければ通常通りお手本→quiz
    withAudio(function(ac) {
      var now = ac.currentTime;
      var osc = ac.createOscillator(), g = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.15);
      osc.frequency.setValueAtTime(784, now + 0.3);
      g.gain.setValueAtTime(0.12, now);
      g.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
      osc.connect(g); g.connect(ac.destination);
      osc.start(now); osc.stop(now + 0.45);
    });
    _hedgeBubble.textContent = 'このじゅんばんで かくよ！';
    _ponoBubble.textContent = 'このじゅんばんで かくよ！';
    ponoHint();                    // ← ポノが「このじゅんばんで」と指さし
    document.getElementById('demoIndicator').style.display = 'block';
    writer.animateCharacter({
      onComplete: function() {
        document.getElementById('demoIndicator').style.display = 'none';
        _hedgeBubble.textContent = 'かいてみよう！';
        _ponoBubble.textContent = 'かいてみよう！';
        writer.hideCharacter();
        // 「スタート！」表示してからquiz開始
        var dim = document.getElementById('tut-dim');
        var bubble = document.getElementById('tut-bubble');
        if (dim && bubble) {
          dim.classList.remove('hidden');
          bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
          bubble.innerHTML = '<div style="font-size:1.5rem;font-weight:900;color:#F2915A;">✏️ スタート！</div>';
          bubble.classList.remove('hidden');
          setTimeout(function() {
            dim.classList.add('hidden');
            bubble.classList.add('hidden');
            startQuiz();
          }, 1000);
        } else {
          startQuiz();
        }
      }
    });
  }
  // チュートリアル表示中はお手本を待機（showTutorialのendTutで開始される）
}

// ===== Stroke Order Numbers =====
function showStrokeNumbers(charData, targetSize) {
  strokeNumbers.innerHTML = '';
  if (!charData || !charData.medians) return;

  // Wait for HanziWriter to render SVG, then use its internal transform
  setTimeout(() => {
    const svg = writerTarget.querySelector('svg');
    if (!svg) return;
    const containerRect = canvasContainer.getBoundingClientRect();

    // Find HanziWriter's top-level group (has the coordinate transform)
    const topGroup = svg.querySelector('g');
    if (!topGroup) return;

    charData.medians.forEach((median, i) => {
      if (!median || median.length === 0) return;
      const [mx, my] = median[0];

      // Use SVG's coordinate transform API for pixel-perfect positioning
      const pt = svg.createSVGPoint();
      pt.x = mx;
      pt.y = my;
      const ctm = topGroup.getScreenCTM();
      const screenPt = pt.matrixTransform(ctm);

      // Convert screen coords to container-relative percentage
      const relX = screenPt.x - containerRect.left;
      const relY = screenPt.y - containerRect.top;
      const pctX = (relX / containerRect.width) * 100;
      const pctY = (relY / containerRect.height) * 100;

      const num = document.createElement('div');
      num.className = 'stroke-number';
      num.textContent = i + 1;
      num.style.left = pctX + '%';
      num.style.top = pctY + '%';
      num.style.background = currentScheme.stroke;
      strokeNumbers.appendChild(num);
    });
  }, 200);
}

function startQuiz() {
  if (!writer) return;
  setQuizActive(true);
  writer.quiz({
    onCorrectStroke: function(data) {
      playStrokeSound();
      _hideMonsterBubble();
    },
    onComplete: function(data) {
      setQuizActive(false);
      showCompletion();
    },
    onMistake: function(data) {
      _perfectCurrentChar = false;
      _hideMonsterBubble();
    },
    showHintAfterMisses: 3,
    highlightOnComplete: true,
    highlightCompleteColor: currentScheme.stroke
  });
}

  const stamps = loadStamps();

  rows.forEach(function(row, i) {
    const btn = document.createElement('button');
    btn.className = 'rs-row-btn';
    // Check completion
    let allDone = true;
    for (let j = 0; j < row.count; j++) {
      if (!stamps[currentCategory]?.[row.start + j]) { allDone = false; break; }
    }
    if (allDone) btn.classList.add('all-done');

    // Row label
    const labelEl = document.createElement('div');
    labelEl.className = 'rs-row-label';
    labelEl.textContent = row.label + 'ぎょう';
    btn.appendChild(labelEl);

    let charsStr = '';
    for (let j = 0; j < row.count; j++) charsStr += cat.chars[row.start + j];
    charsEl.textContent = charsStr;
    btn.appendChild(charsEl);

    if (allDone) {
      const doneEl = document.createElement('div');
      doneEl.className = 'rs-row-done-mark';
      doneEl.textContent = '✓ クリア！';
      btn.appendChild(doneEl);
    }

    btn.addEventListener('click', function() { enterPractice(i); });
    grid.appendChild(btn);

  // Wire category tabs
  var catTabs = document.querySelectorAll('#rsCategoryTabs .category-tab');
  catTabs.forEach(function(tab) {

    tab.onclick = function() {
      if (tab.dataset.cat === currentCategory) return;
      currentCategory = tab.dataset.cat;
      catTabs.forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      buildRowSelectScreen();
    };
  });
}

// ===== World Map Scene =====
// map.png の「一番左の森」だけを見せるため、.map-world を viewport 500% に拡大して
// 初期カメラは左端 (0%) に固定。ヒーローは森の入口、モンスターはその少し右。
// 「すすむ」ボタン連打で hero の world 内 X 座標を増やし、一定距離でモンスターと衝突 → 戦闘開始。
//
// 座標系:
//   hero / monster の left は world 内 % (0〜100 の相対値。ただし world 幅は viewport の 500%)
//   world の scroll(translateX) も viewport 幅に対する % で計算
const MAP_STATE = {
  active: false,
  hero: 6.0,       // world 内 % (森の入口=一番左寄り)
  monster: 12.0,   // 初期は勇者のすぐ右 (ぶつかるまで数歩)
  step: 2.6,       // 1 タップで進む距離 (% of world)
  collideMargin: 2.2,
  walking: false,
  walkFrame: 0,
  onCollision: null,
};
const MAP_HERO_GENDER_KEY = 'pono_hero_gender';
// 男女切替は将来 UI で追加想定。今はデフォルト男性、localStorage で上書き可能。
function _mapHeroGender() {
  try {
    var g = localStorage.getItem(MAP_HERO_GENDER_KEY);
    return (g === 'f') ? 'f' : 'm';
  } catch (e) { return 'm'; }
}
function _mapHeroFrame(kind) {
  // kind: 'stand' | 'walk1' | 'walk2' (003/005/007 あたりが歩きフレーム、002=standing)
  var g = _mapHeroGender();
  // スプライトシート的に: 002=正面立ち, 003=右歩き1, 005=右歩き2 (正確な内訳はアセット任せ)
  var frame = '002';
  if (kind === 'walk1') frame = '003';
  else if (kind === 'walk2') frame = '005';
  return '../assets/images/hero/hero_' + g + '_' + frame + '.png';
}
function _mapMonsterSrc() {
  // 戦闘で使っているキノコ (monster_005) をそのまま縮小表示。
  return '../assets/images/monsters/chars/monster_005.png';
}
function _mapApplyTransforms() {
  var world = document.getElementById('mapWorld');
  var viewport = document.getElementById('mapViewport');
  var hero = document.getElementById('mapHero');
  var mon  = document.getElementById('mapMonster');
  if (!world || !viewport || !hero || !mon) return;
  // world 幅は viewport の 500% → 1% (world) = 0.05 * viewport width
  // カメラ: hero を viewport の 30% に置きたい
  var heroW = MAP_STATE.hero;             // world 内 %
  var monW  = MAP_STATE.monster;
  // hero の world 内 X を viewport 内 X に写像: viewportX% = heroW% * 5 - cameraShift
  // camera shift を「hero が viewport の 30% に来るように」決める
  // worldX_in_viewport_percent = heroW * 5 (world が 500% 幅なので)
  var heroViewPct = heroW * 5;
  // ただし左端クランプ: camera は世界の開始時は 0 固定 (左端は壁)
  var cameraShift = Math.max(0, heroViewPct - 30);
  // 右端クランプ: cameraShift は world 幅(500%) - viewport幅(100%) を超えない
  cameraShift = Math.min(cameraShift, 400);
  world.style.transform = 'translateX(-' + cameraShift.toFixed(2) + '%)';
  // hero / monster の world 内位置は world 要素基準 (world 内 % → 0〜100% で left)
  // world 内 0〜100% ではなく、ここでは world 幅 (=500%viewport) の何% か。
  // .map-world の width:500% 内で left:heroW% と書けば、viewport から見ると heroW*5%
  hero.style.left = heroW.toFixed(2) + '%';
  mon.style.left  = monW.toFixed(2)  + '%';
}
function openMapScene(opts) {
  opts = opts || {};
  MAP_STATE.active = true;
  MAP_STATE.hero = (opts.heroStart != null) ? opts.heroStart : 6.0;
  MAP_STATE.monster = (opts.monsterX != null) ? opts.monsterX : 12.0;
  MAP_STATE.onCollision = opts.onCollision || null;
  var hero = document.getElementById('mapHero');
  var mon  = document.getElementById('mapMonster');
  if (hero) hero.src = _mapHeroFrame('stand');
  if (mon)  mon.src  = _mapMonsterSrc();
  var scene = document.getElementById('mapScene');
  if (scene) { scene.classList.add('visible'); scene.setAttribute('aria-hidden', 'false'); }
  // マップ BGM に切替
  try { if (typeof setBgmFor === 'function') setBgmFor('map'); } catch (e) {}
  _mapApplyTransforms();
  // ボタンのハンドラは 1 回だけ登録
  var btn = document.getElementById('mapWalkBtn');
  if (btn && !btn._ponoBound) {
    btn._ponoBound = true;
    btn.addEventListener('click', mapWalkStep);
  }
  if (btn) btn.disabled = false;
}
function closeMapScene() {
  MAP_STATE.active = false;
  var scene = document.getElementById('mapScene');
  if (scene) { scene.classList.remove('visible'); scene.setAttribute('aria-hidden', 'true'); }
}
function mapWalkStep() {
  if (!MAP_STATE.active || MAP_STATE.walking) return;
  MAP_STATE.walking = true;
  var hero = document.getElementById('mapHero');
  MAP_STATE.walkFrame = (MAP_STATE.walkFrame + 1) % 2;
  if (hero) hero.src = _mapHeroFrame(MAP_STATE.walkFrame ? 'walk1' : 'walk2');
  MAP_STATE.hero += MAP_STATE.step;
  // クランプ: world は 100%、モンスターを越えないように (衝突で止める)
  if (MAP_STATE.hero >= MAP_STATE.monster - MAP_STATE.collideMargin) {
    MAP_STATE.hero = MAP_STATE.monster - MAP_STATE.collideMargin;
    _mapApplyTransforms();
    setTimeout(_mapCollide, 320);
    return;
  }
  _mapApplyTransforms();
  setTimeout(function() {
    if (hero) hero.src = _mapHeroFrame('stand');
    MAP_STATE.walking = false;
  }, 280);
}
function _mapCollide() {
  // フラッシュを出してから戦闘開始
  var viewport = document.getElementById('mapViewport');
  if (viewport) {
    var flash = document.createElement('div');
    flash.className = 'map-collide-flash';
    viewport.appendChild(flash);
    setTimeout(function() { if (flash.parentNode) flash.remove(); }, 700);
  }
  var btn = document.getElementById('mapWalkBtn');
  if (btn) btn.disabled = true;
  setTimeout(function() {
    closeMapScene();
    var cb = MAP_STATE.onCollision;
    MAP_STATE.onCollision = null;
    MAP_STATE.walking = false;
    if (typeof cb === 'function') { try { cb(); } catch (e) {} }
  }, 600);
}
window.openMapScene = openMapScene;

// ===== Row Practice Mode (5文字1セット) =====
let _rowPracticeActive = false;
let _rowPracticeRow = null;   // { start, count, label }
let _rowPracticeStep = 0;     // 0..count-1 (current char in row)
let _rowPracticePhase = '';   // 'demo' | 'quiz_guided' | 'show_word' | 'quiz_free' | 'done'

function startRowPractice(rowIndex) {
  const rows = GOJUON_ROWS[currentCategory];
  _rowPracticeRow = rows[rowIndex];
  _rowPracticeStep = 0;
  _rowPracticeActive = true;
  currentRow = rowIndex;
  // バトル開始: 行ラベル (あ,か,さ...) を rowId として渡す。未定義行は _enemyForRow が fallback
  try { _showBattleStage(_rowPracticeRow && _rowPracticeRow.label); } catch (e) {}
  // バトル中は「敵が一言 (_showBattleStage 内の taunts[0]) → 導入モーダル → お手本」の順に進める。
  // バトルでない場合 (将来の単独練習など) は従来どおり即座にお手本へ。
  if (_battle.active) {
    _showBattleIntro(function() { _rowPracticeNextChar(); });
  } else {
    _rowPracticeNextChar();
  }
}

// バトル導入モーダル: 敵のセリフが流れた後 (~1.2s) に 2 枚のモーダルを順に表示して、
// 最後に onDone → お手本アニメーションへ進む。

}

function _rowPracticeNextChar() {
  if (!_rowPracticeRow) { _rowPracticeActive = false; return; }
  if (_rowPracticeStep >= _rowPracticeRow.count) {
    _rowPracticeComplete();
    return;
  }
  const globalIdx = _rowPracticeRow.start + _rowPracticeStep;
  currentCharIndex = globalIdx;
  loadCharacter();

  // Phase 1: Demo (skip if tutorial is active — tutorial handles the first demo)
  _rowPracticePhase = 'demo';
  setTimeout(function() {
    if (!writer || !_rowPracticeActive || _tutorialActive) return;
    document.getElementById('demoIndicator').style.display = 'block';
    _hedgeBubble.textContent = 'みて みて！';
    _ponoBubble.textContent = 'みて みて！';
    writer.animateCharacter({
      onComplete: function() {
        document.getElementById('demoIndicator').style.display = 'none';
        if (!_rowPracticeActive) return;
        // 「なぞり スタート！」表示
        writer.hideCharacter();
        var startOv = document.createElement('div');
        startOv.style.cssText = 'position:fixed;inset:0;z-index:1100;display:flex;align-items:center;justify-content:center;pointer-events:none;';
        startOv.innerHTML = '<div style="font-size:1.8rem;font-weight:900;color:#F2915A;background:rgba(255,255,255,0.9);padding:14px 32px;border-radius:24px;box-shadow:0 4px 20px rgba(242,145,90,0.3);animation:fadeIn 0.3s ease;">✏️ なぞり スタート！</div>';
        document.body.appendChild(startOv);
        setTimeout(function() {
          startOv.remove();
          if (!_rowPracticeActive) return;
          // Phase 2: Quiz with guides
          _rowPracticePhase = 'quiz_guided';
          _hedgeBubble.textContent = 'かいてみよう！';
          _ponoBubble.textContent = 'かいてみよう！';
          setQuizActive(true);
          writer.quiz({
            onCorrectStroke: function() { playStrokeSound(); _hideMonsterBubble(); },
            onMistake: function() { _perfectCurrentChar = false; _hideMonsterBubble(); },
            onComplete: function() {
            setQuizActive(false);
            if (!_rowPracticeActive) return;
            playSuccessSound();
            // 1 文字成功のたびに「シャキーン！」と白フラッシュ
            try { playShakeenFlash(); } catch (e) {}
            launchConfetti();
            saveStamp(currentCategory, currentCharIndex);
            markCharDone(currentCharIndex);
            _playMonsterPop();
            _awardAcorns(_perfectCurrentChar);
            if (window.incrementStat) {
              window.incrementStat('writing_chars', 1);
              if (currentCategory === 'hiragana') window.incrementStat('writing_hiragana', 1);
              if (currentCategory === 'katakana') window.incrementStat('writing_katakana', 1);
            }
            // === バトル分岐 ===
            const isFinisher = _rowPracticeRow && (_rowPracticeStep === (_rowPracticeRow.count - 1));
            // Phase 3-4 を後でまとめて呼び出せるように関数化
            const startWordPhases = function() {
              _rowPracticePhase = 'show_word';
              const data = WORD_DATA[currentCategory][currentCharIndex];
              const char = CATEGORIES[currentCategory].chars[currentCharIndex];
              if (data && data.word) {
                _showRowPracticeWord(char, data, function() {
                  _rowPracticePhase = 'quiz_free';
                  _hedgeBubble.textContent = 'ことばで かこう！';
                  _ponoBubble.textContent = 'ことばで かこう！';
                  _startWordContextPhase(char, data, function() {
                    _rowPracticeStep++;
                    _rowPracticeNextChar();
                  });
                });
              } else {
                // No word data (を, ん) — skip word phase
                setTimeout(function() {
                  _rowPracticeStep++;
                  _rowPracticeNextChar();
                }, 1200);
              }
            };

            if (isFinisher && _battle.active) {
              // 5文字目: Phase 3-4 をスキップして勝利フローへ
              try {
                battleVictory('fire', function() {
                  _rowPracticeStep++;
                  _rowPracticeNextChar();
                });
              } catch (e) {
                _rowPracticeStep++;
                _rowPracticeNextChar();
              }
              return;
            }

            if (_battle.active) {
              // バトル中は「ことばモーダル (アリのア〜, カーテンのカ〜)」「音声読み上げ」「ことばで書く」phase を
              // すべてスキップし、1 回のなぞり = 1 回の攻撃で次の文字へ進める。
              try { battleHitEnemy({ finisher: false }); } catch (e) {}
              // 魔法動画は ~3.2s 出るので、敵の反撃はその後に十分な間を空けて出す。
              // 反撃は「〇〇の こうげき！」告知 (~1.2s) → ダメージ演出 (~2.75s) → なので
              // t=2200 で告知、t=~3400 で攻撃、t=~6150 でダメージ消え、t=6800 で次の文字。
              setTimeout(function() { try { enemyCounterAttack(); } catch (e) {} }, 2200);
              setTimeout(function() {
                _rowPracticeStep++;
                _rowPracticeNextChar();
              }, 6800);
            } else {
              startWordPhases();
            }
          },
          showHintAfterMisses: 3,
          highlightOnComplete: true,
          highlightCompleteColor: currentScheme.stroke
        });
        }, 1000); // なぞりスタート表示時間
      }
    });
  }, 500);
}

  });
}

function exitRowPractice() {

  var wcw = document.getElementById('wordContextWrap');
  if (wcw) wcw.remove();
  var cw = document.querySelector('.canvas-wrap');
  if (cw) cw.style.display = '';
  var mc = document.querySelector('.mid-col');
  if (mc) mc.style.display = '';

  var pb = document.getElementById('ponoBubble');

  if (pb) pb.style.left = '';
}

// ===== Word Context Phase (Phase 4) =====
function _startWordContextPhase(char, data, onComplete) {
  var traceArea = document.querySelector('.trace-area');
  var canvasWrap = document.querySelector('.canvas-wrap');
  canvasWrap.style.display = 'none';

  // Hide controls during word context (prevent overlap with 3+ char words)
  var midCol = document.querySelector('.mid-col');
  if (midCol) midCol.style.display = 'none';

  // Adjust Pono position for long words (3+ chars)
  var ponoDeco = document.querySelector('.pono-deco');
  var ponoBubbleEl = document.getElementById('ponoBubble');
  var wordLen = data.word ? data.word.length : 1;
  if (ponoDeco && wordLen >= 3) {
    // 画面左端に張り付かないよう 4〜10px の正の値にする（以前は見切れていた）
    ponoDeco.style.left = wordLen >= 4 ? '4px' : '10px';
    if (ponoBubbleEl) ponoBubbleEl.style.left = wordLen >= 4 ? '8px' : '14px';
  }

  // Create word context wrapper
  var wcWrap = document.createElement('div');
  wcWrap.className = 'word-context-wrapper';
  wcWrap.id = 'wordContextWrap';

  // Emoji
  if (data.emoji) {
    var emojiDiv = document.createElement('div');
    emojiDiv.className = 'word-context-emoji';
    emojiDiv.textContent = data.emoji;
    wcWrap.appendChild(emojiDiv);
  }

  // Word row
  var wordRow = document.createElement('div');
  wordRow.className = 'word-context-row';

  // Left cell: writable canvas (大きく表示)
  var leftCell = document.createElement('div');
  leftCell.className = 'word-context-cell writable';
  var totalChars = data.word ? data.word.length : 1;
  // メインの書くマスは大きく、残りは小さく
  var mainSize = Math.min(Math.min(window.innerWidth, window.innerHeight) * 0.42, 200);
  var smallSize = Math.min(mainSize * 0.45, 70);
  leftCell.style.width = mainSize + 'px';
  leftCell.style.height = mainSize + 'px';
  var wcTarget = document.createElement('div');
  wcTarget.id = 'wcWriterTarget';
  leftCell.appendChild(wcTarget);
  wordRow.appendChild(leftCell);

  // Right cell(s): remaining text characters (小さく表示)
  var remaining = data.word.slice(char.length);
  if (remaining) {
    for (var ri = 0; ri < remaining.length; ri++) {
      var rightCell = document.createElement('div');
      rightCell.className = 'word-context-cell text-only';
      rightCell.style.width = smallSize + 'px';
      rightCell.style.height = smallSize + 'px';
      rightCell.style.fontSize = (smallSize * 0.5) + 'px';
      rightCell.textContent = remaining[ri];
      wordRow.appendChild(rightCell);
    }
  }

  wcWrap.appendChild(wordRow);
  traceArea.appendChild(wcWrap);

  // Create mini HanziWriter
  var wcWriter = HanziWriter.create(wcTarget, char, {
    width: mainSize,
    height: mainSize,
    padding: 15,
    strokeColor: currentScheme.stroke,
    outlineColor: currentScheme.outline,
    drawingColor: currentScheme.drawing,
    highlightColor: currentScheme.highlight,
    drawingWidth: 14,
    strokeAnimationSpeed: 0.5,
    showOutline: true,
    showCharacter: false,
    charDataLoader: function(c, onLoad) {
      var url = 'https://cdn.jsdelivr.net/gh/ailectra/kana-json@v0.0.1/data/' + c + '.json';
      fetch(url)
        .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
        .then(function(d) { onLoad(d); })
        .catch(function() {
          var url2 = 'https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + c + '.json';
          fetch(url2)
            .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
            .then(function(d) { onLoad(d); })
            .catch(function() {});
        });
    }
  });

  setQuizActive(true);
  wcWriter.quiz({
    onCorrectStroke: function() { playStrokeSound(); _hideMonsterBubble(); },
    onComplete: function() {
      setQuizActive(false);
      if (!_rowPracticeActive) return;
      playSuccessSound();
      speakWord(char, data.word);
      _hedgeBubble.textContent = 'すごーい！';
      _ponoBubble.textContent = 'すごーい！';
      ponoCheer();                   // ← 行練習コンプ時も歓喜ポーズ
      // speakWord再生（約1.5秒）+ 2秒待ちで次へ
      setTimeout(function() {
        if (!_rowPracticeActive) return;
        wcWrap.remove();
        canvasWrap.style.display = '';
        var mc = document.querySelector('.mid-col');
        if (mc) mc.style.display = '';
        // Restore Pono position
        var pd = document.querySelector('.pono-deco');
        var pb = document.getElementById('ponoBubble');
        if (pd) pd.style.left = '';
        if (pb) pb.style.left = '';
        if (onComplete) onComplete();
      }, 3500);
    },
    showHintAfterMisses: 3,
    highlightOnComplete: true,
    highlightCompleteColor: currentScheme.stroke
  });
}

// ===== Orientation change — force viewport recalc =====
function fixViewportHeight() {
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const h = vh + 'px';
  document.documentElement.style.height = h;
  document.body.style.height = h;
  document.body.style.width = vw + 'px';
  document.getElementById('app').style.height = h;
  // Kill any scroll offset
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  if (window.visualViewport) {
    window.scrollTo(window.visualViewport.offsetLeft, window.visualViewport.offsetTop);
  }
}
function onOrientationChange() {
  fixViewportHeight();
  setTimeout(fixViewportHeight, 50);
  setTimeout(fixViewportHeight, 150);
  setTimeout(fixViewportHeight, 400);
  setTimeout(fixViewportHeight, 800);
  if (_currentScreen === 'select') buildRowSelectScreen();
}
landscapeMQ.addEventListener('change', onOrientationChange);
window.addEventListener('orientationchange', () => {
  setTimeout(fixViewportHeight, 50);
  setTimeout(fixViewportHeight, 200);
  setTimeout(fixViewportHeight, 500);
});
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', fixViewportHeight);
} else {
  window.addEventListener('resize', fixViewportHeight);
}
fixViewportHeight();

// ===== BGM =====
// RPG 化に合わせて「書き取り画面 = 戦闘」→ battleA/B、
// 将来の「ワールドマップ」→ mapA/B を切替で鳴らす。
const BGM_TRACKS = {
  battle: ['../assets/audio/bgm/battleA.mp3', '../assets/audio/bgm/battleB.mp3'],
  map:    ['../assets/audio/bgm/mapA.mp3',    '../assets/audio/bgm/mapB.mp3'],
};
const bgm = document.getElementById('bgm');
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';
let bgmStarted = false;
let _bgmKind = null;
bgm.volume = 0.28;

function setBgmFor(kind) {
  const pool = BGM_TRACKS[kind];
  if (!pool) return;
  if (_bgmKind === kind && bgm.src) return; // 同系列なら継続
  _bgmKind = kind;
  const track = pool[Math.floor(Math.random() * pool.length)];
  bgm.src = track;
  bgmStarted = false;
  if (bgmEnabled) bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
}
// 初期トラック: 書き取り画面 = 戦闘扱い
setBgmFor('battle');

function tryStartBgm() {
  if (!bgmEnabled || bgmStarted) return;
  if (!bgm.src) setBgmFor('battle');
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
}
// BGM starts when entering practice (user tap satisfies autoplay policy)
window.setBgmFor = setBgmFor;

          bubble.innerHTML = '<div style="font-size:1.5rem;font-weight:900;color:#F2915A;">✏️ スタート！</div>';
          bubble.classList.remove('hidden');
          setTimeout(function() {
            dim.classList.add('hidden');
            bubble.classList.add('hidden');
            if (_rowPracticeActive) {
              // Resume row practice Phase 2 (guided quiz)
              _rowPracticePhase = 'quiz_guided';
              _hedgeBubble.textContent = 'かいてみよう！';
              _ponoBubble.textContent = 'かいてみよう！';
              writer.quiz({
                onCorrectStroke: function() { playStrokeSound(); _hideMonsterBubble(); },
                onMistake: function() { _perfectCurrentChar = false; _hideMonsterBubble(); },
                onComplete: function() {
                  if (!_rowPracticeActive) return;
                  playSuccessSound();
                  launchConfetti();
                  _playMonsterPop();
                  _awardAcorns(_perfectCurrentChar);

                  if (window.incrementStat) {
                    window.incrementStat('writing_chars', 1);
                    if (currentCategory === 'hiragana') window.incrementStat('writing_hiragana', 1);
                    if (currentCategory === 'katakana') window.incrementStat('writing_katakana', 1);
                  }

                  var char = CATEGORIES[currentCategory].chars[currentCharIndex];
                  if (data && data.word) {
                    _rowPracticePhase = 'show_word';
                    _showRowPracticeWord(char, data, function() {
                      _rowPracticePhase = 'quiz_free';
                      _hedgeBubble.textContent = 'ことばで かこう！';
                      _ponoBubble.textContent = 'ことばで かこう！';
                      _startWordContextPhase(char, data, function() {
                        _rowPracticeStep++;

                  } else {
                    setTimeout(function() { _rowPracticeStep++; _rowPracticeNextChar(); }, 2600);

<!-- Service Worker 登録: ホーム画面 PWA からこのページを直接開いた時も
     新しい SW を検知してリロードする (iOS 対策) -->
<script>
  if ('serviceWorker' in navigator) {
    function _ponoSWReload() {
      if (!window._ponoSWRefreshing) {
        window._ponoSWRefreshing = true;
        window.location.reload();
      }
    }
    navigator.serviceWorker.addEventListener('controllerchange', _ponoSWReload);
    navigator.serviceWorker.addEventListener('message', function(e) {
      if (e && e.data && e.data.type === 'sw-updated') _ponoSWReload();
    });
    navigator.serviceWorker.register('/sw.js').then(function(reg) {
      reg.update();
      // 表示復帰 (ホーム画面 PWA からの再前面化) 時にも update を呼ぶ
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') { try { reg.update(); } catch (e) {} }
      });
    }).catch(function() {});
  }
</script>
