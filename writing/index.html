function _rowPracticeComplete() {
  _rowPracticeActive = false;
  _rowPracticePhase = 'done';
  // バトル経由で来たか? (まだ active なまま) ならボーナス/モーダルは battleVictory 側で済ませている。
  // _hideBattleStage() が _battle.active=false にしてしまうので先にフラグを取る。
  const cameFromBattle = !!(_battle && _battle.active);
  const cameFromPuzzle = !!(_puzzle && _puzzle.active);
  try { _hideBattleStage(); } catch (e) {}
  try { _hidePuzzleStage(); } catch (e) {}
  if (cameFromBattle) {
    // どんぐり加算と「たおした / +N / よくがんばった」はバトルログで表示済み。
    // そのまま選択画面に戻る。
    setTimeout(function() { returnToSelect(); }, 200);
    return;

// ===== Word Context Phase (Phase 4) =====
function _startWordContextPhase(char, data, onComplete) {
  var traceArea = document.querySelector('.trace-area');
  var canvasWrap = document.querySelector('.canvas-wrap');
  canvasWrap.style.display = 'none';

  // Hide controls during word context (prevent overlap with 3+ char words)
  var midCol = document.querySelector('.mid-col');
  if (midCol) midCol.style.display = 'none';

  // Adjust Pono position for long words (3+ chars)
  var ponoDeco = document.querySelector('.pono-deco');
  var ponoBubbleEl = document.getElementById('ponoBubble');
  var wordLen = data.word ? data.word.length : 1;
  if (ponoDeco && wordLen >= 3) {
    // 画面左端に張り付かないよう 4〜10px の正の値にする（以前は見切れていた）
    ponoDeco.style.left = wordLen >= 4 ? '4px' : '10px';
    if (ponoBubbleEl) ponoBubbleEl.style.left = wordLen >= 4 ? '8px' : '14px';
  }

  // Create word context wrapper
  var wcWrap = document.createElement('div');
  wcWrap.className = 'word-context-wrapper';
  wcWrap.id = 'wordContextWrap';

  // Emoji
  if (data.emoji) {
    var emojiDiv = document.createElement('div');
    emojiDiv.className = 'word-context-emoji';
    emojiDiv.textContent = data.emoji;
    wcWrap.appendChild(emojiDiv);
  }

  // Word row
  var wordRow = document.createElement('div');
  wordRow.className = 'word-context-row';

  // Left cell: writable canvas (大きく表示)
  var leftCell = document.createElement('div');
  leftCell.className = 'word-context-cell writable';
  var totalChars = data.word ? data.word.length : 1;
  // メインの書くマスは大きく、残りは小さく
  var mainSize = Math.min(Math.min(window.innerWidth, window.innerHeight) * 0.42, 200);
  var smallSize = Math.min(mainSize * 0.45, 70);
  leftCell.style.width = mainSize + 'px';
  leftCell.style.height = mainSize + 'px';
  var wcTarget = document.createElement('div');
  wcTarget.id = 'wcWriterTarget';
  leftCell.appendChild(wcTarget);
  wordRow.appendChild(leftCell);

  // Right cell(s): remaining text characters (小さく表示)
  var remaining = data.word.slice(char.length);
  if (remaining) {
    for (var ri = 0; ri < remaining.length; ri++) {
      var rightCell = document.createElement('div');
      rightCell.className = 'word-context-cell text-only';
      rightCell.style.width = smallSize + 'px';
      rightCell.style.height = smallSize + 'px';
      rightCell.style.fontSize = (smallSize * 0.5) + 'px';
      rightCell.textContent = remaining[ri];
      wordRow.appendChild(rightCell);
    }
  }

  wcWrap.appendChild(wordRow);
  traceArea.appendChild(wcWrap);

  // Create mini HanziWriter
  var wcWriter = HanziWriter.create(wcTarget, char, {
    width: mainSize,
    height: mainSize,
    padding: 15,
    strokeColor: currentScheme.stroke,
    outlineColor: currentScheme.outline,
    drawingColor: currentScheme.drawing,
    highlightColor: currentScheme.highlight,
    drawingWidth: 14,
    strokeAnimationSpeed: 0.5,
    showOutline: true,
    showCharacter: false,
    charDataLoader: function(c, onLoad) {
      var url = 'https://cdn.jsdelivr.net/gh/ailectra/kana-json@v0.0.1/data/' + c + '.json';
      fetch(url)
        .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
        .then(function(d) { onLoad(d); })
        .catch(function() {
          var url2 = 'https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + c + '.json';
          fetch(url2)
            .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
            .then(function(d) { onLoad(d); })
            .catch(function() {});
        });
    }
  });

  setQuizActive(true);
  wcWriter.quiz({
    onCorrectStroke: function() { playNazoriSound(); _hideMonsterBubble(); },
    onComplete: function() {
      setQuizActive(false);
      if (!_rowPracticeActive) return;
      playSuccessSound();
      speakWord(char, data.word);
      _hedgeBubble.textContent = 'すごーい！';
      _ponoBubble.textContent = 'すごーい！';
      ponoCheer();                   // ← 行練習コンプ時も歓喜ポーズ
      // speakWord再生（約1.5秒）+ 2秒待ちで次へ
      setTimeout(function() {
        if (!_rowPracticeActive) return;
        wcWrap.remove();
        canvasWrap.style.display = '';
        var mc = document.querySelector('.mid-col');
        if (mc) mc.style.display = '';
        // Restore Pono position
        var pd = document.querySelector('.pono-deco');
        var pb = document.getElementById('ponoBubble');
        if (pd) pd.style.left = '';
        if (pb) pb.style.left = '';
        if (onComplete) onComplete();
      }, 3500);
    },
    showHintAfterMisses: 3,
    highlightOnComplete: true,
    highlightCompleteColor: currentScheme.stroke
  });
}

function fixViewportHeight() {
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const h = vh + 'px';
  document.documentElement.style.height = h;
  document.body.style.height = h;
  document.body.style.width = vw + 'px';
  document.getElementById('app').style.height = h;
  // Kill any scroll offset
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  if (window.visualViewport) {
    window.scrollTo(window.visualViewport.offsetLeft, window.visualViewport.offsetTop);
  }
}
function onOrientationChange() {
  fixViewportHeight();
  setTimeout(fixViewportHeight, 50);
  setTimeout(fixViewportHeight, 150);
  setTimeout(fixViewportHeight, 400);

  if (_currentScreen === 'select') buildRowSelectScreen();
}

function setBgmFor(kind) {

// 「行を選び直す」reload フラグ (2026-04-21): 「ぎょうを えらびなおす」はどの状態から押されても
// 必ず戻れるように、無条件 reload → ここで splash/title/story を全て飛ばして行選択を表示。
(function _handleGotoSelectFlag() {
  try {
    if (sessionStorage.getItem('pono_goto_select') !== '1') return;
    sessionStorage.removeItem('pono_goto_select');

    // iOS click-through 対策: reload 直後に飛んでくる残留 click (前ページの pointerup 由来)
    // を 600ms だけ全部吸収して、行選択ボタンに誤タップされるのを防ぐ。
    if (sessionStorage.getItem('pono_absorb_next_click') === '1') {
      sessionStorage.removeItem('pono_absorb_next_click');
      var _absorber = function(e) { e.stopPropagation(); e.preventDefault(); };
      ['click', 'pointerdown', 'pointerup', 'touchstart', 'touchend', 'mousedown', 'mouseup'].forEach(function(ev) {
        document.addEventListener(ev, _absorber, true);
      });
      setTimeout(function() {
        ['click', 'pointerdown', 'pointerup', 'touchstart', 'touchend', 'mousedown', 'mouseup'].forEach(function(ev) {
          document.removeEventListener(ev, _absorber, true);
        });
      }, 600);
    }

    function _apply() {
      ['splashScreen', 'titleScreen', 'storyScreen', 'app', 'mapScene'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) { el.style.display = 'none'; el.classList.add('hidden'); }
      });
      try { goToRowSelect(); } catch (e) {}
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', _apply, { once: true });
    } else {
      _apply();
    }
  } catch (e) {}
})();

(function wireTitleScreen() {
  var newBtn = document.getElementById('titleBtnNew');
  var contBtn = document.getElementById('titleBtnContinue');
  var storyEl = document.getElementById('storyScreen');
  var titleEl = document.getElementById('titleScreen');

  // iOS autoplay 対策 (2026-04-21 再):
  // pageload 時の setBgmFor('map') を廃止したので、title 画面への初回
  // user gesture で確実に bgm.src = Theme.mp3 → play() を「同じ tick 内で」
  // 発火させる。setBgmFor 経由だとラッパ内 promise が reject されても
  // フラグ管理が曖昧になるので、ここでは直接 bgm element を操作する。
  var _titleBgmPlaying = false;
  function startTitleBgm() {
    // 2026-04-23: 紙芝居進行中は絶対に title BGM を起こさない (オープニング BGM との二重再生防止)。
    if (window._storyboardActive) return;
    if (_titleBgmPlaying) return;
    if (!bgmEnabled) return;
    try {
      var b = document.getElementById('bgm');
      if (!b) return;
      var themeSrc = (BGM_TRACKS.title && BGM_TRACKS.title[0]) || '';
      if (!themeSrc) return;
      // 既に Title BGM を鳴らそうとしている間に再タップされた場合の保護 (2026-04-23: Theme2 へ変更)
      if (b.currentSrc && b.currentSrc.indexOf('Theme2.mp3') >= 0 && !b.paused) {
        _titleBgmPlaying = true;
        return;
      }
      // setBgmFor 経由で _bgmKind を更新しておく (以降の map 切替で正しく動くように)
      if (typeof _bgmKind !== 'undefined') {
        try { window._bgmKind = 'title'; } catch (e) {}
      }
      _bgmKind = 'title';
      b.src = themeSrc;
      b.loop = true;
      var p = b.play();
      if (p && typeof p.then === 'function') {
        p.then(function() {
          _titleBgmPlaying = true;
          bgmStarted = true;
        }).catch(function() {
          // 拒否された場合は次回タップで再試行
          _titleBgmPlaying = false;
        });
      } else {
        _titleBgmPlaying = true;
      }
    } catch (e) {}
  }
  if (titleEl) {
    // pointerdown / touchstart / click すべてで再試行させる。
    // 最初の pointerdown で play() が rejected でも、続く click で再発火する。
    titleEl.addEventListener('pointerdown', startTitleBgm, { passive: true });
    titleEl.addEventListener('touchstart',  startTitleBgm, { passive: true });
    titleEl.addEventListener('click',       startTitleBgm, { passive: true });
  }

  // ===== Splash screen (black → tap → fade out + BGM + title) =====
  // iOS Safari の autoplay policy を完全に満たす唯一確実な手段。
  // splash でのタップは「同じ document 内の user gesture」なので
  // b.play() が必ず通り、title 画面で BGM が鳴り始める。
  var splashEl = document.getElementById('splashScreen');
  if (splashEl) {
    // ページ読み込みの度に必ず 2行のキャッチコピーを表示する。
    // 「戻る」で play.html に戻って再度 writing を開いた時に splash が出ない
    // 現象の対策 (ユーザー要望 2026-04-21)。sessionStorage のスキップは廃止。
    if (titleEl) titleEl.classList.add('hidden');
    var _splashDismissed = false;
    function dismissSplash() {
      if (_splashDismissed) return;
      _splashDismissed = true;
      // user gesture 同一 tick で BGM 発火 → iOS でも確実に鳴る
      startTitleBgm();
      // ★根本対策 (2026-04-21): title を splash の「下」に先に表示してから
      // splash をフェード out する。以前は title を hidden のまま splash を
      // 0.55s かけて透明化していたので、その間は真っ黒の body 背景だけが見え、
      // 550ms 経過後に title が突然ポップインして「別の画面が一瞬出る」現象に
      // なっていた。z-index は splash(10000) > title(9998) なので、title を
      // 先に unhide しても splash が覆っているうちは見えず、opacity が 0 に
      // 向かうにつれ自然に title が現れる (真のクロスフェード)。
      if (titleEl) {
        titleEl.classList.remove('hidden');
        titleEl.style.display = '';
      }
      splashEl.classList.add('fade-out');
      // transitionend で splash を DOM 上から除去。iOS/Safari で transitionend が
      // 発火しないケースの fallback として setTimeout も併用。
      var _splashCleanup = function() {
        splashEl.classList.add('hidden');
      };
      splashEl.addEventListener('transitionend', _splashCleanup, { once: true });
      setTimeout(_splashCleanup, 700);
    }
    splashEl.addEventListener('click', dismissSplash);
    splashEl.addEventListener('touchstart', dismissSplash, { passive: true });
    splashEl.addEventListener('pointerdown', dismissSplash, { passive: true });
  }

  // play.html の card タップから遷移した直後 (sticky user activation が効く間) は
  // 追加タップ不要で BGM を開始する。play.html 側で card.onclick が <audio id="bgm">
  // に対して play() を発火済みのため、origin 単位の audio session が warm に保たれ、
  // iOS Safari でもこの段階での play() が拒否されない (2026-04-21 修正)。
  //
  // readyState が complete でない場合は load イベントを待つ。iOS Safari は
  // DOM 構築中の play() を autoplay 拒否しやすく、ページ完全ロード直後が最も安定。
  try {
    var primedTs = parseInt(sessionStorage.getItem('pono_audio_primed_ts') || '0', 10);
    // splash は常時表示方針になったので、splashEl が存在する限り splash アクティブ扱い。
    // primed-TS 経由の BGM 自動発火は splash タップに委ねる。
    var _splashEl = document.getElementById('splashScreen');
    var splashActive = !!(_splashEl && !_splashEl.classList.contains('hidden'));
    if (primedTs && (Date.now() - primedTs) < 15000 && !splashActive) {
      sessionStorage.removeItem('pono_audio_primed_ts');
      if (document.readyState === 'complete') {
        startTitleBgm();
      } else {
        window.addEventListener('load', startTitleBgm, { once: true });
      }
    }
  } catch (e) {}

  if (newBtn) newBtn.addEventListener('click', function() {
    // 2026-04-23: 「はじめから」はこの直後に紙芝居 (自前 BGM) に入るので、
    // ここで title BGM を起こすと二重再生になる。先に storyboardActive を立てて
    // title BGM ルートを封じ、併せて現在鳴っている title BGM を即停止する。
    try {
      window._storyboardActive = true;
      var _preMainBgm = document.getElementById('bgm');
      if (_preMainBgm) {
        _preMainBgm.pause();
        try { _preMainBgm.removeAttribute('src'); _preMainBgm.load(); } catch (e) {}
      }
      _titleBgmPlaying = false;
    } catch (e) {}
    // 「はじめから」では三種の神器と妖精の救出状況もリセットする (要望 2026-04-21)
    try { if (typeof resetGears === 'function') resetGears(); } catch (e) {}
    try { if (typeof resetFairies === 'function') resetFairies(); } catch (e) {}
    // エンディング / オープニング 既読フラグも「はじめから」でリセット (新規冒険扱い)。
    // → はじめから を押したら毎回オープニング紙芝居が流れる。
    try { localStorage.removeItem('pono_ending_seen'); } catch (e) {}
    try { localStorage.removeItem('pono_intro_seen');  } catch (e) {}
    localStorage.setItem('mojikaki_started', '1');
    _titleRouteIsNew = false;
    currentCategory = 'hiragana';
    // 紙芝居オープニング: はじめから では必ず再生。
    // (2026-04-22) 旧 3行 storyScreen は廃止、_showStoryboard に置換。
    // 2026-04-23: 紙芝居開始と同時に titleScreen を隠す (fade-out 中の一瞬チラ見え対策)。
    if (typeof _showStoryboard === 'function' && typeof OPENING_SCENES !== 'undefined') {
      var _ts = document.getElementById('titleScreen');
      if (_ts) _ts.classList.add('hidden');
      // 紙芝居は自前の BGM を鳴らすので、タイトル BGM を停止して二重再生を防ぐ。
      try {
        var _mainBgm = document.getElementById('bgm');
        if (_mainBgm) { _mainBgm.pause(); }
        _titleBgmPlaying = false;
      } catch (e) {}
      // 無料ユーザーはここに来ないのが正しいが、URL 直叩きでの保険。
      // 短縮版オープニングを見せたあと play.html に戻し、練習には入れない。
      var _isFree = false;
      try { _isFree = localStorage.getItem('pono_premium') !== '1'; } catch (e) {}
      var _scenes = _isFree ? SHORT_OPENING_SCENES : OPENING_SCENES;
      _showStoryboard(_scenes, function() {
        if (_isFree) {
          // 無料ユーザーはプロモ終了後に play.html へ戻す（pono_intro_seen は書かない）
          try { location.replace('../play.html'); } catch (e) { location.href = '../play.html'; }
        } else {
          try { localStorage.setItem('pono_intro_seen', '1'); } catch (e) {}
          goToPracticeDirect(0);
        }
      });
    } else {
      // 紙芝居に入れなかった保険ルート: storyboardActive を下ろして title BGM を再開可能に。
      try { window._storyboardActive = false; } catch (e) {}
      goToPracticeDirect(0);
    }
  });
  if (contBtn) contBtn.addEventListener('click', function() {
    if (contBtn.classList.contains('disabled')) return;
    _titleBgmPlaying = false; startTitleBgm();
    localStorage.setItem('mojikaki_started', '1');
    _titleRouteIsNew = false;
    goToRowSelect();
  });
  if (storyEl) storyEl.addEventListener('click', function() {
    if (_titleRouteIsNew) {
      _titleRouteIsNew = false;
      currentCategory = 'hiragana';
      goToPracticeDirect(0);
    } else {
      goToRowSelect();
    }
  });
})();
showTitleScreen();

// ===== Public API =====
window.KidsTraceApp = {
  getCurrentChar,
  loadCharacter,
  showCompletion
};

// 紙芝居演出中は main bgm element を勝手に復帰させない (二重再生防止)。
// _showStoryboard が自前の audio を管理するため、
// focus 復帰や visibilitychange で main bgm が勝手に play() されるとハモる。
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { bgm.pause(); }
  else if (bgmEnabled && !window._storyboardActive) { bgm.play().catch(() => {}); }
});
window.addEventListener('blur',  () => bgm.pause());
window.addEventListener('focus', () => {
  if (bgmEnabled && !window._storyboardActive) bgm.play().catch(() => {});
});

// ===== Tutorial =====
function showTutorial() {
  var dim = document.getElementById('tut-dim');
  var bubble = document.getElementById('tut-bubble');
  if (!dim || !bubble) return;
  _tutorialActive = true;

  // 1ステップ: 説明 → お手本再生 → スタート
  dim.classList.remove('hidden');
  bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
  bubble.innerHTML = '✏️ おてほんを みて<br>おなじ じゅんばんで<br>ゆびで なぞってみよう！<br><button class="tut-next-btn" id="tut-next">おてほんを みる ▶</button>';
  bubble.classList.remove('hidden');

  document.getElementById('tut-next').addEventListener('pointerdown', function(e) {
    e.preventDefault();
    dim.classList.add('hidden');
    bubble.classList.add('hidden');
    _tutorialActive = false;
    localStorage.setItem('writing_tut_seen', '1');
    // お手本再生 → スタート
    if (writer) {
      _hedgeBubble.textContent = 'このじゅんばんで かくよ！';
      _ponoBubble.textContent = 'このじゅんばんで かくよ！';
      document.getElementById('demoIndicator').style.display = 'block';
      writer.animateCharacter({
        onComplete: function() {
          document.getElementById('demoIndicator').style.display = 'none';
          _hedgeBubble.textContent = 'かいてみよう！';
          _ponoBubble.textContent = 'かいてみよう！';
          writer.hideCharacter();
          dim.classList.remove('hidden');
          bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
          bubble.innerHTML = '<div style="font-size:1.5rem;font-weight:900;color:#F2915A;">✏️ スタート！</div>';
          bubble.classList.remove('hidden');
          setTimeout(function() {
            dim.classList.add('hidden');
            bubble.classList.add('hidden');
            if (_rowPracticeActive) {
              // Resume row practice Phase 2 (guided quiz)
              _rowPracticePhase = 'quiz_guided';
              _hedgeBubble.textContent = 'かいてみよう！';
              _ponoBubble.textContent = 'かいてみよう！';
              writer.quiz({
                onCorrectStroke: function() { playNazoriSound(); _hideMonsterBubble(); },
                onMistake: function() { _perfectCurrentChar = false; _hideMonsterBubble(); },
                onComplete: function() {
                  if (!_rowPracticeActive) return;
                  playSuccessSound();
                  var _inBattle = !!(_battle && _battle.active);
                  if (!_inBattle) launchConfetti();
                  if (!_inBattle) _playMonsterPop();
                  _awardAcorns(_perfectCurrentChar);
                  saveStamp(currentCategory, currentCharIndex);
                  markCharDone(currentCharIndex);
                  if (window.incrementStat) {
                    window.incrementStat('writing_chars', 1);
                    if (currentCategory === 'hiragana') window.incrementStat('writing_hiragana', 1);
                    if (currentCategory === 'katakana') window.incrementStat('writing_katakana', 1);
                  }
                  var data = WORD_DATA[currentCategory][currentCharIndex];
                  var char = CATEGORIES[currentCategory].chars[currentCharIndex];
                  if (data && data.word) {
                    _rowPracticePhase = 'show_word';
                    _showRowPracticeWord(char, data, function() {
                      _rowPracticePhase = 'quiz_free';
                      _hedgeBubble.textContent = 'ことばで かこう！';
                      _ponoBubble.textContent = 'ことばで かこう！';
                      _startWordContextPhase(char, data, function() {
                        _rowPracticeStep++;
                        _rowPracticeNextChar();
                      });
                    });
                  } else {
                    setTimeout(function() { _rowPracticeStep++; _rowPracticeNextChar(); }, 2600);
                  }
                },
                showHintAfterMisses: 3,
                highlightOnComplete: true,
                highlightCompleteColor: currentScheme.stroke
              });
            } else {
              startQuiz();
            }
          }, 1000);
        }
      });
    }
  });
}

// ===== Menu =====
initMenu({
  bgmToggle: function() {
    bgmEnabled = !bgmEnabled;
    localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
    if (bgmEnabled) { bgmStarted = false; tryStartBgm(); } else { bgm.pause(); }
  },
  tutorial: showTutorial,
  extraButtons: [{
    icon: '⬅️',
    label: 'ぎょうを えらびなおす',
    onClick: function() {
      // 方針 (2026-04-21): 状態遷移を完全に信頼できないので、どのタイミングで
      // 押されても必ず行選択画面に戻れるように「reload + sessionStorage フラグ」を
      // 唯一の戻り口とする。returnToSelect の個別ケア (battle intro / 橋フィニッシャ 等) は
      // 諦め、nuclear option に一本化。音楽も reload で自動的にリセットされる。
      //
      // iOS click-through 対策: pointerdown でメニュー処理 → reload までの間に
      // 透明オーバーレイで click/pointerdown を全て吸収し、reload 後の画面で
      // 誤タップ (行ボタンに当たる) を防ぐ。シールド自身も reload で消える。
      try {
        var shield = document.createElement('div');
        shield.setAttribute('data-pono-shield', '1');
        shield.style.cssText = 'position:fixed;inset:0;z-index:2147483647;background:transparent;pointer-events:auto;-webkit-tap-highlight-color:transparent;';
        function _eat(e) { e.stopPropagation(); e.preventDefault(); }
        ['click', 'pointerdown', 'pointerup', 'touchstart', 'touchend', 'mousedown', 'mouseup'].forEach(function(ev) {
          shield.addEventListener(ev, _eat, true);
        });
        document.body.appendChild(shield);
      } catch (e) {}
      try { sessionStorage.setItem('pono_goto_select', '1'); } catch (e) {}
      try { sessionStorage.setItem('pono_absorb_next_click', '1'); } catch (e) {}
      // reload を次フレームに遅らせて shield が確実にヒットテストに入るようにする
      setTimeout(function() { try { location.reload(); } catch (e) {} }, 30);
    }
  }]
});
</script>

<!-- Service Worker 登録: ホーム画面 PWA からこのページを直接開いた時も
     新しい SW を検知してリロードする (iOS 対策) -->
<script>
  if ('serviceWorker' in navigator) {
    function _ponoSWReload() {
      if (!window._ponoSWRefreshing) {
        window._ponoSWRefreshing = true;
        window.location.reload();
      }
    }
    navigator.serviceWorker.addEventListener('controllerchange', _ponoSWReload);
    navigator.serviceWorker.addEventListener('message', function(e) {
      if (e && e.data && e.data.type === 'sw-updated') _ponoSWReload();
    });
    navigator.serviceWorker.register('/sw.js').then(function(reg) {
      reg.update();
      // 表示復帰 (ホーム画面 PWA からの再前面化) 時にも update を呼ぶ
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') { try { reg.update(); } catch (e) {} }
      });
    }).catch(function() {});
  }
</script>
