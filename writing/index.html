// ===== Color Schemes =====
// 黒背景で映えるネオン寄りの配色。お手本(outline)は控えめなグレーに統一し、
// なぞり側 (drawing) と stroke アニメを色鮮やかにしてコントラストを出す。
const OUTLINE_GRAY = 'rgba(150,155,170,0.40)';
const COLOR_SCHEMES = [
  { stroke: '#7DD3FC', drawing: '#7DD3FC', highlight: '#BAE6FD', outline: OUTLINE_GRAY }, // cyan
  { stroke: '#D8B4FE', drawing: '#D8B4FE', highlight: '#E9D5FF', outline: OUTLINE_GRAY }, // purple
  { stroke: '#6EE7B7', drawing: '#6EE7B7', highlight: '#A7F3D0', outline: OUTLINE_GRAY }, // green
  { stroke: '#FCD34D', drawing: '#FCD34D', highlight: '#FDE68A', outline: OUTLINE_GRAY }, // yellow
  { stroke: '#FCA5A5', drawing: '#FCA5A5', highlight: '#FECACA', outline: OUTLINE_GRAY }, // red
  { stroke: '#F0ABFC', drawing: '#F0ABFC', highlight: '#F5D0FE', outline: OUTLINE_GRAY }, // pink
];
let colorIdx = 0;
function nextColorScheme() {
  const c = COLOR_SCHEMES[colorIdx % COLOR_SCHEMES.length];
  colorIdx++;
  return c;
}

// ===== Character data =====
const CATEGORIES = {
  hiragana: {
    label: 'ひらがな',
    chars: 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん'.split('')

  }
};

// ===== Gojuon row groupings for landscape mode =====
const GOJUON_ROWS = {
  hiragana: [
    { label: 'あ', start: 0,  count: 5 },
    { label: 'か', start: 5,  count: 5 },
    { label: 'さ', start: 10, count: 5 },
    { label: 'た', start: 15, count: 5 },
    { label: 'な', start: 20, count: 5 },
    { label: 'は', start: 25, count: 5 },

    { label: 'や', start: 35, count: 3 },
    { label: 'ら', start: 38, count: 5 },
    { label: 'わ', start: 43, count: 3 },
  ],
  katakana: [
    { label: 'ア', start: 0,  count: 5 },
    { label: 'カ', start: 5,  count: 5 },
    { label: 'サ', start: 10, count: 5 },
    { label: 'タ', start: 15, count: 5 },
    { label: 'ナ', start: 20, count: 5 },
    { label: 'ハ', start: 25, count: 5 },

    { label: 'ヤ', start: 35, count: 3 },
    { label: 'ラ', start: 38, count: 5 },

let currentRow = 0;
const landscapeMQ = window.matchMedia('(orientation: landscape)');

// ===== Word association data (one word per character, same order as CATEGORIES.chars) =====

// createWriter で writer.quiz をラップして _lastQuizOpts に保存する。
// デモリプレイボタンのクリックで: cancelQuiz → animateCharacter → quiz(_lastQuizOpts) を再実行。
var _lastQuizOpts = null;
function _replayDemo() {
  if (!writer) return;
  // アニメ中やデモ中の多重起動防止
  if (_replayDemo._busy) return;
  _replayDemo._busy = true;
  try { writer.cancelQuiz(); } catch (e) {}
  setQuizActive(false);
  try {
    const di = document.getElementById('demoIndicator');
    if (di) di.style.display = 'block';
  } catch (e) {}
  const resume = function() {
    try {
      const di = document.getElementById('demoIndicator');
      if (di) di.style.display = 'none';
    } catch (e) {}
    if (_lastQuizOpts && writer) {
      try { writer.hideCharacter(); } catch (e) {}
      setQuizActive(true);
      try { writer.quiz(_lastQuizOpts); } catch (e) {}
    }
    _replayDemo._busy = false;
  };
  try {
    writer.animateCharacter({ onComplete: resume });
  } catch (e) {
    _replayDemo._busy = false;
  }
}

// AudioContextをページロード時に即生成（suspendedだが存在はする）
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function getAudioCtx() { return audioCtx; }
function withAudio(fn) {
  const ctx = getAudioCtx();
  if (ctx.state === 'running') { fn(ctx); return; }
  ctx.resume().then(() => fn(ctx)).catch(() => {});
}
// iOS/Android: 最初のタッチでAudioContextを即座にアクティブにする
// resume()は非同期なので、無音オシレータを鳴らして強制的にrunning状態にする
function unlockAudio() {
  const ac = getAudioCtx();
  ac.resume().catch(() => {});
  if (ac.state !== 'running') {
    // 無音オシレータで即アクティブ化
    try {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      gain.gain.value = 0;
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.001);
    } catch(e) {}
  }
}
// capture: true で HanziWriter より先にイベントを受け取る

document.addEventListener('pointerdown', unlockAudio, { capture: true });

function playStrokeSound() {
  withAudio(ac => {
    const now = ac.currentTime;
    const osc = ac.createOscillator(), gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(now); osc.stop(now + 0.15);
  });
}

// 差替フック:
//   window.PONO_STROKE_SFX:   単一 URL 文字列 or URL 配列 → 最優先 (なぞり音)
//   window.PONO_SWORD_HIT_SFX: 大技ヒット音の差替フック
//   window.PONO_SHAKEEN_SFX:   旧フック (後方互換)
const STROKE_SFX_URL = '../assets/sounds/se/battle/nazori_01.mp3';
const SWORD_HIT_SFX_URLS = [
  '../assets/sounds/se/battle/sword_swing_1.mp3',
  '../assets/sounds/se/battle/sword_swing_2.mp3',
  '../assets/sounds/se/battle/sword_slash_1.mp3',
  '../assets/sounds/se/battle/sword_slash_2.mp3'
];

// ===== SE 再生プール =====
// new Audio() を毎回作ると (a) 初回の fetch で遅延・ドロップが起きる (b) iOS Safari が
// 複数同時再生を throttle する。URL ごとに固定プールを持ち preload しておくと安定する。
// さらにクエリ (?v=...) で HTTP キャッシュを強制的に新しい mp3 に向ける (同名ファイルの
// 旧バイナリが SW/HTTP キャッシュから出てくるのを防ぐ)。
const _SFX_CACHE_BUST = 'v257';
const _SFX_POOL_SIZE = 3;
const _sfxPool = Object.create(null);
// iOS PWA: 各 new Audio() インスタンスは user gesture 中に .play() を 1 回呼ばないと
// 後から (非 gesture context で) play しても無音になる。_unlockSfxAll で全プールを一括解錠する。
let _sfxUnlocked = false;
function _sfxVer(url) {
  if (!url) return url;
  return url + (url.indexOf('?') >= 0 ? '&' : '?') + _SFX_CACHE_BUST;
}
// Audio 1 要素を iOS 向けに「完全無音で解錠」する。
// muted=true + volume=0 の両方を必ず設定してから play() → 即 pause → 復元。
// (volume=0 だけでは .play() の瞬間に一瞬音が出るブラウザがあるため muted 併用)
function _sfxSilentUnlockOne(a) {
  if (!a || a._unlocked) return;
  a._unlocked = true;
  // iOS の user-gesture unlock は muted=true + volume=0 の状態で .play()→.pause()。
  // 解錠後も muted=true を維持し、playSfx 側で unmute + 正式 volume を設定する。
  // 以前は p.then で muted/volume を即座に復元していたが、pause 前のごく短い
  // 瞬間にプールの各 Audio が可聴ブリップを漏らし、「SE が一斉に鳴る」症状に
  // なっていたので、mute を維持する方式に変更。
  try { a.muted = true; } catch (e) {}
  try { a.volume = 0; } catch (e) {}
  try {
    const p = a.play();
    const stop = () => {
      try { a.pause(); } catch (e) {}
      try { a.currentTime = 0; } catch (e) {}
      // muted=true / volume=0 は意図的に維持する (playSfx が戻す)。
    };
    if (p && typeof p.then === 'function') {
      p.then(stop).catch(stop);
    } else {
      stop();
    }
  } catch (e) { /* ignore */ }
}
function _sfxEnsurePool(url) {
  let pool = _sfxPool[url];
  if (pool) return pool;
  pool = [];
  const versioned = _sfxVer(url);
  for (let i = 0; i < _SFX_POOL_SIZE; i++) {
    try {
      const a = new Audio(versioned);
      a.preload = 'auto';
      a.volume = 0.9;
      try { a.load(); } catch (e) {}
      pool.push(a);
    } catch (e) { /* ignore */ }
  }
  _sfxPool[url] = pool;
  // 解錠済みなら新規プールも即解錠 (user gesture context 中の初回参照に備えて)
  if (_sfxUnlocked) {
    pool.forEach(a => _sfxSilentUnlockOne(a));
  }
  return pool;
}
// iOS PWA で効果音を鳴らすには、user gesture 中に各 Audio 要素を .play() する必要がある。
// ただし .play() の瞬間に音が出てしまわないよう muted=true + volume=0 で完全無音化してから
// play → pause → 復元する。初回 pointerdown で critical SFX を先行作成+解錠。
function _unlockSfxAll() {
  if (_sfxUnlocked) return;
  _sfxUnlocked = true;
  try { _sfxEnsurePool('../assets/sounds/se/battle/nazori_01.mp3'); } catch (e) {}
  try { _sfxEnsurePool('../assets/sounds/se/battle/enemy_defeat_2.mp3'); } catch (e) {}
  try { _sfxEnsurePool('../assets/sounds/se/battle/victory_fanfare.mp3'); } catch (e) {}
  Object.keys(_sfxPool).forEach(url => {
    _sfxPool[url].forEach(a => _sfxSilentUnlockOne(a));
  });
}
document.addEventListener('touchstart', _unlockSfxAll, { capture: true, passive: true });
document.addEventListener('pointerdown', _unlockSfxAll, { capture: true });
function playSfx(url, volume) {
  if (!url) return null;
  const pool = _sfxEnsurePool(url);
  if (!pool.length) return null;
  // 空いている (ended/paused) ものを優先、なければ最古を奪う。
  let pick = pool.find(a => a.ended || a.paused) || pool[0];
  try {
    pick.currentTime = 0;
    try { pick.muted = false; } catch (e) {}
    pick.volume = (typeof volume === 'number') ? volume : 1;
    const p = pick.play();
    if (p && typeof p.catch === 'function') p.catch(() => {});
  } catch (e) { /* ignore */ }
  return pick;
}

// なぞり音: 毎回同じソースをプールから鳴らす。
function playNazoriSound() {
  let url = STROKE_SFX_URL;
  if (typeof window !== 'undefined') {
    if (typeof window.PONO_STROKE_SFX === 'string') url = window.PONO_STROKE_SFX;
    else if (Array.isArray(window.PONO_STROKE_SFX) && window.PONO_STROKE_SFX.length) url = window.PONO_STROKE_SFX[0];
  }
  return playSfx(url, 0.9);
}
// 大技 (剣スラッシュ) を順繰り再生: 将来 finisher / クリティカル用。
let _swordHitIndex = 0;
function playSwordHitSound() {
  let urls = null;
  if (typeof window !== 'undefined') {
    if (Array.isArray(window.PONO_SWORD_HIT_SFX) && window.PONO_SWORD_HIT_SFX.length) {
      urls = window.PONO_SWORD_HIT_SFX;

// 直前に描いた 1 画だけを一瞬光らせる。画面全体フラッシュではなく書き取りキャンバス内に留める。
// 1. 最新の <path> (= 直前に描かれたストローク) に .stroke-just-lit を付与 → CSS アニメで
//    drop-shadow を段階強化 → blur(0.3px) で若干エッジをやわらげ加算的にふわっと光らせる。
// 2. canvas-container に screen ブレンドのソフトハローを 1 枚重ねて加算光を演出。
function flashLastStroke() {
  try {
    var target = document.getElementById('writerTarget');
    if (!target) return;
    var strokeCount = 0;
    var svg = target.querySelector('svg');
    if (svg) {
      var paths = svg.querySelectorAll('path');
      if (paths && paths.length) {
        strokeCount = paths.length;
        var last = paths[paths.length - 1];
        last.classList.remove('stroke-just-lit');
        // reflow で animation を確実に再始動
        void last.getBoundingClientRect();
        last.classList.add('stroke-just-lit');
        setTimeout(function() { last.classList.remove('stroke-just-lit'); }, 620);
      }
    }
    // ソフトハローを 1 枚だけキャンバス上に乗せる (screen blend + blur)
    var container = target.parentElement; // .canvas-container
    if (container) {
      var halo = document.createElement('div');
      halo.className = 'stroke-soft-halo';
      container.appendChild(halo);
      setTimeout(function() { if (halo.parentNode) halo.remove(); }, 600);
    }
    // マス全体の水色グロウ: 画数が上がると濃くなる (Lv1 薄 → Lv2 中 → Lv3 濃)
    // ※三種の神器を手に入れるまでずっと水色で固定。将来は属性で色差し替え。
    var flashEl = document.getElementById('canvasFlash');
    if (flashEl) {
      var lv = Math.min(3, Math.max(1, strokeCount || 1));
      flashEl.classList.remove('stroke-glow-lv1', 'stroke-glow-lv2', 'stroke-glow-lv3', 'active');
      void flashEl.offsetWidth; // reflow
      flashEl.classList.add('stroke-glow-lv' + lv);
      setTimeout(function() {
        flashEl.classList.remove('stroke-glow-lv1', 'stroke-glow-lv2', 'stroke-glow-lv3');
      }, 560);
    }
  } catch (e) { /* ignore */ }
}

function pickSpellVideo(kind) {

  return pool[Math.floor(Math.random() * pool.length)];

function launchMagicCircle(kind) {
  const src = pickSpellVideo(kind);

  // バトル中は .battle-stage 内に直接 video を差し込み、screen 合成で敵に炎を被せる。

      const layer = document.createElement('div');
      layer.className = 'battle-magic-layer';
      const rect = enemyWrap.getBoundingClientRect();

      v.setAttribute('playsinline', ''); v.setAttribute('webkit-playsinline', '');
      v.preload = 'auto';
      layer.appendChild(v);
      stage.appendChild(layer);
      const pp = v.play(); if (pp && pp.catch) pp.catch(() => {});

  const c = document.getElementById('magicContainer');

  video.muted = true;
  video.playsInline = true;
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');
  video.preload = 'auto';
  c.appendChild(video);
  const p = video.play();
  if (p && p.catch) p.catch(() => {});

  // Central flash
  const flash = document.createElement('div');
  flash.className = 'magic-flash';

  // Particles — radiate out from center

    const particle = document.createElement('div');

    const angle = (i / N) * Math.PI * 2 + Math.random() * 0.3;

    const dy = Math.sin(angle) * dist;

// ===== Magic Projectile =====
// 「手前から奥(敵)へ飛ぶ光球 → 着弾で破裂」する魔法演出。
// mp4 を使わず純 CSS なので軽量 (1 回 ~50KB の DOM 作って捨てるだけ)。
// element: 'fire' | 'ice' | 'thunder' | 'light' | 'heal' | 'wind' | ...
// onImpact: 着弾時に呼ばれる (敵の被ダメ演出と同期したいとき用)
function launchMagicProjectile(element, opts) {
  opts = opts || {};
  const colors = MAGIC_COLORS[element] || MAGIC_COLORS.fire;
  const enemyEl = document.getElementById('battleEnemy');
  if (!enemyEl) {
    if (opts.onImpact) setTimeout(opts.onImpact, 0);
    return;
  }

  // 既存コンテナがあれば再利用、なければ作る
  let container = document.querySelector('.magic-projectile-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'magic-projectile-container';
    document.body.appendChild(container);
  }

  // 敵位置 (viewport 座標)
  const er = enemyEl.getBoundingClientRect();
  const tx = er.left + er.width / 2;
  const ty = er.top  + er.height * 0.55;

  // 起点: 画面中央下 (プレイヤー側 = 手前)
  const sx = window.innerWidth / 2;
  const sy = window.innerHeight * 0.86;

  // finisher フラグ: 光球を約 2 倍に拡大 + 着弾もデカく。
  const finisher = !!opts.finisher;
  const startScale = finisher ? 2.1 : 1.15;
  const endScale   = finisher ? 0.55 : 0.28;

  // 弾本体
  const ball = document.createElement('div');
  ball.className = 'magic-projectile' + (finisher ? ' finisher' : '');
  ball.style.setProperty('--core', colors.core);
  ball.style.setProperty('--aura', colors.aura);
  ball.style.setProperty('--glow', colors.glow);
  // 初期: 起点に大きめ(=手前)
  ball.style.transform = 'translate(' + sx + 'px, ' + sy + 'px) translate(-50%, -50%) scale(' + startScale + ')';

  const trail = document.createElement('div');
  trail.className = 'magic-projectile-trail';
  ball.appendChild(trail);

  container.appendChild(ball);

  // 弾発射 SFX (短い whoosh)
  try { _playProjectileLaunchSound(element); } catch (e) {}

  // 2 フレーム後に目的地へ + 縮小(=奥へ)
  // transition は .animate クラスで有効化
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      ball.classList.add('animate');
      ball.style.transform =
        'translate(' + tx + 'px, ' + ty + 'px) ' +
        'translate(-50%, -50%) scale(' + endScale + ')';
    });
  });

  // 着弾
  const FLIGHT_MS = finisher ? 900 : 780;
  setTimeout(() => {
    // 弾消去 + 破裂
    if (ball.parentNode) ball.remove();
    _spawnMagicBurst(tx, ty, colors, container, { finisher: finisher });
    try { _playMagicBurstSound(element); } catch (e) {}
    if (opts.onImpact) {
      try { opts.onImpact(); } catch (e) {}
    }
    // 900ms 後にコンテナ掃除 (他の弾と衝突しないよう空要素なら削除)
    setTimeout(() => {
      if (container && container.parentNode && container.children.length === 0) {
        container.remove();
      }
    }, 900);
  }, FLIGHT_MS);
}

function _spawnMagicBurst(x, y, colors, container, opts) {
  opts = opts || {};
  const finisher = !!opts.finisher;
  // 各 burst 要素は left/top で配置し、CSS keyframe の translate(-50%,-50%) で中心合わせ。
  // 中央フラッシュ
  const flash = document.createElement('div');
  flash.className = 'magic-burst-flash' + (finisher ? ' finisher' : '');
  flash.style.setProperty('--core', colors.core);
  flash.style.setProperty('--aura', colors.aura);
  flash.style.setProperty('--glow', colors.glow);
  flash.style.left = x + 'px';
  flash.style.top  = y + 'px';
  container.appendChild(flash);
  setTimeout(() => { if (flash.parentNode) flash.remove(); }, 900);

  // 衝撃波リング
  const ring = document.createElement('div');
  ring.className = 'magic-burst-shockring' + (finisher ? ' finisher' : '');
  ring.style.setProperty('--aura', colors.aura);
  ring.style.setProperty('--glow', colors.glow);
  ring.style.left = x + 'px';
  ring.style.top  = y + 'px';
  container.appendChild(ring);
  setTimeout(() => { if (ring.parentNode) ring.remove(); }, 900);

  // 放射パーティクル (finisher は数も距離も倍)
  const N = finisher ? 28 : 16;
  const baseDist = finisher ? 160 : 90;
  for (let i = 0; i < N; i++) {
    const p = document.createElement('div');
    p.className = 'magic-burst-particle' + (finisher ? ' finisher' : '');
    p.style.setProperty('--core', colors.core);
    p.style.setProperty('--aura', colors.aura);
    p.style.setProperty('--glow', colors.glow);
    const angle = (i / N) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    const dist = baseDist + Math.random() * baseDist;
    p.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(1) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist).toFixed(1) + 'px');
    p.style.left = x + 'px';
    p.style.top  = y + 'px';
    p.style.animationDelay = (Math.random() * 0.08).toFixed(2) + 's';
    container.appendChild(p);
    setTimeout(() => { if (p.parentNode) p.remove(); }, 1000);
  }
}

// ===== つらら降り (氷属性 魔導士用) =====
// 勇者の上から 6〜8 本のつららを落とし、地面にヒットするタイミングでキラン音。
// 視覚演出専用。実ダメージは呼出側 (_applyHeroHpDamage) で処理。
function _spawnIcicleRain() {
  const heroEl = document.getElementById('battleHero');
  if (!heroEl) return;
  let container = document.querySelector('.magic-projectile-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'magic-projectile-container';
    document.body.appendChild(container);
  }
  const hr = heroEl.getBoundingClientRect();
  const cx = hr.left + hr.width / 2;
  const baseY = hr.top;
  const N = 7;
  for (let i = 0; i < N; i++) {
    const ic = document.createElement('div');
    ic.className = 'icicle-drop';
    // 勇者の頭上 ±80px の範囲にバラつかせる
    const dx = (Math.random() - 0.5) * 160;
    const x = cx + dx;
    const startY = baseY - 260 - Math.random() * 80;
    const endY   = baseY + hr.height * 0.15;
    ic.style.left = x + 'px';
    ic.style.top  = startY + 'px';
    ic.style.setProperty('--fall', (endY - startY).toFixed(1) + 'px');
    ic.style.animationDelay = (i * 0.06 + Math.random() * 0.05).toFixed(3) + 's';
    container.appendChild(ic);
    setTimeout(() => { if (ic.parentNode) ic.remove(); }, 900);
  }
  // キラン効果音 (軽め)
  try {
    if (typeof withAudio === 'function') {
      withAudio(function(ac) {
        const now = ac.currentTime;
        for (let k = 0; k < 3; k++) {
          const o = ac.createOscillator(), g = ac.createGain();
          o.type = 'triangle';
          o.frequency.setValueAtTime(2400 + k * 400, now + k * 0.06);
          o.frequency.exponentialRampToValueAtTime(900, now + k * 0.06 + 0.22);
          g.gain.setValueAtTime(0.12, now + k * 0.06);
          g.gain.exponentialRampToValueAtTime(0.001, now + k * 0.06 + 0.28);
          o.connect(g); g.connect(ac.destination);
          o.start(now + k * 0.06); o.stop(now + k * 0.06 + 0.3);
        }
      });
    }
  } catch (e) {}
}

// 発射音: 属性で音色を変える (軽い whoosh + ピッチ上昇)
function _playProjectileLaunchSound(element) {
  if (typeof withAudio !== 'function') return;
  withAudio(ac => {
    const now = ac.currentTime;
    // ノイズベースの whoosh
    const bufLen = Math.floor(ac.sampleRate * 0.4);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      ch[i] = (Math.random() * 2 - 1) * (1 - t) * 0.5;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass';
    // 属性でピッチ帯を切替
    const startHz = element === 'ice' ? 1800 : element === 'thunder' ? 2400 : element === 'light' ? 2200 : 1400;
    bp.frequency.setValueAtTime(startHz * 0.5, now);
    bp.frequency.exponentialRampToValueAtTime(startHz * 1.6, now + 0.35);
    bp.Q.value = 6;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.25, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    src.connect(bp); bp.connect(g); g.connect(ac.destination);
    src.start(now); src.stop(now + 0.42);
  });
}
// 着弾音: 短い破裂 (低域パンチ + 高域キラキラ)
function _playMagicBurstSound(element) {
  // 差替フック: window.PONO_FIRE_MAGIC_SFX (後方互換) または属性別 mp3 があればそちらを優先。
  // 今は合成音のみ。mp3 を入れるときは new Audio(...).play() で差し替え可。
  const customUrl = (typeof window !== 'undefined' && window.PONO_FIRE_MAGIC_SFX);
  if (customUrl) {
    try {
      const a = new Audio(customUrl);
      a.volume = 0.55; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through */ }
  }
  if (typeof withAudio !== 'function') return;
  withAudio(ac => {
    const now = ac.currentTime;
    // 低域パンチ
    const o1 = ac.createOscillator(), g1 = ac.createGain();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(220, now);
    o1.frequency.exponentialRampToValueAtTime(60, now + 0.22);
    g1.gain.setValueAtTime(0.55, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
    o1.connect(g1); g1.connect(ac.destination);
    o1.start(now); o1.stop(now + 0.3);
    // 高域キラキラ (属性で音色差)
    const hz = element === 'ice' ? 2600 : element === 'fire' ? 1600 : element === 'thunder' ? 3200 : 2000;
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(hz, now + 0.02);
    o2.frequency.exponentialRampToValueAtTime(hz * 0.5, now + 0.35);
    g2.gain.setValueAtTime(0.18, now + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(now + 0.02); o2.stop(now + 0.42);
  });
}

function _getVoiceUrl(char) {
  if (currentCategory === 'hiragana') {
    const idx = CATEGORIES.hiragana.chars.indexOf(char);
    if (idx >= 0 && idx <= 44) return '../assets/voices/' + String(idx).padStart(2, '0') + '-aiueo.wav';
    if (idx === 45) return '../assets/voices/katakana/45-katakana.wav';
  }
  if (currentCategory === 'katakana') {
    const idx = CATEGORIES.katakana.chars.indexOf(char);
    if (idx >= 0 && idx <= 45) return '../assets/voices/katakana/' + String(idx).padStart(2, '0') + '-katakana.wav';
  }
  return null;
}
let _voicePlayId = 0; // キャンセル用ID
function _preloadWordAudio() {
  // 共有Audio要素にsrcをセットしてプリロード
  const char = CATEGORIES[currentCategory].chars[currentCharIndex];
  const url = _getVoiceUrl(char);
  if (url) {
    _sharedAudio.src = url;
    _sharedAudio.load();
  }
}
function speakWord(char, word) {
  if (window.speechSynthesis) speechSynthesis.cancel();
  const url = _getVoiceUrl(char);
  if (!url) { _speakFallback(char, word); return; }
  const myId = ++_voicePlayId;
  const targetTail = url.replace('../', '/');
  const curSrc = _sharedAudio.currentSrc || _sharedAudio.src || '';
  const srcMatches = curSrc.endsWith(targetTail);

  function doPlay() {
    if (_voicePlayId !== myId) return;
    try { _sharedAudio.currentTime = 0; } catch (e) {}
    const p = _sharedAudio.play();
    if (p && p.catch) p.catch(() => _speakFallback(char, word));
  }

  // 再生可能なら即再生
  if (srcMatches && _sharedAudio.readyState >= 2) {
    doPlay();
    return;
  }
  // まだ読み込み中 or src 差し替え: canplay を待ってから再生
  _sharedAudio.oncanplay = function() {
    _sharedAudio.oncanplay = null;
    _sharedAudio.oncanplaythrough = null;
    doPlay();
  };
  _sharedAudio.oncanplaythrough = _sharedAudio.oncanplay;
  if (!srcMatches) {
    _sharedAudio.src = url;
    _sharedAudio.load();
  }
}

function _speakFallback(char, word) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(`${char}！${word}！`);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  u.pitch = 1.2;
  speechSynthesis.speak(u);
}

// ===== キャンバス割れ演出 (妖精救出シーケンス) =====
function _playCanvasBreak() {
  var el = document.getElementById('monsterDeco');
  var cc = document.getElementById('canvasContainer');
  if (!el || !cc) return;
  // 前回の残り timer を全部クリア
  if (window._breakTimers && window._breakTimers.length) {
    window._breakTimers.forEach(function(t) { clearTimeout(t); });
  }
  window._breakTimers = [];
  function _bt(fn, ms) { window._breakTimers.push(setTimeout(fn, ms)); }
  // 悪役が出ていたら即消す（邪魔しない）
  _hideVillain();
  _hideMonsterBubble();
  // 既に進行中なら何もしない
  if (el.classList.contains('emerge') || el.classList.contains('leave')) return;

  // T=0: キャンバスをシェイク + overflow 解放 + 魔法陣を浮かび上がらせる
  cc.classList.add('shaking', 'breaking');
  var seal = document.getElementById('canvasSeal');
  if (seal) {
    seal.classList.remove('active', 'cracking');
    void seal.offsetWidth;
    seal.classList.add('active');
  }

  // T=120: 白フラッシュ (光の下地)
  _bt(function() {
    var flash = document.getElementById('canvasFlash');
    if (flash) {
      flash.classList.remove('active');
      void flash.offsetWidth;
      flash.classList.add('active');
    }
  }, 120);

  // T=260: 魔法陣に放射状のヒビが走る
  _bt(function() {
    var seal = document.getElementById('canvasSeal');
    if (seal) seal.classList.add('cracking');
  }, 260);

  // T=420: 中央から光バースト
  _bt(function() {
    var burst = document.getElementById('canvasBurst');
    if (burst) {
      burst.classList.remove('active');
      void burst.offsetWidth;
      burst.classList.add('active');
    }
  }, 420);

  // T=460: キラキラ粒子を放射
  _bt(function() {
    var wrap = document.getElementById('canvasSparkles');
    if (!wrap) return;
    wrap.innerHTML = '';
    var symbols = ['✨','⭐','💫','🌟','◆'];
    var count = 26;
    var baseDist = Math.min(cc.clientWidth, cc.clientHeight) * 0.55;
    for (var i = 0; i < count; i++) {
      var s = document.createElement('span');
      s.className = 'spk';
      s.textContent = symbols[i % symbols.length];
      var angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
      var dist = baseDist * (0.6 + Math.random() * 0.6);
      s.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(1) + 'px');
      s.style.setProperty('--dy', (Math.sin(angle) * dist).toFixed(1) + 'px');
      s.style.setProperty('--rot', (Math.random() * 720 - 360).toFixed(0) + 'deg');
      s.style.animationDelay = (Math.random() * 0.08).toFixed(2) + 's';
      wrap.appendChild(s);
    }
    wrap.classList.remove('active');
    void wrap.offsetWidth;
    wrap.classList.add('active');
    window._breakTimers.push(setTimeout(function() {
      wrap.classList.remove('active');
      wrap.innerHTML = '';
    }, 1600));
  }, 460);

  // バリンッ音
  try {
    var ac = (window._audioCtx = window._audioCtx || new (window.AudioContext || window.webkitAudioContext)());
    var now = ac.currentTime;
    // ノイズで割れた感
    var buf = ac.createBuffer(1, ac.sampleRate * 0.25, ac.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
    }
    var noise = ac.createBufferSource();
    noise.buffer = buf;
    var ng = ac.createGain();
    ng.gain.setValueAtTime(0.18, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    noise.connect(ng); ng.connect(ac.destination);
    noise.start(now);
    // キラン
    var osc = ac.createOscillator(), g = ac.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(880, now + 0.12);
    osc.frequency.exponentialRampToValueAtTime(1760, now + 0.32);
    g.gain.setValueAtTime(0.08, now + 0.12);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.connect(g); g.connect(ac.destination);
    osc.start(now + 0.12); osc.stop(now + 0.36);
  } catch (e) { /* audio not ready */ }

  // T=600: 妖精が封印解除されて中央に登場
  _bt(function() {
    el.classList.remove('enter');

// 勇者 HP/MP ゲージを現在値で描画 + 短い flash。
function _renderHeroGauges(flash) {
  const hpBar = document.getElementById('heroHpBar');
  const mpBar = document.getElementById('heroMpBar');
  const hpNum = document.getElementById('heroHpNum');
  const mpNum = document.getElementById('heroMpNum');
  const wrap = document.getElementById('heroStatus');
  if (hpBar) hpBar.style.width = Math.max(0, Math.min(100, (_battle.heroHp / _battle.heroMaxHp) * 100)) + '%';
  if (mpBar) mpBar.style.width = Math.max(0, Math.min(100, (_battle.heroMp / _battle.heroMaxMp) * 100)) + '%';
  if (hpNum) hpNum.textContent = _battle.heroHp + '/' + _battle.heroMaxHp;
  if (mpNum) mpNum.textContent = _battle.heroMp + '/' + _battle.heroMaxMp;
  if (wrap && flash) {
    const cls = (flash === 'mp') ? 'flash-mp' : 'flash-hp';
    wrap.classList.remove(cls);
    void wrap.offsetWidth;
    wrap.classList.add(cls);
    setTimeout(function() { wrap.classList.remove(cls); }, 360);
  }
}
function _resetHeroGauges() {
  _battle.heroHp = _battle.heroMaxHp;
  _battle.heroMp = _battle.heroMaxMp;
  _renderHeroGauges(null);
}
function _applyHeroHpDamage(amount) {
  const next = Math.max(_battle.heroHpFloor, _battle.heroHp - (amount | 0));
  _battle.heroHp = next;
  _renderHeroGauges('hp');
}
function _applyHeroMpCost(cost) {
  const next = Math.max(_battle.heroMpFloor, _battle.heroMp - (cost | 0));
  _battle.heroMp = next;
  _renderHeroGauges('mp');
}

// 攻撃プラン生成: count=5 のとき 通常3 + 魔法2 (末尾は必ず magic)
function _pickAttackPlan(count) {
  const plan = new Array(count).fill('normal');
  if (count > 0) plan[count - 1] = 'magic';
  // 残り (count-1 箇所) からちょうど 1 個だけ magic に → 合計 magic=2, normal=3
  const extras = 1;
  const pool = [];
  for (let i = 0; i < count - 1; i++) pool.push(i);
  for (let k = 0; k < extras && pool.length > 0; k++) {
    const idx = Math.floor(Math.random() * pool.length);
    plan[pool.splice(idx, 1)[0]] = 'magic';
  }
  return plan;
}

function _battleEls() {
  return {
    stage:   document.getElementById('battleStage'),
    enemy:   document.getElementById('battleEnemy'),
    img:     document.getElementById('battleEnemyImg'),
    name:    document.getElementById('battleEnemyName'),
    hpBar:   document.getElementById('battleHpBar'),
    stars:   document.querySelectorAll('#pentagramCharge .star'),
    charge:  document.getElementById('pentagramCharge'),
    speech:  document.getElementById('battleEnemySpeech'),
    popLayer:document.getElementById('damagePopLayer'),
  };
}

function _renderHpBar(hp, maxHp) {
  const { hpBar } = _battleEls();
  if (!hpBar) return;
  hpBar.innerHTML = '';
  for (let i = 0; i < maxHp; i++) {
    const b = document.createElement('span');
    b.className = 'hp-block';
    if (i >= hp) b.classList.add('lost');
    else if (hp <= 1) b.classList.add('critical');
    else if (hp <= 2) b.classList.add('low');
    hpBar.appendChild(b);
  }
}

// 行ラベル (あ/カ...) → ステージ種別。森/洞窟/火山/城 に対応。
// ひらがな: あか=forest, さ=forest(中ボス), た/な/は=cave, ま/や/ら/わ=volcano
// カタカナ: 全て castle (Phase 2 で細分化する)
function _stageForRow(label) {
  const hira = { 'あ':'forest','か':'forest','さ':'forest',
                 'た':'cave','な':'cave','は':'cave',
                 'ま':'volcano','や':'volcano','ら':'volcano','わ':'volcano' };
  const kata = { 'ア':'castle','カ':'castle','サ':'castle','タ':'castle','ナ':'castle',
                 'ハ':'castle','マ':'castle','ヤ':'castle','ラ':'castle','ワ':'castle' };
  return hira[label] || kata[label] || 'forest';
}
// ステージ別ナレーション (勇者の歩行シーン)。
// 森のときだけ「あるいていた…」、洞窟/火山/城 は情景に合わせて差し替える。
function _stageIntroNarration(stage, heroName) {
  if (stage === 'cave') {
    return [
      { lines: [heroName + 'は どうくつに', 'ふみこんだ…'] },
      { lines: ['と そのとき！', ''], opts: { line1Class: 'dq-line-emphasis' } },
    ];
  }
  if (stage === 'volcano') {
    return [
      { lines: [heroName + 'は かざんを', 'のぼっていた…'] },
      { lines: ['と そのとき！', ''], opts: { line1Class: 'dq-line-emphasis' } },
    ];
  }
  if (stage === 'castle') {
    return [
      { lines: [heroName + 'は しろへ', 'たどりついた…'] },
      { lines: ['と そのとき！', ''], opts: { line1Class: 'dq-line-emphasis' } },
    ];
  }
  return [
    { lines: [heroName + 'は あるいていた…', ''] },
    { lines: ['と そのとき！', ''], opts: { line1Class: 'dq-line-emphasis' } },
  ];
}

function _showBattleStage(rowId) {
  const els = _battleEls();
  if (!els.stage) return;
  const enemy = _enemyForRow(rowId);
  _battle.active = true;
  _battle.enemy = enemy;
  _battle.maxHp = enemy.hp || 5;
  _battle.hp = _battle.maxHp;
  _battle.hitCount = 0;
  _battle.attackPlan = _pickAttackPlan(_battle.maxHp); // 5回の通常/魔法プラン
  // 敵の属性に合わせる (炎ボス=fire, 氷ボス=ice, …)。敵データに element が無ければ fire。
  _battle.element = enemy.element || 'fire';
  _battle.acornsBuffered = 0; // バトル開始時にリセット

  if (els.img) els.img.src = enemy.img;
  if (els.name) els.name.textContent = enemy.name;
  if (els.charge) els.charge.classList.remove('charged');
  els.stars.forEach(s => s.classList.remove('lit'));
  els.enemy.classList.remove('damaged', 'defeated');
  // 地に足が付くタイプ (ゴーレム等、grounded:true): 浮遊アニメを切り 2倍拡大、
  // ラップも勇者と同じ高さに持ち上げる (stage.has-grounded クラスで制御)。
  els.enemy.classList.toggle('grounded', !!enemy.grounded);
  els.stage.classList.toggle('has-grounded', !!enemy.grounded);
  // compact: 雑魚 grounded 敵のサイズを勇者並みに小さくする (キノコ等)。
  // grounded 無しの場合は .battle-enemy の通常サイズ (60px) が効くので意味を持たない。
  els.enemy.classList.toggle('compact', !!enemy.compact);
  // enemy id を data 属性に乗せて、敵固有のサイズ調整 (例: ice_wizard 1.8x) を CSS から掛けられるように。
  if (enemy.id) { els.enemy.dataset.enemyId = enemy.id; } else { delete els.enemy.dataset.enemyId; }
  // 元素材が右向きのザコ (flipped:true) は水平反転して勇者と対峙させる。
  // grounded と独立に指定できる (接地しない空中ザコでも反転だけ掛けたい場合があるため)。
  els.enemy.classList.toggle('flipped', !!enemy.flipped);
  // ステージ別 BG: 行ラベルから stage を割り出して .stage-xxx を付け替え。
  try {
    els.stage.classList.remove('stage-forest', 'stage-cave', 'stage-volcano', 'stage-castle');
    els.stage.classList.add('stage-' + _stageForRow(rowId));
  } catch (e) {}
  _renderHpBar(_battle.hp, _battle.maxHp);

  // 2026-04-20: バトルステージは「マップシーン+エンカウント演出」が終わるまで
  // DOM 上は非表示のままにする。以前はここで display:'' にしていたため、
  // map-scene-overlay の opacity 0→1 フェードイン中や、map→curtain の切替
  // 瞬間にバトル画面が一瞬透けて見える問題があった。実際の表示は
  // _showBattleEncounterIntro のカーテンで覆った後に行う (_revealBattleStage)。
  els.stage.style.display = 'none';
  els.stage.setAttribute('aria-hidden', 'false');
  // ポノ / ハリネズミ / 封印された妖精を戦闘中は隠す (戦闘画面の集中度を上げる)
  document.body.classList.add('battle-mode');

  // 封印された妖精は隠す (同一キャンバス内の干渉を避ける)
  const md = document.getElementById('monsterDeco');
  if (md) md.style.display = 'none';

  // ログウィンドウをリセット (前回の「たおした！」残りを消す)
  _setBattleLog(['', '']);

  // 勇者を idle スタートにリセット (前バトルが attack で終わっていても待機に戻す)
  try {
    const heroEl = document.getElementById('battleHero');
    if (heroEl) {
      heroEl.classList.remove('move', 'attack-magic', 'attack-normal', 'concentrate', 'damaged');
      heroEl.classList.add('idle');
    }
  } catch (e) { /* ignore */ }

  // 勇者 HP/MP を全回復で表示 (行ごとに元気に始まる)
  try { _resetHeroGauges(); } catch (e) {}

  // 装備パネル描画 (持ってる神器だけ表示、0 個なら行ごと非表示)
  try { renderEquipRow(); } catch (e) {}

  // 登場セリフ / エンカウントジングルは _showBattleEncounterIntro 側で演出として扱う。
  // ここでは stage の配置のみを行う。
}

// lines: [line1, line2, line3] (末尾省略可)。opts: { line1Class, line2Class, line3Class, animate }
// ===== タイプライター状態 (1 文字ずつ進行) =====
// 子供の目が文字にフォーカスするよう 45ms/文字で順次出す。
// 進行中にタップしたら _completeBattleLogTypewriter で即完了 → 次タップで queue 送り。
const _battleLogTW = {
  timers: [],
  typing: false,
  l1El: null, l2El: null, l3El: null,
  l1Full: '', l2Full: '', l3Full: '',
  l1UsesHtml: false, l2UsesHtml: false, l3UsesHtml: false,
};

function _cancelBattleLogTypewriter() {
  for (const t of _battleLogTW.timers) clearTimeout(t);
  _battleLogTW.timers = [];
}

function _completeBattleLogTypewriter() {
  if (!_battleLogTW.typing) return;
  _cancelBattleLogTypewriter();
  if (_battleLogTW.l1El) {
    if (_battleLogTW.l1UsesHtml) _battleLogTW.l1El.innerHTML = _battleLogTW.l1Full;
    else _battleLogTW.l1El.textContent = _battleLogTW.l1Full;
  }
  if (_battleLogTW.l2El) {
    if (_battleLogTW.l2UsesHtml) _battleLogTW.l2El.innerHTML = _battleLogTW.l2Full;
    else _battleLogTW.l2El.textContent = _battleLogTW.l2Full;
  }
  if (_battleLogTW.l3El) {
    if (_battleLogTW.l3UsesHtml) _battleLogTW.l3El.innerHTML = _battleLogTW.l3Full;
    else _battleLogTW.l3El.textContent = _battleLogTW.l3Full;
  }
  _battleLogTW.typing = false;
}

function _setBattleLog(lines, opts) {
  _cancelBattleLogTypewriter();
  _battleLogTW.typing = false;
  if (!Array.isArray(lines)) lines = [lines || ''];
  const l1 = document.getElementById('battleLogLine1');
  const l2 = document.getElementById('battleLogLine2');
  const l3 = document.getElementById('battleLogLine3');
  const o = opts || {};
  const animate = (o.animate !== false);
  const useTypewriter = (o.typewriter !== false) && animate;
  const t1 = lines[0] || '';
  const t2 = lines[1] || '';
  const t3 = lines[2] || '';
  const usesHtml1 = t1.indexOf('<') >= 0;
  const usesHtml2 = t2.indexOf('<') >= 0;
  const usesHtml3 = t3.indexOf('<') >= 0;

  // ラインのクラス付与 + フェードイン (enter) だけ先にやって中身は空にする
  const prep = (el, cls) => {
    if (!el) return;
    el.className = 'battle-log-line' + (cls ? ' ' + cls : '');
    el.textContent = '';
    if (animate) {
      el.classList.remove('enter');
      void el.offsetWidth;
      el.classList.add('enter');
    }
  };
  prep(l1, o.line1Class);
  prep(l2, o.line2Class);
  prep(l3, o.line3Class);

  // 即時表示モード (animate:false や reduced-motion 想定)
  if (!useTypewriter) {
    if (l1) l1.innerHTML = t1;
    if (l2) l2.innerHTML = t2;
    if (l3) l3.innerHTML = t3;
    return;
  }

  _battleLogTW.l1El = l1; _battleLogTW.l2El = l2; _battleLogTW.l3El = l3;
  _battleLogTW.l1Full = t1; _battleLogTW.l2Full = t2; _battleLogTW.l3Full = t3;
  _battleLogTW.l1UsesHtml = usesHtml1; _battleLogTW.l2UsesHtml = usesHtml2; _battleLogTW.l3UsesHtml = usesHtml3;
  _battleLogTW.typing = true;

  const CHAR_MS = 45;
  const LINE_GAP_MS = 180;

  const typeLine = (el, text, usesHtml, startDelay, onDone) => {
    if (!el || !text) {
      _battleLogTW.timers.push(setTimeout(() => { if (onDone) onDone(); }, startDelay));
      return;
    }
    if (usesHtml) {
      _battleLogTW.timers.push(setTimeout(() => {
        el.innerHTML = text;
        if (onDone) onDone();
      }, startDelay));
      return;
    }
    let i = 0;
    const step = () => {
      i++;
      el.textContent = text.slice(0, i);
      if (i < text.length) {
        _battleLogTW.timers.push(setTimeout(step, CHAR_MS));
      } else {
        if (onDone) onDone();
      }
    };
    _battleLogTW.timers.push(setTimeout(step, startDelay));
  };

  typeLine(l1, t1, usesHtml1, 40, () => {
    typeLine(l2, t2, usesHtml2, LINE_GAP_MS, () => {
      typeLine(l3, t3, usesHtml3, LINE_GAP_MS, () => {
        _battleLogTW.typing = false;
      });
    });
  });
}
function _clearBattleLog() { _setBattleLog(['', '', ''], { animate: false }); }

// ===== タップ進行ダイアログ (ドラクエ風、子供でも読めるペース) =====
// messages: [{ lines:[string,string,string], opts?:{line1Class,line2Class,line3Class,animate} }, ...]
// onDone: 全メッセージ消化後のコールバック。
// 動作: 1 メッセージ目を即表示 + ▼ 点滅 + inner クリックで次へ。最後の消化後 onDone。
const _battleDialog = {
  queue: [],
  onDone: null,
  active: false,
  handler: null,
  _minShowUntil: 0,  // このタイムスタンプまではタップを無視 (誤爆防止)
};

function _battleDialogBind() {
  if (_battleDialog.handler) return;
  _battleDialog.handler = function(ev) {
    if (!_battleDialog.active) return;
    // 誤爆防止: 0.22s は必ず待つ (連打対策 & アニメ終了まで)
    if (Date.now() < _battleDialog._minShowUntil) return;
    // preventDefault / stopPropagation はしない。
    // (他の pointerdown 処理 — audio unlock, HanziWriter 筆跡, 他のタップリスナー — を
    //  絶対に潰さないため。dialog が active の間だけ「進行」をトリガーする。
    //  dialog active = バトル導入中で quiz 書き取りはまだ始まっていないので競合は起きない。)
    _battleDialogAdvance();
  };
  // 画面のどこをタップしても進められるよう document レベルで bubble phase 拾い。
  // active フラグが false の間は即 return で何もしないので常時 listener は無害。
  document.addEventListener('pointerdown', _battleDialog.handler, false);
}

function _battleDialogAdvance() {
  // タイプライター進行中なら、まず全文即表示するだけ。次のタップで queue 送り。
  if (_battleLogTW.typing) {
    _completeBattleLogTypewriter();
    _battleDialog._minShowUntil = Date.now() + 220;
    return;
  }
  if (_battleDialog.queue.length === 0) {
    _battleDialogFinish();
    return;
  }
  const next = _battleDialog.queue.shift();
  _setBattleLog(next.lines || ['', '', ''], next.opts || {});
  // タイプライター分の時間 + 余裕を取って誤爆防止タイマーを設定
  _battleDialog._minShowUntil = Date.now() + 220;
  _battleDialogSetAwait(true);
}

function _battleDialogFinish() {
  _battleDialog.active = false;
  _battleDialogSetAwait(false);
  const cb = _battleDialog.onDone;
  _battleDialog.onDone = null;
  if (cb) cb();
}

function _battleDialogSetAwait(on) {
  const win = document.getElementById('battleLog');
  if (!win) return;
  if (on) win.classList.add('await-tap');
  else    win.classList.remove('await-tap');
}

function _showBattleDialog(messages, onDone) {
  if (!Array.isArray(messages) || messages.length === 0) {
    if (onDone) onDone();
    return;
  }
  _battleDialogBind();
  _battleDialog.queue = messages.slice();
  _battleDialog.onDone = onDone || null;
  _battleDialog.active = true;
  _battleDialogAdvance(); // 1 通目を即表示 + await-tap on
}

// 2026-04-21: 勇者の「ダメージをあたえた！」ログの後に
// 子供がログを読み終わるまで止めて、タップで次 (敵のカウンター) に進ませる。
// battleHitEnemy 側の typewriter が動いている途中から呼んでも、
// _battleDialogAdvance が「まず typewriter を即完了 → 次タップで onTap 発火」
// の二段階で動くので子供が読み急がされない。
function _awaitTapOnLog(onTap, minDelayMs) {
  _battleDialogBind();
  _battleDialog.queue = [];
  _battleDialog.onDone = onTap || null;
  _battleDialog.active = true;
  _battleDialog._minShowUntil = Date.now() + (minDelayMs != null ? minDelayMs : 300);
  _battleDialogSetAwait(true);
}

// ===== バトル登場演出: カーテン + 敵ドン表示 → 名前告知 → タップで挑発 → タップで前進 =====
// ユーザー要望 (2026-04-20): 子供が読めるペースで進められるように、
// 一方的なタイマー進行をやめて各ダイアログをタップで手動送りにする。
function _showBattleEncounterIntro(onDone) {
  const enemy = _battle.enemy;
  if (!enemy) { if (onDone) onDone(); return; }

  // 中ボス (boss:true) は「中ボス あらわる！」モーダルを先に挟んでから本編へ。
  if (enemy.boss) {
    _presentBattleModal({
      icon: '⚠️',
      title: '中ボス あらわる！',
      body: '<strong>' + enemy.name + '</strong><br>が たちはだかる！',
      button: 'たたかう！',
      next: function() { _showBattleEncounterIntroCore(onDone); }
    });
    return;
  }
  _showBattleEncounterIntroCore(onDone);
}

function _showBattleEncounterIntroCore(onDone) {
  const enemy = _battle.enemy;
  if (!enemy) { if (onDone) onDone(); return; }

  // エンカウントでバトル BGM へ切替 (マップ BGM からの遷移)
  try { setBgmFor('battle'); } catch (e) {}

  // バトルステージを「カーテンの裏」で表示可能な状態に戻す。
  // カーテン (z-index 1300, opaque 黒) が覆っているので、ここで display を
  // 戻してもユーザーには見えない。カーテンがフェードアウトした瞬間にバトル
  // 画面が自然に現れる。
  const _stageEls = _battleEls();
  if (_stageEls.stage) _stageEls.stage.style.display = '';

  // Phase A: カーテンだけ先に出す (まだ敵は登場しない)。
  // ユーザー要望 (2026-04-20): いきなりモンスターが出てこないから、
  // エンカウント前のナレーションを 2 ステップ見せてから敵を登場させる。
  // さらに「〇〇は あるいていた…」の間、move.png で歩く勇者を左から右へ流す。
  // 行ラベルからステージを取得 (森/洞窟/火山/城)
  const _rowLbl = (_rowPracticeRow && _rowPracticeRow.label) || 'あ';
  const _stage = _stageForRow(_rowLbl);

  const curtain = document.createElement('div');
  curtain.className = 'battle-intro-curtain stage-' + _stage;
  // ステージ別背景 (緩やかスクロール) を先に貼る。phase 2 (敵登場) でフェードアウトさせる。
  const forest = document.createElement('div');
  forest.className = 'battle-intro-forest';
  curtain.appendChild(forest);
  document.body.appendChild(curtain);

  // 歩行アニメ: カーテンの手前・ログの後ろに重ねる
  const walkWrap = document.createElement('div');
  walkWrap.className = 'battle-intro-hero-wrap';
  walkWrap.innerHTML = '<div class="hero-sprite move"></div>';
  document.body.appendChild(walkWrap);

  // Phase 1: エンカウント前ナレーション (ステージに合わせた情景でタップ送り)
  const heroName = _battleHeroName();
  const preMessages = _stageIntroNarration(_stage, heroName);

  _showBattleDialog(preMessages, function() {
    // 歩きを止めてフェードアウト + 森もフェードアウト → 敵登場へ
    try { walkWrap.classList.add('walk-off'); } catch (e) {}
    try { curtain.classList.add('forest-out'); } catch (e) {}
    setTimeout(function() { if (walkWrap.parentNode) walkWrap.remove(); }, 620);

    // Phase 2: 敵ドン登場 + エンカウントジングル
    const img = document.createElement('img');
    img.className = 'battle-intro-enemy';
    img.onerror = function() { this.onerror = null; this.src = '../assets/images/monsters/chars/monster_005.png'; };
    img.src = enemy.img;
    img.alt = enemy.name;
    curtain.appendChild(img);
    try { playEncounterJingle(); } catch (e) {}

    // Phase 3: 名前告知 → 挑発 (各タップで送る)
    const postMessages = [
      { lines: [enemy.name + 'が あらわれた！', ''], opts: { line1Class: 'dq-line-emphasis' } },
    ];
    if (enemy.taunts && enemy.taunts[0]) {
      postMessages.push({ lines: [enemy.name, '「' + enemy.taunts[0] + '」'] });
    }

    // 敵登場アニメが落ち着くまで少し待ってから次のダイアログ
    setTimeout(function() {
      _showBattleDialog(postMessages, function() {
        setTimeout(function() {
          curtain.classList.add('fade-out');
          // 画面がバトル画面に切り替わる瞬間にログ枠を DOM フロー位置 (なぞり書きの上) に戻す
          // (2026-04-20 ユーザー指示: 画面が切り替わったらすぐ変える)
          document.body.classList.remove('battle-intro-active');
        }, 150);
        setTimeout(function() {
          if (curtain.parentNode) curtain.remove();
          if (onDone) onDone();
        }, 750);
      });
    }, 600);
  });
}

// _showEnemySpeech: バトル中は上部吹き出しではなくログに集約する

function _hideBattleStage() {
  const els = _battleEls();
  if (!els.stage) return;
  _battle.active = false;
  // 遅延中の立ち絵差し替えタイマーを全部止める (バトル終了後に画像が入れ替わる事故を防止)
  try { _clearEnemyFrameTimers(); } catch (e) {}
  // バトルログの残留メッセージ (「よくがんばった」等) を空にする。
  // 次の行がパズル行の場合は _showPuzzleStage 側で案内文に上書きされる。
  try { _setBattleLog(['', '', ''], { animate: false }); } catch (e) {}
  els.stage.style.display = 'none';
  els.stage.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('battle-mode');
  const md = document.getElementById('monsterDeco');
  if (md) md.style.display = '';
  // 「たおした！」ウィンドウが残っていれば念のため消す
  try { _hideDefeatedWindow(); } catch (e) {}
}

// ===== 謎解き行 (か/な/ら) =====
// か行 = 「こわれた はし」橋板パズル。
// 1文字書き切るごとに板1枚を出現 (.placed)、5枚目で全板 .finisher グロー。
// バトルとは同じ canvas/writer 基盤を使い、完了後分岐だけ差し替える。
const PUZZLE_ROWS = {
  'か': { kind: 'bridge',    title: 'こわれた はし',        hint: 'もじを なぞって はしを なおそう！',     chars: ['か','き','く','け','こ'] },
  'カ': { kind: 'bridge',    title: 'こわれた はし',        hint: 'もじを なぞって はしを なおそう！',     chars: ['カ','キ','ク','ケ','コ'] },
  // な行: ほこらの番人 (石像) が妖精を封印している。文字をなぞると石板が五芒星スロットにはまり、
  // 5枚揃えると封印解除 → 扉が開く → 囚われた妖精を解放 → 妖精が仲間に。
  'な': { kind: 'riddle',    title: 'ふういんの ほこら',     hint: 'もじを なぞって ふういんを とこう！',  chars: ['な','に','ぬ','ね','の'] },
  'ナ': { kind: 'riddle',    title: 'フウインの ホコラ',     hint: 'もじを なぞって ふういんを とこう！',  chars: ['ナ','ニ','ヌ','ネ','ノ'] },
  // ら行: 火山の溶岩にかかる「とびいし」。文字をなぞる=呪文発動で飛び石が 1 つ浮上。
  // 5文字書くと 5石揃い道になる → 勇者が飛び石を渡る = ゴーレム退散。
  'ら': { kind: 'lava_step', title: 'ようがんの とびいし',   hint: 'じゅもんを かいて とびいしを よびだそう！', chars: ['ら','り','る','れ','ろ'] },
  'ラ': { kind: 'lava_step', title: 'ヨウガンの トビイシ',   hint: 'じゅもんを かいて とびいしを よびだそう！', chars: ['ラ','リ','ル','レ','ロ'] },
};
function _isPuzzleRow(label) { return !!PUZZLE_ROWS[label]; }

const _puzzle = { active: false, kind: null, step: 0, total: 5, chars: [] };

function _puzzleEls() {
  return {
    stage:  document.getElementById('puzzleStage'),
    title:  document.getElementById('puzzleTitle'),
    planks: document.getElementById('puzzlePlanks'),
    hint:   document.getElementById('puzzleHint'),
  };
}

function _showPuzzleStage(rowLabel) {
  const els = _puzzleEls();
  const def = PUZZLE_ROWS[rowLabel];
  if (!els.stage || !def) return;
  _puzzle.active = true;
  _puzzle.kind = def.kind;
  _puzzle.step = 0;
  _puzzle.total = def.chars.length;
  _puzzle.chars = def.chars.slice();
  _puzzle.fairyFreed = false;

  // 前の行のバトルログ (「よくがんばった！」等) が残らないよう、パズル行の案内に差し替え。
  const _puzzleIntro = {
    bridge:    ['もじを なぞって', 'はしを なおそう！'],
    tablet:    ['もじを なぞって', 'せきばんの ふういんを とこう！'],
    lava_step: ['もじを なぞって', 'ようがんを わたろう！'],
    riddle:    ['もじを なぞって', 'ほこらの ふういんを とこう！'],
  };
  try {
    const lines = _puzzleIntro[def.kind] || ['もじを なぞって', 'パズルを とこう！'];
    _setBattleLog(lines, { line2Class: 'dmg-line' });
  } catch (e) {}

  if (els.title) els.title.textContent = def.title;
  if (els.hint)  els.hint.textContent  = def.hint;

  // 背景・板スタイルを kind に応じて切り替え (bridge / tablet / lava_step)。
  // 既存の puzzle-bg-bridge に加え、puzzle-bg-tablet / puzzle-bg-lava_step を用意。
  if (els.stage) {
    els.stage.classList.remove('puzzle-bg-bridge', 'puzzle-bg-tablet', 'puzzle-bg-lava_step', 'puzzle-bg-riddle', 'fixed', 'pedestal-focused', 'complete');
    for (let i = 1; i <= 5; i++) els.stage.classList.remove('step-' + i);
    els.stage.classList.add('puzzle-bg-' + def.kind);
  }

  // 前回ぶんの lava_step 用残骸を掃除 (浮上済みの石・閃光・旧ゴーレム) + 前回 bridge の妖精
  if (els.stage) {
    els.stage.querySelectorAll('.lava-golem-bg, .lava-burst, .lava-rising-stone, .lava-walker, .lava-fairy, .lava-magic-burst, .bridge-fairy, .bridge-magic-burst').forEach(function(n) { n.remove(); });
  }

  // か行 bridge: 出会いイントロで妖精登場済み。パズル中は妖精スプライトがステージ右上に常駐し、
  // 各文字完成時に次の板へ飛んで魔法で変化させる (_puzzleRevealPlank 内で駆動)。
  if (def.kind === 'bridge' && els.stage) {
    var bf = document.createElement('div');
    bf.className = 'bridge-fairy';
    // 2026-04-22: emoji を pixies/pixy_forest.png 立ち絵に差し替え (森の妖精: 緑色)
    var bfImg = document.createElement('img');
    bfImg.src = '../assets/images/characters/pixies/pixy_forest.png';
    bfImg.alt = 'もりの ようせい';
    bfImg.style.cssText = 'width:100%;height:100%;object-fit:contain;image-rendering:pixelated;pointer-events:none;';
    bf.appendChild(bfImg);
    bf.dataset.placed = '0';
    els.stage.appendChild(bf);
  }

  // 板5枚を生成 (初期は非表示 .plank = opacity:0)
  if (els.planks) {
    els.planks.innerHTML = '';
    if (def.kind === 'lava_step') {
      // ら行: 背景 lava_steps_0.png (空の溶岩) を下敷きに、stone_N.png を下から浮上させて定着。
      // 石が浮上してもフェード消失させず、最終位置に残り続ける (シームレス化 2026-04-22)。
      // 敵キャラ (🗿 ようがんゴーレム) は出さない (「番人と戦わない」方針を lava にも適用)。
      if (els.stage) {
        for (let i = 1; i <= 5; i++) els.stage.classList.remove('step-' + i);
        // 残骸 (前回ランのstone-placed) をクリア
        els.stage.querySelectorAll('.lava-rising-stone').forEach(function(n) { n.remove(); });
      }
    } else {
      // riddle 行は SVG viewBox を使って画像ピクセル座標で石板を配置する。
      // 背景 (shrine_seal_vacant.png) は CSS background:cover で敷かれているが、SVG も
      // preserveAspectRatio="xMidYMid slice" で同じクロップ挙動になるため両者は必ず
      // ピクセル単位で一致する (端末アスペクトに依存しない)。(2026-04-22 SVG化)
      if (def.kind === 'riddle') {
        var SVG_NS = 'http://www.w3.org/2000/svg';
        // shrine_seal_vacant.png (1920x1080) 上の空スロット (88x88px 暗部) 中心をピクセル解析
        // 順番は PUZZLE_ROWS chars の [な,に,ぬ,ね,の] 順に対応。
        var SHRINE_SLOTS = [
          { cx: 968, cy: 320 }, // な: 上 (2026-04-22 微調整 +3px 右)
          { cx: 1172, cy: 484 }, // に: 右上
          { cx: 1092, cy: 716 }, // ぬ: 右下
          { cx: 843,  cy: 716 }, // ね: 左下
          { cx: 765,  cy: 483 }  // の: 左上
        ];
        var TILE_SZ = 88; // shrine_seal_vacant.png の空スロット実寸 (88x88)
        var svg = document.createElementNS(SVG_NS, 'svg');
        svg.setAttribute('class', 'shrine-svg');
        svg.setAttribute('viewBox', '0 0 1920 1080');
        svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
        els.planks.appendChild(svg);

        var _rmap = {
          'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
          'ナ':'na','ニ':'ni','ヌ':'nu','ネ':'ne','ノ':'no'
        };
        def.chars.forEach(function(ch, idx) {
          var rom = _rmap[ch] || 'na';
          var slot = SHRINE_SLOTS[idx] || SHRINE_SLOTS[0];
          var img = document.createElementNS(SVG_NS, 'image');
          img.setAttribute('class', 'plank-riddle tablet-slot-' + idx);
          // href (モダン) と xlink:href (Safari 古いバージョン) の両方を設定
          var src = '../assets/images/puzzle/tablet/shrine_tile_' + rom + '.png';
          img.setAttribute('href', src);
          img.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', src);
          img.setAttribute('x', String(slot.cx - TILE_SZ / 2));
          img.setAttribute('y', String(slot.cy - TILE_SZ / 2));
          img.setAttribute('width', String(TILE_SZ));
          img.setAttribute('height', String(TILE_SZ));
          svg.appendChild(img);
        });
      } else {
        def.chars.forEach(function(ch, idx) {
          const p = document.createElement('span');
          p.className = 'plank plank-' + def.kind;
          p.textContent = ch;
          els.planks.appendChild(p);
        });
      }
    }
  }

  els.stage.style.display = '';
  els.stage.setAttribute('aria-hidden', 'false');
  document.body.classList.add('battle-mode'); // ポノ/ハリネズミを隠す (集中のため)

  // 封印された妖精は隠す (同一キャンバス内の干渉を避ける)
  const md = document.getElementById('monsterDeco');
  if (md) md.style.display = 'none';

  // 保険: 前行の battle-stage が残っていて、上に半透明オーバーレイが被さった際に
  // 敵スプライトがゴーストとして透けて見える報告あり。明示的に display:none を再設定する。
  const _bs = document.getElementById('battleStage');
  if (_bs) { _bs.style.display = 'none'; _bs.setAttribute('aria-hidden', 'true'); }
}

function _hidePuzzleStage() {
  const els = _puzzleEls();
  _puzzle.active = false;
  _puzzle.kind = null;
  _puzzle.step = 0;
  _puzzle.chars = [];
  if (!els.stage) return;
  els.stage.style.display = 'none';
  els.stage.setAttribute('aria-hidden', 'true');
  els.stage.classList.remove('complete', 'pedestal-focused');
  // ら行の飛び石ステップクラスをリセット (次回 lava_step で再利用)
  for (let i = 1; i <= 5; i++) els.stage.classList.remove('step-' + i);
  els.stage.querySelectorAll('.pedestal-burst, .lava-burst, .lava-golem-bg, .lava-walker, .lava-rising-stone, .lava-fairy, .lava-magic-burst, .shrine-door, .shrine-walker, .shrine-door-banner, .bridge-fairy, .bridge-magic-burst').forEach(function(b) { b.remove(); });
  if (els.planks) { els.planks.style.opacity = ''; els.planks.style.transition = ''; }
  document.body.classList.remove('battle-mode');
  const md = document.getElementById('monsterDeco');
  if (md) md.style.display = '';
}

// 祠の扉演出: 5枚目の石板がハマった後に呼ぶ。
// 扉が奥から浮上 → ルーンが灯り → 左右に開く → 勇者が左から扉へ歩いて消える。
// 所要時間 約5秒。done コールバックで次の行へ進める。
function _buildShrineDoor(onDone) {
  const stage = _puzzleEls().stage;
  if (!stage) { if (onDone) onDone(); return; }
  // バナー (「どうくつの おくへ!」) は扉が完全に開いた頃に出す
  const banner = document.createElement('div');
  banner.className = 'shrine-door-banner';
  banner.textContent = 'どうくつの おくへ すすもう！';
  // 扉本体
  const door = document.createElement('div');
  door.className = 'shrine-door';
  const frame = document.createElement('div');
  frame.className = 'shrine-door-frame';
  const light = document.createElement('div');
  light.className = 'shrine-door-light';
  const halfL = document.createElement('div');
  halfL.className = 'shrine-door-half left';
  const halfR = document.createElement('div');
  halfR.className = 'shrine-door-half right';
  door.appendChild(frame);
  door.appendChild(light);
  door.appendChild(halfL);
  door.appendChild(halfR);
  stage.appendChild(door);
  stage.appendChild(banner);
  // ① 石板をフェードアウトして道を開ける
  const planksBox = _puzzleEls().planks;
  if (planksBox) {
    planksBox.style.transition = 'opacity 0.7s ease';
    planksBox.style.opacity = '0.15';
  }
  // ② 扉せり上がり
  requestAnimationFrame(function() {
    setTimeout(function() { door.classList.add('rising'); }, 40);
    // ③ 扉が開く
    setTimeout(function() { door.classList.add('open'); }, 1100);
    // ④ 勇者が歩いてくる (扉が開き始めた頃にスポーン)
    setTimeout(function() {
      const walker = document.createElement('div');
      walker.className = 'shrine-walker hero-sprite move';
      stage.appendChild(walker);
    }, 1600);
    // ⑤ 歩き終わった頃に次へ
    setTimeout(function() { if (onDone) onDone(); }, 4600);
  });
}

// ===== な行: ほこらのまもりがみの 3択なぞなぞ =====
// 各文字で 1問。正解で次の字へ、不正解はシェイク+再試行 (ゲームオーバー無し、子供のペース)。
// 絵文字データは CHAR_WORDS (L3397-) と同じ語を流用。
const RIDDLES = {
  'な': { question: '「な」で はじまるのは どれ？', correct: { emoji: '🍐', word: 'なし' },        wrong: [{ emoji: '🍎', word: 'りんご' }, { emoji: '🍌', word: 'ばなな' }] },
  'に': { question: '「に」で はじまるのは どれ？', correct: { emoji: '🐓', word: 'にわとり' },    wrong: [{ emoji: '🐶', word: 'いぬ' },   { emoji: '🐱', word: 'ねこ' }] },
  'ぬ': { question: '「ぬ」で はじまるのは どれ？', correct: { emoji: '🧸', word: 'ぬいぐるみ' },  wrong: [{ emoji: '⏰', word: 'とけい' }, { emoji: '📕', word: 'ほん' }] },
  'ね': { question: '「ね」で はじまるのは どれ？', correct: { emoji: '🐱', word: 'ねこ' },        wrong: [{ emoji: '🐰', word: 'うさぎ' }, { emoji: '🐸', word: 'かえる' }] },
  'の': { question: '「の」で はじまるのは どれ？', correct: { emoji: '🚗', word: 'のりもの' },    wrong: [{ emoji: '🍚', word: 'ごはん' }, { emoji: '🏠', word: 'いえ' }] },
  'ナ': { question: '「ナ」で はじまるのは どれ？', correct: { emoji: '🍆', word: 'ナス' },        wrong: [{ emoji: '🍎', word: 'リンゴ' }, { emoji: '🍌', word: 'バナナ' }] },
  'ニ': { question: '「ニ」で はじまるのは どれ？', correct: { emoji: '🥕', word: 'ニンジン' },    wrong: [{ emoji: '🍞', word: 'パン' },   { emoji: '🥛', word: 'ミルク' }] },
  'ヌ': { question: '「ヌ」で はじまるのは どれ？', correct: { emoji: '🍜', word: 'ヌードル' },    wrong: [{ emoji: '🍣', word: 'スシ' },   { emoji: '🍩', word: 'ドーナツ' }] },
  'ネ': { question: '「ネ」で はじまるのは どれ？', correct: { emoji: '👔', word: 'ネクタイ' },    wrong: [{ emoji: '🎩', word: 'ボウシ' }, { emoji: '👟', word: 'スニーカー' }] },
  'ノ': { question: '「ノ」で はじまるのは どれ？', correct: { emoji: '📓', word: 'ノート' },      wrong: [{ emoji: '📕', word: 'ホン' },   { emoji: '✏️', word: 'エンピツ' }] },
};

function _showRiddle(char, onCorrect) {
  const r = RIDDLES[char];
  if (!r) { if (onCorrect) onCorrect(); return; }
  const options = [r.correct].concat(r.wrong);
  // シャッフル (Fisher-Yates)
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = options[i]; options[i] = options[j]; options[j] = tmp;
  }
  const correctWord = r.correct.word;

  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;z-index:1680;background:radial-gradient(ellipse at 50% 30%,rgba(255,140,60,0.28) 0%,rgba(10,5,18,0.88) 72%);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 0.4s ease;padding:20px;';

  const guardian = document.createElement('div');
  guardian.textContent = '🗿';
  guardian.style.cssText = 'font-size:3.8rem;margin-bottom:12px;filter:drop-shadow(0 0 22px rgba(140,200,255,0.75));animation:guardianFloat 1.8s ease-in-out infinite;';
  ov.appendChild(guardian);

  const bubble = document.createElement('div');
  bubble.textContent = r.question;
  bubble.style.cssText = 'background:linear-gradient(180deg,rgba(255,245,210,0.98),rgba(255,220,160,0.96));color:#5a2f08;font-size:1.2rem;font-weight:900;padding:16px 24px;border-radius:22px;border:3px solid #8B4513;box-shadow:0 6px 22px rgba(0,0,0,0.6);margin-bottom:26px;max-width:90vw;text-align:center;line-height:1.5;';
  ov.appendChild(bubble);

  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:14px;justify-content:center;flex-wrap:wrap;max-width:95vw;';
  options.forEach(function(opt) {
    const btn = document.createElement('button');
    btn.style.cssText = 'background:linear-gradient(180deg,#fffdf2,#ffe8b8);border:4px solid #C68E3A;border-radius:22px;padding:14px 10px 10px;cursor:pointer;font-family:inherit;width:26vw;max-width:120px;min-width:90px;box-shadow:0 6px 14px rgba(0,0,0,0.45),inset 0 2px 6px rgba(255,255,255,0.7);display:flex;flex-direction:column;align-items:center;transition:transform 0.15s ease;';
    btn.innerHTML = '<div style="font-size:2.9rem;line-height:1;margin-bottom:6px;">' + opt.emoji + '</div>' +
                    '<div style="font-size:0.88rem;font-weight:900;color:#5a2f08;">' + opt.word + '</div>';
    btn.addEventListener('click', function() {
      if (opt.word === correctWord) {
        btn.style.background = 'linear-gradient(180deg,#fff9c4,#ffe066)';
        btn.style.transform = 'scale(1.14)';
        btn.style.boxShadow = '0 0 34px rgba(255,220,80,0.95),0 6px 14px rgba(0,0,0,0.45)';
        row.querySelectorAll('button').forEach(function(b) { if (b !== btn) { b.style.opacity = '0.25'; b.disabled = true; } });
        try { if (typeof window.playFanfare === 'function') window.playFanfare(); } catch (e) {}
        const praise = document.createElement('div');
        praise.textContent = 'せいかい！';
        praise.style.cssText = 'position:absolute;top:14%;left:50%;transform:translateX(-50%);font-size:2.2rem;font-weight:900;color:#FFEB50;text-shadow:0 0 16px rgba(255,200,80,0.95),0 3px 6px rgba(0,0,0,0.75);animation:praisePop 0.65s cubic-bezier(0.3,1.6,0.5,1);';
        ov.appendChild(praise);
        setTimeout(function() {
          ov.style.transition = 'opacity 0.4s ease';
          ov.style.opacity = '0';
          setTimeout(function() { ov.remove(); if (onCorrect) onCorrect(); }, 400);
        }, 1150);
      } else {
        btn.style.animation = 'wrongShake 0.45s ease';
        btn.style.background = 'linear-gradient(180deg,#ffd4d4,#f08080)';
        setTimeout(function() {
          btn.style.animation = '';
          btn.style.background = 'linear-gradient(180deg,#fffdf2,#ffe8b8)';
        }, 700);
      }
    });
    row.appendChild(btn);
  });
  ov.appendChild(row);
  document.body.appendChild(ov);
}

// ===== 封印された扉のワイドショット =====
// riddle 行に入る直前に 1枚: 「洞窟の奥に大きな石の扉、封印されて動かない」の状況説明。
// (2026-04-22 v3: 「画像ウィンドウに文字を入れない」方針でオーバーレイ上のナレーションを撤去。
//   ワイドショット画像は puzzleStage が表示される前に 1.8s 見せて自動フェードアウト。

function _showSealedDoorScene(onDone) {

  setTimeout(close, 1800);
}
