// ===== Word Context Phase (Phase 4) =====
function _startWordContextPhase(char, data, onComplete) {
  var traceArea = document.querySelector('.trace-area');
  var canvasWrap = document.querySelector('.canvas-wrap');
  canvasWrap.style.display = 'none';

  // Hide controls during word context (prevent overlap with 3+ char words)
  var midCol = document.querySelector('.mid-col');
  if (midCol) midCol.style.display = 'none';

  // Adjust Pono position for long words (3+ chars)
  var ponoDeco = document.querySelector('.pono-deco');
  var ponoBubbleEl = document.getElementById('ponoBubble');
  var wordLen = data.word ? data.word.length : 1;
  if (ponoDeco && wordLen >= 3) {
    // 画面左端に張り付かないよう 4〜10px の正の値にする（以前は見切れていた）
    ponoDeco.style.left = wordLen >= 4 ? '4px' : '10px';
    if (ponoBubbleEl) ponoBubbleEl.style.left = wordLen >= 4 ? '8px' : '14px';
  }

  // Create word context wrapper
  var wcWrap = document.createElement('div');
  wcWrap.className = 'word-context-wrapper';
  wcWrap.id = 'wordContextWrap';

  // Emoji
  if (data.emoji) {
    var emojiDiv = document.createElement('div');
    emojiDiv.className = 'word-context-emoji';
    emojiDiv.textContent = data.emoji;
    wcWrap.appendChild(emojiDiv);
  }

  // Word row
  var wordRow = document.createElement('div');
  wordRow.className = 'word-context-row';

  // Left cell: writable canvas (大きく表示)
  var leftCell = document.createElement('div');
  leftCell.className = 'word-context-cell writable';
  var totalChars = data.word ? data.word.length : 1;
  // メインの書くマスは大きく、残りは小さく
  var mainSize = Math.min(Math.min(window.innerWidth, window.innerHeight) * 0.42, 200);
  var smallSize = Math.min(mainSize * 0.45, 70);
  leftCell.style.width = mainSize + 'px';
  leftCell.style.height = mainSize + 'px';
  var wcTarget = document.createElement('div');
  wcTarget.id = 'wcWriterTarget';
  leftCell.appendChild(wcTarget);
  wordRow.appendChild(leftCell);

  // Right cell(s): remaining text characters (小さく表示)
  var remaining = data.word.slice(char.length);
  if (remaining) {
    for (var ri = 0; ri < remaining.length; ri++) {
      var rightCell = document.createElement('div');
      rightCell.className = 'word-context-cell text-only';
      rightCell.style.width = smallSize + 'px';
      rightCell.style.height = smallSize + 'px';
      rightCell.style.fontSize = (smallSize * 0.5) + 'px';
      rightCell.textContent = remaining[ri];
      wordRow.appendChild(rightCell);
    }
  }

  wcWrap.appendChild(wordRow);
  traceArea.appendChild(wcWrap);

  // Create mini HanziWriter
  var wcWriter = HanziWriter.create(wcTarget, char, {
    width: mainSize,
    height: mainSize,
    padding: 15,
    strokeColor: currentScheme.stroke,
    outlineColor: currentScheme.outline,
    drawingColor: currentScheme.drawing,
    highlightColor: currentScheme.highlight,
    drawingWidth: 14,
    strokeAnimationSpeed: 0.5,
    showOutline: true,
    showCharacter: false,
    charDataLoader: function(c, onLoad) {
      var url = 'https://cdn.jsdelivr.net/gh/ailectra/kana-json@v0.0.1/data/' + c + '.json';
      fetch(url)
        .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
        .then(function(d) { onLoad(d); })
        .catch(function() {
          var url2 = 'https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + c + '.json';
          fetch(url2)
            .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
            .then(function(d) { onLoad(d); })
            .catch(function() {});
        });
    }
  });

  setQuizActive(true);
  wcWriter.quiz({
    onCorrectStroke: function() { playStrokeSound(); _hideMonsterBubble(); },
    onComplete: function() {
      setQuizActive(false);
      if (!_rowPracticeActive) return;
      playSuccessSound();
      speakWord(char, data.word);
      _hedgeBubble.textContent = 'すごーい！';
      _ponoBubble.textContent = 'すごーい！';
      ponoCheer();                   // ← 行練習コンプ時も歓喜ポーズ
      // speakWord再生（約1.5秒）+ 2秒待ちで次へ
      setTimeout(function() {
        if (!_rowPracticeActive) return;
        wcWrap.remove();
        canvasWrap.style.display = '';
        var mc = document.querySelector('.mid-col');
        if (mc) mc.style.display = '';
        // Restore Pono position
        var pd = document.querySelector('.pono-deco');
        var pb = document.getElementById('ponoBubble');
        if (pd) pd.style.left = '';
        if (pb) pb.style.left = '';
        if (onComplete) onComplete();
      }, 3500);
    },
    showHintAfterMisses: 3,
    highlightOnComplete: true,
    highlightCompleteColor: currentScheme.stroke
  });
}

// ===== Orientation change — force viewport recalc =====
function fixViewportHeight() {
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const h = vh + 'px';
  document.documentElement.style.height = h;
  document.body.style.height = h;
  document.body.style.width = vw + 'px';
  document.getElementById('app').style.height = h;
  // Kill any scroll offset
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  if (window.visualViewport) {
    window.scrollTo(window.visualViewport.offsetLeft, window.visualViewport.offsetTop);
  }
}
function onOrientationChange() {
  fixViewportHeight();
  setTimeout(fixViewportHeight, 50);
  setTimeout(fixViewportHeight, 150);
  setTimeout(fixViewportHeight, 400);
  setTimeout(fixViewportHeight, 800);
  if (_currentScreen === 'select') buildRowSelectScreen();
}
landscapeMQ.addEventListener('change', onOrientationChange);
window.addEventListener('orientationchange', () => {
  setTimeout(fixViewportHeight, 50);
  setTimeout(fixViewportHeight, 200);
  setTimeout(fixViewportHeight, 500);
});
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', fixViewportHeight);
} else {
  window.addEventListener('resize', fixViewportHeight);
}
fixViewportHeight();

// ===== Button handlers =====

if (btnHint) btnHint.addEventListener('click', () => {
  // Ignore during word context phase or demo phase
  if (document.getElementById('wordContextWrap')) return;
  if (_rowPracticePhase === 'demo') return;
  if (!writer) return;

  writer.cancelQuiz();
  document.getElementById('demoIndicator').style.display = 'block';
  writer.animateCharacter({
    onComplete: function() {
      document.getElementById('demoIndicator').style.display = 'none';
      writer.hideCharacter();
      // Row practice mode: restart the guided quiz with row practice handler
      if (_rowPracticeActive && _rowPracticePhase === 'quiz_guided') {
        writer.quiz({
          onCorrectStroke: function() { playStrokeSound(); _hideMonsterBubble(); },
          onMistake: function() { _perfectCurrentChar = false; _hideMonsterBubble(); },
          onComplete: function() {
            if (!_rowPracticeActive) return;
            playSuccessSound();
            var _inBattle = !!(_battle && _battle.active);
            if (!_inBattle) launchConfetti();
            if (!_inBattle) _playMonsterPop();
            _awardAcorns(_perfectCurrentChar);
            saveStamp(currentCategory, currentCharIndex);
            markCharDone(currentCharIndex);
            if (window.incrementStat) {
              window.incrementStat('writing_chars', 1);
              if (currentCategory === 'hiragana') window.incrementStat('writing_hiragana', 1);
              if (currentCategory === 'katakana') window.incrementStat('writing_katakana', 1);
            }
            var data = WORD_DATA[currentCategory][currentCharIndex];
            var char = CATEGORIES[currentCategory].chars[currentCharIndex];
            if (data && data.word) {
              _rowPracticePhase = 'show_word';
              _showRowPracticeWord(char, data, function() {
                _rowPracticePhase = 'quiz_free';
                _hedgeBubble.textContent = 'ことばで かこう！';
                _ponoBubble.textContent = 'ことばで かこう！';
                _startWordContextPhase(char, data, function() {
                  _rowPracticeStep++;
                  _rowPracticeNextChar();
                });
              });
            } else {
              setTimeout(function() { _rowPracticeStep++; _rowPracticeNextChar(); }, 2600);
            }
          },
          showHintAfterMisses: 3,
          highlightOnComplete: true,
          highlightCompleteColor: currentScheme.stroke
        });
      } else {
        // Normal (non-practice) mode
        startQuiz();
      }
    }
  });
});

// ===== BGM =====
// RPG 化に合わせて「書き取り画面 = 戦闘」→ battleA/B、
// 将来の「ワールドマップ」→ mapA/B を切替で鳴らす。
const BGM_TRACKS = {
  battle: ['../assets/audio/bgm/battleC.mp3'],
  map:    ['../assets/audio/bgm/mapA.mp3',    '../assets/audio/bgm/mapB.mp3'],
};
const bgm = document.getElementById('bgm');
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';
let bgmStarted = false;
let _bgmKind = null;
bgm.volume = 0.28;

function setBgmFor(kind) {
  const pool = BGM_TRACKS[kind];
  if (!pool) return;
  if (_bgmKind === kind && bgm.src) return; // 同系列なら継続
  _bgmKind = kind;
  const track = pool[Math.floor(Math.random() * pool.length)];
  bgm.src = track;
  bgmStarted = false;
  if (bgmEnabled) bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
}
// 初期トラック: 起動時は行選択 = フィールド扱い (map BGM)。
// バトル突入時に _showBattleEncounterIntro が 'battle' に切替える。
setBgmFor('map');

function tryStartBgm() {
  if (!bgmEnabled || bgmStarted) return;
  if (!bgm.src) setBgmFor('map');
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
}
// BGM starts when entering practice (user tap satisfies autoplay policy)
window.setBgmFor = setBgmFor;

// ===== Tutorial =====
function showTutorial() {
  var dim = document.getElementById('tut-dim');
  var bubble = document.getElementById('tut-bubble');
  if (!dim || !bubble) return;
  _tutorialActive = true;

  // 1ステップ: 説明 → お手本再生 → スタート
  dim.classList.remove('hidden');
  bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
  bubble.innerHTML = '✏️ おてほんを みて<br>おなじ じゅんばんで<br>ゆびで なぞってみよう！<br><button class="tut-next-btn" id="tut-next">おてほんを みる ▶</button>';
  bubble.classList.remove('hidden');

  document.getElementById('tut-next').addEventListener('pointerdown', function(e) {
    e.preventDefault();
    dim.classList.add('hidden');
    bubble.classList.add('hidden');
    _tutorialActive = false;
    localStorage.setItem('writing_tut_seen', '1');
    // お手本再生 → スタート
    if (writer) {
      _hedgeBubble.textContent = 'このじゅんばんで かくよ！';
      _ponoBubble.textContent = 'このじゅんばんで かくよ！';
      document.getElementById('demoIndicator').style.display = 'block';
      writer.animateCharacter({
        onComplete: function() {
          document.getElementById('demoIndicator').style.display = 'none';
          _hedgeBubble.textContent = 'かいてみよう！';
          _ponoBubble.textContent = 'かいてみよう！';
          writer.hideCharacter();
          dim.classList.remove('hidden');
          bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
          bubble.innerHTML = '<div style="font-size:1.5rem;font-weight:900;color:#F2915A;">✏️ スタート！</div>';
          bubble.classList.remove('hidden');
          setTimeout(function() {
            dim.classList.add('hidden');
            bubble.classList.add('hidden');
            if (_rowPracticeActive) {
              // Resume row practice Phase 2 (guided quiz)
              _rowPracticePhase = 'quiz_guided';
              _hedgeBubble.textContent = 'かいてみよう！';
              _ponoBubble.textContent = 'かいてみよう！';
              writer.quiz({
                onCorrectStroke: function() { playStrokeSound(); _hideMonsterBubble(); },
                onMistake: function() { _perfectCurrentChar = false; _hideMonsterBubble(); },
                onComplete: function() {
                  if (!_rowPracticeActive) return;
                  playSuccessSound();
                  var _inBattle = !!(_battle && _battle.active);
                  if (!_inBattle) launchConfetti();
                  if (!_inBattle) _playMonsterPop();
                  _awardAcorns(_perfectCurrentChar);
                  saveStamp(currentCategory, currentCharIndex);
                  markCharDone(currentCharIndex);
                  if (window.incrementStat) {
                    window.incrementStat('writing_chars', 1);
                    if (currentCategory === 'hiragana') window.incrementStat('writing_hiragana', 1);
                    if (currentCategory === 'katakana') window.incrementStat('writing_katakana', 1);
                  }
                  var data = WORD_DATA[currentCategory][currentCharIndex];
                  var char = CATEGORIES[currentCategory].chars[currentCharIndex];
                  if (data && data.word) {
                    _rowPracticePhase = 'show_word';
                    _showRowPracticeWord(char, data, function() {
                      _rowPracticePhase = 'quiz_free';
                      _hedgeBubble.textContent = 'ことばで かこう！';
                      _ponoBubble.textContent = 'ことばで かこう！';
                      _startWordContextPhase(char, data, function() {
                        _rowPracticeStep++;
                        _rowPracticeNextChar();
                      });
                    });
                  } else {
                    setTimeout(function() { _rowPracticeStep++; _rowPracticeNextChar(); }, 2600);
                  }
                },
                showHintAfterMisses: 3,
                highlightOnComplete: true,
                highlightCompleteColor: currentScheme.stroke
              });
            } else {
              startQuiz();
            }
          }, 1000);
        }
      });
    }
  });
}

<!-- Service Worker 登録: ホーム画面 PWA からこのページを直接開いた時も
     新しい SW を検知してリロードする (iOS 対策) -->
<script>
  if ('serviceWorker' in navigator) {
    function _ponoSWReload() {
      if (!window._ponoSWRefreshing) {
        window._ponoSWRefreshing = true;
        window.location.reload();
      }
    }
    navigator.serviceWorker.addEventListener('controllerchange', _ponoSWReload);
    navigator.serviceWorker.addEventListener('message', function(e) {
      if (e && e.data && e.data.type === 'sw-updated') _ponoSWReload();
    });
    navigator.serviceWorker.register('/sw.js').then(function(reg) {
      reg.update();
      // 表示復帰 (ホーム画面 PWA からの再前面化) 時にも update を呼ぶ
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') { try { reg.update(); } catch (e) {} }
      });
    }).catch(function() {});
  }
</script>
