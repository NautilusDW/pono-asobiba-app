    probe.onerror = function() { _showMerge(); };
    probe.src = VOLCANO_PATH_INTRO_IMG;

  _showMapScene(rowId, function() {

        { lines: ['もじを なぞって', 'てきを', 'たおそう！'], opts: { line3Class: 'dmg-line' } }
      ], function() { if (onDone) onDone(); });

}

// ===== 妖精解放システム (姫様の味方を集める) =====
// パズル3行 (か/な/ら) を完走すると、各地の封印が解けて妖精が仲間になる。
// 橋が板も釘もなしに治る/扉が開く/溶岩に足場が出る等の「なぜ？」を、
// 妖精の魔法として物語的に回収する。3人揃えば最終ダンジョンが開く (stub)。
const FAIRY_KEY = 'pono_fairies';
// 2026-04-22 v8: 炎↔氷 妖精入れ替え。
//   「炎の妖精が溶岩で"あつい"と言う」矛盾を解消するため、
//   溶岩 (ら行 / 'fire' キー) には 氷の妖精 を配置 → "あつい、とけそう" が成立。
//   祠 (な行 / 'shrine' キー) には 炎の妖精 を配置 → "さむい、こおりで封印されてる" が成立。
//   キー名 ('shrine'/'fire') は "場所ID" として残す (localStorage フラグ互換のため改名しない)。
const FAIRY_META = {
  // v268: 妖精に固有名を付与 (森=リーファ、氷=セリナ、炎=ヒノカ)。
  // name フィールドは表示用の個人名、species は種族表示 (一部コメントや alt 用)。
  // 'water' キー = 壊れた橋 (か行) ロケーション。ここに住むのは リーファ (森の妖精)。
  // キー名は localStorage フラグ互換のため保持、セマンティクスは 森 に寄せている。
  water:  { name: 'リーファ', species: 'もりの ようせい', emoji: '🧚‍♀️', color: '#4ade80', rowKind: 'bridge',    msg: 'これで わたれるよ！',
            img: '../assets/images/characters/pixies/pixy_forest.png',
            hint: 'ほこらに なかまが つかまって いるの。\nたすけて あげて！' },
  // 'shrine' キー = 祠 (な行)。ここに住むのは セリナ (氷の妖精)。
  // (2026-04-24) 氷の封印 ⇔ 氷の妖精 の属性一致、および「氷で溶岩に足場を作る」物理矛盾の解消のため
  //              旧スワップ (炎@祠 / 氷@溶岩) を廃止して元の配置に戻した。
  //              魔王城の鍵はセリナが持つ (能力一致: 氷の首飾りに封じ込める)。
  //              鍵受け渡し+次妖精の誘導は _rescueFairy の shrine 分岐で行う (msg の後に
  //              拡張ダイアログ + 🔑 reveal)。hint は不要 (内容を shrine 分岐に移動)。
  shrine: { name: 'セリナ', species: 'こおりの ようせい', emoji: '🧚‍♀️', color: '#7ad2ff', rowKind: 'riddle',    msg: 'たすけて くれて ありがとう！',
            img: '../assets/images/characters/pixies/pixy_ice.png' },
  // 'fire' キー = 溶岩 (ら行)。ここに住むのは ヒノカ (炎の妖精、カゲロウの相棒)。
  // 溶岩を操って飛び石を作る (火山の魂 = 溶けた岩を固める) 設定。
  fire:   { name: 'ヒノカ', species: 'ほのおの ようせい', emoji: '🧚‍♂️', color: '#ff9a60', rowKind: 'lava_step', msg: 'たすけて くれて ありがとう！',
            img: '../assets/images/characters/pixies/pixy_fire.png',
            hint: 'わたしも きょうりょく する わ。\nおひめさまを たすけて あげて！',
            hint2: 'もじを かいて ね。\nわたしが ようがんを かためて とびいしに するわ！' },
};
function _getFairies() {
  try { return JSON.parse(localStorage.getItem(FAIRY_KEY) || '{}') || {}; }
  catch (e) { return {}; }
}
function _hasFairy(id) { return !!_getFairies()[id]; }
function _freeFairy(id) {
  var f = _getFairies();
  var wasAlreadyFreed = !!f[id];
  f[id] = 1;
  try { localStorage.setItem(FAIRY_KEY, JSON.stringify(f)); } catch (e) {}
  try { renderFairyRow(); } catch (e) {}
  // v266 ありがとうテーマ統合: 妖精救出で +3 加算 (冪等: 既に開放済みなら加算しない)
  if (!wasAlreadyFreed && typeof window.addThankYou === 'function') {
    try { window.addThankYou(3, { reason: 'fairy:' + id }); } catch (e) {}
  }
}
function _hasAllFairies() {
  var f = _getFairies(); return !!(f.water && f.shrine && f.fire);
}
function resetFairies() {
  try { localStorage.removeItem(FAIRY_KEY); } catch (e) {}
  try { renderFairyRow(); } catch (e) {}
}

// 封印破り + 妖精登場の全画面演出。
// fairyId: 'water'|'shrine'|'fire', onDone: 演出終了コールバック
function _rescueFairy(fairyId, onDone) {
  var meta = FAIRY_META[fairyId];
  if (!meta) { if (onDone) onDone(); return; }
  var alreadyFreed = _hasFairy(fairyId);
  // 冪等: フラグは常に立て直す (上書きしても壊れない)
  _freeFairy(fairyId);

  var existing = document.getElementById('fairyRescueOverlay');
  if (existing) { try { existing.remove(); } catch (e) {} }

  var ov = document.createElement('div');
  ov.id = 'fairyRescueOverlay';
  ov.style.setProperty('--fairy-color', meta.color);
  ov.style.setProperty('--fairy-glow',  meta.color.replace(')', ',0.5)').replace('rgb', 'rgba').replace('#', '') );
  // CSS var に rgba で渡したいが、color は hex。glow はおおまかに同色の半透明ドロップ。
  // シンプルに color をそのまま glow に使う (filter drop-shadow が hex で動く)。
  ov.style.setProperty('--fairy-glow', meta.color);

  // 2026-04-22 v7: 以前は brief (救出済) モードで封印演出もセリフも全スキップしていたが、
  // 「何回テストしてもセリフが出ない」指摘あり (localStorage にフラグが残ると以後毎回 brief 扱い)。
  // → brief は封印演出だけを簡略化し、セリフは必ず流す仕様に変更。
  var brief = alreadyFreed;
  if (brief) ov.classList.add('brief');

  var stage = document.createElement('div');
  stage.className = 'fairy-rescue-stage';

  // 封印 (六芒星 + 鎖)
  var seal = document.createElement('div');
  seal.className = 'fairy-rescue-seal';
  seal.innerHTML =
    '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">' +
      '<defs>' +
        '<radialGradient id="sealGrad" cx="50%" cy="50%" r="50%">' +
          '<stop offset="0%" stop-color="#2a0818" stop-opacity="0.9"/>' +
          '<stop offset="100%" stop-color="#5a0820" stop-opacity="0.4"/>' +
        '</radialGradient>' +
      '</defs>' +
      '<circle cx="100" cy="100" r="88" fill="url(#sealGrad)" stroke="#dc2848" stroke-width="4"/>' +
      '<polygon points="100,20 120,85 188,85 133,125 152,190 100,150 48,190 67,125 12,85 80,85" ' +
        'fill="none" stroke="#ff5070" stroke-width="3" opacity="0.9"/>' +
      '<polygon points="100,180 120,115 188,115 133,75 152,10 100,50 48,10 67,75 12,115 80,115" ' +
        'fill="none" stroke="#ff8090" stroke-width="2" opacity="0.7"/>' +
      '<circle cx="100" cy="100" r="22" fill="none" stroke="#ffaabb" stroke-width="2"/>' +
      '<text x="100" y="108" text-anchor="middle" font-size="28" fill="#ffaabb" font-weight="900">封</text>' +
    '</svg>';
  stage.appendChild(seal);

  // 妖精 (立ち絵優先 pixies/*.png、失敗時は emoji にフォールバック)
  var sprite = document.createElement('div');
  sprite.className = 'fairy-rescue-sprite';
  if (meta.img) {
    var spriteImg = document.createElement('img');
    spriteImg.src = meta.img;
    spriteImg.alt = meta.name || '';
    spriteImg.style.cssText = 'width:100%;height:100%;object-fit:contain;image-rendering:pixelated;';
    spriteImg.onerror = function() {
      sprite.innerHTML = '';
      sprite.textContent = meta.emoji;
    };
    sprite.appendChild(spriteImg);
  } else {
    sprite.textContent = meta.emoji;
  }
  stage.appendChild(sprite);

  // 吹き出し/ヒント/タップ誘導はオーバーレイ内に入れない (2026-04-22 v3 指摘対応)。
  // セリフは close() 後に _showBattleDialog でバトルメッセージ欄に流す。
  // 2026-04-22 v4: 「もうちょっとアップで + 名前は表示して」指摘 → 名前だけ下部に控えめに表示。
  var nameLabel = document.createElement('div');
  nameLabel.className = 'fairy-rescue-name';
  nameLabel.textContent = meta.name || '';
  stage.appendChild(nameLabel);

  ov.appendChild(stage);
  document.body.appendChild(ov);

  var closed = false;
  function close() {
    if (closed) return;
    closed = true;
    ov.classList.add('closing');
    // battleLog の一時的な z-index を戻す
    try {
      var bl = document.getElementById('battleLog');
      if (bl) { bl.style.position = ''; bl.style.zIndex = ''; }
    } catch (e) {}
    setTimeout(function() {
      try { if (ov.parentNode) ov.remove(); } catch (e) {}
      if (onDone) onDone();
    }, 360);
  }

  // 封印→破壊→妖精登場→セリフ(妖精を出したまま)→お別れ のタイマー群
  // (2026-04-22 v5 指摘: 妖精が喋っている間も画面に出していて欲しい → オーバーレイを出したまま
  //  _showBattleDialog を流す。battleLog の z-index を一時的に上げて overlay 上に重ねる。)
  // (2026-04-22 v7 指摘: brief モード (救出済フラグが残った状態) でも毎回セリフを出す必要あり。
  //  封印破りの演出時間だけを短縮し、セリフ自体は共通化。)
  var sealDelay = brief ? 150 : 450;
  var dialogDelay = brief ? 600 : 1650;

  // 封印が砕ける
  setTimeout(function() {
    seal.classList.add('shatter');
    try { if (typeof playSE === 'function') playSE('sparkle'); } catch (e) {}
    for (var i = 0; i < 14; i++) {
      var p = document.createElement('div');
      p.className = 'seal-shatter-particle';
      var ang = (i / 14) * Math.PI * 2;
      var dist = 80 + Math.random() * 60;
      p.style.setProperty('--dx', (Math.cos(ang) * dist).toFixed(0) + 'px');
      p.style.setProperty('--dy', (Math.sin(ang) * dist).toFixed(0) + 'px');
      p.style.animationDelay = (Math.random() * 0.15).toFixed(2) + 's';
      stage.appendChild(p);
    }
  }, sealDelay);

  // 妖精アピア完了後にセリフ開始。妖精はそのまま中央に居続ける。
  var dialogStarted = false;
  function startDialog() {
    if (dialogStarted) return;
    dialogStarted = true;
    var dialogLines = [];
    if (meta.msg) {
      dialogLines.push({ lines: [meta.name + '「' + meta.msg, '', ''] });
    }
    if (meta.hint) {
      var hintParts = meta.hint.split('\n');
      dialogLines.push({ lines: [meta.name + '「' + (hintParts[0] || ''), hintParts[1] || '', ''] });
    }
    if (meta.hint2) {
      var hint2Parts = meta.hint2.split('\n');
      dialogLines.push({ lines: [meta.name + '「' + (hint2Parts[0] || ''), hint2Parts[1] || '', ''] });
    }
    // battleLog を overlay (z-index 1660) の上に引き上げる
    try {
      var bl = document.getElementById('battleLog');
      if (bl) { bl.style.position = 'relative'; bl.style.zIndex = '1700'; }
    } catch (e) {}
    function farewell() {
      // セリフ完了後、妖精を 1s 静止で見せてから飛び去らせる (余韻)
      setTimeout(function() {
        sprite.classList.add('leaving');
        setTimeout(close, 650);
      }, 1000);
    }
    // (2026-04-24 v267 鍵 handoff バグ修正) 氷の妖精 (shrine) は 魔王城の鍵 を勇者に渡す。
    // 初回 msg の後に鍵受け渡しダイアログ + 🔑 reveal + 次妖精 (溶岩/炎の妖精) への誘導を挟む。
    // 従来は炎の妖精 (ら行 lava finisher _fireFairyFarewell) が鍵を渡していたが、docs の
    // 設計メモ (祠=氷 / 溶岩=炎、鍵は能力一致の氷の妖精が持つ) が code に未反映だった。
    function runShrineKeyHandoff(next) {
      // (2026-04-24 ユーザー指示で最終版に整理)
      // 冒頭「たすけて くれて ありがとう」は _rescueFairy が既に表示しているので省略。
      // 鍵はとっさに「この首飾り」に閉じ込めて隠した、という一連の流れを 5 メッセージに凝縮。
      // 最後は「わたしも てつだう わ！」で仲間として同行することを表明。
      var keyMessages = [
        { lines: ['セリナ「わたし は セリナ。', '', ''] },
        { lines: ['セリナ「わたし、まおうじょう に しのびこんで、', 'もんばん から かぎ を ぬすんで きた の！', ''] },
        { lines: ['セリナ「でも、かえりみち に', 'てしたたち に つかまって しまって…', ''] },
        { lines: ['セリナ「でも、とっさに この くびかざり に', 'とじこめた から みつからなかった わ。', ''] },
        { lines: ['セリナ「この かぎ で', 'おひめさま を たすけて！', ''] },
        { lines: ['セリナ「わたし も てつだう わ！', '', ''] }
      ];
      // 3番目のメッセージ (index 2「とっさに この くびかざり に とじこめた」) 表示時に 🔑 をポップイン
      var keyRevealAt = 2;
      var keyEl = null;
      function showOne(i) {
        if (i >= keyMessages.length) {
          // 鍵はフェードアウト
          if (keyEl && keyEl.parentNode) {
            keyEl.style.transition = 'opacity 0.5s ease, transform 0.6s ease';
            keyEl.style.opacity = '0';
            keyEl.style.transform = 'translate(-50%,-50%) scale(0.3)';
            setTimeout(function() { if (keyEl && keyEl.parentNode) keyEl.remove(); }, 650);
          }
          next();
          return;
        }
        if (i === keyRevealAt && !keyEl) {
          keyEl = _iceFairyKeyReveal(stage);
        }
        _showBattleDialog([keyMessages[i]], function() { showOne(i + 1); });
      }
      showOne(0);
    }
    if (dialogLines.length && typeof _showBattleDialog === 'function') {
      if (fairyId === 'shrine') {
        _showBattleDialog(dialogLines, function() { runShrineKeyHandoff(farewell); });
      } else {
        _showBattleDialog(dialogLines, farewell);
      }
    } else {
      setTimeout(farewell, 2000);
    }
  }
  var dialogStartId = setTimeout(startDialog, dialogDelay);
  // タップで即セリフ開始 (早送り希望ユーザー向け)
  ov.addEventListener('click', function() {
    try { clearTimeout(dialogStartId); } catch (e) {}
    startDialog();
  });

  try { if (typeof playVictoryFanfare === 'function') playVictoryFanfare(); } catch (e) {}
}

// か行 bridge フィニッシャー専用: もりの妖精との別れ会話。
// (2026-04-22 v3: 「画像ウィンドウに文字を入れない & 左右分割される不具合」対応で
//   全画面オーバーレイ+吹き出しを撤去。既に橋ステージに居る bridge-fairy をそのまま見せて、
//   セリフは全てバトルメッセージ欄 (_showBattleDialog) に流す。1 ブロック 2 行固定。)
function _waterFairyFarewell(onDone) {
  _freeFairy('water');
  try { if (typeof playSE === 'function') playSE('sparkle'); } catch (e) {}

  // 橋ステージ上の妖精を中央にふわっと浮かせる (存在すれば)
  var stage = _puzzleEls().stage;
  var fairy = stage ? stage.querySelector('.bridge-fairy') : null;
  if (fairy) {
    fairy.style.transition = 'left 0.5s ease, top 0.5s ease, opacity 0.4s ease, transform 0.5s ease';
    fairy.style.left = '50%';
    fairy.style.top  = '32%';
    fairy.style.opacity = '1';
    fairy.style.transform = 'translate(-50%,-50%) scale(1.1)';
  }

  var messages = [
    { lines: ['リーファ「はし が なおった わ！', 'これで わたれる ね。', ''] },
    { lines: ['リーファ「わたし も いっしょ に いく わ！', '', ''] },
    { lines: ['リーファ「そうそう、 おねがい が あるの。', 'どうくつ の おく の ほこら に、', 'わたし の なかま が つかまって いる の。'] },
    { lines: ['リーファ「みんな で たすけに いこう！', '', ''] }
  ];

  _showBattleDialog(messages, function() {
    // 妖精が飛び去る
    if (fairy) {
      fairy.style.transition = 'opacity 0.55s ease, transform 0.7s cubic-bezier(0.4,0,0.8,0.3)';
      fairy.style.opacity = '0';
      fairy.style.transform = 'translate(-50%,-50%) translate(30vw,-40vh) scale(0.4) rotate(20deg)';
    }
    // 妖精が去った直後に勇者が橋を渡る (2.2s)
    setTimeout(function() {
      if (stage) {
        var walker = document.createElement('div');
        walker.className = 'bridge-walker hero-sprite move';
        stage.appendChild(walker);
        setTimeout(function() { if (walker.parentNode) walker.remove(); }, 2400);
      }
      // 渡りアニメ完了 (2.2s) + マージン 400ms で次へ
      setTimeout(function() { if (onDone) onDone(); }, 2600);
    }, 600);
  });
}

// ら行 lava フィニッシャー専用: 炎の妖精との別れ会話。
// (2026-04-24 v267) 魔王城の鍵受け渡しは氷の妖精 (祠) に移管された (docs/memory の設計メモ通り)。
// 現在は純粋な "助けてくれてありがとう + 帰ります" の短い別れに簡素化。
function _fireFairyFarewell(onDone) {
  _freeFairy('fire'); // 'fire' キー = 炎の妖精 (命名は localStorage 互換のため保持)
  try { if (typeof playSE === 'function') playSE('sparkle'); } catch (e) {}

  // 溶岩ステージ上の炎の妖精を中央上部にふわっと移動

  // (2026-04-24 v267) 炎の妖精の背景: 火山の魂・噴火拒否 → 幽閉。ユーザー指示で簡素化
  //   (前版 8 メッセージ版は説明的すぎ)、ポイントだけ 4 メッセージに圧縮。
  //   氷の妖精 (鍵盗難罪) との対照構造: 氷=盗賊 / 炎=拒絶者。
  //   妖精は旅に同行する仲間 (ED E1 で焚き火) なので「ようがんに かえる」は NG。
  var messages = [
    { lines: ['ヒノカ「わたし は ヒノカ。', '', ''] },
    { lines: ['ヒノカ「ゆうしゃさま、', 'たすけて くれて ありがとう！', ''] },
    { lines: ['ヒノカ「ザガン の てした に、', 'かざん を ふんか させろ と いわれた の。', ''] },
    { lines: ['ヒノカ「でも わたし が こばんだ から、', 'つかまって しまって…', ''] },

  ];

  function showOne(i) {
    if (i >= messages.length) { finish(); return; }
    _showBattleDialog([messages[i]], function() { showOne(i + 1); });

  function finish() {

// ===== 紙芝居 (オープニング/エンディング) =====
// scenes: [{ bg: 'gradient or #color', image: 'path' (optional), emoji: '...' (fallback), text: '...' }]
// onDone: 最終シーンをタップした後に呼ばれる。
// 画像はユーザーが後で assets/images/story/*.png 等で差し替える前提。
// image パス指定時は <img> を表示、onerror で emoji に自動フォールバック。
function _showStoryboard(scenes, onDone) {
  if (!scenes || !scenes.length) { if (onDone) onDone(); return; }

  var ov = document.createElement('div');
  ov.className = 'storyboard-overlay';
  document.body.appendChild(ov);

  var art = document.createElement('div');
  art.className = 'storyboard-art';
  ov.appendChild(art);

  var txt = document.createElement('div');
  txt.className = 'storyboard-text';
  ov.appendChild(txt);

  // テキスト内容 (1 ページ分) を入れる span。hint マーカーはその外 (txt の子)。
  var txtInner = document.createElement('span');
  txtInner.className = 'storyboard-text-inner';
  txt.appendChild(txtInner);

  var hint = document.createElement('div');
  hint.className = 'storyboard-hint';
  hint.textContent = '▼';
  txt.appendChild(hint);   // ボックス内の右下に配置

  var idx = 0;
  var pages = [];          // 現シーンのページ配列 (各ページ = 最大 2 行の配列)
  var pageIdx = 0;
  var transitioning = false;
  var typeTimer = null;    // タイプ進行中の setTimeout ID
  var typingDone = true;   // 現ページの全文字を出し切ったか

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // 2026-04-23: 全画像と音声を事前に並列プリロード → シーン遷移時にロード待ちで
  // ポップイン / 音声遅延が起きるのを防ぐ。
  scenes.forEach(function(s) {
    if (s && s.image) { var pre = new Image(); pre.src = s.image; }
    if (s && s.voice) {
      try { var pa = new Audio(); pa.preload = 'auto'; pa.src = s.voice; } catch (e) {}
    }
  });

  // ===== 紙芝居 BGM =====
  // シーン毎に s.bgm が指定されていれば、その mp3 にクロスフェードで切替。
  // 指定がないシーンでは直前の BGM を継続。
  //
  // 紙芝居中のハモり対策:
  //   (1) main bgm element (id="bgm") を pause + src クリアで完全停止
  //       (setBgmFor/focus 復帰で勝手に play() 再発火しないように src を外す)
  //   (2) window._storyboardActive フラグを立てて、visibilitychange/focus
  //       ハンドラ側でも main bgm の自動復帰を抑制
  //   (3) 紙芝居自身の sbAudio に visibilitychange/blur/focus を張り、
  //       タブ裏/画面オフで pause → 戻ったら play() 再開
  window._storyboardActive = true;
  var _mainBgmKillSrc = '';
  try {
    var _mb = document.getElementById('bgm');
    if (_mb) {
      _mainBgmKillSrc = _mb.currentSrc || _mb.src || '';
      _mb.pause();
      // 次の play() が呼ばれても元ソースに戻らないよう空にする
      try { _mb.removeAttribute('src'); _mb.load(); } catch (e) {}
      try { _titleBgmPlaying = false; } catch (e) {}
      try { _bgmKind = null; } catch (e) {}
    }
  } catch (e) {}

  var sbAudio = document.createElement('audio');
  sbAudio.loop = true;
  sbAudio.preload = 'auto';
  sbAudio.volume = 0;
  // 画面外に置いて iOS の表示バグを避ける。
  sbAudio.style.display = 'none';
  // 2026-04-23 v3: sbAudio を overlay の子ではなく document.body 直下に置く。
  // overlay が opacity→0 で消える & ov.remove() で DOM から外れた瞬間に
  // iOS で child audio が突然停止するケースを避ける。クリーンアップは
  // _sbCleanup 側で明示的に remove する。
  document.body.appendChild(sbAudio);
  // 2026-04-23 v3: iOS Safari では HTMLAudioElement.volume の書換が効かない
  // ため fadeAudio が無効化されていた (= 最終 BGM がフェードせず ぶつ切り)。
  // Web Audio の GainNode を通して音量制御する。
  var sbGain = null;
  try {
    var _sbSrcNode = audioCtx.createMediaElementSource(sbAudio);
    sbGain = audioCtx.createGain();
    sbGain.gain.value = 0;
    _sbSrcNode.connect(sbGain);
    sbGain.connect(audioCtx.destination);
    // 紙芝居突入時点でユーザータップ済なので resume 成功する想定。
    if (audioCtx.state !== 'running') { audioCtx.resume().catch(function(){}); }
  } catch (e) { /* 失敗時は el.volume のみで動作 */ }
  var currentBgmSrc = null;
  var sbWasPlayingBeforeHide = false;
  var fadeRaf = null;

  // ナレーション用オーディオ (BGM とは独立、ループしない)。シーンごとに切り替え。
  var voiceAudio = document.createElement('audio');
  voiceAudio.loop = false;
  voiceAudio.preload = 'auto';
  voiceAudio.volume = 1.0;
  voiceAudio.style.display = 'none';
  ov.appendChild(voiceAudio);
  var currentVoiceSrc = null;
  var voiceWasPlayingBeforeHide = false;

  // タブ非表示/フォーカス外れで sbAudio + voiceAudio を pause → 戻ったら再開。
  function _sbOnHide() {
    try {
      if (!sbAudio.paused) { sbWasPlayingBeforeHide = true; sbAudio.pause(); }
      if (!voiceAudio.paused) { voiceWasPlayingBeforeHide = true; voiceAudio.pause(); }
    } catch (e) {}
  }
  function _sbOnShow() {
    try {
      if (sbWasPlayingBeforeHide && currentBgmSrc) {
        sbWasPlayingBeforeHide = false;
        var p = sbAudio.play();
        if (p && p.catch) p.catch(function(){});
      }
      if (voiceWasPlayingBeforeHide && currentVoiceSrc) {
        voiceWasPlayingBeforeHide = false;
        var pv = voiceAudio.play();
        if (pv && pv.catch) pv.catch(function(){});
      }
    } catch (e) {}
  }
  function _sbVisHandler() { if (document.hidden) _sbOnHide(); else _sbOnShow(); }
  document.addEventListener('visibilitychange', _sbVisHandler);
  window.addEventListener('blur',  _sbOnHide);
  window.addEventListener('focus', _sbOnShow);
  function _sbCleanup() {
    try { sbAudio.pause(); sbAudio.src = ''; } catch (e) {}
    try { voiceAudio.pause(); voiceAudio.src = ''; } catch (e) {}
    // 2026-04-23 v3: Web Audio ノードの切断 + sbAudio 自体も body から除去。
    try { if (sbGain) sbGain.disconnect(); } catch (e) {}
    try { if (_sbSrcNode) _sbSrcNode.disconnect(); } catch (e) {}
    try { if (sbAudio.parentNode) sbAudio.parentNode.removeChild(sbAudio); } catch (e) {}
    document.removeEventListener('visibilitychange', _sbVisHandler);
    window.removeEventListener('blur',  _sbOnHide);
    window.removeEventListener('focus', _sbOnShow);
    try { window._storyboardActive = false; } catch (e) {}
  }
  // 2026-04-23 v3: sbAudio だけは Web Audio の gain で制御 (iOS 対策)。
  // それ以外 (voiceAudio 等) は element.volume のまま。
  function fadeAudio(el, from, to, durationMs, onDone) {
    if (fadeRaf) cancelAnimationFrame(fadeRaf);
    var useGain = (el === sbAudio && sbGain);
    if (useGain) {
      try {
        var nowCt = audioCtx.currentTime;
        sbGain.gain.cancelScheduledValues(nowCt);
        sbGain.gain.setValueAtTime(from, nowCt);
        sbGain.gain.linearRampToValueAtTime(to, nowCt + durationMs / 1000);
      } catch (e) {}
    }
    var startT = performance.now();
    function step(now) {
      var t = Math.min(1, (now - startT) / durationMs);
      try { el.volume = Math.max(0, Math.min(1, from + (to - from) * t)); } catch (e) {}
      if (t < 1) fadeRaf = requestAnimationFrame(step);
      else { fadeRaf = null; if (onDone) onDone(); }
    }
    fadeRaf = requestAnimationFrame(step);
  }
  function setBgm(src) {
    if (src === currentBgmSrc) return;
    currentBgmSrc = src;
    if (!src) {
      fadeAudio(sbAudio, sbAudio.volume, 0, 700, function() {
        try { sbAudio.pause(); } catch (e) {}
      });
      return;
    }
    function startNew() {
      try {
        sbAudio.src = src;
        sbAudio.currentTime = 0;
        sbAudio.volume = 0;
        var p = sbAudio.play();
        if (p && p.catch) p.catch(function() {});
        // v268: BGM 0.7 → 0.35 に下げ、ナレーション (voice 1.0) が聞き取りやすく。
        //       特に王様 (Charon、低音) が BGM に埋もれて聞こえづらい問題対応。
        fadeAudio(sbAudio, 0, 0.35, 900);
      } catch (e) {}
    }
    if (!sbAudio.paused && sbAudio.volume > 0.02) {
      fadeAudio(sbAudio, sbAudio.volume, 0, 500, function() {
        try { sbAudio.pause(); } catch (e) {}
        startNew();
      });
    } else {
      startNew();
    }
  }

  // ナレーション音声を切り替える。BGM と独立して再生 (重ねる)。シーン変更時に呼ぶ。
  // src が同じなら何もしない。null/undefined なら停止。
  function setVoice(src) {
    if (src === currentVoiceSrc) return;
    currentVoiceSrc = src;
    try {
      voiceAudio.pause();
      voiceAudio.currentTime = 0;
    } catch (e) {}
    if (!src) return;
    try {
      voiceAudio.src = src;
      voiceAudio.volume = 1.0;
      var p = voiceAudio.play();
      if (p && p.catch) p.catch(function() {});
    } catch (e) {}
  }

  // テキストをページに分割。1 シーン = 1 音声ファイルなので、自動 2 行分割は廃止
  // (音声はシーン単位で一気に流れるが、テキストだけ途中タップ待ちで止まってしまう
  //  ズレを防ぐため)。ページ区切りは \n\n を明示した場合のみ (S8 のように意図的な
  //  ページ割りが必要なシーン用)。
  //   \n\n = 明示的なページ区切り (データ側で指定)
  //   \n   = 行内改行 (1 ページ内で複数行)
  function splitPages(text) {
    text = text || '';
    var pagesArr;
    if (text.indexOf('\n\n') >= 0) {
      pagesArr = text.split('\n\n').map(function(p) {
        return p.split('\n');  // 明示的区切りのみ分割、1 ページの行数は制限なし
      });
    } else {
      // 明示的区切りが無ければシーン全体を 1 ページで表示 (音声 1 本 = 1 ページ原則)
      pagesArr = [text.split('\n')];
    }
    // 空ページは除外
    return pagesArr.filter(function(p) { return p.length > 0 && p.some(function(l){ return l.length>0; }); });
  }

  // ドラクエ風: 1 文字ずつ一定リズムで出す。句読点でのタメは最小、改行で少しだけ間。
  function startTypewriter(pageLines) {
    if (typeTimer) { clearTimeout(typeTimer); typeTimer = null; }
    typingDone = false;
    hint.classList.remove('visible');
    // 行数に合わせてメッセージボックスの min-height を事前予約 (1行の文は 1 行分だけ)。
    // タイプ中に高さが伸びてガタつくのを防ぎつつ、短文では余分な空間を取らない。
    var nLines = Math.max(1, pageLines.length);
    txt.style.minHeight = 'calc(1.55em * ' + nLines + ' + 12px + 18px)';
    var fullText = pageLines.join('\n');
    var pos = 0;
    txtInner.innerHTML = '';
    function step() {
      typeTimer = null;
      if (pos >= fullText.length) {
        typingDone = true;
        updateHint();
        hint.classList.add('visible');
        return;
      }
      pos++;
      txtInner.innerHTML = escapeHtml(fullText.slice(0, pos)).replace(/\n/g, '<br>');
      var justTyped = fullText.charAt(pos - 1);
      var delay = 52;                      // DQ 的には一定リズムが命
      if (justTyped === '\n') delay = 220; // 行送りだけ 軽くタメる
      typeTimer = setTimeout(step, delay);
    }
    step();
  }

  // 現在の位置 (最終シーンの最終ページか？) で ▼ の表示文字を決める。
  function updateHint() {
    var isLastPage = (pageIdx >= pages.length - 1);
    var isLastScene = (idx >= scenes.length - 1);
    hint.textContent = (isLastPage && isLastScene) ? '▶' : '▼';
  }

  // タップ中の挙動: タイプ中なら即時完了、完了後なら次ページ or 次シーンへ。
  function skipOrAdvance() {
    if (transitioning) return;
    if (!typingDone) {
      if (typeTimer) { clearTimeout(typeTimer); typeTimer = null; }
      var full = (pages[pageIdx] || []).join('\n');
      txtInner.innerHTML = escapeHtml(full).replace(/\n/g, '<br>');
      typingDone = true;
      updateHint();
      hint.classList.add('visible');
      return;
    }
    // 次ページがあればページ送り。無ければ次シーンへ。
    if (pageIdx < pages.length - 1) {
      pageIdx++;
      startTypewriter(pages[pageIdx]);
    } else {
      advance();
    }
  }

  function paintScene(i, keepImage) {
    var s = scenes[i];
    if (s.bg) ov.style.background = s.bg;
    if (s.bgm !== undefined) setBgm(s.bgm);  // シーン指定時のみ切替、未指定は継続
    // ナレーション: シーンに voice 指定があれば切替。未指定なら現行を停止しない (継続)。
    if (s.voice !== undefined) setVoice(s.voice);
    // keepImage=true: 同じ画像を維持、差し替えトランジションを走らせない (一枚絵モード)
    if (!keepImage) {
      art.innerHTML = '';
    }
    // 前シーンのメッセージが fade-in の一瞬に透けて見える現象への対策:
    // sb-in を再付与する前に古いテキストと hint を完全に消しておく (2026-04-23)。
    txtInner.innerHTML = '';
    hint.classList.remove('visible');
    var img = null;
    if (!keepImage) {
      if (s.image) {
        img = document.createElement('img');
        img.src = s.image;
        img.alt = '';
        if (s.pan) img.classList.add('sb-pan-' + s.pan);
        if (s.zoom) img.classList.add('sb-zoom-' + s.zoom);
        img.onerror = function() {
          art.innerHTML = '';
          art.textContent = s.emoji || '';
        };
        art.appendChild(img);
      } else {
        art.textContent = s.emoji || '';
      }
    }
    pages = splitPages(s.text || '');
    pageIdx = 0;
    if (!keepImage) art.classList.remove('sb-out');
    txt.classList.remove('sb-out');
    void art.offsetWidth;   // reflow

    // 画像がロードされるまで sb-in を遅延 (フェードインが「カットイン」に見える現象の対策)。
    // プリロード済みなら img.complete=true で即発火、未ロードなら load を待つ。
    // 万一 load が来ない/遅すぎる場合は 1500ms のフォールバックで強制発火。
    var fired = false;
    function triggerIn() {
      if (fired) return;
      fired = true;
      if (!keepImage) art.classList.add('sb-in');
      txt.classList.add('sb-in');
      // 文字ボックスの fade-in (delay 0.25s + 0.6s) とリズムが合うよう、
      // 400ms 待ってから type 開始 → ボックスが現れてから文字が書き始められる。
      setTimeout(function() {
        startTypewriter(pages[0] || ['']);
      }, 400);
    }
    if (keepImage) {
      // 絵はそのまま。テキストだけ出し直す。
      triggerIn();
    } else if (img && !(img.complete && img.naturalWidth > 0)) {
      var fbTimer = setTimeout(triggerIn, 1500);
      img.addEventListener('load',  function() { clearTimeout(fbTimer); triggerIn(); }, { once: true });
      img.addEventListener('error', function() { clearTimeout(fbTimer); triggerIn(); }, { once: true });
    } else {
      triggerIn();
    }
  }

  function advance() {
    if (transitioning) return;
    transitioning = true;
    if (typeTimer) { clearTimeout(typeTimer); typeTimer = null; }
    idx++;
    if (idx >= scenes.length) {
      // 余韻演出: 最終シーンの絵・文字を長めにフェードアウト → 純白へじっくり染める
      // → 白みホールド中も BGM 継続 → overlay を透明化して map がゆっくり現れる間、
      //    BGM はさらに 4 秒かけてゆっくり消える。
      // 時系列 (ms):
      //   0     = 絵/文字 fade-out + bg→white (1.8s, BGM 継続)
      //   500   = 絵/文字を visibility:hidden
      //   1800  = 完全白 (BGM まだ鳴ってる)
      //   4000  = 次画面セット (白バックのままホールド)
      //   4100  = overlay opacity フェードアウト開始 (1.5s) + BGM 4s フェードアウト開始
      //   5600  = overlay 透明 (map 完全表示, BGM まだかすかに鳴ってる)
      //   8100  = BGM 完全無音
      //   8200  = cleanup + overlay 撤去
      // 2026-04-23 v2: ユーザー要望「白バック中も BGM 続かせて、フェードアウトは 4 秒で」
      art.classList.remove('sb-in');
      txt.classList.remove('sb-in');
      art.classList.add('sb-out');
      txt.classList.add('sb-out');
      // overlay の transition を「ゆっくり白へ、ゆっくり透明へ」に上書き。
      ov.style.transition = 'opacity 1.5s ease, background 1.8s ease';
      ov.style.background = '#fff';
      setTimeout(function() {
        // 白の状態で子要素も完全に消す。
        art.style.visibility = 'hidden';
        txt.style.visibility = 'hidden';
      }, 500);
      setTimeout(function() {
        // 次画面 (map/practice) を白背後にセットアップ。storyboardActive はまだ true。
        if (onDone) { try { onDone(); } catch (e) {} }
      }, 4000);
      setTimeout(function() {
        // overlay を透明へフェード → 背後の map が白みからゆっくり現れる。
        ov.classList.add('fade-out');
        // BGM を 4 秒かけてゆっくりフェードアウト。
        // overlay 透明化 (1.5s) より長いので、map が出てからもしばらく余韻が残る。
        try {
          fadeAudio(sbAudio, sbAudio.volume, 0, 4000, function() {
            try { sbAudio.pause(); } catch (e) {}
          });
        } catch (e) {}
      }, 4100);
      setTimeout(function() {
        _sbCleanup();
        if (ov.parentNode) ov.remove();
      }, 8200);
      return;
    }
    // 2026-04-23 v2: 連続したシーンで同じ画像ファイルを使う場合、
    // ナレーションが分割されていても「結局同じ絵」なので差し替えトランジションは
    // 挟まず一枚絵のまま、テキストだけ入れ替える。
    var _prevScene = scenes[idx - 1];
    var _nextScene = scenes[idx];
    var _sameImage = !!(_prevScene && _nextScene
                        && _prevScene.image && _nextScene.image
                        && _prevScene.image === _nextScene.image);
    art.classList.remove('sb-in'); txt.classList.remove('sb-in');
    if (!_sameImage) art.classList.add('sb-out');
    txt.classList.add('sb-out');
    // 2026-04-23: タップと同時に BGM フェードアウトを開始する。
    // 次シーンが別 BGM を指定している場合は「シーン絵/文字の fade-out」と並行して
    // 音量をゼロへ (500ms ease)。paintScene 内の setBgm は 520ms 後に走るため、
    // その頃には volume ≒ 0 で fade-out 分岐をスキップし、新曲を fade-in で立ち上げる
    // → ブツ切れ感を解消。尺がタップタイミングで変わる問題も吸収。
    var _nextBgm = (scenes[idx] && scenes[idx].bgm !== undefined) ? scenes[idx].bgm : undefined;
    if (_nextBgm !== undefined && _nextBgm !== currentBgmSrc) {
      try {
        if (!sbAudio.paused && sbAudio.volume > 0.02) {
          fadeAudio(sbAudio, sbAudio.volume, 0, 500, function() {
            try { sbAudio.pause(); } catch (e) {}
          });
        }
      } catch (e) {}
    }
    // sb-out (0.55s) の完了を待ってから次シーン描画。余韻を残しつつ流れるような切り替え。
    // 同じ絵を維持する場合は文字だけのトランジションなので短く (0.35s)。
    setTimeout(function() {
      paintScene(idx, _sameImage);
      transitioning = false;
    }, _sameImage ? 360 : 520);
  }

  ov.addEventListener('click', skipOrAdvance);
  paintScene(0);
}

// 祠の扉が開く MP4 をフルスクリーン再生。終わったら onDone。
// タップで即スキップ可能。iOS の自動再生制約に備えて muted + playsinline。
function _playShrineDoorVideo(onDone) {
  var existing = document.getElementById('shrineDoorVideoOverlay');
  if (existing) { try { existing.remove(); } catch (e) {} }

  var ov = document.createElement('div');
  ov.id = 'shrineDoorVideoOverlay';

  var video = document.createElement('video');
  video.src = '../assets/videos/shrine_door_open.mp4';
  video.autoplay = true;
  video.muted = true;           // iOS 自動再生のため
  video.playsInline = true;
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');
  video.preload = 'auto';
  video.className = 'shrine-door-video';
  ov.appendChild(video);

  var hint = document.createElement('div');
  hint.className = 'shrine-door-tap-hint';
  hint.textContent = 'タップで すすむ';
  ov.appendChild(hint);

  document.body.appendChild(ov);

  var finished = false;
  function finish() {
    if (finished) return;
    finished = true;
    ov.classList.add('closing');
    setTimeout(function() {
      try { if (ov.parentNode) ov.remove(); } catch (e) {}
      if (onDone) onDone();
    }, 360);
  }

  video.addEventListener('ended', finish);
  video.addEventListener('error', finish);
  ov.addEventListener('click', finish);
  // 保険: 10s で強制的に次へ (動画読み込みに失敗したまま ended が来ない場合)
  setTimeout(finish, 10000);

  // play() の Promise 失敗 (iOS 1st tap 未経験など) を無視してフォールバック
  try {
    var p = video.play();
    if (p && typeof p.catch === 'function') {
      p.catch(function() { /* 自動再生失敗: タップで進んでもらう */ });
    }
  } catch (e) {}
}

// 扉の奥に広がる牢屋シーン。妖精が檻に囚われている → タップで解放する導線。
// 最終的な背景画はユーザー差し替え前提のため、ここでは CSS で牢屋を表現する placeholder。
// fairyId: 'shrine' 等 (FAIRY_META キー)、onDone: 解放完了コールバック。
function _showFairyCageScene(fairyId, onDone) {
  var meta = FAIRY_META[fairyId];
  if (!meta) { if (onDone) onDone(); return; }

  var existing = document.getElementById('fairyCageOverlay');
  if (existing) { try { existing.remove(); } catch (e) {} }

  var ov = document.createElement('div');
  ov.id = 'fairyCageOverlay';
  ov.style.setProperty('--fairy-color', meta.color);
  ov.style.setProperty('--fairy-glow', meta.color);

  var scene = document.createElement('div');
  scene.className = 'fairy-cage-scene';

  // 牢屋 (CSS placeholder。後日 background-image 差し替え)
  var cage = document.createElement('div');
  cage.className = 'fairy-cage';
  // 鉄格子 5 本
  for (var i = 0; i < 5; i++) {
    var bar = document.createElement('div');
    bar.className = 'fairy-cage-bar';
    bar.style.left = (10 + i * 20) + '%';
    bar.style.animationDelay = (i * 0.08) + 's';
    cage.appendChild(bar);
  }
  // 檻の中の妖精 (立ち絵優先、失敗時 emoji フォールバック)
  var caged = document.createElement('div');
  caged.className = 'fairy-cage-sprite';
  if (meta.img) {
    var cagedImg = document.createElement('img');
    cagedImg.src = meta.img;
    cagedImg.alt = meta.name || '';
    cagedImg.style.cssText = 'width:100%;height:100%;object-fit:contain;image-rendering:pixelated;';
    cagedImg.onerror = function() { caged.innerHTML = ''; caged.textContent = meta.emoji; };
    caged.appendChild(cagedImg);
  } else {
    caged.textContent = meta.emoji;
  }
  cage.appendChild(caged);
  scene.appendChild(cage);

  // キャプション/タップ誘導はオーバーレイ内に入れない (2026-04-22 v3)。
  // シーンが出た瞬間にバトルメッセージ欄へ通知する。
  ov.appendChild(scene);
  document.body.appendChild(ov);
  try {
    if (typeof _showBattleDialog === 'function') {
      _showBattleDialog([{ lines: ['ようせい が とらわれている！', 'タップで たすけよう。', ''] }], function() {});
    }
  } catch (e) {}

  var released = false;
  function release() {
    if (released) return;
    released = true;
    ov.classList.add('releasing');
    try { if (typeof playSE === 'function') playSE('sparkle'); } catch (e) {}
    // 鉄格子が砕ける → 妖精が飛び出す → onDone
    setTimeout(function() {
      ov.classList.add('closing');
      setTimeout(function() {
        try { if (ov.parentNode) ov.remove(); } catch (e) {}
        if (onDone) onDone();
      }, 420);
    }, 1100);
  }

  ov.addEventListener('click', release);
  // 保険: 6s 無操作なら自動解放
  setTimeout(release, 6000);
}

function renderEquipRow() {
  const row   = document.getElementById('heroEquipRow');

  if (!row || !strip) return;
  const order = ['sword', 'armor', 'shield']; // 表示順 (つるぎ → よろい → たて)
  const owned = order.filter(hasGear);
  if (owned.length === 0) {
    row.style.display = 'none';

  row.style.display = '';

    const m = GEAR_META[k];

  hint.style.cssText = 'position:absolute;bottom:6%;left:50%;transform:translateX(-50%);color:#FFE68A;font-size:1.05rem;font-weight:900;text-shadow:0 0 12px rgba(255,200,80,0.7),0 2px 4px rgba(0,0,0,0.8);letter-spacing:0.05em;animation:hintPulse 1.2s ease-in-out 0.7s infinite;z-index:4;';
  stage.appendChild(hint);

  ov.appendChild(stage);
  document.body.appendChild(ov);

  let opened = false;
  function openBox() {
    if (opened) return;
    opened = true;
    try { if (typeof playSE === 'function') playSE('sparkle'); } catch (e) {}

    hint.style.display = 'none';
    box.src = '../assets/images/items/treasure_open.png';
    box.style.animation = 'treasureOpenShake 0.35s ease-out';
    box.style.cursor = 'default';

    // 金色の放射バースト (SVG)
    const burst = document.createElement('div');
    burst.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:1;';
    burst.innerHTML =
      '<div style="position:absolute;width:70%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,rgba(255,240,150,0.95) 0%,rgba(255,200,60,0.5) 40%,rgba(255,160,40,0) 75%);animation:burstGlow 1.4s ease-out forwards;"></div>' +
      '<svg viewBox="0 0 200 200" style="position:absolute;width:100%;height:100%;animation:burstRaysSpin 2.6s linear forwards;">' +
        Array.from({length: 12}).map(function(_, i) {
          const angle = i * 30;
          return '<rect x="98" y="8" width="4" height="84" fill="rgba(255,235,140,0.85)" transform="rotate(' + angle + ' 100 100)">' +

        }).join('') +

    // 神器を宝箱から浮き上がらせる

    gear.src = m.img;
    gear.onerror = function() {
      gear.onerror = function() {

function _rowPracticeNextChar() {
  if (!_rowPracticeRow) { _rowPracticeActive = false; return; }
  if (_rowPracticeStep >= _rowPracticeRow.count) {
    _rowPracticeComplete();
    return;
  }
  // v268: わ行 最終ボス戦の finisher (3 文字目「ん」) の直前に、
  //        ヒノカ cameo + 「かざんのうた」narrative を挟む。物語のクライマックス。
  //        ヒット 2 ("を") が終わった直後の状態 = _rowPracticeStep === 2 のタイミング。
  if (!_waRowEpisodePlayed && _battle.active && _rowPracticeRow.label === 'わ' && _rowPracticeStep === 2) {
    _waRowEpisodePlayed = true;
    _playWaRowEpisode(function() {
      // エピソード完了後、通常の「ん」なぞり quiz へ
      _rowPracticeNextChar_continue();
    });
    return;
  }
  _rowPracticeNextChar_continue();
}

// v275: メモリフラッシュバック改良。
// - スロー fade-in (1.0s) + Ken Burns 風 ゆっくりズーム (1.0 → 1.06)
// - caption をフェードインで重ねる
// - 最低 1.8s 経たないとタップで進めない (キャプション読みきり保証)
function _showMemoryFlashback(beats, onDone) {
  var ov = document.createElement('div');
  ov.id = 'memoryFlashbackOverlay';
  // 2026-04-25: ユーザー指示「下のテキストと『タップ』が重なる」→ 縦 3 段 (img / caption / hint)
  //             を flex で明示的に分離。img は上寄せ (flex-start)、caption は中央帯、
  //             hint は最下部の固定スロットに分離して重なりを物理的に防止。
  ov.style.cssText = 'position:fixed;inset:0;z-index:1800;background:radial-gradient(ellipse at center,rgba(50,30,10,0.92) 0%,rgba(10,6,4,0.96) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4vh 0 10vh;box-sizing:border-box;opacity:0;transition:opacity 1.0s ease;cursor:pointer;';

  var imgEl = document.createElement('img');
  // 画像は上寄せ。caption 2 行分 + hint 分を空けるため max-height を 58vh に抑える。
  imgEl.style.cssText = 'max-width:86vw;max-height:58vh;object-fit:contain;filter:sepia(0.28) brightness(1.06) drop-shadow(0 0 30px rgba(255,200,100,0.45));opacity:0;transform:scale(1.0);transition:opacity 1.0s ease;border-radius:6px;will-change:transform,opacity;';
  ov.appendChild(imgEl);

  var captionEl = document.createElement('div');
  // caption は flex の真ん中の塊。hint とは下余白 10vh + hint の bottom:3vh で十分離す。
  captionEl.style.cssText = 'margin-top:22px;margin-bottom:0;width:min(86vw,640px);text-align:center;color:#FFEFC6;font-size:1.1rem;font-weight:900;line-height:1.7;letter-spacing:0.08em;text-shadow:0 0 10px rgba(255,180,90,0.7),0 2px 6px #000;opacity:0;transition:opacity 0.9s ease;white-space:pre-line;';
  ov.appendChild(captionEl);

  var hint = document.createElement('div');
  // hint は overlay 最下部 (absolute) に固定スロット化。caption との重なりを物理的に防ぐ。
  hint.style.cssText = 'position:absolute;bottom:3vh;left:50%;transform:translateX(-50%);color:#FFE27A;font-size:0.9rem;font-weight:700;opacity:0;letter-spacing:0.08em;text-shadow:0 0 6px rgba(0,0,0,0.8);animation:fbHintBlink 1.4s ease-in-out infinite;transition:opacity 0.4s ease;';
  hint.textContent = '▼ タップ';
  ov.appendChild(hint);

  // キーフレームを一度だけ注入 (Ken Burns 含む)
  if (!document.getElementById('memoryFlashbackKF')) {
    var st = document.createElement('style');
    st.id = 'memoryFlashbackKF';
    st.textContent = '@keyframes fbHintBlink{0%,100%{opacity:0.25}50%{opacity:0.95}}'
                   + '@keyframes fbKenBurns{0%{transform:scale(1.0)}100%{transform:scale(1.06)}}';
    document.head.appendChild(st);
  }

  document.body.appendChild(ov);
  requestAnimationFrame(function() { ov.style.opacity = '1'; });

  var idx = 0;
  var transitioning = false;
  var canAdvanceAt = 0;
  var MIN_HOLD_MS = 1800;

  // 2026-04-25: ユーザー指示「前のテキストがフェードアウトした後に次のテキストが出るように」
  //   caption transition を 0.9s に延長 + フェードアウト待機を 950ms に延長して、
  //   前キャプション完全消失 → 新キャプション表示 の順序を物理的に保証。
  function showNext() {
    if (transitioning) return;
    if (Date.now() < canAdvanceAt) return; // 早すぎるタップを無視
    transitioning = true;

    if (idx >= beats.length) {
      ov.style.opacity = '0';
      setTimeout(function() {
        try { if (ov.parentNode) ov.remove(); } catch (e) {}
        if (onDone) onDone();
      }, 1000);
      return;
    }

    var isFirst = (idx === 0);
    // 初回は前のキャプション/画像が無いので待ち時間をスキップ。
    var FADE_OUT_MS = isFirst ? 0 : 950;

    // 現在の絵+キャプションをフェードアウト (caption transition 0.9s 完了を待つ)
    imgEl.style.opacity = '0';
    captionEl.style.opacity = '0';
    hint.style.opacity = '0';

    setTimeout(function() {
      var beat = beats[idx];
      var src = (typeof beat === 'string') ? beat : beat.src;
      var cap = (typeof beat === 'string') ? '' : (beat.caption || '');
      imgEl.src = src;
      // 前キャプションが完全に消えてから textContent 更新 (残像テキストを防止)
      captionEl.textContent = cap;
      // Ken Burns ズームを再起動するために animation を一旦リセット
      imgEl.style.animation = 'none';
      void imgEl.offsetWidth;
      imgEl.style.animation = 'fbKenBurns 6.5s ease-out forwards';

      requestAnimationFrame(function() {
        imgEl.style.opacity = '1';
        // キャプションは画像表示の少し後に出す
        setTimeout(function() { captionEl.style.opacity = '1'; }, 700);
        // ヒントは MIN_HOLD_MS 経過後に光らせる
        setTimeout(function() { hint.style.opacity = '0.85'; }, MIN_HOLD_MS);
      });
      idx++;
      canAdvanceAt = Date.now() + MIN_HOLD_MS;
      transitioning = false;
    }, FADE_OUT_MS);
  }

  ov.addEventListener('click', showNext);
  ov.addEventListener('touchend', function(e) { e.preventDefault(); showNext(); }, { passive: false });

  showNext(); // 1 枚目を即表示
}

// v274: クライマックス専用のイベント絵オーバーレイ (全画面 1 枚絵 + タップで進む)。
// _showMemoryFlashback と似るが sepia を外し、現在進行中ビートの劇的な静止画として使う。
// 01b=ヒノカが呪縛カゲロウに手を伸ばす / 02=半浄化遷移 / 03=完全浄化の和解。
// v275: opts.kenBurns:true で表示中ゆっくりズームイン (ボス登場の余韻演出に使う)。
// v277b (2026-04-25): ユーザー指示「フル画面 + 山道は下から上に縦パン」対応:
//   - opts.cover:true   → object-fit:cover で画面いっぱい (max-width/height 制約解除)
//   - opts.pan:'up'     → 下から上へゆっくり縦パン (10秒、translateY 8% → -8%)
//   pan 中は kenBurns scale を適用しない (transform 競合を避ける)。
function _showClimaxEventImage(src, onDone, opts) {
  opts = opts || {};
  var ov = document.createElement('div');
  ov.className = 'climax-event-overlay';
  ov.style.cssText = 'position:fixed;inset:0;z-index:1805;background:radial-gradient(ellipse at center,rgba(20,8,24,0.92) 0%,rgba(4,2,6,0.97) 100%);display:flex;align-items:center;justify-content:center;overflow:hidden;opacity:0;transition:opacity 0.55s ease;cursor:pointer;';
  var img = document.createElement('img');
  img.src = src;
  if (opts.cover && opts.pan === 'up') {
    // 縦パン用: 高さ 116vh + 初期 translateY -8% (画像を上にずらす = 画像の「下」が見える)
    // 終了は +8% (画像を下にずらす = 画像の「上」が見える) → 結果としてカメラが上にチルト
    img.style.cssText = 'position:absolute;left:50%;top:50%;width:100vw;height:116vh;object-fit:cover;object-position:center;filter:drop-shadow(0 0 40px rgba(255,140,80,0.35));opacity:0;transform:translate(-50%,calc(-50% + -8%)) scale(1);transition:opacity 0.7s ease;border-radius:0;';
  } else if (opts.cover) {
    // 純粋な cover (パンなし): height 100vh の標準的な full-screen 画像。
    // kenBurns 時は scale だけアニメ、translate は固定で「斜めパン」感が出ないように。
    img.style.cssText = 'position:absolute;left:50%;top:50%;width:100vw;height:100vh;object-fit:cover;object-position:center;filter:drop-shadow(0 0 40px rgba(255,140,80,0.35));opacity:0;transform:translate(-50%,-50%) scale(1);transition:opacity 0.7s ease;border-radius:0;';
  } else {
    img.style.cssText = 'max-width:94vw;max-height:82vh;object-fit:contain;filter:drop-shadow(0 0 40px rgba(255,140,80,0.45));opacity:0;transform:scale(0.96);transition:opacity 0.55s ease,transform 0.7s cubic-bezier(.2,1.2,.4,1);border-radius:6px;';
  }
  ov.appendChild(img);
  // v277c: ナレーションテロップ (opts.caption) — 画面下部に半透明バー + 白文字 1〜2 行
  //        山道 / カゲロウ登場のフル画面カットで物語の地の文を字幕表示する用途。
  var captionEl = null;
  if (opts.caption) {
    captionEl = document.createElement('div');
    captionEl.className = 'climax-caption';
    captionEl.style.cssText = 'position:absolute;left:50%;bottom:78px;transform:translateX(-50%);width:min(90vw,700px);box-sizing:border-box;padding:14px 22px;background:linear-gradient(180deg,rgba(0,0,0,0.55) 0%,rgba(0,0,0,0.78) 100%);border:1.5px solid rgba(255,220,140,0.35);border-radius:10px;color:#FFEFC6;font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:clamp(0.95rem,3.4vw,1.2rem);font-weight:900;line-height:1.7;letter-spacing:0.06em;text-align:center;text-shadow:0 0 8px rgba(0,0,0,0.85),0 2px 4px #000;white-space:pre-line;opacity:0;transition:opacity 0.8s ease 0.3s;z-index:2;';
    captionEl.textContent = opts.caption;
    ov.appendChild(captionEl);
  }
  var hint = document.createElement('div');
  hint.style.cssText = 'position:absolute;bottom:22px;left:50%;transform:translateX(-50%);color:#FFE27A;font-size:0.95rem;font-weight:700;opacity:0.8;letter-spacing:0.08em;text-shadow:0 0 6px rgba(0,0,0,0.8);animation:fbHintBlink 1.4s ease-in-out infinite;z-index:2;';
  hint.textContent = '▼ タップ';
  ov.appendChild(hint);
  if (!document.getElementById('memoryFlashbackKF')) {
    var st = document.createElement('style');
    st.id = 'memoryFlashbackKF';
    st.textContent = '@keyframes fbHintBlink{0%,100%{opacity:0.3}50%{opacity:0.95}}';
    document.head.appendChild(st);
  }
  document.body.appendChild(ov);
  requestAnimationFrame(function() {
    ov.style.opacity = '1';
    // ナレーションテロップは画像表示の少し後にフェードイン
    if (captionEl) {
      setTimeout(function() { captionEl.style.opacity = '1'; }, 600);
    }
    setTimeout(function() {
      img.style.opacity = '1';
      if (opts.cover && opts.pan === 'up') {
        // 縦パン: 初期 -8% (画像上ずらし=下半分見える=足元) → 終了 +8% (画像下ずらし=上半分見える=山頂)
        // 結果: カメラが下から上にチルトする見上げパン (10s)
        img.style.transition = 'opacity 0.7s ease, transform 10s linear';
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            img.style.transform = 'translate(-50%, calc(-50% + 8%)) scale(1)';
          });
        });
      } else if (opts.cover) {
        // cover かつ pan 無し: 純粋なセンターズーム (translate は -50%/-50% 固定)
        if (opts.kenBurns) {
          img.style.transition = 'opacity 0.7s ease, transform 8s ease-out';
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              img.style.transform = 'translate(-50%,-50%) scale(1.08)';
            });
          });
        }
      } else {
        img.style.transform = 'scale(1)';
        if (opts.kenBurns) {
          // 表示後さらにゆっくりズームイン (8秒で 1.0 → 1.12) — 登場の余韻
          img.style.transition = 'opacity 0.55s ease, transform 8s ease-out';
          requestAnimationFrame(function() {
            requestAnimationFrame(function() { img.style.transform = 'scale(1.12)'; });
          });
        }
      }
    }, 120);
  });
  var closed = false;
  function close() {
    if (closed) return;
    closed = true;
    ov.style.opacity = '0';
    setTimeout(function() {
      try { if (ov.parentNode) ov.remove(); } catch (e) {}
      if (onDone) onDone();
    }, 550);
  }
  ov.addEventListener('click', close);
  ov.addEventListener('touchend', function(e) { e.preventDefault(); close(); }, { passive: false });
}

// わ行専用 cameo: ヒノカが前に出て「かざんのうた」を思い出させる narrative
// v270: 前半ダイアログ → メモリフラッシュバック (4 枚) → 後半ダイアログ
// v271: クライマックス追加 — 一瞬の覚醒 → ノクス (ザガンの手下 / 仮面の魔人) が妨害 →
//       カゲロウ再呪縛 → ヒノカ倒れる → 星の印発動 → 最後の文字 (ん) finisher
// v272: エンカウント時にヒノカ認識が済んでいるので、Phase A (認識セリフ) を削除。
//       歌で思い出させる試み = 戦いを止めるための第二の試み、という位置づけに整理。
function _playWaRowEpisode(onDone) {
  var HINOKA_R = '../assets/images/characters/pixies/Hinoka/hinoka_001.png';
  // ヒノカ単独で訴えるシーン → 右バストアップ
  try { _showBustup('right', HINOKA_R, { flip: true, alt: 'ヒノカ' }); } catch (e) {}
  _showBattleDialog([
    { lines: ['ヒノカ「ゆうしゃさま、 もう いちど…！', 'カゲロウ を とりもどせる', 'はず なの…！'] }
  ], function() {
    // メモリフラッシュバック中はバストアップを引っ込めて画面を回想に集中
    try { _hideBustups(); } catch (e) {}
    _showMemoryFlashback(VOLCANO_MEMORY_BEATS, function() {
      // v274: battle_last_01 (ヒノカが呪縛カゲロウに手を伸ばす) を 1 枚絵で挟んでから訴えのセリフへ
      _showClimaxEventImage('../assets/images/characters/kagerou/battle_last_01.jpg', function() {
        // 訴えのセリフ。ヒノカ右バストアップに戻して語らせる。
        try { _showBustup('right', HINOKA_R, { flip: true, alt: 'ヒノカ' }); } catch (e) {}
        _showBattleDialog([
          { lines: ['ヒノカ「カゲロウ！', 'わたし の こえ が、', 'きこえる でしょう？'] },
          { lines: ['ヒノカ「むかし、 いっしょ に うたった', '「かざんの うた」を、', 'おもいだして！'] }
        ], function() {
          try { _hideBustups(); } catch (e) {}
          _playKagerouClimax(onDone);
        });
      });
    });
  });
}

// v271: カゲロウ最終バトルのクライマックス interlude。
// ヒノカの歌でカゲロウが一瞬覚醒 → 影から ザガンの手下 ノクス (S4a の 仮面の魔人) が現れて妨害 →
// カゲロウ再呪縛 → ヒノカが攻撃を受けて倒れる → ヒノカの遺志「最後の文字を届けて」 →
// 勇者の 星の印 発動 (預言の力) → 最後の「ん」 quiz へ。
// v277 (2026-04-25): 2 ヶ所に Chant Ritual (儀式) を挿入 — ユーザー指示。
//   - Ritual 1: Beat 1 直後「かざん」(火山) — ヒノカが歌を促し、勇者がなぞる
//   - Ritual 2: Beat 5 直後「かげろう」(真名) — 星の印の力で真名を呼びかける
//   どちらも特別 UI (_showChantRitual)。完了後に物語が次のビートへ進む。
function _playKagerouClimax(onDone) {
  var HINOKA_R = '../assets/images/characters/pixies/Hinoka/hinoka_001.png';
  var SERINA_R = '../assets/images/characters/pixies/Serina/serina_001.png';
  // 2026-04-25: ユーザー指示「真正面ではなく、斜めを向いている素材を使ってください」
  //             → front_still (真正面) → atk_1 (3/4 斜め、咆哮) へ変更。
  //             bustup 側は object-fit:cover + object-position:top で頭〜胸だけクロップされる。
  var KAGEROU_BUST = '../assets/images/monsters/chars/Kagerou/kagerou_atk_1.png';

  // ◆ Beat 0 (v277d 新設): セリナの氷が効かない → ヒノカの「正義の炎」だけ通る、の演出。
  //    「闇の炎には氷では効かない、ヒノカの炎だけが届く」を 5 歳児にもわかる形で説明する。
  try { _showBustup('right', SERINA_R, { flip: true, alt: 'セリナ' }); } catch (e) {}
  _showBattleDialog([
    { lines: ['セリナ「わたしの こおり、', 'やって みる わ…！', ''] }
  ], function() {
    // 氷攻撃 → 効かない演出: 敵に短い氷ヒット class を当てて青光フラッシュ → 何も起きずに消える
    try {
      var _enemyIce = document.getElementById('battleEnemy');
      if (_enemyIce) { _enemyIce.classList.add('ice-noeffect'); setTimeout(function(){ _enemyIce.classList.remove('ice-noeffect'); }, 700); }
    } catch (e) {}
    setTimeout(function() {
      _showBattleDialog([
        { lines: ['セリナ「ど…どうして…！？', 'カゲロウ は ほのお タイプ なのに、', 'わたしの こおり が… とけ ちゃう！'] }
      ], function() {
        try { _hideBustups(); } catch (e) {}
        try { _showBustup('right', HINOKA_R, { flip: true, alt: 'ヒノカ' }); } catch (e) {}
        _showBattleDialog([
          { lines: ['ヒノカ「あの ほのお は、', 'ザガン が しこんだ', 'やみ の のろい なの…！'] },
          { lines: ['ヒノカ「ふつう の まほう では、', 'のろい に とどか ない…', 'わたしの ほのお で やる わ！'], opts: { line3Class: 'dmg-line' } },
          { lines: ['ヒノカ「ごめんね、', 'カゲロウ…！', ''] }
        ], function() {
          // 炎攻撃 → 通る演出: enemy にダメージ flash + ステージシェイク
          try {
            var _enemy = document.getElementById('battleEnemy');
            if (_enemy) { _enemy.classList.add('damaged'); setTimeout(function(){ _enemy.classList.remove('damaged'); }, 700); }
            var _st = document.querySelector('.battle-stage');
            if (_st) { _st.classList.add('screen-heavy-shake'); setTimeout(function(){ _st.classList.remove('screen-heavy-shake'); }, 700); }
          } catch (e) {}
          setTimeout(function() {
            _showBattleDialog([
              { lines: ['セリナ「すごい…！', 'カゲロウ が ひるんだ わ！', ''] },
              { lines: ['ヒノカ「みんな、', 'ちから を あわせよう！', ''], opts: { line3Class: 'dmg-line' } }
            ], function() {
              try { _hideBustups(); } catch (e) {}
              _playKagerouClimaxMain(onDone);
            });
          }, 700);
        });
      });
    }, 700);
  });
}

// 既存のクライマックス本体 (Beat 1〜5)。Beat 0 (魔法相性デモ) と分離して可読性を保つ。
function _playKagerouClimaxMain(onDone) {
  var HINOKA_R = '../assets/images/characters/pixies/Hinoka/hinoka_001.png';
  var KAGEROU_BUST = '../assets/images/monsters/chars/Kagerou/kagerou_atk_1.png';

  // Beat 1: カゲロウが一瞬昔を思い出す。カゲロウ単独右バストアップ + idle 上 stage 効果。
  try { _pulseKagerouAwaken(); } catch (e) {}
  try { _showBustup('right', KAGEROU_BUST, { flip: false, alt: 'カゲロウ' }); } catch (e) {}
  _showBattleDialog([
    { lines: ['カゲロウ「…ほのお…？', 'なつかしい、', 'ひびき…'] }
  ], function() {
    try { _hideBustups(); } catch (e) {}
    // ◆ Ritual 1 へ繋ぐ: ヒノカが歌を促す → 勇者が「かざん」をなぞる → 思い出しかけ
    try { _showBustup('right', HINOKA_R, { flip: true, alt: 'ヒノカ' }); } catch (e) {}
    _showBattleDialog([
      { lines: ['ヒノカ「ゆうしゃさま！', 'いっしょ に、', '『かざんの うた』を…！'] }
    ], function() {

      _showChantRitual({

// ===== v277: Chant Ritual (儀式) — カゲロウ最終バトル専用 =====
// 2026-04-25: ユーザー指示「わ・を・ん 以外の文字入力ステップを 2 ヶ所、特別 UI で」
//   - Ritual 1: Beat 1 直後「かざん」(火山) — ヒノカに促されて勇者が歌の一節をなぞる
//   - Ritual 2: Beat 5 直後「かげろう」(真名) — 星の印で得た力で真名を呼びかける
// 通常のなぞり quiz とは別の overlay。物語のピーク演出として機能する。
// AnimCJK / hanzi-writer-data CDN は既存ローダ (8924, 12429 行目付近) と同じ構造で取得。
//
// _showChantRitual(opts, onDone):
//   opts = { chars: ['か','ざ','ん'], theme: 'awakening'|'starmark',
//            heading: string, subtext: string, voicePrompt?: string,
//            shoutout?: string  // Ritual 2 で「カゲロウ！」を画面中央にビッグ表示する文字列
//          }
function _showChantRitual(opts, onDone) {
  opts = opts || {};
  var chars = opts.chars || [];
  var theme = opts.theme === 'starmark' ? 'starmark' : 'awakening';
  if (!chars.length || typeof HanziWriter === 'undefined') {
    if (onDone) onDone();
    return;
  }

  // overlay 構築
  var ov = document.createElement('div');
  ov.className = 'chant-ritual-overlay theme-' + theme;
  ov.setAttribute('role', 'dialog');
  ov.setAttribute('aria-label', opts.heading || 'なぞって');

  var heading = document.createElement('div');
  heading.className = 'chant-ritual-heading';
  heading.textContent = opts.heading || '';
  ov.appendChild(heading);

  if (opts.subtext) {
    var sub = document.createElement('div');
    sub.className = 'chant-ritual-subtext';
    sub.textContent = opts.subtext;
    ov.appendChild(sub);
  }

  var canvasWrap = document.createElement('div');
  canvasWrap.className = 'chant-ritual-canvas-wrap';
  var canvasInner = document.createElement('div'); // hanzi-writer ターゲット
  canvasWrap.appendChild(canvasInner);
  ov.appendChild(canvasWrap);

  // 進捗ドット
  var progress = document.createElement('div');
  progress.className = 'chant-ritual-progress';
  var progressItems = [];
  chars.forEach(function(c, i) {
    var item = document.createElement('div');
    item.className = 'chant-ritual-progress-item' + (i === 0 ? ' current' : '');
    var label = document.createElement('span');
    label.textContent = c;
    var dot = document.createElement('div');
    dot.className = 'dot';
    item.appendChild(label);
    item.appendChild(dot);
    progress.appendChild(item);
    progressItems.push(item);
  });
  ov.appendChild(progress);

  var hint = document.createElement('div');
  hint.className = 'chant-ritual-tap-hint';
  hint.textContent = '▼ ゆびで なぞって';
  ov.appendChild(hint);

  document.body.appendChild(ov);
  // overlay 表示中はバトル背景音を 30% に下げる (BGM 操作 API 経由)
  var prevVol = null;
  try {
    if (typeof _setBgmVolumeMultiplier === 'function') {
      prevVol = _setBgmVolumeMultiplier(0.3);
    }
  } catch (e) {}

  requestAnimationFrame(function() { ov.classList.add('visible'); });

  // テーマカラー
  var themeColors = (theme === 'starmark')
    ? { stroke: '#FFE27A', outline: 'rgba(255,225,120,0.32)', drawing: '#FFEFB0', highlight: '#FFD86A' }
    : { stroke: '#FFC36A', outline: 'rgba(255,180,90,0.32)',  drawing: '#FFE0B0', highlight: '#FFAA40' };

  var idx = 0;
  function showCharStep() {
    if (idx >= chars.length) { allDone(); return; }
    // 進捗ドット更新
    progressItems.forEach(function(it, i) {
      it.classList.remove('current');
      if (i < idx) it.classList.add('done');
      if (i === idx) it.classList.add('current');
    });
    // canvas を都度作り直す
    canvasInner.innerHTML = '';
    _runChantQuizForChar(chars[idx], canvasInner, canvasWrap, themeColors, function() {
      // 完了グロウ
      canvasWrap.classList.remove('glow');
      void canvasWrap.offsetWidth;
      canvasWrap.classList.add('glow');
      // 進捗ドット点灯
      progressItems[idx].classList.remove('current');
      progressItems[idx].classList.add('done');
      idx++;
      // 0.7s 後に次の文字 (or 完了)
      setTimeout(showCharStep, 700);
    });
  }

  function allDone() {
    ov.classList.add('complete');
    // ritual 2 の場合 shoutout を中央に
    if (opts.shoutout) {
      var s = document.createElement('div');
      s.className = 'chant-ritual-shoutout';
      s.textContent = opts.shoutout;
      ov.appendChild(s);
      requestAnimationFrame(function() { s.classList.add('show'); });
    }
    // 完了 SE (Web Audio で即席チャイム)
    try {
      withAudio(function(ac) {
        var now = ac.currentTime;
        [523, 659, 784, 1047].forEach(function(f, i) {
          var o = ac.createOscillator(), g = ac.createGain();
          o.type = 'sine';
          o.frequency.value = f;
          g.gain.setValueAtTime(0.001, now + i * 0.08);
          g.gain.exponentialRampToValueAtTime(0.18, now + i * 0.08 + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.6);
          o.connect(g); g.connect(ac.destination);
          o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.65);
        });
      });
    } catch (e) {}
    var holdMs = opts.shoutout ? 1500 : 900;
    setTimeout(function() {
      ov.classList.remove('visible');
      setTimeout(function() {
        try { if (ov.parentNode) ov.remove(); } catch (e) {}
        try {
          if (prevVol != null && typeof _setBgmVolumeMultiplier === 'function') {
            _setBgmVolumeMultiplier(prevVol);
          }
        } catch (e) {}
        if (onDone) onDone();
      }, 700);
    }, holdMs);
  }

  // 起動 — 1 文字目を即表示
  // (overlay フェードイン 0.7s と並行して writer 初期化が走るが、quiz は writer 内部で
  //  charDataLoader 完了を待つので問題なし)
  showCharStep();
}

// 1 文字分の hanzi-writer + writer.quiz を起動。完了時 onComplete()。
// AnimCJK / kana-json / hanzi-writer-data CDN を順にフォールバック (既存ローダと同じ構造)。
function _runChantQuizForChar(char, target, glowEl, themeColors, onComplete) {
  if (typeof HanziWriter === 'undefined') {
    if (onComplete) onComplete();
    return;
  }
  var rect = target.getBoundingClientRect();
  var size = Math.min(rect.width, rect.height) || 240;
  var writer;
  try {
    writer = HanziWriter.create(target, char, {
      width: size,
      height: size,
      padding: 8,
      strokeColor: themeColors.stroke,
      outlineColor: themeColors.outline,

// v277: カゲロウの呪縛仮面が割れる演出 (Ritual 2 完了直後)。
//   1.0s の白フラッシュ + 微振動 + (可能なら) imgFrontIdle (浄化前の覚醒姿) に swap。
//   旧 curse-mask SVG は v274 で撤去済みなので、純粋に img filter + class アニメで表現。
function _crackKagerouMask(onDone) {
  var enemyEl = document.getElementById('battleEnemy');
  if (enemyEl) {
    enemyEl.classList.remove('kagerou-mask-crack');
    void enemyEl.offsetWidth;
    enemyEl.classList.add('kagerou-mask-crack');
  }
  // 仮面が割れる SE (Web Audio: 短いノイズバースト)
  try {
    withAudio(function(ac) {
      var now = ac.currentTime;
      var bufLen = ac.sampleRate * 0.3;
      var buf = ac.createBuffer(1, bufLen, ac.sampleRate);
      var ch = buf.getChannelData(0);
      for (var i = 0; i < bufLen; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 2);
      var src = ac.createBufferSource();
      src.buffer = buf;
      var g = ac.createGain();
      g.gain.value = 0.18;
      src.connect(g); g.connect(ac.destination);
      src.start(now);
    });
  } catch (e) {}
  setTimeout(function() {
    if (enemyEl) enemyEl.classList.remove('kagerou-mask-crack');
    if (onDone) onDone();
  }, 1100);
}

// v275: ADV ゲーム風バストアップ会話システム。
//   _showBustup(side, src, opts)  — side='left'|'right', opts={flip:bool}
//   _hideBustups()                — 全クリア + overlay フェードアウト
//   ヒノカ単独 = right + flip:true (左を向く), カゲロウ + ヒノカ = 左ヒノカ no-flip, 右カゲロウ no-flip
// 2026-04-25: ユーザー指示「ぼかすのはバトル画面内だけにして」→ portrait を battle-stage
//   内に直接 append するよう修正 (旧: body 直下 → フルスクリーンに飛び出してしまい
//   ダイアログ文字まで含めてぼかされる問題があった)。bustup-active class は battle-stage
//   に付ける。battleStage が取得できない場合は body へ fallback (セーフティ)。
function _showBustup(side, src, opts) {
  opts = opts || {};
  var stage = document.getElementById('battleStage');
  var host = stage || document.body;
  if (stage) { stage.classList.add('bustup-active'); }
  // portrait は battle-stage 内に直接 append (ラッパ overlay を作らない)。
  // 同じ side の portrait は差し替えのみ (重複生成を避ける)。
  var sel = '.bustup-portrait.' + side;
  var portrait = host.querySelector(':scope > ' + sel);
  if (!portrait) {
    portrait = document.createElement('img');
    portrait.className = 'bustup-portrait ' + side;
    portrait.alt = opts.alt || '';
    host.appendChild(portrait);
  }
  portrait.style.setProperty('--flip', opts.flip ? '-1' : '1');
  if (!portrait.src || portrait.src.indexOf(src.replace(/^\.\.\//, '')) === -1) {
    portrait.src = src;
  }
  // portrait フェードイン
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { portrait.classList.add('visible'); });
  });
  return portrait;
}
function _hideBustups() {
  var stage = document.getElementById('battleStage');
  var host = stage || document.body;
  var portraits = host.querySelectorAll(':scope > .bustup-portrait');
  if (!portraits.length && stage) { stage.classList.remove('bustup-active'); return; }
  portraits.forEach(function(p) { p.classList.remove('visible'); });
  if (stage) { stage.classList.remove('bustup-active'); }
  setTimeout(function() {
    host.querySelectorAll(':scope > .bustup-portrait').forEach(function(p) {
      try { p.remove(); } catch (e) {}
    });
  }, 650);
}

      document.body.appendChild(startOv);
      setTimeout(function() { if (startOv && startOv.parentNode) startOv.remove(); },
                 typeof durationMs === 'number' ? durationMs : 1400);
      return startOv;
    };

    const showNazoriStartThenQuiz = function() {
      // 非バトル: フロートオーバーレイ + 2200ms 自動進行
      showStartOverlay(2200);
      setTimeout(function() {
        if (!_rowPracticeActive) return;
        _rowPracticePhase = 'quiz_guided';
        _hedgeBubble.textContent = 'かいてみよう！';
        _ponoBubble.textContent = 'かいてみよう！';
        setQuizActive(true);
        _startQuizOpts();
      }, 2200);
    };

    const startQuizBattle = function() {
      if (!_rowPracticeActive) return;
      _rowPracticePhase = 'quiz_guided';
      _hedgeBubble.textContent = 'かいてみよう！';
      _ponoBubble.textContent = 'かいてみよう！';
      setQuizActive(true);
      _startQuizOpts();
    };

    if (_battle.active) {
      // バトル: おてほん → demo → なぞり案内 (タップ送り) → ★ タップ後に START overlay → quiz
      // (2026-04-21 ユーザー要望: overlay はタップする前ではなく、ダイアログを
      //  タップで送った直後 = 実際になぞり始めるタイミングで出す)
      _showBattleDialog([
        { lines: ['おてほんを', 'みせるよ。', 'おぼえてね！'] }
      ], function() {
        runDemo(function() {
          _showBattleDialog([
            { lines: ['なぞり スタート！', 'ゆびで なぞって', 'かんせいさせよう'], opts: { line1Class: 'dmg-line' } }
          ], function() {
            // ダイアログをタップで閉じた直後 (quiz 開始の瞬間) にオーバーレイを出す
            showStartOverlay(1400);
            startQuizBattle();
          });
        });
      });
      return;
    }

    // 非バトル: 従来フロー (メッセージは auto)
    runDemo(function() {
      showNazoriStartThenQuiz();
    });

    // _startQuizOpts: 実際に writer.quiz() を呼び出す。呼び元で _rowPracticePhase と
    // setQuizActive(true) は設定済みの前提。
    function _startQuizOpts() {
      var _qOpts = {
        onCorrectStroke: function() {
          _hideMonsterBubble();
          try { playNazoriSound(); } catch (e) {}
          try { flashLastStroke(); } catch (e) {}
        },
        onMistake: function() { _perfectCurrentChar = false; _hideMonsterBubble(); },
        onComplete: function() {
          setQuizActive(false);
          if (!_rowPracticeActive) return;
          playSuccessSound();
          const _inBattle = !!(_battle && _battle.active);
          const _inPuzzle = !!(_puzzle && _puzzle.active);
          // 謎解き行: 板出現演出と競合するので紙吹雪/封印解除はスキップ (5枚目だけファンファーレ)
          if (!_inBattle && !_inPuzzle) launchConfetti();
          saveStamp(currentCategory, currentCharIndex);
          markCharDone(currentCharIndex);
          if (!_inBattle && !_inPuzzle) _playMonsterPop();
          _awardAcorns(_perfectCurrentChar);
          if (window.incrementStat) {
            window.incrementStat('writing_chars', 1);
            if (currentCategory === 'hiragana') window.incrementStat('writing_hiragana', 1);
            if (currentCategory === 'katakana') window.incrementStat('writing_katakana', 1);
          }
          const isFinisher = _rowPracticeRow && (_rowPracticeStep === (_rowPracticeRow.count - 1));
          const startWordPhases = function() {
            _rowPracticePhase = 'show_word';
            const data = WORD_DATA[currentCategory][currentCharIndex];
            const char = CATEGORIES[currentCategory].chars[currentCharIndex];
            if (data && data.word) {
              _showRowPracticeWord(char, data, function() {
                _rowPracticePhase = 'quiz_free';
                _hedgeBubble.textContent = 'ことばで かこう！';
                _ponoBubble.textContent = 'ことばで かこう！';
                _startWordContextPhase(char, data, function() {
                  _rowPracticeStep++;
                  _rowPracticeNextChar();
                });
              });
            } else {
              setTimeout(function() {
                _rowPracticeStep++;
                _rowPracticeNextChar();
              }, 1200);
            }
          };
          // 謎解き行 (か/カ 等): 板を1枚出して次へ。5枚目はフィニッシャーでお祝い。
          if (_puzzle.active) {
            try { _puzzleRevealPlank({ finisher: isFinisher }); } catch (e) {}
            // な行 (riddle): ほこらの封印解除。文字をなぞると石板1枚が空から降ってきて
            // 五芒星スロットにはまる (.placed 時に shrineTileDrop アニメ)。5枚揃うと
            // 背景が shrine_seal_full に切替 → 扉開く動画 → 牢屋の妖精解放シーン。
            if (_puzzle.kind === 'riddle') {
              var _riddleAdvance = function() {
                _puzzle.step++;
                _rowPracticeStep++;
                _rowPracticeNextChar();
              };
              if (isFinisher) {
                // 5枚目がはまった: 順次グロー (1s 内に 0.72s stagger + 0.3s 余韻) →
                // 中央閃光 → 扉開く動画 → 牢屋シーン → 妖精解放。
                var rdStage = _puzzleEls().stage;
                setTimeout(function() {
                  if (rdStage) {
                    rdStage.classList.add('complete');
                    var burst = document.createElement('div');
                    burst.className = 'pedestal-burst';
                    rdStage.appendChild(burst);
                  }
                  try { playVictoryFanfare(); } catch (e) {}
                }, 600);
                // 順次グロー (0.72s stagger + 1s anim ≈ 1.7s) 後に扉動画を開始
                setTimeout(function() {
                  try {
                    _playShrineDoorVideo(function() {
                      // 扉の向こう: 牢屋に囚われた妖精を解放するシーン
                      _showFairyCageScene('shrine', function() {
                        _rescueFairy('shrine', _riddleAdvance);
                      });
                    });
                  } catch (e) { _rescueFairy('shrine', _riddleAdvance); }
                }, 2400);
              } else {
                // 石板がはまり切るアニメ (0.85s) を待ってから次の文字へ
                setTimeout(function() { _riddleAdvance(); }, 900);
              }
              return;
            }
            // ら行 (lava_step): 文字をなぞる=呪文発動で飛び石が 1 個、画面下から浮上してくる。
            // (2026-04-22 リファクタ) 背景 swap は廃止し、浮上した石を最終位置にそのまま残す。
            // 途中で画面が黒く抜けて最終位置にワープする問題をシームレス化。
            if (_puzzle.kind === 'lava_step') {
              var _lvStage = _puzzleEls().stage;
              var _nextStep = _puzzle.step + 1; // 1..5
              // 石の X 位置 (lava_steps_5.png の baked-in 位置に合わせる)
              var STONE_X = [26, 38, 50, 62, 74]; // % (2026-04-22 v5: 両端が崖にくっつく指摘 → spacing 12%)
              var _stoneX = STONE_X[_nextStep - 1];
              // 1文字目を書いた瞬間、封印を破って「こおりのようせい」を登場させる。
              // なぜ溶岩に石が浮くのか? → 妖精が氷魔法で熔岩を固めて足場にする、という物語的動機付け。
              // 2文字目以降は妖精演出をスキップして通常の浮上演出のみ。
              // (2026-04-22 v8: 炎→氷に入れ替え。熔岩で"あつい"と言うのは炎妖精では違和感があるため。)
              var _lvRunRise = function() {
              // (2026-04-22 v5 / 2026-04-24 炎妖精に戻す) 溶岩の救出妖精を常駐スプライトとして生成。
                // 救出済なら一度だけ生成し、右端 (88%,24%) にフェードイン。
                var _lvFairy = _lvStage ? _lvStage.querySelector('.lava-fairy') : null;
                if (_lvStage && !_lvFairy && _puzzle.fairyFreed) {
                  _lvFairy = document.createElement('div');
                  _lvFairy.className = 'lava-fairy';
                  var _lvFairyImg = document.createElement('img');
                  var _lvFairyMeta = (typeof FAIRY_META !== 'undefined' && FAIRY_META.fire) ? FAIRY_META.fire : null;
                  _lvFairyImg.src = (_lvFairyMeta && _lvFairyMeta.img) || '../assets/images/characters/pixies/pixy_fire.png';
                  _lvFairyImg.alt = (_lvFairyMeta && _lvFairyMeta.name) || 'ほのおの ようせい';
                  _lvFairyImg.onerror = function() {
                    _lvFairy.innerHTML = '';
                    _lvFairy.textContent = (_lvFairyMeta && _lvFairyMeta.emoji) || '🧚‍♂️';
                  };
                  _lvFairy.appendChild(_lvFairyImg);
                  _lvStage.appendChild(_lvFairy);
                  // 右端で一瞬止まって見せてから浮上に入るため、1フレーム後に不透明化。
                  requestAnimationFrame(function() { _lvFairy.style.opacity = '1'; });
                }
                // (2026-04-22 v6) 妖精が「岩場を持ち上げる」ビジュアル:
                //   ① 該当スロットの下 (溶岩付近, top:82%) にダイブ
                //   ② 魔法バースト → 石が溶岩から浮上開始
                //   ③ 妖精も石と一緒に上昇 (top:82% → 24%) して「持ち上げる」絵を作る
                //   ④ 石が定着したら妖精は右端の待機位置へ戻る
                var _lvFlyMs = _lvFairy ? 500 : 0;
                if (_lvFairy) {
                  // ① 低い位置へダイブ
                  setTimeout(function() {
                    _lvFairy.style.transition = 'left 0.5s cubic-bezier(0.4,0,0.25,1), top 0.5s cubic-bezier(0.4,0,0.25,1)';
                    _lvFairy.style.left = _stoneX + '%';
                    _lvFairy.style.top  = '82%';
                  }, 40);
                  // ② 到着したら魔法発動バースト (溶岩付近で光る)
                  setTimeout(function() {
                    if (_lvStage) {
                      var burst = document.createElement('div');
                      burst.className = 'lava-magic-burst';
                      burst.style.left = _stoneX + '%';
                      burst.style.top  = '80%';
                      _lvStage.appendChild(burst);
                      setTimeout(function() { if (burst.parentNode) burst.remove(); }, 950);
                    }
                    try { if (typeof playSE === 'function') playSE('sparkle'); } catch (e) {}
                  }, _lvFlyMs);
                  // ③ 石浮上(2.4s)と同じタイミングで妖精も上昇。両者が一緒に上がって見える。
                  setTimeout(function() {
                    _lvFairy.style.transition = 'left 1.8s cubic-bezier(0.22,0.8,0.35,1), top 1.8s cubic-bezier(0.22,0.8,0.35,1)';
                    _lvFairy.style.top  = '24%'; // 石の直上まで持ち上げ切る
                  }, _lvFlyMs + 150);
                }
              // 妖精到着(500ms)+バースト後に石浮上開始。以前は 400ms だったため妖精より先に石が上がってしまっていた。
              setTimeout(function() {
                if (_lvStage) {
                  // ① 画面下から石が浮上 (stone_N.png ピクセルアート個別画像)
                  var rising = document.createElement('div');
                  rising.className = 'lava-rising-stone rising stone-' + _nextStep;
                  rising.style.left = _stoneX + '%';
                  // top は CSS (.lava-rising-stone) 側で 40% に固定済。JS で上書きしない。
                  _lvStage.appendChild(rising);
                  // ② 定位置到達でピカッ光らせる (石はそのまま定着、bg は swap しない)
                  // アニメ 2.4s の終端に合わせて切替。短いと途中で消えたように見える。
                  setTimeout(function() {
                    rising.classList.remove('rising');
                    rising.classList.add('landed');
                  }, 2400);
                }
                // 妖精を右端の待機位置へ戻す (finisher 以外)。石着地 (浮上開始 +2.4s) 後に移動。
                if (_lvFairy && !isFinisher) {
                  setTimeout(function() {
                    _lvFairy.style.transition = 'left 0.6s ease, top 0.6s ease';
                    _lvFairy.style.left = '88%';
                    _lvFairy.style.top  = '24%';
                  }, 2500);
                }
                if (isFinisher) {
                  // 5 石揃った: 中央閃光 + 妖精お別れ (鍵受け渡しイベント) + 勇者が飛び石を渡る
                  if (_lvStage) {
                    setTimeout(function() {
                      _lvStage.classList.add('complete');
                      var lvBurst = document.createElement('div');
                      lvBurst.className = 'lava-burst';
                      _lvStage.appendChild(lvBurst);
                    }, 2500);
                  }
                  try { setTimeout(function() { playVictoryFanfare(); }, 2500); } catch (e) {}
                  // 勇者の渡り演出は対話中の背景として 3300ms から開始
                  setTimeout(function() {
                    if (_lvStage) {
                      var walker = document.createElement('div');
                      walker.className = 'lava-walker hero-sprite move';
                      _lvStage.appendChild(walker);
                    }
                  }, 3300);
                  // (2026-04-24) 炎の妖精お別れ + 魔王城の鍵受け渡し。
                  //   従来の「いしがそろったわ」1 メッセージから 7 メッセージ + 鍵演出に拡張。
                  //   対話完了まで _rowPracticeNextChar を待機させ (固定 8400ms タイマー廃止)、
                  //   プレイヤーのタップ速度に応じてエンディング紙芝居へ遷移。
                  setTimeout(function() {
                    var advance = function() {
                      _puzzle.step++;
                      _rowPracticeStep++;
                      _rowPracticeNextChar();
                    };
                    if (typeof _fireFairyFarewell === 'function') {
                      _fireFairyFarewell(advance);
                    } else {
                      // フォールバック: 関数未定義時は従来互換の固定タイマー
                      setTimeout(advance, 5800);
                    }
                  }, 2600);
                } else {
                  // 石が完全に着地+フラッシュ終了してから次の文字へ (2.4s + 0.55s + 余韻)
                  setTimeout(function() {
                    _puzzle.step++;
                    _rowPracticeStep++;
                    _rowPracticeNextChar();
                  }, 3100);
                }
              }, 700);
              // (2026-04-22 v6: 妖精到着(500ms)+バースト後に石を出すよう 400→700 に拡大)
              }; // _lvRunRise end
              // 1文字目 (step===0) かつ未救出なら、妖精登場 → 浮上。
              // 2文字目以降はそのまま浮上。
              if (_puzzle.step === 0 && !_puzzle.fairyFreed) {
                _puzzle.fairyFreed = true;
                _rescueFairy('fire', _lvRunRise);
              } else {
                _lvRunRise();
              }
              return;
            }
            // 橋フィニッシャー演出シーケンス (2026-04-22 v2: 勇者渡りは farewell 側に移動):
            //   板消し(0.4s) + 交互点滅(0.8s) + 閃光(1.1s) + 待機(0.4s) ≒ 約 3.1s 後に farewell 開始。
            //   farewell 内で勇者の渡り (2.2s) + マージンを回収する。
            var _puzzleDelay;
            if (isFinisher) {
              _puzzleDelay = (_puzzle.kind === 'bridge') ? 3500 : 3000;
            } else {
              _puzzleDelay = 1500;
            }
            setTimeout(function() {
              // か行 bridge フィニッシャー: 勇者が橋を渡り終えた直後に もりの妖精と別れの会話。
              // intro で既に妖精は登場済みなので、ここは封印破りではなく「お別れ + 次の依頼」。
              // (2026-04-22) 以前は _rescueFairy('water') で封印を壊していたが、妖精は最初から自由 → 整合性修正。
              if (isFinisher && _puzzle.kind === 'bridge') {
                _waterFairyFarewell(function() {
                  _puzzle.step++;
                  _rowPracticeStep++;
                  _rowPracticeNextChar();
                });
                return;
              }
              // 注: ら行 lava フィニッシャーの妖精お別れ + 鍵受け渡しは、
              //     _lvRunRise 内 (isFinisher 分岐) で _fireFairyFarewell を呼ぶ設計に統一済み。
              //     この外側ブロックは lava_step では通らない (_rescueFairy→_lvRunRise→return で抜ける)。
              _puzzle.step++;
              _rowPracticeStep++;
              _rowPracticeNextChar();
            }, _puzzleDelay);
            return;
          }
          if (isFinisher && _battle.active) {
            // 中ボス撃破時の報酬+幕クリアバナー連鎖。
            // (reward ありの敵は _battle.enemy.boss=true、reward='shield'|'armor'|'sword')
            const _bossReward = _battle.enemy && _battle.enemy.reward;
            const _isVolcanoBoss = _battle.enemy && _battle.enemy.id === 'volcano_lord';
            const _afterVictory = function() {
              // v271/v272: わ行 (カゲロウ) は celebration 内で カゲロウ自身が剣を手渡す
              //           → grantGear はセレブ内で呼ぶため、ここ & _chainReward では sword grant を skip。
              //           celebration → ENDING 紙芝居 → 通常 _rowPracticeNextChar の順。
              if (_isVolcanoBoss) {
                _showVolcanoCelebration(function() {
                  _triggerHiraganaEndingIfNeeded(function() {
                    _rowPracticeStep++;
                    _rowPracticeNextChar();
                  });
                });
                return;
              }
              _rowPracticeStep++;
              _rowPracticeNextChar();
            };
            const _chainReward = function() {
              if (!_bossReward) { _afterVictory(); return; }
              // v272: volcano_lord (カゲロウ) は celebration 内で手渡すので、ここでは skip
              if (_isVolcanoBoss) { _afterVictory(); return; }
              // 神器入手モーダル → 幕クリアバナー → 次の行へ
              grantGear(_bossReward, function() {
                let t1 = '', t2 = '';
                if (_bossReward === 'shield') { t1 = 'もりを ぬけた！'; t2 = 'たてを てに いれた'; }
                else if (_bossReward === 'armor')  { t1 = 'どうくつを ぬけた！'; t2 = 'よろいを てに いれた'; }
                else if (_bossReward === 'sword')  { t1 = 'かざんを こえた！';   t2 = 'つるぎを てに いれた。<br>しろへ むかおう！'; }
                _showActClearBanner(t1, t2, _afterVictory);
              });
            };
            try {
              battleVictory('fire', _chainReward);
            } catch (e) {
              _afterVictory();
            }
            return;
          }
          if (_battle.active) {
            try { battleHitEnemy({ finisher: false }); } catch (e) {}
            // 2026-04-21: 子供がログ (「〇〇に ダメージを あたえた！」) を読めるよう、
            // 自動 2200ms → タップ必須に変更。damage log のタイプライタが回り終わる
            // 頃 (~1400ms) に await-tap を有効化 → タップで敵カウンター → さらに
            // そこから表示時間を確保してから次の文字へ進む。
            setTimeout(function() {
              if (!_battle.active) return;
              _awaitTapOnLog(function() {
                if (!_battle.active) return;
                try { enemyCounterAttack(); } catch (e) {}
                // 敵のカウンター〜ダメージ表示を子供が見終えてから次へ。
                // enemyCounterAttack は announce + 攻撃 + 着弾で最大 ~3600ms 使う。
                setTimeout(function() {
                  _rowPracticeStep++;
                  _rowPracticeNextChar();
                }, 3800);
              }, 260);
            }, 1400);
          } else {
            startWordPhases();
          }
        },
        showHintAfterMisses: 3,
        highlightOnComplete: true,
        highlightCompleteColor: currentScheme.stroke
      };
      _lastQuizOpts = _qOpts;
      writer.quiz(_qOpts);
    }
  }, 500);
}

  setTimeout(function() {

    ov.style.cssText = 'position:fixed;inset:0;z-index:1100;background:rgba(93,78,55,0.5);display:flex;align-items:center;justify-content:center;animation:fadeIn 0.25s ease;';
    var card = document.createElement('div');

    card.innerHTML =
      '<div style="font-size:4rem;margin-bottom:8px;">' + data.emoji + '</div>' +
      '<div style="font-size:1.8rem;font-weight:900;color:#5D4E37;margin-bottom:12px;">' +
      '<span style="color:#FF6B9D;opacity:0.5;">' + char + '</span>' + data.word.slice(char.length) +
      '</div>' +
      '<div style="font-size:0.85rem;color:#A89880;margin-bottom:14px;">こんどは ことばの なかで<br>かいてみよう！</div>' +
      '<button style="padding:10px 28px;border:none;border-radius:50px;background:linear-gradient(135deg,#60A5FA,#3B82F6);color:#fff;font-family:inherit;font-size:0.9rem;font-weight:900;cursor:pointer;">かく！</button>';
    ov.appendChild(card);

    card.querySelector('button').addEventListener('click', function() {

      if (onDone) onDone();
