}
.map-collide-flash {
  position: absolute; inset: 0; z-index: 10;
  background: radial-gradient(circle at center, rgba(255,255,255,0.95) 0%, rgba(255,216,106,0.7) 25%, rgba(0,0,0,0) 70%);
  opacity: 0; pointer-events: none;
  animation: mapCollideFlash 0.65s ease-out forwards;
}
@keyframes mapCollideFlash {
  0%   { opacity: 0; transform: scale(0.4); }
  40%  { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(1.6); }
}
@media (prefers-reduced-motion: reduce) {
  .map-actor.map-hero, .map-actor.map-monster { animation: none !important; }
  .map-world { transition: none !important; }
  .map-collide-flash { animation: none !important; }
}

<script>
// ===== Color Schemes =====
// 黒背景で映えるネオン寄りの配色。お手本(outline)は控えめなグレーに統一し、
// なぞり側 (drawing) と stroke アニメを色鮮やかにしてコントラストを出す。
const OUTLINE_GRAY = 'rgba(150,155,170,0.40)';
const COLOR_SCHEMES = [
  { stroke: '#FFFFFF', drawing: '#FFFFFF', highlight: '#FFE27A', outline: OUTLINE_GRAY }, // white
  { stroke: '#7DD3FC', drawing: '#7DD3FC', highlight: '#BAE6FD', outline: OUTLINE_GRAY }, // cyan

// AudioContextをページロード時に即生成（suspendedだが存在はする）
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function getAudioCtx() { return audioCtx; }
function withAudio(fn) {
  const ctx = getAudioCtx();
  if (ctx.state === 'running') { fn(ctx); return; }
  ctx.resume().then(() => fn(ctx)).catch(() => {});
}
// iOS/Android: 最初のタッチでAudioContextを即座にアクティブにする
// resume()は非同期なので、無音オシレータを鳴らして強制的にrunning状態にする
function unlockAudio() {
  const ac = getAudioCtx();
  ac.resume().catch(() => {});
  if (ac.state !== 'running') {
    // 無音オシレータで即アクティブ化
    try {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      gain.gain.value = 0;
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.001);
    } catch(e) {}
  }
}
// capture: true で HanziWriter より先にイベントを受け取る

}

// 直前に描いた 1 画だけを一瞬光らせる。画面全体フラッシュではなく書き取りキャンバス内に留める。
// 1. 最新の <path> (= 直前に描かれたストローク) に .stroke-just-lit を付与 → CSS アニメで
//    drop-shadow を段階強化 → blur(0.3px) で若干エッジをやわらげ加算的にふわっと光らせる。
// 2. canvas-container に screen ブレンドのソフトハローを 1 枚重ねて加算光を演出。
function flashLastStroke() {
  try {
    var target = document.getElementById('writerTarget');
    if (!target) return;
    var svg = target.querySelector('svg');
    if (svg) {
      var paths = svg.querySelectorAll('path');
      if (paths && paths.length) {
        var last = paths[paths.length - 1];
        last.classList.remove('stroke-just-lit');
        // reflow で animation を確実に再始動
        void last.getBoundingClientRect();
        last.classList.add('stroke-just-lit');
        setTimeout(function() { last.classList.remove('stroke-just-lit'); }, 620);
      }
    }
    // ソフトハローを 1 枚だけキャンバス上に乗せる (screen blend + blur)
    var container = target.parentElement; // .canvas-container
    if (container) {
      var halo = document.createElement('div');
      halo.className = 'stroke-soft-halo';
      container.appendChild(halo);
      setTimeout(function() { if (halo.parentNode) halo.remove(); }, 600);
    }
  } catch (e) { /* ignore */ }
}

function pickSpellVideo(kind) {
  // kind 指定 → その属性のプール、未指定 or 未定義属性 → 全体からランダム
  const pool = (kind && SPELL_VIDEOS[kind]) ? SPELL_VIDEOS[kind] : SPELL_ALL;
  return pool[Math.floor(Math.random() * pool.length)];
}

function launchMagicCircle(kind) {
  const src = pickSpellVideo(kind);

  // バトル中は .battle-stage 内に直接 video を差し込み、screen 合成で敵に炎を被せる。
  // (fullscreen overlay の位置/合成問題を回避)
  if (_battle && _battle.active) {
    const stage = document.getElementById('battleStage');
    const enemyWrap = stage ? stage.querySelector('.battle-enemy-wrap') : null;
    if (stage && enemyWrap) {
      // 既存の magic 層があれば除去
      const prev = stage.querySelector('.battle-magic-layer');
      if (prev) prev.remove();
      const layer = document.createElement('div');
      layer.className = 'battle-magic-layer';
      const rect = enemyWrap.getBoundingClientRect();
      const stageRect = stage.getBoundingClientRect();
      const cx = (rect.left + rect.width / 2) - stageRect.left;
      const cy = (rect.top + rect.height / 2) - stageRect.top;
      const size = Math.max(rect.width, rect.height) * 1.6;
      layer.style.left = (cx - size / 2) + 'px';
      layer.style.top  = (cy - size / 2) + 'px';
      layer.style.width  = size + 'px';
      layer.style.height = size + 'px';
      layer.style.inset = 'auto';
      const v = document.createElement('video');
      v.className = 'battle-magic-video';
      v.src = src;
      v.autoplay = true; v.muted = true; v.playsInline = true;
      v.setAttribute('playsinline', ''); v.setAttribute('webkit-playsinline', '');
      v.preload = 'auto';
      layer.appendChild(v);
      stage.appendChild(layer);
      const pp = v.play(); if (pp && pp.catch) pp.catch(() => {});
      setTimeout(() => { if (layer.parentNode) layer.remove(); }, 3300);
      return;
    }
  }

  const c = document.getElementById('magicContainer');
  if (!c) return;
  alignOverlayToCanvas(c);
  c.innerHTML = '';

  // Animated magic circle video (black bg → mix-blend-mode: screen)
  const video = document.createElement('video');
  video.className = 'magic-video';
  video.src = src;
  video.autoplay = true;
  video.muted = true;
  video.playsInline = true;
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');
  video.preload = 'auto';
  c.appendChild(video);
  const p = video.play();
  if (p && p.catch) p.catch(() => {});

  // Central flash
  const flash = document.createElement('div');
  flash.className = 'magic-flash';
  c.appendChild(flash);

  // Particles — radiate out from center
  const N = 32;
  for (let i = 0; i < N; i++) {
    const particle = document.createElement('div');
    particle.className = 'magic-particle';
    const angle = (i / N) * Math.PI * 2 + Math.random() * 0.3;
    const dist = 200 + Math.random() * 240;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    particle.style.setProperty('--dx', dx + 'px');
    particle.style.setProperty('--dy', dy + 'px');
    particle.style.animationDelay = (Math.random() * 0.4) + 's';
    const hue = Math.random() < 0.5
      ? 'radial-gradient(circle, #FFF 0%, #FFE27A 40%, rgba(255,180,80,0) 75%)'
      : 'radial-gradient(circle, #FFF 0%, #C4A1FF 40%, rgba(180,120,255,0) 75%)';
    particle.style.background = hue;
    c.appendChild(particle);
  }

  setTimeout(() => { c.innerHTML = ''; }, 3400);
}

// ===== Magic Projectile =====
// 「手前から奥(敵)へ飛ぶ光球 → 着弾で破裂」する魔法演出。
// mp4 を使わず純 CSS なので軽量 (1 回 ~50KB の DOM 作って捨てるだけ)。
// element: 'fire' | 'ice' | 'thunder' | 'light' | 'heal' | 'wind' | ...
// onImpact: 着弾時に呼ばれる (敵の被ダメ演出と同期したいとき用)
function launchMagicProjectile(element, opts) {
  opts = opts || {};
  const colors = MAGIC_COLORS[element] || MAGIC_COLORS.fire;
  const enemyEl = document.getElementById('battleEnemy');
  if (!enemyEl) {
    if (opts.onImpact) setTimeout(opts.onImpact, 0);
    return;
  }

  // 既存コンテナがあれば再利用、なければ作る
  let container = document.querySelector('.magic-projectile-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'magic-projectile-container';
    document.body.appendChild(container);
  }

  // 敵位置 (viewport 座標)
  const er = enemyEl.getBoundingClientRect();
  const tx = er.left + er.width / 2;
  const ty = er.top  + er.height * 0.55;

  // 起点: 画面中央下 (プレイヤー側 = 手前)
  const sx = window.innerWidth / 2;
  const sy = window.innerHeight * 0.86;

  // finisher フラグ: 光球を約 2 倍に拡大 + 着弾もデカく。
  const finisher = !!opts.finisher;
  const startScale = finisher ? 2.1 : 1.15;
  const endScale   = finisher ? 0.55 : 0.28;

  // 弾本体
  const ball = document.createElement('div');
  ball.className = 'magic-projectile' + (finisher ? ' finisher' : '');
  ball.style.setProperty('--core', colors.core);
  ball.style.setProperty('--aura', colors.aura);
  ball.style.setProperty('--glow', colors.glow);
  // 初期: 起点に大きめ(=手前)
  ball.style.transform = 'translate(' + sx + 'px, ' + sy + 'px) translate(-50%, -50%) scale(' + startScale + ')';

  const trail = document.createElement('div');
  trail.className = 'magic-projectile-trail';
  ball.appendChild(trail);

  container.appendChild(ball);

  // 弾発射 SFX (短い whoosh)
  try { _playProjectileLaunchSound(element); } catch (e) {}

  // 2 フレーム後に目的地へ + 縮小(=奥へ)
  // transition は .animate クラスで有効化
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      ball.classList.add('animate');
      ball.style.transform =
        'translate(' + tx + 'px, ' + ty + 'px) ' +
        'translate(-50%, -50%) scale(' + endScale + ')';
    });
  });

  // 着弾
  const FLIGHT_MS = finisher ? 900 : 780;
  setTimeout(() => {
    // 弾消去 + 破裂
    if (ball.parentNode) ball.remove();
    _spawnMagicBurst(tx, ty, colors, container, { finisher: finisher });
    try { _playMagicBurstSound(element); } catch (e) {}
    if (opts.onImpact) {
      try { opts.onImpact(); } catch (e) {}
    }
    // 900ms 後にコンテナ掃除 (他の弾と衝突しないよう空要素なら削除)
    setTimeout(() => {
      if (container && container.parentNode && container.children.length === 0) {
        container.remove();
      }
    }, 900);
  }, FLIGHT_MS);
}

function _spawnMagicBurst(x, y, colors, container, opts) {
  opts = opts || {};
  const finisher = !!opts.finisher;
  // 各 burst 要素は left/top で配置し、CSS keyframe の translate(-50%,-50%) で中心合わせ。
  // 中央フラッシュ
  const flash = document.createElement('div');
  flash.className = 'magic-burst-flash' + (finisher ? ' finisher' : '');
  flash.style.setProperty('--core', colors.core);
  flash.style.setProperty('--aura', colors.aura);
  flash.style.setProperty('--glow', colors.glow);
  flash.style.left = x + 'px';
  flash.style.top  = y + 'px';
  container.appendChild(flash);
  setTimeout(() => { if (flash.parentNode) flash.remove(); }, 900);

  // 衝撃波リング
  const ring = document.createElement('div');
  ring.className = 'magic-burst-shockring' + (finisher ? ' finisher' : '');
  ring.style.setProperty('--aura', colors.aura);
  ring.style.setProperty('--glow', colors.glow);
  ring.style.left = x + 'px';
  ring.style.top  = y + 'px';
  container.appendChild(ring);
  setTimeout(() => { if (ring.parentNode) ring.remove(); }, 900);

  // 放射パーティクル (finisher は数も距離も倍)
  const N = finisher ? 28 : 16;
  const baseDist = finisher ? 160 : 90;
  for (let i = 0; i < N; i++) {
    const p = document.createElement('div');
    p.className = 'magic-burst-particle' + (finisher ? ' finisher' : '');
    p.style.setProperty('--core', colors.core);
    p.style.setProperty('--aura', colors.aura);
    p.style.setProperty('--glow', colors.glow);
    const angle = (i / N) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    const dist = baseDist + Math.random() * baseDist;
    p.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(1) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist).toFixed(1) + 'px');
    p.style.left = x + 'px';
    p.style.top  = y + 'px';
    p.style.animationDelay = (Math.random() * 0.08).toFixed(2) + 's';
    container.appendChild(p);
    setTimeout(() => { if (p.parentNode) p.remove(); }, 1000);
  }
}

// 発射音: 属性で音色を変える (軽い whoosh + ピッチ上昇)
function _playProjectileLaunchSound(element) {
  if (typeof withAudio !== 'function') return;
  withAudio(ac => {
    const now = ac.currentTime;
    // ノイズベースの whoosh
    const bufLen = Math.floor(ac.sampleRate * 0.4);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      ch[i] = (Math.random() * 2 - 1) * (1 - t) * 0.5;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass';
    // 属性でピッチ帯を切替
    const startHz = element === 'ice' ? 1800 : element === 'thunder' ? 2400 : element === 'light' ? 2200 : 1400;
    bp.frequency.setValueAtTime(startHz * 0.5, now);
    bp.frequency.exponentialRampToValueAtTime(startHz * 1.6, now + 0.35);
    bp.Q.value = 6;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.25, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    src.connect(bp); bp.connect(g); g.connect(ac.destination);
    src.start(now); src.stop(now + 0.42);
  });
}
// 着弾音: 短い破裂 (低域パンチ + 高域キラキラ)
function _playMagicBurstSound(element) {
  // 差替フック: window.PONO_FIRE_MAGIC_SFX (後方互換) または属性別 mp3 があればそちらを優先。
  // 今は合成音のみ。mp3 を入れるときは new Audio(...).play() で差し替え可。
  const customUrl = (typeof window !== 'undefined' && window.PONO_FIRE_MAGIC_SFX);
  if (customUrl) {
    try {
      const a = new Audio(customUrl);
      a.volume = 0.55; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through */ }
  }
  if (typeof withAudio !== 'function') return;
  withAudio(ac => {
    const now = ac.currentTime;
    // 低域パンチ
    const o1 = ac.createOscillator(), g1 = ac.createGain();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(220, now);
    o1.frequency.exponentialRampToValueAtTime(60, now + 0.22);
    g1.gain.setValueAtTime(0.55, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
    o1.connect(g1); g1.connect(ac.destination);
    o1.start(now); o1.stop(now + 0.3);
    // 高域キラキラ (属性で音色差)
    const hz = element === 'ice' ? 2600 : element === 'fire' ? 1600 : element === 'thunder' ? 3200 : 2000;
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(hz, now + 0.02);
    o2.frequency.exponentialRampToValueAtTime(hz * 0.5, now + 0.35);
    g2.gain.setValueAtTime(0.18, now + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(now + 0.02); o2.stop(now + 0.42);
  });
}

// ===== Word Card + TTS =====
function _getVoiceUrl(char) {
  if (currentCategory === 'hiragana') {
    const idx = CATEGORIES.hiragana.chars.indexOf(char);
    if (idx >= 0 && idx <= 44) return '../assets/voices/' + String(idx).padStart(2, '0') + '-aiueo.wav';
    if (idx === 45) return '../assets/voices/katakana/45-katakana.wav';
  }
  if (currentCategory === 'katakana') {
    const idx = CATEGORIES.katakana.chars.indexOf(char);
    if (idx >= 0 && idx <= 45) return '../assets/voices/katakana/' + String(idx).padStart(2, '0') + '-katakana.wav';
  }
  return null;
}
let _voicePlayId = 0; // キャンセル用ID
function _preloadWordAudio() {
  // 共有Audio要素にsrcをセットしてプリロード
  const char = CATEGORIES[currentCategory].chars[currentCharIndex];
  const url = _getVoiceUrl(char);
  if (url) {
    _sharedAudio.src = url;
    _sharedAudio.load();
  }
}
function speakWord(char, word) {
  if (window.speechSynthesis) speechSynthesis.cancel();
  const url = _getVoiceUrl(char);
  if (!url) { _speakFallback(char, word); return; }
  const myId = ++_voicePlayId;
  const targetTail = url.replace('../', '/');
  const curSrc = _sharedAudio.currentSrc || _sharedAudio.src || '';
  const srcMatches = curSrc.endsWith(targetTail);

  function doPlay() {
    if (_voicePlayId !== myId) return;
    try { _sharedAudio.currentTime = 0; } catch (e) {}
    const p = _sharedAudio.play();
    if (p && p.catch) p.catch(() => _speakFallback(char, word));
  }

  // 再生可能なら即再生
  if (srcMatches && _sharedAudio.readyState >= 2) {
    doPlay();
    return;
  }
  // まだ読み込み中 or src 差し替え: canplay を待ってから再生
  _sharedAudio.oncanplay = function() {
    _sharedAudio.oncanplay = null;
    _sharedAudio.oncanplaythrough = null;
    doPlay();
  };
  _sharedAudio.oncanplaythrough = _sharedAudio.oncanplay;
  if (!srcMatches) {
    _sharedAudio.src = url;
    _sharedAudio.load();
  }
}

function _speakFallback(char, word) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(`${char}！${word}！`);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  u.pitch = 1.2;
  speechSynthesis.speak(u);
}

let _wordCardTimer = null;
function showWordCard() {
  const char = CATEGORIES[currentCategory].chars[currentCharIndex];
  const data = WORD_DATA[currentCategory][currentCharIndex];
  if (!data) return;
  const card = document.getElementById('word-card');
  if (!card) return;
  document.getElementById('word-card-emoji').textContent = data.emoji;
  if (data.note) {
    document.getElementById('word-card-text').innerHTML =
      `<span class="word-card-note">${data.note}</span>`;
  } else {
    document.getElementById('word-card-text').innerHTML =
      `<span class="word-card-first">${char}</span>${data.word.slice(char.length)}`;
  }
  clearTimeout(_wordCardTimer);
  card.classList.remove('show', 'hide');
  // 横向き: キャンバス外（下寄り）に配置して妖精救出演出を隠さない
  if (landscapeMQ.matches) {
    const rect = canvasContainer.getBoundingClientRect();
    card.style.left = (rect.left + rect.width / 2) + 'px';
    card.style.top = 'auto';
    card.style.bottom = `calc(100vh - ${rect.bottom}px + 12px)`;
    card.style.transform = 'translateX(-50%)';
  } else {
    card.style.left = '50%';
    card.style.bottom = '120px';
    card.style.top = 'auto';
    card.style.transform = 'translateX(-50%)';
  }
  card.classList.add('show');
  speakWord(char, data.word);
  _wordCardTimer = setTimeout(() => {
    card.classList.remove('show');
    card.classList.add('hide');
    setTimeout(() => card.classList.remove('hide'), 400);
  }, 3500);
}

// 横向き: オーバーレイをキャンバス中央に限定
function alignOverlayToCanvas(el) {
  if (landscapeMQ.matches) {
    const r = canvasContainer.getBoundingClientRect();
    el.style.inset = 'auto';
    el.style.left = r.left + 'px';
    el.style.top = r.top + 'px';
    el.style.width = r.width + 'px';
    el.style.height = r.height + 'px';
  } else {
    el.style.inset = '0';
    el.style.left = el.style.top = el.style.width = el.style.height = '';
  }
}

function _pickLine(pool, kind) {
  var src = (pool === 'villain') ? VILLAIN_LINES : FAIRY_LINES;
  var arr = src[kind] || [];
  if (!arr.length) return '';
  return arr[Math.floor(Math.random() * arr.length)];

function _showMonsterBubble(text, durationMs) {
  var bubble = document.getElementById('monsterBubble');
  if (!bubble) return;
  bubble.textContent = text;
  bubble.classList.remove('hide');
  void bubble.offsetWidth;
  bubble.classList.add('show');
  if (bubble._hideT) clearTimeout(bubble._hideT);
  bubble._hideT = setTimeout(function() {
    bubble.classList.remove('show');
    bubble.classList.add('hide');
  }, durationMs || 1600);
}
function _hideMonsterBubble() {
  var bubble = document.getElementById('monsterBubble');
  if (bubble) {
    if (bubble._hideT) { clearTimeout(bubble._hideT); bubble._hideT = null; }
    if (bubble.classList.contains('show')) {
      bubble.classList.remove('show');
      bubble.classList.add('hide');
    }
  }
  // 書き始めたら悪役も即座に消す（邪魔しない）
  _hideVillain();
}

// ===== 悪役 (villain) 表示ヘルパー =====
function _showVillain(kind, duration) {
  // 戦闘中は悪役(コウモリ風👾)の登場/セリフを抑止する。
  // 敵役は戦闘ステージのキノコに一本化するため。
  try { if (_battle && _battle.active) return; } catch (e) { /* _battle未初期化時はスルー */ }
  var el = document.getElementById('villainDeco');
  var bubble = document.getElementById('villainBubble');
  if (!el || !bubble) return;
  bubble.textContent = _pickLine('villain', kind);
  el.classList.remove('gloat');
  void el.offsetWidth;
  el.classList.add('show');
  if (kind === 'defeat') el.classList.add('gloat');
  if (el._hideT) clearTimeout(el._hideT);
  el._hideT = setTimeout(function() {
    el.classList.remove('show', 'gloat');
  }, duration || 2000);
}
function _hideVillain() {
  var el = document.getElementById('villainDeco');
  if (!el) return;
  if (el._hideT) { clearTimeout(el._hideT); el._hideT = null; }
  el.classList.remove('show', 'gloat');
}

function _setMonsterForChar(char) {
  var el = document.getElementById('monsterDeco');
  if (!el) return;
  var imgEl = el.querySelector('.monster-img');
  var emojiEl = el.querySelector('.monster-emoji');
  if (!imgEl || !emojiEl) return;
  el.classList.remove('pop', 'emerge', 'leave');
  // 進行中の割れ演出 setTimeout をキャンセル
  if (window._breakTimers && window._breakTimers.length) {
    window._breakTimers.forEach(function(t) { clearTimeout(t); });
    window._breakTimers = [];
  }
  // 悪役の自動非表示タイマーもキャンセル
  _hideVillain();
  // 足元の🌰 drop を隠す
  var drop = document.getElementById('monsterAcornDrop');
  if (drop) { drop.classList.remove('show'); drop.style.opacity = '0'; }
  // 破片/クラック/フラッシュ をリセット
  var cc = document.getElementById('canvasContainer');
  if (cc) cc.classList.remove('shaking', 'breaking');
  var flash = document.getElementById('canvasFlash');
  if (flash) flash.classList.remove('active');
  var cracks = document.getElementById('canvasCracks');
  if (cracks) cracks.classList.remove('active');
  var shards = document.getElementById('canvasShards');
  if (shards) shards.classList.remove('burst');
  var seal = document.getElementById('canvasSeal');
  if (seal) seal.classList.remove('active', 'cracking');
  var burst = document.getElementById('canvasBurst');
  if (burst) burst.classList.remove('active');
  var sparkles = document.getElementById('canvasSparkles');
  if (sparkles) { sparkles.classList.remove('active'); sparkles.innerHTML = ''; }
  var m = _monsterForChar(char);
  if (m.img) {
    imgEl.src = m.img;
    imgEl.style.display = '';
    emojiEl.style.display = 'none';
    imgEl.onerror = function() {
      imgEl.style.display = 'none';
      emojiEl.style.display = '';
      emojiEl.textContent = m.emoji;
    };
  } else {
    imgEl.style.display = 'none';
    emojiEl.style.display = '';
    emojiEl.textContent = m.emoji;
  }
  el.style.visibility = 'visible';
  // 封印された状態でふわっと現れる
  el.classList.remove('enter');
  void el.offsetWidth;
  el.classList.add('enter');
  // 少し間を空けて悪役登場 → 閉じ込めセリフ
  if (el._villainT) clearTimeout(el._villainT);
  el._villainT = setTimeout(function() {
    _showVillain('trap', 2200);
  }, 350);
  // 初回チュートリアル
  _maybeShowFairyIntro();
}

// ===== キャンバス割れ演出 (妖精救出シーケンス) =====
function _playCanvasBreak() {
  var el = document.getElementById('monsterDeco');
  var cc = document.getElementById('canvasContainer');
  if (!el || !cc) return;
  // 前回の残り timer を全部クリア
  if (window._breakTimers && window._breakTimers.length) {
    window._breakTimers.forEach(function(t) { clearTimeout(t); });
  }
  window._breakTimers = [];
  function _bt(fn, ms) { window._breakTimers.push(setTimeout(fn, ms)); }
  // 悪役が出ていたら即消す（邪魔しない）
  _hideVillain();
  _hideMonsterBubble();
  // 既に進行中なら何もしない
  if (el.classList.contains('emerge') || el.classList.contains('leave')) return;

  // T=0: キャンバスをシェイク + overflow 解放 + 魔法陣を浮かび上がらせる
  cc.classList.add('shaking', 'breaking');
  var seal = document.getElementById('canvasSeal');
  if (seal) {
    seal.classList.remove('active', 'cracking');
    void seal.offsetWidth;
    seal.classList.add('active');
  }

  // T=120: 白フラッシュ (光の下地)
  _bt(function() {
    var flash = document.getElementById('canvasFlash');
    if (flash) {
      flash.classList.remove('active');
      void flash.offsetWidth;
      flash.classList.add('active');
    }
  }, 120);

  // T=260: 魔法陣に放射状のヒビが走る
  _bt(function() {
    var seal = document.getElementById('canvasSeal');
    if (seal) seal.classList.add('cracking');
  }, 260);

  // T=420: 中央から光バースト
  _bt(function() {
    var burst = document.getElementById('canvasBurst');
    if (burst) {
      burst.classList.remove('active');
      void burst.offsetWidth;
      burst.classList.add('active');
    }
  }, 420);

  // T=460: キラキラ粒子を放射
  _bt(function() {
    var wrap = document.getElementById('canvasSparkles');
    if (!wrap) return;
    wrap.innerHTML = '';
    var symbols = ['✨','⭐','💫','🌟','◆'];
    var count = 26;
    var baseDist = Math.min(cc.clientWidth, cc.clientHeight) * 0.55;
    for (var i = 0; i < count; i++) {
      var s = document.createElement('span');
      s.className = 'spk';
      s.textContent = symbols[i % symbols.length];
      var angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
      var dist = baseDist * (0.6 + Math.random() * 0.6);
      s.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(1) + 'px');
      s.style.setProperty('--dy', (Math.sin(angle) * dist).toFixed(1) + 'px');
      s.style.setProperty('--rot', (Math.random() * 720 - 360).toFixed(0) + 'deg');
      s.style.animationDelay = (Math.random() * 0.08).toFixed(2) + 's';
      wrap.appendChild(s);
    }
    wrap.classList.remove('active');
    void wrap.offsetWidth;
    wrap.classList.add('active');
    window._breakTimers.push(setTimeout(function() {
      wrap.classList.remove('active');
      wrap.innerHTML = '';
    }, 1600));
  }, 460);

  // バリンッ音
  try {
    var ac = (window._audioCtx = window._audioCtx || new (window.AudioContext || window.webkitAudioContext)());
    var now = ac.currentTime;
    // ノイズで割れた感
    var buf = ac.createBuffer(1, ac.sampleRate * 0.25, ac.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
    }
    var noise = ac.createBufferSource();
    noise.buffer = buf;
    var ng = ac.createGain();
    ng.gain.setValueAtTime(0.18, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    noise.connect(ng); ng.connect(ac.destination);
    noise.start(now);
    // キラン
    var osc = ac.createOscillator(), g = ac.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(880, now + 0.12);
    osc.frequency.exponentialRampToValueAtTime(1760, now + 0.32);
    g.gain.setValueAtTime(0.08, now + 0.12);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.connect(g); g.connect(ac.destination);
    osc.start(now + 0.12); osc.stop(now + 0.36);
  } catch (e) { /* audio not ready */ }

  // T=600: 妖精が封印解除されて中央に登場
  _bt(function() {
    el.classList.remove('enter');
    el.classList.add('emerge');
  }, 600);

  // T=950: 妖精の「ありがとう」吹き出し + 🌰ドロップ
  _bt(function() {
    _showMonsterBubble(_pickLine('fairy', 'thanks'), 950);
    var drop = document.getElementById('monsterAcornDrop');
    if (drop) {
      drop.classList.remove('show');
      void drop.offsetWidth;
      drop.classList.add('show');
    }
  }, 950);

  // T=1900: 妖精退場 (leave)
  _bt(function() {
    el.classList.remove('emerge');
    el.classList.add('leave');
    _hideMonsterBubble();
  }, 1900);

  // T=2300: 妖精完全消し + 悪役再登場 (悔しがる)
  _bt(function() {
    el.style.visibility = 'hidden';
    el.classList.remove('leave', 'emerge', 'pop');
    var drop = document.getElementById('monsterAcornDrop');
    if (drop) { drop.classList.remove('show'); drop.style.opacity = '0'; }
    _showVillain('defeat', 1800);
  }, 2300);

  // T=2600: キャンバスの shaking/breaking クラスを解除（次文字ロードに備え）
  _bt(function() {
    cc.classList.remove('shaking', 'breaking');
    var seal = document.getElementById('canvasSeal');
    if (seal) seal.classList.remove('active', 'cracking');
    var burst = document.getElementById('canvasBurst');
    if (burst) burst.classList.remove('active');
    var sparkles = document.getElementById('canvasSparkles');
    if (sparkles) { sparkles.classList.remove('active'); sparkles.innerHTML = ''; }
  }, 2600);
}
// 既存呼出し経路との互換

// ===== RPG バトルシステム =====
// 行練習を「1体の敵を5文字で倒す」戦闘に見立てる。
// 既存 .monster-deco (封印された妖精) とは完全に別レイヤ (#battleStage / #battleEnemy)。
const BATTLE_ENEMIES = {
  a: {
    id: 'mush1', name: 'キノコのせんし',
    img: '../assets/images/monsters/chars/monster_005.png',
    taunts: ['くくく…', 'かかってこい！', 'まだまだ！', 'なんのこれしき！', 'やるな…'],
    hp: 5, element: 'light'
  },
  // 他の行は順次追加。未定義なら a 行の敵を流用 (見た目だけランダムな mush2/3 にする)
};
const MUSHROOM_IMGS = [
  '../assets/images/monsters/chars/monster_005.png',
  '../assets/images/monsters/chars/monster_006.png',
  '../assets/images/monsters/chars/monster_007.png',
];
function _enemyForRow(rowId) {
  const base = BATTLE_ENEMIES[rowId] || BATTLE_ENEMIES.a;
  // 未定義行は画像だけランダム化して飽きさせない
  const img = BATTLE_ENEMIES[rowId]
    ? base.img
    : MUSHROOM_IMGS[Math.floor(Math.random() * MUSHROOM_IMGS.length)];
  return Object.assign({}, base, { img });
}

const _battle = {
  active: false,
  enemy: null,
  hp: 5,
  maxHp: 5,
  hitCount: 0,
  // 5回の攻撃タイプを事前に決める ('normal' | 'magic')。finisher (末尾) は必ず magic
  attackPlan: [],
  // 行(label: あ/か/さ…)ごとの属性。'fire' | 'ice' | 'thunder' | 'light' | 'heal' | 'wind' | ...
  element: 'fire',
  // バトル中のどんぐり報酬を溜めておき、勝利時にまとめて付与・表示する (2026-04-20 UX)
  acornsBuffered: 0,
  // 勇者 HP/MP (減るが死なない floor でクランプする)。
  heroHp: 30, heroMaxHp: 30, heroHpFloor: 5,
  heroMp: 20, heroMaxMp: 20, heroMpFloor: 0,
};

// 勇者 HP/MP ゲージを現在値で描画 + 短い flash。
function _renderHeroGauges(flash) {
  const hpBar = document.getElementById('heroHpBar');
  const mpBar = document.getElementById('heroMpBar');
  const hpNum = document.getElementById('heroHpNum');
  const mpNum = document.getElementById('heroMpNum');
  const wrap = document.getElementById('heroStatus');
  if (hpBar) hpBar.style.width = Math.max(0, Math.min(100, (_battle.heroHp / _battle.heroMaxHp) * 100)) + '%';
  if (mpBar) mpBar.style.width = Math.max(0, Math.min(100, (_battle.heroMp / _battle.heroMaxMp) * 100)) + '%';
  if (hpNum) hpNum.textContent = _battle.heroHp + '/' + _battle.heroMaxHp;
  if (mpNum) mpNum.textContent = _battle.heroMp + '/' + _battle.heroMaxMp;
  if (wrap && flash) {
    const cls = (flash === 'mp') ? 'flash-mp' : 'flash-hp';
    wrap.classList.remove(cls);
    void wrap.offsetWidth;
    wrap.classList.add(cls);
    setTimeout(function() { wrap.classList.remove(cls); }, 360);
  }
}
function _resetHeroGauges() {
  _battle.heroHp = _battle.heroMaxHp;
  _battle.heroMp = _battle.heroMaxMp;
  _renderHeroGauges(null);
}
function _applyHeroHpDamage(amount) {
  const next = Math.max(_battle.heroHpFloor, _battle.heroHp - (amount | 0));
  _battle.heroHp = next;
  _renderHeroGauges('hp');
}
function _applyHeroMpCost(cost) {
  const next = Math.max(_battle.heroMpFloor, _battle.heroMp - (cost | 0));
  _battle.heroMp = next;
  _renderHeroGauges('mp');
}

// 攻撃プラン生成: count=5 のとき 通常3 + 魔法2 (末尾は必ず magic)
function _pickAttackPlan(count) {
  const plan = new Array(count).fill('normal');
  if (count > 0) plan[count - 1] = 'magic';
  // 残り (count-1 箇所) からちょうど 1 個だけ magic に → 合計 magic=2, normal=3
  const extras = 1;
  const pool = [];
  for (let i = 0; i < count - 1; i++) pool.push(i);
  for (let k = 0; k < extras && pool.length > 0; k++) {
    const idx = Math.floor(Math.random() * pool.length);
    plan[pool.splice(idx, 1)[0]] = 'magic';
  }
  return plan;
}

function _battleEls() {
  return {
    stage:   document.getElementById('battleStage'),
    enemy:   document.getElementById('battleEnemy'),
    img:     document.getElementById('battleEnemyImg'),
    name:    document.getElementById('battleEnemyName'),
    hpBar:   document.getElementById('battleHpBar'),
    stars:   document.querySelectorAll('#pentagramCharge .star'),
    charge:  document.getElementById('pentagramCharge'),
    speech:  document.getElementById('battleEnemySpeech'),
    popLayer:document.getElementById('damagePopLayer'),
  };
}

function _renderHpBar(hp, maxHp) {
  const { hpBar } = _battleEls();
  if (!hpBar) return;
  hpBar.innerHTML = '';
  for (let i = 0; i < maxHp; i++) {
    const b = document.createElement('span');
    b.className = 'hp-block';
    if (i >= hp) b.classList.add('lost');
    else if (hp <= 1) b.classList.add('critical');
    else if (hp <= 2) b.classList.add('low');
    hpBar.appendChild(b);
  }
}

function _showBattleStage(rowId) {
  const els = _battleEls();
  if (!els.stage) return;
  const enemy = _enemyForRow(rowId);
  _battle.active = true;
  _battle.enemy = enemy;
  _battle.maxHp = enemy.hp || 5;
  _battle.hp = _battle.maxHp;
  _battle.hitCount = 0;
  _battle.attackPlan = _pickAttackPlan(_battle.maxHp); // 5回の通常/魔法プラン
  // 現在は最初のステージのみ実装中のため、属性は「炎」で固定。
  // 将来、行ごとに属性を変える段階で ROW_ELEMENT_BY_LABEL に戻す。
  _battle.element = 'fire';
  _battle.acornsBuffered = 0; // バトル開始時にリセット

  if (els.img) els.img.src = enemy.img;
  if (els.name) els.name.textContent = enemy.name;
  if (els.charge) els.charge.classList.remove('charged');
  els.stars.forEach(s => s.classList.remove('lit'));
  els.enemy.classList.remove('damaged', 'defeated');
  _renderHpBar(_battle.hp, _battle.maxHp);

  // 2026-04-20: バトルステージは「マップシーン+エンカウント演出」が終わるまで
  // DOM 上は非表示のままにする。以前はここで display:'' にしていたため、
  // map-scene-overlay の opacity 0→1 フェードイン中や、map→curtain の切替
  // 瞬間にバトル画面が一瞬透けて見える問題があった。実際の表示は
  // _showBattleEncounterIntro のカーテンで覆った後に行う (_revealBattleStage)。
  els.stage.style.display = 'none';
  els.stage.setAttribute('aria-hidden', 'false');
  // ポノ / ハリネズミ / 封印された妖精を戦闘中は隠す (戦闘画面の集中度を上げる)
  document.body.classList.add('battle-mode');

  // 封印された妖精は隠す (同一キャンバス内の干渉を避ける)
  const md = document.getElementById('monsterDeco');
  if (md) md.style.display = 'none';

  // ログウィンドウをリセット (前回の「たおした！」残りを消す)
  _setBattleLog(['', '']);

  // 勇者を idle スタートにリセット (前バトルが attack で終わっていても待機に戻す)
  try {
    const heroEl = document.getElementById('battleHero');
    if (heroEl) {
      heroEl.classList.remove('move', 'attack-magic', 'attack-normal', 'concentrate', 'damaged');
      heroEl.classList.add('idle');
    }
  } catch (e) { /* ignore */ }

  // 勇者 HP/MP を全回復で表示 (行ごとに元気に始まる)
  try { _resetHeroGauges(); } catch (e) {}

  // 登場セリフ / エンカウントジングルは _showBattleEncounterIntro 側で演出として扱う。
  // ここでは stage の配置のみを行う。
}

// ===== 戦闘ログウィンドウ (2行固定) =====
// lines: [line1, line2] または [line1]。opts: { line1Class, line2Class, animate }
// ===== タイプライター状態 (1 文字ずつ進行) =====
// 子供の目が文字にフォーカスするよう 45ms/文字で順次出す。
// 進行中にタップしたら _completeBattleLogTypewriter で即完了 → 次タップで queue 送り。
const _battleLogTW = {
  timers: [],
  typing: false,
  l1El: null, l2El: null,
  l1Full: '', l2Full: '',
  l1UsesHtml: false, l2UsesHtml: false,
};

function _cancelBattleLogTypewriter() {
  for (const t of _battleLogTW.timers) clearTimeout(t);
  _battleLogTW.timers = [];
}

function _completeBattleLogTypewriter() {
  if (!_battleLogTW.typing) return;
  _cancelBattleLogTypewriter();
  if (_battleLogTW.l1El) {
    if (_battleLogTW.l1UsesHtml) _battleLogTW.l1El.innerHTML = _battleLogTW.l1Full;
    else _battleLogTW.l1El.textContent = _battleLogTW.l1Full;
  }
  if (_battleLogTW.l2El) {
    if (_battleLogTW.l2UsesHtml) _battleLogTW.l2El.innerHTML = _battleLogTW.l2Full;
    else _battleLogTW.l2El.textContent = _battleLogTW.l2Full;
  }
  _battleLogTW.typing = false;
}

function _setBattleLog(lines, opts) {
  _cancelBattleLogTypewriter();
  _battleLogTW.typing = false;
  if (!Array.isArray(lines)) lines = [lines || ''];
  const l1 = document.getElementById('battleLogLine1');
  const l2 = document.getElementById('battleLogLine2');
  const o = opts || {};
  const animate = (o.animate !== false);
  const useTypewriter = (o.typewriter !== false) && animate;
  const t1 = lines[0] || '';
  const t2 = lines[1] || '';
  const usesHtml1 = t1.indexOf('<') >= 0;
  const usesHtml2 = t2.indexOf('<') >= 0;

  // ラインのクラス付与 + フェードイン (enter) だけ先にやって中身は空にする
  const prep = (el, cls) => {
    if (!el) return;
    el.className = 'battle-log-line' + (cls ? ' ' + cls : '');
    el.textContent = '';
    if (animate) {
      el.classList.remove('enter');
      void el.offsetWidth;
      el.classList.add('enter');
    }
  };
  prep(l1, o.line1Class);
  prep(l2, o.line2Class);

  // 即時表示モード (animate:false や reduced-motion 想定)
  if (!useTypewriter) {
    if (l1) l1.innerHTML = t1;
    if (l2) l2.innerHTML = t2;
    return;
  }

  _battleLogTW.l1El = l1; _battleLogTW.l2El = l2;
  _battleLogTW.l1Full = t1; _battleLogTW.l2Full = t2;
  _battleLogTW.l1UsesHtml = usesHtml1; _battleLogTW.l2UsesHtml = usesHtml2;
  _battleLogTW.typing = true;

  const CHAR_MS = 45;
  const LINE_GAP_MS = 180;

  const typeLine = (el, text, usesHtml, startDelay, onDone) => {
    if (!el || !text) {
      _battleLogTW.timers.push(setTimeout(() => { if (onDone) onDone(); }, startDelay));
      return;
    }
    if (usesHtml) {
      // HTML タグ入りは 1 文字ずつ刻むと壊れるので一括表示
      _battleLogTW.timers.push(setTimeout(() => {
        el.innerHTML = text;
        if (onDone) onDone();
      }, startDelay));
      return;
    }
    let i = 0;
    const step = () => {
      i++;
      el.textContent = text.slice(0, i);
      if (i < text.length) {
        _battleLogTW.timers.push(setTimeout(step, CHAR_MS));
      } else {
        if (onDone) onDone();
      }
    };
    _battleLogTW.timers.push(setTimeout(step, startDelay));
  };

  typeLine(l1, t1, usesHtml1, 40, () => {
    typeLine(l2, t2, usesHtml2, LINE_GAP_MS, () => {
      _battleLogTW.typing = false;
    });
  });
}
function _clearBattleLog() { _setBattleLog(['', ''], { animate: false }); }

// ===== タップ進行ダイアログ (ドラクエ風、子供でも読めるペース) =====
// messages: [{ lines:[string,string], opts?:{line1Class,line2Class,animate} }, ...]
// onDone: 全メッセージ消化後のコールバック。
// 動作: 1 メッセージ目を即表示 + ▼ 点滅 + inner クリックで次へ。最後の消化後 onDone。
const _battleDialog = {
  queue: [],
  onDone: null,
  active: false,
  handler: null,
  _minShowUntil: 0,  // このタイムスタンプまではタップを無視 (誤爆防止)
};

function _battleDialogBind() {
  if (_battleDialog.handler) return;
  const inner = document.getElementById('battleLogInner');
  if (!inner) return;
  _battleDialog.handler = function(ev) {
    if (!_battleDialog.active) return;
    // 誤爆防止: 0.35s は必ず待つ (連打対策 & アニメ終了まで)
    if (Date.now() < _battleDialog._minShowUntil) return;
    ev.preventDefault();
    ev.stopPropagation();
    _battleDialogAdvance();
  };
  inner.addEventListener('pointerdown', _battleDialog.handler);
}

function _battleDialogAdvance() {
  // タイプライター進行中なら、まず全文即表示するだけ。次のタップで queue 送り。
  if (_battleLogTW.typing) {
    _completeBattleLogTypewriter();
    _battleDialog._minShowUntil = Date.now() + 220;
    return;
  }
  if (_battleDialog.queue.length === 0) {
    _battleDialogFinish();
    return;
  }
  const next = _battleDialog.queue.shift();
  _setBattleLog(next.lines || ['', ''], next.opts || {});
  // タイプライター分の時間 + 余裕を取って誤爆防止タイマーを設定
  _battleDialog._minShowUntil = Date.now() + 220;
  _battleDialogSetAwait(true);
}

function _battleDialogFinish() {
  _battleDialog.active = false;
  _battleDialogSetAwait(false);
  const cb = _battleDialog.onDone;
  _battleDialog.onDone = null;
  if (cb) cb();
}

function _battleDialogSetAwait(on) {
  const win = document.getElementById('battleLog');
  if (!win) return;
  if (on) win.classList.add('await-tap');
  else    win.classList.remove('await-tap');
}

function _showBattleDialog(messages, onDone) {
  if (!Array.isArray(messages) || messages.length === 0) {
    if (onDone) onDone();
    return;
  }
  _battleDialogBind();
  _battleDialog.queue = messages.slice();
  _battleDialog.onDone = onDone || null;
  _battleDialog.active = true;
  _battleDialogAdvance(); // 1 通目を即表示 + await-tap on
}

// ===== バトル登場演出: カーテン + 敵ドン表示 → 名前告知 → タップで挑発 → タップで前進 =====
// ユーザー要望 (2026-04-20): 子供が読めるペースで進められるように、
// 一方的なタイマー進行をやめて各ダイアログをタップで手動送りにする。
function _showBattleEncounterIntro(onDone) {
  const enemy = _battle.enemy;
  if (!enemy) { if (onDone) onDone(); return; }

  // エンカウントでバトル BGM へ切替 (マップ BGM からの遷移)
  try { setBgmFor('battle'); } catch (e) {}

  // バトルステージを「カーテンの裏」で表示可能な状態に戻す。
  // カーテン (z-index 1300, opaque 黒) が覆っているので、ここで display を
  // 戻してもユーザーには見えない。カーテンがフェードアウトした瞬間にバトル
  // 画面が自然に現れる。
  const _stageEls = _battleEls();
  if (_stageEls.stage) _stageEls.stage.style.display = '';

  // Phase A: カーテンだけ先に出す (まだ敵は登場しない)。
  // ユーザー要望 (2026-04-20): いきなりモンスターが出てこないから、
  // エンカウント前のナレーションを 2 ステップ見せてから敵を登場させる。
  // さらに「〇〇は あるいていた…」の間、move.png で歩く勇者を左から右へ流す。
  const curtain = document.createElement('div');
  curtain.className = 'battle-intro-curtain';
  // 森の背景 (緩やかスクロール) を先に貼る。phase 2 (敵登場) でフェードアウトさせる。
  const forest = document.createElement('div');
  forest.className = 'battle-intro-forest';
  curtain.appendChild(forest);
  document.body.appendChild(curtain);

  // 歩行アニメ: カーテンの手前・ログの後ろに重ねる
  const walkWrap = document.createElement('div');
  walkWrap.className = 'battle-intro-hero-wrap';
  walkWrap.innerHTML = '<div class="hero-sprite move"></div>';
  document.body.appendChild(walkWrap);

  // Phase 1: エンカウント前ナレーション (敵はまだいない黒画面でタップ送り)
  const heroName = _battleHeroName();
  const preMessages = [
    { lines: [heroName + 'は あるいていた…', ''] },
    { lines: ['と そのとき！', ''], opts: { line1Class: 'dq-line-emphasis' } },
  ];

  _showBattleDialog(preMessages, function() {
    // 歩きを止めてフェードアウト + 森もフェードアウト → 敵登場へ
    try { walkWrap.classList.add('walk-off'); } catch (e) {}
    try { curtain.classList.add('forest-out'); } catch (e) {}
    setTimeout(function() { if (walkWrap.parentNode) walkWrap.remove(); }, 620);

    // Phase 2: 敵ドン登場 + エンカウントジングル
    const img = document.createElement('img');
    img.className = 'battle-intro-enemy';
    img.src = enemy.img;
    img.alt = enemy.name;
    curtain.appendChild(img);
    try { playEncounterJingle(); } catch (e) {}

    // Phase 3: 名前告知 → 挑発 (各タップで送る)
    const postMessages = [
      { lines: [enemy.name + 'が あらわれた！', ''], opts: { line1Class: 'dq-line-emphasis' } },
    ];
    if (enemy.taunts && enemy.taunts[0]) {
      postMessages.push({ lines: [enemy.name, '「' + enemy.taunts[0] + '」'] });
    }

    // 敵登場アニメが落ち着くまで少し待ってから次のダイアログ
    setTimeout(function() {
      _showBattleDialog(postMessages, function() {
        setTimeout(function() {
          curtain.classList.add('fade-out');
        }, 150);
        setTimeout(function() {
          if (curtain.parentNode) curtain.remove();
          if (onDone) onDone();
        }, 750);
      });
    }, 600);
  });
}

// _showEnemySpeech: バトル中は上部吹き出しではなくログに集約する

function _hideBattleStage() {
  const els = _battleEls();
  if (!els.stage) return;
  _battle.active = false;
  els.stage.style.display = 'none';
  els.stage.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('battle-mode');
  const md = document.getElementById('monsterDeco');
  if (md) md.style.display = '';
  // 「たおした！」ウィンドウが残っていれば念のため消す
  try { _hideDefeatedWindow(); } catch (e) {}
}

function _showEnemySpeech(text, ms) {
  if (!text) return;
  // バトル中はログウィンドウに「〇〇「セリフ」」で表示
  if (_battle.active) {
    const enemyName = (_battle.enemy && _battle.enemy.name) || 'てき';
    _setBattleLog([enemyName, '「' + text + '」']);
    return;
  }
  // バトル外 (念のため互換残し): 旧吹き出し表示
  const { speech } = _battleEls();
  if (!speech) return;
  speech.textContent = text;
  speech.classList.add('show');
  clearTimeout(_showEnemySpeech._t);
  _showEnemySpeech._t = setTimeout(() => speech.classList.remove('show'), ms || 1800);
}

function _popDamage(amount, opts) {
  const { popLayer } = _battleEls();
  if (!popLayer) return;
  const d = document.createElement('div');
  d.className = 'damage-pop' + (opts && opts.finisher ? ' finisher' : '');
  d.textContent = amount;
  // 敵の中心少し上にばらけさせる
  const jitterX = (Math.random() - 0.5) * 40;
  d.style.left = (50 + jitterX / 2) + '%';
  d.style.top  = (opts && opts.finisher ? '45%' : '40%');
  popLayer.appendChild(d);
  setTimeout(() => d.remove(), 900);
}

// 1 文字完成時に呼ばれる: HP 1 減らして星 1 点灯
// (2026-04-20 ユーザー要望: 剣を振り切る前に敵が揺れるのは早すぎ。攻撃モーションの「着弾」タイミングに
//  合わせて敵シェイク・被弾 SFX・ダメージ数字・敵セリフを遅延発火する。)
function battleHitEnemy(opts) {
  if (!_battle.active) return;
  const els = _battleEls();
  _battle.hitCount++;
  _battle.hp = Math.max(0, _battle.hp - 1);
  const isFinisher = !!(opts && opts.finisher);

  // 攻撃タイプを決定 (finisher は必ず magic、それ以外は plan に従う)
  const planIdx = Math.min(_battle.hitCount - 1, (_battle.attackPlan.length || 0) - 1);
  const attackType = isFinisher ? 'magic' : ((_battle.attackPlan[planIdx]) || 'normal');

  // 攻撃 FX (finisher は battleVictory 側で全画面魔法陣を出すのでここではスキップ)
  // 着弾遅延: 通常=剣の振りが着弾する ~320ms、魔法=projectile 飛行時間 ~780ms
  let impactDelay = 0;
  if (!isFinisher) {
    try {
      if (attackType === 'magic') playMagicAttackFX(_battle.element || 'fire');
      else                         playNormalAttackFX();
    } catch (e) { /* ignore */ }
    impactDelay = (attackType === 'magic') ? 780 : 320;
    // 勇者を攻撃モーションへ切替 → アニメ終了後に idle 復帰
    try {
      const kind = (attackType === 'magic') ? 'attack-magic' : 'attack-normal';
      _setHeroAnim(kind);
      const back = (attackType === 'magic') ? 900 : 550;
      setTimeout(function() { if (_battle.active) _setHeroAnim('idle'); }, back);
    } catch (e) { /* ignore */ }
    // MP 消費: 通常攻撃=1, 魔法攻撃=3 (floor:0 でクランプ、尽きても攻撃は続行する)
    try { _applyHeroMpCost(attackType === 'magic' ? 3 : 1); } catch (e) {}
  } else {
    // finisher (最終魔法) は大きめに MP を消費。着弾タイミングは battleVictory 側に任せるので即時扱い
    try { _applyHeroMpCost(5); } catch (e) {}
    impactDelay = 0;
  }

  // 星 + HP は UI 即時反映 (これらは「攻撃が決まった」予告としてすぐ光らせる方が気持ち良い)
  const star = els.stars[_battle.hitCount - 1];
  if (star) star.classList.add('lit');
  _renderHpBar(_battle.hp, _battle.maxHp);

  // 着弾フェーズ: シェイク + 被弾音 + ダメージ数字 + 敵セリフ
  const doImpact = function() {
    if (!_battle.active) return;
    if (_battle.hp > 0) {
      els.enemy.classList.remove('damaged');
      void els.enemy.offsetWidth;
      els.enemy.classList.add('damaged');
      clearTimeout(_battle._damagedTimer);
      _battle._damagedTimer = setTimeout(function() {
        if (els.enemy) els.enemy.classList.remove('damaged');
      }, 600);
      try { _playEnemyHitSound(); } catch (e) {}
    }
    const dmg = isFinisher ? 999 : (20 + Math.floor(Math.random() * 12));
    _popDamage(dmg, { finisher: isFinisher });
    if (!isFinisher && _battle.enemy && _battle.enemy.taunts) {
      const ts = _battle.enemy.taunts;
      if (Math.random() < 0.5) _showEnemySpeech(ts[Math.floor(Math.random() * ts.length)], 1400);
    }
  };
  if (impactDelay > 0) setTimeout(doImpact, impactDelay);
  else doImpact();
}

// ===== プレイヤー攻撃 FX (仮): 通常攻撃 =====
// 差替フック: window.PONO_NORMAL_ATTACK_SFX に mp3 パスを入れれば上書きできる
function playNormalAttackFX() {
  const els = _battleEls();
  if (els.stage) {
    const slash = document.createElement('div');
    slash.className = 'slash-fx';
    els.stage.appendChild(slash);
    setTimeout(() => { if (slash.parentNode) slash.remove(); }, 460);
  }
  _spawnEnemyImpactParticles('✨', 5);
  playNormalAttackSound();
}

function playNormalAttackSound() {
  if (typeof window !== 'undefined' && window.PONO_NORMAL_ATTACK_SFX) {
    try {
      const a = new Audio(window.PONO_NORMAL_ATTACK_SFX);
      a.volume = 0.55; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through to synth */ }
  }
  // 合成: 斬撃 (三角波ピッチダウン + 短いノイズ衝撃)
  withAudio(ac => {
    const now = ac.currentTime;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(1800, now);
    o.frequency.exponentialRampToValueAtTime(280, now + 0.14);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.32, now + 0.008);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now + 0.2);
    // ノイズバースト (衝撃音)
    const bufLen = Math.floor(ac.sampleRate * 0.1);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
    const src = ac.createBufferSource(), ng = ac.createGain();
    src.buffer = buf;
    ng.gain.setValueAtTime(0.28, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    src.connect(ng); ng.connect(ac.destination);
    src.start(now); src.stop(now + 0.12);
  });
}

// ===== 敵被弾 SFX =====
// 攻撃命中時の「ドガッ」「バシッ」。斬撃や魔法の発射音とは別に、敵が当たった瞬間に被せる。
// (2026-04-20 ユーザー要望: 敵がダメージを受けてるのが音で分かるようにしたい)
function _playEnemyHitSound() {
  if (typeof window !== 'undefined' && window.PONO_ENEMY_HIT_SFX) {
    try {
      const a = new Audio(window.PONO_ENEMY_HIT_SFX);
      a.volume = 0.6; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through to synth */ }
  }
  withAudio(ac => {
    const now = ac.currentTime;
    // 低音 thud: 240Hz → 70Hz で急降下する矩形波 (腹に響く)
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(260, now);
    o.frequency.exponentialRampToValueAtTime(70, now + 0.13);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.34, now + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now + 0.24);
    // 上に被せる短いノイズ衝撃 (バシッ成分)
    const bufLen = Math.floor(ac.sampleRate * 0.09);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
    const src = ac.createBufferSource(), ng = ac.createGain();
    src.buffer = buf;
    ng.gain.setValueAtTime(0.3, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    src.connect(ng); ng.connect(ac.destination);
    src.start(now); src.stop(now + 0.1);
  });
}

// ===== プレイヤー攻撃 FX: 魔法攻撃 =====
// 「手前から奥(敵)へ魔法弾が飛ぶ → 着弾で破裂」する launchMagicProjectile に置換。
// 色は _battle.element (fire/ice/thunder/light/...) に合わせて MAGIC_COLORS で切替。
// 全画面の AI 動画 (launchMagicCircle) は finisher (5 文字目) 専用で取っておく。
function playMagicAttackFX(kind) {
  const element = kind || (_battle && _battle.element) || 'fire';
  try {
    if (typeof launchMagicProjectile === 'function') {
      launchMagicProjectile(element, {
        onImpact: function() {
          // 着弾時に火花粒子を敵位置から少し追加 (属性絵文字で)
          const emoji = element === 'fire'    ? '🔥'
                      : element === 'ice'     ? '❄'
                      : element === 'thunder' ? '⚡'
                      : element === 'light'   ? '✨'
                      : element === 'heal'    ? '💚'
                      : element === 'wind'    ? '💨'
                      : '✨';
          _spawnEnemyImpactParticles(emoji, 6);
        }
      });
    }
  } catch (e) { /* ignore — SFX だけでも鳴らす */ }
  // SFX は launchMagicProjectile 内の発射音+着弾音に任せる。
  // 既存の playFireMagicSound (全属性 fire 音) は二重で重くなるので呼ばない。
}

function playFireMagicSound() {
  if (typeof window !== 'undefined' && window.PONO_FIRE_MAGIC_SFX) {
    try {
      const a = new Audio(window.PONO_FIRE_MAGIC_SFX);
      a.volume = 0.6; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through to synth */ }
  }
  // 合成: whoosh (フィルタースイープ + 低音の轟き)
  withAudio(ac => {
    const now = ac.currentTime;
    const bufLen = Math.floor(ac.sampleRate * 0.55);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      ch[i] = (Math.random() * 2 - 1) * (1 - t) * (0.3 + 0.7 * Math.sin(t * Math.PI));
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const flt = ac.createBiquadFilter();
    flt.type = 'bandpass';
    flt.frequency.setValueAtTime(320, now);
    flt.frequency.exponentialRampToValueAtTime(1400, now + 0.3);
    flt.Q.value = 1.2;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.36, now + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
    src.connect(flt); flt.connect(g); g.connect(ac.destination);
    src.start(now); src.stop(now + 0.58);
    // 低音サブ
    const o = ac.createOscillator(), og = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(85, now);
    o.frequency.exponentialRampToValueAtTime(40, now + 0.4);
    og.gain.setValueAtTime(0, now);
    og.gain.linearRampToValueAtTime(0.1, now + 0.05);
    og.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    o.connect(og); og.connect(ac.destination);
    o.start(now); o.stop(now + 0.45);
  });
}

// 敵の中心から emoji パーティクルを放射
function _spawnEnemyImpactParticles(emoji, n) {
  const els = _battleEls();
  if (!els.enemy || !els.stage) return;
  const enemyRect = els.enemy.getBoundingClientRect();
  const stageRect = els.stage.getBoundingClientRect();
  const cx = enemyRect.left + enemyRect.width / 2 - stageRect.left;
  const cy = enemyRect.top + enemyRect.height / 2 - stageRect.top;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'enemy-impact-particle';
    p.textContent = emoji;
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    const angle = (i / n) * Math.PI * 2 + Math.random() * 0.4;
    const dist = 38 + Math.random() * 30;
    p.style.setProperty('--dx', (Math.cos(angle) * dist) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist) + 'px');
    els.stage.appendChild(p);
    setTimeout(() => { if (p.parentNode) p.remove(); }, 700);
  }
}

function playEnemyAttackSound() {
  if (typeof window !== 'undefined' && window.PONO_ENEMY_ATTACK_SFX) {

      a.volume = 0.55; a.play().catch(() => {});

    } catch (e) { /* fall through to synth */ }
  }
  // 合成: 低めの "ドン" (サインのピッチダウン + ノイズ衝撃)
  withAudio(ac => {
    const now = ac.currentTime;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(220, now);
    o.frequency.exponentialRampToValueAtTime(55, now + 0.18);
    g.gain.setValueAtTime(0.46, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now + 0.3);
    // ノイズ衝撃
    const bufLen = Math.floor(ac.sampleRate * 0.14);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / bufLen) * 0.85;
    const src = ac.createBufferSource(), ng = ac.createGain();
    src.buffer = buf;
    ng.gain.setValueAtTime(0.32, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    src.connect(ng); ng.connect(ac.destination);
    src.start(now); src.stop(now + 0.15);
  });
}

  setTimeout(() => {
    try { _playMagicFinisherSound(); } catch (e) {}

    try { fadeBgm(0, 300); } catch (e) {}
    try { _showDefeatedWindow(_battle.enemy && _battle.enemy.name); } catch (e) {}
    try {
      const a = playVictoryFanfare();
      let cleaned = false;
      const onEnd = () => {
        if (cleaned) return;
        cleaned = true;
        try { fadeBgm(0.28, 600); } catch (e) {}
      };
      if (a && typeof a.addEventListener === 'function') {
        a.addEventListener('ended', onEnd);
        setTimeout(onEnd, 4000);
      } else {
        setTimeout(onEnd, 1800);

    } catch (e) {}
  }, 1800);

  // 勝利後: バトル中に溜めたどんぐり + 行クリアボーナス(+5) をバトルログで一括表示。
  // ユーザー要望 (2026-04-20): モーダルではなく真ん中のバトルメッセージ欄で受け取る。

    _battle.acornsBuffered = 0;

    const messages = [
      { lines: [enemyName + 'を', '<span class="dq-line-emphasis">たおした！</span>'], opts: { line2Class: 'dmg-line' } },
      { lines: ['ごほうび！', '<span class="dq-line-emphasis">🌰 +' + total + '</span> ゲット！'], opts: { line2Class: 'dmg-line' } },
      { lines: ['よく がんばったね！', ''], opts: { line1Class: 'dq-line-emphasis' } },
    ];
    _showBattleDialog(messages, function() {

// ===== 勝利ファンファーレ (mp3 優先、未ロード時は Web Audio 合成にフォールバック) =====
// 返り値: HTMLAudioElement | undefined (mp3 の場合のみ — 呼び出し側で ended を購読できる)
function playVictoryFanfare() {
  const url = (typeof window !== 'undefined' && window.PONO_VICTORY_SFX)
    ? window.PONO_VICTORY_SFX
    : BATTLE_SFX.victory;
  if (url) {
    try {
      const a = new Audio(url);
      a.volume = 0.75;
      a.play().catch(() => {});
      return a;
    } catch (e) { /* fall through to synth */ }
  }
  withAudio(ac => {
    const now = ac.currentTime;
    // C-E-G-C-G-C 勝利モチーフ
    const notes = [
      {f: 523.25, t: 0.00, d: 0.16, g: 0.32},  // C5
      {f: 659.25, t: 0.15, d: 0.16, g: 0.32},  // E5
      {f: 783.99, t: 0.30, d: 0.16, g: 0.32},  // G5
      {f: 1046.5, t: 0.45, d: 0.32, g: 0.36},  // C6 long
      {f: 783.99, t: 0.82, d: 0.16, g: 0.30},  // G5
      {f: 1046.5, t: 0.98, d: 0.55, g: 0.40},  // C6 finale
    ];
    notes.forEach(n => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.value = n.f;
      gain.gain.setValueAtTime(0, now + n.t);
      gain.gain.linearRampToValueAtTime(n.g, now + n.t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + n.t + n.d);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(now + n.t); osc.stop(now + n.t + n.d + 0.05);
    });
  });
}

// BGM ボリュームフェード (linearRamp 風)
function fadeBgm(to, durMs) {
  const el = document.getElementById('bgm');
  if (!el) return;
  const from = Number(el.volume) || 0;
  const start = performance.now();
  const dur = Math.max(50, durMs || 400);
  cancelAnimationFrame(fadeBgm._raf || 0);
  function step(now) {
    const t = Math.min(1, (now - start) / dur);
    el.volume = from + (to - from) * t;
    if (t < 1) fadeBgm._raf = requestAnimationFrame(step);
  }
  fadeBgm._raf = requestAnimationFrame(step);
}

    var k = 'pono_played_' + new Date().toDateString();
    var a = JSON.parse(localStorage.getItem(k) || '[]');
    if (a.indexOf('writing') === -1) { a.push('writing'); localStorage.setItem(k, JSON.stringify(a)); }
  })();
  // カテゴリ全文字クリアボーナス
  const stamps = loadStamps();
  const total = CATEGORIES[currentCategory].chars.length;
  const done = Object.keys(stamps[currentCategory]).length;
  const bonusKey = 'pono_bonus_' + currentCategory;
  if (done >= total && !localStorage.getItem(bonusKey)) {
    localStorage.setItem(bonusKey, '1');
  }
}

// ===== Hanzi Writer Mode =====
function createWriter(char) {
  // Destroy previous
  if (writer) {
    writerTarget.innerHTML = '';
    writer = null;
  }
  setQuizActive(false);

  const rect = canvasContainer.getBoundingClientRect();
  const size = Math.min(rect.width, rect.height);
  currentScheme = nextColorScheme();

  currentCharData = null;
  strokeNumbers.innerHTML = '';

  // 文字ごとのミス0フラグをリセット、もんすたーさんも差し替え
  _perfectCurrentChar = true;
  _setMonsterForChar(char);

  writer = HanziWriter.create(writerTarget, char, {
    width: size,
    height: size,
    padding: 25,
    strokeColor: currentScheme.stroke,
    outlineColor: currentScheme.outline,
    drawingColor: currentScheme.drawing,
    highlightColor: currentScheme.highlight,
    radicalColor: currentScheme.stroke,
    drawingWidth: 16,
    strokeAnimationSpeed: 0.5,
    delayBetweenStrokes: 800,
    showOutline: true,
    showCharacter: false,
    charDataLoader: function(char, onComplete) {
      // Try kana-json first (for hiragana/katakana)
      const url = 'https://cdn.jsdelivr.net/gh/ailectra/kana-json@v0.0.1/data/' + char + '.json';
      fetch(url)
        .then(r => {
          if (!r.ok) throw new Error('Not found');
          return r.json();
        })
        .then(data => {
          currentCharData = data;
          showStrokeNumbers(data, size);
          onComplete(data);
        })
        .catch(() => {
          // Fallback: try hanzi-writer-data
          const url2 = 'https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + char + '.json';
          fetch(url2)
            .then(r => {
              if (!r.ok) throw new Error('Not found');
              return r.json();
            })
            .then(data => {
              currentCharData = data;
              showStrokeNumbers(data, size);
              onComplete(data);
            })
            .catch(() => {
              console.warn('No data for character:', char);
            });
        });
    }
  });

  // まずお手本を1回流してからquizモードへ
  // チュートリアル表示中はスキップ（チュートリアル終了後に実行される）
  if (!_tutorialActive && !_rowPracticeActive) {
    // チュートリアルが非表示 かつ 行練習モードでもなければ通常通りお手本→quiz
    withAudio(function(ac) {
      var now = ac.currentTime;
      var osc = ac.createOscillator(), g = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.15);
      osc.frequency.setValueAtTime(784, now + 0.3);
      g.gain.setValueAtTime(0.12, now);
      g.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
      osc.connect(g); g.connect(ac.destination);
      osc.start(now); osc.stop(now + 0.45);
    });
    _hedgeBubble.textContent = 'このじゅんばんで かくよ！';
    _ponoBubble.textContent = 'このじゅんばんで かくよ！';
    ponoHint();                    // ← ポノが「このじゅんばんで」と指さし
    document.getElementById('demoIndicator').style.display = 'block';
    writer.animateCharacter({
      onComplete: function() {
        document.getElementById('demoIndicator').style.display = 'none';
        _hedgeBubble.textContent = 'かいてみよう！';
        _ponoBubble.textContent = 'かいてみよう！';
        writer.hideCharacter();
        // 「スタート！」表示してからquiz開始
        var dim = document.getElementById('tut-dim');
        var bubble = document.getElementById('tut-bubble');
        if (dim && bubble) {
          dim.classList.remove('hidden');
          bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
          bubble.innerHTML = '<div style="font-size:1.5rem;font-weight:900;color:#F2915A;">✏️ スタート！</div>';
          bubble.classList.remove('hidden');
          setTimeout(function() {
            dim.classList.add('hidden');
            bubble.classList.add('hidden');
            startQuiz();
          }, 1000);
        } else {
          startQuiz();
        }
      }
    });
  }
  // チュートリアル表示中はお手本を待機（showTutorialのendTutで開始される）
}

// ===== Stroke Order Numbers =====
function showStrokeNumbers(charData, targetSize) {
  strokeNumbers.innerHTML = '';
  if (!charData || !charData.medians) return;

  // Wait for HanziWriter to render SVG, then use its internal transform
  setTimeout(() => {
    const svg = writerTarget.querySelector('svg');
    if (!svg) return;
    const containerRect = canvasContainer.getBoundingClientRect();

    // Find HanziWriter's top-level group (has the coordinate transform)
    const topGroup = svg.querySelector('g');
    if (!topGroup) return;

    charData.medians.forEach((median, i) => {
      if (!median || median.length === 0) return;
      const [mx, my] = median[0];

      // Use SVG's coordinate transform API for pixel-perfect positioning
      const pt = svg.createSVGPoint();
      pt.x = mx;
      pt.y = my;
      const ctm = topGroup.getScreenCTM();
      const screenPt = pt.matrixTransform(ctm);

      // Convert screen coords to container-relative percentage
      const relX = screenPt.x - containerRect.left;
      const relY = screenPt.y - containerRect.top;
      const pctX = (relX / containerRect.width) * 100;
      const pctY = (relY / containerRect.height) * 100;

      const num = document.createElement('div');
      num.className = 'stroke-number';
      num.textContent = i + 1;
      num.style.left = pctX + '%';
      num.style.top = pctY + '%';
      num.style.background = currentScheme.stroke;
      strokeNumbers.appendChild(num);
    });
  }, 200);
}

function startQuiz() {
  if (!writer) return;
  setQuizActive(true);
  writer.quiz({
    onCorrectStroke: function(data) {
      playStrokeSound();
      _hideMonsterBubble();
    },
    onComplete: function(data) {
      setQuizActive(false);
      showCompletion();
    },
    onMistake: function(data) {
      _perfectCurrentChar = false;
      _hideMonsterBubble();
    },
    showHintAfterMisses: 3,
    highlightOnComplete: true,
    highlightCompleteColor: currentScheme.stroke
  });
}

// ===== World Map Scene =====
// map.png の「一番左の森」だけを見せるため、.map-world を viewport 500% に拡大して
// 初期カメラは左端 (0%) に固定。ヒーローは森の入口、モンスターはその少し右。
// 「すすむ」ボタン連打で hero の world 内 X 座標を増やし、一定距離でモンスターと衝突 → 戦闘開始。
//
// 座標系:
//   hero / monster の left は world 内 % (0〜100 の相対値。ただし world 幅は viewport の 500%)
//   world の scroll(translateX) も viewport 幅に対する % で計算
const MAP_STATE = {
  active: false,
  hero: 6.0,       // world 内 % (森の入口=一番左寄り)
  monster: 12.0,   // 初期は勇者のすぐ右 (ぶつかるまで数歩)
  step: 2.6,       // 1 タップで進む距離 (% of world)
  collideMargin: 2.2,
  walking: false,
  walkFrame: 0,
  onCollision: null,
};
const MAP_HERO_GENDER_KEY = 'pono_hero_gender';
// 男女切替は将来 UI で追加想定。今はデフォルト男性、localStorage で上書き可能。
function _mapHeroGender() {
  try {
    var g = localStorage.getItem(MAP_HERO_GENDER_KEY);
    return (g === 'f') ? 'f' : 'm';
  } catch (e) { return 'm'; }
}
function _mapHeroFrame(kind) {
  // SPUM から書き出した勇者スプライトに差し替え (2026-04-20)。
  // 現状 1 キャラのみ。kind: 'stand' (idle) / 'walk1' / 'walk2' (歩きは同じ move を流用)。
  // 旧 hero_m/f_* ファイルは legacy 素材として残すが、実運用では参照しない。
  if (kind === 'walk1' || kind === 'walk2') {
    return '../assets/images/hero/spum/move.png';
  }
  return '../assets/images/hero/spum/idle.png';
}
function _mapMonsterSrc() {
  // 戦闘で使っているキノコ (monster_005) をそのまま縮小表示。
  return '../assets/images/monsters/chars/monster_005.png';
}
function _mapApplyTransforms() {
  var world = document.getElementById('mapWorld');
  var viewport = document.getElementById('mapViewport');
  var hero = document.getElementById('mapHero');
  var mon  = document.getElementById('mapMonster');
  if (!world || !viewport || !hero || !mon) return;
  // world 幅は viewport の 500% → 1% (world) = 0.05 * viewport width
  // カメラ: hero を viewport の 30% に置きたい
  var heroW = MAP_STATE.hero;             // world 内 %
  var monW  = MAP_STATE.monster;
  // hero の world 内 X を viewport 内 X に写像: viewportX% = heroW% * 5 - cameraShift
  // camera shift を「hero が viewport の 30% に来るように」決める
  // worldX_in_viewport_percent = heroW * 5 (world が 500% 幅なので)
  var heroViewPct = heroW * 5;
  // ただし左端クランプ: camera は世界の開始時は 0 固定 (左端は壁)
  var cameraShift = Math.max(0, heroViewPct - 30);
  // 右端クランプ: cameraShift は world 幅(500%) - viewport幅(100%) を超えない
  cameraShift = Math.min(cameraShift, 400);
  world.style.transform = 'translateX(-' + cameraShift.toFixed(2) + '%)';
  // hero / monster の world 内位置は world 要素基準 (world 内 % → 0〜100% で left)
  // world 内 0〜100% ではなく、ここでは world 幅 (=500%viewport) の何% か。
  // .map-world の width:500% 内で left:heroW% と書けば、viewport から見ると heroW*5%
  hero.style.left = heroW.toFixed(2) + '%';
  mon.style.left  = monW.toFixed(2)  + '%';
}
function openMapScene(opts) {
  opts = opts || {};
  MAP_STATE.active = true;
  MAP_STATE.hero = (opts.heroStart != null) ? opts.heroStart : 6.0;
  MAP_STATE.monster = (opts.monsterX != null) ? opts.monsterX : 12.0;
  MAP_STATE.onCollision = opts.onCollision || null;
  var hero = document.getElementById('mapHero');
  var mon  = document.getElementById('mapMonster');
  if (hero) hero.src = _mapHeroFrame('stand');
  if (mon)  mon.src  = _mapMonsterSrc();
  var scene = document.getElementById('mapScene');
  if (scene) { scene.classList.add('visible'); scene.setAttribute('aria-hidden', 'false'); }
  // マップ BGM に切替
  try { if (typeof setBgmFor === 'function') setBgmFor('map'); } catch (e) {}
  _mapApplyTransforms();
  // ボタンのハンドラは 1 回だけ登録
  var btn = document.getElementById('mapWalkBtn');
  if (btn && !btn._ponoBound) {
    btn._ponoBound = true;
    btn.addEventListener('click', mapWalkStep);
  }
  if (btn) btn.disabled = false;
}
function closeMapScene() {
  MAP_STATE.active = false;
  var scene = document.getElementById('mapScene');
  if (scene) { scene.classList.remove('visible'); scene.setAttribute('aria-hidden', 'true'); }
}
function mapWalkStep() {
  if (!MAP_STATE.active || MAP_STATE.walking) return;
  MAP_STATE.walking = true;
  var hero = document.getElementById('mapHero');
  MAP_STATE.walkFrame = (MAP_STATE.walkFrame + 1) % 2;
  if (hero) hero.src = _mapHeroFrame(MAP_STATE.walkFrame ? 'walk1' : 'walk2');
  MAP_STATE.hero += MAP_STATE.step;
  // クランプ: world は 100%、モンスターを越えないように (衝突で止める)
  if (MAP_STATE.hero >= MAP_STATE.monster - MAP_STATE.collideMargin) {
    MAP_STATE.hero = MAP_STATE.monster - MAP_STATE.collideMargin;
    _mapApplyTransforms();
    setTimeout(_mapCollide, 320);
    return;
  }
  _mapApplyTransforms();
  setTimeout(function() {
    if (hero) hero.src = _mapHeroFrame('stand');
    MAP_STATE.walking = false;
  }, 280);
}
function _mapCollide() {
  // フラッシュを出してから戦闘開始
  var viewport = document.getElementById('mapViewport');
  if (viewport) {
    var flash = document.createElement('div');
    flash.className = 'map-collide-flash';
    viewport.appendChild(flash);
    setTimeout(function() { if (flash.parentNode) flash.remove(); }, 700);
  }
  var btn = document.getElementById('mapWalkBtn');
  if (btn) btn.disabled = true;
  setTimeout(function() {
    closeMapScene();
    var cb = MAP_STATE.onCollision;
    MAP_STATE.onCollision = null;
    MAP_STATE.walking = false;
    if (typeof cb === 'function') { try { cb(); } catch (e) {} }
  }, 600);
}
window.openMapScene = openMapScene;

// マップシーン表示 → タップで次へ → バトル登場 (onDone) へ。
// 2026-04-20: background-image 方式では縦横のスケールがブラウザ依存で
// ずれて「勇者がマップの下に外れる」現象が発生した。明示的な <img> +
// 数値 translate に切り替え、hero 足元 (画面 50%, 62%) に scene の
// (xPct, yPct) 点を合わせる。ビューポートがどんなアスペクト比でも
// 勇者は常に道の上に立つ。
function _showMapScene(rowId, onDone) {
  try { setBgmFor('map'); } catch (e) {}
  const scene = MAP_ROW_SCENES[rowId] || MAP_ROW_SCENES['あ'];
  const overlay = document.createElement('div');
  overlay.className = 'map-scene-overlay';
  const viewport = document.createElement('div');
  viewport.className = 'map-scene-viewport';
  const bgImg = document.createElement('img');
  bgImg.className = 'map-scene-bg-img';
  bgImg.alt = '';
  bgImg.src = '../assets/images/maps/map_A.png';
  // viewport 側に (mx, my) を持たせる (bg と hero の両方が同じ変数を読む)
  viewport.style.setProperty('--mx', scene.xPct);
  viewport.style.setProperty('--my', scene.yPct != null ? scene.yPct : 50);
  const title = document.createElement('div');
  title.className = 'map-scene-title';
  title.textContent = scene.title;
  const hero = document.createElement('div');
  hero.className = 'map-scene-hero hero-sprite move pulse';
  // hero は画面の (50%, 62%) に立つ (CSS で left:50%, bottom:38%)。
  // translateX(-50%) で要素中心を left:50% に揃えつつ、scaleX(-1) で右向き反転。
  hero.style.transform = 'translateX(-50%) scaleX(-1)';
  const hint = document.createElement('div');
  hint.className = 'map-scene-hint';
  hint.textContent = '▼ タップで すすむ';
  viewport.appendChild(bgImg);
  viewport.appendChild(hero);
  overlay.appendChild(viewport);
  overlay.appendChild(title);
  overlay.appendChild(hint);
  document.body.appendChild(overlay);

  // 位置/サイズは全て CSS 側 (vh/vw + CSS 変数) で決まる。JS による測定は不要。
  requestAnimationFrame(function() { overlay.classList.add('show'); });

  const minShowUntil = Date.now() + 500;
  const handler = function(ev) {
    if (Date.now() < minShowUntil) return;
    ev.preventDefault(); ev.stopPropagation();
    overlay.removeEventListener('pointerdown', handler);
    overlay.classList.add('fade-out');
    overlay.classList.remove('show');
    setTimeout(function() {
      if (overlay.parentNode) overlay.remove();
      if (onDone) onDone();
    }, 420);
  };
  overlay.addEventListener('pointerdown', handler);
}

// 勇者の戦闘中アニメ class を差し替えるヘルパ。
// kind: 'idle' | 'move' | 'attack-magic' | 'attack-normal' | 'concentrate' | 'damaged'
function _setHeroAnim(kind) {
  const el = document.getElementById('battleHero');
  if (!el) return;
  // 既存の hero-sprite class は残し、アニメ class のみ入れ替え
  el.classList.remove('idle', 'move', 'attack-magic', 'attack-normal', 'concentrate', 'damaged');
  el.classList.add(kind);
  // CSS の keyframes を再生させるため、background-position を reset するトリック
  void el.offsetWidth;
}

function _rowPracticeNextChar() {
  if (!_rowPracticeRow) { _rowPracticeActive = false; return; }
  if (_rowPracticeStep >= _rowPracticeRow.count) {
    _rowPracticeComplete();
    return;
  }
  const globalIdx = _rowPracticeRow.start + _rowPracticeStep;
  currentCharIndex = globalIdx;
  loadCharacter();

  // Phase 1: Demo (skip if tutorial is active — tutorial handles the first demo)
  _rowPracticePhase = 'demo';
  setTimeout(function() {
    if (!writer || !_rowPracticeActive || _tutorialActive) return;
    document.getElementById('demoIndicator').style.display = 'block';
    _hedgeBubble.textContent = 'みて みて！';
    _ponoBubble.textContent = 'みて みて！';
    // バトル中はログウィンドウにもフェーズを反映
    if (_battle.active) _setBattleLog(['おてほんちゅう…', 'じゅんばんを おぼえよう']);
    writer.animateCharacter({
      onComplete: function() {
        document.getElementById('demoIndicator').style.display = 'none';
        if (!_rowPracticeActive) return;
        // 「なぞり スタート！」— バトル中はログに、それ以外は従来のフロート表示
        writer.hideCharacter();
        var startOv = null;
        if (_battle.active) {
          _setBattleLog(['なぞり スタート！', 'ゆびで なぞってね'], { line1Class: 'dmg-line' });
        } else {
          startOv = document.createElement('div');
          startOv.style.cssText = 'position:fixed;inset:0;z-index:1100;display:flex;align-items:center;justify-content:center;pointer-events:none;';
          startOv.innerHTML = '<div style="font-size:1.8rem;font-weight:900;color:#F2915A;background:rgba(255,255,255,0.9);padding:14px 32px;border-radius:24px;box-shadow:0 4px 20px rgba(242,145,90,0.3);animation:fadeIn 0.3s ease;">✏️ なぞり スタート！</div>';
          document.body.appendChild(startOv);
        }
        setTimeout(function() {
          if (startOv) startOv.remove();
          if (!_rowPracticeActive) return;
          // Phase 2: Quiz with guides
          _rowPracticePhase = 'quiz_guided';
          _hedgeBubble.textContent = 'かいてみよう！';
          _ponoBubble.textContent = 'かいてみよう！';
          if (_battle.active) _setBattleLog(['かいてみよう！', 'もじを かんせいさせよう']);
          setQuizActive(true);
          writer.quiz({
            onCorrectStroke: function() {
              _hideMonsterBubble();
              // バトル中はユーザー指定の nazori01.mp3 を鳴らす。非バトルは従来の playStrokeSound。
              if (_battle.active) {
                try { playNazoriSound(); } catch (e) {}
              } else {
                playStrokeSound();
              }
              try { flashLastStroke(); } catch (e) {}
            },
            onMistake: function() { _perfectCurrentChar = false; _hideMonsterBubble(); },
            onComplete: function() {
            setQuizActive(false);
            if (!_rowPracticeActive) return;
            playSuccessSound();
            // バトル中は confetti / 妖精ポップ (🌰ドロップ) を抑制する。
            // (2026-04-20 ユーザー要望: バトル中にどんぐりが出てくる → 勝利時にまとめて表示のみ)
            const _inBattle = !!(_battle && _battle.active);
            if (!_inBattle) launchConfetti();
            saveStamp(currentCategory, currentCharIndex);
            markCharDone(currentCharIndex);
            if (!_inBattle) _playMonsterPop();
            _awardAcorns(_perfectCurrentChar);
            if (window.incrementStat) {
              window.incrementStat('writing_chars', 1);
              if (currentCategory === 'hiragana') window.incrementStat('writing_hiragana', 1);
              if (currentCategory === 'katakana') window.incrementStat('writing_katakana', 1);
            }
            // === バトル分岐 ===
            const isFinisher = _rowPracticeRow && (_rowPracticeStep === (_rowPracticeRow.count - 1));
            // Phase 3-4 を後でまとめて呼び出せるように関数化
            const startWordPhases = function() {
              _rowPracticePhase = 'show_word';
              const data = WORD_DATA[currentCategory][currentCharIndex];
              const char = CATEGORIES[currentCategory].chars[currentCharIndex];
              if (data && data.word) {
                _showRowPracticeWord(char, data, function() {
                  _rowPracticePhase = 'quiz_free';
                  _hedgeBubble.textContent = 'ことばで かこう！';
                  _ponoBubble.textContent = 'ことばで かこう！';
                  _startWordContextPhase(char, data, function() {
                    _rowPracticeStep++;
                    _rowPracticeNextChar();
                  });
                });
              } else {
                // No word data (を, ん) — skip word phase
                setTimeout(function() {
                  _rowPracticeStep++;
                  _rowPracticeNextChar();
                }, 1200);
              }
            };

            if (isFinisher && _battle.active) {
              // 5文字目: Phase 3-4 をスキップして勝利フローへ
              try {
                battleVictory('fire', function() {
                  _rowPracticeStep++;
                  _rowPracticeNextChar();
                });
              } catch (e) {
                _rowPracticeStep++;
                _rowPracticeNextChar();
              }
              return;
            }

            if (_battle.active) {
              // バトル中は「ことばモーダル (アリのア〜, カーテンのカ〜)」「音声読み上げ」「ことばで書く」phase を
              // すべてスキップし、1 回のなぞり = 1 回の攻撃で次の文字へ進める。
              try { battleHitEnemy({ finisher: false }); } catch (e) {}
              // 魔法動画は ~3.2s 出るので、敵の反撃はその後に十分な間を空けて出す。
              // 反撃は「〇〇の こうげき！」告知 (~1.2s) → ダメージ演出 (~2.75s) → なので
              // t=2200 で告知、t=~3400 で攻撃、t=~6150 でダメージ消え、t=6800 で次の文字。
              setTimeout(function() { try { enemyCounterAttack(); } catch (e) {} }, 2200);
              setTimeout(function() {
                _rowPracticeStep++;
                _rowPracticeNextChar();
              }, 6800);
            } else {
              startWordPhases();
            }
          },
          showHintAfterMisses: 3,
          highlightOnComplete: true,
          highlightCompleteColor: currentScheme.stroke
        });
        }, 1000); // なぞりスタート表示時間
      }
    });
  }, 500);
}
