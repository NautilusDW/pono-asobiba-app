/* =====
   ランドスケープ + バトル中 (2026-04-21 v259):
   ユーザー要望「横画面のバトルシーンを作り直す」
   - 左 50vw : バトルステージ (上) + バトルログ (下)
   - 右 50vw : なぞりキャンバス
   battle-mode でない通常練習 (非バトル) は既存のランドスケープレイアウトのまま。
   ===== */
@media (orientation: landscape) {
  /* v264: canvas と左側 (battle-stage + log) を縦位置で揃える。
     canvas は min(92vh, 46vw) の正方形。これを var に入れて、stage/log の
     top/bottom を canvas の上辺/下辺と一致させる。さらに「う」改行対策で
     左余白を 48px に詰め、幅を広げる。 */
  body.battle-mode {
    --battle-vspan: min(92vh, 46vw);
    --battle-vtop: calc((100vh - var(--battle-vspan)) / 2);
  }
  body.battle-mode .battle-stage,
  body.battle-mode .puzzle-stage {
    position: fixed !important;
    left: 48px;
    /* 2026-04-22 v3: stage と log の間に余白を空ける。
       stage top = 0.08, stage height = 0.58 → stage bottom = 0.66
       log top は 0.76 のままなので、間に 0.10 * vspan のギャップ。 */
    top: calc(var(--battle-vtop) + var(--battle-vspan) * 0.08);
    width: calc(50vw - 54px);
    height: calc(var(--battle-vspan) * 0.58);
    max-width: none; max-height: none;
    min-height: 0;
    margin: 0;
    border-radius: 14px;
    border-width: 2.5px;
    z-index: 500;
  }
  body.battle-mode .battle-enemy {
    width: min(22vh, 120px);
    height: min(22vh, 120px);
  }
  /* 2026-04-22: あ行 着地済みの敵が横画面で大きすぎる指摘 → 縮小 (46vh/280px → 34vh/200px)。 */
  body.battle-mode .battle-enemy.grounded {
    width: min(34vh, 200px);
    height: min(34vh, 200px);
    max-width: 200px; max-height: 200px;
  }
  /* 2026-04-23 v3: キノコ (compact) は縦画面と同じピクセルサイズまで縮小。
     縦画面 86px に対し横画面が明らかに大きく見える指摘を受けて、
     max を 86px で固定 (ユーザー指摘 3回目)。 */
  body.battle-mode .battle-enemy.grounded.compact {
    width: min(14vh, 86px);
    height: min(14vh, 86px);
    max-width: 86px; max-height: 86px;
  }
  /* 2026-04-23 v3: 敵名ラベルも縦画面比率 (0.78rem) に揃える。1rem は大きすぎる。 */
  body.battle-mode .enemy-name { font-size: 0.78rem; }
  body.battle-mode .pentagram-charge { font-size: 1.15rem; }

  /* 2026-04-22: 横画面の HP/MP ウィンドウが大きすぎる指摘 → 明示的に抑える。 */
  body.battle-mode .hero-status {
    min-width: 104px;
    padding: 3px 6px;
    font-size: 0.62rem;
    gap: 2px;
  }
  body.battle-mode .hero-status-bar-wrap { height: 6px; }
  body.battle-mode .hero-status-num { font-size: 0.78em; }

  /* バトルログは battle-stage / puzzle-stage の直下、canvas の下辺まで。
     2026-04-22: タップボタンを log の外 (下) に出すため log を上げて、
     下に button 用のスペース 0.10*vspan を確保。 */
  body.battle-mode:not(.battle-intro-active) .battle-log-window {
    position: fixed !important;
    left: 48px;
    top: calc(var(--battle-vtop) + var(--battle-vspan) * 0.72);
    bottom: auto;
    width: calc(50vw - 54px);
    height: calc(var(--battle-vspan) * 0.18);
    max-width: none;
    margin: 0;
    z-index: 500;
    padding: 0;
    box-sizing: border-box;
    display: flex;
    align-items: stretch;
    justify-content: stretch;
  }
  body.battle-mode:not(.battle-intro-active) .battle-log-window .battle-log-inner {
    width: 100%;
    box-sizing: border-box;
    min-height: 100%;
    /* 2026-04-22: log を縦に縮めた分、padding も 14 → 8 に軽量化。 */
    padding: 8px 18px;
  }

  /* 2026-04-23: タップボタンを画面中央下端に配置し、サイズもコンパクトに。
     (ユーザー指摘: もっと小さく & 画面中央の一番下に) */
  body.battle-mode:not(.battle-intro-active) .battle-log-window .battle-log-advance {
    position: fixed !important;
    left: 50vw;
    top: auto;
    right: auto;
    bottom: max(10px, env(safe-area-inset-bottom));
    padding: 4px 14px 4px 10px;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    z-index: 520;
    transform: translateX(-50%);
  }
  body.battle-mode:not(.battle-intro-active) .battle-log-window .battle-log-advance::before {
    font-size: 0.95rem;
  }
  body.battle-mode:not(.battle-intro-active) .battle-log-window.await-tap .battle-log-advance {
    animation: battleLogAdvanceBounceH 0.8s ease-in-out infinite;
  }
  /* 横画面は横幅に余裕があるので 1 行で収まるようフォント少し抑えめ +
     letter-spacing ゼロで「う」が折り返さないようにする。 */
  body.battle-mode .battle-log-window .battle-log-line {
    font-size: clamp(0.95rem, 1.9vh, 1.15rem);
    line-height: 1.45;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  /* right-col を右半分にロック。mid-col は右上に退避させるので flex row 的には右-col が拡がる */
  body.battle-mode .right-col {
    flex: 0 0 50vw;
    max-width: 50vw;
    min-width: 50vw;
    margin-left: auto;
  }
  /* 2026-04-22 v3: 左 stack の縦範囲 = vtop + 0.08*vspan 〜 vtop + 1.0*vspan (= 0.92*vspan)。
     canvas を正方形のまま左 stack と同サイズに揃える。
     flex の justify-content:center は (canvas + margin) を合成で中央寄せするので、
     margin-top 0.08*vspan を指定すると実質 canvas center = stack center で揃う。 */
  body.battle-mode .canvas-container {
    width: calc(var(--battle-vspan) * 0.92);
    height: calc(var(--battle-vspan) * 0.92);
    margin-top: calc(var(--battle-vspan) * 0.08);
    border-radius: 14px;
    border-width: 2.5px;
  }

  /* mid-col (コントロール列) はバトル中は右上に小さく退避。
     左半分はステージ/ログが占有するため、通常位置にあると被る。 */
  body.battle-mode .mid-col {
    position: fixed;
    top: 8px;
    right: 8px;
    width: auto;
    padding: 2px;
    z-index: 1200;
    background: rgba(2, 2, 8, 0.55);
    border-radius: 8px;
  }
  body.battle-mode .mid-col .ctrl-btn {
    padding: 8px 10px;
    font-size: 0.75rem;
    min-width: 60px;
  }

  /* progress-hint は右半分の上部に */
  body.battle-mode .progress-hint {
    max-width: 46vw;
  }
}

/* ===== World Map Scene (バトル開始前の探索画面) =====
   map.png は 1536x1024 の横長フィールド。5〜6 画面分スクロールさせるため
   `.map-world` を viewport の 500% 幅に伸ばし、camera (translateX) で追尾する。
   pixelated レンダリングでピクセルアートのエッジを保つ。 */
/* マップ画面は 2026-04-20 に廃止。DOM/CSS/JS は残骸として残るが、
   導線から切り離した。display: none を強制して万一呼ばれても出ないように。 */
#mapScene,
#mapScene.visible {
  display: none !important;
}
.map-viewport {
  position: relative;
  width: 100%;
  flex: 1 1 auto;
  overflow: hidden;
  background: #000;
}
.map-world {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  /* 5 画面分スクロール相当: 500% 幅に引き伸ばし */
  width: 500%;
  background-image: url('../assets/images/battle/bg/map.png');
  background-repeat: no-repeat;
  background-position: left center;
  background-size: 100% 100%;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  will-change: transform;
  transition: transform 0.28s cubic-bezier(0.3, 0.7, 0.4, 1);
}
.map-actor {
  position: absolute;
  bottom: 14%;
  width: 10%;
  max-width: 90px; min-width: 48px;
  height: auto;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  pointer-events: none;
  transform: translateX(-50%);
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.55));
}
.map-actor.map-hero {
  z-index: 3;
  /* SPUM スプライトは 2048x2048 正方形で周囲に透明余白があるため、
     旧 227x343 の勇者絵より相対的に小さく見える。サイズを 1.6 倍程度に拡張。 */
  width: 16%;
  max-width: 150px; min-width: 76px;
  animation: mapHeroBob 1.2s ease-in-out infinite;
}
.map-actor.map-monster {
  z-index: 2;
  width: 7%;
  max-width: 72px; min-width: 40px;
  animation: mapMonsterBob 1.8s ease-in-out infinite;
}
@keyframes mapHeroBob {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(-3px); }
}
@keyframes mapMonsterBob {
  0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
  50%      { transform: translateX(-50%) translateY(-2px) scale(1.04); }
}
/* 移動ボタン */
.map-controls {
  flex: 0 0 auto;
  width: 100%;
  padding: 14px 20px 22px;
  display: flex; justify-content: center; align-items: center;
  gap: 14px;
  background: linear-gradient(180deg, rgba(15,10,25,0.0) 0%, rgba(10,10,25,0.85) 40%, rgba(10,10,25,0.95) 100%);
}
.map-walk-btn {
  padding: 16px 42px;
  border: 3px solid #FFD86A;
  border-radius: 999px;
  background: linear-gradient(135deg, #F2915A, #EC4899);
  color: #fff;
  font-family: inherit; font-weight: 900; font-size: 1.2rem;
  letter-spacing: 0.12em;
  box-shadow: 0 6px 18px rgba(236,72,153,0.45), inset 0 0 10px rgba(255,216,106,0.35);
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
.map-walk-btn:active { transform: scale(0.94); }
.map-walk-btn:disabled { opacity: 0.55; cursor: default; transform: none; }
.map-hud {
  position: absolute; top: 10px; left: 10px; right: 10px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none; z-index: 5;
  font-size: 0.85rem; font-weight: 900; color: #fff;
  text-shadow: 0 0 4px #000, 0 0 8px rgba(0,0,0,0.9);
  letter-spacing: 0.08em;
}
.map-collide-flash {
  position: absolute; inset: 0; z-index: 10;
  background: radial-gradient(circle at center, rgba(255,255,255,0.95) 0%, rgba(255,216,106,0.7) 25%, rgba(0,0,0,0) 70%);
  opacity: 0; pointer-events: none;
  animation: mapCollideFlash 0.65s ease-out forwards;
}
@keyframes mapCollideFlash {
  0%   { opacity: 0; transform: scale(0.4); }
  40%  { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(1.6); }
}
@media (prefers-reduced-motion: reduce) {
  .map-actor.map-hero, .map-actor.map-monster { animation: none !important; }
  .map-world { transition: none !important; }
  .map-collide-flash { animation: none !important; }
}

/* ===== Portrait Lock (無効化) =====
   元々は landscape 推奨のために表示していたが、portrait レイアウトも整備済みなので常時非表示。
   PC ブラウザの縦長ウィンドウで誤発火するのを防ぐ。 */
#portraitLock { display:none !important; }

/* ===== 紙芝居 (オープニング/エンディング) =====
   _showStoryboard(scenes, onDone) で動的生成される全画面オーバーレイ。
   背景は scene.bg (gradient or image path) で差し替え可能 → 後日 assets/images/story/*.png 等で上書き予定。
*/
.storyboard-overlay {
  position: fixed; inset: 0;
  /* 2026-04-22: #titleScreen (9998) / #splashScreen (10000) より必ず上にくるよう
     10010 に引き上げ。以前は 9990 で title の裏に回り「はじめから押下後 無反応」
     の直接原因になっていた。 */
  z-index: 10010;
  display: block;   /* フル画面 art の直子として扱うので flex 解除 */
  cursor: pointer;
  opacity: 1;
  background: #000;
  transition: opacity 0.5s ease, background 0.6s ease;
  overflow: hidden;
}
.storyboard-overlay.fade-out { opacity: 0; pointer-events: none; }

/* 2026-04-23: 画像は フルスクリーン・object-fit: contain で切り取らず
   全体を見せる。黒帯は overlay の background:#000 がそのまま背景になる。 */
.storyboard-art {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(4rem, 30vmin, 14rem);   /* 絵文字フォールバック時のサイズ */
  overflow: hidden;
}
/* 2026-04-23: 縦画面は contain で絵を切らずに全体表示 (上下に黒帯許容)。
   横画面は viewport が広すぎて contain だと左右に黒帯+絵が小さくなるので
   cover に切り替え、上下を少し切って画面いっぱいにする
   (下部にテキストボックスが乗ることを考慮し、下がやや切れるのは許容)。 */
.storyboard-art img {
  width: 100%; height: 100%;
  object-fit: contain;
  object-position: center;
  display: block;
}
@media (orientation: landscape) {
  .storyboard-art img {
    object-fit: cover;
    /* テキストは画面下部に乗るので、切る位置を少し上寄りにして
       被写体 (絵の中心〜上半分) が隠れにくいように。 */
    object-position: center 35%;
  }
}

/* 2026-04-23: シーン個別のパン (縦横比が極端なパノラマ画像用)。
   object-fit は cover 固定、object-position をアニメで移動させる。
   - sb-pan-down: 上→下 (OP_S01_C02 の王国遠景など)
   - sb-pan-up:   下→上 (OP_S08 の旅立ち見上げなど)
   - sb-pan-right: 左→右 (2026-04-24 追加、S5c のパノラマ画像用)
   - sb-pan-left:  右→左 (2026-04-24 追加、S5c 2枚目でバリエーション) */
.storyboard-art img.sb-pan-down {
  object-fit: cover;
  object-position: center 0%;
  animation: sbPanDown 9s linear forwards;
}
.storyboard-art img.sb-pan-up {
  object-fit: cover;
  object-position: center 100%;
  /* 2026-04-23: S8 最終カットは余韻を残したいのでゆっくり (9s → 16s) 上にパン。 */
  animation: sbPanUp 16s linear forwards;
}
.storyboard-art img.sb-pan-right {
  object-fit: cover;
  object-position: 0% center;
  animation: sbPanRight 10s linear forwards;
}
.storyboard-art img.sb-pan-left {
  object-fit: cover;
  object-position: 100% center;
  animation: sbPanLeft 10s linear forwards;
}
@media (orientation: landscape) {
  .storyboard-art img.sb-pan-down,
  .storyboard-art img.sb-pan-up,
  .storyboard-art img.sb-pan-left,
  .storyboard-art img.sb-pan-right {
    object-fit: cover;
  }
}
/* 2026-04-23 v3: 縦画面で pan 付きシーン (S1b / S8) を 16:9 レターボックス化。
   以前の absolute + translate アプローチは効かなかったため、
   親の flex centering を活かしてシンプルに幅/高さを 16:9 に固定する方式に変更。
   親 .storyboard-art は flex + align/justify center なので、サイズさえ絞れば
   自動で中央配置 + 上下に背景色 (#000) の黒帯が出る。!important で
   他のルールとの敗北を防止。 */
@media (orientation: portrait) {
  .storyboard-art img.sb-pan-down,
  .storyboard-art img.sb-pan-up,
  .storyboard-art img.sb-pan-left,
  .storyboard-art img.sb-pan-right {
    width: 100vw !important;
    height: 56.25vw !important;           /* 16:9 レターボックス */
    max-width: 100vw !important;
    max-height: 100vh !important;
    object-fit: cover !important;
    flex: 0 0 auto;
  }
}
@keyframes sbPanDown {
  from { object-position: center 0%; }
  to   { object-position: center 100%; }
}
@keyframes sbPanUp {
  from { object-position: center 100%; }
  to   { object-position: center 0%; }
}
@keyframes sbPanRight {
  from { object-position: 0% center; }
  to   { object-position: 100% center; }
}
@keyframes sbPanLeft {
  from { object-position: 100% center; }
  to   { object-position: 0% center; }
}
/* 2026-04-23 v2: S2a (姫様 & ペット) のようなじっくり見せたいカット用の
   ゆっくりズームイン。中心からじわっと被写体に近づく動き。 */
.storyboard-art img.sb-zoom-in-slow {
  animation: sbZoomInSlow 14s ease-out forwards;
  transform-origin: center 45%;
}
@keyframes sbZoomInSlow {
  from { transform: scale(1.00); }
  to   { transform: scale(1.15); }
}
/* 2026-04-23: S2b (人々と姫) 用のゆっくりドリーアウト。
   S2a (zoom-in-slow) の真逆で、寄った状態からじわっと引いて全景を見せる。 */
.storyboard-art img.sb-zoom-out-slow {
  animation: sbZoomOutSlow 14s ease-out forwards;
  transform-origin: center 45%;
}
@keyframes sbZoomOutSlow {
  from { transform: scale(1.15); }
  to   { transform: scale(1.00); }
}

/* 2026-04-23: ドラクエ風メッセージボックス。
   - 高さは内容に合わせて可変 (1 行の文は 1 行分、2 行の文は 2 行分)
   - 3 行以上のテキストはページネーションで 2 行ずつ切り替え (JS 側)
   - タップボタンは小さな ▼ 点滅マーカー (ボックス右下) に縮小。 */
.storyboard-text {
  position: absolute;
  left: 0; right: 0;
  margin: 0 auto;
  bottom: clamp(10px, 3.5vh, 40px);
  width: min(92vw, 900px);
  box-sizing: border-box;
  padding: 12px 22px 18px 22px;
  background: rgba(0, 0, 0, 0.78);
  border: 3px solid #fff;
  border-radius: 6px;
  box-shadow: 0 0 0 3px rgba(0,0,0,0.9), 0 6px 20px rgba(0,0,0,0.7);
  color: #fff;
  font-family: 'DotGothic16', 'Zen Maru Gothic', sans-serif;
  font-weight: 400;
  font-size: clamp(1.1rem, 4.2vw, 1.55rem);
  line-height: 1.55;
  letter-spacing: 0.06em;
  text-align: left;
  image-rendering: pixelated;
  -webkit-font-smoothing: none;
  font-smoothing: none;
  /* 高さが変わる時に急に伸び縮みしないよう滑らかに補間 */
  transition: min-height 0.2s ease;
}
/* ▼ マーカー (次ページ / 次シーン待ち)。タイプ中は非表示。 */
.storyboard-hint {
  position: absolute;
  right: 14px;
  bottom: 6px;
  color: #ffd84d;
  font-family: 'DotGothic16', 'Zen Maru Gothic', sans-serif;
  font-size: 1.1rem;
  line-height: 1;
  letter-spacing: 0;
  opacity: 0;
  transition: opacity 0.2s ease;
}
.storyboard-hint.visible {
  opacity: 1;
  animation: sbHintBlink 0.7s steps(2, end) infinite;
}
@keyframes sbHintBlink {
  0%, 49%  { opacity: 1; transform: translateY(0); }
  50%,100% { opacity: 0.3; transform: translateY(2px); }
}
/* 2026-04-23: 物語演出のための長めの cross-fade。
   絵は ゆっくり浮かび上がり (0.8s) / ゆっくり消えゆく (0.55s) で余韻を残す。
   文字は絵より少し遅れて (0.25s) 入ってくる。 */
.storyboard-art.sb-in { animation: sbArtIn 0.85s ease-out both; }
.storyboard-text.sb-in { animation: sbContentIn 0.6s ease-out both; animation-delay: 0.25s; }
.storyboard-art.sb-out { animation: sbArtOut 0.55s ease-in both; }
.storyboard-text.sb-out { animation: sbContentOut 0.35s ease-in both; }
@keyframes sbArtIn {
  from { opacity: 0; transform: scale(1.02); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes sbArtOut {
  from { opacity: 1; transform: scale(1); }
  to   { opacity: 0; transform: scale(1.02); }
}
@keyframes sbContentIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: none; }
}
@keyframes sbContentOut {
  from { opacity: 1; transform: none; }
  to   { opacity: 0; transform: translateY(-8px); }
}
@keyframes sbHintPulse {
  0%, 100% { opacity: 0.45; }
  50%      { opacity: 1; }
}
</style>

}
function saveStamp(category, index) {

  const data = MILESTONES[(count / 5 - 1) % MILESTONES.length];

// AudioContextをページロード時に即生成（suspendedだが存在はする）
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function getAudioCtx() { return audioCtx; }
function withAudio(fn) {
  const ctx = getAudioCtx();
  if (ctx.state === 'running') { fn(ctx); return; }
  ctx.resume().then(() => fn(ctx)).catch(() => {});
}
// iOS/Android: 最初のタッチでAudioContextを即座にアクティブにする
// resume()は非同期なので、無音オシレータを鳴らして強制的にrunning状態にする
function unlockAudio() {
  const ac = getAudioCtx();
  ac.resume().catch(() => {});
  if (ac.state !== 'running') {
    // 無音オシレータで即アクティブ化
    try {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      gain.gain.value = 0;
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.001);
    } catch(e) {}
  }
}

  withAudio(ac => {
    const now = ac.currentTime;
    const osc = ac.createOscillator(), gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(now); osc.stop(now + 0.15);
  });

// ===== SE 再生プール =====
// new Audio() を毎回作ると (a) 初回の fetch で遅延・ドロップが起きる (b) iOS Safari が
// 複数同時再生を throttle する。URL ごとに固定プールを持ち preload しておくと安定する。
// さらにクエリ (?v=...) で HTTP キャッシュを強制的に新しい mp3 に向ける (同名ファイルの
// 旧バイナリが SW/HTTP キャッシュから出てくるのを防ぐ)。
const _SFX_CACHE_BUST = 'v257';
const _SFX_POOL_SIZE = 3;
const _sfxPool = Object.create(null);
// iOS PWA: 各 new Audio() インスタンスは user gesture 中に .play() を 1 回呼ばないと
// 後から (非 gesture context で) play しても無音になる。_unlockSfxAll で全プールを一括解錠する。
let _sfxUnlocked = false;
function _sfxVer(url) {
  if (!url) return url;
  return url + (url.indexOf('?') >= 0 ? '&' : '?') + _SFX_CACHE_BUST;
}
// Audio 1 要素を iOS 向けに「完全無音で解錠」する。
// muted=true + volume=0 の両方を必ず設定してから play() → 即 pause → 復元。
// (volume=0 だけでは .play() の瞬間に一瞬音が出るブラウザがあるため muted 併用)
function _sfxSilentUnlockOne(a) {
  if (!a || a._unlocked) return;
  a._unlocked = true;
  // iOS の user-gesture unlock は muted=true + volume=0 の状態で .play()→.pause()。
  // 解錠後も muted=true を維持し、playSfx 側で unmute + 正式 volume を設定する。
  // 以前は p.then で muted/volume を即座に復元していたが、pause 前のごく短い
  // 瞬間にプールの各 Audio が可聴ブリップを漏らし、「SE が一斉に鳴る」症状に
  // なっていたので、mute を維持する方式に変更。
  try { a.muted = true; } catch (e) {}
  try { a.volume = 0; } catch (e) {}
  try {
    const p = a.play();
    const stop = () => {
      try { a.pause(); } catch (e) {}
      try { a.currentTime = 0; } catch (e) {}
      // muted=true / volume=0 は意図的に維持する (playSfx が戻す)。
    };
    if (p && typeof p.then === 'function') {
      p.then(stop).catch(stop);
    } else {
      stop();
    }
  } catch (e) { /* ignore */ }
}
function _sfxEnsurePool(url) {
  let pool = _sfxPool[url];
  if (pool) return pool;
  pool = [];
  const versioned = _sfxVer(url);
  for (let i = 0; i < _SFX_POOL_SIZE; i++) {
    try {
      const a = new Audio(versioned);
      a.preload = 'auto';
      a.volume = 0.9;
      try { a.load(); } catch (e) {}
      pool.push(a);
    } catch (e) { /* ignore */ }
  }
  _sfxPool[url] = pool;
  // 解錠済みなら新規プールも即解錠 (user gesture context 中の初回参照に備えて)
  if (_sfxUnlocked) {
    pool.forEach(a => _sfxSilentUnlockOne(a));
  }
  return pool;
}
// iOS PWA で効果音を鳴らすには、user gesture 中に各 Audio 要素を .play() する必要がある。
// ただし .play() の瞬間に音が出てしまわないよう muted=true + volume=0 で完全無音化してから
// play → pause → 復元する。初回 pointerdown で critical SFX を先行作成+解錠。
function _unlockSfxAll() {
  if (_sfxUnlocked) return;
  _sfxUnlocked = true;
  try { _sfxEnsurePool('../assets/sounds/se/battle/nazori_01.mp3'); } catch (e) {}
  try { _sfxEnsurePool('../assets/sounds/se/battle/enemy_defeat_2.mp3'); } catch (e) {}
  try { _sfxEnsurePool('../assets/sounds/se/battle/victory_fanfare.mp3'); } catch (e) {}
  Object.keys(_sfxPool).forEach(url => {
    _sfxPool[url].forEach(a => _sfxSilentUnlockOne(a));
  });
}
document.addEventListener('touchstart', _unlockSfxAll, { capture: true, passive: true });
document.addEventListener('pointerdown', _unlockSfxAll, { capture: true });
function playSfx(url, volume) {
  if (!url) return null;
  const pool = _sfxEnsurePool(url);
  if (!pool.length) return null;
  // 空いている (ended/paused) ものを優先、なければ最古を奪う。
  let pick = pool.find(a => a.ended || a.paused) || pool[0];
  try {
    pick.currentTime = 0;
    try { pick.muted = false; } catch (e) {}
    pick.volume = (typeof volume === 'number') ? volume : 1;
    const p = pick.play();
    if (p && typeof p.catch === 'function') p.catch(() => {});
  } catch (e) { /* ignore */ }
  return pick;
}

// 直前に描いた 1 画だけを一瞬光らせる。画面全体フラッシュではなく書き取りキャンバス内に留める。
// 1. 最新の <path> (= 直前に描かれたストローク) に .stroke-just-lit を付与 → CSS アニメで
//    drop-shadow を段階強化 → blur(0.3px) で若干エッジをやわらげ加算的にふわっと光らせる。
// 2. canvas-container に screen ブレンドのソフトハローを 1 枚重ねて加算光を演出。
function flashLastStroke() {
  try {
    var target = document.getElementById('writerTarget');
    if (!target) return;
    var strokeCount = 0;
    var svg = target.querySelector('svg');
    if (svg) {
      var paths = svg.querySelectorAll('path');
      if (paths && paths.length) {
        strokeCount = paths.length;
        var last = paths[paths.length - 1];
        last.classList.remove('stroke-just-lit');
        // reflow で animation を確実に再始動
        void last.getBoundingClientRect();
        last.classList.add('stroke-just-lit');
        setTimeout(function() { last.classList.remove('stroke-just-lit'); }, 620);
      }
    }
    // ソフトハローを 1 枚だけキャンバス上に乗せる (screen blend + blur)
    var container = target.parentElement; // .canvas-container
    if (container) {
      var halo = document.createElement('div');
      halo.className = 'stroke-soft-halo';
      container.appendChild(halo);
      setTimeout(function() { if (halo.parentNode) halo.remove(); }, 600);
    }
    // マス全体の水色グロウ: 画数が上がると濃くなる (Lv1 薄 → Lv2 中 → Lv3 濃)
    // ※三種の神器を手に入れるまでずっと水色で固定。将来は属性で色差し替え。
    var flashEl = document.getElementById('canvasFlash');
    if (flashEl) {
      var lv = Math.min(3, Math.max(1, strokeCount || 1));
      flashEl.classList.remove('stroke-glow-lv1', 'stroke-glow-lv2', 'stroke-glow-lv3', 'active');
      void flashEl.offsetWidth; // reflow
      flashEl.classList.add('stroke-glow-lv' + lv);
      setTimeout(function() {
        flashEl.classList.remove('stroke-glow-lv1', 'stroke-glow-lv2', 'stroke-glow-lv3');
      }, 560);
    }
  } catch (e) { /* ignore */ }
}

function launchMagicCircle(kind) {
  const src = pickSpellVideo(kind);

  // バトル中は .battle-stage 内に直接 video を差し込み、screen 合成で敵に炎を被せる。
  // (fullscreen overlay の位置/合成問題を回避)
  if (_battle && _battle.active) {
    const stage = document.getElementById('battleStage');
    const enemyWrap = stage ? stage.querySelector('.battle-enemy-wrap') : null;
    if (stage && enemyWrap) {
      // 既存の magic 層があれば除去
      const prev = stage.querySelector('.battle-magic-layer');
      if (prev) prev.remove();
      const layer = document.createElement('div');
      layer.className = 'battle-magic-layer';
      const rect = enemyWrap.getBoundingClientRect();
      const stageRect = stage.getBoundingClientRect();
      const cx = (rect.left + rect.width / 2) - stageRect.left;
      const cy = (rect.top + rect.height / 2) - stageRect.top;
      const size = Math.max(rect.width, rect.height) * 1.6;
      layer.style.left = (cx - size / 2) + 'px';
      layer.style.top  = (cy - size / 2) + 'px';
      layer.style.width  = size + 'px';
      layer.style.height = size + 'px';
      layer.style.inset = 'auto';
      const v = document.createElement('video');
      v.className = 'battle-magic-video';
      v.src = src;
      v.autoplay = true; v.muted = true; v.playsInline = true;
      v.setAttribute('playsinline', ''); v.setAttribute('webkit-playsinline', '');
      v.preload = 'auto';
      layer.appendChild(v);
      stage.appendChild(layer);
      const pp = v.play(); if (pp && pp.catch) pp.catch(() => {});
      setTimeout(() => { if (layer.parentNode) layer.remove(); }, 3300);
      return;
    }
  }

  const c = document.getElementById('magicContainer');
  if (!c) return;
  alignOverlayToCanvas(c);
  c.innerHTML = '';

  // Animated magic circle video (black bg → mix-blend-mode: screen)
  const video = document.createElement('video');
  video.className = 'magic-video';
  video.src = src;
  video.autoplay = true;
  video.muted = true;
  video.playsInline = true;
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');
  video.preload = 'auto';
  c.appendChild(video);
  const p = video.play();
  if (p && p.catch) p.catch(() => {});

  // Central flash
  const flash = document.createElement('div');
  flash.className = 'magic-flash';
  c.appendChild(flash);

  // Particles — radiate out from center
  const N = 32;
  for (let i = 0; i < N; i++) {
    const particle = document.createElement('div');
    particle.className = 'magic-particle';
    const angle = (i / N) * Math.PI * 2 + Math.random() * 0.3;
    const dist = 200 + Math.random() * 240;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    particle.style.setProperty('--dx', dx + 'px');
    particle.style.setProperty('--dy', dy + 'px');
    particle.style.animationDelay = (Math.random() * 0.4) + 's';
    const hue = Math.random() < 0.5
      ? 'radial-gradient(circle, #FFF 0%, #FFE27A 40%, rgba(255,180,80,0) 75%)'
      : 'radial-gradient(circle, #FFF 0%, #C4A1FF 40%, rgba(180,120,255,0) 75%)';
    particle.style.background = hue;
    c.appendChild(particle);
  }

  setTimeout(() => { c.innerHTML = ''; }, 3400);
}

// ===== Magic Projectile =====
// 「手前から奥(敵)へ飛ぶ光球 → 着弾で破裂」する魔法演出。
// mp4 を使わず純 CSS なので軽量 (1 回 ~50KB の DOM 作って捨てるだけ)。
// element: 'fire' | 'ice' | 'thunder' | 'light' | 'heal' | 'wind' | ...
// onImpact: 着弾時に呼ばれる (敵の被ダメ演出と同期したいとき用)
function launchMagicProjectile(element, opts) {
  opts = opts || {};
  const colors = MAGIC_COLORS[element] || MAGIC_COLORS.fire;
  const enemyEl = document.getElementById('battleEnemy');
  if (!enemyEl) {
    if (opts.onImpact) setTimeout(opts.onImpact, 0);
    return;
  }

  // 既存コンテナがあれば再利用、なければ作る
  let container = document.querySelector('.magic-projectile-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'magic-projectile-container';
    document.body.appendChild(container);
  }

  // 敵位置 (viewport 座標)
  const er = enemyEl.getBoundingClientRect();
  const tx = er.left + er.width / 2;
  const ty = er.top  + er.height * 0.55;

  // 起点: 画面中央下 (プレイヤー側 = 手前)
  const sx = window.innerWidth / 2;
  const sy = window.innerHeight * 0.86;

  // finisher フラグ: 光球を約 2 倍に拡大 + 着弾もデカく。
  const finisher = !!opts.finisher;
  const startScale = finisher ? 2.1 : 1.15;
  const endScale   = finisher ? 0.55 : 0.28;

  // 弾本体
  const ball = document.createElement('div');
  ball.className = 'magic-projectile' + (finisher ? ' finisher' : '');
  ball.style.setProperty('--core', colors.core);
  ball.style.setProperty('--aura', colors.aura);
  ball.style.setProperty('--glow', colors.glow);
  // 初期: 起点に大きめ(=手前)
  ball.style.transform = 'translate(' + sx + 'px, ' + sy + 'px) translate(-50%, -50%) scale(' + startScale + ')';

  const trail = document.createElement('div');
  trail.className = 'magic-projectile-trail';
  ball.appendChild(trail);

  container.appendChild(ball);

  // 弾発射 SFX (短い whoosh)
  try { _playProjectileLaunchSound(element); } catch (e) {}

  // 2 フレーム後に目的地へ + 縮小(=奥へ)
  // transition は .animate クラスで有効化
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      ball.classList.add('animate');
      ball.style.transform =
        'translate(' + tx + 'px, ' + ty + 'px) ' +
        'translate(-50%, -50%) scale(' + endScale + ')';
    });
  });

  // 着弾
  const FLIGHT_MS = finisher ? 900 : 780;
  setTimeout(() => {
    // 弾消去 + 破裂
    if (ball.parentNode) ball.remove();
    _spawnMagicBurst(tx, ty, colors, container, { finisher: finisher });
    try { _playMagicBurstSound(element); } catch (e) {}
    if (opts.onImpact) {
      try { opts.onImpact(); } catch (e) {}
    }
    // 900ms 後にコンテナ掃除 (他の弾と衝突しないよう空要素なら削除)
    setTimeout(() => {
      if (container && container.parentNode && container.children.length === 0) {
        container.remove();
      }
    }, 900);
  }, FLIGHT_MS);
}

function _spawnMagicBurst(x, y, colors, container, opts) {
  opts = opts || {};
  const finisher = !!opts.finisher;
  // 各 burst 要素は left/top で配置し、CSS keyframe の translate(-50%,-50%) で中心合わせ。
  // 中央フラッシュ
  const flash = document.createElement('div');
  flash.className = 'magic-burst-flash' + (finisher ? ' finisher' : '');
  flash.style.setProperty('--core', colors.core);
  flash.style.setProperty('--aura', colors.aura);
  flash.style.setProperty('--glow', colors.glow);
  flash.style.left = x + 'px';
  flash.style.top  = y + 'px';
  container.appendChild(flash);
  setTimeout(() => { if (flash.parentNode) flash.remove(); }, 900);

  // 衝撃波リング
  const ring = document.createElement('div');
  ring.className = 'magic-burst-shockring' + (finisher ? ' finisher' : '');
  ring.style.setProperty('--aura', colors.aura);
  ring.style.setProperty('--glow', colors.glow);
  ring.style.left = x + 'px';
  ring.style.top  = y + 'px';
  container.appendChild(ring);
  setTimeout(() => { if (ring.parentNode) ring.remove(); }, 900);

  // 放射パーティクル (finisher は数も距離も倍)
  const N = finisher ? 28 : 16;
  const baseDist = finisher ? 160 : 90;
  for (let i = 0; i < N; i++) {
    const p = document.createElement('div');
    p.className = 'magic-burst-particle' + (finisher ? ' finisher' : '');
    p.style.setProperty('--core', colors.core);
    p.style.setProperty('--aura', colors.aura);
    p.style.setProperty('--glow', colors.glow);
    const angle = (i / N) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    const dist = baseDist + Math.random() * baseDist;
    p.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(1) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist).toFixed(1) + 'px');
    p.style.left = x + 'px';
    p.style.top  = y + 'px';
    p.style.animationDelay = (Math.random() * 0.08).toFixed(2) + 's';
    container.appendChild(p);
    setTimeout(() => { if (p.parentNode) p.remove(); }, 1000);
  }
}

// ===== 敵 → 勇者への魔法弾 (魔導士タイプ敵用) =====
// launchMagicProjectile を逆方向で再利用。敵中央から勇者中央へ飛ぶ。
// onImpact: 着弾時 (シェイク+ダメージ表示と同期)。
function _launchEnemyMagicProjectile(element, opts) {
  opts = opts || {};
  const colors = MAGIC_COLORS[element] || MAGIC_COLORS.ice;
  const enemyEl = document.getElementById('battleEnemy');
  const heroEl  = document.getElementById('battleHero');
  if (!enemyEl || !heroEl) {
    if (opts.onImpact) setTimeout(opts.onImpact, 0);
    return;
  }
  let container = document.querySelector('.magic-projectile-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'magic-projectile-container';
    document.body.appendChild(container);
  }
  const er = enemyEl.getBoundingClientRect();
  const hr = heroEl.getBoundingClientRect();
  const sx = er.left + er.width / 2;
  const sy = er.top  + er.height * 0.45;
  const tx = hr.left + hr.width / 2;
  const ty = hr.top  + hr.height * 0.55;

  const ball = document.createElement('div');
  ball.className = 'magic-projectile enemy-cast';
  ball.style.setProperty('--core', colors.core);
  ball.style.setProperty('--aura', colors.aura);
  ball.style.setProperty('--glow', colors.glow);
  ball.style.transform = 'translate(' + sx + 'px, ' + sy + 'px) translate(-50%, -50%) scale(1.0)';

  const trail = document.createElement('div');
  trail.className = 'magic-projectile-trail';
  ball.appendChild(trail);
  container.appendChild(ball);

  try { _playProjectileLaunchSound(element); } catch (e) {}

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      ball.classList.add('animate');
      ball.style.transform =
        'translate(' + tx + 'px, ' + ty + 'px) ' +
        'translate(-50%, -50%) scale(0.9)';
    });
  });

  const FLIGHT_MS = 620;
  setTimeout(() => {
    if (ball.parentNode) ball.remove();
    _spawnMagicBurst(tx, ty, colors, container, { finisher: false });
    try { _playMagicBurstSound(element); } catch (e) {}
    if (opts.onImpact) { try { opts.onImpact(); } catch (e) {} }
    setTimeout(() => {
      if (container && container.parentNode && container.children.length === 0) {
        container.remove();
      }
    }, 900);
  }, FLIGHT_MS);
}

// ===== つらら降り (氷属性 魔導士用) =====
// 勇者の上から 6〜8 本のつららを落とし、地面にヒットするタイミングでキラン音。
// 視覚演出専用。実ダメージは呼出側 (_applyHeroHpDamage) で処理。
function _spawnIcicleRain() {
  const heroEl = document.getElementById('battleHero');
  if (!heroEl) return;
  let container = document.querySelector('.magic-projectile-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'magic-projectile-container';
    document.body.appendChild(container);
  }
  const hr = heroEl.getBoundingClientRect();
  const cx = hr.left + hr.width / 2;
  const baseY = hr.top;
  const N = 7;
  for (let i = 0; i < N; i++) {
    const ic = document.createElement('div');
    ic.className = 'icicle-drop';
    // 勇者の頭上 ±80px の範囲にバラつかせる
    const dx = (Math.random() - 0.5) * 160;
    const x = cx + dx;
    const startY = baseY - 260 - Math.random() * 80;
    const endY   = baseY + hr.height * 0.15;
    ic.style.left = x + 'px';
    ic.style.top  = startY + 'px';
    ic.style.setProperty('--fall', (endY - startY).toFixed(1) + 'px');
    ic.style.animationDelay = (i * 0.06 + Math.random() * 0.05).toFixed(3) + 's';
    container.appendChild(ic);
    setTimeout(() => { if (ic.parentNode) ic.remove(); }, 900);
  }
  // キラン効果音 (軽め)
  try {
    if (typeof withAudio === 'function') {
      withAudio(function(ac) {
        const now = ac.currentTime;
        for (let k = 0; k < 3; k++) {
          const o = ac.createOscillator(), g = ac.createGain();
          o.type = 'triangle';
          o.frequency.setValueAtTime(2400 + k * 400, now + k * 0.06);
          o.frequency.exponentialRampToValueAtTime(900, now + k * 0.06 + 0.22);
          g.gain.setValueAtTime(0.12, now + k * 0.06);
          g.gain.exponentialRampToValueAtTime(0.001, now + k * 0.06 + 0.28);
          o.connect(g); g.connect(ac.destination);
          o.start(now + k * 0.06); o.stop(now + k * 0.06 + 0.3);
        }
      });
    }
  } catch (e) {}
}

// 発射音: 属性で音色を変える (軽い whoosh + ピッチ上昇)
function _playProjectileLaunchSound(element) {
  if (typeof withAudio !== 'function') return;
  withAudio(ac => {
    const now = ac.currentTime;
    // ノイズベースの whoosh
    const bufLen = Math.floor(ac.sampleRate * 0.4);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      ch[i] = (Math.random() * 2 - 1) * (1 - t) * 0.5;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass';
    // 属性でピッチ帯を切替
    const startHz = element === 'ice' ? 1800 : element === 'thunder' ? 2400 : element === 'light' ? 2200 : 1400;
    bp.frequency.setValueAtTime(startHz * 0.5, now);
    bp.frequency.exponentialRampToValueAtTime(startHz * 1.6, now + 0.35);
    bp.Q.value = 6;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.25, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    src.connect(bp); bp.connect(g); g.connect(ac.destination);
    src.start(now); src.stop(now + 0.42);
  });
}
// 着弾音: 短い破裂 (低域パンチ + 高域キラキラ)
function _playMagicBurstSound(element) {
  // 差替フック: window.PONO_FIRE_MAGIC_SFX (後方互換) または属性別 mp3 があればそちらを優先。
  // 今は合成音のみ。mp3 を入れるときは new Audio(...).play() で差し替え可。
  const customUrl = (typeof window !== 'undefined' && window.PONO_FIRE_MAGIC_SFX);
  if (customUrl) {
    try {
      const a = new Audio(customUrl);
      a.volume = 0.55; a.play().catch(() => {});
      return;
    } catch (e) { /* fall through */ }
  }
  if (typeof withAudio !== 'function') return;
  withAudio(ac => {
    const now = ac.currentTime;
    // 低域パンチ
    const o1 = ac.createOscillator(), g1 = ac.createGain();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(220, now);
    o1.frequency.exponentialRampToValueAtTime(60, now + 0.22);
    g1.gain.setValueAtTime(0.55, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
    o1.connect(g1); g1.connect(ac.destination);
    o1.start(now); o1.stop(now + 0.3);
    // 高域キラキラ (属性で音色差)
    const hz = element === 'ice' ? 2600 : element === 'fire' ? 1600 : element === 'thunder' ? 3200 : 2000;
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(hz, now + 0.02);
    o2.frequency.exponentialRampToValueAtTime(hz * 0.5, now + 0.35);
    g2.gain.setValueAtTime(0.18, now + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(now + 0.02); o2.stop(now + 0.42);
  });
}

// ===== Word Card + TTS =====
function _getVoiceUrl(char) {
  if (currentCategory === 'hiragana') {
    const idx = CATEGORIES.hiragana.chars.indexOf(char);
    if (idx >= 0 && idx <= 44) return '../assets/voices/' + String(idx).padStart(2, '0') + '-aiueo.wav';
    if (idx === 45) return '../assets/voices/katakana/45-katakana.wav';
  }
  if (currentCategory === 'katakana') {
    const idx = CATEGORIES.katakana.chars.indexOf(char);
    if (idx >= 0 && idx <= 45) return '../assets/voices/katakana/' + String(idx).padStart(2, '0') + '-katakana.wav';
  }
  return null;
}
let _voicePlayId = 0; // キャンセル用ID
function _preloadWordAudio() {
  // 共有Audio要素にsrcをセットしてプリロード
  const char = CATEGORIES[currentCategory].chars[currentCharIndex];
  const url = _getVoiceUrl(char);
  if (url) {
    _sharedAudio.src = url;
    _sharedAudio.load();
  }
}
function speakWord(char, word) {
  if (window.speechSynthesis) speechSynthesis.cancel();
  const url = _getVoiceUrl(char);
  if (!url) { _speakFallback(char, word); return; }
  const myId = ++_voicePlayId;
  const targetTail = url.replace('../', '/');
  const curSrc = _sharedAudio.currentSrc || _sharedAudio.src || '';
  const srcMatches = curSrc.endsWith(targetTail);

  function doPlay() {
    if (_voicePlayId !== myId) return;
    try { _sharedAudio.currentTime = 0; } catch (e) {}
    const p = _sharedAudio.play();
    if (p && p.catch) p.catch(() => _speakFallback(char, word));
  }

  // 再生可能なら即再生
  if (srcMatches && _sharedAudio.readyState >= 2) {
    doPlay();
    return;
  }
  // まだ読み込み中 or src 差し替え: canplay を待ってから再生
  _sharedAudio.oncanplay = function() {
    _sharedAudio.oncanplay = null;
    _sharedAudio.oncanplaythrough = null;
    doPlay();
  };
  _sharedAudio.oncanplaythrough = _sharedAudio.oncanplay;
  if (!srcMatches) {
    _sharedAudio.src = url;
    _sharedAudio.load();
  }
}

function _speakFallback(char, word) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(`${char}！${word}！`);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  u.pitch = 1.2;
  speechSynthesis.speak(u);
}

let _wordCardTimer = null;
function showWordCard() {
  const char = CATEGORIES[currentCategory].chars[currentCharIndex];
  const data = WORD_DATA[currentCategory][currentCharIndex];
  if (!data) return;
  const card = document.getElementById('word-card');
  if (!card) return;
  document.getElementById('word-card-emoji').textContent = data.emoji;
  if (data.note) {
    document.getElementById('word-card-text').innerHTML =
      `<span class="word-card-note">${data.note}</span>`;
  } else {
    document.getElementById('word-card-text').innerHTML =
      `<span class="word-card-first">${char}</span>${data.word.slice(char.length)}`;
  }
  clearTimeout(_wordCardTimer);
  card.classList.remove('show', 'hide');
  // 横向き: キャンバス外（下寄り）に配置して妖精救出演出を隠さない
  if (landscapeMQ.matches) {
    const rect = canvasContainer.getBoundingClientRect();
    card.style.left = (rect.left + rect.width / 2) + 'px';
    card.style.top = 'auto';
    card.style.bottom = `calc(100vh - ${rect.bottom}px + 12px)`;
    card.style.transform = 'translateX(-50%)';
  } else {
    card.style.left = '50%';
    card.style.bottom = '120px';
    card.style.top = 'auto';
    card.style.transform = 'translateX(-50%)';
  }
  card.classList.add('show');
  speakWord(char, data.word);
  _wordCardTimer = setTimeout(() => {
    card.classList.remove('show');
    card.classList.add('hide');
    setTimeout(() => card.classList.remove('hide'), 400);
  }, 3500);
}

// 横向き: オーバーレイをキャンバス中央に限定
function alignOverlayToCanvas(el) {
  if (landscapeMQ.matches) {
    const r = canvasContainer.getBoundingClientRect();
    el.style.inset = 'auto';
    el.style.left = r.left + 'px';
    el.style.top = r.top + 'px';
    el.style.width = r.width + 'px';
    el.style.height = r.height + 'px';
  } else {
    el.style.inset = '0';
    el.style.left = el.style.top = el.style.width = el.style.height = '';
  }
}

// ===== キャンバス割れ演出 (妖精救出シーケンス) =====
function _playCanvasBreak() {
  var el = document.getElementById('monsterDeco');
  var cc = document.getElementById('canvasContainer');
  if (!el || !cc) return;
  // 前回の残り timer を全部クリア
  if (window._breakTimers && window._breakTimers.length) {
    window._breakTimers.forEach(function(t) { clearTimeout(t); });
  }
  window._breakTimers = [];
  function _bt(fn, ms) { window._breakTimers.push(setTimeout(fn, ms)); }
  // 悪役が出ていたら即消す（邪魔しない）
  _hideVillain();
  _hideMonsterBubble();
  // 既に進行中なら何もしない
  if (el.classList.contains('emerge') || el.classList.contains('leave')) return;

  // T=0: キャンバスをシェイク + overflow 解放 + 魔法陣を浮かび上がらせる
  cc.classList.add('shaking', 'breaking');
  var seal = document.getElementById('canvasSeal');
  if (seal) {
    seal.classList.remove('active', 'cracking');
    void seal.offsetWidth;
    seal.classList.add('active');
  }

  // T=120: 白フラッシュ (光の下地)
  _bt(function() {
    var flash = document.getElementById('canvasFlash');
    if (flash) {
      flash.classList.remove('active');
      void flash.offsetWidth;
      flash.classList.add('active');
    }
  }, 120);

  // T=260: 魔法陣に放射状のヒビが走る
  _bt(function() {
    var seal = document.getElementById('canvasSeal');
    if (seal) seal.classList.add('cracking');
  }, 260);

  // T=420: 中央から光バースト
  _bt(function() {
    var burst = document.getElementById('canvasBurst');
    if (burst) {
      burst.classList.remove('active');
      void burst.offsetWidth;
      burst.classList.add('active');
    }
  }, 420);

  // T=460: キラキラ粒子を放射
  _bt(function() {
    var wrap = document.getElementById('canvasSparkles');
    if (!wrap) return;
    wrap.innerHTML = '';
    var symbols = ['✨','⭐','💫','🌟','◆'];
    var count = 26;
    var baseDist = Math.min(cc.clientWidth, cc.clientHeight) * 0.55;
    for (var i = 0; i < count; i++) {
      var s = document.createElement('span');
      s.className = 'spk';
      s.textContent = symbols[i % symbols.length];
      var angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
      var dist = baseDist * (0.6 + Math.random() * 0.6);
      s.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(1) + 'px');
      s.style.setProperty('--dy', (Math.sin(angle) * dist).toFixed(1) + 'px');
      s.style.setProperty('--rot', (Math.random() * 720 - 360).toFixed(0) + 'deg');
      s.style.animationDelay = (Math.random() * 0.08).toFixed(2) + 's';
      wrap.appendChild(s);
    }
    wrap.classList.remove('active');
    void wrap.offsetWidth;
    wrap.classList.add('active');
    window._breakTimers.push(setTimeout(function() {
      wrap.classList.remove('active');
      wrap.innerHTML = '';
    }, 1600));
  }, 460);

  // バリンッ音
  try {
    var ac = (window._audioCtx = window._audioCtx || new (window.AudioContext || window.webkitAudioContext)());
    var now = ac.currentTime;
    // ノイズで割れた感
    var buf = ac.createBuffer(1, ac.sampleRate * 0.25, ac.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
    }
    var noise = ac.createBufferSource();
    noise.buffer = buf;
    var ng = ac.createGain();
    ng.gain.setValueAtTime(0.18, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    noise.connect(ng); ng.connect(ac.destination);
    noise.start(now);
    // キラン
    var osc = ac.createOscillator(), g = ac.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(880, now + 0.12);
    osc.frequency.exponentialRampToValueAtTime(1760, now + 0.32);
    g.gain.setValueAtTime(0.08, now + 0.12);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.connect(g); g.connect(ac.destination);
    osc.start(now + 0.12); osc.stop(now + 0.36);
  } catch (e) { /* audio not ready */ }

  // T=600: 妖精が封印解除されて中央に登場
  _bt(function() {
    el.classList.remove('enter');
    el.classList.add('emerge');
  }, 600);

  // T=950: 妖精の「ありがとう」吹き出し + 🌰ドロップ
  _bt(function() {
    _showMonsterBubble(_pickLine('fairy', 'thanks'), 950);
    var drop = document.getElementById('monsterAcornDrop');
    if (drop) {
      drop.classList.remove('show');
      void drop.offsetWidth;
      drop.classList.add('show');
    }
  }, 950);

  // T=1900: 妖精退場 (leave)
  _bt(function() {
    el.classList.remove('emerge');
    el.classList.add('leave');
    _hideMonsterBubble();
  }, 1900);

  // T=2300: 妖精完全消し + 悪役再登場 (悔しがる)
  _bt(function() {
    el.style.visibility = 'hidden';
    el.classList.remove('leave', 'emerge', 'pop');
    var drop = document.getElementById('monsterAcornDrop');
    if (drop) { drop.classList.remove('show'); drop.style.opacity = '0'; }
    _showVillain('defeat', 1800);
  }, 2300);

  // T=2600: キャンバスの shaking/breaking クラスを解除（次文字ロードに備え）
  _bt(function() {
    cc.classList.remove('shaking', 'breaking');
    var seal = document.getElementById('canvasSeal');
    if (seal) seal.classList.remove('active', 'cracking');
    var burst = document.getElementById('canvasBurst');
    if (burst) burst.classList.remove('active');
    var sparkles = document.getElementById('canvasSparkles');
    if (sparkles) { sparkles.classList.remove('active'); sparkles.innerHTML = ''; }
  }, 2600);
}

// カタカナ行のラベル (ア/サ/…) が来ても同じ敵データを返すための正規化。
const _ROW_KATAKANA_TO_HIRAGANA = {
  'ア':'あ','カ':'か','サ':'さ','タ':'た','ナ':'な','ハ':'は',
  'マ':'ま','ヤ':'や','ラ':'ら','ワ':'わ'
};
function _normalizeRowLabel(rowId) {
  if (!rowId) return 'あ';
  return _ROW_KATAKANA_TO_HIRAGANA[rowId] || rowId;
}
const MUSHROOM_IMGS = [
  '../assets/images/monsters/chars/monster_005.png',
  '../assets/images/monsters/chars/monster_006.png',
  '../assets/images/monsters/chars/monster_007.png',

function _enemyForRow(rowId) {

  const base = BATTLE_ENEMIES[key] || BATTLE_ENEMIES['あ'];
  // 念のための未定義フォールバック (謎解き行が誤ってバトル経由に来た場合など)
  const img = BATTLE_ENEMIES[key]
    ? base.img
    : MUSHROOM_IMGS[Math.floor(Math.random() * MUSHROOM_IMGS.length)];
  return Object.assign({}, base, { img });
}

// ===== v265: 呪縛仮面・呪印・浄化 (「呪縛を解く」ピボット) =====
// HP 進行に応じて battleEnemy の data-sigil / data-cracks 属性を更新する。
// CSS 側でこれを見て呪印の色 (紫→金) とヒビの本数を段階的に描画。
function _updateCurseSigil() {
  try {
    const enemyEl = document.getElementById('battleEnemy');
    if (!enemyEl) return;
    const maxHp = _battle.maxHp || 5;
    const hp = Math.max(0, _battle.hp);
    const ratio = (maxHp > 0) ? (hp / maxHp) : 0;
    // HP 比で 0〜5 の段階に正規化 (ボス HP 8/10/12 でも同じカーブで進行)
    let stage;
    if (ratio >= 0.9)       stage = 5;
    else if (ratio >= 0.65) stage = 4;
    else if (ratio >= 0.4)  stage = 3;
    else if (ratio >= 0.2)  stage = 2;
    else if (ratio > 0)     stage = 1;
    else                    stage = 0;
    enemyEl.dataset.sigil = String(stage);
    // ヒビは 3 本が上限。段階 5/4=0、3=1、2=2、1/0=3。
    const cracks = (stage >= 4) ? 0 : (stage === 3) ? 1 : (stage === 2) ? 2 : 3;
    enemyEl.dataset.cracks = String(cracks);
  } catch (e) { /* ignore */ }
}
// 敵の呪縛状態を初期化 (_showBattleStage 開始時)。
// v274: 白仮面 DOM を撤去したため、残っているのはスプライト filter 用の
//       .cursed/.purified クラス切替と残留 bubble/drain particle の掃除のみ。
function _resetCurseMask() {
  try {
    const enemyEl = document.getElementById('battleEnemy');
    if (!enemyEl) return;
    enemyEl.classList.remove('purified', 'bowing', 'ascending', 'kagerou-firebreath',
                             'kagerou-awaken-pulse', 'kagerou-rage');
    enemyEl.classList.add('cursed');
    // 残留 thanks bubble / drain particle を除去
    document.querySelectorAll('.spirit-thanks-bubble').forEach(function(el) { el.remove(); });
    document.querySelectorAll('.curse-shadow-drain').forEach(function(el) { el.remove(); });
    _updateCurseSigil();
  } catch (e) { /* ignore */ }
}

// HP 帯で 3 相 (p1/p2/p3) から taunt を選ぶ。旧配列形式にもフォールバック互換。
function _pickPhasedTaunt() {
  const enemy = _battle.enemy;
  if (!enemy || !enemy.taunts) return null;
  const t = enemy.taunts;
  if (Array.isArray(t)) {
    if (!t.length) return null;
    return t[Math.floor(Math.random() * t.length)];
  }
  const maxHp = _battle.maxHp || 5;
  const ratio = (maxHp > 0) ? (_battle.hp / maxHp) : 0;
  let pool;
  if (ratio >= 0.67 && t.p1 && t.p1.length) pool = t.p1;
  else if (ratio >= 0.34 && t.p2 && t.p2.length) pool = t.p2;
  else if (t.p3 && t.p3.length) pool = t.p3;
  else pool = (t.p1 || t.p2 || t.p3 || []);
  if (!pool || !pool.length) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

// 仮面割れの瞬間に呪印から下方へ紫の闇霧を排出する (12粒、0.75s で消失)。
function _spawnCurseShadowDrainParticles() {
  try {
    const enemyEl = document.getElementById('battleEnemy');
    if (!enemyEl) return;
    const N = 10;
    for (let i = 0; i < N; i++) {
      const p = document.createElement('div');
      p.className = 'curse-shadow-drain';
      const angle = Math.PI * (0.5 + (Math.random() - 0.5) * 0.9); // ほぼ下向き ±40°
      const dist = 44 + Math.random() * 30;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      p.style.setProperty('--dx', (dx - 5).toFixed(1) + 'px');
      p.style.setProperty('--dy', dy.toFixed(1) + 'px');
      p.style.animationDelay = (Math.random() * 0.12).toFixed(2) + 's';
      enemyEl.appendChild(p);
      setTimeout(function() { if (p.parentNode) p.remove(); }, 900);
    }
  } catch (e) { /* ignore */ }
}

// 「…ありがとう」吹き出しを敵の上にフェードイン (bow と同期)。
function _showSpiritThanksBubble(text) {
  try {
    const enemyEl = document.getElementById('battleEnemy');
    if (!enemyEl) return;
    // 既存吹き出しがあれば置換
    enemyEl.querySelectorAll('.spirit-thanks-bubble').forEach(function(el) { el.remove(); });
    const b = document.createElement('div');
    b.className = 'spirit-thanks-bubble';
    b.textContent = text || '…ありがとう';
    enemyEl.appendChild(b);
    setTimeout(function() { if (b.parentNode) b.remove(); }, 2400);
  } catch (e) { /* ignore */ }
}

// 仮面割れ + 敵色切替 + おじぎ + 上昇の 2.4 秒シーケンス。battleVictory の onImpact から呼ぶ。
// 着弾タイミングと sigilBurst を同期させるため、ここで初めて data-sigil=0 に遷移する。
// 完了後 onDone を呼ぶ (戦闘ログの次ビートに繋げる)。
function _startPurificationSequence(onDone) {
  const enemyEl = document.getElementById('battleEnemy');
  if (!enemyEl) { if (onDone) onDone(); return; }
  try { enemyEl.classList.remove('damaged'); } catch (e) {}

  // v273: カゲロウ専用の追加 swap。imgDown (崩れ落ちる) → imgFrontStill (勇者に向き直る)
  //       → imgFrontIdle (おじぎ中の呼吸) と 3 段で差し替える。他の敵は imgDown 等を
  //       持たないので、プロパティがあるときだけ走る。
  var kEnemy = (typeof _battle !== 'undefined' && _battle) ? _battle.enemy : null;

  // t=0ms: 呪印 data attr 更新 (SVG 仮面は v274 で撤去済、属性だけ残す — 副作用なし)
  enemyEl.dataset.sigil = '0';
  enemyEl.dataset.cracks = '3';
  // カゲロウ: 金爆発と同時に膝をつく (down)
  try {
    if (kEnemy && kEnemy.imgDown) _swapEnemyImg(kEnemy.imgDown);
  } catch (e) {}

  // t=320ms: 闇霧排出 (浄化のピーク演出として残す、仮面割れ本体は撤去済)
  setTimeout(function() {
    _spawnCurseShadowDrainParticles();
  }, 320);

  // t=780ms: 敵を呪縛 → 浄化の色味へ切替
  //          カゲロウ: 前を向いた姿 (imgFrontStill) へ swap
  setTimeout(function() {
    try {
      enemyEl.classList.remove('cursed');
      enemyEl.classList.add('purified');
      if (kEnemy && kEnemy.imgFrontStill) _swapEnemyImg(kEnemy.imgFrontStill);
    } catch (e) {}
  }, 780);

  // t=1000ms: おじぎ + 「…ありがとう」吹き出し
  //           カゲロウ: 呼吸のある imgFrontIdle へ遷移 (bow アニメと馴染む)
  setTimeout(function() {
    try {
      enemyEl.classList.add('bowing');
      if (kEnemy && kEnemy.imgFrontIdle) _swapEnemyImg(kEnemy.imgFrontIdle);
      _showSpiritThanksBubble('…ありがとう');
      // bow animation は 0.65s で自然復帰
      setTimeout(function() { enemyEl.classList.remove('bowing'); }, 700);
    } catch (e) {}
  }, 1000);

  // シーケンスは約 1700ms で落ち着く。上昇は bow/leave ログ送り完了後に別途発火させる。
  setTimeout(function() { if (onDone) onDone(); }, 1700);
}


// 勇者 HP/MP ゲージを現在値で描画 + 短い flash。
function _renderHeroGauges(flash) {
  const hpBar = document.getElementById('heroHpBar');
  const mpBar = document.getElementById('heroMpBar');
  const hpNum = document.getElementById('heroHpNum');
  const mpNum = document.getElementById('heroMpNum');
  const wrap = document.getElementById('heroStatus');
  if (hpBar) hpBar.style.width = Math.max(0, Math.min(100, (_battle.heroHp / _battle.heroMaxHp) * 100)) + '%';
  if (mpBar) mpBar.style.width = Math.max(0, Math.min(100, (_battle.heroMp / _battle.heroMaxMp) * 100)) + '%';
  if (hpNum) hpNum.textContent = _battle.heroHp + '/' + _battle.heroMaxHp;
  if (mpNum) mpNum.textContent = _battle.heroMp + '/' + _battle.heroMaxMp;
  if (wrap && flash) {
    const cls = (flash === 'mp') ? 'flash-mp' : 'flash-hp';
    wrap.classList.remove(cls);
    void wrap.offsetWidth;
    wrap.classList.add(cls);
    setTimeout(function() { wrap.classList.remove(cls); }, 360);
  }
}
function _resetHeroGauges() {
  _battle.heroHp = _battle.heroMaxHp;
  _battle.heroMp = _battle.heroMaxMp;
  _renderHeroGauges(null);
}
function _applyHeroHpDamage(amount) {
  const next = Math.max(_battle.heroHpFloor, _battle.heroHp - (amount | 0));
  _battle.heroHp = next;
  _renderHeroGauges('hp');
}
function _applyHeroMpCost(cost) {
  const next = Math.max(_battle.heroMpFloor, _battle.heroMp - (cost | 0));
  _battle.heroMp = next;
  _renderHeroGauges('mp');
}

// 攻撃プラン生成: count=5 のとき 通常3 + 魔法2 (末尾は必ず magic)
function _pickAttackPlan(count) {
  const plan = new Array(count).fill('normal');
  if (count > 0) plan[count - 1] = 'magic';
  // 残り (count-1 箇所) からちょうど 1 個だけ magic に → 合計 magic=2, normal=3
  const extras = 1;
  const pool = [];
  for (let i = 0; i < count - 1; i++) pool.push(i);
  for (let k = 0; k < extras && pool.length > 0; k++) {
    const idx = Math.floor(Math.random() * pool.length);
    plan[pool.splice(idx, 1)[0]] = 'magic';
  }
  return plan;
}
