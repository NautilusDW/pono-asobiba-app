<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ポノのもじかき | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="../common/points.js"></script>
<script src="../common/achievements.js"></script>
<script src="../common/menu.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8E7;
  --primary: #FF6B9D;
  --secondary: #C084FC;
  --accent: #4ADE80;
  --text: #5B4A3F;
  --card-bg: #FFFFFF;
  --shadow: 0 4px 20px rgba(91, 74, 63, 0.1);
  --radius: 20px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  font-family: 'Zen Maru Gothic', 'Rounded Mplus 1c', 'Hiragino Maru Gothic Pro', sans-serif;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: var(--text);
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  position: fixed;
  width: 100%;
  top: 0;
  left: 0;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 600px;
  margin: 0 auto;
  padding: 2px 10px 10px;
  overflow: hidden;
  overscroll-behavior: none;
}

/* ===== Header ===== */
.header { text-align: center; padding: 0; flex-shrink: 0; position: relative; }
.header h1 {
  font-size: 1.4rem; font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .subtitle { font-size: 0.8rem; color: #A89585; margin-top: 2px; }
.streak-badge {
  position: absolute; top: 4px; right: 4px; z-index: 200;
  display: inline-block;
  background: linear-gradient(135deg, #FCD34D, #F97316);
  color: #fff;
  font-size: 0.75rem; font-weight: 900;
  padding: 4px 10px; border-radius: 14px;
  animation: stampPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  box-shadow: 0 2px 8px rgba(249,115,22,0.3);
}
.streak-badge.hidden { display: none; }
@keyframes stampPop {
  from { transform: scale(0.6); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

/* ===== Milestone Modal ===== */
.milestone-modal {
  position: fixed; inset: 0; z-index: 1100;
  display: flex; align-items: center; justify-content: center;
  background: rgba(93, 78, 55, 0.45);
  animation: fadeIn 0.25s ease;
}
.milestone-modal.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.milestone-card {
  background: #fff;
  border-radius: 28px;
  padding: 32px 28px 28px;
  text-align: center;
  width: min(88vw, 340px);
  box-shadow: 0 12px 48px rgba(93,78,55,0.25);
  animation: milestoneIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
@keyframes milestoneIn {
  from { transform: scale(0.5) translateY(40px); opacity: 0; }
  to   { transform: scale(1)   translateY(0);    opacity: 1; }
}
.milestone-scene { font-size: 4.5rem; line-height: 1.1; }
.milestone-count {
  font-size: 1rem; font-weight: 900;
  background: linear-gradient(135deg, #FCD34D, #F97316);
  color: #fff; padding: 2px 14px; border-radius: 20px;
}
.milestone-title {
  font-size: 1.8rem; font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.milestone-msg { font-size: 0.95rem; font-weight: 700; color: #A89585; }

/* ===== Category Tabs ===== */
.category-tabs {
  display: flex; gap: 6px; justify-content: center;
  margin: 4px 0; flex-shrink: 0; flex-wrap: wrap;
}
.category-tab {
  padding: 8px 16px; border: none; border-radius: 30px;
  font-family: inherit; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: all 0.3s;
  background: var(--card-bg); color: var(--text); box-shadow: var(--shadow);
}
.category-tab.active { color: #FFF; transform: scale(1.05); }
.category-tab[data-cat="hiragana"].active { background: var(--primary); }
.category-tab[data-cat="katakana"].active { background: var(--secondary); }


/* ===== Character Selector ===== */
/* ===== Row Selection Screen ===== */
#rowSelectScreen {
  display: flex; flex-direction: column; align-items: center;
  min-height: 100dvh; padding: 24px 16px 40px;
  background-color: var(--bg);
  background-image: url('../assets/images/BG_03.webp');
  background-size: cover; background-position: center;
}
#rowSelectScreen.hidden { display: none; }
.rs-header { text-align: center; margin-bottom: 8px; }
.rs-header h1 {
  font-size: 1.6rem; font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.rs-subtitle { font-size: 0.9rem; color: #A89585; margin-top: 2px; font-weight: 700; }
.rs-cat-tabs { display: flex; gap: 6px; margin: 10px 0 16px; }
.rs-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 12px; width: 100%; max-width: 380px;
}
.rs-row-btn {
  padding: 14px 10px; border: 3px solid #E8E0D8; border-radius: 20px;
  background: var(--card-bg); font-family: inherit;
  cursor: pointer; box-shadow: 0 3px 12px rgba(91,74,63,0.08);
  transition: all 0.2s; text-align: center;
}
.rs-row-btn:active { transform: scale(0.95); }
.rs-row-label { font-size: 1.2rem; font-weight: 900; color: var(--text); }
.rs-row-chars { font-size: 0.75rem; color: #A89585; margin-top: 4px; font-weight: 700; letter-spacing: 0.15em; }
.rs-row-btn.all-done {
  background: linear-gradient(135deg, #D1FAE5, #A7F3D0);
  border-color: #34D399;
}
.rs-row-done-mark { color: #059669; font-size: 0.7rem; font-weight: 900; margin-top: 2px; }
@media (orientation: landscape) {
  #rowSelectScreen { min-height: 100dvh; padding: 12px 24px 24px; justify-content: center; }
  .rs-grid { grid-template-columns: repeat(5, 1fr); max-width: 600px; gap: 8px; }
  .rs-row-btn { padding: 10px 8px; }
  .rs-row-label { font-size: 1rem; }
}

/* ===== Back Button ===== */
.btn-back {
  position: absolute; top: 4px; left: 4px; z-index: 200;
  background: rgba(243,240,235,0.9); color: var(--text);
  font-size: 0.72rem; font-weight: 900; padding: 6px 12px;
  border-radius: 16px; border: 1.5px solid #E0D8CC;
}

/* ===== Word Context Grid (Phase 4) ===== */
.word-context-wrapper {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; width: 100%; height: 100%;
}
.word-context-emoji { font-size: 3.5rem; margin-bottom: 8px; }
.word-context-row {
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.word-context-cell {
  border-radius: 16px; background: var(--card-bg);
  box-shadow: 0 3px 12px rgba(91,74,63,0.1);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; border: 2.5px solid #E8E0D8;
}
.word-context-cell.writable {
  border-color: var(--primary);
  position: relative; touch-action: none;
}
.word-context-cell.text-only {
  font-size: 2.2rem; font-weight: 900; color: var(--text);
  padding: 8px 14px; min-width: 60px; min-height: 60px;
}

/* ===== Tracing Area ===== */
.trace-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; position: relative; min-height: 0;
}
.canvas-container {
  position: relative;
  width: min(90vw, 420px); height: min(90vw, 420px);
  max-width: 420px; max-height: 420px;
  background: var(--card-bg); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
  overscroll-behavior: none;
}
/* Grid lines */
.canvas-container::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background:
    linear-gradient(to right, transparent 49.5%, #F0E8E0 49.5%, #F0E8E0 50.5%, transparent 50.5%),
    linear-gradient(to bottom, transparent 49.5%, #F0E8E0 49.5%, #F0E8E0 50.5%, transparent 50.5%);
}
.canvas-container::after {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background:
    linear-gradient(45deg, transparent calc(50% - 0.5px), #F5EDE5 calc(50% - 0.5px), #F5EDE5 calc(50% + 0.5px), transparent calc(50% + 0.5px)),
    linear-gradient(-45deg, transparent calc(50% - 0.5px), #F5EDE5 calc(50% - 0.5px), #F5EDE5 calc(50% + 0.5px), transparent calc(50% + 0.5px));
}

/* Hanzi Writer target */
#writerTarget {
  position: absolute; inset: 0; z-index: 2;
}
#writerTarget svg { display: block; }


/* ===== Controls ===== */
.controls {
  display: flex; gap: 8px; justify-content: center; padding: 4px 0; flex-shrink: 0;
}
.next-row {
  display: flex; justify-content: center; padding: 6px 0; flex-shrink: 0;
}
.ctrl-btn {
  padding: 10px 20px; border: none; border-radius: 30px;
  font-family: inherit; font-size: 0.95rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow);
}
.ctrl-btn:active { transform: scale(0.95); }
.btn-clear { background: #FEE2E2; color: #EF4444; }
.btn-hint  { background: #E0F2FE; color: #0EA5E9; }
.btn-next  { background: linear-gradient(135deg, var(--accent), #34D399); color: #FFF; }

/* ===== Confetti ===== */
.confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 1000; overflow: hidden;
  overscroll-behavior: none; }
.confetti-piece {
  position: absolute; width: 10px; height: 10px; border-radius: 2px;
  animation: confetti-fall 2.5s ease-out forwards;
}
@keyframes confetti-fall {
  0%   { transform: translateY(-10px) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* ===== Completion Overlay ===== */
.completion-overlay {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.3s;
}
.completion-overlay.show { opacity: 1; pointer-events: auto; }
.completion-msg {
  font-size: 3rem; font-weight: 900;
  color: var(--primary);
  -webkit-text-stroke: 5px white;
  paint-order: stroke fill;
  animation: bounce-in 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
}
@keyframes bounce-in {
  0% { transform: scale(0); } 60% { transform: scale(1.3); } 100% { transform: scale(1); }
}

/* ===== Stroke order numbers ===== */
.stroke-number-overlay {
  position: absolute; inset: 0; pointer-events: none; z-index: 5;
}
.stroke-number {
  position: absolute;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: #FF6B9D;
  color: #FFF;
  font-size: 0.75rem; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  outline: 3px solid #FFF;
  transform: translate(-50%, -50%);
  font-family: 'Zen Maru Gothic', sans-serif;
}

/* ===== Star particles ===== */
.star-particle {
  position: absolute; pointer-events: none; z-index: 10; font-size: 1.2rem;
  animation: star-float 1s ease-out forwards;
}
@keyframes star-float {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-40px) scale(0.3); opacity: 0; }
}

/* ===== Character Extension Point (future AI characters) ===== */
.character-slot { position: fixed; bottom: 80px; right: 10px; width: 80px; height: 80px; z-index: 50; display: none; }

/* ===== Canvas wrapper for hedgehog peek effect ===== */
.canvas-wrap { position: relative; }
@keyframes hedgehog-peek {
  /* hidden */
  0%, 58%  { transform: translateY(95px); }
  /* slow creep up — takes ~2.5s to fully appear */
  73%      { transform: translateY(0); }
  /* small wave */
  77%      { transform: translateY(-6px); }
  80%      { transform: translateY(0); }
  82%      { transform: translateY(-6px); }
  /* stay peeked */
  85%, 90% { transform: translateY(0); }
  /* slow descent */
  100%     { transform: translateY(95px); }
}

.hedgehog-wrap {
  position: absolute;
  bottom: calc(100% - 30px);
  right: 10px;
  width: 86px;
  pointer-events: none;
  animation: hedgehog-peek 18s ease-in-out infinite;
  animation-delay: 3s;
  animation-fill-mode: backwards;
}

.hedgehog-deco {
  width: 100%;
  display: block;
  filter: drop-shadow(1px 2px 5px rgba(0,0,0,0.15));
}

/* ===== Hedgehog speech bubble ===== */
.hedgehog-bubble {
  position: absolute;
  bottom: 100%;
  right: -5px;
  background: #fff;
  border-radius: 16px;
  padding: 5px 12px;
  margin-bottom: 4px;
  font-size: 0.82rem;
  font-weight: 900;
  color: var(--text);
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  opacity: 0;
  animation: bubble-pop 18s ease-in-out infinite;
  animation-delay: 3s;
  animation-fill-mode: backwards;
}
.hedgehog-bubble::after {
  content: '';
  position: absolute;
  bottom: -7px;
  right: 28px;
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
  border-top: 8px solid #fff;
}
@keyframes bubble-pop {
  0%, 68%  { opacity: 0; transform: scale(0.5); }
  73%      { opacity: 1; transform: scale(1.15); }
  76%, 86% { opacity: 1; transform: scale(1); }
  91%      { opacity: 0; transform: scale(0.5); }
  100%     { opacity: 0; }
}

/* ===== Pono decoration (aligned to canvas left edge, bottom of trace-area) ===== */
.pono-deco {
  position: absolute;
  bottom: -45px;
  left: calc(50% - min(45vw, 210px));
  width: 72px;
  pointer-events: none;
  filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.15));
  z-index: 100;
}

/* ===== Word Card ===== */
@keyframes wordCardIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes wordCardOut {
  from { opacity: 1; transform: translateX(-50%) translateY(0); }
  to   { opacity: 0; transform: translateX(-50%) translateY(20px); }
}
.word-card {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  border-radius: 24px;
  padding: 12px 28px;
  display: none;
  align-items: center;
  gap: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  pointer-events: none;
  z-index: 1050;
  white-space: nowrap;
}
.word-card.show {
  display: flex;
  animation: wordCardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.word-card.hide {
  display: flex;
  animation: wordCardOut 0.35s ease forwards;
}
.word-card-emoji { font-size: 2.4rem; line-height: 1; }
.word-card-text  { font-size: 1.6rem; font-weight: 900; color: var(--text); }
.word-card-first { color: var(--primary); }
.word-card-note  { font-size: 1.1rem; font-weight: 700; color: var(--text-muted, #888); }

/* ===== Portrait: wrapper divs are transparent ===== */
.left-col, .mid-col, .right-col {
  display: contents;
}
.pono-bubble { display: none; }
/* Progress hint */
.progress-hint {
  font-size: 0.7rem; font-weight: 700; color: var(--primary);
  text-align: center; padding: 2px 0; flex-shrink: 0;
}
.progress-hint:empty { display: none; }
/* Portrait ordering */
.header { order: 1; }
.controls { order: 4; }
.progress-hint { order: 4; }
.trace-area { order: 5; }
.next-row { order: 10; }

/* ===== Responsive ===== */
@media (max-height: 600px) {
  .header h1 { font-size: 1.1rem; }
  .header .subtitle { display: none; }
  .controls { padding: 6px 0; }
}

/* ===== Landscape layout ===== */
@media (orientation: landscape) {
  #app {
    flex-direction: row;
    max-width: 100%;
    padding: 4px 8px;
    gap: 0;
    align-items: stretch;
  }
  /* ── Left column: header + back button ── */
  .left-col {
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    flex-shrink: 0; width: 100px;
    padding-top: 8px;
    order: 1;
  }
  .header { padding: 0; order: auto; }
  .header h1 { font-size: 0.75rem; }
  .header .subtitle { display: none; }
  .btn-back { position: static; margin-bottom: 4px; }

  /* ── Middle column: controls ── */
  .mid-col {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; flex-shrink: 0;
    padding: 6px 4px;
    order: 2;
  }
  .controls {
    display: flex; flex-direction: column; gap: 4px;
    width: 100%; align-items: center;
    order: auto; padding: 0;
  }
  .ctrl-btn {
    padding: 10px 6px; font-size: 0.8rem;
    width: 100%; min-width: 70px;
  }

  /* ── Right column: canvas + つぎ at bottom-right ── */
  .right-col {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; min-width: 0;
    order: 3; position: relative;
  }
  .trace-area {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
    order: auto; position: relative;
    width: 100%;
  }
  .canvas-container {
    width: min(88vh, calc(100vw - 250px));
    height: min(88vh, calc(100vw - 250px));
    max-width: none; max-height: none;
  }
  .next-row {
    position: absolute; bottom: 12px; right: 12px;
    order: auto; padding: 0; width: auto;
    display: block; z-index: 100;
  }
  .next-row .ctrl-btn {
    width: auto; padding: 14px 28px; font-size: 1.05rem;
    box-shadow: 0 4px 16px rgba(74,222,128,0.4);
  }
  /* Pono deco: canvas bottom-left (bigger, shifted right & up) */
  .pono-deco {
    display: block;
    position: absolute;
    bottom: 8px; left: 12px;
    width: 68px; z-index: 100;
  }
  .hedgehog-wrap { display: none; }
  /* Pono speech bubble (landscape) */
  .pono-bubble {
    display: block;
    position: absolute;
    bottom: 145px; left: 10px;
    background: #fff;
    border-radius: 16px;
    padding: 5px 12px;
    font-size: 0.78rem;
    font-weight: 900;
    color: var(--text);
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    z-index: 101;
    opacity: 0;
    animation: pono-bubble-pop 18s ease-in-out infinite;
    animation-delay: 3s;
    animation-fill-mode: backwards;
  }
  .pono-bubble::after {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 20px;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 8px solid #fff;
  }
  @keyframes pono-bubble-pop {
    0%, 68%  { opacity: 0; transform: scale(0.5); }
    73%      { opacity: 1; transform: scale(1.15); }
    76%, 86% { opacity: 1; transform: scale(1); }
    91%      { opacity: 0; transform: scale(0.5); }
    100%     { opacity: 0; }
  }
  .progress-hint { display: none; }
  .streak-badge { right: 0; top: 2px; }
}

/* ===== Tutorial ===== */
.tut-dim { position:fixed;inset:0;z-index:9995;background:rgba(93,78,55,0.6);pointer-events:auto; }
.tut-dim.hidden { display:none; }
.tut-bubble { position:fixed;z-index:9997;background:#fff;border-radius:16px;padding:12px 12px;max-width:none;box-shadow:0 4px 20px rgba(93,78,55,0.3);font-size:0.95rem;font-weight:700;color:#5D4E37;line-height:1.6;text-align:center;white-space:nowrap; }
.tut-bubble.hidden { display:none; }
.tut-next-btn { display:inline-block;margin-top:10px;padding:8px 24px;border:none;border-radius:50px;background:linear-gradient(135deg,#60A5FA,#818CF8);color:#fff;font-family:inherit;font-size:0.85rem;font-weight:900;cursor:pointer; }
#demoIndicator {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  font-size:0.95rem; font-weight:900; color:#FF6B9D;
  background:rgba(255,255,255,0.85); padding:4px 14px; border-radius:20px;
  animation:demoBlink 0.8s ease-in-out infinite;
  display:none; z-index:200;
  box-shadow:0 2px 8px rgba(255,107,157,0.3);
  pointer-events:none;
}
@keyframes demoBlink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
</style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="89d02cb9-6bec-4f30-a21a-65321374dbdc"></script>

<body>
<div class="tut-dim hidden" id="tut-dim"></div>
<div class="tut-bubble hidden" id="tut-bubble"></div>
<audio id="bgm" loop src="../assets/audio/Sunny Little Steps.mp3" preload="auto"></audio>

<!-- ===== Row Selection Screen ===== -->

// ===== Audio =====
// AudioContextをページロード時に即生成（suspendedだが存在はする）
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function getAudioCtx() { return audioCtx; }
function withAudio(fn) {
  const ctx = getAudioCtx();
  if (ctx.state === 'running') { fn(ctx); return; }
  ctx.resume().then(() => fn(ctx)).catch(() => {});
}
// iOS/Android: 最初のタッチでAudioContextを即座にアクティブにする
// resume()は非同期なので、無音オシレータを鳴らして強制的にrunning状態にする
function unlockAudio() {
  const ac = getAudioCtx();
  ac.resume().catch(() => {});
  if (ac.state !== 'running') {
    // 無音オシレータで即アクティブ化
    try {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      gain.gain.value = 0;
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.001);
    } catch(e) {}
  }
}
// capture: true で HanziWriter より先にイベントを受け取る
document.addEventListener('touchstart', unlockAudio, { capture: true, passive: true });
document.addEventListener('pointerdown', unlockAudio, { capture: true });

// iOS対応: 1つのAudio要素を使い回す（最初のタッチでアンロック）
const _sharedAudio = new Audio();
_sharedAudio.preload = 'auto';
let _sharedAudioUnlocked = false;
function _unlockSharedAudio() {
  if (_sharedAudioUnlocked) return;
  // 無音srcを設定してplay→iOSのAudio制限を解除
  _sharedAudio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=';
  _sharedAudio.play().then(() => { _sharedAudioUnlocked = true; _sharedAudio.pause(); }).catch(() => {});
}
document.addEventListener('touchstart', _unlockSharedAudio, { passive: true });
document.addEventListener('pointerdown', _unlockSharedAudio);

function playSuccessSound() {
  withAudio(ac => {
    const now = ac.currentTime;
    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const osc = ac.createOscillator(), gain = ac.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, now + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.4);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(now + i * 0.15); osc.stop(now + i * 0.15 + 0.4);
    });
  });
}

function playStrokeSound() {
  withAudio(ac => {
    const now = ac.currentTime;
    const osc = ac.createOscillator(), gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(now); osc.stop(now + 0.15);
  });
}

// ===== Word Card + TTS =====
function _getVoiceUrl(char) {
  if (currentCategory === 'hiragana') {
    const idx = CATEGORIES.hiragana.chars.indexOf(char);
    if (idx >= 0 && idx <= 44) return '../assets/voices/' + String(idx).padStart(2, '0') + '-aiueo.wav';
    if (idx === 45) return '../assets/voices/katakana/45-katakana.wav';
  }
  if (currentCategory === 'katakana') {
    const idx = CATEGORIES.katakana.chars.indexOf(char);
    if (idx >= 0 && idx <= 45) return '../assets/voices/katakana/' + String(idx).padStart(2, '0') + '-katakana.wav';
  }
  return null;
}
let _voicePlayId = 0; // キャンセル用ID
function _preloadWordAudio() {
  // 共有Audio要素にsrcをセットしてプリロード
  const char = CATEGORIES[currentCategory].chars[currentCharIndex];
  const url = _getVoiceUrl(char);
  if (url) {
    _sharedAudio.src = url;
    _sharedAudio.load();
  }
}
function speakWord(char, word) {
  if (window.speechSynthesis) speechSynthesis.cancel();
  const url = _getVoiceUrl(char);
  if (!url) { _speakFallback(char, word); return; }
  const myId = ++_voicePlayId;
  // プリロード済みの同じsrcならそのまま再生
  if (_sharedAudio.src.endsWith(url.replace('../', '/'))) {
    _sharedAudio.currentTime = 0;
    _sharedAudio.play().catch(() => _speakFallback(char, word));
    return;
  }
  // 違うsrcなら切り替えて再生
  _sharedAudio.src = url;
  _sharedAudio.oncanplaythrough = function() {
    _sharedAudio.oncanplaythrough = null;
    if (_voicePlayId !== myId) return; // キャンセルされた
    _sharedAudio.play().catch(() => _speakFallback(char, word));
  };
  _sharedAudio.load();
}

function _speakFallback(char, word) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(`${char}！${word}！`);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  u.pitch = 1.2;
  speechSynthesis.speak(u);
}

let _wordCardTimer = null;
function showWordCard() {

  const card = document.getElementById('word-card');

    document.getElementById('word-card-text').innerHTML =
      `<span class="word-card-note">${data.note}</span>`;
  } else {
    document.getElementById('word-card-text').innerHTML =
      `<span class="word-card-first">${char}</span>${data.word.slice(char.length)}`;
  }
  clearTimeout(_wordCardTimer);
  card.classList.remove('show', 'hide');
  // 横向き: キャンバス中央に配置
  if (landscapeMQ.matches) {
    const rect = canvasContainer.getBoundingClientRect();
    card.style.left = (rect.left + rect.width / 2) + 'px';
    card.style.bottom = 'auto';
    card.style.top = (rect.top + rect.height / 2) + 'px';
    card.style.transform = 'translate(-50%, -50%)';
  } else {
    card.style.left = '50%';
    card.style.bottom = '120px';
    card.style.top = 'auto';
    card.style.transform = 'translateX(-50%)';
  }
  card.classList.add('show');
  speakWord(char, data.word);
  _wordCardTimer = setTimeout(() => {
    card.classList.remove('show');
    card.classList.add('hide');
    setTimeout(() => card.classList.remove('hide'), 400);

// ===== Hanzi Writer Mode =====
function createWriter(char) {
  // Destroy previous
  if (writer) {
    writerTarget.innerHTML = '';
    writer = null;
  }

  const rect = canvasContainer.getBoundingClientRect();
  const size = Math.min(rect.width, rect.height);
  currentScheme = nextColorScheme();

  currentCharData = null;
  strokeNumbers.innerHTML = '';

  writer = HanziWriter.create(writerTarget, char, {
    width: size,
    height: size,
    padding: 25,
    strokeColor: currentScheme.stroke,
    outlineColor: currentScheme.outline,
    drawingColor: currentScheme.drawing,
    highlightColor: currentScheme.highlight,
    radicalColor: currentScheme.stroke,
    drawingWidth: 16,
    strokeAnimationSpeed: 0.5,
    delayBetweenStrokes: 800,
    showOutline: true,
    showCharacter: false,
    charDataLoader: function(char, onComplete) {
      // Try kana-json first (for hiragana/katakana)
      const url = 'https://cdn.jsdelivr.net/gh/ailectra/kana-json@v0.0.1/data/' + char + '.json';
      fetch(url)
        .then(r => {
          if (!r.ok) throw new Error('Not found');
          return r.json();
        })
        .then(data => {
          currentCharData = data;
          showStrokeNumbers(data, size);
          onComplete(data);
        })
        .catch(() => {
          // Fallback: try hanzi-writer-data
          const url2 = 'https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + char + '.json';
          fetch(url2)
            .then(r => {
              if (!r.ok) throw new Error('Not found');
              return r.json();
            })
            .then(data => {
              currentCharData = data;
              showStrokeNumbers(data, size);
              onComplete(data);
            })
            .catch(() => {
              console.warn('No data for character:', char);
            });
        });
    }
  });

  // まずお手本を1回流してからquizモードへ
  // チュートリアル表示中はスキップ（チュートリアル終了後に実行される）
  if (!_tutorialActive && !_rowPracticeActive) {
    // チュートリアルが非表示 かつ 行練習モードでもなければ通常通りお手本→quiz
    withAudio(function(ac) {
      var now = ac.currentTime;
      var osc = ac.createOscillator(), g = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.15);
      osc.frequency.setValueAtTime(784, now + 0.3);
      g.gain.setValueAtTime(0.12, now);
      g.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
      osc.connect(g); g.connect(ac.destination);
      osc.start(now); osc.stop(now + 0.45);
    });
    _hedgeBubble.textContent = 'このじゅんばんで かくよ！';
    _ponoBubble.textContent = 'このじゅんばんで かくよ！';
    document.getElementById('demoIndicator').style.display = 'block';
    writer.animateCharacter({
      onComplete: function() {
        document.getElementById('demoIndicator').style.display = 'none';
        _hedgeBubble.textContent = 'かいてみよう！';
        _ponoBubble.textContent = 'かいてみよう！';
        writer.hideCharacter();
        // 「スタート！」表示してからquiz開始
        var dim = document.getElementById('tut-dim');
        var bubble = document.getElementById('tut-bubble');
        if (dim && bubble) {
          dim.classList.remove('hidden');
          bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
          bubble.innerHTML = '<div style="font-size:1.5rem;font-weight:900;color:#F2915A;">✏️ スタート！</div>';
          bubble.classList.remove('hidden');
          setTimeout(function() {
            dim.classList.add('hidden');
            bubble.classList.add('hidden');
            startQuiz();
          }, 1000);
        } else {
          startQuiz();
        }
      }
    });
  }
  // チュートリアル表示中はお手本を待機（showTutorialのendTutで開始される）
}

// ===== Stroke Order Numbers =====
function showStrokeNumbers(charData, targetSize) {
  strokeNumbers.innerHTML = '';
  if (!charData || !charData.medians) return;

  // Wait for HanziWriter to render SVG, then use its internal transform
  setTimeout(() => {
    const svg = writerTarget.querySelector('svg');
    if (!svg) return;
    const containerRect = canvasContainer.getBoundingClientRect();

    // Find HanziWriter's top-level group (has the coordinate transform)
    const topGroup = svg.querySelector('g');
    if (!topGroup) return;

    charData.medians.forEach((median, i) => {
      if (!median || median.length === 0) return;
      const [mx, my] = median[0];

      // Use SVG's coordinate transform API for pixel-perfect positioning
      const pt = svg.createSVGPoint();
      pt.x = mx;
      pt.y = my;
      const ctm = topGroup.getScreenCTM();
      const screenPt = pt.matrixTransform(ctm);

      // Convert screen coords to container-relative percentage
      const relX = screenPt.x - containerRect.left;
      const relY = screenPt.y - containerRect.top;
      const pctX = (relX / containerRect.width) * 100;
      const pctY = (relY / containerRect.height) * 100;

      const num = document.createElement('div');
      num.className = 'stroke-number';
      num.textContent = i + 1;
      num.style.left = pctX + '%';
      num.style.top = pctY + '%';
      num.style.background = currentScheme.stroke;
      strokeNumbers.appendChild(num);
    });
  }, 200);
}

function startQuiz() {
  if (!writer) return;
  writer.quiz({
    onCorrectStroke: function(data) {
      playStrokeSound();
    },
    onComplete: function(data) {
      showCompletion();
    },
    onMistake: function(data) {
      // Small vibrate feedback if available
    },
    showHintAfterMisses: 3,
    highlightOnComplete: true,
    highlightCompleteColor: currentScheme.stroke
  });
}

// ===== Row Selection Screen =====
let _currentScreen = 'select'; // 'select' | 'practice'

function buildRowSelectScreen() {
  const grid = document.getElementById('rsGrid');
  if (!grid) return;
  grid.innerHTML = '';
  const rows = GOJUON_ROWS[currentCategory];
  const cat = CATEGORIES[currentCategory];
  const stamps = loadStamps();

  rows.forEach(function(row, i) {
    const btn = document.createElement('button');
    btn.className = 'rs-row-btn';
    // Check completion
    let allDone = true;
    for (let j = 0; j < row.count; j++) {
      if (!stamps[currentCategory]?.[row.start + j]) { allDone = false; break; }
    }
    if (allDone) btn.classList.add('all-done');

    // Row label
    const labelEl = document.createElement('div');
    labelEl.className = 'rs-row-label';
    labelEl.textContent = row.label + 'ぎょう';
    btn.appendChild(labelEl);

    // Characters preview
    const charsEl = document.createElement('div');
    charsEl.className = 'rs-row-chars';
    let charsStr = '';
    for (let j = 0; j < row.count; j++) charsStr += cat.chars[row.start + j];
    charsEl.textContent = charsStr;
    btn.appendChild(charsEl);

    if (allDone) {
      const doneEl = document.createElement('div');
      doneEl.className = 'rs-row-done-mark';
      doneEl.textContent = '✓ クリア！';
      btn.appendChild(doneEl);
    }

    btn.addEventListener('click', function() { enterPractice(i); });
    grid.appendChild(btn);
  });

  // Wire category tabs
  var catTabs = document.querySelectorAll('#rsCategoryTabs .category-tab');
  catTabs.forEach(function(tab) {
    tab.classList.toggle('active', tab.dataset.cat === currentCategory);
    tab.onclick = function() {
      if (tab.dataset.cat === currentCategory) return;
      currentCategory = tab.dataset.cat;
      catTabs.forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      buildRowSelectScreen();
    };
  });
}

  if (!_rowPracticeRow) { _rowPracticeActive = false; return; }

    _rowPracticeComplete();

  }
  const globalIdx = _rowPracticeRow.start + _rowPracticeStep;
  currentCharIndex = globalIdx;

    writer.animateCharacter({
      onComplete: function() {
        document.getElementById('demoIndicator').style.display = 'none';
        if (!_rowPracticeActive) return;
        // Phase 2: Quiz with guides
        _rowPracticePhase = 'quiz_guided';
        _hedgeBubble.textContent = 'かいてみよう！';
        _ponoBubble.textContent = 'かいてみよう！';
        writer.hideCharacter();
        writer.quiz({
          onCorrectStroke: function() { playStrokeSound(); },
          onComplete: function() {
            if (!_rowPracticeActive) return;
            playSuccessSound();
            launchConfetti();
            saveStamp(currentCategory, currentCharIndex);
            markCharDone(currentCharIndex);
            awardPoints(2);
            if (window.incrementStat) {
              window.incrementStat('writing_chars', 1);
              if (currentCategory === 'hiragana') window.incrementStat('writing_hiragana', 1);
              if (currentCategory === 'katakana') window.incrementStat('writing_katakana', 1);

            // Phase 3: Show word illustration
            _rowPracticePhase = 'show_word';

            const char = CATEGORIES[currentCategory].chars[currentCharIndex];
            if (data && data.word) {
              _showRowPracticeWord(char, data, function() {
                // Phase 4: Word context writing
                _rowPracticePhase = 'quiz_free';
                _hedgeBubble.textContent = 'ことばで かこう！';
                _ponoBubble.textContent = 'ことばで かこう！';

                  _rowPracticeStep++;
                  _rowPracticeNextChar();

              });
            } else {
              // No word data (を, ん) — skip word phase
              setTimeout(function() {
                _rowPracticeStep++;
                _rowPracticeNextChar();
              }, 1200);
            }
          },
          showHintAfterMisses: 3,
          highlightOnComplete: true,
          highlightCompleteColor: currentScheme.stroke

}

function _startWordContextPhase(char, data, onComplete) {
  var traceArea = document.querySelector('.trace-area');
  var canvasWrap = document.querySelector('.canvas-wrap');
  canvasWrap.style.display = 'none';

  // Create word context wrapper
  var wcWrap = document.createElement('div');
  wcWrap.className = 'word-context-wrapper';
  wcWrap.id = 'wordContextWrap';

  // Emoji
  var emojiDiv = document.createElement('div');
  emojiDiv.className = 'word-context-emoji';
  emojiDiv.textContent = data.emoji;
  wcWrap.appendChild(emojiDiv);

  // Word row
  var wordRow = document.createElement('div');
  wordRow.className = 'word-context-row';

  // Left cell: writable canvas
  var leftCell = document.createElement('div');
  leftCell.className = 'word-context-cell writable';
  var cellSize = Math.min(Math.min(window.innerWidth, window.innerHeight) * 0.38, 180);
  leftCell.style.width = cellSize + 'px';
  leftCell.style.height = cellSize + 'px';
  var wcTarget = document.createElement('div');
  wcTarget.id = 'wcWriterTarget';
  leftCell.appendChild(wcTarget);
  wordRow.appendChild(leftCell);

  // Right cell(s): remaining text characters
  var remaining = data.word.slice(char.length);
  if (remaining) {
    for (var ri = 0; ri < remaining.length; ri++) {
      var rightCell = document.createElement('div');
      rightCell.className = 'word-context-cell text-only';
      rightCell.style.width = cellSize + 'px';
      rightCell.style.height = cellSize + 'px';
      rightCell.textContent = remaining[ri];
      wordRow.appendChild(rightCell);
    }
  }

  wcWrap.appendChild(wordRow);
  traceArea.appendChild(wcWrap);

  // Create mini HanziWriter
  var wcWriter = HanziWriter.create(wcTarget, char, {
    width: cellSize,
    height: cellSize,
    padding: 15,
    strokeColor: currentScheme.stroke,
    outlineColor: currentScheme.outline,
    drawingColor: currentScheme.drawing,
    highlightColor: currentScheme.highlight,
    drawingWidth: 14,
    strokeAnimationSpeed: 0.5,
    showOutline: true,
    showCharacter: false,
    charDataLoader: function(c, onLoad) {
      var url = 'https://cdn.jsdelivr.net/gh/ailectra/kana-json@v0.0.1/data/' + c + '.json';
      fetch(url)
        .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
        .then(function(d) { onLoad(d); })
        .catch(function() {
          var url2 = 'https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + c + '.json';
          fetch(url2)
            .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
            .then(function(d) { onLoad(d); })
            .catch(function() {});
        });
    }
  });

  wcWriter.quiz({
    onCorrectStroke: function() { playStrokeSound(); },
    onComplete: function() {
      if (!_rowPracticeActive) return;
      playSuccessSound();
      speakWord(char, data.word);
      _hedgeBubble.textContent = 'すごーい！';
      _ponoBubble.textContent = 'すごーい！';
      setTimeout(function() {
        wcWrap.remove();
        canvasWrap.style.display = '';
        if (onComplete) onComplete();
      }, 2000);
    },
    showHintAfterMisses: 3,
    highlightOnComplete: true,
    highlightCompleteColor: currentScheme.stroke
  });
}

// ===== Orientation change — force viewport recalc =====
function fixViewportHeight() {
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const h = vh + 'px';
  document.documentElement.style.height = h;
  document.body.style.height = h;
  document.body.style.width = vw + 'px';
  document.getElementById('app').style.height = h;
  // Kill any scroll offset
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  if (window.visualViewport) {
    window.scrollTo(window.visualViewport.offsetLeft, window.visualViewport.offsetTop);
  }
}
function onOrientationChange() {
  fixViewportHeight();
  setTimeout(fixViewportHeight, 50);
  setTimeout(fixViewportHeight, 150);
  setTimeout(fixViewportHeight, 400);
  setTimeout(fixViewportHeight, 800);
  if (_currentScreen === 'select') buildRowSelectScreen();
}

window.addEventListener('orientationchange', () => {
  setTimeout(fixViewportHeight, 50);
  setTimeout(fixViewportHeight, 200);
  setTimeout(fixViewportHeight, 500);
});
if (window.visualViewport) {

// ===== Character speech bubble =====
const CHEER_MSGS = [
  'がんばれー！', 'いいね！', 'じょうず！', 'もうすこし！',
  'すごーい！', 'ファイト！', 'できるよ！', 'そのちょうし！',
  'いいかんじ！', 'がんばってね！',
];
let _cheerMsgIdx = 0;
const _hedgeBubble = document.getElementById('hedgehogBubble');
const _ponoBubble = document.getElementById('ponoBubble');
setInterval(() => {
  _cheerMsgIdx = (_cheerMsgIdx + 1) % CHEER_MSGS.length;
  const msg = CHEER_MSGS[_cheerMsgIdx];
  _hedgeBubble.textContent = msg;
  _ponoBubble.textContent = msg;
}, 18000);

// ===== BGM =====
const bgm = document.getElementById('bgm');
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';
let bgmStarted = false;
bgm.volume = 0.2;

function tryStartBgm() {
  if (!bgmEnabled || bgmStarted) return;
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
}
// BGM starts when entering practice (user tap satisfies autoplay policy)

// ===== Back Button =====
document.getElementById('btnBack').addEventListener('click', returnToSelect);

// ===== Init =====
// Show row selection screen (practice screen is hidden)
buildRowSelectScreen();

// ===== Public API =====
window.KidsTraceApp = {
  getCurrentChar,
  loadCharacter,
  showCompletion
};

document.addEventListener('visibilitychange', () => {
  if (document.hidden) { bgm.pause(); }
  else if (bgmEnabled) { bgm.play().catch(() => {}); }
});
window.addEventListener('blur',  () => bgm.pause());
window.addEventListener('focus', () => { if (bgmEnabled) bgm.play().catch(() => {}); });

// ===== Tutorial =====
function showTutorial() {
  var dim = document.getElementById('tut-dim');
  var bubble = document.getElementById('tut-bubble');
  if (!dim || !bubble) return;
  _tutorialActive = true;

  // 1ステップ: 説明 → お手本再生 → スタート
  dim.classList.remove('hidden');
  bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
  bubble.innerHTML = '✏️ おてほんを みて<br>おなじ じゅんばんで<br>ゆびで なぞってみよう！<br><button class="tut-next-btn" id="tut-next">おてほんを みる ▶</button>';
  bubble.classList.remove('hidden');

  document.getElementById('tut-next').addEventListener('pointerdown', function(e) {
    e.preventDefault();
    dim.classList.add('hidden');
    bubble.classList.add('hidden');
    _tutorialActive = false;
    localStorage.setItem('writing_tut_seen', '1');
    // お手本再生 → スタート
    if (writer) {
      _hedgeBubble.textContent = 'このじゅんばんで かくよ！';
      _ponoBubble.textContent = 'このじゅんばんで かくよ！';
      document.getElementById('demoIndicator').style.display = 'block';
      writer.animateCharacter({
        onComplete: function() {
          document.getElementById('demoIndicator').style.display = 'none';
          _hedgeBubble.textContent = 'かいてみよう！';
          _ponoBubble.textContent = 'かいてみよう！';
          writer.hideCharacter();
          dim.classList.remove('hidden');
          bubble.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
          bubble.innerHTML = '<div style="font-size:1.5rem;font-weight:900;color:#F2915A;">✏️ スタート！</div>';
          bubble.classList.remove('hidden');
          setTimeout(function() {
            dim.classList.add('hidden');
            bubble.classList.add('hidden');
            startQuiz();
          }, 1000);
        }
      });
    }
  });
}

// ===== Menu =====
initMenu({ bgmToggle: function() {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
  if (bgmEnabled) { bgmStarted = false; tryStartBgm(); } else { bgm.pause(); }
}, tutorial: showTutorial });
</script>
