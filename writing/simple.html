<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>もじかき シンプルモード | ポノのあそびば</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ドラクエ風ダーク (RPG モードと統一) */
  --bg: #05070f;
  --bg-deep: #000000;
  --primary: #FFD36E;
  --secondary: #C084FC;
  --accent: #6EE7B7;
  --text: #F4E9D0;
  --text-dim: #8B96B8;
  --card-bg: #0a0e1f;
  --window-bg: #0a0e1f;
  --window-border: #F4E9D0;
  --canvas-bg: #05070f;
  --grid-line: rgba(255,255,255,0.10);
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
  --radius: 14px;
}

/* v278s (2026-04-26): ユーザー指示「Quest 本編もこのシンプルモードも横画面型固定にしましょう」
   → 縦画面では「よこむきにしてね」フルスクリーン警告で操作を遮断 (CSS のみで完結)。
     screen.orientation.lock('landscape') は PWA standalone 時の補助的試行 (script 末尾)。 */
@media (orientation: portrait) {
  body::before {
    content: '📱  よこむきに してね';
    position: fixed;
    inset: 0;
    z-index: 100000;
    background: #000;
    color: #FFD36E;
    font-family: 'DotGothic16', 'Hiragino Maru Gothic Pro', sans-serif;
    font-size: clamp(1.2rem, 5vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.2em;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    text-shadow: 0 0 16px rgba(255,211,110,0.6);
    pointer-events: all;
  }
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  font-family: 'DotGothic16', 'Zen Maru Gothic', 'Rounded Mplus 1c', 'Hiragino Maru Gothic Pro', sans-serif;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(60, 40, 110, 0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 85%, rgba(30, 70, 140, 0.30) 0%, transparent 60%),
    radial-gradient(circle at 15% 72%, rgba(255,255,255,0.9) 0.5px, transparent 1px),
    radial-gradient(circle at 73% 22%, rgba(255,255,255,0.8) 0.5px, transparent 1px),
    radial-gradient(circle at 42% 55%, rgba(255,255,255,0.7) 0.5px, transparent 1px),
    radial-gradient(circle at 88% 48%, rgba(255,255,255,0.7) 0.5px, transparent 1px),
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6) 0.5px, transparent 1px),
    linear-gradient(180deg, #020308 0%, #05070f 50%, #0b0b1a 100%);
  background-color: var(--bg-deep);
  color: var(--text);
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  position: fixed;
  width: 100%;
  top: 0; left: 0;
}

#app {
  display: flex; flex-direction: column;
  height: 100dvh;
  max-width: 900px;
  margin: 0 auto;
  padding: 6px 10px 8px;
  overflow: hidden;
}

/* ===== Top bar (back / bgm / streak) ===== */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 0;
  flex-shrink: 0;
  position: relative;
}
.back-link {
  color: var(--primary); font-weight: 700; font-size: 0.85rem;
  text-decoration: none; padding: 6px 12px;
  border: 2px solid var(--window-border);
  border-radius: 8px;
  background: var(--window-bg);
  letter-spacing: 0.05em;
  font-family: 'DotGothic16', sans-serif;
}
.btn-bgm {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--window-bg);
  border: 2px solid var(--window-border);
  color: var(--text);
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.btn-bgm:active { transform: scale(0.92); }
.streak-badge {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  display: inline-block;
  background: linear-gradient(135deg, #FCD34D, #F97316);
  color: #fff;
  font-size: 0.78rem; font-weight: 900;
  padding: 4px 12px; border-radius: 14px;
  box-shadow: 0 2px 8px rgba(249,115,22,0.4), 0 0 12px rgba(255,170,60,0.4);
  pointer-events: none;
  animation: stampPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.streak-badge.hidden { display: none; }
@keyframes stampPop {
  from { transform: translate(-50%,-50%) scale(0.6); opacity: 0; }
  to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
}

/* ===== Main split (left: 文字選択 / right: キャンバス) ===== */
.main-split {
  flex: 1;
  display: flex;
  gap: 10px;
  min-height: 0;
  padding-top: 4px;
}

/* 左サイドパネル */
.side-panel {
  width: clamp(108px, 24vw, 170px);
  display: flex; flex-direction: column;
  gap: 6px;
  min-height: 0;
}

.category-tabs {
  display: flex; gap: 4px;
  flex-shrink: 0;
}
.category-tab {
  flex: 1;
  padding: 7px 4px;
  border: 2px solid var(--window-border);
  border-radius: 6px;
  font-family: 'DotGothic16', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  background: var(--window-bg);
  color: var(--text);
  letter-spacing: 0.05em;
  transition: transform 0.15s, box-shadow 0.2s, color 0.2s;
}
.category-tab.active {
  background: linear-gradient(135deg, #2B2052, #1B1A3D);
  color: var(--primary);
  border-color: var(--primary);
  box-shadow: 0 0 12px rgba(255,211,110,0.35), inset 0 0 8px rgba(255,211,110,0.15);
}
.category-tab[data-cat="katakana"].active {
  background: linear-gradient(135deg, #2A1F4A, #1F1A36);
  color: var(--secondary);
  border-color: var(--secondary);
  box-shadow: 0 0 12px rgba(192,132,252,0.35), inset 0 0 8px rgba(192,132,252,0.15);
}

/* 文字選択 (グリッド表示・縦スクロール) */
.char-selector {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 4px;
  overflow-y: auto;
  padding: 4px 2px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: rgba(244,233,208,0.25) transparent;
}
.char-selector::-webkit-scrollbar { width: 4px; }
.char-selector::-webkit-scrollbar-thumb { background: rgba(244,233,208,0.25); border-radius: 2px; }

.char-btn {
  height: 38px;
  border: 2px solid var(--window-border);
  border-radius: 6px;
  background: var(--window-bg);
  color: var(--text);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  cursor: pointer;
  position: relative;
  transition: transform 0.15s, box-shadow 0.2s, background 0.2s, color 0.2s;
}
.char-btn:active { transform: scale(0.94); }
.char-btn.active {
  background: linear-gradient(135deg, #382C5A, #1F1B3F);
  color: var(--primary);
  box-shadow: 0 0 14px rgba(255,211,110,0.5), inset 0 0 10px rgba(255,211,110,0.25);
  border-color: var(--primary);
}
.char-btn.done {
  background: linear-gradient(135deg, #103A2A, #0B2A1F);
  border-color: #6EE7B7;
  color: #6EE7B7;
}
.char-btn.done.active {
  box-shadow: 0 0 14px rgba(110,231,183,0.5), inset 0 0 10px rgba(110,231,183,0.25);
}
.char-btn.done::after {
  content: '✓';
  position: absolute;
  top: 1px; right: 4px;
  font-size: 0.55rem;
  color: #6EE7B7;
  line-height: 1;
  font-weight: 900;
}

/* ===== Trace area (右側) ===== */
.trace-area {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
  min-height: 0;
  gap: 8px;
}
.canvas-container {
  position: relative;
  width: min(100%, 70vh);
  aspect-ratio: 1 / 1;
  max-width: 540px;
  background: var(--canvas-bg);
  border: 2.5px solid var(--window-border);
  border-radius: 14px;
  box-shadow: var(--shadow), inset 0 0 24px rgba(140,120,255,0.10);
  overflow: hidden;
  flex-shrink: 1;
}
/* 田の字グリッド (薄い白) */
.canvas-container::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background:
    linear-gradient(to right, transparent 49.5%, var(--grid-line) 49.5%, var(--grid-line) 50.5%, transparent 50.5%),
    linear-gradient(to bottom, transparent 49.5%, var(--grid-line) 49.5%, var(--grid-line) 50.5%, transparent 50.5%);
}
.canvas-container::after {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background:
    linear-gradient(45deg, transparent calc(50% - 0.5px), rgba(255,255,255,0.05) calc(50% - 0.5px), rgba(255,255,255,0.05) calc(50% + 0.5px), transparent calc(50% + 0.5px)),
    linear-gradient(-45deg, transparent calc(50% - 0.5px), rgba(255,255,255,0.05) calc(50% - 0.5px), rgba(255,255,255,0.05) calc(50% + 0.5px), transparent calc(50% + 0.5px));
}

/* 書き取り線を金グロウで発光 (RPG モードと同じ) */
#writerTarget svg path,
#writerTarget svg line {
  filter: drop-shadow(0 0 2px rgba(255,235,180,0.85))
          drop-shadow(0 0 6px rgba(255,200,90,0.55))
          drop-shadow(0 0 14px rgba(255,170,60,0.35));
}

#writerTarget {
  position: absolute; inset: 0; z-index: 2;
}
#writerTarget svg { display: block; }

/* ===== Controls (下部のけす/おてほん/つぎ) ===== */
.controls {
  display: flex; gap: 8px; justify-content: center;
  padding: 2px 0 4px;
  flex-shrink: 0;
}
.ctrl-btn {
  padding: 8px 16px;
  border: 2px solid var(--window-border);
  border-radius: 8px;
  font-family: 'DotGothic16', sans-serif;
  font-size: 0.95rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  color: var(--text);
  background: var(--window-bg);
  box-shadow: 0 3px 8px rgba(0,0,0,0.5);
  letter-spacing: 0.05em;
}
.ctrl-btn:active { transform: scale(0.95); }
.btn-clear { color: #FCA5A5; border-color: #FCA5A5; }
.btn-hint  { color: #7DD3FC; border-color: #7DD3FC; }
.btn-next  {
  background: linear-gradient(135deg, #10B981, #047857);
  color: #FFF;
  border-color: #6EE7B7;
  box-shadow: 0 3px 12px rgba(16,185,129,0.45);
}

/* ===== Stroke order numbers (筆順) ===== */
.stroke-number-overlay {
  position: absolute; inset: 0; pointer-events: none; z-index: 5;
}
.stroke-number {
  position: absolute;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--primary);
  color: #1B1A3D;
  font-size: 0.78rem; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 8px rgba(255,211,110,0.6);
  outline: 2px solid #1B1A3D;
  transform: translate(-50%, -50%);
  font-family: 'Zen Maru Gothic', sans-serif;
}

/* ===== Cheer fairies (画面 fixed 左下/右下) ===== */
.cheer-fairy {
  position: fixed;
  width: 78px; height: auto;
  pointer-events: none;
  filter: drop-shadow(0 0 12px rgba(255,220,150,0.4)) drop-shadow(2px 3px 4px rgba(0,0,0,0.55));
  z-index: 50;
  user-select: none;
}
/* v278t (2026-04-26): Serina は pixel-art 素材なので nearest-neighbor で描画 */
.cheer-fairy.serina { image-rendering: pixelated; }
/* v278s (2026-04-26): ユーザー指示「森の妖精が左のメニューの中に含まれているので、
   キャンバスのすぐ左上あたりに配置」「氷の妖精が出てきていないので、左下あたりに」
   → リーファ(森): 左下 → キャンバス左上 (側パネルの右側、画面上部)
     セリナ(氷): 新規配置、左下 (旧 リーファの位置)
     ヒノカ: 右下 (変更なし) */
.cheer-fairy.leefa {
  /* キャンバスの左上あたり: side-panel (24vw) のすぐ右、画面上部から少し下 */
  left: clamp(120px, 26vw, 200px);
  top: 60px;
  bottom: auto;
  animation: cheerFloat 3.2s ease-in-out infinite;
}
.cheer-fairy.serina {
  /* 画面左下 (旧リーファ位置) */
  left: 8px; bottom: 64px;
  animation: cheerFloat 3.4s ease-in-out 0.6s infinite;
}
.cheer-fairy.hinoka {
  right: 8px; bottom: 64px;
  animation: cheerFloat 3.6s ease-in-out 0.4s infinite;
}
@keyframes cheerFloat {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}

.fairy-bubble {
  position: fixed;
  background: var(--window-bg);
  color: var(--text);
  border: 2px solid var(--window-border);
  font-family: 'DotGothic16', sans-serif;
  font-size: 0.92rem;
  font-weight: 800;
  padding: 8px 14px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.6), 0 0 12px rgba(255,211,110,0.25);
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transform: translateY(8px) scale(0.9);
  transition: opacity 0.25s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 60;
}
.fairy-bubble.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.fairy-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  width: 12px; height: 12px;
  background: var(--window-bg);
  border-right: 2px solid var(--window-border);
  border-bottom: 2px solid var(--window-border);
  transform: rotate(45deg);
}
/* v278s: bubble はそれぞれの妖精の頭上 (上方) に表示 */
.fairy-bubble.leefa { left: clamp(120px, 26vw, 200px); top: 152px; bottom: auto; }
.fairy-bubble.leefa::after { left: 26px; top: -8px; bottom: auto; transform: rotate(225deg); }
.fairy-bubble.serina { left: 14px; bottom: 152px; }
.fairy-bubble.serina::after { left: 26px; }
.fairy-bubble.hinoka { right: 14px; bottom: 152px; }
.fairy-bubble.hinoka::after { right: 26px; }

@media (max-width: 540px) {
  .cheer-fairy { width: 56px; }
  .cheer-fairy.leefa { left: clamp(100px, 28vw, 160px); top: 50px; }
  .cheer-fairy.serina { left: 4px; bottom: 56px; }
  .cheer-fairy.hinoka { right: 4px; bottom: 56px; }
  .fairy-bubble { font-size: 0.78rem; padding: 6px 10px; }
  .fairy-bubble.leefa { left: clamp(100px, 28vw, 160px); top: 124px; }
  .fairy-bubble.serina { bottom: 124px; left: 6px; }
  .fairy-bubble.hinoka { bottom: 124px; right: 6px; }
  .side-panel { width: clamp(96px, 26vw, 130px); }
  .char-btn { height: 34px; font-size: 1rem; }
}

/* ===== Confetti / Completion / Milestone (RPG dark) ===== */
.confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 1000; overflow: hidden; }
.confetti-piece {
  position: absolute; width: 10px; height: 10px; border-radius: 2px;
  animation: confetti-fall 2.5s ease-out forwards;
}
@keyframes confetti-fall {
  0%   { transform: translateY(-10px) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}
.completion-overlay {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.3s;
}
.completion-overlay.show { opacity: 1; pointer-events: auto; }
.completion-msg {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 3rem; font-weight: 900;
  color: var(--primary);
  text-shadow:
    0 0 16px rgba(255,211,110,0.8),
    0 0 32px rgba(255,170,60,0.5),
    0 4px 12px rgba(0,0,0,0.7);
  animation: bounce-in 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
}
@keyframes bounce-in {
  0% { transform: scale(0); } 60% { transform: scale(1.3); } 100% { transform: scale(1); }
}

.milestone-modal {
  position: fixed; inset: 0; z-index: 1100;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.65);
  animation: fadeIn 0.25s ease;
}
.milestone-modal.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.milestone-card {
  background: var(--window-bg);
  border: 2.5px solid var(--window-border);
  border-radius: 16px;
  padding: 32px 28px 28px;
  text-align: center;
  width: min(88vw, 340px);
  box-shadow: 0 12px 48px rgba(0,0,0,0.6), 0 0 24px rgba(255,220,130,0.35);
  animation: milestoneIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  color: var(--text);
}
@keyframes milestoneIn {
  from { transform: scale(0.5) translateY(40px); opacity: 0; }
  to   { transform: scale(1)   translateY(0);    opacity: 1; }
}
.milestone-scene { font-size: 4.5rem; line-height: 1.1; white-space: pre-line; }
.milestone-count {
  font-size: 1rem; font-weight: 900;
  background: linear-gradient(135deg, #FCD34D, #F97316);
  color: #fff; padding: 2px 14px; border-radius: 20px;
}
.milestone-title {
  font-size: 1.8rem; font-weight: 900;
  color: var(--primary);
  text-shadow: 0 0 12px rgba(255,211,110,0.6);
  font-family: 'Zen Maru Gothic', sans-serif;
}
.milestone-msg { font-size: 0.95rem; font-weight: 700; color: var(--text-dim); }

/* ===== Star particles ===== */
.star-particle {
  position: absolute; pointer-events: none; z-index: 10; font-size: 1.2rem;
  animation: star-float 1s ease-out forwards;
}
@keyframes star-float {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-40px) scale(0.3); opacity: 0; }
}

.character-slot { position: fixed; bottom: 80px; right: 10px; width: 80px; height: 80px; z-index: 50; display: none; }

/* ===== 縦画面で高さが詰まる時の調整 ===== */
@media (max-height: 600px) {
  .controls { padding: 2px 0; }
  .ctrl-btn { padding: 6px 12px; font-size: 0.85rem; }
  .char-btn { height: 32px; font-size: 0.95rem; }
  .category-tab { padding: 5px 4px; font-size: 0.72rem; }
}
</style>
</head>
<body>
<audio id="bgm" loop src="../assets/audio/Sunny Little Steps.mp3" preload="auto"></audio>

<div id="app">
  <div class="topbar">
    <!-- v278s (2026-04-26): ユーザー指示「メニューボタンを押しても何も反応しません。タイトルに戻るボタンに」
         → href を ../index.html (= ルートメニュー) から ./index.html (= writing/index.html のタイトル画面) に変更
            ラベルも「← メニュー」→「← タイトル」に修正。タイトル画面 (showTitleScreen) が初期表示なので確実に戻れる。 -->
    <a href="./index.html" class="back-link">← タイトル</a>
    <div id="streak-badge" class="streak-badge hidden"></div>
    <button id="btn-bgm" class="btn-bgm" aria-label="おとのオンオフ">🔊</button>
  </div>

  <div class="main-split">
    <div class="side-panel">
      <div class="category-tabs" id="categoryTabs">
        <button class="category-tab active" data-cat="hiragana">ひらがな</button>
        <button class="category-tab" data-cat="katakana">カタカナ</button>
      </div>
      <div class="char-selector" id="charSelector"></div>
    </div>

    <div class="trace-area">
      <div class="canvas-container" id="canvasContainer">
        <div id="writerTarget"></div>
        <div class="stroke-number-overlay" id="strokeNumbers"></div>
      </div>
      <div class="controls">
        <button class="ctrl-btn btn-clear" id="btnClear">けす</button>
        <button class="ctrl-btn btn-hint" id="btnHint">おてほん</button>
        <button class="ctrl-btn btn-next" id="btnNext">つぎ →</button>
      </div>
    </div>
  </div>
</div>

<!-- 妖精は body 直下 fixed (画面の左上/左下/右下に常駐応援) -->
<!-- v278s: リーファをキャンバス左上、セリナを左下に配置 -->
<img class="cheer-fairy leefa" src="../assets/images/characters/pixies/Riefa/riefa_001.png" alt="リーファ">
<!-- v278t (2026-04-26): ユーザー支給の低解像度版 (serina_pixel_front.png) を使用。
     素材未保存時は serina_001.png にフォールバック (pixel-rendering 解除)。 -->
<img class="cheer-fairy serina" src="../assets/images/characters/pixies/Serina/serina_pixel_front.png" alt="セリナ" onerror="this.onerror=null;this.src='../assets/images/characters/pixies/Serina/serina_001.png';this.style.imageRendering='auto';">
<img class="cheer-fairy hinoka" src="../assets/images/characters/pixies/Hinoka/hinoka_001.png" alt="ヒノカ">
<div class="fairy-bubble leefa" id="bubble-leefa"></div>
<div class="fairy-bubble serina" id="bubble-serina"></div>
<div class="fairy-bubble hinoka" id="bubble-hinoka"></div>

<div class="confetti-container" id="confettiContainer"></div>
<div class="completion-overlay" id="completionOverlay">
  <div class="completion-msg">できた！🎉</div>
</div>
<div class="character-slot" id="characterSlot"></div>

<!-- Milestone Modal -->
<div id="milestone-modal" class="milestone-modal hidden">
  <div class="milestone-card">
    <div class="milestone-scene" id="milestone-scene"></div>
    <div class="milestone-count" id="milestone-count"></div>
    <div class="milestone-title" id="milestone-title"></div>
    <div class="milestone-msg" id="milestone-msg"></div>
  </div>
</div>

<script>
// ===== Color Schemes =====
const COLOR_SCHEMES = [
  { stroke: '#FFD36E', drawing: '#FFD36E', highlight: '#FFE9B0', outline: '#3A2E14' }, // gold
  { stroke: '#7DD3FC', drawing: '#7DD3FC', highlight: '#BAE6FD', outline: '#0C2A3D' }, // sky
  { stroke: '#C084FC', drawing: '#C084FC', highlight: '#D8B4FE', outline: '#2A1340' }, // purple
  { stroke: '#6EE7B7', drawing: '#6EE7B7', highlight: '#A7F3D0', outline: '#0B2A1F' }, // green
  { stroke: '#FCA5A5', drawing: '#FCA5A5', highlight: '#FECACA', outline: '#3A1313' }, // red
  { stroke: '#FBBF24', drawing: '#F59E0B', highlight: '#FCD34D', outline: '#3A2C0A' }, // amber
];
let colorIdx = 0;
function nextColorScheme() {
  const c = COLOR_SCHEMES[colorIdx % COLOR_SCHEMES.length];
  colorIdx++;
  return c;
}

// ===== Character data =====
const CATEGORIES = {
  hiragana: {
    label: 'ひらがな',
    chars: 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん'.split('')
  },
  katakana: {
    label: 'カタカナ',
    chars: 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン'.split('')
  }
};

// ===== State =====
let currentCategory = 'hiragana';
let currentCharIndex = 0;
let writer = null;
let currentScheme = COLOR_SCHEMES[0];
let currentCharData = null;

// ===== Game state =====
const STAMP_KEY = 'pono_stamps';
let streak = 0;

function loadStamps() {
  try { return JSON.parse(localStorage.getItem(STAMP_KEY)) || { hiragana: {}, katakana: {} }; }
  catch { return { hiragana: {}, katakana: {} }; }
}
function saveStamp(category, index) {
  const stamps = loadStamps();
  stamps[category][index] = true;
  localStorage.setItem(STAMP_KEY, JSON.stringify(stamps));
}
function markCharDone(index) {
  const btns = charSelector.querySelectorAll('.char-btn');
  if (btns[index]) btns[index].classList.add('done');
}
function updateStreakBadge() {
  const badge = document.getElementById('streak-badge');
  if (streak >= 2) {
    badge.textContent = `🔥 ${streak}れんぞく！`;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

// ===== Milestone rewards (every 5 streaks) =====
const MILESTONES = [
  { scene: '✨\n🌟',         title: 'すごいね！',     msg: 'ようせいたちも おどってる！' },
  { scene: '🌈\n✨',         title: 'さいこう！',     msg: 'にじが でたよ！' },
  { scene: '🏆\n🌟',         title: 'チャンピオン！', msg: 'トロフィー かがやく！' },
  { scene: '🚀\n🌙',         title: 'うちゅうまで！', msg: 'もう とまらない！' },
  { scene: '👑\n💫',         title: 'スーパー！',     msg: 'きみは おうさまだ！' },
];

function showMilestone(count) {
  const data = MILESTONES[(count / 5 - 1) % MILESTONES.length];
  const modal = document.getElementById('milestone-modal');
  document.getElementById('milestone-scene').textContent = data.scene;
  document.getElementById('milestone-count').textContent = `🔥 ${count}れんぞく！`;
  document.getElementById('milestone-title').textContent = data.title;
  document.getElementById('milestone-msg').textContent = data.msg;
  modal.classList.remove('hidden');

  const close = () => {
    modal.classList.add('hidden');
    modal.removeEventListener('click', close);
  };
  modal.addEventListener('click', close);
  setTimeout(close, 3000);
}

// ===== DOM =====
const categoryTabs = document.getElementById('categoryTabs');
const charSelector = document.getElementById('charSelector');
const writerTarget = document.getElementById('writerTarget');
const canvasContainer = document.getElementById('canvasContainer');
const btnClear = document.getElementById('btnClear');
const btnHint = document.getElementById('btnHint');
const btnNext = document.getElementById('btnNext');
const strokeNumbers = document.getElementById('strokeNumbers');
const confettiContainer = document.getElementById('confettiContainer');
const completionOverlay = document.getElementById('completionOverlay');


// ===== Audio =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function withAudio(fn) {
  const ctx = getAudioCtx();
  if (ctx.state === 'running') { fn(ctx); return; }
  ctx.resume().then(() => fn(ctx)).catch(() => {});
}
document.addEventListener('touchstart', () => getAudioCtx().resume(), { once: true, passive: true });
document.addEventListener('pointerdown', () => getAudioCtx().resume(), { once: true });

function playSuccessSound() {
  withAudio(ac => {
    const now = ac.currentTime;
    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const osc = ac.createOscillator(), gain = ac.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, now + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.4);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(now + i * 0.15); osc.stop(now + i * 0.15 + 0.4);
    });
  });
}

function playStrokeSound() {
  withAudio(ac => {
    const now = ac.currentTime;
    const osc = ac.createOscillator(), gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(now); osc.stop(now + 0.15);
  });
}

// ===== Confetti =====
function launchConfetti() {
  const colors = ['#FFD36E', '#7DD3FC', '#C084FC', '#6EE7B7', '#FBBF24', '#FCA5A5', '#F4E9D0'];
  for (let i = 0; i < 50; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.animationDuration = (2 + Math.random()) + 's';
    const size = 6 + Math.random() * 8;
    piece.style.width = size + 'px';
    piece.style.height = size + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    confettiContainer.appendChild(piece);
  }
  setTimeout(() => confettiContainer.innerHTML = '', 3000);
}

function showCompletion() {
  playSuccessSound();
  launchConfetti();
  completionOverlay.classList.add('show');
  setTimeout(() => completionOverlay.classList.remove('show'), 2000);

  saveStamp(currentCategory, currentCharIndex);
  markCharDone(currentCharIndex);
  streak++;
  updateStreakBadge();
  fairyCheer('success');
  if (streak % 5 === 0) setTimeout(() => showMilestone(streak), 800);
}

// ===== Fairy cheer (常駐妖精の応援セリフ) =====
const FAIRY_LINES = {
  start:   ['がんばって！', 'ゆっくりでいいよ', 'おうえんしてるよ', 'おまかせ！', 'おちついて〜'],
  success: ['すごい！', 'やったね！', 'じょうず！', 'かんぺき！', 'きれい！', 'さいこう！'],
  retry:   ['だいじょうぶ', 'もういちど', 'おしい！', 'いけるよ！'],
};
const FAIRY_IDS = ['leefa', 'serina', 'hinoka'];
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function showFairyBubble(fairyId, text, dur = 2200) {
  const el = document.getElementById('bubble-' + fairyId);
  if (!el) return;
  el.textContent = text;
  el.classList.add('show');
  if (el._timer) clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), dur);
}
function fairyCheer(type) {
  const lines = FAIRY_LINES[type];
  if (!lines || !lines.length) return;
  const fairy = pickRandom(FAIRY_IDS);
  showFairyBubble(fairy, pickRandom(lines));
}

// ===== Star particles (Canvas mode) =====
function spawnStar(x, y) {
  const star = document.createElement('div');
  star.className = 'star-particle';
  star.textContent = ['⭐', '✨', '🌟'][Math.floor(Math.random() * 3)];
  const rect = canvasContainer.getBoundingClientRect();
  star.style.left = (rect.left + x) + 'px';
  star.style.top = (rect.top + y) + 'px';
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 1000);
}

// ===== Hanzi Writer Mode =====
function createWriter(char) {
  if (writer) {
    writerTarget.innerHTML = '';
    writer = null;
  }

  const rect = canvasContainer.getBoundingClientRect();
  const size = Math.min(rect.width, rect.height);
  currentScheme = nextColorScheme();

  currentCharData = null;
  strokeNumbers.innerHTML = '';

  writer = HanziWriter.create(writerTarget, char, {
    width: size,
    height: size,
    padding: 25,
    strokeColor: currentScheme.stroke,
    outlineColor: currentScheme.outline,
    drawingColor: currentScheme.drawing,
    highlightColor: currentScheme.highlight,
    radicalColor: currentScheme.stroke,
    drawingWidth: 16,
    strokeAnimationSpeed: 0.5,
    delayBetweenStrokes: 800,
    showOutline: true,
    showCharacter: false,
    charDataLoader: function(char, onComplete) {
      const url = 'https://cdn.jsdelivr.net/gh/ailectra/kana-json@v0.0.1/data/' + char + '.json';
      fetch(url)
        .then(r => {
          if (!r.ok) throw new Error('Not found');
          return r.json();
        })
        .then(data => {
          currentCharData = data;
          showStrokeNumbers(data, size);
          onComplete(data);
        })
        .catch(() => {
          const url2 = 'https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + char + '.json';
          fetch(url2)
            .then(r => {
              if (!r.ok) throw new Error('Not found');
              return r.json();
            })
            .then(data => {
              currentCharData = data;
              showStrokeNumbers(data, size);
              onComplete(data);
            })
            .catch(() => {
              console.warn('No data for character:', char);
            });
        });
    }
  });

  startQuiz();
}

// ===== Stroke Order Numbers =====
function showStrokeNumbers(charData, targetSize) {
  strokeNumbers.innerHTML = '';
  if (!charData || !charData.medians) return;

  setTimeout(() => {
    const svg = writerTarget.querySelector('svg');
    if (!svg) return;
    const containerRect = canvasContainer.getBoundingClientRect();

    const topGroup = svg.querySelector('g');
    if (!topGroup) return;

    charData.medians.forEach((median, i) => {
      if (!median || median.length === 0) return;
      const [mx, my] = median[0];

      const pt = svg.createSVGPoint();
      pt.x = mx;
      pt.y = my;
      const ctm = topGroup.getScreenCTM();
      const screenPt = pt.matrixTransform(ctm);

      const relX = screenPt.x - containerRect.left;
      const relY = screenPt.y - containerRect.top;
      const pctX = (relX / containerRect.width) * 100;
      const pctY = (relY / containerRect.height) * 100;

      const num = document.createElement('div');
      num.className = 'stroke-number';
      num.textContent = i + 1;
      num.style.left = pctX + '%';
      num.style.top = pctY + '%';
      num.style.background = currentScheme.stroke;
      strokeNumbers.appendChild(num);
    });
  }, 200);
}

let _lastRetryCheerAt = 0;
function startQuiz() {
  if (!writer) return;
  writer.quiz({
    onCorrectStroke: function(data) {
      playStrokeSound();
    },
    onComplete: function(data) {
      showCompletion();
    },
    onMistake: function(data) {
      const now = Date.now();
      if (now - _lastRetryCheerAt > 4000 && Math.random() < 0.35) {
        fairyCheer('retry');
        _lastRetryCheerAt = now;
      }
    },
    showHintAfterMisses: 3,
    highlightOnComplete: true,
    highlightCompleteColor: currentScheme.stroke
  });
}

// ===== Character Navigation =====
function getCurrentChar() {
  const cat = CATEGORIES[currentCategory];
  return cat.chars[currentCharIndex] || cat.chars[0];
}

function loadCharacter() {
  const cat = CATEGORIES[currentCategory];
  const char = getCurrentChar();

  createWriter(char);

  document.querySelectorAll('.char-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === currentCharIndex);
  });

  const activeBtn = charSelector.querySelector('.char-btn.active');
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  if (window._fairyStartReady) {
    setTimeout(() => fairyCheer('start'), 200);
  }
}

function buildCharSelector() {
  charSelector.innerHTML = '';
  const cat = CATEGORIES[currentCategory];
  const stamps = loadStamps();
  cat.chars.forEach((ch, i) => {
    const btn = document.createElement('button');
    let cls = 'char-btn';
    if (i === currentCharIndex) cls += ' active';
    if (stamps[currentCategory]?.[i]) cls += ' done';
    btn.className = cls;
    btn.textContent = ch;
    btn.addEventListener('click', () => {
      currentCharIndex = i;
      loadCharacter();
    });
    charSelector.appendChild(btn);
  });
}

// ===== Tab switching =====
categoryTabs.addEventListener('click', (e) => {
  const btn = e.target.closest('.category-tab');
  if (!btn) return;
  const cat = btn.dataset.cat;
  if (cat === currentCategory) return;
  currentCategory = cat;
  currentCharIndex = 0;
  streak = 0;
  updateStreakBadge();
  document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  buildCharSelector();
  loadCharacter();
});

// ===== Button handlers =====
btnClear.addEventListener('click', () => {
  if (writer) {
    writerTarget.innerHTML = '';
    const char = getCurrentChar();
    createWriter(char);
  }
});

btnHint.addEventListener('click', () => {
  if (writer) {
    writer.cancelQuiz();
    writer.animateCharacter({
      onComplete: function() {
        writer.hideCharacter();
        startQuiz();
      }
    });
  }
});

btnNext.addEventListener('click', () => {
  const cat = CATEGORIES[currentCategory];
  currentCharIndex = (currentCharIndex + 1) % cat.chars.length;
  loadCharacter();
});

// ===== Init =====
buildCharSelector();
loadCharacter();
setTimeout(() => {
  fairyCheer('start');
  window._fairyStartReady = true;
}, 1000);

// ===== Public API =====
window.KidsTraceApp = {
  getCurrentChar,
  loadCharacter,
  setCategory: (cat) => {
    if (!CATEGORIES[cat]) return;
    currentCategory = cat;
    currentCharIndex = 0;
    document.querySelectorAll('.category-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.cat === cat);
    });
    buildCharSelector();
    loadCharacter();
  },
  showCompletion
};

// ===== BGM =====
const bgm    = document.getElementById('bgm');
const btnBgm = document.getElementById('btn-bgm');
let bgmEnabled = localStorage.getItem('pono_bgm_enabled') !== 'off';
let bgmStarted = false;
bgm.volume = 0.25;

function updateBgmBtn() { btnBgm.textContent = bgmEnabled ? '🔊' : '🔇'; }

function tryStartBgm() {
  if (!bgmEnabled || bgmStarted) return;
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {});
}

btnBgm.addEventListener('click', () => {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('pono_bgm_enabled', bgmEnabled ? 'on' : 'off');
  if (bgmEnabled) { bgmStarted = false; tryStartBgm(); } else { bgm.pause(); }
  updateBgmBtn();
});

if (bgmEnabled) {
  bgm.play().then(() => { bgmStarted = true; }).catch(() => {
    document.addEventListener('pointerdown', tryStartBgm);
    document.addEventListener('touchstart', tryStartBgm, { passive: true });
  });
}

// v278s (2026-04-26): ユーザー指示「相変わらず非アクティブにしても音が流れ続ける」
//   → visibilitychange + blur で BGM を一時停止、戻ってきたら再開する。
//     ユーザーが OFF にした場合 (bgmEnabled=false) は復帰時にも再開しない。
function _pauseBgmForInactive() {
  try { if (!bgm.paused) bgm.pause(); } catch (e) {}
}
function _resumeBgmIfEnabled() {
  if (!bgmEnabled) return;
  try { bgm.play().catch(function() {}); } catch (e) {}
}
document.addEventListener('visibilitychange', function() {
  if (document.hidden) _pauseBgmForInactive();
  else _resumeBgmIfEnabled();
});
window.addEventListener('blur',  _pauseBgmForInactive);
window.addEventListener('focus', _resumeBgmIfEnabled);
window.addEventListener('pagehide', _pauseBgmForInactive);
window.addEventListener('pageshow', _resumeBgmIfEnabled);

// v278s: PWA standalone 時の横画面ロック試行 (Chrome Android のみサポート、iOS は無視)
try {
  if (screen.orientation && typeof screen.orientation.lock === 'function') {
    screen.orientation.lock('landscape').catch(function() {});
  }
} catch (e) {}
updateBgmBtn();
</script>
</body>
</html>
