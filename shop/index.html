<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ポノのお店 🌰</title>
<script src="../common/preload-helper.js"></script>
<script>window.addEventListener('DOMContentLoaded',function(){if(window.PonoPreload)window.PonoPreload.warmGameAssets('shop');});</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'M PLUS Rounded 1c', system-ui, sans-serif; background: #1a0e05; }

  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #1a0e05;
  }

  /* ===== Exterior ===== */
  .exterior-wrap {
    position: absolute; inset: 0;
    background: url('../assets/images/shop/exterior.png') center center / cover no-repeat;
    cursor: pointer;
    transition: opacity 0.6s ease;
  }
  .exterior-wrap.fade-out { opacity: 0; pointer-events: none; }
  .door-hit {
    position: absolute;
    left: 38%; top: 38%; width: 24%; height: 52%;
    border-radius: 50% 50% 8px 8px;
    background: rgba(255, 220, 120, 0);
    transition: background 0.25s;
  }
  .exterior-wrap:hover .door-hit,
  .exterior-wrap:active .door-hit { background: rgba(255, 220, 120, 0.22); }
  .enter-hint {
    position: absolute;
    left: 50%; bottom: 8%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.92);
    border: 3px solid #B97A3E;
    border-radius: 999px;
    padding: 10px 22px;
    font-size: 1.05rem; font-weight: 900; color: #7C4A02;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    animation: hintBounce 1.8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes hintBounce {
    0%, 100% { transform: translate(-50%, 0); }
    50%      { transform: translate(-50%, -6px); }
  }

  /* ===== Interior ===== */
  .interior-wrap {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    background: radial-gradient(ellipse at 50% 30%, #FFE2B0 0%, #F7C48A 40%, #C08348 85%);
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }
  .interior-wrap.show { opacity: 1; pointer-events: auto; }

  .shop-title {
    text-align: center;
    padding: 12px 20px 6px;
    font-size: 1.25rem; font-weight: 900; color: #5D2E08;
    text-shadow: 2px 2px 0 #FFF4D9;
  }

  /* ===== Tabs (シール / かぐ) ===== */
  .shop-tabs {
    display: flex; justify-content: center; gap: 10px;
    padding: 2px 12px 8px;
  }
  .shop-tab {
    background: #fff;
    border: 2.5px solid #D8B98A;
    border-radius: 999px;
    padding: 6px 18px;
    font-size: 0.9rem; font-weight: 900; color: #A16207;
    cursor: pointer;
  }
  .shop-tab.on {
    background: linear-gradient(135deg,#FFD86B,#FFB74D);
    border-color: #B97A3E; color: #5D2E08;
    box-shadow: 0 3px 8px rgba(161,98,7,0.25);
  }

  /* ===== かぐタブ ===== */
  .furn-area {
    flex: 1; width: 100%;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 0 10px 14px;
  }
  .furn-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
    gap: 10px;
    max-width: 900px; margin: 0 auto;
  }
  .furn-cat-label {
    grid-column: 1 / -1;
    font-size: 0.82rem; font-weight: 900; color: #5D2E08;
    padding: 10px 2px 2px;
  }
  .furn-card {
    background: rgba(255,255,255,0.95);
    border: 2.5px solid #B97A3E;
    border-radius: 12px;
    padding: 8px 6px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .furn-card.owned { border-color: #4caf50; background: rgba(232,245,233,0.95); }
  .furn-thumb {
    width: 100%; aspect-ratio: 1;
    border-radius: 8px; overflow: hidden;
    background: #FFF6E6;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
  }
  .furn-thumb img.thumb-contain { width: 100%; height: 100%; object-fit: contain; }
  .furn-thumb img.thumb-cover   { width: 100%; height: 100%; object-fit: cover; }
  .furn-name {
    font-size: 0.7rem; font-weight: 900; color: #5D2E08;
    text-align: center; line-height: 1.2; min-height: 2.1em;
  }
  .furn-price-btn {
    width: 100%; border: none; border-radius: 999px;
    padding: 6px 4px;
    font-size: 0.76rem; font-weight: 900;
    background: linear-gradient(135deg,#FFD86B,#FFB74D);
    color: #7C4A02;
    cursor: pointer;
  }
  .furn-price-btn.owned { background: #e8f5e9; color: #388e3c; cursor: default; }
  .acorn-wallet {
    position: absolute; top: 12px; right: 12px;
    background: #fff;
    border: 2.5px solid #A16207;
    border-radius: 999px;
    padding: 6px 14px 6px 10px;
    display: inline-flex; align-items: center; gap: 6px;
    font-weight: 900; color: #7C4A02;
    box-shadow: 0 3px 10px rgba(161,98,7,0.18);
    z-index: 20;
  }
  .back-btn {
    position: absolute; top: 12px; left: 12px;
    background: #fff;
    border: 2.5px solid #8B7355;
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.9rem; font-weight: 900; color: #5D4E37;
    cursor: pointer;
    z-index: 20;
  }

  .shelf-area {
    position: relative;
    flex: 1;
    display: flex; align-items: flex-end; justify-content: center;
    padding: 10px 10px 0;
  }
  .counter-wrap {
    position: relative;
    width: min(92vw, 900px);
    aspect-ratio: 600 / 340;
    background: url('../assets/images/shop/counter.png') center bottom / 100% 100% no-repeat;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.2));
  }

  /* Floating items on magic discs */
  .item-slot {
    position: absolute;
    bottom: 38%;
    width: 26%;
    display: flex; flex-direction: column;
    align-items: center;
    cursor: pointer;
  }
  .item-slot[data-slot="0"] { left: 6%; }
  .item-slot[data-slot="1"] { left: 37%; }
  .item-slot[data-slot="2"] { left: 68%; }

  .item-float {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    animation: itemBob 2.8s ease-in-out infinite;
    transform-origin: center center;
  }
  .item-slot:nth-child(2) .item-float { animation-delay: -0.9s; }
  .item-slot:nth-child(3) .item-float { animation-delay: -1.7s; }
  @keyframes itemBob {
    0%, 100% { transform: translateY(0) rotate(-1.2deg); }
    50%      { transform: translateY(-10px) rotate(1.2deg); }
  }
  .item-img {
    max-width: 86%; max-height: 86%;
    object-fit: contain;
    filter: drop-shadow(0 6px 4px rgba(120,60,0,0.35));
    pointer-events: none;
  }
  .item-emoji {
    font-size: 4rem;
    filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
  }

  /* Magic glowing disc */
  .magic-disc {
    position: absolute;
    bottom: -8%;
    left: 50%;
    width: 78%;
    height: 22%;
    transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(ellipse at center,
      rgba(255, 240, 150, 0.95) 0%,
      rgba(255, 200, 80, 0.55) 35%,
      rgba(255, 160, 40, 0.25) 65%,
      rgba(255, 160, 40, 0) 85%);
    animation: discPulse 2.8s ease-in-out infinite;
    pointer-events: none;
  }
  .item-slot:nth-child(2) .magic-disc { animation-delay: -0.9s; }
  .item-slot:nth-child(3) .magic-disc { animation-delay: -1.7s; }
  @keyframes discPulse {
    0%, 100% {
      transform: translateX(-50%) scale(0.9);
      opacity: 0.85;
      filter: blur(2px);
    }
    50% {
      transform: translateX(-50%) scale(1.08);
      opacity: 1;
      filter: blur(1px);
    }
  }

  /* Sparkle particles around disc */
  .sparkle {
    position: absolute;
    width: 10px; height: 10px;
    background: #FFF3C0;
    border-radius: 50%;
    box-shadow: 0 0 10px 4px #FFD86B;
    pointer-events: none;
    opacity: 0;
    animation: sparkFloat 3.2s ease-in-out infinite;
  }
  .sparkle.s1 { left: 10%; bottom: 2%; animation-delay: 0s; }
  .sparkle.s2 { right: 8%; bottom: 6%; animation-delay: -1.1s; }
  .sparkle.s3 { left: 50%; bottom: -6%; width: 6px; height: 6px; animation-delay: -2.2s; }
  @keyframes sparkFloat {
    0%   { opacity: 0; transform: translateY(0) scale(0.6); }
    30%  { opacity: 1; transform: translateY(-10px) scale(1); }
    70%  { opacity: 0.6; transform: translateY(-22px) scale(0.8); }
    100% { opacity: 0; transform: translateY(-30px) scale(0.4); }
  }

  .item-card {
    margin-top: 6px;
    background: rgba(255,255,255,0.95);
    border: 2.5px solid #B97A3E;
    border-radius: 12px;
    padding: 4px 10px;
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    min-width: 70%;
  }
  .item-name { font-size: 0.8rem; font-weight: 900; color: #5D2E08; }
  .item-price { font-size: 0.9rem; font-weight: 900; color: #A16207; }
  .item-price .acorn-ico { font-size: 0.95rem; }

  /* Landscape tweaks */
  @media (orientation: landscape) and (max-height: 600px) {
    .shop-title { font-size: 1.05rem; padding-top: 8px; }
    .counter-wrap { width: min(70vw, 800px); }
  }

  /* Toast */
  .toast {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    background: rgba(60, 40, 20, 0.95);
    color: #FFF3D0;
    padding: 14px 28px;
    border-radius: 16px;
    border: 3px solid #FFD86B;
    font-size: 1.05rem; font-weight: 900;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
</style>

<body>

<div class="stage">

  <!-- 外観 -->
  <div class="exterior-wrap" id="exterior">
    <div class="door-hit"></div>
    <div class="enter-hint">🚪 タップしておみせに はいる</div>
  </div>

  <!-- 店内 -->
  <div class="interior-wrap" id="interior">
    <button class="back-btn" id="backBtn">← もどる</button>
    <div class="acorn-wallet">
      <span>🌰</span><span id="acornCount">0</span>
    </div>

    <div class="shop-title">🌰 ポノのどんぐりショップ 🌰</div>

    <div class="shop-tabs">
      <button class="shop-tab on" id="tabSticker" type="button">🌟 シール</button>
      <button class="shop-tab" id="tabFurn" type="button">🪑 かぐ</button>
    </div>

    <div class="shelf-area" id="shelfArea">
      <div class="counter-wrap" id="counterWrap">
        <!-- スロット3つ（浮いてる家具） -->
      </div>
    </div>

    <div class="furn-area" id="furnArea" style="display:none;">
      <div class="furn-grid" id="furnGrid"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- v1895: 購入 SE (rarity 別 preloaded、 new Audio() の GuardedAudio silent-reject 経路を回避) -->
<audio id="shop-sfx-normal" src="../assets/audio/sfx/acorn/acorn_get_festive_20260628.mp3" preload="auto"></audio>
<audio id="shop-sfx-rare"   src="../assets/audio/gacha/daily_gacha_sticker_sparkle.mp3"     preload="auto"></audio>
<audio id="shop-sfx-super"  src="../assets/audio/gacha/daily_gacha_magic_sparkle_long.mp3"  preload="auto"></audio>

<script src="../common/acorns.js"></script>
<script src="../js/game-stickers.js"></script>
<script src="../js/donguri-shop.js"></script>
<script src="../common/tier.js"></script>
<script src="../common/achievements.js"></script>
<script src="../room/items.js"></script>
<script src="../common/shop-catalog.js"></script>
<script>
  // ===== どんぐりショップ (シール販売 + 配布) =====
  // 商品は js/donguri-shop.js が JST 朝/夕で回転させる 3 枠シール。
  // 旧 SHOP_ITEMS (家具) は launch までに room 配布ロジックが無いため UI から外す。
  //   - 払い損絶対 NG ルール: spendAcorns 成功後に grant が null を返したら addAcorns で必ず refund。
  //   - PonoDonguriShop.purchase() 内部で spendAcorns→grant 順に走るので、 grant null を検知して refund する。

  const exterior = document.getElementById('exterior');
  const interior = document.getElementById('interior');
  const backBtn  = document.getElementById('backBtn');
  const counter  = document.getElementById('counterWrap');
  const acornEl  = document.getElementById('acornCount');
  const toast    = document.getElementById('toast');

  let rotationCache = []; // [{ id, name, gameId, price, rarity, img, owned }]
  let renderBusy = false;

  // v1891→v1895: 購入時 SE (rarity 別、 既存 asset 再利用、 単調増加 volume)。 play.html shop v2 と同じマッピング。
  //   normal (< 25) → shop-sfx-normal (acorn_get_festive_20260628.mp3)     @ 0.55
  //   rare   (25-)  → shop-sfx-rare   (daily_gacha_sticker_sparkle.mp3)    @ 0.65
  //   super  (35-)  → shop-sfx-super  (daily_gacha_magic_sparkle_long.mp3) @ 0.75
  //   v1895: new Audio() 廃止 + preloaded 要素 + __nativePlay bypass + inactive guard 解除。
  function _shopMuted() {
    try { return localStorage.getItem('pono_sound_off') === '1'; } catch (_) { return false; }
  }
  function _shopNativePlay() {
    try {
      var proto = window.HTMLMediaElement && window.HTMLMediaElement.prototype;
      return (proto && proto.play && proto.play.__nativePlay) || null;
    } catch (_) { return null; }
  }
  function _shopClearInactiveGuard() {
    try {
      if (window.PonoVisibilityAudioGuard
          && typeof window.PonoVisibilityAudioGuard.clearFocusInactiveIfVisible === 'function') {
        window.PonoVisibilityAudioGuard.clearFocusInactiveIfVisible();
      }
    } catch (_) {}
  }
  // v1895 security-review Medium fix: __nativePlay bypass 時に guardedPlay の trackMedia が
  //   走らないので、 明示的に mediaEls に登録して background-audio-stop guard を維持する。
  function _shopTrackMediaEl(el) {
    try {
      if (el && window.PonoVisibilityAudioGuard
          && typeof window.PonoVisibilityAudioGuard.trackMedia === 'function') {
        window.PonoVisibilityAudioGuard.trackMedia(el);
      }
    } catch (_) {}
  }
  function playPurchaseSfx(price) {
    try {
      if (_shopMuted()) return;
      var id, vol;
      var p = price | 0;
      if (p >= 35)      { id = 'shop-sfx-super';  vol = 0.75; }
      else if (p >= 25) { id = 'shop-sfx-rare';   vol = 0.65; }
      else              { id = 'shop-sfx-normal'; vol = 0.55; }
      var el = document.getElementById(id);
      if (!el) return;
      _shopTrackMediaEl(el); // v1895 security fix: bypass 前に guard 追跡登録
      try { el.pause(); el.currentTime = 0; el.volume = vol; } catch (_) {}
      var np = _shopNativePlay();
      var doPlay = function () {
        try {
          // v1895 code-review HIGH fix: bypass でも page-hidden 時は再生しない (policy 尊重)
          if (document.hidden) return null;
          return np ? np.call(el) : el.play();
        } catch (_) { return null; }
      };
      var pr = doPlay();
      if (pr && pr.catch) pr.catch(function () {
        setTimeout(function () { try { doPlay(); } catch (_) {} }, 250);
      });
    } catch (_) {}
  }

  function _stickerImageFromCatalog(catalog, gameId, stickerId) {
    try {
      const page = catalog && catalog.pages && catalog.pages[gameId];
      if (!page || !Array.isArray(page.stickers)) return '';
      var s = page.stickers.find(function (x) { return x && x.id === stickerId; });
      if (!s || !s.img) return '';
      // game-stickers.js の resolveAsset と同じく shop/ から見ると ../ プレフィクス
      if (/^(https?:|data:|\/|\.\.?\/)/.test(s.img)) return s.img;
      return '../' + s.img;
    } catch (e) { return ''; }
  }

  function renderCounter() {
    counter.innerHTML = '';
    if (!window.PonoDonguriShop || !window.PonoGameStickers) {
      counter.innerHTML = '<div style="color:#5D2E08;font-weight:900;padding:20px;text-align:center;">よみこみちゅう…</div>';
      return;
    }
    Promise.all([
      window.PonoGameStickers.loadCatalog(),
      window.PonoDonguriShop.getCatalog()
    ]).then(function (results) {
      var catalog = results[0];
      // getCatalog の戻り値は使わず、 rotation だけ参照 (3 枠ローテ)
      var rot = window.PonoDonguriShop.getRotation();
      var ids = (rot && rot.stickerIds) || [];
      rotationCache = ids.map(function (sid) {
        var owned = window.PonoDonguriShop.getOwnershipState(sid);
        return {
          id: sid,
          price: window.PonoDonguriShop.getPrice(sid),
          img: _stickerImageFromCatalog(catalog, _resolveGameId(catalog, sid), sid),
          name: _resolveName(catalog, sid),
          gameId: _resolveGameId(catalog, sid),
          owned: !!(owned && owned.owned)
        };
      });
      _paintSlots();
    }).catch(function (err) {
      try { console.warn('[shop] failed to load rotation:', err); } catch (e) {}
      counter.innerHTML = '<div style="color:#5D2E08;font-weight:900;padding:20px;text-align:center;">よみこみに しっぱいしたよ</div>';
    });
  }

  function _resolveName(catalog, stickerId) {
    var pages = (catalog && catalog.pages) || {};
    var keys = Object.keys(pages);
    for (var i = 0; i < keys.length; i++) {
      var list = (pages[keys[i]] && pages[keys[i]].stickers) || [];
      for (var j = 0; j < list.length; j++) {
        if (list[j] && list[j].id === stickerId) return list[j].name || stickerId;
      }
    }
    return stickerId;
  }
  function _resolveGameId(catalog, stickerId) {
    var pages = (catalog && catalog.pages) || {};
    var keys = Object.keys(pages);
    for (var i = 0; i < keys.length; i++) {
      var list = (pages[keys[i]] && pages[keys[i]].stickers) || [];
      for (var j = 0; j < list.length; j++) {
        if (list[j] && list[j].id === stickerId) return keys[i];
      }
    }
    return '';
  }

  function _paintSlots() {
    counter.innerHTML = '';
    if (!rotationCache.length) {
      counter.innerHTML = '<div style="color:#5D2E08;font-weight:900;padding:20px;text-align:center;">きょうの シールは おやすみ</div>';
      return;
    }
    rotationCache.forEach(function (it, i) {
      var slot = document.createElement('div');
      slot.className = 'item-slot';
      slot.dataset.slot = i;
      slot.dataset.stickerId = it.id;
      var ownedTag = it.owned ? '<div class="item-name" style="color:#888;font-size:0.72rem;">こうかんしたよ♪</div>' : '';
      var imgHtml = it.img
        ? '<img class="item-img" src="' + it.img + '" alt="' + (it.name || '') + '" onerror="this.style.display=\'none\';this.nextElementSibling && (this.nextElementSibling.style.display=\'block\')">'
        : '';
      slot.innerHTML =
        '<div class="item-float">' +
          imgHtml +
          '<span class="item-emoji"' + (it.img ? ' style="display:none;"' : '') + '>🌟</span>' +
          '<div class="magic-disc"></div>' +
          '<div class="sparkle s1"></div>' +
          '<div class="sparkle s2"></div>' +
          '<div class="sparkle s3"></div>' +
        '</div>' +
        '<div class="item-card">' +
          '<div class="item-name">' + (it.name || 'シール') + '</div>' +
          '<div class="item-price">🌰 ' + it.price + '</div>' +
          ownedTag +
        '</div>';
      slot.addEventListener('click', function () { tryBuy(it); });
      counter.appendChild(slot);
    });
  }

  function updateAcorns() {
    if (typeof window.getAcorns === 'function') {
      acornEl.textContent = window.getAcorns();
    }
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function () { toast.classList.remove('show'); }, 1800);
  }

  function tryBuy(item) {
    if (renderBusy) return;
    if (!item || !item.id) return;
    if (!window.PonoDonguriShop || typeof window.PonoDonguriShop.purchase !== 'function') return;
    if (typeof window.spendAcorns !== 'function' || typeof window.getAcorns !== 'function') return;

    if (item.owned) {
      showToast('🎀 こうかんしたよ♪');
      return;
    }
    var have = window.getAcorns();
    if (have < item.price) {
      showToast('🌰 たりないよ〜 (あと ' + (item.price - have) + 'こ)');
      return;
    }

    // PonoDonguriShop.purchase 内部:
    //   1) spendAcorns(price)
    //   2) PonoGameStickers.grant({gameId, stickerId, event:'donguri_shop', show:false})
    // grant が null を返したら money は引かれたまま → ここで必ず addAcorns で refund。
    renderBusy = true;
    var preBalance = window.getAcorns();
    var preDelta = preBalance; // refund 計算用 fallback (実 cost は item.price)

    window.PonoDonguriShop.purchase(item.id).then(function (res) {
      renderBusy = false;
      if (!res || !res.success) {
        // spend 自体に失敗 → 何もしない (money は無事)
        var reason = (res && res.reason) || 'unknown';
        if (reason === 'insufficient_acorns') {
          showToast('🌰 たりないよ〜');
        } else if (reason === 'invalid_sticker' || reason === 'not_in_rotation') {
          showToast('🌀 きょうは うりきれ');
        } else {
          showToast('😢 かえなかった');
        }
        return;
      }
      // success かつ stickerResult が null/false → grant 失敗 (catalog エラー等)。 必ず refund。
      if (!res.stickerResult) {
        try {
          if (typeof window.addAcorns === 'function') {
            window.addAcorns(item.price, { reason: 'shop_refund', suppressRewardModal: true });
          }
        } catch (e) {}
        showToast('😢 ふしぎなことが おきたよ。 どんぐりは もどしたよ');
        updateAcorns();
        renderCounter();
        return;
      }
      // 正常購入完了
      // v1891→v1895: 購入 SE (rarity 別、 preloaded)。 GuardedAudio inactive を先に解除。
      try { _shopClearInactiveGuard(); } catch (_) {}
      try { playPurchaseSfx(item.price); } catch (_) {}
      showToast('🎉 ' + (item.name || 'シール') + ' を ゲット！');
      // game-stickers.js の grant({show:false}) なので toast popup は出ない。
      // 「ペタッとはる」 動線は別途 sticker book で。 ここでは shop 内で完結。
      updateAcorns();
      // 在庫表示更新 (owned=true に)
      renderCounter();
    }).catch(function (err) {
      renderBusy = false;
      try { console.warn('[shop] purchase failed:', err); } catch (e) {}
      // purchase が throw した場合: spendAcorns 済かは不明。 安全側で残高差分から refund 推定。
      try {
        var nowBal = (typeof window.getAcorns === 'function') ? window.getAcorns() : preBalance;
        var spent = preBalance - nowBal;
        if (spent > 0 && typeof window.addAcorns === 'function') {
          window.addAcorns(spent, { reason: 'shop_refund_exception', suppressRewardModal: true });
        }
      } catch (e2) {}
      showToast('😢 エラー。 どんぐりは もどしたよ');
      updateAcorns();
    });
  }

  // 外観タップで店内へ
  exterior.addEventListener('click', function () {
    exterior.classList.add('fade-out');
    setTimeout(function () {
      interior.classList.add('show');
      updateAcorns();
      renderCounter();
    }, 300);
  });

  // 戻る
  backBtn.addEventListener('click', function () {
    location.href = '../play.html';
  });

  // イベントで自動更新
  window.addEventListener('pono-acorns-changed', updateAcorns);
  window.addEventListener('PonoDonguriShopPurchased', function () {
    updateAcorns();
  });

  renderCounter();
  updateAcorns();

  // ===== 🪑 かぐタブ (案2ハイブリッド: 実績専用idを除いた家具をどんぐりで販売) =====
  // common/shop-catalog.js の resolveFurnitureRarity() で normal/rare/super/null を判定。
  // 購入記録は localStorage pono_shop_furn_purchased (id配列)、room/index.html 側で
  // 既存の実績付与マージロジックと OR 条件でマージされる。
  var FURN_LS_KEY = 'pono_shop_furn_purchased';
  // 実績経由 (grantReward) で既に付与済みの家具/壁/床は room/index.html の MERGE_KEYS と
  // 同じキーを見て「もってるよ」判定に含める。実績アーカイブ化で achievement-only 判定から
  // 漏れてショップに再出現した id (例: furn_bookshelf_w, furn_desk) を、既に取得済みの
  // 既存プレイヤーへ「未所持」として二重販売しないための安全策。
  var FURN_ACHIEVEMENT_LS_KEYS = ['pono_unlocked_furn', 'pono_unlocked_wall', 'pono_unlocked_floor'];
  var FURN_PRICE_BY_RARITY = { normal: 15, rare: 25, super: 35 };
  var FURN_CAT_LABEL = { wall: '🖼️ かべがみ', floor: '🟫 ゆか', deco: '🎀 かざり', furn: '🪑 かぐ' };
  var tabSticker = document.getElementById('tabSticker');
  var tabFurn    = document.getElementById('tabFurn');
  var shelfArea  = document.getElementById('shelfArea');
  var furnArea   = document.getElementById('furnArea');
  var furnGrid   = document.getElementById('furnGrid');
  var furnBusy   = false;

  function getPurchasedFurn() {
    try {
      var a = JSON.parse(localStorage.getItem(FURN_LS_KEY) || '[]');
      return Array.isArray(a) ? a : [];
    } catch (e) { return []; }
  }
  function addPurchasedFurn(id) {
    var list = getPurchasedFurn();
    if (list.indexOf(id) === -1) {
      list.push(id);
      try { localStorage.setItem(FURN_LS_KEY, JSON.stringify(list)); } catch (e) {}
    }
  }
  function isAchievementGrantedFurn(id) {
    for (var i = 0; i < FURN_ACHIEVEMENT_LS_KEYS.length; i++) {
      try {
        var arr = JSON.parse(localStorage.getItem(FURN_ACHIEVEMENT_LS_KEYS[i]) || '[]');
        if (Array.isArray(arr) && arr.indexOf(id) !== -1) return true;
      } catch (e) {}
    }
    return false;
  }
  function isFurnPurchased(id) {
    return getPurchasedFurn().indexOf(id) !== -1 || isAchievementGrantedFurn(id);
  }

  function getSellableFurniture() {
    if (typeof ROOM_ITEMS === 'undefined' || !window.PonoShopCatalog) return [];
    var out = [];
    for (var i = 0; i < ROOM_ITEMS.length; i++) {
      var it = ROOM_ITEMS[i];
      if (it.hidden) continue;
      var rarity = window.PonoShopCatalog.resolveFurnitureRarity(it);
      if (rarity) out.push({ item: it, rarity: rarity });
    }
    return out;
  }

  function makeFurnCard(item, rarity) {
    var price = FURN_PRICE_BY_RARITY[rarity] || FURN_PRICE_BY_RARITY.normal;
    var owned = isFurnPurchased(item.id);
    var card = document.createElement('div');
    card.className = 'furn-card' + (owned ? ' owned' : '');

    var thumb = document.createElement('div');
    thumb.className = 'furn-thumb';
    var imgSrc = item.roomImg || item.img;
    if (imgSrc) {
      var img = document.createElement('img');
      img.src = imgSrc;
      img.alt = item.name || '';
      // AR絶対遵守: 壁/床はcoverで模様を敷き詰め、かぐ/かざりはcontainで原寸比を保つ（stretch禁止）
      img.className = (item.cat === 'wall' || item.cat === 'floor') ? 'thumb-cover' : 'thumb-contain';
      img.addEventListener('error', function () { img.remove(); thumb.textContent = '🪑'; });
      thumb.appendChild(img);
    } else {
      thumb.textContent = '🪑';
    }

    var name = document.createElement('div');
    name.className = 'furn-name';
    name.textContent = item.name || item.id;

    var btn = document.createElement('button');
    btn.type = 'button';
    if (owned) {
      btn.className = 'furn-price-btn owned';
      btn.textContent = 'もってるよ ✓';
      btn.disabled = true;
    } else {
      btn.className = 'furn-price-btn';
      btn.textContent = '🌰 ' + price;
      btn.addEventListener('click', function () { tryBuyFurn(item, price); });
    }

    card.appendChild(thumb);
    card.appendChild(name);
    card.appendChild(btn);
    return card;
  }

  function renderFurnGrid() {
    if (!furnGrid) return;
    furnGrid.innerHTML = '';
    var entries = getSellableFurniture();
    if (!entries.length) {
      furnGrid.innerHTML = '<div style="grid-column:1/-1;color:#5D2E08;font-weight:900;padding:20px;text-align:center;">じゅんびちゅう…</div>';
      return;
    }
    var lastCat = null;
    entries.forEach(function (entry) {
      var it = entry.item;
      if (it.cat !== lastCat) {
        lastCat = it.cat;
        var label = document.createElement('div');
        label.className = 'furn-cat-label';
        label.textContent = FURN_CAT_LABEL[it.cat] || it.cat;
        furnGrid.appendChild(label);
      }
      furnGrid.appendChild(makeFurnCard(it, entry.rarity));
    });
  }

  function tryBuyFurn(item, price) {
    if (furnBusy) return;
    if (isFurnPurchased(item.id)) { showToast('🎀 もってるよ♪'); return; }
    if (typeof window.spendAcorns !== 'function' || typeof window.getAcorns !== 'function') return;
    var have = window.getAcorns();
    if (have < price) {
      showToast('🌰 たりないよ〜 (あと ' + (price - have) + 'こ)');
      return;
    }
    furnBusy = true;
    var ok = window.spendAcorns(price);
    furnBusy = false;
    if (!ok) {
      showToast('🌰 たりないよ〜');
      return;
    }
    addPurchasedFurn(item.id);
    try { _shopClearInactiveGuard(); } catch (_) {}
    try { playPurchaseSfx(price); } catch (_) {}
    showToast('🎉 ' + (item.name || 'かぐ') + ' を ゲット！');
    updateAcorns();
    renderFurnGrid();
  }

  function setShopTab(tab) {
    tabSticker.classList.toggle('on', tab === 'sticker');
    tabFurn.classList.toggle('on', tab === 'furn');
    shelfArea.style.display = (tab === 'sticker') ? '' : 'none';
    furnArea.style.display  = (tab === 'furn') ? 'flex' : 'none';
    if (tab === 'furn') renderFurnGrid();
  }
  tabSticker.addEventListener('click', function () { setShopTab('sticker'); });
  tabFurn.addEventListener('click', function () { setShopTab('furn'); });
</script>

</body>
