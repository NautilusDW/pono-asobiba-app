<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ポノのずかん Three.js</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css?v=20260626-1643">
</head>
<body>
  <main id="app">
    <canvas id="scene" aria-label="ずかんのページめくりプレビュー"></canvas>
    <div class="top-mode-cluster" aria-label="シールちょうのモード">
      <button id="topEditButton" class="top-edit-button" type="button" aria-label="いま みるモード。はるモードにする" aria-pressed="false"><span class="top-button-label">みるモード</span></button>
      <button id="topThemeButton" class="top-theme-button" type="button" aria-label="きせかえ" aria-pressed="false"><span class="top-button-label">きせかえ</span></button>
    </div>
    <div class="top-action-cluster" aria-label="Book actions">
      <button id="albumModeToggle" class="album-mode-toggle" type="button"><span class="top-button-label">ずかん</span></button>
      <button id="topSettingsButton" class="top-action-button" type="button" aria-label="せってい" aria-pressed="false">⚙</button>
    </div>
    <section id="zukanSettingsPanel" class="zukan-settings-panel" hidden aria-label="せってい">
      <div class="zukan-settings-head">
        <h2>せってい</h2>
        <button id="zukanSettingsClose" class="zukan-settings-close" type="button" aria-label="とじる">×</button>
      </div>
      <button id="settingsBackButton" class="zukan-settings-back" type="button">もどる</button>
      <button id="settingsTutorialButton" class="zukan-settings-help" type="button">あそびかた</button>
      <div class="zukan-settings-row">
        <span>ひだり</span>
        <div class="zukan-settings-segment" role="group" aria-label="ひだりページ">
          <button type="button" data-zukan-side="left" data-zukan-type="auto">じどう</button>
          <button type="button" data-zukan-side="left" data-zukan-type="index">もくじ</button>
          <button type="button" data-zukan-side="left" data-zukan-type="detail">しょうさい</button>
        </div>
      </div>
      <div class="zukan-settings-row">
        <span>みぎ</span>
        <div class="zukan-settings-segment" role="group" aria-label="みぎページ">
          <button type="button" data-zukan-side="right" data-zukan-type="auto">じどう</button>
          <button type="button" data-zukan-side="right" data-zukan-type="index">もくじ</button>
          <button type="button" data-zukan-side="right" data-zukan-type="detail">しょうさい</button>
        </div>
      </div>
      <button id="zukanTuneButton" class="zukan-tune-button" type="button">いちをなおす</button>
    </section>
    <section id="bookThemePanel" class="zukan-settings-panel book-theme-panel" hidden aria-label="きせかえ">
      <div class="zukan-settings-head">
        <h2>きせかえ</h2>
        <button id="bookThemeClose" class="zukan-settings-close" type="button" aria-label="とじる">×</button>
      </div>
      <div class="zukan-settings-row zukan-settings-row-theme">
        <span>きせかえ</span>
        <div id="bookThemePreview" class="zukan-theme-current" aria-live="polite">
          <div id="bookThemePreviewCover" class="zukan-theme-current-cover"></div>
          <div class="zukan-theme-current-info">
            <strong id="bookThemePreviewName">ぼうけん</strong>
            <div id="bookThemePreviewSwatches" class="zukan-theme-current-swatches" aria-hidden="true"></div>
          </div>
        </div>
        <div class="zukan-settings-segment zukan-theme-picker" role="group" aria-label="シールちょうきせかえ">
          <button type="button" data-book-theme="boy">ぼうけん</button>
          <button type="button" data-book-theme="girl">うみとも</button>
          <button type="button" data-book-theme="forest">もり</button>
          <button type="button" data-book-theme="sakura">さくら</button>
          <button type="button" data-book-theme="shinobi">しのび</button>
          <button type="button" data-book-theme="hero">へんしん</button>
          <button type="button" data-book-theme="kaiju">かいじゅう</button>
          <button type="button" data-book-theme="idol">アイドル</button>
          <button type="button" data-book-theme="robot">ロボット</button>
          <button type="button" data-book-theme="space_live">うちゅう</button>
          <button type="button" data-book-theme="game_center">ゲーム</button>
          <button type="button" data-book-theme="mascot">マスコット</button>
          <button type="button" data-book-theme="parade">パレード</button>
          <button type="button" data-book-theme="secret_base">ひみつきち</button>
          <button type="button" data-book-theme="anime_studio">アニメ</button>
          <button type="button" data-book-theme="neon_city">ネオン</button>
          <button type="button" data-book-theme="candy_pop">キャンディ</button>
          <button type="button" data-book-theme="manga_action">マンガ</button>
          <button type="button" data-book-theme="cyber_grid">サイバー</button>
          <button type="button" data-book-theme="rainbow_dream">にじいろ</button>
          <button type="button" data-book-theme="midnight_magic">まよなか</button>
          <button type="button" data-book-theme="pop_art">ポップ</button>
          <button type="button" data-book-theme="festival_night">おまつり</button>
          <button type="button" data-book-theme="sweet_gothic">ゴシック</button>
          <button type="button" data-book-theme="sports_power">スポーツ</button>
        </div>
      </div>
    </section>
    <div class="modebar" aria-label="Sticker book variant controls">
      <div class="segmented" role="group" aria-label="Book variant">
        <button type="button" data-book="boy">ぼうけん</button>
        <button type="button" data-book="girl">うみとも</button>
        <button type="button" data-book="forest">もり</button>
        <button type="button" data-book="sakura">さくら</button>
        <button type="button" data-book="shinobi">しのび</button>
        <button type="button" data-book="hero">へんしん</button>
        <button type="button" data-book="kaiju">かいじゅう</button>
        <button type="button" data-book="idol">アイドル</button>
        <button type="button" data-book="robot">ロボット</button>
        <button type="button" data-book="space_live">うちゅう</button>
        <button type="button" data-book="game_center">ゲーム</button>
        <button type="button" data-book="mascot">マスコット</button>
        <button type="button" data-book="parade">パレード</button>
        <button type="button" data-book="secret_base">ひみつきち</button>
        <button type="button" data-book="anime_studio">アニメ</button>
        <button type="button" data-book="neon_city">ネオン</button>
        <button type="button" data-book="candy_pop">キャンディ</button>
        <button type="button" data-book="manga_action">マンガ</button>
        <button type="button" data-book="cyber_grid">サイバー</button>
        <button type="button" data-book="rainbow_dream">にじいろ</button>
        <button type="button" data-book="midnight_magic">まよなか</button>
        <button type="button" data-book="pop_art">ポップ</button>
        <button type="button" data-book="festival_night">おまつり</button>
        <button type="button" data-book="sweet_gothic">ゴシック</button>
        <button type="button" data-book="sports_power">スポーツ</button>
      </div>
      <div class="segmented" role="group" aria-label="Surface mode">
        <button type="button" data-surface="inside">Inside</button>
        <button type="button" data-surface="cover">Cover</button>
      </div>
    </div>
    <div class="toolbar" aria-label="Page flip controls">
      <button id="playButton" type="button" aria-label="Play page flip">
        <span class="play-icon"></span>
      </button>
      <input id="flipSlider" aria-label="Page flip angle" type="range" min="0" max="1" step="0.001" value="0.34">
      <button id="resetButton" type="button" aria-label="Reset page">
        <span class="reset-icon"></span>
      </button>
    </div>
    <div id="spreadJumper" class="spread-jumper" aria-label="Spread shortcuts">
      <button type="button" data-spread-target="0" aria-label="Open first spread"></button>
      <button type="button" data-spread-target="0.25" aria-label="Open early spread"></button>
      <button type="button" data-spread-target="0.5" aria-label="Open middle spread"></button>
      <button type="button" data-spread-target="0.75" aria-label="Open late spread"></button>
      <button type="button" data-spread-target="1" aria-label="Open final spread"></button>
    </div>
    <div id="bookPageControls" class="book-page-controls" aria-label="Book page controls">
      <button id="bookPrevPage" class="book-page-button book-page-button-left" type="button" aria-label="Previous book page">◀</button>
      <button id="bookPageLabel" class="book-page-label" type="button" aria-haspopup="dialog" aria-expanded="false">1-2 / 12</button>
      <button id="bookNextPage" class="book-page-button book-page-button-right" type="button" aria-label="Next book page">▶</button>
      <div id="bookPageJump" class="book-page-jump" hidden aria-label="Page jump"></div>
    </div>
    <section id="collectionStickerTray" class="collection-sticker-tray" hidden aria-label="ずかんもくじ">
      <div id="collectionStickerTrayItems" class="collection-sticker-tray-items"></div>
      <div id="stickerTrayCounter" class="sticker-tray-counter" hidden aria-live="polite">1 / 1</div>
    </section>
    <section id="inlineStickerControls" class="inline-sticker-controls" hidden aria-label="シールちょうせい">
      <button id="inlineStickerClose" class="inline-sticker-close" type="button" aria-label="とじる">×</button>
      <label>
        <span>おおきさ</span>
        <input id="inlineStickerScale" type="range" min="0.35" max="2.4" step="0.01" value="1">
      </label>
      <label>
        <span>かいてん</span>
        <input id="inlineStickerRotation" type="range" min="-180" max="180" step="1" value="0">
      </label>
      <div class="inline-sticker-actions">
        <button id="inlineStickerDelete" class="inline-sticker-delete" type="button">けす</button>
        <button id="inlineStickerOk" class="inline-sticker-ok" type="button">OK</button>
      </div>
    </section>
    <section id="stickerTutorial" class="sticker-tutorial" hidden aria-label="シールちょうの あそびかた">
      <div id="stickerTutorialSpotlight" class="sticker-tutorial-spotlight" aria-hidden="true"></div>
      <div id="stickerTutorialGhost" class="sticker-tutorial-ghost" aria-hidden="true"><img alt="" draggable="false"></div>
      <img id="stickerTutorialHand" class="sticker-tutorial-hand" src="../../assets/images/puzzle/ui/tutorial/hand_open_hover.png" alt="" draggable="false" aria-hidden="true">
      <div id="stickerTutorialStart" class="sticker-tutorial-start" role="dialog" aria-live="polite" aria-modal="false">
        <p class="sticker-tutorial-start-title">シールちょうの<br>あそびかた</p>
        <div class="sticker-tutorial-actions">
          <button id="stickerTutorialStartSkip" type="button">あとで</button>
          <button id="stickerTutorialStartButton" type="button">はじめる</button>
        </div>
      </div>
      <div id="stickerTutorialCard" class="sticker-tutorial-card is-page-inscribed" role="dialog" aria-live="polite" aria-modal="false" hidden>
        <div class="sticker-tutorial-page-block">
          <div class="sticker-tutorial-page-text">
            <div id="stickerTutorialCount" class="sticker-tutorial-count">1 / 10</div>
            <p id="stickerTutorialText" class="sticker-tutorial-text">はるモードに しよう</p>
          </div>
          <div class="sticker-tutorial-actions">
            <button id="stickerTutorialSkip" type="button">あとで</button>
            <button id="stickerTutorialReplay" type="button">もういちど</button>
            <button id="stickerTutorialDemoDo" type="button" hidden>やってみる</button>
            <button id="stickerTutorialStepSkip" type="button" hidden>とばす</button>
            <button id="stickerTutorialNext" type="button">つぎ</button>
          </div>
        </div>
      </div>
    </section>
    <section id="stickerEditor" class="sticker-editor" hidden aria-label="Sticker page editor">
      <div class="sticker-editor-shell">
        <aside class="sticker-menu" aria-label="Sticker picker">
          <div class="editor-mode-switch" role="group" aria-label="Editor mode">
            <button type="button" data-editor-mode="sticker" class="is-active" aria-pressed="true">シール</button>
            <button type="button" data-editor-mode="draw" aria-pressed="false">おえかき</button>
            <button id="editorClose" class="editor-icon-button" type="button" aria-label="Close editor">×</button>
          </div>
          <div class="editor-filter-grid">
            <select id="editorGameFilter" aria-label="Game filter"></select>
          </div>
          <div id="drawingTools" class="drawing-tools" hidden aria-label="Drawing tools">
            <div class="drawing-top-row">
              <button id="drawUndo" class="draw-icon-button" type="button" aria-label="もどす" title="もどす">
                <img src="../../assets/images/icons/icons3_001.png" alt="">
              </button>
              <button id="drawClear" class="draw-icon-button" type="button" aria-label="ぜんぶけす" title="ぜんぶけす">
                <img src="../../assets/images/icons/icons_006.png" alt="">
              </button>
            </div>
            <div id="drawColorPalette" class="drawing-color-palette" aria-label="Drawing colors"></div>
            <div class="drawing-size-section" aria-label="Brush size">
              <span>ふとさ</span>
              <button type="button" class="draw-size-button" data-draw-size="4" aria-label="Small brush"><span class="draw-size-line draw-size-line-s"></span></button>
              <button type="button" class="draw-size-button is-active" data-draw-size="14" aria-label="Medium brush"><span class="draw-size-line draw-size-line-m"></span></button>
              <button type="button" class="draw-size-button" data-draw-size="28" aria-label="Large brush"><span class="draw-size-line draw-size-line-l"></span></button>
            </div>
            <div id="drawStampPanel" class="drawing-stamp-panel" hidden aria-label="Drawing stamps"></div>
            <div class="drawing-tool-row">
              <button id="drawPen" class="draw-icon-button is-active" type="button" aria-label="ペン" title="ペン">
                <img src="../../assets/images/mojikko/writing/icon_pencil.png" alt="">
              </button>
              <button id="drawEraser" class="draw-icon-button" type="button" aria-label="けしゴム" title="けしゴム">
                <img src="../../assets/images/icons/icons_004.png" alt="">
              </button>
              <button id="drawStamp" class="draw-icon-button" type="button" aria-label="スタンプ" title="スタンプ">
                <img src="../../assets/images/icons/icons2_003.png" alt="">
              </button>
              <button id="drawRainbow" class="draw-icon-button" type="button" aria-label="にじ" title="にじ">
                <img src="../../assets/images/icons/icons_001.png" alt="">
              </button>
              <button id="drawSparkle" class="draw-icon-button" type="button" aria-label="きらきら" title="きらきら">
                <img src="../../assets/images/icons/kirakira.png" alt="">
              </button>
            </div>
          </div>
          <div id="stickerLibrary" class="sticker-library" aria-label="Sticker library"></div>
          <div class="editor-controls" aria-label="Sticker transform controls">
            <label>
              <span>おおきさ</span>
              <input id="editorScale" type="range" min="0.35" max="2.4" step="0.01" value="1">
            </label>
            <label>
              <span>かいてん</span>
              <input id="editorRotation" type="range" min="-180" max="180" step="1" value="0">
            </label>
            <div class="editor-control-buttons">
              <button id="editorLayerBack" type="button">うしろへ</button>
              <button id="editorLayerFront" type="button">てまえへ</button>
              <button id="editorDelete" type="button">けす</button>
              <button id="editorApply" type="button">ほぞん</button>
            </div>
          </div>
        </aside>
        <section class="editor-workspace" aria-label="Sticker canvas">
          <div class="editor-canvas-frame">
            <div id="editorPageCanvas" class="editor-page-canvas" aria-label="Editable sticker page"></div>
          </div>
        </section>
      </div>
    </section>
    <aside id="tuningPanel" class="tuning-panel" hidden aria-label="Layer tuning"></aside>
    <!-- シール帳 正本統一: firstEver=1 で表示される初回 welcome overlay。 tap → tutorial 強制起動。 -->
    <div id="stickerFirstEverWelcome" class="sticker-first-ever-welcome" hidden role="dialog" aria-live="polite" aria-modal="true" aria-label="シールちょうへ ようこそ">
      <div class="sticker-first-ever-welcome__panel">
        <p class="sticker-first-ever-welcome__title">シールちょうへ<br>ようこそ!</p>
        <p class="sticker-first-ever-welcome__body">あつめた シールを<br>ペタッと はろう</p>
        <div class="sticker-first-ever-welcome__actions">
          <button type="button" data-firstever-skip class="sticker-first-ever-welcome__btn sticker-first-ever-welcome__btn--sub">あとで</button>
          <button type="button" data-firstever-start class="sticker-first-ever-welcome__btn sticker-first-ever-welcome__btn--main">あそびかたを みる</button>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="./main.js?v=20260626-1643"></script>
</body>
</html>
